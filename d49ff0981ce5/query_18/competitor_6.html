</span><div data-dcnode-id="3584" id="p-208.15(b)"><p class="indent-1" data-dcnode-id="3585" data-title="208.15(b)"><span class="paragraph-hierarchy" data-dcnode-id="3590"><span class="paren" data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">(</span></span><span data-dcnode-id="3593" instrument_node="">b</span><span class="paren" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">)</span></span></span><span data-dcnode-id="3589" instrument_node=""> The provisions of </span><a class="cfr external" data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1240.8%23p-1240.8%28d%29"><span data-dcnode-id="3588" instrument_node="">8 CFR 1240.8(d)</span></a><span data-dcnode-id="3586" instrument_node=""> shall apply when the evidence of record indicates that the firm resettlement bar may apply. In such cases, the alien shall bear the burden of proving the bar does not apply. Either DHS or the immigration judge may raise the issue of the application of the firm resettlement bar based on the evidence of record. The firm resettlement of an alien's parent(s) shall be imputed to the alien if the resettlement occurred before the alien turned 18 and the alien resided with the alien's parents at the time of the firm resettlement unless the alien establishes that he or she could not have derived any permanent legal immigration status or any non-permanent but indefinitely renewable legal immigration status (including asylee, refugee, or similar status but excluding status such as of a tourist) from the alien's parent. </span></p></div><span data-dcnode-id="3583" instrument_node="">
</span><p class="citation" data-dcnode-id="3578"><span data-dcnode-id="3582" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="3580" data-reference="85 FR 80388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80388"><span data-dcnode-id="3581" instrument_node="">85 FR 80388</span></a><span data-dcnode-id="3579" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="3577" instrument_node="">
</span></div><span data-dcnode-id="3575" instrument_node="">
</span><div class="section" data-dcnode-id="3013" id="208.16"><span data-dcnode-id="3574" instrument_node="">

</span><div class="seal-block seal-block-header" data-dcnode-id="3565"><div class="seal-content" data-dcnode-id="3566"><h6 data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="3564" instrument_node="">
</span><div class="content-block" data-dcnode-id="3559"><span data-dcnode-id="3563" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="3561" data-reference="87 FR 18218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18218"><span data-dcnode-id="3562" instrument_node="">87 FR 18218</span></a><span data-dcnode-id="3560" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="3558" instrument_node="">
</span></div></div><span data-dcnode-id="3555" instrument_node="">

</span><div class="seal-block seal-block-header" data-dcnode-id="3550"><div class="seal-content" data-dcnode-id="3551"><h6 data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="3549" instrument_node="">

</span></div></div><span data-dcnode-id="3540" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="3526"><div class="box box-enhanced no-footer" data-dcnode-id="3527"><span data-dcnode-id="3539" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="3535"><div class="seal-content" data-dcnode-id="3536"><h6 data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="3534" instrument_node="">
</span><div class="content-block" data-dcnode-id="3529"><span data-dcnode-id="3533" instrument_node="">This amendment was delayed until Mar. 22, 2021, at </span><a class="fr-reference" data-dcnode-id="3531" data-reference="86 FR 6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-6847"><span data-dcnode-id="3532" instrument_node="">86 FR 6847</span></a><span data-dcnode-id="3530" instrument_node="">, Jan. 25, 2021.</span></div><span data-dcnode-id="3528" instrument_node="">
</span></div></div><span data-dcnode-id="3525" instrument_node="">

</span><div class="seal-block seal-block-header" data-dcnode-id="3520"><div class="seal-content" data-dcnode-id="3521"><h6 data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="3519" instrument_node="">
</span><div class="content-block" data-dcnode-id="3514"><span data-dcnode-id="3518" instrument_node="">This amendment was further delayed until Dec. 31, 2021, at </span><a class="fr-reference" data-dcnode-id="3516" data-reference="86 FR 15076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-15076"><span data-dcnode-id="3517" instrument_node="">86 FR 15076</span></a><span data-dcnode-id="3515" instrument_node="">, Mar. 22, 2021.</span></div><span data-dcnode-id="3513" instrument_node="">
</span></div></div><span data-dcnode-id="3510" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="3496"><div class="box box-enhanced no-footer" data-dcnode-id="3497"><span data-dcnode-id="3509" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="3505"><div class="seal-content" data-dcnode-id="3506"><h6 data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="3504" instrument_node="">
</span><div class="content-block" data-dcnode-id="3499"><span data-dcnode-id="3503" instrument_node="">This amendment was further delayed until Dec. 31, 2022, at </span><a class="fr-reference" data-dcnode-id="3501" data-reference="86 FR 73615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-73615"><span data-dcnode-id="3502" instrument_node="">86 FR 73615</span></a><span data-dcnode-id="3500" instrument_node="">, Dec. 28, 2021.</span></div><span data-dcnode-id="3498" instrument_node="">
</span></div></div><span data-dcnode-id="3495" instrument_node="">
</span><div data-dcnode-id="3481" id="p-208.16(a)"><span data-dcnode-id="3494" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3483" data-title="208.16(a)"><span class="paragraph-hierarchy" data-dcnode-id="3488"><span class="paren" data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">(</span></span><span data-dcnode-id="3491" instrument_node="">a</span><span class="paren" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">)</span></span></span><span data-dcnode-id="3487" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Consideration of application for withholding of removal.</span></em><span data-dcnode-id="3484" instrument_node="">  An asylum officer shall not decide whether the exclusion, deportation, or removal of an alien to a country where the alien's life or freedom would be threatened must be withheld, except in the case of an alien who is otherwise eligible for asylum but is precluded from being granted such status due solely to section 207(a)(5) of the Act. In exclusion, deportation, or removal proceedings, an immigration judge may adjudicate both an asylum claim and a request for withholding of removal whether or not asylum is granted. </span></p><span data-dcnode-id="3482" instrument_node="">
</span></div><span data-dcnode-id="3480" instrument_node="">
</span><div data-dcnode-id="3271" id="p-208.16(b)"><span data-dcnode-id="3479" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3468" data-title="208.16(b)"><span class="paragraph-hierarchy" data-dcnode-id="3473"><span class="paren" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">(</span></span><span data-dcnode-id="3476" instrument_node="">b</span><span class="paren" data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">)</span></span></span><span data-dcnode-id="3472" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Eligibility for withholding of removal under section 241(b)(3) of the Act; burden of proof.</span></em><span data-dcnode-id="3469" instrument_node="">  The burden of proof is on the applicant for withholding of removal under section 241(b)(3) of the Act to establish that his or her life or freedom would be threatened in the proposed country of removal on account of race, religion, nationality, membership in a particular social group, or political opinion. The testimony of the applicant, if credible, may be sufficient to sustain the burden of proof without corroboration. The evidence shall be evaluated as follows: </span></p><span data-dcnode-id="3467" instrument_node="">
</span><div data-dcnode-id="3387" id="p-208.16(b)(1)"><span data-dcnode-id="3466" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3455" data-title="208.16(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="3460"><span class="paren" data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">(</span></span><span data-dcnode-id="3463" instrument_node="">1</span><span class="paren" data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">)</span></span></span><span data-dcnode-id="3459" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Past threat to life or freedom.</span></em><span data-dcnode-id="3456" instrument_node=""> </span></p><span data-dcnode-id="3454" instrument_node="">
</span><div data-dcnode-id="3419" id="p-208.16(b)(1)(i)"><span data-dcnode-id="3453" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3445" data-title="208.16(b)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3447"><span class="paren" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">(</span></span><span data-dcnode-id="3450" instrument_node="">i</span><span class="paren" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">)</span></span></span><span data-dcnode-id="3446" instrument_node=""> If the applicant is determined to have suffered past persecution in the proposed country of removal on account of race, religion, nationality, membership in a particular social group, or political opinion, it shall be presumed that the applicant's life or freedom would be threatened in the future in the country of removal on the basis of the original claim. This presumption may be rebutted if an asylum officer or immigration judge finds by a preponderance of the evidence: </span></p><span data-dcnode-id="3444" instrument_node="">
</span><div data-dcnode-id="3433" id="p-208.16(b)(1)(i)(A)"><span data-dcnode-id="3443" instrument_node="">
</span><p class="indent-4" data-dcnode-id="3435" data-title="208.16(b)(1)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="3437"><span class="paren" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">(</span></span><span data-dcnode-id="3440" instrument_node="">A</span><span class="paren" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">)</span></span></span><span data-dcnode-id="3436" instrument_node=""> There has been a fundamental change in circumstances such that the applicant's life or freedom would not be threatened on account of any of the five grounds mentioned in this paragraph upon the applicant's removal to that country; or </span></p><span data-dcnode-id="3434" instrument_node="">
</span></div><span data-dcnode-id="3432" instrument_node="">
</span><div data-dcnode-id="3421" id="p-208.16(b)(1)(i)(B)"><span data-dcnode-id="3431" instrument_node="">
</span><p class="indent-4" data-dcnode-id="3423" data-title="208.16(b)(1)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="3425"><span class="paren" data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">(</span></span><span data-dcnode-id="3428" instrument_node="">B</span><span class="paren" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">)</span></span></span><span data-dcnode-id="3424" instrument_node=""> The applicant could avoid a future threat to his or her life or freedom by relocating to another part of the proposed country of removal and, under all the circumstances, it would be reasonable to expect the applicant to do so. </span></p><span data-dcnode-id="3422" instrument_node="">
</span></div><span data-dcnode-id="3420" instrument_node="">
</span></div><span data-dcnode-id="3418" instrument_node="">
</span><div data-dcnode-id="3401" id="p-208.16(b)(1)(ii)"><span data-dcnode-id="3417" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3403" data-title="208.16(b)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3411"><span class="paren" data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">(</span></span><span data-dcnode-id="3414" instrument_node="">ii</span><span class="paren" data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">)</span></span></span><span data-dcnode-id="3410" instrument_node=""> In cases in which the applicant has established past persecution, the Service shall bear the burden of establishing by a preponderance of the evidence the requirements of </span><a class="cfr external" data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%281%29%28i%29%28A%29"><span data-dcnode-id="3409" instrument_node="">paragraphs (b)(1)(i)(A)</span></a><span data-dcnode-id="3407" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%281%29%28i%29%28B%29"><span data-dcnode-id="3406" instrument_node="">(b)(1)(i)(B)</span></a><span data-dcnode-id="3404" instrument_node=""> of this section. </span></p><span data-dcnode-id="3402" instrument_node="">
</span></div><span data-dcnode-id="3400" instrument_node="">
</span><div data-dcnode-id="3389" id="p-208.16(b)(1)(iii)"><span data-dcnode-id="3399" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3391" data-title="208.16(b)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="3393"><span class="paren" data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">(</span></span><span data-dcnode-id="3396" instrument_node="">iii</span><span class="paren" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">)</span></span></span><span data-dcnode-id="3392" instrument_node=""> If the applicant's fear of future threat to life or freedom is unrelated to the past persecution, the applicant bears the burden of establishing that it is more likely than not that he or she would suffer such harm. </span></p><span data-dcnode-id="3390" instrument_node="">
</span></div><span data-dcnode-id="3388" instrument_node="">
</span></div><span data-dcnode-id="3386" instrument_node="">
</span><div data-dcnode-id="3348" id="p-208.16(b)(2)"><span data-dcnode-id="3385" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3374" data-title="208.16(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="3379"><span class="paren" data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">(</span></span><span data-dcnode-id="3382" instrument_node="">2</span><span class="paren" data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">)</span></span></span><span data-dcnode-id="3378" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Future threat to life or freedom.</span></em><span data-dcnode-id="3375" instrument_node="">  An applicant who has not suffered past persecution may demonstrate that his or her life or freedom would be threatened in the future in a country if he or she can establish that it is more likely than not that he or she would be persecuted on account of race, religion, nationality, membership in a particular social group, or political opinion upon removal to that country. Such an applicant cannot demonstrate that his or her life or freedom would be threatened if the asylum officer or immigration judge finds that the applicant could avoid a future threat to his or her life or freedom by relocating to another part of the proposed country of removal and, under all the circumstances, it would be reasonable to expect the applicant to do so. In evaluating whether it is more likely than not that the applicant's life or freedom would be threatened in a particular country on account of race, religion, nationality, membership in a particular social group, or political opinion, the asylum officer or immigration judge shall not require the applicant to provide evidence that he or she would be singled out individually for such persecution if: </span></p><span data-dcnode-id="3373" instrument_node="">
</span><div data-dcnode-id="3362" id="p-208.16(b)(2)(i)"><span data-dcnode-id="3372" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3364" data-title="208.16(b)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3366"><span class="paren" data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">(</span></span><span data-dcnode-id="3369" instrument_node="">i</span><span class="paren" data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">)</span></span></span><span data-dcnode-id="3365" instrument_node=""> The applicant establishes that in that country there is a pattern or practice of persecution of a group of persons similarly situated to the applicant on account of race, religion, nationality, membership in a particular social group, or political opinion; and </span></p><span data-dcnode-id="3363" instrument_node="">
</span></div><span data-dcnode-id="3361" instrument_node="">
</span><div data-dcnode-id="3350" id="p-208.16(b)(2)(ii)"><span data-dcnode-id="3360" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3352" data-title="208.16(b)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3354"><span class="paren" data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">(</span></span><span data-dcnode-id="3357" instrument_node="">ii</span><span class="paren" data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">)</span></span></span><span data-dcnode-id="3353" instrument_node=""> The applicant establishes his or her own inclusion in and identification with such group of persons such that it is more likely than not that his or her life or freedom would be threatened upon return to that country. </span></p><span data-dcnode-id="3351" instrument_node="">
</span></div><span data-dcnode-id="3349" instrument_node="">
</span></div><span data-dcnode-id="3347" instrument_node="">
</span><div data-dcnode-id="3273" id="p-208.16(b)(3)"><span data-dcnode-id="3346" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3329" data-title="208.16(b)(3)"><span class="paragraph-hierarchy" data-dcnode-id="3340"><span class="paren" data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">(</span></span><span data-dcnode-id="3343" instrument_node="">3</span><span class="paren" data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">)</span></span></span><span data-dcnode-id="3339" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Reasonableness of internal relocation.</span></em><span data-dcnode-id="3336" instrument_node="">  For purposes of determinations under </span><a class="cfr external" data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%281%29"><span data-dcnode-id="3335" instrument_node="">paragraphs (b)(1)</span></a><span data-dcnode-id="3333" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%282%29"><span data-dcnode-id="3332" instrument_node="">(2)</span></a><span data-dcnode-id="3330" instrument_node=""> of this section, adjudicators should consider the totality of the relevant circumstances regarding an applicant's prospects for relocation, including the size of the country of nationality or last habitual residence, the geographic locus of the alleged persecution, the size, reach, or numerosity of the alleged persecutor, and the applicant's demonstrated ability to relocate to the United States in order to apply for withholding of removal. </span></p><span data-dcnode-id="3328" instrument_node="">
</span><div data-dcnode-id="3317" id="p-208.16(b)(3)(i)"><span data-dcnode-id="3327" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3319" data-title="208.16(b)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3321"><span class="paren" data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">(</span></span><span data-dcnode-id="3324" instrument_node="">i</span><span class="paren" data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">)</span></span></span><span data-dcnode-id="3320" instrument_node=""> In cases in which the applicant has not established past persecution, the applicant shall bear the burden of establishing that it would not be reasonable for him or her to relocate, unless the persecutor is a government or is government-sponsored. </span></p><span data-dcnode-id="3318" instrument_node="">
</span></div><span data-dcnode-id="3316" instrument_node="">
</span><div data-dcnode-id="3305" id="p-208.16(b)(3)(ii)"><span data-dcnode-id="3315" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3307" data-title="208.16(b)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3309"><span class="paren" data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">(</span></span><span data-dcnode-id="3312" instrument_node="">ii</span><span class="paren" data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">)</span></span></span><span data-dcnode-id="3308" instrument_node=""> In cases in which the persecutor is a government or is government-sponsored, it shall be presumed that internal relocation would not be reasonable, unless DHS establishes by a preponderance of the evidence that, under the totality of the circumstances, it would be reasonable for the applicant to relocate. </span></p><span data-dcnode-id="3306" instrument_node="">
</span></div><span data-dcnode-id="3304" instrument_node="">
</span><div data-dcnode-id="3293" id="p-208.16(b)(3)(iii)"><span data-dcnode-id="3303" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3295" data-title="208.16(b)(3)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="3297"><span class="paren" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">(</span></span><span data-dcnode-id="3300" instrument_node="">iii</span><span class="paren" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">)</span></span></span><span data-dcnode-id="3296" instrument_node=""> Regardless of whether an applicant has established persecution in the past, in cases in which the persecutor is not the government or a government-sponsored actor, or otherwise is a private actor, there shall be a presumption that internal relocation would be reasonable unless the applicant establishes, by a preponderance of the evidence, that it would be unreasonable to relocate. </span></p><span data-dcnode-id="3294" instrument_node="">
</span></div><span data-dcnode-id="3292" instrument_node="">
</span><div data-dcnode-id="3275" id="p-208.16(b)(3)(iv)"><span data-dcnode-id="3291" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3277" data-title="208.16(b)(3)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="3285"><span class="paren" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">(</span></span><span data-dcnode-id="3288" instrument_node="">iv</span><span class="paren" data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">)</span></span></span><span data-dcnode-id="3284" instrument_node=""> For purposes of determinations under </span><a class="cfr external" data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%283%29%28ii%29"><span data-dcnode-id="3283" instrument_node="">paragraphs (b)(3)(ii)</span></a><span data-dcnode-id="3281" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29%283%29%28iii%29"><span data-dcnode-id="3280" instrument_node="">(iii)</span></a><span data-dcnode-id="3278" instrument_node=""> of this section, persecutors who are private actors, including but not limited to persecutors who are gang members, public officials who are not acting under color of law, or family members who are not themselves government officials or neighbors who are not themselves government officials, shall not be considered to be persecutors who are the government or government-sponsored absent evidence that the government sponsored the persecution. </span></p><span data-dcnode-id="3276" instrument_node="">
</span></div><span data-dcnode-id="3274" instrument_node="">
</span></div><span data-dcnode-id="3272" instrument_node="">
</span></div><span data-dcnode-id="3270" instrument_node="">
</span><div data-dcnode-id="3139" id="p-208.16(c)"><span data-dcnode-id="3269" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3258" data-title="208.16(c)"><span class="paragraph-hierarchy" data-dcnode-id="3263"><span class="paren" data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">(</span></span><span data-dcnode-id="3266" instrument_node="">c</span><span class="paren" data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">)</span></span></span><span data-dcnode-id="3262" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">Eligibility for withholding of removal under the Convention Against Torture.</span></em><span data-dcnode-id="3259" instrument_node=""> </span></p><span data-dcnode-id="3257" instrument_node="">
</span><div data-dcnode-id="3240" id="p-208.16(c)(1)"><span data-dcnode-id="3256" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3242" data-title="208.16(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="3250"><span class="paren" data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">(</span></span><span data-dcnode-id="3253" instrument_node="">1</span><span class="paren" data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">)</span></span></span><span data-dcnode-id="3249" instrument_node=""> For purposes of regulations under Title II of the Act, “Convention Against Torture” shall refer to the United Nations Convention Against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment, subject to any reservations, understandings, declarations, and provisos contained in the United States Senate resolution of ratification of the Convention, as implemented by section 2242 of the Foreign Affairs Reform and Restructuring Act of 1998 (</span><a class="publ external" data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/plaw/105/public/277" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3248" instrument_node="">Pub. L. 105-277</span></a><span data-dcnode-id="3246" instrument_node="">, 112 Stat. 2681, 2681-821). The definition of torture contained in </span><a class="cfr external" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/section-208.18%23p-208.18%28a%29"><span data-dcnode-id="3245" instrument_node="">§ 208.18(a) of this part</span></a><span data-dcnode-id="3243" instrument_node=""> shall govern all decisions made under regulations under Title II of the Act about the applicability of Article 3 of the Convention Against Torture. </span></p><span data-dcnode-id="3241" instrument_node="">
</span></div><span data-dcnode-id="3239" instrument_node="">
</span><div data-dcnode-id="3228" id="p-208.16(c)(2)"><span data-dcnode-id="3238" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3230" data-title="208.16(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="3232"><span class="paren" data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">(</span></span><span data-dcnode-id="3235" instrument_node="">2</span><span class="paren" data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">)</span></span></span><span data-dcnode-id="3231" instrument_node=""> The burden of proof is on the applicant for withholding of removal under this paragraph to establish that it is more likely than not that he or she would be tortured if removed to the proposed country of removal. The testimony of the applicant, if credible, may be sufficient to sustain the burden of proof without corroboration. </span></p><span data-dcnode-id="3229" instrument_node="">
</span></div><span data-dcnode-id="3227" instrument_node="">
</span><div data-dcnode-id="3168" id="p-208.16(c)(3)"><span data-dcnode-id="3226" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3218" data-title="208.16(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="3220"><span class="paren" data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">(</span></span><span data-dcnode-id="3223" instrument_node="">3</span><span class="paren" data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">)</span></span></span><span data-dcnode-id="3219" instrument_node=""> In assessing whether it is more likely than not that an applicant would be tortured in the proposed country of removal, all evidence relevant to the possibility of future torture shall be considered, including, but not limited to: </span></p><span data-dcnode-id="3217" instrument_node="">
</span><div data-dcnode-id="3206" id="p-208.16(c)(3)(i)"><span data-dcnode-id="3216" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3208" data-title="208.16(c)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3210"><span class="paren" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">(</span></span><span data-dcnode-id="3213" instrument_node="">i</span><span class="paren" data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">)</span></span></span><span data-dcnode-id="3209" instrument_node=""> Evidence of past torture inflicted upon the applicant; </span></p><span data-dcnode-id="3207" instrument_node="">
</span></div><span data-dcnode-id="3205" instrument_node="">
</span><div data-dcnode-id="3194" id="p-208.16(c)(3)(ii)"><span data-dcnode-id="3204" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3196" data-title="208.16(c)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3198"><span class="paren" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">(</span></span><span data-dcnode-id="3201" instrument_node="">ii</span><span class="paren" data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">)</span></span></span><span data-dcnode-id="3197" instrument_node=""> Evidence that the applicant could relocate to a part of the country of removal where he or she is not likely to be tortured; </span></p><span data-dcnode-id="3195" instrument_node="">
</span></div><span data-dcnode-id="3193" instrument_node="">
</span><div data-dcnode-id="3182" id="p-208.16(c)(3)(iii)"><span data-dcnode-id="3192" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3184" data-title="208.16(c)(3)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="3186"><span class="paren" data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">(</span></span><span data-dcnode-id="3189" instrument_node="">iii</span><span class="paren" data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">)</span></span></span><span data-dcnode-id="3185" instrument_node=""> Evidence of gross, flagrant or mass violations of human rights within the country of removal, where applicable; and </span></p><span data-dcnode-id="3183" instrument_node="">
</span></div><span data-dcnode-id="3181" instrument_node="">
</span><div data-dcnode-id="3170" id="p-208.16(c)(3)(iv)"><span data-dcnode-id="3180" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3172" data-title="208.16(c)(3)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="3174"><span class="paren" data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">(</span></span><span data-dcnode-id="3177" instrument_node="">iv</span><span class="paren" data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">)</span></span></span><span data-dcnode-id="3173" instrument_node=""> Other relevant information regarding conditions in the country of removal. </span></p><span data-dcnode-id="3171" instrument_node="">
</span></div><span data-dcnode-id="3169" instrument_node="">
</span></div><span data-dcnode-id="3167" instrument_node="">
</span><div data-dcnode-id="3141" id="p-208.16(c)(4)"><span data-dcnode-id="3166" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3143" data-title="208.16(c)(4)"><span class="paragraph-hierarchy" data-dcnode-id="3160"><span class="paren" data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">(</span></span><span data-dcnode-id="3163" instrument_node="">4</span><span class="paren" data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">)</span></span></span><span data-dcnode-id="3159" instrument_node=""> In considering an application for withholding of removal under the Convention Against Torture, the immigration judge shall first determine whether the alien is more likely than not to be tortured in the country of removal. If the immigration judge determines that the alien is more likely than not to be tortured in the country of removal, the alien is entitled to protection under the Convention Against Torture. Protection under the Convention Against Torture will be granted either in the form of withholding of removal or in the form of deferral of removal. An alien entitled to such protection shall be granted withholding of removal unless the alien is subject to mandatory denial of withholding of removal under </span><a class="cfr external" data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%282%29"><span data-dcnode-id="3158" instrument_node="">paragraphs (d)(2)</span></a><span data-dcnode-id="3156" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="3155" instrument_node="">(d)(3)</span></a><span data-dcnode-id="3153" instrument_node=""> of this section. If an alien entitled to such protection is subject to mandatory denial of withholding of removal under </span><a class="cfr external" data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%282%29"><span data-dcnode-id="3152" instrument_node="">paragraphs (d)(2)</span></a><span data-dcnode-id="3150" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="3149" instrument_node="">(d)(3)</span></a><span data-dcnode-id="3147" instrument_node=""> of this section, the alien's removal shall be deferred under </span><a class="cfr external" data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="3146" instrument_node="">§ 208.17(a)</span></a><span data-dcnode-id="3144" instrument_node="">. </span></p><span data-dcnode-id="3142" instrument_node="">
</span></div><span data-dcnode-id="3140" instrument_node="">
</span></div><span data-dcnode-id="3138" instrument_node="">
</span><div data-dcnode-id="3061" id="p-208.16(d)"><span data-dcnode-id="3137" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3126" data-title="208.16(d)"><span class="paragraph-hierarchy" data-dcnode-id="3131"><span class="paren" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">(</span></span><span data-dcnode-id="3134" instrument_node="">d</span><span class="paren" data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">)</span></span></span><span data-dcnode-id="3130" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Approval or denial of application</span></em><span data-dcnode-id="3127" instrument_node="">  - </span></p><span data-dcnode-id="3125" instrument_node="">
</span><div data-dcnode-id="3099" id="p-208.16(d)(1)"><span data-dcnode-id="3124" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3101" data-title="208.16(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="3118"><span class="paren" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">(</span></span><span data-dcnode-id="3121" instrument_node="">1</span><span class="paren" data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">)</span></span></span><span data-dcnode-id="3117" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">General.</span></em><span data-dcnode-id="3114" instrument_node="">  Subject to </span><a class="cfr external" data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%282%29"><span data-dcnode-id="3113" instrument_node="">paragraphs (d)(2)</span></a><span data-dcnode-id="3111" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="3110" instrument_node="">(d)(3)</span></a><span data-dcnode-id="3108" instrument_node=""> of this section, an application for withholding of deportation or removal to a country of proposed removal shall be granted if the applicant's eligibility for withholding is established pursuant to </span><a class="cfr external" data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28b%29"><span data-dcnode-id="3107" instrument_node="">paragraphs (b)</span></a><span data-dcnode-id="3105" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="3104" instrument_node="">(c)</span></a><span data-dcnode-id="3102" instrument_node=""> of this section. </span></p><span data-dcnode-id="3100" instrument_node="">
</span></div><span data-dcnode-id="3098" instrument_node="">
</span><div data-dcnode-id="3081" id="p-208.16(d)(2)"><span data-dcnode-id="3097" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3083" data-title="208.16(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="3091"><span class="paren" data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">(</span></span><span data-dcnode-id="3094" instrument_node="">2</span><span class="paren" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">)</span></span></span><span data-dcnode-id="3090" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Mandatory denials.</span></em><span data-dcnode-id="3087" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="3086" instrument_node="">paragraph (d)(3)</span></a><span data-dcnode-id="3084" instrument_node=""> of this section, an application for withholding of removal under section 241(b)(3) of the Act or under the Convention Against Torture shall be denied if the applicant falls within section 241(b)(3)(B) of the Act or, for applications for withholding of deportation adjudicated in proceedings commenced prior to April 1, 1997, within section 243(h)(2) of the Act as it appeared prior to that date. For purposes of section 241(b)(3)(B)(ii) of the Act, or section 243(h)(2)(B) of the Act as it appeared prior to April 1, 1997, an alien who has been convicted of a particularly serious crime shall be considered to constitute a danger to the community. If the evidence indicates the applicability of one or more of the grounds for denial of withholding enumerated in the Act, the applicant shall have the burden of proving by a preponderance of the evidence that such grounds do not apply. </span></p><span data-dcnode-id="3082" instrument_node="">
</span></div><span data-dcnode-id="3080" instrument_node="">
</span><div data-dcnode-id="3063" id="p-208.16(d)(3)"><span data-dcnode-id="3079" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3065" data-title="208.16(d)(3)"><span class="paragraph-hierarchy" data-dcnode-id="3073"><span class="paren" data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">(</span></span><span data-dcnode-id="3076" instrument_node="">3</span><span class="paren" data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">)</span></span></span><span data-dcnode-id="3072" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Exception to the prohibition on withholding of deportation in certain cases.</span></em><span data-dcnode-id="3069" instrument_node="">  Section 243(h)(3) of the Act, as added by section 413 of </span><a class="publ external" data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/plaw/104/public/132" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3068" instrument_node="">Pub. L. 104-132</span></a><span data-dcnode-id="3066" instrument_node=""> (110 Stat. 1214), shall apply only to applications adjudicated in proceedings commenced before April 1, 1997, and in which final action had not been taken before April 24, 1996. The discretion permitted by that section to override section 243(h)(2) of the Act shall be exercised only in the case of an applicant convicted of an aggravated felony (or felonies) where he or she was sentenced to an aggregate term of imprisonment of less than 5 years and the immigration judge determines on an individual basis that the crime (or crimes) of which the applicant was convicted does not constitute a particularly serious crime. Nevertheless, it shall be presumed that an alien convicted of an aggravated felony has been convicted of a particularly serious crime. Except in the cases specified in this paragraph, the grounds for denial of withholding of deportation in section 243(h)(2) of the Act as it appeared prior to April 1, 1997, shall be deemed to comply with the Protocol Relating to the Status of Refugees, Jan. 31, 1967, T.I.A.S. No. 6577. </span></p><span data-dcnode-id="3064" instrument_node="">
</span></div><span data-dcnode-id="3062" instrument_node="">
</span></div><span data-dcnode-id="3060" instrument_node="">
</span><div data-dcnode-id="3049" id="p-208.16(e)"><span data-dcnode-id="3059" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3051" data-title="208.16(e)"><span class="paragraph-hierarchy" data-dcnode-id="3053"><span class="paren" data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">(</span></span><span data-dcnode-id="3056" instrument_node="">e</span><span class="paren" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">)</span></span></span><span data-dcnode-id="3052" instrument_node=""> [Reserved] </span></p><span data-dcnode-id="3050" instrument_node="">
</span></div><span data-dcnode-id="3048" instrument_node="">
</span><div data-dcnode-id="3033" id="p-208.16(f)"><p class="indent-1" data-dcnode-id="3034" data-title="208.16(f)"><span class="paragraph-hierarchy" data-dcnode-id="3042"><span class="paren" data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">(</span></span><span data-dcnode-id="3045" instrument_node="">f</span><span class="paren" data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">)</span></span></span><span data-dcnode-id="3041" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Removal to third country.</span></em><span data-dcnode-id="3038" instrument_node="">  Nothing in this section or </span><a class="cfr external" data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17"><span data-dcnode-id="3037" instrument_node="">§ 208.17</span></a><span data-dcnode-id="3035" instrument_node=""> shall prevent the Service from removing an alien to a third country other than the country to which removal has been withheld or deferred. </span></p></div><span data-dcnode-id="3032" instrument_node="">
</span><p class="citation" data-dcnode-id="3015"><span data-dcnode-id="3031" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="3029" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="3030" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="3028" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="3026" data-reference="64 FR 8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8488"><span data-dcnode-id="3027" instrument_node="">64 FR 8488</span></a><span data-dcnode-id="3025" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="3023" data-reference="65 FR 76135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76135"><span data-dcnode-id="3024" instrument_node="">65 FR 76135</span></a><span data-dcnode-id="3022" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="3020" data-reference="85 FR 67259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-67259"><span data-dcnode-id="3021" instrument_node="">85 FR 67259</span></a><span data-dcnode-id="3019" instrument_node="">, Oct. 21, 2020; </span><a class="fr-reference" data-dcnode-id="3017" data-reference="85 FR 80388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80388"><span data-dcnode-id="3018" instrument_node="">85 FR 80388</span></a><span data-dcnode-id="3016" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="3014" instrument_node="">
</span></div><span data-dcnode-id="3012" instrument_node="">
</span><div class="section" data-dcnode-id="2723" id="208.17"><span data-dcnode-id="3011" instrument_node="">
</span><h4 data-dcnode-id="3008"><a class="direct" data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17"><span data-dcnode-id="3010" instrument_node="">§ 208.17 Deferral of removal under the Convention Against Torture.</span></a></h4><span data-dcnode-id="3007" instrument_node="">
</span><div data-dcnode-id="2984" id="p-208.17(a)"><span data-dcnode-id="3006" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2986" data-title="208.17(a)"><span class="paragraph-hierarchy" data-dcnode-id="3000"><span class="paren" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">(</span></span><span data-dcnode-id="3003" instrument_node="">a</span><span class="paren" data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">)</span></span></span><span data-dcnode-id="2999" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Grant of deferral of removal.</span></em><span data-dcnode-id="2996" instrument_node="">  An alien who: has been ordered removed; has been found under </span><a class="cfr external" data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29%283%29"><span data-dcnode-id="2995" instrument_node="">§ 208.16(c)(3)</span></a><span data-dcnode-id="2993" instrument_node=""> to be entitled to protection under the Convention Against Torture; and is subject to the provisions for mandatory denial of withholding of removal under </span><a class="cfr external" data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%282%29"><span data-dcnode-id="2992" instrument_node="">§ 208.16(d)(2)</span></a><span data-dcnode-id="2990" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="2989" instrument_node="">(d)(3)</span></a><span data-dcnode-id="2987" instrument_node="">, shall be granted deferral of removal to the country where he or she is more likely than not to be tortured. </span></p><span data-dcnode-id="2985" instrument_node="">
</span></div><span data-dcnode-id="2983" instrument_node="">
</span><div data-dcnode-id="2894" id="p-208.17(b)"><span data-dcnode-id="2982" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2971" data-title="208.17(b)"><span class="paragraph-hierarchy" data-dcnode-id="2976"><span class="paren" data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">(</span></span><span data-dcnode-id="2979" instrument_node="">b</span><span class="paren" data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">)</span></span></span><span data-dcnode-id="2975" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Notice to alien.</span></em><span data-dcnode-id="2972" instrument_node=""> </span></p><span data-dcnode-id="2970" instrument_node="">
</span><div data-dcnode-id="2908" id="p-208.17(b)(1)"><span data-dcnode-id="2969" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2958" data-title="208.17(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2963"><span class="paren" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">(</span></span><span data-dcnode-id="2966" instrument_node="">1</span><span class="paren" data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">)</span></span></span><span data-dcnode-id="2962" instrument_node=""> After an immigration judge orders an alien described in </span><a class="cfr external" data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2961" instrument_node="">paragraph (a)</span></a><span data-dcnode-id="2959" instrument_node=""> of this section removed, the immigration judge shall inform the alien that his or her removal to the country where he or she is more likely than not to be tortured shall be deferred until such time as the deferral is terminated under this section. The immigration judge shall inform the alien that deferral of removal: </span></p><span data-dcnode-id="2957" instrument_node="">
</span><div data-dcnode-id="2946" id="p-208.17(b)(1)(i)"><span data-dcnode-id="2956" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2948" data-title="208.17(b)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="2950"><span class="paren" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">(</span></span><span data-dcnode-id="2953" instrument_node="">i</span><span class="paren" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">)</span></span></span><span data-dcnode-id="2949" instrument_node=""> Does not confer upon the alien any lawful or permanent immigration status in the United States; </span></p><span data-dcnode-id="2947" instrument_node="">
</span></div><span data-dcnode-id="2945" instrument_node="">
</span><div data-dcnode-id="2934" id="p-208.17(b)(1)(ii)"><span data-dcnode-id="2944" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2936" data-title="208.17(b)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="2938"><span class="paren" data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">(</span></span><span data-dcnode-id="2941" instrument_node="">ii</span><span class="paren" data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">)</span></span></span><span data-dcnode-id="2937" instrument_node=""> Will not necessarily result in the alien being released from the custody of the Service if the alien is subject to such custody; </span></p><span data-dcnode-id="2935" instrument_node="">
</span></div><span data-dcnode-id="2933" instrument_node="">
</span><div data-dcnode-id="2922" id="p-208.17(b)(1)(iii)"><span data-dcnode-id="2932" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2924" data-title="208.17(b)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="2926"><span class="paren" data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">(</span></span><span data-dcnode-id="2929" instrument_node="">iii</span><span class="paren" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">)</span></span></span><span data-dcnode-id="2925" instrument_node=""> Is effective only until terminated; and </span></p><span data-dcnode-id="2923" instrument_node="">
</span></div><span data-dcnode-id="2921" instrument_node="">
</span><div data-dcnode-id="2910" id="p-208.17(b)(1)(iv)"><span data-dcnode-id="2920" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2912" data-title="208.17(b)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="2914"><span class="paren" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">(</span></span><span data-dcnode-id="2917" instrument_node="">iv</span><span class="paren" data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">)</span></span></span><span data-dcnode-id="2913" instrument_node=""> Is subject to review and termination if the immigration judge determines that it is not likely that the alien would be tortured in the country to which removal has been deferred, or if the alien requests that deferral be terminated. </span></p><span data-dcnode-id="2911" instrument_node="">
</span></div><span data-dcnode-id="2909" instrument_node="">
</span></div><span data-dcnode-id="2907" instrument_node="">
</span><div data-dcnode-id="2896" id="p-208.17(b)(2)"><span data-dcnode-id="2906" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2898" data-title="208.17(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2900"><span class="paren" data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">(</span></span><span data-dcnode-id="2903" instrument_node="">2</span><span class="paren" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">)</span></span></span><span data-dcnode-id="2899" instrument_node=""> The immigration judge shall also inform the alien that removal has been deferred only to the country in which it has been determined that the alien is likely to be tortured, and that the alien may be removed at any time to another country where he or she is not likely to be tortured. </span></p><span data-dcnode-id="2897" instrument_node="">
</span></div><span data-dcnode-id="2895" instrument_node="">
</span></div><span data-dcnode-id="2893" instrument_node="">
</span><div data-dcnode-id="2876" id="p-208.17(c)"><span data-dcnode-id="2892" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2878" data-title="208.17(c)"><span class="paragraph-hierarchy" data-dcnode-id="2886"><span class="paren" data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">(</span></span><span data-dcnode-id="2889" instrument_node="">c</span><span class="paren" data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">)</span></span></span><span data-dcnode-id="2885" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Detention of an alien granted deferral of removal under this section.</span></em><span data-dcnode-id="2882" instrument_node="">  Nothing in this section shall alter the authority of the Service to detain an alien whose removal has been deferred under this section and who is otherwise subject to detention. In the case of such an alien, decisions about the alien's release shall be made according to </span><a class="cfr external" data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-241"><span data-dcnode-id="2881" instrument_node="">part 241 of this chapter</span></a><span data-dcnode-id="2879" instrument_node="">. </span></p><span data-dcnode-id="2877" instrument_node="">
</span></div><span data-dcnode-id="2875" instrument_node="">
</span><div data-dcnode-id="2792" id="p-208.17(d)"><span data-dcnode-id="2874" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2863" data-title="208.17(d)"><span class="paragraph-hierarchy" data-dcnode-id="2868"><span class="paren" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">(</span></span><span data-dcnode-id="2871" instrument_node="">d</span><span class="paren" data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">)</span></span></span><span data-dcnode-id="2867" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Termination of deferral of removal.</span></em><span data-dcnode-id="2864" instrument_node=""> </span></p><span data-dcnode-id="2862" instrument_node="">
</span><div data-dcnode-id="2839" id="p-208.17(d)(1)"><span data-dcnode-id="2861" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2841" data-title="208.17(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2855"><span class="paren" data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">(</span></span><span data-dcnode-id="2858" instrument_node="">1</span><span class="paren" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">)</span></span></span><span data-dcnode-id="2854" instrument_node=""> At any time while deferral of removal is in effect, the INS District Counsel for the District with jurisdiction over an alien whose removal has been deferred under </span><a class="cfr external" data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2853" instrument_node="">paragraph (a)</span></a><span data-dcnode-id="2851" instrument_node=""> of this section may file a motion with the Immigration Court having administrative control pursuant to </span><a class="cfr external" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.11"><span data-dcnode-id="2850" instrument_node="">§ 3.11 of this chapter</span></a><span data-dcnode-id="2848" instrument_node=""> to schedule a hearing to consider whether deferral of removal should be terminated. The Service motion shall be granted if it is accompanied by evidence that is relevant to the possibility that the alien would be tortured in the country to which removal has been deferred and that was not presented at the previous hearing. The Service motion shall not be subject to the requirements for reopening in </span><a class="cfr external" data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.2"><span data-dcnode-id="2847" instrument_node="">§§ 3.2</span></a><span data-dcnode-id="2845" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.23"><span data-dcnode-id="2844" instrument_node="">3.23 of this chapter</span></a><span data-dcnode-id="2842" instrument_node="">. </span></p><span data-dcnode-id="2840" instrument_node="">
</span></div><span data-dcnode-id="2838" instrument_node="">
</span><div data-dcnode-id="2824" id="p-208.17(d)(2)"><span data-dcnode-id="2837" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2826" data-title="208.17(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2831"><span class="paren" data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">(</span></span><span data-dcnode-id="2834" instrument_node="">2</span><span class="paren" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">)</span></span></span><span data-dcnode-id="2830" instrument_node=""> The Immigration Court shall provide notice to the alien and the Service of the time, place, and date of the termination hearing. Such notice shall inform the alien that the alien may supplement the information in his or her initial application for withholding of removal under the Convention Against Torture and shall provide that the alien must submit any such supplemental information within 10 calendar days of service of such notice (or 13 calendar days if service of such notice was by mail). At the expiration of this 10 or 13 day period, the Immigration Court shall forward a copy of the original application, and any supplemental information the alien or the Service has submitted, to the Department of State, together with notice to the Department of State of the time, place and date of the termination hearing. At its option, the Department of State may provide comments on the case, according to the provisions of </span><a class="cfr external" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/section-208.11"><span data-dcnode-id="2829" instrument_node="">§ 208.11 of this part</span></a><span data-dcnode-id="2827" instrument_node="">. </span></p><span data-dcnode-id="2825" instrument_node="">
</span></div><span data-dcnode-id="2823" instrument_node="">
</span><div data-dcnode-id="2806" id="p-208.17(d)(3)"><span data-dcnode-id="2822" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2808" data-title="208.17(d)(3)"><span class="paragraph-hierarchy" data-dcnode-id="2816"><span class="paren" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">(</span></span><span data-dcnode-id="2819" instrument_node="">3</span><span class="paren" data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">)</span></span></span><span data-dcnode-id="2815" instrument_node=""> The immigration judge shall conduct a hearing and make a </span><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">de novo</span></em><span data-dcnode-id="2812" instrument_node=""> determination, based on the record of proceeding and initial application in addition to any new evidence submitted by the Service or the alien, as to whether the alien is more likely than not to be tortured in the country to which removal has been deferred. This determination shall be made under the standards for eligibility set out in </span><a class="cfr external" data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2811" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2809" instrument_node="">. The burden is on the alien to establish that it is more likely than not that he or she would be tortured in the country to which removal has been deferred. </span></p><span data-dcnode-id="2807" instrument_node="">
</span></div><span data-dcnode-id="2805" instrument_node="">
</span><div data-dcnode-id="2794" id="p-208.17(d)(4)"><span data-dcnode-id="2804" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2796" data-title="208.17(d)(4)"><span class="paragraph-hierarchy" data-dcnode-id="2798"><span class="paren" data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">(</span></span><span data-dcnode-id="2801" instrument_node="">4</span><span class="paren" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">)</span></span></span><span data-dcnode-id="2797" instrument_node=""> If the immigration judge determines that the alien is more likely than not to be tortured in the country to which removal has been deferred, the order of deferral shall remain in place. If the immigration judge determines that the alien has not established that he or she is more likely than not to be tortured in the country to which removal has been deferred, the deferral of removal shall be terminated and the alien may be removed to that country. Appeal of the immigration judge's decision shall lie to the Board. </span></p><span data-dcnode-id="2795" instrument_node="">
</span></div><span data-dcnode-id="2793" instrument_node="">
</span></div><span data-dcnode-id="2791" instrument_node="">
</span><div data-dcnode-id="2750" id="p-208.17(e)"><span data-dcnode-id="2790" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2779" data-title="208.17(e)"><span class="paragraph-hierarchy" data-dcnode-id="2784"><span class="paren" data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">(</span></span><span data-dcnode-id="2787" instrument_node="">e</span><span class="paren" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">)</span></span></span><span data-dcnode-id="2783" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Termination at the request of the alien.</span></em><span data-dcnode-id="2780" instrument_node=""> </span></p><span data-dcnode-id="2778" instrument_node="">
</span><div data-dcnode-id="2764" id="p-208.17(e)(1)"><span data-dcnode-id="2777" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2766" data-title="208.17(e)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2771"><span class="paren" data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">(</span></span><span data-dcnode-id="2774" instrument_node="">1</span><span class="paren" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">)</span></span></span><span data-dcnode-id="2770" instrument_node=""> At any time while deferral of removal is in effect, the alien may make a written request to the Immigration Court having administrative control pursuant to </span><a class="cfr external" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.11"><span data-dcnode-id="2769" instrument_node="">§ 3.11 of this chapter</span></a><span data-dcnode-id="2767" instrument_node=""> to terminate the deferral order. If satisfied on the basis of the written submission that the alien's request is knowing and voluntary, the immigration judge shall terminate the order of deferral and the alien may be removed. </span></p><span data-dcnode-id="2765" instrument_node="">
</span></div><span data-dcnode-id="2763" instrument_node="">
</span><div data-dcnode-id="2752" id="p-208.17(e)(2)"><span data-dcnode-id="2762" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2754" data-title="208.17(e)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2756"><span class="paren" data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">(</span></span><span data-dcnode-id="2759" instrument_node="">2</span><span class="paren" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">)</span></span></span><span data-dcnode-id="2755" instrument_node=""> If necessary the immigration judge may calendar a hearing for the sole purpose of determining whether the alien's request is knowing and voluntary. If the immigration judge determines that the alien's request is knowing and voluntary, the order of deferral shall be terminated. If the immigration judge determines that the alien's request is not knowing and voluntary, the alien's request shall not serve as the basis for terminating the order of deferral. </span></p><span data-dcnode-id="2753" instrument_node="">
</span></div><span data-dcnode-id="2751" instrument_node="">
</span></div><span data-dcnode-id="2749" instrument_node="">
</span><div data-dcnode-id="2731" id="p-208.17(f)"><p class="indent-1" data-dcnode-id="2732" data-title="208.17(f)"><span class="paragraph-hierarchy" data-dcnode-id="2743"><span class="paren" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">(</span></span><span data-dcnode-id="2746" instrument_node="">f</span><span class="paren" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">)</span></span></span><span data-dcnode-id="2742" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2737"><span data-dcnode-id="2741" instrument_node="">Termination pursuant to </span><a class="cfr external" data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28c%29"><span data-dcnode-id="2740" instrument_node="">§ 208.18(c)</span></a><span data-dcnode-id="2738" instrument_node="">.</span></em><span data-dcnode-id="2736" instrument_node="">  At any time while deferral of removal is in effect, the Attorney General may determine whether deferral should be terminated based on diplomatic assurances forwarded by the Secretary of State pursuant to the procedures in </span><a class="cfr external" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28c%29"><span data-dcnode-id="2735" instrument_node="">§ 208.18(c)</span></a><span data-dcnode-id="2733" instrument_node="">. </span></p></div><span data-dcnode-id="2730" instrument_node="">
</span><p class="citation" data-dcnode-id="2725"><span data-dcnode-id="2729" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="2727" data-reference="64 FR 8489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8489"><span data-dcnode-id="2728" instrument_node="">64 FR 8489</span></a><span data-dcnode-id="2726" instrument_node="">, Feb. 19, 1999] </span></p><span data-dcnode-id="2724" instrument_node="">
</span></div><span data-dcnode-id="2722" instrument_node="">
</span><div class="section" data-dcnode-id="2170" id="208.18"><span data-dcnode-id="2721" instrument_node="">
</span><h4 data-dcnode-id="2718"><a class="direct" data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18"><span data-dcnode-id="2720" instrument_node="">§ 208.18 Implementation of the Convention Against Torture.</span></a></h4><span data-dcnode-id="2717" instrument_node="">
</span><div data-dcnode-id="2556" id="p-208.18(a)"><span data-dcnode-id="2716" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2705" data-title="208.18(a)"><span class="paragraph-hierarchy" data-dcnode-id="2710"><span class="paren" data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">(</span></span><span data-dcnode-id="2713" instrument_node="">a</span><span class="paren" data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">)</span></span></span><span data-dcnode-id="2709" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Definitions.</span></em><span data-dcnode-id="2706" instrument_node="">  The definitions in this subsection incorporate the definition of torture contained in Article 1 of the Convention Against Torture, subject to the reservations, understandings, declarations, and provisos contained in the United States Senate resolution of ratification of the Convention. </span></p><span data-dcnode-id="2704" instrument_node="">
</span><div data-dcnode-id="2693" id="p-208.18(a)(1)"><span data-dcnode-id="2703" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2695" data-title="208.18(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2697"><span class="paren" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">(</span></span><span data-dcnode-id="2700" instrument_node="">1</span><span class="paren" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">)</span></span></span><span data-dcnode-id="2696" instrument_node=""> Torture is defined as any act by which severe pain or suffering, whether physical or mental, is intentionally inflicted on a person for such purposes as obtaining from him or her or a third person information or a confession, punishing him or her for an act he or she or a third person has committed or is suspected of having committed, or intimidating or coercing him or her or a third person, or for any reason based on discrimination of any kind, when such pain or suffering is inflicted by or at the instigation of or with the consent or acquiescence of a public official acting in an official capacity or other person acting in an official capacity. Pain or suffering inflicted by a public official who is not acting under color of law shall not constitute pain or suffering inflicted by or at the instigation of or with the consent or acquiescence of a public official acting in an official capacity or other person acting in an official capacity, although a different public official acting in an official capacity or other person acting in an official capacity could instigate, consent to, or acquiesce in the pain or suffering inflicted by the public official who is not acting under color of law. </span></p><span data-dcnode-id="2694" instrument_node="">
</span></div><span data-dcnode-id="2692" instrument_node="">
</span><div data-dcnode-id="2681" id="p-208.18(a)(2)"><span data-dcnode-id="2691" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2683" data-title="208.18(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2685"><span class="paren" data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">(</span></span><span data-dcnode-id="2688" instrument_node="">2</span><span class="paren" data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">)</span></span></span><span data-dcnode-id="2684" instrument_node=""> Torture is an extreme form of cruel and inhuman treatment and does not include lesser forms of cruel, inhuman or degrading treatment or punishment that do not amount to torture. </span></p><span data-dcnode-id="2682" instrument_node="">
</span></div><span data-dcnode-id="2680" instrument_node="">
</span><div data-dcnode-id="2669" id="p-208.18(a)(3)"><span data-dcnode-id="2679" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2671" data-title="208.18(a)(3)"><span class="paragraph-hierarchy" data-dcnode-id="2673"><span class="paren" data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">(</span></span><span data-dcnode-id="2676" instrument_node="">3</span><span class="paren" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">)</span></span></span><span data-dcnode-id="2672" instrument_node=""> Torture does not include pain or suffering arising only from, inherent in or incidental to lawful sanctions. Lawful sanctions include judicially imposed sanctions and other enforcement actions authorized by law, including the death penalty, but do not include sanctions that defeat the object and purpose of the Convention Against Torture to prohibit torture. </span></p><span data-dcnode-id="2670" instrument_node="">
</span></div><span data-dcnode-id="2668" instrument_node="">
</span><div data-dcnode-id="2609" id="p-208.18(a)(4)"><span data-dcnode-id="2667" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2659" data-title="208.18(a)(4)"><span class="paragraph-hierarchy" data-dcnode-id="2661"><span class="paren" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">(</span></span><span data-dcnode-id="2664" instrument_node="">4</span><span class="paren" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">)</span></span></span><span data-dcnode-id="2660" instrument_node=""> In order to constitute torture, mental pain or suffering must be prolonged mental harm caused by or resulting from: </span></p><span data-dcnode-id="2658" instrument_node="">
</span><div data-dcnode-id="2647" id="p-208.18(a)(4)(i)"><span data-dcnode-id="2657" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2649" data-title="208.18(a)(4)(i)"><span class="paragraph-hierarchy" data-dcnode-id="2651"><span class="paren" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">(</span></span><span data-dcnode-id="2654" instrument_node="">i</span><span class="paren" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">)</span></span></span><span data-dcnode-id="2650" instrument_node=""> The intentional infliction or threatened infliction of severe physical pain or suffering; </span></p><span data-dcnode-id="2648" instrument_node="">
</span></div><span data-dcnode-id="2646" instrument_node="">
</span><div data-dcnode-id="2635" id="p-208.18(a)(4)(ii)"><span data-dcnode-id="2645" instrument_node="">
