metrics at a scheduled biometrics services appointment. USCIS has exclusive jurisdiction over all applications for employment authorization and employment authorization documentation based on a pending application for asylum under </span><a class="cfr external" data-dcnode-id="6739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6740" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6738" instrument_node="">, regardless of whether the asylum application is pending with USCIS or the Executive Office for Immigration Review. Employment authorization is not permitted during any period of judicial review of the asylum application, but may be requested if a Federal court remands the case to the Board of Immigration Appeals. USCIS may grant initial employment authorization under </span><a class="cfr external" data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6737" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6735" instrument_node=""> for a period that USCIS determines is appropriate at its discretion, not to exceed increments of two years. </span></p><span data-dcnode-id="6733" instrument_node="">
</span></div><span data-dcnode-id="6731" instrument_node="">
</span><div data-dcnode-id="6711" id="p-208.7(a)(1)(ii)"><span data-dcnode-id="6730" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6713" data-title="208.7(a)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="6724"><span class="paren" data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">(</span></span><span data-dcnode-id="6727" instrument_node="">ii</span><span class="paren" data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">)</span></span></span><span data-dcnode-id="6723" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6721"><span data-dcnode-id="6722" instrument_node="">Period for filing.</span></em><span data-dcnode-id="6720" instrument_node="">  An applicant for asylum cannot apply for initial employment authorization earlier than 365 calendar days after the date USCIS or the immigration court receives the asylum application in accordance with </span><a class="cfr external" data-dcnode-id="6718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-103"><span data-dcnode-id="6719" instrument_node="">8 CFR part 103</span></a><span data-dcnode-id="6717" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="6715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1003.31"><span data-dcnode-id="6716" instrument_node="">8 CFR 1003.31</span></a><span data-dcnode-id="6714" instrument_node="">, respectively, and the filing instructions on the application. If an asylum application is denied by USCIS before a decision on an initial or renewal application for employment authorization, the application for employment authorization will be denied. </span></p><span data-dcnode-id="6712" instrument_node="">
</span></div><span data-dcnode-id="6710" instrument_node="">
</span><div data-dcnode-id="6564" id="p-208.7(a)(1)(iii)"><span data-dcnode-id="6709" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6698" data-title="208.7(a)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="6703"><span class="paren" data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">(</span></span><span data-dcnode-id="6706" instrument_node="">iii</span><span class="paren" data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">)</span></span></span><span data-dcnode-id="6702" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">Asylum applicants who are ineligible for employment authorization.</span></em><span data-dcnode-id="6699" instrument_node="">  An applicant for asylum is not eligible for employment authorization if: </span></p><span data-dcnode-id="6697" instrument_node="">
</span><div data-dcnode-id="6686" id="p-208.7(a)(1)(iii)(A)"><span data-dcnode-id="6696" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6688" data-title="208.7(a)(1)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="6690"><span class="paren" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">(</span></span><span data-dcnode-id="6693" instrument_node="">A</span><span class="paren" data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">)</span></span></span><span data-dcnode-id="6689" instrument_node=""> The applicant was convicted at any time in the United States or abroad of any aggravated felony as described in section 101(a)(43) of the Act; </span></p><span data-dcnode-id="6687" instrument_node="">
</span></div><span data-dcnode-id="6685" instrument_node="">
</span><div data-dcnode-id="6674" id="p-208.7(a)(1)(iii)(B)"><span data-dcnode-id="6684" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6676" data-title="208.7(a)(1)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="6678"><span class="paren" data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">(</span></span><span data-dcnode-id="6681" instrument_node="">B</span><span class="paren" data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">)</span></span></span><span data-dcnode-id="6677" instrument_node=""> The applicant was convicted on or after [effective date of final rule] of a particularly serious crime; </span></p><span data-dcnode-id="6675" instrument_node="">
</span></div><span data-dcnode-id="6673" instrument_node="">
</span><div data-dcnode-id="6662" id="p-208.7(a)(1)(iii)(C)"><span data-dcnode-id="6672" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6664" data-title="208.7(a)(1)(iii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="6666"><span class="paren" data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">(</span></span><span data-dcnode-id="6669" instrument_node="">C</span><span class="paren" data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">)</span></span></span><span data-dcnode-id="6665" instrument_node=""> There are serious reasons for believing that the applicant on or after August 25, 2020 has committed a serious non-political crime outside the United States; </span></p><span data-dcnode-id="6663" instrument_node="">
</span></div><span data-dcnode-id="6661" instrument_node="">
</span><div data-dcnode-id="6647" id="p-208.7(a)(1)(iii)(D)"><span data-dcnode-id="6660" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6649" data-title="208.7(a)(1)(iii)(D)"><span class="paragraph-hierarchy" data-dcnode-id="6654"><span class="paren" data-dcnode-id="6658"><span data-dcnode-id="6659" instrument_node="">(</span></span><span data-dcnode-id="6657" instrument_node="">D</span><span class="paren" data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">)</span></span></span><span data-dcnode-id="6653" instrument_node=""> The applicant fails to establish that he or she is not subject to a mandatory denial of asylum due to any regulatory criminal grounds under </span><a class="cfr external" data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29"><span data-dcnode-id="6652" instrument_node="">8 CFR 208.13(c)</span></a><span data-dcnode-id="6650" instrument_node="">; </span></p><span data-dcnode-id="6648" instrument_node="">
</span></div><span data-dcnode-id="6646" instrument_node="">
</span><div data-dcnode-id="6635" id="p-208.7(a)(1)(iii)(E)"><span data-dcnode-id="6645" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6637" data-title="208.7(a)(1)(iii)(E)"><span class="paragraph-hierarchy" data-dcnode-id="6639"><span class="paren" data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">(</span></span><span data-dcnode-id="6642" instrument_node="">E</span><span class="paren" data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">)</span></span></span><span data-dcnode-id="6638" instrument_node=""> An asylum officer or an immigration judge has denied the applicant's asylum application within the 365-day period or before the adjudication of the initial request for employment authorization; </span></p><span data-dcnode-id="6636" instrument_node="">
</span></div><span data-dcnode-id="6634" instrument_node="">
</span><div data-dcnode-id="6617" id="p-208.7(a)(1)(iii)(F)"><span data-dcnode-id="6633" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6619" data-title="208.7(a)(1)(iii)(F)"><span class="paragraph-hierarchy" data-dcnode-id="6627"><span class="paren" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">(</span></span><span data-dcnode-id="6630" instrument_node="">F</span><span class="paren" data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">)</span></span></span><span data-dcnode-id="6626" instrument_node=""> The applicant filed his or her asylum application on or after August 25, 2020 and filed the application after the one-year filing deadline, unless and until the asylum officer or immigration judge determines that the applicant meets an exception for late filing as provided in section 208(a)(2)(D) of the Act and </span><a class="cfr external" data-dcnode-id="6624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4"><span data-dcnode-id="6625" instrument_node="">8 CFR 208.4</span></a><span data-dcnode-id="6623" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.4"><span data-dcnode-id="6622" instrument_node="">1208.4</span></a><span data-dcnode-id="6620" instrument_node="">, or unless the applicant was an unaccompanied alien child on the date the asylum application was first filed. </span></p><span data-dcnode-id="6618" instrument_node="">
</span></div><span data-dcnode-id="6616" instrument_node="">
</span><div data-dcnode-id="6566" id="p-208.7(a)(1)(iii)(G)"><span data-dcnode-id="6615" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6607" data-title="208.7(a)(1)(iii)(G)"><span class="paragraph-hierarchy" data-dcnode-id="6609"><span class="paren" data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">(</span></span><span data-dcnode-id="6612" instrument_node="">G</span><span class="paren" data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">)</span></span></span><span data-dcnode-id="6608" instrument_node=""> The applicant is an alien who entered or attempted to enter the United States at a place and time other than lawfully through a U.S. port of entry on or after August 25, 2020, unless the alien demonstrates that he or she: </span></p><span data-dcnode-id="6606" instrument_node="">
</span><div data-dcnode-id="6594" id="p-208.7(a)(1)(iii)(G)(1)"><span data-dcnode-id="6605" instrument_node="">
</span><p class="indent-5" data-dcnode-id="6596" data-title="208.7(a)(1)(iii)(G)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="6598"><span class="paren" data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">(</span></span><em data-dcnode-id="6601"><span data-dcnode-id="6602" instrument_node="">1</span></em><span class="paren" data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">)</span></span></span><span data-dcnode-id="6597" instrument_node=""> Presented himself or herself without delay but no later than 48 hours after the entry or attempted entry to the Secretary of Homeland Security or his or her delegate; </span></p><span data-dcnode-id="6595" instrument_node="">
</span></div><span data-dcnode-id="6593" instrument_node="">
</span><div data-dcnode-id="6581" id="p-208.7(a)(1)(iii)(G)(2)"><span data-dcnode-id="6592" instrument_node="">
</span><p class="indent-5" data-dcnode-id="6583" data-title="208.7(a)(1)(iii)(G)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="6585"><span class="paren" data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">(</span></span><em data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">2</span></em><span class="paren" data-dcnode-id="6586"><span data-dcnode-id="6587" instrument_node="">)</span></span></span><span data-dcnode-id="6584" instrument_node=""> Indicated to the Secretary of Homeland Security or his or her delegate an intention to apply for asylum or expresses a fear of persecution or torture; and </span></p><span data-dcnode-id="6582" instrument_node="">
</span></div><span data-dcnode-id="6580" instrument_node="">
</span><div data-dcnode-id="6568" id="p-208.7(a)(1)(iii)(G)(3)"><span data-dcnode-id="6579" instrument_node="">
</span><p class="indent-5" data-dcnode-id="6570" data-title="208.7(a)(1)(iii)(G)(<em>3</em>)"><span class="paragraph-hierarchy" data-dcnode-id="6572"><span class="paren" data-dcnode-id="6577"><span data-dcnode-id="6578" instrument_node="">(</span></span><em data-dcnode-id="6575"><span data-dcnode-id="6576" instrument_node="">3</span></em><span class="paren" data-dcnode-id="6573"><span data-dcnode-id="6574" instrument_node="">)</span></span></span><span data-dcnode-id="6571" instrument_node=""> Has good cause for the illegal entry or attempted entry, provided such good cause does not include the evasion of U.S. immigration officers, convenience, or for the purpose of circumvention of the orderly processing of asylum seekers at a U.S. port of entry. </span></p><span data-dcnode-id="6569" instrument_node="">
</span></div><span data-dcnode-id="6567" instrument_node="">
</span></div><span data-dcnode-id="6565" instrument_node="">
</span></div><span data-dcnode-id="6563" instrument_node="">
</span><div data-dcnode-id="6414" id="p-208.7(a)(1)(iv)"><span data-dcnode-id="6562" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6548" data-title="208.7(a)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="6556"><span class="paren" data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">(</span></span><span data-dcnode-id="6559" instrument_node="">iv</span><span class="paren" data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">)</span></span></span><span data-dcnode-id="6555" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">Delay.</span></em><span data-dcnode-id="6552" instrument_node="">  Any delay requested or caused by the applicant in the adjudication of the asylum application that is still outstanding or has not been remedied when the initial application for employment authorization under </span><a class="cfr external" data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6551" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6549" instrument_node=""> is filed will result in a denial of such application. Examples of applicant-caused delays include, but are not limited to the list below: </span></p><span data-dcnode-id="6547" instrument_node="">
</span><div data-dcnode-id="6533" id="p-208.7(a)(1)(iv)(A)"><span data-dcnode-id="6546" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6535" data-title="208.7(a)(1)(iv)(A)"><span class="paragraph-hierarchy" data-dcnode-id="6540"><span class="paren" data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">(</span></span><span data-dcnode-id="6543" instrument_node="">A</span><span class="paren" data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">)</span></span></span><span data-dcnode-id="6539" instrument_node=""> A request to amend or supplement an asylum application that causes a delay in its adjudication or in proceedings as described in </span><a class="cfr external" data-dcnode-id="6537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4%23p-208.4%28c%29"><span data-dcnode-id="6538" instrument_node="">8 CFR 208.4(c)</span></a><span data-dcnode-id="6536" instrument_node="">; </span></p><span data-dcnode-id="6534" instrument_node="">
</span></div><span data-dcnode-id="6532" instrument_node="">

</span></div><span data-dcnode-id="6517" instrument_node="">

</span><p class="indent-4" data-dcnode-id="6505" data-title="208.7(a)(1)(iv)(C)"><span class="paragraph-hierarchy" data-dcnode-id="6510"><span class="paren" data-dcnode-id="6514"><span data-dcnode-id="6515" instrument_node="">(</span></span><span data-dcnode-id="6513" instrument_node="">C</span><span class="paren" data-dcnode-id="6511"><span data-dcnode-id="6512" instrument_node="">)</span></span></span><span data-dcnode-id="6509" instrument_node=""> A request for extension to submit additional evidence fewer than 14-days prior to the interview date as described by </span><a class="cfr external" data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28e%29"><span data-dcnode-id="6508" instrument_node="">8 CFR 208.9(e)</span></a><span data-dcnode-id="6506" instrument_node="">; </span></p><span data-dcnode-id="6504" instrument_node="">
</span></div><span data-dcnode-id="6502" instrument_node="">

</span><p class="indent-4" data-dcnode-id="6490" data-title="208.7(a)(1)(iv)(D)"><span class="paragraph-hierarchy" data-dcnode-id="6495"><span class="paren" data-dcnode-id="6499"><span data-dcnode-id="6500" instrument_node="">(</span></span><span data-dcnode-id="6498" instrument_node="">D</span><span class="paren" data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">)</span></span></span><span data-dcnode-id="6494" instrument_node=""> Failure to appear for an asylum interview, unless excused by USCIS as described in </span><a class="cfr external" data-dcnode-id="6492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10%23p-208.10%28b%29%281%29"><span data-dcnode-id="6493" instrument_node="">8 CFR 208.10(b)(1)</span></a><span data-dcnode-id="6491" instrument_node=""> for the failure to appear; </span></p><span data-dcnode-id="6489" instrument_node="">
</span></div><span data-dcnode-id="6487" instrument_node="">
</span><div data-dcnode-id="6476" id="p-208.7(a)(1)(iv)(E)"><span data-dcnode-id="6486" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6478" data-title="208.7(a)(1)(iv)(E)"><span class="paragraph-hierarchy" data-dcnode-id="6480"><span class="paren" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">(</span></span><span data-dcnode-id="6483" instrument_node="">E</span><span class="paren" data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">)</span></span></span><span data-dcnode-id="6479" instrument_node=""> Failure to appear for scheduled biometrics collection on the asylum application; </span></p><span data-dcnode-id="6477" instrument_node="">
</span></div><span data-dcnode-id="6475" instrument_node="">
</span><div data-dcnode-id="6464" id="p-208.7(a)(1)(iv)(F)"><span data-dcnode-id="6474" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6466" data-title="208.7(a)(1)(iv)(F)"><span class="paragraph-hierarchy" data-dcnode-id="6468"><span class="paren" data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">(</span></span><span data-dcnode-id="6471" instrument_node="">F</span><span class="paren" data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">)</span></span></span><span data-dcnode-id="6467" instrument_node=""> A request to reschedule an interview for a later date; </span></p><span data-dcnode-id="6465" instrument_node="">
</span></div><span data-dcnode-id="6463" instrument_node="">
</span><div data-dcnode-id="6452" id="p-208.7(a)(1)(iv)(G)"><span data-dcnode-id="6462" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6454" data-title="208.7(a)(1)(iv)(G)"><span class="paragraph-hierarchy" data-dcnode-id="6456"><span class="paren" data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">(</span></span><span data-dcnode-id="6459" instrument_node="">G</span><span class="paren" data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">)</span></span></span><span data-dcnode-id="6455" instrument_node=""> A request to transfer a case to a new asylum office or interview location, including when the transfer is based on a new address; </span></p><span data-dcnode-id="6453" instrument_node="">
</span></div><span data-dcnode-id="6451" instrument_node="">
</span><div data-dcnode-id="6440" id="p-208.7(a)(1)(iv)(H)"><span data-dcnode-id="6450" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6442" data-title="208.7(a)(1)(iv)(H)"><span class="paragraph-hierarchy" data-dcnode-id="6444"><span class="paren" data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">(</span></span><span data-dcnode-id="6447" instrument_node="">H</span><span class="paren" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">)</span></span></span><span data-dcnode-id="6443" instrument_node=""> A request to provide additional evidence for an interview; </span></p><span data-dcnode-id="6441" instrument_node="">
</span></div><span data-dcnode-id="6439" instrument_node="">
</span><div data-dcnode-id="6428" id="p-208.7(a)(1)(iv)(I)"><span data-dcnode-id="6438" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6430" data-title="208.7(a)(1)(iv)(I)"><span class="paragraph-hierarchy" data-dcnode-id="6432"><span class="paren" data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">(</span></span><span data-dcnode-id="6435" instrument_node="">I</span><span class="paren" data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">)</span></span></span><span data-dcnode-id="6431" instrument_node=""> Failure to provide a competent interpreter at an interview; and </span></p><span data-dcnode-id="6429" instrument_node="">
</span></div><span data-dcnode-id="6427" instrument_node="">
</span><div data-dcnode-id="6416" id="p-208.7(a)(1)(iv)(J)"><span data-dcnode-id="6426" instrument_node="">
</span><p class="indent-4" data-dcnode-id="6418" data-title="208.7(a)(1)(iv)(J)"><span class="paragraph-hierarchy" data-dcnode-id="6420"><span class="paren" data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">(</span></span><span data-dcnode-id="6423" instrument_node="">J</span><span class="paren" data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">)</span></span></span><span data-dcnode-id="6419" instrument_node=""> Failure to comply with any other request needed to determine asylum eligibility. </span></p><span data-dcnode-id="6417" instrument_node="">
</span></div><span data-dcnode-id="6415" instrument_node="">
</span></div><span data-dcnode-id="6413" instrument_node="">

</span><div data-dcnode-id="6314" id="p-208.7(b)"><span data-dcnode-id="6408" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6397" data-title="208.7(b)"><span class="paragraph-hierarchy" data-dcnode-id="6402"><span class="paren" data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">(</span></span><span data-dcnode-id="6405" instrument_node="">b</span><span class="paren" data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">)</span></span></span><span data-dcnode-id="6401" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">Renewal and termination</span></em><span data-dcnode-id="6398" instrument_node="">  - </span></p><span data-dcnode-id="6396" instrument_node="">
</span><div data-dcnode-id="6337" id="p-208.7(b)(1)"><span data-dcnode-id="6395" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6378" data-title="208.7(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6389"><span class="paren" data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">(</span></span><span data-dcnode-id="6392" instrument_node="">1</span><span class="paren" data-dcnode-id="6390"><span data-dcnode-id="6391" instrument_node="">)</span></span></span><span data-dcnode-id="6388" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">Renewals.</span></em><span data-dcnode-id="6385" instrument_node="">  USCIS may renew employment authorization under </span><a class="cfr external" data-dcnode-id="6383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6384" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6382" instrument_node=""> in increments determined by USCIS in its discretion, but not to exceed increments of two years. Employment authorization is not permitted during any period of judicial review, but may be requested if a Federal court remands the case to the Board of Immigration Appeals. For employment authorization to be renewed under this section, the alien must request employment authorization on the form and in the manner prescribed by USCIS and according to the form instructions. USCIS will require that an alien establish that he or she has continued to pursue an asylum application before USCIS, an immigration judge, or the Board of Immigration Appeals and that he or she continues to meet the eligibility criteria for employment authorization set forth in </span><a class="cfr external" data-dcnode-id="6380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7%23p-208.7%28a%29"><span data-dcnode-id="6381" instrument_node="">8 CFR 208.7(a)</span></a><span data-dcnode-id="6379" instrument_node="">. For purposes of renewal of employment authorization, pursuit of an asylum application before an immigration judge or the Board of Immigration Appeals is established by submitting a copy of the referral notice or Notice to Appear placing the alien in proceedings, any hearing notices issued by the immigration court, evidence of a timely filed appeal if the alien appealed the denial of the asylum application to the Board of Immigration Appeals, or remand order to the immigration judge or Board of Immigration Appeals. </span></p><span data-dcnode-id="6377" instrument_node="">
</span><div data-dcnode-id="6360" id="p-208.7(b)(1)(i)"><span data-dcnode-id="6376" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6362" data-title="208.7(b)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="6370"><span class="paren" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">(</span></span><span data-dcnode-id="6373" instrument_node="">i</span><span class="paren" data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">)</span></span></span><span data-dcnode-id="6369" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">Referrals to an immigration judge.</span></em><span data-dcnode-id="6366" instrument_node="">  Employment authorization granted after the required 365-day waiting period will continue for the remaining period authorized (unless otherwise terminated or revoked) if the asylum officer refers the alien's asylum application to an immigration judge. In accordance with </span><a class="cfr external" data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7%23p-208.7%28b%29%281%29"><span data-dcnode-id="6365" instrument_node="">8 CFR 208.7(b)(1)</span></a><span data-dcnode-id="6363" instrument_node="">, the alien may be granted renewals of employment authorization while under such review by the immigration judge. </span></p><span data-dcnode-id="6361" instrument_node="">
</span></div><span data-dcnode-id="6359" instrument_node="">
</span><div data-dcnode-id="6339" id="p-208.7(b)(1)(ii)"><span data-dcnode-id="6358" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6341" data-title="208.7(b)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="6352"><span class="paren" data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">(</span></span><span data-dcnode-id="6355" instrument_node="">ii</span><span class="paren" data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">)</span></span></span><span data-dcnode-id="6351" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">Appeals to the Board of Immigration Appeals.</span></em><span data-dcnode-id="6348" instrument_node="">  If the immigration judge denies the alien's asylum application, any remaining period of employment authorization will continue for the period authorized (unless otherwise terminated or revoked) during the period for filing an appeal with the Board of Immigration Appeals under </span><a class="cfr external" data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1003.38%23p-1003.38%28b%29"><span data-dcnode-id="6347" instrument_node="">8 CFR 1003.38(b)</span></a><span data-dcnode-id="6345" instrument_node=""> or, if an appeal is timely filed within such period, during the pendency of the appeal with the Board of Immigration Appeals. In accordance with </span><a class="cfr external" data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7%23p-208.7%28b%29%281%29"><span data-dcnode-id="6344" instrument_node="">8 CFR 208.7(b)(1)</span></a><span data-dcnode-id="6342" instrument_node="">, the alien may be granted renewals of employment authorization during these periods while the appeal is under review by the Board of Immigration Appeals and any remand to the immigration judge. </span></p><span data-dcnode-id="6340" instrument_node="">
</span></div><span data-dcnode-id="6338" instrument_node="">
</span></div><span data-dcnode-id="6336" instrument_node="">
</span><div data-dcnode-id="6316" id="p-208.7(b)(2)"><span data-dcnode-id="6335" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6318" data-title="208.7(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6329"><span class="paren" data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">(</span></span><span data-dcnode-id="6332" instrument_node="">2</span><span class="paren" data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">)</span></span></span><span data-dcnode-id="6328" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">Terminations.</span></em><span data-dcnode-id="6325" instrument_node="">  The alien's employment authorization granted pursuant to </span><a class="cfr external" data-dcnode-id="6323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6324" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6322" instrument_node=""> will automatically terminate effective on the date the asylum officer denies the asylum application, thirty days after an immigration judge denies the asylum application unless timely appealed to the Board of Immigration Appeals, or the Board of Immigration Appeals affirms or upholds a denial, regardless of whether any automatic extension period pursuant to </span><a class="cfr external" data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.13%23p-274a.13%28d%29%283%29"><span data-dcnode-id="6321" instrument_node="">8 CFR 274a.13(d)(3)</span></a><span data-dcnode-id="6319" instrument_node=""> is in place. </span></p><span data-dcnode-id="6317" instrument_node="">
</span></div><span data-dcnode-id="6315" instrument_node="">
</span></div><span data-dcnode-id="6313" instrument_node="">
</span><div data-dcnode-id="6301" id="p-208.7(c)"><p class="indent-1" data-dcnode-id="6302" data-title="208.7(c)"><span class="paragraph-hierarchy" data-dcnode-id="6307"><span class="paren" data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">(</span></span><span data-dcnode-id="6310" instrument_node="">c</span><span class="paren" data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">)</span></span></span><span data-dcnode-id="6306" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">Severability.</span></em><span data-dcnode-id="6303" instrument_node="">  The provisions in this section are intended to be independent severable parts. In the event that any provision in this section is not implemented, DHS intends that the remaining provisions be implemented as an independent rule. </span></p></div><span data-dcnode-id="6300" instrument_node="">
</span><p class="citation" data-dcnode-id="6295"><span data-dcnode-id="6299" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="6297" data-reference="85 FR 38626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-38626"><span data-dcnode-id="6298" instrument_node="">85 FR 38626</span></a><span data-dcnode-id="6296" instrument_node="">, June 26, 2020] </span></p><span data-dcnode-id="6294" instrument_node="">
</span></div><span data-dcnode-id="6292" instrument_node="">
</span><div class="section" data-dcnode-id="6249" id="208.8"><span data-dcnode-id="6291" instrument_node="">
</span><h4 data-dcnode-id="6288"><a class="direct" data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.8"><span data-dcnode-id="6290" instrument_node="">§ 208.8 Limitations on travel outside the United States.</span></a></h4><span data-dcnode-id="6287" instrument_node="">
</span><div data-dcnode-id="6273" id="p-208.8(a)"><span data-dcnode-id="6286" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6275" data-title="208.8(a)"><span class="paragraph-hierarchy" data-dcnode-id="6280"><span class="paren" data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">(</span></span><span data-dcnode-id="6283" instrument_node="">a</span><span class="paren" data-dcnode-id="6281"><span data-dcnode-id="6282" instrument_node="">)</span></span></span><span data-dcnode-id="6279" instrument_node=""> An applicant who leaves the United States without first obtaining advance parole under </span><a class="cfr external" data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-212.5%23p-212.5%28f%29"><span data-dcnode-id="6278" instrument_node="">§ 212.5(f) of this chapter</span></a><span data-dcnode-id="6276" instrument_node=""> shall be presumed to have abandoned his or her application under this section. </span></p><span data-dcnode-id="6274" instrument_node="">
</span></div><span data-dcnode-id="6272" instrument_node="">
</span><div data-dcnode-id="6260" id="p-208.8(b)"><p class="indent-1" data-dcnode-id="6261" data-title="208.8(b)"><span class="paragraph-hierarchy" data-dcnode-id="6266"><span class="paren" data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">(</span></span><span data-dcnode-id="6269" instrument_node="">b</span><span class="paren" data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">)</span></span></span><span data-dcnode-id="6265" instrument_node=""> An applicant who leaves the United States pursuant to advance parole under </span><a class="cfr external" data-dcnode-id="6263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-212.5%23p-212.5%28f%29"><span data-dcnode-id="6264" instrument_node="">§ 212.5(f) of this chapter</span></a><span data-dcnode-id="6262" instrument_node=""> and returns to the country of claimed persecution shall be presumed to have abandoned his or her application, unless the applicant is able to establish compelling reasons for such return. </span></p></div><span data-dcnode-id="6259" instrument_node="">
</span><p class="citation" data-dcnode-id="6251"><span data-dcnode-id="6258" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="6256" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="6257" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="6255" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="6253" data-reference="65 FR 82255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-82255"><span data-dcnode-id="6254" instrument_node="">65 FR 82255</span></a><span data-dcnode-id="6252" instrument_node="">, Dec. 28, 2000] </span></p><span data-dcnode-id="6250" instrument_node="">
</span></div><span data-dcnode-id="6248" instrument_node="">
</span><div class="section" data-dcnode-id="5929" id="208.9"><span data-dcnode-id="6247" instrument_node="">
</span><h4 data-dcnode-id="6244"><a class="direct" data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9"><span data-dcnode-id="6246" instrument_node="">§ 208.9 Procedure for interview before an asylum officer.</span></a></h4><span data-dcnode-id="6243" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="6229"><div class="box box-enhanced no-footer" data-dcnode-id="6230"><span data-dcnode-id="6242" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="6238"><div class="seal-content" data-dcnode-id="6239"><h6 data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="6237" instrument_node="">
</span><div class="content-block" data-dcnode-id="6232"><span data-dcnode-id="6236" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="6234" data-reference="87 FR 18216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18216"><span data-dcnode-id="6235" instrument_node="">87 FR 18216</span></a><span data-dcnode-id="6233" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="6231" instrument_node="">
</span></div></div><span data-dcnode-id="6228" instrument_node="">
</span><div data-dcnode-id="6214" id="p-208.9(a)"><span data-dcnode-id="6227" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6216" data-title="208.9(a)"><span class="paragraph-hierarchy" data-dcnode-id="6221"><span class="paren" data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">(</span></span><span data-dcnode-id="6224" instrument_node="">a</span><span class="paren" data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">)</span></span></span><span data-dcnode-id="6220" instrument_node=""> The Service shall adjudicate the claim of each asylum applicant whose application is complete within the meaning of </span><a class="cfr external" data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.3%23p-208.3%28c%29%283%29"><span data-dcnode-id="6219" instrument_node="">§ 208.3(c)(3)</span></a><span data-dcnode-id="6217" instrument_node=""> and is within the jurisdiction of the Service. </span></p><span data-dcnode-id="6215" instrument_node="">
</span></div><span data-dcnode-id="6213" instrument_node="">
</span><div data-dcnode-id="6202" id="p-208.9(b)"><span data-dcnode-id="6212" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6204" data-title="208.9(b)"><span class="paragraph-hierarchy" data-dcnode-id="6206"><span class="paren" data-dcnode-id="6210"><span data-dcnode-id="6211" instrument_node="">(</span></span><span data-dcnode-id="6209" instrument_node="">b</span><span class="paren" data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">)</span></span></span><span data-dcnode-id="6205" instrument_node=""> The asylum officer shall conduct the interview in a nonadversarial manner and, except at the request of the applicant, separate and apart from the general public. The purpose of the interview shall be to elicit all relevant and useful information bearing on the applicant's eligibility for asylum. At the time of the interview, the applicant must provide complete information regarding his or her identity, including name, date and place of birth, and nationality, and may be required to register this identity. The applicant may have counsel or a representative present, may present witnesses, and may submit affidavits of witnesses and other evidence. </span></p><span data-dcnode-id="6203" instrument_node="">
</span></div><span data-dcnode-id="6201" instrument_node="">
</span><div data-dcnode-id="6190" id="p-208.9(c)"><span data-dcnode-id="6200" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6192" data-title="208.9(c)"><span class="paragraph-hierarchy" data-dcnode-id="6194"><span class="paren" data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">(</span></span><span data-dcnode-id="6197" instrument_node="">c</span><span class="paren" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">)</span></span></span><span data-dcnode-id="6193" instrument_node=""> The asylum officer shall have authority to administer oaths, verify the identity of the applicant (including through the use of electronic means), verify the identity of any interpreter, present and receive evidence, and question the applicant and any witnesses. </span></p><span data-dcnode-id="6191" instrument_node="">
</span></div><span data-dcnode-id="6189" instrument_node="">
</span><div data-dcnode-id="6148" id="p-208.9(d)"><span data-dcnode-id="6188" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6177" data-title="208.9(d)"><span class="paragraph-hierarchy" data-dcnode-id="6182"><span class="paren" data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">(</span></span><span data-dcnode-id="6185" instrument_node="">d</span><span class="paren" data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">)</span></span></span><span data-dcnode-id="6181" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">Completion of the interview.</span></em><span data-dcnode-id="6178" instrument_node="">  Upon completion of the interview: </span></p><span data-dcnode-id="6176" instrument_node="">
</span><div data-dcnode-id="6165" id="p-208.9(d)(1)"><span data-dcnode-id="6175" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6167" data-title="208.9(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6169"><span class="paren" data-dcnode-id="6173"><span data-dcnode-id="6174" instrument_node="">(</span></span><span data-dcnode-id="6172" instrument_node="">1</span><span class="paren" data-dcnode-id="6170"><span data-dcnode-id="6171" instrument_node="">)</span></span></span><span data-dcnode-id="6168" instrument_node=""> The applicant or the applicant's representative will have an opportunity to make a statement or comment on the evidence presented. The asylum officer may, in his or her discretion, limit the length of such statement or comment and may require its submission in writing. </span></p><span data-dcnode-id="6166" instrument_node="">
</span></div><span data-dcnode-id="6164" instrument_node="">
</span><div data-dcnode-id="6150" id="p-208.9(d)(2)"><span data-dcnode-id="6163" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6152" data-title="208.9(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6157"><span class="paren" data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">(</span></span><span data-dcnode-id="6160" instrument_node="">2</span><span class="paren" data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">)</span></span></span><span data-dcnode-id="6156" instrument_node=""> USCIS will inform the applicant that he or she must appear in person to receive and to acknowledge receipt of the decision of the asylum officer and any other accompanying material at a time and place designated by the asylum officer, except as otherwise provided by the asylum officer. An applicant's failure to appear to receive and acknowledge receipt of the decision will be treated as delay caused by the applicant for purposes of </span><a class="cfr external" data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="6155" instrument_node="">8 CFR 208.7</span></a><span data-dcnode-id="6153" instrument_node="">. </span></p><span data-dcnode-id="6151" instrument_node="">
</span></div><span data-dcnode-id="6149" instrument_node="">
</span></div><span data-dcnode-id="6147" instrument_node="">
</span><div data-dcnode-id="6130" id="p-208.9(e)"><span data-dcnode-id="6146" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6132" data-title="208.9(e)"><span class="paragraph-hierarchy" data-dcnode-id="6140"><span class="paren" data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">(</span></span><span data-dcnode-id="6143" instrument_node="">e</span><span class="paren" data-dcnode-id="6141"><span data-dcnode-id="6142" instrument_node="">)</span></span></span><span data-dcnode-id="6139" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">Extensions.</span></em><span data-dcnode-id="6136" instrument_node="">  The asylum officer will consider evidence submitted by the applicant together with his or her asylum application. The applicant must submit any documentary evidence at least 14 calendar days in advance of the interview date. As a matter of discretion, the asylum officer may consider evidence submitted within the 14-day period prior to the interview date or may grant the applicant a brief extension of time during which the applicant may submit additional evidence. Any such extension will be treated as a delay caused by the applicant for purposes of </span><a class="cfr external" data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="6135" instrument_node="">§ 208.7</span></a><span data-dcnode-id="6133" instrument_node="">. </span></p><span data-dcnode-id="6131" instrument_node="">
</span></div><span data-dcnode-id="6129" instrument_node="">
</span><div data-dcnode-id="6118" id="p-208.9(f)"><span data-dcnode-id="6128" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6120" data-title="208.9(f)"><span class="paragraph-hierarchy" data-dcnode-id="6122"><span class="paren" data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">(</span></span><span data-dcnode-id="6125" instrument_node="">f</span><span class="paren" data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">)</span></span></span><span data-dcnode-id="6121" instrument_node=""> The asylum application, all supporting information provided by the applicant, any comments submitted by the Department of State or by the Service, and any other information specific to the applicant's case and considered by the asylum officer shall comprise the record. </span></p><span data-dcnode-id="6119" instrument_node="">
</span></div><span data-dcnode-id="6117" instrument_node="">
</span><div data-dcnode-id="6103" id="p-208.9(g)"><span data-dcnode-id="6116" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6105" data-title="208.9(g)"><span class="paragraph-hierarchy" data-dcnode-id="6110"><span class="paren" data-dcnode-id="6114"><span data-dcnode-id="6115" instrument_node="">(</span></span><span data-dcnode-id="6113" instrument_node="">g</span><span class="paren" data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">)</span></span></span><span data-dcnode-id="6109" instrument_node=""> An applicant unable to proceed with the interview in English must provide, at no expense to the Service, a competent interpreter fluent in both English and the applicant's native language or any other language in which the applicant is fluent. The interpreter must be at least 18 years of age. Neither the applicant's attorney or representative of record, a witness testifying on the applicant's behalf, nor a representative or employee of the applicant's country of nationality, or if stateless, country of last habitual residence, may serve as the applicant's interpreter. Failure without good cause to comply with this paragraph may be considered a failure to appear for the interview for purposes of </span><a class="cfr external" data-dcnode-id="6107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10"><span data-dcnode-id="6108" instrument_node="">§ 208.10</span></a><span data-dcnode-id="6106" instrument_node="">. </span></p><span data-dcnode-id="6104" instrument_node="">
</span></div><span data-dcnode-id="6102" instrument_node="">
</span><div data-dcnode-id="6000" id="p-208.9(h)"><span data-dcnode-id="6101" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6090" data-title="208.9(h)"><span class="paragraph-hierarchy" data-dcnode-id="6095"><span class="paren" data-dcnode-id="6099"><span data-dcnode-id="6100" instrument_node="">(</span></span><span data-dcnode-id="6098" instrument_node="">h</span><span class="paren" data-dcnode-id="6096"><span data-dcnode-id="6097" instrument_node="">)</span></span></span><span data-dcnode-id="6094" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">Asylum applicant interpreters.</span></em><span data-dcnode-id="6091" instrument_node="">  For asylum interviews conducted between March 16, 2022, through March 16, 2023: </span></p><span data-dcnode-id="6089" instrument_node="">
</span><div data-dcnode-id="6012" id="p-208.9(h)(1)"><span data-dcnode-id="6088" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6080" data-title="208.9(h)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6082"><span class="paren" data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">(</span></span><span data-dcnode-id="6085" instrument_node="">1</span><span class="paren" data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">)</span></span></span><span data-dcnode-id="6081" instrument_node=""> Asylum applicants unable to proceed with the interview in English must use USCIS's telephonic interpreter services, so long as the applicant is fluent in one of the following languages: Akan, Albanian, Amharic, Arabic, Armenian, Azerbaijani, Bengali, Burmese, Cantonese, Creole/Haitian Creole, Farsi-Afghani/Dari, Farsi-Iranian, Foo Chow/Fuzhou, French, Georgian, Gujarati, Hindi, Hmong, Hungarian, Indonesia/Bahasa, Konjobal, Korean, Kurdish, Lingala, Mam, Mandarin, Nepali, Pashto/Pushtu, Portuguese, Punjabi, Quiche/K'iche, Romanian, Russian, Serbian, Sinhalese, Somali, Spanish, Swahili, Tagalog, Tamil, Tigrinya, Turkish, Twi, Ukrainian, Urdu, Uzbek, or Vietnamese. </span></p><span data-dcnode-id="6079" instrument_node="">
</span><div data-dcnode-id="6065" id="p-208.9(h)(1)(i)"><span data-dcnode-id="6078" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6067" data-title="208.9(h)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="6072"><span class="paren" data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">(</span></span><span data-dcnode-id="6075" instrument_node="">i</span><span class="paren" data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">)</span></span></span><span data-dcnode-id="6071" instrument_node=""> If a USCIS interpreter is unavailable, USCIS will either reschedule the interview and attribute the interview delay to USCIS for the purposes of employment authorization pursuant to </span><a class="cfr external" data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="6070" instrument_node="">§ 208.7</span></a><span data-dcnode-id="6068" instrument_node="">, or USCIS may, in its discretion, allow the applicant to provide an interpreter. </span></p><span data-dcnode-id="6066" instrument_node="">
</span></div><span data-dcnode-id="6064" instrument_node="">
</span><div data-dcnode-id="6041" id="p-208.9(h)(1)(ii)"><span data-dcnode-id="6063" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6043" data-title="208.9(h)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="6057"><span class="paren" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">(</span></span><span data-dcnode-id="6060" instrument_node="">ii</span><span class="paren" data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">)</span></span></span><span data-dcnode-id="6056" instrument_node=""> Except as provided in </span><a class="cfr external" data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29%28iii%29"><span data-dcnode-id="6055" instrument_node="">paragraph (h)(1)(iii)</span></a><span data-dcnode-id="6053" instrument_node=""> of this section, if an applicant is fluent in a language listed in this </span><a class="cfr external" data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6052" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6050" instrument_node=""> but refuses to proceed with the USCIS interpreter in order to use his or her own interpreter, USCIS will consider this a failure without good cause to comply with this </span><a class="cfr external" data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6049" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6047" instrument_node="">. The applicant will be considered to have failed to appear for the interview for the purposes of </span><a class="cfr external" data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10"><span data-dcnode-id="6046" instrument_node="">8 CFR 208.10</span></a><span data-dcnode-id="6044" instrument_node="">. </span></p><span data-dcnode-id="6042" instrument_node="">
</span></div><span data-dcnode-id="6040" instrument_node="">
</span><div data-dcnode-id="6014" id="p-208.9(h)(1)(iii)"><span data-dcnode-id="6039" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6016" data-title="208.9(h)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="6033"><span class="paren" data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">(</span></span><span data-dcnode-id="6036" instrument_node="">iii</span><span class="paren" data-dcnode-id="6034"><span data-dcnode-id="6035" instrument_node="">)</span></span></span><span data-dcnode-id="6032" instrument_node=""> If the applicant elects to proceed in a language that is not listed in this </span><a class="cfr external" data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6031" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6029" instrument_node="">, the applicant must provide a competent interpreter fluent in both English and the applicant's native language or any other language in which the applicant is fluent. If an applicant is unable to provide an interpreter fluent in English and the elected language not listed in this </span><a class="cfr external" data-dcnode-id="6027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6028" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6026" instrument_node="">, the applicant may provide an interpreter fluent in the elected language and one found in this </span><a class="cfr external" data-dcnode-id="6024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6025" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6023" instrument_node="">. USCIS will provide a relay interpreter to interpret between the language listed in this </span><a class="cfr external" data-dcnode-id="6021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29%281%29"><span data-dcnode-id="6022" instrument_node="">paragraph (h)(1)</span></a><span data-dcnode-id="6020" instrument_node=""> and English. The interpreter must be at least 18 years of age. Neither the applicant's attorney or representative of record, a witness testifying on the applicant's behalf, nor a representative or employee of the applicant's country of nationality, or if stateless, country of last habitual residence, may serve as the applicant's interpreter. Failure without good cause to comply with this paragraph may be considered a failure to appear for the interview for purposes of </span><a class="cfr external" data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10"><span data-dcnode-id="6019" instrument_node="">8 CFR 208.10</span></a><span data-dcnode-id="6017" instrument_node="">. </span></p><span data-dcnode-id="6015" instrument_node="">
</span></div><span data-dcnode-id="6013" instrument_node="">
</span></div><span data-dcnode-id="6011" instrument_node="">
</span><div data-dcnode-id="6002" id="p-208.9(h)(2)"><p class="indent-2" data-dcnode-id="6003" data-title="208.9(h)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6005"><span class="paren" data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">(</span></span><span data-dcnode-id="6008" instrument_node="">2</span><span class="paren" data-dcnode-id="6006"><span data-dcnode-id="6007" instrument_node="">)</span></span></span><span data-dcnode-id="6004" instrument_node=""> [Reserved] </span></p></div><span data-dcnode-id="6001" instrument_node="">
</span></div><span data-dcnode-id="5999" instrument_node="">
</span><p class="citation" data-dcnode-id="5973"><span data-dcnode-id="5998" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="5996" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="5997" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="5995" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="5993" data-reference="65 FR 76133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76133"><span data-dcnode-id="5994" instrument_node="">65 FR 76133</span></a><span data-dcnode-id="5992" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="5990" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="5991" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="5989" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="5987" data-reference="85 FR 38627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-38627"><span data-dcnode-id="5988" instrument_node="">85 FR 38627</span></a><span data-dcnode-id="5986" instrument_node="">, June 26, 2020; </span><a class="fr-reference" data-dcnode-id="5984" data-reference="85 FR 59660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-59660"><span data-dcnode-id="5985" instrument_node="">85 FR 59660</span></a><span data-dcnode-id="5983" instrument_node="">, Sept. 23, 2020; </span><a class="fr-reference" data-dcnode-id="5981" data-reference="86 FR 15076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-15076"><span data-dcnode-id="5982" instrument_node="">86 FR 15076</span></a><span data-dcnode-id="5980" instrument_node="">, Mar. 22, 2021; </span><a class="fr-reference" data-dcnode-id="5978" data-reference="86 FR 51788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-51788"><span data-dcnode-id="5979" instrument_node="">86 FR 51788</span></a><span data-dcnode-id="5977" instrument_node="">, Sept. 17, 2021; </span><a class="fr-reference" data-dcnode-id="5975" data-reference="87 FR 14763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-14763"><span data-dcnode-id="5976" instrument_node="">87 FR 14763</span></a><span data-dcnode-id="5974" instrument_node="">, Mar. 16, 2022] </span></p><span data-dcnode-id="5972" instrument_node="">

</span><h4 class="inline-header" data-dcnode-id="5963"><span data-dcnode-id="5964" instrument_node="">Effective Date Note:</span></h4><span data-dcnode-id="5962" instrument_node="">
</span><p class="inline-paragraph" data-dcnode-id="5936"><span data-dcnode-id="5961" instrument_node="">At </span><a class="fr-reference" data-dcnode-id="5959" data-reference="85 FR 59660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-59660"><span data-dcnode-id="5960" instrument_node="">85 FR 59660</span></a><span data-dcnode-id="5958" instrument_node="">, Sept. 23, 2020, </span><a class="cfr external" data-dcnode-id="5956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9"><span data-dcnode-id="5957" instrument_node="">§ 208.9</span></a><span data-dcnode-id="5955" instrument_node=""> was amended by adding paragraph (h), effective Sept. 23, 2020, through Mar. 22, 2021. At </span><a class="fr-reference" data-dcnode-id="5953" data-reference="86 FR 15076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-15076"><span data-dcnode-id="5954" instrument_node="">86 FR 15076</span></a><span data-dcnode-id="5952" instrument_node="">, Mar. 22, 2021, the expiration date for </span><a class="cfr external" data-dcnode-id="5950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29"><span data-dcnode-id="5951" instrument_node="">§ 208.9(h)</span></a><span data-dcnode-id="5949" instrument_node=""> was extended to Sept. 20, 2021. At </span><a class="fr-reference" data-dcnode-id="5947" data-reference="86 FR 51788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-51788"><span data-dcnode-id="5948" instrument_node="">86 FR 51788</span></a><span data-dcnode-id="5946" instrument_node="">, Sept. 17, 2021, the paragraph was amended and the expiration date for </span><a class="cfr external" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29"><span data-dcnode-id="5945" instrument_node="">§ 208.9(h)</span></a><span data-dcnode-id="5943" instrument_node=""> was further extended to Mar. 16, 2022. At </span><a class="fr-reference" data-dcnode-id="5941" data-reference="87 FR 14763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-14763"><span data-dcnode-id="5942" instrument_node="">87 FR 14763</span></a><span data-dcnode-id="5940" instrument_node="">, Mar. 16, 2022, the effective date for </span><a class="cfr external" data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28h%29"><span data-dcnode-id="5939" instrument_node="">§ 208.9(h)</span></a><span data-dcnode-id="5937" instrument_node=""> was further extended from Mar. 16, 2022, through Mar. 16, 2023.</span></p><span data-dcnode-id="5935" instrument_node="">
</span></div><span data-dcnode-id="5933" instrument_node="">
</span></div></div><span data-dcnode-id="5930" instrument_node="">
</span></div><span data-dcnode-id="5928" instrument_node="">
</span><div class="section" data-dcnode-id="5777" id="208.10"><span data-dcnode-id="5927" instrument_node="">
</span><h4 data-dcnode-id="5924"><a class="direct" data-dcnode-id="5925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10"><span data-dcnode-id="5926" instrument_node="">§ 208.10 Failure to appear for an interview before an asylum officer or for a biometric services appointment for the asylum application.</span></a></h4><span data-dcnode-id="5923" instrument_node="">
</span><div data-dcnode-id="5831" id="p-208.10(a)"><span data-dcnode-id="5922" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5911" data-title="208.10(a)"><span class="paragraph-hierarchy" data-dcnode-id="5916"><span class="paren" data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">(</span></span><span data-dcnode-id="5919" instrument_node="">a</span><span class="paren" data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">)</span></span></span><span data-dcnode-id="5915" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">Failure to appear for asylum interview or for a biometric services appointment.</span></em><span data-dcnode-id="5912" instrument_node=""> </span></p><span data-dcnode-id="5910" instrument_node="">
</span><div data-dcnode-id="5851" id="p-208.10(a)(1)"><span data-dcnode-id="5909" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5901" data-title="208.10(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="5903"><span class="paren" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">(</span></span><span data-dcnode-id="5906" instrument_node="">1</span><span class="paren" data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">)</span></span></span><span data-dcnode-id="5902" instrument_node=""> The failure to appear for an interview or biometric services appointment may result in: </span></p><span data-dcnode-id="5900" instrument_node="">
</span><div data-dcnode-id="5889" id="p-208.10(a)(1)(i)"><span data-dcnode-id="5899" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5891" data-title="208.10(a)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5893"><span class="paren" data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">(</span></span><span data-dcnode-id="5896" instrument_node="">i</span><span class="paren" data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">)</span></span></span><span data-dcnode-id="5892" instrument_node=""> Waiver of the right to an interview or adjudication by an asylum officer; </span></p><span data-dcnode-id="5890" instrument_node="">
</span></div><span data-dcnode-id="5888" instrument_node="">
</span><div data-dcnode-id="5877" id="p-208.10(a)(1)(ii)"><span data-dcnode-id="5887" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5879" data-title="208.10(a)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5881"><span class="paren" data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">(</span></span><span data-dcnode-id="5884" instrument_node="">ii</span><span class="paren" data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">)</span></span></span><span data-dcnode-id="5880" instrument_node=""> Dismissal of the application for asylum; </span></p><span data-dcnode-id="5878" instrument_node="">
</span></div><span data-dcnode-id="5876" instrument_node="">
</span><div data-dcnode-id="5865" id="p-208.10(a)(1)(iii)"><span data-dcnode-id="5875" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5867" data-title="208.10(a)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="5869"><span class="paren" data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">(</span></span><span data-dcnode-id="5872" instrument_node="">iii</span><span class="paren" data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">)</span></span></span><span data-dcnode-id="5868" instrument_node=""> Referral of the applicant to the immigration court; or, </span></p><span data-dcnode-id="5866" instrument_node="">
</span></div><span data-dcnode-id="5864" instrument_node="">
</span><div data-dcnode-id="5853" id="p-208.10(a)(1)(iv)"><span data-dcnode-id="5863" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5855" data-title="208.10(a)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="5857"><span class="paren" data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">(</span></span><span data-dcnode-id="5860" instrument_node="">iv</span><span class="paren" data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">)</span></span></span><span data-dcnode-id="5856" instrument_node=""> Denial of employment authorization. </span></p><span data-dcnode-id="5854" instrument_node="">
</span></div><span data-dcnode-id="5852" instrument_node="">
</span></div><span data-dcnode-id="5850" instrument_node="">
</span><div data-dcnode-id="5833" id="p-208.10(a)(2)"><span data-dcnode-id="5849" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5835" data-title="208.10(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="5843"><span class="paren" data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">(</span></span><span data-dcnode-id="5846" instrument_node="">2</span><span class="paren" data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">)</span></span></span><span data-dcnode-id="5842" instrument_node=""> There is no requirement for USCIS to send a notice to an applicant that he or she failed to appear for his or her asylum interview or biometrics services appointment prior to issuing a decision on the application. Any rescheduling request for the asylum interview that has not yet been fulfilled on the date the application for employment authorization is filed under </span><a class="cfr external" data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="5841" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="5839" instrument_node=""> will be treated as an applicant-caused delay for purposes of </span><a class="cfr external" data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="5838" instrument_node="">8 CFR 208.7</span></a><span data-dcnode-id="5836" instrument_node="">. </span></p><span data-dcnode-id="5834" instrument_node="">
</span></div><span data-dcnode-id="5832" instrument_node="">
</span></div><span data-dcnode-id="5830" instrument_node="">
</span><div data-dcnode-id="5785" id="p-208.10(b)"><span data-dcnode-id="5829" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5818" data-title="208.10(b)"><span class="paragraph-hierarchy" data-dcnode-id="5823"><span class="paren" data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">(</span></span><span data-dcnode-id="5826" instrument_node="">b</span><span class="paren" data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">)</span></span></span><span data-dcnode-id="5822" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">Rescheduling missed appointments.</span></em><span data-dcnode-id="5819" instrument_node="">  USCIS, in its sole discretion, may excuse the failure to appear for an interview or biometrics services appointment and reschedule the missed appointment as follows: </span></p><span data-dcnode-id="5817" instrument_node="">
</span><div data-dcnode-id="5803" id="p-208.10(b)(1)"><span data-dcnode-id="5816" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5805" data-title="208.10(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="5810"><span class="paren" data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">(</span></span><span data-dcnode-id="5813" instrument_node="">1</span><span class="paren" data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">)</span></span></span><span data-dcnode-id="5809" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">Asylum Interview.</span></em><span data-dcnode-id="5806" instrument_node="">  If the applicant demonstrates that he or she was unable to make the appointment due to exceptional circumstances. </span></p><span data-dcnode-id="5804" instrument_node="">
</span></div><span data-dcnode-id="5802" instrument_node="">
</span><div data-dcnode-id="5787" id="p-208.10(b)(2)"><p class="indent-2" data-dcnode-id="5788" data-title="208.10(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="5796"><span class="paren" data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">(</span></span><span data-dcnode-id="5799" instrument_node="">2</span><span class="paren" data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">)</span></span></span><span data-dcnode-id="5795" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">Biometrics services appointment.</span></em><span data-dcnode-id="5792" instrument_node="">  USCIS may reschedule the biometrics services appointment as provided in </span><a class="cfr external" data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-103"><span data-dcnode-id="5791" instrument_node="">8 CFR part 103</span></a><span data-dcnode-id="5789" instrument_node="">. </span></p></div><span data-dcnode-id="5786" instrument_node="">
</span></div><span data-dcnode-id="5784" instrument_node="">
