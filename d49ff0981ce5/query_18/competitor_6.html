</span><p class="indent-1" data-dcnode-id="7669" data-title="208.4(a)"><span class="paragraph-hierarchy" data-dcnode-id="7677"><span class="paren" data-dcnode-id="7681"><span data-dcnode-id="7682" instrument_node="">(</span></span><span data-dcnode-id="7680" instrument_node="">a</span><span class="paren" data-dcnode-id="7678"><span data-dcnode-id="7679" instrument_node="">)</span></span></span><span data-dcnode-id="7676" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7674"><span data-dcnode-id="7675" instrument_node="">Prohibitions on filing.</span></em><span data-dcnode-id="7673" instrument_node="">  Section 208(a)(2) of the Act prohibits certain aliens from filing for asylum on or after April 1, 1997, unless the alien can demonstrate to the satisfaction of the Attorney General that one of the exceptions in section 208(a)(2)(D) of the Act applies. Such prohibition applies only to asylum applications under section 208 of the Act and not to applications for withholding of removal under </span><a class="cfr external" data-dcnode-id="7671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16"><span data-dcnode-id="7672" instrument_node="">§ 208.16</span></a><span data-dcnode-id="7670" instrument_node="">. If an applicant files an asylum application and it appears that one or more of the prohibitions contained in section 208(a)(2) of the Act apply, an asylum officer, in an interview, or an immigration judge, in a hearing, shall review the application and give the applicant the opportunity to present any relevant and useful information bearing on any prohibitions on filing to determine if the application should be rejected. For the purpose of making determinations under section 208(a)(2) of the Act, the following rules shall apply: </span></p><span data-dcnode-id="7668" instrument_node="">
</span><div data-dcnode-id="7654" id="p-208.4(a)(1)"><span data-dcnode-id="7667" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7656" data-title="208.4(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="7661"><span class="paren" data-dcnode-id="7665"><span data-dcnode-id="7666" instrument_node="">(</span></span><span data-dcnode-id="7664" instrument_node="">1</span><span class="paren" data-dcnode-id="7662"><span data-dcnode-id="7663" instrument_node="">)</span></span></span><span data-dcnode-id="7660" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">Authority.</span></em><span data-dcnode-id="7657" instrument_node="">  Only an asylum officer, an immigration judge, or the Board of Immigration Appeals is authorized to make determinations regarding the prohibitions contained in section 208(a)(2)(B) or (C) of the Act. </span></p><span data-dcnode-id="7655" instrument_node="">
</span></div><span data-dcnode-id="7653" instrument_node="">
</span><div data-dcnode-id="7585" id="p-208.4(a)(2)"><span data-dcnode-id="7652" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7641" data-title="208.4(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="7646"><span class="paren" data-dcnode-id="7650"><span data-dcnode-id="7651" instrument_node="">(</span></span><span data-dcnode-id="7649" instrument_node="">2</span><span class="paren" data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">)</span></span></span><span data-dcnode-id="7645" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7643"><span data-dcnode-id="7644" instrument_node="">One-year filing deadline.</span></em><span data-dcnode-id="7642" instrument_node=""> </span></p><span data-dcnode-id="7640" instrument_node="">
</span><div data-dcnode-id="7605" id="p-208.4(a)(2)(i)"><span data-dcnode-id="7639" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7631" data-title="208.4(a)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7633"><span class="paren" data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">(</span></span><span data-dcnode-id="7636" instrument_node="">i</span><span class="paren" data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">)</span></span></span><span data-dcnode-id="7632" instrument_node=""> For purposes of section 208(a)(2)(B) of the Act, an applicant has the burden of proving: </span></p><span data-dcnode-id="7630" instrument_node="">
</span><div data-dcnode-id="7619" id="p-208.4(a)(2)(i)(A)"><span data-dcnode-id="7629" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7621" data-title="208.4(a)(2)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="7623"><span class="paren" data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">(</span></span><span data-dcnode-id="7626" instrument_node="">A</span><span class="paren" data-dcnode-id="7624"><span data-dcnode-id="7625" instrument_node="">)</span></span></span><span data-dcnode-id="7622" instrument_node=""> By clear and convincing evidence that the application has been filed within 1 year of the date of the alien's arrival in the United States, or </span></p><span data-dcnode-id="7620" instrument_node="">
</span></div><span data-dcnode-id="7618" instrument_node="">
</span><div data-dcnode-id="7607" id="p-208.4(a)(2)(i)(B)"><span data-dcnode-id="7617" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7609" data-title="208.4(a)(2)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="7611"><span class="paren" data-dcnode-id="7615"><span data-dcnode-id="7616" instrument_node="">(</span></span><span data-dcnode-id="7614" instrument_node="">B</span><span class="paren" data-dcnode-id="7612"><span data-dcnode-id="7613" instrument_node="">)</span></span></span><span data-dcnode-id="7610" instrument_node=""> To the satisfaction of the asylum officer, the immigration judge, or the Board that he or she qualifies for an exception to the 1-year deadline. </span></p><span data-dcnode-id="7608" instrument_node="">
</span></div><span data-dcnode-id="7606" instrument_node="">
</span></div><span data-dcnode-id="7604" instrument_node="">
</span><div data-dcnode-id="7587" id="p-208.4(a)(2)(ii)"><span data-dcnode-id="7603" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7589" data-title="208.4(a)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7597"><span class="paren" data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">(</span></span><span data-dcnode-id="7600" instrument_node="">ii</span><span class="paren" data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">)</span></span></span><span data-dcnode-id="7596" instrument_node=""> The 1-year period shall be calculated from the date of the alien's last arrival in the United States or April 1, 1997, whichever is later. When the last day of the period so computed falls on a Saturday, Sunday, or legal holiday, the period shall run until the end of the next day that is not a Saturday, Sunday, or legal holiday. For the purpose of making determinations under section 208(a)(2)(B) of the Act only, an application is considered to have been filed on the date it is received by the Service, pursuant to </span><a class="cfr external" data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-103.2%23p-103.2%28a%29%287%29"><span data-dcnode-id="7595" instrument_node="">§ 103.2(a)(7) of this chapter</span></a><span data-dcnode-id="7593" instrument_node="">. In a case in which the application has not been received by the Service within 1 year from the applicant's date of entry into the United States, but the applicant provides clear and convincing documentary evidence of mailing the application within the 1-year period, the mailing date shall be considered the filing date. For cases before the Immigration Court in accordance with </span><a class="cfr external" data-dcnode-id="7591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.13"><span data-dcnode-id="7592" instrument_node="">§ 3.13 of this chapter</span></a><span data-dcnode-id="7590" instrument_node="">, the application is considered to have been filed on the date it is received by the Immigration Court. For cases before the Board of Immigration Appeals, the application is considered to have been filed on the date it is received by the Board. In the case of an application that appears to have been filed more than a year after the applicant arrived in the United States, the asylum officer, the immigration judge, or the Board will determine whether the applicant qualifies for an exception to the deadline. For aliens present in or arriving in the Commonwealth of the Northern Mariana Islands, the 1-year period shall be calculated from either January 1, 2030 or the date of the alien's last arrival in the United States (including the Commonwealth of the Northern Mariana Islands), whichever is later. No period of physical presence in the Commonwealth of the Northern Mariana Islands prior to January 1, 2030, shall count toward the 1-year period. After November 28, 2009, any travel to the Commonwealth of the Northern Mariana Islands from any other State shall not re-start the calculation of the 1-year period. </span></p><span data-dcnode-id="7588" instrument_node="">
</span></div><span data-dcnode-id="7586" instrument_node="">
</span></div><span data-dcnode-id="7584" instrument_node="">
</span><div data-dcnode-id="7570" id="p-208.4(a)(3)"><span data-dcnode-id="7583" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7572" data-title="208.4(a)(3)"><span class="paragraph-hierarchy" data-dcnode-id="7577"><span class="paren" data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">(</span></span><span data-dcnode-id="7580" instrument_node="">3</span><span class="paren" data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">)</span></span></span><span data-dcnode-id="7576" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7574"><span data-dcnode-id="7575" instrument_node="">Prior denial of application.</span></em><span data-dcnode-id="7573" instrument_node="">  For purposes of section 208(a)(2)(C) of the Act, an asylum application has not been denied unless denied by an immigration judge or the Board of Immigration Appeals. </span></p><span data-dcnode-id="7571" instrument_node="">
</span></div><span data-dcnode-id="7569" instrument_node="">
</span><div data-dcnode-id="7495" id="p-208.4(a)(4)"><span data-dcnode-id="7568" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7557" data-title="208.4(a)(4)"><span class="paragraph-hierarchy" data-dcnode-id="7562"><span class="paren" data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">(</span></span><span data-dcnode-id="7565" instrument_node="">4</span><span class="paren" data-dcnode-id="7563"><span data-dcnode-id="7564" instrument_node="">)</span></span></span><span data-dcnode-id="7561" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Changed circumstances.</span></em><span data-dcnode-id="7558" instrument_node=""> </span></p><span data-dcnode-id="7556" instrument_node="">
</span><div data-dcnode-id="7509" id="p-208.4(a)(4)(i)"><span data-dcnode-id="7555" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7547" data-title="208.4(a)(4)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7549"><span class="paren" data-dcnode-id="7553"><span data-dcnode-id="7554" instrument_node="">(</span></span><span data-dcnode-id="7552" instrument_node="">i</span><span class="paren" data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">)</span></span></span><span data-dcnode-id="7548" instrument_node=""> The term “changed circumstances” in section 208(a)(2)(D) of the Act shall refer to circumstances materially affecting the applicant's eligibility for asylum. They may include, but are not limited to: </span></p><span data-dcnode-id="7546" instrument_node="">
</span><div data-dcnode-id="7535" id="p-208.4(a)(4)(i)(A)"><span data-dcnode-id="7545" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7537" data-title="208.4(a)(4)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="7539"><span class="paren" data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">(</span></span><span data-dcnode-id="7542" instrument_node="">A</span><span class="paren" data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">)</span></span></span><span data-dcnode-id="7538" instrument_node=""> Changes in conditions in the applicant's country of nationality or, if the applicant is stateless, country of last habitual residence; </span></p><span data-dcnode-id="7536" instrument_node="">
</span></div><span data-dcnode-id="7534" instrument_node="">
</span><div data-dcnode-id="7523" id="p-208.4(a)(4)(i)(B)"><span data-dcnode-id="7533" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7525" data-title="208.4(a)(4)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="7527"><span class="paren" data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">(</span></span><span data-dcnode-id="7530" instrument_node="">B</span><span class="paren" data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">)</span></span></span><span data-dcnode-id="7526" instrument_node=""> Changes in the applicant's circumstances that materially affect the applicant's eligibility for asylum, including changes in applicable U.S. law and activities the applicant becomes involved in outside the country of feared persecution that place the applicant at risk; or </span></p><span data-dcnode-id="7524" instrument_node="">
</span></div><span data-dcnode-id="7522" instrument_node="">
</span><div data-dcnode-id="7511" id="p-208.4(a)(4)(i)(C)"><span data-dcnode-id="7521" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7513" data-title="208.4(a)(4)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="7515"><span class="paren" data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">(</span></span><span data-dcnode-id="7518" instrument_node="">C</span><span class="paren" data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">)</span></span></span><span data-dcnode-id="7514" instrument_node=""> In the case of an alien who had previously been included as a dependent in another alien's pending asylum application, the loss of the spousal or parent-child relationship to the principal applicant through marriage, divorce, death, or attainment of age 21. </span></p><span data-dcnode-id="7512" instrument_node="">
</span></div><span data-dcnode-id="7510" instrument_node="">
</span></div><span data-dcnode-id="7508" instrument_node="">
</span><div data-dcnode-id="7497" id="p-208.4(a)(4)(ii)"><span data-dcnode-id="7507" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7499" data-title="208.4(a)(4)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7501"><span class="paren" data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">(</span></span><span data-dcnode-id="7504" instrument_node="">ii</span><span class="paren" data-dcnode-id="7502"><span data-dcnode-id="7503" instrument_node="">)</span></span></span><span data-dcnode-id="7500" instrument_node=""> The applicant shall file an asylum application within a reasonable period given those “changed circumstances.” If the applicant can establish that he or she did not become aware of the changed circumstances until after they occurred, such delayed awareness shall be taken into account in determining what constitutes a “reasonable period.” </span></p><span data-dcnode-id="7498" instrument_node="">
</span></div><span data-dcnode-id="7496" instrument_node="">
</span></div><span data-dcnode-id="7494" instrument_node="">
</span><div data-dcnode-id="7375" id="p-208.4(a)(5)"><span data-dcnode-id="7493" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7485" data-title="208.4(a)(5)"><span class="paragraph-hierarchy" data-dcnode-id="7487"><span class="paren" data-dcnode-id="7491"><span data-dcnode-id="7492" instrument_node="">(</span></span><span data-dcnode-id="7490" instrument_node="">5</span><span class="paren" data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">)</span></span></span><span data-dcnode-id="7486" instrument_node=""> The term “extraordinary circumstances” in section 208(a)(2)(D) of the Act shall refer to events or factors directly related to the failure to meet the 1-year deadline. Such circumstances may excuse the failure to file within the 1-year period as long as the alien filed the application within a reasonable period given those circumstances. The burden of proof is on the applicant to establish to the satisfaction of the asylum officer, the immigration judge, or the Board of Immigration Appeals that the circumstances were not intentionally created by the alien through his or her own action or inaction, that those circumstances were directly related to the alien's failure to file the application within the 1-year period, and that the delay was reasonable under the circumstances. Those circumstances may include but are not limited to: </span></p><span data-dcnode-id="7484" instrument_node="">
</span><div data-dcnode-id="7473" id="p-208.4(a)(5)(i)"><span data-dcnode-id="7483" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7475" data-title="208.4(a)(5)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7477"><span class="paren" data-dcnode-id="7481"><span data-dcnode-id="7482" instrument_node="">(</span></span><span data-dcnode-id="7480" instrument_node="">i</span><span class="paren" data-dcnode-id="7478"><span data-dcnode-id="7479" instrument_node="">)</span></span></span><span data-dcnode-id="7476" instrument_node=""> Serious illness or mental or physical disability, including any effects of persecution or violent harm suffered in the past, during the 1-year period after arrival; </span></p><span data-dcnode-id="7474" instrument_node="">
</span></div><span data-dcnode-id="7472" instrument_node="">
</span><div data-dcnode-id="7461" id="p-208.4(a)(5)(ii)"><span data-dcnode-id="7471" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7463" data-title="208.4(a)(5)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7465"><span class="paren" data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">(</span></span><span data-dcnode-id="7468" instrument_node="">ii</span><span class="paren" data-dcnode-id="7466"><span data-dcnode-id="7467" instrument_node="">)</span></span></span><span data-dcnode-id="7464" instrument_node=""> Legal disability (e.g., the applicant was an unaccompanied minor or suffered from a mental impairment) during the 1-year period after arrival; </span></p><span data-dcnode-id="7462" instrument_node="">
</span></div><span data-dcnode-id="7460" instrument_node="">
</span><div data-dcnode-id="7413" id="p-208.4(a)(5)(iii)"><span data-dcnode-id="7459" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7451" data-title="208.4(a)(5)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="7453"><span class="paren" data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">(</span></span><span data-dcnode-id="7456" instrument_node="">iii</span><span class="paren" data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">)</span></span></span><span data-dcnode-id="7452" instrument_node=""> Ineffective assistance of counsel, provided that: </span></p><span data-dcnode-id="7450" instrument_node="">
</span><div data-dcnode-id="7439" id="p-208.4(a)(5)(iii)(A)"><span data-dcnode-id="7449" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7441" data-title="208.4(a)(5)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="7443"><span class="paren" data-dcnode-id="7447"><span data-dcnode-id="7448" instrument_node="">(</span></span><span data-dcnode-id="7446" instrument_node="">A</span><span class="paren" data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">)</span></span></span><span data-dcnode-id="7442" instrument_node=""> The alien files an affidavit setting forth in detail the agreement that was entered into with counsel with respect to the actions to be taken and what representations counsel did or did not make to the respondent in this regard; </span></p><span data-dcnode-id="7440" instrument_node="">
</span></div><span data-dcnode-id="7438" instrument_node="">
</span><div data-dcnode-id="7427" id="p-208.4(a)(5)(iii)(B)"><span data-dcnode-id="7437" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7429" data-title="208.4(a)(5)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="7431"><span class="paren" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">(</span></span><span data-dcnode-id="7434" instrument_node="">B</span><span class="paren" data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">)</span></span></span><span data-dcnode-id="7430" instrument_node=""> The counsel whose integrity or competence is being impugned has been informed of the allegations leveled against him or her and given an opportunity to respond; and </span></p><span data-dcnode-id="7428" instrument_node="">
</span></div><span data-dcnode-id="7426" instrument_node="">
</span><div data-dcnode-id="7415" id="p-208.4(a)(5)(iii)(C)"><span data-dcnode-id="7425" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7417" data-title="208.4(a)(5)(iii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="7419"><span class="paren" data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">(</span></span><span data-dcnode-id="7422" instrument_node="">C</span><span class="paren" data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">)</span></span></span><span data-dcnode-id="7418" instrument_node=""> The alien indicates whether a complaint has been filed with appropriate disciplinary authorities with respect to any violation of counsel's ethical or legal responsibilities, and if not, why not; </span></p><span data-dcnode-id="7416" instrument_node="">
</span></div><span data-dcnode-id="7414" instrument_node="">
</span></div><span data-dcnode-id="7412" instrument_node="">
</span><div data-dcnode-id="7401" id="p-208.4(a)(5)(iv)"><span data-dcnode-id="7411" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7403" data-title="208.4(a)(5)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="7405"><span class="paren" data-dcnode-id="7409"><span data-dcnode-id="7410" instrument_node="">(</span></span><span data-dcnode-id="7408" instrument_node="">iv</span><span class="paren" data-dcnode-id="7406"><span data-dcnode-id="7407" instrument_node="">)</span></span></span><span data-dcnode-id="7404" instrument_node=""> The applicant maintained Temporary Protected Status, lawful immigrant or nonimmigrant status, or was given parole, until a reasonable period before the filing of the asylum application; </span></p><span data-dcnode-id="7402" instrument_node="">
</span></div><span data-dcnode-id="7400" instrument_node="">
</span><div data-dcnode-id="7389" id="p-208.4(a)(5)(v)"><span data-dcnode-id="7399" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7391" data-title="208.4(a)(5)(v)"><span class="paragraph-hierarchy" data-dcnode-id="7393"><span class="paren" data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">(</span></span><span data-dcnode-id="7396" instrument_node="">v</span><span class="paren" data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">)</span></span></span><span data-dcnode-id="7392" instrument_node=""> The applicant filed an asylum application prior to the expiration of the 1-year deadline, but that application was rejected by the Service as not properly filed, was returned to the applicant for corrections, and was refiled within a reasonable period thereafter; and </span></p><span data-dcnode-id="7390" instrument_node="">
</span></div><span data-dcnode-id="7388" instrument_node="">
</span><div data-dcnode-id="7377" id="p-208.4(a)(5)(vi)"><span data-dcnode-id="7387" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7379" data-title="208.4(a)(5)(vi)"><span class="paragraph-hierarchy" data-dcnode-id="7381"><span class="paren" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">(</span></span><span data-dcnode-id="7384" instrument_node="">vi</span><span class="paren" data-dcnode-id="7382"><span data-dcnode-id="7383" instrument_node="">)</span></span></span><span data-dcnode-id="7380" instrument_node=""> The death or serious illness or incapacity of the applicant's legal representative or a member of the applicant's immediate family. </span></p><span data-dcnode-id="7378" instrument_node="">
</span></div><span data-dcnode-id="7376" instrument_node="">
</span></div><span data-dcnode-id="7374" instrument_node="">
</span><div data-dcnode-id="7351" id="p-208.4(a)(6)"><span data-dcnode-id="7373" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7353" data-title="208.4(a)(6)"><span class="paragraph-hierarchy" data-dcnode-id="7367"><span class="paren" data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">(</span></span><span data-dcnode-id="7370" instrument_node="">6</span><span class="paren" data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">)</span></span></span><span data-dcnode-id="7366" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">Asylum Cooperative Agreements.</span></em><span data-dcnode-id="7363" instrument_node="">  Immigration officers have authority to apply section 208(a)(2)(A) of the Act, relating to the determination that the alien may be removed to a third country pursuant to a bilateral or multilateral agreement, as provided in </span><a class="cfr external" data-dcnode-id="7361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29"><span data-dcnode-id="7362" instrument_node="">§ 208.30(e)</span></a><span data-dcnode-id="7360" instrument_node="">. For provisions relating to the authority of immigration judges with respect to section 208(a)(2)(A), see </span><a class="cfr external" data-dcnode-id="7358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1240.11%23p-1240.11%28g%29"><span data-dcnode-id="7359" instrument_node="">8 CFR 1240.11(g)</span></a><span data-dcnode-id="7357" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1240.11%23p-1240.11%28h%29"><span data-dcnode-id="7356" instrument_node="">(h)</span></a><span data-dcnode-id="7354" instrument_node="">. </span></p><span data-dcnode-id="7352" instrument_node="">
</span></div><span data-dcnode-id="7350" instrument_node="">
</span></div><span data-dcnode-id="7348" instrument_node="">
</span><div data-dcnode-id="7330" id="p-208.4(c)"><p class="indent-1" data-dcnode-id="7331" data-title="208.4(c)"><span class="paragraph-hierarchy" data-dcnode-id="7342"><span class="paren" data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">(</span></span><span data-dcnode-id="7345" instrument_node="">c</span><span class="paren" data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">)</span></span></span><span data-dcnode-id="7341" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7339"><span data-dcnode-id="7340" instrument_node="">Amending an application after filing.</span></em><span data-dcnode-id="7338" instrument_node="">  Upon the request of the alien, and as a matter of discretion, the asylum officer or immigration judge with jurisdiction may permit an asylum applicant to amend or supplement the application. Any delay in adjudication or in proceedings caused by a request to amend or supplement the application will be treated as a delay caused by the applicant for purposes of </span><a class="cfr external" data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="7337" instrument_node="">§ 208.7</span></a><span data-dcnode-id="7335" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="7334" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="7332" instrument_node="">. </span></p></div><span data-dcnode-id="7329" instrument_node="">
</span><p class="citation" data-dcnode-id="7297"><span data-dcnode-id="7328" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="7326" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="7327" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="7325" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="7323" data-reference="64 FR 8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8488"><span data-dcnode-id="7324" instrument_node="">64 FR 8488</span></a><span data-dcnode-id="7322" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="7320" data-reference="64 FR 13881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-13881"><span data-dcnode-id="7321" instrument_node="">64 FR 13881</span></a><span data-dcnode-id="7319" instrument_node="">, Mar. 23, 1999; </span><a class="fr-reference" data-dcnode-id="7317" data-reference="65 FR 76131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76131"><span data-dcnode-id="7318" instrument_node="">65 FR 76131</span></a><span data-dcnode-id="7316" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="7314" data-reference="69 FR 69488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/69-FR-69488"><span data-dcnode-id="7315" instrument_node="">69 FR 69488</span></a><span data-dcnode-id="7313" instrument_node="">, Nov. 29, 2004; </span><a class="fr-reference" data-dcnode-id="7311" data-reference="74 FR 26937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-26937"><span data-dcnode-id="7312" instrument_node="">74 FR 26937</span></a><span data-dcnode-id="7310" instrument_node="">, June 5, 2009; </span><a class="fr-reference" data-dcnode-id="7308" data-reference="74 FR 55737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-55737"><span data-dcnode-id="7309" instrument_node="">74 FR 55737</span></a><span data-dcnode-id="7307" instrument_node="">, Oct. 28, 2009; </span><a class="fr-reference" data-dcnode-id="7305" data-reference="84 FR 64008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/84-FR-64008"><span data-dcnode-id="7306" instrument_node="">84 FR 64008</span></a><span data-dcnode-id="7304" instrument_node="">, Nov. 19, 2019; </span><a class="fr-reference" data-dcnode-id="7302" data-reference="85 FR 29310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-29310"><span data-dcnode-id="7303" instrument_node="">85 FR 29310</span></a><span data-dcnode-id="7301" instrument_node="">, May 14, 2020; </span><a class="fr-reference" data-dcnode-id="7299" data-reference="85 FR 38626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-38626"><span data-dcnode-id="7300" instrument_node="">85 FR 38626</span></a><span data-dcnode-id="7298" instrument_node="">, June 26, 2020] </span></p><span data-dcnode-id="7296" instrument_node="">
</span></div><span data-dcnode-id="7294" instrument_node="">
</span><div class="section" data-dcnode-id="7125" id="208.5"><span data-dcnode-id="7293" instrument_node="">
</span><h4 data-dcnode-id="7290"><a class="direct" data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.5"><span data-dcnode-id="7292" instrument_node="">§ 208.5 Special duties toward aliens in custody of DHS.</span></a></h4><span data-dcnode-id="7289" instrument_node="">
</span><div data-dcnode-id="7251" id="p-208.5(a)"><span data-dcnode-id="7288" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7253" data-title="208.5(a)"><span class="paragraph-hierarchy" data-dcnode-id="7282"><span class="paren" data-dcnode-id="7286"><span data-dcnode-id="7287" instrument_node="">(</span></span><span data-dcnode-id="7285" instrument_node="">a</span><span class="paren" data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">)</span></span></span><span data-dcnode-id="7281" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">General.</span></em><span data-dcnode-id="7278" instrument_node="">  When an alien in the custody of DHS requests asylum or withholding of removal, or expresses a fear of persecution or harm upon return to his or her country of origin or to agents thereof, DHS shall make available the appropriate application forms and shall provide the applicant with the information required by section 208(d)(4) of the Act, including in the case of an alien who is in custody with a positive credible fear or reasonable fear determination under </span><a class="cfr external" data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7277" instrument_node="">8 CFR 208.30</span></a><span data-dcnode-id="7275" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="7274" instrument_node="">208.31</span></a><span data-dcnode-id="7272" instrument_node="">, and except in the case of an alien who is in custody pending a credible fear determination under </span><a class="cfr external" data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7271" instrument_node="">8 CFR 208.30</span></a><span data-dcnode-id="7269" instrument_node=""> or a reasonable fear determination pursuant to </span><a class="cfr external" data-dcnode-id="7267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="7268" instrument_node="">8 CFR 208.31</span></a><span data-dcnode-id="7266" instrument_node="">. Although DHS does not have a duty in the case of an alien who is in custody pending a credible fear or reasonable fear determination under either </span><a class="cfr external" data-dcnode-id="7264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7265" instrument_node="">8 CFR 208.30</span></a><span data-dcnode-id="7263" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="7261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="7262" instrument_node="">8 CFR 208.31</span></a><span data-dcnode-id="7260" instrument_node="">, DHS may provide the appropriate forms, upon request. Where possible, expedited consideration shall be given to applications of detained aliens. Except as provided in </span><a class="cfr external" data-dcnode-id="7258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.5%23p-208.5%28c%29"><span data-dcnode-id="7259" instrument_node="">paragraph (c)</span></a><span data-dcnode-id="7257" instrument_node=""> of this section, such alien shall not be excluded, deported, or removed before a decision is rendered on his or her asylum application. Furthermore, except as provided in </span><a class="cfr external" data-dcnode-id="7255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.5%23p-208.5%28c%29"><span data-dcnode-id="7256" instrument_node="">paragraph (c)</span></a><span data-dcnode-id="7254" instrument_node=""> of this section, an alien physically present in or arriving in the Commonwealth of the Northern Mariana Islands shall not be excluded, deported, or removed before a decision is rendered on his or her application for withholding of removal pursuant to section 241(b)(3) of the Act and withholding of removal under the Convention Against Torture. No application for asylum may be filed prior to January 1, 2030, under section 208 of the Act by an alien physically present in or arriving in the Commonwealth of the Northern Mariana Islands. </span></p><span data-dcnode-id="7252" instrument_node="">
</span></div><span data-dcnode-id="7250" instrument_node="">
</span><div data-dcnode-id="7170" id="p-208.5(b)"><span data-dcnode-id="7249" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7238" data-title="208.5(b)"><span class="paragraph-hierarchy" data-dcnode-id="7243"><span class="paren" data-dcnode-id="7247"><span data-dcnode-id="7248" instrument_node="">(</span></span><span data-dcnode-id="7246" instrument_node="">b</span><span class="paren" data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">)</span></span></span><span data-dcnode-id="7242" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7240"><span data-dcnode-id="7241" instrument_node="">Certain aliens aboard vessels.</span></em><span data-dcnode-id="7239" instrument_node=""> </span></p><span data-dcnode-id="7237" instrument_node="">
</span><div data-dcnode-id="7187" id="p-208.5(b)(1)"><span data-dcnode-id="7236" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7228" data-title="208.5(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="7230"><span class="paren" data-dcnode-id="7234"><span data-dcnode-id="7235" instrument_node="">(</span></span><span data-dcnode-id="7233" instrument_node="">1</span><span class="paren" data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">)</span></span></span><span data-dcnode-id="7229" instrument_node=""> If an alien crewmember or alien stowaway on board a vessel or other conveyance alleges, claims, or otherwise makes known to an immigration inspector or other official making an examination on the conveyance that he or she is unable or unwilling to return to his or her country of nationality or last habitual residence (if not a national of any country) because of persecution or a fear of persecution in that country on account of race, religion, nationality, membership in a particular social group, or political opinion, or if the alien expresses a fear of torture upon return to that country, the alien shall be promptly removed from the conveyance. If the alien makes such fear known to an official while off such conveyance, the alien shall not be returned to the conveyance but shall be retained in or transferred to the custody of the Service. </span></p><span data-dcnode-id="7227" instrument_node="">
</span><div data-dcnode-id="7213" id="p-208.5(b)(1)(i)"><span data-dcnode-id="7226" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7215" data-title="208.5(b)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7220"><span class="paren" data-dcnode-id="7224"><span data-dcnode-id="7225" instrument_node="">(</span></span><span data-dcnode-id="7223" instrument_node="">i</span><span class="paren" data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">)</span></span></span><span data-dcnode-id="7219" instrument_node=""> An alien stowaway will be referred to an asylum officer for a credible fear determination under </span><a class="cfr external" data-dcnode-id="7217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7218" instrument_node="">§ 208.30</span></a><span data-dcnode-id="7216" instrument_node="">. </span></p><span data-dcnode-id="7214" instrument_node="">
</span></div><span data-dcnode-id="7212" instrument_node="">
</span><div data-dcnode-id="7201" id="p-208.5(b)(1)(ii)"><span data-dcnode-id="7211" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7203" data-title="208.5(b)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7205"><span class="paren" data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">(</span></span><span data-dcnode-id="7208" instrument_node="">ii</span><span class="paren" data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">)</span></span></span><span data-dcnode-id="7204" instrument_node=""> An alien crewmember shall be provided the appropriate application forms and information required by section 208(d)(4) of the Act and may then have 10 days within which to submit an asylum application in accordance with the instructions on the form. DHS may extend the 10-day filing period for good cause. Once the application has been filed, DHS shall serve Form I-863 on the alien and immediately forward any such application to the appropriate Immigration Court with a copy of the Form I-863 being filed with that court. </span></p><span data-dcnode-id="7202" instrument_node="">
</span></div><span data-dcnode-id="7200" instrument_node="">
</span><div data-dcnode-id="7189" id="p-208.5(b)(1)(iii)"><span data-dcnode-id="7199" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7191" data-title="208.5(b)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="7193"><span class="paren" data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">(</span></span><span data-dcnode-id="7196" instrument_node="">iii</span><span class="paren" data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">)</span></span></span><span data-dcnode-id="7192" instrument_node=""> An alien crewmember physically present in or arriving in the Commonwealth of the Northern Mariana Islands can request withholding of removal pursuant to section 241(b)(3) of the Act and withholding of removal under the Convention Against Torture. However, such an alien crewmember is not eligible to request asylum pursuant to section 208 of the Act prior to January 1, 2030. </span></p><span data-dcnode-id="7190" instrument_node="">
</span></div><span data-dcnode-id="7188" instrument_node="">
</span></div><span data-dcnode-id="7186" instrument_node="">
</span><div data-dcnode-id="7172" id="p-208.5(b)(2)"><span data-dcnode-id="7185" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7174" data-title="208.5(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="7179"><span class="paren" data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">(</span></span><span data-dcnode-id="7182" instrument_node="">2</span><span class="paren" data-dcnode-id="7180"><span data-dcnode-id="7181" instrument_node="">)</span></span></span><span data-dcnode-id="7178" instrument_node=""> Pending adjudication of the application, and, in the case of a stowaway the credible fear determination and any review thereof, the alien may be detained by the Service or otherwise paroled in accordance with </span><a class="cfr external" data-dcnode-id="7176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-212.5"><span data-dcnode-id="7177" instrument_node="">§ 212.5 of this chapter</span></a><span data-dcnode-id="7175" instrument_node="">. However, pending the credible fear determination, parole of an alien stowaway may be permitted only when the Secretary determines, in the exercise of discretion, that parole is required to meet a medical emergency or is necessary for a legitimate law enforcement objective. </span></p><span data-dcnode-id="7173" instrument_node="">
</span></div><span data-dcnode-id="7171" instrument_node="">
</span></div><span data-dcnode-id="7169" instrument_node="">
</span><div data-dcnode-id="7154" id="p-208.5(c)"><p class="indent-1" data-dcnode-id="7155" data-title="208.5(c)"><span class="paragraph-hierarchy" data-dcnode-id="7163"><span class="paren" data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">(</span></span><span data-dcnode-id="7166" instrument_node="">c</span><span class="paren" data-dcnode-id="7164"><span data-dcnode-id="7165" instrument_node="">)</span></span></span><span data-dcnode-id="7162" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7160"><span data-dcnode-id="7161" instrument_node="">Exception to prohibition on removal.</span></em><span data-dcnode-id="7159" instrument_node="">  A motion to reopen or an order to remand accompanied by an asylum application pursuant to </span><a class="cfr external" data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4%23p-208.4%28b%29%283%29%28iii%29"><span data-dcnode-id="7158" instrument_node="">§ 208.4(b)(3)(iii)</span></a><span data-dcnode-id="7156" instrument_node=""> shall not stay execution of a final exclusion, deportation, or removal order unless such stay is specifically granted by the Board of Immigration Appeals or the immigration judge having jurisdiction over the motion. </span></p></div><span data-dcnode-id="7153" instrument_node="">
</span><p class="citation" data-dcnode-id="7127"><span data-dcnode-id="7152" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="7150" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="7151" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="7149" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="7147" data-reference="64 FR 8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8488"><span data-dcnode-id="7148" instrument_node="">64 FR 8488</span></a><span data-dcnode-id="7146" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="7144" data-reference="65 FR 76132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76132"><span data-dcnode-id="7145" instrument_node="">65 FR 76132</span></a><span data-dcnode-id="7143" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="7141" data-reference="74 FR 26937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-26937"><span data-dcnode-id="7142" instrument_node="">74 FR 26937</span></a><span data-dcnode-id="7140" instrument_node="">, June 5, 2009; </span><a class="fr-reference" data-dcnode-id="7138" data-reference="74 FR 55737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-55737"><span data-dcnode-id="7139" instrument_node="">74 FR 55737</span></a><span data-dcnode-id="7137" instrument_node="">, Oct. 28, 2009; </span><a class="fr-reference" data-dcnode-id="7135" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="7136" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="7134" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="7132" data-reference="85 FR 29310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-29310"><span data-dcnode-id="7133" instrument_node="">85 FR 29310</span></a><span data-dcnode-id="7131" instrument_node="">, May 14, 2020; </span><a class="fr-reference" data-dcnode-id="7129" data-reference="85 FR 80386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80386"><span data-dcnode-id="7130" instrument_node="">85 FR 80386</span></a><span data-dcnode-id="7128" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="7126" instrument_node="">
</span></div><span data-dcnode-id="7124" instrument_node="">
</span><div class="section" data-dcnode-id="6790" id="208.6"><span data-dcnode-id="7123" instrument_node="">
</span><h4 data-dcnode-id="7120"><a class="direct" data-dcnode-id="7121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.6"><span data-dcnode-id="7122" instrument_node="">§ 208.6 Disclosure to third parties.</span></a></h4><span data-dcnode-id="7119" instrument_node="">
</span><div data-dcnode-id="7102" id="p-208.6(a)"><span data-dcnode-id="7118" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7104" data-title="208.6(a)"><span class="paragraph-hierarchy" data-dcnode-id="7112"><span class="paren" data-dcnode-id="7116"><span data-dcnode-id="7117" instrument_node="">(</span></span><span data-dcnode-id="7115" instrument_node="">a</span><span class="paren" data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">)</span></span></span><span data-dcnode-id="7111" instrument_node=""> Information contained in or pertaining to any application for refugee admission, asylum, withholding of removal under section 241(b)(3) of the Act, or protection under regulations issued pursuant to the Convention Against Torture's implementing legislation, records pertaining to any credible fear determination conducted pursuant to </span><a class="cfr external" data-dcnode-id="7109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7110" instrument_node="">§ 208.30</span></a><span data-dcnode-id="7108" instrument_node="">, and records pertaining to any reasonable fear determination conducted pursuant to </span><a class="cfr external" data-dcnode-id="7106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="7107" instrument_node="">§ 208.31</span></a><span data-dcnode-id="7105" instrument_node="">, shall not be disclosed without the written consent of the applicant, except as permitted by this section or at the discretion of the Secretary. </span></p><span data-dcnode-id="7103" instrument_node="">
</span></div><span data-dcnode-id="7101" instrument_node="">
</span><div data-dcnode-id="7090" id="p-208.6(b)"><span data-dcnode-id="7100" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7092" data-title="208.6(b)"><span class="paragraph-hierarchy" data-dcnode-id="7094"><span class="paren" data-dcnode-id="7098"><span data-dcnode-id="7099" instrument_node="">(</span></span><span data-dcnode-id="7097" instrument_node="">b</span><span class="paren" data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">)</span></span></span><span data-dcnode-id="7093" instrument_node=""> The confidentiality of other records kept by DHS and the Executive Office for Immigration Review that indicate that a specific alien has applied for refugee admission, asylum, withholding of removal under section 241(b)(3) of the Act, or protection under regulations issued pursuant to the Convention Against Torture's implementing legislation, or has received a credible fear or reasonable fear interview, or received a credible fear or reasonable fear review shall also be protected from disclosure, except as permitted in this section. DHS will coordinate with the Department of State to ensure that the confidentiality of those records is maintained if they are transmitted to Department of State offices in other countries. </span></p><span data-dcnode-id="7091" instrument_node="">
</span></div><span data-dcnode-id="7089" instrument_node="">
</span><div data-dcnode-id="6958" id="p-208.6(c)"><span data-dcnode-id="7088" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7080" data-title="208.6(c)"><span class="paragraph-hierarchy" data-dcnode-id="7082"><span class="paren" data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">(</span></span><span data-dcnode-id="7085" instrument_node="">c</span><span class="paren" data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">)</span></span></span><span data-dcnode-id="7081" instrument_node=""> This section shall not apply to any disclosure to: </span></p><span data-dcnode-id="7079" instrument_node="">
</span><div data-dcnode-id="7002" id="p-208.6(c)(1)"><span data-dcnode-id="7078" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7070" data-title="208.6(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="7072"><span class="paren" data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">(</span></span><span data-dcnode-id="7075" instrument_node="">1</span><span class="paren" data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">)</span></span></span><span data-dcnode-id="7071" instrument_node=""> Any United States Government official or contractor having a need to examine information in connection with: </span></p><span data-dcnode-id="7069" instrument_node="">
</span><div data-dcnode-id="7058" id="p-208.6(c)(1)(i)"><span data-dcnode-id="7068" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7060" data-title="208.6(c)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7062"><span class="paren" data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">(</span></span><span data-dcnode-id="7065" instrument_node="">i</span><span class="paren" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">)</span></span></span><span data-dcnode-id="7061" instrument_node=""> The adjudication of asylum applications; </span></p><span data-dcnode-id="7059" instrument_node="">
</span></div><span data-dcnode-id="7057" instrument_node="">
</span><div data-dcnode-id="7046" id="p-208.6(c)(1)(ii)"><span data-dcnode-id="7056" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7048" data-title="208.6(c)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7050"><span class="paren" data-dcnode-id="7054"><span data-dcnode-id="7055" instrument_node="">(</span></span><span data-dcnode-id="7053" instrument_node="">ii</span><span class="paren" data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">)</span></span></span><span data-dcnode-id="7049" instrument_node=""> The consideration of a request for a credible fear or reasonable fear interview, or a credible fear or reasonable fear review; </span></p><span data-dcnode-id="7047" instrument_node="">
</span></div><span data-dcnode-id="7045" instrument_node="">
</span><div data-dcnode-id="7028" id="p-208.6(c)(1)(iii)"><span data-dcnode-id="7044" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7030" data-title="208.6(c)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="7038"><span class="paren" data-dcnode-id="7042"><span data-dcnode-id="7043" instrument_node="">(</span></span><span data-dcnode-id="7041" instrument_node="">iii</span><span class="paren" data-dcnode-id="7039"><span data-dcnode-id="7040" instrument_node="">)</span></span></span><span data-dcnode-id="7037" instrument_node=""> The defense of any legal action arising from the adjudication of, or failure to adjudicate, the asylum application, or from a credible fear determination or reasonable fear determination under </span><a class="cfr external" data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="7036" instrument_node="">§ 208.30</span></a><span data-dcnode-id="7034" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="7032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="7033" instrument_node="">§ 208.31</span></a><span data-dcnode-id="7031" instrument_node="">; </span></p><span data-dcnode-id="7029" instrument_node="">
</span></div><span data-dcnode-id="7027" instrument_node="">
</span><div data-dcnode-id="7016" id="p-208.6(c)(1)(iv)"><span data-dcnode-id="7026" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7018" data-title="208.6(c)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="7020"><span class="paren" data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">(</span></span><span data-dcnode-id="7023" instrument_node="">iv</span><span class="paren" data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">)</span></span></span><span data-dcnode-id="7019" instrument_node=""> The defense of any legal action of which the asylum application, credible fear determination, or reasonable fear determination is a part; or </span></p><span data-dcnode-id="7017" instrument_node="">
</span></div><span data-dcnode-id="7015" instrument_node="">
</span><div data-dcnode-id="7004" id="p-208.6(c)(1)(v)"><span data-dcnode-id="7014" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7006" data-title="208.6(c)(1)(v)"><span class="paragraph-hierarchy" data-dcnode-id="7008"><span class="paren" data-dcnode-id="7012"><span data-dcnode-id="7013" instrument_node="">(</span></span><span data-dcnode-id="7011" instrument_node="">v</span><span class="paren" data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">)</span></span></span><span data-dcnode-id="7007" instrument_node=""> Any United States Government investigation concerning any criminal or civil matter; or </span></p><span data-dcnode-id="7005" instrument_node="">
</span></div><span data-dcnode-id="7003" instrument_node="">
</span></div><span data-dcnode-id="7001" instrument_node="">
</span><div data-dcnode-id="6960" id="p-208.6(c)(2)"><span data-dcnode-id="7000" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6992" data-title="208.6(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6994"><span class="paren" data-dcnode-id="6998"><span data-dcnode-id="6999" instrument_node="">(</span></span><span data-dcnode-id="6997" instrument_node="">2</span><span class="paren" data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">)</span></span></span><span data-dcnode-id="6993" instrument_node=""> Any Federal, State, or local court in the United States considering any legal action: </span></p><span data-dcnode-id="6991" instrument_node="">
</span><div data-dcnode-id="6974" id="p-208.6(c)(2)(i)"><span data-dcnode-id="6990" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6976" data-title="208.6(c)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="6984"><span class="paren" data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">(</span></span><span data-dcnode-id="6987" instrument_node="">i</span><span class="paren" data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">)</span></span></span><span data-dcnode-id="6983" instrument_node=""> Arising from the adjudication of, or failure to adjudicate, the asylum application, or from a credible fear or reasonable fear determination under </span><a class="cfr external" data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="6982" instrument_node="">§ 208.30</span></a><span data-dcnode-id="6980" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="6979" instrument_node="">§ 208.31</span></a><span data-dcnode-id="6977" instrument_node="">; or </span></p><span data-dcnode-id="6975" instrument_node="">
</span></div><span data-dcnode-id="6973" instrument_node="">
</span><div data-dcnode-id="6962" id="p-208.6(c)(2)(ii)"><span data-dcnode-id="6972" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6964" data-title="208.6(c)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="6966"><span class="paren" data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">(</span></span><span data-dcnode-id="6969" instrument_node="">ii</span><span class="paren" data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">)</span></span></span><span data-dcnode-id="6965" instrument_node=""> Arising from the proceedings of which the asylum application, credible fear determination, or reasonable fear determination is a part. </span></p><span data-dcnode-id="6963" instrument_node="">
</span></div><span data-dcnode-id="6961" instrument_node="">
</span></div><span data-dcnode-id="6959" instrument_node="">
</span></div><span data-dcnode-id="6957" instrument_node="">
</span><div data-dcnode-id="6835" id="p-208.6(d)"><span data-dcnode-id="6956" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6948" data-title="208.6(d)"><span class="paragraph-hierarchy" data-dcnode-id="6950"><span class="paren" data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">(</span></span><span data-dcnode-id="6953" instrument_node="">d</span><span class="paren" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">)</span></span></span><span data-dcnode-id="6949" instrument_node=""> </span></p><span data-dcnode-id="6947" instrument_node="">
</span><div data-dcnode-id="6861" id="p-208.6(d)(1)"><span data-dcnode-id="6946" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6938" data-title="208.6(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6940"><span class="paren" data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">(</span></span><span data-dcnode-id="6943" instrument_node="">1</span><span class="paren" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">)</span></span></span><span data-dcnode-id="6939" instrument_node=""> Any information contained in an application for refugee admission, asylum, withholding of removal under section 241(b)(3) of the Act, or protection under regulations issued pursuant to the Convention Against Torture's implementing legislation, any relevant and applicable information supporting that application, any information regarding an alien who has filed such an application, and any relevant and applicable information regarding an alien who has been the subject of a reasonable fear or credible fear determination may be disclosed: </span></p><span data-dcnode-id="6937" instrument_node="">
</span><div data-dcnode-id="6926" id="p-208.6(d)(1)(i)"><span data-dcnode-id="6936" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6928" data-title="208.6(d)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="6930"><span class="paren" data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">(</span></span><span data-dcnode-id="6933" instrument_node="">i</span><span class="paren" data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">)</span></span></span><span data-dcnode-id="6929" instrument_node=""> As part of an investigation or adjudication of the merits of that application or of any other application under the immigration laws, </span></p><span data-dcnode-id="6927" instrument_node="">
</span></div><span data-dcnode-id="6925" instrument_node="">
</span><div data-dcnode-id="6914" id="p-208.6(d)(1)(ii)"><span data-dcnode-id="6924" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6916" data-title="208.6(d)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="6918"><span class="paren" data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">(</span></span><span data-dcnode-id="6921" instrument_node="">ii</span><span class="paren" data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">)</span></span></span><span data-dcnode-id="6917" instrument_node=""> As part of any State or Federal criminal investigation, proceeding, or prosecution; </span></p><span data-dcnode-id="6915" instrument_node="">
</span></div><span data-dcnode-id="6913" instrument_node="">
</span><div data-dcnode-id="6902" id="p-208.6(d)(1)(iii)"><span data-dcnode-id="6912" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6904" data-title="208.6(d)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="6906"><span class="paren" data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">(</span></span><span data-dcnode-id="6909" instrument_node="">iii</span><span class="paren" data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">)</span></span></span><span data-dcnode-id="6905" instrument_node=""> Pursuant to any State or Federal mandatory reporting requirement; </span></p><span data-dcnode-id="6903" instrument_node="">
</span></div><span data-dcnode-id="6901" instrument_node="">
</span><div data-dcnode-id="6890" id="p-208.6(d)(1)(iv)"><span data-dcnode-id="6900" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6892" data-title="208.6(d)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="6894"><span class="paren" data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">(</span></span><span data-dcnode-id="6897" instrument_node="">iv</span><span class="paren" data-dcnode-id="6895"><span data-dcnode-id="6896" instrument_node="">)</span></span></span><span data-dcnode-id="6893" instrument_node=""> To deter, prevent, or ameliorate the effects of child abuse; </span></p><span data-dcnode-id="6891" instrument_node="">
</span></div><span data-dcnode-id="6889" instrument_node="">
</span><div data-dcnode-id="6878" id="p-208.6(d)(1)(v)"><span data-dcnode-id="6888" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6880" data-title="208.6(d)(1)(v)"><span class="paragraph-hierarchy" data-dcnode-id="6882"><span class="paren" data-dcnode-id="6886"><span data-dcnode-id="6887" instrument_node="">(</span></span><span data-dcnode-id="6885" instrument_node="">v</span><span class="paren" data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">)</span></span></span><span data-dcnode-id="6881" instrument_node=""> As part of any proceeding arising under the immigration laws, including proceedings arising under the Act; and </span></p><span data-dcnode-id="6879" instrument_node="">
</span></div><span data-dcnode-id="6877" instrument_node="">
</span><div data-dcnode-id="6863" id="p-208.6(d)(1)(vi)"><span data-dcnode-id="6876" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6865" data-title="208.6(d)(1)(vi)"><span class="paragraph-hierarchy" data-dcnode-id="6870"><span class="paren" data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">(</span></span><span data-dcnode-id="6873" instrument_node="">vi</span><span class="paren" data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">)</span></span></span><span data-dcnode-id="6869" instrument_node=""> As part of the Government's defense of any legal action relating to the alien's immigration or custody status including petitions for review filed in accordance with </span><a class="usc external" data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/uscode/8/1252" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6868" instrument_node="">8 U.S.C. 1252</span></a><span data-dcnode-id="6866" instrument_node="">. </span></p><span data-dcnode-id="6864" instrument_node="">
</span></div><span data-dcnode-id="6862" instrument_node="">
</span></div><span data-dcnode-id="6860" instrument_node="">
</span><div data-dcnode-id="6837" id="p-208.6(d)(2)"><span data-dcnode-id="6859" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6839" data-title="208.6(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6853"><span class="paren" data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">(</span></span><span data-dcnode-id="6856" instrument_node="">2</span><span class="paren" data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">)</span></span></span><span data-dcnode-id="6852" instrument_node=""> If information may be disclosed under </span><a class="cfr external" data-dcnode-id="6850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.6%23p-208.6%28d%29%281%29"><span data-dcnode-id="6851" instrument_node="">paragraph (d)(1)</span></a><span data-dcnode-id="6849" instrument_node=""> of this section, the disclosure provisions in </span><a class="cfr external" data-dcnode-id="6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.6%23p-208.6%28a%29"><span data-dcnode-id="6848" instrument_node="">paragraphs (a)</span></a><span data-dcnode-id="6846" instrument_node="">, </span><a class="cfr external" data-dcnode-id="6844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.6%23p-208.6%28b%29"><span data-dcnode-id="6845" instrument_node="">(b)</span></a><span data-dcnode-id="6843" instrument_node="">, and </span><a class="cfr external" data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.6%23p-208.6%28c%29"><span data-dcnode-id="6842" instrument_node="">(c)</span></a><span data-dcnode-id="6840" instrument_node=""> of this section shall not apply. </span></p><span data-dcnode-id="6838" instrument_node="">
</span></div><span data-dcnode-id="6836" instrument_node="">
</span></div><span data-dcnode-id="6834" instrument_node="">
</span><div data-dcnode-id="6801" id="p-208.6(e)"><span data-dcnode-id="6833" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6825" data-title="208.6(e)"><span class="paragraph-hierarchy" data-dcnode-id="6827"><span class="paren" data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">(</span></span><span data-dcnode-id="6830" instrument_node="">e</span><span class="paren" data-dcnode-id="6828"><span data-dcnode-id="6829" instrument_node="">)</span></span></span><span data-dcnode-id="6826" instrument_node=""> Nothing in this section shall be construed as prohibiting the disclosure of information contained in an application for refugee admission, asylum, withholding of removal under section 241(b)(3)(B) of the Act, or protection under regulations issued pursuant to the Convention Against Torture's implementing legislation, information supporting that application, information regarding an alien who has filed such an application, or information regarding an alien who has been the subject of a reasonable fear or credible fear determination: </span></p><span data-dcnode-id="6824" instrument_node="">
</span><div data-dcnode-id="6813" id="p-208.6(e)(1)"><span data-dcnode-id="6823" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6815" data-title="208.6(e)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6817"><span class="paren" data-dcnode-id="6821"><span data-dcnode-id="6822" instrument_node="">(</span></span><span data-dcnode-id="6820" instrument_node="">1</span><span class="paren" data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">)</span></span></span><span data-dcnode-id="6816" instrument_node=""> Among employees and officers of the Department of Justice, the Department of Homeland Security, the Department of State, the Department of Health and Human Services, the Department of Labor, or a U.S. national security agency having a need to examine the information for an official purpose; or </span></p><span data-dcnode-id="6814" instrument_node="">
</span></div><span data-dcnode-id="6812" instrument_node="">
</span><div data-dcnode-id="6803" id="p-208.6(e)(2)"><p class="indent-2" data-dcnode-id="6804" data-title="208.6(e)(2)"><span class="paragraph-hierarchy" data-dcnode-id="6806"><span class="paren" data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">(</span></span><span data-dcnode-id="6809" instrument_node="">2</span><span class="paren" data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">)</span></span></span><span data-dcnode-id="6805" instrument_node=""> Where a United States Government employee or contractor has a good faith and reasonable belief that disclosure is necessary to prevent the commission of a crime, the furtherance of an ongoing crime, or to ameliorate the effects of a crime. </span></p></div><span data-dcnode-id="6802" instrument_node="">
</span></div><span data-dcnode-id="6800" instrument_node="">
</span><p class="citation" data-dcnode-id="6792"><span data-dcnode-id="6799" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="6797" data-reference="65 FR 76133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76133"><span data-dcnode-id="6798" instrument_node="">65 FR 76133</span></a><span data-dcnode-id="6796" instrument_node="">, Dec. 6, 2000, as amended at </span><a class="fr-reference" data-dcnode-id="6794" data-reference="85 FR 80386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80386"><span data-dcnode-id="6795" instrument_node="">85 FR 80386</span></a><span data-dcnode-id="6793" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="6791" instrument_node="">
</span></div><span data-dcnode-id="6789" instrument_node="">
</span><div class="section" data-dcnode-id="6293" id="208.7"><span data-dcnode-id="6788" instrument_node="">
</span><h4 data-dcnode-id="6785"><a class="direct" data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="6787" instrument_node="">§ 208.7 Employment authorization.</span></a></h4><span data-dcnode-id="6784" instrument_node="">
</span><div data-dcnode-id="6410" id="p-208.7(a)"><span data-dcnode-id="6783" instrument_node="">
</span><p class="indent-1" data-dcnode-id="6772" data-title="208.7(a)"><span class="paragraph-hierarchy" data-dcnode-id="6777"><span class="paren" data-dcnode-id="6781"><span data-dcnode-id="6782" instrument_node="">(</span></span><span data-dcnode-id="6780" instrument_node="">a</span><span class="paren" data-dcnode-id="6778"><span data-dcnode-id="6779" instrument_node="">)</span></span></span><span data-dcnode-id="6776" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6774"><span data-dcnode-id="6775" instrument_node="">Application and decision</span></em><span data-dcnode-id="6773" instrument_node="">  - </span></p><span data-dcnode-id="6771" instrument_node="">
</span><div data-dcnode-id="6412" id="p-208.7(a)(1)"><span data-dcnode-id="6770" instrument_node="">
</span><p class="indent-2" data-dcnode-id="6762" data-title="208.7(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="6764"><span class="paren" data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">(</span></span><span data-dcnode-id="6767" instrument_node="">1</span><span class="paren" data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">)</span></span></span><span data-dcnode-id="6763" instrument_node=""> </span></p><span data-dcnode-id="6761" instrument_node="">
</span><div data-dcnode-id="6732" id="p-208.7(a)(1)(i)"><span data-dcnode-id="6760" instrument_node="">
</span><p class="indent-3" data-dcnode-id="6734" data-title="208.7(a)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="6754"><span class="paren" data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">(</span></span><span data-dcnode-id="6757" instrument_node="">i</span><span class="paren" data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">)</span></span></span><span data-dcnode-id="6753" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">In General.</span></em><span data-dcnode-id="6750" instrument_node="">  Subject to the restrictions contained in sections 208(d) and 236(a) of the Act, and except as otherwise provided in </span><a class="cfr external" data-dcnode-id="6748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7%23p-208.7%28b%29"><span data-dcnode-id="6749" instrument_node="">paragraphs (b)</span></a><span data-dcnode-id="6747" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="6745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7%23p-208.7%28c%29"><span data-dcnode-id="6746" instrument_node="">(c)</span></a><span data-dcnode-id="6744" instrument_node=""> of this section, an applicant for asylum who is in the United States may apply for employment authorization pursuant to </span><a class="cfr external" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28c%29%288%29"><span data-dcnode-id="6743" instrument_node="">8 CFR 274a.12(c)(8)</span></a><span data-dcnode-id="6741" instrument_node=""> and 274a.13(a)(2) of this chapter. The applicant must request employment authorization on the form and in the manner prescribed by USCIS and according to the form instructions, and must submit bio
