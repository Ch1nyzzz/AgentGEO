</span><p class="indent-3" data-dcnode-id="2637" data-title="208.18(a)(4)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="2639"><span class="paren" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">(</span></span><span data-dcnode-id="2642" instrument_node="">ii</span><span class="paren" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">)</span></span></span><span data-dcnode-id="2638" instrument_node=""> The administration or application, or threatened administration or application, of mind altering substances or other procedures calculated to disrupt profoundly the senses or the personality; </span></p><span data-dcnode-id="2636" instrument_node="">
</span></div><span data-dcnode-id="2634" instrument_node="">
</span><div data-dcnode-id="2623" id="p-208.18(a)(4)(iii)"><span data-dcnode-id="2633" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2625" data-title="208.18(a)(4)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="2627"><span class="paren" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">(</span></span><span data-dcnode-id="2630" instrument_node="">iii</span><span class="paren" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">)</span></span></span><span data-dcnode-id="2626" instrument_node=""> The threat of imminent death; or </span></p><span data-dcnode-id="2624" instrument_node="">
</span></div><span data-dcnode-id="2622" instrument_node="">
</span><div data-dcnode-id="2611" id="p-208.18(a)(4)(iv)"><span data-dcnode-id="2621" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2613" data-title="208.18(a)(4)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="2615"><span class="paren" data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">(</span></span><span data-dcnode-id="2618" instrument_node="">iv</span><span class="paren" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">)</span></span></span><span data-dcnode-id="2614" instrument_node=""> The threat that another person will imminently be subjected to death, severe physical pain or suffering, or the administration or application of mind altering substances or other procedures calculated to disrupt profoundly the sense or personality. </span></p><span data-dcnode-id="2612" instrument_node="">
</span></div><span data-dcnode-id="2610" instrument_node="">
</span></div><span data-dcnode-id="2608" instrument_node="">
</span><div data-dcnode-id="2597" id="p-208.18(a)(5)"><span data-dcnode-id="2607" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2599" data-title="208.18(a)(5)"><span class="paragraph-hierarchy" data-dcnode-id="2601"><span class="paren" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">(</span></span><span data-dcnode-id="2604" instrument_node="">5</span><span class="paren" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">)</span></span></span><span data-dcnode-id="2600" instrument_node=""> In order to constitute torture, an act must be specifically intended to inflict severe physical or mental pain or suffering. An act that results in unanticipated or unintended severity of pain and suffering is not torture. </span></p><span data-dcnode-id="2598" instrument_node="">
</span></div><span data-dcnode-id="2596" instrument_node="">
</span><div data-dcnode-id="2585" id="p-208.18(a)(6)"><span data-dcnode-id="2595" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2587" data-title="208.18(a)(6)"><span class="paragraph-hierarchy" data-dcnode-id="2589"><span class="paren" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">(</span></span><span data-dcnode-id="2592" instrument_node="">6</span><span class="paren" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">)</span></span></span><span data-dcnode-id="2588" instrument_node=""> In order to constitute torture an act must be directed against a person in the offender's custody or physical control. </span></p><span data-dcnode-id="2586" instrument_node="">
</span></div><span data-dcnode-id="2584" instrument_node="">
</span><div data-dcnode-id="2573" id="p-208.18(a)(7)"><span data-dcnode-id="2583" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2575" data-title="208.18(a)(7)"><span class="paragraph-hierarchy" data-dcnode-id="2577"><span class="paren" data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">(</span></span><span data-dcnode-id="2580" instrument_node="">7</span><span class="paren" data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">)</span></span></span><span data-dcnode-id="2576" instrument_node=""> Acquiescence of a public official requires that the public official, prior to the activity constituting torture, have awareness of such activity and thereafter breach his or her legal responsibility to intervene to prevent such activity. Such awareness requires a finding of either actual knowledge or willful blindness. Willful blindness means that the public official acting in an official capacity or other person acting in an official capacity was aware of a high probability of activity constituting torture and deliberately avoided learning the truth; it is not enough that such public official acting in an official capacity or other person acting in an official capacity was mistaken, recklessly disregarded the truth, or negligently failed to inquire. In order for a public official to breach his or her legal responsibility to intervene to prevent activity constituting torture, the official must have been charged with preventing the activity as part of his or her duties and have failed to intervene. No person will be deemed to have breached a legal responsibility to intervene if such person is unable to intervene, or if the person intervenes but is unable to prevent the activity that constitutes torture. </span></p><span data-dcnode-id="2574" instrument_node="">
</span></div><span data-dcnode-id="2572" instrument_node="">
</span><div data-dcnode-id="2558" id="p-208.18(a)(8)"><span data-dcnode-id="2571" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2560" data-title="208.18(a)(8)"><span class="paragraph-hierarchy" data-dcnode-id="2565"><span class="paren" data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">(</span></span><span data-dcnode-id="2568" instrument_node="">8</span><span class="paren" data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">)</span></span></span><span data-dcnode-id="2564" instrument_node=""> Noncompliance with applicable legal procedural standards does not </span><em data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">per se</span></em><span data-dcnode-id="2561" instrument_node=""> constitute torture. </span></p><span data-dcnode-id="2559" instrument_node="">
</span></div><span data-dcnode-id="2557" instrument_node="">
</span></div><span data-dcnode-id="2555" instrument_node="">
</span><div data-dcnode-id="2293" id="p-208.18(b)"><span data-dcnode-id="2554" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2538" data-title="208.18(b)"><span class="paragraph-hierarchy" data-dcnode-id="2548"><span class="paren" data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">(</span></span><span data-dcnode-id="2551" instrument_node="">b</span><span class="paren" data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">)</span></span></span><span data-dcnode-id="2547" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2540"><span data-dcnode-id="2546" instrument_node="">Applicability of </span><a class="cfr external" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2545" instrument_node="">§§ 208.16(c)</span></a><span data-dcnode-id="2543" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2542" instrument_node="">208.17(a)</span></a></em><span data-dcnode-id="2539" instrument_node="">  - </span></p><span data-dcnode-id="2537" instrument_node="">
</span><div data-dcnode-id="2517" id="p-208.18(b)(1)"><span data-dcnode-id="2536" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2519" data-title="208.18(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2530"><span class="paren" data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">(</span></span><span data-dcnode-id="2533" instrument_node="">1</span><span class="paren" data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">)</span></span></span><span data-dcnode-id="2529" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Aliens in proceedings on or after March 22, 1999.</span></em><span data-dcnode-id="2526" instrument_node="">  An alien who is in exclusion, deportation, or removal proceedings on or after March 22, 1999 may apply for withholding of removal under </span><a class="cfr external" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2525" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2523" instrument_node="">, and, if applicable, may be considered for deferral of removal under </span><a class="cfr external" data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2522" instrument_node="">§ 208.17(a)</span></a><span data-dcnode-id="2520" instrument_node="">. </span></p><span data-dcnode-id="2518" instrument_node="">
</span></div><span data-dcnode-id="2516" instrument_node="">
</span><div data-dcnode-id="2463" id="p-208.18(b)(2)"><span data-dcnode-id="2515" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2495" data-title="208.18(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2509"><span class="paren" data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">(</span></span><span data-dcnode-id="2512" instrument_node="">2</span><span class="paren" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">)</span></span></span><span data-dcnode-id="2508" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Aliens who were ordered removed, or whose removal orders became final, before March 22, 1999.</span></em><span data-dcnode-id="2505" instrument_node="">  An alien under a final order of deportation, exclusion, or removal that became final prior to March 22, 1999 may move to reopen proceedings for the sole purpose of seeking protection under </span><a class="cfr external" data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2504" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2502" instrument_node="">. Such motions shall be governed by </span><a class="cfr external" data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.23"><span data-dcnode-id="2501" instrument_node="">§§ 3.23</span></a><span data-dcnode-id="2499" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.2"><span data-dcnode-id="2498" instrument_node="">3.2 of this chapter</span></a><span data-dcnode-id="2496" instrument_node="">, except that the time and numerical limitations on motions to reopen shall not apply and the alien shall not be required to demonstrate that the evidence sought to be offered was unavailable and could not have been discovered or presented at the former hearing. The motion to reopen shall not be granted unless: </span></p><span data-dcnode-id="2494" instrument_node="">
</span><div data-dcnode-id="2483" id="p-208.18(b)(2)(i)"><span data-dcnode-id="2493" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2485" data-title="208.18(b)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="2487"><span class="paren" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">(</span></span><span data-dcnode-id="2490" instrument_node="">i</span><span class="paren" data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">)</span></span></span><span data-dcnode-id="2486" instrument_node=""> The motion is filed within June 21, 1999; and </span></p><span data-dcnode-id="2484" instrument_node="">
</span></div><span data-dcnode-id="2482" instrument_node="">
</span><div data-dcnode-id="2465" id="p-208.18(b)(2)(ii)"><span data-dcnode-id="2481" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2467" data-title="208.18(b)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="2475"><span class="paren" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">(</span></span><span data-dcnode-id="2478" instrument_node="">ii</span><span class="paren" data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">)</span></span></span><span data-dcnode-id="2474" instrument_node=""> The evidence sought to be offered establishes a prima facie case that the applicant's removal must be withheld or deferred under </span><a class="cfr external" data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2473" instrument_node="">§§ 208.16(c)</span></a><span data-dcnode-id="2471" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2470" instrument_node="">208.17(a)</span></a><span data-dcnode-id="2468" instrument_node="">. </span></p><span data-dcnode-id="2466" instrument_node="">
</span></div><span data-dcnode-id="2464" instrument_node="">
</span></div><span data-dcnode-id="2462" instrument_node="">
</span><div data-dcnode-id="2331" id="p-208.18(b)(3)"><span data-dcnode-id="2461" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2450" data-title="208.18(b)(3)"><span class="paragraph-hierarchy" data-dcnode-id="2455"><span class="paren" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">(</span></span><span data-dcnode-id="2458" instrument_node="">3</span><span class="paren" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">)</span></span></span><span data-dcnode-id="2454" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Aliens who, on March 22, 1999, have requests pending with the Service for protection under Article 3 of the Convention Against Torture.</span></em><span data-dcnode-id="2451" instrument_node=""> </span></p><span data-dcnode-id="2449" instrument_node="">
</span><div data-dcnode-id="2414" id="p-208.18(b)(3)(i)"><span data-dcnode-id="2448" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2440" data-title="208.18(b)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="2442"><span class="paren" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">(</span></span><span data-dcnode-id="2445" instrument_node="">i</span><span class="paren" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">)</span></span></span><span data-dcnode-id="2441" instrument_node=""> Except as otherwise provided, after March 22, 1999, the Service will not: </span></p><span data-dcnode-id="2439" instrument_node="">
</span><div data-dcnode-id="2428" id="p-208.18(b)(3)(i)(A)"><span data-dcnode-id="2438" instrument_node="">
</span><p class="indent-4" data-dcnode-id="2430" data-title="208.18(b)(3)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="2432"><span class="paren" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">(</span></span><span data-dcnode-id="2435" instrument_node="">A</span><span class="paren" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">)</span></span></span><span data-dcnode-id="2431" instrument_node=""> Consider, under its pre-regulatory administrative policy to ensure compliance with the Convention Against Torture, whether Article 3 of that Convention prohibits the removal of an alien to a particular country, or </span></p><span data-dcnode-id="2429" instrument_node="">
</span></div><span data-dcnode-id="2427" instrument_node="">
</span><div data-dcnode-id="2416" id="p-208.18(b)(3)(i)(B)"><span data-dcnode-id="2426" instrument_node="">
</span><p class="indent-4" data-dcnode-id="2418" data-title="208.18(b)(3)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="2420"><span class="paren" data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">(</span></span><span data-dcnode-id="2423" instrument_node="">B</span><span class="paren" data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">)</span></span></span><span data-dcnode-id="2419" instrument_node=""> Stay the removal of an alien based on a request filed with the Service for protection under Article 3 of that Convention. </span></p><span data-dcnode-id="2417" instrument_node="">
</span></div><span data-dcnode-id="2415" instrument_node="">
</span></div><span data-dcnode-id="2413" instrument_node="">
</span><div data-dcnode-id="2333" id="p-208.18(b)(3)(ii)"><span data-dcnode-id="2412" instrument_node="">
</span><p class="indent-3" data-dcnode-id="2404" data-title="208.18(b)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="2406"><span class="paren" data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">(</span></span><span data-dcnode-id="2409" instrument_node="">ii</span><span class="paren" data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">)</span></span></span><span data-dcnode-id="2405" instrument_node=""> For each alien who, on or before March 22, 1999, filed a request with the Service for protection under Article 3 of the Convention Against Torture, and whose request has not been finally decided by the Service, the Service shall provide written notice that, after March 22, 1999, consideration for protection under Article 3 can be obtained only through the provisions of this rule. </span></p><span data-dcnode-id="2403" instrument_node="">
</span><div data-dcnode-id="2374" id="p-208.18(b)(3)(ii)(A)"><span data-dcnode-id="2402" instrument_node="">
</span><p class="indent-4" data-dcnode-id="2376" data-title="208.18(b)(3)(ii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="2396"><span class="paren" data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">(</span></span><span data-dcnode-id="2399" instrument_node="">A</span><span class="paren" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">)</span></span></span><span data-dcnode-id="2395" instrument_node=""> The notice shall inform an alien who is under an order of removal issued by EOIR that, in order to seek consideration of a claim under </span><a class="cfr external" data-dcnode-id="2393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2394" instrument_node="">§§ 208.16(c)</span></a><span data-dcnode-id="2392" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2391" instrument_node="">208.17(a)</span></a><span data-dcnode-id="2389" instrument_node="">, such an alien must file a motion to reopen with the immigration court or the Board of Immigration Appeals. This notice shall be accompanied by a stay of removal, effective until 30 days after service of the notice on the alien. A motion to reopen filed under this paragraph for the limited purpose of asserting a claim under </span><a class="cfr external" data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2388" instrument_node="">§§ 208.16(c)</span></a><span data-dcnode-id="2386" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2385" instrument_node="">208.17(a)</span></a><span data-dcnode-id="2383" instrument_node=""> shall not be subject to the requirements for reopening in </span><a class="cfr external" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.2"><span data-dcnode-id="2382" instrument_node="">§§ 3.2</span></a><span data-dcnode-id="2380" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-3.23"><span data-dcnode-id="2379" instrument_node="">3.23 of this chapter</span></a><span data-dcnode-id="2377" instrument_node="">. Such a motion shall be granted if it is accompanied by a copy of the notice described in paragraph (b)(3)(ii) or by other convincing evidence that the alien had a request pending with the Service for protection under Article 3 of the Convention Against Torture on March 22, 1999. The filing of such a motion shall extend the stay of removal during the pendency of the adjudication of this motion. </span></p><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span><div data-dcnode-id="2353" id="p-208.18(b)(3)(ii)(B)"><span data-dcnode-id="2372" instrument_node="">
</span><p class="indent-4" data-dcnode-id="2355" data-title="208.18(b)(3)(ii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="2366"><span class="paren" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">(</span></span><span data-dcnode-id="2369" instrument_node="">B</span><span class="paren" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">)</span></span></span><span data-dcnode-id="2365" instrument_node=""> The notice shall inform an alien who is under an administrative order of removal issued by the Service under section 238(b) of the Act or an exclusion, deportation, or removal order reinstated by the Service under section 241(a)(5) of the Act that the alien's claim to withholding of removal under </span><a class="cfr external" data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2364" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2362" instrument_node=""> or deferral of removal under </span><a class="cfr external" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2361" instrument_node="">§ 208.17(a)</span></a><span data-dcnode-id="2359" instrument_node=""> will be considered under </span><a class="cfr external" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="2358" instrument_node="">§ 208.31</span></a><span data-dcnode-id="2356" instrument_node="">. </span></p><span data-dcnode-id="2354" instrument_node="">
</span></div><span data-dcnode-id="2352" instrument_node="">
</span><div data-dcnode-id="2335" id="p-208.18(b)(3)(ii)(C)"><span data-dcnode-id="2351" instrument_node="">
</span><p class="indent-4" data-dcnode-id="2337" data-title="208.18(b)(3)(ii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="2345"><span class="paren" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">(</span></span><span data-dcnode-id="2348" instrument_node="">C</span><span class="paren" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">)</span></span></span><span data-dcnode-id="2344" instrument_node=""> The notice shall inform an alien who is under an administrative order of removal issued by the Service under section 235(c) of the Act that the alien's claim to protection under the Convention Against Torture will be decided by the Service as provided in </span><a class="cfr external" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28d%29"><span data-dcnode-id="2343" instrument_node="">§ 208.18(d)</span></a><span data-dcnode-id="2341" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-235.8%23p-235.8%28b%29%284%29"><span data-dcnode-id="2340" instrument_node="">235.8(b)(4)</span></a><span data-dcnode-id="2338" instrument_node=""> and will not be considered under the provisions of this part relating to consideration or review by an immigration judge, the Board of Immigration Appeals, or an asylum officer. </span></p><span data-dcnode-id="2336" instrument_node="">
</span></div><span data-dcnode-id="2334" instrument_node="">
</span></div><span data-dcnode-id="2332" instrument_node="">
</span></div><span data-dcnode-id="2330" instrument_node="">
</span><div data-dcnode-id="2295" id="p-208.18(b)(4)"><span data-dcnode-id="2329" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2297" data-title="208.18(b)(4)"><span class="paragraph-hierarchy" data-dcnode-id="2323"><span class="paren" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">(</span></span><span data-dcnode-id="2326" instrument_node="">4</span><span class="paren" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">)</span></span></span><span data-dcnode-id="2322" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Aliens whose claims to protection under the Convention Against Torture were finally decided by the Service prior to March 22, 1999.</span></em><span data-dcnode-id="2319" instrument_node="">  Sections 208.16(c) and 208.17 (a) and </span><a class="cfr external" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28b%29%281%29"><span data-dcnode-id="2318" instrument_node="">paragraphs (b)(1)</span></a><span data-dcnode-id="2316" instrument_node=""> through </span><a class="cfr external" data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28b%29%283%29"><span data-dcnode-id="2315" instrument_node="">(b)(3)</span></a><span data-dcnode-id="2313" instrument_node=""> of this section do not apply to cases in which, prior to March 22, 1999, the Service has made a final administrative determination about the applicability of Article 3 of the Convention Against Torture to the case of an alien who filed a request with the Service for protection under Article 3. If, prior to March 22, 1999, the Service determined that an applicant cannot be removed consistent with the Convention Against Torture, the alien shall be considered to have been granted withholding of removal under </span><a class="cfr external" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2312" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2310" instrument_node="">, unless the alien is subject to mandatory denial of withholding of removal under </span><a class="cfr external" data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%282%29"><span data-dcnode-id="2309" instrument_node="">§ 208.16(d)(2)</span></a><span data-dcnode-id="2307" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29%283%29"><span data-dcnode-id="2306" instrument_node="">(d)(3)</span></a><span data-dcnode-id="2304" instrument_node="">, in which case the alien will be considered to have been granted deferral of removal under 208.17(a). If, prior to March 22, 1999, the Service determined that an alien can be removed consistent with the Convention Against Torture, the alien will be considered to have been finally denied withholding of removal under </span><a class="cfr external" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="2303" instrument_node="">§ 208.16(c)</span></a><span data-dcnode-id="2301" instrument_node=""> and deferral of removal under </span><a class="cfr external" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28a%29"><span data-dcnode-id="2300" instrument_node="">§ 208.17(a)</span></a><span data-dcnode-id="2298" instrument_node="">. </span></p><span data-dcnode-id="2296" instrument_node="">
</span></div><span data-dcnode-id="2294" instrument_node="">
</span></div><span data-dcnode-id="2292" instrument_node="">
</span><div data-dcnode-id="2236" id="p-208.18(c)"><span data-dcnode-id="2291" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2280" data-title="208.18(c)"><span class="paragraph-hierarchy" data-dcnode-id="2285"><span class="paren" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">(</span></span><span data-dcnode-id="2288" instrument_node="">c</span><span class="paren" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">)</span></span></span><span data-dcnode-id="2284" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Diplomatic assurances against torture obtained by the Secretary of State.</span></em><span data-dcnode-id="2281" instrument_node=""> </span></p><span data-dcnode-id="2279" instrument_node="">
</span><div data-dcnode-id="2268" id="p-208.18(c)(1)"><span data-dcnode-id="2278" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2270" data-title="208.18(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2272"><span class="paren" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">(</span></span><span data-dcnode-id="2275" instrument_node="">1</span><span class="paren" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">)</span></span></span><span data-dcnode-id="2271" instrument_node=""> The Secretary of State may forward to the Attorney General assurances that the Secretary has obtained from the government of a specific country that an alien would not be tortured there if the alien were removed to that country. </span></p><span data-dcnode-id="2269" instrument_node="">
</span></div><span data-dcnode-id="2267" instrument_node="">
</span><div data-dcnode-id="2253" id="p-208.18(c)(2)"><span data-dcnode-id="2266" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2255" data-title="208.18(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2260"><span class="paren" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">(</span></span><span data-dcnode-id="2263" instrument_node="">2</span><span class="paren" data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">)</span></span></span><span data-dcnode-id="2259" instrument_node=""> If the Secretary of State forwards assurances described in </span><a class="cfr external" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28c%29%281%29"><span data-dcnode-id="2258" instrument_node="">paragraph (c)(1)</span></a><span data-dcnode-id="2256" instrument_node=""> of this section to the Attorney General for consideration by the Attorney General or her delegates under this paragraph, the Attorney General shall determine, in consultation with the Secretary of State, whether the assurances are sufficiently reliable to allow the alien's removal to that country consistent with Article 3 of the Convention Against Torture. The Attorney General's authority under this paragraph may be exercised by the Deputy Attorney General or by the Commissioner, Immigration and Naturalization Service, but may not be further delegated. </span></p><span data-dcnode-id="2254" instrument_node="">
</span></div><span data-dcnode-id="2252" instrument_node="">
</span><div data-dcnode-id="2238" id="p-208.18(c)(3)"><span data-dcnode-id="2251" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2240" data-title="208.18(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="2245"><span class="paren" data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">(</span></span><span data-dcnode-id="2248" instrument_node="">3</span><span class="paren" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">)</span></span></span><span data-dcnode-id="2244" instrument_node=""> Once assurances are provided under </span><a class="cfr external" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28c%29%282%29"><span data-dcnode-id="2243" instrument_node="">paragraph (c)(2)</span></a><span data-dcnode-id="2241" instrument_node=""> of this section, the alien's claim for protection under the Convention Against Torture shall not be considered further by an immigration judge, the Board of Immigration Appeals, or an asylum officer. </span></p><span data-dcnode-id="2239" instrument_node="">
</span></div><span data-dcnode-id="2237" instrument_node="">
</span></div><span data-dcnode-id="2235" instrument_node="">
</span><div data-dcnode-id="2221" id="p-208.18(d)"><span data-dcnode-id="2234" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2223" data-title="208.18(d)"><span class="paragraph-hierarchy" data-dcnode-id="2228"><span class="paren" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">(</span></span><span data-dcnode-id="2231" instrument_node="">d</span><span class="paren" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">)</span></span></span><span data-dcnode-id="2227" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Cases involving aliens ordered removed under section 235(c) of the Act.</span></em><span data-dcnode-id="2224" instrument_node="">  With respect to an alien terrorist or other alien subject to administrative removal under section 235(c) of the Act who requests protection under Article 3 of the Convention Against Torture, the Service will assess the applicability of Article 3 through the removal process to ensure that a removal order will not be executed under circumstances that would violate the obligations of the United States under Article 3. In such cases, the provisions of Part 208 relating to consideration or review by an immigration judge, the Board of Immigration Appeals, or an asylum officer shall not apply. </span></p><span data-dcnode-id="2222" instrument_node="">
</span></div><span data-dcnode-id="2220" instrument_node="">
</span><div data-dcnode-id="2184" id="p-208.18(e)"><span data-dcnode-id="2219" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2208" data-title="208.18(e)"><span class="paragraph-hierarchy" data-dcnode-id="2213"><span class="paren" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">(</span></span><span data-dcnode-id="2216" instrument_node="">e</span><span class="paren" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">)</span></span></span><span data-dcnode-id="2212" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Judicial review of claims for protection from removal under Article 3 of the Convention Against Torture.</span></em><span data-dcnode-id="2209" instrument_node=""> </span></p><span data-dcnode-id="2207" instrument_node="">
</span><div data-dcnode-id="2196" id="p-208.18(e)(1)"><span data-dcnode-id="2206" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2198" data-title="208.18(e)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2200"><span class="paren" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">(</span></span><span data-dcnode-id="2203" instrument_node="">1</span><span class="paren" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">)</span></span></span><span data-dcnode-id="2199" instrument_node=""> Pursuant to the provisions of section 2242(d) of the Foreign Affairs Reform and Restructuring Act of 1998, there shall be no judicial appeal or review of any action, decision, or claim raised under the Convention or that section, except as part of the review of a final order of removal pursuant to section 242 of the Act; provided however, that any appeal or petition regarding an action, decision, or claim under the Convention or under section 2242 of the Foreign Affairs Reform and Restructuring Act of 1998 shall not be deemed to include or authorize the consideration of any administrative order or decision, or portion thereof, the appeal or review of which is restricted or prohibited by the Act. </span></p><span data-dcnode-id="2197" instrument_node="">
</span></div><span data-dcnode-id="2195" instrument_node="">
</span><div data-dcnode-id="2186" id="p-208.18(e)(2)"><p class="indent-2" data-dcnode-id="2187" data-title="208.18(e)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2189"><span class="paren" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">(</span></span><span data-dcnode-id="2192" instrument_node="">2</span><span class="paren" data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">)</span></span></span><span data-dcnode-id="2188" instrument_node=""> Except as otherwise expressly provided, nothing in this paragraph shall be construed to create a private right of action or to authorize the consideration or issuance of administrative or judicial relief. </span></p></div><span data-dcnode-id="2185" instrument_node="">
</span></div><span data-dcnode-id="2183" instrument_node="">
</span><p class="citation" data-dcnode-id="2172"><span data-dcnode-id="2182" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="2180" data-reference="64 FR 8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8490"><span data-dcnode-id="2181" instrument_node="">64 FR 8490</span></a><span data-dcnode-id="2179" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="2177" data-reference="64 FR 13881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-13881"><span data-dcnode-id="2178" instrument_node="">64 FR 13881</span></a><span data-dcnode-id="2176" instrument_node="">, Mar. 23, 1999, as amended at </span><a class="fr-reference" data-dcnode-id="2174" data-reference="85 FR 80389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80389"><span data-dcnode-id="2175" instrument_node="">85 FR 80389</span></a><span data-dcnode-id="2173" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="2171" instrument_node="">
</span></div><span data-dcnode-id="2169" instrument_node="">
</span><div class="section" data-dcnode-id="2145" id="208.19"><span data-dcnode-id="2168" instrument_node="">
</span><h4 data-dcnode-id="2165"><a class="direct" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.19"><span data-dcnode-id="2167" instrument_node="">§ 208.19 Decisions.</span></a></h4><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2163" instrument_node="">The decision of an asylum officer to grant or to deny asylum or to refer an asylum application, in accordance with </span><a class="cfr external" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.14%23p-208.14%28b%29"><span data-dcnode-id="2162" instrument_node="">§ 208.14(b)</span></a><span data-dcnode-id="2160" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.14%23p-208.14%28c%29"><span data-dcnode-id="2159" instrument_node="">(c)</span></a><span data-dcnode-id="2157" instrument_node="">, shall be communicated in writing to the applicant. Pursuant to </span><a class="cfr external" data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28d%29"><span data-dcnode-id="2156" instrument_node="">§ 208.9(d)</span></a><span data-dcnode-id="2154" instrument_node="">, an applicant must appear in person to receive and to acknowledge receipt of the decision to grant or deny asylum, or to refer an asylum application unless, in the discretion of the asylum office director, service by mail is appropriate. A letter communicating denial of asylum or referral of the application shall state the basis for denial or referral and include an assessment of the applicant's credibility. </span></p><span data-dcnode-id="2152" instrument_node="">
</span><p class="citation" data-dcnode-id="2147"><span data-dcnode-id="2151" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="2149" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="2150" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="2148" instrument_node="">, Dec. 6, 2000] </span></p><span data-dcnode-id="2146" instrument_node="">
</span></div><span data-dcnode-id="2144" instrument_node="">
</span><div class="section" data-dcnode-id="1921" id="208.20"><span data-dcnode-id="2143" instrument_node="">
</span><h4 data-dcnode-id="2140"><a class="direct" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.20"><span data-dcnode-id="2142" instrument_node="">§ 208.20 Determining if an asylum application is frivolous.</span></a></h4><span data-dcnode-id="2139" instrument_node="">
</span><div data-dcnode-id="2098" id="p-208.20(a)"><span data-dcnode-id="2138" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2130" data-title="208.20(a)"><span class="paragraph-hierarchy" data-dcnode-id="2132"><span class="paren" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">(</span></span><span data-dcnode-id="2135" instrument_node="">a</span><span class="paren" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">)</span></span></span><span data-dcnode-id="2131" instrument_node=""> For applications filed on or after April 1, 1997, and before January 11, 2021, an applicant is subject to the provisions of section 208(d)(6) of the Act only if the alien received the notice required by section 208(d)(4)(A) of the Act and a final order by an immigration judge or the Board of Immigration Appeals specifically finds that the alien knowingly filed a frivolous asylum application. An application is frivolous if: </span></p><span data-dcnode-id="2129" instrument_node="">
</span><div data-dcnode-id="2118" id="p-208.20(a)(1)"><span data-dcnode-id="2128" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2120" data-title="208.20(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2122"><span class="paren" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">(</span></span><span data-dcnode-id="2125" instrument_node="">1</span><span class="paren" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">)</span></span></span><span data-dcnode-id="2121" instrument_node=""> Any of the material elements in the asylum application is deliberately fabricated, and the immigration judge or the Board is satisfied that the applicant, during the course of the proceedings, has had sufficient opportunity to account for any discrepancies or implausible aspects of the claim. </span></p><span data-dcnode-id="2119" instrument_node="">
</span></div><span data-dcnode-id="2117" instrument_node="">
</span><div data-dcnode-id="2100" id="p-208.20(a)(2)"><span data-dcnode-id="2116" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2102" data-title="208.20(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2110"><span class="paren" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">(</span></span><span data-dcnode-id="2113" instrument_node="">2</span><span class="paren" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">)</span></span></span><span data-dcnode-id="2109" instrument_node=""> </span><a class="cfr external" data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.20%23p-208.20%28b%29"><span data-dcnode-id="2108" instrument_node="">Paragraphs (b)</span></a><span data-dcnode-id="2106" instrument_node=""> through </span><a class="cfr external" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.20%23p-208.20%28f%29"><span data-dcnode-id="2105" instrument_node="">(f)</span></a><span data-dcnode-id="2103" instrument_node=""> of this section shall only apply to applications filed on or after January 11, 2021. </span></p><span data-dcnode-id="2101" instrument_node="">
</span></div><span data-dcnode-id="2099" instrument_node="">
</span></div><span data-dcnode-id="2097" instrument_node="">
</span><div data-dcnode-id="2083" id="p-208.20(b)"><span data-dcnode-id="2096" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2085" data-title="208.20(b)"><span class="paragraph-hierarchy" data-dcnode-id="2090"><span class="paren" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">(</span></span><span data-dcnode-id="2093" instrument_node="">b</span><span class="paren" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">)</span></span></span><span data-dcnode-id="2089" instrument_node=""> For applications filed on or after January 11, 2021, an asylum officer may determine that the applicant knowingly filed a frivolous asylum application and may refer the applicant to an immigration judge on that basis, so long as the applicant has received the notice required by section 208(d)(4)(A) of the Act. For any application referred to an immigration judge, an asylum officer's determination that an application is frivolous will not render an applicant permanently ineligible for immigration benefits unless an immigration judge or the Board makes a finding of frivolousness as described in paragraph 1</span><a class="cfr external" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.20%23p-208.20%28c%29"><span data-dcnode-id="2088" instrument_node="">208.20(c)</span></a><span data-dcnode-id="2086" instrument_node="">. </span></p><span data-dcnode-id="2084" instrument_node="">
</span></div><span data-dcnode-id="2082" instrument_node="">
</span><div data-dcnode-id="2023" id="p-208.20(c)"><span data-dcnode-id="2081" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2073" data-title="208.20(c)"><span class="paragraph-hierarchy" data-dcnode-id="2075"><span class="paren" data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">(</span></span><span data-dcnode-id="2078" instrument_node="">c</span><span class="paren" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">)</span></span></span><span data-dcnode-id="2074" instrument_node=""> For applications filed on or after January 11, 2021, an asylum application is frivolous if it: </span></p><span data-dcnode-id="2072" instrument_node="">
</span><div data-dcnode-id="2061" id="p-208.20(c)(1)"><span data-dcnode-id="2071" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2063" data-title="208.20(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="2065"><span class="paren" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">(</span></span><span data-dcnode-id="2068" instrument_node="">1</span><span class="paren" data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">)</span></span></span><span data-dcnode-id="2064" instrument_node=""> Contains a fabricated material element; </span></p><span data-dcnode-id="2062" instrument_node="">
</span></div><span data-dcnode-id="2060" instrument_node="">
</span><div data-dcnode-id="2049" id="p-208.20(c)(2)"><span data-dcnode-id="2059" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2051" data-title="208.20(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="2053"><span class="paren" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">(</span></span><span data-dcnode-id="2056" instrument_node="">2</span><span class="paren" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">)</span></span></span><span data-dcnode-id="2052" instrument_node=""> Is premised upon false or fabricated evidence unless the application would have been granted without the false or fabricated evidence; </span></p><span data-dcnode-id="2050" instrument_node="">
</span></div><span data-dcnode-id="2048" instrument_node="">
</span><div data-dcnode-id="2037" id="p-208.20(c)(3)"><span data-dcnode-id="2047" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2039" data-title="208.20(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="2041"><span class="paren" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">(</span></span><span data-dcnode-id="2044" instrument_node="">3</span><span class="paren" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">)</span></span></span><span data-dcnode-id="2040" instrument_node=""> Is filed without regard to the merits of the claim; or </span></p><span data-dcnode-id="2038" instrument_node="">
</span></div><span data-dcnode-id="2036" instrument_node="">
</span><div data-dcnode-id="2025" id="p-208.20(c)(4)"><span data-dcnode-id="2035" instrument_node="">
</span><p class="indent-2" data-dcnode-id="2027" data-title="208.20(c)(4)"><span class="paragraph-hierarchy" data-dcnode-id="2029"><span class="paren" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">(</span></span><span data-dcnode-id="2032" instrument_node="">4</span><span class="paren" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">)</span></span></span><span data-dcnode-id="2028" instrument_node=""> Is clearly foreclosed by applicable law. </span></p><span data-dcnode-id="2026" instrument_node="">
</span></div><span data-dcnode-id="2024" instrument_node="">
</span></div><span data-dcnode-id="2022" instrument_node="">
</span><div data-dcnode-id="2011" id="p-208.20(d)"><span data-dcnode-id="2021" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2013" data-title="208.20(d)"><span class="paragraph-hierarchy" data-dcnode-id="2015"><span class="paren" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">(</span></span><span data-dcnode-id="2018" instrument_node="">d</span><span class="paren" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">)</span></span></span><span data-dcnode-id="2014" instrument_node=""> If the alien has been provided the warning required by section 208(d)(4)(A) of the Act, he or she need not be given any additional or further opportunity to account for any issues with his or her claim prior to the entry of a frivolousness finding. </span></p><span data-dcnode-id="2012" instrument_node="">
</span></div><span data-dcnode-id="2010" instrument_node="">
</span><div data-dcnode-id="1999" id="p-208.20(e)"><span data-dcnode-id="2009" instrument_node="">
</span><p class="indent-1" data-dcnode-id="2001" data-title="208.20(e)"><span class="paragraph-hierarchy" data-dcnode-id="2003"><span class="paren" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">(</span></span><span data-dcnode-id="2006" instrument_node="">e</span><span class="paren" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">)</span></span></span><span data-dcnode-id="2002" instrument_node=""> An asylum application may be found frivolous even if it was untimely filed. </span></p><span data-dcnode-id="2000" instrument_node="">
</span></div><span data-dcnode-id="1998" instrument_node="">
</span><div data-dcnode-id="1939" id="p-208.20(f)"><span data-dcnode-id="1997" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1989" data-title="208.20(f)"><span class="paragraph-hierarchy" data-dcnode-id="1991"><span class="paren" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">(</span></span><span data-dcnode-id="1994" instrument_node="">f</span><span class="paren" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">)</span></span></span><span data-dcnode-id="1990" instrument_node=""> A withdrawn asylum application may also be found frivolous unless: </span></p><span data-dcnode-id="1988" instrument_node="">
</span><div data-dcnode-id="1977" id="p-208.20(f)(1)"><span data-dcnode-id="1987" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1979" data-title="208.20(f)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1981"><span class="paren" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">(</span></span><span data-dcnode-id="1984" instrument_node="">1</span><span class="paren" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">)</span></span></span><span data-dcnode-id="1980" instrument_node=""> The alien wholly disclaims the application and withdraws it with prejudice; </span></p><span data-dcnode-id="1978" instrument_node="">
</span></div><span data-dcnode-id="1976" instrument_node="">
</span><div data-dcnode-id="1965" id="p-208.20(f)(2)"><span data-dcnode-id="1975" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1967" data-title="208.20(f)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1969"><span class="paren" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">(</span></span><span data-dcnode-id="1972" instrument_node="">2</span><span class="paren" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">)</span></span></span><span data-dcnode-id="1968" instrument_node=""> The alien is eligible for and agrees to accept voluntary departure for a period of no more than 30 days pursuant to section 240B(a) of the Act; </span></p><span data-dcnode-id="1966" instrument_node="">
</span></div><span data-dcnode-id="1964" instrument_node="">
</span><div data-dcnode-id="1953" id="p-208.20(f)(3)"><span data-dcnode-id="1963" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1955" data-title="208.20(f)(3)"><span class="paragraph-hierarchy" data-dcnode-id="1957"><span class="paren" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">(</span></span><span data-dcnode-id="1960" instrument_node="">3</span><span class="paren" data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">)</span></span></span><span data-dcnode-id="1956" instrument_node=""> The alien withdraws any and all other applications for relief or protection with prejudice; and </span></p><span data-dcnode-id="1954" instrument_node="">
</span></div><span data-dcnode-id="1952" instrument_node="">
</span><div data-dcnode-id="1941" id="p-208.20(f)(4)"><span data-dcnode-id="1951" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1943" data-title="208.20(f)(4)"><span class="paragraph-hierarchy" data-dcnode-id="1945"><span class="paren" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">(</span></span><span data-dcnode-id="1948" instrument_node="">4</span><span class="paren" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">)</span></span></span><span data-dcnode-id="1944" instrument_node=""> The alien waives his right to appeal and any rights to file, for any reason, a motion to reopen or reconsider. </span></p><span data-dcnode-id="1942" instrument_node="">
</span></div><span data-dcnode-id="1940" instrument_node="">
</span></div><span data-dcnode-id="1938" instrument_node="">
</span><div data-dcnode-id="1929" id="p-208.20(g)"><p class="indent-1" data-dcnode-id="1930" data-title="208.20(g)"><span class="paragraph-hierarchy" data-dcnode-id="1932"><span class="paren" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">(</span></span><span data-dcnode-id="1935" instrument_node="">g</span><span class="paren" data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">)</span></span></span><span data-dcnode-id="1931" instrument_node=""> For purposes of this section, a finding that an alien knowingly filed a frivolous asylum application shall not preclude the alien from seeking withholding of removal under section 241(b)(3) of the Act or protection under the regulations issued pursuant to the Convention Against Torture's implementing legislation. </span></p></div><span data-dcnode-id="1928" instrument_node="">
</span><p class="citation" data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="1925" data-reference="85 FR 80389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80389"><span data-dcnode-id="1926" instrument_node="">85 FR 80389</span></a><span data-dcnode-id="1924" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="1922" instrument_node="">
</span></div><span data-dcnode-id="1920" instrument_node="">
</span><div class="section" data-dcnode-id="1748" id="208.21"><span data-dcnode-id="1919" instrument_node="">
</span><h4 data-dcnode-id="1916"><a class="direct" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.21"><span data-dcnode-id="1918" instrument_node="">§ 208.21 Admission of the asylee's spouse and children.</span></a></h4><span data-dcnode-id="1915" instrument_node="">
</span><div data-dcnode-id="1883" id="p-208.21(a)"><span data-dcnode-id="1914" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1885" data-title="208.21(a)"><span class="paragraph-hierarchy" data-dcnode-id="1908"><span class="paren" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">(</span></span><span data-dcnode-id="1911" instrument_node="">a</span><span class="paren" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">)</span></span></span><span data-dcnode-id="1907" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Eligibility.</span></em><span data-dcnode-id="1904" instrument_node="">  In accordance with section 208(b)(3) of the Act, a spouse, as defined in section 101(a)(35) of the Act, </span><a class="usc external" data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/uscode/8/1101" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1903" instrument_node="">8 U.S.C. 1101(a)(35)</span></a><span data-dcnode-id="1901" instrument_node="">, or child, as defined in section 101(b)(1) of the Act, also may be granted asylum if accompanying, or following to join, the principal alien who was granted asylum, unless it is determined that the spouse or child is ineligible for asylum under section 208(b)(2)(A)(i), (ii), (iii), (iv) or (v) of the Act for applications filed on or after April 1, 1997, or under </span><a class="cfr external" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29%28i%29%28A%29"><span data-dcnode-id="1900" instrument_node="">§ 208.13(c)(2)(i)(A)</span></a><span data-dcnode-id="1898" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29%28i%29%28C%29"><span data-dcnode-id="1897" instrument_node="">(C)</span></a><span data-dcnode-id="1895" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29%28i%29%28D%29"><span data-dcnode-id="1894" instrument_node="">(D)</span></a><span data-dcnode-id="1892" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29%28i%29%28E%29"><span data-dcnode-id="1891" instrument_node="">(E)</span></a><span data-dcnode-id="1889" instrument_node="">, or </span><a class="cfr external" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29%28i%29%28F%29"><span data-dcnode-id="1888" instrument_node="">(F)</span></a><span data-dcnode-id="1886" instrument_node=""> for applications filed before April 1, 1997. </span></p><span data-dcnode-id="1884" instrument_node="">
</span></div><span data-dcnode-id="1882" instrument_node="">
</span><div data-dcnode-id="1865" id="p-208.21(b)"><span data-dcnode-id="1881" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1867" data-title="208.21(b)"><span class="paragraph-hierarchy" data-dcnode-id="1875"><span class="paren" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">(</span></span><span data-dcnode-id="1878" instrument_node="">b</span><span class="paren" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">)</span></span></span><span data-dcnode-id="1874" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Relationship.</span></em><span data-dcnode-id="1871" instrument_node="">  The relationship of spouse and child as defined in sections 101(a)(35) and 101(b)(1) of the Act must have existed at the time the principal alien's asylum application was approved and must continue to exist at the time of filing for accompanying or following-to-join benefits and at the time of the spouse or child's subsequent admission to the United States. If the asylee proves that the asylee is the parent of a child who was born after asylum was granted, but who was </span><em data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">in utero</span></em><span data-dcnode-id="1868" instrument_node=""> on the date of the asylum grant, the child shall be eligible to accompany or follow-to-join the asylee. The child's mother, if not the principal asylee, shall not be eligible to accompany or follow-to-join the principal asylee unless the child's mother was the principal asylee's spouse on the date the principal asylee was granted asylum. </span></p><span data-dcnode-id="1866" instrument_node="">
</span></div><span data-dcnode-id="1864" instrument_node="">
</span><div data-dcnode-id="1847" id="p-208.21(c)"><span data-dcnode-id="1863" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1849" data-title="208.21(c)"><span class="paragraph-hierarchy" data-dcnode-id="1857"><span class="paren" data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">(</span></span><span data-dcnode-id="1860" instrument_node="">c</span><span class="paren" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">)</span></span></span><span data-dcnode-id="1856" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Spouse or child in the United States.</span></em><span data-dcnode-id="1853" instrument_node="">  When a spouse or child of an alien granted asylum is in the United States, but was not included in the asylee's benefit request, the asylee may request accompanying or following-to-join benefits for his or her spouse or child, by filing for each qualifying family member a Request for Refugee/Asylee Relative, with supporting evidence, and in accordance with the form instructions, regardless of the status of that spouse or child in the United States. A separate Request for Refugee/Asylee Relative must be filed by the asylee for each qualifying family member within two years of the date in which he or she was granted asylum status, unless it is determined by USCIS that this period should be extended for humanitarian reasons. Upon approval of the Request for Refugee/Asylee Relative, USCIS will notify the asylee of such approval. Employment will be authorized incident to status. To demonstrate employment authorization, USCIS will issue a document reflecting the derivative's current status as an asylee, or the derivative may apply, under </span><a class="cfr external" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12%23p-274a.12%28a%29"><span data-dcnode-id="1852" instrument_node="">8 CFR 274a.12(a)</span></a><span data-dcnode-id="1850" instrument_node="">, for employment authorization. The approval of the Request for Refugee/Asylee Relative will remain valid for the duration of the relationship to the asylee and, in the case of a child, while the child is under 21 years of age and unmarried, provided also that the principal's status has not been revoked. However, the approved Request for Refugee/Asylee Relative will cease to confer immigration benefits after it has been used by the beneficiary for admission to the United States as a derivative of an asylee. </span></p><span data-dcnode-id="1848" instrument_node="">
</span></div><span data-dcnode-id="1846" instrument_node="">
</span><div data-dcnode-id="1832" id="p-208.21(d)"><span data-dcnode-id="1845" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1834" data-title="208.21(d)"><span class="paragraph-hierarchy" data-dcnode-id="1839"><span class="paren" data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">(</span></span><span data-dcnode-id="1842" instrument_node="">d</span><span class="paren" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">)</span></span></span><span data-dcnode-id="1838" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Spouse or child outside the United States.</span></em><span data-dcnode-id="1835" instrument_node="">  When a spouse or child of an alien granted asylum is outside the United States, the asylee may request accompanying or following-to-join benefits for his or her spouse or child(ren) by filing a separate Request for Refugee/Asylee Relative for each qualifying family member in accordance with the form instructions. A separate Request for Refugee/Asylee Relative for each qualifying family member must be filed within two years of the date in which the asylee was granted asylum, unless USCIS determines that the filing period should be extended for humanitarian reasons. When the Request for Refugee/Asylee Relative is approved, USCIS will notify the asylee of such approval. USCIS also will send the approved request to the Department of State for transmission to the U.S. Embassy or Consulate having jurisdiction over the area in which the asylee's spouse or child is located. The approval of the Request for Refugee/Asylee Relative will remain valid for the duration of the relationship to the asylee and, in the case of a child, while the child is under 21 years of age and unmarried, provided also that the principal's status has not been revoked. However, the approved Request for Refugee/Asylee Relative will cease to confer immigration benefits after it has been used by the beneficiary for admission to the United States as a derivative of an asylee. </span></p><span data-dcnode-id="1833" instrument_node="">
</span></div><span data-dcnode-id="1831" instrument_node="">
</span><div data-dcnode-id="1817" id="p-208.21(e)"><span data-dcnode-id="1830" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1819" data-title="208.21(e)"><span class="paragraph-hierarchy" data-dcnode-id="1824"><span class="paren" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">(</span></span><span data-dcnode-id="1827" instrument_node="">e</span><span class="paren" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">)</span></span></span><span data-dcnode-id="1823" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Denial.</span></em><span data-dcnode-id="1820" instrument_node="">  If the spouse or child is found to be ineligible for the status accorded under section 208(c) of the Act, a written notice stating the basis for denial shall be forwarded to the principal alien. No appeal shall lie from this decision. </span></p><span data-dcnode-id="1818" instrument_node="">
</span></div><span data-dcnode-id="1816" instrument_node="">
</span><div data-dcnode-id="1784" id="p-208.21(f)"><span data-dcnode-id="1815" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1786" data-title="208.21(f)"><span class="paragraph-hierarchy" data-dcnode-id="1809"><span class="paren" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">(</span></span><span data-dcnode-id="1812" instrument_node="">f</span><span class="paren" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">)</span></span></span><span data-dcnode-id="1808" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Burden of proof.</span></em><span data-dcnode-id="1805" instrument_node="">  To establish the claimed relationship of spouse or child as defined in sections 101(a)(35) and 101(b)(1) of the Act, evidence must be submitted with the request as set forth in </span><a class="cfr external" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-204"><span data-dcnode-id="1804" instrument_node="">part 204 of this chapter</span></a><span data-dcnode-id="1802" instrument_node="">. Where possible this will consist of the documents specified in </span><a class="cfr external" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-204.2%23p-204.2%28a%29%281%29%28i%29%28B%29"><span data-dcnode-id="1801" instrument_node="">§ 204.2 (a)(1)(i)(B)</span></a><span data-dcnode-id="1799" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-204.2%23p-204.2%28a%29%281%29%28iii%29%28B%29"><span data-dcnode-id="1798" instrument_node="">(a)(1)(iii)(B)</span></a><span data-dcnode-id="1796" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-204.2%23p-204.2%28a%29%282%29"><span data-dcnode-id="1795" instrument_node="">(a)(2)</span></a><span data-dcnode-id="1793" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-204.2%23p-204.2%28d%29%282%29"><span data-dcnode-id="1792" instrument_node="">(d)(2)</span></a><span data-dcnode-id="1790" instrument_node="">, and </span><a class="cfr external" data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-204.2%23p-204.2%28d%29%285%29"><span data-dcnode-id="1789" instrument_node="">(d)(5) of this chapter</span></a><span data-dcnode-id="1787" instrument_node="">. The burden of proof is on the principal alien to establish by a preponderance of the evidence that any person on whose behalf he or she is making a request under this section is an eligible spouse or child. </span></p><span data-dcnode-id="1785" instrument_node="">
</span></div><span data-dcnode-id="1783" instrument_node="">
</span><div data-dcnode-id="1771" id="p-208.21(g)"><p class="indent-1" data-dcnode-id="1772" data-title="208.21(g)"><span class="paragraph-hierarchy" data-dcnode-id="1777"><span class="paren" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">(</span></span><span data-dcnode-id="1780" instrument_node="">g</span><span class="paren" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">)</span></span></span><span data-dcnode-id="1776" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Duration.</span></em><span data-dcnode-id="1773" instrument_node="">  The spouse or child qualifying under section 208(c) of the Act shall be granted asylum for an indefinite period unless the principal's status is revoked. </span></p></div><span data-dcnode-id="1770" instrument_node="">
</span><p class="citation" data-dcnode-id="1750"><span data-dcnode-id="1769" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="1767" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="1768" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="1766" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="1764" data-reference="63 FR 3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/63-FR-3796"><span data-dcnode-id="1765" instrument_node="">63 FR 3796</span></a><span data-dcnode-id="1763" instrument_node="">, Jan. 27, 1998. Redesignated at </span><a class="fr-reference" data-dcnode-id="1761" data-reference="64 FR 8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8490"><span data-dcnode-id="1762" instrument_node="">64 FR 8490</span></a><span data-dcnode-id="1760" instrument_node="">, Feb. 19, 1999 and further redesignated and amended at </span><a class="fr-reference" data-dcnode-id="1758" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="1759" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="1757" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="1755" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="1756" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="1754" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="1752" data-reference="76 FR 73476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-73476"><span data-dcnode-id="1753" instrument_node="">76 FR 73476</span></a><span data-dcnode-id="1751" instrument_node="">, Nov. 29, 2011] </span></p><span data-dcnode-id="1749" instrument_node="">
</span></div><span data-dcnode-id="1747" instrument_node="">
</span><div class="section" data-dcnode-id="1717" id="208.22"><span data-dcnode-id="1746" instrument_node="">
</span><h4 data-dcnode-id="1743"><a class="direct" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.22"><span data-dcnode-id="1745" instrument_node="">§ 208.22 Effect on exclusion, deportation, and removal proceedings.</span></a></h4><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1741" instrument_node="">An alien who has been granted asylum may not be deported or removed unless his or her asylum status is terminated pursuant to </span><a class="cfr external" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24"><span data-dcnode-id="1740" instrument_node="">§ 208.24</span></a><span data-dcnode-id="1738" instrument_node="">. An alien in exclusion, deportation, or removal proceedings who is granted withholding of removal or deportation, or deferral of removal, may not be deported or removed to the country to which his or her deportation or removal is ordered withheld or deferred unless the withholding order is terminated pursuant to </span><a class="cfr external" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24"><span data-dcnode-id="1737" instrument_node="">§ 208.24</span></a><span data-dcnode-id="1735" instrument_node=""> or deferral is terminated pursuant to </span><a class="cfr external" data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28d%29"><span data-dcnode-id="1734" instrument_node="">§ 208.17(d)</span></a><span data-dcnode-id="1732" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17%23p-208.17%28e%29"><span data-dcnode-id="1731" instrument_node="">(e)</span></a><span data-dcnode-id="1729" instrument_node="">. </span></p><span data-dcnode-id="1727" instrument_node="">
