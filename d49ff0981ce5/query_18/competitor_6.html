</span><div class="section" data-dcnode-id="5679" id="208.11"><span data-dcnode-id="5775" instrument_node="">
</span><h4 data-dcnode-id="5772"><a class="direct" data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.11"><span data-dcnode-id="5774" instrument_node="">§ 208.11 Comments from the Department of State.</span></a></h4><span data-dcnode-id="5771" instrument_node="">
</span><div data-dcnode-id="5760" id="p-208.11(a)"><span data-dcnode-id="5770" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5762" data-title="208.11(a)"><span class="paragraph-hierarchy" data-dcnode-id="5764"><span class="paren" data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">(</span></span><span data-dcnode-id="5767" instrument_node="">a</span><span class="paren" data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">)</span></span></span><span data-dcnode-id="5763" instrument_node=""> U.S. Citizenship and Immigration Services (USCIS) may request, at its discretion, specific comments from the Department of State regarding individual cases or types of claims under consideration, or such other information as USCIS deems appropriate. </span></p><span data-dcnode-id="5761" instrument_node="">
</span></div><span data-dcnode-id="5759" instrument_node="">
</span><div data-dcnode-id="5700" id="p-208.11(b)"><span data-dcnode-id="5758" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5750" data-title="208.11(b)"><span class="paragraph-hierarchy" data-dcnode-id="5752"><span class="paren" data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">(</span></span><span data-dcnode-id="5755" instrument_node="">b</span><span class="paren" data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">)</span></span></span><span data-dcnode-id="5751" instrument_node=""> With respect to any asylum application, the Department of State may provide, at its discretion, to USCIS: </span></p><span data-dcnode-id="5749" instrument_node="">
</span><div data-dcnode-id="5738" id="p-208.11(b)(1)"><span data-dcnode-id="5748" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5740" data-title="208.11(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="5742"><span class="paren" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">(</span></span><span data-dcnode-id="5745" instrument_node="">1</span><span class="paren" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">)</span></span></span><span data-dcnode-id="5741" instrument_node=""> Detailed country conditions information relevant to eligibility for asylum or withholding of removal; </span></p><span data-dcnode-id="5739" instrument_node="">
</span></div><span data-dcnode-id="5737" instrument_node="">
</span><div data-dcnode-id="5726" id="p-208.11(b)(2)"><span data-dcnode-id="5736" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5728" data-title="208.11(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="5730"><span class="paren" data-dcnode-id="5734"><span data-dcnode-id="5735" instrument_node="">(</span></span><span data-dcnode-id="5733" instrument_node="">2</span><span class="paren" data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">)</span></span></span><span data-dcnode-id="5729" instrument_node=""> An assessment of the accuracy of the applicant's assertions about conditions in his or her country of nationality or habitual residence and his or her particular situation; </span></p><span data-dcnode-id="5727" instrument_node="">
</span></div><span data-dcnode-id="5725" instrument_node="">
</span><div data-dcnode-id="5714" id="p-208.11(b)(3)"><span data-dcnode-id="5724" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5716" data-title="208.11(b)(3)"><span class="paragraph-hierarchy" data-dcnode-id="5718"><span class="paren" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">(</span></span><span data-dcnode-id="5721" instrument_node="">3</span><span class="paren" data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">)</span></span></span><span data-dcnode-id="5717" instrument_node=""> Information about whether persons who are similarly situated to the applicant are persecuted or tortured in the applicant's country of nationality or habitual residence and the frequency of such persecution or torture; or </span></p><span data-dcnode-id="5715" instrument_node="">
</span></div><span data-dcnode-id="5713" instrument_node="">
</span><div data-dcnode-id="5702" id="p-208.11(b)(4)"><span data-dcnode-id="5712" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5704" data-title="208.11(b)(4)"><span class="paragraph-hierarchy" data-dcnode-id="5706"><span class="paren" data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">(</span></span><span data-dcnode-id="5709" instrument_node="">4</span><span class="paren" data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">)</span></span></span><span data-dcnode-id="5705" instrument_node=""> Such other information as it deems relevant. </span></p><span data-dcnode-id="5703" instrument_node="">
</span></div><span data-dcnode-id="5701" instrument_node="">
</span></div><span data-dcnode-id="5699" instrument_node="">
</span><div data-dcnode-id="5687" id="p-208.11(c)"><p class="indent-1" data-dcnode-id="5688" data-title="208.11(c)"><span class="paragraph-hierarchy" data-dcnode-id="5693"><span class="paren" data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">(</span></span><span data-dcnode-id="5696" instrument_node="">c</span><span class="paren" data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">)</span></span></span><span data-dcnode-id="5692" instrument_node=""> Any comments received pursuant to </span><a class="cfr external" data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.11%23p-208.11%28b%29"><span data-dcnode-id="5691" instrument_node="">paragraph (b)</span></a><span data-dcnode-id="5689" instrument_node=""> of this section shall be made part of the record. Unless the comments are classified under the applicable Executive Order, the applicant shall be provided an opportunity to review and respond to such comments prior to the issuance of any decision to deny the application. </span></p></div><span data-dcnode-id="5686" instrument_node="">
</span><p class="citation" data-dcnode-id="5681"><span data-dcnode-id="5685" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="5683" data-reference="74 FR 15369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-15369"><span data-dcnode-id="5684" instrument_node="">74 FR 15369</span></a><span data-dcnode-id="5682" instrument_node="">, Apr. 6, 2009] </span></p><span data-dcnode-id="5680" instrument_node="">
</span></div><span data-dcnode-id="5678" instrument_node="">
</span><div class="section" data-dcnode-id="5626" id="208.12"><span data-dcnode-id="5677" instrument_node="">
</span><h4 data-dcnode-id="5674"><a class="direct" data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.12"><span data-dcnode-id="5676" instrument_node="">§ 208.12 Reliance on information compiled by other sources.</span></a></h4><span data-dcnode-id="5673" instrument_node="">
</span><div data-dcnode-id="5656" id="p-208.12(a)"><span data-dcnode-id="5672" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5658" data-title="208.12(a)"><span class="paragraph-hierarchy" data-dcnode-id="5666"><span class="paren" data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">(</span></span><span data-dcnode-id="5669" instrument_node="">a</span><span class="paren" data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">)</span></span></span><span data-dcnode-id="5665" instrument_node=""> In deciding an asylum application, or in deciding whether the alien has a credible fear of persecution or torture pursuant to </span><a class="cfr external" data-dcnode-id="5663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/section-208.30"><span data-dcnode-id="5664" instrument_node="">§ 208.30 of this part</span></a><span data-dcnode-id="5662" instrument_node="">, or a reasonable fear of persecution or torture pursuant to </span><a class="cfr external" data-dcnode-id="5660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="5661" instrument_node="">§ 208.31</span></a><span data-dcnode-id="5659" instrument_node="">, the asylum officer may rely on material provided by the Department of State, other USCIS offices, or other credible sources, such as international organizations, private voluntary agencies, news organizations, or academic institutions. </span></p><span data-dcnode-id="5657" instrument_node="">
</span></div><span data-dcnode-id="5655" instrument_node="">
</span><div data-dcnode-id="5643" id="p-208.12(b)"><p class="indent-1" data-dcnode-id="5644" data-title="208.12(b)"><span class="paragraph-hierarchy" data-dcnode-id="5649"><span class="paren" data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">(</span></span><span data-dcnode-id="5652" instrument_node="">b</span><span class="paren" data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">)</span></span></span><span data-dcnode-id="5648" instrument_node=""> Nothing in this part shall be construed to entitle the applicant to conduct discovery directed toward the records, officers, agents, or employees of the Service, the Department of Justice, or the Department of State. Persons may continue to seek documents available through a Freedom of Information Act (FOIA) request pursuant to </span><a class="cfr external" data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-103"><span data-dcnode-id="5647" instrument_node="">8 CFR part 103</span></a><span data-dcnode-id="5645" instrument_node="">. </span></p></div><span data-dcnode-id="5642" instrument_node="">
</span><p class="citation" data-dcnode-id="5628"><span data-dcnode-id="5641" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="5639" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="5640" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="5638" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="5636" data-reference="64 FR 8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8488"><span data-dcnode-id="5637" instrument_node="">64 FR 8488</span></a><span data-dcnode-id="5635" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="5633" data-reference="65 FR 76133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76133"><span data-dcnode-id="5634" instrument_node="">65 FR 76133</span></a><span data-dcnode-id="5632" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="5630" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="5631" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="5629" instrument_node="">, Aug. 29, 2011] </span></p><span data-dcnode-id="5627" instrument_node="">

</span><div class="content-block" data-dcnode-id="5564"><span data-dcnode-id="5568" instrument_node="">This amendment was further delayed until Dec. 31, 2022, at </span><a class="fr-reference" data-dcnode-id="5566" data-reference="86 FR 73615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-73615"><span data-dcnode-id="5567" instrument_node="">86 FR 73615</span></a><span data-dcnode-id="5565" instrument_node="">, Dec. 28, 2021.</span></div><span data-dcnode-id="5563" instrument_node="">

</span><div data-dcnode-id="5546" id="p-208.13(a)"><span data-dcnode-id="5559" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5548" data-title="208.13(a)"><span class="paragraph-hierarchy" data-dcnode-id="5553"><span class="paren" data-dcnode-id="5557"><span data-dcnode-id="5558" instrument_node="">(</span></span><span data-dcnode-id="5556" instrument_node="">a</span><span class="paren" data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">)</span></span></span><span data-dcnode-id="5552" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">Burden of proof.</span></em><span data-dcnode-id="5549" instrument_node="">  The burden of proof is on the applicant for asylum to establish that he or she is a refugee as defined in section 101(a)(42) of the Act. The testimony of the applicant, if credible, may be sufficient to sustain the burden of proof without corroboration. The fact that the applicant previously established a credible fear of persecution for purposes of section 235(b)(1)(B) of the Act does not relieve the alien of the additional burden of establishing eligibility for asylum. </span></p><span data-dcnode-id="5547" instrument_node="">
</span></div><span data-dcnode-id="5545" instrument_node="">
</span><div data-dcnode-id="5213" id="p-208.13(b)"><span data-dcnode-id="5544" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5533" data-title="208.13(b)"><span class="paragraph-hierarchy" data-dcnode-id="5538"><span class="paren" data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">(</span></span><span data-dcnode-id="5541" instrument_node="">b</span><span class="paren" data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">)</span></span></span><span data-dcnode-id="5537" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">Eligibility.</span></em><span data-dcnode-id="5534" instrument_node="">  The applicant may qualify as a refugee either because he or she has suffered past persecution or because he or she has a well-founded fear of future persecution. </span></p><span data-dcnode-id="5532" instrument_node="">
</span><div data-dcnode-id="5404" id="p-208.13(b)(1)"><span data-dcnode-id="5531" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5517" data-title="208.13(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="5525"><span class="paren" data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">(</span></span><span data-dcnode-id="5528" instrument_node="">1</span><span class="paren" data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">)</span></span></span><span data-dcnode-id="5524" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">Past persecution.</span></em><span data-dcnode-id="5521" instrument_node="">  An applicant shall be found to be a refugee on the basis of past persecution if the applicant can establish that he or she has suffered persecution in the past in the applicant's country of nationality or, if stateless, in his or her country of last habitual residence, on account of race, religion, nationality, membership in a particular social group, or political opinion, and is unable or unwilling to return to, or avail himself or herself of the protection of, that country owing to such persecution. An applicant who has been found to have established such past persecution shall also be presumed to have a well-founded fear of persecution on the basis of the original claim. That presumption may be rebutted if an asylum officer or immigration judge makes one of the findings described in </span><a class="cfr external" data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28i%29"><span data-dcnode-id="5520" instrument_node="">paragraph (b)(1)(i)</span></a><span data-dcnode-id="5518" instrument_node=""> of this section. If the applicant's fear of future persecution is unrelated to the past persecution, the applicant bears the burden of establishing that the fear is well-founded. </span></p><span data-dcnode-id="5516" instrument_node="">
</span><div data-dcnode-id="5475" id="p-208.13(b)(1)(i)"><span data-dcnode-id="5515" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5501" data-title="208.13(b)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5509"><span class="paren" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">(</span></span><span data-dcnode-id="5512" instrument_node="">i</span><span class="paren" data-dcnode-id="5510"><span data-dcnode-id="5511" instrument_node="">)</span></span></span><span data-dcnode-id="5508" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">Discretionary referral or denial.</span></em><span data-dcnode-id="5505" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28iii%29"><span data-dcnode-id="5504" instrument_node="">paragraph (b)(1)(iii)</span></a><span data-dcnode-id="5502" instrument_node=""> of this section, an asylum officer shall, in the exercise of his or her discretion, refer or deny, or an immigration judge, in the exercise of his or her discretion, shall deny the asylum application of an alien found to be a refugee on the basis of past persecution if any of the following is found by a preponderance of the evidence: </span></p><span data-dcnode-id="5500" instrument_node="">
</span><div data-dcnode-id="5489" id="p-208.13(b)(1)(i)(A)"><span data-dcnode-id="5499" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5491" data-title="208.13(b)(1)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="5493"><span class="paren" data-dcnode-id="5497"><span data-dcnode-id="5498" instrument_node="">(</span></span><span data-dcnode-id="5496" instrument_node="">A</span><span class="paren" data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">)</span></span></span><span data-dcnode-id="5492" instrument_node=""> There has been a fundamental change in circumstances such that the applicant no longer has a well-founded fear of persecution in the applicant's country of nationality or, if stateless, in the applicant's country of last habitual residence, on account of race, religion, nationality, membership in a particular social group, or political opinion; or </span></p><span data-dcnode-id="5490" instrument_node="">
</span></div><span data-dcnode-id="5488" instrument_node="">
</span><div data-dcnode-id="5477" id="p-208.13(b)(1)(i)(B)"><span data-dcnode-id="5487" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5479" data-title="208.13(b)(1)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="5481"><span class="paren" data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">(</span></span><span data-dcnode-id="5484" instrument_node="">B</span><span class="paren" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">)</span></span></span><span data-dcnode-id="5480" instrument_node=""> The applicant could avoid future persecution by relocating to another part of the applicant's country of nationality or, if stateless, another part of the applicant's country of last habitual residence, and under all the circumstances, it would be reasonable to expect the applicant to do so. </span></p><span data-dcnode-id="5478" instrument_node="">
</span></div><span data-dcnode-id="5476" instrument_node="">
</span></div><span data-dcnode-id="5474" instrument_node="">
</span><div data-dcnode-id="5451" id="p-208.13(b)(1)(ii)"><span data-dcnode-id="5473" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5453" data-title="208.13(b)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5467"><span class="paren" data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">(</span></span><span data-dcnode-id="5470" instrument_node="">ii</span><span class="paren" data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">)</span></span></span><span data-dcnode-id="5466" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">Burden of proof.</span></em><span data-dcnode-id="5463" instrument_node="">  In cases in which an applicant has demonstrated past persecution under </span><a class="cfr external" data-dcnode-id="5461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29"><span data-dcnode-id="5462" instrument_node="">paragraph (b)(1)</span></a><span data-dcnode-id="5460" instrument_node=""> of this section, the Service shall bear the burden of establishing by a preponderance of the evidence the requirements of </span><a class="cfr external" data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28i%29%28A%29"><span data-dcnode-id="5459" instrument_node="">paragraphs (b)(1)(i)(A)</span></a><span data-dcnode-id="5457" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28i%29%28B%29"><span data-dcnode-id="5456" instrument_node="">(B)</span></a><span data-dcnode-id="5454" instrument_node=""> of this section. </span></p><span data-dcnode-id="5452" instrument_node="">
</span></div><span data-dcnode-id="5450" instrument_node="">
</span><div data-dcnode-id="5406" id="p-208.13(b)(1)(iii)"><span data-dcnode-id="5449" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5432" data-title="208.13(b)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="5443"><span class="paren" data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">(</span></span><span data-dcnode-id="5446" instrument_node="">iii</span><span class="paren" data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">)</span></span></span><span data-dcnode-id="5442" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">Grant in the absence of well-founded fear of persecution.</span></em><span data-dcnode-id="5439" instrument_node="">  An applicant described in </span><a class="cfr external" data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28i%29"><span data-dcnode-id="5438" instrument_node="">paragraph (b)(1)(i)</span></a><span data-dcnode-id="5436" instrument_node=""> of this section who is not barred from a grant of asylum under </span><a class="cfr external" data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29"><span data-dcnode-id="5435" instrument_node="">paragraph (c)</span></a><span data-dcnode-id="5433" instrument_node=""> of this section, may be granted asylum, in the exercise of the decision-maker's discretion, if: </span></p><span data-dcnode-id="5431" instrument_node="">
</span><div data-dcnode-id="5420" id="p-208.13(b)(1)(iii)(A)"><span data-dcnode-id="5430" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5422" data-title="208.13(b)(1)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="5424"><span class="paren" data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">(</span></span><span data-dcnode-id="5427" instrument_node="">A</span><span class="paren" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">)</span></span></span><span data-dcnode-id="5423" instrument_node=""> The applicant has demonstrated compelling reasons for being unwilling or unable to return to the country arising out of the severity of the past persecution; or </span></p><span data-dcnode-id="5421" instrument_node="">
</span></div><span data-dcnode-id="5419" instrument_node="">
</span><div data-dcnode-id="5408" id="p-208.13(b)(1)(iii)(B)"><span data-dcnode-id="5418" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5410" data-title="208.13(b)(1)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="5412"><span class="paren" data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">(</span></span><span data-dcnode-id="5415" instrument_node="">B</span><span class="paren" data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">)</span></span></span><span data-dcnode-id="5411" instrument_node=""> The applicant has established that there is a reasonable possibility that he or she may suffer other serious harm upon removal to that country. </span></p><span data-dcnode-id="5409" instrument_node="">
</span></div><span data-dcnode-id="5407" instrument_node="">
</span></div><span data-dcnode-id="5405" instrument_node="">
</span></div><span data-dcnode-id="5403" instrument_node="">
</span><div data-dcnode-id="5293" id="p-208.13(b)(2)"><span data-dcnode-id="5402" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5391" data-title="208.13(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="5396"><span class="paren" data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">(</span></span><span data-dcnode-id="5399" instrument_node="">2</span><span class="paren" data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">)</span></span></span><span data-dcnode-id="5395" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Well-founded fear of persecution.</span></em><span data-dcnode-id="5392" instrument_node=""> </span></p><span data-dcnode-id="5390" instrument_node="">
</span><div data-dcnode-id="5343" id="p-208.13(b)(2)(i)"><span data-dcnode-id="5389" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5381" data-title="208.13(b)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5383"><span class="paren" data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">(</span></span><span data-dcnode-id="5386" instrument_node="">i</span><span class="paren" data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">)</span></span></span><span data-dcnode-id="5382" instrument_node=""> An applicant has a well-founded fear of persecution if: </span></p><span data-dcnode-id="5380" instrument_node="">
</span><div data-dcnode-id="5369" id="p-208.13(b)(2)(i)(A)"><span data-dcnode-id="5379" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5371" data-title="208.13(b)(2)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="5373"><span class="paren" data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">(</span></span><span data-dcnode-id="5376" instrument_node="">A</span><span class="paren" data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">)</span></span></span><span data-dcnode-id="5372" instrument_node=""> The applicant has a fear of persecution in his or her country of nationality or, if stateless, in his or her country of last habitual residence, on account of race, religion, nationality, membership in a particular social group, or political opinion; </span></p><span data-dcnode-id="5370" instrument_node="">
</span></div><span data-dcnode-id="5368" instrument_node="">
</span><div data-dcnode-id="5357" id="p-208.13(b)(2)(i)(B)"><span data-dcnode-id="5367" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5359" data-title="208.13(b)(2)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="5361"><span class="paren" data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">(</span></span><span data-dcnode-id="5364" instrument_node="">B</span><span class="paren" data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">)</span></span></span><span data-dcnode-id="5360" instrument_node=""> There is a reasonable possibility of suffering such persecution if he or she were to return to that country; and </span></p><span data-dcnode-id="5358" instrument_node="">
</span></div><span data-dcnode-id="5356" instrument_node="">
</span><div data-dcnode-id="5345" id="p-208.13(b)(2)(i)(C)"><span data-dcnode-id="5355" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5347" data-title="208.13(b)(2)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="5349"><span class="paren" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">(</span></span><span data-dcnode-id="5352" instrument_node="">C</span><span class="paren" data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">)</span></span></span><span data-dcnode-id="5348" instrument_node=""> He or she is unable or unwilling to return to, or avail himself or herself of the protection of, that country because of such fear. </span></p><span data-dcnode-id="5346" instrument_node="">
</span></div><span data-dcnode-id="5344" instrument_node="">
</span></div><span data-dcnode-id="5342" instrument_node="">
</span><div data-dcnode-id="5331" id="p-208.13(b)(2)(ii)"><span data-dcnode-id="5341" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5333" data-title="208.13(b)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5335"><span class="paren" data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">(</span></span><span data-dcnode-id="5338" instrument_node="">ii</span><span class="paren" data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">)</span></span></span><span data-dcnode-id="5334" instrument_node=""> An applicant does not have a well-founded fear of persecution if the applicant could avoid persecution by relocating to another part of the applicant's country of nationality or, if stateless, another part of the applicant's country of last habitual residence, if under all the circumstances it would be reasonable to expect the applicant to do so. </span></p><span data-dcnode-id="5332" instrument_node="">
</span></div><span data-dcnode-id="5330" instrument_node="">
</span><div data-dcnode-id="5295" id="p-208.13(b)(2)(iii)"><span data-dcnode-id="5329" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5321" data-title="208.13(b)(2)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="5323"><span class="paren" data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">(</span></span><span data-dcnode-id="5326" instrument_node="">iii</span><span class="paren" data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">)</span></span></span><span data-dcnode-id="5322" instrument_node=""> In evaluating whether the applicant has sustained the burden of proving that he or she has a well-founded fear of persecution, the asylum officer or immigration judge shall not require the applicant to provide evidence that there is a reasonable possibility he or she would be singled out individually for persecution if: </span></p><span data-dcnode-id="5320" instrument_node="">
</span><div data-dcnode-id="5309" id="p-208.13(b)(2)(iii)(A)"><span data-dcnode-id="5319" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5311" data-title="208.13(b)(2)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="5313"><span class="paren" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">(</span></span><span data-dcnode-id="5316" instrument_node="">A</span><span class="paren" data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">)</span></span></span><span data-dcnode-id="5312" instrument_node=""> The applicant establishes that there is a pattern or practice in his or her country of nationality or, if stateless, in his or her country of last habitual residence, of persecution of a group of persons similarly situated to the applicant on account of race, religion, nationality, membership in a particular social group, or political opinion; and </span></p><span data-dcnode-id="5310" instrument_node="">
</span></div><span data-dcnode-id="5308" instrument_node="">
</span><div data-dcnode-id="5297" id="p-208.13(b)(2)(iii)(B)"><span data-dcnode-id="5307" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5299" data-title="208.13(b)(2)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="5301"><span class="paren" data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">(</span></span><span data-dcnode-id="5304" instrument_node="">B</span><span class="paren" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">)</span></span></span><span data-dcnode-id="5300" instrument_node=""> The applicant establishes his or her own inclusion in, and identification with, such group of persons such that his or her fear of persecution upon return is reasonable. </span></p><span data-dcnode-id="5298" instrument_node="">
</span></div><span data-dcnode-id="5296" instrument_node="">
</span></div><span data-dcnode-id="5294" instrument_node="">
</span></div><span data-dcnode-id="5292" instrument_node="">
</span><div data-dcnode-id="5215" id="p-208.13(b)(3)"><span data-dcnode-id="5291" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5271" data-title="208.13(b)(3)"><span class="paragraph-hierarchy" data-dcnode-id="5285"><span class="paren" data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">(</span></span><span data-dcnode-id="5288" instrument_node="">3</span><span class="paren" data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">)</span></span></span><span data-dcnode-id="5284" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">Reasonableness of internal relocation.</span></em><span data-dcnode-id="5281" instrument_node="">  For purposes of determinations under </span><a class="cfr external" data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28i%29"><span data-dcnode-id="5280" instrument_node="">paragraphs (b)(1)(i)</span></a><span data-dcnode-id="5278" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%281%29%28ii%29"><span data-dcnode-id="5277" instrument_node="">(ii)</span></a><span data-dcnode-id="5275" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%282%29"><span data-dcnode-id="5274" instrument_node="">(b)(2)</span></a><span data-dcnode-id="5272" instrument_node=""> of this section, adjudicators should consider the totality of the relevant circumstances regarding an applicant's prospects for relocation, including the size of the country of nationality or last habitual residence, the geographic locus of the alleged persecution, the size, reach, or numerosity of the alleged persecutor, and the applicant's demonstrated ability to relocate to the United States in order to apply for asylum. </span></p><span data-dcnode-id="5270" instrument_node="">
</span><div data-dcnode-id="5259" id="p-208.13(b)(3)(i)"><span data-dcnode-id="5269" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5261" data-title="208.13(b)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5263"><span class="paren" data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">(</span></span><span data-dcnode-id="5266" instrument_node="">i</span><span class="paren" data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">)</span></span></span><span data-dcnode-id="5262" instrument_node=""> In cases in which the applicant has not established past persecution, the applicant shall bear the burden of establishing that it would not be reasonable for him or her to relocate, unless the persecution is by a government or is government-sponsored. </span></p><span data-dcnode-id="5260" instrument_node="">
</span></div><span data-dcnode-id="5258" instrument_node="">
</span><div data-dcnode-id="5247" id="p-208.13(b)(3)(ii)"><span data-dcnode-id="5257" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5249" data-title="208.13(b)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5251"><span class="paren" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">(</span></span><span data-dcnode-id="5254" instrument_node="">ii</span><span class="paren" data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">)</span></span></span><span data-dcnode-id="5250" instrument_node=""> In cases in which the persecutor is a government or is government-sponsored, it shall be presumed that internal relocation would not be reasonable, unless DHS establishes by a preponderance of the evidence that, under all the circumstances, it would be reasonable for the applicant to relocate. </span></p><span data-dcnode-id="5248" instrument_node="">
</span></div><span data-dcnode-id="5246" instrument_node="">
</span><div data-dcnode-id="5235" id="p-208.13(b)(3)(iii)"><span data-dcnode-id="5245" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5237" data-title="208.13(b)(3)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="5239"><span class="paren" data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">(</span></span><span data-dcnode-id="5242" instrument_node="">iii</span><span class="paren" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">)</span></span></span><span data-dcnode-id="5238" instrument_node=""> Regardless of whether an applicant has established persecution in the past, in cases in which the persecutor is not the government or a government-sponsored actor, or otherwise is a private actor, there shall be a presumption that internal relocation would be reasonable unless the applicant establishes, by a preponderance of the evidence, that it would be unreasonable to relocate. </span></p><span data-dcnode-id="5236" instrument_node="">
</span></div><span data-dcnode-id="5234" instrument_node="">
</span><div data-dcnode-id="5217" id="p-208.13(b)(3)(iv)"><span data-dcnode-id="5233" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5219" data-title="208.13(b)(3)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="5227"><span class="paren" data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">(</span></span><span data-dcnode-id="5230" instrument_node="">iv</span><span class="paren" data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">)</span></span></span><span data-dcnode-id="5226" instrument_node=""> For purposes of determinations under </span><a class="cfr external" data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%283%29%28ii%29"><span data-dcnode-id="5225" instrument_node="">paragraphs (b)(3)(ii)</span></a><span data-dcnode-id="5223" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28b%29%283%29%28iii%29"><span data-dcnode-id="5222" instrument_node="">(iii)</span></a><span data-dcnode-id="5220" instrument_node=""> of this section, persecutors who are private actors - including persecutors who are gang members, officials acting outside their official capacity, family members who are not themselves government officials, or neighbors who are not themselves government officials - shall not be considered to be persecutors who are the government or government-sponsored absent evidence that the government sponsored the persecution. </span></p><span data-dcnode-id="5218" instrument_node="">
</span></div><span data-dcnode-id="5216" instrument_node="">
</span></div><span data-dcnode-id="5214" instrument_node="">
</span></div><span data-dcnode-id="5212" instrument_node="">
</span><div data-dcnode-id="4443" id="p-208.13(c)"><span data-dcnode-id="5211" instrument_node="">
</span><p class="indent-1" data-dcnode-id="5200" data-title="208.13(c)"><span class="paragraph-hierarchy" data-dcnode-id="5205"><span class="paren" data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">(</span></span><span data-dcnode-id="5208" instrument_node="">c</span><span class="paren" data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">)</span></span></span><span data-dcnode-id="5204" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Mandatory denials</span></em><span data-dcnode-id="5201" instrument_node="">  - </span></p><span data-dcnode-id="5199" instrument_node="">
</span><div data-dcnode-id="5185" id="p-208.13(c)(1)"><span data-dcnode-id="5198" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5187" data-title="208.13(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="5192"><span class="paren" data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">(</span></span><span data-dcnode-id="5195" instrument_node="">1</span><span class="paren" data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">)</span></span></span><span data-dcnode-id="5191" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">Applications filed on or after April 1, 1997.</span></em><span data-dcnode-id="5188" instrument_node="">  For applications filed on or after April 1, 1997, an applicant shall not qualify for asylum if section 208(a)(2) or 208(b)(2) of the Act applies to the applicant. If the applicant is found to be ineligible for asylum under either section 208(a)(2) or 208(b)(2) of the Act, the applicant shall be considered for eligibility for withholding of removal under section 241(b)(3) of the Act. The applicant shall also be considered for eligibility for withholding of removal under the Convention Against Torture if the applicant requests such consideration or if the evidence presented by the alien indicates that the alien may be tortured in the country of removal. </span></p><span data-dcnode-id="5186" instrument_node="">
</span></div><span data-dcnode-id="5184" instrument_node="">
</span><div data-dcnode-id="5071" id="p-208.13(c)(2)"><span data-dcnode-id="5183" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5172" data-title="208.13(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="5177"><span class="paren" data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">(</span></span><span data-dcnode-id="5180" instrument_node="">2</span><span class="paren" data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">)</span></span></span><span data-dcnode-id="5176" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">Applications filed before April 1, 1997.</span></em><span data-dcnode-id="5173" instrument_node=""> </span></p><span data-dcnode-id="5171" instrument_node="">
</span><div data-dcnode-id="5085" id="p-208.13(c)(2)(i)"><span data-dcnode-id="5170" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5162" data-title="208.13(c)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5164"><span class="paren" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">(</span></span><span data-dcnode-id="5167" instrument_node="">i</span><span class="paren" data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">)</span></span></span><span data-dcnode-id="5163" instrument_node=""> An immigration judge or asylum officer shall not grant asylum to any applicant who filed his or her application before April 1, 1997, if the alien: </span></p><span data-dcnode-id="5161" instrument_node="">
</span><div data-dcnode-id="5150" id="p-208.13(c)(2)(i)(A)"><span data-dcnode-id="5160" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5152" data-title="208.13(c)(2)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="5154"><span class="paren" data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">(</span></span><span data-dcnode-id="5157" instrument_node="">A</span><span class="paren" data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">)</span></span></span><span data-dcnode-id="5153" instrument_node=""> Having been convicted by a final judgment of a particularly serious crime in the United States, constitutes a danger to the community; </span></p><span data-dcnode-id="5151" instrument_node="">
</span></div><span data-dcnode-id="5149" instrument_node="">
</span><div data-dcnode-id="5135" id="p-208.13(c)(2)(i)(B)"><span data-dcnode-id="5148" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5137" data-title="208.13(c)(2)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="5142"><span class="paren" data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">(</span></span><span data-dcnode-id="5145" instrument_node="">B</span><span class="paren" data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">)</span></span></span><span data-dcnode-id="5141" instrument_node=""> Has been firmly resettled within the meaning of </span><a class="cfr external" data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.15"><span data-dcnode-id="5140" instrument_node="">§ 208.15</span></a><span data-dcnode-id="5138" instrument_node="">; </span></p><span data-dcnode-id="5136" instrument_node="">
</span></div><span data-dcnode-id="5134" instrument_node="">
</span><div data-dcnode-id="5123" id="p-208.13(c)(2)(i)(C)"><span data-dcnode-id="5133" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5125" data-title="208.13(c)(2)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="5127"><span class="paren" data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">(</span></span><span data-dcnode-id="5130" instrument_node="">C</span><span class="paren" data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">)</span></span></span><span data-dcnode-id="5126" instrument_node=""> Can reasonably be regarded as a danger to the security of the United States; </span></p><span data-dcnode-id="5124" instrument_node="">
</span></div><span data-dcnode-id="5122" instrument_node="">
</span><div data-dcnode-id="5111" id="p-208.13(c)(2)(i)(D)"><span data-dcnode-id="5121" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5113" data-title="208.13(c)(2)(i)(D)"><span class="paragraph-hierarchy" data-dcnode-id="5115"><span class="paren" data-dcnode-id="5119"><span data-dcnode-id="5120" instrument_node="">(</span></span><span data-dcnode-id="5118" instrument_node="">D</span><span class="paren" data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">)</span></span></span><span data-dcnode-id="5114" instrument_node=""> Has been convicted of an aggravated felony, as defined in section 101(a)(43) of the Act; or </span></p><span data-dcnode-id="5112" instrument_node="">
</span></div><span data-dcnode-id="5110" instrument_node="">
</span><div data-dcnode-id="5099" id="p-208.13(c)(2)(i)(E)"><span data-dcnode-id="5109" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5101" data-title="208.13(c)(2)(i)(E)"><span class="paragraph-hierarchy" data-dcnode-id="5103"><span class="paren" data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">(</span></span><span data-dcnode-id="5106" instrument_node="">E</span><span class="paren" data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">)</span></span></span><span data-dcnode-id="5102" instrument_node=""> Ordered, incited, assisted, or otherwise participated in the persecution of any person on account of race, religion, nationality, membership in a particular social group, or political opinion. </span></p><span data-dcnode-id="5100" instrument_node="">
</span></div><span data-dcnode-id="5098" instrument_node="">
</span><div data-dcnode-id="5087" id="p-208.13(c)(2)(i)(F)"><span data-dcnode-id="5097" instrument_node="">
</span><p class="indent-4" data-dcnode-id="5089" data-title="208.13(c)(2)(i)(F)"><span class="paragraph-hierarchy" data-dcnode-id="5091"><span class="paren" data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">(</span></span><span data-dcnode-id="5094" instrument_node="">F</span><span class="paren" data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">)</span></span></span><span data-dcnode-id="5090" instrument_node=""> Is described within section 212(a)(3)(B)(i)(I),(II), and (III) of the Act as it existed prior to April 1, 1997, and as amended by the Anti-terrorist and Effective Death Penalty Act of 1996 (AEDPA), unless it is determined that there are no reasonable grounds to believe that the individual is a danger to the security of the United States. </span></p><span data-dcnode-id="5088" instrument_node="">
</span></div><span data-dcnode-id="5086" instrument_node="">
</span></div><span data-dcnode-id="5084" instrument_node="">
</span><div data-dcnode-id="5073" id="p-208.13(c)(2)(ii)"><span data-dcnode-id="5083" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5075" data-title="208.13(c)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5077"><span class="paren" data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">(</span></span><span data-dcnode-id="5080" instrument_node="">ii</span><span class="paren" data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">)</span></span></span><span data-dcnode-id="5076" instrument_node=""> If the evidence indicates that one of the above grounds apply to the applicant, he or she shall have the burden of proving by a preponderance of the evidence that he or she did not so act. </span></p><span data-dcnode-id="5074" instrument_node="">
</span></div><span data-dcnode-id="5072" instrument_node="">
</span></div><span data-dcnode-id="5070" instrument_node="">
</span><div data-dcnode-id="5056" id="p-208.13(c)(3)"><span data-dcnode-id="5069" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5058" data-title="208.13(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="5063"><span class="paren" data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">(</span></span><span data-dcnode-id="5066" instrument_node="">3</span><span class="paren" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">)</span></span></span><span data-dcnode-id="5062" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">Additional limitation on eligibility for asylum.</span></em><span data-dcnode-id="5059" instrument_node="">  For applications filed after November 9, 2018, an alien shall be ineligible for asylum if the alien is subject to a presidential proclamation or other presidential order suspending or limiting the entry of aliens along the southern border with Mexico that is issued pursuant to subsection 212(f) or 215(a)(1) of the Act on or after November 9, 2018 and the alien enters the United States after the effective date of the proclamation or order contrary to the terms of the proclamation or order. This limitation on eligibility does not apply if the proclamation or order expressly provides that it does not affect eligibility for asylum, or expressly provides for a waiver or exception that makes the suspension or limitation inapplicable to the alien. </span></p><span data-dcnode-id="5057" instrument_node="">
</span></div><span data-dcnode-id="5055" instrument_node="">
</span><div data-dcnode-id="4999" id="p-208.13(c)(4)"><span data-dcnode-id="5054" instrument_node="">
</span><p class="indent-2" data-dcnode-id="5040" data-title="208.13(c)(4)"><span class="paragraph-hierarchy" data-dcnode-id="5048"><span class="paren" data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">(</span></span><span data-dcnode-id="5051" instrument_node="">4</span><span class="paren" data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">)</span></span></span><span data-dcnode-id="5047" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Additional limitation on eligibility for asylum.</span></em><span data-dcnode-id="5044" instrument_node="">  Notwithstanding the provisions of </span><a class="cfr external" data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.15"><span data-dcnode-id="5043" instrument_node="">§ 208.15</span></a><span data-dcnode-id="5041" instrument_node="">, any alien who enters, attempts to enter, or arrives in the United States across the southern land border on or after July 16, 2019, after transiting through at least one country outside the alien's country of citizenship, nationality, or last lawful habitual residence en route to the United States, shall be found ineligible for asylum unless: </span></p><span data-dcnode-id="5039" instrument_node="">
</span><div data-dcnode-id="5028" id="p-208.13(c)(4)(i)"><span data-dcnode-id="5038" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5030" data-title="208.13(c)(4)(i)"><span class="paragraph-hierarchy" data-dcnode-id="5032"><span class="paren" data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">(</span></span><span data-dcnode-id="5035" instrument_node="">i</span><span class="paren" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">)</span></span></span><span data-dcnode-id="5031" instrument_node=""> The alien demonstrates that he or she applied for protection from persecution in at least one country outside the alien's country of citizenship, nationality, or last lawful habitual residence through which the alien transited en route to the United States and the alien received a final judgment denying the alien protection in such country. </span></p><span data-dcnode-id="5029" instrument_node="">
</span></div><span data-dcnode-id="5027" instrument_node="">
</span><div data-dcnode-id="5013" id="p-208.13(c)(4)(ii)"><span data-dcnode-id="5026" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5015" data-title="208.13(c)(4)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="5020"><span class="paren" data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">(</span></span><span data-dcnode-id="5023" instrument_node="">ii</span><span class="paren" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">)</span></span></span><span data-dcnode-id="5019" instrument_node=""> The alien demonstrates that he or she satisfies the definition of “victim of a severe form of trafficking in persons” provided in </span><a class="cfr external" data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-214.11"><span data-dcnode-id="5018" instrument_node="">8 CFR 214.11</span></a><span data-dcnode-id="5016" instrument_node="">; or </span></p><span data-dcnode-id="5014" instrument_node="">
</span></div><span data-dcnode-id="5012" instrument_node="">
</span><div data-dcnode-id="5001" id="p-208.13(c)(4)(iii)"><span data-dcnode-id="5011" instrument_node="">
</span><p class="indent-3" data-dcnode-id="5003" data-title="208.13(c)(4)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="5005"><span class="paren" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">(</span></span><span data-dcnode-id="5008" instrument_node="">iii</span><span class="paren" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">)</span></span></span><span data-dcnode-id="5004" instrument_node=""> The only country or countries through which the alien transited en route to the United States were, at the time of the transit, not parties to the 1951 United Nations Convention relating to the Status of Refugees or the 1967 Protocol relating to the Status of Refugees. </span></p><span data-dcnode-id="5002" instrument_node="">
</span></div><span data-dcnode-id="5000" instrument_node="">
</span></div><span data-dcnode-id="4998" instrument_node="">
</span><div data-dcnode-id="4975" id="p-208.13(c)(5)"><span data-dcnode-id="4997" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4977" data-title="208.13(c)(5)"><span class="paragraph-hierarchy" data-dcnode-id="4991"><span class="paren" data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">(</span></span><span data-dcnode-id="4994" instrument_node="">5</span><span class="paren" data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">)</span></span></span><span data-dcnode-id="4990" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">Non-binding determinations.</span></em><span data-dcnode-id="4987" instrument_node="">  Determinations made with respect to </span><a class="cfr external" data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%284%29%28ii%29"><span data-dcnode-id="4986" instrument_node="">paragraph (c)(4)(ii)</span></a><span data-dcnode-id="4984" instrument_node=""> of this section are not binding on Federal departments or agencies in subsequent determinations of eligibility for T or U nonimmigrant status under section 101(a)(15)(T) or (U) of the INA or for benefits or services under </span><a class="usc external" data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/uscode/22/7105" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4983" instrument_node="">22 U.S.C. 7105</span></a><span data-dcnode-id="4981" instrument_node=""> or </span><a class="usc external" data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/uscode/8/1641" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4980" instrument_node="">8 U.S.C. 1641(c)(4)</span></a><span data-dcnode-id="4978" instrument_node="">. </span></p><span data-dcnode-id="4976" instrument_node="">
</span></div><span data-dcnode-id="4974" instrument_node="">
</span><div data-dcnode-id="4598" id="p-208.13(c)(6)"><span data-dcnode-id="4973" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4962" data-title="208.13(c)(6)"><span class="paragraph-hierarchy" data-dcnode-id="4967"><span class="paren" data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">(</span></span><span data-dcnode-id="4970" instrument_node="">6</span><span class="paren" data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">)</span></span></span><span data-dcnode-id="4966" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">Additional limitations on eligibility for asylum.</span></em><span data-dcnode-id="4963" instrument_node="">  For applications filed on or after November 20, 2020, an alien shall be found ineligible for asylum if: </span></p><span data-dcnode-id="4961" instrument_node="">
</span><div data-dcnode-id="4950" id="p-208.13(c)(6)(i)"><span data-dcnode-id="4960" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4952" data-title="208.13(c)(6)(i)"><span class="paragraph-hierarchy" data-dcnode-id="4954"><span class="paren" data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">(</span></span><span data-dcnode-id="4957" instrument_node="">i</span><span class="paren" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">)</span></span></span><span data-dcnode-id="4953" instrument_node=""> The alien has been convicted on or after such date of an offense arising under sections 274(a)(1)(A), 274(a)(2), or 276 of the Act; </span></p><span data-dcnode-id="4951" instrument_node="">
</span></div><span data-dcnode-id="4949" instrument_node="">
</span><div data-dcnode-id="4938" id="p-208.13(c)(6)(ii)"><span data-dcnode-id="4948" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4940" data-title="208.13(c)(6)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="4942"><span class="paren" data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">(</span></span><span data-dcnode-id="4945" instrument_node="">ii</span><span class="paren" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">)</span></span></span><span data-dcnode-id="4941" instrument_node=""> The alien has been convicted on or after such date of a Federal, State, tribal, or local crime that the asylum officer knows or has reason to believe was committed in support, promotion, or furtherance of the activity of a criminal street gang as that term is defined either under the jurisdiction where the conviction occurred or in section 521(a) of title 18; </span></p><span data-dcnode-id="4939" instrument_node="">
</span></div><span data-dcnode-id="4937" instrument_node="">
</span><div data-dcnode-id="4926" id="p-208.13(c)(6)(iii)"><span data-dcnode-id="4936" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4928" data-title="208.13(c)(6)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="4930"><span class="paren" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">(</span></span><span data-dcnode-id="4933" instrument_node="">iii</span><span class="paren" data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">)</span></span></span><span data-dcnode-id="4929" instrument_node=""> The alien has been convicted on or after such date of an offense for driving while intoxicated or impaired as those terms are defined under the jurisdiction where the conviction occurred (including a conviction for driving while under the influence of or impaired by alcohol or drugs) without regard to whether the conviction is classified as a misdemeanor or felony under Federal, State, tribal, or local law, in which such impaired driving was a cause of serious bodily injury or death of another person; </span></p><span data-dcnode-id="4927" instrument_node="">
</span></div><span data-dcnode-id="4925" instrument_node="">
</span><div data-dcnode-id="4887" id="p-208.13(c)(6)(iv)"><span data-dcnode-id="4924" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4916" data-title="208.13(c)(6)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="4918"><span class="paren" data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">(</span></span><span data-dcnode-id="4921" instrument_node="">iv</span><span class="paren" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">)</span></span></span><span data-dcnode-id="4917" instrument_node=""> </span></p><span data-dcnode-id="4915" instrument_node="">
</span><div data-dcnode-id="4904" id="p-208.13(c)(6)(iv)(A)"><span data-dcnode-id="4914" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4906" data-title="208.13(c)(6)(iv)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4908"><span class="paren" data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">(</span></span><span data-dcnode-id="4911" instrument_node="">A</span><span class="paren" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">)</span></span></span><span data-dcnode-id="4907" instrument_node=""> The alien has been convicted on or after such date of a second or subsequent offense for driving while intoxicated or impaired as those terms are defined under the jurisdiction where the conviction occurred (including a conviction for driving while under the influence of or impaired by alcohol or drugs) without regard to whether the conviction is classified as a misdemeanor or felony under Federal, State, tribal, or local law; </span></p><span data-dcnode-id="4905" instrument_node="">
</span></div><span data-dcnode-id="4903" instrument_node="">
</span><div data-dcnode-id="4889" id="p-208.13(c)(6)(iv)(B)"><span data-dcnode-id="4902" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4891" data-title="208.13(c)(6)(iv)(B)"><span class="paragraph-hierarchy" data-dcnode-id="4896"><span class="paren" data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">(</span></span><span data-dcnode-id="4899" instrument_node="">B</span><span class="paren" data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">)</span></span></span><span data-dcnode-id="4895" instrument_node=""> A finding under </span><a class="cfr external" data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%286%29%28iv%29%28A%29"><span data-dcnode-id="4894" instrument_node="">paragraph (c)(6)(iv)(A)</span></a><span data-dcnode-id="4892" instrument_node=""> of this section does not require the asylum officer to find the first conviction for driving while intoxicated or impaired (including a conviction for driving while under the influence of or impaired by alcohol or drugs) as a predicate offense. The asylum officer need only make a factual determination that the alien was previously convicted for driving while intoxicated or impaired as those terms are defined under the jurisdiction where the convictions occurred (including a conviction for driving while under the influence of or impaired by alcohol or drugs). </span></p><span data-dcnode-id="4890" instrument_node="">
</span></div><span data-dcnode-id="4888" instrument_node="">
</span></div><span data-dcnode-id="4886" instrument_node="">
</span><div data-dcnode-id="4768" id="p-208.13(c)(6)(v)"><span data-dcnode-id="4885" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4877" data-title="208.13(c)(6)(v)"><span class="paragraph-hierarchy" data-dcnode-id="4879"><span class="paren" data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">(</span></span><span data-dcnode-id="4882" instrument_node="">v</span><span class="paren" data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">)</span></span></span><span data-dcnode-id="4878" instrument_node=""> </span></p><span data-dcnode-id="4876" instrument_node="">
</span><div data-dcnode-id="4800" id="p-208.13(c)(6)(v)(A)"><span data-dcnode-id="4875" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4867" data-title="208.13(c)(6)(v)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4869"><span class="paren" data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">(</span></span><span data-dcnode-id="4872" instrument_node="">A</span><span class="paren" data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">)</span></span></span><span data-dcnode-id="4868" instrument_node=""> The alien has been convicted on or after such date of a crime that involves conduct amounting to a crime of stalking; or a crime of child abuse, child neglect, or child abandonment; or that involves conduct amounting to a domestic assault or battery offense, including a misdemeanor crime of domestic violence, as described in section 922(g)(9) of title 18, a misdemeanor crime of domestic violence as described in section 921(a)(33) of title 18, a crime of domestic violence as described in section 12291(a)(8) of title 34, or any crime based on conduct in which the alien harassed, coerced, intimidated, voluntarily or recklessly used (or threatened to use) force or violence against, or inflicted physical injury or physical pain, however slight, upon a person, and committed by: </span></p><span data-dcnode-id="4866" instrument_node="">
</span><div data-dcnode-id="4854" id="p-208.13(c)(6)(v)(A)(1)"><span data-dcnode-id="4865" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4856" data-title="208.13(c)(6)(v)(A)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4858"><span class="paren" data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">(</span></span><em data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">)</span></span></span><span data-dcnode-id="4857" instrument_node=""> An alien who is a current or former spouse of the person; </span></p><span data-dcnode-id="4855" instrument_node="">
</span></div><span data-dcnode-id="4853" instrument_node="">
</span><div data-dcnode-id="4841" id="p-208.13(c)(6)(v)(A)(2)"><span data-dcnode-id="4852" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4843" data-title="208.13(c)(6)(v)(A)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4845"><span class="paren" data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">(</span></span><em data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">2</span></em><span class="paren" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">)</span></span></span><span data-dcnode-id="4844" instrument_node=""> An alien with whom the person shares a child in common; </span></p><span data-dcnode-id="4842" instrument_node="">
</span></div><span data-dcnode-id="4840" instrument_node="">
</span><div data-dcnode-id="4828" id="p-208.13(c)(6)(v)(A)(3)"><span data-dcnode-id="4839" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4830" data-title="208.13(c)(6)(v)(A)(<em>3</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4832"><span class="paren" data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">(</span></span><em data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">3</span></em><span class="paren" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">)</span></span></span><span data-dcnode-id="4831" instrument_node=""> An alien who is cohabiting with or has cohabited with the person as a spouse; </span></p><span data-dcnode-id="4829" instrument_node="">
</span></div><span data-dcnode-id="4827" instrument_node="">
</span><div data-dcnode-id="4815" id="p-208.13(c)(6)(v)(A)(4)"><span data-dcnode-id="4826" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4817" data-title="208.13(c)(6)(v)(A)(<em>4</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4819"><span class="paren" data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">(</span></span><em data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">4</span></em><span class="paren" data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">)</span></span></span><span data-dcnode-id="4818" instrument_node=""> An alien similarly situated to a spouse of the person under the domestic or family violence laws of the jurisdiction where the offense occurs; or </span></p><span data-dcnode-id="4816" instrument_node="">
</span></div><span data-dcnode-id="4814" instrument_node="">
</span><div data-dcnode-id="4802" id="p-208.13(c)(6)(v)(A)(5)"><span data-dcnode-id="4813" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4804" data-title="208.13(c)(6)(v)(A)(<em>5</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4806"><span class="paren" data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">(</span></span><em data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">5</span></em><span class="paren" data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">)</span></span></span><span data-dcnode-id="4805" instrument_node=""> Any other alien against a person who is protected from that alien's acts under the domestic or family violence laws of the United States or any State, tribal government, or unit of local government. </span></p><span data-dcnode-id="4803" instrument_node="">
</span></div><span data-dcnode-id="4801" instrument_node="">
</span></div><span data-dcnode-id="4799" instrument_node="">
</span><div data-dcnode-id="4785" id="p-208.13(c)(6)(v)(B)"><span data-dcnode-id="4798" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4787" data-title="208.13(c)(6)(v)(B)"><span class="paragraph-hierarchy" data-dcnode-id="4792"><span class="paren" data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">(</span></span><span data-dcnode-id="4795" instrument_node="">B</span><span class="paren" data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">)</span></span></span><span data-dcnode-id="4791" instrument_node=""> In making a determination under </span><a class="cfr external" data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%286%29%28v%29%28A%29"><span data-dcnode-id="4790" instrument_node="">paragraph (c)(6)(v)(A)</span></a><span data-dcnode-id="4788" instrument_node=""> of this section, including in determining the existence of a domestic relationship between the alien and the victim, the underlying conduct of the crime may be considered and the asylum officer is not limited to facts found by the criminal court or provided in the underlying record of conviction. </span></p><span data-dcnode-id="4786" instrument_node="">
</span></div><span data-dcnode-id="4784" instrument_node="">
</span><div data-dcnode-id="4770" id="p-208.13(c)(6)(v)(C)"><span data-dcnode-id="4783" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4772" data-title="208.13(c)(6)(v)(C)"><span class="paragraph-hierarchy" data-dcnode-id="4777"><span class="paren" data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">(</span></span><span data-dcnode-id="4780" instrument_node="">C</span><span class="paren" data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">)</span></span></span><span data-dcnode-id="4776" instrument_node=""> An alien who was convicted of offenses described in </span><a class="cfr external" data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%286%29%28v%29%28A%29"><span data-dcnode-id="4775" instrument_node="">paragraph (c)(6)(v)(A)</span></a><span data-dcnode-id="4773" instrument_node=""> of this section is not subject to ineligibility for asylum on that basis if the alien would be described in section 237(a)(7)(A) of the Act were the crimes or conduct considered grounds for deportability under section 237(a)(2)(E)(i) through (ii) of the Act. </span></p><span data-dcnode-id="4771" instrument_node="">
</span></div><span data-dcnode-id="4769" instrument_node="">

</span><p class="indent-3" data-dcnode-id="4758" data-title="208.13(c)(6)(vi)"><span class="paragraph-hierarchy" data-dcnode-id="4760"><span class="paren" data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">(</span></span><span data-dcnode-id="4763" instrument_node="">vi</span><span class="paren" data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">)</span></span></span><span data-dcnode-id="4759" instrument_node=""> The alien has been convicted on or after such date of - </span></p><span data-dcnode-id="4757" instrument_node="">
</span><div data-dcnode-id="4746" id="p-208.13(c)(6)(vi)(A)"><span data-dcnode-id="4756" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4748" data-title="208.13(c)(6)(vi)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4750"><span class="paren" data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">(</span></span><span data-dcnode-id="4753" instrument_node="">A</span><span class="paren" data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">)</span></span></span><span data-dcnode-id="4749" instrument_node=""> Any felony under Federal, State, tribal, or local law; </span></p><span data-dcnode-id="4747" instrument_node="">

</span><p class="indent-5" data-dcnode-id="4725" data-title="208.13(c)(6)(vi)(B)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4727"><span class="paren" data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">(</span></span><em data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">)</span></span></span><span data-dcnode-id="4726" instrument_node=""> The possession or use of an identification document, authentication feature, or false identification document without lawful authority, unless the alien can establish that the conviction resulted from circumstances showing that the document was presented before boarding a common carrier, that the document related to the alien's eligibility to enter the United States, that the alien used the document to depart a country in which the alien has claimed a fear of persecution, and that the alien claimed a fear of persecution without delay upon presenting himself or herself to an immigration officer upon arrival at a United States port of entry; </span></p><span data-dcnode-id="4724" instrument_node="">
</span></div><span data-dcnode-id="4722" instrument_node="">

</span></div><span data-dcnode-id="4706" instrument_node="">
</span><div data-dcnode-id="4694" id="p-208.13(c)(6)(vi)(B)(3)"><span data-dcnode-id="4705" instrument_node="">

</span></div><span data-dcnode-id="4691" instrument_node="">

</span></div><span data-dcnode-id="4640" instrument_node="">

</span><p class="indent-4" data-dcnode-id="4631" data-title="208.13(c)(6)(vii)(D)"><span class="paragraph-hierarchy" data-dcnode-id="4633"><span class="paren" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">(</span></span><span data-dcnode-id="4636" instrument_node="">D</span><span class="paren" data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">)</span></span></span><span data-dcnode-id="4632" instrument_node=""> An alien similarly situated to a spouse of the person under the domestic or family violence laws of the jurisdiction where the offense occurs; or </span></p><span data-dcnode-id="4630" instrument_node="">
</span></div><span data-dcnode-id="4628" instrument_node="">
</span><div data-dcnode-id="4617" id="p-208.13(c)(6)(vii)(E)"><span data-dcnode-id="4627" instrument_node="">
