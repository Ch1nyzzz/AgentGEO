</span><h2 data-dcnode-id="9941"><span class="mw-headline" data-dcnode-id="9949" id="Prior_to_19th_century"><span data-dcnode-id="9950" instrument_node="">Prior to 19th century</span></span><span class="mw-editsection" data-dcnode-id="9942"><span class="mw-editsection-bracket" data-dcnode-id="9947"><span data-dcnode-id="9948" instrument_node="">[</span></span><a data-dcnode-id="9945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTimeline_of_Phoenix%2C_Arizona%26action%3Dedit%26section%3D1" title="Edit section: Prior to 19th century"><span data-dcnode-id="9946" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9943"><span data-dcnode-id="9944" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9940" instrument_node="">
</span><ul data-dcnode-id="9910"><li data-dcnode-id="9938"><span data-dcnode-id="9939" instrument_node="">1–300 – Hohokam establish several villages along the Gila River.</span></li><span data-dcnode-id="9937" instrument_node="">
</span><li data-dcnode-id="9932"><span data-dcnode-id="9936" instrument_node="">300 – Ceramics appear in the Hohokam culture.</span><sup class="reference" data-dcnode-id="9933" id="cite_ref-AZMNH_1-0"><a data-dcnode-id="9934" href="#cite_note-AZMNH-1"><span data-dcnode-id="9935" instrument_node="">[1]</span></a></sup></li><span data-dcnode-id="9931" instrument_node="">
</span><li data-dcnode-id="9926"><span data-dcnode-id="9930" instrument_node="">450 – </span><a class="mw-redirect" data-dcnode-id="9928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pueblo_Grande_Museum_Archaeological_Park" title="Pueblo Grande Museum Archaeological Park"><span data-dcnode-id="9929" instrument_node="">Pueblo Grande</span></a><span data-dcnode-id="9927" instrument_node=""> settled (approximate date).</span></li><span data-dcnode-id="9925" instrument_node="">
</span><li data-dcnode-id="9923"><span data-dcnode-id="9924" instrument_node="">600–1300 – Hohokam build large network or irrigation canals throughout the area.</span></li><span data-dcnode-id="9922" instrument_node="">
</span><li data-dcnode-id="9917"><span data-dcnode-id="9921" instrument_node="">1300 – Hohokam have largest population in the southwest.</span><sup class="reference" data-dcnode-id="9918" id="cite_ref-AZMNH_1-1"><a data-dcnode-id="9919" href="#cite_note-AZMNH-1"><span data-dcnode-id="9920" instrument_node="">[1]</span></a></sup></li><span data-dcnode-id="9916" instrument_node="">
</span><li data-dcnode-id="9914"><span data-dcnode-id="9915" instrument_node="">1300–1450 – Periods of drought alternate with flooding (approximate date).</span></li><span data-dcnode-id="9913" instrument_node="">
</span><li data-dcnode-id="9911"><span data-dcnode-id="9912" instrument_node="">1450 – Pueblo Grande abandoned due to drought (approximate date).</span></li></ul><span data-dcnode-id="9909" instrument_node="">
</span><h2 data-dcnode-id="9899"><span class="mw-headline" data-dcnode-id="9907" id="19th_century"><span data-dcnode-id="9908" instrument_node="">19th century</span></span><span class="mw-editsection" data-dcnode-id="9900"><span class="mw-editsection-bracket" data-dcnode-id="9905"><span data-dcnode-id="9906" instrument_node="">[</span></span><a data-dcnode-id="9903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTimeline_of_Phoenix%2C_Arizona%26action%3Dedit%26section%3D2" title="Edit section: 19th century"><span data-dcnode-id="9904" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9901"><span data-dcnode-id="9902" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9898" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9886"><div class="thumbinner" data-dcnode-id="9887" style="width:222px;"><a class="image" data-dcnode-id="9896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1888_Orozco_ad_Phoenix_Arizona.png"><img alt="" class="thumbimage" data-dcnode-id="9897" data-file-height="471" data-file-width="548" decoding="async" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/1888_Orozco_ad_Phoenix_Arizona.png/220px-1888_Orozco_ad_Phoenix_Arizona.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/1888_Orozco_ad_Phoenix_Arizona.png/330px-1888_Orozco_ad_Phoenix_Arizona.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8c/1888_Orozco_ad_Phoenix_Arizona.png/440px-1888_Orozco_ad_Phoenix_Arizona.png 2x" width="220"></a><span data-dcnode-id="9895" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9888"><div class="magnify" data-dcnode-id="9893"><a class="internal" data-dcnode-id="9894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1888_Orozco_ad_Phoenix_Arizona.png" title="Enlarge"></a></div><span data-dcnode-id="9892" instrument_node="">Advertisement for Orozco &amp; Vasquez, Phoenix, 1888</span><sup class="reference" data-dcnode-id="9889" id="cite_ref-2"><a data-dcnode-id="9890" href="#cite_note-2"><span data-dcnode-id="9891" instrument_node="">[2]</span></a></sup></div></div></div><span data-dcnode-id="9885" instrument_node="">
</span><ul data-dcnode-id="9447"><li data-dcnode-id="9874"><span data-dcnode-id="9884" instrument_node="">1848 – With the end of the </span><a data-dcnode-id="9882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexican%25E2%2580%2593American_War" title="Mexican–American War"><span data-dcnode-id="9883" instrument_node="">Mexican–American War</span></a><span data-dcnode-id="9881" instrument_node="">, the area which includes today's Phoenix becomes part of the United States, as part of the </span><a data-dcnode-id="9879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Mexico_Territory" title="New Mexico Territory"><span data-dcnode-id="9880" instrument_node="">New Mexico Territory</span></a><span data-dcnode-id="9878" instrument_node="">.</span><sup class="reference" data-dcnode-id="9875" id="cite_ref-3"><a data-dcnode-id="9876" href="#cite_note-3"><span data-dcnode-id="9877" instrument_node="">[3]</span></a></sup></li><span data-dcnode-id="9873" instrument_node="">
</span><li data-dcnode-id="9862"><span data-dcnode-id="9872" instrument_node="">1863 – Nearby </span><a data-dcnode-id="9870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wickenburg%2C_Arizona" title="Wickenburg, Arizona"><span data-dcnode-id="9871" instrument_node="">Wickenburg</span></a><span data-dcnode-id="9869" instrument_node=""> becomes the first town to be established in what is now </span><a data-dcnode-id="9867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maricopa_County%2C_Arizona" title="Maricopa County, Arizona"><span data-dcnode-id="9868" instrument_node="">Maricopa County, Arizona</span></a><span data-dcnode-id="9866" instrument_node="">.</span><sup class="reference" data-dcnode-id="9863" id="cite_ref-4"><a data-dcnode-id="9864" href="#cite_note-4"><span data-dcnode-id="9865" instrument_node="">[4]</span></a></sup></li><span data-dcnode-id="9861" instrument_node="">
</span><li data-dcnode-id="9850"><span data-dcnode-id="9860" instrument_node="">1865 – Camp McDowell (later </span><a data-dcnode-id="9858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_McDowell%2C_Arizona" title="Fort McDowell, Arizona"><span data-dcnode-id="9859" instrument_node="">Fort McDowell</span></a><span data-dcnode-id="9857" instrument_node="">) is set up on the </span><a data-dcnode-id="9855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verde_River" title="Verde River"><span data-dcnode-id="9856" instrument_node="">Verde River</span></a><span data-dcnode-id="9854" instrument_node="">.</span><sup class="reference" data-dcnode-id="9851" id="cite_ref-5"><a data-dcnode-id="9852" href="#cite_note-5"><span data-dcnode-id="9853" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="9849" instrument_node="">
</span><li data-dcnode-id="9832"><span data-dcnode-id="9848" instrument_node="">1867
</span><ul data-dcnode-id="9833"><li data-dcnode-id="9840"><span data-dcnode-id="9847" instrument_node="">November: </span><a data-dcnode-id="9845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Swilling" title="Jack Swilling"><span data-dcnode-id="9846" instrument_node="">Jack Swilling</span></a><span data-dcnode-id="9844" instrument_node="">, resident of Wickenburg, establishes the Swilling Irrigating and Canal Company with the intent to develop the Phoenix area, which he became impressed with after viewing the area on a visit to Camp McDowell.</span><sup class="reference" data-dcnode-id="9841" id="cite_ref-FOOTNOTEGrady20121,_5_6-0"><a data-dcnode-id="9842" href="#cite_note-FOOTNOTEGrady20121,_5-6"><span data-dcnode-id="9843" instrument_node="">[6]</span></a></sup></li><span data-dcnode-id="9839" instrument_node="">
</span><li data-dcnode-id="9834"><span data-dcnode-id="9838" instrument_node="">December: Swilling leads a group of 17 miners from Wickenburg to the Phoenix area and begins the process of developing a canal system.</span><sup class="reference" data-dcnode-id="9835" id="cite_ref-FOOTNOTEVanderMeer201015_7-0"><a data-dcnode-id="9836" href="#cite_note-FOOTNOTEVanderMeer201015-7"><span data-dcnode-id="9837" instrument_node="">[7]</span></a></sup></li></ul></li><span data-dcnode-id="9831" instrument_node="">
</span><li data-dcnode-id="9799"><span data-dcnode-id="9830" instrument_node="">1868
</span><ul data-dcnode-id="9800"><li data-dcnode-id="9825"><span data-dcnode-id="9829" instrument_node="">May 4: Phoenix is officially recognized by the Board of Supervisors of Yavapai County, which at that point contained Phoenix.</span><sup class="reference" data-dcnode-id="9826" id="cite_ref-Phxgov_8-0"><a data-dcnode-id="9827" href="#cite_note-Phxgov-8"><span data-dcnode-id="9828" instrument_node="">[8]</span></a></sup></li><span data-dcnode-id="9824" instrument_node="">
</span><li data-dcnode-id="9819"><span data-dcnode-id="9823" instrument_node="">June 15: First post office established, in the Swilling homestead, with Swilling as postmaster.</span><sup class="reference" data-dcnode-id="9820" id="cite_ref-FOOTNOTEGober200617_9-0"><a data-dcnode-id="9821" href="#cite_note-FOOTNOTEGober200617-9"><span data-dcnode-id="9822" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="9818" instrument_node="">
</span><li data-dcnode-id="9813"><span data-dcnode-id="9817" instrument_node="">Swilling has completed almost 3 miles of his canals.</span><sup class="reference" data-dcnode-id="9814" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-0"><a data-dcnode-id="9815" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9816" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9812" instrument_node="">
</span><li data-dcnode-id="9807"><span data-dcnode-id="9811" instrument_node="">Mary Adeline Gray, the first European woman settler, and her husband Columbus, arrive.</span><sup class="reference" data-dcnode-id="9808" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-1"><a data-dcnode-id="9809" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9810" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9806" instrument_node="">
</span><li data-dcnode-id="9801"><span data-dcnode-id="9805" instrument_node="">Salt River floods for the first of many times during Phoenix's settlement.</span><sup class="reference" data-dcnode-id="9802" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-2"><a data-dcnode-id="9803" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9804" instrument_node="">[10]</span></a></sup></li></ul></li><span data-dcnode-id="9798" instrument_node="">
</span><li data-dcnode-id="9753"><span data-dcnode-id="9797" instrument_node="">1870
</span><ul data-dcnode-id="9754"><li data-dcnode-id="9789"><span data-dcnode-id="9796" instrument_node="">October 20: Town site selected in what is currently downtown Phoenix.</span><sup class="reference" data-dcnode-id="9793" id="cite_ref-Phxgov_8-1"><a data-dcnode-id="9794" href="#cite_note-Phxgov-8"><span data-dcnode-id="9795" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="9790" id="cite_ref-FOOTNOTEGrady201261–65_11-0"><a data-dcnode-id="9791" href="#cite_note-FOOTNOTEGrady201261%E2%80%9365-11"><span data-dcnode-id="9792" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="9788" instrument_node="">
</span><li data-dcnode-id="9773"><span data-dcnode-id="9787" instrument_node="">Town laid out,</span><sup class="reference" data-dcnode-id="9784" id="cite_ref-FOOTNOTEDisturnell1881_12-0"><a data-dcnode-id="9785" href="#cite_note-FOOTNOTEDisturnell1881-12"><span data-dcnode-id="9786" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="9781" id="cite_ref-FOOTNOTEBritannica1910_13-0"><a data-dcnode-id="9782" href="#cite_note-FOOTNOTEBritannica1910-13"><span data-dcnode-id="9783" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9780" instrument_node=""> original town site consists of 320 acres, or 0.5 square miles.</span><sup class="reference" data-dcnode-id="9777" id="cite_ref-Phxgov_8-2"><a data-dcnode-id="9778" href="#cite_note-Phxgov-8"><span data-dcnode-id="9779" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="9774" id="cite_ref-FOOTNOTEVanderMeer201028_14-0"><a data-dcnode-id="9775" href="#cite_note-FOOTNOTEVanderMeer201028-14"><span data-dcnode-id="9776" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="9772" instrument_node="">
</span><li data-dcnode-id="9767"><span data-dcnode-id="9771" instrument_node="">Population of the Salt River Valley reaches 240, the Arizona Territory has 9,658 people.</span><sup class="reference" data-dcnode-id="9768" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-3"><a data-dcnode-id="9769" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9770" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9766" instrument_node="">
</span><li data-dcnode-id="9761"><span data-dcnode-id="9765" instrument_node="">1700 acres under cultivation in the Salt River Valley.</span><sup class="reference" data-dcnode-id="9762" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-4"><a data-dcnode-id="9763" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9764" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9760" instrument_node="">
</span><li data-dcnode-id="9755"><span data-dcnode-id="9759" instrument_node="">Maricopa Canal completed.</span><sup class="reference" data-dcnode-id="9756" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-5"><a data-dcnode-id="9757" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9758" instrument_node="">[10]</span></a></sup></li></ul></li><span data-dcnode-id="9752" instrument_node="">
</span><li data-dcnode-id="9696"><span data-dcnode-id="9751" instrument_node="">1871
</span><ul data-dcnode-id="9697"><li data-dcnode-id="9743"><span data-dcnode-id="9750" instrument_node="">February 12: Maricopa County is broken out of Yavapai County, Phoenix becomes the county seat.</span><sup class="reference" data-dcnode-id="9747" id="cite_ref-FOOTNOTEBritannica1910_13-1"><a data-dcnode-id="9748" href="#cite_note-FOOTNOTEBritannica1910-13"><span data-dcnode-id="9749" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="9744" id="cite_ref-Natural_15-0"><a data-dcnode-id="9745" href="#cite_note-Natural-15"><span data-dcnode-id="9746" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="9742" instrument_node="">
</span><li data-dcnode-id="9737"><span data-dcnode-id="9741" instrument_node="">July 4: First wheat ground in Valley at Birchard's Mill.</span><sup class="reference" data-dcnode-id="9738" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-6"><a data-dcnode-id="9739" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9740" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9736" instrument_node="">
</span><li data-dcnode-id="9731"><span data-dcnode-id="9735" instrument_node="">First permanent building, the Hancock residence, is constructed at Washington and First Streets.</span><sup class="reference" data-dcnode-id="9732" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-7"><a data-dcnode-id="9733" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9734" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9730" instrument_node="">
</span><li data-dcnode-id="9725"><span data-dcnode-id="9729" instrument_node="">The second building, a brewery, is constructed.</span><sup class="reference" data-dcnode-id="9726" id="cite_ref-FOOTNOTETerritorial,_statehood_timelines2011_10-8"><a data-dcnode-id="9727" href="#cite_note-FOOTNOTETerritorial,_statehood_timelines2011-10"><span data-dcnode-id="9728" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="9724" instrument_node="">

</span><ul data-dcnode-id="7995"><li data-dcnode-id="8017"><span data-dcnode-id="8033" instrument_node="">January 2: Construction begins on </span><a data-dcnode-id="8031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thunderbird_Field_No._1" title="Thunderbird Field No. 1"><span data-dcnode-id="8032" instrument_node="">Thunderbird Field</span></a><span data-dcnode-id="8030" instrument_node=""> in nearby Glendale (later renamed Thunderbird Field No. 1), funded by a collaborative group of Hollywood personalities, including </span><a data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Stewart" title="James Stewart"><span data-dcnode-id="8029" instrument_node="">James Stewart</span></a><span data-dcnode-id="8027" instrument_node="">, </span><a data-dcnode-id="8025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Fonda" title="Henry Fonda"><span data-dcnode-id="8026" instrument_node="">Henry Fonda</span></a><span data-dcnode-id="8024" instrument_node="">, </span><a data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cary_Grant" title="Cary Grant"><span data-dcnode-id="8023" instrument_node="">Cary Grant</span></a><span data-dcnode-id="8021" instrument_node="">, and </span><a data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Sullavan" title="Margaret Sullavan"><span data-dcnode-id="8020" instrument_node="">Margaret Sullavan</span></a><span data-dcnode-id="8018" instrument_node="">.  The field opens in April.</span></li><span data-dcnode-id="8016" instrument_node="">
</span><li data-dcnode-id="8012"><a data-dcnode-id="8014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luke_Air_Force_Base" title="Luke Air Force Base"><span data-dcnode-id="8015" instrument_node="">Luke Air Force Base</span></a><span data-dcnode-id="8013" instrument_node=""> opens, its first class graduating in June.</span></li><span data-dcnode-id="8011" instrument_node="">
</span><li data-dcnode-id="8007"><a data-dcnode-id="8009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Williams_Air_Force_Base" title="Williams Air Force Base"><span data-dcnode-id="8010" instrument_node="">Williams Air Force Base</span></a><span data-dcnode-id="8008" instrument_node=""> opens in December.</span></li><span data-dcnode-id="8006" instrument_node="">
</span><li data-dcnode-id="8002"><a data-dcnode-id="8004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falcon_Field_%28Arizona%29" title="Falcon Field (Arizona)"><span data-dcnode-id="8005" instrument_node="">Falcon Field</span></a><span data-dcnode-id="8003" instrument_node=""> opens in nearby Mesa as a training location for British RAF pilots.</span></li><span data-dcnode-id="8001" instrument_node="">

</span><li data-dcnode-id="7940"><span data-dcnode-id="7992" instrument_node="">1942
</span><ul data-dcnode-id="7941"><li data-dcnode-id="7972"><span data-dcnode-id="7991" instrument_node="">April 1: the </span><a data-dcnode-id="7989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desert_Training_Center" title="Desert Training Center"><span data-dcnode-id="7990" instrument_node="">Desert Training Center</span></a><span data-dcnode-id="7988" instrument_node="">, formed by General </span><a data-dcnode-id="7986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_S._Patton" title="George S. Patton"><span data-dcnode-id="7987" instrument_node="">George S. Patton</span></a><span data-dcnode-id="7985" instrument_node="">, is created.  The base, located in the </span><a data-dcnode-id="7983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mojave_Desert" title="Mojave Desert"><span data-dcnode-id="7984" instrument_node="">Mojave Desert</span></a><span data-dcnode-id="7982" instrument_node=""> in Southern California and the </span><a data-dcnode-id="7980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonoran_Desert" title="Sonoran Desert"><span data-dcnode-id="7981" instrument_node="">Sonoran Desert</span></a><span data-dcnode-id="7979" instrument_node=""> in western Arizona, stretched to within 50 miles of Phoenix.</span><sup class="reference" data-dcnode-id="7976" id="cite_ref-Phxgov_8-11"><a data-dcnode-id="7977" href="#cite_note-Phxgov-8"><span data-dcnode-id="7978" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="7973" id="cite_ref-45"><a data-dcnode-id="7974" href="#cite_note-45"><span data-dcnode-id="7975" instrument_node="">[45]</span></a></sup></li><span data-dcnode-id="7971" instrument_node="">
</span><li data-dcnode-id="7966"><span data-dcnode-id="7970" instrument_node="">June 22: Thunderbird Field #2 opens in nearby Scottsdale.  Later renamed </span><a data-dcnode-id="7968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottsdale_Airport" title="Scottsdale Airport"><span data-dcnode-id="7969" instrument_node="">Scottsdale Airport</span></a><span data-dcnode-id="7967" instrument_node="">.</span></li><span data-dcnode-id="7965" instrument_node="">

</span><li data-dcnode-id="7948"><span data-dcnode-id="7958" instrument_node="">Japanese-Americans from Phoenix are relocated to internment camps at </span><a data-dcnode-id="7956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacaton%2C_Arizona" title="Sacaton, Arizona"><span data-dcnode-id="7957" instrument_node="">Sacaton</span></a><span data-dcnode-id="7955" instrument_node=""> and </span><a data-dcnode-id="7953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poston%2C_Arizona" title="Poston, Arizona"><span data-dcnode-id="7954" instrument_node="">Poston</span></a><span data-dcnode-id="7952" instrument_node="">.</span><sup class="reference" data-dcnode-id="7949" id="cite_ref-AZTimeline6_32-56"><a data-dcnode-id="7950" href="#cite_note-AZTimeline6-32"><span data-dcnode-id="7951" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="7947" instrument_node="">
</span><li data-dcnode-id="7942"><span data-dcnode-id="7946" instrument_node="">Alzona Park is built by the Federal Government as worker housing.</span><sup class="reference" data-dcnode-id="7943" id="cite_ref-AZTimeline6_32-57"><a data-dcnode-id="7944" href="#cite_note-AZTimeline6-32"><span data-dcnode-id="7945" instrument_node="">[32]</span></a></sup></li></ul></li><span data-dcnode-id="7939" instrument_node="">
</span><li data-dcnode-id="7906"><span data-dcnode-id="7938" instrument_node="">1943
</span><ul data-dcnode-id="7907"><li data-dcnode-id="7928"><a data-dcnode-id="7936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_Papago_Park" title="Camp Papago Park"><span data-dcnode-id="7937" instrument_node="">Camp Papago Park</span></a><span data-dcnode-id="7935" instrument_node=""> (</span><a data-dcnode-id="7933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prisoner_of_war" title="Prisoner of war"><span data-dcnode-id="7934" instrument_node="">POW</span></a><span data-dcnode-id="7932" instrument_node=""> camp) opens in June.</span><sup class="reference" data-dcnode-id="7929" id="cite_ref-47"><a data-dcnode-id="7930" href="#cite_note-47"><span data-dcnode-id="7931" instrument_node="">[47]</span></a></sup></li><span data-dcnode-id="7927" instrument_node="">
</span><li data-dcnode-id="7920"><a data-dcnode-id="7925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoenix_Goodyear_Airport" title="Phoenix Goodyear Airport"><span data-dcnode-id="7926" instrument_node="">Litchfield Naval Air Facility</span></a><span data-dcnode-id="7924" instrument_node=""> opens.</span><sup class="reference" data-dcnode-id="7921" id="cite_ref-AZTimeline6_32-58"><a data-dcnode-id="7922" href="#cite_note-AZTimeline6-32"><span data-dcnode-id="7923" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="7919" instrument_node="">
</span><li data-dcnode-id="7908"><span data-dcnode-id="7918" instrument_node="">The </span><a data-dcnode-id="7916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bisbee_Douglas_International_Airport" title="Bisbee Douglas International Airport"><span data-dcnode-id="7917" instrument_node="">new airport</span></a><span data-dcnode-id="7915" instrument_node=""> at </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douglas%2C_Arizona" title="Douglas, Arizona"><span data-dcnode-id="7914" instrument_node="">Douglas</span></a><span data-dcnode-id="7912" instrument_node=""> is designated the first international airport in the United States.</span><sup class="reference" data-dcnode-id="7909" id="cite_ref-Chandlerair_37-1"><a data-dcnode-id="7910" href="#cite_note-Chandlerair-37"><span data-dcnode-id="7911" instrument_node="">[37]</span></a></sup></li></ul></li><span data-dcnode-id="7905" instrument_node="">
