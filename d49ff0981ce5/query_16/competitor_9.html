</span><div class="lit" data-dcnode-id="777"><span data-dcnode-id="787" instrument_node="">The only exceptions to the new rule are victims of human trafficking, cases in which </span><span class="highlight" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">asylum</span></span><span data-dcnode-id="784" instrument_node=""> seekers passed through countries that are not signatories of the major international treaties concerning the treatment of refugees or cases in which an individual first sought </span><span class="highlight" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">asylum</span></span><span data-dcnode-id="781" instrument_node=""> in another country and failed to obtain it.</span><div class="lit_links" data-dcnode-id="778"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Rights%2BGroups%2BVow%2Bto%2BChallenge%2BTrump%2527s%2BNew%2BAsylum%2BRule-a0593422524"><span data-dcnode-id="780" instrument_node="">Rights Groups Vow to Challenge Trump's New Asylum Rule</span></a></div></div><div class="lit" data-dcnode-id="769"><span data-dcnode-id="776" instrument_node="">But the move by President Donald Trump's administration was meant to essentially end </span><span class="highlight" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">asylum</span></span><span data-dcnode-id="773" instrument_node=""> protections as they now are on the southern border.</span><div class="lit_links" data-dcnode-id="770"><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Trump%2BMoves%2BTo%2BEnd%2BAsylum%2BProtections%2BFor%2BCentral%2BAmericans-a0593437371"><span data-dcnode-id="772" instrument_node="">Trump Moves To End Asylum Protections For Central Americans</span></a></div></div><div class="lit" data-dcnode-id="758"><span data-dcnode-id="768" instrument_node="">As a result of the crisis in Venezuela, the number of </span><span class="highlight" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">asylum</span></span><span data-dcnode-id="765" instrument_node=""> applications increased sharply in Peru, which became the second largest recipient of </span><span class="highlight" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">asylum</span></span><span data-dcnode-id="762" instrument_node=""> applications globally with 192,500, nearly all submitted by Venezuelans.</span><div class="lit_links" data-dcnode-id="759"><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Asylum-seekers%2Bincrease%2Bglobally-a0593350730"><span data-dcnode-id="761" instrument_node="">Asylum-seekers increase globally</span></a></div></div><div class="lit" data-dcnode-id="747"><span data-dcnode-id="757" instrument_node="">As per the statistic given by UNHCR's annual Global Trends report 2018, for the first time, </span><span class="highlight" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">asylum</span></span><span data-dcnode-id="754" instrument_node=""> claims from Venezuelans dominated the global </span><span class="highlight" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">asylum</span></span><span data-dcnode-id="751" instrument_node=""> statistics with 341,800 new claims in 2018, accounting for more than 1 in 5 claims submitted.</span><div class="lit_links" data-dcnode-id="748"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Asylum%2Bseekers%2Bfrom%2BPakistan%2Bshoot%2Bup%2Bby%2B280pc-a0589929669"><span data-dcnode-id="750" instrument_node="">Asylum seekers from Pakistan shoot up by 280pc</span></a></div></div><div class="lit" data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">The Minister said that Sri Lanka must look at the </span><span class="highlight" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">asylum</span></span><span data-dcnode-id="743" instrument_node=""> seekers as people fleeing persecution in their own countries.</span><div class="lit_links" data-dcnode-id="740"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Refugee%2Bstatus%2Bof%2Bover%2B800%2Basylum%2Bseekers%2Bin%2BSri%2BLanka%2Bcleared-a0584874599"><span data-dcnode-id="742" instrument_node="">Refugee status of over 800 asylum seekers in Sri Lanka cleared</span></a></div></div><div class="lit" data-dcnode-id="731"><span data-dcnode-id="738" instrument_node="">Roughly 100 </span><span class="highlight" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">asylum</span></span><span data-dcnode-id="735" instrument_node=""> seekers marched the Nicosia streets to reach the Nicosia district labour office, the interior ministry, EU House, and the labour ministry.</span><div class="lit_links" data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Asylum%2Bseekers%2Bmobilise%2Bover%2Blimited%2Bwork%2Bopportunities-a0582510006"><span data-dcnode-id="734" instrument_node="">Asylum seekers mobilise over limited work opportunities</span></a></div></div><div class="lit" data-dcnode-id="724"><span class="highlight" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">asylum</span></span><span data-dcnode-id="728" instrument_node=""> as a legal process to anyone on the planet with a "well-founded fear of persecution" due to race, religion, nationality, political opinion or membership in a particular social group.</span><div class="lit_links" data-dcnode-id="725"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Waves%2Bof%2Bimmigrants%2Boverwhelm%2Basylum%2Bprocess-a0580797401"><span data-dcnode-id="727" instrument_node="">Waves of immigrants overwhelm asylum process</span></a></div></div><div class="lit" data-dcnode-id="713"><span data-dcnode-id="723" instrument_node="">This is because it is seen merely as a transit country, and some Slovak authorities have negative attitudes towards </span><span class="highlight" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">asylum</span></span><span data-dcnode-id="720" instrument_node=""> seekers.Slovakia granted </span><span class="highlight" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">asylum</span></span><span data-dcnode-id="717" instrument_node=""> to 149 Assyrian Christians in 2016, but some of them have already returned to Iraq.</span><div class="lit_links" data-dcnode-id="714"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Slovakia%2Bonly%2Bgranted%2Bfive%2Bpeople%2Basylum%2Blast%2Byear-a0579363829"><span data-dcnode-id="716" instrument_node="">Slovakia only granted five people asylum last year</span></a></div></div><div class="lit" data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">27, as they do not have entry permits for Taiwan, and they are expected to stay there until their </span><span class="highlight" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">asylum</span></span><span data-dcnode-id="709" instrument_node=""> request is finalized.</span><div class="lit_links" data-dcnode-id="706"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Taiwan%2Bwill%2Bnot%2Bdeport%2BChinese%2Basylum%2Bseeking%2Bduo%253A%2Breport-a0557990289"><span data-dcnode-id="708" instrument_node="">Taiwan will not deport Chinese asylum seeking duo: report</span></a></div></div><div class="lit" data-dcnode-id="697"><span data-dcnode-id="704" instrument_node="">Although the president and the American Civil Liberties Union have come to an agreement giving migrant families separated at the border this summer a second chance to make their case for staying in the country, immigration lawyers say the Trump administration is still working overtime to upend the nation's </span><span class="highlight" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">asylum</span></span><span data-dcnode-id="701" instrument_node=""> process.</span><div class="lit_links" data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Migrants%2Bget%2Ba%2Bsecond%2Bchance%2Bat%2Basylum.%2BBut%2Bit%2527s%2Bstill%2B%2522an%2Buphill...-a0555615334"><span data-dcnode-id="700" instrument_node="">Migrants get a second chance at asylum. But it's still "an uphill battle."</span></a></div></div><div class="lit" data-dcnode-id="689"><span data-dcnode-id="696" instrument_node="">Data from Europe's statistics body, EuroStat, show the UK accepted 13,645 </span><span class="highlight" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">asylum</span></span><span data-dcnode-id="693" instrument_node=""> seekers in 2017.</span><div class="lit_links" data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/WELCOMING%2BTHE%2BASYLUM%2BSEEKERS-a0548686471"><span data-dcnode-id="692" instrument_node="">WELCOMING THE ASYLUM SEEKERS</span></a></div></div><div data-dcnode-id="685" data-periodicals="0"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/_/search/Search.aspx%3FBy%3D0%26SearchBy%3D0%26q%3Dasylum" rel="nofollow" style="margin-top:12px;float:right"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">More results ►</span></b></a></div><span data-dcnode-id="684" instrument_node="">
