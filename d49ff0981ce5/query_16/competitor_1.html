button></li><li data-dcnode-id="532"><button class="list-nav-instructors nav-button false" data-dcnode-id="533" id="nav-instructors" type="button"><span data-dcnode-id="534" instrument_node="">Instructors</span></button></li><li data-dcnode-id="529"><button class="list-nav-faqs nav-button false" data-dcnode-id="530" id="nav-faqs" type="button"><span data-dcnode-id="531" instrument_node="">FAQs</span></button></li><li data-dcnode-id="526"><button class="list-nav-modes nav-button false" data-dcnode-id="527" id="nav-modes" type="button"><span data-dcnode-id="528" instrument_node="">Ways to enroll</span></button></li></ul></nav><div class="ml-4 pl-2 d-sm-none" data-dcnode-id="514"><div class="" data-dcnode-id="515"><a class="nav-enroll btn btn-brand py-2" data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.edx.org/register%3Fcourse_id%3Dcourse-v1%253ALouvainX%252BLouv21x_E%252B3T2022%26enrollment_action%3Denroll%26email_opt_in%3Dfalse"><div class="nav-enroll-inner py-1" data-dcnode-id="517"><h4 class="text-white m-0" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Enroll now</span></h4><div class="x-small" data-dcnode-id="518"><span data-dcnode-id="521" instrument_node=""> </span><span data-dcnode-id="519" instrument_node="">Starts Sep 12</span></div></div></a></div></div></div></div></section><div class="course-main container-mw-sm container-fluid" data-dcnode-id="306"><div data-dcnode-id="307"><div class="preview-expand-component" data-dcnode-id="461"><div class="preview-expand-header d-flex position-relative" data-dcnode-id="506"><h1 class="nav-target pt-3 mt-3 pt-sm-4 mt-sm-3" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">About this course</span></h1><a class="show-on-focus" data-dcnode-id="507" href="#about-this-course"><span data-dcnode-id="508" instrument_node="">Skip About this course</span></a></div><div class="preview-expand-body m-0" data-dcnode-id="464"><div class="mt-2 lead-sm html-data" data-dcnode-id="465"><p data-dcnode-id="500"><span data-dcnode-id="505" instrument_node="">What is asylum?</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">
What is the principle of non-refoulement?</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
Who should be recognized and protected as a refugee?</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">These questions are both ancient and contemporary.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Whether you are a decision maker, a judge, a lawyer, a human rights activist, a student, a lawyer in the business law department of a private company that wants to hire or assist refugees, you will have to answer these questions. The answers are complex. They require precise theoretical and practical knowledge of national, regional and international law.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The 1951 Geneva Convention on Refugees will enable you to master these questions. This Convention remains the cornerstone of international refugee protection. It is at the heart of this online course. You will analyze in detail the principle of non-refoulement, the definition of a refugee and the causes of persecution such as political opinion, race, nationality, religion or membership of a social group.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">This definition will allow you to identify the people who, legally, should be recognized as beneficiaries of refugee status and international protection. Using a conceptual tool, </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">the three-scale theory</span></em><span data-dcnode-id="486" instrument_node=""> , you will analyze in a rigorous and structured manner each distinct element of the refugee definition (persecution, risk, proof) as well as, in a comprehensive approach, the definition as a whole.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">By confronting theoretical analysis with practical situations, you will see that, if correctly interpreted, the Geneva Convention remains effective and still allows to this day the protection of many fugitives or refugees ( </span><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Flüchtling, réfugiés</span></em><span data-dcnode-id="480" instrument_node=""> ).</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="477" instrument_node="">Beyond law, you will understand the value of an interdisciplinary approach, in particular when measuring the credibility of an asylum seeker’s narrative.</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">
You will examine the importance of regional, subsidiary or complementary protection in addressing armed conflict, events seriously disturbing public order or mass influxes of people in need of international protection. Regional protections find their source in European Law, African law or American Law.</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
Finally, you will look at future challenges, such as the issue of climate refugees.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Numerous sources will be provided throughout the course in order to help you understand the concepts such as relevant case-law, doctrine and guidelines of UNHCR and other international institutions on refugee issues and international human rights law (such as EASO).</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">In this course, Asylum and Refugee Law, you will learn whether or not migrants can be returned to another country, whether or not they should be included in or excluded from the refugee definition, and whether or not to challenge the decision on someone’s refugee status. You will do all of this by developing a rigorous legal reasoning.</span></p></div></div><button class="preview-expand-cta btn btn-link mt-2 pt-1 pt-sm-2 px-0 pb-0" data-dcnode-id="462" id="about-this-course" type="button"><span data-dcnode-id="463" instrument_node="">Show more</span></button></div><div class="pt-4 mt-sm-3 pt-sm-3" data-dcnode-id="402"><h3 class="text-black pb-sm-2" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">At a glance</span></h3><div class="at-a-glance" data-dcnode-id="403"><div class="row" data-dcnode-id="404"><div class="col-12 col-md-6" data-dcnode-id="432"><ul class="mb-0 pl-3 ml-1" data-dcnode-id="433"><li data-dcnode-id="453"><span class="font-weight-bold" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Institution:</span></span><span data-dcnode-id="456" instrument_node=""> </span><a class="muted-link inline-link" data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edx.org/school/louvainx"><span data-dcnode-id="455" instrument_node="">LouvainX</span></a></li><li data-dcnode-id="447"><span class="font-weight-bold" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Subject: </span></span><span data-dcnode-id="450" instrument_node=""> </span><a class="muted-link inline-link" data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edx.org/learn/law"><span data-dcnode-id="449" instrument_node="">Law</span></a></li><li data-dcnode-id="441"><span class="font-weight-bold" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Level: </span></span><span data-dcnode-id="444" instrument_node=""> </span><span data-dcnode-id="442" instrument_node="">Advanced</span></li><li data-dcnode-id="434"><span class="font-weight-bold" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Prerequisites: </span></span><span data-dcnode-id="438" instrument_node=""> </span><div data-dcnode-id="435"><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Having completed an undergraduate degree program in Law (Bachelor’s degree, license, LL.B.) or having completed an undergraduate degree program in a field other than Law and/or having practical experience in human rights (having been in regular contact with migrants, having worked in asylum rights organizations or collaborated with refugee aid associations, etc.).</span></p></div></li></ul></div><div class="col-12 col-md-6" data-dcnode-id="405"><ul class="pl-3 ml-1 mb-0" data-dcnode-id="406"><li data-dcnode-id="426"><span class="font-weight-bold" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Language: </span></span><span data-dcnode-id="429" instrument_node=""> </span><span data-dcnode-id="427" instrument_node="">English</span></li><li data-dcnode-id="420"><span class="font-weight-bold" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Video Transcripts: </span></span><span data-dcnode-id="423" instrument_node=""> </span><span data-dcnode-id="421" instrument_node="">English, Français</span></li><li data-dcnode-id="407"><span class="font-weight-bold" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Associated programs:</span></span><ul class="list-unstyled mb-0" data-dcnode-id="408"><li data-dcnode-id="409"><span data-dcnode-id="417" instrument_node="">MicroMasters</span><sup class="superscript" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">®</span></sup><span data-dcnode-id="414" instrument_node=""> Program</span><span data-dcnode-id="412" instrument_node=""> in </span><a class="muted-link inline-link text-wrap" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edx.org/micromasters/louvainx-international-law"><span data-dcnode-id="411" instrument_node="">International Law</span></a></li></ul></li></ul></div></div></div></div><div data-dcnode-id="365"><div class="preview-expand-component" data-dcnode-id="366"><div class="preview-expand-header d-flex position-relative" data-dcnode-id="397"><h1 class="h1 nav-target pt-3 mt-3 pt-sm-5 mt-sm-2" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">What you'll learn</span></h1><a class="show-on-focus" data-dcnode-id="398" href="#outcome"><span data-dcnode-id="399" instrument_node="">Skip What you'll learn</span></a></div><div class="preview-expand-body m-0" data-dcnode-id="369"><div class="mt-2 html-data" data-dcnode-id="370"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">By the end of this course, you will be able to</span></p><span data-dcnode-id="394" instrument_node="">
</span><ul data-dcnode-id="371"><span data-dcnode-id="393" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">formulate rigorous legal reasoning on the right to asylum and international protection of refugees.</span></li><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">define and apply the concepts of asylum and refugee status.</span></li><span data-dcnode-id="387" instrument_node="">
</span><li data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">analyze case law decisions of international, regional and national courts and tribunals relating to asylum and refugee law.</span></li><span data-dcnode-id="384" instrument_node="">
</span><li data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">criticize or justify the reasoning of an asylum authority (administrative or judicial) in order to develop arguments in a decision or appeal.</span></li><span data-dcnode-id="381" instrument_node="">
</span><li data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">question and imagine the future challenges in the field of asylum.</span></li><span data-dcnode-id="378" instrument_node="">
</span><li data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">ensure well-constructed advocacy on international refugee law.</span></li><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">analyze asylum claims in details.</span></li><span data-dcnode-id="372" instrument_node="">
</span></ul></div></div><button class="preview-expand-cta btn btn-link mt-2 pt-1 pt-sm-2 px-0 pb-0" data-dcnode-id="367" id="outcome" type="button"><span data-dcnode-id="368" instrument_node="">Show more</span></button></div></div><div data-dcnode-id="308"><div class="preview-expand-component" data-dcnode-id="309"><div class="preview-expand-header d-flex position-relative" data-dcnode-id="360"><h1 class="h1 nav-target pt-3 mt-3 pt-sm-5 mt-sm-2" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Syllabus</span></h1><a class="show-on-focus" data-dcnode-id="361" href="#syllabus"><span data-dcnode-id="362" instrument_node="">Skip Syllabus</span></a></div><div class="preview-expand-body m-0" data-dcnode-id="312"><div class="mt-2 html-data" data-dcnode-id="313"><p data-dcnode-id="357"><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Module 1: Context of asylum law and underlying texts</span></strong></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">You will explore both the history and the current state of the right of asylum, illustrating the permanence of the debates related to asylum.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="348"><strong data-dcnode-id="349"><span data-dcnode-id="352" instrument_node="">Module 2: Asylum Law and Principle of </span><em data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">non-refoulement</span></em></strong></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">You'll learn the concept of asylum, the principle of </span><em data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">non-refoulement</span></em><span data-dcnode-id="343" instrument_node=""> and the distribution mechanism of asylum seekers in Europe under the Dublin Regulation.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="338"><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Module 3: Refugee definition</span></strong></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">This module is devoted to international protection and, in particular, to the refugee definition under the Geneva Convention (1951 refugee Convention).</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Module 4: Regional Protections</span></strong></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">This module discusses regional protections that complement international protection and the refugee definition in the 1951 Geneva Convention.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="324"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Module 5: Asylum in Practice</span></strong></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">You will explore the different components of an asylum procedure through the journey of asylum seekers from their country of origin to the country of destination.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="317"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Module 6: Contemporary Issues</span></strong></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">You will explore some current challenges to migration, for example finding solutions in law to adapt to new realities, such as climate refugees, or question the future effects of the Global Compact for Migration and the Global Compact in Refugees.</span></p></div></div><button class="preview-expand-cta btn btn-link mt-2 pt-1 pt-sm-2 px-0 pb-0" data-dcnode-id="310" id="syllabus" type="button"><span data-dcnode-id="311" instrument_node="">Show more</span></button></div></div></div></div><div class="instructors mx-auto d-flex flex-column justify-content-center" data-dcnode-id="302"><h1 class="h1 nav-target text-center mb-3 pt-3 mt-3 pt-sm-5 mt-sm-2" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">About the instructors</span></h1><div class="instructor-cards d-flex flex-wrap justify-content-center mx-auto" data-dcnode-id="303"></div></div><div class="container-mw-sm container-fluid" data-dcnode-id="281"><div class="preview-expand-component" data-dcnode-id="286"><div class="preview-expand-header d-flex position-relative" data-dcnode-id="297"><h1 class="pt-3 mt-3 pt-sm-5 mt-sm-2 nav-target" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Frequently Asked Questions</span></h1><a class="show-on-focus" data-dcnode-id="298" href="#faq"><span data-dcnode-id="299" instrument_node="">Skip Frequently Asked Questions</span></a></div><div class="preview-expand-body m-0" data-dcnode-id="289"><div class="mt-2 html-data" data-dcnode-id="290"><p data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">The content of the videos is in French, why?</span></strong></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The initial version of this course was made in French. We adapted everything (course material, quizzes etc) to create this English edition. The video audio is still in French, but you have English subtitles for every video.</span></p></div></div><button class="preview-expand-cta btn btn-link mt-2 pt-1 pt-sm-2 px-0 pb-0" data-dcnode-id="287" id="faq" type="button"><span data-dcnode-id="288" instrument_node="">Show more</span></button></div><div data-dcnode-id="282"><h1 class="pt-3 mt-3 pt-sm-5 mt-sm-2" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Who can take this course?</span></h1><span data-dcnode-id="283" instrument_node="">Unfortunately, learners residing in one or more of the following countries or regions will not be able to register for this course: Iran, Cuba and the Crimea region of Ukraine. While edX has sought licenses from the U.S. Office of Foreign Assets Control (OFAC) to offer our courses to learners in these countries and regions, the licenses we have received are not broad enough to allow us to offer this course in all locations. edX truly regrets that U.S. sanctions prevent us from offering all of our courses to everyone, no matter where they live.</span></div></div><div class="course-modes pt-lg-5 mt-lg-2 container-mw-sm container-fluid" data-dcnode-id="166"><div class="nav-target d-lg-flex" data-dcnode-id="167" tabindex="-1"><div class="left-panel" data-dcnode-id="266"><div class="left-panel-content" data-dcnode-id="267"><h1 class="mb-3 mb-sm-2 pb-sm-1" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Ways to take this course</span></h1><div class="p mb-3" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Choose your path when you enroll.</span></div><div class="" data-dcnode-id="268"><a class="btn btn-primary course-modes-enroll-btn" data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&am
