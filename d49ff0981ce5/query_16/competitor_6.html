</span></p><p data-dcnode-id="4608"><span data-dcnode-id="4613" instrument_node="">In September 2021, the Minister for Home Affairs signed a new deal with Nauru to keep an ongoing form of asylum seeker processing centre on the island.</span><sup class="reference" data-dcnode-id="4610" id="cite_ref-84"><a data-dcnode-id="4611" href="#cite_note-84"><span data-dcnode-id="4612" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4609" instrument_node="">
</span></p><p data-dcnode-id="4592"><span data-dcnode-id="4607" instrument_node="">In October 2021,  the Australian Government cut off all support to the remaining men in PNG, leaving the PNG Government to take over responsibility for them.</span><sup class="reference" data-dcnode-id="4604" id="cite_ref-butler2021_85-0"><a data-dcnode-id="4605" href="#cite_note-butler2021-85"><span data-dcnode-id="4606" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4603" instrument_node=""> The remaining men were told that their options are transferring to the Nauru processing centre or resettling in PNG.</span><sup class="reference" data-dcnode-id="4600" id="cite_ref-86"><a data-dcnode-id="4601" href="#cite_note-86"><span data-dcnode-id="4602" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="4597" id="cite_ref-87"><a data-dcnode-id="4598" href="#cite_note-87"><span data-dcnode-id="4599" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="4594" id="cite_ref-88"><a data-dcnode-id="4595" href="#cite_note-88"><span data-dcnode-id="4596" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4593" instrument_node="">
</span></p><span data-dcnode-id="4591" instrument_node="">
</span><h2 data-dcnode-id="4581"><span class="mw-headline" data-dcnode-id="4589" id="Contemporary_Policy_Trends"><span data-dcnode-id="4590" instrument_node="">Contemporary Policy Trends</span></span><span class="mw-editsection" data-dcnode-id="4582"><span class="mw-editsection-bracket" data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">[</span></span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D23" title="Edit section: Contemporary Policy Trends"><span data-dcnode-id="4586" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4580" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="4559" role="presentation"><tbody data-dcnode-id="4560"><tr data-dcnode-id="4561"><td class="mbox-image" data-dcnode-id="4577"><div data-dcnode-id="4578" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="4579" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="4562"><div class="mbox-text-span" data-dcnode-id="4563"><span data-dcnode-id="4576" instrument_node="">This section needs to be </span><b data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">updated</span></b><span data-dcnode-id="4573" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="4570" instrument_node=""> </span><span class="date-container" data-dcnode-id="4564"><i data-dcnode-id="4565"><span data-dcnode-id="4569" instrument_node="">(</span><span class="date" data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">February 2019</span></span><span data-dcnode-id="4566" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4558" instrument_node="">
</span><p data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">A number of changes have been implemented in relation to mandatory detention, both broadening opportunities for community integration by offering community alternatives and narrowing release through the creation of new immigration status designations.
</span></p><span data-dcnode-id="4555" instrument_node="">
</span><h3 data-dcnode-id="4545"><span class="mw-headline" data-dcnode-id="4553" id="Community_placements"><span data-dcnode-id="4554" instrument_node="">Community placements</span></span><span class="mw-editsection" data-dcnode-id="4546"><span class="mw-editsection-bracket" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">[</span></span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D24" title="Edit section: Community placements"><span data-dcnode-id="4550" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4544" instrument_node="">
</span><p data-dcnode-id="4538"><span data-dcnode-id="4543" instrument_node="">Those granted Bridging Visas are able to access basic government services, including Centrelink and Medicare. They are able to move freely within their community, but are unable to choose the community that they live in, required to live an address designated by the Minister for Immigration and Border Protection.</span><sup class="reference" data-dcnode-id="4540" id="cite_ref-:6_70-1"><a data-dcnode-id="4541" href="#cite_note-:6-70"><span data-dcnode-id="4542" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4539" instrument_node="">
</span></p><span data-dcnode-id="4537" instrument_node="">
</span><h3 data-dcnode-id="4527"><span class="mw-headline" data-dcnode-id="4535" id="Work_rights"><span data-dcnode-id="4536" instrument_node="">Work rights</span></span><span class="mw-editsection" data-dcnode-id="4528"><span class="mw-editsection-bracket" data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">[</span></span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D25" title="Edit section: Work rights"><span data-dcnode-id="4532" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4526" instrument_node="">
</span><p data-dcnode-id="4520"><span data-dcnode-id="4525" instrument_node="">For the designated refugees that are eligible for work, many are prevented from entering the work force owing to issues of cultural competency and language. The overall effect is that the great majority of refugees in Australia are eager to workout without any pathways into the Australian work force.</span><sup class="reference" data-dcnode-id="4522" id="cite_ref-:6_70-2"><a data-dcnode-id="4523" href="#cite_note-:6-70"><span data-dcnode-id="4524" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4521" instrument_node="">
</span></p><span data-dcnode-id="4519" instrument_node="">
</span><h3 data-dcnode-id="4509"><span class="mw-headline" data-dcnode-id="4517" id="Refugees_with_adverse_security_assessment"><span data-dcnode-id="4518" instrument_node="">Refugees with adverse security assessment</span></span><span class="mw-editsection" data-dcnode-id="4510"><span class="mw-editsection-bracket" data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">[</span></span><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D26" title="Edit section: Refugees with adverse security assessment"><span data-dcnode-id="4514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4508" instrument_node="">
</span><p data-dcnode-id="4502"><span data-dcnode-id="4507" instrument_node="">Recent administrative changes have seen the introduction of a new category of designated immigration status: adverse security assessments.</span><sup class="reference" data-dcnode-id="4504" id="cite_ref-:6_70-3"><a data-dcnode-id="4505" href="#cite_note-:6-70"><span data-dcnode-id="4506" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4503" instrument_node="">
</span></p><span data-dcnode-id="4501" instrument_node="">
</span><h3 data-dcnode-id="4491"><span class="mw-headline" data-dcnode-id="4499" id="Visa_cancellations_and_the_Border_Force_Act"><span data-dcnode-id="4500" instrument_node="">Visa cancellations and the Border Force Act</span></span><span class="mw-editsection" data-dcnode-id="4492"><span class="mw-editsection-bracket" data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">[</span></span><a data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D27" title="Edit section: Visa cancellations and the Border Force Act"><span data-dcnode-id="4496" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4490" instrument_node="">
</span><p data-dcnode-id="4478"><span data-dcnode-id="4489" instrument_node="">The </span><i data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">Australian Border Force Act 2015</span></i><span data-dcnode-id="4486" instrument_node=""> (Cth) makes it a crime punishment of two years imprisonment for an entrusted person to make record of or disclose 'protected information'. This raises issues relating to judicial power. By denying the court's access to information by which to evaluate a matter, it constitutes an impermissible interference on the functions of a court following the decision in </span><i data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">Graham v Minister for Immigration and Border Control</span></i><span data-dcnode-id="4483" instrument_node="">. The matter has yet be fully resolved.</span><sup class="reference" data-dcnode-id="4480" id="cite_ref-:6_70-4"><a data-dcnode-id="4481" href="#cite_note-:6-70"><span data-dcnode-id="4482" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4479" instrument_node="">
</span></p><span data-dcnode-id="4477" instrument_node="">
</span><h2 data-dcnode-id="4467"><span class="mw-headline" data-dcnode-id="4475" id="Arrival_and_processing_in_mainland_Australia"><span data-dcnode-id="4476" instrument_node="">Arrival and processing in mainland Australia</span></span><span class="mw-editsection" data-dcnode-id="4468"><span class="mw-editsection-bracket" data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">[</span></span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D28" title="Edit section: Arrival and processing in mainland Australia"><span data-dcnode-id="4472" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4466" instrument_node="">
</span><p data-dcnode-id="4460"><span data-dcnode-id="4465" instrument_node="">After arriving in Australia, the experience for any individual persons seeking asylum is largely impacted by the location they are placed, socioeconomic status, country of origin, age, sex and knowledge of the area, including family or friends that were in Australia prior to their arrival. Nonetheless, there are recurrent difficulties that surface continuously in asylum seeker communities across Australia, in the interim between arrival and refugee status determination.</span><sup class="reference" data-dcnode-id="4462" id="cite_ref-:2_89-0"><a data-dcnode-id="4463" href="#cite_note-:2-89"><span data-dcnode-id="4464" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4461" instrument_node="">
</span></p><span data-dcnode-id="4459" instrument_node="">
</span><h3 data-dcnode-id="4449"><span class="mw-headline" data-dcnode-id="4457" id="Housing"><span data-dcnode-id="4458" instrument_node="">Housing</span></span><span class="mw-editsection" data-dcnode-id="4450"><span class="mw-editsection-bracket" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">[</span></span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D29" title="Edit section: Housing"><span data-dcnode-id="4454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4448" instrument_node="">
</span><p data-dcnode-id="4434"><span data-dcnode-id="4447" instrument_node="">For asylum seekers that arrive in Australia and receive a temporary protection visa (subclass 785),</span><sup class="reference" data-dcnode-id="4444" id="cite_ref-90"><a data-dcnode-id="4445" href="#cite_note-90"><span data-dcnode-id="4446" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4443" instrument_node=""> they are given the right to live in the community and are largely given autonomy to choose housing. The Australian government does not provide services to link asylum seekers with potential housing.</span><sup class="reference" data-dcnode-id="4440" id="cite_ref-:2_89-1"><a data-dcnode-id="4441" href="#cite_note-:2-89"><span data-dcnode-id="4442" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4439" instrument_node=""> Their ephemeral status in the country, entirely dependent on status determination by the government, leads to apprehension amongst housing providers arising from concern that they may not remain in Australia for the duration of the lease. The lack of clarity and certainty owing to their undefined legal status therefore deters housing providers from offering leases to asylum seekers.</span><sup class="reference" data-dcnode-id="4436" id="cite_ref-:2_89-2"><a data-dcnode-id="4437" href="#cite_note-:2-89"><span data-dcnode-id="4438" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4435" instrument_node="">
</span></p><p data-dcnode-id="4420"><span data-dcnode-id="4433" instrument_node="">Compounding this factor is the exceptionally low income for most asylum seekers, arising from their inability to work legally in Australia (an issue that will be comprehensively discussed below).</span><sup class="reference" data-dcnode-id="4430" id="cite_ref-:2_89-3"><a data-dcnode-id="4431" href="#cite_note-:2-89"><span data-dcnode-id="4432" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4429" instrument_node=""> These low wages limit housing options for asylum seekers and leaves them susceptible to a higher risk of exploitation. Substandard housing conditions clearly follows from this difficulty.</span><sup class="reference" data-dcnode-id="4426" id="cite_ref-:2_89-4"><a data-dcnode-id="4427" href="#cite_note-:2-89"><span data-dcnode-id="4428" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4425" instrument_node=""> One instance in Adelaide found 20 temporary protection visa holders living in a single address, while a service provider in Sydney reported instances where people seeking asylum had been convinced by real estate agents to rent non-residential properties such as warehouses with dividers between the beds.</span><sup class="reference" data-dcnode-id="4422" id="cite_ref-:2_89-5"><a data-dcnode-id="4423" href="#cite_note-:2-89"><span data-dcnode-id="4424" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4421" instrument_node="">
</span></p><p data-dcnode-id="4402"><span data-dcnode-id="4419" instrument_node="">General issues prevalent across most major cities in Australia in relation to housing are compounded in severity for asylum seekers.</span><sup class="reference" data-dcnode-id="4416" id="cite_ref-:2_89-6"><a data-dcnode-id="4417" href="#cite_note-:2-89"><span data-dcnode-id="4418" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4415" instrument_node=""> Housing affordability for most areas in proximity to city centres has become out of reach for both buyers and renters.</span><sup class="reference" data-dcnode-id="4412" id="cite_ref-:3_91-0"><a data-dcnode-id="4413" href="#cite_note-:3-91"><span data-dcnode-id="4414" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4411" instrument_node=""> In the two largest cities of Sydney and Melbourne, housing availability is an additional strain for renters, with a competitive market leading to some perpetually searching for housing.</span><sup class="reference" data-dcnode-id="4408" id="cite_ref-:3_91-1"><a data-dcnode-id="4409" href="#cite_note-:3-91"><span data-dcnode-id="4410" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4407" instrument_node=""> The impact these general issues have on asylum seekers searching for housing open arrival into Australia is therefore significant and, at times, debilitating, leading to substantial possibility of homelessness throughout these communities.</span><sup class="reference" data-dcnode-id="4404" id="cite_ref-:2_89-7"><a data-dcnode-id="4405" href="#cite_note-:2-89"><span data-dcnode-id="4406" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4403" instrument_node="">
</span></p><span data-dcnode-id="4401" instrument_node="">
</span><h3 data-dcnode-id="4391"><span class="mw-headline" data-dcnode-id="4399" id="Income_and_work_rights"><span data-dcnode-id="4400" instrument_node="">Income and work rights</span></span><span class="mw-editsection" data-dcnode-id="4392"><span class="mw-editsection-bracket" data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">[</span></span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D30" title="Edit section: Income and work rights"><span data-dcnode-id="4396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4390" instrument_node="">
</span><p data-dcnode-id="4373"><span data-dcnode-id="4389" instrument_node="">Asylum seekers in Australia are precluded from the ability to work until a determination is made on their refugee status.</span><sup class="reference" data-dcnode-id="4386" id="cite_ref-92"><a data-dcnode-id="4387" href="#cite_note-92"><span data-dcnode-id="4388" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4385" instrument_node=""> The timeline for status determination varies considerably on a case-by-case basis. Until the passage of the </span><i data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">Migration and Maritime Powers (Resolving the Asylum Legacy Caseload) Act 2015</span></i><span data-dcnode-id="4382" instrument_node=""> (Cth), the Commonwealth was required to report the percentage of decisions made within 90 days of lodging their application. From 2013 to 2014, the Department of Immigration and Border Protection made just seven percent of initial decisions within the given timeframe.</span><sup class="reference" data-dcnode-id="4379" id="cite_ref-:4_93-0"><a data-dcnode-id="4380" href="#cite_note-:4-93"><span data-dcnode-id="4381" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4378" instrument_node=""> While more current data is unavailable, it is unlikely that the change of Liberal leadership (and therefore government) from Abbott to Turnbull has raised these rates. This means that it is likely that the overwhelming majority of asylum seekers in Australia are unable to work for well over three months while they wait for status determination.</span><sup class="reference" data-dcnode-id="4375" id="cite_ref-:4_93-1"><a data-dcnode-id="4376" href="#cite_note-:4-93"><span data-dcnode-id="4377" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4374" instrument_node="">
</span></p><p data-dcnode-id="4363"><span data-dcnode-id="4372" instrument_node="">The lack of ability to work forces asylum seekers in Australia to rely heavily on Centrelink payments.</span><sup class="reference" data-dcnode-id="4369" id="cite_ref-:2_89-8"><a data-dcnode-id="4370" href="#cite_note-:2-89"><span data-dcnode-id="4371" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4368" instrument_node=""> Their capacity to earn is then greatly reduced and there is an identifiable gap in the interstice between application for refugee status and refugee status determination where asylum seekers in Australia are placed into a tenuous financial position.</span><sup class="reference" data-dcnode-id="4365" id="cite_ref-:2_89-9"><a data-dcnode-id="4366" href="#cite_note-:2-89"><span data-dcnode-id="4367" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4364" instrument_node="">
</span></p><p data-dcnode-id="4349"><span data-dcnode-id="4362" instrument_node="">The bleak outlook on income are working rights so described leads to a direct impact on the mental health of the asylum seeker community.</span><sup class="reference" data-dcnode-id="4359" id="cite_ref-:2_89-10"><a data-dcnode-id="4360" href="#cite_note-:2-89"><span data-dcnode-id="4361" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4358" instrument_node=""> For those asylum seekers that go on to be recognised as legally defined refugees, the labour opportunities are largely seen as a window dressing exercise.</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-:2_89-11"><a data-dcnode-id="4356" href="#cite_note-:2-89"><span data-dcnode-id="4357" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4354" instrument_node=""> The support given is unspecialised, with Jobactive largely ignoring the unique difficulties newly recognised refugees possess when searching for and obtaining work.</span><sup class="reference" data-dcnode-id="4351" id="cite_ref-:2_89-12"><a data-dcnode-id="4352" href="#cite_note-:2-89"><span data-dcnode-id="4353" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4350" instrument_node="">
</span></p><span data-dcnode-id="4348" instrument_node="">
</span><h3 data-dcnode-id="4338"><span class="mw-headline" data-dcnode-id="4346" id="Procedural_Challenges"><span data-dcnode-id="4347" instrument_node="">Procedural Challenges</span></span><span class="mw-editsection" data-dcnode-id="4339"><span class="mw-editsection-bracket" data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">[</span></span><a data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D31" title="Edit section: Procedural Challenges"><span data-dcnode-id="4343" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4337" instrument_node="">
</span><p data-dcnode-id="4323"><span data-dcnode-id="4336" instrument_node="">The Status Resolution Support Services (SSRS) is the Department of Immigration and Border Protection's replacement for the previous Community Assistance Program (CAP) that is meant to connect migrants and non-citizens with social services.</span><sup class="reference" data-dcnode-id="4333" id="cite_ref-94"><a data-dcnode-id="4334" href="#cite_note-94"><span data-dcnode-id="4335" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4332" instrument_node=""> The services are delivered under six different bands that vary dependent upon identity and timeline of asylum.</span><sup class="reference" data-dcnode-id="4329" id="cite_ref-:2_89-13"><a data-dcnode-id="4330" href="#cite_note-:2-89"><span data-dcnode-id="4331" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4328" instrument_node=""> There are issues latent within the SSRS arising from a strict adherence to the band taxonomy that leads to a stringent, and at times problematic, application of the band criteria.</span><sup class="reference" data-dcnode-id="4325" id="cite_ref-:2_89-14"><a data-dcnode-id="4326" href="#cite_note-:2-89"><span data-dcnode-id="4327" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4324" instrument_node=""> There is the additional strain of a high caseworker to client ratio of 1:120, which has largely been viewed as a compromise on quality.
</span></p><p data-dcnode-id="4309"><span data-dcnode-id="4322" instrument_node="">The Code of Behaviour is an agreement asylum seekers sign when arriving in Australia that largely binds them to certain standards of behaviour while awaiting refugee status determination.</span><sup class="reference" data-dcnode-id="4319" id="cite_ref-95"><a data-dcnode-id="4320" href="#cite_note-95"><span data-dcnode-id="4321" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4318" instrument_node=""> This has been received by the community as casting a dark shadow for asylum seekers' experience in Australia, with many of the signees feeling that the agreement creates uncertainty and confusion as to which actions may jeopardise their applications.</span><sup class="reference" data-dcnode-id="4315" id="cite_ref-:2_89-15"><a data-dcnode-id="4316" href="#cite_note-:2-89"><span data-dcnode-id="4317" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4314" instrument_node=""> The effect of the Code of Behaviour has deterred refugees from community events out of fear that their participation could contribute to a denial of their applications.</span><sup class="reference" data-dcnode-id="4311" id="cite_ref-:2_89-16"><a data-dcnode-id="4312" href="#cite_note-:2-89"><span data-dcnode-id="4313" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4310" instrument_node="">
</span></p><span data-dcnode-id="4308" instrument_node="">
</span><h2 data-dcnode-id="4298"><span class="mw-headline" data-dcnode-id="4306" id="Public_debate_and_politics"><span data-dcnode-id="4307" instrument_node="">Public debate and politics</span></span><span class="mw-editsection" data-dcnode-id="4299"><span class="mw-editsection-bracket" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">[</span></span><a data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D32" title="Edit section: Public debate and politics"><span data-dcnode-id="4303" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4291"><span data-dcnode-id="4296" instrument_node="">Opinion polls show that boat arrivals have always been an issue of concern to the Australian public, but opposition has increased steadily over the previous four decades, according to a 2013 research paper by the Parliamentary Library.</span><sup class="reference" data-dcnode-id="4293" id="cite_ref-baia_5-4"><a data-dcnode-id="4294" href="#cite_note-baia-5"><span data-dcnode-id="4295" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4292" instrument_node="">
</span></p><p data-dcnode-id="4282"><span data-dcnode-id="4290" instrument_node="">In 2005, the wrongful incarceration of </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cornelia_Rau" title="Cornelia Rau"><span data-dcnode-id="4289" instrument_node="">Cornelia Rau</span></a><span data-dcnode-id="4287" instrument_node=""> was made public through the Palmer Inquiry, which stimulated concern in the Australian public about the detention of children in remote locations and the potential for resultant long-term psychological harm.</span><sup class="reference" data-dcnode-id="4284" id="cite_ref-ats_10-4"><a data-dcnode-id="4285" href="#cite_note-ats-10"><span data-dcnode-id="4286" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4283" instrument_node="">
</span></p><p data-dcnode-id="4256"><span data-dcnode-id="4281" instrument_node="">Between 1998 and 2008, the </span><a class="mw-redirect" data-dcnode-id="4279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_Human_Rights_Committee" title="UN Human Rights Committee"><span data-dcnode-id="4280" instrument_node="">UN Human Rights Committee</span></a><span data-dcnode-id="4278" instrument_node=""> made adverse findings against Australia in a number of immigration detention cases, concluding that Australia had violated the prohibition on arbitrary detention in Article 9(1) of the </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Covenant_on_Civil_and_Political_Rights" title="International Covenant on Civil and Political Rights"><span data-dcnode-id="4277" instrument_node="">International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="4275" instrument_node="">.</span><sup class="reference" data-dcnode-id="4272" id="cite_ref-ats_10-5"><a data-dcnode-id="4273" href="#cite_note-ats-10"><span data-dcnode-id="4274" instrument_node="">[10]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4265" style="white-space:nowrap;"><span data-dcnode-id="4271" instrument_node="">[</span><i data-dcnode-id="4267"><a data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4269" title="This claim needs references to reliable sources. (December 2016)"><span data-dcnode-id="4270" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4266" instrument_node="">]</span></sup><span data-dcnode-id="4264" instrument_node=""> The longest-held detainee within the Australian immigration detention system was </span><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Qasim" title="Peter Qasim"><span data-dcnode-id="4263" instrument_node="">Peter Qasim</span></a><span data-dcnode-id="4261" instrument_node="">, who was detained for six years and ten months.</span><sup class="reference" data-dcnode-id="4258" id="cite_ref-olai_96-0"><a data-dcnode-id="4259" href="#cite_note-olai-96"><span data-dcnode-id="4260" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4257" instrument_node="">
</span></p><p data-dcnode-id="4237"><span data-dcnode-id="4255" instrument_node="">In March 2012, former Prime Minister </span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Keating" title="Paul Keating"><span data-dcnode-id="4254" instrument_node="">Paul Keating</span></a><span data-dcnode-id="4252" instrument_node=""> said there were "racial undertones" to the debate and that Australia's reputation in Asia was being damaged.</span><sup class="reference" data-dcnode-id="4249" id="cite_ref-pks_97-0"><a data-dcnode-id="4250" href="#cite_note-pks-97"><span data-dcnode-id="4251" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4248" instrument_node=""> In 2013, former Prime Minister </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_Fraser" title="Malcolm Fraser"><span data-dcnode-id="4247" instrument_node="">Malcolm Fraser</span></a><span data-dcnode-id="4245" instrument_node=""> described the positions of the major political parties as a "</span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_to_the_bottom" title="Race to the bottom"><span data-dcnode-id="4244" instrument_node="">race to the bottom</span></a><span data-dcnode-id="4242" instrument_node="">".</span><sup class="reference" data-dcnode-id="4239" id="cite_ref-mfb_98-0"><a data-dcnode-id="4240" href="#cite_note-mfb-98"><span data-dcnode-id="4241" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4238" instrument_node="">
</span></p><p data-dcnode-id="4224"><span data-dcnode-id="4236" instrument_node="">In 2003, economist </span><a data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ross_Gittins" title="Ross Gittins"><span data-dcnode-id="4235" instrument_node="">Ross Gittins</span></a><span data-dcnode-id="4233" instrument_node="">, a columnist at </span><i data-dcnode-id="4230"><a data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fairfax_Media" title="Fairfax Media"><span data-dcnode-id="4232" instrument_node="">Fairfax Media</span></a></i><span data-dcnode-id="4229" instrument_node="">, said former Prime Minister John Howard had been "a tricky chap " on immigration, by appearing "tough" on illegal immigration to win support from the working class, while simultaneously winning support from employers with high legal immigration.</span><sup class="reference" data-dcnode-id="4226" id="cite_ref-uk2_99-0"><a data-dcnode-id="4227" href="#cite_note-uk2-99"><span data-dcnode-id="4228" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4225" instrument_node="">
</span></p><p data-dcnode-id="4215"><span data-dcnode-id="4223" instrument_node="">In 2016, the UN Special Rapporteur on the human rights of migrants, </span><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Cr%25C3%25A9peau" title="François Crépeau"><span data-dcnode-id="4222" instrument_node="">François Crépeau</span></a><span data-dcnode-id="4220" instrument_node="">, criticised Australia's policies of mandatory and off-shore immigration detention. Crépeau claimed that Australia had adopted a "punitive approach" towards migrants who arrived by boat which had served to "erode their human rights".</span><sup class="reference" data-dcnode-id="4217" id="cite_ref-100"><a data-dcnode-id="4218" href="#cite_note-100"><span data-dcnode-id="4219" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4216" instrument_node="">
</span></p><p data-dcnode-id="4200"><span data-dcnode-id="4214" instrument_node="">The attempted deportation of the </span><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sri_Lanka" title="Sri Lanka"><span data-dcnode-id="4213" instrument_node="">Sri Lanka</span></a><span data-dcnode-id="4211" instrument_node=""> </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sri_Lankan_Tamils" title="Sri Lankan Tamils"><span data-dcnode-id="4210" instrument_node="">Tamil</span></a><span data-dcnode-id="4208" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadesalingam_family_asylum_claims" title="Nadesalingam family asylum claims"><span data-dcnode-id="4207" instrument_node="">Nadesalingam family</span></a><span data-dcnode-id="4205" instrument_node=""> was the subject of significant media attention in 2019.</span><sup class="reference" data-dcnode-id="4202" id="cite_ref-Pengilley_101-0"><a data-dcnode-id="4203" href="#cite_note-Pengilley-101"><span data-dcnode-id="4204" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4201" instrument_node="">
</span></p><span data-dcnode-id="4199" instrument_node="">
