</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="6653" id="firstHeading"><span data-dcnode-id="6654" instrument_node="">Asylum in Australia</span></h1><span data-dcnode-id="6652" instrument_node="">
</span><div class="vector-body" data-dcnode-id="434" id="bodyContent"><span data-dcnode-id="6651" instrument_node="">
</span><div class="noprint" data-dcnode-id="6649" id="siteSub"><span data-dcnode-id="6650" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="6648" instrument_node="">
</span><div data-dcnode-id="6647" id="contentSub"></div><span data-dcnode-id="6646" instrument_node="">
</span><div data-dcnode-id="6645" id="contentSub2"></div><span data-dcnode-id="6644" instrument_node="">

</span><a class="mw-jump-link" data-dcnode-id="6640" href="#mw-head"><span data-dcnode-id="6641" instrument_node="">Jump to navigation</span></a><span data-dcnode-id="6639" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="6637" href="#searchInput"><span data-dcnode-id="6638" instrument_node="">Jump to search</span></a><span data-dcnode-id="6636" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="494" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="503"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="6634" style="display:none"><span data-dcnode-id="6635" instrument_node="">Overview of the right for asylum in Australia</span></div><span data-dcnode-id="6633" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6624" role="note"><span data-dcnode-id="6630" instrument_node="">See also: </span><a data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_history_of_Australia" title="Immigration history of Australia"><span data-dcnode-id="6629" instrument_node="">Immigration history of Australia</span></a><span data-dcnode-id="6627" instrument_node=""> and </span><a data-dcnode-id="6625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_detention_in_Australia" title="Immigration detention in Australia"><span data-dcnode-id="6626" instrument_node="">Immigration detention in Australia</span></a></div><span data-dcnode-id="6623" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">
</span></p><p data-dcnode-id="6608"><b data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">Asylum in Australia</span></b><span data-dcnode-id="6618" instrument_node=""> has been granted to many refugees since 1945, when half a million Europeans displaced by </span><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="6617" instrument_node="">World War II</span></a><span data-dcnode-id="6615" instrument_node=""> were given asylum. Since then, there have been periodic waves of asylum seekers from </span><a class="mw-redirect" data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_East_Asia" title="South East Asia"><span data-dcnode-id="6614" instrument_node="">South East Asia</span></a><span data-dcnode-id="6612" instrument_node=""> and the </span><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="6611" instrument_node="">Middle East</span></a><span data-dcnode-id="6609" instrument_node="">, with government policy and public opinion changing over the years.
</span></p><p data-dcnode-id="6584"><span data-dcnode-id="6607" instrument_node="">Refugees are governed by statutes and Government policies which seek to implement Australia's obligations under the </span><a class="mw-redirect" data-dcnode-id="6605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_relating_to_the_Status_of_Refugees" title="Convention relating to the Status of Refugees"><span data-dcnode-id="6606" instrument_node="">Convention relating to the Status of Refugees</span></a><span data-dcnode-id="6604" instrument_node="">, to which Australia is a party. Thousands of refugees have sought asylum in Australia over the past decade,</span><sup class="reference" data-dcnode-id="6601" id="cite_ref-adopts_1-0"><a data-dcnode-id="6602" href="#cite_note-adopts-1"><span data-dcnode-id="6603" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6600" instrument_node=""> with the main forces driving movement being war, civil unrest and persecution.</span><sup class="reference" data-dcnode-id="6597" id="cite_ref-tps_2-0"><a data-dcnode-id="6598" href="#cite_note-tps-2"><span data-dcnode-id="6599" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6596" instrument_node=""> The annual refugee quota in 2012 was 20,000 people.</span><sup class="reference" data-dcnode-id="6593" id="cite_ref-gai_3-0"><a data-dcnode-id="6594" href="#cite_note-gai-3"><span data-dcnode-id="6595" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6592" instrument_node=""> From 1945 to the early 1990s, more than half a million refugees and other </span><a class="mw-redirect" data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Displaced_person" title="Displaced person"><span data-dcnode-id="6591" instrument_node="">displaced persons</span></a><span data-dcnode-id="6589" instrument_node=""> were accepted into Australia.</span><sup class="reference" data-dcnode-id="6586" id="cite_ref-epa_4-0"><a data-dcnode-id="6587" href="#cite_note-epa-4"><span data-dcnode-id="6588" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6585" instrument_node="">
</span></p><p data-dcnode-id="6564"><span data-dcnode-id="6583" instrument_node="">Historically, most asylum seekers arrived by plane. However, there was an increasing number of asylum seekers arriving by boat in the late 2000s and early 2010s, which was met with some public disapproval.</span><sup class="reference" data-dcnode-id="6580" id="cite_ref-baia_5-0"><a data-dcnode-id="6581" href="#cite_note-baia-5"><span data-dcnode-id="6582" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6579" instrument_node=""> In 2011–2012, asylum seekers arriving by boat outnumbered those arriving by plane for the first time.</span><sup class="reference" data-dcnode-id="6576" id="cite_ref-6"><a data-dcnode-id="6577" href="#cite_note-6"><span data-dcnode-id="6578" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="6573" id="cite_ref-news.com.au_7-0"><a data-dcnode-id="6574" href="#cite_note-news.com.au-7"><span data-dcnode-id="6575" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="6570" id="cite_ref-8"><a data-dcnode-id="6571" href="#cite_note-8"><span data-dcnode-id="6572" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6569" instrument_node=""> Three waves of asylum seekers arriving by boat have been identified: Vietnamese between 1976 and 1981; Indochinese asylum seekers from 1989 to 1998; and people of Middle East origin from 1999.</span><sup class="reference" data-dcnode-id="6566" id="cite_ref-baia_5-1"><a data-dcnode-id="6567" href="#cite_note-baia-5"><span data-dcnode-id="6568" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6565" instrument_node="">
</span></p><p data-dcnode-id="6549"><span data-dcnode-id="6563" instrument_node="">The </span><a data-dcnode-id="6561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visa_policy_of_Australia" title="Visa policy of Australia"><span data-dcnode-id="6562" instrument_node="">visa policy</span></a><span data-dcnode-id="6560" instrument_node=""> of the current government is to detain persons entering or being in Australia without a valid </span><a class="mw-redirect" data-dcnode-id="6558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visa_%28document%29" title="Visa (document)"><span data-dcnode-id="6559" instrument_node="">visa</span></a><span data-dcnode-id="6557" instrument_node=""> until those persons can be returned to their home country. Australia is the only country in the world with a policy of mandatory detention and offshore processing of asylum seekers who arrive without a valid visa.</span><sup class="reference" data-dcnode-id="6554" id="cite_ref-9"><a data-dcnode-id="6555" href="#cite_note-9"><span data-dcnode-id="6556" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="6551" id="cite_ref-ats_10-0"><a data-dcnode-id="6552" href="#cite_note-ats-10"><span data-dcnode-id="6553" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6550" instrument_node="">
</span></p><p data-dcnode-id="6538"><span data-dcnode-id="6548" instrument_node="">Asylum policy is a contentious </span><a data-dcnode-id="6546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wedge_issue" title="Wedge issue"><span data-dcnode-id="6547" instrument_node="">wedge issue</span></a><span data-dcnode-id="6545" instrument_node=""> in Australian politics, with the two major </span><a class="mw-redirect" data-dcnode-id="6543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_parties_in_Australia" title="Political parties in Australia"><span data-dcnode-id="6544" instrument_node="">political parties in Australia</span></a><span data-dcnode-id="6542" instrument_node=""> arguing that the issue is a </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Border_control" title="Border control"><span data-dcnode-id="6541" instrument_node="">border control</span></a><span data-dcnode-id="6539" instrument_node=""> problem and one concerning the safety of those attempting to come to Australia by boat.
</span></p><span data-dcnode-id="6537" instrument_node="">
</span><div aria-labelledby="mw-toc-heading" class="toc" data-dcnode-id="6238" id="toc" role="navigation"><input class="toctogglecheckbox" data-dcnode-id="6536" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="6531" dir="ltr" lang="en"><h2 data-dcnode-id="6534" id="mw-toc-heading"><span data-dcnode-id="6535" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="6532"><label class="toctogglelabel" data-dcnode-id="6533" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="6530" instrument_node="">
</span><ul data-dcnode-id="6240"><span data-dcnode-id="6529" instrument_node="">
</span><li class="toclevel-1 tocsection-1" data-dcnode-id="6502"><a data-dcnode-id="6523" href="#Laws_governing_the_status_of_asylum_seekers"><span class="tocnumber" data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">1</span></span><span data-dcnode-id="6526" instrument_node=""> </span><span class="toctext" data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">Laws governing the status of asylum seekers</span></span></a><span data-dcnode-id="6522" instrument_node="">

</span><h2 data-dcnode-id="6226"><span class="mw-headline" data-dcnode-id="6234" id="Laws_governing_the_status_of_asylum_seekers"><span class="anchor" data-dcnode-id="6236" id="asylumseekerlaw"></span><span data-dcnode-id="6235" instrument_node="">Laws governing the status of asylum seekers</span></span><span class="mw-editsection" data-dcnode-id="6227"><span class="mw-editsection-bracket" data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">[</span></span><a data-dcnode-id="6230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D1" title="Edit section: Laws governing the status of asylum seekers"><span data-dcnode-id="6231" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6225" instrument_node="">
</span><p data-dcnode-id="6219"><span data-dcnode-id="6224" instrument_node="">Historically, Australia was generally viewed as a world leader in resettling refugees, with more than 870,000 refugees resettled in Australia since World War II. Yet Australia is also one of the world's poorest in providing durable solutions to people who come here to claim protection – people seeking asylum – especially if they come by boat.</span><sup class="reference" data-dcnode-id="6221" id="cite_ref-:5_11-0"><a data-dcnode-id="6222" href="#cite_note-:5-11"><span data-dcnode-id="6223" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6220" instrument_node=""> This dichotomy has persisted into the present.
</span></p><p data-dcnode-id="6198"><span data-dcnode-id="6218" instrument_node="">The processing of people seeking asylum that have arrived in Australia for status determination has undergone significant change over the past decade.</span><sup class="reference" data-dcnode-id="6215" id="cite_ref-:1_12-0"><a data-dcnode-id="6216" href="#cite_note-:1-12"><span data-dcnode-id="6217" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6214" instrument_node=""> The process for refugee status determination is dynamic, with the government's humanitarian program mainly diverging in process between on-shore and off-shore arrivals.</span><sup class="reference" data-dcnode-id="6211" id="cite_ref-:1_12-1"><a data-dcnode-id="6212" href="#cite_note-:1-12"><span data-dcnode-id="6213" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6210" instrument_node=""> While the </span><i data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">Migration Act 1958</span></i><span data-dcnode-id="6207" instrument_node=""> (Cth) had previously drafted to give effect to Australia's obligations under international law,</span><sup class="reference" data-dcnode-id="6204" id="cite_ref-13"><a data-dcnode-id="6205" href="#cite_note-13"><span data-dcnode-id="6206" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6203" instrument_node=""> mainly the 1951 Convention Relating to the Status of Refugees and its First Optional Protocol, recent legislative amendments by successive governments have uncoupled the Act from giving effect to the Convention. This has resulted in a softening on the impact of the Convention in interpreting the Act, leading to the government resiling from the protocol set out in the international agreement.</span><sup class="reference" data-dcnode-id="6200" id="cite_ref-14"><a data-dcnode-id="6201" href="#cite_note-14"><span data-dcnode-id="6202" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6199" instrument_node="">
</span></p><p data-dcnode-id="6163"><span data-dcnode-id="6197" instrument_node="">The </span><i data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">Migration Amendment (Designated Unauthorised Arrivals) Bill 2006</span></i><span data-dcnode-id="6194" instrument_node=""> introduced by the </span><a class="mw-redirect" data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Government" title="Howard Government"><span data-dcnode-id="6193" instrument_node="">Howard Government</span></a><sup class="reference" data-dcnode-id="6189" id="cite_ref-15"><a data-dcnode-id="6190" href="#cite_note-15"><span data-dcnode-id="6191" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6188" instrument_node=""> was withdrawn after an enquiry by a Senate Committee which reported on the Bill recommended that it should not proceed in light of the evidence presented to it,</span><sup class="reference" data-dcnode-id="6185" id="cite_ref-humanrightscomm_16-0"><a data-dcnode-id="6186" href="#cite_note-humanrightscomm-16"><span data-dcnode-id="6187" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6184" instrument_node=""> and it also became clear that it would be defeated in the Senate, with a number of </span><a class="mw-redirect" data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Liberal_Party" title="Australian Liberal Party"><span data-dcnode-id="6183" instrument_node="">Liberal</span></a><span data-dcnode-id="6181" instrument_node=""> Senators threatening to vote against it or abstain. Six years later, another bill, designated the </span><i data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">Migration Amendment (Unauthorised Maritime Arrivals and Other Measures) Bill 2012</span></i><span data-dcnode-id="6178" instrument_node="">, also gave rise to a Senate Committee Inquiry, with one submission showing that it was almost identical to the 2006 Bill, except without a reporting requirement obliging the Minister to table in Parliament an annual report which detailed the arrangements for assessing refugee claims processed offshore as well as information about their accommodation, health care and education. This added to concerns expressed below about the lack of transparency and public scrutiny.</span><sup class="reference" data-dcnode-id="6175" id="cite_ref-17"><a data-dcnode-id="6176" href="#cite_note-17"><span data-dcnode-id="6177" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="6172" id="cite_ref-18"><a data-dcnode-id="6173" href="#cite_note-18"><span data-dcnode-id="6174" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6171" instrument_node=""> However the bill was passed into law, becoming the </span><i data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">Migration Amendment (Unauthorised Maritime Arrivals and Other Measures) Act 2013</span></i><span data-dcnode-id="6168" instrument_node="">.</span><sup class="reference" data-dcnode-id="6165" id="cite_ref-19"><a data-dcnode-id="6166" href="#cite_note-19"><span data-dcnode-id="6167" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6164" instrument_node="">
</span></p><p data-dcnode-id="6151"><span data-dcnode-id="6162" instrument_node="">A new "fast track" assessment scheme was introduced in 2014 via the </span><i data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">Migration and Maritime Powers Legislation Amendment (Resolving the Asylum Legacy Caseload) Bill 2014</span></i><span data-dcnode-id="6159" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Bills_Legislation/Bills_Search_Results/Result%3FbId%3Dr5346" rel="nofollow"><span data-dcnode-id="6158" instrument_node="">[1]</span></a><span data-dcnode-id="6156" instrument_node="">. The definition of a fast track applicant was narrowed further by Immigration Minister Peter Dutton in an amendment to the definition under the "Migration Act 1958", which changed the date of arrival requirement from January 2012 to August 2012 for parents whose children wished to be put classified as fast track applicants.</span><sup class="reference" data-dcnode-id="6153" id="cite_ref-legislation.gov.au_20-0"><a data-dcnode-id="6154" href="#cite_note-legislation.gov.au-20"><span data-dcnode-id="6155" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6152" instrument_node="">
</span></p><span data-dcnode-id="6150" instrument_node="">
</span><h3 data-dcnode-id="6140"><span class="mw-headline" data-dcnode-id="6148" id="Offshore_processing"><span data-dcnode-id="6149" instrument_node="">Offshore processing</span></span><span class="mw-editsection" data-dcnode-id="6141"><span class="mw-editsection-bracket" data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">[</span></span><a data-dcnode-id="6144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D2" title="Edit section: Offshore processing"><span data-dcnode-id="6145" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6139" instrument_node="">
</span><link data-dcnode-id="6138" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6131" role="note"><span data-dcnode-id="6137" instrument_node="">Further information: </span><a data-dcnode-id="6135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Regional_Processing_Centre" title="Manus Regional Processing Centre"><span data-dcnode-id="6136" instrument_node="">Manus Regional Processing Centre</span></a><span data-dcnode-id="6134" instrument_node=""> and </span><a data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nauru_Regional_Processing_Centre" title="Nauru Regional Processing Centre"><span data-dcnode-id="6133" instrument_node="">Nauru Regional Processing Centre</span></a></div><span data-dcnode-id="6130" instrument_node="">
</span><p data-dcnode-id="6124"><span data-dcnode-id="6129" instrument_node="">Australia's humanitarian program is complex, but the basic structure is one of bifurcation between onshore and offshore processing of claims for people seeking asylum. While the onshore humanitarian program is common across most signatories to the 1951 Refugee Convention, it is Australia's offshore detention policy that is the most controversial and widely criticized by civil society members.</span><sup class="reference" data-dcnode-id="6126" id="cite_ref-:5_11-1"><a data-dcnode-id="6127" href="#cite_note-:5-11"><span data-dcnode-id="6128" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6125" instrument_node="">
</span></p><p data-dcnode-id="6118"><span data-dcnode-id="6123" instrument_node="">Australia is one of two nation-states that currently employ a policy of shifting potential people seeking asylum by boat to other nation-states for processing of asylum claims. This policy receives support from both major political parties.</span><sup class="reference" data-dcnode-id="6120" id="cite_ref-:5_11-2"><a data-dcnode-id="6121" href="#cite_note-:5-11"><span data-dcnode-id="6122" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6119" instrument_node="">
</span></p><span data-dcnode-id="6117" instrument_node="">
</span><h3 data-dcnode-id="6107"><span class="mw-headline" data-dcnode-id="6115" id="Legacy_caseload"><span data-dcnode-id="6116" instrument_node="">Legacy caseload</span></span><span class="mw-editsection" data-dcnode-id="6108"><span class="mw-editsection-bracket" data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">[</span></span><a data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D3" title="Edit section: Legacy caseload"><span data-dcnode-id="6112" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6106" instrument_node="">
</span><p data-dcnode-id="6097"><span data-dcnode-id="6105" instrument_node="">In July 2019 it was estimated that there were about 30,000 people living in Australia who are ineligible for permanent residency, because they came to the country by boat before 2014. Recommendations to the government by the </span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Human_Rights_Commission" title="Australian Human Rights Commission"><span data-dcnode-id="6104" instrument_node="">Australian Human Rights Commission</span></a><span data-dcnode-id="6102" instrument_node=""> to help improve the lives of these non-residents, some of whom live in poverty and suffer from mental health issues because of restrictions of their access to financial support and other welfare, and their uncertain futures, was rejected.</span><sup class="reference" data-dcnode-id="6099" id="cite_ref-21"><a data-dcnode-id="6100" href="#cite_note-21"><span data-dcnode-id="6101" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6098" instrument_node="">
</span></p><span data-dcnode-id="6096" instrument_node="">
</span><h2 data-dcnode-id="6086"><span class="mw-headline" data-dcnode-id="6094" id="Claims_processing"><span data-dcnode-id="6095" instrument_node="">Claims processing</span></span><span class="mw-editsection" data-dcnode-id="6087"><span class="mw-editsection-bracket" data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">[</span></span><a data-dcnode-id="6090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D4" title="Edit section: Claims processing"><span data-dcnode-id="6091" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6085" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6072"><div class="thumbinner" data-dcnode-id="6073" style="width:222px;"><a class="image" data-dcnode-id="6083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGeorg_Auer_certificate_of_identity.jpg"><img alt="" class="thumbimage" data-dcnode-id="6084" data-file-height="4000" data-file-width="5093" decoding="async" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Georg_Auer_certificate_of_identity.jpg/220px-Georg_Auer_certificate_of_identity.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Georg_Auer_certificate_of_identity.jpg/330px-Georg_Auer_certificate_of_identity.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Georg_Auer_certificate_of_identity.jpg/440px-Georg_Auer_certificate_of_identity.jpg 2x" width="220"></a><span data-dcnode-id="6082" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6074"><div class="magnify" data-dcnode-id="6080"><a class="internal" data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGeorg_Auer_certificate_of_identity.jpg" title="Enlarge"></a></div><span data-dcnode-id="6079" instrument_node="">The HMT </span><i data-dcnode-id="6076"><a data-dcnode-id="6077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HMT_Dunera" title="HMT Dunera"><span data-dcnode-id="6078" instrument_node="">Dunera</span></a></i><span data-dcnode-id="6075" instrument_node=""> transported 2,432 men, including Georg Auer, to Australia from England in 1942.</span></div></div></div><span data-dcnode-id="6071" instrument_node="">
</span><p data-dcnode-id="6046"><span data-dcnode-id="6070" instrument_node="">A compliance interview, often done with the assistance of an </span><a class="mw-redirect" data-dcnode-id="6068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interpreter" title="Interpreter"><span data-dcnode-id="6069" instrument_node="">interpreter</span></a><span data-dcnode-id="6067" instrument_node="">, is one of the first steps taken by immigration officers to determine if a person is making a valid claim of asylum.</span><sup class="reference" data-dcnode-id="6064" id="cite_ref-bat_22-0"><a data-dcnode-id="6065" href="#cite_note-bat-22"><span data-dcnode-id="6066" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6063" instrument_node=""> If a valid fear of persecution is expressed a formal application for refugee status is undertaken. If permission to stay in Australia is not granted they must be removed as soon as possible.</span><sup class="reference" data-dcnode-id="6060" id="cite_ref-ses_23-0"><a data-dcnode-id="6061" href="#cite_note-ses-23"><span data-dcnode-id="6062" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6059" instrument_node=""> However, under the notion of complementary protection, an applicant who is not deemed to be a refugee may still be permitted to remain in Australia.</span><sup class="reference" data-dcnode-id="6056" id="cite_ref-austlii.edu.au_24-0"><a data-dcnode-id="6057" href="#cite_note-austlii.edu.au-24"><span data-dcnode-id="6058" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6055" instrument_node=""> Complementary protection applies when an applicant/s would face a real risk of; arbitrary deprivation of life; the death penalty; torture; cruel or inhuman treatment or punishment; degrading treatment or punishment.</span><sup class="reference" data-dcnode-id="6052" id="cite_ref-austlii.edu.au_24-1"><a data-dcnode-id="6053" href="#cite_note-austlii.edu.au-24"><span data-dcnode-id="6054" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6051" instrument_node=""> It does not apply when there is no real risk of significant harm, namely when an applicant can safely relocate to another part of the country, or an authority within the country can provide protection.</span><sup class="reference" data-dcnode-id="6048" id="cite_ref-austlii.edu.au_24-2"><a data-dcnode-id="6049" href="#cite_note-austlii.edu.au-24"><span data-dcnode-id="6050" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6047" instrument_node="">
</span></p><p data-dcnode-id="6040"><span data-dcnode-id="6045" instrument_node="">People who arrived by boat on or after 13 August 2012 are not able to propose that their immediate family members also gain entry to Australia.</span><sup class="reference" data-dcnode-id="6042" id="cite_ref-pai_25-0"><a data-dcnode-id="6043" href="#cite_note-pai-25"><span data-dcnode-id="6044" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6041" instrument_node="">
</span></p><p data-dcnode-id="6028"><span data-dcnode-id="6039" instrument_node="">A new "fast track" assessment scheme was introduced in 2014 via the </span><i data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">Migration and Maritime Powers Legislation Amendment (Resolving the Asylum Legacy Caseload) Bill 2014</span></i><span data-dcnode-id="6036" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Bills_Legislation/Bills_Search_Results/Result%3FbId%3Dr5346" rel="nofollow"><span data-dcnode-id="6035" instrument_node="">[2]</span></a><span data-dcnode-id="6033" instrument_node="">. The definition of a fast track applicant was narrowed further by Immigration Minister Peter Dutton in an amendment to the definition under the "Migration Act 1958", which changed the date of arrival requirement from January 2012 to August 2012 for parents whose children wished to be put classified as fast track applicants.</span><sup class="reference" data-dcnode-id="6030" id="cite_ref-legislation.gov.au_20-1"><a data-dcnode-id="6031" href="#cite_note-legislation.gov.au-20"><span data-dcnode-id="6032" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6029" instrument_node="">
</span></p><span data-dcnode-id="6027" instrument_node="">
</span><h2 data-dcnode-id="6017"><span class="mw-headline" data-dcnode-id="6025" id="Statistics"><span data-dcnode-id="6026" instrument_node="">Statistics</span></span><span class="mw-editsection" data-dcnode-id="6018"><span class="mw-editsection-bracket" data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">[</span></span><a data-dcnode-id="6021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D5" title="Edit section: Statistics"><span data-dcnode-id="6022" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6016" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6015" instrument_node="">The pic measurement of historical migration flows are not accurate, as methods of counting and categorisations have changed over the years. Post-war refugee immigrants, from 1947 to 1975, totalled about 297,000 refugees, the majority assisted by the government. Since then, the annual refugee quota has varied from year to year.</span><sup class="reference" data-dcnode-id="6012" id="cite_ref-largest_26-0"><a data-dcnode-id="6013" href="#cite_note-largest-26"><span data-dcnode-id="6014" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6011" instrument_node="">
</span></p><p data-dcnode-id="5977"><span data-dcnode-id="6009" instrument_node="">According to the </span><a data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Refugees" title="United Nations High Commissioner for Refugees"><span data-dcnode-id="6008" instrument_node="">United Nations High Commissioner for Refugees</span></a><span data-dcnode-id="6006" instrument_node="">, between 2005 and 2009 Australia was ranked 47th out of 198 countries in the world in terms of the </span><i data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">number</span></i><span data-dcnode-id="6003" instrument_node=""> of refugees hosted, out of those countries who host refugees.</span><sup class="reference" data-dcnode-id="6000" id="cite_ref-aag_27-0"><a data-dcnode-id="6001" href="#cite_note-aag-27"><span data-dcnode-id="6002" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5999" instrument_node=""> In 2012, the </span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_Council_of_Australia" title="Refugee Council of Australia"><span data-dcnode-id="5998" instrument_node="">Refugee Council of Australia</span></a><span data-dcnode-id="5996" instrument_node=""> ranked Australia 22nd on a </span><i data-dcnode-id="5994"><span data-dcnode-id="5995" instrument_node="">per capita</span></i><span data-dcnode-id="5993" instrument_node=""> basis in a list of countries that accept refugees.</span><sup class="reference" data-dcnode-id="5990" id="cite_ref-arr_28-0"><a data-dcnode-id="5991" href="#cite_note-arr-28"><span data-dcnode-id="5992" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5989" instrument_node=""> The Council found that in terms of </span><i data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">resettlement</span></i><span data-dcnode-id="5986" instrument_node=""> (as opposed to "receiving") asylum seekers, Australia ranks 2nd in the world overall, 3rd per capita and 3rd as a proportion of GDP.</span><sup class="reference" data-dcnode-id="5983" id="cite_ref-29"><a data-dcnode-id="5984" href="#cite_note-29"><span data-dcnode-id="5985" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5982" instrument_node=""> The Council provides a wide range of statistics on its website.</span><sup class="reference" data-dcnode-id="5979" id="cite_ref-RCOA_30-0"><a data-dcnode-id="5980" href="#cite_note-RCOA-30"><span data-dcnode-id="5981" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5978" instrument_node="">
</span></p><p data-dcnode-id="5968"><span data-dcnode-id="5976" instrument_node="">Australia's </span><b data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">total refugee and humanitarian intake</span></b><span data-dcnode-id="5973" instrument_node=""> remained relatively constant between the mid-1980s and 2016, but peaked in 2017:</span><sup class="reference" data-dcnode-id="5970" id="cite_ref-aphRefugeeTotals_31-0"><a data-dcnode-id="5971" href="#cite_note-aphRefugeeTotals-31"><span data-dcnode-id="5972" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5969" instrument_node="">
</span></p><span data-dcnode-id="5967" instrument_node="">
</span><div class="mw-graph mw-graph-always mw-graph-nofallback" data-dcnode-id="5962" data-graph-id="f0e73aaf2eef4a5bfeef4c82a4f274ade610799b" style="min-width:800px;min-height:250px"><div class="vega" data-dcnode-id="5963" style="position: relative;"><canvas class="marks" data-dcnode-id="5964" height="289" width="865"></canvas></div></div><span data-dcnode-id="5961" instrument_node="">
</span><p data-dcnode-id="5946"><span data-dcnode-id="5960" instrument_node="">In 2016-2017 </span><a data-dcnode-id="5958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiscal_year%23Australia" title="Fiscal year"><span data-dcnode-id="5959" instrument_node="">financial year</span></a><span data-dcnode-id="5957" instrument_node=""> Australia accepted more refugees than it ever had since it started a dedicated humanitarian migration program, with 24,162 migrants settled on humanitarian grounds. The number includes a special intake of </span><a data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrians" title="Syrians"><span data-dcnode-id="5956" instrument_node="">Syrian</span></a><span data-dcnode-id="5954" instrument_node=""> and </span><a data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqis" title="Iraqis"><span data-dcnode-id="5953" instrument_node="">Iraqi</span></a><span data-dcnode-id="5951" instrument_node=""> refugees owing to particular circumstances in ongoing conflicts. (This was part of a far broader migration program for the year; the total number of migrants was 225,941.)</span><sup class="reference" data-dcnode-id="5948" id="cite_ref-largest_26-1"><a data-dcnode-id="5949" href="#cite_note-largest-26"><span data-dcnode-id="5950" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5947" instrument_node="">
</span></p><p data-dcnode-id="5937"><span data-dcnode-id="5945" instrument_node="">The rate of </span><b data-dcnode-id="5943"><span data-dcnode-id="5944" instrument_node="">arrivals by boat</span></b><span data-dcnode-id="5942" instrument_node="">, the most controversial aspect of Australia's refugee policy, has been exceptionally volatile. It reached a peak of 20,587 people in 2013 (excluding crew), before falling again to zero two years later:</span><sup class="reference" data-dcnode-id="5939" id="cite_ref-aphBoatTurnbacks_32-0"><a data-dcnode-id="5940" href="#cite_note-aphBoatTurnbacks-32"><span data-dcnode-id="5941" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5938" instrument_node="">
</span></p><span data-dcnode-id="5936" instrument_node="">
</span><link data-dcnode-id="5935" href="mw-data:TemplateStyles:r1039153519" rel="mw-deduplicated-inline-style"><div class="mw-graph mw-graph-always mw-graph-nofallback" data-dcnode-id="5932" data-graph-id="d9b8d9fa987d2530125ea54bcb84fb90adf7b579" style="min-width:800px;min-height:250px"><div class="vega" data-dcnode-id="5933" style="position: relative;"><canvas class="marks" data-dcnode-id="5934" height="289" width="865"></canvas></div></div><span data-dcnode-id="5931" instrument_node="">
</span><p data-dcnode-id="5916"><span data-dcnode-id="5930" instrument_node="">A "fact check" produced by </span><a class="mw-redirect" data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Broadcasting_Corporation_News" title="Australian Broadcasting Corporation News"><span data-dcnode-id="5929" instrument_node="">Australian Broadcasting Corporation News</span></a><span data-dcnode-id="5927" instrument_node=""> and </span><a data-dcnode-id="5925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RMIT_University" title="RMIT University"><span data-dcnode-id="5926" instrument_node="">RMIT</span></a><span data-dcnode-id="5924" instrument_node=""> concluded that then Attorney-General </span><a data-dcnode-id="5922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Brandis" title="George Brandis"><span data-dcnode-id="5923" instrument_node="">George Brandis</span></a><span data-dcnode-id="5921" instrument_node="">' claim in November 2017 that Australia runs the most generous refugee program per capita in the world was misleading. Various complexities of the data are examined in the article, which says that Australia's level of refugee recognition is small compared to other wealthy nations (as well as poorer ones).</span><sup class="reference" data-dcnode-id="5918" id="cite_ref-factcheck_33-0"><a data-dcnode-id="5919" href="#cite_note-factcheck-33"><span data-dcnode-id="5920" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5917" instrument_node="">
</span></p><span data-dcnode-id="5915" instrument_node="">
</span><h2 data-dcnode-id="5905"><span class="mw-headline" data-dcnode-id="5913" id="Timeline"><span data-dcnode-id="5914" instrument_node="">Timeline</span></span><span class="mw-editsection" data-dcnode-id="5906"><span class="mw-editsection-bracket" data-dcnode-id="5911"><span data-dcnode-id="5912" instrument_node="">[</span></span><a data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D6" title="Edit section: Timeline"><span data-dcnode-id="5910" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5904" instrument_node="">
</span><link data-dcnode-id="5903" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5899" role="note"><span data-dcnode-id="5902" instrument_node="">See also: </span><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-war_immigration_to_Australia" title="Post-war immigration to Australia"><span data-dcnode-id="5901" instrument_node="">Post-war immigration to Australia</span></a></div><span data-dcnode-id="5898" instrument_node="">
</span><h3 data-dcnode-id="5887"><span data-dcnode-id="5897" id=".22White_Australia_policy.22:_Pre-federation-1973"></span><span class="mw-headline" data-dcnode-id="5895" id="&quot;White_Australia_policy&quot;:_Pre-federation-1973"><span data-dcnode-id="5896" instrument_node="">"White Australia policy": Pre-federation-1973</span></span><span class="mw-editsection" data-dcnode-id="5888"><span class="mw-editsection-bracket" data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">[</span></span><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D7" title="Edit section: &quot;White Australia policy&quot;: Pre-federation-1973"><span data-dcnode-id="5892" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5889"><span data-dcnode-id="5890" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5886" instrument_node="">
</span><p data-dcnode-id="5862"><span data-dcnode-id="5885" instrument_node="">The </span><a data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Australia_policy" title="White Australia policy"><span data-dcnode-id="5884" instrument_node="">White Australia policy</span></a><span data-dcnode-id="5882" instrument_node=""> is a term used for the historical policies responsible for the exclusion of non-</span><a data-dcnode-id="5880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="5881" instrument_node="">European</span></a><span data-dcnode-id="5879" instrument_node=""> origin, especially </span><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_people" title="Asian people"><span data-dcnode-id="5878" instrument_node="">Asians</span></a><span data-dcnode-id="5876" instrument_node=""> (primarily </span><a data-dcnode-id="5874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_people" title="Chinese people"><span data-dcnode-id="5875" instrument_node="">Chinese</span></a><span data-dcnode-id="5873" instrument_node="">) and </span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Islander" title="Pacific Islander"><span data-dcnode-id="5872" instrument_node="">Pacific Islanders</span></a><span data-dcnode-id="5870" instrument_node=""> (primarily </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melanesians" title="Melanesians"><span data-dcnode-id="5869" instrument_node="">Melanesians</span></a><span data-dcnode-id="5867" instrument_node="">) from immigrating to Australia.</span><sup class="reference" data-dcnode-id="5864" id="cite_ref-art_34-0"><a data-dcnode-id="5865" href="#cite_note-art-34"><span data-dcnode-id="5866" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5863" instrument_node="">
</span></p><span data-dcnode-id="5861" instrument_node="">
</span><h3 data-dcnode-id="5851"><span class="mw-headline" data-dcnode-id="5859" id="World_War_II_refugees:_1930s"><span data-dcnode-id="5860" instrument_node="">World War II refugees: 1930s</span></span><span class="mw-editsection" data-dcnode-id="5852"><span class="mw-editsection-bracket" data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">[</span></span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D8" title="Edit section: World War II refugees: 1930s"><span data-dcnode-id="5856" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5850" instrument_node="">
</span><p data-dcnode-id="5831"><span data-dcnode-id="5849" instrument_node="">In the 1930s more than 7,000 refugees from </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="5848" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="5846" instrument_node=""> were accepted into Australia.</span><sup class="reference" data-dcnode-id="5843" id="cite_ref-35"><a data-dcnode-id="5844" href="#cite_note-35"><span data-dcnode-id="5845" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5842" instrument_node=""> In the eight years after the end of </span><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="5841" instrument_node="">World War II</span></a><span data-dcnode-id="5839" instrument_node=""> almost 200,000 European refugees settled in Australia. Australia was reluctant to recognise a general "right of asylum" for refugees when the </span><a data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="5838" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="5836" instrument_node=""> was being drafted.</span><sup class="reference" data-dcnode-id="5833" id="cite_ref-twa_36-0"><a data-dcnode-id="5834" href="#cite_note-twa-36"><span data-dcnode-id="5835" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5832" instrument_node="">
</span></p><span data-dcnode-id="5830" instrument_node="">
</span><h3 data-dcnode-id="5820"><span class="mw-headline" data-dcnode-id="5828" id="West_Papuan_refugees_on_Manus_Island:_1960s"><span data-dcnode-id="5829" instrument_node="">West Papuan refugees on Manus Island: 1960s</span></span><span class="mw-editsection" data-dcnode-id="5821"><span class="mw-editsection-bracket" data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">[</span></span><a data-dcnode-id="5824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D9" title="Edit section: West Papuan refugees on Manus Island: 1960s"><span data-dcnode-id="5825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5819" instrument_node="">
</span><p data-dcnode-id="5789"><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Sydney" title="University of Sydney"><span data-dcnode-id="5818" instrument_node="">University of Sydney</span></a><span data-dcnode-id="5816" instrument_node=""> immigration law specialist Professor Mary Crock says that Australia's history of offshore processing goes back to the 1960s, when </span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Island" title="Manus Island"><span data-dcnode-id="5815" instrument_node="">Manus Island</span></a><span data-dcnode-id="5813" instrument_node=""> was set up to take refugees from West Papua.</span><sup class="reference" data-dcnode-id="5810" id="cite_ref-SBStimeline_37-0"><a data-dcnode-id="5811" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5812" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5809" instrument_node=""> Known as  "Salasia Camp", it consisted of a few </span><a class="mw-redirect" data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corrugated_iron" title="Corrugated iron"><span data-dcnode-id="5808" instrument_node="">corrugated iron</span></a><span data-dcnode-id="5806" instrument_node=""> houses on a bare concrete slab, not far from a beach near the main town </span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorengau" title="Lorengau"><span data-dcnode-id="5805" instrument_node="">Lorengau</span></a><span data-dcnode-id="5803" instrument_node="">. Indonesia was preparing a military takeover of the former </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_New_Guinea_dispute" title="West New Guinea dispute"><span data-dcnode-id="5802" instrument_node="">Dutch New Guinea</span></a><span data-dcnode-id="5800" instrument_node=""> colony in the 1960s, causing thousands of refugees to flee into the then Australian colony of </span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Papua_New_Guinea" title="Papua New Guinea"><span data-dcnode-id="5799" instrument_node="">Papua New Guinea</span></a><span data-dcnode-id="5797" instrument_node="">; the first were sent to Manus in 1968 by the Australian government. The camp was built by Australia in order to avoid a diplomatic confrontation with Indonesia, and for this reason they were not granted </span><a class="mw-redirect" data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_status" title="Refugee status"><span data-dcnode-id="5796" instrument_node="">refugee status</span></a><span data-dcnode-id="5794" instrument_node="">. It was not a detention centre; the refugees were free to come and go, but remained stateless until granted citizenship by PNG in 2017.</span><sup class="reference" data-dcnode-id="5791" id="cite_ref-SBSwestpapua_38-0"><a data-dcnode-id="5792" href="#cite_note-SBSwestpapua-38"><span data-dcnode-id="5793" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5790" instrument_node="">
</span></p><span data-dcnode-id="5788" instrument_node="">
</span><h3 data-dcnode-id="5778"><span class="mw-headline" data-dcnode-id="5786" id="Vietnamese_boat_people:_1970s"><span data-dcnode-id="5787" instrument_node="">Vietnamese boat people: 1970s</span></span><span class="mw-editsection" data-dcnode-id="5779"><span class="mw-editsection-bracket" data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">[</span></span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D10" title="Edit section: Vietnamese boat people: 1970s"><span data-dcnode-id="5783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5780"><span data-dcnode-id="5781" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5777" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5763"><div class="thumbinner" data-dcnode-id="5764" style="width:172px;"><a class="image" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATanTTLe.jpg"><img alt="" class="thumbimage" data-dcnode-id="5776" data-file-height="630" data-file-width="420" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/TanTTLe.jpg/170px-TanTTLe.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/TanTTLe.jpg/255px-TanTTLe.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0f/TanTTLe.jpg/340px-TanTTLe.jpg 2x" width="170"></a><span data-dcnode-id="5774" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5765"><div class="magnify" data-dcnode-id="5772"><a class="internal" data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATanTTLe.jpg" title="Enlarge"></a></div><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tan_Le" title="Tan Le"><span data-dcnode-id="5771" instrument_node="">Tan Le</span></a><span data-dcnode-id="5769" instrument_node=""> entered Australia as a refugee in 1982 and was named </span><a class="mw-redirect" data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_Australian_of_the_Year" title="Young Australian of the Year"><span data-dcnode-id="5768" instrument_node="">Young Australian of the Year</span></a><span data-dcnode-id="5766" instrument_node=""> in 1998.</span></div></div></div><span data-dcnode-id="5762" instrument_node="">
</span><p data-dcnode-id="5723"><span data-dcnode-id="5761" instrument_node="">The first recorded instance of asylum seekers arriving in Australia via unauthorised boat occurred in April 1976. Fleeing </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Vietnam" title="South Vietnam"><span data-dcnode-id="5760" instrument_node="">South Vietnam</span></a><span data-dcnode-id="5758" instrument_node=""> after the </span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Vietnam" title="Communist Party of Vietnam"><span data-dcnode-id="5757" instrument_node="">Communist Party</span></a><span data-dcnode-id="5755" instrument_node=""> victory of 1975, an estimated 2,000 "</span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnamese_boat_people" title="Vietnamese boat people"><span data-dcnode-id="5754" instrument_node="">Vietnamese boat people</span></a><span data-dcnode-id="5752" instrument_node="">" followed between 1976 and 1982. The sporadic arrival of unauthorised boats was a cause of concern for the Australian people.</span><sup class="reference" data-dcnode-id="5749" id="cite_ref-Manne_39-0"><a data-dcnode-id="5750" href="#cite_note-Manne-39"><span data-dcnode-id="5751" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5748" instrument_node=""> The initial controversy regarding asylum seekers in Australia was mostly because of </span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Family_reunion" title="Family reunion"><span data-dcnode-id="5747" instrument_node="">family reunions</span></a><span data-dcnode-id="5745" instrument_node="">.</span><sup class="reference" data-dcnode-id="5742" id="cite_ref-art_34-1"><a data-dcnode-id="5743" href="#cite_note-art-34"><span data-dcnode-id="5744" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5741" instrument_node=""> Employment and security concerns were also raised with the </span><a class="mw-redirect" data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waterside_Workers_Federation" title="Waterside Workers Federation"><span data-dcnode-id="5740" instrument_node="">Waterside Workers Federation</span></a><span data-dcnode-id="5738" instrument_node=""> calling for strikes on the matter.</span><sup class="reference" data-dcnode-id="5735" id="cite_ref-baia_5-2"><a data-dcnode-id="5736" href="#cite_note-baia-5"><span data-dcnode-id="5737" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5734" instrument_node=""> This led to the first detention of boat people. In response, the government of </span><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_Fraser" title="Malcolm Fraser"><span data-dcnode-id="5733" instrument_node="">Malcolm Fraser</span></a><span data-dcnode-id="5731" instrument_node=""> authorised the immigration of more than 50,000 Vietnamese from </span><a data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Ocean" title="Indian Ocean"><span data-dcnode-id="5730" instrument_node="">Indian Ocean</span></a><span data-dcnode-id="5728" instrument_node=""> refugee camps. At the time, the "open door" immigration policy enjoyed bipartisan support.</span><sup class="reference" data-dcnode-id="5725" id="cite_ref-Manne_39-1"><a data-dcnode-id="5726" href="#cite_note-Manne-39"><span data-dcnode-id="5727" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5724" instrument_node="">
</span></p><p data-dcnode-id="5708"><span data-dcnode-id="5722" instrument_node="">Professor Crock says that a type of offshore processing was used after the </span><a data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="5721" instrument_node="">Vietnam War</span></a><span data-dcnode-id="5719" instrument_node="">. The regional processing regime established right across </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southeast_Asia" title="Southeast Asia"><span data-dcnode-id="5718" instrument_node="">Southeast Asia</span></a><span data-dcnode-id="5716" instrument_node=""> was designed to stop asylum seekers where they were, process them </span><i data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">in situ</span></i><span data-dcnode-id="5713" instrument_node="">, and then to distribute them in an orderly way.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-SBSwestpapua_38-1"><a data-dcnode-id="5711" href="#cite_note-SBSwestpapua-38"><span data-dcnode-id="5712" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5709" instrument_node="">
</span></p><span data-dcnode-id="5707" instrument_node="">
</span><h3 data-dcnode-id="5697"><span class="mw-headline" data-dcnode-id="5705" id="Mandatory_detention:_the_1990s"><span data-dcnode-id="5706" instrument_node="">Mandatory detention: the 1990s</span></span><span class="mw-editsection" data-dcnode-id="5698"><span class="mw-editsection-bracket" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">[</span></span><a data-dcnode-id="5701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D11" title="Edit section: Mandatory detention: the 1990s"><span data-dcnode-id="5702" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5696" instrument_node="">
</span><link data-dcnode-id="5695" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5691" role="note"><span data-dcnode-id="5694" instrument_node="">Main article: </span><a data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_detention_in_Australia" title="Immigration detention in Australia"><span data-dcnode-id="5693" instrument_node="">Immigration detention in Australia</span></a></div><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5666"><span data-dcnode-id="5689" instrument_node="">During the early 1990s, asylum seekers from </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodia" title="Cambodia"><span data-dcnode-id="5688" instrument_node="">Cambodia</span></a><span data-dcnode-id="5686" instrument_node=""> began to arrive in Australia. In response, the </span><a class="mw-redirect" data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keating_Government" title="Keating Government"><span data-dcnode-id="5685" instrument_node="">Keating Government</span></a><span data-dcnode-id="5683" instrument_node=""> instituted a </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_detention" title="Immigration detention"><span data-dcnode-id="5682" instrument_node="">mandatory detention</span></a><span data-dcnode-id="5680" instrument_node=""> policy aimed at deterring refugees.</span><sup class="reference" data-dcnode-id="5677" id="cite_ref-Manne_39-2"><a data-dcnode-id="5678" href="#cite_note-Manne-39"><span data-dcnode-id="5679" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5676" instrument_node=""> Under mandatory detention, anyone who enters the </span><a data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_migration_zone" title="Australian migration zone"><span data-dcnode-id="5675" instrument_node="">Australian migration zone</span></a><span data-dcnode-id="5673" instrument_node=""> without a </span><a class="mw-redirect" data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visa_%28document%29" title="Visa (document)"><span data-dcnode-id="5672" instrument_node="">visa</span></a><span data-dcnode-id="5670" instrument_node=""> is placed in a holding facility while security and health checks are performed. Additionally, the validity of the person's claim to asylum is assessed by the </span><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Immigration_and_Citizenship" title="Department of Immigration and Citizenship"><span data-dcnode-id="5669" instrument_node="">Department of Immigration and Citizenship</span></a><span data-dcnode-id="5667" instrument_node="">.
</span></p><p data-dcnode-id="5651"><span data-dcnode-id="5665" instrument_node="">In 1990, a number of asylum seekers arrived from </span><a data-dcnode-id="5663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Somalia" title="Somalia"><span data-dcnode-id="5664" instrument_node="">Somalia</span></a><span data-dcnode-id="5662" instrument_node=""> without documentation. They were detained at </span><a data-dcnode-id="5660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Villawood_Immigration_Detention_Centre" title="Villawood Immigration Detention Centre"><span data-dcnode-id="5661" instrument_node="">Villawood Immigration Detention Centre</span></a><span data-dcnode-id="5659" instrument_node=""> for 18 months without any progress on their status. Some began a </span><a data-dcnode-id="5657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunger_strike" title="Hunger strike"><span data-dcnode-id="5658" instrument_node="">hunger strike</span></a><span data-dcnode-id="5656" instrument_node=""> in response to the prolonged detention. Eventually, all were determined to be genuine refugees.</span><sup class="reference" data-dcnode-id="5653" id="cite_ref-pop_40-0"><a data-dcnode-id="5654" href="#cite_note-pop-40"><span data-dcnode-id="5655" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5652" instrument_node="">
</span></p><p data-dcnode-id="5638"><span data-dcnode-id="5650" instrument_node="">In the mid-1990s, numerous boats carrying </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_people" title="Chinese people"><span data-dcnode-id="5649" instrument_node="">Chinese</span></a><span data-dcnode-id="5647" instrument_node=""> and Sino-Vietnamese refugees were returned to their place of origin after asylum claims were denied. The rapid repatriations meant that many citizens were unaware of the refugees.</span><sup class="reference" data-dcnode-id="5644" id="cite_ref-Manne_39-3"><a data-dcnode-id="5645" href="#cite_note-Manne-39"><span data-dcnode-id="5646" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5643" instrument_node=""> During this period a refugee from Indonesia was detained for 707 days before being granted refugee status.</span><sup class="reference" data-dcnode-id="5640" id="cite_ref-pop_40-1"><a data-dcnode-id="5641" href="#cite_note-pop-40"><span data-dcnode-id="5642" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5639" instrument_node="">
</span></p><p data-dcnode-id="5609"><span data-dcnode-id="5637" instrument_node="">In 1999, Middle Eastern immigrants fleeing from oppressive regimes in </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="5636" instrument_node="">Afghanistan</span></a><span data-dcnode-id="5634" instrument_node="">, </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="5633" instrument_node="">Iran</span></a><span data-dcnode-id="5631" instrument_node=""> and </span><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="5630" instrument_node="">Iraq</span></a><span data-dcnode-id="5628" instrument_node=""> began to arrive in large numbers.</span><sup class="reference" data-dcnode-id="5625" id="cite_ref-Manne_39-4"><a data-dcnode-id="5626" href="#cite_note-Manne-39"><span data-dcnode-id="5627" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5624" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="5622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Government" title="Howard Government"><span data-dcnode-id="5623" instrument_node="">Howard Government</span></a><span data-dcnode-id="5621" instrument_node=""> extended the time they spent in mandatory detention and introduced </span><a data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temporary_protection_visa" title="Temporary protection visa"><span data-dcnode-id="5620" instrument_node="">temporary protection visas</span></a><span data-dcnode-id="5618" instrument_node=""> for boat arrivals.</span><sup class="reference" data-dcnode-id="5615" id="cite_ref-ats_10-1"><a data-dcnode-id="5616" href="#cite_note-ats-10"><span data-dcnode-id="5617" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5614" instrument_node=""> The deterrents did little to stop immigrants; roughly 12,000 asylum seekers reached Australia from 1999 to 2001.</span><sup class="reference" data-dcnode-id="5611" id="cite_ref-Manne_39-5"><a data-dcnode-id="5612" href="#cite_note-Manne-39"><span data-dcnode-id="5613" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5610" instrument_node="">
</span></p><span data-dcnode-id="5608" instrument_node="">
</span><h3 data-dcnode-id="5597"><span data-dcnode-id="5607" id="Pacific_Solution:_2001.E2.80.932007"></span><span class="mw-headline" data-dcnode-id="5605" id="Pacific_Solution:_2001–2007"><span data-dcnode-id="5606" instrument_node="">Pacific Solution: 2001–2007</span></span><span class="mw-editsection" data-dcnode-id="5598"><span class="mw-editsection-bracket" data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">[</span></span><a data-dcnode-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D12" title="Edit section: Pacific Solution: 2001–2007"><span data-dcnode-id="5602" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5596" instrument_node="">
</span><link data-dcnode-id="5595" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5588" role="note"><span data-dcnode-id="5594" instrument_node="">Main articles: </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Solution" title="Pacific Solution"><span data-dcnode-id="5593" instrument_node="">Pacific Solution</span></a><span data-dcnode-id="5591" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tampa_Affair" title="Tampa Affair"><span data-dcnode-id="5590" instrument_node="">Tampa Affair</span></a></div><span data-dcnode-id="5587" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="5568" style="width:15em; ;"><span data-dcnode-id="5584" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="5579" style=""><span data-dcnode-id="5583" instrument_node="">
</span><p data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">"We will decide who comes to this country and the circumstances in which they come."
</span></p><span data-dcnode-id="5580" instrument_node="">
</span></blockquote><span data-dcnode-id="5578" instrument_node="">
</span><p data-dcnode-id="5570"><cite class="left-aligned" data-dcnode-id="5572" style=""><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Howard" title="John Howard"><span data-dcnode-id="5577" instrument_node="">John Howard</span></a><sup class="reference" data-dcnode-id="5573" id="cite_ref-esjh_41-0"><a data-dcnode-id="5574" href="#cite_note-esjh-41"><span data-dcnode-id="5575" instrument_node="">[41]</span></a></sup></cite><span data-dcnode-id="5571" instrument_node="">
</span></p><span data-dcnode-id="5569" instrument_node="">
</span></div><span data-dcnode-id="5567" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5558"><div class="thumbinner" data-dcnode-id="5559" style="width:222px;"><a class="image" data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChristmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5566" data-file-height="1963" data-file-width="2465" decoding="async" height="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Christmas_Island_Immigration_Detention_Centre_%25285424313602%2529.jpg/220px-Christmas_Island_Immigration_Detention_Centre_%25285424313602%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Christmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg/330px-Christmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Christmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg/440px-Christmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg 2x" width="220"></a><span data-dcnode-id="5564" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5560"><div class="magnify" data-dcnode-id="5562"><a class="internal" data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChristmas_Island_Immigration_Detention_Centre_%285424313602%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5561" instrument_node="">A Christmas Island boat transports rescued refugees</span></div></div></div><p data-dcnode-id="5527"><span data-dcnode-id="5557" instrument_node="">In August 2001, a </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="5556" instrument_node="">Norwegian</span></a><span data-dcnode-id="5554" instrument_node=""> freight ship, the </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MV_Tampa" title="MV Tampa"><i data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">Tampa</span></i></a><span data-dcnode-id="5550" instrument_node="">, picked up 438 people whose vessel was sinking off the coast of Indonesia. Captain Rinnan first tried to slowly turn the boat towards Indonesia, after being threatened with prosecution by the Australian government. However, after a while the mainly </span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghans" title="Afghans"><span data-dcnode-id="5549" instrument_node="">Afghan</span></a><span data-dcnode-id="5547" instrument_node=""> asylum seekers noticed, so, concerned that if the ship continued to sail to Indonesia they might jump overboard or riot and harm the crew, decided to head back towards </span><a data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christmas_Island" title="Christmas Island"><span data-dcnode-id="5546" instrument_node="">Christmas Island</span></a><span data-dcnode-id="5544" instrument_node="">. The </span><a class="mw-redirect" data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Government" title="Howard Government"><span data-dcnode-id="5543" instrument_node="">Howard Government</span></a><span data-dcnode-id="5541" instrument_node=""> refused to allow the boat to land, saying it was a matter for Norway and Indonesia to work out between themselves. Neither made a move, creating a three way diplomatic standoff which became known as the </span><a class="mw-redirect" data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tampa_Affair" title="Tampa Affair"><span data-dcnode-id="5540" instrument_node="">Tampa Affair</span></a><span data-dcnode-id="5538" instrument_node="">. Australia seized control of the ship, drawing international criticism but strong support in Australia. After ten days, Australia struck a deal with </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="5537" instrument_node="">New Zealand</span></a><span data-dcnode-id="5535" instrument_node=""> and </span><a data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nauru" title="Nauru"><span data-dcnode-id="5534" instrument_node="">Nauru</span></a><span data-dcnode-id="5532" instrument_node=""> to have those nations temporarily host the refugees while Australia processed their asylum claims.</span><sup class="reference" data-dcnode-id="5529" id="cite_ref-Infobase_42-0"><a data-dcnode-id="5530" href="#cite_note-Infobase-42"><span data-dcnode-id="5531" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5528" instrument_node="">
</span></p><p data-dcnode-id="5468"><span data-dcnode-id="5526" instrument_node="">Following the </span><a data-dcnode-id="5524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="5525" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="5523" instrument_node=""> in the US in 2001, anti-Muslim rhetoric increased in Australia, as Muslims were the primary asylum seekers at the time.</span><sup class="reference" data-dcnode-id="5520" id="cite_ref-art_34-2"><a data-dcnode-id="5521" href="#cite_note-art-34"><span data-dcnode-id="5522" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5519" instrument_node="">
