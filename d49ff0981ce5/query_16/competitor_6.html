Following the Tampa Affair, the Commonwealth Migration Act (1958) was amended by the Howard Government in September 2001.</span><sup class="reference" data-dcnode-id="5516" id="cite_ref-43"><a data-dcnode-id="5517" href="#cite_note-43"><span data-dcnode-id="5518" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5515" instrument_node=""> The amendments, which became known as the </span><a data-dcnode-id="5513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Solution" title="Pacific Solution"><span data-dcnode-id="5514" instrument_node="">Pacific Solution</span></a><span data-dcnode-id="5512" instrument_node="">, excised Christmas Island and </span><a class="mw-redirect" data-dcnode-id="5510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ashmore_Reef" title="Ashmore Reef"><span data-dcnode-id="5511" instrument_node="">Ashmore Reef</span></a><span data-dcnode-id="5509" instrument_node=""> from the Australian migration zone.</span><sup class="reference" data-dcnode-id="5506" id="cite_ref-Manne_39-6"><a data-dcnode-id="5507" href="#cite_note-Manne-39"><span data-dcnode-id="5508" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5505" instrument_node=""> The </span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christmas_Island_Detention_Centre" title="Christmas Island Detention Centre"><span data-dcnode-id="5504" instrument_node="">Christmas Island Detention Centre</span></a><span data-dcnode-id="5502" instrument_node="">, designed as a temporary holding centre, was set up, and asylum seekers were directed from there to nearby island nations </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Papua_New_Guinea" title="Papua New Guinea"><span data-dcnode-id="5501" instrument_node="">Papua New Guinea</span></a><span data-dcnode-id="5499" instrument_node="">, to be housed in the </span><a class="mw-redirect" data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Island_Regional_Processing_Centre" title="Manus Island Regional Processing Centre"><span data-dcnode-id="5498" instrument_node="">Manus Island Regional Processing Centre</span></a><span data-dcnode-id="5496" instrument_node=""> and </span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nauru" title="Nauru"><span data-dcnode-id="5495" instrument_node="">Nauru</span></a><span data-dcnode-id="5493" instrument_node="">, to the </span><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nauru_Regional_Processing_Centre" title="Nauru Regional Processing Centre"><span data-dcnode-id="5492" instrument_node="">Nauru Regional Processing Centre</span></a><span data-dcnode-id="5490" instrument_node="">. There, asylum seekers had to undergo a lengthy process before they could </span><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_to_Australia" title="Immigration to Australia"><span data-dcnode-id="5489" instrument_node="">immigrate to Australia</span></a><span data-dcnode-id="5487" instrument_node="">.</span><sup class="reference" data-dcnode-id="5484" id="cite_ref-adopts_1-1"><a data-dcnode-id="5485" href="#cite_note-adopts-1"><span data-dcnode-id="5486" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5483" instrument_node=""> The Pacific Solution was intended to remove the incentive for refugees to come to Australia. While detained offshore, asylum-seekers under the Pacific Solution were denied access to Australian lawyers and to protection under </span><a class="mw-redirect" data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_of_Australia" title="Law of Australia"><span data-dcnode-id="5482" instrument_node="">Australian law</span></a><span data-dcnode-id="5480" instrument_node="">.</span><sup class="reference" data-dcnode-id="5477" id="cite_ref-ats_10-2"><a data-dcnode-id="5478" href="#cite_note-ats-10"><span data-dcnode-id="5479" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5476" instrument_node=""> The combination of the boat arrivals and the September 11 were said to have turned the November 2001 election in </span><a data-dcnode-id="5474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Howard" title="John Howard"><span data-dcnode-id="5475" instrument_node="">John Howard</span></a><span data-dcnode-id="5473" instrument_node="">'s favour.</span><sup class="reference" data-dcnode-id="5470" id="cite_ref-SBStimeline_37-1"><a data-dcnode-id="5471" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5472" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5469" instrument_node="">
</span></p><p data-dcnode-id="5445"><span data-dcnode-id="5467" instrument_node="">At the time, the minority </span><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Labor_Party" title="Australian Labor Party"><span data-dcnode-id="5466" instrument_node="">Labor Party</span></a><span data-dcnode-id="5464" instrument_node=""> opposed the policy. In 2003, </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julia_Gillard" title="Julia Gillard"><span data-dcnode-id="5463" instrument_node="">Julia Gillard</span></a><span data-dcnode-id="5461" instrument_node="">, then shadow minister for Population and Immigration, promised that </span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Labor_Party" title="Australian Labor Party"><span data-dcnode-id="5460" instrument_node="">Labor</span></a><span data-dcnode-id="5458" instrument_node=""> would end the Pacific Solution "because it is costly, unsustainable and wrong as a matter of principle".</span><sup class="reference" data-dcnode-id="5455" id="cite_ref-U-turn_44-0"><a data-dcnode-id="5456" href="#cite_note-U-turn-44"><span data-dcnode-id="5457" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5454" instrument_node=""> The policy was also highly criticised by human rights groups.</span><sup class="reference" data-dcnode-id="5451" id="cite_ref-adopts_1-2"><a data-dcnode-id="5452" href="#cite_note-adopts-1"><span data-dcnode-id="5453" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5450" instrument_node=""> The primary concern was that abuse of the process could potentially develop in remote locations, and that immigration control would dominate over child protection issues, children being without an effective guardian. In July 2005, Australia ceased the practice of mandatory detention of children.</span><sup class="reference" data-dcnode-id="5447" id="cite_ref-saa_45-0"><a data-dcnode-id="5448" href="#cite_note-saa-45"><span data-dcnode-id="5449" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5446" instrument_node="">
</span></p><p data-dcnode-id="5431"><span data-dcnode-id="5444" instrument_node="">In 2002, the arrivals dropped from 5,516 the previous year to 1.</span><sup class="reference" data-dcnode-id="5441" id="cite_ref-baia_5-3"><a data-dcnode-id="5442" href="#cite_note-baia-5"><span data-dcnode-id="5443" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5440" instrument_node=""> From 2001 to 2007, fewer than 300 asylum seekers arrived.</span><sup class="reference" data-dcnode-id="5437" id="cite_ref-Manne_39-7"><a data-dcnode-id="5438" href="#cite_note-Manne-39"><span data-dcnode-id="5439" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5436" instrument_node=""> The program cost Australia more than AU$1 billion during that period.</span><sup class="reference" data-dcnode-id="5433" id="cite_ref-46"><a data-dcnode-id="5434" href="#cite_note-46"><span data-dcnode-id="5435" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5432" instrument_node="">
</span></p><span data-dcnode-id="5430" instrument_node="">
</span><h3 data-dcnode-id="5419"><span data-dcnode-id="5429" id="End_of_offshore_processing:_2007.E2.80.932012"></span><span class="mw-headline" data-dcnode-id="5427" id="End_of_offshore_processing:_2007–2012"><span data-dcnode-id="5428" instrument_node="">End of offshore processing: 2007–2012</span></span><span class="mw-editsection" data-dcnode-id="5420"><span class="mw-editsection-bracket" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">[</span></span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D13" title="Edit section: End of offshore processing: 2007–2012"><span data-dcnode-id="5424" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5418" instrument_node="">
</span><p data-dcnode-id="5391"><span data-dcnode-id="5417" instrument_node="">After winning the 2007 election, the Labor Party under Prime Minister </span><a data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kevin_Rudd" title="Kevin Rudd"><span data-dcnode-id="5416" instrument_node="">Kevin Rudd</span></a><span data-dcnode-id="5414" instrument_node=""> abandoned the Pacific Solution, installing a more liberal asylum policy.</span><sup class="reference" data-dcnode-id="5411" id="cite_ref-adopts_1-3"><a data-dcnode-id="5412" href="#cite_note-adopts-1"><span data-dcnode-id="5413" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5410" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudd_Government_%282007%25E2%2580%259310%29" title="Rudd Government (2007–10)"><span data-dcnode-id="5409" instrument_node="">Rudd government</span></a><span data-dcnode-id="5407" instrument_node=""> pledged to settle all asylum claims within three months and closed the Nauru detention facility.</span><sup class="reference" data-dcnode-id="5404" id="cite_ref-Manne_39-8"><a data-dcnode-id="5405" href="#cite_note-Manne-39"><span data-dcnode-id="5406" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5403" instrument_node=""> It abolished </span><a data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temporary_protection_visa" title="Temporary protection visa"><span data-dcnode-id="5402" instrument_node="">temporary protection visas</span></a><span data-dcnode-id="5400" instrument_node=""> in 2008.</span><sup class="reference" data-dcnode-id="5397" id="cite_ref-ats_10-3"><a data-dcnode-id="5398" href="#cite_note-ats-10"><span data-dcnode-id="5399" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5396" instrument_node=""> Only 45 of the 1,637 asylum seekers detained in Nauru were found not to be refugees.</span><sup class="reference" data-dcnode-id="5393" id="cite_ref-tps_2-1"><a data-dcnode-id="5394" href="#cite_note-tps-2"><span data-dcnode-id="5395" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5392" instrument_node="">
</span></p><p data-dcnode-id="5367"><span data-dcnode-id="5390" instrument_node="">Over the next few years the number of asylum seekers arriving in the country increased substantially.</span><sup class="reference" data-dcnode-id="5387" id="cite_ref-adopts_1-4"><a data-dcnode-id="5388" href="#cite_note-adopts-1"><span data-dcnode-id="5389" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5386" instrument_node=""> According to parliamentary records, only 25 asylum seekers travelled by boat to Australia in the 2007–08 financial year.</span><sup class="reference" data-dcnode-id="5383" id="cite_ref-SBStimeline_37-2"><a data-dcnode-id="5384" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5385" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5382" instrument_node=""> In 2008, there were 161 immigrants under asylum laws; in 2009, claims jumped to 2,800;</span><sup class="reference" data-dcnode-id="5379" id="cite_ref-adopts_1-5"><a data-dcnode-id="5380" href="#cite_note-adopts-1"><span data-dcnode-id="5381" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5376" id="cite_ref-Manne_39-9"><a data-dcnode-id="5377" href="#cite_note-Manne-39"><span data-dcnode-id="5378" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5375" instrument_node=""> in 2009–10, more than 5,000 people came.</span><sup class="reference" data-dcnode-id="5372" id="cite_ref-SBStimeline_37-3"><a data-dcnode-id="5373" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5374" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5371" instrument_node=""> The issue quickly became a political problem for Rudd. He claimed it was a change in the international political environment that caused the increase, not the abandonment of the Pacific Solution. When that idea failed to be accepted, he proposed what became known as the Indonesian Solution. Under the plan, </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesia" title="Indonesia"><span data-dcnode-id="5370" instrument_node="">Indonesia</span></a><span data-dcnode-id="5368" instrument_node=""> would receive financial aid and intelligence in exchange for cracking down on the people smugglers that transported the asylum seekers.

</span><p data-dcnode-id="5253"><span data-dcnode-id="5282" instrument_node="">In October 2009, the Australian customs boat </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MV_Oceanic_Viking" title="MV Oceanic Viking"><i data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Oceanic Viking</span></i></a><span data-dcnode-id="5278" instrument_node=""> was involved in an operation to apprehend 78 </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sri_Lanka" title="Sri Lanka"><span data-dcnode-id="5277" instrument_node="">Sri Lankan</span></a><span data-dcnode-id="5275" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_seekers" title="Asylum seekers"><span data-dcnode-id="5274" instrument_node="">asylum seekers</span></a><span data-dcnode-id="5272" instrument_node=""> and move them to an Australia-funded immigration detention centre on the Indonesian island of </span><a class="mw-redirect" data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bintan" title="Bintan"><span data-dcnode-id="5271" instrument_node="">Bintan</span></a><span data-dcnode-id="5269" instrument_node=""> for processing.</span><sup class="reference" data-dcnode-id="5266" id="cite_ref-AAP221009_48-0"><a data-dcnode-id="5267" href="#cite_note-AAP221009-48"><span data-dcnode-id="5268" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5265" instrument_node=""> The asylum seekers were taken to Indonesia but refused to disembark until 17 November, after a deal was agreed upon.</span><sup class="reference" data-dcnode-id="5262" id="cite_ref-Fitzpatrick_49-0"><a data-dcnode-id="5263" href="#cite_note-Fitzpatrick-49"><span data-dcnode-id="5264" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5261" instrument_node=""> The asylum seekers were transferred to Indonesian detention, and after a month were determined to be refugees and resettled in several countries.</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-Fitzpatrick_49-1"><a data-dcnode-id="5259" href="#cite_note-Fitzpatrick-49"><span data-dcnode-id="5260" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="5255" id="cite_ref-50"><a data-dcnode-id="5256" href="#cite_note-50"><span data-dcnode-id="5257" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5254" instrument_node="">
</span></p><p data-dcnode-id="5244"><span data-dcnode-id="5252" instrument_node="">In December 2010, </span><a data-dcnode-id="5250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Christmas_Island_boat_disaster" title="2010 Christmas Island boat disaster"><span data-dcnode-id="5251" instrument_node="">a boat carrying around 90 asylum seekers sank off the coast of Christmas Island</span></a><span data-dcnode-id="5249" instrument_node="">, killing 48 people.</span><sup class="reference" data-dcnode-id="5246" id="cite_ref-51"><a data-dcnode-id="5247" href="#cite_note-51"><span data-dcnode-id="5248" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5245" instrument_node="">
</span></p><p data-dcnode-id="5229"><span data-dcnode-id="5243" instrument_node="">Ahead of the </span><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Australian_federal_election" title="2010 Australian federal election"><span data-dcnode-id="5242" instrument_node="">2010 election</span></a><span data-dcnode-id="5240" instrument_node="">, </span><a data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Abbott" title="Tony Abbott"><span data-dcnode-id="5239" instrument_node="">Tony Abbott</span></a><span data-dcnode-id="5237" instrument_node=""> campaigned on the asylum issue, and with Rudd refusing to engage with him in "a race to the bottom", polls showed the public strongly favouring Abbott's anti-asylum views. By this time, Rudd was struggling in the polls for a number of reasons and had lost the confidence of the Labor Party Caucus, which, fearing defeat in the upcoming election, installed </span><a data-dcnode-id="5235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julia_Gillard" title="Julia Gillard"><span data-dcnode-id="5236" instrument_node="">Julia Gillard</span></a><span data-dcnode-id="5234" instrument_node=""> in his place. Gillard argued it was wrong to give special privileges to asylum seekers. She was against a return to the Pacific Solution, instead arguing for the establishment of a regional offshore processing centre. Gillard's new position was welcomed in the polls, and in the August 2010 election, Labor retained power in a minority government supported by a number of independents.</span><sup class="reference" data-dcnode-id="5231" id="cite_ref-Manne_39-10"><a data-dcnode-id="5232" href="#cite_note-Manne-39"><span data-dcnode-id="5233" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5230" instrument_node="">
</span></p><p data-dcnode-id="5210"><span data-dcnode-id="5228" instrument_node="">In May 2011, the Gillard government announced plans to address the issue by swapping 800 new asylum seekers for 4,000 long-standing assessed refugees in Malaysia. The so-called </span><a class="mw-redirect" data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Solution" title="Malaysian Solution"><span data-dcnode-id="5227" instrument_node="">Malaysian Solution</span></a><span data-dcnode-id="5225" instrument_node=""> was eventually ruled unconstitutional by the </span><a data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_court" title="High court"><span data-dcnode-id="5224" instrument_node="">high court</span></a><span data-dcnode-id="5222" instrument_node="">,</span><sup class="reference" data-dcnode-id="5219" id="cite_ref-SBStimeline_37-4"><a data-dcnode-id="5220" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5221" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5218" instrument_node=""> partly because Malaysia was not a signatory to the </span><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="5217" instrument_node="">1951 UN Refugee Convention</span></a><span data-dcnode-id="5215" instrument_node="">.</span><sup class="reference" data-dcnode-id="5212" id="cite_ref-52"><a data-dcnode-id="5213" href="#cite_note-52"><span data-dcnode-id="5214" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5211" instrument_node="">
</span></p><p data-dcnode-id="5174"><span data-dcnode-id="5209" instrument_node="">In 2011, Australia received 2.5% of the world's total number of claims for asylum.</span><sup class="reference" data-dcnode-id="5206" id="cite_ref-ado_53-0"><a data-dcnode-id="5207" href="#cite_note-ado-53"><span data-dcnode-id="5208" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5205" instrument_node=""> During 2012, more than 17,000 asylum seekers arrived via boat.</span><sup class="reference" data-dcnode-id="5202" id="cite_ref-send_54-0"><a data-dcnode-id="5203" href="#cite_note-send-54"><span data-dcnode-id="5204" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5201" instrument_node=""> The majority of the refugees came from </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="5200" instrument_node="">Afghanistan</span></a><span data-dcnode-id="5198" instrument_node="">, </span><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="5197" instrument_node="">Iran</span></a><span data-dcnode-id="5195" instrument_node="">, and </span><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sri_Lanka" title="Sri Lanka"><span data-dcnode-id="5194" instrument_node="">Sri Lanka</span></a><span data-dcnode-id="5192" instrument_node="">.</span><sup class="reference" data-dcnode-id="5189" id="cite_ref-adopts_1-6"><a data-dcnode-id="5190" href="#cite_note-adopts-1"><span data-dcnode-id="5191" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5188" instrument_node="">
In June 2012, </span><a data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_Indian_Ocean_migrant_boat_disaster" title="2012 Indian Ocean migrant boat disaster"><span data-dcnode-id="5187" instrument_node="">a boatload of asylum seekers capsized</span></a><span data-dcnode-id="5185" instrument_node=""> in the </span><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Ocean" title="Indian Ocean"><span data-dcnode-id="5184" instrument_node="">Indian Ocean</span></a><span data-dcnode-id="5182" instrument_node=""> between Indonesia and </span><a data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christmas_Island" title="Christmas Island"><span data-dcnode-id="5181" instrument_node="">Christmas Island</span></a><span data-dcnode-id="5179" instrument_node="">, leading to 17 confirmed deaths, with 70 other people missing.</span><sup class="reference" data-dcnode-id="5176" id="cite_ref-BBC_55-0"><a data-dcnode-id="5177" href="#cite_note-BBC-55"><span data-dcnode-id="5178" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5175" instrument_node="">
</span></p><span data-dcnode-id="5173" instrument_node="">
</span><h3 data-dcnode-id="5162"><span data-dcnode-id="5172" id="Offshore_processing_resumed.2C_PNG_solution:_2012.E2.80.932013"></span><span class="mw-headline" data-dcnode-id="5170" id="Offshore_processing_resumed,_PNG_solution:_2012–2013"><span data-dcnode-id="5171" instrument_node="">Offshore processing resumed, PNG solution: 2012–2013</span></span><span class="mw-editsection" data-dcnode-id="5163"><span class="mw-editsection-bracket" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">[</span></span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D14" title="Edit section: Offshore processing resumed, PNG solution: 2012–2013"><span data-dcnode-id="5167" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5161" instrument_node="">
</span><link data-dcnode-id="5160" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5156" role="note"><span data-dcnode-id="5159" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PNG_solution" title="PNG solution"><span data-dcnode-id="5158" instrument_node="">PNG solution</span></a></div><span data-dcnode-id="5155" instrument_node="">
</span><p data-dcnode-id="5110"><span data-dcnode-id="5154" instrument_node="">In June 2012, Gillard appointed an expert panel to make recommendations on the asylum issue by August 2012.</span><sup class="reference" data-dcnode-id="5151" id="cite_ref-ep_56-0"><a data-dcnode-id="5152" href="#cite_note-ep-56"><span data-dcnode-id="5153" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5150" instrument_node=""> The report included 22 recommendations.</span><sup class="reference" data-dcnode-id="5147" id="cite_ref-ado_53-1"><a data-dcnode-id="5148" href="#cite_note-ado-53"><span data-dcnode-id="5149" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5146" instrument_node=""> Following their recommendations, her government effectively reinstated the Pacific Solution, and re-introduced offshore processing for asylum seekers. Some Labor members complained that Gillard had abandoned her principle for the sake of politics. </span><a data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Greens" title="Australian Greens"><span data-dcnode-id="5145" instrument_node="">Greens</span></a><span data-dcnode-id="5143" instrument_node="">' Senator </span><a data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_Hanson-Young" title="Sarah Hanson-Young"><span data-dcnode-id="5142" instrument_node="">Sarah Hanson-Young</span></a><span data-dcnode-id="5140" instrument_node=""> called offshore processing "a completely unworkable, inhumane, unthinkable proposition".</span><sup class="reference" data-dcnode-id="5137" id="cite_ref-U-turn_44-1"><a data-dcnode-id="5138" href="#cite_note-U-turn-44"><span data-dcnode-id="5139" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5136" instrument_node=""> The Nauru processing facility was reopened in September, and the </span><a data-dcnode-id="5134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Island" title="Manus Island"><span data-dcnode-id="5135" instrument_node="">Manus Island</span></a><span data-dcnode-id="5133" instrument_node=""> facility in Papua New Guinea reopened in November.</span><sup class="reference" data-dcnode-id="5130" id="cite_ref-flies_57-0"><a data-dcnode-id="5131" href="#cite_note-flies-57"><span data-dcnode-id="5132" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="5127" id="cite_ref-58"><a data-dcnode-id="5128" href="#cite_note-58"><span data-dcnode-id="5129" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5126" instrument_node=""> However, the centres could not keep up with demand, creating a large backlog.</span><sup class="reference" data-dcnode-id="5123" id="cite_ref-adopts_1-7"><a data-dcnode-id="5124" href="#cite_note-adopts-1"><span data-dcnode-id="5125" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5122" instrument_node=""> The first 6 months of the policy did not see a reduction in immigration attempts – in the first half of 2013, there were more than 15,000 asylum seekers.</span><sup class="reference" data-dcnode-id="5119" id="cite_ref-send_54-1"><a data-dcnode-id="5120" href="#cite_note-send-54"><span data-dcnode-id="5121" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5118" instrument_node=""> For the 6 months to June 2014 however, the number has appeared to sharply reduce, with the immigration minister </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Morrison" title="Scott Morrison"><span data-dcnode-id="5117" instrument_node="">Scott Morrison</span></a><span data-dcnode-id="5115" instrument_node=""> claiming that there "had (not been) a successful people smuggling venture" in the period.</span><sup class="reference" data-dcnode-id="5112" id="cite_ref-59"><a data-dcnode-id="5113" href="#cite_note-59"><span data-dcnode-id="5114" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5111" instrument_node="">
</span></p><span data-dcnode-id="5109" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5100"><div class="thumbinner" data-dcnode-id="5101" style="width:222px;"><a class="image" data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AManus_Island_regional_processing_facility_2012.jpg"><img alt="" class="thumbimage" data-dcnode-id="5108" data-file-height="3603" data-file-width="5405" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Manus_Island_regional_processing_facility_2012.jpg/220px-Manus_Island_regional_processing_facility_2012.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Manus_Island_regional_processing_facility_2012.jpg/330px-Manus_Island_regional_processing_facility_2012.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/Manus_Island_regional_processing_facility_2012.jpg/440px-Manus_Island_regional_processing_facility_2012.jpg 2x" width="220"></a><span data-dcnode-id="5106" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5102"><div class="magnify" data-dcnode-id="5104"><a class="internal" data-dcnode-id="5105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AManus_Island_regional_processing_facility_2012.jpg" title="Enlarge"></a></div><span data-dcnode-id="5103" instrument_node="">Part of the Manus Island regional processing facility in October 2012</span></div></div></div><span data-dcnode-id="5099" instrument_node="">
</span><p data-dcnode-id="5072"><span data-dcnode-id="5098" instrument_node="">In July 2013, Rudd, who had recently returned to power as Prime Minister, announced that anyone who arrived in Australia by boat without a </span><a class="mw-redirect" data-dcnode-id="5096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visa_%28document%29" title="Visa (document)"><span data-dcnode-id="5097" instrument_node="">visa</span></a><span data-dcnode-id="5095" instrument_node=""> would not be eligible for asylum.</span><sup class="reference" data-dcnode-id="5092" id="cite_ref-adopts_1-8"><a data-dcnode-id="5093" href="#cite_note-adopts-1"><span data-dcnode-id="5094" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5091" instrument_node=""> In co-operation with Papua New Guinean Prime Minister </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_O%2527Neill" title="Peter O'Neill"><span data-dcnode-id="5090" instrument_node="">Peter O'Neill</span></a><span data-dcnode-id="5088" instrument_node="">, the Regional Settlement Agreement was drafted. Under the agreement, new asylum seekers would be sent to Papua New Guinea where legitimate cases would be granted asylum in that, but would lose any right to seek asylum in Australia.</span><sup class="reference" data-dcnode-id="5085" id="cite_ref-no_illegal_60-0"><a data-dcnode-id="5086" href="#cite_note-no_illegal-60"><span data-dcnode-id="5087" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5084" instrument_node=""> To accommodate the refugees, the </span><a data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Regional_Processing_Centre" title="Manus Regional Processing Centre"><span data-dcnode-id="5083" instrument_node="">Manus Regional Processing Centre</span></a><span data-dcnode-id="5081" instrument_node=""> would be enlarged significantly. In exchange for taking the asylum seekers, Papua New Guinea would receive financial aid from Australia. Like Australia, Papua New Guinea is a signatory to United Nations Refugees Convention.</span><sup class="reference" data-dcnode-id="5078" id="cite_ref-send_54-2"><a data-dcnode-id="5079" href="#cite_note-send-54"><span data-dcnode-id="5080" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5077" instrument_node=""> Rudd said the policy was not intended to be permanent and would be reviewed annually.</span><sup class="reference" data-dcnode-id="5074" id="cite_ref-adopts_1-9"><a data-dcnode-id="5075" href="#cite_note-adopts-1"><span data-dcnode-id="5076" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5073" instrument_node="">
</span></p><p data-dcnode-id="5035"><span data-dcnode-id="5071" instrument_node="">Announcing the new policy, Rudd remarked "Australians have had enough of seeing people drowning in the waters to our north. Our country has had enough of people smugglers exploiting asylum seekers and seeing them drown on the high seas."</span><sup class="reference" data-dcnode-id="5068" id="cite_ref-adopts_1-10"><a data-dcnode-id="5069" href="#cite_note-adopts-1"><span data-dcnode-id="5070" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5067" instrument_node=""> </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_of_Australia" title="Liberal Party of Australia"><span data-dcnode-id="5066" instrument_node="">Liberal Party</span></a><span data-dcnode-id="5064" instrument_node=""> leader </span><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Abbott" title="Tony Abbott"><span data-dcnode-id="5063" instrument_node="">Tony Abbott</span></a><span data-dcnode-id="5061" instrument_node=""> praised the substance of plan, but said Rudd's government was incapable of making it work. Greens leader </span><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christine_Milne" title="Christine Milne"><span data-dcnode-id="5060" instrument_node="">Christine Milne</span></a><span data-dcnode-id="5058" instrument_node="">, however, called the plan "absolutely immoral".</span><sup class="reference" data-dcnode-id="5055" id="cite_ref-no_illegal_60-1"><a data-dcnode-id="5056" href="#cite_note-no_illegal-60"><span data-dcnode-id="5057" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5054" instrument_node=""> Human rights groups criticized the decision. "Mark this day in history as the day Australia decided to turn its back on the world's most vulnerable people, closed the door and threw away the key," said Graeme McGregor of </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International_Australia" title="Amnesty International Australia"><span data-dcnode-id="5053" instrument_node="">Amnesty International Australia</span></a><span data-dcnode-id="5051" instrument_node="">.</span><sup class="reference" data-dcnode-id="5048" id="cite_ref-adopts_1-11"><a data-dcnode-id="5049" href="#cite_note-adopts-1"><span data-dcnode-id="5050" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5047" instrument_node=""> Human rights lawyer David Mann called it a "fundamental abrogation of Australia's responsibilities" and doubted the legality of the policy.</span><sup class="reference" data-dcnode-id="5044" id="cite_ref-adopts_1-12"><a data-dcnode-id="5045" href="#cite_note-adopts-1"><span data-dcnode-id="5046" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5043" instrument_node=""> He has also questioned the record of </span><a data-dcnode-id="5041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_Papua_New_Guinea" title="Human rights in Papua New Guinea"><span data-dcnode-id="5042" instrument_node="">human rights in Papua New Guinea</span></a><span data-dcnode-id="5040" instrument_node="">.</span><sup class="reference" data-dcnode-id="5037" id="cite_ref-cml_61-0"><a data-dcnode-id="5038" href="#cite_note-cml-61"><span data-dcnode-id="5039" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5036" instrument_node="">
</span></p><p data-dcnode-id="5012"><i data-dcnode-id="5032"><a data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="5034" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="5031" instrument_node=""> described Rudd's decision as likely "part of a concerted effort" to nullify opposition attacks ahead of the </span><a data-dcnode-id="5029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2013_Australian_federal_election" title="2013 Australian federal election"><span data-dcnode-id="5030" instrument_node="">2013 federal election</span></a><span data-dcnode-id="5028" instrument_node="">.</span><sup class="reference" data-dcnode-id="5025" id="cite_ref-adopts_1-13"><a data-dcnode-id="5026" href="#cite_note-adopts-1"><span data-dcnode-id="5027" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5024" instrument_node=""> He had been under fire for the unpopular programs of Gillard that led to his return to power, and immigration had become a major issue in the election campaign.</span><sup class="reference" data-dcnode-id="5021" id="cite_ref-adopts_1-14"><a data-dcnode-id="5022" href="#cite_note-adopts-1"><span data-dcnode-id="5023" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5018" id="cite_ref-send_54-3"><a data-dcnode-id="5019" href="#cite_note-send-54"><span data-dcnode-id="5020" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5017" instrument_node=""> Concurrent with Rudd's announcement, Indonesia announced it would toughen requirement for Iranians seeking visas, a change that had been requested by Australia. An Indonesia spokesperson denied that the change in policy was because of an Australian request.</span><sup class="reference" data-dcnode-id="5014" id="cite_ref-adopts_1-15"><a data-dcnode-id="5015" href="#cite_note-adopts-1"><span data-dcnode-id="5016" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5013" instrument_node="">
</span></p><p data-dcnode-id="4997"><i data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">The New York Times</span></i><span data-dcnode-id="5009" instrument_node=""> reported that more than 600 asylum seekers had died en route to Australian territory between 2009 and 2013.</span><sup class="reference" data-dcnode-id="5006" id="cite_ref-adopts_1-16"><a data-dcnode-id="5007" href="#cite_note-adopts-1"><span data-dcnode-id="5008" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5005" instrument_node=""> According to the </span><a class="mw-redirect" data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morrison_Government" title="Morrison Government"><span data-dcnode-id="5004" instrument_node="">Morrison Government</span></a><span data-dcnode-id="5002" instrument_node=""> in 2019, more than 50,000 people had arrived by boat and at least 1,200 people drowned at sea during the Rudd-Gillard-Rudd years.</span><sup class="reference" data-dcnode-id="4999" id="cite_ref-SBStimeline_37-5"><a data-dcnode-id="5000" href="#cite_note-SBStimeline-37"><span data-dcnode-id="5001" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4998" instrument_node="">
</span></p><span data-dcnode-id="4996" instrument_node="">
</span><h3 data-dcnode-id="4986"><span class="mw-headline" data-dcnode-id="4994" id="Operation_Sovereign_Borders:_Sept_2013"><span data-dcnode-id="4995" instrument_node="">Operation Sovereign Borders: Sept 2013</span></span><span class="mw-editsection" data-dcnode-id="4987"><span class="mw-editsection-bracket" data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">[</span></span><a data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D15" title="Edit section: Operation Sovereign Borders: Sept 2013"><span data-dcnode-id="4991" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4985" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4964"><div class="thumbinner" data-dcnode-id="4965" style="width:222px;"><a class="image" data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg"><img alt="" class="thumbimage" data-dcnode-id="4984" data-file-height="496" data-file-width="820" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg/220px-Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg/330px-Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg/440px-Scott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg 2x" width="220"></a><span data-dcnode-id="4982" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4966"><div class="magnify" data-dcnode-id="4980"><a class="internal" data-dcnode-id="4981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScott_Morrison_Malaysian_Maritime_Enforcement_Agency_2014.jpg" title="Enlarge"></a></div><span data-dcnode-id="4979" instrument_node="">Then-</span><a class="mw-redirect" data-dcnode-id="4977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minister_for_Immigration_and_Border_Protection" title="Minister for Immigration and Border Protection"><span data-dcnode-id="4978" instrument_node="">Immigration Minister</span></a><span data-dcnode-id="4976" instrument_node=""> </span><a data-dcnode-id="4974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Morrison" title="Scott Morrison"><span data-dcnode-id="4975" instrument_node="">Scott Morrison</span></a><span data-dcnode-id="4973" instrument_node=""> visiting hotspots for </span><a data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People_smuggling" title="People smuggling"><span data-dcnode-id="4972" instrument_node="">people smuggling</span></a><span data-dcnode-id="4970" instrument_node=""> with the </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Maritime_Enforcement_Agency" title="Malaysian Maritime Enforcement Agency"><span data-dcnode-id="4969" instrument_node="">Malaysian Maritime Enforcement Agency</span></a><span data-dcnode-id="4967" instrument_node=""> in 2014</span></div></div></div><span data-dcnode-id="4963" instrument_node="">
</span><p data-dcnode-id="4918"><span data-dcnode-id="4962" instrument_node="">At the federal election on 7 September 2013, Abbott led the </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coalition_%28Australia%29" title="Coalition (Australia)"><span data-dcnode-id="4961" instrument_node="">Liberal/National coalition</span></a><span data-dcnode-id="4959" instrument_node=""> to victory, to a large degree on the popularity of his "Stop the boats" slogan, after nearly 19,000 refugees had arrived by boat in the previous year (despite the number being relatively low by world standards).</span><sup class="reference" data-dcnode-id="4956" id="cite_ref-62"><a data-dcnode-id="4957" href="#cite_note-62"><span data-dcnode-id="4958" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4955" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbott_Government" title="Abbott Government"><span data-dcnode-id="4954" instrument_node="">Abbott government</span></a><span data-dcnode-id="4952" instrument_node=""> clamped down further on boat arrivals, naming their strategy </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Sovereign_Borders" title="Operation Sovereign Borders"><span data-dcnode-id="4951" instrument_node="">Operation Sovereign Borders</span></a><span data-dcnode-id="4949" instrument_node="">. This was implemented by then immigration minister </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Morrison" title="Scott Morrison"><span data-dcnode-id="4948" instrument_node="">Scott Morrison</span></a><span data-dcnode-id="4946" instrument_node=""> and continued by successor </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Dutton" title="Peter Dutton"><span data-dcnode-id="4945" instrument_node="">Peter Dutton</span></a><span data-dcnode-id="4943" instrument_node=""> from December 2014 and under prime ministers </span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_Turnbull" title="Malcolm Turnbull"><span data-dcnode-id="4942" instrument_node="">Malcolm Turnbull</span></a><span data-dcnode-id="4940" instrument_node=""> and </span><a data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Morrison" title="Scott Morrison"><span data-dcnode-id="4939" instrument_node="">Scott Morrison</span></a><span data-dcnode-id="4937" instrument_node="">, as of November&nbsp;2019</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="4934" style="display:none;"><a class="external text" data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit"><span data-dcnode-id="4936" instrument_node="">[update]</span></a></sup><span data-dcnode-id="4933" instrument_node="">.</span><sup class="reference" data-dcnode-id="4930" id="cite_ref-63"><a data-dcnode-id="4931" href="#cite_note-63"><span data-dcnode-id="4932" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="4927" id="cite_ref-64"><a data-dcnode-id="4928" href="#cite_note-64"><span data-dcnode-id="4929" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4926" instrument_node="">  Their "zero tolerance" policies included the use of boat turn-backs, offshore detention and processing and tight control of information about any arrivals by the government.</span><sup class="reference" data-dcnode-id="4923" id="cite_ref-SBStimeline_37-6"><a data-dcnode-id="4924" href="#cite_note-SBStimeline-37"><span data-dcnode-id="4925" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="4920" id="cite_ref-65"><a data-dcnode-id="4921" href="#cite_note-65"><span data-dcnode-id="4922" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4919" instrument_node="">
</span></p><p data-dcnode-id="4880"><span data-dcnode-id="4917" instrument_node="">In 2015, the government rejected suggestions that it would accept </span><a class="mw-redirect" data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rohingyas" title="Rohingyas"><span data-dcnode-id="4916" instrument_node="">Rohingyas</span></a><span data-dcnode-id="4914" instrument_node=""> (a persecuted Muslim minority in Myanmar) during the </span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_Rohingya_refugee_crisis" title="2015 Rohingya refugee crisis"><span data-dcnode-id="4913" instrument_node="">Rohingya refugee crisis</span></a><span data-dcnode-id="4911" instrument_node="">, with the Prime Minister Tony Abbott responding "Nope, nope, nope. We have a very clear refugee and humanitarian program".</span><sup class="reference" data-dcnode-id="4908" id="cite_ref-66"><a data-dcnode-id="4909" href="#cite_note-66"><span data-dcnode-id="4910" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4907" instrument_node=""> However, later in the year the government unexpectedly increased its intake of refugees to accommodate persecuted minorities, such as </span><a data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maronites" title="Maronites"><span data-dcnode-id="4906" instrument_node="">Maronites</span></a><span data-dcnode-id="4904" instrument_node="">, </span><a data-dcnode-id="4902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yazidis" title="Yazidis"><span data-dcnode-id="4903" instrument_node="">Yazidis</span></a><span data-dcnode-id="4901" instrument_node=""> and </span><a data-dcnode-id="4899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Druze" title="Druze"><span data-dcnode-id="4900" instrument_node="">Druze</span></a><span data-dcnode-id="4898" instrument_node="">, from the conflicts of the </span><a class="mw-redirect" data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Civil_War" title="Syrian Civil War"><span data-dcnode-id="4897" instrument_node="">Syrian Civil War</span></a><span data-dcnode-id="4895" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq_conflict_%282003%25E2%2580%2593present%29" title="Iraq conflict (2003–present)"><span data-dcnode-id="4894" instrument_node="">Iraq War</span></a><span data-dcnode-id="4892" instrument_node="">.</span><sup class="reference" data-dcnode-id="4889" id="cite_ref-67"><a data-dcnode-id="4890" href="#cite_note-67"><span data-dcnode-id="4891" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="4886" id="cite_ref-68"><a data-dcnode-id="4887" href="#cite_note-68"><span data-dcnode-id="4888" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4885" instrument_node=""> (It was these refugees who swelled the figures for 2016–2017.</span><sup class="reference" data-dcnode-id="4882" id="cite_ref-largest_26-2"><a data-dcnode-id="4883" href="#cite_note-largest-26"><span data-dcnode-id="4884" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4881" instrument_node="">)
</span></p><span data-dcnode-id="4879" instrument_node="">
</span><h3 data-dcnode-id="4869"><span class="mw-headline" data-dcnode-id="4877" id="US_refugee_swap_deal:_2016"><span data-dcnode-id="4878" instrument_node="">US refugee swap deal: 2016</span></span><span class="mw-editsection" data-dcnode-id="4870"><span class="mw-editsection-bracket" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">[</span></span><a data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D16" title="Edit section: US refugee swap deal: 2016"><span data-dcnode-id="4874" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4868" instrument_node="">
</span><p data-dcnode-id="4846"><span data-dcnode-id="4867" instrument_node="">In 2016 Turnbull announced a new resettlement deal with the then </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="4866" instrument_node="">US</span></a><span data-dcnode-id="4864" instrument_node=""> president </span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="4863" instrument_node="">Barack Obama</span></a><span data-dcnode-id="4861" instrument_node="">, who agreed to take 1,250 of the refugees held on Manus Island and Nauru in exchange for </span><a data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_America" title="Central America"><span data-dcnode-id="4860" instrument_node="">Central American</span></a><span data-dcnode-id="4858" instrument_node=""> refugees coming to Australia. Upon taking office not long afterwards, </span><a data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="4857" instrument_node="">Donald Trump</span></a><span data-dcnode-id="4855" instrument_node=""> was not pleased with the deal, but went on to honour it, and as of February 2019</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="4852" style="display:none;"><a class="external text" data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit"><span data-dcnode-id="4854" instrument_node="">[update]</span></a></sup><span data-dcnode-id="4851" instrument_node=""> more than 500 refugees had moved to the US.</span><sup class="reference" data-dcnode-id="4848" id="cite_ref-SBStimeline_37-7"><a data-dcnode-id="4849" href="#cite_note-SBStimeline-37"><span data-dcnode-id="4850" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4847" instrument_node="">
</span></p><span data-dcnode-id="4845" instrument_node="">
</span><h3 data-dcnode-id="4835"><span class="mw-headline" data-dcnode-id="4843" id="Closure_of_Manus_detention_centre:_2017"><span data-dcnode-id="4844" instrument_node="">Closure of Manus detention centre: 2017</span></span><span class="mw-editsection" data-dcnode-id="4836"><span class="mw-editsection-bracket" data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">[</span></span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D17" title="Edit section: Closure of Manus detention centre: 2017"><span data-dcnode-id="4840" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4834" instrument_node="">
</span><link data-dcnode-id="4833" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4829" role="note"><span data-dcnode-id="4832" instrument_node="">Further information: </span><a data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manus_Regional_Processing_Centre" title="Manus Regional Processing Centre"><span data-dcnode-id="4831" instrument_node="">Manus Regional Processing Centre</span></a></div><span data-dcnode-id="4828" instrument_node="">
</span><p data-dcnode-id="4811"><span data-dcnode-id="4827" instrument_node="">The centre was formally closed on 31 October 2017,</span><sup class="reference" data-dcnode-id="4824" id="cite_ref-69"><a data-dcnode-id="4825" href="#cite_note-69"><span data-dcnode-id="4826" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4823" instrument_node=""> but as of February 2019</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="4820" style="display:none;"><a class="external text" data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit"><span data-dcnode-id="4822" instrument_node="">[update]</span></a></sup><span data-dcnode-id="4819" instrument_node="">, there were 600 asylum seekers still housed on the island in several transit centres near the main town of </span><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorengau" title="Lorengau"><span data-dcnode-id="4818" instrument_node="">Lorengau</span></a><span data-dcnode-id="4816" instrument_node="">.</span><sup class="reference" data-dcnode-id="4813" id="cite_ref-SBStimeline_37-8"><a data-dcnode-id="4814" href="#cite_note-SBStimeline-37"><span data-dcnode-id="4815" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4812" instrument_node="">
</span></p><p data-dcnode-id="4798"><span data-dcnode-id="4810" instrument_node="">The Australian government ruled out bringing people held on Manus Island to Australia. </span><a data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="4809" instrument_node="">New Zealand</span></a><span data-dcnode-id="4807" instrument_node="">'s offer to resettle 150 refugees within its existing quota was refused by the Australian Government several times.</span><sup class="reference" data-dcnode-id="4804" id="cite_ref-:6_70-0"><a data-dcnode-id="4805" href="#cite_note-:6-70"><span data-dcnode-id="4806" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4803" instrument_node=""> United States officials began assessing applications for asylum for refugees to be resettled in the United States as part of a deal struck with the Australian government.</span><sup class="reference" data-dcnode-id="4800" id="cite_ref-71"><a data-dcnode-id="4801" href="#cite_note-71"><span data-dcnode-id="4802" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4799" instrument_node="">
</span></p><span data-dcnode-id="4797" instrument_node="">
</span><h3 data-dcnode-id="4787"><span class="mw-headline" data-dcnode-id="4795" id="Statistics_and_assessment:_end_2018"><span data-dcnode-id="4796" instrument_node="">Statistics and assessment: end 2018</span></span><span class="mw-editsection" data-dcnode-id="4788"><span class="mw-editsection-bracket" data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">[</span></span><a data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D18" title="Edit section: Statistics and assessment: end 2018"><span data-dcnode-id="4792" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4786" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4785" instrument_node="">Over the period from the Abbott government through to the Morrison government, arrivals dropped to around 1,200. However, the conditions of those left on the islands has continued to garner national and worldwide attention. Immigration law specialist Professor Mary Crock said there was no statistical evidence that offshore processing itself deterred asylum seekers; it was rather boat push-backs that were more successful. People had become aware of the human cost as well as the monetary cost. "We've spent more on this than [the US$5 billion] Trump is asking for his wall," she said.</span><sup class="reference" data-dcnode-id="4782" id="cite_ref-SBStimeline_37-9"><a data-dcnode-id="4783" href="#cite_note-SBStimeline-37"><span data-dcnode-id="4784" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4781" instrument_node="">
</span></p><p data-dcnode-id="4768"><span data-dcnode-id="4779" instrument_node="">Public opinion seemed to be reflected in the polls at the </span><a data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_Wentworth_by-election" title="2018 Wentworth by-election"><span data-dcnode-id="4778" instrument_node="">October 2018 Wentworth by-election</span></a><span data-dcnode-id="4776" instrument_node="">, after successful candidate </span><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerryn_Phelps" title="Kerryn Phelps"><span data-dcnode-id="4775" instrument_node="">Kerryn Phelps</span></a><span data-dcnode-id="4773" instrument_node=""> had urged voters to protest 'inhumane' refugee policies by voting for her.</span><sup class="reference" data-dcnode-id="4770" id="cite_ref-72"><a data-dcnode-id="4771" href="#cite_note-72"><span data-dcnode-id="4772" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4769" instrument_node="">
</span></p><span data-dcnode-id="4767" instrument_node="">
</span><h3 data-dcnode-id="4756"><span data-dcnode-id="4766" id="Medevac_Bill_.26_re-opening_of_Christmas_Island:_Feb_to_Dec_2019"></span><span class="mw-headline" data-dcnode-id="4764" id="Medevac_Bill_&amp;_re-opening_of_Christmas_Island:_Feb_to_Dec_2019"><span data-dcnode-id="4765" instrument_node="">Medevac Bill &amp; re-opening of Christmas Island: Feb to Dec 2019</span></span><span class="mw-editsection" data-dcnode-id="4757"><span class="mw-editsection-bracket" data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">[</span></span><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D19" title="Edit section: Medevac Bill &amp; re-opening of Christmas Island: Feb to Dec 2019"><span data-dcnode-id="4761" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4755" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4746"><div class="thumbinner" data-dcnode-id="4747" style="width:222px;"><a class="image" data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg"><img alt="" class="thumbimage" data-dcnode-id="4754" data-file-height="3448" data-file-width="5168" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Rally-_Let_Them_Out%252C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg/220px-Rally-_Let_Them_Out%252C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Rally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg/330px-Rally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/09/Rally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg/440px-Rally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg 2x" width="220"></a><span data-dcnode-id="4752" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4748"><div class="magnify" data-dcnode-id="4750"><a class="internal" data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARally-_Let_Them_Out%2C_Let_Them_Stay_-_Free_the_Medevac_Refugees.jpg" title="Enlarge"></a></div><span data-dcnode-id="4749" instrument_node="">Rally called by the Refugee Action Collective, calling for the release of 60 Medevac refugees currently being detained in Park Hotel, Carlton.</span></div></div></div><p data-dcnode-id="4731"><span data-dcnode-id="4745" instrument_node="">On 13 February 2019, a bill which became known as the </span><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_detention_in_Australia%23Medevac_bill" title="Immigration detention in Australia"><span data-dcnode-id="4744" instrument_node="">"Medevac bill"</span></a><span data-dcnode-id="4742" instrument_node=""> was narrowly passed by the Australian parliament allowing doctors to have more say in the process by which asylum seekers on Manus and Nauru may be brought to the mainland for treatment. The approval of two doctors is required, but approval may still be overridden by the home affairs minister in one of three areas. The fast-tracked medical transfers will only apply to the existing cohort of refugees and asylum seekers on Manus Island and Nauru, a point that Mr Morrison refuses to concede. Human rights advocates hailed the decision, with one calling it a "tipping point as a country", with the weight of public opinion believing that sick people need treatment.</span><sup class="reference" data-dcnode-id="4739" id="cite_ref-73"><a data-dcnode-id="4740" href="#cite_note-73"><span data-dcnode-id="4741" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4736" id="cite_ref-74"><a data-dcnode-id="4737" href="#cite_note-74"><span data-dcnode-id="4738" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="4733" id="cite_ref-75"><a data-dcnode-id="4734" href="#cite_note-75"><span data-dcnode-id="4735" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4732" instrument_node="">
</span></p><p data-dcnode-id="4721"><span data-dcnode-id="4730" instrument_node="">A few days later, after warning about an influx of asylum seeker boats by both Dutton and Morrison, the prime minister announced the re-opening of the Christmas Island detention facilities, implying that this change in the law would provide the signal for people smugglers to begin operating again. The government later announced a plan to send sick refugees there, rather than hospitals on mainland Australia as was the intention of the Medevac bill.</span><sup class="reference" data-dcnode-id="4727" id="cite_ref-SBStimeline_37-10"><a data-dcnode-id="4728" href="#cite_note-SBStimeline-37"><span data-dcnode-id="4729" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4726" instrument_node=""> In the days following, Dutton said that because of this change in the law, Australians on waiting lists for hospital treatment and those already in public housing were going to be adversely affected.</span><sup class="reference" data-dcnode-id="4723" id="cite_ref-SatManne_76-0"><a data-dcnode-id="4724" href="#cite_note-SatManne-76"><span data-dcnode-id="4725" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4722" instrument_node="">
</span></p><p data-dcnode-id="4712"><span data-dcnode-id="4720" instrument_node="">This was seen by </span><a data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Manne" title="Robert Manne"><span data-dcnode-id="4719" instrument_node="">Robert Manne</span></a><span data-dcnode-id="4717" instrument_node=""> as a turning point in Labor Party policy, after having had almost identical asylum seeker policies as the Coalition for the past five years. He also points out the numerous obstacles any potential people smuggler or asylum seeker would have to face, because the deterrent aspects of the policy are still firmly in place, and the new legislation applies only to the approximately 1000 people still on Nauru and Manus (of whom only a relatively small number will be allowed to access the urgent medical attention they need).</span><sup class="reference" data-dcnode-id="4714" id="cite_ref-SatManne_76-1"><a data-dcnode-id="4715" href="#cite_note-SatManne-76"><span data-dcnode-id="4716" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4713" instrument_node="">
</span></p><p data-dcnode-id="4703"><span data-dcnode-id="4711" instrument_node="">In December 2019, the Medevac bill was repealed, after 37 votes to 35 in the senate supported the government's move to repeal the law.</span><sup class="reference" data-dcnode-id="4708" id="cite_ref-77"><a data-dcnode-id="4709" href="#cite_note-77"><span data-dcnode-id="4710" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="4705" id="cite_ref-78"><a data-dcnode-id="4706" href="#cite_note-78"><span data-dcnode-id="4707" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4704" instrument_node="">
</span></p><span data-dcnode-id="4702" instrument_node="">
</span><h3 data-dcnode-id="4691"><span data-dcnode-id="4701" id=".22Biloela_family.22_asylum_seekers"></span><span class="mw-headline" data-dcnode-id="4699" id="&quot;Biloela_family&quot;_asylum_seekers"><span data-dcnode-id="4700" instrument_node="">"Biloela family" asylum seekers</span></span><span class="mw-editsection" data-dcnode-id="4692"><span class="mw-editsection-bracket" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">[</span></span><a data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D20" title="Edit section: &quot;Biloela family&quot; asylum seekers"><span data-dcnode-id="4696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4690" instrument_node="">
</span><link data-dcnode-id="4689" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4685" role="note"><span data-dcnode-id="4688" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadesalingam_family_asylum_claims" title="Nadesalingam family asylum claims"><span data-dcnode-id="4687" instrument_node="">Nadesalingam family asylum claims</span></a></div><span data-dcnode-id="4684" instrument_node="">
</span><p data-dcnode-id="4656"><span data-dcnode-id="4683" instrument_node="">In a long-running case in which a couple of </span><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamils" title="Tamils"><span data-dcnode-id="4682" instrument_node="">Tamil</span></a><span data-dcnode-id="4680" instrument_node=""> </span><a data-dcnode-id="4678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_seeker" title="Asylum seeker"><span data-dcnode-id="4679" instrument_node="">asylum seekers</span></a><span data-dcnode-id="4677" instrument_node="">, Kokilapathmapriya Nadesalingam (Priya) and Nadesalingam Murugappan (Nades), were refused refugee status after settling and starting a family in </span><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biloela" title="Biloela"><span data-dcnode-id="4676" instrument_node="">Biloela</span></a><span data-dcnode-id="4674" instrument_node=""> in central Queensland, the community rallied to support the family, who became known as "</span><a class="mw-redirect" data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadesalingam_family_asylum_claims" title="Nadesalingam family asylum claims"><span data-dcnode-id="4673" instrument_node="">the Biloela family</span></a><span data-dcnode-id="4671" instrument_node="">" in the press. The family was removed in a dawn raid on their home and taken to Melbourne March 2018, pending deportation.</span><sup class="reference" data-dcnode-id="4668" id="cite_ref-79"><a data-dcnode-id="4669" href="#cite_note-79"><span data-dcnode-id="4670" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4667" instrument_node=""> Since then, various legal avenues have been pursued, with the family taken to </span><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christmas_Island_Detention_Centre" title="Christmas Island Detention Centre"><span data-dcnode-id="4666" instrument_node="">Christmas Island Detention Centre</span></a><span data-dcnode-id="4664" instrument_node=""> in late August 2018. In April 2020 they were awarded costs of more than $200,000 against the federal government, for lack of procedural fairness in assessing their youngest daughter's claim.</span><sup class="reference" data-dcnode-id="4661" id="cite_ref-80"><a data-dcnode-id="4662" href="#cite_note-80"><span data-dcnode-id="4663" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="4658" id="cite_ref-81"><a data-dcnode-id="4659" href="#cite_note-81"><span data-dcnode-id="4660" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4657" instrument_node="">
</span></p><span data-dcnode-id="4655" instrument_node="">
</span><h3 data-dcnode-id="4645"><span class="mw-headline" data-dcnode-id="4653" id="March_to_May_2020"><span data-dcnode-id="4654" instrument_node="">March to May 2020</span></span><span class="mw-editsection" data-dcnode-id="4646"><span class="mw-editsection-bracket" data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">[</span></span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D21" title="Edit section: March to May 2020"><span data-dcnode-id="4650" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4632"><span data-dcnode-id="4643" instrument_node="">In March 2020, Home Affairs told the </span><a data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Senate_committees" title="Australian Senate committees"><span data-dcnode-id="4642" instrument_node="">Senate estimates committee</span></a><span data-dcnode-id="4640" instrument_node=""> that "211 refugees and asylum seekers remained on Nauru, 228 in Papua New Guinea, and about 1,220, including their dependents, were in Australia to receive medical treatment". Transfer and resettlement of approved refugees in the US was proceeding during the </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="4639" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="4637" instrument_node="">. 35 refugees left Port Moresby on 28 May 2020, and others would be flown from their places of detention within Australia, to be resettled in 18 US cities.</span><sup class="reference" data-dcnode-id="4634" id="cite_ref-82"><a data-dcnode-id="4635" href="#cite_note-82"><span data-dcnode-id="4636" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4633" instrument_node="">
</span></p><span data-dcnode-id="4631" instrument_node="">
</span><h3 data-dcnode-id="4621"><span class="mw-headline" data-dcnode-id="4629" id="July_to_October_2021"><span data-dcnode-id="4630" instrument_node="">July to October 2021</span></span><span class="mw-editsection" data-dcnode-id="4622"><span class="mw-editsection-bracket" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">[</span></span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_in_Australia%26action%3Dedit%26section%3D22" title="Edit section: July to October 2021"><span data-dcnode-id="4626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4620" instrument_node="">
</span><p data-dcnode-id="4614"><span data-dcnode-id="4619" instrument_node="">On 31 July 2021, there were 124 adults remaining in PNG and 107 on Nauru.</span><sup class="reference" data-dcnode-id="4616" id="cite_ref-83"><a data-dcnode-id="4617" href="#cite_note-83"><span data-dcnode-id="4618" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4615" instrument_node="">
