</span><h1 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">INTRODUCING ASYLUM ACCESS THAILAND</span></h1><span data-dcnode-id="637" instrument_node="">
</span><h1 data-dcnode-id="635"><img alt="" class="wp-image-7826" data-dcnode-id="636" height="1176" loading="lazy" sizes="(max-width: 2068px) 100vw, 2068px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asylumaccess.org/wp-content/uploads/2020/11/AAT_2017.png&amp;raw" srcset="https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017.png 2068w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017-300x171.png 300w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017-1024x582.png 1024w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017-768x437.png 768w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017-1536x873.png 1536w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT_2017-2048x1165.png 2048w" style="width: 200px;" width="2068"></h1><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Established in 2007, Asylum Access Thailand (AAT) is dedicated to providing friendly, effective and comprehensive support to the various refugee communities that live in Bangkok. We help refugees navigate the complex asylum process and connect them to further assistance from local partners. Our team also supports refugees to undertake training and start their own initiatives to benefit and strengthen their communities.&nbsp;</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Asylum Access Thailand also works in close coalition with other Thai and regional human rights organizations. Through these partnerships, we collectively advocate for changes in Thai law and policy that will allow refugees and their families to live openly, move freely, rebuild their lives and contribute to their host communities.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">We are proud members of:</span></p><span data-dcnode-id="625" instrument_node="">
</span><ul data-dcnode-id="604"><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Core Urban Refugee Network (CURN)</span></li><li data-dcnode-id="615"><span data-dcnode-id="622" instrument_node="">The </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/crsp.thailand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="621" instrument_node="">Coalition for Rights of Refugee</span></a><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/crsp.thailand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="619" instrument_node="">s</span></a><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/crsp.thailand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="617" instrument_node=""> and the Stateless Persons (CRSP)</span></a></li><li data-dcnode-id="611"><span data-dcnode-id="614" instrument_node="">The </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aprrn.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="613" instrument_node="">Asia Pacific Refugee Rights Network (APRRN)</span></a></li><li data-dcnode-id="608"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basranbangkok.wordpress.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="610" instrument_node="">Bangkok Asylum Seeker and Refugee Assistant Network (BASRAN)</span></a></li><li data-dcnode-id="605"><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idcoalition.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="607" instrument_node="">International Detention Coalition (IDC)</span></a></li></ul><span data-dcnode-id="603" instrument_node="">
</span><h2 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Refugees in Thailand</span></h2><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Thailand has not signed the 1951 Refugee Convention and has no laws in place to provide refugees with any legal status. In effect, this means the thousands of refugees living in urban areas are undocumented. This puts them at constant risk of arrest, detention and deportation back to danger by the Thai authorities.&nbsp;</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Life for refugees and their families under these circumstances is exceptionally difficult and stressful. Despite these challenging conditions, Asylum Access Thailand has built a strong support system to stand with refugees as they rebuild their lives here.&nbsp;</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Following years of advocacy work, the Thai government will soon start recognizing refugees and giving them the legal right to stay. As a result, refugees will be able to walk down the street without fear. We will be here to help the refugee community navigate this new system and ensure it is implemented in full respect of refugees’ human rights.</span></p><span data-dcnode-id="591" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="588"><figure class="aligncenter size-large is-resized" data-dcnode-id="589"><img alt="Image shows a couple sitting on a bed holding their baby." class="wp-image-7839" data-dcnode-id="590" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6-1024x683.jpg&amp;raw" srcset="https://asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6-1024x683.jpg 1024w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6-300x200.jpg 300w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6-768x512.jpg 768w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6-1536x1024.jpg 1536w, https://asylumaccess.org/wp-content/uploads/2020/11/AAT201303-RefugeeFamily-AsylumAccess6.jpg 2048w" width="1024"></figure></div><span data-dcnode-id="587" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="586" style="height:30px"></div><span data-dcnode-id="585" instrument_node="">
</span><h1 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">OUR PROGRAMS</span></h1><span data-dcnode-id="582" instrument_node="">

</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Asylum applications in Thailand are currently handled by the UN Refugee Agency (UNHCR). The process can be lengthy, complicated and often traumatic. We provide our clients with the legal and social support to help them navigate this process and obtain refugee status.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="572" instrument_node="">Learn more about </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asylumaccess.org/where-we-work/thailand/legal-empowerment/"><span data-dcnode-id="571" instrument_node="">Legal Empowerment at Asylum Access Thailand.</span></a></p><span data-dcnode-id="568" instrument_node="">

</span></div><span data-dcnode-id="561" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="547"><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="557"><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asylumaccess.org/where-we-work/thailand/community-empowerment/"><span data-dcnode-id="559" instrument_node="">Community Empowerment</span></a></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">We provide ongoing training in legal support, interpreting and leadership for refugees who want to become advocates for their community. We also resource and strengthen refugee and host community-led initiatives that contribute to the support and opportunities available to refugees.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="552" instrument_node="">Learn more about </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asylumaccess.org/where-we-work/thailand/community-empowerment/"><span data-dcnode-id="551" instrument_node="">Community Empowerment at Asylum Access Thailand.</span></a></p><span data-dcnode-id="548" instrument_node="">

</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">We work alongside other human rights groups to advocate for changes to Thai law that will restore the safety and dignity of refugees in the country. We are pushing for a Thailand in which all refugees can feel safe and rebuild their lives.&nbsp;</span></p><span data-dcnode-id="537" instrument_node="">

</span><h1 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">OUR IMPACT</span></h1><span data-dcnode-id="442" instrument_node="">
</span><h2 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Serving the refugee community</span></h2><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">As an established, trusted ally to the refugee communities in Thailand, we are proud of the support we have provided to our clients.</span></p><span data-dcnode-id="436" instrument_node="">
</span><ul data-dcnode-id="427"><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Over 2,500 refugees reached each year, including 80% of the estimated urban refugee population.</span></li><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">We have supported over 19,000 refugee clients since our founding in 2007.</span></li><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">We have trained 17 refugee paralegals and 21 community interpreters across 20 languages.</span></li><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">We have worked with 14 community-led initiatives to strengthen the support network available to refugees.</span></li></ul><span data-dcnode-id="426" instrument_node="">
</span><h2 data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Advancing the rights of refugees in Thailand</span></h2><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Through collaborative efforts with local and regional human rights partners, Asylum Access Thailand has contributed to the following policy advances:</span></p><span data-dcnode-id="420" instrument_node="">
</span><ul data-dcnode-id="399"><li data-dcnode-id="416"><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">2020</span></strong><span data-dcnode-id="417" instrument_node=""> – the Thai government begins implementing its own asylum process that will grant legal status for refugees in the country for the very first time.</span></li><li data-dcnode-id="412"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">2019</span></strong><span data-dcnode-id="413" instrument_node=""> – the Thai government signs a Memorandum of Understanding that pledged to end the detention of children in the country.</span></li><li data-dcnode-id="408"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">2016</span></strong><span data-dcnode-id="409" instrument_node=""> – the Thai government formally pledges to provide refugees with legal status at the Global Refugee Summit.&nbsp;</span></li><li data-dcnode-id="404"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">2016</span></strong><span data-dcnode-id="405" instrument_node=""> – the Thai government agrees to reform its use of detention following criticism from nine governments through the Universal Periodic Review (UPR) process.</span></li><li data-dcnode-id="400"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">2014</span></strong><span data-dcnode-id="401" instrument_node=""> – the Thai government agrees to release refugee children from detention without bail.</span></li></ul><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="397" instrument_node="">Learn more about Asylum Access’s global impact on the </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asylumaccess.org/who-we-are/impact/"><span data-dcnode-id="396" instrument_node="">Our Impact</span></a><span data-dcnode-id="394" instrument_node=""> page.</span></p><span data-dcnode-id="392" instrument_node="">
