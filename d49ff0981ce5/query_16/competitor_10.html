</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2574" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2592"><p class="field-content bold-font" data-dcnode-id="2593"><a data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/matter-e-r-l-vacated" hreflang="en"><span data-dcnode-id="2595" instrument_node="">Matter of E-R-A-L- Vacated</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2585"><span class="views-label views-label-field-content-updated" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2586"><time class="datetime" data-dcnode-id="2588" datetime="2021-08-06T12:00:00Z"><span data-dcnode-id="2589" instrument_node="">August 6, 2021</span></time><span data-dcnode-id="2587" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2582"><p class="field-content" data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">The Catholic Legal Immigration Network, Inc., or CLINIC, and the Duke Law School Immigrant Rights Clinic filed a petition for review in March 2020 challenging a Board of Immigration Appeals precedent denying asylum protections for immigrants fleeing gangs and drug traffickers.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2575"><p class="field-content" data-dcnode-id="2576"><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2581" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2579" instrument_node="">, </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2578" instrument_node="">Litigation</span></a></p></div></div><span data-dcnode-id="2573" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2553" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2569"><p class="field-content bold-font" data-dcnode-id="2570"><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/updated-practice-advisory-firm-resettlement-considerations-wake" hreflang="en"><span data-dcnode-id="2572" instrument_node="">Updated Practice Advisory: Firm Resettlement Considerations in the Wake of the “Migrant Protection Protocols” Wind-Down</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2562"><span class="views-label views-label-field-content-updated" data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2563"><time class="datetime" data-dcnode-id="2565" datetime="2021-07-29T12:00:00Z"><span data-dcnode-id="2566" instrument_node="">July 29, 2021</span></time><span data-dcnode-id="2564" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2558"><p class="field-content" data-dcnode-id="2561"></p><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">In 2019, the Trump administration implemented the so-called Migrant Protection Protocols, or MPP, forcing many asylum seekers to remain in Mexico for months or even years awaiting a court date before a U.S. immigration judge. In the spring of 2021, the Biden administration began to wind-down MPP, allowing many asylum seekers who had been forcibly stranded in Mexico into the United States to pursue their claims for asylum. This updated practice advisory discusses the firm resettlement bar under U.S.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2554"><p class="field-content" data-dcnode-id="2555"><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2557" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2552" instrument_node="">
</span></div><span data-dcnode-id="2550" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-9" data-dcnode-id="2496"><span data-dcnode-id="2549" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2521" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2545"><p class="field-content bold-font" data-dcnode-id="2546"><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/board-immigration-appeals-recognizes-tardiness-may-present" hreflang="en"><span data-dcnode-id="2548" instrument_node="">The Board of Immigration Appeals Recognizes Tardiness May Present Exceptional Circumstances for Reopening an In Absentia Removal Order </span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2538"><span class="views-label views-label-field-content-updated" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2539"><time class="datetime" data-dcnode-id="2541" datetime="2021-07-28T12:00:00Z"><span data-dcnode-id="2542" instrument_node="">July 28, 2021</span></time><span data-dcnode-id="2540" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2535"><p class="field-content" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">The Board of Immigration Appeals, or BIA, issued a published decision establishing that the “exceptional circumstances” in absentia reopening provision may encompass situations that led to a respondent’s late arrival to court and, therefore, absence at a removal hearing. This decision provides a non-exhaustive list of factors and corroborative evidence for immigration judges to consider when adjudicating late arrival in absentia motions to reopen on a case-by-case basis.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2522"><p class="field-content" data-dcnode-id="2523"><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2534" instrument_node="">Removal Proceedings</span></a><span data-dcnode-id="2532" instrument_node="">, </span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2531" instrument_node="">Litigation</span></a><span data-dcnode-id="2529" instrument_node="">, </span><a data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2528" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2526" instrument_node="">, </span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="2525" instrument_node="">Humanitarian Relief</span></a></p></div></div><span data-dcnode-id="2520" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2498" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2516"><p class="field-content bold-font" data-dcnode-id="2517"><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/foia-disclosures-uscis-asylum-terminations" hreflang="en"><span data-dcnode-id="2519" instrument_node="">FOIA Disclosures on USCIS Asylum Terminations</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2509"><span class="views-label views-label-field-content-updated" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2510"><time class="datetime" data-dcnode-id="2512" datetime="2021-07-14T12:00:00Z"><span data-dcnode-id="2513" instrument_node="">July 14, 2021</span></time><span data-dcnode-id="2511" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2506"><p class="field-content" data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Concerned about the Trump administration’s remarks targeting asylum seekers and a potential increase in asylum terminations, on Oct. 3, 2019, CLINIC submitted a Freedom of Information Act, or FOIA, request to USCIS seeking information about the numbers of Notices of Intent to Terminate asylum status issued by each asylum office, how many asylum grants were terminated and how many left in place, and the grounds for the asylum offices issuing the Notices.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2499"><p class="field-content" data-dcnode-id="2500"><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2505" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2503" instrument_node="">, </span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/freedom-information-act" hreflang="en"><span data-dcnode-id="2502" instrument_node="">Freedom of Information Act</span></a></p></div></div><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-10" data-dcnode-id="2450"><span data-dcnode-id="2494" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2475" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2490"><p class="field-content bold-font" data-dcnode-id="2491"><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/supreme-court-addresses-asylum-credibility-garland-v-dai" hreflang="en"><span data-dcnode-id="2493" instrument_node="">Supreme Court Addresses Asylum Credibility in Garland v. Dai</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2483"><span class="views-label views-label-field-content-updated" data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2484"><time class="datetime" data-dcnode-id="2486" datetime="2021-06-28T12:00:00Z"><span data-dcnode-id="2487" instrument_node="">June 28, 2021</span></time><span data-dcnode-id="2485" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2480"><p class="field-content" data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">In Garland v. Dai, the Supreme Court addressed the standard under which federal courts of appeals review credibility findings in asylum cases. The Court rejected the generous approach taken by the Ninth Circuit, which had employed a rule requiring a finding that the asylum-seeker is credible unless the Board of Immigration Appeals explicitly made an adverse credibility finding.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2476"><p class="field-content" data-dcnode-id="2477"><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2479" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2474" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2452" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2470"><p class="field-content bold-font" data-dcnode-id="2471"><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-files-amicus-brief-10th-circuit-family-based-asylum-case" hreflang="en"><span data-dcnode-id="2473" instrument_node="">CLINIC Files Amicus Brief in 10th Circuit Family-Based Asylum Case</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2463"><span class="views-label views-label-field-content-updated" data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2464"><time class="datetime" data-dcnode-id="2466" datetime="2021-04-29T12:00:00Z"><span data-dcnode-id="2467" instrument_node="">April 29, 2021</span></time><span data-dcnode-id="2465" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2460"><p class="field-content" data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">On April 8, 2021, CLINIC and the Center for Gender and Refugee Studies, or CGRS, filed an amicus brief with the Tenth Circuit Court of Appeals, on behalf of an asylum seeker and her son. The family fled El Salvador following the murder of one family member, and death threats against the petitioner in this case. Nonetheless, the Board of Immigration Appeals, or BIA, rejected the case, finding that the family was not a cognizable particular social group and that there was no nexus between the harm and a protected characteristic. CLINIC and CGRS laid out the long history of family being a protected ground as well as other flaws in the BIA's reasoning.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2453"><p class="field-content" data-dcnode-id="2454"><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2459" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2457" instrument_node="">, </span><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="2456" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="2451" instrument_node="">
</span></div><span data-dcnode-id="2449" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-11" data-dcnode-id="2398"><span data-dcnode-id="2448" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2426" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2444"><p class="field-content bold-font" data-dcnode-id="2445"><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-joins-cgrs-and-pangea-advocate-attorney-general-garland" hreflang="en"><span data-dcnode-id="2447" instrument_node="">CLINIC Joins CGRS and Pangea to Advocate for Attorney General Garland to Vacate Attorney General Decisions that Limit Asylum</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2437"><span class="views-label views-label-field-content-updated" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2438"><time class="datetime" data-dcnode-id="2440" datetime="2021-04-14T12:00:00Z"><span data-dcnode-id="2441" instrument_node="">April 14, 2021</span></time><span data-dcnode-id="2439" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2434"><p class="field-content" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">CLINIC, the Center for Gender and Refugee Studies, and Pangea Legal Services, have sent a letter to Attorney General Merrick Garland, calling on him to vacate three precedential decisions — Matter of A-B-, Matter of A-C-A-A-, and Matter of L-E-A- — that severely limit access to asylum for those fleeing domestic violence, gang violence and violence based on family membership. As counsel for the asylum seekers in these three cases, we ask that the decisions be set aside as the agencies work on issuing regulations that will address these issues, pursuant to President Biden's Feb. 2, 2021 executive order on asylum.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2427"><p class="field-content" data-dcnode-id="2428"><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2433" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2431" instrument_node="">, </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-court-and-administrative-decisions" hreflang="en"><span data-dcnode-id="2430" instrument_node="">Federal Court and Administrative Decisions</span></a></p></div></div><span data-dcnode-id="2425" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2400" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2421"><p class="field-content bold-font" data-dcnode-id="2422"><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/practice-pointer-temporary-protected-status-navigating-removal" hreflang="en"><span data-dcnode-id="2424" instrument_node="">Practice Pointer Temporary Protected Status: Navigating Removal Proceedings, Dual Nationality, and Asylum</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2414"><span class="views-label views-label-field-content-updated" data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2415"><time class="datetime" data-dcnode-id="2417" datetime="2021-03-24T12:00:00Z"><span data-dcnode-id="2418" instrument_node="">March 24, 2021</span></time><span data-dcnode-id="2416" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2411"><p class="field-content" data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Despite the welcome news of these additional TPS designations, many Venezuelan nationals, Burmese nationals, and stateless people who last resided in Venezuela or Burma are currently in removal proceedings or face removal proceedings. This practice pointer addresses common questions that arise for practitioners representing TPS-eligible individuals who are in removal proceedings or facing potential removal proceedings, hold dual nationality, or wish to seek asylum. This practice pointer ends with a discussion of Employment Authorization Document options for Venezuelans.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2401"><p class="field-content" data-dcnode-id="2402"><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2410" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2408" instrument_node="">, </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief/temporary-protected-status-and-deferred-enforced-departure" hreflang="en"><span data-dcnode-id="2407" instrument_node="">Temporary Protected Status and Deferred Enforced Departure</span></a><span data-dcnode-id="2405" instrument_node="">, </span><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2404" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="2399" instrument_node="">
</span></div><span data-dcnode-id="2397" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-12" data-dcnode-id="2355"><span data-dcnode-id="2396" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2377" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2392"><p class="field-content bold-font" data-dcnode-id="2393"><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-finds-shift-tone-department-state-human-rights-reports" hreflang="en"><span data-dcnode-id="2395" instrument_node="">CLINIC Finds Shift in Tone of Department of State Human Rights Reports for Northern  Triangle Countries</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2385"><span class="views-label views-label-field-content-updated" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2386"><time class="datetime" data-dcnode-id="2388" datetime="2021-03-19T12:00:00Z"><span data-dcnode-id="2389" instrument_node="">March 19, 2021</span></time><span data-dcnode-id="2387" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2382"><p class="field-content" data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">CLINIC released three new resources comparing Department of State, or DOS, Human Rights Reports for the three Northern Triangle countries of Central America — Honduras, Guatemala, and El Salvador — under the last year of the Obama administration and the last year of the Trump administration, highlighting substantial changes. Each year, DOS issues a Human Rights Report on every country that is a United Nations member state or receives assistance.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2378"><p class="field-content" data-dcnode-id="2379"><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2381" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2376" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2357" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2372"><p class="field-content bold-font" data-dcnode-id="2373"><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-department-state-shifts-human-rights-reports-comparison" hreflang="en"><span data-dcnode-id="2375" instrument_node="">CLINIC Department of State Shifts Human Rights Reports Comparison Charts</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2365"><span class="views-label views-label-field-content-updated" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2366"><time class="datetime" data-dcnode-id="2368" datetime="2021-03-01T12:00:00Z"><span data-dcnode-id="2369" instrument_node="">March 1, 2021</span></time><span data-dcnode-id="2367" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2362"><p class="field-content" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Each year the U.S. Department of State issues a Human Rights Report on every country in the world. These reports play an important role in adjudicating asylum and other humanitarian applications for relief, as immigration judges often rely heavily on their conclusions. Pending proposed regulations would give these reports even greater weight in immigration court. CLINIC has evaluated the Department of State reports for 2016 — the last year that the Obama administration produced the reports — and 2019 — the last year the Trump administration produced the reports — and found significant differences in length, subject matter and tone.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2358"><p class="field-content" data-dcnode-id="2359"><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2361" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2356" instrument_node="">
</span></div><span data-dcnode-id="2354" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-13" data-dcnode-id="2305"><span data-dcnode-id="2353" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2331" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2349"><p class="field-content bold-font" data-dcnode-id="2350"><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/bia-rules-witnesses-eligibility-asylum-psg" hreflang="en"><span data-dcnode-id="2352" instrument_node="">BIA Rules on Witnesses’ Eligibility for Asylum as PSG</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2342"><span class="views-label views-label-field-content-updated" data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2343"><time class="datetime" data-dcnode-id="2345" datetime="2021-02-22T12:00:00Z"><span data-dcnode-id="2346" instrument_node="">February 22, 2021</span></time><span data-dcnode-id="2344" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2339"><p class="field-content" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">The Board of Immigration Appeals, or BIA, recently issued a decision where it concluded that individuals who cooperate with law enforcement may constitute a valid particular social group, or PSG, but only if their cooperation is public in nature and the society in question recognizes and provides protection for such cooperation. Matter of H-L-S-A-, 28 I&amp;N Dec. 228 (BIA 2021). Its holding risks eliminating asylum eligibility for many applicants who have genuine fears of return based on having taken public actions against their potential persecutors.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2332"><p class="field-content" data-dcnode-id="2333"><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2338" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2336" instrument_node="">, </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="2335" instrument_node="">Humanitarian Relief</span></a></p></div></div><span data-dcnode-id="2330" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2307" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2326"><p class="field-content bold-font" data-dcnode-id="2327"><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/jop-v-dhs-class-action-lawsuit-seeks-protection-asylum-seekers-who-arrived" hreflang="en"><span data-dcnode-id="2329" instrument_node="">J.O.P. v. DHS: Class-Action Lawsuit Seeks Protection for Asylum Seekers Who Arrived as Unaccompanied Children</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2319"><span class="views-label views-label-field-content-updated" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2320"><time class="datetime" data-dcnode-id="2322" datetime="2021-01-11T12:00:00Z"><span data-dcnode-id="2323" instrument_node="">January 11, 2021</span></time><span data-dcnode-id="2321" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2315"><p class="field-content" data-dcnode-id="2318"></p><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">CLINIC, along with Kids In Need of Defense, or KIND, Public Counsel, and Goodwin Procter on July 1, 2019, filed a complaint in U.S. District Court for the District of Maryland. The suit challenges a new policy that limits the ability to seek asylum for certain children who arrived in the country alone. The lawsuit alleges that the policy by U.S. Citizenship and Immigration Services violates the plaintiffs'&nbsp;rights under the 5th Amendment, the Administrative Procedures Act, and the 2008 Trafficking Victims Protection Reauthorization Act.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2308"><p class="field-content" data-dcnode-id="2309"><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2314" instrument_node="">Litigation</span></a><span data-dcnode-id="2312" instrument_node="">, </span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2311" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2306" instrument_node="">
</span></div><span data-dcnode-id="2304" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-14" data-dcnode-id="2254"><span data-dcnode-id="2303" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2279" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2299"><p class="field-content bold-font" data-dcnode-id="2300"><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-joins-amicus-brief-scotus-advocating-release-withholding" hreflang="en"><span data-dcnode-id="2302" instrument_node="">CLINIC Joins Amicus Brief at SCOTUS Advocating for Release of Withholding of Removal Applicants</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2292"><span class="views-label views-label-field-content-updated" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2293"><time class="datetime" data-dcnode-id="2295" datetime="2020-11-24T12:00:00Z"><span data-dcnode-id="2296" instrument_node="">November 24, 2020</span></time><span data-dcnode-id="2294" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2287"><p class="field-content" data-dcnode-id="2291"></p><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">On Nov. 12, 2020, CLINIC joined the National Immigration Litigation Alliance, the Northwest Immigrant Rights Project, the Florence Immigrant and Refugee Rights Project, and Public Counsel in appearing as amici curiae in Pham v. Guzman Chavez. In this case, the Supreme Court will consider whether people in proceedings to determine their eligibility for withholding of removal may be released from immigration detention on bond. CLINIC is represented by WilmerHale.</span></p><p data-dcnode-id="2288"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2280"><p class="field-content" data-dcnode-id="2281"><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2286" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2284" instrument_node="">, </span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="2283" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="2278" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2256" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2274"><p class="field-content bold-font" data-dcnode-id="2275"><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-joins-amicus-brief-opposing-asylum-ban" hreflang="en"><span data-dcnode-id="2277" instrument_node="">CLINIC Joins Amicus Brief Opposing Asylum Ban</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2267"><span class="views-label views-label-field-content-updated" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2268"><time class="datetime" data-dcnode-id="2270" datetime="2020-11-24T12:00:00Z"><span data-dcnode-id="2271" instrument_node="">November 24, 2020</span></time><span data-dcnode-id="2269" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2264"><p class="field-content" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">CLINIC, together with several other nonprofit organizations and law school clinics, appeared as amici curiae asking the Ninth Circuit to block a rule preventing people who transited through a third country from obtaining asylum.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2257"><p class="field-content" data-dcnode-id="2258"><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2263" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2261" instrument_node="">, </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="2260" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="2255" instrument_node="">
</span></div><span data-dcnode-id="2253" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-15" data-dcnode-id="2199"><span data-dcnode-id="2252" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2230" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2248"><p class="field-content bold-font" data-dcnode-id="2249"><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief/clinic-files-amicus-brief-challenging-ijs-reliance-dos-human" hreflang="en"><span data-dcnode-id="2251" instrument_node="">CLINIC Files Amicus Brief Challenging IJ's Reliance on DOS Human Rights Report</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2241"><span class="views-label views-label-field-content-updated" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2242"><time class="datetime" data-dcnode-id="2244" datetime="2020-11-05T12:00:00Z"><span data-dcnode-id="2245" instrument_node="">November 5, 2020</span></time><span data-dcnode-id="2243" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2238"><p class="field-content" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">On Nov. 3, 2020 CLINIC and the University of Minnesota Law School’s Immigration and Human Rights Clinic filed an amicus brief in the Second Circuit Court of Appeals challenging the immigration judge's reliance on a Department of State Human Rights Report in denying the applicant's asylum claim from Honduras.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2231"><p class="field-content" data-dcnode-id="2232"><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="2237" instrument_node="">Amicus Brief</span></a><span data-dcnode-id="2235" instrument_node="">, </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2234" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2229" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2201" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2225"><p class="field-content bold-font" data-dcnode-id="2226"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/childrens-issues/bia-issues-decision-about-jurisdiction-over-asylum-applicant-who-had" hreflang="en"><span data-dcnode-id="2228" instrument_node="">BIA Issues Decision About Jurisdiction Over an Asylum Applicant Who Had Previously Been Determined to be an “Unaccompanied Alien Child” </span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2218"><span class="views-label views-label-field-content-updated" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2219"><time class="datetime" data-dcnode-id="2221" datetime="2020-10-26T12:00:00Z"><span data-dcnode-id="2222" instrument_node="">October 26, 2020</span></time><span data-dcnode-id="2220" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2215"><p class="field-content" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">On Oct. 16, 2018, the Board of Immigration Appeals (BIA) issued a precedent decision holding that an immigration judge (IJ) has initial jurisdiction over an asylum application filed by a respondent previously determined to be an “unaccompanied alien child” who turns 18 before filing the asylum application, in Matter of M-A-C-O-, 27 I&amp;N Dec. 477 (BIA 2018).</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2202"><p class="field-content" data-dcnode-id="2203"><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/childrens-issues" hreflang="en"><span data-dcnode-id="2214" instrument_node="">Children's Issues</span></a><span data-dcnode-id="2212" instrument_node="">, </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/childrens-issues/unaccompanied-children" hreflang="en"><span data-dcnode-id="2211" instrument_node="">Unaccompanied Children</span></a><span data-dcnode-id="2209" instrument_node="">, </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2208" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2206" instrument_node="">, </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2205" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="2200" instrument_node="">
</span></div><span data-dcnode-id="2198" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-16" data-dcnode-id="2150"><span data-dcnode-id="2197" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2178" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2193"><p class="field-content bold-font" data-dcnode-id="2194"><a data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/citing-covid-19-administration-seeks-bar-asylum-seekers-danger" hreflang="en"><span data-dcnode-id="2196" instrument_node="">Citing COVID-19, the Administration Seeks to Bar Asylum Seekers as a Danger to National Security</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2186"><span class="views-label views-label-field-content-updated" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2187"><time class="datetime" data-dcnode-id="2189" datetime="2020-07-21T12:00:00Z"><span data-dcnode-id="2190" instrument_node="">July 21, 2020</span></time><span data-dcnode-id="2188" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2183"><p class="field-content" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">On July 9, 2020, the administration issued a proposed regulation entitled, “Security Bars and Processing.” The proposed rule seeks to bar entry of asylum applicants who have tested positive for COVID-19, come from a country where COVID-19 is prevalent, and/or exhibit COVID-19 symptoms. The administration is using the economic impact of the COVID-19 pandemic as a basis to apply a mandatory bar to asylum and withholding of removal.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2179"><p class="field-content" data-dcnode-id="2180"><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2182" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2177" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2152" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2173"><p class="field-content bold-font" data-dcnode-id="2174"><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/victory-grace-v-barr" hreflang="en"><span data-dcnode-id="2176" instrument_node="">VICTORY! Grace v. Barr</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2166"><span class="views-label views-label-field-content-updated" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2167"><time class="datetime" data-dcnode-id="2169" datetime="2020-07-20T12:00:00Z"><span data-dcnode-id="2170" instrument_node="">July 20, 2020</span></time><span data-dcnode-id="2168" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2163"><p class="field-content" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">On July 31, 2019, CLINIC joined eight other organizations that serve survivors of gender-based violence to submit an amicus brief to the U.S. Court of Appeals for the D.C. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2153"><p class="field-content" data-dcnode-id="2154"><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2162" instrument_node="">Litigation</span></a><span data-dcnode-id="2160" instrument_node="">, </span><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2159" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2157" instrument_node="">, </span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="2156" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="2151" instrument_node="">
</span></div><span data-dcnode-id="2149" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-17" data-dcnode-id="2101"><span data-dcnode-id="2148" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2126" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2144"><p class="field-content bold-font" data-dcnode-id="2145"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-submits-comments-proposed-rule-would-gut-asylum-protections" hreflang="en"><span data-dcnode-id="2147" instrument_node="">CLINIC Submits Comments on Proposed Rule That Would Gut Asylum Protections</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2137"><span class="views-label views-label-field-content-updated" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2138"><time class="datetime" data-dcnode-id="2140" datetime="2020-07-15T12:00:00Z"><span data-dcnode-id="2141" instrument_node="">July 15, 2020</span></time><span data-dcnode-id="2139" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2134"><p class="field-content" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">On July 15, 2020, CLINIC submitted comments on sweeping proposed regulations that would render most people fleeing harm ineligible for asylum protection. CLINIC strongly opposed both the limited time frame for submitting comments to such a radical rule change and to the substance of the rule.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2127"><p class="field-content" data-dcnode-id="2128"><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2133" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2131" instrument_node="">, </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="2130" instrument_node="">Federal Administrative Advocacy</span></a></p></div></div><span data-dcnode-id="2125" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2103" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2121"><p class="field-content bold-font" data-dcnode-id="2122"><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum/faqs-changes-employment-authorization-rules-asylum" hreflang="en"><span data-dcnode-id="2124" instrument_node="">FAQs on Changes to the Employment Authorization Rules for Asylum Seekers</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2114"><span class="views-label views-label-field-content-updated" data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2115"><time class="datetime" data-dcnode-id="2117" datetime="2020-07-06T12:00:00Z"><span data-dcnode-id="2118" instrument_node="">July 6, 2020</span></time><span data-dcnode-id="2116" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2111"><p class="field-content" data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">FAQs on the administration's issued two new rules: Removal of 30-Day Processing Provision for Asylum Applicant-Related Form I-765 Employment Authorization Applications and Asylum Application, Interview, and Employment Authorization for Applicants.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2104"><p class="field-content" data-dcnode-id="2105"><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum" hreflang="en"><span data-dcnode-id="2110" instrument_node="">Defensive Asylum</span></a><span data-dcnode-id="2108" instrument_node="">, </span><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2107" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2102" instrument_node="">
</span></div><span data-dcnode-id="2100" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-18" data-dcnode-id="2044"><span data-dcnode-id="2099" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="2085"><p class="field-content" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">On June 15, 2020, the Department of Homeland Security and the Executive Office for Immigration Review issued a Notice of Proposed Rulemaking, or NPRM, attempting to eliminate asylum for the most vulnerable of asylum seekers. This massive rule would essentially abolish the asylum system in violation of international and domestic law. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2078"><p class="field-content" data-dcnode-id="2079"><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2084" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2082" instrument_node="">, </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="2081" instrument_node="">Humanitarian Relief</span></a></p></div></div><span data-dcnode-id="2076" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2046" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2072"><p class="field-content bold-font" data-dcnode-id="2073"><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/practice-advisory-overcoming-asylum-one-year-filing-deadline-daca" hreflang="en"><span data-dcnode-id="2075" instrument_node="">Practice Advisory: Overcoming the Asylum One-Year Filing Deadline for DACA Recipients</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2065"><span class="views-label views-label-field-content-updated" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2066"><time class="datetime" data-dcnode-id="2068" datetime="2020-06-25T12:00:00Z"><span data-dcnode-id="2069" instrument_node="">June 25, 2020</span></time><span data-dcnode-id="2067" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2057"><p class="field-content" data-dcnode-id="2064"></p><p data-dcnode-id="2058"><span data-dcnode-id="2063" instrument_node="">The Supreme Court decision on June 18, 2020, in </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supremecourt.gov/opinions/19pdf/18-587_5ifl.pdf" target="_blank"><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Dep’t of Homeland Sec. v. Regents of the Univ. of California</span></em></a><span data-dcnode-id="2059" instrument_node=""> has given DACA recipients a reprieve from the Trump Administration’s efforts to end the program. Nonetheless, until Congress acts to provide permanent status for those with DACA, it is important for practitioners representing DACA recipients to consider permanent relief options in each DACA client’s case.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2047"><p class="field-content" data-dcnode-id="2048"><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2056" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2054" instrument_node="">, </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="2053" instrument_node="">Humanitarian Relief</span></a><span data-dcnode-id="2051" instrument_node="">, </span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief/deferred-action-childhood-arrivals" hreflang="en"><span data-dcnode-id="2050" instrument_node="">Deferred Action for Childhood Arrivals</span></a></p></div></div><span data-dcnode-id="2045" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="1971"><p class="field-content" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">CLINIC submitted comments on April 23, 2020, opposing the Department of Health and Human Services' Interim Final Rule, or IFR, outlining the procedure by which the Centers of Disease Control, or CDC, may "suspend the introduction of persons from designated countries or places, if required, in the interest of public health." CLINIC's comment calls upon the U.S. government to rescind this IFR and proclamation and end this unprecedented restriction on seeking asylum at the border.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1961"><p class="field-content" data-dcnode-id="1962"><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="1970" instrument_node="">Federal Administrative Advocacy</span></a><span data-dcnode-id="1968" instrument_node="">, </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1967" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="1965" instrument_node="">, </span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="1964" instrument_node="">Humanitarian Relief</span></a></p></div></div><span data-dcnode-id="1959" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="1945"><p class="field-content" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">The Board of Immigration Appeals issued a decision where it concluded that an asylum seeker’s willingness or reluctance to accept an offer for permanent residence does not negate a firm resettlement finding.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1932"><p class="field-content" data-dcnode-id="1933"><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1944" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="1942" instrument_node="">, </span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/appeals/board-immigration-appeals" hreflang="en"><span data-dcnode-id="1941" instrument_node="">Board of Immigration Appeals</span></a><span data-dcnode-id="1939" instrument_node="">, </span><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="1938" instrument_node="">Humanitarian Relief</span></a><span data-dcnode-id="1936" instrument_node="">, </span><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="1935" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="1930" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="1913"><p class="field-content" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">An immigration judge may issue an in absentia removal order if the Department of Homeland Security establishes by clear, unequivocal and convincing evidence that the respondent had written notice of the hearing and is removable as charged on the Notice to Appear. There are many reasons why a respondent may fail to appear at a removal hearing, including lack of notice of the hearing, sickness, a breakdown in transportation, limited or no English knowledge, or because the respondent is a child without the help of a responsible adult who can assist them in getting to the hearing.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1900"><p class="field-content" data-dcnode-id="1901"><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/freedom-information-act" hreflang="en"><span data-dcnode-id="1912" instrument_node="">Freedom of Information Act</span></a><span data-dcnode-id="1910" instrument_node="">, </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="1909" instrument_node="">Removal Proceedings</span></a><span data-dcnode-id="1907" instrument_node="">, </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/childrens-issues" hreflang="en"><span data-dcnode-id="1906" instrument_node="">Children's Issues</span></a><span data-dcnode-id="1904" instrument_node="">, </span><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1903" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1898" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="1876"><p class="field-content" data-dcnode-id="1886"></p><p data-dcnode-id="1882"><span data-dcnode-id="1885" instrument_node="">The Mercer Law School Immigration Appeals Clinic filed an amicus brief on CLINIC’s behalf on March 11, 2020. The amicus brief lays out how the particular social group of “Honduran transgender women” meets the three-prong test laid out in </span><i data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Matter of M-E-V-G-.</span></i></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Update: After submission of this, and other amicus briefs, the Department of Homeland Security stipulated to remand the case to the immigration judge.</span></p><span data-dcnode-id="1878" instrument_node="">
