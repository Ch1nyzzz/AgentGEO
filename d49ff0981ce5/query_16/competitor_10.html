</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2915" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2933"><p class="field-content bold-font" data-dcnode-id="2934"><a data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/dhs-and-doj-issue-interim-final-rule-credible-fear-screenings-and" hreflang="en"><span data-dcnode-id="2936" instrument_node="">DHS and DOJ Issue Interim Final Rule on Credible Fear Screenings and Consideration of Asylum Claims by USCIS Officers </span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2926"><span class="views-label views-label-field-content-updated" data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2927"><time class="datetime" data-dcnode-id="2929" datetime="2022-04-21T12:00:00Z"><span data-dcnode-id="2930" instrument_node="">April 21, 2022</span></time><span data-dcnode-id="2928" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2923"><p class="field-content" data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">The Department of Homeland Security and Department of Justice jointly issued an interim final rule to revise the processing of certain applications for asylum, withholding of removal under the Immigration and Nationality Act, and protection under the Convention Against Torture. The rule makes numerous changes to the way asylum applications are processed for those in expedited removal proceedings who express a fear of return and pass a credible fear interview.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2916"><p class="field-content" data-dcnode-id="2917"><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2922" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2920" instrument_node="">, </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2919" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="2914" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2890" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2910"><p class="field-content bold-font" data-dcnode-id="2911"><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/toolkits/assistance-afghans" hreflang="en"><span data-dcnode-id="2913" instrument_node="">Assistance for Afghans Toolkit</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2903"><span class="views-label views-label-field-content-updated" data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2904"><time class="datetime" data-dcnode-id="2906" datetime="2022-01-28T12:00:00Z"><span data-dcnode-id="2907" instrument_node="">January 28, 2022</span></time><span data-dcnode-id="2905" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2898"><p class="field-content" data-dcnode-id="2902"></p><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Tens of thousands of Afghan citizens have been evacuated from Afghanistan and are present in the United States. The majority were paroled into the United States and have a two year, temporary status. Refugee resettlement agencies and other community organizations are helping them secure access to housing, employment, food, cash and medical assistance programs. Other nonprofit agencies are providing immigration-related assistance, such as filing for humanitarian parole, Special Immigrant Visa, or SIV,&nbsp;status, asylum, family-based visas, and employment authorization.</span></p><p data-dcnode-id="2899"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2891"><p class="field-content" data-dcnode-id="2892"><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2897" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2895" instrument_node="">, </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="2894" instrument_node="">Humanitarian Relief</span></a></p></div></div><span data-dcnode-id="2889" instrument_node="">
</span></div><span data-dcnode-id="2887" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-2" data-dcnode-id="2839"><span data-dcnode-id="2886" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2861" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2882"><p class="field-content bold-font" data-dcnode-id="2883"><a data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/eoir-policy-manual-part-ii-immigration-court-practice-manual" hreflang="en"><span data-dcnode-id="2885" instrument_node="">EOIR Policy Manual Part II – Immigration Court Practice Manual Revisions Comparison Table</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2875"><span class="views-label views-label-field-content-updated" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2876"><time class="datetime" data-dcnode-id="2878" datetime="2021-12-23T12:00:00Z"><span data-dcnode-id="2879" instrument_node="">December 23, 2021</span></time><span data-dcnode-id="2877" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2869"><p class="field-content" data-dcnode-id="2874"></p><p data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">EOIR published the Immigration Court Practice Manual, or ICPM, — a comprehensive guide that sets forth uniform procedures, recommendations,&nbsp;and requirements for practice before the Immigration Courts — in February 2008. Since then, the ICPM has seen many updates, but no update was as comprehensive as the update produced on Nov. 20, 2020, and released on Dec. 31, 2020. This resource briefly summarizes some of the key changes via a chart comparing the current version with the prior version of the ICPM.</span></p><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2870"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2862"><p class="field-content" data-dcnode-id="2863"><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2868" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2866" instrument_node="">, </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2865" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="2860" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2841" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2856"><p class="field-content bold-font" data-dcnode-id="2857"><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/reminder-mendez-rojas-asylum-one-year-filing-deadline-approaching" hreflang="en"><span data-dcnode-id="2859" instrument_node="">Reminder: Mendez-Rojas Asylum One-Year Filing Deadline Approaching</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2849"><span class="views-label views-label-field-content-updated" data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2850"><time class="datetime" data-dcnode-id="2852" datetime="2021-12-17T12:00:00Z"><span data-dcnode-id="2853" instrument_node="">December 17, 2021</span></time><span data-dcnode-id="2851" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2846"><p class="field-content" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Asylum seekers who entered the United States at the southern border and who were not apprised of the one year filing deadline for asylum may be class members in the litigation Mendez Rojas v. Wolf. The deadline to claim class membership and benefit from the settlement in the case is April 22, 2022. Advocates should be aware of this deadline and ensuring that any clients or prospective clients comply with the settlement requirements.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2842"><p class="field-content" data-dcnode-id="2843"><a data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2845" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2840" instrument_node="">
</span></div><span data-dcnode-id="2838" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-3" data-dcnode-id="2788"><span data-dcnode-id="2837" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2813" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2833"><p class="field-content bold-font" data-dcnode-id="2834"><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/credible-fear-lesson-plans-comparison-chart" hreflang="en"><span data-dcnode-id="2836" instrument_node="">Credible Fear Lesson Plans Comparison Chart</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2826"><span class="views-label views-label-field-content-updated" data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2827"><time class="datetime" data-dcnode-id="2829" datetime="2021-11-03T12:00:00Z"><span data-dcnode-id="2830" instrument_node="">November 3, 2021</span></time><span data-dcnode-id="2828" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2821"><p class="field-content" data-dcnode-id="2825"></p><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">The USCIS Asylum Office’s Credible Fear Lesson Plan is designed to train asylum officers and set forth standards to be followed when conducting credible fear interviews. CLINIC analyzed changes to the 2019 USCIS Asylum Office’s Credible Fear Lesson Plan and added them to a comparison chart AILA had previously created outlining changes among the 2006, 2014&nbsp;and 2017 Lesson Plans. The comparison chart includes analysis from all three lesson plans with a summary of the 2019 changes.</span></p><p data-dcnode-id="2822"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2814"><p class="field-content" data-dcnode-id="2815"><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2820" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2818" instrument_node="">, </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/credible-fear-and-reasonable-fear" hreflang="en"><span data-dcnode-id="2817" instrument_node="">Credible Fear and Reasonable Fear</span></a></p></div></div><span data-dcnode-id="2812" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2790" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2808"><p class="field-content bold-font" data-dcnode-id="2809"><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/matter-l-e" hreflang="en"><span data-dcnode-id="2811" instrument_node="">Matter of L-E-A- </span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2801"><span class="views-label views-label-field-content-updated" data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2802"><time class="datetime" data-dcnode-id="2804" datetime="2021-11-03T12:00:00Z"><span data-dcnode-id="2805" instrument_node="">November 3, 2021</span></time><span data-dcnode-id="2803" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2798"><p class="field-content" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">CLINIC is counsel in the case of Matter of L-E-A-. On June 16, 2021, the Attorney General issued a decision, Matter of L-E-A- III, 28 I&amp;N Dec. 304 (AG 2021), vacating Matter of L-E-A-II, 27 I&amp;N Dec. 581 (A.G. 2019. L-E-A- II had held that the family is not inherently socially distinct and overruled the finding in L-E-A- I, 27 I&amp;N Dec. 40 (BIA 2017) that Mr. L-E-A-’s father’s immediate family could be a particular social group. We continue to represent Mr. L-E-A- on his case and to advocate for asylum seekers to have the right to seek asylum based on harm they fear on account of their family group membership.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2791"><p class="field-content" data-dcnode-id="2792"><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2797" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2795" instrument_node="">, </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2794" instrument_node="">Litigation</span></a></p></div></div><span data-dcnode-id="2789" instrument_node="">
</span></div><span data-dcnode-id="2787" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-4" data-dcnode-id="2736"><span data-dcnode-id="2786" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2761" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2782"><p class="field-content bold-font" data-dcnode-id="2783"><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/outdated-practice-pointer-matter-l-e" hreflang="en"><span data-dcnode-id="2785" instrument_node="">OUTDATED: Practice Pointer: Matter of L-E-A-</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2775"><span class="views-label views-label-field-content-updated" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2776"><time class="datetime" data-dcnode-id="2778" datetime="2021-11-02T12:00:00Z"><span data-dcnode-id="2779" instrument_node="">November 2, 2021</span></time><span data-dcnode-id="2777" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2772"><p class="field-content" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">On July 29, 2019, the attorney general issued a decision, Matter of L-E-A-II, 27 I&amp;N Dec. 581 (A.G. 2019), which held that the family is not inherently socially distinct and overruled the finding in L-E-A- I, 27 I&amp;N Dec. 40 (BIA 2017) that Mr. L-E-A-’s father’s immediate family could be a particular social group. CLINIC issued this Practice Pointer shortly after Matter of L-E-A-II, providing suggestions for practitioners on how to frame asylum claims involving family-based particular social groups in light of the attorney general’s decision. On June 16, 2021, Attorney General Garland issued a decision, Matter of L-E-A- III, 28 I&amp;N Dec. 304 (AG 2021), vacating Matter of L-E-A-II.

CLINIC is leaving this Practice Pointer on our website because it provides a good overview of federal court precedent involving family-based claims, but practitioners should be aware that Matter of L-E-A-II is no longer in effect and the Practice Pointer has not been updated to reflect Matter of L-E-A-III. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2762"><p class="field-content" data-dcnode-id="2763"><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2771" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2769" instrument_node="">, </span><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2768" instrument_node="">Litigation</span></a><span data-dcnode-id="2766" instrument_node="">, </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/family-separation" hreflang="en"><span data-dcnode-id="2765" instrument_node="">Family Separation</span></a></p></div></div><span data-dcnode-id="2760" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2738" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2756"><p class="field-content bold-font" data-dcnode-id="2757"><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-submits-comments-proposed-rule-would-deny-asylum-seekers" hreflang="en"><span data-dcnode-id="2759" instrument_node="">CLINIC Submits Comments on Proposed Rule That Would Deny Asylum Seekers a Day in Court</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2749"><span class="views-label views-label-field-content-updated" data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2750"><time class="datetime" data-dcnode-id="2752" datetime="2021-11-01T12:00:00Z"><span data-dcnode-id="2753" instrument_node="">November 1, 2021</span></time><span data-dcnode-id="2751" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2746"><p class="field-content" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">On Oct. 18, 2021, CLINIC submitted comments largely opposing a proposed rule that would authorize asylum officers to hear cases of asylum seekers who pass credible fear interviews, rather than having their cases referred directly to an immigration judge. While CLINIC does not object to asylum officers hearing these cases, under the proposed rule, immigration judges would merely review a transcript of that interview in most cases where the asylum officer does not grant asylum, rather than conducting a full hearing. CLINIC strongly objects to any changes in asylum procedures that would allow asylum seekers to be removed without having the due process protections of a full immigration court hearing first. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2739"><p class="field-content" data-dcnode-id="2740"><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2745" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2743" instrument_node="">, </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="2742" instrument_node="">Federal Administrative Advocacy</span></a></p></div></div><span data-dcnode-id="2737" instrument_node="">
</span></div><span data-dcnode-id="2735" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-5" data-dcnode-id="2690"><span data-dcnode-id="2734" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2712" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2730"><p class="field-content bold-font" data-dcnode-id="2731"><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/sap-v-garland" hreflang="en"><span data-dcnode-id="2733" instrument_node="">S.A.P v. Garland</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2723"><span class="views-label views-label-field-content-updated" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2724"><time class="datetime" data-dcnode-id="2726" datetime="2021-10-28T12:00:00Z"><span data-dcnode-id="2727" instrument_node="">October 28, 2021</span></time><span data-dcnode-id="2725" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2720"><p class="field-content" data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">CLINIC filed suit on Nov. 22, 2019, to enjoin the implementation of Matter of L-E-A-II, 27 I&amp;N Dec. 581 (A.G. 2019) in credible fear interviews. This suit was filed on behalf of thirteen plaintiffs whose credible fear interviews were denied despite having testified to fear of harm in their home country on the basis of a family connection. Plaintiffs are seeking declaratory and injunctive relief, including an order enjoining the application of guidance based on L-E-A- II to credible and reasonable fear interviews.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2713"><p class="field-content" data-dcnode-id="2714"><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2719" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2717" instrument_node="">, </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="2716" instrument_node="">Litigation</span></a></p></div></div><span data-dcnode-id="2711" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2692" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2707"><p class="field-content bold-font" data-dcnode-id="2708"><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/central-american-family-law-codes" hreflang="en"><span data-dcnode-id="2710" instrument_node="">Central American Family Law Codes</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2700"><span class="views-label views-label-field-content-updated" data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2701"><time class="datetime" data-dcnode-id="2703" datetime="2021-10-22T12:00:00Z"><span data-dcnode-id="2704" instrument_node="">October 22, 2021</span></time><span data-dcnode-id="2702" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2697"><p class="field-content" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">CLINIC has played a key role in fighting against constraints placed on asylum seekers. After the attorney general issued Matter of L-E-A-II, 27 I&amp;N Dec. 581 (AG 2019), which has subsequently been vacated by Matter of L-E-A- III, 28 I&amp;N Dec. 304 (AG 2021), it became more difficult to prove that a family group membership could qualify as a particular social group. To assist with this evidentiary burden, CLINIC has translated Title II of the Salvadoran Civil Code entitled “Rules Relative to Intestate Succession,” which may help practitioners establish a cognizable family-based particular social group on behalf of Salvadoran clients. Likewise, CLINIC has translated sections of the Guatemalan Civil Code pertaining to family law. While Matter of L-E-A-II is no longer in effect, understanding the law that governs family relationships can still help prove social distinction for particular social group asylum claims and may be of value for family-based immigration petitions.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2693"><p class="field-content" data-dcnode-id="2694"><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2696" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2691" instrument_node="">
</span></div><span data-dcnode-id="2689" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-6" data-dcnode-id="2641"><span data-dcnode-id="2688" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2669" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2684"><p class="field-content bold-font" data-dcnode-id="2685"><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/guide-client-documentation-and-benefits-afghan-parolees" hreflang="en"><span data-dcnode-id="2687" instrument_node="">Guide to Client Documentation and Benefits for Afghan Parolees</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2677"><span class="views-label views-label-field-content-updated" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2678"><time class="datetime" data-dcnode-id="2680" datetime="2021-10-13T12:00:00Z"><span data-dcnode-id="2681" instrument_node="">October 13, 2021</span></time><span data-dcnode-id="2679" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2674"><p class="field-content" data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">This document guide provides information and samples of the type of documents that Afghan parolees may be issued by DHS. It explains what resettlement agencies should look for when determining an Afghan parolee’s eligibility for resettlement benefits as well what immigration practitioner should look for when determining an Afghan parolee’s eligibility for asylum or permanent residence in the United States.

</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2670"><p class="field-content" data-dcnode-id="2671"><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2673" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2668" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="2654"><p class="field-content" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">This fact sheet provides a brief overview of how practitioners can navigate immigration court proceedings for unaccompanied child clients pursuing initial asylum jurisdiction with U.S. Citizenship and Immigration Services.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2644"><p class="field-content" data-dcnode-id="2645"><a data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2653" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="2651" instrument_node="">, </span><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/childrens-issues/unaccompanied-children" hreflang="en"><span data-dcnode-id="2650" instrument_node="">Unaccompanied Children</span></a><span data-dcnode-id="2648" instrument_node="">, </span><a data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="2647" instrument_node="">Removal Proceedings</span></a></p></div></div><span data-dcnode-id="2642" instrument_node="">

</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="2620" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2635"><p class="field-content bold-font" data-dcnode-id="2636"><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/frequently-asked-questions-form-i-134" hreflang="en"><span data-dcnode-id="2638" instrument_node="">Frequently Asked Questions: Form I-134</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2628"><span class="views-label views-label-field-content-updated" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2629"><time class="datetime" data-dcnode-id="2631" datetime="2021-09-28T12:00:00Z"><span data-dcnode-id="2632" instrument_node="">September 28, 2021</span></time><span data-dcnode-id="2630" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2625"><p class="field-content" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">These FAQs help practitioners and potential sponsors understand the requirements for a financial sponsor for humanitarian parole. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2621"><p class="field-content" data-dcnode-id="2622"><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2624" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2619" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="2600" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="2615"><p class="field-content bold-font" data-dcnode-id="2616"><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/frequently-asked-questions-eligibility-adjust-if-started-consular" hreflang="en"><span data-dcnode-id="2618" instrument_node="">Frequently Asked Questions: Eligibility to Adjust if Started with Consular Processing</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="2608"><span class="views-label views-label-field-content-updated" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="2609"><time class="datetime" data-dcnode-id="2611" datetime="2021-09-28T12:00:00Z"><span data-dcnode-id="2612" instrument_node="">September 28, 2021</span></time><span data-dcnode-id="2610" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="2605"><p class="field-content" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">These FAQs address the legal requirements for an applicant to be eligible for adjustment of status in both the immediate relative and preference categories. </span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="2601"><p class="field-content" data-dcnode-id="2602"><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="2604" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="2599" instrument_node="">
