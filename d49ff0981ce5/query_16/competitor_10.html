</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1830" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1854"><p class="field-content bold-font" data-dcnode-id="1855"><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/clinic-joins-amicus-brief-support-asylum-seekers-border-al-otro" hreflang="en"><span data-dcnode-id="1857" instrument_node="">CLINIC Joins Amicus Brief in Support of Asylum Seekers at the Border, Al Otro Lado v. Wolf</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1847"><span class="views-label views-label-field-content-updated" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1848"><time class="datetime" data-dcnode-id="1850" datetime="2020-02-11T12:00:00Z"><span data-dcnode-id="1851" instrument_node="">February 11, 2020</span></time><span data-dcnode-id="1849" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1844"><p class="field-content" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">CLINIC joined with 17 other organizations that serve asylum seekers to urge the Ninth Circuit to uphold a preliminary injunction in favor of asylum seekers affected by Customs and Border Protection’s (CBP) so-called “metering” policy.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1831"><p class="field-content" data-dcnode-id="1832"><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1843" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="1841" instrument_node="">, </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="1840" instrument_node="">Litigation</span></a><span data-dcnode-id="1838" instrument_node="">, </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/border-issues" hreflang="en"><span data-dcnode-id="1837" instrument_node="">Border Issues</span></a><span data-dcnode-id="1835" instrument_node="">, </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="1834" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="1829" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1801" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1825"><p class="field-content bold-font" data-dcnode-id="1826"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum/clinic-comment-criminal-bars-asylum" hreflang="en"><span data-dcnode-id="1828" instrument_node="">CLINIC Comment Criminal Bars to Asylum</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1818"><span class="views-label views-label-field-content-updated" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1819"><time class="datetime" data-dcnode-id="1821" datetime="2020-01-22T12:00:00Z"><span data-dcnode-id="1822" instrument_node="">January 22, 2020</span></time><span data-dcnode-id="1820" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1812"><p class="field-content" data-dcnode-id="1817"></p><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">On Jan. 21, 2020, CLINIC submitted a public comment opposing the proposed rule to create additional criminal bars to asylum. CLINIC opposes this rule because it expands the categorical bars to asylum to include minor offenses and alleged criminal conduct, without consideration of proportionality. In our comment, CLINIC describes how the proposed rule is contrary to our obligations under the United Nations Refugee Convention, and how its implementation will result in the separation of families and the wrongful return of asylum seekers to harm.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1813"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1802"><p class="field-content" data-dcnode-id="1803"><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum" hreflang="en"><span data-dcnode-id="1811" instrument_node="">Defensive Asylum</span></a><span data-dcnode-id="1809" instrument_node="">, </span><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1808" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="1806" instrument_node="">, </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="1805" instrument_node="">Federal Administrative Advocacy</span></a></p></div></div><span data-dcnode-id="1800" instrument_node="">
</span></div><span data-dcnode-id="1798" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-23" data-dcnode-id="1745"><span data-dcnode-id="1797" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1771" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1793"><p class="field-content bold-font" data-dcnode-id="1794"><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum/clinic-comment-asylum-employment-authorization" hreflang="en"><span data-dcnode-id="1796" instrument_node="">CLINIC Comment Asylum Employment Authorization Document (EAD)</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1786"><span class="views-label views-label-field-content-updated" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1787"><time class="datetime" data-dcnode-id="1789" datetime="2020-01-22T12:00:00Z"><span data-dcnode-id="1790" instrument_node="">January 22, 2020</span></time><span data-dcnode-id="1788" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1782"><p class="field-content" data-dcnode-id="1785"></p><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">CLINIC submitted comments on January 13, 2020 strongly opposing proposed regulations which will impose new limitations on asylum seekers’ ability to obtain an employment authorization document (EAD) while their asylum applications are pending.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1772"><p class="field-content" data-dcnode-id="1773"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum" hreflang="en"><span data-dcnode-id="1781" instrument_node="">Defensive Asylum</span></a><span data-dcnode-id="1779" instrument_node="">, </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1778" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="1776" instrument_node="">, </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="1775" instrument_node="">Federal Administrative Advocacy</span></a></p></div></div><span data-dcnode-id="1770" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1747" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1766"><p class="field-content bold-font" data-dcnode-id="1767"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy/clinic-submits-comments-asylum-cooperative-agreement" hreflang="en"><span data-dcnode-id="1769" instrument_node="">CLINIC Submits Comments on “Asylum Cooperative Agreement” Interim Final Regulations</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1759"><span class="views-label views-label-field-content-updated" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1760"><time class="datetime" data-dcnode-id="1762" datetime="2019-12-20T12:00:00Z"><span data-dcnode-id="1763" instrument_node="">December 20, 2019</span></time><span data-dcnode-id="1761" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1755"><p class="field-content" data-dcnode-id="1758"></p><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">CLINIC submitted comments on an Interim Final Regulation issued by the Department of Homeland Security (DHS) and the Department of Justice (DOJ) that allows the United States to send asylum seekers at the southern border to countries with which the United States has entered into “asylum cooperative agreements.” These countries—Guatemala, Honduras, and El Salvador—are among the most dangerous countries in the Western Hemisphere and do not have government infrastructure to handle thousands of additional asylum claims.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1748"><p class="field-content" data-dcnode-id="1749"><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="1754" instrument_node="">Federal Administrative Advocacy</span></a><span data-dcnode-id="1752" instrument_node="">, </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1751" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1746" instrument_node="">
</span></div><span data-dcnode-id="1744" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-24" data-dcnode-id="1696"><span data-dcnode-id="1743" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1720" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1739"><p class="field-content bold-font" data-dcnode-id="1740"><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy/clinic-submits-comment-opposing-proposed-elimination-30" hreflang="en"><span data-dcnode-id="1742" instrument_node="">CLINIC Submits Comment Opposing the Proposed Elimination of the 30-Day Processing Requirement for Asylum Applicants’ Initial Applications for Employment Authorization</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1732"><span class="views-label views-label-field-content-updated" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1733"><time class="datetime" data-dcnode-id="1735" datetime="2019-11-05T12:00:00Z"><span data-dcnode-id="1736" instrument_node="">November 5, 2019</span></time><span data-dcnode-id="1734" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1728"><p class="field-content" data-dcnode-id="1731"></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">CLINIC submitted comments in response to the Department of Homeland Security’s (DHS) proposed regulation entitled “Removal of 30-Day Processing Provision for Asylum Seekers’ Initial &nbsp;Employment Authorization Document Applications,” DHS Docket No. USCIS-2018-0001, RIN 1615-AC19. In this proposed regulation, which was posted on Sept. 9, 2019, DHS seeks to eliminate the rule, which requires it to process initial employment authorization documents (EADs) for asylum applicants within 30 days.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1721"><p class="field-content" data-dcnode-id="1722"><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="1727" instrument_node="">Federal Administrative Advocacy</span></a><span data-dcnode-id="1725" instrument_node="">, </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1724" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1719" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1698" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1715"><p class="field-content bold-font" data-dcnode-id="1716"><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/i-730-refugeeasylee-family-reunification-practice-manual" hreflang="en"><span data-dcnode-id="1718" instrument_node="">I-730 Refugee/Asylee Family Reunification Practice Manual</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1708"><span class="views-label views-label-field-content-updated" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1709"><time class="datetime" data-dcnode-id="1711" datetime="2019-10-29T12:00:00Z"><span data-dcnode-id="1712" instrument_node="">October 29, 2019</span></time><span data-dcnode-id="1710" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1703"><p class="field-content" data-dcnode-id="1707"></p><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">This manual is designed to assist attorneys and accredited representatives in representing asylees and refugees to reunify with family members and seek lawful status for family already in the United States. The manual gives an overview of applicable laws, regulations, and guidance concerning the I-730 petition process. It also provides practical information on how to navigate the application process from completing the form I-730, to compiling evidence, to troubleshooting with government agencies.</span></p><p data-dcnode-id="1704"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1699"><p class="field-content" data-dcnode-id="1700"><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1702" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-25" data-dcnode-id="1645"><span data-dcnode-id="1694" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1668" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1690"><p class="field-content bold-font" data-dcnode-id="1691"><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/state-and-local/executive-order-13888-enhancing-state-and-local-involvement-refugee" hreflang="en"><span data-dcnode-id="1693" instrument_node="">Executive Order 13888: Enhancing State and Local Involvement in Refugee Resettlement</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1683"><span class="views-label views-label-field-content-updated" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1684"><time class="datetime" data-dcnode-id="1686" datetime="2019-10-02T12:00:00Z"><span data-dcnode-id="1687" instrument_node="">October 2, 2019</span></time><span data-dcnode-id="1685" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1676"><p class="field-content" data-dcnode-id="1682"></p><p data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node="">President Trump issued an Executive Order13888 on&nbsp;</span><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/documents/2019/10/01/2019-21505/enhancing-state-and-local-involvement-in-refugee-resettlement" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1680" instrument_node="">Enhancing State and Local Involvement in Refugee Resettlement</span></a><span data-dcnode-id="1678" instrument_node="">, or the “Executive Order”,&nbsp;on Sept. 26 that will allow states and localities to restrict the resettlement of refugee in their areas.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1669"><p class="field-content" data-dcnode-id="1670"><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/state-and-local" hreflang="en"><span data-dcnode-id="1675" instrument_node="">State and Local</span></a><span data-dcnode-id="1673" instrument_node="">, </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1672" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1667" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1647" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1663"><p class="field-content bold-font" data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/recent-updates-administrations-assault-asylum" hreflang="en"><span data-dcnode-id="1666" instrument_node="">Recent Updates on the Administration’s Assault on Asylum</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1656"><span class="views-label views-label-field-content-updated" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1657"><time class="datetime" data-dcnode-id="1659" datetime="2019-09-30T12:00:00Z"><span data-dcnode-id="1660" instrument_node="">September 30, 2019</span></time><span data-dcnode-id="1658" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1652"><p class="field-content" data-dcnode-id="1655"></p><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">In a continued assault on U.S. asylum protections, the Trump administration has recently issued a number of new regulations and policies aimed at barring or restricting asylum eligibility for most asylum seekers. This article summarizes and provides updates on eight such efforts from the Trump administration: (1) the July 2019 third country transit bar; (2) the November 2018 asylum ban; (3) the attorney general’s July 2019 decision purporting to restrict asylum claims based on family membership; (4) the U.S.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1648"><p class="field-content" data-dcnode-id="1649"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1651" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1646" instrument_node="">
</span></div><span data-dcnode-id="1644" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-26" data-dcnode-id="1596"><span data-dcnode-id="1643" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1618" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1639"><p class="field-content bold-font" data-dcnode-id="1640"><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy/260-faith-organizations-and-leaders-deliver-joint-public" hreflang="en"><span data-dcnode-id="1642" instrument_node="">260 faith organizations and leaders deliver joint public comment opposing latest asylum ban</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1632"><span class="views-label views-label-field-content-updated" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1633"><time class="datetime" data-dcnode-id="1635" datetime="2019-08-15T12:00:00Z"><span data-dcnode-id="1636" instrument_node="">August 15, 2019</span></time><span data-dcnode-id="1634" instrument_node="">

</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1082" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1105"><p class="field-content bold-font" data-dcnode-id="1106"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/denied-day-court-governments-use-absentia-removal-orders-against" hreflang="en"><span data-dcnode-id="1108" instrument_node="">Denied a Day in Court: The Government’s Use of In Absentia Removal Orders Against Families Seeking Asylum</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1098"><span class="views-label views-label-field-content-updated" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1099"><time class="datetime" data-dcnode-id="1101" datetime="2019-03-24T12:00:00Z"><span data-dcnode-id="1102" instrument_node="">March 24, 2019</span></time><span data-dcnode-id="1100" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1090"><p class="field-content" data-dcnode-id="1097"></p><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">The U.S. government has issued in </span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">absentia</span></em><span data-dcnode-id="1093" instrument_node=""> removal orders to a large number of families primarily from El Salvador, Guatemala and Honduras. These families fled persecution and sought safety in the United States often proving they had a credible fear of returning to their home country.</span></p><p data-dcnode-id="1091"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1083"><p class="field-content" data-dcnode-id="1084"><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings" hreflang="en"><span data-dcnode-id="1089" instrument_node="">Removal Proceedings</span></a><span data-dcnode-id="1087" instrument_node="">, </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1086" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1081" instrument_node="">
</span></div><span data-dcnode-id="1079" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-39" data-dcnode-id="1021"><span data-dcnode-id="1078" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="1049" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1074"><p class="field-content bold-font" data-dcnode-id="1075"><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/brief-amici-curiae-clinic-et-al" hreflang="en"><span data-dcnode-id="1077" instrument_node="">Brief of Amici Curiae CLINIC Et. Al</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1067"><span class="views-label views-label-field-content-updated" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1068"><time class="datetime" data-dcnode-id="1070" datetime="2019-03-13T12:00:00Z"><span data-dcnode-id="1071" instrument_node="">March 13, 2019</span></time><span data-dcnode-id="1069" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1057"><p class="field-content" data-dcnode-id="1066"></p><p data-dcnode-id="1058"><span data-dcnode-id="1065" instrument_node="">On March 12, 2019 CLINIC, joined by other faith-based organizations, submitted an amicus brief to the First Circuit Court of Appeals in the case&nbsp;</span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">O.L.B.D. v. Barr</span></em><span data-dcnode-id="1062" instrument_node="">. In this case, Ms. O.L.B.D., a survivor of severe physical, sexual, and emotional abuse by her ex-husband, appeals the Board of Immigration Appeals denial of her asylum claim. The case presents a direct challenge to&nbsp;</span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Matter of A-B-</span></em><span data-dcnode-id="1059" instrument_node="">, 27 I&amp;N Dec. 316 (A.G. 2018), the decision Jeff Sessions issued last summer which sought to greatly limit asylum eligibility for survivors of domestic violence and gang violence.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1050"><p class="field-content" data-dcnode-id="1051"><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="1056" instrument_node="">Litigation</span></a><span data-dcnode-id="1054" instrument_node="">, </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1053" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1048" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="1023" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1044"><p class="field-content bold-font" data-dcnode-id="1045"><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/matter-l-e-brief" hreflang="en"><span data-dcnode-id="1047" instrument_node="">Matter of L-E-A- Brief</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1037"><span class="views-label views-label-field-content-updated" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1038"><time class="datetime" data-dcnode-id="1040" datetime="2019-02-19T12:00:00Z"><span data-dcnode-id="1041" instrument_node="">February 19, 2019</span></time><span data-dcnode-id="1039" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1031"><p class="field-content" data-dcnode-id="1036"></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">As co-counsel to Mr. L-E-A-, CLINIC attorneys filed this brief with the Justice Department on Feb. 19, 2019. The client’s name and other identifying information has been redacted.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1032"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="1024"><p class="field-content" data-dcnode-id="1025"><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="1030" instrument_node="">Litigation</span></a><span data-dcnode-id="1028" instrument_node="">, </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="1027" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-40" data-dcnode-id="965"><span data-dcnode-id="1019" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="995" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="1015"><p class="field-content bold-font" data-dcnode-id="1016"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/analysis-dhs-issues-remain-mexico-policy-and-guidance" hreflang="en"><span data-dcnode-id="1018" instrument_node="">Analysis: DHS Issues Remain in Mexico Policy and Guidance</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="1008"><span class="views-label views-label-field-content-updated" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="1009"><time class="datetime" data-dcnode-id="1011" datetime="2019-01-31T12:00:00Z"><span data-dcnode-id="1012" instrument_node="">January 31, 2019</span></time><span data-dcnode-id="1010" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="1000"><p class="field-content" data-dcnode-id="1007"></p><p data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">The Department of Homeland Security, or DHS, released its new&nbsp;</span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/news/2019/01/24/migrant-protection-protocols" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1005" instrument_node="">Migrant Protection Protocols, or Remain in Mexico Policy</span></a><span data-dcnode-id="1003" instrument_node="">, on Jan. 24. The new policy sets out procedures to return asylum-seekers to Mexico to wait while their asylum case is pending in the U.S. immigration court system. There are still many unanswered questions about this effort to thwart asylum seekers, but this is what we know so far.</span></p><p data-dcnode-id="1001"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="996"><p class="field-content" data-dcnode-id="997"><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="999" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="994" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="967" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="990"><p class="field-content bold-font" data-dcnode-id="991"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/new-government-guidance-matter-b-incorporates-grace-v-whitaker" hreflang="en"><span data-dcnode-id="993" instrument_node="">New Government Guidance on Matter of A-B-Incorporates Grace v. Whitaker</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="983"><span class="views-label views-label-field-content-updated" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="984"><time class="datetime" data-dcnode-id="986" datetime="2019-01-28T12:00:00Z"><span data-dcnode-id="987" instrument_node="">January 28, 2019</span></time><span data-dcnode-id="985" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="975"><p class="field-content" data-dcnode-id="982"></p><p data-dcnode-id="976"><span data-dcnode-id="981" instrument_node="">The government recently issued two parallel guidance memos following a decision by District Court Judge Emmet Sullivan in&nbsp;</span><em data-dcnode-id="978"><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/cases/grace-v-whitaker%3Fredirect%3Dcases/grace-v-sessions" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="980" instrument_node="">Grace v. Whitaker</span></a></em><span data-dcnode-id="977" instrument_node="">.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="968"><p class="field-content" data-dcnode-id="969"><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="974" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="972" instrument_node="">, </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/credible-fear-and-reasonable-fear" hreflang="en"><span data-dcnode-id="971" instrument_node="">Credible Fear and Reasonable Fear</span></a></p></div></div><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-41" data-dcnode-id="915"><span data-dcnode-id="963" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="943" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="959"><p class="field-content bold-font" data-dcnode-id="960"><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/crossing-line-ground-report-humanitarian-crisis-tijuana" hreflang="en"><span data-dcnode-id="962" instrument_node="">Crossing the Line: On-the-Ground Report on the Humanitarian Crisis in Tijuana</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="952"><span class="views-label views-label-field-content-updated" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="953"><time class="datetime" data-dcnode-id="955" datetime="2019-01-28T12:00:00Z"><span data-dcnode-id="956" instrument_node="">January 28, 2019</span></time><span data-dcnode-id="954" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="948"><p class="field-content" data-dcnode-id="951"></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">U.S. Customs and Border Protection (CBP) shut its doors at the San Ysidro port of entry in mid-Novemeber of 2018, claiming that U.S. Citizenship and Immigration Services (USCIS) lacked the capacity to process fear claims in light of the arrival of the Central American migrant caravan. The “Exodus” members – more than 5,000 Hondurans, Salvadorans and Guatemalans — were greeted with hostility and ad hoc restrictions that prevented their ability to seek asylum. This has created a two-month long bottleneck at the U.S.-Mexico border, a humanitarian crisis and a watershed moment in U.S.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="944"><p class="field-content" data-dcnode-id="945"><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="947" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="942" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="917" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="938"><p class="field-content bold-font" data-dcnode-id="939"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy/more-150-organizations-submit-joint-public-comment" hreflang="en"><span data-dcnode-id="941" instrument_node="">More than 150 Organizations Submit a Joint Public Comment Denouncing the Illegal Asylum Ban</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="931"><span class="views-label views-label-field-content-updated" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="932"><time class="datetime" data-dcnode-id="934" datetime="2019-01-09T12:00:00Z"><span data-dcnode-id="935" instrument_node="">January 9, 2019</span></time><span data-dcnode-id="933" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="925"><p class="field-content" data-dcnode-id="930"></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">On Jan. 8, 2019, CLINIC joined 150 nonprofit organizations to submit a joint public comment opposing the interim final rule restricting asylum for some migrants at the border. This rule has the objective of restricting asylum protections for individuals seeking entry to the United States at places other than official ports of entry. The comment calls on the agency to withdraw the rule due to it being a violation of U.S. and international law as well as going against our moral values.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="926"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="918"><p class="field-content" data-dcnode-id="919"><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/federal-administrative-advocacy" hreflang="en"><span data-dcnode-id="924" instrument_node="">Federal Administrative Advocacy</span></a><span data-dcnode-id="922" instrument_node="">, </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="921" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-42" data-dcnode-id="865"><span data-dcnode-id="913" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="887" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="909"><p class="field-content bold-font" data-dcnode-id="910"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/federal-judge-rejects-administrations-restrictions-credible-fear" hreflang="en"><span data-dcnode-id="912" instrument_node="">Federal Judge Rejects Administration’s Restrictions on Credible Fear Claims in Expedited Removal</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="902"><span class="views-label views-label-field-content-updated" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="903"><time class="datetime" data-dcnode-id="905" datetime="2018-12-21T12:00:00Z"><span data-dcnode-id="906" instrument_node="">December 21, 2018</span></time><span data-dcnode-id="904" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="892"><p class="field-content" data-dcnode-id="901"></p><p data-dcnode-id="893"><span data-dcnode-id="900" instrument_node="">On Dec. 17, 2018, the district court for the District of Columbia, in&nbsp;</span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/legal-document/grace-v-whitaker-opinion" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="899" instrument_node="">Grace v. Whitaker,</span></a><span data-dcnode-id="897" instrument_node="">&nbsp;struck down the administration’s new credible fear policies. On June 11, 2018, former Attorney General Jeff Sessions issued a decision in&nbsp;</span><em data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Matter of A-B</span></em><span data-dcnode-id="894" instrument_node="">-, 27 I&amp;N Dec. 227 (A.G. 2018), where he attempted to fundamentally change the legal requirements for asylum eligibility.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="888"><p class="field-content" data-dcnode-id="889"><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="891" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="886" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="867" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="882"><p class="field-content bold-font" data-dcnode-id="883"><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/factsheet-november-9-2018-asylum-ban" hreflang="en"><span data-dcnode-id="885" instrument_node="">Factsheet on the November 9, 2018 Asylum Ban</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="875"><span class="views-label views-label-field-content-updated" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="876"><time class="datetime" data-dcnode-id="878" datetime="2018-12-07T12:00:00Z"><span data-dcnode-id="879" instrument_node="">December 7, 2018</span></time><span data-dcnode-id="877" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="872"><p class="field-content" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The&nbsp;ACLU, the Southern Poverty Law Center and the Center for Constitutional Rights filed a request for an injunction in the Northern California District Court in the case of&nbsp;East Bay Sanctuary&nbsp;Covenant v. Trump.&nbsp; The district court granted a&nbsp;temporary restraining order&nbsp;on November 20, 2018.&nbsp; This ruling temporarily enjoins (or stops) the government from enforcing the Asylum Ban, temporarily, until December 19, 2018 when the court will decide whether to issue a preliminary injunction.&nbsp;The questions and answers below discuss what the Asylum Ban will do if the judge does not extend the injunction or if the government appeals the injunction and the district court order is lifted.

</span></span></p><div class="views-field views-field-body" data-dcnode-id="780"><p class="field-content" data-dcnode-id="785"></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">CLINIC Senior Attorney Victoria Neilson and Central American Legal Assistance (CALA) Senior Staff Attorney Heather Axford drafted this sample brief that practitioners can use to respond to immigration judges who demand that the asylum seeker state the particular social group(s) at a master calendar hearing as a prerequisite to scheduling the individual hearing.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="781"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="776"><p class="field-content" data-dcnode-id="777"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="779" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="774" instrument_node="">

</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="737" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="767"><p class="field-content bold-font" data-dcnode-id="768"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/matter-b-amicus-brief" hreflang="en"><span data-dcnode-id="770" instrument_node="">Matter of A-B Amicus Brief</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="760"><span class="views-label views-label-field-content-updated" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="761"><time class="datetime" data-dcnode-id="763" datetime="2018-04-30T12:00:00Z"><span data-dcnode-id="764" instrument_node="">April 30, 2018</span></time><span data-dcnode-id="762" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="748"><p class="field-content" data-dcnode-id="759"></p><p data-dcnode-id="751"><span data-dcnode-id="758" instrument_node="">The Catholic Legal Immigration Network Inc., filed an&nbsp;</span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">amicus&nbsp;</span></em><span data-dcnode-id="755" instrument_node="">brief April 27 challenging Attorney General Jeff Sessions’ effort to insert himself into a settled immigration case, the&nbsp;</span><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Matter of A-B</span></em><span data-dcnode-id="752" instrument_node="">. The attorney general’s unusual move could result in changes to long-settled immigration policy, making it harder for many asylum seekers -- notably those fleeing religion-based persecution – to obtain protection in the United States.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="749"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="738"><p class="field-content" data-dcnode-id="739"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation" hreflang="en"><span data-dcnode-id="747" instrument_node="">Litigation</span></a><span data-dcnode-id="745" instrument_node="">, </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="744" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="742" instrument_node="">, </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/litigation/amicus-brief" hreflang="en"><span data-dcnode-id="741" instrument_node="">Amicus Brief</span></a></p></div></div><span data-dcnode-id="736" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="715" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="732"><p class="field-content bold-font" data-dcnode-id="733"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/uscis-revises-protection-screening-lesson-plans" hreflang="en"><span data-dcnode-id="735" instrument_node="">USCIS revises protection screening lesson plans</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="725"><span class="views-label views-label-field-content-updated" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="726"><time class="datetime" data-dcnode-id="728" datetime="2017-04-26T12:00:00Z"><span data-dcnode-id="729" instrument_node="">April 26, 2017</span></time><span data-dcnode-id="727" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="720"><p class="field-content" data-dcnode-id="724"></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">People seeking asylum and/or withholding of removal in the United States, who are either in expedited removal or reinstatement of removal proceedings, must go through a screening process with a U.S. Citizenship and Immigration Services asylum officer. After the screening process is complete, with a positive outcome, an asylum applicant can make a formal request for asylum and/or withholding of removal with an immigration judge. Asylum officers are trained to do protection screening interviews from lesson plans that set forth standards to be followed when conducting these interviews.</span></p><p data-dcnode-id="721"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="716"><p class="field-content" data-dcnode-id="717"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="719" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-46" data-dcnode-id="655"><span data-dcnode-id="711" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="685" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="707"><p class="field-content bold-font" data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/frequently-asked-questions-about-jan-27-executive-order-affects" hreflang="en"><span data-dcnode-id="710" instrument_node="">Frequently asked questions about the Jan. 27 executive order that affects refugees and foreign travel</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="700"><span class="views-label views-label-field-content-updated" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="701"><time class="datetime" data-dcnode-id="703" datetime="2017-01-31T12:00:00Z"><span data-dcnode-id="704" instrument_node="">January 31, 2017</span></time><span data-dcnode-id="702" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="690"><p class="field-content" data-dcnode-id="699"></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">A document outlining frequently asked questions about the Jan. 27 executive order that affects refugees and foreign travel.</span></p><span data-dcnode-id="696" instrument_node="">
</span><h3 data-dcnode-id="693"><em data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">This material was written before the temporary restraining order was issued on Feb. 3. It will be updated as warranted.</span></em></h3><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="691"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="686"><p class="field-content" data-dcnode-id="687"><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="689" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="684" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="657" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="680"><p class="field-content bold-font" data-dcnode-id="681"><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/special-program-iraqi-and-syrian-family-members" hreflang="en"><span data-dcnode-id="683" instrument_node="">Special program for Iraqi and Syrian family members</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="673"><span class="views-label views-label-field-content-updated" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="674"><time class="datetime" data-dcnode-id="676" datetime="2016-03-22T12:00:00Z"><span data-dcnode-id="677" instrument_node="">March 22, 2016</span></time><span data-dcnode-id="675" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="668"><p class="field-content" data-dcnode-id="672"></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Beneficiaries of approved I-130 petitions who are from Iraq or Syria are now able to qualify to apply for refugee resettlement. The new program is called Priority-2 (P-2) Direct Access Program for Iraqi and Syrian beneficiaries of an approved Form I-130 Petition for Alien Relative. The benefit is that these family members would gain access to the U.S. Refugee Admissions Program, but the applicant would still need to meet the definition of a “refugee” and be interviewed and screened.</span></p><p data-dcnode-id="669"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="658"><p class="field-content" data-dcnode-id="659"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="667" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="665" instrument_node="">, </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/family-member-benefits" hreflang="en"><span data-dcnode-id="664" instrument_node="">Family Member Benefits</span></a><span data-dcnode-id="662" instrument_node="">, </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/family-based-immigration-law" hreflang="en"><span data-dcnode-id="661" instrument_node="">Family-Based Immigration Law</span></a></p></div></div><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">
</span><div class="listing-spacing-row views-row clearfix row-47" data-dcnode-id="596"><span data-dcnode-id="653" instrument_node="">
</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="629" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="649"><p class="field-content bold-font" data-dcnode-id="650"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/national-immigrant-justice-center-nijc-et-al" hreflang="en"><span data-dcnode-id="652" instrument_node="">National Immigrant Justice Center (NIJC), et al</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="642"><span class="views-label views-label-field-content-updated" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="643"><time class="datetime" data-dcnode-id="645" datetime="2016-03-04T12:00:00Z"><span data-dcnode-id="646" instrument_node="">March 4, 2016</span></time><span data-dcnode-id="644" instrument_node="">

</span></span></p><div class="views-field views-field-body" data-dcnode-id="612"><p class="field-content" data-dcnode-id="616"></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">In recent years, more than 24,000 people from over 100 nations have been granted asylum in the United States. Asylees have often suffered from persecution in their country of origin, forced migration, detention in the United States, and the uncertainty of the asylum adjudication process. Most confront systemic and bureaucratic barriers to resettlement and integration, and need well-coordinated and prompt social services to ease their transition.</span></p><p data-dcnode-id="613"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="599"><p class="field-content" data-dcnode-id="600"><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/immigration-reform" hreflang="en"><span data-dcnode-id="611" instrument_node="">Immigration Reform</span></a><span data-dcnode-id="609" instrument_node="">, </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="608" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="606" instrument_node="">, </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief" hreflang="en"><span data-dcnode-id="605" instrument_node="">Humanitarian Relief</span></a><span data-dcnode-id="603" instrument_node="">, </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/immigrant-integration" hreflang="en"><span data-dcnode-id="602" instrument_node="">Immigrant Integration</span></a></p></div></div><span data-dcnode-id="597" instrument_node="">

</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="573" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="590"><p class="field-content bold-font" data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum/aslyee-eligibility-resettlement-assistance" hreflang="en"><span data-dcnode-id="593" instrument_node="">Aslyee Eligibility for Resettlement Assistance</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="583"><span class="views-label views-label-field-content-updated" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="584"><time class="datetime" data-dcnode-id="586" datetime="2012-12-02T12:00:00Z"><span data-dcnode-id="587" instrument_node="">December 2, 2012</span></time><span data-dcnode-id="585" instrument_node="">
</span></span></p><div class="views-field views-field-body" data-dcnode-id="581"><p class="field-content" data-dcnode-id="582"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="574"><p class="field-content" data-dcnode-id="575"><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/removal-proceedings/defensive-asylum" hreflang="en"><span data-dcnode-id="580" instrument_node="">Defensive Asylum</span></a><span data-dcnode-id="578" instrument_node="">, </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="577" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="572" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="544" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="568"><p class="field-content bold-font" data-dcnode-id="569"><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief/asylum-and-refugee-law/asylum-office-updates-scheduling-procedures" hreflang="en"><span data-dcnode-id="571" instrument_node="">Asylum office updates scheduling procedures</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="564"><span class="views-label views-label-field-content-updated" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="565"></span></p><div class="views-field views-field-body" data-dcnode-id="549"><p class="field-content" data-dcnode-id="563"></p><p data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">In an effort discourage asylum claims from DACA and TPS holders, U.S. Citizenship and Immigration Services announced on Jan. 31, 2018, that it was changing the way the agency schedules asylum interviews. Instead of adjudicating them on a “first-in, first-out” basis, it would revert to a prior&nbsp;</span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-asylum/asylum/affirmative-asylum-interview-scheduling" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="561" instrument_node="">“last-in, first-out”</span></a><span data-dcnode-id="559" instrument_node="">&nbsp;basis, which is the way they scheduled cases from 1995 to 2014.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">&nbsp;</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="551"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Background</span></strong></p><p data-dcnode-id="550"></p></div><div class="views-field views-field-field-topics" data-dcnode-id="545"><p class="field-content" data-dcnode-id="546"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="548" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="543" instrument_node="">

</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="524" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="536"><p class="field-content bold-font" data-dcnode-id="537"><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief/asylum-and-refugee-law/asylee-eligibility-resettlement-assistance" hreflang="en"><span data-dcnode-id="539" instrument_node="">Asylee Eligibility for Resettlement Assistance Guide</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="532"><span class="views-label views-label-field-content-updated" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="533"></span></p><div class="views-field views-field-body" data-dcnode-id="529"><p class="field-content" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">This guide is designed to give service providers the tools and information needed to address the barriers to resettlement and integration faced by asylees and to better assist their clients.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="525"><p class="field-content" data-dcnode-id="526"><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="528" instrument_node="">Asylum and Refugee Law</span></a></p></div></div><span data-dcnode-id="523" instrument_node="">
</span><div class="listing-spacing-column views-col col-2" data-dcnode-id="495" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="519"><p class="field-content bold-font" data-dcnode-id="520"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/humanitarian-relief/asylum-and-refugee-law/bia-requires-asylum-seekers-identify" hreflang="en"><span data-dcnode-id="522" instrument_node="">BIA requires asylum seekers to identify particular social group</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="515"><span class="views-label views-label-field-content-updated" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="516"></span></p><div class="views-field views-field-body" data-dcnode-id="500"><p class="field-content" data-dcnode-id="514"></p><p data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">The Board of Immigration Appeals, or BIA, recently issued a decision,&nbsp;</span><em data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Matter of W-Y-C- &amp; H-O-B</span></em><span data-dcnode-id="510" instrument_node="">, 27 I&amp;N Dec. 189 (BIA 2018), that requires asylum applicants in removal proceedings to clearly delineate on the record before the immigration judge, or IJ, the “particular social group” in which they claim membership. The BIA further held that it would not consider newly proposed particular social groups on appeal that were not presented before the immigration judge.&nbsp;</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">&nbsp;</span></p><span data-dcnode-id="505" instrument_node="">

</span><div class="listing-spacing-column views-col col-1" data-dcnode-id="471" style="width: 50%;"><div class="views-field views-field-title" data-dcnode-id="487"><p class="field-content bold-font" data-dcnode-id="488"><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/9th-circuit-provides-additional-protections-asylum-seekers" hreflang="en"><span data-dcnode-id="490" instrument_node="">9th Circuit Provides Additional Protections For Asylum Seekers</span></a></p></div><p class="views-field views-field-field-content-updated bold-font" data-dcnode-id="483"><span class="views-label views-label-field-content-updated" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Last updated on </span></span><span class="field-content" data-dcnode-id="484"></span></p><div class="views-field views-field-body" data-dcnode-id="479"><p class="field-content" data-dcnode-id="482"></p><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Expedited removal is a process that allows U.S. Customs and Border Protection, or CBP, to order a non-citizen removed without providing an opportunity for a hearing before an immigration judge, or IJ. CBP has the power to issue an expedited removal order if the non-citizen arrives at a port of entry without proper documents, or is apprehended within 100 miles of the border within 14 days of entry and lacks proper documents.</span></p></div><div class="views-field views-field-field-topics" data-dcnode-id="472"><p class="field-content" data-dcnode-id="473"><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law" hreflang="en"><span data-dcnode-id="478" instrument_node="">Asylum and Refugee Law</span></a><span data-dcnode-id="476" instrument_node="">, </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/resources/asylum-and-refugee-law/credible-fear-and-reasonable-fear" hreflang="en"><span data-dcnode-id="475" instrument_node="">Credible Fear and Reasonable Fear</span></a></p></div></div><span data-dcnode-id="470" instrument_node="">

</span></div></div><span data-dcnode-id="429" instrument_node="">

</span><div class="clearfix text-formatted field field-block-content--body field-formatter-text-default field-name-body field-type-text-with-summary field-label-hidden has-single" data-dcnode-id="382"><div class="field__items" data-dcnode-id="384"><div class="field__item" data-dcnode-id="385"><p data-dcnode-id="410"><span data-dcnode-id="420" instrument_node="">As it has for more than 30 years, CLINIC will fight for the rights of immigrants. CLINIC trains legal representatives who provide </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">high</span></strong><span data-dcnode-id="417" instrument_node="">-</span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">quality</span></strong><span data-dcnode-id="414" instrument_node=""> and&nbsp;</span><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">affordable</span></strong><span data-dcnode-id="411" instrument_node=""> immigration legal services. We develop and sustain a network of nonprofit programs that serve close to 500,000 immigrants every year. We cultivate projects that support and defend&nbsp;vulnerable immigrant populations by:</span></p><span data-dcnode-id="409" instrument_node="">
</span><ul data-dcnode-id="392"><span data-dcnode-id="408" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">providing direct representation for asylum seekers at the U.S.-Mexico border&nbsp;and educating&nbsp;them about their rights;&nbsp;</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">reuniting formerly separated families;</span></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">increasing legal representation for those in removal proceedings and in detention;</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">providing public education on immigration law and policies; and</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">advocating for fair and just immigration policies that acknowledge the inherent dignity and value of all people. &nbsp;</span></li><span data-dcnode-id="393" instrument_node="">
</span></ul><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="390" instrument_node="">History has taught us that people who step up can make a difference.&nbsp;</span><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">We hope you will join us.</span></strong></p><span data-dcnode-id="386" instrument_node="">

</span><p data-dcnode-id="305"><span data-dcnode-id="312" instrument_node="">Embracing the Gospel value of welcoming the stranger, CLINIC promotes the dignity and protects the rights of immigrants in partnership with a </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cliniclegal.org/find-legal-help/affiliates/directory"><span data-dcnode-id="311" instrument_node="">dedicated network</span></a><span data-dcnode-id="309" instrument_node=""> of Catholic and community legal immigration programs. We are based out of Silver Spring, Maryland (Washington, D.C. metropolitan area), with an office in Oakland, California, and additional staff working from locations throughout the country. Questions and inquiries can be sent to </span><a data-dcnode-id="307" href="mailto:national@cliniclegal.org?subject=Question%2FInquiry"><span data-dcnode-id="308" instrument_node="">national@cliniclegal.org</span></a><span data-dcnode-id="306" instrument_node="">.</span></p><span data-dcnode-id="304" instrument_node="">
