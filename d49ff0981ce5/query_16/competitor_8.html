</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0030&quot;>In 2015 Finland received an unprecedented number of asylum seekers, ten times more than in any previous year. This surge took place at a time the Finnish Government was busily undergoing a wide-range health and social care reform amid growing nationalist and populist sentiments. Our aim is to explore the governance of a parallel health system for asylum seekers with a right-to-health approach.</p><p id=&quot;spar0035&quot;>We concentrated on three right to health features most related to the governance of asylum seeker health care, namely Formal recognition of the right to health, Standards and Coordination mechanisms. Through our qualitative review, we identified three major hurdles in the governance of the system for asylum seekers: 1) Ineffectual and reactive national level coordination and stewardship; 2) Inadequate legislative and supervisory frameworks leading to ineffective governance; 3) Discrepancies between constitutional rights to health, legal entitlements to services and guidance available.</p><p id=&quot;spar0040&quot;>This first-time large-scale implementation of the policies exposed weaknesses in the legal framework and the parallel health system. We recommend the removal of the parallel system and the integration of asylum seekers’ health services to the national public health care system.</p></div></div></div>" data-dcnode-id="2884" lang="en" name="citation_abstract"><span data-dcnode-id="2883" instrument_node="">

s="rights-and-content" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS016885101830681X%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2401" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="2390"><div class="License" data-dcnode-id="2394"><span data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2396" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="2391"><span class="access-indicator" data-dcnode-id="2393"></span><span data-dcnode-id="2392" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="2389"></section><section class="ReferencedArticles" data-dcnode-id="2388"></section><div class="PageDivider" data-dcnode-id="2387"></div><div class="Abstracts u-font-serif" data-dcnode-id="2350" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="2361" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Highlights</span></h2><div data-dcnode-id="2362" id="abst0005"><p data-dcnode-id="2363" id="spar0025"></p><dl class="list" data-dcnode-id="2364"><dt class="list-label" data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="2380"><p data-dcnode-id="2381" id="par0005"><span data-dcnode-id="2382" instrument_node="">Finland has a partly parallel system for providing health services for asylum-seekers.</span></p></dd><dt class="list-label" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="2375"><p data-dcnode-id="2376" id="par0010"><span data-dcnode-id="2377" instrument_node="">Large-scale implementation of existing policies exposed weaknesses in the legal framework.</span></p></dd><dt class="list-label" data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="2370"><p data-dcnode-id="2371" id="par0015"><span data-dcnode-id="2372" instrument_node="">Extreme decentralisation impeded adequate national coordination and supervision.</span></p></dd><dt class="list-label" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="2365"><p data-dcnode-id="2366" id="par0020"><span data-dcnode-id="2367" instrument_node="">Integration of asylum seekers to the national public health care system recommended.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="2351" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Abstract</span></h2><div data-dcnode-id="2352" id="abst0010"><p data-dcnode-id="2357" id="spar0030"><span data-dcnode-id="2358" instrument_node="">In 2015 Finland received an unprecedented number of asylum seekers, ten times more than in any previous year. This surge took place at a time the Finnish Government was busily undergoing a wide-range health and social care reform amid growing nationalist and populist sentiments. Our aim is to explore the governance of a parallel health system for asylum seekers with a right-to-health approach.</span></p><p data-dcnode-id="2355" id="spar0035"><span data-dcnode-id="2356" instrument_node="">We concentrated on three right to health features most related to the governance of asylum seeker health care, namely Formal recognition of the right to health, Standards and Coordination mechanisms. Through our qualitative review, we identified three major hurdles in the governance of the system for asylum seekers: 1) Ineffectual and reactive national level coordination and stewardship; 2) Inadequate legislative and supervisory frameworks leading to ineffective governance; 3) Discrepancies between constitutional rights to health, legal entitlements to services and guidance available.</span></p><p data-dcnode-id="2353" id="spar0040"><span data-dcnode-id="2354" instrument_node="">This first-time large-scale implementation of the policies exposed weaknesses in the legal framework and the parallel health system. We recommend the removal of the parallel system and the integration of asylum seekers’ health services to the national public health care system.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="2327" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="2339"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168851018305669"><svg class="icon icon-navigate-left" data-dcnode-id="2348" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="2349"></path></svg><span class="button-alternative-text" data-dcnode-id="2341"><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="2328"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168851018305335"><span class="button-alternative-text" data-dcnode-id="2332"><strong data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="2330" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="2331"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="2299"><div class="keywords-section" data-dcnode-id="2300" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="2322" id="kw0005"><span data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Refugees</span></span></div><div class="keyword" data-dcnode-id="2319" id="kw0010"><span data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Finland</span></span></div><div class="keyword" data-dcnode-id="2316" id="kw0015"><span data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Public Health</span></span></div><div class="keyword" data-dcnode-id="2313" id="kw0020"><span data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Government</span></span></div><div class="keyword" data-dcnode-id="2310" id="kw0025"><span data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Delivery of Health Care</span></span></div><div class="keyword" data-dcnode-id="2307" id="kw0030"><span data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Health Services</span></span></div><div class="keyword" data-dcnode-id="2304" id="kw0035"><span data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Policy</span></span></div><div class="keyword" data-dcnode-id="2301" id="kw0040"><span data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Human rights</span></span></div></div></div><span data-dcnode-id="2298" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1772" id="body"><div data-dcnode-id="1783"><section data-dcnode-id="2250" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2294" id="sect0020"><span data-dcnode-id="2297" instrument_node="">1</span><span data-dcnode-id="2296" instrument_node="">. </span><span data-dcnode-id="2295" instrument_node="">Introduction</span></h2><p data-dcnode-id="2283" id="par0025"><span data-dcnode-id="2293" instrument_node="">Over 1.2 million first time asylum seeker applications were registered in the member states of the European Union in 2015 [</span><a class="workspace-trigger" data-dcnode-id="2291" href="#bib0005" name="bbib0005"><span data-dcnode-id="2292" instrument_node="">1</span></a><span data-dcnode-id="2290" instrument_node="">]. The United Nations High Commissioner for Refugees defines an asylum-seeker as “[…] an individual who is seeking international protection [… and] whose claim has not yet been finally decided on by the country in which he or she has submitted it. “[</span><a class="workspace-trigger" data-dcnode-id="2288" href="#bib0010" name="bbib0010"><span data-dcnode-id="2289" instrument_node="">2</span></a><span data-dcnode-id="2287" instrument_node="">] In 2015, Finland received 32 476 asylum applications – an unprecedented number of applications ten times higher than any of the previous 30 years. This number meant that Finland received the 4th highest number of refugees per capita during the 2015 mass migration to Europe, behind Hungary, Austria and Sweden [</span><a class="workspace-trigger" data-dcnode-id="2285" href="#bib0005" name="bbib0005"><span data-dcnode-id="2286" instrument_node="">1</span></a><span data-dcnode-id="2284" instrument_node="">].</span></p><p data-dcnode-id="2281" id="par0030"><span data-dcnode-id="2282" instrument_node="">Most asylum seekers to Finland arrived during August-December with a peak in arrivals in September. As in many other receiving countries, the rapid surge of asylum seekers caused strain for the reception system. However, in general, adjustments for growing numbers could be implemented quite rapidly, although a major part of asylum seekers crossed the border in the Northern part of Finland, which is sparsely populated.</span></p><p data-dcnode-id="2255" id="par0035"><span data-dcnode-id="2280" instrument_node="">In Finland, asylum seekers are not granted the same entitlements for health services as the Finnish residents [</span><a class="workspace-trigger" data-dcnode-id="2278" href="#bib0015" name="bbib0015"><span data-dcnode-id="2279" instrument_node="">[3]</span></a><span data-dcnode-id="2277" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2275" href="#bib0020" name="bbib0020"><span data-dcnode-id="2276" instrument_node="">[4]</span></a><span data-dcnode-id="2274" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2272" href="#bib0025" name="bbib0025"><span data-dcnode-id="2273" instrument_node="">[5]</span></a><span data-dcnode-id="2271" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2269" href="#bib0030" name="bbib0030"><span data-dcnode-id="2270" instrument_node="">[6]</span></a><span data-dcnode-id="2268" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2266" href="#bib0035" name="bbib0035"><span data-dcnode-id="2267" instrument_node="">[7]</span></a><span data-dcnode-id="2265" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2263" href="#bib0040" name="bbib0040"><span data-dcnode-id="2264" instrument_node="">[8]</span></a><span data-dcnode-id="2262" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2260" href="#bib0045" name="bbib0045"><span data-dcnode-id="2261" instrument_node="">[9]</span></a><span data-dcnode-id="2259" instrument_node="">], but in general the Finnish legislation provides to asylum seekers a level of access to services comparable to most Western European countries [</span><a class="workspace-trigger" data-dcnode-id="2257" href="#bib0050" name="bbib0050"><span data-dcnode-id="2258" instrument_node="">10</span></a><span data-dcnode-id="2256" instrument_node="">]. The system for delivering these services is separate from the general public health care and organised and funded by migration authorities. Its service level has also been designed primarily to receive low numbers of asylum seekers.</span></p><p data-dcnode-id="2253" id="par0040"><span data-dcnode-id="2254" instrument_node="">In 2015, the increasing demand led to several challenges in ensuring asylum seekers’ access to health care. In addition, it took some time before these challenges became obvious at higher levels of governance, which resulted in a delay in addressing them.</span></p><p data-dcnode-id="2251" id="par0045"><span data-dcnode-id="2252" instrument_node="">With a right-to-health approach, this article explores the governance of the parallel health system for asylum seekers in Finland in 2015–2016. We aim to describe the process of the first-time large-scale implementation of Finnish policies regarding health services for asylum seekers, to identify challenges related to the governance of the system and to make recommendations for the future.</span></p></section><section data-dcnode-id="2179" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2246" id="sect0025"><span data-dcnode-id="2249" instrument_node="">2</span><span data-dcnode-id="2248" instrument_node="">. </span><span data-dcnode-id="2247" instrument_node="">Methods</span></h2><section data-dcnode-id="2189" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2242" id="sect0030"><span data-dcnode-id="2245" instrument_node="">2.1</span><span data-dcnode-id="2244" instrument_node="">. </span><span data-dcnode-id="2243" instrument_node="">Framework for analysis: governance of asylum seekers’ right to health</span></h3><p data-dcnode-id="2231" id="par0050"><span data-dcnode-id="2241" instrument_node="">Backman et al (2008) state that “the right to the highest attainable standard of health is the cornerstone of […] an effective health system” [</span><a class="workspace-trigger" data-dcnode-id="2239" href="#bib0055" name="bbib0055"><span data-dcnode-id="2240" instrument_node="">11</span></a><span data-dcnode-id="2238" instrument_node="">]. It has been established that leadership and governance are cross-cutting components of a health system that serve as “a basis for the overall policy and regulation of all the other […] building blocks [</span><a class="workspace-trigger" data-dcnode-id="2236" href="#bib0060" name="bbib0060"><span data-dcnode-id="2237" instrument_node="">12</span></a><span data-dcnode-id="2235" instrument_node="">]”. Therefore, we chose to evaluate the effectiveness of the health system in ensuring the right to health for asylum seekers by inspecting its leadership and governance component. WHO defines this component to “[involve] ensuring strategic policy frameworks exist and are combined with effective oversight, coalition-building, regulation, attention to system-design and accountability [</span><a class="workspace-trigger" data-dcnode-id="2233" href="#bib0060" name="bbib0060"><span data-dcnode-id="2234" instrument_node="">12</span></a><span data-dcnode-id="2232" instrument_node="">]”.</span></p><div data-dcnode-id="2190"><p data-dcnode-id="2223" id="par0055"><span data-dcnode-id="2230" instrument_node="">A preliminary model on the Right to health features of a health system underpinned by legal obligation, based on the General Comment 14 of the Committee on Economic and Social Rights (CESCR) has been published in the Lancet [</span><a class="workspace-trigger" data-dcnode-id="2228" href="#bib0055" name="bbib0055"><span data-dcnode-id="2229" instrument_node="">11</span></a><span data-dcnode-id="2227" instrument_node="">]. We concentrated on the model features that most related to the leadership and governance of the asylum seeker health care: Formal recognition of the right to health, Standards and Coordination mechanisms (</span><a class="workspace-trigger" data-dcnode-id="2225" href="#fig0005" name="bfig0005"><span data-dcnode-id="2226" instrument_node="">Fig. 1</span></a><span data-dcnode-id="2224" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="2191" id="fig0005"><span data-dcnode-id="2207"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="2222" height="312" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr1.jpg&amp;raw"><span data-dcnode-id="2221" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2208"><li data-dcnode-id="2215"><a class="anchor download-link u-font-sans" data-dcnode-id="2216" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr1_lrg.jpg" target="_blank" title="Download high-res image (170KB)"><span class="anchor-text" data-dcnode-id="2217"><span data-dcnode-id="2220" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Download high-res image (170KB)</span></span></span></a></li><li data-dcnode-id="2209"><a class="anchor download-link u-font-sans" data-dcnode-id="2210" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2211"><span data-dcnode-id="2214" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2192"><span data-dcnode-id="2193" id="cap0005"><p data-dcnode-id="2202" id="spar0005"><span class="label" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Fig. 1</span></span><span data-dcnode-id="2204" instrument_node="">. </span><span data-dcnode-id="2203" instrument_node="">Governance features of asylum seekers’ right to health framework.</span></p><p data-dcnode-id="2194" id="spar0010"><span data-dcnode-id="2201" instrument_node="">Framework combined and adapted from WHO Health System Building Blocks [</span><a class="workspace-trigger" data-dcnode-id="2199" href="#bib0060" name="bbib0060"><span data-dcnode-id="2200" instrument_node="">12</span></a><span data-dcnode-id="2198" instrument_node="">] and the Right to health features of a health system by Backman et al. (2008) underpinned by legal obligations based on the General Comment 14 [of the Committee on Economic, Social and Cultural Rights] [</span><a class="workspace-trigger" data-dcnode-id="2196" href="#bib0055" name="bbib0055"><span data-dcnode-id="2197" instrument_node="">11</span></a><span data-dcnode-id="2195" instrument_node="">].</span></p></span></span></figure></div></section><section data-dcnode-id="2180" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2185" id="sect0035"><span data-dcnode-id="2188" instrument_node="">2.2</span><span data-dcnode-id="2187" instrument_node="">. </span><span data-dcnode-id="2186" instrument_node="">Qualitative review</span></h3><p data-dcnode-id="2183" id="par0060"><span data-dcnode-id="2184" instrument_node="">Three authors of this paper (KT, PT and OH) worked as medical specialists on refugee health at different periods in the years 2015–2018 at the National Institute for Health and Welfare (Finland). They served as physician members of the Reception Unit’s health team within the Finnish Immigration Service. One author (PT) also worked briefly as a chief physician at the Ministry of Social Affairs and Health (Finland).</span></p><p data-dcnode-id="2181" id="par0065"><span data-dcnode-id="2182" instrument_node="">The sources included in this study were gathered by the three authors in 2015–2019. Our qualitative review is based on the sources presented as references in this article as well as recollections of events and communications by the authors during their mandates as medical specialists on refugee health.</span></p></section></section><section data-dcnode-id="2107" id="sec0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2175" id="sect0040"><span data-dcnode-id="2178" instrument_node="">3</span><span data-dcnode-id="2177" instrument_node="">. </span><span data-dcnode-id="2176" instrument_node="">Parallel health systems for residents and asylum seekers in Finland</span></h2><div data-dcnode-id="2143"><p data-dcnode-id="2170" id="par0070"><span data-dcnode-id="2174" instrument_node="">The Finnish health care system is mainly based on public financing derived from taxation and public provision organised by municipalities (</span><a class="workspace-trigger" data-dcnode-id="2172" href="#fig0010" name="bfig0010"><span data-dcnode-id="2173" instrument_node="">Fig. 2</span></a><span data-dcnode-id="2171" instrument_node="">A). Most funds are collected and pooled at the municipal level. The municipalities also organise primary health services either alone or together with neighbouring municipalities. Specialised health services are organised by federations of municipalities in the form of hospital districts. With the exception of emergency and urgent services, the municipal authorities are legally obliged to provide services primarily for their own residents.</span></p><figure class="figure text-xs" data-dcnode-id="2144" id="fig0010"><span data-dcnode-id="2154"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="2169" height="786" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr2.jpg&amp;raw"><span data-dcnode-id="2168" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2155"><li data-dcnode-id="2162"><a class="anchor download-link u-font-sans" data-dcnode-id="2163" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr2_lrg.jpg" target="_blank" title="Download high-res image (790KB)"><span class="anchor-text" data-dcnode-id="2164"><span data-dcnode-id="2167" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Download high-res image (790KB)</span></span></span></a></li><li data-dcnode-id="2156"><a class="anchor download-link u-font-sans" data-dcnode-id="2157" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016885101830681X-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2158"><span data-dcnode-id="2161" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2145"><span data-dcnode-id="2146" id="cap0010"><p data-dcnode-id="2149" id="spar0015"><span class="label" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Fig. 2</span></span><span data-dcnode-id="2151" instrument_node="">. </span><span data-dcnode-id="2150" instrument_node="">Finnish health care system (A) and the provision of health services for asylum seekers (B).</span></p><p data-dcnode-id="2147" id="spar0020"><span data-dcnode-id="2148" instrument_node="">(A): A simplified illustration of the Finnish health care system for the purpose of this article, excluding occupational health care, dental care, medicines; (B): A simplified illustration of the health care system for asylum seekers in Finland for the purpose of this article, grey areas specific to asylum seekers and gridded areas only in relation to activities of municipalities and health facilities.</span></p></span></span></figure></div><p data-dcnode-id="2134" id="par0075"><span data-dcnode-id="2142" instrument_node="">The Ministry of Social Affairs and Health (MSAH) is responsible for planning, steering and enforcing the Government’s health and social policies. In practice, national and regional agencies under the MSAH provide policy support and supervision. The health care system is considered in major parts to be extremely decentralised and the municipalities enjoy a high degree of autonomy when it comes to the planning, organisation, purchasing and provision of health care services [</span><a class="workspace-trigger" data-dcnode-id="2140" href="#bib0065" name="bbib0065"><span data-dcnode-id="2141" instrument_node="">13</span></a><span data-dcnode-id="2135"><span data-dcnode-id="2139" instrument_node="">]. There is a comprehensive legal framework covering, among other things, primary and specialised care, </span><a class="topic-link" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/infectious-disease-prevention" title="Learn more about infectious disease prevention from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2138" instrument_node="">infectious disease prevention</span></a><span data-dcnode-id="2136" instrument_node=""> and control as well as school health.</span></span></p><p data-dcnode-id="2126" id="par0080"><span data-dcnode-id="2133" instrument_node="">The health care system for asylum seekers includes a wide range of stakeholders. The Finnish Immigration Service (Migri, </span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migri.fi/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2132" instrument_node="">https://www.migri.fi</span></a><span data-dcnode-id="2130" instrument_node="">), an agency under the Ministry of the Interior, implements the Finnish immigration policy and oversees the asylum process, including the organisation and monitoring of health care (</span><a class="workspace-trigger" data-dcnode-id="2128" href="#fig0010" name="bfig0010"><span data-dcnode-id="2129" instrument_node="">Fig. 2</span></a><span data-dcnode-id="2127" instrument_node="">B).</span></p><p data-dcnode-id="2124" id="par0085"><span data-dcnode-id="2125" instrument_node="">Migri contracts out reception centres that are run by private for-profit and not-for-profit organisations. Each asylum seeker is assigned to a reception centre, which is responsible for ensuring that the asylum seeker has access to basic services, such as housing, boarding, and health and social services. Some asylum seekers may live in private housing, but they also have a designated reception centre for receiving health and social services.</span></p><p data-dcnode-id="2122" id="par0090"><span data-dcnode-id="2123" instrument_node="">Once assigned to a reception centre, nurses working there offer asylum seekers a voluntary health examination that includes a risk assessment for certain infectious diseases, based on which blood tests and x-rays are ordered. These tests are done at private clinics and laboratories as part of a contract between Migri and private providers who have been selected through a tender process. The nurses also evaluate, on a case-to-case basis, the need for further medical services, such as in the case of acute illness, pregnancy or follow-up of a chronic condition.</span></p><p data-dcnode-id="2117" id="par0095"><span data-dcnode-id="2121" instrument_node="">Migri covers the cost of health services for asylum seekers [</span><a class="workspace-trigger" data-dcnode-id="2119" href="#bib0020" name="bbib0020"><span data-dcnode-id="2120" instrument_node="">4</span></a><span data-dcnode-id="2118" instrument_node="">]. The reception centres can purchase these services – apart from the screenings – from either private or public providers and get reimbursed by Migri.</span></p><p data-dcnode-id="2108" id="par0100"><span data-dcnode-id="2112"><span data-dcnode-id="2116" instrument_node="">The supervision of health services differs between the reception centres and general health care. Migri is in charge of overall supervision of reception centre activities, which includes health services. Despite the fact that these reception centres provide some health services, they are not officially considered </span><a class="topic-link" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/health-care-facility" title="Learn more about health care facilities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2115" instrument_node="">health care facilities</span></a><span data-dcnode-id="2113" instrument_node=""> and therefore do not fall under the supervision of the regional state administrative authorities and the National Supervisory Authority for Health and Welfare (Valvira) which otherwise supervise health services (</span></span><a class="workspace-trigger" data-dcnode-id="2110" href="#fig0010" name="bfig0010"><span data-dcnode-id="2111" instrument_node="">Fig. 2</span></a><span data-dcnode-id="2109" instrument_node="">).</span></p></section><section data-dcnode-id="1904" id="sec0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2103" id="sect0045"><span data-dcnode-id="2106" instrument_node="">4</span><span data-dcnode-id="2105" instrument_node="">. </span><span data-dcnode-id="2104" instrument_node="">Governance of asylum seekers’ health care</span></h2><section data-dcnode-id="2002" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2099" id="sect0050"><span data-dcnode-id="2102" instrument_node="">4.1</span><span data-dcnode-id="2101" instrument_node="">. </span><span data-dcnode-id="2100" instrument_node="">Formal recognition of the right to health for asylum seekers</span></h3><p data-dcnode-id="2085" id="par0105"><span data-dcnode-id="2098" instrument_node="">The right to health is founded on the Universal Declaration of Human Rights from 1948 and derives from the International Covenant on Economic, Social, and Cultural Rights and the Convention on the Rights of the Child [</span><a class="workspace-trigger" data-dcnode-id="2096" href="#bib0070" name="bbib0070"><span data-dcnode-id="2097" instrument_node="">[14]</span></a><span data-dcnode-id="2095" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2093" href="#bib0075" name="bbib0075"><span data-dcnode-id="2094" instrument_node="">[15]</span></a><span data-dcnode-id="2092" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2090" href="#bib0080" name="bbib0080"><span data-dcnode-id="2091" instrument_node="">[16]</span></a><span data-dcnode-id="2089" instrument_node="">]. Finland has ratified these latter treaties in 1975 and 1991, respectively [</span><a class="workspace-trigger" data-dcnode-id="2087" href="#bib0085" name="bbib0085"><span data-dcnode-id="2088" instrument_node="">17</span></a><span data-dcnode-id="2086" instrument_node="">].</span></p><p data-dcnode-id="2080" id="par0110"><span data-dcnode-id="2084" instrument_node="">According to the Finnish constitution 731/1999, everyone has a subjective right to necessary livelihood and care [</span><a class="workspace-trigger" data-dcnode-id="2082" href="#bib0015" name="bbib0015"><span data-dcnode-id="2083" instrument_node="">3</span></a><span data-dcnode-id="2081" instrument_node="">]. However, the Public Health Act and the Act on Municipality of Residency determine the population groups entitled to access municipal services. Thus, individuals without a residency permit, such as asylum seekers, do not have access to the full range of public health services.</span></p><p data-dcnode-id="2045" id="par0115"><span data-dcnode-id="2079" instrument_node="">The legislative framework regarding health care for asylum seekers in 2015 consisted of the Act on the Reception of Persons Applying for International Protection 746/2011, Health Care Act 1326/2010, Act on Specialized Medical Care 1062/1989, Communicable Disease Act 583/1986 and later 1227/2016, Act on Health Care Professionals 559/1994 and the Basic Education Act 628/1998 [</span><a class="workspace-trigger" data-dcnode-id="2077" href="#bib0020" name="bbib0020"><span data-dcnode-id="2078" instrument_node="">[4]</span></a><span data-dcnode-id="2076" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2074" href="#bib0025" name="bbib0025"><span data-dcnode-id="2075" instrument_node="">[5]</span></a><span data-dcnode-id="2073" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2071" href="#bib0030" name="bbib0030"><span data-dcnode-id="2072" instrument_node="">[6]</span></a><span data-dcnode-id="2070" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2068" href="#bib0035" name="bbib0035"><span data-dcnode-id="2069" instrument_node="">[7]</span></a><span data-dcnode-id="2067" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2065" href="#bib0040" name="bbib0040"><span data-dcnode-id="2066" instrument_node="">[8]</span></a><span data-dcnode-id="2064" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2062" href="#bib0045" name="bbib0045"><span data-dcnode-id="2063" instrument_node="">[9]</span></a><span data-dcnode-id="2061" instrument_node="">]. These laws and policies stipulate that adult asylum seekers are entitled to ‘essential and urgent health care’ [</span><a class="workspace-trigger" data-dcnode-id="2059" href="#bib0020" name="bbib0020"><span data-dcnode-id="2060" instrument_node="">[4]</span></a><span data-dcnode-id="2058" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2056" href="#bib0025" name="bbib0025"><span data-dcnode-id="2057" instrument_node="">[5]</span></a><span data-dcnode-id="2055" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2053" href="#bib0030" name="bbib0030"><span data-dcnode-id="2054" instrument_node="">[6]</span></a><span data-dcnode-id="2052" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2050" href="#bib0035" name="bbib0035"><span data-dcnode-id="2051" instrument_node="">[7]</span></a><span data-dcnode-id="2049" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2047" href="#bib0040" name="bbib0040"><span data-dcnode-id="2048" instrument_node="">[8]</span></a><span data-dcnode-id="2046" instrument_node="">].</span></p><p data-dcnode-id="2037" id="par0120"><span data-dcnode-id="2044" instrument_node="">Urgent health care is defined in the Health Care Act, section 50, as: “[cases] involving an injury, a sudden onset of an illness, an exacerbation of a long-term illness, or a deterioration of functional ability where immediate intervention is required and where treatment cannot be postponed without risking the worsening of the condition or further injury [</span><a class="workspace-trigger" data-dcnode-id="2042" href="#bib0025" name="bbib0025"><span data-dcnode-id="2043" instrument_node="">5</span></a><span data-dcnode-id="2041" instrument_node="">]”. However, legislation is vague on what is essential health care. The Act of Health Care Professionals, section 22 states that: “A licensed physician [dentist] shall decide on the medical [dental] examination, diagnosis and appropriate treatment of a patient [</span><a class="workspace-trigger" data-dcnode-id="2039" href="#bib0040" name="bbib0040"><span data-dcnode-id="2040" instrument_node="">8</span></a><span data-dcnode-id="2038" instrument_node="">]”. This indirectly leaves the interpretation of what is essential care to the licensed physicians and dentists caring asylum seekers.</span></p><p data-dcnode-id="2032" id="par0125"><span data-dcnode-id="2036" instrument_node="">Furthermore, the Act on the Reception of Persons Applying for International Protection defines a possible vulnerable status of asylum seekers depending on age, physical or mental states. However, it only stipulates that this vulnerability will “be considered throughout the asylum process” [</span><a class="workspace-trigger" data-dcnode-id="2034" href="#bib0020" name="bbib0020"><span data-dcnode-id="2035" instrument_node="">4</span></a><span data-dcnode-id="2033" instrument_node="">], with no further detail on how this may impact for example the entitlement of vulnerable groups, other than children, to more complete basket of health services.</span></p><p data-dcnode-id="2021" id="par0130"><span data-dcnode-id="2031" instrument_node="">The situation is different for asylum seekers under the age of 18 years. They are entitled to the same health services, including school health care, as children resident in a Finnish municipality [</span><a class="workspace-trigger" data-dcnode-id="2029" href="#bib0020" name="bbib0020"><span data-dcnode-id="2030" instrument_node="">4</span></a><span data-dcnode-id="2028" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="2026" href="#bib0035" name="bbib0035"><span data-dcnode-id="2027" instrument_node="">7</span></a><span data-dcnode-id="2025" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="2023" href="#bib0045" name="bbib0045"><span data-dcnode-id="2024" instrument_node="">9</span></a><span data-dcnode-id="2022" instrument_node="">]. This is in line with the basic human rights principle of non-discrimination which is aligned with the Convention of the Rights of the Child.</span></p><p data-dcnode-id="2013" id="par0135"><span data-dcnode-id="2020" instrument_node="">The role of the municipalities in the organisation of health care for asylum seekers remains unclear within the legislation. Although the Act on the Reception of Persons Applying for International Protection stipulates that the reception centres contracted by Migri organise health care for asylum seekers, it also states, for example, that children seeking asylum should receive the same care as children resident to the municipality [</span><a class="workspace-trigger" data-dcnode-id="2018" href="#bib0020" name="bbib0020"><span data-dcnode-id="2019" instrument_node="">4</span></a><span data-dcnode-id="2017" instrument_node="">]. This implies that the municipalities have a role to play in providing health services for asylum seekers. The municipality’s role in the organisation and provision of health services is also implied in the preamble and bill to the Act [</span><a class="workspace-trigger" data-dcnode-id="2015" href="#bib0090" name="bbib0090"><span data-dcnode-id="2016" instrument_node="">18</span></a><span data-dcnode-id="2014" instrument_node="">].</span></p><p data-dcnode-id="2005" id="par0140"><span data-dcnode-id="2012" instrument_node="">Also, the Communicable Disease and Basic Education Acts clearly identify the role of the municipalities in prevention and control of infectious diseases and in provision of school health care within their area, irrespective of the residency status of the people involved [</span><a class="workspace-trigger" data-dcnode-id="2010" href="#bib0035" name="bbib0035"><span data-dcnode-id="2011" instrument_node="">7</span></a><span data-dcnode-id="2009" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="2007" href="#bib0045" name="bbib0045"><span data-dcnode-id="2008" instrument_node="">9</span></a><span data-dcnode-id="2006" instrument_node="">]. In addition, some health services are in practice only provided by the municipal facilities, such as preventive child and maternal health care, immunisations using vaccines from the national vaccination programme as well as other infectious disease control measures.</span></p><p data-dcnode-id="2003" id="par0145"><span data-dcnode-id="2004" instrument_node="">All in all, the right to health of asylum-seeking children is formally and fully recognised in the legislation. For adult asylum seekers, access to health services is more restricted by law. However, the legislation remains open to interpretation on what might be considered essential care. Furthermore, which institution is effectively responsible for the organisation and provision of health services remains unclear within the legal framework.</span></p></section><section data-dcnode-id="1938" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1998" id="sect0055"><span data-dcnode-id="2001" instrument_node="">4.2</span><span data-dcnode-id="2000" instrument_node="">. </span><span data-dcnode-id="1999" instrument_node="">Standards for asylum seeker health care</span></h3><p data-dcnode-id="1989" id="par0150"><span data-dcnode-id="1993"><span data-dcnode-id="1997" instrument_node="">In terms of </span><a class="topic-link" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/healthcare-standard" title="Learn more about health care standards from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1996" instrument_node="">health care standards</span></a><span data-dcnode-id="1994" instrument_node="">, a policy document on the prevention of infectious diseases among refugees and asylum seekers has been issued by MSAH [</span></span><a class="workspace-trigger" data-dcnode-id="1991" href="#bib0095" name="bbib0095"><span data-dcnode-id="1992" instrument_node="">19</span></a><span data-dcnode-id="1990" instrument_node="">]. Apart from these issued recommendations, MSAH has played a relatively small role in the health care for asylum seekers. MSAH and agencies under it have mainly provided guidance for the structures already present in the overall health system. Migri and the Ministry of the Interior have had more or less full responsibility for the asylum seekers’ services. Migri monitored, guided, supervised and paid for the health services.</span></p><p data-dcnode-id="1981" id="par0155"><span data-dcnode-id="1988" instrument_node="">Before 2015, Migri had only a limited capacity of health care expertise. Previously, health care issues were under the responsibility of one non-medical civil servant in Migri’s Reception Unit. However, soon after the rapid increase in the numbers of asylum seekers, a health team was set up. Migri collaborated with the National Institute for Health and Welfare (THL) to recruit experienced nurses and doctors to the team working at the national level [</span><a class="workspace-trigger" data-dcnode-id="1986" href="#bib0100" name="bbib0100"><span data-dcnode-id="1987" instrument_node="">20</span></a><span data-dcnode-id="1985" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="1983" href="#bib0105" name="bbib0105"><span data-dcnode-id="1984" instrument_node="">21</span></a><span data-dcnode-id="1982" instrument_node="">]. Subsequently, the team was able to develop and update guidance, supervisory and monitoring frameworks. THL published this guidance on its website and Migri also disseminated all available guidelines to the health professionals at the Reception Centres.</span></p><p data-dcnode-id="1976" id="par0160"><span data-dcnode-id="1980" instrument_node="">Toward the end of 2015, MSAH issued a letter confirming the usage of national vaccination programme vaccines to vaccinate asylum seekers [</span><a class="workspace-trigger" data-dcnode-id="1978" href="#bib0110" name="bbib0110"><span data-dcnode-id="1979" instrument_node="">22</span></a><span data-dcnode-id="1977" instrument_node="">]. This was the first significant contribution to the stewardship of asylum seeker health care by MSAH. The role of MSAH became more visible as after this important policy decision.</span></p><p data-dcnode-id="1965" id="par0165"><span data-dcnode-id="1975" instrument_node="">Despite improvements in available guidance from the Migri health team and existing legislation, some municipalities initially failed to assist with prevention and control measures regarding infectious disease epidemics involving asylum seekers. Other municipalities blatantly refused to provide public preventive health services to children irrespective of the fact that children applying for asylum had a right to the same services as the children resident in municipalities [</span><a class="workspace-trigger" data-dcnode-id="1973" href="#bib0115" name="bbib0115"><span data-dcnode-id="1974" instrument_node="">23</span></a><span data-dcnode-id="1972" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="1970" href="#bib0120" name="bbib0120"><span data-dcnode-id="1971" instrument_node="">24</span></a><span data-dcnode-id="1969" instrument_node="">]. The Association of Finnish Local and Regional Authorities (Kuntaliitto) representing municipalities later realigned their stance to the national guidance with regards to school children, but remained ambiguous in their view and guidance on services to children under school age, which is seven years in Finland [</span><a class="workspace-trigger" data-dcnode-id="1967" href="#bib0125" name="bbib0125"><span data-dcnode-id="1968" instrument_node="">25</span></a><span data-dcnode-id="1966" instrument_node="">].</span></p><p data-dcnode-id="1960" id="par0170"><span data-dcnode-id="1964" instrument_node="">Finland has a strong public system of antenatal, postnatal and well-baby care services, which includes among others free immunisations. However, in the case of asylum seekers, the law seemed ambiguous with regards to who should provide these services. Even the preamble of the bill of the Act on the Reception of Persons Applying for International Protection did not explicitly indicate the public sector to be responsible for providing these services [</span><a class="workspace-trigger" data-dcnode-id="1962" href="#bib0090" name="bbib0090"><span data-dcnode-id="1963" instrument_node="">18</span></a><span data-dcnode-id="1961" instrument_node="">].</span></p><p data-dcnode-id="1958" id="par0175"><span data-dcnode-id="1959" instrument_node="">To make the issue more complicated, in some cities and regions of the country, the reception centres had purchased some child health and maternal health services for years from private providers. However, these services were not comparable to the services provided by municipal health centres partly due to a national license required for supplying the full range of services. Although in some municipalities private providers had acquired the required licenses, they were not for example able to provide mothers and children with free vaccines from the national vaccination programme.</span></p><p data-dcnode-id="1953" id="par0180"><span data-dcnode-id="1957" instrument_node="">In 2016, MSAH attempted to clarify what was meant, for instance, with the ‘right to essential and </span><a class="topic-link" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/urgent-care" title="Learn more about urgent care from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1956" instrument_node="">urgent care</span></a><span data-dcnode-id="1954" instrument_node=""> services’, the rights of children to the same care as resident children and what was expected from the municipalities in facilitating access to the services. For example, MSAH identified pregnant women as a special group who should have access to a wider range of services. MSAH issued guidance letters to the municipalities that defined essential care to include among others antenatal care and treatment of chronic diseases. However, the message still remained ambiguous and it had but little impact.</span></p><p data-dcnode-id="1941" id="par0185"><span data-dcnode-id="1948"><span data-dcnode-id="1952" instrument_node="">In spite of the guidance letters, reception centre nurses kept contacting the Migri health team with the message that, in some cases, asylum seekers had been denied essential and urgent care. A notable example were asylum seekers who had attempted suicide and who in some areas of the country were not being provided any follow-up or </span><a class="topic-link" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/psychiatric-assessment" title="Learn more about psychiatric assessments from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1951" instrument_node="">psychiatric assessments</span></a><span data-dcnode-id="1949" instrument_node=""> after the emergency care received. There were several reports of situations where asylum seekers had to endure long waiting periods to access treatment for mental health conditions including attempted suicide [</span></span><a class="workspace-trigger" data-dcnode-id="1946" href="#bib0130" name="bbib0130"><span data-dcnode-id="1947" instrument_node="">26</span></a><span data-dcnode-id="1945" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="1943" href="#bib0135" name="bbib0135"><span data-dcnode-id="1944" instrument_node="">27</span></a><span data-dcnode-id="1942" instrument_node="">]. As a result, the health team was in constant contact with these public health facilities to provide them with further guidance on asylum seekers rights to the given services.</span></p><p data-dcnode-id="1939" id="par0190"><span data-dcnode-id="1940" instrument_node="">At a later stage, due to continuing poor access to preventive services among children seeking asylum in some municipalities, the issue was brought up to the Parliamentary Ombudsman. Migri health team members gave interviews to the media regarding some of these access problems and the professional organisations of paediatricians and gynaecologists issued statements regarding rights of children and pregnant women to health services irrespective of their immigration status.</span></p></section><section data-dcnode-id="1905" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1934" id="sect0060"><span data-dcnode-id="1937" instrument_node="">4.3</span><span data-dcnode-id="1936" instrument_node="">. </span><span data-dcnode-id="1935" instrument_node="">Coordination mechanisms for asylum seeker health care</span></h3><p data-dcnode-id="1932" id="par0195"><span data-dcnode-id="1933" instrument_node="">In December 2015, due to worrying messages in relation to screening guidance given by some of the regional authorities, MSAH organised a meeting for a large group of stakeholders, including a selection of regional state administrative authorities, hospital districts and municipalities. During the meeting it became clear that there were some very different views regarding how the asylum seeker health care policies should be implemented. For instance, the Hospital District of Helsinki and Uusimaa and the Southern Finland state administrative authority had circulated a mutual guideline to the reception centres in their catchment areas, which recommended a reduced scope and scale of screening and immunisation compared to the national guidance.</span></p><p data-dcnode-id="1930" id="par0200"><span data-dcnode-id="1931" instrument_node="">As a result, at the initiative of MSAH, a national level coordination group was set up, and it included representatives from MSAH, Migri, THL and the Association of Finnish Local and Regional Authorities. However, the coordination meetings were only used for sharing information and clear action points were seldom drawn from the meetings and situation assessments were not systematically compiled. A key MSAH official working on health and social affairs in relation to asylum seekers was placed in the cabinet of the Minister of Social Affairs and Health. Apart from the coordination group, MSAH stewardship seemed to be reacting rather than taking proactive measures.</span></p><p data-dcnode-id="1928" id="par0205"><span data-dcnode-id="1929" instrument_node="">After the December 2015 meeting, it was clear that some regional as well as municipal authorities had decided to deviate from national guidance provided by Migri in the face of the sudden influx of asylum seekers. For different reasons, some cities, hospital districts and regional state administrative agencies as well as the Association of Finnish Local and Regional Authorities were opposed to the national guidance regarding the scope and scale of the health examinations, screenings and immunisations for asylum seekers.</span></p><p data-dcnode-id="1923" id="par0210"><span data-dcnode-id="1927" instrument_node="">Migri as well as other central government officials took several measures to gradually address the inadequacies of asylum seekers’ health services. The Migri health team organised negotiations with municipalities that were not following the national level guidance in order to discuss the underlying issues as well as to find solutions to the growing problems of asylum seekers’ poor access to health services. The general guidance letters to the municipalities that had been issued in early 2016 by MSAH, and while not so effective by mere post, proved useful as a negotiation tool [</span><a class="workspace-trigger" data-dcnode-id="1925" href="#bib0140" name="bbib0140"><span data-dcnode-id="1926" instrument_node="">28</span></a><span data-dcnode-id="1924" instrument_node="">].</span></p><p data-dcnode-id="1918" id="par0215"><span data-dcnode-id="1922" instrument_node="">In retrospect, what probably made the most substantial impact, with respect to the municipal health services and public hospitals, was the involvement of the National Supervisory Authority for Welfare and Health (Valvira), although only at a later stage. Valvira operates under MSAH and has an overall supervisory role in the Finnish health and social service system (</span><a class="workspace-trigger" data-dcnode-id="1920" href="#fig0010" name="bfig0010"><span data-dcnode-id="1921" instrument_node="">Fig. 2</span></a><span data-dcnode-id="1919" instrument_node="">A). The steering and supervisory abilities of MSAH were therefore indirectly strengthened, as Valvira was able to bypass the regional state administrative agencies, which had differing positions on the extent of providing health services for asylum seekers.</span></p><p data-dcnode-id="1906" id="par0220"><span data-dcnode-id="1917" instrument_node="">A lack of accurate and specific data on health among asylum seekers prompted Migri and MSAH to request THL to launch the monitoring of asylum seekers’ health examinations, with a particular emphasis on the implementation of screenings. In the spring of 2016, a first nation-wide survey was sent to the nurses and directors of the reception centres. The results were clear: in the areas of the two regional state agencies that had individual civil servants opposing to the policy, guidance regarding screening had not been followed. Reinforced negotiations with specific problematic municipalities were conducted and further training for the nurses was organised. Six months later, a second survey showed much improved results and it was estimated that a vast majority of asylum seekers had finally been screened according to the guidelines [</span><a class="workspace-trigger" data-dcnode-id="1915" href="#bib0145" name="bbib0145"><span data-dcnode-id="1916" instrument_node="">29</span></a><span data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node="">]. Analysis of national level procurement data for 2015–2016 revealed however that coverage of pulmonary TB screening was 71.6% and that of hepatitis B, HIV or </span><a class="topic-link" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/syphilis" title="Learn more about syphilis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1913" instrument_node="">syphilis</span></a><span data-dcnode-id="1911" instrument_node=""> screenings 60.6% [</span></span><a class="workspace-trigger" data-dcnode-id="1908" href="#bib0150" name="bbib0150"><span data-dcnode-id="1909" instrument_node="">30</span></a><span data-dcnode-id="1907" instrument_node="">].</span></p></section></section><section data-dcnode-id="1793" id="sec0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1900" id="sect0065"><span data-dcnode-id="1903" instrument_node="">5</span><span data-dcnode-id="1902" instrument_node="">. </span><span data-dcnode-id="1901" instrument_node="">Discussion</span></h2><p data-dcnode-id="1898" id="par0225"><span data-dcnode-id="1899" instrument_node="">Prior to the refugee crisis, Finland had been considered to have a relatively functional system for delivering health services for asylum seekers. However, in 2015–2016 this parallel system was tested for the first time in a situation requiring a larger scale implementation of the existing policies. This invariably revealed several weaknesses in the governance of the system, especially in safeguarding the right to health of asylum seekers.</span></p><p data-dcnode-id="1890" id="par0230"><span data-dcnode-id="1897" instrument_node="">Three major hurdles were identified in our review: 1) national level coordination and stewardship over the implementation was not adept nor proactive enough; 2) the parallel healthcare system for asylum seekers is not based on adequate legislative and supervisory frameworks and therefore lacks resources and expertise for effective governance; and 3) discrepancies exist between constitutional rights to health, legal entitlements to municipal health services and national, regional and local guidance available to reception centres, and public and private health facilities.</span></p><dl class="list" data-dcnode-id="1891"><dt class="list-label" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">1)</span></dt><dd class="list-description" data-dcnode-id="1892"><p data-dcnode-id="1893" id="par0235"><span data-dcnode-id="1894" instrument_node="">Ineffectual and reactive national level coordination and stewardship</span></p></dd></dl><p></p><p data-dcnode-id="1888" id="par0240"><span data-dcnode-id="1889" instrument_node="">Migri acknowledged early its insufficient expertise with regards to infection prevention and control but also medical services in general, and sought collaboration with MSAH and THL. Migri agreed with MSAH and THL on recommendations and worked closely together to achieve the common goal of ensuring the access to health care of asylum seekers. However, MSAH and THL contributions took place on an ad hoc basis and the official system and regulations do not acknowledge that cooperation between immigration and health authorities is crucial in ensuring appropriate access to services.</span></p><p data-dcnode-id="1880" id="par0245"><span data-dcnode-id="1887" instrument_node="">Migri only had direct power over the reception centres and their activities, but not over municipalities, hospital districts or regional authorities. If the centre was located in an area where the regional and municipal authorities were inclined to restrict health services for asylum seekers, negotiating with these authorities was the only option for Migri to influence the situation. In some cases, the negotiations did bring some positive results, but altogether it was unfortunate that the central government did not have more leverage over regional and local decisions.</span></p><dl class="list" data-dcnode-id="1881"><dt class="list-label" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">2)</span></dt><dd class="list-description" data-dcnode-id="1882"><p data-dcnode-id="1883" id="par0250"><span data-dcnode-id="1884" instrument_node="">Inadequate legislative and supervisory frameworks leading to ineffective governance</span></p></dd></dl><p></p><p data-dcnode-id="1875" id="par0255"><span data-dcnode-id="1879" instrument_node="">Operating under the Ministry of the Interior, Migri lacked the capacities required to organize parallel health care for a population with specific vulnerabilities and needs. Moreover, stewardship by MSAH was weak and this was, on one hand, due to the practice of organising asylum seekers’ health care through the reception centres, which are not considered </span><a class="topic-link" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/health-care-facility" title="Learn more about health care facilities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1878" instrument_node="">health care facilities</span></a><span data-dcnode-id="1876" instrument_node=""> and therefore not supervised by the regular health care supervisory agencies. On the other hand, the autonomy of the municipalities and relative independent position of regional state administrative agencies enabled them to choose to deviate from national guidance without repercussions.</span></p><p data-dcnode-id="1870" id="par0260"><span data-dcnode-id="1874" instrument_node="">Recent evidence from Canada suggests that institutions may have a strong impact on provision of health care to asylum seekers [</span><a class="workspace-trigger" data-dcnode-id="1872" href="#bib0155" name="bbib0155"><span data-dcnode-id="1873" instrument_node="">31</span></a><span data-dcnode-id="1871" instrument_node="">]. As the health sector is small in Finland, the impact of a few well-placed professionals with different ideas at the supervisory level on others closer to health service delivery may be significant. In the light of this, MSAH stewardship over any delegated supervisory agencies would need reinforcement to prevent deviations from national guidance.</span></p><p data-dcnode-id="1868" id="par0265"><span data-dcnode-id="1869" instrument_node="">A notable exception in the lack of power of MSAH in Finland is the Communicable Disease Act, which was actually updated around the same time. This act provides MSAH with a solid steering function in special situations regarding health care. In fact, the existing preparedness and contingency plans took into consideration large influxes of migrants and the number of migrants reached the predefined minimum threshold for a special situation. However, the Government in power at the time did not consider this particular influx of migrants to be comparable to a special situation or a state of emergency and thus MSAH stewardship by law remained weak.</span></p><p data-dcnode-id="1857" id="par0270"><span data-dcnode-id="1867" instrument_node="">In addition to hurdles due to governance structures, political factors may have influenced MSAH’s reactions on difficulties in health service delivery for asylum seekers. The Government that started in office in spring 2015 resumed the preparations of a wide-ranging health and social care and local government reform, which substantially occupied MSAH civil servants particularly due to the complex preparation process [</span><a class="workspace-trigger" data-dcnode-id="1865" href="#bib0160" name="bbib0160"><span data-dcnode-id="1866" instrument_node="">32</span></a><span data-dcnode-id="1864" instrument_node="">]. Another factor may have been that the government coalition of the time included the populistic Finns party, which has been strongly critical towards Finnish refugee policies. While during the crisis the Minister of Social Affairs and Health came from the Finns party, MSAH may have been hesitant to effectively address the challenges on organising asylum seekers’ health care.</span></p><dl class="list" data-dcnode-id="1858"><dt class="list-label" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">3)</span></dt><dd class="list-description" data-dcnode-id="1859"><p data-dcnode-id="1860" id="par0275"><span data-dcnode-id="1861" instrument_node="">Discrepancies between constitutional rights to health, legal entitlements to services and guidance available</span></p></dd></dl><p></p><p data-dcnode-id="1855" id="par0280"><span data-dcnode-id="1856" instrument_node="">There was a legal framework, including the Finnish constitution and laws on health care and the reception of asylum seekers that outlines the right to health for asylum seekers. Some guidance existed and more was developed along the way to serve national, regional and local stakeholders. In addition, there were existing processes for health service delivery. However, issues with access to services arose for both adult and child asylum seekers, as legislation seemed open to interpretation and the roles in health service delivery remained unclear.</span></p><section data-dcnode-id="1794" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1851" id="sect0070"><span data-dcnode-id="1854" instrument_node="">5.1</span><span data-dcnode-id="1853" instrument_node="">. </span><span data-dcnode-id="1852" instrument_node="">Recommendations for Finland and other countries</span></h3><p data-dcnode-id="1844" id="par0360"></p><dl class="list" data-dcnode-id="1845"><dt class="list-label" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">A.)</span></dt><dd class="list-description" data-dcnode-id="1846"><p data-dcnode-id="1847" id="par0285"><span data-dcnode-id="1848" instrument_node="">Carry out an evaluation of the processes during the crisis and a health system capacity assessment using the WHO-EURO Toolkit</span></p></dd></dl><p></p><p data-dcnode-id="1830" id="par0290"><span data-dcnode-id="1843" instrument_node="">A review commissioned by the Ministry of the Interior released in 2017 concluded that collaboration between the national level and different regional and local actors was a major issue across the board with regards to the response to the migrant crisis in Finland [</span><a class="workspace-trigger" data-dcnode-id="1841" href="#bib0165" name="bbib0165"><span data-dcnode-id="1842" instrument_node="">33</span></a><span data-dcnode-id="1840" instrument_node="">]. While the review did not analyse thoroughly the experiences on organising health services, it would be important to carry out a broad evaluation addressing all relevant actors involved in health care for asylum seekers in 2015–2016 and appraising the responses to the large influx of migrants. In addition, Finland, as well as other countries in Europe, should consider assessing its health system capacity to manage large influxes of asylum-seekers using the WHO-EURO Toolkit to better prepare and adapt for future challenges [</span><a class="workspace-trigger" data-dcnode-id="1838" href="#bib0170" name="bbib0170"><span data-dcnode-id="1839" instrument_node="">34</span></a><span data-dcnode-id="1837" instrument_node="">].</span></p><dl class="list" data-dcnode-id="1831"><dt class="list-label" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">B.)</span></dt><dd class="list-description" data-dcnode-id="1832"><p data-dcnode-id="1833" id="par0295"><span data-dcnode-id="1834" instrument_node="">Define clear roles and tasks for the institutions involved in asylum seekers’ health care</span></p></dd></dl><p></p><p data-dcnode-id="1822" id="par0300"><span data-dcnode-id="1829" instrument_node="">Initially, drawing on the experiences and on the discussion above, it seems obvious that there is a need to reconsider how health service delivery for asylum seekers is organised in Finland. While Migri’s role and responsibilities with regards to organising health care for asylum seekers need to be re-evaluated, the general supervisory authority for health and social services, Valvira, under the auspices of MSAH, should assume more responsibility in supervising the activities of the reception centres and health services procured by them. The cooperation mechanisms should be rendered more effective by defining clear and synergistic roles for different institutions and especially by narrowing down the divides between MSAH and the Ministry of Interior and the institutions they delegate power to.</span></p><dl class="list" data-dcnode-id="1823"><dt class="list-label" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">C.)</span></dt><dd class="list-description" data-dcnode-id="1824"><p data-dcnode-id="1825" id="par0305"><span data-dcnode-id="1826" instrument_node="">Strengthen the legal framework by identifying vulnerable groups and their needs and provide clearer guidance on implementing the policies to all health professionals</span></p></dd></dl><p></p><p data-dcnode-id="1814" id="par0310"><span data-dcnode-id="1821" instrument_node="">In spite of the right to health for asylum seekers being formally recognised, there is a need to strengthen the legal framework to safeguard this. Identifying vulnerable groups and their needs should be a priority in order to improve their access to needed services. The legislation should also clarify the roles of different stakeholder within the process of health service delivery. Similarly, although standards and guidelines for implementing policy are available, they should provide clearer guidance to all health professionals and be more widely disseminated.</span></p><dl class="list" data-dcnode-id="1815"><dt class="list-label" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">D.)</span></dt><dd class="list-description" data-dcnode-id="1816"><p data-dcnode-id="1817" id="par0315"><span data-dcnode-id="1818" instrument_node="">Move away from emergency response to an individualised and integrated care</span></p></dd></dl><p></p><p data-dcnode-id="1803" id="par0320"><span data-dcnode-id="1813" instrument_node="">Finland approached the refugee crisis and health needs of asylum seekers in a reactive way: an emergency response. This may not be the most effective way to provide health care to asylum seekers and therefore it would be important to reconsider health service delivery to asylum seekers as a whole. Puchner et al. (2018) concluded that European countries have failed to address important issues in relation to asylum seeker health care, including vulnerable groups and their specific needs. Moving away from an emergency response to more planned and individualised care is the direction European countries should take [</span><a class="workspace-trigger" data-dcnode-id="1811" href="#bib0175" name="bbib0175"><span data-dcnode-id="1812" instrument_node="">35</span></a><span data-dcnode-id="1810" instrument_node="">].</span></p><dl class="list" data-dcnode-id="1804"><dt class="list-label" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">E.)</span></dt><dd class="list-description" data-dcnode-id="1805"><p data-dcnode-id="1806" id="par0325"><span data-dcnode-id="1807" instrument_node="">Consider alternatives to the parallel health system to improve continuity of care and integration to the national health system</span></p></dd></dl><p></p><p data-dcnode-id="1795" id="par0330"><span data-dcnode-id="1802" instrument_node="">An option for Finland could be to abolish the current parallel system and provide health services for asylum seekers within regular public sector health care. Some European countries such as Austria run a similar parallel system, while others including the UK allow asylum seekers to access to the National Health Service [</span><a class="workspace-trigger" data-dcnode-id="1800" href="#bib0180" name="bbib0180"><span data-dcnode-id="1801" instrument_node="">36</span></a><span data-dcnode-id="1799" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="1797" href="#bib0185" name="bbib0185"><span data-dcnode-id="1798" instrument_node="">37</span></a><span data-dcnode-id="1796" instrument_node="">]. This can be especially important when it comes to preventive services, as the public sector has the knowhow and experience in providing them. It would facilitate the continuum of care as well as integration of asylum seekers into the health system, as a large part of them eventually become Finnish residents.</span></p></section></section><section data-dcnode-id="1784" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1789" id="sect0075"><span data-dcnode-id="1792" instrument_node="">6</span><span data-dcnode-id="1791" instrument_node="">. </span><span data-dcnode-id="1790" instrument_node="">Conclusions</span></h2><p data-dcnode-id="1787" id="par0335"><span data-dcnode-id="1788" instrument_node="">Before the migrant crisis, Finland had existing policy and preparedness plans at national level as well as a basic overall structure to provide health services to asylum seekers. The structure however faced challenges in the context of a large influx of migrants over the course of just a few weeks. Policies and roles of the different actors were not clear. This first-time large-scale implementation of the policies exposed weaknesses in the legal framework and the health system as a whole.</span></p><p data-dcnode-id="1785" id="par0340"><span data-dcnode-id="1786" instrument_node="">In summary, a lack of will and means to cooperate, inadequate coordination and supervisory structures at different levels and the reactive leadership approach exposed worrying aspects of the extreme decentralisation and weak stewardship of health care in Finland. Our review of the right to health of asylum seekers from a governance perspective during the migrant crisis in Finland, prompts a proposal to abolish any parallel system of asylum seekers’ health services, and to integrate them to the national public health care system and its supervisory framework.</span></p></section></div><section data-dcnode-id="1778" id="coi0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1781" id="sect0080"><span data-dcnode-id="1782" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="1779" id="par0350"><span data-dcnode-id="1780" instrument_node="">KT, PT, OH have all worked as medical experts on refugee health at the National Institute for Health and Welfare and as part of the Finnish Immigration Service health team. IK is asked to advise the Finnish Ministry of Social Affairs and Health from time to time regarding issues related to health and health care policies.</span></p></section><section data-dcnode-id="1773" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1776" id="sect0085"><span data-dcnode-id="1777" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="1774" id="par0355"><span data-dcnode-id="1775" instrument_node="">The authors would like to thank Taneli Puumalainen for his valuable advice and Benjamin Ayeboa-Sallah for proofreading.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="1765"><button class="button button-anchor" data-dcnode-id="1769" type="button"><span class="button-text" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="1766" type="button"><span class="button-text" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="1764"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="383" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="384" id="bibs0005"><dl class="references" data-dcnode-id="385" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="1759"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="1760" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="1761" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="1725" id="sbref0005"><div class="contribution" data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">European Commission</span><div data-dcnode-id="1755" id="ref-id-sbref0005"><strong class="title" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Record number of over 1.2 million first time asylum seekers registered in 2015</span></strong></div></div><div class="host" data-dcnode-id="1742"><span data-dcnode-id="1753" instrument_node="">Eurostat Newsrelease</span><span data-dcnode-id="1751" instrument_node=""> (</span><span data-dcnode-id="1749" instrument_node="">2016</span><span data-dcnode-id="1747" instrument_node="">)</span><span data-dcnode-id="1745" instrument_node="">, p. </span><span data-dcnode-id="1743" instrument_node="">44</span></div><div class="comment" data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">Available at: </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/eu
