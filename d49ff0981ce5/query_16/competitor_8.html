ode="">)</span></div><div class="comment" data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">Available at: </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumineurope.org/reports/country/united-kingdom/reception-conditions/health-care" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="394" instrument_node="">http://www.asylumineurope.org/reports/country/united-kingdom/reception-conditions/health-care</span></a><span data-dcnode-id="392" instrument_node="">. (Accessed 9 July 2019)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="387"><span data-dcnode-id="390" instrument_node=""></span><a aria-describedby="ref-id-sbref0185" class="link" data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DUnited%2520Kingdom%3A%2520reception%2520conditions%2520%2520internet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="389" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="293" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="294"><div class="PageDivider" data-dcnode-id="382"></div><header data-dcnode-id="379" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Cited by (4)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="295"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="296"><ul data-dcnode-id="298"><li class="ListArticleItem" data-dcnode-id="343"><div class="sub-heading" data-dcnode-id="373"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666623521000106" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="377" id="citing-articles-article0-title"><span data-dcnode-id="378" instrument_node="">COVID-19 outbreak at a reception centre for asylum seekers in Espoo, Finland</span></h3></a><div class="article-source ellipsis" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2021, Journal of Migration and Health</span></div></div><div class="buttons" data-dcnode-id="367"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="368" type="button"><span class="button-link-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="369" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="370"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="344"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="345" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="346"><p data-dcnode-id="363" id="spara002"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Background</span></strong><span data-dcnode-id="364" instrument_node=""> shared accommodation may increase the risk of SARS-CoV-2 transmission. In April 2020, an increasing number of asylum seekers at a reception centre in Espoo, Finland presented with COVID-19 despite earlier implementation of preventive measures. We decided to screen the entire population of the centre for SARS-CoV-2.</span></p><p data-dcnode-id="359" id="spara003"><strong data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Methods</span></strong><span data-dcnode-id="360" instrument_node=""> we offered nasopharyngeal swab collection and SARS-CoV-2 real-time polymerase chain reaction (RT-PCR) analysis to the centre's clients. Symptoms were recorded at the time of diagnostic sample collection using electronic forms and followed up for two weeks through phone interviews and a review of medical records.</span></p><p data-dcnode-id="355" id="spara004"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Findings</span></strong><span data-dcnode-id="356" instrument_node=""> 260 clients were screened. Of them, 96 (37%) were found positive for SARS-CoV-2 and isolated. The high attack rate prompted the local public health authority to set the other clients in quarantine for 14 days to prevent further spread. Of the positive cases, 61 (64%) reported having had symptoms at the time of the screening or one week prior. Of the 35 initially asymptomatic individuals, 12 developed symptoms during follow-up, while 23 (or 18% of all screened SARS-CoV-2 positive clients) remained asymptomatic. No widespread transmission of COVID-19 was detected after the quarantine was lifted.</span></p><p data-dcnode-id="351" id="spara005"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Interpretation</span></strong><span data-dcnode-id="352" instrument_node=""> in this large COVID-19 outbreak, voluntary mass screening provided valuable information about its extent and helped guide the public health response. Comprehensive quarantine and isolation measures were likely instrumental in containing the outbreak.</span></p><p data-dcnode-id="347" id="spara006"><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Funding</span></strong><span data-dcnode-id="348" instrument_node=""> Finnish Institution for Health and Welfare, Finnish Immigration Agency, City of Espoo</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="321"><div class="sub-heading" data-dcnode-id="337"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168851020302608" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="341" id="citing-articles-article1-title"><span data-dcnode-id="342" instrument_node="">An overview of health policies for asylum-seekers in Germany</span></h3></a><div class="article-source ellipsis" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">2021, Health Policy</span></div></div><div class="buttons" data-dcnode-id="331"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="332" type="button"><span class="button-link-text" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="333" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="334"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="322"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="323" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="324"><p data-dcnode-id="329" id="spar0020"><span data-dcnode-id="330" instrument_node="">Health policies for asylum-seekers are a subject of debate across European countries. However, information on current strategies to respond to these populations’ health needs is scarce. To facilitate comparative research, this paper renders a detailed overview of Germany’s asylum-seeker health policies.</span></p><p data-dcnode-id="327" id="spar0025"><span data-dcnode-id="328" instrument_node="">Following a description of the historic development and administrative structure of asylum-seeker health care in Germany, we provide a detailed account of asylum-seekers’ scope of health entitlements, as it is defined by federal law. We explain the main mechanisms that are used to implement the law on local levels and regulate health care access; namely, the electronic health insurance card and the health care voucher. Financing and billing structures are described, and main points of critique of Germany’s asylum-seeker health policies are summarized.</span></p><p data-dcnode-id="325" id="spar0030"><span data-dcnode-id="326" instrument_node="">Our description highlights fragmentation and internal variations as central features of Germany’s asylum-seeker health policies. It explicates how these features are rooted in decentralization, and in the regulation of restricted health benefits through a parallel system, separate from statutory health insurance. As a case-study, Germany’s asylum-seeker health policies illustrate the administrative, economic and ethical burdens implied in granting health benefits through a parallel system, and in absence of central health governance. The (re)integration of asylum-seeker health care in statutory health insurance could reduce these burdens and contribute to equitable health care access.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="315"><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168851019301939" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="319" id="citing-articles-article2-title"><span data-dcnode-id="320" instrument_node="">Health policies and mixed migration – Lessons learnt from the ‘Refugee Crisis’</span></h3></a><div class="article-source ellipsis" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">2019, Health Policy</span></div></div><div class="buttons" data-dcnode-id="314"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="299"><div class="sub-heading" data-dcnode-id="304"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.33134/njmr.389" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="308" id="citing-articles-article3-title"><span data-dcnode-id="309" instrument_node="">How to be a 'good Asylum Seeker'? The subjectification of young men Seeking Asylum</span></h3></a><div class="article-source ellipsis" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2021, Nordic Journal of Migration Research</span></div></div><div class="buttons" data-dcnode-id="303"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="300"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="301" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="302"></div></div></div></li></ul><span data-dcnode-id="297" instrument_node=""></span></div></div></section></div><div class="Footnotes" data-dcnode-id="281"><dl class="footnote" data-dcnode-id="282"><dt class="footnote-label" data-dcnode-id="289"><sup data-dcnode-id="290"><a data-dcnode-id="291" href="#baep-article-footnote-id7"><span data-dcnode-id="292" instrument_node="">☆</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="283"><p data-dcnode-id="284" id="npar0005"><span data-dcnode-id="288" instrument_node="">© 2019 The Authors. Published by Elsevier B.V. This is an open access article under the CC BY-NC-NDlicense (</span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank
