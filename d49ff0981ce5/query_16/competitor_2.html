</span><div class="field-body" data-dcnode-id="413"><p data-dcnode-id="424"><b data-dcnode-id="426"><i data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Essentials of Asylum Law</span></i></b><span data-dcnode-id="425" instrument_node=""> provides an overview of asylum law for advocates new to representing asylum clients, as well as for seasoned practitioners needing a thorough review of current standards. This edition addresses the whirlwind of new policies impacting the asylum process under the Trump administration while highlighting active legal challenges to these attempts to limit the asylum process.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">Combining up-to-date caselaw, legal arguments on currently developing issues, and decades of expertise from accomplished practitioners who have successfully represented clients through the years, </span><i data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Essentials of Asylum Law</span></i><span data-dcnode-id="419" instrument_node=""> offers an expansive explanation of the legal theories and rules underpinning an asylum claim. The manual explores each of the legal elements of an asylum claim, beginning with the definition of persecution and the requirements to demonstrate a “well-founded fear” of persecution. An extensive discussion of the five enumerated grounds follows, including a detailed overview of the </span><i data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">nexus </span></i><span data-dcnode-id="416" instrument_node="">requirement and current formulations of particular social groups. This manual also explores the bars to asylum, as well as alternative relief options—Withholding of Removal and protection under the Convention Against Torture—for those that do not qualify for asylum.</span></p><span data-dcnode-id="414" instrument_node="">
</span></div><span data-dcnode-id="412" instrument_node="">
