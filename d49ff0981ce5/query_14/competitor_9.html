</span><article class="post-8721 page type-page status-publish has-post-thumbnail hentry category-toolkit" data-dcnode-id="353" id="post-8721" itemscope="" itemtype="http://schema.org/WebPage" role="article"><span data-dcnode-id="1351" instrument_node="">
</span><section class="entry-content" data-dcnode-id="366" itemprop="articleBody" style="padding-bottom:3rem"><span data-dcnode-id="1350" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1344"><a class="hollow button float-right" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/resources/toolkit/whatisasylum.pdf"><span data-dcnode-id="1349" instrument_node="">pdf/print page </span><i class="fi-page-pdf" data-dcnode-id="1348"></i><span data-dcnode-id="1347" instrument_node=""> </span><i class="fi-print" data-dcnode-id="1346"></i></a></div><span data-dcnode-id="1343" instrument_node="">
</span><div class="wp-container-1 wp-block-group callout lead" data-dcnode-id="1324"><div class="wp-block-group__inner-container" data-dcnode-id="1325"><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">If you have come to the UK and you need to stay because you would be in danger in the country where you are from or where you normally live, you can claim asylum.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">By claiming asylum, you are asking the UK government to give you protection. This is often called </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">international protection</span></em><span data-dcnode-id="1335" instrument_node=""> because the UK has signed an international agreement along with lots of other countries to protect some people who have had to leave their own country. This agreement is the 1951 Refugee Convention.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">This page looks at what you need to show to be granted asylum (to win your asylum claim and be granted Refugee Status or Humanitarian Protection. Read this page to find out how your asylum claim will be decided in the UK. You can find information on this page about a claim based on danger specific to you, or danger to everyone where you’re from.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1329" instrument_node="">On this page you can also find out who can be excluded from refugee protection.</span><br data-dcnode-id="1328"></p><span data-dcnode-id="1326" instrument_node="">
</span></div></div><span data-dcnode-id="1323" instrument_node="">

</span><h3 class="toolkit section-title" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">What is an asylum claim?</span></h3><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">To be granted asylum (to get refugee status), you need to show that you have a </span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">well-founded fear of persecution</span></strong><span data-dcnode-id="703" instrument_node="">.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">This phrase is from the </span><span aria-describedby="qrbwks-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="698" data-disable-hover="false" data-resize="qrbwks-tooltip" data-toggle="qrbwks-tooltip" data-tooltip="jf3z4v-tooltip" data-yeti-box="qrbwks-tooltip" title=""><span data-dcnode-id="699" instrument_node="">Refugee Convention</span></span><span data-dcnode-id="697" instrument_node="">. The Refugee Convention covers fear of persecution, if that persecution would be because of your frace, religion, nationality, political opinion, or your membership of a particular social group. You can find out more about all of these below.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">To get protection from the UK government, you will also need to show that you cannot get protection in your own country. Read below for more information.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">Your asylum claim is your application for protection in the UK. In this claim, you explain, through your own words (spoken and written) and through evidence, that you fear returning to your country. You need to say what you think will happen to you if you go back. Who would do this to you? Why would they do this? Why do you think this will happen to you? Have things happened to you in the past? Have things happened to people you know or people like you? Remember, you need to show that your fear is </span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">well-founded</span></strong><span data-dcnode-id="688" instrument_node=""> – is it likely to happen?</span></p><span data-dcnode-id="686" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Persecution</span></h3><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="673"><strong data-dcnode-id="678"><span data-dcnode-id="682" instrument_node="">Persecution, in terms of claiming asylum, is serious, targeted mistreatment of an </span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">individual</span></em><span data-dcnode-id="679" instrument_node=""> </span></strong><span data-dcnode-id="677" instrument_node="">because of who they are, or what they do, or what people think they are or do. It is mistreatment of someone because of their </span><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">identity</span></strong><span data-dcnode-id="674" instrument_node="">.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="671" instrument_node="">The </span><span aria-describedby="0yqu10-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="669" data-disable-hover="false" data-resize="0yqu10-tooltip" data-toggle="0yqu10-tooltip" data-tooltip="qd3iyt-tooltip" data-yeti-box="0yqu10-tooltip" title=""><span data-dcnode-id="670" instrument_node="">rules</span></span><span data-dcnode-id="668" instrument_node=""> that the Home Office use to decide asylum claims say that persecution is an act that is sufficiently serious by its nature or repetition as to constitute a severe violation of a basic human right. Persecution could also be an </span><span aria-describedby="i0sp7p-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="666" data-disable-hover="false" data-resize="i0sp7p-tooltip" data-toggle="i0sp7p-tooltip" data-tooltip="ubo6wv-tooltip" data-yeti-box="i0sp7p-tooltip" title=""><span data-dcnode-id="667" instrument_node="">accumulation</span></span><span data-dcnode-id="665" instrument_node=""> of various measures which would make it sufficiently serious.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">The rules say that an act of persecution could include (but there may be other actions that are not in this list):</span></p><span data-dcnode-id="660" instrument_node="">
</span><ul data-dcnode-id="649"><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">an act of physical or mental violence, including an act of sexual violence</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">a legal, administrative, police, or judicial measure which in itself is discriminatory or which is implemented in a discriminatory manner</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">prosecution or punishment which is disproportionate or discriminatory</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">denial of judicial redress resulting in a disproportionate or discriminatory punishment</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">prosecution or punishment for refusal to perform military service in a conflict, where performing military service would include crimes or acts falling within the grounds for exclusion (meaning a crime against peace, a war crime or a crime against humanity)</span></li></ul><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="644"><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Discrimination</span></em><span data-dcnode-id="645" instrument_node=""> is not the same as persecution, but if it is repeated or is very serious, it may then be considered persecution.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Many people seeking safety in the UK are fleeing war and widespread violence rather than individual persecution because of their identity. If the risk to you isn’t specific persecution, you may be considered for a different kind of protection. See “Widespread harm” section below.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Well-founded fear</span></h3><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">To succeed in your  asylum claim, you need to show that you have a “well-founded fear” of persecution if you were returned to your home country. This means you do not need to show that the persecution would definitely happen, but that there is a </span><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">real risk</span></strong><span data-dcnode-id="633" instrument_node=""> it could happen.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">Having been persecuted in the past does not necessarily mean you will get refugee status. You need to show there is a </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">future</span></strong><span data-dcnode-id="627" instrument_node=""> risk.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="624" instrument_node="">To show this fear is well-founded, you will need to provide </span><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">evidence</span></strong><span data-dcnode-id="621" instrument_node="">. Read more about evidence on the </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/evidence"><span data-dcnode-id="620" instrument_node="">Evidence page of our guide</span></a><span data-dcnode-id="618" instrument_node="">.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">The evidence that everyone has is their story – what has happened to you, what have you been threatened with, what has happened to your family/colleagues/people you know. Do these things mean you are at risk? Why did you leave? Why can’t you go back?</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="612" instrument_node="">In many people’s cases the </span><span aria-describedby="crymy7-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="610" data-disable-hover="false" data-resize="crymy7-tooltip" data-toggle="crymy7-tooltip" data-tooltip="sb055s-tooltip" data-yeti-box="crymy7-tooltip" title=""><span data-dcnode-id="611" instrument_node="">UK Home Office</span></span><span data-dcnode-id="609" instrument_node="">, will not believe your story. If you are able to go to court and </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/appeals"><span data-dcnode-id="608" instrument_node="">appeal</span></a><span data-dcnode-id="606" instrument_node=""> the Home Office refusal of your claim, the judge may also not believe your story.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">Try and obtain other evidence to support your story. You </span><em data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">should not wait</span></em><span data-dcnode-id="600" instrument_node=""> for the Home Office or courts to say they do not believe you before you try and get evidence to support what you have said.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Are there witnesses to things that happened to you? Have you got documents that prove any part of your story? These might include arrest warrants, court documents, letters from friends/organisations showing you are in danger. Is there newspaper coverage of an event you are talking about? Are there human rights reports that show the situation in your country is like you say it is?</span></p><span data-dcnode-id="595" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Grounds for an asylum claim</span></h3><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">To qualify for refugee status, you need to show you have been persecuted or will be persecuted because of one of the Refugee Convention grounds. These grounds are:</span></p><span data-dcnode-id="589" instrument_node="">
</span><ul data-dcnode-id="578"><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">race</span></li><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">religion</span></li><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">nationality</span></li><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">political opinion</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">membership of a particular social group (this is explained below).</span></li></ul><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">You do not need to specify or say in legal language which of these Refugee Convention grounds you are applying under. Your case may actually come under more than one of these grounds. You tell the Home Office your reasons for fleeing, and they then consider which grounds this comes under. If you feel you have been refused because they applied the wrong grounds, this could be challenged.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">You may be at risk of persecution because of </span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">imputed identity or beliefs</span></strong><span data-dcnode-id="570" instrument_node="">. This means what people think you are or do. What people think you are, or do, could put you at risk of persecution even if it’s not true.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="567" instrument_node="">For example, if your local community </span><em data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">thinks or says</span></em><span data-dcnode-id="564" instrument_node=""> you are a Christian or an atheist, this may put you in danger even if you are not actually a Christian or atheist. If your family and neighbours </span><em data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">believe</span></em><span data-dcnode-id="561" instrument_node=""> you are gay or lesbian, you might be at risk even if you are not gay/lesbian. You may not actually be a member of an at-risk political group, but someone might spread rumours that you are, to try and get you in trouble.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Imputed beliefs might be a factor if a family member or friend is politically active or a member of a religious minority, and it is assumed you also hold these beliefs.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Imputed beliefs may be assumed because of where you live, the job you do, and many other things outside of your control.</span></p><span data-dcnode-id="553" instrument_node="">
</span><h4 class="toolkit section-subtitle" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Particular social group</span></h4><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Particular social group is the most complicated area of the Refugee Convention grounds. This is because it is quite vague and can cover a variety of situations. This category is reliant on previous cases that have been used to define how the law should be applied or understood.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="540"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Gender</span></strong><span data-dcnode-id="544" instrument_node=""> and </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">sexuality</span></strong><span data-dcnode-id="541" instrument_node=""> are not distinct Refugee Convention grounds but come under particular social group. Gender as a particular social group needs to be more narrowly defined than just “being a woman” or “being a man”. A certain category of women or men who face gender-specific persecution may fall under this category, such as “women at risk of domestic violence in Pakistan”.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The category of particular social group is particularly important when dealing with non-state actors of persecution (see below). This is because in these situations, the Home Office often say that you may be in danger, but not for a Refugee Convention reason. This would mean that the UK has no obligation to offer protection. This may include gang violence, blood feuds and other communal disputes.</span></p><span data-dcnode-id="536" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Who are you at risk from?</span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">You may fear persecution from the state and/or its agents such as the army or the police. If this is the case, it is fairly clear why you would be “unable or unwilling” to seek protection from the state, to use the words of the Refugee Convention.</span></p><span data-dcnode-id="530" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="526"><img alt="" class="wp-image-12117 lazyload" data-dcnode-id="529" data-src="https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-1024x522.jpg" data-srcset="https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-1024x522.jpg 1024w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-300x153.jpg 300w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-768x392.jpg 768w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted.jpg 1200w" height="522" sizes="(max-width: 1024px) 100vw, 1024px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1024"><noscript data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">&lt;img width="1024" height="522" src="https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-1024x522.jpg" alt="" class="wp-image-12117 lazyload" srcset="https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-1024x522.jpg 1024w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-300x153.jpg 300w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted-768x392.jpg 768w, https://righttoremain.org.uk/wp-content/uploads/2019/07/wanted.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">You may fear persecution from people that aren’t officially recognised as the state, but are in effective control of a country or part of the country. Examples of this in recent years could be Al-Shabaab in areas of Somalia, or ISIS in Iraq. Again, it should be fairly easy to explain why you cannot get protection from the “state” in these circumstances.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">Persecution might also come from&nbsp;</span><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">“non-state actors”</span></strong><span data-dcnode-id="518" instrument_node="">, such as a member of your family or community, a gang, religious or political opponents.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="515" instrument_node="">To qualify for Refugee Status because you fear persecution from a non-state actor, you must show that you&nbsp;</span><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">cannot be protected from this persecution by the state.</span></strong><span data-dcnode-id="512" instrument_node=""> This may be because there is </span><span aria-describedby="gq44wo-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="510" data-disable-hover="false" data-resize="gq44wo-tooltip" data-toggle="gq44wo-tooltip" data-tooltip="tffah7-tooltip" data-yeti-box="gq44wo-tooltip" title=""><span data-dcnode-id="511" instrument_node="">no protection available</span></span><span data-dcnode-id="509" instrument_node=""> from your government, or it may be that asking for protection would put you in danger.</span></p><span data-dcnode-id="507" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Internal relocation</span></h3><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Another factor that will be considered when deciding if you need protection in the UK is whether there is somewhere else in your country you could go and be safe.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The Home Office may accept that you would be at risk in your home region of Afghanistan but argue that you would be safe if you relocated to the capital Kabul. Or they may accept that you may be at risk of persecution because of your clan identity in the capital Mogadishu, but argue that you would be safe in Somaliland because your clan has protection from a majority clan there.</span></p><span data-dcnode-id="498" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="494"><img alt="" class="wp-image-12067 lazyload" data-dcnode-id="497" data-src="https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation.jpg" data-srcset="https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation.jpg 813w, https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation-300x123.jpg 300w, https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation-768x314.jpg 768w" height="332" sizes="(max-width: 813px) 100vw, 813px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="813"><noscript data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&lt;img width="813" height="332" src="https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation.jpg" alt="" class="wp-image-12067 lazyload" srcset="https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation.jpg 813w, https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation-300x123.jpg 300w, https://righttoremain.org.uk/wp-content/uploads/2019/07/internal-relocation-768x314.jpg 768w" sizes="(max-width: 813px) 100vw, 813px" /&gt;</span></noscript></figure><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">To show that internal relocation is not going to protect you, you would either need to prove that the risk you face would follow you to where you were relocated (e.g. you would be tracked down by those trying to harm you), or that you may be safe from persecution but&nbsp;</span><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">other risks</span></strong><span data-dcnode-id="489" instrument_node="">&nbsp;would present themselves.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">This may be because you have no family or social networks in the place it is being suggested you could internally relocate to, and could not safely begin a new life there. Economic and social factors should be considered here – would you be able to make a living if you didn’t know anyone and had no social, religious or ethnic connections? If you couldn’t make a living, what would happen to you?</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">The Home Office (and the courts, if you appeal) will consider whether asking you to relocate within your country would be&nbsp;</span><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">“unduly harsh”</span></em><span data-dcnode-id="480" instrument_node="">.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p class="toolkit section-title" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Widespread violence</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Refugee Status should be granted if you can show you are at risk of serious, targeted mistreatment of an individual because of who you are, or what you do, or what people think you are or do. If you are fleeing war or violence that is harming or could harm many people – not you specifically – you may not qualify for Refugee Status.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">You may, instead, have your case decided under&nbsp;a different part of the Refugee Convention that provides protection in a situation of a</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="466"><em data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">“serious and individual threat to a civilian’s life or person by reason of indiscriminate violence in situations of international or internal armed conflict.”</span></em></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">This includes situations where civilians are at serious risk simply by being present in a place of armed conflict or where other indiscriminate violence is widespread.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">Very few situations have been ruled to meet this definition, but if they do then&nbsp;</span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/asylumdecision/%23hp"><span data-dcnode-id="460" instrument_node="">Humanitarian Protection</span></a><span data-dcnode-id="458" instrument_node="">&nbsp;may be granted.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p class="toolkit section-title" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">How the Home Office decides asylum claims</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="452" instrument_node="">When you claim asylum, the Home Office will consider what you say in your </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/screening/"><span data-dcnode-id="451" instrument_node="">screening interview</span></a><span data-dcnode-id="449" instrument_node="">, your </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/preliminary-information-questionnaires-an-update/"><span data-dcnode-id="448" instrument_node="">preliminary information questionnaire</span></a><span data-dcnode-id="446" instrument_node=""> if you submit one, and your bigger </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/asylumiv/"><span data-dcnode-id="445" instrument_node="">substantive interview</span></a><span data-dcnode-id="443" instrument_node="">. </span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">They will use this information to decide if they think you have a well-founded fear of persecution (or more widespread violence). They will decide if that persecution falls under one of the Refugee Convention grounds. They will also consider whether you could be protected from harm by your own government, or whether you could live somewhere else in your country to be safe.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">As well as looking at the records of your interviews and any statements or evidence you give to them, the Home Office will use their own </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/collections/country-policy-and-information-notes"><span data-dcnode-id="436" instrument_node="">guidance documents</span></a><span data-dcnode-id="434" instrument_node=""> about your country to make their </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/asylumdecision/"><span data-dcnode-id="433" instrument_node="">decision</span></a><span data-dcnode-id="431" instrument_node="">. </span></p><span data-dcnode-id="429" instrument_node="">
</span><p class="toolkit section-title" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Evidence to support an asylum claim</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">At the early stages of an asylum claim, your evidence may just be your testimony (your story) about what has happened to you and/or what you think may happen, and why that means it is not safe to return to your country.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">You may also have evidence in the form of documents that you want to give to the Home Office (and later the courts, if you are appealing a refual).</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">If you are going to submit documents, make sure you know where they came from. Who sent them to you? How did they get them? If posted to you, keep the envelope they came in and any other proof of postage. Wherever possible, you need to submit original documents, not photocopies or scans. If they are in a language other than English, you (or your lawyer, if you have one) will need to get a formal translation.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Never submit documents if you are not sure they are genuine – this could seriously damage your case. If possible, your lawyer should get an expert on your country/reason for claiming asylum to comment on whether they are genuine. This is because the Home Office often say that documentary evidence is fake.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="413" instrument_node="">In addition to documentary evidence specific to your case, general information about the situation in your country from reliable sources may be useful. This is sometimes called </span><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">“objective evidence”</span></em><span data-dcnode-id="410" instrument_node="">. This may show that what you have experienced fits a pattern of human rights abuses or persecution in your country of origin. This is particularly important if you were persecuted by a state official such as a police officer or army officer. You will need to demonstrate that the state cannot protect you from these people because state officials are routinely </span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">involved</span></em><span data-dcnode-id="407" instrument_node=""> in these abuses, and that it was not just a one-off attack which would be unlikely to happen again.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">Read more about Evidence </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/evidence"><span data-dcnode-id="403" instrument_node="">here</span></a><span data-dcnode-id="401" instrument_node="">.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p class="toolkit section-title" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Exclusion from protection</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">In some cases, the Home Office may take the view that a person should be </span><span aria-describedby="pd02dk-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="393" data-disable-hover="false" data-resize="pd02dk-tooltip" data-toggle="pd02dk-tooltip" data-tooltip="nthszf-tooltip" data-yeti-box="pd02dk-tooltip" title=""><span data-dcnode-id="394" instrument_node="">excluded from protection</span></span><span data-dcnode-id="392" instrument_node=""> under the Refugee Convention.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">This can happen in cases where the person has committed a serious criminal offence, or where the Home Office considers they may have been involved in human rights violations in their country of origin. This is a broad definition, and can extend to people who were employed in a wide range of roles in the government in their countries of origin if that government was involved in human rights abuses.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">One stage of the process where the Home Office will try and find out if the exclusion clause applies to you is during the&nbsp;</span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/screening"><span data-dcnode-id="385" instrument_node="">screening interview</span></a><span data-dcnode-id="383" instrument_node="">. They will ask you questions about criminal convictions, arrest warrants, involvement in terrorism, detention as an enemy combatant and encouragement of hatred between communities. The Home Office will also seek this information from elsewhere if they suspect it to be the case.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="380" instrument_node="">If the Home Office raise exclusion in your case, or if you feel it is a possibility, it is very important to seek legal advice. You can appeal against being excluded from Refugee Status or Humanitarian Protection. Even if an exclusion is upheld, you may be allowed to stay if could be at risk of </span><span aria-describedby="y1ctbp-tooltip" aria-haspopup="true" class="has-tip" data-dcnode-id="378" data-disable-hover="false" data-resize="y1ctbp-tooltip" data-toggle="y1ctbp-tooltip" data-tooltip="wzqaof-tooltip" data-yeti-box="y1ctbp-tooltip" title=""><span data-dcnode-id="379" instrument_node="">torture, inhuman or degrading treatment/punishment</span></span><span data-dcnode-id="377" instrument_node=""> if you were returned. </span></p><span data-dcnode-id="375" instrument_node="">
</span><div class="wp-container-4 wp-block-buttons" data-dcnode-id="368"><span data-dcnode-id="374" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="370"><a class="wp-block-button__link no-border-radius" data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/claimasylum"><strong data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Now read: Claim Asylum page</span></strong></a></div><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
