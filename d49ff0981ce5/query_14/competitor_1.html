"399"><p data-dcnode-id="431"></p><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">As large numbers of migrants from Central America have fled to the U.S. in recent years, there’s been a lot of talk about the asylum process and how it works in the U.S.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Asylum grants are just a tiny part of America’s vast and complicated immigration system, but the process is widely misunderstood and mischaracterized, even by the government leaders responsible for managing it.</span></p><span data-dcnode-id="425" instrument_node="">
</span><blockquote data-dcnode-id="413"><p data-dcnode-id="414"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">FOR EDUCATORS</span></strong><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">
Want to your students to discuss this Above the Noise episode with peers from around the country? Sign up for KQED Learn (</span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.kqed.org/"><span data-dcnode-id="420" instrument_node="">https://learn.kqed.org/</span></a><span data-dcnode-id="418" instrument_node="">) and join the conversation (</span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.kqed.org/topics"><span data-dcnode-id="417" instrument_node="">https://learn.kqed.org/topics</span></a><span data-dcnode-id="415" instrument_node="">)!</span></p></blockquote><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="409"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">What does it mean to seek asylum in the U.S.?</span></strong></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">That’s when people from other countries come to the U.S. and ask to remain permanently because they fear being persecuted if returned home. Asylum seekers are similar to refugees. The main difference is that refugees apply for immigration status before they arrive in the U.S., while those seeking asylum usually just show up at a point of entry or enter with a temporary visa and apply for protected status. And although there’s a cap on the number of refugees admitted each year, the number of asylum grants is left open-ended.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="402"><strong data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">How does someone qualify for asylum?</span></strong></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="400"></p></div></span><div class="components-Ad-___Ad__ad components-Ad-___Ad__ad__fullwidth" data-dcnode-id="392"><div data-dcnode-id="393"><div class="components-Ad-___Ad__ad_Wrapper" data-dcnode-id="394"><span class="components-Ad-___Ad__ad_Label" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Sponsored</span></span><div class="components-Ad-___Ad__ad_Img" data-dcnode-id="395"></div></div></div></div><span data-dcnode-id="335"><div class="post-body" data-dcnode-id="337"><p data-dcnode-id="391"></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Asylum seekers must first prove that they have a “credible fear” of being persecuted if sent back home. In a pre-screening with an asylum officer, they have to prove they have a well-founded fear of being harmed or detained because of their race, religion, nationality, political opinion or membership in a particular social group. Those who pass this first step then make their case before an immigration judge, who either grants or denies asylum. Applicants who are denied asylum typically get deported. But those granted asylum can live and work legally in the U.S., and apply for a green card after a year.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="384"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Why is asylum being talked about so much now?</span></strong></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Since 2014, a major surge of immigrants, including many unaccompanied children, from Honduras, El Salvador and Guatemala--among the most dangerous countries in the world--have shown up at the U.S.-Mexico border to request asylum. Many are fleeing rampant gang violence and crippling poverty. But the Trump administration has aggressively tried to crackdown on the number of undocumented immigrants entering the country. Administration officials claim that many asylum-seekers are gaming the system by making up stories to find an easy way in.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">In an effort to make the asylum process more difficult, the administration has instructed immigration officials to reject more claims. They also briefly ordered immigration agents to detain adult applicants and separate them from their children while awaiting asylum hearings. This controversial policy was abruptly ended after a massive public outcry, but many children still remain separated from their parents.</span></p><span data-dcnode-id="377" instrument_node="">
