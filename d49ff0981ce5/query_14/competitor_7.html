</span><article class="post-15573 page type-page status-publish has-post-thumbnail hentry category-toolkit" data-dcnode-id="336" id="post-15573" itemscope="" itemtype="http://schema.org/WebPage" role="article"><span data-dcnode-id="472" instrument_node="">
</span><section class="entry-content" data-dcnode-id="349" itemprop="articleBody" style="padding-bottom:3rem"><span data-dcnode-id="471" instrument_node="">
</span><div class="clearfix" data-dcnode-id="465"><a class="hollow button float-right" data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/resources/toolkit/enter-asylum.pdf"><span data-dcnode-id="470" instrument_node="">pdf/print page </span><i class="fi-page-pdf" data-dcnode-id="469"></i><span data-dcnode-id="468" instrument_node=""> </span><i class="fi-print" data-dcnode-id="467"></i></a></div><span data-dcnode-id="464" instrument_node="">
</span><div class="wp-container-1 wp-block-group callout lead" data-dcnode-id="443"><div class="wp-block-group__inner-container" data-dcnode-id="444"><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">There is no visa for coming to the UK to claim asylum.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">If you are in danger in your country of origin or residence, and you want the UK to grant you international protection, you can claim asylum when you are in the UK.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Because there is no formal visa to claim asylum, people get to the UK how they can. Some people enter the UK legally, using their passport and maybe a visa for entry to the UK for some other purpose.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Other people are not able to do this, and have to enter the country illegally.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">This page is not about refugee resettlement – when people are transferred from other countries on an official scheme. People “resettled” to the UK do not need to claim asylum here. You can find out more information about refugee resettlement </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.londoncouncils.gov.uk/our-key-themes/asylum-migration-and-refugees/refugee-resettlement"><span data-dcnode-id="449" instrument_node="">here</span></a><span data-dcnode-id="447" instrument_node="">.</span></p><span data-dcnode-id="445" instrument_node="">
</span></div></div><span data-dcnode-id="442" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Claiming asylum</span></h3><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Once you make it to the UK, you claim asylum at the port of entry, or at the UK government department the Home Office. </span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">To find out more about where and how you claim asylum read our Claiming Asylum page. </span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">You can also find out about the new asylum laws (brought in in January 2021) regarding “safe third countries” and inadmissibility.</span></p><span data-dcnode-id="430" instrument_node="">
</span><div class="wp-container-2 wp-block-buttons" data-dcnode-id="424"><span data-dcnode-id="429" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="426"><a class="wp-block-button__link no-border-radius" data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/claimasylum"><span data-dcnode-id="428" instrument_node="">Go to Claim Asylum page</span></a></div><span data-dcnode-id="425" instrument_node="">
</span></div><span data-dcnode-id="423" instrument_node="">
</span><h3 class="toolkit section-title" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">False passports</span></h3><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Some people who come to the UK to seek asylum use their own passport. For some people, however, this is not possible. This might be because they do not have one and to ask for one would put them in danger. Or if they do have their own passport, it might put them in danger to use it.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="413"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node=""> Article 31 of the Refugee Convention</span></strong><span data-dcnode-id="414" instrument_node=""> recognises the possible danger of using a real passport in your own name. The Refugee Convention says that asylum seekers should not be punished if they have a good reason for using false documents/passport.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The “Article 31” principle is part of UK law as Section 31 of the 1999 Immigration and Asylum Act.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">Section 31 means that you may have a “not guilty” defence if you are charged with </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lawsociety.org.uk/support-services/advice/practice-notes/statutory-defences-available-to-asylum-seekers-charged-with-document-offences/"><span data-dcnode-id="407" instrument_node="">‘document offences’</span></a><span data-dcnode-id="405" instrument_node="">, if you can prove that you have:</span></p><span data-dcnode-id="403" instrument_node="">
</span><ul data-dcnode-id="394"><li data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">come to the UK directly from a country where your life or freedom was threatened</span></li><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">presented yourself to the authorities in the UK without delay</span></li><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">showed good cause for your illegal entry or presence, and</span></li><li data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">made a claim for asylum as soon as was reasonably practicable after your arrival in the UK.</span></li></ul><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">People prosecuted by the UK government for the use of a false passport may not be aware of this statutory defence. If you are represented by a lawyer who specialises in criminal law, and who does not know this Section 31 defence, the lawyer may wrongly advise you to plead guilty. This will be because they think the evidence of the crime is clearly there, and pleading guilty should lead to a shorter sentence. You should, however, be given advice about the Section 31 defence which allows you to plead not guilty.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">If you are convicted, you may serve a prison sentence. Your criminal conviction for using a false passport may be used as a reason to refuse some immigration applications – including indefinite leave to remain. It can also cause problems when you apply for jobs.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">If you are in Scotland, you should ask your lawyer to look at the Crown Office’s </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.copfs.gov.uk/media-site-news-from-copfs/1201-new-guidelines-to-help-refugees"><span data-dcnode-id="385" instrument_node="">prosecution guidelines</span></a><span data-dcnode-id="383" instrument_node="">, designed to protect refugees fleeing persecution.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p class="toolkit section-subtitle" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">If you are prosecuted </span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="377" instrument_node="">There are things that may help you if you have been prosecuted for use of a false passport, even after a criminal sentence has been given. One of these is the </span><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Criminal Cases Review Commission (CCRC).</span></strong></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The CCRC was set up to deal with suspected miscarriages of justice. It has reviewed a number of convictions based on false documents offences against asylum seekers/refugees. In most of these cases, the applicants were advised to plead guilty, and were not advised that they may have a defence. The CCRC has the power to refer convictions (and sentences) to the appropriate appeal court if it determines there is a real possibility that the conviction will be quashed.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">For more information on this process, contact the CCRC on 0121 233 1473 or get an application form on </span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ccrc.gov.uk/making-application/how-to-apply/"><span data-dcnode-id="368" instrument_node="">their website</span></a><span data-dcnode-id="366" instrument_node="">.</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">The CCRC can deal with cases in England, Wales and Northern Ireland. For cases in Scotland, contact the Scottish CCRC on 0141 2707030 or see their </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sccrc.org.uk/"><span data-dcnode-id="362" instrument_node="">website</span></a><span data-dcnode-id="360" instrument_node=""> for more information.</span></p><span data-dcnode-id="358" instrument_node="">
</span><div class="wp-container-3 wp-block-buttons" data-dcnode-id="351"><span data-dcnode-id="357" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="353"><a class="wp-block-button__link no-border-radius" data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//righttoremain.org.uk/toolkit/claimasylum/"><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Now read: Claim Asylum page</span></strong></a></div><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
