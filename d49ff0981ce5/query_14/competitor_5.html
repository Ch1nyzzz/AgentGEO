lay="1" data-x-toggleable="e20214-17" tabindex="0"><div class="x-anchor-content" data-dcnode-id="1485"><span data-dcnode-id="1497" instrument_node=""> </span><span aria-hidden="true" class="x-graphic" data-dcnode-id="1486"><span data-dcnode-id="1496" instrument_node=""> </span><span aria-hidden="true" class="x-toggle x-toggle-burger x-graphic-child x-graphic-toggle" data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node=""> </span><span class="x-toggle-burger-bun-t" data-dcnode-id="1494" data-x-toggle-anim="x-bun-t-1"></span><span data-dcnode-id="1493" instrument_node=""> </span><span class="x-toggle-burger-patty" data-dcnode-id="1492" data-x-toggle-anim="x-patty-1"></span><span data-dcnode-id="1491" instrument_node=""> </span><span class="x-toggle-burger-bun-b" data-dcnode-id="1490" data-x-toggle-anim="x-bun-b-1"></span><span data-dcnode-id="1489" instrument_node=""> </span></span><span data-dcnode-id="1487" instrument_node=""> </span></span></div><span data-dcnode-id="1484" instrument_node=""> </span></a></div></div></div></header><div class="x-container max width offset" data-dcnode-id="849"><div class="x-main left" data-dcnode-id="1166" role="main"><article class="post-25779 post type-post status-publish format-standard has-post-thumbnail hentry category-humanitarian tag-asylum tag-i-485" data-dcnode-id="1218" id="post-25779"><div class="entry-wrap" data-dcnode-id="1219"><header class="entry-header" data-dcnode-id="1456"><p data-dcnode-id="1467" id="breadcrumbs"><span data-dcnode-id="1468"><span data-dcnode-id="1469"><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/"><span data-dcnode-id="1478" instrument_node="">Home</span></a><span data-dcnode-id="1476" instrument_node=""> » </span><span data-dcnode-id="1470"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/news/"><span data-dcnode-id="1475" instrument_node="">Blog</span></a><span data-dcnode-id="1473" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">How the Asylum Process Really Works</span></span></span></span></span></p><h1 class="entry-title" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">How the Asylum Process Really Works</span></h1><p class="p-meta" data-dcnode-id="1457"><span data-dcnode-id="1462"><time class="entry-date" data-dcnode-id="1463" datetime="2021-05-18T06:00:00-07:00"><span data-dcnode-id="1464" instrument_node="">May 18, 2021</span></time></span><span data-dcnode-id="1458"><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/category/humanitarian/" title="View all posts in: “Humanitarian”"><i class="x-icon-bookmark" data-dcnode-id="1461" data-x-icon-s=""></i><span data-dcnode-id="1460" instrument_node=""> Humanitarian</span></a></span></p></header><div class="entry-content content" data-dcnode-id="1220"><div class="leftSocialButtonOnPage" data-dcnode-id="1439" id="socialButtonOnPage"><div class="csbwfs-sbutton-post" data-dcnode-id="1452"><div class="csbwfs-fb" data-dcnode-id="1453" id="fb-p"><a data-dcnode-id="1454" href="javascript:" onclick="window.open('//www.facebook.com/sharer/sharer.php?u=https://citizenpath.com/asylum-process-how-it-works/','Facebook','width=800,height=300');return false;" target="_blank" title="Share On Facebook"><i class="csbwfs_facebook" data-dcnode-id="1455"></i></a></div></div><div class="csbwfs-sbutton-post" data-dcnode-id="1448"><div class="csbwfs-tw" data-dcnode-id="1449" id="tw-p"><a data-dcnode-id="1450" href="javascript:" onclick="window.open('//twitter.com/share?url=https://citizenpath.com/asylum-process-how-it-works/&amp;text=How%20the%20Asylum%20Process%20Really%20Works&nbsp;&nbsp;', '_blank', 'width=800,height=300')" title="Share On Twitter"><i class="csbwfs_twitter" data-dcnode-id="1451"></i></a></div></div><div class="csbwfs-sbutton-post" data-dcnode-id="1444"><div class="csbwfs-yt" data-dcnode-id="1445" id="yt-p"><a data-dcnode-id="1446" href="javascript:void(0);" onclick="window.open('https://www.youtube.com/user/CitizenPath');" title="Share On Youtube"><i class="csbwfs_youtube" data-dcnode-id="1447"></i></a></div></div><div class="csbwfs-sbutton-post" data-dcnode-id="1440"><div class="csbwfs-ml" data-dcnode-id="1441" id="ml-p"><a data-dcnode-id="1442" href="mailto:?subject=How%20the%20Asylum%20Process%20Really%20Works&amp;body=https://citizenpath.com/asylum-process-how-it-works/" title="Contact us"><i class="csbwfs_mail" data-dcnode-id="1443"></i></a></div></div></div><figure class="wp-block-image size-large" data-dcnode-id="1437"><img alt="South Americans march toward asylum process in the United States" class="wp-image-26040" data-dcnode-id="1438" height="589" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-1024x589.jpg&amp;raw" srcset="https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-1024x589.jpg 1024w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-300x173.jpg 300w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-768x442.jpg 768w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-50x29.jpg 50w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-100x58.jpg 100w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process-979x563.jpg 979w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/asylum-process.jpg 1200w" width="1024"></figure><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">The belief that anyone can show up at a United States border and obtain asylum is an oversimplification. The asylum process is perhaps the most rigorous and scrutinous way to be admitted to the United States. All asylum seekers have to go through an extensive vetting process involving multiple government agencies. No application for asylum is approved until every step of the vetting process is done.</span></p><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">The typical (non-asylee) immigrant may come to the United States for a variety of reasons. Sometimes it’s to start a new family or reunite with the rest of their family. Other times, people are looking for better personal and professional opportunities through work or study. And some people may have the good fortune to be chosen under special programs. For most, immigration is a positive experience.</span></p><span data-dcnode-id="1432" instrument_node=""> </span><span data-dcnode-id="1431" id="more-25779"></span><p data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Not everyone is so fortunate. The United Nations High Commissioner for Refugees (UNHCR) estimates the number of people who forcefully have to seek refuge outside of their countries of citizenship at around 80 million worldwide. From those 80 million, </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/refugee-statistics/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1429" instrument_node="">4.2 million are asylum seekers</span></a><span data-dcnode-id="1427" instrument_node="">, as of mid-2020.</span></p><h3 data-dcnode-id="1423" id="h-asylum-explained"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Asylum Explained</span></strong></h3><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">In simple terms, asylum is a way that civilized nations protect persons who come from other countries that are unwilling or unable to protect them. Immigration law, specifically </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%253AUSC-prelim-title8-section1101%26num%3D0%26edition%3Dprelim" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1421" instrument_node="">§101(a)(42)</span></a><span data-dcnode-id="1419" instrument_node=""> of the Immigration and Nationality Act, defines a refugee or asylee as a person who is unable or unwilling to return to their country because of persecution or a well-founded fear of persecution on account of:</span></p><ul class="icon" data-dcnode-id="1407"><li class="right" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Race</span></li><li class="right" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Religion</span></li><li class="right" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Nationality</span></li><li class="right" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Membership in a particular social group or</span></li><li class="right" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Political opinion</span></li></ul><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Asylum applications are managed by the United States Citizenship and Immigration Services (USCIS), just like all other immigration petitions and processes.</span></p><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The United States recognizes these international definitions of asylum and sets them as criteria that may allow people to remain in the United States. Thus, USCIS does not grant asylum solely on the basis of:</span></p><ul class="icon" data-dcnode-id="1396"><li class="wrong" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Wanting a better economic opportunity</span></li><li class="wrong" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Because the family-based immigration process takes too long</span></li><li class="wrong" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">They didn’t know better</span></li></ul><p data-dcnode-id="1391"><span data-dcnode-id="1395" instrument_node="">USCIS admits approximately 25,000 asylees each year. However, there is no statutory limit. The cap on refugees is different. So, President Biden’s </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/05/03/us/politics/biden-refugee-limit.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1394" instrument_node="">announcement to increase refugee admissions</span></a><span data-dcnode-id="1392" instrument_node=""> to about 125,000 is not tied to the asylum process. Resources to adjudicate (make a decision) on cases is one of the biggest limiting factors for the number of asylum admissions.</span></p><p data-dcnode-id="1384"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" style="color: #0072bc;"><span data-dcnode-id="1390" instrument_node="">RECOMMENDED:</span></span></strong><span data-dcnode-id="1387" instrument_node=""> </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/asylum-status/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1386" instrument_node="">Asylum Status Overview</span></a></p><h3 data-dcnode-id="1381" id="h-examples-of-real-world-asylum"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Examples of Real-World Asylum</span></strong></h3><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Legitimate asylum seekers are generally escaping violence and persecution on a level that their home country’s government is not protecting them. Common scenarios include religious and political persecution. However, families are leaving Guatemala, Honduras, El Salvador, and other countries based on reasons like:</span></p><ul class="icon" data-dcnode-id="1372"><li class="right" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Gang violence and drug cartels</span></li><li class="right" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Forced smuggling</span></li><li class="right" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Persecution of LBGTQ+ community</span></li></ul><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">These are very real and common situations for asylum seekers reaching our southern border. However, they are generally very difficult asylum cases. The reason is that persecution from gangs and drug cartels doesn’t fit neatly into one of the protected groups. Again, the persecution must be the result of the asylum seeker’s affiliation with a protected group: race, religion, nationality, membership in a particular social group, or political opinion.</span></p><h3 data-dcnode-id="1367" id="h-but-can-asylum-seekers-just-show-up"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">But Can Asylum Seekers Just Show Up?</span></strong></h3><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">This is how the asylum process works. Asylum seekers show up at a U.S. port of entry. Generally, ports of entry include border crossings, airports and seaports. There simply isn’t a process to request asylum from their home country.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The current situation at the southern border is part of a problematic phenomenon. Some call it a crisis. As a civilized nation with laws that facilitate the asylum process, the United States is legally bound to evaluate the claims made by asylum seekers. It’s overwhelming at the moment because of the vast numbers of individuals showing up. That’s why the current administration is focused on helping these countries fix the problem at home. After all, most of these immigrants would prefer to stay in their country of origin if only they felt safe.</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Asylum seekers may travel as a large group because they are extremely vulnerable as individuals. Traveling with virtually no belongings or resources, asylum seekers take advantage of the security found in a caravan of similar migrants.</span></p><h3 data-dcnode-id="1358" id="h-types-of-asylum-in-the-u-s"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Types of Asylum in the U.S.</span></strong></h3><h6 data-dcnode-id="1356" id="h-affirmative-asylum-process"><span data-dcnode-id="1357" instrument_node="">Affirmative Asylum Process</span></h6><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Affirmative asylum would be what’s considered a “regular” asylum case. The applicant must be present in the United States and may apply for asylum at any port of entry. It’s a proactive approach to the asylum process, as the applicant makes a claim before any enforcement or deportation efforts have started.</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">Generally, the applicant must submit </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/i-589" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1352" instrument_node="">Form I-589, Application for Asylum and for Withholding of Removal</span></a><span data-dcnode-id="1350" instrument_node="">, within one year of arrival to the U.S. There is no fee to apply. He or she must provide a qualified interpreter for the asylum interview.</span></p><h6 data-dcnode-id="1347" id="h-defensive-asylum-process"><span data-dcnode-id="1348" instrument_node="">Defensive Asylum Process</span></h6><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">If the asylum seeker is already in removal proceedings (deportation process) through an immigration court, it becomes a defensive asylum process. The applicant is asking for the government to reverse its decision to deport and allow him or her to remain in the United States via asylum. An immigration judge makes a decision independent of any previous decision by USCIS.</span></p><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">The immigration court provides a qualified interpreter for the asylum hearing and all other court proceedings.</span></p><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Typically, an asylum case turns defensive if one of the following situations occurs:</span></p><ul class="icon" data-dcnode-id="1329"><li class="right" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">A person claims asylum at the border;</span></li><li class="right" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The applicant applied for affirmative asylum first, and the application was not approved, after which the applicant was placed in removal proceedings;</span></li><li class="right" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Immigration officials place the individual in removal proceedings for immigration violations (typically no documents or overstay);</span></li><li class="right" data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">The individual tried to enter the U.S. without proper documents, and a U.S. CBP officer determines there are reasons to believe that the person’s life or safety is in danger. This is validated by going through what is called the </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-and-asylum/asylum/questions-and-answers-credible-fear-screening" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1333" instrument_node="">Credible Fear process</span></a><span data-dcnode-id="1331" instrument_node="">.</span></li></ul><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">People in the defensive asylum process must go to removal (deportation) hearings in an immigration court. Immigration and Customs Enforcement (ICE) is responsible for arguing against the asylum seeker, and in favor of deportation. Individuals will have the opportunity to defend themselves, either on their own or through a lawyer.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1325"><img alt="Form I-589, Application for Asylum and for Withholding of Removal" class="wp-image-26042" data-dcnode-id="1326" height="372" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-1024x372.jpg&amp;raw" srcset="https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-1024x372.jpg 1024w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-300x109.jpg 300w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-768x279.jpg 768w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-50x18.jpg 50w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-100x36.jpg 100w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application-979x356.jpg 979w, https://citizenpath.com/cpwp/wp-content/uploads/2021/05/I-589-asylum-application.jpg 1200w" width="1024"></figure><h3 data-dcnode-id="1322" id="h-who-s-eligible-to-apply-for-asylum-in-the-u-s"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Who’s Eligible to Apply for Asylum in the U.S.</span></strong></h3><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Anyone who falls under the criteria established in the definitions of persecution or has a well-founded fear of persecution can apply for asylum while being present in the United States. They can include their spouses and unmarried children under 21 in their applications.</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Much of the I-589 application is straight forward, but proving asylum goes far beyond filling out a form. Applicants need to appreciate the importance of submitting evidence that supports their claim of persecution or feared persecution. This can be a difficult task. For this reason, asylum seekers have the best chance of success if aided by an attorney or other legal support organization.</span></p><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Additional information may include: sworn statements from people who have firsthand knowledge of the conditions that make a person eligible for asylum; the applicant’s own statement about the circumstances that led to the asylum process; and proof of identity for the people submitting sworn statements.</span></p><h3 data-dcnode-id="1313" id="h-employment-authorization"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Employment Authorization</span></strong></h3><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Asylum seekers may be eligible to obtain a work permit (employment authorization document) based on a pending asylum application. However, making a determination for eligibility can be difficult. The requirements have changed over time and factor in many criteria. Therefore, we recommend that asylum seekers seek the assistance of an immigration attorney before applying for employment authorization.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">If USCIS grants asylum, the beneficiary is immediately authorized to work. Some asylees choose to obtain an EAD for convenience or identification purposes, but USCIS does not require asylees to obtain an EAD.</span></p><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Asylees that want to obtain the card should file Form I-765, Application for Employment Authorization. There is no government filing fee. Individuals that need help preparing the form can also use CitizenPath to help with the process.</span></p><h3 data-dcnode-id="1304" id="h-vetting-applicants-in-the-asylum-process"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Vetting Applicants in the Asylum Process &nbsp;</span></strong></h3><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">The U.S. government expends significant resources to vet asylum seekers. Many would argue it is the most rigorous path for U.S. immigration because of the numerous background checks, interviews and adjudication process.</span></p><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">If the applicant advances through the affirmative process, an asylum officer will generally be the one to interview the applicant and make a decision on a case. Individuals in the defensive asylum process are put into a more adversarial situation. ICE officers will be making the argument to remove the asylum seeker. An immigration judge will make the decision to grant asylum or deport the person. If the immigration judge issues a denial, the applicant may appeal the case in front of other appellate venues such as the Board of Immigration Appeals (BIA), federal district courts of appeal, and in rare situations the Supreme Court of the United States. Of course, the applicant will have an extremely difficult situation even with the assistance of an experienced attorney.</span></p><h6 data-dcnode-id="1298" id="h-uscis-biometrics-appointment"><span data-dcnode-id="1299" instrument_node="">USCIS Biometrics Appointment</span></h6><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">USCIS will schedule applicants to attend a biometrics appointment to collect fingerprints, photograph and a signature. Technicians collect a complete set of fingerprints from applicants who are between the ages of 12 years 9 months and 79 years. USCIS will use this information to conduct an FBI criminal background check.</span></p><h6 data-dcnode-id="1294" id="h-asylum-background-checks-and-security-screenings"><span data-dcnode-id="1295" instrument_node="">Asylum Background Checks and Security Screenings</span></h6><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Beyond the biometrics, there is extensive screening to ensure the applicant is not known to have criminal associations, suspicious activities or past violations. Some of the information reviewed during the background check includes:</span></p><ul class="icon" data-dcnode-id="1277"><li class="right" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Criminal history</span></li><li class="right" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Links to organizations that may pose a threat to the United States</span></li><li class="right" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Travel history</span></li><li class="right" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Foreign activity</span></li><li class="right" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Immigration records, to account for any previous instances of removal proceedings</span></li><li class="right" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Any intelligence records that may refer to applicant personally, as well as terrorist watchlists and</span></li><li class="right" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Potential fraud, including identity theft.</span></li></ul><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Some of the government agencies working with the Department of Homeland Security’s USCIS in the vetting process include: the Department of Defense, the Department of State, the National Counterterrorism Unit, Immigration and Customs Enforcement, Customs and Border Protection, and the Federal Bureau of Investigation.</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">U.S. laws prohibit granting asylum to anyone who has been convicted of a serious crime in the United States; committed crimes abroad not political in nature; those who’ve been involved in terrorist activity or linked to terrorist organizations; people who have aided in persecuting others (such as war criminals); and anyone who may pose a threat to the United States. Asylum officers may make this determination based on what comes up during the vetting process, at which point the asylum application becomes defensive and a claim to asylum must be supported in immigration court.</span></p><h6 data-dcnode-id="1271" id="h-interview"><span data-dcnode-id="1272" instrument_node="">Interview</span></h6><p data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">USCIS requires affirmative asylum seekers to appear for an interview with a specially trained asylum officer. Asylum officers are different from typical immigration officers conducting interviews for family-based and employment-based applications. These officers have </span><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-and-asylum/asylum/asylum-division-training-programs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1269" instrument_node="">special training</span></a><span data-dcnode-id="1267" instrument_node=""> in asylum law, interviewing techniques, researching country of origin information, and decision-making/writing.</span></p><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The vetting process also involves reviewing all the documentation submitted with the original asylum application, as well as reviewing the identities of anyone you refer to in said documentation, or who submits sworn statements.</span></p><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">A supervisory asylum officer reviews the asylum officer’s decision to ensure it is consistent with the law. Depending on the case, the supervisory asylum officer may refer the decision to asylum division staff at USCIS headquarters for additional review. They may decide to approve, deny, or refer your application to immigration court. USCIS generally provides a decision within about two weeks after completing the interview.</span></p><h3 data-dcnode-id="1259" id="h-after-uscis-grants-asylum"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">After USCIS Grants Asylum</span></strong></h3><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">Once USCIS awards asylum to a person, he or she may live and work in the United States as long as they qualify as asylees. They also have access to healthcare assistance through the Office of Refugee Resettlement. USCIS will provide an approval letter and an </span><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/faq/what-i-94-arrival-departure-record/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1257" instrument_node="">I-94 arrival/departure record</span></a><span data-dcnode-id="1255" instrument_node=""> with the grant of asylum as evidence to obtain benefits. USCIS will grant asylum to the principal applicant’s spouse and children if included on the I-589 application.</span></p><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Again, a grant of asylum in the United States does not expire. However, USCIS may terminate asylum status if the beneficiary:</span></p><ul class="icon" data-dcnode-id="1243"><li class="wrong" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">No longer has a well-founded fear of persecution because of a fundamental change in circumstances</span></li><li class="wrong" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Obtained protection from another country</span></li><li class="wrong" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Obtained the original asylum grant through fraud</span></li><li class="wrong" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Committed certain crimes or engaged in other activities that make him or her ineligible to retain asylum in the United States</span></li></ul><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Asylees may also apply for permanent residence (green card) after one year. After a year in asylum status, he or she may adjust status to permanent resident. This is an important benefit because it allows them to remain in the United States permanently.</span></p><p data-dcnode-id="1237"><span data-dcnode-id="1240" instrument_node="">Green card applicants can fill out an adjustment of status application using CitizenPath’s preparation software. It provides a simple, affordable way to prepare the application. Designed by attorneys, there’s a money-back guarantee that USCIS will approve the application. CitizenPath even provides filing instructions customized to the applicant’s answers so they know exactly which supporting documents to include and how to organize the package. </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//citizenpath.com/form-i-485-adjustment-of-status-application/"><span data-dcnode-id="1239" instrument_node="">Learn more &gt;&gt;</span></a></p><p data-dcnode-id="1230"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" style="color: #0072bc;"><span data-dcnode-id="1236" instrument_node="">RECOMMENDED:</span></span></strong><span data-dcnode-id="1233" instrument_node=""> </span><a data-dc
