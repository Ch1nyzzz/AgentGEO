_link -is-external polaris__social--email" data-dcnode-id="561" href="mailto:?subject=The%20importance%20of%20asylum&amp;body=https://theweek.com/articles/454849/importance-asylum" rel="noopener" target="_blank"><span class="polaris__social--icon" data-dcnode-id="564"><svg data-dcnode-id="565"><use data-dcnode-id="566" xlink:href="/assets/polaris-sprite.svg#polaris__ico-email"><svg data-dcnode-id="567" id="polaris__ico-email" viewBox="0 0 17 12"><title data-dcnode-id="569">ico-email</title><path d="M0 0v12h17V0zm15.242 1.333L8.5 6.475 1.758 1.333zM1.417 10.667V2.789L8.5 8.19l7.083-5.402v7.878z" data-dcnode-id="568"></path></svg></use></svg></span><span class="screen-reader-text" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Share via Email</span></span></a></div></div><div class="polaris__simple-grid--main" data-dcnode-id="515"><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Karl Simlinger, until very recently the mayor of Gföhl, a small town in Austria, told a city council meeting this week that journalists who reported on asylum seekers should be hanged.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Expressing his fury that asylum applicants would be lodged in a complex in the town, Simlinger bafflingly said:</span></p><p data-dcnode-id="549"><span data-dcnode-id="554" instrument_node="">I don't give a shit about asylum seekers, but the journalists are to be blamed. They should be hanged; they are like the Jews. [</span><a class="polaris__link -is-external" data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jpost.com/Jewish-World/Jewish-News/Austrian-mayor-Journalists-should-be-hanged-like-Jews-334096" rel="noopener" target="_blank"><em data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Jerusalem Post</span></em></a><span data-dcnode-id="550" instrument_node="">]</span></p><div class="polaris__ad -full-width -hybrid-ad -is-space-reserved hide-desktop" data-dcnode-id="543"><a class="polaris__link -skip-advert" data-dcnode-id="547" href="#skip-to-div-l2hfv09r"><span data-dcnode-id="548" instrument_node="">Skip advert</span></a><div class="polaris__ad--inner" data-dcnode-id="545"><div class="ad_inline" data-dcnode-id="546" id="ad_inline_mobile_3" style="height: unset; width: unset;"></div></div><div class="skip-to-div" data-dcnode-id="544" id="skip-to-div-l2hfv09r"></div></div><p data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">Unsurprisingly, given his open display of xenophobia and anti-semitism, mixed in with some terrible contempt for freedom of the press, Simlinger has </span><a class="polaris__link -is-external" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ibtimes.co.uk/articles/528147/20131206/journalists-hanged-jews-austrian-mayor.htm" rel="noopener" target="_blank"><span data-dcnode-id="541" instrument_node="">resigned from his job as mayor</span></a><span data-dcnode-id="539" instrument_node="">.</span></p><div class="polaris__subscription--blueconic" data-dcnode-id="537"></div><div class="polaris__teads" data-dcnode-id="536" id="teads-desktop"></div><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">This bizarre tale makes me wonder just where Simlinger's brand of hatred comes from. Why does the topic of asylum seekers provoke such visceral animosity? Isn't asylum a critically important thing?</span></p><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">First off, let's define who these asylum seekers are. Mostly, they are refugees fleeing countries in turmoil due to war, genocide, or political, religious, or social persecution. </span><a class="polaris__link -is-external" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/pages/49c3646cbc.html" rel="noopener" target="_blank"><span data-dcnode-id="532" instrument_node="">According to the United Nations</span></a><span data-dcnode-id="530" instrument_node="">, there are more than 14 million refugees who have left their countries to escape from persecution, armed conflict, or violence.</span></p><p data-dcnode-id="521"><span data-dcnode-id="528" instrument_node="">The modern right to asylum was introduced by the UN's 1951 Convention Relating to the Status of Refugees. It was designed to prevent countries turning away refugees who had come from a country where they were endangered, as occurred on </span><a class="polaris__link -is-external" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ushmm.org/wlc/en/article.php%3FModuleId%3D10007094" rel="noopener" target="_blank"><span data-dcnode-id="527" instrument_node="">multiple</span></a><span data-dcnode-id="525" instrument_node=""> </span><a class="polaris__link -is-external" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//forward.com/articles/171179/switzerland-blocked-just--jewish-refugees-flee/" rel="noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">occasions</span></a><span data-dcnode-id="522" instrument_node=""> during the Holocaust.</span></p><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">The vast majority of refugees stay in their region. Eighty percent of the world's refugees are hosted by developing countries. Pakistan hosts the highest number of refugees at 1.7 million. </span><a class="polaris__link -is-external" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//unhcr.org/globaltrendsjune2013/UNHCR%2520GLOBAL%2520TRENDS%25202012_V08_web.pdf" rel="noopener" target="_blank"><span data-dcnode-id="519" instrument_node="">Western countries receive comparatively few asylum application per year</span></a><span data-dcnode-id="517" instrument_node="">. America received 70,400 applications for asylum in 2012, the most in the world. Second was Germany, which received 64,500 applications, followed by South Africa with 61,500 and France with 55,100.</span></p></div><div class="polaris__simple-grid--aside" data-dcnode-id="501"><div class="polaris__ad -hybrid-ad -sidebar-ad hide-mobile hide-tablet" data-dcnode-id="502"><a class="polaris__link -skip-advert -right-side-skip" data-dcnode-id="513" href="#skip-to-div-l2hfv09s"><span data-dcnode-id="514" instrument_node="">Skip advert</span></a><div class="polaris__ad--inner" data-dcnode-id="504"><div class="ad_right" data-dcnode-id="505" id="ad_right_14" style="height: unset; width: unset;"><div class="bordeaux-slot bordeaux-filled-slot" data-dcnode-id="506" data-feat-ref="bordeaux-feat-id-66" id="bordeaux-static-slot-3" style="display: flex; flex-direction: column; margin: auto; width: 300px; height: 600px;"><a class="sr-only" data-dcnode-id="511" href="#skip-to-div-bordeaux-static-slot-3" style="background: #2c2e32;
    color: #fff;
    height: 0;
    overflow: hidden;
    padding: 0;
    position: absolute;
    transition-property: none;
    width: 0;
    z-index: 100000;"><span data-dcnode-id="512" instrument_node="">Skip advert</span></a><div data-dcnode-id="509" id="bordeaux-static-slot-3-label" style="font-family: Lato, sans-serif; font-size: 12px; padding: 0px 0px 6.66667px; color: rgb(88, 92, 102); line-height: 1; text-align: center; text-transform: none;"><span data-dcnode-id="510" instrument_node="">Advertisement</span></div><div data-dcnode-id="508" data-feat-ref="bordeaux-feat-id-84" id="bordeaux-preemptive-ad-6" style="position: sticky; top: 0px; margin: 0px auto;"></div><div class="sr-only" data-dcnode-id="507" id="skip-to-div-bordeaux-static-slot-3"></div></div></div></div><div class="skip-to-div" data-dcnode-id="503" id="skip-to-div-l2hfv09s"></div></div></div><div class="polaris__simple-grid--full" data-dcnode-id="493"><div class="polaris__ad -full-width -hybrid-ad -is-space-reserved hide-tablet hide-mobile" data-dcnode-id="494"><a class="polaris__link -skip-advert" data-dcnode-id="499" href="#skip-to-div-l2hfv09t"><span data-dcnode-id="500" instrument_node="">Skip advert</span></a><div class="polaris__ad--inner" data-dcnode-id="496"><div class="ad_inline" data-dcnode-id="497" data-incrdyninline="true" id="ad_inline_desktop_15" style="height: 250px; width: unset;"><div class="bordeaux-slot" data-dcnode-id="498" data-feat-ref="bordeaux-feat-id-67" id="bordeaux-dynamic-slot-0" style="display: flex; flex-direction: column; margin: auto;"></div></div></div><div class="skip-to-div" data-dcnode-id="495" id="skip-to-div-l2hfv09t"></div></div></div><div class="polaris__simple-grid--main" data-dcnode-id="467"><p data-dcnode-id="485"><span data-dcnode-id="492" instrument_node="">The majority of asylum seekers' claims are found to be genuine. In Australia — a country that has been particularly tough on asylum seekers, </span><a class="polaris__link -is-external" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.immi.gov.au/About/Pages/about-immigration-detention.aspx" rel="noopener" target="_blank"><span data-dcnode-id="491" instrument_node="">imprisoning them in detention centers</span></a><span data-dcnode-id="489" instrument_node=""> — </span><a class="polaris__link -is-external" data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smh.com.au/federal-politics/political-news/overwhelming-majority-of-boat-arrivals-deemed-to-be-refugees-20130519-2juty.html" rel="noopener" target="_blank"><span data-dcnode-id="488" instrument_node="">over 90 percent of asylum seekers arriving by boat</span></a><span data-dcnode-id="486" instrument_node=""> were found to have genuine claims.</span></p><div class="polaris__ad -full-width -hybrid-ad -is-space-reserved hide-desktop" data-dcnode-id="479"><a class="polaris__link -skip-advert" data-dcnode-id="483" href="#skip-to-div-l2hfv09u"><span data-dcnode-id="484" instrument_node="">Skip advert</span></a><div class="polaris__ad--inner" data-dcnode-id="481"><div class="ad_inline" data-dcnode-id="482" id="ad_inline_mobile_18" style="height: unset; width: unset;"></div></div><div class="skip-to-div" data-dcnode-id="480" id="skip-to-div-l2hfv09u"></div></div><p data-dcnode-id="472"><a class="polaris__link -is-external" data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theaustralian.com.au/opinion/letters/taxpayers-cant-sustain-spending-on-asylum-seekers/story-fn558imw-1226680414856" rel="noopener" target="_blank"><span data-dcnode-id="478" instrument_node="">Taxpayers may resent</span></a><span data-dcnode-id="476" instrument_node=""> the idea of paying for services and infrastructure for asylum seekers and refugees. But the amounts of money spent are actually very small. The United States spends </span><a class="polaris__link -is-external" data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//refugeeresettlementwatch.wordpress.com/2013/04/25/how-much-money-does-the-united-states-spend-on-refugees-and-asylees/" rel="noopener" target="_blank"><span data-dcnode-id="475" instrument_node="">just over $1 billion</span></a><span data-dcnode-id="473" instrument_node=""> a year on refugee resettlement. That's just over 0.03 percent of the federal budget.</span></p><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">It is really, really important that people who are persecuted can escape their persecutors. Genocide can happen almost anywhere, even in politically and socially advanced countries. The fact that people with such hateful and retrograde views can rise to positions of authority in wealthy, developed countries like Austria illustrates the importance of this. Imagine if Simlinger had gained national power. Would he persecute journalists? Religious and ethnic minorities?</span></p><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Having international conventions that support the right of persecuted or endangered peoples to seek asylum makes the world a safer place for everyone. Yes, protecting asylum seekers costs money. But that is a price worth paying to live in a world that protects the rights of the individual, values freedom, and tries to give everyone a fair shot at life.</span></p></div><div class="polaris__simple-grid--aside" data-dcnode-id="460"><div class="polaris__ad -hybrid-ad -sidebar-ad hide-mobile hide-tablet" data-dcnode-id="461"><a class="polaris__link -skip-advert -right-side-skip" data-dcnode-id="465" href="#skip-to-div-l2hfv09v"><span data-dcnode-id="466" instrument_node="">Skip advert</span></a><div class="polaris__ad--inner" data-dcnode-id="463"><div class="ad_right" data-dcnode-id="464" id="ad_right_22" style="height: unset; width: unset;"></div></div><div class="skip-to-div" data-dcnode-id="462" id="skip-to-div-l2hfv09v"></div></div></div><div class="polaris__simple-grid--main" data-dcnode-id="418"><div class="polaris__sub_under_article" data-dcnode-id="459"></div><div class="-tags-social" data-dcnode-id="419"><div class="polaris__social -article" data-dcnode-id="428"><a class="polaris__link polaris__social--facebook" data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theweek.com/articles/454849/importance-asylum"><span class="polaris__social--icon" data-dcnode-id="452"><svg data-dcnode-id="453"><use data-dcnode-id="454" xlink:href="/assets/polaris-sprite.svg#polaris__ico-facebook"><svg data-dcnode-id="455" id="polaris__ico-facebook" viewBox="0 0 7 15"><title data-dcnode-id="457">ico-facebook</title><path d="M1.75 5H0v2.5h1.75V15h2.917V7.5H6.79L7 5H4.667V3.958c0-.597.112-.833.65-.833H7V0H4.779C2.68 0 1.75.99 1.75 2.884V5z" data-dcnode-id="456"></path></svg></use></svg></span><span class="screen-reader-text" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Share on Facebook</span></span></a><a class="polaris__link polaris__social--twitter" data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theweek.com/articles/454849/importance-asylum"><span class="polaris__social--icon" data-dcnode-id="442"><svg data-dcnode-id="443"><use data-dcnode-id="444" xlink:href="/assets/polaris-sprite.svg#polaris__ico-twitter"><svg data-dcnode-id="445" id="polaris__ico-twitter" viewBox="0 0 17 14"><title data-dcnode-id="447">ico-twitter</title><path d="M17 1.657a6.892 6.892 0 01-2.003.557A3.532 3.532 0 0016.53.258c-.673.405-1.42.7-2.215.858A3.46 3.46 0 0011.77 0C9.518 0 7.863 2.129 8.372 4.34 5.474 4.191 2.904 2.784 1.184.646.27 2.235.71 4.313 2.262 5.366a3.438 3.438 0 01-1.578-.443c-.039 1.638 1.12 3.17 2.797 3.51a3.451 3.451 0 01-1.576.06c.444 1.405 1.732 2.426 3.259 2.455A6.946 6.946 0 010 12.412 9.779 9.779 0 005.346 14c6.476 0 10.135-5.542 9.914-10.513A7.155 7.155 0 0017 1.657z" data-dcnode-id="446"></path></svg></use></svg></span><span class="screen-reader-text" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Shar
