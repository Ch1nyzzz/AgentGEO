</span><meta content="Many lesbians and gay men apply for asylum in the U.K. each year on the basis that they fear persecution in their home country because of their sexual orientation. The legal basis for claiming asylum on the ground of sexual identity is now well established. Nevertheless, making these claims remains very difficult for applicants. Western cultural expectations around sexual identity often mix with homophobic assumptions about sexual behaviour to present applicants as “not sufficiently gay”. Furthermore, applicants may not initially disclose their sexual identity to legal advisors, leading to assumptions that they are not “telling the truth” to the Immigration Tribunal. In this article, Barry O’Leary, a solicitor and legal activist on behalf of lesbian and gay refugees, discusses these problems and how U.K.-based asylum lawyers have attempted to work round them." data-dcnode-id="1272" name="dc.description"><span data-dcnode-id="1271" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="335" data-track-component="article body"><span data-dcnode-id="762" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="755" data-gtm-vis-first-on-screen-50443292_562="406" data-gtm-vis-first-on-screen-50443292_563="408" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="406" data-gtm-vis-recent-on-screen-50443292_563="408" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="756" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="760" id="Abs1"><span data-dcnode-id="761" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="757" id="Abs1-content"><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Many lesbians and gay men apply for asylum in the U.K. each year on the basis that they fear persecution in their home country because of their sexual orientation. The legal basis for claiming asylum on the ground of sexual identity is now well established. Nevertheless, making these claims remains very difficult for applicants. Western cultural expectations around sexual identity often mix with homophobic assumptions about sexual behaviour to present applicants as “not sufficiently gay”. Furthermore, applicants may not initially disclose their sexual identity to legal advisors, leading to assumptions that they are not “telling the truth” to the Immigration Tribunal. In this article, Barry O’Leary, a solicitor and legal activist on behalf of lesbian and gay refugees, discusses these problems and how U.K.-based asylum lawyers have attempted to work round them.</span></p></div></div></section><span data-dcnode-id="754" instrument_node="">
</span><section data-dcnode-id="731" data-gtm-vis-first-on-screen-50443292_562="407" data-gtm-vis-first-on-screen-50443292_563="408" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="407" data-gtm-vis-recent-on-screen-50443292_563="408" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="732" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="752" id="Sec1"><span data-dcnode-id="753" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="733" id="Sec1-content"><p data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">In 2007, no less than 85 member states of the United Nations still criminalise consensual same sex acts among adults.</span><sup data-dcnode-id="746"><a data-dcnode-id="747" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Footnote </span></span><span data-dcnode-id="748" instrument_node="">1</span></a></sup><span data-dcnode-id="745" instrument_node=""> There are many more states where, even though consensual acts are not criminalised, lesbians and gay men live in fear due to the hostility they face from the state and society simply because of their sexual identity. It is not surprising, therefore, that a tiny proportion of the lesbians and gay men affected seek asylum in the United Kingdom.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">It should never be suggested that being recognised as a refugee (having a successful asylum claim) is easy for any asylum seeker whatever the basis of their claim. All applicants have to deal with a culture of disbelief and what can appear to be almost automatic refusals by the Home Office. Despite what many parts of the media would have the public believe, it is difficult for any individual to obtain asylum in the U.K. That said, there are particular problems for those claiming on the basis of sexual identity.</span></p><p data-dcnode-id="734"><span data-dcnode-id="741" instrument_node="">This article is based on the author’s own experiences as an immigration lawyer representing lesbian and gay asylum seekers, and as a volunteer lawyer and trustee for the U.K. Lesbian and Gay Immigration Group (U.K.L.G.I.G.),</span><sup data-dcnode-id="736"><a data-dcnode-id="737" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Footnote </span></span><span data-dcnode-id="738" instrument_node="">2</span></a></sup><span data-dcnode-id="735" instrument_node=""> a charity committed to assisting those seeking asylum on the basis of sexual identity. The problems discussed relate to access to the process, evidential issues and ensuring decision makers understand the need for asylum.</span></p></div></div></section><section data-dcnode-id="713" data-gtm-vis-first-on-screen-50443292_562="408" data-gtm-vis-first-on-screen-50443292_563="408" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="408" data-gtm-vis-recent-on-screen-50443292_563="408" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The Law"><div class="c-article-section" data-dcnode-id="714" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="729" id="Sec2"><span data-dcnode-id="730" instrument_node="">The Law</span></h2><div class="c-article-section__content" data-dcnode-id="715" id="Sec2-content"><p data-dcnode-id="718"><span data-dcnode-id="728" instrument_node="">This article does not aim to discuss the complicated jurisprudence of the U.K. on refugee law. It is important to state at the outset, though, that it is well-established that sexual identity can be the basis for a successful claim for asylum in the U.K. This position first received judicial notice in the House of Lords decision of </span><i data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Shah and Islam</span></i><span data-dcnode-id="725" instrument_node="">
</span><sup data-dcnode-id="720"><a data-dcnode-id="721" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Footnote </span></span><span data-dcnode-id="722" instrument_node="">3</span></a></sup><span data-dcnode-id="719" instrument_node=""> in 1999 (though that case was not primarily dealing with sexual identity). Since then, it has become widely accepted that lesbians and gay men can form a “particular social group”, one of the reasons stated by the Refugee Convention as rendering a person eligible for refugee status.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Like all other asylum seekers, lesbians and gay men must show that they have a well-founded fear of being persecuted for a Convention reason, that the state is unwilling or unable to protect them and that they are outside of their country of origin. But lesbian and gay asylum seekers face particular problems in attempting to establish their claims.</span></p></div></div></section><section data-dcnode-id="667" data-gtm-vis-first-on-screen-50443292_562="408" data-gtm-vis-first-on-screen-50443292_563="409" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="408" data-gtm-vis-recent-on-screen-50443292_563="409" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="‘Proof’ of Being a Lesbian or a Gay Man"><div class="c-article-section" data-dcnode-id="668" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="711" id="Sec3"><span data-dcnode-id="712" instrument_node="">‘Proof’ of Being a Lesbian or a Gay Man</span></h2><div class="c-article-section__content" data-dcnode-id="669" id="Sec3-content"><span data-dcnode-id="710" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="698"><div class="c-blockquote__body" data-dcnode-id="699"><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="708" instrument_node="">What medical evidence is there that your client is gay?</span><sup data-dcnode-id="703"><a data-dcnode-id="704" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Footnote </span></span><span data-dcnode-id="705" instrument_node="">4</span></a></sup><span data-dcnode-id="702" instrument_node="">
</span></p><span data-dcnode-id="700" instrument_node="">
</span></div></blockquote><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The basis of the claim should be that the lesbian or gay asylum seeker has a well-founded fear of persecution because of their sexual identity if returned to their country of origin. It would be naïve to suggest, though, that whether the asylum seeker is in fact lesbian or gay will not be an issue. Sexual identity will often be challenged by the Home Office or by an immigration judge.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">What can the asylum seeker do – is it possible to ‘prove’ sexual identity? A ‘political’ asylum seeker may have an organisation who can vouch for them. There is, though, no membership card for lesbians and gay men. Moreover, it is not possible to obtain medical evidence to ‘prove’ sexual identity, although medical evidence may be of assistance where mental health problems have arisen or there has been physical abuse due to ill-treatment because of sexual identity.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Sadly, when sexual identity is challenged, lesbian and gay asylum seekers are confronted with all too common assumptions about who they are and what their experiences will have been.</span></p><blockquote class="c-blockquote" data-dcnode-id="679"><div class="c-blockquote__body" data-dcnode-id="680"><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="689" instrument_node="">The appellant cannot be a lesbian, as she has had a relationship with a man and had a child with him.</span><sup data-dcnode-id="684"><a data-dcnode-id="685" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Footnote </span></span><span data-dcnode-id="686" instrument_node="">5</span></a></sup><span data-dcnode-id="683" instrument_node="">
</span></p><span data-dcnode-id="681" instrument_node="">
</span></div></blockquote><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">This comment came from a case involving a Mongolian national and was echoed recently in a case dealt with by U.K.L.G.I.G. of a Sierra Leonean national who, on her sexual identity being discovered in Sierra Leone, was forced into a marriage and raped by her husband. She was pregnant when she fled to the U.K. The immigration judge did not believe she was a lesbian as she had a child.</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">As the experiences of many lesbians and gay men show, marriage to a member of the opposite sex or being a father or mother does not mean the asylum seeker is not lesbian or gay. The asylum seeker may have been forced into marriage or raped, as with the Sierra Leonean national above, or they are bisexual or their sexual identity has changed over time. However, claims are often being decided in an atmosphere of ignorance or homophobia.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">There is no straightforward answer to ‘proving’ sexual identity. One possible answer is to show the asylum seeker’s relationships or sexual conduct in the U.K. The author has done this on a number of occasions. If a British citizen of the same sex gives witness testimony and states that they have had sex with the asylum seeker, it becomes difficult for the sexual identity of the asylum seeker to be doubted. However, what of the asylum seeker who has not entered a relationship or had sex in the U.K.? There are many reasons why an asylum seeker may not have had an emotional or sexual relationship in the U.K. The British ‘gay scene’ is very commercial or based on the Internet. Asylum seekers are usually coping on funds which are, frankly, far less than any British citizen would consider to be sufficient for subsistence. Some will not be able to pay in a bar or access the Internet. Alternatively, it may be that they have a committed partner in their country of origin who has not been able to flee to the U.K. Quite simply, they may not have met the right person. They will not have a witness to ‘prove’ they are lesbian or gay. Does it mean they are not?</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Although the strategy of providing evidence of the asylum seeker’s sexual activity in the U.K. is clearly in the best interests of the client where such evidence is available, there is also a risk of reducing sexual identity to sexual conduct, as discussed in the next section.</span></p></div></div></section><section data-dcnode-id="627" data-gtm-vis-first-on-screen-50443292_562="408" data-gtm-vis-first-on-screen-50443292_563="409" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="408" data-gtm-vis-recent-on-screen-50443292_563="409" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Sexual Identity and Sexual Conduct"><div class="c-article-section" data-dcnode-id="628" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="665" id="Sec4"><span data-dcnode-id="666" instrument_node="">Sexual Identity and Sexual Conduct</span></h2><div class="c-article-section__content" data-dcnode-id="629" id="Sec4-content"><span data-dcnode-id="664" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="652"><div class="c-blockquote__body" data-dcnode-id="653"><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">During your asylum interview you were asked how you would describe your sexuality and you stated “I am attracted to women. I am still very confused about my sexuality and that is why I am getting the help of a psychologist and a counsellor.” It is not believed that you are confused about your sexuality or that you are attracted to other women because during the same interview you were asked if you had been in a relationship with another woman in this country (U.K.) and you stated that you had not. It is believed that if you were attracted to other women then with all the freedom to choose a sexual partner of your choice in this country you would have a relationship with another woman.</span><sup data-dcnode-id="657"><a data-dcnode-id="658" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Footnote </span></span><span data-dcnode-id="659" instrument_node="">6</span></a></sup><span data-dcnode-id="656" instrument_node="">
</span></p><span data-dcnode-id="654" instrument_node="">
</span></div></blockquote><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Sexual identity is not the same as sexual conduct. Sexual conduct is, of course, a very important part of sexual identity and will often be an important part of claims by lesbian and gay asylum seekers. It may be that the asylum seeker’s sexual conduct in the past is what led to their sexual identity being disclosed and them being physically abused or imprisoned. However, to focus solely on conduct can seriously harm the chances of the lesbian or gay asylum seeker obtaining the protection they need. Identity and not just conduct should be the basis of the determination of any claim by a lesbian or gay asylum seeker.</span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Sexual identity is about more than having sex behind closed doors. Freedom of sexual identity cannot be defined but must include not having to continually lie about who you are, being able to live with your partner without fear of harm, or the opportunity to meet a partner without fear of harm.</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">It must be remembered that some lesbian or gay asylum seekers may not have had relationships in their country of origin but it must be considered why they have acted ‘discreetly’. It is usually the case that they have acted discreetly because to do otherwise would have led to them facing persecution in their country of origin. Are they to be expected to return to their country of origin and act discreetly again?</span></p><blockquote class="c-blockquote" data-dcnode-id="633"><div class="c-blockquote__body" data-dcnode-id="634"><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="643" instrument_node="">The Secretary of State is of the view that you can conceal your homosexuality to avoid harm.</span><sup data-dcnode-id="638"><a data-dcnode-id="639" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Footnote </span></span><span data-dcnode-id="640" instrument_node="">7</span></a></sup><span data-dcnode-id="637" instrument_node="">
</span></p><span data-dcnode-id="635" instrument_node="">
</span></div></blockquote><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">What is the Colombian gay man, the subject of this quote, being asked to do? Is he being asked to have sex very privately and ensure no one ever knows about it or to conduct his relationships so secretly that only he and his partner ever know about it? Perhaps he is being asked to deny he is gay in order to avoid harm. Even if this were possible, is it not in itself persecution? To reduce sexual identity to just sexual conduct and then demand that an individual be totally ‘discreet’ (which is rarely possible) is inhumane.</span></p></div></div></section><section data-dcnode-id="600" data-gtm-vis-first-on-screen-50443292_562="408" data-gtm-vis-first-on-screen-50443292_563="409" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="408" data-gtm-vis-recent-on-screen-50443292_563="409" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Documentary Evidence of the Human Rights Situation for Lesbians and Gay Men in the Country of Origin"><div class="c-article-section" data-dcnode-id="601" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="625" id="Sec5"><span data-dcnode-id="626" instrument_node="">Documentary Evidence of the Human Rights Situation for Lesbians and Gay Men in the Country of Origin</span></h2><div class="c-article-section__content" data-dcnode-id="602" id="Sec5-content"><span data-dcnode-id="624" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="612"><div class="c-blockquote__body" data-dcnode-id="613"><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="622" instrument_node="">The evidence only relates to homosexuals, not lesbians.</span><sup data-dcnode-id="617"><a data-dcnode-id="618" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Footnote </span></span><span data-dcnode-id="619" instrument_node="">8</span></a></sup><span data-dcnode-id="616" instrument_node="">
</span></p><span data-dcnode-id="614" instrument_node="">
</span></div></blockquote><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">There are a number of issues that arise in demonstrating the situation generally for lesbians and gay men in their country of origin. It is, though, necessary to do this in order to show that the asylum seeker’s fear is well-founded.</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Country reports often do not deal with the situation for lesbians and gay men. The absence of information, though, does not necessarily mean that human rights abuses are not taking place. In countries where there are human rights abuses being committed in many areas, it may be that the situation for lesbians and gay men has simply not being considered. The general human rights situation can thus hide the situation for lesbians and gay men. However, it is of course possible that lesbians and gays may face persecution on the basis of their sexual identity even if they originate from a country where human rights abuses on other grounds are rare.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Local human rights groups often will not deal with lesbian and gay issues for a number of reasons. If they do, they themselves may lose support or be banned from operating. It may also be that they do not consider that they should be dealing with these issues. Some groups, particularly religious groups, do not consider abuse against lesbian and gay individuals to be a human rights issue or they may consider such abuse to be of less importance than other human rights abuses in their country.</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">The difficulties in documenting the situation for lesbians can be even greater than those for gay men. It should not be concluded that reference to “homosexual” human rights abuses only refers to men as many countries do not make a distinction between lesbians and “homosexual” conduct. Even if there is a distinction, a lack of evidence does not necessarily mean that human rights abuses do not occur. The lack of evidence may be due to a lack of reporting because of fear of harm. Sadly, as the quote above shows, immigration judges often do not accept that lesbians are at risk of persecution even where there is evidence that gay men are.</span></p></div></div></section><section data-dcnode-id="583" data-title="Barriers to Accessing the Asylum Process"><div class="c-article-section" data-dcnode-id="584" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="598" id="Sec6"><span data-dcnode-id="599" instrument_node="">Barriers to Accessing the Asylum Process</span></h2><div class="c-article-section__content" data-dcnode-id="585" id="Sec6-content"><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Credibility is a very important part of any claim for asylum. An asylum seeker must be believed if their need for protection is to be recognised. The Home Office or immigration judge will want to see that an asylum seeker has claimed asylum soon after arrival in the U.K. and that their account has been consistent throughout. Unfortunately, there are barriers to the asylum process for lesbian and gay asylum seekers which can lead to a delay in claiming asylum or no claim at all; the late disclosure or non-disclosure of sexual identity; a failure to give a full account of experiences and fears; or an initial fabrication in the asylum claim. All of these can affect the credibility of the asylum seeker. The particular obstacles relate to lack of knowledge of the protection available, feelings of shame, and fear of disclosing their sexual identity to officials or their own community in the U.K.</span></p><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">It is widely known that a claim for asylum can be based, for instance, on political opinion. It is less widely known that sexual identity can be the basis for an asylum claim. Asylum seekers themselves often see a refugee as a ‘political’ person or a person from a ‘war-torn’ country. This situation is slowly changing through some supportive (and some negative) media reports and through the work of U.K.L.G.I.G. and other groups. It remains the case, though, that many lesbian and gay asylum seekers do not know, or simply do not believe, that they are entitled to protection due to their fears.</span></p><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Lesbian and gay asylum seekers can be affected by very strong feelings of shame. By the nature of their claim, they will come from a country where they are continually told that to be lesbian or gay is to be ‘immoral’. These feelings do not disappear immediately, even in the relatively enlightened environment of the U.K.</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Allied to this, to have previously disclosed that they are lesbian or gay may have, at best, led to banishment from the family, at worst, to physical abuse or imprisonment. To have disclosed their sexual identity to the attention of an official may well have served to increase the risk of persecution – it will often be the state itself in that country that persecutes. How do you tell a police officer that you have been beaten because you are a gay man, when same sex sexual conduct is a criminal offence? The outcome is more likely to be prosecution rather than protection. On reaching the U.K., lesbian and gay asylum seekers are expected to give a full account of their need for protection to a Home Office official (and their own lawyer if they have one). This can be a counter-intuitive and terrifying experience and beyond some individuals.</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Most asylum seekers in the U.K. will gain knowledge of the asylum process through their ethnic and national communities. However, it is unfortunately common for the homophobia that exists in the country of origin to still be widely held by the community in the U.K. (though, of course, in the U.K. protection is available from the authorities). Lesbians and gay men may be isolated from knowledge or access to procedures through their national or ethnic communities because of their sexual identity. This can be through shame, fear of being isolated, or fear of their sexual identity being disclosed to those in the country of origin, increasing the fear of persecution if the asylum claim fails and they are eventually returned.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">There is a further very practical problem. Many asylum seekers require an interpreter to give details of their claim. Lesbians and gay men may find it difficult or even impossible to talk about their experiences through an interpreter who is a member of their community. All of these barriers can lead to credibility being harmed and the need for protection not being recognised.</span></p></div></div></section><section data-dcnode-id="555" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="556" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="581" id="Sec7"><span data-dcnode-id="582" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="557" id="Sec7-content"><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">This paper has outlined the particular problems facing lesbian and gay asylum seekers in the U.K. Perhaps of all the problems identified, the lack of understanding of sexual identity and its reduction to sexual conduct is the hardest to overcome. Proving sexual identity is often very difficult, and all too often decisions are made by those who are ignorant of the complexity of sexual identity, witness the Sierra Leonean lesbian whose sexual identity is in question because she has a child. This article started with a quote from an immigration judge as follows:</span></p><blockquote class="c-blockquote" data-dcnode-id="567"><div class="c-blockquote__body" data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="577" instrument_node="">We cannot claim any particular knowledge of the ways of homosexuals, still less of Iranian homosexuals…”</span><sup data-dcnode-id="572"><a data-dcnode-id="573" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Footnote </span></span><span data-dcnode-id="574" instrument_node="">9</span></a></sup><span data-dcnode-id="571" instrument_node="">
</span></p><span data-dcnode-id="569" instrument_node="">
</span></div></blockquote><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">This is simply not good enough. It is the U.K.’s obligation under the Refugee Convention to give protection to those who deserve it. Ignorance cannot be allowed.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">In addition, human rights abuses against lesbians and gay men are often not well-documented, making it difficult for the individual asylum seeker to show that their fear is “well-founded”. The existence of a law against same sex sexual conduct is not in itself enough to satisfy the U.K.’s interpretation of the Refugee Convention; the Home Office and immigration judges demand that there is more ‘active’ persecution. From the author’s own experience, it seems that many consider the demand that a lesbian or gay man “just go home and be quiet about it” is reasonable. To those people, the question must be asked – would they expect a person who is persecuted because of religion to forego that religion or only practice in secret? Would they require a ‘political’ asylum seeker to give up those beliefs or never espouse them in their country of origin? The answer from the Home Office and the U.K. immigration courts is that they would not expect this. Why then should a lesbian or gay man conceal their sexual identity in order to avoid serious harm? Is this not itself persecution?</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">It must be remembered that these individuals are not in any way asking for ‘special rights’. They are simply asking to be accepted for who they are, to be able to fall in love with who they want and to be able to be open with the world about their relationships and desires and not be forced into opposite sex relationships or continual lies. These are basic human rights and when they are denied due to the risk of discrimination, verbal or physical abuse, imprisonment or execution, we should all be concerned and should ensure that the lucky few who make it to the U.K. are assisted in accessing the protection they deserve.</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">The final note should be positive. Despite the particular problems they face, some lesbian and gay asylum seekers are winning their cases (often after a long struggle) and being granted refugee status in the U.K. It is hoped that by confronting the particular problems faced by lesbian and gay asylum seekers we can ensure that all of those who deserve protection receive that protection.</span></p></div></div></section><span data-dcnode-id="554" instrument_node="">
</span><section data-dcnode-id="503" data-title="Notes"><div class="c-article-section" data-dcnode-id="504" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="552" id="notes"><span data-dcnode-id="553" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="505" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="506"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="545" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="546"><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">
