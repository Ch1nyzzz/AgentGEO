doi: </span><span class="NLM_pub-id" data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">10.1037/a0018954</span></span><span data-dcnode-id="4739" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4727"><span data-dcnode-id="4738" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4732"><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1037%252Fa0018954" target="_blank"><span data-dcnode-id="4737" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4735" instrument_node="">, </span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D000288914800001" target="_blank"><span data-dcnode-id="4734" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4728"><span data-dcnode-id="4731" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D2%26publication_year%3D2010%26pages%3D71-76%26author%3DJ.%2BS.%2BRobinson%26author%3DC%2BLarson%26title%3DAre%2Btraumatic%2Bevents%2Bnecessary%2Bto%2Belicit%2Bsymptoms%2Bof%2Bposttraumatic%2Bstress%253F%26doi%3D10.1037%252Fa0018954" target="_blank"><span data-dcnode-id="4730" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4723" instrument_node="">). Trauma-related stimuli may thus lead to an increase in PTSD when they are associated with life-threatening situations.</span></p><p data-dcnode-id="4518"><span data-dcnode-id="4721" instrument_node="">The increase of posttraumatic intrusions may be related to the identified decrease of posttraumatic avoidance symptoms. Herlihy and Turner (</span><span class="ref-lnk lazy-ref" data-dcnode-id="4686"><a data-dcnode-id="4719" data-reflink="_i23" data-rid="CIT0022" href="#"><span data-dcnode-id="4720" instrument_node="">2006</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4687"><span class="ref-close" data-dcnode-id="4718" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4717"></span><span data-dcnode-id="4688"><span class="hlFld-ContribAuthor" data-dcnode-id="4713"><span data-dcnode-id="4716" instrument_node="">Herlihy </span><span class="NLM_given-names" data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">J.</span></span></span><span data-dcnode-id="4712" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4708"><span data-dcnode-id="4711" instrument_node="">Turner </span><span class="NLM_given-names" data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">S</span></span></span><span data-dcnode-id="4707" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">Should discrepant accounts given by asylum seekers be taken as proof of deceit?</span></span><span data-dcnode-id="4704" instrument_node="">. Torture. </span><span class="NLM_year" data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">2006</span></span><span data-dcnode-id="4701" instrument_node="">; 2(16): </span><span class="NLM_fpage" data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">81</span></span><span data-dcnode-id="4698" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">92</span></span><span data-dcnode-id="4695" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4689"><span data-dcnode-id="4694" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4693"></span><span class="googleScholar-container" data-dcnode-id="4690"><a class="google-scholar" data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D2%26publication_year%3D2006%26pages%3D81-92%26issue%3D16%26author%3DJ.%2BHerlihy%26author%3DS%2BTurner%26title%3DShould%2Bdiscrepant%2Baccounts%2Bgiven%2Bby%2Basylum%2Bseekers%2Bbe%2Btaken%2Bas%2Bproof%2Bof%2Bdeceit%253F" target="_blank"><span data-dcnode-id="4692" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4685" instrument_node="">) argued that avoidance initially serves as a survival strategy. According to these authors, many refugees state that they only manage to escape their situation and to cope with migration to a new country by deliberately avoiding thinking about what happened during the traumatizing event. This strategy is undermined during a court hearing, especially during the testimony phase (Pitman, Sparr, Saunders, &amp; McFarlane, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4619"><a data-dcnode-id="4683" data-reflink="_i23" data-rid="CIT0039" href="#"><span data-dcnode-id="4684" instrument_node="">1996</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4620"><span class="ref-close" data-dcnode-id="4682" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4681"></span><span data-dcnode-id="4621"><span class="hlFld-ContribAuthor" data-dcnode-id="4677"><span data-dcnode-id="4680" instrument_node="">Pitman </span><span class="NLM_given-names" data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">R. K.</span></span></span><span data-dcnode-id="4676" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4672"><span data-dcnode-id="4675" instrument_node="">Sparr </span><span class="NLM_given-names" data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">L. F.</span></span></span><span data-dcnode-id="4671" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4667"><span data-dcnode-id="4670" instrument_node="">Saunders </span><span class="NLM_given-names" data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">L. S.</span></span></span><span data-dcnode-id="4666" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4662"><span data-dcnode-id="4665" instrument_node="">McFarlane </span><span class="NLM_given-names" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">A. C</span></span></span><span data-dcnode-id="4661" instrument_node="">. </span><span class="hlFld-ContribAuthor" data-dcnode-id="4657"><span data-dcnode-id="4660" instrument_node="">Van der Kolk </span><span class="NLM_given-names" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">B. A.</span></span></span><span data-dcnode-id="4656" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4652"><span data-dcnode-id="4655" instrument_node="">McFarlane </span><span class="NLM_given-names" data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">A. C.</span></span></span><span data-dcnode-id="4651" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4647"><span data-dcnode-id="4650" instrument_node="">Weisaeth </span><span class="NLM_given-names" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">L</span></span></span><span data-dcnode-id="4646" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Legal issues in posttraumatic stress disorder</span></span><span data-dcnode-id="4643" instrument_node="">. Traumatic stress: The effects of overwhelming experience on mind, body and society. </span><span class="NLM_year" data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">1996</span></span><span data-dcnode-id="4640" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">New York, NY</span></span><span data-dcnode-id="4637" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">Guilford</span></span><span data-dcnode-id="4634" instrument_node="">. </span><span class="NLM_fpage" data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">378</span></span><span data-dcnode-id="4631" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">397</span></span><span data-dcnode-id="4628" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4622"><span data-dcnode-id="4627" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4626"></span><span class="googleScholar-container" data-dcnode-id="4623"><a class="google-scholar" data-dcnode-id="4624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1996%26pages%3D378-397%26author%3DR.%2BK.%2BPitman%26author%3DL.%2BF.%2BSparr%26author%3DL.%2BS.%2BSaunders%26author%3DA.%2BC%2BMcFarlane%26title%3DTraumatic%2Bstress%253A%2BThe%2Beffects%2Bof%2Boverwhelming%2Bexperience%2Bon%2Bmind%252C%2Bbody%2Band%2Bsociety" target="_blank"><span data-dcnode-id="4625" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4618" instrument_node="">). Thus, the avoidance of reminders of the traumatic events cannot be maintained as a coping mechanism during the asylum interview, which may be very distressing. From a therapeutic perspective, reducing avoidance is the pivotal mechanism of psychotherapy with PTSD patients (Varra &amp; Follette, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4567"><a data-dcnode-id="4616" data-reflink="_i23" data-rid="CIT0049" href="#"><span data-dcnode-id="4617" instrument_node="">2005</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4568"><span class="ref-close" data-dcnode-id="4615" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4614"></span><span data-dcnode-id="4569"><span class="hlFld-ContribAuthor" data-dcnode-id="4610"><span data-dcnode-id="4613" instrument_node="">Varra </span><span class="NLM_given-names" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">A. A.</span></span></span><span data-dcnode-id="4609" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4605"><span data-dcnode-id="4608" instrument_node="">Follette </span><span class="NLM_given-names" data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">V. M</span></span></span><span data-dcnode-id="4604" instrument_node="">. </span><span class="hlFld-ContribAuthor" data-dcnode-id="4600"><span data-dcnode-id="4603" instrument_node="">Hayes </span><span class="NLM_given-names" data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">S. C.</span></span></span><span data-dcnode-id="4599" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4595"><span data-dcnode-id="4598" instrument_node="">Strosahl </span><span class="NLM_given-names" data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">K. D</span></span></span><span data-dcnode-id="4594" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">ACT with posttraumatic stress disorder</span></span><span data-dcnode-id="4591" instrument_node="">. A practical guide to acceptance and commitment therapy. </span><span class="NLM_year" data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">2005</span></span><span data-dcnode-id="4588" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">New York, NY</span></span><span data-dcnode-id="4585" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">Springer Science+Business Media</span></span><span data-dcnode-id="4582" instrument_node="">. </span><span class="NLM_fpage" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">133</span></span><span data-dcnode-id="4579" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">152</span></span><span data-dcnode-id="4576" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4570"><span data-dcnode-id="4575" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4574"></span><span class="googleScholar-container" data-dcnode-id="4571"><a class="google-scholar" data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2005%26pages%3D133-152%26author%3DA.%2BA.%2BVarra%26author%3DV.%2BM%2BFollette%26title%3DA%2Bpractical%2Bguide%2Bto%2Bacceptance%2Band%2Bcommitment%2Btherapy" target="_blank"><span data-dcnode-id="4573" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4566" instrument_node="">). The crucial difference between the two contexts is that avoidance is forcibly penetrated during the asylum interview and that the individual does not experience the ability to cope with the memories of the traumatic event. This may reinforce stress or even be detrimental to the individual, also because of a possibly uncontrolled excess of intrusions. For example, high levels of dissociation during asylum interviews were reported by participants in Bogner's et al. (</span><span class="ref-lnk lazy-ref" data-dcnode-id="4520"><a data-dcnode-id="4564" data-reflink="_i23" data-rid="CIT0003" href="#"><span data-dcnode-id="4565" instrument_node="">2007</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4521"><span class="ref-close" data-dcnode-id="4563" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4562"></span><span data-dcnode-id="4522"><span class="hlFld-ContribAuthor" data-dcnode-id="4558"><span data-dcnode-id="4561" instrument_node="">Bogner </span><span class="NLM_given-names" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">D.</span></span></span><span data-dcnode-id="4557" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4553"><span data-dcnode-id="4556" instrument_node="">Herlihy </span><span class="NLM_given-names" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">J.</span></span></span><span data-dcnode-id="4552" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4548"><span data-dcnode-id="4551" instrument_node="">Brewin </span><span class="NLM_given-names" data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">C. R</span></span></span><span data-dcnode-id="4547" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">Impact of sexual violence on disclosure during Home Office interviews</span></span><span data-dcnode-id="4544" instrument_node="">. British Journal of Psychiatry. </span><span class="NLM_year" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">2007</span></span><span data-dcnode-id="4541" instrument_node="">; 191: </span><span class="NLM_fpage" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">75</span></span><span data-dcnode-id="4538" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">81</span></span><span data-dcnode-id="4535" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/17602129/" target="_blank"><span data-dcnode-id="4534" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="4532" instrument_node="">]
</span><span class="NLM_pub-id" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">10.1192/bjp.bp.106.030262</span></span><span data-dcnode-id="4529" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4523"><span data-dcnode-id="4528" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4527"></span><span class="googleScholar-container" data-dcnode-id="4524"><a class="google-scholar" data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2007%26author%3DD.%2BBogner%26author%3DJ.%2BHerlihy%26author%3DC.%2BR%2BBrewin%26title%3DImpact%2Bof%2Bsexual%2Bviolence%2Bon%2Bdisclosure%2Bduring%2BHome%2BOffice%2Binterviews" target="_blank"><span data-dcnode-id="4526" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4519" instrument_node="">) study.</span></p><p data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">The significant decrease in posttraumatic hyperarousal symptoms in the AG might be due to a temporary feeling of relief after passing the asylum interview. A feeling of having overcome a crucial step towards safety in the country of exile, the so-called “honeymoon effect,” may also be assumed to contribute to the decrease in hyperarousal symptoms. In contrast, there were no significant PTSD symptom changes in the comparison group.</span></p><p data-dcnode-id="4415"><span data-dcnode-id="4515" instrument_node="">We found further that the perceived justice of the hearing predicts the increase of intrusions. Previous studies indicate that, besides a lack of social support, the lack of social acknowledgement of the traumatic experience predicts the development of PTSD (Brewin, Andrews, &amp; Valentine, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4469"><a data-dcnode-id="4513" data-reflink="_i23" data-rid="CIT0004" href="#"><span data-dcnode-id="4514" instrument_node="">2000</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4470"><span class="ref-close" data-dcnode-id="4512" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4511"></span><span data-dcnode-id="4471"><span class="hlFld-ContribAuthor" data-dcnode-id="4507"><span data-dcnode-id="4510" instrument_node="">Brewin </span><span class="NLM_given-names" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">C. R.</span></span></span><span data-dcnode-id="4506" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4502"><span data-dcnode-id="4505" instrument_node="">Andrews </span><span class="NLM_given-names" data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">B.</span></span></span><span data-dcnode-id="4501" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4497"><span data-dcnode-id="4500" instrument_node="">Valentine </span><span class="NLM_given-names" data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">J. D</span></span></span><span data-dcnode-id="4496" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Meta-analysis of risk factors for posttraumatic stress disorder in trauma-exposed adults</span></span><span data-dcnode-id="4493" instrument_node="">. Journal of Consulting and Clinical Psychology. </span><span class="NLM_year" data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">2000</span></span><span data-dcnode-id="4490" instrument_node="">; 68: </span><span class="NLM_fpage" data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">748</span></span><span data-dcnode-id="4487" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">766</span></span><span data-dcnode-id="4484" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/11068961/" target="_blank"><span data-dcnode-id="4483" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="4481" instrument_node="">]
</span><span class="NLM_pub-id" data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">10.1037/0022-006X.68.5.748</span></span><span data-dcnode-id="4478" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4472"><span data-dcnode-id="4477" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4476"></span><span class="googleScholar-container" data-dcnode-id="4473"><a class="google-scholar" data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2000%26author%3DC.%2BR.%2BBrewin%26author%3DB.%2BAndrews%26author%3DJ.%2BD%2BValentine%26title%3DMeta-analysis%2Bof%2Brisk%2Bfactors%2Bfor%2Bposttraumatic%2Bstress%2Bdisorder%2Bin%2Btrauma-exposed%2Badults" target="_blank"><span data-dcnode-id="4475" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4468" instrument_node="">). The experience that one's account is not believed and that one's suffering is invalidated may result in feelings of powerlessness, humiliation, helplessness, and fear, potentially leading to increased intrusions. Intrusions are associated with significant psychological distress (Simms, Gros, Watson, &amp; O'Hara, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4417"><a data-dcnode-id="4466" data-reflink="_i23" data-rid="CIT0044" href="#"><span data-dcnode-id="4467" instrument_node="">2008</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4418"><span class="ref-close" data-dcnode-id="4465" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4464"></span><span data-dcnode-id="4419"><span class="hlFld-ContribAuthor" data-dcnode-id="4460"><span data-dcnode-id="4463" instrument_node="">Simms </span><span class="NLM_given-names" data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">L. J.</span></span></span><span data-dcnode-id="4459" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4455"><span data-dcnode-id="4458" instrument_node="">Gros </span><span class="NLM_given-names" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">D. F.</span></span></span><span data-dcnode-id="4454" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4450"><span data-dcnode-id="4453" instrument_node="">Watson </span><span class="NLM_given-names" data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">D.</span></span></span><span data-dcnode-id="4449" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4445"><span data-dcnode-id="4448" instrument_node="">O'Hara </span><span class="NLM_given-names" data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">M. W</span></span></span><span data-dcnode-id="4444" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Parsing the general and specific components of depression and anxiety with bifactor modeling</span></span><span data-dcnode-id="4441" instrument_node="">. Depression and Anxiety. </span><span class="NLM_year" data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">2008</span></span><span data-dcnode-id="4438" instrument_node="">; 25: </span><span class="NLM_fpage" data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">34</span></span><span data-dcnode-id="4435" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">46</span></span><span data-dcnode-id="4432" instrument_node="">.

, in the present case the granting of asylum. However, the stressful nature of a pending asylum claim exacerbates psychological distress in general, and thus increases PTSD scores. Because the participants did not yet know about their resident status when we assessed them the second time, we obviously cannot draw any conclusions about the relationship between resident status and PTSD symptoms. The results of previous studies on the impact of the asylum decision on PTSD symptoms are inconsistent. Some have found that a positive outcome of the hearing is accompanied by significantly reduced PTSD symptoms (Davis &amp; Davis, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4376"><a data-dcnode-id="4412" data-reflink="_i23" data-rid="CIT0008" href="#"><span data-dcnode-id="4413" instrument_node="">2006</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4377"><span class="ref-close" data-dcnode-id="4411" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4410"></span><span data-dcnode-id="4378"><span class="hlFld-ContribAuthor" data-dcnode-id="4406"><span data-dcnode-id="4409" instrument_node="">Davis </span><span class="NLM_given-names" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">R. M.</span></span></span><span data-dcnode-id="4405" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4401"><span data-dcnode-id="4404" instrument_node="">Davis </span><span class="NLM_given-names" data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">H</span></span></span><span data-dcnode-id="4400" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">PTSD symptom changes in refugees</span></span><span data-dcnode-id="4397" instrument_node="">. Torture. </span><span class="NLM_year" data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">2006</span></span><span data-dcnode-id="4394" instrument_node="" M_given-names" data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">K.</span></span></span><span data-dcnode-id="4237" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4233"><span data-dcnode-id="4236" instrument_node="">Schauer </span><span class="NLM_given-names" data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">M.</span></span></span><span data-dcnode-id="4232" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4228"><span data-dcnode-id="4231" instrument_node="">Eckart </span><span class="NLM_given-names" data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">C.</span></span></span><span data-dcnode-id="4227" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4223"><span data-dcnode-id="4226" instrument_node="">Kolassa </span><span class="NLM_given-names" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">I.</span></span></span><span data-dcnode-id="4222" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4218"><span data-dcnode-id="4221" instrument_node="">Catani </span><span class="NLM_given-names" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">C.</span></span></span><span data-dcnode-id="4217" instrument_node="">, etal. </span><span class="NLM_article-title" data-dcnode-id="4213"><i data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Psychische Gesundheit und Aufenthaltssituation bei Flüchtlingen in Deutschland: Ergebnisse einer Längsschnittstudie</span></i><span data-dcnode-id="4214" instrument_node=""> [Mental health and residence status in refugees in Germany: Results of a longitudinal study]</span></span><span data-dcnode-id="4212" instrument_node="">. </span><span class="NLM_year" data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">2007</span></span><span data-dcnode-id="4209" instrument_node="">. Paper presented at the 9th Annual Meeting of the Deutschsprachige Gesellschaft für Psychotraumatologie (DeGPT). Hamburg, Germany.</span><span class="refLink-block" data-dcnode-id="4203"><span data-dcnode-id="4208" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4207"></span><span class="googleScholar-container" data-dcnode-id="4204"><a class="google-scholar" data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DRuf%2BM.%252C%2BLehmann%2BK.%252C%2BSchauer%2BM.%252C%2BEckart%2BC.%252C%2BKolassa%2BI.%252C%2BCatani%2BC.%252C%2Betal.%2BPsychische%2BGesundheit%2Bund%2BAufenthaltssituation%2Bbei%2BFl%25C3%25BCchtlingen%2Bin%2BDeutschland%3A%2BErgebnisse%2Beiner%2BL%25C3%25A4ngsschnittstudie%2B%255BMental%2Bhealth%2Band%2Bresidence%2Bstatus%2Bin%2Brefugees%2Bin%2BGermany%3A%2BResults%2Bof%2Ba%2Blongitudinal%2Bstudy%255D.%2B2007.%2BPaper%2Bpresented%2Bat%2Bthe%2B9th%2BAnnual%2BMeeting%2Bof%2Bthe%2BDeutschsprachige%2BGesellschaft%2Bf%25C3%25BCr%2BPsychotraumatologie%2B%28DeGPT%29.%2BHamburg%252C%2BGermany." target="_blank"><span data-dcnode-id="4206" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4199" instrument_node="">) showed that attaining permanent resident status was associated with a decrease in symptoms of depression but had no influence on PTSD. Because the decision for permanent residency can take months to come, we cannot speculate on whether a positive outcome may have been associated with an increase in intrusions over time.</span></p><p data-dcnode-id="4193"><span data-dcnode-id="4197" instrument_node="">Moreover, the comparison group was small, because very few asylum seekers who look for assistance in a center for the treatment of torture survivors and refugees have not yet received an invitation for the asylum interview by that time. This was the condition for inclusion in the comparison group. Unlike the asylum group, these participants did not receive therapeutic treatment during the study period, whereas almost all members of the asylum group (</span><i data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">n</span></i><span data-dcnode-id="4194" instrument_node="">=37, 92.5%) were in psychotherapy during this time. In other words, they were informed about the asylum interview process and supervised subsequent to it. Against this background, we cannot draw any conclusions on the natural course of symptoms during the asylum process.</span></p></div><div class="NLM_sec NLM_sec-type_conclusions NLM_sec_level_1" data-dcnode-id="4122" id="S0006"><h2 class="section-heading-2" data-dcnode-id="4190" id="_i21"><span data-dcnode-id="4191" instrument_node="">Conclusions</span></h2><p data-dcnode-id="4125"><span data-dcnode-id="4189" instrument_node="">Our results have implications for both decision-makers and clinicians. The increased number of wars and armed conflicts in the world leads to continually increasing numbers of refugees and asylum seekers looking for secure residence in western countries. Many asylum seekers are highly traumatized and thus suffer from severe physical and mental health problems. Stress factors after the asylum interview might affect the recuperation process, the processing of the traumata and foster chronification of the symptoms. The asylum process with its asylum interview is seen as one of the postmigration stressors asylum seekers have to deal with. Our study results give an idea of the high vulnerability of traumatized asylum seekers and show that the asylum interview might decrease posttraumatic avoidance and trigger posttraumatic intrusions. This is even more remarkable as our study participants received support for the preparation of their asylum interviews, e.g., normally they have already talked about traumatic experiences before the asylum interview. Without preparation and psychological support there might be an even greater symptom increase. An elaborated and sensitive preparation for the asylum interview and postprocessing by clinicians after the interview or hearing are important in order to avoid permanent symptom increase or even chronification of the symptoms. The results of a study conducted by Gäbel, Ruf, Schauer, Odenwald, and Neuner (</span><span class="ref-lnk lazy-ref" data-dcnode-id="4127"><a data-dcnode-id="4187" data-reflink="_i23" data-rid="CIT0017" href="#"><span data-dcnode-id="4188" instrument_node="">2005</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4128"><span class="ref-close" data-dcnode-id="4186" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4185"></span><span data-dcnode-id="4129"><span class="hlFld-ContribAuthor" data-dcnode-id="4181"><span data-dcnode-id="4184" instrument_node="">Gäbel </span><span class="NLM_given-names" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">U.</span></span></span><span data-dcnode-id="4180" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4176"><span data-dcnode-id="4179" instrument_node="">Ruf </span><span class="NLM_given-names" data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">M.</span></span></span><span data-dcnode-id="4175" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4171"><span data-dcnode-id="4174" instrument_node="">Schauer </span><span class="NLM_given-names" data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">M.</span></span></span><span data-dcnode-id="4170" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4166"><span data-dcnode-id="4169" instrument_node="">Odenwald </span><span class="NLM_given-names" data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">M.</span></span></span><span data-dcnode-id="4165" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4161"><span data-dcnode-id="4164" instrument_node="">Neuner </span><span class="NLM_given-names" data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">F</span></span></span><span data-dcnode-id="4160" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Prävalenz der Posttraumatischen Belastungsstörung (PTSD) und Möglichkeiten der Ermittlung in der Asylverfahrenspraxis [Prevalence of posttraumatic stress disorder (PTSD) and possibilities of identification within the asylum procedure]</span></span><span data-dcnode-id="4157" instrument_node="">. Zeitschrift für Klinische Psychologie und Psychotherapie. </span><span class="NLM_year" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">2005</span></span><span data-dcnode-id="4154" instrument_node="">; 35(</span><span class="NLM_supplement" data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">1</span></span><span data-dcnode-id="4151" instrument_node="">): </span><span class="NLM_fpage" data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">12</span></span><span data-dcnode-id="4148" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">20</span></span><span data-dcnode-id="4145" instrument_node="">.
doi: </span><span class="NLM_pub-id" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">10.1026/1616-3443.35.1.12</span></span><span data-dcnode-id="4142" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4130"><span data-dcnode-id="4141" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4135"><a data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0017%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1026%252F1616-3443.35.1.12" target="_blank"><span data-dcnode-id="4140" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4138" instrument_node="">, </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0017%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D000235760500002" target="_blank"><span data-dcnode-id="4137" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4131"><span data-dcnode-id="4134" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D35%26publication_year%3D2005%26pages%3D12-20%26author%3DU.%2BG%25C3%25A4bel%26author%3DM.%2BRuf%26author%3DM.%2BSchauer%26author%3DM.%2BOdenwald%26author%3DF%2BNeuner%26title%3DPr%25C3%25A4valenz%2Bder%2BPosttraumatischen%2BBelastungsst%25C3%25B6rung%2B%28PTSD%29%2Bund%2BM%25C3%25B6glichkeiten%2Bder%2BErmittlung%2Bin%2Bder%2BAsylverfahrenspraxis%2B%255BPrevalence%2Bof%2Bposttraumatic%2Bstress%2Bdisorder%2B%28PTSD%29%2Band%2Bpossibilities%2Bof%2Bidentification%2Bwithin%2Bthe%2Basylum%2Bprocedure%255D%26doi%3D10.1026%252F1616-3443.35.1.12" target="_blank"><span data-dcnode-id="4133" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4126" instrument_node="">) showed that, even after psychological training, official judicial interviewers were unable to identify PTSD cases during asylum interviews.</span></p><p data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">It would make sense to provide the responsible decision-makers with special training to gain psychological knowledge and sufficient understanding of the effects of PTSD, thus heightening their awareness and helping them to better understand the specific needs of traumatized refugees in the context of a hearing. Not only could such awareness reduce the effects of distress on memory performance, it could also enhance the asylum seeker's perception of the justice of the asylum interview.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="4117" id="S0007"><h2 class="section-heading-2" data-dcnode-id="4120" id="_i22"><span data-dcnode-id="4121" instrument_node="">Conflict of interest and funding</span></h2><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">There is no conflict of interest in the present study for any of the authors.</span></p></div></div><div class="hidden" data-dcnode-id="3802" id="table-content-T0001"><div class="caption" data-dcnode-id="4105"><p class="captionText" data-dcnode-id="4106"><span class="captionLabel" data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">Table 1 </span></span><span data-dcnode-id="4113" instrument_node=""> Demographic data for the asylum group (AG; </span><i data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">n=</span></i><span data-dcnode-id="4110" instrument_node="">40) and the comparison group (CG; </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">n=</span></i><span data-dcnode-id="4107" instrument_node="">10)</span></p></div><table class="table frame_topbot" data-dcnode-id="3803"><colgroup data-dcnode-id="4098"><col
