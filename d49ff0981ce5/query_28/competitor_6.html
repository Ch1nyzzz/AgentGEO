Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="5804" data-id="T0001" href="#" role="button"><span data-dcnode-id="5805" instrument_node="">Display Table</span></a></div></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5713"><h4 class="section-heading-4" data-dcnode-id="5800" id="_i14"><span data-dcnode-id="5801" instrument_node="">Traumatic events</span></h4><p data-dcnode-id="5714"><span data-dcnode-id="5799" instrument_node="">Participants identified the trauma they had experienced and/or witnessed on a traumatic event list consisting of 23 items. The items were derived from the PDS Part I (Foa, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5772"><a data-dcnode-id="5797" data-reflink="_i23" data-rid="CIT0014" href="#"><span data-dcnode-id="5798" instrument_node="">1995</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5773"><span class="ref-close" data-dcnode-id="5796" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5795"></span><span data-dcnode-id="5774"><span class="hlFld-ContribAuthor" data-dcnode-id="5791"><span data-dcnode-id="5794" instrument_node="">Foa </span><span class="NLM_given-names" data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">E. B</span></span></span><span data-dcnode-id="5790" instrument_node="">. Posttraumatic Diagnostic Scale: Manual. </span><span class="NLM_year" data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">1995</span></span><span data-dcnode-id="5787" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Minneapolis, MN</span></span><span data-dcnode-id="5784" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">National Computer Systems</span></span><span data-dcnode-id="5781" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5775"><span data-dcnode-id="5780" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5779"></span><span class="googleScholar-container" data-dcnode-id="5776"><a class="google-scholar" data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1995%26author%3DE.%2BB%2BFoa%26title%3DPosttraumatic%2BDiagnostic%2BScale%253A%2BManual" target="_blank"><span data-dcnode-id="5778" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5771" instrument_node="">) and complemented by items from the Harvard Trauma Questionnaire event list (Mollica et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5716"><a data-dcnode-id="5769" data-reflink="_i23" data-rid="CIT0034" href="#"><span data-dcnode-id="5770" instrument_node="">1992</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5717"><span class="ref-close" data-dcnode-id="5768" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5767"></span><span data-dcnode-id="5718"><span class="hlFld-ContribAuthor" data-dcnode-id="5763"><span data-dcnode-id="5766" instrument_node="">Mollica </span><span class="NLM_given-names" data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">R. F.</span></span></span><span data-dcnode-id="5762" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5758"><span data-dcnode-id="5761" instrument_node="">Caspi-Yavin </span><span class="NLM_given-names" data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">Y.</span></span></span><span data-dcnode-id="5757" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5753"><span data-dcnode-id="5756" instrument_node="">Bollini </span><span class="NLM_given-names" data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">P.</span></span></span><span data-dcnode-id="5752" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5748"><span data-dcnode-id="5751" instrument_node="">Truong </span><span class="NLM_given-names" data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">T.</span></span></span><span data-dcnode-id="5747" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5743"><span data-dcnode-id="5746" instrument_node="">Tor </span><span class="NLM_given-names" data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">S.</span></span></span><span data-dcnode-id="5742" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5738"><span data-dcnode-id="5741" instrument_node="">Lavelle </span><span class="NLM_given-names" data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node="">J</span></span></span><span data-dcnode-id="5737" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5735"><span data-dcnode-id="5736" instrument_node="">The Harvard Trauma Questionnaire: Validating a cross-cultural instrument for measuring torture, trauma and posttraumatic stress disorder in Indochinese refugees</span></span><span data-dcnode-id="5734" instrument_node="">. Journal of Nervous and Mental Disease. </span><span class="NLM_year" data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">1992</span></span><span data-dcnode-id="5731" instrument_node="">; 180(2): </span><span class="NLM_fpage" data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">111</span></span><span data-dcnode-id="5728" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">116</span></span><span data-dcnode-id="5725" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5719"><span data-dcnode-id="5724" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5723"></span><span class="googleScholar-container" data-dcnode-id="5720"><a class="google-scholar" data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1992%26author%3DR.%2BF.%2BMollica%26author%3DY.%2BCaspi-Yavin%26author%3DP.%2BBollini%26author%3DT.%2BTruong%26author%3DS.%2BTor%26author%3DJ%2BLavelle%26title%3DThe%2BHarvard%2BTrauma%2BQuestionnaire%253A%2BValidating%2Ba%2Bcross-cultural%2Binstrument%2Bfor%2Bmeasuring%2Btorture%252C%2Btrauma%2Band%2Bposttraumatic%2Bstress%2Bdisorder%2Bin%2BIndochinese%2Brefugees" target="_blank"><span data-dcnode-id="5722" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5715" instrument_node="">), and additional traumatic events relevant for traumatized refugees and torture survivors like “brainwashing.”</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5548"><h4 class="section-heading-4" data-dcnode-id="5711" id="_i15"><span data-dcnode-id="5712" instrument_node="">Posttraumatic stress disorder</span></h4><p data-dcnode-id="5549"><span data-dcnode-id="5710" instrument_node="">When the present study was conducted, the diagnostic criteria for PTSD found in DSM-IV PTSD still applied. Hence, we rely here on the DSM-IV PTSD criteria rather than those in DSM-5. PDS (Foa, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5683"><a data-dcnode-id="5708" data-reflink="_i23" data-rid="CIT0014" href="#"><span data-dcnode-id="5709" instrument_node="">1995</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5684"><span class="ref-close" data-dcnode-id="5707" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5706"></span><span data-dcnode-id="5685"><span class="hlFld-ContribAuthor" data-dcnode-id="5702"><span data-dcnode-id="5705" instrument_node="">Foa </span><span class="NLM_given-names" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">E. B</span></span></span><span data-dcnode-id="5701" instrument_node="">. Posttraumatic Diagnostic Scale: Manual. </span><span class="NLM_year" data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">1995</span></span><span data-dcnode-id="5698" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="5696"><span data-dcnode-id="5697" instrument_node="">Minneapolis, MN</span></span><span data-dcnode-id="5695" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">National Computer Systems</span></span><span data-dcnode-id="5692" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5686"><span data-dcnode-id="5691" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5690"></span><span class="googleScholar-container" data-dcnode-id="5687"><a class="google-scholar" data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1995%26author%3DE.%2BB%2BFoa%26title%3DPosttraumatic%2BDiagnostic%2BScale%253A%2BManual" target="_blank"><span data-dcnode-id="5689" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5682" instrument_node="">; Foa, et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5631"><a data-dcnode-id="5680" data-reflink="_i23" data-rid="CIT0015" href="#"><span data-dcnode-id="5681" instrument_node="">1997</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5632"><span class="ref-close" data-dcnode-id="5679" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5678"></span><span data-dcnode-id="5633"><span class="hlFld-ContribAuthor" data-dcnode-id="5674"><span data-dcnode-id="5677" instrument_node="">Foa </span><span class="NLM_given-names" data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">E. B.</span></span></span><span data-dcnode-id="5673" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5669"><span data-dcnode-id="5672" instrument_node="">Cashman </span><span class="NLM_given-names" data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">L.</span></span></span><span data-dcnode-id="5668" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5664"><span data-dcnode-id="5667" instrument_node="">Jaycox </span><span class="NLM_given-names" data-dcnode-id="5665"><span data-dcnode-id="5666" instrument_node="">L.</span></span></span><span data-dcnode-id="5663" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5659"><span data-dcnode-id="5662" instrument_node="">Perry </span><span class="NLM_given-names" data-dcnode-id="5660"><span data-dcnode-id="5661" instrument_node="">K</span></span></span><span data-dcnode-id="5658" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">The validation of a self-report measure of posttraumatic stress disorder: The Posttraumatic Diagnostic Scale</span></span><span data-dcnode-id="5655" instrument_node="">. Psychological Assessment. </span><span class="NLM_year" data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">1997</span></span><span data-dcnode-id="5652" instrument_node="">; 9: </span><span class="NLM_fpage" data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">445</span></span><span data-dcnode-id="5649" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5647"><span data-dcnode-id="5648" instrument_node="">451</span></span><span data-dcnode-id="5646" instrument_node="">. doi: 10.1186/1471-244X-5-11.</span><span class="refLink-block" data-dcnode-id="5634"><span data-dcnode-id="5645" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5639"><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0015%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1037%252F1040-3590.9.4.445" target="_blank"><span data-dcnode-id="5644" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5642" instrument_node="">, </span><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0015%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3DA1997YL09600014" target="_blank"><span data-dcnode-id="5641" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5635"><span data-dcnode-id="5638" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D9%26publication_year%3D1997%26pages%3D445-451%26author%3DE.%2BB.%2BFoa%26author%3DL.%2BCashman%26author%3DL.%2BJaycox%26author%3DK%2BPerry%26title%3DThe%2Bvalidation%2Bof%2Ba%2Bself-report%2Bmeasure%2Bof%2Bposttraumatic%2Bstress%2Bdisorder%253A%2BThe%2BPosttraumatic%2BDiagnostic%2BScale" target="_blank"><span data-dcnode-id="5637" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5630" instrument_node="">) was used to assess symptoms of posttraumatic stress. This self-report questionnaire consists of a traumatic event scale and a symptom scale. The symptom scale comprises the subscales “intrusions,” “avoidance,” and “hyperarousal.” It is closely modeled on the DSM-IV criteria for PTSD and can be administered repeatedly to help monitor symptom change (APA, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5607"><a data-dcnode-id="5628" data-reflink="_i23" data-rid="CIT0001" href="#"><span data-dcnode-id="5629" instrument_node="">1994</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5608"><span class="ref-close" data-dcnode-id="5627" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5626"></span><span data-dcnode-id="5609"><span data-dcnode-id="5625" instrument_node="">American Psychiatric Association. (APA). Diagnostic and statistical manual of mental disorders. </span><span class="NLM_year" data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">1994</span></span><span data-dcnode-id="5622" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">Washington, DC</span></span><span data-dcnode-id="5619" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">Author</span></span><span data-dcnode-id="5616" instrument_node="">. 4th ed..</span><span class="refLink-block" data-dcnode-id="5610"><span data-dcnode-id="5615" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5614"></span><span class="googleScholar-container" data-dcnode-id="5611"><a class="google-scholar" data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1994%26author%3DAmerican%2BPsychiatric%2BAssociation.%2B%2528APA%2529%26title%3DDiagnostic%2Band%2Bstatistical%2Bmanual%2Bof%2Bmental%2Bdisorders" target="_blank"><span data-dcnode-id="5613" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5606" instrument_node="">). The scale has very good internal consistency (</span><i data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">α</span></i><span data-dcnode-id="5603" instrument_node="">=0.92), test–retest reliability (</span><i data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">r=</span></i><span data-dcnode-id="5600" instrument_node="">0.74) (Briere, 1997), and has been validated across several populations. Participants were asked to indicate the frequency of each symptom over the past 4 weeks on a four-point scale ranging from 0=</span><i data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">never</span></i><span data-dcnode-id="5597" instrument_node=""> to 3=</span><i data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">daily</span></i><span data-dcnode-id="5594" instrument_node="">. The PDS functions well compared to clinician ratings; it is seen as a useful self-report and screening device for measuring PTSD and its component symptoms (Keane &amp; Kaloupek, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5551"><a data-dcnode-id="5592" data-reflink="_i23" data-rid="CIT0028" href="#"><span data-dcnode-id="5593" instrument_node="">2002</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5552"><span class="ref-close" data-dcnode-id="5591" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5590"></span><span data-dcnode-id="5553"><span class="hlFld-ContribAuthor" data-dcnode-id="5586"><span data-dcnode-id="5589" instrument_node="">Keane </span><span class="NLM_given-names" data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">M. T.</span></span></span><span data-dcnode-id="5585" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5581"><span data-dcnode-id="5584" instrument_node="">Kaloupek </span><span class="NLM_given-names" data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">D. G</span></span></span><span data-dcnode-id="5580" instrument_node="">. </span><span class="hlFld-ContribAuthor" data-dcnode-id="5576"><span data-dcnode-id="5579" instrument_node="">Yehuda </span><span class="NLM_given-names" data-dcnode-id="5577"><span data-dcnode-id="5578" instrument_node="">R</span></span></span><span data-dcnode-id="5575" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">Diagnosis, assessment, and monitoring outcomes in PTSD</span></span><span data-dcnode-id="5572" instrument_node="">. Treating trauma. Survivors with PTSD. </span><span class="NLM_year" data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">2002</span></span><span data-dcnode-id="5569" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">Washington, DC</span></span><span data-dcnode-id="5566" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">American Psychiatric</span></span><span data-dcnode-id="5563" instrument_node="">. </span><span class="NLM_fpage" data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">34</span></span><span data-dcnode-id="5560" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5554"><span data-dcnode-id="5559" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5558"></span><span class="googleScholar-container" data-dcnode-id="5555"><a class="google-scholar" data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2002%26pages%3D34%26author%3DM.%2BT.%2BKeane%26author%3DD.%2BG%2BKaloupek%26title%3DTreating%2Btrauma.%2BSurvivors%2Bwith%2BPTSD" target="_blank"><span data-dcnode-id="5557" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5550" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5378"><h4 class="section-heading-4" data-dcnode-id="5546" id="_i16"><span data-dcnode-id="5547" instrument_node="">Anxiety and depression</span></h4><p data-dcnode-id="5379"><span data-dcnode-id="5545" instrument_node="">Symptoms of anxiety and depression were assessed with the Hopkins Symptom Checklist (HSCL-25; Derog n, &amp; Lavelle, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5441"><a data-dcnode-id="5489" data-reflink="_i23" data-rid="CIT0035" href="#"><span data-dcnode-id="5490" instrument_node="">1987</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5442"><span class="ref-close" data-dcnode-id="5488" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5487"></span><span data-dcnode-id="5443"><span class="hlFld-ContribAuthor" data-dcnode-id="5483"><span data-dcnode-id="5486" instrument_node="">Mollica </span><span class="NLM_given-names" data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">R. F.</span></span></span><span data-dcnode-id="5482" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5478"><span data-dcnode-id="5481" instrument_node="">Wyshak </span><span class="NLM_given-names" data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node="">G.</span></span></span><span data-dcnode-id="5477" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5473"><span data-dcnode-id="5476" instrument_node="">De Marneffe </span><span class="NLM_given-names" data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">D.</span></span></span><span data-dcnode-id="5472" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5468"><span data-dcnode-id="5471" instrument_node="">Khuon </span><span class="NLM_given-names" data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">F.</span></span></span><span data-dcnode-id="5467" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5463"><span data-dcnode-id="5466" instrument_node="">Lavelle </span><span class="NLM_given-names" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">J</span></span></span><span data-dcnode-id="5462" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">Indochinese versions of the Hopkins Symptom Checklist-25: A screening instrument for the psychiatric care of refugees</span></span><span data-dcnode-id="5459" instrument_node="">. American Journal of Psychiatry. </span><span class="NLM_year" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">1987</span></span><span data-dcnode-id="5456" instrument_node="">; 144: </span><span class="NLM_fpage" data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">497</span></span><span data-dcnode-id="5453" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">500</span></span><span data-dcnode-id="5450" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5444"><span data-dcnode-id="5449" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5448"></span><span class="googleScholar-container" data-dcnode-id="5445"><a class="google-scholar" data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1987%26author%3DR.%2BF.%2BMollica%26author%3DG.%2BWyshak%26author%3DD.%2BDe%2BMarneffe%26author%3DF.%2BKhuon%26author%3DJ%2BLavelle%26title%3DIndochinese%2Bversions%2Bof%2Bthe%2BHopkins%2BSymptom%2BChecklist-25%253A%2BA%2Bscreening%2Binstrument%2Bfor%2Bthe%2Bpsychiatric%2Bcare%2Bof%2Brefugees" target="_blank"><span data-dcnode-id="5447" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5440" instrument_node="">). The scale was adapted for use in refugee populations and has very good validity and reliability (Mollica et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5390"><a data-dcnode-id="5438" data-reflink="_i23" data-rid="CIT0035" href="#"><span data-dcnode-id="5439" instrument_node="">1987</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5391"><span class="ref-close" data-dcnode-id="5437" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5436"></span><span data-dcnode-id="5392"><span class="hlFld-ContribAuthor" data-dcnode-id="5432"><span data-dcnode-id="5435" instrument_node="">Mollica </span><span class="NLM_given-names" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">R. F.</span></span></span><span data-dcnode-id="5431" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5427"><span data-dcnode-id="5430" instrument_node="">Wyshak </span><span class="NLM_given-names" data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">G.</span></span></span><span data-dcnode-id="5426" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5422"><span data-dcnode-id="5425" instrument_node="">De Marneffe </span><span class="NLM_given-names" data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">D.</span></span></span><span data-dcnode-id="5421" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5417"><span data-dcnode-id="5420" instrument_node="">Khuon </span><span class="NLM_given-names" data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">F.</span></span></span><span data-dcnode-id="5416" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5412"><span data-dcnode-id="5415" instrument_node="">Lavelle </span><span class="NLM_given-names" data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">J</span></span></span><span data-dcnode-id="5411" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">Indochinese versions of the Hopkins Symptom Checklist-25: A screening instrument for the psychiatric care of refugees</span></span><span data-dcnode-id="5408" instrument_node="">. American Journal of Psychiatry. </span><span class="NLM_year" data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">1987</span></span><span data-dcnode-id="5405" instrument_node="">; 144: </span><span class="NLM_fpage" data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">497</span></span><span data-dcnode-id="5402" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">500</span></span><span data-dcnode-id="5399" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5393"><span data-dcnode-id="5398" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5397"></span><span class="googleScholar-container" data-dcnode-id="5394"><a class="google-scholar" data-dcnode-id="5395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1987%26author%3DR.%2BF.%2BMollica%26author%3DG.%2BWyshak%26author%3DD.%2BDe%2BMarneffe%26author%3DF.%2BKhuon%26author%3DJ%2BLavelle%26title%3DIndochinese%2Bversions%2Bof%2Bthe%2BHopkins%2BSymptom%2BChecklist-25%253A%2BA%2Bscreening%2Binstrument%2Bfor%2Bthe%2Bpsychiatric%2Bcare%2Bof%2Brefugees" target="_blank"><span data-dcnode-id="5396" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5389" instrument_node="">). The internal consistency (Cronbach's </span><i data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">α</span></i><span data-dcnode-id="5386" instrument_node="">) is 0.84 for the anxiety scale and 0.91 for the depressive scale. Respondents were asked to indicate the extent to which they had been bothered by each symptom in the previous week on a four-point scale from 1=</span><i data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">not at all</span></i><span data-dcnode-id="5383" instrument_node=""> to 4=</span><i data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">extremely</span></i><span data-dcnode-id="5380" instrument_node="">.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5229"><h4 class="section-heading-4" data-dcnode-id="5376" id="_i17"><span data-dcnode-id="5377" instrument_node="">Trial-related variables</span></h4><p data-dcnode-id="5230"><span data-dcnode-id="5375" instrument_node="">To investigate how other factors—such as the perceived justice of the hearing, the stress of giving testimony, and the stress of waiting for the hearing—might influence changes in symptom severity we modified and adapted the Trial Variables Questionnaire by Orth and Maercker (</span><span class="ref-lnk lazy-ref" data-dcnode-id="5334"><a data-dcnode-id="5373" data-reflink="_i23" data-rid="CIT0038" href="#"><span data-dcnode-id="5374" instrument_node="">2004</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5335"><span class="ref-close" data-dcnode-id="5372" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5371"></span><span data-dcnode-id="5336"><span class="hlFld-ContribAuthor" data-dcnode-id="5367"><span data-dcnode-id="5370" instrument_node="">Orth </span><span class="NLM_given-names" data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">U.</span></span></span><span data-dcnode-id="5366" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5362"><span data-dcnode-id="5365" instrument_node="">Maercker </span><span class="NLM_given-names" data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">A</span></span></span><span data-dcnode-id="5361" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">Do trials of perpetrators retraumatize crime victims?</span></span><span data-dcnode-id="5358" instrument_node="">. Journal of Interpersonal Violence. </span><span class="NLM_year" data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">2004</span></span><span data-dcnode-id="5355" instrument_node="">; 19: </span><span class="NLM_fpage" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">212</span></span><span data-dcnode-id="5352" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">227</span></span><span data-dcnode-id="5349" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="5347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/15006002/" target="_blank"><span data-dcnode-id="5348" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="5346" instrument_node="">]
doi: </span><span class="NLM_pub-id" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">10.1177/0886260503260326</span></span><span data-dcnode-id="5343" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5337"><span data-dcnode-id="5342" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5341"></span><span class="googleScholar-container" data-dcnode-id="5338"><a class="google-scholar" data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2004%26author%3DU.%2BOrth%26author%3DA%2BMaercker%26title%3DDo%2Btrials%2Bof%2Bperpetrators%2Bretraumatize%2Bcrime%2Bvictims%253F" target="_blank"><span data-dcnode-id="5340" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5333" instrument_node="">) to apply specifically to the asylum interview. This questionnaire, which was developed and used in a study on the impact of court hearings on traumatized victims (Orth &amp; Maercker, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5292"><a data-dcnode-id="5331" data-reflink="_i23" data-rid="CIT0038" href="#"><span data-dcnode-id="5332" instrument_node="">2004</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5293"><span class="ref-close" data-dcnode-id="5330" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5329"></span><span data-dcnode-id="5294"><span class="hlFld-ContribAuthor" data-dcnode-id="5325"><span data-dcnode-id="5328" instrument_node="">Orth </span><span class="NLM_given-names" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">U.</span></span></span><span data-dcnode-id="5324" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5320"><span data-dcnode-id="5323" instrument_node="">Maercker </span><span class="NLM_given-names" data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">A</span></span></span><span data-dcnode-id="5319" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Do trials of perpetrators retraumatize crime victims?</span></span><span data-dcnode-id="5316" instrument_node="">. Journal of Interpersonal Violence. </span><span class="NLM_year" data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">2004</span></span><span data-dcnode-id="5313" instrument_node="">; 19: </span><span class="NLM_fpage" data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">212</span></span><span data-dcnode-id="5310" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">227</span></span><span data-dcnode-id="5307" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/15006002/" target="_blank"><span data-dcnode-id="5306" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="5304" instrument_node="">]
doi: </span><span class="NLM_pub-id" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">10.1177/0886260503260326</span></span><span data-dcnode-id="5301" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5295"><span data-dcnode-id="5300" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5299"></span><span class="googleScholar-container" data-dcnode-id="5296"><a class="google-scholar" data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2004%26author%3DU.%2BOrth%26author%3DA%2BMaercker%26title%3DDo%2Btrials%2Bof%2Bperpetrators%2Bretraumatize%2Bcrime%2Bvictims%253F" target="_blank"><span data-dcnode-id="5298" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5291" instrument_node="">), consists of eight scales measuring the subjective experience of trials. We used three of the scales: “perceived justice of the hearing” was assessed using a scale with six items, such as </span><i data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">The interviewer treated me courteously and respectfully</span></i><span data-dcnode-id="5288" instrument_node="">. “Psychological stress” caused by giving testimony, which included only one item in the original version of Orth and Maercker (</span><span class="ref-lnk lazy-ref" data-dcnode-id="5247"><a data-dcnode-id="5286" data-reflink="_i23" data-rid="CIT0038" href="#"><span data-dcnode-id="5287" instrument_node="">2004</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5248"><span class="ref-close" data-dcnode-id="5285" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5284"></span><span data-dcnode-id="5249"><span class="hlFld-ContribAuthor" data-dcnode-id="5280"><span data-dcnode-id="5283" instrument_node="">Orth </span><span class="NLM_given-names" data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">U.</span></span></span><span data-dcnode-id="5279" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5275"><span data-dcnode-id="5278" instrument_node="">Maercker </span><span class="NLM_given-names" data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">A</span></span></span><span data-dcnode-id="5274" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5272"><span data-dcnode-id="5273" instrument_node="">Do trials of perpetrators retraumatize crime victims?</span></span><span data-dcnode-id="5271" instrument_node="">. Journal of Interpersonal Violence. </span><span class="NLM_year" data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">2004</span></span><span data-dcnode-id="5268" instrument_node="">; 19: </span><span class="NLM_fpage" data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">212</span></span><span data-dcnode-id="5265" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">227</span></span><span data-dcnode-id="5262" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/15006002/" target="_blank"><span data-dcnode-id="5261" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="5259" instrument_node="">]
doi: </span><span class="NLM_pub-id" data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">10.1177/0886260503260326</span></span><span data-dcnode-id="5256" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5250"><span data-dcnode-id="5255" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5254"></span><span class="googleScholar-container" data-dcnode-id="5251"><a class="google-scholar" data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2004%26author%3DU.%2BOrth%26author%3DA%2BMaercker%26title%3DDo%2Btrials%2Bof%2Bperpetrators%2Bretraumatize%2Bcrime%2Bvictims%253F" target="_blank"><span data-dcnode-id="5253" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5246" instrument_node="">) (</span><i data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">Giving testimony was stressful to me</span></i><span data-dcnode-id="5243" instrument_node="">), was supplemented by four items to elicit more precise information about what was stressful in giving testimony. An item example is: </span><i data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">I had to talk about experiences I was ashamed for</span></i><span data-dcnode-id="5240" instrument_node="">. The scale of psychological stress caused by the delay until the beginning of the asylum interview was assessed with a single item: </span><i data-dcnode-id="5238"><span data-dcnode-id="5239" instrument_node="">It was stressful to me to wait for the beginning of the asylum interview</span></i><span data-dcnode-id="5237" instrument_node="">. Responses were given on a six-point Likert scale ranging from 0=</span><i data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">strongly disagree</span></i><span data-dcnode-id="5234" instrument_node=""> to 5=</span><i data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">strongly agree</span></i><span data-dcnode-id="5231" instrument_node="">.</span></p></div></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5200" id="S0003-S20003"><h3 class="section-heading-3" data-dcnode-id="5226" id="_i18"><span data-dcnode-id="5227" instrument_node="">Data analysis</span></h3><p data-dcnode-id="5203"><span data-dcnode-id="5225" instrument_node="">Statistical analyses were performed using the Statistical Package for the Social Sciences, version 22.0 (SPSS 22.0) for MAC. Chi-square tests for dichotomous and categorical variables, either the </span><i data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">t</span></i><span data-dcnode-id="5222" instrument_node="">-test for independent variables, or the Mann–Whitney </span><i data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">U</span></i><span data-dcnode-id="5219" instrument_node="">-test were used to compare the descriptive statistics of the two groups. To investigate symptom changes from t1 to t2, paired </span><i data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">t</span></i><span data-dcnode-id="5216" instrument_node="">-tests were calculated. The magnitude of effects was measured by Cohen's effect size </span><i data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">d</span></i><span data-dcnode-id="5213" instrument_node=""> within groups; this is calculated as the difference between the means at t1 and t2, divided by a standard deviation for the data. Cohen defined effect sizes as small (</span><i data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">d=</span></i><span data-dcnode-id="5210" instrument_node="">0.20), medium (</span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">d=</span></i><span data-dcnode-id="5207" instrument_node="">0.50), and large (</span><i data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">d=</span></i><span data-dcnode-id="5204" instrument_node="">0.80). Data are reported as means and standard deviations.</span></p><p data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">We conducted a hierarchical regression analysis for demographic and trial variables predicting posttraumatic intrusions, avoidance, and hyperarousal. Data were tested for normal distribution using the Kolmogorov–Smirnov test.</span></p></div></div><div class="NLM_sec NLM_sec-type_results NLM_sec_level_1" data-dcnode-id="4928" id="S0004"><h2 class="section-heading-2" data-dcnode-id="5197" id="_i19"><span data-dcnode-id="5198" instrument_node="">Results</span></h2><p data-dcnode-id="5192"><span data-dcnode-id="5196" instrument_node=""> </span><button class="ref showTableEventRef" data-dcnode-id="5194" data-id="T0001"><span data-dcnode-id="5195" instrument_node="">Table 1</span></button><span data-dcnode-id="5193" instrument_node=""> summarizes the demographic characteristics of the two groups with (AG) or without (CG) an asylum interview. There are no essential group differences between the asylum group and the comparison group participants.</span></p><p data-dcnode-id="5175"><span data-dcnode-id="5191" instrument_node="">Whereas half of the participants in the AG were married (</span><i data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">n</span></i><span data-dcnode-id="5188" instrument_node="">=20, 50%), about two-thirds of those in the CG were single (</span><i data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">n</span></i><span data-dcnode-id="5185" instrument_node="">=7, 70%). Most participants in the AG group came from Iran (</span><i data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">n</span></i><span data-dcnode-id="5182" instrument_node="">=12, 30%; CG: </span><i data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">n</span></i><span data-dcnode-id="5179" instrument_node="">=3, 30%), followed by the Balkan region (</span><i data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">n</span></i><span data-dcnode-id="5176" instrument_node="">=7, 17.5%). The language groups the participants were drawn from were Farsi (Persian), Russian, Turkish/Kurmanci (Kurdish), and English.</span></p><p data-dcnode-id="5149"><span data-dcnode-id="5174" instrument_node="">Participants reported on average 17 traumatic events (range 7–22), 10 of which were direct personal experiences of trauma (range 2–16), as opposed to traumas witnessed or learned about. The most frequently reported directly experienced traumatic events included high impact traumata such as torture (AG: 70%, CG: 90%) and imprisonment (AG: 60%, CG: 80%). As shown in </span><button class="ref showTableEventRef" data-dcnode-id="5172" data-id="T0002"><span data-dcnode-id="5173" instrument_node="">Table 2</span></button><span data-dcnode-id="5171" instrument_node="">, participants’ responses revealed high levels of psychological distress at t1. The average PDS score was </span><i data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">M=</span></i><span data-dcnode-id="5168" instrument_node="">35.16 (SD=5.79) in the AG and </span><i data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">M</span></i><span data-dcnode-id="5165" instrument_node=""> = 34.6 (SD</span><i data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">=</span></i><span data-dcnode-id="5162" instrument_node="">9.1) in the CG, indicating considerable symptom severity. Similarly, both samples reported high anxiety and depression severity. Average scores on the HSCL-25 anxiety subscale were </span><i data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">M</span></i><span data-dcnode-id="5159" instrument_node="">=2.81 (SD=0.47) in the AG and </span><i data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">M</span></i><span data-dcnode-id="5156" instrument_node="">=2.86 (SD=0.51) in the CG; those on the HSCL-25 depression subscale were </span><i data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">M</span></i><span data-dcnode-id="5153" instrument_node="">=3.00 (SD=0.55) in the AG and </span><i data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">M</span></i><span data-dcnode-id="5150" instrument_node="">=2.96 (SD=0.56) in the CG. A group comparison on symptom severity at the first assessment (t1) did not differ significantly on any of the psychopathology subscales.</span></p><div class="tableViewerArticleInfo hidden" data-dcnode-id="5114"><span class="figViewerTitle" data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">Impact of asylum interviews on the mental health of traumatized asylum seekers</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="5123"><div class="authorsHeading" data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="5124"><a class="entryAuthor" data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DSchock%252C%2BKatrin"><span class="hlFld-ContribAuthor" data-dcnode-id="5144"></span></a><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Schock%252C%2BKatrin"><span class="NLM_given-names" data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">Katrin</span></span><span data-dcnode-id="5140" instrument_node=""> Schock</span></a><span data-dcnode-id="5138" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DRosner%252C%2BRita"><span class="hlFld-ContribAuthor" data-dcnode-id="5137"></span></a><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Rosner%252C%2BRita"><span class="NLM_given-names" data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Rita</span></span><span data-dcnode-id="5133" instrument_node=""> Rosner</span></a><span data-dcnode-id="5131" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DKnaevelsrud%252C%2BChristine"><span class="hlFld-ContribAuthor" data-dcnode-id="5130"></span></a><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Knaevelsrud%252C%2BChristine"><span class="NLM_given-names" data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">Christine</span></span><span data-dcnode-id="5126" instrument_node=""> Knaevelsrud</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="5115"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="5120"><a data-dcnode-id="5121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3402/ejpt.v6.26286"><span data-dcnode-id="5122" instrument_node="">https://doi.org/10.3402/ejpt.v6.26286</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="5116"><h6 data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">Published online:</span></h6><span data-dcnode-id="5117" instrument_node="">01 September 2015</span></div></div></div><div class="tableView" data-dcnode-id="5101"><div class="tableCaption" data-dcnode-id="5107"><div class="short-legend" data-dcnode-id="5108"><h3 data-dcnode-id="5109"><p class="captionText" data-dcnode-id="5110"><span class="captionLabel" data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">Table 2 </span></span><span data-dcnode-id="5111" instrument_node=""> Means (standard deviations) of the outcome variables at assessment point one (t1, before the asylum interview) and two (t2, after the asylum interview) by group</span></p></h3></div></div><div class="tableDownloadOption" data-dcnode-id="5102" data-hascsvlnk="true" id="T0002-table-wrapper"><a class="downloadButton btn btn-sm" data-dcnode-id="5105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/downloadTable%3Fid%3DT0002%26doi%3D10.3402%252Fejpt.v6.26286%26downloadType%3DCSV" role="button"><span data-dcnode-id="5106" instrument_node="">
Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="5103" data-id="T0002" href="#" role="button"><span data-dcnode-id="5104" instrument_node="">Display Table</span></a></div></div><p data-dcnode-id="5039"><span data-dcnode-id="5100" instrument_node=""> </span><button class="ref showTableEventRef" data-dcnode-id="5098" data-id="T0002"><span data-dcnode-id="5099" instrument_node="">Table 2</span></button><span data-dcnode-id="5097" instrument_node=""> presents means and standard deviations of all symptoms at the two assessment points and Cohen's </span><i data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">d</span></i><span data-dcnode-id="5094" instrument_node=""> effect sizes for symptom changes from t1 to t2 within each group. The data revealed significant t1 to t2 changes in the PTSD subscales in the asylum group (AG): the intrusion subscale showed a significant increase after the asylum interview and a large effect size (</span><i data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">t</span></i><span data-dcnode-id="5091" instrument_node="">(39)=6.87, </span><i data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">p=</span></i><span data-dcnode-id="5088" instrument_node="">0.000; </span><i data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">d=</span></i><span data-dcnode-id="5085" instrument_node="">1.38), whereas avoidance subscales (</span><i data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">t</span></i><span data-dcnode-id="5082" instrument_node="">(39)=2.03, </span><i data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">p</span></i><span data-dcnode-id="5079" instrument_node="">=0.04; </span><i data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">d=</span></i><span data-dcnode-id="5076" instrument_node="">0.39) and hyperarousal (</span><i data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">t</span></i><span data-dcnode-id="5073" instrument_node="">(39)=3.11, </span><i data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">p=</span></i><span data-dcnode-id="5070" instrument_node="">0.003; </span><i data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">d=</span></i><span data-dcnode-id="5067" instrument_node="">0.61) indicate a significant symptom decrease with small and medium effect sizes. In contrast, there were no significant symptom changes in the PTSD subscales in the comparison group (CG). Furthermore, the AG showed a significant decrease in depressive symptoms following the asylum interview (</span><i data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">t</span></i><span data-dcnode-id="5064" instrument_node="">(39)=2.89, </span><i data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">p=</span></i><span data-dcnode-id="5061" instrument_node="">0.006; </span><i data-dcnode-id="5059"><span data-dcnode-id="5060" instrument_node="">d=</span></i><span data-dcnode-id="5058" instrument_node="">0.15), whereas no significant depression symptom changes were found in the CG. Anxiety symptoms in the CG decreased significantly (</span><i data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">t</span></i><span data-dcnode-id="5055" instrument_node="">(9)=6.87, </span><i data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">p=</span></i><span data-dcnode-id="5052" instrument_node="">0.000; </span><i data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">d=</span></i><span data-dcnode-id="5049" instrument_node="">0.55), but not in the AG (</span><i data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">t</span></i><span data-dcnode-id="5046" instrument_node="">(39)=2.29, </span><i data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">p=</span></i><span data-dcnode-id="5043" instrument_node="">0.04; </span><i data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">d=</span></i><span data-dcnode-id="5040" instrument_node="">0.55).</span></p><p data-dcnode-id="4977"><span data-dcnode-id="5038" instrument_node="">We conducted a hierarchical regression analysis predicting posttraumatic intrusions, avoidance, and hyperarousal after testing the requirements for it. </span><button class="ref showTableEventRef" data-dcnode-id="5036" data-id="T0003"><span data-dcnode-id="5037" instrument_node="">Table 3</span></button><span data-dcnode-id="5035" instrument_node=""> shows the summary of this analysis. Time 1 psychological symptoms were controlled for. To control the demographic variables, age, education, and number of experienced traumata were entered simultaneously into the regression equation in step 1. In step 2, the variables perceived justice of the hearing, stress of giving testimony (testimony stress), and stress of waiting for the beginning of the hearing (delay stress) were added to test the variance explained by these trial variables. Perceived justice of the hearing qualifies for the regression equation with a regression coefficient of </span><i data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">β</span></i><span data-dcnode-id="5032" instrument_node="">=−0.33 (</span><i data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">p=</span></i><span data-dcnode-id="5029" instrument_node="">0.02) in step 2 (</span><i data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">R</span></i><span data-dcnode-id="5026" instrument_node=""> </span><sup data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">2</span></sup><span data-dcnode-id="5023" instrument_node=""> – change</span><i data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">=</span></i><span data-dcnode-id="5020" instrument_node="">0.29, </span><i data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">p=</span></i><span data-dcnode-id="5017" instrument_node="">0.01). The direction of all regression coefficients was as predicted. The results of hierarchical regression analysis predicting posttraumatic avoidance reveal that the number of experienced traumata (</span><i data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">β</span></i><span data-dcnode-id="5014" instrument_node="">=0.44, </span><i data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">p=</span></i><span data-dcnode-id="5011" instrument_node="">0.01) and testimony stress (</span><i data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">β</span></i><span data-dcnode-id="5008" instrument_node="">=0.43, </span><i data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">p=</span></i><span data-dcnode-id="5005" instrument_node="">0.02) significantly increase the variance explained in step 2 (</span><i data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">R</span></i><span data-dcnode-id="5002" instrument_node=""> </span><sup data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">2</span></sup><span data-dcnode-id="4999" instrument_node=""> – change=0.32, </span><i data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">p=</span></i><span data-dcnode-id="4996" instrument_node="">0.02). Concerning the regression analysis predicting posttraumatic hyperarousal no significance was found in either step 1 (</span><i data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">R</span></i><span data-dcnode-id="4993" instrument_node=""> </span><sup data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">2</span></sup><span data-dcnode-id="4990" instrument_node=""> – change=0.08, </span><i data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">p=</span></i><span data-dcnode-id="4987" instrument_node="">0.39) and step 2 (</span><i data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">R</span></i><span data-dcnode-id="4984" instrument_node=""> </span><sup data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">2</span></sup><span data-dcnode-id="4981" instrument_node=""> – change=0.17, </span><i data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">p=</span></i><span data-dcnode-id="4978" instrument_node="">0.14).</span></p><div class="tableViewerArticleInfo hidden" data-dcnode-id="4942"><span class="figViewerTitle" data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">Impact of asylum interviews on the mental health of traumatized asylum seekers</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="4951"><div class="authorsHeading" data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="4952"><a class="entryAuthor" data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DSchock%252C%2BKatrin"><span class="hlFld-ContribAuthor" data-dcnode-id="4972"></span></a><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Schock%252C%2BKatrin"><span class="NLM_given-names" data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">Katrin</span></span><span data-dcnode-id="4968" instrument_node=""> Schock</span></a><span data-dcnode-id="4966" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DRosner%252C%2BRita"><span class="hlFld-ContribAuthor" data-dcnode-id="4965"></span></a><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Rosner%252C%2BRita"><span class="NLM_given-names" data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">Rita</span></span><span data-dcnode-id="4961" instrument_node=""> Rosner</span></a><span data-dcnode-id="4959" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DKnaevelsrud%252C%2BChristine"><span class="hlFld-ContribAuthor" data-dcnode-id="4958"></span></a><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Knaevelsrud%252C%2BChristine"><span class="NLM_given-names" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Christine</span></span><span data-dcnode-id="4954" instrument_node=""> Knaevelsrud</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="4943"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="4948"><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3402/ejpt.v6.26286"><span data-dcnode-id="4950" instrument_node="">https://doi.org/10.3402/ejpt.v6.26286</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="4944"><h6 data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">Published online:</span></h6><span data-dcnode-id="4945" instrument_node="">01 September 2015</span></div></div></div><div class="tableView" data-dcnode-id="4929"><div class="tableCaption" data-dcnode-id="4935"><div class="short-legend" data-dcnode-id="4936"><h3 data-dcnode-id="4937"><p class="captionText" data-dcnode-id="4938"><span class="captionLabel" data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">Table 3 </span></span><span data-dcnode-id="4939" instrument_node=""> Predictors of increase in posttraumatic intrusions after the asylum interview</span></p></h3></div></div><div class="tableDownloadOption" data-dcnode-id="4930" data-hascsvlnk="true" id="T0003-table-wrapper"><a class="downloadButton btn btn-sm" data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/downloadTable%3Fid%3DT0003%26doi%3D10.3402%252Fejpt.v6.26286%26downloadType%3DCSV" role="button"><span data-dcnode-id="4934" instrument_node="">
Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="4931" data-id="T0003" href="#" role="button"><span data-dcnode-id="4932" instrument_node="">Display Table</span></a></div></div></div><div class="NLM_sec NLM_sec-type_discussion NLM_sec_level_1" data-dcnode-id="4192" id="S0005"><h2 class="section-heading-2" data-dcnode-id="4926" id="_i20"><span data-dcnode-id="4927" instrument_node="">Discussion</span></h2><p data-dcnode-id="4722"><span data-dcnode-id="4925" instrument_node="">To our knowledge this is the first study to examine how the substantive interview within the asylum process influences the mental health of traumatized asylum seekers. It is known that many asylum seekers suffer severe mental health problems (Fazel et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4879"><a data-dcnode-id="4923" data-reflink="_i23" data-rid="CIT0012" href="#"><span data-dcnode-id="4924" instrument_node="">2005</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4880"><span class="ref-close" data-dcnode-id="4922" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4921"></span><span data-dcnode-id="4881"><span class="hlFld-ContribAuthor" data-dcnode-id="4917"><span data-dcnode-id="4920" instrument_node="">Fazel </span><span class="NLM_given-names" data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">M.</span></span></span><span data-dcnode-id="4916" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4912"><span data-dcnode-id="4915" instrument_node="">Wheeler </span><span class="NLM_given-names" data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">J.</span></span></span><span data-dcnode-id="4911" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4907"><span data-dcnode-id="4910" instrument_node="">Danesh </span><span class="NLM_given-names" data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">J</span></span></span><span data-dcnode-id="4906" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">Prevalence of serious mental disorder in 7000 refugees resettled in western countries: A systematic review</span></span><span data-dcnode-id="4903" instrument_node="">. The Lancet. </span><span class="NLM_year" data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">2005</span></span><span data-dcnode-id="4900" instrument_node="">; 365: </span><span class="NLM_fpage" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">1309</span></span><span data-dcnode-id="4897" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">1314</span></span><span data-dcnode-id="4894" instrument_node="">. doi: 10.1016/S0140-6736(05)61027-6.</span><span class="refLink-block" data-dcnode-id="4882"><span data-dcnode-id="4893" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4887"><a data-dcnode-id="4891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0012%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1016%252FS0140-6736%252805%252961027-6" target="_blank"><span data-dcnode-id="4892" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4890" instrument_node="">, </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0012%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D000228219600025" target="_blank"><span data-dcnode-id="4889" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4883"><span data-dcnode-id="4886" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D365%26publication_year%3D2005%26pages%3D1309-1314%26author%3DM.%2BFazel%26author%3DJ.%2BWheeler%26author%3DJ%2BDanesh%26title%3DPrevalence%2Bof%2Bserious%2Bmental%2Bdisorder%2Bin%2B7000%2Brefugees%2Bresettled%2Bin%2Bwestern%2Bcountries%253A%2BA%2Bsystematic%2Breview" target="_blank"><span data-dcnode-id="4885" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4878" instrument_node="">). Our study examined asylum seekers who had experienced high impact traumata in the past and thus suffered from severe mental health problems. We assessed PTSD subscales, anxiety, and depressive symptoms at the baseline assessment point before the asylum interview and again after the interview. A main focus of interest was on how trial variables such as perceived justice during the asylum interview, experienced stress in giving testimony reporting traumatic experiences, and experienced stress of waiting for the beginning of the asylum interview, influence the impact of the interview on the psychopathology. We found a significant increase in the posttraumatic intrusions and significant decrease in posttraumatic avoidance and hyperarousal symptoms after the asylum interview. Previous studies on the specific nature of intrusions provide a possible explanation, because they suggested that intrusive memories are stimuli that acquire the status of warning signals through temporal association with the trauma—that is, stimuli that, if encountered again, would indicate impending danger (Ehlers et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4817"><a data-dcnode-id="4876" data-reflink="_i23" data-rid="CIT0010" href="#"><span data-dcnode-id="4877" instrument_node="">2002</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4818"><span class="ref-close" data-dcnode-id="4875" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4874"></span><span data-dcnode-id="4819"><span class="hlFld-ContribAuthor" data-dcnode-id="4870"><span data-dcnode-id="4873" instrument_node="">Ehlers </span><span class="NLM_given-names" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">A.</span></span></span><span data-dcnode-id="4869" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4865"><span data-dcnode-id="4868" instrument_node="">Hackmann </span><span class="NLM_given-names" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">A.</span></span></span><span data-dcnode-id="4864" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4860"><span data-dcnode-id="4863" instrument_node="">Steil </span><span class="NLM_given-names" data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">R.</span></span></span><span data-dcnode-id="4859" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4855"><span data-dcnode-id="4858" instrument_node="">Clohessy </span><span class="NLM_given-names" data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">S.</span></span></span><span data-dcnode-id="4854" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4850"><span data-dcnode-id="4853" instrument_node="">Wenninger </span><span class="NLM_given-names" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">K.</span></span></span><span data-dcnode-id="4849" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4845"><span data-dcnode-id="4848" instrument_node="">Winter </span><span class="NLM_given-names" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">H</span></span></span><span data-dcnode-id="4844" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">The nature of intrusive memories after trauma: The warning signal hypothesis</span></span><span data-dcnode-id="4841" instrument_node="">. Behaviour Research and Therapy. </span><span class="NLM_year" data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">2002</span></span><span data-dcnode-id="4838" instrument_node="">; 40: </span><span class="NLM_fpage" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">995</span></span><span data-dcnode-id="4835" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">1002</span></span><span data-dcnode-id="4832" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/12296496/" target="_blank"><span data-dcnode-id="4831" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="4829" instrument_node="">]
</span><span class="NLM_pub-id" data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">10.1016/S0005-7967(01)00077-8</span></span><span data-dcnode-id="4826" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4820"><span data-dcnode-id="4825" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4824"></span><span class="googleScholar-container" data-dcnode-id="4821"><a class="google-scholar" data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2002%26author%3DA.%2BEhlers%26author%3DA.%2BHackmann%26author%3DR.%2BSteil%26author%3DS.%2BClohessy%26author%3DK.%2BWenninger%26author%3DH%2BWinter%26title%3DThe%2Bnature%2Bof%2Bintrusive%2Bmemories%2Bafter%2Btrauma%253A%2BThe%2Bwarning%2Bsignal%2Bhypothesis" target="_blank"><span data-dcnode-id="4823" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4816" instrument_node="">). Although criterion A1 of the DSM-IV does not define an asylum interview as a traumatic event (APA, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4793"><a data-dcnode-id="4814" data-reflink="_i23" data-rid="CIT0001" href="#"><span data-dcnode-id="4815" instrument_node="">1994</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4794"><span class="ref-close" data-dcnode-id="4813" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4812"></span><span data-dcnode-id="4795"><span data-dcnode-id="4811" instrument_node="">American Psychiatric Association. (APA). Diagnostic and statistical manual of mental disorders. </span><span class="NLM_year" data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">1994</span></span><span data-dcnode-id="4808" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">Washington, DC</span></span><span data-dcnode-id="4805" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Author</span></span><span data-dcnode-id="4802" instrument_node="">. 4th ed..</span><span class="refLink-block" data-dcnode-id="4796"><span data-dcnode-id="4801" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4800"></span><span class="googleScholar-container" data-dcnode-id="4797"><a class="google-scholar" data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1994%26author%3DAmerican%2BPsychiatric%2BAssociation.%2B%2528APA%2529%26title%3DDiagnostic%2Band%2Bstatistical%2Bmanual%2Bof%2Bmental%2Bdisorders" target="_blank"><span data-dcnode-id="4799" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4792" instrument_node="">), the asylum seekers in our study were severely traumatized by premigratory factors such as surviving war and torture. The situation may evidently remind them of life-threatening experiences in their home country—and thus may stimulate and reactivate the associated feelings of helplessness. The feeling of being ruthlessly exposed to a situation and helpless to change it (criterion A2, DSM-IV; APA, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4769"><a data-dcnode-id="4790" data-reflink="_i23" data-rid="CIT0001" href="#"><span data-dcnode-id="4791" instrument_node="">1994</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4770"><span class="ref-close" data-dcnode-id="4789" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4788"></span><span data-dcnode-id="4771"><span data-dcnode-id="4787" instrument_node="">American Psychiatric Association. (APA). Diagnostic and statistical manual of mental disorders. </span><span class="NLM_year" data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">1994</span></span><span data-dcnode-id="4784" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">Washington, DC</span></span><span data-dcnode-id="4781" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">Author</span></span><span data-dcnode-id="4778" instrument_node="">. 4th ed..</span><span class="refLink-block" data-dcnode-id="4772"><span data-dcnode-id="4777" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4776"></span><span class="googleScholar-container" data-dcnode-id="4773"><a class="google-scholar" data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1994%26author%3DAmerican%2BPsychiatric%2BAssociation.%2B%2528APA%2529%26title%3DDiagnostic%2Band%2Bstatistical%2Bmanual%2Bof%2Bmental%2Bdisorders" target="_blank"><span data-dcnode-id="4775" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4768" instrument_node="">) has been identified as a factor determining how traumatic a situation is perceived to be (Robinson &amp; Larson, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4724"><a data-dcnode-id="4766" data-reflink="_i23" data-rid="CIT0040" href="#"><span data-dcnode-id="4767" instrument_node="">2010</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4725"><span class="ref-close" data-dcnode-id="4765" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4764"></span><span data-dcnode-id="4726"><span class="hlFld-ContribAuthor" data-dcnode-id="4760"><span data-dcnode-id="4763" instrument_node="">Robinson </span><span class="NLM_given-names" data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">J. S.</span></span></span><span data-dcnode-id="4759" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4755"><span data-dcnode-id="4758" instrument_node="">Larson </span><span class="NLM_given-names" data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">C</span></span></span><span data-dcnode-id="4754" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">Are traumatic events necessary to elicit symptoms of posttraumatic stress?</span></span><span data-dcnode-id="4751" instrument_node="">. Psychological Trauma: Theory, Research, Practice, and Policy. </span><span class="NLM_year" data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">2010</span></span><span data-dcnode-id="4748" instrument_node="">; 2: </span><span class="NLM_fpage" data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">71</span></span><span data-dcnode-id="4745" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">76</span></span><span data-dcnode-id="4742" instrument_node="">.
