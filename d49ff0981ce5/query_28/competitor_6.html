</span><article class="article" data-dcnode-id="1209"><span data-dcnode-id="7942" instrument_node="">
</span><p class="fulltext" data-dcnode-id="7941"></p><div class="hlFld-Abstract" data-dcnode-id="7906"><p class="fulltext" data-dcnode-id="7940"></p><div class="sectionInfo abstractSectionHeading" data-dcnode-id="7937"><h2 class="section-heading-2" data-dcnode-id="7938" id="abstract"><span data-dcnode-id="7939" instrument_node="">Abstract</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="7907"><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="7929" id="st1"><h2 class="section-heading-2" data-dcnode-id="7935" id="_i6"><span data-dcnode-id="7936" instrument_node="">Background</span></h2><p data-dcnode-id="7930"><span data-dcnode-id="7934" instrument_node="">Asylum interviews within the asylum procedure are associated with psychological stress for traumatized asylum seekers. This study investigates the impact of asylum interviews on the mental health in a sample of 40 traumatized asylum seekers. The comparison group consisted of refugees (</span><i data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">N=</span></i><span data-dcnode-id="7931" instrument_node="">10) that had not been invited to an asylum interview. Additionally, the moderating effects of trial-related variables such as perceived justice of the trial, stress of giving testimony, and stress of waiting for the asylum interview were examined.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="7918" id="st2"><h2 class="section-heading-2" data-dcnode-id="7927" id="_i7"><span data-dcnode-id="7928" instrument_node="">Method</span></h2><p data-dcnode-id="7919"><span data-dcnode-id="7926" instrument_node="">Participants were assessed on average 10 days before (t1) and 16 days after (t2) the asylum interview. Chi-square tests for dichotomous and categorical variables were used to compare the descriptive statistics of the two groups. To investigate symptom changes from t1 to t2, paired </span><i data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">t</span></i><span data-dcnode-id="7923" instrument_node="">-tests were calculated. The magnitude of effects was measured by Cohen's effect size </span><i data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">d</span></i><span data-dcnode-id="7920" instrument_node=""> within groups. Hierarchical regression analyses were conducted for demographic and trial variables predicting posttraumatic intrusions, avoidance, and hyperarousal.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="7913" id="st3"><h2 class="section-heading-2" data-dcnode-id="7916" id="_i8"><span data-dcnode-id="7917" instrument_node="">Results</span></h2><p data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">Data showed a significant increase in posttraumatic intrusions and a significant decrease in posttraumatic avoidance and hyperarousal symptoms from t1 to t2. No significant symptom changes in the posttraumatic stress disorder subscales were found in the comparison group. The results of hierarchical regression analyses revealed perceived justice of the interview to predict the increase of intrusions and the number of experienced traumata and testimony stress to predict posttraumatic avoidance.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="7908" id="st4"><h2 class="section-heading-2" data-dcnode-id="7911" id="_i9"><span data-dcnode-id="7912" instrument_node="">Conclusions</span></h2><p data-dcnode-id="7909"><span data-dcnode-id="7910" instrument_node="">The present findings underline the stressful impact of asylum interviews on traumatized refugees. They indicate that the asylum interview might decrease posttraumatic avoidance and trigger posttraumatic intrusions, thus highlight the importance of ensuring that the already vulnerable group of traumatized refugees needs to be treated with empathy during their asylum interview.</span></p></div></div></div><div class="abstractKeywords" data-dcnode-id="7893"><div class="hlFld-KeywordText" data-dcnode-id="7894"><div data-dcnode-id="7895"><a class="kwd-btn keyword-click" data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Asylum%2BSeekers" role="button"><span data-dcnode-id="7905" instrument_node="">Asylum seekers</span></a><a class="kwd-btn keyword-click" data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Asylum%2BInterview" role="button"><span data-dcnode-id="7903" instrument_node="">asylum interview</span></a><a class="kwd-btn keyword-click" data-dcnode-id="7900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Trial" role="button"><span data-dcnode-id="7901" instrument_node="">trial</span></a><a class="kwd-btn keyword-click" data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Trauma" role="button"><span data-dcnode-id="7899" instrument_node="">trauma</span></a><a class="kwd-btn keyword-click" data-dcnode-id="7896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Posttraumatic%2BStress%2BDisorder" role="button"><span data-dcnode-id="7897" instrument_node="">posttraumatic stress disorder</span></a></div></div></div><div class="pb-dropzone no-border-top" data-dcnode-id="7883" data-pb-dropzone="contentNavigationDropZoneAbs"><div class="widget gql-content-navigation none widget-none" data-dcnode-id="7884" id="d28d5637-3950-463d-a4f7-bc92bc490fff"><span data-dcnode-id="7892" instrument_node="">

</span></div></div><div class="hlFld-Fulltext" data-dcnode-id="4116"><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5980"><p data-dcnode-id="7829"><span data-dcnode-id="7882" instrument_node="">In Germany, 202,384 applications for asylum were made in 2014 (Federal Office for Migration and Refugees [BAMF], </span><span class="ref-lnk lazy-ref" data-dcnode-id="7857"><a data-dcnode-id="7880" data-reflink="_i23" data-rid="CIT0013" href="#"><span data-dcnode-id="7881" instrument_node="">2014</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="7858"><span class="ref-close" data-dcnode-id="7879" tabindex="0"></span><span class="ref-icon" data-dcnode-id="7878"></span><span data-dcnode-id="7859"><span data-dcnode-id="7877" instrument_node="">Federal Office for Migration and Refugees. (BAMF). </span><span class="NLM_article-title" data-dcnode-id="7873"><i data-dcnode-id="7875"><span data-dcnode-id="7876" instrument_node="">Das Bundesamt in Zahlen</span></i><span data-dcnode-id="7874" instrument_node=""> [The Federal Office in Numbers]</span></span><span data-dcnode-id="7872" instrument_node="">. </span><span class="NLM_year" data-dcnode-id="7870"><span data-dcnode-id="7871" instrument_node="">2014</span></span><span data-dcnode-id="7869" instrument_node="">. Retrieved March 10, 2015, from </span><a class="ext-link" data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bamf.de/SharedDocs/Anlagen/DE/Publikationen/Broschueren/bundesamt-in-zahlen-2014-asyl.html" target="_blank"><span data-dcnode-id="7868" instrument_node="">http://www.bamf.de/SharedDocs/Anlagen/DE/Publikationen/Broschueren/bundesamt-in-zahlen-2014-asyl.html</span></a><span data-dcnode-id="7866" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="7860"><span data-dcnode-id="7865" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="7864"></span><span class="googleScholar-container" data-dcnode-id="7861"><a class="google-scholar" data-dcnode-id="7862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2014%26author%3DFederal%2BOffice%2Bfor%2BMigration%2Band%2BRefugees.%2B%2528BAMF%2529%26title%3DDas%2BBundesamt%2Bin%2BZahlen%2B%255BThe%2BFederal%2BOffice%2Bin%2BNumbers%255D" target="_blank"><span data-dcnode-id="7863" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="7856" instrument_node="">), many of them by people claiming to have been forced to leave their home countries because of fear of persecution and human rights abuses. Many refugees and asylum seekers are traumatized by war, political/ethnical oppression, or torture. In response to the increasing numbers of immigrants, typical hosting areas, such as Europe, North America, and Australia, have tightened their immigration laws and asylum procedures in recent years. Only a small number of those seeking asylum are recognized as refugees (BAMF, </span><span class="ref-lnk lazy-ref" data-dcnode-id="7831"><a data-dcnode-id="7854" data-reflink="_i23" data-rid="CIT0013" href="#"><span data-dcnode-id="7855" instrument_node="">2014</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="7832"><span class="ref-close" data-dcnode-id="7853" tabindex="0"></span><span class="ref-icon" data-dcnode-id="7852"></span><span data-dcnode-id="7833"><span data-dcnode-id="7851" instrument_node="">Federal Office for Migration and Refugees. (BAMF). </span><span class="NLM_article-title" data-dcnode-id="7847"><i data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">Das Bundesamt in Zahlen</span></i><span data-dcnode-id="7848" instrument_node=""> [The Federal Office in Numbers]</span></span><span data-dcnode-id="7846" instrument_node="">. </span><span class="NLM_year" data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">2014</span></span><span data-dcnode-id="7843" instrument_node="">. Retrieved March 10, 2015, from </span><a class="ext-link" data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bamf.de/SharedDocs/Anlagen/DE/Publikationen/Broschueren/bundesamt-in-zahlen-2014-asyl.html" target="_blank"><span data-dcnode-id="7842" instrument_node="">http://www.bamf.de/SharedDocs/Anlagen/DE/Publikationen/Broschueren/bundesamt-in-zahlen-2014-asyl.html</span></a><span data-dcnode-id="7840" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="7834"><span data-dcnode-id="7839" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="7838"></span><span class="googleScholar-container" data-dcnode-id="7835"><a class="google-scholar" data-dcnode-id="7836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2014%26author%3DFederal%2BOffice%2Bfor%2BMigration%2Band%2BRefugees.%2B%2528BAMF%2529%26title%3DDas%2BBundesamt%2Bin%2BZahlen%2B%255BThe%2BFederal%2BOffice%2Bin%2BNumbers%255D" target="_blank"><span data-dcnode-id="7837" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="7830" instrument_node="">). Those rejected face repatriation to their countries of origin, where they believe themselves to be at risk of harm or persecution.</span></p><p data-dcnode-id="7661"><span data-dcnode-id="7828" instrument_node="">Refugees and asylum seekers are highly vulnerable to psychological disorders (Fazel, Wheeler, &amp; Danesh, </span><span class="ref-lnk lazy-ref" data-dcnode-id="7782"><a data-dcnode-id="7826" data-reflink="_i23" data-rid="CIT0012" href="#"><span data-dcnode-id="7827" instrument_node="">2005</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="7783"><span class="ref-close" data-dcnode-id="7825" tabindex="0"></span><span class="ref-icon" data-dcnode-id="7824"></span><span data-dcnode-id="7784"><span class="hlFld-ContribAuthor" data-dcnode-id="7820"><span data-dcnode-id="7823" instrument_node="">Fazel </span><span class="NLM_given-names" data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">M.</span></span></span><span data-dcnode-id="7819" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7815"><span data-dcnode-id="7818" instrument_node="">Wheeler </span><span class="NLM_given-names" data-dcnode-id="7816"><span data-dcnode-id="7817" instrument_node="">J.</span></span></span><span data-dcnode-id="7814" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7810"><span data-dcnode-id="7813" instrument_node="">Danesh </span><span class="NLM_given-names" data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">J</span></span></span><span data-dcnode-id="7809" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="7807"><span data-dcnode-id="7808" instrument_node="">Prevalence of serious mental disorder in 7000 refugees resettled in western countries: A systematic review</span></span><span data-dcnode-id="7806" instrument_node="">. The Lancet. </span><span class="NLM_year" data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">2005</span></span><span data-dcnode-id="7803" instrument_node="">; 365: </span><span class="NLM_fpage" data-dcnode-id="7801"><span data-dcnode-id="7802" instrument_node="">1309</span></span><span data-dcnode-id="7800" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="7798"><span data-dcnode-id="7799" instrument_node="">1314</span></span><span data-dcnode-id="7797" instrument_node="">. doi: 10.1016/S0140-6736(05)61027-6.</span><span class="refLink-block" data-dcnode-id="7785"><span data-dcnode-id="7796" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="7790"><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=h 5" instrument_node="">H.</span></span></span><span data-dcnode-id="7772" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7768"><span data-dcnode-id="7771" instrument_node="">Thompson </span><span class="NLM_given-names" data-dcnode-id="7769"><span data-dcnode-id="7770" instrument_node="">A</span></span></span><span data-dcnode-id="7767" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="7765"><span data-dcnode-id="7766" instrument_node="">The development and maintenance of posttraumatic stress disorder (PTSD) in civilian adult survivors of war trauma and torture: A review</span></span><span data-dcnode-id="7764" instrument_node="">. Clinical Psychological Review. </span><span class="NLM_year" data-dcnode-id="7762"><span data-dcnode-id="7763" instrument_node="">2008</span></span><span data-dcnode-id="7761" instrument_node="">; 28: </span><span class="NLM_fpage" data-dcnode-id="7759"><span data-dcnode-id="7760" instrument_node="">36</span></span><span data-dcnode-id="7758" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="7756"><span data-dcnode-id="7757" instrument_node="">47</span></span><span data-dcnode-id="7755" instrument_node="">.
doi: </span><span class="NLM_pub-id" data-dcnode-id="7753"><span data-dcnode-id="7754" instrument_node="">10.1016/j.cpr.2007.01.017</span></span><span data-dcnode-id="7752" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="7740"><span data-dcnode-id="7751" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="7745"><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0027%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1016%252Fj.cpr.2007.01.017" target="_blank"><span data-dcnode-id="7750" instrument_node="">[Crossref]</span></a><span data-dcnode-id="7748" instrument_node="">, </span><a data-dcnode-id="7746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0027%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D000252794500003" target="_blank"><span data-dcnode-id="7747" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="7741"><span data-dcnode-id="7744" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="7742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D28%26publication_year%3D2008%26pages%3D36-47%26author%3DH.%2BJohnson%26author%3DA%2BThompson%26title%3DThe%2Bdevelopment%2Band%2Bmaintenance%2Bof%2Bposttraumatic%2Bstress%2Bdisorder%2B%2528PTSD%2529%2Bin%2Bcivilian%2Badult%2Bsurvivors%2Bof%2Bwar%2Btrauma%2Band%2Btorture%253A%2BA%2Breview%26doi%3D10.1016%252Fj.cpr.2007.01.017" target="_blank"><span data-dcnode-id="7743" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="7736" instrument_node="">; Terheggen, Stroebe, &amp; Kleber, </span><span class="ref-lnk lazy-ref" data-dcnode-id="7690"><a data-dcnode-id="7734" data-reflink="_i23" data-rid="CIT0048" href="#"><span data-dcnode-id="7735" instrument_node="">2001</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="7691"><span class="ref-close" data-dcnode-id="7733" tabindex="0"></span><span class="ref-icon" data-dcnode-id="7732"></span><span data-dcnode-id="7692"><span class="hlFld-ContribAuthor" data-dcnode-id="7728"><span data-dcnode-id="7731" instrument_node="">Terheggen </span><span class="NLM_given-names" data-dcnode-id="7729"><span data-dcnode-id="7730" instrument_node="">M. A.</span></span></span><span data-dcnode-id="7727" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7723"><span data-dcnode-id="7726" instrument_node="">Stroebe </span><span class="NLM_given-names" data-dcnode-id="7724"><span data-dcnode-id="7725" instrument_node="">M. S.</span></span></span><span data-dcnode-id="7722" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7718"><span data-dcnode-id="7721" instrument_node="">Kleber </span><span class="NLM_given-names" data-dcnode-id="7719"><span data-dcnode-id="7720" instrument_node="">R. J</span></span></span><span data-dcnode-id="7717" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">Western conceptualizations and Eastern experience: A cross-cultural study of traumatic stress reactions among Tibetan refugees in India</span></span><span data-dcnode-id="7714" instrument_node="">. Journal of Traumatic Stress. </span><span class="NLM_year" data-dcnode-id="7712"><span data-dcnode-id="7713" instrument_node="">2001</span></span><span data-dcnode-id="7711" instrument_node="">; 14: </span><span class="NLM_fpage" data-dcnode-id="7709"><span data-dcnode-id="7710" instrument_node="">391</span></span><span data-dcnode-id="7708" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="7706"><span data-dcnode-id="7707" instrument_node="">403</span></span><span data-dcnode-id="7705" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="7703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/11469164/" target="_blank"><span data-dcnode-id="7704" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="7702" instrument_node="">]
doi: </span><span class="NLM_pub-id" data-dcnode-id="7700"><span data-dcnode-id="7701" instrument_node="">10.1023/A:1011177204593</span></span><span data-dcnode-id="7699" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="7693"><span data-dcnode-id="7698" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="7697"></span><span class="googleScholar-container" data-dcnode-id="7694"><a class="google-scholar" data-dcnode-id="7695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2001%26author%3DM.%2BA.%2BTerheggen%26author%3DM.%2BS.%2BStroebe%26author%3DR.%2BJ%2BKleber%26title%3DWestern%2Bconceptualizations%2Band%2BEastern%2Bexperience%253A%2BA%2Bcross-cultural%2Bstudy%2Bof%2Btraumatic%2Bstress%2Breactions%2Bamong%2BTibetan%2Brefugees%2Bin%2BIndia" target="_blank"><span data-dcnode-id="7696" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="7689" instrument_node="">). Posttraumatic stress disorder (PTSD) is one of the most frequent disorders in the aftermath of a traumatic event. PTSD is characterized by intrusions, including remembering the traumatic situation recurrently and involuntarily; avoidance of trauma-associated thoughts, situations, and actions; and hyperarousal, which is reflected in psychovegetative symptoms such as sleeping disorders, difficulty concentrating, and elevated heart rate (DSM-IV; American Psychiatric Association [APA], 1994). In the revised version of the DSM-5, the authors propose four distinct diagnostic clusters instead of three for diagnosing PTSD. They are described as re-experiencing, avoidance, negative cognitions and mood, and arousal (DSM-5; APA, </span><span class="ref-lnk lazy-ref" data-dcnode-id="7663"><a data-dcnode-id="7687" data-reflink="_i23" data-rid="CIT0002" href="#"><span data-dcnode-id="7688" instrument_node="">2013</span></a><span class  data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">D.</span></span></span><span data-dcnode-id="6830" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6826"><span data-dcnode-id="6829" instrument_node="">Herlihy </span><span class="NLM_given-names" data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">J.</span></span></span><span data-dcnode-id="6825" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6821"><span data-dcnode-id="6824" instrument_node="">Brewin </span><span class="NLM_given-names" data-dcnode-id="6822"><span data-dcnode-id="6823" instrument_node="">C. R</span></span></span><span data-dcnode-id="6820" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">Impact of sexual violence on disclosure during Home Office interviews</span></span><span data-dcnode-id="6817" instrument_node="">. British Journal of Psychiatry. </span><span class="NLM_year" data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">2007</span></span><span data-dcnode-id="6814" instrument_node="">; 191: </span><span class="NLM_fpage" data-dcnode-id="6812"><span data-dcnode-id="6813" instrument_node="">75</span></span><span data-dcnode-id="6811" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">81</span></span><span data-dcnode-id="6808" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="6806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/17602129/" target="_blank"><span data-dcnode-id="6807" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="6805" instrument_node="">]

cnode-id="6785"><span data-dcnode-id="6786" instrument_node="">C. J.</span></span></span><span data-dcnode-id="6783" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6779"><span data-dcnode-id="6782" instrument_node="">Gernaat </span><span class="NLM_given-names" data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">H. B. P. E.</span></span></span><span data-dcnode-id="6778" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6774"><span data-dcnode-id="6777" instrument_node="">Komproe </span><span class="NLM_given-names" data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">I. H.</span></span></span><span data-dcnode-id="6773" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6769"><span data-dcnode-id="6772" instrument_node="">Van der Twel </span><span class="NLM_given-names" data-dcnode-id="6770"><span data-dcnode-id="6771" instrument_node="">I.</span></span></span><span data-dcnode-id="6768" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6764"><span data-dcnode-id="6767" instrument_node="">De Jong </span><span class="NLM_given-names" data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">J. T. V. M</span></span></span><span data-dcnode-id="6763" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6761"><span data-dcnode-id="6762" instrument_node="">Postmigration living problems and common psychiatric disorders in Iraqi asylum seekers in the Netherlands</span></span><span data-dcnode-id="6760" instrument_node="">. Journal of Nervous and Mental Disease. </span><span class="NLM_year" data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">2004</span></span><span data-dcnode-id="6757" instrument_node="">; 193: </span><span class="NLM_fpage" data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">825</span></span><span data-dcnode-id="6754" instrument_node="">–</ >329</span></span><span data-dcnode-id="6391" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="6389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/18297952/" target="_blank"><span data-dcnode-id="6390" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="6388" instrument_node="">].</span><span class="refLink-block" data-dcnode-id="6382"><span data-dcnode-id="6387" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6386"></span><span class="googleScholar-container" data-dcnode-id="6383"><a class="google-scholar" data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2007%26author%3DD.%2BSilove%26author%3DZ.%2BSteel%26author%3DI.%2BSusljik%26author%3DN.%2BFrommer%26author%3DC.%2BLoneragan%26author%3DT.%2BChey%26title%3DThe%2Bimpact%2Bof%2Bthe%2Brefugee%2Bdecision%2Bon%2Bthe%2Btrajectory%2Bof%2BPTSD%252C%2Banxiety%252C%2Band%2Bdepressive%2Bsymptoms%2Bamong%2Basylum%2Bseekers%253A%2BA%2Blongitudinal%2Bstudy" target="_blank"><span data-dcnode-id="6385" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6378" instrument_node="">). But to our knowledge no previous empirical study has examined explicitly the impact of asylum interviews on the mental health of asylum seekers and refugees. In order to provide an overview of the consequences of testifying in court we review existing studies examining people who were victims of different crimes below.</span></p><p data-dcnode-id="6139"><span data-dcnode-id="6376" instrument_node="">In a study of women with a history of sexual abuse (</span><i data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">N=</span></i><span data-dcnode-id="6373" instrument_node="">288), Epstein, Saunders, and Kilpatrick (</span><span class="ref-lnk lazy-ref" data-dcnode-id="6327"><a data-dcnode-id="6371" data-reflink="_i23" data-rid="CIT0011" href="#"><span data-dcnode-id="6372" instrument_node="">1997</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6328"><span class="ref-close" data-dcnode-id="6370" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6369"></span><span data-dcnode-id="6329"><span class="hlFld-ContribAuthor" data-dcnode-id="6365"><span data-dcnode-id="6368" instrument_node="">Epstein </span><span class="NLM_given-names" data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">J. N.</span></span></span><span data-dcnode-id="6364" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6360"><span data-dcnode-id="6363" instrument_node="">Saunders </span><span class="NLM_given-names" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">B. E.</span></span></span><span data-dcnode-id="6359" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6355"><span data-dcnode-id="6358" instrument_node="">Kilpatrick </span><span class="NLM_given-names" data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">D. G</span></span></span><span data-dcnode-id="6354" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">Predicting PTSD in women with a history of childhood rape</span></span><span data-dcnode-id="6351" instrument_node="">. Journal of Traumatic Stress. </span><span class="NLM_year" data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">1997</span></span><span data-dcnode-id="6348" instrument_node="">; 10: </span><span class="NLM_fpage" data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">573</span></span><span data-dcnode-id="6345" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">588</span></span><span data-dcnode-id="6342" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="6340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/9391942/" target="_blank"><span data-dcnode-id="6341" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="6339" instrument_node="">]
</span><span class="NLM_pub-id" data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">10.1023/A:1024841718677</span></span><span data-dcnode-id="6336" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6330"><span data-dcnode-id="6335" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6334"></span><span class="googleScholar-container" data-dcnode-id="6331"><a class="google-scholar" data-dcnode-id="6332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1997%26author%3DJ.%2BN.%2BEpstein%26author%3DB.%2BE.%2BSaunders%26author%3DD.%2BG%2BKilpatrick%26title%3DPredicting%2BPTSD%2Bin%2Bwomen%2Bwith%2Ba%2Bhistory%2Bof%2Bchildhood%2Brape" target="_blank"><span data-dcnode-id="6333" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6326" instrument_node="">) reported adverse effects of testifying in court: Of those who testified in court, 64% developed PTSD, whereas only 24% of those who did not testify in court met the criteria for PTSD symptoms. However, including the severity of the incident as a predictor in a multiple regression analysis of PTSD status shows that having testified was no longer a statistically significant predictor. This result is in line with the findings of a study of victims of robbery (</span><i data-dcnode-id="6324"><span data-dcnode-id="6325" instrument_node="">N=</span></i><span data-dcnode-id="6323" instrument_node="">74), in which Hammer (</span><span class="ref-lnk lazy-ref" data-dcnode-id="6296"><a data-dcnode-id="6321" data-reflink="_i23" data-rid="CIT0019" href="#"><span data-dcnode-id="6322" instrument_node="">1989</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6297"><span class="ref-close" data-dcnode-id="6320" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6319"></span><span data-dcnode-id="6298"><span class="hlFld-ContribAuthor" data-dcnode-id="6315"><span data-dcnode-id="6318" instrument_node="">Hammer </span><span class="NLM_given-names" data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">J. H</span></span></span><span data-dcnode-id="6314" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">The effect of offender punishment on crime victim's recovery, and perceived fairness (equity) and process control</span></span><span data-dcnode-id="6311" instrument_node="">. </span><span class="NLM_year" data-dcnode-id="6309"><span data-dcnode-id="6310" instrument_node="">1989</span></span><span data-dcnode-id="6308" instrument_node="">. </span><i data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">Dissertation Abstracts International, 50</span></i><span data-dcnode-id="6305" instrument_node="">(6-B), 2669. (University Microfilms No. 8911333).</span><span class="refLink-block" data-dcnode-id="6299"><span data-dcnode-id="6304" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6303"></span><span class="googleScholar-container" data-dcnode-id="6300"><a class="google-scholar" data-dcnode-id="6301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DHammer%2BJ.%2BH.%2BThe%2Beffect%2Bof%2Boffender%2Bpunishment%2Bon%2Bcrime%2Bvictim%2527s%2Brecovery%252C%2Band%2Bperceived%2Bfairness%2B%2528equity%2529%2Band%2Bprocess%2Bcontrol.%2B1989.%2BDissertation%2BAbstracts%2BInternational%252C%2B50%25286-B%2529%252C%2B2669.%2B%2528University%2BMicrofilms%2BNo.%2B8911333%2529." target="_blank"><span data-dcnode-id="6302" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6295" instrument_node="">) found that testifying in a trial hearing is not associated with a significant increase in PTSD symptoms. Likewise, in a study of rape victims (</span><i data-dcnode-id="6293"><span data-dcnode-id="6294" instrument_node="">N=</span></i><span data-dcnode-id="6292" instrument_node="">569), Frazier and Haney (</span><span class="ref-lnk lazy-ref" data-dcnode-id="6248"><a data-dcnode-id="6290" data-reflink="_i23" data-rid="CIT0016" href="#"><span data-dcnode-id="6291" instrument_node="">1996</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6249"><span class="ref-close" data-dcnode-id="6289" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6288"></span><span data-dcnode-id="6250"><span class="hlFld-ContribAuthor" data-dcnode-id="6284"><span data-dcnode-id="6287" instrument_node="">Frazier </span><span class="NLM_given-names" data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">P. A.</span></span></span><span data-dcnode-id="6283" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6279"><span data-dcnode-id="6282" instrument_node="">Haney </span><span class="NLM_given-names" data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">B</span></span></span><span data-dcnode-id="6278" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">Sexual assault cases in the legal system: Police, prosecutor, and victim perspectives</span></span><span data-dcnode-id="6275" instrument_node="">. Law and Human Behavior. </span><span class="NLM_year" data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">1996</span></span><span data-dcnode-id="6272" instrument_node="">; 20: </span><span class="NLM_fpage" data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">607</span></span><span data-dcnode-id="6269" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">628</span></span><span data-dcnode-id="6266" instrument_node="">.

_node="">]
doi: </span><span class="NLM_pub-id" data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">10.1177/0886260503260326</span></span><span data-dcnode-id="6215" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6209"><span data-dcnode-id="6214" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6213"></span><span class="googleScholar-container" data-dcnode-id="6210"><a class="google-scholar" data-dcnode-id="6211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2004%26author%3DU.%2BOrth%26author%3DA%2BMaercker%26title%3DDo%2Btrials%2Bof%2Bperpetrators%2Bretraumatize%2Bcrime%2Bvictims%253F" target="_blank"><span data-dcnode-id="6212" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6205" instrument_node="">) found no significant increase in PTSD symptoms in a study of victims of sexual violence who testified in court. In contrast, legal secondary victimization (e.g., in cases where the victim was informed by the police that the case was not serious enough to pursue) was positively associated with posttraumatic stress reactions in a study of rape victims (</span><i data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">N=</span></i><span data-dcnode-id="6202" instrument_node="">102; Campbell et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="6141"><a data-dcnode-id="6200" data-reflink="_i23" data-rid="CIT0006" href="#"><span data-dcnode-id="6201" instrument_node="">1999</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6142"><span class="ref-close" data-dcnode-id="6199" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6198"></span><span data-dcnode-id="6143"><span class="hlFld-ContribAuthor" data-dcnode-id="6194"><span data-dcnode-id="6197" instrument_node="">Campbell </span><span class="NLM_given-names" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">R.</span></span></span><span data-dcnode-id="6193" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6189"><span data-dcnode-id="6192" instrument_node="">Sefl </span><span class="NLM_given-names" data-dcnode-id="6190"><span data-dcnode-id="6191" instrument_node="">T.</span></span></span><span data-dcnode-id="6188" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6184"><span data-dcnode-id="6187" instrument_node="">Barnes </span><span class="NLM_given-names" data-dcnode-id="6185"><span data-dcnode-id="6186" instrument_node="">H. E.</span></span></span><span data-dcnode-id="6183" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6179"><span data-dcnode-id="6182" instrument_node="">Ahrens </span><span class="NLM_given-names" data-dcnode-id="6180"><span data-dcnode-id="6181" instrument_node="">C. E.</span></span></span><span data-dcnode-id="6178" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6174"><span data-dcnode-id="6177" instrument_node="">Wasco </span><span class="NLM_given-names" data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">S. M.</span></span></span><span data-dcnode-id="6173" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6169"><span data-dcnode-id="6172" instrument_node="">Zaragoza-Diesfeld </span><span class="NLM_given-names" data-dcnode-id="6170"><span data-dcnode-id="6171" instrument_node="">Y</span></span></span><span data-dcnode-id="6168" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">Community services for rape survivors: Enhancing psychological well-being or increasing trauma?</span></span><span data-dcnode-id="6165" instrument_node="">. Journal of Consulting and Clinical Psychology. </span><span class="NLM_year" data-dcnode-id="6163"><span an data-dcnode-id="6129" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6125"><span data-dcnode-id="6128" instrument_node="">Maercker </span><span class="NLM_given-names" data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">A</span></span></span><span data-dcnode-id="6124" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6122"><span data-dcnode-id="6123" instrument_node="">Do trials of perpetrators retraumatize crime victims?</span></span><span data-dcnode-id="6121" instrument_node="">. Journal of Interpersonal Violence. </span><span class="NLM_year" data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">2004</span></span><span data-dcnode-id="6118" instrument_node="">; 19: </span><span class="NLM_fpage" data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">212</span></span><span data-dcnode-id="6115" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">227</span></span><span data-dcnode-id="6112" instrument_node="">. [</span><a class="ext-link" data-dcnode-id="6110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/15006002/" target="_blank"><span data-dcnode-id="6111" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="6109" instrument_node="">]

span></span><span data-dcnode-id="6082" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6078"><span data-dcnode-id="6081" instrument_node="">Israel </span><span class="NLM_given-names" data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">M.</span></span></span><span data-dcnode-id="6077" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6073"><span data-dcnode-id="6076" instrument_node="">O'Connell </span><span class="NLM_given-names" data-dcnode-id="6074"><span data-dcnode-id="6075" instrument_node="">M.</span></span></span><span data-dcnode-id="6072" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6068"><span data-dcnode-id="6071" instrument_node="">Sarre </span><span class="NLM_given-names" data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">R</span></span></span><span data-dcnode-id="6067" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">Attitudes to victims: Issues for medicine, the law and society</span></span><span data-dcnode-id="6064" instrument_node="">. International victimology: Selected papers from the 8th International Symposium. </span><span class="NLM_year" data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">1996</span></span><span data-dcnode-id="6061" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">Canberra, Australia</span></span><span data-dcnode-id="6058" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">Australian Institute of Criminology</span></span><span data-dcnode-id="6055" instrument_node="">. </span><span class="NLM_fpage" data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">259</span></span><span data-dcnode-id="6052" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">275</span></span><span data-dcnode-id="6049" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6043"><span data-dcnode-id="6048" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6047"></span><span class="googleScholar-container" data-dcnode-id="6044"><a class="google-scholar" data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1996%26pages%3D259-275%26author%3DA.%2BC%2BMcFarlane%26title%3DInternational%2Bvictimology%253A%2BSelected%2Bpapers%2Bfrom%2Bthe%2B8th%2BInternational%2BSymposium" target="_blank"><span data-dcnode-id="6046" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6039" instrument_node="">) examined the psychological effects of court hearings on victims of a natural disaster (</span><i data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">N=</span></i><span data-dcnode-id="6036" instrument_node="">32) and reported that 57% of the victims experienced the civil litigation process as traumatizing or distressing. The delay between reporting a crime to the police and the start of the trial has been identified as a significant predictor of victims’ evaluation of the litigation process as traumatizing (Gutheil, Bursztajn, Brodsky, &amp; Strasburger, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5985"><a data-dcnode-id="6034" data-reflink="_i23" data-rid="CIT0018" href="#"><span data-dcnode-id="6035" instrument_node="">2000</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5986"><span class="ref-close" data-dcnode-id="6033" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6032"></span><span data-dcnode-id="5987"><span class="hlFld-ContribAuthor" data-dcnode-id="6028"><span data-dcnode-id="6031" instrument_node="">Gutheil </span><span class="NLM_given-names" data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">T. G.</span></span></span><span data-dcnode-id="6027" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6023"><span data-dcnode-id="6026" instrument_node="">Bursztajn </span><span class="NLM_given-names" data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">H.</span></span></span><span data-dcnode-id="6022" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6018"><span data-dcnode-id="6021" instrument_node="">Brodsky </span><span class="NLM_given-names" data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">A.</span></span></span><span data-dcnode-id="6017" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6013"><span data-dcnode-id="6016" instrument_node="">Strasburger </span><span class="NLM_given-names" data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">L. H</span></span></span><span data-dcnode-id="6012" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">Preventing “critogenic” harms: Minimizing emotional injury from civil litigation</span></span><span data-dcnode-id="6009" instrument_node="">. Journal of Psychiatry and Law. </span><span class="NLM_year" data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">2000</span></span><span data-dcnode-id="6006" instrument_node="">; 28: </span><span class="NLM_fpage" data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">5</span></span><span data-dcnode-id="6003" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">18</span></span><span data-dcnode-id="6000" instrument_node="">.
doi: </span><span class="NLM_pub-id" data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">10.1177/009318530002800102</span></span><span data-dcnode-id="5997" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5988"><span data-dcnode-id="5996" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5993"><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0018%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1177%252F009318530002800102" target="_blank"><span data-dcnode-id="5995" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="5989"><span data-dcnode-id="5992" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D28%26publication_year%3D2000%26pages%3D5-18%26author%3DT.%2BG.%2BGutheil%26author%3DH.%2BBursztajn%26author%3DA.%2BBrodsky%26author%3DL.%2BH%2BStrasburger%26title%3DPreventing%2B%25E2%2580%259Ccritogenic%25E2%2580%259D%2Bharms%3A%2BMinimizing%2Bemotional%2Binjury%2Bfrom%2Bcivil%2Blitigation%26doi%3D10.1177%252F009318530002800102" target="_blank"><span data-dcnode-id="5991" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5984" instrument_node="">).</span></p><p data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">Empirical findings on the impact of court hearings on psychological outcomes are thus inconclusive. It is important to differentiate between the meaning of the outcome of an asylum claim and the one of crime victims because it is possible that asylum seekers will be repatriated (or detained) if their claim is rejected. This makes it problematic to directly extend the results of studies on crime victims to the literature on refugees and asylum seekers and illustrates the importance of conducting this study.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5973" id="S0002"><h2 class="section-heading-2" data-dcnode-id="5978" id="_i10"><span data-dcnode-id="5979" instrument_node="">Objective</span></h2><p data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">In our clinical experience, asylum seekers often report a worsening of their clinical symptoms after having gone through the asylum interview. We conducted this study to verify this subjective impression and to investigate influencing factors during the asylum interview. The first aim of our study was therefore to examine the impact of the asylum interview on the mental health of traumatized refugees and survivors of torture with PTSD, depression, and anxiety symptoms. The second aim was to investigate the moderating influence on symptom severity of trial-related variables such as the perceived justice of the hearing, the stress of giving testimony (testimony stress), and the stress of waiting for the asylum interview (delay stress).</span></p><p data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">We hypothesized first that the more asylum seekers experience the asylum interview as unjust, the higher will be the overall increase in PTSD symptoms, anxiety, and depressive symptoms. Second, we predicted that the more testimony stress is caused by giving testimony about the traumatic experience, the higher the increase in PTSD symptoms, especially intrusive symptoms, and anxiety and depression.</span></p></div><div class="NLM_sec NLM_sec-type_methods NLM_sec_level_1" data-dcnode-id="5199" id="S0003"><h2 class="section-heading-2" data-dcnode-id="5971" id="_i11"><span data-dcnode-id="5972" instrument_node="">Methods</span></h2><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5863" id="S0003-S20001"><h3 class="section-heading-3" data-dcnode-id="5969" id="_i12"><span data-dcnode-id="5970" instrument_node="">Sample groups</span></h3><p data-dcnode-id="5866"><span data-dcnode-id="5968" instrument_node="">Participants in the present study were traumatized asylum seekers who fled to Germany as refugees, had applied to the BAMF for asylum, and whose asylum interview at the BAMF took place between the first and second occasions of measurement (asylum group, AG). They were recruited through specialized treatment centers (</span><i data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">N=</span></i><span data-dcnode-id="5965" instrument_node="">37) and lawyers (</span><i data-dcnode-id="5963"><span data-dcnode-id="5964" instrument_node="">N=</span></i><span data-dcnode-id="5962" instrument_node="">10). In a first contact (face-to-face or by phone, facilitated by a trained interpreter), 47 interested participants were informed about the background and procedures of the study. They were informed that their participation would not affect the outcome of their asylum interview in any way. Furthermore, they were assured that their participation was voluntary and that all data would be treated confidentially. Participants also received this information in written form. Four of the asylum seekers, who had been recruited through lawyers, declined to participate in the study. Three of them (all men) stated that they remained doubtful that the results of the study would have no negative effect on the outcome of their asylum claim. One woman had no wish to talk about her experiences and feelings with an interviewer she did not know. Asylum seekers recruited through treatment centers agreed to participate. Thus, 43 asylum seekers gave their approval to take part in the study. All participants provided signed informed consent before the first assessment point. The assessment interviews were conducted in the Treatment Center for Torture Victims in Berlin by trained psychologists and facilitated by trained and sworn interpreters, who had a wealth of experience in working with refugees. The comparison group consisted of refugees (</span><i data-dcnode-id="5960"><span data-dcnode-id="5961" instrument_node="">N=</span></i><span data-dcnode-id="5959" instrument_node="">10) who were waiting to begin therapy in the treatment center, but had not yet been invited to a hearing at the BAMF, and whose asylum interview did not take place between the two assessment points. The inclusion criteria for the comparison group were a PTSD symptom level at assessment point one of a PDS sum-score of &gt;30 (severe symptom level; Posttraumatic Diagnostic Scale, Foa, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5932"><a data-dcnode-id="5957" data-reflink="_i23" data-rid="CIT0014" href="#"><span data-dcnode-id="5958" instrument_node="">1995</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5933"><span class="ref-close" data-dcnode-id="5956" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5955"></span><span data-dcnode-id="5934"><span class="hlFld-ContribAuthor" data-dcnode-id="5951"><span data-dcnode-id="5954" instrument_node="">Foa </span><span class="NLM_given-names" data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">E. B</span></span></span><span data-dcnode-id="5950" instrument_node="">. Posttraumatic Diagnostic Scale: Manual. </span><span class="NLM_year" data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">1995</span></span><span data-dcnode-id="5947" instrument_node="">; </span><span class="NLM_publisher-loc" data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">Minneapolis, MN</span></span><span data-dcnode-id="5944" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">National Computer Systems</span></span><span data-dcnode-id="5941" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5935"><span data-dcnode-id="5940" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5939"></span><span class="googleScholar-container" data-dcnode-id="5936"><a class="google-scholar" data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D1995%26author%3DE.%2BB%2BFoa%26title%3DPosttraumatic%2BDiagnostic%2BScale%253A%2BManual" target="_blank"><span data-dcnode-id="5938" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5931" instrument_node="">; Foa, Cashman, Jaycox, &amp; Perry, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5880"><a data-dcnode-id="5929" data-reflink="_i23" data-rid="CIT0015" href="#"><span data-dcnode-id="5930" instrument_node="">1997</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5881"><span class="ref-close" data-dcnode-id="5928" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5927"></span><span data-dcnode-id="5882"><span class="hlFld-ContribAuthor" data-dcnode-id="5923"><span data-dcnode-id="5926" instrument_node="">Foa </span><span class="NLM_given-names" data-dcnode-id="5924"><span data-dcnode-id="5925" instrument_node="">E. B.</span></span></span><span data-dcnode-id="5922" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5918"><span data-dcnode-id="5921" instrument_node="">Cashman </span><span class="NLM_given-names" data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">L.</span></span></span><span data-dcnode-id="5917" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5913"><span data-dcnode-id="5916" instrument_node="">Jaycox </span><span class="NLM_given-names" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">L.</span></span></span><span data-dcnode-id="5912" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5908"><span data-dcnode-id="5911" instrument_node="">Perry </span><span class="NLM_given-names" data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">K</span></span></span><span data-dcnode-id="5907" instrument_node="">. </span><span class="NLM_article-title" data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">The validation of a self-report measure of posttraumatic stress disorder: The Posttraumatic Diagnostic Scale</span></span><span data-dcnode-id="5904" instrument_node="">. Psychological Assessment. </span><span class="NLM_year" data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">1997</span></span><span data-dcnode-id="5901" instrument_node="">; 9: </span><span class="NLM_fpage" data-dcnode-id="5899"><span data-dcnode-id="5900" instrument_node="">445</span></span><span data-dcnode-id="5898" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5896"><span data-dcnode-id="5897" instrument_node="">451</span></span><span data-dcnode-id="5895" instrument_node="">. doi: 10.1186/1471-244X-5-11.</span><span class="refLink-block" data-dcnode-id="5883"><span data-dcnode-id="5894" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5888"><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0015%26dbid%3D16%26doi%3D10.3402%252Fejpt.v6.26286%26key%3D10.1037%252F1040-3590.9.4.445" target="_blank"><span data-dcnode-id="5893" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5891" instrument_node="">, </span><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0015%26dbid%3D128%26doi%3D10.3402%252Fejpt.v6.26286%26key%3DA1997YL09600014" target="_blank"><span data-dcnode-id="5890" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5884"><span data-dcnode-id="5887" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D9%26publication_year%3D1997%26pages%3D445-451%26author%3DE.%2BB.%2BFoa%26author%3DL.%2BCashman%26author%3DL.%2BJaycox%26author%3DK%2BPerry%26title%3DThe%2Bvalidation%2Bof%2Ba%2Bself-report%2Bmeasure%2Bof%2Bposttraumatic%2Bstress%2Bdisorder%253A%2BThe%2BPosttraumatic%2BDiagnostic%2BScale" target="_blank"><span data-dcnode-id="5886" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5879" instrument_node="">), a minimum of five experienced traumatic events, a minimum age of 18 years, and a level of education of at least 5 years. The small size of this sample group is explained by the fact that very few asylum seekers who seek assistance in treatment centers for refugees and torture survivors have not received an invitation for the hearing at that point in time. On average, the asylum seekers who passed through the asylum interview (AG) had entered Germany 7 months before the interview (SD</span><i data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">=</span></i><span data-dcnode-id="5876" instrument_node="">6.3 months). The asylum seekers of the comparison group (CG), in contrast, had entered Germany 5 months (SD</span><i data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">=</span></i><span data-dcnode-id="5873" instrument_node="">4.8 months) before the first assessment point. The interviews were conducted, on average, 10 days (SD</span><i data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">=</span></i><span data-dcnode-id="5870" instrument_node="">9 days) before the asylum interview (t1) and 16 days (SD</span><i data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">=</span></i><span data-dcnode-id="5867" instrument_node="">13 days) after the interview (t2). The Ethics Committee of the German Psychological Association approved the study.</span></p><p data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">All the participants recruited from treatment centers took part in the second assessment. Of those recruited through lawyers, three did not take part in the second assessment. The asylum interviews of two of those participants were postponed to a later date and the third was no longer reachable. In all, 40 asylum seekers were included in the statistical analysis.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5228" id="S0003-S20002"><h3 class="section-heading-3" data-dcnode-id="5861" id="_i13"><span data-dcnode-id="5862" instrument_node="">Measures</span></h3><p data-dcnode-id="5856"><span data-dcnode-id="5860" instrument_node="">Demographic data including age, sex, level of education, marital status, and time since arrival in Germany were collected from each participant (</span><button class="ref showTableEventRef" data-dcnode-id="5858" data-id="T0001"><span data-dcnode-id="5859" instrument_node="">Table 1</span></button><span data-dcnode-id="5857" instrument_node="">). Mental health variables were assessed by standardized questionnaires. The measures on psychopathology were all translated from the German and then retranslated in advance of the study in order to ensure the accuracy and content validity of the scale items.</span></p><div class="tableViewerArticleInfo hidden" data-dcnode-id="5821"><span class="figViewerTitle" data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">Impact of asylum interviews on the mental health of traumatized asylum seekers</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="5830"><div class="authorsHeading" data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="5831"><a class="entryAuthor" data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DSchock%252C%2BKatrin"><span class="hlFld-ContribAuthor" data-dcnode-id="5851"></span></a><a data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Schock%252C%2BKatrin"><span class="NLM_given-names" data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">Katrin</span></span><span data-dcnode-id="5847" instrument_node=""> Schock</span></a><span data-dcnode-id="5845" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DRosner%252C%2BRita"><span class="hlFld-ContribAuthor" data-dcnode-id="5844"></span></a><a data-dcnode-id="5839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Rosner%252C%2BRita"><span class="NLM_given-names" data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">Rita</span></span><span data-dcnode-id="5840" instrument_node=""> Rosner</span></a><span data-dcnode-id="5838" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DKnaevelsrud%252C%2BChristine"><span class="hlFld-ContribAuthor" data-dcnode-id="5837"></span></a><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Knaevelsrud%252C%2BChristine"><span class="NLM_given-names" data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">Christine</span></span><span data-dcnode-id="5833" instrument_node=""> Knaevelsrud</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="5822"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-
