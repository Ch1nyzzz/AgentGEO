</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="3093"><div class="field-items" data-dcnode-id="3094"><div class="field-item even" data-dcnode-id="3095"><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">
LONDON: The EU is considering suspending some rights belonging to asylum seekers in countries bordering Belarus in an effort to end the ongoing migrant crisis.</span></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">
Proposals put forward by the European Commission, the executive arm of the bloc, would allow for faster deportations and the detention of asylum seekers at the border for up to four months.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">
The plans are aimed at mitigating the political harm caused by large numbers of people attempting to enter Poland and other EU states from Belarus, in what Brussels describes as a crisis manufactured by Minsk.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">
The EU argues that Belarus has flown migrants in from the Middle East in order to put pressure on its northeastern border regions and manufacture political instability, with the onus of dealing with a large influx of migrants placed disproportionately on Poland, Lithuania and Latvia.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">
Belarus has denied those accusations, calling them absurd.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">
The three Belarus-bordering EU states have defended their approach of pushing migrants back without individually assessing their cases or granting them a realistic chance to claim asylum.</span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">
Rights groups say that 13 people have now died in the area due to the freezing conditions and that the practice violates EU rules and international humanitarian law.</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">
Under the EU’s proposals, migrants would be permitted to claim asylum only at designated locations, such as border crossings.</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">
National authorities would have a longer period of up to four weeks to register asylum applications and asylum seekers could be kept for up to 16 weeks at the border, losing a standing right to be held in more suitable centers inside the country.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">
The proposals are a further example of the EU tightening immigration rules since more than one million people arrived in 2015 — many of them fleeing the conflict in Syria — overwhelming the bloc and dividing member states over how to respond.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">
Immigration is among the most contentious intra-bloc issues for EU members, in part because regulation and geography mean that the burden of managing asylum applications and inward immigration falls disproportionately on Southern and Eastern countries — many of which are less wealthy than western states, such as France and Germany.</span></p><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">
According to Lithuania’s interior ministry, around 10,000 migrants remain in Belarus, despite Minsk initiating removal flights for some.</span></p><span data-dcnode-id="3096" instrument_node="">

</span><p data-dcnode-id="2673"><span data-dcnode-id="2720" instrument_node="">
LVIV/KYIV, Ukraine: Russia told the world not to underestimate the considerable risks of nuclear war that it said it wanted to reduce and warned that conventional Western weapons were legitimate targets in Ukraine, where battles raged in the east.</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">
“The risks now are considerable,” Foreign Minister Sergei Lavrov told Russia’s state television according to a transcript of an interview on the ministry’s website.</span><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">
“I would not want to elevate those risks artificially. Many would like that. The danger is serious, real. And we must not underestimate it.”</span><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">
Lavrov had been asked about the importance of avoiding World War Three and whether the current situation was comparable to the 1962 Cuban Missile Crisis, a low point in U.S-Soviet relations.</span><br data-dcnode-id="2713"><span data-dcnode-id="2712" instrument_node="">
Russia had lost its “last hope to scare the world off supporting Ukraine,” Ukraine’s Foreign Minister Dmytro Kuleba wrote on Twitter after Lavrov’s interview. “This only means Moscow senses defeat.”</span><br data-dcnode-id="2711"><span data-dcnode-id="2710" instrument_node="">
During a visit to Kyiv on Sunday, US Secretary of State Antony Blinken and Defense Secretary Lloyd Austin promised more military aid for Ukraine.</span><br data-dcnode-id="2709"><span data-dcnode-id="2708" instrument_node="">
The US State Department on Monday used an emergency declaration to approve the potential sale of $165 million worth of ammunition to Ukraine. The Pentagon said the package could include artillery ammunition for howitzers, tanks and grenade launchers.</span><br data-dcnode-id="2707"><span data-dcnode-id="2706" instrument_node="">
Moscow’s ambassador to Washington told the United States to halt shipments, warning Western weapons were inflaming the conflict.</span><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">
Lavrov said: “NATO, in essence, is engaged in a war with Russia through a proxy and is arming that proxy. War means war.”</span><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node="">
Russia’s two-month-old invasion of Ukraine, the biggest attack on a European state since 1945, has left thousands dead or injured, reduced towns and cities to rubble, and forced over 5 million people to flee abroad.</span><br data-dcnode-id="2701"><span data-dcnode-id="2700" instrument_node="">
Moscow calls its actions a “special operation” to disarm Ukraine and protect it from fascists. Ukraine and the West says this a false pretext for an unprovoked war of aggression by President Vladimir Putin.</span><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">
The United States is due to host an expected gathering of more than 40 countries this week for Ukraine-related defense talks that will focus on arming Kyiv, US officials said.</span><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node="">
Britain said all tariffs on goods coming into the country from Ukraine under an existing free trade deal will be axed and it would send new ambulances, fire engines, medical supplies and funding for health experts to help the emergency services.</span><br data-dcnode-id="2695"><span data-dcnode-id="2694" instrument_node="">
Russia has yet to capture any of the biggest cities. Its forces were forced to pull back from the outskirts of Kyiv in the face of stiff resistance.</span><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">
“It is obvious that every day — and especially today, when the third month of our resistance has begun — that everyone in Ukraine is concerned with peace, about when it will all be over,” President Volodymyr Zelensky said late on Monday.</span><br data-dcnode-id="2691"><span data-dcnode-id="2690" instrument_node="">
“There is no simple answer to that at this time.”</span><br data-dcnode-id="2689"><span data-dcnode-id="2688" instrument_node="">
Having failed to take the capital Kyiv, Moscow last week launched a massive assault in an attempt to capture eastern provinces known as the Donbas, which if successful would link territory held by pro-Russian separatists in the east with the Crimea region that Moscow annexed in 2014.</span><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node="">
Russia’s defense ministry said its missiles destroyed six facilities powering the railways that were used to deliver foreign weapons to Ukrainian forces in the eastern Donbas region. Reuters could not verify the report.</span><br data-dcnode-id="2685"><span data-dcnode-id="2684" instrument_node="">
The head of Ukraine’s state rail company said that one railway worker had been killed and four injured by Russian missile strikes on five Ukrainian railway stations on Monday.</span><br data-dcnode-id="2683"><span data-dcnode-id="2682" instrument_node="">
Ukrainian forces have repelled five Russian attacks and killed just over 200 Russian servicemen, said the Ukrainian military command in the southern and eastern sectors.</span><br data-dcnode-id="2681"><span data-dcnode-id="2680" instrument_node="">
Five tanks were also destroyed, along with eight armored vehicles, it said in a statement</span><br data-dcnode-id="2679"><span data-dcnode-id="2678" instrument_node="">
Reuters was not able to immediately verify the reports.</span><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node="">
Russian forces were continuing on Monday to bomb and shell the vast Azovstal steel plant in Mariupol where fighters are hunkered down in a city ravaged by a siege and bombardment, Ukrainian presidential aide Oleksiy Arestovych said.</span><br data-dcnode-id="2675"><span data-dcnode-id="2674" instrument_node="">
Moscow said it was opening a humanitarian corridor to let civilians out of the plant but Kyiv said no agreement had been reached.</span></p><span data-dcnode-id="2672" instrument_node="">

</span><div class="entry-content" data-dcnode-id="2273"><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">
LONDON: Osama bin Laden was planning a second terrorist attack targeting the US just three years after masterminding the atrocities of Sept. 11, 2001, according to a report from CBS News.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">
Letters and other papers obtained after the former Al-Qaeda chief was killed by US Navy SEALs in Pakistan in 2011 revealed that he wanted to launch another attack using similar methods to those employed on 9/11, but using private jets instead of passenger planes.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">
The plans were discovered by security and terrorism expert Nelly Lahoud when she analyzed the documents. She told CBS that if bin Laden’s plan to use private jets proved to be impossible, he wanted to sabotage railway tracks in the US to cause derailments that resulted in large numbers of casualties.</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">
While in hiding after 9/11 to evade capture by US forces, she added, bin Laden remained in contact with other Al-Qaeda leaders and began planning the next attack, using his background in engineering to devise methods for causing as much death and destruction as possible.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">
“He wanted to have 12 meters of steel rail removed so that, this way, the train could be derailed,” Lahoud said. “And we find him explaining the simple toolkit that they could use. He said: ‘You could use a compressor, you could use a smelting iron tool.’”</span></p><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">
Another of bin Laden’s ideas was for undercover Al-Qaeda operatives to blow up small wooden fishing boats at American ports to sink oil tankers in an effort to damage the US economy.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">
“Bin Laden suggested Al-Qaeda operatives could integrate themselves into the port areas by posing as fishermen,” Lahoud said. “He instructed his team on where to buy specific boats to evade radar and detailed how the vessels should be used to transport explosives.”</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">
The war in Afghanistan ultimately stymied the ability of Al-Qaeda to carry out other large-scale attacks, she added, and by 2006 the organization only had about $200,000 in accessible funds.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">
Nearly 3,000 people died in the 9/11 attacks and Lahoud said that bin Laden failed to anticipate the ferocity of the US response it would provoke, including the launch of a full-fledged invasion and subsequent war in Afghanistan.</span></p><span data-dcnode-id="2274" instrument_node="">
</span></div><span data-dcnode-id="2272" instrument_node="">

</span><p data-dcnode-id="1873"><span data-dcnode-id="1902" instrument_node="">
WASHINGTON: House Minority Leader Kevin McCarthy on Monday downplayed secretly recorded remarks he made about Donald Trump shortly after last year’s attack on the Capitol. He also said he never told the then-president that he should resign — something news organizations have not reported.</span><br data-dcnode-id="1901"><span data-dcnode-id="1900" instrument_node="">
McCarthy’s comments were his first public remarks since The New York Times reported last week that on a Jan. 10, 2021, phone call with fellow Republicans, he said he was “seriously thinking” about telling Trump “he should resign.” McCarthy initially called that report “totally false and wrong.” The newspaper later released a recording of him making those remarks and it was played on Rachel Maddow’s MSNBC show.</span><br data-dcnode-id="1899"><span data-dcnode-id="1898" instrument_node="">
The Times and others have not reported that McCarthy ever followed through and called Trump to urge him to step down. Critics have said the recordings and his denial of what he said show McCarthy to be a liar.</span><br data-dcnode-id="1897"><span data-dcnode-id="1896" instrument_node="">
Trump was impeached by the House, but exonerated by the Senate, for encouraging a mob of his supporters who violently stormed the Capitol trying to disrupt Congress’ counting of the Electoral College votes in his November 2020 reelection defeat.</span><br data-dcnode-id="1895"><span data-dcnode-id="1894" instrument_node="">
McCarthy, R-Calif., said Monday that a reporter — one of two Times reporters who have written a book that includes the recorded conversation — called him “the night before he released the book.”</span><br data-dcnode-id="1893"><span data-dcnode-id="1892" instrument_node="">
“My understanding is he was saying, ‘Did I ask President Trump to resign?’ No, I never did, and that’s what I was answering,” McCarthy told reporters Monday in Eagle Pass, Texas, after touring the border with other Republicans.</span><br data-dcnode-id="1891"><span data-dcnode-id="1890" instrument_node="">
Reports have not said that McCarthy definitively told Republicans that he would urge Trump to step down, only that he was thinking seriously about it.</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">
McCarthy also said Monday that “I never did” tell GOP colleagues “that we’re going to ask” Trump to resign.</span><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">
Before he took the question Monday about the audio, McCarthy and his GOP colleagues spent 30 minutes describing what they said are dangerous conditions at the border and blaming President Joe Biden for them.</span><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">
“After all this, that’s what you want to ask?” he said when the reporter asked about the recording. He said people care more about border security and other issues.</span><br data-dcnode-id="1883"><span data-dcnode-id="1882" instrument_node="">
McCarthy was asked directly in an interview earlier Monday with Fox News Channel whether he had lied when he said, before the audio’s release, that the Times’ reporting was false.</span><br data-dcnode-id="1881"><span data-dcnode-id="1880" instrument_node="">
“No,” he said, saying he’d been asked if he’d called Trump and told him to resign.</span><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">
He also told Fox he believes the episode won’t have “any impact at all” on his hopes of becoming speaker if, as seems likely, Republicans win House control in November’s elections.</span><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">
So far McCarthy’s bid to become speaker seems on track. Trump, whose influence over the GOP is unrivaled, said after the audio’s release that he still likes McCarthy.</span><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">
While most House Republicans have said little so far about whether they would back McCarthy for speaker, those who’ve spoken out have said they still support him.</span></p><span data-dcnode-id="1872" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1222"><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">
NEW DELHI: India and the EU on Monday launched a trade and technology council to boost cooperation as both sides face “a challenging global landscape,” with a visit from the bloc’s chief coming after a stream of high-level visits to New Delhi since Russia’s invasion of Ukraine.&nbsp;</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">
European Commission President Ursula von der Leyen’s two-day trip is widely seen as part of the West’s continued efforts to encourage India to reduce ties to Russia, its main weapons supplier.&nbsp;</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">
India has called for an immediate end to violence but refrained from explicitly condemning the Russian invasion.&nbsp;</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">
Prime Minister Narendra Modi said in a tweet that Monday’s meeting with Von der Leyen, where the leaders discussed efforts to deepen strategic engagement, was “fruitful.”&nbsp;</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">
“Today, our relationship is more important than ever,” Von der Leyen said during the meeting.&nbsp;</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">
“We have so much in common … and we are both facing a challenging global landscape.”&nbsp;</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">
In a joint statement, India and the EU said they had agreed on how “rapid changes in the geopolitical environment highlight the need for joint in-depth strategic engagement.” The newly established council is set to provide them with a mechanism for strategic coordination.&nbsp;</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">
India is the second country to have this technical agreement with the EU, the first being the US.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">
The EU chief said in a series of tweets that the bloc and India will start negotiations on trade and investment agreements, while highlighting their cooperation on energy security and the fight against climate change.&nbsp;</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">
The flurry of top visits to New Delhi following the war in Europe is part of an ongoing effort to have world democracies stand together against Russia, according to Dr. Ummu Salma Bava, professor at the Centre for European Studies of Jawaharlal Nehru University in New Delhi.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1463" instrument_node="">

</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">
ISLAMABAD:&nbsp;Panic buying across Pakistan is fueling an “artificial shortage” of diesel, the Ministry of Energy said on Monday, as Islamabad is expected to roll back fuel price subsidies amid the government’s efforts to revive its $6 billion loan program from the International Monetary Fund.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">
Pakistan, facing economic challenges after a new government took over this month from ousted Prime Minister Imran Khan, has asked the IMF to extend its loan program and increase the funding by an extra $2 billion to help ease difficulties in financing, the country’s Finance Minister Miftah Ismail has said.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">
The South Asian country has agreed to roll back subsidies to the oil and power sectors, the IMF said in a statement, ahead of a mission visit next month “to resume discussions” on the loan program, when officials are expected to thrash out details on the bailout package.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">
The likely increase in diesel prices has fueled a shortage across Pakistan, with farmers among those struggling to secure enough fuel as the country is in the peak of the wheat harvesting season. The Ministry of Energy said Pakistan has enough diesel supply.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">
“This is an artificial shortage as Pakistan has enough diesel reserves available to fulfill the demand,” Rabbiya Khalid, a spokesperson for the ministry, told Arab News.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">
“People should stop panic buying. There is absolutely no shortage of diesel in Pakistan.”</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">
The shortage has also hit the country’s most populous Punjab province, where wheat harvesting has been delayed as a result.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">
“The diesel shortage is hurting the farmers and delaying the wheat harvesting,” Mian Muhammad Umair Masood from the Pakistani farmers’ association, Pakistan Kissan Ittehad, told Arab News.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">
Masood said the delay in wheat harvesting would impact the sowing of other crops, including cotton, maize and rice, and called on the government to continue the fuel subsidy to support the farmers.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">
“The oil shortage at this crucial time could lead to food insecurity in the country,” he said. “Diesel is mainly used in agriculture, and a fuel subsidy to farmers means additional crop yield and food security.”</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">
The new government, promising populist measures, had kept fuel prices unchanged this month to provide relief to its citizens. But aid from the world lender appears critical as Pakistan grapples with Asia’s second-fastest inflation rate, and as its foreign exchange reserves fell to less than two months of import cover.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">
The IMF suspended its $6 billion loan to Pakistan in 2020, after Pakistan failed to meet its lending conditions. The plan was revived last year under tougher conditions agreed to by Khan’s administration, including raising oil prices and electricity tariffs, but the increases were rolled back in response to public anger over rising living costs.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">
Pakistan revises prices of petroleum products every 15 days, and the next revision is scheduled for April 30. It is expected that fuel prices would increase to fulfill the IMF’s demands.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">
Samiullah Tariq, head of research at Pakistan Kuwait Investment, said that sufficient stock of the diesel was available in the country, and the shortage was “temporary” as oil company dealers expected a price hike by the end of this month.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">
“The government should announce the revised oil prices as early as possible to end this artificial shortage,” Tariq told Arab News.</span></p><span data-dcnode-id="800" instrument_node="">
