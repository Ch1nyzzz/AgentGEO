</span><ul data-dcnode-id="788" style="text-align: justify;"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="795" instrument_node="">In </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol21/3278.pdf"><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Matter of Kasinga</span></em></a><span data-dcnode-id="791" instrument_node="">, 21 I&amp;N 357 (BIA 1996), the U.S. Board of Immigration Appeals (BIA) held that young women who were members of the Tchamba-Kunsuntu Tribe of northern Togo who had not been subjected to female genital mutilation, as practiced by that tribe, and who opposed the practice constituted a particular social group.</span></li><span data-dcnode-id="789" instrument_node="">
</span></ul><span data-dcnode-id="787" instrument_node="">
</span><ul data-dcnode-id="765" style="text-align: justify;"><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="785" instrument_node="">The criteria for identifying a particular social group in the U.S., however, are not clear. In </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol19/2986.pdf"><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Matter of Acosta</span></em></a><span data-dcnode-id="781" instrument_node="">, 19 I&amp;N Dec. 211 (BIA 1985), the BIA held that members of a taxi-driver cooperative in El Salvador did not constitute a social group because their membership was not immutable. Meanwhile in </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol23/3535.pdf"><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Matter of C-A-</span></em></a><span data-dcnode-id="777" instrument_node="">, 23 I&amp;N 951 (BIA 2006) the BIA held that non-criminal, uncompensated informants in Colombia did not constitute a social group because they did not share a common, immutable characteristic and because they were not a visible group, as the very nature of their work required them to work in secret. In </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//caselaw.findlaw.com/us-7th-circuit/1499189.html"><em data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Benitez Ramos v. Holder</span></em></a><span data-dcnode-id="773" instrument_node="">, 589 F.3d 426 (7th Cir. 2009), a case concerning a withholding of removal claim filed by an El Salvadoran national, the U.S. Court of Appeals for the Seventh Circuit not only rejected the social visibility requirement formulated by the BIA, it also criticized the BIA for inconsistently applying its own criteria, pointing to the fact that the BIA itself did not always require social visibility when evaluating whether individuals could be said to be members of a particular social group. Particular social group has been defined since as&nbsp;“a group of persons all of whom share a common, immutable characteristic.” </span><em data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">See&nbsp;</span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_case%3Fcase%3D2185148396949406185%26hl%3Den%26as_sdt%3D6%26as_vis%3D1%26oi%3Dscholarr"><span data-dcnode-id="771" instrument_node="">Cordoba v. Holder</span></a><span data-dcnode-id="769" instrument_node="">, 726 F.3d 1106, 1114 (9th Cir. 2013) (quoting Matter of Acosta, 19 I&amp;N 211, 233 (BIA 1985)).&nbsp;</span></em></li><span data-dcnode-id="766" instrument_node="">
</span></ul><span data-dcnode-id="764" instrument_node="">
</span><ul data-dcnode-id="737" style="text-align: justify;"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="762" instrument_node="">In the joined cases, </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.publications.parliament.uk/pa/ld199899/ldjudgmt/jd990325/islam01.htm"><em data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Islam (A.P.) v. Secretary of State for the Home Department;</span></em><span data-dcnode-id="759" instrument_node=""> </span><em data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Regina v. Immigration Appeal Tribunal and Another Ex Parte Shah (A.P.)</span></em><span data-dcnode-id="756" instrument_node="">,</span></a><span data-dcnode-id="754" instrument_node=""> [1999] (H.L.) (appeal taken from England) (U.K.), the U.K. House of Lords held that women in Pakistan constituted a social group, granting asylum to two women from Pakistan who had fled domestic violence. </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Cf.,</span></em><span data-dcnode-id="751" instrument_node=""> </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol22/3403.pdf"><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Matter of R-A-</span></em></a><span data-dcnode-id="747" instrument_node="">, 22 I&amp;N 906 (BIA 1999) (denying asylum to woman claiming membership in social group identified as “Guatemalan women who have been intimately involved with Guatemalan male companions, who believe women are to live under male domination”). According to the House of Lords, whether such a broad definition of a social group qualifies under the Convention will depend on evidence of how that group is treated in the country of nationality or habitual residence at issue. </span><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Id</span></em><span data-dcnode-id="744" instrument_node="">. (citing </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/refworld/docid/3ae6b6938.html"><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">In Re G.J.</span></em></a><span data-dcnode-id="740" instrument_node=""> [1998] INLR 387 (New Zealand Refugee Status Appeals Authority), a New Zealand decision granting asylum on the basis of membership in a particular social group to a homosexual from Iran.)</span></li><span data-dcnode-id="738" instrument_node="">
</span></ul><span data-dcnode-id="736" instrument_node="">
</span><ul data-dcnode-id="723" style="text-align: justify;"><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="734" instrument_node="">In </span><em data-dcnode-id="730"><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/docid/3ae6b7180.html"><span data-dcnode-id="733" instrument_node="">A and Another v. Minister for Immigration &amp; Ethnic Affairs</span></a><span data-dcnode-id="731" instrument_node="">&nbsp;</span></em><span data-dcnode-id="729" instrument_node="">(1997) 142 ALR 331 (Austl.), the High Court of Australia rejected the asylum claim of Chinese nationals who claimed to have a well-founded fear of persecution because they sought to have a second child despite China’s one-child only policy. The asylum applicants claimed fear of being subjected to forced sterilization and argued they were members of a particular social group that consisted of “those who having only one child do not accept the limitations placed on them or who are coerced or forced into being sterilized.” The Court rejected this formulation as too circular because it was not independent of the persecution feared. By contrast, the U.S. Congress has recognized forced sterilization as a per se ground of persecution in its legislation. </span><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">See </span></em><span data-dcnode-id="726" instrument_node="">8 U.S.C. § 1101(a)(42).</span></li><span data-dcnode-id="724" instrument_node="">
</span></ul><span data-dcnode-id="722" instrument_node="">
</span><h3 data-dcnode-id="717"><span data-dcnode-id="718" id="Non-refoulement_and_Countries_of_Transit"><span data-dcnode-id="719" style="color: #006666;"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Non-refoulement and Countries of Transit</span></strong></span></span></h3><span data-dcnode-id="716" instrument_node="">
</span><ul data-dcnode-id="698" style="text-align: justify;"><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="700"><span data-dcnode-id="714" instrument_node="">In </span><em data-dcnode-id="710"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//caselaw.lp.findlaw.com/cgi-bin/getcase.pl%3Fcourt%3DUS%26vol%3D509%26invol%3D155"><span data-dcnode-id="713" instrument_node="">Sale v. Haitian Ctr. Council, Inc.,</span></a><span data-dcnode-id="711" instrument_node="">&nbsp;</span></em><span data-dcnode-id="709" instrument_node="">509 U.S. 155 (1993),the U.S. Supreme Court held that the U.S. was not in violation of its non-refoulement obligation when it returned Haitians interdicted on the high seas because the Haitians were not within U.S. territory and therefore the non-refoulement obligation did not apply. The Inter-American Commission on Human Rights (IACHR) rejected this reasoning in IACHR, Report No. 51/96, </span><em data-dcnode-id="705"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cidh.oas.org/annualrep/96eng/USA10675.htm"><span data-dcnode-id="708" instrument_node="">Case 10.675, Haitian Centre for Human Rights</span></a><span data-dcnode-id="706" instrument_node="">&nbsp;</span></em><span data-dcnode-id="704" instrument_node="">(United States), 13 March 1997</span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">. &nbsp;</span></em><span data-dcnode-id="701" instrument_node="">The IACHR held that the U.S. had violated the petitioners’ right to seek asylum as well as their right to life, liberty, and security of the person when it summarily returned interdicted Haitians – many of whom were subsequently arrested by Haitian authorities – without providing them with a meaningful opportunity to have their claims adjudicated. The IACHR also held that the U.S. had violated their right to freedom from discrimination, noting that a much more favorable policy was applied to Cubans and Nicaraguans.</span></li><span data-dcnode-id="699" instrument_node="">
</span></ul><span data-dcnode-id="697" instrument_node="">
</span><ul data-dcnode-id="688" style="text-align: justify;"><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="695" instrument_node="">In </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.saflii.org/za/cases/ZASCA/2011/2.html"><em data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Abdi and Another v. Minister of Home Affairs</span></em></a><span data-dcnode-id="691" instrument_node="">&nbsp;(734/10) [2011] ZASCA 2 (15 February 2011) (S. Afr.), the South African court rejected the Government’s arguments that two Somali nationals – one an asylum seeker and the other a recognized refugee – being held in the Inadmissibility Facility detention center at the airport while awaiting transfer to Kenya were outside the scope of South African law. The Court held that it was immaterial that the two had left South Africa for Namibia prior to their detention and, as illegal entrants, were subject to a Namibian deportation order.</span></li><span data-dcnode-id="689" instrument_node="">
</span></ul><span data-dcnode-id="687" instrument_node="">
</span><ul data-dcnode-id="678" style="text-align: justify;"><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="685" instrument_node="">In ECtHR, </span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hudoc.echr.coe.int/eng%23%257B%2522fulltext%2522%3A%255B%2522M.S.S.%2522%255D%2C%2522documentcollectionid2%2522%3A%255B%2522GRANDCHAMBER%2522%2C%2522CHAMBER%2522%255D%2C%2522itemid%2522%3A%255B%2522001-103050%2522%255D%257D"><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Case of M.S.S. v. Belgium and Greece</span></em></a><span data-dcnode-id="681" instrument_node=""> [GC], no. 30696/09, ECHR 2011, Judgment of 21 January 2011, the ECtHR held that the Belgian government had violated an asylum seeker from Afghanistan’s rights under Article 3 of the European Convention on Human Rights by returning him to Greece, the country he had initially transited through, to adjudicate his asylum claim because it was common knowledge that the Greek government lacked adequate asylum procedures, thus, placing the applicant at risk of being returned to Afghanistan where his life or freedom would be in danger.</span></li><span data-dcnode-id="679" instrument_node="">
</span></ul><span data-dcnode-id="677" instrument_node="">
</span><ul data-dcnode-id="665" style="text-align: justify;"><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="675" instrument_node="">In </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hcourt.gov.au/cases/case-m70/2011"><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">M70/2011 and M106/2011 v. Minister for Immigration and Citizenship &amp; Anor</span></em></a><span data-dcnode-id="671" instrument_node="">, [2011] HCA 32 (Austl.) the Australian High Court held that the Minister’s declaration under § 198A of Australia’s </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/ma1958118/"><span data-dcnode-id="670" instrument_node="">Migration Act</span></a><span data-dcnode-id="668" instrument_node=""> that asylum seekers who arrived on the excised territory of Christmas Island could be sent to Malaysia where their asylum claims would be considered was not valid because he had failed to adequately consider the factors set forth in § 198A(i)-(iv), namely that Malaysia was not a party to the Convention, had no domestic law recognizing the status of refugees, and that the Arrangement between Australia and Malaysia – in which Malaysia would recognize refugees and adjudicate claims in accordance with international standards – was not legally binding.</span></li><span data-dcnode-id="666" instrument_node="">
</span></ul><span data-dcnode-id="664" instrument_node="">
</span><ul data-dcnode-id="631" style="text-align: justify;"><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="662" instrument_node="">In ACommHPR, </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.achpr.org/communications/decisions/249.02/"><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Institute for Human Rights and Development in Africa (on behalf of Sierra Leonean refugees in Guinea) v. Guinea</span></em></a><span data-dcnode-id="658" instrument_node="">, Communication No. 249/02, 36</span><sup data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">th</span></sup><span data-dcnode-id="655" instrument_node=""> Ordinary Session, December 2004, the African Commission on Human and Peoples’ Rights (ACHPR) found that a proclamation by then-President Lasana Conté made over national radio stating that Sierra Leonean refugees should be arrested, searched and confined to refugee camps resulted in widespread violence and discrimination against Sierra Leonean refugees to such a serious degree that many were effectively forced to repatriate to Sierra Leone despite the ongoing civil war. The ACHPR held that the treatment of Sierra Leonean refugees violated the principle of non-refoulement and the Sierra Leoneans’ right to freedom from mass expulsion. </span><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">See also</span></em><span data-dcnode-id="652" instrument_node="">&nbsp;ACommHPR, </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.achpr.org/communications/decisions/27.89-46.91-49.91-99.93/"><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Organisation mondiale contre la torture, Association Internationale des jurists démocrates, Commission internationale des jurists, Union interafricaine des droits de l’Homme v. Rwanda</span></em></a><span data-dcnode-id="648" instrument_node="">, Communications No. 27/89-46/90-46/91-99/93, 20</span><sup data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">th</span></sup><span data-dcnode-id="645" instrument_node=""> Ordinary Session, October 1996 (expulsion of Burundi refugees living in Rwanda without opportunity to contest their removal violated their rights under the African Charter); </span><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">but see&nbsp;</span></em><span data-dcnode-id="642" instrument_node="">ACommHPR, </span><em data-dcnode-id="638"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.achpr.org/communications/decisions/235.00/"><span data-dcnode-id="641" instrument_node="">Curtis Francis Doebbler v. Sudan</span></a><span data-dcnode-id="639" instrument_node="">,&nbsp;</span></em><span data-dcnode-id="637" instrument_node="">Communication No. 235/00, 46</span><sup data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">th</span></sup><span data-dcnode-id="634" instrument_node=""> Ordinary Session, November 2009 (no violation where Sudan announced, in coordination with UNHCR, cessation of Ethiopian refugee status following the end of the Mengistu regime and where there were procedures in place for Ethiopians who still had a well-founded fear of persecution to have their claims heard.)</span></li><span data-dcnode-id="632" instrument_node="">
</span></ul><span data-dcnode-id="630" instrument_node="">
</span><h3 data-dcnode-id="625"><span data-dcnode-id="626" id="Exclusion_Clauses"><span data-dcnode-id="627" style="color: #006666;"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Exclusion Clauses</span></strong></span></span></h3><span data-dcnode-id="624" instrument_node="">
</span><h4 data-dcnode-id="621"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">TERRORISM</span></strong></h4><span data-dcnode-id="620" instrument_node="">
</span><ul data-dcnode-id="610" style="text-align: justify;"><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="618" instrument_node="">In </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol24/3581.pdf"><em data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Matter of S-K-</span></em><span data-dcnode-id="615" instrument_node="">,</span></a><span data-dcnode-id="613" instrument_node=""> 23 I&amp;N 936 (BIA 2006), the U.S. Board of Immigration Appeals (BIA) held that a Burmese national who had provided approximately 700 dollars to the Chin National Front, which was at the time considered a Tier III terrorist organization under U.S. law, was inadmissible on the grounds that she had provided material support to a terrorist organization. It was irrelevant that the U.S. Government supported the National Democratic League, an ally of the Chin National Front, and that the Chin National Front fought against the Burmese Government, to which the U.S. was opposed. In the wake of controversy following the broad application of the material support bar to refugees and asylum seekers, the U.S. Government has subsequently applied a discretionary waiver to several organizations, including the Chin National Front, permitting refugees who had supported these organizations to enter the U.S. as resettled refugees or claim asylum.</span></li><span data-dcnode-id="611" instrument_node="">
</span></ul><span data-dcnode-id="609" instrument_node="">
</span><h4 data-dcnode-id="606" style="text-align: justify;"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">WAR CRIMES AND CRIMES AGAINST HUMANITY</span></strong></h4><span data-dcnode-id="605" instrument_node="">
</span><ul data-dcnode-id="583" style="text-align: justify;"><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="585"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.law.cornell.edu/supct/html/07-499.ZS.html"><em data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Negusie</span></em><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node=""> v. Holder</span></em></a><span data-dcnode-id="598" instrument_node="">, 555 U.S. 511 (2009): The U.S. Supreme Court remanded to the BIA to determine whether the Refugee Act, which incorporated the 1967 Optional Protocol’s exclusion of individuals who had committed war crimes and crimes against humanity from refugee status, included an exception for persecutory acts committed under duress. The Court held that the BIA, in denying Negusie, an Eritrean national’s asylum application, had erred in relying on </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//caselaw.lp.findlaw.com/scripts/getcase.pl%3Fcourt%3Dus%26vol%3D449%26invol%3D490"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Fedorenko v. United States</span></em></a><em data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">, </span></em><span data-dcnode-id="592" instrument_node="">449 U.S. 490 (1981)</span><i data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">,</span></i><span data-dcnode-id="589" instrument_node="">&nbsp;to find there was no duress exception because </span><em data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Fedorenko</span></em><span data-dcnode-id="586" instrument_node=""> concerned a claim arising out of the Displaced Person’s Act and not the 1980 Refugee Act.</span></li><span data-dcnode-id="584" instrument_node="">
</span></ul><span data-dcnode-id="582" instrument_node="">
</span><ul data-dcnode-id="569" style="text-align: justify;"><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="571"><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumlawdatabase.eu/sites/asylumlawdatabase.eu/files/aldfiles/B.%2520v%2520Refugee%2520Appeals%2520Tribunal%2520%255B2011%255D%2520IEHC%2520198.pdf"><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">A.B. v. Refugee Appeals Tribunal and Minister for Justice, Equality and Law Reform</span></em></a><span data-dcnode-id="577" instrument_node="">, [2011] IEHC 198 [2008] 667 Ir. Jur. Rep. (5th May, 2011) (H.Ct.) (Ir.): Irish High Court granted leave to apply for judicial review where Refugees Appeals Tribunal had failed to conduct an adequate assessment of whether a former Taliban commander had personally participated in war crimes and crimes against humanity. The Court adopted the standard articulated in </span><em data-dcnode-id="573"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/LexUriServ/LexUriServ.do%3Furi%3DCELEX%3A62009CJ0057%3AEN%3AHTML"><span data-dcnode-id="576" instrument_node="">Joined Cases C-57/09 and C-101/09 Bundesrepublik Deutschland v. B und D</span></a><span data-dcnode-id="574" instrument_node="">&nbsp;</span></em><span data-dcnode-id="572" instrument_node="">[2010] ECR I-000, whereby there is a permissive presumption that any person who occupied a high position within a terrorist organization participated in the activities articulated in Article 1F of the 1951 Convention but authorities must nonetheless conduct an assessment to determine the role the individual personally played in carrying out such acts.</span></li><span data-dcnode-id="570" instrument_node="">
</span></ul><span data-dcnode-id="568" instrument_node="">
</span><h4 data-dcnode-id="565" style="text-align: justify;"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">PARTICULARLY SERIOUS CRIME</span></strong></h4><span data-dcnode-id="564" instrument_node="">
</span><ul data-dcnode-id="550" style="text-align: justify;"><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="552"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/sites/default/files/eoir/legacy/2012/08/14/3007.pdf"><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Matter of Carballe</span></em></a><span data-dcnode-id="559" instrument_node="">, 19 I&amp;N 357 (BIA 1986): BIA held that aliens who had been convicted of a particularly serious crime within the U.S. were presumptively dangerous to the community, denying withholding of removal to a Cuban national. </span><em data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">See also, </span></em><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//caselaw.findlaw.com/us-7th-circuit/1153263.html"><em data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Ali v. Achim</span></em></a><span data-dcnode-id="553" instrument_node="">, 468 F.3d 462 (7th Cir. 2006) (affirming BIA’s holding that the Attorney General may consider other crimes not listed in the INA to constitute a particularly serious crime for preclusion from withholding of removal, rejecting contrary opinion of UNHCR guidelines, denying withholding of removal to a Somali national.)</span></li><span data-dcnode-id="551" instrument_node="">
</span></ul><span data-dcnode-id="549" instrument_node="">
</span><ul data-dcnode-id="538" style="text-align: justify;"><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="540"><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legifrance.gouv.fr/affichJuriAdmin.do%3FoldAction%3DrechJuriAdmin%26idTexte%3DCETATEXT000022155468%26fastReqId%3D1028543881%26fastPos%3D1"><em data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Conseil d’etat [CE] [Council of State] April 7, 2010, Rec. Lebon 2010, IX-X, 319840 (Fr.)</span></em></a><span data-dcnode-id="544" instrument_node="">: Council of State granted asylum to Iraqi national who had participated in an honor killing while still a minor holding that the Commission des Recours des Réfugiés should have considered whether family pressure lowered his free will and whether his young age may have made him especially vulnerable to such pressure. (Decision is only available in French but an English summary can be found </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumlawdatabase.eu/en/case-law/france-ce-7-april-2010-mr-b-n%25C2%25B0-319840"><span data-dcnode-id="543" instrument_node="">here</span></a><span data-dcnode-id="541" instrument_node="">.)</span></li><span data-dcnode-id="539" instrument_node="">
</span></ul><span data-dcnode-id="537" instrument_node="">
</span><ul data-dcnode-id="529" style="text-align: justify;"><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="531"><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumlawdatabase.eu/sites/asylumlawdatabase.eu/files/aldfiles/UK_051%2520Judgment.pdf"><em data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">R (on the application of) ABC (a minor) (Afghanistan) v. Sec’y of State for the Home Dep’t</span></em></a><span data-dcnode-id="532" instrument_node=""> [2011] EWHC 2937 (Admin.) (U.K.): In determining whether there is material before the Home Secretary that justifies a serious belief that the individual who claims protection has committed a serious crime, the Home Secretary is required to look at all the circumstances of the case including: the law of England and the law of the country where the crime is said to have occurred, the individual factual matrix of the alleged crime including any potential defenses, the age and circumstances of the applicant, and the likely punishment if found guilty. To be considered a serious crime, there must be a high degree of culpability on the part of the alleged offender. Here, the Home Secretary erred in finding there were serious grounds for believing the applicant had committed a particularly serious crime when she had found that the applicant, a minor from Afghanistan, had likely committed the alleged crime unintentionally and failed to consider his age and circumstances.</span></li><span data-dcnode-id="530" instrument_node="">
</span></ul><span data-dcnode-id="528" instrument_node="">
