</span><h1 class="page-title" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Asylum &amp; the Rights of Refugees</span></h1><span data-dcnode-id="1576" instrument_node="">
</span></header><span data-dcnode-id="1573" instrument_node="">
</span><div class="entry-content clearfix" data-dcnode-id="451"><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1569" instrument_node="">
</span><pre data-dcnode-id="1518"><div class="no_bullets" data-dcnode-id="1520" id="toc_container"><p class="toc_title" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Contents</span></p><ul class="toc_list" data-dcnode-id="1521"><li data-dcnode-id="1551"><a data-dcnode-id="1565" href="#OVERVIEW"><span data-dcnode-id="1566" instrument_node="">OVERVIEW</span></a><ul data-dcnode-id="1552"><li data-dcnode-id="1562"><a data-dcnode-id="1563" href="#Legal_Protections"><span data-dcnode-id="1564" instrument_node="">Legal Protections</span></a></li><li data-dcnode-id="1559"><a data-dcnode-id="1560" href="#Who_Is_a_Refugee"><span data-dcnode-id="1561" instrument_node="">Who Is a Refugee?</span></a></li><li data-dcnode-id="1556"><a data-dcnode-id="1557" href="#Exceptions_Exclusion_and_Cessation_Clauses"><span data-dcnode-id="1558" instrument_node="">Exceptions: Exclusion and Cessation Clauses</span></a></li><li data-dcnode-id="1553"><a data-dcnode-id="1554" href="#What_Rights_Do_Refugees_Have"><span data-dcnode-id="1555" instrument_node="">What Rights Do Refugees Have?</span></a></li></ul></li><li data-dcnode-id="1538"><a data-dcnode-id="1549" href="#ENFORCEMENT_CLAIMING_ASYLUM"><span data-dcnode-id="1550" instrument_node="">ENFORCEMENT: CLAIMING ASYLUM</span></a><ul data-dcnode-id="1539"><li data-dcnode-id="1546"><a data-dcnode-id="1547" href="#Interpretation_of_Key_Terms"><span data-dcnode-id="1548" instrument_node="">Interpretation of Key Terms</span></a></li><li data-dcnode-id="1543"><a data-dcnode-id="1544" href="#National_Procedures_for_Claiming_Asylum"><span data-dcnode-id="1545" instrument_node="">National Procedures for Claiming Asylum</span></a></li><li data-dcnode-id="1540"><a data-dcnode-id="1541" href="#Refugee_Status_Determinations_by_the_UNHCR"><span data-dcnode-id="1542" instrument_node="">Refugee Status Determinations by the UNHCR</span></a></li></ul></li><li data-dcnode-id="1525"><a data-dcnode-id="1536" href="#SELECTED_CASE_LAW"><span data-dcnode-id="1537" instrument_node="">SELECTED CASE LAW</span></a><ul data-dcnode-id="1526"><li data-dcnode-id="1533"><a data-dcnode-id="1534" href="#Membership_in_a_Particular_Social_Group"><span data-dcnode-id="1535" instrument_node="">Membership in a Particular Social Group</span></a></li><li data-dcnode-id="1530"><a data-dcnode-id="1531" href="#Non-refoulement_and_Countries_of_Transit"><span data-dcnode-id="1532" instrument_node="">Non-refoulement and Countries of Transit</span></a></li><li data-dcnode-id="1527"><a data-dcnode-id="1528" href="#Exclusion_Clauses"><span data-dcnode-id="1529" instrument_node="">Exclusion Clauses</span></a></li></ul></li><li data-dcnode-id="1522"><a data-dcnode-id="1523" href="#ADDITIONAL_RESOURCES"><span data-dcnode-id="1524" instrument_node="">ADDITIONAL RESOURCES</span></a></li></ul></div><span data-dcnode-id="1519" instrument_node="">
</span></pre><span data-dcnode-id="1517" instrument_node="">
</span><h2 data-dcnode-id="1512" style="text-align: justify;"><span data-dcnode-id="1513" id="OVERVIEW"><span data-dcnode-id="1514" style="color: #003366;"><strong data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">OVERVIEW</span></strong></span></span></h2><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1500" style="text-align: justify;"><span data-dcnode-id="1510" instrument_node="">States have been granting protection to individuals and groups fleeing persecution for centuries; however, the modern refugee regime is largely the product of the second half of the twentieth century. Like international human rights law, modern refugee law has its origins in the aftermath of World War II as well as the refugee crises of the interwar years that preceded it. Article 14(1) of the </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/en/documents/udhr/index.shtml%23a14"><span data-dcnode-id="1509" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="1507" instrument_node=""> (UDHR), which was adopted in 1948, guarantees the right to seek and enjoy asylum in other countries. Subsequent regional human rights instruments have elaborated on this right, guaranteeing the “right to seek and be granted asylum in a foreign territory, in accordance with the legislation of the state and international conventions.” </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oas.org/en/iachr/mandate/Basics/convention.asp"><span data-dcnode-id="1506" instrument_node="">American Convention on Human Rights</span></a><span data-dcnode-id="1504" instrument_node="">, art. 22(7); </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.achpr.org/legalinstruments/detail%3Fid%3D49"><span data-dcnode-id="1503" instrument_node="">African [Banjul] Charter on Human and Peoples’ Rights</span></a><span data-dcnode-id="1501" instrument_node="">, art. 12(3).</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1491" style="text-align: justify;"><span data-dcnode-id="1498" instrument_node="">The controlling international convention on refugee law is the </span><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/en-us/protection/basic/3b66c2aa10/convention-protocol-relating-status-refugees.html"><span data-dcnode-id="1497" instrument_node="">1951 Convention relating to the Status of Refugees</span></a><span data-dcnode-id="1495" instrument_node=""> (1951 Convention) and its </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/en-us/protection/basic/3b66c2aa10/convention-protocol-relating-status-refugees.html"><span data-dcnode-id="1494" instrument_node="">1967 Optional Protocol relating to the Status of Refugees</span></a><span data-dcnode-id="1492" instrument_node=""> (1967 Optional Protocol). The 1951 Convention establishes the definition of a refugee as well as the principle of non-refoulement and the rights afforded to those granted refugee status. Although the 1951 Convention definition remains the dominant definition, regional human rights treaties have since modified the definition of a refugee in response to displacement crises not covered by the 1951 Convention.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488" style="text-align: justify;"><span data-dcnode-id="1489" instrument_node="">The 1951 Convention does not define how States parties are to determine whether an individual meets the definition of a refugee. Instead, the establishment of asylum proceedings and refugee status determinations are left to each State party to develop. This has resulted in disparities among different States as governments craft asylum laws based on their different resources, national security concerns, and histories with forced migration movements. Despite differences at the national and regional levels, the overarching goal of the modern refugee regime is to provide protection to individuals forced to flee their homes because their countries are unwilling or unable to protect them.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><h3 data-dcnode-id="1482" style="text-align: justify;"><span data-dcnode-id="1483" id="Legal_Protections"><span data-dcnode-id="1484" style="color: #006666;"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Legal Protections</span></strong></span></span></h3><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479" style="text-align: justify;"><span data-dcnode-id="1480" instrument_node="">International and regional instruments relating to refugees include:</span></p><span data-dcnode-id="1478" instrument_node="">
</span><ul data-dcnode-id="1400" style="text-align: justify;"><span data-dcnode-id="1477" instrument_node="">
</span><li data-dcnode-id="1474"><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/StatusOfRefugees.aspx"><span data-dcnode-id="1476" instrument_node="">1951 Convention relating to the Status of Refugees</span></a></li><span data-dcnode-id="1473" instrument_node="">
</span><li data-dcnode-id="1470"><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/en-us/protection/basic/3b66c2aa10/convention-protocol-relating-status-refugees.html"><span data-dcnode-id="1472" instrument_node="">1967 Optional Protocol relating to the Status of Refugees</span></a></li><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1465"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/en/documents/udhr/index.shtml%23a14"><span data-dcnode-id="1468" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="1466" instrument_node=""> (art. 14)</span></li><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1460"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cidh.org/Basicos/English/Basic2.American%2520Declaration.htm"><span data-dcnode-id="1463" instrument_node="">American Declaration on the Rights and Duties of Man</span></a><span data-dcnode-id="1461" instrument_node=""> (art. 27)</span></li><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1455"><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oas.org/en/iachr/mandate/Basics/convention.asp"><span data-dcnode-id="1458" instrument_node="">American Convention on Human Rights</span></a><span data-dcnode-id="1456" instrument_node=""> (art. 22)</span></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1450"><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/refworld/docid/3ae6b36ec.html"><span data-dcnode-id="1453" instrument_node="">Cartagena Declaration on Refugees, Colloquium on the International Protection of Refugees in Central America, Mexico and Panama</span></a><span data-dcnode-id="1451" instrument_node=""> (Cartagena Declaration)</span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1445"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.achpr.org/legalinstruments/detail%3Fid%3D49"><span data-dcnode-id="1448" instrument_node="">African [Banjul] Charter on Human and Peoples’ Rights</span></a><span data-dcnode-id="1446" instrument_node=""> (art. 12)</span></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1441"><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/45dc1a682.html"><span data-dcnode-id="1443" instrument_node="">OAU Convention Governing the Specific Aspects of the Refugee Problem in Africa</span></a></li><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1436"><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www1.umn.edu/humanrts/instree/loas2005.html"><span data-dcnode-id="1439" instrument_node="">Arab Charter on Human Rights</span></a><span data-dcnode-id="1437" instrument_node=""> (art. 28)</span></li><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1431"><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www1.umn.edu/humanrts/instree/cairodeclaration.html"><span data-dcnode-id="1434" instrument_node="">Cairo Declaration on Human Rights in Islam</span></a><span data-dcnode-id="1432" instrument_node=""> (art. 12)</span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1426"><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.echr.coe.int/Documents/Convention_ENG.pdf"><span data-dcnode-id="1429" instrument_node="">European Convention on Human Rights</span></a><span data-dcnode-id="1427" instrument_node=""> (arts. 2, 3, and 5)</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/LexUriServ/LexUriServ.do%3Furi%3DOJ%3AL%3A2003%3A050%3A0001%3A0010%3AEN%3APDF"><span data-dcnode-id="1424" instrument_node="">Council Regulation EC No 343/2003 of 18 February 2003 establishing the criteria and mechanisms for determining the Member State responsible for examining an asylum application lodged in one of the Member States by a third country national </span></a></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1418"><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A32004L0083%26from%3Den"><span data-dcnode-id="1420" instrument_node="">Council Directive 2004/83/EC of 29 April 2004 on minimum standards for the qualification and status of third country nationals or stateless persons as refugees or as persons who otherwise need international protection and the content of the protection granted </span></a></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1413"><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/CAT.aspx"><span data-dcnode-id="1416" instrument_node="">Convention Against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment</span></a><span data-dcnode-id="1414" instrument_node=""> (art. 3)</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1409"><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//au.int/en/treaties/african-union-convention-protection-and-assistance-internally-displaced-persons-africa"><span data-dcnode-id="1411" instrument_node="">African Union Convention for the Protection and Assistance of Internally Displaced Persons in Africa</span></a></li><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1402"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/en/professionalinterest/pages/crc.aspx"><span data-dcnode-id="1407" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="1405" instrument_node=""> (art. 22)</span><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">&nbsp;</span></strong></li><span data-dcnode-id="1401" instrument_node="">
</span></ul><span data-dcnode-id="1399" instrument_node="">
</span><h3 data-dcnode-id="1394"><span data-dcnode-id="1395" id="Who_Is_a_Refugee"><span data-dcnode-id="1396" style="color: #006666;"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Who Is a Refugee?</span></strong></span></span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1377" style="text-align: justify;"><span data-dcnode-id="1379" style="color: #000000;"><span data-dcnode-id="1392" instrument_node="">Article 1(A)(2) of the 1951 Convention defines a refugee as an individual who is </span><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">outside his or her country of nationality or habitual residence</span></strong><span data-dcnode-id="1389" instrument_node=""> who is</span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node=""> unable or unwilling to return</span></strong><span data-dcnode-id="1386" instrument_node=""> due to a </span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">well-founded fear of persecution</span></strong><span data-dcnode-id="1383" instrument_node=""> based on his or her </span><strong data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">race, religion, nationality, political opinion, or membership in a particular social group</span></strong><span data-dcnode-id="1380" instrument_node="">. Applying this definition, internally displaced persons (IDPs) – including individuals fleeing natural disasters and generalized violence, stateless individuals not outside their country of habitual residence or not facing persecution, and individuals who</span></span><span data-dcnode-id="1378" instrument_node=""> have crossed an international border fleeing generalized violence are not considered refugees under either the 1951 Convention or the 1967 Optional Protocol.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1365" style="text-align: justify;"><span data-dcnode-id="1375" instrument_node="">Countries in the Americas and Africa experiencing large-scale displacement as the result of armed conflicts found that the 1951 Convention definition did not go far enough in addressing the protection needs of their populations. Consequently, both Article 3 of the Cartagena Declaration and Article 1(2) of the 1969 OAU Convention extend refugee status to an individual who “owing to external aggression, occupation, foreign domination or events seriously disturbing public order in either part or the whole of his country of origin or nationality, is compelled to leave his place of habitual residence in order to seek refuge in another place outside his country of origin or nationality.” OAU Convention Governing the Specific Aspects of the Refugee Problem in Africa, art. 1(2); </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">accord </span></em><span data-dcnode-id="1372" instrument_node="">Cartagena Declaration on Refugees, Colloquium on the International Protection of Refugees in Central America, Mexico &amp; Panama, art. 3. The African Union is unique in having a convention that specifically addresses the protection needs of IDPs. </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//au.int/en/treaties/african-union-convention-protection-and-assistance-internally-displaced-persons-africa"><span data-dcnode-id="1371" instrument_node="">African Union Convention for the Protection and Assistance of Internally Displaced Persons in Africa</span></a><span data-dcnode-id="1369" instrument_node="">. Finally, the </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/cgi-bin/texis/vtx/home"><span data-dcnode-id="1368" instrument_node="">United Nations High Commissioner for Refugees</span></a><span data-dcnode-id="1366" instrument_node=""> (UNHCR) provides protection to IDPs and stateless individuals in addition to 1951 Convention refugees.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><h3 data-dcnode-id="1359" style="text-align: justify;"><span data-dcnode-id="1360" id="Exceptions_Exclusion_and_Cessation_Clauses"><span data-dcnode-id="1361" style="color: #006666;"><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Exceptions: Exclusion and Cessation Clauses</span></strong></span></span></h3><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1350" style="text-align: justify;"><span data-dcnode-id="1357" instrument_node="">The 1951 Convention places a number of restrictions on eligibility for refugee status. Article 1(D) excludes individuals who, at the time of the 1951 Convention, were already receiving protection or assistance from another UN organ or agency. Article 1(D) largely applied to Koreans receiving aid from the United Nations Korean Reconstruction Agency (UNKRA) and Palestinians receiving aid from the United Nations Relief and Works Agency for Palestine Refugees in the Near East (UNRWA) and continues to apply to the latter. UNHCR, </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/publ/PUBL/3d58e13b4.pdf"><span data-dcnode-id="1356" instrument_node="">Handbook on Procedures for Determining Refugee Status under the 1951 Convention &amp; the 1967 Protocol relating to the Status of Refugees</span></a><span data-dcnode-id="1354" instrument_node="">, para. 142. Although Palestinians living in areas where UNRWA operates are eligible for refugee status under the 1951 Convention. </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Id. </span></em><span data-dcnode-id="1351" instrument_node="">at&nbsp;para. 143.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347" style="text-align: justify;"><span data-dcnode-id="1348" instrument_node="">Additionally, Article 1(F) excludes individuals:</span></p><span data-dcnode-id="1346" instrument_node="">
</span><blockquote data-dcnode-id="1332"><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343" style="text-align: justify;"><span data-dcnode-id="1344" instrument_node="">with respect to whom there are serious reasons for considering that:</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340" style="text-align: justify;"><span data-dcnode-id="1341" instrument_node="">(a) he has committed a crime against peace, a war crime, or a crime against humanity, as defined in the international instruments drawn up to make provision in respect of such crimes;</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337" style="text-align: justify;"><span data-dcnode-id="1338" instrument_node="">(b) he has committed a serious non-political crime outside the country of refuge prior to his admission to that country as a refugee;</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334" style="text-align: justify;"><span data-dcnode-id="1335" instrument_node="">(c) he has been guilty of acts contrary to the purposes and principles of the United Nations.</span></p><span data-dcnode-id="1333" instrument_node="">
</span></blockquote><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1326" style="text-align: justify;"><span data-dcnode-id="1330" instrument_node="">Individuals who voluntarily avail themselves of the protection of their country of nationality or habitual residence or individuals who have received protection in a third country are also not considered refugees. </span><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">See </span></em><span data-dcnode-id="1327" instrument_node="">1951 Convention relating to the Status of Refugees, art. 1(C).</span></p><span data-dcnode-id="1325" instrument_node="">
</span><h3 data-dcnode-id="1320"><span data-dcnode-id="1321" id="What_Rights_Do_Refugees_Have"><span data-dcnode-id="1322" style="color: #006666;"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">What Rights Do Refugees Have?</span></strong></span></span></h3><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317" style="text-align: justify;"><span data-dcnode-id="1318" instrument_node="">Refugee law and international human rights law are closely intertwined; refugees are fleeing governments that are either unable or unwilling to protect their basic human rights. Additionally, in cases where the fear of persecution or threat to life or safety arises in the context of an armed conflict, refugee law also intersects with international humanitarian law.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><h4 data-dcnode-id="1313"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">NON-REFOULEMENT</span></strong></h4><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1294" style="text-align: justify;"><span data-dcnode-id="1311" instrument_node="">The basic principle of refugee law, non-refoulement refers to the obligation of States not to refoule, or return, a refugee to “the frontiers of territories where his life or freedom would be threatened on account of his race, religion, nationality, membership of a particular social group or political opinion.” </span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/en-us/1951-refugee-convention.html"><span data-dcnode-id="1310" instrument_node="">1951 Convention relating to the Status of Refugees</span></a><span data-dcnode-id="1308" instrument_node="">, art. 33(1). Non-refoulement is universally acknowledged as a human right. It is expressly stated in human rights treaties such as&nbsp;</span><span data-dcnode-id="1306" style="font-size: 15.2015px;"><span data-dcnode-id="1307" instrument_node="">Article 22(8) of the American Convention on Human Rights and&nbsp;</span></span><span data-dcnode-id="1295" style="font-size: 0.95em;"><span data-dcnode-id="1305" instrument_node="">Article 3 of the Convention against Torture, the latter of which was further interpreted in the </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/en/hrbodies/cat/pages/catindex.aspx"><span data-dcnode-id="1304" instrument_node="">Committee against Torture</span></a><span data-dcnode-id="1302" instrument_node="">‘s </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/Documents/HRBodies/CAT/CAT-C-GC-4_EN.pdf"><span data-dcnode-id="1301" instrument_node="">General Comment no. 4</span></a><span data-dcnode-id="1299" instrument_node="">. [</span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/2018/03/13/committee-against-torture-issues-new-general-comment-on-non-refoulement/%23gsc.tab%3D0"><span data-dcnode-id="1298" instrument_node="">IJRC</span></a><span data-dcnode-id="1296" instrument_node="">]</span></span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1277" style="text-align: justify;"><span data-dcnode-id="1292" instrument_node="">Additionally, both regional and domestic courts have interpreted the rights to life and freedom from torture to include a prohibition against refoulement. </span><em data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">See</span></em><span data-dcnode-id="1289" instrument_node=""> </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumlawdatabase.eu/sites/asylumlawdatabase.eu/files/aldfiles/UK_051%2520Judgment.pdf"><em data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">R (on the application of) ABC (a minor) (Afghanistan) v. Sec’y of State for the Home Dep’t</span></em></a><span data-dcnode-id="1285" instrument_node=""> [2011] EWHC 2937 (Admin.) (U.K.); ECtHR, </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hudoc.echr.coe.int/eng%23%257B%2522fulltext%2522%3A%255B%2522M.S.S.%2522%255D%2C%2522respondent%2522%3A%255B%2522BEL%2522%2C%2522GRC%2522%255D%2C%2522documentcollectionid2%2522%3A%255B%2522GRANDCHAMBER%2522%2C%2522CHAMBER%2522%255D%2C%2522itemid%2522%3A%255B%2522001-103050%2522%255D%257D"><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Case of M.S.S. v. Belgium and Greece</span></em></a><span data-dcnode-id="1281" instrument_node=""> [GC], no. 30696/09, ECHR 2011, Judgment of 21 January 2011. The principle of non-refoulement prohibits not only the removal of individuals but also the mass expulsion of refugees. </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">See, e.g.,</span></em><span data-dcnode-id="1278" instrument_node=""> African [Banjul] Charter on Human and Peoples’ Rights, art. 12(5).</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274" style="text-align: justify;"><span data-dcnode-id="1275" instrument_node="">There are two important restrictions to this principle. Persons who otherwise qualify as refugees may not claim protection under this principle where there are “reasonable grounds” for regarding the refugee as a danger to the national security of the host country or where the refugee, having been convicted of a particularly serious crime, constitutes a danger to the host community. 1951 Convention, art. 33(2).</span></p><span data-dcnode-id="1273" instrument_node="">
</span><h4 data-dcnode-id="1270"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">FREEDOM OF MOVEMENT</span></strong></h4><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node="">At the regional level, the rights to seek asylum and freedom of movement can be found within the text of the same article. </span><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">See </span></em><span data-dcnode-id="1265" instrument_node="">African [Banjul] Charter on Human and Peoples’ Rights, art. 12(1) and (3); American Convention on Human Rights, art. 22. The rights are closely related, since the inability to return to one’s country is the basis of an asylum claim while the ability to leave one’s country is a prerequisite for claiming refugee status under the 1951 Convention.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1258" style="text-align: justify;"><span data-dcnode-id="1262" instrument_node="">Freedom of movement, however, is also a key right for refugees within their host country. </span><em data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">See, e.g., </span></em><span data-dcnode-id="1259" instrument_node="">International Covenant on Civil and Political Rights, art. 12. Article 26 of the 1951 Convention provides that States shall afford refugees the right to choose their place of residence within the territory and to move freely within the State. Meanwhile, Article 28 obliges States parties to issue refugees travel documents permitting them to travel outside the State “unless compelling reasons of national security or public order otherwise require.”</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1246" style="text-align: justify;"><span data-dcnode-id="1256" instrument_node="">Freedom of movement is an especially important issue with regard to protracted refugee situations in countries with limited national resources and/or limited legal frameworks for protecting refugees who nonetheless host large refugee populations. In such countries, refugee warehousing – in which refugees are confined to refugee camps, thereby restricting their access to employment and education – is commonly practiced. U.S. Comm. for Refugees &amp; Immigrants, </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/publisher%2CUSCRI%2CANNUALREPORT%2C%2C%2C%2C0.html"><span data-dcnode-id="1255" instrument_node="">World Refugee Survey 2009</span></a><span data-dcnode-id="1253" instrument_node=""> (2009). Countries such as Kenya and Ethiopia specify in their national laws that the movement of refugees throughout the country may be restricted and that refugees may be limited to living in designated areas, namely refugee camps. </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/docid/44e04ed14.html"><span data-dcnode-id="1252" instrument_node="">National Refugee Proclamation, No. 409/2004, art. 21(2) (Eth.)</span></a><span data-dcnode-id="1250" instrument_node="">; </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1249" instrument_node="">Refugees Act (2014) Cap. 173 § 12(3) (Kenya)</span></a><span data-dcnode-id="1247" instrument_node="">.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><h4 data-dcnode-id="1242"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">RIGHT TO LIBERTY AND SECURITY OF THE PERSON</span></strong></h4><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1230" style="text-align: justify;"><span data-dcnode-id="1240" instrument_node="">The right to liberty and security of the person is important in the context of how asylum seekers are treated within the intended country of refuge. The national laws of several countries provide for the detention of asylum seekers at one point or another during the adjudication of their claims. </span><em data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">See, e.g.,</span></em><span data-dcnode-id="1237" instrument_node="">&nbsp;</span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gpo.gov/fdsys/pkg/CFR-2016-title8-vol1/pdf/CFR-2016-title8-vol1-sec235-3.pdf"><span data-dcnode-id="1236" instrument_node="">8 CFR § 235.3(c) (U.S.)</span></a><span data-dcnode-id="1234" instrument_node="">; </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1233" instrument_node="">Refugees Act (2014) Cap. 173 § 12(3) (Kenya)</span></a><span data-dcnode-id="1231" instrument_node="">.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1224" style="text-align: justify;"><span data-dcnode-id="1228" instrument_node="">The detention of asylum seekers is a contentious issue because of the conditions found in the detention facilities of several countries. This is particularly an issue in Greece, a country overwhelmed by the number of asylum seekers it receives, many of whom use Greece as a port of entry as they try to access other European countries. In order to clarify which State has responsibility for a particular asylum applicant, the Council of the European Union issued </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/LexUriServ/LexUriServ.do%3Furi%3DOJ%3AL%3A2003%3A050%3A0001%3A0010%3AEN%3APDF"><span data-dcnode-id="1227" instrument_node="">Council Regulation EC No. 343/2003 of 18 February 2003 establishing the criteria and mechanisms for determining the Member State responsible for examining an asylum application lodged in one of the Member States by a third country national</span></a><span data-dcnode-id="1225" instrument_node=""> (commonly known as the Dublin Regulation).</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1196" style="text-align: justify;"><span data-dcnode-id="1222" instrument_node="">Under the Dublin Regulation, the State through which the third country national first entered Europe is generally considered the State responsible for adjudicating that national’s asylum claim. </span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">See </span></em><span data-dcnode-id="1219" instrument_node="">Dublin Regulation, art. 10(1). As a result, many of these asylum seekers are returned to Greece to have their claims adjudicated. Human rights organizations including Amnesty International have reported on unsanitary and over-crowded conditions in Greek detention centers. </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnestyusa.org/sites/default/files/air12-report-english.pdf"><span data-dcnode-id="1218" instrument_node="">Amnesty International, Annual Report 2012 (2012)</span></a><span data-dcnode-id="1216" instrument_node="">, 157. Additionally, asylum seekers have claimed that they did not have access to a UNHCR representative or information about how to apply for asylum while in detention. </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Id.</span></em><span data-dcnode-id="1213" instrument_node=""> The </span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.echr.coe.int/ECHR/homepage_en"><span data-dcnode-id="1212" instrument_node="">European Court of Human Rights</span></a><span data-dcnode-id="1210" instrument_node=""> (ECtHR) has held in a number of cases that the conditions in the Greek detention centers violate individuals’ rights to humane treatment and dignity under the </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.echr.coe.int/Documents/Convention_ENG.pdf"><span data-dcnode-id="1209" instrument_node="">European Convention on Human Rights</span></a><span data-dcnode-id="1207" instrument_node="">. </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">See, e.g., </span></em><span data-dcnode-id="1204" instrument_node="">ECtHR, </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hudoc.echr.coe.int/sites/eng/Pages/search.aspx%23%257B%2522fulltext%2522%3A%255B%2522mss%2520v%2520belgium%2522%255D%2C%2522documentcollectionid%2522%3A%255B%2522COMMITTEE%2522%2C%2522DECISIONS%2522%2C%2522COMMUNICATEDCASES%2522%2C%2522CLIN%2522%2C%2522ADVISORYOPINIONS%2522%2C%2522REPORTS%2522%2C%2522RESOLUTIONS%2522%255D%2C%2522itemid%2522%3A%255B%2522001-103050%2522%255D%257D"><em data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">M.S.S. v. Belgium and Greece</span></em></a><span data-dcnode-id="1200" instrument_node=""> [GC], no. 30696/09, ECHR 2011, Judgment of 21 January 2011.</span><strong data-dcnode-id="1197"><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
</span></strong></p><span data-dcnode-id="1195" instrument_node="">
</span><h4 data-dcnode-id="1192"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">RIGHT TO FAMILY LIFE</span></strong></h4><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1157" style="text-align: justify;"><span data-dcnode-id="1189" style="text-align: justify;"><span data-dcnode-id="1190" instrument_node="">The family is seen as the “natural and fundamental group unit of society and is entitled to protection by society and the State.” </span></span><em data-dcnode-id="1187" style="text-align: justify;"><span data-dcnode-id="1188" instrument_node="">See, e</span></em><em data-dcnode-id="1185" style="text-align: justify;"><span data-dcnode-id="1186" instrument_node="">.g.,&nbsp;</span></em><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/en/professionalinterest/pages/ccpr.aspx" style="text-align: justify;"><span data-dcnode-id="1184" instrument_node="">International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="1181" style="text-align: justify;"><span data-dcnode-id="1182" instrument_node="">, art. 23(1). In respect of this right, a number of countries provide for the granting of derivative status to dependent relatives. Thus, where an individual is granted asylum, his or her dependent relatives will also receive protection through him or her. </span></span><em data-dcnode-id="1179" style="text-align: justify;"><span data-dcnode-id="1180" instrument_node="">See </span></em><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gpo.gov/fdsys/pkg/USCODE-2015-title8/pdf/USCODE-2015-title8-chap12-subchapII-partI-sec1158.pdf" style="text-align: justify;"><span data-dcnode-id="1178" instrument_node="">8 U.S.C. § 1158(b)(3)(A) (U.S.)</span></a><span data-dcnode-id="1175" style="text-align: justify;"><span data-dcnode-id="1176" instrument_node="">; </span></span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/immigration-rules/immigration-rules-part-11-asylum" style="text-align: justify;"><span data-dcnode-id="1174" instrument_node="">Immigration Rules, 2012, S.I. 2012/11, art. 339Q(iii) (U.K.)</span></a><span data-dcnode-id="1169" style="text-align: justify;"><span data-dcnode-id="1172" instrument_node="">; National Refugee Proclamation, No. 409/2004, art. 12 (Eth.); </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1171" instrument_node="">Refugees Act (2014) Cap. 173 § 15 (Kenya)</span></a></span><span data-dcnode-id="1165" style="text-align: justify;"><span data-dcnode-id="1168" instrument_node="">. However, should that individual’s refugee status be terminated, the status of dependent relatives will also be terminated. National Refugee Proclamation, No. 409/2004, art. 6(1) (Eth.); </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1167" instrument_node="">R</span></a></span><span data-dcnode-id="1164" instrument_node="">efugees Act (2014) Cap. 173 § 20(1) (Kenya)</span><span data-dcnode-id="1162" style="text-align: justify;"><span data-dcnode-id="1163" instrument_node="">. Consequently, these domestic laws do not preclude dependent relatives from making their own asylum claims.&nbsp;</span></span><span data-dcnode-id="1161" instrument_node="">National Refugee Proclamation, No. 409/2004, art. 12(5) (Eth.);&nbsp;</span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1160" instrument_node="">Refugees Act (2014) Cap. 173 § 15(4) (Kenya)</span></a><span data-dcnode-id="1158" instrument_node="">.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154" style="text-align: justify;"><span data-dcnode-id="1155" instrument_node="">The definition of a dependent relative, however, varies by the cultural notions of family prevalent in the State party. In the U.K., dependents are defined as the “spouse, civil partner, unmarried or same-sex partner, or minor child accompanying [the&nbsp;applicant]” while in Kenya, dependent relatives include the brother or sister of an applicant under the age of eighteen, “or any dependent grandparent, parent, grandchild or ward living in the same household as the refugee.” Immigration Rules, 2012, S.I. 2012/11, art. 349 (U.K.); Refugees Act (2014) Cap. 173 § 2 (Kenya).</span></p><span data-dcnode-id="1153" instrument_node="">
</span><h4 data-dcnode-id="1150"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">OTHER RIGHTS</span></strong></h4><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147" style="text-align: justify;"><span data-dcnode-id="1148" instrument_node="">The 1951 Convention also protects other rights of refugees, such as the rights to education, access to justice, employment, and other fundamental freedoms and privileges similarly enshrined in international and regional human rights treaties. In their enjoyment of some rights, such as access to the courts, refugees are to be afforded the same treatment as nationals while with others, such as wage-earning employment and property rights, refugees are to be afforded the same treatment as foreign nationals. 1951 Convention, art. 16 (refugees are to be granted equal access to the courts), art. 17 (refugees are to be afforded the same access to wage-earning employment as foreign nationals), art. 13 (refugees are to be afforded the same rights to moveable and immoveable property as foreign nationals).</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1138" style="text-align: justify;"><span data-dcnode-id="1145" instrument_node="">Despite these rights being protected in the 1951 Convention and under human rights treaties, refugees in various countries do not enjoy full or equal legal protection of fundamental privileges. Ethiopia, for example, made reservations to Article 22 (public education) and Article 17 (wage-earning employment), treating these articles as recommendations rather than obligations. </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/publisher%2CUSCRI%2CANNUALREPORT%2CETH%2C4a40d2a594%2C0.html"><span data-dcnode-id="1144" instrument_node="">U.S. Comm. for Refugees &amp; Immigrants, World Refugee Survey 2009: Ethiopia (2009)</span></a><span data-dcnode-id="1142" instrument_node="">. Although not a party to the 1951 Convention, Lebanon is host to a large population of refugees, predominately Palestinians. Restrictive labor and property laws in Lebanon prevent Palestinians from practicing professions requiring syndicate membership, such as law, medicine, and engineering, and from registering property. </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/world-report/2014/country-chapters/lebanon"><span data-dcnode-id="1141" instrument_node="">Human Rights Watch, World Report 2014: Lebanon (2014)</span></a><span data-dcnode-id="1139" instrument_node="">.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" id="ENFORCEMENT_CLAIMING_ASYLUM"><span data-dcnode-id="1134" style="color: #003366;"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">ENFORCEMENT: CLAIMING ASYLUM</span></strong></span></span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><em data-dcnode-id="1127"><span data-dcnode-id="1130" instrument_node="">NB: The countries profiled here were chosen because they have historically received a large number of asylum applications and/or played host to large refugee populations.</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
</span></em></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1117" style="text-align: justify;"><span data-dcnode-id="1124" instrument_node="">The adjudication of asylum claims is reserved to individual States. Although some States, namely those that comprise the Council of the European Union, have made an effort to adopt a uniform asylum system, international and regional bodies lack the jurisdiction to adjudicate individual asylum claims. </span><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">See </span></em><span data-dcnode-id="1121" instrument_node="">Dublin Regulation; </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A32004L0083%26from%3DEN"><span data-dcnode-id="1120" instrument_node="">Council Directive 2004/83/EC of 29 April 2004 on minimum standards for the qualification and status of third country nationals or stateless persons as refugees or as persons who otherwise need international protection and the content of the protection granted </span></a><span data-dcnode-id="1118" instrument_node="">(commonly known as the Qualification Directive). International and regional bodies do, however, adjudicate claims asserting violations of the human rights of refugees and asylum seekers.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114" style="text-align: justify;"><span data-dcnode-id="1115" instrument_node="">Despite differences across, and sometimes within, States, there are a number of commonalities between the asylum procedures of States who have national frameworks for granting refugee status. The following is a general and simplified explanation of these procedures.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><h3 data-dcnode-id="1108"><span data-dcnode-id="1109" id="Interpretation_of_Key_Terms"><span data-dcnode-id="1110" style="color: #006666;"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Interpretation of Key Terms</span></strong></span></span></h3><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105" style="text-align: justify;"><span data-dcnode-id="1106" instrument_node="">In order to understand how these procedures operate it is necessary to first identify how certain key terms in the 1951 Convention are defined within the domestic legal systems of particular States.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><ul data-dcnode-id="1078" style="text-align: justify;"><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1080"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Refugee&nbsp;</span></strong><span data-dcnode-id="1100" instrument_node="">– States parties to the 1951 Convention and/or the 1967 Optional Protocol have incorporated the Convention’s definition of a refugee into their domestic law. </span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">See, </span></em><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1101"><span data-dcnode-id="1097" instrument_node="">8 U.S.C. § 1101(a)(42)</span></a><span data-dcnode-id="1095" instrument_node=""> (U.S.); Immigration Rules, 2012, S.I. 2012/11, art. 334 (U.K.); </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ofpra.gouv.fr/sites/default/files/atoms/files/151231_ceseda.pdf"><span data-dcnode-id="1094" instrument_node="">CESDA L711-1 (Fr.)</span></a><span data-dcnode-id="1092" instrument_node="">&nbsp;(French); </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/page-18.html%23h-51"><span data-dcnode-id="1091" instrument_node="">The Immigration and Refugee Protection Act, S.C. 2001, ch. 27, art. 96 (Can.)</span></a><span data-dcnode-id="1089" instrument_node="">. States that are also party to the Cartagena Declaration or the 1969 OAU Convention have also incorporated those instruments’ broader definition of a refugee, recognizing individuals fleeing generalized violence and other breakdowns of public order. </span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">See, e.g., </span></em><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acnur.org/fileadmin/Documentos/BDL/2012/8604.pdf"><span data-dcnode-id="1086" instrument_node="">Decree No. 3301, May 6, 1992 (Ecuador)</span></a><span data-dcnode-id="1084" instrument_node="">&nbsp;(Spanish); </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="1083" instrument_node="">Refugees Act (2014) Cap. 173 § 3 (Kenya)</span></a><span data-dcnode-id="1081" instrument_node="">.</span></li><span data-dcnode-id="1079" instrument_node="">
</span></ul><span data-dcnode-id="1077" instrument_node="">
</span><ul data-dcnode-id="1070" style="text-align: justify;"><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1072"><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Asylum seeker&nbsp;</span></strong><span data-dcnode-id="1073" instrument_node="">– person within a State party who has applied for recognition as a refugee. If the asylum seeker is determined to meet the definition of a refugee they are granted asylum.</span></li><span data-dcnode-id="1071" instrument_node="">
</span></ul><span data-dcnode-id="1069" instrument_node="">
</span><ul data-dcnode-id="1053" style="text-align: justify;"><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1055"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Well-founded fear</span></strong><span data-dcnode-id="1065" instrument_node=""> – individual States have interpreted the 1951 Convention’s requirement of a well-founded fear of persecution to require asylum seekers to show that there is a reasonable possibility that they will suffer persecution if returned to their country of nationality or habitual residence. </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">See, e.g., </span></em><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol19/3028.pdf"><em data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Matter of Mogharrabi</span></em></a><span data-dcnode-id="1059" instrument_node="">, 19 I&amp;N Dec. 439 (BIA 1987). This is considered to be both an objective and subjective standard. Although well-founded fear refers to a future threat of persecution, individuals who have faced persecution in the past are presumed to have a well-founded fear. </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">See, e.g., </span></em><span data-dcnode-id="1056" instrument_node="">Immigration Rules, 2012, S.I. 2012/11, art. 339K (U.K.).</span></li><span data-dcnode-id="1054" instrument_node="">
</span></ul><span data-dcnode-id="1052" instrument_node="">
</span><ul data-dcnode-id="1045" style="text-align: justify;"><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Persecution</span></strong><span data-dcnode-id="1048" instrument_node=""> – persecution is not defined in the 1951 Convention or the 1967 Optional Protocol. In an attempt to provide guidance on what constitutes persecution, the Council of the European Union included a non-exhaustive list in the Qualification Directive of acts that could be considered persecution such as:</span></li><span data-dcnode-id="1046" instrument_node="">
</span></ul><span data-dcnode-id="1044" instrument_node="">
</span><blockquote data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041" style="text-align: justify;"><span data-dcnode-id="1042" instrument_node="">acts of physical or mental violence, including acts of sexual violence; legal, administrative, police, and/or judicial measures which are in themselves discriminatory or which are implemented in a discriminatory manner; prosecution or punishment, which is disproportionate or discriminatory; denial of judicial redress resulting in a disproportionate or discriminatory punishment; prosecution or punishment for refusal to perform military service in a conflict, where performing military service would include crimes or acts falling under the exclusion clauses as set out in Article 12(2); acts of a gender-specific or child-specific nature.</span></p><span data-dcnode-id="1040" instrument_node="">
</span></blockquote><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1027" style="text-align: justify; padding-left: 30px;"><span data-dcnode-id="1037" instrument_node="">Qualification Directive, art. 9(2). The persecution at issue also does not need to have been committed by a State actor; persecutory acts committed by non-state actors may qualify under the 1951 Convention where the State is unwilling or unable to protect the individual claiming refugee status. </span><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">See,</span></em><span data-dcnode-id="1034" instrument_node=""> </span><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">e.g., id.</span></em><span data-dcnode-id="1031" instrument_node="">&nbsp;at</span><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1028" instrument_node="">art. 6.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="1014" style="text-align: justify;"><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1016"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">On account of</span></strong><span data-dcnode-id="1022" instrument_node=""> – there must be a causal nexus between one of the five grounds and the persecutory act. In practice, this means that applicants must show that one of the protected grounds was or will be at least one central reason for the persecution. </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">See, e.g., </span></em><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1158"><span data-dcnode-id="1019" instrument_node="">8 U.S.C. § 1158(b)(1)(B)(i)</span></a><span data-dcnode-id="1017" instrument_node=""> (U.S.).</span></li><span data-dcnode-id="1015" instrument_node="">
</span></ul><span data-dcnode-id="1013" instrument_node="">
</span><ul data-dcnode-id="1003" style="text-align: justify;"><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1005"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Race, religion, nationality</span></strong><span data-dcnode-id="1009" instrument_node=""> – the asylum applicant need not actually possess the racial, religious, or national characteristic in question provided that characteristic was attributed to the asylum seeker by the persecutor and is the reason for the persecution </span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">See, e.g., </span></em><span data-dcnode-id="1006" instrument_node="">Qualification Directive, art. 10(2).</span></li><span data-dcnode-id="1004" instrument_node="">
</span></ul><span data-dcnode-id="1002" instrument_node="">
</span><ul data-dcnode-id="981" style="text-align: justify;"><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="983"><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Political opinion</span></strong><span data-dcnode-id="998" instrument_node=""> – like the above three grounds, political opinion may be imputed to the asylum seeker. There is some debate within the U.S. as to whether neutrality may qualify as a political opinion for the purposes of obtaining asylum. </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Compare </span></em><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justice.gov/eoir/vll/intdec/vol19/2986.pdf"><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Matter of Acosta</span></em></a><span data-dcnode-id="992" instrument_node="">, 19 I&amp;N Dec. 211 (BIA 1985) (no persecution based on political opinion where refusal to join work stoppage resulted in threats and violence from militants because refusal was motivated by desire to earn wages) </span><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">with </span></em><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/docid/4805fd752.html"><em data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Bolanos-Hernandez v. I.N.S</span></em></a><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">.</span></em><span data-dcnode-id="984" instrument_node="">, 767 F.2d 1277, 1284-5 (9th Cir. 1985) (persecution based on political opinion where former military member refused to join guerrillas because he wished to remain neutral).</span></li><span data-dcnode-id="982" instrument_node="">
</span></ul><span data-dcnode-id="980" instrument_node="">
</span><ul data-dcnode-id="967" style="text-align: justify;"><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="969"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Membership in a particular social group</span></strong><span data-dcnode-id="976" instrument_node=""> – there is still a lack of consensus as to what constitutes a particular social group and whether classes of persons not included in the 1951 Convention who nonetheless face persecution, such as women and homosexuals, fall within this category. (See </span><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Selected Case Law</span></strong><span data-dcnode-id="973" instrument_node="">, below) The Council of the European Union has stated that persons may be considered to constitute a particular social group when they share a common immutable characteristic, that is, something innate to their being or so fundamental to their being that they cannot be expected to change it, and have a distinct identity within their country of nationality or habitual residence because they are perceived as being different by that society. Qualification Directive, art. 10(1)(d) (applying standard articulated in </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Matter of Acosta</span></em><span data-dcnode-id="970" instrument_node="">, 19 I&amp;N Dec. 211 (BIA 1985) (U.S.)).</span></li><span data-dcnode-id="968" instrument_node="">
</span></ul><span data-dcnode-id="966" instrument_node="">
</span><ul data-dcnode-id="952" style="text-align: justify;"><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="954"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Particularly serious crime</span></strong><span data-dcnode-id="962" instrument_node=""> – the definition of a particularly serious crime varies by country. The UNHCR considers a particularly serious crime to be a capital crime or a very grave punishable act. The UNHCR recommends balancing the severity of the crime against the severity of the persecution feared but this balancing test has not been widely adopted. </span><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">See</span></em><span data-dcnode-id="959" instrument_node=""> </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//caselaw.findlaw.com/us-7th-circuit/1153263.html"><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Ali v. Achim</span></em></a><span data-dcnode-id="955" instrument_node="">, 468 F.3d 462 (7th Cir. 2006) (rejecting UNHCR balancing test). In the U.S., 8 U.S.C. § 1158(b)(2)(B)(i), provides that an aggravated felony shall constitute a particularly serious crime. Under the statute, aggravated felonies may include felonies for which the potential sentence is imprisonment for one year or more. (For withholding of removal, the potential sentence must be for at least five years.)</span></li><span data-dcnode-id="953" instrument_node="">
</span></ul><span data-dcnode-id="951" instrument_node="">
</span><ul data-dcnode-id="934" style="text-align: justify;"><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="936"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">War crimes, Crimes against Humanity</span></strong><span data-dcnode-id="947" instrument_node=""> – States apply the definition provided in international humanitarian law, as articulated in Articles 7 and 8 of the </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icc-cpi.int/nr/rdonlyres/ea9aeff7-5752-4f84-be94-0a655eb30e16/0/rome_statute_english.pdf"><span data-dcnode-id="946" instrument_node="">Rome Statute</span></a><span data-dcnode-id="944" instrument_node=""> of the International Criminal Court. </span><em data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">See</span></em><span data-dcnode-id="941" instrument_node="">&nbsp;</span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumlawdatabase.eu/sites/asylumlawdatabase.eu/files/aldfiles/B.%2520v%2520Refugee%2520Appeals%2520Tribunal%2520%255B2011%255D%2520IEHC%2520198.pdf"><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">A.B. v. Refugee Appeals Tribunal and Minister for Justice, Equality and Law Reform</span></em></a><span data-dcnode-id="937" instrument_node=""> [2011] IEHC 198 (H. Ct.) (Ir.).</span></li><span data-dcnode-id="935" instrument_node="">
</span></ul><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="928" style="text-align: justify;"><span data-dcnode-id="929" id="National_Procedures_for_Claiming_Asylum"><span data-dcnode-id="930" style="color: #006666;"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">National Procedures for Claiming Asylum</span></strong></span></span></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925" style="text-align: justify;"><span data-dcnode-id="926" instrument_node="">Typically, refugee status determinations or asylum adjudications are conducted by an official from a designated government department or agency. These officials should have a solid knowledge of refugee law. In most cases, the official will interview the asylum seeker to evaluate his or her evidence and credibility. The burden is on the asylum seeker to prove that he or she meets the definition of a refugee and asylum seekers are encouraged to supply as much supporting evidence as possible. Supporting evidence may take the form of country reports, NGO reports, news articles, affidavits, or the in-person testimony of witnesses.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="906" style="text-align: justify;"><span data-dcnode-id="923" instrument_node="">In accordance with Article 31 of the 1951 Convention, States parties provide in their domestic law that an applicant’s irregular entry (i.e., without an entry visa or other documentation) will not have a negative effect on the asylum seeker’s application. </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">See, e.g., </span></em><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="920" instrument_node="">Refugees Act (2014) Cap. 173 § 11(3) (Kenya)</span></a><em data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">.</span></em><span data-dcnode-id="916" instrument_node="">&nbsp;Some States, however, do place time restraints on how many days after entry into their country an asylum seeker may make an application. </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Compare</span></em><span data-dcnode-id="913" instrument_node=""> </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1158"><span data-dcnode-id="912" instrument_node="">8 U.S.C. § 1158(a)(2)(B)</span></a><span data-dcnode-id="910" instrument_node=""> (U.S.) (imposing a one-year filing deadline on asylum applications, although there are some limited exceptions for extraordinary or changed circumstances) </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">with </span></em><span data-dcnode-id="907" instrument_node="">National Refugee Proclamation, No. 409/2004, art. 13 (Eth.) (stating that asylum applicants shall apply within fifteen days of entry into Ethiopia). In addition to making a claim at the border, individuals in deportation proceedings may also raise an asylum claim, provided their claim is timely.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="883" style="text-align: justify;"><span data-dcnode-id="904" instrument_node="">If the official finds that the asylum seeker has a well-founded fear of persecution based on one of the five grounds, he or she can grant the applicant asylum. Individuals granted asylum receive a residence permit for themselves as well as one for any dependent relatives. </span><em data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">See, e.g., </span></em><span data-dcnode-id="901" instrument_node="">The Immigration and Refugee Protection Act, S.C. 2001, ch. 27, art. 95(1)(a) (Can.); 8 U.S.C. § 1158(b)(3)(A) (U.S.). States provide that where the Government denies an asylum application, the asylum seeker is to receive an explanation of the reasons for the denial. </span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">See,</span></em><span data-dcnode-id="898" instrument_node=""> </span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">e.g., </span></em><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenyalaw.org/lex//actview.xql%3Factid%3DCAP.%2520173"><span data-dcnode-id="895" instrument_node="">Refugees Act (2014) Cap. 173 § 11(6) (Kenya)</span></a><span data-dcnode-id="893" instrument_node="">.&nbsp;Asylum seekers have a right to appeal their negative decision. Generally, an applicant may not be removed unless they have exhausted all of their available remedies. </span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">See </span></em><span data-dcnode-id="890" instrument_node="">CESEDA, L731-3 (Fr.); </span><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">but see, </span></em><span data-dcnode-id="887" instrument_node="">Human Rights Watch, </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hrw.org/news/2010/09/12/france-amend-immigration-bill-protect-asylum-seekers"><span data-dcnode-id="886" instrument_node="">France: Amend Immigration Bill to Protect Asylum Seekers</span></a><span data-dcnode-id="884" instrument_node="">&nbsp;(noting that under French law appeal does not suspend expulsion for those placed in the fast-track procedure).</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="874" style="text-align: justify;"><span data-dcnode-id="881" instrument_node="">Individuals who are ineligible for asylum may nonetheless be eligible for more limited forms of protection. These include protection under Article 3 of the Convention against Torture, which forbids States parties from extraditing or returning an individual to a country where they risk being tortured or subjected to cruel, inhuman, or degrading treatment or punishment. States also grant complementary forms of protection, such as withholding of removal, subsidiary protection, and Temporary Protected Status to individuals who do not meet the definition of a refugee but whose life or freedom would be in danger if returned to their country of nationality or country of habitual residence. </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1254a"><span data-dcnode-id="880" instrument_node="">8 U.S.C. § 1254</span></a><span data-dcnode-id="878" instrument_node="">, </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1231"><span data-dcnode-id="877" instrument_node="">1231(b)(3) (U.S.);</span></a><span data-dcnode-id="875" instrument_node=""> C.E.S.D.A. L712-1 (Fr.).</span></p><span data-dcnode-id="873" instrument_node="">
</span><h3 data-dcnode-id="868"><span data-dcnode-id="869" id="Refugee_Status_Determinations_by_the_UNHCR"><span data-dcnode-id="870" style="color: #006666;"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Refugee Status Determinations by the UNHCR</span></strong></span></span></h3><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="859" style="text-align: justify;"><span data-dcnode-id="866" instrument_node="">There are a number of States who host large refugee populations but who are either not a party to the 1951 Convention and 1967 Optional Protocol or who do not have laws or policies in place to address asylum claims. These States include a large number of countries in the Middle East and Asia with significant refugee populations, including Egypt, Jordan, India, Malaysia, Lebanon, and Pakistan. </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">See</span></em><span data-dcnode-id="863" instrument_node="">&nbsp;UNHCR, </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/en-us/protection/basic/3b73b0d63/states-parties-1951-convention-its-1967-protocol.html"><span data-dcnode-id="862" instrument_node="">States Parties to the 1951 Convention Relating to the Status of Refugees and the 1967 Protocol.</span></a><span data-dcnode-id="860" instrument_node="">&nbsp;In such cases, refugee status determinations are carried out by field offices of the United Nations High Commissioner for Refugees (UNHCR).</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="838" style="text-align: justify;"><span data-dcnode-id="857" instrument_node="">The refugee status determination (RSD) conducted by the UNHCR is similar to asylum adjudications conducted by States. After registering with the </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/pages/4a324fcc6.html"><span data-dcnode-id="856" instrument_node="">local UNHCR office</span></a><span data-dcnode-id="854" instrument_node="">, asylum seekers meet with an Eligibility Officer who examines their application and supporting documentation. All asylum seekers have the right to an individual in-person interview and may be accompanied by a legal representative. </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/refworld/docid/42d66dd84.html"><span data-dcnode-id="853" instrument_node="">UNHCR, Procedural Standards for Refugee Status Determination under UNHCR’s Mandate 4.3.1-3 (2003). </span></a><span data-dcnode-id="851" instrument_node="">Asylum seekers are permitted to bring witnesses, but UNHCR policy is that the testimony of witnesses should not be given in the presence of the applicant and should never be given in the presence of other witnesses or third parties. </span><em data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Id. </span></em><span data-dcnode-id="848" instrument_node="">at 4.3.9. All applicants are informed in writing of the Eligibility Officer’s decision. </span><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Id. </span></em><span data-dcnode-id="845" instrument_node="">at 6.1. Where the eligibility officer has decided not to award refugee status, the applicant is entitled to an explanation of the negative determination. </span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Id. </span></em><span data-dcnode-id="842" instrument_node="">Applicants who have not been granted refugee status are entitled to an appeal. </span><em data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Id. </span></em><span data-dcnode-id="839" instrument_node="">at 7.1.1.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="824" style="text-align: justify;"><span data-dcnode-id="836" instrument_node="">All individuals granted refugee status as well as derivative relatives are issued a UNHCR Refugee Certificate which stipulates that the holder is a refugee and is therefore entitled to protection, including protection from refoulement. </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Id. </span></em><span data-dcnode-id="833" instrument_node="">at 8.1. Unfortunately, in practice, issuance of a Refugee Certificate does not always guarantee an individual’s ability to work or protect them from being detained in their host country. </span><em data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">See</span></em><span data-dcnode-id="830" instrument_node="">&nbsp;UNHCR, </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reporting.unhcr.org/node/2532%3Fy%3D2016%23year"><span data-dcnode-id="829" instrument_node="">Global Focus: Malaysia 2016 Operational Context</span></a><span data-dcnode-id="827" instrument_node="">.</span><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="816" style="text-align: justify;"><span data-dcnode-id="822" instrument_node="">UNHCR normally determines refugee status on an individual basis; however, the agency will afford prima facie refugee status to groups in cases where a large group of individuals has been displaced and the need for protection is especially urgent. UNHCR,&nbsp;</span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3d464c954.html"><span data-dcnode-id="821" instrument_node="">Resettlement Handbook, ch. 3, at 77 (2011)</span></a><span data-dcnode-id="819" instrument_node="">. A recent example of this was the UNHCR’s 2007 decision to give prima facie refugee status to asylum seekers from southern and central Iraq. </span><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Id.</span></em></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813" style="text-align: justify;"><span data-dcnode-id="814" instrument_node="">In addition to conducting RSDs and providing assistance to refugees and other persons of concern, UNHCR facilitates resettlement to third countries where voluntary repatriation or local integration is not feasible.</span></p><span data-dcnode-id="812" instrument_node="">
</span><h2 data-dcnode-id="807" style="text-align: justify;"><span data-dcnode-id="808" id="SELECTED_CASE_LAW"><span data-dcnode-id="809" style="color: #003366;"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">SELECTED CASE LAW</span></strong></span></span></h2><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804" style="text-align: justify;"><span data-dcnode-id="805" instrument_node="">The following cases concern some of the most contentious issues in refugee law today.</span></p><span data-dcnode-id="803" instrument_node="">
</span><h3 data-dcnode-id="798"><span data-dcnode-id="799" id="Membership_in_a_Particular_Social_Group"><span data-dcnode-id="800" style="color: #006666;"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Membership in a Particular Social Group</span></strong></span></span></h3><span data-dcnode-id="797" instrument_node="">
