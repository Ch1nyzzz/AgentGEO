</span><div class="titles" data-dcnode-id="1756" id="what-is-asylum"><span data-dcnode-id="1763" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">
</span><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">What is asylum?</span></strong><span data-dcnode-id="1759" instrument_node=""> </span></h2><span data-dcnode-id="1757" instrument_node="">
</span></div><span data-dcnode-id="1755" instrument_node="">
</span><div class="content-area" data-dcnode-id="1747"><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Asylum is the international protection granted by countries to individuals fleeing their own country due to fear of persecution.&nbsp;When someone asks for asylum in the UK, they are called an asylum seeker. If the government grants them asylum, they are given refugee status.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">A refugee is allowed to remain in the UK for 5 years. After this time, they are entitled to apply to settle in the UK.</span></p><span data-dcnode-id="1748" instrument_node="">
</span></div><span data-dcnode-id="1746" instrument_node="">
</span></div><span data-dcnode-id="1744" instrument_node="">
</span></div><span data-dcnode-id="1742" instrument_node="">
</span></div><span data-dcnode-id="1739" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1671"><span data-dcnode-id="1738" instrument_node="">
</span><div class="container container--col-1-1" data-dcnode-id="1673"><span data-dcnode-id="1737" instrument_node="">
</span><div class="block col-1-1__block block--1" data-dcnode-id="1702"><span data-dcnode-id="1736" instrument_node="">
</span><div class="titles" data-dcnode-id="1728" id="who"><span data-dcnode-id="1735" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1730"><span data-dcnode-id="1734" instrument_node="">
</span><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Who is eligible to seek asylum?</span></strong><span data-dcnode-id="1731" instrument_node=""> </span></h2><span data-dcnode-id="1729" instrument_node="">
</span></div><span data-dcnode-id="1727" instrument_node="">
</span><div class="content-area" data-dcnode-id="1704"><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">You can seek asylum in the UK if you have left your country of residence and are unable to return due to a fear of persecution because of your:</span></p><span data-dcnode-id="1723" instrument_node="">
</span><ul data-dcnode-id="1706"><span data-dcnode-id="1722" instrument_node="">
</span><li data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Race</span></li><span data-dcnode-id="1719" instrument_node="">
</span><li data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Religion</span></li><span data-dcnode-id="1716" instrument_node="">
</span><li data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Nationality</span></li><span data-dcnode-id="1713" instrument_node="">
</span><li data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Political opinion</span></li><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Membership of a particular social group</span></li><span data-dcnode-id="1707" instrument_node="">
</span></ul><span data-dcnode-id="1705" instrument_node="">
</span></div><span data-dcnode-id="1703" instrument_node="">
</span></div><span data-dcnode-id="1701" instrument_node="">
</span><div class="block col-1-1__block block--2" data-dcnode-id="1675"><span data-dcnode-id="1700" instrument_node="">
</span><div class="titles" data-dcnode-id="1692" id="how"><span data-dcnode-id="1699" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node="">
</span><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">How to claim asylum</span></strong><span data-dcnode-id="1695" instrument_node=""> </span></h2><span data-dcnode-id="1693" instrument_node="">
</span></div><span data-dcnode-id="1691" instrument_node="">
</span><div class="content-area" data-dcnode-id="1677"><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Asylum seekers should apply for asylum immediately upon entering the country. If you wait to apply for asylum, your application is more likely to be denied.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">To claim asylum in the UK upon entry, you will need to inform a member of the UK Border Force, they are usually uniformed.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">If you are picked up by a member of UK immigration when entering the UK, then you should tell them of your wish to seek asylum immediately.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">If you are already in the UK and you wish to seek asylum then you will need to phone and make an appointment with the Screening Unit in Croydon.</span></p><span data-dcnode-id="1678" instrument_node="">
</span></div><span data-dcnode-id="1676" instrument_node="">
</span></div><span data-dcnode-id="1674" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">
</span></div><span data-dcnode-id="1669" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1569"><span data-dcnode-id="1668" instrument_node="">
</span><div class="container container--col-1-1" data-dcnode-id="1571"><span data-dcnode-id="1667" instrument_node="">
</span><div class="block col-1-1__block block--1" data-dcnode-id="1636"><span data-dcnode-id="1666" instrument_node="">
</span><div class="titles" data-dcnode-id="1658" id="process"><span data-dcnode-id="1665" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1660"><span data-dcnode-id="1664" instrument_node="">
</span><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">The UK asylum process</span></strong><span data-dcnode-id="1661" instrument_node=""> </span></h2><span data-dcnode-id="1659" instrument_node="">
</span></div><span data-dcnode-id="1657" instrument_node="">
</span><div class="content-area" data-dcnode-id="1638"><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">The asylum process in the UK varies depending on your circumstances. Once you have made your claim you will have a screening interview and will be assigned a caseworker.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">You will then usually have a 2</span><sup data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">nd</span></sup><span data-dcnode-id="1649" instrument_node=""> interview known as the Substantive Interview. After this, your case will be reviewed and a decision will be made.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">You may be asked to do more interviews or submit more evidence during the asylum process.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1640"><img alt="how to claim asylum in the UK" class="size-medium wp-image-188175 alignleft lazyloaded" data-dcnode-id="1643" data-ll-status="loaded" height="192" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manchester-immigrationlawyer.co.uk/app/uploads/2021/07/Refugees-cropped-540x346.jpg&amp;raw" srcset="/app/uploads/2021/07/Refugees-cropped-540x346.jpg 540w, /app/uploads/2021/07/Refugees-cropped-270x173.jpg 270w, /app/uploads/2021/07/Refugees-cropped-600x384.jpg 600w, /app/uploads/2021/07/Refugees-cropped.jpg 637w" width="300"><noscript data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">&lt;img class="size-medium wp-image-188175 alignleft" src="https://manchester-immigrationlawyer.co.uk/app/uploads/2021/07/Refugees-cropped-540x346.jpg" alt="how to claim asylum in the UK" width="300" height="192" srcset="/app/uploads/2021/07/Refugees-cropped-540x346.jpg 540w, /app/uploads/2021/07/Refugees-cropped-270x173.jpg 270w, /app/uploads/2021/07/Refugees-cropped-600x384.jpg 600w, /app/uploads/2021/07/Refugees-cropped.jpg 637w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="1639" instrument_node="">
</span></div><span data-dcnode-id="1637" instrument_node="">
</span></div><span data-dcnode-id="1635" instrument_node="">
</span><div class="block col-1-1__block block--2" data-dcnode-id="1573"><span data-dcnode-id="1634" instrument_node="">
</span><div class="titles" data-dcnode-id="1626" id="screen"><span data-dcnode-id="1633" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">
</span><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The screening interview</span></strong><span data-dcnode-id="1629" instrument_node=""> </span></h2><span data-dcnode-id="1627" instrument_node="">
</span></div><span data-dcnode-id="1625" instrument_node="">
</span><div class="content-area" data-dcnode-id="1575"><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">If you claim asylum at your port of entry to the UK, you will usually be interviewed by an immigration officer on the same day.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">If you wait before claiming asylum when you’ve entered the UK, you will usually be interviewed at a screening unit in Croydon, South London.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">You won’t have to go into detail about why you’re seeking asylum, this may be done at a later date, but you will be asked some basic questions about yourself and your claim for asylum, these include:</span></p><span data-dcnode-id="1615" instrument_node="">
</span><ul data-dcnode-id="1577"><span data-dcnode-id="1614" instrument_node="">
</span><li data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Personal details (language, name, gender, ethnicity etc.)</span></li><span data-dcnode-id="1611" instrument_node="">
</span><li data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Whether you believe you are at risk of persecution if you had to leave the UK</span></li><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The country you claim to fear persecution from</span></li><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Whether you have a place to stay</span></li><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Whether you have any dependents in the UK</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Details about how you travelled to the UK</span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Details about what ID you have (passport, driving license etc)</span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Whether you have applied for asylum in the UK before</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Medical details</span></li><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Brief details about your decision to apply for asylum in the UK</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Whether you have any criminal history</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">If you have any supporting documents you wish to submit</span></li><span data-dcnode-id="1578" instrument_node="">
</span></ul><span data-dcnode-id="1576" instrument_node="">
</span></div><span data-dcnode-id="1574" instrument_node="">
</span></div><span data-dcnode-id="1572" instrument_node="">
</span></div><span data-dcnode-id="1570" instrument_node="">
</span></div><span data-dcnode-id="1567" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1466"><span data-dcnode-id="1566" instrument_node="">
</span><div class="container container--col-1-1" data-dcnode-id="1468"><span data-dcnode-id="1565" instrument_node="">
</span><div class="block col-1-1__block block--1" data-dcnode-id="1524"><span data-dcnode-id="1564" instrument_node="">
</span><div class="titles" data-dcnode-id="1556" id="sub"><span data-dcnode-id="1563" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">
</span><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Substantive interview</span></strong><span data-dcnode-id="1559" instrument_node=""> </span></h2><span data-dcnode-id="1557" instrument_node="">
</span></div><span data-dcnode-id="1555" instrument_node="">
</span><div class="content-area" data-dcnode-id="1526"><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">After your screening interview, you will usually have a second interview, this is often called the substantive interview. You’ll receive a letter telling you where and when to attend.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><h3 data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">During the asylum substantive interview</span></h3><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">During the asylum interview you will usually be interviewed alone. Information you disclose will be kept confidential and you will be provided with an interpreter if you need one.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The substantive interview is when the Home Office interviewer will seek to find out in detail your reasons for claiming asylum in the UK. Some of the questions may be difficult to answer but it’s important for your claim that you try to be as detailed as possible. The&nbsp;substantive interview&nbsp;is your chance to tell the Home Office everything about your case.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">You should explain how you were persecuted in your country and why you’re afraid to go back.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">You should bring any evidence you have of the persecution you faced as well as your birth certificate, passport and medical records if you have them.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">The asylum substantive interview is the main interview in the UK asylum process and as such, can last several hours as you will be asked lots of questions. You are likely to be asked the same question several times in different ways.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><h3 data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">After the asylum substantive interview</span></h3><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">After your substantive interview, the Home Office will consider all the information you provided at both the initial screening interview and the substantive interview. They will also look at the information they have about your country, and then make a decision about whether they believe you need protection in the UK.</span></p><span data-dcnode-id="1527" instrument_node="">
</span></div><span data-dcnode-id="1525" instrument_node="">
</span></div><span data-dcnode-id="1523" instrument_node="">
</span><div class="block col-1-1__block block--2" data-dcnode-id="1470"><span data-dcnode-id="1522" instrument_node="">
</span><div class="titles" data-dcnode-id="1514" id="dec"><span data-dcnode-id="1521" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1516"><span data-dcnode-id="1520" instrument_node="">
</span><strong data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">The decision</span></strong><span data-dcnode-id="1517" instrument_node=""> </span></h2><span data-dcnode-id="1515" instrument_node="">
</span></div><span data-dcnode-id="1513" instrument_node="">
</span><div class="content-area" data-dcnode-id="1472"><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">The asylum process in the UK is often lengthy, the time it’ll take from claiming asylum to receiving a decision varies from case to case depending on the complexities of your claim.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">The government says that you’ll usually get a decision within 6 months but it’s often much longer than this and COVID-19 means there could be further delays. Most decisions in 2019 took more than 6 months.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">When you get a decision about your asylum claim you will either be allowed to stay in the UK for a set amount of time if successful, or your claim will be rejected and you will have to leave the UK.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">You will receive a letter to inform you whether your claim has been successful or not.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Your asylum claim may be successful for 1 of 3 reasons, and how long you can stay in the UK depends on the reason you have been granted asylum.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><ol data-dcnode-id="1477"><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1489"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Permission to stay as a refugee</span></strong><span data-dcnode-id="1493" instrument_node=""> – if you qualify for asylum you will be given leave to remain, this means you and your dependents can stay in the UK as refugees for 5 years. After 5 years you will be eligible to </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manchester-immigrationlawyer.co.uk/indefinite-leave-to-remain/"><span data-dcnode-id="1492" instrument_node="">apply to settle in the UK</span></a><span data-dcnode-id="1490" instrument_node="">.</span></li><span data-dcnode-id="1488" instrument_node="">
</span><li data-dcnode-id="1484"><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Permission to stay for humanitarian reasons</span></strong><span data-dcnode-id="1485" instrument_node=""> – You may not qualify for asylum but you may still need to stay in the UK for your protection, so you could be granted leave to remain for humanitarian reasons. This will allow you and your dependents to stay in the UK for 5 years, after which you can also apply to settle in the UK.</span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1479"><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Permission to stay for other reasons</span></strong><span data-dcnode-id="1480" instrument_node=""> – If you don’t qualify for asylum or permission to stay for humanitarian reasons, you could still be given permission to stay for other reasons. The length of time you can stay in the UK varies depending on your situation. Once this time is up you may be able to apply to extend your stay or apply to settle in the UK.</span></li><span data-dcnode-id="1478" instrument_node="">
</span></ol><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">If your claim is unsuccessful you will be asked to leave the UK and return to your country of origin. You can either arrange to travel yourself or the home office may detain you and force you to leave by deportation.</span></p><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">

</span><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">After the decision</span></strong><span data-dcnode-id="1333" instrument_node=""> </span></h2><span data-dcnode-id="1331" instrument_node="">
</span></div><span data-dcnode-id="1329" instrument_node="">
</span><div class="content-area" data-dcnode-id="1313"><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">If you are granted leave to remain in the UK then you will be allowed to work, live and study in the UK and have access to public funds.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">You will be given a Biometric Residents Permit, which will have your details, photograph and fingerprints on it and will act as proof that you are allowed to live and work in the UK.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">If you wish to travel you should not use your national passport, but instead apply for travel documents.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1315"><img alt="asylum decision after interview uk" class="size-medium wp-image-187781 alignleft lazyloaded" data-dcnode-id="1318" data-ll-status="loaded" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manchester-immigrationlawyer.co.uk/app/uploads/2021/05/living-in-uk-1-1-540x405.jpg&amp;raw" srcset="/app/uploads/2021/05/living-in-uk-1-1-540x405.jpg 540w, /app/uploads/2021/05/living-in-uk-1-1-1024x768.jpg 1024w, /app/uploads/2021/05/living-in-uk-1-1-768x576.jpg 768w, /app/uploads/2021/05/living-in-uk-1-1-1536x1152.jpg 1536w, /app/uploads/2021/05/living-in-uk-1-1-1360x1020.jpg 1360w, /app/uploads/2021/05/living-in-uk-1-1-1080x810.jpg 1080w, /app/uploads/2021/05/living-in-uk-1-1-810x607.jpg 810w, /app/uploads/2021/05/living-in-uk-1-1-270x202.jpg 270w, /app/uploads/2021/05/living-in-uk-1-1-600x450.jpg 600w, /app/uploads/2021/05/living-in-uk-1-1.jpg 1787w" width="300"><noscript data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">&lt;img class="size-medium wp-image-187781 alignleft" src="https://manchester-immigrationlawyer.co.uk/app/uploads/2021/05/living-in-uk-1-1-540x405.jpg" alt="asylum decision after interview uk" width="300" height="225" srcset="/app/uploads/2021/05/living-in-uk-1-1-540x405.jpg 540w, /app/uploads/2021/05/living-in-uk-1-1-1024x768.jpg 1024w, /app/uploads/2021/05/living-in-uk-1-1-768x576.jpg 768w, /app/uploads/2021/05/living-in-uk-1-1-1536x1152.jpg 1536w, /app/uploads/2021/05/living-in-uk-1-1-1360x1020.jpg 1360w, /app/uploads/2021/05/living-in-uk-1-1-1080x810.jpg 1080w, /app/uploads/2021/05/living-in-uk-1-1-810x607.jpg 810w, /app/uploads/2021/05/living-in-uk-1-1-270x202.jpg 270w, /app/uploads/2021/05/living-in-uk-1-1-600x450.jpg 600w, /app/uploads/2021/05/living-in-uk-1-1.jpg 1787w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="1314" instrument_node="">

</span><h2 class="title h2" data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">
</span><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The asylum appeal process</span></strong><span data-dcnode-id="1304" instrument_node=""> </span></h2><span data-dcnode-id="1302" instrument_node="">
</span></div><span data-dcnode-id="1300" instrument_node="">
</span><div class="content-area" data-dcnode-id="1274"><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">If your claim for asylum has been rejected the asylum appeal process could help you. You will receive a letter along with details on how you can appeal the decision.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">You will usually be able to appeal the decision to the First-Tier Tribunal. You must lodge an appeal within 14 days.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">If an appeal to the First-Tier Tribunal is rejected you may be able to appeal through 3 more stages of appeal, include:</span></p><span data-dcnode-id="1290" instrument_node="">
</span><ol data-dcnode-id="1279"><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Upper Tribunal</span></li><span data-dcnode-id="1286" instrument_node="">
</span><li data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Court of Appeal</span></li><span data-dcnode-id="1283" instrument_node="">
</span><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Supreme Court</span></li><span data-dcnode-id="1280" instrument_node="">
</span></ol><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">An appeal can only be lodged with each of these methods once you have appealed and been dismissed by the stage before it.</span></p><span data-dcnode-id="1275" instrument_node="">
</span></div><span data-dcnode-id="1273" instrument_node="">
</span></div><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1266" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1174"><span data-dcnode-id="1265" instrument_node="">
</span><div class="container container--col-1-1" data-dcnode-id="1176"><span data-dcnode-id="1264" instrument_node="">
</span><div class="block col-1-1__block block--1" data-dcnode-id="1211"><span data-dcnode-id="1263" instrument_node="">
</span><div class="titles" data-dcnode-id="1255" id="sup"><span data-dcnode-id="1262" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">
</span><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Asylum support</span></strong><span data-dcnode-id="1258" instrument_node=""> </span></h2><span data-dcnode-id="1256" instrument_node="">
</span></div><span data-dcnode-id="1254" instrument_node="">
</span><div class="content-area" data-dcnode-id="1213"><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">As an asylum seeker, you may also be able to get asylum support, you could be entitled to a number of things including:</span></p><span data-dcnode-id="1250" instrument_node="">
</span><ul data-dcnode-id="1218"><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1245"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Housing</span></strong><span data-dcnode-id="1246" instrument_node=""> – If you have no where to stay whilst in the UK then accommodation will be provided. You won’t be allowed to choose where in the UK you stay</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1240"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Cash support</span></strong><span data-dcnode-id="1241" instrument_node=""> – You will receive £37.75 every week for each person in your household. This will be loaded onto a debit card that you can use at cash machines to withdraw the money</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1235"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Extra money</span></strong><span data-dcnode-id="1236" instrument_node=""> – If you are pregnant or have a child under 3 years old, you could be given between £3-5 extra a week</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Maternity payment</span></strong><span data-dcnode-id="1231" instrument_node=""> – If you have a baby under 6 weeks old or are due to give birth in 8 weeks or less then you could receive a £300 one-off payment</span></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1225"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Healthcare</span></strong><span data-dcnode-id="1226" instrument_node=""> – you may get free healthcare on the NHS, this includes free prescriptions, dental care and eyesight tests</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1220"><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Education</span></strong><span data-dcnode-id="1221" instrument_node=""> – If you have children between the ages of 5-17 then they must go to school. State schools are free and you may be able to get free school meals</span></li><span data-dcnode-id="1219" instrument_node="">
</span></ul><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">You are not legally allowed to work whilst waiting for a decision on your asylum application</span></p><span data-dcnode-id="1214" instrument_node="">
</span></div><span data-dcnode-id="1212" instrument_node="">
</span></div><span data-dcnode-id="1210" instrument_node="">
</span><div class="block col-1-1__block block--2" data-dcnode-id="1178"><span data-dcnode-id="1209" instrument_node="">
</span><div class="titles" data-dcnode-id="1201" id="det"><span data-dcnode-id="1208" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">
</span><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Being detained</span></strong><span data-dcnode-id="1204" instrument_node=""> </span></h2><span data-dcnode-id="1202" instrument_node="">
</span></div><span data-dcnode-id="1200" instrument_node="">
</span><div class="content-area" data-dcnode-id="1180"><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Asylum seekers may be detained during their claim for asylum in the UK. If you are not detained when you apply for asylum you will usually remain free unless your claim for asylum and any appeal is rejected. There are several reasons that you may be detained during your application for asylum, these include:</span></p><span data-dcnode-id="1196" instrument_node="">
</span><ul data-dcnode-id="1185"><span data-dcnode-id="1195" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Your claim being deemed as “clearly unfounded” at your screening interview</span></li><span data-dcnode-id="1192" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">If you’ve passed through another European country the Dublin regulations mean you may be detained if your case is transferred</span></li><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">If you have been in the UK for a while and do not have valid immigration papers</span></li><span data-dcnode-id="1186" instrument_node="">
</span></ul><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">You can be detained for an indefinite amount of time (unless you are pregnant – where the maximum time is 72 hours) but most individuals that get detained are released before their appeal is heard.</span></p><span data-dcnode-id="1181" instrument_node="">
</span></div><span data-dcnode-id="1179" instrument_node="">
</span></div><span data-dcnode-id="1177" instrument_node="">
</span></div><span data-dcnode-id="1175" instrument_node="">
</span></div><span data-dcnode-id="1172" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1092"><span data-dcnode-id="1171" instrument_node="">
</span><div class="container container--col-1-1" data-dcnode-id="1094"><span data-dcnode-id="1170" instrument_node="">
</span><div class="block col-1-1__block block--1" data-dcnode-id="1138"><span data-dcnode-id="1169" instrument_node="">
</span><div class="titles" data-dcnode-id="1161" id="fam"><span data-dcnode-id="1168" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">
</span><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Applying for asylum as a family</span></strong><span data-dcnode-id="1164" instrument_node=""> </span></h2><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">
</span><div class="content-area" data-dcnode-id="1140"><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">If you are applying for asylum you can do so either individually or as a family.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">You can add married or civil partners and your children (if they are under 18) onto your claim.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Grandparents, siblings and children over 18 will have to make a separate claim.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">If you have a partner or child under 18 outside of the UK, then they can apply to join you if your application to seek asylum is successful.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">They must apply for family reunion whilst outside the UK using the online form on the </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visas-immigration.service.gov.uk/other-ooc"><span data-dcnode-id="1145" instrument_node="">gov.uk</span></a><span data-dcnode-id="1143" instrument_node=""> website.</span></p><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span><div class="block col-1-1__block block--2" data-dcnode-id="1096"><span data-dcnode-id="1136" instrument_node="">
</span><div class="titles" data-dcnode-id="1128" id="child"><span data-dcnode-id="1135" instrument_node="">
</span><h2 class="title h2" data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">
</span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Applying as a child</span></strong><span data-dcnode-id="1131" instrument_node=""> </span></h2><span data-dcnode-id="1129" instrument_node="">
</span></div><span data-dcnode-id="1127" instrument_node="">
</span><div class="content-area" data-dcnode-id="1098"><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Children accompanying an adult family member who is making an asylum claim should apply as part of their application. If a child is unaccompanied, they will need a solicitor to bring their case to the Home Office.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">A child can apply for asylum the same way as an adult, by notifying someone at the port of entry or by contacting the national intake unit in Croydon if they are already in the UK.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">The asylum process for a child varies slightly, after the initial application the process will continue as follows:</span></p><span data-dcnode-id="1117" instrument_node="">
</span><ol data-dcnode-id="1103"><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The child will have a welfare interview</span></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">The child will fill out a statement of evidence form with their solicitor</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">They will then have their substantive interview</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The Home Office will make a decision</span></li><span data-dcnode-id="1104" instrument_node="">
</span></ol><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Interviews with children are done by people who have been specially trained. Children may also have the right to appeal a rejection by the Home Office.</span></p><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span></div><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1090" instrument_node="">
</span><div class="wrapper wrapper--normal" data-dcnode-id="1052"><span data-dcnode-id="1089" instrument_node="">
</span><div class="container container--col-1" data-dcnode-id="1054"><span data-dcnode-id="1088" instrument_node="">

</span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">How Manchester Immigration Lawyers can help</span></strong><span data-dcnode-id="1082" instrument_node=""> </span></h2><span data-dcnode-id="1080" instrument_node="">

</span><div class="content-area" data-dcnode-id="1058"><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">At Manchester Immigration Lawyers we can offer urgent, fast and comprehensive advice for all your asylum issues. Our immigration lawyers can meet with you immediately to provide you with asylum advice wherever you are.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">The UK asylum process can be complex, but our lawyers can help. Our services include high-quality translation services and thorough document checks. One of our lawyers will work with you to complete your asylum application, ensuring you have all the required documents and that your application has been completed to a high standard before submitting it. He/she will also prepare a Letter of Representation, this is a cover letter that will contain details of your case as well as citing immigration laws that support your asylum claim. We will liaise with the Home Office while your application is being processed.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">We understand the urgency involved with claiming asylum in the UK. Our lawyers will work quickly and efficiently, ensuring your chances of success are maximized.</span></p><span data-dcnode-id="1068" instrument_node="">

</span><button aria-controls="item--1" aria-expanded="false" data-dcnode-id="329" id="accordion-button--1" itemprop="name"><span data-dcnode-id="330" instrument_node="">Who can apply for asylum? </span></button><span data-dcnode-id="328" instrument_node="">
</span></h3><span data-dcnode-id="326" instrument_node="">
</span><div aria-labelledby="accordion-button--1" class="accordion-panel" data-dcnode-id="319" id="item--1" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="325" instrument_node="">
</span><span data-dcnode-id="321" itemprop="text"><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Anyone can apply for asylum in the UK but to be eligible you must prove that you are fleeing your home country because you fear persecution. You must also apply from inside the UK, preferably as soon as you arrive.</span></p><span data-dcnode-id="322" instrument_node="">
</span></span><span data-dcnode-id="320" instrument_node="">
</span></div><span data-dcnode-id="318" instrument_node="">
</span></section><span data-dcnode-id="316" instrument_node="">
</span><section class="accordion__item" data-dcnode-id="300" id="faq-accordion--2" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="315" instrument_node="">
</span><h3 class="h3 accordion-header" data-dcnode-id="310" id="accordion-header--2"><span data-dcnode-id="314" instrument_node="">
</span><button aria-controls="item--2" aria-expanded="false" data-dcnode-id="312" id="accordion-button--2" itemprop="name"><span data-dcnode-id="313" instrument_node="">What happens if my claim for asylum is rejected? </span></button><span data-dcnode-id="311" instrument_node="">
</span></h3><span data-dcnode-id="309" instrument_node="">
</span><div aria-labelledby="accordion-button--2" class="accordion-panel" data-dcnode-id="302" id="item--2" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="308" instrument_node="">
</span><span data-dcnode-id="304" itemprop="text"><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">If your claim for asylum is rejected then you will usually have a right to appeal the rejection to the first-tier tribunal. If all appeals are rejected then you will have to go back to your home country.</span></p><span data-dcnode-id="305" instrument_node="">
</span></span><span data-dcnode-id="303" instrument_node="">
</span></div><span data-dcnode-id="301" instrument_node="">
</span></section><span data-dcnode-id="299" instrument_node="">
</span><section class="accordion__item" data-dcnode-id="283" id="faq-accordion--3" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="298" instrument_node="">
</span><h3 class="h3 accordion-header" data-dcnode-id="293" id="accordion-header--3"><span data-dcnode-id="297" instrument_node="">
</span><button aria-controls="item--3" aria-expanded="false" data-dcnode-id="295" id="accordion-button--3" itemprop="name"><span data-dcnode-id="296" instrument_node="">Can I apply for asylum from outside the UK? </span></button><span data-dcnode-id="294" instrument_node="">
</span></h3><span data-dcnode-id="292" instrument_node="">
</span><div aria-labelledby="accordion-button--3" class="accordion-panel" data-dcnode-id="285" id="item--3" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="291" instrument_node="">
</span><span data-dcnode-id="287" itemprop="text"><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">No, to apply for asylum in the UK you must apply when you are in the country. You should try to apply upon entry or as soon as you can.</span></p><span data-dcnode-id="288" instrument_node="">
</span></span><span data-dcnode-id="286" instrument_node="">
</span></div><span data-dcnode-id="284" instrument_node="">
</span></section><span data-dcnode-id="282" instrument_node="">
</span><section class="accordion__item" data-dcnode-id="266" id="faq-accordion--4" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="281" instrument_node="">
</span><h3 class="h3 accordion-header" data-dcnode-id="276" id="accordion-header--4"><span data-dcnode-id="280" instrument_node="">
</span><button aria-controls="item--4" aria-expanded="false" data-dcnode-id="278" id="accordion-button--4" itemprop="name"><span data-dcnode-id="279" instrument_node="">How long will I have to wait to get a decision on my application for asylum?</span></button><span data-dcnode-id="277" instrument_node="">
</span></h3><span data-dcnode-id="275" instrument_node="">
</span><div aria-labelledby="accordion-button--4" class="accordion-panel" data-dcnode-id="268" id="item--4" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="274" instrument_node="">
</span><span data-dcnode-id="270" itemprop="text"><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">It can take a long time to get a decision on your application for asylum. The British government says that they try to make decisions within 6 months, but most decisions in 2019 took longer than this, some don’t get a decision for a year.</span></p><span data-dcnode-id="271" instrument_node="">
</span></span><span data-dcnode-id="269" instrument_node="">
</span></div><span data-dcnode-id="267" instrument_node="">
</span></section><span data-dcnode-id="265" instrument_node="">
</span><section class="accordion__item" data-dcnode-id="249" id="faq-accordion--5" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="264" instrument_node="">
</span><h3 class="h3 accordion-header" data-dcnode-id="259" id="accordion-header--5"><span data-dcnode-id="263" instrument_node="">
</span><button aria-controls="item--5" aria-expanded="false" data-dcnode-id="261" id="accordion-button--5" itemprop="name"><span data-dcnode-id="262" instrument_node="">What do I do whilst I wait for a decision?</span></button><span data-dcnode-id="260" instrument_node="">
</span></h3><span data-dcnode-id="258" instrument_node="">
</span><div aria-labelledby="accordion-button--5" class="accordion-panel" data-dcnode-id="251" id="item--5" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="257" instrument_node="">
</span><span data-dcnode-id="253" itemprop="text"><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">You are allowed to remain in the UK until a decision is made on your case. If you don’t have anywhere to stay you will be given accommodation, if you don’t have enough money for food you could get some financial support. Asylum seekers usually aren’t allowed to work whilst they are waiting for a decision.</span></p><span data-dcnode-id="254" instrument_node="">
</span></span><span data-dcnode-id="252" instrument_node="">
</span></div><span data-dcnode-id="250" instrument_node="">
</span></section><span data-dcnode-id="248" instrument_node="">
</span><section class="accordion__item" data-dcnode-id="232" id="faq-accordion--6" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="247" instrument_node="">
</span><h3 class="h3 accordion-header" data-dcnode-id="242" id="accordion-header--6"><span data-dcnode-id="246" instrument_node="">
</span><button aria-controls="item--6" aria-expanded="false" data-dcnode-id="244" id="accordion-button--6" itemprop="name"><span data-dcnode-id="245" instrument_node="">Can asylum seekers work?</span></button><span data-dcnode-id="243" instrument_node="">
</span></h3><span data-dcnode-id="241" instrument_node="">
</span><div aria-labelledby="accordion-button--6" class="accordion-panel" data-dcnode-id="234" id="item--6" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer" role="region" tabindex="-1"><span data-dcnode-id="240" instrument_node="">
</span><span data-dcnode-id="236" itemprop="text"><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Usually asylum seekers are not allowed to work in the UK whilst they wait for a decision on their application. However it is sometimes possible for an asylum seeker to be given permission to work if they have been waiting over 12 months to get a decision and if the delay in the decision making is not their fault.</span></p><span data-dcnode-id="237" instrument_node="">
</span></span><span data-dcnode-id="235" instrument_node="">
</span></div><span data-dcnode-id="233" instrument_node="">
</span></section><span data-dcnode-id="231" instrument_node="">
</span></div><span data-dcnode-id="229" instrument_node="">
</span></div><span data-dcnode-id="227" instrument_node="">
</span></div><span data-dcnode-id="225" instrument_node="">
