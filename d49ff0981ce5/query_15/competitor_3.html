</span><p data-dcnode-id="1179" dir="ltr"><span data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">While Brazil has an extradition treaty with the U.S., it has bucked American requests for extradition before. One recent example is </span></span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1182" data-uri="74df159eae16a52df2447307eedbf489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleveland.com/open/index.ssf/2013/05/rep_tim_ryan_pressures_brazil.html"><span data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">the case of Claudia Hoerig</span></span></a><span data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">, who is believed to have murdered her husband in Ohio before fleeing to Brazil. And oh, those beaches.</span></span></p><div data-dcnode-id="1176"><span data-dcnode-id="1177"><br data-dcnode-id="1178"></span></div><span data-dcnode-id="1175" instrument_node="">

</span><p data-dcnode-id="1024" dir="ltr"><span data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">With food, wine, art, France sounds more like a vacation than a hideout. And though it has an extradition treaty with the United States, there are a couple of cases that make France a compelling place to seek asylum. Filmmaker Roman Polanski </span></span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1032" data-uri="9c26f6eaa49108955a2715c5e83f2fe6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abcnews.go.com/blogs/entertainment/2011/10/roman-polanski-on-sex-case-regretted-it-for-33-years/%27"><span data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">fled to France</span></span></a><span data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node=""> rather than face charges of sexually assaulting a 13-year-old in 1977. A French citizen, he was never turned over to American authorities. It even took France years to extradite </span></span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1027" data-uri="b1fec77d3ff22b565a27fce12e974dd7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.salon.com/2002/08/14/einhorn/"><span data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Ira Einhorn</span></span></a><span data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">, an American accused murderer, because they feared his rights may have been violated.</span></span></p><span data-dcnode-id="1023" instrument_node="">
