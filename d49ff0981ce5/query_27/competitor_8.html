</span><h1 class="page__title title" data-dcnode-id="562" id="page-title"><span data-dcnode-id="563" instrument_node="">The Basics of U.S. Asylum Law</span></h1><span data-dcnode-id="561" instrument_node="">
</span><div class="block block-taoti-blocks first odd" data-dcnode-id="539" id="block-taoti-blocks-social-icons"><span data-dcnode-id="560" instrument_node="">
</span><span data-dcnode-id="558" instrument_node="">
</span><div class="addthis_toolbox addthis_default_style" data-dcnode-id="548"><span data-dcnode-id="557" instrument_node="">
</span><a class="addthis_button_facebook_like" data-dcnode-id="556" fb:like:layout="button_count"></a><span data-dcnode-id="555" instrument_node="">

</span><div class="related" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Related Campaigns &amp; Topics</span></div><span data-dcnode-id="534" instrument_node="">
</span><div class="related-container field-name-field-resource-topic field-name-field-resource-campaign" data-dcnode-id="526"><span data-dcnode-id="533" instrument_node="">
</span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/topics/immigration-detention"><span data-dcnode-id="532" instrument_node="">Immigration Detention</span></a><span data-dcnode-id="530" instrument_node="">, </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/topics/refugee-protection"><span data-dcnode-id="529" instrument_node="">Refugee Protection</span></a><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="525" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="378"><div class="field-items" data-dcnode-id="379"><div class="field-item even" data-dcnode-id="380"><h2 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Who are refugees?</span></h2><span data-dcnode-id="522" instrument_node="">
</span><ul data-dcnode-id="514"><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Refugees are often survivors of unimaginable atrocities. Many have had family members killed in conflict or been separated from their parents or children due to violence or chaos. They have been arrested, jailed, beaten, raped, tortured, threatened with death, or otherwise persecuted because of their political beliefs, religious beliefs, race, ethnicity, or other fundamental aspects of their identities. Many have fled war, ethnic or sectarian conflict, genocide, or other persecution.</span></li><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Refugees come from all walks of life. They are journalists, teachers, preachers, human rights advocates, farmers, parents, and political dissidents. Their list of home countries reflects the arc of recent world conflict—Laos, Afghanistan, the former Yugoslavia, the former Soviet Union, Ukraine, Vietnam, Cuba, Somalia, Sudan, Liberia, Russia, Burma, Bhutan, Iran, and Iraq—as well as the pernicious presence of persecution in many other places.</span></li><span data-dcnode-id="515" instrument_node="">
</span></ul><span data-dcnode-id="513" instrument_node="">
</span><h2 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Why do some refugees seek asylum protection in the United States?</span></h2><span data-dcnode-id="510" instrument_node="">
</span><ul data-dcnode-id="499"><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The United States has a long and proud history of providing refuge to victims of religious, political, and ethnic persecution.,. Such tradition reflects a core component of this country’s identity as a nation committed to freedom and respect for human dignity.</span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">According to the United Nations High Commissioner for Refugees (UNHCR), of the estimated 15.4 million refugees worldwide, 81% are hosted by developing countries. In 2012, the top 25 countries with the largest numbers of refugees were all developing countries; 16 of those held “least developed country” status.</span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">In 2011, 876,100 individual applications for asylum or refugee status were submitted to governments or UNHCR offices in 171 countries or territories. 76,000 of those claims – the equivalent of about 8.7% – were filed in the United States. According to data from the U.S. Department of Homeland Security and the U.S. Department of Justice 29,484 individuals were granted asylum in Fiscal Year 2012.</span></li><span data-dcnode-id="500" instrument_node="">
</span></ul><span data-dcnode-id="498" instrument_node="">
</span><h2 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">How does an individual apply for asylum in the United States?</span></h2><span data-dcnode-id="495" instrument_node="">
</span><ul data-dcnode-id="481"><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">An applicant must file for asylum either with the U.S. Citizenship and Immigration Service (USCIS) Asylum Division or – if facing deportation – before an Immigration Judge. The process requires the applicant to provide detailed information regarding his past activities, associations, experiences of persecution, and current fear of future persecution. He also must provide information on conditions in his home country to support the accuracy of his claim. This information must be consistent with the applicant’s account of events and objectively support his fear of return.</span></li><span data-dcnode-id="491" instrument_node="">
</span><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">An asylum applicant will be questioned carefully by either the USCIS Asylum Officer or – if before an Immigration Judge – challenged by the Judge and cross examined by a government attorney representing U.S. Immigration and Customs Enforcement (ICE).</span></li><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">An asylum applicant does not enjoy any presumption of credibility. Under the law, an applicant will be denied asylum if the adjudicator does not find the applicant’s claim to be truthful. Any falsehoods or inconsistencies can lead to an adverse credibility finding.</span></li><span data-dcnode-id="485" instrument_node="">
</span><li data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The burden of proof is on the applicant to establish that he meets the legal definition of “refugee” in the INA. Adjudicators often require evidence to corroborate the applicant’s testimony, if the applicant is reasonably able to obtain it. The adjudicator then assesses the credibility of the applicant’s testimony, weighing it against any evidence of record.</span></li><span data-dcnode-id="482" instrument_node="">
</span></ul><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">What is the legal definition of a “refugee?”</span></h2><span data-dcnode-id="477" instrument_node="">
</span><ul data-dcnode-id="463"><span data-dcnode-id="476" instrument_node="">
</span><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">A “refugee” as defined by INA §101(a)(42), personifies several traits, each of which has been defined in greater detail through regulations and case law: • Person located outside of his country of nationality or, for those without a nationality, outside the country in which he last habitually resided;</span></li><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Person unable or unwilling to return to that country and unable or unwilling to avail himself of protection of that country;</span></li><span data-dcnode-id="470" instrument_node="">
</span><li data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Person fearful because of persecution or a well-founded fear of persecution;</span></li><span data-dcnode-id="467" instrument_node="">
</span><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Person persecuted on account of race, religion, nationality, membership in a particular social group, or political opinion.</span></li><span data-dcnode-id="464" instrument_node="">
</span></ul><span data-dcnode-id="462" instrument_node="">
</span><h2 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Who is barred or excluded from asylum protection in the United States, even if he otherwise qualifies as a “refugee” under INA §101(a)(42)?</span></h2><span data-dcnode-id="459" instrument_node="">
</span><ul data-dcnode-id="429"><span data-dcnode-id="458" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" style="line-height: 1.6em;"><span data-dcnode-id="457" instrument_node="">Applicants who have engaged in the persecution of others; </span></span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" style="line-height: 1.6em;"><span data-dcnode-id="453" instrument_node="">Applicants who have been convicted of a particularly serious crime and constitute a danger to the United States; </span></span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="447"><span data-dcnode-id="448" style="line-height: 1.6em;"><span data-dcnode-id="449" instrument_node="">Applicants whom U.S. asylum officers have considerable reason to believe committed a serious, nonpolitical crime outside the United States; </span></span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" style="line-height: 1.6em;"><span data-dcnode-id="445" instrument_node="">Applicants whom U.S. asylum officers regard as a danger to the security of the United States; </span></span></li><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" style="line-height: 1.6em;"><span data-dcnode-id="441" instrument_node="">Applicants who have engaged in terrorist activity; </span></span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="435"><span data-dcnode-id="436" style="line-height: 1.6em;"><span data-dcnode-id="437" instrument_node="">Applicants who have been “firmly resettled” in another country prior to arriving in the United States; and, </span></span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="431"><span data-dcnode-id="432" style="line-height: 1.6em;"><span data-dcnode-id="433" instrument_node="">Applicants who failed to file their applications within one year of arrival, absent changed or extraordinary circumstances. </span></span></li><span data-dcnode-id="430" instrument_node="">
</span></ul><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="425"><span data-dcnode-id="426" style="line-height: 1.6em;"><span data-dcnode-id="427" instrument_node="">What mechanisms are in place to prevent abuse of the asylum system? </span></span></h2><span data-dcnode-id="424" instrument_node="">
</span><ul data-dcnode-id="386"><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="421" style="line-height: 1.6em;"><span data-dcnode-id="422" instrument_node="">Extensive, on-going training in fraud detection and credibility determinations for Immigration Judges, Immigration and Customs Enforcement (ICE) trial attorneys, and USCIS Asylum Officers; </span></span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="416"><span data-dcnode-id="417" style="line-height: 1.6em;"><span data-dcnode-id="418" instrument_node="">Perjury penalty for both the applicant signing an asylum application and the individual preparing an asylum application if either makes a false statement; </span></span></li><span data-dcnode-id="415" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="413" style="line-height: 1.6em;"><span data-dcnode-id="414" instrument_node="">A permanent bar on receiving any immigration benefits for fraudulent asylum applications, meaning that those applicants would never be able to work legally in the U.S. or receive permanent lawful resident status in the U.S.; </span></span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="408"><span data-dcnode-id="409" style="line-height: 1.6em;"><span data-dcnode-id="410" instrument_node="">Mandatory biographical and biometric checks of applicants in multiple federal databases, including those of the Department of Homeland Security and the FBI. Such checks help identify fraudulent cases as well as individuals who might present a security risk to the U.S.; </span></span></li><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="404"><span data-dcnode-id="405" style="line-height: 1.6em;"><span data-dcnode-id="406" instrument_node="">Additional biographical screening by the National Counterterrorism Center (NCTC) of all asylum applications starting in August 2011; </span></span></li><span data-dcnode-id="403" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" style="line-height: 1.6em;"><span data-dcnode-id="402" instrument_node="">Obligatory analysis of applicants’ fingerprints in the FBI fingerprint database before asylum officers and immigration judges may grant asylum; </span></span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="396"><span data-dcnode-id="397" style="line-height: 1.6em;"><span data-dcnode-id="398" instrument_node="">Random case assignment, and mandatory supervisory review of all asylum decisions; </span></span></li><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" style="line-height: 1.6em;"><span data-dcnode-id="394" instrument_node="">Government-funded interpreter monitors; </span></span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="388"><span data-dcnode-id="389" style="line-height: 1.6em;"><span data-dcnode-id="390" instrument_node="">Immediate referral of suspected fraudulent applications to ICE by asylum officers for criminal investigation and prosecution of applicants, preparers, and attorneys; additional identification of fraudulent asylum claims by USCIS’ Fraud Detection and National Security Directorate.</span></span></li><span data-dcnode-id="387" instrument_node="">
</span></ul><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="382"><a class="btn blue-btn" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/wp-content/uploads/pdf/HRF_Fact_Sheet-The_Basics_of_US_Asylum_Law.pdf"><span data-dcnode-id="384" instrument_node="">Download</span></a></p><span data-dcnode-id="381" instrument_node="">
</span></div></div></div><span data-dcnode-id="377" instrument_node="">
