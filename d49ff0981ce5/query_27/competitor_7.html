</span><h1 class="rtecenter" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Human Rights First Saves Lives</span></h1><span data-dcnode-id="980" instrument_node="">
</span><h2 class="rtecenter" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">We help people who have fled dangerous situations in their home countries to obtain asylum in the United States.</span></h2><span data-dcnode-id="977" instrument_node="">
</span><div class="rtecenter" data-dcnode-id="968"><a class="btn large-btn blue-btn" data-dcnode-id="975" href="#asylumseek"><span data-dcnode-id="976" instrument_node="">Seek Asylum</span></a><span data-dcnode-id="974" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><a class="btn large-btn blue-btn" data-dcnode-id="972" href="#probono"><span data-dcnode-id="973" instrument_node="">Become a Pro Bono Attorney</span></a><span data-dcnode-id="971" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><a class="btn large-btn blue-btn" data-dcnode-id="969" href="#support"><span data-dcnode-id="970" instrument_node="">Support Our Work</span></a></div><span data-dcnode-id="967" instrument_node="">

</span></div><span data-dcnode-id="963" instrument_node="">
</span></div><div class="panel-pane pane-custom pane-2" data-dcnode-id="943"><span data-dcnode-id="961" instrument_node="">
</span><div class="media" data-dcnode-id="945"><a class="pull-left" data-dcnode-id="959"><img alt="boot_AP96061903050_hires.jpg" class="media-object" data-dcnode-id="960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/slider/boot_AP96061903050_hires.jpg&amp;raw"></a><span data-dcnode-id="958" instrument_node="">
</span><div class="media-body" data-dcnode-id="947"><span data-dcnode-id="957" instrument_node="">
</span><h2 class="pane-title" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Our Services</span></h2><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Asylum is a legal status that the U.S. government can grant to people who are at risk of harm in their home countries because of who they are—because of their religion, political opinion, sexual orientation, or ethnicity, for example—if the governments in their home countries will not protect them.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The process for seeking asylum in the U.S. is complicated and an asylum-seeker is more likely to be granted this form of protection if he or she is represented by a good lawyer who understands the system. Our pro bono legal representation program matches good lawyers with asylum-seekers who need help and would not otherwise be able to afford high-quality legal representation.</span></p><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">

</span><div class="panel-pane pane-custom pane-3" data-dcnode-id="918" id="asylumseek"><span data-dcnode-id="940" instrument_node="">
</span><div class="media" data-dcnode-id="920"><a class="pull-right" data-dcnode-id="938"><img alt="boot_RUSSELL-LEE-KLIKA.jpg" class="media-object" data-dcnode-id="939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/boot_RUSSELL-LEE-KLIKA.jpg&amp;raw"></a><span data-dcnode-id="937" instrument_node="">
</span><div class="media-body" data-dcnode-id="922"><span data-dcnode-id="936" instrument_node="">
</span><h2 class="pane-title" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Asylum Seekers</span></h2><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">We help people living in the greater Washington D.C., New York City, and Los Angeles metropolitan areas who do not already have legal representation, cannot afford an attorney, and need help with a claim for asylum or other protection-based form of immigration status. Our New York office can also help people who are seeking asylum from within a nearby immigration detention center.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="924"><a class="btn blue-btn large-btn" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/asylum/asylum-seekers-and-potential-clients"><span data-dcnode-id="929" instrument_node="">Become a Client</span></a><span data-dcnode-id="927" instrument_node="">&nbsp; &nbsp; &nbsp;</span><a class="btn blue-btn large-btn" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/asylum/frequently-asked-questions-asylum-seekers"><span data-dcnode-id="926" instrument_node="">FAQ</span></a></p><span data-dcnode-id="923" instrument_node="">

</span><h2 class="pane-title" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Pro Bono Attorneys and Volunteers</span></h2><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">We match asylum-seekers who need help and lawyers who can represent them on a pro bono basis. We provide mentoring, training, and guidance throughout the representation to ensure that our pro bono lawyers get the support they need to provide the highest quality legal representation to clients seeking asylum in the country. Through the Refugee Representation program at Human Rights First, volunteer lawyers have the unique opportunity to change the lives of refugees by helping them win asylum in the United States.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="382"><a class="btn blue-btn large-btn" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/asylum/pro-bono-attorneys-and-volunteers"><span data-dcnode-id="387" instrument_node="">Become a Volunteer</span></a><span data-dcnode-id="385" instrument_node="">&nbsp; &nbsp; &nbsp;</span><a class="btn blue-btn large-btn" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/asylum/awards-and-advocacy"><span data-dcnode-id="384" instrument_node="">Awards and Advocacy</span></a></p><span data-dcnode-id="381" instrument_node="">
