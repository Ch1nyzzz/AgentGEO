</span><table class="infobox vcard" data-dcnode-id="3558"><caption class="infobox-title fn org" data-dcnode-id="3602"><span data-dcnode-id="3606" instrument_node="">Asylum seekers in 2015</span><sup class="reference" data-dcnode-id="3603" id="cite_ref-1"><a data-dcnode-id="3604" href="#cite_note-1"><span data-dcnode-id="3605" instrument_node="">[1]</span></a></sup></caption><tbody data-dcnode-id="3559"><tr data-dcnode-id="3599"><th class="infobox-header" colspan="2" data-dcnode-id="3600" style="background-color:#b0c4de;"><span data-dcnode-id="3601" instrument_node="">Total population</span></th></tr><tr data-dcnode-id="3596"><td class="infobox-full-data" colspan="2" data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">3.219 million</span></td></tr><tr data-dcnode-id="3593"><th class="infobox-header" colspan="2" data-dcnode-id="3594" style="background-color:#b0c4de;"><span data-dcnode-id="3595" instrument_node="">Regions with significant populations</span></th></tr><tr data-dcnode-id="3584"><th class="infobox-label" data-dcnode-id="3587" scope="row" style="font-weight:normal;"><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3592" instrument_node="">Europe</span></a><span data-dcnode-id="3590" instrument_node=""> and </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Asia" title="North Asia"><span data-dcnode-id="3589" instrument_node="">North Asia</span></a></th><td class="infobox-data" data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">1.299 million</span></td></tr><tr data-dcnode-id="3578"><th class="infobox-label" data-dcnode-id="3581" scope="row" style="font-weight:normal;"><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-Saharan_Africa" title="Sub-Saharan Africa"><span data-dcnode-id="3583" instrument_node="">Sub-Saharan Africa</span></a></th><td class="infobox-data" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">1.293 million</span></td></tr><tr data-dcnode-id="3572"><th class="infobox-label" data-dcnode-id="3575" scope="row" style="font-weight:normal;"><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americas" title="Americas"><span data-dcnode-id="3577" instrument_node="">Americas</span></a></th><td class="infobox-data" data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">350,697</span></td></tr><tr data-dcnode-id="3566"><th class="infobox-label" data-dcnode-id="3569" scope="row" style="font-weight:normal;"><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MENA" title="MENA"><span data-dcnode-id="3571" instrument_node="">Middle East and North Africa</span></a></th><td class="infobox-data" data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">142,371</span></td></tr><tr data-dcnode-id="3560"><th class="infobox-label" data-dcnode-id="3563" scope="row" style="font-weight:normal;"><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia-Pacific" title="Asia-Pacific"><span data-dcnode-id="3565" instrument_node="">Asia and the Pacific</span></a></th><td class="infobox-data" data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">134,613</span></td></tr></tbody></table><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3530"><span data-dcnode-id="3556" instrument_node="">An </span><b data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">asylum seeker</span></b><span data-dcnode-id="3553" instrument_node=""> is a person who leaves their country of residence, enters another country and applies for </span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_asylum" title="Right of asylum"><span data-dcnode-id="3552" instrument_node="">asylum</span></a><span data-dcnode-id="3550" instrument_node=""> (i.e., international protection) in this other country. An asylum seeker is an </span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration" title="Immigration"><span data-dcnode-id="3549" instrument_node="">immigrant</span></a><span data-dcnode-id="3547" instrument_node=""> who has been </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_displacement" title="Forced displacement"><span data-dcnode-id="3546" instrument_node="">forcibly displaced</span></a><span data-dcnode-id="3544" instrument_node=""> and might have fled their home country because of war or other factors harming them or their family. If their case is accepted, they become considered a </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="3543" instrument_node="">refugee</span></a><span data-dcnode-id="3541" instrument_node="">.</span><sup class="reference" data-dcnode-id="3538" id="cite_ref-2"><a data-dcnode-id="3539" href="#cite_note-2"><span data-dcnode-id="3540" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3537" instrument_node=""> The terms </span><i data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">asylum seeker</span></i><span data-dcnode-id="3534" instrument_node=""> and </span><i data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">refugee</span></i><span data-dcnode-id="3531" instrument_node=""> are often confused.
</span></p><p data-dcnode-id="3522"><span data-dcnode-id="3529" instrument_node="">A person becomes an asylum seeker by making a formal application for the right to remain in another country and keeps that status until the application has been concluded. The relevant immigration authorities of the country of asylum determine whether the asylum seeker will be granted protection and become an officially recognized refugee or whether asylum will be refused and the asylum seeker becomes an </span><a class="mw-redirect" data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_immigrant" title="Illegal immigrant"><span data-dcnode-id="3528" instrument_node="">illegal immigrant</span></a><span data-dcnode-id="3526" instrument_node=""> who may be asked to leave the country and may even be </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deportation" title="Deportation"><span data-dcnode-id="3525" instrument_node="">deported</span></a><span data-dcnode-id="3523" instrument_node="">.
</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3521" instrument_node="">In North American English, the term </span><b data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">asylee</span></b><span data-dcnode-id="3518" instrument_node=""> is also used. An asylee can either be an asylum seeker, as defined above, or a person whose claim for asylum was accepted and asylum was granted.</span><sup class="reference" data-dcnode-id="3515" id="cite_ref-3"><a data-dcnode-id="3516" href="#cite_note-3"><span data-dcnode-id="3517" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3514" instrument_node=""> On average, about 1 million people apply for asylum every year.</span><sup class="reference" data-dcnode-id="3511" id="cite_ref-4"><a data-dcnode-id="3512" href="#cite_note-4"><span data-dcnode-id="3513" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3510" instrument_node="">
</span></p><p data-dcnode-id="3489"><span data-dcnode-id="3508" instrument_node="">The asylum seeker may be recognised as a refugee and given </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee%23Refugee_status" title="Refugee"><span data-dcnode-id="3507" instrument_node="">refugee status</span></a><span data-dcnode-id="3505" instrument_node=""> if their circumstances fall into the definition of </span><i data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">refugee</span></i><span data-dcnode-id="3502" instrument_node=""> according to the </span><a class="mw-redirect" data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_relating_to_the_Status_of_Refugees" title="Convention relating to the Status of Refugees"><span data-dcnode-id="3501" instrument_node="">1951 Refugee Convention</span></a><span data-dcnode-id="3499" instrument_node=""> or other </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_law" title="Refugee law"><span data-dcnode-id="3498" instrument_node="">refugee laws</span></a><span data-dcnode-id="3496" instrument_node="">—such as the </span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Convention_on_Human_Rights" title="European Convention on Human Rights"><span data-dcnode-id="3495" instrument_node="">European Convention on Human Rights</span></a><span data-dcnode-id="3493" instrument_node="">, if asylum is claimed within the </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="3492" instrument_node="">European Union</span></a><span data-dcnode-id="3490" instrument_node="">. However, signatories to the refugee convention create their own policies for assessing the protection status of asylum seekers, and the proportion of asylum applicants who are accepted or rejected varies each year from country to country.
</span></p><span data-dcnode-id="3488" instrument_node="">

</span><h2 data-dcnode-id="3294"><span class="mw-headline" data-dcnode-id="3302" id="Types_of_asylum_and_protection"><span data-dcnode-id="3303" instrument_node="">Types of asylum and protection</span></span><span class="mw-editsection" data-dcnode-id="3295"><span class="mw-editsection-bracket" data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">[</span></span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D1" title="Edit section: Types of asylum and protection"><span data-dcnode-id="3299" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Asylum as an institution is not restricted to the category of individuals who qualify for refugee status. On the contrary, this institution predates the birth of the international regime for the protection of refugees.
</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3290" instrument_node="">Asylum seekers who have committed crimes against peace, a </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_crime" title="War crime"><span data-dcnode-id="3289" instrument_node="">war crime</span></a><span data-dcnode-id="3287" instrument_node=""> or a </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimes_against_humanity" title="Crimes against humanity"><span data-dcnode-id="3286" instrument_node="">crime against humanity</span></a><span data-dcnode-id="3284" instrument_node="">, or other serious non-political crimes, or whose actions are contrary to the purposes and principles of the United Nations, are excluded from international protection.</span><sup class="reference" data-dcnode-id="3281" id="cite_ref-5"><a data-dcnode-id="3282" href="#cite_note-5"><span data-dcnode-id="3283" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3280" instrument_node="">
</span></p><span data-dcnode-id="3278" instrument_node="">
</span><h3 data-dcnode-id="3268"><span class="mw-headline" data-dcnode-id="3276" id="Convention_refugee_status"><span data-dcnode-id="3277" instrument_node="">Convention refugee status</span></span><span class="mw-editsection" data-dcnode-id="3269"><span class="mw-editsection-bracket" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">[</span></span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D2" title="Edit section: Convention refugee status"><span data-dcnode-id="3273" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3255"><span data-dcnode-id="3266" instrument_node="">As of 1 July 2013, there were 145 parties to the </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="3265" instrument_node="">1951 Refugee Convention</span></a><span data-dcnode-id="3263" instrument_node=""> and 146 to the </span><a class="mw-redirect" data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1967_Protocol" title="1967 Protocol"><span data-dcnode-id="3262" instrument_node="">1967 Protocol</span></a><span data-dcnode-id="3260" instrument_node="">. These states are bound by an obligation under international law to grant asylum to people who fall within the definition of Convention and Protocol.</span><sup class="reference" data-dcnode-id="3257" id="cite_ref-6"><a data-dcnode-id="3258" href="#cite_note-6"><span data-dcnode-id="3259" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3256" instrument_node=""> The refugee definitions of 1951 and 1967 are the strictest and most exclusive and persons who fall within this definition are called Convention refugees and their status is called Convention refugee status. Persons who do not fall within this definition may still be granted complementary forms of protection, if they fall within other refugee definitions.
</span></p><p data-dcnode-id="3240"><span data-dcnode-id="3254" instrument_node="">The practical determination of whether a person is a refugee or not is most often left to certain </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_agency" title="Government agency"><span data-dcnode-id="3253" instrument_node="">government agencies</span></a><span data-dcnode-id="3251" instrument_node=""> within the host country. In some countries the refugee status determination (RSD) is done by the </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Refugees" title="United Nations High Commissioner for Refugees"><span data-dcnode-id="3250" instrument_node="">UNHCR</span></a><span data-dcnode-id="3248" instrument_node="">. The burden of substantiating an asylum claim lies with the claimant, who must establish that they qualify for protection.</span><sup class="reference" data-dcnode-id="3245" id="cite_ref-7"><a data-dcnode-id="3246" href="#cite_note-7"><span data-dcnode-id="3247" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3242" id="cite_ref-8"><a data-dcnode-id="3243" href="#cite_note-8"><span data-dcnode-id="3244" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3241" instrument_node="">
</span></p><p data-dcnode-id="3234"><span data-dcnode-id="3239" instrument_node="">In many countries, country-of-origin information is used by migration officials as part of the assessment of asylum claims, and governments commission research into the accuracy of their country reports. Some countries have studied the rejection rates of their migration officials making decisions, finding that individuals reject more applicants than others assessing similar cases—and migration officials are required to standardise the reasons for accepting or rejecting claims, so that the decision of one adjudicator is consistent with what their colleagues decide.</span><sup class="reference" data-dcnode-id="3236" id="cite_ref-9"><a data-dcnode-id="3237" href="#cite_note-9"><span data-dcnode-id="3238" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3235" instrument_node="">
</span></p><p data-dcnode-id="3229"><span data-dcnode-id="3233" instrument_node="">The refugee definition of the 1951 Convention is universally binding, but there are many other </span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee%23Legal_definition" title="Refugee"><span data-dcnode-id="3232" instrument_node="">definitions</span></a><span data-dcnode-id="3230" instrument_node=""> according to which protection may be offered to people who do not fall within this definition.
</span></p><span data-dcnode-id="3228" instrument_node="">
</span><h3 data-dcnode-id="3218"><span class="mw-headline" data-dcnode-id="3226" id="Subsidiary_protection_status"><span data-dcnode-id="3227" instrument_node="">Subsidiary protection status</span></span><span class="mw-editsection" data-dcnode-id="3219"><span class="mw-editsection-bracket" data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">[</span></span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D3" title="Edit section: Subsidiary protection status"><span data-dcnode-id="3223" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3217" instrument_node="">
</span><p data-dcnode-id="3206"><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subsidiary_protection" title="Subsidiary protection"><span data-dcnode-id="3216" instrument_node="">Subsidiary protection</span></a><span data-dcnode-id="3214" instrument_node=""> is an international protection for persons seeking asylum who do not qualify as refugees. It is an option to get asylum for those who do not have a well-founded fear of persecution (which is required for refugee status according to the 1951 Convention), but do indeed have a substantial risk to be subjected to torture or to a serious harm if they are returned to their country of origin, for reasons that include war, violence, conflict and massive violations of human rights.</span><sup class="reference" data-dcnode-id="3211" id="cite_ref-10"><a data-dcnode-id="3212" href="#cite_note-10"><span data-dcnode-id="3213" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3210" instrument_node=""> The </span><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="3209" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="3207" instrument_node=""> and European Union law have a broader definition of who is entitled to asylum.
</span></p><span data-dcnode-id="3205" instrument_node="">
</span><h3 data-dcnode-id="3195"><span class="mw-headline" data-dcnode-id="3203" id="Temporary_protection_visa"><span data-dcnode-id="3204" instrument_node="">Temporary protection visa</span></span><span class="mw-editsection" data-dcnode-id="3196"><span class="mw-editsection-bracket" data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">[</span></span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D4" title="Edit section: Temporary protection visa"><span data-dcnode-id="3200" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3190"><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temporary_protection_visa" title="Temporary protection visa"><span data-dcnode-id="3193" instrument_node="">Temporary protection visas</span></a><span data-dcnode-id="3191" instrument_node=""> are used to persons in Australia who applied for refugee status after making an unauthorised arrival. It is the main type of visa issued to refugees when released from Australian immigration detention facilities and they are required to reapply for it every three years.
</span></p><span data-dcnode-id="3189" instrument_node="">

</span><h2 data-dcnode-id="2954"><span class="mw-headline" data-dcnode-id="2962" id="Status_determination_processes"><span data-dcnode-id="2963" instrument_node="">Status determination processes</span></span><span class="mw-editsection" data-dcnode-id="2955"><span class="mw-editsection-bracket" data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">[</span></span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D6" title="Edit section: Status determination processes"><span data-dcnode-id="2959" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2953" instrument_node="">
</span><link data-dcnode-id="2952" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2945" role="note"><span data-dcnode-id="2951" instrument_node="">Further information: </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee%23Refugee_status_determination" title="Refugee"><span data-dcnode-id="2950" instrument_node="">Refugee §&nbsp;Refugee status determination</span></a><span data-dcnode-id="2948" instrument_node="">, and </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_law%23Refugee_status_determination" title="Refugee law"><span data-dcnode-id="2947" instrument_node="">Refugee law §&nbsp;Refugee status determination</span></a></div><span data-dcnode-id="2944" instrument_node="">
</span><h3 data-dcnode-id="2934"><span class="mw-headline" data-dcnode-id="2942" id="Group_determination"><span data-dcnode-id="2943" instrument_node="">Group determination</span></span><span class="mw-editsection" data-dcnode-id="2935"><span class="mw-editsection-bracket" data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">[</span></span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D7" title="Edit section: Group determination"><span data-dcnode-id="2939" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2932" instrument_node="">Asylum seekers may be given refugee status on a group basis. Refugees who went thought the group status determination are also referred to as </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prima_facie" title="Prima facie"><span data-dcnode-id="2931" instrument_node="">prima facie</span></a><span data-dcnode-id="2929" instrument_node=""> refugees. This is done in situations when the reasons for seeking refugee status are generally well known and individual assessment would otherwise overwhelm the capacities of assessors. Group determination is more readily done in states that not only have accepted the refugee definition of the 1951 Convention, but also use a refugee definition that includes people fleeing indiscriminate or generalized violence, which are not covered in the 1951 Convention.</span><sup class="reference" data-dcnode-id="2926" id="cite_ref-UN11_19-0"><a data-dcnode-id="2927" href="#cite_note-UN11-19"><span data-dcnode-id="2928" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2925" instrument_node="">
</span></p><span data-dcnode-id="2923" instrument_node="">
</span><h3 data-dcnode-id="2913"><span class="mw-headline" data-dcnode-id="2921" id="Individual_assessment"><span data-dcnode-id="2922" instrument_node="">Individual assessment</span></span><span class="mw-editsection" data-dcnode-id="2914"><span class="mw-editsection-bracket" data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">[</span></span><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D8" title="Edit section: Individual assessment"><span data-dcnode-id="2918" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">For persons who do not come into the country as part of a bigger group individual asylum interviews are conducted to establish whether the person has sufficient reasons for seeking asylum.
</span></p><span data-dcnode-id="2909" instrument_node="">
</span><h3 data-dcnode-id="2899"><span class="mw-headline" data-dcnode-id="2907" id="Appeals"><span data-dcnode-id="2908" instrument_node="">Appeals</span></span><span class="mw-editsection" data-dcnode-id="2900"><span class="mw-editsection-bracket" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">[</span></span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D9" title="Edit section: Appeals"><span data-dcnode-id="2904" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2897" instrument_node="">In many countries, asylum applicants can challenge a rejection by challenging the decision in a court or migration review panel. In the United Kingdom, more than one in four decisions to refuse an asylum seeker protection are overturned by immigration judges.</span><sup class="reference" data-dcnode-id="2894" id="cite_ref-20"><a data-dcnode-id="2895" href="#cite_note-20"><span data-dcnode-id="2896" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2893" instrument_node="">
</span></p><span data-dcnode-id="2891" instrument_node="">
</span><h2 data-dcnode-id="2881"><span class="mw-headline" data-dcnode-id="2889" id="Rights_of_asylum_seekers"><span data-dcnode-id="2890" instrument_node="">Rights of asylum seekers</span></span><span class="mw-editsection" data-dcnode-id="2882"><span class="mw-editsection-bracket" data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">[</span></span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D10" title="Edit section: Rights of asylum seekers"><span data-dcnode-id="2886" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2880" instrument_node="">
</span><link data-dcnode-id="2879" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2875" role="note"><span data-dcnode-id="2878" instrument_node="">Further information: </span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_asylum" title="Right of asylum"><span data-dcnode-id="2877" instrument_node="">Right of asylum</span></a></div><span data-dcnode-id="2874" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2873" instrument_node="">Whilst waiting for a decision asylum seekers have limited rights in the country of asylum. In most countries they are not allowed to work and in some countries not even to volunteer. In some countries they are not allowed to </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_movement" title="Freedom of movement"><span data-dcnode-id="2872" instrument_node="">move freely</span></a><span data-dcnode-id="2870" instrument_node=""> within the country.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2863" style="white-space:nowrap;"><span data-dcnode-id="2869" instrument_node="">[</span><i data-dcnode-id="2865"><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2867" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="2868" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2864" instrument_node="">]</span></sup><span data-dcnode-id="2862" instrument_node=""> Even access to health care is limited. In the European Union, those who have yet to be granted official status as </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="2861" instrument_node="">refugees</span></a><span data-dcnode-id="2859" instrument_node=""> and are still within the asylum process have some restricted rights to healthcare access.</span><sup class="reference" data-dcnode-id="2856" id="cite_ref-tone2_21-0"><a data-dcnode-id="2857" href="#cite_note-tone2-21"><span data-dcnode-id="2858" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2855" instrument_node=""> This includes access to medical and psychological care.</span><sup class="reference" data-dcnode-id="2852" id="cite_ref-tone2_21-1"><a data-dcnode-id="2853" href="#cite_note-tone2-21"><span data-dcnode-id="2854" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2851" instrument_node=""> However, these may vary depending on the host country.  For instance, under the Asylum Seekers Benefits Act (</span><i data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Asylbewerberleistungsgesetz</span></i><span data-dcnode-id="2848" instrument_node="">) in Germany, asylum seekers are outside </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_care" title="Primary care"><span data-dcnode-id="2847" instrument_node="">primary care</span></a><span data-dcnode-id="2845" instrument_node=""> and are limited to </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency" title="Emergency"><span data-dcnode-id="2844" instrument_node="">emergency health care</span></a><span data-dcnode-id="2842" instrument_node="">, vaccinations, pregnancy and childbirth with limitations on specialty care.</span><sup class="reference" data-dcnode-id="2839" id="cite_ref-tone2_21-2"><a data-dcnode-id="2840" href="#cite_note-tone2-21"><span data-dcnode-id="2841" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2838" instrument_node="">  Asylum seekers have greater chance of experiencing unmet health needs as compared to the general German population. Asylum seekers also have greater odds of hospital admissions and at least one visit to a </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychotherapy" title="Psychotherapy"><span data-dcnode-id="2837" instrument_node="">psychotherapists</span></a><span data-dcnode-id="2835" instrument_node=""> relative to the German general population.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2828" style="white-space:nowrap;"><span data-dcnode-id="2834" instrument_node="">[</span><i data-dcnode-id="2830"><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2832" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="2833" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2829" instrument_node="">]</span></sup><span data-dcnode-id="2827" instrument_node="">
</span></p><span data-dcnode-id="2825" instrument_node="">
</span><h2 data-dcnode-id="2815"><span class="mw-headline" data-dcnode-id="2823" id="Concerns_in_asylum-seeking_processes"><span data-dcnode-id="2824" instrument_node="">Concerns in asylum-seeking processes</span></span><span class="mw-editsection" data-dcnode-id="2816"><span class="mw-editsection-bracket" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">[</span></span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D11" title="Edit section: Concerns in asylum-seeking processes"><span data-dcnode-id="2820" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2813" instrument_node="">Research suggests cross-sector collaboration is key to assist refugees and asylum seekers resettle and integrate into receiving communities, workplaces and schools.</span><sup class="reference" data-dcnode-id="2810" id="cite_ref-22"><a data-dcnode-id="2811" href="#cite_note-22"><span data-dcnode-id="2812" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="2807" id="cite_ref-23"><a data-dcnode-id="2808" href="#cite_note-23"><span data-dcnode-id="2809" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="2804" id="cite_ref-24"><a data-dcnode-id="2805" href="#cite_note-24"><span data-dcnode-id="2806" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="2801" id="cite_ref-25"><a data-dcnode-id="2802" href="#cite_note-25"><span data-dcnode-id="2803" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2800" instrument_node="">
</span></p><p data-dcnode-id="2785"><span data-dcnode-id="2798" instrument_node="">Non-governmental organizations concerned with refugees and asylum seekers have pointed out difficulties for </span><a class="mw-redirect" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Displaced_person" title="Displaced person"><span data-dcnode-id="2797" instrument_node="">displaced persons</span></a><span data-dcnode-id="2795" instrument_node=""> to seek asylum in industrialized countries. As the </span><a class="mw-redirect" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_policy" title="Immigration policy"><span data-dcnode-id="2794" instrument_node="">immigration policy</span></a><span data-dcnode-id="2792" instrument_node=""> in many countries often focuses on the fight of </span><a data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_immigration" title="Illegal immigration"><span data-dcnode-id="2791" instrument_node="">illegal immigration</span></a><span data-dcnode-id="2789" instrument_node=""> and the strengthening of border controls, it deters displaced persons from entering territory in which they could lodge an asylum claim. The lack of opportunities to legally access the asylum procedures can force displaced persons to undertake often expensive and hazardous attempts at </span><a data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_entry" title="Illegal entry"><span data-dcnode-id="2788" instrument_node="">illegal entry</span></a><span data-dcnode-id="2786" instrument_node="">.
</span></p><p data-dcnode-id="2776"><span data-dcnode-id="2784" instrument_node="">In recent years, the public as well as policy makers of many countries are focusing more and more on refugees arriving through </span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_country_resettlement" title="Third country resettlement"><span data-dcnode-id="2783" instrument_node="">third country resettlement</span></a><span data-dcnode-id="2781" instrument_node=""> and pay less and less attention to asylum seekers and those who have already been granted refugee status but did not come through resettlement. Asylum seekers have even been referred to as 'queue jumpers', because they did not wait for their chance to be resettled.</span><sup class="reference" data-dcnode-id="2778" id="cite_ref-26"><a data-dcnode-id="2779" href="#cite_note-26"><span data-dcnode-id="2780" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2777" instrument_node="">
</span></p><p data-dcnode-id="2770"><span data-dcnode-id="2775" instrument_node="">Legal interpreters are assigned to assist asylum seekers throughout interviews and court proceedings. These legal interpreters reflect the training they received in the training program they were certified in. The accuracy of the legal interpretation may vary depending on the training received from the interpreter and potential biases they carry coming into the interpreting session. Lack of training in asylum settings may influence interpretation sessions.</span><sup class="reference" data-dcnode-id="2772" id="cite_ref-27"><a data-dcnode-id="2773" href="#cite_note-27"><span data-dcnode-id="2774" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2771" instrument_node="">
</span></p><p data-dcnode-id="2756"><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life_%28healthcare%29" title="Quality of life (healthcare)"><span data-dcnode-id="2769" instrument_node="">Quality of life</span></a><span data-dcnode-id="2767" instrument_node=""> of asylum seekers and refugees is highly correlated with the mental health status. The presence of mental disorders like </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depression_%28mood%29" title="Depression (mood)"><span data-dcnode-id="2766" instrument_node="">depression</span></a><span data-dcnode-id="2764" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PTSD" title="PTSD"><span data-dcnode-id="2763" instrument_node="">PTSD</span></a><span data-dcnode-id="2761" instrument_node=""> is mainly due to the forced migration and the resettlement in host countries.</span><sup class="reference" data-dcnode-id="2758" id="cite_ref-PMC_7473035_28-0"><a data-dcnode-id="2759" href="#cite_note-PMC_7473035-28"><span data-dcnode-id="2760" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2757" instrument_node="">
</span></p><span data-dcnode-id="2755" instrument_node="">
</span><h3 data-dcnode-id="2745"><span class="mw-headline" data-dcnode-id="2753" id="Destitution"><span data-dcnode-id="2754" instrument_node="">Destitution</span></span><span class="mw-editsection" data-dcnode-id="2746"><span class="mw-editsection-bracket" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">[</span></span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D12" title="Edit section: Destitution"><span data-dcnode-id="2750" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2743" instrument_node="">Because asylum seekers often have to wait for months or years for the results of their asylum applications and because they are usually not allowed to work and only receive minimal or no financial support, destitution is a considerable risk.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2736" style="white-space:nowrap;"><span data-dcnode-id="2742" instrument_node="">[</span><i data-dcnode-id="2738"><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2740" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="2741" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2737" instrument_node="">]</span></sup><span data-dcnode-id="2735" instrument_node="">
</span></p><p data-dcnode-id="2724"><span data-dcnode-id="2733" instrument_node="">Asylum seekers usually get some kind of support from governments whilst their application is processed. However, in some countries this support ends immediately once they are given refugee status. But the fact that they were given refugee status does not mean that they were already given all the documents they need for starting their new lives.</span><sup class="reference" data-dcnode-id="2730" id="cite_ref-29"><a data-dcnode-id="2731" href="#cite_note-29"><span data-dcnode-id="2732" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2729" instrument_node="">
Long waiting times significantly reduce the likelihood to obtain a job and the social integration of refugees.</span><sup class="reference" data-dcnode-id="2726" id="cite_ref-PMC_7473035_28-1"><a data-dcnode-id="2727" href="#cite_note-PMC_7473035-28"><span data-dcnode-id="2728" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2725" instrument_node="">
</span></p><span data-dcnode-id="2723" instrument_node="">
</span><h2 data-dcnode-id="2713"><span class="mw-headline" data-dcnode-id="2721" id="Refusal_of_asylum"><span data-dcnode-id="2722" instrument_node="">Refusal of asylum</span></span><span class="mw-editsection" data-dcnode-id="2714"><span class="mw-editsection-bracket" data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">[</span></span><a data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D13" title="Edit section: Refusal of asylum"><span data-dcnode-id="2718" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2712" instrument_node="">
</span><link data-dcnode-id="2711" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2704" role="note"><span data-dcnode-id="2710" instrument_node="">Further information: </span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deportation" title="Deportation"><span data-dcnode-id="2709" instrument_node="">Deportation</span></a><span data-dcnode-id="2707" instrument_node=""> and </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Removal_proceedings" title="Removal proceedings"><span data-dcnode-id="2706" instrument_node="">Removal proceedings</span></a></div><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2702" instrument_node="">It often happens that the country neither recognizes the </span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee%23Refugee_status" title="Refugee"><span data-dcnode-id="2701" instrument_node="">refugee status</span></a><span data-dcnode-id="2699" instrument_node=""> of the asylum seekers nor sees them as legitimate migrants and thus treats them as </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alien_%28law%29" title="Alien (law)"><span data-dcnode-id="2698" instrument_node="">illegal aliens</span></a><span data-dcnode-id="2696" instrument_node="">. If an asylum claim has been rejected, the asylum seeker is said to be refused asylum, and called a failed asylum seeker. Some failed asylum seekers are allowed to remain temporarily, some </span><a data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voluntary_return" title="Voluntary return"><span data-dcnode-id="2695" instrument_node="">return home voluntarily</span></a><span data-dcnode-id="2693" instrument_node=""> and some are forcibly returned. The latter are most often placed in </span><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_detention" title="Immigration detention"><span data-dcnode-id="2692" instrument_node="">immigration detention</span></a><span data-dcnode-id="2690" instrument_node=""> before being deported.
</span></p><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">In some cases in which asylum is not granted, the applicant is given the right to remain temporarily. In the UK, refused cases may be granted humanitarian protection (usually for five years) or discretionary leave to remain.
</span></p><span data-dcnode-id="2686" instrument_node="">
</span><h2 data-dcnode-id="2676"><span class="mw-headline" data-dcnode-id="2684" id="Asylum_and_refugee_law_by_jurisdiction"><span data-dcnode-id="2685" instrument_node="">Asylum and refugee law by jurisdiction</span></span><span class="mw-editsection" data-dcnode-id="2677"><span class="mw-editsection-bracket" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">[</span></span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsylum_seeker%26action%3Dedit%26section%3D14" title="Edit section: Asylum and refugee law by jurisdiction"><span data-dcnode-id="2681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2675" instrument_node="">
