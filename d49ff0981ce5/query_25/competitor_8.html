                      After her interview, my wife's case was pending and with "Refused" status for five long months. We have contacted the embassy a few times, but there was no response other than automated generic replies. We were frustrated with the situation.I have searched online to find any solutions, and I came across Josh's video regarding the mandamus law, and I was hesitant at first, so I did more in-depth research, and as a result, I decided to go with it. And I am glad that I did it because only a month after we filed the mandamus, my wife received a call from the embassy to drop her passport at the embassy. After a couple of days, she got a call to collect her passport with the visa at the embassy.I suggest to anyone in the same situation NOT to wait and proceed with mandamus. IT WORKS, and the reason (to my understanding) is that the law mandates that the immigration department should respond in a reasonable time frame, and the only entity that can "order" the immigration agencies to carry out their duty is the justice system and not your senator or anyone else, the only thing they can do is nicely ask them to attend to your case which in most cases does not work.I particularly suggest Josh Goldstein and his team because of my experience with our case. They are experts for this type of case. I worked with them and provided the required information they requested, and they managed to file the suit in a couple of days, and it was completely hassle-free, in my opinion.In the end, I would like to thank Josh and his team for the excellent job that they have done in our case.

                      I would highly recommend Goldstein and Associates for immigration mandamus challenges.  In my experience all communication the staff is very professional, diligent and very efficient .   My IR1 Marriage petition had been stuck over 2  1/2  years in administrative processing despite submitting everything numerous times and polite inquiries from my husband and I on average once a month via email to the Cairo Embassy .  I am blessed to be able to travel to Cairo to spend time with my husband while waiting multiple times , but it was not the life we wanted to have a long distance marriage.After praying and research we learned about Mandamus lawsuit . We saw videos from Josh Goldstein , and we felt hope.  I called and asked questions. I felt worried about retaliation by Egyptian Embassy, but it was the opposite. Our case was filed with the court on December  15th. On December 19th we got an update that our case was out of administrative processing.  By January 23rd the Visa was issued.  By January 27th my husband had the Visa in his hands .I realize everyone’s case is different, but don’t afraid to file a Mandamus lawsuit with Goldstein and Associates. For us it was worth the cost  to be together always and get our case unstuck from Administrative Processing.

                      I’ve been working with Goldstein Immigration to battle one of the toughest US Embassies in the world – the US Embassy in Accra, Ghana. I discovered Josh on YouTube in 2021; after watching several of his videos and reading testimonies, I sought out his services. The process he laid out was very transparent and everything happened according to his timeline. We ran into a few bumps in the road through no fault of his own but because the defense team was unorganized. At the time we filed the mandamus, my husband had not received a visa interview; after our first court deadline, he was given an interview notice a week later. Thereafter, we entered the black hole that is administrative processing. Several miscommunications from the embassy later, and we are still fighting for my husband’s visa to be issued. Our case in the IR1 category and it should not have taken this long as no documents were requested at the time of the visa interview.I will say this, I’m not sure how far we could have come if not for the mandamus. Possibly, we could have still been waiting for an interview at this very moment. The mandamus has provided us with a timeline and a bit of assurance. The results will be different for everyone as some embassies are more difficult than others. However, given the obstacles the previous administration has put in place with regard to immigration, and consulates abroad using the pandemic as a crutch to justify unreasonable delays, I believe the mandamus is very necessary.I truly loved working with this firm. Rebekah is a ray of light and has always provided me with kind words of reassurance throughout the process. This process definitely isn’t for the faint of heart, it’s really tough. It has been 6 months since we filed the mandamus but we are very close to the finish line. I would advise that if you pursue this avenue, to not expect results next week or even next month. You will need to exercise patience and be prayerful. However, never be afraid to ask questions and always review the documentation that is received and sent out regarding your case. At one point, I believe my lengthy emails and questions were annoying but it was a learning experience for us both and Josh and his staff handled it with grace. We do not yet know the outcome of the mandamus, but we are very hopeful.Good luck to all of you out there who are tough circumstances with the US Immigration system. Keep following up regarding your case on a weekly basis, persistence is key, and trust that God will prevail.

                      Hello all,I am writing a long review of Goldstein Immigration Lawyers  hoping to provide a thorough overview.I requested assistance from Goldstein Immigration lawyers in November 2021 due to a delay in my N400 naturalization case.The case was filed personally in June 2020, the case was re-routed to the San Diego, CA office from the online repository; biometrics were to be reused (Notification in February 2021) and the case became "Outside processing time" in October 2021.After many phone calls to USCIS, three USCIS inquiries and two communications with Level-2 USCIS officers, the case was still in limbo, stuck on somebody's desk, and with no clear schedule. In essence, the case was delayed with no clear reason and the only information I received from USCIS was "to keep waiting".In November 2021, after 17 months in process, I requested assistance from Goldstein Immigration Lawyers. I initially contacted them by phone, scheduled an appointment, talked with Joshua Goldstein personally, and started working on the paperwork, all in the span of 3 business days.The communication with Joshua Goldstein was very easy, personal, clear and he asked the pertaining questions to clarify the case even more. He also explained what the processes entail, what information and documents would be necessary, what the expectations were and what the final responses could be. Of course, in these instances, nothing is guaranteed but it was clear from the beginning that Joshua Goldstein knew what to hope and expect for. During the legal process communication with Goldstein Immigration Staff was prompt, available, detailed and continuously updated.I would also like to mention that my conversations with him and with the staff were heartfelt and personable and that they took care of my case quickly, thoroughly and compassionately. Their assistance was instrumental to un-stuck my case. I am happy to mention that the N400 case is over, I obtained the results I wanted to obtain and finally I can move forward and leave this long process behind me.Thank you very much Joshua Goldstein and their staff.If you are thinking on obtaining legal assistance Goldstein Immigration Lawyers are recommended 1000%.Kind regards.

                      My wife had her interview on November 9th of 2020 and the Islamabad Consulate said they needed to review my recent taxes and would give an answer in 2 to 3 weeks. I went to Pakistan to be there for my wife's interview and my plan was to bring her back to US with me. Instead of a few weeks, many months went by and her status was still on refused. I couldn't bring her back with me and then in May, I saw Joshua Goldstein on YouTube talking about suing the Consulate can force them to make a decision. I was frustrated and stressed so I decided to take their service. I was skeptical at first but I prayed on it and went through with it and I couldn't be more happier with my decision. Juni from their office was very quick to take all the information needed and filed the lawsuit in early June and in a little over 2 weeks my wife's visa was being reviewed again by the Consulate!!! She did another medical exam and her visa got issued on July 7th and she is coming to the US shortly so we can finally start our life together. We got married in Jan of 2019 so we waited for a very long time. I would highly recommend if anyone's case is stuck, to take Joshua Goldstein's office to help with their case.

                      I am a US citizen who got married to an Indian citizen in 2019. We first filed the petition with USCIS in October 2019. My wife's case was stuck in Mumbai, India after her interview during March 2021. At the interview, they said her visa was approved. However, days and weeks passed by and we still hadn't received the visa/passport. When we called/emailed the consulate, we never received any useful information on the status of her visa. We found Josh's webinar on YouTube and thought to give it a try. Josh and his team were reassuring from the first call that they would be able to help us. He is very passionate about joining families. That surely has helped us build confidence with him. They answered all our questions and put us at ease with what steps we would have to take.Once his team filed the lawsuit officially against the consulate, my wife's visa came in about 3 weeks! We were so surprised and overjoyed. The crazy thing is the embassy didn't even ask us for any extra documents! We truly believe that if we didn't file the lawsuit, we would have kept waiting for months with no response. My advice to anyone in a similar situation would be to file the mandamus lawsuit. Don't waste your time relying on the embassy to do their job.It was extremely difficult to live without your wife for 1.5 years. Due to COVID I could not even travel to India. Thank you so much to Josh, Juni, and the rest of the team for uniting our family and restoring our happiness!

</span><div class="scrollContent" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">
                      I just recently hired Goldstein Immigration Lawyers to help me with my K1 visa case. Due to delay after delay cause by the Embassy my fiance and I are dealing with; and than the delays of the coronavirus with "no end in sight" as well as a lack of response and actions by the Embassy to resolve our now 18+ month old case which the Embassy "mistakenly" canceled, then moved to "refused", then moved to "administrative processing"; for "failure to pursue, even after having my US Congressional Representative follow up on our case twice...we decided an attorney was the right way to go. We have felt singled out in many ways as an LGBT couple; attempting a K1 visa from a very Catholic country. Josh Goldstein's intake team was friendly. They have a flat rate fee for cases like ours when filing a Writ of Mandamus Lawsuit against "everyone" who has/will ever have any power over your immigration case. Josh himself heard about our case from his paralegal and before we signed on he wanted to talk to us personally. Our conversation is what convinced me, and put me at ease about taking this huge step, and paying the rather large (but reasonable, especially in comparison to other lawyers) fee. His own wife was a K1 visa from the same country as my fiance; so he knew the political climate, and the stress and anxiety of being in an LDR awaiting the love of your life. When I first saw the list of defendants it was overwhelming...but it was very clear that he knew what he was doing, and who to go after. I found Josh Goldstein when searching Google for "what can I do in this situation"; and it took me to his website and YouTube channel. His videos are very informative and answered most of our questions. Since hiring him there's been some changes in our "status" Josh's team has been great at responding. We are still currently awaiting our initial response after filing the Supreme Court lawsuit in DC. However this is the 1st glimpse of true hope we have had. I will update this review after we receive our response, and/or get our hearing results. So far I would highly recommend Josh Goldstein Immigration Lawyers. He's the best one possible in my book; and I thoroughly researched him prior to even contacting his law firm.

                      If I were to write a book about my situation it wouldn’t have been enough. Everything started back in February 2020 where my husband had his interview and I went back home to be with him during his happy moments but everything became a bad nightmare right after his interview, his case was stuck in Administrative Processing . We did not know what that meant because me or my family member never had to face a situation like this. We both did so many things to get a result from the Embassy/Consulate, even the Congressmen but we were always discouraged by their responses. So many people gave many suggestions but nothing worked out. Then suddenly on November Joshua Goldstein’s Youtube page popped up while I was checking my Youtube feed. And I saw a video where it was titled “What to do if your case is put in Administrative Processing”, and “How to File a Lawsuit”. I didn’t even know what lawsuit meant. I had to search it up. To be honest, I didn’t  trust the mandamus lawsuit procedure after reading about it because I thought it was fake.I even thought Josh was fake. (I’m sorry, I don’t want to sound  mean but I felt that way when I first saw your video </span><img alt="🙈" class="emoji" data-dcnode-id="2444" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f648.svg&amp;raw"><span data-dcnode-id="2443" instrument_node="">) And it’s obvious to feel that way because none of my family members have been in any situation where their case was put in Administrative Processing for NO VALID REASON and they had to file a lawsuit. After watching many of his videos me and my husband were actually thinking if we should hire Josh or not. Then in December we were planning on make an inquiry and see how it goes. We then spoke to Josh and inquired about things we had to ask him. But guess what, we backed off, because we weren’t satisfied. We both said no we are not filing a lawsuit. At that time I was 6 month pregnant. I had to go through so much depression just for case that was stuck in a position for no reason. Then in January  I contacted Josh and said lets get things going, lets start this, but again me and my husband had so many thoughts we backed off again. Then in February I told my husband, look we need to get this visa approved, day by day my condition is worsening and I can’t let my baby suffer, so we finally tested our luck and started the procedure. After 3 months a miracle happened. I was talking to my husband one night and he sent me a screenshot. I was just reading it through and the minute I saw issued I was like is this true, did u put in someone else's case number or yours. I reread it and the minute I saw it I was in tears, tears that came out in joy because after 16 months he finally  got his visa approved all with the help of Josh.I quickly texted Josh and thanked him for everything he has done. If it wasn’t for Josh my husbands case would’ve still been in Administrative Processing and nothing would’ve happened. Thank you so much for everything you have done Josh, I can’t thank you enough.

</span><div class="scrollContent" data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">
                      My mom had an immigration visa interview in September 2019 in Russia and even though the visa should have been approved on the spot the case was put in Administrative Processing.  We tried contacting them with no answer. The case was stuck for no apparent reason. On top of that, COVID hit in March 2020 and the embassy closed. We contacted Josh Goldstein in June 2020, we were referred to him by our immigration lawyer who advised us to consider filing a mandamus law suit to get the case moving again. Josh was very helpful and the lawsuit was filed right away. He did warn us that it may take longer than usual because of COVID.  We did end up getting through to the embassy via congressional inquiries ( which I also highly recommend, the embassies are only obliged to answer those not your personal inquiries) and they told us due to COVID they were not doing any routine visa processing currently but as soon as they start working again, they will place this case on a priority list. In March 2021 when COVID restrictions started to lift worldwide we received a communication from the embassy that they are ready to process moms visa. Within a month of that notification the visa was approved!!! I’m positive that without the lawsuit they would feel no pressure of prioritizing our case and we would be stuck in another backlog of thousands of cases they would have to address  after being closed for a year due to COVID.  I’m very thankful to Josh Goldstein and his firm for helping to get my mom’s visa approved.  Our family is finally reunited again!!!

                      I was worse skeptical than anyone reading this review. I thought the embassy would backlash me for filing a lawsuit &amp; Josh would take my money and say goodbye like some lawyers do in NYC. I thought I would chase Josh's car in beverly hills on my 18 wheels truck if he would piss me off </span><img alt="😂" class="emoji" data-dcnode-id="2207" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f602.svg&amp;raw"><span data-dcnode-id="2206" instrument_node="">.1. Oct 2019, IV Interview, refused under 221(g) additional documents2. Nov 20, 2020 filed mandamus3. April 8, 2021 US Embassy contacted with appointmentJosh approaches every case individually as his own family, I messaged him 2AM-3AM morning with questions &amp; he woke up to respond my concerns immediately. Do you know any lawyer who responds early morning 2AM-3AM?) He kept me updating of every process.I filed mandamus for my family’s immigrant visas adjudication only, but it also affected in expediting other unrelated cases sitting in USCIS. Yes, that’s true, my parents’ &amp; my green card renewal took 1 month!! I believe filing mandamus may affect your other unrelated cases sitting in same federal agencies &amp; they may be expedited.If you have been waiting because of 221(g) &amp; other federal agencies responses too long time, don’t even think waiting further, consult with Josh, he doesn’t chase your money he chases for results! He also has beautiful family &amp; every family unification is important for him, I witnessed!Mr. Goldstein, ROCK N ROLL &amp; YOU ROCKED THIS CASE! THANK YOU &amp; GOD BLESS YOU &amp; YOUR FAMILY! I’LL NEVER FORGET YOUR NAME!

                      People say to me "A lawsuit? Are you crazy? That would never work! The Consulate will just get mad and deny the visa" Or - "The lawsuit won't work because the Consulate is closed during the pandemic"Goldstein Immigration Law firm is a firm I would recommend to anyone who is looking for an immigration Lawyer, they go the extra mile to get the job done, Josh Goldstein always update and educate on the latest news on immigration check out his YouTube channel: Immigration Station, His staff is friendly and effective and have a high level of customer service.I'm so glad I chose Goldstein Law Firm. The team led by Josh Goldstein, alongside the wonderful Jessica and Linnea, acted with rare professionalism and skill. Aside from the excellent work, the great staff managed to meet the tight schedule, all while a global pandemic situation. I wholeheartedly recommend hiring their services, you will not regret it.Josh Goldstein and his team are great professionals who dedicate their time and energy to help each client individually. Although my case was complicated, I had a piece of mind knowing that Josh was handling it. He and his team genuinely care about their clients and do their best to reach the best outcomes. I feel honored to show my gratitude and appreciation for this law office. They were available and flexible every time I needed their assistance and always exceeded my expectations. The most important thing is that they never leave their clients on the way and always fight to protect their interests.Regarding my Case and People’s Perception:People say to me "A lawsuit? Are you crazy? That would never work! The Consulate will just get mad and deny the visa" Or - "The lawsuit won't work because the Consulate is closed during the pandemic"Undoubtedly Josh and his team is one of the most experienced and knowledgeable lawyers I’ve ever met! Josh Goldstein give me the assurance and work thru a plan on how to get my mom’s case approved.In the first hearing about mandamus lawsuit; I was scared and also terrified what if in case Consulate Officer Retaliate against me and deny my mom’s case but that’s not how it works.Josh was kind enough to take his time and go above and beyond to make me understand that lawsuit is the only way for my mom case to become UN.STUCK.Long story short my mom’s case was in Administrative Processing / Refused state for over 4 years, We tried every possible communication method with Embassy, Reached out to Congressman and sent multiple inquiries about my mom’s case but no traction. I was done waiting and waiting for over 4 years. After putting faith on Josh Goldstein and proceeding forward with mandamus lawsuit and suing various government agencies within 4 months my mother’s VISA was approved.IF YOU WAITED FOR OVER ONE YEAR AND YOUR VISA IS NOT APPROVED, THE ONLY WAY TO GET IT APPROVED IS TO FILE MANDAMUS LAWSUITE AND GOLDSTEIN LAW FIRM IS YOUR BEST BET!I would like to re-emphasis that if I would have waited until now and not proceeded with lawsuit my mother’s case would have been in Refused State and the only way for getting it approved is to file a Mandamus Lawsuit.My deepest appreciation and prayers to Josh and his family, Thank you Josh for all you do and you are very lucky to have a job that makes the biggest impact on people’s life, Your commitment and extra effort is admired! You are a brother and very dear to my family. THANK YOU!

                      People say to me "A lawsuit? Are you crazy? That would never work! The Consulate will just get mad and deny the visa" Or - "The lawsuit won't work because the Consulate is closed during the pandemic"Goldstein Immigration Law firm is a firm I would recommend to anyone who is looking for an immigration Lawyer, they go the extra mile to get the job done, Josh Goldstein always update and educate on the latest news on immigration check out his YouTube channel: Immigration Station, His staff is friendly and effective and have a high level of customer service.I'm so glad I chose Goldstein Law Firm. The team led by Josh Goldstein, alongside the wonderful Jessica and Linnea, acted with rare professionalism and skill. Aside from the excellent work, the great staff managed to meet the tight schedule, all while a global pandemic situation. I wholeheartedly recommend hiring their services, you will not regret it.Josh Goldstein and his team are great professionals who dedicate their time and energy to help each client individually. Although my case was complicated, I had a piece of mind knowing that Josh was handling it. He and his team genuinely care about their clients and do their best to reach the best outcomes. I feel honored to show my gratitude and appreciation for this law office. They were available and flexible every time I needed their assistance and always exceeded my expectations. The most important thing is that they never leave their clients on the way and always fight to protect their interests.Regarding my Case and People's Perception:People say to me "A lawsuit? Are you crazy? That would never work! The Consulate will just get mad and deny the visa" Or - "The lawsuit won't work because the Consulate is closed during the pandemic"Undoubtedly Josh and his team is one of the most experienced and knowledgeable lawyers I've ever met! Josh Goldstein give me the assurance and work thru a plan on how to get my mom's case approved.In the first hearing about mandamus lawsuit; I was scared and also terrified what if in case Consulate Officer Retaliate against me and deny my mom's case but that's not how it works.Josh was kind enough to take his time and go above and beyond to make me understand that lawsuit is the only way for my mom case to become UN.STUCK.Long story short my mom's case was in Administrative Processing / Refused state for over 4 years, We tried every possible communication method with Embassy, Reached out to Congressman and sent multiple inquiries about my mom's case but no traction. I was done waiting and waiting for over 4 years. After putting faith on Josh Goldstein and proceeding forward with mandamus lawsuit and suing various government agencies within 4 months my mother's VISA was approved.IF YOU WAITED FOR OVER ONE YEAR AND YOUR VISA IS NOT APPROVED, THE ONLY WAY TO GET IT APPROVED IS TO FILE MANDAMUS LAWSUITE AND GOLDSTEIN LAW FIRM IS YOUR BEST BET!I would like to re-emphasis that if I would have waited until now and not proceeded with lawsuit my mother's case would have been in Refused State and the only way for getting it approved is to file a Mandamus Lawsuit.My deepest appreciation and prayers to Josh and his family, Thank you Josh for all you do and you are very lucky to have a job that makes the biggest impact on people's life, Your commitment and extra effort is admired! You are a brother and very dear to my family. THANK YOU!

                      Where do I begin.....Josh Goldstein has been amazing throughout this entire process. My nightmare began when my now husband got denied entry to the US and his visitor visa revoked in May 2019. We were returning from a romantic vacation and it was destroyed by this denial. It was late on a Tuesday night that this occurred. I was an emotional wreck. I desperately started looking for an immigration attorney and left messages for several. Only ONE person responded that night.....Josh Goldstein. He called me and assured me that he would get my husband back in the USA.  He messaged with me late into the night checking on me and reassuring me that all would be fine. It gave me some comfort during one of the worst times of my life.Upon returning to my home state, I met with him the next day and our journey began. He and his team are attentive and have made sure all our forms and applications have been on point. I have read so many horror stories about bringing your spouse to USA and having an attorney has alleviated that stress. Making sure that everything is filled out correctly and packaged together well is essential in this process. Josh and his team make sure that everything goes off without a hitch. He always makes time to answer questions and alleviate worries. It's such a personal touch that he himself reaches out during his personal time....you can even hear his kids in the background. </span><img alt="🙂" class="emoji" data-dcnode-id="1069" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="1068" instrument_node="">  You feel looked after and taken care of.....not like a number or a dollar sign. Well its November 2020 and my husband is coming home as promised. I highly recommend Josh Goldstein and his team for all your immigration issues. I know he will be with me every step of the way until my husband becomes a US citizen.

                      At the start of 2018 i went looking for an immigration attorney and a miracle. Some good reviews led me to Joshua Goldstein, and almost 3 years later a green card. My case wasn't easy, lack of documents and no sponsor. Joshua and his staff guided me through and always kept me informed about the progress of my case. From last minute Co-sponsors to missing documents Joshua never let me give up. Finally my I-485 interview came and Joshua was there with me to guide me through the interview. It's been a long journey for me to this point, having a green card and legal status. I am truly grateful and thankful for all the work the attorneys at Joshua Goldstein have done for methank you thank you thank you

</span></div></div><span data-dcnode-id="951" instrument_node=""> </span><span data-dcnode-id="949" instrument_node=""> </span></div><div class="content-width flex" data-dcnode-id="686"><section class="main-content" data-dcnode-id="797"><h2 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">How do I apply for asylum in the U.S.?</span></h2><p data-dcnode-id="943"><span data-dcnode-id="944" style="font-weight: 400;"><span data-dcnode-id="945" instrument_node="">There are 2 different ways to apply for asylum in the United States depending on whether you have a hearing in Immigration Court. </span></span></p><p data-dcnode-id="925"><b data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Affirmative Asylum: </span></b><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">Applications are submitted by people who are in the United States but are not in removal or deportation proceedings and who do not have a hearing in Immigration Court. Removal or deportation proceedings begin when the Immigration and Customs Enforcement (ICE) serves you with a Notice to Appear telling you to report to Immigration Court for a hearing.</span></span><span data-dcnode-id="938" instrument_node=""> </span><span data-dcnode-id="936" style="font-weight: 400;"><span data-dcnode-id="937" instrument_node="">If you are not in removal or deportation proceedings, generally you file for asylum affirmatively by submitting your </span></span><a data-dcnode-id="933" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/sites/default/files/files/form/i-589.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="934" style="font-weight: 400;"><span data-dcnode-id="935" instrument_node="">I-589 application for asylum</span></span></a><span data-dcnode-id="931" style="font-weight: 400;"><span data-dcnode-id="932" instrument_node=""> to USCIS (U.S. Citizenship and Immigration Services). You will then be notified about an interview at the </span></span><a data-dcnode-id="928" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/about-us/find-uscis-office/field-offices/california-los-angeles-field-office" rel="nofollow" target="_blank"><span data-dcnode-id="929" style="font-weight: 400;"><span data-dcnode-id="930" instrument_node="">USCIS Los Angeles District Office</span></span></a><span data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="927" instrument_node=""> or the locale USCIS near you where an immigration officer will ask you about your claim for asylum.</span></span></p><p data-dcnode-id="920"><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Defensive Asylum: </span></b><span data-dcnode-id="921" style="font-weight: 400;"><span data-dcnode-id="922" instrument_node="">If you are in removal or deportation proceedings, except in certain cases where you were a child when you entered the U.S., you file for asylum defensively by submitting your application to the Immigration Court in Los Angeles or the immigration court in the jurisdiction where you live. The Immigration Court will then schedule your case for a hearing where you can present your case.</span></span></p><h2 data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">How long does it take to get an asylum interview?</span></h2><p data-dcnode-id="915"><span data-dcnode-id="916" style="font-weight: 400;"><span data-dcnode-id="917" instrument_node="">The delays can be frustrating. But due to immigration case backlogs, your asylum interview or hearing may take place anywhere from several months to several years after you file your application. Having an immigration lawyer can sometimes affect the timing of your case in a way that might be a benefit you.</span></span></p><h2 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">New procedures for filing asylum application in Immigration Court!</span></h2><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">On September 14, 2016, the rules for filing asylum applications in Immigration Court changed. In the past, you were required to wait until a scheduled hearing to file your application directly with the Immigration Judge. But now, you can now file your application by mail or at the court’s filing window. If you have a future immigration court hearing scheduled, there is no reason to delay speaking with an attorney as you may now be able to filing your asylum application immediately.</span></p><h2 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Do I have to file for asylum within one year of coming to the U.S.?</span></h2><p data-dcnode-id="901"><span data-dcnode-id="907" style="font-weight: 400;"><span data-dcnode-id="908" instrument_node="">U.S. immigration laws require you to file for asylum within one year of entering the United States. Here are a few </span></span><a data-dcnode-id="904" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/sites/default/files/USCIS/Humanitarian/Refugees%2520%2526%2520Asylum/Asylum/AOBTC%2520Lesson%2520Plans/One-Year-Filing-Deadline-31aug10.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="905" style="font-weight: 400;"><span data-dcnode-id="906" instrument_node="">exceptions to this one-year deadline for asylum</span></span></a><span data-dcnode-id="902" style="font-weight: 400;"><span data-dcnode-id="903" instrument_node="">:</span></span></p><p data-dcnode-id="896"><b data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Changed Circumstances </span></b><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">that affect your eligibility for asylum (for example: &nbsp;changes in the conditions in your home country, changes in immigration law, changes to your personal circumstances such as becoming a political activist or converting to another religion or being more open about your sexual orientation (i.e. coming out)); or </span></span></p><p data-dcnode-id="891"><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Extraordinary Circumstances </span></b><span data-dcnode-id="892" style="font-weight: 400;"><span data-dcnode-id="893" instrument_node="">that explain why you didn’t file within the first year of being in the U.S. such as, for instance, a medical or psychological issue, hospitalization or post-traumatic stress disorder.</span></span></p><p data-dcnode-id="888"><span data-dcnode-id="889" style="font-weight: 400;"><span data-dcnode-id="890" instrument_node="">But even if one of the exceptions applies to you, you must still apply within a “reasonable time” after the circumstances that fit the exception took place. An immigration lawyer can help you decide whether your case might fall under one of the exceptions to the one year filing deadline.</span></span></p><h2 data-dcnode-id="885"><b data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Can I win asylum because of crime and violence in my country?</span></b></h2><p data-dcnode-id="882"><span data-dcnode-id="883" style="font-weight: 400;"><span data-dcnode-id="884" instrument_node="">Asylum depends heavily on the specific facts of your life. While the general danger presented by crime, violence, and war in your home country is part of any asylum application, it’s usually not enough on its own to win asylum. A Los Angeles asylum lawyer&nbsp;can analyze your personal history and help identify the facts of your life and those conditions in your country that are most relevant to your claim for asylum in the U.S.</span></span></p><h3 data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">How do I win asylum in the U.S.?</span></h3><p data-dcnode-id="877"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">The key to winning an asylum claim is to show either that you previously suffered “persecution” (more than just discrimination or harassment), or that you have a well-founded fear of future persecution in your country. Immigration laws say that the persecution you suffered or fear you will suffer must be for specific reasons. Those reasons are your race, religion, nationality, political opinion, or membership in what the law calls a “particular social group.” You also have to be able to show that the persecution was or will be inflicted by the government of your country or some other person or group that the government cannot or will not control. An effective immigration lawyer can help you figure out if your case meets these criteria and can work with you to demonstrate to the immigration officer or judge exactly how your case fits those elements, or help you with filing a I-730.</span></span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Immigration laws places the burden on you to prove all of the facts necessary to show that you are eligible for asylum. An immigration lawyer can help guide you through all of these many requirements and explain to you what kind of evidence is necessary to have the best possible chance of winning asylum in the U.S.</span></p><h3 data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">What is a particular social group?</span></h3><p data-dcnode-id="870"><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node="">If you have suffered persecution in the past or you fear future harm that is not related to your race, religion, nationality, or political opinion, you may still be eligible for asylum if you face harm due to your membership in a “particular social group.” A particular social group is a group that involves characteristics you can’t or shouldn’t have to change (such as your gender, sexual orientation, family relationships, or past life experiences), that is distinct (meaning that it’s easy to define who is and isn’t part of the group), and that the rest of society in your country views as being somehow different. In many cases, defining your particular social group to meet the many legal requirements can be the most important and difficult part of winning your case. An experienced asylum lawyer can help you define your particular social group in way that stands the best chance of being legally recognized by U.S. immigration authorities.</span></span></p><h2 data-dcnode-id="867"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Can applying for asylum get me a work permit?</span></strong></h2><p data-dcnode-id="864"><span data-dcnode-id="865" style="font-weight: 400;"><span data-dcnode-id="866" instrument_node="">A work permit (sometimes called an Employment Authorization Document or “EAD”) is an important immigration benefit available to those who apply for asylum. But your eligibility for the work permit &nbsp;depends on a variety of different factors, including how quickly the court or the asylum office can schedule your case to be heard. Qualifying for a work permit based on an asylum application requires you to take a series of specific steps within a specific period of time, and missing one of these steps could prevent you from qualifying at all. Your current immigration status also affects your eligibility, as well as the amount of time it will take you to get your work permit.</span></span></p><h3 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">How soon can I get a work permit after applying for asylum?</span></h3><p data-dcnode-id="859"><span data-dcnode-id="860" style="font-weight: 400;"><span data-dcnode-id="861" instrument_node="">If applying for asylum is your only basis for requesting a work permit (and depending on how you entered the U.S.), you must generally wait 150 days from the time your I-589 asylum application is filed to apply for your work permit, and you cannot be issued a work permit until 180 days after you file your application. In practice, because of delays by the government, it can often take much longer than 180 days from the date the application is filed for you, as a qualifying asylum applicant, to receive your work permit. If the immigration agency is taking an unnecessarily long time to approve or issue your work permit, a lawyer can sometimes help speed the process up or resolve the delay.</span></span></p><h2 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">What happens if I win asylum?</span></h2><p data-dcnode-id="854"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">If you win asylum in the U.S., you will have asylee status and can:</span></span></p><ul data-dcnode-id="839"><li data-dcnode-id="851" style="font-weight: 400;"><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">Live and work legally in the United States indefinitely;</span></span></li><li data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node="">File an </span></span><a data-dcnode-id="846" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/i-730" rel="nofollow" target="_blank"><span data-dcnode-id="847" style="font-weight: 400;"><span data-dcnode-id="848" instrument_node="">I-730 asylee / refugee relative petition</span></span></a><span data-dcnode-id="844" style="font-weight: 400;"><span data-dcnode-id="845" instrument_node=""> that will bring your children and spouse to the United States to join you; and</span></span></li><li data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node="">Apply for apply for a green card after one year of being an asylee.</span></span></li></ul><p data-dcnode-id="836"><span data-dcnode-id="837" style="font-weight: 400;"><span data-dcnode-id="838" instrument_node="">But your immigration case is not over once you win asylum, since you will still have a variety of legal obligations that an immigration lawyer can help make sure you comply with. It is legally possible to gain U.S. citizenship six years after being granted asylum (five years after getting a green card), but there are many additional requirements to meet and evidence to produce to make that happen. Staying in touch with an immigration lawyer even after you are granted asylum is important to continue your path to citizenship, and to ensure you don’t do anything that could put you in danger of losing your asylum status.</span></span></p><h3 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Can I go back to my country if I’m granted asylum?</span></h3><p data-dcnode-id="828"><span data-dcnode-id="829" style="font-weight: 400;"><span data-dcnode-id="833" instrument_node="">Immigration laws do not prohibit you from traveling back to your country after being granted asylum in the United States, but returning to your country may undermine the basis of your asylum claim, i.e., that you are or were genuinely afraid of suffering harm there. Unless you are a </span><a data-dcnode-id="831" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrationlawyerslosangeles.com/los-angeles-citizenship-and-naturalization-lawyer/"><span data-dcnode-id="832" instrument_node="">U.S. citizen</span></a><span data-dcnode-id="830" instrument_node="">, you should always consult with an immigration lawyer before any international travel, as leaving the country may permanently affect your ability to return in the future.</span></span></p><h3 data-dcnode-id="825"><b data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">What if I’m not eligible for asylum but am still afraid to go back to my country?</span></b></h3><p data-dcnode-id="822"><span data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">Even if you aren’t eligible for asylum, there are other, somewhat similar forms of immigration relief you can be granted based on a fear of returning to your country. These include:</span></span></p><ul data-dcnode-id="817"><li data-dcnode-id="818"><b data-dcnode-id="819"><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Withholding of Removal</span></b></b></li></ul><ul data-dcnode-id="813"><li data-dcnode-id="814" style="font-weight: 400;"><b data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">CAT (protection under the United Nations Convention Against Torture).</span></b></li></ul><p data-dcnode-id="810"><span data-dcnode-id="811" style="font-weight: 400;"><span data-dcnode-id="812" instrument_node="">While the application processes for these protections are similar to applying for asylum, in many cases winning withholding of removal or protection under the CAT is more difficult than winning asylum. An experienced immigration lawyer can give you your best chance of being granted these forms of protection.</span></span></p><h2 data-dcnode-id="807"><b data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Ask for Help from a Los Angeles Asylum Attorney</span></b></h2><p data-dcnode-id="804"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">If you live in the Los Angeles area, the help of an effective and experienced asylum lawyer can make all the difference in their outcome of your immigration case. At the Goldstein Immigration Lawyers, we have a reputation throughout Los Angeles and Southern California for being persistent and diligent and for getting successful results for clients who seek asylum.</span></span></p><p data-dcnode-id="798"><span data-dcnode-id="799" style="font-weight: 400;"><span data-dcnode-
