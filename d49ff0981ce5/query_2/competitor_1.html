</span><h1 class="page-title" data-dcnode-id="404"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="406" property="schema:name"><span data-dcnode-id="407" instrument_node="">Refugee Rights in the UK: Know the Facts</span></span><span data-dcnode-id="405" instrument_node="">
</span></h1><span data-dcnode-id="403" instrument_node="">
</span></div><span data-dcnode-id="401" instrument_node="">
</span><div class="block block-system block-system-main-block" data-dcnode-id="158" id="block-ach-content"><span data-dcnode-id="400" instrument_node="">
</span><article about="/news-and-features/refugee-rights-uk-know-facts" class="node node--type-article node--view-mode-full" data-dcnode-id="160" data-history-node-id="477" role="article" typeof="schema:Article"><span data-dcnode-id="399" instrument_node="">
</span><div class="top-area" data-dcnode-id="375"><span data-dcnode-id="398" instrument_node="">
</span><div class="field field--name-field-image field--type-image field--label-hidden field__item" data-dcnode-id="394"><span data-dcnode-id="397" instrument_node=""> </span><img alt="Refugees immigration concept illustration " class="image-style-free-crop-max-1920px-" data-dcnode-id="396" height="1728" loading="lazy" property="schema:image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ach.org.uk/sites/default/files/styles/free_crop_max_1920px_/public/2019-06/shutterstock_1013890444.jpg%3Fh%3Db0689c81%26itok%3DjR1u50dH&amp;raw" typeof="foaf:Image" width="1920"><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
</span><div class="header-container" data-dcnode-id="377"><span data-dcnode-id="392" instrument_node="">
</span><div class="details" data-dcnode-id="379"><span data-dcnode-id="391" instrument_node="">
</span><h1 data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">
</span><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="388" property="schema:name"><span data-dcnode-id="389" instrument_node="">Refugee Rights in the UK: Know the Facts</span></span><span data-dcnode-id="387" instrument_node="">
</span></h1><span data-dcnode-id="385" instrument_node="">
</span><div class="field field--name-field-date field--type-datetime field--label-hidden field__item" data-dcnode-id="381"><time class="datetime" data-dcnode-id="383" datetime="2019-06-17T12:00:00Z"><span data-dcnode-id="384" instrument_node="">Monday 17th June 2019</span></time><span data-dcnode-id="382" instrument_node="">
</span></div><span data-dcnode-id="380" instrument_node="">
</span></div><span data-dcnode-id="378" instrument_node="">
</span></div><span data-dcnode-id="376" instrument_node="">
</span></div><span data-dcnode-id="374" instrument_node="">
</span><span class="rdf-meta hidden" content="Refugee Rights in the UK: Know the Facts" data-dcnode-id="373" property="schema:name"></span><span data-dcnode-id="372" instrument_node="">
</span><div class="node__content" data-dcnode-id="162"><span data-dcnode-id="371" instrument_node="">
</span><div class="field field--name-field-sidebar field--type-entity-reference-revisions field--label-hidden field__item" data-dcnode-id="366"><span data-dcnode-id="370" instrument_node=""> </span><div class="paragraph paragraph--type--sidebar paragraph--view-mode--default" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__items" data-dcnode-id="164"><span data-dcnode-id="364" instrument_node="">
</span><div class="field__item" data-dcnode-id="166" property="schema:text"><p data-dcnode-id="359" dir="ltr"><span data-dcnode-id="363" instrument_node="">Looking for the genuine facts about refugee rights in the UK? Then you’ve come to the right place. According to the </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/"><span data-dcnode-id="362" instrument_node="">UN Refugee Agency</span></a><span data-dcnode-id="360" instrument_node="">, there were 121,837 refugees, 40,365 pending asylum cases and 97 stateless persons in the UK at the end of 2017. Here are the answers to some of your most frequently asked questions.</span></p><span data-dcnode-id="358" instrument_node="">
</span><h2 data-dcnode-id="355" dir="ltr"><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">What rights do refugees have?</span></strong></h2><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352" dir="ltr"><span data-dcnode-id="353" instrument_node="">All refugees have the right to safe asylum. Of course, this applies to more than just physical safety. Refugees share the same human rights as legal residents, including:</span></p><span data-dcnode-id="351" instrument_node="">
</span><ul data-dcnode-id="325"><span data-dcnode-id="350" instrument_node="">
</span><li data-dcnode-id="345" dir="ltr"><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347" dir="ltr"><span data-dcnode-id="348" instrument_node="">Freedom of opinion and expression</span></p><span data-dcnode-id="346" instrument_node="">
</span></li><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="339" dir="ltr"><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341" dir="ltr"><span data-dcnode-id="342" instrument_node="">Freedom of thought, conscience, and religion</span></p><span data-dcnode-id="340" instrument_node="">
</span></li><span data-dcnode-id="338" instrument_node="">
</span><li data-dcnode-id="333" dir="ltr"><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335" dir="ltr"><span data-dcnode-id="336" instrument_node="">Freedom from torture or degrading treatment</span></p><span data-dcnode-id="334" instrument_node="">
</span></li><span data-dcnode-id="332" instrument_node="">
</span><li data-dcnode-id="327" dir="ltr"><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329" dir="ltr"><span data-dcnode-id="330" instrument_node="">The right to life, liberty, security and freedom from discrimination</span></p><span data-dcnode-id="328" instrument_node="">
</span></li><span data-dcnode-id="326" instrument_node="">
</span></ul><span data-dcnode-id="324" instrument_node="">
</span><h2 data-dcnode-id="321" dir="ltr"><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">What is the international law on refugees?</span></strong></h2><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="315" dir="ltr"><span data-dcnode-id="319" instrument_node="">Refugee law refers to the branch of international law that covers refugee rights and protection. Among academics, there are conflicting opinions about the relationship between this and </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_human_rights_law"><span data-dcnode-id="318" instrument_node="">international human rights law</span></a><span data-dcnode-id="316" instrument_node="">, since there is naturally some overlap. The primary difference is that the former allows for state sovereignty, while the latter does not.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">Another key feature of international refugee law is </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/4d9486929.pdf"><span data-dcnode-id="312" instrument_node="">non-refoulement</span></a><span data-dcnode-id="310" instrument_node="">: this forbids a country from returning asylum seekers to a country in which they would be in danger of persecution based on race, religion, nationality, political membership or political opinion.</span></p><span data-dcnode-id="308" instrument_node="">
</span><h2 data-dcnode-id="305" dir="ltr"><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">What does refugee status in the UK mean?</span></strong></h2><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="296" dir="ltr"><span data-dcnode-id="303" instrument_node="">Refugee status is granted to those the Home Office recognises as refugees, as outlined in the </span><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/1951-refugee-convention.html"><span data-dcnode-id="302" instrument_node="">Refugee Convention</span></a><span data-dcnode-id="300" instrument_node="">. When a person achieves official refugee status, they are usually given leave to remain in the UK for up to five years, after which time they can apply for </span><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settle-in-the-uk"><span data-dcnode-id="299" instrument_node="">Indefinite Leave to Remain</span></a><span data-dcnode-id="297" instrument_node="">. But the system isn’t perfect. On receiving refugee status, individuals are given 28 days to find new accommodation and apply for benefits. It’s at this stage that many refugees become homeless – it’s already challenging for DSS tenants to find a rental property. Unlike asylum seekers, refugees have permission to work in the UK.</span></p><span data-dcnode-id="295" instrument_node="">
</span><h2 data-dcnode-id="292" dir="ltr"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Can refugees become UK citizens?</span></strong></h2><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="286" dir="ltr"><span data-dcnode-id="290" instrument_node="">Refugees can apply for a permanent UK visa after five years, also known as Indefinite Leave to Remain. In order to apply for British citizenship, you must have been granted ILR and continue to live in the UK for a further 12 months. For some, there is the option to apply for citizenship by naturalisation. </span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/british-citizenship"><span data-dcnode-id="289" instrument_node="">Check if you can become a British citizen here</span></a><span data-dcnode-id="287" instrument_node="">.</span></p><span data-dcnode-id="285" instrument_node="">
</span><h2 data-dcnode-id="282" dir="ltr"><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Can refugees work in the UK?</span></strong></h2><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276" dir="ltr"><span data-dcnode-id="280" instrument_node="">Refugees are granted permission to work in the UK within any profession, at any skill level (see our </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ach.org.uk/refugee-bame-employment-programmes-training"><span data-dcnode-id="279" instrument_node="">employment and training programs</span></a><span data-dcnode-id="277" instrument_node="">). Those unable to work can also apply for welfare benefits. Getting a National Insurance number is no longer an issue; NI numbers are now printed on people’s BRPs when they get refugee status – a relatively recent change.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Asylum seekers are not allowed to work in the UK while their claim is still being considered, but they are encouraged to volunteer. During this time, they have the right to claim temporary accommodation and basic living support.</span></p><span data-dcnode-id="272" instrument_node="">
</span><h2 data-dcnode-id="269" dir="ltr"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">How much benefit does a refugee get?</span></strong></h2><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266" dir="ltr"><span data-dcnode-id="267" instrument_node="">Refugees stop receiving asylum support on receiving refugee status, however, they may be eligible for certain welfare benefits, including:</span></p><span data-dcnode-id="265" instrument_node="">
</span><ul data-dcnode-id="227"><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="259" dir="ltr"><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261" dir="ltr"><span data-dcnode-id="262" instrument_node="">Income Support – to help you cover your costs if you’re on a low income</span></p><span data-dcnode-id="260" instrument_node="">
</span></li><span data-dcnode-id="258" instrument_node="">
</span><li data-dcnode-id="253" dir="ltr"><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255" dir="ltr"><span data-dcnode-id="256" instrument_node="">Jobseeker’s Allowance – an unemployment benefit you can claim while looking for work</span></p><span data-dcnode-id="254" instrument_node="">
</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="247" dir="ltr"><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249" dir="ltr"><span data-dcnode-id="250" instrument_node="">Employment and Support Allowance – if you cannot work because of illness or disability</span></p><span data-dcnode-id="248" instrument_node="">
</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="241" dir="ltr"><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243" dir="ltr"><span data-dcnode-id="244" instrument_node="">Pension Credit – an income-related benefit for people over 65</span></p><span data-dcnode-id="242" instrument_node="">
</span></li><span data-dcnode-id="240" instrument_node="">
</span><li data-dcnode-id="235" dir="ltr"><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237" dir="ltr"><span data-dcnode-id="238" instrument_node="">Universal Credit – to support you if you’re working on a low income or you’re out of work</span></p><span data-dcnode-id="236" instrument_node="">
</span></li><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="229" dir="ltr"><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231" dir="ltr"><span data-dcnode-id="232" instrument_node="">Refugee integration loan – an interest-free loan for refugees or those under humanitarian protection</span></p><span data-dcnode-id="230" instrument_node="">
</span></li><span data-dcnode-id="228" instrument_node="">
</span></ul><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">Speak to your local </span><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.citizensadvice.org.uk/"><span data-dcnode-id="224" instrument_node="">Citizens Advice</span></a><span data-dcnode-id="222" instrument_node=""> to find out what you qualify for.</span></p><span data-dcnode-id="220" instrument_node="">
</span><h2 data-dcnode-id="217" dir="ltr"><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">How to protect refugee rights</span></strong></h2><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214" dir="ltr"><span data-dcnode-id="215" instrument_node="">Governments have a duty to protect the basic human rights and physical safety of their citizens, but when people become refugees, everything changes. Panic ensues. Lines are blurred. Unless other countries take them in, these people find themselves in vulnerable and potentially life-threatening situations. Protecting refugee rights becomes a matter of legislation and funding together with direct action. The following refugee rights organisations are worth noting for their bold campaigns and ongoing support to prevent social injustice:</span></p><span data-dcnode-id="213" instrument_node="">
</span><ul data-dcnode-id="176"><span data-dcnode-id="212" instrument_node="">
</span><li data-dcnode-id="206" dir="ltr"><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="208" dir="ltr"><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/"><span data-dcnode-id="210" instrument_node="">Amnesty International</span></a></p><span data-dcnode-id="207" instrument_node="">
</span></li><span data-dcnode-id="205" instrument_node="">
</span><li data-dcnode-id="199" dir="ltr"><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="201" dir="ltr"><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/"><span data-dcnode-id="203" instrument_node="">UNHCR</span></a></p><span data-dcnode-id="200" instrument_node="">
</span></li><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="192" dir="ltr"><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="194" dir="ltr"><a data-dcnode-id="195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugee-action.org.uk/"><span data-dcnode-id="196" instrument_node="">Refugee Action</span></a></p><span data-dcnode-id="193" instrument_node="">
</span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="185" dir="ltr"><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="187" dir="ltr"><a data-dcnode-id="188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//refugeerights.org.uk/"><span data-dcnode-id="189" instrument_node="">Refugee Rights Europe</span></a></p><span data-dcnode-id="186" instrument_node="">
</span></li><span data-dcnode-id="184" instrument_node="">
</span><li data-dcnode-id="178" dir="ltr"><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="180" dir="ltr"><a data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bristolrefugeerights.org/"><span data-dcnode-id="182" instrument_node="">Bristol Refugee Rights</span></a></p><span data-dcnode-id="179" instrument_node="">
</span></li><span data-dcnode-id="177" instrument_node="">
</span></ul><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="167"><br data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">
</span><strong data-dcnode-id="168"><span data-dcnode-id="172" instrument_node="">To find out more about UK refugee policy and what we offer, visit our </span><a data-dcnode-id="170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ach.org.uk/refugee-asylum-policy-advice-research"><span data-dcnode-id="171" instrument_node="">Refugee &amp; Asylum Policy Advice &amp; Research</span></a><span data-dcnode-id="169" instrument_node=""> page.</span></strong></p></div><span data-dcnode-id="165" instrument_node="">
</span></div><span data-dcnode-id="163" instrument_node="">
