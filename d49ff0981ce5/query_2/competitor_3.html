26"><a data-dcnode-id="1127" href="#legislation"><span data-dcnode-id="1128" instrument_node="">Legislation</span></a></li><span data-dcnode-id="1125" instrument_node=""> </span><li data-dcnode-id="1122"><a data-dcnode-id="1123" href="#status"><span data-dcnode-id="1124" instrument_node="">Refugee status</span></a></li><span data-dcnode-id="1121" instrument_node=""> </span><li data-dcnode-id="1118"><a data-dcnode-id="1119" href="#how-to-get"><span data-dcnode-id="1120" instrument_node="">How to get the status</span></a></li><span data-dcnode-id="1117" instrument_node=""> </span><li data-dcnode-id="1114"><a data-dcnode-id="1115" href="#registration"><span data-dcnode-id="1116" instrument_node="">Registration</span></a></li><span data-dcnode-id="1113" instrument_node=""> </span><li data-dcnode-id="1110"><a data-dcnode-id="1111" href="#camps"><span data-dcnode-id="1112" instrument_node="">Refugee camps</span></a></li><span data-dcnode-id="1109" instrument_node=""> </span><li data-dcnode-id="1106"><a data-dcnode-id="1107" href="#application"><span data-dcnode-id="1108" instrument_node="">Application, petition</span></a></li><span data-dcnode-id="1105" instrument_node=""> </span><li data-dcnode-id="1102"><a data-dcnode-id="1103" href="#dublin-procedure"><span data-dcnode-id="1104" instrument_node="">Dublin Regulation</span></a></li><span data-dcnode-id="1101" instrument_node=""> </span><li data-dcnode-id="1098"><a data-dcnode-id="1099" href="#interview"><span data-dcnode-id="1100" instrument_node="">Interview</span></a></li><span data-dcnode-id="1097" instrument_node=""> </span><li data-dcnode-id="1094"><a data-dcnode-id="1095" href="#decision"><span data-dcnode-id="1096" instrument_node="">Decision</span></a></li><span data-dcnode-id="1093" instrument_node=""> </span><li data-dcnode-id="1090"><a data-dcnode-id="1091" href="#residence"><span data-dcnode-id="1092" instrument_node="">Stay in Germany</span></a></li><span data-dcnode-id="1089" instrument_node=""> </span><li data-dcnode-id="1086"><a data-dcnode-id="1087" href="#deportation"><span data-dcnode-id="1088" instrument_node="">Deportation</span></a></li><span data-dcnode-id="1085" instrument_node=""> </span><li data-dcnode-id="1082"><a data-dcnode-id="1083" href="#family-reunification"><span data-dcnode-id="1084" instrument_node="">Family reunification</span></a></li><span data-dcnode-id="1081" instrument_node=""> </span><li data-dcnode-id="1078"><a data-dcnode-id="1079" href="#useful-links"><span data-dcnode-id="1080" instrument_node="">Links to useful websites</span></a></li><span data-dcnode-id="1077" instrument_node=""> </span><li data-dcnode-id="1074"><a data-dcnode-id="1075" href="#comments-and-questions"><span data-dcnode-id="1076" instrument_node="">Comments and questions</span></a></li><span data-dcnode-id="1073" instrument_node=""> </span></ul><span data-dcnode-id="1071" instrument_node=""> </span><br class="clall" data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node=""> </span><div class="w-only-m w-only-m-1 w-design-1" data-dcnode-id="1068" id="gads-2"></div><span data-dcnode-id="1065" instrument_node=""> </span><div class="lazy" data-dcnode-id="1064" data-js="_global.makeTextBanner();" id="ext-text-banner"></div><span data-dcnode-id="1063" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="1059" id="right-to-asylum-in-germany"><a data-dcnode-id="1061" href="#right-to-asylum-in-germany" title="ссылка"><span data-dcnode-id="1062" instrument_node="">§</span></a><span data-dcnode-id="1060" instrument_node=""> Right to asylum in Germany</span></h2><span data-dcnode-id="1058" instrument_node=""> </span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Asylum in Germany is handled by the German Federal Office for Migration and Refugees (in German: BAMF, Bundesamt für Migration und Flüchtlinge).</span></p><span data-dcnode-id="1055" instrument_node=""> </span><p data-dcnode-id="1048"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">The German Basic Law</span></strong><span data-dcnode-id="1052" instrument_node=""> (Constitution, article 16a) guarantees the right to asylum for persons persecuted for political reasons. However, this right is not granted to persons entering Germany from the so-called safe countries (these are mainly countries of the European Union), as well as to persons from safe countries of origin. Besides, in Germany, the </span><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Asylum Act</span></strong><span data-dcnode-id="1049" instrument_node=""> (in German: Asylgesetz), is in force, which regulates the asylum procedure.</span></p><span data-dcnode-id="1047" instrument_node=""> </span><blockquote data-dcnode-id="1042"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Constitution of Germany (article 16a, paragraph 1):</span></strong><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">"Persons persecuted on political grounds enjoy the right of asylum"</span></blockquote><span data-dcnode-id="1041" instrument_node=""> </span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Another document regulating the granting of asylum in Europe is the </span><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Geneva Refugee Convention</span></strong><span data-dcnode-id="1037" instrument_node="">, which defines who exactly can be considered a refugee, what rights s/he has in the states that have signed this Convention and what obligations s/he has to the state, to which s/he applies for asylum. A Protocol was adopted to this Convention, which expanded its temporal and geographical scope.</span></p><span data-dcnode-id="1035" instrument_node=""> </span><blockquote data-dcnode-id="1030"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The Geneva Refugee Convention on the status of refugees (chapter 1, art. 1):</span></strong><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node=""> "For the purposes of the present Convention, the term "refugee" shall apply to any person who:... owing to well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group or political opinion, is outside the country of his nationality and is unable or, owing to such fear, is unwilling to avail himself of the protection of that country...".</span></blockquote><span data-dcnode-id="1029" instrument_node=""> </span><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">Due to the large number of asylum seekers in recent years, in Germany, just like in other countries of the European Union, discussions are held on the right to asylum and various amendments to the law come into force, those who are interested in the rights of refugees in Germany should be attentive to these changes. For example, on December 17, 2018, the UN General Assembly in New York adopted the </span><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Global Compact on Refugees</span></strong><span data-dcnode-id="1025" instrument_node="">. Although the given document does not have the legally binding force, it, however, defines the vectors for international cooperation in the sphere of asylum seekers protectio.</span></p><span data-dcnode-id="1023" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="1019" id="safe-countries-of-origin"><a data-dcnode-id="1021" href="#safe-countries-of-origin" title="ссылка"><span data-dcnode-id="1022" instrument_node="">§</span></a><span data-dcnode-id="1020" instrument_node=""> List of safe countries of arrival and origin</span></h2><span data-dcnode-id="1018" instrument_node=""> </span><h3 data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Safe Third Countries</span></h3><span data-dcnode-id="1015" instrument_node=""> </span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Safe third countries (in German: Sicherer Drittstaat) are the countries, which apply the Geneva Refugee Convention and the European Convention for the Protection of Human Rights and Fundamental Freedoms. If a person, in search of asylum, enters Germany from a country that is on the Safe Third Countries List, s/he loses the right to seek asylum in Germany, as s/he has had an opportunity to apply for asylum in that country. According to the Asylum Act (§ 26a Abs. 1 AsylG) as of the beginning of 2019, safe third countries are as follows:</span></p><span data-dcnode-id="1012" instrument_node=""> </span><ul class="top-style" data-dcnode-id="1001"><span data-dcnode-id="1011" instrument_node=""> </span><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">All the European Union countries,</span></li><span data-dcnode-id="1008" instrument_node=""> </span><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Switzerland, and</span></li><span data-dcnode-id="1005" instrument_node=""> </span><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Norway.</span></li><span data-dcnode-id="1002" instrument_node=""> </span></ul><span data-dcnode-id="1000" instrument_node=""> </span><h3 data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Safe countries of origin</span></h3><span data-dcnode-id="997" instrument_node=""> </span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Under the Constitution of Germany (§ 16a Abs. 3), safe countries of origin (in German: Sicherer Herkunftsstaat) are the countries, which are free from domestic political persecution as well as from the inhuman punishment and treatment that dishonour human dignity. The list of such states is defined by the law of Germany. It is assumed that an asylum seeker from such a state is not prosecuted and therefore cannot be eligible for asylum in Germany; however, s/he may provide evidence of political persecution to have their application considered. According to the Asylum Act (§ 29a Abs. 2 AsylG) as of the beginning of 2019, safe countries of origin are as follows:</span></p><span data-dcnode-id="994" instrument_node=""> </span><ul class="top-style" data-dcnode-id="965"><span data-dcnode-id="993" instrument_node=""> </span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">All the European Union countires,</span></li><span data-dcnode-id="990" instrument_node=""> </span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Albania,</span></li><span data-dcnode-id="987" instrument_node=""> </span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Bosnia and Herzegovina,</span></li><span data-dcnode-id="984" instrument_node=""> </span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Ghana,</span></li><span data-dcnode-id="981" instrument_node=""> </span><li data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Kosovo,</span></li><span data-dcnode-id="978" instrument_node=""> </span><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Macedonia,</span></li><span data-dcnode-id="975" instrument_node=""> </span><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Montenegro,</span></li><span data-dcnode-id="972" instrument_node=""> </span><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Senegal, and</span></li><span data-dcnode-id="969" instrument_node=""> </span><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Serbia.</span></li><span data-dcnode-id="966" instrument_node=""> </span></ul><span data-dcnode-id="964" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="960" id="legislation"><a data-dcnode-id="962" href="#legislation" title="ссылка"><span data-dcnode-id="963" instrument_node="">§</span></a><span data-dcnode-id="961" instrument_node=""> German asylum laws, asylum legislation</span></h2><span data-dcnode-id="959" instrument_node=""> </span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The following list contains links to basic laws and other documents governing the rights and obligations of refugees in Germany.</span></p><span data-dcnode-id="956" instrument_node=""> </span><ul data-dcnode-id="934"><span data-dcnode-id="955" instrument_node=""> </span><li data-dcnode-id="952"><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gesetze-im-internet.de/gg/GG.pdf" rel="nofollow"><span data-dcnode-id="954" instrument_node="">Constitution of Germany, article 16a</span></a></li><span data-dcnode-id="951" instrument_node=""> </span><li data-dcnode-id="948"><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gesetze-im-internet.de/asylvfg_1992/AsylG.pdf" rel="nofollow"><span data-dcnode-id="950" instrument_node="">Asylum Act, Asylgesetz</span></a></li><span data-dcnode-id="947" instrument_node=""> </span><li data-dcnode-id="944"><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gesetze-im-internet.de/aufenthg_2004/AufenthG.pdf" rel="nofollow"><span data-dcnode-id="946" instrument_node="">Act concerning Residence, Employment and Integration of Foreigners in the Federal Republic of Germany</span></a></li><span data-dcnode-id="943" instrument_node=""> </span><li data-dcnode-id="940"><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uno-fluechtlingshilfe.de/uploads/media/GFK_Pocket_2015.pdf" rel="nofollow"><span data-dcnode-id="942" instrument_node="">Geneva Refugee Convention aka the Convention Relating to the Status of Refugees, Protocol and Addenda</span></a></li><span data-dcnode-id="939" instrument_node=""> </span><li data-dcnode-id="936"><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/DE/TXT/PDF/%3Furi%3DCELEX%3A32013R0604" rel="nofollow"><span data-dcnode-id="938" instrument_node="">Dublin Regulation</span></a></li><span data-dcnode-id="935" instrument_node=""> </span></ul><span data-dcnode-id="933" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="929" id="status"><a data-dcnode-id="931" href="#status" title="ссылка"><span data-dcnode-id="932" instrument_node="">§</span></a><span data-dcnode-id="930" instrument_node=""> Forms of refugee protection and refugee status in Germany: terminology</span></h2><span data-dcnode-id="928" instrument_node=""> </span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Different terminology is used in relation to refugees in Germany, depending on the form of protection and the stage of obtaining asylum in Germany where the refugee is located. The tables below contain definitions of the protection forms and refugee status.</span></p><span data-dcnode-id="925" instrument_node=""> </span><h3 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Forms of protection for asylum seekers in Germany</span></h3><span data-dcnode-id="922" instrument_node=""> </span><span data-dcnode-id="921" instrument_node=""> </span><span data-dcnode-id="920" instrument_node=""> </span><span data-dcnode-id="915" instrument_node=""> </span><span data-dcnode-id="912" instrument_node=""> </span><span data-dcnode-id="910" instrument_node=""> </span><span data-dcnode-id="909" instrument_node=""> </span><span data-dcnode-id="904" instrument_node=""> </span><span data-dcnode-id="901" instrument_node=""> </span><span data-dcnode-id="899" instrument_node=""> </span><span data-dcnode-id="898" instrument_node=""> </span><span data-dcnode-id="893" instrument_node=""> </span><span data-dcnode-id="890" instrument_node=""> </span><span data-dcnode-id="888" instrument_node=""> </span><span data-dcnode-id="887" instrument_node=""> </span><span data-dcnode-id="882" instrument_node=""> </span><span data-dcnode-id="879" instrument_node=""> </span><span data-dcnode-id="877" instrument_node=""> </span><table class="list-table" data-dcnode-id="875"><tbody data-dcnode-id="876"><tr data-dcnode-id="911"><th data-dcnode-id="916"><span data-dcnode-id="919" instrument_node="">Asylberechtigung</span><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">(right of asylum)</span></th><td data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Right to asylum for politically persecuted persons.</span></td></tr><tr data-dcnode-id="900"><th data-dcnode-id="905"><span data-dcnode-id="908" instrument_node="">Flüchtlingsschutz</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">(protection of refugees)</span></th><td data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Asylum for victims of persecution in the country of origin. Flüchtling (refugee) - a person falling under the refugee definition in the Geneva Convention.</span></td></tr><tr data-dcnode-id="889"><th data-dcnode-id="894"><span data-dcnode-id="897" instrument_node="">Subsidiärer Schutz</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">(subsidiary, auxiliary protection)</span></th><td data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">A form of protection, asylum for persons who do not fall under the protection of Asylberechtigung and Flüchtlingsschutz, nevertheless, need asylum due to a serious violation of human rights, for example, the threat of torture, death penalty, and violence.</span></td></tr><tr data-dcnode-id="878"><th data-dcnode-id="883"><span data-dcnode-id="886" instrument_node="">Abschiebungsverbot</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">(ban on deportation)</span></th><td data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">A form of protection, asylum for persons who do not fall under the protection of Asylberechtigung, Flüchtlingsschutz and Subsidiärer Schutz, nevertheless, they cannot be expelled from the country for special reasons related to legal peculiarities or danger to human life, health and freedom.</span></td></tr></tbody></table><span data-dcnode-id="874" instrument_node=""> </span><p data-dcnode-id="864"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Difference between the terms "Flüchtlingen" and "Asylberechtigten"</span></strong><span data-dcnode-id="871" instrument_node="">. Both definitions, "Flüchtlingen" and "Asylberechtigten", refer to asylum seekers in Germany. The only difference is the legal basis for asylum. </span><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Flüchtlingen</span></strong><span data-dcnode-id="868" instrument_node=""> are the refugees being persecuted for the reasons of race, religion, nationality, etc., and in the given case the legal basis is the Geneva Convention. </span><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Asylberechtigten</span></strong><span data-dcnode-id="865" instrument_node=""> are the persons being persecuted for political reasons in the country of origin, and here the legal basis is the Constitution of Germany.</span></p><span data-dcnode-id="863" instrument_node=""> </span><h3 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Refugee status, depending on the stage of obtaining asylum</span></h3><span data-dcnode-id="860" instrument_node=""> </span><span data-dcnode-id="859" instrument_node=""> </span><span data-dcnode-id="858" instrument_node=""> </span><span data-dcnode-id="853" instrument_node=""> </span><span data-dcnode-id="850" instrument_node=""> </span><span data-dcnode-id="848" instrument_node=""> </span><span data-dcnode-id="847" instrument_node=""> </span><span data-dcnode-id="842" instrument_node=""> </span><span data-dcnode-id="839" instrument_node=""> </span><span data-dcnode-id="837" instrument_node=""> </span><span data-dcnode-id="836" instrument_node=""> </span><span data-dcnode-id="831" instrument_node=""> </span><span data-dcnode-id="828" instrument_node=""> </span><span data-dcnode-id="826" instrument_node=""> </span><table class="list-table" data-dcnode-id="824"><tbody data-dcnode-id="825"><tr data-dcnode-id="849"><th data-dcnode-id="854"><span data-dcnode-id="857" instrument_node="">Asylsuchende</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">(asylum seeker)</span></th><td data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">A person who has come to Germany in search of asylum.</span></td></tr><tr data-dcnode-id="838"><th data-dcnode-id="843"><span data-dcnode-id="846" instrument_node="">Asylbewerber</span><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">(asylum candidate)</span></th><td data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">A person who has applied for asylum.</span></td></tr><tr data-dcnode-id="827"><th data-dcnode-id="832"><span data-dcnode-id="835" instrument_node="">Asylberechtigter</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">(eligible for asylum)</span></th><td data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">A person who has proved their basis for asylum and has been granted asylum.</span></td></tr></tbody></table><span data-dcnode-id="823" instrument_node=""> </span><div class="w-only-pc w-design-1" data-dcnode-id="821" id="gads-3"><ins class="adsbygoogle" data-ad-client="ca-pub-7729004055392450" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8371251833" data-dcnode-id="822" style="display:block; text-align:center;"></ins></div><div class="w-only-m w-design-1" data-dcnode-id="818" id="gads-4"></div><span data-dcnode-id="815" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="811" id="how-to-get"><a data-dcnode-id="813" href="#how-to-get" title="ссылка"><span data-dcnode-id="814" instrument_node="">§</span></a><span data-dcnode-id="812" instrument_node=""> How to obtain the refugee status in Germany</span></h2><span data-dcnode-id="810" instrument_node=""> </span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">In order for a person who has arrived in Germany to be able to obtain the status of a refugee eligible for asylum in the country, s/he needs to go through several stages of the procedure prescribed by law, which are discussed in detail below on the page. The sequence of some of the initial stages may vary in some cases.</span></p><span data-dcnode-id="807" instrument_node=""> </span><ul class="top-style" data-dcnode-id="772"><span data-dcnode-id="806" instrument_node=""> </span><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Arrival in Germany;</span></li><span data-dcnode-id="803" instrument_node=""> </span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Registration as an asylum seeker and obtaining an interim certificate, a temporary ID;</span></li><span data-dcnode-id="800" instrument_node=""> </span><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Assignment of the asylum seeker to one of the lands of Germany;</span></li><span data-dcnode-id="797" instrument_node=""> </span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Accommodation in a refugee shelter (in German: Aufnahmeeinrichtung);</span></li><span data-dcnode-id="794" instrument_node=""> </span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Applying for asylum;</span></li><span data-dcnode-id="791" instrument_node=""> </span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Verification, in conformity with the Dublin Regulation (in German: Dublin-Verfahren), which state shall consider applying for asylum;</span></li><span data-dcnode-id="788" instrument_node=""> </span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Interview on the reasons for applying for asylum;</span></li><span data-dcnode-id="785" instrument_node=""> </span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Waiting for the asylum decision;</span></li><span data-dcnode-id="782" instrument_node=""> </span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Obtaining a decision on asylum;</span></li><span data-dcnode-id="779" instrument_node=""> </span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">In case of refusal to grant asylum, the said refugee can go to a lawyer and file a complaint with the court to verify the decision on refusal; </span></li><span data-dcnode-id="776" instrument_node=""> </span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Depending on the final decision, the refugee shall be entitled to stay in Germany, or, in case of refusal, shall have to leave the country.</span></li><span data-dcnode-id="773" instrument_node=""> </span></ul><span data-dcnode-id="771" instrument_node=""> </span><h3 class="alg_c" data-dcnode-id="767"><span data-dcnode-id="770" instrument_node="">Model 1. The main stages of obtaining </span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">the refugee status (asylum) in Germany</span></h3><span data-dcnode-id="766" instrument_node=""> </span><p class="alg_c" data-dcnode-id="762"><span data-dcnode-id="765" instrument_node=""> </span><img alt="Model 1. The main stages of obtaining the refugee status (asylum) in Germany" class="lazy get-large-image m1-img m2-img m3-img" data-dcnode-id="764" data-large-img="/media/images/migration/scheme-refugee-status-in-germany.en.gif" data-src="/media/images/migration/scheme-refugee-status-in-germany.en.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/media/images/278567/placeholder-image.gif&amp;raw"><span data-dcnode-id="763" instrument_node=""> </span></p><span data-dcnode-id="761" instrument_node=""> </span><br class="clall" data-dcnode-id="760"><span data-dcnode-id="759" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="755" id="registration"><a data-dcnode-id="757" href="#registration" title="ссылка"><span data-dcnode-id="758" instrument_node="">§</span></a><span data-dcnode-id="756" instrument_node=""> Registration of an asylum seeker in Germany</span></h2><span data-dcnode-id="754" instrument_node=""> </span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">A person arriving in Germany in search of asylum has to report this to one of the government agencies responsible for receiving refugees. S/he can do this already at the border guard service (in German: Grenzbehörde) during border checks, as well as at the police (in German: Polizei), at institutions for working with foreigners (in German: Ausländerbehörde), at reception facilities for refugees and displaced persons (in German: Aufnahmeeinrichtung) or at Refugee Centers (in German: Ankunftszentrum).</span></p><span data-dcnode-id="751" instrument_node=""> </span><p data-dcnode-id="744"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Refugee Centers</span></strong><span data-dcnode-id="748" instrument_node=""> are the central institutions involved in the asylum process in Germany. A complete list of addresses of these centers in all the lands(federated states) of Germany can be found </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bamf.de/DE/Behoerde/Aufbau/Standorte/standorte-node.html" rel="noopener" target="_blank"><span data-dcnode-id="747" instrument_node="">at the link</span></a><span data-dcnode-id="745" instrument_node=""> on the website of the Federal Office for Migration and Refugees (BAMF).</span></p><span data-dcnode-id="743" instrument_node=""> </span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The persons applying for asylum in Germany will be registered as asylum seekers (in German: Asylsuchende), and in the course of registration their personal details will be fixed, along with their photographs and fingerprints taken. This information shall be stored in the central register of foreigners in the country.</span></p><span data-dcnode-id="740" instrument_node=""> </span><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">The registered persons shall receive an </span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">an arrival certificate (formerly called "Certificate of notification as an asylum seeker" (BüMA), serving the evidence of registration</span></strong><span data-dcnode-id="736" instrument_node=""> (in German: Ankunftsnachweis) and containing their personal details as well the address of the authority that has issued the given document.</span></p><span data-dcnode-id="734" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="730" id="camps"><a data-dcnode-id="732" href="#camps" title="ссылка"><span data-dcnode-id="733" instrument_node="">§</span></a><span data-dcnode-id="731" instrument_node=""> Refugee camps in Germany</span></h2><span data-dcnode-id="729" instrument_node=""> </span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">After the asylum seeker registration, s/he is assigned to one of the refugee reception facilities (German: Aufnahmeeinrichtung) or, in other words, to a refugee camp. Which camp or institution the asylum seeker will be assigned to depends on the number of refugees arriving and state quotas for accommodation. Therefore, regardless of the place of initial registration, the asylum seeker may be allocated to a completely different place to go through a further asylum procedure.</span></p><span data-dcnode-id="726" instrument_node=""> </span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">As of 2019, the greatest number of refugees has been assigned to the following lands(federated states):</span></p><span data-dcnode-id="723" instrument_node=""> </span><ul class="top-style" data-dcnode-id="710"><span data-dcnode-id="722" instrument_node=""> </span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">North Rhine-Westphalia (Nordrhein-Westfalen)</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Bavaria (Bayern)</span></li><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Baden-Württemberg (Baden-Württemberg)</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Lower Saxony (Niedersachsen)</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Hesse (Hessen)</span></li><span data-dcnode-id="711" instrument_node=""> </span></ul><span data-dcnode-id="709" instrument_node=""> </span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">The refugee camp or reception facility, to which the asylum seeker has been assigned, shall be responsible for providing the essential needs and accommodation for the asylum seeker. More information </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/benefits/asylum.html"><span data-dcnode-id="707" instrument_node="">about cash benefits for refugees in Germany</span></a><span data-dcnode-id="705" instrument_node=""> can be found on a dedicated page of our website.</span></p><span data-dcnode-id="703" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="699" id="application"><a data-dcnode-id="701" href="#application" title="ссылка"><span data-dcnode-id="702" instrument_node="">§</span></a><span data-dcnode-id="700" instrument_node=""> Submission of an application, application for asylum</span></h2><span data-dcnode-id="698" instrument_node=""> </span><p data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">Either directly at the Refugee Center, or at the refugee camp where the asylum seeker will be assigned and sent, </span><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">an asylum application will have to be submitted</span></strong><span data-dcnode-id="694" instrument_node="">. Filing such an application takes place in the course of a personal conversation with the respectively responsible employee of the Center. An interpreter, too, shall be invited to take part in the given interview. In order to file the application, the applicant has to bring the earlier issued ID/ arrival certificate (in German: Ankunftsnachweis), the available personal documents, and the evidence confirming that the person has a reason to apply for asylum: s/he will have to tell in detail about himself / herself, their place of residence, education, knowledge of the language, as well as how s/he has arrived in Germany. Besides, while submitting the application, it is necessary to specify whether there are other family members in Germany at the given time.</span></p><span data-dcnode-id="692" instrument_node=""> </span><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">Upon submission of the application, the person shall receive the asylum candidate status (in German, Asylbewerber), and instead of the ID/ arrival certificate (in German: Ankunftsnachweis) shall receive such a document as a </span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Temporary Residence Permit</span></strong><span data-dcnode-id="688" instrument_node=""> (in German: Aufenthaltsgestattung). Thus the asylum candidate receives the right to stay in Germany, but the given right shall be limited by a certain territory or region, and if s/he would like to leave this region for some time, s/he will have to receive a respective permit.</span></p><span data-dcnode-id="686" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="682" id="dublin-procedure"><a data-dcnode-id="684" href="#dublin-procedure" title="ссылка"><span data-dcnode-id="685" instrument_node="">§</span></a><span data-dcnode-id="683" instrument_node=""> Verification under the Dublin Regulation</span></h2><span data-dcnode-id="681" instrument_node=""> </span><p data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">Before the German state authorities begin to consider an application for asylum, they have to make sure that it is Germany that should deal with this application. According to the </span><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Dublin Regulation</span></strong><span data-dcnode-id="677" instrument_node="">, the following factors play a role in deciding which state will consider an asylum application:</span></p><span data-dcnode-id="675" instrument_node=""> </span><ul class="top-style" data-dcnode-id="655"><span data-dcnode-id="674" instrument_node=""> </span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Whether the applicant has his / her family members living in Germany or in another member-state of the Dublin Regulation;</span></li><span data-dcnode-id="671" instrument_node=""> </span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Whether the applicant has a visa or a stay permit issued by another member-state;</span></li><span data-dcnode-id="668" instrument_node=""> </span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Whether the applicant has arrived in Germany from (via the territory of) another member-state;</span></li><span data-dcnode-id="665" instrument_node=""> </span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Whether the applicant has a possibility to reside in the territory of another member-state without a visa or special permit;</span></li><span data-dcnode-id="662" instrument_node=""> </span><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Whether the applicant has already filed/ submitted the asylum application at another member-state;</span></li><span data-dcnode-id="659" instrument_node=""> </span><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">and others.</span></li><span data-dcnode-id="656" instrument_node=""> </span></ul><span data-dcnode-id="654" instrument_node=""> </span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">In order to verify such information, the persons in charge/ PICs use the data as received from the asylum seeker, the tickets and other evidence submitted by them, as well the data from European databases regarding the visas and fingerprints.</span></p><span data-dcnode-id="651" instrument_node=""> </span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">So, </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">it is most likely that Germany will not consider the application</span></strong><span data-dcnode-id="647" instrument_node=""> for asylum, if the applicant has the visa issued by another member-state, or if s/he has arrived in Germany from or via the territory of another member-state, or if s/he has already applied for asylum at another Dublin Regulation member-state.</span></p><span data-dcnode-id="645" instrument_node=""> </span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">However, as a matter of exception – for instance, in case of the applicant’s severe illness, Germany may attend to considering the application notwithstanding the fact that this has to be done by another state.</span></p><span data-dcnode-id="642" instrument_node=""> </span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">In case of refusal to examine the application and issue of the resolution on deportation to another state, the applicant may appeal against such a resolution in court.</span></p><span data-dcnode-id="639" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="635" id="interview"><a data-dcnode-id="637" href="#interview" title="ссылка"><span data-dcnode-id="638" instrument_node="">§</span></a><span data-dcnode-id="636" instrument_node=""> Hearing, or interview with the asylum seeker</span></h2><span data-dcnode-id="634" instrument_node=""> </span><p data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">Upon finding that Germany is the country being responsible for considering the application for asylum, the </span><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">hearing or interview with the asylum seeker</span></strong><span data-dcnode-id="630" instrument_node=""> shall take place for discussing the reasons, by virtue of which s/he applies for asylum (in German, Persönliche Anhörung). This </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">interview is very important as the asylum decision will depend on its outcome</span></strong><span data-dcnode-id="627" instrument_node=""> so the applicant should thoroughly prepare for it.</span></p><span data-dcnode-id="625" instrument_node=""> </span><blockquote data-dcnode-id="621"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The hearing or interview with the asylum seeker (in German, Persönliche Anhörung)</span></strong><span data-dcnode-id="622" instrument_node=""> about the reasons for applying for asylum is very important in the procedure of obtaining the refugee status in Germany, and it is necessary to be well prepared for it.</span></blockquote><span data-dcnode-id="620" instrument_node=""> </span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The interview shall be attended by: a Foreigners Registration Office representative who will conduct the interview, as well as an interpreter, the asylum seeker, and, if the latter desires so, his / her confidant.</span></p><span data-dcnode-id="617" instrument_node=""> </span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">At this hearing, it is necessary to describe the reasons, for which the refugee has left their country and cannot return there. Besides, evidence supporting the refugee's words, such as photographs, minutes and other documents, shall also be brought to this hearing.</span></p><span data-dcnode-id="614" instrument_node=""> </span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">In the course of the interview the minutes shall be taken and then read and orally interpreted for the asylum seeker. If something in the given minutes is wrong or missing, the applicant may introduce amendments. The given minutes shall be signed by the applicant. Either right after the interview, or later the applicant will receive a copy of the said minutes.</span></p><span data-dcnode-id="611" instrument_node=""> </span><h3 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Video about the asylum interview</span></h3><span data-dcnode-id="608" instrument_node=""> </span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Provided by the Kölner Flüchtlingsrat e.V. initiative</span></p><span data-dcnode-id="605" instrument_node=""> </span><div class="lazy" data-dcnode-id="604" data-js="$('#video-asyl-1').html(window.atob('PGlmcmFtZSB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIzMTUiIHNyYz0iaHR0cHM6Ly93d3cueW91dHViZS1ub2Nvb2tpZS5jb20vZW1iZWQvbnRSdHBlMTgwSzgiIGZyYW1lYm9yZGVyPSIwIiBhbGxvdz0iYWNjZWxlcm9tZXRlcjsgYXV0b3BsYXk7IGVuY3J5cHRlZC1tZWRpYTsgZ3lyb3Njb3BlOyBwaWN0dXJlLWluLXBpY3R1cmUiIGFsbG93ZnVsbHNjcmVlbj48L2lmcmFtZT4='));" id="video-asyl-1"></div><span data-dcnode-id="603" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="599" id="decision"><a data-dcnode-id="601" href="#decision" title="ссылка"><span data-dcnode-id="602" instrument_node="">§</span></a><span data-dcnode-id="600" instrument_node=""> Asylum decision</span></h2><span data-dcnode-id="598" instrument_node=""> </span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">The decision on providing asylum or on refusal to grant it (in German, Entscheidung) shall be sent to the asylum seeker in writing.</span></p><span data-dcnode-id="595" instrument_node=""> </span><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">If the refugee disagrees with the Office decision, s/he shall be </span><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">entitled to lodge the complaint in the court to the effect of revising the decision</span></strong><span data-dcnode-id="591" instrument_node="">. Such a complaint shall be lodged within the deadline as specified in the decision. In most cases, for appealing to court for revision of such resolutions, refugees resort to lawyers’ services.</span></p><span data-dcnode-id="589" instrument_node=""> </span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">In case of a positive decision, the asylum seeker shall receive the status of a person eligible for asylum (in German, Asylberechtigter) and </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/job/permission-to-work.html%23residence-permit-1"><span data-dcnode-id="587" instrument_node="">the permit to stay in Germany</span></a><span data-dcnode-id="585" instrument_node=""> (in German: Aufenthaltserlaubnis). Depending on the reasons for the asylum, the stay permit is issued for a period of 1 up to 3 years.</span></p><span data-dcnode-id="583" instrument_node=""> </span><div class="w-only-pc w-design-1" data-dcnode-id="581" id="gads-5"><ins class="adsbygoogle" data-ad-client="ca-pub-7729004055392450" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8371251833" data-dcnode-id="582" style="display:block; text-align:center;"></ins></div><div class="w-only-m w-design-1" data-dcnode-id="578" id="gads-6"></div><span data-dcnode-id="575" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="571" id="residence"><a data-dcnode-id="573" href="#residence" title="ссылка"><span data-dcnode-id="574" instrument_node="">§</span></a><span data-dcnode-id="572" instrument_node=""> Further stay in Germany</span></h2><span data-dcnode-id="570" instrument_node=""> </span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">In case of a positive decision, the asylum seeker shall receive a permit to stay in Germany for a period of 1 up to 3 years.</span></p><span data-dcnode-id="567" instrument_node=""> </span><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Upon elapse of the three years and under certain conditions, the refugee may receive </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/migration/residence/"><span data-dcnode-id="565" instrument_node="">a residence permit</span></a><span data-dcnode-id="563" instrument_node=""> (in German: Niederlassungserlaubnis), providing the right to indefinite residence and unlimited employment in the country. The residence permit can be issued, if the refugee complies with at least two major conditions stated below:</span></p><span data-dcnode-id="561" instrument_node=""> </span><ul class="top-style" data-dcnode-id="553"><span data-dcnode-id="560" instrument_node=""> </span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">the refugee’s earnings are sufficient for covering his / her living expenses without support on the part of the state; and</span></li><span data-dcnode-id="557" instrument_node=""> </span><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">the refugee has quite a sufficient command of the German language.</span></li><span data-dcnode-id="554" instrument_node=""> </span></ul><span data-dcnode-id="552" instrument_node=""> </span><h3 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Integration courses for refugees</span></h3><span data-dcnode-id="549" instrument_node=""> </span><p data-dcnode-id="544"><span data-dcnode-id="548" instrument_node="">For asylum seekers and asylees in Germany, the state provides courses in primary orientation and language acquisition, as well as integration courses. For more information </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/german/free-language-courses.html"><span data-dcnode-id="547" instrument_node="">about the integration courses and the German language courses</span></a><span data-dcnode-id="545" instrument_node="">, see a dedicated page of our website.</span></p><span data-dcnode-id="543" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="539" id="deportation"><a data-dcnode-id="541" href="#deportation" title="ссылка"><span data-dcnode-id="542" instrument_node="">§</span></a><span data-dcnode-id="540" instrument_node=""> Deportation, return of refugees to their homeland</span></h2><span data-dcnode-id="538" instrument_node=""> </span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Upon receiving a negative/ unfavourable decision and denial of asylum, the asylum seeker has to leave the country. Besides, if, following the positive decision, the situation in the country of origin has changed for the better, and the refugee can return to his / her home country fearlessly, the Federal Office for Migration and Refugees may revoke their residence permit and insist that the refugee return to the home country.</span></p><span data-dcnode-id="535" instrument_node=""> </span><h3 data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Voluntary return to the home country</span></h3><span data-dcnode-id="532" instrument_node=""> </span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">In case of a negative/ unfavourable decision or revocation of the right to stay in Germany, the refugee shall be informed of the period, within which s/he has to leave the country. Normally such a period lasts for 30 days or, under some special circumstances, for one week.</span></p><span data-dcnode-id="529" instrument_node=""> </span><h3 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Deportation</span></h3><span data-dcnode-id="526" instrument_node=""> </span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Deportation means the coercive expulsion of a refugee from the hosting country, if s/he has not voluntarily left it within the set period of time. In such a case, the regress entry, re-entry and stay in Germany will be banned for the said person.</span></p><span data-dcnode-id="523" instrument_node=""> </span><h3 data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Video on the voluntary return of refugees</span></h3><span data-dcnode-id="520" instrument_node=""> </span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Provided by the IOM, the International Organization for Migration</span></p><span data-dcnode-id="517" instrument_node=""> </span><div class="lazy" data-dcnode-id="516" data-js="$('#video-asyl-2').html(window.atob('PGlmcmFtZSB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIzMTUiIHNyYz0iaHR0cHM6Ly93d3cueW91dHViZS1ub2Nvb2tpZS5jb20vZW1iZWQvdmNlNkZwbXZqS2MiIGZyYW1lYm9yZGVyPSIwIiBhbGxvdz0iYWNjZWxlcm9tZXRlcjsgYXV0b3BsYXk7IGVuY3J5cHRlZC1tZWRpYTsgZ3lyb3Njb3BlOyBwaWN0dXJlLWluLXBpY3R1cmUiIGFsbG93ZnVsbHNjcmVlbj48L2lmcmFtZT4='));" id="video-asyl-2"></div><span data-dcnode-id="515" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="511" id="family-reunification"><a data-dcnode-id="513" href="#family-reunification" title="ссылка"><span data-dcnode-id="514" instrument_node="">§</span></a><span data-dcnode-id="512" instrument_node=""> Refugee family reunification</span></h2><span data-dcnode-id="510" instrument_node=""> </span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">If a refugee has been granted asylum in Germany, their family members, too, may, under certain circumstances, obtain such a right. In particular, the persons, deemed to be the refugee’s family members, are as follows:</span></p><span data-dcnode-id="507" instrument_node=""> </span><ul class="top-style" data-dcnode-id="490"><span data-dcnode-id="506" instrument_node=""> </span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">husband, wife;</span></li><span data-dcnode-id="503" instrument_node=""> </span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">underage children (under 18 years old), who are not married; </span></li><span data-dcnode-id="500" instrument_node=""> </span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">parents raising unmarried underage children;</span></li><span data-dcnode-id="497" instrument_node=""> </span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">adults having the right to custody of an underage unmarried child; </span></li><span data-dcnode-id="494" instrument_node=""> </span><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">whole-blood brothers and sisters of an underage unmarried child.</span></li><span data-dcnode-id="491" instrument_node=""> </span></ul><span data-dcnode-id="489" instrument_node=""> </span><h2 class="anchor" data-dcnode-id="485" id="useful-links"><a data-dcnode-id="487" href="#useful-links" title="ссылка"><span data-dcnode-id="488" instrument_node="">§</span></a><span data-dcnode-id="486" instrument_node=""> Useful links</span></h2><span data-dcnode-id="484" instrument_node=""> </span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">Below you will find links to the sources of detailed information on refugees in Germany, and most of such sources are in German. Links to </span><a data-dcnode-id="481" href="#legislation"><span data-dcnode-id="482" instrument_node="">asylum laws</span></a><span data-dcnode-id="480" instrument_node=""> can be found above on the page.</span></p><span data-dcnode-id="478" instrument_node=""> </span><ul data-dcnode-id="451"><span data-dcnode-id="477" instrument_node=""> </span><li data-dcnode-id="473"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bamf.de/SharedDocs/Anlagen/DE/AsylFluechtlingsschutz/Asylverfahren/begleitbroschuere-asylfilm.html" rel="nofollow"><span data-dcnode-id="476" instrument_node="">Brochure “Information on the Asylum Procedure”</span></a><span data-dcnode-id="474" instrument_node="">;</span></li><span data-dcnode-id="472" instrument_node=""> </span><li data-dcnode-id="468"><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/dach/de/" rel="nofollow"><span data-dcnode-id="471" instrument_node="">UNHCR – UN Refugee Agency, Germany</span></a><span data-dcnode-id="469" instrument_node="">;</span></li><span data-dcnode-id="467" instrument_node=""> </span><li data-dcnode-id="463"><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bundesregierung.de/breg-de/themen/migration-und-integration" rel="nofollow"><span data-dcnode-id="466" instrument_node="">The refugee-related questions and answers on the German Government website</span></a><span data-dcnode-id="464" instrument_node="">;</span></li><span data-dcnode-id="462" instrument_node=""> </span><li data-dcnode-id="458"><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/dach/wp-content/uploads/sites/27/2018/11/GCR_final_GER.pdf" rel="nofollow"><span data-dcnode-id="461" instrument_node="">The UN Global Compact on Refugees</span></a><span data-dcnode-id="459" instrument_node="">;</span></li><span data-dcnode-id="457" instrument_node=""> </span><li data-dcnode-id="453"><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//multimedia.gsb.bund.de/BAMF/Video/Asylfilm/Asylantrag_english_subtitle.mp4" rel="nofollow"><span data-dcnode-id="456" instrument_node="">Asylum procedure in Germany</span></a><span data-dcnode-id="454" instrument_node="">.</span></li><span data-dcnode-id="452" instrument_node=""> </span></ul><span data-dcnode-id="450" instrument_node=""> </span><div class="w-only-pc w-design-1" data-dcnode-id="448" id="gads-7"><ins class="adsbygoogle" data-ad-client="ca-pub-7729004055392450" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8371251833" data-dcnode-id="449" style="display:block; text-align:center;"></ins></div><div class="w-only-m w-design-1" data-dcnode-id="445" id="gads-8"></div><div class="additional" data-dcnode-id="350" id="additional-links"><ul class="btn-add flr" data-dcnode-id="401"><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Pages: </span></li><li data-dcnode-id="438"><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/migration/" title="Emigration, immigration to Germany for all: law, legislation, opportunities"><span data-dcnode-id="440" instrument_node="">1</span></a></li><li data-dcnode-id="435"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/migration/permanent-residence/" title="Permanent residence in Germany: 20 ways to relocate to permanent residence in Germany"><span data-dcnode-id="437" instrument_node="">2</span></a></li><li data-dcnode-id="432"><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/migration/residence/" title="Obtaining a residence permit in Germany"><span data-dcnode-id="434" instrument_node="">3</span></a></li><li data-dcnode-id="429"><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru-geld.de/en/migration/citizenship/" title="Obtaining the German
