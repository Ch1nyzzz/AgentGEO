</span><h2 class="wsite-content-title" data-dcnode-id="1063" style="text-align:left;"><span data-dcnode-id="1065" instrument_node="">Are you thinking of claiming asylum in Canada during the covid pandemic?</span><br data-dcnode-id="1064"></h2><span data-dcnode-id="1062" instrument_node="">
</span></td><td class="wsite-multicol-col" data-dcnode-id="1048" style="width:48.378378378378%; padding:0 15px;"><span data-dcnode-id="1059" instrument_node="">
</span><h2 class="wsite-content-title" data-dcnode-id="1050" style="text-align:right;"><font data-dcnode-id="1052" size="4"><em data-dcnode-id="1053"><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/info-pour-demandeurs-dasile.html"><span data-dcnode-id="1058" instrument_node="">en français</span></a><span data-dcnode-id="1056" instrument_node="">&nbsp; --&nbsp; </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/info-para-solicitantes-asilo.html" target="_blank"><span data-dcnode-id="1055" instrument_node="">en espagnol</span></a></em></font><br data-dcnode-id="1051"></h2><span data-dcnode-id="1049" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1041" instrument_node="">
</span></div></div></div><span data-dcnode-id="1037" instrument_node="">
</span><div class="wsite-spacer" data-dcnode-id="1036" style="height:10px;"></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="paragraph" data-dcnode-id="963" style="text-align:left;"><font color="#8d2424" data-dcnode-id="1028" size="3"><strong data-dcnode-id="1032"><font color="#2a2a2a" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Dear Visitor</span></font></strong><br data-dcnode-id="1031"><font color="#2a2a2a" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Hello! Welcome to our information page. Bridges Not Borders is a small group of Canadian volunteers who live in the area near Roxham Road in southern Quebec. Since 2017, we have been providing information on the border situation and the rules for asylum seekers who want to enter Canada. We are not lawyers and we cannot advise you what to do.&nbsp; </span></font></font><br data-dcnode-id="1027"><br data-dcnode-id="1026"><font data-dcnode-id="976" size="3"><font color="#8d2424" data-dcnode-id="1023"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The information on this page covers:</span></strong></font><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">1. The current situation regarding crossing irregularly into Canada to seek asylum.&nbsp; </span><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">AFTER READING THIS PAGE,</span></strong><span data-dcnode-id="1018" instrument_node=""> you can go </span><strong data-dcnode-id="1015"><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/crossing-at-roxham-road.html"><span data-dcnode-id="1017" instrument_node="">HERE</span></a></strong><span data-dcnode-id="1014" instrument_node=""> for </span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">practical details re Roxham Road.</span></strong><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">2. The situation at official land ports of Entry into Canada (POE). The</span><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node=""> Safe Third Country Agreement</span></strong><span data-dcnode-id="1007" instrument_node=""> determines who can seek asylum at a POE and who </span><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">will be excluded</span></strong><span data-dcnode-id="1004" instrument_node=""> from Canada. Please read carefully before going to a Port of Entry.</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">3. Vaccinations and testing</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">4. Help in the United States.</span><br data-dcnode-id="999"><br data-dcnode-id="998"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">You can also go&nbsp;</span></strong><span data-dcnode-id="995" instrument_node=""> </span><strong data-dcnode-id="992"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/unhcr-info-sheets.html"><span data-dcnode-id="994" instrument_node="">HERE</span></a></strong><span data-dcnode-id="991" instrument_node=""> to see useful info sheets that the UN Refugee Agency in Canada has published about claiming asylum in Canada.&nbsp;&nbsp; You can also find these information sheets in </span><strong data-dcnode-id="988"><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/info-in-arabic.html" target="_blank"><span data-dcnode-id="990" instrument_node="">ARABIC </span></a></strong><span data-dcnode-id="987" instrument_node="">and </span><strong data-dcnode-id="984"><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/info-in-kreyoacutel.html" target="_blank"><span data-dcnode-id="986" instrument_node="">KREYOL. </span></a></strong><br data-dcnode-id="983"><br data-dcnode-id="982"><font data-dcnode-id="977" size="4"><strong data-dcnode-id="978"><font color="#f50000" data-dcnode-id="979"><span data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Important Notice&nbsp; (7 April, 2022) </span></span></font></strong></font></font><br data-dcnode-id="975"><span data-dcnode-id="966"><span data-dcnode-id="974" instrument_node="">According to&nbsp; </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ici.radio-canada.ca/nouvelle/1849060/immigration-roxham-canada-trudeau-etats-unis-irregulier-passage%3FpartageApp%3Drcca_appmobile_appinfo_android" target="_blank"><span data-dcnode-id="973" instrument_node="">press articles</span></a><span data-dcnode-id="971" instrument_node=""> in December 2021,&nbsp; the Canadian and US governments are in negotiations to agree on a new Safe Third Country Agreement (STCA). According to media reports, in future the STCA will apply across the ENTIRE Canada-US border. This will mean that anyone crossing at irregular entry points like Roxham Road will fall under the rules of the new STCA and will be returned to the US if they do not qualify for one of the exceptions.</span><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">&nbsp; There have been no updates on this since December 2021.</span></strong><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node=""> However, once a new STCA is signed, it will take about one year for the rules of the&nbsp; new Agreement&nbsp; to come into force.</span></strong></span><br data-dcnode-id="965"><br data-dcnode-id="964"></div><span data-dcnode-id="962" instrument_node="">
</span><div data-dcnode-id="933" id="719568780837437662"><div data-dcnode-id="934"><div class="platform-element-contents" data-dcnode-id="939" data-platform-element-id="694046499467037623-1.2.6" id="element-da232e11-5123-4422-9e04-5404b9031af1"><span data-dcnode-id="959" instrument_node="">

</span><div class="element-content" data-dcnode-id="945"><span data-dcnode-id="956" instrument_node="">
</span><div data-dcnode-id="947" style="width: auto"><div data-dcnode-id="955"></div><div class="paragraph" data-dcnode-id="948"><strong data-dcnode-id="952"><font color="#f20606" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">IMPORTANT MESSAGE FOR PEOPLE WHO HAVE ALREADY MADE AN ASYLUM CLAIM IN THE UNITED STATES </span></font></strong><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">If you have applied&nbsp;for asylum in the US (or in the United Kingdom, New Zealand or Australia) you are no longer entitled to the full independent refugee determination&nbsp;process in Canada.&nbsp; Instead you only have access to a&nbsp;Pre-Removal Risk Assessment (PRRA)&nbsp;hearing&nbsp;conducted by&nbsp;a government official. You will be able to have a lawyer present with you.&nbsp; You need to be aware that the PRRA is a less thorough process and has a lower success rate (about 44%) than the refugee process.&nbsp; However, if you are successful you will be recognized as either a refugee or a protected person in Canada. **&nbsp; Please consult a Canadian refugee lawyer before attempting to enter Canada.&nbsp;</span><br data-dcnode-id="949"></div></div><span data-dcnode-id="946" instrument_node="">

</span><div data-dcnode-id="830" id="440488814580506882"><div data-dcnode-id="831"><div class="platform-element-contents" data-dcnode-id="836" data-platform-element-id="694046499467037623-1.2.6" id="element-5f2e741e-4347-4259-9160-9e02daab6077"><span data-dcnode-id="924" instrument_node="">

</span><div data-dcnode-id="844" style="width: auto"><div data-dcnode-id="920"></div><div class="paragraph" data-dcnode-id="845"><strong data-dcnode-id="881"><font color="#f40505" data-dcnode-id="918" size="4"><span data-dcnode-id="919" instrument_node="">Crossing Irregularly at Roxham Road</span></font><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">Please be aware that you will be arrested </span><u data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">temporarily</span></u><span data-dcnode-id="913" instrument_node=""> by the police (RCMP) at Roxham Road.&nbsp;&nbsp; After arrest, the police will take you to the offices of Canadian immigration (CBSA) to begin the asylum process.</span><br data-dcnode-id="912"><br data-dcnode-id="911"><font color="#f30606" data-dcnode-id="908"><u data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Also be aware</span></u></font><span data-dcnode-id="907" instrument_node=""> that before you cross, the police may tell&nbsp; you to go to the official&nbsp; Port of Entry at Lacolle.&nbsp; </span><font color="#f20303" data-dcnode-id="896"><font color="#2a2a2a" data-dcnode-id="897"><font data-dcnode-id="903" size="4"><u data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">However,</span></u><span data-dcnode-id="904" instrument_node="">&nbsp; y</span></font><span data-dcnode-id="902" instrument_node="">ou have the right under international law to enter Canada irregularly to make an asylum claim.</span><font color="#f30404" data-dcnode-id="898"><span data-dcnode-id="901" instrument_node=""> </span><u data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">I</span></u></font></font></font><font color="#f00303" data-dcnode-id="883"><u data-dcnode-id="890"><u data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">f </span></u><span data-dcnode-id="893" instrument_node="">you go&nbsp; to Lacolle Port of Entry</span><font color="#f30303" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&nbsp; </span></font></u><font color="#2a2a2a" data-dcnode-id="884"><font color="#f10303" data-dcnode-id="886"><u data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">you may be excluded from Canada</span></u><span data-dcnode-id="887" instrument_node=""> </span></font><span data-dcnode-id="885" instrument_node="">and&nbsp; sent back to the USA </span></font></font><span data-dcnode-id="882" instrument_node="">under the rules of the&nbsp; Safe Third Country Agreement,&nbsp; unless you qualify for an exception to the agreement (see below).</span></strong><br data-dcnode-id="880"><br data-dcnode-id="879"><strong data-dcnode-id="875"><font color="#f30202" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">It is important to bring with you any documents and&nbsp; proofs that show WHY you need to ask for asylum in Canada.</span></font><span data-dcnode-id="876" instrument_node=""> Why are you afraid to return to your country of origin? How have you been persecuted, threatened, tortured or hurt etc.?&nbsp; You will be asked questions about that. If you cannot pay for a lawyer, you may qualify for legal aid in Canada and be able to get a lawyer to help you with your asylum claim.</span></strong><br data-dcnode-id="874"><br data-dcnode-id="873"><font color="#f50101" data-dcnode-id="870"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Dress warmly for the Canadian winter and spring!&nbsp; </span></strong></font><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Equip yourself and your family with winter coats and boots, hats, scarves, mittens and long underwear.&nbsp; </span></strong><br data-dcnode-id="867"><br data-dcnode-id="866"><font color="#f50404" data-dcnode-id="863"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">If you are thinking about paying a smuggler to get you into Canada, stop and think about the risks</span></strong></font><font color="#f50202" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">.</span></font><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">&nbsp; Recently a family of&nbsp; four froze to death while trying to cross the border with the ''help'' of smugglers. Other people have had severe frostbite and lost fingers and toes. </span></strong><br data-dcnode-id="858"><br data-dcnode-id="857"><font color="#ed0202" data-dcnode-id="847" size="5"><strong data-dcnode-id="854"><font data-dcnode-id="855" size="4"><span data-dcnode-id="856" instrument_node="">For more practical information about the actual crossing go to this page: </span></font></strong><em data-dcnode-id="848"><strong data-dcnode-id="849"><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/crossing-at-roxham-road.html"><font data-dcnode-id="852" size="4"><span data-dcnode-id="853" instrument_node="">Crossing at Roxham Road</span></font><span data-dcnode-id="851" instrument_node="">.</span></a></strong></em></font><br data-dcnode-id="846"></div></div><span data-dcnode-id="843" instrument_node="">
</span></div><span data-dcnode-id="841" instrument_node="">

</span><div data-dcnode-id="791" style="width: auto"><div data-dcnode-id="819"></div><div class="paragraph" data-dcnode-id="792"><font color="#f60707" data-dcnode-id="805"><strong data-dcnode-id="806"><font data-dcnode-id="807" size="5"><font data-dcnode-id="808" size="4"><span data-dcnode-id="818" instrument_node="">IMPORTANT : for those who were sent back to the USA </span><u data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">during the pandemic border closure </span></u><span data-dcnode-id="815" instrument_node="">&nbsp; (March 2020 - November 2021)</span><br data-dcnode-id="814"><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">If you&nbsp; were directed back to the USA&nbsp;</span><u data-dcnode-id="810"><span data-dcnode-id="811" instrument_node=""> after irregular entry </span></u><span data-dcnode-id="809" instrument_node="">(e.g. at Roxham Road) during the border closure,&nbsp; you can now go to an official Port of Entry (like Lacolle) to make your asylum claim.&nbsp;&nbsp; </span></font></font></strong></font><br data-dcnode-id="804"><br data-dcnode-id="803"><font color="#f60707" data-dcnode-id="796"><strong data-dcnode-id="797"><font data-dcnode-id="798" size="5"><font data-dcnode-id="799" size="4"><span data-dcnode-id="802" instrument_node="">&nbsp; ** Make sure that you have any documents/file number you were given by CBSA when you were directed back to the USA.&nbsp;&nbsp; See Canadian government information </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsa-asfc.gc.ca/refugee-asile-covid-eng.html" target="_blank"><span data-dcnode-id="801" instrument_node="">HERE&nbsp;</span></a></font></font></strong></font><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">&nbsp; </span></strong><br data-dcnode-id="793"></div></div><span data-dcnode-id="790" instrument_node="">

</span><div data-dcnode-id="736" style="width: auto"><div data-dcnode-id="769"></div><div class="paragraph" data-dcnode-id="737"><font color="#f30202" data-dcnode-id="759"><strong data-dcnode-id="760"><font data-dcnode-id="761"><font data-dcnode-id="762" size="4"><span data-dcnode-id="768" instrument_node="">VACCINATION, TESTS and QUARANTINE</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">Asylum seekers who enter Canada </span><u data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">do not </span></u><span data-dcnode-id="763" instrument_node="">need to be vaccinated or have a negative PCR test.</span></font></font></strong></font><ul data-dcnode-id="738"><li data-dcnode-id="753"><font color="#2a2a2a" data-dcnode-id="755" size="4"><strong data-dcnode-id="756"><font data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">If&nbsp; you do NOT have proof of vaccination or have not been fully vaccinated, you will have to quarantine. </span></font></strong></font><br data-dcnode-id="754"></li><li data-dcnode-id="748"><font color="#2a2a2a" data-dcnode-id="749" size="4"><strong data-dcnode-id="750"><font data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Proof of vaccination must be in English or French. </span></font></strong></font></li><li data-dcnode-id="743"><font color="#2a2a2a" data-dcnode-id="744" size="4"><strong data-dcnode-id="745"><font data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">A certified translation in English or French must accompany&nbsp;vaccination proofs in other languages.</span></font></strong></font></li><li data-dcnode-id="739"><strong data-dcnode-id="740"><font color="#2a2a2a" data-dcnode-id="741" size="4"><span data-dcnode-id="742" instrument_node="">Regardless of your vaccination status, you will have to take a COVID test when you arrive at the border.</span></font></strong></li></ul></div></div><span data-dcnode-id="735" instrument_node="">

</span><div class="element-content" data-dcnode-id="598"><span data-dcnode-id="703" instrument_node="">
</span><div data-dcnode-id="600" style="width: auto"><div data-dcnode-id="702"></div><div class="paragraph" data-dcnode-id="601"><font data-dcnode-id="698" size="4"><strong data-dcnode-id="699"><font color="#fa0505" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">CROSSING AT AN OFFICIAL LAND PORT OF ENTRY</span></font></strong></font><font color="#f10303" data-dcnode-id="688"><strong data-dcnode-id="689"><font data-dcnode-id="696" size="4"><span data-dcnode-id="697" instrument_node=""> (Like Lacolle): THE SAFE THIRD COUNTRY AGREEMENT</span></font><br data-dcnode-id="695"><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">NOTE: The following information describes the rules for asylum seekers at official land Ports of Entry since 2004.</span><br data-dcnode-id="692"><u data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">It will not change unless the Agreement is suspended or ended. </span></u></strong></font><br data-dcnode-id="687"><br data-dcnode-id="686"><ul data-dcnode-id="676"><li data-dcnode-id="677"><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">If you are seeking asylum in Canada </span></strong><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">AND you meet one of the exceptions to the Safe Third Country Agreement</span></strong><span data-dcnode-id="681" instrument_node=""> (STCA), you can go to an official&nbsp;land Port of Entry to make a refugee claim. </span><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Note:</span></strong><span data-dcnode-id="678" instrument_node=""> the STCA does not apply to U.S. citizens or to habitual residents of the United States who are not citizens of any country ("stateless persons").&nbsp;</span></li></ul><span data-dcnode-id="675" instrument_node=""> &nbsp;</span><ul data-dcnode-id="650"><li data-dcnode-id="651"><strong data-dcnode-id="671"><font color="#f00202" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">FIRST make sure you fit under an exception to the STCA.&nbsp; The four exceptions are:</span></font><span data-dcnode-id="672" instrument_node=""> </span></strong><span data-dcnode-id="670" instrument_node="">having a close family member </span><u data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">with the right status</span></u><span data-dcnode-id="667" instrument_node="">&nbsp; residing in Canada - being an unaccompanied child under 18 - being at risk of the death penalty - having the right Canadian visa.&nbsp; </span><strong data-dcnode-id="660"><font color="#f40404" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Important:</span></font><span data-dcnode-id="664" instrument_node=""> Read about STCA exceptions </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bridgesnotborders.ca/uploads/1/3/2/0/13208493/stca_english2.pdf"><span data-dcnode-id="663" instrument_node="">HERE</span></a><span data-dcnode-id="661" instrument_node=""> and also at the</span></strong><strong data-dcnode-id="656"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">&nbsp; </span></strong><span data-dcnode-id="657" instrument_node="">Canadian government website </span></strong><strong data-dcnode-id="653"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsa-asfc.gc.ca/agency-agence/stca-etps-eng.html" target="_blank"><span data-dcnode-id="655" instrument_node="">HERE.</span></a></strong><br data-dcnode-id="652"></li></ul><span data-dcnode-id="649" instrument_node=""> &nbsp;</span><ul data-dcnode-id="626"><li data-dcnode-id="627"><strong data-dcnode-id="646"><font color="#f50202" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Before going to a land Port of Entry you are strongly advised&nbsp;to consult:</span></font></strong><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> 1.&nbsp; Vive Shelter</span></strong><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node=""> in Buffalo</span></strong><span data-dcnode-id="641" instrument_node="">,&nbsp;</span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">New York</span></strong><span data-dcnode-id="638" instrument_node="">&nbsp;to get advice about STCA exceptions on 716.892.4354 or&nbsp;&nbsp;vivelegal@jrchc.org&nbsp; or </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">2.&nbsp; a Canadian refugee lawyer:&nbsp;</span></strong><span data-dcnode-id="635" instrument_node=""> You can call/write</span><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node=""> Romero House in Toronto</span></strong><span data-dcnode-id="632" instrument_node="">, Ontario&nbsp;&nbsp;to obtain the name of a lawyer: &nbsp;416.763.1303 / </span><strong data-dcnode-id="629"><a data-dcnode-id="630" href="mailto:info@romerohouse.org" target="_blank"><span data-dcnode-id="631" instrument_node="">info@romerohouse.org</span></a></strong><span data-dcnode-id="628" instrument_node="">&nbsp;&nbsp; *Please note that you will likely need to pay a fee to the refugee lawyer.</span></li></ul><br data-dcnode-id="625"><font color="#f00101" data-dcnode-id="621"><u data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">VERY IMPORTANT</span></strong></u></font><ul data-dcnode-id="607"><li data-dcnode-id="612"><strong data-dcnode-id="615"><font color="#f40606" data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">If you DO NOT meet an exception under the STCA y</span><u data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">ou will be excluded from Canada and sent back to the US</span></u><span data-dcnode-id="617" instrument_node="">. Unless you are able to challenge this decision, you will NEVER be able to apply for asylum in Canada again</span></font></strong><font color="#f40606" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">.&nbsp;</span></font></li><li data-dcnode-id="608"><strong data-dcnode-id="609"><font color="#f30606" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">In the United States you may be put in immigration detention, and, depending on your situation, you may be put in removal proceedings (to be sent back to your home country).</span></font></strong></li></ul><br data-dcnode-id="606"><strong data-dcnode-id="603"><font color="#f30000" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">If you are allowed to enter Canada</span></font></strong><span data-dcnode-id="602" instrument_node=""> to make a refugee claim you will have to remain in isolation for 14 days unless you can prove complete vaccination (see above).</span></div></div><span data-dcnode-id="599" instrument_node="">

</span><div data-dcnode-id="480" style="width: auto"><div data-dcnode-id="543"></div><div class="paragraph" data-dcnode-id="481"><span data-dcnode-id="542" instrument_node="">​</span><strong data-dcnode-id="539" style="color:rgb(37, 37, 37)"><font color="#f20606" data-dcnode-id="540" size="5"><span data-dcnode-id="541" instrument_node="">HELP IN THE USA</span></font></strong><ul data-dcnode-id="482"><li data-dcnode-id="526" style="color:rgb(37, 37, 37)"><strong data-dcnode-id="535"><span data-dcnode-id="538" instrument_node="">We work closely with&nbsp;</span><font color="#f00707" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Plattsburgh Cares</span></font></strong><span data-dcnode-id="534" instrument_node="">, a volunteer organization in Plattsburgh (New York State), which gives information and support to people wanting to leave the US to seek asylum in Canada. You can contact them for support at:&nbsp;</span><a data-dcnode-id="532" href="mailto:support@plattsburghcares.org"><span data-dcnode-id="533" instrument_node="">support@plattsburghcares.org</span></a><span data-dcnode-id="531" instrument_node="">&nbsp; or call them at </span><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">518-243-8292 or 518-240-8866</span></strong><span data-dcnode-id="528" instrument_node="">.</span><br data-dcnode-id="527"></li><li data-dcnode-id="514" style="color:rgb(37, 37, 37)"><font color="#2a2a2a" data-dcnode-id="522"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">If you are in or near to Plattsburgh, NY </span></strong><span data-dcnode-id="523" instrument_node="">you can contact</span></font><strong data-dcnode-id="519"><font color="#db0505" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node=""> Diane Noiseux of the Office for New Americans in Plattsburgh</span></font></strong><font color="#000000" data-dcnode-id="515"><span data-dcnode-id="518" instrument_node="">&nbsp; for emergency shelter (for 24-48 hours)&nbsp;on&nbsp;&nbsp;</span><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">518-420-7210 . </span></strong></font></li><li data-dcnode-id="500"><span data-dcnode-id="513" instrument_node="">Contact the </span><strong data-dcnode-id="510"><font color="#db0505" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Office for New Americans Hotline</span></font></strong><span data-dcnode-id="509" instrument_node=""> for &nbsp;advice on US immigration matters and the border situation on&nbsp;</span><strong data-dcnode-id="507" style="color:rgb(0, 0, 0)"><span data-dcnode-id="508" instrument_node="">1-800-566-7636 (service in many languages):</span></strong><span data-dcnode-id="501" style="color:rgb(0, 0, 0)"><span data-dcnode-id="506" instrument_node=""> &nbsp;</span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dos.ny.gov/office-new-americans%3Futm_medium%3D301%26utm_source%3Dwww.newamericans.ny.gov" target="_blank"><span data-dcnode-id="505" instrument_node=""> </span><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Website</span></strong></a></span></li><li data-dcnode-id="483"><font color="#000000" data-dcnode-id="499"></font><font color="#000000" data-dcnode-id="498"></font><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">T</span></strong><span data-dcnode-id="495" instrument_node="">he </span><font color="#f30000" data-dcnode-id="491"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">New York Immigration Coalition</span></strong><span data-dcnode-id="492" instrument_node=""> </span></font><span data-dcnode-id="490" instrument_node="">works for all immigrants and asylum seekers in New York State.&nbsp; Here is a </span><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">list of legal service providers</span></strong><span data-dcnode-id="487" instrument_node=""> on their website:&nbsp; </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nyic.org/providers/"><span data-dcnode-id="486" instrument_node="">https://www.nyic.org/providers/</span></a><span data-dcnode-id="484" instrument_node="">.​</span></li></ul></div></div><span data-dcnode-id="479" instrument_node="">
