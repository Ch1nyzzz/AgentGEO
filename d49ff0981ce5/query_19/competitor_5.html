</span><div data-dcnode-id="778" id="bsf_rt_marker"><p data-dcnode-id="898"><strong data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">The UK has been shocked by </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2017/apr/03/five-charged-over-attack-on-teenage-asylum-seeker-in-croydon"><span data-dcnode-id="906" instrument_node="">a violent attack on a young asylum seeker</span></a><span data-dcnode-id="904" instrument_node=""> in Croydon. Even some&nbsp;tabloid newspapers that&nbsp;are usually hostile to migrants have&nbsp;jumped to condemn his attackers. Does this mark a shift in attitudes&nbsp;towards asylum seekers, and do people really understand the&nbsp;rights of those who</span></strong><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">&nbsp;flee their home countries to escape war, torture or persecution?</span></strong><span data-dcnode-id="899" instrument_node="">Asylum seekers in the UK do have fundamental rights. The Government has set in place procedures to process those seeking safety in the UK, and to comply with our human rights obligations. Because not only is this&nbsp;a moral issue, but international laws mean that we must offer a person refuge if their life is at risk.</span></p><span data-dcnode-id="897" instrument_node="">
</span><h3 data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">What actually is an Asylum Seeker?</span></h3><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><img alt="" class="alignnone size-large wp-image-18354" data-dcnode-id="893" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/app/uploads/2017/04/boaty-1024x683.jpg&amp;raw" srcset="https://eachother.org.uk/wp-content/uploads/2017/04/boaty.jpg 1024w, https://eachother.org.uk/wp-content/uploads/2017/04/boaty-300x200.jpg 300w, https://eachother.org.uk/wp-content/uploads/2017/04/boaty-768x512.jpg 768w, https://eachother.org.uk/wp-content/uploads/2017/04/boaty-130x87.jpg 130w" width="1024"></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">Lots of terms are used about refugees and asylum seekers, not always accurately, so it can be a little confusing. </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationobservatory.ox.ac.uk/resources/briefings/migration-to-the-uk-asylum/"><span data-dcnode-id="889" instrument_node="">An asylum seeker</span></a><span data-dcnode-id="887" instrument_node="">&nbsp;is someone&nbsp;who flees their country of origin and seeks&nbsp;protection in another country by applying for asylum.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">An asylum seeker may be later recognised as a “refugee” and given refugee status if they meet the definition of refugee&nbsp;set out </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/uk/1951-refugee-convention.html"><span data-dcnode-id="883" instrument_node="">the 1951 United Nations Refugee Convention</span></a><span data-dcnode-id="881" instrument_node="">. Under the Refugee Convention, a refugee is someone who has fled their own country and cannot return due to a well-founded fear of persecution. The persecution may relate to a&nbsp;person’s race, religion, nationality, membership of a particular social group, or political opinion.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The Refugee Convention definition is universally binding, but there are other laws&nbsp;which protect&nbsp;people &nbsp;if they don’t fall within this convention.&nbsp;Essentially, international law says that the Government cannot&nbsp;return someone to their home country if they could face torture or persecution. In 2011, the European Union expanded on this definition to include people fleeing war.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">If an asylum seeker’s application is granted, they become a refugee. If the application is refused, however, they become a refused asylum seeker. They may choose to return to their home country themselves, or the Government may forcibly remove them.</span></p><span data-dcnode-id="873" instrument_node="">
</span><h3 data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Human Rights&nbsp;Belong to Everyone</span></h3><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><img alt="" class="alignnone size-large wp-image-18352" data-dcnode-id="869" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/app/uploads/2017/04/madi-robson-113926-1024x682.jpg&amp;raw" srcset="https://eachother.org.uk/wp-content/uploads/2017/04/madi-robson-113926-1024x682.jpg 1024w, https://eachother.org.uk/wp-content/uploads/2017/04/madi-robson-113926-300x200.jpg 300w, https://eachother.org.uk/wp-content/uploads/2017/04/madi-robson-113926-768x512.jpg 768w, https://eachother.org.uk/wp-content/uploads/2017/04/madi-robson-113926-130x87.jpg 130w" width="1024"></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="866" instrument_node="">One of the defining factors of human rights is that they belong to everyone. It doesn’t matter if you’re a British citizen, a refugee, or an asylum seeker applying to become a refugee, you have </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/stories/what-it-means-to-treat-asylum-seekers-with-humanity/"><span data-dcnode-id="865" instrument_node="">the right to be treated with humanity</span></a><span data-dcnode-id="863" instrument_node="">. As part of the </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/what-is-the-european-convention-on-human-rights-and-why-does-it-matter/"><span data-dcnode-id="862" instrument_node="">Human Rights Convention</span></a><span data-dcnode-id="860" instrument_node=""> we all have basic rights, including&nbsp;</span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/your-rights-infographic/right-to-liberty/"><span data-dcnode-id="859" instrument_node="">the right to liberty</span></a><span data-dcnode-id="857" instrument_node="">, </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/your-rights-infographic/right-to-life/"><span data-dcnode-id="856" instrument_node="">life</span></a><span data-dcnode-id="854" instrument_node="">, and </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/your-rights-infographic/free-speech/"><span data-dcnode-id="853" instrument_node="">free speech</span></a><span data-dcnode-id="851" instrument_node="">, for example.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="848" instrument_node="">Previous human rights cases have proven that refugees </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="847" instrument_node="">can’t be sent back to a place that makes them suicidal</span></a><span data-dcnode-id="845" instrument_node="">, that </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="844" instrument_node="">female genital mutilation is form of torture</span></a><span data-dcnode-id="842" instrument_node="">, and that asylum seekers are </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="841" instrument_node="">entitled to accommodation while a decision is being made on their&nbsp;</span></a><span data-dcnode-id="839" instrument_node="">application. Refugees also have the right to family life, so they must be </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="838" instrument_node="">allowed to reunite with their families</span></a><span data-dcnode-id="836" instrument_node="">. If a serious crime is committed against a refugee or asylum seeker, the police have a duty to investigate the crime and punish the offender.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="833" instrument_node="">However, this doesn’t mean that asylum seekers in the UK are free to conduct their lives in the same way as British citizens. Many people arriving in this country are&nbsp;</span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/system-asylum-without-detention/"><span data-dcnode-id="832" instrument_node="">kept in immigration detention centres</span></a><span data-dcnode-id="830" instrument_node="">&nbsp;while their claims are investigated. Currently, there is </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="829" instrument_node="">no upper limit on how long an asylum seeker, or failed asylum seeker, can be held</span></a><span data-dcnode-id="827" instrument_node="">&nbsp;in detention, although&nbsp;</span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/the-european-court-just-backed-the-uks-unlimited-immigration-detention-policy/"><span data-dcnode-id="826" instrument_node="">the Human Rights Court</span></a><span data-dcnode-id="824" instrument_node="">&nbsp;found that unreasonable delays were unacceptable.&nbsp;Asylum seekers are not allowed to claim benefits or work in the UK. If they are destitute and have no other means of supporting themselves, they can apply to receive asylum support, which is set at a very low rate.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">However, what is clear is that asylum seekers and refugees are entitled to our respect and protection &nbsp;– and that the justice system will act swiftly against those who harm them.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="816"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Want to know more about this kind of stuff?</span></strong></p><span data-dcnode-id="815" instrument_node="">
</span><ul data-dcnode-id="800"><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="808"><strong data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Take a look at </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/infographics/what-human-rights-do-for-seeking-refuge/"><span data-dcnode-id="812" instrument_node="">these human rights cases</span></a><span data-dcnode-id="810" instrument_node=""> which affect those seeking refuge</span></strong></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="806" instrument_node="">Read our explainer </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rightsinfo.org/explainer-world-refugee-day-refugee-protected/"><span data-dcnode-id="805" instrument_node="">on the rights of refugees</span></a></strong></li><span data-dcnode-id="801" instrument_node="">
</span></ul><span data-dcnode-id="799" instrument_node="">
