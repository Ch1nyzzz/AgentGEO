</span><article class="vce-single post-17171 post type-post status-publish format-standard has-post-thumbnail hentry category-issues" data-dcnode-id="889" id="post-17171"><span data-dcnode-id="984" instrument_node="">
</span><header class="entry-header" data-dcnode-id="971"><span data-dcnode-id="983" instrument_node="">
</span><div class="human-disclosure-placement" data-dcnode-id="978" id="human-420205148" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: -30px; margin-bottom: 15px; "><span data-dcnode-id="980" style="color: #1e73be; font-style: italic;"><span data-dcnode-id="981" instrument_node="">Disclosure: Human Rights Careers may be compensated by course providers.</span></span></div><br data-dcnode-id="977" style="clear: both; display: block; float: none;"><h1 class="entry-title" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Who Is A Climate Refugee?</span></h1><span data-dcnode-id="974" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="973"></div><span data-dcnode-id="972" instrument_node="">
</span></header><span data-dcnode-id="970" instrument_node="">
</span><div class="entry-content" data-dcnode-id="923"><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">In 2020, the United Nations High Commissioner for Refugees released their </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/5fc504d44.pdf" rel="noopener" target="_blank"><span data-dcnode-id="967" instrument_node="">Global Trends report</span></a><span data-dcnode-id="965" instrument_node="">. It revealed that one in 97 people were forcefully displaced from their homes due to causes like conflict and war. Another reason? Climate change. Extreme weather events and more long-term issues like drought and sea-level rise worsen existing threats and become woven in the tapestry of factors that force displacement. In some circles, people caught in the crossfire of environmental issues are known as “climate refugees.” Is this an accurate term? And how big of a role does climate change actually play in displacement?</span></p><span data-dcnode-id="963" instrument_node="">
</span><h2 data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Why “climate refugee” is a controversial term </span></strong></h2><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">The 2020 UNHCR report gave credence to the concept of climate refugees and what challenges they’re facing, but it’s worth knowing that the term “climate refugee” is not universally recognized. Why? Who could disagree with the reality that climate change is a problem? The reason “climate refugee” lacks an international definition is not because the UN and other international bodies consider climate irrelevant. Instead, it’s because the term simplifies a complex issue where climate is more often than not just one factor as opposed to the main cause. Dr. Nithya Natarajan, a King’s College lecturer in international development, believes most “climate refugees” are already facing major challenges and </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2020/aug/31/how-helpful-is-the-term-climate-refugee" rel="noopener" target="_blank"><span data-dcnode-id="957" instrument_node="">climate was just the last straw</span></a><span data-dcnode-id="955" instrument_node="">. Calling people “climate refugees” whitewashes the bigger drivers.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The legal definition for “refugee” also specifies that the person must cross international borders. When climate is the main cause for displacement, it often forces people to move around within their country and not across borders. That doesn’t mean climate never causes international displacement, but according to experts, it’s more common for people to not move far. The UNHCR’s report may not have changed the legal definition of “refugee,” but it made it clear that climate should be part of the conversation about displacement. In the future, “climate refugee” might become a legally recognized term, but for now, it’s more of a buzzy term than anything official.</span></p><span data-dcnode-id="950" instrument_node="">
</span><h2 data-dcnode-id="947"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Examples of climate displacement </span></strong></h2><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="945" instrument_node="">In 2018, the </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openknowledge.worldbank.org/handle/10986/29461" rel="noopener" target="_blank"><span data-dcnode-id="944" instrument_node="">World Bank released a report</span></a><span data-dcnode-id="942" instrument_node=""> focusing on three regions: Latin America, South Asia, and Sub-Saharan Africa. If action isn’t taken, over 143 million people will need to leave by 2050. The Pacific Islands are also in dire straits. The sea level is rising almost ½ inch every year, leaving 8 islands already underwater. Unfortunately, because the islands are home to a fairly small population, there hasn’t been much international action despite all the press coverage. In 2015, Ioane Tetiota was deported from New Zealand back to Kiribati, which he had fled with his family because of climate-related issues like limited drinking water. His visa expired in 2010, so he applied for refugee status. It was denied. He then took the case to the UN Human Rights Committee, saying that New Zealand had violated his right to life by deporting him. While the Committee did not find the deportation unlawful, </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/latest/news/2020/01/un-landmark-case-for-people-displaced-by-climate-change/" rel="noopener" target="_blank"><span data-dcnode-id="941" instrument_node="">it made the ground-breaking statement</span></a><span data-dcnode-id="939" instrument_node=""> that governments must take into account human rights violations caused by climate when they’re considering deporting asylum seekers.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Things are looking rough for South Asia, too. Extreme weather events like cyclones, rising temperatures, rising sea levels, and rivers flooded by melting glaciers are all major concerns. As the area sees increased urbanization and rapid economic growth, energy demand is expected to grow 66% by 2040. 800 million people will face worsening living conditions and could be forced to move. In Bangladesh alone, one in 7 might be displaced by 2050. This is because a big chunk of the population lives on the coast, which sees the most significant effects of a rising sea level, like salinization. 33 million could face health problems because of salt-contaminated drinking water. Crops are also damaged by salinization.</span></p><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">How to address climate displacement</span></strong></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">What can be done for people displaced by climate if they aren’t legally considered refugees? Most are facing challenges other than climate that can get them refugee status. Climate is starting to get recognized more, however, so the international community must step up. The 2030 Sustainable Development Goals address migration and climate change in SDG 13. Countries sign on to targets like strengthening resilience to climate-related dangers; integrating climate change measures into national strategies and policies; and improving education and institutional capacity on climate change mitigation and early warnings.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Reaching these targets is not easy. It requires investment in infrastructure, emergency aid, and job security. Nations must pay attention to longer-term issues like rising sea levels as well as natural disasters like hurricanes and cyclones. Risk reduction, data monitoring, and forecast models also play an essential part in mitigating climate change. When it comes to displacement and people seeking asylum, climate must be considered. Even if the formal definition of “refugee” doesn’t change, new terms must be created and recognized. Climate displacement must be taken seriously.</span></p><span data-dcnode-id="924" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">
