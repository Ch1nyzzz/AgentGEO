</span><p data-dcnode-id="2339"><em data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">This article is written by </span></em><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//in.linkedin.com/in/ishan-mudbidri-9610b6128" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Ishan Arun Mudbidri,</span></em></a><em data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node=""> from Marathwada Mitra Mandal’s Shankarrao Chavan Law College, Pune. This article talks about NGOs and human rights issues in modern times and the impact these organisations have on the protection of human rights.</span></em></p><span data-dcnode-id="2338" instrument_node="">

s activism"><span data-dcnode-id="2308" instrument_node="">Human rights activism</span></a><ul class="ez-toc-list-level-2" data-dcnode-id="2287"><li class="ez-toc-heading-level-2" data-dcnode-id="2304"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="2305" href="#Human_rights_covenants_and_conventions" title="Human rights covenants and conventions"><span data-dcnode-id="2306" instrument_node="">Human rights covenants and conventions</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2288"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="2302" href="#Important_human_rights_issues_around_the_world_in_recent_times" title="Important human rights issues around the world in recent times"><span data-dcnode-id="2303" instrument_node="">Important human rights issues around the world in recent times</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2289"><li class="ez-toc-heading-level-3" data-dcnode-id="2299"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="2300" href="#Rohingya_crisis" title="Rohingya crisis"><span data-dcnode-id="2301" instrument_node="">Rohingya crisis</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2296"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="2297" href="#Afghanistan_takeover" title="Afghanistan takeover"><span data-dcnode-id="2298" instrument_node="">Afghanistan takeover</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2293"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="2294" href="#Ethiopian_crisis" title="Ethiopian crisis"><span data-dcnode-id="2295" instrument_node="">Ethiopian crisis</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2290"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="2291" href="#Uighur_Muslims_issue_in_China" title="Uighur Muslims issue in China"><span data-dcnode-id="2292" instrument_node="">Uighur Muslims issue in China</span></a></li></ul>< CLAP" title="Committee for Legal Aid to the Poor(CLAP)"><span data-dcnode-id="2269" instrument_node="">Committee for Legal Aid to the Poor(CLAP)</span></a></li></ul></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-1" data-dcnode-id="2260"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="2261" href="#Conclusion" title="Conclusion"><span data-dcnode-id="2262" instrument_node="">Conclusion</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-1" data-dcnode-id="2257"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="2258" href="#References" title="References"><span data-dcnode-id="2259" instrument_node="">References</span></a></li></ul></nav></div><span data-dcnode-id="2253" instrument_node="">
</span><h1 data-dcnode-id="2249"><span class="ez-toc-section" data-dcnode-id="2252" id="Introduction"></span><span data-dcnode-id="2251" instrument_node="">Introduction</span><span class="ez-toc-section-end" data-dcnode-id="2250"></span></h1><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node="">“</span><em data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">To deny people their human rights is to challenge their very humanity</span></em><span data-dcnode-id="2244" instrument_node="">”</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">-Nelson Mandela</span></p><div class="td-a-rec td-a-rec-id-content_inline tdi_2 td_block_template_1" data-dcnode-id="2234"><span data-dcnode-id="2239" instrument_node="">
</span><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lawsikho.com/m%26abootcamp%3Fp_source%3DiPleaders_InArticle_Top" target="_blank"><img class="td-animation-stack-type0-2" data-dcnode-id="2236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ipleaders.in/wp-content/uploads/2022/04/article-inline.png&amp;raw"></a></div><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Human rights are necessary for the survival of mankind. These rights protect our right to freedom, right to life and liberty, freedom from slavery and torture, etc. These are universally accepted principles governed by International law. However, there seems to remain a gap between actual acceptance of these rights and laws which mention them. Weaker sections of the society many times cannot cope with the existing legal structure on human rights. Hence, this is where Non-Governmental Organisations (NGOs) intervene.</span></p><span data-dcnode-id="2230" instrument_node="">
</span><h1 data-dcnode-id="2226"><span class="ez-toc-section" data-dcnode-id="2229" id="What_are_NGOs"></span><span data-dcnode-id="2228" instrument_node="">What are NGOs</span><span class="ez-toc-section-end" data-dcnode-id="2227"></span></h1><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2224" instrument_node="">The NGO sector is developing rapidly across the globe. What started as a cure to tackle poverty, illiteracy, and other social evils today has extended to global trade, finance, the environment, and building international relations. So what are NGOs? NGOs in simple words are organisations that think beyond money or financial profit and work towards helping people grow. A very well-defined meaning of the term NGO is given by the </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldbank.org/en/home"><span data-dcnode-id="2223" instrument_node="">World Bank </span></a><span data-dcnode-id="2221" instrument_node="">as, private organisations which conduct activities to promote the interests of the poor, provide social services, and undertake community development. According to the </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ngoadvisor.net/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2220" instrument_node="">NGO Advisor’s 2021 statistics</span></a><span data-dcnode-id="2218" instrument_node="">, the </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ngoadvisor.net/ong/brac" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2217" instrument_node="">Bangladesh Rehabilitation Assistance Committee,</span></a><span data-dcnode-id="2215" instrument_node=""> also known as (BRAC) an NGO placed in Dhaka Bangladesh was voted the best NGO in the world. Among the much-appreciated work done by the BRAC, providing aid to the Rohingya, at a time when the world is fighting for solutions against the humanitarian crisis, stood out. This was just one example of the tremendous work these NGOs do, and across the globe, the number of NGOs is also increasing. As more NGOs have entered the frame, their scope as mentioned above has also grown wide.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><h2 data-dcnode-id="2209"><span class="ez-toc-section" data-dcnode-id="2212" id="Lending_a_hand_in_international_trade"></span><span data-dcnode-id="2211" instrument_node="">Lending a hand in international trade</span><span class="ez-toc-section-end" data-dcnode-id="2210"></span></h2><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2207" instrument_node="">Certain NGOs around the world have entered into international trade. The </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wto.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2206" instrument_node="">World Trade Organisation </span></a><span data-dcnode-id="2204" instrument_node="">also has readily accepted the participation of NGOs in world trade issues and debates. The </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wto.org/english/forums_e/public_forum_e/public_forum_e.htm"><span data-dcnode-id="2203" instrument_node="">Public Forum,</span></a><span data-dcnode-id="2201" instrument_node=""> which is the WTO’s largest outreach event, gives an opportunity for various organisations to publicly debate on trade issues across the globe. Various NGOs have participated in this event since 2001 and given their views. Further, </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wto.org/english/docs_e/legal_e/04-wto_e.htm"><span data-dcnode-id="2200" instrument_node="">Article 5(2) </span></a><span data-dcnode-id="2198" instrument_node="">of the </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wto.org/english/docs_e/legal_e/04-wto_e.htm"><span data-dcnode-id="2197" instrument_node="">Marrakesh Agreement </span></a><span data-dcnode-id="2195" instrument_node="">states that the General Council of the WTO shall consult and cooperate with the Non-governmental organisations on matters related to the organisation. Hence, due to strong relations with the WTO, various NGOs have widened their scope to international trade including, </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//actionaid.org/"><span data-dcnode-id="2194" instrument_node="">Action Aid International</span></a><span data-dcnode-id="2192" instrument_node="">, </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumersinternational.org/"><span data-dcnode-id="2191" instrument_node="">Consumers International,</span></a><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eviangroup.org/"><span data-dcnode-id="2189" instrument_node=""> Evian Group</span></a><span data-dcnode-id="2187" instrument_node="">, etc.</span></p><span data-dcnode-id="2185" instrument_node="">
</span><h2 data-dcnode-id="2181"><span class="ez-toc-section" data-dcnode-id="2184" id="Helping_in_environmental_protection"></span><span data-dcnode-id="2183" instrument_node="">Helping in environmental protection</span><span class="ez-toc-section-end" data-dcnode-id="2182"></span></h2><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2179" instrument_node="">A well-established NGO in the vicinity can be of huge help to the environment. Raising environmental issues in the society, creating awareness among the public, conducting timely research on various environmental aspects and reporting it, protecting the wildlife, etc. are some of the work which environmental NGOs do. Increased awareness regarding environmental protection can be seen amongst the youth. An example of this is </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/activist/greta-thunberg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2178" instrument_node="">Greta Thunberg,</span></a><span data-dcnode-id="2176" instrument_node=""> an 18-year-old environmental activist whose</span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fridaysforfuture.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2175" instrument_node=""> School Strike for Climate movement</span></a><span data-dcnode-id="2173" instrument_node=""> has been lauded around the world. Some of the biggest environmental NGOs around the world include </span><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldwildlife.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2172" instrument_node="">The World Wildlife Fund,</span></a><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenpeace.org/india/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2170" instrument_node=""> Greenpeace,</span></a><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foei.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2168" instrument_node=""> Friends of the Earth</span></a><span data-dcnode-id="2166" instrument_node="">, and </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nrdc.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2165" instrument_node="">Natural Resources Defence Council.</span></a></p><span data-dcnode-id="2162" instrument_node="">
</span><h2 data-dcnode-id="2158"><span class="ez-toc-section" data-dcnode-id="2161" id="How_are_NGOs_financed"></span><span data-dcnode-id="2160" instrument_node="">How are NGOs financed</span><span class="ez-toc-section-end" data-dcnode-id="2159"></span></h2><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2156" instrument_node="">NGOs work for the betterment of the society and not for monetary requirements. However, to run the organisation, funding becomes pretty obvious. The majority of NGOs depend on common sources of funding like subscription, donation, membership fees, etc. Other sources include aid from international organisations like The</span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/en/"><span data-dcnode-id="2155" instrument_node=""> UN,</span></a><span data-dcnode-id="2153" instrument_node=""> World Bank,</span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imf.org/en/Home"><span data-dcnode-id="2152" instrument_node=""> International Monetary Fund,</span></a><span data-dcnode-id="2150" instrument_node=""> and at times grant-in-aid by the government.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><h2 data-dcnode-id="2144"><span class="ez-toc-section" data-dcnode-id="2147" id="Legal_status"></span><span data-dcnode-id="2146" instrument_node="">Legal status</span><span class="ez-toc-section-end" data-dcnode-id="2145"></span></h2><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2142" instrument_node="">International law does not mention the legality of NGOs. However, as NGOs are spread out in many countries, national laws do regulate NGOs as legal entities. For example, in India&nbsp; NGOs come under the purview of different legal enactments like the Income Tax Act 19</span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.incometaxindia.gov.in/pages/acts/income-tax-act.aspx%3Fkey%3D2%26key%3D2"><span data-dcnode-id="2141" instrument_node="">61</span></a><span data-dcnode-id="2139" instrument_node="">, the </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mca.gov.in/Ministry/actsbills/pdf/Societies_Registration_Act_1860.pdf"><span data-dcnode-id="2138" instrument_node="">Societies Registration Act 1860,</span></a><span data-dcnode-id="2136" instrument_node=""> the</span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mca.gov.in/Ministry/pdf/CompaniesAct2013.pdf"><span data-dcnode-id="2135" instrument_node=""> Companies Act 2013</span></a><span data-dcnode-id="2133" instrument_node="">, and the</span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//legislative.gov.in/sites/default/files/A1882-02.pdf"><span data-dcnode-id="2132" instrument_node=""> Public Trust Acts </span></a><span data-dcnode-id="2130" instrument_node="">of that particular state. Giving a universal legal recognition to the NGOs under international law is necessary because this will ensure the participation of more NGOs in the administration and their decision-making process, which will, in turn, help the political leadership of the country. Further, people will also start trusting these organisations more and will take help from them.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><h1 data-dcnode-id="2124"><span class="ez-toc-section" data-dcnode-id="2127" id="Human_rights_activism"></span><span data-dcnode-id="2126" instrument_node="">Human rights activism</span><span class="ez-toc-section-end" data-dcnode-id="2125"></span></h1><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2122" instrument_node="">Despite there being documents imposing individual rights like </span><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Magna-Carta"><span data-dcnode-id="2121" instrument_node="">The Magna Carta(1215)</span></a><span data-dcnode-id="2119" instrument_node="">, </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/british-history/english-bill-of-rights"><span data-dcnode-id="2118" instrument_node="">The English Bill of Rights(1689)</span></a><span data-dcnode-id="2116" instrument_node="">, </span><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Declaration-of-the-Rights-of-Man-and-of-the-Citizen"><span data-dcnode-id="2115" instrument_node="">The French Declaration on Rights of Man and Citizen(1789),</span></a><span data-dcnode-id="2113" instrument_node=""> and the </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archives.gov/founding-docs/bill-of-rights-transcript"><span data-dcnode-id="2112" instrument_node="">US Constitution on Bill of Rights(1791),</span></a><span data-dcnode-id="2110" instrument_node=""> it took two devastating </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/world-war-ii/world-war-ii-history"><span data-dcnode-id="2109" instrument_node="">World Wars</span></a><span data-dcnode-id="2107" instrument_node=""> for the people to actually believe human rights should be brought up as an issue on the World stage.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2104" instrument_node="">The birth of the United Nations in 1945, was a step to recognize human rights issues around the world. UN member states pledged to establish and promote human rights to all. Further, in 1948, the UN adopted the Universal Decl</span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/en/about-us/universal-declaration-of-human-rights"><span data-dcnode-id="2103" instrument_node="">aration of Human Rights</span></a><span data-dcnode-id="2101" instrument_node=""> with a vote from a majority of 56 member nations. Its main concern was the recognition of human rights on the global stage. The preamble of the UDHR itself mentions, recognizing equal rights to all members of a family is needed for maintaining freedom and peace in the world.</span></p><span data-dcnode-id="2099" instrument_node="">
</span><h2 data-dcnode-id="2095"><span class="ez-toc-section" data-dcnode-id="2098" id="Human_rights_covenants_and_conventions"></span><span data-dcnode-id="2097" instrument_node="">Human rights covenants and conventions</span><span class="ez-toc-section-end" data-dcnode-id="2096"></span></h2><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2093" instrument_node="">Keeping in mind the principles of the UDHR, various covenants and conventions were established. The</span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.echr.coe.int/documents/convention_eng.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2092" instrument_node=""> European Convention on Human Rights</span></a><span data-dcnode-id="2090" instrument_node=""> was adopted in 1950 by 40 European nations including the United Kingdom. The main objective of this convention was to ensure the protection of human rights in Europe. Further, the UN drafted the</span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/documents/publications/factsheet2rev.1en.pdf"><span data-dcnode-id="2089" instrument_node=""> International Bill of Rights </span></a><span data-dcnode-id="2087" instrument_node="">which included two treaties namely, the</span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/ccpr.aspx"><span data-dcnode-id="2086" instrument_node=""> International Covenant on Civil and Political Rights </span></a><span data-dcnode-id="2084" instrument_node="">(ICCPR), and the </span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/cescr.aspx"><span data-dcnode-id="2083" instrument_node="">International Covenant on Economic, Social, and Cultural Rights </span></a><span data-dcnode-id="2081" instrument_node="">(ICESCR). Both these covenants focus on giving basic rights like food, shelter, education, freedom of speech, religion. In addition to this, the UN has adopted other conventions for social evils like child abuse, genocides, refugees, etc. which include the</span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/statusofrefugees.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2080" instrument_node=""> Convention Relating to the Status of Refugees, 1951</span></a><span data-dcnode-id="2078" instrument_node="">, the </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/cedaw.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2077" instrument_node="">Convention on the Elimination of All Forms of Discrimination against Women, 1979,</span></a><span data-dcnode-id="2075" instrument_node=""> the</span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/crc.aspx"><span data-dcnode-id="2074" instrument_node=""> Convention on the Rights of the Child, 1989</span></a><span data-dcnode-id="2072" instrument_node="">.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><h2 data-dcnode-id="2066"><span class="ez-toc-section" data-dcnode-id="2069" id="Important_human_rights_issues_around_the_world_in_recent_times"></span><span data-dcnode-id="2068" instrument_node="">Important human rights issues around the world in recent times</span><span class="ez-toc-section-end" data-dcnode-id="2067"></span></h2><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Despite there being steps taken for ensuring human rights across the globe, human rights violations have been eminent.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><h3 data-dcnode-id="2058"><span class="ez-toc-section" data-dcnode-id="2061" id="Rohingya_crisis"></span><span data-dcnode-id="2060" instrument_node="">Rohingya crisis</span><span class="ez-toc-section-end" data-dcnode-id="2059"></span></h3><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2056" instrument_node="">“The world must never forget the one million Rohingya from Myanmar”, quite rightly stated by UN human rights expert Tom Andrews after his recent </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.un.org/en/story/2021/12/1108392"><span data-dcnode-id="2055" instrument_node="">visit</span></a><span data-dcnode-id="2053" instrument_node=""> to Bangladesh. Bangladesh, the same country where a large number of a Muslim minority group called the </span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/tag/rohingya" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2052" instrument_node="">Rohingyas </span></a><span data-dcnode-id="2050" instrument_node="">fled to from their home country Myanmar, back in 2017. This was due to a genocidal attack on the community done by the military. Currently, these Rohingya are staying in overcrowded refugee camps in Bangladesh. Denied Myanmar citizenship numerous times, these people are stateless, homeless, without freedom of movement, and basic necessities. This crisis has posed a lot of questions on human rights to world leaders and continues to do so.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><h3 data-dcnode-id="2044"><span class="ez-toc-section" data-dcnode-id="2047" id="Afghanistan_takeover"></span><span data-dcnode-id="2046" instrument_node="">Afghanistan takeover</span><span class="ez-toc-section-end" data-dcnode-id="2045"></span></h3><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2042" instrument_node="">The Taliban captured Afghanistan a couple of months back. What was promised as a </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewire.in/south-asia/global-community-human-rights-violations-taliban-afghanistan"><span data-dcnode-id="2041" instrument_node="">truce</span></a><span data-dcnode-id="2039" instrument_node=""> by the Taliban, ended up becoming human rights violations. The extrajudicial killings, injustice against Afghan women and children, all call for a serious humanitarian issue to which no one seems to have an answer.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><h3 data-dcnode-id="2033"><span class="ez-toc-section" data-dcnode-id="2036" id="Ethiopian_crisis"></span><span data-dcnode-id="2035" instrument_node="">Ethiopian crisis</span><span class="ez-toc-section-end" data-dcnode-id="2034"></span></h3><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2031" instrument_node="">Political disagreements for a long time led to </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.un.org/en/story/2021/12/1108172"><span data-dcnode-id="2030" instrument_node="">infighting</span></a><span data-dcnode-id="2028" instrument_node=""> between the rebel forces in the Tigray region which is the northern part of Ethiopia and Prime Minister Abiy Ahmed’s military. Further, there were reports of sexual violence and torture against Ethiopian women and children. The rebel forces in Tigray are opposing the reforms started by the PM, leading to an all-out offensive in the country.</span></p><span data-dcnode-id="2026" instrument_node="">
</span><h3 data-dcnode-id="2022"><span class="ez-toc-section" data-dcnode-id="2025" id="Uighur_Muslims_issue_in_China"></span><span data-dcnode-id="2024" instrument_node="">Uighur Muslims issue in China</span><span class="ez-toc-section-end" data-dcnode-id="2023"></span></h3><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node="">Xinjiang province, a north-west region in China is where the Muslim minority group Uighurs reside. The Chinese administration has been detaining Uighurs in</span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-europe-56487162"><span data-dcnode-id="2019" instrument_node=""> camps</span></a><span data-dcnode-id="2017" instrument_node=""> close to the north-west province. Various allegations of rape, torture, forced sterlizations have emerged against the Chinese. Various countries including the US, UK, Canada, and the European Union have imposed sanctions against Chinese officials orchestrating these human rights abuses. However, the Chinese have denied such allegations and have imposed sanctions of their own on European officials. Amidst all this drama, the Uighurs continue to suffer.</span></p><span data-dcnode-id="2015" instrument_node="">
</span><h1 data-dcnode-id="2011"><span class="ez-toc-section" data-dcnode-id="2014" id="Role_of_NGOs_in_protection_of_human_rights"></span><span data-dcnode-id="2013" instrument_node="">Role of NGOs in protection of human rights</span><span class="ez-toc-section-end" data-dcnode-id="2012"></span></h1><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2009" instrument_node="">As mentioned above, the scope of NGOs has widened. The </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/aboutus/pages/viennawc.aspx"><span data-dcnode-id="2008" instrument_node="">Vienna Conference</span></a><span data-dcnode-id="2006" instrument_node=""> in 1993 conducted by the United Nations, which was attended by roughly around </span><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.coe.int/en/web/compass/human-rights-activism-and-the-role-of-ngos"><span data-dcnode-id="2005" instrument_node="">840 </span></a><span data-dcnode-id="2003" instrument_node="">NGOs around the world, pledged for a&nbsp; combined human rights mission. Human rights NGOs work towards the betterment of humanity and help in providing assistance to victims suffering from human rights violations, collecting information on persons violating human rights and reporting the same to various agencies, spreading awareness, and educating about the importance of human rights. In 2007, the United Nations established the </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/hrbodies/hrc/pages/home.aspx"><span data-dcnode-id="2002" instrument_node="">Human Rights Council </span></a><span data-dcnode-id="2000" instrument_node="">for the protection of human rights around the world. NGOs played an important role by participating in various discussions of the Council. They were instrumental in bringing to the notice of the Council various human rights violations around the world, suggesting different kinds of solutions, and approving certain resolutions. They have been key for putting pressure on their respective governments as well as the UN organs for the protection of human rights above all.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><h2 data-dcnode-id="1994"><span class="ez-toc-section" data-dcnode-id="1997" id="Amnesty_International"></span><span data-dcnode-id="1996" instrument_node="">Amnesty International</span><span class="ez-toc-section-end" data-dcnode-id="1995"></span></h2><span data-dcnode-id="1993" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1989"><figure class="alignleft size-full" data-dcnode-id="1990"><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lawsikho.com/course/certificate-course-in-introduction-to-legal-drafting" rel="noopener" target="_blank"><img alt="" class="wp-image-88641 td-animation-stack-type0-1" data-dcnode-id="1992" height="293" loading="lazy" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ipleaders.in/wp-content/uploads/2021/05/Executive-certificate-Course_696-x-293.jpg&amp;raw" srcset="https://blog.ipleaders.in/wp-content/uploads/2021/05/Executive-certificate-Course_696-x-293.jpg 696w, https://blog.ipleaders.in/wp-content/uploads/2021/05/Executive-certificate-Course_696-x-293-300x126.jpg 300w, https://blog.ipleaders.in/wp-content/uploads/2021/05/Executive-certificate-Course_696-x-293-500x210.jpg 500w" width="696"></a></figure></div><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1984"><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1987" instrument_node="">Amnesty International</span></a><span data-dcnode-id="1985" instrument_node=""> is one of the biggest human rights NGOs in the world. Founded in 1961, this organisation has been pivotal in promoting the protection of human rights around the world. AI has exposed human rights violations by governments, armed militias, political groups, etc. the AI strictly adheres to the principles mentioned in the UDHR and ensures that they are followed. In 1977, Amnesty International was awarded the Nobel Peace Prize. Recent projects taken by the organization include ensuring human rights are not violated in Israel and Palestine-occupied areas, pressing for an international investigation into last year’s Beirut explosion in Lebanon, providing humanitarian aid to war-torn Syria, helping with COVID-19 relief work, ensuring LGBTQ equality, and sexual reproductive rights around the world.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><h2 data-dcnode-id="1979"><span class="ez-toc-section" data-dcnode-id="1982" id="Impact_in_India"></span><span data-dcnode-id="1981" instrument_node="">Impact in India</span><span class="ez-toc-section-end" data-dcnode-id="1980"></span></h2><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1977" instrument_node="">International Human Rights Day is celebrated on 10th December around the world with the aim of creating awareness among people about these rights. Kailash Satyarthi, an Indian human rights activist, won the Nobel Peace Prize in</span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nobelprize.org/prizes/peace/2014/satyarthi/facts/%23%3A~%3Atext%3DIn%25202014%252C%2520Kailash%2520Satyarthi%2520was%2Cof%2520all%2520children%2520to%2520education."><span data-dcnode-id="1976" instrument_node=""> 2014</span></a><span data-dcnode-id="1974" instrument_node=""> for his efforts against child trafficking and exploitation. However, in India the scenario on human rights is tense. Various human rights issues like extrajudicial killings, rape, domestic violence, custodial deaths, etc. still prevail. In 2019, the </span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uncat.org/"><span data-dcnode-id="1973" instrument_node="">National Campaign against torture </span></a><span data-dcnode-id="1971" instrument_node="">reported around </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/wp-content/uploads/2021/03/INDIA-2020-HUMAN-RIGHTS-REPORT.pdf"><span data-dcnode-id="1970" instrument_node="">125 </span></a><span data-dcnode-id="1968" instrument_node="">custodial deaths in India. Further, the</span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.satp.org/"><span data-dcnode-id="1967" instrument_node=""> South Asian Terrorism Portal</span></a><span data-dcnode-id="1965" instrument_node=""> reported deaths of 63 civilians due to terrorism and insurgency in Kashmir and Maoist hit areas. The COVID-19 pandemic ravaged the country, the </span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecommonwealth.org/organisation/commonwealth-human-rights-initiative-chri"><span data-dcnode-id="1964" instrument_node="">Commonwealth Human Rights Initiative</span></a><span data-dcnode-id="1962" instrument_node=""> in India reported 15 casualties during the nationwide lockdown due to police beatings. The political leadership has time and again ensured to address human rights issues at all levels of the country, but there seems to be no avail. However,&nbsp; human rights NGOs have played an important role in providing aid to those suffering from human rights violations. Mentioned below are some of the top human rights-based NGOs doing a phenomenal job in India:-</span></p><span data-dcnode-id="1960" instrument_node="">
</span><h3 data-dcnode-id="1956"><span class="ez-toc-section" data-dcnode-id="1959" id="Milaan_Foundation"></span><span data-dcnode-id="1958" instrument_node="">Milaan Foundation</span><span class="ez-toc-section-end" data-dcnode-id="1957"></span></h3><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1948"><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//milaanfoundation.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1954" instrument_node="">Milaan Foundation</span></a><span data-dcnode-id="1952" instrument_node=""> is an NGO that basically works towards empowering small girls across the country. This organisation ensures underprivileged girls get all the basic requirements and proper training to stand up for themselves in the future. Till now, the organisation has worked and helped around</span><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.giveindia.org/blog/human-rights/"><span data-dcnode-id="1951" instrument_node=""> 40,000</span></a><span data-dcnode-id="1949" instrument_node=""> children in the country.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><h3 data-dcnode-id="1943"><span class="ez-toc-section" data-dcnode-id="1946" id="Child_In_Need_Institute"></span><span data-dcnode-id="1945" instrument_node="">Child In Need Institute</span><span class="ez-toc-section-end" data-dcnode-id="1944"></span></h3><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1935"><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cini-india.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1941" instrument_node="">Child in need institute</span></a><span data-dcnode-id="1939" instrument_node=""> is a non-profit organisation registered under the </span><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mca.gov.in/Ministry/actsbills/pdf/Societies_Registration_Act_1860.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1938" instrument_node="">Societies Registration Act,1860</span></a><span data-dcnode-id="1936" instrument_node=""> in India. This organisation works towards the betterment of poor children in the country. The main motive is to break the chain of social issues like poverty, illiteracy, unemployment amongst the underprivileged in the country.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><h3 data-dcnode-id="1930"><span class="ez-toc-section" data-dcnode-id="1933" id="Acid_Survivors_Sahaas_Foundation"></span><span data-dcnode-id="1932" instrument_node="">Acid Survivors Sahaas Foundation</span><span class="ez-toc-section-end" data-dcnode-id="1931"></span></h3><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1928" instrument_node="">The </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.assfindia.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1927" instrument_node="">Acid Survivors Sahaas Foundation</span></a><span data-dcnode-id="1925" instrument_node=""> provides treatment to acid-attack victims. It also ensures employment and other assistance. This NGO is based in Mumbai and provides aid to around </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.giveindia.org/blog/human-rights/"><span data-dcnode-id="1924" instrument_node="">50 </span></a><span data-dcnode-id="1922" instrument_node="">acid-attacks victims across four states in the country.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><h3 data-dcnode-id="1916"><span class="ez-toc-section" data-dcnode-id="1919" id="Committee_for_Legal_Aid_to_the_PoorCLAP"></span><span data-dcnode-id="1918" instrument_node="">Committee for Legal Aid to the Poor(CLAP)</span><span class="ez-toc-section-end" data-dcnode-id="1917"></span></h3><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node="">The </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clapindia.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1913" instrument_node="">CLAP </span></a><span data-dcnode-id="1911" instrument_node="">works towards providing legal assistance to the poor. It works towards protecting human rights through the process of law.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><h1 data-dcnode-id="1905"><span class="ez-toc-section" data-dcnode-id="1908" id="Conclusion"></span><span data-dcnode-id="1907" instrument_node="">Conclusion</span><span class="ez-toc-section-end" data-dcnode-id="1906"></span></h1><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The legal status of NGOs in international law is not yet clear. Still, NGOs across the world are doing a great job in protecting the environment, building international relations by helping various UN organisations, helping the economy prosper, and last but not the least, the protection of human rights. Human rights violations tend to occur at an alarming rate and NGOs provide for an important and effective defence mechanism against this.</span></p><span data-dcnode-id="1901" instrument_node="">
