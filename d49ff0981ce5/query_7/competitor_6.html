</span><article class="vce-single post-4695 post type-post status-publish format-standard has-post-thumbnail hentry category-countries category-magazine tag-national-human-rights-jobs" data-dcnode-id="895" id="post-4695"><span data-dcnode-id="1025" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1012"><span data-dcnode-id="1024" instrument_node="">
</span><div class="human-disclosure-placement" data-dcnode-id="1019" id="human-1431274695" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: -16px; margin-bottom: -5px; "><span data-dcnode-id="1021" style="color: #1e73be; font-style: italic;"><span data-dcnode-id="1022" instrument_node="">Disclosure: Human Rights Careers may be compensated by course providers.</span></span></div><br data-dcnode-id="1018" style="clear: both; display: block; float: none;"><h1 class="entry-title" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">6 Organizations Offering Human Rights Jobs in Canada</span></h1><span data-dcnode-id="1015" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1014"></div><span data-dcnode-id="1013" instrument_node="">
</span></header><span data-dcnode-id="1011" instrument_node="">
</span><div class="entry-content" data-dcnode-id="932"><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1009" instrument_node="">Canada has played an active role in the promotion and development of human rights norms since the 20</span><sup data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">th</span></sup><span data-dcnode-id="1006" instrument_node=""> century. As an original member of the United Nations (UN), founded in 1945 as a response to the end of the Second World War, Canada asserted its commitment to </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edu.gov.mb.ca/k12/cur/socstud/foundation_gr9/blms/9-1-2a.pdf" rel="noopener" target="_blank" title=""><span data-dcnode-id="1005" instrument_node="">recognising and combating human rights violations</span></a><span data-dcnode-id="1003" instrument_node=""> from early on. Since signing the UN’s Universal Declaration of Human Rights in 1948, a series of legislative enactments have demonstrated this continued commitment to progressing the rights of previously discriminated groups. Such legislation addresses concerns such as political rights, rights in the workplace and rights protecting against discrimination for various groups including women, aboriginal or indigenous people, people of colour, homosexuals, foreign nationals and people with disabilities.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">Current Canadian human rights concerns highlighted by ‘Human Rights Watch’ for 2016 include issues around the rights of indigenous people in Canada and more specifically, violence against indigenous women and children. Reports note high levels of female homicide in indigenous groups and critique the inadequate institutional responses to these figures, including allegations of neglecting to conduct appropriate police investigations into these cases. </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/world-report/2017/country-chapters/canada" rel="noopener" target="_blank" title=""><span data-dcnode-id="999" instrument_node="">The report</span></a><span data-dcnode-id="997" instrument_node=""> also reveals that indigenous groups, particularly in rural parts of the country, have poor access to basic resources such as clean drinking water. This has resulted in a threat to the public health of these communities.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">Another concern highlighted by the Human Rights Watch report is the detention of immigrant children in facilities “</span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/world-report/2017/country-chapters/canada" rel="noopener" target="_blank" title=""><span data-dcnode-id="993" instrument_node="">that resemble medium-security prisons</span></a><span data-dcnode-id="991" instrument_node="">”. While this type of detention is not prohibited in Canadian law, there are serious human rights concerns given that there is no limit set on how long these children can be held in these centres. Human rights groups have therefore called for review of these practices and alternatives to detention to be explored.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">In what follows, this article will provide a brief overview of the most prominent human rights organisations acting within Canada.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="982"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chrio.ca/138/47/1128/Objectives" rel="noopener" target="_blank" title=""><u data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Canadian Human Rights International Organisation (CHRIO)</span></u></a></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Founded by a variety of inter-disciplinary professionals, this not-for-profit organisation works alongside civil society to promote the defence of human rights. Monitoring human rights abuses forms one of its major activities as well as promoting aims to eliminate human rights violations by targeting individuals and groups through education programmes. The general objectives of the CHRIO, as stipulated by the organisation, are to “contribute to the defence, promotion, education, protection and realisation of human rights, including civil and political rights.” The organisation has both volunteering and student placement opportunities.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//equitas.org/" rel="noopener" target="_blank" title=""><u data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Equitas – International Centre for Human Rights Education </span></u></a></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="972" instrument_node="">Equitas, formerly known as the Canadian Human Rights Foundation, is Canada’s oldest human rights education organisation. The vision of Equitas therefore, refers explicitly to the use of participatory education activities as a means to addressing concerns around human rights. Another key mission of the organisation is to establish and maintain global networks of human rights workers in order to facilitate mutual education around human rights issues. The organisation believes that through education, greater global social justice can be achieved. Equitas works across the globe and thus offers placements in Africa, Asia, Latin America, the Caribbean, the Middle East as well as in Canada itself. </span><a data-dcnode-id="971" href="#_ftn5" name="_ftnref5"></a></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="965"><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amnesty.ca/" rel="noopener" target="_blank" title=""><u data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Amnesty International Canada </span></u></a></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Amnesty International is one of the largest global human rights organisations and therefore performs important work around monitoring, exposing and protecting against human rights violations throughout the world. The organisation’s work in Canada therefore, looks specifically at where actions from the Canadian government and people can have the greatest impact. Amnesty International in Canada has highlighted a host of ‘priority countries’ within which a huge spectrum of human rights issues are being addressed. There are opportunities for internships and volunteering positions within the Canadian division of the organisation and job openings, whilst rare, are listed on the website on a rolling basis.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="957"><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohrc.on.ca/en" rel="noopener" target="_blank" title=""><u data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Ontario Human Rights Commission (OHRC)</span></u></a></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">The OHRC is an organisation which seeks to address the “roots of discrimination” through policy development, litigation and raising awareness through education campaigns. Primarily working through legal interventions, the OHRC works on human rights issues at all levels of the court. The organisation therefore actively assists and supports individuals who have experienced discrimination or violations of their human rights by providing legal advice and assistance. It also plays a role in lobbying government and different sector and groups in order to promote organisational change and further progress towards equality.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.concordia.ca/research/migs.html" rel="noopener" target="_blank" title=""><u data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Montreal Institute for Genocide and Human Rights Studies (MIGS)</span></u></a></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Based at Concordia University in Montreal, MIGS is the leading research and advocacy institute for genocide and mass atrocity crimes prevention. The work of the institute ranges from monitoring activity to memorialising human rights abuses and it is currently engaged in a number of different projects with these aims. Apart from research fellowships, the institute also offers internships and volunteer opportunities.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jhr.ca/en/" rel="noopener" target="_blank" title=""><u data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Journalists for Human Rights (JHR)</span></u></a></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">The title claim of this organisation is “Help put human rights on the front page.” Through the use of media, JHR aims to put a spotlight on human rights and related abuses that take place. The organisation further aims to create government accountability by initiating and maintaining debate across human rights issues. JHR works primarily in the Democratic Republic of Congo (DRC), the Middle East, North Africa, South Sudan, Syria and Canada. The organisation offers volunteer and internship opportunities, as well as jobs in a variety of media-oriented and other positions. The Student Chapter initiative of JHR runs awareness and education campaigns across campuses in North America.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="936" instrument_node="">The above organisations represent some of the most prominent and active human rights organisations from a variety of different fields, operating at a national level within Canada. There are however, many regional and local initiatives which strive to promote the progression of a culture of human rights and defend against discrimination in the country and in the broader global community.</span><a data-dcnode-id="935" href="#_ftnref1" name="_ftn1"></a></p><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">

</span><h4 class="author-title" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Claire McDonald</span></h4><span data-dcnode-id="583" instrument_node="">
</span><div class="data-entry-content" data-dcnode-id="572"><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Claire McDonald is currently a Masters student studying Migration and Displacement at the University of the Witwatersrand (Wits), Johannesburg. She has a firm background in social science research and writing, having completed her undergraduate in Politics, Philosophy and Economics and her honours degree in Justice and Transformation, both at the University of Cape Town (UCT).</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Her professional experience includes almost two years work as the lead research assistant for a research organisation based at UCT – the Safety and Violence Initiative (SaVI). In 2014 she completed an internship with the United Nations High Commissioner for Refugees (UNHCR). Claire has since spent time travelling solo through parts of South America as well as Spain and Portugal. </span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Upon finishing her Master’s degree, Claire hopes to continue her career in the field of social justice, working specifically in South Africa after gaining experience working abroad.</span></p><span data-dcnode-id="573" instrument_node="">
