  </span><span data-dcnode-id="2768" data-link="mailto:?subject=The%20impact%20of%20the%20COVID-19%20pandemic%20on%20refugees%20and%20asylum%20seekers%20in%20Greece%3A%20A%20retrospective%20analysis%20of%20national%20surveillance%20data%20from%202020.&amp;body=https%3A%2F%2Feuropepmc.org%2Farticle%2FMED%2F34258570%3Fclient%3Dbot%0D%0A%0D%0A" id="article--social--shareicon-email" tabindex="0"><i class="fas fa-envelope" data-dcnode-id="2769"><span class="alt-text" data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Share with email</span></span></i></span><span data-dcnode-id="2764" data-link="#share-twitter" id="article--social--shareicon-twitter" tabindex="0"><i class="fab fa-twitter" data-dcnode-id="2765"><span class="alt-text" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Share with twitter</span></span></i></span><span data-dcnode-id="2760" data-link="#share-linkedin" id="article--social--shareicon-linkedin" tabindex="0"><i class="fab fa-linkedin" data-dcnode-id="2761"><span class="alt-text" data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Share with linkedin</span></span></i></span><span data-dcnode-id="2756" data-link="#share-facebook" id="article--social--shareicon-facebook" tabindex="0"><i class="fab fa-facebook-f" data-dcnode-id="2757"><span class="alt-text" data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Share with facebook</span></span></i></span></div></div><div data-dcnode-id="246"><div class="content-section" data-dcnode-id="2727" data-v-2f5357c2="" id="abstract"><h2 class="section-title" data-dcnode-id="2748" data-v-2f5357c2="" id="article--abstract--header"><span data-dcnode-id="2751" instrument_node="">
    Abstract&nbsp;</span><span class="right" data-dcnode-id="2749" data-v-2f5357c2=""></span></h2><hr class="thick" data-dcnode-id="2747" data-v-2f5357c2=""><div class="section-content" data-dcnode-id="2728" data-v-2f5357c2=""><div data-dcnode-id="2729" data-v-2f5357c2="" section-id="abstract"><div class="abstract" data-dcnode-id="2731" id="article--abstract--content" itemprop="description"><h4 data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Background</span></h4><span data-dcnode-id="2744" instrument_node="">Migrants globally, including refugees and asylum seekers, have experienced adverse clinical and socioeconomic impacts of the COVID-19 pandemic. For approximately 56,000 refugees and asylum seekers in Reception and Identification Centers (RICs) and Reception Sites (RS) in Greece, living in severely substandard living conditions, prevention measures have been impossible with limited provision in terms of routine testing, surveillance, and access to healthcare. These migrant populations have experienced prolonged lockdowns and restricted movement since the pandemic began. We aimed to assess the impact of COVID-19 on refugees and asylum seekers in reception facilities in Greece and explore implications for policy and practice.</span><h4 data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Methods</span></h4><span data-dcnode-id="2741" instrument_node="">A retrospective analysis of policy documents and national surveillance data was conducted to identify COVID-19 outbreaks and estimate incidence among asylum seekers and refugees residing in these camps during the first 9 months of the epidemic in Greece (26th February - 15th November 2020). Incidence proportion (IP) of COVID-19 confirmed cases was calculated for three population groups (refugees and asylum seekers in RICs, refugees and asylum seekers in RSs, and the general population in Greece) during three time periods (first wave, second wave, and overall across the 9-month period).</span><h4 data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Findings</span></h4><span data-dcnode-id="2738" instrument_node="">Twenty-five COVID-19 outbreaks were identified in refugee and asylum seeker reception facilities, with 6 (85.7%) of 7 RICs and 18 (56.3%) of 32 RSs reporting at least one outbreak during the study period. The overall 9-month COVID-19 IP among refugee and asylum seeker populations residing in RSs on the Greek mainland was 1758 cases per 100,000 population; in RICs the incidence was 2052 cases per 100,000 population. Compared to the general population the risk of COVID-19 infection among refugees and asylum seekers in reception facilities was 2.5 to 3 times higher (</span><i data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">p</span></i><span data-dcnode-id="2735" instrument_node="">-value&lt;0.001). The risk of acquiring COVID-19 infection was higher among refugee and asylum seeker populations in RSs on the Greek mainland (IP ratio: 2.45; 95% CI: 2.25-2.68) but higher still among refugee and asylum seeker populations in RICs in the Greek islands and the land border with Turkey (IP ratio: 2.86; 95% CI: 2.64-3.10), where living conditions are particularly poor.</span><h4 data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Interpretation</span></h4><span data-dcnode-id="2732" instrument_node="">We identified high levels of COVID-19 transmission among refugees and asylum seekers in reception facilities in Greece. The risk of COVID-19 infection among these enclosed population groups has been significantly higher than the general population of Greece, and risk increases as living conditions deteriorate. These data have immediate implications for policy and practice. Strategies are now needed to ensure refugee and asylum seeker populations are included in national response plans to reduce transmission in at-risk groups for COVID-19, alongside inclusion in plans for COVID-19 vaccine roll out.</span></div></div></div></div><div class="content-section" data-dcnode-id="996" data-v-2f5357c2="" id="free-full-text"><h2 class="section-title" data-dcnode-id="2723" data-v-2f5357c2="" id="article--free-full-text--header"><span data-dcnode-id="2726" instrument_node="">

-affl" data-dcnode-id="2535" id="aff0003" lang="en"><sup data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">c</span></sup><span data-dcnode-id="2536" instrument_node="">Lancet Migration global collaboration to advance migration health, Institute for Global Health, University College London, 30 Guilford Street, London WC1N1EH, UK</span></div><div class="fm-affl" data-dcnode-id="2531" id="aff0004" lang="en"><sup data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">d</span></sup><span data-dcnode-id="2532" instrument_node="">Institute for Global Health, University College London, 30 Guilford Street, London WC1N1EH, UK</span></div><div class="fm-affl" data-dcnode-id="2527" id="aff0005" lang="en"><sup data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">e</span></sup><span data-dcnode-id="2528" instrument_node="">Lancet Migration global collaboration to advance migration health, Institute for Global Health, University College London, 30 Guilford Street, London WC1N1EH, UK</span></div><div class="fm-affl" data-dcnode-id="2523" id="aff0006" lang="en"><sup data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">f</span></sup><span data-dcnode-id="2524" instrument_node="">INTERSOS Hellas, 31 Ermou Street, Thessaloniki 546 24, Greece</span></div><div class="fm-affl" data-dcnode-id="2519" id="aff0007" lang="en"><sup data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">g</span></sup><span data-dcnode-id="2520" instrument_node="">The Migrant Health Research Group, Institute for Infection and Immunity, St George's, University of London, London, UK</span></div><div data-dcnode-id="2507"><span class="contrib-email" data-dcnode-id="2514" id="au0001"><span data-dcnode-id="2518" instrument_node="">Elias Kondilis: </span><a class="oemail" data-dcnode-id="2516" data-email="rg.htua@silidnoke" href="mailto:dev@null"><span data-dcnode-id="2517" instrument_node="">rg.htua@silidnoke</span></a><span data-dcnode-id="2515" instrument_node="">; </span></span><span data-dcnode-id="2513" instrument_node=""> </span><span class="contrib-email" data-dcnode-id="2509" id="au0007"><span data-dcnode-id="2512" instrument_node="">Sally Hargreaves: </span><a class="oemail" data-dcnode-id="2510" data-email="ku.ca.lugs@sevaergrah.s" href="mailto:dev@null"><span data-dcnode-id="2511" instrument_node="">ku.ca.lugs@sevaergrah.s</span></a></span><span data-dcnode-id="2508" instrument_node=""> </span></div><div data-dcnode-id="2497" id="cor0001"><sup data-dcnode-id="2505"><img alt="[low asterisk]" border="0" data-dcnode-id="2506" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/corehtml/pmc/pmcents/x204E.gif&amp;raw" title=""></sup><span data-dcnode-id="2504" instrument_node="">Corresponding author. </span><a class="oemail" data-dcnode-id="2502" data-email="rg.htua@silidnoke" href="mailto:dev@null"><span data-dcnode-id="2503" instrument_node="">rg.htua@silidnoke</span></a><span data-dcnode-id="2500" style="unicode-bidi:bidi-override"><span data-dcnode-id="2501" instrument_node="">, </span></span><a class="oemail" data-dcnode-id="2498" data-email="ku.ca.lugs@sevaergrah.s" href="mailto:dev@null"><span data-dcnode-id="2499" instrument_node="">ku.ca.lugs@sevaergrah.s</span></a></div><div data-dcnode-id="2493" id="fn1"><sup data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">†</span></sup><span data-dcnode-id="2494" instrument_node="">Joint senior authors.</span></div></div><div class="fm-article-notes fm-panel hide half_rhythm" data-dcnode-id="2489" id="id570105_an" style="display:none"><div class="fm-pubdate half_rhythm" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Received 2021 Feb 17; Revised 2021 May 19; Accepted 2021 May 25.</span></div></div><div class="permissions fm-panel half_rhythm hide" data-dcnode-id="2482" id="id570105_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="2485"><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/pmc/about/copyright/"><span data-dcnode-id="2488" instrument_node="">Copyright</span></a><span data-dcnode-id="2486" instrument_node=""> © 2021 The Authors</span></div><div class="license half_rhythm" data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">This is an open access article under the CC BY license (http://creativecommons.org/licenses/by/4.0/).</span></div></div></div><div class="links-box whole_rhythm" data-dcnode-id="2473" id="pmclinksbox"><div class="fm-panel" data-dcnode-id="2474"><div data-dcnode-id="2475"><span data-dcnode-id="2480" instrument_node="">This article has been </span><a class="openCitations" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23impact"><span data-dcnode-id="2479" instrument_node="">cited by</span><i class="far fa-arrow-alt-circle-down" data-dcnode-id="2478"></i></a><span data-dcnode-id="2476" instrument_node=""> other articles in PMC.</span></div></div></div></div><div class="sec" data-dcnode-id="2471"></div><div class="tsec sec" data-dcnode-id="2433" id="abs0001" lang="en"><h2 class="head no_bottom_margin" data-dcnode-id="2469" id="abs0001title"><span data-dcnode-id="2470" instrument_node="">Abstract</span></h2><div data-dcnode-id="2439"><div class="sec sec-first" data-dcnode-id="2463" id="id589146"><h3 data-dcnode-id="2466" id="id589146title"><span data-dcnode-id="2467" instrument_node="">Background</span></h3><p class="p p-first-last" data-dcnode-id="2464" id="id589149"><span data-dcnode-id="2465" instrument_node="">Migrants globally, including refugees and asylum seekers, have experienced adverse clinical and socioeconomic impacts of the COVID-19 pandemic. For approximately 56,000 refugees and asylum seekers in Reception and Identification Centers (RICs) and Reception Sites (RS) in Greece, living in severely substandard living conditions, prevention measures have been impossible with limited provision in terms of routine testing, surveillance, and access to healthcare. These migrant populations have experienced prolonged lockdowns and restricted movement since the pandemic began. We aimed to assess the impact of COVID-19 on refugees and asylum seekers in reception facilities in Greece and explore implications for policy and practice.</span></p></div><div class="sec" data-dcnode-id="2458" id="id589158"><h3 data-dcnode-id="2461" id="id589158title"><span data-dcnode-id="2462" instrument_node="">Methods</span></h3><p class="p p-first-last" data-dcnode-id="2459" id="id589161"><span data-dcnode-id="2460" instrument_node="">A retrospective analysis of policy documents and national surveillance data was conducted to identify COVID-19 outbreaks and estimate incidence among asylum seekers and refugees residing in these camps during the first 9 months of the epidemic in Greece (26th February – 15th November 2020). Incidence proportion (IP) of COVID-19 confirmed cases was calculated for three population groups (refugees and asylum seekers in RICs, refugees and asylum seekers in RSs, and the general population in Greece) during three time periods (first wave, second wave, and overall across the 9-month period).</span></p></div><div class="sec" data-dcnode-id="2450" id="id589168"><h3 data-dcnode-id="2456" id="id589168title"><span data-dcnode-id="2457" instrument_node="">Findings</span></h3><p class="p p-first-last" data-dcnode-id="2451" id="id589172"><span data-dcnode-id="2455" instrument_node="">Twenty-five COVID-19 outbreaks were identified in refugee and asylum seeker reception facilities, with 6 (85.7%) of 7 RICs and 18 (56.3%) of 32 RSs reporting at least one outbreak during the study period. The overall 9-month COVID-19 IP among refugee and asylum seeker populations residing in RSs on the Greek mainland was 1758 cases per 100,000 population; in RICs the incidence was 2052 cases per 100,000 population. Compared to the general population the risk of COVID-19 infection among refugees and asylum seekers in reception facilities was 2.5 to 3 times higher (</span><em data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">p</span></em><span data-dcnode-id="2452" instrument_node="">-value&lt;0.001). The risk of acquiring COVID-19 infection was higher among refugee and asylum seeker populations in RSs on the Greek mainland (IP ratio: 2.45; 95% CI: 2.25–2.68) but higher still among refugee and asylum seeker populations in RICs in the Greek islands and the land border with Turkey (IP ratio: 2.86; 95% CI: 2.64–3.10), where living conditions are particularly poor.</span></p></div><div class="sec" data-dcnode-id="2445" id="id605132"><h3 data-dcnode-id="2448" id="id605132title"><span data-dcnode-id="2449" instrument_node="">Interpretation</span></h3><p class="p p-first-last" data-dcnode-id="2446" id="id605136"><span data-dcnode-id="2447" instrument_node="">We identified high levels of COVID-19 transmission among refugees and asylum seekers in reception facilities in Greece. The risk of COVID-19 infection among these enclosed population groups has been significantly higher than the general population of Greece, and risk increases as living conditions deteriorate. These data have immediate implications for policy and practice. Strategies are now needed to ensure refugee and asylum seeker populations are included in national response plans to reduce transmission in at-risk groups for COVID-19, alongside inclusion in plans for COVID-19 vaccine roll out.</span></p></div><div class="sec sec-last" data-dcnode-id="2440" id="id605143"><h3 data-dcnode-id="2443" id="id605143title"><span data-dcnode-id="2444" instrument_node="">Funding</span></h3><p class="p p-first-last" data-dcnode-id="2441" id="id605146"><span data-dcnode-id="2442" instrument_node="">None.</span></p></div></div><div class="sec" data-dcnode-id="2434"><strong class="kwd-title" data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Keywords: </span></strong><span class="kwd-text" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">COVID-19, Migrant, Health inequalities, Vaccination, Refugee, Greece</span></span></div></div><div class="tsec sec headless whole_rhythm" data-dcnode-id="2406" id="id605169"><p class="p p-first" data-dcnode-id="2431" id="para9001"><span data-dcnode-id="2432" instrument_node="">
</span></p><div class="boxed-text-box whole_rhythm hide-overflow" data-dcnode-id="2409" id="tbox0002"><div class="caption" data-dcnode-id="2428"><h3 data-dcnode-id="2429" id="id605183title"><span data-dcnode-id="2430" instrument_node="">Research in context</span></h3></div><div class="sec" data-dcnode-id="2423" id="sec1a0001"><h3 data-dcnode-id="2426" id="sec1a0001title"><span data-dcnode-id="2427" instrument_node="">Evidence before this study</span></h3><p class="p p-first-last" data-dcnode-id="2424" id="para1a0007"><span data-dcnode-id="2425" instrument_node="">There is very limited peer-reviewed and grey literature available on the impact of the COVID-19 pandemic refugee and asylum seekers in Greece, particularly those living in closed settings such as reception centres. Peer reviewed literature available at global level on the impact of the COVID-19 on migrants is also limited, with only one systematic review by Hayward et al. reporting on clinical outcomes and risk factors for COVID-19 among migrant populations in high-income countries. This systematic review documents potentially higher levels of transmission in closed settings, including migrant reception and detention centres, and suggests migrants in general may be over-represented in cases and deaths.</span></p></div><div class="sec" data-dcnode-id="2418" id="sec1a0002"><h3 data-dcnode-id="2421" id="sec1a0002title"><span data-dcnode-id="2422" instrument_node="">Added value of this study</span></h3><p class="p p-first-last" data-dcnode-id="2419" id="para1a0008"><span data-dcnode-id="2420" instrument_node="">Our study explores the impact of COVID-19 on refugees and asylum seekers residing in reception facilities in Greece, and its implications for policy and practice. Our data suggest that these overcrowded camps may have resulted in increased infection risk for COVID-19. For the first 9-month epidemic period in Greece (first and second wave) our findings show that refugees and asylum seekers in these reception facilities have almost a 2.5 to 3 times higher COVID-19 incidence compared to the general population (p-value &lt;0.001), with highest risk in migrant populations in reception facilities on the Greek islands and at the Greek-Turkish border, where living conditions are considerably worse.</span></p></div><div class="sec" data-dcnode-id="2413" id="sec1a0003"><h3 data-dcnode-id="2416" id="sec1a0003title"><span data-dcnode-id="2417" instrument_node="">Implications of all the available evidence</span></h3><p class="p p-first-last" data-dcnode-id="2414" id="para1a0009"><span data-dcnode-id="2415" instrument_node="">Our data highlights that refugee and asylum seeker populations residing in reception and identification centres and reception sites in Greece are at higher risk of acquiring SARS-CoV-2 infection. Going forward, an urgent focus must be placed on improving living conditions in these facilities, decongesting those that operate beyond their capacity, reinforcing epidemiological surveillance, testing strategies and data transparency, and ensuring free, comprehensive and universal access to care. Refugees and asylum seekers in closed settings need to be urgently prioritised in the COVID-19 vaccine roll-out.</span></p></div><div data-dcnode-id="2410"><p data-dcnode-id="2411" id="id605243"><span data-dcnode-id="2412" instrument_node="">Alt-text: Unlabelled box</span></p></div></div><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">
</span></p></div><div class="tsec sec" data-dcnode-id="2329" id="sec0001"><h2 class="head no_bottom_margin" data-dcnode-id="2404" id="sec0001title"><span data-dcnode-id="2405" instrument_node="">1. Introduction</span></h2><p class="p p-first" data-dcnode-id="2384" id="para0005"><span data-dcnode-id="2403" instrument_node="">Migrants – including marginalized groups such as asylum seekers, refugees, low-wage labor migrants, and undocumented migrants – globally have experienced adverse clinical and socioeconomic impacts of the COVID-19 pandemic </span><a class="bibr popnode" data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0001" rid="bib0001"><span data-dcnode-id="2402" instrument_node="">[1]</span></a><span data-dcnode-id="2400" instrument_node="">. Pre-existing structural inequalities have been exacerbated by the COVID-19 pandemic, with migrants already experiencing barriers to accessing healthcare even before the outbreak of COVID-19 and often legal exclusion from European health systems </span><a class="bibr popnode" data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0002" rid="bib0002"><span data-dcnode-id="2399" instrument_node="">[2]</span></a><span data-dcnode-id="2397" instrument_node="">, alongside high levels of poverty and deprivation. The discrimination they may face, and their fear and lack of trust in authorities means several thousands of migrants in Europe do not engage in health systems </span><a class="bibr popnode" data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0003" rid="bib0003"><span data-dcnode-id="2396" instrument_node="">[3]</span></a><span data-dcnode-id="2394" instrument_node="">, an important concern during a global pandemic. Where migrants do feature in public health policy, it is often in the context of health security and infection control </span><a class="bibr popnode" data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0004" rid="bib0004"><span data-dcnode-id="2393" instrument_node="">[4]</span></a><span data-dcnode-id="2391" instrument_node="">. They may face barriers, therefore, to accessing COVID-19 testing, treatment and vaccination, even when legally entitled, and xenophobic discourse around migrants and infectious disease may further alienate them from health systems [</span><a class="bibr popnode" data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0005" rid="bib0005"><span data-dcnode-id="2390" instrument_node="">5</span></a><span data-dcnode-id="2388" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0006" rid="bib0006"><span data-dcnode-id="2387" instrument_node="">6</span></a><span data-dcnode-id="2385" instrument_node="">].</span></p><p data-dcnode-id="2361" id="para0006"><span data-dcnode-id="2383" instrument_node="">Greece is a major entry point for people seeking safety in Europe, and since the early 2000s hundreds of thousands of asylum seekers have crossed into Greece by land and sea. In 2015, over 800,000 people arrived in Greece, the majority fleeing the war in Syria, as well as conflicts and violence in Afghanistan, Iraq and some sub-Saharan African countries </span><a class="bibr popnode" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0007" rid="bib0007"><span data-dcnode-id="2382" instrument_node="">[7]</span></a><span data-dcnode-id="2380" instrument_node="">. As a result of the EU-Turkey agreement, since March 2016 </span><a class="bibr popnode" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0008" rid="bib0008"><span data-dcnode-id="2379" instrument_node="">[8]</span></a><span data-dcnode-id="2377" instrument_node="">, thousands of men, women and children have been trapped on five Aegean Island Reception and Identification centres (RICs) pending their asylum application process, and in one RIC on the Greek-Turkish land border. In addition, several thousand asylum seekers and refugees are also now accommodated in Reception Sites (RSs) on the Greek mainland, comprising 32 International organization for Migration (IOM)-run ‘open camps’ and in hotels and apartments (although data from these settings is unclear) throughout the Greek mainland </span><a class="bibr popnode" data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0009" rid="bib0009"><span data-dcnode-id="2376" instrument_node="">[9]</span></a><span data-dcnode-id="2374" instrument_node="">, as well as almost 26,000 accommodation spaces on the Greek islands and mainland for vulnerable asylum seekers and refugees provided by the United Nations Refugee Agency (UNHCR) </span><a class="bibr popnode" data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0010" rid="bib0010"><span data-dcnode-id="2373" instrument_node="">[10]</span></a><span data-dcnode-id="2371" instrument_node="">. As of December 2020, around 120,000 refugees, asylum seekers and migrants were estimated to be residing on the Greek islands and the mainland </span><a class="bibr popnode" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0011" rid="bib0011"><span data-dcnode-id="2370" instrument_node="">[11]</span></a><span data-dcnode-id="2368" instrument_node="">, and of those, 56,000 asylum seekers and refugees are in the RICs and IOM-run RSs. Women and children comprise around 67% of the total population living in IOM-run RS with the majority of residents coming from Afghanistan, Syria and Iraq </span><a class="bibr popnode" data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0012" rid="bib0012"><span data-dcnode-id="2367" instrument_node="">[12]</span></a><span data-dcnode-id="2365" instrument_node="">. Women and children comprise approximately 49% of the total population living in the island RICs with the majority of residents coming from Afghanistan, Syria, the Democratic Republic of Congo and Somalia </span><a class="bibr popnode" data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0013" rid="bib0013"><span data-dcnode-id="2364" instrument_node="">[13]</span></a><span data-dcnode-id="2362" instrument_node="">.</span></p><p data-dcnode-id="2338" id="para0007"><span data-dcnode-id="2360" instrument_node="">Both the RICs and mainland RSs are characterized by severely substandard living conditions, poor sanitation and a lack of access to adequate – or sometimes any – healthcare, creating significant risk for their inhabitants in the event of an outbreak of infectious disease </span><a class="bibr popnode" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0014" rid="bib0014"><span data-dcnode-id="2359" instrument_node="">[14]</span></a><span data-dcnode-id="2357" instrument_node="">, with conditions on the islands and Greek-Turkish land border considerably worse than the mainland with higher levels of overcrowding. Social distancing and frequent handwashing have been virtually impossible during the COVID-19 pandemic: residents must often queue in close proximity in order to receive food and other essential items and self-isolation away from other individuals is not feasible due to the cramped conditions [</span><a class="bibr popnode" data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0015" rid="bib0015"><span data-dcnode-id="2356" instrument_node="">15</span></a><span data-dcnode-id="2354" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0016" rid="bib0016"><span data-dcnode-id="2353" instrument_node="">16</span></a><span data-dcnode-id="2351" instrument_node="">]. Asylum seekers and refugee populations have also experienced prolonged lockdowns and restricted movement since the pandemic began. These populations in Greece continue to face multiple administrative, geographical, societal and legal barriers to accessing mainstream healthcare </span><a class="bibr popnode" data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0016" rid="bib0016"><span data-dcnode-id="2350" instrument_node="">[16]</span></a><span data-dcnode-id="2348" instrument_node="">. The European center for Disease Prevention and Control (ECDC) has suggested that such settings pose a high-risk for COVID-19 transmission and these populations may need to be prioritized for COVID-19 vaccine roll out [</span><a class="bibr popnode" data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0017" rid="bib0017"><span data-dcnode-id="2347" instrument_node="">[17]</span></a><span data-dcnode-id="2345" instrument_node="">, </span><a class="bibr popnode" data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0018" rid="bib0018"><span data-dcnode-id="2344" instrument_node="">[18]</span></a><span data-dcnode-id="2342" instrument_node="">, </span><a class="bibr popnode" data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0019" rid="bib0019"><span data-dcnode-id="2341" instrument_node="">[19]</span></a><span data-dcnode-id="2339" instrument_node="">].</span></p><p class="p p-last" data-dcnode-id="2330" id="para0008"><span data-dcnode-id="2337" instrument_node="">The COVID-19 epidemic in Greece started on 26th February 2020, and during the first epidemic wave Greece managed to keep COVID-19 infections, Intensive Care Units hospitalized cases and deaths at relatively low levels compared to other European countries </span><a class="bibr popnode" data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0020" rid="bib0020"><span data-dcnode-id="2336" instrument_node="">[20]</span></a><span data-dcnode-id="2334" instrument_node="">. However, an exponential increase in COVID-19 cases and deaths was subsequently recorded between November and early December 2020 and a second national lockdown was then imposed </span><a class="bibr popnode" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0021" rid="bib0021"><span data-dcnode-id="2333" instrument_node="">[21]</span></a><span data-dcnode-id="2331" instrument_node="">. The extent to which the COVID-19 pandemic has impacted on refugees and asylum seekers housed in RICs and RS, however, has not to date been fully investigated. We therefore aimed to explore and assess the impact of COVID-19 on refugees and asylum seekers residing in reception facilities in Greece, and its implications for policy and practice.</span></p></div><div class="tsec sec" data-dcnode-id="2259" id="sec0002"><h2 class="head no_bottom_margin" data-dcnode-id="2327" id="sec0002title"><span data-dcnode-id="2328" instrument_node="">2. Methods</span></h2><p class="p p-first" data-dcnode-id="2325" id="para0009"><span data-dcnode-id="2326" instrument_node="">We conducted a retrospective observational study analyzing secondary surveillance data and policy documents from multiple sources in order to: (a) identify the number of COVID-19 outbreaks and cases in refugee and asylum seeker reception facilities in Greece and (b) compare the incidence of COVID-19 among refugee and asylum seeker populations residing in Greek RICs and RSs to the incidence among the Greek host population. We analyzed data from the first nine months of the epidemic in Greece (26th February until 15th November 2020), which was divided into two distinct time periods: the first epidemic wave of COVID-19 in the country (26th February until 30th June 2020) and part of the second wave period (1st July to 15th November 2020). Our study period starts from 26th February 2020 when the first COVID-19 case was confirmed in Greece and ends on 15th November 2020 which, at the time of embarking on this study, was the most up to date data available regarding COVID-19 cases among refugee and asylum seekers in Greece.</span></p><p class="p" data-dcnode-id="2323" id="para0010"><span data-dcnode-id="2324" instrument_node="">We focused on two particular migrant groups: ‘asylum seekers’ who are individuals with an active asylum claim pending, and ‘refugees’ who have been granted international protection and are recognized refugees in Greece with their claims processed, residing in two types of accommodation in Greece: (i) seven RICs – 6 RICs on 5 specific Greek islands (including Moria and Kara Tepe facilities on Lesvos) and one RIC on the Evros border; and (ii) 32 IOM-run RSs on the Greek mainland.</span></p><div class="sec" data-dcnode-id="2298" id="sec0003"><h3 data-dcnode-id="2321" id="sec0003title"><span data-dcnode-id="2322" instrument_node="">2.1. Data sources</span></h3><p class="p p-first" data-dcnode-id="2313" id="para0011"><span data-dcnode-id="2320" instrument_node="">We identified a range of data sources for data pertaining to cases in both the general population, RICs, and RSs. The total number of COVID-19 laboratory confirmed cases in the overall population in Greece were derived from the COVID-19 epidemiological surveillance report published daily by the Hellenic Public Health organization (NPHO), which is the national center for disease control and prevention </span><a class="bibr popnode" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0022" rid="bib0022"><span data-dcnode-id="2319" instrument_node="">[22]</span></a><span data-dcnode-id="2317" instrument_node="">. Numbers of COVID-19 laboratory confirmed cases among refugees and asylum seekers residing in RICs and RSs were derived from the COVID-19 epidemiological surveillance reports in points of care for refugees/migrants/asylum seekers published on a weekly basis by the same organization </span><a class="bibr popnode" data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0023" rid="bib0023"><span data-dcnode-id="2316" instrument_node="">[23]</span></a><span data-dcnode-id="2314" instrument_node="">. The reporting of cases in these datasets for the refugees and asylum seekers residing in RICs and RSs is cumulative on a weekly basis and COVID-19 infections are disaggregated only by type of facility (RICs versus other RSs).</span></p><p class="p p-last" data-dcnode-id="2299" id="para0012"><span data-dcnode-id="2312" instrument_node="">Official information about the number and specific location of COVID-19 outbreaks in RICs and RSs in Greece is not publicized by Greek authorities </span><a class="bibr popnode" data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0024" rid="bib0024"><span data-dcnode-id="2311" instrument_node="">[24]</span></a><span data-dcnode-id="2309" instrument_node="">. Media and non-governmental organization (NGO) reports have occasionally revealed cases of large outbreaks in refugee and asylum seeker camps in Greece </span><a class="bibr popnode" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0025" rid="bib0025"><span data-dcnode-id="2308" instrument_node="">[25]</span></a><span data-dcnode-id="2306" instrument_node="">, but these reports present data and information on an ad-hoc basis. In April 2020 the Greek Ministry of Migration and Asylum introduced the “Agnodiki plan”, which is an epidemic management plan activated in cases of outbreaks in refugee and asylum seeker reception centres and facilities </span><a class="bibr popnode" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0026" rid="bib0026"><span data-dcnode-id="2305" instrument_node="">[26]</span></a><span data-dcnode-id="2303" instrument_node="">. The “Agnodiki plan” was activated by a Ministerial Decree published on the Government Gadget and publicized on the Greek COVID-19 legislation database. We reviewed a total of 891 pieces of legislation included in this database </span><a class="bibr popnode" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0027" rid="bib0027"><span data-dcnode-id="2302" instrument_node="">[27]</span></a><span data-dcnode-id="2300" instrument_node="">, we identified all “Agnodiki plan” activation Ministerial Decrees issued by the Greek Ministry of Migration and Asylum from 27th February to 25th October 2020 with the aim of identifying outbreaks and cases in RICs and RSs involving refugees and asylum seekers. These Ministerial Decrees provide information about the exact location of an outbreak in a reception center or facility, outbreaks that triggered subsequently the activation of the Ministerial plan.</span></p></div><div class="sec" data-dcnode-id="2293" id="sec0004"><h3 data-dcnode-id="2296" id="sec0004title"><span data-dcnode-id="2297" instrument_node="">2.2. Ethics approval</span></h3><p class="p p-first-last" data-dcnode-id="2294" id="para0013"><span data-dcnode-id="2295" instrument_node="">No ethics approval was required; all the data sources are anonymous and freely available online.</span></p></div><div class="sec" data-dcnode-id="2265" id="sec0005"><h3 data-dcnode-id="2291" id="sec0005title"><span data-dcnode-id="2292" instrument_node="">2.3. Statistical analysis</span></h3><p class="p p-first" data-dcnode-id="2280" id="para0014"><span data-dcnode-id="2290" instrument_node="">Incidence proportion (IP) of COVID-19 confirmed cases was calculated for our three study population groups (refugees and asylum seekers populations in RICs, refugees and asylum seekers in RSs and general population in Greece) during three time periods (first wave, second wave, and overall across the 9-month period). IP reflects the new COVID-19 cases during a specific time period divided by the population at risk at the beginning of the relevant period. Because we anticipated that the size of refugee and asylum seeker populations residing in RICs and other RSs would change over time, we calculated the mean population at risk based on reports on the number of refugees and asylum seekers in RICs provided on a weekly basis by the Hellenic Ministry of National Defense </span><a class="bibr popnode" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0028" rid="bib0028"><span data-dcnode-id="2289" instrument_node="">[28]</span></a><span data-dcnode-id="2287" instrument_node="">, and reports on the number of refugees and asylum seekers in other RSs provided on a monthly basis by the IOM </span><a class="bibr popnode" data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0029" rid="bib0029"><span data-dcnode-id="2286" instrument_node="">[29]</span></a><span data-dcnode-id="2284" instrument_node="">. Information regarding the Greek population was based on the latest census data </span><a class="bibr popnode" data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0030" rid="bib0030"><span data-dcnode-id="2283" instrument_node="">[30]</span></a><span data-dcnode-id="2281" instrument_node="">.</span></p><p class="p p-last" data-dcnode-id="2266" id="para0015"><span data-dcnode-id="2279" instrument_node="">Total number of COVID-19 cases in the general population was calculated by combining the two publicly available data sets on COVID-19 confirmed cases [</span><a class="bibr popnode" data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0031" rid="bib0031"><span data-dcnode-id="2278" instrument_node="">31</span></a><span data-dcnode-id="2276" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0032" rid="bib0032"><span data-dcnode-id="2275" instrument_node="">32</span></a><span data-dcnode-id="2273" instrument_node="">], and after subtracting the total number of cases among refugees and asylum seekers from the total number of cases in Greece. In order to compare IP in each of the two refugee and asylum seeker population groups to the IP of the general population in Greece (control group), we calculated the incidence proportion ratio (IPR) and the relevant 95% Confidence Intervals (CI). </span><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">P-value</span></em><span data-dcnode-id="2270" instrument_node=""> less than 0.05 was considered statistically significant. Data were extracted by EK and duplicate data extraction was done by DP. The analysis was carried out by DP and EK using STATA (version 11) and OpenEpi </span><a class="bibr popnode" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0033" rid="bib0033"><span data-dcnode-id="2269" instrument_node="">[33]</span></a><span data-dcnode-id="2267" instrument_node="">, in order to calculate IP and IPR and 95% CI's, respectively.</span></p></div><div class="sec sec-last" data-dcnode-id="2260" id="sec0006"><h3 data-dcnode-id="2263" id="sec0006title"><span data-dcnode-id="2264" instrument_node="">2.4. Role of the funding source</span></h3><p class="p p-first-last" data-dcnode-id="2261" id="para0016"><span data-dcnode-id="2262" instrument_node="">None. EK accessed the database and EK, MO, SH, and AV took the decision to submit the paper for publication.</span></p></div></div><div class="tsec sec" data-dcnode-id="1836" id="sec0007"><h2 class="head no_bottom_margin" data-dcnode-id="2257" id="sec0007title"><span data-dcnode-id="2258" instrument_node="">3. Results</span></h2><p class="p p-first" data-dcnode-id="2255" id="para0017"><span data-dcnode-id="2256" instrument_node="">During our study period (26th February – 15th November 2020) 77,527 COVID-19 confirmed cases were reported among the general population in Greece (approximately 10.8 million people), most of which (74,315 cases; 95.9%) were observed during the second epidemic wave, and 3212 (4.1%) during the first.</span></p><div class="sec" data-dcnode-id="2090" id="sec0008"><h3 data-dcnode-id="2253" id="sec0008title"><span data-dcnode-id="2254" instrument_node="">3.1. COVID-19 outbreaks in refugee and asylum seeker RICs and RSs: first and second wave</span></h3><p class="p p-first" data-dcnode-id="2247" id="para0018"><span data-dcnode-id="2252" instrument_node="">During the first epidemic wave (February to June 2020) three outbreaks were reported in refugee and asylum seeker RSs on the Greek mainland (in Ritsona, Malakasa and Kranidi reception sites). All these outbreaks took place between late March and late April 2020, when the first epidemic wave was partly under control and overall cases in the country were rapidly declining (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig0001" data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/" rid-figpopup="fig0001" rid-ob="ob-fig0001" target="figure"><span data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Fig.&nbsp;1</span></span></a><span data-dcnode-id="2248" instrument_node="">). Importantly, we found that the identification and reporting of all three initial outbreaks was incidental and related to individual residents testing positive for COVID-19 in external sites such as hospitals, and not as part of government routine testing within the RSs. Among the three observed outbreaks during the first epidemic wave the largest outbreak took place in the Kranidi reception site, with a total of 157 COVID-19 confirmed cases. In Ritsona RS a total of 41 positive cases were detected, and in Malakasa RS 23 positive cases were detected.</span></p><div class="fig iconblock whole_rhythm clearfix" co-legend-rid="lgnd_fig0001" data-dcnode-id="2226" id="fig0001"><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/" rid-figpopup="fig0001" rid-ob="ob-fig0001" target="figure"><div class="figure" data-dcnode-id="2242" data-largeobj="" data-largeobj-link-rid="largeobj_id599759"><img alt="Fig. 1:" class="fig-image" data-dcnode-id="2243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/bin/gr1.jpg&amp;raw" title="Fig. 1:"></div></a><div class="largeobj-link align_right" data-dcnode-id="2237" id="largeobj_id599759" style="display: none"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/" rid-figpopup="fig0001" rid-ob="ob-fig0001" target="figure"></a><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="2239" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="2227" id="lgnd_fig0001"><div data-dcnode-id="2234"><a class="figpopup" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/" rid-figpopup="fig0001" rid-ob="ob-fig0001" target="figure"><span data-dcnode-id="2236" instrument_node="">Fig. 1</span></a></div><div class="caption" data-dcnode-id="2228"><p data-dcnode-id="2231" id="id599747"><span data-dcnode-id="2232" instrument_node="">COVID-19 confirmed cases among refugee and asylum seeker populations residing in Reception Identification Centers and other Reception Sites in Greece (26 Feb 2020 – 15 Nov 2020).</span></p><p data-dcnode-id="2229" id="id599751"><span data-dcnode-id="2230" instrument_node="">RICs=Reception and Identification Centers; RSs=Reception Sites; NAs=New Arrivals.</span></p></div></div></div><p class="p p-last" data-dcnode-id="2212" id="para0019"><span data-dcnode-id="2225" instrument_node="">Throughout the second epidemic wave, 22 COVID-19 outbreaks were detected in both RICs and RSs. Among these 22 outbreaks, five (22.7%) took place in the RICs on the Greek islands, one (4.5%) in the RIC on the Greek-Turkish border, and 16 (72.7%) outbreaks occurred in other RSs on the Greek mainland (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/table/tbl0001/" rid-figpopup="tbl0001" rid-ob="ob-tbl0001" target="table"><span data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Table&nbsp;1</span></span></a><span data-dcnode-id="2221" instrument_node="">). All these outbreaks took place between early August and early October, at the start of the second epidemic wave and before the exponential increase in COVID-19 cases and the ensuing introduction of the second national lockdown in early November (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig0001" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/figure/fig0001/" rid-figpopup="fig0001" rid-ob="ob-fig0001" target="figure"><span data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Fig.&nbsp;1</span></span></a><span data-dcnode-id="2217" instrument_node="">, </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/table/tbl0001/" rid-figpopup="tbl0001" rid-ob="ob-tbl0001" target="table"><span data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Table&nbsp;1</span></span></a><span data-dcnode-id="2213" instrument_node="">). During the second epidemic wave COVID-19 outbreaks were detected in six (85.7%) of 7 of the operating RICs, and in 16 (50%) of 32 of the other operating RCs in the country. Among the 22 observed outbreaks during the second wave, the largest one took place in the Kara Tepe tent camp on Lesvos Island in mid-September 2020; however, the final number of detected COVID-19 cases are not reported, with no official data having yet been made available.</span></p><div class="table-wrap table anchored whole_rhythm" data-dcnode-id="2091" id="tbl0001"><h3 data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Table 1</span></h3><div class="caption" data-dcnode-id="2204"><p data-dcnode-id="2205" id="id599813"><span data-dcnode-id="2206" instrument_node="">COVID-19 outbreaks in reception identification centers and other reception sites during the second wave in Greece (July – Nov 2020).</span></p></div><div class="xtable" data-dcnode-id="2099" data-largeobj="" data-largeobj-link-rid="largeobj_id599822"><table class="r es, 587 (53.1%) were detected among refugee and asylum seekers residing in RICs, 485 (43.9%) among refugees and asylum seekers residing in other RSs on the Greek mainland and 34 (3.1%) among newly arrived asylum seekers in the Greek Islands during the epidemic (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/table/tbl0002/" rid-figpopup="tbl0002" rid-ob="ob-tbl0002" target="table"><span data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Table&nbsp;2</span></span></a><span data-dcnode-id="2079" instrument_node="">).</span></p><div class="table-wrap table anchored whole_rhythm" data-dcnode-id="1971" id="tbl0002"><h3 data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Table 2</span></h3><div class="caption" data-dcnode-id="2070"><p data-dcnode-id="2071" id="id528302"><span data-dcnode-id="2072" instrument_node="">Confirmed COVID-19 cases among refugees and asylum seekers residing in reception facilities, by epidemic period and by type of facility, Greece.</span></p></div><div class="xtable" data-dcnode-id="1979" data-largeobj="" data-largeobj-link-rid="largeobj_id528311"><table class="rendered small default_table" data-dcnode-id="1980" frame="hsides" rules="groups"><tbody data-dcnode-id="1981"><tr data-dcnode-id="2059"><td colspan="1" data-dcnode-id="2069" rowspan="1" valign="top"></td><td align="left" colspan="2" data-dcnode-id="2066" rowspan="1" valign="top"><span data-dcnode-id="2068" instrument_node="">1st Epidemic Wave (26 February – 30 June 2020)</span><hr data-dcnode-id="2067"></td><td align="left" colspan="2" data-dcnode-id="2063" rowspan="1" valign="top"><span data-dcnode-id="2065" instrument_node="">2nd Epidemic Wave (1 July – 15 November 2020)</span><hr data-dcnode-id="2064"></td><td align="left" colspan="2" data-dcnode-id="2060" rowspan="1" valign="top"><span data-dcnode-id="2062" i
