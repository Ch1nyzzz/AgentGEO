data-dcnode-id="1914" instrument_node="">10,813,714</span></td><td colspan="1" data-dcnode-id="1911" rowspan="1" valign="top"><span data-dcnode-id="1912" instrument_node="">687</span></td><td colspan="1" data-dcnode-id="1909" rowspan="1" valign="top"><span data-dcnode-id="1910" instrument_node="">Ref.</span></td><td colspan="1" data-dcnode-id="1907" rowspan="1" valign="top"><span data-dcnode-id="1908" instrument_node="">10,816,286</span></td><td colspan="1" data-dcnode-id="1905" rowspan="1" valign="top"><span data-dcnode-id="1906" instrument_node="">717</span></td><td colspan="1" data-dcnode-id="1903" rowspan="1" valign="top"><span data-dcnode-id="1904" instrument_node="">Ref.</span></td></tr><tr data-dcnode-id="1881"><td colspan="1" data-dcnode-id="1900" rowspan="1" valign="top"><span data-dcnode-id="1901" instrument_node="">Migrants in RICs (Greek islands and border)</span></td><td colspan="1" data-dcnode-id="1898" rowspan="1" valign="top"><span data-dcnode-id="1899" instrument_node="">35,435</span></td><td colspan="1" data-dcnode-id="1896" rowspan="1" valign="top"><span data-dcnode-id="1897" instrument_node="">0</span></td><td colspan="1" data-dcnode-id="1894" rowspan="1" valign="top"><span data-dcnode-id="1895" instrument_node="">Not applicable</span></td><td colspan="1" data-dcnode-id="1892" rowspan="1" valign="top"><span data-dcnode-id="1893" instrument_node="">21,772</span></td><td colspan="1" data-dcnode-id="1890" rowspan="1" valign="top"><span data-dcnode-id="1891" instrument_node="">2696</span></td><td colspan="1" data-dcnode-id="1888" rowspan="1" valign="top"><span data-dcnode-id="1889" instrument_node="">3.92 (3.62–4.25)</span></td><td colspan="1" data-dcnode-id="1886" rowspan="1" valign="top"><span data-dcnode-id="1887" instrument_node="">28,603</span></td><td colspan="1" data-dcnode-id="1884" rowspan="1" valign="top"><span data-dcnode-id="1885" instrument_node="">2052</span></td><td colspan="1" data-dcnode-id="1882" rowspan="1" valign="top"><span data-dcnode-id="1883" instrument_node="">2.86 (2.64–3.10)</span></td></tr><tr data-dcnode-id="1860"><td colspan="1" data-dcnode-id="1879" rowspan="1" valign="top"><span data-dcnode-id="1880" instrument_node="">Migrants in RSs (Greek mainland)</span></td><td colspan="1" data-dcnode-id="1877" rowspan="1" valign="top"><span data-dcnode-id="1878" instrument_node="">26,910</span></td><td colspan="1" data-dcnode-id="1875" rowspan="1" valign="top"><span data-dcnode-id="1876" instrument_node="">821</span></td><td colspan="1" data-dcnode-id="1873" rowspan="1" valign="top"><span data-dcnode-id="1874" instrument_node="">27.66 (24.14–31.68)</span></td><td colspan="1" data-dcnode-id="1871" rowspan="1" valign="top"><span data-dcnode-id="1872" instrument_node="">28,428</span></td><td colspan="1" data-dcnode-id="1869" rowspan="1" valign="top"><span data-dcnode-id="1870" instrument_node="">936</span></td><td colspan="1" data-dcnode-id="1867" rowspan="1" valign="top"><span data-dcnode-id="1868" instrument_node="">1.36 (1.21–1.54)</span></td><td colspan="1" data-dcnode-id="1865" rowspan="1" valign="top"><span data-dcnode-id="1866" instrument_node="">27,584</span></td><td colspan="1" data-dcnode-id="1863" rowspan="1" valign="top"><span data-dcnode-id="1864" instrument_node="">1758</span></td><td colspan="1" data-dcnode-id="1861" rowspan="1" valign="top"><span data-dcnode-id="1862" instrument_node="">2.45 (2.25–2.68)</span></td></tr></tbody></table></div><div class="largeobj-link align_right" data-dcnode-id="1854" id="largeobj_id598114" style="display: none"><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/table/tbl0003/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="1856" instrument_node="">Open in a separate window</span></a></div><div class="tblwrap-foot" data-dcnode-id="1850"><div data-dcnode-id="1851" id="id597023"><p class="p p-first-last" data-dcnode-id="1852" id="id597024"><span data-dcnode-id="1853" instrument_node="">Notes: (A) RICs (Reception and Identification Centers), RSs (Reception Sites), Ref. (Reference Group), (B) the Incidence Proportion Ratio refers to the Incidence Proportion of COVID-19 infections among migrants residing in RICs or RS compared to the control group (which is the general Greek population) (C) COVID-19 cases among refugees and asylum seekers refer only to cases reported in the 7 RICs and the 32 IOM-run RSs operating in the country.</span></p></div></div></div><p data-dcnode-id="1847" id="para0022"><span data-dcnode-id="1848" instrument_node="">During the first epidemic wave the risk of infection was almost 28 times higher in refugees and asylum seekers residing in the 32 IOM-run RSs on the Greek mainland compared to the general population (IPR: 27.66; 95% CI: 24.14–31.6), a finding likely related to the three outbreaks that were recorded in mainland RSs during the first wave. Throughout the second epidemic wave the risk of infection was almost 4 times higher in refugees and asylum seekers residing in RICs on Greek islands and the Evros border compared to the general population (IPR: 3.92; 95% CI: 3.62–4.25). This is linked to the outbreaks that were recorded in almost all RICs (with the only exception being the RIC in Kos Island) during the second wave.</span></p><p class="p p-last" data-dcnode-id="1838" id="para0023"><span data-dcnode-id="1846" instrument_node="">For the overall 9-month epidemic period in Greece our findings show that refugee and asylum seeker population groups in RICs and RSs have almost a 2.5 to 3 times higher COVID-19 incidence compared to the general population (</span><em data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">p</span></em><span data-dcnode-id="1843" instrument_node="">-value&lt;0.001). The risk of infection (that is the incidence of COVID-19 symptomatic and asymptomatic infections regardless their severity and clinical outcomes) increases between the general population and refugee and asylum seeker populations in RSs on the Greek mainland (IPR: 2.45; 95% CI: 2.25–2.68), and is highest in migrant populations in RICs on the islands and Greek-Turkish border, where living conditions are considerably worse (IPR: 2.86; 95% CI: 2.64–3.10) (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/articles/PMC8256175/table/tbl0003/" rid-figpopup="tbl0003" rid-ob="ob-tbl0003" target="table"><span data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Table&nbsp;3</span></span></a><span data-dcnode-id="1839" instrument_node="">).</span></p></div></div><div class="tsec sec" data-dcnode-id="1679" id="sec0010"><h2 class="head no_bottom_margin" data-dcnode-id="1834" id="sec0010title"><span data-dcnode-id="1835" instrument_node="">4. Discussion</span></h2><p class="p p-first" data-dcnode-id="1832" id="para0024"><span data-dcnode-id="1833" instrument_node="">We identified high levels of COVID-19 transmission among asylums seekers and refugees in RICs and RSs on the Greek mainland and surrounding islands. The risk of infection among these enclosed population groups has been significantly higher than the general population of Greece, and risk increases as living conditions deteriorate and overcrowding increases. These data have immediate implications for policy and practice.</span></p><p data-dcnode-id="1830" id="para0025"><span data-dcnode-id="1831" instrument_node="">There were several identified study limitations. First, there is poor epidemiological surveillance and data collection in Greece and we were reliant on national statistics which were limited in scope and access. The likely under-reporting among refugees and asylum seekers not presenting to healthcare providers means we do not have a clear picture of the rates of COVID-19 amongst this population. In addition, the datasets we had access to provided no information on health outcomes in COVID-19 cases involving refugees and asylum seekers, including hospitalisations in COVID-19 clinics, hospitalisations in Intensive Care Units (ICUs), or deaths and additionally no information regarding age and sex distribution of COVID-19 cases among refugees and asylum seekers was publicly available.</span></p><p data-dcnode-id="1816" id="para0026"><span data-dcnode-id="1829" instrument_node="">The refugee and asylum seeker population tends to be younger, with one NGO report stating that over 60% of refugees are under 30 years old </span><a class="bibr popnode" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0034" rid="bib0034"><span data-dcnode-id="1828" instrument_node="">[34]</span></a><span data-dcnode-id="1826" instrument_node="">. Children comprise approximately 28% of the populations in the RICs and approximately 44% of the population in the IOM-run RSs [</span><a class="bibr popnode" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0012" rid="bib0012"><span data-dcnode-id="1825" instrument_node="">12</span></a><span data-dcnode-id="1823" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0013" rid="bib0013"><span data-dcnode-id="1822" instrument_node="">13</span></a><span data-dcnode-id="1820" instrument_node="">]. At the start of the pandemic 2400 elderly people and those at-risk living in the island RICs were identified to be moved to safer accommodation </span><a class="bibr popnode" data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0035" rid="bib0035"><span data-dcnode-id="1819" instrument_node="">[35]</span></a><span data-dcnode-id="1817" instrument_node="">. However, given the lack of information on the exact age structure of the refugee and asylum seeker population residing in RICs and RSs in Greece and the lack of information on the age and sex distribution of COVID-19 confirmed cases among these population groups, it is unclear whether age did play a significant role in the increased infection rate amongst asylum seekers and refugees compared with the national population.</span></p><p data-dcnode-id="1799" id="para0027"><span data-dcnode-id="1815" instrument_node="">Living conditions in the RICs and RSs make adherence to COVID-19 public health guidance and prevention very challenging, and most likely explain the higher transmission our data show in these settings. Physical distancing and hygiene measures (e.g. handwashing) were encouraged by authorities at the start of the pandemic, but due to the severe overcrowding of the RICs </span><a class="bibr popnode" data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0036" rid="bib0036"><span data-dcnode-id="1814" instrument_node="">[36]</span></a><span data-dcnode-id="1812" instrument_node=""> and the substandard living conditions and inadequate sanitation services, these were impossible to follow, increasing their vulnerability to COVID-19. For example, following a fire that destroyed Lesvos Island's Moria RIC in September 2020, the refugees and asylum seekers were forced to move into the Kara Tepe tent-camp with no access to food, medical or psychological care, water points, showers or toilets thus lacking basic preventive measures for COVID-19 [</span><a class="bibr popnode" data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0037" rid="bib0037"><span data-dcnode-id="1811" instrument_node="">37</span></a><span data-dcnode-id="1809" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0038" rid="bib0038"><span data-dcnode-id="1808" instrument_node="">38</span></a><span data-dcnode-id="1806" instrument_node="">]. Even by the end of the second wave in the new Kara Tepe camp there were limited pandemic protections in place and most residents still had little access to toilets and washing facilities, with no hot water despite the winter weather </span><a class="bibr popnode" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0039" rid="bib0039"><span data-dcnode-id="1805" instrument_node="">[39]</span></a><span data-dcnode-id="1803" instrument_node="">. Those in quarantine on Samos were reported by Médecins Sans Frontières to be living in ‘unacceptable and dangerous’ conditions, with some in filthy containers with no access to running water or toilets and forced to sleep on the floor </span><a class="bibr popnode" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0040" rid="bib0040"><span data-dcnode-id="1802" instrument_node="">[40]</span></a><span data-dcnode-id="1800" instrument_node="">.</span></p><p data-dcnode-id="1788" id="para0028"><span data-dcnode-id="1798" instrument_node="">Asylum seekers and refugees in Greece face multiple administrative and legal barriers to accessing healthcare, further disadvantaging them in the context of COVID-19. Healthcare provision for those living in RICs and RSs is inadequate, with long wait time to see a doctor if there is one present at all, and often with limited options for swiftly accessing secondary care [</span><a class="bibr popnode" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0016" rid="bib0016"><span data-dcnode-id="1797" instrument_node="">16</span></a><span data-dcnode-id="1795" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0041" rid="bib0041"><span data-dcnode-id="1794" instrument_node="">41</span></a><span data-dcnode-id="1792" instrument_node="">]. Furthermore, there is also a degree of xenophobia towards the refugee and asylum seeking population </span><a class="bibr popnode" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0042" rid="bib0042"><span data-dcnode-id="1791" instrument_node="">[42]</span></a><span data-dcnode-id="1789" instrument_node="">, which impacts the provision of healthcare and likely affects health seeking behavior, which may have increased the infection risk as well as leading to under-reporting of suspected COVID-19 cases.</span></p><p data-dcnode-id="1774" id="para0029"><span data-dcnode-id="1787" instrument_node="">Despite the ECDC's recommendation to consider ‘measures to decongest and evacuate residents’ in these enclosed settings if distancing and other risk mitigation measures cannot be implemented </span><a class="bibr popnode" data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0019" rid="bib0019"><span data-dcnode-id="1786" instrument_node="">[19]</span></a><span data-dcnode-id="1784" instrument_node="">, and the Greek government's pledges to decongest and improve conditions, authorities are yet to fully addressed these issues, which is an urgent next step in limiting outbreaks. The government had pledged to move 2400 high-risk individuals (elderly and those with underlying conditions) living in RICs to safe accommodation, but as of 14th December 2020 there were still 207 ‘high risk’ individuals remaining in the five island facilities </span><a class="bibr popnode" data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0043" rid="bib0043"><span data-dcnode-id="1783" instrument_node="">[43]</span></a><span data-dcnode-id="1781" instrument_node="">. Although data are lacking on clinical outcomes in refugees and asylum seekers residing in RICs and RSs, some early data suggest that this group may be disproportionately represented in hospitalized cases in some areas near migrant RICs and RSs. The President of the Panhellenic Association of Public Hospital Employees confirmed on 17th September 2020 that almost half the COVID-19 patients hospitalized in the mainland Attica region were refugees and asylum seekers from RSs and homeless migrants from Athens </span><a class="bibr popnode" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0044" rid="bib0044"><span data-dcnode-id="1780" instrument_node="">[44]</span></a><span data-dcnode-id="1778" instrument_node="">. The Minister of Health noted they could not be discharged and returned to the RSs or to the streets due to the poor living conditions and overcrowding </span><a class="bibr popnode" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0045" rid="bib0045"><span data-dcnode-id="1777" instrument_node="">[45]</span></a><span data-dcnode-id="1775" instrument_node="">.</span></p><p data-dcnode-id="1745" id="para0030"><span data-dcnode-id="1773" instrument_node="">Although Greece was swift to impose early nationwide public health restrictions, the lockdown measures and mass quarantining were applied more stringently and for longer periods of time to refugees and asylum seekers in RICs and RSs. The government declared these targeted measures to be in the public interest to ‘“limit the spread of COVID-19 in areas of overcrowding…” </span><a class="bibr popnode" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0046" rid="bib0046"><span data-dcnode-id="1772" instrument_node="">[46]</span></a><span data-dcnode-id="1770" instrument_node="">, despite no positive COVID-19 cases in the RICs until mid-August. Similarly, one mainland RS was put into preventative quarantine despite no detected positive cases of COVID-19 </span><a class="bibr popnode" data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0016" rid="bib0016"><span data-dcnode-id="1769" instrument_node="">[16]</span></a><span data-dcnode-id="1767" instrument_node="">. These extreme lockdown extensions contravened WHO </span><a class="bibr popnode" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0047" rid="bib0047"><span data-dcnode-id="1766" instrument_node="">[47]</span></a><span data-dcnode-id="1764" instrument_node=""> and ECDC guidelines </span><a class="bibr popnode" data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0019" rid="bib0019"><span data-dcnode-id="1763" instrument_node="">[19]</span></a><span data-dcnode-id="1761" instrument_node=""> and restricted people's movement in such conditions with no likelihood of being able to respect basic COVID-19 preventative measures. Our data suggest that these restrictive policies may have contributed to their increased infection risk for COVID-19. Data from other countries housing refugees and asylum seekers in closed settings, such as reception and detention centres, aligns with our findings. For example, COVID-19 outbreaks have been reported in: an open center in Malta </span><a class="bibr popnode" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0048" rid="bib0048"><span data-dcnode-id="1760" instrument_node="">[48]</span></a><span data-dcnode-id="1758" instrument_node="">, and reception centres in Germany </span><a class="bibr popnode" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0049" rid="bib0049"><span data-dcnode-id="1757" instrument_node="">[49]</span></a><span data-dcnode-id="1755" instrument_node="">, the Netherlands </span><a class="bibr popnode" data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0050" rid="bib0050"><span data-dcnode-id="1754" instrument_node="">[50]</span></a><span data-dcnode-id="1752" instrument_node="">, and Italy </span><a class="bibr popnode" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0051" rid="bib0051"><span data-dcnode-id="1751" instrument_node="">[51]</span></a><span data-dcnode-id="1749" instrument_node="">. In Germany, in temporary housing for asylum seekers and refugees, 42 centres were affected and 30 of 42 centres were put under mass quarantine </span><a class="bibr popnode" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0049" rid="bib0049"><span data-dcnode-id="1748" instrument_node="">[49]</span></a><span data-dcnode-id="1746" instrument_node="">.</span></p><p data-dcnode-id="1722" id="para0031"><span data-dcnode-id="1744" instrument_node="">Despite calls for inclusion of refugees and asylum seekers in the COVID-19 response from multi-laterals such as WHO, UNHCR, ECDC and IOM [</span><a class="bibr popnode" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0019" rid="bib0019"><span data-dcnode-id="1743" instrument_node="">19</span></a><span data-dcnode-id="1741" instrument_node="">,</span><a class="bibr popnode" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0052" rid="bib0052"><span data-dcnode-id="1740" instrument_node="">52</span></a><span data-dcnode-id="1738" instrument_node="">], and academic organizations such as Lancet Migration </span><a class="bibr popnode" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0053" rid="bib0053"><span data-dcnode-id="1737" instrument_node="">[53]</span></a><span data-dcnode-id="1735" instrument_node="">, Greek authorities have consistently failed to integrate refugees and asylum seekers into national prevention and response plans and disease surveillance systems, and no coherent medical response plans have been put in place in any of the island RICs. Even before the COVID-19 pandemic the impact of poor living conditions was already driving a health crisis on the Greek islands </span><a class="bibr popnode" data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0054" rid="bib0054"><span data-dcnode-id="1734" instrument_node="">[54]</span></a><span data-dcnode-id="1732" instrument_node=""> and healthcare access for refugees and asylum seekers in Greece had been a continual challenge since 2015 </span><a class="bibr popnode" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0055" rid="bib0055"><span data-dcnode-id="1731" instrument_node="">[55]</span></a><span data-dcnode-id="1729" instrument_node="">. After nine months of the pandemic, the Greek authorities have not established an effective and comprehensive testing and contact tracing system for refugees and asylum seekers in Greece, despite having a functioning system for the general population. It is our view that the inadequate testing and the absence of contact tracing in refugee and asylum seeker reception facilities has led to an underestimation of the true incidence rate amongst the refugee and asylum seeker populations. Greek authorities face serious challenges in collecting and presenting timely and comprehensive data on the development of the epidemic in the country </span><a class="bibr popnode" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0024" rid="bib0024"><span data-dcnode-id="1728" instrument_node="">[24]</span></a><span data-dcnode-id="1726" instrument_node="">, and the lack of data on clinical outcomes in refugees and asylum seekers specifically in Greece (specifically hospitalizations and deaths) needs urgently rectifying, though this is a reported issue in several European countries at the current time </span><a class="bibr popnode" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0001" rid="bib0001"><span data-dcnode-id="1725" instrument_node="">[1]</span></a><span data-dcnode-id="1723" instrument_node="">.</span></p><p data-dcnode-id="1717" id="para0032"><span data-dcnode-id="1721" instrument_node="">In order to ensure inclusion of refugees and asylum seekers in the COVID-19 response, a greater emphasis must also be placed on developing culturally and linguistically adapted information about COVID-19 prevention measures and vaccination. In a rapid review public health communication targeting migrant populations during the COVID-19 pandemic conducted in June 2020, for example, only half of the European member states had translated their COVID-19 risk communications into one migrant language; and no government produced risk communications on COVID-19 prevention targeting people in refugee camps or informal settlements, leaving migrants excluded from national health system responses </span><a class="bibr popnode" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0056" rid="bib0056"><span data-dcnode-id="1720" instrument_node="">[56]</span></a><span data-dcnode-id="1718" instrument_node="">.</span></p><p class="p p-last" data-dcnode-id="1712" id="para0033"><span data-dcnode-id="1716" instrument_node="">Our data quantitatively shows the greater risk of COVID-19 infection among refugee and asylum seeker populations residing in substandard living conditions. Acknowledging this higher risk is of crucial policy importance. Going forward, all enclosed population groups need to be urgently included and prioritized in the national vaccination program, without any exception. Greece should follow the example of the Republic of Serbia which, in late March became one of the first European countries to begin vaccinating its refugee, asylum seeker and other migrant populations living in reception centres and has included these populations in their national vaccination plan </span><a class="bibr popnode" data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0057" rid="bib0057"><span data-dcnode-id="1715" instrument_node="">[57]</span></a><span data-dcnode-id="1713" instrument_node="">. However, given the time needed in order to achieve herd immunity through vaccination, Greek authorities should concurrently urgently focus on improving living conditions in these facilities, decongesting those that operate beyond their capacity, reinforcing epidemiological surveillance, testing strategies and data transparency, and ensuring free, comprehensive and universal access to care without any discrimination.&nbsp;In this direction, we propose the following key recommendations and next steps:</span></p><ul class="simple" data-dcnode-id="1681" id="celist0001" style="list-style-type:none"><li class="a_label" data-dcnode-id="1706" id="celistitem0001"><div class="inline_block a_label" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">(1)</span></div><p data-dcnode-id="1707" id="para0034"><span data-dcnode-id="1708" instrument_node="">In order to reduce the risk of transmission of COVID-19 and to protect the right to health for all, the Greek government should urgently improve living conditions in all reception facilities including the provision of adequate sanitation and hygiene services, dignified and safe accommodation where COVID-19 prevention measures can be followed.</span></p></li><li class="a_label" data-dcnode-id="1692" id="celistitem0002"><div class="inline_block a_label" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">(2)</span></div><p data-dcnode-id="1693" id="para0035"><span data-dcnode-id="1703" instrument_node="">Interagency guidance on protection and response to COVID-19 issued by multiple agencies in the first half of 2020 should be adhered to a by all governments </span><a class="bibr popnode" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0058" rid="bib0058"><span data-dcnode-id="1702" instrument_node="">[58]</span></a><span data-dcnode-id="1700" instrument_node="">, </span><a class="bibr popnode" data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0059" rid="bib0059"><span data-dcnode-id="1699" instrument_node="">[59]</span></a><span data-dcnode-id="1697" instrument_node="">, </span><a class="bibr popnode" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/%23bib0060" rid="bib0060"><span data-dcnode-id="1696" instrument_node="">[60]</span></a><span data-dcnode-id="1694" instrument_node="">. In addition, access to routine testing for COVID-19, treatment, and COVID-19 vaccinations as well as other vaccines should be ensured for refugees, asylum seekers (and other migrants) outside of mainstream health systems in Greece and across Europe, especially in enclosed settings such as reception and detention centres. Comprehensive testing and tracing amongst refugee and asylum seeker populations in Greek RICs and RSs needs to be scaled up, and refugees and asylum seekers meaningfully included in national prevention and response plans to COVID-19. This will involve developing tailored and targeted public health messaging being mindful of the specific needs of these populations.</span></p></li><li class="a_label" data-dcnode-id="1687" id="celistitem0003"><div class="inline_block a_label" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">(3)</span></div><p data-dcnode-id="1688" id="para0036"><span data-dcnode-id="1689" instrument_node="">Restrictive public health measures, such as lockdowns and mass quarantining, should only be applied where proportionate to public health need, not as a blanket measure for certain population groups such as migrants. Quarantine and lockdown measures should be applied equally to all without discrimination; healthcare, social and psychosocial support, and basic needs as food, water and other essentials should be provided to those in quarantine; and mass quarantine avoided where possible, in line with ECDC and WHO guidelines.</span></p></li><li class="a_label" data-dcnode-id="1682" id="celistitem0004"><div class="inline_block a_label" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">(4)</span></div><p data-dcnode-id="1683" id="para0037"><span data-dcnode-id="1684" instrument_node="">Epidemiological surveillance systems must be strengthened to better record COVID-19 cases, hospitaliations, and deaths involving refugees, asylum seekers, and other migrants, in Greece and Europe-wide to inform the public health response going forward and implications for COVID-19 vaccine roll out. A rigorous system for public data sharing should be established, with an emphasis on transparency and timeliness.</span></p></li></ul><p data-dcnode-id="1680"></p></div><div class="tsec sec" data-dcnode-id="1674" id="sec0011"><h2 class="head no_bottom_margin" data-dcnode-id="1677" id="sec0011title"><span data-dcnode-id="1678" instrument_node="">Funding</span></h2><p class="p p-first-last" data-dcnode-id="1675" id="para0038"><span data-dcnode-id="1676" instrument_node="">None</span></p></div><div class="tsec sec" data-dcnode-id="1669" id="sec0012"><h2 class="head no_bottom_margin" data-dcnode-id="1672" id="sec0012title"><span data-dcnode-id="1673" instrument_node="">Data sharing statement</span></h2><p class="p p-first-last" data-dcnode-id="1670" id="para0039"><span data-dcnode-id="1671" instrument_node="">No individual participant data was used. All data sources for data pertaining to cases in both the general population, RICs, and RSs, are freely available online. Any query on the manuscript can be submitted to the corresponding authors.</span></p></div><div class="tsec sec" data-dcnode-id="1664" id="id540264"><h2 class="head no_bottom_margin" data-dcnode-id="1667" id="id540264title"><span data-dcnode-id="1668" instrument_node="">Declaration of Competing Interest</span></h2><p class="p p-first-last" data-dcnode-id="1665" id="para0041"><span data-dcnode-id="1666" instrument_node="">MO is Executive Director of Lancet Migration: global collaboration to advance migration health. All other authors declare no conflicts of interest.</span></p></div><div class="tsec sec" data-dcnode-id="1658" id="ack0001"><h2 class="head no_bottom_margin" data-dcnode-id="1662" id="ack0001title"><span data-dcnode-id="1663" instrument_node="">Acknowledgments</span></h2><div class="sec" data-dcnode-id="1659"><p data-dcnode-id="1660" id="para0042"><span data-dcnode-id="1661" instrument_node="">SH is funded by the NIHR (NIHR300072), the Academy of Medical Sciences (SBF005\1111), and through a research grant via the ESCMID Study Group for Infections in Travellers and Migrants (ESGITM). MO is supported by an Economic and Social Research Council (ESRC) PhD Studentship and is also funded by the NIHR. The views expressed are those of the authors and not necessarily those of the NHS, the NIHR, or the Department of Health. We would like to thank Teymur Noori (European Centre for Disease Prevention and Control – ECDC) for his valuable inputs to the article.</span></p></div></div><div class="tsec sec" data-dcnode-id="1026" id="cebibl1"><h2 class="head no_bottom_margin" data-dcnode-id="1656" id="cebibl1title"><span data-dcnode-id="1657" instrument_node="">References</span></h2><div class="ref-list-sec sec" data-dcnode-id="1027" id="reference-list"><div class="ref-cit-blk half_rhythm" data-dcnode-id="1637" id="bib0001"><span data-dcnode-id="1655" instrument_node="">1. </span><span class="element-citation" data-dcnode-id="1638" id="sbref0001"><span data-dcnode-id="1654" instrument_node="">Hayward S., Deal A., Cheng C., Crawshaw A., Orcutt M., et al.  Clinical outcomes and risk factors for COVID-19 among migrant populations in high-income countries: a systematic review. </span><span data-dcnode-id="1645"><span class="ref-journal" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">J Migr Health. </span></span><span data-dcnode-id="1651" instrument_node="">2021;</span><span class="ref-vol" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">3</span></span><span data-dcnode-id="1648" instrument_node=""> </span><a data-dcnode-id="1646" data-ga-action="click_feat_suppl" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666623521000088" ref="reftype=extlink&amp;article-id=7168735&amp;issue-id=343666&amp;journal-id=3655&amp;FROM=Article%7CCitationRef&amp;TO=External%7CLink%7CURI" target="_blank"><span data-dcnode-id="1647" instrument_node="">https://www.sciencedirect.com/science/article/pii/S2666623521000088</span></a></span><span data-dcnode-id="1644" instrument_node=""> Available at: </span><span class="nowrap" data-dcnode-id="1639"><span data-dcnode-id="1643" instrument_node="">[</span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Fjournal%3DJ%2BMigr%2BHealth%26title%3DClinical%2Boutcomes%2Band%2Brisk%2Bfactors%2Bfor%2BCOVID-19%2Bamong%2Bmigrant%2Bpopulations%2
