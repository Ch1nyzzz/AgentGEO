</span><article class="post-3798 page type-page status-publish has-post-thumbnail hentry" data-dcnode-id="305" id="post-3798"><span data-dcnode-id="960" instrument_node="">
</span><header class="entry-header" data-dcnode-id="954"><span data-dcnode-id="959" instrument_node="">
</span><img alt="" class="attachment-post-thumbnail size-post-thumbnail wp-post-image jetpack-lazy-image" data-dcnode-id="958" data-lazy-sizes="(max-width: 302px) 100vw, 302px" data-lazy-src="https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Feature-photo-3.png?fit=302%2C225&amp;ssl=1&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Feature-photo-3.png?w=302&amp;ssl=1 302w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Feature-photo-3.png?resize=300%2C224&amp;ssl=1 300w" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Feature-photo-3.png%3Ffit%3D302%252C225%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="302"><span data-dcnode-id="957" instrument_node=""> </span><h1 class="entry-title" data-dcnode-id="956"></h1><span data-dcnode-id="955" instrument_node="">
</span></header><span data-dcnode-id="953" instrument_node="">
</span><div class="entry-content" data-dcnode-id="312"><span data-dcnode-id="952" instrument_node="">
</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="314"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="315"><div class="vc_column-inner" data-dcnode-id="316"><div class="wpb_wrapper" data-dcnode-id="317"><div class="vc_row wpb_row vc_inner vc_row-fluid holder vc_custom_1445467884100" data-dcnode-id="938"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="939"><div class="vc_column-inner" data-dcnode-id="940"><div class="wpb_wrapper" data-dcnode-id="941"><span data-dcnode-id="951" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_center vc_custom_1551767622439" data-dcnode-id="943"><span data-dcnode-id="950" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="947"><img alt="" class="vc_single_image-img attachment-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="948" data-lazy-loaded="1" height="240" loading="eager" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png%3Ffit%3D1295%252C240%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?w=1295&amp;ssl=1 1295w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?resize=300%2C56&amp;ssl=1 300w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?resize=768%2C142&amp;ssl=1 768w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?resize=1024%2C190&amp;ssl=1 1024w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?resize=610%2C113&amp;ssl=1 610w, https://i0.wp.com/networkadvocates.org/wp-content/uploads/sites/2/2019/03/Racial-Justice-header5.png?resize=624%2C116&amp;ssl=1 624w" title="Racial Justice header5" width="1295"></div><span data-dcnode-id="946" instrument_node="">
</span></figure><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid holder" data-dcnode-id="318"><div class="wpb_column vc_column_container vc_col-sm-9" data-dcnode-id="369"><div class="vc_column-inner" data-dcnode-id="370"><div class="wpb_wrapper" data-dcnode-id="371"><span data-dcnode-id="937" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554469976543" data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">
</span><h4 data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">The Impact of Racism on U.S. Immigration Past and Present</span></h4><span data-dcnode-id="932" instrument_node="">
</span></div><span data-dcnode-id="930" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554491978380" data-dcnode-id="918"><span data-dcnode-id="927" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="920"><span data-dcnode-id="926" instrument_node="">
</span><h5 data-dcnode-id="922" style="text-align: right;"><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//networkadvocates.org/wp-content/uploads/sites/2/2019/04/ImpactofRacismonImmigration.pdf"><u data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Download content as a PDF.</span></u></a></h5><span data-dcnode-id="921" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span></div><span data-dcnode-id="917" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554470132597" data-dcnode-id="903"><span data-dcnode-id="916" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="905"><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The history of migration and immigration in the United States is one of the dominant forces shaping our experience of race today. While immigration for “white” Europeans has, for the most part, led to a smooth welcome into dominant society, immigrants who are people of color face a more difficult path to acceptance, much less belonging, in our nation. It is common to refer to the United States as a nation of immigrants, but the reality is that immigrants in our nation have been scapegoated, exploited for cheap labor, and treated as second-class citizens for hundreds of years.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The inflammatory anti-immigrant rhetoric embraced by President Trump’s campaign was in many ways an echo of campaigns against various immigrant groups throughout history. In this chapter, you will learn about the numerous times our nation chose fear and hatred of immigrants over welcome and acceptance. Unfortunately, this has been a cycle that repeats itself time and time again.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Studying the history of immigration in the United States, as well as the laws and customs that changed over decades, illustrates how the concept of “whiteness” has been manipulated to serve those in power. Moreover, a survey of history demonstrates how “white” is less a racial identity, and instead more a privileged legal and economic status that needed to be protected and restricted to the few.</span></p><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554470172427" data-dcnode-id="893"><span data-dcnode-id="901" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="895"><span data-dcnode-id="900" instrument_node="">
</span><h3 data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">The History of U.S. Immigration in the 1800s</span></strong></h3><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span></div><span data-dcnode-id="892" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727664229" data-dcnode-id="863"><span data-dcnode-id="891" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="865"><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Our nation’s very first immigration law passed in 1790, creating a process to grant naturalized citizenship to immigrants who had lived in the United States for at least two years. The more restrictive requirement, however, was only “free white persons” qualified (*for all intents and purposes, person meant “man”). This also excluded Native Americans, indentured servants, and both enslaved and free Black people from access to citizenship. In 1795, Congress amended the law to increase the minimum residency requirement to five years, which remains today. [1] From then on, the nation continued to grow and receive immigrants looking to start their lives in the United States.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Throughout the 19</span><sup data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">th</span></sup><span data-dcnode-id="883" instrument_node=""> century, immigrants arrived in the United States from all over the world, particularly Northern and Western Europe and East Asia. Millions of individuals and families from Ireland and Germany arrived on the East Coast and settled in the East and Midwest. On the West Coast, Chinese immigrants arrived to work “first to work in the gold mines, but also to take agricultural jobs, and factory work” in the mid-1800s. [2]</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Meanwhile, much of the land that currently makes up the southwestern U.S. still belonged to Mexico, making the residents there Mexican citizens or residents. In the 1840s and 1850s, due to President James Polk and the federal government’s actions, wars and treaties moved the border south. As a result, these families never “crossed the border,” the border crossed them. The Treaty of Guadalupe Hidalgo in 1848 (following the U.S.-Mexico war) won much of the Southwest for the United States, including California, Texas, parts of Colorado, Arizona, New Mexico, Utah, and Nevada. Six years later, in 1854, the Gadsden Purchase brought what is now southern Arizona and New Mexico into the United States. [3]</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">The provisions of the </span><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Treaty of Guadalupe Hidalgo</span></strong><span data-dcnode-id="874" instrument_node=""> included safety and protection of: land ownership, language, and culture for Mexicans living in that territory, as well as access to U.S. citizenship. After the treaty was signed, however, many of those promises were broken, and it was difficult for U.S. citizens of Mexican ancestry to access their right to citizenship and retain their land. During this time, many Mexican and U.S. citizens freely traveled between the two countries for work and had friends and family on both sides of the border.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">Near the end of the 1800s, the welcoming of Chinese immigrants to California abruptly stopped as fear grew that Chinese immigrants were taking over jobs and posed “a threat to society.” Congress passed several laws to exclude Chinese immigrants from the country and society. In 1882, Congress passed the first of three </span><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Chinese Exclusion Acts</span></strong><span data-dcnode-id="868" instrument_node="">, banning additional Chinese immigration. It was not until 1943 when China and the United States became allies during World War II that the exclusion laws were finally repealed. [4]</span></p><span data-dcnode-id="866" instrument_node="">
</span></div><span data-dcnode-id="864" instrument_node="">
</span></div><span data-dcnode-id="862" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554470217992" data-dcnode-id="853"><span data-dcnode-id="861" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="855"><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="857"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Anti-Immigrant Policies in the Early 1900s</span></strong></h3><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span></div><span data-dcnode-id="852" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727559721" data-dcnode-id="820"><span data-dcnode-id="851" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="822"><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Immigration to the U.S. from all over the world continued into the 1900s, but two factors led to the rise of anti-immigrant sentiment across the country. First, European immigration shifted away from Protestant, Western European countries and increasingly came from Russia, Austria, and Italy, bringing a significant portion of Catholic and Jewish immigrants. Second, the Great Depression caused terrible damage to the economy and wages in the United States.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">In response to the first development, Congress passed the </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">National Origins Act</span></strong><span data-dcnode-id="843" instrument_node=""> in 1924 establishing a quota system to limit the number of immigrants entering the United States. In order to reduce the number of these “less-desirable” Italian, Eastern European, or Jewish immigrants, the law deliberately based the new quotas on census data from 1890, more than 20 years earlier when the majority of immigrants in the U.S. were white Protestants from Northern and Western Europe. [5].</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="840" instrument_node="">A few years later, during the Great Depression, those in power turned against Mexican immigrants, blaming them for the nation’s economic troubles. President Herbert Hoover led a wide-ranging campaign with the slogan “</span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">American Jobs for Real Americans</span></em><span data-dcnode-id="837" instrument_node="">.” White people across the country supported this campaign, as there was near-universal consensus among white people that the category “real Americans” excluded Mexican immigrants. State and local governments not only in the Southwest, but all across the country, conducted the </span><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">“Mexican Repatriation”</span></strong><span data-dcnode-id="834" instrument_node=""> efforts of the 1930s with support and funding from the federal government. The various agencies involved did not keep consistent records, but historians estimate that around 1 million, if not more, people of Mexican descent were forcibly deported.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">The various deportation efforts failed to limit the euphemistically named “repatriation” to Mexican immigrants, and included many U.S. citizens of Mexican descent. Some research says that as many as 60% of those sent “home” to Mexico in the 1930s were U.S. citizens: U.S.-born children of Mexican-descent who had never before traveled south of the border. [6] Thousands of people of Mexican descent were deported from Los Angeles, where local agencies conducted raids on the Mexican community and other parts of the Southwest. In the Midwest also, Mexican immigrants were removed from jobs and deported, all to make the factory jobs they held “available for white people.” Major companies, including Ford, U.S. Steel, and the Southern Pacific Railroad, colluded with the government by laying off thousands of Mexican workers. [7]</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">In 1935 a similar repatriation effort was instituted for Filipino immigrants after the Tydings-McDuffie Act set a plan for the Philippines to become an independent country. The Act also instituted a new immigration quota of only 50 Filipino immigrants per year. (Previously, when the Philippines was a United States colony, the U.S. government classified Filipino immigrants as “nationals” and immigration to the U.S. was unrestricted.) Facing much less coercion than the Mexican repatriation efforts, only about 2,000 immigrants voluntarily chose to return to the Philippines. [8]</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Other policies, outside of immigration policy negatively affected the lives of immigrants and people of color. The Wagner Act of 1935, previously mentioned as a contributor to the racial wealth and income gap, excluded farm workers and domestic workers, many of whom were Latinx or Asian immigrants, as well as Black workers. This policy harmed Black workers and immigrant workers by prohibiting them from receiving the benefits of organizing and creating unions. Additionally, other policies that contributed to the racial wealth gap also disproportionately affected immigrant communities and the descendants of immigrants, including the National Housing Act, the Federal-Highway Act, subprime loans, and the war on drugs.</span></p><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="821" instrument_node="">
</span></div><span data-dcnode-id="819" instrument_node="">
</span><div class="vc_toggle vc_toggle_default vc_toggle_color_default vc_toggle_size_md vc_custom_1554727602676" data-dcnode-id="800"><div class="vc_toggle_title" data-dcnode-id="815"><h4 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The hypocrisy of using the term “real Americans” to deport people of Mexican descent:</span></h4><i class="vc_toggle_icon" data-dcnode-id="816"></i></div><div class="vc_toggle_content" data-dcnode-id="801"><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The United States of America is not the only geographic location with “America” in its name. Indeed, the continents of North and South America have an arguably stronger claim to the term. Many people from Central and South America consider themselves “American” and find it problematic when residents of the United States refer to themselves as American to indicate their nationality instead of respecting the name of the continent. We at NETWORK often write out “people of the United States” to avoid the incongruity of calling some people “American” but not extending the term to others who also fit that category. In the case of forced deportations of Mexicans who are also residents of “the Americas,” the irony is doubly cruel.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="811" instrument_node="">Read more at </span><em data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Affinity Magazine</span></em><span data-dcnode-id="808" instrument_node="">:</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//affinitymagazine.us/2016/11/02/reminder-the-united-states-is-not-america/"><span data-dcnode-id="805" instrument_node="">http://affinitymagazine.us/2016/11/02/reminder-the-united-states-is-not-america/</span></a></p><span data-dcnode-id="802" instrument_node="">
</span></div></div><span data-dcnode-id="799" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554470464597" data-dcnode-id="790"><span data-dcnode-id="798" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="792"><span data-dcnode-id="797" instrument_node="">
</span><h3 data-dcnode-id="794"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">A Nation that Welcomes Immigrant Labor, But Not Immigrants</span></strong></h3><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="769"><span data-dcnode-id="788" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="771"><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">A noticeable pattern emerges throughout our nation’s history of immigration: when the economy needs immigrant labor, restrictions decline and immigrants are welcomed into the country. However, if circumstances change and immigrant labor is no longer needed, the U.S. position on immigration shifts to restriction, deportations, and xenophobic rhetoric.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">Immigration to the East and West coasts was welcomed throughout the first century of the United States’ existence as it provided laborers and settlers to populate the vast states and territories contained in our new nation. During World War II, there was once again a labor shortage and immigrants were needed to fill the gap. In 1942, the </span><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">“Bracero” program</span></strong><span data-dcnode-id="780" instrument_node=""> was created. Temporary workers were welcomed in, mainly from Mexico but also Barbados, the Bahamas, Canada, and Jamaica, to work in agriculture. Workers through this program were not eligible for permanent residency in the United States, and working conditions were awful for immigrants. These temporary workers were paid very little and their children were not allowed to attend public schools. Farmers used the program long after the war ended because farmworkers were not allowed to form unions or organize, allowing employers to pay their workers as little as they wanted. Congress ended the program in 1964, though other forms of temporary worker visas continue to this day. [9]</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">Finally, in the midst of the Civil Rights movement, Congress passed immigration legislation ending the old quota system in 1965. The </span><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Immigration and Naturalization Act </span></strong><span data-dcnode-id="774" instrument_node="">replaced the previous quota system with “a preference system based on immigrants’ family relationships with U.S. citizens or legal permanent residents and, to a lesser degree, their skills.” [10] The framework of an immigration system laid out in this law is still the basis of our immigration system today. This 1965 immigration law did much to remedy the shortcomings of the racist quota system and usher in immigration based on family unification. However, our laws are still woefully outdated.</span></p><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554470796178" data-dcnode-id="756"><span data-dcnode-id="767" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="758"><span data-dcnode-id="766" instrument_node="">
</span><div class="su-quote su-quote-style-default su-quote-has-cite" data-dcnode-id="760"><div class="su-quote-inner su-u-clearfix su-u-trim" data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">A broken immigration system means broken families and broken lives.</span><span class="su-quote-cite" data-dcnode-id="762"><em data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Jose Antonio Vargas</span></em></span></div></div><span data-dcnode-id="759" instrument_node="">
</span></div><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727079162" data-dcnode-id="746"><span data-dcnode-id="754" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="748"><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="750"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Challenges Facing Immigrants Today</span></strong></h3><span data-dcnode-id="749" instrument_node="">
</span></div><span data-dcnode-id="747" instrument_node="">
</span></div><span data-dcnode-id="745" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="719"><span data-dcnode-id="744" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="721"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Just by glancing at the front page of nearly any newspaper, it is clear that our current system fails to meet today’s immigration reality. Despite the fact that the majority of visas are granted to family members of citizens and legal permanent residents, even those with family connections experience unreasonable wait times to immigrate to the United States. Immigrants from the four countries with the longest wait times (Mexico, India, China and the Philippines) can face wait times of more than 20 years depending on family relation- ships, employment status and other factors.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The issue of wait times is separate from the current crisis of asylum seekers at the U.S.-Mexico border. Violence and instability in Central American countries, including Honduras, Guatemala, and El Salvador, cause many to leave their homes without the time or resources to immigrate through family or employment-based immigration channels. Instead, they are making the difficult journey to the U.S.-Mexico border and presenting themselves to border officials as asylum-seekers. It is legal under U.S. and international law for families and individuals seeking asylum to come into the United States for a determination of eligibility. The Trump administration’s recent policies to indiscriminately close the border or require asylum seekers to remain in Mexico contradicts our laws and puts people into very dangerous situations, which have led to deaths of migrants at the border.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">While the majority of immigrants have legal residency in the United States or have become naturalized citizens, immigrants who are undocumented in the United States experience significant challenges to provide for themselves and their families. Undocumented individuals face uncertainty in every aspect of their lives and endure barriers to employment, healthcare, and other necessities. While the DACA (Deferred Action for Childhood Arrivals) and DAPA (Deferred Action for Parents of Americans) programs proposed by the Obama administration raised hope of security for some undocumented individuals, those hopes were never fully realized. The Supreme Court declared that DAPA was unconstitutional and it never went into effect, while DACA has faced legal challenges and attacks from the Trump administration over the past few years.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Meanwhile, immigration enforcement in the United States has been responsible for cruelly separating immigrant families through detention and deportation. The Immigration and Customs Enforcement agency, also known as “ICE” was created in 2003, as part of the national response to the September 11 attacks. Throughout President Obama’s two terms, ICE conducted more than 2 million immigrant removals, more than any other president until that time. Now, President Trump’s administration has implemented changes to ICE tactics, upping the number of raids and deportations and made them crueler. Under the Obama Administration, undocumented immigrants in “high-priority categories,” including gang members, people with felony convictions, and those who posed security threats were prioritized for deportation while law-abiding undocumented immigrants, especially long-time residents and relatives of U.S.-citizens were mostly exempt from deportation. It is now common for people who have lived in the U.S. for decades and parents of U.S.-citizen children to be separated from their families and deported.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The origin of this cruel immigration enforcement system was the 2003 decision to create ICE and move immigration under the purview of the new Department of Homeland Security. This shift was one of the factors that shaped a more critical view of immigrants and immigration and criminalized undocumented immigrants for the first time. This was a marked difference than in the past when immigration had been overseen by the Department of Labor and immigrants were seen as positive contributors to our nation and economy.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Since the beginning of the Trump administration, verbal attacks against immigrants from other countries have frequently been broadcast from President Trump and other members of his administration. Whether disparaging the countries many immigrants come from, or arguing in favor of the Muslim ban, messages degrading immigrants who are people&nbsp;of color are coming from our nation’s highest office. Overall, the majority of people in the United States disagree and believe that immigration is a good thing, and less than a quarter, only 24%, of people supported cutting immigration. A survey by the Pew Research Center showed that “since 2001, the share of Americans who favor increased legal immigration into the U.S. has risen 22 percentage points (from 10% to 32%), while the share who support a decrease has declined 29 points (from 53% to 24%).” [11]</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">For more than a decade, Congress has talked about passing comprehensive immigration reform with no legislative success. It is past time for our immigration system to reflect and respond to the current realities of immigration in our world.</span></p><span data-dcnode-id="722" instrument_node="">
</span></div><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727706116" data-dcnode-id="709"><span data-dcnode-id="717" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="711"><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="713" style="padding-left: 40px;"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">A Personal Encounter with Racism Against Immigrants</span></strong></h3><span data-dcnode-id="712" instrument_node="">
</span></div><span data-dcnode-id="710" instrument_node="">
</span></div><span data-dcnode-id="708" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727698216" data-dcnode-id="684"><span data-dcnode-id="707" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="686"><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704" style="padding-left: 40px;"><span data-dcnode-id="705" instrument_node="">At NETWORK, we are proud to have immigrants and the descendants of immigrants in our Spirit-filled network of activists. We advocate for policies that welcome immigrants and fulfil our faith teaching to &nbsp;“love our neighbor” and support for family unity, as well as understanding and appreciation of immigrant communities.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701" style="padding-left: 40px;"><span data-dcnode-id="702" instrument_node="">Because there have not been any reasonable updates to our immigration system over the past decades, today, our system is broken. Millions of individuals face the struggle of being undocumented in the United States. Many undocumented people have lived in the United States for years, and have spouses, children, and extended family here. Approximately 16 million people in the U.S. live in mixed-status homes, and our nation’s policies are not keeping up with that reality. [12] Instead, they punish the children and family members of undocumented immigrants, even if those family members are U.S. citizens themselves.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698" style="padding-left: 40px;"><span data-dcnode-id="699" instrument_node="">One such family, members of our Spirit-filled network, lives in Ohio. When Adriana (names changed for protection) went to the DMV to get her drivers’ permit, she was unable to do so because of her mother’s undocumented status. Not only that, but Adriana, who was born in the United States, was accused of faking her birth certificate, social security card, and other documents.&nbsp; Their story was chronicled by reporters from the local paper.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="688" style="padding-left: 40px;"><em data-dcnode-id="694"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Read the full account, through Adriana’s eyes, here: </span></strong></em><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">
</span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wcpo.com/longform/living-in-the-shadows-part-1"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">https://www.wcpo.com/longform/living-in-the-shadows-part-1</span></strong></a></p><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span></div><span data-dcnode-id="683" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727767807" data-dcnode-id="670"><span data-dcnode-id="682" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="672"><span data-dcnode-id="681" instrument_node="">
</span><div class="su-quote su-quote-style-default su-quote-has-cite" data-dcnode-id="674"><div class="su-quote-inner su-u-clearfix su-u-trim" data-dcnode-id="675"><span data-dcnode-id="680" instrument_node="">…no one puts their children in a boat unless the water is safer than the land.</span><span class="su-quote-cite" data-dcnode-id="676"><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Warsan Shire, </span></em><span data-dcnode-id="677" instrument_node="">Home</span></span></div></div><span data-dcnode-id="673" instrument_node="">
</span></div><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727094271" data-dcnode-id="660"><span data-dcnode-id="668" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="662"><span data-dcnode-id="667" instrument_node="">
</span><h3 data-dcnode-id="664"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">We Pray</span></strong></h3><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727902970" data-dcnode-id="598"><span data-dcnode-id="658" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="600"><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Oramos, por un mundo sin violencia, por los que no tienen voz, oramos por que se res- pete la dignidad de las mujeres, para que los niños puedan compartir una comida digna con sus padres.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Oramos por los trabajadores del campo, para que sean tratados como seres humanos, para que puedan tener un sueldo justo, oramos por los que luchan cada día en la campaña por Comida Justa, por los aliados que marchan junto a los trabajadores y exigen justicia.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Oremos por aquellos que con su fe, creyeron en la voz de los trabajadores y sin dudarlo nos apoyaron, y nos vieron como hermanos y seres humanos, y siguen luchando para que las corporaciones tomen responsabilidad y respetar a los trabajadores.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Oramos por los líderes de fe conscientes, que con su fe nos dan esperanza a los traba- jadores y juntos construir un mundo de justicia e igualdad, estamos agradecidos por su apoyo, y ayudarnos a mantener viva la fe, celebramos juntos las victoria que hemos tenido, y hemos creado el Programa de Comida Justa, la cual nos da a los trabajadores la oportunidad de reportar los abusos que antes enfrentabamos, que las mujeres por primera vez, no tenemos que cargar con el peso de la violencia sobre nuestras espaldas.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Seguimos orando para que la expansión del modelo del programa llegue a más traba- jadores, ya que es una solución a los abusos que los trabajadores enfrentan diaria- mente.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Oramos para que la explotación laboral no siga afectando a las personas de color, a los migrantes, ni a los seres humanos en general, oramos para que la desigualdad no siga existiendo.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Oramos para que los que dirigen las corporaciones no tengan un corazón lleno de avari- cia, y sean más tolerantes con la humanidad, que tengan conciencia y puedan ver como sus malas decisiones afectan a sus semejantes, a sus hermanos en Dios, que somos los trabajadores.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Amén.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="630"><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">English translation:&nbsp;</span></em></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">We pray for a world without violence and for those whose voices are not heard. We pray for the respect of the dignity of women. We pray that children can share a dignified meal with their parents.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">We pray for farmworkers: that they be treated as human beings, that they receive a just wage. We pray for those who fight every day in the Campaign for Fair Food, for the allies who march together with farmworkers and demand justice.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Let us pray for those who, with their faith, believed in the voice of farmworkers and without doubting it, supported us. Let us pray for those who saw us as siblings and fellow human beings, and who keep pushing for corporations to take responsibility and respect farmworkers.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">We pray for the conscious faith leaders, who with their faith give us hope as farmworkers that we can build a world of justice and equality. We are grateful for their support and the way they help us keep our faith alive. Together we celebrate the victories we’ve won. We celebrate the Fair Food Program, which gives us as farmworkers the opportunity to report abuses that we faced for years. For the first time, women don’t have to carry the burden of violence on our backs.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">We also pray for the expansion of the program to reach more workers, as a solution to the abuses workers face daily.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">We pray that labor exploitation no longer affects people of color, migrants, or human beings in general. We pray that inequality no longer exists.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">We pray that those leading corporations do not have hearts full of greed and that they are more tolerant of humanity, that they have a conscience and they can see how their bad decisions affect others, their siblings in God, who are the workers.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Amen.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="602" style="text-align: right;"><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Written by the Coalition of Immokalee Workers Women’s Group</span></em></p><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554727990534" data-dcnode-id="588"><span data-dcnode-id="596" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="590"><span data-dcnode-id="595" instrument_node="">
</span><h6 data-dcnode-id="592"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Reflection Questions</span></strong></h6><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node="">
</span></div><span data-dcnode-id="587" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1554726952975" data-dcnode-id="567"><span data-dcnode-id="586" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="569"><span data-dcnode-id="585" instrument_node="">
</span><ul data-dcnode-id="571"><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Which parts of the history of immigration in the Unites States were unfamiliar to you, if any? Had you been told a different story?</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Do your ancestors have an immigration story? How is it similar or different to the history you read here?</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">How did “whiteness” shape the trajectory of different groups of immigrants in the United States?</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Do you hear anti-immigrant rhetoric in your daily life? What argument against immigration is repeated most? Mindful of the “big picture” of the history of immi- gration in the United States, how could you respond?</span></li><span data-dcnode-id="572" instrument_node="">
</span></ul><span data-dcnode-id="570" instrument_node="">

</span><p data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">Take action with NETWORK to call for just immigration policies that honor the dignity of immigrants and the importance of family unity. Visit </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.networklobby.org/immigration"><span data-dcnode-id="552" instrument_node="">www.networklobby.org/immigration</span></a><span data-dcnode-id="550" instrument_node=""> for the latest political updates.</span></p><span data-dcnode-id="548" instrument_node="">

</span><ul data-dcnode-id="518"><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">“How a shifting definition of ‘white’ helped shape U.S. immigration policy”</span></span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
</span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/newshour/nation/white-u-s-immigration-policy"><span data-dcnode-id="522" instrument_node="">https://www.pbs.org/newshour/nation/white-u-s-immigration-policy</span></a></li><span data-dcnode-id="519" instrument_node="">
</span></ul><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">This article from PBS illustrates how tactics used by government officials to separate people by perceived “whiteness” has changed our notion of what it means to be white, and what that looks like for our immigration policies.</span></p><span data-dcnode-id="514" instrument_node="">
</span><ul data-dcnode-id="503"><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">“America’s Forgotten History of Illegal Deportations”</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
March 6, 2017</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
</span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/politics/archive/2017/03/americas-brutal-forgotten-history-of-illegal-deportations/517971/"><span data-dcnode-id="507" instrument_node="">https://www.theatlantic.com/politics/archive/2017/03/americas-brutal-forgotten-history-of-illegal-deportations/517971/</span></a></li><span data-dcnode-id="504" instrument_node="">
</span></ul><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">In the 1920s and 1930s, the U.S. government conducted unconstitutional raids and deportations against Mexican immigrants, known as “Mexican repatriation.” This Atlantic article gives insight into that history, and what it means for immigration policy today.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="496"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Watch </span></strong></p><span data-dcnode-id="495" instrument_node="">
</span><ul data-dcnode-id="484"><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="486"><span data-dcnode-id="493" instrument_node="">Infographic on the History of U.S. Immigration</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
July 4, 2017</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kathleenkowal.com/2017/07/04/usimmigration/"><span data-dcnode-id="488" instrument_node="">https://kathleenkowal.com/2017/07/04/usimmigration/</span></a></li><span data-dcnode-id="485" instrument_node="">
</span></ul><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">This infographic from Kathleen Kowal traces the history of immigration policy in the U.S., starting with colonialization and ending in the present day.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="475"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Listen</span></strong></p><span data-dcnode-id="474" instrument_node="">
</span><ul data-dcnode-id="463"><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="465"><span data-dcnode-id="472" instrument_node="">“Fresh Air: America’s Forgotten History of Mexican-American ‘Repatriation'”</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
September 10, 2015</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
</span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2015/09/10/439114563/americas-forgotten-history-of-mexican-american-repatriation"><span data-dcnode-id="467" instrument_node="">https://www.npr.org/2015/09/10/439114563/americas-forgotten-history-of-mexican-american-repatriation</span></a></li><span data-dcnode-id="464" instrument_node="">
</span></ul><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">This episode of NPR’s Fresh Air delves into the history surrounding Mexican “repatriation” — returning people to their native country. The impetus for these mass deportations was fear and racism, and the episode explains it in the context of 1920s and 1930s history.</span></p><span data-dcnode-id="459" instrument_node="">
