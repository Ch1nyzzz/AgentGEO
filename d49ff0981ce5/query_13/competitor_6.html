</span><div class="field field-name-field-text-column field-type-text-long field-label-hidden" data-dcnode-id="1260"><div class="field-items" data-dcnode-id="1261"><div class="field-item even" data-dcnode-id="1262"><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">According to their analysis, US policies have also deterred Haitians from pursuing protection including asylum claims and forced them to return to other countries, “where they face an atmosphere of racial discrimination, gender violence and xenophobic violence”, said a news release issued on behalf of the experts, on Monday.&nbsp;</span></p><span data-dcnode-id="1362" instrument_node="">
</span><div class="dnd-widget-wrapper context-un_news_default type-twitter atom-align-right" data-dcnode-id="1336"><span data-dcnode-id="1361" instrument_node="">
</span><div class="dnd-atom-rendered" data-dcnode-id="1338"><blockquote class="twitter-tweet" data-dcnode-id="1341"><p data-dcnode-id="1345" dir="ltr" lang="en"><span data-dcnode-id="1359" instrument_node="">🇺🇸 </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/UnitedStates%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1358" instrument_node="">#UnitedStates</span></a><span data-dcnode-id="1356" instrument_node="">: UN experts condemn USA’s recent and ongoing systematic mass deportation of Haitian migrants &amp; refugees, and cautions that such collective expulsions without any individualised evaluation violate international law.</span><br data-dcnode-id="1355"><br data-dcnode-id="1354"><span data-dcnode-id="1353" instrument_node="">👉 </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/7QGrB7r3v7"><span data-dcnode-id="1352" instrument_node="">https://t.co/7QGrB7r3v7</span></a><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/StandUp4Migrants%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1350" instrument_node="">#StandUp4Migrants</span></a><span data-dcnode-id="1348" instrument_node=""> </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/3YNjoqAzUo"><span data-dcnode-id="1347" instrument_node="">pic.twitter.com/3YNjoqAzUo</span></a></p><span data-dcnode-id="1344" instrument_node="">— UN Special Procedures (@UN_SPExperts) </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/UN_SPExperts/status/1452631155082244106%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1343" instrument_node="">October 25, 2021</span></a></blockquote><span data-dcnode-id="1340" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span><h2 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">‘Impermissible risks’&nbsp;</span></h2><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">&nbsp;“In expediting the collective expulsion of Haitian migrants, the United States is subjecting a group of predominantly Black migrants to impermissible risks of refoulement and human rights abuse without any individualised evaluation,” the experts said.&nbsp;</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">“International law prohibits arbitrary or collective expulsions. States cannot label all migrants of a certain nationality per se threats to national security, and all migrants, no matter their nationality, race or migration status, must be guaranteed the protections called for under international law,” they reminded the US Government.&nbsp;</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">The mass deportations seemingly continue a history of racialized exclusion of Black Haitian migrants and refugees at US ports of entry, the experts said.&nbsp;</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h2 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Blanket policy&nbsp;</span></h2><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1319" instrument_node="">&nbsp;Since the start of the </span><a class="word-link" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/coronavirus" target="_blank" title="Coronavirus disease (COVID-19)"><span data-dcnode-id="1318" instrument_node="">COVID-19</span></a><span data-dcnode-id="1316" instrument_node=""> pandemic, the Title 42 policy carried out by the US Government, initially under the previous Trump administration, has authorized the collective expulsion of any migrants and asylum seekers who seek to cross US land borders, without an individual evaluation of their circumstances and protection needs, experts noted.&nbsp;</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">When it comes to relevant international law, the US has ratified the 1967 Protocol Relating to the Status of Refugees, the Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment, the </span><a class="word-link" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/professionalinterest/pages/ccpr.aspx" target="_blank" title="International Covenant on Civil and Political Rights"><span data-dcnode-id="1312" instrument_node="">International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="1310" instrument_node=""> (ICCPR), and the International Convention on the Elimination of All Forms of Racial Discrimination.&nbsp;</span></p><span data-dcnode-id="1308" instrument_node="">
</span><h2 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Afoul of the law&nbsp;</span></h2><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The experts have written to the US Government, expressing concern that its recent immigration enforcement activities against Haitians abroad, likely run afoul of international refugee law and international human rights law.&nbsp;</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1301" instrument_node="">The independent experts questioning US actions over the expulsions are </span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/EN/Issues/Racism/SRRacism/Pages/IndexSRRacism.aspx"><span data-dcnode-id="1300" instrument_node="">Tendayi Achiume</span></a><span data-dcnode-id="1298" instrument_node="">, Special Rapporteur on contemporary forms of racism, racial discrimination, xenophobia and related intolerance; together with Dominique DAY (Chair); Ms. Catherine Namakula, Miriam Ekiudoko, and Sushil Raj – all members of the </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/issues/racism/wgafricandescent/pages/wgepadindex.aspx"><span data-dcnode-id="1297" instrument_node="">Working Group</span></a><span data-dcnode-id="1295" instrument_node=""> of Experts on People of African Descent.&nbsp;</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1292" instrument_node="">&nbsp;Special Rapporteurs are part of what is known as the </span><a class="word-link" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/EN/HRBodies/SP/Pages/Welcomepage.aspx" target="_blank" title="Special Procedures"><span data-dcnode-id="1291" instrument_node="">Special Procedures</span></a><span data-dcnode-id="1289" instrument_node=""> of the </span><a class="word-link" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/EN/HRBodies/HRC/Pages/Home.aspx" target="_blank" title="United Nations Human Rights Council"><span data-dcnode-id="1288" instrument_node="">Human Rights Council</span></a><span data-dcnode-id="1286" instrument_node="">, and along with other independent experts are appointed by the Council, without being paid for their work, or becoming UN staff.&nbsp;</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">They are independent from any government or organization and serve in their individual capacity.&nbsp;</span></p><span data-dcnode-id="1281" instrument_node="">
</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Lives in danger</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">In Haiti, humanitarians warned on Monday that lives are likely to be lost if fuel supplies do not reach hospitals immediately, as the country continues to be rocked by multiple crises including the aftermath of a major earthquake, economic turmoil and widspread political unrest, following the assassination of its president earlier in the year.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Roadblocks are preventing the delivery of fuel, creating obstacles to the provision of essential services and are also preventing access by humanitarian workers, said the UN Spokesperson, briefing journalists in New York.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Hospitals and medical&nbsp;centres&nbsp;are hit especially hard.&nbsp;In Port-au Prince, as well as other cities, hospitals are reporting extremely low&nbsp;fuel&nbsp;reserves&nbsp;needed to power the generators that keep services going.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">In two of the capital’s major hospitals, pediatric services for 300 children, maternal health care for 45 women and critical care for 70 other patients will be interrupted if supplies are not received by tomorrow.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The UN is calling on all those who have an influence over the current situation to ensure that fuel supplies can be delivered to hospitals, and that humanitarian access to earthquake-impacted victims in the southwest is not further disrupted.&nbsp;</span></p><span data-dcnode-id="1263" instrument_node="">
</span></div></div></div><span data-dcnode-id="1259" instrument_node=""> </span></div><span data-dcnode-id="1257" instrument_node="">
