</span><header class="entry-header" data-dcnode-id="250"><span data-dcnode-id="262" instrument_node="">
</span><div class="entry-header-row" data-dcnode-id="253"><span data-dcnode-id="261" instrument_node="">
</span><div class="entry-header-column" data-dcnode-id="256"><span data-dcnode-id="260" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">The Human Rights of Refugees</span></h1><span data-dcnode-id="257" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node="">
</span></div><span data-dcnode-id="251" instrument_node="">
</span></header><span data-dcnode-id="248" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="241"><span data-dcnode-id="247" instrument_node="">
</span><span class="posted-date" data-dcnode-id="246"></span><span data-dcnode-id="245" instrument_node="">
</span><span class="posted-author" data-dcnode-id="243"><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegenocidereport.org/author/larakajs/" rel="author" title="Posts by "></a></span><span data-dcnode-id="242" instrument_node="">
</span></div><span data-dcnode-id="239" instrument_node="">
</span><div class="entry-content" data-dcnode-id="157"><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><img alt="" class="wp-image-212 alignleft" data-dcnode-id="237" height="196" sizes="(max-width: 392px) 100vw, 392px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thegenocidereport.org/wp-content/uploads/2020/04/Syrian-Refugees-Waiting.jpg%3Fresize%3D392%252C196%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thegenocidereport.org/wp-content/uploads/2020/04/Syrian-Refugees-Waiting.jpg?w=470&amp;ssl=1 470w, https://i0.wp.com/thegenocidereport.org/wp-content/uploads/2020/04/Syrian-Refugees-Waiting.jpg?resize=300%2C150&amp;ssl=1 300w" width="392"></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="234" instrument_node="">People become refugees because their basic human rights have been violated or threatened. </span><span data-dcnode-id="233" id="more-211"></span><span data-dcnode-id="232" instrument_node="">The fact is that people don’t wake up one morning and decide that they will flee their homes, in most cases leave everything behind and head toward the closest camp. People become refugees because they have no choice… it is a life or death decision.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">It is inconceivable that a leader of a nation (or someone who wants to be the leader) would declare that they will send back refugees from a war torn nation, yet that is exactly what Donald Trump (2016 Republican presidential hopeful) did in Keene, New Hampshire during a speech when he said, “If I’m elected, they (Syrian refugees) are going back.”</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Not only is this way of thinking unethical and disturbing, but it is a direct contradiction of everything that international refugee law represents.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Firstly, to suggest that a country would force the return of individuals to a dangerous situation or environment is reckless and inhuman. The reality is that no one wakes up one day and decides they will become a displaced person or refugee because they live in optimum conditions.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">On the contrary, ask any one of the nearly 60 million refugees on the planet why they are displaced and they will likely describe the horrors of war, mass bombing, use of chemicals in bombing, murder, torture, rape, sexual slavery, forced prostitution, forced sterilization, forced disappearances, extermination, mass deportation, imprisonment, apartheid, persecution based on political, racial, national, ethnic, religious, cultural and gender, and denial of humanitarian aid.</span></p><span data-dcnode-id="218" instrument_node="">
</span><h4 data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">International Law Protects Refugees</span></h4><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">There are a number of international laws that work to protect the human rights of refugees; the most important of these are the 1951 United Nations Convention and the 1967 Protocol Relating to the Status of Refugees. Although the 1951 Convention pertained to refugees prior to 1951, it became clear that refugee status was not a temporary issue and was not exclusive to the Second World War. The 1967 Protocol extended the Convention to include all refugees past, present and future.</span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="211" instrument_node="">As of 2015, </span><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/3b73b0d63.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="210" instrument_node="">148 countries have signed</span></a><span data-dcnode-id="208" instrument_node=""> both the 1951 Convention and the 1967 Protocol. It is important to note that while the US is not a signatory to the 1951 Convention, it signed the 1967 Protocol on November 1, 1968.</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="205" instrument_node="">Further, the rights of refugees are avowed and recognized in the International Bill of Human Rights which consists of the </span><a data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegenocidereport.org/universal-declaration-of-human-rights/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="204" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="202" instrument_node="">, the International Covenant on Civil and Political Rights, and the International Covenant on Economic, Social and Cultural Rights.</span></p><span data-dcnode-id="200" instrument_node="">
</span><h4 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Refugees and Human Rights</span></h4><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Under international human rights law, refugees and asylum seekers are entitled to enjoy all the rights and freedoms set forth including the right to life, protection from ill-treatment and torture, the right to nationality, freedom of movement, the right to leave any country – including one’s own – and to return to one’s country and the right not to be forcibly returned. In fact, the 1951 Convention strictly prohibits the forcible return of refugees.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Article 33 states, “no Contracting State shall expel or return (refouler) a refugee in any manner whatsoever to the frontiers of territories where his life or freedom would be threatened on account of his race, religion, nationality, membership of a particular social group or political opinion.”</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Protection of non-return (non-refoulement) is further issued in Article 3 of the United Nations Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment, which states, “No State Party shall expel, return (refouler) or extradite a person to another State where there are substantial grounds for believing that he would be in danger of being subjected to torture” (para. 1). Paragraph 2 continues “for the purpose of determining whether there are such grounds, the competent authorities shall take into account all relevant considerations including, where applicable, the existence in the State concerned of a consistent pattern of gross, flagrant or mass violations of human rights”.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Clearly, the conditions in Syria (and many other countries) meet these standards.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Furthermore, Article 14 of the Universal Declaration of Human Rights (UDHR) states: “everyone has the right to seek and to enjoy in other countries asylum from persecution.”</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">The rights of the displaced are supported by the United Nations High Commissioner for Refugees (UNHCR), which works to protect the basic rights of refugees which often include processing asylum seekers, resettlement, physical protection of refugees, and legal counsel and aid.</span></p><span data-dcnode-id="179" instrument_node="">
</span><h4 data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Mass Exodus of Refugees</span></h4><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">As a result of the Syrian civil conflict – which is in its fourth year – approximately 4 million people have fled Syria, taking refuge in other countries, while nearly 7 million are internally displaced in Syria. Meanwhile an estimated 160,000 have sought asylum in European countries.</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">The mass exodus of refugees from the crisis in Syria alone has been enough to put tremendous economic stress on the neighboring countries of Lebanon, Jordan, Egypt, Turkey and Iraq.</span></p><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Unfortunately the Syrians are not the only refugee crisis at the present. The refugee situations in South Sudan, Sudan, Central African Republic, Democratic Republic of Congo, Nigeria and Burundi are building by the day and then there are the crises in Myanmar and Yemen.</span></p><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">The fact is that the mass exodus of refugees across the map has grown to such epic proportions that it has been called the worst humanitarian crisis in recorded history. The bottom line is that as millions fall under the protection of international refugee law, no leader and no country can send them back. To send them back would be irresponsible, if not criminal.</span></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Opinion by Lara Kajs&nbsp; |&nbsp; 6 October 2015</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Featured Image: Refugees wait for Macedonian police to allow them to cross in Macedonia at the border line between Greece and Macedonia near the town of Gevgelija. Photo: Associated Press</span></p><span data-dcnode-id="158" instrument_node="">
