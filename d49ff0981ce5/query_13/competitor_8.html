</span></div></div><p data-dcnode-id="2167" style="padding-left: 30px;"><strong data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">1.1 Introduction</span></strong></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2162" style="padding-left: 30px;"><span data-dcnode-id="2165" instrument_node="">Human Rights of Refugees are one of the major problems of the world. According to Article 1 of United Nations Convention on Status of Refugees, refugees are those who are “owing to a well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group, or political opinion, is outside the country of his nationality, and is unable to or, owing to such fear, is unwilling to avail himself of the protection of that country.”</span><a data-dcnode-id="2163" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="2164" instrument_node="">[1]</span></a></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159" style="padding-left: 30px;"><span data-dcnode-id="2160" instrument_node="">They move to other countries when their life is in constant threat due to various reasons and not perfect for their healthy survival. Many countries in the world have a proper rule governing refugees living in their country and the protection that should be given to them but in India, there is no uniform legal framework.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2150" style="padding-left: 30px;"><span data-dcnode-id="2157" instrument_node="">India is a country where there are many refugee groups from different countries, majorly from its neighbouring countries. It doesn’t have any suitable refugee rules and is neither a signatory to the 1951 UN Convention nor 1967 protocol on Status of Refugees. Many countries have adopted binding regional instruments for the protection of refugees, but there is no instrument to protect the refugees of the Asian region.</span><a data-dcnode-id="2155" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="2156" instrument_node="">[2]</span></a><span data-dcnode-id="2154" instrument_node=""> India has followed ad-hoc policies about refugee settlements since its independence. There are a large number of refugees in India due to its geographic location, religious society, vast culture. Currently, Rohingya refugees are a major concern to India. There are numerous aspects pertaining to refugees which are of major importance both to India, as a country and to the refugees, particularly in the context of law implementation.</span><a data-dcnode-id="2152" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="2153" instrument_node="">[3]</span></a><span data-dcnode-id="2151" instrument_node=""> UNHRC and HNRC are the bodies of Human Rights of the UN and India respectively. Major Refugee issue in India was because of the India-Pakistan partition of 1947, when there were millions of population exchanges between these newly formed countries. Some major Refugee groups in India are from Iran, Tibet, Bangladesh, Pakistan, Afghanistan, Sri Lanka, Myanmar.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2148" instrument_node="">Jordan, Pakistan, Ethiopia, Iran, Turkey host the largest number of refugees as of 2016.</span><a data-dcnode-id="2146" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="2147" instrument_node="">[4]</span></a><span data-dcnode-id="2145" instrument_node=""> Refugee protection is a great concern to the international community ever since the formation of the United Nations and the issue hasn’t been solved yet. Migration was a problem ever since the ancient times. Tribal people migrated in search of food, water, and resources, now the refugees migrate for safety and other reasons.</span><a data-dcnode-id="2143" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="2144" instrument_node="">[5]</span></a><span data-dcnode-id="2142" instrument_node=""> There are 15.2 million refugees worldwide and 1 million are waiting for their asylum application approvals.</span><a data-dcnode-id="2140" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="2141" instrument_node="">[6]</span></a><span data-dcnode-id="2139" instrument_node=""> Refugees face many problems in India as well as the whole world.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2134"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">1.2 Research Objective</span></strong></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2132" instrument_node="">The main objective of this research paper is to present the laws and rights available to refugees in India and other countries. It presents many aspects related to refugees starting from the history of refugees and the current situation of them. United Nations High Commissioner for Refugees (UNHCR) is the main organization to provide international protection to refugees and assist them in other manners.</span><a data-dcnode-id="2130" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="2131" instrument_node="">[7]</span></a><span data-dcnode-id="2129" instrument_node=""> In India National Human Rights Commission (NHRC) is the body which was given statutory basis by Protection of Human Rights Act, 1993 which is responsible to protect the refugees and promote human rights. The paper also has the information about Laws and conventions regarding refugees. Many countries like Australia, Brazil, China, etc. continuously provide support and legal assistance to many refugees. There are a huge number of refugees in India but it has no specific laws related to their rights. India’s is not a signatory to the 1951 Refugee Convention, and the question is why? Is there a need for a South Asian Convention on Refugees? The Major refugee crisis in the World is also an issue to the UN. This paper will inform research scholars and refugees about the refugee laws, history, conventions and rights of refugees in India and the world.</span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2124"><strong data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">1.3 Research Methodology</span></strong></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">In order to find the above information, a number of research methods were employed. The doctrinal method of research was involved. The traditional methodology of research i.e., from the research scholars, is used. Information related to conventions and other materials related to UNHCR and NHRC are also used. Books on Human Rights to refugees, web articles, research papers were also used. The analysis of rights of refugees in India is brought from the statutes, case laws, books, articles, journals, webpages.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2112"><strong data-dcnode-id="2113"><span data-dcnode-id="2116" instrument_node="">&nbsp;</span><em data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">2.1 History of Refugees</span></em></strong></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2105"><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">2.1.1 History of Refugees in the World</span></strong></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2098"><em data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node="">Asylum seekers are existing from many years, the early man used to migrate for finding food, shelter and other resources. Around AD 600, the right to seek asylum in a holy place or a church was codified in law by King Ethelbert of Kent. Many such laws were rising around Europe during the Medieval Period which was the start of such provisions. But, it was the 18</span><sup data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">th</span></sup><span data-dcnode-id="2100" instrument_node=""> century when it was required for people to show id verification to cross borders in many countries. </span></em></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2090"><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Many wars in the past were the main reason for the refugees to leave their places. The Balkan Wars caused 80,000 refugees to migrate.</span></em><a data-dcnode-id="2093" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="2094" instrument_node="">[8]</span></a><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node=""> The Civil war of Spain, USA, Russian Revolution of 1917 also caused people to become refugees. The League of Nations was the body that caused the first international refugee affairs.</span></em></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2078"><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The biggest Refugee crises occurred during the World Wars. The first world war lasted almost 4 years. One million refugees of Belgium went to the Netherlands and there on transferred to the UK and other countries. France, Germany were also the worst affected. When Russia attacked Prussia, 870000 fled.</span></em><a data-dcnode-id="2085" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="2086" instrument_node="">[9]</span></a><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node=""> World War 2 was one such war which never happened in the history of the world. </span></em><span data-dcnode-id="2082" instrument_node="">By 1959 some 900,000 European refugees were taken by European countries. And 461,000 had been accepted by the USA, and 523,000 by other countries.</span><a data-dcnode-id="2080" href="#_ftn10" name="_ftnref10"><span data-dcnode-id="2081" instrument_node="">[10]</span></a><span data-dcnode-id="2079" instrument_node=""> World War 2 caused around 60,000,000 refugees in Europe itself.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2074"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">2.1.2 History of Refugees in India</span></strong></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node="">Indi is a very vastly populated country and is one of the countries experiencing refugees lately. Migrations in the past occurred due to the Hindukush Mountains in the west and Patkoi ranges in the east. Partition of India–Pakistan resulted in a huge number of people migrating. Almost 20 million came to India after India got its Independence. It had to set up many relief camps addressing the huge number of refugees. People started coming in from Bangladesh, Pakistan. It passed the Rehabilitation Financial Administration Act in the year 1948 to address these issues with funding. A Huge number were displaced from India to Pakistan and vice versa and the problem was much similar to Refugees. Another instance was in 1959 when Dalai Lama and his followers approached India as refugees and India provided them a Political Asylum. The year of 1971 saw many refugees travelling from East Pakistan to India. In 1983 and 1986 India had refugees coming in from Sri Lanka and Bangladesh respectively. At the end of 1992, India has hosted 2,000,000 migrants and 237,000 displaced persons.</span><a data-dcnode-id="2070" href="#_ftn11" name="_ftnref11"><span data-dcnode-id="2071" instrument_node="">[11]</span></a><span data-dcnode-id="2069" instrument_node=""> India always has some or the other Refugees coming in throughout its history.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2064"><strong data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">2.2. Major Refugee Groups</span></strong></p><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">The worst affected situation in the history of the world was because of the World War 2, which caused almost 60 million people getting displaced.5.1 million Palestinian have fled their homes because of the Israeli-Palestinian Conflict. Ever since the US launched a war on Iraq, 4 million were displaced. According to UNHCR, 647,781 Vietnamese refugees are resettled around the world, the war of Vietnam gave rise to 1.6 million refugees which included the mountain people of Vietnam as well. Kakuma Refugee Group in Kenya are 184,550, refugees are from South Sudan and Somalia. The refugee crisis in the Middle East and Africa caused almost 4.1 million to flee from Syria itself.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Soviet Jews have been migrating to the Us for decades, almost 380,000 refugees have migrated. Between 1945 and 1952, 137,000 Jewish refugees settled in The United States of America. Refugees of Myanmar (Burma) fled the country during the Vietnam civil war and settled in Australia, Canada, USA, New Zealand. In the recent years, Rohingya refugees which are a group of Muslim minorities whose basic human rights were denied. 1000’s of them now live in India, Bangladesh, and other countries. Rohingya’s were declared as most persecuted group by UNHCR.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2054"><strong data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">2.3. Countries providing support to Refugees</span></strong></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2052" instrument_node="">Many countries are actively helping and safeguarding refugees by providing them shelter, medical help, and many other necessities. Due to the war in Syria, almost 4 million people fled Syria since 2011 and 1 million settles in Lebanon. On the whole, Germany has taken 1 million refugees in 2015 itself and provided them with all kinds of support. They welcomed them with open hearts and even hosted banners in football stadiums stating “Welcome Refugees”. In Germany, Right to Asylum is a constitutional right. The Asylum Act and Residence Act provide rules and procedure for taking refugees. An in-person interview of the refugee is conducted and experts of that country are consulted before accepting the application.</span><a data-dcnode-id="2050" href="#_ftn12" name="_ftnref12"><span data-dcnode-id="2051" instrument_node="">[12]</span></a></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2047" instrument_node="">Sweden accepts refugees coming from the border and also accepts quota refugees from UNHCR. In the year 2015, it took 160,000 applications for asylum and are given only temporary residence, but before asylum seekers were given permanent residence. Refugees are given many free services in the country. During the 2013 Iraq War, it took more number of refugees than US and UK combined.</span><a data-dcnode-id="2045" href="#_ftn13" name="_ftnref13"><span data-dcnode-id="2046" instrument_node="">[13]</span></a><span data-dcnode-id="2044" instrument_node=""> Monetary Aid, Health Care, Schooling, Passports are all provided to the refugees.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Brazil has a constitutional provision that grants asylum to aliens. The accepted refugees are allowed to freely move in the country and also select their place of residence as per the Convention on Territorial Asylum. It is also a signatory to the 1951 convention on Refugees.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node="">European Union objective was to establish a Common European Asylum System (CEAS). Under CEAS, international protection is given to those who qualify as refugees due to a well-founded fear of persecution. Right to Asylum and prohibition of refoulment is guaranteed by the Charter of Fundamental Rights and 1951 Refugee Convention and its 1967 Protocol. The CEAS is composed of a number of regulations and directives that require action by the EU Member States.&nbsp; CEAS is composed of several directives and regulations which have been recast previously.</span><a data-dcnode-id="2036" href="#_ftn14" name="_ftnref14"><span data-dcnode-id="2037" instrument_node="">[14]</span></a><span data-dcnode-id="2035" instrument_node=""> Many other countries provide support for refugees – Australia, Canada, China, France, Italy, Kenya, Lebanon, Turkey, United Kingdom and many other countries.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2030"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">2.4. Rohingya Refugee Group</span></strong></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2028" instrument_node="">Rohingya people are also known as Arakanese Indians who are stateless people from Myanmar. They are declared by UN as the most persecuted minorities in the world.</span><a data-dcnode-id="2026" href="#_ftn15" name="_ftnref15"><span data-dcnode-id="2027" instrument_node="">[15]</span></a><span data-dcnode-id="2025" instrument_node=""> The Rohingya population was denied citizenship according to the 1982 Myanmar Nationality Law. They had to flee due to the ongoing military crackdown by the Myanmar Army. More than 6700 Rohingya’s were killed in August 2017.</span><a data-dcnode-id="2023" href="#_ftn16" name="_ftnref16"><span data-dcnode-id="2024" instrument_node="">[16]</span></a><span data-dcnode-id="2022" instrument_node=""> They are in heavy numbers in different cities in India, but the government of India does not recognize them as refugees. Most of those refugees have migrated to Bangladesh. There was a mass displacement of refugees and forced relocations. Rohingya refugees face multiple protection risks as of December 2017. Though India refused to let Rohingya refugees enter the country as it posed security threats, 40,000 refugees have taken shelter in Assam and West Bengal. There’s a threat because the Rohingya Military group has been declared terrorist by counter-terrorism authority of Myanmar. Many countries urged Myanmar to end the violence against this minority to restore peace in the country. China always stays away from internal interferences of other countries, but it mediated for Myanmar and Bangladesh. Though Bangladesh has stood up to help those refugees, its falling short of resources. In the case of </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Dongh Lian Khan v. Union of India</span></em><span data-dcnode-id="2019" instrument_node=""> the Delhi High Court held that the principle of non-refoulment is part of the guarantee under Article 21 of the Constitution of India irrespective of nationality.</span><a data-dcnode-id="2017" href="#_ftn17" name="_ftnref17"><span data-dcnode-id="2018" instrument_node="">[17]</span></a><span data-dcnode-id="2016" instrument_node=""> In the case of </span><em data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">NHRC vs Arunachal Pradesh</span></em><span data-dcnode-id="2013" instrument_node="">, the Supreme Court held that the state is bound to protect the life and liberty of every human being, citizen or otherwise. Even then India is not ready to take Rohingya refugees and help them.</span><a data-dcnode-id="2011" href="#_ftn18" name="_ftnref18"><span data-dcnode-id="2012" instrument_node="">[18]</span></a></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2006"><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">3.1 Problems faced by Refugees </span></strong></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Refugees who needed up in different refugee camps or different countries face any problems with their life. They are subject to harsh living conditions. They have limited resources, live in tents, have limited food, water, clothing. They live without adequate shelter and face many difficulties. Those who do not join refugee camps and join countries, often face unexpected hardships, they also face cultural, language problems. The refugee children are the ones facing the most of the problems. They find it very hard to continue with schooling and fail to understand and cope up. Most refugees take up some or the other labour work in the country they are living and are exploited by the recruiters. They feel unsafe in their country, because of which they come to the new place, but feel unhappy and unsafe here as well. Different countries have different set of rules handling refugees, some countries grant citizenship in less number of years than the other. The perks of being a refugee in one country are different than the other. They face discrimination, financial difficulties, and are psychologically affected.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">4.1 India’s Stance in 1951 Convention</span></strong></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1991"><em data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">There are 144 signatories to the 1951 Refugee Convention, and India is not one of them. The Refugee Convention is about the rights of individuals who are refugees in other countries and the responsibilities of the nation hosting them. India faces a lot of pressure from International bodies about it not being a signatory to the Refugee convention. Taking into consideration, the political, economic, ethical factors prevent India from being a party to 1951 Refugee Convention. India is a developing country and it would be a burden if it complies with the convention and becomes a signatory, and affect the security laws of India. It felt the convention is not related to the problems arising in India, but it is applying some articles from the 1951 convention. India believes even if it’s not a signatory, it would provide minimum reeds for a refugee. India has many problems with its border sharing countries, due to which it took that decision. If it becomes a signatory, it will have to provide more and more resources and other things for the refugees. After 1991, due to the execution of Rajiv Gandhi by a Sri Lankan refugee, India supported its stance for the very same reason. Refugees damage the economy of India as well, as many come to India in search of opportunities.</span></em><a data-dcnode-id="1994" href="#_ftn19" name="_ftnref19"><span data-dcnode-id="1995" instrument_node="">[19]</span></a><em data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node=""> It is afraid that people may come to the country names as refugees for various reasons and misuse the convention for better opportunities. Should India be a signatory to the Refugee Convention or its Protocol is still a question that has both pros and cons.</span></em></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1987" instrument_node="">
</span><ol data-dcnode-id="1981" start="5"><span data-dcnode-id="1986" instrument_node="">
</span><li data-dcnode-id="1983"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node=""> Refugee Status in India</span></strong></li><span data-dcnode-id="1982" instrument_node="">
</span></ol><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1977"><strong data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">5.1. Constitutional Protection</span></strong></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1975" instrument_node="">A few articles of the Constitution of India are applicable to the refugees when they are in India. The most important Article is Article 21 which deals with Right to Life and personal liberty, it applies to everyone irrespective of whether they are a citizen of India. Many judgements have been given based on Article 21 on refugees. </span><a data-dcnode-id="1973" href="#_ftn20" name="_ftnref20"><span data-dcnode-id="1974" instrument_node="">[20]</span></a><span data-dcnode-id="1972" instrument_node=""> Article 14 guarantees the person right to equality before the law.&nbsp; Article 5, 6, 7, 8, 9, 10,11,12, 20, 22,25-28, 32, 226 also available for non-citizens of India including Refugees.</span><a data-dcnode-id="1970" href="#_ftn21" name="_ftnref21"><span data-dcnode-id="1971" instrument_node="">[21]</span></a><span data-dcnode-id="1969" instrument_node=""> In the case of </span><em data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Louis De Raedt v. Union of India</span></em><span data-dcnode-id="1966" instrument_node="">, the court held that the fundamental rights to life, liberty, dignity are available to non-citizens of India.</span><a data-dcnode-id="1964" href="#_ftn22" name="_ftnref22"><span data-dcnode-id="1965" instrument_node="">[22]</span></a><span data-dcnode-id="1963" instrument_node=""> In the case of </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Visakha v. State of Rajasthan</span></em><span data-dcnode-id="1960" instrument_node="">, the court has held that “</span><em data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">International Conventions and norms are significant for the purpose of interpretation of the guarantee of gender equality, right to work with human dignity in Articles 14, 15 19(1)(g) and 21 of the Constitution and the safeguards against sexual harassment implicit therein</span></em><span data-dcnode-id="1957" instrument_node="">”.</span><a data-dcnode-id="1955" href="#_ftn23" name="_ftnref23"><span data-dcnode-id="1956" instrument_node="">[23]</span></a><span data-dcnode-id="1954" instrument_node="">Some fundamental rights are guaranteed to non-citizens of India. In the case of </span><em data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">NHRC v. State of Arunachal Pradesh</span></em><span data-dcnode-id="1951" instrument_node="">, the government was asked by the court to safeguard the life, health, of Chakmas that are in the state and that their application for citizenship should be sent to the authorities concerned immediately.</span><a data-dcnode-id="1949" href="#_ftn24" name="_ftnref24"><span data-dcnode-id="1950" instrument_node="">[24]</span></a><span data-dcnode-id="1948" instrument_node=""> There are definitely a number of protections to the refugees living in India according to the Constitution of India but are hardly in practice. The cases and the provisions of the Constitution gives a hint about intention to help refugees, but due to India’s own reasons it doesn’t sign any Conventions related to it.</span></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1943"><strong data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">5.2. Laws in India and Role of Judiciary</span></strong></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">We only have the Refugee and Asylum (Protection) Bill of 2009, no definite legislation regarding Refugees is available in India but the main legislation that supports is the Foreigners Act of 1946 which on the difference of Alien and Refugee create further persecution of the Refugee. The laws related to refugees are:</span></p><span data-dcnode-id="1939" instrument_node="">
</span><ul data-dcnode-id="1908"><span data-dcnode-id="1938" instrument_node="">
</span><li data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Citizenship Act, 1955 (No.57 of 1955)</span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Extradition Act, 1962 (No. 34 of 1962)</span></li><span data-dcnode-id="1932" instrument_node="">
</span><li data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Foreigners Act, 1946 (No.31 of 1946)</span></li><span data-dcnode-id="1929" instrument_node="">
</span><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Illegal Migrant (Determination by Tribunals) Act, 1983 (No.39 of 1983)</span></li><span data-dcnode-id="1926" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">India Penal Code Act, 1860 (No.45 of 1860)</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Passport (Entry into India) Act, 1920 (No.34 of 1920)</span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Passport Act, 1967 (No.15 of 1967)</span></li><span data-dcnode-id="1917" instrument_node="">
</span><li data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Protection of Human Rights Act, 1993 (No.10 of 1994)</span></li><span data-dcnode-id="1914" instrument_node="">
</span><li data-dcnode-id="1910"><span data-dcnode-id="1913" instrument_node="">Registration of Foreigners Act, 1939 (No.16 of 1939).</span><a data-dcnode-id="1911" href="#_ftn25" name="_ftnref25"><span data-dcnode-id="1912" instrument_node="">[25]</span></a></li><span data-dcnode-id="1909" instrument_node="">
</span></ul><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1906" instrument_node="">Refugees are considered under the term ‘alien’ in India. The term appears in Constitution of India (Article 22), Section 83 of the Indian Civil Procedure Code, Section 3(2)(b) of the Indian Citizenship Act, 1955, as well as some other statutes. Most of the acts cause further complications to the refugees. The Foreigners Act, 1946 give the officials power to arrest or detain any foreigner on mere suspicion for non-compliance.</span><a data-dcnode-id="1904" href="#_ftn26" name="_ftnref26"><span data-dcnode-id="1905" instrument_node="">[26]</span></a><span data-dcnode-id="1903" instrument_node=""> The current laws in India are not sufficient in order to protect refugees and need a much greater law for the protection of refugees. According to the Principle of Non-Refoulment, no country shall deport, expel or forcefully return the refugee back to his original territory against his will or if there is a reasonable threat to his life, liberty and freedom.</span><a data-dcnode-id="1901" href="#_ftn27" name="_ftnref27"><span data-dcnode-id="1902" instrument_node="">[27]</span></a></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Judiciary plays an important role in protecting refugees, many cases gave landmark judgements regarding refugees. The judiciary has made it easy with the concepts of Social Action Litigation and Public Interest Litigation.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1895" instrument_node="">Right to basic amenities: In </span><em data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Digbijay Mote v. Union of India</span></em><span data-dcnode-id="1892" instrument_node="">, an NGO was running a school for the Sri Lankan refugees, When PIL was made when the condition to run the school was difficult, Ministry of Women and Social Welfare provided financial assistance to the school.</span><a data-dcnode-id="1890" href="#_ftn28" name="_ftnref28"><span data-dcnode-id="1891" instrument_node="">[28]</span></a><span data-dcnode-id="1889" instrument_node=""> In </span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Majid Ahmed Abdul Majid Mohd Jad Al Hak v. Union of India,</span></em><span data-dcnode-id="1886" instrument_node=""> basic amenities like food and medicines must be provided to the refugees who are in detention.</span><a data-dcnode-id="1884" href="#_ftn29" name="_ftnref29"><span data-dcnode-id="1885" instrument_node="">[29]</span></a></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1881" instrument_node="">Non-Refoulment and Right to refugee Status: In </span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Malvika Karelkar v. Union of India,</span></em><span data-dcnode-id="1878" instrument_node=""> the deportation order issued against 21 Burmese refugees were stayed by the SC and allowed them to seek refugee status under UNHCR.</span><a data-dcnode-id="1874" href="#_ftn30" name="_ftnref30"><em data-dcnode-id="1875"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">[30]</span></strong></em></a></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">5.3. UNCHR and NHRC in India</span></strong></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1864" instrument_node="">UNHCR in India is participating very actively as the number of cases regarding refugees is increasing day by day. If some refugee goes back to his country after being a refugee in India, UNHCR watches if the person is going back voluntarily. It performs the function of determination of refugee along with providing resources to them. UNHCR got involved since the issue of Tibetan refugees and the Bangladesh crisis in 1971. The Delhi office of the UNHCR works to help refugees become self-sufficient with assistance and income-generating activates with the help of NGO’s. The main role of UNHCR in India is to make sure that the refugees are not forced to go back to their country from which they have fled until the issue rests in their country.</span><a data-dcnode-id="1862" href="#_ftn31" name="_ftnref31"><span data-dcnode-id="1863" instrument_node="">[31]</span></a></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">NHRC i.e., National Human Rights Commission in 1994, gave directions to Tamil Nadu Government to provide medical help to Sri Lankan refugees. In 1995, it filed a PIL on Arunachal Pradesh Government regarding the government not supporting Chakmas, and got the decision of the court ordering the government to provide necessary help to the group. It gets involved in all the refugee issues in India and provides some or the other help required.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1851"><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">5.4. Need for Domestic Law </span></strong></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1844"><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong><span data-dcnode-id="1847" instrument_node="">India doesn’t have any separate law for the refugees, but it desperately needs one considering the recent issues and many more issues that may come in the future. Until a law is made, India continues to hold refugees depending on the country of them and political considerations. Though NHRC has submitted many reports about the need for India to have a Law based on Refugees but no response to them. A law is required so that all refugees will be handled equally and correct provisions are made for them during the crisis. The law should also include the provisions for internally displaced people as well. All existing acts that make the refugees suffer more must be replaced with this new law, the law will make the procedure for granting a refugee status easier. It will also help end the discrimination against refugees in India, and help the Refugees in all ways possible for their development.</span><a data-dcnode-id="1845" href="#_ftn32" name="_ftnref32"><span data-dcnode-id="1846" instrument_node="">[32]</span></a></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1840"><strong data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1836"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">6.1 Interplay of Human Rights Law, Refugee Law, Humanitarian Law</span></strong></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1824"><em data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Both Refugee Law and Human Rights law often co-exist and overlap each other in several fields. International Humanitarian Law and Human Rights law being the distinct branches of law overlap as well, as one deals with the protection or a person from abusive power and the other one deals with the conduct of parties to an armed conflict. In the case of protection of the person in the power of a party to the conflict both Humanitarian Law and Human Rights Law reinforce each other mutually.</span></em><a data-dcnode-id="1831" href="#_ftn33" name="_ftnref33"><span data-dcnode-id="1832" instrument_node="">[33]</span></a><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node=""> Humanitarian Law deals with the conflicts and while Refugee Law deals with the people that flee due to the conflicts. They both go hand in hand due to that.</span></em><a data-dcnode-id="1827" href="#_ftn34" name="_ftnref34"><span data-dcnode-id="1828" instrument_node="">[34]</span></a><em data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node=""> Coming to the Interplay of Human Rights Law and Refugee Law, both of them describe the Principle of Non-Refoulment which prohibit forceful repatriation. On the whole none of the Laws work independently but go hand in hand with each other. Some of the principles or ideas are borrowed or adopted from each other as well.</span></em></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1820"><strong data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1816"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">7.1 International Laws and Conventions on Refugees</span></strong></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1814" instrument_node="">There are any declarations, conventions, regarding refugees. Some of them are </span><em data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Convention relating to the Status of Refugees (1951) and Protocol (1949), Convention relating to the status of Stateless Persons (1954), UN Declaration on Territorial Asylum (1948), Universal Declaration of Human Rights (1948), Convention on the Elimination of Discrimination against Women (1979), International Convention on Civil and Political Rights, Convention on the Reduction of Statelessness (1961), Guiding Principles on Internal Displacement (1998). </span></em><span data-dcnode-id="1811" instrument_node="">Some of the Regional Refugee Laws are </span><em data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Cartagena Declaration (1984), Asian African Legal Consultative Committee Principles (1996). </span></em></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1806" instrument_node="">The UN Convention Relating to the Status of Refugee of 1951 was adopted on 28 July 1951 and entered into force on 22 April 1954. It erases previous laws and set a most comprehensive codification of the rights of refugees. The Convention deals with General Provisions, Juridical Status, Gainful Employment, Welfare, Administrative measures, Executory and Transitory powers. These chapters are very well defined and the serve the purpose of helping refugees. Article 1 gives the definition to the term ‘refugee’, Article 12, 13 dealwith Personal status and Movable and Immovable property respectfully. Article 16 deals with Access to Courts. As the 1951 Convention covers only those persons who have become refugees as a result of events occurring before 1951, Protocol relating to the Status of Refugees was entered into force on 4 October 1967, because new refugee situations have arisen after the convention and the new refugee did not fall under the Convention. So, to ensure equality of all refugees, this protocol covered that.</span><a data-dcnode-id="1804" href="#_ftn35" name="_ftnref35"><span data-dcnode-id="1805" instrument_node="">[35]</span></a></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1799"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1795"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">CONCLUSION</span></strong></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">In the whole world, though there are a number of conventions and laws governing refugees, the refugees still keep facing problems. When a country as big as India doesn’t have a Refugee Law, we can understand that many countries have the same face and are on the same boat. If UNHCR and NHRC work together, there will be much more development in the field of Refugee Law. There is definitely a need for India to set up a Law regarding Refugees, as in the future there may be many more issues due to various reasons. Whenever UNHCR tries to do something regarding refugees NGO’s should actively help them. Though protection to refugees is given under various articles of the Constitution, there needs to be a uniform Law that give equal rights to all the refugees. India continues to take the humanitarian view of the problem of the refugees. Considering the security issues due to which India is not a signatory to the 1951 Convention, it should give due consideration to the same. It should also take care that the refugee law is not mistreated and mis-utilized by persons who come to seek opportunities. Many judgements in India support the refugees. India has done a very good work regarding refugees, but needs to do much more. Many Rohingya refugees living in India are receiving support, but India is planning to deport them to their territory. In the past NHRC submitted a report for the ned for a Refuge law but didn’t receive a reply. If UNHCR and NHRC together do the same, there may be an answer. The Refugee Convention and its Protocol of 1951 and 1967 are the Conventions that received global response with many countries signing the convention. They consider most of the reasons of refugees and tell us the rights and other provisions that they should be given. India on the whole, needs a refugee law for governing refugees entering India.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1788"><strong data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1787" instrument_node="">
