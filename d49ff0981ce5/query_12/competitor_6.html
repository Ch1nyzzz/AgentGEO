</path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="942"><use class="ytp-svg-shadow" data-dcnode-id="944" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="945" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="943" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="938"><use class="ytp-svg-shadow" data-dcnode-id="940" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="941" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="939" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=tgFMOnNIHhg" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Whether you are a decision maker, a judge, a lawyer, a human rights activist, you will have to answer these questions. The answers are complex. They require precise theoretical and practical knowledge of national, regional and international law.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The 1951 Geneva Convention on Refugees will enable you to master these questions. This Convention remains the cornerstone of international refugee protection. It is at the heart of this online course. You will analyze in detail the principle of non-refoulement and the definition of a refugee.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">This definition will allow you to identify, like a fingerprint, the people who, legally, should be recognizedas beneficiaries of refugee status and international protection. Using a conceptual tool, the three-scale theory, you will analyze in a rigorous and structured manner each distinct element of the refugee definition (persecution, risk, proof) as well as, in a comprehensive approach, the definition as a whole.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">By confronting theoretical analysis with practical situations, you will see that, if correctly interpreted, the Geneva Convention remains effective and still allows to this day the protection of many fugitives or refugees ( Flüchtling, réfugiés ). You will also follow the refugee’s journey—like the maze that the image above also represents—to measure the need for a solid knowledge of the law and the procedures.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Beyond law, you will understand the value of an interdisciplinary approach, in particular when measuring the credibility of an asylum seeker’s narrative. You will examine the importance of regional, subsidiary or complementary protection. Finally, you will look at future challenges, such as the issue of climate refugees.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">In this course, Asylum and Refugee Law, you will learn whether or not migrants can be returned to another country, whether or not they should be included in or excluded from the refugee definition, and whether or not to challenge the decision on someone’s refugee status. You will do all of this by developing a rigorous legal reasoning. By the end of this course, you will be able to</span></p><span data-dcnode-id="901" instrument_node="">
</span><ul data-dcnode-id="884"><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">formulate rigorous legal reasoning on the right to asylum and international protection of refugees.</span></li><span data-dcnode-id="897" instrument_node="">
</span><li data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">define and apply the concepts of asylum and refugee status.</span></li><span data-dcnode-id="894" instrument_node="">
</span><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">analyze case law decisions of international, regional and national courts and tribunals relating to asylum and refugee law.</span></li><span data-dcnode-id="891" instrument_node="">
</span><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">criticize or justify the reasoning of an asylum authority (administrative or judicial) in order to develop arguments in a decision or appeal.</span></li><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">question and imagine the future challenges in the field of asylum.</span></li><span data-dcnode-id="885" instrument_node="">
</span></ul><span data-dcnode-id="883" instrument_node="">
</span><div class="text-center" data-dcnode-id="880"><button class="take-course" data-dcnode-id="881" id="take-course"><span data-dcnode-id="882" instrument_node="">Take the course</span></button></div><span data-dcnode-id="879" instrument_node="">
