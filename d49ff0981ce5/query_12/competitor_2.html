</span><p data-dcnode-id="965" style="text-align: justify;"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">International Law</span></strong><span data-dcnode-id="966" instrument_node=""> is composed of the rules, principles and laws of general application that deal with the conduct of nation-states and international organizations among themselves as well as the relationships between nation-states and international organizations with persons, whether natural or juridical.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="954" style="text-align: justify;"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Legal Bites’&nbsp;</span></strong><span data-dcnode-id="961" instrument_node="">study material on international law is divided into </span><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">three modules </span></strong><span data-dcnode-id="958" instrument_node="">consisting of detailed and analytical articles on the basic principles of international law and several case studies. Additionally, a </span><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">miscellaneous collection of well-researched and informative articles</span></strong><span data-dcnode-id="955" instrument_node=""> has been provided towards the end of this course. It covers a variety of topics like international maritime laws, citizenship and nationality rules, dispute resolution laws, war treaties, the International Court of Justice, etc.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="952" instrument_node="">The completion of this course will make readers well versed in international law and help them prepare for national and international </span><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">moot court competitions</span></strong><span data-dcnode-id="949" instrument_node=""> as well as university-level exams.</span></p><span data-dcnode-id="947" instrument_node="">
