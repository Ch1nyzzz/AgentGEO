</span><span class="lwptoc_item_label" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">INDIAN ASYLUM SEEKER’S LAW</span></span><span data-dcnode-id="809" instrument_node="">

</span><span class="lwptoc_item_number" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">9)</span></span><span data-dcnode-id="788" instrument_node="">

</span></div></div><h2 data-dcnode-id="773"><span data-dcnode-id="774" id="INTRODUCTION"><u data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">INTRODUCTION</span></u></span></h2><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The term asylum generally means, the protection granted to a foreign citizen against his own country by the state. The person who is granted the asylum has no legal rights to demand it, and there is no obligation on the sheltering state to grant it. The term first derived from a Greek word named as asylon and it means freedom from seizure. There is no specific definition provided for the asylum seekers but it could be said that the asylum seekers are those who fled from their country where they were in fear of warship, conflict persecution and fear for their protection. They may be a part of a country to seek protection temporarily or permanently.</span></p><div class="code-block code-block-2" data-dcnode-id="755" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="767" instrument_node="">
</span><span data-dcnode-id="765" instrument_node="">
</span><span data-dcnode-id="763" instrument_node="">
</span><span data-dcnode-id="761" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="outstream" data-dcnode-id="760"></div><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">The person who is seeking asylum is named the asylee. The asylum seeker has to apply for asylum in a particular country in which they want to take asylum. Asylee lives in a detention camp till the application is pending. After the application is confirmed they get the status of the refugee and </span><a data-dcnode-id="751" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="752" instrument_node="">[1]</span></a><span data-dcnode-id="750" instrument_node="">the rights that come along with it. The asylum systems are in place to determine whether the person qualifies for international protection or not. However, during the mass movements of refugees, it is difficult to determine individuals qualification to become a refugee so these groups are also called as the prima facie refugees.</span></p><span data-dcnode-id="748" instrument_node="">
</span><h2 data-dcnode-id="744"><span data-dcnode-id="745" id="DEFINITIONS"><span data-dcnode-id="746" style="text-decoration: underline;"><span data-dcnode-id="747" instrument_node="">DEFINITIONS</span></span></span></h2><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="739"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">PERSECUTION</span></strong><span data-dcnode-id="740" instrument_node=""> – The term persecution means an unfair or abusive treatment towards a person or group of people and forcing them to persecute because of their race, religion, ethnicity, sexual orientation, gender, etc.</span></p><div class="code-block code-block-6" data-dcnode-id="730" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="738" instrument_node="">
</span><span data-dcnode-id="736" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="735" style="width: 300px; height: 250px"></div><span data-dcnode-id="732" instrument_node="">
</span></div><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="725"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">REFUGEES</span></strong><span data-dcnode-id="726" instrument_node=""> – A refugee is a person who flees from his country to seek protection or who is unable to return to their home country because of the fear of force and persecution and flees and takes the protection in other countries.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="720"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">EXTRADITION</span></strong><span data-dcnode-id="721" instrument_node=""> – The term extradition means when one jurisdiction delivers a person who is accused or convicted of a crime against another jurisdiction in the law of the other country.</span></p><span data-dcnode-id="719" instrument_node="">
</span><h2 data-dcnode-id="715"><span data-dcnode-id="716" id="Difference_Between_Refugees_And_Asylum_Seekers"><span data-dcnode-id="717" style="text-decoration: underline;"><span data-dcnode-id="718" instrument_node="">Difference Between Refugees And Asylum Seekers</span></span></span></h2><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">An asylum seeker is a person who seeks protection against their country in the other country. Who has not been recognised as a refugee by the other country? Every refugee is an asylum seeker but not every asylum seeker is a refugee.</span></p><div class="code-block code-block-6" data-dcnode-id="703" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="711" instrument_node="">
</span><span data-dcnode-id="709" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="708" style="width: 300px; height: 250px"></div><span data-dcnode-id="705" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span><h2 data-dcnode-id="698"><span data-dcnode-id="699" id="Difference_Between_Migrant_And_Asylum_Seekers"><span data-dcnode-id="700" style="text-decoration: underline;"><span data-dcnode-id="701" instrument_node="">Difference Between Migrant And Asylum Seekers</span></span></span></h2><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The term migrant usually means that a person or a group of people who have migrated to other country due to some common reasons like lack of employment and jobs or due to lack of citizenship attachment to their host country. The asylum seekers seeks the asylum in other country to get the protection from the persecution in its host country.</span></p><span data-dcnode-id="694" instrument_node="">
</span><h2 data-dcnode-id="690"><span data-dcnode-id="691" id="Categories_Of_The_Asylum_Seekers"><span data-dcnode-id="692" style="text-decoration: underline;"><span data-dcnode-id="693" instrument_node="">Categories Of The Asylum Seekers</span></span></span></h2><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="688" instrument_node="">There are basically three categories of asylum seekers, namely, territorial, extraterritorial, and neutral. The territorial asylum is that in which the asylum is granted within the territorial bounds of the state who is offering the asylum </span><a data-dcnode-id="686" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="687" instrument_node="">[2]</span></a><span data-dcnode-id="685" instrument_node="">and is an exception to the practice of extradition.&nbsp; It is granted primarily for the person who is accused of political offences, like treason and desertion. Extraterritorial asylum is granted to a person outside the territory of the state.</span><a data-dcnode-id="683" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="684" instrument_node="">[3]</span></a><span data-dcnode-id="682" instrument_node="">It usually describes to those cases in which a State refuses to surrender a person demanding who is not upon its own physical territory but is upon one of its public ships lying in foreign territorial borders or upon its diplomatic premises within foreign territories.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The extraterritorial asylum seekers also known as the diplomatic asylum seekers, are those to whom the asylum is granted in embassies, legations and etc. the neutral asylum seekers are those troops of belligerent states, to whom the asylum is granted by the state who is acting neutral in the war and offers the asylum within its territory.</span></p><div class="code-block code-block-6" data-dcnode-id="669" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="677" instrument_node="">
</span><span data-dcnode-id="675" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="674" style="width: 300px; height: 250px"></div><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="664"><span data-dcnode-id="665" id="States_Right_To_Grant_The_Asylum"><span data-dcnode-id="666" style="text-decoration: underline;"><span data-dcnode-id="667" instrument_node="">State’s Right To Grant The Asylum</span></span></span></h2><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">According to article 1 of the draft convention on territorial asylum which is adopted by the general assembly in the year 1974, it states that the state has a sovereign right on granting asylum. The state has the freedom on granting territorial asylum to a person who was found within its territory.</span></p><span data-dcnode-id="660" instrument_node="">
</span><h3 data-dcnode-id="657"><span data-dcnode-id="658" id="When_An_Asylum_Cannot_Be_Granted"><span data-dcnode-id="659" instrument_node="">When An Asylum Cannot Be Granted?</span></span></h3><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The person who has committed an offence against peace, war, humanity or was convicted for or engaged in an international crime or is involved against the principles of the united nations cannot be granted asylum.</span></p><span data-dcnode-id="653" instrument_node="">
</span><h3 data-dcnode-id="650"><span data-dcnode-id="651" id="Benefits_Of_Granting_The_Asylum"><span data-dcnode-id="652" instrument_node="">Benefits Of Granting The Asylum</span></span></h3><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">It saves the person from being persecuted and from the local trial or jurisdiction when the person is cannot get a fair trial. It saves the humanitarian factor and tries to provide protection and asylum to those who are forced to persecution by their home country.</span></p><div class="code-block code-block-6" data-dcnode-id="638" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="646" instrument_node="">
</span><span data-dcnode-id="644" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="643" style="width: 300px; height: 250px"></div><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="633"><span data-dcnode-id="634" id="Laws_For_The_Asylum_Seekers"><span data-dcnode-id="635" style="text-decoration: underline;"><span data-dcnode-id="636" instrument_node="">Laws For The Asylum Seekers</span></span></span></h2><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">1. The Universal Declaration Of Human Rights, in article 14 of the UDHR, provides a recognition to the right to enjoy and seek asylum in other countries from persecution. The UDHR doesn’t provide explicit right to asylum to the asylum seekers.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">2. The Controlling Relating To The Status Of Refugees, 1951, And Its The Optional Protocol Relating To The Status Of The Refugees, 1967, states the definition of a refugee and the principle of non-refoulment. It states the rights provided to those who are granted refugee status. But the definition under the 1951 act is a dominant definition and doesn’t define and state that the asylum proceeding and refugee status is to be determined by the countries. This has lead to the different laws established by the states according to their resources and national security to provide the modern regime for the refugee laws.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">3. The Un Convention Against Torture- Article 3 of the act provides and states that the state shall not expel and force the refouler to another state where the person is likely to get tortured and is subjected to persecution.</span></p><div class="code-block code-block-6" data-dcnode-id="615" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="623" instrument_node="">
</span><span data-dcnode-id="621" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="620" style="width: 300px; height: 250px"></div><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><h3 data-dcnode-id="611"><span data-dcnode-id="612" id="INDIAN_ASYLUM_SEEKERS_LAW"><span data-dcnode-id="613" instrument_node="">INDIAN ASYLUM SEEKER’S LAW</span></span></h3><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">India is not a party to the refugee convention1951 or its protocol 1967. India has no particular laws regarding asylum seekers. India grants asylum to a lot of people from Afghanistan and Myanmar, though it has no legal framework for the refugees law.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">In the absence of the legal framework for the asylum seekers and the refugees, the UNHCR, based in New Delhi, determines the refugee status from neighbouring countries like Afghanistan and Myanmar.</span></p><span data-dcnode-id="604" instrument_node="">
</span><h2 data-dcnode-id="600"><span data-dcnode-id="601" id="CASES"><span data-dcnode-id="602" style="text-decoration: underline;"><span data-dcnode-id="603" instrument_node="">CASES</span></span></span></h2><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="598" instrument_node="">In the case of </span><em data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Colombia vs. Peru-the political leader of the Peru</span></strong></em><span data-dcnode-id="594" instrument_node=""> was accused of the crime of instigating a military rebellion. He was granted asylum at limo by the Colombian embassy and was not allowed to leave the country. The matter between Peru and Colombia was then taken to the international court of justice on the question of the right to diplomatic asylum. The court held that the diplomatic asylum is suppression of territorial sovereignty and should not be recognised unless the legal basis is established. The state granting the diplomatic asylum must prove its right to grant the diplomatic asylum and the other territorial state should respect it</span><a data-dcnode-id="591" href="#_ftn4" name="_ftnref4"><sup data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">[4]</span></sup></a><span data-dcnode-id="590" instrument_node="">.</span></p><div class="code-block code-block-6" data-dcnode-id="580" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="588" instrument_node="">
</span><span data-dcnode-id="586" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="585" style="width: 300px; height: 250px"></div><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="578" instrument_node="">In the case of </span><em data-dcnode-id="575"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Assange vs. The Swedish prosecution authority </span></strong></em><span data-dcnode-id="574" instrument_node="">– The Australian publisher is accused of rape and molestation by the Sweden government. The Sweden government demanded for extradition of the accused and the supreme court of Sweden ordered for the extradition. The accused was granted asylum by England in its embassy. The reason was it would breach the human rights of the accused if sent to Sweden. Sweden then dropped the charges against the accused. The Un also declared that the accused was detained arbitrarily. He was also sentenced for breaching the bail conditions and is also an accused against us for releasing the confidential documents of the united states of America, the USA also trying to extradite the accused to their country</span><a data-dcnode-id="571" href="#_ftn5" name="_ftnref5"><sup data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">[5]</span></sup></a><span data-dcnode-id="570" instrument_node="">.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="567" instrument_node="">In the case of </span><em data-dcnode-id="564"><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">A and another vs. Minister for immigration and ethnic affairs</span></strong></em><span data-dcnode-id="563" instrument_node="">–</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="560" instrument_node="">The Chinese people asked for asylum from Australia. The reason was that they are expecting their second child and it could lead them to force and persecution in China. China has adopted the one-child policy and they would be subjected to sterilization. The court of Australia did not recognise sterilisation as persecution but congress has recognised that the forced sterilization is persecution and amounts to persecution</span><a data-dcnode-id="557" href="#_ftn6" name="_ftnref6"><sup data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">[6]</span></sup></a><span data-dcnode-id="556" instrument_node="">.</span></p><div class="code-block code-block-6" data-dcnode-id="546" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="554" instrument_node="">
</span><span data-dcnode-id="552" instrument_node="">
</span><div class="adsbyvli" data-ad-slot="vi_1872479435" data-dcnode-id="551" style="width: 300px; height: 250px"></div><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="541"><span data-dcnode-id="542" id="CONCLUSION"><span data-dcnode-id="543" style="text-decoration: underline;"><span data-dcnode-id="544" instrument_node="">CONCLUSION</span></span></span></h2><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Asylum is a very important part of international law and is crucial topic when it comes to humanity. The rights of asylum seekers have become more important. The cases worldwide are stressful and leading inhuman behaviour. The laws for the refugees are established under International law but the asylum seeker’s law is not explicitly described under international law. There is a need to remove the concept of obscurity in the diplomatic asylum and the international human rights organisation should provide the asylum laws with prudent concepts and a stringent law is needed to implement the asylum protection.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><a data-dcnode-id="534" href="#_ftnref1" name="_ftn1"><sup data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">[1]</span></sup></a><span data-dcnode-id="533" instrument_node=""> Diganth Raj Sehgal, Asylum – Territorial and Extra-Territorial,https://blog.ipleaders.in/asylum-territorial-extra-territorial/</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="523"><a data-dcnode-id="528" href="#_ftnref2" name="_ftn2"><sup data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">[2]</span></sup></a><span data-dcnode-id="527" instrument_node="">George J. Andreopoulos, Asylum, </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/" rel="nofollow" target="_blank"><span data-dcnode-id="526" instrument_node="">https://www.britannica.com</span></a><span data-dcnode-id="524" instrument_node="">/topic/asylum</span></p><div class="code-block code-block-6" data-dcnode-id="514" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="522" instrument_node="">
</span><span data-dcnode-id="520" instrument_node="">

</span><p data-dcnode-id="508"><a data-dcnode-id="510" href="#_ftnref3" name="_ftn3"><sup data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">[3]</span></sup></a><span data-dcnode-id="509" instrument_node="">&nbsp; srd law notes,https://www.srdlawnotes.com/2016/10/types-kinds-of-asylum in international law.html</span></p><span data-dcnode-id="507" instrument_node="">
