</span><div class="image-lg-area" data-dcnode-id="632"><img alt="" class="medium-thumb" data-dcnode-id="633" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/07/girl-1034421_1920-540x360.jpg&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/07/girl-1034421_1920-540x360.jpg 540w, https://publiclawproject.org.uk/content/uploads/2018/07/girl-1034421_1920-370x247.jpg 370w, https://publiclawproject.org.uk/content/uploads/2018/07/girl-1034421_1920-770x514.jpg 770w" width="540"></div><span data-dcnode-id="631" instrument_node="">

</span><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Access to education for a disabled teenager</span></h3><span data-dcnode-id="620" instrument_node="">
</span><div class="subtitle" data-dcnode-id="619"></div><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><div class="row collapse" data-dcnode-id="600" id="collapseText0"><span data-dcnode-id="613" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="602"><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">PLP represented Francesca, a 15 year old with a rare genetic condition, in her challenge to Leeds City Council’s cuts to funding for post-16 education. </span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Leeds had announced that post-16 education for students with special educational needs would be cut to three days’ provision per week. It blamed the decision on cuts imposed by the Department of Education. PLP’s client challenged the cuts on the basis that local authorities are obliged by the Children and Families Act 2014 to provide the education described in students’ Education, Health and Care Plan, and cannot rely on lack of funding to provide less than is required. After issuing a judicial review, Leeds accepted that it had a duty to fund a five day programme. Our client’s mother said “A reduction in Francesca’s education, at a critical stage of her life would have limited her ability to reach her potential, isolated her from society and her peers, and increased her frustration. Given the complexity of Francesca’s needs, the provision required in her education, health and care plan would not have been met in those three days. I urge other parents to challenge these discriminatory cuts.”</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">PLP initially worked pro bono because legal aid was not available for the pre-action work. Because of this, Francesca’s mother had been turned away from all the law firms that she had approached. </span></p><span data-dcnode-id="603" instrument_node="">
</span></div><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span><div class="container case-study-list panel" data-dcnode-id="555"><span data-dcnode-id="596" instrument_node="">
</span><div class="row collapsed panel-header" data-dcnode-id="575" data-parent="#cs-accordion" data-target="#collapseText1" data-toggle="collapse"><span data-dcnode-id="595" instrument_node="">
</span><div class="col-md-4" data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">
</span><div class="image-lg-area" data-dcnode-id="592"><img alt="" class="medium-thumb" data-dcnode-id="593" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics-540x360.png&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics-540x360.png 540w, https://publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics-300x200.png 300w, https://publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics-370x247.png 370w, https://publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics-770x514.png 770w, https://publiclawproject.org.uk/content/uploads/2018/04/ECF-clinics.png 1000w" width="540"></div><span data-dcnode-id="591" instrument_node="">

</span><h3 data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Research on Exceptional Case Funding and university law clinics</span></h3><span data-dcnode-id="580" instrument_node="">
</span><div class="subtitle" data-dcnode-id="579"></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span><div class="row collapse" data-dcnode-id="557" id="collapseText1"><span data-dcnode-id="573" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="559"><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">PLP worked in partnership with the University of Exeter to set up an Exceptional Case Funding (ECF) clinic as part of the University of Exeter’s Community Law Clinic. The research assessed the feasibility of extending access to ECF through university law clinics. This included taking into account the practical experiences of setting up the clinic, and the perspectives of other institutions running similar schemes or considering setting up a similar project.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">The findings demonstrate the practical issues encountered by universities engaging in ECF work, and provide recommendations for universities looking to expand their pro bono work by training students to assist members of the public with ECF applications. At a practical level, the research assisted the University to set up an ECF clinic in the academic year 2017/18, which continued to run in 2018/19.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">PLP has published research relating to this project, </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/resources/exceptional-case-funding-clinics/"><span data-dcnode-id="564" instrument_node="">Exceptional Case Funding Clinics</span></a><span data-dcnode-id="562" instrument_node="">.</span></p><span data-dcnode-id="560" instrument_node="">
</span></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">
</span><div class="container case-study-list panel" data-dcnode-id="517"><span data-dcnode-id="553" instrument_node="">
</span><div class="row collapsed panel-header" data-dcnode-id="531" data-parent="#cs-accordion" data-target="#collapseText2" data-toggle="collapse"><span data-dcnode-id="552" instrument_node="">
</span><div class="col-md-4" data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">
</span><div class="image-lg-area" data-dcnode-id="549"><img alt="" class="medium-thumb" data-dcnode-id="550" height="185" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/01/DWP.jpg&amp;raw" width="247"></div><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node="">
</span><div class="col-md-8" data-dcnode-id="533"><span data-dcnode-id="545" instrument_node="">
</span><div class="category case-study" data-dcnode-id="541"><span class="icon" data-dcnode-id="544"></span><span class="category-title" data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Case Study</span></span></div><span data-dcnode-id="540" instrument_node="">
</span><h3 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Fairer access to benefits</span></h3><span data-dcnode-id="537" instrument_node="">
</span><div class="subtitle" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Enabling claimants to challenge unfair commitments demanded by the DWP</span></div><span data-dcnode-id="534" instrument_node="">
</span></div><span data-dcnode-id="532" instrument_node="">
</span></div><span data-dcnode-id="530" instrument_node="">
</span><div class="row collapse" data-dcnode-id="519" id="collapseText2"><span data-dcnode-id="529" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="521"><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">In order to claim benefits, people are required to make an agreement with the Department for Work and Pensions about what they will do to look for work and improve their chance of getting work. These agreements can often contain unreasonable or unfair requirements failing to take account of physical and mental health problems, caring responsibilities and other factors.&nbsp;&nbsp; Failure to live up to these unfair requirements then leads to claimants being sanctioned as they are effectively being set up to fail.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Claimants often don’t seek advice until after being sanctioned, and don’t realise they could have requested reasonable adjustments to their agreements, or not agreed to unfair conditions in the first place. &nbsp;By delivering training to frontline mental health and homelessness workers about the changes that can be requested, PLP is ensuring client’s fairer access to benefits and enabling them to challenge decisions when things go wrong.</span></p><span data-dcnode-id="522" instrument_node="">
</span></div><span data-dcnode-id="520" instrument_node="">
</span></div><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span><div class="container case-study-list panel" data-dcnode-id="472"><span data-dcnode-id="515" instrument_node="">
</span><div class="row collapsed panel-header" data-dcnode-id="493" data-parent="#cs-accordion" data-target="#collapseText3" data-toggle="collapse"><span data-dcnode-id="514" instrument_node="">
</span><div class="col-md-4" data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">
</span><div class="image-lg-area" data-dcnode-id="511"><img alt="Image of jungle camp France" class="medium-thumb" data-dcnode-id="512" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/06/90838765_mediaitem90838757-540x360.jpg&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/06/90838765_mediaitem90838757-540x360.jpg 540w, https://publiclawproject.org.uk/content/uploads/2018/06/90838765_mediaitem90838757-370x247.jpg 370w" width="540"></div><span data-dcnode-id="510" instrument_node="">
</span></div><span data-dcnode-id="508" instrument_node="">
</span><div class="col-md-8" data-dcnode-id="495"><span data-dcnode-id="507" instrument_node="">
</span><div class="category case-study" data-dcnode-id="503"><span class="icon" data-dcnode-id="506"></span><span class="category-title" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Case Study</span></span></div><span data-dcnode-id="502" instrument_node="">
</span><h3 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Using information rights to expose flawed policy</span></h3><span data-dcnode-id="499" instrument_node="">
</span><div class="subtitle" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Home Office excluded Eritrean children in France  being relocated to the UK because of flawed  guidance</span></div><span data-dcnode-id="496" instrument_node="">
</span></div><span data-dcnode-id="494" instrument_node="">
</span></div><span data-dcnode-id="492" instrument_node="">
</span><div class="row collapse" data-dcnode-id="474" id="collapseText3"><span data-dcnode-id="491" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="476"><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="489" instrument_node="">Under the Freedom of Information Act, PLP, acting on behalf of a concerned individual, obtained information from the Home Office revealing that a visit by its officials to Eritrea in December 2014 was made in order to discuss reducing Eritrean migration to the UK. At the time, the grant rate for Eritrean asylum claims was over 85%.&nbsp;The disclosed documents showed &nbsp;the Home Office doubted the reliability of Eritrean government officials, and it could not significantly reduce the asylum grant rate. &nbsp;Despite this, in March 2015 the Home Office changed its policy position, which led to a reduction in the number of Eritreans it recognised as refugees to 48% by June 2016. In a majority of cases where the Eritreans lodged an appeal, the independent judiciary found the Home Office had made the wrong decision. However, the drop in the initial grant rate between July 2015 and June 2016 has had the effect of excluding many Eritrean unaccompanied children from being admitted to the UK under the ‘Dubs’ amendment policy. &nbsp;This is an example of PLP using information rights to expose poor policy making by the UK Government with the effect of denying vulnerable people assistance.</span><br data-dcnode-id="488"><span data-dcnode-id="487" instrument_node="">
Alison Pickup, PLP’s Legal Director, said: “</span><em data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The fact that the Home Office has excluded many Eritrean children in France from the possibility of being relocated to the UK under the ‘Dubs’ amendment on the basis of a statistic which is a result of its own flawed country guidance is a tragedy</span></em><span data-dcnode-id="484" instrument_node="">.”</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="481" instrument_node="">This work led to a front page article in the Guardian, here : </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2017/jan/22/home-office-eritrea-guidance-softened-to-reduce-asylum-seeker-numbers"><span data-dcnode-id="480" instrument_node="">https://www.theguardian.com/uk-news/2017/jan/22/home-office-eritrea-guidance-softened-to-reduce-asylum-seeker-numbers</span></a></p><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
</span></div><span data-dcnode-id="471" instrument_node="">
</span><div class="container case-study-list panel" data-dcnode-id="431"><span data-dcnode-id="470" instrument_node="">
</span><div class="row collapsed panel-header" data-dcnode-id="448" data-parent="#cs-accordion" data-target="#collapseText4" data-toggle="collapse"><span data-dcnode-id="469" instrument_node="">
</span><div class="col-md-4" data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">
</span><div class="image-lg-area" data-dcnode-id="466"><img alt="" class="medium-thumb" data-dcnode-id="467" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/04/child_alone_hero-540x360.jpg&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/04/child_alone_hero-540x360.jpg 540w, https://publiclawproject.org.uk/content/uploads/2018/04/child_alone_hero-370x247.jpg 370w, https://publiclawproject.org.uk/content/uploads/2018/04/child_alone_hero-770x514.jpg 770w" width="540"></div><span data-dcnode-id="465" instrument_node="">
</span></div><span data-dcnode-id="463" instrument_node="">

</span><div class="category case-study" data-dcnode-id="458"><span class="icon" data-dcnode-id="461"></span><span class="category-title" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Case Study</span></span></div><span data-dcnode-id="457" instrument_node="">
</span><h3 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Upholding the Rule of Law to protect the rights of vulnerable children</span></h3><span data-dcnode-id="454" instrument_node="">
</span><div class="subtitle" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Promoting and preserving the Rule of Law</span></div><span data-dcnode-id="451" instrument_node="">
</span></div><span data-dcnode-id="449" instrument_node="">
</span></div><span data-dcnode-id="447" instrument_node="">
</span><div class="row collapse" data-dcnode-id="433" id="collapseText4"><span data-dcnode-id="446" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="435"><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="440"><strong data-dcnode-id="441"><span data-dcnode-id="444" instrument_node="">Using specialist legal advice to inform policy</span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
</span></strong></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">PLP’s Legal Director advised the children’s charity Article 39 about the lawfulness of the controversial “innovation clauses” in the Children and Social Work Bill 2016. The clauses would have allowed the Government to exempt local authorities from their statutory duties to vulnerable children in order to “test new ways of working”.&nbsp; Article 39 used PLP’s advice to inform its successful advocacy and campaigning around the clauses which were defeated in the House of Lords and dropped by the Government when the Bill returned to the Commons.</span></p><span data-dcnode-id="436" instrument_node="">
</span></div><span data-dcnode-id="434" instrument_node="">

</span><h3 data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Access to legal aid – Mr Miah’s story</span></h3><span data-dcnode-id="413" instrument_node="">
</span><div class="subtitle" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Improving access to justice</span></div><span data-dcnode-id="410" instrument_node="">
</span></div><span data-dcnode-id="408" instrument_node="">
</span></div><span data-dcnode-id="406" instrument_node="">
</span><div class="row collapse" data-dcnode-id="390" id="collapseText5"><span data-dcnode-id="405" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="392"><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="401"><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">“I came to PLP for help getting legal aid exceptional funding as I could not find anyone else to help me. I lost my job and after that I was not able to make any progress in my case because I had no legal aid and no way of paying for a lawyer. Without PLP’s help I would have found it very difficult to have the same contact with my children as an able-bodied person. I am disabled and I talk through a voice box which people often do not understand. With the help of my lawyer, I was able to get a fair hearing from the court and now have more contact with my children.”</span></em></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="397"><strong data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">-Mr Miah</span></strong></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">&nbsp;</span></p><span data-dcnode-id="393" instrument_node="">
</span></div><span data-dcnode-id="391" instrument_node="">
</span></div><span data-dcnode-id="389" instrument_node="">

</span><div class="container case-study-list panel" data-dcnode-id="347"><span data-dcnode-id="386" instrument_node="">

</span><div class="image-lg-area" data-dcnode-id="382"><img alt="" class="medium-thumb" data-dcnode-id="383" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/01/Women_P1110067-CMYK-540x360.jpg&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/01/Women_P1110067-CMYK-540x360.jpg 540w, https://publiclawproject.org.uk/content/uploads/2018/01/Women_P1110067-CMYK-370x247.jpg 370w" width="540"></div><span data-dcnode-id="381" instrument_node="">

</span><h3 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Representing Rights of Women</span></h3><span data-dcnode-id="370" instrument_node="">
</span><div class="subtitle" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Ensuring Fair Systems</span></div><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span></div><span data-dcnode-id="363" instrument_node="">
</span><div class="row collapse" data-dcnode-id="349" id="collapseText6"><span data-dcnode-id="362" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="351"><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">Stricter evidence requirements were preventing many survivors of domestic abuse from getting legal aid. PLP represented the charity&nbsp;</span><em data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Rights of Women</span></em><span data-dcnode-id="357" instrument_node="">&nbsp;in a challenge to the evidence requirements. Following the Court of Appeal’s judgment, the Government introduced new regulations which allow applications to rely on a wider range of evidence of domestic abuse.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">The impact of the case is illustrated by the Legal Aid Agency’s own statistics: subsequent to the case in April-June 2016 over 50% more applications for legal aid in family cases were received from survivors of domestic violence, and there was a 35% increase in the number of applications granted.</span></p><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span></div><span data-dcnode-id="348" instrument_node="">
</span></div><span data-dcnode-id="346" instrument_node="">
</span><div class="container case-study-list panel" data-dcnode-id="310"><span data-dcnode-id="345" instrument_node="">
</span><div class="row collapsed panel-header" data-dcnode-id="324" data-parent="#cs-accordion" data-target="#collapseText7" data-toggle="collapse"><span data-dcnode-id="344" instrument_node="">
</span><div class="col-md-4" data-dcnode-id="339"><span data-dcnode-id="343" instrument_node="">
</span><div class="image-lg-area" data-dcnode-id="341"><img alt="" class="medium-thumb" data-dcnode-id="342" height="360" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publiclawproject.org.uk/content/uploads/2018/01/welfare-hero-image-540x360.jpg&amp;raw" srcset="https://publiclawproject.org.uk/content/uploads/2018/01/welfare-hero-image-540x360.jpg 540w, https://publiclawproject.org.uk/content/uploads/2018/01/welfare-hero-image-370x247.jpg 370w" width="540"></div><span data-dcnode-id="340" instrument_node="">

</span><h3 data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Personal Independence Payments (PIP) and disability rights</span></h3><span data-dcnode-id="329" instrument_node="">
</span><div class="subtitle" data-dcnode-id="328"></div><span data-dcnode-id="327" instrument_node="">
</span></div><span data-dcnode-id="325" instrument_node="">
</span></div><span data-dcnode-id="323" instrument_node="">
</span><div class="row collapse" data-dcnode-id="312" id="collapseText7"><span data-dcnode-id="322" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="314"><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">PLP represented RF, who brought a challenge to part of the Government’s 2017 Personal Independence Payment (PIP) Regulations. The Regulations explicitly excluded applicants receiving higher levels of benefit if they could not undertake certain activities because of psychological distress.&nbsp;&nbsp; The judge quashed the&nbsp; Regulations because they discriminate against those with mental health problems in breach of&nbsp; the Human Rights Act. Because they were discriminatory, the judge also found that the Secretary of State did not have lawful power to make the Regulations (i.e. they were “ultra vires”), and that he should have consulted before making them, because they went against the very purpose of the PIP.&nbsp; RF’s claim was supported by The National Autistic Society, Inclusion London, Revolving Doors and Disability Rights UK.&nbsp; All of those organisations gave statements to the court that the Regulations were unfair and that the intention to treat those with psychological distress differently had not been made clear in the early PIP consultation stages. The claim was also supported by two interveners: Mind and the Equality and Human Rights Commission (EHRC). The EHRC made written submissions to the Court on the ongoing and persistent breaches by the UK Government of its obligations under UN Convention on Rights of Persons with Disabilities arising from its austerity measures. The Judge found that this inconsistency with the UN Convention supported his finding that the measure had no objective justification.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">In his judgment Mr Justice Mostyn noted (para 59) that “The wish to save nearly £1 billion a year at the expense of those with mental health impairments is not a reasonable foundation for passing this measure.”</span></p><span data-dcnode-id="315" instrument_node="">
</span></div><span data-dcnode-id="313" instrument_node="">
</span></div><span data-dcnode-id="311" instrument_node="">
</span></div><span data-dcnode-id="309" instrument_node="">

</span><h3 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Mrs Tirkey’s story</span></h3><span data-dcnode-id="292" instrument_node="">
</span><div class="subtitle" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Access to legal aid preventing wider injustices</span></div><span data-dcnode-id="289" instrument_node="">
</span></div><span data-dcnode-id="287" instrument_node="">
</span></div><span data-dcnode-id="285" instrument_node="">
</span><div class="row collapse" data-dcnode-id="274" id="collapseText8"><span data-dcnode-id="284" instrument_node="">
</span><div class="col-md-8 col-md-offset-4" data-dcnode-id="276"><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">In a ground breaking judgment the Employment Tribunal upheld numerous claims, including those for unpaid wages and religious and race discrimination, brought by Mrs Tirkey, anIndian woman kept in domestic servitude by&nbsp;her employers for 4 ½ years.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The Legal Aid Agency refused to fund Mrs Tirkey’s representation for 17 months, suggesting that the case was not of “sufficient importance or seriousness” and that it was “only a claim for money”. PLP helped Ms Tirkey to apply for legal aid Exceptional Case Funding, which was only successful after PLP began legal action on her behalf. The case will affect future claims by victims of discrimination and servitude and would not have been possible were it not for PLP’s Legal Aid Support Project.</span></p><span data-dcnode-id="277" instrument_node="">
