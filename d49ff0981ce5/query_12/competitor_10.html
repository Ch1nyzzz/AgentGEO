</span><h1 class="sll-main-title" data-dcnode-id="710"><span class="fa fa-life-ring" data-dcnode-id="712"></span><span data-dcnode-id="711" instrument_node=""> Refugees &amp; Asylum Seekers</span></h1><span data-dcnode-id="709" instrument_node="">

</span><div class="s-lib-box s-lib-box-std" data-dcnode-id="672" id="s-lg-box-22657822"><span data-dcnode-id="694" instrument_node="">
</span><h2 class="s-lib-box-title" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">About Refugees &amp; Asylum Seekers
                                </span></h2><span data-dcnode-id="691" instrument_node="">
</span><div data-dcnode-id="674" id="s-lg-box-collapse-22657822"><span data-dcnode-id="690" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="676"><span data-dcnode-id="689" instrument_node="">
</span><div class="clearfix" data-dcnode-id="678" id="s-lg-content-51294138"><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">According to the U.S. Citizenship and Immigration Services, refugee status or asylum may be granted to people who have been persecuted or fear they will be persecuted on account of race, religion, nationality, and/or membership in a particular social group or political&nbsp;opinion.&nbsp;Refugees are generally people outside of their country who are unable or unwilling to return home because they fear serious harm.&nbsp;</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Asylum status is a form of protection available to people who meet the definition of refugee, are already in the United States, and are seeking admission at a port of entry.&nbsp;</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">This page provides links to federal laws governing the processes for those seeking asylum and refuge&nbsp;in the United States and resources that help explain the law.&nbsp;</span></p><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span></div><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span></div><span data-dcnode-id="671" instrument_node="">
</span></div></div><div class="s-lg-box-wrapper-26552170" data-dcnode-id="560" id="s-lg-box-wrapper-26552170"><span data-dcnode-id="668" instrument_node="">
</span><div class="s-lib-box-container" data-dcnode-id="561" id="s-lg-box-22623748-container"><span data-dcnode-id="667" instrument_node="">
</span><div class="s-lib-box s-lib-box-std" data-dcnode-id="563" id="s-lg-box-22623748"><span data-dcnode-id="666" instrument_node="">
</span><h2 class="s-lib-box-title" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Federal Law
                                </span></h2><span data-dcnode-id="663" instrument_node="">
</span><div data-dcnode-id="565" id="s-lg-box-collapse-22623748"><span data-dcnode-id="662" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="567"><span data-dcnode-id="661" instrument_node="">
</span><div class="" data-dcnode-id="569"><span data-dcnode-id="660" instrument_node="">
</span><ul class="s-lg-link-list s-lg-link-list-2" data-dcnode-id="571" id="s-lg-link-list-53969378"><li class="" data-dcnode-id="650"><span data-dcnode-id="659" instrument_node="">
</span><div class="" data-dcnode-id="651" id="s-lg-content-51203383"><span data-dcnode-id="655"><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%3AUSC-prelim-title8-section1101%26num%3D0%26edition%3Dprelim" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51203383'});" target="_blank"><span data-dcnode-id="658" instrument_node="">U.S. Code, Title 8, Chapter 12, Section 1101</span></a><span data-dcnode-id="656" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="653" id="s-lg-link-desc-51203383"><span data-dcnode-id="654" instrument_node="">Also known as The Refugee Act of 1980, this law created a system for the admission, resettlement, and absorption of refugees to the United States. Defines "refugee" as any person who is unable to return to their own country because of "a well-founded fear of persecution on account of race, religion, nationality, membership in a particular social group, or political opinion".</span></div><span data-dcnode-id="652" instrument_node="">
</span></div></li><span data-dcnode-id="649" instrument_node="">
</span><li class="" data-dcnode-id="639"><span data-dcnode-id="648" instrument_node="">
</span><div class="" data-dcnode-id="640" id="s-lg-content-51213352"><span data-dcnode-id="644"><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%253AUSC-prelim-title8-section1158%26num%3D0%26edition%3Dprelim" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51213352'});" target="_blank"><span data-dcnode-id="647" instrument_node="">U.S. Code, Title 8, Chapter 12, Section 1158</span></a><span data-dcnode-id="645" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="642" id="s-lg-link-desc-51213352"><span data-dcnode-id="643" instrument_node="">Discusses the authority to apply for asylum and the conditions for granting asylum.</span></div><span data-dcnode-id="641" instrument_node="">
</span></div></li><span data-dcnode-id="638" instrument_node="">
</span><li class="" data-dcnode-id="628"><span data-dcnode-id="637" instrument_node="">
</span><div class="" data-dcnode-id="629" id="s-lg-content-51227320"><span data-dcnode-id="633"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%3AUSC-prelim-title8-section1157%26num%3D0%26edition%3Dprelim" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51227320'});" target="_blank"><span data-dcnode-id="636" instrument_node="">U.S. Code, Title 8, Chapter 12, Section 1157</span></a><span data-dcnode-id="634" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="631" id="s-lg-link-desc-51227320"><span data-dcnode-id="632" instrument_node="">This section gives the President, in consultation with Congress, the ability to determine the maximum number of refugee admissions each year.</span></div><span data-dcnode-id="630" instrument_node="">
</span></div></li><span data-dcnode-id="627" instrument_node="">
</span><li class="" data-dcnode-id="617"><span data-dcnode-id="626" instrument_node="">
</span><div class="" data-dcnode-id="618" id="s-lg-content-51225006"><span data-dcnode-id="622"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%3AUSC-prelim-title8-section1522%26num%3D0%26edition%3Dprelim" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51225006'});" target="_blank"><span data-dcnode-id="625" instrument_node="">U.S. Code, Title 8, Chapter 12, Section 1522</span></a><span data-dcnode-id="623" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="620" id="s-lg-link-desc-51225006"><span data-dcnode-id="621" instrument_node="">Authorizes the Office of Refugee Resettlement to create domestic resettlement and assistance programs for refugees.</span></div><span data-dcnode-id="619" instrument_node="">
</span></div></li><span data-dcnode-id="616" instrument_node="">
</span><li class="" data-dcnode-id="606"><span data-dcnode-id="615" instrument_node="">
</span><div class="" data-dcnode-id="607" id="s-lg-content-51249758"><span data-dcnode-id="611"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/cgi-bin/text-idx%3FSID%3Dfbdc6ddc5a79f4a9ad60e8a2cd36de73%26mc%3Dtrue%26node%3Dpt8.1.207%26rgn%3Ddiv5" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51249758'});" target="_blank"><span data-dcnode-id="614" instrument_node="">Title 8, Chapter I, Subchapter B, Part 207. Admission of Refugees</span></a><span data-dcnode-id="612" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="609" id="s-lg-link-desc-51249758"><span data-dcnode-id="610" instrument_node="">Department of Homeland Security regulations on eligibility, application processing, waivers of inadmissibility, control over approved refugee numbers, and more.</span></div><span data-dcnode-id="608" instrument_node="">
</span></div></li><span data-dcnode-id="605" instrument_node="">
</span><li class="" data-dcnode-id="595"><span data-dcnode-id="604" instrument_node="">
</span><div class="" data-dcnode-id="596" id="s-lg-content-51249874"><span data-dcnode-id="600"><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/cgi-bin/text-idx%3FSID%3Dfbdc6ddc5a79f4a9ad60e8a2cd36de73%26mc%3Dtrue%26node%3Dpt8.1.208%26rgn%3Ddiv5" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51249874'});" target="_blank"><span data-dcnode-id="603" instrument_node="">Title 8, Chapter I, Subchapter B, Part 208. Procedures for Asylum and Withholding of Removal</span></a><span data-dcnode-id="601" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="598" id="s-lg-link-desc-51249874"><span data-dcnode-id="599" instrument_node="">Department of Homeland Security regulations on the asylum process, withholding of removal, and credible fear of persecution.</span></div><span data-dcnode-id="597" instrument_node="">
</span></div></li><span data-dcnode-id="594" instrument_node="">
</span><li class="" data-dcnode-id="584"><span data-dcnode-id="593" instrument_node="">
</span><div class="" data-dcnode-id="585" id="s-lg-content-51759459"><span data-dcnode-id="589"><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/presidential-actions/executive-order-enhancing-state-local-involvement-refugee-resettlement/" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51759459'});" target="_blank"><span data-dcnode-id="592" instrument_node="">Executive Order on Enhancing State and Local Involvement in Refugee Resettlement (EO 13888)</span></a><span data-dcnode-id="590" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="587" id="s-lg-link-desc-51759459"><span data-dcnode-id="588" instrument_node="">This executive order issued by the Trump administration in September 2019 requires state and local governments to issue written consent to the initial resettlement of refugees in their communities. NOTE: On January 15, 2020, a federal court issued an order blocking the government from enforcing this executive order. Please see the link below for more details.</span></div><span data-dcnode-id="586" instrument_node="">
</span></div></li><span data-dcnode-id="583" instrument_node="">
</span><li class="" data-dcnode-id="573"><span data-dcnode-id="582" instrument_node="">
</span><div class="" data-dcnode-id="574" id="s-lg-content-51830156"><span data-dcnode-id="578"><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//refugeerights.org/wp-content/uploads/2020/01/Order-1-15-2020.pdf" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51830156'});" target="_blank"><span data-dcnode-id="581" instrument_node="">United States District Court for the District of Maryland order blocking enforcement of Executive Order 13888 [PDF]</span></a><span data-dcnode-id="579" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="576" id="s-lg-link-desc-51830156"><span data-dcnode-id="577" instrument_node="">On January 15, 2020, a federal court in Maryland issued a preliminary injunction blocking the government from enforcing Executive Order 13888, which would have required state and local governments to provide written consent authorizing refugee resettlements in their jurisdictions. This is the result of a lawsuit from several refugee resettlement agencies that alleges that EO 13888 violates federal law.</span></div><span data-dcnode-id="575" instrument_node="">
</span></div></li><span data-dcnode-id="572" instrument_node="">
</span></ul><span data-dcnode-id="570" instrument_node="">
</span></div><span data-dcnode-id="568" instrument_node="">
</span></div><span data-dcnode-id="566" instrument_node="">
</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span></div></div><div class="s-lg-box-wrapper-26561849" data-dcnode-id="468" id="s-lg-box-wrapper-26561849"><span data-dcnode-id="559" instrument_node="">
</span><div class="s-lib-box-container" data-dcnode-id="469" id="s-lg-box-22632336-container"><span data-dcnode-id="558" instrument_node="">
</span><div class="s-lib-box s-lib-box-std" data-dcnode-id="471" id="s-lg-box-22632336"><span data-dcnode-id="557" instrument_node="">
</span><h2 class="s-lib-box-title" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">United States Refugee Admissions Program (USRAP)
                                </span></h2><span data-dcnode-id="554" instrument_node="">
</span><div data-dcnode-id="473" id="s-lg-box-collapse-22632336"><span data-dcnode-id="553" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="475"><span data-dcnode-id="552" instrument_node="">
</span><div class="clearfix" data-dcnode-id="547" id="s-lg-content-51227395"><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">The United States Refugee Admissions Program&nbsp;(USRAP) is a consortium of federal, state and local government agencies, and volunteer nonprofit organizations tasked with overseeing, admitting, and resettling refugees in the United States.&nbsp;</span></p><span data-dcnode-id="548" instrument_node="">
</span></div><div class="" data-dcnode-id="477"><span data-dcnode-id="546" instrument_node="">
</span><ul class="s-lg-link-list s-lg-link-list-2" data-dcnode-id="479" id="s-lg-link-list-53991529"><li class="" data-dcnode-id="536"><span data-dcnode-id="545" instrument_node="">
</span><div class="" data-dcnode-id="537" id="s-lg-content-51226989"><span data-dcnode-id="541"><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/bureaus-offices/under-secretary-for-civilian-security-democracy-and-human-rights/bureau-of-population-refugees-and-migration/" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51226989'});" target="_blank"><span data-dcnode-id="544" instrument_node="">Bureau of Population, Refugees, and Migration (PRM)</span></a><span data-dcnode-id="542" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="539" id="s-lg-link-desc-51226989"><span data-dcnode-id="540" instrument_node="">This agency is a part of the U.S. State Department and is the first government point of contact for refugees. They are responsible for coordinating the process with all other agencies until a refugee is resettled.</span></div><span data-dcnode-id="538" instrument_node="">
</span></div></li><span data-dcnode-id="535" instrument_node="">
</span><li class="" data-dcnode-id="525"><span data-dcnode-id="534" instrument_node="">
</span><div class="" data-dcnode-id="526" id="s-lg-content-51227024"><span data-dcnode-id="530"><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/refugeescreening" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51227024'});" target="_blank"><span data-dcnode-id="533" instrument_node="">Citizenship and Immigration Services (USCIS)</span></a><span data-dcnode-id="531" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="528" id="s-lg-link-desc-51227024"><span data-dcnode-id="529" instrument_node="">This agency is a part of the Department of Homeland Security (DHS) and is in charge of security screening processes for applicants.</span></div><span data-dcnode-id="527" instrument_node="">
</span></div></li><span data-dcnode-id="524" instrument_node="">
</span><li class="" data-dcnode-id="514"><span data-dcnode-id="523" instrument_node="">
</span><div class="" data-dcnode-id="515" id="s-lg-content-51227083"><span data-dcnode-id="519"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/j/prm/ra/receptionplacement/" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51227083'});" target="_blank"><span data-dcnode-id="522" instrument_node="">Reception and Placement Program</span></a><span data-dcnode-id="520" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="517" id="s-lg-link-desc-51227083"><span data-dcnode-id="518" instrument_node="">This program from the State Department connects refugees with funding for rent, food, clothing, and other necessities for their first three months in the U.S.</span></div><span data-dcnode-id="516" instrument_node="">
</span></div></li><span data-dcnode-id="513" instrument_node="">
</span><li class="" data-dcnode-id="503"><span data-dcnode-id="512" instrument_node="">
</span><div class="" data-dcnode-id="504" id="s-lg-content-51227471"><span data-dcnode-id="508"><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/orr" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51227471'});" target="_blank"><span data-dcnode-id="511" instrument_node="">The Office of Refugee Resettlement (ORR)</span></a><span data-dcnode-id="509" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="506" id="s-lg-link-desc-51227471"><span data-dcnode-id="507" instrument_node="">ORR provides time-limited cash and medical assistance to new arrivals, as well as support for case management services, English as a Foreign Language classes, and job readiness and employment services.</span></div><span data-dcnode-id="505" instrument_node="">
</span></div></li><span data-dcnode-id="502" instrument_node="">
</span><li class="" data-dcnode-id="492"><span data-dcnode-id="501" instrument_node="">
</span><div class="" data-dcnode-id="493" id="s-lg-content-51227128"><span data-dcnode-id="497"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/orr/resource/voluntary-agencies" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51227128'});" target="_blank"><span data-dcnode-id="500" instrument_node="">Volunteer Agencies</span></a><span data-dcnode-id="498" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="495" id="s-lg-link-desc-51227128"><span data-dcnode-id="496" instrument_node="">There are nine nongovernmental agencies that assist refugees with resettlement after the initial three month period is over. These organizations are funded by the Department of Health and Human Services.</span></div><span data-dcnode-id="494" instrument_node="">
</span></div></li><span data-dcnode-id="491" instrument_node="">
</span><li class="" data-dcnode-id="481"><span data-dcnode-id="490" instrument_node="">
</span><div class="" data-dcnode-id="482" id="s-lg-content-51759519"><span data-dcnode-id="486"><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/orr/resource/executive-order-on-enhancing-state-and-local-involvement-in-refugee-resettlement" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51759519'});" target="_blank"><span data-dcnode-id="489" instrument_node="">Office of Refugee Resettlement Statement on Executive Order on Enhancing State and Local Involvement in Refugee Resettlement</span></a><span data-dcnode-id="487" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="484" id="s-lg-link-desc-51759519"><span data-dcnode-id="485" instrument_node="">This statement from the Office of Refugee Resettlement provides information on Executive Order 13888, which requires that state and local governments provide written consent to the initial resettlement of refugees.</span></div><span data-dcnode-id="483" instrument_node="">
</span></div></li><span data-dcnode-id="480" instrument_node="">
</span></ul><span data-dcnode-id="478" instrument_node="">
</span></div><span data-dcnode-id="476" instrument_node="">
</span></div><span data-dcnode-id="474" instrument_node="">
</span></div><span data-dcnode-id="472" instrument_node="">
</span></div><span data-dcnode-id="470" instrument_node="">
</span></div></div><div class="s-lg-box-wrapper-26556244" data-dcnode-id="280" id="s-lg-box-wrapper-26556244"><span data-dcnode-id="467" instrument_node="">
</span><div class="s-lib-box-container" data-dcnode-id="281" id="s-lg-box-22627404-container"><span data-dcnode-id="466" instrument_node="">
</span><div class="s-lib-box s-lib-box-std" data-dcnode-id="283" id="s-lg-box-22627404"><span data-dcnode-id="465" instrument_node="">
</span><h2 class="s-lib-box-title" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Understanding the Law
                                </span></h2><span data-dcnode-id="462" instrument_node="">
</span><div data-dcnode-id="285" id="s-lg-box-collapse-22627404"><span data-dcnode-id="461" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="287"><span data-dcnode-id="460" instrument_node="">
</span><div class="clearfix" data-dcnode-id="455" id="s-lg-content-51212936"><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">These resources provide a broad overview of&nbsp;information about the asylum process and U.S. refugee law.</span></p><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="454" instrument_node="">
</span><div class="clearfix" data-dcnode-id="449" id="s-lg-content-51294316"><span data-dcnode-id="453" instrument_node="">
</span><h1 class="sll-box-subheading" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Asylum&nbsp;</span></h1><span data-dcnode-id="450" instrument_node="">
</span></div><div class="" data-dcnode-id="354"><span data-dcnode-id="448" instrument_node="">
</span><ul class="s-lg-link-list s-lg-link-list-2" data-dcnode-id="356" id="s-lg-link-list-53990603"><li class="" data-dcnode-id="438"><span data-dcnode-id="447" instrument_node="">
</span><div class="" data-dcnode-id="439" id="s-lg-content-51226088"><span data-dcnode-id="443"><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-and-asylum/asylum/asylum-frequently-asked-questions/questions-and-answers-asylum-eligibility-and-applications" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51226088'});" target="_blank"><span data-dcnode-id="446" instrument_node="">Asylum Eligibility and Applications FAQ</span></a><span data-dcnode-id="444" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="441" id="s-lg-link-desc-51226088"><span data-dcnode-id="442" instrument_node="">Frequently asked questions about asylum eligibility and applications from U.S. Citizenship and Immigration Services.</span></div><span data-dcnode-id="440" instrument_node="">
</span></div></li><span data-dcnode-id="437" instrument_node="">
</span><li class="" data-dcnode-id="427"><span data-dcnode-id="436" instrument_node="">
</span><div class="" data-dcnode-id="428" id="s-lg-content-51226157"><span data-dcnode-id="432"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-asylum/asylum/obtaining-asylum-united-states" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51226157'});" target="_blank"><span data-dcnode-id="435" instrument_node="">Obtaining Asylum in the United States</span></a><span data-dcnode-id="433" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="430" id="s-lg-link-desc-51226157"><span data-dcnode-id="431" instrument_node="">This page from U.S. Citizenship and Immigration Services discusses the affirmative process and defensive process, the two ways of obtaining asylum in the United States.</span></div><span data-dcnode-id="429" instrument_node="">
</span></div></li><span data-dcnode-id="426" instrument_node="">
</span><li class="" data-dcnode-id="416"><span data-dcnode-id="425" instrument_node="">
</span><div class="" data-dcnode-id="417" id="s-lg-content-65968385"><span data-dcnode-id="421"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//texaslawhelp.org/guide/i-want-to-file-for-asylum" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '65968385'});" target="_blank"><span data-dcnode-id="424" instrument_node="">I want to file for asylum. (Texas Law Help)</span></a><span data-dcnode-id="422" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="419" id="s-lg-link-desc-65968385"><span data-dcnode-id="420" instrument_node="">This guide from Texas Law Help includes instructions and sample forms for filing an asylum application with the U.S. Citizenship and Immigration Services.</span></div><span data-dcnode-id="418" instrument_node="">
</span></div></li><span data-dcnode-id="415" instrument_node="">
</span><li class="" data-dcnode-id="405"><span data-dcnode-id="414" instrument_node="">
</span><div class="" data-dcnode-id="406" id="s-lg-content-51213285"><span data-dcnode-id="410"><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//texaslawhelp.org/article/asylum" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51213285'});" target="_blank"><span data-dcnode-id="413" instrument_node="">Asylum (Texas Law Help)</span></a><span data-dcnode-id="411" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="408" id="s-lg-link-desc-51213285"><span data-dcnode-id="409" instrument_node="">This article from Texas Law Help explains different aspects of the asylum process.</span></div><span data-dcnode-id="407" instrument_node="">
</span></div></li><span data-dcnode-id="404" instrument_node="">
</span><li class="" data-dcnode-id="394"><span data-dcnode-id="403" instrument_node="">
</span><div class="" data-dcnode-id="395" id="s-lg-content-51286089"><span data-dcnode-id="399"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilrc.org/asylum" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51286089'});" target="_blank"><span data-dcnode-id="402" instrument_node="">Asylum — ILRC</span></a><span data-dcnode-id="400" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="397" id="s-lg-link-desc-51286089"><span data-dcnode-id="398" instrument_node="">This page from the Immigrant Legal Resource Center has information and updates on asylum law in the U.S.</span></div><span data-dcnode-id="396" instrument_node="">
</span></div></li><span data-dcnode-id="393" instrument_node="">
</span><li class="" data-dcnode-id="383"><span data-dcnode-id="392" instrument_node="">
</span><div class="" data-dcnode-id="384" id="s-lg-content-51294304"><span data-dcnode-id="388"><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanimmigrationcouncil.org/research/asylum-united-states" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51294304'});" target="_blank"><span data-dcnode-id="391" instrument_node="">Asylum in the United States</span></a><span data-dcnode-id="389" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="386" id="s-lg-link-desc-51294304"><span data-dcnode-id="387" instrument_node="">This page from the American Immigration Council discusses the asylum process, including a discussion on what happens to asylum seekers arriving at a U.S. border.</span></div><span data-dcnode-id="385" instrument_node="">
</span></div></li><span data-dcnode-id="382" instrument_node="">
</span><li class="" data-dcnode-id="369"><span data-dcnode-id="381" instrument_node="">
</span><div class="" data-dcnode-id="370" id="s-lg-content-65342954"><span data-dcnode-id="377"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uchastings.app.box.com/s/4if1tkc5mvdnn2yeww4vg8ao9zv21p0o" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '65342954'});" target="_blank"><span data-dcnode-id="380" instrument_node="">Finding Country Conditions Evidence for Asylum and Fear-of-Return Immigration Cases</span></a><span data-dcnode-id="378" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="372" id="s-lg-link-desc-65342954"><span data-dcnode-id="376" instrument_node="">This manual from the Center for Gender &amp; Refugee Studies is intended to help self-represented asylum seekers understand how to find country conditions evidence to support their asylum case. The manual has also been translated into </span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uchastings.app.box.com/s/lipwiiz6rcherurs82w7pxtslalvr8up"><span data-dcnode-id="375" instrument_node="">Spanish</span></a><span data-dcnode-id="373" instrument_node="">.</span></div><span data-dcnode-id="371" instrument_node="">
</span></div></li><span data-dcnode-id="368" instrument_node="">
</span><li class="" data-dcnode-id="358"><span data-dcnode-id="367" instrument_node="">
</span><div class="" data-dcnode-id="359" id="s-lg-content-65343147"><span data-dcnode-id="363"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uchastings.app.box.com/s/lipwiiz6rcherurs82w7pxtslalvr8up" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '65343147'});" target="_blank"><span data-dcnode-id="366" instrument_node="">Como encontrar la evidencia de las condiciones del país para su caso de asilo, suspensión de remoción y la Convención contra la Tortura</span></a><span data-dcnode-id="364" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="361" id="s-lg-link-desc-65343147"><span data-dcnode-id="362" instrument_node="">Este manual del Centro de Estudios de Género y Refugiados tiene como objetivo ayudar a los solicitantes de asilo que se representan a sí mismos a comprender cómo encontrar evidencia de las condiciones del país para respaldar su caso de asilo.</span></div><span data-dcnode-id="360" instrument_node="">
</span></div></li><span data-dcnode-id="357" instrument_node="">
</span></ul><span data-dcnode-id="355" instrument_node="">
</span></div><span data-dcnode-id="353" instrument_node="">
</span><div class="clearfix" data-dcnode-id="348" id="s-lg-content-51294323"><span data-dcnode-id="352" instrument_node="">
</span><h1 class="sll-box-subheading" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Refugees</span></h1><span data-dcnode-id="349" instrument_node="">
</span></div><div class="" data-dcnode-id="289"><span data-dcnode-id="347" instrument_node="">
</span><ul class="s-lg-link-list s-lg-link-list-2" data-dcnode-id="291" id="s-lg-link-list-53978739"><li class="" data-dcnode-id="337"><span data-dcnode-id="346" instrument_node="">
</span><div class="" data-dcnode-id="338" id="s-lg-content-51212937"><span data-dcnode-id="342"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nolo.com/legal-encyclopedia/asylum-or-refugee-status-who-32298.html" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '2',_st_content_id: '51212937'});" target="_blank"><span data-dcnode-id="345" instrument_node="">Asylum or Refugee Status: Who Is Eligible?</span></a><span data-dcnode-id="343" instrument_node="">
</span></span><div class="s-lg-link-desc" data-dcnode-id="340" id="s-lg-link-desc-51212937"><span data-dcnode-id="341" instrument_node="">This article from Nolo, a legal encyclopedia, discusses who is eligible for asylum or refugee status in the United States.</span></div><span data-dcnode-id="339" instrument_node="">
</span></div></li><span data-dcnode-id="336" instrument_node="">
