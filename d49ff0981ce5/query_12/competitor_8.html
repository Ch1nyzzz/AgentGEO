-dcnode-id="668" instrument_node="">International Court of Justice</span></p><p class="u-mb-3u" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">1950 I.C.J. 266 (1950)</span></p><h2 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Facts</span></h2><div class="facts u-mb-3u" data-dcnode-id="660"><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Victor Raul Haya de la Torre sought political asylum from Peru in the Colombian embassy in Lima, Peru. Peru refused to permit Haya de la Torre to safely leave the country and instead demanded that Colombia hand him over for trial for a failed military coup in Peru. Colombia unilaterally claimed that Haya de la Torre was entitled to diplomatic asylum. The question of asylum was referred to the International Court of Justice. Colombia claimed that such unilateral qualification for asylum was customary in Latin American countries.</span></p></div><h2 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Rule of Law</span></h2><div class="c-info-message -no-access -content" data-dcnode-id="638" role="alert"><div class="c-info-message_main" data-dcnode-id="639"><div data-dcnode-id="650"><ion-icon aria-label="lock closed outline" class="info-icon quimbee-icon md hydrated" data-dcnode-id="651" name="lock-closed-outline" role="img"><div class="icon-inner" data-dcnode-id="652"><svg class="ionicon s-ion-icon" data-dcnode-id="653" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="656">Lock Closed</title><path class="ionicon-fill-none ionicon-stroke-width" d="M336 208v-95a80 80 0 00-160 0v95" data-dcnode-id="655" stroke-linecap="round" stroke-linejoin="round"></path><rect class="ionicon-fill-none ionicon-stroke-width" data-dcnode-id="654" height="272" rx="48" ry="48" stroke-linecap="round" stroke-linejoin="round" width="320" x="96" y="208"></rect></svg></div></ion-icon></div><div class="c-info-message_content" data-content-container="" data-
