</span><div class="entry-content" data-dcnode-id="652"><span data-dcnode-id="936" instrument_node="">
</span><img alt="Asylum Case (Colombia v. Peru)" class="attachment-full size-full wp-post-image perfmatters-lazy loaded" data-dcnode-id="935" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png" data-srcset="https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png 800w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-600x435.png 600w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-768x557.png 768w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-665x482.png 665w" data-was-processed="true" height="580" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png&amp;raw" srcset="https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png 800w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-600x435.png 600w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-768x557.png 768w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-665x482.png 665w" title="Case Study: Asylum Case (Colombia v. Peru), [1950] ICJ 6 1" width="800"><noscript data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&lt;img width="800" height="580" src="https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png" class="attachment-full size-full wp-post-image" alt="Asylum Case (Colombia v. Peru)" srcset="https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post.png 800w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-600x435.png 600w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-768x557.png 768w, https://legalbites.b-cdn.net/wp-content/uploads/2020/09/asylum-case-post-665x482.png 665w" sizes="(max-width: 800px) 100vw, 800px" title="Case Study: Asylum Case (Colombia v. Peru), [1950] ICJ 6 1"&gt;</span></noscript><span data-dcnode-id="932" instrument_node=""> </span><p class="post-modified-info" data-dcnode-id="925"><span data-dcnode-id="931" instrument_node="">Last Updated on </span><time data-dcnode-id="929" datetime="2020-12-08T11:51:48+05:30" itemprop="dateModified"><span data-dcnode-id="930" instrument_node="">1 year</span></time><span data-dcnode-id="928" instrument_node=""> by </span><a class="last-modified-author" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalbites.in/" target="_blank"><span data-dcnode-id="927" instrument_node="">Admin LB</span></a></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="910" style="text-align: justify;"><span data-dcnode-id="923" instrument_node="">The case of </span><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Colombia v. Peru </span></strong><span data-dcnode-id="920" instrument_node="">or commonly known as the </span><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Asylum case</span></strong><span data-dcnode-id="917" instrument_node=""> is a landmark in Public International law for several reasons, inter alia, its expansion of laws on </span><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">extradition</span></strong><span data-dcnode-id="914" instrument_node=""> and </span><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">political asylum</span></strong><span data-dcnode-id="911" instrument_node="">, development of customary international law and concept of sovereignty in International law.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="904" style="text-align: justify;"><span data-dcnode-id="908" instrument_node="">The case, having been decided as early as the 1950s, [Judgment on </span><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">20 November 1950</span></strong><span data-dcnode-id="905" instrument_node="">] has played a significant role in moulding the international law and giving it the shape as it stands today.</span></p><span data-dcnode-id="903" instrument_node="">
</span><h2 data-dcnode-id="900" style="text-align: justify;"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">I. Factual Background of the Asylum Case</span></strong></h2><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="895" style="text-align: justify;"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Peru</span></strong><span data-dcnode-id="896" instrument_node=""> is a country in the Continent of Latin America or South America and has its capital at Lima. In 1948, the country went through rough times where a very long tussle broke out in Lima for the acquisition of political powers and government.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="889" style="text-align: justify;"><span data-dcnode-id="893" instrument_node="">After a long struggle and siege, the</span><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node=""> Military Junta Government</span></strong><span data-dcnode-id="890" instrument_node=""> came to power defeating the American Citizens’ Revolutionary Alliance which automatically became the opposition party.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="878" style="text-align: justify;"><span data-dcnode-id="887" instrument_node="">As a result of this loss of power and government, the leader of the opposition, </span><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Victor Raul</span></strong><span data-dcnode-id="884" instrument_node="">, commenced a rebellion against the Junta government in Peru intending to dethrone him. However, due to extreme political powers vested in the government, the rebellion was surmounted within 24 hours. The leading party also instituted criminal proceedings against Raul for instigating the rebellion and sedition. As a result, </span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Raul had to run for his life</span></strong><span data-dcnode-id="881" instrument_node="">, and he sought asylum in the capital of Peru, Lima, under a </span><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Colombian Embassy.</span></strong></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="869" style="text-align: justify;"><span data-dcnode-id="876" instrument_node="">Three months after his escape, on</span><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node=""> January 04, 1949</span></strong><span data-dcnode-id="873" instrument_node="">, the Peruvian government was informed about his asylum, and they immediately claimed his custody. On the other hand, the Colombian embassy claimed that Victor has a right to passage and requested safe passage for him to leave the country. Moreover, the Colombian government unilaterally qualified the offence committed by Victor to be a political offense and allowed political refuge without consideration from the Peruvian government. The already enraged government of Peru categorically denied the safe passage arguing that there exists no right of political or diplomatic asylum for Raul since he is responsible for the rebellion or </span><em data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">in legalese</span></em><span data-dcnode-id="870" instrument_node="">, common crimes.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="864" style="text-align: justify;"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Due to non-agreement between both the States, Peru and Colombia, the situation reached a diplomatic stalemate</span></strong><span data-dcnode-id="865" instrument_node=""> and no provision was left for either party rather than to move an independent authority. Hence, an agreement was signed between the two States and it was decided that the ICJ will adjudge the matter, and the award will be agreed to by both the parties.</span></p><span data-dcnode-id="863" instrument_node="">
</span><h2 data-dcnode-id="860" style="text-align: justify;"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">II. Issues before the ICJ</span></strong></h2><span data-dcnode-id="859" instrument_node="">
</span><ul data-dcnode-id="842" style="text-align: justify;"><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="856" style="font-size: 16px;"><span data-dcnode-id="857" instrument_node="">Whether the State of Colombia had right to unilaterally qualify the offense of Victor Raul as a political offense under any international treaty, customary international law or any general principles of international law?</span></span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" style="font-size: 16px;"><span data-dcnode-id="853" instrument_node="">Whether the Peruvian government was bound to grant safe passage to Raul to leave the country under international law?</span></span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="845" style="font-size: 16px;"><span data-dcnode-id="849" instrument_node="">Whether the Colombian government and ambassador was liable for violating the provisions of the </span><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Havana Convention on Asylum, 1928</span></strong><span data-dcnode-id="846" instrument_node=""> by providing and continuing to provide asylum to the offender?</span></span></li><span data-dcnode-id="843" instrument_node="">
</span></ul><span data-dcnode-id="841" instrument_node="">
</span><h2 data-dcnode-id="838" style="text-align: justify;"><strong data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">III. Relevant Legal Provisions</span></strong></h2><span data-dcnode-id="837" instrument_node="">
</span><ul data-dcnode-id="814" style="text-align: justify;"><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" style="font-size: 16px;"><span data-dcnode-id="835" instrument_node="">Article 18 of the</span><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node=""> Bolivarian Agreement on Extradition, 1911</span></strong></span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" style="font-size: 16px;"><span data-dcnode-id="829" instrument_node="">Articles 1 and 2 of the </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Havana Convention on Asylum, 1928</span></strong></span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="820"><strong data-dcnode-id="821"><span data-dcnode-id="822" style="font-size: 16px;"><span data-dcnode-id="823" instrument_node="">Montevideo Convention on Political Asylum, 1933</span></span></strong></li><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="817" style="font-size: 16px;"><span data-dcnode-id="818" instrument_node="">Customary International Law</span></span></li><span data-dcnode-id="815" instrument_node="">
</span></ul><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="810" style="text-align: justify;"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">IV. Arguments on Behalf of the Colombian Government</span></strong></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807" style="text-align: justify;"><span data-dcnode-id="808" instrument_node="">The Colombian government put forth a threefold argument before the court to substantiate its actions. Now, before proceeding with the arguments, it is vital to note that in the present case, Colombia has filed a claim before the court to hold its asylum valid and allow safe-passage to Victor Raul to leave the State. On the contrary, Peru has filed a counter-claim to hold the asylum invalid, extradite the offender to the Peruvian government and deny safe passage to the offender. Hence, both the parties tried to justify their actions through profound arguments.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h3 data-dcnode-id="803" style="text-align: justify;"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The threefold arguments of the Columbian government can be explained as follows:</span></strong></h3><span data-dcnode-id="802" instrument_node="">
</span><ol data-dcnode-id="779" style="text-align: justify;"><span data-dcnode-id="801" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="800" instrument_node="">Under </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Article 18</span></strong><span data-dcnode-id="797" instrument_node=""> of the </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Bolivarian Agreement, 1911</span></strong><span data-dcnode-id="794" instrument_node=""> every country is entitled to grant political asylum to any political refugee in accordance with the international law. This has been further reiterated under the </span><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Montevideo Convention, 1933</span></strong><span data-dcnode-id="791" instrument_node=""> as well. Both the agreements were ratified and signed by Peru and Colombia. These provisions were relied upon by Colombia and argued that according to these treaty obligations, Colombia had every right to grant asylum to the political offender and hence, no law has been violated.</span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Further, Colombia argued the existence of an ancient and long practised custom in South American countries that vests right upon these countries to grant asylum to anyone seeking it. Further, Colombia also claimed that the custom does not prevent any unilateral qualification of an offender as a political offender for the purpose of granting asylum. Hence, Colombia prayed that since the State has the right to qualify anyone as a political offender unilaterally, it is the duty of other States to respect such qualification and allow safe passage to such refugees or asylum-seekers.</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">Lastly, Colombia argued that according to </span><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Article 2 (2) of the Havana Convention</span></strong><span data-dcnode-id="782" instrument_node="">, Peru was obliged to provide a free and safe passage to the asylum seeker to leave the country without any harm. Moreover, it was implored that the provision of this convention align with the American custom demands respect for such rights and hence, Peru is liable to provide passage to Raul.</span></li><span data-dcnode-id="780" instrument_node="">
</span></ol><span data-dcnode-id="778" instrument_node="">
</span><h2 data-dcnode-id="775" style="text-align: justify;"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">V. Arguments on Behalf of the Peruvian Government</span></strong></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772" style="text-align: justify;"><span data-dcnode-id="773" instrument_node="">As mentioned before, the Peruvian government filed a counterclaim to claim the extradition of Kaul and hold Colombia liable for hiding an offender. The arguments of the Peruvian government were twofold;</span></p><span data-dcnode-id="771" instrument_node="">
</span><ol data-dcnode-id="755" style="text-align: justify;"><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">Firstly, the </span><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Bolivarian agreement is a treaty on extradition and does not deal with asylum.</span></strong><span data-dcnode-id="766" instrument_node=""> Further, according to the Havana Convention on Asylum, political asylum can be provided only in favour of a political offender. A political offender means any person who has committed an act towards the detriment of the State and caused or attempted to cause harm to its sovereignty and integrity. Political offenders are allowed asylums because several times, these political offenders are rebels fighting against their cruel government or a dictator’s rule and under their radar to be found and exterminated. In the present case, Peru argued that Victor was not a political offender and the unilateral qualification of Victor as a political offender by the Colombian government is invalid.</span></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="763" instrument_node="">Secondly, it was also argued by the Peruvian government that according to </span><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Article 2 of the Havana Convention, asylum should be granted in cases of dire need or utmost emergency.</span></strong><span data-dcnode-id="760" instrument_node=""> For instance, when there is an immediate threat of extermination or persecution of the asylum seeker. In the present case, the Peruvian government has not shown any such intention of persecuting Raul. On the contrary, a legal trial has been initiated against him in the Peruvian court. Hence, the </span><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">asylum is invalid and against international law.</span></strong></li><span data-dcnode-id="756" instrument_node="">
</span></ol><span data-dcnode-id="754" instrument_node="">
</span><h2 data-dcnode-id="751" style="text-align: justify;"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">VI. Judgment of the ICJ | Asylum Case (Colombia v. Peru), [1950] ICJ 6</span></strong></h2><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748" style="text-align: justify;"><span data-dcnode-id="749" instrument_node="">With respect to the unilateral qualification of Raul’s offense as a political offense, the ICJ observed that in a normal scenario, the procedure is that the asylum granting State has right to provisionally qualify an offense as a political offense and the territorial State is entitled to consent to such qualification. In the present case, consent was denied by the Peruvian government, but the Colombian embassy made the qualification absolute even without consent.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742" style="text-align: justify;"><span data-dcnode-id="746" instrument_node="">Moreover, the court also observed that the </span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Havana Convention does not provide any right or entitlement to any State</span></strong><span data-dcnode-id="743" instrument_node=""> for the unilateral qualification of an offense as a political offense. Hence, it would be wrong to assert that Colombia had any right to make such a qualification.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="731" style="text-align: justify;"><span data-dcnode-id="740" instrument_node="">The Colombian government relied highly on the</span><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node=""> Montevideo Convention of 1933</span></strong><span data-dcnode-id="737" instrument_node=""> which allows such power to the State, to which the court observed that </span><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Peru has neither signed nor ratified</span></strong><span data-dcnode-id="734" instrument_node=""> the Montevideo Convention. Moreover, the convention has not been ratified by a large number of States, and its provisions are very rarely used. Hence, it is </span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">neither binding as a treaty nor as a general principle of International law.</span></strong></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725" style="text-align: justify;"><span data-dcnode-id="729" instrument_node="">Adding to the issue of unilateral qualification, the court also held that the</span><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node=""> Colombian government’s argument related to customary practice in the Latin American States to grant asylum is also futile</span></strong><span data-dcnode-id="726" instrument_node="">. It is because an essential ingredient of a valid custom is “consistent and uniform usage”. In the case of South American States, the practice has always arisen, taking into consideration some unforeseen exigencies and urgent need. There is no uniform practice as such and hence, no customary International law as well.</span></p><span data-dcnode-id="724" instrument_node="">
</span><h2 data-dcnode-id="721" style="text-align: justify;"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Conclusion &amp; Analysis</span></strong></h2><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="716" style="text-align: justify;"><span data-dcnode-id="719" instrument_node="">This case evolved the concept of customary international law and added two essential ingredients to it, i.e. consistent and uniform usage. Now, when you distinguish practice from a custom, the essential requirement is to prove that the practice has been going on for centuries in the same fashion and is still in vogue guiding the way of the State. Hence, the </span><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">court rightly concluded that Peru has the right over the custody of Victor Raul.</span></strong></p><span data-dcnode-id="715" instrument_node="">
</span><hr data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711" style="text-align: justify;"><span data-dcnode-id="712" instrument_node="">Reference</span></h3><span data-dcnode-id="710" instrument_node="">
</span><ol data-dcnode-id="697"><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="705" style="text-align: justify;"><span data-dcnode-id="708" instrument_node="">Judgment of ICJ in Colombia v. Peru, [1950] ICJ 6, </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icj-cij.org/files/case-related/7/007-19501120-JUD-01-00-EN.pdf" rel="noopener" target="_blank"><span data-dcnode-id="707" instrument_node="">Available Here</span></a></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="699" style="text-align: justify;"><span data-dcnode-id="703" instrument_node="">Malcolm N. Shaw, International Law, 6</span><sup data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">th</span></sup><span data-dcnode-id="700" instrument_node=""> 2008.</span></li><span data-dcnode-id="698" instrument_node="">
</span></ol><span data-dcnode-id="696" instrument_node="">
</span><hr data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
</span><ol data-dcnode-id="688"><span data-dcnode-id="693" instrument_node="">
