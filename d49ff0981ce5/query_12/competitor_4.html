</span><span data-dcnode-id="1156" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1157" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The word

to surrender a person to the requesting state and provides shelter and
protection in its own territory. </span></span></div><span data-dcnode-id="1154" instrument_node="">

</span><span data-dcnode-id="1136" style="font-size: large;"><b data-dcnode-id="1137"><span data-dcnode-id="1138" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1139" instrument_node="">Definition:&nbsp;</span></span></b></span></div><span data-dcnode-id="1134" instrument_node="">

</span><span data-dcnode-id="1125" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1127" style="mso-spacerun: yes;"><span data-dcnode-id="1128" instrument_node="">&nbsp;&nbsp;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; </span></span><span data-dcnode-id="1126" instrument_node="">According to Starke, the conception of
asylum in International law involves two elements</span></span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
</span><span data-dcnode-id="1118" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="1122" instrument_node="">1.Shelter,
which is more than merely temporary refugee ; and</span><span data-dcnode-id="1119" style="mso-list: Ignore;"><span data-dcnode-id="1120" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="1121" instrument_node="">&nbsp;</span></span></span></span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
</span><span data-dcnode-id="1112" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1113" instrument_node="">2.</span></span><span data-dcnode-id="1110" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1111" instrument_node="">A
degree of active protection on the part of the authorities in control of the
territory of asylum </span></span></div><span data-dcnode-id="1108" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1105"><span data-dcnode-id="1107" instrument_node="">
</span><br data-dcnode-id="1106"></div><span data-dcnode-id="1104" instrument_node="">

</span><span data-dcnode-id="1101" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1102" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
Institute of International law, at its Bath session in September, 1950 defined
the term asylum as under&nbsp;</span></span></div><span data-dcnode-id="1099" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1096"><span data-dcnode-id="1098" instrument_node="">
</span><br data-dcnode-id="1097"></div><span data-dcnode-id="1095" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">
</span><b data-dcnode-id="1091"><span data-dcnode-id="1092" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1093" instrument_node="">“Asylum
is the protection which a state grants on its territory or in some other places
under the control of certain its organs to a person who comes to seek.”</span></span></b></div><span data-dcnode-id="1089" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1086"><span data-dcnode-id="1088" instrument_node="">
</span><br data-dcnode-id="1087"></div><span data-dcnode-id="1085" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1081"><span data-dcnode-id="1084" instrument_node="">
</span><span data-dcnode-id="1082" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1083" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The term
asylum is used to describe a number of legal notions: the grant by the states
of admission into their territory of refugees, the protection of refugees
against return to a country in respect of which they fear persecution and
non-extradition of political offenders. </span></span></div><span data-dcnode-id="1080" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1077"><span data-dcnode-id="1079" instrument_node="">
</span><br data-dcnode-id="1078"></div><span data-dcnode-id="1076" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1072"><span data-dcnode-id="1075" instrument_node="">
</span><span data-dcnode-id="1073" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1074" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
above elements of asylum will show that extradition is the antithesis of
territorial asylum. Asylum stops, as it were, where extradition begins. </span></span></div><span data-dcnode-id="1071" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1068"><span data-dcnode-id="1070" instrument_node="">
</span><br data-dcnode-id="1069"></div><span data-dcnode-id="1067" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1063"><span data-dcnode-id="1066" instrument_node="">
</span><span data-dcnode-id="1064" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1065" instrument_node="">According
to Article 14 of the Universal declaration of Human Rights, adopted by the
General Assembly of United Nations on 10 December 1948 – </span></span></div><span data-dcnode-id="1062" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1059"><span data-dcnode-id="1061" instrument_node="">
</span><br data-dcnode-id="1060"></div><span data-dcnode-id="1058" instrument_node="">
</span><span data-dcnode-id="1051" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="1052" style="mso-list: Ignore;"><span data-dcnode-id="1053" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="1057" instrument_node="">&nbsp; </span><span data-dcnode-id="1055" style="font-size: small;"><span data-dcnode-id="1056" instrument_node="">1.</span></span><span data-dcnode-id="1054" instrument_node=""> &nbsp; </span></span></span></span><span data-dcnode-id="1049" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1050" instrument_node="">Everyone
has the right to seek and to enjoy in other countries asylum from persecution.</span></span><span data-dcnode-id="1045" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="1046" style="mso-list: Ignore;"><span data-dcnode-id="1047" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="1048" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
</span></span></span></span><span data-dcnode-id="1043" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1044" instrument_node="">This
right may not be invoked in the case of prosecutions genuinely arising from
non-political crimes or from acts contrary to the purposes and principles of
the United Nations.</span></span><span data-dcnode-id="1042" instrument_node="">
</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1037"><span data-dcnode-id="1039" instrument_node="">
</span><br data-dcnode-id="1038"></div><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1034" style="font-size: large;"><span data-dcnode-id="1035" instrument_node="">
</span></span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1024"><span data-dcnode-id="1031" instrument_node="">
</span><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1025" style="font-size: large;"><b data-dcnode-id="1026"><span data-dcnode-id="1027" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1028" instrument_node="">Basis of
Asylum:&nbsp;</span></span></b></span></div><span data-dcnode-id="1023" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1020"><span data-dcnode-id="1022" instrument_node="">
</span><br data-dcnode-id="1021"></div><span data-dcnode-id="1019" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1011"><span data-dcnode-id="1018" instrument_node="">
</span><span data-dcnode-id="1012" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1016" style="mso-spacerun: yes;"><span data-dcnode-id="1017" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1014" style="mso-spacerun: yes;"><span data-dcnode-id="1015" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
</span></span><span data-dcnode-id="1013" instrument_node="">A State has a right to grant asylum to a person on the principle that it
has a sovereign right to control over the individuals found on its territory.
Thus, the right of territorial asylum has been conferred to a state on the
basis of its sovereignty over the territory. This right is exclusive in the
sense that other states are excluded to exercise the jurisdiction over the same
territory. </span></span></div><span data-dcnode-id="1010" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1007"><span data-dcnode-id="1009" instrument_node="">
</span><br data-dcnode-id="1008"></div><span data-dcnode-id="1006" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="1002"><span data-dcnode-id="1005" instrument_node="">
</span><span data-dcnode-id="1003" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="1004" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The
draft Convention on territorial Asylum adopted by the General assembly in 1974
has recognized under Article. 1, that the grant of asylum is a sovereign right
of a state. The territorial jurisdiction right extends, by application to the
embassies, legations, vessels and aircrafts. </span></span></div><span data-dcnode-id="1001" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="998"><span data-dcnode-id="1000" instrument_node="">
</span><br data-dcnode-id="999"></div><span data-dcnode-id="997" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="989"><span data-dcnode-id="996" instrument_node="">
</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">
</span><span data-dcnode-id="990" style="font-size: large;"><b data-dcnode-id="991"><span data-dcnode-id="992" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="993" instrument_node="">Reasons
for Asylum:</span></span></b></span></div><span data-dcnode-id="988" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="985"><span data-dcnode-id="987" instrument_node="">
</span><br data-dcnode-id="986"></div><span data-dcnode-id="984" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="980"><span data-dcnode-id="983" instrument_node="">
</span><span data-dcnode-id="981" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="982" instrument_node="">A state
grant grants asylum to a person because of many reasons: </span></span></div><span data-dcnode-id="979" instrument_node="">
</span><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">
</span><span data-dcnode-id="972" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="973" style="mso-list: Ignore;"><span data-dcnode-id="975" style="font-size: small;"><span data-dcnode-id="976" instrument_node="">1.</span></span><span data-dcnode-id="974" style="font: 7.0pt &quot;Times New Roman&quot;;"></span></span></span><span data-dcnode-id="970" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="971" instrument_node="">It
is granted to save a person from jurisdiction of local authorities on the
ground that he will not get fair trial.</span></span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="964" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="965" instrument_node="">2.&nbsp;</span></span><span data-dcnode-id="960" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="961" style="mso-list: Ignore;"><span data-dcnode-id="962" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="963" instrument_node=""> </span></span></span></span><span data-dcnode-id="958" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="959" instrument_node="">A
person may be granted asylum on humanitarian grounds, in order to protect
political offenders against the violent and disorderly action of irresponsible
section of the population. </span></span><span data-dcnode-id="957" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"></span><span data-dcnode-id="954" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="955" style="mso-list: Ignore;"><span data-dcnode-id="956" instrument_node="">&nbsp;</span></span></span><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
</span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">
</span><span data-dcnode-id="945" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="946" style="mso-list: Ignore;"><span data-dcnode-id="949" instrument_node="">3.</span><span data-dcnode-id="947" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="948" instrument_node=""> </span></span></span></span><span data-dcnode-id="943" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="944" instrument_node="">National
security also plays an important role in granting asylum. The offender who may
be a rebel today may become a ruler in future date.</span></span><span data-dcnode-id="940" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="941" style="mso-list: Ignore;"><span data-dcnode-id="942" instrument_node="">&nbsp;</span></span></span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span><span data-dcnode-id="931" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;; mso-fareast-font-family: &quot;Times New Roman&quot;;"><span data-dcnode-id="932" style="mso-list: Ignore;"><span data-dcnode-id="935" instrument_node="">4.</span><span data-dcnode-id="933" style="font: 7.0pt &quot;Times New Roman&quot;;"><span data-dcnode-id="934" instrument_node=""> </span></span></span></span><span data-dcnode-id="927" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="930" instrument_node="">Although
a State may grant asylum after taking into consideration of any of the above
factors, State adopt a cautious approach before doing so because it normally affects
the friendly relations of two states. e.g. when India granted asylum to Dalai
Lama and other Tibetans, it resulted in more strained relationship between
India and china. In this case Dalai Lama and his followers were granted asylum
on the ground of territorial sovereignty by India.</span><span data-dcnode-id="928" style="mso-spacerun: yes;"><span data-dcnode-id="929" instrument_node="">&nbsp;&nbsp; </span></span></span><span data-dcnode-id="926" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"></span><span data-dcnode-id="925" instrument_node="">
</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="920"><span data-dcnode-id="922" instrument_node="">
</span><br data-dcnode-id="921"></div><span data-dcnode-id="919" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="911"><span data-dcnode-id="918" instrument_node="">
</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
</span><span data-dcnode-id="912" style="font-size: large;"><b data-dcnode-id="913"><span data-dcnode-id="914" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="915" instrument_node="">Is
asylum right of a person? </span></span></b></span></div><span data-dcnode-id="910" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="907"><span data-dcnode-id="909" instrument_node="">
</span><br data-dcnode-id="908"></div><span data-dcnode-id="906" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="896"><span data-dcnode-id="905" instrument_node="">
</span><span data-dcnode-id="897" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="904" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It is
said that a person has a right to get asylum in other states. Universal
Declaration of Human Rights under article 14 says down that “everyone has right
to seek and enjoy in other countries asylum from persecution.”</span><span data-dcnode-id="902" style="mso-spacerun: yes;"><span data-dcnode-id="903" instrument_node="">&nbsp; </span></span><span data-dcnode-id="901" instrument_node="">General assembly of the united nations unanimously
adopted a resolution in 1967 a Declaration on Territorial asylum which provides
that “no one shall be subjected to measure such as rejection at the frontier,
expulsion or compulsory return to any state where he may be subjected to
prosecution but it does not mean that Art.14 provides for a right to seek and
enjoy asylum.”</span><span data-dcnode-id="899" style="mso-spacerun: yes;"><span data-dcnode-id="900" instrument_node="">&nbsp; </span></span><span data-dcnode-id="898" instrument_node="">A person can seek and
enjoy asylum only when it is granted by a state. State has no such duty to
grant asylum to a person. The right to grant asylum vests in the states. It is
exercised on the basis of principle of territorial sovereignty. </span></span></div><span data-dcnode-id="895" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="892"><span data-dcnode-id="894" instrument_node="">
</span><br data-dcnode-id="893"></div><span data-dcnode-id="891" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="888"><span data-dcnode-id="890" instrument_node="">
</span><br data-dcnode-id="889"></div><span data-dcnode-id="887" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="881"><span data-dcnode-id="886" instrument_node="">
</span><span data-dcnode-id="882" style="font-size: large;"><b data-dcnode-id="883"><span data-dcnode-id="884" style="font-family: &quot;times new roman&quot; , &quot;serif&quot;;"><span data-dcnode-id="885" instrument_node="">Kinds/
Types of Asylum: </span></span></b></span></div><span data-dcnode-id="880" instrument_node="">
</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
There are two types of Asylum are as follows:</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">
</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
</span><b data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">A) Territorial Asylum; and</span></b><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">
</span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">
</span><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">B) Extra-territorial Asylum</span></b><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
</span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
</span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
</span><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">
</span><b data-dcnode-id="851"><span data-dcnode-id="852" style="font-size: 18.0pt;"><span data-dcnode-id="853" instrument_node="">A) Territorial Asylum:&nbsp;</span></span></b><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
</span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Territorial Asylum is granted by a State on its Territory, it is called
Territorial Asylum. The right to grant asylum by a State to a person on its own
territory flows from the fact that every State exercises territorial
sovereignty over all persons, on its territory to anyone. The grant of
territorial asylum therefore depends upon the discretion of a State which is
not under a legal obligation to grant asylum to fugitive, As no precise rules
as to grant of territorial asylum. General Assembly call upon the&nbsp;International
Law Commission in 1959 to undertake the codification of the principles and
rules of international law relating to right of asylum. On 14th December 1967
General Assembly adopted Declaration of Territorial Asylum through the adoption
of resolution. The declaration consists of a Preamble and four Articles dealing
with the principles relating to the grant of refusal of asylum. This
Declaration provides that the right to seek and enjoy asylum may not be invoked
by any person with respect to whom there are serious reasons for considering
that he has committed a crime against peace, a war crimes&nbsp;and crimes
against humanity. Article 4 of the this Declaration provides that the State
granting&nbsp; asylum shall not permit persons who have received asylum to
engage in the activities contrary to the purpose and principles of United
Nations. From the above provisions of the declaration it is clear that State
does not have absolute right to grant asylum. The grant of asylum is a part of
which cannot be exercised in respect of International crimes including
genocides.</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><b data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Some examples of territorial Asylum -</span></b><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">
</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">
1) Idi Amin has been given by Saudi Arabia.</span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
2) Baby Dok have been given asylum by&nbsp;France.</span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
3) Dawood Ibrahim mafia Don is given asylum by Dubai Government.</span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">
</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
4) Salman Rushdie for his controversial novel Satanic Verses given Asylum by
Great Britain.</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
5) Talisman Noreen a Bangladeshi writer for her novel Raja granted asylum by
Sweden.</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
</span><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
6) Tiger Menno, wanted in Bombay Bomb blast case, granted asylum by
Pakistan.</span><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
7) Dalai Lama and his followers was granted asylum by government of India.</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">
</span><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
</span><b data-dcnode-id="800"><span data-dcnode-id="801" style="font-size: 18.0pt;"><span data-dcnode-id="802" instrument_node="">B) Extra-territorial Asylum -</span></span></b><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Active protection is given outside the territory not belonging to the state
granting it. Thus when Asylum is&nbsp;granted by a State at places outside its
own territory. It is called extra-territorial Asylum’. It usually describes to
those cases in which a State refuses to surrender a person demanding who is not
upon its own physical territory but is upon one of its public ships lying&nbsp;in
foreign territorial&nbsp; borders or upon its diplomatic premises within
foreign territories. Thus Asylum is given at legation, consular premises and
warships are the instances of extra-territorial asylum.</span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
</span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
</span><b data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">1. Diplomatic Asylum / Asylum in Legation:&nbsp;</span></b><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
</span><b data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">&nbsp;</span></b><span data-dcnode-id="783" instrument_node=""> </span><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
</span><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Since granting extra-territorial
Asylum or diplomatic Asylum involves derogation from the sovereignty of&nbsp;the
State,&nbsp;International law ordinarily does not recognize a right to grant
asylum in the premises of legation. But </span><b data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">asylum may be granted in the
legation premises in the following exceptional cases.</span></b><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">
</span><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">
1)&nbsp; Individual who are physically in danger from violence.</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
</span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">
2)&nbsp; Where there is well established and binding local custom.</span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">
</span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">
3) When there is a special treaty between territorial State and the state of
Legation&nbsp;concern.</span><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">
Asylum in consular premises -</span><br data-dcnode-id="762"><span data-dcnode-id="761" instrument_node="">
</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span><b data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">2. The above principle also applies in the case of Grant of asylum in
consular premises.</span></b><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">
</span><br data-dcnode-id="754"><span data-dcnode-id="753" instrument_node="">
</span><b data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">3. Asylum in the premises of international institution -</span></b><br data-dcnode-id="750"><span data-dcnode-id="749" instrument_node="">
</span><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Though International Law does not recognize any rule regarding the grant of
asylum in the premises of International&nbsp;institution, however, temporary
Asylum may be granted in case of danger of imminent violation.</span><br data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">
</span><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">
</span><b data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">4. Asylum in Warship -&nbsp;</span></b><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">
</span><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
</span><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
There are conflicting views to grant of asylum in warship, but it is argued
that Asylum may be granted to political offenders.</span><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
As far as an asylum Warship is concerned, it may be granted on the ground of
humanity, in cases if extreme danger to the individual seeking it. Thus, right
to grant asylum on Warship may be granted in the same way in the case of
Legation and also subject to the operation of the same conditions.</span><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">
</span><br data-dcnode-id="728"><span data-dcnode-id="727" instrument_node="">
</span><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">5. Asylum in Merchant Vessels -&nbsp;</span></b><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
</span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">
</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Since merchant vessels do not enjoy immunity from local jurisdiction, they are
not competent to Grant asylum to local offenders. Thus, if a person after committing
a crime on shore seeks asylum on board a foreign merchant ship he may be
asserted by the local police, either before the ship leaves the port or when it
comes into another port of the same State. There is, therefore a rule that
asylum is not granted on merchant vessels. However, State may grant asylum if
they conclude a treaty to&nbsp;this effect.</span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">
</span><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">
</span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
</span><b data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">6. Asylum in the premises of international Institutions: </span></b><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">
</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Whether a person taking refuge in the premises of an international institution
or organization would be granted asylum is a question which cannot be given
with certainty in the absence of any rule in this regard and also because of
lack of practice. However, a right to grant temporary refuge in an extreme case
of danger from mob cannot be ruled out.</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Thus, in&nbsp;Extra-territorial or diplomatic Asylum, Asylum can be granted in
exceptional cases and it is necessary to establish legal basis in each
particular case.</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
</span><div class="MsoNormal" data-dcnode-id="696"><span data-dcnode-id="698" instrument_node="">
</span><br data-dcnode-id="697"></div><span data-dcnode-id="695" instrument_node="">
