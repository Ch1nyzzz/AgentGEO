</span><div class="breadcrumb" data-dcnode-id="1366" xmlns:v="http://rdf.data-vocabulary.org/#"><span class="root" data-dcnode-id="1377" typeof="v:Breadcrumb"><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indianlegalsolution.com/" property="v:title" rel="v:url"><span data-dcnode-id="1379" instrument_node="">Home</span></a></span><span data-dcnode-id="1375"><i class="ribbon-icon icon-angle-double-right" data-dcnode-id="1376"></i></span><span data-dcnode-id="1372" typeof="v:Breadcrumb"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indianlegalsolution.com/category/legal-articles/" property="v:title" rel="v:url"><span data-dcnode-id="1374" instrument_node="">Legal Articles</span></a></span><span data-dcnode-id="1370"><i class="ribbon-icon icon-angle-double-right" data-dcnode-id="1371"></i></span><span data-dcnode-id="1367"><span data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Asylum in International Law</span></span></span></div><span data-dcnode-id="1365" instrument_node="">

</span><h1 class="title single-title" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Asylum in International Law</span></h1><span data-dcnode-id="1359" instrument_node="">
</span><span data-dcnode-id="1357" instrument_node="">
</span><span data-dcnode-id="1355" instrument_node="">
</span><div class="post-info" data-dcnode-id="1333"><span data-dcnode-id="1354" instrument_node="">
</span><span class="theauthor" data-dcnode-id="1348"><span data-dcnode-id="1352"><i class="ribbon-icon icon-users" data-dcnode-id="1353"></i></span><span data-dcnode-id="1351" instrument_node="">By&nbsp;</span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indianlegalsolution.com/author/raghvendra123/" rel="author" title="Posts by Indian Legal Solution"><span data-dcnode-id="1350" instrument_node="">Indian Legal Solution</span></a></span><span data-dcnode-id="1347" instrument_node="">
</span><span class="featured-cat" data-dcnode-id="1342"><span data-dcnode-id="1345"><i class="ribbon-icon icon-bookmark" data-dcnode-id="1346"></i></span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indianlegalsolution.com/category/legal-articles/" rel="category tag"><span data-dcnode-id="1344" instrument_node="">Legal Articles</span></a></span><span data-dcnode-id="1341" instrument_node="">
</span><span class="thecomment" data-dcnode-id="1335"><span data-dcnode-id="1339"><i class="ribbon-icon icon-comment" data-dcnode-id="1340"></i></span><span data-dcnode-id="1338" instrument_node="">&nbsp;</span><a data-dcnode-id="1336" href="#respond"><span data-dcnode-id="1337" instrument_node="">0 Comments</span></a></span><span data-dcnode-id="1334" instrument_node="">

</span><span data-dcnode-id="1326" instrument_node="">
</span><div class="post-single-content box mark-links" data-dcnode-id="814" id="content"><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1321"><strong data-dcnode-id="1322"><u data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">ASYLUM</span></u></strong></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1317"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Author: Akanksh Deekonda, NLIU-Bhopal</span></strong></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1313"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">What is Asylum?</span></strong></p><span data-dcnode-id="1312" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">Asylum is the protection granted as a Political refugee by a state who has left their Home country. An </span><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Asylum Seeker </span></strong><span data-dcnode-id="1308" instrument_node="">is a person who has been displaced from his home country to another state. This Asylum Seeker is also called a “Refugee”. However, every person who gets displaced may not be a Refugee. A person gets refugee status if he applies for the country to get refugee protection and that application subsequently granted by the country in which he wants to seek asylum. A person becomes an “Asylee” if the applicant’s claim for the Refugee is granted. An Asylum seeker is a person who applies to get Asylum, once he gets that status, he can be called a Refugee.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Every person has a right to seek Asylum according to Article 14 of UDHR, the universal declaration of Human Rights. Asylum, in general, is granted to protect the people legally who are traveling from one country to the other country. These people are afraid to stay in their home country. It is granted to those people who are unwilling or unable to live in their home country. This is because of the reason for persecution or any other well-founded fear of persecution on various accounts regarding Religion, Nationality, or even a membership in any political opinion or social group.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Asylum is an application that is made by someone during their lifetime for a country which he wishes to go to. The application regarding the same should before 1 year of entrance to a country according to law. This rule is not without any exceptions:</span></p><span data-dcnode-id="1300" instrument_node="">
</span><ul data-dcnode-id="1291"><li data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Any individual can apply to get Refugee status by filling and subsequently submitting an application to the country’s Immigration and Citizenship Authorities;</span></li><li data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">If the person who seeks Asylum has a hearing in front of an immigration judge or has a removal proceeding, this person can move forward this asylum application in the court;</span></li><li data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">The decision given by the Immigration and Citizenship authorities which denies the Refugee status of the applicant, this applicant can still file an appeal before the Board of Immigration Appeals or any appropriate Court of Appeal.</span></li><li data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Some Advocates provide necessary assistance during all the time of this Asylum process to the public. This assistance extends to providing the applicants with any help concerning an appeal if it got rejected at first instance.</span></li></ul><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1287"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">What is a Political Asylum</span></strong></p><span data-dcnode-id="1286" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Political Asylum is an Asylum that is sought by someone when they are scared to live in their own country. This Asylum will make sure that they will go to another country. The permission that the other country gave to someone to allow him to live in that country is called Political Asylum.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The applicants who seek Asylum generally regard them as the victims of Denigration, Physical Harm, or any other Threats. These people are very subject to the violation of fundamental rights.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Article 14 of the UDHR (Universal Declaration of Human Rights) and other rules in the International Human Rights Law affirms political asylum. The countries who have ratified to the (UNC) United Nations Conventions Regarding the status of refugees, should allow the eligible persons.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">One of the main Criteria for some Applicants to Qualify is that he seeks Asylum because he faces the following situations in his Home Country. Situations like:</span></p><span data-dcnode-id="1274" instrument_node="">
</span><ul data-dcnode-id="1267"><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Membership into a specific Religion/ Social Activity or any Social group.</span></li><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Any opinions which are politically handed.</span></li><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Depending upon the sexual orientation or the personal appearance of the applicant, etc.</span></li></ul><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">People who sought political asylum are often called “refugees”.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Economic Refuge</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Economic Refugees are not political refugees. Economic refugees are Applicants who travel from a poor country to a richer country so that they would work and make ample sums of money. These people after earning, often send back to their families.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1254"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">What is the Convention on Political Asylum, 1933?</span></strong></p><span data-dcnode-id="1253" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">On December 10</span><sup data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">th</span></sup><span data-dcnode-id="1249" instrument_node="">, 1948, the Universal Declaration of Human Rights was formed which subsequently led to the establishment of the Charter of Human Rights.&nbsp; After the formation, the General Assembly has strongly declared to abide with the principle which makes all human beings on earth to enjoy their freedom and their rights without any discrimination.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">The United Nations, on its various occasions, has manifested its concern for the Refugees. They had also ensured that the Refugees are to be assured and endeavored with the widest possible exercise of the Fundamental Freedoms and the other rights.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">The 1933 convention has come with a new impact and came as a desirable agreement that revised and consolidated all the International agreements which deal with the Refugee status existed on that date. This new convention also extended the scope and protection by the means of all such agreements.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The major aspects which are brought up by the convention are dealing with some countries which unduly place heavy burdens in order to gain Refugees to ease them and find a satisfactory solution for all the existing problems. The convention has soon recognized an international scope and nature by expressing its rules and regulations to all States. It also recognized the humanitarian and social causes and problems that are faced by the refugees and tried to prevent them.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">The convention comprises of General Provisions, obligations regarding Non-discrimination, religion, rights granted by the convention, Exceptional methods, Provisional Methods. It also deals with Juridical Status, Welfare, Administrative measures, Executor and transitory Provisions, and all other final Clauses.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1232"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">What is the benefit of asylum?</span></strong></p><span data-dcnode-id="1231" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">People whom the Refugee Status are entitled to get the benefits of Asylum. These benefits include:</span></p><span data-dcnode-id="1228" instrument_node="">
</span><ul data-dcnode-id="1219"><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">These people can live in the country they wish for getting Asylum;</span></li><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The Asylee could initiate court proceedings. Those include filing for their minor children and spouse;</span></li><li data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">The Asylee can even apply for a permanent residence. He can even apply for Citizenship.</span></li><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">He can travel anywhere outside the country.</span></li></ul><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1215"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">What is the process for gaining asylum?</span></strong></p><span data-dcnode-id="1214" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">The following procedure to be followed for any individual who desires to seek a Refugee Status in another country.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><ol data-dcnode-id="1200" type="1"><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The application needs to be taken from the destined country’s Immigration and Citizenship authorities. This application can even be filed or taken online for some countries like the USA. This is according to Article IV A of 1951 of Refugee convention.</span></li><li data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">All the requisite things are done which are mentioned in the Application and the same to be submitted to the authorities after successful completion of things mentioned under the application.</span></li><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">There are certain rules like it should be filed before a certain period before entering the country. For Example, the application for the United States should be made in a year, if one wishes to enter the United States. There can be even some exceptions to this deadline.</span></li><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">If the authorities reject the application, He can still file an appeal in the Board of Immigration Appeals or any appropriate Court of Appeal. The procedure for filing the same would be done according to the Refugee convention of other Refugee laws concerning the countries. Article 16 of the refugee convention gives the right to access the courts.</span></li><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">If the applicant is with removal proceedings which subsequently made him have a hearing in front of Immigration judge. This person can make the Asylum application in this hearing.</span></li></ol><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Who can grant Asylum?</span></strong></p><span data-dcnode-id="1195" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The grant of Asylum is generally issued by the Immigration Authorities of the country in which he seeks Asylum. This is recognized as the official Refugee status of that particular person. The person who sought Refugee Status is recognized as a “refugee” who is governed under The Refugee Convention of 1951. He may be even governed under The European Convention on Human rights or any other Existing Refugee laws.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">If asylum is sought out by European Countries, the signatories of the refugee convention often create their policies to access the protection status to asylum seekers.&nbsp; The applicants for refugee status can be rejected or accepted changes concerning time and concerning country.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1186"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">What is the Role of Asylum under International Law?</span></strong></p><span data-dcnode-id="1185" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Under the principles of International Law, the right to seek Asylum is a diplomatic embassy. It can be used because the embassy buildings are exterritorial. Moreover, it represents a small portion of people who are sent from one state to the other state (Receiving state). But this theory is ruled out today. The reason for seeking refuge has been modeled out with time and it is no more given to establish Diplomatic relations.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The Present-day, the refugee is used as an Immunity where the embassy depends in the country to waive the application of Jurisdiction who have actually committed some crimes in their home country. It has also been confirmed by the International Court of Justice asylum could be granted on “humanitarian grounds” concerning the protection of political offenders who had committed any disorderly or violent action.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">In the hands of justice, the ‘arbitrary action’ would be substituted by the principle of “rule of law”. This international law also directs that any ambassador should not offer hospitality in no means for a person who is termed as a ‘Political offender’. The latest version of SATOW(An European convention) tells that it is the right to give asylum to political refugees has been denied and this denial has been established as a doctrine in the house of diplomatic agents.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">The United States has also taken similar lines, a little later i.e. in the 20</span><sup data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">th</span></sup><span data-dcnode-id="1172" instrument_node=""> Century. For America, it came through as an experience where the missionary, unfortunately, had given asylum to a Persian Jew in his residence which later made the Government issue controversial statements like the US government declared that the domiciliary rights of US Citizens in Persia may not be expanded to embrace the protection by them of Persian subjects. By 1856, The consular and diplomatic relations thereby positively inhibited.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">The French were also followed within the lies of the United States by saying that Humanity in its true form engages us to receive only a small number of Men who are expelled from their home, not for any crime or demerit.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">This same line has been followed by every Nation later, who has the right to refuse to admit an alien into its territory who has come to evident danger or cause the country any serious trouble. The present-day, A country has no absolute right to grant exile at will and settle any political offender. It has become an absolute discretionary for a state to decide Asylum for an applicant. The applicant must seek the permission of the sovereign of that country. If at all, if the permission is refused, he is bound to submit for that country. The country which expounds/ deports thereby must establish definite and just for preventing/prohibiting him from offering an Asylum. The man once refused and has no further demand for it.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1161"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">What are the different types of Asylum available?</span></strong></p><span data-dcnode-id="1160" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">There are 2 general types and 2 special types of methods to claim asylum in any Country. The general type comprises an “affirmative asylum” process which concerns the individuals who are not involved in removal proceedings as such. The second type is the “defensive asylum process”, which is for the individuals who are in removal proceedings.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Removal proceedings are these proceedings where the state government orders the applicant which are to be removed or have to be deported from the country in which he seeks Refugee status.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Affirmative Asylum:</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Any applicant who hasn’t been listed in the removal proceedings can subsequently apply for asylum by the Government of the country in which he wants Refugee status. It happens through the Immigration and Citizenship Authorities of that country which can be governed under the Refugee Convention, 1951; other Conventions or the Refugee laws of that country.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">If the asylum officer has not granted the asylum status to the person, the applicant in this stage is referred to have removal proceedings. This is a stage where the applicant can request or renew the asylum by undergoing the defensive process and having an appearance before the immigration judge. Any information about the affirmative asylum process can be found on the websites which are maintained by the country concerning the “Immigration and citizenship services”</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Defensive Asylum:</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Any applicant who has been through the removal proceedings can apply for the concerned Asylum defensively. This is done firstly, by applying to the&nbsp; “immigration judge” at the “(EOIR) The Executive Office for Immigration Review” through the “Department of Justice”. In simple terms, an Asylum can be applied through the defence against one’s removal from that country.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Any more detail about this process can be found on the websites which are maintained by the country concerning the “Immigration and citizenship services”.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Individuals after an apprehension, are still in the removal proceedings and are brought into custody by country police. The United States can be taken as an example.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><ul data-dcnode-id="1124"><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">entering into this country without any proper legal documents or</span></li><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">entering into the country which violates the immigration status.</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The people who were sought out by “Customs and Border Protection (CBP)” and tries to enter the country without “proper documentation”</span></li><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">&nbsp;The people who found to have been entered by carrying a credible “torture” or “fear of persecution”.</span></li></ul><span data-dcnode-id="1123" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">In both of the processes, The applicants always have a right to seek a lawyer as mentioned earlier. Besides, Some countries policy these people deprived of getting lawyers in immigration court unless they can afford to get one.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1117"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Other forms of protection (Special Types)</span></strong></p><span data-dcnode-id="1116" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">There are few other types of protection in some countries like the US besides the Defensive Asylum.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">These are “Withholding of Removal”&nbsp; or the “Convention Against Torture (CAT)”.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Withholding of removal</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">if an applicant does not fit for asylum, He still is considered for “withholding of removal”. If the applicant has been granted with ‘withholding of removal’, then he would certainly not be eligible to get permanent status in that particular country like getting a “Green Card” would be difficult. Despite this, these persons are often allowed to work or remain lawfully in the refugee-country.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">To get ‘Withholding of Removal’, the applicant must demonstrate that it is expected for him to face persecution concerning if he is deported to his home country for any of the grounds like Membership in a particular group, Nationality, Race, Religion or even political opinion. The standard of proof lies on him for ‘withholding of removal’ which would be higher than that of asylum. One needs to show at least a 50% chance that they would be persecuted.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Relief under the Convention Against Torture (CAT)</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">If the applicant is fear of receiving torture in case of deportation to his home country, he would be qualified as relief under the CAT (Convention Against Torture). To Obtain this, the applicant must prove that he is more likely to be tortured. This torture can be either directly by the government or maybe with its acquiescence in case of his return to that country. “Acquiescence” generally means that the government knows about the torture but could not afford to control it.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1092"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">What is the UNHCR Refugee&nbsp; Convention?</span></strong></p><span data-dcnode-id="1091" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The UNHCR Convention of 1951 is a Refugee Convention. It is a very important document that forms the basis of the UN Refugee Agency. It has been Ratified​ by 145 nation parties. The convention also defines the term ‘refugee’ and it outlines the rights of the displaced parties. It also entails the legal-obligations of States for protection.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">The principle on which the convention was formed is ‘non-refoulment’. In simple terms the non-return. It asserts that a Refugee should not be returned to a country in which they face serious threats to their life or freedom. This is today, taken as a customary rule of international law.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">The UNHCR serves as the ‘guardian’ for the&nbsp; 1951 Convention and even its 1967 Protocol. The legislation entails the States to cooperate with the organization and ensure that the rights of refugees are protected and respected.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1079"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">What is the Dalai- Lama case?</span></strong></p><span data-dcnode-id="1078" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">The famous Dalai-lama who has also been seen as the Buddha’s incarceration entered Indian territory in April 1959. The then Prime Minister Jawaharlal Nehru respectfully welcomed him and praised him. The communist group is anyway unhappy with his act.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Dalai-lama flew from China to India because of the indictments of the Chinese Communist Party. The Chinese ambassador directed the Indian government to send Dalai-Lama back. He did so, by calling the Indian Foreign Office. Indian then has immediately followed the 1951 Refugee Convention as Dalai-Lama fits the category, has issued the Political Asylum to him.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">This made him Dalai-Lama to seek Refugee status in India and subsequently refused to convey his statement to the Chinese Government. There is a single constitutional and legal government of Tibet and it will always be wherever the Dalai Lama would go</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The Prime Minister then issued a statement saying that the Dalai Lama had actually come along with his followers who are outnumbered to a total of 80 people who had come along the Towang Division through the check post of Chutangmu. India has decided to give all of them a Refugee Status. This was the first scenario where India has faced Refugee law after its independence.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">The Dalai Lama’s presence in India as a political refugee exacerbated the strained relations between New Delhi and Peiping. It took Red China’s prestige to its lowest point which was subsequently judged from parliamentary debates, newspapers, and private comments in official circles.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">This had badly constrained the relations between India and China. These two countries have exchanged their notes on many controversial issues regarding borders even today. The Communists of both the countries have repeatedly published their maps and disputes had subsequently arisen between them.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">In 1964 however, Nehru decided to launch “The Liaquat pact” which allowed the minorities of countries like Pakistan to seek Refuge in India. This was done to prevent minority persecution in countries like Pakistan.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">What are the other case laws regarding Asylum in India?</span></strong></p><span data-dcnode-id="1053" instrument_node="">
</span><ul data-dcnode-id="1044"><li data-dcnode-id="1045"><span data-dcnode-id="1052" instrument_node="">In the case of </span><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Gurunathan and others vs. Government of India</span></strong><span data-dcnode-id="1049" instrument_node=""> which subsequently acted as a precedent in the matter of </span><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">A. C. Mohd. Siddique vs. Government of India and others, T</span></strong><span data-dcnode-id="1046" instrument_node="">he Madras Highcourt has clearly expressed its unwillingness to allow any Sri Lankan refugees to return by using Sri Lanka against their will.</span></li></ul><span data-dcnode-id="1043" instrument_node="">
</span><ul data-dcnode-id="1037"><li data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">In the case of </span><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">P.Nedumaran vs. Union Of India</span></strong><span data-dcnode-id="1039" instrument_node=""> before the same Madras High Court, Sri Lankan refugees had prayed for a mandamus letter directed the Union of India and the State of Tamil Nadu to allow UNHCR officials to test the willingness of the refugees to return to Sri Lanka and to allow those refugees who did not wish to return to live in Indian camps. The Hon’ble Court was pleased to argue that “since the UNHCR has been involved in determining the voluntariness of the return of the refugees to Sri Lanka and is, therefore, a World Agency, it is not for the Court to consider whether or not the consent is voluntary.” Furthermore, the Court acknowledged the competence and impartiality of UNHCR representatives.</span></li></ul><span data-dcnode-id="1036" instrument_node="">
</span><ul data-dcnode-id="1022"><li data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">The Bombay High Court in the matter of </span><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Syed Ata Mohammadi vs. Union of India</span></strong><span data-dcnode-id="1032" instrument_node=""> was pleased to direct that “There is no question of deporting the Iranian refugee to Iran because the UNHCR has accepted him as a refugee.” However, the Hon’ble Court allowed the refugee to return to the country he wanted. Such an order is in accordance with the globally agreed ‘non-refoulement’ standards of refugees into their country of origin.</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1030" instrument_node="">The Supreme Court of India has in a number of cases had actually stayed deportation of refugees such as </span><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Maiwand’s Trust of Afghan Human Freedom vs. State of Punjab</span></strong><span data-dcnode-id="1027" instrument_node=""> and in </span><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">N.D.Pancholi vs. State of Punjab &amp; Others</span></strong><span data-dcnode-id="1024" instrument_node="">.</span></li></ul><span data-dcnode-id="1021" instrument_node="">
</span><ul data-dcnode-id="1014"><li data-dcnode-id="1015"><span data-dcnode-id="1020" instrument_node="">In the matter of </span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Malavika Karlekar vs. Union of India</span></strong><span data-dcnode-id="1017" instrument_node="">, The Supreme Court ordered the expulsion of Burmese refugees from the Andaman Island because “their application for refugee status was pending and the prima facie case for granting refugee status is pending.” The Supreme Court’s judgment in the Chakma refugee case clearly stated that no one shall be deprived of his or her life or freedom without the proper legal procedure.</span><strong data-dcnode-id="1016"></strong></li></ul><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1010"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">What are the rights under Asylum?</span></strong></p><span data-dcnode-id="1009" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">The “Asylee” or a person with refugee status has three basic categories of rights. They are territorial, extraterritorial, and neutral. The rights under the 1951 refugee convention are dealt with in article 5.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Territorial Rights.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Those rights are given within the territorial limits of the asylum-providing nation. It is an apparent exception to the “extradition” norm. It is mainly employed and intended to protect the individuals suspected of any political crimes such as Desertion, Sabotage, Sedition, and Treason. It became common and widespread by excluding accused persons of the certain terr</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Extraterritorial Rights</span></p><span data-dcnode-id="997" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">This form of privilege refers to “asylum” that is usually given in consulates, embassies, merchant vessels, legations, and warships that are of foreign territory and are thus given within this territory of the country requesting protection.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Such privileges are often given in diplomatic asylum-bearing embassies and are mostly in search of arguable occasions. For instance,</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Neutral Rights</span></p><span data-dcnode-id="988" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">States employ certain rights to exercise neutrality during a conflict. It also provides in its territories to give refuge to troops of belligerent states if these troops apply during the war to internment.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">In general, It is a right for a state to grant asylum to any individual, but it is not the right of that individual to be granted Asylum by the state in question. This principle has also been established in the “Universal Declaration of Human Rights (UDHR)” convention according to which the right to seek and to enjoy asylum in other countries from persecution does not explicitly provide the right of asylum.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">The other conventions like Convention relating to the Status of Refugees. This was adopted by the “United Nations (UN) Conference of Plenipotentiaries on the Status of Refugees and Stateless Persons” in 1951. It did not create any right of asylum for the people who are seeking it. It enumerates pertains only to the refugees who are “lawfully in” or the ones who are “lawfully staying in” the state which is offering shelter.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The other Individual rights of Asylum which are failed to get inserted because of the unsuccessful efforts to articulate. These are:</span></p><span data-dcnode-id="976" instrument_node="">
</span><ul data-dcnode-id="971"><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The UN General Assembly Declaration on Territorial Asylum of the year1967. This contained the objective exceptions to its non -return provision which pertains to national security and its safeguarding to its national population, and</span></li><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">A proposed Convention on Territorial Asylum, which was never materialized.</span></li></ul><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="967"><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">When can an Asylum be refused?</span></strong></p><span data-dcnode-id="966" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">It often happens When a country which cannot either recognize the refugee status of the asylum seekers or When it cannot see the Asylum seekers as the legitimate migrants by treating them as “illegal aliens”. When asylum claims to be rejected, the asylum seeker is said to be called as “refused asylum”. He can also be called a “failed asylum seeker”. In some countries, these failed asylum seekers are often allowed to either remain temporarily or can return to their home country voluntarily. Article 31 to 33 of the 1951 refugee convention deals with the question of termination or refusal of Asylum. Some countries even make violent decisions like forcibly turning them out. This has been most often seen in Deportation after immigration detention. The grant of Asylum or a Refugee status can be refused under certain grounds:</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Right to remain temporarily</span></p><span data-dcnode-id="960" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">In cases where Asylum was not granted, the applicant still has a chance to remain in the country temporarily for some time. The reasons behind this grant were CAT or persecution which have already been discussed earlier. In countries like the UK&nbsp; which follow European Conventions, the refused cases may be granted a temporary stay on the grounds of humanitarian protection. This temporary stay is usually up to 5 years or has discretionary leave.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Deportation</span></p><span data-dcnode-id="954" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">In general, the Refugees cannot be deported or forced to go back to their original country on the lines of return, which is against the principles of international law. The Asylum seekers have failed in many cases to be considered as “refugees”. These people are vulnerable and face voluntarily or involuntarily, the significant risks when getting deported.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The deportation of Asylum seekers having serious medical problems or not guaranteed by themselves for their safe return to their Home-country would go against the principles of International Law. There are instances where these people are deported by face all the risks or even when it is not safe for their return. The European conventions like the UK authorities are always been accused of giving improper attention to the medical condition of deportee or torture they face.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Deportees are often separated from their families who can be permanently or temporarily continue to remain in that country. The people, for example, the younger persons may not be allowed to deport to their Home-country in their entire life. They even sometimes cannot speak the language. There are instances where they are unaware of anyone with whom they have connections in their country. These people even have chances to get traumatized through experiences that are made in detention and there is no guarantee that they cannot be detained again when they enter their Home-country. The worst instance is getting them persecuted.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">When can the Asylum be terminated?</span></strong></p><span data-dcnode-id="941" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The temporary refugee status of an Asylee can only get terminated. It does not deal with permanent status.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The temporary refugee status can be terminated in the following instances.</span></p><span data-dcnode-id="935" instrument_node="">
</span><ul data-dcnode-id="922"><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">When there is an expiration of the set term as “Refugee”.</span></li><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">When the reasons established to get temporary status no longer exist.</span></li><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">When there is an instance that the Refugee leaves for Croatia.</span></li><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The Asylum gets terminated if the Asylee seeks protection against some other law or International Treaty.</span></li><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">When the Asylee enjoys international protection or has regulated sojourn in the third country.</span></li><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">When the Asylee has been pronounced the safety or protective measure of Expulsion.</span></li></ul><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="918"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Conclusion</span></strong></p><span data-dcnode-id="917" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The article tries to produce a brief analysis and an in-depth understanding of the concept of Asylum. It started with defining the basic terms like Refugee, Asylum Seekers, Asylee, etc. and then explaining what Asylum is and produced all the relevant details like the benefits of obtaining such to get citizenship status, etc.&nbsp; A refugee whose Asylum application has been rejected could go to an appeal. There are certain authorities which issue Asylum like the immigration and the Citizenship authorities. The article then sought to explain the types of Asylum which are categorized into 2 general types, the affirmative and the defensive and also 2 special types: the CAT and Withholding of removal. The Asylum who has been enjoying the Refugee status would certainly have some rights which are categorized into the extraterritorial, extra-territorial, and neutral type.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Special attention has been given in explaining Asylum with the international Law aspects, it brought requisites that every Asylum law of a particular country couldn’t allow certain types of people to get Refugee status. These people include the one who has committed crimes, political offenders, etc.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p class="has-text-align-justify" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The article finally undertook to examine under what conditions could asylum-seekers be punished for illegal entry and presence in a country and whether the Country’s legal regulation was compatible with this international regime.&nbsp; The Perspectives from international, European, and human rights law perspective, concerning this very narrow way of this study. The article also gave a detail, in brief, when a Refugee status or Asylum be terminated or refused.</span></p><span data-dcnode-id="908" instrument_node="">
