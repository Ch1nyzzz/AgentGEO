</span><article class="nv-single-post-wrap col post-81188 post type-post status-publish format-standard hentry category-immigration" data-dcnode-id="2609" id="post-81188"><span data-dcnode-id="4418" instrument_node="">
</span><div class="entry-header" data-dcnode-id="4396"><div class="nv-title-meta-wrap" data-dcnode-id="4397"><h1 class="title entry-title" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Just to clarify on asylum seeking</span></h1><ul class="nv-meta-list" data-dcnode-id="4398"><li class="meta date posted-on" data-dcnode-id="4411"><time class="entry-date published" content="2021-11-24" data-dcnode-id="4414" datetime="2021-11-24T18:55:12+00:00"><span data-dcnode-id="4415" instrument_node="">November 24, 2021</span></time><time class="updated" data-dcnode-id="4412" datetime="2021-11-25T07:43:12+00:00"><span data-dcnode-id="4413" instrument_node="">November 25, 2021</span></time></li><li class="meta author vcard" data-dcnode-id="4405"><img alt="Tim Worstall" class="photo" data-dcnode-id="4410" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9f51e54ff277c2640fa5a030390588d8%3Fs%3D20%26d%3Dmm%26r%3Dg&amp;raw"><span data-dcnode-id="4409" instrument_node="">&nbsp;</span><span class="author-name fn" data-dcnode-id="4406"><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timworstall.com/author/admin/" rel="author" title="Posts by Tim Worstall"><span data-dcnode-id="4408" instrument_node="">Tim Worstall</span></a></span></li><li class="meta category" data-dcnode-id="4402"><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timworstall.com/category/immigration/" rel="category tag"><span data-dcnode-id="4404" instrument_node="">Immigration</span></a></li><li class="meta comments" data-dcnode-id="4399"><a data-dcnode-id="4400" href="#comments"><span data-dcnode-id="4401" instrument_node="">36 Comments</span></a></li></ul></div></div><div class="nv-content-wrap entry-content" data-dcnode-id="4244"><p data-dcnode-id="4391"><span data-dcnode-id="4395" instrument_node="">Any time you say something like “asylum seekers should seek in their first safe country” you get referred to this </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullfact.org/immigration/refugees-first-safe-country/"><span data-dcnode-id="4394" instrument_node="">Full Fact piece</span></a><span data-dcnode-id="4392" instrument_node="">. Which is a masterpiece of not quite being clear. It’s necessary to read between the lines more than a little to pick out the real story here.</span></p><span data-dcnode-id="4390" instrument_node="">
</span><blockquote data-dcnode-id="4387"><p data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Do refugees have to stay in the first safe country they reach?</span></p></blockquote><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">The answer to that is, of course, no. Anyone can, of course, go to any country that will have them.</span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">The trick being performed here is in this phrase:</span></p><span data-dcnode-id="4380" instrument_node="">
</span><blockquote data-dcnode-id="4377"><p data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Incorrect. The UN Refugee Convention does not make this requirement of refugees, and UK case law supports this interpretation. Refugees can legitimately make a claim for asylum in the UK after passing through other “safe” countries.</span></p></blockquote><span data-dcnode-id="4376" instrument_node="">
</span><p data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">Sure, anyone can make a claim anywhere. </span></p><span data-dcnode-id="4373" instrument_node="">
</span><p data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">But there’s a huge difference between who *must* grant a claim and who *may* grant a claim if they should so wish.</span></p><span data-dcnode-id="4370" instrument_node="">
</span><p data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">The asylum seeker, refugee thing, is a right in international law. Rights are things which must be granted. They are not privileges which may or may not be, they are rights which are due simply as being a human being in this specific situation.</span></p><span data-dcnode-id="4367" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">If you are at risk in your own country then you have a right to seek safe haven.</span></p><span data-dcnode-id="4364" instrument_node="">
</span><p data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Cool. </span></p><span data-dcnode-id="4361" instrument_node="">
</span><p data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">However, that *right* extends only to that first safe haven you reach. It’s not the one next door, it’s the first your reach. That first safe haven *must* grant you that asylum, that safe haven. That’s what the right is.</span></p><span data-dcnode-id="4358" instrument_node="">
</span><p data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Now, other places might well be willing to grant you safe haven. But they don’t have to. Those after your first safe lace might well do so – and just to be clear I’ve no problem with the UK doing so for all sorts of people in large quantity too – but that is a privilege at their discretion, not a right to be had a of, umm, right under international law. </span></p><span data-dcnode-id="4355" instrument_node="">
</span><p data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">Which is why people do get denied asylum in the UK as they are deemed to have that right elsewhere – in, perhaps the previous place they were before the UK.</span></p><span data-dcnode-id="4352" instrument_node="">
</span><p data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Which is why I say that asylum seekers *should* – please note, not have to – claim in that first safe haven. Because that’s where that asylum is a right to which they have an absolute claim under international law. Claiming anywhere else is a privilege which they may or may not get granted. </span></p><span data-dcnode-id="4349" instrument_node="">
</span><p data-dcnode-id="4344"><span data-dcnode-id="4348" instrument_node="">As the Guardian </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/libertycentral/2010/sep/21/claim-asylum-uk-legal-position"><span data-dcnode-id="4347" instrument_node="">says</span></a><span data-dcnode-id="4345" instrument_node="">:</span></p><span data-dcnode-id="4343" instrument_node="">
</span><blockquote data-dcnode-id="4340"><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">There is no obligation under the refugee convention or any other instrument of international law that requires refugees to seek asylum in any particular country. There has, however, been a longstanding “first country of asylum” principle in international law by which countries are expected to take refugees fleeing from persecution in a neighbouring state. This principle has developed so that, in practice, an asylum seeker who had the opportunity to claim asylum in another country is liable to be returned there in order for his or her claim to be determined.</span></p></blockquote><span data-dcnode-id="4339" instrument_node="">
</span><p data-dcnode-id="4335"><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/magazine-33849593"><span data-dcnode-id="4338" instrument_node="">The BBC</span></a><span data-dcnode-id="4336" instrument_node="">:</span></p><span data-dcnode-id="4334" instrument_node="">
</span><blockquote data-dcnode-id="4325"><p data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">But what happens if they have passed through a safe country on their way to the UK?</span></p><span data-dcnode-id="4331" instrument_node="">
</span><p data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">There is a general principle observed by many countries that asylum seekers who have passed through a safe third country where they could have claimed asylum can be sent back there in order to make their claim.</span></p><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">All of those waiting in Calais to cross the Channel fit into this category. They are in a safe country but few will have reached France without having crossed another EU border beforehand.</span></p></blockquote><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4320"><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/uk/uk-immigration-and-asylum-plans-some-questions-answered-by-unhcr.html"><span data-dcnode-id="4323" instrument_node="">UNHCR</span></a><span data-dcnode-id="4321" instrument_node="">:</span></p><span data-dcnode-id="4319" instrument_node="">
</span><blockquote data-dcnode-id="4316"><p data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">However, asylum-seekers may be returned to a country that is deemed safe based on reliable, objective and up-to-date information, and where they could have sought asylum provided that a fair process is available to them, there are proper standards of reception and their rights under the Convention will be respected in practice.</span></p></blockquote><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Me, I’d say this is all a fair enough basis for saying asylum seekers *should* apply in first safe haven because that’s where they’ve got that legal right to it. Anywhere else it’s a privilege which they may or may not be granted.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">And I’ve got the Guardian, the BBC and UNHCR on my side in this too. And, as it happens, international law on asylum seeking.</span></p><span data-dcnode-id="4309" instrument_node="">
</span><p data-dcnode-id="4305"><a data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/943128/CCS207_CCS1220673408-002_Explantory_Memorandum_to_HC_1043__Web_Accessible_.pdf"><span data-dcnode-id="4308" instrument_node="">Plus the law</span></a><span data-dcnode-id="4306" instrument_node="">:</span></p><span data-dcnode-id="4304" instrument_node="">
</span><blockquote data-dcnode-id="4280"><p data-dcnode-id="4294"><span data-dcnode-id="4303" instrument_node="">7.3 However, as currently drafted, they allow claims to be treated as inadmissible only if</span><br data-dcnode-id="4302"><span data-dcnode-id="4301" instrument_node="">
the asylum applicant is accepted for readmission by the third country through which</span><br data-dcnode-id="4300"><span data-dcnode-id="4299" instrument_node="">
they have travelled or have a connection. A stronger approach to disincentivise</span><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">
individuals is needed to deter claimants leaving safe third countries such as EU</span><br data-dcnode-id="4296"><span data-dcnode-id="4295" instrument_node="">
Member States, from making unnecessary and dangerous journeys to the UK.</span></p><span data-dcnode-id="4293" instrument_node="">
</span><p data-dcnode-id="4281"><span data-dcnode-id="4292" instrument_node="">7.4 The changes separate the readmission requirement from the inadmissibility decision,</span><br data-dcnode-id="4291"><span data-dcnode-id="4290" instrument_node="">
allowing us to treat applicants as inadmissible based solely on whether they have</span><br data-dcnode-id="4289"><span data-dcnode-id="4288" instrument_node="">
passed through one or more safe countries in order to come to the UK as a matter of</span><br data-dcnode-id="4287"><span data-dcnode-id="4286" instrument_node="">
choice. They will allow us to pursue avenues for their removal not only to the</span><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">
particular third countries through which the applicant has travelled, but to any safe</span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">
third country that may agree to receive them. </span></p></blockquote><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">Note the point being made there. The first safe haven point always existed. The change in the law (Dec 2020) doesn’t change that first safe country thing either. It changes the ability to deport to, but not that general ability to refuse an application if this is not first safe country. </span></p><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4275" instrument_node="">Or, </span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2020/dec/10/uk-to-deny-asylum-to-refugees-passing-through-safe-third-country"><span data-dcnode-id="4274" instrument_node="">The Guardian</span></a><span data-dcnode-id="4272" instrument_node="">:</span></p><span data-dcnode-id="4270" instrument_node="">
</span><blockquote data-dcnode-id="4264"><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Ministers have quietly changed immigration rules to prevent people fleeing war or persecution from claiming asylum in the UK if they have passed through a “safe” third country, prompting accusations of a breach of international law.</span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">From 1 January, claims of asylum from a person who has travelled through or has a connection to a safe third country, including people coming from EU member states, will be treated as inadmissible.</span></p></blockquote><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">As you can see that’s slightly garbled from what the law says but that same distinction about safe countries is still made. </span></p><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4256"><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/statistics/immigration-statistics-year-ending-june-2021/how-many-people-do-we-grant-asylum-or-protection-to"><span data-dcnode-id="4259" instrument_node="">As here</span></a><span data-dcnode-id="4257" instrument_node="">:</span></p><span data-dcnode-id="4255" instrument_node="">
</span><blockquote data-dcnode-id="4252"><p data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">In the first two quarters of 2021, 7 cases were deemed to be inadmissible, meaning there was sufficient evidence that the asylum applicant had travelled via, or has connections to, another safe third country, and that country will take responsibility for the asylum application. The UK is preparing the return of these applicants.</span></p></blockquote><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">First safe haven might be something the UK government can ignore if it wishes. It might be of minor relevance to the vast majority of cases. It could be that it’s a distinction that *shouldn’t* be made on moral or other grounds. But there’s absolutely no doubt that it’s a concept that does exist in the relevant law.</span></p><span data-dcnode-id="4248" instrument_node="">
</span><p data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">As to the other country being willing to accept them. This is rather “Hmm, so, does the concept of first safe haven exists” “Err, yes” “So, what do we do about it?”” “Ahh, that’s difficult”. OK, it is difficult, but we have established that the concept exists, haven’t we? </span></p><span data-dcnode-id="4245" instrument_node="">
</span></div><div class="nv-post-navigation" data-dcnode-id="4231"><div class="previous" data-dcnode-id="4238"><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timworstall.com/2021/11/that-would-be-a-remarkable-coincidence-wouldnt-it/" rel="prev"><span class="nav-direction" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">previous</span></span><span data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">That would be a remarkable coincidence, wouldn’t it?</span></span></a></div><div class="next" data-dcnode-id="4232"><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timworstall.com/2021/11/american-law-is-just-so-weird/" rel="next"><span class="nav-direction" data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">next</span></span><span data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">American law is just so weird</span></span></a></div></div><span data-dcnode-id="4230" instrument_node="">

</span><p data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Writing a blogpost does not make what you say correct. </span></p><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4191"><span data-dcnode-id="4194" instrument_node="">There is no such thing as a “first safe haven” under international law, nor under UK law. Please familiarise yourself with the Geneva Convention on Refugees, to which the UK is a signatory and which is the foundation of UK law on asylum seeking. </span><a data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/pages/49da0e466.html" rel="nofollow ugc"><span data-dcnode-id="4193" instrument_node="">https://www.unhcr.org/pages/49da0e466.html</span></a></p><span data-dcnode-id="4190" instrument_node="">
</span><p data-dcnode-id="4186"><span data-dcnode-id="4189" instrument_node="">The only law where there was such a thing was the EU’s Dublin Agreement, and even that did not refuse asylum seekers the right to travel through safe countries without claiming asylum. All it did was allow EU countries to send asylum seekers to other countries for processing, which could be because they had applied for asylum in those countries or registered their presence, or could be because they had a connection to those countries, eg family members. Under the Dublin Agreement, EU countries could – and did – send some asylum seekers to the UK for processing. However, as the UK has now left the EU, the Dublin Agreement no longer applies in the UK. The UK no longer has any right to send asylum seekers to EU countries for claim processing. </span><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonslibrary.parliament.uk/what-is-the-dublin-iii-regulation-will-it-be-affected-by-brexit/" rel="nofollow ugc"><span data-dcnode-id="4188" instrument_node="">https://commonslibrary.parliament.uk/what-is-the-dublin-iii-regulation-will-it-be-affected-by-brexit/</span></a></p><span data-dcnode-id="4185" instrument_node="">

</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">International law obviously isn’t real. If it was, Tony Blair, George Dubya and David Cameron would have been tried and convicted at the Hague long before now, instead of being free and suspiciously wealthy men.</span></p><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">So the “international law” argument is obviously bollocks. States do what they want to do, for the most part.</span></p><span data-dcnode-id="4061" instrument_node="">
</span><p data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Asylum was a good idea at the time the concept was developed – relatively small numbers of persecuted Cold War dissidents moving over relatively small geographic distances to avoid being murdered by Communists. That era is long gone, and as we’ve seen, asylum seeking is now nothing more than a scam perpetrated at the expense of mug taxpayers and raped children.</span></p><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">The correct number of “refugees” and “asylum seekers” to allow into our country is zero. We shouldn’t be too prescriptive though. If any of our compatriots are desperate to play Lady Bountiful to semi-retarded goatherds who’d slit your throat at the drop of a hijab, they are free to move to Beirut or Birmingham or whatever.</span></p><span data-dcnode-id="4055" instrument_node="">

</span><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">I will neither wish nor celebrate anyone’s death, but those choosing to cross The Channel illegally take their lives in their hands to do so and while mostly they may succeed, death by drowning is only a wave away.</span></p><span data-dcnode-id="4019" instrument_node="">
</span><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">The UK might rail against France for inaction against these economic migrants, but it is the weakness and generosity of UK welfare that is the magnet to which these people are attracted. If we actually implemented the rules that we are entitled to do and have threatened for decades (i.e. those coming by illegal means from existing safe havens will be rejected out of hand) then there would only be small numbers attempting such journeys, possibly not even enough to justify the people smugglers making them.</span></p><span data-dcnode-id="4016" instrument_node="">
</span><p data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">The second point is that those making such claims need to be contained until their claims are tested and, if rejected, subject to immediate deportation, either back to the country from which they originate or back to the safe haven country from which they arrived.</span></p><span data-dcnode-id="4013" instrument_node="">
</span><p data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Allowing them to mingle within the settled community and weave such lies as the recent Liverpool Hospital bomber does is simply to weaken ourselves against these economic migrants masquerading as asylum seekers. That they are able to use public funds to which they have not contributed in their fight against deportation for illegal entry is an abomination to the taxpayers having to pay for their ingratitude.</span></p><span data-dcnode-id="4010" instrument_node="">

</span><span class="fn author" data-dcnode-id="3936"><a class="url" data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.coppolacomment.com/" rel="external nofollow ugc"><span data-dcnode-id="3938" instrument_node="">FRANCES COPPOLA</span></a></span><span data-dcnode-id="3935" instrument_node="">

</span><p data-dcnode-id="3920"><span data-dcnode-id="3923" instrument_node="">Oh, and here’s UK case law establishing that asylum seekers can travel through intermediate countries to reach the UK without prejudicing their right to claim asylum here. </span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/pdfid/3ae6b6b41c.pdf" rel="nofollow ugc"><span data-dcnode-id="3922" instrument_node="">https://www.refworld.org/pdfid/3ae6b6b41c.pdf</span></a></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">The judgment quotes UNHCR guidelines on the interpretation of Article 31: </span></p><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3915" instrument_node="">“The expression ‘coming directly’ in Article 31(1) covers the situation of a person</span><br data-dcnode-id="3914"><span data-dcnode-id="3913" instrument_node="">
who enters the country in which asylum is sought directly from the country of</span><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node="">
origin, or from another country where his protection, safety and security could not</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node="">
be assured. It is understood that this term also covers a person who transits an</span><br data-dcnode-id="3908"><span data-dcnode-id="3907" instrument_node="">
intermediate country for a short period of time without having applied for, or</span><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node="">
received, asylum there. No strict time limit can be applied to the concept ‘coming</span><br data-dcnode-id="3904"><span data-dcnode-id="3903" instrument_node="">
directly’ and each case must be judged on its merits.”</span></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Lord Justice Simon Brown said that the length of stay in the intermediate country would be a criterion for determining whether the right to claim asylum was forfeit. Note however the comment in parentheses. Making it difficult for asylum seekers to travel here from France means Article 31 is more, not less, likely to apply. </span></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3882"><span data-dcnode-id="3897" instrument_node="">“I conclude that any merely short term stopover en</span><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">
route to such intended sanctuary cannot forfeit the protection of the Article, and</span><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">
that the main touchstones by which exclusion from protection should be judged are</span><br data-dcnode-id="3892"><span data-dcnode-id="3891" instrument_node="">
the length of stay in the intermediate country, the reasons for delaying there (even</span><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">
a substantial delay in an unsafe third country would be reasonable were the time</span><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">
spent trying to acquire the means of travelling on), and whether or not the refugee</span><br data-dcnode-id="3886"><span data-dcnode-id="3885" instrument_node="">
sought or found there protection de jure or de facto from the persecution they were</span><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node="">
fleeing.”</span></p><span data-dcnode-id="3881" instrument_node="">

</span><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Bobby B: As our host has pointed out, international law does *not* state that you have to stop there. It states that “there” has a legal duty to consider your application there, and applicants have a right to be considered there. Anything else is entirely the *CHOICE* of the applicant and the *CHOICE* of the processor. But it is entirely that, a *CHOICE*. If you *CHOOSE* to pass through a safe country and apply in another county, you have no *RIGHT* to be processed there, just an ability to ask that the host country process you, and that county has no *DUTY* to process you, just a *CHOICE* to do so.</span></p><span data-dcnode-id="3263" instrument_node="">
</span><p data-dcnode-id="3259"><span data-dcnode-id="3262" instrument_node="">The *RIGHT* of application is the first safe country. I have the right to smoke tobacco. That right does not force me to smoke tobacco. I can *CHOOSE* to do something else.</span><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node="">
The first safe country has a *DUTY* of processing an application. That does not force other countries to refuse to process applications. My Mum has a duty to pay her electricity bill. That does not ban me from paying her electricity bill. I can *CHOOSE* to pay it.</span></p><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Why are so many people so unable to understand opposites? The opposite of being forced is *NOT* being forced to abstain. It is just plain and simple *NOT* being forced, it leave you completely free to choose.. The opposite of not requiring is *NOT* being forced to, it is plain and simple not a requirement, it leaves it a free choice.</span></p><span data-dcnode-id="3255" instrument_node="">

International law. As Steve says, international law is a fiction. It bears no relationship to national law. There is no legislature to enact it &amp; there is means to enforce compliance with it. It’s simply an agglomeration of treaties &amp; agreements between nations where might is right. Powerful nations choose whether or not to abide by it, although less powerful may be forced to by the powerful. With reference to the various treaties &amp; agreements surrounding asylum, they were dreamed up by woolly minded intellectuals like Ms Coppola when they thought they would only apply to woolly minded intellectuals like Ms Coppola. If they’d envisaged, for instance, the entire population of Eastern Europe decamping en mass to the West &amp; demanding asylum from the horrors of communism &amp; camping on their doorsteps, they’d have opposed with ever atom of their bodies. It was supposed to provide refuge for a few intellectuals, not the proles. They could stay &amp; suffer.</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">
Rights. Without a matching obligation, rights don’t exist. So it’s not whether asylum seekers have a right to asylum but whether those they want to accept them regard they have an obligation to. Ms Coppola seems to think everyone else but her should be required to accept the obligation. As presumably she doesn’t want them all round her place. Is she housing even one?</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">
France. I’ve a lot of sympathy for the French. Also some respect. I spent some years living in the part of France these “asylum seekers” are departing from. The idea that the French are doing nothing to impede them is nonsense. I can well remember the Gendarmerie sitting at the Meteren junction of the A25 &amp; being stopped in the early hours if they didn’t recognise my car. Checking for illegal immigrants &amp; traffickers. And that’s 50 kilometres back from the coast. I know what the residents along the coast from Dunkerque past Calais feel about this riff-raff of thieves imposing themselves on them. It’s why it’s more a British problem than a French problem. The French are not welcoming. They don’t claim asylum in France because they’ll hard time from the individual French. They will not provide accommodation for them or give them employment &amp; they leave their own government with no uncertainty in the matter. They’re trying to get to the UK because they think they’ll get a better reception there. And thanks to the influence of woolly minded intellectuals like Ms Coppola they do.</span><br data-dcnode-id="2892"><span data-dcnode-id="2891" instrument_node="">
The answer to the problem is for the UK to unilaterally abrogate its obligations under these various treaties &amp; agreements. Something, as an independent nation state, it’s entirely free to do. Yes, no doubt it’ll be subject to brief international opprobrium. Whilst all affected nations will breath a sigh of relief, quietly thank the UK for taking a lead &amp; get on with doing the same themselves before the entire continent gets overrun..</span></p><span data-dcnode-id="2889" instrument_node="">
