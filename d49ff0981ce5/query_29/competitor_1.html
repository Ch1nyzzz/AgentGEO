4.4,0-8,3.6-8,8L64.2,72z" data-dcnode-id="871" data-reactid="277" display="inline"></path></svg></a><a class="article-share-link article-share--print" data-dcnode-id="865" data-reactid="278" href="javascript:window.print();" title="Print"><svg class="icon icon-print" data-dcnode-id="866" data-reactid="279" viewBox="0 0 45 45"><g data-dcnode-id="867" data-reactid="280"><path d="M42.5,19.408H40V1.843c0-0.69-0.561-1.25-1.25-1.25H6.25C5.56,0.593,5,1.153,5,1.843v17.563H2.5 c-1.381,0-2.5,1.119-2.5,2.5v20c0,1.381,1.119,2.5,2.5,2.5h40c1.381,0,2.5-1.119,2.5-2.5v-20C45,20.525,43.881,19.408,42.5,19.408z M32.531,38.094H12.468v-5h20.063V38.094z M37.5,19.408H35c-1.381,0-2.5,1.119-2.5,2.5v5h-20v-5c0-1.381-1.119-2.5-2.5-2.5H7.5 V3.093h30V19.408z M32.5,8.792h-20c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25h20c0.689,0,1.25,0.56,1.25,1.25 S33.189,8.792,32.5,8.792z M32.5,13.792h-20c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25h20c0.689,0,1.25,0.56,1.25,1.25 S33.189,13.792,32.5,13.792z M32.5,18.792h-20c-0.69,0-1.25-0.56-1.25-1.25s0.56-1.25,1.25-1.25h20c0.689,0,1.25,0.56,1.25,1.25 S33.189,18.792,32.5,18.792z" data-dcnode-id="868" data-reactid="281"></path></g></svg></a></div></div></div></header><section class="article-section--lead-image article-section--lead-image--standard" data-dcnode-id="855" data-reactid="282"><figure class="article-fig" data-dcnode-id="856" data-reactid="283"><div class="article-fig-inner" data-dcnode-id="859" data-reactid="284"><img alt="Salvadoran migrant Cesar Jobet, left, talks with fellow migrant Daniel Jeremias Cruz, from the U.S. side of the in Playas de Tijuana, Mexico on Nov. 30. (Ramon Espinosa/AP)" class="article-image" data-dcnode-id="860" data-reactid="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1203_migrants-1000x667.jpg&amp;raw"></div><figcaption class="article-fig-caption" data-dcnode-id="857" data-reactid="286"><span data-dcnode-id="858" instrument_node="">Salvadoran migrant Cesar Jobet, left, talks with fellow migrant Daniel Jeremias Cruz, from the U.S. side of the in Playas de Tijuana, Mexico on Nov. 30. (Ramon Espinosa/AP)</span></figcaption></figure></section></span><section class="article-section--centered article-section--age-label" data-dcnode-id="843" data-reactid="287"><span data-dcnode-id="844" data-reactid="288"><span data-dcnode-id="852" instrument_node="">This article is more than </span><span data-dcnode-id="849" instrument_node="">3 years</span><span data-dcnode-id="846" instrument_node=""> old.</span></span></section><span data-dcnode-id="656" data-reactid="292"><section class="article-section--content hang-punctuation article-section--first article-section--centered" data-dcnode-id="726" data-reactid="293"><p class="" data-dcnode-id="838" data-reactid="294"><span data-dcnode-id="842" instrument_node="">Thousands of migrants traveling together to flee dire circumstances in their native Central American nations are camped in towns and cities edging the U.S.-Mexico border. Many hold out hopes that despite intense political pushback, they'll be given a chance to apply in the U.S. for the humanitarian immigration status known as </span><a class="elr" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-asylum/asylum" rel="noopener" target="_blank"><span data-dcnode-id="841" instrument_node="">asylum</span></a><span data-dcnode-id="839" instrument_node="">.</span></p><p class="" data-dcnode-id="830" data-reactid="295"><span data-dcnode-id="837" instrument_node="">Many of the people in the </span><a class="elr" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/npr/659327955/migrant-caravan-grows-to-5-000" rel="noopener" target="_blank"><span data-dcnode-id="836" instrument_node="">migrant caravan</span></a><span data-dcnode-id="834" instrument_node=""> traversed hundreds of miles, often on foot, to reportedly escape extreme poverty and targeted violence in their native countries — especially </span><a class="elr" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/tag/dispatches-central-america"><span data-dcnode-id="833" instrument_node="">El Salvador, Guatemala and Honduras</span></a><span data-dcnode-id="831" instrument_node="">.</span></p><p class="" data-dcnode-id="825" data-reactid="296"><span data-dcnode-id="829" instrument_node="">These people are representative of the increase in asylum-seekers coming to the U.S. in recent years. According to a&nbsp;</span><a class="elr" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/globaltrends2016/"><span data-dcnode-id="828" instrument_node="">report</span></a><span data-dcnode-id="826" instrument_node=""> from the United Nations High Commissioner for Refugees, the U.S. received 262,000 asylum applications in 2016 — double the number in 2014 — with almost half of the applications coming from Central American nationals.</span></p><figure class="article-fig size-large" data-dcnode-id="820" data-reactid="297"><a class="lightbox" data-dcnode-id="823" data-reactid="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1203_migrant-caravan.jpg"><img alt="Members of a U.S.-bound migrant caravan stand on a road after federal police briefly blocked their way outside the town of Arriaga in Mexico on Oct. 27. (Rodrigo Abd/AP)" class="size-large article-image lazyloaded" data-dcnode-id="824" data-reactid="299" data-src="https://d279m997dpfwgl.cloudfront.net/wp/2018/11/1203_migrant-caravan-1000x750.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1203_migrant-caravan-1000x750.jpg&amp;raw"></a><figcaption class="article-fig-caption" data-dcnode-id="821" data-reactid="300"><span data-dcnode-id="822" instrument_node="">Members of a U.S.-bound migrant caravan stand on a road after federal police briefly blocked their way outside the town of Arriaga in Mexico on Oct. 27. (Rodrigo Abd/AP)</span></figcaption></figure><p class="" data-dcnode-id="812" data-reactid="301"><span data-dcnode-id="819" instrument_node="">President Trump has consistently criticized asylum as his administration pushes to curb both legal and illegal immigration to the U.S. He has referred to the nation's longstanding policy of asylum as "</span><a class="elr" data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/realDonaldTrump/status/980958298445885446"><span data-dcnode-id="818" instrument_node="">ridiculous</span></a><span data-dcnode-id="816" instrument_node="">," often lamenting the </span><a class="elr" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/ilink/docView/SLB/HTML/SLB/0-0-0-1/0-0-0-29/0-0-0-1687.html"><span data-dcnode-id="815" instrument_node="">legal infrastructure</span></a><span data-dcnode-id="813" instrument_node=""> that protects the rights of asylum-seekers.</span></p><p class="" data-dcnode-id="807" data-reactid="302"><span data-dcnode-id="811" instrument_node="">Months before his forced resignation this month, former U.S. Attorney General Jeff Sessions claimed the asylum application process was "</span><a class="elr" data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/03/12/592823598/attorney-general-jeff-sessions-reshapes-who-qualifies-for-asylum"><span data-dcnode-id="810" instrument_node="">being gamed</span></a><span data-dcnode-id="808" instrument_node="">," insisting that fraudulent petitions flood the system and prevent legitimate applications from being efficiently processed. Immigrant advocates say the rollback of asylum measures is just another step in the Trump administration's assault on legal immigration.</span></p><p class="" data-dcnode-id="805" data-reactid="303"><span data-dcnode-id="806" instrument_node="">So, what exactly is asylum? Who is eligible? And how are things changing under President Trump?</span></p><p class="" data-dcnode-id="802" data-reactid="304"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">What Is Asylum?</span></strong></p><p class="" data-dcnode-id="797" data-reactid="305"><span data-dcnode-id="801" instrument_node="">Asylum is a protection granted to foreign nationals who can prove they have a </span><a class="elr" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/faq-page/credible-fear-faq"><span data-dcnode-id="800" instrument_node="">credible fear</span></a><span data-dcnode-id="798" instrument_node=""> of returning to their home country because of very specific reasons that are outlined by U.S. and international law. To qualify for asylum, a person must show they've suffered persecution&nbsp;or have a legitimate fear they will face persecution in the future, based on any of these factors:</span></p><span data-dcnode-id="780" data-reactid="306"><ul data-dcnode-id="781"><span data-dcnode-id="796" instrument_node=""> </span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">race</span></li><span data-dcnode-id="793" instrument_node=""> </span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">nationality</span></li><span data-dcnode-id="790" instrument_node=""> </span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">religion</span></li><span data-dcnode-id="787" instrument_node=""> </span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">political opinion</span></li><span data-dcnode-id="784" instrument_node=""> </span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">membership in a particular social group</span></li></ul></span><p class="" data-dcnode-id="775" data-reactid="307"><span data-dcnode-id="779" instrument_node="">According to </span><a class="elr" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/ilink/docView/SLB/HTML/SLB/0-0-0-1/0-0-0-29/0-0-0-1687.html"><span data-dcnode-id="778" instrument_node="">U.S. immigration law</span></a><span data-dcnode-id="776" instrument_node="">,&nbsp;a person granted asylum is legally allowed to remain in the U.S. without fear of deportation. An asylee may qualify to&nbsp;work&nbsp;in the U.S., travel abroad and apply for the same asylum status for&nbsp;their spouse or child.</span></p><p class="" data-dcnode-id="770" data-reactid="308"><span data-dcnode-id="774" instrument_node="">The concept of asylum — of&nbsp;providing a safe haven to people fleeing oppression --&nbsp;was formally recognized by the international community at the </span><a class="elr" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/3be01b964.html"><span data-dcnode-id="773" instrument_node="">United Nations in 1951</span></a><span data-dcnode-id="771" instrument_node="">. There, in the wake of World War II and the devastating persecution suffered by Jewish people and others during the Holocaust, 145 nations defined the term "refugee" and established standards for the treatment of people seeking protection in foreign countries.</span></p><figure class="article-fig size-full" data-dcnode-id="767" data-reactid="309"><a class="elr" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1129_geneva.jpg"><img alt="" class="alignnone size-full wp-image-428897" data-dcnode-id="769" height="649" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1129_geneva.jpg&amp;raw" width="564"></a></figure><p class="" data-dcnode-id="762" data-reactid="310"><span data-dcnode-id="766" instrument_node="">The </span><a class="elr" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/cgi-bin/texis/vtx/rwmain%3Fdocid%3D3ae6b3ae4"><span data-dcnode-id="765" instrument_node="">1967 United Nations Refugee Protocol</span></a><span data-dcnode-id="763" instrument_node="">, to which the United States is a signatory, broadened protections for people seeking asylum. In 1980, Congress incorporated these standards and definitions into U.S. immigration law.</span></p><p class="" data-dcnode-id="759" data-reactid="311"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Who Is Eligible And Where Can You Apply? </span></strong></p><blockquote data-dcnode-id="756" data-reactid="312"><p class="indent-medium" data-dcnode-id="757" data-reactid="313"><span data-dcnode-id="758" instrument_node="">"Any alien who is physically present in the United States or who arrives in the United States (whether or not at a designated port of arrival ...), irrespective of such alien's status, may apply for asylum ..."</span></p></blockquote><p class="" data-dcnode-id="748" data-reactid="314"><span data-dcnode-id="755" instrument_node="">That quote is from the </span><a class="elr" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/ilink/docView/SLB/HTML/SLB/act.html"><span data-dcnode-id="754" instrument_node="">Immigration and Nationality Act</span></a><span data-dcnode-id="752" instrument_node="">. It means&nbsp;that the right to at least </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">apply</span></em><span data-dcnode-id="749" instrument_node=""> for asylum is enshrined in U.S. law.</span></p><p class="" data-dcnode-id="740" data-reactid="315"><span data-dcnode-id="747" instrument_node="">And, according to the above provision, that application process can begin at what's known as an "</span><a class="elr" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbp.gov/border-security/ports-entry"><span data-dcnode-id="746" instrument_node="">official port of entry</span></a><span data-dcnode-id="744" instrument_node="">" — think airports,&nbsp;official border crossings, or basically anywhere you're interviewed by a U.S. Customs Border Protection&nbsp;</span><a class="elr" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/news/2018/03/15/cbp-officers-training-aclu-case" rel="noopener" target="_blank"><span data-dcnode-id="743" instrument_node="">officer</span></a><span data-dcnode-id="741" instrument_node=""> before being allowed into the U.S. — or, alternatively, at places in between those official entry points.</span></p><p class="" data-dcnode-id="735" data-reactid="316"><span data-dcnode-id="739" instrument_node="">Let's focus on the border. Say, for example,</span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="736" instrument_node="">a woman illegally crosses into the U.S., avoiding an official port of entry. After crossing into the U.S., she encounters a border&nbsp;agent — the officials who patrol the wide swath of land between official entry points. Even though she entered the U.S. without being processed through an official port of entry, according to U.S. immigration law, she is still legally entitled to request asylum. She can tell the border agent she fears returning to her home country and request an interview to begin the asylum application process.</span></p><p class="" data-dcnode-id="727" data-reactid="317"><span data-dcnode-id="734" instrument_node="">Individual asylum claims vary widely and so does the amount of time it takes to receive a decision from an immigration judge. On average, a decision should be made within </span><a class="elr" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/faq-page/asylum-eligibility-and-applications-faq%23t12802n40267"><span data-dcnode-id="733" instrument_node="">180 days</span></a><span data-dcnode-id="731" instrument_node=""> of filing an application, according to U.S. Citizenship and Immigration Services. If </span><a class="elr" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/refugees-asylum/asylum/benefits-and-responsibilities-asylees"><span data-dcnode-id="730" instrument_node="">asylum status is granted</span></a><span data-dcnode-id="728" instrument_node="">, the asylee may apply for work authorization, a social security card and, after one year of residence in the U.S., a green card. If more than 180 days pass from the date of filing and the government needs more time to issue a decision, then an asylum-seeker can apply for work benefits.</span></p></section><section class="article-section--content hang-punctuation article-section--island article-section--nogutter" data-dcnode-id="714" data-reactid="318"><section class="section--breakout section--uw section--uw-nomargin" data-dcnode-id="715" data-reactid="319"><div class="uw uw--responsive" data-dcnode-id="716" data-reactid="320"><div class="uw-inner" data-dcnode-id="717" data-reactid="321"><p class="uw-label" data-dcnode-id="724" data-reactid="322"><span data-dcnode-id="725" instrument_node="">Advertisement</span></p><div class="uw-content uw-content--centered" data-dcnode-id="718" data-reactid="323"><span data-dcnode-id="719" data-reactid="324"><div data-dcnode-id="723" style="width: 300px; height: 50px;"></div><div class="AdBox" data-dcnode-id="720" data-reactid="325"><span data-dcnode-id="721" data-reactid="326"><span data-dcnode-id="722" instrument_node="">&nbsp;</span></span></div></span></div></div></div></section></section><section class="article-section--content hang-punctuation article-section--centered" data-dcnode-id="657" data-reactid="327"><p class="" data-dcnode-id="711" data-reactid="328"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">How Has Asylum Changed Under The Trump Administration?</span></strong></p><p class="" data-dcnode-id="703" data-reactid="329"><span data-dcnode-id="710" instrument_node="">One of the&nbsp;most significant shifts&nbsp;came in June when Sessions&nbsp;</span><a class="elr" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/eoir/page/file/1070866/download"><span data-dcnode-id="709" instrument_node="">overruled</span></a><span data-dcnode-id="707" instrument_node=""> an Obama-era </span><a class="elr" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/sites/default/files/eoir/legacy/2014/08/26/3811.pdf"><span data-dcnode-id="706" instrument_node="">decision</span></a><span data-dcnode-id="704" instrument_node=""> from the Board of Immigration Appeals, the highest immigration court in the country, that formed the basis for victims of domestic violence being recognized as members "in a particular social group" in seeking asylum.</span></p><p class="" data-dcnode-id="695" data-reactid="330"><span data-dcnode-id="702" instrument_node="">Sessions said the asylum system works as a&nbsp;loophole for people trying to enter the U.S. under false claims they've been victims of domestic violence or gang violence.</span><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">&nbsp; </span></strong><span data-dcnode-id="699" instrument_node="">The decision essentially erased precedent that many immigration lawyers </span><a class="elr" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/news/2018/06/13/boston-immigration-sessions-asylum"><span data-dcnode-id="698" instrument_node="">referenced</span></a><span data-dcnode-id="696" instrument_node="">&nbsp;in arguing asylum claims.</span></p><p class="indent-medium" data-dcnode-id="693" data-reactid="331"><span data-dcnode-id="694" instrument_node="">"Asylum was never meant to alleviate all problems — even all serious problems — that people face every day all over the world," Sessions said.</span></p><p class="" data-dcnode-id="685" data-reactid="332"><span data-dcnode-id="692" instrument_node="">In November, Trump also&nbsp;</span><a class="elr" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/11/08/665875770/trump-administration-seeks-to-limit-asylum-seekers-with-new-rule"><span data-dcnode-id="691" instrument_node="">introduced a new rule</span></a><span data-dcnode-id="689" instrument_node=""> to force asylum-seekers to apply for status solely through official ports of entry. The proposed change was quickly challenged in court, and a </span><a class="elr" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/11/20/669471110/federal-court-blocks-trump-administrations-asylum-ban"><span data-dcnode-id="688" instrument_node="">federal judge ruled</span></a><span data-dcnode-id="686" instrument_node=""> that denying the right to apply for asylum to people entering the U.S. between ports of entry&nbsp; — or, in other words, anywhere on U.S. soil — was contrary to existing law.</span></p><p class="" data-dcnode-id="683" data-reactid="333"><span data-dcnode-id="684" instrument_node="">While the future of Trump's proposed change to asylum eligibility plays out in court, CBP officers have begun a process at the official ports of entry referred to as "metering."</span></p><p class="" data-dcnode-id="678" data-reactid="334"><span data-dcnode-id="682" instrument_node="">Officers are preventing people from initiating the asylum application process by stopping would-be asylum-seekers before they reach U.S. soil.</span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="679" instrument_node="">Migrants are told that limited resources at the ports of entry mean&nbsp;only a finite number of applications can be processed&nbsp;each day, forcing them to wait in Mexico in the interim.</span></p><figure class="article-fig size-large" data-dcnode-id="673" data-reactid="335"><a class="lightbox" data-dcnode-id="676" data-reactid="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1130_dooling-border-wait.jpg"><img alt="A 3-year-old from Honduras peers through a fence at the U.S.-Mexico border while her family waits to apply for asylum. (Jesse Costa/WBUR)" class="size-large article-image lazyloaded" data-dcnode-id="677" data-reactid="337" data-src="https://d279m997dpfwgl.cloudfront.net/wp/2018/11/1130_dooling-border-wait-1000x666.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2018/11/1130_dooling-border-wait-1000x666.jpg&amp;raw"></a><figcaption class="article-fig-caption" data-dcnode-id="674" data-reactid="338"><span data-dcnode-id="675" instrument_node="">A 3-year-old from Honduras peers through a fence at the U.S.-Mexico border while her family waits to apply for asylum. (Jesse Costa/WBUR)</span></figcaption></figure><p class="" data-dcnode-id="668" data-reactid="339"><span data-dcnode-id="672" instrument_node="">We witnessed this first-hand in June at the </span><a class="elr" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/news/2018/06/25/immigration-southern-border-families-wait" rel="noopener" target="_blank"><span data-dcnode-id="671" instrument_node="">border crossing</span></a><span data-dcnode-id="669" instrument_node=""> between Brownsville, Texas, and Matamoros, Mexico. A podium was set up mid-way across a footbridge and pedestrians holding U.S. passports and other documentation were able to pass. Those hoping to apply for asylum were asked to show their travel documents and often made to wait in the scorching summer heat. Families said they were told by border officials that the U.S. government didn't have enough resources to process their asylum claim at that time. Many people chose to stay put on the bridge, hoping to hold their place in line and apply for asylum the following day.</span></p><p class="" data-dcnode-id="663" data-reactid="340"><span data-dcnode-id="667" instrument_node="">The Trump administration is reportedly in the process of </span><a class="elr" data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/11/29/671799985/trump-administration-to-asylum-seekers-stay-put-in-mexico-while-claims-are-proce"><span data-dcnode-id="666" instrument_node="">making a deal</span></a><span data-dcnode-id="664" instrument_node=""> with the incoming Mexican government&nbsp;that would further alter U.S. asylum practice, forcing migrants to remain in Mexico while they await a decision on their asylum claim.</span></p><p class="" data-dcnode-id="658" data-reactid="341"><span data-dcnode-id="662" instrument_node="">Some legal experts say this proposition is </span><a class="elr" data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2018/11/29/671799985/trump-administration-to-asylum-seekers-stay-put-in-mexico-while-claims-are-proce"><span data-dcnode-id="661" instrument_node="">inherently problematic</span></a><span data-dcnode-id="659" instrument_node=""> because there is no way for the U.S. to guarantee a migrant's safety while waiting in Mexico — a key provision in the asylum process.</span></p></section></span><section class="article-section--story-group article-section--centered article-section--tags" data-dcnode-id="654" data-reactid="343"></section></article><div data-dcnode-id="564" data-reactid="345"><section class="article-section--story-group article-section--centered" data-dcnode-id="606" data-reactid="346"><header class="zone" data-dcnode-id="648" data-reactid="347"><div class="zone-inner" data-dcnode-id="649" data-reactid="348"><h2 class="zone-hdr" data-dcnode-id="650" data-reactid="349"><span data-dcnode-id="651" instrument_node="">Related:</span></h2></div></header><ul class="article-story-group" data-dcnode-id="607" data-reactid="350"><li class="story-group-item" data-dcnode-id="641" data-reactid="351"><a class="story-group-link" data-dcnode-id="642" data-ea="Click" data-ec="Article Related Links" data-el="Trump Plan Could Leave Asylum-Seekers At Risk In Mexico" data-reactid="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/npr/671799985/trump-administration-to-asylum-seekers-stay-put-in-mexico-while-claims-are-proce"><span data-dcnode-id="644" instrument_node="">Trump Plan Could Leave Asylum-Seekers At Risk In Mexico</span></a></li><li class="story-group-item" data-dcnode-id="634" data-reactid="355"><a class="story-group-link" data-dcnode-id="635" data-ea="Click" data-ec="Article Related Links" data-el="Federal Court Blocks Trump Administration's Asylum Ban" data-reactid="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/npr/669471110/federal-court-blocks-trump-administrations-asylum-ban"><span data-dcnode-id="637" instrument_node="">Federal Court Blocks Trump Administration's Asylum Ban</span></a></li><li class="story-group-item" data-dcnode-id="627" data-reactid="359"><a class="story-group-link" data-dcnode-id="628" data-ea="Click" data-ec="Article Related Links" data-el="As Migrant Caravan Winds North, Trump Vows To Cut Aid To Countries They're Fleeing" data-reactid="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/npr/659451264/as-migrant-caravan-winds-north-trump-vows-to-cut-aid-to-countries-theyre-fleeing"><span data-dcnode-id="630" instrument_node="">As Migrant Caravan Winds North, Trump Vows To Cut Aid To Countries They're Fleeing</span></a></li><li class="story-group-item" data-dcnode-id="620" data-reactid="363"><a class="story-group-link" data-dcnode-id="621" data-ea="Click" data-ec="Article Related Links" data-el="Why Some Mass. Families Separated At Border Could Get Second Chance At Asylum" data-reactid="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/news/2018/09/13/second-chance-asylum-refugees"><span data-dcnode-id="623" instrument_node="">Why Some Mass. Families Separated At Border Could Get Second Chance At Asylum</span></a></li><li class="story-group-item" data-dcnode-id="608" data-reactid="367"><a class="story-group-link" data-dcnode-id="609" data-ea="Click" data-ec="Article Related Links" data-el="Dispatches From Central America" data-reactid="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbur.org/tag/dispatches-central-america"><span class="story-group-link-source" data-dcnode-id="613" data-reactid="369"><span data-dcnode-id="618" instrument_node="">2018 Series:</span><span data-dcnode-id="615" instrument_node=""> </span></span><span data-dcnode-id="611" instrument_node="">Dispatches From Central America</span></a></li></ul></section><section class="article-section--story-group article-section--centered" data-dcnode-id="577" data-reactid="373"><div class="contributor has-photo" data-dcnode-id="578" data-reactid="374"><div class="contributor-profile" data-dcnode-id="579" data-reactid="375"><figure class="contributor-profile-item contributor-photo" data-dcnode-id="603" data-reactid="376"><a data-dcnode-id="604" data-reactid="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/inside/staff/shannon-dooling"><img alt="" class="card-image" data-dcnode-id="605" data-reactid="378" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d279m997dpfwgl.cloudfront.net/wp/2016/06/shannon-dooling-2016-1.jpg&amp;raw"></a></figure><p class="contributor-profile-item contributor-bio" data-dcnode-id="583" data-reactid="379"><a class="contributor-name" data-dcnode-id="601" data-reactid="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/inside/staff/shannon-dooling"><span data-dcnode-id="602" instrument_node="">Shannon Dooling</span></a><span data-dcnode-id="599" instrument_node=""> </span><a data-dcnode-id="593" data-reactid="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/sdooling" rel="external" target="_blank"><svg class="icon icon-twitter icon-twitter--author-social" data-dcnode-id="594" data-reactid="383" role="img" viewBox="0 0 128 128"><title data-dcnode-id="596" data-reactid="384">Twitter</title><path d="M127.9,24.2c-4.7,2.1-9.7,3.6-15.1,4.2c5.5-3.2,9.6-8.4,11.6-14.6c-5,3-10.7,5.2-16.6,6.4c-4.9-5-11.7-8.2-19.3-8.2 C74,12,62.3,23.7,62.3,38.2c0,2.1,0.1,4.2,0.6,6.1c-21.7-1.2-41-11.1-54-26.9c-2.2,3.9-3.6,7.9-3.6,12.7c0,9,4.6,17,11.7,21.7 c-4.3-0.1-8.3-1.3-11.9-3.2v0.3c0,12.7,9.1,23.4,21.1,25.7c-2.2,0.6-4.6,0.9-7,0.9c-1.6,0-3.2-0.2-4.9-0.5 c3.2,10.4,13.1,18.1,24.4,18.2c-8.9,7.1-20.3,12.4-32.5,12.4c-2.1,0-4.2-0.1-6.2-0.4c11.6,7.4,25.5,10.7,40.3,10.7 c48.2,0,74.6-40,74.6-74.7v-3.4C119.9,34.2,124.4,29.6,127.9,24.2z" data-dcnode-id="595" data-reactid="385"></path></svg></a><span data-dcnode-id="591" instrument_node=""> </span><span class="contributor-title" data-dcnode-id="588" data-reactid="387"><span data-dcnode-id="589" instrument_node="">Investigative Reporter</span></span><br data-dcnode-id="587" data-reactid="388"><span data-dcnode-id="585" instrument_node="">Shannon Dooling is an investigative reporter at WBUR, focused on stories about immigration and crim
