QualSection-section" data-dcnode-id="543" id="qualificationsSection"><div class="jobsearch-ReqAndQualSection-title" data-dcnode-id="551"><h2 class="jobsearch-ReqAndQualSection-title--main icl-u-textBold" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Qualifications</span></h2></div><div class="jobsearch-ReqAndQualSection-item--wrapper" data-dcnode-id="544" style="padding:0"><div class="icl-u-xs-block jobsearch-ReqAndQualSection-item--title" data-dcnode-id="545"><span class="icl-u-textBold" data-dcnode-id="550"></span><ul class="icl-u-xs-my--none jobsearch-ReqAndQualSection-item--closedBullets" data-dcnode-id="546"><li class="icl-u-xs-p--none jobsearch-ReqAndQualSection-item" data-dcnode-id="547"><p class="icl-u-xs-my--none" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">US work authorization (Required)</span></p></li></ul></div></div></div></div><div class="mosaic-zone" data-dcnode-id="540" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst" data-dcnode-id="541" id="mosaic-provider-company-info-salary"></div></div><h2 class="jobsearch-JobDescriptionSection-jobDescriptionTitle icl-u-xs-my--md" data-dcnode-id="538" id="jobDescriptionTitle"><span data-dcnode-id="539" instrument_node="">Full Job Description</span></h2><div class="jobsearch-jobDescriptionText" data-dcnode-id="381" id="jobDescriptionText"><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="536" instrument_node="">Location: Berkeley, California</span><br data-dcnode-id="535"/><span data-dcnode-id="534" instrument_node="">Schedule: Hourly, 2-10 hours/week, M-F 8am-8pm</span><br data-dcnode-id="533"/><span data-dcnode-id="532" instrument_node="">Salary: $40/hour</span><br data-dcnode-id="531"/><span data-dcnode-id="530" instrument_node="">Start Date: As soon as possible</span><br data-dcnode-id="529"/><span data-dcnode-id="528" instrument_node="">Language: Haitian Creole</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="523"><b data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">ORGANIZATION </span></b></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Partnerships for Trauma Recovery (PTR) is a 501(c)(3) nonprofit organization dedicated to healing the psychosocial impacts of trauma among international survivors of human rights abuses and forced displacement resulting from war, torture, gender-based violence and persecution due to identity and beliefs. At our Mosaic Healing Center in Berkeley, California, we: (a) Provide culturally and contextually reflective, trauma-informed and linguistically accessible psychological and psychosocial care for refugees, asylees and asylum seekers, (b) Expand multidisciplinary clinical capacity to serve these diverse international populations through an 11-month, 24-hour per week in-depth clinical training program for advanced doctoral students and post-graduate interns in psychology and social work, and (c) Advocate for policies to prevent trauma and re-traumatization among international survivors of human rights abuses.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="516"><b data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">POSITION </span></b></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">This is an exciting opportunity to join a dynamic nonprofit organization working at the juncture of global mental health and human rights. The primary responsibility of PTR Interpreters is to support the clinical team in providing trauma-informed, culturally reflective and linguistically accessible psychological and psychosocial care for international survivors of human rights abuses who have come to the United States seeking safety from countries around the world. PTR interpreters help foster effective cross-cultural communication and participate in reducing stigma related to mental health needs resulting from trauma and loss among newcomer communities.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Working closely with the clinical team and reporting to the Interpreter Program Manager, PTR Interpreters provide remote and in person interpretation for international survivors of human rights abuses during their sessions/visits to PTR. Interpreters provide consecutive interpretation during therapy sessions in which clients receive psychological and psychosocial support. Interpreters also provide phone interpretation as staff contact clients to coordinate and schedule appointments, as well as occasional written translation for documents. PTR Interpreters help support clients on their healing journey, which often entails considerable difficulty and distress. Interpreters must have a strong commitment for promoting human rights, peace and psychosocial wellbeing, as well as the ability to hear stories of extensive trauma and bear witness to significant emotional distress.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="504"><b data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">ROLES AND RESPONSIBILITIES</span></b><br data-dcnode-id="506"/><span data-dcnode-id="505" instrument_node="">The responsibilities of the PTR Interpreter will include the following:</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Mental Health Interpretation</span></p><span data-dcnode-id="500" instrument_node="">
</span><ul data-dcnode-id="483"><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">In collaboration with PTR clinical team, coordinate and schedule client appointments. Interpreters are the first point of contact with PTR clients who need interpretation.</span></li><span data-dcnode-id="496" instrument_node="">
</span><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Serve as a linguistic and cultural interpreter between PTR clinical team and clients during individual, family and group meetings at PTR.</span></li><span data-dcnode-id="493" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Provide clear, consecutive interpretation during client meetings and interactions with PTR providers.</span></li><span data-dcnode-id="490" instrument_node="">
</span><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Ensure that everything that is said by all parties is interpreted.</span></li><span data-dcnode-id="487" instrument_node="">
</span><li data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Interpret as directly as possible, and convey the meaning of what is said when an exact translation is not possible.</span></li><span data-dcnode-id="484" instrument_node="">
</span></ul><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Translation Duties</span></p><span data-dcnode-id="479" instrument_node="">
</span><ul data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Translate written documents, such as flyers and outreach materials from English to another language as needed.</span></li><span data-dcnode-id="475" instrument_node="">
</span></ul><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Other Duties</span></p><span data-dcnode-id="470" instrument_node="">
</span><ul data-dcnode-id="462"><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Regularly and consistently track interpretation hours and submit monthly invoices.</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Participate in regular supportive meetings and professional development sessions with PTR clinical staff and other PTR interpreters.</span></li><span data-dcnode-id="463" instrument_node="">
</span></ul><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Qualifications</span></p><span data-dcnode-id="458" instrument_node="">
</span><ul data-dcnode-id="414"><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Native or fully fluent speaker of Haitian Creole</span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Excellent verbal communication in Haitian Creole</span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Maturity and ability to work collaboratively with clinical team (21+ years old)</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Excellent time management and consistency in timeliness</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Flexibility and adaptability, and willingness to take feedback and make adjustments</span></li><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Confidence to ask for clarification when needed</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Cultural humility, sensitivity to cultural nuance and respectfulness for identity differences</span></li><span data-dcnode-id="436" instrument_node="">
</span><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Appreciation of and strong capacity for maintaining confidentiality</span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Ability to maintain professional boundaries</span></li><span data-dcnode-id="430" instrument_node="">
</span><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Experience working with diverse populations, under resourced communities, survivors of trauma, displaced populations preferred</span></li><span data-dcnode-id="427" instrument_node="">
</span><li data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Experience working in a mental health, healthcare or social services setting preferred</span></li><span data-dcnode-id="424" instrument_node="">
</span><li data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">At least 1 year of experience working as an interpreter preferred</span></li><span data-dcnode-id="421" instrument_node="">
</span><li data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Previous interpreter training and/or certification preferred</span></li><span data-dcnode-id="418" instrument_node="">
</span><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Comfort and familiarity with MS word and Google Drive</span></li><span data-dcnode-id="415" instrument_node="">
</span></ul><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="407"><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">If interested, please submit the following to jobs[at]traumapartners.org with the subject Application for PTR Interpreter position: </span></b><span data-dcnode-id="410" instrument_node=""> 1) A cover letter; 2) Your most recent curriculum vitae or resume. Applications will be received until positions are filled, and start date is as soon as possible. </span><b data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Applications send through Indeed WILL NOT BE CONSIDERED.</span></b></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">To learn more about Partnerships for Trauma Recovery, please visit our website at www.traumapartners.org Partnerships for Trauma Recovery is an equal employment opportunities (EEO) and does not discriminate on the basis of ancestry, age, color, disability (physical and mental, includes HIV and AIDs), genetic information, gender, gender identity, gender expression, marital status, military or veteran status, national origin, race, religion (includes religious dress and grooming), sex (includes pregnancy, childbirth, breastfeeding, and/or related medical conditions), sexual orientation, or request for FMLA in accordance with applicable federal, state and local laws.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Healing the psychosocial impacts of trauma for a more peaceful tomorrow www.traumapartners.org</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Job Type: Contract</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Pay: $40.00 per hour</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Schedule:</span></p><span data-dcnode-id="391" instrument_node="">
</span><ul data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Day shift</span></li><span data-dcnode-id="387" instrument_node="">
</span></ul><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Work Location: Remote</span></p><span data-dcnode-id="382" instrument_node="">
