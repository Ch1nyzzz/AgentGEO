id="275" id="content"><div class="tg-container tg-container--flex tg-container--flex-space-between" data-dcnode-id="276"><div class="top-page-sidebar" data-dcnode-id="639"><div class="widget-content" data-dcnode-id="644"><div class="polasylum-fl-zw" data-dcnode-id="663"><i class="fa fa-phone" data-dcnode-id="665"></i><span data-dcnode-id="664" instrument_node="">+1 (800) 560-1768 – Asylum Hotline</span></div><div class="textwidget" data-dcnode-id="645"><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Our multi-lingual Immigration experts are waiting for your call to start your Asylum application. Or, visit your local site:</span></p><p data-dcnode-id="646"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/"><img alt="Asylum in USA" data-dcnode-id="660" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/US.svg&amp;raw"></a><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/cn/"><img alt="在美国避难" data-dcnode-id="658" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/CH.svg&amp;raw"></a><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/fr/"><img alt="Asile aux Etats-Unis" data-dcnode-id="656" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/FR.svg&amp;raw"></a><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/ru/"><img alt="Убежище в США" data-dcnode-id="654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/RU.svg&amp;raw"></a><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/pt/"><img alt="Asilo Politico EUA" data-dcnode-id="652" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/BR.svg&amp;raw"></a><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/es/"><img alt="Asilo Político En Estados Unidos" data-dcnode-id="650" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/es/wp-content/uploads/ES.svg&amp;raw"></a><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/ua/"><img alt="Притулок в США" data-dcnode-id="648" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/wp-content/uploads/UK.svg&amp;raw"></a></p></div></div><div class="widget_text widget-content" data-dcnode-id="640"><div class="textwidget custom-html-widget" data-dcnode-id="641"><a class="btn-main" data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/about-us/"><span data-dcnode-id="643" instrument_node="">I want asylum In USA!</span></a></div></div></div><div class="content-area" data-dcnode-id="590" id="primary"><div class="post-body" data-dcnode-id="591"><h1 class="title" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Russian Asylum</span></h1><article class="post-161 page type-page status-publish hentry zakra-article-page" data-dcnode-id="592" id="post-161"><header class="entry-header" data-dcnode-id="636"></header><div class="entry-content" data-dcnode-id="593"><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">In the Soviet era, it was a little easier for Russians fleeing persecution to get protection in America, but there are still many people fleeing Russia because of persecution, and many of them are still able to apply for asylum in the United States.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Russian asylees in the US fled Russia for reasons such as political repression, persecution of ethnic and religious minorities, and discrimination against lesbian, gay, bisexual and transgender people.</span></p><h3 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Political Persecution</span></h3><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">Russia does have elections, but they are generally considered to be neither free nor fair. People who have spoken out against powerful political or business figures often end up detained and/or persecuted. The prison conditions are terrible, and many people end up dying in them. Free speech is limited, as journalists, activists, and broadcast networks are put under enormous scrutiny by the government if they speak out. The band </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">“Pussy Riot”</span></em><span data-dcnode-id="626" instrument_node=""> became internationally famous due to their prosecution for expressing criticism of the state church.</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">In recent months, the United States has become increasingly critical of how the Russian government restricts the role of and harasses international human rights organizations.</span></p><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Discrimination</span></h3><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">There are widespread reports of societal discrimination in Russia, leading to many Russians fleeing and applying for asylum in the United States.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Women face some significant problems in Russia. Rape is widespread and rarely reported. Domestic violence is very common, and police usually do not report it. Russia is a destination country for sex tourism, and sex trafficking is a huge problem for women. In some parts of the country, honor killings occurred, which is when a family kills a woman due to their belief that she has been immoral and dishonored the family.</span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Anti-Semitism is a problem in Russia, although it is improving. There are several violent attacks directed at Jews per year. Some Russian Jews face such frequent and extreme anti-Semitism that they have been granted asylum in the US.</span></p><p data-dcnode-id="611"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/application-for-asylum/social-group/" title="Social Group"><span data-dcnode-id="614" instrument_node="">Ethnic groups</span></a><span data-dcnode-id="612" instrument_node=""> from Central Asia, Roma, dark skinned people, and foreigners often face racism and discrimination in Russia. Violence by skin heads and neo-Nazis is a problem. The government has made significant efforts to combat this, which will be taken into account for any asylum case.</span></p><p data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">Lesbian, gay, bisexual and transgender (LGBT) people face significant discrimination. It is common for </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/application-for-asylum/gay-lgbt/" title="LGBT"><span data-dcnode-id="609" instrument_node="">gay people</span></a><span data-dcnode-id="607" instrument_node=""> to be denied medical treatment or police protection from attacks. Moscow has continuously denied a gay pride parade, while allowing rallies that call for the criminalization of homosexuality.</span></p><p data-dcnode-id="602"><span data-dcnode-id="605" instrument_node="">Discrimination is common against people with HIV/AIDS. There is a law against it, but that law is rarely enforced.</span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node=""> Between political persecution by the government and societal discrimination, there are many reasons why someone from Russia would be afraid to return to or remain in the country. If you are Russian and are afraid of being there, PoliticalAsylumUSA may be able to help you. Call us at +1 (800) 560-1768 today. We are available 24/7.</span></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">&nbsp;</span></p><p class="p1" data-dcnode-id="594"><span data-dcnode-id="599" instrument_node="">Вас также может заинтересовать:&nbsp;</span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/"><span class="s1" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Political Asylum&nbsp;USA</span></span></a><span data-dcnode-id="595" instrument_node="">.</span></p></div></article></div></div><aside class="widget-area" data-dcnode-id="484" id="secondary"><div class="widget widget_nav_menu" data-dcnode-id="558" id="nav_menu-6"><div class="widget-title" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Asylum for Citizens of:</span></div><div class="menu-countries-container" data-dcnode-id="559"><ul class="menu" data-dcnode-id="560" id="menu-countries"><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-178" data-dcnode-id="585" id="menu-item-178"><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalasylumusa.com/countries/bhutanese-refugees/"><span data-dcnode-id="587" instrument_node="">Bhutan</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-179" data-dcnode-id="582" id="menu-item-179"><a data-dcnode-id="583" href="https://chatnoir-webcontent.c
