</span></ol></div><span data-dcnode-id="6121" instrument_node=""> </span><h1 data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">Civilian population</span></h1><span data-dcnode-id="6118" instrument_node="">
</span></div><span data-dcnode-id="6116" instrument_node="">
</span></section><span data-dcnode-id="6114" instrument_node="">
</span><div class="container" data-dcnode-id="6109"><span data-dcnode-id="6113" instrument_node="">
</span><div class="alert alert-warning fade in hidden mt-4" data-dcnode-id="6111" id="pdf-generation-msg" role="alert"><span data-dcnode-id="6112" instrument_node="">

</span><div class="block block-system container" data-dcnode-id="397" id="block-system-main"><span data-dcnode-id="6107" instrument_node="">
</span><div class="content" data-dcnode-id="399"><span data-dcnode-id="6106" instrument_node="">
</span><div class="ds-icrc-full node node-book view-mode-full" data-dcnode-id="401"><span data-dcnode-id="6105" instrument_node="">
</span><div class="row" data-dcnode-id="403"><span data-dcnode-id="6104" instrument_node="">
</span><div class="col-md-10" data-dcnode-id="429"><span data-dcnode-id="6103" instrument_node="">
</span><div class="row toc-container" data-dcnode-id="431"><span data-dcnode-id="6102" instrument_node="">
</span><div class="col-md-12" data-dcnode-id="433"><span data-dcnode-id="6101" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="435"><div class="field-items" data-dcnode-id="436"><div class="field-item even" data-dcnode-id="5880"><div class="rxbodyfield" data-dcnode-id="5881"><span data-dcnode-id="6100" id="toc-click-on-chapter-bibliography-or-specific-bibliography-to-see-content"></span><h3 data-dcnode-id="6094" style="text-align: center;"><em data-dcnode-id="6097"><strong data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">Click on "CHAPTER BIBLIOGRAPHY" or "SPECIFIC BIBLIOGRAPHY" to see content</span></strong></em><br data-dcnode-id="6096"><br data-dcnode-id="6095"></h3><span data-dcnode-id="6093" id="toc-introductory-text"></span><h2 data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">Introductory text</span></h2><p data-dcnode-id="6080"><span data-dcnode-id="6090" instrument_node="">Increasingly, civilians make up the overwhelming majority of the victims of armed conflict,[</span><a data-dcnode-id="6088" href="#_ftn_001" id="_ftnref_001" name="_ftnref_001" title=""><span data-dcnode-id="6089" instrument_node="">1</span></a><span data-dcnode-id="6087" instrument_node="">] even though International Humanitarian Law (</span><abbr data-dcnode-id="6085" title="International Humanitarian Law "><span data-dcnode-id="6086" instrument_node="">IHL</span></abbr><span data-dcnode-id="6084" instrument_node="">) stipulates that attacks should only be directed at combatants and military objectives and that civilians and civilian objects should be respected. However, even if </span><abbr data-dcnode-id="6082" title="International Humanitarian Law "><span data-dcnode-id="6083" instrument_node="">IHL</span></abbr><span data-dcnode-id="6081" instrument_node=""> is scrupulously respected, civilians can become victims of armed conflicts, as attacks and military operations directed at military objectives are not prohibited merely because they may also affect civilians.</span></p><p data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">Civilians in war need to be respected by those into whose hands they have fallen, those who could, for example, arrest, ill-treat or harass them, confiscate their property, or deprive them of food or medical assistance.</span></p><p data-dcnode-id="6052"><span data-dcnode-id="6077" instrument_node="">Under </span><abbr data-dcnode-id="6075" title="International Humanitarian Law "><span data-dcnode-id="6076" instrument_node="">IHL</span></abbr><span data-dcnode-id="6074" instrument_node="">, some of those protections are prescribed for all civilians,[</span><a data-dcnode-id="6072" href="#_ftn_002" id="_ftnref_002" name="_ftnref_002" title=""><span data-dcnode-id="6073" instrument_node="">2</span></a><span data-dcnode-id="6071" instrument_node="">] but most apply only to “protected civilians”,[</span><a data-dcnode-id="6069" href="#_ftn_003" id="_ftnref_003" name="_ftnref_003" title=""><span data-dcnode-id="6070" instrument_node="">3</span></a><span data-dcnode-id="6068" instrument_node="">] i.e. basically those who are in enemy hands. The rules on the treatment of protected civilians are subdivided into three groups: the first applies to civilians who find themselves on enemy territory,[</span><a data-dcnode-id="6066" href="#_ftn_004" id="_ftnref_004" name="_ftnref_004" title=""><span data-dcnode-id="6067" instrument_node="">4</span></a><span data-dcnode-id="6065" instrument_node="">] the second contains more detailed and protective rules applying to protected civilians whose territory is occupied by the enemy,[</span><a data-dcnode-id="6063" href="#_ftn_005" id="_ftnref_005" name="_ftnref_005" title=""><span data-dcnode-id="6064" instrument_node="">5</span></a><span data-dcnode-id="6062" instrument_node="">] while the third encompasses provisions common to the enemy’s own territory and occupied territories.[</span><a data-dcnode-id="6060" href="#_ftn_006" id="_ftnref_006" name="_ftnref_006" title=""><span data-dcnode-id="6061" instrument_node="">6</span></a><span data-dcnode-id="6059" instrument_node="">] This means that no rules cover civilians who are neither (enemy civilians) on the territory of a belligerent nor on an occupied territory. “Occupied territory” is therefore to be understood as a functional concept as far as civilians in enemy hands are concerned, one that applies as soon as civilians fall into enemy hands outside the enemy’s own territory. The most detailed rules concern the treatment of civilians interned in connection with the conflict, in both the enemy’s own and occupied territories, for imperative security reasons and not in view of a trial.[</span><a data-dcnode-id="6057" href="#_ftn_007" id="_ftnref_007" name="_ftnref_007" title=""><span data-dcnode-id="6058" instrument_node="">7</span></a><span data-dcnode-id="6056" instrument_node="">] This detailed regime for civilian internees is justified by the fact that such internment is an exception to the general rule that enemy civilians, unlike combatants, may not be detained. It is broadly similar to the regime provided for by </span><abbr data-dcnode-id="6054" title="Geneva Convention (III) Relative to the Treatment of Prisoners of War, of 12 August 1949 "><span data-dcnode-id="6055" instrument_node="">Convention III</span></abbr><span data-dcnode-id="6053" instrument_node=""> for prisoners of war.</span></p><p data-dcnode-id="6041"><span data-dcnode-id="6051" instrument_node="">Civilians in war also need to be respected by the belligerent opposing the party in whose hands they are, who could, for example, bomb their towns, attack them on the battlefield, or hinder the delivery of food supplies or family messages. These rules on the protection of the civilian population against the effects of hostilities, which are set out for the most part in </span><abbr data-dcnode-id="6049" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6050" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="6048" instrument_node="">[</span><a data-dcnode-id="6046" href="#_ftn_008" id="_ftnref_008" name="_ftnref_008" title=""><span data-dcnode-id="6047" instrument_node="">8</span></a><span data-dcnode-id="6045" instrument_node="">] and customary law (partly based on the 1907 Hague Regulations), are part of the law of the conduct of hostilities and benefit all civilians finding themselves on the territory of parties to an international armed conflict.[</span><a data-dcnode-id="6043" href="#_ftn_009" id="_ftnref_009" name="_ftnref_009" title=""><span data-dcnode-id="6044" instrument_node="">9</span></a><span data-dcnode-id="6042" instrument_node="">]</span></p><h4 class="casesdocheader" data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="6023"><ul data-dcnode-id="6024"><li data-dcnode-id="6034"><a data-dcnode-id="6035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/un-secretary-generals-reports-protection-civilians-armed-conflict" title=""><abbr data-dcnode-id="6037" title="United Nations"><span data-dcnode-id="6038" instrument_node="">UN</span></abbr><span data-dcnode-id="6036" instrument_node="">, Secretary-General’s Reports on the Protection of Civilians in Armed Conflict</span></a></li><li data-dcnode-id="6031"><a data-dcnode-id="6032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/belgium-belgian-soldiers-somalia" title=""><span data-dcnode-id="6033" instrument_node="">Belgium, Belgian Soldiers in Somalia</span></a></li><li data-dcnode-id="6028"><a data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/syria-syrian-rebels-treat-captured-filipino-soldiers-guests"><span data-dcnode-id="6030" instrument_node="">Syria, Syrian rebels treat captured Filipino soldiers as 'guests'</span></a></li><li data-dcnode-id="6025"><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republicdemocratic-republic-congouganda-lra-attacks"><span data-dcnode-id="6027" instrument_node="">Central African Republic/Democratic Republic of Congo/Uganda, LRA attacks</span></a></li></ul></div><h4 aria-controls="readingsbody0" aria-expanded="false" class="readingsheader" data-dcnode-id="6021" data-toggle="collapse" href="#readingsbody0"><span data-dcnode-id="6022" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="5997" id="readingsbody0"><p data-dcnode-id="6018"><strong data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="5998"><li data-dcnode-id="6016"><span data-dcnode-id="6017" instrument_node="">BEST Geoffrey, Humanity in Warfare: The Modern History of the International Law of Armed Conflicts, London, Weidenfels &amp; Nicholson, 1980, 400 pp.</span></li><li data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">DOSWALD-BECK Louise, “The Value of the 1977 Protocols for the Protection of Civilians”, in MEYER Michael A. (ed.), Armed Conflict and the New Law: Aspects of the 1977 Geneva Protocols and the 1981 Weapons Convention, London, British Institute of International and Comparative Law, 1989, pp. 137-172.</span></li><li data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">KALSHOVEN Frits, “Reaffirmation and Development of International Humanitarian Law in Armed Conflicts: The Diplomatic Conference, Geneva, 1974-1977, Part II”, in Netherlands Yearbook of International Law, Vol. 9, 1978, pp. 107-171.</span></li><li data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">POCAR Fausto, “Violence on Civilians and Prisoners of War in the Jurisprudence of International Criminal Tribunals”, in Anuário brasileiro de direito internacional = Brazilian Yearbook of International Law, Vol. 2, No. 4, 2009, pp. 11-30.&nbsp;</span></li><li data-dcnode-id="6005"><span data-dcnode-id="6009" instrument_node="">PRIMORATZ Igor, Civilian Immunity in War, Oxford, </span><abbr data-dcnode-id="6007" title="Oxford University Press"><span data-dcnode-id="6008" instrument_node="">OUP</span></abbr><span data-dcnode-id="6006" instrument_node="">, 2007, 263 pp.</span></li><li data-dcnode-id="5999"><span data-dcnode-id="6004" instrument_node="">TIGROUDJA Hélène, “La Cour suprême israélienne et la protection des personnes en temps de conflit”, in </span><em data-dcnode-id="6001"><abbr data-dcnode-id="6002" title="Revue Générale de Droit International Public"><span data-dcnode-id="6003" instrument_node="">RGDIP</span></abbr></em><span data-dcnode-id="6000" instrument_node="">, T. 113, 2009, pp. 555-588.</span></li></ul></div><h4 class="beigeheader" data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">&nbsp;Footnotes</span></h4><div class="beigebox" data-dcnode-id="5882"><ul data-dcnode-id="5883"><li data-dcnode-id="5988"><a data-dcnode-id="5993" href="#_ftnref_001" id="_ftn_001" name="_ftn_001" title=""><span data-dcnode-id="5994" instrument_node="">[1]</span></a><span data-dcnode-id="5992" instrument_node=""> The figures of this table have been taken from the Office fédéral de la Protection civile, Berne (Switzerland), 1988. The scale of the different sections of the chart is only illustrative of the figures mentioned. </span><abbr data-dcnode-id="5990" title="International Committee of the Red Cross "><span data-dcnode-id="5991" instrument_node="">ICRC</span></abbr><span data-dcnode-id="5989" instrument_node="">. 1999.&nbsp;</span></li><li data-dcnode-id="5966"><a data-dcnode-id="5986" href="#_ftnref_002" id="_ftn_002" name="_ftn_002" title=""><span data-d </li><li data-dcnode-id="5825"><span data-dcnode-id="5838" instrument_node="">Part III: rules benefiting “protected persons” (as defined in </span><abbr data-dcnode-id="5836" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><span data-dcnode-id="5837" instrument_node="">GC IV</span></abbr><span data-dcnode-id="5835" instrument_node="">, Art. 4)</span><div data-dcnode-id="5826"><p data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">aa) Section II: rules protecting foreigners on a party’s own (= non-occupied) territory</span></p><p data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">bb) Section III: rules applicable to occupied territory</span></p><p data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">cc) Section I: rules common to the enemy’s own and occupied territories</span></p><p data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">dd) Section IV: rules protecting civilian internees in the enemy’s own and occupied territories</span></p></div></li></ol></div><span data-dcnode-id="5822" id="toc--2-rules-benefiting-all-civilians"></span><h3 data-dcnode-id="5819"><a class="nohref" data-dcnode-id="5821" id="ii_2" name="ii_2"></a><span data-dcnode-id="5820" instrument_node="">&nbsp;2. &nbsp; Rules benefiting all civilians</span></h3><ol data-dcnode-id="5813" type="a"><li data-dcnode-id="5814"><strong data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">aid and relief</span></strong><br data-dcnode-id="5816"><span data-dcnode-id="5815" instrument_node=""> (See infra, Conduct of Hostilities, IV. International Humanitarian Law and Humanitarian Assistance)</span></li></ol><p class="casesdocheader" data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">Cases and documents</span></p><ul class="beigebox" data-dcnode-id="5804"><li data-dcnode-id="5808"><a data-dcnode-id="5809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/iraq-situation-internally-displaced-persons"><span data-dcnode-id="5810" instrument_node="">Iraq: Situation of Internally Displaced Persons</span></a></li><li data-dcnode-id="5805"><a data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/eastern-ukraine-ohchr-report-situation-november-2016-february-2017"><span data-dcnode-id="5807" instrument_node="">Eastern Ukraine, OHCHR Report on the Situation: November 2016 - February 2017</span></a></li></ul><p data-dcnode-id="5778"><strong data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; </span></strong><span data-dcnode-id="5801" instrument_node="">b.</span><strong data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">&nbsp; special protection of women</span></strong><br data-dcnode-id="5798"><span data-dcnode-id="5797" instrument_node=""> </span><abbr data-dcnode-id="5795" title="Geneva Convention (I) for the Amelioration of the Condition of the Wounded and Sick in Armed Forces in the Field, of 12 August 1949 "><span data-dcnode-id="5796" instrument_node="">GC I</span></abbr><span data-dcnode-id="5794" instrument_node="">-</span><abbr data-dcnode-id="5792" title="Geneva Convention (II) for the Amelioration of the Condition of Wounded, Sick and Shipwrecked Members of Armed Forces at Sea, of 12 August 1949"><span data-dcnode-id="5793" instrument_node="">II</span></abbr><span data-dcnode-id="5791" instrument_node="">, Art. 12; </span><abbr data-dcnode-id="5789" title="Geneva Convention (III) Relative to the Treatment of Prisoners of War, of 12 August 1949 "><span data-dcnode-id="5790" instrument_node="">GC III</span></abbr><span data-dcnode-id="5788" instrument_node="">, Arts 14, 25, 88, 97 and 108; </span><abbr data-dcnode-id="5786" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><span data-dcnode-id="5787" instrument_node="">GC IV</span></abbr><span data-dcnode-id="5785" instrument_node="">, Arts 14, 16, 21-27, 38, 50, 76, 85, 89, 91, 97, 124, 127 and 132; P&nbsp;I, Arts 70 and 75-76; </span><abbr data-dcnode-id="5783" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5784" instrument_node="">P II</span></abbr><span data-dcnode-id="5782" instrument_node="">, Arts 5(2) and 6(4) [</span><abbr data-dcnode-id="5780" title="Customary International Humanitarian Law: Rules reproduced in Case 29 (C), drawn from HENCKAERTS Jean-Marie &amp; DOSWALDBECK Louise, Customary International Humanitarian Law, Cambridge/Geneva, CUP/ICRC, 2005, 3 Vols. 5032 pp. "><span data-dcnode-id="5781" instrument_node="">CIHL</span></abbr><span data-dcnode-id="5779" instrument_node="">, Rule 134]</span></p><div data-dcnode-id="5716"><p data-dcnode-id="5750"><abbr data-dcnode-id="5776" title="International Humanitarian Law "><span data-dcnode-id="5777" instrument_node="">IHL</span></abbr><span data-dcnode-id="5775" instrument_node=""> first protects women if they are wounded, sick or shipwrecked, as civilians, as members of the civilian population or as combatants, according to their status. As such, women must benefit from the same protection as that given to men and may not be discriminated against.[</span><a data-dcnode-id="5773" href="#_ftn_010" id="_ftnref_010" name="_ftnref_010" title=""><span data-dcnode-id="5774" instrument_node="">10</span></a><span data-dcnode-id="5772" instrument_node="">] However, </span><abbr data-dcnode-id="5770" title="International Humanitarian Law "><span data-dcnode-id="5771" instrument_node="">IHL</span></abbr><span data-dcnode-id="5769" instrument_node=""> also takes into account the fact that women are more vulnerable, and gives them preferential treatment in some particular cases. First, women are specially protected against any attack on their sexual integrity, in particular against rape, enforced prostitution or any form of indecent assault.[</span><a data-dcnode-id="5767" href="#_ftn_011" id="_ftnref_011" name="_ftnref_011" title=""><span data-dcnode-id="5768" instrument_node="">11</span></a><span data-dcnode-id="5766" instrument_node="">] The International Criminal Tribunal for Rwanda (</span><abbr data-dcnode-id="5764" title="International Criminal Tribunal for Rwanda "><span data-dcnode-id="5765" instrument_node="">ICTR</span></abbr><span data-dcnode-id="5763" instrument_node="">) and the International Criminal Court (</span><abbr data-dcnode-id="5761" title="International Criminal Court "><span data-dcnode-id="5762" instrument_node="">ICC</span></abbr><span data-dcnode-id="5760" instrument_node="">) have included rape and other forms of sexual violence in their list of war crimes,[</span><a data-dcnode-id="5758" href="#_ftn_012" id="_ftnref_012" name="_ftnref_012" title=""><span data-dcnode-id="5759" instrument_node="">12</span></a><span data-dcnode-id="5757" instrument_node="">] and although the Statute of the International Criminal Tribunal for the former Yugoslavia (</span><abbr data-dcnode-id="5755" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="5756" instrument_node="">ICTY</span></abbr><span data-dcnode-id="5754" instrument_node="">) does not explicitly mention rape as a war crime, a Trial Chamber nevertheless recognized it as a grave breach of the Geneva Conventions.[</span><a data-dcnode-id="5752" href="#_ftn_013" id="_ftnref_013" name="_ftnref_013" title=""><span data-dcnode-id="5753" instrument_node="">13</span></a><span data-dcnode-id="5751" instrument_node="">]</span></p><p data-dcnode-id="5722"><span data-dcnode-id="5749" instrument_node="">Moreover, </span><abbr data-dcnode-id="5747" title="International Humanitarian Law "><span data-dcnode-id="5748" instrument_node="">IHL</span></abbr><span data-dcnode-id="5746" instrument_node=""> specially protects pregnant women and maternity cases against the effects of war,[</span><a data-dcnode-id="5744" href="#_ftn_014" id="_ftnref_014" name="_ftnref_014" title=""><span data-dcnode-id="5745" instrument_node="">14</span></a><span data-dcnode-id="5743" instrument_node="">] and stipulates that, during occupation, such preferential treatment is not to be hindered by the occupying power.[</span><a data-dcnode-id="5741" href="#_ftn_015" id="_ftnref_015" name="_ftnref_015" title=""><span data-dcnode-id="5742" instrument_node="">15</span></a><span data-dcnode-id="5740" instrument_node="">]</span><br data-dcnode-id="5739"><span data-dcnode-id="5738" instrument_node=""> Finally, female prisoners of war or female civilian internees also benefit from specific rules.[</span><a data-dcnode-id="5736" href="#_ftn_016" id="_ftnref_016" name="_ftnref_016" title=""><span data-dcnode-id="5737" instrument_node="">16</span></a><span data-dcnode-id="5735" instrument_node="">] Here again, </span><abbr data-dcnode-id="5733" title="International Humanitarian Law "><span data-dcnode-id="5734" instrument_node="">IHL</span></abbr><span data-dcnode-id="5732" instrument_node=""> seeks to protect women’s sexual integrity[</span><a data-dcnode-id="5730" href="#_ftn_017" id="_ftnref_017" name="_ftnref_017" title=""><span data-dcnode-id="5731" instrument_node="">17</span></a><span data-dcnode-id="5729" instrument_node="">] and to ensure that due attention is paid to pregnant and nursing mothers,[</span><a data-dcnode-id="5727" href="#_ftn_018" id="_ftnref_018" name="_ftnref_018" title=""><span data-dcnode-id="5728" instrument_node="">18</span></a><span data-dcnode-id="5726" instrument_node="">] while preventing States from discriminating against women belonging to the enemy party.[</span><a data-dcnode-id="5724" href="#_ftn_019" id="_ftnref_019" name="_ftnref_019" title=""><span data-dcnode-id="5725" instrument_node="">19</span></a><span data-dcnode-id="5723" instrument_node="">]</span></p><p data-dcnode-id="5717"><span data-dcnode-id="5721" instrument_node="">The special protection afforded to women in time of war and the prohibition of rape and other forms of sexual violence were both recently recognized as having attained customary status.[</span><a data-dcnode-id="5719" href="#_ftn_020" id="_ftnref_020" name="_ftnref_020" title=""><span data-dcnode-id="5720" instrument_node="">20</span></a><span data-dcnode-id="5718" instrument_node="">]</span></p></div><h4 class="casesdocheader" data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="5680"><ul data-dcnode-id="5681"><li data-dcnode-id="5709"><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-report-yemen-1967" title=""><abbr data-dcnode-id="5712" title="International Committee of the Red Cross "><span data-dcnode-id="5713" instrument_node="">ICRC</span></abbr><span data-dcnode-id="5711" instrument_node=""> Report on Yemen, 1967</span></a></li><li data-dcnode-id="5706"><a data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/germany-government-reply-rapes-bosnia" title=""><span data-dcnode-id="5708" instrument_node="">Germany, Government Reply on Rapes in Bosnia</span></a></li><li data-dcnode-id="5701"><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-kunarac-kovac-and-vukovic%23para_127"><abbr data-dcnode-id="5704" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="5705" instrument_node="">ICTY</span></abbr><span data-dcnode-id="5703" instrument_node="">, The Prosecutor v. Kunarac, Kovac and Vukovic [Paras 127-186]</span></a></li><li data-dcnode-id="5698"><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/afghanistan-separate-hospital-treatment-men-and-women" title=""><span data-dcnode-id="5700" instrument_node="">Afghanistan, Separate Hospital Treatment for Men and Women</span></a></li><li data-dcnode-id="5695"><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/women-and-sexual-violence"><span data-dcnode-id="5697" instrument_node="">Women and Sexual violence</span></a></li><li data-dcnode-id="5692"><a data-dcnode-id="5693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/un-report-secretary-general-women-and-peace-and-security" title=""><span data-dcnode-id="5694" instrument_node="">UN, Report of the Secretary-General on Women and Peace and Security</span></a></li><li data-dcnode-id="5689"><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/italy-use-force-against-ambulances-iraq"><span data-dcnode-id="5691" instrument_node="">Italy, Use of force against ambulances in Iraq</span></a></li><li data-dcnode-id="5686"><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republicdemocratic-republic-congouganda-lra-attacks"><span data-dcnode-id="5688" instrument_node="">Central African Republic/Democratic Republic of Congo/Uganda, LRA attacks</span></a></li><li data-dcnode-id="5682"><span class="field-content" data-dcnode-id="5683"><a data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republic-coup-detat-0"><span data-dcnode-id="5685" instrument_node="">Central African Republic, Coup d'Etat</span></a></span></li></ul></div><h4 aria-controls="readingsbody1" aria-expanded="false" class="readingsheader" data-dcnode-id="5678" data-toggle="collapse" href="#readingsbody1"><span data-dcnode-id="5679" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="5636" id="readingsbody1"><p data-dcnode-id="5675"><strong data-dcnode-id="5676"><span data-dcnode-id="5677" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="5658"><li data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">CARPENTER Charli R., Innocent Women and Children: Gender, Norms and the Protection of Civilians, Hampshire (England), Burlington (USA), Ashgate, 2006, 217 pp.</span></li><li data-dcnode-id="5667"><span data-dcnode-id="5672" instrument_node="">KRILL Françoise, “The Protection of Women in International Humanitarian Law”, in </span><em data-dcnode-id="5669"><abbr data-dcnode-id="5670" title="International Review of the Red Cross "><span data-dcnode-id="5671" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5668" instrument_node="">, No. 249, November 1985, pp. 337-363.</span></li><li data-dcnode-id="5661"><span data-dcnode-id="5666" instrument_node="">LINDSEY Charlotte, “Women and War”, in </span><em data-dcnode-id="5663"><abbr data-dcnode-id="5664" title="International Review of the Red Cross "><span data-dcnode-id="5665" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5662" instrument_node="">, No. 839, September 2000, pp. 561-580.</span></li><li data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">NUMMINEN Jutta, “Violence à l’égard des femmes en situation de conflit armé : analyse effectuée selon le point de vue féminin sur la protection de la femme dans le droit international humanitaire”, in The Finnish Yearbook of International Law, Vol. 9, 1998, pp. 453-473.</span></li></ul><p data-dcnode-id="5655"><strong data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="5637"><li data-dcnode-id="5646"><span data-dcnode-id="5654" instrument_node="">BARROW Amy, “</span><abbr data-dcnode-id="5652" title="United Nations"><span data-dcnode-id="5653" instrument_node="">UN</span></abbr><span data-dcnode-id="5651" instrument_node=""> Security Council Resolutions 1325 and 1820: Constructing Gender in Armed Conflict and International Humanitarian Law”, in </span><em data-dcnode-id="5648"><abbr data-dcnode-id="5649" title="International Review of the Red Cross "><span data-dcnode-id="5650" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5647" instrument_node="">, Vol. 92, No. 877, March 2010, pp.&nbsp;221-234.</span></li><li data-dcnode-id="5644"><span data-dcnode-id="5645" instrument_node="">BENNOUNE Karima, “Do We Need International Law to Protect Women in Armed Conflict?”, in Case Western Reserve Journal of International Law, No. 38, 2006, pp. 363-391.</span></li><li data-dcnode-id="5638"><span data-dcnode-id="5643" instrument_node="">DURHAM Helen &amp; O’BYRNE Katie, “The Dialogue of Difference: Gender Perspectives on International Humanitarian Law”, in </span><em data-dcnode-id="5640"><abbr data-dcnode-id="5641" title="International Review of the Red Cross "><span data-dcnode-id="5642" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5639" instrument_node="">, Vol. 92, No. 877, March 2010, pp. 31-52.</span></li></ul></div><p data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">aa) the feminist criticism of International Humanitarian Law</span></p><p data-dcnode-id="5612"><span data-dcnode-id="5633" instrument_node="">The very fact that </span><abbr data-dcnode-id="5631" title="International Humanitarian Law "><span data-dcnode-id="5632" instrument_node="">IHL</span></abbr><span data-dcnode-id="5630" instrument_node=""> seeks to protect women’s “honour” and grants special protection to expectant and nursing mothers has given rise to much criticism from feminist theorists.[</span><a data-dcnode-id="5628" href="#_ftn_021" id="_ftnref_021" name="_ftnref_021" title=""><span data-dcnode-id="5629" instrument_node="">21</span></a><span data-dcnode-id="5627" instrument_node="">] They argue that </span><abbr data-dcnode-id="5625" title="International Humanitarian Law "><span data-dcnode-id="5626" instrument_node="">IHL</span></abbr><span data-dcnode-id="5624" instrument_node=""> is inherently discriminatory – and somewhat old-fashioned – in that it mostly considers women as victims and men as combatants. At the same time, they contend that the rules on women are low down in the hierarchy of </span><abbr data-dcnode-id="5622" title="International Humanitarian Law "><span data-dcnode-id="5623" instrument_node="">IHL</span></abbr><span data-dcnode-id="5621" instrument_node=""> rules: for instance, provisions on women aim at ensuring protection rather than imposing strict prohibitions, and rape is not even included in the list of grave breaches.[</span><a data-dcnode-id="5619" href="#_ftn_022" id="_ftnref_022" name="_ftnref_022" title=""><span data-dcnode-id="5620" instrument_node="">22</span></a><span data-dcnode-id="5618" instrument_node="">]&nbsp;</span><br data-dcnode-id="5617"><span data-dcnode-id="5616" instrument_node=""> However, as mentioned above, the notion of rape, and the broader category of sexual violence, has evolved in international criminal law and such acts are now often prosecuted as grave breaches. Moreover, the language used in </span><abbr data-dcnode-id="5614" title="International Humanitarian Law "><span data-dcnode-id="5615" instrument_node="">IHL</span></abbr><span data-dcnode-id="5613" instrument_node=""> texts may be outdated, but the rules on the protection of women should be read and adapted in the light of their contemporary meaning. In our view, the main problem is not that the texts are insufficient, but that in this field, as in others, the rules are not sufficiently respected.</span></p><blockquote data-dcnode-id="5593"><blockquote data-dcnode-id="5594"><p data-dcnode-id="5609"><strong data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">Quotation</span></strong></p><div data-dcnode-id="5604"><p data-dcnode-id="5605"><abbr data-dcnode-id="5607" title="International Humanitarian Law "><span data-dcnode-id="5608" instrument_node="">IHL</span></abbr><span data-dcnode-id="5606" instrument_node=""> in addressing humanitarian needs in armed conflict assumes a population in which there is no systemic gender inequality. The system fails to recognize the unequal situation of men and women in society generally.</span></p></div><p data-dcnode-id="5595"><span data-dcnode-id="5603" instrument_node="">[</span><strong data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">Source</span></strong><span data-dcnode-id="5600" instrument_node="">: GARDAM Judith &amp; JARVIS Michelle J., Women, Armed Conflict and International Law, The Hague, Kluwer Law International, 2001, p. 97; quoted in DURHAM Helen “Women, Armed Conflict and International&nbsp; Law”, in </span><em data-dcnode-id="5597"><abbr data-dcnode-id="5598" title="International Review of the Red Cross "><span data-dcnode-id="5599" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5596" instrument_node="">, No. 847, September 2002, p. 657]</span></p></blockquote></blockquote><h4 aria-controls="readingsbody2" aria-expanded="false" class="readingsheader" data-dcnode-id="5591" data-toggle="collapse" href="#readingsbody2"><span data-dcnode-id="5592" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="5549" id="readingsbody2"><p data-dcnode-id="5588"><strong data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="5562"><li data-dcnode-id="5583"><span data-dcnode-id="5587" instrument_node="">CHARLESWORTH Hilary, “‘Feminist Methods in International Law’, Symposium on Method in International Law”, in </span><abbr data-dcnode-id="5585" title="American Journal of International Law"><span data-dcnode-id="5586" instrument_node="">AJIL</span></abbr><span data-dcnode-id="5584" instrument_node="">, Vol. 93, 1999, pp. 379-394.</span></li><li data-dcnode-id="5578"><span data-dcnode-id="5582" instrument_node="">CHINKIN Christine, “A Gendered Perspective to the International Use of Force”, in </span><abbr data-dcnode-id="5580" title="Australian Yearbook of International Law"><span data-dcnode-id="5581" instrument_node="">AYIL</span></abbr><span data-dcnode-id="5579" instrument_node="">, 1988-1989, pp. 279-293.</span></li><li data-dcnode-id="5572"><span data-dcnode-id="5577" instrument_node="">GARDAM Judith, “Women, Human Rights and International Humanitarian Law”, in </span><em data-dcnode-id="5574"><abbr data-dcnode-id="5575" title="International Review of the Red Cross "><span data-dcnode-id="5576" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5573" instrument_node="">, No. 324, September 1998, pp. 421-432.</span></li><li data-dcnode-id="5565"><span data-dcnode-id="5571" instrument_node="">GARDAM Judith, “Women and the Law of Armed Conflict: Why the Silence?”, in </span><abbr data-dcnode-id="5569" title="International and Comparative Law Quarterly "><span data-dcnode-id="5570" instrument_node="">ICLQ</span></abbr><span data-dcnode-id="5568" instrument_node="">, Vol. 46, 1997,</span><br data-dcnode-id="5567"><span data-dcnode-id="5566" instrument_node=""> pp.&nbsp;55-80.</span></li><li data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">GARDAM Judith &amp; CHARLESWORTH Hilary, “Protection of Women in Armed Conflict”, in Human Rights Quarterly, Vol. 22/1, February 2000, pp. 148-166.</span></li></ul><p data-dcnode-id="5559"><strong data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="5550"><li data-dcnode-id="5553"><span data-dcnode-id="5558" instrument_node="">DURHAM Helen, “Women, Armed Conflict, and International Law”, in </span><em data-dcnode-id="5555"><abbr data-dcnode-id="5556" title="International Review of the Red Cross "><span data-dcnode-id="5557" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5554" instrument_node="">, No.&nbsp;847, September 2002, pp. 655-659.</span></li><li data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">GARDAM Judith &amp; JARVIS Michelle J., Women, Armed Conflict and International Law, The Hague, Kluwer Law International, 2001, 283 pp.</span></li></ul></div><p data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">bb) the principles of non-discrimination and special protection</span></p><blockquote data-dcnode-id="5518"><blockquote data-dcnode-id="5519"><p data-dcnode-id="5544"><strong data-dcnode-id="5545"><span data-dcnode-id="5546" instrument_node="">Quotation</span></strong></p><div data-dcnode-id="5529"><p data-dcnode-id="5530"><span data-dcnode-id="5543" instrument_node="">Ever since its inception, international humanitarian law has accorded women general protection equal to that of men. [...] Women who have taken an active part in hostilities as combatants are entitled to the same protection as men when they have fallen into enemy hands. [...] Besides this general protection, women are also afforded special protection based on the principle outlined in Article 14, paragraph 2 [of Geneva </span><abbr data-dcnode-id="5541" title="Geneva Convention (III) Relative to the Treatment of Prisoners of War, of 12 August 1949 "><span data-dcnode-id="5542" instrument_node="">Convention III</span></abbr><span data-dcnode-id="5540" instrument_node="">], that “women shall be treated with all the regard due to their sex”. This principle is followed through in a number of provisions which expressly refer to the conditions of detention for women in </span><abbr data-dcnode-id="5538" title="Prisoner of War"><span data-dcnode-id="5539" instrument_node="">POW</span></abbr><span data-dcnode-id="5537" instrument_node=""> camps [...]. Women (and men) who, as members of the civilian population, are taking no active part in hostilities are afforded protection under the Fourth Geneva Convention [...] and under Additional </span><abbr data-dcnode-id="5535" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5536" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="5534" instrument_node="">. [...] In addition to this general protection, women are afforded special protection under the said Convention and </span><abbr data-dcnode-id="5532" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5533" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="5531" instrument_node="">, which stipulate that “women shall be especially protected against any attack on their honour, in particular against rape, enforced prostitution or any form of indecent assault”. International humanitarian law also lays down special provisions for pregnant women and mothers of small children [...].</span></p></div><p data-dcnode-id="5520"><span data-dcnode-id="5528" instrument_node="">[</span><strong data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">Source</span></strong><span data-dcnode-id="5525" instrument_node="">: LINDSEY Charlotte, “Women and War”, in </span><em data-dcnode-id="5522"><abbr data-dcnode-id="5523" title="International Review of the Red Cross "><span data-dcnode-id="5524" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5521" instrument_node="">, No. 839, September 2000, p. 580]</span></p></blockquote></blockquote><div data-dcnode-id="5516" id="ii_2_cc"><span data-dcnode-id="5517" instrument_node="">cc) protection against rape and sexual violence</span></div><div data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">&nbsp;</span></div><h4 class="casesdocheader" data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="5451"><ul data-dcnode-id="5452"><li data-dcnode-id="5506"><a data-dcnode-id="5507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sudan-report-un-commission-enquiry-darfur%23para_333"><span data-dcnode-id="5511" instrument_node="">Sudan, Report of the </span><abbr data-dcnode-id="5509" title="United Nations"><span data-dcnode-id="5510" instrument_node="">UN</span></abbr><span data-dcnode-id="5508" instrument_node=""> Commission of Enquiry on Darfur [Paras 333-358]</span></a></li><li data-dcnode-id="5496"><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/democratic-republic-congo-conflict-kivus" title=""><span data-dcnode-id="5505" instrument_node="">Democratic Republic of the Congo, Conflict in the Kivus</span></a><span data-dcnode-id="5503" instrument_node=""> [Part III, paras </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/democratic-republic-congo-conflict-kivus%23para16"><span data-dcnode-id="5502" instrument_node="">16</span></a><span data-dcnode-id="5500" instrument_node="">, </span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/democratic-republic-congo-conflict-kivus%23para35-37"><span data-dcnode-id="5499" instrument_node="">35-37</span></a><span data-dcnode-id="5497" instrument_node="">]</span></li><li data-dcnode-id="5493"><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/georgiarussia-human-rights-watchs-report-conflict-south-ossetia%23para87-89"><span data-dcnode-id="5495" instrument_node="">Georgia/Russia, Human Rights Watch’s Report on the Conflict in South Ossetia [Paras 87-89]</span></a></li><li data-dcnode-id="5490"><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/doc/case-study/democratic-republic-of-congo-involvement-of-monusco.htm"><span data-dcnode-id="5492" instrument_node="">Democratic Republic of Congo, Involvement of MONUSCO</span></a></li><li data-dcnode-id="5487"><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/doc/case-study/mali-conduct-of-hostilities.htm"><span data-dcnode-id="5489" instrument_node="">Mali, Conduct of Hostilities</span></a></li><li data-dcnode-id="5484"><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/node/20954"><span data-dcnode-id="5486" instrument_node="">Democratic Republic of Congo, Fighting with the M 23 Group</span></a></li><li data-dcnode-id="5481"><a data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/node/20941"><span data-dcnode-id="5483" instrument_node="">Central African Republic, Coup d’Etat</span></a></li><li data-dcnode-id="5478"><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/philippines-armed-group-undertakes-respect-children"><span data-dcnode-id="5480" instrument_node="">Philippines, Armed Group Undertakes to Respect Children</span></a></li><li data-dcnode-id="5475"><a data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/women-and-sexual-violence"><span data-dcnode-id="5477" instrument_node="">Women and Sexual violence</span></a></li><li data-dcnode-id="5472"><a data-dcnod udgment in the Case of the Prosecutor V. Jean-Pierre Bemba Gombo</span></a></li><li data-dcnode-id="5453"><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/geneva-call-and-chin-national-front"><span data-dcnode-id="5455" instrument_node="">Geneva Call and the Chin National Front</span></a></li></ul></div><h4 aria-controls="readingsbody3" aria-expanded="false" class="readingsheader" data-dcnode-id="5449" data-toggle="collapse" href="#readingsbody3"><span data-dcnode-id="5450" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="5367" id="readingsbody3"><p data-dcnode-id="5446"><strong data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="5408"><li data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">ANTONIONI Antonio, “Le viol et le droit de la guerre dans la doctrine”, in Journal of the History of International Law, Vol. 4/1, 2002, pp. 100-114.</span></li><li data-dcnode-id="5439"><span data-dcnode-id="5443" instrument_node="">CHINKIN Christine, “Rape and Sexual Abuse of Women in International Law”, in </span><abbr data-dcnode-id="5441" title="European Journal of International Law"><span data-dcnode-id="5442" instrument_node="">EJIL</span></abbr><span data-dcnode-id="5440" instrument_node="">, Vol. 5/3, 1994, pp. 326-341.</span></li><li data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">COPELON Rhonda, “Gender Crimes as War Crimes: Integrating Crimes Against Women into International Criminal Law”, in McGill Law Journal, Vol. 46/1, 2000, pp. 217-240.</span></li><li data-dcnode-id="5432"><span data-dcnode-id="5436" instrument_node="">DIXON Rosalind, “Rape as a Crime in International Humanitarian Law: Where to From Here?”, in </span><abbr data-dcnode-id="5434" title="European Journal of International Law"><span data-dcnode-id="5435" instrument_node="">EJIL</span></abbr><span data-dcnode-id="5433" instrument_node="">, Vol. 13/3, June 2002, pp. 697-719.</span></li><li data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">GUENIVET&nbsp;Karima, Violences sexuelles : la nouvelle arme de guerre, Paris, Michalon, 2001, 206 pp.</span></li><li data-dcnode-id="5426"><span data-dcnode-id="5429" instrument_node="">ISLAM Rafiqul, “The Culpability of Gender-Based Terrorism in International Humanitarian Law: the Rape of Women in Armed Conflicts”, in ISIL Yearbook of International Humanitarian and Refugee Law, Vol. 6, 2006,</span><br data-dcnode-id="5428"><span data-dcnode-id="5427" instrument_node=""> pp. 87-105.</span></li><li data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">KENNEDY-PIPE Caroline &amp; PENNY Stanley, “Rape in War: Lessons of the Balkan Conflicts in the 1990s”, in International Journal of Human Rights, Vol. 4/3-4, 2000, pp. 67-84.</span></li><li data-dcnode-id="5419"><span data-dcnode-id="5423" instrument_node="">MERON Theodor, “Rape as a Crime under International Humanitarian Law”, in </span><abbr data-dcnode-id="5421" title="American Journal of International Law"><span data-dcnode-id="5422" instrument_node="">AJIL</span></abbr><span data-dcnode-id="5420" instrument_node="">, Vol. 87/3 1993, pp. 424-428.</span></li><li data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">MORRIS Madeline, “By Force of Arms: Rape, War and Military Culture”, in Duke Law Journal, Vol. 45/4, 1996, pp. 651-781.</span></li><li data-dcnode-id="5415"><span data-dcnode-id="5416" instrument_node="">NIARCHOS Catherine N., “Women, War, and Rape: Challenges Facing the International Tribunal for the Former Yugoslavia”, in Human Rights Quarterly, Vol. 17/4, 1995, pp. 649-690.</span></li><li data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">PAPACONSTANTINOU Maria, “Rape as Crime under International Humanitarian Law”, in Revue Hellénique de Droit International, Vol.&nbsp;51/2, 1998, pp. 477-499.</span></li><li data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">PILCH Frances T., “The Crime of Rape in International Humanitarian Law”, in Journal of Legal Studies, Vol. 9, 1998-99, pp. 99-119.</span></li><li data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">QUENIVET Noëlle N.R., Sexual Offenses in Armed Conflict and International Law, Ardsley, Transnational Publishers, 2005, 230 pp.</span></li></ul><p data-dcnode-id="5405"><strong data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="5368"><li data-dcnode-id="5400"><span data-dcnode-id="5404" instrument_node="">ASKIN Kelly Dawn, “Sexual Violence in Decisions and Indictments of the Yugoslav and Rwandan Tribunal: Current Status”, in </span><abbr data-dcnode-id="5402" title="American Journal of International Law"><span data-dcnode-id="5403" instrument_node="">AJIL</span></abbr><span data-dcnode-id="5401" instrument_node="">, Vol. 93/1, 1999, pp. 97-123.</span></li><li data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">DYANI Ntombizozuko, “Protocol on the Rights of Women in Africa: Protection of Women from Sexual Violence during Armed Conflict”, in African Human Rights Law Journal, Vol. 6, No. 1, 2006, pp. 166-187.</span></li><li data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">FLORES ACUNA Tathiana, “The Rome Statute’s Sexual Related Crimes: an Appraisal under the Light of International Humanitarian Law”, in Humanitäres Völkerrecht, Vol. 19, No. 1, 2006, pp. 39-51.</span></li><li data-dcnode-id="5391"><span data-dcnode-id="5395" instrument_node="">LAVIOLETTE Nicole, “Commanding Rape: Sexual Violence, Command Responsibility, and the Prosecution of Superiors by the International Criminal Tribunals for the former Yugoslavia and Rwanda”, in </span><abbr data-dcnode-id="5393" title="Canadian Yearbook of International Law"><span data-dcnode-id="5394" instrument_node="">CYIL</span></abbr><span data-dcnode-id="5392" instrument_node="">, Vol. 36, 1998, pp. 93-149.</span></li><li data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">LEWIS Dustin A., “Unrecognized Victims: Sexual Violence against Men in Conflict Settings under International Law”, Wisconsin International Law Journal, Vol. 27, No. 1, 2009, pp. 1-49.</span></li><li data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">RICHEY Katie C., “Several Steps Sideways: International Legal Developments Concerning War Rape and the Human Rights of Women”, in Texas Journal of Women and the Law, Vol. 17, No. 1, 2007, pp. 109-129.</span></li><li data-dcnode-id="5382"><span data-dcnode-id="5386" instrument_node="">SIVAKUMARAN Sandesh, “Sexual Violence against Men in Armed Conflict”, </span><abbr data-dcnode-id="5384" title="European Journal of International Law"><span data-dcnode-id="5385" instrument_node="">EJIL</span></abbr><span data-dcnode-id="5383" instrument_node="">, Vol. 18, No. 2, April 2007, pp. 253-276.</span></li><li data-dcnode-id="5373"><span data-dcnode-id="5381" instrument_node="">SIVAKUMARAN Sandesh, “Lost in Translation: </span><abbr data-dcnode-id="5379" title="United Nations"><span data-dcnode-id="5380" instrument_node="">UN</span></abbr><span data-dcnode-id="5378" instrument_node=""> Responses to Sexual Violence against Men and Boys in Situations of Armed Conflict”, in </span><em data-dcnode-id="5375"><abbr data-dcnode-id="5376" title="International Review of the Red Cross "><span data-dcnode-id="5377" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="5374" instrument_node="">, Vol. 92, No. 877, March 2010, pp. 259-277.</span></li><li data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">VAN DER POLL Letetia, “The Emerging Jurisprudence on Sexual Violence Perpetrated against Women during Armed Conflict”, in African Yearbook on International Humanitarian Law, 2007, pp. 1-38.</span></li><li data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">ZAWATI Hilmi M., “Impunity or Immunity: Wartime Male Rape and Sexual Torture as a Crime against Humanity”, in Torture: Journal on Rehabilitation of Torture Victims and Prevention of Torture, Vol. 17, No. 1, 2007, pp. 27-47.</span></li></ul></div><div data-dcnode-id="5359"><p data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">dd) grounds for preferential treatment</span></p><ul data-dcnode-id="5360"><li data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">pregnant women or maternity cases</span></li><li data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">mothers of children under seven years of age</span></li></ul></div><ol data-dcnode-id="5338" type="a"><li data-dcnode-id="5339" value="3"><a class="nohref" data-dcnode-id="5358" id="ii_2_c" name="ii_2_c"></a><strong data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">special protection of children</span></strong><br data-dcnode-id="5353"><span data-dcnode-id="5352" instrument_node=""> </span><abbr data-dcnode-id="5350" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><span data-dcnode-id="5351" instrument_node="">GC IV</span></abbr><span data-dcnode-id="5349" instrument_node="">, Arts 14, 17, 23, 24, 38, 50, 76, 82, 89, 94 and 132; </span><abbr data-dcnode-id="5347" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5348" instrument_node="">P I</span></abbr><span data-dcnode-id="5346" instrument_node="">, Arts 70 and 77-78; </span><abbr data-dcnode-id="5344" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5345" instrument_node="">P II</span></abbr><span data-dcnode-id="5343" instrument_node="">, Art. 4 [</span><abbr data-dcnode-id="5341" title="Customary International Humanitarian Law: Rules reproduced in Case 29 (C), drawn from HENCKAERTS Jean-Marie &amp; DOSWALDBECK Louise, Customary International Humanitarian Law, Cambridge/Geneva, CUP/ICRC, 2005, 3 Vols. 5032 pp. "><span data-dcnode-id="5342" instrument_node="">CIHL</span></abbr><span data-dcnode-id="5340" instrument_node="">, Rules 135-137]</span></li></ol><p data-dcnode-id="5327"><span data-dcnode-id="5337" instrument_node="">Like women, children are first protected by </span><abbr data-dcnode-id="5335" title="International Humanitarian Law "><span data-dcnode-id="5336" instrument_node="">IHL</span></abbr><span data-dcnode-id="5334" instrument_node=""> if they are wounded, sick or shipwrecked, as civilians and as members of the civilian population. They also benefit from special protection because of their vulnerability. Every armed conflict leaves numerous children without resources or separated from their families, a situation that renders them even more vulnerable. This is why </span><abbr data-dcnode-id="5332" title="International Humanitarian Law "><span data-dcnode-id="5333" instrument_node="">IHL</span></abbr><span data-dcnode-id="5331" instrument_node=""> contains specific rules aimed at protecting children from the effects of hostilities, from any form of indecent assault, or from any other danger arising from the general circumstances of a war situation.[</span><a data-dcnode-id="5329" href="#_ftn_023" id="_ftnref_023" name="_ftnref_023" title=""><span data-dcnode-id="5330" instrument_node="">23</span></a><span data-dcnode-id="5328" instrument_node="">]</span></p><p data-dcnode-id="5313"><span data-dcnode-id="5326" instrument_node="">But above all, </span><abbr data-dcnode-id="5324" title="International Humanitarian Law "><span data-dcnode-id="5325" instrument_node="">IHL</span></abbr><span data-dcnode-id="5323" instrument_node=""> aims to prevent the participation of children in hostilities. Parties to conflicts may not recruit children under 15 into their armed forces and have to ensure that they do not take a direct part in hostilities.[</span><a data-dcnode-id="5321" href="#_ftn_024" id="_ftnref_024" name="_ftnref_024" title=""><span data-dcnode-id="5322" instrument_node="">24</span></a><span data-dcnode-id="5320" instrument_node="">] In Protocols I and II and in Art. 38 of the Convention on the Rights of the Child, the age threshold is 15; the Optional Protocol to the Convention on the Rights of the Child on the involvement of children in armed conflict[</span><a data-dcnode-id="5318" href="#_ftn_025" id="_ftnref_025" name="_ftnref_025" title=""><span data-dcnode-id="5319" instrument_node="">25</span></a><span data-dcnode-id="5317" instrument_node="">] raises it to 18, except that States may accept voluntary enrolment of persons under 18 into military schools, thus establishing an inequality between governmental forces and non-State armed groups. If children nevertheless participate in hostilities, they will still benefit, if captured, from preferential treatment.[</span><a data-dcnode-id="5315" href="#_ftn_026" id="_ftnref_026" name="_ftnref_026" title=""><span data-dcnode-id="5316" instrument_node="">26</span></a><span data-dcnode-id="5314" instrument_node="">] If they are, despite the above-mentioned prohibitions, members of armed forces, they benefit from combatant and prisoner-of-war status.</span></p><p data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">The contents of the special protection afforded to children must nevertheless be construed with care. For instance, as the treaty rules prevent the direct involvement of children in hostilities, organizations working in the field of children’s rights and some soft law instruments suggest that the prohibition (or even the notion of direct participation) be extended to the case of children associated with armed groups, in order to ensure that children are kept away from all sorts of involvement. This might not be realistic in the case of insurgent groups and might at the same time make it easier for the enemy to directly target participating children, thus putting such children in greater danger. At the same time, the mere fact that children could be targeted when involved in combat goes against the idea of preferential treatment afforded to children. A solution would be to exclude participating children from the category of legitimate targets, but it seems unrealistic to expect the parties to refrain from targeting such armed enemies. The principle of military necessity as a restriction to violence even against legitimate targets should at least in this case require them to arrest rather than kill such children whenever possible.</span></p><blockquote data-dcnode-id="5287"><p data-dcnode-id="5308"><strong data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">Quotation 1</span></strong></p><div data-dcnode-id="5296"><p data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Article 38.</span></p><ol data-dcnode-id="5297"><li data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">States Parties undertake to respect and to ensure respect for rules of International Humanitarian Law applicable to them in armed conflicts which are relevant to the child.</span></li><li data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">States Parties shall take all feasible measures to ensure that persons who have not attained the age of fifteen years do not take a direct part in hostilities.</span></li><li data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">States Parties shall refrain from recruiting any person who has not attained the age of fifteen years into their armed forces. In recruiting among those persons who have attained the age of fifteen years but who have not attained the age of eighteen years, States Parties shall endeavor to give priority to those who are oldest.</span></li><li data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">In accordance with their obligations under International Humanitarian Law to protect the civilian population in armed conflicts, States Parties shall take all feasible measures to ensure protection and care of children who are affected by an armed conflict.</span></li></ol></div><p data-dcnode-id="5288"><span data-dcnode-id="5295" instrument_node="">[</span><strong data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">Source</span></strong><span data-dcnode-id="5292" instrument_node="">: Convention on the Rights of the Child, November 20, 1989; available on </span><a data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/" target="_blank"><span data-dcnode-id="5291" instrument_node="">http://www.ohchr.org</span></a><span data-dcnode-id="5289" instrument_node="">]</span></p></blockquote><p data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">&nbsp;</span></p><blockquote data-dcnode-id="5252"><p data-dcnode-id="5282"><strong data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Quotation 2</span></strong></p><p align="center" data-dcnode-id="5279"><strong data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Convention (182) on the Worst Forms of Child Labour, 1999. [...]</span></strong></p><p align="center" data-dcnode-id="5275"><strong data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Article</span></strong><span data-dcnode-id="5276" instrument_node=""> 1</span></p><p data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Each Member which ratifies this Convention shall take immediate and effective measures to secure the prohibition and elimination of the worst forms of child labour as a matter of urgency.</span></p><p align="center" data-dcnode-id="5270"><strong data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Article 2</span></strong></p><p data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">For the purposes of this Convention, the term child shall apply to all persons under the age of 18.</span></p><p align="center" data-dcnode-id="5265"><strong data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">Article 3</span></strong></p><p data-dcnode-id="5261"><span data-dcnode-id="5264" instrument_node="">For the purposes of this Convention, the term the worst forms of child labour comprises:</span><br data-dcnode-id="5263"><span data-dcnode-id="5262" instrument_node=""> (a) &nbsp;&nbsp;&nbsp; all forms of slavery or practices similar to slavery, such as the sale and trafficking of children, debt bondage and serfdom and forced or compulsory labour, including forced or compulsory recruitment of children for use in armed conflict; [...]</span></p><p data-dcnode-id="5253"><span data-dcnode-id="5260" instrument_node="">[</span><strong data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">Source</span></strong><span data-dcnode-id="5257" instrument_node="">: Convention concerning the Prohibition and Immediate Action for the Elimination of the Worst Forms of Child Labour (C182), 17 June 1999; available on </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ilo.ch/" target="_blank"><span data-dcnode-id="5256" instrument_node="">http://www.ilo.ch</span></a><span data-dcnode-id="5254" instrument_node="">]</span></p></blockquote><h4 class="casesdocheader" data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="5189"><ul data-dcnode-id="5190"><li data-dcnode-id="5246"><div class="rx_ephox_inlinevariant" data-dcnode-id="5247"><a data-dcnode-id="5248" href="https:/ ebook.icrc.org/case-study/sierra-leone-special-court-ruling-recruitment-children" title=""><span data-dcnode-id="5229" instrument_node="">Sierra Leone, Special Court Ruling on the Recruitment of Children</span></a></li><li data-dcnode-id="5224"><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/doc/case-study/democratic-republic-of-congo-involvement-of-monusco.htm"><span data-dcnode-id="5226" instrument_node="">Democratic Republic of Congo, Involvement of MONUSCO</span></a></li><li data-dcnode-id="5221"><a data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/doc/case-study/mali-conduct-of-hostilities.htm"><span data-dcnode-id="5223" instrument_node="">Mali, Conduct of Hostilities</span></a></li><li data-dcnode-id="5218"><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/engaging-non-state-armed-groups-protection-children"><span data-dcnode-id="5220" instrument_node="">Engaging Non-state Armed Groups on the Protection of Children</span></a></li><li data-dcnode-id="5215"><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/philippines-armed-group-undertakes-respect-children"><span data-dcnode-id="5217" instrument_node="">Philippines, Armed Group Undertakes to Respect Children</span></a></li><li data-dcnode-id="5212"><a data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/somalia-fate-children-conflict"><span data-dcnode-id="5214" instrument_node="">Somalia, the fate of Children in the conflict</span></a></li><li data-dcnode-id="5209"><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/usa-jawad-v-gates"><span data-dcnode-id="5211" instrument_node="">USA, Jawad v. Gates</span></a></li><li data-dcnode-id="5206"><a data-dcnode-id="5207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/eastern-ukraine-attacks-against-and-military-use-schools"><span data-dcnode-id="5208" instrument_node="">Eastern Ukraine, Attacks Against and Military Use of Schools</span></a></li><li data-dcnode-id="5203"><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republicdemocratic-republic-congouganda-lra-attacks"><span data-dcnode-id="5205" instrument_node="">Central African Republic/Democratic Republic of Congo/Uganda, LRA attacks</span></a></li><li data-dcnode-id="5199"><span class="field-content" data-dcnode-id="5200"><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republic-coup-detat-0"><span data-dcnode-id="5202" instrument_node="">Central African Republic, Coup d'Etat</span></a></span></li><li data-dcnode-id="5195"><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republic-no-class-when-armed-groups-use-schools"><span class="field-content" data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">Central African Republic, No Class: When Armed Groups Use Schools</span></span></a></li><li data-dcnode-id="5191"><a data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/geneva-call-and-chin-national-front"><span class="field-content" data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Geneva Call and the Chin National Front</span></span></a></li></ul></div><h4 aria-controls="readingsbody4" aria-expanded="false" class="readingsheader" data-dcnode-id="5187" data-toggle="collapse" href="#readingsbody4"><span data-dcnode-id="5188" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="5107" id="readingsbody4"><p data-dcnode-id="5184"><strong data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="5108"><li data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">ABBOTT Amy Beth, “Child Soldiers – The Use of Children as Instruments of War”, in Suffolk Transnational Law Review, Vol. 23/2, 2000, pp. 499-537.</span></li><li data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">BOUVIER Antoine &amp; DUTLI Maria Teresa, “Children in Armed Conflict”, in The International Journal of Children’s Rights, The Hague, Kluwer Law International, Vol. 4/2, 1996, pp. 115-212.</span></li><li data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">BREEN Claire, “When is a Child not a Child?: Child Soldiers in International Law”, in Human Rights Review, Vol. 8, No. 2, January-March 2007, pp. 71-103.</span></li><li data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">BRETT Rachel &amp; MACCALLIN Margaret, Children: The Invisible Soldiers, Rädda Barnen (Swedish Save the Children), Stockholm, 1996, 257 pp.</span></li><li data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">BUGNION François, “Les enfants soldats, le droit international humanitaire et la Charte africaine des droits et du bien-être de l’enfant”, in African Journal of International and Comparative Law, Vol. 12/2, 2000, pp. 262-275.</span></li><li data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">CHAMBERLAIN Cynthia, MOODRICK-EVEN KHEN Hilly &amp; SCHABAS William A., “Children and Armed Conflict”, in QUENIVET Noëlle &amp; SHAH-DAVIS Shilan (eds), International Law and Armed Conflict: Challenges in the 21st Century, The Hague, T.M.C. Asser Press, 2010, pp. 243-286.</span></li><li data-dcnode-id="5170"><spa
