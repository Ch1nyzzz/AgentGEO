ocument%26documentId%3D609876DAFD3EEEACC12563CD0051DF9A"><span data-dcnode-id="3820" instrument_node="">, Arts 70</span></a><span data-dcnode-id="3818" instrument_node="">, </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D8F7D6B2DEE119FBAC12563CD0051E0A2"><span data-dcnode-id="3817" instrument_node="">77</span></a><span data-dcnode-id="3815" instrument_node=""> and </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/ART/470-750100%3FOpenDocument"><span data-dcnode-id="3814" instrument_node="">78</span></a><span data-dcnode-id="3812" instrument_node="">; </span><abbr data-dcnode-id="3809" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DF9CBD575D47CA6C8C12563CD0051E783"><span data-dcnode-id="3811" instrument_node="">P II</span></a></abbr><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DF9CBD575D47CA6C8C12563CD0051E783"><span data-dcnode-id="3808" instrument_node="">, Art. 4(3)(e)</span></a></li><li data-dcnode-id="3791"><a data-dcnode-id="3804" href="#_ftnref_024" id="_ftn_024" name="_ftn_024" title=""><span data-dcnode-id="3805" instrument_node="">[24]</span></a><span data-dcnode-id="3803" instrument_node=""> </span><abbr data-dcnode-id="3800" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D8F7D6B2DEE119FBAC12563CD0051E0A2"><span data-dcnode-id="3802" instrument_node="">P I</span></a></abbr><a data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D8F7D6B2DEE119FBAC12563CD0051E0A2"><span data-dcnode-id="3799" instrument_node="">, Art. 77(2)</span></a><span data-dcnode-id="3797" instrument_node="">; </span><abbr data-dcnode-id="3794" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DF9CBD575D47CA6C8C12563CD0051E783"><span data-dcnode-id="3796" instrument_node="">P II</span></a></abbr><a data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DF9CBD575D47CA6C8C12563CD0051E783"><span data-dcnode-id="3793" instrument_node="">, Art. 4(3)(c)</span></a></li><li data-dcnode-id="3782"><a data-dcnode-id="3789" href="#_ftnref_025" id="_ftn_025" name="_ftn_025" title=""><span data-dcnode-id="3790" instrument_node="">[25]</span></a><span data-dcnode-id="3788" instrument_node=""> </span><em data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">See</span></em><div class="rx_ephox_inlinevariant" data-dcnode-id="3783"><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/ihl.nsf/FULL/595" onclick="window.open(this.href, 'child'); return false;" onkeypress="window.open(this.href, 'child'); return false;" target="_blank" title="Go to Optional Protocol on the Convention on the Rights of the Child, on the Involvement of Children in Armed Conflict"><span data-dcnode-id="3785" instrument_node="">Optional Protocol on the Convention on the Rights of the Child, on the Involvement of Children in Armed Conflict</span></a></div></li><li data-dcnode-id="3773"><a data-dcnode-id="3780" href="#_ftnref_026" id="_ftn_026" name="_ftn_026" title=""><span data-dcnode-id="3781" instrument_node="">[26]</span></a><span data-dcnode-id="3779" instrument_node=""> </span><abbr data-dcnode-id="3776" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D8F7D6B2DEE119FBAC12563CD0051E0A2"><span data-dcnode-id="3778" instrument_node="">P I</span></a></abbr><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D8F7D6B2DEE119FBAC12563CD0051E0A2"><span data-dcnode-id="3775" instrument_node="">, Art. 77</span></a></li></ul></div></div><div class="field-item odd" data-dcnode-id="3002"><span data-dcnode-id="3769" id="toc-iii-refugees-and-displaced-persons-in-international-humanitarian-law"></span><h2 data-dcnode-id="3766"><a class="nohref" data-dcnode-id="3768" id="chapter4"></a><span data-dcnode-id="3767" instrument_node="">III. Refugees and displaced persons in International Humanitarian Law</span></h2><div class="rxbodyfield" data-dcnode-id="3003"><span data-dcnode-id="3765" id="toc-introductory-text-2"></span><h3 data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Introductory text</span></h3><p data-dcnode-id="3740"><span data-dcnode-id="3762" instrument_node="">If States consistently and fully observed the principles of </span><abbr data-dcnode-id="3760" title="International Humanitarian Law "><span data-dcnode-id="3761" instrument_node="">IHL</span></abbr><span data-dcnode-id="3759" instrument_node=""> protecting civilians,[</span><a data-dcnode-id="3757" href="#_ftn_027" id="_ftnref_027" name="_ftnref_027" title=""><span data-dcnode-id="3758" instrument_node="">27</span></a><span data-dcnode-id="3756" instrument_node="">] most population movements brought about by armed conflicts would be prevented. The </span><abbr data-dcnode-id="3754" title="International Humanitarian Law "><span data-dcnode-id="3755" instrument_node="">IHL</span></abbr><span data-dcnode-id="3753" instrument_node=""> of non-international armed conflicts contains a general prohibition of forced movements of civilians,[</span><a data-dcnode-id="3751" href="#_ftn_028" id="_ftnref_028" name="_ftnref_028" title=""><span data-dcnode-id="3752" instrument_node="">28</span></a><span data-dcnode-id="3750" instrument_node="">] while the </span><abbr data-dcnode-id="3748" title="International Humanitarian Law "><span data-dcnode-id="3749" instrument_node="">IHL</span></abbr><span data-dcnode-id="3747" instrument_node=""> of international armed conflicts stipulates such a general prohibition only for occupied territories.[</span><a data-dcnode-id="3745" href="#_ftn_029" id="_ftnref_029" name="_ftnref_029" title=""><span data-dcnode-id="3746" instrument_node="">29</span></a><span data-dcnode-id="3744" instrument_node="">] Recognizing that such situations and population movements may occur for reasons other than an armed conflict, </span><abbr data-dcnode-id="3742" title="International Humanitarian Law "><span data-dcnode-id="3743" instrument_node="">IHL</span></abbr><span data-dcnode-id="3741" instrument_node=""> provides protection to both displaced persons and refugees.</span></p><p data-dcnode-id="3729"><span data-dcnode-id="3739" instrument_node="">Displaced persons are civilians fleeing within their own country, e.g., from armed conflict. </span><abbr data-dcnode-id="3737" title="International Humanitarian Law "><span data-dcnode-id="3738" instrument_node="">IHL</span></abbr><span data-dcnode-id="3736" instrument_node=""> protects those displaced because of an international armed conflict, e.g., grants them the right to receive items essential to survival.[</span><a data-dcnode-id="3734" href="#_ftn_030" id="_ftnref_030" name="_ftnref_030" title=""><span data-dcnode-id="3735" instrument_node="">30</span></a><span data-dcnode-id="3733" instrument_node="">] Civilians displaced by internal armed conflict enjoy similar but less detailed protection.[</span><a data-dcnode-id="3731" href="#_ftn_031" id="_ftnref_031" name="_ftnref_031" title=""><span data-dcnode-id="3732" instrument_node="">31</span></a><span data-dcnode-id="3730" instrument_node="">]</span></p><p data-dcnode-id="3697"><span data-dcnode-id="3728" instrument_node="">Refugees, in contrast, are those who fled their country. </span><abbr data-dcnode-id="3726" title="International Humanitarian Law "><span data-dcnode-id="3727" instrument_node="">IHL</span></abbr><span data-dcnode-id="3725" instrument_node=""> protects such individuals, as civilians affected by hostilities,[</span><a data-dcnode-id="3723" href="#_ftn_032" id="_ftnref_032" name="_ftnref_032" title=""><span data-dcnode-id="3724" instrument_node="">32</span></a><span data-dcnode-id="3722" instrument_node="">] only if they have fled to a State taking part in an international armed conflict[</span><a data-dcnode-id="3720" href="#_ftn_033" id="_ftnref_033" name="_ftnref_033" title=""><span data-dcnode-id="3721" instrument_node="">33</span></a><span data-dcnode-id="3719" instrument_node="">] (or if that State is beset by internal armed conflict[</span><a data-dcnode-id="3717" href="#_ftn_034" id="_ftnref_034" name="_ftnref_034" title=""><span data-dcnode-id="3718" instrument_node="">34</span></a><span data-dcnode-id="3716" instrument_node="">]). </span><abbr data-dcnode-id="3714" title="International Humanitarian Law "><span data-dcnode-id="3715" instrument_node="">IHL</span></abbr><span data-dcnode-id="3713" instrument_node=""> specifically protects refugees entering the territory of an enemy State against unfavourable treatment (based on their nationality).[</span><a data-dcnode-id="3711" href="#_ftn_035" id="_ftnref_035" name="_ftnref_035" title=""><span data-dcnode-id="3712" instrument_node="">35</span></a><span data-dcnode-id="3710" instrument_node="">] Those considered refugees prior to the outbreak of hostilities (including those from a neutral State) are always considered protected persons under the </span><abbr data-dcnode-id="3708" title="International Humanitarian Law "><span data-dcnode-id="3709" instrument_node="">IHL</span></abbr><span data-dcnode-id="3707" instrument_node=""> of international armed conflicts,[</span><a data-dcnode-id="3705" href="#_ftn_036" id="_ftnref_036" name="_ftnref_036" title=""><span data-dcnode-id="3706" instrument_node="">36</span></a><span data-dcnode-id="3704" instrument_node="">] which also provides special guarantees for those who fled to territory which becomes occupied by the State of which they are nationals.[</span><a data-dcnode-id="3702" href="#_ftn_037" id="_ftnref_037" name="_ftnref_037" title=""><span data-dcnode-id="3703" instrument_node="">37</span></a><span data-dcnode-id="3701" instrument_node="">] Finally, regarding non-refoulement, the Conventions expressly state that protected persons may not be transferred to a State where they fear persecution on political or religious grounds.[</span><a data-dcnode-id="3699" href="#_ftn_038" id="_ftnref_038" name="_ftnref_038" title=""><span data-dcnode-id="3700" instrument_node="">38</span></a><span data-dcnode-id="3698" instrument_node="">]</span></p><h4 aria-controls="readingsbody13" aria-expanded="false" class="readingsheader" data-dcnode-id="3695" data-toggle="collapse" href="#readingsbody13"><span data-dcnode-id="3696" instrument_node="">SPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="3645" id="readingsbody13"><p data-dcnode-id="3692"><strong data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="3663"><li data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">BUGNION François, “Réfugiés, personnes déplacées et droit international humanitaire”, in Revue suisse de droit international et de droit européen, Vol. 3, 2001, pp. 277-288.</span></li><li data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">COLLINSON Sarah (ed.), Realising Protection: the Uncertain Benefits of Civilian, Refugee and IDP Status, London, Overseas Development Institute, September 2009, 62pp.&nbsp;</span></li><li data-dcnode-id="3679"><span data-dcnode-id="3687" instrument_node="">LAVOYER Jean-Philippe, “Refugees and Internally Displaced Persons: International Humanitarian Law and the Role of the </span><abbr data-dcnode-id="3685" title="International Committee of the Red Cross "><span data-dcnode-id="3686" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3684" instrument_node="">”, in </span><em data-dcnode-id="3681"><abbr data-dcnode-id="3682" title="International Review of the Red Cross "><span data-dcnode-id="3683" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3680" instrument_node="">, No.&nbsp;305, March-April 1995, pp. 162-180.</span></li><li data-dcnode-id="3664"><span data-dcnode-id="3678" instrument_node="">MAURICE Frédéric &amp; COURTEN Jean de, “</span><abbr data-dcnode-id="3676" title="International Committee of the Red Cross "><span data-dcnode-id="3677" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3675" instrument_node=""> Activities for Refugees and Displaced Civilians”, in </span><em data-dcnode-id="3672"><abbr data-dcnode-id="3673" title="International Review of the Red Cross "><span data-dcnode-id="3674" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3671" instrument_node="">, No. 280, January-February 1991, pp. 9-21.</span><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node=""> Special Issue “50th Anniversary of the 1951 Refugee Convention. The Protection of Refugees in Armed Conflicts”, in </span><em data-dcnode-id="3666"><abbr data-dcnode-id="3667" title="International Review of the Red Cross "><span data-dcnode-id="3668" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3665" instrument_node="">, No.&nbsp;843, September 2001, pp. 571 ff.</span></li></ul><p data-dcnode-id="3660"><strong data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="3646"><li data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">COHEN Roberta &amp; DENG Francis M., Masses in Flight: The Global Crisis of Internal Displacement, Washington DC, Brookings Institution Press, 1998, 414 pp.</span></li><li data-dcnode-id="3652"><span data-dcnode-id="3657" instrument_node="">GOLDMAN Robert, “Codification of International Rules on Internally Displaced Persons”, in </span><em data-dcnode-id="3654"><abbr data-dcnode-id="3655" title="International Review of the Red Cross "><span data-dcnode-id="3656" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3653" instrument_node="">, No. 324, September 1998, pp. 463-466.</span></li><li data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node="">GOODWIN-GILL Guy S. &amp; McADAM Jane, The Refugee in International Law, Oxford, </span><abbr data-dcnode-id="3649" title="Oxford University Press"><span data-dcnode-id="3650" instrument_node="">OUP</span></abbr><span data-dcnode-id="3648" instrument_node="">, 3rd ed., 2007, 786&nbsp;pp.</span></li></ul></div><h4 class="casesdocheader" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Cases a 49 "><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DBAA341028EBFF1E8C12563CD00519E66"><span data-dcnode-id="3043" instrument_node="">IV</span></a></abbr><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DBAA341028EBFF1E8C12563CD00519E66"><span data-dcnode-id="3040" instrument_node="">, common Art. 3</span></a><span data-dcnode-id="3038" instrument_node=""> and</span><abbr data-dcnode-id="3035" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Treaty.xsp%3FdocumentId%3DAA0C5BCBAB5C4A85C12563CD002D6D09%26action%3DopenDocument"><span data-dcnode-id="3037" instrument_node="">P II</span></a></abbr><span data-dcnode-id="3034" instrument_node=""> would apply.</span></li><li data-dcnode-id="3027"><a data-dcnode-id="3031" href="#_ftnref_035" id="_ftn_035" name="_ftn_035" title=""><span data-dcnode-id="3032" instrument_node="">[35]</span></a><span data-dcnode-id="3030" instrument_node=""> See </span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D9F16FC090F0199F0C12563CD0051BD44"><span data-dcnode-id="3029" instrument_node="">GC IV, Art. 44</span></a></li><li data-dcnode-id="3018"><a data-dcnode-id="3025" href="#_ftnref_036" id="_ftn_036" name="_ftn_036" title=""><span data-dcnode-id="3026" instrument_node="">[36]</span></a><span data-dcnode-id="3024" instrument_node=""> See particularly </span><abbr data-dcnode-id="3021" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D319C8D02127ADAD2C12563CD0051E004"><span data-dcnode-id="3023" instrument_node="">P I</span></a></abbr><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D319C8D02127ADAD2C12563CD0051E004"><span data-dcnode-id="3020" instrument_node="">, Art. 73</span></a></li><li data-dcnode-id="3012"><a data-dcnode-id="3016" href="#_ftnref_037" id="_ftn_037" name="_ftn_037" title=""><span data-dcnode-id="3017" instrument_node="">[37]</span></a><span data-dcnode-id="3015" instrument_node=""> See </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D00C231B18AC4E834C12563CD0051BF6A"><span data-dcnode-id="3014" instrument_node="">GC IV, Art. 70(2)</span></a></li><li data-dcnode-id="3006"><a data-dcnode-id="3010" href="#_ftnref_038" id="_ftn_038" name="_ftn_038" title=""><span data-dcnode-id="3011" instrument_node="">[38]</span></a><span data-dcnode-id="3009" instrument_node=""> See </span><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D72B1BBCED193E4E4C12563CD0051BD53"><span data-dcnode-id="3008" instrument_node="">GC IV, Art. 45(4)</span></a></li></ul></div></div></div><div class="field-item even" data-dcnode-id="477"><span data-dcnode-id="3001" id="toc-iv-special-rules-on-occupied-territories"></span><h2 data-dcnode-id="2998"><a class="nohref" data-dcnode-id="3000" id="chapter5"></a><span data-dcnode-id="2999" instrument_node="">IV. Special rules on Occupied Territories</span></h2><div class="rxbodyfield" data-dcnode-id="478"><span data-dcnode-id="2997" id="toc--introductory-text"></span><h3 data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">- Introductory text</span></h3><p data-dcnode-id="2981"><span data-dcnode-id="2994" instrument_node="">From the point of view of </span><abbr data-dcnode-id="2992" title="International Humanitarian Law "><span data-dcnode-id="2993" instrument_node="">IHL</span></abbr><span data-dcnode-id="2991" instrument_node="">, civilians in occupied territories deserve and need particularly detailed protecting rules. Living on their own territory, they come into contact with the enemy independently of their will, merely because of the armed conflict in which the enemy obtains territorial control over the place where they live. The civilians have no obligation towards the occupying power other than the obligation inherent in their civilian status, i.e., not to participate in hostilities. Because of that obligation, </span><abbr data-dcnode-id="2989" title="International Humanitarian Law "><span data-dcnode-id="2990" instrument_node="">IHL</span></abbr><span data-dcnode-id="2988" instrument_node=""> allows them neither to violently resist occupation of their territory by the enemy[</span><a data-dcnode-id="2986" href="#_ftn_039" id="_ftnref_039" name="_ftnref_039" title=""><span data-dcnode-id="2987" instrument_node="">39</span></a><span data-dcnode-id="2985" instrument_node="">] nor to try to liberate that territory by violent means.[</span><a data-dcnode-id="2983" href="#_ftn_040" id="_ftnref_040" name="_ftnref_040" title=""><span data-dcnode-id="2984" instrument_node="">40</span></a><span data-dcnode-id="2982" instrument_node="">]</span></p><p data-dcnode-id="2973"><span data-dcnode-id="2980" instrument_node="">Starting from this philosophy, the obligations of the occupying power can be logically summed up as permitting life in the occupied territory to continue as normally as possible. </span><abbr data-dcnode-id="2978" title="International Humanitarian Law "><span data-dcnode-id="2979" instrument_node="">IHL</span></abbr><span data-dcnode-id="2977" instrument_node=""> is therefore strong in protecting the status quo ante, but weak in responding to any new needs experienced by the population in the occupied territory. The longer the occupation lasts, the more shortcomings </span><abbr data-dcnode-id="2975" title="International Humanitarian Law "><span data-dcnode-id="2976" instrument_node="">IHL</span></abbr><span data-dcnode-id="2974" instrument_node=""> tends to reveal.</span></p><p data-dcnode-id="2947"><span data-dcnode-id="2972" instrument_node="">In practice, this has the following consequences: except concerning the protection of the occupying power’s security, local laws remain in force[</span><a data-dcnode-id="2970" href="#_ftn_041" id="_ftnref_041" name="_ftnref_041" title=""><span data-dcnode-id="2971" instrument_node="">41</span></a><span data-dcnode-id="2969" instrument_node="">] and local courts remain competent.[</span><a data-dcnode-id="2967" href="#_ftn_042" id="_ftnref_042" name="_ftnref_042" title=""><span data-dcnode-id="2968" instrument_node="">42</span></a><span data-dcnode-id="2966" instrument_node="">] Except when rendered absolutely necessary by military operations, private property may not be destroyed[</span><a data-dcnode-id="2964" href="#_ftn_043" id="_ftnref_043" name="_ftnref_043" title=""><span data-dcnode-id="2965" instrument_node="">43</span></a><span data-dcnode-id="2963" instrument_node="">] and may only be confiscated under local legislation.[</span><a data-dcnode-id="2961" href="#_ftn_044" id="_ftnref_044" name="_ftnref_044" title=""><span data-dcnode-id="2962" instrument_node="">44</span></a><span data-dcnode-id="2960" instrument_node="">] Public property (other than that of the municipalities[</span><a data-dcnode-id="2958" href="#_ftn_045" id="_ftnref_045" name="_ftnref_045" title=""><span data-dcnode-id="2959" instrument_node="">45</span></a><span data-dcnode-id="2957" instrument_node="">]) can obviously no longer be administered by the State previously controlling the territory (normally the sovereign). It may therefore be administered by the occupying power, but only under the rules of usufruct.[</span><a data-dcnode-id="2955" href="#_ftn_046" id="_ftnref_046" name="_ftnref_046" title=""><span data-dcnode-id="2956" instrument_node="">46</span></a><span data-dcnode-id="2954" instrument_node="">] The local population may not be deported;[</span><a data-dcnode-id="2952" href="#_ftn_047" id="_ftnref_047" name="_ftnref_047" title=""><span data-dcnode-id="2953" instrument_node="">47</span></a><span data-dcnode-id="2951" instrument_node="">] the occupying power may not transfer its own population into the occupied territory.[</span><a data-dcnode-id="2949" href="#_ftn_048" id="_ftnref_048" name="_ftnref_048" title=""><span data-dcnode-id="2950" instrument_node="">48</span></a><span data-dcnode-id="2948" instrument_node="">]</span></p><p data-dcnode-id="2933"><span data-dcnode-id="2946" instrument_node="">The occupying power’s only protected interest is the security of the occupying armed forces; it may take the necessary measures to protect that security, but it is also responsible for law and order in the occupied territory,[</span><a data-dcnode-id="2944" href="#_ftn_049" id="_ftnref_049" name="_ftnref_049" title=""><span data-dcnode-id="2945" instrument_node="">49</span></a><span data-dcnode-id="2943" instrument_node="">] as well as for ensuring hygiene and public health[</span><a data-dcnode-id="2941" href="#_ftn_050" id="_ftnref_050" name="_ftnref_050" title=""><span data-dcnode-id="2942" instrument_node="">50</span></a><span data-dcnode-id="2940" instrument_node="">] and food and medical supplies.[</span><a data-dcnode-id="2938" href="#_ftn_051" id="_ftnref_051" name="_ftnref_051" title=""><span data-dcnode-id="2939" instrument_node="">51</span></a><span data-dcnode-id="2937" instrument_node="">] Its legitimate interest is to control the territory for the duration of the occupation, i.e., until the territory is liberated by the former sovereign or transferred to the sovereignty of the occupying power under a peace treaty. </span><abbr data-dcnode-id="2935" title="International Humanitarian Law "><span data-dcnode-id="2936" instrument_node="">IHL</span></abbr><span data-dcnode-id="2934" instrument_node=""> is neutral on jus ad bellum issues and shows no preference for either solution, but international law tries to ensure that no measures are taken during the occupation which would compromise a return to the former sovereign.</span></p><p data-dcnode-id="2892"><span data-dcnode-id="2932" instrument_node="">The </span><abbr data-dcnode-id="2930" title="International Humanitarian Law "><span data-dcnode-id="2931" instrument_node="">IHL</span></abbr><span data-dcnode-id="2929" instrument_node=""> of military occupation protects all civilians, except nationals of the occupying power[</span><a data-dcnode-id="2927" href="#_ftn_052" id="_ftnref_052" name="_ftnref_052" title=""><span data-dcnode-id="2928" instrument_node="">52</span></a><span data-dcnode-id="2926" instrument_node="">] other than refugees.[ </span><a data-dcnode-id="2924" href="#_ftn_053" id="_ftnref_053" name="_ftnref_053" title=""><span data-dcnode-id="2925" instrument_node="">53</span></a><span data-dcnode-id="2923" instrument_node="">] Unilateral annexation of the occupied territory by the occupying power, whether lawful or unlawful under jus ad bellum, or agreements concluded by the occupying power with the local authorities of the occupied territory, cannot deprive protected persons from the protection afforded by </span><abbr data-dcnode-id="2921" title="International Humanitarian Law "><span data-dcnode-id="2922" instrument_node="">IHL</span></abbr><span data-dcnode-id="2920" instrument_node="">.[</span><a data-dcnode-id="2918" href="#_ftn_054" id="_ftnref_054" name="_ftnref_054" title=""><span data-dcnode-id="2919" instrument_node="">54</span></a><span data-dcnode-id="2917" instrument_node="">] The rules of </span><abbr data-dcnode-id="2915" title="International Humanitarian Law "><span data-dcnode-id="2916" instrument_node="">IHL</span></abbr><span data-dcnode-id="2914" instrument_node=""> on occupied territories apply whenever, during an armed conflict, a territory comes under the control of the enemy of the power previously controlling that territory,[</span><a data-dcnode-id="2912" href="#_ftn_055" id="_ftnref_055" name="_ftnref_055" title=""><span data-dcnode-id="2913" instrument_node="">55</span></a><span data-dcnode-id="2911" instrument_node="">] as well as in every case of belligerent occupation, even when it does not encounter armed resistance and there is therefore no armed conflict.[</span><a data-dcnode-id="2909" href="#_ftn_056" id="_ftnref_056" name="_ftnref_056" title=""><span data-dcnode-id="2910" instrument_node="">56</span></a><span data-dcnode-id="2908" instrument_node="">] It is a matter of controversy whether the rules of </span><abbr data-dcnode-id="2906" title="International Humanitarian Law "><span data-dcnode-id="2907" instrument_node="">IHL</span></abbr><span data-dcnode-id="2905" instrument_node=""> of military occupation only start to apply once the enemy exercises full authority over a (part of a) territory, or, according to a functional approach, already during the invasion, as soon as a protected person falls into the power of the enemy. The answer may differ according to the individual rule concerned. Similar controversies exist regarding the end of military occupation and therefore the end of the application of the </span><abbr data-dcnode-id="2903" title="International Humanitarian Law "><span data-dcnode-id="2904" instrument_node="">IHL</span></abbr><span data-dcnode-id="2902" instrument_node=""> of military occupation: is a troop withdrawal decisive, even when the (former) occupying power still controls many aspects of life in a territory, e.g., entry and exit of persons and objects?[</span><a data-dcnode-id="2900" href="#_ftn_057" id="_ftnref_057" name="_ftnref_057" title=""><span data-dcnode-id="2901" instrument_node="">57</span></a><span data-dcnode-id="2899" instrument_node="">] Does the </span><abbr data-dcnode-id="2897" title="International Humanitarian Law "><span data-dcnode-id="2898" instrument_node="">IHL</span></abbr><span data-dcnode-id="2896" instrument_node=""> of military occupation cease to apply when troops of the (former) occupying power, acting at the invitation of a new national government or on the basis of a </span><abbr data-dcnode-id="2894" title="United Nations"><span data-dcnode-id="2895" instrument_node="">UN</span></abbr><span data-dcnode-id="2893" instrument_node=""> Security Council authorization, remain present and keep overall control over a (former) occupied territory?</span></p><h4 class="casesdocheader" data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2847"><ul data-dcnode-id="2848"><li data-dcnode-id="2885"><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-ihl-and-challenges-contemporary-armed-conflicts%23part_a"><abbr data-dcnode-id="2888" title="International Committee of the Red Cross "><span data-dcnode-id="2889" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2887" instrument_node="">, The Challenges of Contemporary Armed Conflicts [Part A.]</span></a></li><li data-dcnode-id="2880"><a data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-appeals-near-east%23part_c" title=""><abbr data-dcnode-id="2883" title="International Committee of the Red Cross "><span data-dcnode-id="2884" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2882" instrument_node=""> Appeals on the Near East [Part C.]</span></a></li><li data-dcnode-id="2877"><a data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-power-cuts-gaza" title=""><span data-dcnode-id="2879" instrument_node="">Israel, Power Cuts in Gaza</span></a></li><li data-dcnode-id="2874"><a data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/eritreaethiopia-awards-occupation" title=""><span data-dcnode-id="2876" instrument_node="">Eritrea/Ethiopia, Awards on Occupation</span></a></li><li data-dcnode-id="2859"><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo" title=""><abbr data-dcnode-id="2872" title="International Court of Justice "><span data-dcnode-id="2873" instrument_node="">ICJ</span></abbr><span data-dcnode-id="2871" instrument_node="">, Democratic Republic of the Congo/Uganda, Armed Activities on the Territory of the Congo</span></a><span data-dcnode-id="2869" instrument_node="">&nbsp;(Judgement, paras </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo%23para_80"><span data-dcnode-id="2868" instrument_node="">80-81</span></a><span data-dcnode-id="2866" instrument_node="">, </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo%23para_172"><span data-dcnode-id="2865" instrument_node="">172-179</span></a><span data-dcnode-id="2863" instrument_n
