.org/en/resource-centre/result%3Fr%255B0%255D%3Ddocument_type%253A%2522Publication%2522%26sort%3Ddate%2Bdesc"><span data-dcnode-id="586" instrument_node="">Publication</span></a></li></ul><span data-dcnode-id="582" instrument_node=""> </span><span class="small date seperator-left" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">16 March 2011</span></span></div></div><span data-dcnode-id="577" instrument_node=""> </span><main class="col-xs-12 col-sm-12 col-md-8 content-main visible-print-inline" data-dcnode-id="418"><div data-dcnode-id="496"><p class="intro" data-dcnode-id="574"><img alt="" data-dcnode-id="576" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/sites/default/files/wysiwyg/Activities/Forum/academic-sector/md_picto-0739_1.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 5px; margin-left: 10px; margin-right: 10px; float: left;" width="172"><span data-dcnode-id="575" instrument_node="">Cases, documents and teaching materials on contemporary practice in international humanitarian law. A selection of nearly three hundred case studies provides university professors, practitioners and students with the most up-to-date and comprehensive selection of documents on international humanitarian law (IHL) available. The publication presents the most fundamental and contemporary legal issues in armed conflict, and a series of course outlines for professors interested in setting up courses on IHL or in introducing its study.</span></p><center data-dcnode-id="567"><span class="theme-blue" data-dcnode-id="568"><span data-dcnode-id="573" instrument_node=""> </span><a class="btn i-arrow-right-after" data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.icrc.org/un-droit-dans-la-guerre-cas-documents-et-supports-d-enseignement-relatifs-a-la-pratique-contemporaine-du-droit-international-humanitaire.html%3F___store%3Ddefault"><span data-dcnode-id="572" instrument_node="">Order the publication</span></a><span data-dcnode-id="570" instrument_node=""> </span><br data-dcnode-id="569"></span></center><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">&nbsp;</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The authors aim to show that international humanitarian law is actually being applied in contemporary practice and that it guides those seeking answers to the legal problems arising from armed conflicts. They also hope to encourage practice-related teaching of IHL in universities world-wide and to provide experts in the field with a reliable reference work on contemporary practice.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">&nbsp;</span></p><p data-dcnode-id="558"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Part I (Volume I + CD)</span></strong></p><p data-dcnode-id="555"><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19454/icrc-0739-part-i.pdf"><span data-dcnode-id="557" instrument_node="">How does law protect in war? Volume I: outline of International Humanitarian Law</span></a></p><p data-dcnode-id="551"><span data-dcnode-id="554" instrument_node="">presents IHL carefully and systematically. The important and non-controversial elements of each topic are outlined in Introductory Texts. In addition, readers are given the possibility and indeed encouraged to expand their knowledge on a given subject through references to the pertinent parts of Cases and Documents reproduced in Part II. For each topic, references to articles from the Geneva Conventions and their Additional Protocols and to the Rules of the ICRC Study on Customary IHL are also provided. Finally, a selected bibliography facilitates further study and deeper understanding of each topic.</span><br data-dcnode-id="553"><br data-dcnode-id="552"></p><p data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Part II (Volumes II &amp; III + CD)</span></strong></p><p data-dcnode-id="545"><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19456/icrc-0739-part-ii-vol-i.pdf"><span data-dcnode-id="547" instrument_node="">How does law protect in war? Volume II: cases and documents</span></a></p><p data-dcnode-id="542"><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19457/icrc-0739-part-ii-vol-ii.pdf"><span data-dcnode-id="544" instrument_node="">How does law protect in war? Volume III: cases and documents</span></a></p><p data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">constitutes the main body of the present publication. In this Part, the reader can find all the Cases and Documents in chronological and geographical order. The nature of each Case or Document varies according to the topic: the student or scholar will thus find judgements of national and international tribunals, Security Council resolutions, document excerpts and press releases. Each case and document has been carefully edited according to the specific topic(s) of IHL referred to in Part I. The originality of this section lies in the second part of each case, entitled Discussion, where the reader is asked questions that raise issues in relation to the case at hand.</span><br data-dcnode-id="540"><br data-dcnode-id="539"></p><p data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Part III (CD)</span></strong></p><p data-dcnode-id="532"><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19455/icrc-0739-part-iii.pdf"><span data-dcnode-id="534" instrument_node="">How does law protect in war? Teaching outlines</span></a></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">provides advice and recommendations on how to teach IHL and a series of teaching outlines that may be useful for university professors who wish to introduce a course on IHL. The suggested teaching outlines are primarily for law faculties, but they also target faculties of journalism and political science. This Part ends with fourteen course outlines written by experts in IHL and two general exercises on IHL.</span></p><p data-dcnode-id="526"><strong data-dcnode-id="527"><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">UPDATE OF THE SECOND EDITION</span></strong></p><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">The first English edition of this work was published in 1999 and updated for the second edition in 2005. A parallel French version appeared in 2003. This third English edition contains significant revisions and updates: some 60 new cases and documents reflecting the most recent practice have been added, while 35 of those contained in the second edition have been expanded and updated, many Introductory Texts have been revised and the section on Teaching International Humanitarian Law has been considerably enhanced.</span></p><p data-dcnode-id="520"><strong data-dcnode-id="521"><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">ONLINE VERSION</span></strong></p><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">As of October 2014, </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/"><span data-dcnode-id="518" instrument_node="">"How does law protect in war?" is also available online</span></a><span data-dcnode-id="516" instrument_node="">, allowing easy navigation, through hyperlinks, from legal theory to humanitarian practice. New case studies on emerging humanitarian and legal issues will also be regularly added, supplying professors with up-to-date teaching materials. A search engine and an extensive index will permit users to perform quick searches using key words.</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">&nbsp;</span></p><div class="content-highlight" data-dcnode-id="499"><p data-dcnode-id="510"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">See also:</span></strong></p><ul data-dcnode-id="500"><li data-dcnode-id="507"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/document/interview-how-does-law-protect-war-new-edition"><span data-dcnode-id="509" instrument_node="">Interview with the authors</span></a></li><li data-dcnode-id="504"><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/fr/document/un-droit-dans-la-guerre-cas-documents-et-supports-denseignement-relatifs-la-pratique"><span data-dcnode-id="506" instrument_node="">2012 second French edition</span></a></li><li data-dcnode-id="501"><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/document/how-does-law-protect-war-online-platform"><span data-dcnode-id="503" instrument_node="">How Does Law Protect in War? Online platform - 2014</span></a></li></ul></div><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">&nbsp;</span></p></div><div class="row list-document" data-dcnode-id="447"><div class="document col-md-6" data-dcnode-id="484"><div class="media" data-dcnode-id="485"><span data-dcnode-id="495" instrument_node=""> </span><a class="image-wrapper media-object pull-left" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19454/icrc-0739-part-i.pdf" title="Part I"><span data-dcnode-id="494" instrument_node=""> </span><img alt="" data-dcnode-id="493" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/sites/default/themes/icrc_theme/images/document-file-type/pdf.jpg&amp;raw"><span data-dcnode-id="492" instrument_node=""> </span><span class="icon i-search-after" data-dcnode-id="491"></span><span data-dcnode-id="490" instrument_node=""> </span></a><div class="media-body" data-dcnode-id="486"><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Part I</span></p></div></div></div><div class="document col-md-6" data-dcnode-id="472"><div class="media" data-dcnode-id="473"><span data-dcnode-id="483" instrument_node=""> </span><a class="image-wrapper media-object pull-left" data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19455/icrc-0739-part-iii.pdf" title="Part III"><span data-dcnode-id="482" instrument_node=""> </span><img alt="" data-dcnode-id="481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/sites/default/themes/icrc_theme/images/document-file-type/pdf.jpg&amp;raw"><span data-dcnode-id="480" instrument_node=""> </span><span class="icon i-search-after" data-dcnode-id="479"></span><span data-dcnode-id="478" instrument_node=""> </span></a><div class="media-body" data-dcnode-id="474"><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Part III</span></p></div></div></div><div class="document col-md-6" data-dcnode-id="460"><div class="media" data-dcnode-id="461"><span data-dcnode-id="471" instrument_node=""> </span><a class="image-wrapper media-object pull-left" data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/download/file/19456/icrc-0739-part-ii-vol-i.pdf" title="Part II volume I"><span data-dcnode-id="470" instrument_node=""> </span><img alt="" data-dcnode-id="469" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/sites/default/themes/icrc_theme/images/document-file-type/pdf.jpg&a
