</span><section data-dcnode-id="616" id="page-title"><span data-dcnode-id="623" instrument_node="">
</span><div class="container" data-dcnode-id="618"><span data-dcnode-id="622" instrument_node="">
</span><h1 data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The Law</span></h1><span data-dcnode-id="619" instrument_node="">
</span></div><span data-dcnode-id="617" instrument_node="">
</span></section><span data-dcnode-id="615" instrument_node="">
</span><div class="container" data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">
</span><div class="alert alert-warning fade in hidden mt-4" data-dcnode-id="612" id="pdf-generation-msg" role="alert"><span data-dcnode-id="613" instrument_node="">
      The PDF of this page is being created.
    </span></div><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
</span><div class="block block-system container" data-dcnode-id="306" id="block-system-main"><span data-dcnode-id="608" instrument_node="">
</span><div class="content" data-dcnode-id="308"><span data-dcnode-id="607" instrument_node="">
</span><div class="ds-icrc-full node node-book view-mode-full" data-dcnode-id="310"><span data-dcnode-id="606" instrument_node="">
</span><div class="row" data-dcnode-id="312"><span data-dcnode-id="605" instrument_node="">
</span><div class="col-md-10" data-dcnode-id="338"><span data-dcnode-id="604" instrument_node="">
</span><div class="row toc-container" data-dcnode-id="593"><span data-dcnode-id="603" instrument_node="">
</span><div class="col-md-12" data-dcnode-id="595"><span data-dcnode-id="602" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="597"><div class="field-items" data-dcnode-id="598"><div class="field-item even" data-dcnode-id="599"><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">This section contains a detailed presentation of the major features of IHL. The salient aspects of each of the 14 topics highlighted are outlined in short introductory texts, followed by references to articles from the Geneva Conventions and their Additional Protocols, and to the rules set out in the ICRC's study, Customary International Humanitarian Law. These are supplemented by bibliographical references for those who wish to delve deeper into the subject matter. Each topic offers direct links to pertinent cases.</span></p></div></div></div><span data-dcnode-id="596" instrument_node=""> </span></div><span data-dcnode-id="594" instrument_node="">
</span></div><span data-dcnode-id="592" instrument_node="">
</span><div class="panel-group" data-dcnode-id="578"><span data-dcnode-id="591" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="580"><span data-dcnode-id="590" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="582"><span data-dcnode-id="589" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">
</span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/general-bibliography-ihl"><span data-dcnode-id="587" instrument_node="">General bibliography on IHL</span></a><span data-dcnode-id="585" instrument_node=""> </span></h4><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="561"><span data-dcnode-id="577" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="563"><span data-dcnode-id="576" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="568"><span data-dcnode-id="575" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">
</span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/fundamentals-ihl"><span data-dcnode-id="573" instrument_node="">Fundamentals of IHL</span></a><span data-dcnode-id="571" instrument_node=""> </span></h4><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span><div class="panel-body" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">
          What is IHL? What is its place within the international legal order? What is the difference between ius ad bellum and ius in bello? When does IHL apply? What are its origins and how has it evolved? What are its sources?      </span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="544"><span data-dcnode-id="560" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="546"><span data-dcnode-id="559" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="551"><span data-dcnode-id="558" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">
</span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/principle-distinction"><span data-dcnode-id="556" instrument_node="">Principle of distinction</span></a><span data-dcnode-id="554" instrument_node=""> </span></h4><span data-dcnode-id="552" instrument_node="">
</span></div><span data-dcnode-id="550" instrument_node="">
</span><div class="panel-body" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">
          What is the principle of distinction (between civilians and combatants, between military objectives and civilian objects) and what does it encompass? Why is it one of the cornerstones of IHL? How and why is the principle of distinction challenged at times in contemporary armed conflicts?      </span></div><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="527"><span data-dcnode-id="543" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="529"><span data-dcnode-id="542" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="534"><span data-dcnode-id="541" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="536"><span data-dcnode-id="540" instrument_node="">
</span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/combatants-and-pows"><span data-dcnode-id="539" instrument_node="">Combatants and POWs</span></a><span data-dcnode-id="537" instrument_node=""> </span></h4><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
</span><div class="panel-body" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">
          Who is a combatant? What is combatant status? What are the rights and obligations of combatants? Can one lose combatant status? Who is entitled to the status of prisoner of war (POW)? How must POWs be treated? What are the rights of POWs? When must POWs be repatriated?      </span></div><span data-dcnode-id="530" instrument_node="">
</span></div><span data-dcnode-id="528" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="510"><span data-dcnode-id="526" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="512"><span data-dcnode-id="525" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="517"><span data-dcnode-id="524" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">
</span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/wounded-sick-shipwrecked-dead-and-missing"><span data-dcnode-id="522" instrument_node="">Wounded, sick, shipwrecked, dead and missing</span></a><span data-dcnode-id="520" instrument_node=""> </span></h4><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span><div class="panel-body" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">
          What protection is afforded to the wounded, sick and shipwrecked? What is the scope of this protection? How are medical personnel and objects protected? What provisions govern the use of the protective emblems? What are the rules of IHL pertaining to the dead and the missing?      </span></div><span data-dcnode-id="513" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="493"><span data-dcnode-id="509" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="495"><span data-dcnode-id="508" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="500"><span data-dcnode-id="507" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">
</span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/civilian-population"><span data-dcnode-id="505" instrument_node="">Civilian population</span></a><span data-dcnode-id="503" instrument_node=""> </span></h4><span data-dcnode-id="501" instrument_node="">
</span></div><span data-dcnode-id="499" instrument_node="">
</span><div class="panel-body" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">
          Who is a protected civilian? What are the rules governing the protection of civilians? Are there specific provisions of IHL for the protection of women and children? Are there specific rules protecting refugees and IDPs? What is occupation? Why are there separate rules governing situations of occupation? When does occupation start? When does it end? May civilians be detained?       </span></div><span data-dcnode-id="496" instrument_node="">
</span></div><span data-dcnode-id="494" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="476"><span data-dcnode-id="492" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="478"><span data-dcnode-id="491" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="483"><span data-dcnode-id="490" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">
</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/conduct-hostilities"><span data-dcnode-id="488" instrument_node="">Conduct of hostilities</span></a><span data-dcnode-id="486" instrument_node=""> </span></h4><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="panel-body" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">
          How are civilians protected against the effects of hostilities? Can they lose their protection? What is a military objective? What does the principle of precaution encompass? What are the "means and methods" of warfare? How are they regulated? Is there a right under IHL to receive humanitarian assistance? Are those providing humanitarian assistance protected by IHL?      </span></div><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="459"><span data-dcnode-id="475" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="461"><span data-dcnode-id="474" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">
</span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/naval-warfare"><span data-dcnode-id="471" instrument_node="">Naval warfare</span></a><span data-dcnode-id="469" instrument_node=""> </span></h4><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span><div class="panel-body" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">
          What are the specific rules governing the conduct of naval warfare?      </span></div><span data-dcnode-id="462" instrument_node="">
</span></div><span data-dcnode-id="460" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="442"><span data-dcnode-id="458" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="444"><span data-dcnode-id="457" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="449"><span data-dcnode-id="456" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">
</span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/air-warfare"><span data-dcnode-id="454" instrument_node="">Air warfare</span></a><span data-dcnode-id="452" instrument_node=""> </span></h4><span data-dcnode-id="450" instrument_node="">
</span></div><span data-dcnode-id="448" instrument_node="">
</span><div class="panel-body" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">
          What are the specific rules governing the conduct of air warfare?      </span></div><span data-dcnode-id="445" instrument_node="">
</span></div><span data-dcnode-id="443" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="425"><span data-dcnode-id="441" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="427"><span data-dcnode-id="440" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="432"><span data-dcnode-id="439" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">
</span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/non-international-armed-conflict"><span data-dcnode-id="437" instrument_node="">Non-international armed conflict</span></a><span data-dcnode-id="435" instrument_node=""> </span></h4><span data-dcnode-id="433" instrument_node="">
</span></div><span data-dcnode-id="431" instrument_node="">
</span><div class="panel-body" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">
          What situations qualify as non-international armed conflict? What are the rules governing this type of conflict? What are the differences and similarities between the legal regimes applicable to international and to non-international armed conflicts? Who is bound by the law of non-international armed conflict? What are the legal consequences of this type of conflict on the status of the parties?      </span></div><span data-dcnode-id="428" instrument_node="">
</span></div><span data-dcnode-id="426" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="408"><span data-dcnode-id="424" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="410"><span data-dcnode-id="423" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">
</span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/implementation-mechanisms"><span data-dcnode-id="420" instrument_node="">Implementation mechanisms</span></a><span data-dcnode-id="418" instrument_node=""> </span></h4><span data-dcnode-id="416" instrument_node="">
</span></div><span data-dcnode-id="414" instrument_node="">
</span><div class="panel-body" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">
          How is IHL implemented? What measures can or must be taken in peacetime? In the midst of an international armed conflict? In times of non-international armed conflict? May or must third States ensure compliance with IHL by belligerents? What is the role of Protecting Powers? Of the ICRC? Of National Red Cross and Red Crescent Societies? Of non-governmental organizations (NGOs)? Of the United Nations? What factors contribute to violations of IHL? What factors improve respect for IHL?      </span></div><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="391"><span data-dcnode-id="407" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="393"><span data-dcnode-id="406" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="398"><span data-dcnode-id="405" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">
</span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/state-responsibility"><span data-dcnode-id="403" instrument_node="">State responsibility</span></a><span data-dcnode-id="401" instrument_node=""> </span></h4><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span><div class="panel-body" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">
          When are violations of IHL considered as having been committed by a State? How can State responsibility be ascertained? Can States take measures to restore respect? What kind of sanctions must be taken against a State responsible for violating IHL? Are reprisals admitted under IHL? Is there an obligation to make reparations ?      </span></div><span data-dcnode-id="394" instrument_node="">
</span></div><span data-dcnode-id="392" instrument_node="">
</span></div><div class="panel-group" data-dcnode-id="374"><span data-dcnode-id="390" instrument_node="">
</span><div class="panel panel-beige" data-dcnode-id="376"><span data-dcnode-id="389" instrument_node="">

</span></div><span data-dcnode-id="380" instrument_node="">
</span><div class="panel-body" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">
          Can an individual be held responsible for violating IHL? Does IHL provide mechanisms to punish violations? What is a grave breach of IHL? What is a war crime? What is a crime against humanity? What is the crime of genocide? How can they be prosecuted? What is the role of domestic courts? What is the role of international courts?      </span></div><span data-dcnode-id="377" instrument_node="">

</span></div><span data-dcnode-id="363" instrument_node="">
</span><div class="panel-body" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">
          What are the differences and similarities between IHL and international human rights law (IHRL)? What are their respective fields of application? Can their rules be suspended or limited? Who is protected by their rules? Who is bound by their rules? How do these two bodies of law interact? What is the lex specialis principle?       </span></div><span data-dcnode-id="360" instrument_node="">
