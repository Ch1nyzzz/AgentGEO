</span></ol></div><span data-dcnode-id="3739" instrument_node=""> </span><h1 data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">ICRC</span></h1><span data-dcnode-id="3736" instrument_node="">

</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="444"><div class="field-items" data-dcnode-id="445"><div class="field-item even" data-dcnode-id="2845"><span data-dcnode-id="3718" id="toc-click-on-chapter-bibliography-or-specific-bibliography-to-see-content"></span><h3 data-dcnode-id="3712" style="text-align: center;"><em data-dcnode-id="3715"><strong data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Click on "CHAPTER BIBLIOGRAPHY" or "SPECIFIC BIBLIOGRAPHY" to see content</span></strong></em><br data-dcnode-id="3714"><br data-dcnode-id="3713"></h3><span data-dcnode-id="3711" id="toc-introduction"></span><h2 data-dcnode-id="3708"><a class="nohref" data-dcnode-id="3710" id="chapter1"></a><span data-dcnode-id="3709" instrument_node="">Introduction</span></h2><div class="rxbodyfield" data-dcnode-id="2846"><blockquote data-dcnode-id="3050"><p data-dcnode-id="3704"><strong data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Quotation&nbsp;&nbsp;</span></strong><span data-dcnode-id="3705" instrument_node=""> &nbsp;&nbsp;</span></p><span data-dcnode-id="3703" instrument_node="">&nbsp;</span><p data-dcnode-id="3692"><strong data-dcnode-id="3698"><span data-dcnode-id="3702" instrument_node="">The </span><abbr data-dcnode-id="3700" title="International Committee of the Red Cross "><span data-dcnode-id="3701" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3699" instrument_node="">’s mission&nbsp;</span></strong><br data-dcnode-id="3697"><span data-dcnode-id="3696" instrument_node=""> Since it was founded in 1863, the </span><abbr data-dcnode-id="3694" title="International Committee of the Red Cross "><span data-dcnode-id="3695" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3693" instrument_node=""> has been working to protect and assist the victims of armed conflict and other situations of violence. It initially focused on wounded soldiers but over time it extended its activities to cover all victims of these events.</span></p><p data-dcnode-id="3684"><span data-dcnode-id="3691" instrument_node="">In A Memory of Solferino, Henry Dunant suggested creating national relief societies,[</span><a data-dcnode-id="3689" href="#_ftn_001" id="_ftnref_001" name="_ftnref_001" title=""><span data-dcnode-id="3690" instrument_node="">1</span></a><span data-dcnode-id="3688" instrument_node="">]&nbsp; recognizable by their common emblem, and an international treaty to protect the wounded on the battlefield.[</span><a data-dcnode-id="3686" href="#_ftn_002" id="_ftnref_002" name="_ftnref_002" title=""><span data-dcnode-id="3687" instrument_node="">2</span></a><span data-dcnode-id="3685" instrument_node="">] A permanent committee was established in Geneva to further Dunant’s ideas. A red cross on a white ground [reversing the colours of the Swiss flag and paying tribute to the country, as host of the Geneva International Conference of 1863] was chosen as the emblem and the committee went on to adopt the name of the International Committee of the Red Cross.</span></p><p data-dcnode-id="3667"><span data-dcnode-id="3683" instrument_node="">Initially, it was not the </span><abbr data-dcnode-id="3681" title="International Committee of the Red Cross "><span data-dcnode-id="3682" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3680" instrument_node="">’s intention to take action on the ground. However, the National Societies of countries in conflict – viewed as too close to the authorities – asked the </span><abbr data-dcnode-id="3678" title="International Committee of the Red Cross "><span data-dcnode-id="3679" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3677" instrument_node=""> to send its own relief workers, believing that humanitarian work in times of conflict needed to offer guarantees of neutrality and independence acceptable to all parties, which only the </span><abbr data-dcnode-id="3675" title="International Committee of the Red Cross "><span data-dcnode-id="3676" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3674" instrument_node=""> could do. The </span><abbr data-dcnode-id="3672" title="International Committee of the Red Cross "><span data-dcnode-id="3673" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3671" instrument_node=""> therefore had to build up operational activities very quickly within a framework of neutrality and independence, working on both sides of the battlefield. Formal recognition of this function came later, when the Geneva Conventions explicitly recognized the purely humanitarian and impartial nature of the </span><abbr data-dcnode-id="3669" title="International Committee of the Red Cross "><span data-dcnode-id="3670" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3668" instrument_node="">’s activities, and gave the organization a special role in ensuring the faithful application of international humanitarian law.</span></p><p data-dcnode-id="3662"><span data-dcnode-id="3666" instrument_node="">The </span><abbr data-dcnode-id="3664" title="International Committee of the Red Cross "><span data-dcnode-id="3665" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3663" instrument_node=""> defines its mission in the following terms:</span></p><p data-dcnode-id="3657"><span data-dcnode-id="3661" instrument_node="">The International Committee of the Red Cross (</span><abbr data-dcnode-id="3659" title="International Committee of the Red Cross "><span data-dcnode-id="3660" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3658" instrument_node="">) is an impartial, neutral and independent organization whose exclusively humanitarian mission is to protect the lives and dignity of victims of armed conflict and other situations of violence and to provide them with assistance.</span></p><p data-dcnode-id="3652"><span data-dcnode-id="3656" instrument_node="">The </span><abbr data-dcnode-id="3654" title="International Committee of the Red Cross "><span data-dcnode-id="3655" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3653" instrument_node=""> also endeavours to prevent suffering by promoting and strengthening humanitarian law and universal humanitarian principles.</span></p><p data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node="">Established in 1863, the </span><abbr data-dcnode-id="3649" title="International Committee of the Red Cross "><span data-dcnode-id="3650" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3648" instrument_node=""> is at the origin of the Geneva Conventions and the International Red Cross and Red Crescent Movement. It directs and coordinates the international activities conducted by the Movement in armed conflicts and other situations of violence.</span></p><p data-dcnode-id="3633"><span data-dcnode-id="3646" instrument_node="">To be able to carry out its mission effectively, the </span><abbr data-dcnode-id="3644" title="International Committee of the Red Cross "><span data-dcnode-id="3645" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3643" instrument_node=""> needs to have the trust of all States, parties and people involved in a conflict or other situation of violence. This trust is based in particular on an awareness of the </span><abbr data-dcnode-id="3641" title="International Committee of the Red Cross "><span data-dcnode-id="3642" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3640" instrument_node="">’s policies and practices. The </span><abbr data-dcnode-id="3638" title="International Committee of the Red Cross "><span data-dcnode-id="3639" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3637" instrument_node=""> gains people’s trust through continuity and predictability. Combining effectiveness and credibility irrespective of time, place or range of needs is a permanent challenge for the organization, because it must be able to prove it can be both pragmatic and creative. Within the framework of the </span><abbr data-dcnode-id="3635" title="International Committee of the Red Cross "><span data-dcnode-id="3636" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3634" instrument_node="">’s clear strategy and priorities, its delegations in the field are thus given considerable autonomy to decide how best to help victims of conflict and other situations of violence.</span></p><p data-dcnode-id="3624"><span data-dcnode-id="3632" instrument_node="">[…]</span><br data-dcnode-id="3631"><span data-dcnode-id="3630" instrument_node=""> </span><strong data-dcnode-id="3625"><span data-dcnode-id="3629" instrument_node="">The </span><abbr data-dcnode-id="3627" title="International Committee of the Red Cross "><span data-dcnode-id="3628" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3626" instrument_node="">’s identity</span></strong></p><p data-dcnode-id="3617"><em data-dcnode-id="3618"><strong data-dcnode-id="3619"><span data-dcnode-id="3623" instrument_node="">The </span><abbr data-dcnode-id="3621" title="International Committee of the Red Cross "><span data-dcnode-id="3622" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3620" instrument_node="">’s purpose&nbsp;</span></strong></em></p><p data-dcnode-id="3606"><span data-dcnode-id="3616" instrument_node="">The raison d’être of the </span><abbr data-dcnode-id="3614" title="International Committee of the Red Cross "><span data-dcnode-id="3615" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3613" instrument_node=""> is to ensure respect, through its neutral and independent humanitarian work, for the lives, dignity and physical and mental well-being of victims of armed conflict and other situations of violence. All of the </span><abbr data-dcnode-id="3611" title="International Committee of the Red Cross "><span data-dcnode-id="3612" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3610" instrument_node="">’s work is geared towards meeting this fundamental objective and strives to fulfil this ideal. The </span><abbr data-dcnode-id="3608" title="International Committee of the Red Cross "><span data-dcnode-id="3609" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3607" instrument_node=""> takes action to meet the needs of these people and in accordance with their rights and the obligations incumbent upon the authorities.</span></p><p data-dcnode-id="3599"><em data-dcnode-id="3600"><strong data-dcnode-id="3601"><span data-dcnode-id="3605" instrument_node="">The dual nature of the </span><abbr data-dcnode-id="3603" title="International Committee of the Red Cross "><span data-dcnode-id="3604" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3602" instrument_node="">’s work&nbsp;</span></strong></em></p><p data-dcnode-id="3594"><span data-dcnode-id="3598" instrument_node="">The </span><abbr data-dcnode-id="3596" title="International Committee of the Red Cross "><span data-dcnode-id="3597" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3595" instrument_node="">’s work developed along two lines. The first of these is operational, i.e. helping victims of armed conflict and other situations of violence. The second involves developing and promoting international humanitarian law and humanitarian principles.</span></p><p data-dcnode-id="3586"><span data-dcnode-id="3593" instrument_node="">These two lines are inextricably linked because the first operates within the framework provided by the second, and the second draws on the experience of the first and facilitates the </span><abbr data-dcnode-id="3591" title="International Committee of the Red Cross "><span data-dcnode-id="3592" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3590" instrument_node="">’s response to the needs identified. This dual nature thus reinforces the very identity of the </span><abbr data-dcnode-id="3588" title="International Committee of the Red Cross "><span data-dcnode-id="3589" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3587" instrument_node=""> and distinguishes it from other international humanitarian organizations, private or intergovernmental, which generally concentrate on just one of these two priorities.</span></p><p data-dcnode-id="3582"><em data-dcnode-id="3583"><strong data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">An organization with a mandate&nbsp;</span></strong></em></p><p data-dcnode-id="3571"><span data-dcnode-id="3581" instrument_node="">A key characteristic of the </span><abbr data-dcnode-id="3579" title="International Committee of the Red Cross "><span data-dcnode-id="3580" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3578" instrument_node=""> is that it was given a mandate (or rather mandates) by the States party to the Geneva Conventions to help victims of armed conflict. Its work is therefore firmly rooted in public international law. In other situations of violence, the </span><abbr data-dcnode-id="3576" title="International Committee of the Red Cross "><span data-dcnode-id="3577" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3575" instrument_node=""> derives its mandate from the Statutes of the Movement.[</span><a data-dcnode-id="3573" href="#_ftn_003" id="_ftnref_003" name="_ftnref_003" title=""><span data-dcnode-id="3574" instrument_node="">3</span></a><span data-dcnode-id="3572" instrument_node="">]</span></p><p data-dcnode-id="3560"><span data-dcnode-id="3570" instrument_node="">The main legal basis for the </span><abbr data-dcnode-id="3568" title="International Committee of the Red Cross "><span data-dcnode-id="3569" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3567" instrument_node="">’s work is to be found in international humanitarian law. The Statutes of the International Red Cross and Red Crescent Movement (the Movement) and resolutions of the International Conference of the Red Cross and Red Crescent and the Council of Delegates underscore the legitimacy of the </span><abbr data-dcnode-id="3565" title="International Committee of the Red Cross "><span data-dcnode-id="3566" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3564" instrument_node="">’s work. International humanitarian law, like the Statutes of the Movement, confirms a historical tradition of </span><abbr data-dcnode-id="3562" title="International Committee of the Red Cross "><span data-dcnode-id="3563" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3561" instrument_node=""> action which predates its successive codifications.</span></p><p data-dcnode-id="3552"><span data-dcnode-id="3559" instrument_node="">States gave the </span><abbr data-dcnode-id="3557" title="International Committee of the Red Cross "><span data-dcnode-id="3558" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3556" instrument_node=""> the responsibility of monitoring the faithful application of international humanitarian law. As the guardian of humanitarian law, the </span><abbr data-dcnode-id="3554" title="International Committee of the Red Cross "><span data-dcnode-id="3555" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3553" instrument_node=""> takes measures to ensure respect for, to promote, to reaffirm and even to clarify and develop this body of law. The organization is particularly concerned about possible erosion of international humanitarian law and takes bilateral, multilateral or public steps to promote respect for and development of the law.</span></p><p data-dcnode-id="3547"><span data-dcnode-id="3551" instrument_node="">The </span><abbr data-dcnode-id="3549" title="International Committee of the Red Cross "><span data-dcnode-id="3550" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3548" instrument_node=""> generally cites international humanitarian law in reference to its activities. It nevertheless reserves the right to cite other bodies of law and other international standards protecting people, in particular international human rights law, whenever it deems it necessary.</span></p><p data-dcnode-id="3539"><span data-dcnode-id="3546" instrument_node="">The </span><abbr data-dcnode-id="3544" title="International Committee of the Red Cross "><span data-dcnode-id="3545" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3543" instrument_node=""> has developed several policy documents that draw on its long experience. These texts serve as a guide for its actions and aim to give the organization long-term coherence, which in turn gives the </span><abbr data-dcnode-id="3541" title="International Committee of the Red Cross "><span data-dcnode-id="3542" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3540" instrument_node=""> added predictability and credibility when exercising its mandate.</span></p><p data-dcnode-id="3535"><em data-dcnode-id="3536"><strong data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Membership in a Movement&nbsp;</span></strong></em></p><p data-dcnode-id="3527"><span data-dcnode-id="3534" instrument_node="">Another characteristic of the </span><abbr data-dcnode-id="3532" title="International Committee of the Red Cross "><span data-dcnode-id="3533" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3531" instrument_node=""> is its membership in a Movement – a Movement which it initiated. The </span><abbr data-dcnode-id="3529" title="International Committee of the Red Cross "><span data-dcnode-id="3530" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3528" instrument_node=""> is one component, and National Societies and the International Federation of Red Cross and Red Crescent Societies (the Federation) are the others. This link with the Movement is reinforced by the similarity of tasks of all Movement components and by the use of common emblems.</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">The Movement’s mission is:</span></p><ul data-dcnode-id="3516"><li data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">to prevent and alleviate suffering wherever it may be found;</span></li><li data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">to protect life and health and ensure respect for the human being, in particular in times of armed conflict and other emergencies;</span></li><li data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">to work for the prevention of disease and for the promotion of health and social welfare;</span></li><li data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">to encourage voluntary service and a constant readiness to give help by the members of the Movement, and a universal sense of solidarity towards all those in need of</span></li></ul><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">its protection and assistance (Preamble to the Statutes of the Movement).</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3513" instrument_node="">It may be added that by carrying out its activities throughout the world, the Movement contributes to the establishment of a lasting peace.</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node=""> The mission of the National Societies is to carry out humanitarian activities within their own countries, particularly in the role of auxiliaries to the public authorities in the humanitarian field.[</span><a data-dcnode-id="3509" href="#_ftn_004" id="_ftnref_004" name="_ftnref_004" title=""><span data-dcnode-id="3510" instrument_node="">4</span></a><span data-dcnode-id="3508" instrument_node="">]</span></p><p data-dcnode-id="3496"><span data-dcnode-id="3506" instrument_node="">The </span><abbr data-dcnode-id="3504" title="International Committee of the Red Cross "><span data-dcnode-id="3505" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3503" instrument_node=""> undertakes procedures to recognize National Societies on the basis of criteria set out in the Statutes of the Movement. The recognition of National Societies makes them full members of the Movement and eligible to become members of the Federation. The </span><abbr data-dcnode-id="3501" title="International Committee of the Red Cross "><span data-dcnode-id="3502" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3500" instrument_node=""> cooperates with them in matters of common concern, such as their preparation for action in times of armed conflict, tracing and reuniting families and spreading knowledge of international humanitarian law and the Movement’s Fundamental Principles. In armed conflict and other situations of violence, the </span><abbr data-dcnode-id="3498" title="International Committee of the Red Cross "><span data-dcnode-id="3499" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3497" instrument_node=""> is responsible for helping them boost their capacity to meet the increased need for humanitarian aid.</span></p><p data-dcnode-id="3480"><span data-dcnode-id="3495" instrument_node="">Often it is thanks to the National Societies’ presence, resources, local knowledge and motivation that the </span><abbr data-dcnode-id="3493" title="International Committee of the Red Cross "><span data-dcnode-id="3494" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3492" instrument_node=""> can successfully carry out its work in the field. National Societies may also be involved in international operations via the </span><abbr data-dcnode-id="3490" title="International Committee of the Red Cross "><span data-dcnode-id="3491" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3489" instrument_node="">, the Federation or the National Society of the country in question. The </span><abbr data-dcnode-id="3487" title="International Committee of the Red Cross "><span data-dcnode-id="3488" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3486" instrument_node=""> benefits from a unique worldwide network made up of all the National Societies. Cooperation and coordination within the Movement help make the best possible use of the capacity of all members.</span><br data-dcnode-id="3485"><span data-dcnode-id="3484" instrument_node=""> In accordance with the Movement’s agreements and rules, the </span><abbr data-dcnode-id="3482" title="International Committee of the Red Cross "><span data-dcnode-id="3483" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3481" instrument_node=""> directs and coordinates international relief activities in “international and non-international armed conflicts” and in situations of “internal strife and their direct results.” It also directs and coordinates activities aiming to restore family links in any situation requiring an international emergency response.</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3479" instrument_node="">The </span><abbr data-dcnode-id="3477" title="International Committee of the Red Cross "><span data-dcnode-id="3478" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3476" instrument_node=""> thus has two levels of responsibility:</span></p><ul data-dcnode-id="3470"><li data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">doing the humanitarian work that derives from its own mandate and its specific areas of competence;</span></li><li data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">coordinating the international operations of the Movement’s components.</span></li></ul><p data-dcnode-id="3466"><em data-dcnode-id="3467"><strong data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">The Fundamental Principles of the International Red Cross and Red Crescent Movement&nbsp;</span></strong></em></p><p data-dcnode-id="3455"><span data-dcnode-id="3465" instrument_node="">The </span><abbr data-dcnode-id="3463" title="International Committee of the Red Cross "><span data-dcnode-id="3464" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3462" instrument_node="">’s endeavour is guided by seven Fundamental Principles, which the organization shares with the other components of the Movement. The principles – humanity, impartiality, neutrality, independence, voluntary service, unity and universality – are set out in the Movement Statutes and constitute the common values that distinguish the Movement from other humanitarian organizations. The Movement has given the </span><abbr data-dcnode-id="3460" title="International Committee of the Red Cross "><span data-dcnode-id="3461" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3459" instrument_node=""> the task of upholding and disseminating these principles. The first four, which are set out below, are those most commonly cited by the </span><abbr data-dcnode-id="3457" title="International Committee of the Red Cross "><span data-dcnode-id="3458" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3456" instrument_node=""> and are specifically mentioned in its mission statement:</span></p><ul data-dcnode-id="3425"><li data-dcnode-id="3450"><span data-dcnode-id="3454" instrument_node="">Humanity is the supreme principle. It is based on respect for the human being and encapsulates the ideals and aims of the Movement. It is the main driving force behind the </span><abbr data-dcnode-id="3452" title="International Committee of the Red Cross "><span data-dcnode-id="3453" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3451" instrument_node="">’s work.</span></li><li data-dcnode-id="3445"><span data-dcnode-id="3449" instrument_node="">Impartiality, a principle that rejects any form of discrimination, calls for equal treatment for people in distress, according to their needs. It enables the </span><abbr data-dcnode-id="3447" title="International Committee of the Red Cross "><span data-dcnode-id="3448" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3446" instrument_node=""> to prioritize its activities on the basis of the degree of urgency and the types of needs of those affected.</span></li><li data-dcnode-id="3437"><span data-dcnode-id="3444" instrument_node="">Neutrality enables the </span><abbr data-dcnode-id="3442" title="International Committee of the Red Cross "><span data-dcnode-id="3443" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3441" instrument_node=""> to keep everyone’s trust by not taking sides in hostilities or controversies of a political, racial, religious or ideological nature. Neutrality does not mean indifference to suffering, acceptance of war or quiescence in the face of inhumanity; rather, it means not engaging in controversies that divide peoples. The </span><abbr data-dcnode-id="3439" title="International Committee of the Red Cross "><span data-dcnode-id="3440" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3438" instrument_node="">’s work benefits from this principle because it enables the organization to make more contacts and gain access to those affected.</span></li><li data-dcnode-id="3426"><span data-dcnode-id="3436" instrument_node="">The </span><abbr data-dcnode-id="3434" title="International Committee of the Red Cross "><span data-dcnode-id="3435" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3433" instrument_node="">’s independence is structural: the Committee’s members are all of the same nationality and they are recruited by co-optation. The </span><abbr data-dcnode-id="3431" title="International Committee of the Red Cross "><span data-dcnode-id="3432" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3430" instrument_node=""> is therefore independent of national and international politics, interest groups, and any other entity that may have some connection with a situation of violence. This gives the </span><abbr data-dcnode-id="3428" title="International Committee of the Red Cross "><span data-dcnode-id="3429" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3427" instrument_node=""> the autonomy it needs to accomplish the exclusively humanitarian task entrusted to it with complete impartiality and neutrality.</span></li></ul><p data-dcnode-id="3421"><em data-dcnode-id="3422"><strong data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Scope of work and criteria for taking action&nbsp;</span></strong></em></p><p data-dcnode-id="3414"><em data-dcnode-id="3415"><strong data-dcnode-id="3416"><span data-dcnode-id="3420" instrument_node="">There are four different situations in which the </span><abbr data-dcnode-id="3418" title="International Committee of the Red Cross "><span data-dcnode-id="3419" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3417" instrument_node=""> takes action:&nbsp;</span></strong></em></p><ol data-dcnode-id="3387"><li data-dcnode-id="3403"><span data-dcnode-id="3413" instrument_node="">The </span><abbr data-dcnode-id="3411" title="International Committee of the Red Cross "><span data-dcnode-id="3412" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3410" instrument_node="">’s endeavour to help the victims of international armed conflict and non-international armed conflict is at the heart of its mission. The </span><abbr data-dcnode-id="3408" title="International Committee of the Red Cross "><span data-dcnode-id="3409" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3407" instrument_node=""> offers its services on the basis of international humanitarian law, and after taking due account of the existing or foreseeable need for humanitarian aid.[</span><a data-dcnode-id="3405" href="#_ftn_005" id="_ftnref_005" name="_ftnref_005" title=""><span data-dcnode-id="3406" instrument_node="">5</span></a><span data-dcnode-id="3404" instrument_node="">]&nbsp;</span></li><li data-dcnode-id="3395"><span data-dcnode-id="3402" instrument_node="">In other situations of violence, the </span><abbr data-dcnode-id="3400" title="International Committee of the Red Cross "><span data-dcnode-id="3401" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3399" instrument_node=""> offers its services if the seriousness of unmet needs and the urgency of the situation warrant such a step. It also considers whether it can do more than others owing to its status as a specifically neutral and independent organization and to its experience. In these situations, its offer of services is based not on international humanitarian law but on the Statutes of the Movement.[</span><a data-dcnode-id="3397" href="#_ftn_006" id="_ftnref_006" name="_ftnref_006" title=""><span data-dcnode-id="3398" instrument_node="">6</span></a><span data-dcnode-id="3396" instrument_node="">]</span></li><li data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">If a natural or technological disaster or a pandemic occurs in an area where the </span><abbr data-dcnode-id="3392" title="International Committee of the Red Cross "><span data-dcnode-id="3393" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3391" instrument_node=""> has an operational presence, meaning it can deploy quickly and make a significant contribution, the organization steps in with its unique capabilities, to the extent it is able and in cooperation with the Movement. It generally takes action during the emergency phase only.</span></li><li data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">In other situations, it makes its own unique contribution to the efforts of all humanitarian agencies, especially within its fields of expertise such as tracing work and disseminating international humanitarian law and the Fundamental Principles. These are all fields in which it has an explicit mandate.</span></li></ol><p data-dcnode-id="3382"><span data-dcnode-id="3386" instrument_node="">The </span><abbr data-dcnode-id="3384" title="International Committee of the Red Cross "><span data-dcnode-id="3385" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3383" instrument_node=""> sets priorities on the basis of the following criteria:</span></p><ul data-dcnode-id="3366"><li data-dcnode-id="3377"><span data-dcnode-id="3381" instrument_node="">the extent of victims’ suffering and the urgency of their needs: the principle of impartiality, mentioned in humanitarian law, remains the pillar of the </span><abbr data-dcnode-id="3379" title="International Committee of the Red Cross "><span data-dcnode-id="3380" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3378" instrument_node="">’s work, which is non-discriminatory and proportionate to the needs of the people requiring protection and assistance;</span></li><li data-dcnode-id="3372"><span data-dcnode-id="3376" instrument_node="">its unique capabilities deriving from its distinctiveness as a neutral and independent organization and intermediary and its experience in assisting the victims of armed conflict (local knowledge, human resources, logistics, tracing work, etc.). The particular merit of the </span><abbr data-dcnode-id="3374" title="International Committee of the Red Cross "><span data-dcnode-id="3375" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3373" instrument_node="">, which results from its principles and its operational experience, is recognized by the international community. It fits into the scheme of an environment for humanitarian work that is characterized by numerous very different agencies;</span></li><li data-dcnode-id="3367"><span data-dcnode-id="3371" instrument_node="">the legal basis for its work: the </span><abbr data-dcnode-id="3369" title="International Committee of the Red Cross "><span data-dcnode-id="3370" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3368" instrument_node=""> endeavours to take action in situations where international humanitarian law is applicable and carefully considers the advisability of taking action in the context of the direct results of these situations and in other situations of violence not covered by international humanitarian law (internal disturbances and tensions). In all cases, it tailors its action according to the criteria set out above.</span></li></ul><p data-dcnode-id="3361"><span data-dcnode-id="3365" instrument_node="">Operational considerations and constraints (such as impact on other activities, whether the </span><abbr data-dcnode-id="3363" title="International Committee of the Red Cross "><span data-dcnode-id="3364" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3362" instrument_node=""> has been invited to take action, and security issues) can be added to these criteria.</span></p><p data-dcnode-id="3358"><strong data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Strategies for fulﬁlling the mission:</span></strong></p><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">From comprehensive analysis to speciﬁc activities</span></p><p data-dcnode-id="3352"><em data-dcnode-id="3353"><strong data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">A comprehensive analysis&nbsp;</span></strong></em></p><p data-dcnode-id="3344"><span data-dcnode-id="3351" instrument_node="">For any action to be taken, a comprehensive analysis of the situation, the actors present, the stakes and the dynamics must be carried out. This enables the </span><abbr data-dcnode-id="3349" title="International Committee of the Red Cross "><span data-dcnode-id="3350" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3348" instrument_node=""> to identify the people adversely affected and their needs. It requires a clear understanding of the problems’ causes and a good knowledge of local facilities, their capabilities and their potential. The </span><abbr data-dcnode-id="3346" title="International Committee of the Red Cross "><span data-dcnode-id="3347" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3345" instrument_node=""> endeavours to obtain an overall perspective of an issue of humanitarian concern by looking at all the aspects and at the different responses that would be suitable.</span></p><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">A number of factors should be considered: social, economic, political, cultural, security, religious and ethnic, among others. Analysis should also take account of the interdependence of local, regional and international factors affecting a situation of conflict or any other situation of violence.</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3341" instrument_node="">Analysis provides a basis for deciding on an overall strategy, with specific priorities and objectives, and determines the types of problem and/or the categories of needs on which the </span><abbr data-dcnode-id="3339" title="International Committee of the Red Cross "><span data-dcnode-id="3340" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3338" instrument_node=""> is going to concentrate its efforts and its resources. It is then a matter of developing a strategy aimed not only at addressing the direct consequences of problems, but also – as far as possible within the framework of neutral and independent humanitarian activities – their origins and causes.</span></p><p data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node="">In so doing, the </span><abbr data-dcnode-id="3334" title="International Committee of the Red Cross "><span data-dcnode-id="3335" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3333" instrument_node=""> must first exploit its strong points and the opportunities offered by the local environment, and second try to minimize its weaknesses and neutralize or circumvent external difficulties. Because of the complementary role played by partners in and outside the Movement, the strong and weak points of these partners must also be taken into account in strategy discussions.</span></p><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Depending on what needs to be done, the various activities either start simultaneously or consecutively.</span></p><p data-dcnode-id="3324"><strong data-dcnode-id="3325"><span data-dcnode-id="3329" instrument_node="">Four approaches set out in the mission statement that allow the </span><abbr data-dcnode-id="3327" title="International Committee of the Red Cross "><span data-dcnode-id="3328" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3326" instrument_node=""> to fulfil its purpose</span></strong></p><p data-dcnode-id="3319"><span data-dcnode-id="3323" instrument_node="">As described in the </span><abbr data-dcnode-id="3321" title="International Committee of the Red Cross "><span data-dcnode-id="3322" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3320" instrument_node="">’s mission statement, the organization combines four approaches in its overall strategy after analysing a situation in order to, directly or indirectly, in the short, medium or long term, ensure respect for the lives, dignity, and physical and mental well-being of victims of armed conflict and other situations of violence.</span></p><p data-dcnode-id="3315"><em data-dcnode-id="3316"><strong data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Protecting the lives and dignity of victims of armed conflict and other situations of violence&nbsp;</span></strong></em></p><p data-dcnode-id="3312"><em data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">The protection approach</span></em></p><p data-dcnode-id="3305"><span data-dcnode-id="3311" instrument_node="">[See </span><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-protection-policy" title=""><abbr data-dcnode-id="3309" title="International Committee of the Red Cross "><span data-dcnode-id="3310" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3308" instrument_node="">, Protection Policy</span></a><span data-dcnode-id="3306" instrument_node="">]</span></p><ul data-dcnode-id="3298"><li data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">In order to preserve the lives, security, dignity, and physical and mental well-being of victims of armed conflict and other situations of violence, this approach aims to ensure that authorities and other actors fulfil their obligations and uphold the rights of individuals.</span></li><li data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">It also tries to prevent or put an end to actual or probable violations of international humanitarian law or other bodies of law or fundamental rules protecting people in these situations.</span></li><li data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">It focuses first on the causes or circumstances of violations, addressing those responsible and those who can influence them, and second on the consequences of violations.</span></li></ul><p data-dcnode-id="3294"><em data-dcnode-id="3295"><strong data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Assisting victims of armed conflict and other situations of violence&nbsp;</span></strong></em></p><p data-dcnode-id="3291"><em data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">The assistance approach</span></em></p><p data-dcnode-id="3284"><span data-dcnode-id="3290" instrument_node="">[See </span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-assistance-policy" title=""><abbr data-dcnode-id="3288" title="International Committee of the Red Cross "><span data-dcnode-id="3289" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3287" instrument_node="">, Assistance Policy</span></a><span data-dcnode-id="3285" instrument_node="">]</span></p><ul data-dcnode-id="3277"><li data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">The aim of assistance is to preserve life and/or restore the dignity of individuals or communities adversely affected by armed conflict or other situations of violence.</span></li><li data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Assistance activities principally address the consequences of violations of international humanitarian law and other relevant bodies of law. They may also tackle the causes and circumstances of these violations by reducing exposure to risk.</span></li><li data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Assistance covers the unmet essential needs of individuals and/or communities as determined by the social and cultural environment. These needs vary, but responses mainly address issues relating to health, water, sanitation, shelter and economic security by providing goods and services, supporting existing facilities and services and encouraging the authorities and others to assume their responsibilities.</span></li></ul><p data-dcnode-id="3273"><em data-dcnode-id="3274"><strong data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Directing and coordinating the Movement’s international relief efforts in armed conflict and other situations of violence&nbsp;</span></strong></em></p><p data-dcnode-id="3270"><em data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">The cooperation approach</span></em></p><ul data-dcnode-id="3260"><li data-dcnode-id="3265"><span data-dcnode-id="3269" instrument_node="">The aim of cooperation is to increase the operational capacities of National Societies, above all in countries affected or likely to be affected by armed conflict or other situations of violence. A further aim is to increase the </span><abbr data-dcnode-id="3267" title="International Committee of the Red Cross "><span data-dcnode-id="3268" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3266" instrument_node="">’s capacity to interact with National Societies and work in partnership with them.</span></li><li data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">The cooperation approach aims to optimize the humanitarian work of Movement components by making the best use of complementary mandates and skills in operational matters such as protection, assistance and prevention.</span></li><li data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">It involves drawing up and implementing the policies of the Movement that are adopted during its statutory meetings and strengthening the capacities of the National Societies, helping them to adhere at all times to the Fundamental Principles.</span></li></ul><p data-dcnode-id="3256"><em data-dcnode-id="3257"><strong data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Endeavouring to prevent suffering by promoting, reinforcing and developing international humanitarian law and universal humanitarian principles&nbsp;</span></strong></em></p><p data-dcnode-id="3253"><em data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">The prevention approach</span></em></p><ul data-dcnode-id="3240"><li data-dcnode-id="3248"><span data-dcnode-id="3252" instrument_node="">The aim of prevention is to foster an environment that is conducive to respect for the lives and dignity of those who may be adversely affected by armed conflict and other situations of violence, and that favours the work of the </span><abbr data-dcnode-id="3250" title="International Committee of the Red Cross "><span data-dcnode-id="3251" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3249" instrument_node="">.</span></li><li data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">This approach aims to prevent suffering by influencing those who have a direct or indirect impact on the fate of people affected by these situations. This generally implies a medium or long-term perspective.</span></li><li data-dcnode-id="3241"><span data-dcnode-id="3245" instrument_node="">In particular, the prevention approach involves communicating, developing, clarifying and promoting the implementation of international humanitarian law and other applicable bodies of law, and promoting acceptance of the </span><abbr data-dcnode-id="3243" title="International Committee of the Red Cross "><span data-dcnode-id="3244" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3242" instrument_node="">’s work.</span></li></ul><p data-dcnode-id="3237"><strong data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Combining activities: Multidisciplinarity</span></strong></p><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Each activity responds, in humanitarian terms, to a specific problem or to common problems. Each approach uses its own implementation strategies. These strategies combine different activities from the four programmes detailed in the annual planning tool: protection, assistance, prevention and cooperation. Thus, a protection strategy could also include activities from the assistance, prevention or cooperation programmes. Digging wells in a camp for the displaced may be one aspect of an assistance programme and may be intended to tackle the lack of water. It would therefore form part of the assistance approach. However, this activity could equally be intended primarily to protect people exposed to violence while looking for water outside the camp. It therefore also forms part of the protection approach.</span></p><p data-dcnode-id="3224"><span data-dcnode-id="3234" instrument_node="">Combining activities is particularly important. The </span><abbr data-dcnode-id="3232" title="International Committee of the Red Cross "><span data-dcnode-id="3233" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3231" instrument_node=""> is duty bound to use all means at its disposal, according to each situation and to the priorities and objectives identified. Furthermore, the different approaches are of mutual assistance: for example, </span><abbr data-dcnode-id="3229" title="International Committee of the Red Cross "><span data-dcnode-id="3230" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3228" instrument_node=""> staff may receive information on violations of international humanitarian law while carrying out assistance work and this can then provide the grounds for making representations to the authorities, which is part of the protection approach. In conflict situations, assistance activities often take on a protection nature, and vice versa, to the point of being inextricably linked. It was after all to the </span><abbr data-dcnode-id="3226" title="International Committee of the Red Cross "><span data-dcnode-id="3227" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3225" instrument_node=""> that the Movement assigned the task of endeavouring at all times to protect and assist victims of these events.</span></p><p data-dcnode-id="3211"><span data-dcnode-id="3223" instrument_node="">Combining activities is often supported by what the </span><abbr data-dcnode-id="3221" title="International Committee of the Red Cross "><span data-dcnode-id="3222" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3220" instrument_node=""> calls its humanitarian diplomacy. The aim is to influence – and if necessary modify – the political choices of States, armed groups, and international and supranational organizations in order to enhance compliance with international humanitarian law and to promote the </span><abbr data-dcnode-id="3218" title="International Committee of the Red Cross "><span data-dcnode-id="3219" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3217" instrument_node="">’s major objectives. To that end, the </span><abbr data-dcnode-id="3215" title="International Committee of the Red Cross "><span data-dcnode-id="3216" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3214" instrument_node=""> encourages the various services and hierarchical levels at headquarters and its network of delegations to increase dialogue with these entities on general issues of concern to it. The essential message of humanitarian diplomacy is the same for all delegations, whatever their operational priorities.</span><br data-dcnode-id="3213"><span data-dcnode-id="3212" instrument_node=""> Coordination of humanitarian activities</span></p><p data-dcnode-id="3203"><span data-dcnode-id="3210" instrument_node="">Both from headquarters and in the field, the </span><abbr data-dcnode-id="3208" title="International Committee of the Red Cross "><span data-dcnode-id="3209" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3207" instrument_node=""> coordinates its activities with other humanitarian organizations in order to improve the lives, directly or indirectly, of victims of armed conflict and other situations of violence. Coordination is only possible as far as the strictly humanitarian approach of the </span><abbr data-dcnode-id="3205" title="International Committee of the Red Cross "><span data-dcnode-id="3206" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3204" instrument_node="">, as an impartial, neutral and independent organization, allows. Authority cannot be ceded to any other entity or group of entities.</span></p><p data-dcnode-id="3200"><strong data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Modes of action</span></strong></p><p data-dcnode-id="3195"><span data-dcnode-id="3199" instrument_node="">In keeping with the emphasis it places on complementary roles, the </span><abbr data-dcnode-id="3197" title="International Committee of the Red Cross "><span data-dcnode-id="3198" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3196" instrument_node=""> takes into account its partners’ (in and outside the Movement) strong and weak points and their fields of expertise in its strategic discussions.</span></p><p data-dcnode-id="3190"><span data-dcnode-id="3194" instrument_node="">The </span><abbr data-dcnode-id="3192" title="International Committee of the Red Cross "><span data-dcnode-id="3193" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3191" instrument_node="">’s strategy is based on combining “modes of action” and on selecting the appropriate activities depending on the approach (or approaches) chosen. Modes of action are the methods or means used to persuade authorities to fulfil their obligations towards individuals or entire populations.</span></p><p data-dcnode-id="3182"><span data-dcnode-id="3189" instrument_node="">The </span><abbr data-dcnode-id="3187" title="International Committee of the Red Cross "><span data-dcnode-id="3188" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3186" instrument_node="">’s modes of action are: raising awareness of responsibility (persuasion, mobilization, denunciation), support, and substitution (direct provision of services). The </span><abbr data-dcnode-id="3184" title="International Committee of the Red Cross "><span data-dcnode-id="3185" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3183" instrument_node=""> does not limit itself to any one of them; on the contrary, it combines them, striking a balance between them either simultaneously or consecutively.</span></p><ol data-dcnode-id="3147"><li data-dcnode-id="3161"><span data-dcnode-id="3181" instrument_node="">The aim of raising awareness of responsibility is to remind people of their obligations and, where necessary, to persuade them to change their behaviour. This translates into three methods:</span><ol data-dcnode-id="3162" type="a"><li data-dcnode-id="3176"><span data-dcnode-id="3180" instrument_node="">Persuasion aims to convince someone to do something which falls within his area of responsibility or competence, through bilateral confidential dialogue. This is traditionally the </span><abbr data-dcnode-id="3178" title="International Committee of the Red Cross "><span data-dcnode-id="3179" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3177" instrument_node="">’s preferred mode of action.</span></li><li data-dcnode-id="3171"><span data-dcnode-id="3175" instrument_node="">The organization may also seek outside support, through mobilization of influential third parties (e.g. States, regional organizations, private companies, members of civil society or religious groups who have a good relationship with the authorities in question). The </span><abbr data-dcnode-id="3173" title="International Committee of the Red Cross "><span data-dcnode-id="3174" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3172" instrument_node=""> chooses such third parties with care, contacting only those who it thinks will be able to respect the confidential nature of the information that they receive.</span></li><li data-dcnode-id="3163"><span data-dcnode-id="3170" instrument_node="">Faced with an authority which has chosen to neglect or deliberately violate its obligations, persuasion (even with the mobilization of support from influential third parties) may not be effective. In certain circumstances, therefore, the </span><abbr data-dcnode-id="3168" title="International Committee of the Red Cross "><span data-dcnode-id="3169" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3167" instrument_node=""> may decide to break with its tradition of confidentiality and resort to public denunciation.[</span><a data-dcnode-id="3165" href="#_ftn_007" id="_ftnref_007" name="_ftnref_007" title=""><span data-dcnode-id="3166" instrument_node="">7</span></a><span data-dcnode-id="3164" instrument_node="">] This mode of action is used only as part of the protection approach, which focuses on the imminent or established violation of a rule protecting individuals.</span></li></ol></li><li data-dcnode-id="3156"><span data-dcnode-id="3160" instrument_node="">If authorities are unable to take action, the </span><abbr data-dcnode-id="3158" title="International Committee of the Red Cross "><span data-dcnode-id="3159" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3157" instrument_node=""> provides support where necessary to enable them to assume their responsibilities.</span></li><li data-dcnode-id="3148"><span data-dcnode-id="3155" instrument_node="">When the competent authorities do not take or are unable to take appropriate measures (owing to lack of means, or unwillingness, or when no such authorities exist), the </span><abbr data-dcnode-id="3153" title="International Committee of the Red Cross "><span data-dcnode-id="3154" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3152" instrument_node=""> takes direct action in their place (substitution) to meet the needs of the people or populations affected. If the situation is critical, the </span><abbr data-dcnode-id="3150" title="International Committee of the Red Cross "><span data-dcnode-id="3151" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3149" instrument_node=""> acts first and then speaks to the authorities to persuade them to take appropriate measures or to help them examine possible solutions.</span></li></ol><p data-dcnode-id="3144"><strong data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Guidelines for action</span></strong></p><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">The above-mentioned strategy is implemented with consideration for the following guidelines:</span></p><ol data-dcnode-id="3064"><li data-dcnode-id="3134"><span data-dcnode-id="3141" instrument_node="">The </span><abbr data-dcnode-id="3139" title="International Committee of the Red Cross "><span data-dcnode-id="3140" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3138" instrument_node="">’s humanitarian work is impartial, neutral and independent. Experience has taught it that this approach offers the best chance of being accepted during an armed conflict or other situation of violence, in particular given the risk that actors at a local, regional or international level may become polarized or radicalized. The integration of political, military and humanitarian means as recommended by some States is therefore a major source of difficulty for the </span><abbr data-dcnode-id="3136" title="International Committee of the Red Cross "><span data-dcnode-id="3137" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3135" instrument_node="">. The organization insists on the need to avoid a blurring of lines while still allowing for the possibility of complementary action.</span></li><li data-dcnode-id="3126"><span data-dcnode-id="3133" instrument_node="">Many of the </span><abbr data-dcnode-id="3131" title="International Committee of the Red Cross "><span data-dcnode-id="3132" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3130" instrument_node="">’s tasks are carried out close to the people concerned – in the field, in other words, where the organization has better access to them. The individuals and communities concerned must be consulted in order to better establish their needs and interests, and they should be associated with the action taken. Their value systems, their specific vulnerabilities and the way they perceive their needs must all be taken into consideration. The </span><abbr data-dcnode-id="3128" title="International Committee of the Red Cross "><span data-dcnode-id="3129" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3127" instrument_node=""> favours a participatory approach aimed at building local capacities.</span></li><li data-dcnode-id="3115"><span data-dcnode-id="3125" instrument_node="">The </span><abbr data-dcnode-id="3123" title="International Committee of the Red Cross "><span data-dcnode-id="3124" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3122" instrument_node=""> has a universal vocation. Its work is not limited to certain places, or to certain types of people (such as children or refugees). With a presence in numerous regions of the world, the </span><abbr data-dcnode-id="3120" title="International Committee of the Red Cross "><span data-dcnode-id="3121" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3119" instrument_node=""> has an overall vision that enables it to undertake comprehensive analysis. The organization must have a coherent approach everywhere it works if it is to appear transparent and predictable. However, this does not mean that </span><abbr data-dcnode-id="3117" title="International Committee of the Red Cross "><span data-dcnode-id="3118" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3116" instrument_node=""> activities are uniform. Taking the context into consideration is still a key aspect of analysis and strategy.</span></li><li data-dcnode-id="3107"><span data-dcnode-id="3114" instrument_node="">The </span><abbr data-dcnode-id="3112" title="International Committee of the Red Cross "><span data-dcnode-id="3113" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3111" instrument_node=""> gets involved during the emergency phase and stays for as long as is necessary. However, the organization is careful to ensure that its involvement does not dissuade the authorities from fully assuming their responsibilities or the communities affected from relying on their usual coping mechanisms. It also takes care not to get in the way of other organizations and actors who are building up civil society’s resources. Measures are taken so that the </span><abbr data-dcnode-id="3109" title="International Committee of the Red Cross "><span data-dcnode-id="3110" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3108" instrument_node=""> is able to leave the scene in an appropriate manner when the time comes.</span></li><li data-dcnode-id="3084"><span data-dcnode-id="3106" instrument_node="">The </span><abbr data-dcnode-id="3104" title="International Committee of the Red Cross "><span data-dcnode-id="3105" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3103" instrument_node=""> engages in dialogue with all those involved in an armed conflict or other situation of violence who may have some influence on its course, whether they are recognized by the community of States or not. No one is excluded, not only because engaging in dialogue does not equate to formal recognition but also because multiple and varied contacts are essential for assessing a situation and for guaranteeing the safety of </span><abbr data-dcnode-id="3101" title="International Committee of the Red Cross "><span data-dcnode-id="3102" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3100" instrument_node=""> activities and personnel. The </span><abbr data-dcnode-id="3098" title="International Committee of the Red Cross "><span data-dcnode-id="3099" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3097" instrument_node=""> maintains a network of contacts locally, regionally and internationally. In the event of violations of international humanitarian law or other bodies of law or other fundamental rules protecting people in situations of violence, the </span><abbr data-dcnode-id="3095" title="International Committee of the Red Cross "><span data-dcnode-id="3096" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3094" instrument_node=""> attempts to influence the perpetrators. In the first instance, it will take bilateral confidential action.[</span><a data-dcnode-id="3092" href="#_ftn_008" id="_ftnref_008" name="_ftnref_008" title=""><span data-dcnode-id="3093" instrument_node="">8</span></a><span data-dcnode-id="3091" instrument_node="">] When it comes to confidential action and to communication with the public, the </span><abbr data-dcnode-id="3089" title="International Committee of the Red Cross "><span data-dcnode-id="3090" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3088" instrument_node=""> wants to promote transparency and present itself as an organization acting in a credible and predictable manner. Moreover, reflecting the interest that States have in the unique status and role of the </span><abbr data-dcnode-id="3086" title="International Committee of the Red Cross "><span data-dcnode-id="3087" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3085" instrument_node="">, the organization’s right to abstain from giving evidence has been recognized by several sources of international law.</span></li><li data-dcnode-id="3073"><span data-dcnode-id="3083" instrument_node="">While doing what it can to help needy people, the </span><abbr data-dcnode-id="3081" title="International Committee of the Red Cross "><span data-dcnode-id="3082" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3080" instrument_node=""> also takes into consideration the efforts of others since there is a wide variety of agencies in the humanitarian world. The main objective of interacting with other providers of aid is to make the best use of complementary efforts in order to meet needs. Interacting should provide the basis for building on the skills of each and hence for obtaining the best possible results, then continue to respond to needs in the long term through programme handover. Interaction should therefore be based on transparency, equality, effective operational capacities and a complementary relationship between organizations. It starts with – but is not limited to – the Movement and its universal network. Indeed, the other components emerge as the </span><abbr data-dcnode-id="3078" title="International Committee of the Red Cross "><span data-dcnode-id="3079" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3077" instrument_node="">’s natural and preferred partners, with whom it would like to develop and strengthen a common identity and vision.[</span><a data-dcnode-id="3075" href="#_ftn_009" id="_ftnref_009" name="_ftnref_009" title=""><span data-dcnode-id="3076" instrument_node="">9</span></a><span data-dcnode-id="3074" instrument_node="">]</span></li><li data-dcnode-id="3065"><span data-dcnode-id="3072" instrument_node="">Through its work, the </span><abbr data-dcnode-id="3070" title="International Committee of the Red Cross "><span data-dcnode-id="3071" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3069" instrument_node=""> bears a certain responsibility for the individuals or entire populations it endeavours to protect and assist. Its fundamental concern is to have a genuinely positive impact on their lives. It has set up a framework of accountability and tools for planning, monitoring and assessing its actions; these help it examine its performance and results and hence constantly improve the quality of its work. The </span><abbr data-dcnode-id="3067" title="International Committee of the Red Cross "><span data-dcnode-id="3068" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3066" instrument_node=""> evaluates all of its activities using various criteria and indicators, including thresholds of success and failure, so that it can become more effective and find the most appropriate way of answering to beneficiaries and donors. Its work is regularly assessed, and reoriented if necessary.</span></li></ol><span data-dcnode-id="3063" instrument_node="">[</span><strong data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Source</span></strong><span data-dcnode-id="3060" instrument_node="">: </span><abbr data-dcnode-id="3058" title="International Committee of the Red Cross "><span data-dcnode-id="3059" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3057" instrument_node="">, The </span><abbr data-dcnode-id="3055" title="International Committee of the Red Cross "><span data-dcnode-id="3056" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3054" instrument_node="">. Its Mission and Work, March 2009; available at </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/" target="_blank"><span data-dcnode-id="3053" instrument_node="">http://www.icrc.org</span></a><span data-dcnode-id="3051" instrument_node="">; footnotes partially omitted]</span></blockquote><h4 aria-controls="readingsbody0" aria-expanded="false" class="readingsheader" data-dcnode-id="3048" data-toggle="collapse" href="#readingsbody0"><span data-dcnode-id="3049" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2973" id="readingsbody0"><p data-dcnode-id="3045"><strong data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="3002"><li data-dcnode-id="3040"><span data-dcnode-id="3044" instrument_node="">BUGNION François, The International Committee of the Red Cross and the Protection of War Victims, Geneva/Oxford, </span><abbr data-dcnode-id="3042" title="International Committee of the Red Cross "><span data-dcnode-id="3043" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3041" instrument_node="">/Macmillan, 2003, 1161 pp.</span></li><li data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">BUGNION François, “The International Committee of the Red Cross and the Development of International Humanitarian Law”, in Chicago Journal of International Law, Vol. 5/1, Summer 2004, 18 pp.</span></li><li data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">De MAIO Jacques, “L’action de la Croix-Rouge internationale”, in Les nouvelles d’Afghanistan, No. 124, February 2009.</span></li><li data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">DÖRMANN Knut &amp; MARESCA Louis, “The International Committee of the Red Cross and its Contribution to the Development of International Humanitarian Law in Specialized Instruments”, in Chicago Journal of International Law, Vol. 5/1, Summer 2004, 12 pp.</span></li><li data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node="">FORSYTHE David P., The Humanitarians: The International Committee of the Red Cross, Cambridge, </span><abbr data-dcnode-id="3031" title="Cambridge University Press "><span data-dcnode-id="3032" instrument_node="">CUP</span></abbr><span data-dcnode-id="3030" instrument_node="">, 2005, 356 pp.</span></li><li data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">FORSYTHE David P., “The International Committee of the Red Cross and International Humanitarian Law”, in Humanitäres Völkerrecht, Vol. 2, 2003, pp. 64-77.</span></li><li data-dcnode-id="3018"><span data-dcnode-id="3026" instrument_node="">FORSYTHE David P., “The </span><abbr data-dcnode-id="3024" title="International Committee of the Red Cross "><span data-dcnode-id="3025" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3023" instrument_node="">: a Unique Humanitarian Protagonist”, in </span><em data-dcnode-id="3020"><abbr data-dcnode-id="3021" title="International Review of the Red Cross "><span data-dcnode-id="3022" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3019" instrument_node="">, Vol. 89, No. 865, March 2007, pp. 63-96.</span></li><li data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">FREYMOND Jacques, WILLEMIN Georges &amp; HEACOCK Roger, The International Committee of the Red Cross, The Hague, M. Nijhoff, 1984, 209 pp.</span></li><li data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">GAZZINI Tarcisio, “A Unique Non-State Actor: the International Committee of the Red Cross”, in Human Rights and International Legal Discourse, Vol. 4, No. 1, 2010, pp. 32-46.</span></li><li data-dcnode-id="3009"><span data-dcnode-id="3013" instrument_node="">HAROUEL Véronique, Histoire de la Croix-Rouge, Paris, </span><abbr data-dcnode-id="3011" title="Presses Universitaires de France"><span data-dcnode-id="3012" instrument_node="">PUF</span></abbr><span data-dcnode-id="3010" instrument_node="">, Que sais-je ? 1999, 127 pp.</span></li><li data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">HEINSCH Robert, “The International Committee of the Red Cross and the Challenges of Today’s Armed Conflicts”, in GIEGERICH Thomas (ed.), A Wiser Century?: Judicial Dispute Settlement, Disarmament and the Laws of War 100 Years After the Second Hague Peace Conference, Berlin, Duncker and Humblot, 2009, pp. 393-415.</span></li><li data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">HUTCHINSON John F., Champions of Charity: War and the Rise of the Red Cross, Colorado and Oxford, Westview Press, 1996, 448 pp.</span></li><li data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">PICTET Jean, Une Institution unique en son genre : Le Comité international de la Croix-Rouge, Geneva, Henry-Dunant Institute, Paris, Pedone, 1985, 111 pp.</span></li></ul><p data-dcnode-id="2999"><strong data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="2974"><li data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">BOISSIER Pierre, History of the International Committee of the Red Cross: From Solferino to Tsushima, Geneva, Henry-Dunant Institute, 1978, 512 pp.</span></li><li data-dcnode-id="2991"><span data-dcnode-id="2996" instrument_node="">BUGNION François, “From the End of the Second World War to the Dawn of the Third Millenium – The Activities of the International Committee of the Red Cross During the Cold War and its Aftermath: 1945-1995”, in </span><em data-dcnode-id="2993"><abbr data-dcnode-id="2994" title="International Review of the Red Cross "><span data-dcnode-id="2995" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="2992" instrument_node="">, No. 305, March-April 1995, pp. 207-224.</span></li><li data-dcnode-id="2985"><span data-dcnode-id="2990" instrument_node="">BUGNION François, “The Composition of the International Committee of the Red Cross”, in </span><em data-dcnode-id="2987"><abbr data-dcnode-id="2988" title="International Review of the Red Cross "><span data-dcnode-id="2989" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="2986" instrument_node="">, No. 307, July-August 1995, pp. 427-446.</span></li><li data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">CONNOLLY Sean, The International Red Cross, Mankato (Minnesota), Smart Apple Media, 2009, 46 pp.</span></li><li data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">DURAND André, History of the International Committee of the Red Cross: From Sarajevo to Hiroshima, Geneva, Henry-Dunant Institute, 1978, 675 pp.</span></li><li data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">FREYMOND Jacques, Guerres, révolutions, Croix-Rouge: Réflexions sur le rôle du Comité international de la Croix-Rouge, Geneva, I.U.H.E.I., 1976, 222 pp.</span></li><li data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">MOOREHEAD Caroline, Dunant’s Dream: War, Switzerland and the History of the Red Cross, London, Harper-Collins, 1998, 780 pp.</span></li><li data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">PROVOST René, “The International Committee of the Red Widget?: the Diversity Debate and International Humanitarian Law”, in Israel Law Review, March 2007, 40 pp.</span></li></ul></div><h4 class="beigeheader" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">&nbsp;Footnotes</span></h4><div class="beigebox" data-dcnode-id="2847"><ul data-dcnode-id="2848"><li data-dcnode-id="2967"><a data-dcnode-id="2969" href="#_ftnref_001" id="_ftn_001" name="_ftn_001" title=""><span data-dcnode-id="2970" instrument_node="">[1]</span></a><span data-dcnode-id="2968" instrument_node=""> Dunant suggested that permanent relief societies be set up which would begin making preparations during peacetime so as to be ready to support the armed forces’ medical services in wartime. These societies would coordinate their efforts and be recognized by the authorities. He also proposed that an international congress be held “to formulate some international principle, sanctioned by a Convention inviolate in character, which, once agreed upon and ratified, might constitute the basis for societies for the relief of the wounded,” and would also protect the wounded and those coming to their aid […]</span></li><li data-dcnode-id="2960"><a data-dcnode-id="2965" href="#_ftnref_002" id="_ftn_002" name="_ftn_002" title=""><span data-dcnode-id="2966" instrument_node="">[2]</span></a><span data-dcnode-id="2964" instrument_node=""> In making Henry Dunant’s ideas a reality, and in particular, promoting the adoption of a solemn commitment by States to help and care for wounded soldiers without distinction, the </span><abbr data-dcnode-id="2962" title="International Committee of the Red Cross "><span data-dcnode-id="2963" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2961" instrument_node=""> was at the forefront of the development of international humanitarian law. Its fieldwork was later given a legal basis through mandates contained in international humanitarian law and in resolutions adopted at meetings of the International Conference of the Red Cross and Red Crescent.</span></li><li data-dcnode-id="2953"><a data-dcnode-id="2958" href="#_ftnref_003" id="_ftn_003" name="_ftn_003" title=""><span data-dcnode-id="2959" instrument_node="">[3]</span></a><span data-dcnode-id="2957" instrument_node=""> See </span><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/statutes-international-red-cross-and-red-crescent-movement" title=""><span data-dcnode-id="2956" instrument_node="">Statutes of the International Red Cross and Red Crescent Movement</span></a><span data-dcnode-id="2954" instrument_node=""> (footnote added by the authors)</span></li><li data-dcnode-id="2946"><a data-dcnode-id="2951" href="#_ftnref_004" id="_ftn_004" name="_ftn_004" title=""><span data-dcnode-id="2952" instrument
