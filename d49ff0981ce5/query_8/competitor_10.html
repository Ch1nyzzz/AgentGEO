_node="">[4]</span></a><span data-dcnode-id="2950" instrument_node=""> See infra, </span><a data-dcnode-id="2948" href="#i_1_a"><span data-dcnode-id="2949" instrument_node="">I. Institution, 1. The ICRC within the International Red Cross and Red Crescent Movement, a) National Red Cross and Red Crescent Societies</span></a><span data-dcnode-id="2947" instrument_node=""> (footnote added by the authors)</span></li><li data-dcnode-id="2874"><a data-dcnode-id="2944" href="#_ftnref_005" id="_ftn_005" name="_ftn_005" title=""><span data-dcnode-id="2945" instrument_node="">[5]</span></a><span data-dcnode-id="2943" instrument_node=""> See for instance </span><abbr data-dcnode-id="2940" title="Geneva Convention (I) for the Amelioration of the Condition of the Wounded and Sick in Armed Forces in the Field, of 12 August 1949 "><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D200E2B4090502A4AC12563CD00519EF8"><span data-dcnode-id="2942" instrument_node="">GC I</span></a></abbr><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D200E2B4090502A4AC12563CD00519EF8"><span data-dcnode-id="2939" instrument_node="">-</span></a><abbr data-dcnode-id="2935" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D200E2B4090502A4AC12563CD00519EF8"><span data-dcnode-id="2937" instrument_node="">IV</span></a></abbr><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D200E2B4090502A4AC12563CD00519EF8"><span data-dcnode-id="2934" instrument_node="">, Art. 9</span></a><span data-dcnode-id="2932" instrument_node="">/</span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DCC0363215F494314C12563CD0051A57E"><span data-dcnode-id="2931" instrument_node="">9</span></a><span data-dcnode-id="2929" instrument_node="">/</span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DD999735D6309998BC12563CD0051AB1D"><span data-dcnode-id="2928" instrument_node="">9</span></a><span data-dcnode-id="2926" instrument_node="">/</span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D1855276F9F74E437C12563CD0051BA58"><span data-dcnode-id="2925" instrument_node="">10</span></a><span data-dcnode-id="2923" instrument_node=""> respectively; </span><abbr data-dcnode-id="2920" title="Geneva Convention (I) for the Amelioration of the Condition of the Wounded and Sick in Armed Forces in the Field, of 12 August 1949 "><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D237F1A81D86D8B9AC12563CD0051A07F"><span data-dcnode-id="2922" instrument_node="">GC I</span></a></abbr><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D237F1A81D86D8B9AC12563CD0051A07F"><span data-dcnode-id="2919" instrument_node="">, Art. 23</span></a><span data-dcnode-id="2917" instrument_node="">; </span><abbr data-dcnode-id="2914" title="Geneva Convention (III) Relative to the Treatment of Prisoners of War, of 12 August 1949 "><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DD730F6527BC1C617C12563CD0051B09B"><span data-dcnode-id="2916" instrument_node="">GC III</span></a></abbr><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DD730F6527BC1C617C12563CD0051B09B"><span data-dcnode-id="2913" instrument_node="">, Arts 73</span></a><span data-dcnode-id="2911" instrument_node="">, </span><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D7589788DC88FB8F6C12563CD0051B54B"><span data-dcnode-id="2910" instrument_node="">123</span></a><span data-dcnode-id="2908" instrument_node=""> and </span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D0E9C21211EF9F949C12563CD0051B574"><span data-dcnode-id="2907" instrument_node="">125</span></a><span data-dcnode-id="2905" instrument_node="">-</span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D7906C83A016D8A9EC12563CD0051B596"><span data-dcnode-id="2904" instrument_node="">126</span></a><span data-dcnode-id="2902" instrument_node="">; </span><abbr data-dcnode-id="2899" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf ion, under V. I.3.3. Public condemnation</span></li><li data-dcnode-id="2856"><a data-dcnode-id="2861" href="#_ftnref_008" id="_ftn_008" name="_ftn_008" title=""><span data-dcnode-id="2862" instrument_node="">[8]</span></a><span data-dcnode-id="2860" instrument_node=""> See infra </span><a data-dcnode-id="2858" href="#v_1"><span data-dcnode-id="2859" instrument_node="">V.ICRC’s approach, 1. Confidentiality, not publicity</span></a><span data-dcnode-id="2857" instrument_node=""> (footnote added by the authors)</span></li><li data-dcnode-id="2849"><a data-dcnode-id="2854" href="#_ftnref_009" id="_ftn_009" name="_ftn_009" title=""><span data-dcnode-id="2855" instrument_node="">[9]</span></a><span data-dcnode-id="2853" instrument_node=""> See supra </span><a data-dcnode-id="2851" href="#i_1"><span data-dcnode-id="2852" instrument_node="">I. Institution, 1. The ICRC within the International Red Cross and Red Crescent Movement</span></a><span data-dcnode-id="2850" instrument_node=""> (footnote added by the authors)</span></li></ul></div></div></div><div class="field-item odd" data-dcnode-id="2340"><span data-dcnode-id="2844" id="toc-i-institution"></span><h2 data-dcnode-id="2841"><a class="nohref" data-dcnode-id="2843" id="chapter2"></a><span data-dcnode-id="2842" instrument_node="">I. Institution</span></h2><div class="rxbodyfield" data-dcnode-id="2341"><span data-dcnode-id="2840" id="toc--1-the-icrc-within-the-international-red-cross-and-red-crescent-movement"></span><h3 data-dcnode-id="2834"><a class="nohref" data-dcnode-id="2839" id="i_1" name="i_1"></a><span data-dcnode-id="2838" instrument_node="">&nbsp;1. The </span><abbr data-dcnode-id="2836" title="International Committee of the Red Cross "><span data-dcnode-id="2837" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2835" instrument_node=""> within the International Red Cross and Red Crescent Movement</span></h3><p data-dcnode-id="2829"><span data-dcnode-id="2833" instrument_node="">(See the Red Cross and Red Crescent Movement website: </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.redcross.int/" target="_blank"><span data-dcnode-id="2832" instrument_node="">http://www.redcross.int</span></a><span data-dcnode-id="2830" instrument_node="">)</span></p><h4 class="casesdocheader" data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2819"><ul data-dcnode-id="2820"><li data-dcnode-id="2824"><a data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/statutes-international-red-cross-and-red-crescent-movement" title=""><span data-dcnode-id="2826" instrument_node="">Statutes of the International Red Cross and Red Crescent Movement</span></a></li><li data-dcnode-id="2821"><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/seville-agreement" title=""><span data-dcnode-id="2823" instrument_node="">The Seville Agreement</span></a></li></ul></div><h4 aria-controls="readingsbody1" aria-expanded="false" class="readingsheader" data-dcnode-id="2817" data-toggle="collapse" href="#readingsbody1"><span data-dcnode-id="2818" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2800" id="readingsbody1"><p data-dcnode-id="2814"><strong data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="2811"><li data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">HAUG Hans, Humanity for all: The International Red Cross and Red Crescent Movement, Geneva/Bern/Stuttgart/Vienna, Henry-Dunant Institute/Paul Haupt Publishers, 1993, 682 pp.</span></li></ul><p data-dcnode-id="2808"><strong data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="2801"><li data-dcnode-id="2802"><span data-dcnode-id="2807" instrument_node="">PERRUCHOUD Richard, “Resolutions of International Red Cross Conferences and their Implementation by the National Societies”, in </span><abbr data-dcnode-id="2804" title="International Review of the Red Cross "><em data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="2803" instrument_node="">, No. 227, 1982, pp. 88-96.</span></li></ul></div><ol data-dcnode-id="2790" type="a"><li data-dcnode-id="2791"><strong data-dcnode-id="2797"><a class="nohref" data-dcnode-id="2799" id="i_1_a"></a><span data-dcnode-id="2798" instrument_node="">National Red Cross and Red Crescent Societies</span></strong><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node=""> (The list of the National Societies’ websites is available on </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ifrc.org/"><span data-dcnode-id="2794" instrument_node="">http://www.ifrc.org</span></a><span data-dcnode-id="2792" instrument_node="">)</span></li></ol><div data-dcnode-id="2765"><h4 data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Introductory text</span></h4><p data-dcnode-id="2783"><span data-dcnode-id="2787" instrument_node="">Originally created for service in time of armed conflicts, as auxiliaries to the military medical services, National Red Cross and Red Crescent Societies today carry out a wide range of activities in situations of both war and peace.[</span><a data-dcnode-id="2785" href="#_ftn_010" id="_ftnref_010" name="_ftnref_010" title=""><span data-dcnode-id="2786" instrument_node="">10</span></a><span data-dcnode-id="2784" instrument_node="">]</span></p><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">The activities carried out by the 186 National Societies are as diverse as the countries they serve. Their wartime role to support armed forces medical units remains essential but now represents just one of many aspects of their work.</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Other National Society activities include: setting up and managing hospitals; training medical personnel; organizing blood donor clinics; assisting the handicapped, the elderly and the needy; providing ambulance services and road, sea and mountain rescue services. In addition, many National Societies are also responsible for emergency relief in the event of man-made or natural disasters (technological catastrophes, floods, earthquakes, tidal waves, etc.).</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2778" instrument_node="">More recently, many National Societies have also considerably increased their involvement in new areas: relief to refugees and displaced persons; assistance to victims of epidemics (HIV/AIDS); and dissemination and implementation of International Humanitarian Law (</span><abbr data-dcnode-id="2776" title="International Humanitarian Law "><span data-dcnode-id="2777" instrument_node="">IHL</span></abbr><span data-dcnode-id="2775" instrument_node="">).</span></p><p data-dcnode-id="2766"><span data-dcnode-id="2773" instrument_node="">Each National Society must fulfil strict conditions in order to achieve recognition by the </span><abbr data-dcnode-id="2771" title="International Committee of the Red Cross "><span data-dcnode-id="2772" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2770" instrument_node=""> and thus become a member of the International Red Cross and Red Crescent Movement.[</span><a data-dcnode-id="2768" href="#_ftn_011" id="_ftnref_011" name="_ftnref_011" title=""><span data-dcnode-id="2769" instrument_node="">11</span></a><span data-dcnode-id="2767" instrument_node="">] In particular, it must be recognized by its own government as a voluntary aid society, be constituted on the territory of a State party to the Geneva Conventions, use one of the recognized emblems and respect the Fundamental Principles of the Red Cross and Red Crescent Movement.</span></p></div><h4 class="casesdocheader" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2758"><ul data-dcnode-id="2759"><li data-dcnode-id="2760"><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/statutes-international-red-cross-and-red-crescent-movement%23art_4"><span data-dcnode-id="2762" instrument_node="">Statutes of the International Red Cross and Red Crescent Movement [Art. 4]</span></a></li></ul></div><h4 aria-controls="readingsbody2" aria-expanded="false" class="readingsheader" data-dcnode-id="2756" data-toggle="collapse" href="#readingsbody2"><span data-dcnode-id="2757" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2743" id="readingsbody2"><p data-dcnode-id="2753"><strong data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="2744"><li data-dcnode-id="2747"><span data-dcnode-id="2752" instrument_node="">LANORD Christophe, “The Legal Status of National Red Cross and Red Crescent Societies”, in </span><abbr data-dcnode-id="2749" title="International Review of the Red Cross "><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="2748" instrument_node="">, No. 840, December 2000, pp. 1053-1077.</span></li><li data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">LANORD Christophe, Le statut juridique des sociétés nationales de la Croix-Rouge et du Croissant-Rouge, Geneva, Thoiras, Éditions de la Chapelle, 1999, 545 pp.</span></li></ul></div><ol data-dcnode-id="2731" type="a"><li data-dcnode-id="2732" value="2"><strong data-dcnode-id="2738"><span data-dcnode-id="2740" id="i_1_b"><a class="nohref" data-dcnode-id="2742" id="i_1_b" name="i_1_b"></a><span data-dcnode-id="2741" instrument_node="">&nbsp; the</span></span><span data-dcnode-id="2739" instrument_node=""> International Federation of Red Cross and Red Crescent Societies</span></strong><br data-dcnode-id="2737"><span data-dcnode-id="2736" instrument_node=""> (See the International Federation of the Red Cross and Red Crescent Societies website: </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ifrc.org/"><span data-dcnode-id="2735" instrument_node="">http://www.ifrc.org</span></a><span data-dcnode-id="2733" instrument_node="">)</span></li></ol><h4 class="casesdocheader" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2724"><ul data-dcnode-id="2725"><li data-dcnode-id="2726"><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/statutes-international-red-cross-and-red-crescent-movement%23art_6"><span data-dcnode-id="2728" instrument_node="">Statutes of the International Red Cross and Red Crescent Movement [Art. 6]</span></a></li></ul></div><h4 aria-controls="readingsbody3" aria-expanded="false" class="readingsheader" data-dcnode-id="2722" data-toggle="collapse" href="#readingsbody3"><span data-dcnode-id="2723" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2711" id="readingsbody3"><p data-dcnode-id="2719"><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="2712"><li data-dcnode-id="2713"><span data-dcnode-id="2718" instrument_node="">GAUTIER Philippe, “ONG et personnalité internationale : à propos de l’accord conclu le 29 novembre 1996 entre la Suisse et la Fédération internationale des Sociétés de la Croix-Rouge et du Croissant-Rouge”, in </span><abbr data-dcnode-id="2715" title="Revue Belge de Droit International"><em data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">RBDI</span></em></abbr><span data-dcnode-id="2714" instrument_node="">, 1997, pp. 172-189.</span></li></ul></div><ol data-dcnode-id="2705" type="a"><li data-dcnode-id="2706" value="3"><strong data-dcnode-id="2707"><span data-dcnode-id="2709" id="i_1_c"><span data-dcnode-id="2710" instrument_node="">the</span></span><span data-dcnode-id="2708" instrument_node=""> International Red Cross and Red Crescent Conference</span></strong></li></ol><h4 class="casesdocheader" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2693"><ul data-dcnode-id="2694"><li data-dcnode-id="2700"><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/statutes-international-red-cross-and-red-crescent-movement%23art_8"><span data-dcnode-id="2702" instrument_node="">Statutes of the International Red Cross and Red Crescent Movement [Arts 8-11]</span></a></li><li data-dcnode-id="2695"><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-question-emblem" title=""><abbr data-dcnode-id="2698" title="International Committee of the Red Cross "><span data-dcnode-id="2699" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2697" instrument_node="">, The Question of the Emblem</span></a></li></ul></div><h4 aria-controls="readingsbody4" aria-expanded="false" class="readingsheader" data-dcnode-id="2691" data-toggle="collapse" href="#readingsbody4"><span data-dcnode-id="2692" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2672" id="readingsbody4"><p data-dcnode-id="2688"><strong data-dcnode-id="2689"><span data-dcnode-id="2690" instrume 0.</span></li><li data-dcnode-id="2586"><span data-dcnode-id="2591" instrument_node="">DOMINICÉ Christian, “L’accord de siège conclu par le Comité international de la Croix-Rouge avec la Suisse”, in </span><abbr data-dcnode-id="2588" title="Revue Générale de Droit International Public"><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">RGDIP</span></em></abbr><span data-dcnode-id="2587" instrument_node="">, Vol. 99/1, January-April 1995, pp. 5-36.</span></li></ul></div><span data-dcnode-id="2583" id="toc--3-independence"></span><h3 data-dcnode-id="2580"><a class="nohref" data-dcnode-id="2582" id="i_3" name="i_3"></a><span data-dcnode-id="2581" instrument_node="">&nbsp;3. &nbsp; Independence</span></h3><h4 class="casesdocheader" data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2565"><ul data-dcnode-id="2566"><li data-dcnode-id="2572"><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/agreement-between-icrc-and-switzerland" title=""><span data-dcnode-id="2577" instrument_node="">Agreement Between the </span><abbr data-dcnode-id="2575" title="International Committee of the Red Cross "><span data-dcnode-id="2576" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2574" instrument_node=""> and Switzerland</span></a></li><li data-dcnode-id="2567"><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrcs-approach-contemporary-security-challenges" title=""><abbr data-dcnode-id="2570" title="International Committee of the Red Cross "><span data-dcnode-id="2571" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2569" instrument_node="">’s Approach to Contemporary Security Challenges</span></a></li></ul></div><h4 aria-controls="readingsbody6" aria-expanded="false" class="readingsheader" data-dcnode-id="2563" data-toggle="collapse" href="#readingsbody6"><span data-dcnode-id="2564" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="2549" id="readingsbody6"><p data-dcnode-id="2560"><strong data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="2550"><li data-dcnode-id="2551"><span data-dcnode-id="2559" instrument_node="">SOMMARUGA Cornelio, “Swiss Neutrality, </span><abbr data-dcnode-id="2557" title="International Committee of the Red Cross "><span data-dcnode-id="2558" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2556" instrument_node=""> Neutrality: Are They Indissociable? An Independence Worth Protecting”, in </span><abbr data-dcnode-id="2553" title="International Review of the Red Cross "><em data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="2552" instrument_node="">, No. 288, May-June 1992, pp. 264-273.</span></li></ul></div><span data-dcnode-id="2548" id="toc--4-traditionally-mono-national-governing-body-and-international-action"></span><h3 data-dcnode-id="2545"><a class="nohref" data-dcnode-id="2547" id="i_4" name="i_4"></a><span data-dcnode-id="2546" instrument_node="">&nbsp;4. Traditionally mono-national governing body and international action</span></h3><span data-dcnode-id="2544" id="toc--5-humanity"></span><h3 data-dcnode-id="2541"><a class="nohref" data-dcnode-id="2543" id="i_5" name="i_5"></a><span data-dcnode-id="2542" instrument_node="">&nbsp;5. Humanity</span></h3><h4 class="casesdocheader" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2532"><ul data-dcnode-id="2533"><li data-dcnode-id="2534"><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states%23para_242"><abbr data-dcnode-id="2537" title="International Court of Justice "><span data-dcnode-id="2538" instrument_node="">ICJ</span></abbr><span data-dcnode-id="2536" instrument_node="">, Nicaragua v. United States [Para. 242]</span></a></li></ul></div><span data-dcnode-id="2531" id="toc--6-neutrality-and-impartiality"></span><h3 data-dcnode-id="2528"><a class="nohref" data-dcnode-id="2530" id="i_6" name="i_6"></a><span data-dcnode-id="2529" instrument_node="">&nbsp;6. Neutrality and impartiality</span></h3><blockquote data-dcnode-id="2511"><p data-dcnode-id="2525"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Quotation</span></strong></p><span data-dcnode-id="2524" instrument_node="">&nbsp;</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">On the general level, the idea of neutrality pre-supposes two elements: an attitude of abstention and the existence of persons or groups who oppose one another. Although neutrality defines the attitude of the Red Cross towards belligerents and ideologies, it never determines its behaviour towards the human beings who suffer because, in the first place, the wounded do not fight one another. And, above all, the essential characteristic of the Red Cross is to act and not to remain passive.</span></p><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Neutrality and impartiality have often been confused with one another because both imply the existence of groups or theories in opposition and because both call for a certain degree of reserve. The two ideas are nevertheless very different, for the neutral man refuses to make a judgement whereas the one who is impartial judges a situation in accordance with pre-established rules.</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Neutrality demands real self-control; it is indeed a form of discipline we impose upon ourselves, a brake applied to the impulsive urges of our feelings. A man who follows this arduous path will discover that it is rare in a controversy to find that one party is completely right and the other completely wrong. He will sense the futility of the reasons commonly invokes to launch one nation into war against another. In this respect, it is reasonable to say that neutrality constitutes a first step towards peace.</span></p><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">While neutrality, like impartiality, is often misunderstood and rejected, this happens because there are so many who want to be both judge and party, without recourse to any universally valid criterion. Each side believes, rather naively, that his cause is the only just one; that refusal to join it is an offence against truth and justice.</span></p><span data-dcnode-id="2515" instrument_node="">[</span><strong data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Source</span></strong><span data-dcnode-id="2512" instrument_node="">: Pictet, J.S., Red Cross Principles, Geneva, International Committee of the Red Cross, 1979, pp. 52-53]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="2449"><ul data-dcnode-id="2450"><li data-dcnode-id="2504"><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-protection-war-victims%23para_3_3"><abbr data-dcnode-id="2507" title="International Committee of the Red Cross "><span data-dcnode-id="2508" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2506" instrument_node="">, Protection of War Victims [Para. 3. 3]</span></a></li><li data-dcnode-id="2499"><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrcs-approach-contemporary-security-challenges" title=""><abbr data-dcnode-id="2502" tit _node="">&nbsp;4. &nbsp; Importance of </span><abbr data-dcnode-id="848" title="International Humanitarian Law "><span data-dcnode-id="849" instrument_node="">IHL</span></abbr><span data-dcnode-id="847" instrument_node=""> in the absence of an explicit reference</span></h3><ol data-dcnode-id="842" type="a"><li data-dcnode-id="843"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">reference to the contents of a rule without reference to its source</span></strong></li></ol><h4 class="casesdocheader" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="835"><ul data-dcnode-id="836"><li data-dcnode-id="837"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sri-lanka-jaffna-hospital-zone" title=""><span data-dcnode-id="839" instrument_node="">Sri Lanka, Jaffna Hospital Zone</span></a></li></ul></div><ol data-dcnode-id="826" type="a"><li data-dcnode-id="832" value="2"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">presentation of facts and questions</span></strong></li><li data-dcnode-id="827"><strong data-dcnode-id="828"><abbr data-dcnode-id="830" title="International Humanitarian Law "><span data-dcnode-id="831" instrument_node="">IHL</span></abbr><span data-dcnode-id="829" instrument_node=""> as political pressure in the background</span></strong></li></ol></div></div><div class="field-item odd" data-dcnode-id="446"><span data-dcnode-id="823" id="toc-v-icrc-s-approach"></span><h2 data-dcnode-id="820"><a class="nohref" data-dcnode-id="822" id="chapter6"></a><span data-dcnode-id="821" instrument_node="">V. ICRC’s approach</span></h2><div class="rxbodyfield" data-dcnode-id="447"><h4 aria-controls="readingsbody26" aria-expanded="false" class="readingsheader" data-dcnode-id="818" data-toggle="collapse" href="#readingsbody26"><span data-dcnode-id="819" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="793" id="readingsbody26"><p data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="794"><li data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">BONARD Paul, Modes of Action Used by Humanitarian Players: Criteria for Operational Complementarity, Geneva, </span><abbr data-dcnode-id="812" title="International Committee of the Red Cross "><span data-dcnode-id="813" instrument_node="">ICRC</span></abbr><span data-dcnode-id="811" instrument_node="">, September 1998, 65 pp.</span></li><li data-dcnode-id="801"><span data-dcnode-id="809" instrument_node="">HUBER Max, La pensée et l’action de la Croix-Rouge, Geneva, </span><abbr data-dcnode-id="807" title="International Committee of the Red Cross "><span data-dcnode-id="808" instrument_node="">ICRC</span></abbr><span data-dcnode-id="806" instrument_node="">, 1954, 376 pp. MAURICE Frédéric, “Humanitarian Ambition”, in </span><abbr data-dcnode-id="803" title="International Review of the Red Cross "><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="802" instrument_node="">, No. 289, July-August 1992, pp. 363-372.</span></li><li data-dcnode-id="795"><span data-dcnode-id="800" instrument_node="">TAUXE Jean-Daniel, “Faire mieux accepter le Comité international de la Croix-Rouge sur le terrain”, in </span><abbr data-dcnode-id="797" title="International Review of the Red Cross "><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="796" instrument_node="">, No. 833, March 1999, pp. 55-61.</span></li></ul></div><span data-dcnode-id="792" id="toc--1-confidentiality-not-publicity"></span><h3 data-dcnode-id="789"><a class="nohref" data-dcnode-id="791" id="v_1" name="v_1"></a><span data-dcnode-id="790" instrument_node="">&nbsp;1. Confidentiality, not publicity</span></h3><p data-dcnode-id="780"><span data-dcnode-id="788" instrument_node="">(</span><strong data-dcnode-id="785"><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">See also infra</span></em></strong><span data-dcnode-id="784" instrument_node=""> </span><a data-dcnode-id="782" href="#v_3_quote"><span data-dcnode-id="783" instrument_node="">Quotation 3, under V. 3. Access to victims, not investigation of violations</span></a><span data-dcnode-id="781" instrument_node="">)</span></p><blockquote data-dcnode-id="707"><p data-dcnode-id="777"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Quotation</span></strong></p><span data-dcnode-id="776" instrument_node="">&nbsp;</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">Action taken by the </span><abbr data-dcnode-id="773" title="International Committee of the Red Cross "><span data-dcnode-id="774" instrument_node="">ICRC</span></abbr><span data-dcnode-id="772" instrument_node=""> in the event of violations of International Humanitarian Law or of other fundamental rules protecting persons in situations of violence</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">[...]</span></p><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">Action taken by the </span><abbr data-dcnode-id="766" title="International Committee of the Red Cross "><span data-dcnode-id="767" instrument_node="">ICRC</span></abbr><span data-dcnode-id="765" instrument_node=""> on its own initiative</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">1 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; General rule</span></p><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">The </span><abbr data-dcnode-id="759" title="International Committee of the Red Cross "><span data-dcnode-id="760" instrument_node="">ICRC</span></abbr><span data-dcnode-id="758" instrument_node=""> takes all appropriate steps to put an end to violations of international humanitarian law or of other fundamental rules protecting the persons in situations of violence, or to prevent the occurrence of such violations. These steps are taken at various levels and through various modes of action, according to the nature and the extent of the violations.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">[...]</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">3.3 &nbsp;&nbsp; Public condemnation</span></p><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">The </span><abbr data-dcnode-id="750" title="International Committee of the Red Cross "><span data-dcnode-id="751" instrument_node="">ICRC</span></abbr><span data-dcnode-id="749" instrument_node=""> reserves the right to issue a public condemnation of specific violations of international humanitarian law providing the following conditions are met:</span></p><ol data-dcnode-id="739"><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">the violations are major and repeated or likely to be repeated;</span></li><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">delegates have witnessed the violations with their own eyes, or the existence and extent of those violations have been established on the basis of reliable and verifiable sources;</span></li><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">bilateral confidential representations and, when attempted, humanitarian mobilization efforts have failed to put an end to the violations;</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">such publicity is in the interest of the persons or populations affected or threatened.</span></li></ol><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Public condemnation means a public statement by the </span><abbr data-dcnode-id="736" title="International Committee of the Red Cross "><span data-dcnode-id="737" instrument_node="">ICRC</span></abbr><span data-dcnode-id="735" instrument_node=""> to the effect that acts which can be attributed to a party to a conflict – whether or not they are known to the public – constitute a violation of international humanitarian law.</span></p><p data-dcnode-id="726"><span data-dcnode-id="733" instrument_node="">The </span><abbr data-dcnode-id="731" title="International Committee of the Red Cross "><span data-dcnode-id="732" instrument_node="">ICRC</span></abbr><span data-dcnode-id="730" instrument_node=""> only takes recourse to this measure when it has exhausted every other reasonable means, including, where appropriate, through third parties, of influencing the party responsible for a violation, at the most relevant levels, and where these means have not produced the desired result or where it is clear that the violation is part of a deliberate policy adopted by the party concerned. It is also the case when the authorities concerned are inaccessible and when the </span><abbr data-dcnode-id="728" title="International Committee of the Red Cross "><span data-dcnode-id="729" instrument_node="">ICRC</span></abbr><span data-dcnode-id="727" instrument_node=""> is convinced that public pressure is the only means of improving the situation in humanitarian terms.</span></p><p data-dcnode-id="719"><span data-dcnode-id="725" instrument_node="">Such a measure is nevertheless exceptional and may be issued only if all of the four above-mentioned conditions have been met.</span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node=""> In considering “the interest of the persons or populations affected or threatened,” the </span><abbr data-dcnode-id="721" title="International Committee of the Red Cross "><span data-dcnode-id="722" instrument_node="">ICRC</span></abbr><span data-dcnode-id="720" instrument_node=""> must take account not only of their short-term interests but also of their long-term interests and of the fact that its responsibility is greater when it witnesses particularly serious events of which the public is unaware.</span></p><span data-dcnode-id="718" instrument_node="">[</span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Source</span></strong><span data-dcnode-id="715" instrument_node="">: “Action by the International Committee of the Red Cross in the Event of Violations of International Humanitarian Law or of other Fundamental Rules Protecting Persons in Situations of Violence”, in </span><abbr data-dcnode-id="712" title="International Review of the Red Cross "><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="711" instrument_node="">, No. 858, June 2005, pp. 393-400, footnotes omitted; online: </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/eng/resources/international-review/" target="_blank"><span data-dcnode-id="710" instrument_node="">http://www.icrc.org/eng/resources/international-review/</span></a><span data-dcnode-id="708" instrument_node="">]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="660"><ul data-dcnode-id="661"><li data-dcnode-id="693"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-assistance-policy" title=""><abbr data-dcnode-id="703" title="International Committee of the Red Cross "><span data-dcnode-id="704" instrument_node="">ICRC</span></abbr><span data-dcnode-id="702" instrument_node="">, Assistance Policy</span></a><span data-dcnode-id="700" instrument_node=""> [Paras </span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-assistance-policy%23para_2"><span data-dcnode-id="699" instrument_node="">2</span></a><span data-dcnode-id="697" instrument_node=""> and </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-assistance-policy%23para_4_3"><span data-dcnode-id="696" instrument_node="">4.3</span></a><span data-dcnode-id="694" instrument_node="">]</span></li><li data-dcnode-id="688"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-report-yemen-1967" title=""><abbr data-dcnode-id="691" title="International Committee of the Red Cross "><span data-dcnode-id="692" instrument_node="">ICRC</span></abbr><span data-dcnode-id="690" instrument_node=""> Report on Yemen, 1967</span></a></li><li data-dcnode-id="682"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/eritreaethiopia-partial-award-pows%23part_a_para_45"><span data-dcnode-id="687" instrument_node="">Eritrea/Ethiopia, Partial Award on </span><abbr data-dcnode-id="685" title="Prisoners of War"><span data-dcnode-id="686" instrument_node="">POWs</span></abbr><span data-dcnode-id="684" instrument_node=""> [Part A., paras 45-48]</span></a></li><li data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/ictyicc-confidentiality-and-testimony-icrc-personnel" title=""><abbr data-dcnode-id="680" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="681" instrument_node="">ICTY</span></abbr><span data-dcnode-id="679" instrument_node="">/</span><abbr data-dcnode-id="677" title="International Criminal Court "><span data-dcnode-id="678" instrument_node="">ICC</span></abbr><span data-dcnode-id="676" instrument_node="">, Confidentiality and Testimony of </span><abbr data-dcnode-id="674" title="International Committee of the Red Cross "><span data-dcnode-id="675" instrument_node="">ICRC</span></abbr><span data-dcnode-id="673" instrument_node=""> Personnel</span></a></li><li data-dcnode-id="665"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/afghanistan-icrc-position-alleged-ill-treatment-prisoners" title=""><span data-dcnode-id="670" instrument_node="">Afghanistan, </span><abbr data-dcnode-id="668" title="International Committee of the Red Cross "><span data-dcnode-id="669" instrument_node="">ICRC</span></abbr><span data-dcnode-id="667" instrument_node=""> Position on Alleged Ill-Treatment of Prisoners</span></a></li><li data-dcnode-id="662"><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-status-and-treatment-detainees-held-guantanamo-naval-base%23chapter2"><span data-dcnode-id="664" instrument_node="">United States, Status and Treatment of Detainees Held in Guantanamo Naval Base [Part II.]</span></a></li></ul></div><h4 aria-controls="readingsbody27" aria-expanded="false" class="readingsheader" data-dcnode-id="658" data-toggle="collapse" href="#readingsbody27"><span data-dcnode-id="659" instrument_node="">sPECIFIC BIBLIOGRAPHY</span></h4><div class="bluebox collapse" data-dcnode-id="616" id="readingsbody27"><p data-dcnode-id="655"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="617"><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">COSTAS TRASCASAS Milena, “El Comité internacional de la Cruz Roja y la regla de la confidencialidad como garantía funcional de su actuación: reflexiones al hilo de la decisión del Tribunal internacional para la antigua Yugoslavia de 27 julio de 1999”, in Revista Española de Derecho Militar, Vol. 76, July-December 2000, pp. 31-68.</span></li><li data-dcnode-id="644"><span data-dcnode-id="652" instrument_node="">JEANNET Stéphane, “Testimony of </span><abbr data-dcnode-id="650" title="International Committee of the Red Cross "><span data-dcnode-id="651" instrument_node="">ICRC</span></abbr><span data-dcnode-id="649" instrument_node=""> Delegates before the International Criminal Court”, in </span><abbr data-dcnode-id="646" title="International Review of the Red Cross "><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="645" instrument_node="">, No. 840, December 2000, pp. 993-1000.</span></li><li data-dcnode-id="635"><span data-dcnode-id="643" instrument_node="">JEANNET Stéphane, “Recognition of the </span><abbr data-dcnode-id="641" title="International Committee of the Red Cross "><span data-dcnode-id="642" instrument_node="">ICRC</span></abbr><span data-dcnode-id="640" instrument_node="">’s Long-Standing Rule of Confidentiality: An Important Decision by the International Criminal Tribunal for the former Yugoslavia”, in </span><abbr data-dcnode-id="637" title="International Review of the Red Cross "><em data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="636" instrument_node="">, No. 838, June 2000, pp. 403-425.</span></li><li data-dcnode-id="626"><span data-dcnode-id="634" instrument_node="">RONA Gabor, “The </span><abbr data-dcnode-id="632" title="International Committee of the Red Cross "><span data-dcnode-id="633" instrument_node="">ICRC</span></abbr><span data-dcnode-id="631" instrument_node=""> Privilege not to Testify: Confidentiality in Action”, in </span><abbr data-dcnode-id="628" title="International Review of the Red Cross "><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="627" instrument_node="">, No. 845, March 2002, pp. 207-219.</span></li><li data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">SANNA Silvia, “La testimonianza dei delegati del Comitato internazionale della Croce Rossa davanti ai tribunali penali internazionali”, in Rivista di diritto internazionale, Vol. 84/2, 2001, pp. 394-419.</span></li><li data-dcnode-id="618"><span data-dcnode-id="623" instrument_node="">“Action by the International Committee of the Red Cross in the Event of Breaches of International Humanitarian Law”, in </span><abbr data-dcnode-id="620" title="International Review of the Red Cross "><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">IRRC</span></em></abbr><span data-dcnode-id="619" instrument_node="">, No. 222, March 1981, 8 pp.</span></li></ul></div><ol data-dcnode-id="606" type="a"><li data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">reports on visits to the authorities</span></strong></li><li data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">cases in which the </span><abbr data-dcnode-id="610" title="International Committee of the Red Cross "><span data-dcnode-id="611" instrument_node="">ICRC</span></abbr><span data-dcnode-id="609" instrument_node=""> goes public</span></strong></li></ol><h4 class="casesdocheader" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="568"><ul data-dcnode-id="569"><li data-dcnode-id="599"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrclebanon-sabra-and-chatila" title=""><abbr data-dcnode-id="602" title="International Committee of the Red Cross "><span data-dcnode-id="603" instrument_node="">ICRC</span></abbr><span data-dcnode-id="601" instrument_node="">/Lebanon, Sabra and Chatila</span></a></li><li data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrcsouth-lebanon-closure-insar-camp" title=""><abbr data-dcnode-id="597" title="International Committee of the Red Cross "><span data-dcnode-id="598" instrument_node="">ICRC</span></abbr><span data-dcnode-id="596" instrument_node="">/South Lebanon, Closure of Insar Camp</span></a></li><li data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/lebanon-helicopter-attack-ambulances" title=""><span data-dcnode-id="593" instrument_node="">Lebanon, Helicopters Attack on Ambulances</span></a></li><li data-dcnode-id="586"><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-iraniraq-memoranda%23part_a_appeal"><abbr data-dcnode-id="589" title="International Committee of the Red Cross "><span data-dcnode-id="590" instrument_node="">ICRC</span></abbr><span data-dcnode-id="588" instrument_node="">, Iran/Iraq, Memoranda [Part A., Appeal]</span></a></li><li data-dcnode-id="578"><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/unicrc-use-chemical-weapons%23part_b"><abbr data-dcnode-id="584" title="United Nations"><span data-dcnode-id="585" instrument_node="">UN</span></abbr><span data-dcnode-id="583" instrument_node="">/</span><abbr data-dcnode-id="581" title="International Committee of the Red Cross "><span data-dcnode-id="582" instrument_node="">ICRC</span></abbr><span data-dcnode-id="580" instrument_node="">, The Use of Chemical Weapons [Part B.]</span></a></li><li data-dcnode-id="575"><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/case-study-armed-conflicts-former-yugoslavia%23para_21"><span data-dcnode-id="577" instrument_node="">Case Study, Armed Conflicts in the former Yugoslavia [Para. 21]</span></a></li><li data-dcnode-id="570"><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-visits-detainees-interviews-without-witnesses%23part_a"><abbr data-dcnode-id="573" title="International Committee of the Red Cross "><span data-dcnode-id="574" instrument_node="">ICRC</span></abbr><span data-dcnode-id="572" instrument_node="">, Visits to Detainees: Interviews without Witnesses [Part A.]</span></a></li></ul></div><span data-dcnode-id="567" id="toc--2-cooperation-not-confrontation"></span><h3 data-dcnode-id="564"><a class="nohref" data-dcnode-id="566" id="v_2" name="v_2"></a><span data-dcnode-id="565" instrument_node="">&nbsp;2. &nbsp; Cooperation, not confrontation</span></h3><h4 class="casesdocheader" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="551"><ul data-dcnode-id="552"><li data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sri-lanka-jaffna-hospital-zone" title=""><span data-dcnode-id="561" instrument_node="">Sri Lanka, Jaffna Hospital Zone</span></a></li><li data-dcnode-id="556"><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/case-study-armed-conflicts-former-yugoslavia%23para_21"><span data-dcnode-id="558" instrument_node="">Case Study, Armed Conflicts in the former Yugoslavia [Para. 21]</span></a></li><li data-dcnode-id="553"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/former-yugoslavia-special-agreements-between-parties-conflicts%23part_b_art_5"><span data-dcnode-id="555" instrument_node="">Former Yugoslavia, Special Agreements Between the Parties to the Conflicts [Part B., Art. 5]</span></a></li></ul></div><span data-dcnode-id="550" id="toc--3-access-to-victims-not-investigation-of-violations"></span><h3 data-dcnode-id="547"><a class="nohref" data-dcnode-id="549" id="v_3" name="v_3"></a><span data-dcnode-id="548" instrument_node="">&nbsp;3. &nbsp; Access to victims, not investigation of violations</span></h3><blockquote data-dcnode-id="536"><p data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Quotation 1</span></strong></p><span data-dcnode-id="543" instrument_node="">&nbsp;</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Here again, measures contrary to the laws of warfare must, like war itself, be considered by the International Committee primarily in the sense of existing facts, just as the doctor to whom the sick and wounded are brought turns his attention first to the injury or disease, without going into the human guilt which may be its cause. The Red Cross, above all a work of aid, must first strive to bring relief to these victims of war, as to all others.</span></p><span data-dcnode-id="540" instrument_node="">[</span><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Source</span></strong><span data-dcnode-id="537" instrument_node="">: Report of the International Committee of the Red Cross on its Activities During the Second World War (September 1, 1939 – June 30, 1947), Geneva, vol. 1, 1948, pp. 22-23]</span></blockquote><blockquote data-dcnode-id="522"><p data-dcnode-id="533"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Quotation 2</span></strong></p><span data-dcnode-id="532" instrument_node="">&nbsp;</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">[...] [T]he International Red Cross Committee has no intention whatsoever of sitting in judgment. It is not a court of justice and, besides, it has not itself the means of ascertaining the facts, which alone would enable it to give a verdict. [...] It has a different part to play: it is a humanitarian institution.</span></p><span data-dcnode-id="529" instrument_node="">[</span><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Source</span></strong><span data-dcnode-id="526" instrument_node="">: HUBER Max, The Red Cross: Principles and Problems, Geneva, </span><abbr data-dcnode-id="524" title="International Committee of the Red Cross "><span data-dcnode-id="525" instrument_node="">ICRC</span></abbr><span data-dcnode-id="523" instrument_node="">, Sine Data, pp. 73 and 74]</span></blockquote><blockquote data-dcnode-id="499"><p data-dcnode-id="516"><a class="nohref" data-dcnode-id="521" id="v_3_quote" name="v_3_quote"></a><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Quotation 3</span></strong></p><span data-dcnode-id="515" instrument_node="">&nbsp;</span><p data-dcnode-id="504"><span data-dcnode-id="514" instrument_node="">[A]s a general rule, the </span><abbr data-dcnode-id="512" title="International Committee of the Red Cross "><span data-dcnode-id="513" instrument_node="">ICRC</span></abbr><span data-dcnode-id="511" instrument_node=""> abstains from making public pronouncements about specific acts committed in violation of law and humanity and attributed to belligerents. [...] [I]n the quest for a result which would most of the time be illusory, demonstrations of this sort would compromise the charitable activity which the </span><abbr data-dcnode-id="509" title="International Committee of the Red Cross "><span data-dcnode-id="510" instrument_node="">ICRC</span></abbr><span data-dcnode-id="508" instrument_node=""> is in a position to carry out. One cannot be at one and the same time the champion of justice and of charity. One must choose, and the </span><abbr data-dcnode-id="506" title="International Committee of the Red Cross "><span data-dcnode-id="507" instrument_node="">ICRC</span></abbr><span data-dcnode-id="505" instrument_node=""> has long since chosen to be a defender of charity.</span></p><span data-dcnode-id="503" instrument_node="">[</span><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Source</span></strong><span data-dcnode-id="500" instrument_node="">: Pictet Jean S., Red Cross Principles, Geneva, International Committee of the Red Cross, 1979, pp. 59 and 60]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Cases and Documents</span></h4><div class="beigebox" data-dcnode-id="460"><ul data-dcnode-id="461"><li data-dcnode-id="487"><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/case-study-armed-conflicts-former-yugoslavia" title=""><span data-dcnode-id="496" instrument_node="">Case Study, Armed Conflicts in the former Yugoslavia</span></a><span data-dcnode-id="494" instrument_node=""> [Paras </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/case-study-armed-conflicts-former-yugoslavia%23para_5" title=""><span data-dcnode-id="493" instrument_node="">5</span></a><span data-dcnode-id="491" instrument_node=""> and </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/case-study-armed-conflicts-former-yugoslavia%23para_7" title=""><span data-dcnode-id="490" instrument_node="">7</span></a><span data-dcnode-id="488" instrument_node="">]</span></li><li data-dcnode-id="471"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/former-yugoslavia-special-agreements-between-parties-conflicts" title=""><span data-dcnode-id="486" instrument_node="">Former Yugoslavia, Special Agreements Between the Parties to the Conflicts</span></a><span data-dcnode-id="484" instrument_node=""> [P
