ass="label fn-label" data-dcnode-id="1249"><span class="end-note-link" data-dcnode-id="1250" data-fn-id="fn0145" rel="nofollow"><span data-dcnode-id="1251" instrument_node="">145</span></span></span><div class="footnote-content" data-dcnode-id="1246"><p class="footnote-compatibility" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Government Official, Beirut, 18 April 2016. This same argument was also made to UN Secretary-General, Kofi Annan. See Permanent Mission of Lebanon to the UN (n 133).</span></p></div></span></div><div class="footnote" content-id="fn0146" data-dcnode-id="1236"><span class="fn" data-dcnode-id="1237"><span class="label fn-label" data-dcnode-id="1241"><span class="end-note-link" data-dcnode-id="1242" data-fn-id="fn0146" rel="nofollow"><span data-dcnode-id="1243" instrument_node="">146</span></span></span><div class="footnote-content" data-dcnode-id="1238"><p class="footnote-compatibility" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">UNHCR official, Beirut, 17 May 2016.</span></p></div></span></div><div class="footnote" content-id="fn0147" data-dcnode-id="1228"><span class="fn" data-dcnode-id="1229"><span class="label fn-label" data-dcnode-id="1233"><span class="end-note-link" data-dcnode-id="1234" data-fn-id="fn0147" rel="nofollow"><span data-dcnode-id="1235" instrument_node="">147</span></span></span><div class="footnote-content" data-dcnode-id="1230"><p class="footnote-compatibility" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Permanent Mission of Lebanon to the UN (n 133).</span></p></div></span></div><div class="footnote" content-id="fn0148" data-dcnode-id="1220"><span class="fn" data-dcnode-id="1221"><span class="label fn-label" data-dcnode-id="1225"><span class="end-note-link" data-dcnode-id="1226" data-fn-id="fn0148" rel="nofollow"><span data-dcnode-id="1227" instrument_node="">148</span></span></span><div class="footnote-content" data-dcnode-id="1222"><p class="footnote-compatibility" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Preamble, para (B).</span></p></div></span></div><div class="footnote" content-id="fn0149" data-dcnode-id="1212"><span class="fn" data-dcnode-id="1213"><span class="label fn-label" data-dcnode-id="1217"><span class="end-note-link" data-dcnode-id="1218" data-fn-id="fn0149" rel="nofollow"><span data-dcnode-id="1219" instrument_node="">149</span></span></span><div class="footnote-content" data-dcnode-id="1214"><p class="footnote-compatibility" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Government official, Beirut, 10 June 2016.</span></p></div></span></div><div class="footnote" content-id="fn0150" data-dcnode-id="1204"><span class="fn" data-dcnode-id="1205"><span class="label fn-label" data-dcnode-id="1209"><span class="end-note-link" data-dcnode-id="1210" data-fn-id="fn0150" rel="nofollow"><span data-dcnode-id="1211" instrument_node="">150</span></span></span><div class="footnote-content" data-dcnode-id="1206"><p class="footnote-compatibility" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Government official, Beirut, 18 April 2016. However, what the official failed to disclose is that this permission to work generally only relates to the informal labour market; very few Syrians in Lebanon have been granted formal work permits since 2011. Also, it is an inaccurate reading of the 1951 Refugee Convention’s art 17(2). See Hathaway (n 83) 747.</span></p></div></span></div><div class="footnote" content-id="fn0151" data-dcnode-id="1184"><span class="fn" data-dcnode-id="1185"><span class="label fn-label" data-dcnode-id="1201"><span class="end-note-link" data-dcnode-id="1202" data-fn-id="fn0151" rel="nofollow"><span data-dcnode-id="1203" instrument_node="">151</span></span></span><div class="footnote-content" data-dcnode-id="1186"><p class="footnote-compatibility" data-dcnode-id="1187"><span data-dcnode-id="1200" instrument_node="">K Siegfried, ‘Has the Refugee Convention Outlived Its Usefulness?’ (</span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">IRIN News</span></em><span data-dcnode-id="1197" instrument_node="">, 26 March 2012) &lt;</span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1195" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irinnews.org/analysis/2012/03/26/has-refugee-convention-outlived-its-usefulness" target="_blank"><span data-dcnode-id="1196" instrument_node="">http://www.irinnews.org/analysis/2012/03/26/has-refugee-convention-outlived-its-usefulness</span></a><span data-dcnode-id="1194" instrument_node="">&gt; accessed 25 October 2016; ‘Time to Reform the Way We Protect Refugees?’ (</span><em data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">IRIN News</span></em><span data-dcnode-id="1191" instrument_node="">, 9 May 2016) &lt;</span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1189" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irinnews.org/analysis/2016/05/09/time-reform-way-we-protect-refugees" target="_blank"><span data-dcnode-id="1190" instrument_node="">http://www.irinnews.org/analysis/2016/05/09/time-reform-way-we-protect-refugees</span></a><span data-dcnode-id="1188" instrument_node="">&gt; accessed 25 October 2016.</span></p></div></span></div><div class="footnote" content-id="fn0152" data-dcnode-id="1176"><span class="fn" data-dcnode-id="1177"><span class="label fn-label" data-dcnode-id="1181"><span class="end-note-link" data-dcnode-id="1182" data-fn-id="fn0152" rel="nofollow"><span data-dcnode-id="1183" instrument_node="">152</span></span></span><div class="footnote-content" data-dcnode-id="1178"><p class="footnote-compatibility" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">UN doc CERD/C/SR.2463 (2016) (emphasis added).</span></p></div></span><
