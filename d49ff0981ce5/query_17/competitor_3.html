</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="3751" id="100519610" scrollto-destination="100519610"><span data-dcnode-id="3752" instrument_node="">Abstract</span></h2><span data-dcnode-id="3750" instrument_node="">
</span><section class="abstract" data-dcnode-id="3745"><p class="chapter-para" data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">How do States ‘legitimize’ their non-ratification of the 1951 Convention relating to the Status of Refugees and the 1967 Protocol relating to the Status of Refugees? This article examines the case of Lebanon, a country frequently hailed by the international community for its generosity towards refugees, and currently hosting the highest number of refugees in the world in proportion to its population size. While Lebanon engaged actively in the establishment of the international refugee regime, it has long insisted that it is not a country of asylum and steadfastly rejects ratification of the major refugee law instruments.</span></p><p class="chapter-para" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Based on 10 months of field research, this article makes four arguments as to why Lebanon continues to resist ratification of the 1951 Refugee Convention and its Protocol. First, it argues that there is a widespread and real, or simply politically expedient, uncertainty as to the obligations that come with the Convention. This includes a belief that the Convention requires that Lebanon allow for the permanent settlement of refugees on its territory. Secondly, it argues that the responsibility-shift for refugees to third parties such as the United Nations High Commissioner for Refugees brings about obvious advantages for Lebanon, and has made it less inclined to become a party to the Convention. Thirdly, it argues that the ‘good-neighbourliness’ principle between Arab countries holds that Lebanon should not employ the term ‘refugee’ because doing so would put the State into positions that could violate the good neighbour principle; essentially, ratifying the Convention would entail a duty to recognize certain forced migrants as refugees. Finally, the article argues that many Lebanese government officials and policymakers consider Lebanon’s accession to the Convention redundant for three key reasons. First, Lebanon applies the provisions of the Convention and Protocol on a voluntary basis, so that there is no need for ratification; secondly, Lebanon already has human rights obligations towards refugees on its territory by virtue of its membership of the United Nations and its ratification of a number of core human rights instruments; and, thirdly, due to the ‘crisis’ in international refugee law, in which many States appear to reject the Convention altogether, Lebanese decision makers are now questioning the relevance of these instruments.</span></p></section><span data-dcnode-id="3744" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="3735"><div class="article-metadata-tocSections" data-dcnode-id="3736"><span data-dcnode-id="3743" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Issue Section:</span></div><span data-dcnode-id="3740" instrument_node="">
</span><a data-dcnode-id="3738" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ijrl/search-results%3Ff_TocHeadingTitle%3DArticles"><span data-dcnode-id="3739" instrument_node="">Articles</span></a><span data-dcnode-id="3737" instrument_node="">
</span></div></div><span data-dcnode-id="3734" instrument_node="">
</span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3732" data-legacy-id="s1" id="100519611" scrollto-destination="100519611"><span data-dcnode-id="3733" instrument_node="">1. INTRODUCTION</span></h2><span data-dcnode-id="3731" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3720"><span data-dcnode-id="3730" instrument_node="">The 1951 Convention relating to the Status of Refugees and the 1967 Protocol relating to the Status of Refugees (the 1951 Refugee Convention) are the two primary international legal instruments that provide for the protection of the world’s refugees. However, in the Middle East, few States have acceded to these instruments, and no regional refugee regime such as those found in Africa or Latin America exists.</span><span class="xrefLink" data-dcnode-id="3729" id="jumplink-fn0001"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3726" data-google-interstitial="false" data-open="fn0001" href="javascript:;" reveal-id="fn0001"><sup data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">1</span></sup></a><span data-dcnode-id="3725" instrument_node=""> This is seemingly paradoxical for a region in which forced migration has long been a standard element of life, and where refugees may even be seen as a ‘defining feature’.</span><span class="xrefLink" data-dcnode-id="3724" id="jumplink-fn0002"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3721" data-google-interstitial="false" data-open="fn0002" href="javascript:;" reveal-id="fn0002"><sup data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">2</span></sup></a></p><p class="chapter-para" data-dcnode-id="3708"><span data-dcnode-id="3719" instrument_node="">In the literature, significant work has been done to explain Middle Eastern States’ non-commitment to international refugee law.</span><span class="xrefLink" data-dcnode-id="3718" id="jumplink-fn0003"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3715" data-google-interstitial="false" data-open="fn0003" href="javascript:;" reveal-id="fn0003"><sup data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">3</span></sup></a><span data-dcnode-id="3714" instrument_node=""> However, few studies have explored the particular circumstances of any one of these States.</span><span class="xrefLink" data-dcnode-id="3713" id="jumplink-fn0004"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3710" data-google-interstitial="false" data-open="fn0004" href="javascript:;" reveal-id="fn0004"><sup data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">4</span></sup></a><span data-dcnode-id="3709" instrument_node=""> It is arguable that the reasons for non-accession to the Convention vary between States, and, although some explanations may be valid throughout the region, important nuances may be lost by viewing these States as a group. This article intends to address this gap in the literature by providing an examination of the key arguments used by one of these States – Lebanon – to ‘legitimize’ its rejection of the 1951 Refugee Convention.</span></p><p class="chapter-para" data-dcnode-id="3677"><span data-dcnode-id="3707" instrument_node="">Unlike many other States in the region, Lebanon engaged actively in the establishment of the international refugee regime. In addition, while many refugee populations in Lebanon have historically been marginalized and mistreated,</span><span class="xrefLink" data-dcnode-id="3706" id="jumplink-fn0005"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3703" data-google-interstitial="false" data-open="fn0005" href="javascript:;" reveal-id="fn0005"><sup data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">5</span></sup></a><span data-dcnode-id="3702" instrument_node=""> the international community has often lauded the country’s approach to refugees. In 2014, for example, the United Nations (UN) Secretary-General stated that, ‘Lebanon is a key pillar in the international framework for the protection of Syrian refugees, and without it, that entire system would collapse’.</span><span class="xrefLink" data-dcnode-id="3701" id="jumplink-fn0006"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3698" data-google-interstitial="false" data-open="fn0006" href="javascript:;" reveal-id="fn0006"><sup data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">6</span></sup></a><span data-dcnode-id="3697" instrument_node=""> Indeed, a strong national myth in Lebanon identifies it as the cradle of international human rights, and the country, with its perceived geography, diversity, freedom, and openness, is widely believed to have historically attracted those seeking refuge from persecution.</span><span class="xrefLink" data-dcnode-id="3696" id="jumplink-fn0007"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3693" data-google-interstitial="false" data-open="fn0007" href="javascript:;" reveal-id="fn0007"><sup data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">7</span></sup></a><span data-dcnode-id="3692" instrument_node=""> Today, Lebanon hosts the highest number of refugees in the world in proportion to its estimated population size of 6.2 million.</span><span class="xrefLink" data-dcnode-id="3691" id="jumplink-fn0008"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3688" data-google-interstitial="false" data-open="fn0008" href="javascript:;" reveal-id="fn0008"><sup data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">8</span></sup></a><span data-dcnode-id="3687" instrument_node=""> With 1,011,366 registered Syrian refugees in December 2016, Syrians represent the vast majority of refugees in the country.</span><span class="xrefLink" data-dcnode-id="3686" id="jumplink-fn0009"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3683" data-google-interstitial="false" data-open="fn0009" href="javascript:;" reveal-id="fn0009"><sup data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">9</span></sup></a><span data-dcnode-id="3682" instrument_node=""> There are also an estimated 504,000 Palestine refugees registered with the United Nations Relief and Works Agency (UNRWA) and 42,000 Palestine refugees from Syria (PRS), in addition to a mere 16,000 from countries such as Ethiopia, Iraq, and Sudan.</span><span class="xrefLink" data-dcnode-id="3681" id="jumplink-fn0010"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3678" data-google-interstitial="false" data-open="fn0010" href="javascript:;" reveal-id="fn0010"><sup data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">10</span></sup></a></p><p class="chapter-para" data-dcnode-id="3671"><span data-dcnode-id="3676" instrument_node="">Despite these large numbers, the Lebanese government insists that it is not a country of asylum, and rejects, in principle, the local integration of refugees. This approach can be traced back to the Lebanese Constitution of 1926 (as amended in 1990), which appears to prohibit any permanent settlement of foreigners. It is also cemented in the key document laying out the UN and government response to the country’s Syrian refugee presence, the Lebanon Crisis Response Plan (LCRP), which states that: ‘Lebanon is neither a country of asylum, nor a final destination for refugees, let alone a country of resettlement’.</span><span class="xrefLink" data-dcnode-id="3675" id="jumplink-fn0011"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3672" data-google-interstitial="false" data-open="fn0011" href="javascript:;" reveal-id="fn0011"><sup data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">11</span></sup></a></p><p class="chapter-para" data-dcnode-id="3655"><span data-dcnode-id="3670" instrument_node="">The unwillingness to host refugees is furthermore reflected in the lack of formal domestic refugee legislation. Asylum issues are instead attended to through immigration laws. The 1962 Law Regulating the Entry and Stay of Foreigners in Lebanon and their Exit from the Country</span><span class="xrefLink" data-dcnode-id="3669" id="jumplink-fn0012"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3666" data-google-interstitial="false" data-open="fn0012" href="javascript:;" reveal-id="fn0012"><sup data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">12</span></sup></a><span data-dcnode-id="3665" instrument_node=""> contains six articles relating to asylum. The asylum provisions in the 1962 Law on Entry and Exit have only been applied once since the end of the civil war in 1991, in a highly politicized case where a member of the Japanese Red Army received asylum in 2001.</span><span class="xrefLink" data-dcnode-id="3664" id="jumplink-fn0013"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3661" data-google-interstitial="false" data-open="fn0013" href="javascript:;" reveal-id="fn0013"><sup data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">13</span></sup></a><span data-dcnode-id="3660" instrument_node=""> Refugees have thus been provided with no other status than that afforded to foreign nationals in general, causing many to live ‘illegally’ in the country and consequently under extremely harsh and marginalized conditions.</span><span class="xrefLink" data-dcnode-id="3659" id="jumplink-fn0014"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3656" data-google-interstitial="false" data-open="fn0014" href="javascript:;" reveal-id="fn0014"><sup data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">14</span></sup></a></p><p class="chapter-para" data-dcnode-id="3642"><span data-dcnode-id="3654" instrument_node="">This seemingly paradoxical and complex background arguably warrants examination of the particular reasons </span><em data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">why</span></em><span data-dcnode-id="3651" instrument_node=""> Lebanon has remained outside the formal international refugee regime, despite having a key role in its establishment and the fact that it currently hosts an unprecedented number of refugees. This article seeks to discuss how Lebanon officially legitimizes its non-ratification of the 1951 Refugee Convention.</span><span class="xrefLink" data-dcnode-id="3650" id="jumplink-fn0015"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3647" data-google-interstitial="false" data-open="fn0015" href="javascript:;" reveal-id="fn0015"><sup data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">15</span></sup></a><span data-dcnode-id="3646" instrument_node=""> It makes four arguments as to why Lebanon continues to resist ratification. First, there is widespread, real, or simply politically expedient, uncertainty as to the obligations that come with the Convention, including a belief that the Convention would require Lebanon to allow the permanent settlement of refugees on its territory. Its history with Palestine refugees is testament to the considerable ideological obstacles to any local integration or naturalization (‘</span><em data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">tawteen</span></em><span data-dcnode-id="3643" instrument_node="">’) of foreigners.</span></p><p class="chapter-para" data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Secondly, the responsibility-shift for refugees to third parties such as the United Nations High Commissioner for Refugees (UNHCR) has obvious advantages for Lebanon, and has made it less inclined to become a party to the Convention. There is a general belief that, should Lebanon ratify the Convention, it would have to bear more of the ‘burden’. Thirdly, the ‘good-neighbourliness’ argument between Arab countries holds that Lebanon should not employ the term ‘refugee’, since to do so would put the State in positions that could violate the good neighbour principle. Ratifying the Convention would, in essence, entail a duty to recognize certain forced migrants as refugees. Finally, it argues that many Lebanese government officials and policymakers consider Lebanon’s accession to the Convention to be redundant.</span></p><p class="chapter-para" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">The article is based on 10 months of fieldwork in Lebanon in 2015 and 2016, including interviews with key informants in the UN, non-governmental organizations (NGOs), and government agencies. A total of 30 key informants, selected through chain sampling, were interviewed. This involved well-informed individuals identifying other informants with knowledge of Lebanon’s ratification of international instruments, and/or refugees. While all interviews were confidential, to maintain the anonymity of the sources, interviewees included individuals from national and international NGOs, as well as from UNHCR and other UN agencies. The nine informants in government agencies included government advisers from four ministries controlled by different political parties. In addition, the article is based on an analysis of historical and contemporary legal materials and policies.</span></p><p class="chapter-para" data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">The article is divided into five main parts. Following this introduction, the article briefly explores Lebanon’s role in the origins of international refugee law, before examining the efforts that have been made at the international level to persuade it to ratify the Convention. The main part of the article provides, in part 4, an explanation of why Lebanon remains a non-party to the Convention: uncertainty about Convention obligations, third-party surrogacy, good-neighbourliness, and the perceived redundancy of the Convention. In the final section, brief conclusions are drawn.</span></p><span data-dcnode-id="3635" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3633" data-legacy-id="s2" id="100519621" scrollto-destination="100519621"><span data-dcnode-id="3634" instrument_node="">2. LEBANON AND THE ORIGINS OF INTERNATIONAL REFUGEE LAW</span></h2><span data-dcnode-id="3632" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3608"><span data-dcnode-id="3631" instrument_node="">Unlike most other Middle Eastern States, Lebanon played a key role in the foundation of international refugee law.</span><span class="xrefLink" data-dcnode-id="3630" id="jumplink-fn0016"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3627" data-google-interstitial="false" data-open="fn0016" href="javascript:;" reveal-id="fn0016"><sup data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">16</span></sup></a><span data-dcnode-id="3626" instrument_node=""> First, it was one of only 20 States that formed the committee appointed by the UN General Assembly, in February 1946, to lay the basis for the International Refugee Organization (IRO). In December of that year, the IRO’s proposed mandate, drafted in part by Lebanon, was adopted by the General Assembly.</span><span class="xrefLink" data-dcnode-id="3625" id="jumplink-fn0017"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3622" data-google-interstitial="false" data-open="fn0017" href="javascript:;" reveal-id="fn0017"><sup data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">17</span></sup></a><span data-dcnode-id="3621" instrument_node=""> Following this, in 1949, Lebanon participated in creating UNHCR. Records of the drafting process reveal that Lebanon was actively engaged in, among other things, advocating for a broad definition of a refugee. As its representative argued at the time, ‘there were new categories of refugees who did not come under the protection of the IRO; for example those in Greece, Pakistan, India and China … any resolution the Committee adopted should establish the High Commissioner as the protector of </span><em data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">all</span></em><span data-dcnode-id="3618" instrument_node=""> refugees’.</span><span class="xrefLink" data-dcnode-id="3617" id="jumplink-fn0018"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3614" data-google-interstitial="false" data-open="fn0018" href="javascript:;" reveal-id="fn0018"><sup data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">18</span></sup></a><span data-dcnode-id="3613" instrument_node=""> In the end, however, Lebanon voted in favour of a Joint Resolution establishing UNHCR with a view to identify and assist refugees within Europe.</span><span class="xrefLink" data-dcnode-id="3612" id="jumplink-fn0019"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3609" data-google-interstitial="false" data-open="fn0019" href="javascript:;" reveal-id="fn0019"><sup data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">19</span></sup></a></p><p class="chapter-para" data-dcnode-id="3587"><span data-dcnode-id="3607" instrument_node="">The drafting process of the 1951 Convention began with General Assembly Resolution 8(I) of 12 February 1946 and was concluded when the UN Conference of Plenipotentiaries adopted the treaty on 28 July 1951. However, the largest and most intensive parts of the drafting process took place in 1950 and 1951.</span><span class="xrefLink" data-dcnode-id="3606" id="jumplink-fn0020"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3603" data-google-interstitial="false" data-open="fn0020" href="javascript:;" reveal-id="fn0020"><sup data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">20</span></sup></a><span data-dcnode-id="3602" instrument_node=""> Lebanon participated in certain aspects of this process, in addition to engaging in the largely concurrent drafting process of the UNHCR Statute. It was here that it, together with Egypt and Saudi Arabia, issued a joint resolution on behalf of Palestine refugees. It argued that the ‘definition of the term “refugee” adopted by the Economic and Social Council [was] unduly restrictive, because it was limited in time and space and omitted certain categories of refugees’.</span><span class="xrefLink" data-dcnode-id="3601" id="jumplink-fn0021"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3598" data-google-interstitial="false" data-open="fn0021" href="javascript:;" reveal-id="fn0021"><sup data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">21</span></sup></a><span data-dcnode-id="3597" instrument_node=""> They were also critical of a United Kingdom resolution, which would ‘submerge in the general mass of refugees certain groups which were the particular concern of the General Assembly and the right of which to repatriation had already been recognized by General Assembly Resolutions’.</span><span class="xrefLink" data-dcnode-id="3596" id="jumplink-fn0022"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3593" data-google-interstitial="false" data-open="fn0022" href="javascript:;" reveal-id="fn0022"><sup data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">22</span></sup></a><span data-dcnode-id="3592" instrument_node=""> The group they were referring to was the Palestine refugee population. Thus, they successfully demanded that ‘the mandate of the High Commissioner’s Office shall not extend to categories of refugees at present placed under the competence of other organs or agencies of the United Nations’.</span><span class="xrefLink" data-dcnode-id="3591" id="jumplink-fn0023"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3588" data-google-interstitial="false" data-open="fn0023" href="javascript:;" reveal-id="fn0023"><sup data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">23</span></sup></a></p><p class="chapter-para" data-dcnode-id="3581"><span data-dcnode-id="3586" instrument_node="">These States were specifically referring to the United Nations Relief and Work Agency for Palestine Refugees in the Near East (UNRWA), which has provided support to Palestine refugees since 1949. It is nevertheless interesting to note in this regard that the protracted Palestinian issue, which deems it necessary to retain the special status of Palestine refugees rather than subject them to the prevailing norms of resettlement or local integration, remains the most cited reason for the continued refusal by many States in the Middle East to sign the Convention. Thus, although the final text of the Convention explicitly addresses the concerns of these States with regard to the Palestinian issue, many Middle Eastern States still refuse to accede.</span><span class="xrefLink" data-dcnode-id="3585" id="jumplink-fn0024"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3582" data-google-interstitial="false" data-open="fn0024" href="javascript:;" reveal-id="fn0024"><sup data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">24</span></sup></a></p><p class="chapter-para" data-dcnode-id="3566"><span data-dcnode-id="3580" instrument_node="">The final draft of the 1951 Convention was not passed until it was presented at the Conference of Plenipotentiaries in July 1951. After having been an active participant in forming the international refugee regime following the Second World War, Lebanon did not attend this vital conference, at which the Convention was unanimously adopted. Nor did countries such as Brazil, China, and India, which had all previously spoken out against aspects of the Convention and Statute.</span><span class="xrefLink" data-dcnode-id="3579" id="jumplink-fn0025"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3576" data-google-interstitial="false" data-open="fn0025" href="javascript:;" reveal-id="fn0025"><sup data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">25</span></sup></a><span data-dcnode-id="3575" instrument_node=""> Lebanon, however, opposed the Conference of Plenipotentiaries itself, arguing that the </span><em data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">General Assembly</span></em><span data-dcnode-id="3572" instrument_node=""> should adopt the text of the Convention.</span><span class="xrefLink" data-dcnode-id="3571" id="jumplink-fn0026"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3568" data-google-interstitial="false" data-open="fn0026" href="javascript:;" reveal-id="fn0026"><sup data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">26</span></sup></a><span data-dcnode-id="3567" instrument_node=""> Lebanon’s voluntary absence from the Conference of Plenipotentiaries thus appears to have had little to do with any opposition to the form or content of the Convention and Protocol.</span></p><p class="chapter-para" data-dcnode-id="3550"><span data-dcnode-id="3565" instrument_node="">In November 1957, the General Assembly took the decision to create UNHCR’s Executive Committee. Lebanon has been a member of this body since 1963 – the same year that UNHCR first established its presence on Lebanese soil.</span><span class="xrefLink" data-dcnode-id="3564" id="jumplink-fn0027"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3561" data-google-interstitial="false" data-open="fn0027" href="javascript:;" reveal-id="fn0027"><sup data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">27</span></sup></a><span data-dcnode-id="3560" instrument_node=""> Membership of this Committee requires that States must be a member of the UN or of one of its specialized agencies; be elected by the Economic and Social Council; represent the widest possible geographical basis; and have a demonstrable interest in and devotion to the solution of the refugee problem.</span><span class="xrefLink" data-dcnode-id="3559" id="jumplink-fn0028"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3556" data-google-interstitial="false" data-open="fn0028" href="javascript:;" reveal-id="fn0028"><sup data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">28</span></sup></a><span data-dcnode-id="3555" instrument_node=""> Lebanon’s active engagement during the early stages of the international refugee regime, as well as its complicated history of hosting Palestine refugees, clearly demonstrates its interest in the refugee problem. Despite this, it may still appear peculiar that a non-party to the Convention is included in a Committee tasked to advise the High Commissioner ‘in the exercise of his functions under the Statute of his Office’ and to approve the High Commissioner’s assistance programmes.</span><span class="xrefLink" data-dcnode-id="3554" id="jumplink-fn0029"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3551" data-google-interstitial="false" data-open="fn0029" href="javascript:;" reveal-id="fn0029"><sup data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">29</span></sup></a></p><span data-dcnode-id="3549" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3547" data-legacy-id="s3" id="100519627" scrollto-destination="100519627"><span data-dcnode-id="3548" instrument_node="">3. CALLS FOR LEBANON’S RATIFICATION</span></h2><span data-dcnode-id="3546" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Lebanon’s active participation in laying the foundations of the international refugee regime is contrasted with its unwillingness to formally bind itself to this same framework. This section explores recent discussions regarding Lebanon’s potential accession to the 1951 Refugee Convention, which, quite surprisingly, have largely taken place outside the realm of UNHCR. With the notable exception of the negotiation of a 2003 Memorandum of Understanding (MoU) with Lebanon’s General Security Office, discussed later, it is difficult to trace UNHCR’s diplomatic efforts vis-à-vis the Lebanese government.</span></p><p class="chapter-para" data-dcnode-id="3532"><span data-dcnode-id="3543" instrument_node="">Working towards Lebanon’s accession to the Convention has never been an explicit objective identified in UNHCR’s Country Operations Plans,</span><span class="xrefLink" data-dcnode-id="3542" id="jumplink-fn0030"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3539" data-google-interstitial="false" data-open="fn0030" href="javascript:;" reveal-id="fn0030"><sup data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">30</span></sup></a><span data-dcnode-id="3538" instrument_node=""> although, on occasion, these have acknowledged that Lebanon ‘has very strong reservations about acceding to the 1951 Refugee Convention’.</span><span class="xrefLink" data-dcnode-id="3537" id="jumplink-fn0031"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3534" data-google-interstitial="false" data-open="fn0031" href="javascript:;" reveal-id="fn0031"><sup data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">31</span></sup></a><span data-dcnode-id="3533" instrument_node=""> In this regard, UNHCR has explained that:</span></p><blockquote data-dcnode-id="3525"><p class="chapter-para" data-dcnode-id="3526"><span data-dcnode-id="3531" instrument_node="">undeniably, the presence of up to 400,000 Palestinian refugees under UNRWA’s mandate is one of the principal reasons deterring the Lebanese authorities from accession to these refugee law instruments. Lebanon fears the potential local integration would upset the sensitive demographic and socio-economic balance in the country.</span><span class="xrefLink" data-dcnode-id="3530" id="jumplink-fn0032"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3527" data-google-interstitial="false" data-open="fn0032" href="javascript:;" reveal-id="fn0032"><sup data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">32</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3518"><span data-dcnode-id="3524" instrument_node="">Other reasons include security and economic considerations.</span><span class="xrefLink" data-dcnode-id="3523" id="jumplink-fn0033"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3520" data-google-interstitial="false" data-open="fn0033" href="javascript:;" reveal-id="fn0033"><sup data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">33</span></sup></a><span data-dcnode-id="3519" instrument_node=""> In 2003, UNHCR also explained how:</span></p><blockquote data-dcnode-id="3511"><p class="chapter-para" data-dcnode-id="3512"><span data-dcnode-id="3517" instrument_node="">UNHCR has acknowledged the fact that Lebanon’s accession to the 1951 Convention and the 1967 Protocol is not an immediate option due to a variety of constraints faced by the GOL [Government of Lebanon]. Nevertheless, the Office arduously worked with its government counterparts to reach an understanding that helps UNHCR implement its mandate, and at the same time helps the government to put in place the necessary protection infrastructure without having to formally accede to the Convention and Protocol.</span><span class="xrefLink" data-dcnode-id="3516" id="jumplink-fn0034"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3513" data-google-interstitial="false" data-open="fn0034" href="javascript:;" reveal-id="fn0034"><sup data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">34</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3497"><span data-dcnode-id="3510" instrument_node="">For reasons such as these, UNHCR has long focused on establishing an acceptable ‘protection space’ for the country’s refugees, </span><em data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">inter alia</span></em><span data-dcnode-id="3507" instrument_node=""> by ‘strengthening institutional support for protection and community-based protection’.</span><span class="xrefLink" data-dcnode-id="3506" id="jumplink-fn0035"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3503" data-google-interstitial="false" data-open="fn0035" href="javascript:;" reveal-id="fn0035"><sup data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">35</span></sup></a><span data-dcnode-id="3502" instrument_node=""> This nevertheless includes training and outreach activities to disseminate knowledge of UNHCR’s mandate, refugee and asylum law, and related issues, through, for example, workshops for university students, journalists, government officials, lawyers, judges, and prosecutors.</span><span class="xrefLink" data-dcnode-id="3501" id="jumplink-fn0036"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3498" data-google-interstitial="false" data-open="fn0036" href="javascript:;" reveal-id="fn0036"><sup data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">36</span></sup></a></p><p class="chapter-para" data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">However, it appears that discussions on the issue of Lebanon’s accession to the Convention have not been led by UNHCR. An examination of the engagement of the UN human rights bodies provides important insights into the sustained international pressure that has been placed on Lebanon. Most significant in this regard is the work of the Committees on the Convention on Ethnic and Racial Discrimination (CERD), the Convention on the Elimination of All Forms of Violence against Women (CEDAW), and the Convention on the Rights of the Child (CRC). The following brief examination will show how the issue was first raised in the CRC Committee in 1996, how Lebanon appears to have considered accession in the mid-2000s, and how attempts to convince Lebanon to accede to the Convention have intensified in the past few years.</span></p><p class="chapter-para" data-dcnode-id="3464"><span data-dcnode-id="3494" instrument_node="">One of the most ardent proponents of Lebanon acceding to the 1951 Refugee Convention is the CRC Committee, which has raised the issue in all three of its Concluding Observations on Lebanon. During meetings in May 1996, Committee Member Thomas Hammarberg (Sweden) asked whether ‘the Lebanese Government intended to ratify the 1951 Convention relating to the Status of Refugees and its 1967 Protocol’.</span><span class="xrefLink" data-dcnode-id="3493" id="jumplink-fn0037"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3490" data-google-interstitial="false" data-open="fn0037" href="javascript:;" reveal-id="fn0037"><sup data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">37</span></sup></a><span data-dcnode-id="3489" instrument_node=""> The Lebanese representative stalled in his response, explaining that he would send the ‘information requested by Mr. Hammarberg … to the Committee in writing’.</span><span class="xrefLink" data-dcnode-id="3488" id="jumplink-fn0038"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3485" data-google-interstitial="false" data-open="fn0038" href="javascript:;" reveal-id="fn0038"><sup data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">38</span></sup></a><span data-dcnode-id="3484" instrument_node=""> While in its Concluding Observations the CRC Committee subsequently recommended that Lebanon consider the ratification of the 1951 Refugee Convention and its 1967 Protocol,</span><span class="xrefLink" data-dcnode-id="3483" id="jumplink-fn0039"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3480" data-google-interstitial="false" data-open="fn0039" href="javascript:;" reveal-id="fn0039"><sup data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">39</span></sup></a><span data-dcnode-id="3479" instrument_node=""> Lebanon avoided the issue entirely in its second report to the Committee, submitted in December 1997.</span><span class="xrefLink" data-dcnode-id="3478" id="jumplink-fn0040"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3475" data-google-interstitial="false" data-open="fn0040" href="javascript:;" reveal-id="fn0040"><sup data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">40</span></sup></a><span data-dcnode-id="3474" instrument_node=""> The question was not raised during the Committee’s meetings on Lebanon in January 2002,</span><span class="xrefLink" data-dcnode-id="3473" id="jumplink-fn0041"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3470" data-google-interstitial="false" data-open="fn0041" href="javascript:;" reveal-id="fn0041"><sup data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">41</span></sup></a><span data-dcnode-id="3469" instrument_node=""> although in its Concluding Observations, one month later, the Committee reiterated its previous recommendation that Lebanon accede to the Convention and Protocol.</span><span class="xrefLink" data-dcnode-id="3468" id="jumplink-fn0042"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3465" data-google-interstitial="false" data-open="fn0042" href="javascript:;" reveal-id="fn0042"><sup data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">42</span></sup></a></p><p class="chapter-para" data-dcnode-id="3449"><span data-dcnode-id="3463" instrument_node="">Four years later, Lebanon submitted its third report to the CRC Committee, in which it not only emphasized its strengthened cooperation with UNHCR – exemplified by the 2003 MoU between UNHCR and Lebanon’s General Security Office</span><span class="xrefLink" data-dcnode-id="3462" id="jumplink-fn0043"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3459" data-google-interstitial="false" data-open="fn0043" href="javascript:;" reveal-id="fn0043"><sup data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">43</span></sup></a><span data-dcnode-id="3458" instrument_node=""> – but also explained its ‘delay’ in ratifying </span><em data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">inter alia</span></em><span data-dcnode-id="3455" instrument_node=""> the 1951 Refugee Convention. Reference was made to the ‘complexity of the political situation relating to the issue of providing nationality to Palestinians in Lebanon, an issue unanimously refused by the Lebanese according to the documents of the national covenant, that was enacted at El Taef’.</span><span class="xrefLink" data-dcnode-id="3454" id="jumplink-fn0044"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3451" data-google-interstitial="false" data-open="fn0044" href="javascript:;" reveal-id="fn0044"><sup data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">44</span></sup></a><span data-dcnode-id="3450" instrument_node=""> While these arguments will be considered later, it is important to note the significance of Lebanon using the word ‘delay’, as it indicates that, far from being a situation in deadlock, there had been at least some movement towards acknowledging the Convention in the years between Lebanon’s second and third reports to the CRC.</span></p><p class="chapter-para" data-dcnode-id="3427"><span data-dcnode-id="3448" instrument_node="">This development was clarified during the CRC’s consideration of Lebanon’s third report in May 2006.</span><span class="xrefLink" data-dcnode-id="3447" id="jumplink-fn0045"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3444" data-google-interstitial="false" data-open="fn0045" href="javascript:;" reveal-id="fn0045"><sup data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">45</span></sup></a><span data-dcnode-id="3443" instrument_node=""> Responding to comments by a Committee Member who regretted ‘that the fact that Lebanon had not ratified the Protocol relating to the Status of Refugees meant that children of refugees and unaccompanied minors were expelled, in violation of international law’,</span><span class="xrefLink" data-dcnode-id="3442" id="jumplink-fn0046"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3439" data-google-interstitial="false" data-open="fn0046" href="javascript:;" reveal-id="fn0046"><sup data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">46</span></sup></a><span data-dcnode-id="3438" instrument_node=""> the Lebanese representative revealed plans for strengthening the country’s protection of refugees. He explained that not only was the MoU with UNHCR being amended, but that ‘possible accession to those instruments [the 1951 Refugee Convention and the 1967 Protocol] was a topic of serious consideration in the country and had been the subject of a 2005 workshop’.</span><span class="xrefLink" data-dcnode-id="3437" id="jumplink-fn0047"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3434" data-google-interstitial="false" data-open="fn0047" href="javascript:;" reveal-id="fn0047"><sup data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">47</span></sup></a><span data-dcnode-id="3433" instrument_node=""> However, he continued, ‘any decision thereon called for serious reflection, given national interests, the small size of the country and its limited integration capacities’.</span><span class="xrefLink" data-dcnode-id="3432" id="jumplink-fn0048"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3429" data-google-interstitial="false" data-open="fn0048" href="javascript:;" reveal-id="fn0048"><sup data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">48</span></sup></a><span data-dcnode-id="3428" instrument_node=""> These limitations notwithstanding, the Committee’s Concluding Observations stressed the importance of Lebanon’s accession:</span></p><blockquote data-dcnode-id="3420"><p class="chapter-para" data-dcnode-id="3421"><span data-dcnode-id="3426" instrument_node="">While welcoming the improved collaboration between the State party and the Office of the United Nations High Commissioner for Refugees (UNHCR), the Committee is concerned at the gaps in the legal protection of refugees in the State party. It also welcomes the information that the State party undertakes activities to accede to the 1951 Convention relating to the Status of Refugees and its 1967 Protocol. The Committee notes with concern that since the State party does not extend asylum, many children and their families seeking asylum are subject to domestic laws for illegal entry and stay, and thereby are at risk of detention, fines and deportation. In this context, the Committee also refers to the concerns and recommendations expressed under the right to a nationality.</span><span class="xrefLink" data-dcnode-id="3425" id="jumplink-fn0049"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3422" data-google-interstitial="false" data-open="fn0049" href="javascript:;" reveal-id="fn0049"><sup data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">49</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3414"><span data-dcnode-id="3419" instrument_node="">It consequently urged Lebanon to ‘accede to the 1951 Convention relating to the Status of Refugees and its 1967 Protocol, and thus create an environment conducive to refugee protection in the country’ and, further, to ‘continue and strengthen its collaboration with UNHCR’.</span><span class="xrefLink" data-dcnode-id="3418" id="jumplink-fn0050"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3415" data-google-interstitial="false" data-open="fn0050" href="javascript:;" reveal-id="fn0050"><sup data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">50</span></sup></a></p><p class="chapter-para" data-dcnode-id="3402"><span data-dcnode-id="3413" instrument_node="">Any move to amend the 2003 MoU with UNHCR or to ratify the 1951 Refugee Convention came to an abrupt halt in July 2006, when the armed conflict between Israel and Lebanon’s Hezbollah raised political tensions in Lebanon. UNHCR has explained how this change in the political climate put on hold many initiatives that had been set in motion to improve refugee protection in Lebanon, including amendments to the national asylum legislation. While UNHCR had managed to garner the support of a number of members of parliament who were willing to endorse the proposed amendments, ‘the same MPs, after the war, and because of the ongoing and unresolved political tensions, made it clear that any substantial discussion in the parliament on immigration/refugee issues would be postponed – possibly for a very long time’.</span><span class="xrefLink" data-dcnode-id="3412" id="jumplink-fn0051"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3409" data-google-interstitial="false" data-open="fn0051" href="javascript:;" reveal-id="fn0051"><sup data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">51</span></sup></a><span data-dcnode-id="3408" instrument_node=""> Another factor that also negatively impacted efforts to strengthen refugee protection was the unprecedented increase in the number of Iraqi refugees coming to Lebanon in 2007, which, according to UNHCR, made most of the provisions in the MoU ‘irrelevant and unimplementable [sic]’.</span><span class="xrefLink" data-dcnode-id="3407" id="jumplink-fn0052"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3404" data-google-interstitial="false" data-open="fn0052" href="javascript:;" reveal-id="fn0052"><sup data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">52</span></sup></a><span data-dcnode-id="3403" instrument_node=""> Thus, only months after the July 2006 conflict, UNHCR published its 2007 Country Operations Plan, where it explained that:</span></p><blockquote data-dcnode-id="3395"><p class="chapter-para" data-dcnode-id="3396"><span data-dcnode-id="3401" instrument_node="">The objectives of the UNHCR office in Lebanon take into account the fact that it is premature for UNHCR to build its strategy on the assumption that Lebanon will soon accede to the 1951 Convention / 1967 Protocol relating to the Status of Refugees. There are still many obstacles – both political and legal – to Lebanon’s accession to the refugee instruments. The latter remains a long term objective but it is essential, in the meantime, to build an environment in which persons of concern do feel protected. To actively promote accession before identifying concrete remedies to the existing gaps would be inappropriate. The years to come will be crucial and should be used to build solid foundations on which an asylum system can at a later stage be established.</span><span class="xrefLink" data-dcnode-id="3400" id="jumplink-fn0053"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3397" data-google-interstitial="false" data-open="fn0053" href="javascript:;" reveal-id="fn0053"><sup data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">53</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3384"><span data-dcnode-id="3394" instrument_node="">It is surely for these reasons that UNHCR completely avoided mentioning Lebanon acceding to the 1951 Refugee Convention in recommendations submitted in 2010 to the High Commissioner for Human Rights on the occasion of the Universal Periodic Review of Lebanon.</span><span class="xrefLink" data-dcnode-id="3393" id="jumplink-fn0054"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3390" data-google-interstitial="false" data-open="fn0054" href="javascript:;" reveal-id="fn0054"><sup data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">54</span></sup></a><span data-dcnode-id="3389" instrument_node=""> At around the same time, UNHCR’s evaluation of its operations for urban Iraqi refugees in Jordan, Lebanon, and Syria also briefly discussed whether or not it should adopt a more formal and principled approach, which encouraged these countries to sign the 1951 Convention. The authors of the report nevertheless concluded that ‘there is no guarantee that such a strategy would be successful, and a risk that it would undermine the goodwill and cooperative relationships that UNHCR has been able to establish with the countries of asylum over the past few years’.</span><span class="xrefLink" data-dcnode-id="3388" id="jumplink-fn0055"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3385" data-google-interstitial="false" data-open="fn0055" href="javascript:;" reveal-id="fn0055"><sup data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">55</span></sup></a></p><p class="chapter-para" data-dcnode-id="3363"><span data-dcnode-id="3383" instrument_node="">These political tensions were exacerbated following the Syrian conflict and the ensuing refugee influx into Lebanon. Lebanese political parties – one political block opposing the Syrian regime, and the other openly supporting it – demonstrated conflicting attitudes towards the conflict in Syria.</span><span class="xrefLink" data-dcnode-id="3382" id="jumplink-fn0056"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3379" data-google-interstitial="false" data-open="fn0056" href="javascript:;" reveal-id="fn0056"><sup data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">56</span></sup></a><span data-dcnode-id="3378" instrument_node=""> Thus, despite the promising developments in 2006, Lebanon’s fourth and fifth reports to the CRC, submitted in November 2015, made no mention of any plans for acceding to the 1951 Refugee Convention.</span><span class="xrefLink" data-dcnode-id="3377" id="jumplink-fn0057"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3374" data-google-interstitial="false" data-open="fn0057" href="javascript:;" reveal-id="fn0057"><sup data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">57</span></sup></a><span data-dcnode-id="3373" instrument_node=""> UNHCR, no longer seeking to modify the MoU or to negotiate a new one, has continued to adopt a more pragmatic approach to Lebanon’s accession to the Convention. In this regard, one senior UNHCR official explained that it matters less whether Lebanon has formally acceded to the Convention, and more that the country ‘behaves as if it were’ a party to the Convention.</span><span class="xrefLink" data-dcnode-id="3372" id="jumplink-fn0058"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3369" data-google-interstitial="false" data-open="fn0058" href="javascript:;" reveal-id="fn0058"><sup data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">58</span></sup></a><span data-dcnode-id="3368" instrument_node=""> This approach has nevertheless been questioned by UNHCR’s donors, such as the European Civil Protection and Humanitarian Aid Operations, representatives of which, in late 2015, allegedly took it upon themselves to question UNHCR Lebanon’s commitment to its mandate and to promoting Lebanon’s accession to the Refugee Convention.</span><span class="xrefLink" data-dcnode-id="3367" id="jumplink-fn0059"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3364" data-google-interstitial="false" data-open="fn0059" href="javascript:;" reveal-id="fn0059"><sup data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">59</span></sup></a></p><p class="chapter-para" data-dcnode-id="3352"><span data-dcnode-id="3362" instrument_node="">At the same time, it is clear that the Lebanese government has been feeling the international pressure to accede to the Convention. In October 2014, local papers reported how Prime Minister Tamman Salam, Foreign Minister Gibran Bassil, and Minister of Social Affairs, Rashid Derbas, ‘thwarted an attempt to push Lebanon towards signing the 1951 Geneva Convention on the status of refugees’ during the Berlin Conference on the Syrian Refugee Situation.</span><span class="xrefLink" data-dcnode-id="3361" id="jumplink-fn0060"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3358" data-google-interstitial="false" data-open="fn0060" href="javascript:;" reveal-id="fn0060"><sup data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">60</span></sup></a><span data-dcnode-id="3357" instrument_node=""> According to the report, the draft outcome document of the donor conference included a clause stating that Lebanon should ratify the 1951 Refugee Convention. The final document, however, included no such clause, but rather reaffirmed Lebanon’s position on the ‘voluntary application’ of the Convention, an approach that will be considered later.</span><span class="xrefLink" data-dcnode-id="3356" id="jumplink-fn0061"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3353" data-google-interstitial="false" data-open="fn0061" href="javascript:;" reveal-id="fn0061"><sup data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">61</span></sup></a></p><p class="chapter-para" data-dcnode-id="3328"><span data-dcnode-id="3351" instrument_node="">Another example of this international pressure is found in the increasing engagement of the CEDAW and CERD Committees. While these Committees had previously disregarded the question of a Lebanese accession to the 1951 Refugee Convention,</span><span class="xrefLink" data-dcnode-id="3350" id="jumplink-fn0062"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3347" data-google-interstitial="false" data-open="fn0062" href="javascript:;" reveal-id="fn0062"><sup data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">62</span></sup></a><span data-dcnode-id="3346" instrument_node=""> in 2008, the CEDAW Committee urged Lebanon not only to ‘adopt laws and regulations relating to the status of asylum-seekers and refugees in Lebanon, in line with international standards’, but also to ‘consider accession to international instruments to address the situation of refugees and stateless persons, including the 1951 Convention relating to the Status of Refugees and its 1967 Protocol’.</span><span class="xrefLink" data-dcnode-id="3345" id="jumplink-fn0063"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3342" data-google-interstitial="false" data-open="fn0063" href="javascript:;" reveal-id="fn0063"><sup data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">63</span></sup></a><span data-dcnode-id="3341" instrument_node=""> In 2015, it reiterated this call,</span><span class="xrefLink" data-dcnode-id="3340" id="jumplink-fn0064"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3337" data-google-interstitial="false" data-open="fn0064" href="javascript:;" reveal-id="fn0064"><sup data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">64</span></sup></a><span data-dcnode-id="3336" instrument_node=""> while the CERD Committee, in its 2016 Concluding Observations, called upon Lebanon to ‘establish a clear and comprehensive legal framework on asylum respecting the principle of </span><em data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">non-refoulement</span></em><span data-dcnode-id="3333" instrument_node=""> and enabling asylum-seekers and refugees to exercise their fundamental rights without discrimination’, and encouraged it to ‘consider ratifying those international human rights instruments that it has not yet ratified, in particular treaties with provisions that have direct relevance to communities that may be subjected to racial discrimination’.</span><span class="xrefLink" data-dcnode-id="3332" id="jumplink-fn0065"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3329" data-google-interstitial="false" data-open="fn0065" href="javascript:;" reveal-id="fn0065"><sup data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">65</span></sup></a></p><p class="chapter-para" data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">It is thus evident that despite Lebanon’s strong opposition to ratifying the Convention, international efforts to persuade it to do so have continued and, in fact, appear to have strengthened. This raises the questions why Lebanon continues to reject the 1951 Refugee Convention, and how it seeks to legitimize this. The next section will seek to answer these questions.</span></p><span data-dcnode-id="3325" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3323" data-legacy-id="s4" id="100519647" scrollto-destination="100519647"><span data-dcnode-id="3324" instrument_node="">4. LEBANON’S NON-COMMITMENT TO THE 1951 REFUGEE CONVENTION</span></h2><span data-dcnode-id="3322" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3320" data-legacy-id="s5" id="100519648" scrollto-destination="100519648"><span data-dcnode-id="3321" instrument_node="">4.1 Uncertainty about Convention obligations</span></h3><span data-dcnode-id="3319" instrument_node="">
</span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3317" data-legacy-id="s6" id="100519649" scrollto-destination="100519649"><span data-dcnode-id="3318" instrument_node="">4.1.1 The permanent settlement of refugees</span></h4><span data-dcnode-id="3316" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3304"><span data-dcnode-id="3315" instrument_node="">It is arguable that Lebanon has remained a non-party to the 1951 Refugee Convention because of a real, or perhaps politically expedient, uncertainty about what the Convention obliges Contracting States to do. An example is the common argument that the Convention cannot be ratified because it would require the permanent settlement or local integration of refugees, including Palestinians. There is a fear that refugees recognized under international refugee law would pose a threat to social and sectarian cohesion in the country. Lebanon, home to 18 different sects, has long sought to preserve its delicate demographic balance, and numbers have become important in power struggles. The last census was held in 1932 and, because political representation was based on its findings, it played a fundamental role in Lebanon’s State-building process.</span><span class="xrefLink" data-dcnode-id="3314" id="jumplink-fn0066"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3311" data-google-interstitial="false" data-open="fn0066" href="javascript:;" reveal-id="fn0066"><sup data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">66</span></sup></a><span data-dcnode-id="3310" instrument_node=""> In such a context, the presence of refugees raises concerns about substantial demographic changes in the country, which would have major political implications.</span><span class="xrefLink" data-dcnode-id="3309" id="jumplink-fn0067"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3306" data-google-interstitial="false" data-open="fn0067" href="javascript:;" reveal-id="fn0067"><sup data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">67</span></sup></a><span data-dcnode-id="3305" instrument_node=""> Lebanon’s experience with the predominantly Sunni Palestinians, who are often blamed for playing a substantial role in the build-up towards the Lebanese civil war (1975–90), is a key reason for the highly politicized refugee issue.</span></p><p class="chapter-para" data-dcnode-id="3272"><span data-dcnode-id="3303" instrument_node="">There is unanimous political agreement on the rejection of naturalization of refugees in Lebanon.</span><span class="xrefLink" data-dcnode-id="3302" id="jumplink-fn0068"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3299" data-google-interstitial="false" data-open="fn0068" href="javascript:;" reveal-id="fn0068"><sup data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">68</span></sup></a><span data-dcnode-id="3298" instrument_node=""> The government has long wished to reduce the numbers of Palestinians in its territory, and this is not only reflected in the long-term marginalization of Palestine refugees,</span><span class="xrefLink" data-dcnode-id="3297" id="jumplink-fn0069"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3294" data-google-interstitial="false" data-open="fn0069" href="javascript:;" reveal-id="fn0069"><sup data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">69</span></sup></a><span data-dcnode-id="3293" instrument_node=""> but also has arguably had an impact on the Lebanese Constitution (as amended in 1990). The preamble of this Constitution refers to the concept of </span><em data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">tawteen</span></em><span data-dcnode-id="3290" instrument_node="">, stating that there shall be no </span><em data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">tawteen</span></em><span data-dcnode-id="3287" instrument_node=""> in Lebanon. It is not obvious what is meant by this term, and translations of the Constitution do little to clarify this. The official French version translates </span><em data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">tawteen</span></em><span data-dcnode-id="3284" instrument_node=""> into ‘</span><em data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">l’implantation</span></em><span data-dcnode-id="3281" instrument_node="">’, meaning ‘implantation’ in English, but no explicit mention is made of Palestinians, refugees, or foreigners.</span><span class="xrefLink" data-dcnode-id="3280" id="jumplink-fn0070"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3277" data-google-interstitial="false" data-open="fn0070" href="javascript:;" reveal-id="fn0070"><sup data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">70</span></sup></a><span data-dcnode-id="3276" instrument_node=""> It is thus unclear who or what is forbidden from being ‘implanted’. The confusion is even greater in the English language versions of the Constitution, where (at least) three different versions translate </span><em data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">tawteen</span></em><span data-dcnode-id="3273" instrument_node=""> in very different ways. An official version found at the Office of the Presidency states that:</span></p><blockquote data-dcnode-id="3262"><p class="chapter-para" data-dcnode-id="3263"><span data-dcnode-id="3271" instrument_node="">Lebanese territory is one for all Lebanese. Every Lebanese shall have the right to live in any part thereof and to enjoy the rule of law wherever he resides. There shall be no segregation of the people on the basis of any type of belonging, and no fragmentation, partition, or </span><em data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">settlement of non-Lebanese in Lebanon</span></em><span data-dcnode-id="3268" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3267" id="jumplink-fn0071"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3264" data-google-interstitial="false" data-open="fn0071" href="javascript:;" reveal-id="fn0071"><sup data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">71</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">However, in contrast, another official version found at the Ministry of Information reads:</span></p><blockquote data-dcnode-id="3250"><p class="chapter-para" data-dcnode-id="3251"><span data-dcnode-id="3259" instrument_node="">Lebanese territory is one for all Lebanese. Every Lebanese shall have the right to live in any part of it and to enjoy the sovereignty of law wherever he resides. There shall be no segregation of the people on the basis of any type of belonging, and no fragmentation, partition, or </span><em data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">colonization</span></em><span data-dcnode-id="3256" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3255" id="jumplink-fn0072"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3252" data-google-interstitial="false" data-open="fn0072" href="javascript:;" reveal-id="fn0072"><sup data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">72</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3239"><span data-dcnode-id="3249" instrument_node="">This latter translation of </span><em data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">tawteen</span></em><span data-dcnode-id="3246" instrument_node=""> appears to make little sense, particularly as the proper term for colonization in Arabic is </span><em data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">istitan</span></em><span data-dcnode-id="3243" instrument_node="">, not </span><em data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">tawteen</span></em><span data-dcnode-id="3240" instrument_node="">. A third, unofficial, version, found at the University of Oxford’s Constitute Project, is:</span></p><blockquote data-dcnode-id="3229"><p class="chapter-para" data-dcnode-id="3230"><span data-dcnode-id="3238" instrument_node="">The territory of Lebanon is one for all Lebanese. Every Lebanese has the right to reside on any part thereof, and enjoy it under the sovereignty of the law. No segregation of the people on any belonging whatsoever. No segregation, no partition, and no </span><em data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">inhabitation</span></em><span data-dcnode-id="3235" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3234" id="jumplink-fn0073"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3231" data-google-interstitial="false" data-open="fn0073" href="javascript:;" reveal-id="fn0073"><sup data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">73</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3224"><span data-dcnode-id="3228" instrument_node="">Again, it is unclear what is forbidden by the Constitution. The different translations of the same passage suggest that the concept of </span><em data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">tawteen</span></em><span data-dcnode-id="3225" instrument_node=""> is far from being a term of art. Yet, it is key to understanding Lebanon’s rejection of the 1951 Refugee Convention.</span></p><p class="chapter-para" data-dcnode-id="3162"><span data-dcnode-id="3223" instrument_node="">In the literature, some have argued that </span><em data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">tawteen</span></em><span data-dcnode-id="3220" instrument_node=""> is in fact a type of ‘Lebanese political jargon’,</span><span class="xrefLink" data-dcnode-id="3219" id="jumplink-fn0074"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3216" data-google-interstitial="false" data-open="fn0074" href="javascript:;" reveal-id="fn0074"><sup data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">74</span></sup></a><span data-dcnode-id="3215" instrument_node=""> which, because of its multiple interpretations, ‘lends itself easily to political and polemic usage’.</span><span class="xrefLink" data-dcnode-id="3214" id="jumplink-fn0075"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3211" data-google-interstitial="false" data-open="fn0075" href="javascript:;" reveal-id="fn0075"><sup data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">75</span></sup></a><span data-dcnode-id="3210" instrument_node=""> This suggests that the ideological and political background of each translator plays a decisive role in the interpretation of </span><em data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">tawteen</span></em><span data-dcnode-id="3207" instrument_node=""> in the Lebanese Constitution. The term itself, understood by Lebanon scholar Daniel Meier to mean ‘settlement’ or ‘implantation’, is derived from the word for homeland (</span><em data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">watan</span></em><span data-dcnode-id="3204" instrument_node="">). While the verb </span><em data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">wattana</span></em><span data-dcnode-id="3201" instrument_node=""> means more precisely to settle down, there appear to be shades of meaning; the similar term </span><em data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">tawattana</span></em><span data-dcnode-id="3198" instrument_node="">, coming from the same root, also means to settle down, but in an active sense. In comparison, </span><em data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">tawteen</span></em><span data-dcnode-id="3195" instrument_node=""> ‘is a situation that people endure as if they were obliged to settle down’.</span><span class="xrefLink" data-dcnode-id="3194" id="jumplink-fn0076"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3191" data-google-interstitial="false" data-open="fn0076" href="javascript:;" reveal-id="fn0076"><sup data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">76</span></sup></a><span data-dcnode-id="3190" instrument_node=""> The term is unquestionably primarily employed in relation to Lebanon’s Palestine refugees, and some have even argued that the Constitution therefore institutionalizes the country’s strong fear of the permanent settlement of Palestinians.</span><span class="xrefLink" data-dcnode-id="3189" id="jumplink-fn0077"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3186" data-google-interstitial="false" data-open="fn0077" href="javascript:;" reveal-id="fn0077"><sup data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">77</span></sup></a><span data-dcnode-id="3185" instrument_node=""> During the Lebanese civil war, </span><em data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">tawteen</span></em><span data-dcnode-id="3182" instrument_node=""> was used in a mobilizing manner to pinpoint ‘the enemy’s intention and that which is threatened – the homeland and the nation’.</span><span class="xrefLink" data-dcnode-id="3181" id="jumplink-fn0078"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3178" data-google-interstitial="false" data-open="fn0078" href="javascript:;" reveal-id="fn0078"><sup data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">78</span></sup></a><span data-dcnode-id="3177" instrument_node=""> Importantly, it was used to denounce ‘a conspiracy’, which aimed at ‘transforming Lebanese territory into a substitute homeland (</span><em data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">watan badil</span></em><span data-dcnode-id="3174" instrument_node="">) for foreigners (i.e. the Palestinians)’.</span><span class="xrefLink" data-dcnode-id="3173" id="jumplink-fn0079"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3170" data-google-interstitial="false" data-open="fn0079" href="javascript:;" reveal-id="fn0079"><sup data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">79</span></sup></a><span data-dcnode-id="3169" instrument_node=""> Seen from this perspective, the English translations of </span><em data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">tawteen</span></em><span data-dcnode-id="3166" instrument_node=""> as settlement, inhabitation, and colonization may appear to be two sides of the same coin. It is also noteworthy that Lebanese political actors have more recently also tied the concept of </span><em data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">tawteen</span></em><span data-dcnode-id="3163" instrument_node=""> explicitly to the country’s Syrian refugees, showing how Lebanon’s history with Palestine refugees has now been directly linked to its response to the Syrian influx.</span></p><p class="chapter-para" data-dcnode-id="3151"><span data-dcnode-id="3161" instrument_node="">This institutionalized rejection of the Palestine (and now increasingly Syrian) refugee presence appears to have led to the belief that ratifying the Refugee Convention would give permanency to the country’s refugees in general, and to its Palestinian population in particular. Political leaders frequently brand the Convention as a step towards the naturalization of the Palestinians,</span><span class="xrefLink" data-dcnode-id="3160" id="jumplink-fn0080"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3157" data-google-interstitial="false" data-open="fn0080" href="javascript:;" reveal-id="fn0080"><sup data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">80</span></sup></a><span data-dcnode-id="3156" instrument_node=""> and Lebanon’s statements to international human rights bodies confirm this belief. As mentioned previously, in 2006, Lebanon explained its ‘delay’ in acceding to the Refugee Convention by referring to the complexity of providing nationality to Palestine refugees, which, it argued, is unanimously rejected by all political actors.</span><span class="xrefLink" data-dcnode-id="3155" id="jumplink-fn0081"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3152" data-google-interstitial="false" data-open="fn0081" href="javascript:;" reveal-id="fn0081"><sup data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">81</span></sup></a></p><p class="chapter-para" data-dcnode-id="3136"><span data-dcnode-id="3150" instrument_node="">What statements such as these suggest is that there is a widespread, real, or politically expedient, misperception of the obligations brought by ratification. First, it is evident that Palestine refugees under the mandate of UNRWA are excluded from the 1951 Convention, owing to Lebanon’s and other Middle Eastern States’ lobbying during the drafting process. Secondly, Lebanon would certainly not be obligated to permanently settle refugees if it ratified the 1951 Convention. Although article 34 of the Convention </span><em data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">inter alia</span></em><span data-dcnode-id="3147" instrument_node=""> provides that ‘the contracting states shall as far as possible facilitate the assimilation and naturalization of refugees’, there is nothing in the Convention that obliges States to unreservedly and permanently host refugees. This provision is merely a recommendation – the drafters of the 1951 Convention considered the question of naturalization as a matter of ‘such delicate nature that in every case the final decision must rest with the organs of the state concerned’.</span><span class="xrefLink" data-dcnode-id="3146" id="jumplink-fn0082"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3143" data-google-interstitial="false" data-open="fn0082" href="javascript:;" reveal-id="fn0082"><sup data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">82</span></sup></a><span data-dcnode-id="3142" instrument_node=""> The adopted text, with the inclusion of ‘as far as possible’, mirrors the concerns States had during the drafting process. In any case, Lebanon would be free to decide upon an eventual reservation to article 34.</span><span class="xrefLink" data-dcnode-id="3141" id="jumplink-fn0083"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3138" data-google-interstitial="false" data-open="fn0083" href="javascript:;" reveal-id="fn0083"><sup data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">83</span></sup></a><span data-dcnode-id="3137" instrument_node=""> This suggests that opposition to accession may not only be due to the failure by Lebanese policymakers to fully understand the obligations laid down in the Convention. Opposing accession may also serve the political purpose of appearing to ‘defend’ Lebanon from refugee naturalization, and thus to be seen to preserve Lebanon’s sectarian balance.</span></p><span data-dcnode-id="3135" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3133" data-legacy-id="s7" id="100519661" scrollto-destination="100519661"><span data-dcnode-id="3134" instrument_node="">4.1.2 No country of asylum</span></h4><span data-dcnode-id="3132" instrument_node="">
