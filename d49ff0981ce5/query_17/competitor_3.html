</span><p class="chapter-para" data-dcnode-id="3112"><span data-dcnode-id="3131" instrument_node="">A related example of the real or politically strategic misconception of the obligations contained in the 1951 Convention is the Lebanese conviction that by not ratifying the Convention it avoids becoming a country of asylum. The strong opposition to being a country of asylum is due to the belief that it would entail the permanent settlement of refugees. In other words, Lebanon often equates the notions of ‘asylum’ with ‘permanent settlement’, or, in the language of international refugee law, with local integration. This idea appears to have its roots in the concept of </span><em data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">tawteen</span></em><span data-dcnode-id="3128" instrument_node="">, but was allegedly not properly formalized as a government policy before it was included in the 2003 MoU between UNHCR and Lebanon’s General Security Office.</span><span class="xrefLink" data-dcnode-id="3127" id="jumplink-fn0084"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3124" data-google-interstitial="false" data-open="fn0084" href="javascript:;" reveal-id="fn0084"><sup data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">84</span></sup></a><span data-dcnode-id="3123" instrument_node=""> The agreement not only affirms that ‘Lebanon does not consider itself an asylum country’, but also specifies that an ‘asylum seeker’ means a ‘person seeking asylum in a country other than Lebanon’.</span><span class="xrefLink" data-dcnode-id="3122" id="jumplink-fn0085"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3119" data-google-interstitial="false" data-open="fn0085" href="javascript:;" reveal-id="fn0085"><sup data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">85</span></sup></a><span data-dcnode-id="3118" instrument_node=""> It is, therefore, arguable that this document not only legitimizes the notion of Lebanon not being a country of asylum, but also that it helped to introduce a principle that has since found its way into numerous official documents, and even judicial decisions.</span><span class="xrefLink" data-dcnode-id="3117" id="jumplink-fn0086"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3114" data-google-interstitial="false" data-open="fn0086" href="javascript:;" reveal-id="fn0086"><sup data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">86</span></sup></a><span data-dcnode-id="3113" instrument_node=""> As already mentioned, the LCRP proclaims that ‘Lebanon is neither a country of asylum, nor a final destination for refugees, let alone a country of resettlement’.</span></p><p class="chapter-para" data-dcnode-id="3093"><span data-dcnode-id="3111" instrument_node="">This may appear particularly paradoxical when examining the Lebanese Constitution. While forbidding </span><em data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">tawteen</span></em><span data-dcnode-id="3108" instrument_node="">, it also states that Lebanon shall ‘without exception’ abide by key international human rights instruments, such as the Universal Declaration of Human Rights (UDHR).</span><span class="xrefLink" data-dcnode-id="3107" id="jumplink-fn0087"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3104" data-google-interstitial="false" data-open="fn0087" href="javascript:;" reveal-id="fn0087"><sup data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">87</span></sup></a><span data-dcnode-id="3103" instrument_node=""> As will be discussed below, Lebanon played a key role in the development of the UDHR, which in article 14(1) provides that ‘Everyone has the right to seek and to enjoy asylum from persecution in other countries’. This article does not contain a guarantee of permanent residence in the receiving State.</span><span class="xrefLink" data-dcnode-id="3102" id="jumplink-fn0088"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3099" data-google-interstitial="false" data-open="fn0088" href="javascript:;" reveal-id="fn0088"><sup data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">88</span></sup></a><span data-dcnode-id="3098" instrument_node=""> Rather, international law considers asylum to be ‘the protection that a State grants on its territory or in some other place under the control of certain of its organs to a person who comes to seek it’.</span><span class="xrefLink" data-dcnode-id="3097" id="jumplink-fn0089"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3094" data-google-interstitial="false" data-open="fn0089" href="javascript:;" reveal-id="fn0089"><sup data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">89</span></sup></a></p><p class="chapter-para" data-dcnode-id="3077"><span data-dcnode-id="3092" instrument_node="">Although the constitutional principle of international obligations taking precedence over national law has seldom been practised in Lebanese courts,</span><span class="xrefLink" data-dcnode-id="3091" id="jumplink-fn0090"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3088" data-google-interstitial="false" data-open="fn0090" href="javascript:;" reveal-id="fn0090"><sup data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">90</span></sup></a><span data-dcnode-id="3087" instrument_node=""> there are important exceptions. In a series of judgments concerning the irregular entry of Syrian refugees into Lebanon, issued from 2012 onwards, Tripoli-based Judge Nazek Khatib engaged with UDHR article 14. With a direct and well-argued reference to the right to seek asylum, Judge Khatib removed the irregular entry charges for a number of Syrian refugees.</span><span class="xrefLink" data-dcnode-id="3086" id="jumplink-fn0091"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3083" data-google-interstitial="false" data-open="fn0091" href="javascript:;" reveal-id="fn0091"><sup data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">91</span></sup></a><span data-dcnode-id="3082" instrument_node=""> While some judges have followed suit, many remain sceptical, as Judge Khatib’s judgments are in stark contrast to the standard operating procedure, which charges those who enter Lebanon irregularly with illegal entry, often resulting in deportation orders. It is illustrative of the politicized nature of the right to seek asylum in Lebanon that political groups have accused Judge Khatib of ‘being with the Syrian opposition and the Revolution’.</span><span class="xrefLink" data-dcnode-id="3081" id="jumplink-fn0092"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3078" data-google-interstitial="false" data-open="fn0092" href="javascript:;" reveal-id="fn0092"><sup data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">92</span></sup></a></p><p class="chapter-para" data-dcnode-id="3059"><span data-dcnode-id="3076" instrument_node="">Asylum is, in the Lebanese context, often understood as ‘a final destination for refugees to be locally integrated or resettled’.</span><span class="xrefLink" data-dcnode-id="3075" id="jumplink-fn0093"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3072" data-google-interstitial="false" data-open="fn0093" href="javascript:;" reveal-id="fn0093"><sup data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">93</span></sup></a><span data-dcnode-id="3071" instrument_node=""> At the heart of these discussions lies the distinction between being either a </span><em data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">transit</span></em><span data-dcnode-id="3068" instrument_node=""> or a </span><em data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">destination</span></em><span data-dcnode-id="3065" instrument_node=""> country. Not only does the 2003 MoU reaffirm the ‘transit country concept’ by imposing strict time limits on refugees’ residence, but Lebanon’s report to CEDAW in 2014 also suggests that it sees a link between ratifying the Refugee Convention and becoming a ‘destination country’. It states that it ‘has not signed the Convention relating to the Status of Refugees (1951) and Lebanon is still considered as a transit country not a destination country’.</span><span class="xrefLink" data-dcnode-id="3064" id="jumplink-fn0094"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3061" data-google-interstitial="false" data-open="fn0094" href="javascript:;" reveal-id="fn0094"><sup data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">94</span></sup></a><span data-dcnode-id="3060" instrument_node=""> This view is reinforced in its report to the CRC Committee, submitted in November 2015, where Lebanon explains how:</span></p><blockquote data-dcnode-id="3052"><p class="chapter-para" data-dcnode-id="3053"><span data-dcnode-id="3058" instrument_node="">The characterization ‘refugee’ does not apply to displaced Syrians who came to Lebanon as the Lebanese State does not grant them such characterization and considers their presence temporary and for purely humanitarian grounds, given that Lebanon has not signed the 1951 Convention on the Status of Refugees and its 1967 Protocol.</span><span class="xrefLink" data-dcnode-id="3057" id="jumplink-fn0095"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3054" data-google-interstitial="false" data-open="fn0095" href="javascript:;" reveal-id="fn0095"><sup data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">95</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3046"><span data-dcnode-id="3051" instrument_node="">More recent examples, from August 2016, are the discussions in the CERD Committee of Lebanon’s increasingly restrictive regulations for Syrian refugees. The Lebanese representative explained that Syrians could enter freely if they sought temporary residence under the new regulations, but not if they sought ‘permanent’ residence as ‘refugees’ or ‘immigrants’.</span><span class="xrefLink" data-dcnode-id="3050" id="jumplink-fn0096"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3047" data-google-interstitial="false" data-open="fn0096" href="javascript:;" reveal-id="fn0096"><sup data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">96</span></sup></a></p><p class="chapter-para" data-dcnode-id="3034"><span data-dcnode-id="3045" instrument_node="">The link being made between refugees and permanent residence is not coincidental. In fact, Lebanese actors go to great lengths to avoid the ‘refugee’ label, which is predominantly associated with Palestinians. There also appears to be the idea that the mere use of the term ‘refugee’ would trigger the application of the international refugee law regime.</span><span class="xrefLink" data-dcnode-id="3044" id="jumplink-fn0097"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3041" data-google-interstitial="false" data-open="fn0097" href="javascript:;" reveal-id="fn0097"><sup data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">97</span></sup></a><span data-dcnode-id="3040" instrument_node=""> Use of the ‘refugee’ label would, it is feared, become a back-door to ratifying the Refugee Convention. Similar fears have been described by Stevens in the Jordanian context.</span><span class="xrefLink" data-dcnode-id="3039" id="jumplink-fn0098"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3036" data-google-interstitial="false" data-open="fn0098" href="javascript:;" reveal-id="fn0098"><sup data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">98</span></sup></a><span data-dcnode-id="3035" instrument_node=""> As one government official explained:</span></p><blockquote data-dcnode-id="3027"><p class="chapter-para" data-dcnode-id="3028"><span data-dcnode-id="3033" instrument_node="">For us, they’re not refugees. Officially speaking … we realize whether under the Convention, or international law, or whatever, they’re acknowledged refugees, they’re not [only] displaced. But because of the specificity of Lebanon in particular they are not considered as refugees.</span><span class="xrefLink" data-dcnode-id="3032" id="jumplink-fn0099"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3029" data-google-interstitial="false" data-open="fn0099" href="javascript:;" reveal-id="fn0099"><sup data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">99</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Lebanese authorities have accordingly resorted to a myriad of different labels to refer to Syrians seeking protection in Lebanon.</span></p><span data-dcnode-id="3024" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3022" data-legacy-id="s8" id="100519671" scrollto-destination="100519671"><span data-dcnode-id="3023" instrument_node="">4.1.3 Terminological confusion on durable solutions</span></h4><span data-dcnode-id="3021" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3010"><span data-dcnode-id="3020" instrument_node="">Although international refugee law identifies three different durable solutions to the problem of refugees – local integration, voluntary repatriation, and resettlement – there appears to be a lack of clarity in Lebanon as to what these solutions entail. Some of this confusion is rooted in a common misunderstanding that both the notions of resettlement and voluntary return require local integration in Lebanon, which, as explained above, is unanimously ruled out. For example, in December 2015, when the UN Security Council adopted Resolution 2254, which referred to the ‘voluntary return’ of Syrian refugees, Lebanon’s Foreign Minister, Gibran Bassil, voiced strong opposition to the Resolution, and wrote to the UN Secretary-General to argue that voluntary return could indicate attempts to ‘settle Syrians’ in Lebanon.</span><span class="xrefLink" data-dcnode-id="3019" id="jumplink-fn0100"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3016" data-google-interstitial="false" data-open="fn0100" href="javascript:;" reveal-id="fn0100"><sup data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">100</span></sup></a><span data-dcnode-id="3015" instrument_node=""> Many Lebanese political figures appear uncomfortable with the voluntary aspect of voluntary return, preferring to speak of ‘safe return’, a notion that human rights groups fear aims to clear a path for the non-voluntary return of refugees to ostensibly ‘safe’ areas in their countries of origin.</span><span class="xrefLink" data-dcnode-id="3014" id="jumplink-fn0101"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3011" data-google-interstitial="false" data-open="fn0101" href="javascript:;" reveal-id="fn0101"><sup data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">101</span></sup></a></p><p class="chapter-para" data-dcnode-id="2992"><span data-dcnode-id="3009" instrument_node="">Additionally, in the Lebanese discourse, the concepts of local integration and resettlement have often been used interchangeably. While ‘resettlement’ is understood in international refugee law as ‘involving the selection and transfer of refugees from a State in which they have sought protection to a third state which has agreed to admit them – as refugees – with permanent residence status’,</span><span class="xrefLink" data-dcnode-id="3008" id="jumplink-fn0102"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3005" data-google-interstitial="false" data-open="fn0102" href="javascript:;" reveal-id="fn0102"><sup data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">102</span></sup></a><span data-dcnode-id="3004" instrument_node=""> in Lebanon, this term is often applied to situations of local integration or naturalization (</span><em data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">tawteen</span></em><span data-dcnode-id="3001" instrument_node="">) in both third countries </span><em data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">and</span></em><span data-dcnode-id="2998" instrument_node=""> in Lebanon. An example of this conflation is found in the statements made by Lebanon to the CERD Committee in 2015, where one representative stated that ‘Lebanon was not seeking to definitively resettle refugees [in Lebanon], as it hoped that they would be able to safely return home one day’.</span><span class="xrefLink" data-dcnode-id="2997" id="jumplink-fn0103"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2994" data-google-interstitial="false" data-open="fn0103" href="javascript:;" reveal-id="fn0103"><sup data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">103</span></sup></a><span data-dcnode-id="2993" instrument_node=""> Again, note the reference to the preferred notion of ‘safe return’.</span></p><span data-dcnode-id="2991" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2989" data-legacy-id="s9" id="100519674" scrollto-destination="100519674"><span data-dcnode-id="2990" instrument_node="">4.2 Third-party surrogacy</span></h3><span data-dcnode-id="2988" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2965"><span data-dcnode-id="2987" instrument_node="">Another key reason why Lebanon is reluctant to ratify the 1951 Refugee Convention lies in the issue of third-party responsibility over Lebanon’s refugees. Kagan has long written about the responsibility-shift from the sovereign State to the UN which is so prevalent in the Middle East for both Palestine and non-Palestine refugees.</span><span class="xrefLink" data-dcnode-id="2986" id="jumplink-fn0104"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2983" data-google-interstitial="false" data-open="fn0104" href="javascript:;" reveal-id="fn0104"><sup data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">104</span></sup></a><span data-dcnode-id="2982" instrument_node=""> In this context, when the UN becomes a ‘surrogate State’, many governments in the region are more likely to tolerate the presence of refugees on their territory if responsibility for them is assigned to a third party. In general, Palestine refugees fall under the mandate of UNRWA, while UNHCR has long done the ‘handling’ of all non-Palestine refugees. As one government official explained: ‘UNHCR has </span><em data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">relieved</span></em><span data-dcnode-id="2979" instrument_node=""> the Lebanese government from the </span><em data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">burden</span></em><span data-dcnode-id="2976" instrument_node=""> of all non-Palestinian refugees for more than 50 years’.</span><span class="xrefLink" data-dcnode-id="2975" id="jumplink-fn0105"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2972" data-google-interstitial="false" data-open="fn0105" href="javascript:;" reveal-id="fn0105"><sup data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">105</span></sup></a><span data-dcnode-id="2971" instrument_node=""> It was, in the official’s view, the ‘normal order of things’ that UNHCR was in charge of refugee situations, ‘considering that Lebanon is not a country of asylum and that it has not signed the Refugee Convention’.</span><span class="xrefLink" data-dcnode-id="2970" id="jumplink-fn0106"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2967" data-google-interstitial="false" data-open="fn0106" href="javascript:;" reveal-id="fn0106"><sup data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">106</span></sup></a><span data-dcnode-id="2966" instrument_node=""> He/she also argued that ‘when the host state disassociates itself from refugees, UNHCR’s mandate requires that it provides refugees with the necessary protection’. The obvious advantages for Lebanon of such surrogacy have made the State less inclined to become a party to the 1951 Convention and take on many tasks itself. The general belief in Lebanon is that should it ratify the Convention, it would be required to bear more of the burden, practically and economically, but also politically.</span></p><p class="chapter-para" data-dcnode-id="2946"><span data-dcnode-id="2964" instrument_node="">Under the UN ‘surrogate State’ approach, UNHCR carries the heaviest burden of addressing refugees’ positive liberties by carrying out status determination, registration, healthcare, education, nutrition, and livelihood assistance. Host States, on the other hand, are able to ‘protect’ refugees ‘simply by restraining the impact of restrictive immigration policies through a policy of benign neglect’.</span><span class="xrefLink" data-dcnode-id="2963" id="jumplink-fn0107"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2960" data-google-interstitial="false" data-open="fn0107" href="javascript:;" reveal-id="fn0107"><sup data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">107</span></sup></a><span data-dcnode-id="2959" instrument_node=""> Indeed, Lebanon’s statements to the international human rights bodies are quite revealing in regards to how it perceives the role of the UN, at least when it comes to Palestine refugees. It has </span><em data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">inter alia</span></em><span data-dcnode-id="2956" instrument_node=""> claimed that the enforcement of Palestinian rights is UNRWA’s responsibility,</span><span class="xrefLink" data-dcnode-id="2955" id="jumplink-fn0108"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2952" data-google-interstitial="false" data-open="fn0108" href="javascript:;" reveal-id="fn0108"><sup data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">108</span></sup></a><span data-dcnode-id="2951" instrument_node=""> and, more specifically, that ‘the question of Palestinian refugees was the responsibility of the international community and not of Lebanon’.</span><span class="xrefLink" data-dcnode-id="2950" id="jumplink-fn0109"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2947" data-google-interstitial="false" data-open="fn0109" href="javascript:;" reveal-id="fn0109"><sup data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">109</span></sup></a></p><p class="chapter-para" data-dcnode-id="2930"><span data-dcnode-id="2945" instrument_node="">Lebanon has similarly long been reliant on UNHCR to protect and assist, and to seek durable solutions for all non-Palestine refugees. In 1963, Lebanon and UNHCR entered into a ‘Gentleman’s Agreement’, which remained in place until the late 1990s, when it finally broke down.</span><span class="xrefLink" data-dcnode-id="2944" id="jumplink-fn0110"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2941" data-google-interstitial="false" data-open="fn0110" href="javascript:;" reveal-id="fn0110"><sup data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">110</span></sup></a><span data-dcnode-id="2940" instrument_node=""> It was replaced in 2003 with the MoU between UNHCR and Lebanon’s General Security Office, which generally outlined the conditions for cooperation between the parties. Middle Eastern governments often consider such MoUs as more attractive than ratifying the Convention, but they may also, as Zaiotti has argued, ‘represent an intermediate stage towards access to the international refugee regime’.</span><span class="xrefLink" data-dcnode-id="2939" id="jumplink-fn0111"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2936" data-google-interstitial="false" data-open="fn0111" href="javascript:;" reveal-id="fn0111"><sup data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">111</span></sup></a><span data-dcnode-id="2935" instrument_node=""> It may be for this reason that when the 2003 MoU broke down, only a few years after its negotiation, it was challenging for UNHCR to formally regulate its cooperation with the government. Recent negotiations regarding a new MoU failed to bear fruit, and one government official explained that the Lebanese government’s ‘concerns over an agreement is due to the fear of transforming Lebanon into a country of asylum as well as attracting more refugees from around the region’.</span><span class="xrefLink" data-dcnode-id="2934" id="jumplink-fn0112"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2931" data-google-interstitial="false" data-open="fn0112" href="javascript:;" reveal-id="fn0112"><sup data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">112</span></sup></a></p><p class="chapter-para" data-dcnode-id="2915"><span data-dcnode-id="2929" instrument_node="">A frequent argument made by several Middle Eastern governments is that they cannot bear the economic cost of refugee recognition, which incurs heavy financial burdens. Indeed, Lebanon has similarly argued before several UN human rights bodies that its efforts to implement the human rights provisions of, for example, the CRC, have been hampered by a lack of financial resources.</span><span class="xrefLink" data-dcnode-id="2928" id="jumplink-fn0113"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2925" data-google-interstitial="false" data-open="fn0113" href="javascript:;" reveal-id="fn0113"><sup data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">113</span></sup></a><span data-dcnode-id="2924" instrument_node=""> During an interview, a government official claimed that the Refugee Convention would be detrimental to the government’s work because ‘with the number of Syrians here we would need to recruit half the population to do case work’.</span><span class="xrefLink" data-dcnode-id="2923" id="jumplink-fn0114"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2920" data-google-interstitial="false" data-open="fn0114" href="javascript:;" reveal-id="fn0114"><sup data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">114</span></sup></a><span data-dcnode-id="2919" instrument_node=""> This suggests a lack of awareness or ignorance of the availability of group-based, or </span><em data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">prima facie</span></em><span data-dcnode-id="2916" instrument_node="">, refugee status.</span></p><p class="chapter-para" data-dcnode-id="2889"><span data-dcnode-id="2914" instrument_node="">While Lebanon has long had one of the highest levels of government debt in the world,</span><span class="xrefLink" data-dcnode-id="2913" id="jumplink-fn0115"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2910" data-google-interstitial="false" data-open="fn0115" href="javascript:;" reveal-id="fn0115"><sup data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">115</span></sup></a><span data-dcnode-id="2909" instrument_node=""> estimates about the effect of the Syrian influx on Lebanon’s economy are heavily politicized and contested. Government-affiliated studies have found the Syrian influx to have had a negative impact of on Lebanon’s economy,</span><span class="xrefLink" data-dcnode-id="2908" id="jumplink-fn0116"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2905" data-google-interstitial="false" data-open="fn0116" href="javascript:;" reveal-id="fn0116"><sup data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">116</span></sup></a><span data-dcnode-id="2904" instrument_node=""> while, in contrast, international organizations and independent researchers have found evidence that suggests that the Lebanese economy is sufficiently resilient to absorb new workers without adverse effects for host-country residents.</span><span class="xrefLink" data-dcnode-id="2903" id="jumplink-fn0117"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2900" data-google-interstitial="false" data-open="fn0117" href="javascript:;" reveal-id="fn0117"><sup data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">117</span></sup></a><span data-dcnode-id="2899" instrument_node=""> However, while the international community’s humanitarian response has helped to mitigate the effects of the Syrian conflict, studies have shown that it has not completely offset them.</span><span class="xrefLink" data-dcnode-id="2898" id="jumplink-fn0118"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2895" data-google-interstitial="false" data-open="fn0118" href="javascript:;" reveal-id="fn0118"><sup data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">118</span></sup></a><span data-dcnode-id="2894" instrument_node=""> In any case, keeping the country’s refugees under the purview of the UN enables them to remain highly visible, and maintains the pressure on the international community to continue to support their care and maintenance. Equally important, in the Middle East, is that the involvement of a third party often portrays the refugee presence as temporary – although protracted refugee situations in other parts of the world have demonstrated that such an argument lacks basis.</span><span class="xrefLink" data-dcnode-id="2893" id="jumplink-fn0119"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2890" data-google-interstitial="false" data-open="fn0119" href="javascript:;" reveal-id="fn0119"><sup data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">119</span></sup></a></p><p class="chapter-para" data-dcnode-id="2865"><span data-dcnode-id="2888" instrument_node="">Politically, Lebanon has long considered UNHCR to be a useful tool in dealing with refugee flows. Lebanon is characterized by different communal groups seeking to dominate others politically, as well as by the need for consensus on all decisions and a </span><em data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">de facto</span></em><span data-dcnode-id="2885" instrument_node=""> veto power that disrupts the political process.</span><span class="xrefLink" data-dcnode-id="2884" id="jumplink-fn0120"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2881" data-google-interstitial="false" data-open="fn0120" href="javascript:;" reveal-id="fn0120"><sup data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">120</span></sup></a><span data-dcnode-id="2880" instrument_node=""> In such circumstances, and when institutions are weak, it is particularly attractive to leave the refugee issue to a third party. Indeed, in the early stages of the Syrian influx to Lebanon, Lebanese political actors struggled to find a common approach to handling the situation, leading the Minister of Social Affairs to explain that the best way to deal with the Syrian influx was under the auspices of the UN: ‘Working under the UN would be discrete and more effective in this case’.</span><span class="xrefLink" data-dcnode-id="2879" id="jumplink-fn0121"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2876" data-google-interstitial="false" data-open="fn0121" href="javascript:;" reveal-id="fn0121"><sup data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">121</span></sup></a><span data-dcnode-id="2875" instrument_node=""> This, of course, has also had its downsides. As one government official, only half-jokingly, told me, in the course of the Syrian refugee response, ‘UNHCR became stronger, became more important than the President of the Republic … [it became a] major decision-maker in the country’.</span><span class="xrefLink" data-dcnode-id="2874" id="jumplink-fn0122"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2871" data-google-interstitial="false" data-open="fn0122" href="javascript:;" reveal-id="fn0122"><sup data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">122</span></sup></a><span data-dcnode-id="2870" instrument_node=""> It is therefore no surprise that not all domestic actors are content with shifting the responsibility for important issues to a third party; Lebanon’s Foreign Minister, renowned for his tense relationship with UNHCR, has on several occasions threatened to keep the agency on a short leash. In 2014, he commented to local media: ‘From now on, Lebanon will be setting making refugee policies while the others, including UNHCR, will work according to them and not the other way around’.</span><span class="xrefLink" data-dcnode-id="2869" id="jumplink-fn0123"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2866" data-google-interstitial="false" data-open="fn0123" href="javascript:;" reveal-id="fn0123"><sup data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">123</span></sup></a></p><p class="chapter-para" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">There are further political reasons for Lebanon’s reluctance to commit to the international refugee regime. The following section examines the good-neighbourliness argument.</span></p><span data-dcnode-id="2862" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2860" data-legacy-id="s10" id="100519682" scrollto-destination="100519682"><span data-dcnode-id="2861" instrument_node="">4.3 Good-neighbourliness</span></h3><span data-dcnode-id="2859" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2847"><span data-dcnode-id="2858" instrument_node="">The 1992 Declaration on the Protection of Refugees and Displaced Persons in the Arab World echoes the 1951 Refugee Convention in stating that ‘the granting of asylum should not … be regarded as an unfriendly act vis-à-vis any other State’.</span><span class="xrefLink" data-dcnode-id="2857" id="jumplink-fn0124"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2854" data-google-interstitial="false" data-open="fn0124" href="javascript:;" reveal-id="fn0124"><sup data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">124</span></sup></a><span data-dcnode-id="2853" instrument_node=""> However, this principle – the Declaration being endorsed only by Egypt – has had to give way to the ‘good-neighbourliness’ argument, which takes as central the general principle that States should not interfere in the ‘sensitive issues’ of neighbouring countries. Not wanting to accuse fellow Arab States of persecution, it is a political problem for many Middle Eastern States that refugees in this region typically come from neighbours.</span><span class="xrefLink" data-dcnode-id="2852" id="jumplink-fn0125"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2849" data-google-interstitial="false" data-open="fn0125" href="javascript:;" reveal-id="fn0125"><sup data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">125</span></sup></a><span data-dcnode-id="2848" instrument_node=""> One way of ameliorating these political sensitivities is thus to avoid responsibility for the refugees by handing over the responsibility to third parties, and by avoiding certain obligations towards refugees by remaining non-parties to the 1951 Refugee Convention. Ratifying the Convention would, it is often thought, entail a duty to recognize certain forced migrants as refugees.</span></p><p class="chapter-para" data-dcnode-id="2831"><span data-dcnode-id="2846" instrument_node="">While Lebanon’s history with Palestine refugees demonstrates that refugees may indeed represent a geopolitical and strategic concern, these concerns became even more acute when Syrian nationals began seeking protection in Lebanon in the spring of 2011. Lebanese political groups are sharply split over the conflict in Syria.</span><span class="xrefLink" data-dcnode-id="2845" id="jumplink-fn0126"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2842" data-google-interstitial="false" data-open="fn0126" href="javascript:;" reveal-id="fn0126"><sup data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">126</span></sup></a><span data-dcnode-id="2841" instrument_node=""> At the same time, the country has long had special relations with Syria, evident not least in treaties such as the Treaty of Brotherhood, Cooperation and Coordination between the Syrian Arab Republic and the Lebanese Republic.</span><span class="xrefLink" data-dcnode-id="2840" id="jumplink-fn0127"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2837" data-google-interstitial="false" data-open="fn0127" href="javascript:;" reveal-id="fn0127"><sup data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">127</span></sup></a><span data-dcnode-id="2836" instrument_node=""> These special relations are also highlighted in the Taef Agreement that ended Lebanon’s civil war in 1990. Here, Syrian forces were given a specific role in assisting the Lebanese government’s assertion of authority over its territory, justified by the idea that Syria and Lebanon have ‘the roots of blood relationships, history and joint fraternal interests’.</span><span class="xrefLink" data-dcnode-id="2835" id="jumplink-fn0128"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2832" data-google-interstitial="false" data-open="fn0128" href="javascript:;" reveal-id="fn0128"><sup data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">128</span></sup></a></p><p class="chapter-para" data-dcnode-id="2824"><span data-dcnode-id="2830" instrument_node="">In June 2012, Lebanon’s caretaker government established a policy of neutrality towards the events in Syria under the label of the ‘disassociation policy’.</span><span class="xrefLink" data-dcnode-id="2829" id="jumplink-fn0129"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2826" data-google-interstitial="false" data-open="fn0129" href="javascript:;" reveal-id="fn0129"><sup data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">129</span></sup></a><span data-dcnode-id="2825" instrument_node=""> The policy aimed to preserve the delicate political balance between the various sectarian forces that, as political factions, were unable to come to agreement. Lebanese politicians were generally divided between pro-Syrian regime supporters and pro-opposition supporters, and there was no possibility of reaching a consensus even on how to respond to the refugee influx. This explains why Judge Khatib’s ruling on the UDHR article 14 right to seek asylum was perceived by some as evidence of support for the Syrian opposition. However, the Syrian regime still had a strong influence on segments of the Lebanese political field despite officially withdrawing from Lebanese territory in 2005.</span></p><p class="chapter-para" data-dcnode-id="2803"><span data-dcnode-id="2823" instrument_node="">The ‘good-neighbourliness’ argument nevertheless holds that Lebanon should not employ the term ‘refugee’ because by doing so the State would find itself in positions that could violate the good neighbour principle. Indeed, one strand of the Lebanese government’s disassociation policy was the enforcement of the term ‘displaced persons’ (‘</span><em data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">nazihoun</span></em><span data-dcnode-id="2820" instrument_node="">’) rather than ‘refugees’ (‘</span><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">lajioun</span></em><span data-dcnode-id="2817" instrument_node="">’). In this way, as a senior government adviser explained, ‘the Lebanese government not only avoided labelling those who have fled to Lebanon as people escaping from persecution, it avoided acknowledging that there is a war in Syria’.</span><span class="xrefLink" data-dcnode-id="2816" id="jumplink-fn0130"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2813" data-google-interstitial="false" data-open="fn0130" href="javascript:;" reveal-id="fn0130"><sup data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">130</span></sup></a><span data-dcnode-id="2812" instrument_node=""> The difficulties of labelling Syrians seeking protection nevertheless continued long after the policy was adopted. This is evident in official government and UN documents, such as the LCRP, which introduces various terms – including the curious notion of ‘</span><em data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">de facto</span></em><span data-dcnode-id="2809" instrument_node=""> refugees’</span><span class="xrefLink" data-dcnode-id="2808" id="jumplink-fn0131"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2805" data-google-interstitial="false" data-open="fn0131" href="javascript:;" reveal-id="fn0131"><sup data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">131</span></sup></a><span data-dcnode-id="2804" instrument_node=""> – to refer to persons who fled from Syria after March 2011:</span></p><blockquote data-dcnode-id="2796"><p class="chapter-para" data-dcnode-id="2797"><span data-dcnode-id="2802" instrument_node="">1. ‘persons displaced from Syria’ (which can, depending on context, include Palestine refugees from Syria and Lebanese Returnees as well as registered and unregistered Syrian nationals), 2. ‘persons registered as refugees by UNHCR’, and 3. ‘de facto refugees’. (both 2. and 3. referring exclusively to Syrian nationals who are registered with UNHCR or seeking registration.</span><span class="xrefLink" data-dcnode-id="2801" id="jumplink-fn0132"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2798" data-google-interstitial="false" data-open="fn0132" href="javascript:;" reveal-id="fn0132"><sup data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">132</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">The LCRP furthermore refers to the question of Lebanon’s ‘voluntary’ application of the 1951 Refugee Convention, which leads to the next and final argument – that many in Lebanon consider the Convention redundant.</span></p><span data-dcnode-id="2793" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2791" data-legacy-id="s11" id="100519689" scrollto-destination="100519689"><span data-dcnode-id="2792" instrument_node="">4.4 The ‘redundancy’ of the 1951 Refugee Convention</span></h3><span data-dcnode-id="2790" instrument_node="">
</span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="2788" data-legacy-id="s12" id="100519690" scrollto-destination="100519690"><span data-dcnode-id="2789" instrument_node="">4.4.1 Lebanon’s ‘voluntary’ application of Convention provisions</span></h4><span data-dcnode-id="2787" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2769"><span data-dcnode-id="2786" instrument_node="">A more recent argument legitimizing Lebanon’s non-accession to the 1951 Refugee Convention claims that accession to the Convention is redundant for a number of reasons. First, it is argued, Lebanon need not accede to the Convention as it already applies many of its provisions voluntarily. This sentiment was already discernable in 2006, when Lebanon sought to become a member of the UN Human Rights Council, and outlined its human rights record in a letter addressed to the UN Secretary-General. On the Refugee Convention, it wrote: ‘Lebanon is not a party to this Convention, </span><em data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">but</span></em><span data-dcnode-id="2783" instrument_node=""> the Lebanese authorities pursue a strategy of protecting refugees and persons who have entered Lebanon illegally’.</span><span class="xrefLink" data-dcnode-id="2782" id="jumplink-fn0133"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2779" data-google-interstitial="false" data-open="fn0133" href="javascript:;" reveal-id="fn0133"><sup data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">133</span></sup></a><span data-dcnode-id="2778" instrument_node=""> A decade later, in August 2016, a Lebanese representative told the CERD Committee that: ‘Lebanon had never closed its borders to persons at risk of persecution </span><em data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">although</span></em><span data-dcnode-id="2775" instrument_node=""> it was not a signatory to the 1951 Convention relating to the Status of Refugees’.</span><span class="xrefLink" data-dcnode-id="2774" id="jumplink-fn0134"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2771" data-google-interstitial="false" data-open="fn0134" href="javascript:;" reveal-id="fn0134"><sup data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">134</span></sup></a><span data-dcnode-id="2770" instrument_node=""> The same argument was made to the CEDAW Committee in 2015, when the Lebanese representative stated that:</span></p><blockquote data-dcnode-id="2759"><p class="chapter-para" data-dcnode-id="2760"><span data-dcnode-id="2768" instrument_node="">Lebanon, </span><em data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">although</span></em><span data-dcnode-id="2765" instrument_node=""> it did not sign the 1951 Convention and 1967 Protocol Relating to the Status of Refugees, complies with the principle of non-refoulement of refugees. The General Directorate of General Security does not deport persons whom it believes will be subjected to danger, violence or threat in their countries.</span><span class="xrefLink" data-dcnode-id="2764" id="jumplink-fn0135"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2761" data-google-interstitial="false" data-open="fn0135" href="javascript:;" reveal-id="fn0135"><sup data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">135</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2732"><span data-dcnode-id="2758" instrument_node="">It is arguable that Lebanon is bound by many key refugee protection principles by means of customary international law, or by other human rights treaties to which it is in fact a party. In other words, it need not apply the 1951 Refugee Convention </span><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">voluntarily</span></em><span data-dcnode-id="2755" instrument_node=""> to be bound, for instance, by the principle of </span><em data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">non-refoulement</span></em><span data-dcnode-id="2752" instrument_node="">. In addition to the 1951 Convention, the principle of </span><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">non-refoulement</span></em><span data-dcnode-id="2749" instrument_node=""> is expressed in article 3 of the 1984 UN Convention against Torture – a treaty ratified by Lebanon.</span><span class="xrefLink" data-dcnode-id="2748" id="jumplink-fn0136"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2745" data-google-interstitial="false" data-open="fn0136" href="javascript:;" reveal-id="fn0136"><sup data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">136</span></sup></a><span data-dcnode-id="2744" instrument_node=""> At the same time, some scholars have argued that </span><em data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">non-refoulement</span></em><span data-dcnode-id="2741" instrument_node=""> is a long-standing rule of customary international law, which would then bind Lebanon irrespective of other treaty obligations.</span><span class="xrefLink" data-dcnode-id="2740" id="jumplink-fn0137"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2737" data-google-interstitial="false" data-open="fn0137" href="javascript:;" reveal-id="fn0137"><sup data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">137</span></sup></a><span data-dcnode-id="2736" instrument_node=""> However, non-ratification due to other human rights commitments appears to be a separate argument, as shown below. The claim of </span><em data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">voluntarily</span></em><span data-dcnode-id="2733" instrument_node=""> applying the Refugee Convention’s provisions appears to be a specific political and rhetorical point that has even been included in official Lebanese documents, as well as in those of the UN.</span></p><p class="chapter-para" data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">The LCRP, for example, sets out the premise of Lebanon’s refugee response with regard to the international refugee regime. It notably includes a preambular text-box explicitly stating that:</span></p><blockquote data-dcnode-id="2723"><p class="chapter-para" data-dcnode-id="2724"><span data-dcnode-id="2729" instrument_node="">Lebanon is not a State Party to the 1951 Convention Relating to the Status of Refugees and has not signed its 1967 Protocol. Lebanon implements some provisions of the Convention on a voluntary basis and considers that granting the refugee status to individuals lies within its margin of discretion.</span><span class="xrefLink" data-dcnode-id="2728" id="jumplink-fn0138"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2725" data-google-interstitial="false" data-open="fn0138" href="javascript:;" reveal-id="fn0138"><sup data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">138</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2717"><span data-dcnode-id="2722" instrument_node="">Interestingly, this approach has also been adopted in international donor documents. For instance, the outcome document of the Berlin Conference on the Syrian Refugee Situation in 2014 includes a section stating that: ‘some host countries are not State Parties to the 1951 Geneva Convention on Refugees and its 1967 Protocol, and … they are implementing some of their provisions on a voluntary basis’.</span><span class="xrefLink" data-dcnode-id="2721" id="jumplink-fn0139"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2718" data-google-interstitial="false" data-open="fn0139" href="javascript:;" reveal-id="fn0139"><sup data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">139</span></sup></a></p><p class="chapter-para" data-dcnode-id="2691"><span data-dcnode-id="2716" instrument_node="">Government officials argued during interviews that the Lebanese response to the Syrian influx in terms of what they call ‘</span><em data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">de facto</span></em><span data-dcnode-id="2713" instrument_node=""> rights’ had not been affected by the fact that Lebanon is a non-party to the Convention. As one explained, the measures taken by the government, ‘although late and hesitant, were similar to the behaviour of a signatory country of the Convention’.</span><span class="xrefLink" data-dcnode-id="2712" id="jumplink-fn0140"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2709" data-google-interstitial="false" data-open="fn0140" href="javascript:;" reveal-id="fn0140"><sup data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">140</span></sup></a><span data-dcnode-id="2708" instrument_node=""> Another official not only stressed that Lebanon voluntarily applied most of the Convention’s provisions, but also that this included voluntarily applying the Convention’s derogation clause in article 9, which presupposes that there may be circumstances warranting and justifying that Contracting States withhold all or certain components of refugee status.</span><span class="xrefLink" data-dcnode-id="2707" id="jumplink-fn0141"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2704" data-google-interstitial="false" data-open="fn0141" href="javascript:;" reveal-id="fn0141"><sup data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">141</span></sup></a><span data-dcnode-id="2703" instrument_node=""> This suggests that certain actors possess detailed knowledge of the contents and scope of the Convention, which might be explained by UNHCR’s consistent efforts to increase knowledge of the basics of international refugee law. However, interviews with UN staff suggest that Lebanon’s insistence on its </span><em data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">voluntary</span></em><span data-dcnode-id="2700" instrument_node=""> application of the Convention has become an issue of apprehension.</span><span class="xrefLink" data-dcnode-id="2699" id="jumplink-fn0142"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2696" data-google-interstitial="false" data-open="fn0142" href="javascript:;" reveal-id="fn0142"><sup data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">142</span></sup></a><span data-dcnode-id="2695" instrument_node=""> While UNHCR currently pragmatically accepts States not ratifying the Refugee Convention as long as they uphold the refugee protection principles embedded therein, some argue that the Lebanese claim of voluntary application of the Convention shifts the focus from being a question of obligation to being an issue of generosity and hospitality. This, it is argued, detracts from the fact that Lebanon </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">has</span></em><span data-dcnode-id="2692" instrument_node=""> international law commitments stemming from a number of sources that are key in refugee protection. It is to these obligations that the next section turns.</span></p><span data-dcnode-id="2690" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="2688" data-legacy-id="s13" id="100519698" scrollto-destination="100519698"><span data-dcnode-id="2689" instrument_node="">4.4.2 Lebanon: ‘a human rights pioneer’</span></h4><span data-dcnode-id="2687" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2670"><span data-dcnode-id="2686" instrument_node="">By virtue of its membership of the UN and its ratification of a number of core human rights instruments, Lebanon has a number of human rights obligations towards refugees on its territory. For this reason, some argue, any ratification of the 1951 Refugee Convention is superfluous. Lebanese politicians often stress the measures Lebanon is taking to abide by ‘international standards’,</span><span class="xrefLink" data-dcnode-id="2685" id="jumplink-fn0143"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2682" data-google-interstitial="false" data-open="fn0143" href="javascript:;" reveal-id="fn0143"><sup data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">143</span></sup></a><span data-dcnode-id="2681" instrument_node=""> and, as one government official correctly pointed out, ‘in order to provide basic rights to refugees, a country does not have to be a party to the Convention’.</span><span class="xrefLink" data-dcnode-id="2680" id="jumplink-fn0144"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2677" data-google-interstitial="false" data-open="fn0144" href="javascript:;" reveal-id="fn0144"><sup data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">144</span></sup></a><span data-dcnode-id="2676" instrument_node=""> Lebanon’s history of participating in drafting some of the earliest international human rights instruments has, furthermore, brought about a notion of Lebanon being the cradle of human rights, and it is not uncommon to hear the argument that ‘in the Middle East we are pioneers’.</span><span class="xrefLink" data-dcnode-id="2675" id="jumplink-fn0145"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2672" data-google-interstitial="false" data-open="fn0145" href="javascript:;" reveal-id="fn0145"><sup data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">145</span></sup></a><span data-dcnode-id="2671" instrument_node=""> A senior UN official commented:</span></p><blockquote data-dcnode-id="2661"><p class="chapter-para" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">One day I was so surprised by one of the intelligence officers who was completely rejecting the 1951 Convention, but then went on and on about how Lebanon was part of drafting the UN Charter, or I don’t know what, the ICCPR, or whatever. So I was thinking, ‘Okay, you are telling me that you are completely ignoring the ’51 Convention but everything else is thanks to Lebanon that we have all of these treaties …’</span></p><p class="chapter-para" data-dcnode-id="2662"><span data-dcnode-id="2667" instrument_node="">And at the end of the conversation I was like, ‘Do you realize that the 1951 Convention, except the definition of refugees, it’s all the rights in all the other instruments that you claim Lebanon wrote, basically, almost wrote from scratch’. So I think that they have a sense of being very proud of a lot of achievements in the UN …</span><span class="xrefLink" data-dcnode-id="2666" id="jumplink-fn0146"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2663" data-google-interstitial="false" data-open="fn0146" href="javascript:;" reveal-id="fn0146"><sup data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">146</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Indeed, Lebanon was a member of the eight-person drafting committee for the UDHR, an accomplishment that was also emphasized during Lebanon’s candidacy to the UN Human Rights Council in 2006:</span></p><blockquote data-dcnode-id="2652"><p class="chapter-para" data-dcnode-id="2653"><span data-dcnode-id="2658" instrument_node="">Lebanon has consistently contributed towards the development of a balanced, fair and effective international human rights system that works for the promotion and protection of all human rights through dialogue, cooperation, capacity-building, and technical cooperation. Lebanon played a key role in the elaboration of the Universal Declaration through a leading Lebanese figure, Dr. Charles Malik, who chaired the UN Commission on Human Rights for two consecutive terms (1951–1952).</span><span class="xrefLink" data-dcnode-id="2657" id="jumplink-fn0147"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2654" data-google-interstitial="false" data-open="fn0147" href="javascript:;" reveal-id="fn0147"><sup data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">147</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Lebanon’s long relationship with the UN human rights system is also reflected in the preamble to the Lebanese Constitution, which states that:</span></p><blockquote data-dcnode-id="2643"><p class="chapter-para" data-dcnode-id="2644"><span data-dcnode-id="2649" instrument_node="">Lebanon is also a founding and active member of the United Nations Organization and abides by its covenants and by the Universal Declaration of Human Rights. The Government shall embody these principles in all fields and areas without exception.</span><span class="xrefLink" data-dcnode-id="2648" id="jumplink-fn0148"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2645" data-google-interstitial="false" data-open="fn0148" href="javascript:;" reveal-id="fn0148"><sup data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">148</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">However, as mentioned above, while Lebanon has signed a number of international human rights law instruments that constitutionally take precedence over national law, their principles are seldom practised in domestic courts.</span></p><p class="chapter-para" data-dcnode-id="2634"><span data-dcnode-id="2640" instrument_node="">On other occasions, some have argued, Lebanon goes beyond what would be required of them as a party to the 1951 Convention. As one government official explained, ‘Lebanon’s international commitments to refugees go beyond the matter of signing the Convention and Protocol’.</span><span class="xrefLink" data-dcnode-id="2639" id="jumplink-fn0149"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2636" data-google-interstitial="false" data-open="fn0149" href="javascript:;" reveal-id="fn0149"><sup data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">149</span></sup></a><span data-dcnode-id="2635" instrument_node=""> Another insisted:</span></p><blockquote data-dcnode-id="2627"><p class="chapter-para" data-dcnode-id="2628"><span data-dcnode-id="2633" instrument_node="">Lebanon is in fact more generous than the 1951 Refugee Convention: according to the Refugee Convention, refugees are allowed to work first after three years. The Lebanese government allows refugees to work as soon as they arrive, at least in these three sectors: cleaning, construction, agriculture.</span><span class="xrefLink" data-dcnode-id="2632" id="jumplink-fn0150"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2629" data-google-interstitial="false" data-open="fn0150" href="javascript:;" reveal-id="fn0150"><sup data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">150</span></sup></a></p></blockquote><span data-dcnode-id="2626" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="2624" data-legacy-id="s14" id="100519708" scrollto-destination="100519708"><span data-dcnode-id="2625" instrument_node="">4.4.3 The global ‘crisis’ of the 1951 Refugee Convention</span></h4><span data-dcnode-id="2623" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2609"><span data-dcnode-id="2622" instrument_node="">Finally, many Lebanese decision makers consider the 1951 Refugee Convention redundant due to recent global developments in which many States appear to reject the Convention altogether. International refugee law is in crisis, many would argue, and calls to scrap or reform the Refugee Convention have been widely made.</span><span class="xrefLink" data-dcnode-id="2621" id="jumplink-fn0151"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2618" data-google-interstitial="false" data-open="fn0151" href="javascript:;" reveal-id="fn0151"><sup data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">151</span></sup></a><span data-dcnode-id="2617" instrument_node=""> This, as well as European countries’ deterrent policies – including the erection of barbed wire fences and the passing of more restrictive domestic refugee and asylum legislation – has not gone unnoticed in Lebanon. Lebanese media had almost daily coverage of Europe’s refugee ‘crisis’ in 2015. Speaking to the CERD Committee in August 2015, the Lebanese representative made apparent reference to the situation: ‘The Lebanese Government … respected the principle of non-refoulement </span><em data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">and it was not erecting walls or barbed-wire fences</span></em><span data-dcnode-id="2614" instrument_node="">’.</span><span class="xrefLink" data-dcnode-id="2613" id="jumplink-fn0152"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2610" data-google-interstitial="false" data-open="fn0152" href="javascript:;" reveal-id="fn0152"><sup data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">152</span></sup></a></p><p class="chapter-para" data-dcnode-id="2602"><span data-dcnode-id="2608" instrument_node="">The perceived crisis in international refugee law has been used to justify Lebanon’s non-ratification of the Refugee Convention. A government official referred to the situation in Europe when asked about non-ratification, and claimed that ‘even’ Scandinavian countries now consider the Refugee Convention outdated: ‘If they think so, why should Lebanon become a party?’.</span><span class="xrefLink" data-dcnode-id="2607" id="jumplink-fn0153"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2604" data-google-interstitial="false" data-open="fn0153" href="javascript:;" reveal-id="fn0153"><sup data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">153</span></sup></a><span data-dcnode-id="2603" instrument_node=""> It is clear that developments in Europe and elsewhere have influenced Lebanese perceptions about the importance and advantages of the 1951 Refugee Convention, and have provided justification for not becoming a party to this core refugee protection instrument.</span></p><span data-dcnode-id="2601" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2599" data-legacy-id="s15" id="100519711" scrollto-destination="100519711"><span data-dcnode-id="2600" instrument_node="">5. CONCLUSIONS</span></h2><span data-dcnode-id="2598" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">This article has explored how Lebanon seeks to legitimize its rejection of the 1951 Refugee Convention. It has shown that there are many paradoxes in the behaviour of Lebanon towards refugees. On the one hand, it engaged actively in the establishment of the international refugee regime, and has been a member of UNHCR’s Executive Committee since 1963. It hosts the highest number of refugees per capita in the world, and – although it often fails to safeguard the rights of refugees present in the country – its approach to refugees has often been lauded by the international community. Yet, on the other hand, Lebanon insists that it is not a country of asylum, and rejects, in principle, the local integration of refugees.</span></p><p class="chapter-para" data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">The article has provided four examples of how Lebanon legitimizes its non-ratification of the 1951 Refugee Convention. First, there is widespread uncertainty and misunderstanding as to the obligations that come with the Convention, including a belief that the Convention would require Lebanon to allow permanent settlement of refugees on its territory. While such misunderstandings may sometimes be genuine, it is arguable that in many cases they are simply politically expedient; Lebanese political elites use opposition to the Convention as a source for political consensus and mobilization. Secondly, shifting the responsibility for refugees to third parties, such as UNHCR, has made Lebanon less inclined to become a party to the Convention. Thirdly, the ‘good-neighbourliness’ argument means that Lebanon rejects the term ‘refugee’, to avoid being put in positions that could violate the good neighbour principle. Finally, many Lebanese government officials and policymakers simply consider Lebanon’s accession to the Convention redundant.</span></p><p class="chapter-para" data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node="">Lebanon’s blatant ‘rejection’ of international refugee law places UNHCR and other refugee protection actors in a challenging position. This article has explored how, while UNHCR has chosen to adopt a ‘pragmatic but principled’ approach to avoid pressuring Lebanon into ratifying international refugee law instruments, as long as the country provides </span><em data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">de facto</span></em><span data-dcnode-id="2590" instrument_node=""> protection to refugees, such pressure has increasingly come from other UN human rights bodies. Future research could therefore concentrate more precisely on the actual benefits of treaty ratification for strengthening refugee protection in Lebanon (and in other non-signatory States). Treaty ratification might increase the normative strength of obligations towards refugees, as well as shifting the underlying responsibility for refugees in Lebanon from UNHCR to the State. However, UNHCR’s current focus on creating a politically negotiated and, therefore, pragmatic ‘protection space’ for refugees in Lebanon, rather than on persuading Lebanon to ratify the Convention, as well as Lebanon’s perception that Contracting States do not necessarily offer better practice than non-signatory States, suggests that this issue is far from straightforward.</span></p><p class="chapter-para" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">This research was supported by the Research Council of Norway, project No 240441/F10. The author is grateful to Alia Aoun, Kjersti G Berg, Magnus Dølerud, Lama Mourad, Dallal Stevens, and the anonymous peer reviewers for helpful comments on earlier drafts of this paper, as well as to the Issam Fares Institute of the American University of Beirut for being a generous host during the course of this research.</span></p><span data-dcnode-id="2586" instrument_node=""> </span><h3 class="footnotegroup-title js-splitscreen-footnotegroup-title" data-dcnode-id="2584" id="100519717" scrollto-destination="100519717"><span data-dcnode-id="2585" instrument_node="">Footnotes</span></h3><span data-dcnode-id="2583" instrument_node="">

88" instrument_node="">129</span></span></span><div class="footnote-content" data-dcnode-id="1383"><p class="footnote-compatibility" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Permanent Mission of Lebanon to the UN, Baabda Declaration Issued by the National Dialogue Committee on 11 June 2012, annexed to UN doc A/66/849–S/2012/477 (2012).</span></p></div></span></div><div class="footnote" content-id="fn0130" data-dcnode-id="1373"><span class="fn" data-dcnode-id="1374"><span class="label fn-label" data-dcnode-id="1378"><span class="end-note-link" data-dcnode-id="1379" data-fn-id="fn0130" rel="nofollow"><span data-dcnode-id="1380" instrument_node="">130</span></span></span><div class="footnote-content" data-dcnode-id="1375"><p class="footnote-compatibility" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Government official, Beirut, 10 June 2016.</span></p></div></span></div><div class="footnote" content-id="fn0131" data-dcnode-id="1362"><span class="fn" data-dcnode-id="1363"><span class="label fn-label" data-dcnode-id="1370"><span class="end-note-link" data-dcnode-id="1371" data-fn-id="fn0131" rel="nofollow"><span data-dcnode-id="1372" instrument_node="">131</span></span></span><div class="footnote-content" data-dcnode-id="1364"><p class="footnote-compatibility" data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">The term ‘</span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">de facto</span></em><span data-dcnode-id="1366" instrument_node=""> refugees’ has in comparison been used by scholars when forced migrants in Europe or North America have fallen outside the 1951 Refugee Convention’s definition of ‘refugee’ but nevertheless cannot return home. They have therefore often been allowed to remain in countries of asylum under various temporary statuses. See WT Worster, ‘The Evolving Definition of the Refugee in Contemporary International Law’ (2012) 30 Berkeley Journal of International Law 93, 116.</span></p></div></span></div><div class="footnote" content-id="fn0132" data-dcnode-id="1354"><span class="fn" data-dcnode-id="1355"><span class="label fn-label" data-dcnode-id="1359"><span class="end-note-link" data-dcnode-id="1360" data-fn-id="fn0132" rel="nofollow"><span data-dcnode-id="1361" instrument_node="">132</span></span></span><div class="footnote-content" data-dcnode-id="1356"><p class="footnote-compatibility" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">UNHCR and Government of Lebanon ‘LCRP’ (n 11).</span></p></div></span></div><div class="footnote" content-id="fn0133" data-dcnode-id="1343"><span class="fn" data-dcnode-id="1344"><span class="label fn-label" data-dcnode-id="1351"><span class="end-note-link" data-dcnode-id="1352" data-fn-id="fn0133" rel="nofollow"><span data-dcnode-id="1353" instrument_node="">133</span></span></span><div class="footnote-content" data-dcnode-id="1345"><p class="footnote-compatibility" data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">Permanent Mission of Lebanon to the UN, ‘Lebanon’s Pledges and Commitments: Lebanon’s Candidature to the Human Rights Council’ (2006) &lt;</span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1348" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/ga/60/elect/hrc/lebanon.pdf" target="_blank"><span data-dcnode-id="1349" instrument_node="">http://www.un.org/ga/60/elect/hrc/​lebanon.pdf</span></a><span data-dcnode-id="1347" instrument_node="">&gt; accessed 25 October 2016.</span></p></div></span></div><div class="footnote" content-id="fn0134" data-dcnode-id="1335"><span class="fn" data-dcnode-id="1336"><span class="label fn-label" data-dcnode-id="1340"><span class="end-note-link" data-dcnode-id="1341" data-fn-id="fn0134" rel="nofollow"><span data-dcnode-id="1342" instrument_node="">134</span></span></span><div class="footnote-content" data-dcnode-id="1337
