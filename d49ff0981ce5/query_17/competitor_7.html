the internal flight alternative and the concealment approach are applied during the RSD process of LGBTI asylum seekers since they may also play a decisive role in granting or rejecting refugee status.</span></p></div></div></section><section data-dcnode-id="1672" data-title="States’ Applications of Internal Flight Alternative and Concealment Approach"><div class="c-article-section" data-dcnode-id="1673" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1779" id="Sec12"><span data-dcnode-id="1780" instrument_node="">States’ Applications of Internal Flight Alternative and Concealment Approach</span></h2><div class="c-article-section__content" data-dcnode-id="1674" id="Sec12-content"><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Alongside states’ interpretation of refugee definition in terms of persecution and credibility, it is important to examine whether states apply internal flight alternative and the concealment approach in a consistent way with the UNHCR’s authoritative guidance. The study first questions how states determine that a LGBTI asylum seeker can live in another part of his or her country in safety. Secondly, it examines how states apply the concealment approach with a particular focus on the reason of concealing SOGI.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1775" id="Sec13"><span data-dcnode-id="1776" instrument_node="">Internal Flight Alternative</span></h3><p data-dcnode-id="1743"><span data-dcnode-id="1774" instrument_node="">Internal flight or relocation alternative is a concept which entails that an asylum seeker can safely return to another part of his or her country where the risk of being persecuted would not be well-founded (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="1772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e1060" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1773" instrument_node="">2012</span></a><span data-dcnode-id="1771" instrument_node="">, para.51). It may be used to reject asylum claims based on SOGI but there is a risk of not properly analysing country of origin information (UNHCR </span><a aria-label="Reference 2010" data-dcnode-id="1769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d12869915e1063" title="UNHCR. (2010). The Protection of Lesbian, Gay, Bisexual, Transgender and Intersex Asylum-Seekers and Refugees."><span data-dcnode-id="1770" instrument_node="">2010</span></a><span data-dcnode-id="1768" instrument_node="">: para.28). Indeed, internal flight alternative is most of the time not available for LGBTI asylum seekers since homophobia is often nationwide (D’epifanio </span><a aria-label="Reference 2011" data-dcnode-id="1766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d12869915e1066" title="D’epifanio, M. (2011). Credibility issues of LGBTI Asylum-Seekers in the refugee status determination. Master thesis, Istanbul Bilgi University."><span data-dcnode-id="1767" instrument_node="">2011</span></a><span data-dcnode-id="1765" instrument_node="">, p. 46). UNHCR (</span><a aria-label="Reference 2012" data-dcnode-id="1763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e1069" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1764" instrument_node="">2012</span></a><span data-dcnode-id="1762" instrument_node="">, para.55) states that the relocation alternative is still possible in some countries where urban areas might have more social and political progress than rural ones. However, the burden of proving availability of an internal flight option lies on the decision maker by identifying the proposed place of relocation and collecting country of origin information. In the research sample, the study examines nine cases relevant for the internal flight alternative and it identifies all of them as consistent with the UNHCR’s stance. Four asylum applications</span><sup data-dcnode-id="1757"><a data-dcnode-id="1758" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Footnote </span></span><span data-dcnode-id="1759" instrument_node="">25</span></a></sup><span data-dcnode-id="1756" instrument_node=""> were declined, among other reasons, because of the existence of the relocation alternative derived from the country of origin information, while one case</span><sup data-dcnode-id="1751"><a data-dcnode-id="1752" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Footnote </span></span><span data-dcnode-id="1753" instrument_node="">26</span></a></sup><span data-dcnode-id="1750" instrument_node=""> was accepted and four cases</span><sup data-dcnode-id="1745"><a data-dcnode-id="1746" href="#Fn27"><span class="u-visually-hidden" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Footnote </span></span><span data-dcnode-id="1747" instrument_node="">27</span></a></sup><span data-dcnode-id="1744" instrument_node=""> were remitted for reconsideration since the relocation alternative did not exist.</span></p><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">In one of the declined cases due to the availability of relocation alternative, two lesbian young women with Indian nationality went to the UK in order to be able to live together there and they entered into a civil partnership in the UK (AR and NH (lesbians) India v. Secretary of State for the Home Department, [2016]). They applied for protection and their application was rejected by the Secretary of State for the Home Department and by the First-tier Tribunal. They then appealed to the Upper Tribunal. According to their testimonies, they had both ceased contact with their family members and gave information such as their parents remained angry and parents of the second appellant would kill her on her return unless she returned to heterosexual orientation (para.25). According to the Tribunal, their families disowned them and showed no inclination to pursue them in the UK and they would seek to do so in India. Therefore, in case of any real risk of persecution from their local community in their home area, they had an internal relocation option. The Tribunal was convinced that both of the appellants wished to continue living together as a couple and they could do it in cities such as Mumbai, Delhi or Bangalore (para.83) since the appellants were highly educated women and they accepted their eligibility to find good jobs in India (para.28 and 29). In other words, the Tribunal’s stance was consistent with the UNHCR’s authoritative guidance by bearing the burden of proof to analyse the relevant place of relocation to the particular case, as recommended by UNHCR.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">In the case, which was accepted due to the lack of relocation alternative for the applicant, an Indian Muslim citizen with gay identity arrived in Australia on a student visa, where he had a homosexual relationship (RRT Case No. 1213081, [2014]). When he temporarily returned to India and tried to explain to his parents this relationship, they restrained him in his room in their house (para.13). When he managed to escape and return to Australia, he applied for asylum claiming that his family and the Islamic community would harm him. He claimed that “he was attacked by his father and male cousins. His father told him what he was doing was wrong. He wanted him to marry a girl they had chosen. His [cousins] attacked him and one put a knife at his throat and threatened him that he was to change his ways or be killed”. (para14) His first application was declined by the delegate of the Minister for Immigration arguing that relocation was a reasonable option for him (para.12). In the appeal, the applicant stated that his father would be able to find him if he returned to India due to his position in a government agency (para.17). The Refugee Review Tribunal, being consistent with the UNHCR’s stance, approved the appeal stating that in the applicant’s particular circumstances, relocation was not reasonable (para.25).</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">In one of the cases in which asylum claim was remitted for reconsideration due to the lack of relocation alternative, a Malaysian national applied for asylum in Australia stating that he was a student in Australia holding a Malaysian government scholarship (RRT Case No. 1102251, [2011]). However, he had lost his scholarship when his homosexual behaviour came to the attention of the Malaysian government. He was told by the government that “he was destroying Malaysia’s name through his conduct” (para.20) He argued that he had been blacklisted by the government, thus he could not study or find employment if he returned to Malaysia and he even could be jailed as sodomy is an illegal act in Malaysia (para.31). The Tribunal remitted the matter for reconsideration with the direction that the applicant satisfied being a refugee with in the meaning of the 1951 Convention by stating that, among others, he had a real chance of facing significant harm or serious physical harm in Malaysia by the community or the authorities, including police. Thus, the Tribunal was satisfied, being consistent with the UNHCR’s stance, that internal relocation alternative was not an option for him (para.53).</span></p><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">In conclusion, the study preliminary finds that, as shown in Table </span><a data-dcnode-id="1734" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1735" instrument_node="">7.1</span></a><span data-dcnode-id="1733" instrument_node="">, the recent court decisions of Australia, the UK and Ireland applied the internal flight alternative in their evaluation of LGBTI people’s asylum applications based on their SOGI in a consistent manner with UNHCR’s authoritative guidance. The next part examines the concealment approach since it is also a factor to be applied consistently for a better implementation of the refugee definition alongside the internal flight alternative.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1730" id="Sec14"><span data-dcnode-id="1731" instrument_node="">The Concealment Approach</span></h3><p data-dcnode-id="1719"><span data-dcnode-id="1729" instrument_node="">The concealment approach argues that if LGBTI people would not face a real risk of persecution when they keep a low profile and do not make their SOGI publicly known in their country of origin, they would not face a well-founded fear of persecution and, therefore, their asylum claim could be rejected. Here, the determining factor is the reason for concealing SOGI. According to UNHCR (</span><a aria-label="Reference 2008" data-dcnode-id="1727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d12869915e1115" title="UNHCR. (2008). UNHCR Guidance Note on Refugee Claims Relating to Sexual Orientation and Gender Identity."><span data-dcnode-id="1728" instrument_node="">2008</span></a><span data-dcnode-id="1726" instrument_node="">, para.12), if LGBTI people conceal their sexual orientation not voluntarily but because of state practices and social pressure since they live in fear of being publicly identified, this is not only discrimination but also violates the right to privacy and infringes the right to freedom of opinion and expression. Thus, UNHCR (</span><a aria-label="Reference 2012" data-dcnode-id="1724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e1118" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1725" instrument_node="">2012</span></a><span data-dcnode-id="1723" instrument_node="">, para.31–32) clearly expresses that states cannot require asylum seekers to change or conceal their identity, opinions or characteristics in order to avoid persecution and emphasises that secrecy may not be an option for his or her whole life since it is always possible to be discovered against the person’s will. Furthermore, concealment goes against the very rationale of the refugee definition since “[e]ven gay people who conceal their sexual orientation will be persecuted if their sexual orientation comes to the knowledge of the persecutors” (Weßels </span><a aria-label="Reference 2011" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d12869915e1121" title="Weßels, J. (2011). Sexual orientation in refugee status determination (Working Paper Series No. 74). Refugee Studies Centre."><span data-dcnode-id="1722" instrument_node="">2011</span></a><span data-dcnode-id="1720" instrument_node="">, p. 22). In short, according to UNHCR’s authoritative guidance, if LGBTI people have been forced to conceal their sexual identity to avoid persecution, then they would be entitled to international protection.</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1718" instrument_node="">The controversial part is to identify whether the reason of concealing SOGI such as societal disapproval or community pressure reaches the threshold of persecution or not. According to UNHCR (</span><a aria-label="Reference 2008" data-dcnode-id="1716" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d12869915e1127" title="UNHCR. (2008). UNHCR Guidance Note on Refugee Claims Relating to Sexual Orientation and Gender Identity."><span data-dcnode-id="1717" instrument_node="">2008</span></a><span data-dcnode-id="1715" instrument_node="">, para.12), severe consequences of exposure, including societal disapproval, may be considered more than discriminatory, but amounting to persecution. Additionally, community pressure to marry persons of the opposite sex could also reach the threshold of persecution (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="1713" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e1130" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1714" instrument_node="">2012</span></a><span data-dcnode-id="1712" instrument_node="">, para.23). Examining the relevant 15 cases, the study identifies 14 cases as consistent and one case as inconsistent. In four of the consistent cases,</span><sup data-dcnode-id="1707"><a data-dcnode-id="1708" href="#Fn28"><span class="u-visually-hidden" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Footnote </span></span><span data-dcnode-id="1709" instrument_node="">28</span></a></sup><span data-dcnode-id="1706" instrument_node=""> states accepted the asylum application when the individual had to conceal his/her SOGI to avoid persecution. In seven of them,</span><sup data-dcnode-id="1701"><a data-dcnode-id="1702" href="#Fn29"><span class="u-visually-hidden" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Footnote </span></span><span data-dcnode-id="1703" instrument_node="">29</span></a></sup><span data-dcnode-id="1700" instrument_node=""> the appeal bodies remitted the matter for reconsideration with the direction that the applicant satisfies the conditions of being arefugee. In three of the consistent cases,</span><sup data-dcnode-id="1695"><a data-dcnode-id="1696" href="#Fn30"><span class="u-visually-hidden" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Footnote </span></span><span data-dcnode-id="1697" instrument_node="">30</span></a></sup><span data-dcnode-id="1694" instrument_node=""> asylum applications were rejected since the reason of concealing their SOGI was explained by other reasons than the fear of persecution such as sensitive nature to the family’s feelings and social pressures, still being consistent with the UNHCR’s stance.</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">In one of the remitted cases, where the appeal court was satisfied that the applicant was a refugee and granted leave to seek judicial review, a Sudanese citizen applied for asylum in Australia because of his sexual orientation (RRT Case No. 1207970, [2012], para.30). In the appeal, the Refugee Review Tribunal, being consistent with the UNHCR’s stance, accepted the applicant as refugee by stating that “the Tribunal cannot impose any expectation on applicants that they will remain discreet for fear of being persecuted” (para.122). In one of the rejected cases, the appellant was a gay with Malaysian nationality and applied for asylum in the UK (HL (Malaysia) v Secretary of State for the Home Department, [2012]). He said in the interview that he had not told his parents about his sexuality to spare them heartache and that he would only tell people if they asked (para.5) Thus, according to the Court of Appeal in the UK, the applicant would live discreetly in Malaysia upon his return not because of avoiding persecution but because of his sensitive nature. In another rejected case, an Algerian national applied for asylum on the basis of facing a risk of persecution due to his gay or bisexual identity (OO (Gay Men) Algeria CG v. Secretary of State for the Home Department, [2016], para.3). The Upper Tribunal was not satisfied that he was gay or bisexual due to his contradictory, inconsistent and sometimes implausible testimony and stated that he would not face any difficulty on his SOGI upon return to Algeria (para.231 and 232). The Tribunal stated that even if it was wrong to reject his claimed sexual identity, there was no real risk of persecution based on sexual identity in Algeria. The Tribunal was satisfied that he would live discreetly upon return and so would not attract any level of disapproval from others. According to the Tribunal, the reason for living discreetly would be his choice because social and societal pressures do not amount to persecution (para.235).</span></p><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">In the inconsistent case, the Refugee Status Appeals Authority in New Zealand argued that as long as the person acted discretely, he would not face any real risk of persecution (Refugee Appeal No. 76566, [2010]). The Authority accepted that people suspected of homosexual behaviour in Egypt were faced with a systemic breach of their core human rights (para.102) However, it was also argued that an Egyptian national, entering a civil union with a man in New Zealand, had no real chance of being persecuted as long as his family or friends were not aware of his civil union with a man. And according to the Authority, no one in Egypt was aware that he had entered a civil union with a man in New Zealand and there was no reason that he would make this fact known (para.103) Thus, having prevented the possibility of his homosexual behaviour being discovered in Egypt against his will, the decision of the Authority was regarded as inconsistent with the UNHCR’s stance. However, it may be still argued that even New Zealand would be consistent with UNHCR in its application of the concealment approach; the final decision would not change since the Authority declined refugee status not because of the option of concealing SOGI to avoid persecution but because of the lack of general credibility (para.90).</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1688" instrument_node="">In short, the study preliminary concludes that all states identified in the research sample, as shown in Table </span><a data-dcnode-id="1686" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1687" instrument_node="">7.1</span></a><span data-dcnode-id="1685" instrument_node="">, except New Zealand, applied the concealment approach during the RSD for LGBTI asylum seekers in a consistent manner with the UNHCR’s guidelines. New Zealand’s application of the concealment approach was found as inconsistent in 2010 in one case, while it was found as consistent in 2012 in two other cases.</span><sup data-dcnode-id="1680"><a data-dcnode-id="1681" href="#Fn31"><span class="u-visually-hidden" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Footnote </span></span><span data-dcnode-id="1682" instrument_node="">31</span></a></sup><span data-dcnode-id="1679" instrument_node=""> The existence of two consistent applications after 2 years of the inconsistent application does not necessarily mean that New Zealand </span><i data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">corrected</span></i><span data-dcnode-id="1676" instrument_node=""> its inconsistency in the application of this approach. Thus, this inconsistency is still valuable to consider.</span></p></div></div></section><section data-dcnode-id="1655" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1656" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1670" id="Sec15"><span data-dcnode-id="1671" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1657" id="Sec15-content"><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">LGBTI people, despite increased legal, political and humanitarian consideration, face persecution from state actors and non-state actors. Facing persecution based on their SOGI, LGBTI people are one of the vulnerable groups in dire need of the protection provided by the 1951 Convention. UNHCR, under its supervisory role, provides opinions on the interpretation and application of the refugee definition in order to ensure an international consistency for granting refugee status to those who fall under the refugee definition. Since the UNHCR’s authoritative guidance, serving the best interests of asylum seekers and refugees, is not binding, the UNHCR’s supervisory role needs to be strengthened, where needed, through various mechanisms such as monitoring, enhanced state reporting and improving UNHCR access to asylum applicants. For this reason, this study investigates if and on which factor(s) there is a need for enhancing supervision in the RSD process for LGBTI asylum seekers. It identifies four areas as decisive for the determination of asylum applications of LGBTI people: persecution, credibility, internal flight alternative and the concealment approach. The study explores states’ interpretation and application of each decisive factor based on the analyses of a randomly selected 40 cases research sample. When an inconsistency was found in the comparison of states’ interpretation and application with UNHCR’s stance, the study concluded that there is a need for an enhanced supervisory role in the related factor.</span></p><p data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">By exploring 40 cases, the study reaches three preliminary findings. Firstly, recent court decisions for LGBTI asylum applications are consistent with the UNHCR’s authoritative guidance though South Africa was occasionally found inconsistent in interpreting persecution. Secondly, inconsistencies during the RSD process, though still notable, may not necessarily result in an inconsistent decision since three of the four identified inconsistencies were not the main reasons of denying the asylum application. Finally, there is a need for an enhanced UNHCR’s supervisory role in three areas. As shown in Table </span><a data-dcnode-id="1665" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1666" instrument_node="">7.1</span></a><span data-dcnode-id="1664" instrument_node="">, South Africa and Ireland interpreted the enforcement requirement of the existing laws in defining persecution inconsistently with the UNHCR’s stance while New Zealand inconsistently interpreted the credibility factor in terms of the risk of stereotypes and applied the concealment approach again inconsistently with the UNHCR’s authoritative guidance.</span></p><p data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">This study has its limits due to the number of cases examined and reaches only preliminary findings. In order to understand </span><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">the vulnerable sides</span></i><span data-dcnode-id="1659" instrument_node=""> of the implementation of the refugee definition and to identify in which areas and countries the UNHCR’s supervisory role can be increased, further research can be done by accommodating a more comprehensive sample. Furthermore, this study does not aim to deal with how the UNHCR’s supervisory role can be enhanced in the identified areas to ensure an international uniformity for granting refugee status. Therefore future research may specifically deal with the mechanisms to increase the UNHCR’s supervisory role in the specific countries and areas where an inconsistency is identified.</span></p></div></div></section><span data-dcnode-id="1654" instrument_node="">
</span><section data-dcnode-id="1444" data-title="Notes" lang="en"><div class="c-article-section" data-dcnode-id="1445" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1652" id="notes"><span data-dcnode-id="1653" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1446" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1447"><li class="c-article-footnote--listed__item" data-dcnode-id="1646" id="Fn1"><span class="c-article-footnote--listed__index" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">1.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1647"><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Refugee status determination may also be conducted by UNHCR where states are unable or unwilling to do so. UNHCR Refugees do generally enjoy international protection in a limited way including the principle of non-penalization and non-refoulement while waiting for being resettled in a third country.</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1640" id="Fn2"><span class="c-article-footnote--listed__index" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">2.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1641"><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">The Handbook and Guidelines on Procedures and Criteria for Determining Refuge Status and in the Guidelines on International Protection (1992), Guidance Note on Refugee Claims Relating to Sexual Orientation and Gender Identity (2008), discussion note on the LGBTI Asylum-Seekers and Refugees (2010) and Guidelines on International Protection No.9 (2012).</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1631" id="Fn3"><span class="c-article-footnote--listed__index" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">3.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1632"><p data-dcnode-id="1633"><span data-dcnode-id="1637" instrument_node="">There are also other challenges such as improving state reporting, institutionalizing a constructive dialogue with State parties and the measure of enforcement (Kälin </span><a aria-label="Reference 2003" data-dcnode-id="1635" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12869915e434" title="Kälin, W. (2003). Supervising the 1951 Convention relating to the status of refugees: Article 35 and beyond. In E. Feller, V. Türk, &amp; F. Nicholson (Eds.), Refugee protection in international law: UNHCR’s global consultations on international protection (pp. 613–666). Cambridge: Cambridge University Press."><span data-dcnode-id="1636" instrument_node="">2003</span></a><span data-dcnode-id="1634" instrument_node="">, p. 631).</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1622" id="Fn4"><span class="c-article-footnote--listed__index" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">4.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1623"><p data-dcnode-id="1624"><span data-dcnode-id="1628" instrument_node="">The link of that database: </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/cgi-bin/texis/vtx/rwmain%3Fpage%3Dtype%2526type%3DCASELAW"><span data-dcnode-id="1627" instrument_node="">http://www.refworld.org/cgi-bin/texis/vtx/rwmain?page=type&amp;type=CASELAW</span></a><span data-dcnode-id="1625" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1616" id="Fn5"><span class="c-article-footnote--listed__index" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">5.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1617"><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Among them, India (5), Nigeria (5), Egypt (4) and Malaysia (3) constitute the majority.</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1610" id="Fn6"><span class="c-article-footnote--listed__index" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">6.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1611"><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Australia (14), UK (6), New Zealand (6), Canada (5), Ireland (3), South Africa (2), USA (1), Sweden (1), Poland (1) and Holland (1).</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1604" id="Fn7"><span class="c-article-footnote--listed__index" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">7.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1605"><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Refugee Appeal Board Decision (Tanzania), [2011].</span></p></div></li><li class="c-article-footnote--listed__item" data-dcnode-id="1598" id="Fn8"><span class="c-article-footnote--listed__index" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">8.</span></span><div class="c-article-footnote--listed__content" data-dcnode-id="1599"><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Ireland (E. v. Refugee Appeals Tribunal &amp; Ors, [2011]) and South Africa (Refugee Appeal Board Decision (Tanzania), [2011]) have inconsistent interpretations of the enforcement requirements of the existing laws while New Zealand has inconsistent interpretations of stereotypes (Refugee Appeal No. 76484, [2010]) and the discretion approach (Refugee Appeal No. 76566, [2010]).</span></p></div></li><li clas
