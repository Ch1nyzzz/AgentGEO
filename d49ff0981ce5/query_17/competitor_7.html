</span><section aria-labelledby="Abs1" data-dcnode-id="2229" data-gtm-vis-first-on-screen-50443292_562="453" data-gtm-vis-first-on-screen-50443292_563="453" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="453" data-gtm-vis-recent-on-screen-50443292_563="453" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2230" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2249" id="Abs1"><span data-dcnode-id="2250" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2231" id="Abs1-content"><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">The United Nations High Commissioner for Refugees (UNHCR) has been given the duty of supervising the application of international refugee instruments to ensure that states implement them uniformly serving the best interests of asylum seekers and refugees. As part of its supervisory role, UNHCR provides guidance on how to interpret the Refugee Convention and how to conduct the refugee status determination process. Thus, the consistency of states’ interpretation and application of the refugee definition with UNHCR’s authoritative guidance means providing refugee status to people who fulfil the definition of refugee. This chapter focuses on lesbian, gay, bisexual, transgender and intersex (LGBTI) people in need of protection. It identifies persecution, credibility, internal flight alternative and concealment approach as decisive areas for granting or rejecting the asylum applications of LGBTI people and explores the (in)consistencies of states’ interpretation and application of these areas with the UNHCR’s guidelines on international protection, assuming that any inconsistency would mean the need for an enhanced supervisory role. The chapter questions, then, in which area(s) there is a need of enhancing the UNHCR’s supervisory role in the legal process of refugee status determination for LGBTI asylum seekers. By analysing a randomly selected 40 case research sample, the chapter preliminary identifies four inconsistencies and concludes that the UNHCR’s supervisory role needs to be enhanced in three areas: namely persecution (the enforcement requirement of the existing laws), credibility (stereotypes) and the concealment approach.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="2232"><li class="c-article-subject-list__subject" data-dcnode-id="2242"><span data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">LGBTI</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2239"><span data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">UNHCR</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2236"><span data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Consistency</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2233"><span data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Supervisory role</span></span></li></ul></div></div></section><span data-dcnode-id="2228" instrument_node="">

</span><a data-dcnode-id="2222" data-track="click" data-track-action="Pdf download" data-track-label="inline link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/content/pdf/10.1007/978-3-319-91905-8_7.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2223" instrument_node="">Download</span></a><span data-dcnode-id="2221" instrument_node=""> chapter PDF

</span><section data-dcnode-id="2098" data-gtm-vis-first-on-screen-50443292_562="453" data-gtm-vis-first-on-screen-50443292_563="453" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="453" data-gtm-vis-recent-on-screen-50443292_563="453" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2099" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2211" id="Sec1"><span data-dcnode-id="2212" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2100" id="Sec1-content"><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Imagine that you are put into prison and sentenced to the death penalty because you fall in love with someone and like to live your relationship openly. Or imagine that you become the target of your own family and they want to kill you because of the shame you brought on your family. Such and many more things may happen to lesbian, gay, bisexual, transgender and intersex (LGBTI) people in many parts of the world unfortunately as an everyday routine just because of their sexual orientation and/or gender identity (SOGI).</span></p><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Though most of the states do not publish data on violence against LGBTI people regularly and exact statistics are not available, the existing data sufficiently show the severity of the situation: as UN Human Rights Council (2015 para.27–28) reports, one transgender person was killed in every 2 days between 2008 and 2014 and 594 LGBTI people were the victim of hate-related killings in the 25 member States of the Organization of American States between January 2013 and March 2014. LGBTI people are also subject to non-lethal violence such as assaults, beatings, humiliation, kidnapping, sexual abuse and rape because of their SOGI by either state agencies or non-state actors or both (para.31). Thus, it may be well argued that LGBTI people are among the most vulnerable persons, being in dire need of the protection provided by the 1951 Convention relating to the Status of Refugees together with its 1967 Protocol (hereafter 1951 Convention).</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2206" instrument_node="">The task of determining whether a person is a refugee is a crucial one, as the outcome can either be international protection or an expulsion order. In this administrative or legal process, states have the primary responsibility to determine the status of asylum seekers</span><sup data-dcnode-id="2201"><a data-dcnode-id="2202" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Footnote </span></span><span data-dcnode-id="2203" instrument_node="">1</span></a></sup><span data-dcnode-id="2200" instrument_node=""> and UNHCR has the duty of supervising the application of the provisions of international conventions for the protection of refugees (UNGA </span><a aria-label="Reference 1950" data-dcnode-id="2198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12869915e392" title="UN General Assembly. (1950). Statute of the Office of the United Nations High Commissioner for Refugees."><span data-dcnode-id="2199" instrument_node="">1950</span></a><span data-dcnode-id="2197" instrument_node="">, art.8/a). Since states’ implementation of the refugee status determination (RSD) process shall be pursued in an international uniformity meeting the standards of providing international protection to those who really need it (Pobjoy </span><a aria-label="Reference 2013" data-dcnode-id="2195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d12869915e395" title="Pobjoy, J. (2013). A child rights framework for assessing the status of refugee children. In S. S. Juss &amp; C. Harvey (Eds.), Contemporary issues in refugee law (pp. 91–138). Cheltenham: Edward Elgar Publishing."><span data-dcnode-id="2196" instrument_node="">2013</span></a><span data-dcnode-id="2194" instrument_node="">, p. 127), UNHCR, under its supervisory role, has provided its opinions (authoritative guidance) in its Handbook and various documents</span><sup data-dcnode-id="2189"><a data-dcnode-id="2190" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Footnote </span></span><span data-dcnode-id="2191" instrument_node="">2</span></a></sup><span data-dcnode-id="2188" instrument_node=""> not only on regulating the status of those who have been accepted as refugees but also on the interpretation and application of the refugee definition.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2186" instrument_node="">Since UNHCR’s opinions serve the best interests of asylum seekers and refugees, it is assumed that states’ consistency with UNHCR’s authoritative guidance would ensure an effective implementation of the refugee definition under the international refugee instruments (Arakaki </span><a aria-label="Reference 2013" data-dcnode-id="2184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d12869915e407" title="Arakaki, O. (2013). Non-state actors and UNHCR’s supervisory role in international relations. In J. C. Simeon (Ed.), The UNHCR and the supervision of international refugee law (pp. 286–301). Cambridge: Cambridge University Press."><span data-dcnode-id="2185" instrument_node="">2013</span></a><span data-dcnode-id="2183" instrument_node="">, p. 290; Türk </span><a aria-label="Reference 2002" data-dcnode-id="2181" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d12869915e410" title="Türk, V. (2002). UNHCR’s supervisory responsibility. New Issues in Refugee Research (Working Paper No. 67)."><span data-dcnode-id="2182" instrument_node="">2002</span></a><span data-dcnode-id="2180" instrument_node="">; Kälin </span><a aria-label="Reference 2003" data-dcnode-id="2178" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12869915e413" title="Kälin, W. (2003). Supervising the 1951 Convention relating to the status of refugees: Article 35 and beyond. In E. Feller, V. Türk, &amp; F. Nicholson (Eds.), Refugee protection in international law: UNHCR’s global consultations on international protection (pp. 613–666). Cambridge: Cambridge University Press."><span data-dcnode-id="2179" instrument_node="">2003</span></a><span data-dcnode-id="2177" instrument_node="">; Goodwin-Gill and McAdam </span><a aria-label="Reference 2007" data-dcnode-id="2175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d12869915e416" title="Goodwin-Gill, G. S., &amp; McAdam, J. (2007). The refugee in international law. Oxford: Oxford University Press."><span data-dcnode-id="2176" instrument_node="">2007</span></a><span data-dcnode-id="2174" instrument_node="">). However, the UNHCR’s supervising role does not entail the power of providing legally binding guidance for the application of such provisions to judicial and administrative decision makers. In other words, while the UNHCR’s opinions do not have a binding force in domestic or international law, they may be a legal interpretative guidance for those whose task is to determine whether a person is a refugee and its force may be more than an ordinary advice mechanism. The UNHCR Handbook may be taken as an authoritative guideline for the interpretation of the 1951 Convention by the states, as done by Finland (Nen and Nykänen </span><a aria-label="Reference 2012" data-dcnode-id="2172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d12869915e419" title="Nen, E. N., &amp; Nykänen, E. (2012). Fragmented state power and forced migration: A study on non-state actors in refugee law. Leiden: Martinus Nijhoff Publishers."><span data-dcnode-id="2173" instrument_node="">2012</span></a><span data-dcnode-id="2171" instrument_node="">, p. 26) and the UNHCR’s Handbooks and guidelines “must not be dismissed as irrelevant but regarded as authoritative statements whose disregard requires justification” (Kälin </span><a aria-label="Reference 2003" data-dcnode-id="2169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12869915e423" title="Kälin, W. (2003). Supervising the 1951 Convention relating to the status of refugees: Article 35 and beyond. In E. Feller, V. Türk, &amp; F. Nicholson (Eds.), Refugee protection in international law: UNHCR’s global consultations on international protection (pp. 613–666). Cambridge: Cambridge University Press."><span data-dcnode-id="2170" instrument_node="">2003</span></a><span data-dcnode-id="2168" instrument_node="">, p. 627).</span></p><p data-dcnode-id="2147"><span data-dcnode-id="2166" instrument_node="">The fact that UNHCR mostly provides guidance to states on how to interpret the international refugee law for the effective implementation of international refugee instruments creates two challenges.</span><sup data-dcnode-id="2161"><a data-dcnode-id="2162" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Footnote </span></span><span data-dcnode-id="2163" instrument_node="">3</span></a></sup><span data-dcnode-id="2160" instrument_node=""> First, the problem of “differing interpretation regarding the content and application of provisions of the international refugee instruments, standards and principles” (Kälin </span><a aria-label="Reference 2003" data-dcnode-id="2158" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12869915e439" title="Kälin, W. (2003). Supervising the 1951 Convention relating to the status of refugees: Article 35 and beyond. In E. Feller, V. Türk, &amp; F. Nicholson (Eds.), Refugee protection in international law: UNHCR’s global consultations on international protection (pp. 613–666). Cambridge: Cambridge University Press."><span data-dcnode-id="2159" instrument_node="">2003</span></a><span data-dcnode-id="2157" instrument_node="">, p. 631) and the concern that “it is domestic implementation which allows states unilaterally to manipulate the refugee definition” (Türk </span><a aria-label="Reference 2002" data-dcnode-id="2155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d12869915e442" title="Türk, V. (2002). UNHCR’s supervisory responsibility. New Issues in Refugee Research (Working Paper No. 67)."><span data-dcnode-id="2156" instrument_node="">2002</span></a><span data-dcnode-id="2154" instrument_node="">, p. 1). The assessment of the asylum applications based on the refugee definition of the 1951 Convention may lack an international uniformity based on the standards set by UNHCR in the absence of binding criteria for the determining areas of the RSD and thus states’ inconsistency with the UNHCR’s authoritative guidance may prevent vulnerable people in need of protection to enjoy international protection. Therefore, there is scholarly attention on how to improve the implementation of international refugee instruments. It is argued that the UNHCR’s supervisory role shall be strengthened through improving various mechanisms including, though not limited to, monitoring, state reporting and UNHCR access to asylum applicants, refugees and returnees (Kälin </span><a aria-label="Reference 2003" data-dcnode-id="2152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12869915e445" title="Kälin, W. (2003). Supervising the 1951 Convention relating to the status of refugees: Article 35 and beyond. In E. Feller, V. Türk, &amp; F. Nicholson (Eds.), Refugee protection in international law: UNHCR’s global consultations on international protection (pp. 613–666). Cambridge: Cambridge University Press."><span data-dcnode-id="2153" instrument_node="">2003</span></a><span data-dcnode-id="2151" instrument_node="">; Türk </span><a aria-label="Reference 2002" data-dcnode-id="2149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d12869915e448" title="Türk, V. (2002). UNHCR’s supervisory responsibility. New Issues in Refugee Research (Working Paper No. 67)."><span data-dcnode-id="2150" instrument_node="">2002</span></a><span data-dcnode-id="2148" instrument_node="">). Rather than questioning how the UNHCR’s supervisory role can be increased, this study aims to question if and in which area(s) there is a need for enhancing the UNHCR’s supervisory role in the RSD process for LGBTI asylum seekers by exploring the inconsistencies in states’ interpretation and application of the refugee definition. It examines whether states interpret the 1951 Convention and conduct the RSD process as consistent with UNHCR focusing on the following decisive areas: persecution, credibility, internal flight alternative and the concealment option.</span></p><p data-dcnode-id="2139"><span data-dcnode-id="2146" instrument_node="">Though such a research question is ideally examined by covering the RSD process for all LGBTI asylum seekers in every state and throughout time, the study limits its scope, due to concerns on time and availability of sources, to a 40 case research sample randomly selected from the increasing body of case law on LGBTI asylum claims in UNHCR’s Refworld case law database filtered by the years between 2010 and 2016.</span><sup data-dcnode-id="2141"><a data-dcnode-id="2142" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Footnote </span></span><span data-dcnode-id="2143" instrument_node="">4</span></a></sup><span data-dcnode-id="2140" instrument_node=""> The study reaches only preliminary findings since 40 cases sample is still very limited evidence of national practices and further studies with a more comprehensive sample would be needed in order to identify in which areas the UNHCR’s supervisory role can be increased.</span></p><p data-dcnode-id="2125"><span data-dcnode-id="2138" instrument_node="">Among these 40 cases, asylum applications originated from 27 different countries</span><sup data-dcnode-id="2133"><a data-dcnode-id="2134" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Footnote </span></span><span data-dcnode-id="2135" instrument_node="">5</span></a></sup><span data-dcnode-id="2132" instrument_node=""> in 10 different countries of asylum.</span><sup data-dcnode-id="2127"><a data-dcnode-id="2128" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Footnote </span></span><span data-dcnode-id="2129" instrument_node="">6</span></a></sup><span data-dcnode-id="2126" instrument_node=""> The asylum claims were made by gays (29 cases), lesbians (6 cases), bisexuals (3 cases) and transsexuals (2 cases). In the appeals decisions, 21 of them were declined while 6 of the cases were accepted and 13 cases were remitted for reconsideration mostly with the direction that the applicant satisfied being a refugee within the meaning of the 1951 Convention.</span></p><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">The study begins with identifying the UNHCR’s authoritative guidance in each factor derived from its Handbook, guidance notes and guidelines and then compares the UNHCR’s stance with the states’ interpretation and application of the refugee definition to question the consistency. If an inconsistency is identified, it is assumed that the UNHCR’s supervisory role needs to be enhanced in the relevant factor. Since the applicants have already appealed the initial administrative and/or judicial decision in all cases, the study accepts the recent courts decisions as representing the relevant states’ implementation of the refugee definition. It is also important to note that the analyses are limited to the information provided in the published judgements or court orders and are derived from the subjective interpretation of the author of this study, as not being authoritative. Most of all, it is not possible to speculate on the generalizability of the findings once an inconsistency is identified since the findings of the study are limited to the 40 cases examined. Finally, the study provides only the relevant details of some cases selected as examples, rather than explaining all cases in all details.</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">In the first part of the study, the availability of international protection for LGBTI people is examined. In the second part, the study questions the consistency of states’ interpretations of persecution by focusing on the relation between discrimination and persecution and the enforcement requirement of the existing laws and examines the consistency in credibility by focusing on the relation between subjective and objective elements, benefit of the doubt, inconsistencies in the applicant’s testimony and stereotypes. In the third part, the study explores states’ applications of internal flight alternative and the concealment with the UNHCR’s authoritative guidance.</span></p><p data-dcnode-id="2101"><span data-dcnode-id="2120" instrument_node="">Remembering that the findings of this study cannot be generalized and are only limited to the scope hereby stated, the study reaches three preliminary findings. Firstly, the recent courts decisions for SOGI asylum cases are found as being consistent with the UNHCR’s authoritative guidance in all of the 40 cases except one.</span><sup data-dcnode-id="2115"><a data-dcnode-id="2116" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Footnote </span></span><span data-dcnode-id="2117" instrument_node="">7</span></a></sup><span data-dcnode-id="2114" instrument_node=""> Secondly, the study finds 4 inconsistencies in total,</span><sup data-dcnode-id="2109"><a data-dcnode-id="2110" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Footnote </span></span><span data-dcnode-id="2111" instrument_node="">8</span></a></sup><span data-dcnode-id="2108" instrument_node=""> though only one of those</span><sup data-dcnode-id="2103"><a data-dcnode-id="2104" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Footnote </span></span><span data-dcnode-id="2105" instrument_node="">9</span></a></sup><span data-dcnode-id="2102" instrument_node=""> constitutes the main reason for rejection of the asylum application. In other words, inconsistencies during the RSD process may not necessarily cause an inconsistent decision. Lastly, derived from the identified inconsistencies, the chapter argues that the UNHCR’s supervisory role needs to be enhanced in the RSD process for LGBTI asylum seekers in the following points: interpretation of persecution (enforcement requirements of the existing laws), interpretation of credibility (risk of stereotypes) and application of the concealment approach.</span></p></div></div></section><section data-dcnode-id="2017" data-title="LGBTI People and the&nbsp;Right to Seek Asylum"><div class="c-article-section" data-dcnode-id="2018" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2096" id="Sec2"><span data-dcnode-id="2097" instrument_node="">LGBTI People and the&nbsp;Right to Seek Asylum</span></h2><div class="c-article-section__content" data-dcnode-id="2019" id="Sec2-content"><p data-dcnode-id="2073"><span data-dcnode-id="2095" instrument_node="">According to the international human rights law, states have a well-established responsibility to protect the human rights of all persons within their jurisdiction, including LGBTI people.</span><sup data-dcnode-id="2090"><a data-dcnode-id="2091" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Footnote </span></span><span data-dcnode-id="2092" instrument_node="">10</span></a></sup><span data-dcnode-id="2089" instrument_node=""> They “are entitled to live in a society as who they are and need not hide that” (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="2087" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e523" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2088" instrument_node="">2012</span></a><span data-dcnode-id="2086" instrument_node="">, para.12). However, the UN Human Rights Council (</span><a aria-label="Reference 2015" data-dcnode-id="2084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d12869915e526" title="United Nations Human Rights Office of the High Commissioner. (2015). Discrimination and violence against individuals based on their sexual orientation and gender identity. Geneva: Author."><span data-dcnode-id="2085" instrument_node="">2015</span></a><span data-dcnode-id="2083" instrument_node="">) points out that states still have discriminatory policies against LGBTI people affecting their everyday practices. Its report states that laws criminalizing homosexuality and the discriminatory policies affect the quality of health services (para.50), cause discrimination and harassment in the area of education (para.55), employment (para.58) and freedom of expression, association and assembly (para.69). As reported by the International Lesbian, Gay, Bisexual, Trans and Intersex Association (</span><a aria-label="Reference 2017" data-dcnode-id="2081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d12869915e529" title="Carroll, A., &amp; Mendos, L. R. (2017). State Sponsored Homophobia 2017: A world survey of sexual orientation laws: criminalisation, protection and recognition. International Lesbian, Gay, Bisexual, Trans and Intersex Association."><span data-dcnode-id="2082" instrument_node="">2017</span></a><span data-dcnode-id="2080" instrument_node="">, p. 8, 40), 72 countries have legal provisions criminalizing same-sexual acts and 12 of them</span><sup data-dcnode-id="2075"><a data-dcnode-id="2076" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Footnote </span></span><span data-dcnode-id="2077" instrument_node="">11</span></a></sup><span data-dcnode-id="2074" instrument_node=""> codify in law for death penalty. Besides states, LGBTI people face persecution from non-state actors. According to the UN Human Rights Council, militants of the Islamic State and many other terrorist organization target LGBTI people for punishment, including killings (para.29) and families or community members carry out honour killings against them (para.30). Thus, facing persecution or risk of persecution, LGBTI people are in dire need of the protection provided by the 1951 Convention and there is an evolving case law on asylum applications for reasons of SOGI.</span></p><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">The 1951 Convention defines a refugee as any person who,</span></p><span data-dcnode-id="2070" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="2064"><div class="c-blockquote__body" data-dcnode-id="2065"><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">as a result of events occurring before 1 January 1951 owing to well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group or political opinion, is outside the country of his nationality and is unable or, owing to such fear, is unwilling to avail himself of the protection of that country; or who, not having a nationality and being outside the country of his former habitual residence as a result of such events, is unable or, owing to such fear, is unwilling to return to it (Art.1A/2).</span></p><span data-dcnode-id="2066" instrument_node="">
</span></div></blockquote><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2062" instrument_node="">Any refugee claim must be based on at least one of the five grounds of this definition and UNHCR (</span><a aria-label="Reference 2012" data-dcnode-id="2060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e553" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2061" instrument_node="">2012</span></a><span data-dcnode-id="2059" instrument_node="">, para.1) states that there is greater awareness in many countries of asylum that LGBTI people may fall within the refugee definition of the 1951 Convention. As Türk (</span><a aria-label="Reference 2013" data-dcnode-id="2057" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d12869915e556" title="Türk, V. (2013). Ensuring protection to LGBTI persons of concern. Forced Migration Review, 42, 5–8."><span data-dcnode-id="2058" instrument_node="">2013</span></a><span data-dcnode-id="2056" instrument_node="">, p. 5) made clear, although there is no explicit recognition of persecution for reasons of SOGI, the broad language used in the definition may be interpreted to cover such instances, most possibly through </span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">membership of a particular social group</span></i><span data-dcnode-id="2053" instrument_node=""> ground. Additionally, UNHCR states that claims relating to SOGI are primarily recognized under the Convention ground of membership of a particular social group and may also be linked to other grounds such as political opinion and religion (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="2051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e562" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2052" instrument_node="">2012</span></a><span data-dcnode-id="2050" instrument_node="">, para.40). For example, his or her SOGI may not conform to the teachings of a particular religion (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="2048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e565" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2049" instrument_node="">2012</span></a><span data-dcnode-id="2047" instrument_node="">, para.42), and/or expression of SOGI may be viewed as challenging government policy or as threatening the prevailing social norms and values (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="2045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e569" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2046" instrument_node="">2012</span></a><span data-dcnode-id="2044" instrument_node="">, para.50).</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2042" instrument_node="">According to UNHCR (</span><a aria-label="Reference 2012" data-dcnode-id="2040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e576" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="2041" instrument_node="">2012</span></a><span data-dcnode-id="2039" instrument_node="">, para.1), persecution for reasons of SOGI is increasingly accepted to be qualified as refugee ground under the 1951 Convention. However, the relative and vague concepts of the refugee definition such as </span><i data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">well-founded fear</span></i><span data-dcnode-id="2036" instrument_node=""> and </span><i data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">persecution</span></i><span data-dcnode-id="2033" instrument_node=""> may pave way both for a progressive or repressive interpretation. Additionally, since there is no certain type of procedure for the RSD, each state party can establish the most appropriate procedure depending on its particular constitutional and administrative structure (UNHCR </span><a aria-label="Reference 1992" data-dcnode-id="2031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e585" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="2032" instrument_node="">1992</span></a><span data-dcnode-id="2030" instrument_node="">, para.189). Furthermore, since only few states give place to sexual orientation in their national legislation, the application depends on the administrative procedures and the decision makers (Pollini </span><a aria-label="Reference 2014" data-dcnode-id="2028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d12869915e588" title="Pollini, F. E. (2014). The difficult path towards the recognition of refugee status based on sexual orientation and gender identity analysing Brazil and the United Kingdom. ICL Journal. Retrieved February 12, 2016, from 
                  https://www.icl-journal.com/media/ICL_Thesis_Vol_8_2_14.pdf
                  
                
"><span data-dcnode-id="2029" instrument_node="">2014</span></a><span data-dcnode-id="2027" instrument_node="">, p. 13). As a result, states’ interpretations of vague terms like </span><i data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">persecution</span></i><span data-dcnode-id="2024" instrument_node=""> and </span><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">well-founded fear</span></i><span data-dcnode-id="2021" instrument_node=""> and applications of certain approaches like internal flight alternative and the concealment may be inconsistent with the UNHCR’s stance in determining LGBTI people’s asylum claims based on SOGI. The next part of the study deals with the states’ interpretations of two complex issues: determining the persecution and defining the applicant as a credible witness.</span></p></div></div></section><section data-dcnode-id="1781" data-title="States’ Interpretations of Persecution and Credibility"><div class="c-article-section" data-dcnode-id="1782" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2015" id="Sec3"><span data-dcnode-id="2016" instrument_node="">States’ Interpretations of Persecution and Credibility</span></h2><div class="c-article-section__content" data-dcnode-id="1783" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="2013" id="Sec4"><span data-dcnode-id="2014" instrument_node="">Persecution</span></h3><p data-dcnode-id="2008"><span data-dcnode-id="2012" instrument_node="">The 1951 Convention does not contain a definition of persecution and there is no universally accepted definition either. According to UNHCR (</span><a aria-label="Reference 1992" data-dcnode-id="2010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e610" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="2011" instrument_node="">1992</span></a><span data-dcnode-id="2009" instrument_node="">, para.51) “a&nbsp;threat to life or freedom on account of race, religion, nationality, political opinion or membership of a particular social group is always persecution. Other serious violations of human rights&nbsp;– for the same reasons&nbsp;– would also constitute persecution”. This part of the study questions the consistency in states’ interpretation of persecution with UNHCR from two perspectives: first, in terms of the relations between discrimination and persecution and second, in terms of the enforcement requirements of the existing laws criminalizing same-sex acts.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2006" id="Sec5"><span data-dcnode-id="2007" instrument_node="">Relation Between Discrimination and Persecution</span></h4><p data-dcnode-id="1983"><span data-dcnode-id="2005" instrument_node="">Persecution can be a severe violation of human rights such as a threat to life or freedom, torture and other inhuman or degrading treatment and discrimination can become persecution when it leads to serious restrictions on a substantially prejudicial nature of the person, such as right to employment, right to practice his or her religion or access to education (UNHCR </span><a aria-label="Reference 1992" data-dcnode-id="2003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e620" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="2004" instrument_node="">1992</span></a><span data-dcnode-id="2002" instrument_node="">, para.54). The study identifies six cases, in which the relation between discrimination and persecution is at stake, and in all of them, states’ interpretation of persecution is found as consistent with UNHCR’s authoritative guidance. Among them, four cases</span><sup data-dcnode-id="1997"><a data-dcnode-id="1998" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Footnote </span></span><span data-dcnode-id="1999" instrument_node="">12</span></a></sup><span data-dcnode-id="1996" instrument_node=""> were rejected, while one case</span><sup data-dcnode-id="1991"><a data-dcnode-id="1992" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Footnote </span></span><span data-dcnode-id="1993" instrument_node="">13</span></a></sup><span data-dcnode-id="1990" instrument_node=""> was accepted and one case</span><sup data-dcnode-id="1985"><a data-dcnode-id="1986" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Footnote </span></span><span data-dcnode-id="1987" instrument_node="">14</span></a></sup><span data-dcnode-id="1984" instrument_node=""> was remitted for reconsideration.</span></p><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">In the rejected cases, the asylum applications were declined because, among other reasons, the level of discrimination was not considered to amount to persecution. For example, in one of the cases, the appellant was male-born and identified herself as female (BQ (China), [2015]). She had both Chinese citizenship and a permanent resident permit from the United States of America (USA) (para.2). She applied for asylum in New Zealand arguing to be ill-treated by the police and by the local population due to her transsexual identity both in China and in USA (para.3). The appellant argued that she was arrested in China and subjected to physical abuse, including rape with batons in the police station (para.9). Then she travelled to USA and was granted asylum status (para.11). After a while living in USA, she began to dress as a woman, which prevented her attending a local mosque and finding employment and forced her to work as a prostitute (para.13–16). Further, she argued that she was unwelcome in bars and was unable to use some bathrooms as a female (para.18). Immigration and Protection Tribunal in New Zealand accepted a real chance of the appellant being persecuted in China (para.65) but rejected such a risk in USA claiming that she had the right of a transgendering process, received allowance from the federal state, had access to medical treatment, received health insurance (para.82) and had access to support services to obtain employment in USA (para.85). The Tribunal, being consistent with UNHCR’s stance, stated that discrimination in societal areas, such as being taunted and insulted at bars or inability to use some bathrooms as a female, “do not rise to the requisite level of severity to reach the serious harm threshold” (para.86).</span></p><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">In another case, where consistency with the UNHCR’s stance is observed, the appellant, a national of Tanzania, argued that being gay made his life very unpleasant in Tanzania while he was verbally threatened by the community and threatened to be thrown (Refugee Appeal Board Decision (Tanzania), [2011]). Thus, he argued that he faced societal discrimination at the community level because of his gay identity (para.6). Along with the unpleasant words said to him by the community, he faced harassment from his brother such as putting water on his bed (para.18). He applied for asylum in South Africa and the Refugee Appeal Board rejected the claim, among others, by not amounting such acts of harassment as equal to persecution (para.18).</span></p><p data-dcnode-id="1974"><span data-dcnode-id="1978" instrument_node="">In sum, the preliminary study concludes that, as shown in Table </span><a data-dcnode-id="1976" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1977" instrument_node="">7.1</span></a><span data-dcnode-id="1975" instrument_node="">, during the RSD process for LGBTI asylum seekers, the relevant states New Zealand, South Africa, the United Kingdom (UK) and Australia interpreted the relation between discrimination and persecution in a consistent manner with the UNHCR Handbook. The next part of the study deals with the enforcement requirements of anti-sodomy laws since whether enforcement of laws criminalizing same-sex relations amounts to persecution is another valid question for defining persecution.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1959" data-test="inline-table" id="table-1"><figure data-dcnode-id="1960"><figcaption class="c-article-table__figcaption" data-dcnode-id="1971"><b data-dcnode-id="1972" data-test="table-caption" id="Tab1"><span data-dcnode-id="1973" instrument_node="">Table 7.1 Preliminary findings for the (in)consistency of states’ implementations</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1961"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1962" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-319-91905-8_7/tables/1" rel="nofollow"><span data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1963" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1964" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1965" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1968" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1967" fill-rule="evenodd"></path><span data-dcnode-id="1966" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1958" instrument_node="">
</span><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1956" id="Sec6"><span data-dcnode-id="1957" instrument_node="">Enforcement Requirements of the&nbsp;Existing Laws</span></h4><p data-dcnode-id="1936"><span data-dcnode-id="1955" instrument_node="">UNHCR (</span><a aria-label="Reference 2012" data-dcnode-id="1953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e822" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1954" instrument_node="">2012</span></a><span data-dcnode-id="1952" instrument_node="">, para.27) states that the existence of laws criminalizing same-sex relations is sufficient to amount to persecution, “even if irregularly, rarely or ever enforced”. Examining the three relevant cases, the study finds that one case</span><sup data-dcnode-id="1947"><a data-dcnode-id="1948" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Footnote </span></span><span data-dcnode-id="1949" instrument_node="">15</span></a></sup><span data-dcnode-id="1946" instrument_node=""> is consistent with UNHCR’s stance in which the Refugee Board in Poland </span><i data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">corrected</span></i><span data-dcnode-id="1943" instrument_node=""> the decision of the first instance body while two cases</span><sup data-dcnode-id="1938"><a data-dcnode-id="1939" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Footnote </span></span><span data-dcnode-id="1940" instrument_node="">16</span></a></sup><span data-dcnode-id="1937" instrument_node=""> are inconsistent by requiring the enforcement of such laws in order to amount to persecution.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">In the consistent case, the Head of the Office for Foreigners in Poland found that there is no real risk of persecution in Uganda based on the homosexual situation, though there are some incidents reported (X. v. The Head of the Office for Foreigners, [2012], p. 3). Considering the appeal of the applicant, the Refugee Board granted the refugee status by stating that the situation of LGBTI persons in Uganda is definitely bad and “of a particular importance is a mere fact of penalization of homosexual acts in the law” (p. 4).</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">In the first inconsistent case, the Refugee Appeal Board in South Africa rejected an asylum claim of a Tanzanian national with gay identity despite the existence of a Penal Code with 20 years’ imprisonment by arguing that “in practice law is rarely enforced because of the difficulty in obtaining proof” (Refugee Appeal Board Decision (Tanzania), [2011], para.15) and “the fact that there is a Penal Code which criminalizes sodomy does not mean that a homosexual person is being persecuted” (para.20). This inconsistency led the applicant being deprived of the international protection he needed since the Board rejected the case arguing that there is no “reasonable risk of the appellant being persecuted if he is returned to his country of nationality” (para 22).</span></p><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">In the second case, the High Court in Ireland declined an application of a Nigerian gay national for leave to seek judicial review of the decision of the Refugee Appeals Tribunal by noting that “although homosexual activity was criminalised in Nigeria, there was no evidence that prosecutions were taken in such cases” and the High Court did not object this stance (E. v. Refugee Appeals Tribunal, [2011], para.8). Although the High Court’s stance was inconsistent with UNHCR, its decision of rejecting the asylum application was still consistent since the Court rejected the refugee status not because of the lack of prosecutions against homosexuals in Nigeria but because of the alternative to live in another part of his country without any well-founded fear of persecution (internal flight alternative) (para.74).</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">In conclusion, regarding the enforcement requirements of existing laws, the study preliminary identifies that Poland, as shown in Table </span><a data-dcnode-id="1927" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1928" instrument_node="">7.1</span></a><span data-dcnode-id="1926" instrument_node="">, interpreted persecution in a consistent manner with UNHCR, while South Africa and Ireland did not. The fact that the inconsistent stance of Ireland was not the main reason of rejection does not change the finding that Ireland, together with South Africa, interpreted the enforcement requirements of the anti-sodomy laws inconsistently when compared to the UNHCR’s authoritative guidance. Thus, the study identifies a need of enhancing UNHCR’s supervisory role in terms of the interpretation of the persecution against LGBTI people when laws criminalising same sex relations exist. Beside the interpretation of persecution, interpretation of the credibility issue also plays a very decisive role in the granting or rejection of refugee status. Therefore, the next part of the study examines the consistency of states’ interpretations of whether an LGBTI asylum seeker is a credible witness with UNHCR’s authoritative guidance.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1923" id="Sec7"><span data-dcnode-id="1924" instrument_node="">Credibility</span></h3><p data-dcnode-id="1918"><span data-dcnode-id="1922" instrument_node="">Considering the already complex nature of determining the well-foundedness of the fear criterion, it may be argued that testimonies made by LGBTI people for their asylum claims are potentially more difficult to prove. In the RSD process, it is mostly expected that the applicant provides all the relevant information concerning the protection issue so that the examiner can evaluate the claim of protection (D’epifanio </span><a aria-label="Reference 2011" data-dcnode-id="1920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d12869915e865" title="D’epifanio, M. (2011). Credibility issues of LGBTI Asylum-Seekers in the refugee status determination. Master thesis, Istanbul Bilgi University."><span data-dcnode-id="1921" instrument_node="">2011</span></a><span data-dcnode-id="1919" instrument_node="">, p. 68). In this evaluation, one or more of the following points may play a role to affect states’ decisions on the credibility of asylum claims: the relation between objective and subjective element, benefit of the doubt, inconsistencies in the applicant’s testimony and risk of stereotypes.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1916" id="Sec8"><span data-dcnode-id="1917" instrument_node="">The Relation Between Subjective and Objective Element</span></h4><p data-dcnode-id="1887"><span data-dcnode-id="1915" instrument_node="">The well-founded fear criterion of the refugee definition generally involves both a subjective and objective element, though there is no general agreement among international refugee law scholars on this.</span><sup data-dcnode-id="1910"><a data-dcnode-id="1911" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Footnote </span></span><span data-dcnode-id="1912" instrument_node="">17</span></a></sup><span data-dcnode-id="1909" instrument_node=""> Since fear is something subjective, the RSD process must primarily evaluate the applicant’s statement rather than the situation in country of origin but still, this subjective element must be supported by an objective element (UNHCR </span><a aria-label="Reference 1992" data-dcnode-id="1907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e890" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="1908" instrument_node="">1992</span></a><span data-dcnode-id="1906" instrument_node="">, para.37 and 38). However, most of the time, relevant country information or evidence supporting the appellant’s testimony may lack, but this should not lead to the rejection of the asylum claim for being unfounded (UNHCR </span><a aria-label="Reference 2012" data-dcnode-id="1904" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e893" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1905" instrument_node="">2012</span></a><span data-dcnode-id="1903" instrument_node="">, para.66). Thus, according to the UNHCR’s stance (</span><a aria-label="Reference 2012" data-dcnode-id="1901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12869915e896" title="UNHCR. (2012). Guidelines on International Protection No.9: Claims to Refugee Status based on Sexual Orientation and/or Gender Identity within the context of Article 1A(2) of the 1951 Convention and/or its 1967 protocol relating to the Status of Refugees."><span data-dcnode-id="1902" instrument_node="">2012</span></a><span data-dcnode-id="1900" instrument_node="">, para.64), the applicant’s own testimony is the primary and even the only source of evidence especially where persecution is at the family and community level and in such a case, the decision maker must believe in the applicant’s declaration. In other words, the applicant shall not be rejected on the basis of lack of corroborating evidence. Examining the four cases relevant for the relation between subjective and objective element, this study finds that all the related cases are consistent with the UNHCR’s stance. Of these cases, one</span><sup data-dcnode-id="1895"><a data-dcnode-id="1896" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Footnote </span></span><span data-dcnode-id="1897" instrument_node="">18</span></a></sup><span data-dcnode-id="1894" instrument_node=""> was accepted, while three others</span><sup data-dcnode-id="1889"><a data-dcnode-id="1890" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Footnote </span></span><span data-dcnode-id="1891" instrument_node="">19</span></a></sup><span data-dcnode-id="1888" instrument_node=""> were remitted for reconsideration.</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">For example, in one of the cases, the applicant was a gay man from Sierra Leone and applied for asylum in the Netherlands (Applicant v. Minister for Security and Justice, [2013]). His application was rejected by the Minister of Justice since his story was not considered as plausible. The Council of State found the argument as an insufficient reason to reject an application for an asylum and stated that “the State Secretary must also take foreign national’s statements on how he will give expression to his sexual orientation upon return to his country of origin” (para.8.1). Then, it must examine whether such a particular way of expression exposes homosexuals to persecution in Sierra Leone (para.8.1). Thus, the District Court of the Hague stated that the State Secretary must rely on the subjective element, which must be supported by an objective element, as UNHCR also states. In another example, a national of Ghana claimed asylum in Ireland on the basis of persecution related to being gay (E.P.A v. The Refugee Appeals Tribunal, [2013], para.2). When rejected, the applicant appealed the decision of the Refugee Appeals Tribunal arguing the unlawful character of the negative credibility findings (para.3). In the appeal, The High Court granted leave to seek judicial review in respect of the decision of the Tribunal by stating that “where country of origin information contains conflicting details, the decision maker is not entitled to rely on one version of the evidence without saying why the version of opposite effect is rejected” (para.7).</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">In short, this study preliminary concludes that the relevant states’ stance examined here, namely Poland, the Netherlands, Ireland and Canada, is consistent with UNHCR by giving priority to the subjective element when supported by the objective one. The next part deals with benefit of the doubt since lack of evidence supporting all testimony may also create a credibility problem along with a problem of lack of country information.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1881" id="Sec9"><span data-dcnode-id="1882" instrument_node="">Benefit of the&nbsp;Doubt</span></h4><p data-dcnode-id="1852"><span data-dcnode-id="1880" instrument_node="">UNHCR (</span><a aria-label="Reference 1992" data-dcnode-id="1878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e926" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="1879" instrument_node="">1992</span></a><span data-dcnode-id="1877" instrument_node="">, para.196, 203 and 204) states that although the burden of proof lies on the person claiming asylum, in case of lack of evidence, the applicant can be given the benefit of the doubt with the condition of general credibility.</span><sup data-dcnode-id="1872"><a data-dcnode-id="1873" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Footnote </span></span><span data-dcnode-id="1874" instrument_node="">20</span></a></sup><span data-dcnode-id="1871" instrument_node=""> In other words, when the examiner is satisfied with the applicant’s general credibility, the administrative or judicial body may decide to believe in the testimony of the applicant although it is not sure that the applicant is telling the truth. Examining the 16 relevant cases for the benefit of the doubt, the study finds states’ interpretation of this principle as consistent with the UNHCR’s authoritative guidance. It identifies one case,</span><sup data-dcnode-id="1866"><a data-dcnode-id="1867" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Footnote </span></span><span data-dcnode-id="1868" instrument_node="">21</span></a></sup><span data-dcnode-id="1865" instrument_node=""> in which refugee status was granted, and two cases,</span><sup data-dcnode-id="1860"><a data-dcnode-id="1861" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Footnote </span></span><span data-dcnode-id="1862" instrument_node="">22</span></a></sup><span data-dcnode-id="1859" instrument_node=""> in which the matter was remitted for reconsideration, by giving the benefit of the doubt under the condition of general credibility. The study also identifies thirteen cases,</span><sup data-dcnode-id="1854"><a data-dcnode-id="1855" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Footnote </span></span><span data-dcnode-id="1856" instrument_node="">23</span></a></sup><span data-dcnode-id="1853" instrument_node=""> in which the benefit of the doubt was not given and the appeal was rejected with the absence of general credibility, being still consistent with UNHCR’s stance.</span></p><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">In the accepted case, a national of Egypt had married under pressure from his mother though he had been sexually involved with men (AD (Egypt), [2011], para.11). During his marriage, he continued sexual relations with various men and his wife not only ended the marriage but also told his brothers the reasons for the divorce. Subsequently, he began to get death threats from his brothers (para.12) He left Egypt and arrived in New Zealand, where he entered a civil union with his current partner (para.13). When he could not renew his work permit, he applied for refugee status in New Zealand (para.14). Due to the inconsistencies in his testimony, his application was rejected, stating that there was no credible evidence to conclude that he is homosexual (para.21). After only three weeks of the delivery of the declining decision, he received two letters from his brothers after 2 years of non-contact. In his second appeal, the Immigration and Protection Tribunal in New Zealand noted the remarkable timing and also asked why his brothers preferred to write him given that the appellant is illiterate. For this reason, the Tribunal did not accept the letters as genuine (para.35). However, in the appeal, he had three witnesses, who observed the appellant and his partner in their daily life and gave evidence about the apparent sincerity of the relationship (para.38). Thus, the Tribunal was satisfied that he is homosexual and found objectively that there was a real risk of persecution if he returned to Egypt (para.40, 68). In other words, the Tribunal gave the benefit of the doubt despite the existence of genuine letters with the given condition of general credibility. In the cases remitted for reconsideration, the Refugee Review Tribunal in Australia gave the benefit of the doubt when it had concerns on a digitally changed photograph submitted to the Tribunal (RRT Case No. 1003995, [2010], para.55) and when it had some minor inconsistencies of fact (RRT Case No. 0905785, [2010], para.78) thanks to general credibility.</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">In one of the rejected cases, in which the applicant was not given the benefit of the doubt in the absence of general credibility, a national of Senegal argued that he was discovered by his father in their family home while engaging in homosexual activity with a male cousin (X v. Canada, [2014]). He was arrested by the police and released on the same day on the condition of returning to the police the next day (para.5). He then left the country and applied for asylum in Canada. His application was rejected by the Refugee Protection Division (RPD) due to lack of credibility. His appeal was also rejected. He was not found a credible witness in terms of living in his family home (para.7). The RPD believed that his place of residence was not the city where his family lived but the city of Dakar. He was unable to provide documents which showed he was living in the same city as his family. However, the reason for rejection was not the lack of corroborating evidence but the existence of documentary evidence contradicting the claims. His identity documents, such as his identity card, passport and driving licence indicated his place of residence as the city of Dakar. He argued that he had lost his documents and needed urgently to replace them in Dakar. The RPD was not convinced, arguing that he could have provided the Dakar authorities with documents to establish his living place to obtain a passport. Additionally, he did not provide an explanation for the Dakar address on his driver’s licence (para.22 and 23). Thus, Canada declined his asylum claim due to the lack of general credibility, as being still consistent with UNHCR’s authoritative guidance.</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">To summarize, regarding the interpretation of the benefit of the doubt in terms of credibility, the study preliminary finds that, as shown in Table </span><a data-dcnode-id="1845" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1846" instrument_node="">7.1</span></a><span data-dcnode-id="1844" instrument_node="">, the interpretation of states such as Australia, New Zealand, Canada and the UK is consistent with the UNHCR’s opinions. The next part examines another crucial factor in the interpretation of the asylum claims of LGBTI people, namely the importance given to the inconsistencies in the applicant’s testimony.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1841" id="Sec10"><span data-dcnode-id="1842" instrument_node="">Inconsistencies in the&nbsp;Applicant’s Testimony</span></h4><p data-dcnode-id="1830"><span data-dcnode-id="1840" instrument_node="">Inconsistencies in the applicant’s testimony may also cause credibility problems and rejection of the application as being bogus. According to UNHCR (</span><a aria-label="Reference 1992" data-dcnode-id="1838" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e976" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="1839" instrument_node="">1992</span></a><span data-dcnode-id="1837" instrument_node="">, para.201), “taking isolated incidents out of context may be misleading” and “the cumulative effect of the applicant’s experience must be taken into account”. When asylum claims are based on SOGI, the interview of an applicant has more potential to contain inconsistencies due to the necessity to be secretive and feelings of shame (D’epifanio </span><a aria-label="Reference 2011" data-dcnode-id="1835" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d12869915e979" title="D’epifanio, M. (2011). Credibility issues of LGBTI Asylum-Seekers in the refugee status determination. Master thesis, Istanbul Bilgi University."><span data-dcnode-id="1836" instrument_node="">2011</span></a><span data-dcnode-id="1834" instrument_node="">, p. 49). Therefore, UNHCR (</span><a aria-label="Reference 2008" data-dcnode-id="1832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d12869915e982" title="UNHCR. (2008). UNHCR Guidance Note on Refugee Claims Relating to Sexual Orientation and Gender Identity."><span data-dcnode-id="1833" instrument_node="">2008</span></a><span data-dcnode-id="1831" instrument_node="">, para.38) clearly states that</span></p><span data-dcnode-id="1829" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="1823"><div class="c-blockquote__body" data-dcnode-id="1824"><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">The applicant will not always know that sexual orientation can constitute a basis for refugee status or can be reluctant to talk about such intimate matters, particularly where his or her sexual orientation would be the cause of shame or taboo in the country of origin. As a result, he or she may at first not feel confident to speak freely or to give an accurate account of his or her case. Even where the initial submission for asylum contains false statements, or where the application is not submitted until some time has passed after the arrival to the country of asylum, the applicant can still be able to establish a credible claim.</span></p><span data-dcnode-id="1825" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1821" instrument_node="">The study identifies only one case relevant to analyse states’ interpretation of credibility in terms of the inconsistencies in the applicant’s testimony and finds it consistent with the UNHCR’s stance.</span><sup data-dcnode-id="1816"><a data-dcnode-id="1817" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Footnote </span></span><span data-dcnode-id="1818" instrument_node="">24</span></a></sup><span data-dcnode-id="1815" instrument_node=""> In this case, a Malawian national applied for asylum in South Africa initially giving the reason for fleeing as economic (Esnat Maureen Makumba v. The Minister of Home Affairs and others, [2014]). When her application was rejected by the Department of Home Affairs, she claimed a second determination process arguing that she was persecuted on the basis of her sexual orientation in Malawi but could not tell the truth in her interviews. She explained this inconsistency as being unaware of the possibility to claim refugee status based on SOGI and as being unsure how the officials at the Refugee Reception Office would react when they learned she is a lesbian. The applicant completed a new application form by stating that “I hid the real reason as I feared facing the same homophobic persecution in South Africa that I had suffered in Malawi” (para.3). The application was first declined by the Ministry of Home Affairs and then this inconsistency with the UNHCR’s stance was </span><i data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">corrected</span></i><span data-dcnode-id="1812" instrument_node=""> with the High Court’s order to re-interview the applicant. The discussion held by the High Court of South Africa was whether an applicant was entitled to have a second chance to make a new claim for refugee status after his or her original claim had been rejected (para.9). The Court questioned whether the fact that she had lied in her original asylum application would mean that she must now live with that lie (para.11) and decided that the Department was obliged to re-interview the applicant to determine the validity of her new claim (para.26). In other words, the recent judicial decision in South Africa was consistent with the UNHCR’s stance expressed in its Handbook and guidelines. The next part deals with the last point related to credibility, namely the risk of stereotypes.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1809" id="Sec11"><span data-dcnode-id="1810" instrument_node="">Risk of Stereotypes</span></h4><p data-dcnode-id="1801"><span data-dcnode-id="1808" instrument_node="">Decision-makers are confronted with the risk of falling into their own biases when they must decide on the inclusion on a particular social group and the well-foundedness of the applicant’s fear (Weßels </span><a aria-label="Reference 2011" data-dcnode-id="1806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d12869915e1015" title="Weßels, J. (2011). Sexual orientation in refugee status determination (Working Paper Series No. 74). Refugee Studies Centre."><span data-dcnode-id="1807" instrument_node="">2011</span></a><span data-dcnode-id="1805" instrument_node="">, p. 40). In such cases, the identity of the decision maker might be more decisive than the identity of the applicant. Given such a risk, UNHCR (</span><a aria-label="Reference 1992" data-dcnode-id="1803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12869915e1018" title="UNHCR. (1992). Handbook on Procedures and Criteria for Determining Refugee Status under the 1951 Convention and the 1967 Protocol relating to the Status of Refugees."><span data-dcnode-id="1804" instrument_node="">1992</span></a><span data-dcnode-id="1802" instrument_node="">, para.202) warns the examiner not to be influenced by personal considerations. The study identifies two cases in which stereotypes about LGBTI people are a part of the decisions given and finds that one of the cases is consistent with UNHCR’s authoritative guidance while the other is not.</span></p><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">In the consistent case, the Board of Immigration Appeals in the USA denied an asylum application of a Serbian gay arguing that the applicant was not a credible witness largely based on stereotypes:</span></p><span data-dcnode-id="1798" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="1792"><div class="c-blockquote__body" data-dcnode-id="1793"><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">The Court does not know whether he is or not, his testimony is that he is overtly gay and has been since he was 17 years old. Be that as it may, it is not readily apparent to a person who would see this gentleman for the first time that, that is the case, since he bears no effeminate traits or any other trait that would mark him as a homosexual. (Todorovic v. U.S. Attorney General, [2010], p.7)</span></p><span data-dcnode-id="1794" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1790" instrument_node="">The USA Court of Appeals </span><i data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">corrected</span></i><span data-dcnode-id="1787" instrument_node=""> this inconsistency and decided for a second review of the application “free of any impermissible stereotypes or ungrounded assumptions about how gay men are supposed to look or act” (Todorovic v. U.S. Attorney General, [2010], p. 18). In the inconsistent case, the Refugee Status Appeals Authority in New Zealand gave a final decision and rejected the asylum application of a Pakistani national with gay identity, among other things, by stating that “while he claims to be distinctively gay, the Authority could not discern this from his physical presentation at the hearing” (Refugee Appeal No. 76484, [2010], para.58). Despite its inconsistency, it may be argued that the final decision was still consistent with UNHCR. Because the Authority declined the refugee status of the Pakistani gay national not because of the stereotypes on his physical presentation but because of the lack of general credibility by stating that “the appellant’s evidence to the Authority was characterised by multiple inconsistencies going to the core of his claim” (para.40).</span></p><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">In sum, the study finds out that the USA interpreted the risk of stereotypes in a consistent manner with UNHCR while New Zealand’s interpretation was inconsistent. Though this inconsistency was not the main reason for the denial, this fact does not make the inconsistency in terms of stereotypes insignificant. Thus, this study preliminary identifies that while states’ interpretation of credibility is consistent with UNHCR in a general manner, there is still a need of enhancement of the UNHCR’s supervisory role in terms of stereotypes against LGBTI asylum seekers. The next part of the study questions how
