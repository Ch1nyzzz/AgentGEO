</span><div class="row" data-dcnode-id="194"><span data-dcnode-id="383" instrument_node="">
</span><div class="col-md-10" data-dcnode-id="196"><span data-dcnode-id="382" instrument_node="">
</span><article class="post-498 post type-post status-publish format-standard has-post-thumbnail hentry category-asylum category-immigration-law category-immigration-questions tag-asylum-houston tag-asylum-seekers tag-asylum-vs-refugee tag-immigration-law tag-immigration-questions tag-refugees tag-refugees-houston" data-dcnode-id="197" id="post-498"><span data-dcnode-id="381" instrument_node="">
</span><div class="single-post" data-dcnode-id="201" id="blog"><span data-dcnode-id="380" instrument_node="">
</span><div class="post-item" data-dcnode-id="203"><span data-dcnode-id="379" instrument_node="">
</span><div class="post-item-wrap" data-dcnode-id="205"><span data-dcnode-id="378" instrument_node="">
</span><div class="post-image" data-dcnode-id="374"><span data-dcnode-id="377" instrument_node="">
</span><img alt="refugee vs asylum" class="wp-post-image aligncenter post_thumbnail wp-post-image" data-dcnode-id="376" height="262" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambimmigration.com/wp-content/uploads/2021/05/refugee-vs-asylum.jpg&amp;raw" srcset="https://lambimmigration.com/wp-content/uploads/2021/05/refugee-vs-asylum.jpg 977w, https://lambimmigration.com/wp-content/uploads/2021/05/refugee-vs-asylum-300x123.jpg 300w, https://lambimmigration.com/wp-content/uploads/2021/05/refugee-vs-asylum-650x266.jpg 650w, https://lambimmigration.com/wp-content/uploads/2021/05/refugee-vs-asylum-768x314.jpg 768w" width="640"><span data-dcnode-id="375" instrument_node="">
</span></div><span data-dcnode-id="373" instrument_node="">
</span><div class="post-item-description" data-dcnode-id="207"><span data-dcnode-id="372" instrument_node="">
</span><h2 data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Asylum Seeker vs. Refugee – What’s the Difference?</span></h2><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">What are refugees and asylum seekers? The words “refugee” and “asylum seeker,” though used in common conversation as one and the same, in fact, have important legal distinctions which are at the heart of international issues, including political persecution and poverty. These issues keep families figuratively and literally divided across borders, sometimes for years and sometimes forever. Realizing what leads individuals to seek asylum or become refugees from their home countries can be a helpful first step in understanding these issues, as well as knowing where you can give help or get help if you need it. &nbsp;</span></p><span data-dcnode-id="366" instrument_node="">
</span><h2 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Refugee vs. Asylum Seeker</span></h2><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">How are refugees and asylum seekers different? First, let’s start by defining each term to gain a better understanding.&nbsp;</span></p><span data-dcnode-id="360" instrument_node="">
</span><h3 data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Refugee Definition</span></h3><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="356" instrument_node="">A refugee is a person who was forced to flee their home country due to persecution, war or because their home government cannot or will not protect them. To be legally considered a refugee in the United States, an individual must be located outside of the U.S.; be able to validate previous or feared persecution based on the individual’s race, religion, nationality, social class or political viewpoint; be of special humanitarian concern to the U.S; not be firmly resettled in another country; and be admissible to the U.S. The complete definition of a refugee can be found at</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3Dgranuleid%2525253AUSC-prelim-title8-section1101%26num%3D0%26edition%3Dprelim"><span data-dcnode-id="355" instrument_node=""> §101(a)(42) of the Immigration and Nationality Act (INA).</span></a></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Fleeing refugees, who are often part of large groups, usually raise the attention of an official entity such as the United Nations, which obtains the refugees’ access to international aid and assistance. If coming to the U.S., a refugee must be referred to the U.S. Refugee Admissions Program for consideration as a refugee by way of a Refugee Status Determination, or RSD.&nbsp;</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Provided that an individual meets the definition of a refugee, and was either referred by the UN Refugee Agency, the U.S. Embassy or is a member of a specified group with special characteristics in a certain country (in other words, on a pre-approved list), the individual may be granted a refugee visa, meaning they have a valid refugee visa in the USA.&nbsp;</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Individuals applying for refugee status may include on their application their spouse, unmarried children under 21, and in some limited circumstances, other family members. Same-sex couples are permitted to apply as spouses, provided their marriage was legally valid in the place where they were wed.&nbsp; &nbsp;</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Refugees are entitled to many benefits and protections, as explained below.&nbsp;</span></p><span data-dcnode-id="340" instrument_node="">
</span><h3 data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Asylum Seeker Definition&nbsp;</span></h3><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">While refugees and asylum seekers often share many traits, the difference between asylum and refugee status is in that the individual’s status as an asylum seeker is essentially “limbo” while awaiting a determination of whether or not they qualify as a refugee.&nbsp;</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="333" instrument_node="">The legal definition of </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambimmigration.com/asylum/"><span data-dcnode-id="332" instrument_node="">asylum</span></a><span data-dcnode-id="330" instrument_node=""> is the status granted to a person who has successfully proven to the U.S. government that they are a refugee. Herein lies the core issue between asylum or refugee status, as between asylum vs. refugee. The asylum law definition under the</span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1158"><span data-dcnode-id="329" instrument_node=""> 8 U.S. Code §1158</span></a><span data-dcnode-id="327" instrument_node=""> is that asylum is granted to a person who has met the burden of proof to the Attorney General that race, nationality, religion, membership in a particular social group, or political opinion was or will be at least one central reason that the applicant will be persecuted in her/his home country.&nbsp;</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Asylum seekers have applied to the U.S. government for refugee status and are in the process of leaving their country of origin to avoid persecution due to their nationality, race, religion, or political affiliation. As can be imagined, the waiting game can put asylum seekers in grave danger if they haven’t already physically left their country but are trying to do so. Additionally, asylum seekers who take the chance of coming to America, such as at a land crossing or airport, enjoy no guarantee that they will not be sent immediately back home.&nbsp;</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Additionally, while they await a decision from the U.S. government, asylum seekers are entitled to nearly no benefits and protections, as explained below.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="316"><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambimmigration.com/2021/04/23/am-i-eligible-to-apply-for-asylum-applying-for-asylum-in-houston-texas/"><span data-dcnode-id="318" instrument_node="">Learn how to apply for asylum in Houston, Texas.&nbsp;</span></a></p><span data-dcnode-id="315" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="313"><img alt="us immigration form" class="wp-image-499" data-dcnode-id="314" height="266" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambimmigration.com/wp-content/uploads/2021/05/us-immigration-form-650x266.jpg&amp;raw" srcset="https://lambimmigration.com/wp-content/uploads/2021/05/us-immigration-form-650x266.jpg 650w, https://lambimmigration.com/wp-content/uploads/2021/05/us-immigration-form-300x123.jpg 300w, https://lambimmigration.com/wp-content/uploads/2021/05/us-immigration-form-768x314.jpg 768w, https://lambimmigration.com/wp-content/uploads/2021/05/us-immigration-form.jpg 977w" width="650"></figure><span data-dcnode-id="312" instrument_node="">
</span><h2 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">How Do Asylum Seekers Become Refugees?</span></h2><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">It is possible for an asylum seeker to become a refugee, and in fact, many refugees once began as asylum seekers. The question is whether or not the United States government recognizes the legitimacy of the persecution the asylum seeker is fleeing—which has had the effect of elevating whole groups to refugee status, and fast-tracking the protections and benefits associated with being a refugee. This has raised complex issues such as:&nbsp;</span></p><span data-dcnode-id="306" instrument_node="">
</span><ul data-dcnode-id="299"><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Asylum seekers crossing the Mexico/United States border&nbsp;</span></li><li data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Seeking asylum from violence associated with drug cartels in Latin American countries&nbsp;</span></li><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Asylum seekers who have been accepted or rejected at different points in recent history due to interpretations of what constitutes economic, social and political persecution&nbsp;</span></li></ul><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Though many asylum seekers have appealed on the grounds of the violence against them, they have not as a group been granted refugee status. The decisions for these asylum seekers are still made on a case-by-case basis.&nbsp;</span></p><span data-dcnode-id="295" instrument_node="">
</span><h2 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">What Rights Do Refugees and Asylum Seekers Have?</span></h2><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">The United States follows the international 1951 Convention and 1967 Protocol in addition to its own federal law, the Refugee Act of 1980, governing the rights of refugees and asylum seekers. The Refugee Act provides a road map for refugees in terms of assistance they may be granted, which includes:&nbsp;</span></p><span data-dcnode-id="289" instrument_node="">
</span><ul data-dcnode-id="264"><li data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Loans for travel&nbsp;</span></li><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Advice for travel&nbsp;</span></li><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">A medical examination&nbsp;</span></li><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">A cultural orientation&nbsp;</span></li><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Medical assistance&nbsp;</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Cash assistance&nbsp;</span></li><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Access to food stamps&nbsp;</span></li><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Access to housing assistance&nbsp;</span></li><li data-dcnode-id="269"><span data-dcnode-id="272" instrument_node="">Immediate eligibility for a work permit through</span><a data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/i-765"><span data-dcnode-id="271" instrument_node=""> Form I-765, Application for Employment Authorization</span></a></li><li data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Help from caseworkers&nbsp;</span></li><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Access to the United States Refugee Admissions Program (USRAP) which links refugees with available support from federal, state, and local government agencies and nonprofits.&nbsp;</span></li></ul><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Asylum seekers, on the other hand, have nearly no rights or access to U.S. benefits. They must find their own interpreter to help them navigate government screening procedures and application review, they cannot get food, housing, or financial assistance, and they are ineligible to work in the United States until their status is determined.&nbsp;</span></p><span data-dcnode-id="260" instrument_node="">
</span><h2 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Can Refugees or Asylum Seekers Be Deported?</span></h2><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Both refugees and asylum seekers can be deported from the U.S., though the standard for refugees is far higher. For refugees who have successfully obtained a green card, possible reasons for deportation include failing to notify the U.S. Citizenship and Immigration Services (USCIS) of a change of address, violation of U.S. immigration laws, remaining a “public charge” on government assistance for longer than five (5) years, and commission of any of the crimes listed in §237 (a) of the Immigrant and Nationality Act, which include:&nbsp;</span></p><span data-dcnode-id="254" instrument_node="">
</span><ul data-dcnode-id="229"><li data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Alien smuggling&nbsp;</span></li><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Document fraud&nbsp;</span></li><li data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Domestic violence</span></li><li data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Crimes of “moral turpitude”</span></li><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Drug of controlled dangerous substances offenses</span></li><li data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Firearms trafficking</span></li><li data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Money laundering</span></li><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Fraud</span></li><li data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Espionage</span></li><li data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Sabotage</span></li><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Terrorism&nbsp;</span></li><li data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Aggravated felonies such as rape and murder</span></li></ul><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">The bar for asylum seekers deportation is far lower. In order to be deported, an asylum seeker needs only fail an initial intake interview called the “Credible or Reasonable Fear Interview” at the discretion of a USCIS asylum officer. If an asylum seeker does not communicate to the satisfaction of their interviewer why they seek to be in the United States to flee persecution, a summary deportation may follow.&nbsp;</span></p><span data-dcnode-id="225" instrument_node="">
