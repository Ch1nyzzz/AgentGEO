</span><h1 class="title-largest" data-dcnode-id="572" itemprop="headline"><span data-dcnode-id="573" instrument_node="">What is the difference between a “refugee” and an “asylum seeker”?</span></h1><span data-dcnode-id="571" instrument_node="">
</span><div class="the-content" data-dcnode-id="322" itemprop="articleBody"><span data-dcnode-id="570" instrument_node="">
</span><div class="no_bullets" data-dcnode-id="539" id="toc_container"><p class="toc_title" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Page contents</span></p><ul class="toc_list" data-dcnode-id="540"><li data-dcnode-id="565"><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Refugees_and_the_Refugee_Convention"><span data-dcnode-id="567" instrument_node="">Refugees and the Refugee Convention</span></a></li><li data-dcnode-id="562"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Who_is_a_refugee"><span data-dcnode-id="564" instrument_node="">Who is a refugee?</span></a></li><li data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Refugee_status_is_declaratory"><span data-dcnode-id="561" instrument_node="">Refugee status is declaratory</span></a></li><li data-dcnode-id="556"><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23What_rights_do_refugees_have_under_the_Convention"><span data-dcnode-id="558" instrument_node="">What rights do refugees have under the Convention?</span></a></li><li data-dcnode-id="553"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Who_is_an_asylum_seeker"><span data-dcnode-id="555" instrument_node="">Who is an asylum seeker?</span></a></li><li data-dcnode-id="550"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23What_rights_do_asylum_seekers_have_under_the_Convention"><span data-dcnode-id="552" instrument_node="">What rights do asylum seekers have under the Convention?</span></a></li><li data-dcnode-id="547"><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Who_is_not_a_refugee"><span data-dcnode-id="549" instrument_node="">Who is not a refugee?&nbsp;</span></a></li><li data-dcnode-id="544"><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Who_cannot_be_a_refugee"><span data-dcnode-id="546" instrument_node="">Who cannot be a refugee?</span></a></li><li data-dcnode-id="541"><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-convention/%23Cessation_of_refugee_status"><span data-dcnode-id="543" instrument_node="">Cessation of refugee status</span></a></li></ul></div><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">This piece is about refugees, asylum seekers, and the Refugee Convention. It outlines who can be a refugee, and how being a refugee and having “refugee status” are two very different things.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">We also explore the rights and entitlements available to refugees and to asylum seekers awaiting the outcome of their claim, and how these have changed over time. Finally, the piece considers how people can be excluded from benefitting from refugee rights under the Convention.</span></p><span data-dcnode-id="532" instrument_node="">
</span><h2 data-dcnode-id="529"><span data-dcnode-id="530" id="Refugees_and_the_Refugee_Convention"><span data-dcnode-id="531" instrument_node="">Refugees and the Refugee Convention</span></span></h2><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">The relocation of refugees and asylum seekers dates back to the ancient customary “right of asylum”, under which the international community would provide protection to those forced to flee their home countries. In the 20th century these rights were formalised under international law into duties owed by states to those fleeing persecution and serious harm. The most important of these pieces of international law is the </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/1951-refugee-convention.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="526" instrument_node="">Refugee Convention 1951</span></a><span data-dcnode-id="524" instrument_node=""> and its 1967 Protocol.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The Refugee Convention is not UK immigration legislation. It is a piece of international human rights law, designed to remedy the problems that arise when people or groups of people can no longer rely on their state to protect their most fundamental rights. In this way it is unusual amongst other human rights law (such as the European Convention on Human Rights or ECHR) because of its palliative focus – that is, it deals with the symptoms of state-sponsored human rights abuse, and not its causes.</span></p><span data-dcnode-id="519" instrument_node="">
</span><h2 data-dcnode-id="516"><span data-dcnode-id="517" id="Who_is_a_refugee"><span data-dcnode-id="518" instrument_node="">Who is a refugee?</span></span></h2><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">A refugee is defined under the Convention as someone who has fled their country due to a “well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group or political opinion”. Anyone, anywhere, who satisfies this definition is a refugee and therefore someone entitled to the rights and benefits set out in the Convention.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">The definition itself is the subject of </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/what-is-the-legal-meaning-of-refugee/"><span data-dcnode-id="510" instrument_node="">constant legal analysis</span></a><span data-dcnode-id="508" instrument_node=""> globally, both in the courts and in academic study. With no international court supervising the application of the Convention — the way the European Court of Human Rights oversees how the ECHR is applied, for example — national courts across the world have committed to working together to find common ground. The judgments of higher national courts have a lot of influence over how the equivalent courts of different countries interpret the Convention.</span></p><span data-dcnode-id="506" instrument_node="">
</span><h2 data-dcnode-id="503"><span data-dcnode-id="504" id="Refugee_status_is_declaratory"><span data-dcnode-id="505" instrument_node="">Refugee status is declaratory</span></span></h2><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">People who meet the Convention definition are automatically refugees, regardless of whether they are formally recognised as such. Paragraph 28 of the UNHCR Handbook illustrates this point:</span></p><span data-dcnode-id="499" instrument_node="">
</span><blockquote data-dcnode-id="492"><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">A person is a refugee within the meaning of the 1951 Convention as soon as he fulfils the criteria contained in the definition. This would necessarily occur prior to the time at which his refugee status is formally determined. Recognition of his refugee status does not therefore make him a refugee but declares him to be one. </span><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">He does not become a refugee because of recognition, but is recognized because he is a refugee.</span></strong></p><span data-dcnode-id="493" instrument_node="">
</span></blockquote><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">This distinction between being a refugee and being recognised as a refugee is fundamental to the Convention. Being a refugee flows not from the grant of status but from the experience of the individual that was central to their claim. But a person must be recognised as a refugee in order to benefit from the Convention’s provisions.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="487" instrument_node="">This is the asylum claim – a request that the country of refuge provide for their rights as a refugee under the Convention. The asylum process is different in each country; the UK’s own process </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/how-to-claim-asylum-in-the-uk/"><span data-dcnode-id="486" instrument_node="">is set out here.</span></a></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">There are many thousands of refugees in the UK anxiously waiting for their asylum claims to be determined (often referred to as “asylum seekers”) and many others who have not yet made any asylum claim at all. That in no way makes them any less a refugee under international law – it just means their claim has not yet been formally considered.&nbsp;</span></p><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="477"><span data-dcnode-id="478" id="What_rights_do_refugees_have_under_the_Convention"><span data-dcnode-id="479" instrument_node="">What rights do refugees have under the Convention?</span></span></h2><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">Refugees have rights under the Convention that, over time, the UK has incorporated into domestic law. These rights include the right to lawful stay in the UK, carrying with it the right to work, study, claim housing and welfare benefits, and access free healthcare. Refugees also have a right to reunite with partners and children under the refugee </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/refugee-family-reunion-a-users-guide/"><span data-dcnode-id="474" instrument_node="">family reunion</span></a><span data-dcnode-id="472" instrument_node=""> process.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">Because refugee rights under the Convention are relatively generous compared to other forms of immigration status, states are often reluctant to grant people refugee status. In recent years, as asylum figures rose, political leaders played into far-right fears about </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2016/jan/27/david-camerons-bunch-of-migrants-quip-is-latest-of-several-such-comments"><span data-dcnode-id="468" instrument_node="">“swarms”</span></a><span data-dcnode-id="466" instrument_node=""> of migrants or “bogus” asylum claims made by people supposedly preying on Western hospitality.&nbsp;</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="463" instrument_node="">As such, it can be a bit of a battle to get refugee status in the UK. </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/immigration-statistics-year-ending-september-2019/how-many-people-do-we-grant-asylum-or-protection-to"><span data-dcnode-id="462" instrument_node="">More often than not</span></a><span data-dcnode-id="460" instrument_node="">, asylum claims in the UK are refused the first time around, with the Home Office not agreeing that the person falls within the Convention’s definition. Many have to rely on the appeal process.</span></p><span data-dcnode-id="458" instrument_node="">
</span><h2 data-dcnode-id="455"><span data-dcnode-id="456" id="Who_is_an_asylum_seeker"><span data-dcnode-id="457" instrument_node="">Who is an asylum seeker?</span></span></h2><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">As we have seen, refugee status is declaratory – the grant itself is not constitutive of being a refugee. But in order to gain refugee status, one must first claim asylum.&nbsp; An “asylum seeker” is someone whose claim for refugee status is being formally considered.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Countries have over time developed their own systems for processing asylum claims, recognising refugees and granting refugee status. What they have in common is that the asylum seeker cannot be returned to their home country whilst their claim is under consideration.</span></p><span data-dcnode-id="448" instrument_node="">
</span><h2 data-dcnode-id="445"><span data-dcnode-id="446" id="What_rights_do_asylum_seekers_have_under_the_Convention"><span data-dcnode-id="447" instrument_node="">What rights do asylum seekers have under the Convention?</span></span></h2><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Very few. Asylum seekers have the right of entry into a country. Because they may indeed turn out to be refugees, the country has a duty to examine their claim and they cannot be turned back to their home country while this is going on.&nbsp;</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Apart from this key protection, the Convention is largely silent on the rights of asylum seekers waiting for the outcome of their claim. As anxieties over border control have ramped up over the years, the rights of asylum seekers in the UK have become increasingly limited.&nbsp;</span></p><span data-dcnode-id="438" instrument_node="">
</span><div class="ebook-promo-side shortcode" data-dcnode-id="419"><span data-dcnode-id="437" instrument_node="">
</span><div class="ebook-promo-container" data-dcnode-id="421"><span data-dcnode-id="436" instrument_node="">
</span><span class="raised twenty-oswald type-white block" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">eBook</span></span><span data-dcnode-id="433" instrument_node="">
</span><span class="raised subheading-medium type-white" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Refugee law in the UK: a practical guide</span></span><span data-dcnode-id="430" instrument_node="">
</span><p class="raised type-white" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Accessible guide to the law and practice of refugee status determination in the UK including examples, arguments and common scenarios.</span></p><span data-dcnode-id="427" instrument_node="">
</span><img alt="ebook" data-dcnode-id="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/wp-content/themes/chd/img/ebook.svg&amp;raw"><span data-dcnode-id="425" instrument_node="">
</span><a class="button button-white" data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/%3Fp%3D17797%3Fga_article_ad_ebook"><span data-dcnode-id="424" instrument_node="">View Now</span></a><span data-dcnode-id="422" instrument_node="">
</span></div><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Under certain circumstances, the Home Office can decide that an asylum seeker can be held in immigration detention while their claim is processed. This is usually where a claim has been made at a late stage or the Home Office believes it to be false. The vast majority of asylum seekers are instead given </span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/downloads/applying-for-immigration-bail/"><span data-dcnode-id="416" instrument_node="">immigration bail</span></a><span data-dcnode-id="414" instrument_node="">, which can come with restrictions on the person’s right to work or study, or require them to live at a specific location.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="411" instrument_node="">Asylum seekers are unable to access mainstream benefits. For those who can’t support themselves, the National Asylum Support Service provides financial support and accommodation under </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/1999/33/section/95"><span data-dcnode-id="410" instrument_node="">section 95</span></a><span data-dcnode-id="408" instrument_node=""> of the Immigration and Asylum Act 1999. The financial support is a bare minimum: £37.75 a week, with an extra £3-5 per week for children up to the age of three years old. The accommodation provided may also </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/uk/home-news/asylum-seekers-home-office-accommodation-migrant-help-a9180896.html"><span data-dcnode-id="407" instrument_node="">be appalling</span></a><span data-dcnode-id="405" instrument_node="">, and will nearly always be outside of London.&nbsp;</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="402" instrument_node="">This is a far cry from what refugees are entitled to. Putting the inhumanity of it aside, there has always been a question-mark over whether treating “genuine asylum seekers” this way complies with the Convention. See for instance Lord Justice Simon Brown’s conclusions in </span><em data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">JCWI v Secretary of State for Social Security</span></em><span data-dcnode-id="399" instrument_node=""> </span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bailii.org/ew/cases/EWCA/Civ/1996/1293.html"><span data-dcnode-id="398" instrument_node="">[1996] EWCA 1293</span></a><span data-dcnode-id="396" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">In any event, asylum support is meant to be a temporary measure while claims are under consideration. But asylum decisions are increasingly delayed, so many remain under these arrangements for a long time.</span></p><span data-dcnode-id="391" instrument_node="">
</span><img alt="" class="alignnone size-full wp-image-124696" data-dcnode-id="390" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/wp-content/uploads/2020/05/Awaiting-initial-decision.001.jpeg&amp;raw" srcset="https://freemovement.org.uk/wp-content/uploads/2020/05/Awaiting-initial-decision.001.jpeg 1024w, https://freemovement.org.uk/wp-content/uploads/2020/05/Awaiting-initial-decision.001-300x225.jpeg 300w, https://freemovement.org.uk/wp-content/uploads/2020/05/Awaiting-initial-decision.001-600x450.jpeg 600w, https://freemovement.org.uk/wp-content/uploads/2020/05/Awaiting-initial-decision.001-768x576.jpeg 768w" width="1024"><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">While asylum seekers cannot be returned to their own countries, asylum seekers who have passed through a different EU country on their way to the UK may be returned there for their claim to be considered. The rights of asylum seekers are extremely varied between states, with some conditions being so poor that they constitute a </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/returns-to-greece/"><span data-dcnode-id="387" instrument_node="">breach of an asylum seeker’s human rights</span></a><span data-dcnode-id="385" instrument_node="">.</span></p><span data-dcnode-id="383" instrument_node="">
</span><h2 data-dcnode-id="380"><span data-dcnode-id="381" id="Who_is_not_a_refugee"><span data-dcnode-id="382" instrument_node="">Who is not a refugee?&nbsp;</span></span></h2><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">In everyday conversation, we often describe people forced to flee their homes as “refugees”. But the Convention definition is narrow and excludes many displaced people from its provisions. As an example, those fleeing natural disasters or climate change cannot benefit from the Convention. Similarly if someone fled their home country because of their fear of coronavirus infection, then they would not be entitled to refugee status.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">There are some back-up forms of protection under international law. For instance, where someone falls outside the Convention’s remit, but there are substantial grounds for believing they face a “real risk of serious harm” on return to their home country, they will automatically be considered for a grant of </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/what-is-the-difference-between-refugee-status-and-humanitarian-protection/"><span data-dcnode-id="374" instrument_node="">humanitarian protection</span></a><span data-dcnode-id="372" instrument_node=""> under the EU Qualification Directive.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">There is also fundamentally a cross-border element to the definition of a refugee – you must be outside of your home country. Those who fled their home but remain within their country’s borders are still the “responsibility” of their national government. They are defined as </span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/somalian-refugee-cessation-tribunal-guidance/"><span data-dcnode-id="368" instrument_node="">Internally Displaced Persons</span></a><span data-dcnode-id="366" instrument_node=""> to whom the Convention does not apply.&nbsp;</span></p><span data-dcnode-id="364" instrument_node="">
</span><h2 data-dcnode-id="361"><span data-dcnode-id="362" id="Who_cannot_be_a_refugee"><span data-dcnode-id="363" instrument_node="">Who cannot be a refugee?</span></span></h2><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="359" instrument_node="">Some refugees are </span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/exclusion-from-refugee-convention/"><span data-dcnode-id="358" instrument_node="">excluded from benefiting</span></a><span data-dcnode-id="356" instrument_node=""> from the Convention, such as those who are found to have committed war crimes or “crimes against humanity” under Article 1F of the Convention. More usually however those who have committed a “particularly serious crime” (with a two-year sentence or more) are excluded under </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/2002/41/section/72"><span data-dcnode-id="355" instrument_node="">section 72</span></a><span data-dcnode-id="353" instrument_node=""> of the Nationality, Immigration and Asylum Act 2002.&nbsp;</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Those who fall foul of these provisions are still refugees if they still fear persecution in their home countries. But their exclusion from the Convention means that they are no longer entitled to the rights that flow from refugee status.</span></p><span data-dcnode-id="348" instrument_node="">
</span><h2 data-dcnode-id="345"><span data-dcnode-id="346" id="Cessation_of_refugee_status"><span data-dcnode-id="347" instrument_node="">Cessation of refugee status</span></span></h2><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">People can also stop being a refugee, as it were. if they no longer meet the Convention definition. This is known as “cessation” of refugee status. The Convention sets out the general circumstances where this can happen.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">For instance, someone will no longer be a refugee if they have voluntarily returned home or re-availed themselves of their country of origin’s protection, such as by returning home. Cessation can also occur where the situation that gave rise to the well-founded fear of persecution no longer exists.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Cessation of refugee status is a relatively new problem. Throughout most of the Convention’s lifetime, the UK has respected the rights of refugees to build their new lives in the UK. Before 2005, refugees would be allowed to settle in the UK straight away, without needing to apply for any further leave. As such, cessation of refugee status was not an issue – if refugee status was given then it was given for good and not normally taken away.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">Over time, the right to settlement has been restricted. The Home Office has ceased to let refugees settle in the UK from the outset. It instead grants a fixed period of five years’ leave (uncharitably referred to as an </span><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/asylum-under-immigration-rule-334-process" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="333" instrument_node="">“appropriate probationary period”</span></a><span data-dcnode-id="331" instrument_node="">). Once the five years is up, a refugee must then apply to settle in the UK; applications can be refused. The effect of this is undoubtedly a more precarious existence and an intrusion on the building of a permanent life.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="328" instrument_node="">The UK has also introduced </span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freemovement.org.uk/in-depth-look-at-the-new-home-office-settlement-policy-for-refugees-after-five-years/"><span data-dcnode-id="327" instrument_node="">“safe return reviews”</span></a><span data-dcnode-id="325" instrument_node=""> to work out whether someone is still a refugee or whether the cessation clauses apply. Where cessation applies, the Home Office is no longer bound by the Convention and can in theory return the person to their home country. While this is relatively rare in practice, it is another limit to the generosity of Convention rights.&nbsp;</span></p><span data-dcnode-id="323" instrument_node="">
</span></div><span data-dcnode-id="321" instrument_node="">
