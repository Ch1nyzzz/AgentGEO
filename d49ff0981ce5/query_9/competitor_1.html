</span></div><span class="marker before-article" data-dcnode-id="1435"></span><div class="md-sentinel--spy-target" data-dcnode-id="1434"></div><section data-dcnode-id="1309" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1423"><strong data-dcnode-id="1431"><span data-dcnode-id="1433" id="ref41288"></span><span data-dcnode-id="1432" instrument_node="">asylum</span></strong><span data-dcnode-id="1430" instrument_node="">,  in </span><a class="md-crosslink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/international-law"><span data-dcnode-id="1429" instrument_node="">international law</span></a><span data-dcnode-id="1427" instrument_node="">, the protection granted by a state to a foreign citizen against his own state. The person for whom </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1425" data-term="asylum" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/asylum"><span data-dcnode-id="1426" instrument_node="">asylum</span></a><span data-dcnode-id="1424" instrument_node=""> is established has no legal right to demand it, and the sheltering state has no obligation to grant it.</span></p><span class="marker p1" data-dcnode-id="1421"></span><span class="marker AM1 am-inline" data-dcnode-id="1419"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1417"></span><p class="topic-paragraph" data-dcnode-id="1374"><span data-dcnode-id="1416" instrument_node="">The right of asylum falls into three basic categories: territorial, extraterritorial, and neutral. </span><span data-dcnode-id="1415" id="ref41289"></span><span data-dcnode-id="1414" instrument_node="">Territorial asylum is granted within the territorial bounds of the state offering asylum and is an exception to the practice of </span><a class="md-crosslink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/extradition"><span data-dcnode-id="1413" instrument_node="">extradition</span></a><span data-dcnode-id="1411" instrument_node="">. It is designed and employed primarily for the protection of persons accused of political offenses such as </span><a class="md-crosslink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/treason"><span data-dcnode-id="1410" instrument_node="">treason</span></a><span data-dcnode-id="1408" instrument_node="">, desertion, </span><a class="md-crosslink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/sedition"><span data-dcnode-id="1407" instrument_node="">sedition</span></a><span data-dcnode-id="1405" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/espionage"><span data-dcnode-id="1404" instrument_node="">espionage</span></a><span data-dcnode-id="1402" instrument_node="">. It has become a widespread practice, however, to exclude from this category persons accused of the </span><a class="md-crosslink autoxref" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/murder-crime"><span data-dcnode-id="1401" instrument_node="">murder</span></a><span data-dcnode-id="1399" instrument_node=""> of a head of state, certain terrorist acts, collaboration with the enemy in time of war, crimes against peace and against humanity, and </span><a class="md-crosslink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/war-crime"><span data-dcnode-id="1398" instrument_node="">war crimes</span></a><span data-dcnode-id="1396" instrument_node="">. </span><span data-dcnode-id="1395" id="ref41290"></span><span data-dcnode-id="1394" instrument_node="">Extraterritorial asylum refers to asylum granted in embassies, legations, consulates, warships, and merchant vessels in foreign territory and is thus granted within the territory of the state from which protection is sought. Cases of extraterritorial asylum granted in embassies, legations, or consulates (generally known as </span><span data-dcnode-id="1393" id="ref41291"></span><span data-dcnode-id="1392" instrument_node="">diplomatic asylum) are often occasions for dispute. For example, after an unsuccessful uprising against the communist government of </span><a class="md-crosslink autoxref" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Hungary"><span data-dcnode-id="1391" instrument_node="">Hungary</span></a><span data-dcnode-id="1389" instrument_node=""> in 1956, the </span><a class="md-crosslink autoxref" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/United-States"><span data-dcnode-id="1388" instrument_node="">United States</span></a><span data-dcnode-id="1386" instrument_node=""> controversially granted diplomatic asylum to dissident Hungarian Roman Catholic </span><a class="md-crosslink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Jozsef-Mindszenty"><span data-dcnode-id="1385" instrument_node="">József Cardinal Mindszenty</span></a><span data-dcnode-id="1383" instrument_node="">, who was given refuge in the U.S. embassy and remained there for 15 years. </span><span data-dcnode-id="1382" id="ref41292"></span><span data-dcnode-id="1381" instrument_node="">Neutral asylum is employed by states exercising </span><a class="md-crosslink" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/neutrality"><span data-dcnode-id="1380" instrument_node="">neutrality</span></a><span data-dcnode-id="1378" instrument_node=""> during a war to offer asylum within its territory to troops of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1376" data-term="belligerent" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/belligerent"><span data-dcnode-id="1377" instrument_node="">belligerent</span></a><span data-dcnode-id="1375" instrument_node=""> states, provided that the troops submit to internment for the duration of the war.</span></p><span class="marker p2" data-dcnode-id="1372"></span><span class="marker AM2 am-inline" data-dcnode-id="1370"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1368"></span><p class="topic-paragraph" data-dcnode-id="1345"><span data-dcnode-id="1367" instrument_node="">It is the right of a state to grant asylum to an individual, but it is not the right of an individual to be granted asylum by a state. This perspective is reflected in the </span><span data-dcnode-id="1366" id="ref829615"></span><a class="md-crosslink" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Universal-Declaration-of-Human-Rights"><span data-dcnode-id="1365" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="1363" instrument_node=""> (UDHR), which, though recognizing (article 14) the right “to seek and to enjoy in other countries asylum from persecution,” does not explicitly provide a right of asylum. The original draft of that article, which referred to the individual’s right “to seek and to be granted asylum from persecution,” would have afforded more protection to asylum seekers. Similarly recognizing that “the grant of asylum may place unduly heavy burdens on certain countries,” the </span><span data-dcnode-id="1362" id="ref829616"></span><a class="md-crosslink" data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Convention-Relating-to-the-Status-of-Refugees"><span data-dcnode-id="1361" instrument_node="">Convention relating to the Status of Refugees</span></a><span data-dcnode-id="1359" instrument_node="">, which was adopted by the </span><a class="md-crosslink autoxref" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/United-Nations"><span data-dcnode-id="1358" instrument_node="">United Nations</span></a><span data-dcnode-id="1356" instrument_node=""> (UN) Conference of Plenipotentiaries on the Status of Refugees and Stateless Persons in 1951, did not create a right of asylum for those seeking it, and the impressive array of rights it enumerates pertains only to those refugees “lawfully in” or “lawfully staying in” the sheltering state. Subsequent unsuccessful efforts to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1354" data-term="articulate" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/articulate"><span data-dcnode-id="1355" instrument_node="">articulate</span></a><span data-dcnode-id="1353" instrument_node=""> an individual’s right of asylum included: (1) the </span><span data-dcnode-id="1352" id="ref829633"></span><a class="md-crosslink" data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/United-Nations-General-Assembly"><span data-dcnode-id="1351" instrument_node="">UN General Assembly</span></a><span data-dcnode-id="1349" instrument_node=""> Declaration on Territorial Asylum (1967), which contained </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1347" data-term="substantive" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/substantive"><span data-dcnode-id="1348" instrument_node="">substantive</span></a><span data-dcnode-id="1346" instrument_node=""> exceptions to its non-refoulement (non-return) provision (pertaining to national security and to the safeguarding of its national population), and (2) a proposed Convention on Territorial Asylum, which never materialized.</span></p><span class="marker p3" data-dcnode-id="1343"></span><span class="marker AM3 am-inline" data-dcnode-id="1341"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1339"></span><p class="topic-paragraph" data-dcnode-id="1316"><span data-dcnode-id="1338" instrument_node="">In ancient times asylum designated a place of </span><a class="md-crosslink" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/sanctuary-religion"><span data-dcnode-id="1337" instrument_node="">sanctuary</span></a><span data-dcnode-id="1335" instrument_node=""> or protection from which a person could not be removed forcibly without </span><a class="md-crosslink" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/sacrilege"><span data-dcnode-id="1334" instrument_node="">sacrilege</span></a><span data-dcnode-id="1332" instrument_node="">. Later it came to signify an institution for the protection or relief of some class of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1330" data-term="destitute" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/destitute"><span data-dcnode-id="1331" instrument_node="">destitute</span></a><span data-dcnode-id="1329" instrument_node=""> or otherwise unfortunate persons; its most common uses in this sense were in </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">orphan asylum</span></em><span data-dcnode-id="1326" instrument_node=""> and </span><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">insane asylum</span></em><span data-dcnode-id="1323" instrument_node="">. </span><em data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">See also</span></em><span data-dcnode-id="1320" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/safe-conduct"><span data-dcnode-id="1319" instrument_node="">safe-conduct</span></a><span data-dcnode-id="1317" instrument_node="">.</span></p><span class="marker p4" data-dcnode-id="1314"></span><span class="marker AM4 am-inline" data-dcnode-id="1312"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1310"></span></section><span data-dcnode-id="1308" instrument_node="">

</span></div><span class="marker before-article" data-dcnode-id="858"></span><div class="md-sentinel--spy-target" data-dcnode-id="857"></div><section data-dcnode-id="751" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="758"><strong data-dcnode-id="854"><span data-dcnode-id="856" id="ref979800"></span><span data-dcnode-id="855" instrument_node="">Schengen Agreement</span></strong><span data-dcnode-id="853" instrument_node="">,  international convention initially approved by </span><a class="md-crosslink" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Belgium"><span data-dcnode-id="852" instrument_node="">Belgium</span></a><span data-dcnode-id="850" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/France"><span data-dcnode-id="849" instrument_node="">France</span></a><span data-dcnode-id="847" instrument_node="">, </span><a class="md-crosslink autoxref" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/West-Germany"><span data-dcnode-id="846" instrument_node="">West Germany</span></a><span data-dcnode-id="844" instrument_node=""> (later </span><a class="md-crosslink" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Germany"><span data-dcnode-id="843" instrument_node="">Germany</span></a><span data-dcnode-id="841" instrument_node="">), </span><a class="md-crosslink" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Luxembourg"><span data-dcnode-id="840" instrument_node="">Luxembourg</span></a><span data-dcnode-id="838" instrument_node="">, and the </span><a class="md-crosslink" data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Netherlands"><span data-dcnode-id="837" instrument_node="">Netherlands</span></a><span data-dcnode-id="835" instrument_node=""> in Schengen, Luxembourg, on June 14, 1985. The signatories agreed to begin reducing internal border controls, with the ultimate goal of allowing free movement of persons between countries within the Schengen area. To </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="833" data-term="implement" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/implement"><span data-dcnode-id="834" instrument_node="">implement</span></a><span data-dcnode-id="832" instrument_node=""> this, a system of shared policies regarding visa and </span><a class="md-crosslink autoxref" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/asylum"><span data-dcnode-id="831" instrument_node="">asylum</span></a><span data-dcnode-id="829" instrument_node=""> applications was adopted by member countries, and a massive database, known as the </span><span data-dcnode-id="828" id="ref1279671"></span><a class="md-crosslink" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Schengen-Information-System"><span data-dcnode-id="827" instrument_node="">Schengen Information System</span></a><span data-dcnode-id="825" instrument_node=""> (SIS), was created to share information about persons and goods transiting the Schengen zone. By the time the agreement went into effect in March 1995, </span><a class="md-crosslink" data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Italy"><span data-dcnode-id="824" instrument_node="">Italy</span></a><span data-dcnode-id="822" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Spain"><span data-dcnode-id="821" instrument_node="">Spain</span></a><span data-dcnode-id="819" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Portugal"><span data-dcnode-id="818" instrument_node="">Portugal</span></a><span data-dcnode-id="816" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Greece"><span data-dcnode-id="815" instrument_node="">Greece</span></a><span data-dcnode-id="813" instrument_node=""> had joined the original five members, with </span><a class="md-crosslink" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Austria"><span data-dcnode-id="812" instrument_node="">Austria</span></a><span data-dcnode-id="810" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Denmark"><span data-dcnode-id="809" instrument_node="">Denmark</span></a><span data-dcnode-id="807" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Finland"><span data-dcnode-id="806" instrument_node="">Finland</span></a><span data-dcnode-id="804" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Iceland"><span data-dcnode-id="803" instrument_node="">Iceland</span></a><span data-dcnode-id="801" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Norway"><span data-dcnode-id="800" instrument_node="">Norway</span></a><span data-dcnode-id="798" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sweden"><span data-dcnode-id="797" instrument_node="">Sweden</span></a><span data-dcnode-id="795" instrument_node=""> following soon after. Although the Schengen Agreement originated outside the framework of the </span><a class="md-crosslink" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/European-Union"><span data-dcnode-id="794" instrument_node="">European Union</span></a><span data-dcnode-id="792" instrument_node="">, the Treaty of Amsterdam brought it into the corpus of EU law in 1999. Upgrades were made to the SIS to aid national law enforcement bodies. In 2007 the Schengen area expanded to include the </span><a class="md-crosslink" data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Czech-Republic"><span data-dcnode-id="791" instrument_node="">Czech Republic</span></a><span data-dcnode-id="789" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Estonia"><span data-dcnode-id="788" instrument_node="">Estonia</span></a><span data-dcnode-id="786" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Hungary"><span data-dcnode-id="785" instrument_node="">Hungary</span></a><span data-dcnode-id="783" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Latvia"><span data-dcnode-id="782" instrument_node="">Latvia</span></a><span data-dcnode-id="780" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Lithuania"><span data-dcnode-id="779" instrument_node="">Lithuania</span></a><span data-dcnode-id="777" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Malta"><span data-dcnode-id="776" instrument_node="">Malta</span></a><span data-dcnode-id="774" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Poland"><span data-dcnode-id="773" instrument_node="">Poland</span></a><span data-dcnode-id="771" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Slovakia"><span data-dcnode-id="770" instrument_node="">Slovakia</span></a><span data-dcnode-id="768" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Slovenia"><span data-dcnode-id="767" instrument_node="">Slovenia</span></a><span data-dcnode-id="765" instrument_node="">. The area was further enlarged by the addition of </span><a class="md-crosslink" data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Switzerland"><span data-dcnode-id="764" instrument_node="">Switzerland</span></a><span data-dcnode-id="762" instrument_node=""> in 2008 and </span><a class="md-crosslink" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Liechtenstein"><span data-dcnode-id="761" instrument_node="">Liechtenstein</span></a><span data-dcnode-id="759" instrument_node=""> in 2011.</span></p><span class="marker p1" data-dcnode-id="756"></span><span class="marker AM1 am-inline" data-dcnode-id="754"></span><span class="marker MOD1 mod-inline" data-dcnode-id="752"></span></section><span data-dcnode-id="750" instrument_node=""> </span><span class="md-signature" data-dcnode-id="747"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/editor/Michael-Ray/6392"><span data-dcnode-id="749" instrument_node="">Michael Ray</span></a></span><span class="marker end-of-content" data-dcnode-id="745"></span><span class="marker after-article" data-dcnode-id="743"></span></div><span data-dcnode-id="741" instrument_node="">
