</span><h1 class="post-title fullwidth" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Why Is My Asylum Case Taking So Long?</span></h1><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">Why is </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hackinglawpractice.com/faqs/can-i-travel-while-my-asylum-case-is-pending/"><span data-dcnode-id="1075" instrument_node="">my asylum</span></a><span data-dcnode-id="1073" instrument_node=""> case taking so long?</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1070"></p><div class="rll-youtube-player" data-dcnode-id="1064" data-id="N8TgGk__LW4" data-query="feature=oembed" data-src="https://www.youtube.com/embed/N8TgGk__LW4" style="background-image: url(https://www.youtube.com/embed/N8TgGk__LW4)"><div data-dcnode-id="1065" data-id="N8TgGk__LW4" data-query="feature=oembed" data-src="https://www.youtube.com/embed/N8TgGk__LW4" style="background-image: url(https://www.youtube.com/embed/N8TgGk__LW4)"><img alt="" class="entered lazyloaded" data-dcnode-id="1069" data-lazy-src="https://i.ytimg.com/vi/N8TgGk__LW4/hqdefault.jpg" data-ll-status="loaded" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/N8TgGk__LW4/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="1066"></button></div></div><noscript data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&lt;iframe title="Why Is My Asylum Case Taking So Long" width="500" height="281" src="https://www.youtube.com/embed/N8TgGk__LW4?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript><p data-dcnode-id="1061"></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Hi, I’m </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hackinglawpractice.com/video/"><span data-dcnode-id="1058" instrument_node="">Jim Hacking</span></a><span data-dcnode-id="1056" instrument_node="">, immigration lawyer, practicing law throughout the United States at our office in St. Louis, Missouri. We’ve been getting a lot of calls lately from people who have filed for asylum in the United States or seeking refuge here in the U.S. and they’re wondering, “Why in the heck is my case taking so long?” They’re a lot of factors to this question and it definitely is worth shooting a video to discuss.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">As we shoot this video here in 2017, it’s important to keep in mind that the number of asylum applications has skyrocketed over the last few years. We had the so-called mother and children surge across the southern borders back in ’15 and ’16 where a number of women and children were fleeing violence in places like Guatemala, Honduras, Nicaragua, El Salvador, and they had made their way through Mexico to the United States, and that has required a lot of work by asylum officers, and that has stretched an office that is already stretched to the breaking point even further.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The fact is that we do not have enough resources dedicated to adjudicating asylum applications in a timely manner. What does that mean in plain English? It means that the government doesn’t have enough money to process these cases properly and in an efficient manner. Another reason the cases are taking so long is because for many applicants, it’s simply impossible for the government to do what they consider to be proper background checks, and they’re really falling behind in processing these cases.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Asylum applicants from predominantly Muslim countries are seeing their cases take three, four or five years to be adjudicated, and one of the main reasons is is that places like Syria and Iraq, they are not good records that are still available and that prevents the asylum officers from doing their job and determining whether or not the person seeking asylum in the United States is a security risk or not.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">Instead of deciding the cases, they’re simply sitting on the cases. We have seen these cases drag on and on. The people are having to apply for work authorizations over and over, and there’s really not any sense of urgency on the part of the </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hackinglawpractice.com/asylum-office-vs-uscis-office-whats-the-difference/"><span data-dcnode-id="1043" instrument_node="">asylum offices</span></a><span data-dcnode-id="1041" instrument_node=""> to get these cases adjudicated. Really in our office the only ones that we’ve seen get adjudicated are cases where the applicants are very old or it’s a female applicant, but basically men from Muslim countries who are seeking asylum are seeing their cases take a very, very long time to adjudicate.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">What are the things that we can do to try to move those things along? Really there’s not that much to do. You can send letters. You can contact the asylum office. If you haven’t had your interview, you can ask for an expedited interview or to take a slot from someone whose </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hackinglawpractice.com/blog/heres-what-to-do-after-you-get-your-asylum-interview-notice/"><span data-dcnode-id="1037" instrument_node="">asylum interview</span></a><span data-dcnode-id="1035" instrument_node=""> gets postponed because the applicant can’t attend. You can get on the short list and try to attend the interview on short notice.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">This carries with it its own risk because you have to be ready to go on basically a moment’s notice, to go and plead your case as to why you think you need asylum in the United States. Short of that, really the only other thing that works is filing a lawsuit against the immigration service, against the asylum office, but because of the great discretion that asylum officers have in deciding these cases, we’ve been very reluctant to file lawsuits on these cases. I think federal judges are going to give the asylum office a lot more leeway then they might in other cases now.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Delays of three, four or five years might be on their very face unreasonable and that might allow a lawsuit to proceed. We’ve had some success with asylum lawsuits. We have another one pending now. We’ve had another one where a guy was waiting for four years. We filed suit, and we got him his asylum approved after two long interviews. For the most part, when you’re </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hackinglawpractice.com/st-louis-immigration/asylum-lawyer/applying/"><span data-dcnode-id="1028" instrument_node="">applying for asylum</span></a><span data-dcnode-id="1026" instrument_node="">, you’re basically asking for a very generous gift from the United States government and they frankly have a lot of leeway in who they give it to. We can complain all we want about these case taking too long, but really there’s not that much leverage short of a lawsuit that lawyers or asylum applicants have.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">If you have any questions about why your asylum case is taking too long, or if you’re thinking about applying for asylum and you have questions, be sure to give us a call at 314-961-8200. You can email us at </span><a data-dcnode-id="1021" href="mailto:info@hackinglawpractice.com"><span data-dcnode-id="1022" instrument_node="">info@hackinglawpractice.com</span></a><span data-dcnode-id="1020" instrument_node="">.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">If you liked this video, be sure to click on the like button below. Share it with your friends and family so they can find out about asylum as well, and make sure to subscribe to all of our channel on YouTube and Facebook. Join our Facebook group Immigrant Home so that you get updated as soon as we update all of our social media. Thanks a lot and have a great day.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1009" instrument_node="">
