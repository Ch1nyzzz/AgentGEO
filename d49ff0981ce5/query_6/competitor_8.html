</span><div class="list-holder height240" data-dcnode-id="683"><span data-dcnode-id="785" instrument_node="">
</span><div class="lit" data-dcnode-id="777"><span data-dcnode-id="784" instrument_node="">(111) As in Quilloin, Michael's immediate concern was to ensure </span><span class="highlight" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">visitation rights</span></span><span data-dcnode-id="781" instrument_node=""> with his daughter and thus protect his relationship with her.</span><div class="lit_links" data-dcnode-id="778"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Rethinking%2Bvisitation%253A%2Bfrom%2Ba%2Bparental%2Bto%2Ba%2Brelational%2Bright-a0194701434"><span data-dcnode-id="780" instrument_node="">Rethinking visitation: from a parental to a relational right</span></a></div></div><div class="lit" data-dcnode-id="769"><span data-dcnode-id="776" instrument_node="">In Part II, in order to provide context for my discussion of the possibility of awarding legal rights to paid caregivers, I describe the legal doctrines that provide custody and </span><span class="highlight" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">visitation rights</span></span><span data-dcnode-id="773" instrument_node=""> to parties other than legal parents and the increasing legal recognition of functional parenthood in custody disputes and visitation petitions.</span><div class="lit_links" data-dcnode-id="770"><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Money%252C%2Bcaregiving%252C%2Band%2Bkinship%253A%2Bshould%2Bpaid%2Bcaregivers%2Bbe%2Ballowed%2Bto...-a0212106198"><span data-dcnode-id="772" instrument_node="">Money, caregiving, and kinship: should paid caregivers be allowed to obtain de facto parental status?</span></a></div></div><div class="lit" data-dcnode-id="761"><span data-dcnode-id="768" instrument_node="">50 Cent won the right to regularly see his son in a court ruling yesterday.The 'Candy Shop' rapper was denied </span><span class="highlight" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">visitation rights</span></span><span data-dcnode-id="765" instrument_node=""> to his son Marquise when he was accused of setting fire to the mansion Marquise was living in with his mother, 50's former girlfriend Shaniqua Tompkins.</span><div class="lit_links" data-dcnode-id="762"><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/RapperAAEs%2Bdelight-a0184674210"><span data-dcnode-id="764" instrument_node="">RapperAAEs delight</span></a></div></div><div class="lit" data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">The actor will have </span><span class="highlight" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">visitation rights</span></span><span data-dcnode-id="757" instrument_node=""> and will pay child support.</span><div class="lit_links" data-dcnode-id="754"><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Divorce%2Bfor%2Bfilm%2Bstar-a0180691998"><span data-dcnode-id="756" instrument_node="">Divorce for film star</span></a></div></div><div class="lit" data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">A handsome stranger and runner of his own Landscaping business shows up and offers to buy the horse, and allow Sierra's three children </span><span class="highlight" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">visitation rights</span></span><span data-dcnode-id="749" instrument_node=""> to the old gelding, and seems to be open to helping Sierra with her financial troubles.</span><div class="lit_links" data-dcnode-id="746"><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Leave%2BIt%2Bto%2BChance-a0178796544"><span data-dcnode-id="748" instrument_node="">Leave It to Chance</span></a></div></div><div class="lit" data-dcnode-id="737"><span data-dcnode-id="744" instrument_node="">Grandparents can't block custodial parents from moving out of state with a child even if the grandparents have </span><span class="highlight" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">visitation rights</span></span><span data-dcnode-id="741" instrument_node="">, the Arizona Court of Appeals ruled recently.</span><div class="lit_links" data-dcnode-id="738"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Goodbye%2Bgrandma-a0174283663"><span data-dcnode-id="740" instrument_node="">Goodbye grandma</span></a></div></div><div class="lit" data-dcnode-id="729"><span data-dcnode-id="736" instrument_node="">A JUDGE has awarded sole custody of Britney Spears' two young sons to ex-husband Kevin Federline and suspended the troubled US pop star's </span><span class="highlight" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">visitation rights</span></span><span data-dcnode-id="733" instrument_node="">.</span><div class="lit_links" data-dcnode-id="730"><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Britney%2Bloses%2Bcustody%2Bright-a0173819134"><span data-dcnode-id="732" instrument_node="">Britney loses custody right</span></a></div></div><div class="lit" data-dcnode-id="721"><span data-dcnode-id="728" instrument_node="">TROUBLED pop star Britney Spears ran over a photographer's foot in her car just hours after losing </span><span class="highlight" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">visitation rights</span></span><span data-dcnode-id="725" instrument_node=""> to her children, police said.</span><div class="lit_links" data-dcnode-id="722"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Britney%2Bruns%2Bover%2Bsnapper-a0170084657"><span data-dcnode-id="724" instrument_node="">Britney runs over snapper</span></a></div></div><div class="lit" data-dcnode-id="713"><span data-dcnode-id="720" instrument_node="">THE US judge in Britney Spears' custody battle yesterday told both sides to talk things over after the troubled singer sought expanded </span><span class="highlight" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">visitation rights</span></span><span data-dcnode-id="717" instrument_node="">. LA Superior Court commissioner Scott Gordon told lawyers for Spears and her ex-husband, Kevin Federline, to spend 45 minutes talking about what role Spears' mother and other relatives might play in visits with the children.</span><div class="lit_links" data-dcnode-id="714"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Talk%2Bit%2Bover%252C%2BBritney%2Bcase%2Blawyers%2Btold-a0169750859"><span data-dcnode-id="716" instrument_node="">Talk it over, Britney case lawyers told</span></a></div></div><div class="lit" data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">It led to her instructing lawyers at an Islamabad court to offer an out-of-court settlement for regular access through </span><span class="highlight" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">visitation rights</span></span><span data-dcnode-id="709" instrument_node=""> for Molly.</span><div class="lit_links" data-dcnode-id="706"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Love-tug%2Bmother%2Bends%2Bcase%253B%2BBRITAIN/INTERNATIONAL-a0157224229"><span data-dcnode-id="708" instrument_node="">Love-tug mother ends case; BRITAIN/INTERNATIONAL</span></a></div></div><div class="lit" data-dcnode-id="697"><span data-dcnode-id="704" instrument_node="">Kim Basinger will go to trial in Los Angeles after pleading not guilty to disregarding court orders concerning ex-husband Alec Baldwin's </span><span class="highlight" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">visitation rights</span></span><span data-dcnode-id="701" instrument_node=""> with their daughter.</span><div class="lit_links" data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/Hollywood%2Btrial%2Bset-a0152398186"><span data-dcnode-id="700" instrument_node="">Hollywood trial set</span></a></div></div><div class="lit" data-dcnode-id="689"><span data-dcnode-id="696" instrument_node="">(Colorado already has a fall ballot measure that would create a statewide registry for same-sex couples and give them many of the rights and benefits available to married couples, including health insurance, pension coverage, and hospital </span><span class="highlight" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">visitation rights</span></span><span data-dcnode-id="693" instrument_node="">.)</span><div class="lit_links" data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/No%2Bwedding%2Bbells%253A%2Bwhy%2Bbanning%2Bsame-sex%2Bmarriage%2Bspells%2Bdisaster-a0149214127"><span data-dcnode-id="692" instrument_node="">No wedding bells: why banning same-sex marriage spells disaster</span></a></div></div><div data-dcnode-id="685" data-periodicals="0"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/_/search/Search.aspx%3FBy%3D0%26SearchBy%3D0%26q%3DVisitation%2520Rights" rel="nofollow" style="margin-top:12px;float:right"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">More results ►</span></b></a></div><span data-dcnode-id="684" instrument_node="">
