</span><div class="litGroup" data-dcnode-id="794"><div class="lit" data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">had its places of </span><span class="highlight" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">asylum</span></span><span data-dcnode-id="805" instrument_node="">. These sanctuaries, in the midst of the deluge of penal and barbarous jurisdictions which inundated the city, were a species of islands which rose above the level of human justice.</span></div><div class="lit" data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">His foot once within the </span><span class="highlight" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">asylum</span></span><span data-dcnode-id="800" instrument_node="">, the criminal was sacred; but he must beware of leaving it; one step outside the sanctuary, and he fell back into the flood.</span></div><div class="lit_links" data-dcnode-id="795"><span data-dcnode-id="798" instrument_node=""> </span><a class="LitContext" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hugo.thefreelibrary.com/Notre-Dame-de-Paris/9-2%23asylum"><span data-dcnode-id="797" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="785"><span data-dcnode-id="793" instrument_node="">It had been accordingly arranged that he should remove Miserrimus Dexter to the </span><span class="highlight" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">asylum</span></span><span data-dcnode-id="790" instrument_node=""> of which he was the proprietor as soon as the preparations for receiving the patient could be completed.</span><div class="lit_links" data-dcnode-id="786"><span data-dcnode-id="789" instrument_node=""> </span><a class="LitContext" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collins.thefreelibrary.com/Law-and-the-Lady/42-1%23asylum"><span data-dcnode-id="788" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="776"><span data-dcnode-id="784" instrument_node="">We're getting a little boy from an orphan </span><span class="highlight" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">asylum</span></span><span data-dcnode-id="781" instrument_node=""> in Nova Scotia and he's coming on the train tonight."</span><div class="lit_links" data-dcnode-id="777"><span data-dcnode-id="780" instrument_node=""> </span><a class="LitContext" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//montgomery.thefreelibrary.com/Anne-Of-Green-Gables/1-1%23asylum"><span data-dcnode-id="779" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="767"><span data-dcnode-id="775" instrument_node="">"What </span><span class="highlight" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">asylum</span></span><span data-dcnode-id="772" instrument_node=""> did this yer last witness escape from?"</span><div class="lit_links" data-dcnode-id="768"><span data-dcnode-id="771" instrument_node=""> </span><a class="LitContext" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bierce.thefreelibrary.com/Can-Such-Things-Be/22-3%23asylum"><span data-dcnode-id="770" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="758"><span data-dcnode-id="766" instrument_node="">But the idea of absolute insanity which we all associate with the very name of an </span><span class="highlight" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Asylum</span></span><span data-dcnode-id="763" instrument_node="">, had, I can honestly declare, never occurred to me, in connection with her.</span><div class="lit_links" data-dcnode-id="759"><span data-dcnode-id="762" instrument_node=""> </span><a class="LitContext" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collins.thefreelibrary.com/The-Woman-in-White/5-1%23asylum"><span data-dcnode-id="761" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="749"><span data-dcnode-id="757" instrument_node="">"When my father died at the </span><span class="highlight" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">asylum</span></span><span data-dcnode-id="754" instrument_node=""> over at Day- ton, I went over there.</span><div class="lit_links" data-dcnode-id="750"><span data-dcnode-id="753" instrument_node=""> </span><a class="LitContext" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//anderson.thefreelibrary.com/Winesberg-Ohio/1-5%23asylum"><span data-dcnode-id="752" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="740"><span data-dcnode-id="748" instrument_node="">But it will be owing only to your labors, and the fearless efforts of those who, trampling the laws and Constitution of the country under their feet, are determined that they will "hide the out- cast," and that their hearths shall be, spite of the law, an </span><span class="highlight" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">asylum</span></span><span data-dcnode-id="745" instrument_node=""> for the oppressed, if, some time or other, the humblest may stand in our streets, and bear witness in safety against the cruelties of which he has been the victim.</span><div class="lit_links" data-dcnode-id="741"><span data-dcnode-id="744" instrument_node=""> </span><a class="LitContext" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//douglass.thefreelibrary.com/Narrative-of-the-Life-of-Frederick-Douglass-An-American-Slave/1-1%23asylum"><span data-dcnode-id="743" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="731"><span data-dcnode-id="739" instrument_node="">Do you belong to the </span><span class="highlight" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">asylum</span></span><span data-dcnode-id="736" instrument_node="">, or are you just on a visit or something like that?"</span><div class="lit_links" data-dcnode-id="732"><span data-dcnode-id="735" instrument_node=""> </span><a class="LitContext" data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twain.thefreelibrary.com/Connecticut-Yankee/0-2%23asylum"><span data-dcnode-id="734" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="722"><span data-dcnode-id="730" instrument_node="">And he was led away to the </span><span class="highlight" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Asylum</span></span><span data-dcnode-id="727" instrument_node=""> for the Indiscreet.</span><div class="lit_links" data-dcnode-id="723"><span data-dcnode-id="726" instrument_node=""> </span><a class="LitContext" data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bierce.thefreelibrary.com/Fantastic-Fables/125-1%23asylum"><span data-dcnode-id="725" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="713"><span data-dcnode-id="721" instrument_node="">Loscombe's correspondent -- the nephew of the gentleman who owns this house, and whose charity has given me an </span><span class="highlight" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">asylum</span></span><span data-dcnode-id="718" instrument_node="">, during the heavy affliction of my sickness, under his own roof.</span><div class="lit_links" data-dcnode-id="714"><span data-dcnode-id="717" instrument_node=""> </span><a class="LitContext" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collins.thefreelibrary.com/No-Name/9-5%23asylum"><span data-dcnode-id="716" instrument_node="">View in context</span></a></div></div><div class="lit" data-dcnode-id="704"><span data-dcnode-id="712" instrument_node="">He told them that steps would be taken immediately to free his serfs- and that till then they were not to be overburdened with labor, women while nursing their babies were not to be sent to work, assistance was to be given to the serfs, punishments were to be admonitory and not corporal, and hospitals, </span><span class="highlight" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">asylums</span></span><span data-dcnode-id="709" instrument_node="">, and schools were to be established on all the estates.</span><div class="lit_links" data-dcnode-id="705"><span data-dcnode-id="708" instrument_node=""> </span><a class="LitContext" data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tolstoy.thefreelibrary.com/War-and-Peace/5-10%23asylum"><span data-dcnode-id="707" instrument_node="">View in context</span></a></div></div><div data-dcnode-id="700" data-periodicals="4"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreelibrary.com/_/search/Search.aspx%3FBy%3D0%26SearchBy%3D4%26q%3Dasylum" rel="nofollow" style="margin-top:12px;float:right"><b data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">More results ►</span></b></a></div><span data-dcnode-id="699" instrument_node="">
