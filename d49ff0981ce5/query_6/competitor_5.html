</span><div class="tabs" data-dcnode-id="697"></div><span data-dcnode-id="696" instrument_node=""> </span><div about="/article/it-legal-cross-us-border-seek-asylum" class="ds-1col node node-article full body-format view-mode-full" data-dcnode-id="207" typeof="sioc:Item foaf:Document"><span data-dcnode-id="695" instrument_node="">
</span><div about="/embeddable/hero/10930" class="ds-1col entity e-hero e-variation-1 view-mode-e_variation_1 hero-for-how-people-seek-asylum-at-the-u-s-border" data-dcnode-id="693" id="hero-for-how-people-seek-asylum-at-the-u-s-border" typeof=""><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Families escaping&nbsp;violence and persecution in Guatemala, Honduras, El Salvador, Haiti, Venezuala, Cuba, Nicaragua, and other countries in crisis have undertaken a dangerous journey to seek safety in the United States.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">People </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/topic/seeking-safety-border"><span data-dcnode-id="687" instrument_node="">arriving at the U.S. border</span></a><span data-dcnode-id="685" instrument_node=""> have the right to request asylum without being criminalized, turned back&nbsp;or separated from their children—even during a pandemic. Here’s how the process works:</span></p><span data-dcnode-id="683" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="680"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">What is asylum?</span></strong></h3><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Asylum is a form of protection granted to individuals who can demonstrate that they are unable or unwilling to return to their country because of persecution or a well-founded fear of persecution on account of:</span></p><span data-dcnode-id="676" instrument_node="">
</span><ul data-dcnode-id="659"><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">race,</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">religion,</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">nationality,</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">membership in a particular social group,</span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">or political opinion.</span></li><span data-dcnode-id="660" instrument_node="">
</span></ul><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The right to seek asylum was incorporated into international law following the atrocities of World War II. Congress adopted key provisions of the Geneva Refugee Convention (including the international definition of a refugee) into U.S.&nbsp;immigration law when it passed the Refugee Act of 1980.</span></p><span data-dcnode-id="655" instrument_node="">
</span><div about="/embeddable/image/17652" class="ds-1col entity e-image e-variation-default e-caption-default view-mode-default lincy-for-asylum-article-march-2021" data-dcnode-id="640" id="lincy-for-asylum-article-march-2021" typeof=""><span data-dcnode-id="654" instrument_node="">
</span><div class="field field-name-field-e-image field-type-image field-label-hidden" data-dcnode-id="641"><div class="field-items" data-dcnode-id="642"><div class="field-item even" data-dcnode-id="643"><figure class="ds-1col file file-image file-image-jpeg view-mode-image_well_width full-figure" data-dcnode-id="645"><span data-dcnode-id="653" instrument_node="">

to_sized.jpg?itok=XHb5YSov&amp;timestamp=1616555316 2400w" title="Lincy Sopall, a transgender woman who faced abuse and persecution in Honduras and received asylum in the U.S. "><figcaption class="caption-wrap" data-dcnode-id="646"><div class="caption" data-dcnode-id="647"><p class="photo-caption" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Lincy Sopall, a transgender woman who faced abuse and persecution in Honduras, received asylum in the U.S. in 2018 and works as a fashion designer. She says of her decision to flee: "I had only two choices: leave Honduras and live or stay and die."</span></p><h6 class="photographer" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Photo: Photo: Andrew Oberstadt/IRC</span></h6></div></figcaption></figure><span data-dcnode-id="644" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="639" instrument_node="">
</span><h2 class="section-title" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Who is an asylum seeker?</span></h2><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">An asylum seeker is someone who has fled their home in search of safety and protection in another country. Because he or she cannot obtain protection in their home country, they seek it elsewhere. Asylum seekers may be of any age, gender, socio-economic status&nbsp;or nationality—though the majority come from regions of the world that are suffering from conflict, disaster&nbsp;and weak rule of law.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">“Asylee” is the term used in the U.S. for people who have been granted asylum. Under U.S. immigration law, a person granted asylum is legally allowed to remain in the country without fear of deportation. They qualify to work, travel abroad&nbsp;and apply for their spouse or children under the age of 21 to join them.</span></p><span data-dcnode-id="630" instrument_node="">
</span><div about="/embeddable/question/10932" class="ds-1col entity e-question e-variation-default e-question--no-answer-image view-mode-default are-asylum-seekers-refugees-" data-dcnode-id="588" id="are-asylum-seekers-refugees-" typeof=""><span data-dcnode-id="629" instrument_node="">
</span><div class="e-question__icon-wrapper" data-dcnode-id="618"><svg class="e-question__icon" data-dcnode-id="619" enable-background="new 0 0 100 100" version="1.1" viewBox="0 0 100 100" xml:space="preserve" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="628" instrument_node="">

</span></div><div class="e-question__text-wrapper" data-dcnode-id="589"><div class="e-question__question-wrapper" data-dcnode-id="615"><div class="e-question__question" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Are asylum seekers refugees?</span></div></div><ul class="e-question__answer-options" data-dcnode-id="605"><li class="e-question__answer-option first" data-answer-index="0" data-dcnode-id="613" data-question="10932"><span data-dcnode-id="614" instrument_node="">Yes</span></li><span data-dcnode-id="612" instrument_node="">
</span><li class="e-question__answer-option" data-answer-index="1" data-dcnode-id="610" data-question="10932"><span data-dcnode-id="611" instrument_node="">No</span></li><span data-dcnode-id="609" instrument_node="">
</span><li class="e-question__answer-option last" data-answer-index="2" data-dcnode-id="607" data-question="10932"><span data-dcnode-id="608" instrument_node="">It depends</span></li><span data-dcnode-id="606" instrument_node="">
</span></ul><div class="e-question__right-or-wrong" data-dcnode-id="604"></div><div class="e-question__answer-wrapper" data-dcnode-id="590"><div class="e-question__answer-information" data-dcnode-id="591"><p data-dcnode-id="596"><span data-dcnode-id="603" instrument_node="">To be granted asylum, one must meet the </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/article/migrants-asylum-seekers-refugees-and-immigrants-whats-difference"><span data-dcnode-id="602" instrument_node="">definition of a refugee.</span></a><span data-dcnode-id="600" instrument_node=""> However, international law recognizes that the refugee status determination process can be lengthy and complex. Therefore, asylum seekers should receive certain protections </span><em data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">before</span></em><span data-dcnode-id="597" instrument_node=""> a state has officially recognized them as refugees.&nbsp;Asylum seekers begin their process either at the U.S. border or within the U.S.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">"A refugee is inherently a refugee even if a government hasn’t yet made that determination," says IRC immigration director Olga Byrne. "If you meet that definition and you’re fleeing danger, you should not be penalized for your manner of entry, and you should not be turned away at the border to a country where you’d face persecution."</span></p><span data-dcnode-id="592" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="587" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Is seeking asylum legal?</span></h3><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Yes, seeking asylum is legal—even during a pandemic.&nbsp;Asylum seekers must be in the U.S. or at a port of entry (an airport or an official land crossing) to request the opportunity to apply for asylum. "There’s no way to ask for a visa or any type of authorization in advance for the purpose of seeking asylum,” says IRC director of asylum and immigration legal services Olga Byrne. “You just have to show up." &nbsp;</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">During the COVID-19 pandemic, epidemiologists and other public health experts have </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publichealth.columbia.edu/public-health-now/news/public-health-experts-issue-recommendations-protect-public-health-and-lives-asylum-seekers"><span data-dcnode-id="579" instrument_node="">made clear</span></a><span data-dcnode-id="577" instrument_node=""> that asylum seekers and their children can be safely processed at the border using public health measures.</span></p><span data-dcnode-id="575" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">How do people seek asylum at the border?</span></h3><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Despite established rights under U.S. and international law, people’s access to&nbsp;asylum at the border was&nbsp;severely limited under the Trump Administration and many of the most severe policies continued well into the Biden Administration.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">In March 2020,&nbsp;the Trump Administration implemented a public health rule&nbsp;to turn away most asylum seekers at the border–without giving them a chance to present their cases for asylum. The rule is commonly referred to as “Title 42” because its legal authority derives from Title 42 of the U.S. Code.&nbsp;</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">After over a year of calls to end Title 42&nbsp;</span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phr.org/our-work/resources/neither-safety-nor-health/%23_"><span data-dcnode-id="564" instrument_node="">from health officials</span></a><span data-dcnode-id="562" instrument_node=""> and advocates, President Biden finally </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/press-release/irc-celebrates-end-title-42-calls-further-action-protect-legal-rights-asylum-seekers"><span data-dcnode-id="561" instrument_node="">announced</span></a><span data-dcnode-id="559" instrument_node=""> that the policy would be terminated, effective in May of 2022.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Another policy, called the Migrant Protection Protocols (MPP) or “Remain in Mexico,” forces certain asylum seekers&nbsp;to wait out their U.S. immigration court cases in Mexico with little or no access to legal counsel. The Biden Administration initially terminated the program before a federal court ordered its reinstatement.&nbsp;</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Although the administration is fighting the&nbsp;MPP case in court and has issued a new memo attempting to terminate MPP, it has since worked with Mexico to continue and even expand the program. These changes were supposed to address humanitarian concerns. In actuality, asylum seekers continue to be stuck in limbo, and the changes put Haitians and other Black asylum seekers particularly at risk.&nbsp;</span></p><span data-dcnode-id="551" instrument_node="">
</span><div about="/embeddable/pull_quote/19800" class="ds-1col entity e-pull-quote e-variation-default e-pullquote-position-right view-mode-default is-it-legal-to-seek-asylum-quote-2022" data-dcnode-id="546" id="is-it-legal-to-seek-asylum-quote-2022" typeof=""><span data-dcnode-id="550" instrument_node="">
</span><blockquote data-dcnode-id="547"><div class="blockquote-text" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Here in Tijuana, we’re in exactly the same conditions that people are fleeing from.</span></div></blockquote></div><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">As a result, people are being forced into dangerous conditions in northern Mexico. In some cases, they face threats similar to the ones that they fled. In 2021, the border cities Tijuana and Ciudad Juarez ranked within the top five municipalities in Mexico with the highest instances of homicide, femicide, kidnapping, domestic violence and human trafficking.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">“Here in Tijuana, we’re in exactly the same conditions that people are fleeing from, everything from cartels and violence to gang presence,” says Kathy Kruger, who works for IRC -partner Casa del Migrante in Tijuana, Mexico. Local shelters and organizations like hers have made heroic efforts to help asylum seekers despite strained resources.&nbsp;</span></p><span data-dcnode-id="539" instrument_node="">
</span><div about="/embeddable/image/15703" class="ds-1col entity e-image e-variation-default e-caption-default view-mode-default stephanie-thomas-judy-asylum-seekers" data-dcnode-id="524" id="stephanie-thomas-judy-asylum-seekers" typeof=""><span data-dcnode-id="538" instrument_node="">
</span><div class="field field-name-field-e-image field-type-image field-label-hidden" data-dcnode-id="525"><div class="field-items" data-dcnode-id="526"><div class="field-item even" data-dcnode-id="527"><figure class="ds-1col file file-image file-image-jpeg view-mode-image_well_width full-figure" data-dcnode-id="529"><span data-dcnode-id="537" instrument_node="">
</span><img alt="In the IRC's Welcome Center for asylum seekers, a husband and wife sit with their back to the camera as they discuss their journey as asylum seekers. The wife is holding their 2-year-old daughter. " data-dcnode-id="536" sizes="(min-width: 1200px) 819px,(min-width: 640px) 70vw,100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/15703/e-image/asylum_photo_sized.jpg%3Fitok%3DAGkT_oZe%26timestamp%3D1595977596&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7?timestamp=1595977596 1w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_1x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=J2q-ySSc&amp;timestamp=1595977596 640w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_1x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=jG9grmto&amp;timestamp=1595977596 1024w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=AGkT_oZe&amp;timestamp=1595977596 1200w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_2x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=tKJUSoWe&amp;timestamp=1595977596 1280w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_3x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=ZqNWv-L2&amp;timestamp=1595977596 1920w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_2x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=7iIkWiUE&amp;timestamp=1595977596 2048w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_2x/public/image/15703/e-image/asylum_photo_sized.jpg?itok=V_oq94iR&amp;timestamp=1595977596 2400w" title="Stephanie and Thomas with their two-year-old daughter. "><figcaption class="caption-wrap" data-dcnode-id="530"><div class="caption" data-dcnode-id="531"><p class="photo-caption" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">19-year-old Stephanie and her 22-year-old husband Thomas were forced to flee Honduras with their two-year-old daughter, Judy, because of gang violence. </span></p><h6 class="photographer" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Photo: Andrew Oberstadt/IRC</span></h6></div></figcaption></figure><span data-dcnode-id="528" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">Language barriers and racism have made the situation particularly dangerous for Black asylum seekers, as they face discrimination and violence on their journey and at the border. In just one example, the Haitian Bridge Alliance and Espacio Migrante </span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeesinternational.org/reports/2021/12/13/its-very-hard-to-have-rights-the-impact-of-covid-19-on-refugee-and-migrant-communities-in-tijuana"><span data-dcnode-id="521" instrument_node="">documented</span></a><span data-dcnode-id="519" instrument_node=""> extensive evidence of discrimination in Tijuana, particularly as it relates to accessing services during the COVID-19 pandemic.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="516" instrument_node="">Those asylum seekers who do make it to the U.S. will eventually have to make their case to stay in immigration court. There, the outcome can be vastly different depending&nbsp;on whether or not they can access legal representation. Unlike in the U.S. criminal legal system, asylum seekers are not guaranteed a government-funded lawyer.&nbsp;</span><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trac.syr.edu/immigration/reports/448/"><span data-dcnode-id="515" instrument_node="">One study</span></a><span data-dcnode-id="513" instrument_node=""> found that asylum seekers who had submitted an asylum application before the immigration court were five times more likely to be granted asylum if they had a lawyer. (To learn more, </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/article/what-happens-when-asylum-seekers-face-deportation-without-lawyer"><span data-dcnode-id="512" instrument_node="">read IRC staff attorney Kayla Moore's account</span></a><span data-dcnode-id="510" instrument_node=""> of an asylum seeker who had to make his case without a lawyer.)</span></p><span data-dcnode-id="508" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Where do asylum seekers in the U.S. come from?</span></h3><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">A substantial number of asylum seekers are fleeing violence, persecution, and natural disasters in Haiti and the northern Central American countries of Guatemala, Honduras and El Salvador. Asylum seekers also come from Venezuela, Cuba, Nicaragua, Brazil, India, and African countries, such as Eritrea, Ghana, Ethiopia and Cameroon.&nbsp;A small number of Ukrainians have crossed the border from Mexico to ask for asylum.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">"People are usually displaced within their own countries first,” says Meghan Lopez, the IRC’s regional vice president for Latin America. “However, the vast majority encounter risks and deteriorating living conditions similar to the ones they fled, leaving them no choice but to seek safety elsewhere.”</span></p><span data-dcnode-id="499" instrument_node="">
</span><div about="/embeddable/image/17072" class="ds-1col entity e-image e-variation-default e-caption-default view-mode-default valentina-photo-for-inauguration" data-dcnode-id="484" id="valentina-photo-for-inauguration" typeof=""><span data-dcnode-id="498" instrument_node="">
</span><div class="field field-name-field-e-image field-type-image field-label-hidden" data-dcnode-id="485"><div class="field-items" data-dcnode-id="486"><div class="field-item even" data-dcnode-id="487"><figure class="ds-1col file file-image file-image-jpeg view-mode-image_well_width full-figure" data-dcnode-id="489"><span data-dcnode-id="497" instrument_node="">
</span><img alt="Valentina, a refugee from El Salvador, stands on a bridge in Dallas, TX, and looks out over the water. " data-dcnode-id="496" sizes="(min-width: 1200px) 819px,(min-width: 640px) 70vw,100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg%3Fitok%3DN2N2cn3K%26timestamp%3D1611100717&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7?timestamp=1611100717 1w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_1x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=7pewkczu&amp;timestamp=1611100717 640w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_1x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=gdAMTMnr&amp;timestamp=1611100717 1024w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=N2N2cn3K&amp;timestamp=1611100717 1200w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_2x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=sPca6APc&amp;timestamp=1611100717 1280w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_3x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=nU7FGU1X&amp;timestamp=1611100717 1920w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_2x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=Z9GUQeef&amp;timestamp=1611100717 2048w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_2x/public/image/17072/e-image/valentina_el_salvador_quote_sized.jpg?itok=lTqw3VyU&amp;timestamp=1611100717 2400w" title="Valentina, a refugee from El Salvador"><figcaption class="caption-wrap" data-dcnode-id="490"><div class="caption" data-dcnode-id="491"><p class="photo-caption" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">"In El Salvador, you don’t know if you’ll make it home alive at the end of the day," Valentina, a refugee resettled in Dallas, Texas, told the IRC. </span></p><h6 class="photographer" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Photo: Andrew Oberstadt/IRC</span></h6></div></figcaption></figure><span data-dcnode-id="488" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">For instance, people living in northern Central American countries such as Honduras, Guatemala and El Salvador are enduring violence akin to a war zone.&nbsp;</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">“The hardest part about living in El Salvador is the violence,” says 23-year-old Valentina, who fled to the U.S. after her family was threatened by gangs. “This is what makes life hard, because you leave your house and you don’t know if you’ll return. So yes, this is a war.”</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="473"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/article/crisis-honduras-ongoing-violence-and-climate-shocks"><span data-dcnode-id="476" instrument_node="">Honduras</span></a><span data-dcnode-id="474" instrument_node="">&nbsp;is considered the most dangerous country in the region, with a homicide rate of 38 per 100,000 people. Gender-based violence is rampant; one woman is killed every 36 hours. With chronic gang violence, extreme weather caused by climate change and the impacts of COVID-19 worsening the crisis, the number of people in need of aid has more than doubled since 2020.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">In Haiti, killings and kidnappings are on the rise, with 40% of the capital city Port-au-Prince </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/business-caribbean-port-au-prince-haiti-gangs-8793b917718e5f67f27317e765c410aa"><span data-dcnode-id="470" instrument_node="">controlled by criminal groups</span></a><span data-dcnode-id="468" instrument_node="">. Gangs also have control over ports and transport routes, blocking the flow of basic goods and hampering humanitarian access to deliver aid.&nbsp;</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">In the summer of 2021, the assassination of Haiti's president&nbsp;was followed by a powerful earthquake and a tropical storm that hit within days of one another. Infrastructure and services in Haiti have been decimated in the last decade. Haiti is also experiencing the world’s longest recession, with an estimated 60 percent of the population living in poverty.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">After they flee their home, asylum seekers must survive the extremely dangerous journey north, the path&nbsp;fraught with gang violence similar to the areas they are fleeing; gender-based violence targeting women, girls and the LGBTQ+ community; the risk of human trafficking of children, teens and women; and, for Black asylum seekers especially, racism and discrimination.</span></p><span data-dcnode-id="460" instrument_node="">
</span><div about="/embeddable/image/19102" class="ds-1col entity e-image e-variation-default e-caption-default view-mode-default haiti-image" data-dcnode-id="445" id="haiti-image" typeof=""><span data-dcnode-id="459" instrument_node="">
</span><div class="field field-name-field-e-image field-type-image field-label-hidden" data-dcnode-id="446"><div class="field-items" data-dcnode-id="447"><div class="field-item even" data-dcnode-id="448"><figure class="ds-1col file file-image file-image-jpeg view-mode-image_well_width full-figure" data-dcnode-id="450"><span data-dcnode-id="458" instrument_node="">
</span><img alt="In a makeshift encampment in Mexico, a Haitian family--a mom, dad and young daughter--look straight at the camera while sitting on the ground next to their suitcases and blankets. " data-dcnode-id="457" sizes="(min-width: 1200px) 819px,(min-width: 640px) 70vw,100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/19102/e-image/gettyimages-1235438809.jpg%3Fitok%3DWMuEgdVi%26timestamp%3D1634910302&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7?timestamp=1634910302 1w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_1x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=-lkvQCuN&amp;timestamp=1634910302 640w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_1x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=-WkmSswH&amp;timestamp=1634910302 1024w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_1x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=WMuEgdVi&amp;timestamp=1634910302 1200w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_2x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=gSfbOHR-&amp;timestamp=1634910302 1280w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_small_3x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=CjV4_fM8&amp;timestamp=1634910302 1920w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_medium_2x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=U4XVZDQq&amp;timestamp=1634910302 2048w, https://www.rescue.org/sites/default/files/styles/well_width_breakpoints_theme_rescue_large_2x/public/image/19102/e-image/gettyimages-1235438809.jpg?itok=xXejxDqC&amp;timestamp=1634910302 2400w" title="A Haitian family in a makeshift encampment in Mexico. The Biden Administration is using public health code Title 42 to turn away Haitian asylum seekers at the border. "><figcaption class="caption-wrap" data-dcnode-id="451"><div class="caption" data-dcnode-id="452"><p class="photo-caption" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">A Haitian family in a makeshift encampment in Mexico where they have been waiting to claim asylum in the U.S. The Biden Administration has used Title 42 to turn away Haitians and other asylum seekers at the border. </span></p><h6 class="photographer" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Photo: Getty</span></h6></div></figcaption></figure><span data-dcnode-id="449" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="444" instrument_node="">
</span><h2 class="section-title" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">What must President Joe Biden do to help asylum seekers?</span></h2><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">“The hopes we have in the new government is what we have been waiting on for a long time,” says Yolani, a Honduran asylum seeker placed in MPP and awaiting proceedings in Nogales, in Mexico. “Only now, with the new president, they are much greater. But [Biden] needs to see that we are still here. We haven’t gone anywhere and our wait continues.”</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">Upon taking office, President Biden issued a </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/press-release/new-suite-immigration-executive-orders-biden-restoring-humanity-and-competence"><span data-dcnode-id="436" instrument_node="">number of Executive Orders</span></a><span data-dcnode-id="434" instrument_node=""> impacting asylum seekers at the U.S. border, including one that creates a task force to reunite separated families and others that began to outline a vision for a humane asylum system and reversal of Trump Administration policies.&nbsp;</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The termination of Title 42 was a welcome step toward ensuring people fleeing violence and persecution can exercise their right to seek safety in the U.S.&nbsp;Here are the other urgent changes the Biden Administration needs to make:&nbsp;</span></p><span data-dcnode-id="429" instrument_node="">
</span><ul data-dcnode-id="413"><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">End MPP (“Remain in Mexico”) once and for all.&nbsp;</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Immediately expand capacity to process asylum seekers at ports of entry along the Southern border.&nbsp;</span></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">End Immigration and Customs Enforcement (ICE) detentions, expulsions, and deportations during the coronavirus pandemic.&nbsp;</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="415"><span data-dcnode-id="418" instrument_node="">Urgently scale up partnerships with humanitarian organizations on both sides of the border that can meet the needs of asylum seekers. Civil society groups in border communities — including the IRC — have come together to form coalitions and increase collaboration with local governments to welcome asylum-seekers and provide sanctuary.</span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">
	Civil society has the expertise and the infrastructure to help the administration achieve its goals of safe, regular, and humane migration processes that respect the right to seek asylum.</span></li><span data-dcnode-id="414" instrument_node="">
</span></ul><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">“This is a matter of political will and policy.” says Byrne. “If the Biden administration gets it right, the U.S. can credibly urge the international community to step up and share responsibility worldwide. If not, the consequences will be measured in lives lost and in regional and political instability.”</span></p><span data-dcnode-id="409" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">How can I help asylum seekers?</span></h3><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="402"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//help.rescue.org/donate/help-separated-children"><span data-dcnode-id="405" instrument_node="">Donate</span></a><span data-dcnode-id="403" instrument_node=""> to help the IRC provide critical aid to refugees and asylum seekers worldwide.&nbsp;</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">A new bill introduced in the Senate would prevent the Biden Administration from ending the policy, known as Title 42, that denies people at the U.S.-Mexico border their legal right to asylum. </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//act.rescue.org/mvzjsim"><span data-dcnode-id="399" instrument_node="">Take action today to tell your senators to oppose this harmful legislation</span></a><span data-dcnode-id="397" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="395" instrument_node="">
</span><h3 class="subsection-title" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">How does the IRC help asylum seekers?&nbsp;</span></h3><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">The IRC provides critical support to asylum seekers on both sides of the U.S. southern border. That includes providing transitional shelter, humanitarian assistance, medical care, legal orientation,&nbsp;and travel coordination to more than 50,000 asylum seekers released from U.S. government detention since June 2018.&nbsp;</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Throughout the U.S., the IRC provides legal services, case management, mental health and medical evaluations, and other services to asylum seekers in 25 offices.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">In Latin America, the IRC works across the arc of the crisis: We are responding to the Venezuela crisis through local partners in Venezuela as well assisting Venezuelan refugees in Colombia and Ecuador. We also support vulnerable people in northern Central America (Guatemala, Honduras and El Salvador) and along the main migration corridors in Mexico, from the southern to the northern borders.</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The IRC’s work in Latin America includes supporting women’s protection and empowerment, including violence prevention and protection of women, girls and members of the LGBTQ+ community who have been survivors of gender-based violence. We provide cultural orientation and support, as well as economic recovery and development. We also provide health services that include; primary, sexual and reproductive health care, and; mental health and psychosocial support.&nbsp;</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="379" instrument_node="">In recent years, we launched critical information services for asylum seekers and vulnerable communitie:&nbsp;</span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infopalante.org/hc/es-co"><span data-dcnode-id="378" instrument_node="">InfoPa’lante</span></a><span data-dcnode-id="376" instrument_node=""> in Colombia, </span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuentanos.org/selectors"><span data-dcnode-id="375" instrument_node="">CuéntaNos</span></a><span data-dcnode-id="373" instrument_node=""> in northern Central America and </span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infodigna.org/hc/es-mx"><span data-dcnode-id="372" instrument_node="">InfoDigna</span></a><span data-dcnode-id="370" instrument_node=""> in Mexico are all part of our global Signpost project with partners including Mercy Corps, Google, Microsoft, Twilio, Cisco, Tripadvisor and Box. The digital platform includes an interactive map that connects asylum seekers and migrants to shelters, health care providers and other services. An additional service, ImportaMi, serves unaccompanied children who recently arrived in the U.S.&nbsp;</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="367" instrument_node="">After the earthquake that hit Haiti in August 2021, we </span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/press-release/irc-announces-aid-haitian-organizations-recovery-efforts-0"><span data-dcnode-id="366" instrument_node="">provided funding to support local organizations</span></a><span data-dcnode-id="364" instrument_node=""> </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fosref.org/Qns.html"><span data-dcnode-id="363" instrument_node="">FOSREF</span></a><span data-dcnode-id="361" instrument_node="">, FADHRIS and </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kayfanm.org/"><span data-dcnode-id="360" instrument_node="">Kay Fanm</span></a><span data-dcnode-id="358" instrument_node="">. Their work includes programs that prevent gender-based violence, maintain mobile health clinics, provide shelter and rebuilding materials, as well as other critical support for Haitians to help address the conditions that are causing many to flee their country.&nbsp;</span></p><span data-dcnode-id="356" instrument_node="">
</span><div about="/embeddable/donate_basic/20264" class="ds-1col entity e-donate-basic e-variation-default e-background-dark e-position-middle view-mode-default asylum-seekers-title-42-bill" data-dcnode-id="340" id="asylum-seekers-title-42-bill" typeof=""><span data-dcnode-id="355" instrument_node="">
</span><a class="group-link field-group-link GoogleAnalyticsET-processed" data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//act.rescue.org/mvzjsim"><div class="message" data-dcnode-id="350"><h3 class="title marked-down" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Tell your senators to reject anti-asylum laws </span></h3><div class="subtitle" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">A new bill would prevent the Biden Administration from ending Title 42, a policy that denies people at the U.S.-Mexico border their legal right to asylum.</span></div></div><div class="link-button" data-dcnode-id="342"><button class="cta-button" data-dcnode-id="343"><span class="main-link-text" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Take action now </span></span><svg class="icon-bullhorn" data-dcnode-id="344"><use data-dcnode-id="345" xlink:href="#bullhorn" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="346" id="bullhorn" viewBox="0 0 54 37.5"><path d="M42.2 4.1c0-.2 0-.3-.1-.5-.1-.7-.4-1.3-.8-1.9C40.4.6 39-.1 37.6 0c-.2 0-.4 0-.5.1h-.4l-.7.2-1.2.3-2.4.6C25.9 2.6 19 4.2 12 5.8c-1.7.4-3.4.8-5.2 1.2-.8.2-1.7.4-2.6.6l-.6.1h-.2l-.3.2c-.2 0-.3.1-.5.2-.7.3-1.3.8-1.8 1.5-.4.6-.7 1.4-.8 2.1v8.1c.1.7.3 1.5.7 2.1.4.6 1 1.1 1.6 1.5.3.2.7.3 1 .4H4c.6.1 1.2.3 1.9.4v9.2c0 .7.3 1.5.7 2.1.4.6 1 1.2 1.6 1.5.6.4 1.5.5 2.1.5h2c.4 0 .8-.1 1.1-.2 1.5-.4 2.6-1.6 3-3 .1-.3.2-.7.2-1V26.7c.9.2 1.6.4 2.5.6 10.4 2.4 17.1 4 17.1 4s1 .3 2.5-.1c.7-.2 1.7-.7 2.3-1.5.3-.4.7-.9.8-1.5.1-.3.2-.6.2-.9l.2-23.2zm-29.4 29v.1c0 .2-.2.3-.3.3h-2.4c-.1 0-.2-.1-.2-.2-.1-.1-.1-.2-.1-.3v-8l1.2.3c.6.1 1.2.3 1.8.4v7.4zm25.4-5.5c-.1.1-.4.1-.5.1-.1 0-6.9-1.6-17.4-4-2.6-.6-5.4-1.2-8.4-1.9-1.5-.3-3-.7-4.6-1.1-.8-.2-1.6-.4-2.4-.5l-.6-.2h-.1c-.1 0-.1-.1-.2-.2s-.1-.2-.1-.3V12c0-.1 0-.2.1-.3.1-.1.1-.2.2-.2h.2l.6-.1c.9-.2 1.7-.4 2.6-.6 1.7-.4 3.5-.8 5.2-1.2C19.7 8 26.7 6.4 33.2 4.9l2.4-.6 1.2-.3.6-.1h.2c.2
