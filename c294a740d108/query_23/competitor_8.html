</span><h1 data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Types of Building Fire Fighting Systems</span></h1><span data-dcnode-id="328" instrument_node="">
</span><p class="date" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">May 31, 2020</span></p><span data-dcnode-id="325" instrument_node="">
</span></div><span data-dcnode-id="323" instrument_node="">
</span></div><span data-dcnode-id="321" instrument_node="">
</span></div><span data-dcnode-id="319" instrument_node="">
</span><div class="clearfix" data-dcnode-id="318"></div><span data-dcnode-id="317" instrument_node="">
</span><div class="section blog-post" data-dcnode-id="186"><span data-dcnode-id="316" instrument_node="">
</span><div class="container" data-dcnode-id="188"><span data-dcnode-id="315" instrument_node="">
</span><div class="col-xs-12 col-sm-12 col-md-2 col-lg-2" data-dcnode-id="314"></div><span data-dcnode-id="313" instrument_node="">
</span><div class="col-xs-12 col-sm-12 col-md-8 col-lg-8" data-dcnode-id="192"><span data-dcnode-id="312" instrument_node="">
</span><div class="blog-content" data-dcnode-id="196"><span data-dcnode-id="311" instrument_node="">
</span><img alt="Types of Building Fire Fighting Systems" class="img-responsive" data-dcnode-id="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.capitalsolutions.pk/wp-content/uploads/2020/05/Building-fire-Fighting-Systems-1.jpg%3Ffit%3D840%252C472%26ssl%3D1&amp;raw"><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">A building is incomplete and insecure without a proper and robust fire protection system. Whether we are talking about hospitals, educational institutes, commercial facilities, or residential buildings, having an advanced fire fighting system to save the lives of occupants in case of any fire emergency is vital.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">Thanks to the rapid industrial and technological revolution, you can find a variety of fire protection systems composed of different equipment and technologies. But every </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitalsolutions.pk/product-category/fire-fighting-system/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="304" instrument_node="">fire fighting system </span></a><span data-dcnode-id="302" instrument_node="">will not work for your building or house because you build a fire fighting system depending on the size, age, and type of building locations.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">In this blog post, we are going to discuss some of the components of firefighting systems and their applications. This guide will help you to choose a better fire fighting system for your facility.</span></p><span data-dcnode-id="297" instrument_node="">
</span><h1 data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Fire Extinguishers</span></h1><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="293" instrument_node="">Fire extinguishers are generally helpful for occupants of the building to extinguish the fire until the firefighting service arrives. There are different </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitalsolutions.pk/types-of-fire-extinguishers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="292" instrument_node="">types of fire extinguishers</span></a><span data-dcnode-id="290" instrument_node=""> to handle different types of fires.</span><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">
So, occupants must have an idea of which extinguisher is going to work for which fire. For example, a water extinguisher is suitable for the fire caused by the burning of wood and paper but it will not work for electrical fires.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">You can also use multi-purpose fire extinguishers such as </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitalsolutions.pk/products/%3Fcategory%3Ddry-chemical-powder" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="284" instrument_node="">DCP Fire Extinguishers</span></a><span data-dcnode-id="282" instrument_node=""> to handle different types of fires. Extinguishers have a special color code based on the extinguishing agent.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Most fire incidents start as a small fire and the massive damage can be avoided by using the right extinguishing agent in the right amount. We also have portable extinguishers to handle small and localized fires before they go out of control. For example, extinguishers used in school science laboratories can handle small fires well.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">When it comes to the installation of extinguishers in buildings, it is recommended to install them at exits. In this way, occupants first go to the exit and then fight with the fire. If they fail to extinguish the fire, they can easily exit from the building. However, construction experts can decide better about their location keeping the other aspects in mind.</span></p><span data-dcnode-id="274" instrument_node="">
</span><h2 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Fire Hose Reels</span></h2><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Fire hose reels are another first firefighting measure but in some cases, firefighters also use them. Generally, hose reels are located at the exit so in an emergency, one can reach a safe corner of the building by just following the hose.</span></p><span data-dcnode-id="268" instrument_node="">
</span><h2 data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Fire Hydrant Systems</span></h2><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">This type of pre-installed fire fighting system is used by firefighters to extinguish the fire. These systems speed up the firefighting process as they are water reticulation systems for transporting water to control the amount of hose.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Please remember these systems are only meant to be used by trained firefighting teams. If an inexperienced person trying to use these systems can end up having serious injuries because of the high pressures.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="258" instrument_node="">A </span><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitalsolutions.pk/product/dry-barrel-fire-hydrant/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="257" instrument_node="">fire hydrant</span></a><span data-dcnode-id="255" instrument_node=""> system includes different types of equipment for successfully extinguishing fires such as:</span></p><span data-dcnode-id="253" instrument_node="">
</span><ul data-dcnode-id="242"><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Tanks</span></li><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Fire service booster connections</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Pumps</span></li><span data-dcnode-id="243" instrument_node="">
</span></ul><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Installation of a fire hydrant system is not enough for the protection of your buildings, but you have to ensure regular testing and maintenance of these systems so you can use them in case of any emergency.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">To place and install these systems, complying with the codes is not enough, you may have to hire experts dealing in the fire protection operational procedures.</span></p><span data-dcnode-id="235" instrument_node="">
</span><h2 data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Automatic Sprinkler Systems</span></h2><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Automatic sprinkler systems are more advanced and a better option than fire blankets and extinguishers. These systems are attached to fire alarms and upon detecting heat or smoke, they activate alarm but they are more than alarms. Because they also open small hoses along with ringing alarms or making a phone call to the firefighting service.</span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Upon detecting the fire, a tap is opened and this sprinkling of water continues until the fire is extinguished. They don’t necessarily extinguish fires all the time but reduce the spread of fire and control fire until firefighting teams arrive.</span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">These systems are perfect for using large or high buildings with a lot of potential fire threats. For warehouses or rooms with 13-meter height, a special sprinkler ¾ can be a good choice.</span></p><span data-dcnode-id="223" instrument_node="">
</span><h3 data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Advantages:</span></h3><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Many people have a misperception that these systems waste a lot of water. While the stats show quite the opposite, firefighters with traditional equipment waste more water than these systems.</span></p><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Disadvantage:</span></h3><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">The major disadvantage of using automatic sprinkler systems is that they can cause a lot of damage to electronic machinery and paper documents. On the other hand, they can save many human lives.</span></p><span data-dcnode-id="211" instrument_node="">
</span><h3 data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Conclusion:</span></h3><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="207" instrument_node="">We have covered different types of firefighting systems briefly. Sometimes, these systems are used as stand-alone but mostly they are used in combination to ensure the maximum protection of your homes, offices and buildings.</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">
Another important takeaway is that whatever firefighting system you have installed in your building, keep testing and upgrading the system to handle any emergency situation.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="202" instrument_node="">If you are looking for reliable firefighting systems to install in your residential buildings or commercial facilities or you need assistance with the installation of any equipment anywhere in Pakistan, contact us at: </span><a data-dcnode-id="200" href="tel:051-4446640" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="201" instrument_node="">051-4446640</span></a><span data-dcnode-id="199" instrument_node=""> our customer support team for further guidance.</span></p><span data-dcnode-id="197" instrument_node="">
