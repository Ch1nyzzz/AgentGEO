</span><h1 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">4 Types of Fire Pumps</span></h1><span data-dcnode-id="1099" instrument_node="">
</span><div class="entry" data-dcnode-id="957"><span data-dcnode-id="1098" instrument_node="">
</span><p class="postmetadata-postdate" data-dcnode-id="1095"><small data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">November 16, 2018</span></small></p><span data-dcnode-id="1094" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1088" id="attachment_2508" style="width: 318px"><img alt="4 Types of Fire Pumps" aria-describedby="caption-attachment-2508" class="size-full wp-image-2508 lazyloaded" data-dcnode-id="1093" data-src="https://www.fireline.com/wp-content/uploads/2018/11/fire-pumps.jpg" height="205" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/wp-content/uploads/2018/11/fire-pumps.jpg&amp;raw" width="308"><noscript data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">&lt;img aria-describedby="caption-attachment-2508" class="size-full wp-image-2508" src="https://www.fireline.com/wp-content/uploads/2018/11/fire-pumps.jpg" alt="4 Types of Fire Pumps" width="308" height="205" data-eio="l" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1089" id="caption-attachment-2508"><span data-dcnode-id="1090" instrument_node="">In many buildings, the fire sprinklers serving a commercial building might not be able to control or extinguish the fires that start without adequate amounts of water or water pressure. Here are some types of fire pumps you should work with your fire protection partner to evaluate and install.</span></p></div><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1085" style="font-weight: 400;"><span data-dcnode-id="1086" instrument_node="">In many buildings, the</span></span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/fire-protection-tips-dealing-flammable-substances/"><span data-dcnode-id="1084" instrument_node=""> </span><span data-dcnode-id="1082" style="font-weight: 400;"><span data-dcnode-id="1083" instrument_node="">fire sprinklers</span></span></a><span data-dcnode-id="1079" style="font-weight: 400;"><span data-dcnode-id="1080" instrument_node=""> serving a commercial building might not be able to control or extinguish the fires that start without adequate amounts of water or water pressure. In these cases, it is necessary to get a fire pump. &nbsp;Here are some types of fire pumps you should work with your fire protection partner to evaluate and install.</span></span><span data-dcnode-id="1078" id="more-2507"></span></p><span data-dcnode-id="1076" instrument_node="">
</span><h2 data-dcnode-id="1073"><span data-dcnode-id="1074" style="font-weight: 400;"><span data-dcnode-id="1075" instrument_node="">Horizontal Split Case</span></span></h2><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">Horizontal Split Cases&nbsp;are the fire pumps you will see most often. Although it needs a water source that is not part of the system itself, it is still easy to work with. This means that many</span></span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/fire-protection-hospitals/"><span data-dcnode-id="1069" instrument_node=""> </span><span data-dcnode-id="1067" style="font-weight: 400;"><span data-dcnode-id="1068" instrument_node="">fire protection</span></span></a><span data-dcnode-id="1064" style="font-weight: 400;"><span data-dcnode-id="1065" instrument_node=""> providers favor it above its counterparts. The components of the horizontal split case system are easy to reach and maintain. The size of the individual components varies as well, making it easier to replace them over time depending on what the system demands. Best of all, these systems last for years and are durable enough to provide reliable water delivery in all of that time.</span></span></p><span data-dcnode-id="1062" instrument_node="">
</span><h2 data-dcnode-id="1059"><span data-dcnode-id="1060" style="font-weight: 400;"><span data-dcnode-id="1061" instrument_node="">Vertical Split Case</span></span></h2><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node="">Vertical split case fire pumps are similar to their horizontal counterparts. The difference is that since they are vertical, they take up much less floor space. This can be a valuable distinction, especially in small businesses where there isn’t as much space for all of the necessary</span></span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/ensure-reliability-fire-safety-system/"><span data-dcnode-id="1055" instrument_node=""> </span><span data-dcnode-id="1053" style="font-weight: 400;"><span data-dcnode-id="1054" instrument_node="">fire safety systems</span></span></a><span data-dcnode-id="1050" style="font-weight: 400;"><span data-dcnode-id="1051" instrument_node="">. One major benefit of this fire pump is that it protects the motor from flooding simply due to how it is built.</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span><h2 data-dcnode-id="1045"><span data-dcnode-id="1046" style="font-weight: 400;"><span data-dcnode-id="1047" instrument_node="">Vertical In-Line</span></span></h2><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" instrument_node="">Unlike the split-case fire pumps, the vertical in-line fire pump is smaller. These save space and are ideal for small businesses or other buildings that don’t have much room to go around. Although these units do not need a special base to anchor them, problems arise whenever it’s time for preventative maintenance. That’s because the entire fire pump system needs to be disassembled and removed.</span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><h2 data-dcnode-id="1037"><span data-dcnode-id="1038" style="font-weight: 400;"><span data-dcnode-id="1039" instrument_node="">Vertical Turbine</span></span></h2><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">No matter which of the other systems are installed, all of them require positive suction to draw water from its source. This requirement does not apply to vertical turbine fire pumps. Instead, the vertical turbine fire pump can use water drawn from nearby wells or water tanks. Water is moved to the top and then dispensed whenever necessary.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><h2 data-dcnode-id="1029"><b data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Fire Protection Services from Fireline</span></b></h2><span data-dcnode-id="1028" instrument_node="">
