</span><h1 class="sub-main-heading" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Do I Need a Fire Pump?</span></h1><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="661" instrument_node="">If you have a commercial building that needs sprinklers for fire protection purposes, you might be wondering if a&nbsp;</span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kauffmanco.net/fire-pump"><span data-dcnode-id="660" instrument_node="">fire pump</span></a><span data-dcnode-id="658" instrument_node="">&nbsp;should be part of the design. It’s a very reasonable question, and we’ll attempt to answer it here.</span></p><span data-dcnode-id="656" instrument_node="">
</span><h2 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">What Is a Fire Pump?</span></h2><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">The purpose of a pump is to ensure the&nbsp;</span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kauffmanco.net/fire-sprinkler-systems"><span data-dcnode-id="651" instrument_node="">fire sprinklers</span></a><span data-dcnode-id="649" instrument_node="">&nbsp;work the way they’re supposed to by keeping water pressure at an adequate level. Without a pump in a situation where it’s needed, water might slowly trickle onto a fire, doing little to extinguish the blaze. Obviously, this is not ideal because the fire could destroy much of your property even with carefully installed sprinklers.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">How Do Fire Pumps Work?</span></h2><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Fire pumps have an electric or diesel-powered engine that kicks into gear when the fire sprinkler water pressure drops below a certain threshold. This is most likely to happen if more than one fire sprinkler activates simultaneously. Also, once firefighting teams arrive and hook up their hoses, a drop in water pressure could decrease fire sprinkler effectiveness.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">A jockey pump, a small portion of a fire pump’s control system, maintains pressure within the sprinkler system piping to an artificially high level. That way, when an appreciable drop occurs, the fire pump’s automatic controller can easily detect it and start up the pump.</span></p><span data-dcnode-id="638" instrument_node="">
</span><h2 data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Types of Buildings Where Fire Pumps Are Used</span></h2><span data-dcnode-id="635" instrument_node="">
</span><ul data-dcnode-id="618"><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="630"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">High rise buildings:</span></strong><span data-dcnode-id="631" instrument_node="">If a fire breaks out in a room on the top story of a high rise building, sprinkler heads may need extra help creating the water pressure required to douse the flames. That’s why many multistory buildings end up needing fire pumps.</span></li><span data-dcnode-id="629" instrument_node="">
</span><li data-dcnode-id="625"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Storage warehouses:</span></strong><span data-dcnode-id="626" instrument_node="">Large expanses of space have higher water pressure demands if a fire begins to spread. Warehouses are a prime example because they don’t have walls or doors to slow the fire as it spreads.</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Buildings with water storage tanks:</span></strong><span data-dcnode-id="621" instrument_node="">In most cases, a building’s sprinkler system is supplied with water from the city. If your building has onsite storage tanks for your fire sprinklers, you should certainly plan on installing a pump to create water pressure in case of a fire.</span></li><span data-dcnode-id="619" instrument_node="">
</span></ul><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Professional Fire Pump &amp; Fire Sprinklers Services in Houston</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Different types of fire pumps are used in various situations. By working closely with a professional, you can determine if you would benefit most from a centrifugal, vertical turbine, vertical inline, vertical split case, horizontal split case, positive displacement, or end suction fire pump.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Not all buildings need fire pumps, even if they fall into the classic categories that typically need them. If you’re in the Houston area, your best bet is to work with a professional from Kauffman Co. to determine if you even need a fire pump. Then, discuss your needs with an experienced technician who assesses your building’s layout to settle on the best design possible.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">When you’re ready to get started, please contact&nbsp;</span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kauffmanco.net/contact-us"><span data-dcnode-id="606" instrument_node="">Kauffman Co.</span></a><span data-dcnode-id="604" instrument_node="">&nbsp;today. We’re a family-owned fire protection company serving business owners across the Houston area.</span></p><span data-dcnode-id="602" instrument_node="">
