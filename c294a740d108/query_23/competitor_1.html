</span></header><div class="page-wrapper" data-dcnode-id="74"><section class="ffb-id-p762bp1 fg-section fg-el-has-bg fg-text-dark has-fg-bg fg-hover" data-dcnode-id="87"><span class="fg-bg" data-dcnode-id="332"><span class="fg-bg-layer fg-bg-type-color" data-dcnode-id="333" data-fg-bg="{&quot;type&quot;:&quot;color&quot;,&quot;opacity&quot;:1,&quot;color&quot;:&quot;#f7f8fa&quot;}" style="opacity: 1; background-color: #f7f8fa;"></span></span><div class="fg-container container fg-container-large fg-container-lvl--1" data-dcnode-id="88"><div class="fg-row row" data-dcnode-id="89"><div class="ffb-id-p762ec7 fg-col col-xs-12 col-md-8 fg-text-dark" data-dcnode-id="275"><div class="ffb-id-p76auo1 post-wrapper blog-grid-content post-13597 post type-post status-publish format-standard has-post-thumbnail hentry category-uncategorized fg-el-has-bg fg-text-dark has-fg-bg fg-hover" data-dcnode-id="276" id="post-13597" style="position: relative; z-index: 1;"><span class="fg-bg" data-dcnode-id="330"><span class="fg-bg-layer fg-bg-type-color" data-dcnode-id="331" data-fg-bg="{&quot;type&quot;:&quot;color&quot;,&quot;opacity&quot;:1,&quot;color&quot;:&quot;#ffffff&quot;}" style="opacity: 1; background-color: #ffffff;"></span></span><section class="ffb-id-perr2b0 featured-area fg-text-dark" data-dcnode-id="328"><img alt="types-fire-pumps" class="img-responsive full-width img-responsive full-width ff-post-featured-image" data-dcnode-id="329" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontierfireprotection.com/wp-content/uploads/freshizer/1bb81870f9e505b8fcd5f6ad7848d94c_types-fire-pumps-622-c-90.png&amp;raw"></section><h2 class="ffb-id-p76b6jl blog-grid-title-lg fg-text-dark" data-dcnode-id="325"><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontierfireprotection.com/types-of-fire-pumps/"><span data-dcnode-id="327" instrument_node="">Types of Fire Pumps</span></a></h2><div class="ffb-id-p76bbao post-content ff-post-content-element fg-text-dark" data-dcnode-id="277"><div class="post-content ff-richtext" data-dcnode-id="278"><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">There are a few different types of fire pumps that you can use for you fire sprinkler system. Fire pumps are generally used in commercial buildings when they don’t have access to enough water to extinguish a fire or if the water pressure isn’t strong enough.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">If you need a fire pump in your building, then you should make sure you choose the right one. In this blog, Frontier Fire will highlight the top four types of fire pumps to help you make the right decision. If you still aren’t sure which pump to choose, then don’t hesitate to contact us. We can help you determine which one is right for you and setup a time to install it.</span></p><span data-dcnode-id="318" instrument_node="">
</span><h2 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Types of Fire Pumps</span></h2><span data-dcnode-id="315" instrument_node="">
</span><h3 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Horizontal Split Case</span></h3><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">The horizontal split case fire pump is the most common type for commercial buildings. It’s easy to use and maintain, so fire protection technicians prefer this option. It will need an external water source, but this isn’t a huge concern. Plus it’s an extremely durable and reliable fire pump, making it a top choice.</span></p><span data-dcnode-id="309" instrument_node="">
</span><h3 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Vertical Split Case</span></h3><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The vertical split case fire pump is similar to the horizontal split case pump, but they take up less space because they’re vertical. If space is an issue in your building, then this might be the most viable option. Not to mention, because the pump is vertical, it reduces the risk of the motor flooding, which is one of the main benefits.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h3 data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Vertical In-Line</span></h3><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">The vertical in-line fire pump is smaller and more compact than the split fire case pumps. This means you can save even more space, which is ideal for small companies and buildings. The main issue with these pumps is that you have to disassemble and remove the entire system when it’s time for a maintenance/service.</span></p><span data-dcnode-id="297" instrument_node="">
</span><h3 data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Vertical Turbine</span></h3><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The vertical turbine fire pump can use water from nearby wells or tanks. Unlike the other fire pumps, it can operate without priming. It works by moving water up through the column pipe. Then the water stays at the top of the pump so it can be dispensed when needed.</span></p><span data-dcnode-id="291" instrument_node="">
</span><h2 data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Get Your Fire Pump Installed</span></h2><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="287" instrument_node="">Frontier Fire provides&nbsp;</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontierfireprotection.com/fire-sprinkler-systems/"><span data-dcnode-id="286" instrument_node="">fire pump installation</span></a><span data-dcnode-id="284" instrument_node="">&nbsp;and repair services. We can also set you up with a&nbsp;</span><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontierfireprotection.com/fire-pump-maintenance-program/"><span data-dcnode-id="283" instrument_node="">fire pump maintenance program</span></a><span data-dcnode-id="281" instrument_node="">&nbsp;to ensure your system is in optimal condition. If you’re ready to speak with a fire protection professional, then give us a call today at one of our Rocky Mountain locations.</span></p><span data-dcnode-id="279" instrument_node="">
</span></div></div></div></div><div class="ffb-id-p76e8df fg-col col-xs-12 col-md-4 fg-text-dark" data-dcnode-id="90"><div class="ffb-id-p76ed1k ark-sidebar ark-element-sidebar fg-text-dark" data-dcnode-id="91"><div class="widget ffb-widget widget_search" data-dcnode-id="260" id="search-2"><div class="blog-sidebar widget-body" data-dcnode-id="261"><form action="https://www.frontierfireprotection.com/" class="searchform input-group" data-dcnode-id="263" id="searchform" method="get" role="search"><span data-dcnode-id="274" instrument_node="">
