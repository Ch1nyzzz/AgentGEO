</span><h1 class="entry-title bg-default" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">When a Building Permit is Required</span></h1><span data-dcnode-id="702" instrument_node=""> </span></header><span data-dcnode-id="699" instrument_node="">
</span><div class="entry-content" data-dcnode-id="493"><span data-dcnode-id="698" instrument_node="">
</span><ul data-dcnode-id="654"><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Construction or demolition of a building or structure.</span></li><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="665"><span data-dcnode-id="693" instrument_node="">Installations or alterations involving
</span><ul data-dcnode-id="667"><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">the removal or addition of any wall, partition or portion thereof,</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">any structural component,</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">the repair or replacement of any required component of a fire or smoke rated assembly,</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">the alteration of any required means of egress system,</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">water supply and distribution system, sanitary drainage system or vent system,</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">electric wiring,</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">fire protection system, mechanical systems or fuel supply systems or</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">any equipment regulated by the Virginia Construction Code.</span></li><span data-dcnode-id="668" instrument_node="">
</span></ul><span data-dcnode-id="666" instrument_node="">
</span></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">For change of occupancy, application for a permit shall be made when a new certificate of occupancy is required. A new certificate of occupancy is required when the change of occupancy requires a greater degree of structural strength, fire protection, means of egress, ventilation or sanitation.</span></li><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Movement of a lot line that increases the hazard to or decreases the level of safety of an existing building or structure in comparison to the building code under which such building or structure was constructed.</span></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Removal or disturbing of any asbestos containing materials during the construction or demolition of a building or structure, including additions.</span></li><span data-dcnode-id="655" instrument_node="">
</span></ul><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">&nbsp;</span></p><span data-dcnode-id="650" instrument_node="">
</span><h2 data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The following are typical home improvements that require a Permit:</span></h2><span data-dcnode-id="647" instrument_node="">
</span><ul data-dcnode-id="600"><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Additions</span></li><span data-dcnode-id="643" instrument_node="">
</span><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Attic pull-down stairs</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Attics, finish existing</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Basements, build or enlarge</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Carports, new or enclose existing</span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Decks, new (on footings or posts) or enclose existing</span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Dormers, new</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Garages</span></li><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Masonry chimneys</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Porches, new and enclose existing</span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Retaining walls supporting more than&nbsp;3 feet of unbalanced backfill</span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Sheds, attached to house</span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Sheds or playhouses, detached greater than 256 square feet or more than one story</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Skylights</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Swimming pools, greater than 150 square feet, greater than 5,000 gallons and greater than 24 inches deep</span></li><span data-dcnode-id="601" instrument_node="">
</span></ul><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">&nbsp;</span></p><span data-dcnode-id="596" instrument_node="">
</span><h2 data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">First time installation of fixtures and appliances permanently connected to the electrical, mechanical, gas and/or plumbing system(s). This includes, but is not limited to, the following:</span></h2><span data-dcnode-id="593" instrument_node="">
</span><ul data-dcnode-id="528"><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Bathtubs</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Dishwashers</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Fans, attic/ceiling/exhaust</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Garbage disposals</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Heat pumps</span></li><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Hose bibs (exterior hose faucet)</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Ice makers</span></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Laundry tubs</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Lighting fixtures</span></li><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Electric clothes dryers</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Electric stoves/ovens</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Electric water heaters</span></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Pressure reducing valves</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Showers</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Sinks</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Smoke alarms/detectors, hard wired</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Solar energy equipment</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Sump pumps</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Toilets</span></li><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Trash compactors</span></li><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Water treatment equipment</span></li><span data-dcnode-id="529" instrument_node="">
</span></ul><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><h2 data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">New and replacement installations of the following:</span></h2><span data-dcnode-id="521" instrument_node="">
</span><ul data-dcnode-id="495"><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Centralized air-conditioning systems</span></li><span data-dcnode-id="517" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Gas clothes dryers</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Gas or oil furnaces</span></li><span data-dcnode-id="511" instrument_node="">
</span><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Gas or wood stoves or heaters</span></li><span data-dcnode-id="508" instrument_node="">
</span><li data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Gas ovens</span></li><span data-dcnode-id="505" instrument_node="">
</span><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Prefabricated chimneys</span></li><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Prefabricated fireplaces</span></li><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Gas or oil water heaters</span></li><span data-dcnode-id="496" instrument_node="">
</span></ul><span data-dcnode-id="494" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span></article><span data-dcnode-id="488" instrument_node="">
