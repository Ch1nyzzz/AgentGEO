</span><p data-dcnode-id="1678" style="text-align: justify;"><span data-dcnode-id="1682" instrument_node="">The </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.nyc.gov/site/buildings/codes/2014-construction-codes.page" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1681" instrument_node="">NYC Plumbing Code</span></a><span data-dcnode-id="1679" instrument_node=""> establishes these minimum pressure and flow rate values for all operating conditions, even during peak demand, when multiple plumbing fixtures are being used simultaneously.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><hr data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">
</span><h2 data-dcnode-id="1673" style="text-align: center;"><span data-dcnode-id="1674" instrument_node="">Our plumbing engineers can help you select the best water booster pump for your building.</span></h2><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1662"><span class="hs-cta-wrapper" data-dcnode-id="1664" id="hs-cta-wrapper-9f1640ac-fdd9-40ef-9783-15bbf9f5a022"><span class="hs-cta-node hs-cta-9f1640ac-fdd9-40ef-9783-15bbf9f5a022" data-dcnode-id="1668" data-hs-drop="true" id="hs-cta-9f1640ac-fdd9-40ef-9783-15bbf9f5a022" style="visibility: visible; display: block; text-align: center;"><a class="cta_button ylo-cta" cta_dest_link="https://www.ny-engineers.com/contact-us" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/cs/c/%3Fcta_guid%3Dac8cc18c-c2a0-4920-825f-4be266abcccc%26signature%3DAAH58kEmyLCA4acBUXZPwp73V_VdLC4PpA%26pageId%3D4578239706%26placement_guid%3D9f1640ac-fdd9-40ef-9783-15bbf9f5a022%26canon%3Dhttps%253A%252F%252Fwww.ny-engineers.com%252Fblog%252Fwhen-is-a-water-booster-pump-required%26portal_id%3D2004318" id="cta_button_2004318_ac8cc18c-c2a0-4920-825f-4be266abcccc" style="margin: 20px auto;" title="Contact Us"><span data-dcnode-id="1670" instrument_node="">Contact Us</span></a></span></span></p><span data-dcnode-id="1661" instrument_node="">
</span><hr data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">
</span><h3 data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Do You Have Low Water Pressure?</span></h3><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><img alt="shutterstock_1312274558" data-dcnode-id="1655" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg%3Fwidth%3D750%26name%3Dshutterstock_1312274558.jpg&amp;raw" srcset="https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=375&amp;name=shutterstock_1312274558.jpg 375w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=750&amp;name=shutterstock_1312274558.jpg 750w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=1125&amp;name=shutterstock_1312274558.jpg 1125w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=1500&amp;name=shutterstock_1312274558.jpg 1500w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=1875&amp;name=shutterstock_1312274558.jpg 1875w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1312274558.jpg?width=2250&amp;name=shutterstock_1312274558.jpg 2250w" style="width: 750px;" width="750"></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1648" style="text-align: justify;"><span data-dcnode-id="1652" instrument_node="">If the water supply pressure is insufficient to meet the required pressure and flow values for plumbing fixtures, a water pressure booster system must be installed. There are three main options allowed by the </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.nyc.gov/site/buildings/codes/2014-construction-codes.page" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1651" instrument_node="">NYC Plumbing Code</span></a><span data-dcnode-id="1649" instrument_node="">:</span></p><span data-dcnode-id="1647" instrument_node="">
</span><ol data-dcnode-id="1636" style="list-style-type: lower-alpha; text-align: justify;"><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">An elevated water tank</span></li><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">A hydro-pneumatic pressure booster</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">A water pressure booster pump, which is the topic of this article</span></li><span data-dcnode-id="1637" instrument_node="">
</span></ol><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630" style="text-align: justify;"><span data-dcnode-id="1634" instrument_node="">Keep in mind that the need for a water booster pump is partly determined by building characteristics; since the minimum pressure and flow rate values are specified at fixture outlets, the </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/the-top-5-most-over-engineered-building-components" rel="noopener" target="_blank"><span data-dcnode-id="1633" instrument_node="">likelihood of needing a booster pump increases for taller buildings</span></a><span data-dcnode-id="1631" instrument_node="">.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1621" style="text-align: justify;"><span data-dcnode-id="1628" instrument_node="">The NYC Plumbing Code requires that all booster pumps be equipped with a low-pressure cutoff switch, which prevents the creation of a vacuum when the pressure on the suction side reaches values of 10 psi or less. When negative pressure isn’t accounted for, a phenomenon called </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringtoolbox.com/cavitation-d_407.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1627" instrument_node="">cavitation occurs</span></a><span data-dcnode-id="1625" instrument_node="">, where small bubbles rapidly form and collapse in the flowing water. </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringtoolbox.com/cavitation-d_407.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1624" instrument_node="">Cavitation</span></a><span data-dcnode-id="1622" instrument_node=""> can cause localized shockwaves, damaging the booster pump impeller and inducing mechanical vibrations, which affect the motor driving the pump as well</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618" style="text-align: justify;"><span data-dcnode-id="1619" instrument_node="">Using a single booster pump for more than one building is not allowed by the NYC Plumbing Code, except in projects with multiple buildings that have a common owner. An individual water consumer is not allowed to supply pressurized water for neighboring buildings.</span></p><span data-dcnode-id="1617" instrument_node="">
</span><h3 data-dcnode-id="1615" style="text-align: justify;"><span data-dcnode-id="1616" instrument_node="">Checklist Before You Install a Water Booster Pump</span></h3><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><img alt="shutterstock_1814800259" data-dcnode-id="1613" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg%3Fwidth%3D750%26name%3Dshutterstock_1814800259.jpg&amp;raw" srcset="https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=375&amp;name=shutterstock_1814800259.jpg 375w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=750&amp;name=shutterstock_1814800259.jpg 750w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=1125&amp;name=shutterstock_1814800259.jpg 1125w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=1500&amp;name=shutterstock_1814800259.jpg 1500w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=1875&amp;name=shutterstock_1814800259.jpg 1875w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_1814800259.jpg?width=2250&amp;name=shutterstock_1814800259.jpg 2250w" style="width: 750px;" width="750"></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609" style="text-align: justify;"><span data-dcnode-id="1610" instrument_node="">Keep in mind that low pressure and flow rates at fixture outlets have many possible causes, and you should not immediately assume that low water supply pressure is to blame. Before you install a water booster pump, make sure your problem is not due to one of the following causes:</span></p><span data-dcnode-id="1608" instrument_node="">
</span><ol data-dcnode-id="1594" style="list-style-type: lower-alpha; text-align: justify;"><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Clogged water pipes can cause a drastic pressure drop between the service entrance and the point of consumption, which is a common issue in older installations.</span></li><span data-dcnode-id="1604" instrument_node="">
</span><li data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">Undersized pipes, a common result of poor </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/mep-engineering-services/plumbing-services" rel="noopener" target="_blank"><span data-dcnode-id="1602" instrument_node="">plumbing design</span></a><span data-dcnode-id="1600" instrument_node="">, can have the same effect as clogged water pipes.</span></li><span data-dcnode-id="1598" instrument_node="">
</span><li data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">You could also have a partially closed shut-off valve causing pressure drop, and the solution is as simple as opening it fully.</span></li><span data-dcnode-id="1595" instrument_node="">
</span></ol><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1588" style="text-align: justify;"><span data-dcnode-id="1592" instrument_node="">In any of these scenarios, installing a water booster pump </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/simplify-your-engineering-design-and-cut-costs" rel="noopener" target="_blank"><span data-dcnode-id="1591" instrument_node="">represents a waste of money,</span></a><span data-dcnode-id="1589" instrument_node=""> and the excessive pressure may actually damage your installation. Even if there is no damage, you will be wasting electric power to run the booster pump, and the excessive pressure will raise flowrates, increasing your water bill as well. Before you proceed, make sure you don’t have a partially closed valve, and get a professional assessment of your installation to verify that you don’t have piping issues.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><h3 data-dcnode-id="1585" style="text-align: justify;"><span data-dcnode-id="1586" instrument_node="">Increasing the Efficiency of Water Booster Pumps</span></h3><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><img alt="shutterstock_373295623" data-dcnode-id="1583" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg%3Fwidth%3D750%26name%3Dshutterstock_373295623.jpg&amp;raw" srcset="https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=375&amp;name=shutterstock_373295623.jpg 375w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=750&amp;name=shutterstock_373295623.jpg 750w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=1125&amp;name=shutterstock_373295623.jpg 1125w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=1500&amp;name=shutterstock_373295623.jpg 1500w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=1875&amp;name=shutterstock_373295623.jpg 1875w, https://www.ny-engineers.com/hs-fs/hubfs/shutterstock_373295623.jpg?width=2250&amp;name=shutterstock_373295623.jpg 2250w" style="width: 750px;" width="750"></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1576" style="text-align: justify;"><span data-dcnode-id="1580" instrument_node="">As with all pieces of equipment driven by an electric motor, it is possible to save energy if a booster pump is equipped with a </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/improving-hvac-efficiency-in-commercial-buildings-with-variable-frequency-drives" rel="noopener" target="_blank"><span data-dcnode-id="1579" instrument_node="">variable frequency drive (VFD) for speed control</span></a><span data-dcnode-id="1577" instrument_node="">. For fractional horsepower motors, such as those used in small residential applications, electronically commutated motors (ECMs) are more cost-effective option than VFDs.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573" style="text-align: justify;"><span data-dcnode-id="1574" instrument_node="">There are several reasons why it makes sense to deploy speed control for a booster pump:</span></p><span data-dcnode-id="1572" instrument_node="">
</span><ol data-dcnode-id="1558" style="list-style-type: lower-alpha; text-align: justify;"><span data-dcnode-id="1571" instrument_node="">
</span><li data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">The required pressure boost may vary depending on current building conditions. For example, it may not be necessary when demand for water is low.</span></li><span data-dcnode-id="1568" instrument_node="">
</span><li data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Pressure variations may also be caused by the utility company. For example, low pressure issues may only be present when the water distribution system is experiencing peak demand.</span></li><span data-dcnode-id="1565" instrument_node="">
</span><li data-dcnode-id="1560"><span data-dcnode-id="1564" instrument_node="">Variable frequency drives can be used to soft-start a water booster pump, preventing the inrush current, which is typically five to eight times higher than rated current. In absence of a soft-starting device, this inrush causes a sudden drop in voltage, </span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/new-electric-service-project" rel="noopener" target="_blank"><span data-dcnode-id="1563" instrument_node="">which can damage sensitive electronic devices</span></a><span data-dcnode-id="1561" instrument_node="">.</span></li><span data-dcnode-id="1559" instrument_node="">
</span></ol><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1550" style="text-align: justify;"><span data-dcnode-id="1556" instrument_node="">When a water booster pump is equipped with speed control, its operation can be adjusted in real time in response to building and water supply conditions, </span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/mep-engineering-services/energy-modeling-services" rel="noopener" target="_blank"><span data-dcnode-id="1555" instrument_node="">maximizing energy efficiency</span></a><span data-dcnode-id="1553" instrument_node="">. In fractional horsepower applications, electronically commutated motors offer the highest energy efficiency available while offering built-in speed control. For pumps of higher horsepower, which are typically used in commercial applications, the best possible combination is having a three-phase motor with NEMA Premium efficiency equipped with a </span><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/improving-hvac-efficiency-in-commercial-buildings-with-variable-frequency-drives" rel="noopener" target="_blank"><span data-dcnode-id="1552" instrument_node="">variable frequency drive.</span></a></p><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1547" style="text-align: justify;"><span data-dcnode-id="1548" instrument_node="">Reducing the Cost of the Installation</span></h3><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541" style="text-align: justify;"><span data-dcnode-id="1545" instrument_node="">Both pumps and electric motors have prices that are highly sensitive to nameplate capacity, and their efficiency is reduced when they operate below their rated horsepower. Oversized installations are both expensive and inefficient, so&nbsp;</span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/new-electric-service-project" rel="noopener" target="_blank"><span data-dcnode-id="1544" instrument_node="">hiring a qualified engineering firm for design and specification</span></a><span data-dcnode-id="1542" instrument_node="">&nbsp;is highly recommended.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1535" style="text-align: justify;"><span data-dcnode-id="1539" instrument_node="">The upfront cost of the water booster system can also be reduced if the motor uses a higher voltage rating. For example, a 460-volt motor draws only half the current required by a 230-volt motor, assuming both have the same nameplate horsepower. Since </span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/new-electric-service-project" rel="noopener" target="_blank"><span data-dcnode-id="1538" instrument_node="">electrical circuits</span></a><span data-dcnode-id="1536" instrument_node=""> are sized based on current and not voltage, the circuit for the higher voltage motor is the least expensive.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><h3 data-dcnode-id="1532" style="text-align: justify;"><span data-dcnode-id="1533" instrument_node="">Concluding Remarks</span></h3><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529" style="text-align: justify;"><span data-dcnode-id="1530" instrument_node="">Water booster pumps are required when the pressure and flow rate delivered at individual plumbing fixtures fail to meet code requirements. However, before installing the system it is important to confirm if low pressure is not due to other factors, such as clogged or undersized piping. A water booster pump offers maximum performance when it is properly sized, and equipped with a high-efficiency motor and speed control.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526" style="text-align: justify;"><span data-dcnode-id="1527" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" style="color: #808080; font-size: 12px;"><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Editors Note: This post was originally published in November 2016 and has been revamped and updated for accuracy and comprehensiveness.</span></em></span></p></span></article><span data-dcnode-id="1518" instrument_node="">
