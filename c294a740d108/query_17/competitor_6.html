	</span></div></div></span><span data-dcnode-id="321" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="212"><h1 data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">A Building Permit is required when you...</span></h1><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><img align="right" alt="Building Inspection Services" border="0" data-dcnode-id="317" height="139" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rdn.bc.ca/cms/gallery/galID90.jpg&amp;raw" vspace="5" width="200"></p><span data-dcnode-id="315" instrument_node="">
</span><h4 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">A Building Permit is required when you:</span></h4><span data-dcnode-id="312" instrument_node="">
</span><ul data-dcnode-id="268"><span data-dcnode-id="311" instrument_node="">
</span><li data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Construct any new building or structure</span></li><span data-dcnode-id="308" instrument_node="">
</span><li data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Construct a new accessory building</span></li><span data-dcnode-id="305" instrument_node="">
</span><li data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Make alterations, additions or repairs to an existing building or structure</span></li><span data-dcnode-id="302" instrument_node="">
</span><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Complete a previously unfinished area in an existing building, (e.g., a recreation room or bathroom)</span></li><span data-dcnode-id="299" instrument_node="">
</span><li data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Make interior structural renovations</span></li><span data-dcnode-id="296" instrument_node="">
</span><li data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Demolish or relocate a building or structure</span></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Locate or relocate a manufactured or mobile home on a lot</span></li><span data-dcnode-id="290" instrument_node="">
</span><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Remodel or construct a deck</span></li><span data-dcnode-id="287" instrument_node="">
</span><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Construct a swimming pool</span></li><span data-dcnode-id="284" instrument_node="">
</span><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Install or alter plumbing within a building or structure or on a property</span></li><span data-dcnode-id="281" instrument_node="">
</span><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Connect to a municipal sanitary or storm sewer system</span></li><span data-dcnode-id="278" instrument_node="">
</span><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Install a new chimney or fireplace</span></li><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Enclose your carport</span></li><span data-dcnode-id="272" instrument_node="">
</span><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Change the use/occupancy of an existing building, (i.e., from office to retail)</span></li><span data-dcnode-id="269" instrument_node="">
</span></ul><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="264"><b data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">This is not a comprehensive list. If you are unsure whether your project will require a permit please call Building Inspection Services at 250-390-6530, 250-954-3809 or 1-877-607-4111. </span></b></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="260"><i data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">You may not start any stage of a project, including demolition or excavation, until a building permit has been obtained.</span></i></p><span data-dcnode-id="259" instrument_node="">
</span><h4 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">A Building Permit is not required for:</span></h4><span data-dcnode-id="256" instrument_node="">
</span><ul data-dcnode-id="230"><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Installing cupboards</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Roofing repairs or replacements (providing that no structural changes are made)</span></li><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Exterior finish repair or replacement (e.g., stucco or siding, providing that no structural changes are made)</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Landscaping or sidewalks</span></li><span data-dcnode-id="243" instrument_node="">
</span><li data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Fences less than 2 meters in height</span></li><span data-dcnode-id="240" instrument_node="">
</span><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Retaining structures less than 1.0 metres in height, that retain less than 1.0 metre of earth</span></li><span data-dcnode-id="237" instrument_node="">
</span><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Buildings (e.g., a storage shed) less than 10 square metres in size (note: even though a permit is not required, the structure must still comply with zoning regulations with respect to setbacks and height)</span></li><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Farm Buildings on land designated for agricultural use and with farm status under the Assessment Act (note: farm buildings must comply with the requirements of the National Farm Building Code and the applicable zoning regulations [e.g., setbacks] for the property)</span></li><span data-dcnode-id="231" instrument_node="">
</span></ul><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="222"><b data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">NOTE:</span></b><span data-dcnode-id="226" instrument_node=""> </span><i data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">A detached accessory building less than 10 sq m (107 sq ft) and built on properties containing a single family dwelling is exempt from requiring</span></i><span data-dcnode-id="223" instrument_node=""> a building permit, but must still meet setback requirements specified in the Zoning Bylaw.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="214"><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Please Note:</span></strong><span data-dcnode-id="218" instrument_node=""> The RDN’s new web portal is now online. Apply for building permits, check the status of your application, request inspections or submit complaints, all from the comfort of your home, office or mobile device. Click </span><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cv.rdn.bc.ca/NanaimoPortal" title="here"><span data-dcnode-id="217" instrument_node="">here</span></a><span data-dcnode-id="215" instrument_node=""> to apply online.</span></p><span data-dcnode-id="213" instrument_node="">
