</span><div class="bbWrapper" data-dcnode-id="5546"><span data-dcnode-id="5565" instrument_node="">Trying to decide what model I'd need for my high roof transit. This is going to be my primary heater and I live in Alaska. After long thought, I decided to go with the Propane version instead of using Espar or Webasto heaters (Mostly based on complications on installing them)</span><br data-dcnode-id="5564"><span data-dcnode-id="5563" instrument_node="">
</span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">
I really don't know how much output I'd need to keep my van warm 6500BTU vs 9700BTU. It's only a long wheel base but high roof. My insulation isn't that bad either. One layer of thinsulate/wool on the walls (~R-5.2) and foam boards (R-6.2 on the floor/ceiling).</span><br data-dcnode-id="5560"><span data-dcnode-id="5559" instrument_node="">
</span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">
Here are the differences between the two in terms of input/output. - </span><a class="link link--external" data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.propexheatsource.co.uk/wp-content/uploads/2013/06/hs2000-dims.jpg" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="5556" instrument_node="">https://www.propexheatsource.co.uk/wp-content/uploads/2013/06/hs2000-dims.jpg</span></a><br data-dcnode-id="5554"><span data-dcnode-id="5553" instrument_node="">
</span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">
I am leaning towards HS2800 since it's almost the same price as 2000 but don't want it to be an overkill. Please let me know your recommendations.</span><br data-dcnode-id="5550"><span data-dcnode-id="5549" instrument_node="">
</span><br data-dcnode-id="5548"><span data-dcnode-id="5547" instrument_node="">
PS) I did a search for this and couldn't find anything about HS2800. Most of them seem to install HS2000 as a secondary source.</span></div><span data-dcnode-id="5545" instrument_node="">
</span><div class="js-selectToQuoteEnd" data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">&nbsp;</span></div><span data-dcnode-id="5542" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="5365"><span data-dcnode-id="5374" instrument_node="">I had the HS2211 in a Chevy Express, used it year round. Uninsulated floors, however, meant that it'd be -10 outside, we'd be warm on the bed, but the dog bowl on the floor would freeze. The heater was running almost continuously too for it to keep up.</span><br data-dcnode-id="5373"><span data-dcnode-id="5372" instrument_node="">
</span><br data-dcnode-id="5371"><span data-dcnode-id="5370" instrument_node="">
Specifically because of the difficulty of getting propane filled in Alaska in winter (and my desire to not carry a spare tank), we decided when we got our Transit that we would splurge and get an Espar B4. I didn't want to stand outside with my tank at -15 in Fairbanks just to it filled.</span><br data-dcnode-id="5369"><span data-dcnode-id="5368" instrument_node="">
</span><br data-dcnode-id="5367"><span data-dcnode-id="5366" instrument_node="">
I have a similar config (high roof, non extended), and the 18,000 BTU is overkill, especially now that I live in Seward. But if you are deadset on a Propex, and you live in AK, I would go for the extra BTU. Especially if you are going to use it in winter at all.</span></div><span data-dcnode-id="5364" instrument_node="">

</span><article class="message-body js-selectToQuote" data-dcnode-id="5186" itemprop="text" qid="post-text"><span data-dcnode-id="5193" instrument_node="">
</span><div class="bbWrapper" data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">I have a High extended Transit, well insulated with a curtain separating the cab from the living space. I have the HS2000, and it is more than sufficient for the lower US in the winter. However, I've only had it in temps around upper 20's at night. It kicks on about 5 times per night in upper 20's, runs about 10-15 minutes each time it kicks on. For me the HS2800 would be overkill, but in Alaska I think I would opt for the HS2800. Another consideration is the 2800 does use more amps from your batteries (that's the only reason I went with a 2000 as the price difference is minimal). Here is a pic of my divider curtain with my bed out at night. Keep your vents closed in the cab and hit the recirculation button before you turn your van off to keep cold out. Not sure the pic will show, tried to attach, but would not.</span></div><span data-dcnode-id="5190" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="4815"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote is-expandable" data-dcnode-id="4817"><span data-dcnode-id="4842" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="4837"><span data-dcnode-id="4841" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-942372" data-dcnode-id="4839" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fordtransitusaforum.com/goto/post%3Fid%3D942372"><span data-dcnode-id="4840" instrument_node="">carleton said:</span></a><span data-dcnode-id="4838" instrument_node="">
</span></div><span data-dcnode-id="4836" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="4819"><span data-dcnode-id="4835" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="4825"><span data-dcnode-id="4834" instrument_node="">
I had the HS2211 in a Chevy Express, used it year round. Uninsulated floors, however, meant that it'd be -10 outside, we'd be warm on the bed, but the dog bowl on the floor would freeze. The heater was running almost continuously too for it to keep up.</span><br data-dcnode-id="4833"><span data-dcnode-id="4832" instrument_node="">
</span><br data-dcnode-id="4831"><span data-dcnode-id="4830" instrument_node="">
Specifically because of the difficulty of getting propane filled in Alaska in winter (and my desire to not carry a spare tank), we decided when we got our Transit that we would splurge and get an Espar B4. I didn't want to stand outside with my tank at -15 in Fairbanks just to it filled.</span><br data-dcnode-id="4829"><span data-dcnode-id="4828" instrument_node="">
</span><br data-dcnode-id="4827"><span data-dcnode-id="4826" instrument_node="">
I have a similar config (high roof, non extended), and the 18,000 BTU is overkill, especially now that I live in Seward. But if you are deadset on a Propex, and you live in AK, I would go for the extra BTU. Especially if you are going to use it in winter at all.
</span></div><span data-dcnode-id="4824" instrument_node="">

</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-942440" data-dcnode-id="4441" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fordtransitusaforum.com/goto/post%3Fid%3D942440"><span data-dcnode-id="4442" instrument_node="">BushwickAlaskan said:</span></a><span data-dcnode-id="4440" instrument_node="">

</span><div class="bbCodeBlock-expandContent" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">
The website says they use the same amps but i could see it using more amps. I am leaning towards HS2000 as well since it's more efficient than the bigger counterpart. Whats the adapter for btw?
</span></div><span data-dcnode-id="4434" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="4431"><a data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="4430" instrument_node="">
</span></div><span data-dcnode-id="4428" instrument_node="">
</span></blockquote><span data-dcnode-id="4426" instrument_node="">Not sure what website you are looking at, but the Propex website states 1.4A for the 2000 and 1.9A for the 2800. May not seem like a lot more amps, but percentage wise it uses 35.7% more amps. I installed it myself. Easy instructions. The adapter is to take the propane supply line from metric to standard.</span></div><span data-dcnode-id="4424" instrument_node="">

</span><div class="bbCodeBlock-content" data-dcnode-id="4237"><span data-dcnode-id="4245" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">
Not sure what website you are looking at, but the Propex website states 1.4A for the 2000 and 1.9A for the 2800. May not seem like a lot more amps, but percentage wise it uses 35.7% more amps. I installed it myself. Easy instructions. The adapter is to take the propane supply line from metric to standard.
</span></div><span data-dcnode-id="4242" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="4239"><a data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="4238" instrument_node="">
</span></div><span data-dcnode-id="4236" instrument_node="">
</span></blockquote><span data-dcnode-id="4234" instrument_node="">It seems like with the higher BTU rating it wouldn't need to run as long and so the higher amperage probably makes it about even. I was thinking of getting the 2800 since if it's overkill it just means it won't run as long. If the 2000 ends up being underkill then it may never catch up. I'd be curious to hear of your experience as we get into colder weather.</span><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">
</span><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Any updates from those who have installed a Propex? GoWesty has the HS2000s in stock with a digital thermostat, so you save some bucks. As someone mentioned above, it sucks to have to pay for an extra thermostat. That was the direction I was headed but now wonder about the HS2800 for the added BTUs. I don't plan to use the camper in a lot of winter, but want the ability to travel when temps are in the teens. I had the HS2000 in my VW Westy, but never really tested it out in very cold temps and the VW has a lot less volume than a Transit HR.</span></div><span data-dcnode-id="1954" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="1775"><span data-dcnode-id="1780" instrument_node="">I have an HS2000 and very decent insulation, estimated around R7.5 walls, R10 or so ceiling. It was a mild winter overall, but I was able to test at least one or two nights at -30°C (-22°F). Nice and cozy and was maybe 50% duty cycle to keep it around "room temperature" inside.</span><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">
</span><br data-dcnode-id="1777"><span data-dcnode-id="1776" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="1567"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote is-expandable" data-dcnode-id="1569"><span data-dcnode-id="1590" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-1047347" data-dcnode-id="1587" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/goto/post%3Fid%3D1047347"><span data-dcnode-id="1588" instrument_node="">Sparky961 said:</span></a><span data-dcnode-id="1586" instrument_node="">
</span></div><span data-dcnode-id="1584" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="1571"><span data-dcnode-id="1583" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="1577"><span data-dcnode-id="1582" instrument_node="">
I have an HS2000 and very decent insulation, estimated around R7.5 walls, R10 or so ceiling. It was a mild winter overall, but I was able to test at least one or two nights at -30°C (-22°F). Nice and cozy and was maybe 50% duty cycle to keep it around "room temperature" inside.</span><br data-dcnode-id="1581"><span data-dcnode-id="1580" instrument_node="">
</span><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">
I've been very impressed by how long a 20lb tank lasts. I was filling every 1 to 2 weeks at the coldest point this winter. That's with almost full time heating to 15°C. It gets a break when things are heated up by the van.
</span></div><span data-dcnode-id="1576" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="1573"><a data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="1572" instrument_node="">
</span></div><span data-dcnode-id="1570" instrument_node="">
</span></blockquote><span data-dcnode-id="1568" instrument_node="">Thanks, that's exactly the type of real world experiences I was looking for. Good to hear about longevity of the 20lb tank as well. Are you also using propane for a stove and hot water?</span></div><span data-dcnode-id="1566" instrument_node="">
