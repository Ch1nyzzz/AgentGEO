</span><h2 data-dcnode-id="1412"><a data-dcnode-id="1414" name="Code"></a><span data-dcnode-id="1413" instrument_node="">Plumbing Code Citation for Installation of Air Conditioning Condensate Drain Piping</span></h2><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1407"><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/1242s.jpg"><img alt="More AC condensate drain connections and destinations (C) Carson Dunlop Associates" class="Image_Standard" data-dcnode-id="1410" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/1242ss.jpg&amp;raw"></a><span data-dcnode-id="1408" instrument_node="">Carson Dunlop Associates sketches (left) illustrate both acceptable and not-recommended locations for the discharge of an air conditioner or heat pump condensate drain line discharge.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><h3 data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Uniform Mechanical Code Section 310.0, 310.1 Condensate Disposal</span></h3><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Here is an excerpt from the Uniform Mechanical Code pertaining to the disposal of air conditioning condensate:</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1397"><i data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Condensate from air washers, air cooling coils, fuel-burning condensing appliances, the overflow from evaporative coolers and similar water supplied equipment or similar air conditioning equipment shall be collected and discharged to an approved plumbing fixture or disposal area.</span></i></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1393"><i data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node=""> If discharged into the drainage system equipment shall drain by means of an indirect waste pipe. </span></i></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1389"><i data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">The waste pipe shall have a slope of not less than 1/8 inch per foot (10.5 mm/m) or one percent slope and shall be of approved corrosion-resistant material not smaller than the outlet size as required in either Section 310.3 or 310.4 below for air-cooling coils or condensing fuel-burning appliances, respectively. </span></i></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1385"><i data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Condensate or waste water shall not drain over a public way.</span></i></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">To clarify, an indirect waste pipe is something that is upstream of a trap. That means we cannot dump into anything downstream of a trap.
That would include the main plumbing vent stack. -- [Thanks to </span><a data-dcnode-id="1381" href="#reviewers"><span data-dcnode-id="1382" instrument_node="">Al Carson, Carson Dunlop Associates, Toronto</span></a><span data-dcnode-id="1380" instrument_node="">]</span></p><span data-dcnode-id="1378" instrument_node="">
</span><h2 data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">ICC Model Building Code, Section 307: Condensate Disposal Regulations &amp; Recommendations</span></h2><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1369"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Note</span></strong><span data-dcnode-id="1372" instrument_node="">: new in 2015 is the</span><em data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node=""> ICC IMC 307.2.5 &amp; IRC M1411.3.3 Drain Line Maintenance code for 2015</span></em></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">The ICC, under "Drain Line Maintenance" requires that</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1359"><em data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Condensate darins shall be configured to permit the clearing of blockages and performance of maintenance without having to cut the line. </span></em><span data-dcnode-id="1362" instrument_node=""> -  </span><em data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">ICC IMC 307.2.5 &amp; IRC M1411.3.3 Drain Line Maintenance code for 2015, original source: http://www.iccsafe.org/</span></em></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Devices or methods for providing condensate drain cleaning or de-clogging are discussed in this companion</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1354" instrument_node=""> article: </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate_Drain_Cleaner.php"><span data-dcnode-id="1353" instrument_node="">CONDENSATE DRAIN CLEAN &amp; DE-CLOG</span></a></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The following HVACR condensate disposal recommendations summary cites, paraphrases, &amp; comments on the widely adopted 2006 ICC model building code section on condensate disposal, section 307 [7]</span></p><span data-dcnode-id="1347" instrument_node="">
</span><h4 data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">1. Requirement for a drainage system</span></h4><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">For the two Types of Condensate: Fuel burning devices vs Evaporators &amp; cooling coils</span></p><span data-dcnode-id="1341" instrument_node="">
</span><ul data-dcnode-id="1331"><span data-dcnode-id="1340" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1337"><em data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">307.1 requires that liquid condensation from fuel burning appliances be collected and discharged "to an approved plumbing fixture or disposal area in accordance with the manufacturer's instructions"</span></em></li><span data-dcnode-id="1336" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1333"><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">307.2 requires a condensate drain system for appliances containing evaporators or cooling coils, conducted from the appliance drain pan to an approved destination</span></em></li><span data-dcnode-id="1332" instrument_node="">
</span></ul><span data-dcnode-id="1330" instrument_node="">
</span><h4 data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">2. Types, sizes, slope of Condensate Drain Piping</span></h4><span data-dcnode-id="1327" instrument_node="">
</span><ul data-dcnode-id="1309"><span data-dcnode-id="1326" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1323"><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">307.1 Condensate drain piping must be corrosion resistant for condensate from fuel burning appliances. using "corrosion-resistant material" and sized "no smaller than the drain connection on the appliance"</span></em></li><span data-dcnode-id="1322" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1319"><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">307.2.2 Condensate drain piping materials can be "... cast iron, galvanized 
polybutylene, polyethylene, ABS, CPVC or PVC pipe or 
tubing"</span></em></li><span data-dcnode-id="1318" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1315"><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Piping shall be at least 3/4" in diameter and ... shall not decrease in size ... [throughout its run from the condensate drain pan to its final disposal destination - no constructions by diameter]</span></em></li><span data-dcnode-id="1314" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1311"><em data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Horizontal runs of condensate drain piping   slope at least 1/8" per foot in the direction of discharge. There is also a requirement for "uniform slope" and "uniform alignment"</span></em></li><span data-dcnode-id="1310" instrument_node="">
</span></ul><span data-dcnode-id="1308" instrument_node="">
</span><h4 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">4. Acceptable Condensate Drainage Terminations</span></h4><span data-dcnode-id="1305" instrument_node="">
</span><h4 data-dcnode-id="1302"><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-drains-onto-sidewalk-100-DJFs.jpg"><img alt="AC Condensate drainage spilling onto and across a sidewalk (C) Daniel Friedman at InspectApedia.com" class="Image_Standard" data-dcnode-id="1304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-drains-onto-sidewalk-100-DJFss.jpg&amp;raw"></a></h4><span data-dcnode-id="1301" instrument_node="">
</span><ul data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">307.2: "... Condensate shall not 
discharge into a street, alley or other areas so as to cause a 
nuisance." [i.e. do not discharge HVACR condensate over a sidewalk</span></li><span data-dcnode-id="1297" instrument_node="">
</span></ul><span data-dcnode-id="1295" instrument_node="">
</span><h4 data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">5. Requirements for a Backup Condensate Drain System &amp; Backup Condensate Drain Options</span></h4><span data-dcnode-id="1292" instrument_node="">
</span><ul data-dcnode-id="1254"><span data-dcnode-id="1291" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1281"><em data-dcnode-id="1284"><span data-dcnode-id="1290" instrument_node="">307.2.3 A secondary condensate drain system is required not in every installation instance, but in every installation at which "where damage to any building components will 
occur as a result of overflow from the equipment drain pan 
or stoppage in the condensate drain piping".</span><br data-dcnode-id="1289"><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">This backup condensate system requirement refers for example to an indoor air handler installed in an attic or in living space where leakage into the attic ceiling or onto a floor system could cause damage to the structure.</span><br data-dcnode-id="1286"><br data-dcnode-id="1285"></em><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Typical damage includes cosmetic leak stains, mold infections of wet drywall or insulation, structural damage from rot or inviting insect attack, and even, as one reader reports, unsafe collapse of a ceiling fan mounted below the leak area.</span></em></li><span data-dcnode-id="1280" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1256"><span data-dcnode-id="1279" instrument_node="">307.2.3 recommends any of the following methods for handling a backup condensate overflow protection system:
</span><ul data-dcnode-id="1257"><span data-dcnode-id="1278" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1275"><em data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">1. An auxiliary drain pan with separate drain: an auxiliary condensate drain pan at least 1.5" deep and at least 3" larger than the length &amp; width of the appliance beneath which it is placed, using corrosion-resistant material of adequate thickness (0.7mm galvanized metal or 1.6mm non-metallic e.g. plastic) with a separate drain installed under the equipment and discharged to a conspicuous point that will alert building occupants to a blocked primary condensate drain</span></em></li><span data-dcnode-id="1274" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1271"><em data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">2. A separate or secondary condensate overflow drain line connected to the primary or OEM equipment's drain pan at a higher level than the main drain, and discharged as in 1. above.</span></em></li><span data-dcnode-id="1270" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1267"><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">3. An auxiliary drain pan without a separate drain line but instead provided with a water-level detection device (a switch that senses the presence of water in the drain pan) conforming to UL 508. The water or condensate detection switch in the drainless condensate overflow pan is wired to shut down the equipment.</span></em></li><span data-dcnode-id="1266" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1263"><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">4. A water detection device (UL 508) that will shut off the equipment in event of blockage of the primary condensate drain can be installed in any of several locations that in essence detect that the primary drain is backing up: in the primary condensate drain pan, in the primary condensate drain line, or in the condensate overflow drain line, positioned to detect and shut down the equipment before the primary drain pan would overflow.</span></em></li><span data-dcnode-id="1262" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1259"><em data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">An exception to this condensate backup or overflow protection requirement is made for fuel-fired appliances that already include features that automatically shut down the device should the condensate drain become blocked. This feature is found, for example, on some condensing heating boilers or furnaces.</span></em></li><span data-dcnode-id="1258" instrument_node=""> </span></ul></li><span data-dcnode-id="1255" instrument_node="">
</span></ul><span data-dcnode-id="1253" instrument_node="">
</span><h3 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">6. Other requirements for a condensate water-level monitoring device</span></h3><span data-dcnode-id="1250" instrument_node="">
</span><ul data-dcnode-id="1237"><span data-dcnode-id="1249" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1239"><span data-dcnode-id="1248" instrument_node="">Section 307.2.3.1 requires use of a water-level monitoring device to provide condensate overflow protection on equipment where there is no secondary condensate drain and no ability to install an auxiliary condensate drain pan. Quoting</span><br data-dcnode-id="1247"><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">"</span><em data-dcnode-id="1241"><span data-dcnode-id="1244" instrument_node="">This device shall 
shut off the equipment served in the event that the primary drain becomes restricted. Externally installed devices and devices installed in the drain line shall not be</span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">permitted.</span></em><span data-dcnode-id="1240" instrument_node="">"</span></li><span data-dcnode-id="1238" instrument_node="">
</span></ul><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1233"><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/ACCondensate61DJFs.jpg"><img alt="Photograph of drains to a hidden location" class="Image_Standard" data-dcnode-id="1235" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/ACCondensate61DJFss.jpg&amp;raw"></a></p><span data-dcnode-id="1232" instrument_node="">
</span><h3 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">7. Model building code requirements for a P-trap on the HVACR condensate drain system</span></h3><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1222"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Bottom line</span></strong><span data-dcnode-id="1226" instrument_node="">: The model building codes require a P-Trap on all </span><em data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">plumbing waste </span></em><span data-dcnode-id="1223" instrument_node="">lines  that is connected to a sewer. </span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1220" instrument_node="">The model same model building codes contain these very minimalrequirements for traps on condensate removal lines for HVAC equipment:</span><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">
</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1215" instrument_node="">1. </span><em data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">a trap shall be installed in accordance with the unit manufacturer's installation and operating instructions</span></em></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">2. </span><em data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">the condensate drain line slope towards its final drainage point shall be at 1/8" per foot </span></em><span data-dcnode-id="1207" instrument_node="">[or, of course greater, where vertical drains are used - Ed.] </span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">OPINION: your local building code compliance inspector/officer is the final legal authority on HVAC condensate drain trap requirements. </span></p><span data-dcnode-id="1202" instrument_node="">
</span><ul data-dcnode-id="1194"><span data-dcnode-id="1201" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1196"><span class="LI_Spaced" data-dcnode-id="1197"><span data-dcnode-id="1200" instrument_node="">IMC  407.2.4, Traps, requires that "</span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Condensate drains shall be trapped as 
required by the equipment or appliance manufacturer." We interpret this provision to defer to the equipment manufacturer's installation instructions.</span></em></span></li><span data-dcnode-id="1195" instrument_node="">
</span></ul><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1184"><span class="RedText" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Watch out</span></span><span class="LI_Spaced" data-dcnode-id="1185"><span data-dcnode-id="1190" instrument_node="">: in our OPINION and as we discuss in these articles, while a trap on a condensate drain line, usually provided quite close to the condensate collection pan itself, can reduce the chances of sewer gases backing up from a condensate drain that has been connected to the building DWV vent piping (not a procedure we recommend), </span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
</span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">
  a conventional P-trap in the condensate drain will not protect against all sewer gas backup possibilities.</span></span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1175"><span class="LI_Spaced" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">In particular, when an air conditioner is shut down for long periods of time (say during the heating season) it is common for the water condensate contents of the trap to dry out, thus losing protection against sewer gas leaks backing up through that system.</span></span><span data-dcnode-id="1180" instrument_node=""> Solutions often proposed are for a trap of sufficient depth that water in the trap will not evaporate sufficiently to lose the trap seal during periods when no condensate is being produced. </span><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">
</span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">
Special trap product can also provide a seal against sewer gas back-drafting through a dry trap. See detail</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1173" instrument_node="">at </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing_Trap_Repairs.php%23Dry_Traps"><span data-dcnode-id="1172" instrument_node="">DRY PLUMBING TRAP CAUSE &amp; PREVENTION</span></a></p><span data-dcnode-id="1169" instrument_node="">
</span><ul data-dcnode-id="1152"><span data-dcnode-id="1168" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1165"><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node=""> Canadian CMC 310.3: condensate waste pipes must be made from materials designed to work with that type of condensate drainage. </span></em></li><span data-dcnode-id="1164" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1154"><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">U.S. IMC 307.2. 2: an A/C condensate drain inside diameter should not be smaller than 3/4″ and should not be smaller than the drain pan outlet diameter.</span></em><span data-dcnode-id="1161" instrument_node="">&lt;</span><br data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node="">
</span><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">
    3/4" condensate drain diameter is sufficient for up to 20 tons </span><em data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">unless the drain outlet size on the unit itsself is larger than 3/4″</span></em></li><span data-dcnode-id="1153" instrument_node="">
</span></ul><span data-dcnode-id="1151" instrument_node="">
</span><h4 data-dcnode-id="1148"><a data-dcnode-id="1150" name="ConDrInsul"></a><span data-dcnode-id="1149" instrument_node="">Condensate Drain Insulation Code?</span></h4><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">Moved to </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-Insulation.php"><span data-dcnode-id="1145" instrument_node="">CONDENSATE DRAIN INSULATION REQUIREMENTS</span></a><span data-dcnode-id="1143" instrument_node=""> </span></p><span data-dcnode-id="1141" instrument_node="">
</span><h2 data-dcnode-id="1138"><a data-dcnode-id="1140" name="PanCleaning"></a><span data-dcnode-id="1139" instrument_node="">Condensate Pan, Overflow Pan or Base Pan Cleaning Recommendations</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">We did not find cleaning requirements for condensate drip trays cited in the model building codes surveyed to date. However a read of manufacturer's installation instructions can provide further advice. For example:</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">"In some installations, dirt or other debris may be 
blown into the unit from the outside and settle in 
the base pan (the bottom of the unit).</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node=""> In some areas of the United States, a “gel-like” or “slime-like” substance may be seen in the base pan.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node=""> Check it periodically and clean, if necessary." General Electric Zoneline® instructions  [8][9]</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1121"><span class="RedText" data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Watch out</span></span><span data-dcnode-id="1122" instrument_node="">: see the warnings and advice about health hazards in HVAC systems and condensate handling systems</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">See</span></p><span data-dcnode-id="1117" instrument_node="">
</span><ul data-dcnode-id="1101"><span data-dcnode-id="1116" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1112"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate_Drain_Cleaner.php"><span data-dcnode-id="1115" instrument_node="">CONDENSATE DRAIN CLEAN &amp; DE-CLOG</span></a><span data-dcnode-id="1113" instrument_node=""> - cleaning the condensate drain trap and drain line</span></li><span data-dcnode-id="1111" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1107"><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Cooling_Coil_Cleaning.php"><span data-dcnode-id="1110" instrument_node="">DIRTY COIL CLEANING PROCEDURES</span></a><span data-dcnode-id="1108" instrument_node=""> </span></li><span data-dcnode-id="1106" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1103"><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Legionella_Prevention_HVAC.php"><span data-dcnode-id="1105" instrument_node="">Legionella BACTERIA &amp; HVAC EQUIPMENT</span></a></li><span data-dcnode-id="1102" instrument_node="">
</span></ul><span data-dcnode-id="1100" instrument_node="">
</span><h2 data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">HVAC Condensate Drain Installation Instructions </span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><img alt="HVAC Condensate drain trap code, size, spacings, distances (C) InspectApediacom adapted from Amana, ICP &amp; Othrs" class="Image_Standard" data-dcnode-id="1096" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/AC-Condensate-Drain-Traps.jpg&amp;raw"></p><span data-dcnode-id="1094" instrument_node="">
</span><ul data-dcnode-id="995"><span data-dcnode-id="1093" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">Also see </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-Insulation.php"><span data-dcnode-id="1091" instrument_node="">CONDENSATE DRAIN INSULATION REQUIREMENTS</span></a><span data-dcnode-id="1089" instrument_node="">  where we provide condensate handiling codes &amp; standards</span></li><span data-dcnode-id="1087" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1079"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/AirConditioner-Sleeve-Drain-Instructions.pdf"><span data-dcnode-id="1086" instrument_node="">AIR CONDITIONER SLEEVE OUTDOOR DRAIN KIT INSTALLATION INSTRUCTIONS </span></a><span data-dcnode-id="1084" instrument_node="">[PDF] Lowes Building Supply 2021</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
    Note:</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
    These instructions specifically warn to avoid drain hose traps or kinks that may otherwise block successful condensate drainage disposal to the building exterior</span></li><span data-dcnode-id="1078" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1072"><span data-dcnode-id="1077" instrument_node="">Also see: specific condensate drain installations for your specific air conditioner, heat pump, or condensing gas furnace</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
  Examples discussing the code and manufacturer's statementson the requirement for a condensate drain line trap are below:</span></li><span data-dcnode-id="1071" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1034"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Amana-ARUF-Installation-Manual.pdf"><span data-dcnode-id="1070" instrument_node="">Amana, ARUF &amp; ASPT AIR HANDLER INSTALLATION &amp; OPERATING INSTRUCTIONS </span></a><span data-dcnode-id="1068" instrument_node="">[PDF] (2017) </span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
  Excerpts:</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
</span><em data-dcnode-id="1056"><span data-dcnode-id="1061" instrument_node="">NOTE: When units are installed above ceilings, or in other
locations where damage from condensate overflow may
occur, it is MANDATORY to install a field fabricated auxiliary
drain pan under the coil cabinet enclosure.
The installation must include a “P” style trap that is located as close as is practical to the evaporator coil.</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
</span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node=""> 
See</span></em><span data-dcnode-id="1055" instrument_node=""> [above, as edited for clarity-Ed] </span><em data-dcnode-id="1037"><span data-dcnode-id="1054" instrument_node="">for details of a typical condensate line “P” trap.
NOTE: Units operating in high static pressure applications
may require a deeper field constructed “P” style trap than
is shown in Figure 12 to allow proper drainage and prevent
condensate overflow.</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">
</span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">
NOTE: Trapped lines are required by many local codes. In
the absence of any prevailing local codes, please refer to
the requirements listed in the Uniform Mechanical Building
Code.</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
A drain trap in a draw-through application prevents air from
being drawn back through the drain line during fan operation thus preventing condensate from draining, and if connected to a sewer line to prevent sewer gases from being
drawn into the airstream during blower operation. </span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
Use of a condensate removal pump is permitted when necessary. This condensate pump should have provisions for
shutting off the control voltage should a blocked drain occur. A trap must be installed between the unit and the condensate pump. </span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
IMPORTANT NOTE: The evaporator coil is fabricated with
oils that may dissolve styrofoam and certain types of plastics.
Therefore, a removal pump or float switch must not contain

</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">

</span><p data-dcnode-id="945"><span data-dcnode-id="948" instrument_node="">The complex is now owned by a new owner and he has contacted us about why we didn't insulate the condensate drain lines that are inside the return air in an air conditioned space. We live in Texas and I can't find a clear answer on if that is required or not. Does anyone have any information about this topic?</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
</span></p><span data-dcnode-id="944" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">
      On 2021-04-29 by (mod) -  Condensate Removal Pump for a hybrid water heater  </span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="940" instrument_node="">
      @Jack Mc., 
      </span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
      The company Little Giant makes a wide variety of pumps including condensate pumps, pony pumps, and others; 
      </span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
      Let's not mix apples and oranges here. 
      </span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">
</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
      If you are making use of a water heater - to produce domestic hot water used for washing and bathing - water flowing through the heater is pushed by building water pressure, from a municipal supply or from a well water pump or a pressure booster pump. 
      </span><br data-dcnode-id="927"><span data-dcnode-id="926" instrument_node="">
</span><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">
For those pump purposes, no condensate removal pump would be suitable. IT couldn't handle the volume, nor the flow rate, nor the duty cycle.
</span><br data-dcnode-id="923"><span data-dcnode-id="922" instrument_node="">
</span></p><span data-dcnode-id="920" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">

      by Jack Mc.    </span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="916" instrument_node="">
      I have a question regarding the use of a Condensate Removal Pump for a hybrid water heater. Can I use a little giant type condensate pump with 3/4 into the pump, and 3/8 out of it?
      </span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
      The only code I have found (Oregon) regarding condensate removal is in the mechanical code (which usually applies to HVAC) and this line is making me question whether the pump's output can in fact be less than 3/4": </span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
      "307.2.2 Condensate drain piping materials can be "... cast iron, galvanized polybutylene, polyethylene, ABS, CPVC or PVC pipe or tubing"
      </span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
      Piping shall be at least 3/4" in diameter and ... shall not decrease in size ... [throughout its run from the condensate drain pan to its final disposal destination - no constructions by diameter]"
      </span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
      Thank you!</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
</span></p><span data-dcnode-id="900" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">
      On 2021-03-20 
      by (mod)
    - use an Appliance Wye to connect a condensate drain to an existing washing machine standpipe or other drain</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="879"><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Appliance-wye-Canplas.jpg"><img alt="Appliance Wye from Canplas illustrates how to connect a condensate drain to an existing standpipe or washer drain without interference - cited &amp; discussed at InspectApedia" class="Image_Standard" data-dcnode-id="896" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Appliance-wye-Canplass.jpg&amp;raw"></a><span data-dcnode-id="894" instrument_node="">@V.F.G., usually there's no problem sharing that drain between condensate vent and washing machine;
      </span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
      Both require an air gap - which you have, and neither should be overwhelming a properly-sized, un-blocked drain.
      </span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
      The rub may come if the standpipe diameter is too small to admit both the washer drain and the clip holding the condensate drain at the same time. 
      </span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
      You'd fix that by either having your plumber install an appliance wye in the standpipe (I show a typical one - the Canplas 212321W Appliance Wye -  as widely sold including at Amazon - below) or by pumping your condensate to another drain destination. </span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
</span></p><span data-dcnode-id="878" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">

</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Hey, so we recently brought a house in MA and have come across this: the HVAC is connected to a standpipe for a washer via a tube.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="871" instrument_node=""> We dont know what to do but there was no washer and dryer when we moved in to the house. We did not discover this until we brought a washer. Please let us know anything we can do because we need the washer. Thank you</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">

</span><p data-dcnode-id="816"><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-to-Laundry-Trap-383-Kahn.jpg"><img alt="Condensate drain disposal into trapped drain ok but there are other safety questions here (C) InspectApedia.com Kahn" data-dcnode-id="818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-to-Laundry-Trap-383-Kahns.jpg&amp;raw"></a></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">I inspected a home earlier today and they had the AC condensate drainage into the (previous) laundry drainage. It's not directly into the sewage line but I was wondering if there's still an issue of sewage gasses backing into the home. There's a p-trap. </span></p><span data-dcnode-id="812" instrument_node="">
</span><ul data-dcnode-id="802"><span data-dcnode-id="811" instrument_node=""> </span><li class="LI_Spaced" data-dcnode-id="804"><span data-dcnode-id="810" instrument_node="">Dov Ber Kahn, a home inspector in Rockland County, NY has contributed photographs of various building features. Mr. Kahn is a licensed home inspector in New York and can be reached at Website: </span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kahnhomeinspectorsco.fatcow.com/"><span data-dcnode-id="809" instrument_node="">Kahnbhomeinspectors</span></a><span data-dcnode-id="807" instrument_node="">, Tel: 845-445-8234, Email: </span><a data-dcnode-id="805" href="mailto:kdovber@googlemail.com"><span data-dcnode-id="806" instrument_node="">kdovber@googlemail.com</span></a></li><span data-dcnode-id="803" instrument_node="">
</span></ul><span data-dcnode-id="801" instrument_node="">
</span><h4 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Moderator reply: </span></h4><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">It appears that this condensate drain  only drops into that vertical standpipe an inch or two and if there is still a decent opening around it to let air into the standing drain line then you got an air gap between the end of the condensate drain and the P-trap below so it should be okay.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="791"><span class="RedText" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Watch out</span></span><span data-dcnode-id="792" instrument_node="">: But as youll see from the annotations on your photo there are some other questions here, including a water heater TPR valve safety concern and possible leaks into the return air duct system. . </span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">See also </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Tundish.php"><span data-dcnode-id="788" instrument_node="">TUNDISH used in PLUMBING</span></a><span data-dcnode-id="786" instrument_node=""> </span></p><span data-dcnode-id="784" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">On 2020-09-09  by (mod)</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="780" instrument_node="">Yes with proper air gap</span><br data-dcnode-id="779"></p><span data-dcnode-id="777" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">On 2020-09-09 by (mod)</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="773" instrument_node="">Not illegal but does sound as if there was a problem with the condensate drain system </span><br data-dcnode-id="772"></p><span data-dcnode-id="770" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">On 2020-09-09 0 by Rocky</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">My a/c in my apartment was under performing , so I took a look at the F.A.U. closet.  I saw what the problem was, ( under charged or line blockage).
</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">But, what also I noticed was that the primary condensate drain had been capped off with no outlet.  </span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="761" instrument_node="">The secondary drain had a wet switch installed in the outlet port.  My question is: Is it in violation of building or installation codes to not have a condensate drain line?  My unit was cycling on and off even though it never reached the temperature setting on the thermostat, I suspect this was the wet switch's doing</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span></p><span data-dcnode-id="757" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">On 2020-09-03 by Dave</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="753" instrument_node="">Can you terminate a condensate line from an interior air handler to a washer stand pipe</span><br data-dcnode-id="752"></p><span data-dcnode-id="750" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">On 2020-08-20 by Pat H.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="746" instrument_node="">Are there currently any plumbing codes that prevent A/C condensate from being used for toilet flushing?  An English company developed a toilet tank several years ago that uses both condensate and potable water for flushing.  I have to imagine that with A/C being so much more common in the US, the only reason something similar hasn't been developed or adapted for use here is because it isn't allowed.</span><br data-dcnode-id="745"></p><span data-dcnode-id="743" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">On 2020-07-24  by Jayson T</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">I just had a furnace and cooling coil installed in my attic area. For the primary condensate drain the installer piped 3/4" pvc into a condensate pump, which will discharge into a nearby vanity sink prior to the trap via 3/8" vinyl plastic tubing. For the secondary drain system he installed a wet switch within the pan below the unit which will turn the unit off upon water detection.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="736" instrument_node=""> Is this an acceptable form of condensate drainage? I worry about relying on the condensate pump and flexible tubing as the primary drain source vs. a hard piped system into the homes plumbing.</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">
</span></p><span data-dcnode-id="732" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">On 2020-05-18 by (mod)</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="728" instrument_node="">David</span><br data-dcnode-id="727"><br data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">The overflow drip pan can be capped off provided that there is a water sensor switch installed that will shut down the AC system if the pan receives condensate water. </span><br data-dcnode-id="724"></p><span data-dcnode-id="722" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">On 2020-05-17 by David</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="718" instrument_node="">Does Texas code require an attic AC drip pan to be be attached to a drain line or is it acceptable for the drain line to be capped off?</span><br data-dcnode-id="717"></p><span data-dcnode-id="715" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">On 2020-05-14 by (mod)</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="711" instrument_node="">Daria</span><br data-dcnode-id="710"><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">I want to help but am stymied: the decision to include or not the actual drain line as part of the condensate pump system is going to be in the tiny mind and hands of the insurance company's adjuster department. </span><br data-dcnode-id="707"><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">My "guess" is that the reason those pumps are excluded is an effort to avoid leak and mold damage liability. </span><br data-dcnode-id="704"><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">My OPINION is that the pump itself - the container and motor, sold as a unit - is separable from the drain piping or tubing. </span><br data-dcnode-id="701"><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">My opinion also is that the cost of tubing or plastic drain lines for a condensate pipe is trivial, just a few dollars, and perhaps not worth your time arguing with your warranty company. </span><br data-dcnode-id="698"></p><span data-dcnode-id="696" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">On 2020-05-14 by Daria</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">My warranty company will not cover modification to my condensate drain line because the "items not covered" in my contract list the condensate pump." Are these considered the same item or are the pump and lines two different items? 
</span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">Thank you for your help with this matter. </span><br data-dcnode-id="689"></p><span data-dcnode-id="687" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">On 2020-01-16  by  (mod)</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="683" instrument_node="">Gerard</span><br data-dcnode-id="682"><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">The manufacturer of your air handler is the final authority on this installation detail but in my OPINION while it's common to see an air handler set into a drain pan on wood and sometimes other materials, a rubber anti-vibration pad would be a better practice for two reasons:</span><br data-dcnode-id="679"><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">1. vibration transmission to the building framing (if the unit is installed on a wood frame floor or ceiling) will make the unit noiser than necessary</span><br data-dcnode-id="676"><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">2. vibration combined with condensation (and perhaps actual condensate) between the brick surface and the metal housing of the air handler invites corrosion and over a longer term, damage to the unit</span><br data-dcnode-id="673"><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">A vibration isolating pad such as the Wagner MP-6E EVA Anti-Vibration Pad 6x6 Inch Square by 7/8 Inch Thick pad shown below is a better practice. </span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="665"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Anti-Vibration-Pad-for-AC-383.jpg"><img alt="Vibration isolation pad from Wagner at InspectApedia.com" data-dcnode-id="668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Anti-Vibration-Pad-for-AC-383s.jpg&amp;raw"></a><span data-dcnode-id="666" instrument_node=""> </span></p><span data-dcnode-id="664" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">On 2020-01-15 by Gerard Russo</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="660" instrument_node="">Is placing an air handler on top of mason bricks sitting inside the drip tray proper installation procedure? Or should the air handler be seated on rubber be seated on rubber bushings? </span><br data-dcnode-id="659"></p><span data-dcnode-id="657" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">On 2019-08-05  by  (mod)</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="653" instrument_node="">Bob,</span><br data-dcnode-id="652"><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">In new HVAC condensate drain installation when the drain is run through framed walls, use of a flexible plastic drain line is common - as shown in the photo I'll attach below and as is described further at inspectapedia.com/aircond/Condensate_Drain_Problems.php</span><br data-dcnode-id="649"><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">However in my OPINION a better installation uses rigid PVC pipe, properly sloped 1/8" to 1/4" per foot. I often find that the flexible condensate drain tubing is not carefully installed nor supported to maintain drainage slope throughout its run. The result is the accumulation of dust, debris, algae or mold in a dip in the drain that leads to clogging and potentially to a backup and leak of condensate out at the air handler.</span><br data-dcnode-id="646"><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">In the photo the white flexible condensate drain tubing is being routed down from above where a split system A/C unit is to be hung on the wall. The drain drops down then runs out through the wall to the building exterior where it drains onto a roof and thence into a gutter and downspout system if not totally evaporated.</span><br data-dcnode-id="643"><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">The red oval and line mark a critical point where nail plates must be installed to protect the drain line from puncture by future drywall screws or nails.</span><br data-dcnode-id="640"><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">The black tubing in the photo is actually foam insulated refrigerant piping.</span><br data-dcnode-id="637"><br data-dcnode-id="636"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/5Mc_Addition_2097_DJFs.jpg"><img data-dcnode-id="635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/5Mc_Addition_2097_DJFss.jpg&amp;raw"></a><span data-dcnode-id="633" instrument_node=""> </span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="630" instrument_node="">Bob, continuing</span><br data-dcnode-id="629"><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">Here is Diversitech's 5/8" flexible AC condensate drain tubing - sold at Home Depot and at HVACR suppliers and plumbing suppliers</span><br data-dcnode-id="626"><br data-dcnode-id="625"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-Line-100-Diversitech.jpg"><img alt="Flexible condensate drain tubing Divdersitech at InspectApedia.com" data-dcnode-id="624" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/Condensate-Drain-Line-100-Diversitechs.jpg&amp;raw"></a></p><span data-dcnode-id="621" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">On 2019-08-05  by Bob</span></p><span data-dcnode-id="618" instrument_node="">

efense references the International Building Code for constructing military facilities, including those that house U.S. troops, domestically and a ...</span></li><span data-dcnode-id="320" instrument_node="">
