What is an air admittance valve (AAV) or Studor Vent® and how are they used?
Air admittance valves or Studor Vents: 
Air admittance valves or Studor Vents (a trade name for a specific air admittance valve brand) are often found where it is difficult or even impossible to install conventional plumbing vent piping; in other installations air admittance valves may supplement the building's existing vent piping system to avoid trip siphonage and dangerous methane gas leaks during periods of heavy water usage. 
This article series defines plumbing vent system terms, distances, and functions, and other specifications and code requirements. We explain how plumbing vents work on buildings, why plumbing vent piping is needed, and what happens to the building drains when the vent piping is not working.

ttps%3A//inspectapedia.com/Expert-Consultants-Directory.php"><span data-dcnode-id="2269" instrument_node="">EXPERTS&nbsp;DIRECTORY</span></a></li><li data-dcnode-id="2262"><a data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buildingadvisor.com/downloads/premium-estimating-spreadsheet-2/" title="Bulding &amp; Remodeling Project Advice from our Sister Website"><font color="#996600" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">ESTIMATING SPREADSHEET</span></font></a></li><li data-dcnode-id="2259"><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/Admin/Contact-InspectApedia.php" title="Contact InspectAPedia.com Editor Daniel Friedman"><span data-dcnode-id="2261" instrument_node="">CONTACT US</span></a></li></ul></td></tr></tbody></table></div><span data-dcnode-id="2252" instrument_node="">

</span><h1 data-dcnode-id="2210"><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V_200_Instructions_Short.jpg"><img alt="Short installation instructions for the V-200 air admittance valve " class="Image_Standard" data-dcnode-id="2214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V_200_Instructions_Shorts.jpg&amp;raw"></a><span data-dcnode-id="2212" instrument_node="">Air Admittance Valve / Studor Vent® Installation
</span></h1><span data-dcnode-id="2209" instrument_node="">
</span><span data-dcnode-id="2207" instrument_node="">
</span><ul data-dcnode-id="2196"><span data-dcnode-id="2206" instrument_node="">
</span><span data-dcnode-id="2204" instrument_node="">
</span><span data-dcnode-id="2202" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2198"><a data-dcnode-id="2200" href="#QA"><span data-dcnode-id="2201" instrument_node="">POST a QUESTION or COMMENT</span></a><span data-dcnode-id="2199" instrument_node=""> about  plumbing air admittance valves, studor vents, AAVs, installation, codes, noise diagnosis</span></li><span data-dcnode-id="2197" instrument_node="">
</span></ul></div><span data-dcnode-id="2193" instrument_node="">
</span><span data-dcnode-id="2191" instrument_node="">
</span><span data-dcnode-id="2189" instrument_node="">
</span><div data-dcnode-id="2183" id="Page_High_1"><p data-dcnode-id="2186"><i data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">InspectAPedia tolerates no conflicts of interest. We have no relationship with advertisers, products, or services discussed at this website.</span></i></p><span data-dcnode-id="2184" instrument_node=""> </span></div><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">
</span><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Air admittance valves or Studor Vents:</span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">What is an air admittance valve (AAV) or Studor Vent® and how are they used? Air admittance valves or Studor Vents (a trade name for a specific air admittance valve brand) are often found where it is difficult or even impossible to install conventional plumbing vent piping; in other installations air admittance valves may supplement the building's existing vent piping system to avoid trip siphonage and dangerous methane gas leaks during periods of heavy water usage.</span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">This article series defines plumbing vent system terms, distances, and functions, and other specifications and code requirements. We explain how plumbing vents work on buildings, why plumbing vent piping is needed, and what happens to the building drains when the vent piping is not working.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2169" instrument_node="">We also provide  an </span><a data-dcnode-id="2167" href="#MasterIndex"><span data-dcnode-id="2168" instrument_node="">ARTICLE INDEX</span></a><span data-dcnode-id="2166" instrument_node=""> for this topic,  or you can  try the page top or bottom </span><a data-dcnode-id="2164" href="#QA"><span data-dcnode-id="2165" instrument_node="">SEARCH BOX</span></a><span data-dcnode-id="2163" instrument_node=""> as a quick way to find information you need. </span></p><span data-dcnode-id="2161" instrument_node="">
</span><span data-dcnode-id="2158" instrument_node="">
</span><span data-dcnode-id="2156" instrument_node="">
</span><h2 data-dcnode-id="2152"><a data-dcnode-id="2155" name="H1"></a><a data-dcnode-id="2154" name="AAV"></a><span data-dcnode-id="2153" instrument_node="">Air Admittance Valves &amp; Studor Vents: Plumbing Vents to Prevent Trap Siphonage &amp; Methane Gas Hazards in Buildings</span></h2><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2145"><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor%2520Redi-Vents.jpg"><img alt="Studor Redi-Vent Air admittance valve studor valve IPS Corporation" class="Image_Standard" data-dcnode-id="2150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor%2520Redi-Ventss.jpg&amp;raw"></a><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Definition of Air Admittance Valve (AAV)</span></strong><span data-dcnode-id="2146" instrument_node="">: An AAV is  a one-way valve that allows air to enter the drain to satisfy the vacuum caused by water passing down the drainage system, but that prevents sewer gases from backing up through the vent into the building.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2141"><em data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">[Click to enlarge any image]</span></em></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Above, a Studor® Redi-Vent Air Admittance Valve from IPC Corporation.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node=""> Here we define Air Admittance Valves (AAVs) and explain where and how they are used.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><h3 data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Question: what are those one-way vents called - used under sinks in cabinets?</span></h3><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">(Nov 8, 2012) Jon said:</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">What are the one way vents called under sinks in cabinets?</span></p><span data-dcnode-id="2125" instrument_node="">
</span><h4 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Reply: air admittance valves or AAVs, or "Studor Vent"</span></h4><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Vacuum breaker vents or "cheater vents" or "studor vetns" or more formally and properly, "air admittance valves" (AAVs) for which an example is the V-200 Jon. That's what you are asking about.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">While the term "studor vent" is widely applied to describe an air admittance valve, Studor Mini-Vents as well as Redi-Vents are products of Studor Inc. &amp; the IPS Corporation and are a brand name. </span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Other examples of air admittance valves (AAV s) or inline vents include models produced Keeney Mfg. Vanity Installation Kit, and the Oatey 20 DFU Sure-Vent (Oatey 39016 or 39017 and other models). Most of the AAV manufacturers offer a range of AAV models. </span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">The Oatey SUre-Vent 39016 includes ANSI ASSE certifications stamped right on the valve top.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><h3 data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Standard plumbing vents vs. air admittance valves:</span></h3><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2104"><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing_Vent_Repair_677_DJFs.jpg"><img alt="Standard plumbing vent (C) Daniel Friedman" data-dcnode-id="2106" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing_Vent_Repair_677_DJFss.jpg&amp;raw" width="320"></a></p><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Above: a conventional plumbing vent stack termination above the roof line.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">If a plumbing drain is not vented to the atmosphere drain performance is likely be slow and noisy. Worse, the vacuum created by water passing through the drain waste piping system can cause water to be siphoned out of plumbing fixtrure traps. The loss of that trap water will in turn permit potentially explosive sewer gases to enter the building.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><h4 data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Standard Plumbing Vents</span></h4><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Typical "standard" plumbing systems include a plumbing vent pipe that passes up through the building roof and terminates above it.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><ul data-dcnode-id="2065"><span data-dcnode-id="2090" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2076"><span data-dcnode-id="2089" instrument_node="">Standard plumbing vent lets air in at the rooftop: </span><br data-dcnode-id="2088"><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">When a sink, toilet, shower or tub or similar plumbing fixture empties into its drain system in a standard plumbing arrangement, the vacuum that would be caused by water running down the drain pipe is relieved by air that enters the piping system through the plumbing vent stack. </span><br data-dcnode-id="2085"><br data-dcnode-id="2084"><span data-dcnode-id="2083" instrument_node="">If we did not relieve that vaccum pressure in the drain line the drain would pass wastewater poorly, slowly, and often with a bubbling or glub glub noise.</span><br data-dcnode-id="2082"><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">At </span><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing_Vent_Noise.php"><span data-dcnode-id="2079" instrument_node="">PLUMBING VENT NOISE</span></a><span data-dcnode-id="2077" instrument_node=""> we also describe  
  Air admittance valves, studor vents, vacuum breaker valves, in-line vents, or the V-200: these products are used in both new construction (where permitted by the local plumbing inspector) and as a retrofit where a building plumbing fixture is having drain problems such as trap siphonage because the fixture is not vented or not adequately vented.</span></li><span data-dcnode-id="2075" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2070"><span data-dcnode-id="2074" instrument_node="">Standard plumbing prevents sewer gas from exiting by use of plumbing traps: </span><br data-dcnode-id="2073"><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node="">Sewer gases that enter the waste piping system are blocked from passing out through a sink, shower or tub drain by water in the "U" portion of the drain trap, typically a "P-trap". Sewer gases are blocked from passing out through the toilet base by water in the toilet.</span></li><span data-dcnode-id="2069" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Plumbing guidelines and rules define the allowable distance between any plumbing fixture and the plumbing vent stack; if a fixture is located too far from the vent, its drainage may be poor and there is risk of plumbing trap siphonage and dangerous sewer gas release in the building.</span></li><span data-dcnode-id="2066" instrument_node="">
</span></ul><span data-dcnode-id="2064" instrument_node="">
</span><h3 data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Air Admittance Valves vs "Cheater Vents" </span></h3><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2057"><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V-200_Products.jpg"><img alt="Air admittance valve studor valve (C) Daniel Friedman" class="Image_Standard" data-dcnode-id="2060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V-200_Productss.jpg&amp;raw"></a><span data-dcnode-id="2058" instrument_node="">Where a conventional plumbing vent system is not available or not feasible the local plumbing inspector may permit an air admittance valve to be installed.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2053"><em data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">An air admittance valve is designed to allow air in to the drain piping system to which it is connected whenever pressure in the drain system is below atmospheric pressure outside the valve. </span></em></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Photo: an older style "cheater vent" that is spring-operated</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2045"><span class="RedText" data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Watch out</span></span><span data-dcnode-id="2046" instrument_node="">: the "Cheater Vent" shown above uses an internal spring that opens and closes the DWV seal. Studor, in their TECHNICAL MANUAL (cited and linked below) point out that this type of air admittence valve, or "old style" valve is not legal and does not meet any of the plumbing codes.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node=""> It may also be unsafe as a weakened or jammed or broken spring in the valve can lead to a failure that admits dangerous sewer gases into the building. </span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2037"><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">[Click to enlarge any image]</span></em><span data-dcnode-id="2038" instrument_node=""> Shown above: an older (now obsolete but still sold) V-200 air admittance valve</span></p><span data-dcnode-id="2036" instrument_node="">
</span><ul data-dcnode-id="2025"><span data-dcnode-id="2035" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Air admittance valve (AAV) lets air in at the valve opening: the vacuum created by water passing down the drain system opens a valve in the AAV to permit air to enter the drain system, thus satisfying or relieving the vacuum, both to improve drainage and avoid drain noises.</span></li><span data-dcnode-id="2032" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">The AAV closes when there is no vacuum in the drain system - that is when wastewater is not passing down the drain, preventing sewer gases from passing back up the drain system and out through the AAV.</span></li><span data-dcnode-id="2029" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Air admittance valves are located close to the fixture they serve, and are placed above the drain line as well as 6" above the P-trap weir as shown in the V-200 AAV installation instructions illustrated below.</span></li><span data-dcnode-id="2026" instrument_node="">
</span></ul><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Air admittance valves (AAVs) also have to withstand the positive pressure that can occur in some public sewer systems, in forced-main public or private sewer or septic systems, in plumbing drain systems using a sewage ejector pump, or in a blocked private septic system or in systems located in hilly terrain. </span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Where high sewer gas pressures are anticipated, the sewer piping system should include a vent to the building exterior. (Studor 2016)</span></p><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2015"><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V_200_Instructions_Short.jpg"><img alt="Short installation instructions for the V-200 air admittance valve " data-dcnode-id="2017" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/V_200_Instructions_Shorts.jpg&amp;raw"></a></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Some plumbing literature describes AAVs as P.A.P.A. devices. However they are different.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">An AAV admits air into the system when under negative pressure. A P.A.P.A. or Positive Air Pressure Attenuator (described in more detail below) handles temporary back-pressures or positive air pressures in the drain/waste/vent piping system. </span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">And some suppliers (National Builders Supply) recommend locating AAVs or PAPA devices throughout the plumbing system to improve drain performance by handling variations in air pressure in the drain-waste-vent system (DWV system), and to avoid trap siphonage.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="1998"><font color="RED" data-dcnode-id="2000"><strong data-dcnode-id="2001"><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Keeney_Air_Admittance_Valve_cs.jpg"><img alt="Keeney air admittance valve " class="Image_Standard" data-dcnode-id="2004" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Keeney_Air_Admittance_Valve_css.jpg&amp;raw"></a><span data-dcnode-id="2002" instrument_node="">Watch out</span></strong></font><span data-dcnode-id="1999" instrument_node="">: 
   If you smell sewer gases in your building conditions could be dangerous (risking a methane gas explosion) or unsanitary. </span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1996" instrument_node="">See </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Sewer_Odor_Causes_Remedies.php"><span data-dcnode-id="1995" instrument_node="">REMEDIES for SEWER ODORS, PLUMBING</span></a><span data-dcnode-id="1993" instrument_node=""> and</span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1990" instrument_node="">also see </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/odor_diagnosis/Odor-Diagnosis-Cure.php"><span data-dcnode-id="1989" instrument_node="">ODORS GASES SMELLS, DIAGNOSIS &amp; CURE</span></a><span data-dcnode-id="1987" instrument_node="">.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Air Admittance Valves retail for prices between about $6.00 and $32.00 U.S.D. </span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Shown just above is a black plastic mechanical air admittance vent from Keeney and retailing about $6. You'll note that it looks a bit like the V-200 shown above.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1975"><span class="RedText" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Watch out</span></span><span data-dcnode-id="1976" instrument_node="">: mechanical or spring-operated AAVs are not IPC code compliant and are not recommended.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Below: a Studor® Mini-Vent Air Admittance Valve (Code-Compliant). </span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">However this Studor vent may not have been installed sufficiently high above the horizontal drain line. Details are given in the Studor Technical Manual and vent installation instrucitons provided here. </span></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1964"><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vent.jpg"><img alt="Studor mini vent installed below a kitchen sink, courtesy InspectApedia.com reader Russ (C) InspectApedia.com Russ" class="Image_Standard" data-dcnode-id="1967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vents.jpg&amp;raw"></a><span data-dcnode-id="1965" instrument_node="">According to Studor, the company's Air Admittance Valves (available in several models and capacities) open when the drain system senses negative pressure as low as 0.1 psi, but will remain closed at 0 psi or above. </span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">This vent is designed to open when the plumbing fixture(s) it serves are draining, thus allowing air to enter the drain waste vent system.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">The Studor vent AAV closes (by gravity alone, no springs), when there is no wastewater flowing through tye system, thus preventing sewer gas from passing up the drain or vent into the building. </span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node="">According to Studor "</span><em data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">This style air admittance valve is not recognized as a mechanical vent in the International Plumbing Coder (IPC).</span></em><span data-dcnode-id="1953" instrument_node="">" - op. cit. </span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Exerpting from the Studor manual:</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1945"><em data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Because AAVs are either at or very near the Point Of Need (PON) for air, and thanks to their reaction times, a
system utilizing STUDOR AAVs is capable of balancing its internal pressure much more efficiently, without trap
movement or depletion than open pipe vent systems. </span></em></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1940"><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">This is particularly true in large commercial applications
  where the air needed to balance the system after each occurrence is drawn from far away points and thus
  require substantial time to reach the Point Of Need (PON).&nbsp;</span></em><span data-dcnode-id="1941" instrument_node="">- op. cit. </span></p><span data-dcnode-id="1939" instrument_node="">
</span><h2 data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Air Admittance Valve / Studor® Vent Sizing</span></h2><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Air admittance valves (AAVs) or if you're using the "Kleenex" form of the term, Studor Vents are sold in various sizes or venting capacities. Air admittance valve capacity is the measure of the volume of wastewater and its flow rate that the valve can handle while preventing trap siphonage and methane gas hazards.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">If building wastewater flows exceed the rating of the AAV then it is inadequate and the building may be unsafe as water may siphon from traps and explosive methane gas could enter the building. AAV manufacturers such as Studor® typically describe air admittance valve sizing or AAVs used in a combination of installation points to match building size: a rough estimate of the actual drain flow.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Oatey rates their AAVs in DFUs and provide four AAVS at sizes of 5, 20, 160 and 500 DFUs while some other manufacturers such as Studor describe products in flow rates of wastewater in liters per second. </span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node="">See </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Drain_Fixture_Units_DFUs.php"><span data-dcnode-id="1925" instrument_node="">PLUMBING DRAIN FIXTURE UNITS DFUs</span></a><span data-dcnode-id="1923" instrument_node=""> for an explanation of plumbing vent Drain Fixture Units or DFUs, and for an explanation of how DFUs are calculated and used in sizing drain waste vent piping including the selection of a proper air admittance valve or AAV sizing.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><h3 data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Example AAV Size Ratings in DFUs or in Liters/Second</span></h3><span data-dcnode-id="1918" instrument_node="">
</span><ul data-dcnode-id="1892"><span data-dcnode-id="1917" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Oatey's Sure-Vent intended for 1 1/2 to 2" drain piping is described (at Home Depot) as in compliance with ASSE Stdandards 1050 and 1051, for use as a secondary vent, rated to handle up to a 3" drain pipe.</span></li><span data-dcnode-id="1914" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Oatey</span></li><span data-dcnode-id="1911" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">Studor's Mini-Vent™ - 7.5 liters/second at 250 pa (10 pa = 1 mm water gauge). This vent can handle up to 160 DFUs on a single plumbing vent branch or up to 24 DFUs on a plumbing vent stack.</span><br data-dcnode-id="1909"><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node="">Studor's Mini-Vent™ is used for fenting a single plumbing fixture or a small group of plumbing fixtures such as in a residential kitchen or bath. 
 A residential kitchen sink drain also serving a dishwasher should be fine with the smallest AAV size.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node="">Studor®'s Maxi-Vent™ - 32 liters/second at 250 pa (10 pa = 1 mm water gauge)</span><br data-dcnode-id="1903"><br data-dcnode-id="1902"><span data-dcnode-id="1901" instrument_node="">Studor®'s Maxi-Vent™ is a high capacity air admittance valve that protects trap seals throughout the drainage system of larger buildings. Used alone and installed as the manufacturer directs, the Maxi-Vent™ can handle plumbing drain venting requirements for a typical low rise residential building of three or four floors in height.</span></li><span data-dcnode-id="1899" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">In high rise buildings up to 10 floors Studor®'s Maxi-Vent™ is combined with the company's Mini-Vent™ installed at individual fixtures</span></li><span data-dcnode-id="1896" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">In high rise buildings taller than 10 floors, Studor provides a Studor System venting design of highest capacity.</span></li><span data-dcnode-id="1893" instrument_node="">
</span></ul><span data-dcnode-id="1891" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="1890"></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1884"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vent-DFUs.jpg"><img alt="Studor Mini-Vent® DFU sizing chart at InspectApedia.com" data-dcnode-id="1888" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vent-DFUss.jpg&amp;raw"></a><span data-dcnode-id="1886" instrument_node=""> </span><br data-dcnode-id="1885"></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Illustration above: Studor's Mini-Vent® DFU (Drain Fixture Unit) sizing chart from the STUDOR PRODUCTS MANUAL cited and linked-to in this article. Studor's Tec-Vent® has the same DFU capacity. </span></p><span data-dcnode-id="1880" instrument_node="">

</span><p data-dcnode-id="1871"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Redi-Vent-DFU-Chart.jpg"><img alt="Studor Redi-Vent Drain Fixture Unit Capacity Chart at InspectApedia.com" data-dcnode-id="1873" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Redi-Vent-DFU-Charts.jpg&amp;raw"></a></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">The Studor MAXI-VENT® is installed on 3" or 4" pipes, can be used outdoors, and can vent fixtures according to the table below: </span></p><span data-dcnode-id="1867" instrument_node="">

</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node=""> Does the drip noise you describe only occur when you are running water?  If this is the case it could possibly be that water pipes are expanding against the holes that the pipes run through and you could wind up chasing a phantom sound forever.  If the holes that the water pipes run through are too small or the strapping used is too tight around the pipe this could possibly produce that same sound similar to a drip. </span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">I also agree with [the moderator] in that the AAV must always be accessible.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node=""> If it is the AAV one possibility is that the tapping is the valve opening and closing making a noise and in this case run hot water at a very slow but steady stream for 5 minutes and if there is no tapping at all then run the water fully open and if the tapping begins then it is more possibly the AAV Oatey valve making the tapping noise. </span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1721" instrument_node="">Also see </span><span class="LI_Spaced" data-dcnode-id="1717"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/noise_diagnosis/Dripping_Water_Noise_Diagnosis.php"><span data-dcnode-id="1720" instrument_node="">DRIPPING WATER SOUND SOURCES</span></a><span data-dcnode-id="1718" instrument_node=""> - described as tapping</span></span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">---</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">On 2017-04-23 by (mod) - never bury an AAV</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">I'm not sure it's good practice to bury an AAV in part because it can't be inspected nor replaced if it fails. Also, covering an air admittance valve might block air entry into it, causing drain malfunctions that can be unsafe.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1702" instrument_node="">The hazards include more than just poor venting or poor drains: an AAV that jams may also vent dangerous sewer gases into the building. The valve must remain accessible.</span><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">
</span><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">
  I like the stethoscope approach; also look for stains below the area where you hear dripping. </span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1695" instrument_node="">See </span><span class="LI_Spaced" data-dcnode-id="1691"><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/noise_diagnosis/Dripping_Water_Noise_Diagnosis.php"><span data-dcnode-id="1694" instrument_node="">DRIPPING WATER SOUND SOURCES</span></a><span data-dcnode-id="1692" instrument_node=""> - described as tapping</span></span><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">
</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">On 2017-04-23   by Douglas Rome - our AAV is buried behind drywall but we hear dripping sounds</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">we did a 1st floor kitchen remodel and had to use an AAV to accommodate a 
  second floor lav. the walls and ceiling were open for a few weeks after the AAV 
  install. in that time we did not notice a leak in the exposed lav piping. </span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">The tapping 
  sound we hear is like you would hear if there was a slow leak and water dripping on 
  drywall ceiling drip drip drip.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1677" instrument_node="">The AAV is buried behind drywall and it is a Oatey brand 
  I don't recall the model number it was purchased at one of the big boxes. I will try a 
  stethoscope to see if I can pinpoint. thanks, douglas </span><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">
</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">On 2017-04-17  by (mod) - AAVs do not normally make noise</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1669" instrument_node="">Douglas</span><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">
</span><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">
  The AAVs I've installed, seen, inspected were rather silent. If you hear a tapping sound and it's for sure coming from the AAV (try a mechanic's stethoscope) then perhaps the valve is indeed sticking or defective. </span><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
</span></p><span data-dcnode-id="1661" instrument_node="">

  is flowing in the drain? Thanks, Douglas</span></p><span data-dcnode-id="1653" instrument_node="">

</span><h2 data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Excerpts from IPC Chapter 9, Vents, on Air Admittance Valve Codes</span></h2><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1565"><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Kitchen-vent-wrong-383-Megan.jpg"><img alt="Air admittance valve  inline vent in crawl areas must be moved up to below the kitchen sink (C) InspectApedia.com Megan" class="Image_Standard" data-dcnode-id="1571" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Kitchen-vent-wrong-383-Megans.jpg&amp;raw"></a><span data-dcnode-id="1569" instrument_node="">The photo of an inline plumbing vent or air admittance valve shown here, contributed by reader Megan, was posted originally at </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing_Vent_Definitions.php"><span data-dcnode-id="1568" instrument_node="">PLUMBING VENT CODES &amp; DEFINITIONS</span></a><span data-dcnode-id="1566" instrument_node="">. </span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">This vent, installed in a basement or crawl space, was not properly-located according to Megan's plumbing inspector. </span></p><span data-dcnode-id="1561" instrument_node="">
</span><h3 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Section 917
  Air Admittance Valves</span></h3><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1554"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">917.1 General.</span></strong><span data-dcnode-id="1555" instrument_node="">&nbsp;Vent systems utilizing air admittance valves
  shall comply with this section. </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Stack-type air admittance
  valves shall conform to ASSE 1050. Individual and
  branch-type air admittance valves shall conform to ASSE
  1051.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1546"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">917.2 Installation.</span></strong><span data-dcnode-id="1547" instrument_node="">&nbsp;The valves shall be installed in accordance
  with the requirements of this section and the manufacturer’s
  installation instructions. Air admittance valves shall be
  installed after the DWV testing required by Section 312.2 or
  312.3 has been performed.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1541"><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">917.3 Where permitted.</span></strong><span data-dcnode-id="1542" instrument_node="">&nbsp;Individual, branch and circuit vents
  shall be permitted to terminate with a connection to an individual
  or branch-type air admittance valve. </span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Stack vents and vent
  stacks shall be permitted to terminate to stack-type air admittance
  valves.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node=""> Individual and branch-type air admittance valves
  shall vent only fixtures that are on the same floor level and connect
  to a horizontal branch drain. </span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The horizontal branch drain
  having individual and branch-type air admittance valves shall
  conform to Section 917.3.1 or 917.3.2. Stack-type air admittance
  valves shall conform to Section 917.3.3.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1527"><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">917.3.1 Location of branch.</span></strong><span data-dcnode-id="1528" instrument_node="">&nbsp;The horizontal branch drain
 shall connect to the drainage stack or building drain a maximum
 of four branch intervals from the top of the stack.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1522"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">917.3.2 Relief vent.</span></strong><span data-dcnode-id="1523" instrument_node="">&nbsp;Where the horizontal branch is located
 more than four branch intervals from the top of the stack, the
 horizontal branch shall be provided with a relief vent that
 shall connect to a vent stack or stack vent, or extend outdoors
 to the open air. </span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">The relief vent shall connect to the horizontal
  branch drain between the stack and the most&nbsp;downstream fixture drain connected to the horizontal
  branch drain. </span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">The relief vent shall be sized in accordance
  with Section 916.2 and installed in accordance with Section
  905. The relief vent shall be permitted to serve as the vent
  for other fixtures.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1511"><strong data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">917.3.3 Stack.</span></strong><span data-dcnode-id="1512" instrument_node="">&nbsp;Stack-type air admittance valves shall not
 serve as the vent terminal for vent stacks or stack vents&nbsp;</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1506"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">917.4 Location.</span></strong><span data-dcnode-id="1507" instrument_node="">&nbsp;Individual and branch-type air admittance
valves shall be located a minimum of 4 inches (102 mm) above
the horizontal branch drain or fixture drain being vented.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Stack-type air admittance valves shall be located not less than 6
  inches (152 mm) above the flood level rim of the highest fixture
  being vented. The air admittance valve shall be located within
  the maximum developed length permitted for the vent. </span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">The air
  admittance valve shall be installed a minimum of 6 inches (152
  mm) above insulation materials.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">917.5 Access and ventilation.</span></strong><span data-dcnode-id="1496" instrument_node="">&nbsp;Access shall be provided to all
  air admittance valves. The valve shall be located within a ventilated
  space that allows air to enter the valve.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">917.6 Size.</span></strong><span data-dcnode-id="1491" instrument_node="">&nbsp;The air admittance valve shall be rated in accordance
  with the standard for the size of the vent to which the
  valve is connected.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1485"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">917.7 Vent required.</span></strong><span data-dcnode-id="1486" instrument_node="">&nbsp;Within each plumbing system, a minimumof
  one stack vent or vent stack shall extend outdoors to the
  open air.
  917.8 Prohibited installations. </span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Air admittance valves shall
  not be installed in nonneutralized special waste systems as
  described in Chapter 8. </span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Valves shall not be located in spaces
  utilized as supply or return air plenums.&nbsp;</span></p><span data-dcnode-id="1478" instrument_node="">
</span><h2 data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">AAVs Studor Vents Installation Guides &amp; Sources</span></h2><span data-dcnode-id="1475" instrument_node="">
</span><ul data-dcnode-id="1386"><span data-dcnode-id="1474" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1470"><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/DURGO-Air-Admittance-Valve-Specifications.pdf"><span data-dcnode-id="1473" instrument_node="">AB DURGO AIR ADMITTANCE VALVES CERTIFICATION</span></a><span data-dcnode-id="1471" instrument_node=""> [PDF]  (2011) British Board of Agrement, Bucknails Lane, Garston, Watford Herts WD25 98A UKe-mail: mail@bba.star.co.uk website: www.bbacerts.co.uk retrieved 2019/08/14 original source: https://www.hunterplastics.co.uk/media/1791/bba-durgo-certificate-06-4325.pdf</span></li><span data-dcnode-id="1469" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1448"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Air-admittance-valves-British-Plastics.pdf"><span data-dcnode-id="1468" instrument_node="">British Plastics Corp., AIR ADMITTANCE VALVES for DOMESTIC PROPERTIES</span></a><span data-dcnode-id="1466" instrument_node=""> [PDF] (2018) retrieved 2019/08/14 original source: https://www.bpfpipesgroup.com/media/29598/Air-admittance-valves-for-domestic-properties.pdf</span><br data-dcnode-id="1465"><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">  Excerpt: </span><em data-dcnode-id="1449"><span data-dcnode-id="1462" instrument_node="">Across the UK, Building Regulations and statutory guidance allow for ventilation by either open soil pipes or
air admittance valves. The preferred solution, being the simplest and most familiar to install, is the open soil
pipe. It requires minimal maintenance and the visible termination point above the roof means it is less likely
to be blocked off during future building work by householders.
  </span><br data-dcnode-id="1461"><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">  Open soil pipes within 3 m of any opening to the building need to terminate at least 900 mm above the

</span><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">
</span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">Here is some guesswork: 
</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">
</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">You might have seen in the page top sketch or in the instructions for installing your AAV (Air Admittance Valve) that the minimum height for an AAV  is 6" above the top of the trap arm. 
</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">I suspect there's a drain line pressure problem - just as you suggest. Perhaps under-sized drains for the volume of wastewter, or under-sized AAVs or as you hint, one that's too low and getting shut by backpressure. 
</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">If an AAV is seeing back-pressure such as might occur when other fixtures are dumping into a common drain and in particular when a washing machine is emptying as your hookup may have the washer pumping waste water into the drain under pressure, then that vent is going to close - which means it won't vent the local fixture. 
</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">If this were my plumbing installation, and given I can't say I have a clear understanding of your piping and AAVs, I'd pull off one of them, run various drain configurations, and see if I'm actually getting backpressure or water trying to spill out. (Be prepared to close off the vertical riser opening so as not to flood the building)
</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">On the other hand if the problem is clogged drains outside the building you ought to have been seeing that independent of the additional vent. 
</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">Do let me know what you find as that will help other readers. </span><br data-dcnode-id="1065"></p><span data-dcnode-id="1063" instrument_node="">

</span><br data-dcnode-id="1030"><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">Your thoughts are much appreciated especially if it’s something else I’m not considering. Thank you </span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">

</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">Thank you for the interesting P-trap versus AAV question.
</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">The p-trap depth itself would not be the issue BUT check out the instructions in our page top illustration where it is explained that
</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">"The sealing disc in the V200 must be at least 6" above the top of the trap arm"
</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">The "trap arm" is the horizontal member of the trap. So if a P-trap depth were too short to give sufficient space for a tall-enough air admittance valve vertical pipe, then yes that would be a problem. </span><br data-dcnode-id="1003"></p><span data-dcnode-id="1001" instrument_node="">

    </span></p><p data-dcnode-id="996"><span data-dcnode-id="998" instrument_node="">Can improper p trap depth effect the operation of  air admittance  valve?</span><br data-dcnode-id="997"></p><span data-dcnode-id="995" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">
  On 2019-08-14 - by (mod) - </span></p><span data-dcnode-id="992" instrument_node=""> </span><p data-dcnode-id="985"><span data-dcnode-id="991" instrument_node="">No John, plumbing drains should never be vented into a heating appliance vent system.
</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">
</span><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">Doing so is unsafe. </span><br data-dcnode-id="986"></p><span data-dcnode-id="984" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">
      On 2019-08-14 by TN John
    </span></p><p data-dcnode-id="975"><span data-dcnode-id="981" instrument_node="">Hello;
</span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">
</span><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node=""> In your opinion can a 2 inch grinder pump that is in the slab be vented up and across the mechanical room ceiling and Tee into the 2 inch vent pipe for the gas furnace? </span><br data-dcnode-id="976"></p><span data-dcnode-id="974" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">On 2019-08-14 by (mod) - diagnose slow drainage with an AAV installed</span></p><span data-dcnode-id="971" instrument_node=""> </span><p data-dcnode-id="966"><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vent-DFUs.jpg"><img alt="Studor Mini-Vent® DFU sizing chart at InspectApedia.com" class="Image_Standard" data-dcnode-id="970" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Min-Vent-DFUss.jpg&amp;raw"></a><span data-dcnode-id="968" instrument_node="">I don 't think shortening the sink drops (what I call tailpieces) will help this problem - though an experiment would be interesting.</span><br data-dcnode-id="967"></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Illustration: Studor's Mini-Vent® DFU (Drain Fixture Unit) sizing chart from the STUDOR PRODUCTS MANUAL cited and linked-to above. Studor's Tec-Vent® has the same DFU capacity. Other Studor brand AAVs vary in DFU capacity - more charts are given below. </span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">[Click to enlarge any image]</span></em></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Your theory about the AAV being too big is interesting too, but I'd be surprised if that's the trouble since the designer of the larger-capacity AAV has to consider that the AAV has to open at lower drainage rates than the maximum that the vent can handle. Your AAV could be too-small, however as we'll discuss here. </span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Typically an AAV opens at - 0.1 psi and closes at 0 psi or above. </span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">According to the Studor AAV Sizing chart on the label you attached, assuming your kitchen sink drains are 2" diameter your AAV can handle 6 DFUs - more than enough for just two kitchen sinks. </span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">Curiously your Studor Vent label shows a "blank" for the maximum number of DFUs ifyour drain horizontal branch is just 1 1/2" - so your AAV could be too small, but not too big.</span><br data-dcnode-id="947"><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">Let's both look over the specs some more and let's review the reasons that a drain line may be slow when an AAV has been installed. </span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Causes of Slow Drains where an Air Admittance Valve AAV is Installed</span></h3><span data-dcnode-id="940" instrument_node="">
</span><ol data-dcnode-id="875"><span data-dcnode-id="939" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="931"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Downstream trap</span></strong><span data-dcnode-id="936" instrument_node="">: The most common cause of poor or slow drainage where an Air Admittance Valve has been installed is back pressure in the drain piping system. That can be caused if the AAV has been installed upstream from a drain that is trapped. </span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node=""> </span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">  The trap downstream from the AAV combined with wastewater flowing down the drain when the AAV-supported fixture is being drained (such as a toilet or large sink) can cause back-pressure that prevents the AAV from opening enough for the drain to flow freely.</span></li><span data-dcnode-id="930" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="922"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Downstream drain blockage</span></strong><span data-dcnode-id="927" instrument_node="">: A second problem that will cause poor drainage when the AAV is installed is a partial drain blockage downstream, usually pretty far downstream, from the fixture being served by the air admittance valve. </span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node=""> </span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">  An improperly-sloped drain line can also cause the same slow-draining AAV problem as a remote drain blockage. Positive pressure in the drain line.</span></li><span data-dcnode-id="921" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="913"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Missing or blocked conventional roof vent </span></strong><span data-dcnode-id="918" instrument_node="">on the main drain line into which the AAV-served drain ultimately empties. A roof vent may be blocked by debris, frost (in freezing weather), and even a frog (at least I found one there once). </span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node=""> </span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">  Oatey and Studor make clear that while it is helpful (and sometimes permitted) to install an AAV at a fixture that's otherwise too distant from the building vent system (example would be a kitchen island sink drain or garbage disposer drain in an island sink), the building drain system into which the fixture ultimately empties must be served by a conventional roof vent.</span></li><span data-dcnode-id="912" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="908"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Subtle partial drain blockage</span></strong><span data-dcnode-id="909" instrument_node=""> (uncommon) such as a horizontal plastic trap arm that is pushed so far into a drain tee or sink tailpiece tee that it is partly blocking drain flow - similar to #2 above but usually closer to the fixture.</span></li><span data-dcnode-id="907" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="882"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">AAV too small for the total wastewater volume</span></strong><span data-dcnode-id="904" instrument_node="">: compare the DFUs (drain fixture units) number with the number of fixtures actually being served by the AAV. </span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node=""> </span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node=""> </span><span class="RedText" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Watch out</span></span><span data-dcnode-id="897" instrument_node="">: In Ryan's sink photo below we see two kitchen sinks draining into a common trap line with a Studor Mini-Vent® AAV installed. </span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node=""> </span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">    While Ryan's photo of the Studor Mini-Vent label shows a blank at the "Maximum DFUS" column for the 1 1/2" diameter drain line, the company's technical product manual (PDF given above in this article) shows that on a 1 1/2" diameter horizontal drain, the Mini-Vent can handle a MAXIMUM of 3 DFUs. </span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node=""> </span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">    If Ryan's AAV is installed on a 1 1/2" diameter drain, that AAV may be too small when both sinks are draining at once, as we count 2 DFUs per kitchen sink.  If it's installed on a 2-inch diameter drain, it should be OK and the slow drain problem is elsewhere. </span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node=""> </span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">  See details at </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Drain_Fixture_Units_DFUs.php"><span data-dcnode-id="884" instrument_node="">PLUMBING DRAIN FIXTURE UNITS DFUs</span></a></li><span data-dcnode-id="881" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="877"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">AAV not installed according to the manufacturer's specifications</span></strong><span data-dcnode-id="878" instrument_node="">. See examples of those details, such as installed with insufficient height above the horizontal drain, installed too far from the vent stack, not installed vertical, etc. in the article above.</span></li><span data-dcnode-id="876" instrument_node="">
</span></ol><span data-dcnode-id="874" instrument_node="">
</span><h4 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Positive Air Pressure Attenuators</span></h4><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="867"><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-PAPA-Positive-Air-Pressure-Attenuator.jpg"><img alt="Studor Positive Air Pressure Attenuator at InspectApedia.com" class="Image_Standard" data-dcnode-id="870" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-PAPA-Positive-Air-Pressure-Attenuators.jpg&amp;raw"></a><span data-dcnode-id="868" instrument_node="">If you cannot solve your positive drain pressure problem and are confident that there are no drain bellies, improper slopes, improper sizings, blockages, vent defects, then you might try installing a positive air pressure attenuator such as Studor's P.A.P.A.™ intended for commercial use. Here is an excerpt from the Studor technical manual cited above: </span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="863"><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The P.A.P.A. device is the perfect complement to STUDOR Air Admittance Valves. Together
they form an Engineered System known as “Studor Single Pipe System (SSPS)”, a total
solution to building venting requirements.</span></em></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="859"><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node=""> The Studor AAVs deal with negative pressure
      in the system while the P.A.P.A. effectively deals with the positive pressure transients.
      The combination of the two maintains the perfect system balance quickly and efficiently
      throughout the system preventing siphonage and blowing of traps.&nbsp;</span></em></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Be sure to review the technical specifications, limitations, and instructions in Studor's technical manual. </span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">I'm going to copy this conversation over to the home article where it may invite helpful comments from others</span><br data-dcnode-id="853"><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">AIR ADMITTANCE VALVES AAVs inspectapedia.com/plumbing/Air_Admittance_Studor_Vents.php </span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="848" instrument_node="">Well anyhow that's a better trap installation that's less clog likely.</span><br data-dcnode-id="847"><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">When no air is being drawn IN through the AAV that suggests that the drain is functioning even without air admittance (that can happen though it's not long term reliable) - but you say that with the AAV removed the drain works better. That suggests that the AAV isn't admitting enough air fast enough. (Or less likely there's a downstream blockage).</span><br data-dcnode-id="844"><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">Often on a two-sink setup I notice that when the big sink is draining air is drawn into the drain through the smaller one - that tells me that there isn't a good air flow into the drain system through the building plumbing vent piping - which is why you added the AAV in the first place.</span><br data-dcnode-id="841"><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">I'm adding a stack of PDFs on AAVs and their specifications and air admittance valve installation instructions from various manufacturers so that we can review their specifications;</span><br data-dcnode-id="838"></p><span data-dcnode-id="836" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">On 2019-08-14   by Russ</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">For what it is worth, here is a pic of the container the AAV valve came with.  It's hard to see the 1 1/2" but it is 3 DFU's max.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="830" instrument_node=""> I have wondered if the AAV I have is too large for this application but wanted to reach out for advice before buying another brand to see the results.  Going back to your original reply, I can shorten the sink drops to raise the assembly too.</span><br data-dcnode-id="829"><br data-dcnode-id="828"><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-385-Russ.jpg"><img alt="Studor Air Admittance Valve Sizing Chart (C) InspectApedia.com  Russ" data-dcnode-id="827" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-385-Russs.jpg&amp;raw"></a></p><span data-dcnode-id="824" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">On 2019-08-14 by (mod) - Troubleshooting a Studor AAV that causes too-slow drainage</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="814"><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-384-Russ.jpg"><img class="Image_Standard" data-dcnode-id="820" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-384-Russs.jpg&amp;raw"></a><span data-dcnode-id="818" instrument_node="">Well anyhow that's a better trap installation that's less clog likely.</span><br data-dcnode-id="817"><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">When no air is being drawn IN through the AAV that suggests that the drain is functioning even without air admittance (that can happen though it's not long term reliable) - but you say that with the AAV removed the drain works better.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p class="current" data-dcnode-id="798"><span data-dcnode-id="812" instrument_node=""> That suggests that the AAV isn't admitting enough air fast enough. (Or less likely there's a downstream blockage). </span><br data-dcnode-id="811"><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">Often on a two-sink setup I notice that when the big sink is draining air is drawn into the drain through the smaller one - that tells me that there isn't a good air flow into the drain system through the building plumbing vent piping - which is why you added the AAV in the first place. </span><br data-dcnode-id="808"><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">I'm adding a stack of PDFs on AAVs from various manufacturers so that we can review their specifications; </span><br data-dcnode-id="805"><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">See </span><a class="current" data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Air_Admittance_Studor_Vents.php"><span data-dcnode-id="802" instrument_node="">AIR ADMITTANCE VALVES AAVs</span></a><span data-dcnode-id="800" instrument_node=""> https://inspectapedia.com/plumbing/Air_Admittance_Studor_Vents.php</span><br data-dcnode-id="799"></p><span data-dcnode-id="797" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">On 2019-08-14 by Russ</span></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Thank you for your promt reply!  I did as you suggested below.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">First filling both sinks, removed the upper sink drain and using talc to see how the AAV was drawing in air</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">.  I could not see the air being drawn into the AAV, nor could I hear it open.  I closed the upper sink drain while still having water in it and removed the lower, repeating the process with the talc on the AAV.  Same results with no air being drawn into it. </span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Then I removed all water from the upper sink and leaving drain open, pulled lower sink drain.  The same results with the AAV and the talc.  I removed the AAV and held it in the vertical position, gently drawing air by mouth, it does open and gentle blowing, it does close.  I went ahead and removed the extra 90 in the trap, I had that in to create space between the trap and the drain. </span></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">
    On 2019-08-14 by (mod) - How to test the Air Admittance Valve AAV - The Bag Test &amp; the Talcum Powder Test</span></h3><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="779" instrument_node="">That extra loop trap seems unnecessary; if you shorten the sink tailpieces and raise up the Tee you can go to a single U trap that will improve drainage - but I note that's an independent issue from the slow venting with the Studor in place.</span><br data-dcnode-id="778"><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">Some plumbers refer to this as a "positive pressure" problem; when water tries to run down the drain it's creating positive pressure in the drain system - that'll close or tend to close the air inlet at the AAV.</span><br data-dcnode-id="775"><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">Sometimes the problem is that the water running down one side of the sink needs to push air up and out - the Studor or Air Admittance Valve (AAV) only lets air IN - it won't let air OUT.</span><br data-dcnode-id="772"><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">So let's start by checking what's happening.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Close both sink drains, then fill both sinks, then with an accomplice listening or feeling or blowing talc at the Studor AAV, open one sink drain. </span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">An alternative to blowing talc at the AAV while the fixture is draining, try simply securing a lightweight plastic bag over the AAV, holding it in place with a rubber band.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">When you empty the fixture if the bag inflates we know there is a positive pressure problem at the drain - for which solutions will be given above. </span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">If the bag over the AAV compresses or deflates then the AAV is drawing in air.</span><br data-dcnode-id="757"><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">Try the same experiment with </span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="752" instrument_node="">- one sink drain (the smaller higher one) empty and its strainer removed.</span><br data-dcnode-id="751"><br data-dcnode-id="750"><span data-dcnode-id="749" instrument_node="">Let me know what happens. </span><br data-dcnode-id="748"></p><span data-dcnode-id="746" instrument_node="">
</span><h4 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
      On 2019-08-14 by Russ
    - slow drainage problem after adding an AAV</span></h4><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">I added a Studor Mini AAV to a double kitchen sink that has no other means of venting in hopes of improving the drain speed.  After filling the sink and then releasing the water it still drains rather slow but does drain.  If I remove the AAV it drains very fast.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">There is a main vent line on the house for the toilets and shower but is 25' from the kitchen.  If I pour dish soap in the drain with the AAV in place it does drain quickly.  Any ideas on things to look at to improve the draining time on the sink would be appreciated. </span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="734"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-383-Russ.jpg"><img data-dcnode-id="736" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Studor-Mini-AAV-383-Russs.jpg&amp;raw"></a></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">This Q&amp;A were posted originally at </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/plumbing/Plumbing-Vent-FAQs3.php"><span data-dcnode-id="731" instrument_node="">PLUMBING VENT FAQs-3</span></a><span data-dcnode-id="729" instrument_node=""> </span></p><span data-dcnode-id="727" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">On 2019-08-14 by (mod) - plumbing drains should never be vented into a heating appliance vent system.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="723" instrument_node="">No John, plumbing drains should never be vented into a heating appliance vent system.</span><br data-dcnode-id="722"><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">Doing so is unsafe. </span><br data-dcnode-id="719"></p><span data-dcnode-id="717" instrument_node="">
