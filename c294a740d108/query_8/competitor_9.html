    - snaking a grease-blocked drain may fail to open it fully</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">@Josh,</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node=""> Is your home on a slab or do you have a basement? Can you see the pipes that run from your sink underneath?</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node=""> Are the pipes galvanized or plastic?  Sometimes snaking the line (even 25 feet) only makes a dime size hole in the grease.  </span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="665" instrument_node="">Also, if it is an older home it could be a gray water line.  When you pulled the snake back was there a thick coating of sludge or grease? </span><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
</span></p><span data-dcnode-id="661" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">On 2019-04-26 by Nick Loche</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">(mod) , </span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Agreed. Air Admittance Valves rarely solve this problem of blocked drain lines notwithstanding the cause of it.  Air Admittance Valves can be added to it's own </span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="648"><span class="RedText" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Watch out</span></span><span data-dcnode-id="649" instrument_node=""> section for risk of dangerous sewer gases re-entering the building respectfully. </span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Oatey's Sure-Vent, Oatey, Studor's Mini-Vent, Studor's Maxi-Vent can all be a risk of possible dangerous sewer gases re-entering the building. </span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">I had a studor and an oatey air admittance valve leak sewer gas odor from time to time so I threaded a cap to the drain connection, since there was a vent to roof within 5 feet of the trap, and the unpleasant sewer gas odor was gone.  I since installed a dual seal air admittance valve and no problems since.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="640" instrument_node=""> I am still not satisfied with air admittance valves in general and it is important that those who read this information are provided with fact based experiences instead of speculation that if you have a slow drain an air admittance valve will solve all your problems.</span><br data-dcnode-id="639"></p><span data-dcnode-id="637" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">On 2019-04-13  by (mod) - signs of blocked drain vs. poor venting</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="633" instrument_node="">When sewage actually backs up into a toilet during use of other plumbing fixtures nearby that's a pretty strong suggestion that the drain system is blocked; it's odd that inadequate venting would go so far as to actually cause drainage backup nearby but I suppose that's also possible.</span><br data-dcnode-id="632"><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">The latter part of your comment about water being sucked out of other toilets does indeed suggest a combination of a tremendous suction on the drain line combined with no venting working at all.</span><br data-dcnode-id="629"><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">I speculate that the volume and thus weight of water draining from upstairs combined with no venting is explaining the loss of water downstairs.</span><br data-dcnode-id="626"><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">Watch out: loss of water from traps at toilets and sinks, showers, etc. risks dangerous sewer gas re-entering the building- risking a methane explosion.</span><br data-dcnode-id="623"><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">Instead of having more work done by "the builder" who may not be a plumber, you probably need an experienced plumber on site to review the vent system.</span><br data-dcnode-id="620"><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">Read-up about plumbing vents by noting those articles in the </span><a data-dcnode-id="616" href="#MasterIndex"><span data-dcnode-id="617" instrument_node="">ARTICLE INDEX</span></a><span data-dcnode-id="615" instrument_node=""> found above. </span><br data-dcnode-id="614"></p><span data-dcnode-id="612" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">On 2019-04-10 by Yuri Hanja</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="608" instrument_node="">@Josh,</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">Have a 2 story house.  Have 2 upstairs  full bathrooms. One bath has problems. 1)when showering the toilet would fill to brim. 2) when toilet is used the flush would</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">not empty.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">July 2017 after proving water was not  draining properly, the builder tore first floor ceiling down and realigned the drain pipes.  But now problems </span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">  are returning, including all toilet water( both up and downstairs toilets) being sucked out.  We are connected to town sewer system. </span><br data-dcnode-id="598"></p><span data-dcnode-id="596" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">On 2018-08-06 by (mod) - signs of drain blockage when the AAV is working</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="592" instrument_node="">Josh</span><br data-dcnode-id="591"><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">If the sink drain is backing up and the air admittance valve is working I suspect there is a drain blockage not yet found and cleared. You could confirm that it's not the vent by removing it entirely - an open standpipe under the sink acts as an unobstructed air entry point. If the drain still backs up then we figure it's not an air admittance problem. </span><br data-dcnode-id="588"></p><span data-dcnode-id="586" instrument_node="">
