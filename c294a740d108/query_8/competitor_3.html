</span><article class="entry" data-dcnode-id="643"><span data-dcnode-id="1096" instrument_node="">
</span><h1 data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Plastic Tank Installation Instructions</span></h1><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1087"><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//premierplastics.com/installation-instructions%23under"><span data-dcnode-id="1092" instrument_node="">Underground Plastic Tank Installation</span></a><span data-dcnode-id="1090" instrument_node=""> | </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//premierplastics.com/installation-instructions%23above"><span data-dcnode-id="1089" instrument_node="">Above Ground Plastic Tank Installation</span></a></p><span data-dcnode-id="1086" instrument_node="">
</span><hr data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><a data-dcnode-id="1083" name="under"></a></p><span data-dcnode-id="1081" instrument_node="">
</span><h2 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Underground Plastic Tank Installation</span></h2><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1074"><img alt="tank installation" class="alignnone wp-image-1915 size-full entered lazyloaded" data-dcnode-id="1077" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://premierplastics.com/wp-content/uploads/2018/03/tank-installation.png" data-lazy-srcset="https://premierplastics.com/wp-content/uploads/2018/03/tank-installation.png 880w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-300x103.png 300w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-768x264.png 768w" data-ll-status="loaded" height="302" sizes="(max-width: 880px) 100vw, 880px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//premierplastics.com/wp-content/uploads/2018/03/tank-installation.png&amp;raw" srcset="https://premierplastics.com/wp-content/uploads/2018/03/tank-installation.png 880w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-300x103.png 300w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-768x264.png 768w" width="880"><noscript data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">&lt;img class="alignnone wp-image-1915 size-full" src="https://premierplastics.com/wp-content/uploads/2018/03/tank-installation.png" alt="tank installation" width="880" height="302" srcset="https://premierplastics.com/wp-content/uploads/2018/03/tank-installation.png 880w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-300x103.png 300w, https://premierplastics.com/wp-content/uploads/2018/03/tank-installation-768x264.png 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><strong data-dcnode-id="1069"><span data-dcnode-id="1072" instrument_node="">EXCAVATION</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
</span></strong></p><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1056"><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Select site with good sub-soil drainage.</span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Allow clearance around the tank to properly place and compact backfill around the lower half of the tank.</span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Provide well-compacted or undisturbed bedding of sand/gravel mixture or clean, granular soil: 6″ minimum in rock terrain. Shape bedding to suit underside of tank.</span></li><span data-dcnode-id="1057" instrument_node="">
</span></ul><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">PLACING THE TANK</span></strong></p><span data-dcnode-id="1051" instrument_node="">
</span><ul data-dcnode-id="1027"><span data-dcnode-id="1050" instrument_node="">
</span><li data-dcnode-id="1036"><span data-dcnode-id="1049" instrument_node="">Check before placing tank:
</span><ul data-dcnode-id="1038"><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Serial number (for Warranty Form).</span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Orientation of inlet and outlet.</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Shipping damage.</span></li><span data-dcnode-id="1039" instrument_node="">
</span></ul><span data-dcnode-id="1037" instrument_node="">
</span></li><span data-dcnode-id="1035" instrument_node="">
</span><li data-dcnode-id="1029"><span data-dcnode-id="1034" instrument_node="">User a pipe level across access cover to level inlet and outlet. It is important that the outlet is below level of inlet.</span><strong data-dcnode-id="1030"><em data-dcnode-id="1031"><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
CAUTION: Handle with care. A severe impact could crack the tank, especially in cold weather.</span></em></strong></li><span data-dcnode-id="1028" instrument_node="">
</span></ul><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">AVOIDING FLOTATION OR DISTORTION</span></strong></p><span data-dcnode-id="1022" instrument_node="">
</span><ul data-dcnode-id="1005"><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1014"><span data-dcnode-id="1020" instrument_node="">Poly tanks risk floating or distortion at the base if pumped out during periodic high water table. Keep tank partially filled during extreme wet conditions.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
</span><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Fill after installation</span></strong><span data-dcnode-id="1015" instrument_node="">.</span></li><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1012" instrument_node="">For testing water table level, install vertical length of 4″ perforated drainage pipe beside tank with removable cap above grade level. Affix label provided to standpipe.</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
*AVOID PUMPING TANK OUT BELOW WATER TABLE.</span></strong><span data-dcnode-id="1008" instrument_node=""> If on sloped ground, run drainage line from under tank out to daylight, downhill from tank.</span></li><span data-dcnode-id="1006" instrument_node="">
</span></ul><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1001"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">BACKFILLING</span></strong></p><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="964"><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="998" instrument_node="">Tank must be backfilled when either empty or no more than 30% full.</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
</span><strong data-dcnode-id="993"><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">No water is required for the backfilling process. If filled for leak testing, drain tank to 30% or less prior to backfilling</span></em></strong><span data-dcnode-id="992" instrument_node="">.</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="978"><span data-dcnode-id="989" instrument_node="">Backfill with 12″ maximum layers of granular soil or clean fill and trample evenly.</span><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">
</span><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">NO CLAY BACKFILL</span></strong><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">
</span><em data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Important:</span></strong><span data-dcnode-id="980" instrument_node=""> Ensure backfill is properly placed and compacted around the lower half of the tank. Do not machine compact close to tank. Do not dump large volumes of fill close to tank.</span></em></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Check levelling of tank periodically.</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Be sure to compact backfill under the inlet and outlet pipe connections. Add support under pipes to resist potential pipe fracture from settling of backfill over time.</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">If tank is warm from sunlight, allow to cool before completing backfilling.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Use waterproof tape to seal lids if no riser.</span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">PIPE CONNECTIONS:</span></strong></p><span data-dcnode-id="959" instrument_node="">
</span><ul data-dcnode-id="944"><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Make connections to tank only when tank is unlikely to shift during remaining backfilling. Use ‘Fernco’ type rubber couplings.</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">All water tanks must be vented with minimum 2″ diameter pipe.</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Install 90 degree elbows at outlet bulkhead fittings to allow pipes to deflect with tank expansion (water tanks).</span></li><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="946"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">USE MIN. 3 FT. FLEXIBLE HOSE FROM PUMPS TO ALLOW MOVEMENT (IF INSTALLED)</span></strong></li><span data-dcnode-id="945" instrument_node="">
</span></ul><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">INSTALLATION CONSIDERATIONS:</span></strong></p><span data-dcnode-id="939" instrument_node="">
</span><ul data-dcnode-id="902"><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Tanks are for burial. Consult factory for above ground installs.</span></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="932"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Unless otherwise approved, tanks are rated for up to TWO FEET of earth cover – 300 lbs./sq.ft.</span></strong></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="926"><strong data-dcnode-id="927"><span data-dcnode-id="930" instrument_node="">SUPERTANKS are rated for up to FOUR FEET of earth cover – 480 lbs./sq.ft.</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
</span></strong></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="922"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">FLOUT DOSING TANKS are rated for up to FOUR FEET of earth cover – 480 lbs./sq.ft.</span></strong></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Do not locate under pathway of vehicles or heavy equipment.</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Keep away from large roots and rocks.</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="911"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Avoid placing tank in areas with high water table.</span></strong><span data-dcnode-id="912" instrument_node=""> Use reinforced tank in high water table location.</span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Avoid placing tank in wet clay soils.</span></strong></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Deflect surface run-off away from tank area. Fresh backfill is porous. Runoff can back up around tank.</span></li><span data-dcnode-id="903" instrument_node="">
</span></ul><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="898"><a class="button" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//premierplastics.com/wp-content/uploads/2017/11/Underground-tank-installation-Aug-2017.pdf"><span data-dcnode-id="900" instrument_node="">Download Underground Tank Installation PDF</span></a></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="893"><strong data-dcnode-id="894"><em data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Note – Installation Instructions may vary in different jurisdictions. Consult factory if outside British Columbia.</span></em></strong></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887"><strong data-dcnode-id="888"><span data-dcnode-id="891" instrument_node="">* </span><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">IMPORTANT: WARRANTY VOID IF INSTRUCTIONS NOT EXPRESSLY FOLLOWED.</span></em></strong></p><span data-dcnode-id="886" instrument_node="">
</span><hr data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><a data-dcnode-id="883" name="above"></a></p><span data-dcnode-id="881" instrument_node="">
</span><h2 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Above Ground Plastic Tank Installation</span></h2><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="875"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">WHAT BASE IS REQUIRED?</span></strong></p><span data-dcnode-id="874" instrument_node="">
</span><ul data-dcnode-id="860"><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">A firm, level base that is continuous under the entire tank is required.</span></li><span data-dcnode-id="870" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Base can be sand, fine gravel, clean dirt, cement or properly supported and closely placed planks.</span></li><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Pebbles larger than half inch should be removed.</span></li><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Ensure the tank has not settled and remains vertical after filling.</span></li><span data-dcnode-id="861" instrument_node="">
</span></ul><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">CAN A PLATFORM BE USED?</span></strong></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">Yes, however, the tank bottom must be continuously supported, e.g. with two layers of ¾ inch plywood nailed to a suitable support structure. In the interest of safety, an engineer should be consulted.</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">
NOTE – Weight of water is 8.33 pounds per US gallon or 10 pounds per Canadian gallon</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="847"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">HOW HEAVY ARE THE TANKS?</span></strong></p><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">For a rough guide, the weight of above ground tanks is obtained by taking the gallon size and dividing by five. E.g., a 1000 gallon tank will weight approximately 200lb.</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">For underground tanks, take the gallon size and divide by three.</span></li><span data-dcnode-id="839" instrument_node="">
</span></ul><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">ARE THEY EASY TO HANDLE?</span></strong></p><span data-dcnode-id="833" instrument_node="">
</span><ul data-dcnode-id="822"><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">All tanks can be moved by pick-up truck or trailer.</span></li><span data-dcnode-id="829" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Polyethylene is a very resilient material and damage is unlikely to occur during careful handling and transportation.</span></li><span data-dcnode-id="826" instrument_node="">
</span><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Extra care must be taken in extreme cold weather because the tank will be harder and more brittle.</span></li><span data-dcnode-id="823" instrument_node="">
</span></ul><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="818"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">CAN I PUT PRESSURE IN THE TANK?</span></strong></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">NO! Polyethylene tanks must be open to atmosphere or vented at all times. They can be used to provide a head of water by mounting at a higher elevation but cannot be subjected to any external pressure source. Use a float valve on the inlet if necessary.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">WHAT ABOUT ALGAE GROWTH?</span></strong></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Algae growth is promoted by light penetration into the tank. Algae growth can be reduced by locating the tank away from sunlight and choosing a darker tank colour and by disinfection.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="804"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">CAN THE TANKS BE BURIED?</span></strong></p><span data-dcnode-id="803" instrument_node="">
</span><ul data-dcnode-id="795"><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Tanks are manufactured specifically for either above ground or below ground use.</span></li><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Above ground tanks have smooth sides and are for ground level mounting only. They can, however, be dropped into the ground to a depth of 20% of the tank height to reduce the above ground profile.</span></li><span data-dcnode-id="796" instrument_node="">
</span></ul><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">WHAT FITTINGS COME WITH THE TANK?</span></strong></p><span data-dcnode-id="790" instrument_node="">
</span><ul data-dcnode-id="769"><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="788" instrument_node="">Most above ground water tanks are fitted with a 1 inch or 2 inch female threaded pipe connection at the bottom and a 16 inch access cap at the top. Access caps have breather valves that let air in</span><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
and out as the water level changes. Your local plumber or plumbing store can help you with</span><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">
making the proper connections.</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Check that bulkhead drain/outlet fittings are tight onto the tank. The lock nut on the fittings has a reverse thread to prevent it coming loose when tightening external connections.</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">To prevent risk of stripping, hand tighten threads several turns to make sure threads are lined up. Check for leaks when the tank is filled and tighten just enough to stop any leaks. Excessive tightening may strip the pipe threads or crack the bulkhead fittings which will then have to be replaced.</span></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Additional connections for inlet pipes are added separately to customer requirements.</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">For approximate pipe sizing refer to Pipe Sizing Chart.</span></li><span data-dcnode-id="770" instrument_node="">
</span></ul><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">DOES SUNLIGHT AFFECT THE TANKS?</span></strong></p><span data-dcnode-id="764" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Over time, exposure to sunlight causes the plastic to harden which makes it more prone to cracking if the tank receives a heavy blow.</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">All Premier Plastics tanks are impregnated with an ultraviolet inhibitor that slows this hardening effect.</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Darker colour or black tanks will generally last longer.</span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="749"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">WHAT ABOUT COLLECTING RAIN WATER?</span></strong></p><span data-dcnode-id="748" instrument_node="">
</span><ul data-dcnode-id="731"><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Collecting rainwater is an excellent way to bridge periods of short water supply.</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">A filter basket should be used to screen out leaves, twigs, and debris coming from the eaves troughs.</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Water for drinking, cooking, and dish-washing must of course be boiled or disinfected.</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Clean rainwater can be used for large volume uses such as toilet flushes, laundry, showers, washing vehicles, and watering the garden.</span></li><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Water levels can be checked using a ‘Pneumatic Dipstick’ level gauge from Premier Plastics.</span></li><span data-dcnode-id="732" instrument_node="">
</span></ul><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">HOW LONG IS THE WARRANTY?</span></strong></p><span data-dcnode-id="726" instrument_node="">
</span><ul data-dcnode-id="715"><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">All above ground tanks carry an eight year warranty, however, you can expect many more years of service.</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">All underground water tanks and septic tanks carry a ten year warranty. Polyethylene will virtually last forever underground.</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Complete the warranty form and return to Premier Plastics Inc.</span></li><span data-dcnode-id="716" instrument_node="">
</span></ul><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="711"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">ARE THE TANKS SAFE FOR DRINKING WATER?</span></strong></p><span data-dcnode-id="710" instrument_node="">
</span><ul data-dcnode-id="699"><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">YES – tanks are manufactured from food grade polyethylene and meet specifications contained in FDA regulations 21 CFR 177.1520(c)3.1, NSF Standard 61 and CSA 6861-05.</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Maintaining the quality of water in the tank is of course your responsibility. Information on water quality can be obtained from water supply companies, well drillers, or public health departments. Factory tanks are clean but not disinfected.</span></li><span data-dcnode-id="703" instrument_node="">
</span><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Small particles of polyethylene may be found in the bottom of a new tank. These occur when cutting holes for fittings, and will float to the surface when filled or can be vacuumed out.</span></li><span data-dcnode-id="700" instrument_node="">
</span></ul><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">WILL I NOTICE A DIFFERENCE IN TASTE?</span></strong></p><span data-dcnode-id="694" instrument_node="">
</span><ul data-dcnode-id="686"><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">To keep the water fresh, your piping should be connected so that incoming water is always flushing through the tank.</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Water that has been sitting in any type of vented container for a period of time will develop a ‘flat’ taste. This is because air in the water has been lost. This can be partly overcome by half filling a closed vessel and shaking it vigorously to put air back in.</span></li><span data-dcnode-id="687" instrument_node="">
</span></ul><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="682"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">HOW WILL A STORAGE TANK HELP A SLOW PRODUCING WELL?</span></strong></p><span data-dcnode-id="681" instrument_node="">
</span><ul data-dcnode-id="664"><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Many people are experiencing reduced flow rate from their wells. Well pumps are usually sized water “on demand”, i.e. If your bathtub fills at 5 gallons a minute then the well must produce water at 5 gallons a minute for the time the bath is running.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">A storage tank allows short periods of high demand to come from the tank and not directly from the well.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">A family using 400 gallons per day would need their well to produce no more than 400 gallons over 24 hours if a storage tank is used. On average, a well needs only to produce half a gallon a minute every minute for 24 hours to supply the family.</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">A common practice is to dump a truckload of water down a slow producing well. If water deliveries were put into a storage tank no loss from seepage would occur, resulting in cost savings.</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Sizing and system layout can be obtained from your local well driller.</span></li><span data-dcnode-id="665" instrument_node="">
</span></ul><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="660"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">WHAT HAPPENS IF MY TANK FREEZES?</span></strong></p><span data-dcnode-id="659" instrument_node="">
</span><ul data-dcnode-id="645"><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">It is unlikely that a partially full tank will split. The walls will swell under the pressure of ice. A tank will start to freeze only during extended periods of cold weather.</span></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Piping should be protected or drained during freezing weather because the smaller volume of water in the piping will freeze more readily and may split the pipe. Refer to a contractor familiar with these conditions.</span></li><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">If freezing is a concern, the tank can be insulated with a waterproof insulation or put in an insulated shed.</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">An underground tank offers the best protection from freezing. It will also keep the water cool in the summer.</span></li><span data-dcnode-id="646" instrument_node="">
</span></ul><span data-dcnode-id="644" instrument_node="">
</span></article><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
