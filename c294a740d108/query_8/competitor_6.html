</span><source data-dcnode-id="1659" data-sizes="(max-width: 1628px) 100vw, 1628px" data-srcset="https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram.jpg.webp 1628w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-300x175.jpg.webp 300w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-1024x596.jpg.webp 1024w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-768x447.jpg.webp 768w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-1536x893.jpg.webp 1536w" sizes="(max-width: 1628px) 100vw, 1628px" srcset="https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram.jpg.webp 1628w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-300x175.jpg.webp 300w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-1024x596.jpg.webp 1024w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-768x447.jpg.webp 768w, https://watermasterz.com/wp-content/uploads/2021/07/Water-Softener-Installation-Diagram-1536x893.jpg.webp 1536w" type="image/webp"><span data-dcnode-id="1658" instrument_node="">

</span></picture></p><p data-dcnode-id="1652" style="text-align: center;"><span data-dcnode-id="1653" instrument_node="">Courtesy of BOS</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">If you are replacing an old system, it’s generally advisable to install the new one in its place, so you don’t have to make any additional changes. However, if setting up a new water softener, you must keep these pointers in mind.</span></p><ul data-dcnode-id="1605"><span data-dcnode-id="1649" instrument_node="">
</span><li data-dcnode-id="1645"><span data-dcnode-id="1648" instrument_node="">As a general rule of thumb, water softeners should be installed at the earliest point in the plumbing around your house to protect all pipelines from the perils of hard water.</span><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">
Hard water can decrease the life of your plumbing by a long shot due to mineral deposition. On the other hand, most plants thrive on hard water. Therefore, make sure you find a suitable place to hook your system up.</span></li><span data-dcnode-id="1644" instrument_node="">
</span><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">In the same way, soft water may not be ideal for those on low sodium diets. It also partially eliminates calcium and magnesium from homeowner’s diets. So, while you are at it, it’s possible to isolate a line of untreated water for your kitchen faucet.</span></li><span data-dcnode-id="1641" instrument_node="">
</span><li data-dcnode-id="1633"><span data-dcnode-id="1640" instrument_node="">There should be enough space to accommodate the softener, and it should be </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watermasterz.com/water-softener-maintenance/"><span data-dcnode-id="1639" instrument_node="">easily accessible for maintenance</span></a><span data-dcnode-id="1637" instrument_node=""> and </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watermasterz.com/water-softener-problems-troubleshooting-and-repair/"><span data-dcnode-id="1636" instrument_node="">repairs</span></a><span data-dcnode-id="1634" instrument_node="">. If you install a big unit in a tiny crawl space, it will be a hassle to fill up the brine tank and check for any damages.</span></li><span data-dcnode-id="1632" instrument_node="">
</span><li data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The ground should be level and dry.</span></li><span data-dcnode-id="1629" instrument_node="">
</span><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">If you are using city water, the water softener should be installed next to the water meter. Similarly, for well water, the best place is beside the pressure tank.</span></li><span data-dcnode-id="1626" instrument_node="">
</span><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Not to mention, the unit should be placed upstream of the water heater to increase its efficiency and reduce scale buildup. Remember to have a 10 feet distance between the two appliances to avoid&nbsp;damaging the softener from hot water in case of malfunction and during regeneration cycles.</span></li><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Water softeners should be installed indoors as far as possible since they are prone to damage due to extreme temperatures.</span></li><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Water softeners require a drain to get rid of wastewater. Therefore, it’s essential there is less than 20 feet of distance between the unit and the drain area. While a floor drain is a preferred choice, you could use a utility sink, standpipe or a laundry tub as your drain.</span></li><span data-dcnode-id="1617" instrument_node="">
</span><li data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Since water softeners require electricity, you need a power source near your unit.</span></li><span data-dcnode-id="1614" instrument_node="">
</span><li data-dcnode-id="1609"><span data-dcnode-id="1613" instrument_node="">If you have a whole house filtration system installed, </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watermasterz.com/water-filter-before-after-softener/"><span data-dcnode-id="1612" instrument_node="">a water softener should be set up before it</span></a><span data-dcnode-id="1610" instrument_node="">.</span></li><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The maximum water pressure at the point of installation should not be more than 120-125 psi.</span></li></ul><h3 data-dcnode-id="1602"><span data-dcnode-id="1603" id="Outdoor_Installation"><span data-dcnode-id="1604" instrument_node="">Outdoor Installation</span></span></h3><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Water softeners perform best in temperatures ranging from 35 to 100 degrees. They won’t work efficiently in freezing temperatures, nor should they be placed under direct sunlight.</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">But not all houses have garages or basements. Nevertheless, you can set up the softener outside if you don’t have any other options.&nbsp;Place it under a shed or covered space. Some water professionals dig a hole in the ground to install the unit to minimize exposure to extreme climates.</span></p><h3 data-dcnode-id="1595"><span data-dcnode-id="1596" id="Soft_Water_Loop"><span data-dcnode-id="1597" instrument_node="">Soft Water Loop</span></span></h3><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Fortunately, some modern homes already have a soft water loop in the plumbing system. It’s a pipe section coming out of the wall in the form of “U” and reenters the wall a few feet apart.</span></p><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">If you spot one in your house next to a drain and electric socket, consider yourself lucky. The work has been cut out for you.</span></p><p data-dcnode-id="1587"><span data-dcnode-id="1590" instrument_node="">A soft water loop helps you connect your water softening system to the internal plumbing of your house. Its main purpose is to separate the internal and external plumbing so that soft water doesn’t flow into outdoor taps and hoses.</span><sup data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">[1]</span></sup></p><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">In short, just cut the loop and install your softener at the spot.</span></p><h2 data-dcnode-id="1582"><span data-dcnode-id="1583" id="DIY_Replacing_of_an_Old_Water_Softener"><span data-dcnode-id="1584" instrument_node="">DIY Replacing of an Old Water Softener</span></span></h2><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Installing a new softener in place of the old one is super simple. Follow the steps to ensure safe disposal and quick setup.</span></p><ol data-dcnode-id="1564"><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Unplug the old water softener from the electric socket and use the bypass valve to shut it off.</span></li><span data-dcnode-id="1576" instrument_node="">
</span><li data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Next, remove all water from the tank by turning the system on its side.</span></li><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Remove additional salt left in the brine tank.</span></li><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Properly dispose of to a recycling unit.</span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Follow the steps outlined below to install a new water softener.</span></li></ol><h2 data-dcnode-id="1561"><span data-dcnode-id="1562" id="What_Do_You_Need_for_a_DIY_Water_Softener_Installation"><span data-dcnode-id="1563" instrument_node="">What Do You Need for a DIY Water Softener Installation</span></span></h2><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Once you have figured out a place, the next step is to gather essential tools for the DIY install. Some units come with a DIY installation kit to assist you. Nevertheless, you can find all supplies at the local hardware store nearby.</span></p><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Here is a checklist for general supplies you will need:</span></p><ul data-dcnode-id="1532"><span data-dcnode-id="1556" instrument_node="">
</span><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Copper piping or flexible pipes</span></li><span data-dcnode-id="1553" instrument_node="">
</span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Drainpipe tubing</span></li><span data-dcnode-id="1550" instrument_node="">
</span><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Hacksaw</span></li><span data-dcnode-id="1547" instrument_node="">
</span><li data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Plumber’s tape</span></li><span data-dcnode-id="1544" instrument_node="">
</span><li data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Measuring tape</span></li><span data-dcnode-id="1541" instrument_node="">
</span><li data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Soldering kit</span></li><span data-dcnode-id="1538" instrument_node="">
</span><li data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Adjustable wrenches</span></li><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Various fittings and connectors</span></li></ul><h2 data-dcnode-id="1529"><span data-dcnode-id="1530" id="How_to_Install_a_Water_Softener_8211_DIY_Guide"><span data-dcnode-id="1531" instrument_node="">How to Install a Water Softener – DIY Guide</span></span></h2><p data-dcnode-id="1522"><picture class="alignnone no-margin size-full wp-image-3275" data-dcnode-id="1523" loading="lazy"><span data-dcnode-id="1528" instrument_node="">
</span><source data-dcnode-id="1527" data-sizes="(max-width: 1628px) 100vw, 1628px" data-srcset="https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail.jpg.webp 1628w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-300x175.jpg.webp 300w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1024x596.jpg.webp 1024w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-768x447.jpg.webp 768w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1536x893.jpg.webp 1536w" sizes="(max-width: 1628px) 100vw, 1628px" srcset="https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail.jpg.webp 1628w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-300x175.jpg.webp 300w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1024x596.jpg.webp 1024w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-768x447.jpg.webp 768w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1536x893.jpg.webp 1536w" type="image/webp"><span data-dcnode-id="1526" instrument_node="">
</span><img alt="How to Install a Water Softener Thumbnail" class="lazy loaded" data-dcnode-id="1525" data-sizes="(max-width: 1628px) 100vw, 1628px" data-src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201628%20947'%3E%3C/svg%3E" data-srcset="https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail.jpg 1628w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-300x175.jpg 300w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1024x596.jpg 1024w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-768x447.jpg 768w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1536x893.jpg 1536w" data-was-processed="true" height="947" loading="lazy" sizes="(max-width: 1628px) 100vw, 1628px" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201628%20947'%3E%3C/svg%3E" srcset="https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail.jpg 1628w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-300x175.jpg 300w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1024x596.jpg 1024w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-768x447.jpg 768w, https://watermasterz.com/wp-content/uploads/2021/07/How-to-Install-a-Water-Softener-Thumbnail-1536x893.jpg 1536w" width="1628"><span data-dcnode-id="1524" instrument_node="">
</span></picture></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Before you are ready to get your hands dirty (or wet!), make sure you read the instruction manual thoroughly. While the basic steps are similar, there are small details you don’t want to miss.</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Not to forget, some filtration and softener system manufacturers consider your warranty void unless you appoint a licensed plumber for installation. Check with your manufacturer for details on this matter.</span></p><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Let’s get started.</span></p><h3 data-dcnode-id="1513"><span data-dcnode-id="1514" id="1_Setting_Up"><span data-dcnode-id="1515" instrument_node="">1. Setting Up</span></span></h3><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Locate your main water supply and turn on the shut-off valve unless you want to deal with potential water damage.</span></p><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Then, turn off your water heater by shutting off the breaker to prevent damage.</span></p><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Next, open a few taps around the house to drain the existing water in your plumbing.</span></p><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Place your new water softener in the location as desired to begin setting it up. It will be best to ask for a helping hand since the systems can be pretty heavy to carry around. You also don’t want to risk potential damage in case of a fall.</span></p><h3 data-dcnode-id="1502"><span data-dcnode-id="1503" id="2_Measure_Required_Piping"><span data-dcnode-id="1504" instrument_node="">2. Measure Required Piping</span></span></h3><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Cut into the main water supply pipe where you wish to install the unit. Using tape, measure the length between the cold water pipe and the bypass valve on your water softener.</span></p><h3 data-dcnode-id="1497"><span data-dcnode-id="1498" id="3_Bypass_Valve"><span data-dcnode-id="1499" instrument_node="">3. Bypass Valve</span></span></h3><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Now, it’s time to install the bypass valve. Push the bypass valve into the softener’s head valve and adjust the screws to secure it.</span></p><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">If your unit does not include a bypass valve, water professionals strongly recommend installing one. This is because a bypass valve or a shut-off valve can help you shut the water supply to the softener without disrupting the whole house.</span></p><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Skipping a bypass valve is a common mistake that makes maintenance very complicated.</span></p><h3 data-dcnode-id="1488"><span data-dcnode-id="1489" id="4_Pipe_Connections"><span data-dcnode-id="1490" instrument_node="">4. Pipe Connections</span></span></h3><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">It’s time to establish the inlet and outlet water connections.</span></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">This is the part where most people mess up, so be very careful. First, identify the two ports: inlet and outlet. Mostly, these ports are marked with arrows.</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Decide whether you want to use flexible tubing or you are comfortable soldering copper pipes. Flexible tubing requires additional fittings but is easier to install and non-permanent. On the other hand, soldering requires expertise and is more or less permanent.</span></p><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Connect the inlet port to the water supply pipe and the outlet port to the water lines. If you are soldering, make sure you buff and seal all joints carefully.</span></p><h3 data-dcnode-id="1477"><span data-dcnode-id="1478" id="5_The_Drain"><span data-dcnode-id="1479" instrument_node="">5. The Drain</span></span></h3><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Let’s move on to configure the drain connection. Locate the drain valve on your softener system and connect it to the drain line. Use a clamp to make sure it is tight and does not move when you tug on it.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">The other end of the drain line should lead over your floor drain or utility sink. Always leave an air gap of 1½ inch between pipe and drain to prevent backwashing.</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Moreover, make sure the drain is big enough to handle large amounts of water. Or else, the area will be flooded.</span></p><h3 data-dcnode-id="1468"><span data-dcnode-id="1469" id="6_Preparing_the_Brine_Tank"><span data-dcnode-id="1470" instrument_node="">6. Preparing the Brine Tank</span></span></h3><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Next, assemble the brine tank overflow grommet if provided with the unit.</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Move on to the brine tank overflow connection. Again, this connection is not available in all models. Installing a brine tank connection is similar to establishing the drain pipe connection.</span></p><h3 data-dcnode-id="1461"><span data-dcnode-id="1462" id="7_Brine_Line"><span data-dcnode-id="1463" instrument_node="">7. Brine Line</span></span></h3><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">The brine line connects the brine tank to the resin tank.</span></p><h3 data-dcnode-id="1456"><span data-dcnode-id="1457" id="8_Fill_the_Brine_Tank"><span data-dcnode-id="1458" instrument_node="">8. Fill the Brine Tank</span></span></h3><p data-dcnode-id="1449"><picture class="aligncenter no-margin size-full wp-image-1720" data-dcnode-id="1450" loading="lazy"><span data-dcnode-id="1455" instrument_node="">
</span><source data-dcnode-id="1454" data-sizes="(max-width: 1628px) 100vw, 1628px" data-srcset="https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt.jpg.webp 1628w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-300x175.jpg.webp 300w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-1024x596.jpg.webp 1024w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-768x447.jpg.webp 768w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-1536x893.jpg.webp 1536w" type="image/webp"><span data-dcnode-id="1453" instrument_node="">
</span><img alt="water softener brine tank with salt" class="lazy" data-dcnode-id="1452" data-sizes="(max-width: 1628px) 100vw, 1628px" data-src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201628%20947'%3E%3C/svg%3E" data-srcset="https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt.jpg 1628w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-300x175.jpg 300w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-1024x596.jpg 1024w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-768x447.jpg 768w, https://watermasterz.com/wp-content/uploads/2020/12/water-softener-brine-tank-with-salt-1536x893.jpg 1536w" height="947" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201628%20947'%3E%3C/svg%3E" width="1628"><span data-dcnode-id="1451" instrument_node="">
</span></picture></p><p data-dcnode-id="1445"><span data-dcnode-id="1448" instrument_node="">Once all brine tank connections are established, you must fill in salt. Use sodium chloride or potassium chloride and, ideally, avoid salt pellets. Don’t fill more than ⅔ of the tank.</span><sup data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">[2]</span></sup></p><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Then, also add water.</span></p><h3 data-dcnode-id="1440"><span data-dcnode-id="1441" id="9_Turn_on_Main_Water_Supply"><span data-dcnode-id="1442" instrument_node="">9. Turn on Main Water Supply</span></span></h3><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Remember to keep the bypass valve off while you turn on the feed water.</span></p><h3 data-dcnode-id="1435"><span data-dcnode-id="1436" id="10_Open_By-Pass_Valve_and_Plug_the_Unit"><span data-dcnode-id="1437" instrument_node="">10. Open By-Pass Valve and Plug the Unit</span></span></h3><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Don’t open the bypass valve completely. Slowly open to let water pass into the tank. At this point, you will hear some gurgling noises as air is cleared out of the system. Wait for the sounds to stop and then twist the bypass valve to service mode completely.</span></p><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Once the water starts flowing freely, check for leaks in all fittings. Then, proceed to connect to the electrical socket.</span></p><h3 data-dcnode-id="1428"><span data-dcnode-id="1429" id="11_Start_with_Regeneration"><span data-dcnode-id="1430" instrument_node="">11. Start with Regeneration</span></span></h3><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Once the system is all hooked up, program the unit according to your water quality. Then, start a regeneration cycle to get soft water all around your house.</span></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">We strongly recommend you go through a few water softener installation videos to have a fair idea of how to install your system. Here are a few:</span></p><div class="ast-oembed-container" data-dcnode-id="905"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="906" frameborder="0" height="703" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/qy391HwCxbI%3Ffeature%3Doembed&amp;raw" title="How to install a Water Softener - US Water Systems" width="1250"><html data-cast-api-enabled="true" data-dcnode-id="908" dir="ltr" lang="en"><head data-dcnode-id="1398"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1418" name="viewport"/><link data-dcnode-id="1413" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="avYTVEeEt1/u0mQWVfOQMg" rel="stylesheet"/><title data-dcnode-id="1400">YouTube</title><link data-dcnode-id="1399" href="https://www.youtube.com/watch?v=qy391HwCxbI" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="909" dir="ltr"><div data-dcnode-id="916" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="917" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="1396" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="1397" playsinline="" style="width: 628px; height: 353px; left: 0px; top: -353px;" tabindex="-1" webkit-playsinline=""></video></div><div c tton></div></div></div></div></div><noscript data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=AKdENN_oSCo" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><h2 data-dcnode-id="383"><span data-dcnode-id="384" id="How_Long_Does_it_Take_to_Hook_Up_a_Water_Softener_and_is_DIY_Installation_Possible"><span data-dcnode-id="385" instrument_node="">How Long Does it Take to Hook Up a Water Softener and is DIY Installation Possible?</span></span></h2><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">You may be surprised to know that installing a water softener yourself is certainly possible. However, there are a few things that affect the process. For example, if you are replacing an old system, installation won’t take more than 2 hours.</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Then it depends on whether you have a water loop installed in your house. If it is, DIY installation is not that complicated. On the other hand, old houses with poor plumbing and no soft water loops can be pretty challenging to work with.</span></p><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">In the same way, cutting into water lines and establishing connections require expertise and the right tools. This is a job that can take up an entire day. So if you never picked up a wrench in your life, we suggest this DIY is not for you.</span></p><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Finally, it depends on the model of the water softener you plan to install. Some units are designed for easy installation, while others require professional help. Nevertheless, it’s best to take advice from the customer support staff to help you outline the basic steps for your model.</span></p><h2 data-dcnode-id="372"><span data-dcnode-id="373" id="Professional_Installation_Who_Installs_Water_Softeners"><span data-dcnode-id="374" instrument_node="">Professional Installation: Who Installs Water Softeners?</span></span></h2><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Installing a water softener may not be everyone’s cup of tea. In that case, hiring a licensed professional will help you stay above water, literally!</span></p><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">If you decide to hire a professional, consider the following options depending on your budget and locality.</span></p><h3 data-dcnode-id="365"><span data-dcnode-id="366" id="Local_Plumbers"><span data-dcnode-id="367" instrument_node="">Local Plumbers</span></span></h3><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Local plumbers are up-to-date with the plumbing in your area and can smoothly install any water treatment system. What’s best is that you can look around and get estimates from a few to get the best rate.</span></p><h3 data-dcnode-id="360"><span data-dcnode-id="361" id="Retail_Stores"><span data-dcnode-id="362" instrument_node="">Retail Stores</span></span></h3><p data-dcnode-id="355"><span data-dcnode-id="359" instrument_node="">Large retail stores</span><sup data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">[3]</span></sup><span data-dcnode-id="356" instrument_node=""> that sell water equipment offer to install your unit at an additional cost. They have a select range of contractors to do the job who are generally experienced in this area.</span></p><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Not only is this option convenient, but it is also generally cheaper and time-saving since all burden lies with the retailer.</span></p><h3 data-dcnode-id="350"><span data-dcnode-id="351" id="Water_Treatment_Specialists"><span data-dcnode-id="352" instrument_node="">Water Treatment Specialists</span></span></h3><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Well, they are specialists and know their job inside out. Reach out to a water treatment specialist to enjoy the best experience. They will help you determine your water quality, the best treatment option and the installation method.</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">They are also well versed in taking care of malfunctions and possible damages. Of course, they are the most expensive option but the most reliable.</span></p><h3 data-dcnode-id="343"><span data-dcnode-id="344" id="Installation_Cost"><span data-dcnode-id="345" instrument_node="">Installation Cost</span></span></h3><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Installing a water softener yourself will save you a lot of money. Most licensed plumbers can charge up to $1,000-1,500 for a complete setup.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">In case you have a water loop pre-plumbed in your house, installation charges go down by a long shot. It will cost you no more than $500 to hook up with an existing water loop</span></p><div class="magline" data-dcnode-id="338"></div><h2 data-dcnode-id="335"><span data-dcnode-id="336" id="Conclusion"><span data-dcnode-id="337" instrument_node="">Conclusion</span></span></h2><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">In conclusion, you first need to decide where to install your water softener. The best location is usually the basement or a garage – somewhere at the main water supply line.</span></p><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Replacing and old water softener is easier than starting from scratch.</span></p><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">So, unless you are familiar with plumbing around the house and are confident to install the unit correctly, it’s best to leave the job to a professional. However, if you decide to DIY, make sure you have all the tools and supplies ready and go through the user manual.</span></p><p class="subheading" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Further Reading</span></p><ul class="ulwide" data-dcnode-id="302"><span data-dcnode-id="326" instrument_node="">
