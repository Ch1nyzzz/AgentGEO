s/2020/04/SSS.png&amp;raw"><h2 data-dcnode-id="126"><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.com/product/standpipe-pac-boston"><span data-dcnode-id="128" instrument_node="">STANDPIPE-PAC™ (Boston)</span></a></h2><div data-dcnode-id="117"><p data-dcnode-id="118"><span data-dcnode-id="125" instrument_node="">The UNITED Fire Systems </span><strong data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">STANDPIPE-PAC™</span></strong><span data-dcnode-id="122" instrument_node=""> is a fully assembled standpipe supervisory system, including compressor, switches, alarm, and control unit providing one complete zone of standpipe supervision. The </span><strong data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">STANDPIPE-PAC™</span></strong><span data-dcnode-id="119" instrument_node=""> is in compliance with New York City’s Local Law 64 and the Boston Fire Department’s TCM3-51725. All components are mounted on a sturdy wooden backboard, suitable for hanging at a construction or demolition site.</span></p></div><p class="cta" data-dcnode-id="113"><a class="view-btn fire-btn btn-1 btn--cw" data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.com/product/standpipe-pac-boston"><span class="btn--inner" data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Product Information</span></span></a></p></div></div></div></div></div></div></div><section class="our-products" data-dcnode-id="89"><div class="container" data-dcnode-id="90"><div class="row" data-dcnode-id="91"><div class="col-md-12 col-lg-10 col-lg-offset-1" data-dcnode-id="92"><div class="product-wrapper" data-dcnode-id="93"><div class="product-heading" data-dcnode-id="103"><div class="mid-title" data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Did You Know?</span></div></div><ul class="bxslider product-slider1 testimonial-mian" data-dcnode-id="94"><li data-dcnode-id="95"><div class="testimonial-slide" data-dcnode-id="96"><p data-dcnode-id="97"><span data-dcnode-id="102" instrument_node="">Your wet-pipe sprinkler system may not be as filled with water as you expect it to be. A bubble of air may migrate to the highest point in the system, creating a very vulnerable location for internal pipe corrosion. That’s why NFPA 13 now requires that all new wet sprinkler systems be fitted with an air vent at the system’s highest point. This is a good investment for both new and existing systems. The UNITED Fire Systems Model AR-1 automatic air vent device is Factory Mutual (FM) Approved for just this function. See </span><a data-dcnode-id="99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.com/product/air-release-wet-sprinklers/"><u data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">here</span></u></a><span data-dcnode-id="98" instrument_node=""> for more information, and take action to prevent damaging corrosion.</span></p></div></li></ul></div></div></div></div></section><footer class="footer-wrapper" data-dcnode-id="24"><div class="top-footer" data-dcnode-id="32"><div class="container" data-dcnode-id="33"><div class="row" data-dcnode-id="34"><div class="footer-sec f-logo text-center clearfix" data-dcnode-id="85"><span data-dcnode-id="88" instrument_node=""> </span><a data-dcnode-id="86" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.com/"><img alt="United Fire Systems Footer Logo" data-dcnode-id="87" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.com/wp-content/uploads/2017/05/footer-logo.png&amp;raw"></a></div><div class="footer-sec f-cols clearfix" data-dcnode-id="38"><div class="col-sm-5 col-md-6 col-lg-offset-2 col-lg-3 quick-links" data-dcnode-id="67"><div class="f-col-1" data-dcnode-id="68"><span data-dcnode-id="84" instrument_node=""> </span>
