</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">§27-932 When Required</span></a><span data-dcnode-id="947" instrument_node="">
</span></h2><span data-dcnode-id="945" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span></div><span data-dcnode-id="940" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="917"><span data-dcnode-id="939" instrument_node="">(a) Wet standpipe systems shall be installed:</span><br data-dcnode-id="938"><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">(1) In all buildings or portions thereof exceeding six stories or seventy-five feet in height, except that open parking structures shall not require installation of a wet standpipe system unless they exceed ten parking levels or seventy-five feet in height.</span><br data-dcnode-id="935"><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">(2) In all portions of buildings two or more stories in height that have a floor area of ten thousand square feet or more on any floor.</span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">(b) Where standpipes are required by the height and area limitations of subdivision (a) of this section, a non-automatic or automatic dry standpipe system may be installed in lieu of the wet standpipe in all buildings classified in occupancy group G not over six stories or seventy-five feet in height. A dry standpipe system shall be installed in all open parking structures which exceed three parking levels and contain not more than ten parking levels.</span><br data-dcnode-id="929"><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">(c) A standpipe system shall be installed in all buildings exceeding three stories in height that have an area exceeding seven thousand five hundred square feet on any floor and where a standpipe system is not otherwise required by the provisions of this subchapter. A nonautomatic or automatic dry system may be used in lieu of the wet standpipe.</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">(d) The following buildings shall be exempt from the provisions of subdivisions (a), (b) and (c) of this section:</span><br data-dcnode-id="923"><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">(1) Buildings classified in occupancy groups F, G, H, and J that do not exceed two stories or thirty feet in height and an area of twenty thousand square feet on any floor and are provided with hand or portable fire extinguishers as required by the fire department.</span><br data-dcnode-id="920"><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">(2) Buildings classified in occupancy groups E, F, G, H, and J that require a wet standpipe as provided in paragraph two of subdivision (a) and subdivision (c) of this section but not exceeding six stories or seventy-five feet in height and that are equipped throughout with an automatic wet or dry sprinkler system connected to a central supervisory station, and such system complies with the provision of this subchapter.</span></div><span data-dcnode-id="916" instrument_node="">
</span><div class="comments_container" data-dcnode-id="915"></div><span data-dcnode-id="914" instrument_node="">

</span><div class="section_title_bar" data-dcnode-id="898"><span data-dcnode-id="908" instrument_node="">
</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">§27-933 Yard Hydrant Systems Required</span></a><span data-dcnode-id="904" instrument_node="">
</span></h2><span data-dcnode-id="902" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="862"><span data-dcnode-id="896" instrument_node="">Outdoor amusement and exhibition places, oil storage plants, lumber yards, trailer camps, industrial parks, and similar occupancies shall have yard hydrants installed so that the entire area may be reached by two hundred fifty feet of hose from a yard hydrant or a street hydrant. Single hydrant connection shall be at least in six inch I.P.S. Such hydrants shall be directly connected with city water main or private water main, or supplied from gravity tanks or pressure tanks, as provided in this subchapter.</span><br data-dcnode-id="895"><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">(a) Where the area of such enclosure is more than forty thousand square feet and where the available city water service is less than that specified in paragraph one of subdivision (b) of </span><a class="autolink" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/new_york_city/nyc-building-code-1968-v1/chapter/17/fire-alarm-detection-and-extinguishing-equipment%23%25C2%25A727-945"><span data-dcnode-id="892" instrument_node="">section 27-945</span></a><span data-dcnode-id="890" instrument_node=""> of this article, the yard hydrant system shall be supplied as follows:</span><br data-dcnode-id="889"><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">(1) A gravity tank of at least fifty thousand gallon capacity shall be provided and elevated so that the bottom of the tank is at least seventy-five feet above the highest grade elevation and at least twenty-five feet above the highest building in the area supplied by this tank.</span><br data-dcnode-id="886"><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">(2) In lieu of paragraph one of this subdivision, there shall be provided a manual fire pump with a capacity of at least one thousand gpm, and a suction tank of at least fifty thousand gallon capacity. The suction tank shall be supplied through a six inch connection to the city water main controlled by an automatic ball float valve in the suction tank. A bypass shall be provided so that the pump may be fed directly from the city water main.</span><br data-dcnode-id="883"><br data-dcnode-id="882"><span data-dcnode-id="881" instrument_node="">(3) The pump shall be located in a pump house at the street main side of the area or enclosure.</span><br data-dcnode-id="880"><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">(4) Suction from a river or well may be permitted by the commissioner if the required quantity of reasonably clean fresh water may be obtained thereby, subject to the approvals of such other authorities as may have jurisdiction over the primary source of supply.</span><br data-dcnode-id="877"><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">(b) The maximum distance between hydrants shall be two hundred fifty feet. At each yard hydrant, two hundred fifty feet of rubber lined hose, with a smooth bore one and one-eighth inch approved play-pipe, shall be placed in a hose house painted red, and the words "Fire Hose" in six inch white letters shall be painted on the door.</span><br data-dcnode-id="874"><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">(c) The approval of the fire department shall be obtained for location of any monitor nozzles that may be required in addition to yard hydrants. Not more than one monitor nozzle with remote control will be required for each forty thousand square feet of area or fraction thereof unless, in the fire department's opinion, an unusual hazard exists.</span><br data-dcnode-id="871"><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">(d) Standpipes and sprinkler systems may be connected to a yard hydrant system in accordance with the requirements of this subchapter.</span><br data-dcnode-id="868"><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">(e) Yard hydrant systems connected to city water mains shall be provided with post indicator valves located in an accessible position. Post indicator valves shall be locked open and be painted red.</span><br data-dcnode-id="865"><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">(f) Fire extinguishing equipment, in addition to that prescribed by this section, shall be provided in accordance with requirements of chapter four of this title for oil storage plants, oil refineries, and other plants deemed by the fire commissioner to present unusual fire hazards, and also in rooms or spaces housing electrical equipment when such fire extinguishing equipment is deemed necessary.</span></div><span data-dcnode-id="861" instrument_node="">
</span><div class="comments_container" data-dcnode-id="860"></div><span data-dcnode-id="859" instrument_node="">

</span><div class="section_container" data-dcnode-id="831" data-ref="§27-934" data-section_depth="1"><span data-dcnode-id="854" instrument_node="">
</span><div class="section_title_bar" data-dcnode-id="843"><span data-dcnode-id="853" instrument_node="">
</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">§27-934 Standpipe Systems in Structures Being Erected or Demolished</span></a><span data-dcnode-id="849" instrument_node="">
</span></h2><span data-dcnode-id="847" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">
</span></div><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">(a) During construction or demolition of any structure for which a standpipe system is required, provision shall be made for the use of such standpipe by the fire department in accordance with the provisions of section 27-1014 of article one of subchapter nineteen and this subchapter.</span><br data-dcnode-id="840"><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">(b) Temporary risers shall be at least four inches in diameter for structures less than four hundred fifty feet high and at least six inches in diameter for structures four hundred fifty feet high or more. There shall be as many risers as will be, or were, required for the permanent system. Each such riser shall be connected to a cross connection that is supplied through siamese hose connections at the street level, and shall be equipped on each floor with a two and one-half inch hose outlet valve. The installations shall be made so that each riser, cross-connection, and branch line can be plugged or capped when work is not being done on the system. The location of the siamese hose connection shall be placarded, kept free from obstruction, and identified by a red light.</span></div><span data-dcnode-id="836" instrument_node="">
</span><div class="comments_container" data-dcnode-id="835"></div><span data-dcnode-id="834" instrument_node="">
</span><button class="add_comment_icon rounded-full" data-dcnode-id="833" data-tippy-content="

</span><div class="section_title_bar" data-dcnode-id="818"><span data-dcnode-id="828" instrument_node="">
</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">§27-935 Number of Standpipe Risers Required</span></a><span data-dcnode-id="824" instrument_node="">
</span></h2><span data-dcnode-id="822" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">
</span></div><span data-dcnode-id="819" instrument_node="">
</span></div><span data-dcnode-id="817" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">The number of standpipe risers shall be such that every point of every floor can be reached by a twenty foot stream from a nozzle attached to not more than one hundred twenty-five feet of hose connected to a riser outlet valve.</span></div><span data-dcnode-id="814" instrument_node="">

</span><div class="section_container" data-dcnode-id="775" data-ref="§27-936" data-section_depth="1"><span data-dcnode-id="807" instrument_node="">
</span><div class="section_title_bar" data-dcnode-id="796"><span data-dcnode-id="806" instrument_node="">
</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">§27-936 Location of Standpipe Risers</span></a><span data-dcnode-id="802" instrument_node="">
</span></h2><span data-dcnode-id="800" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">
</span></div><span data-dcnode-id="797" instrument_node="">
</span></div><span data-dcnode-id="795" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="781"><span data-dcnode-id="794" instrument_node="">(a) Standpipe risers and two and one-half inch angle hose valves shall be located within stairway enclosures. For additional requirements see </span><a class="autolink" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/new_york_city/nyc-building-code-1968-v1/chapter/5/fire-protection-construction-requirements%23%25C2%25A727-343"><span data-dcnode-id="793" instrument_node="">section 27-343</span></a><span data-dcnode-id="791" instrument_node=""> of article five of subchapter five and subdivision (j) of </span><a class="autolink" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/new_york_city/nyc-building-code-1968-v1/chapter/6/means-of-egress%23%25C2%25A727-375"><span data-dcnode-id="790" instrument_node="">section 27-375</span></a><span data-dcnode-id="788" instrument_node=""> of article five of subchapter six of this chapter. When stairway enclosures are not available within the distance limitations of </span><a class="autolink" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/new_york_city/nyc-building-code-1968-v1/chapter/17/fire-alarm-detection-and-extinguishing-equipment%23%25C2%25A727-935"><span data-dcnode-id="787" instrument_node="">section 27-935</span></a><span data-dcnode-id="785" instrument_node=""> of this article, the standpipe risers and two and one-half inch angle hose valves shall be located as near to the enclosure as practicable, subject to the approval of the commissioner. A metal sign with one inch lettering indicating the location of the outlet shall be provided in the stair enclosure on each floor where the riser is not located in the enclosure.</span><br data-dcnode-id="784"><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">(b) No standpipe riser shall be placed in any shaft containing a gas or fuel pipeline.</span></div><span data-dcnode-id="780" instrument_node="">
</span><div class="comments_container" data-dcnode-id="779"></div><span data-dcnode-id="778" instrument_node="">

</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">§27-937 Omission of Standpipe Service</span></a><span data-dcnode-id="768" instrument_node="">
</span></h2><span data-dcnode-id="766" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">
</span></div><span data-dcnode-id="763" instrument_node="">
</span></div><span data-dcnode-id="761" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">(a) Standpipe outlets may be omitted in portions of first floors or basements that are completely separated from the entrance hall or enclosed stairways leading to the upper floors, provided portable fire extinguishers are installed, subject to the approval of the commissioner.</span><br data-dcnode-id="759"><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">(b) Standpipe protection shall be omitted from transformer vaults, high-tension switchboard rooms, and other locations where the use of hose streams would be hazardous. Any space or room that houses equipment of such nature that the use of water would be ineffective in fighting the fire, or would be hazardous, shall have a conspicuous metal sign on each door opening on such space or room stating the nature of the use and the warning: "Use No Water".</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="comments_container" data-dcnode-id="754"></div><span data-dcnode-id="753" instrument_node="">

</span></div><span data-dcnode-id="749" instrument_node="">
</span><div class="section_container" data-dcnode-id="676" data-ref="§27-938" data-section_depth="1"><span data-dcnode-id="748" instrument_node="">
</span><div class="section_title_bar" data-dcnode-id="737"><span data-dcnode-id="747" instrument_node="">
</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">

</span><div class="content_root section_body" data-dcnode-id="682"><span data-dcnode-id="735" instrument_node="">The size of standpipe risers shall be in accordance with Table 17-1. </span><br data-dcnode-id="734"><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">

</span><a class="section_title content_root" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">§27-939 Devices Used in System</span></a><span data-dcnode-id="669" instrument_node="">
</span></h2><span data-dcnode-id="667" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span></div><span data-dcnode-id="662" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">No device, valve, pipe, or fitting may be used in a standpipe system unless such device, valve, pipe or fitting has been accepted or approved in accordance with the provisions of section 27-135 of article eight of subchapter one of this chapter.</span></div><span data-dcnode-id="659" instrument_node="">

</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">§27-940 Siamese Connections Required</span></a><span data-dcnode-id="647" instrument_node="">
</span></h2><span data-dcnode-id="645" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="620"><span data-dcnode-id="639" instrument_node="">Siamese connections shall be provided as follows:</span><br data-dcnode-id="638"><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">(a) One siamese connection shall be provided for each three hundred feet of exterior building wall or fraction thereof facing upon each street or public space.</span><br data-dcnode-id="635"><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">(b) Where buildings face upon two parallel streets or public spaces without an intersecting street or public space, one siamese shall be provided for each three hundred feet of exterior building wall or fraction thereof facing upon each such parallel street or public space.</span><br data-dcnode-id="632"><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">(c) Where a building faces upon two intersecting streets or public spaces and the total length of the exterior building walls facing upon such streets or public spaces does not exceed three hundred feet only one siamese connection need be installed provided the siamese connection is located within fifteen feet of the corner and on the longer street.</span><br data-dcnode-id="629"><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">(d) Where a building faces on three streets or public spaces, one siamese connection shall be provided for each three hundred feet of building wall or fraction thereof facing upon such streets or public spaces, provided that at least one siamese connection is installed on each of the parallel streets or public spaces, and further provided that the siamese connections shall be located so that the distance between them does not exceed three hundred feet.</span><br data-dcnode-id="626"><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">(e) Where a building faces upon four streets or public spaces, at least one siamese connection shall be provided on each street front or public space; however, only one siamese connection need be provided at the corner of two intersecting streets or public spaces if the siamese connection is located within fifteen feet of the corner and on the longer street or public space, and if the distances between siamese connections, in all cases, does not exceed three hundred feet.</span><br data-dcnode-id="623"><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">(f) In any case where the exterior building walls of a building facing a street or public space is obstructed in part by another building, one siamese connection shall be provided for each clear three hundred feet of exterior building wall or fraction thereof facing upon such street or public space.</span></div><span data-dcnode-id="619" instrument_node="">
</span><div class="comments_container" data-dcnode-id="618"></div><span data-dcnode-id="617" instrument_node="">
</span><button class="add_comment_icon rounded-full" data-dcnode-id="616" data-tippy-content="

</span><h2 class="font_2200 text-gray-700-tw2 sm:text-base text-sm leading-7 font-bold font-bold" data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">
</span><a class="section_title content_root" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">§27-941 Cross Connections</span></a><span data-dcnode-id="607" instrument_node="">
</span></h2><span data-dcnode-id="605" instrument_node="">
</span><div class="section_badge_container flex items-center" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span><div class="content_root section_body" data-dcnode-id="580"><span data-dcnode-id="599" instrument_node="">(a) Standpipe systems that include more than one riser shall have all risers cross-connected at, or below, the street entrance floor level, except as otherwise provided in this section.</span><br data-dcnode-id="598"><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">(b) Standpipe systems in buildings required by the provisions of </span><a class="autolink" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/new_york_city/nyc-building-code-1968-v1/chapter/17/fire-alarm-detection-and-extinguishing-equipment%23%25C2%25A727-943"><span data-dcnode-id="595" instrument_node="">section 27-943</span></a><span data-dcnode-id="593" instrument_node=""> of this article to have one or more zones shall be so designed and installed that the risers supplied from each zone will be cross-connected below, or in, the story of the lowest hose outlets from the water source in each zone. Horizontal intermediate check valves shall be installed in the run of each riser continuing into a higher zone in such manner as to permit all upper zones of the system to be fed through one riser from the zone below and to prevent any lower zone of the system from being supplied from a zone above.</span><br data-dcnode-id="592"><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">(c) Risers supplied by an upper level cross connection shall be provided with manual control valves or remote control valves, so arranged that risers supplied by the upper level cross connections may independently be shut off from the tank supplies.</span><br data-dcnode-id="589"><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">(d) Cross connections shall be at least as large as the largest riser supplied by the cross connection. However, when supplying two, but not more than four four-inch risers, the cross connection shall not be less than five inches. The cross connection shall not be less than six inches for all other riser combinations.</span><br data-dcnode-id="586"><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">(e) Where there is no cellar, cross connections may be hung from the ceiling of the lowest story.</span><br data-dcnode-id="583"><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node="">(f) Each siamese connection shall be connected to a riser or to a cross connection connecting other siamese hose connections or risers. The pipe from the siamese connection to the riser or cross connection shall be five inch i.p.s., except that a four inch pipe shall be sufficient when such pipe supplies a single four inch riser system. The pipe from the siamese connection shall be run as directly as practicable to the riser or cross connection.</span></div><span data-dcnode-id="579" instrument_node="">
</span><div class="comments_container" data-dcnode-id="578"></div><span data-dcnode-id="577" instrument_node="">
