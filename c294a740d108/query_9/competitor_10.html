</span><div data-dcnode-id="1041"><span data-dcnode-id="1042"><span data-dcnode-id="1043"><span data-dcnode-id="1050" instrument_node="">A </span><b data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">standpipe</span></b><span data-dcnode-id="1047" instrument_node=""> is an open-ended, metal pipe that can be screwed into a basement floor </span><b data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">drain</span></b><span data-dcnode-id="1044" instrument_node=""> to permit the flow of water back up as high as necessary, thereby delaying or preventing a basement flood.</span></span></span></div><br data-dcnode-id="1040"><p data-dcnode-id="1033"><a class="lc" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/405981" rel="nofollow" target="_blank"><span data-dcnode-id="1039" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="1037" instrument_node=""> </span><br data-dcnode-id="1036"><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node=""> Simply so,  what does a standpipe do?</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024"><span data-dcnode-id="1025"><span data-dcnode-id="1032" instrument_node="">A Standpipe is a type of rigid </span><b data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">water</span></b><span data-dcnode-id="1029" instrument_node=""> piping which is built into multi-story buildings in a vertical position, to which fire hoses can be connected, allowing manual application of </span><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">water</span></b><span data-dcnode-id="1026" instrument_node=""> to the fire. Within buildings standpipes thus serve the same purpose as fire hydrants.</span></span></span></p><p data-dcnode-id="1012"><span data-dcnode-id="1022" instrument_node="">Beside above,  how do you plumb a standpipe? </span><span data-dcnode-id="1013"><span data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node="">The proper way to drain a washing machine isn't to hook the hose over the edge of a utility sink, as many homeowners do, but to </span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">install a standpipe</span></b><span data-dcnode-id="1018" instrument_node=""> and secure it to the wall framing. A </span><b data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">standpipe</span></b><span data-dcnode-id="1015" instrument_node=""> is a vertical length of 2-inch drain pipe connected to a P-trap which is in turn connected to a drain.</span></span></span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node=""> Also Know,  do I need to vent a washing machine drain?</span></p><p data-dcnode-id="984"><span data-dcnode-id="1009" instrument_node=""> </span><span data-dcnode-id="985"><span data-dcnode-id="986"><span data-dcnode-id="1008" instrument_node="">If the </span><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">drain</span></b><span data-dcnode-id="1005" instrument_node=""> of your </span><b data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">washing machine</span></b><span data-dcnode-id="1002" instrument_node=""> fits tightly into the </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">drain</span></b><span data-dcnode-id="999" instrument_node="">, you definitely </span><b data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">need</span></b><span data-dcnode-id="996" instrument_node=""> a </span><b data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">washing machine drain vent</span></b><span data-dcnode-id="993" instrument_node="">. It allows air in which prevents the possibility of a vacuum forming that could affect the water </span><b data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">draining</span></b><span data-dcnode-id="990" instrument_node=""> from your </span><b data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">washing machine</span></b><span data-dcnode-id="987" instrument_node="">.</span></span></span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">How does a standpipe work?</span></p><p data-dcnode-id="966"><span data-dcnode-id="981" instrument_node=""> </span><span data-dcnode-id="977"><span data-dcnode-id="980" instrument_node="">Dry </span><b data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">standpipe</span></b></span><span data-dcnode-id="976" instrument_node=""> </span><span data-dcnode-id="967"><span data-dcnode-id="968"><span data-dcnode-id="975" instrument_node="">The </span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">standpipe</span></b><span data-dcnode-id="972" instrument_node=""> extends into the building to supply fire fighting water to the interior of the structure via hose outlets, often located between each pair of floors in stairwells in high rise buildings. Dry </span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">standpipes</span></b><span data-dcnode-id="969" instrument_node=""> are not filled with water until needed in fire fighting.</span></span></span></p><span data-dcnode-id="965" instrument_node=""> </span></div><span data-dcnode-id="963" instrument_node="">
