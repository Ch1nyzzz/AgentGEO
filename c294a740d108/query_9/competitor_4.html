</span><div class="post-11754 post type-post status-publish format-standard has-post-thumbnail hentry category-fire-sprinklers category-fire-tech-tips category-inspecting-fire-sprinklers category-standpipes" data-dcnode-id="3855" id="post-11754"><span data-dcnode-id="3972" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">#123 – Manual Standpipes and Acceptance Testing Methods</span></h1><span data-dcnode-id="3969" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3942"><span data-dcnode-id="3968" instrument_node="">
</span><span data-dcnode-id="3959"><i class="crycon-time crycon-metas" data-dcnode-id="3967" title="Date"></i><span data-dcnode-id="3966" instrument_node="">
</span><time class="onDate date published" data-dcnode-id="3961" datetime="2019-06-15T13:31:26-04:00"><span data-dcnode-id="3965" instrument_node="">
</span><a data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/manual-standpipes-and-acceptance-testing-methods/" rel="bookmark"><span data-dcnode-id="3964" instrument_node="">June 15, 2019</span></a><span data-dcnode-id="3962" instrument_node="">
</span></time><span data-dcnode-id="3960" instrument_node="">
</span></span><time class="updated" data-dcnode-id="3957" datetime="2019-08-22T15:18:34-04:00"><span data-dcnode-id="3958" instrument_node="">August 22, 2019</span></time><span class="bl_categ" data-dcnode-id="3944"><i class="crycon-folder-open crycon-metas" data-dcnode-id="3956" title="Categories"></i><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/category/fire-sprinklers/" rel="tag"><span data-dcnode-id="3955" instrument_node="">Fire Sprinklers</span></a><span data-dcnode-id="3953" instrument_node="">, </span><a data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/category/fire-tech-tips/" rel="tag"><span data-dcnode-id="3952" instrument_node="">Fire Tech Tips</span></a><span data-dcnode-id="3950" instrument_node="">, </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/category/inspecting-fire-sprinklers/" rel="tag"><span data-dcnode-id="3949" instrument_node="">Inspecting Fire Sprinklers</span></a><span data-dcnode-id="3947" instrument_node="">, </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/category/standpipes/" rel="tag"><span data-dcnode-id="3946" instrument_node="">Standpipes</span></a></span><span data-dcnode-id="3943" instrument_node=""> </span></div><span data-dcnode-id="3940" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3862"><span data-dcnode-id="3939" instrument_node="">
</span><h4 data-dcnode-id="3936"><em data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">by William Strickler</span></em></h4><span data-dcnode-id="3935" instrument_node="">
</span><h4 data-dcnode-id="3934" style="padding-left: 40px;"></h4><span data-dcnode-id="3933" instrument_node="">
</span><h3 data-dcnode-id="3929"><span data-dcnode-id="3930" style="font-family: Calibri, Arian, sans-serif;"><img alt="Class 3 Standpipe" class="alignleft size-medium wp-image-12231" data-dcnode-id="3932" height="300" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/wp-content/uploads/2019/08/Class3_StandPipe-200x300.png&amp;raw" srcset="https://firetech.com/wp-content/uploads/2019/08/Class3_StandPipe-200x300.png 200w, https://firetech.com/wp-content/uploads/2019/08/Class3_StandPipe-100x150.png 100w, https://firetech.com/wp-content/uploads/2019/08/Class3_StandPipe.png 235w" width="200"><span data-dcnode-id="3931" instrument_node="">When installing a new manual wet or dry standpipe system, what is your company’s preferred method of completing an acceptance flow test? Do you rent or own a portable pump that is capable of achieving such designed flow rates typically associated with standpipe flow testing? Do you coordinate with the local fire department either full-time or volunteer to provide a pumper truck to aid in achieving desired flow rate? There may even be some out there who use some other method that has been approved by the local Authority Having Jurisdiction (AHJ) that works great for them. I am sure no matter what method you prefer we can all agree on the importance of acceptance testing new standpipe installations.</span></span></h3><span data-dcnode-id="3928" instrument_node="">
</span><h4 data-dcnode-id="3923" style="padding-left: 40px;"><span data-dcnode-id="3927" instrument_node="">Referencing Fire Tech Productions’ </span><a data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//training.firetech.com/oltpublish/site/program.do%3Fdispatch%3DshowCourseSession%26id%3D4def92a4-b4e7-11e7-a6ac-0cc47a352510" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3926" instrument_node="">Automatic Sprinkler &amp; Standpipe Systems</span></a><span data-dcnode-id="3924" instrument_node=""> Course will help us answer the basic question, “What is a standpipe system?”&nbsp; A standpipe system is a fire hydrant system inside a building.</span></h4><span data-dcnode-id="3922" instrument_node="">
</span><h4 data-dcnode-id="3920" style="padding-left: 40px;"><span data-dcnode-id="3921" instrument_node="">The purpose of a standpipe system is to allow fire fighters to connect hose to a water source and manually fight a fire without having to run the hose all the way from the street into the building, and up through the building to get to the fire.</span></h4><span data-dcnode-id="3919" instrument_node="">
</span><h2 data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">The NFPA 14 2016 edition provides three methods or “recommended” procedures to reach the field acceptance flow testing requirement found in A.11.5.2 (A-C).</span></h2><span data-dcnode-id="3916" instrument_node="">
</span><ul data-dcnode-id="3884"><span data-dcnode-id="3915" instrument_node="">
</span><li data-dcnode-id="3904"><span data-dcnode-id="3914" instrument_node="">
</span><h3 data-dcnode-id="3906"><span data-dcnode-id="3907" style="font-family: Calibri, Arian, sans-serif;"><strong data-dcnode-id="3909"><span data-dcnode-id="3913" instrument_node="">Testing with pump through </span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vikinggroupinc.com/products/fdc-equipment/fire-department-connections" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3912" instrument_node="">Fire Department Connection</span></a><span data-dcnode-id="3910" instrument_node=""> (FDC) [A.11.5.2(a)]:</span></strong><span data-dcnode-id="3908" instrument_node=""> Includes a hydrant, fire department pumper truck, hoses and flow calculating discharge devices. The fire department pumper truck or portable pump receives water from the hydrant and pumps the water into the standpipe system through the FDC to the most remote standpipe hose valves and any other required flow outlet in the system to reach system demand. The water would then be discharged through flow calculating devices.</span></span></h3><span data-dcnode-id="3905" instrument_node="">
</span></li><span data-dcnode-id="3903" instrument_node="">
</span><li data-dcnode-id="3895"><span data-dcnode-id="3902" instrument_node="">
</span><h3 data-dcnode-id="3897"><span data-dcnode-id="3898" style="font-family: Calibri, Arian, sans-serif;"><strong data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Testing by recirculating water [A.11.5.2(b)]:</span></strong><span data-dcnode-id="3899" instrument_node=""> Includes in-line flow meters, fire department pumper truck or portable pump, hoses and/or drain lines able to tie back into fire department pumper truck/portable pump, but no hydrant or water discharge. &nbsp;The fire department pumper would pump into the standpipe system through the FDC and the in-line flow meters would be located at the most remote and other required areas for flow testing the standpipe system. From the discharge side of the in-line flow meters the hoses would be tied back into a drain line or have other hoses running back to the fire department pumper truck or to a portable pumping unit to be recirculated back into the system until the test is complete.</span></span></h3><span data-dcnode-id="3896" instrument_node="">
</span></li><span data-dcnode-id="3894" instrument_node="">
</span><li data-dcnode-id="3886"><span data-dcnode-id="3893" instrument_node="">
</span><h3 data-dcnode-id="3888"><span data-dcnode-id="3889" style="font-family: Calibri, Arian, sans-serif;"><strong data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Testing through the Fire Department Connection (FDC) without pump [A.11.5.2(c)]:</span></strong><span data-dcnode-id="3890" instrument_node=""> Includes a hydrant, hoses and discharge devices, but no fire department pumper or portable pump. The hydrant sends water through the FDC into the standpipe system where it is then discharged at the most remote hose valves and other required hose valves to reach system demand.</span></span></h3><span data-dcnode-id="3887" instrument_node="">
</span></li><span data-dcnode-id="3885" instrument_node="">
</span></ul><span data-dcnode-id="3883" instrument_node="">
</span><h2 data-dcnode-id="3880"><img alt="Building Standpipe Hose" class="alignright size-full wp-image-12238" data-dcnode-id="3882" height="229" loading="lazy" sizes="(max-width: 261px) 100vw, 261px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firetech.com/wp-content/uploads/2019/08/Building-Standpipe.png&amp;raw" srcset="https://firetech.com/wp-content/uploads/2019/08/Building-Standpipe.png 261w, https://firetech.com/wp-content/uploads/2019/08/Building-Standpipe-150x132.png 150w" width="261"><span data-dcnode-id="3881" instrument_node="">The standpipe systems are a firefighter’s main source of water in multiple story buildings</span></h2><span data-dcnode-id="3879" instrument_node="">
</span><h3 data-dcnode-id="3876"><span data-dcnode-id="3877" style="font-family: Calibri, Arian, sans-serif;"><span data-dcnode-id="3878" instrument_node="">The above methods are the most common practices I have witnessed during my time in the field. I am sure there are several different ways or combinations of the above methods that are used every day, but these seem to be the most popular. In my experience, we like to get the local fire department involved every chance we can. After all, we are in the same business of saving lives and the standpipe systems are a firefighter’s main source of water in multiple story buildings. Many fire departments jump at the chance for this training, as it provides them the opportunity to become familiar with the new building and the standpipe system that would need to be used in an emergency.</span></span></h3><span data-dcnode-id="3875" instrument_node="">
</span><h3 data-dcnode-id="3872"><span data-dcnode-id="3873" style="font-family: Calibri, Arian, sans-serif;"><span data-dcnode-id="3874" instrument_node="">Regardless of the method you prefer or are required to do, I believe we can all agree on the importance of testing standpipes — both automatic and manual systems alike. As contractors in the fire sprinkler industry we are responsible for providing a standpipe system installed and tested according to the NFPA and AHJ standards, so that the local fire departments who respond to these systems will be able to perform their duties and come out the same way they went in.</span></span></h3><span data-dcnode-id="3871" instrument_node="">
</span><h3 data-dcnode-id="3868"><span data-dcnode-id="3869" style="font-family: Calibri, Arian, sans-serif;"><span data-dcnode-id="3870" instrument_node="">Keep up the great work and let’s keep saving lives and property!!</span></span></h3><span data-dcnode-id="3867" instrument_node="">
</span><h3 data-dcnode-id="3864"><em data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Will Strickler has 14-years’ experience in the Fire Sprinkler Industry. He is a Facilities Management Technician at the University of North Carolina Chapel Hill and an Instructor for Fire Tech Productions.</span></em></h3><span data-dcnode-id="3863" instrument_node="">
</span></div><span data-dcnode-id="3860" instrument_node="">
