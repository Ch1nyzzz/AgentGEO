</span><div class="thumb tright" data-dcnode-id="1087"><div class="thumbinner" data-dcnode-id="1088" style="width:222px;"><a class="image" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABrockhampton_Estate_-_horse-drawn_fire_pump.jpg"><img alt="" class="thumbimage" data-dcnode-id="1098" data-file-height="3015" data-file-width="3486" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/66/Brockhampton_Estate_-_horse-drawn_fire_pump.jpg/220px-Brockhampton_Estate_-_horse-drawn_fire_pump.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/66/Brockhampton_Estate_-_horse-drawn_fire_pump.jpg/330px-Brockhampton_Estate_-_horse-drawn_fire_pump.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/66/Brockhampton_Estate_-_horse-drawn_fire_pump.jpg/440px-Brockhampton_Estate_-_horse-drawn_fire_pump.jpg 2x" width="220"></a><span data-dcnode-id="1096" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1089"><div class="magnify" data-dcnode-id="1094"><a class="internal" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABrockhampton_Estate_-_horse-drawn_fire_pump.jpg" title="Enlarge"></a></div><span data-dcnode-id="1093" instrument_node="">Horse-drawn fire pump given to </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brockhampton_Estate" title="Brockhampton Estate"><span data-dcnode-id="1092" instrument_node="">Brockhampton Estate</span></a><span data-dcnode-id="1090" instrument_node=""> in 1818</span></div></div></div><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1085" instrument_node="">A </span><b data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">fire pump</span></b><span data-dcnode-id="1082" instrument_node=""> usually refers to a pressure-increasing component of the water supply for fixed-place fire suppression systems such as </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fire_sprinkler_system" title="Fire sprinkler system"><span data-dcnode-id="1081" instrument_node="">fire sprinklers</span></a><span data-dcnode-id="1079" instrument_node="">, </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standpipe_%28firefighting%29" title="Standpipe (firefighting)"><span data-dcnode-id="1078" instrument_node="">standpipes</span></a><span data-dcnode-id="1076" instrument_node="">, and </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firefighting_foam" title="Firefighting foam"><span data-dcnode-id="1075" instrument_node="">foam systems</span></a><span data-dcnode-id="1073" instrument_node="">. Fire pumps are also a critical component integrated into fire trucks and fire boats, and serve a similar purpose boosting water supplies for firefighting hose operations. Fire pumps are used to increase the pressure of water sourced from a municipal underground water supply piping network, or a static supply (e.g., tank, reservoir, lake). A fire pump is a </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centrifugal_pump" title="Centrifugal pump"><span data-dcnode-id="1072" instrument_node="">centrifugal-</span></a><span data-dcnode-id="1070" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Positive-displacement_pump" title="Positive-displacement pump"><span data-dcnode-id="1069" instrument_node="">positive displacement-</span></a><span data-dcnode-id="1067" instrument_node=""> pump that has been tested and </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Product_certification" title="Product certification"><span data-dcnode-id="1066" instrument_node="">listed</span></a><span data-dcnode-id="1064" instrument_node=""> by a third-party testing and listing agency, such as </span><a class="mw-redirect" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underwriters_Laboratories" title="Underwriters Laboratories"><span data-dcnode-id="1063" instrument_node="">UL</span></a><span data-dcnode-id="1061" instrument_node=""> or </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FM_Global" title="FM Global"><span data-dcnode-id="1060" instrument_node="">FM Global</span></a><span data-dcnode-id="1058" instrument_node=""> specifically for fire service use. The main standard that governs fire pump fixed-place installations in North America is the </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Fire_Protection_Association" title="National Fire Protection Association"><span data-dcnode-id="1057" instrument_node="">National Fire Protection Association</span></a><span data-dcnode-id="1055" instrument_node="">'s </span><i data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">NFPA 20 Standard for the Installation of Stationary Fire Pumps for Fire Protection</span></i><span data-dcnode-id="1052" instrument_node="">.</span><sup class="reference" data-dcnode-id="1049" id="cite_ref-1"><a data-dcnode-id="1050" href="#cite_note-1"><span data-dcnode-id="1051" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1048" instrument_node="">
</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1046" instrument_node="">Fire pumps are powered most commonly by an </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electric_motor" title="Electric motor"><span data-dcnode-id="1045" instrument_node="">electric motor</span></a><span data-dcnode-id="1043" instrument_node=""> or a </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diesel_engine" title="Diesel engine"><span data-dcnode-id="1042" instrument_node="">diesel engine</span></a><span data-dcnode-id="1040" instrument_node="">, or, occasionally a </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steam_turbine" title="Steam turbine"><span data-dcnode-id="1039" instrument_node="">steam turbine</span></a><span data-dcnode-id="1037" instrument_node="">. If the governing model building code requires backup power independent of the local electric power grid, a fire pump using an electric motor may utilize an </span><a class="mw-redirect" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electrical_generator" title="Electrical generator"><span data-dcnode-id="1036" instrument_node="">emergency generator</span></a><span data-dcnode-id="1034" instrument_node=""> when connected via a listed </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transfer_switch" title="Transfer switch"><span data-dcnode-id="1033" instrument_node="">transfer switch</span></a><span data-dcnode-id="1031" instrument_node="">. Fire pumps installed on fire trucks and boats are powered by the engine of the vehicle/vessel.
</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Utilizing a control panel with pressure sensors, fire pumps automatically start when the pressure in the fire sprinkler system drops below a pre-designated threshold. Given the incompressibility of water, fire suppression system pressures drops significantly and quickly when one or more outlets open. Examples would be fused (opened) fire sprinklers, fire hose valves connected to a standpipe, or automatic control valves opened by release panels.
</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1027" instrument_node="">Fire pumps are utilized when determined by </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydraulic_calculation" title="Hydraulic calculation"><span data-dcnode-id="1026" instrument_node="">hydraulic calculations</span></a><span data-dcnode-id="1024" instrument_node=""> that the existing water supply cannot provide sufficient pressure to meet the hydraulic design requirements of the suppression system. This usually occurs if the building is very tall, such as in </span><a class="mw-redirect" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-rise" title="High-rise"><span data-dcnode-id="1023" instrument_node="">high-rise</span></a><span data-dcnode-id="1021" instrument_node=""> buildings (to overcome </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydraulic_head" title="Hydraulic head"><span data-dcnode-id="1020" instrument_node="">hydraulic head losses</span></a><span data-dcnode-id="1018" instrument_node=""> created from elevation differences), in systems that require a relatively high terminal pressure at the fire suppression outlets (to provide sufficient water droplet penetration of a fire plume), or in systems that require a large discharge of water (such as storage warehouses). Fire pumps are also needed if fire protection water supply is provided from a static source which provides little or no pressure. Some situations may be compounded by all of these factors, requiring large water supplies and powerful fire pumps.
</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Common types of fire pumps used for fire service include: horizontal split case, vertical split case, vertical inline, vertical turbine, and end suction.
</span></p><span data-dcnode-id="1014" instrument_node="">

</span><li class="toclevel-2 tocsection-4" data-dcnode-id="975"><a data-dcnode-id="976" href="#In_India"><span class="tocnumber" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">2.2</span></span><span data-dcnode-id="979" instrument_node=""> </span><span class="toctext" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">In India</span></span></a></li><span data-dcnode-id="974" instrument_node="">

</span><h2 data-dcnode-id="939"><span data-dcnode-id="949" id="Fire_pumps.2C_circulation_relief_valve"></span><span class="mw-headline" data-dcnode-id="947" id="Fire_pumps,_circulation_relief_valve"><span data-dcnode-id="948" instrument_node="">Fire pumps, circulation relief valve</span></span><span class="mw-editsection" data-dcnode-id="940"><span class="mw-editsection-bracket" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">[</span></span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFire_pump%26action%3Dedit%26section%3D1" title="Edit section: Fire pumps, circulation relief valve"><span data-dcnode-id="944" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">]</span></span></span></h2><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="937" instrument_node="">Each pump shall have a circulation relief valve listed for the fire pump service installed and set below the shutoff pressure at minimum expected suction pressure. Exception: This rule shall not apply to engine-driven pumps for which engine cooling water is taken from the pump discharge.</span><sup class="reference" data-dcnode-id="934" id="cite_ref-2"><a data-dcnode-id="935" href="#cite_note-2"><span data-dcnode-id="936" instrument_node="">[2]</span></a></sup><span data-dcnode-id="933" instrument_node="">
</span></p><span data-dcnode-id="931" instrument_node="">
</span><h2 data-dcnode-id="921"><span class="mw-headline" data-dcnode-id="929" id="Jockey_pump"><span data-dcnode-id="930" instrument_node="">Jockey pump</span></span><span class="mw-editsection" data-dcnode-id="922"><span class="mw-editsection-bracket" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">[</span></span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFire_pump%26action%3Dedit%26section%3D2" title="Edit section: Jockey pump"><span data-dcnode-id="926" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">]</span></span></span></h2><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">A </span><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">jockey pump</span></b><span data-dcnode-id="916" instrument_node="">, also known as a pressure-maintenance pump, is a small pump connected to a fire suppression system near the fire pump and is intended to maintain pressure in a fire protection piping system. These pumps recover pressures lost from gradual, slow pressure declines in a system due to temperature changes, trapped air escapement, or very small leaks. The jockey pump is essentially a portion of the fire pump's control system. A jockey pump is sized for a flow less than one sprinkler in order to ensure a system pressure drop significant enough to start the main fire pump. Jockey pumps are typically small multistage centrifugal pumps, and do not have to be listed or certified for fire system application. The control equipment for jockey pumps may however carry approvals. Jockey pumps should be sized for 3% of the flow of the main fire pump and to provide 10psi more pressure than the main fire pump (As per Code IS 15105&nbsp;: 2002)
</span></p><span data-dcnode-id="914" instrument_node="">
</span><h3 data-dcnode-id="904"><span class="mw-headline" data-dcnode-id="912" id="In_the_U.S."><span data-dcnode-id="913" instrument_node="">In the U.S.</span></span><span class="mw-editsection" data-dcnode-id="905"><span class="mw-editsection-bracket" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">[</span></span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFire_pump%26action%3Dedit%26section%3D3" title="Edit section: In the U.S."><span data-dcnode-id="909" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">]</span></span></span></h3><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The application of a jockey pump in a fire protection system is provided by NFPA 20. They are inspected per NFPA 25 "Inspection and Testing of Water-Based Fire Protection Systems".
</span></p><span data-dcnode-id="900" instrument_node="">
</span><h3 data-dcnode-id="890"><span class="mw-headline" data-dcnode-id="898" id="In_India"><span data-dcnode-id="899" instrument_node="">In India</span></span><span class="mw-editsection" data-dcnode-id="891"><span class="mw-editsection-bracket" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">[</span></span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFire_pump%26action%3Dedit%26section%3D4" title="Edit section: In India"><span data-dcnode-id="895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">]</span></span></span></h3><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="888" instrument_node="">In India, the pump manufacturers generally adhere to the TAC (Tariff Advisory Committee) guidelines, although pump manufacturers also obtain listings with </span><a class="mw-redirect" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underwriters_Laboratories" title="Underwriters Laboratories"><span data-dcnode-id="887" instrument_node="">UL</span></a><span data-dcnode-id="885" instrument_node=""> or </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FM_Global" title="FM Global"><span data-dcnode-id="884" instrument_node="">FM Global</span></a><span data-dcnode-id="882" instrument_node="">. For the purpose of installation &amp; maintenance of fire-fighting pumps, </span><a class="external text" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.standardsbis.in/Gemini/search/BasicSearch.action" rel="nofollow"><span data-dcnode-id="881" instrument_node="">Bureau of Indian Standards has published IS 15301</span></a><span data-dcnode-id="879" instrument_node=""> which is being followed throughout India.
</span></p><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="867"><span class="mw-headline" data-dcnode-id="875" id="Portable_Home_Fire_Pump"><span data-dcnode-id="876" instrument_node="">Portable Home Fire Pump</span></span><span class="mw-editsection" data-dcnode-id="868"><span class="mw-editsection-bracket" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">[</span></span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFire_pump%26action%3Dedit%26section%3D5" title="Edit section: Portable Home Fire Pump"><span data-dcnode-id="872" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">]</span></span></span></h2><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="865" instrument_node="">Portable Fire Pump and hose systems are being used by fire departments and homeowners to defend homes from burning down in a wildfire. These portable gas powered fire pumps use a suction hose that draws water from a water source such as a swimming pool, water tank, or lake. The fire hose that is connected to the fire pump is used to spray down structures on the property and surrounding brush.
