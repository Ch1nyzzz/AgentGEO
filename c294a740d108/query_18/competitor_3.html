</span><h1 data-dcnode-id="843" style="text-align: center;"><span data-dcnode-id="844" instrument_node="">Fire water pump packages</span></h1><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840" style="text-align: center;"><span data-dcnode-id="841" instrument_node="">
</span></p><p data-dcnode-id="838" style="text-align: center;"><span data-dcnode-id="839" instrument_node="">Hamworthy Pumps has developed various solutions to meet the customers’ requirements for fire pump package installations. All units are designed under guidelines of NFPA-20 and marine class requirements. Different combinations based on Diesel engine, Hydraulic packs, Pumps, A-60 rated container e.t.c are available.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835" style="text-align: center;"><span data-dcnode-id="836" instrument_node="">
</span></p></div><span data-dcnode-id="833" instrument_node="">

</span><h2 class="image-text__heading" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">
				Broad scope of system solutions to meet requirements			</span></h2><span data-dcnode-id="801" instrument_node="">
</span><div class="image-text__content" data-dcnode-id="794"><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="799" instrument_node="">Hamworthy Pumps specialises in innovative and often highly customised designs of Fire Water Pump Packages for all kind of floating production systems: FPSO, FSO, FLNG etc. Our FWPP are designed under guidelines of NFPA-20 and marine class requirements. Different configurations of design are available.</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
We don’t just design our own products – our innovation is market-led. We work with our customers to understand their needs and then provide the solutions.</span></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">

</span></div><span data-dcnode-id="785" instrument_node="">
</span><div class="image-text grey-blue" data-dcnode-id="724"><span data-dcnode-id="784" instrument_node="">
</span><div class="row align-middle" data-dcnode-id="726"><span data-dcnode-id="783" instrument_node="">
</span><div class="small-12 large-6 column large-order-4" data-dcnode-id="771"><span data-dcnode-id="782" instrument_node="">

</span><img alt="" class="show-for-sr" data-dcnode-id="775" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hamworthy-pumps.com/wp-content/uploads/2019/10/MG_8839.jpg&amp;raw"><span data-dcnode-id="774" instrument_node="">

</span><h2 class="image-text__heading" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">
				Diesel/Hydraulic Driven System			</span></h2><span data-dcnode-id="764" instrument_node="">
</span><div class="image-text__content" data-dcnode-id="732"><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">The diesel/hydraulic is suitable when the main fire pump installation must be done above the draught line, typically in a compartment below deck in the fore peak. A hydraulic driven lift pump will be installed taking suction from a sea chest, pumping the water to the booster pump connected directly to the main diesel engine.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&nbsp;</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">A system for such installation consists of the following as minimum</span></p><span data-dcnode-id="754" instrument_node="">
</span><ul data-dcnode-id="734"><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Diesel Engine</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Booster Pump</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Lift Pump</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Hydraulic System</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">NFPA 20 Controller</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Room Cooler</span></li><span data-dcnode-id="735" instrument_node="">
</span></ul><span data-dcnode-id="733" instrument_node="">
</span></div><span data-dcnode-id="731" instrument_node="">
</span></div><span data-dcnode-id="729" instrument_node="">
</span><div class="small-12 large-1 column large-order-3" data-dcnode-id="728"></div><span data-dcnode-id="727" instrument_node="">
</span></div><span data-dcnode-id="725" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node="">
</span><div class="image-text brown-white" data-dcnode-id="665"><span data-dcnode-id="722" instrument_node="">
</span><div class="row align-middle" data-dcnode-id="667"><span data-dcnode-id="721" instrument_node="">
</span><div class="small-12 large-6 column large-order-1" data-dcnode-id="709"><span data-dcnode-id="720" instrument_node="">

</span><h2 class="image-text__heading" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">
				Containerized Fire Water Pump Packages			</span></h2><span data-dcnode-id="702" instrument_node="">
</span><div class="image-text__content" data-dcnode-id="673"><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The enclosure is H-60 insulated in material AISI 316 stainless steel. All our containerised equipment is designed for easy installation and good access to all major components. The units may be equipped with fire and gas detection and fire extinguishing system.</span></p><span data-dcnode-id="698" instrument_node="">
</span><ul data-dcnode-id="675"><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Fire rated container (A-60, H-60, H-120)</span></li><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Full CO2 Extinguishing system</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Fire Detectors and alarms</span></li><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">In built diesel fuel tank</span></li><span data-dcnode-id="685" instrument_node="">
</span><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Various control options for Fire &amp; Gas dampers</span></li><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Ventilation Fan</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Lightning Fixtures</span></li><span data-dcnode-id="676" instrument_node="">
</span></ul><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span></div><span data-dcnode-id="670" instrument_node="">
</span><div class="small-12 large-1 column large-order-4" data-dcnode-id="669"></div><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div class="image-text grey-blue" data-dcnode-id="633"><span data-dcnode-id="663" instrument_node="">
</span><div class="row align-middle" data-dcnode-id="635"><span data-dcnode-id="662" instrument_node="">
</span><div class="small-12 large-6 column large-order-4" data-dcnode-id="650"><span data-dcnode-id="661" instrument_node="">

</span><div class="image-text__content" data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">A full String Test is performed for the complete Fire Water Pump Package at our Singapore plant for all types of FWPP configuration. The String Test is performed in accordance with NFPA 20 requirements&nbsp;and includes a running test at 100% and 150% of rated duty capacities. The comprehensive test program ensures that the NPFA 20 Controller is functioning correctly in all required modes and that it reacts correctly to all specified alarms.</span></p><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span><div class="small-12 large-1 column large-order-3" data-dcnode-id="637"></div><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span></div><span data-dcnode-id="630" instrument_node="">
