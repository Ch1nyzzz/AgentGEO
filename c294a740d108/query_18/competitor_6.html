</span><h1 data-dcnode-id="750"><span data-dcnode-id="751" style="font-size: 75%;"><span data-dcnode-id="753" instrument_node="">PUMP ROOM</span><br data-dcnode-id="752"></span></h1><span data-dcnode-id="749" instrument_node="">

</span><section class="section" data-dcnode-id="634" id="section_845032242"><span data-dcnode-id="730" instrument_node="">
</span><div class="bg section-bg fill bg-fill bg-loaded" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span><div class="section-content relative" data-dcnode-id="639"><span data-dcnode-id="726" instrument_node="">
</span><div class="row" data-dcnode-id="641" id="row-1463691822"><span data-dcnode-id="725" instrument_node="">
</span><div class="col small-12 large-12" data-dcnode-id="643"><span data-dcnode-id="724" instrument_node="">
</span><div class="col-inner" data-dcnode-id="645"><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="715" style="text-align: justify;"><span data-dcnode-id="722" instrument_node="">A </span><b data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">pump room have fire pump </span></b><span data-dcnode-id="719" instrument_node="">which is a part of a fire sprinkler system’s water supply and powered by electric, diesel or steam. The pump intake is either connected to the public underground water supply piping, or a static water source (e.g., tank, reservoir, lake). The pump provides water flow at a higher pressure to the sprinkler system risers and hose standpipes. A fire pump is tested and listed for its use specifically for fire service by a third-party testing and listing agency, such as UL or FM Global. The main code that governs fire pump installations in North America is the National Fire Protection Association’s </span><i data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">NFPA 20 Standard for the Installation of Stationary Fire Pumps for Fire Protection</span></i><span data-dcnode-id="716" instrument_node="">.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712" style="text-align: justify;"><span data-dcnode-id="713" instrument_node="">Fire pumps function either by an electric motor or a diesel engine, or, occasionally a steam turbine. If the local building code requires power independent of the local electric power grid, a pump using an electric motor may utilize, when connected via a listed transfer switch, the installation of an emergency generator.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709" style="text-align: justify;"><span data-dcnode-id="710" instrument_node="">The fire pump starts when the pressure in the fire sprinkler system drops below a threshold. The sprinkler system pressure drops significantly when one or more fire sprinklers are exposed to heat above their design temperature, and opens, releasing water. Alternately, other fire hoses reels or other firefighting connections are opened, causing a pressure drop in the firefighting main.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706" style="text-align: justify;"><span data-dcnode-id="707" instrument_node="">Fire pumps are needed when the local municipal water system cannot provide sufficient pressure to meet the hydraulic design requirements of the fire sprinkler system. This usually occurs if the building is very tall, such as in high-rise buildings, or in systems that require a relatively high terminal pressure at the fire sprinkler in order to provide a large volume of water, such as in storage warehouses. Fire pumps are also needed if fire protection water supply is provided from a ground level water storage tank.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703" style="text-align: justify;"><span data-dcnode-id="704" instrument_node="">Types of pumps used for fire service include: horizontal split case, vertical split case, vertical inline, vertical turbine, and end suction.</span></p><span data-dcnode-id="702" instrument_node="">
</span><div class="container section-title-container" data-dcnode-id="696"><h3 class="section-title section-title-center" data-dcnode-id="697"><b data-dcnode-id="701"></b><span class="section-title-main" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">We design pump room as per TAC, NBC, Indian and NFPA Standards/ guideline</span></span><b data-dcnode-id="698"></b></h3></div><span data-dcnode-id="695" instrument_node="">
