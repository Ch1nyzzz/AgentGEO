</span><article class="post-22365 post type-post status-publish format-standard has-post-thumbnail hentry category-erection-commissioning category-flow-measurement tag-flow-meter-hook-up tag-flow-meter-installation tag-flow-meter-installation-guidelines tag-flow-transmitter-hook-up tag-orifice-installation tag-wrong-orifice-installation no-featured-image-padding" data-dcnode-id="988" id="post-22365" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1661" instrument_node="">
</span><div class="inside-article" data-dcnode-id="990"><span data-dcnode-id="1660" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="1645"><span data-dcnode-id="1659" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1657" itemprop="headline"><span data-dcnode-id="1658" instrument_node="">Flow Meter Installation Guidelines</span></h1><span data-dcnode-id="1656" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1647"><span data-dcnode-id="1655" instrument_node="">
</span><span class="byline" data-dcnode-id="1649"><span data-dcnode-id="1654" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1650" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/author/admin/" itemprop="url" rel="author" title="View all posts by Editorial Staff"><span class="author-name" data-dcnode-id="1652" itemprop="name"><span data-dcnode-id="1653" instrument_node="">Editorial Staff</span></span></a></span></span><span data-dcnode-id="1648" instrument_node=""> </span></div><span data-dcnode-id="1646" instrument_node="">
</span></header><span data-dcnode-id="1644" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1168" itemprop="text"><span data-dcnode-id="1643" instrument_node="">
</span><div class="code-block code-block-3" data-dcnode-id="1635" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1642" instrument_node="">
</span><span data-dcnode-id="1640" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5634139240" data-dcnode-id="1639" style="display:block; text-align:center;"></ins><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span><div class="essb_postbar_start" data-dcnode-id="1633"></div><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1624" style="text-align: justify;"><span data-dcnode-id="1631" instrument_node="">Perhaps the most common way in which the ﬂow measurement accuracy of any </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/fieldbus-transmitters-calibration-and-ranging/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1630" instrument_node="">ﬂow meter</span></a><span data-dcnode-id="1628" instrument_node=""> becomes compromised is </span><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">incorrect installation</span></strong><span data-dcnode-id="1625" instrument_node="">, and pressure-based ﬂow meters are no exception to this rule.</span></p><div data-dcnode-id="1622" data-inserter-version="2" id="ezoic-pub-ad-placeholder-102"></div><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618" style="text-align: justify;"><span data-dcnode-id="1619" instrument_node="">The following list shows some of the details one must consider in installing a pressure-based ﬂow meter element:</span></p><span data-dcnode-id="1617" instrument_node="">
</span><ul data-dcnode-id="1600" style="text-align: justify;"><span data-dcnode-id="1616" instrument_node="">
</span><li data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Necessary upstream and downstream straight-pipe lengths</span></li><span data-dcnode-id="1613" instrument_node="">
</span><li data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Beta ratio (ratio of oriﬁce bore diameter to pipe diameter: β =&nbsp;d/D )</span></li><span data-dcnode-id="1610" instrument_node="">
</span><li data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Impulse tube tap locations</span></li><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Tap ﬁnish</span></li><span data-dcnode-id="1604" instrument_node="">
</span><li data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Transmitter location in relation to the pipe</span></li><span data-dcnode-id="1601" instrument_node="">
</span></ul><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1594" style="text-align: justify;"><span data-dcnode-id="1598" instrument_node="">Sharp turns in </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/piping-instrumentation-diagram-pid/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1597" instrument_node="">piping</span></a><span data-dcnode-id="1595" instrument_node=""> networks introduce large-scale turbulence into the ﬂowstream.</span></p><div data-dcnode-id="1592" data-inserter-version="2" id="ezoic-pub-ad-placeholder-110"></div><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588" style="text-align: justify;"><span data-dcnode-id="1589" instrument_node="">Elbows, tees, valves, fans, and pumps are some of the most common causes of large-scale turbulence in piping systems.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585" style="text-align: justify;"><span data-dcnode-id="1586" instrument_node="">Successive pipe elbows in diﬀerent planes are some of the worst oﬀenders in this regard.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582" style="text-align: justify;"><span data-dcnode-id="1583" instrument_node="">When the natural ﬂow path of a ﬂuid is disturbed by such piping arrangements, the velocity proﬁle of that ﬂuid becomes distorted; e.g. the velocity gradient from one wall boundary of the pipe to the other will not be orderly.</span></p><div data-dcnode-id="1580" data-inserter-version="2" id="ezoic-pub-ad-placeholder-111"></div><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576" style="text-align: justify;"><span data-dcnode-id="1577" instrument_node="">Large eddies in the ﬂow stream (called swirl ) will appear. This may cause problems for pressure-based ﬂow elements which rely on linear acceleration (change in velocity in one dimension) to measure ﬂuid ﬂow rate.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573" style="text-align: justify;"><span data-dcnode-id="1574" instrument_node="">If the ﬂow proﬁle is distorted enough, the acceleration detected at the element may be too great or too little, and therefore not properly represent the full ﬂuid ﬂow stream.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567" style="text-align: justify;"><span data-dcnode-id="1571" instrument_node="">For this reason, pressure-based </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationforum.com/t/what-are-the-differential-pressure-flow-meters/8096" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1570" instrument_node="">ﬂow meters</span></a><span data-dcnode-id="1568" instrument_node=""> should always be located upstream of major disturbances such as control valves and pipe elbows where possible.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><div class="code-block code-block-6 ai-viewport-1" data-dcnode-id="1556" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1565" instrument_node="">
</span><span data-dcnode-id="1563" instrument_node="">
</span><span data-dcnode-id="1561" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-slot="3491546856" data-dcnode-id="1560" style="display:inline-block;width:468px;height:60px"></ins><span data-dcnode-id="1559" instrument_node="">
</span></div><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553" style="text-align: justify;"><img alt="turbulent ﬂow" class="aligncenter wp-image-22366 size-full" data-dcnode-id="1554" height="366" sizes="(max-width: 930px) 100vw, 930px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/turbulent-%25EF%25AC%2582ow.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/turbulent-ﬂow.jpg 930w, https://instrumentationtools.com/wp-content/uploads/2018/01/turbulent-ﬂow-420x165.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/turbulent-ﬂow-768x302.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/turbulent-ﬂow-720x283.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/turbulent-ﬂow-20x8.jpg 20w" title="turbulent ﬂow" width="930"></p><div data-dcnode-id="1551" data-inserter-version="2" id="ezoic-pub-ad-placeholder-112"></div><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1544" style="text-align: justify;"><span data-dcnode-id="1548" instrument_node="">Even disturbances located downstream of the </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/dp-flow-transmitter-for-level-measurement/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1547" instrument_node="">ﬂow element</span></a><span data-dcnode-id="1545" instrument_node=""> may aﬀect measurement accuracy if the disturbances are severe enough and/or close enough to the ﬂow element.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541" style="text-align: justify;"><span data-dcnode-id="1542" instrument_node="">Unfortunately, both upstream and downstream ﬂow disturbances are unavoidable on all but the simplest ﬂuid systems.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538" style="text-align: justify;"><span data-dcnode-id="1539" instrument_node="">This means we must devise ways to stabilize a ﬂow stream’s velocity proﬁle near the ﬂow element in order to achieve accurate measurements of ﬂow rate.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535" style="text-align: justify;"><span data-dcnode-id="1536" instrument_node="">A very simple and eﬀective way to stabilize a ﬂow proﬁle is to provide adequate lengths of straight pipe ahead of (and behind) the ﬂow element.</span></p><div data-dcnode-id="1533" data-inserter-version="2" id="ezoic-pub-ad-placeholder-113"></div><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529" style="text-align: justify;"><span data-dcnode-id="1530" instrument_node="">Given enough time, even the most chaotic ﬂow stream will “settle down” to a symmetrical proﬁle all on its own.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526" style="text-align: justify;"><span data-dcnode-id="1527" instrument_node="">The following illustration shows the eﬀect of a pipe elbow on a ﬂow stream, and how the velocity proﬁle returns to a normal (symmetrical) form after traveling through a suﬃcient length of straight pipe:</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523" style="text-align: justify;"><img alt="Flow Meter Installation" class="aligncenter wp-image-22367 size-full" data-dcnode-id="1524" height="281" sizes="(max-width: 1281px) 100vw, 1281px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation.jpg 1281w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-420x92.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-768x168.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-720x158.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-20x4.jpg 20w" title="Flow Meter Installation" width="1281"></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520" style="text-align: justify;"><span data-dcnode-id="1521" instrument_node="">Recommendations for minimum upstream and downstream straight-pipe lengths vary signiﬁcantly with the nature of the turbulent disturbance, piping geometry, and ﬂow element.</span></p><div data-dcnode-id="1518" data-inserter-version="2" id="ezoic-pub-ad-placeholder-114"></div><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514" style="text-align: justify;"><span data-dcnode-id="1515" instrument_node="">As a general rule, elements having a smaller beta ratio (ratio of throat diameter d to pipe diameter D) are more tolerant of disturbances, with proﬁled ﬂow devices (e.g. venturi tubes, ﬂow tubes, V-cones) having the greatest tolerance (Note).</span></p><span data-dcnode-id="1513" instrument_node="">
</span><div class="code-block code-block-6 ai-viewport-1" data-dcnode-id="1503" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1512" instrument_node="">
</span><span data-dcnode-id="1510" instrument_node="">
</span><span data-dcnode-id="1508" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-slot="3491546856" data-dcnode-id="1507" style="display:inline-block;width:468px;height:60px"></ins><span data-dcnode-id="1506" instrument_node="">
</span></div><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1497" style="text-align: justify;"><span data-dcnode-id="1501" instrument_node="">Ultimately, you should consult the ﬂow element manufacturer’s </span><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/alarm-trip-documentation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1500" instrument_node="">documentation</span></a><span data-dcnode-id="1498" instrument_node=""> for a more detailed recommendation appropriate to any speciﬁc application.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494" style="text-align: justify;"><span data-dcnode-id="1495" instrument_node="">In applications where suﬃcient straight-run pipe lengths are impractical, another option exists for “taming” turbulence generated by piping disturbances.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491" style="text-align: justify;"><span data-dcnode-id="1492" instrument_node="">Devices called ﬂow conditioners may be installed upstream of the ﬂow element to help the ﬂow proﬁle achieve symmetry in a far shorter distance than simple straight pipe could do alone.</span></p><div data-dcnode-id="1489" data-inserter-version="2" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485" style="text-align: justify;"><span data-dcnode-id="1486" instrument_node="">Flow conditioners take the form of a series of tubes or vanes installed inside the pipe, parallel to the direction of ﬂow.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1481" style="text-align: justify;"><span data-dcnode-id="1483" instrument_node="">These tubes or vanes force the ﬂuid molecules to travel in straighter paths, thus stabilizing the ﬂowstream prior to entering a ﬂow element:</span><img alt="Flow Meter Conditioner" class="aligncenter wp-image-22368 size-full" data-dcnode-id="1482" height="258" sizes="(max-width: 1244px) 100vw, 1244px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1.jpg 1244w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1-420x87.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1-768x159.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1-720x149.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Installation-1-20x4.jpg 20w" title="Flow Meter Conditioner" width="1244"></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478" style="text-align: justify;"><span data-dcnode-id="1479" instrument_node="">Note :&nbsp;Flow elements with low beta ratio values tolerate greater disturbance in the ﬂow pattern because they accelerate the ﬂowstream to a greater degree.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1472" style="text-align: justify;"><span data-dcnode-id="1476" instrument_node="">This may be best visualized by a thought experiment where we imagine an oriﬁce plate with a very large beta ratio (i.e. one where the bore size is nearly as large as the pipe diameter): such an </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/orifice-plates/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1475" instrument_node="">oriﬁce plate</span></a><span data-dcnode-id="1473" instrument_node=""> would hardly accelerate the ﬂuid at all, which would mean a mis-shapen ﬂow proﬁle entering the bore would probably remain mis-shapen exiting it.</span></p><div data-dcnode-id="1470" data-inserter-version="2" id="ezoic-pub-ad-placeholder-116"></div><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466" style="text-align: justify;"><span data-dcnode-id="1467" instrument_node="">The acceleration imparted to a ﬂowstream by a low-beta element tends to overshadow any asymmetries in the ﬂow proﬁle.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463" style="text-align: justify;"><span data-dcnode-id="1464" instrument_node="">However, there are disadvantages to using low-beta elements, one of them being increased permanent pressure loss which may translate to increased operating costs due to energy loss.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><h2 data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Flow Meter Installation</span></h2><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1454" style="text-align: justify;"><span data-dcnode-id="1458" instrument_node="">This next photograph shows a very poor </span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/orifice-plates/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1457" instrument_node="">oriﬁce plate</span></a><span data-dcnode-id="1455" instrument_node=""> installation, where the straight-run pipe requirements were completely ignored:</span></p><span data-dcnode-id="1453" instrument_node="">
</span><div class="code-block code-block-6 ai-viewport-1" data-dcnode-id="1443" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1452" instrument_node="">
</span><span data-dcnode-id="1450" instrument_node="">
</span><span data-dcnode-id="1448" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-slot="3491546856" data-dcnode-id="1447" style="display:inline-block;width:468px;height:60px"></ins><span data-dcnode-id="1446" instrument_node="">
</span></div><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440" style="text-align: justify;"><img alt="Wrong Orifice Installation" class="aligncenter wp-image-22370 size-full" data-dcnode-id="1441" height="601" sizes="(max-width: 947px) 100vw, 947px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation.jpg 947w, https://instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation-420x267.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation-768x487.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation-720x457.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/Wrong-Orifice-Installation-20x13.jpg 20w" title="Wrong Orifice Installation" width="947"></p><div data-dcnode-id="1438" data-inserter-version="2" id="ezoic-pub-ad-placeholder-117"></div><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434" style="text-align: justify;"><span data-dcnode-id="1435" instrument_node="">Not only is the oriﬁce plate placed much too close to an elbow, the elbow happens to be on the upstream side of the oriﬁce plate, where disturbances have the greatest eﬀect!</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431" style="text-align: justify;"><span data-dcnode-id="1432" instrument_node="">The saving grace of this installation is that it is not used for critical monitoring or control: it is simply a manual indication of air ﬂow rate where accuracy is not terribly important.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428" style="text-align: justify;"><span data-dcnode-id="1429" instrument_node="">Nevertheless, it is sad to see how an oriﬁce meter installation could have been so easily improved with just a simple re-location of the oriﬁce plate along the piping length.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425" style="text-align: justify;"><span data-dcnode-id="1426" instrument_node="">Poor installations such as this are surprisingly common, owing to the ignorance many piping designers have of ﬂowmeter design and operating principles.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422" style="text-align: justify;"><span data-dcnode-id="1423" instrument_node="">Of all the criteria which must be balanced when designing a piping layout, optimum ﬂowmeter location is often placed low in the order of importance (if it appears at all!).</span></p><div data-dcnode-id="1420" data-inserter-version="2" id="ezoic-pub-ad-placeholder-118"></div><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416" style="text-align: justify;"><span data-dcnode-id="1417" instrument_node="">In applications where accuracy is important, ﬂowmeter location needs to be a very high priority even if it means a more expensive, cumbersome, and/or unattractive piping design.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1410" style="text-align: justify;"><span data-dcnode-id="1414" instrument_node="">Another common source of trouble for </span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/pressure-based-flowmeters/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1413" instrument_node="">pressure-based ﬂowmeters</span></a><span data-dcnode-id="1411" instrument_node=""> is improper transmitter location.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407" style="text-align: justify;"><span data-dcnode-id="1408" instrument_node="">Here, the type of process ﬂuid ﬂow being measured dictates how the pressure-sensing instrument should be located in relation to the pipe.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404" style="text-align: justify;"><span data-dcnode-id="1405" instrument_node="">For gas and vapor ﬂows, it is important that no stray liquid droplets collect in the impulse lines leading to the transmitter, lest a vertical liquid column begin to collect in those lines and generate an error-producing pressure.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><div class="code-block code-block-6 ai-viewport-1" data-dcnode-id="1393" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1402" instrument_node="">
</span><span data-dcnode-id="1400" instrument_node="">
</span><span data-dcnode-id="1398" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-slot="3491546856" data-dcnode-id="1397" style="display:inline-block;width:468px;height:60px"></ins><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390" style="text-align: justify;"><span data-dcnode-id="1391" instrument_node="">For liquid ﬂows, it is important that no gas bubbles collect in the impulse lines, or else those bubbles may displace liquid from the lines and thereby cause unequal vertical liquid columns, which would (again) generate an error-producing diﬀerential pressure.</span></p><div data-dcnode-id="1388" data-inserter-version="2" id="ezoic-pub-ad-placeholder-119"></div><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1381" style="text-align: justify;"><span data-dcnode-id="1385" instrument_node="">In order to let gravity do the work of preventing these problems, we must locate the </span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/4-20ma-transmitter-works/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1384" instrument_node="">transmitter</span></a><span data-dcnode-id="1382" instrument_node=""> above the pipe for gas ﬂow applications and below the pipe for liquid ﬂow applications.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378" style="text-align: justify;"><span data-dcnode-id="1379" instrument_node="">This illustration shows both installations for a horizontal pipe:</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375" style="text-align: justify;"><img alt="Flow Meter Hook Up" class="aligncenter wp-image-22371 size-full" data-dcnode-id="1376" height="583" sizes="(max-width: 852px) 100vw, 852px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up.jpg 852w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up-420x287.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up-768x526.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up-720x493.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Meter-Hook-Up-20x14.jpg 20w" title="Flow Meter Hook Up" width="852"></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372" style="text-align: justify;"><span data-dcnode-id="1373" instrument_node="">This next illustration shows both installations on a vertical pipe:</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369" style="text-align: justify;"><img alt="Flow Transmitter Hook Up" class="aligncenter wp-image-22372 size-full" data-dcnode-id="1370" height="593" sizes="(max-width: 1077px) 100vw, 1077px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up.jpg&amp;raw" srcset="https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up.jpg 1077w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up-420x231.jpg 420w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up-768x423.jpg 768w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up-720x396.jpg 720w, https://instrumentationtools.com/wp-content/uploads/2018/01/Flow-Transmitter-Hook-Up-20x11.jpg 20w" title="Flow Transmitter Hook Up" width="1077"></p><div data-dcnode-id="1367" data-inserter-version="2" id="ezoic-pub-ad-placeholder-120"></div><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363" style="text-align: justify;"><span data-dcnode-id="1364" instrument_node="">Condensible vapor applications (such as steam ﬂow measurement) have traditionally been treated similarly to liquid measurement applications.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1357" style="text-align: justify;"><span data-dcnode-id="1361" instrument_node="">Here, condensed liquid will collect in the transmitter’s </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instrumentationtools.com/pressure-transmitters-filled-impulse-lines/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1360" instrument_node="">impulse lines</span></a><span data-dcnode-id="1358" instrument_node=""> so long as the impulse lines are cooler than the vapor ﬂowing through the pipe (which is typically the case).</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354" style="text-align: justify;"><span data-dcnode-id="1355" instrument_node="">Placing the transmitter below the pipe allows vapors to condense and ﬁll the impulse lines with liquid (condensate), which then acts as a natural seal protecting the transmitter from exposure to hot process vapors.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351" style="text-align: justify;"><span data-dcnode-id="1352" instrument_node="">In such applications it is important for the technician to pre-ﬁll both impulse lines with condensed liquid prior to placing the ﬂowmeter into service.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><div class="code-block code-block-6 ai-viewport-1" data-dcnode-id="1340" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1349" instrument_node="">
</span><span data-dcnode-id="1347" instrument_node="">
</span><span data-dcnode-id="1345" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5952967207788486" data-ad-slot="3491546856" data-dcnode-id="1344" style="display:inline-block;width:468px;height:60px"></ins><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337" style="text-align: justify;"><span data-dcnode-id="1338" instrument_node="">“Tee” ﬁttings with removable plugs or ﬁll valves are provided to do this. Failure to pre-ﬁll the impulse lines will likely result in measurement errors during initial operation, as condensed vapors will inevitably ﬁll the impulse lines at slightly diﬀerent rates and cause a diﬀerence in vertical liquid column heights within those lines.</span></p><div data-dcnode-id="1335" data-inserter-version="2" id="ezoic-pub-ad-placeholder-121"></div><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331" style="text-align: justify;"><span data-dcnode-id="1332" instrument_node="">It should be noted that some steam ﬂow element installations, however, will work well if the impulse lines are above the pipe.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328" style="text-align: justify;"><span data-dcnode-id="1329" instrument_node="">If such an installation is possible, the advantage of not having to deal with pre-ﬁlling impulse lines (or waiting for steam to condense to equal levels in both lines) are signiﬁcant.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325" style="text-align: justify;"><span data-dcnode-id="1326" instrument_node="">If tap holes must be drilled into the pipe (or ﬂanges) at the process site, great care must be taken to properly drill and de-burr the holes.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322" style="text-align: justify;"><span data-dcnode-id="1323" instrument_node="">A pressure-sensing tap hole should be ﬂush with the inner pipe wall, with no rough edges or burrs to create turbulence.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319" style="text-align: justify;"><span data-dcnode-id="1320" instrument_node="">Also, there should be no reliefs or countersinking near the hole on the inside of the pipe. Even small irregularities at the tap holes may generate surprisingly large ﬂow-measurement errors.</span></p><div data-dcnode-id="1317" data-inserter-version="2" id="ezoic-pub-ad-placeholder-122"></div><span data-dcnode-id="1315" instrument_node="">
