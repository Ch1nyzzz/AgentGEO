</span><article class="et_pb_post post-36304 post type-post status-publish format-standard has-post-thumbnail hentry category-balkan-university tag-standpipe-connections tag-standpipe-system" data-dcnode-id="436" id="post-36304"><span data-dcnode-id="863" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="854"><span data-dcnode-id="862" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Everything You Need to Know About a Standpipe Connection for Fire Protection</span></h1><span data-dcnode-id="859" instrument_node="">
</span><p class="post-meta" data-dcnode-id="856"><span class="published" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Oct 12, 2021</span></span></p><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span><div class="entry-content" data-dcnode-id="441"><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">A standpipe connection can be a lifesaver in case of a fire. Firefighters rely on standpipe connections to save lives and minimize property damage. The end result is that standpipes are an excellent innovation. They enable firefighters to suppress fires even when they break out on high-rise buildings.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">The Committee on Standpipe and Hose Systems first </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qrfs.com/blog/90-standpipe-systems-part-1-fire-protection-standpipe-system-overview-and-introduction-to-nfpa-14/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="847" instrument_node="">codified standpipes</span></a><span data-dcnode-id="845" instrument_node=""> in 1914. This innovation came about when skyscrapers were beginning to dominate the construction industry. Skyscrapers and hi-rise buildings created a safety challenge for firefighters. Firefighters now needed solutions for combating fires on upper floors.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">In 1915, the National Fire Protection Association (NFPA) adopted the standpipe code. It remains the basis of the current NFPA 14. NFPA 14 contains the Standards for the Installation of Standpipes and Hose Systems. But you probably do not know what a standpipe system is. Let’s define it for you.</span></p><span data-dcnode-id="840" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-vimeo wp-block-embed-vimeo wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="601"><div class="wp-block-embed__wrapper" data-dcnode-id="602"><span data-dcnode-id="839" instrument_node="">

</span></div></figure><span data-dcnode-id="600" instrument_node="">
</span><h2 data-dcnode-id="597" id="h-what-is-a-standpipe-system"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">What is a Standpipe System?</span></strong></h2><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Inside the structure of a building a standpipe is a collection of piping, hose connections, valves, as well as accompanying equipment. Their sole purpose is to help extinguish a fire to protect lives and property. The positioning of the hose connection allows water to be discharged in spray patterns or streams once the hoses as well as nozzles are connected.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The standpipe system also has numerous outlets located on each floor of a building. This enables firefighters to reach all the areas in a building. However, they are designed differently to accommodate various fire safety needs of property owners and firefighters. Read on to learn about the different classes of standpipes systems.</span></p><span data-dcnode-id="590" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="578"><picture class="wp-image-36314" data-dcnode-id="584"><span data-dcnode-id="589" instrument_node="">
</span><source data-dcnode-id="588" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) and (max-width: 1280px) 1280px, (min-width: 1281px) 1600px, 100vw" data-lazy-srcset="https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe.jpg.webp 1600w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-1280x960.jpg.webp 1280w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-980x735.jpg.webp 980w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-480x360.jpg.webp 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) and (max-width: 1280px) 1280px, (min-width: 1281px) 1600px, 100vw" srcset="https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe.jpg.webp 1600w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-1280x960.jpg.webp 1280w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-980x735.jpg.webp 980w, https://www.balkanplumbing.com/wp-content/uploads/fire-standpipe-480x360.jpg.webp 480w" type="image/webp"><span data-dcnode-id="587" instrument_node="">

</span><h2 data-dcnode-id="574" id="h-classes-of-standpipes-systems"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Classes of Standpipes Systems</span></strong></h2><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="570" id="h-class-i-standpipe-systems"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Class I Standpipe Systems</span></strong></h3><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="565"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//femalifesafety.org/fire-equipment/fire-hose-cabinet-and-valve/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="568" instrument_node="">These systems are restricted for use by professional firefighters</span></a><span data-dcnode-id="566" instrument_node=""> as they release water under high pressure that may be hard for an inexperienced person to control. Their outlets are usually installed within building stairwells.&nbsp;</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Firefighters usually carry a unique hose to attach to class I standpipe connections. In most places, you can fit a 2.5″ hose. However, in New York and San Francisco, you can fit a 3″ hose to your class 1 standpipe.&nbsp;</span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="558" id="h-class-ii-standpipe-systems"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Class II Standpipe Systems</span></strong></h3><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">They are common on hallways of buildings, mostly accommodating a 1.5″ hose. They are easy to operate and can be accessed and used by anybody. However, property owners are increasingly shunning them. There has been a heightened safety risk of inexperienced people trying to use them to put out fires and getting hurt in the process. As a result, they mostly exist on old buildings, with new building owners preferring&nbsp;</span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balkanplumbing.com/domestic-fire-sprinklers-types-purpose-history/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="555" instrument_node="">domestic fire sprinklers</span></a><span data-dcnode-id="553" instrument_node="">.</span></p><span data-dcnode-id="551" instrument_node="">
</span><h3 data-dcnode-id="548" id="h-class-iii-standpipe-systems"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Class III Standpipe Systems</span></strong></h3><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">This is a hybrid of class I and Class II standpipe systems. They have permanently fixed 1.5″ hoses for use by inexperienced firefighters. And 2.5″ hose connections where professional firefighters attach their hoses. Some Class III systems have 2.5″ connections and reducers with 1.5″ hoses permanently attached. But some do not include the permanent 1.5″ hose.</span></p><span data-dcnode-id="544" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="534"><picture class="wp-image-36310" data-dcnode-id="538"><span data-dcnode-id="543" instrument_node="">
</span><source data-dcnode-id="542" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1183px, 100vw" data-lazy-srcset="https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections.jpg.webp 1183w, https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections-980x735.jpg.webp 980w, https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections-480x360.jpg.webp 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1183px, 100vw" srcset="https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections.jpg.webp 1183w, https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections-980x735.jpg.webp 980w, https://www.balkanplumbing.com/wp-content/uploads/standpipe-connections-480x360.jpg.webp 480w" type="image/webp"><span data-dcnode-id="541" instrument_node="">

&lt;/picture&gt;
</span></noscript></figure><span data-dcnode-id="533" instrument_node="">
</span><h2 data-dcnode-id="530" id="h-how-are-standpipes-fed-water"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">How are Standpipes Fed Water?</span></strong></h2><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Standpipes are essential for delivering water in an emergency. You can install a standpipe and fill it with water or leave it dry. However, you must carry out a pre-incident assessment to ensure your components, including the water pump, are in place and working. Here are the types of standpipes you can use when fighting a fire.</span></p><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="523" id="h-wet-system"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Wet System</span></strong></h3><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">It has constant water and consistent water pressure. This system is permanently fixed to a reliable water supply with a manual regulating valve.</span></p><span data-dcnode-id="519" instrument_node="">
</span><h3 data-dcnode-id="516" id="h-manual-dry-systems"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Manual Dry Systems</span></strong></h3><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">The pipes in this system contain no water or air. Firefighters use a fire apparatus to feed them with water.</span></p><span data-dcnode-id="512" instrument_node="">
</span><h3 data-dcnode-id="509" id="h-automatic-dry-standpipes"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Automatic Dry Standpipes</span></strong></h3><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">They are filled with water to maintain constant pressure. You release the air in the system when you connect the hose in an emergency and replace it with water.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="502" id="h-semi-automatic-dry-standpipe"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Semi-Automatic Dry Standpipe</span></strong></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">This system stores pressurized or unpressurized air in the pipes. When you activate the manual pull station or electrical switch, water flows in as the air escapes from the far end.</span></p><span data-dcnode-id="498" instrument_node="">
</span><h2 data-dcnode-id="495" id="h-maintaining-and-testing-standpipe-systems"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Maintaining and Testing Standpipe Systems</span></strong></h2><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">After installing your standpipe, you want to test it to ensure it can deliver water effectively in an emergency. Testing is also done after a major modification of a structure.Testing is also essential during the demolition of a building. This initial testing done on the new or modified building is referred to as acceptance testing. Let’s explore the two testing requirements here:</span></p><span data-dcnode-id="491" instrument_node="">
</span><h3 data-dcnode-id="488" id="h-acceptance-testing"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Acceptance Testing</span></strong></h3><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Standpipe acceptance testing is done sequentially, beginning with the underground components and proceeding to the subsequent levels. Testing underground standpipe components helps the contractor identify faults like blockage or leakages. It also helps them repair the underground parts to avoid compromising the effectiveness of the system components on higher levels.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">During underground testing, debris is flushed from the system to avoid blockage. A hydrostatic test then follows to ensure there are no breakages, leakages, as well as pressure loss. The hydrostatic test should run for about 2 hours as you pump water from the lowest point and monitor the pressure.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="477"><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D25" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="480" instrument_node="">NPFA 25 regulations</span></a><span data-dcnode-id="478" instrument_node="">&nbsp;allow a pressure loss of up to 5psi as you may not tighten joints to avoid small leaks. If the pressure drops beyond that, there could be another problem.</span></p><span data-dcnode-id="476" instrument_node="">
</span><h3 data-dcnode-id="473" id="h-above-ground-testing"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Above-Ground Testing</span></strong></h3><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">You can do your above-ground testing immediately after the underground test. Here, you also begin by flushing debris from the components. Follow this with a hydrostatic test for leaks and pressure loss.&nbsp;</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">This involves capping all the outlets and running pressurized water through the standpipe system for about 2 hours. For best results, pump water from the lowest point in every zone and monitor the gauge consistently for any pressure drop.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Above-ground hydrostatic testing doesn’t allow pressure loss. Unlike in underground testing where a small margin of pressure loss is acceptable. Test the connections to ensure they are compatible with your local authority hose type specifications.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">You should also test if the system delivers water to the furthest point of the structure. Class I and III require a 100psi pressure at the most remote point, while class II systems require a 65psi to the same point.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Test if the pressure reducing parts work as intended and that the valves are open. Use the initial test as your benchmark for pressure reading you will use in maintenance testing. The process for maintenance testing will be similar, identifying and replacing faulty components.</span></p><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="455" id="h-how-we-can-help"><span data-dcnode-id="456" instrument_node="">How We Can Help</span></h2><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="453" instrument_node="">Are you looking for a plumbing company to install a new fire service main, or upgrade an existing fire main? Reach out to&nbsp;</span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balkanplumbing.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="452" instrument_node="">Balkan Sewer and Water Main</span></a><span data-dcnode-id="450" instrument_node="">. Having a professionally installed fire service main is perhaps the vital component to ensure a properly functioning standpipe connection.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">We are the largest and most trusted sewer and water Main Service company in New York City, with a record of about 80,000 completed projects.&nbsp;</span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balkanplumbing.com/contact-balkan-plumbing/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="446" instrument_node="">Contact us</span></a><span data-dcnode-id="444" instrument_node="">&nbsp;to discuss your water and sewer project.</span></p><span data-dcnode-id="442" instrument_node="">
