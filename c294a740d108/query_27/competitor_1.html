sents unique challenges.&nbsp; Often, the structure is lacking power for fire detection and alarm systems, lacks heat for keeping fire sprinkler systems from freezing, and usually does not have a satisfactory water source for fire extinguishment.&nbsp; Working trades may be cutting or welding, providing ignition sources for accumulated building materials or waste.&nbsp; The fire department becomes the primary fire protection means, and to assist their efforts, a dry standpipe is installed.</span></p><h2 data-dcnode-id="325"><span data-dcnode-id="328" instrument_node="">What Is a Dry Standpipe?</span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.net/wp-content/uploads/2018/01/Standpipe-Pac.png"><img alt="" class="size-medium wp-image-1408 alignright" data-dcnode-id="327" height="300" sizes="(max-width: 173px) 100vw, 173px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.net/wp-content/uploads/2018/01/Standpipe-Pac-173x300.png&amp;raw" srcset="https://unitedfiresystems.com/wp-content/uploads/2018/01/Standpipe-Pac-173x300.png 173w, https://unitedfiresystems.com/wp-content/uploads/2018/01/Standpipe-Pac-768x1335.png 768w, https://unitedfiresystems.com/wp-content/uploads/2018/01/Standpipe-Pac-589x1024.png 589w" width="173"></a></h2><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">A dry standpipe is a network of in-place piping allowing connection of a water supply (usually a fire department mobile apparatus known as a pumper) to a dedicated inlet at street level, with hose outlet valves on each floor.&nbsp; Firefighters do not need to drag long hose lengths up stairwells – they simply carry hose to any floor, attach to the hose valve, and proceed to attack the fire.</span></p><h2 data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Why Is This Important?</span></h2><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Firefighters need a reliable water supply for interior attack.&nbsp; Without robust hose streams, firefighters are at serious risk inside a burning structure.&nbsp;&nbsp; In most completed and occupied structures, a wet standpipe is present, (always filled with water, and supported by connection to mains and building fire pumps.</span></p><h2 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">What Happens if a Standpipe is Impaired?</span></h2><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Interfering with the integrity of the pipe (by damaging or actually removing a section), or tampering with hose valves, will impair the proper use of the standpipe. With wet standpipes, impairment is immediately obvious – there is an immediate and obvious water discharge.&nbsp; However, there is no water in a dry standpipe.&nbsp; Impairment is likely to be overlooked until firefighters fail to receive water as expected – and now their risk is greatly increased.&nbsp; Firefighters have been killed in incidents directly related to dry standpipe impairment.&nbsp; A way to know that impairment has occurred is vital to primary fire protection in buildings relying on dry standpipes.</span></p><h2 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Can Impairment of Dry Standpipes Be Avoided?</span></h2><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Avoiding all accidental or deliberate dry standpipe impairments is not possible, But, installation of a method to supervise the status of the dry standpipe, and signal the occurrence, allows site safety personnel to act – closing down dangerous operations, moving workers to other areas, and initiating immediate repairs.</span></p><h2 data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Can Dry Standpipes Be Supervised?</span></h2><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Yes.&nbsp; Filling dry standpipes with pressurized air – instead of pressurized water – and then automatically monitoring the air pressure can accomplish the objective.&nbsp; When pipe is damaged, or when a hose valve is accidentally or deliberately opened, a signal will warn site safety personnel and action can be taken.</span></p><h2 data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">What Should I Know About Dry Standpipe Supervision?</span></h2><ol data-dcnode-id="296"><li data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Your local jurisdiction may have adopted, or is considering adopting, a law requiring dry standpipe supervision. The specifics can vary.</span></li><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The reliability and compatibility of all supervision components is vital. The pressure source (usually an air compressor) and its controls, the pressure indicators and sensors, and the signals must all be chosen carefully to work together properly as expected.</span></li><li data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Even in the absence of a local law or requirement, site safety personnel that provide dry standpipe supervision can realize a pay off in the event of a fire emergency. Your fire department will be able to provide water quickly and reliably, minimizing both fire damage and water discharge duration.</span></li><li data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Local jurisdictions, including fire departments and building departments, should consider implanting proper requirements for standpipe supervision. New York and Boston have implemented effective laws, defining system requirements to benefit of all stakeholders.</span></li></ol><h2 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">What Should I Do?</span></h2><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">While you could try to put together an assortment of untested and untried components, there is a better way.&nbsp; UNITED Fire Systems has developed STANDPIPE-PAC™, a system specifically engineered to provide all requirements and is easy to specify, install and maintain.</span></p><h2 data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">What Is STANDPIPE-PAC™?</span></h2><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">STANDPIPE-PAC™ consists of expertly chosen and assembled components, including:</span></p><ul data-dcnode-id="269"><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">An air compressor specifically sized for your standpipe’s pressurization requirements.</span></li><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Compressor controls to ensure proper and cost effective compressor operation.</span></li><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Built-in air drying to avoid water in your standpipe – after all, the idea is to keep the dry standpipe dry.</span></li><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Pressure sensors factory-adjusted to signal impairment at the proper time.</span></li><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">A signaling unit and horn with dedicated power supply to sound the impairment signal.</span></li><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Components permitting easy and quick testing and maintenance.</span></li><li data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">All components factory-assembled AND TESTED for proper operation immediately.</span></li><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Only two (2) connections – 115 VAC power and pressure out to standpipe.</span></li><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Simply connect and commission – and you are in compliance with your local law or providing the best possible supervision even without a local requirement.</span></li></ul><h2 data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">What’s the Next Step?</span></h2><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">UNITED Fire Systems wants to help you with what you need – whether it’s complying with your local law, writing a specification, understanding what to consider when preparing &nbsp;an effective law, or providing the best choice when you decide for yourself&nbsp; to install this vital protection</span></p><p data-dcnode-id="262"><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.net/standpipepac"><img alt="" class="aligncenter size-full wp-image-439" data-dcnode-id="264" height="175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.net/wp-content/uploads/2017/08/standpipe-product.jpg&amp;raw" width="225"></a></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Click above for more information on the products that will help protect your building from fire during construction.</span></p><p data-dcnode-id="256"><a data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedfiresystems.net/contact-us"><span data-dcnode-id="259" instrument_node="">Contact us</span></a><span data-dcnode-id="257" instrument_node="">&nbsp;and we’ll help you make the best choice.</span></p></div></div><div class="col-md-4" data-dcnode-id="151"><div class="sub-right-section" data-dcnode-id="152"><div class="subpage-form" data-dcnode-id="172"><div class="contact-heading" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Contact Our Team</span></div><div class="sidebar-form" data-dcnode-id="173"><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">You're looking for expertise and quality. That's where we come in.</span></p><span data-dcnode-id="249" instrument_node=""> </span>
