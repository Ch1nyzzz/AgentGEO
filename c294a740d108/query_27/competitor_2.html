</span><div class="inner-page" data-dcnode-id="529"><span data-dcnode-id="1004" instrument_node="">

</span><div class="panel-layout" data-dcnode-id="533" id="pl-310"><div class="panel-grid panel-no-style" data-dcnode-id="729" id="pg-310-0"><div class="panel-grid-cell" data-dcnode-id="730" id="pgc-310-0-0"><div class="so-panel widget widget_text panel-first-child" data-dcnode-id="962" data-index="0" id="panel-310-0-0-0"><div class="tablist panel-widget-style panel-widget-style-for-310-0-0-0" data-dcnode-id="963"><span data-dcnode-id="1001" instrument_node=""> </span><div class="textwidget" data-dcnode-id="965"><ul data-dcnode-id="967"><span data-dcnode-id="1000" instrument_node="">
</span><li data-dcnode-id="997"><a data-dcnode-id="998" href="#overview"><span data-dcnode-id="999" instrument_node="">Overview</span></a></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="993"><a data-dcnode-id="994" href="#standpipes"><span data-dcnode-id="995" instrument_node="">Classes of Standpipes</span></a></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="989"><a data-dcnode-id="990" href="#properuse"><span data-dcnode-id="991" instrument_node="">Proper Use</span></a></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="985"><a data-dcnode-id="986" href="#inspection"><span data-dcnode-id="987" instrument_node="">Inspection &amp; Maintenance</span></a></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="981"><a data-dcnode-id="982" href="#webinar"><span data-dcnode-id="983" instrument_node="">Pressure Reducing Valves Webinar</span></a></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="977"><a data-dcnode-id="978" href="#quiz"><span data-dcnode-id="979" instrument_node="">Standpipe Quiz</span></a></li><span data-dcnode-id="976" instrument_node="">
</span><li data-dcnode-id="973"><a data-dcnode-id="974" href="#nfographics"><span data-dcnode-id="975" instrument_node="">Infographics</span></a></li><span data-dcnode-id="972" instrument_node="">
</span><li data-dcnode-id="969"><a data-dcnode-id="970" href="#videos"><span data-dcnode-id="971" instrument_node="">Videos</span></a></li><span data-dcnode-id="968" instrument_node="">
</span></ul><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span></div></div><div class="so-panel widget widget_text" data-dcnode-id="925" data-index="1" id="panel-310-0-0-1"><div class="section first panel-widget-style panel-widget-style-for-310-0-0-1" data-dcnode-id="926" id="overview"><h3 class="widget-title" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">About Standpipe Fire Hose Stations</span></h3><span data-dcnode-id="959" instrument_node=""> </span><div class="textwidget" data-dcnode-id="928"><p data-dcnode-id="954"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Standpipe fire hose stations provide quick response during the first few minutes.</span></strong><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">
Standpipe and rack hose systems provide means for manual application of water to fires in buildings. They do not take the place of automatic extinguishing systems, which are important in large buildings.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Quick Suppression</span></strong><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
Standpipe hose systems can be effectively used in the incipient stage (after everyone is safe and the fire department has been called), often extinguishing the fire before automatic systems can activate.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">One Person Operation</span></strong><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
Standpipe hose systems are activated and operated by one person, and do not depend on heat, smoke or flame to spread before water is applied to the fire. This manual equipment provides total reliability in case automatic systems fail.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="936"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Minimal Water Damage</span></strong><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
Standpipe hose systems can minimize water damage since water can be applied directly at the base of the fire versus indiscriminate spray from automatic systems. Additionally, the hose systems can be turned off immediately.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="930"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Occupancy Safety &amp; Rescue</span></strong><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
Standpipe hose systems can be used to allow time for evacuation, protect a means of egress, or defend occupants who cannot evacuate the building.</span></p><span data-dcnode-id="929" instrument_node="">
</span></div><span data-dcnode-id="927" instrument_node="">
</span></div></div><div class="so-panel widget widget_text" data-dcnode-id="894" data-index="2" id="panel-310-0-0-2"><div class="Marbtm section panel-widget-style panel-widget-style-for-310-0-0-2" data-dcnode-id="895" id="standpipes"><h3 class="widget-title" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Classes of Standpipes</span></h3><span data-dcnode-id="922" instrument_node=""> </span><div class="textwidget" data-dcnode-id="897"><h4 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The Three Types of Standpipe Systems</span></h4><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="918" instrument_node="">&nbsp;</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
</span><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Class I Systems</span></strong><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
Class I Systems [2-1/2″ (64mm) hose connections] are provided for use by fire departments and those trained in handling heavy water streams. In high rise buildings without sprinklers and beyond the reach of fire department ladders, Class I systems provide water supply for the primary means of firefighting, i.e. manually.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="905"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Class II Systems</span></strong><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
Class II Systems [1-1/2″ (38mm) hose lines] are provided for use by trained building occupants until the fire department arrives.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Class III Systems</span></strong><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
Class III Systems shall provide [1-1/2″ (38mm)] hose stations to supply water for use by trained building occupants and [2-1/2″ (64mm)] hose connections to supply a larger volume of water for use by fire departments and those trained in handling heavy water streams.</span></p><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div></div><div class="so-panel widget widget_text" data-dcnode-id="873" data-index="3" id="panel-310-0-0-3"><div class="Marbtm section panel-widget-style panel-widget-style-for-310-0-0-3" data-dcnode-id="874" id="properuse"><h3 class="widget-title" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Proper Use</span></h3><span data-dcnode-id="891" instrument_node=""> </span><div class="textwidget" data-dcnode-id="876"><h4 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Proper Standpipe Use</span></h4><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="887" instrument_node="">Remember, only fight a fire when:</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
1. The fire department has been called.</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">
2. Everyone is safe.</span><br data-dcnode-id="882"><span data-dcnode-id="881" instrument_node="">
3. The fire is small and does not appear to be spreading.</span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">
4. The fire is not between you and the exit.</span></p><span data-dcnode-id="877" instrument_node="">
</span></div><span data-dcnode-id="875" instrument_node="">
</span></div></div><div class="so-panel widget widget_siteorigin-panels-builder" data-dcnode-id="834" data-index="4" id="panel-310-0-0-4"><div class="panel-layout" data-dcnode-id="835" id="pl-w5f577513b7fa6"><div class="panel-grid panel-no-style" data-dcnode-id="836" id="pg-w5f577513b7fa6-0"><div class="panel-grid-cell" data-dcnode-id="861" id="pgc-w5f577513b7fa6-0-0"><div class="so-panel widget widget_text panel-first-child" data-dcnode-id="866" data-index="0" id="panel-w5f577513b7fa6-0-0-0"><span data-dcnode-id="872" instrument_node=""> </span><div class="textwidget" data-dcnode-id="868"><h4 data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">1. Open valve completely.</span></h4><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span></div><div class="so-panel widget widget_media_image panel-last-child" data-dcnode-id="862" data-index="1" id="panel-w5f577513b7fa6-0-0-1"><img alt="standpipe use 1" class="image wp-image-1547 attachment-full size-full lazyloaded" data-dcnode-id="865" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg" data-srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1-300x85.jpg 300w" height="170" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg&amp;raw" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1-300x85.jpg 300w" style="max-width: 100%; height: auto;" width="600"><noscript data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&lt;img width="600" height="170" src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg" class="image wp-image-1547  attachment-full size-full" alt="standpipe use 1" style="max-width: 100%; height: auto;" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-1-300x85.jpg 300w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></div></div><div class="panel-grid-cell" data-dcnode-id="849" id="pgc-w5f577513b7fa6-0-1"><div class="so-panel widget widget_text panel-first-child" data-dcnode-id="854" data-index="2" id="panel-w5f577513b7fa6-0-1-0"><span data-dcnode-id="860" instrument_node=""> </span><div class="textwidget" data-dcnode-id="856"><h4 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">2. Pull hose entirely off rack (or else water will not flow).</span></h4><span data-dcnode-id="857" instrument_node="">
</span></div><span data-dcnode-id="855" instrument_node="">
</span></div><div class="so-panel widget widget_media_image panel-last-child" data-dcnode-id="850" data-index="3" id="panel-w5f577513b7fa6-0-1-1"><img alt="standpipe use 2" class="image wp-image-1548 attachment-full size-full lazyloaded" data-dcnode-id="853" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg" data-srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2-300x85.jpg 300w" height="170" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg&amp;raw" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2-300x85.jpg 300w" style="max-width: 100%; height: auto;" width="600"><noscript data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">&lt;img width="600" height="170" src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg" class="image wp-image-1548  attachment-full size-full" alt="standpipe use 2" style="max-width: 100%; height: auto;" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-2-300x85.jpg 300w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></div></div><div class="panel-grid-cell" data-dcnode-id="837" id="pgc-w5f577513b7fa6-0-2"><div class="so-panel widget widget_text panel-first-child" data-dcnode-id="842" data-index="4" id="panel-w5f577513b7fa6-0-2-0"><span data-dcnode-id="848" instrument_node=""> </span><div class="textwidget" data-dcnode-id="844"><h4 data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">3. Open nozzle. Water will flow when hose is entirely off rack and nozzle is open.</span></h4><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">
</span></div><div class="so-panel widget widget_media_image panel-last-child" data-dcnode-id="838" data-index="5" id="panel-w5f577513b7fa6-0-2-1"><img alt="standpipe use 3" class="image wp-image-1549 attachment-full size-full lazyloaded" data-dcnode-id="841" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg" data-srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3-300x85.jpg 300w" height="170" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg&amp;raw" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3-300x85.jpg 300w" style="max-width: 100%; height: auto;" width="600"><noscript data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&lt;img width="600" height="170" src="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg" class="image wp-image-1549  attachment-full size-full" alt="standpipe use 3" style="max-width: 100%; height: auto;" srcset="https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3.jpg 600w, https://femalifesafety.org/wp-content/uploads/2020/09/standpipe-use-3-300x85.jpg 300w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></div></div></div></div></div><div class="so-panel widget widget_text" data-dcnode-id="769" data-index="5" id="panel-310-0-0-5"><div class="section panel-widget-style panel-widget-style-for-310-0-0-5" data-dcnode-id="770" id="inspection"><span data-dcnode-id="833" instrument_node=""> </span><div class="textwidget" data-dcnode-id="772"><h3 data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Inspection &amp; Maintenance</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Fire hose stations should usually be inspected or checked every 90 days (or as specified by local AHJ). The business owners or building occupants are responsible for making sure that the fire hose station is regularly checked and maintained. Fire hose stations will not be an effective fire-fighting tool if they are not properly maintained and inspected for quality assurance.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Review the check list below to identify key concerns with the fire equipment and contact local fire authorities if a repair is needed.</span></p><span data-dcnode-id="824" instrument_node="">
</span><ul class="disclist" data-dcnode-id="780"><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Are the operating instructions legible?</span></li><span data-dcnode-id="820" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Does the cabinet appear to be intact with no cracks or breaks in the glass?</span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Is the cabinet door easy to open?</span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">If a locked cabinet is installed, does the lock function properly?</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Will the hose rack swing out at least 90° from the cabinet?</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Are any safety seals broken or missing?</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Is there any obvious damage or corrosion to the hose valve?</span></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Is the valve handle missing?</span></li><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Does the hose appear to be folded neatly on the hose rack?</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Is the hose connected to the rack nipple or valve?</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Is the hose intact with no breaks, holes, or tears?</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Is the hose nozzle missing?</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Are all warning labels and tags free from damage?</span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Are all the valves, hose nozzles, fire extinguishers, etc. easily accessible?</span></li><span data-dcnode-id="781" instrument_node="">
</span></ul><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">Consult </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D25" rel="noopener" target="_blank"><span data-dcnode-id="777" instrument_node="">NFPA 25 Tables 6.1 and 6.22</span></a><span data-dcnode-id="775" instrument_node=""> &nbsp;or your local fire department for more information about standpipe fire hose station inspection and maintenance.</span></p><span data-dcnode-id="773" instrument_node="">
</span></div><span data-dcnode-id="771" instrument_node="">
</span></div></div><div class="so-panel widget widget_text panel-last-child" data-dcnode-id="731" data-index="6" id="panel-310-0-0-6"><div class="section panel-widget-style panel-widget-style-for-310-0-0-6" data-dcnode-id="732" id="webinar"><span data-dcnode-id="768" instrument_node=""> </span><div class="textwidget" data-dcnode-id="734"><h3 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Pressure Reducing Valves: Understanding the Requirements and Impact of Firefighting Operations</span></h3><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Watch an&nbsp;</span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ul.wistia.com/medias/6ddv4253h9%3Fmkt_tok%3DeyJpIjoiTjJOak5EQTJaakprTlRkbSIsInQiOiJcL3Qyc2hqb0JZS1pxQm5qTTdRWEJ0dVhxTDVXTUNUcFJmTFdrSUZaWm0wM3pUeERQUUY4RkZJXC9aNXYzS3VydGhZZUZxR1RmVkZtTkI3VWI5bU9cL2JUd0I5cU1nNFpRWlJtSnpcL1VrS3ZRTWFUdDAzckw4cWs5cU82a0VzYk5CdksifQ%253D%253D" rel="noopener" target="_blank"><span data-dcnode-id="763" instrument_node="">on-demand webinar</span></a><span data-dcnode-id="761" instrument_node=""> to learn about pressure reducing valve (PRV) requirements and see how PRVs impact firefighting operations. The webinar answers the following questions:</span></p><span data-dcnode-id="759" instrument_node="">
</span><ul data-dcnode-id="742"><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">What are pressure reducing valves?</span></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Where are they required?</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Why are they required?</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">How do they operate?</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Are they important to fire suppression operations?</span></li><span data-dcnode-id="743" instrument_node="">
</span></ul><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="740" instrument_node="">The Fire Equipment Manufacturers’ Association participated in this </span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ul.wistia.com/medias/6ddv4253h9%3Fmkt_tok%3DeyJpIjoiTjJOak5EQTJaakprTlRkbSIsInQiOiJcL3Qyc2hqb0JZS1pxQm5qTTdRWEJ0dVhxTDVXTUNUcFJmTFdrSUZaWm0wM3pUeERQUUY4RkZJXC9aNXYzS3VydGhZZUZxR1RmVkZtTkI3VWI5bU9cL2JUd0I5cU1nNFpRWlJtSnpcL1VrS3ZRTWFUdDAzckw4cWs5cU82a0VzYk5CdksifQ%253D%253D" rel="noopener" target="_blank"><span data-dcnode-id="739" instrument_node="">webinar</span></a><span data-dcnode-id="737" instrument_node="">, which was produced by UL in partnership with the International Association of Fire Chiefs and the International Association of Fire Fighters.</span></p><span data-dcnode-id="735" instrument_node="">
</span></div><span data-dcnode-id="733" instrument_node="">
</span></div></div></div></div><div class="panel-grid panel-has-style" data-dcnode-id="720" id="pg-310-1"><div class="section panel-row-style panel-row-style-for-310-1" data-dcnode-id="721"><div class="panel-grid-cell" data-dcnode-id="722" id="pgc-310-1-0"><div class="so-panel widget widget_text panel-first-child panel-last-child" data-dcnode-id="723" data-index="7" id="panel-310-1-0-0"><h3 class="widget-title" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Learn More and Test Your Knowledge</span></h3><span data-dcnode-id="726" instrument_node=""> </span><div class="textwidget" data-dcnode-id="725"></div><span data-dcnode-id="724" instrument_node="">
