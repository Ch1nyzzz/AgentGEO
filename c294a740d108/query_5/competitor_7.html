</span><article about="/assessors-office/pages/veterans-exemption" class="node-116 node node-freeform clearfix" data-dcnode-id="245" role="article" typeof="sioc:Item foaf:Document"><span data-dcnode-id="743" instrument_node="">
</span><header data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">
</span><span class="rdf-meta element-hidden" content="" data-dcnode-id="741" property="dc:title"></span><span class="rdf-meta element-hidden" content="0" data-dcnode-id="740" datatype="xsd:integer" property="sioc:num_replies"></span><span data-dcnode-id="739" instrument_node=""> </span></header><span data-dcnode-id="737" instrument_node="">
</span><div class="content" data-dcnode-id="247"><span data-dcnode-id="736" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="249"><span data-dcnode-id="735" instrument_node="">
</span><ul data-dcnode-id="712"><li data-dcnode-id="731"><a data-dcnode-id="734" id="anchor_top"></a><a data-dcnode-id="732" href="#anchor_clause22"><span data-dcnode-id="733" instrument_node="">Clause 22</span></a></li><li data-dcnode-id="728"><a data-dcnode-id="729" href="#anchor_clause22a"><span data-dcnode-id="730" instrument_node="">Clause 22 A - Disability/Certain Medals</span></a></li><li data-dcnode-id="725"><a data-dcnode-id="726" href="#anchor_clause22b"><span data-dcnode-id="727" instrument_node="">Clause 22 B – Disability</span></a></li><li data-dcnode-id="722"><a data-dcnode-id="723" href="#anchor_clause22c"><span data-dcnode-id="724" instrument_node="">Clause 22 C - Disability/Specially Adaptive Housing</span></a></li><li data-dcnode-id="719"><a data-dcnode-id="720" href="#anchor_clause22d"><span data-dcnode-id="721" instrument_node="">Clause 22 D - Surviving Spouses, Quemoy/Matsu, Died In Combat, Classified As Missing In Action Or Presumed Dead</span></a></li><li data-dcnode-id="716"><a data-dcnode-id="717" href="#anchor_clause22e"><span data-dcnode-id="718" instrument_node="">Clause 22 E - 100% Disability</span></a></li><li data-dcnode-id="713"><a data-dcnode-id="714" href="#anchor_clause22f"><span data-dcnode-id="715" instrument_node="">Clause 22 F - Paraplegic or have a 100% disability for service-connected blindness</span></a></li></ul><hr data-dcnode-id="711"><h5 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Veterans - All qualifications are for July 1</span></h5><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">For the purposes of these clauses, a veteran is determined to be one who:</span></p><ul data-dcnode-id="698"><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Occupies the property (main domicile)</span></li><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Resided in Massachusetts for two years consecutively before filing for this clause.</span></li></ul><p data-dcnode-id="695"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="697" instrument_node="">Click here to download the application for Exemption.</span></a></p><hr data-dcnode-id="694"><h4 data-dcnode-id="691"><a data-dcnode-id="693" id="anchor_clause22"></a><span data-dcnode-id="692" instrument_node="">Clause 22</span></h4><p data-dcnode-id="688"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Requirements:</span></strong></p><ol data-dcnode-id="624"><li data-dcnode-id="677"><span data-dcnode-id="687" instrument_node="">A veteran who:</span><ul data-dcnode-id="678"><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">-Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">-Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">-Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">-Resided in Massachusetts for two years consecutively before filing for this clause.</span></li></ul></li><li data-dcnode-id="625"><span data-dcnode-id="676" instrument_node="">Falls into one of the following classes:</span><ol data-dcnode-id="626"><li data-dcnode-id="672"><span data-dcnode-id="675" instrument_node="">Disability -</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">Soldier/sailor with a disability rating of 10% or more as a result of a service connected disability as of July 1 of the tax year.</span></li><li data-dcnode-id="668"><span data-dcnode-id="671" instrument_node="">Miscellaneous Military Actions -</span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">​Soldier/sailor who served in the Spanish War, the Philippine Insurrection, or the Chinese Relief Expedition.</span></li><li data-dcnode-id="664"><span data-dcnode-id="667" instrument_node="">Purple Heart -</span><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">​Soldier/sailor awarded the Purple Heart.</span></li><li data-dcnode-id="651"><span data-dcnode-id="663" instrument_node="">Spouses/Surviving Spouses -</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">Spouses of veterans covered under this claus</span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">​So Long As:</span><ul data-dcnode-id="652"><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">-Soldier/sailor entitled to exemption at time of death, or</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">-Died while serving in war, insurrections, or expedition, and</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">-Surviving Spouse remains unmarried.</span></li></ul></li><li data-dcnode-id="647"><span data-dcnode-id="650" instrument_node="">"Gold Star” -</span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">Fathers and mothers of deceased veterans killed in action (includes adoptive parents and persons who stood in loco parentis).</span></li><li data-dcnode-id="627"><span data-dcnode-id="646" instrument_node="">World War I Surviving Spouses -</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">Surviving spouses of soldiers/sailors who</span><ol data-dcnode-id="628" start="1" style="list-style-type:decimal"><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">served from 4/6/17 thru 11/11/18 or,</span></li><li data-dcnode-id="629"><span data-dcnode-id="641" instrument_node="">were awarded WWI Victory Medal,</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">So Long As&nbsp;the spouse:</span><ul data-dcnode-id="630"><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Remains unmarried</span></li><li data-dcnode-id="633"><span data-dcnode-id="636" instrument_node="">Resides in Massachusetts for two consecutive years before filing,&nbsp;</span><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">And</span></strong></li><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Whole estate does not exceed $20,000</span></li></ul></li></ol></li></ol></li></ol><p data-dcnode-id="621"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="619" style="margin-left:40px"><span data-dcnode-id="620" instrument_node="">A Certificate of Disability from the Veterans Administration verifying the extent of disability as of July 1 of the tax year.</span></p><p data-dcnode-id="617" style="margin-left:40px"><span data-dcnode-id="618" instrument_node="">Discharge papers (DD214) first time filing.</span></p><p data-dcnode-id="613"><span data-dcnode-id="616" instrument_node="">Note:&nbsp;</span><span data-dcnode-id="614" style="font-size:16px"><span data-dcnode-id="615" instrument_node="">Once exemption has been granted for the classes noted with ** above, documentation is not required for subsequent allowances of the exemption (renewals).</span></span></p><p data-dcnode-id="609"><span data-dcnode-id="612" instrument_node="">Note:&nbsp;</span><span data-dcnode-id="610" style="font-size:16px"><span data-dcnode-id="611" instrument_node="">If husband and wife are both qualifying Clause 22 Veterans, then each&nbsp;are entitled to receive the exemption.</span></span></p><p data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">None, except for class f) above, in which case the whole estate of the existing spouse may not exceed $20,000.</span></p><p data-dcnode-id="601"><em data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The Amount Of Exemption Is $400.00.</span></em></p><p data-dcnode-id="598"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="600" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="595"><a data-dcnode-id="596" href="#anchor_top"><span data-dcnode-id="597" instrument_node="">Back to Top</span></a></p><hr data-dcnode-id="594"><h4 data-dcnode-id="590"><span data-dcnode-id="591" style="font-family:Georgia, &quot;Times New Roman&quot;, Times, serif; font-size:1.31rem"><a data-dcnode-id="593" id="anchor_clause22a"></a><span data-dcnode-id="592" instrument_node="">Clause 22 A - Disability/Certain Medals</span></span></h4><p data-dcnode-id="586"><strong data-dcnode-id="587"><span data-dcnode-id="588" style="font-size:16px"><span data-dcnode-id="589" instrument_node="">Requirements:</span></span></strong></p><p data-dcnode-id="583"><span data-dcnode-id="584" style="font-size:16px"><span data-dcnode-id="585" instrument_node="">A veteran who:</span></span></p><ul data-dcnode-id="574"><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Resided in Massachusetts for two&nbsp;years consecutively before filing for this clause.</span></li></ul><p data-dcnode-id="571"><em data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">And as of July 1</span></em></p><ul data-dcnode-id="558"><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Permanent loss of or use of 1 extremity (1 foot at ankle or above, or 1 hand at wrist or above), Or</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Loss of 1 eye, Or</span></li><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Congressional Medal of Honor, Or</span></li><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Distinguished Service Cross, Or</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Navy Cross, Or</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Air Force Cross</span></li></ul><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">Note:</span><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node=""> </span></strong><span data-dcnode-id="554" instrument_node="">&nbsp;Surviving spouse of veteran who met 1) and 2) above will qualify under Clause 22 A</span></p><p data-dcnode-id="550"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="548" style="margin-left:40px"><span data-dcnode-id="549" instrument_node="">A Certificate of Disability from the Veterans Administration verifying the extent of disability as of July 1 of the tax year.</span></p><p data-dcnode-id="546" style="margin-left:40px"><span data-dcnode-id="547" instrument_node="">Discharge papers (DD214) first time filing.</span></p><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">Note:</span><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node=""> </span></strong><span data-dcnode-id="542" instrument_node="">&nbsp;Once an exemption has been granted for the above, documentation is not required for subsequent allowances for the exemption.</span></p><p data-dcnode-id="538"><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="536" style="margin-left:40px"><span data-dcnode-id="537" instrument_node="">None</span></p><p data-dcnode-id="533"><em data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The amount of the exemption is $750.00.</span></em></p><p data-dcnode-id="530"><span data-dcnode-id="531" style="font-size:16px"><span data-dcnode-id="532" instrument_node="">If applicant lives in a greater-than-single family home, a proportionate amount of the exemption will be granted.</span></span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Note:&nbsp; Veterans who are&nbsp;paraplegics, or have a 100% disability for a service-connected blindness or surviving spouse are entitled to full tax exemption.</span></p><p data-dcnode-id="525"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="527" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="522"><a data-dcnode-id="523" href="#anchor_top"><span data-dcnode-id="524" instrument_node="">Back to Top</span></a></p><hr data-dcnode-id="521"><h4 data-dcnode-id="518"><a data-dcnode-id="520" id="anchor_clause22b"></a><span data-dcnode-id="519" instrument_node="">Clause 22 B – Disability</span></h4><p data-dcnode-id="514"><strong data-dcnode-id="515"><span data-dcnode-id="516" style="font-size:16px"><span data-dcnode-id="517" instrument_node="">Requirements:</span></span></strong></p><p data-dcnode-id="511"><span data-dcnode-id="512" style="font-size:16px"><span data-dcnode-id="513" instrument_node="">A veteran who:</span></span></p><ul data-dcnode-id="494"><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="501"><span data-dcnode-id="504" instrument_node="">Resided in Massachusetts for two years consecutively before filing for this clause </span><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">And</span></em></li><li data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">Permanent loss of or use of both feet, both hands, or one foot and one hand,&nbsp;</span><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Or</span></em></li><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Loss of both eyes</span></li></ul><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Note: &nbsp;Surviving spouse of veteran who met 1) and 2) above will qualify under Clause 22B</span></p><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="487" style="margin-left:40px"><span data-dcnode-id="488" instrument_node="">A Certificate of Disability from the Veterans Administration verifying the extent of the disability as of July 1 of the tax year.</span></p><p data-dcnode-id="485" style="margin-left:40px"><span data-dcnode-id="486" instrument_node="">Discharge papers (DD214) first time filing.</span></p><p data-dcnode-id="483" style="margin-left:40px"><span data-dcnode-id="484" instrument_node="">Note:&nbsp; Once an exemption has been granted for the above, documentation is not required for subsequent allowances of the exemption.</span></p><p data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="478" style="margin-left:40px"><span data-dcnode-id="479" instrument_node="">None</span></p><p data-dcnode-id="475"><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">The amount of the exemption is $1250.00.</span></em></p><p data-dcnode-id="472"><span data-dcnode-id="473" style="font-size:16px"><span data-dcnode-id="474" instrument_node="">If applicant lives in a greater-than-single family home, a proportionate amount of the exemption will be granted.</span></span></p><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Note:&nbsp; Veterans who are&nbsp;paraplegics, or have a 100% disability for a service-connected blindness or surviving spouse are entitled to full tax exemption.</span></p><p data-dcnode-id="467"><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="469" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="464"><a data-dcnode-id="465" href="#anchor_top"><span data-dcnode-id="466" instrument_node="">Back to Top</span></a></p><hr data-dcnode-id="463"><h4 data-dcnode-id="460"><a data-dcnode-id="462" id="anchor_clause22c"></a><span data-dcnode-id="461" instrument_node="">Clause 22 C - Disability/Specially Adaptive Housing</span></h4><p data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Requirements:</span></strong></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">A veteran who:</span></p><ul data-dcnode-id="442"><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="445"><span data-dcnode-id="448" instrument_node="">Resided in Massachusetts for two&nbsp;years consecutively before filing for this clause </span><em data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">And</span></em></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Permanent and total disability, and have received assistance in acquiring “specially adapted housing”</span></li></ul><p data-dcnode-id="436"><span data-dcnode-id="441" instrument_node="">Note: &nbsp;Surviving spouse of veteran who met 1) and 2) above will qualify under Clause 22 C.</span><br data-dcnode-id="440"><br data-dcnode-id="439"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="434" style="margin-left:40px"><span data-dcnode-id="435" instrument_node="">A&nbsp;Certificate of Disability&nbsp;from the Veterans Administration verifying the extent of the disability as of July 1 of the tax year.</span></p><p data-dcnode-id="432" style="margin-left:40px"><span data-dcnode-id="433" instrument_node="">Discharge papers (DD214) first time filing.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Note: &nbsp;Once an exemption has been granted for the above, documentation is not required for subsequent allowances of the exemption.</span></p><p data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="424" style="margin-left:40px"><span data-dcnode-id="425" style="font-size:16px"><span data-dcnode-id="426" instrument_node="">None</span></span></p><p data-dcnode-id="421"><em data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">The amount of the exemption is $1500.00.</span></em></p><p data-dcnode-id="418"><span data-dcnode-id="419" style="font-size:16px"><span data-dcnode-id="420" instrument_node="">If applicant lives in a greater-than-single family home, a proportionate amount of the exemption will be granted.</span></span></p><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Note:&nbsp; Veterans who are&nbsp;paraplegics, or have a 100% disability for a service-connected blindness or surviving spouse are entitled to full tax exemption.</span></p><p data-dcnode-id="412"><a data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="414" style="font-size:16px"><span data-dcnode-id="415" instrument_node="">Click here to download the application for Exemption.</span></span></a></p><p data-dcnode-id="408"><a data-dcnode-id="409" href="#anchor_top"><span data-dcnode-id="410" style="font-size:16px"><span data-dcnode-id="411" instrument_node="">Back to Top</span></span></a></p><hr data-dcnode-id="407"><h4 data-dcnode-id="404"><a data-dcnode-id="406" id="anchor_clause22d"></a><span data-dcnode-id="405" instrument_node="">Clause 22 D - Surviving Spouses, Quemoy/Matsu, Died In Combat, Classified As Missing In Action Or Presumed Dead</span></h4><p data-dcnode-id="400"><strong data-dcnode-id="401"><span data-dcnode-id="402" style="font-size:16px"><span data-dcnode-id="403" instrument_node="">Requirements:</span></span></strong></p><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Surviving spouse of soldier, sailor and members of the National Guard whose death was a direct result of injury or disease as a result of being in a combat zone, or who have been classified as missing in action and presumed dead as a result of combat.</span></p><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">The act expressly makes the Clause 22D exemption retroactive for qualifying surviving spouses of those soldiers, sailors or guardsmen who died in combat, or were presumed dead as a result of combat, on or after September 11, 2001.</span></p><ul data-dcnode-id="385"><li data-dcnode-id="392"><span data-dcnode-id="395" instrument_node="">Surviving spouse must be domiciled in Massachusetts for two consecutive years before applying for the exemption&nbsp;</span><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Or</span></em></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Service member had to have been domiciled in Massachusetts for at least six months before entering the service.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Owns and occupies property &nbsp;as of July 1 of the tax year</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Exemption terminates upon spouse’s death or remarriage</span></li></ul><p data-dcnode-id="382"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="380" style="margin-left:40px"><span data-dcnode-id="381" instrument_node="">Any /all supporting documentation from the Veterans Administration and/or medical records which relate the injury or disease in combat resulted in the death of your spouse.</span></p><p data-dcnode-id="377"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="375" style="margin-left:40px"><span data-dcnode-id="376" instrument_node="">None</span></p><p data-dcnode-id="371"><span data-dcnode-id="374" instrument_node="">The amount of exemption is FULL </span><span data-dcnode-id="372" style="font-size:16px"><span data-dcnode-id="373" instrument_node="">- until remarriage</span></span></p><p data-dcnode-id="368"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="370" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="365"><a data-dcnode-id="366" href="#anchor_top"><span data-dcnode-id="367" instrument_node="">Back to Top</span></a></p><hr data-dcnode-id="364"><h4 data-dcnode-id="361"><a data-dcnode-id="363" id="anchor_clause22e"></a><span data-dcnode-id="362" instrument_node="">Clause 22 E - 100% Disability</span></h4><p data-dcnode-id="358"><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Requirements:</span></strong></p><ol data-dcnode-id="340"><li data-dcnode-id="343"><span data-dcnode-id="357" instrument_node="">A veteran who:</span><ul data-dcnode-id="344"><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="349"><span data-dcnode-id="352" instrument_node="">Lived in Massachusetts for 6 months before entering the service </span><em data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Or</span></em></li><li data-dcnode-id="345"><span data-dcnode-id="348" instrument_node="">Resided in Massachusetts for two years consecutively before filing for this clause </span><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">And</span></em></li></ul></li><li data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">is 100% disabled</span></li></ol><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Note: &nbsp;Surviving spouse of veteran who met 1) and 2) above will qualify under Clause 22E.</span></p><p data-dcnode-id="335"><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Documents Required:</span></strong></p><p data-dcnode-id="330" style="margin-left:40px"><span data-dcnode-id="334" instrument_node="">A&nbsp;Certificate of Disability showing&nbsp;100% from the Veterans Administration </span><u data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">each year</span></u><span data-dcnode-id="331" instrument_node="">. &nbsp;</span></p><p data-dcnode-id="328" style="margin-left:40px"><span data-dcnode-id="329" instrument_node="">Discharge papers (DD214) first time filing.</span></p><p data-dcnode-id="325"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="323" style="margin-left:40px"><span data-dcnode-id="324" instrument_node="">None</span></p><p data-dcnode-id="320"><em data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">The amount of the exemption is $1000.00.</span></em></p><p data-dcnode-id="317"><span data-dcnode-id="318" style="font-size:16px"><span data-dcnode-id="319" instrument_node="">If applicant lives in a greater-than-single family home, a proportionate amount of the exemption will be granted.</span></span></p><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Note:&nbsp; Veterans who are&nbsp;paraplegics, or have a 100% disability for a service-connected blindness or surviving spouse are entitled to full tax exemption.</span></p><p data-dcnode-id="312"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download" target="_blank"><span data-dcnode-id="314" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="309"><a data-dcnode-id="310" href="#anchor_top"><span data-dcnode-id="311" instrument_node="">Back to Top</span></a></p><hr data-dcnode-id="308"><h4 data-dcnode-id="302"><a data-dcnode-id="307" id="anchor_clause22f"></a><span data-dcnode-id="306" instrument_node="">CLAUSE 22F&nbsp; -- PARAPLEGIC&nbsp; </span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">or</span></em><span data-dcnode-id="303" instrument_node="">&nbsp; have a 100% disability for service-connected blindness</span></h4><p data-dcnode-id="298"><strong data-dcnode-id="299"><span data-dcnode-id="300" style="font-size:16px"><span data-dcnode-id="301" instrument_node="">REQUIREMENTS:</span></span></strong></p><p data-dcnode-id="296" style="margin-left:40px"><span data-dcnode-id="297" instrument_node="">1) A veteran who:</span></p><ul data-dcnode-id="287"><li data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">-Was discharged from the armed forces with an honorable discharge</span></li><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">-Owns and occupies the property as of July 1 of the tax year</span></li><li data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">-Lived in Massachusetts for 6 months before entering the service OR</span></li><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">-Resided in Massachusetts for two years consecutively before filing for this clause AND</span></li></ul><p data-dcnode-id="284" style="margin-left:40px"><span data-dcnode-id="285" style="font-size:16px"><span data-dcnode-id="286" instrument_node="">2) are Paraplegic, or have a 100% disability for service-connected blindness.</span></span></p><p data-dcnode-id="281"><span data-dcnode-id="282" style="font-size:16px"><span data-dcnode-id="283" instrument_node="">NOTE:&nbsp; Surviving spouse of veteran who met 1) and 2) above will qualify under Clause 22F.</span></span></p><p data-dcnode-id="277"><strong data-dcnode-id="278"><span data-dcnode-id="279" style="font-size:16px"><span data-dcnode-id="280" instrument_node="">Documents Required:</span></span></strong></p><p data-dcnode-id="274"><span data-dcnode-id="275" style="font-size:16px"><span data-dcnode-id="276" instrument_node="">A determination certified by the United States Department of Veteran Affairs (VA) or branch of the military in which the veteran served, that according to its records the veteran has paraplegia due to his/her military service of July 1.</span></span></p><p data-dcnode-id="271"><span data-dcnode-id="272" style="font-size:16px"><span data-dcnode-id="273" instrument_node="">NOTE:&nbsp; Once an exemption has been granted for the above, documentation is not required for subsequent allowances of the exemption.</span></span></p><p data-dcnode-id="268"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Financial Requirements:</span></strong></p><p data-dcnode-id="265"><span data-dcnode-id="266" style="font-size:16px"><span data-dcnode-id="267" instrument_node="">NONE</span></span></p><p data-dcnode-id="262"><em data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">The amount of the exemption is FULL.</span></em></p><p data-dcnode-id="259"><span data-dcnode-id="260" style="font-size:16px"><span data-dcnode-id="261" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; If applicant lives in a greater-than-single family home, a proportionate amount of the exemption will be granted.</span></span></p><p data-dcnode-id="256"><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mass.gov/doc/form-96-4/download"><span data-dcnode-id="258" instrument_node="">Click here to download the application for Exemption.</span></a></p><p data-dcnode-id="253"><a data-dcnode-id="254" href="#anchor_top"><span data-dcnode-id="255" instrument_node="">Back to Top</span></a></p><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">&nbsp;</span></p><span data-dcnode-id="250" instrument_node="">
