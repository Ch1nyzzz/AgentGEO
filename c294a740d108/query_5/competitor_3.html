</span><h1 class="page-title__topic" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">      SIP Permit Exemptions
  </span></h1><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span><div class="body-content body-content--offset" data-dcnode-id="332"><span data-dcnode-id="641" instrument_node="">
</span><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Georgia Air Quality Rule 391-3-1-.03(6)(i)3</span></h2><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Georgia Air Quality Rule 391-3-1-.03(6)(i)3 provides an exemption from permitting for a modification or modifications that meet the requirements of the rule. If a modification or a consecutive set of unpermitted modifications have cumulative potential emission increases less than the thresholds indicated in the rule, permitting action can be deferred under Rule 391-3-1-.03(6)(i)3.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">When the cumulative potential emission increases for a pollutant reaches the threshold for that pollutant, permitting action must occur for the modification(s).</span></p><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">The forms available on this page are to be completed when a facility is making a modification and claiming an exemption under Georgia Air Quality Rule 391-3-1-.03(6)(i)3. The form consists of two Microsoft Word™ documents in a Zip file. Both forms must be submitted to the Air Protection Branch for a "</span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epd.georgia.gov/documents/ssppsip-no-permit-required-form"><span data-dcnode-id="633" instrument_node="">No Permit Required</span></a><span data-dcnode-id="631" instrument_node="">" determination to be made.</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Unless otherwise required by the Director, SIP permits shall not be required for the following source activities.&nbsp; These exemptions may not be used to avoid any emission limitations or standards of the Rules for Air Quality Control Chapter 391-3-1-.02, lower the potential to emit below “major source” thresholds or to avoid any “applicable requirement” (i.e., NSPS, NESHAP, etc.) as defined in 40 CFR Part 70.2</span></p><h3 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">(a)&nbsp;Mobile Sources</span></h3><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Mobile sources, such as automobiles, trucks, buses, locomotives, airplanes, boats and ships, whether or not designated as subject to mandatory inspection, maintenance, or emission requirements pursuant O.C.G.A. Section 12-9-40, et seq., as amended, the Georgia Motor Vehicle Emission Inspection and Maintenance Act.&nbsp; This exemption relates only to the requirement for a permit issued under the Act, not to any other requirement under the Act, and in no way affects any requirement for a permit, license, or a certificate under any other law.&nbsp; This limited exemption from the permit requirements of the Act shall in no way affect the applicability of any other requirement related to mobile sources, or any other requirement or limitation which may affect mobile sources.</span></p><h3 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">(b)&nbsp;Combustion Equipment</span></h3><ol data-dcnode-id="567"><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Fuel-burning equipment having a total heat input capacity of less than 10 million BTUs per hour burning only natural gas, LPG and/or distillate fuel oil containing 0.50% sulfur by weight or less.</span></li><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Fuel-burning equipment rated at less than 5 million BTUs per hour burning a wood or fossil fuel.</span></li><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Any fuel-burning equipment with a rated input capacity of 2.5 million BTUs per hour or less.</span></li><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Equipment used for cooking food for immediate human consumption.</span></li><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Blacksmith forges.</span></li><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Clean steam condensate and steam relief vents.</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Funeral homes and crematories of any size.</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Air curtain destructor used for land clearing at a construction site.</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Open burning.</span></li><li data-dcnode-id="595"><span data-dcnode-id="603" instrument_node="">Small incinerators operating as follows:</span><ul data-dcnode-id="596"><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">(i)&nbsp; less than 8 million BTUs per hour input, firing types 0, 1, 2 and/or 3 waste; or</span></li><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">(ii)&nbsp; less than 8 million BTUs per hour input with no more than 10% pathological (type 4) waste by weight combined with types 0, 1, 2 and/or 3 waste; or</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">(iii)&nbsp; less than 4 million BTUs per hour heat input firing Type 4 waste.</span></li></ul></li><li data-dcnode-id="578"><span data-dcnode-id="594" instrument_node="">Stationary engines</span><ul data-dcnode-id="579"><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">(i) Burning natural gas, LPG, gasoline, dual fuel, or diesel fuel which are used exclusively as emergency generators;</span></li><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">(ii)&nbsp; Burning natural gas, LPG, and/or diesel fuel and used for peaking power (including emergency generators used for peaking power) where the peaking power use does not exceed 200 hours-per-year except in the counties of Banks, Barrow, Bartow, Butts, Carroll, Chattooga, Cherokee, Clarke, Clayton, Cobb, Coweta, Dawson, DeKalb, Douglas, Fayette, Floyd, Forsyth, Fulton, Gordon, Gwinnett, Hall, Haralson, Heard, Henry, Jackson, Jasper, Jones, Lamar, Lumpkin, Madison, Meriwether, Monroe, Morgan, Newton, Oconee, Paulding, Pickens, Pike, Polk, Putnam, Rockdale, Spalding, Troup, Upson, and Walton where such engines with a rated capacity equal to or greater than 100 kilowatts are not exempt; or</span></li><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">(iii)&nbsp; Used for other purposes provided that the total horsepower of all non-gasoline burning engines combined are less than 1500 engine horsepower and no individual engine operates for more than 1000 hours-per-year; or</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">(iv)&nbsp; Used for other purposes provided that the total horsepower of all gasoline burning engines combined are less than 225 horsepower and no individual engine operates for more than 1000 hours-per-year.</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">(v)&nbsp; For the purpose of this subsection, the following definitions shall apply:</span></li><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">(I)&nbsp; An “emergency generator” means a generator whose function is to provide back-up power when electric power from the local utility is interrupted and which operates for less than 500 hours-per-year, except in the counties of Banks, Barrow, Bartow, Butts, Carroll, Chattooga, Cherokee, Clarke, Clayton, Cobb, Coweta, Dawson, DeKalb, Douglas, Fayette, Floyd, Forsyth, Fulton, Gordon, Gwinnett, Hall, Haralson, Heard, Henry, Jackson, Jasper, Jones, Lamar, Lumpkin, Madison, Meriwether, Monroe, Morgan, Newton, Oconee, Paulding, Pickens, Pike, Polk, Putnam, Rockdale, Spalding, Troup, Upson, and Walton where such generator operates less than 200 hours-per-year.</span></li><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">(II) “Used for peaking power” means used to reduce the electrical power requirements on the local utility grid.&nbsp; This could be for supplying power during the local utility’s peak demand periods, or for peak shaving by the facility.</span></li></ul></li><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Boiler water treatment operations.</span></li><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Fire fighting equipment including fire pumps or other emergency/safety equipment used to train fire fighters.</span></li><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Temporary stationary engines used to generate electricity that are used to replace main stationary engines during periods of maintenance or repair (provided the actual and potential emissions of the temporary sources do not exceed that of the main sources).</span></li><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Temporary fuel-burning equipment (i.e., boilers) that are used to replace main fuel-burning equipment during periods of maintenance or repair (provided the actual and potential emissions of the temporary sources do not exceed that of the main sources.)&nbsp; Temporary fuel-burning equipment that remains at a location for more than 180 consecutive days is no longer considered to be a temporary boiler.&nbsp;&nbsp; Temporary fuel-burning equipment that replaces temporary fuel-burning equipment at a location and is intended to perform the same or similar function will be included in calculating the consecutive time period.</span></li><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Onsite air curtain incinerators with mist controls used for the purpose of decontamination and disposal of livestock and materials contaminated with the avian flu virus where on-site composting and burial are not viable methods of disposal.</span></li></ol><h3 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">(c) Storage Tanks</span></h3><ol data-dcnode-id="550"><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">All petroleum liquid storage tanks storing a liquid with a true vapor pressure of equal to or less than 0.50 psia as stored.</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">All petroleum liquid storage tanks with a capacity of less than 40,000 gallons storing a liquid with a true vapor pressure of equal to or less than 2.0 psia as stored.</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">All petroleum liquid storage tanks with a capacity of less than 10,000 gallons storing a petroleum liquid.</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Pressurized vessels designed to operate in excess of 30 psig storing a petroleum fuel.</span></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Gasoline storage and handling equipment at loading facilities handling less than 20,000 gallons per day or at vehicle dispensing facilities.</span></li><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Portable drums and barrels provided that the volume of each container does not exceed 550 gal.</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">All chemical storage tanks used to store a chemical with a true vapor pressure of less than or equal to 10 millimeters of mercury.</span></li></ol><h3 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">(d)&nbsp;Agricultural Operations</span></h3><ol data-dcnode-id="543"><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Farm equipment used for soil preparation, livestock handling, crop tending and harvesting and for other farm related activities.</span></li><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Herbicide and pesticide mixing and application activities for on site use.</span></li></ol><h3 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">(e)&nbsp;Maintenance, Cleaning &amp; Housekeeping</span></h3><ol data-dcnode-id="504"><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Heating, air conditioning and ventilation systems not designed to remove air contaminants generated by or released from process or fuel-burning equipment.</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Routine housekeeping activities such as painting buildings, roofing or paving parking lots, all clerical activities and all janitorial activities.</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Maintenance activities such as: vehicle repair shops, brazing, soldering and welding equipment, carpenter shops, electrical charging stations, grinding and polishing operations maintenance shop vents, miscellaneous non-production surface cleaning, preparation and painting operations.</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Miscellaneous activities such as: aerosol spray cans; air compressors; cafeteria vents; copying, photographic and blueprint machines; decommissioned equipment; dumpsters; fire training activities; fork lifts; railroad flares; refrigerators; space heaters.</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Cold storage refrigeration equipment.</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Vacuum-cleaning systems used exclusively for industrial, commercial, or residential housekeeping purposes.</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Equipment used for portable steam cleaning.</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Blast-cleaning equipment using a suspension of abrasive in water and any exhaust system or collector serving them exclusively.</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Portable blast-cleaning equipment.</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Laundry dryers, extractors, or tumblers for fabric cleaned with only water solutions of bleach or detergents.</span></li><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Non-Perchloroethylene Dry-cleaning equipment with a capacity of 100 pounds per hour or less of clothes.</span></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Cold cleaners having an air/vapor interface of not more than 10 square feet and that do not use a halogenated solvent.</span></li><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Steam sterilizers.</span></li><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Portable equipment used for the on site painting of buildings, towers, bridges and roads.</span></li><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Non-routine clean out of tanks and equipment for the purposes of worker entry or in preparation for maintenance or decommissioning.</span></li><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Equipment used for the washing or drying of fabricated products provided that no VOCs are used in the process and that no oil or solid fuels are burned.</span></li><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Devices used exclusively for cleaning metal parts or surfaces by burning off residual amounts of paint, varnish, or other foreign material, provided that such devices are equipped with afterburners.</span></li><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Fresh water cooling towers provided that the total potential emissions from the entire source remain below 10 tons per year of any single hazardous air pollutant and below 25 tons per year of any combination of hazardous air pollutants.</span></li></ol><h3 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">(f)&nbsp;Laboratories and Testing</span></h3><ol data-dcnode-id="482"><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Laboratory equipment used exclusively for chemical or physical analyses;</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Sampling connections used exclusively to withdraw materials for testing and analysis, including air contaminant detectors and vent lines;</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Vacuum producing devices;</span></li><li data-dcnode-id="483"><span data-dcnode-id="495" instrument_node="">Research and development facilities, quality control testing facilities and/or small pilot projects, where combined daily emissions from all operations are below all of the following thresholds:</span><ul data-dcnode-id="484"><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">(i)&nbsp; Less than 125 pounds per day of carbon monoxide;</span></li><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">(ii)&nbsp; Less than 0.8 pounds per day of lead;</span></li><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">(iii)&nbsp; Less than 50 pounds per day of particulate matter, PM10, or sulfur dioxide;</span></li><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">(iv)&nbsp; Less than 50 pounds per day of nitrogen oxides or VOCs except in the Counties of Cherokee, Clayton, Cobb, Coweta, DeKalb, Douglas, Fayette, Forsyth, Fulton, Gwinnett, Henry, Paulding, or Rockdale, where less than 15 pounds per day of nitrogen oxides; or VOCs; and</span></li><li data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">(v)&nbsp; Less than 5 pounds per day of any single hazardous air pollutant and less than 12.5 pounds per day of any combination of hazardous air pollutants.</span></li></ul></li></ol><h3 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">(g)&nbsp;Pollution Control</span></h3><ol data-dcnode-id="462"><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Sanitary wastewater collection and treatment systems, except incineration equipment, that are not subject to any standard, limitation or other requirement under section 111 or section 112 (excluding section 112(r)) of the federal Clean Air Act.</span></li><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">On site soil or groundwater decontamination units that are not subject to any standard, limitation or other requirement under Section 111 or 112 [excluding 112(r)] of the Federal Act.</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Bioremediation operations.</span></li><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Garbage compactors and garbage handling equipment.</span></li><li data-dcnode-id="463"><span data-dcnode-id="471" instrument_node="">Municipal Solid Waste Landfills which meet the following criteria:</span><ul data-dcnode-id="464"><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">(i)&nbsp; The total design capacity of the landfill is less than or equal to 2.756 million tons (2.5 million megagrams) or 3.27 million cubic yards (2.5 million cubic meters) of solid waste; and</span></li><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">(ii)&nbsp; The emissions of VOC are less than 25 tons per year for landfills located within Cherokee, Clayton, Cobb, Coweta, DeKalb, Douglas, Fayette, Forsyth, Fulton, Gwinnett, Henry, Paulding, or Rockdale counties; and</span></li><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">(iii)&nbsp; The emissions of nitrogen oxides (NOX) from operations other than the final control device are less than 25 tons per year for landfills located within Cherokee, Clayton, Cobb, Coweta, DeKalb, Douglas, Fayette, Forsyth, Fulton, Gwinnett, Henry, Paulding, or Rockdale counties.</span></li></ul></li></ol><h3 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">(h)&nbsp;Industrial Operations</span></h3><ol data-dcnode-id="397"><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Concrete block, brick plants, concrete products plants, and ready mix concrete plants producing less than 125,000 tons per year of product.</span></li><li data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Small aluminum scrap metal reclaimers (non-smelters).</span></li><li data-dcnode-id="439"><span data-dcnode-id="455" instrument_node="">Any of the following processes or process equipment which are electrically heated or which fire natural gas, LPG or distillate (#2) fuel oil at a maximum total heat input rate of not more than 10 million BTUs per hour.</span><ul data-dcnode-id="440"><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">(i)&nbsp; Furnaces for heat treating glass or metals, the use of which does not involve molten materials, oil-coated parts, or oil quenching.</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">(ii)&nbsp; Porcelain enameling furnaces or porcelain enameling drying ovens.</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">(iii)&nbsp; Kilns for firing ceramic ware.</span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">(iv)&nbsp; Crucible furnaces, pot furnaces, or induction melting and holding furnaces with a capacity of 1,000 pounds or less each, in which sweating or distilling is not conducted and in which fluxing is not conducted utilizing free chlorine, chloride or fluoride derivatives, or ammonium compounds.</span></li><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">(v)&nbsp; Bakery ovens and confection cookers.</span></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">(vi)&nbsp; Feed mill or grain mill ovens.</span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">(vii)&nbsp; Surface coating drying ovens.</span></li></ul></li><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Grain, metal, or mineral extrusion process.</span></li><li data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Equipment used exclusively for rolling, forging, pressing, stamping, spinning, or extruding either hot or cold metals or plastic such as drop hammers or hydraulic presses for forging or metalworking.</span></li><li data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Die casting machines.</span></li><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Equipment used exclusively for sintering of glass or metals, but not exempting equipment used for sintering metal-bearing ores, metal scale, clay, fly ash, or&nbsp; metal compounds.</span></li><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Equipment for the mining and screening of uncrushed native sand and gravel.</span></li><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Ozonization process or process equipment.</span></li><li data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Electrostatic powder coating booths with an appropriately designed and operated particulate control system.</span></li><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Equipment used for the application of a hot melt adhesive.</span></li><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Equipment used exclusively for mixing and blending water-based adhesives and coating at ambient temperatures.</span></li><li data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Equipment used for compression, molding and injection of plastics.</span></li><li data-dcnode-id="400"><span data-dcnode-id="418" instrument_node="">Wood products operations in the following SIC categories (combustion equipment and coatings operations are not included in this exemption):</span><ul data-dcnode-id="401"><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">(i)&nbsp; 2426 Dimensional Hardwood Lumber Mills</span></li><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">(ii)&nbsp; 2431&nbsp; Lumber Millwork</span></li><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">(iii)&nbsp;2434&nbsp; Wood Kitchen Cabinets</span></li><li data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">(iv)&nbsp; 2439&nbsp; Structural Wood Trusses</span></li><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">(v)&nbsp; 2441&nbsp; Wood Boxes</span></li><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">(vi)&nbsp; 2448&nbsp; Wood Pallets</span></li><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">(vii)&nbsp; 2449&nbsp; Wood Containers</span></li><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">(viii)&nbsp; 2499&nbsp; Miscellaneous Wood Products</span></li></ul></li><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">&nbsp;Industrial process equipment used exclusively for educational purposes at educational institutions.</span></li></ol><h3 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">(i)&nbsp;Other</span></h3><ol data-dcnode-id="338"><li data-dcnode-id="382"><span data-dcnode-id="394" instrument_node="">Facilities where the combined emissions from all non-exempt source activities [i.e., not listed in 391-3-1-.03(6)(a)-(h)] are below the following for all pollutants:</span><ol data-dcnode-id="383"><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">(i)&nbsp; 50 tons per year of carbon monoxide;</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">(ii)&nbsp; 300 pounds per year of lead total; with a 3.0 pound per day maximum emission;</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">(iii)&nbsp; 20 tons per year of particulate matter, PM10, or sulfur dioxide;</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">(iv)&nbsp; 20 tons per year of nitrogen oxides or VOCs except in the counties of Cherokee, Clayton, Cobb, Coweta, DeKalb, Douglas, Fayette, Forsyth, Fulton, Gwinnett, Henry, Paulding, or Rockdale, where less than 5 tons per year of nitrogen oxides or VOCs is exempted; and</span></li><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">(v)&nbsp; 2 tons per year total with a 15 pound per day maximum emission of any single hazardous air pollutant and less than 5 tons per year of any combination of hazardous air pollutants.</span></li></ol></li><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Facilities where the combined emissions from all source activities are below the thresholds in “1” above for one or more pollutants, are not required to list those pollutants in the permit application.</span></li><li data-dcnode-id="367"><span data-dcnode-id="379" instrument_node="">Cumulative modifications not covered in an existing permit to an existing permitted facility where the combined emission increases (excluding any contemporaneous emission decreases, i.e., “netting” is not allowed) from all nonexempt modified activities are below the following thresholds for all pollutants:</span><ul data-dcnode-id="368"><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">(i)&nbsp; 25 tons per year of carbon monoxide;</span></li><li data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">(ii)&nbsp; 150 pounds-per-year total with a 1.5 pound-per-day maximum emission of lead;</span></li><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">(iii)&nbsp; 10 tons per year of particulate matter, PM10&nbsp;or sulfur dioxide;</span></li><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">(iv)&nbsp; 10 tons per year of nitrogen oxides or VOCs except in the counties of Cherokee, Clayton, Cobb, Coweta, DeKalb, Douglas, Fayette, Forsyth, Fulton, Gwinnett, Henry, Paulding, or Rockdale, where less than 2.5 tons per year of nitrogen oxides or VOCs is exempted; and</span></li><li data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">(v)&nbsp; 2 tons per year total with a 15 pound per day maximum emission of any single hazardous air pollutant and less than 5 tons per year of any combination of hazardous air pollutants.</span></li></ul></li><li data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">&nbsp;As an alternative to subparagraph 3, cumulative modifications not covered in an existing permit to an existing permitted facility where the combined emissions increases, including any contemporaneous emission decreases (i.e., “netting is allowed”) from all nonexempt modified activities are less than 10 tons per year of particulate matter and PM10.&nbsp; For the purpose of this subparagraph, “contemporaneous” means within that period beginning on the date of issuance of the most recent permit through the date of reissuance of such permit.&nbsp; This shall exclude any amendment to such permit unless such amendment incorporates the previously exempted modification(s) in which case the amendment shall be considered a reissuance of such permit for the purpose of this subparagraph.&nbsp; Facilities using this exemption shall maintain records of all emissions increases and decreases and shall notify the Division, in writing, within 7 days after making any modification covered by this subparagraph.&nbsp; The Division may require the use of a Division approved form for tracking the emissions increases and decreases. If a facility elects to use this subparagraph in lieu of subparagraph 3, it shall not use subparagraph 3 with respect to particulate matter and PM10&nbsp;until such time that all modifications exempted from SIP permitting under subparagraph 4 have been incorporated into the permit.&nbsp; A facility may use subparagraph 3 with respect to any pollutant other than particulate matter and PM10&nbsp;while using this subparagraph.&nbsp; Only the following facilities are eligible for this exemption:</span><ol data-dcnode-id="363"><li data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">(i) Facilities with an SIC code of 1422 or 1423 that are not a major source subject to the provisions of 391-3-1-.03(10) (i.e., a minor or synthetic minor source).</span></li></ol></li><li data-dcnode-id="343"><span data-dcnode-id="361" instrument_node="">Changes in a process or process equipment which do not involve installing, constructing, or reconstructing an emission unit or the primary air cleaning device of an air pollution control system provided that such changes do not result in the increase of emissions from any emission unit or the emissions of a pollutant not previously emitted.&nbsp; Examples of such changes in a process or process equipment include the following:</span><ul data-dcnode-id="344"><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">(i)&nbsp; Change in the supplier or formulation of similar raw materials, fuels, or paints and other coatings;</span></li><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">(ii)&nbsp; Changes in product formulations;</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">(iii)&nbsp; Change in the sequence of the process;</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">(iv)&nbsp; Change in the method of raw material addition;</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">(v)&nbsp; Change in the method of product packaging;</span></li><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">(vi)&nbsp; Change in process operating parameters;</span></li><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">(vii)&nbsp; Replacement of a fuel burner in a boiler with a more efficient burner; or</span></li><li data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">(viii)&nbsp; Lengthening a paint drying oven to provide additional curing time.</span></li></ul></li><li data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Sources of minor significance as specified by the Director.</span></li><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Sources for which there is no applicable emission limit, standard or other emission requirement established under, by, or pursuant to the Act.</span></li></ol><h3 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">(j)&nbsp;Construction Permit Exemption for Pollution Control Projects</span></h3><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Projects listed in subparagraph 391-3-1-.01(qqqq)1. through 8. of these rules are exempt from the requirement to obtain a construction (SIP) permit as specified in paragraph 391-3-1-.03(1) of this rule provided that the project is not subject to the provisions of paragraph 391-3-1-.02(7), Prevention of Significant Deterioration of Air Quality, or the non-attainment new source review permitting requirements of subparagraph 391-3-1-.03(8)(c).&nbsp; The Director has the authority to rebut the presumption that projects listed in subparagraphs (qqqq)1. through 8. are environmentally beneficial in accordance with the criteria specified in subparagraph (qqqq) and thus exempt from the requirement to obtain a construction (SIP) permit.&nbsp; Owners and operators of projects exempt from the requirement to obtain a construction (SIP) permit under this subparagraph (6)(j) shall obtain an operating permit or amendment under either paragraph 391-3-1-.03(2) or 391-3-1-.03(10) of this rule, whichever is applicable, prior to commencement of operation of the project.</span></p><span data-dcnode-id="333" instrument_node="">
