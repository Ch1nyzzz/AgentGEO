</span><h1 data-dcnode-id="1246" style="text-align: center;"><span data-dcnode-id="1247" instrument_node="">Fire Suppression Systems</span></h1><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The Coast Guard does not test materials or systems for approval but rather specifies the required test methods and minimum performance criteria for approval. Product testing must be performed by a Coast Guard Accepted or Recognized&nbsp;Independent Laboratory.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1238" instrument_node="">Please send the Submittal Package and other related information to&nbsp;</span><a data-dcnode-id="1236" href="mailto:TypeApproval@uscg.mil"><span data-dcnode-id="1237" instrument_node="">TypeApproval@uscg.mil</span></a><span data-dcnode-id="1235" instrument_node="">.&nbsp;&nbsp;For files sizes above 10MB and less than 8GB you may submit correspondence via the DOD Secure Access File Exchange (SAFE) at </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safe.apps.mil/"><u data-dcnode-id="1232"><font color="#0066cc" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">https://safe.apps.mil/</span></font></u></a><span data-dcnode-id="1230" instrument_node="">.&nbsp;For details, please see&nbsp;</span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/Our-Organization/Assistant-Commandant-for-Prevention-Policy-CG-5P/Commercial-Regulations-standards-CG-5PS/Design-Engineering-Standards/eng4/ContactUs/"><span data-dcnode-id="1229" instrument_node="">What to submit when corresponding with ENG-4 regarding equipment approvals/renewal.</span></a><span data-dcnode-id="1227" instrument_node="">&nbsp; </span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223" style="text-align: justify;"><span data-dcnode-id="1224" instrument_node="">Once the equipment has been approved by this office, it will receive Coast Guard Type Approval and a Certificate of Approval (COA). The COA will be issued for 5 years and will remain valid during that time period if the product meets the testing of the Quality Control Program.</span></p><span data-dcnode-id="1222" instrument_node="">

</span><div data-dcnode-id="414"><span data-dcnode-id="1205" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="1195"><div class="ICG_ETH_Title" data-dcnode-id="1196"><a aria-controls="ICG_ETH_1458" aria-expanded="false" class="SubHead" data-dcnode-id="1202" href="javascript:ShowOrHideContentJquery('ICG_ETH_1458','1458');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="1204" height="15" id="ICG_ETH_EXPAND_1458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="1203" height="15" id="ICG_ETH_COLLAPSE_1458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="1201" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1458" aria-expanded="false" class="SubHead" data-dcnode-id="1198" href="javascript:ShowOrHideContentJquery('ICG_ETH_1458','1458');" tabindex="0"><span data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">162.027 COMBINATION FIRE HOSE NOZZLES</span></span></a><a data-dcnode-id="1197" name="ICG_ETH_1458"></a></div></div><div class="Normal" data-dcnode-id="1165"><div class="hideContent" data-dcnode-id="1166" id="ICG_ETH_1458"><span data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION</span></span><span data-dcnode-id="1192" instrument_node="">:&nbsp; 46 CFR 162.027 specifies compliance of nozzles with ASTM Standard F1546 “Standard Specification for Fire Hose Nozzles”.&nbsp; Due to the extensive testing requirements of ASTM F1546, the Coast Guard will approve brass or bronze nozzles that meet the performance criteria of NFPA 1964.&nbsp; The Coast Guard does not test materials or systems for approval but rather specifies the required test methods and minimum performance criteria for approval.&nbsp; Product testing must be performed by a Coast Guard Accepted Independent Laboratory.&nbsp;</span><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">
</span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
</span><span data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">SUBMITTAL PACKAGE:</span></span><span data-dcnode-id="1185" instrument_node="">&nbsp; Please submit the following information in the Submittal Package:</span><br data-dcnode-id="1184"><span data-dcnode-id="1183" instrument_node="">
</span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">
</span><ul data-dcnode-id="1167"><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">A cover letter requesting Coast Guard Type Approval of the equipment.</span></li><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">A test report from the Accepted Independent Laboratory showing compliance of the product or equipment with either ASTM F1546 or NFPA 1964 for brass nozzles.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Evidence that an acceptable follow-up factory inspection program is in place in each factory location.&nbsp; This could be demonstrated by providing an original copy of the contract for a follow-up program between the manufacturer and the Accepted Independent Laboratory.&nbsp; The follow-up program must show that no unauthorized changes can be made to the equipment without proper review and approval by the Accepted Independent Laboratory.</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Required drawings/plans of the equipment.&nbsp; At a minimum, this should include an exterior drawing, an assemble drawing and a list of components as well as a bill of material.</span></li><span data-dcnode-id="1168" instrument_node="">
</span></ul></div></div><span data-dcnode-id="1164" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="1154"><div class="ICG_ETH_Title" data-dcnode-id="1155"><a aria-controls="ICG_ETH_1459" aria-expanded="false" class="SubHead" data-dcnode-id="1161" href="javascript:ShowOrHideContentJquery('ICG_ETH_1459','1459');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="1163" height="15" id="ICG_ETH_EXPAND_1459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="1162" height="15" id="ICG_ETH_COLLAPSE_1459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="1160" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1459" aria-expanded="false" class="SubHead" data-dcnode-id="1157" href="javascript:ShowOrHideContentJquery('ICG_ETH_1459','1459');" tabindex="0"><span data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">162.028 PORTABLE FIRE EXTINGUISHERS</span></span></a><a data-dcnode-id="1156" name="ICG_ETH_1459"></a></div></div><div class="Normal" data-dcnode-id="1149"><div class="hideContent" data-dcnode-id="1150" id="ICG_ETH_1459"><span data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:&nbsp;</span></span><span data-dcnode-id="1151" instrument_node=""> The Coast Guard does not conduct approval review of Portable Fire Extinguishers.&nbsp; The regulations require that extinguishers are tested, and listed and labeled by a Coast Guard recognized Independent Testing Laboratory.&nbsp; The Listing includes testing, and follow-up inspections by the recognized Independent Testing Laboratory at the manufacturer’s production facilities.&nbsp; Currently, Underwriters Laboratories, Inc. (UL) and Underwriters Laboratories of Canada (ULC) are Recognized Independent Laboratories.&nbsp; Essentially, the recognized Independent Testing Laboratories administer the Coast Guard’s extinguisher approval program on the Coast Guard’s behalf with Coast Guard oversight.</span></div></div><span data-dcnode-id="1148" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="1138"><div class="ICG_ETH_Title" data-dcnode-id="1139"><a aria-controls="ICG_ETH_1460" aria-expanded="false" class="SubHead" data-dcnode-id="1145" href="javascript:ShowOrHideContentJquery('ICG_ETH_1460','1460');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="1147" height="15" id="ICG_ETH_EXPAND_1460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="1146" height="15" id="ICG_ETH_COLLAPSE_1460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="1144" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1460" aria-expanded="false" class="SubHead" data-dcnode-id="1141" href="javascript:ShowOrHideContentJquery('ICG_ETH_1460','1460');" tabindex="0"><span data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">162.029 FIXED FIRE EXTINGUISHING SYSTEMS (Pre-engineered)</span></span></a><a data-dcnode-id="1140" name="ICG_ETH_1460"></a></div></div><div class="Normal" data-dcnode-id="912"><div class="hideContent" data-dcnode-id="913" id="ICG_ETH_1460"><span data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:&nbsp;</span></span><span data-dcnode-id="1135" instrument_node=""> U.S. Coast Guard regulations require the installation of U.S. Coast Guard approved fixed gaseous extinguishing systems on certain U.S. registered inspected vessels and permit the substitution of an approved system for one of the required approved portable fire extinguisher on pleasure craft.</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">
</span><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">
In order to obtain a certificate of approval (i.e. type approval), compliance with the following criteria is required.&nbsp; These criteria determine the equivalency of new clean agent systems to the carbon dioxide systems currently specified in the various vessel regulations, and to the halon systems previously approved as equivalent to carbon dioxide systems.&nbsp; This updates and supplements the test program outlined in our Notice of Proposed Rulemaking published in the Federal Register on Wednesday, January 9, 1991, pages 829 through 836, to enable inclusion of clean agent replacements for halons.</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">
</span><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">
1)&nbsp;&nbsp;&nbsp; Approvals are issued only for complete systems made up of specific components and utilizing specific extinguishing agents.&nbsp; Approval is not issued for individual system components, such as individual hardware or extinguishing agents.&nbsp; The Coast Guard does not test materials or systems for approval but rather specifies the required test methods and minimum performance criteria for approval.&nbsp; Product testing must be performed by a Coast Guard Accepted Independent Laboratory.</span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
2)&nbsp;&nbsp;&nbsp; The extinguishing agent must be acceptable to the U.S. Environmental Protection Agency (EPA) under the Significant New Alternatives Policy (SNAP list) without restrictions that limit its use in marine applications.</span><br data-dcnode-id="1122"><span data-dcnode-id="1121" instrument_node="">
</span><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">
3)&nbsp;&nbsp;&nbsp; The agent must be recognized as a fire extinguishing medium by NFPA Standard #2001 on Clean Agent Fire Extinguishing Systems.</span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">
</span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
4)&nbsp;&nbsp;&nbsp; Systems must be listed and labeled for marine use by an independent testing laboratory accepted by the Coast Guard under 46 CFR 159.010.&nbsp; Laboratories currently so accepted are FM and UL.&nbsp; All tests must be conducted under the control of the laboratory.&nbsp; To be acceptable, the laboratory must apply and be accepted in accordance with 46CFR 159.010 prior to conducting any tests.&nbsp; A laboratory must demonstrate independence and technical expertise in the evaluation of the fire suppression systems in accordance with the latter regulation.</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">
</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
5)&nbsp;&nbsp;&nbsp; Systems must be intended for installation in spaces that are normally unoccupied, and that personnel can leave within 10 seconds after the system is actuated.</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">
</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
6)&nbsp;&nbsp;&nbsp; Systems are approved based on fire tests in simulated compartments of pre-determined size, and are not designed individually for each engine compartment.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">
</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
7)&nbsp;&nbsp;&nbsp; The primary system actuator must be automatic if the agent cylinder is installed in the protected space.</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">
</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">
8)&nbsp;&nbsp;&nbsp; Systems must have discharge indicators for installation at each helmsman’s position.</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
9)&nbsp;&nbsp;&nbsp; System components must meet UL 2166 “Standard for Halocarbon clean agent Extinguishing System Units.”</span><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">
</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
10)&nbsp;&nbsp; System must be intended for the protection against Class B hazards (flammable liquids) in machinery and bilge spaces, and Class C hazards (non-shock hazard when applied to energized electrical equipment).</span><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
</span><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
11)&nbsp;&nbsp; Systems intended for installation in small passenger vessel (46 CFR Subchapters T and K) must have manual (mechanical) back-up actuators, audible alarms, and automatic engine and ventilation shutdown upon system discharge.&nbsp; The engine shutdown feature must have a mechanism to quickly restart the engine(s).</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
</span><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">
12)&nbsp;&nbsp; Systems using fusible elements for actuation are limited to installation in spaces not exceeding 2000 cubic feet.&nbsp; Systems for larger unoccupied spaces or any spaces intended for human occupancy must be specifically designed for each space protected, i. e. engineered, and must provide personnel safeguards such as limits on the agent concentration, discharge delays, and pre-discharge alarms.</span><br data-dcnode-id="1082"><span data-dcnode-id="1081" instrument_node="">
</span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
13)&nbsp;&nbsp; Systems for fishing industry vessels are limited to spaces not exceeding a volume of 1200 cubic feet.</span><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">
</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
14)&nbsp;&nbsp; The volume of the compartment protected must be the gross volume: the length times the width times the depth of the compartment.&nbsp; The volume of installed equipment such as engine blocks and fuel tanks may not be deducted, unless the boat manufacturer provides a factory installed placard that states the volume of the installed tanks and engine blocks.</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
</span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">
15)&nbsp;&nbsp; Systems must be self-contained, i.e. not require an external source of power such as the boat’s electrical system for activation.</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
</span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">
16)&nbsp;&nbsp; Systems must be intended for installation in engine compartments where natural ventilation does not exceed one air change per minute.&nbsp; If mechanical ventilation is provided or if the natural ventilation is expected to be greater, a system tested under the higher air flow conditions must be installed.</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">
17)&nbsp;&nbsp; Systems containing a charge of nitrogen in addition to the extinguishing agent must have a listed pressure gage.&nbsp; This gage is not a substitute for the required discharge indicator.</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">
</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
18)&nbsp;&nbsp; Systems intended for installation in volumes of 1000 cubic feet and larger must have a manual back-up actuator.</span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">
</span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">
19)&nbsp;&nbsp; The system must be tested by the independent lab as follows:</span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node="">
</span><div data-dcnode-id="991" style="margin-left: 40px;"><span data-dcnode-id="1050" instrument_node="">a.&nbsp;&nbsp;&nbsp; Discharge tests per section 23 of UL2166.</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
b.&nbsp;&nbsp;&nbsp; Valve leakage tests per section 24 of UL2166.</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
c.&nbsp;&nbsp;&nbsp; Hydrostatic tests per section 25 of UL2166.</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
d.&nbsp;&nbsp;&nbsp; 30-day elevated temperature test per section 26 of UL2166.</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
e.&nbsp;&nbsp;&nbsp; Temperature cycling test per section 27 of UL2166.</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
</span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
f.&nbsp;&nbsp;&nbsp;&nbsp; Salt-spray corrosion tests per section 28 of UL2166.</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">
g.&nbsp;&nbsp;&nbsp; 500 cycle operation tests per section 29 of UL2166.</span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">
</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">
h.&nbsp;&nbsp;&nbsp; One-Year leakage test per section 32 of UL 2166.</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
i.&nbsp;&nbsp;&nbsp;&nbsp; Mounting device test per section 33 of UL2166.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">
</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
j.&nbsp;&nbsp;&nbsp;&nbsp; Manual actuator test per section 41 of UL 2166.</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
k.&nbsp;&nbsp;&nbsp; Tests of pressure gages and indicators per sections 44 through 49 UL2166.</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
l.&nbsp;&nbsp;&nbsp;&nbsp; Tests of elastomeric parts per section 51 of UL 2166.</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
m.&nbsp;&nbsp; Pressure relief test per section 53 of UL2166.</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
n.&nbsp;&nbsp;&nbsp; Nameplate exposure, adhesion and abrasion tests per sections 54 through 56 of UL2199.</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">
o.&nbsp;&nbsp;&nbsp; Marine tests per Supplement SA of UL 2166, including salt-spray corrosion, vibration &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp; resistance, and shock resistance tests.</span><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">
</span></div><span data-dcnode-id="990" instrument_node="">
</span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
20)&nbsp;&nbsp; Fire tests must be conducted in accordance with UL 2166.&nbsp; For systems without piping the fire tests of section 36 of UL 2166 must be conducted.&nbsp; The test must be repeated at the system manufacturer’s design concentration and under conditions of one air change per minute for the test enclosure. </span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">
</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
21)&nbsp;&nbsp; For the latter the test compartment must be ventilated at one air change per minute.&nbsp; Systems not incorporating an automatic engine shutdown feature must have placards for attaching to each helmsman’s position stating that the engine(s), generator, and any powered ventilation must be manually shutdown upon system activation.</span><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">
</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
22)&nbsp;&nbsp; Each system must have an owner’s instruction manual containing installation and maintenance instructions.&nbsp; Systems for pleasure craft are generally intended to be installed by the boat owner.&nbsp; Systems for inspected vessels are more complex since they require engine shutdowns, and are to be installed by system distributors or marine electricians.&nbsp; The owners manual must be specific to marine applications and must include the following:</span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
</span><div data-dcnode-id="938" style="margin-left: 40px;"><span data-dcnode-id="975" instrument_node="">a.&nbsp; Maximum gross volume limitations and maximum engine room/bilge dimensions.</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">
</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
b.&nbsp; Storage temperature range.</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">
c.&nbsp; Coast Guard approval number.</span><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">
d.&nbsp; Rated temperature of fusible link actuator.</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">
</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
e.&nbsp; Whether cylinders are refillable or nonrefillable.</span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">
</span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">
g.&nbsp; Instructions on the safe disposal of the extinguishing agent.</span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
</span><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">
h.&nbsp; Instructions on the periodic hydrostatic testing requirements for the agent cylinder if</span><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp; refillable.</span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
</span><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">
i.&nbsp;&nbsp; A statement that only one system may be installed in each protected volume, unless each &nbsp;&nbsp;&nbsp; system is individually rated to protect the space.</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
j.&nbsp; General maintenance instructions.</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
</span><span data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">SUBMITTAL PACKAGE:</span></span><span data-dcnode-id="932" instrument_node="">&nbsp; Please submit the following information in the Submittal Package:</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">
</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
</span><ul data-dcnode-id="914"><span data-dcnode-id="927" instrument_node="">
</span><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">A cover letter requesting Coast Guard Type Approval of the equipment.</span></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">A test report from the independent laboratory showing compliance of the product or equipment with UL2166.</span></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Evidence that an acceptable follow-up factory inspection program is in place in each factory location.&nbsp; This could be demonstrated by providing an original copy of the contract for a follow-up program between the manufacturer and the Accepted Independent Laboratory.&nbsp; The follow-up program must show that no unauthorized changes can be made to the equipment without proper review and approval by the Accepted Independent Laboratory.</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">An installation and maintenance manual as per paragraph number 23 of this section.</span></li><span data-dcnode-id="915" instrument_node="">
</span></ul></div></div><span data-dcnode-id="911" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="900"><div class="ICG_ETH_Title" data-dcnode-id="901"><a aria-controls="ICG_ETH_1461" aria-expanded="false" class="SubHead" data-dcnode-id="908" href="javascript:ShowOrHideContentJquery('ICG_ETH_1461','1461');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="910" height="15" id="ICG_ETH_EXPAND_1461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="909" height="15" id="ICG_ETH_COLLAPSE_1461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="907" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1461" aria-expanded="false" class="SubHead" data-dcnode-id="903" href="javascript:ShowOrHideContentJquery('ICG_ETH_1461','1461');" tabindex="0"><span data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">162.033 FOAM TYPE FIRE EXTINGUISHING SYSTEM</span></span><span data-dcnode-id="904" instrument_node="">
</span></a><a data-dcnode-id="902" name="ICG_ETH_1461"></a></div></div><div class="Normal" data-dcnode-id="700"><div class="hideContent" data-dcnode-id="701" id="ICG_ETH_1461"><p data-dcnode-id="777"><span data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:&nbsp;</span></span><span data-dcnode-id="897" instrument_node=""> Subchapter D of Title 46 of the Code of Federal Regulations (CFR) requires the installation of fixed low expansion foam fire extinguishing systems on decks of tankers for the protection of all cargo tanks.&nbsp; These systems are intended to provide protection against flammable liquid fires in the cargo area.&nbsp; An explanation of the basic characteristics of marine foam systems is contained in USCG </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/Portals/9/DCO%2520Documents/5p/5ps/NVIC/1970s/n6-72.pdf"><span data-dcnode-id="896" instrument_node="">Navigation and Vessel Inspection Circular (NVIC) No. 6-72</span></a><span data-dcnode-id="894" instrument_node="">.&nbsp; These systems must be designed to:</span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Extinguish the fire:&nbsp; Each foam formulation (type, percentage, etc.) must successfully extinguish a series of test fires using fuels representative of the type of cargoes carried on the vessels for which the systems are intended, as for example, gasoline as a test fuel for hydrocarbon cargoes.&nbsp; Tests will include foam generated with fresh and synthetic sea water.</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Prevent re-ignition of the fuel for a period of time:&nbsp; Each foam must demonstrate its ability to prevent ignition sources above the foam blanket from igniting the fuel below the foam blanket.&nbsp; In addition, the foams must prevent fire of small areas of exposed to fuel from increasing in size.</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Resist foam breakdown and provide a seal against hot metal:&nbsp; As part of the above, each foam must demonstrate its ability to form an effective blanket, and to resist foam breakdown due to contact with hot metal.</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
Approval is granted only for complete systems.&nbsp; Foam concentrates and individual components such as nozzles and monitors are not type approved individually; however, combinations of such components complying with UL 162 may be used to meet requirements for SOLAS "portable foam applicators" (see: </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/Portals/9/DCO%2520Documents/5p/5PS/Design%2520and%2520Engineering%2520Standards/Life%2520Saving%2520and%2520Fire%2520Safety/Docs/Marine%2520Inspect%2520Notice%252001-08%2520Port%2520Foam%2520Appl.pdf%3Fver%3D2017-10-20-144012-130"><span data-dcnode-id="877" instrument_node="">Marine Inspection Notice</span></a><span data-dcnode-id="875" instrument_node="">).</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
</span><span data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Fire tests of foam concentrate</span></span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">
Foam concentrates are subjected to marine fire extinguishment and burn back tests in accordance with the National Fire Protection Association Standard No. 11, Annex F.&nbsp; This test method was derived from Fed. Spec. O-F-555C, and is designed to evaluate the fire extinguishing capability of the foam concentrate when applied with a standard nozzle in a manner representative of ship-board applications.</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">
</span><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">
Foam quality tests using the standard nozzle are conducted during this test series, and the foam quality obtained during this test series is compared to the foam quality obtained from the systems manufacturer’s hand line nozzles and turret monitors.</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">
The fire tests must be conducted either at UL’s indoor facilities, or other facilities acceptable to the USCG.</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
A safety factor of 8/3 times the foam applications rate during the fire test will be applied to establish the minimum design foam application rate.</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
</span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
</span><span data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">System component tests in accordance with UL 162</span></span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
System components must demonstrate satisfactory performance when tested for compliance with Underwriters Laboratories, Inc. (UL) Standard No. 162.&nbsp; These tests include proportioning, foam quality, hydrostatic strength, leakage, friction loss, and exposure of components to the liquid concentrate.&nbsp; The foam quality must compare to the foam quality obtained during the above fire test within the tolerances specified by UL 162.</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><span data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Polar solvents</span></span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">
</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">
Polar solvent foam systems are water miscible products such as alcohols and ketones which attack regular fire fighting foams.&nbsp; Special polar solvent or alcohol resistant foams have therefore been developed where the foam application rate varies with the particular polar solvent cargo.&nbsp; Polar solvent cargoes may be protected with a uniform high SOLAS polar solvent foam application rate, or with specific lower application rates for specific polar solvent groups based on fire tests of representative cargoes.&nbsp; NVIC 11-82 provides details.</span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
Foam concentrates intended for the protection of polar solvent cargoes must be tested (in addition to being effective on hydrocarbon fuels) using several selected polar solvent fuels which are representative of specific classes of fuels (such as esters, ketones, acids, etc.).&nbsp; These tests are conducted in accordance with the relevant sections of UL 162, and will establish the foam application rate necessary for each category of polar solvents.</span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
</span><span data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">UL Listing</span></span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
The foam concentrate must be UL listed.</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
UL Listing of marine foam systems as a whole is preferred but has not been enforced.&nbsp; However, foam system components submitted are usually already UL Listed for industrial applications.&nbsp; UL Listing reports for various foam system components are therefore given consideration in lieu of new tests.</span><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
</span><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
Any non-collapsible (hard rubber) hose must either be UL Listed or be of comparable construction.</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><span data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Component tests in addition to UL 162</span></span><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
Foam discharge range tests using monitor turrets must be conducted to determine the effective range of foam discharge.&nbsp; The design range of the monitors as reflected in the system Manual is limited to 75% of the tested still air range.</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
The compatibility of any metallic or nonmetallic tank material with the various foam concentrates must be established.</span><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">
</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
ASME pressure tanks must meet the criteria of Subchapter F of Title 46 of the CFR.</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">
Piping sections carrying AFFF concentrate (not foam solutions) must be made of stainless steel.</span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
The Coast Guard does not test materials or systems for approval but rather specifies the required test methods and minimum performance criteria for approval.&nbsp; Product testing must be performed by a Coast Guard Accepted Independent Laboratory.</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
</span><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
</span><span data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">SUBMITTAL PACKAGE:</span></span><span data-dcnode-id="778" instrument_node="">&nbsp; Please submit the follow information in the Submittal Package:</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">&nbsp;</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">&nbsp;
</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">&nbsp;</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="767"></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&nbsp;
</span></p><ul data-dcnode-id="750"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">A cover letter requesting Coast Guard Type Approval of the equipment.</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">A test report from the Accepted Independent Laboratory showing compliance of the product or equipment with the above requirements.</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Evidence that an acceptable follow-up factory inspection program is in place in each factory location.&nbsp; This could be demonstrated by providing an original copy of the contract for a follow-up program between the manufacturer and the independent laboratory.&nbsp; The follow-up program must show that no unauthorized changes can be made to the equipment without proper review and approval by the Accepted Independent Laboratory.</span></li><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Draft marine design, operation, installation, and maintenance manual.&nbsp; The draft Manual should include the following information:</span></li><span data-dcnode-id="751" instrument_node="">
</span></ul><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="748"></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">&nbsp;</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">&nbsp;</span></p><span data-dcnode-id="741" instrument_node="">
</span><div data-dcnode-id="703" style="margin-left: 80px;"><span data-dcnode-id="740" instrument_node="">1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system manufacturer must provide a draft Marine Design Installation, Operation, and Maintenance Manual.&nbsp; USCG testing is intended to spot-check the hydraulic data contained in the Manual, not to conduct basic data development.</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">
</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Description of system design, including system schematic</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">
</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">
3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A complete list of components (hardware)</span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">
</span><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Drawings of major system components, such as nozzles, monitor turrets, proportioners, etc.</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Hydraulic data for system components (friction loss through components, pipe friction loss tables, etc.)</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; List of types and characteristics of foam concentrates (protein or AFFF, percent concentration, trade names of concentrates, etc.), as well as instructions and acceptance criteria for periodic sampling of foam concentrates obtained from each ship.</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
7.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Test data, such as proportioning curves, discharge curves (flow vs. supply pressure), ranges of foam discharge from nozzles, which will permit the establishment of a detailed test program to verify the manufacturer’s performance data.</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">
</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
8.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Sample calculations and drawings for typical foam system installations in accordance with the applicable vessel regulations (such as 46 CFR 34.17 for tank vessels) which will enable USCG personnel to verify calculations for each system installed on a specific vessel.&nbsp; The drawings must show the location of the deck foam monitors and the range of the foam stream from the monitors which may not exceed 75 % of their tested still air range.</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
9.&nbsp;&nbsp; &nbsp;&nbsp; Required system testing and maintenance instructions.</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
</span><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">
10.&nbsp;&nbsp;&nbsp; For polar solvent foam systems, a set of Annexes which contain the design foam application rate for each chemical cargo the systems is intended to protect.</span></div><span data-dcnode-id="702" instrument_node="">
</span></div></div><span data-dcnode-id="699" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="689"><div class="ICG_ETH_Title" data-dcnode-id="690"><a aria-controls="ICG_ETH_1463" aria-expanded="false" class="SubHead" data-dcnode-id="696" href="javascript:ShowOrHideContentJquery('ICG_ETH_1463','1463');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="698" height="15" id="ICG_ETH_EXPAND_1463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="697" height="15" id="ICG_ETH_COLLAPSE_1463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="695" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1463" aria-expanded="false" class="SubHead" data-dcnode-id="692" href="javascript:ShowOrHideContentJquery('ICG_ETH_1463','1463');" tabindex="0"><span data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">162.035 HALON 1301 TYPE FIRE EXTINGUISHING SYSTEM (OBSOLETE)</span></span></a><a data-dcnode-id="691" name="ICG_ETH_1463"></a></div></div><div class="Normal" data-dcnode-id="684"><div class="hideContent" data-dcnode-id="685" id="ICG_ETH_1463"><span data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:</span></span><span data-dcnode-id="686" instrument_node="">&nbsp; The production of Halon 1301 fire fighting agent was terminated effective January 1, 1994, and the installation of new halon systems on SOLAS ships prohibited.&nbsp; However, existing systems may be retained if in good and serviceable condition.</span></div></div><span data-dcnode-id="683" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="673"><div class="ICG_ETH_Title" data-dcnode-id="674"><a aria-controls="ICG_ETH_1464" aria-expanded="false" class="SubHead" data-dcnode-id="680" href="javascript:ShowOrHideContentJquery('ICG_ETH_1464','1464');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="682" height="15" id="ICG_ETH_EXPAND_1464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="681" height="15" id="ICG_ETH_COLLAPSE_1464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="679" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1464" aria-expanded="false" class="SubHead" data-dcnode-id="676" href="javascript:ShowOrHideContentJquery('ICG_ETH_1464','1464');" tabindex="0"><span data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">162.038 CARBON DIOXIDE TYPE FIRE EXTINGUISHING SYSTEM</span></span></a><a data-dcnode-id="675" name="ICG_ETH_1464"></a></div></div><div class="Normal" data-dcnode-id="588"><div class="hideContent" data-dcnode-id="589" id="ICG_ETH_1464"><span data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:</span></span><span data-dcnode-id="670" instrument_node=""> Type approved systems must be listed and labeled for marine use by a Coast Guard accepted independent testing laboratory. The laboratory uses the criteria in NFPA 12 and the vessel regulations, along with appropriate environmental tests for major system components as a basis for the listing.</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
Fire extinguishing tests and nozzle distribution tests not required as part of the approval testing, since the carbon dioxide used in fire protection systems is a standard commercial grade product with known, uniform fire extinguishing properties.</span><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">
</span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">
Carbon dioxide is a very effective fire extinguishing agent; however, the concentration of carbon dioxide needed for fire extinguishment can cause injury or death during and after discharge. Navigation and Vessel Inspection Circular 9-00, Change 1, </span><i data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Carbon Dioxide System Safety</span></i><span data-dcnode-id="659" instrument_node="">, provides detailed safety information on the risks of carbon dioxide systems, and should be consulted to fully understand the safety precautions to be taken whenever testing or inspecting carbon dioxide systems.</span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
</span><br data-dcnode-id="656"><span data-dcnode-id="655" instrument_node="">
The regulations provide a number of comprehensive safety measures to safeguard personnel from these risks, including requirements for:</span><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
</span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">
</span><ol data-dcnode-id="637"><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Conspicuous warning signs to be posted by the entrances to carbon dioxide cylinder rooms, any spaces protected by carbon dioxide systems, and any adjacent spaces where carbon dioxide could migrate;</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Evacuation of all normally occupies spaces before the extinguishing agent is discharged;</span></li><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Pre-discharge warning sirens in the protested space that sound for a sufficient period of time to allow the crew to evacuate the space before the discharge begins; and</span></li><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">System releasing stations designed to require the operation of two separate and distinct controls before system discharge is initiated, to prevent a single action from accidentally releasing the system.</span></li><span data-dcnode-id="638" instrument_node="">
</span></ol><span data-dcnode-id="636" instrument_node="">
In addition, all systems installed or materially altered after July 9, 2013 will be required to have manually operated lockout valves and odorizing units in the system discharge piping to allow the protected space to be completely isolated from the carbon dioxide supply whenever the system is being serviced or tested, and add wintergreen odor to the gas during discharge to allow personnel to quickly recognize any areas where carbon dioxide may be present.</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">
</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">
</span><span data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">SUBMITTAL PACKAGE:&nbsp;</span></span><span data-dcnode-id="629" instrument_node=""> Please submit the following information in the Submittal Package:</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
</span><ul data-dcnode-id="590"><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">A cover letter requesting Coast Guard Type Approval of the equipment.</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">A test report from the Accepted Independent Laboratory showing compliance of the product or equipment with the applicable UL requirements and Coast Guard vessel regulations.&nbsp; Please refer to Subchapter D, H, I, I-A, K, R, and U for the details of the system types.</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Evidence that an acceptable follow-up factory inspection program is in place in each factory location.&nbsp; This could be demonstrated by providing an original copy of the contract for a follow-up program between the manufacturer and the Accepted Independent Laboratory.&nbsp; The follow-up program must show that no unauthorized changes can be made to the equipment without proper review and approval by the Accepted Independent Laboratory.</span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="614" instrument_node="">Draft marine design, operation, installation, and maintenance manual.&nbsp; The draft manual should include the following information:
    </span><ol data-dcnode-id="594"><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Description of system design, including system schematic.</span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">A complete list of components.</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Drawings of major system components, such as nozzles, selector valves, agent storage cylinders, etc.</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Sample computer program input sheets.</span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Sample calculations and drawings for typical system installations in accordance with the applicable vessel regulations (such as 46 CFR 95.15 for cargo vessels) which will enable USCG personnel to verify calculations for each system installed on a specific vessel.</span></li><span data-dcnode-id="598" instrument_node="">
</span><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Samples of warning labels on the hazards of carbon dioxide.</span></li><span data-dcnode-id="595" instrument_node="">
</span></ol><span data-dcnode-id="593" instrument_node="">
</span></li><span data-dcnode-id="591" instrument_node="">
</span></ul></div></div><span data-dcnode-id="587" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="577"><div class="ICG_ETH_Title" data-dcnode-id="578"><a aria-controls="ICG_ETH_1465" aria-expanded="false" class="SubHead" data-dcnode-id="584" href="javascript:ShowOrHideContentJquery('ICG_ETH_1465','1465');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="586" height="15" id="ICG_ETH_EXPAND_1465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="585" height="15" id="ICG_ETH_COLLAPSE_1465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="583" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1465" aria-expanded="false" class="SubHead" data-dcnode-id="580" href="javascript:ShowOrHideContentJquery('ICG_ETH_1465','1465');" tabindex="0"><span data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">162.039 SEMI PORTABLE MARINE TYPE FIRE EXTINGUISHER</span></span></a><a data-dcnode-id="579" name="ICG_ETH_1465"></a></div></div><div class="Normal" data-dcnode-id="568"><div class="hideContent" data-dcnode-id="569" id="ICG_ETH_1465"><span data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">APPROVAL GUIDANCE &amp; INFORMATION:</span></span><span data-dcnode-id="574" instrument_node="">&nbsp; The Coast Guard defines semi-portable extinguishers as those fully charged extinguishers weighing more than 55 pounds.&nbsp; Semi-portable extinguishers must be self-contained, i.e. not rely on additional sources of agent or expellant energy.&nbsp; They may be wheeled or skid-mounted.</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
The regulations require that extinguishers are tested, listed and labeled by an Independent Testing Laboratory recognized by the Coast Guard.&nbsp; The Listing includes testing, and follow-up inspections by the recognized Independent Testing Laboratory at the manufacturer’s production facilities.&nbsp; Currently, Underwriters Laboratories, Inc. (UL) and Underwriters Laboratories of Canada (ULC) are&nbsp; recognized Independent Laboratory.&nbsp; Essentially, the recognized Independent Testing Laboratories administer the Coast Guard’s extinguisher approval program on the Coast Guard’s behalf with Coast Guard oversight.</span></div></div><span data-dcnode-id="567" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="556"><div class="ICG_ETH_Title" data-dcnode-id="557"><a aria-controls="ICG_ETH_1466" aria-expanded="false" class="SubHead" data-dcnode-id="564" href="javascript:ShowOrHideContentJquery('ICG_ETH_1466','1466');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="566" height="15" id="ICG_ETH_EXPAND_1466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="565" height="15" id="ICG_ETH_COLLAPSE_1466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="563" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1466" aria-expanded="false" class="SubHead" data-dcnode-id="559" href="javascript:ShowOrHideContentJquery('ICG_ETH_1466','1466');" tabindex="0"><span data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">162.161 ENGINEERED HALOCARBON FIRE EXT. SYSTEM (and Clean Agent Fire Ext. Systems)</span></span><span data-dcnode-id="560" instrument_node="">
</span></a><a data-dcnode-id="558" name="ICG_ETH_1466"></a></div></div><div class="Normal" data-dcnode-id="492"><div class="hideContent" data-dcnode-id="493" id="ICG_ETH_1466"><p data-dcnode-id="516"><span data-dcnode-id="555" instrument_node="">APPROVAL GUIDANCE: In 2012, the Coast Guard regulations were amended to accept engineered clean agent extinguishing systems as equivalent to fixed carbon dioxide systems for all applications except for the protection of cargo holds. Detailed type approval criteria for both halocarbon and inert gas clean agents may&nbsp;be found in </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/cgi-bin/text-idx%3FSID%3D5ddb622017504602b19acbde0cb997ff%26mc%3Dtrue%26node%3Dpt46.6.162%26rgn%3Ddiv5%23sp46.6.162.162_1161"><span data-dcnode-id="554" instrument_node="">46 CFR 162.161</span></a><span data-dcnode-id="552" instrument_node="">, while design installation and testing requirements are listed in </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ecfr.gov/cgi-bin/text-idx%3Fc%3Decfr%26SID%3D44c444b37d55d8c411http%3A//www.ecfr.gov/cgi-bin/text-idx%3Fc%3Decfr%26SID%3D44c444b37d55d8c4111bbdf3f450da18%26rgn%3Ddiv6%26view%3Dtext%26node%3D46%3A4.0.1.1.5.6%26idno%3D46"><span data-dcnode-id="551" instrument_node="">46 CFR 95.16</span></a><span data-dcnode-id="549" instrument_node="">. General type approval criteria are summarized below:</span><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">
</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">
1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Approvals are issued only for complete systems utilizing specific extinguishing agents.&nbsp; Approval is not issued for individual system components, hardware, or extinguishing agents.</span><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">
</span><br data-dcnode-id="542"><span data-dcnode-id="541" instrument_node="">
2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The agent must be acceptable to the U.S. Environmental Protection Agency (EPA) for use in occupied spaces under the Significant New Alternatives Policy (SNAP list).</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The agent must be recognized as a fire extinguishing medium by NFPA Standard 2001, </span><i data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Standard on Clean Agent Fire Extinguishing Systems</span></i><span data-dcnode-id="534" instrument_node="">.</span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">
</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">
4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must successfully pass the fire tests in IMO MSC/Circ. 848, </span><i data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Revised Guidelines for the approval of equivalent fixed gas fire-extinguishing systems, as referred to in SOLAS 74, for machinery spaces and cargo pump-rooms</span></i><span data-dcnode-id="527" instrument_node="">, as further amended by MSC.1/Circ. 1267.</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must be listed and labeled for marine use by a Coast Guard accepted independent testing laboratory.</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must have an associated marine design, installation, operation, and maintenance manual. The manual must be specific to marine applications and must include the following:</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="515" instrument_node="">
</span><ul data-dcnode-id="495"><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Limitations on nozzle placement and spacing determined from the type approval tests.</span></li><span data-dcnode-id="511" instrument_node="">
</span><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Description of system design, including system schematic.</span></li><span data-dcnode-id="508" instrument_node="">
</span><li data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">A complete list of components.</span></li><span data-dcnode-id="505" instrument_node="">
</span><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Drawings of major system components, such as nozzles, selector valves, agent storage cylinders or tanks, etc.</span></li><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Sample computer program input sheets.</span></li><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Sample calculations and drawings for typical system installations in accordance with the applicable vessel regulations (such as 46 CFR 95.15 for cargo vessels) which will enable USCG personnel to verify calculations.</span></li><span data-dcnode-id="496" instrument_node="">
</span></ul><span data-dcnode-id="494" instrument_node="">
</span></div></div><span data-dcnode-id="491" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="480"><div class="ICG_ETH_Title" data-dcnode-id="481"><a aria-controls="ICG_ETH_1467" aria-expanded="false" class="SubHead" data-dcnode-id="488" href="javascript:ShowOrHideContentJquery('ICG_ETH_1467','1467');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="490" height="15" id="ICG_ETH_EXPAND_1467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="489" height="15" id="ICG_ETH_COLLAPSE_1467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="487" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1467" aria-expanded="false" class="SubHead" data-dcnode-id="483" href="javascript:ShowOrHideContentJquery('ICG_ETH_1467','1467');" tabindex="0"><span data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">162.162 ENGINEERED INERT FIRE EXTINGUISHING SYSTEM</span></span><span data-dcnode-id="484" instrument_node="">
</span></a><a data-dcnode-id="482" name="ICG_ETH_1467"></a></div></div><div class="Normal" data-dcnode-id="416"><div class="hideContent" data-dcnode-id="417" id="ICG_ETH_1467"><p data-dcnode-id="440"><span data-dcnode-id="479" instrument_node="">APPROVAL GUIDANCE: In 2012, the Coast Guard regulations were amended to accept engineered clean agent extinguishing systems as equivalent to fixed carbon dioxide systems for all applications except for the protection of cargo holds. Detailed type approval criteria for both halocarbon and inert gas clean agents may&nbsp;be found in </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/cgi-bin/text-idx%3FSID%3D5ddb622017504602b19acbde0cb997ff%26mc%3Dtrue%26node%3Dpt46.6.162%26rgn%3Ddiv5%23sp46.6.162.162_1161"><span data-dcnode-id="478" instrument_node="">46 CFR 162.161</span></a><span data-dcnode-id="476" instrument_node="">, while design installation and testing requirements are listed in </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ecfr.gov/cgi-bin/text-idx%3Fc%3Decfr%26SID%3D44c444b37d55d8c411http%3A//www.ecfr.gov/cgi-bin/text-idx%3Fc%3Decfr%26SID%3D44c444b37d55d8c4111bbdf3f450da18%26rgn%3Ddiv6%26view%3Dtext%26node%3D46%3A4.0.1.1.5.6%26idno%3D46"><span data-dcnode-id="475" instrument_node="">46 CFR 95.16</span></a><span data-dcnode-id="473" instrument_node="">. General type approval criteria are summarized below:</span><br data-dcnode-id="472"><span data-dcnode-id="471" instrument_node="">
</span><br data-dcnode-id="470"><span data-dcnode-id="469" instrument_node="">
1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Approvals are issued only for complete systems utilizing specific extinguishing agents.&nbsp; Approval is not issued for individual system components, hardware, or extinguishing agents.</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">
2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The agent must be acceptable to the U.S. Environmental Protection Agency (EPA) for use in occupied spaces under the Significant New Alternatives Policy (SNAP list).</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">
</span><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">
3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The agent must be recognized as a fire extinguishing medium by NFPA Standard 2001, </span><i data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Standard on Clean Agent Fire Extinguishing Systems</span></i><span data-dcnode-id="458" instrument_node="">.</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">
4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must successfully pass the fire tests in IMO MSC/Circ. 848, </span><i data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Revised Guidelines for the approval of equivalent fixed gas fire-extinguishing systems, as referred to in SOLAS 74, for machinery spaces and cargo pump-rooms</span></i><span data-dcnode-id="451" instrument_node="">, as further amended by MSC.1/Circ. 1267.</span><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">
</span><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">
5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must be listed and labeled for marine use by a Coast Guard accepted independent testing laboratory.</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">
</span><br data-dcnode-id="444"><span data-dcnode-id="443" instrument_node="">
6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The system must have an associated marine design, installation, operation, and maintenance manual. The manual must be specific to marine applications and must include the following:</span><br data-dcnode-id="442"><span data-dcnode-id="441" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="439" instrument_node="">
</span><ul data-dcnode-id="419"><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Limitations on nozzle placement and spacing determined from the type approval tests.</span></li><span data-dcnode-id="435" instrument_node="">
</span><li data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Description of system design, including system schematic.</span></li><span data-dcnode-id="432" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">A complete list of components.</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Drawings of major system components, such as nozzles, selector valves, agent storage cylinders or tanks, etc.</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Sample computer program input sheets.</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Sample calculations and drawings for typical system installations in accordance with the applicable vessel regulations (such as 46 CFR 95.15 for cargo vessels) which will enable USCG personnel to verify calculations.</span></li><span data-dcnode-id="420" instrument_node="">
</span></ul><span data-dcnode-id="418" instrument_node="">
</span></div></div><span data-dcnode-id="415" instrument_node="">
</span></div><span data-dcnode-id="413" instrument_node="">
</span></div></div><span data-dcnode-id="409" instrument_node="">
</span><div class="clearfix" data-dcnode-id="408"></div><span data-dcnode-id="407" instrument_node="">
</span></div><span data-dcnode-id="405" instrument_node="">
</span></div><div class="DnnModule DnnModule-ICGModulesExpandableTextHtml DnnModule-18053" data-dcnode-id="223"><a data-dcnode-id="403" name="18053"></a><span data-dcnode-id="402" instrument_node="">
</span><div class="containers-v2 has-margin" data-dcnode-id="225"><span data-dcnode-id="401" instrument_node="">
</span><div data-dcnode-id="229" id="dnn_ctr18053_ContentPane"><div class="DNNModuleContent ModICGModulesExpandableTextHtmlC" data-dcnode-id="231" id="dnn_ctr18053_ModuleContent"><span data-dcnode-id="399" instrument_node="">
</span><div data-dcnode-id="233"><span data-dcnode-id="398" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="389"><div class="ICG_ETH_Title" data-dcnode-id="390"><a aria-controls="ICG_ETH_1469" aria-expanded="false" class="SubHead" data-dcnode-id="395" href="javascript:ShowOrHideContentJquery('ICG_ETH_1469','1469');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="397" height="15" id="ICG_ETH_EXPAND_1469" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="396" height="15" id="ICG_ETH_COLLAPSE_1469" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="394" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1469" aria-expanded="false" class="SubHead" data-dcnode-id="392" href="javascript:ShowOrHideContentJquery('ICG_ETH_1469','1469');" tabindex="0"><span data-dcnode-id="393" instrument_node="">Choice of Extinguishing Systems</span></a><a data-dcnode-id="391" name="ICG_ETH_1469"></a></div></div><div class="Normal" data-dcnode-id="370"><div class="hideContent" data-dcnode-id="371" id="ICG_ETH_1469"><span data-dcnode-id="388" instrument_node="">An operator of a subchapter T vessel that is required to install a fixed gas fire extinguishing system has several alternatives.</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp; The operator may choose a system that will alert him or her to a fire through a fire detection system prior to the operator discharging a manual fixed system</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">
</span><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node="">
-or-</span><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">
</span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp; The operator may install a completely automatic system that discharges the fixed system upon detection of a fire without any interaction from the operator.</span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
</span><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
While automatic mechanical ventilation shut-off is required on all custom and pre-engineered fixed gas fire extinguishing systems, an automatic engine shutdown is not. The automatic shutdown of propulsion machinery is only required when the fixed gas fire extinguishing system is activated and when the machinery draws its intake air from within the protected space. However, a dedicated intake air duct to all propulsion machinery from outside the protected space eliminates the need for an automatic engine shut-off switch. The requirement for automatic shut-off switches stems from two facts: that propulsion machinery or mechanical ventilation of the protected space may deplete the extinguishing agent before it is able to perform its function; and that most engine room fires are caused and/or fed by fuel or lubricating oil. An automatic shut-off may also prevent damage to the propulsion machinery from intake of an extinguishing agent and allow an expeditious restart of the propulsion machinery after extinguishing the fire.</span></div></div><span data-dcnode-id="369" instrument_node="">
