</span><div class="ICG_ETH_Expanders" data-dcnode-id="360"><div class="ICG_ETH_Title" data-dcnode-id="361"><a aria-controls="ICG_ETH_1470" aria-expanded="false" class="SubHead" data-dcnode-id="366" href="javascript:ShowOrHideContentJquery('ICG_ETH_1470','1470');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="368" height="15" id="ICG_ETH_EXPAND_1470" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="367" height="15" id="ICG_ETH_COLLAPSE_1470" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="365" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1470" aria-expanded="false" class="SubHead" data-dcnode-id="363" href="javascript:ShowOrHideContentJquery('ICG_ETH_1470','1470');" tabindex="0"><span data-dcnode-id="364" instrument_node="">Engine Shutdown Options</span></a><a data-dcnode-id="362" name="ICG_ETH_1470"></a></div></div><div class="Normal" data-dcnode-id="341"><div class="hideContent" data-dcnode-id="342" id="ICG_ETH_1470"><span data-dcnode-id="359" instrument_node="">The various engine shut-down options available are explained below:</span><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">
</span><br data-dcnode-id="356"><span data-dcnode-id="355" instrument_node="">
1. If the machinery space of the subchapter T vessel can be protected by the contents of one portable or semi-portable fire extinguisher, such an extinguisher may be used as a fixed gas fire extinguishing system subject to the requirements found in 46 CFR 181.400(b)(5). When installing a fixed system such as this, a fire detecting system per the requirements of 46 CFR 181.400(c) is also needed. This allows for complete manual control of the fixed gas fire extinguishing system by the operator of the vessel. Marking instructions required by 46 CFR 185.612 direct the operator to secure ventilation and machinery prior to the discharge of the fixed system.</span><br data-dcnode-id="354"><span data-dcnode-id="353" instrument_node="">
</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
2. A custom-engineered fixed gas fire extinguishing system may be installed in a subchapter T vessel in accordance with 46 CFR 181.410. It is installed as a manual system activated by the operator following the indication of a fire from a fire detection system in the protected space. If the propulsion machinery draws intake air from within the protected space, mechanical ventilation is automatically shut off following the fixed system's activation by the operator.</span><br data-dcnode-id="350"><span data-dcnode-id="349" instrument_node="">
</span><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">
3. A subchapter T vessel operator may install an "off the shelf" pre-engineered system in accordance with 46 CFR 181.420. This system will automatically shutdown propulsion machinery (that draws air from the protected space), and mechanical ventilation without any interaction from the operator. Some manufacturers provide a spring activated manual override switch that permits the operator to maneuver his vessel out of danger before initiating the shutdowns and subsequent discharge of the fixed gas fire extinguishing system.</span><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">
</span><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">
4. Subchapter T was written assuming that Clean Agents would be the preferred extinguishing agents for these vessels since less of these agents, as opposed to CO2 , is needed to accomplish the same task. The thinking was that most small passenger vessels lacked sufficient space to accommodate CO2 cylinders. Since Clean Agents may be consumed by the engines, depleting the concentration to a point that it would not extinguish a fire, the requirement for an automatic shut down of the engines was included in the regulations. CO2, when ingested by an engine, will shut down the engine effectively serving as a shut down device. Therefore, operators who choose CO2 as the extinguishing agent may forgo the installation of a separate device to shut the engines down. This action may be taken under 46 CFR 175.540 as an equivalency.</span></div></div><span data-dcnode-id="340" instrument_node="">
</span><div class="ICG_ETH_Expanders" data-dcnode-id="331"><div class="ICG_ETH_Title" data-dcnode-id="332"><a aria-controls="ICG_ETH_1468" aria-expanded="false" class="SubHead" data-dcnode-id="337" href="javascript:ShowOrHideContentJquery('ICG_ETH_1468','1468');" tabindex="0"><img alt="Click here to expand content" data-dcnode-id="339" height="15" id="ICG_ETH_EXPAND_1468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/max.gif&amp;raw" style="border-style: none;" width="12"><img alt="Click here to collapse content" class="hideContent" data-dcnode-id="338" height="15" id="ICG_ETH_COLLAPSE_1468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/images/min.gif&amp;raw" style="border-style: none;" width="12"></a><span data-dcnode-id="336" instrument_node=""> &nbsp;</span><a aria-controls="ICG_ETH_1468" aria-expanded="false" class="SubHead" data-dcnode-id="334" href="javascript:ShowOrHideContentJquery('ICG_ETH_1468','1468');" tabindex="0"><span data-dcnode-id="335" instrument_node="">Types of Fixed Firefighting Systems</span></a><a data-dcnode-id="333" name="ICG_ETH_1468"></a></div></div><div class="Normal" data-dcnode-id="235"><div class="hideContent" data-dcnode-id="236" id="ICG_ETH_1468"><span data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Custom engineered systems</span></span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">
</span><br data-dcnode-id="326"><span data-dcnode-id="325" instrument_node="">
These are type approved systems originally intended for manned spaces on large vessels, but include scaled-down system configurations suitable for installation in unmanned spaces such as engine compartments on Subchapter T vessels. They include carbon dioxide systems (approval category 162.038) and&nbsp;new clean fire extinguishing agents such as FM200 (approval category 162.161). There are no new halon systems because halon is no longer manufactured due to environmental concerns.</span><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node="">
</span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">
These systems are type approved after initial testing by an independent testing lab (Underwriters Laboratories) and are described in the manufacturer's approved design, installation, operation and maintenance manual. They are called "engineered" or "custom engineered" because they are specifically designed for each vessel's engine room by amount of agent, pipe lengths, pipe sizes, nozzle size, number of nozzles, etc. The system manufacturer's distributor (not the vessel operator) designs these systems by entering a vessel's engine room dimensions into the manufacturer's computer program, which calculates the amount of agent, number of agent cylinders, pipe sizes, and number and size of nozzles, etc., needed to protect the specific engine room. The system components must be selected from the manufacturer's approved manual.</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">
</span><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node="">
Manufacturers of custom engineered systems are issued certificates of approval, which can be found on-line at </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cgmix.uscg.mil/" target="_blank"><span data-dcnode-id="316" instrument_node="">CGMIX</span></a><span data-dcnode-id="314" instrument_node="">.</span><br data-dcnode-id="313"><span data-dcnode-id="312" instrument_node="">
</span><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">
The review of these systems is conducted primarily by the </span><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dco.uscg.mil/Our-Organization/Assistant-Commandant-for-Prevention-Policy-CG-5P/Commercial-Regulations-standards-CG-5PS/Marine-Safety-Center-MSC/" target="_blank"><span data-dcnode-id="309" instrument_node="">Coast Guard Marine Safety Center</span></a><span data-dcnode-id="307" instrument_node="">.</span><br data-dcnode-id="306"><span data-dcnode-id="305" instrument_node="">
</span><br data-dcnode-id="304"><span data-dcnode-id="303" instrument_node="">
</span><span data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Pre-engineered systems</span></span><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">
</span><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">
These are type approved systems originally designed for pleasure craft engine compartments as automatic systems, but many models are suitable for many Subchapter T applications because they are equipped with manual backup actuators and provisions for ventilation and engine shutdowns. They are called "pre-engineered" because they are tested by an independent testing lab (UL or FM) to extinguish a fire in a simulated engine compartment of the maximum volume which they are intended to protect. Unlike custom engineered systems, a pre-engineered system can be installed in any unmanned engine room of equal or lesser gross volume in accordance with the limitations described in its owner's manual.</span><br data-dcnode-id="296"><span data-dcnode-id="295" instrument_node="">
</span><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node="">
The systems are intended to be an "off the shelf" item suitable for installation by either a fire equipment distributor or the vessel's operator. The systems currently type approved are simple, consisting of a single agent cylinder with attached valve, and are attached to a bulkhead inside the engine compartment. Currently approved systems have no discharge piping, the agent being discharged directly from the cylinder valve through the attached sprinkler head when the heat from a fire causes the sprinkler head to actuate. The agents include clean agents FM200 and FE241 (all under approval category 162.029), and carbon dioxide (although no systems are currently being marketed). The systems must be installed and maintained in accordance with the manufacturer's approved owner's manual.</span><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">
</span><br data-dcnode-id="290"><span data-dcnode-id="289" instrument_node="">
Manufacturers of pre-engineered systems are issued certificates of approval, which can be found on-line at </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cgmix.uscg.mil/" target="_blank"><span data-dcnode-id="288" instrument_node="">CGMIX</span></a><span data-dcnode-id="286" instrument_node="">.</span><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">
</span><br data-dcnode-id="283"><span data-dcnode-id="282" instrument_node="">
These system installations are reviewed and approved by the Coast Guard Officer in Charge Marine Inspection (OCMI) on a vessel-by-vessel basis.</span><br data-dcnode-id="281"><span data-dcnode-id="280" instrument_node="">
</span><br data-dcnode-id="279"><span data-dcnode-id="278" instrument_node="">
</span><span data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Alternatives</span></span><br data-dcnode-id="275"><span data-dcnode-id="274" instrument_node="">
</span><br data-dcnode-id="273"><span data-dcnode-id="272" instrument_node="">
If the machinery space of the Subchapter T vessel can be protected by the contents of one portable or semi-portable fire extinguisher, such an extinguisher may be used as a fixed gas fire extinguishing system subject to the requirements found in 46 CFR 181.400(b)(5). However, portable and semi-portable extinguishers may not be converted into fixed systems by replacing components such as valves, hoses and nozzles with miscellaneous valves, piping, etc., for the following reasons:</span><br data-dcnode-id="271"><span data-dcnode-id="270" instrument_node="">
</span><br data-dcnode-id="269"><span data-dcnode-id="268" instrument_node="">
1. Such modifications void laboratory (Underwriters Laboratories (UL) or Factory Mutual (FM)) listings and Coast Guard type approvals. Also, manufacturers will deny responsibility when injuries occur or the modified equipment does not extinguish a fire.</span><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">
</span><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">
2. There is no guarantee that the modified equipment will work. Fire extinguishers obtain their UL or FM Listings and CG type approval after undergoing extensive tests and quality control inspections. They're approved as a unit (as they leave the factory). Field modifications do not have the benefit of having undergone such tests.</span><br data-dcnode-id="263"><span data-dcnode-id="262" instrument_node="">
</span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
3. Modifying fire extinguishers is inherently dangerous to the persons doing the modifications because it involves high pressure cylinders (the pressure inside a CO2 extinguisher is 850 psi at 70 degrees F (5900 kPa at 21 degrees C)). That's why DOT requires organizations servicing high pressure cylinders to be DOT certified.</span><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">
</span><br data-dcnode-id="257"><span data-dcnode-id="256" instrument_node="">
It is possible to use portable and semi-portable extinguishers to flood engine compartments in lieu of using a fixed system by following these guidelines:</span><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">
</span><br data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
A portable extinguisher attached to the outside of the engine compartment can be discharged through a closeable discharge port into the protected compartment. The method of attachment should permit the nozzle to be inserted into the discharge port during a fire. The discharge port must be sized to accommodate the extinguisher nozzle. This procedure is also used on pleasure craft as an (second best) alternative to fixed systems protecting small volumes (</span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abyc.site-ym.com/" target="_blank"><span data-dcnode-id="251" instrument_node="">American Boat and Yacht Council</span></a><span data-dcnode-id="249" instrument_node=""> (ABYC) Standards, Chapter A-4), where a portable fire extinguisher is attached by its bracket next to the discharge port. This concept has been shown to be a viable concept for small engine compartments through tests by ABYC committee members and Coast Guard R&amp;D Report No. CG-D-31-76.</span><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">
</span><br data-dcnode-id="246"><span data-dcnode-id="245" instrument_node="">
The situation with semi-portable extinguishers (46 CFR 162.039 defines them as extinguishers exceeding 55 pounds (25 kg) in gross weight) is more complex in view of the greater amount of CO2 used (currently up to 100 pounds (45 kg)), and the larger spaces this amount of CO2 can protect.&nbsp; They are permitted where they can supply the amount of CO2 needed for total flooding as determined by the OCMI. However, to work properly, the nozzles must distribute the agent uniformly throughout the space. For the engineered CO2 systems they are intended to replace, the reach of CO2 from a single nozzle is about 10 feet (3 m). Nozzles for engineered systems are spaced uniformly throughout the space in order to achieve a uniform extinguishing agent concentration. As a result the use of semi-portables (which have only one nozzle) should be limited to situations where a one-nozzle system would suffice, i.e. the distance from the nozzle to the compartment end should not exceed 10 feet (3 m). The volume of the space so protected should therefore be not more than 1000 cubic feet (28 cu m). It is also not acceptable to hang the hose into the protected compartment and rig the spring-loaded valve at the end of the hose to stay open. The rubber hoses and plastic nozzles have not been subjected to any relevant testing and are not expected to withstand a fire exposure.</span><br data-dcnode-id="244"><span data-dcnode-id="243" instrument_node="">
</span><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node="">
The semi-portables must not be modified, by replacing valves, hoses and nozzles which are supplied as an integral part of each semi-portable with different valves, fixed pipe, and different nozzles. Any semi-portable systems that have been so modified are to be considered custom-engineered systems and must be specifically approved by the Coast Guard in accordance with 46 CFR 181.410.</span><br data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">
</span><br data-dcnode-id="238"><span data-dcnode-id="237" instrument_node="">
In view of the great variety of engine compartment designs and fire protection equipment available it will not be possible to provide specific guidance applicable to all situations encountered in the field. The above may be used as general guidance to be applied to the extent local conditions permit. Unusual situations must be addressed on a vessel-by-vessel basis. For example, where the large and irregular shape of the protected space does not permit the above mentioned nozzle coverage, or where the space has a significant amount of uncloseable openings, additional CO2 may be supplied as compensation to ensure that the CO2 in the space can reach extinguishing concentrations.</span></div></div><span data-dcnode-id="234" instrument_node="">
</span></div><span data-dcnode-id="232" instrument_node="">
</span></div></div><span data-dcnode-id="228" instrument_node="">
