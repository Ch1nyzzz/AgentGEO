</span><h1 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Fire Suppression System Installations Vancouver</span></h1><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">What is the best choice of fire suppressant for your facility?</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Would a chemical- or gas-based fire suppression system protect your building and its assets better than a water-based system?</span></p><span data-dcnode-id="493" instrument_node="">
</span><ul data-dcnode-id="474"><span data-dcnode-id="492" instrument_node="">
</span><li data-dcnode-id="487"><span data-dcnode-id="491" instrument_node="">Building owners and managers often opt for </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/fire-suppression-installations/%23clean-gas"><span data-dcnode-id="490" instrument_node="">clean gas</span></a><span data-dcnode-id="488" instrument_node=""> fire suppression systems to protect valuable equipment.</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="482"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/fire-supression-installations/%23co2"><span data-dcnode-id="485" instrument_node="">Carbon dioxide</span></a><span data-dcnode-id="483" instrument_node=""> acts quickly as a fire suppressant.</span></li><span data-dcnode-id="481" instrument_node="">
</span><li data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">A </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/fire-supression-installations/%23dry-chemical"><span data-dcnode-id="479" instrument_node="">dry chemical</span></a><span data-dcnode-id="477" instrument_node=""> agent is required for spray booth applications.</span></li><span data-dcnode-id="475" instrument_node="">
</span></ul><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Vancouver Fire’s team of experienced installers can help you select and install the fire suppression system that best suits your application. Our fire protection professionals evaluate your situation based on performance, costs, logistics, maintenance requirements and personnel safety, before making a recommendation.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">And we install your fire protection system in accordance with all applicable regulatory requirements and industry best practices. Only a properly installed fire suppression system can adequately protect your building. It must work as designed when needed. Lives and property depend on it.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Experience the difference Vancouver Fire’s commitment to life safety and quality service makes.</span></p><span data-dcnode-id="464" instrument_node="">
</span><h3 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Full-Service Fire Protection</span></h3><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">At Vancouver Fire, we want to provide you with the best fire protection service in B.C. And do so with unmatched passion--each and every day, every hour of the day. That’s why we invest in:</span></p><span data-dcnode-id="458" instrument_node="">
</span><ul data-dcnode-id="444"><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Rigorous in-house and manufacturers' training for our large team of certified fire protection technicians, installers and troubleshooters</span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">GPS monitoring for our service vehicles</span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Follow-up calls after installations and service calls</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Our own central monitoring station, located in Metro Vancouver</span></li><span data-dcnode-id="445" instrument_node="">
</span></ul><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">We bring the same expertise and exceptional service standards to a complete range of fire protection services, from installation to monitoring and inspections to repair.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">If you depend on us at Vancouver Fire for installation, monitoring and inspections, co-ordination is simpler. There is less chance for miscommunication and error. And it becomes our sole responsibility to take care of your fire suppression system and repair it.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="433"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Our goal</span></strong><span data-dcnode-id="434" instrument_node=""> is to take care of all your fire protection needs. And to do it with skill and dedication you won’t find anywhere else.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">More information about </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/monitoring-fire"><span data-dcnode-id="430" instrument_node="">fire monitoring</span></a><span data-dcnode-id="428" instrument_node="">.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">More information about </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/fire-protection-inspections-vancouver"><span data-dcnode-id="424" instrument_node="">fire protection system inspections</span></a><span data-dcnode-id="422" instrument_node="">.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="416"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/contact"><span data-dcnode-id="419" instrument_node="">Contact us</span></a><span data-dcnode-id="417" instrument_node=""> today to learn about Vancouver Fire’s full range of fire protection services. [link to contacts]</span></p><span data-dcnode-id="415" instrument_node="">
</span><h3 data-dcnode-id="412"><a data-dcnode-id="414" name="clean-gas"></a><span data-dcnode-id="413" instrument_node="">Clean Gas Fire Suppression Systems</span></h3><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">When protecting occupied spaces and critical assets, your best choice may be a clean gas fire suppression system. 3M™ Novec™ 1230 agent extinguishes fires in seconds and minimizes damage. That makes it ideal for spaces where high-value equipment must remain operational. Examples include:</span></p><span data-dcnode-id="408" instrument_node="">
</span><ul data-dcnode-id="400"><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Telecommunication switch rooms</span></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Computer and electronic control rooms</span></li><span data-dcnode-id="401" instrument_node="">
</span></ul><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">With zero ozone depletion potential, low atmospheric lifetime (only five days) and a global warming potential of 1 (about the same as naturally occurring carbon dioxide), Novec™ 1230 offers a viable, long-term sustainable technology for special hazards fire protection.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Chemetron, a world leader in special hazards fire protection for more than 60 years, uses Novec™ 1230 in its fire suppression systems. These systems are produced under ISO 9002 guidelines to strict manufacturing specifications ensuring product purity. These safeguards give you absolute confidence that Novec™ 1230 will not leave any residue or oil deposits in your sensitive application area.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Vancouver Fire is an authorized distributor of Chemetron Novec™ 1230 fire suppression systems. Yet another example of our unwavering commitment to quality fire protection.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="386"><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/contact"><span data-dcnode-id="389" instrument_node="">Contact us</span></a><span data-dcnode-id="387" instrument_node=""> today to learn more about how a clean gas fire suppression system can protect your most valuable assets.</span></p><span data-dcnode-id="385" instrument_node="">
</span><h3 data-dcnode-id="382"><a data-dcnode-id="384" name="co2"></a><span data-dcnode-id="383" instrument_node="">CO2 Fire Suppression Systems</span></h3><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Carbon Dioxide (CO2), a colourless and odourless inert gas, extinguishes fire primarily by diluting the oxygen in the air and providing some cooling. CO2:</span></p><span data-dcnode-id="378" instrument_node="">
</span><ul data-dcnode-id="358"><span data-dcnode-id="377" instrument_node="">
</span><li data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Penetrates an entire hazard area within seconds.</span></li><span data-dcnode-id="374" instrument_node="">
</span><li data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Occurs naturally in the earth's atmosphere and is one of the byproducts of combustion.</span></li><span data-dcnode-id="371" instrument_node="">
</span><li data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Typically does not harm equipment, materials or property. It does not cause spoilage, requires no clean up and leaves no residue, thus minimizing downtime after a fire.</span></li><span data-dcnode-id="368" instrument_node="">
</span><li data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Does not conduct electricity, making it ideal for a wide variety of special applications.</span></li><span data-dcnode-id="365" instrument_node="">
</span><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Is effective on a wide range of flammable and combustible materials. It works on both surface and deep-seated fires.</span></li><span data-dcnode-id="362" instrument_node="">
</span><li data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">CO2 fire suppression systems work by flooding an enclosed protected area to the proper concentration, or directly applying this gas in appropriate amounts and at required rates to cover the protected hazard. Resulting small dry ice particles help project the discharge into the fire and improve hazard coverage.</span></li><span data-dcnode-id="359" instrument_node="">
</span></ul><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="353"><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/contact"><span data-dcnode-id="356" instrument_node="">Contact us</span></a><span data-dcnode-id="354" instrument_node=""> today to learn more about CO2 fire suppression systems.</span></p><span data-dcnode-id="352" instrument_node="">
</span><h3 data-dcnode-id="349"><a data-dcnode-id="351" name="dry-chemical"></a><span data-dcnode-id="350" instrument_node="">Dry Chemical Applications for Spray Booths</span></h3><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Pre-engineered dry chemical fire suppression systems are specifically designed to protect automotive shop spray booths and industrial spray booths. Regulatory codes and industry standards:</span></p><span data-dcnode-id="345" instrument_node="">
</span><ul data-dcnode-id="325"><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="340"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.qp.gov.bc.ca/testing/wlap/firecode.htm" target="_blank"><span data-dcnode-id="343" instrument_node="">B.C. Fire Code</span></a><span data-dcnode-id="341" instrument_node=""> (section 5)</span></li><span data-dcnode-id="339" instrument_node="">
</span><li data-dcnode-id="335"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nfpa.org/aboutthecodes/AboutTheCodes.asp%3FDocNum%3D17" target="_blank"><span data-dcnode-id="338" instrument_node="">NFPA 17</span></a><span data-dcnode-id="336" instrument_node="">, Standard for Dry Chemical Extinguishing Systems</span></li><span data-dcnode-id="334" instrument_node="">
</span><li data-dcnode-id="330"><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nfpa.org/aboutthecodes/AboutTheCodes.asp%3FDocNum%3D33"><span data-dcnode-id="333" instrument_node="">NFPA 33</span></a><span data-dcnode-id="331" instrument_node="">, Standard for Spray Application Using Flammable or Combustible Materials</span></li><span data-dcnode-id="329" instrument_node="">
</span><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">UL 1254, Pre-engineered Dry Chemical Extinguishing System Units</span></li><span data-dcnode-id="326" instrument_node="">
</span></ul><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">set out specific guidelines for the design, construction and maintenance of these spray booths and their fire suppression systems.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">These spray booth fire suppression systems include an attached cylinder containing the dry chemical agent and are customized to fit the size of the booth. The extensive regulations reflect the flammable nature of paints traditionally used in spray booths. Although today’s booths use water-based paints, the code requirements remain in place and must be met.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="314"><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanfire.com/contact"><span data-dcnode-id="317" instrument_node="">Contact us</span></a><span data-dcnode-id="315" instrument_node=""> today to ensure your spray booth’s fire suppression system complies with all applicable codes and bylaws.</span></p><div data-dcnode-id="313" style="clear:both"></div><span data-dcnode-id="312" instrument_node="">
