</span><h1 data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Some Of The Most Common Types of Fire Suppression Systems</span></h1><span data-dcnode-id="1138" instrument_node="">
</span><div class="entry" data-dcnode-id="1035"><span data-dcnode-id="1137" instrument_node="">
</span><p class="postmetadata-postdate" data-dcnode-id="1134"><small data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">January 24, 2020</span></small></p><span data-dcnode-id="1133" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1127" id="attachment_2729" style="width: 405px"><img alt="Some Of The Most Common Types of Fire Suppression Systems" aria-describedby="caption-attachment-2729" class="wp-image-2729 lazyloaded" data-dcnode-id="1132" data-src="https://www.fireline.com/wp-content/uploads/2020/01/ThinkstockPhotos-184030204.jpg" height="264" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/wp-content/uploads/2020/01/ThinkstockPhotos-184030204.jpg&amp;raw" width="395"><noscript data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">&lt;img aria-describedby="caption-attachment-2729" class=" wp-image-2729" src="https://www.fireline.com/wp-content/uploads/2020/01/ThinkstockPhotos-184030204.jpg" alt="Some Of The Most Common Types of Fire Suppression Systems" width="395" height="264" data-eio="l" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1128" id="caption-attachment-2729"><span data-dcnode-id="1129" instrument_node="">Fire suppression systems are vital for&nbsp;preventing the spread of fire&nbsp;and protecting valuable business assets.</span></p></div><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">As a property owner who cares about fire safety, you know that fire suppression systems are vital for&nbsp;</span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/effects-fire-suppression-systems/"><span data-dcnode-id="1124" instrument_node="">preventing the spread of fire</span></a><span data-dcnode-id="1122" instrument_node="">&nbsp;and protecting valuable business assets. However, you might be wondering – if the fire suppression system goes off while someone is in the room, will the person be hurt at all? The real answer is that it depends on which type of system you have. Here are some of the most common kinds of fire suppression systems that are safe for people within your building.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" id="more-2728"></span></p><span data-dcnode-id="1117" instrument_node="">
</span><h2 data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Water</span></h2><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1113" instrument_node="">For many buildings and kinds of&nbsp;</span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/helpful-fire-safety-tips-business/"><span data-dcnode-id="1112" instrument_node="">businesses</span></a><span data-dcnode-id="1110" instrument_node="">, a water-based suppression system (or&nbsp;</span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fireline.com/blog/differences-fire-sprinklers-fire-suppression-systems/"><span data-dcnode-id="1109" instrument_node="">sprinkler system</span></a><span data-dcnode-id="1107" instrument_node="">) is the bare minimum requirement for fire suppression and code compliance. Water isn’t inherently harmful to people. However, it’s also not the most effective kind of suppression system for every circumstance. In some instances, water can be more dangerous in the presence of certain types of fires than other available extinguishing agents. It can also cause horrible damage to your property or equipment, requiring substantial cleanup.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><h2 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Gaseous Cleaning Agent Systems</span></h2><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">There are three common categories of gaseous clean agent fire suppression systems. These are inert gas, chemical clean agent, and carbon dioxide systems. Each type has unique properties that might lend themselves well to differing fire types.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><h2 data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Inert Gasses</span></h2><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Inert gasses such as nitrogen, inergen, and aragonite are very useful fire suppressants. They can put out fires by smothering them, displacing, or reducing oxygen. Usually, water ends up causing more harm than good to the property, such as in server rooms or around any electrical equipment. Inert gasses are ideal for situations where valuable or sensitive equipment needs to be protected.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><h2 data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Carbon Dioxide</span></h2><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Carbon dioxide fire suppression systems are perhaps the oldest of the clean agent systems out there. CO2, as its usually referred to, has been used in systems since the early 1900s. It’s inexpensive compared to other clean agents and can be used in total flooding or local application. The downside, though, is that carbon dioxide extinguishes by displacing oxygen and, in some instances, can create situations that can be instantly hazardous to personnel within the building. Therefore, it is not typically used for total flooding in occupied areas. When it is used, it is subject to several safety considerations. Carbon dioxide is used for industrial local application systems where the safety risks are manageable.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><h2 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Chemical</span></h2><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Chemical clean agent systems are like the inert gas systems in that they also discharge and disperse out a gas. They provide extinguishment through heat absorption and leave no residue, which means no additional equipment damage. These fire suppression systems are less hardware intensive and cost less for installation.</span></p><span data-dcnode-id="1081" instrument_node="">
