</span><div class="elementor-widget-container" data-dcnode-id="1580"><span data-dcnode-id="1784" instrument_node="">
</span><h1 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Fire Suppression System Malaysia: 4 Type Fire Suppression</span></h1><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1780" instrument_node="">Fire Suppression System Malaysia. Fire </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fire_suppression_system" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1779" instrument_node="">Suppression Systems</span></a><span data-dcnode-id="1777" instrument_node=""> are used to extinguish or prevent the spread of </span><b data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">fire</span></b><span data-dcnode-id="1774" instrument_node="">&nbsp;in a building.&nbsp;</span><b data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Suppression</span></b><span data-dcnode-id="1771" instrument_node="">&nbsp;systems use a combination of dry chemicals and/or wet agents to&nbsp;</span><b data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">suppress </span></b><span data-dcnode-id="1768" instrument_node="">equipment&nbsp;</span><b data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">fires</span></b><span data-dcnode-id="1765" instrument_node="">.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><img alt="Fire Suppression in Malaysia" class="aligncenter" data-dcnode-id="1762" height="499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.postimg.cc/DzvR7V1b/Picture1.png&amp;raw" width="454"></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Fire suppression system Malaysia. When it comes to protecting the residential or commercial area from the results of the fire, is one of the best fire suppression systems available today.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">There are many other different models of fire suppression systems available on the market in Malaysia, but you need to make sure that you select the right one to meet your needs.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Benefits of the FM200 system.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1748"><u data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Waterless Fire Protection</span></u></p><span data-dcnode-id="1747" instrument_node="">
</span><ul data-dcnode-id="1730"><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">One of the biggest problems with older models of fire suppression systems is that they often destroy the very things they were designed to protect.</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">While it may stop a fire, water is very damaging to many objects. A fire suppression system that uses water can destroy carpets, electronics and other valuables when it is activated.</span></li><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">That is why the FM200 fire suppression system has been designed to put out fires without the use of water.</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">The FM200 uses an environmentally-friendly powder fire suppression agent.</span></li><span data-dcnode-id="1734" instrument_node="">
</span><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">This agent is non-toxic and works very well. There is no need to soak your building with water if a fire breaks out. Instead, buildings protected by an FM200 unit will stay bone-dry even if the system is activated to stop a fire.</span></li><span data-dcnode-id="1731" instrument_node="">
</span></ul><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1726"><u data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Safety First</span></u></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Because the powder used in an FM200 system is non-toxic, it can be discharged in an environment with people inside. This means that there will never be a need to wait several minutes to activate the fire suppression system. This is an incredibly helpful feature.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Even waiting a matter of seconds is unacceptable when fires are involved. Every additional second you have to wait to activate the fire suppression system can mean tens of thousands of dollars in additional damage. Therefore, the key ability of the FM200 to be activated instantly makes it a great choice for the fire suppression system in your building.</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1716"><u data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">As Quick as Lightning</span></u></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">The ability to activate the fire suppression system instantly is important. However, when you activate it, it also needs to be able to eliminate the fire quickly as well.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The FM200 excels in this department. The FM200 has been designed to completely eliminate fires within a building within 10 seconds.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">This gives the fires little chance to cause any damage. If you want the fastest fire suppression system on the market, look no further than the FM200.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1703"><u data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Space Saver</span></u></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Another benefit of the FM200 system is the space savings it affords. While the chemical agent used in the system is deployed as a powder, it is actually stored as a liquid that is pressurized by nitrogen.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">The pressure of the nitrogen forces the powder into a liquid state that takes up much less space than the powder.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">This is a huge benefit if space is at a premium in your office. In fact, the FM200 fire suppression system takes up seven times less space than comparable CO2 fire suppression systems.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><h2 data-dcnode-id="1690"><u data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">2. Fire Suppression System Malaysia (CO2)</span></u></h2><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><img alt="Fire Suppression System Malaysia co2" class="aligncenter" data-dcnode-id="1688" height="704" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.postimg.cc/KzwMZ23G/Picture1.png&amp;raw" width="939"></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Water is a standout amongst the most widely recognized approaches to put a flameout, securing lives and counteracting obliteration.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">The issue, however, is that water sprinkler frameworks can make further harm a local location or office in Malaysia.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">In the event that you add water to an oil fire, the circumstance will get significantly more dangerous. To battle those issues, numerous individuals are turning to a CO2 fire suppression system when they want to guard against fires.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Regardless of the off chance that they happen in a private or a position of a business, flames can cause an untold measure of harm.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">In spite of the fact that the blazes are extraordinary, smoke is in charge of the most death toll that happens during a flame.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Be that as it may, the extraordinary warmth likewise destroys property and can make an individual encounter a money related crisis.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">CO2 provides several advantages as protection tools such as;</span></p><span data-dcnode-id="1665" instrument_node="">
</span><ul data-dcnode-id="1648"><span data-dcnode-id="1664" instrument_node="">
</span><li data-dcnode-id="1650" style="list-style-type: none;"><span data-dcnode-id="1663" instrument_node="">
</span><ul data-dcnode-id="1652"><span data-dcnode-id="1662" instrument_node="">
</span><li data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Useful against most fire types</span></li><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Affordable</span></li><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Natural</span></li><span data-dcnode-id="1653" instrument_node="">
</span></ul><span data-dcnode-id="1651" instrument_node="">
</span></li><span data-dcnode-id="1649" instrument_node="">
</span></ul><span data-dcnode-id="1647" instrument_node="">
</span><h2 data-dcnode-id="1642"><u data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">3. Fire Suppression System </span></u><u data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Argonite</span></u></h2><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><img alt="Fire Suppression System Malaysia b" class="aligncenter" data-dcnode-id="1640" height="625" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.postimg.cc/t4JDCXYP/Picture1.png&amp;raw" width="779"></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Was developed in Denmark, is a 100% environmentally friendly system. It is a natural replacement for Carbon Dioxide Fire Extinguishing Systems for occupied areas.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">As the pioneer of inert gas fire extinguishing systems in Malaysia, the Argonite system’s application in the industry has grown extensively year on year.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Argonite is an inert gas mixture of Nitrogen and Argon. Both substances are naturally occurring and present in the atmosphere.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Argonite is safer for use in occupied spaces and poses no threat to the environment because it has no ozone depletion potential and no direct global warming potential.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Argonite extinguishes by means of reducing the oxygen content within a room to the point at which a fire can no longer burn, but without compromising the safety of individuals present.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">IG-55 must be used in total flooding applications where the protected hazard is enclosed, or for the protection of equipment that is self-enclosed in order to maintain the agent after discharge.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">There are no toxicological factors associated with the use of Argonite. Argonite will not decompose or produce any by-products when exposed to a flame from a fire condition.</span></p><span data-dcnode-id="1617" instrument_node="">
</span><h2 data-dcnode-id="1614"><u data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">4. Fire Suppression System (Inergen)</span></u></h2><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><img alt="Fire Suppression System Malaysia c" class="aligncenter" data-dcnode-id="1612" height="704" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.postimg.cc/yYp6SPY5/Picture1.png&amp;raw" width="939"></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">INERGEN® is a mixture of 52% Nitrogen, 40% Argon and 8% CO2.&nbsp; However, in the event of a fire, when INERGEN® is discharged, it mixes with the air present in the room to create a mixture that comprises 67.3% Nitrogen, 12.5% Oxygen, 17% Argon and 3.2% Carbon Dioxide.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">This discharge mixture makes INERGEN® singularly unique. No other inert gas has the unique ability to rapidly extinguish a fire yet at the same time provide a safe environment for any person within the occupied area by actually decreasing cardiac distress and maintaining arterial blood oxygenation and mental performance in low oxygen levels.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Equally important, unlike some chemical gaseous fire suppression agents, INERGEN® does not, and could never create a reaction with a fire to create extremely harmful toxic or corrosive by-products.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">INERGEN has been extensively used throughout the world as a preferred gaseous fire suppression agent for over 16 years and remains the longest surviving Halon replacement on the market to date.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Cost studies have shown that INERGEN is cost-competitive when compared with the most popular chemical agents on typical systems. INERGEN does not take up premium floor space as the cylinders can be placed remotely from the protected risk.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1594" instrument_node="">If you want more </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aito.com.my/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1593" instrument_node="">information</span></a><span data-dcnode-id="1591" instrument_node=""> about Fire Suppression System Malaysia, call us at </span><strong data-dcnode-id="1588"><span data-dcnode-id="1589" style="color: #000000;"><span data-dcnode-id="1590" instrument_node="">03 – 7831 4791&nbsp;</span></span></strong><span data-dcnode-id="1583" style="color: #000000;"><span data-dcnode-id="1587" instrument_node="">or email </span><a data-dcnode-id="1584" href="mailto:sales@aito.com.my"><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">sales@aito.com.my</span></strong></a></span></p><span data-dcnode-id="1581" instrument_node="">
