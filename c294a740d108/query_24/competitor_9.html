                                        5. The new hose-sets supplied with the appliance are to be used and that old hose-sets should not be reused. 6. For appliances with ventilation openings in the base, that a carpet must not obstruct the openings. 7. For use in Europe: Children of less than 3 years should be kept away unless continuously supervised.                                    </span></li><span data-dcnode-id="1559" instrument_node="">

                                        Safety information 15. Items such as foam rubber (latex foam), shower caps, waterproof textiles, rubber backed articles and clothes or pillows fitted with foam rubber pads should not be dried in the tumble dryer. 16. Fabric softeners, or similar products, should be used as specified by the fabric softener instructions.                                    </span></li><span data-dcnode-id="1553" instrument_node="">

                                        Critical installation warnings WARNING The installation of this appliance must be performed by a qualified technician or service company. •	 Failure to do so may result in electric shock, fire, an explosion, problems with the product, or injury. The appliance is heavy, therefore take care when lifting it. Plug the power cord into an AC 220 - 240 V / 50 Hz wall socket or higher and use the socket for this appliance only.                                    </span></li><span data-dcnode-id="1547" instrument_node="">

</span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1061316/Samsung-Wd90j6-Series.html%3Fpage%3D10%23manual"><span data-dcnode-id="1533" instrument_node="">Page 10</span></a><span data-dcnode-id="1531" instrument_node="">
