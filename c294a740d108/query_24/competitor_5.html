                                        Purpose of the Air Heater Air Top Evo 40/55 Purpose of the Air Heater The Webasto Air Top EVO 40/55 air heaters are designed – to heat vehicle cabins, boats (Diesel Only), trucks, minibuses, vans and motor homes – to defrost vehicle windows –...                                    </span></li><span data-dcnode-id="1742" instrument_node="">

                                        • 1/2 Heavy-Duty, low speed drill with good quality, sharp drill bits and a selection of hole saws. • Mounting/ Drilling Templates. Air Top EVO 40/55 Installation Situation NOTE: Check the installation situation of the relevant vehicle type. Installation Location The heater may be fitted both in the interior or on the exterior of the vehicle.                                    </span></li><span data-dcnode-id="1735" instrument_node="">

                                        A seal (Figure 4) must be fitted between the heater and the vehicle body. This seal must be replaced each time the heater is installed. The support area for the heater foot must be flat. A special tool can be purchased from Webasto to drill the holes and, if necessary, smooth the support area.                                    </span></li><span data-dcnode-id="1728" instrument_node="">

                                        After installation, check that the heater casing is not in contact with any parts of the vehicle body. A failure to do this may result in the hot air fan binding internally (Figure 6). Ensure that all moving part can move freely Figure 6. Installation www.webasto.us Webasto Thermo &amp; Comfort N.A., Inc.                                    </span></li><span data-dcnode-id="1721" instrument_node="">

</span><h3 data-dcnode-id="1717"><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D12%23manual"><span data-dcnode-id="1719" instrument_node="">Page 12: Factory Plate / Label</span></a></h3><span data-dcnode-id="1716" instrument_node="">
                                        (otherwise a duplicate model plate must be used). Inapplicable years must be erased from the model plate. Installation Example Figure 7. Installation example (installation conditions dependent on vehicle type) Webasto Thermo &amp; Comfort N.A., Inc. www.techwebasto.com...                                    </span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1708"><span data-dcnode-id="1713" instrument_node="">
</span><h3 data-dcnode-id="1710"><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D13%23manual"><span data-dcnode-id="1712" instrument_node="">Page 13: Cold And Hot Air System</span></a></h3><span data-dcnode-id="1709" instrument_node="">
                                        The internal diameter of the main section of the hot air line should be: 90 mm (3.54 in.) minimum for the Air Top EVO 55 90 mm (3.54 in.) minimum for the Air Top EVO 40 NOTE: Only materials that can permanently withstand temperatures of at least 130°C (266°F) may be used for the hot air line.                                    </span></li><span data-dcnode-id="1707" instrument_node="">
</span><li class="odd" data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">
</span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D14%23manual"><span data-dcnode-id="1705" instrument_node="">Page 14</span></a><span data-dcnode-id="1703" instrument_node="">
                                        Installing heater in casing: - Provide a cross section area of at least 50 cm for the cold air inlet. - Seal off the hot air outlet such that no hot air can enter the casing. Webasto Thermo &amp; Comfort N.A., Inc. www.techwebasto.com...                                    </span></li><span data-dcnode-id="1701" instrument_node="">

</span><h3 data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D15%23manual"><span data-dcnode-id="1699" instrument_node="">Page 15: External Temperature Sensor</span></a></h3><span data-dcnode-id="1696" instrument_node="">
                                        – by close to heat sources (for example the vehicle’s own heating system). – be placed in direct sunlight (for example on the dashboard). – be installed behind curtains or the like. External temperature sensor Cover Figure 10. External temperature sensor - optional www.webasto.us Webasto Thermo &amp; Comfort N.A., Inc.                                    </span></li><span data-dcnode-id="1694" instrument_node="">
</span><li class="odd" data-dcnode-id="1688"><span data-dcnode-id="1693" instrument_node="">
</span><h3 data-dcnode-id="1690"><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D16%23manual"><span data-dcnode-id="1692" instrument_node="">Page 16: Fuel Supply</span></a></h3><span data-dcnode-id="1689" instrument_node="">
                                        This may cause problems during combustion. Vehicles with Fuel Injection Engines When installing the heater in a vehicle with fuel injection system, it is important to establish whether the fuel pump is located inside or outside the tank. Webasto Thermo &amp; Comfort N.A., Inc. www.techwebasto.com...                                    </span></li><span data-dcnode-id="1687" instrument_node="">

</span><h3 data-dcnode-id="1683"><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D17%23manual"><span data-dcnode-id="1685" instrument_node="">Page 17: Vehicles With Diesel Engines</span></a></h3><span data-dcnode-id="1682" instrument_node="">

</span><h3 data-dcnode-id="1670"><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manualslib.com/manual/1042681/Webasto-Air-Top-Evo-40.html%3Fpage%3D19%23manual"><span data-dcnode-id="1672" instrument_node="">Page 19: Fuel Metering Pump</span></a></h3><span data-dcnode-id="1669" instrument_node="">
