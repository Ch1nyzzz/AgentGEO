x-width: 724px) 100vw, 724px"&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">Fires are an emergency that people are taught about and prepared for before grade school. However, even though the overall trend of fires has gone down since 2008, according to </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usfa.fema.gov/data/statistics/" rel="nofollow" target="_blank"><span data-dcnode-id="397" instrument_node="">The US Fire Administration</span></a><span data-dcnode-id="395" instrument_node="">, there are still over 1.3 million fires a year in the United States alone, and fatalities and property damage due to fires out are on the rise. Therefore, fire prevention precautions are extremely important. To provide a reasonable degree of protection for life and property, </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webstore.ansi.org/Standards/NFPA/NFPA142019%3Fsource%3Dblog" target="_blank"><span data-dcnode-id="394" instrument_node="">NFPA 14-2019</span></a><span data-dcnode-id="392" instrument_node=""> covers the installation of standpipes and hose systems.</span></p><h2 data-dcnode-id="389" id="h-what-is-a-standpipe-and-why-is-it-important"><span data-dcnode-id="390" instrument_node="">What is a Standpipe and Why is it Important?</span></h2><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">Standpipes are vertical pipes that are attached to a water supply. They are typically located in building staircases between floors with a fire hose either contained in a cabinet or attached to the standpipe itself. Standpipes are useful for fighting fires, as they are conveniently located. Standpipes are able to quickly suppress fires and have minimal water damage as the person using it can aim the water at the fire versus a sprinkler system that waters everything in its radius. According to </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ohsonline.com/Articles/2006/08/Standpipe-Fire-Hose-Stations-Save-Lives-Protect-Property.aspx%3FPage%3D2" rel="nofollow" target="_blank"><span data-dcnode-id="387" instrument_node="">Occupational Health &amp; Safety</span></a><span data-dcnode-id="385" instrument_node="">, standpipes only need one person to operate, and this is done manually, not needing to be triggered by a smoke alarm or flame.</span></p><p data-dcnode-id="380"><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webstore.ansi.org/Standards/NFPA/NFPA142019%3Fsource%3Dblog" target="_blank"><span data-dcnode-id="383" instrument_node="">NFPA 14-19</span></a><span data-dcnode-id="381" instrument_node=""> covers the minimum guidelines for installing standpipes and hose systems. This standard’s purpose is to provide protection for life and property from fire based on sound engineering principles, test data, and field experience.</span></p><figure class="wp-block-image size-large" data-dcnode-id="373"><picture class="wp-image-160727 sp-no-webp lazyloaded" data-dcnode-id="376" data-srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w"><source data-dcnode-id="379" data-srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg.webp 644w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg.webp 415w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg.webp 683w" sizes="(max-width: 644px) 100vw, 644px" srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg.webp 644w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg.webp 415w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg.webp 683w" type="image/webp"><source data-dcnode-id="378" data-srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" sizes="(max-width: 644px) 100vw, 644px" srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" type="image/jpeg"><img alt="A red NFPA 14-2019 standpipe in front of wall" class="wp-image-160727 sp-no-webp lazyloaded" data-dcnode-id="377" data-src="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg" data-srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" height="483" sizes="(max-width: 644px) 100vw, 644px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg&amp;raw" srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" width="644"></picture><noscript data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">&lt;picture class="wp-image-160727 lazyload sp-no-webp"&gt;&lt;source srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg.webp 644w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg.webp 415w,https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg.webp 683w" sizes="(max-width: 644px) 100vw, 644px" type="image/webp"&gt;&lt;source srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" sizes="(max-width: 644px) 100vw, 644px" type="image/jpeg"&gt;&lt;img src="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg" class="wp-image-160727 lazyload sp-no-webp" alt="A red NFPA 14-2019 standpipe in front of wall" height="483" width="644" srcset="https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-644x483.jpg 644w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14-415x311.jpg 415w, https://blog.cachefly.net/wp-content/uploads/2019/03/Fire-Water-System-NFPA-14.jpg 683w" sizes="(max-width: 644px) 100vw, 644px"&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">This standard dates back to 1912 and has been revised many times since. Here are some of the changes made to </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webstore.ansi.org/Standards/NFPA/NFPA142019%3Fsource%3Dblog%25EF%25BB%25BF" target="_blank"><span data-dcnode-id="371" instrument_node="">NFPA 14-2019 version</span></a><span data-dcnode-id="369" instrument_node=""> that differ it from the previous edition of the standard, NFPA 14-2016:</span></p><ul data-dcnode-id="335"><li data-dcnode-id="357"><span data-dcnode-id="367" instrument_node="">The terms </span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">outlet(s)</span></em><span data-dcnode-id="364" instrument_node=""> and </span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">hose outlet(s) </span></em><span data-dcnode-id="361" instrument_node="">have been changed
to </span><em data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">hose connection</span></em><span data-dcnode-id="358" instrument_node=""> for clarity</span></li><li data-dcnode-id="349"><span data-dcnode-id="356" instrument_node="">Definitions and guidelines for </span><em data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">distance monitoring</span></em><span data-dcnode-id="353" instrument_node=""> and </span><em data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">automated inspection and testing</span></em><span data-dcnode-id="350" instrument_node=""> have
been added because of technology updates</span></li><li data-dcnode-id="344"><span data-dcnode-id="348" instrument_node="">Definition for </span><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">open parking garage</span></em><span data-dcnode-id="345" instrument_node=""> has been added along with a requirement for
manual standpipes in open parking garages pertaining to a maximum height</span></li><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">For pressure of 150 psi or less, signage is not
required</span></li><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">The maximum pressure permitted in the system has
increased from 350 psi to 400 psi</span></li><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">In subsection 7.8.1, the hydraulic calculation
procedures have been clarified that additional standpipes should be calculated
at the point of connection rather than the topmost outlet</span></li><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Added Chapter 13 covering maritime standpipe and
hose systems</span></li></ul><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">It is important to note that this standard does not cover
requirements for periodic inspections, testing, and maintenance of standpipes
and hose systems.</span></p><p data-dcnode-id="329"><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webstore.ansi.org/Standards/NFPA/NFPA142019%3Fsource%3Dblog" target="_blank"><span data-dcnode-id="332" instrument_node="">NFPA 14-2019 the Standard for the Installation of Standpipe and Hose Systems</span></a><span data-dcnode-id="330" instrument_node=""> is available on the ANSI Webstore.</span></p><span data-dcnode-id="328" instrument_node=""> </span><span data-dcnode-id="326" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-6442555133594510" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8842443901" data-dcnode-id="325" style="display:block; text-align:center;"></ins><span data-dcnode-id="324" instrument_node=""> </span></div><footer class="single-entry-footer" data-dcnode-id="266"><span data-dcnode-id="319" instrument_node=""> </span><span class="categorized-under" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Posted Under</span></span><div class="awaken-category-list" data-dcnode-id="311"><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ansi.org/category/popular-topics/safety/fire-safety/" rel="category tag"><span data-dcnode-id="316" instrument_node="">Fire Safety</span></a><span data-dcnode-id="314" instrument_node=""> </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ansi.org/category/popular-topics/safety/fire-safety/water-systems/" rel="category tag"><span data-dcnode-id="313" instrument_node="">Water Systems</span></a></div><div class="clearfix" data-dcnode-id="310"></div><span class="tagged-under" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Tagged</span></span><div class="awaken-tag-list" data-dcnode-id="284"><h2 data-dcnode-id="305"><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu
