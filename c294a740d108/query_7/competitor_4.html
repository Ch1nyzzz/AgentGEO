</span><ul data-dcnode-id="3495"><span data-dcnode-id="3522" instrument_node="">
</span><li data-aria-level="1" data-aria-posinset="1" data-dcnode-id="3517" data-font="Symbol" data-leveltext="" data-listid="44"><span data-contrast="auto" data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">Learn how to properly size a fire pump.</span></span><span data-ccp-props="{&quot;134233279&quot;:true,&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="3516" instrument_node="">

</span><li data-aria-level="1" data-aria-posinset="3" data-dcnode-id="3503" data-font="Symbol" data-leveltext="" data-listid="44"><span data-contrast="auto" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Know how to&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">design fire pump piping to meet NFPA 20 requirements.</span></span><span data-ccp-props="{&quot;134233279&quot;:true,&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="3502" instrument_node="">
</span><li data-aria-level="1" data-aria-posinset="4" data-dcnode-id="3497" data-font="Symbol" data-leveltext="" data-listid="44"><span data-contrast="auto" data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Appreciate cost variations between different pump styles and controller options.</span></span><span data-ccp-props="{&quot;134233279&quot;:true,&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="3496" instrument_node="">

</span><hr data-dcnode-id="3493"><span data-dcnode-id="3492" instrument_node="">
</span><p data-dcnode-id="3470"><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/20"><span data-contrast="none" data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">NFPA 20</span></span><span data-contrast="none" data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">:</span></span><span data-contrast="none" data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">&nbsp;Standard for the Installation of Stationary Pumps for Fire Protection</span></span></a><span data-contrast="auto" data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">protects life and property by providing r</span></span><span data-contrast="auto" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">equirements for the installation of&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">fire&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">pumps to ensure that systems will work as intended to deliver adequate and reliable&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">water supplies in a fire emergency.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="3469" instrument_node="">
</span><div class="advertisement advertisement-paragraph-300x50" data-dcnode-id="3467" data-revive-id="5d3cba222eaaeee40162c5d04d22e1b8" data-zone-context="mobile" data-zone-id="2749" data-zone-tag="300x50" style="display: none;"><ins data-dcnode-id="3468" data-revive-id="" data-revive-zoneid=""></ins></div><div class="advertisement advertisement-paragraph-desktop-728x90" data-dcnode-id="3465" data-revive-id="5d3cba222eaaeee40162c5d04d22e1b8" data-zone-context="desktop" data-zone-id="2751" data-zone-tag="728x90" style=""><ins data-dcnode-id="3466" data-revive-id="5d3cba222eaaeee40162c5d04d22e1b8" data-revive-loaded="1" data-revive-seq="1" data-revive-zoneid="2751" id="revive-0-1"></ins></div><p data-dcnode-id="3409"><span data-contrast="auto" data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">A fire sprinkler system is a critical component of life safety in a building. The&nbsp;</span></span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.iccsafe.org/2018-international-building-coder.html"><span data-contrast="none" data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">International Building Code</span></span></a><span data-contrast="auto" data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">grants</span></span><span data-contrast="auto" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">&nbsp;a number of exceptions when a building is&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">“fully sprinklered</span></span><span data-contrast="auto" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">,</span></span><span data-contrast="auto" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">”</span></span><span data-contrast="auto" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">&nbsp;such as reductions in rated separations, reductions in fire hydrant flow demands, increased egress travel distances</span></span><span data-contrast="auto" data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">&nbsp;and</span></span><span data-contrast="auto" data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">&nbsp;increased building heights and areas. These exceptions are permitted with&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">an expectation&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">that</span></span><span data-contrast="auto" data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">,</span></span><span data-contrast="auto" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">in the event of a fire,&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">the&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">sprinkler system will suppress&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">the</span></span><span data-contrast="auto" data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">&nbsp;fire to a sufficient degree that occupants can safely evacuate the building</span></span><span data-contrast="auto" data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">&nbsp;and</span></span><span data-contrast="auto" data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">&nbsp;the</span></span><span data-contrast="auto" data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">&nbsp;growth of the fire will be controlled u</span></span><span data-contrast="auto" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">nti</span></span><span data-contrast="auto" data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">l the fire department arrives</span></span><span data-contrast="auto" data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">&nbsp;to fully extinguish it.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:240}" data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="3408" instrument_node="">

</span><p data-dcnode-id="1060"><span data-contrast="auto" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The enclosure should be large enough to provide&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">adequate</span></span><span data-contrast="auto" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">&nbsp;clearance for installation</span></span><span data-contrast="auto" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">&nbsp;and maintenance of the fire pump and related components.&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">A good rule of thumb is to provide at least 12</span></span><span data-contrast="auto" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">&nbsp;inches</span></span><span data-contrast="auto" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">&nbsp;of clearance behind the fire pump</span></span><span data-contrast="auto" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">&nbsp;and</span></span><span data-contrast="auto" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">&nbsp;a minimum distance of 12</span></span><span data-contrast="auto" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">&nbsp;inches</span></span><span data-contrast="auto" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;from the edges of</span></span><span data-contrast="auto" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">&nbsp;the entire fire pump assembly, piping</span></span><span data-contrast="auto" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">&nbsp;and</span></span><span data-contrast="auto" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&nbsp;valves</span></span><span data-contrast="auto" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">&nbsp;to the wall</span></span><span data-contrast="auto" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">s</span></span><span data-contrast="auto" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">. If the room consists of multiple sprinkler and/or standpipe risers, a minimum clear distance of 12</span></span><span data-contrast="auto" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&nbsp;inches</span></span><span data-contrast="auto" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">&nbsp;between risers should be maintained to allow for easy access to equipment. An approach clearance of at least&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">3 feet</span></span><span data-contrast="auto" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">&nbsp;should be maintained in front of the fire pump and related equipment</span></span><span data-contrast="auto" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">. Minimum clearances in accordance with NFPA 70 must be maintained around energized electrical equipment.</span></span><span data-contrast="auto" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:240}" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1042"><span data-contrast="auto" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">The fire pump room is intended solely for fire protection equipment and is not to be shared by other mechanical trades. This rule is applicable to all equipment that is&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">nonessential</span></span><span data-contrast="auto" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">&nbsp;to the operation of the fire pump except&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">equipment related to domestic water distribution. NFPA 20 provides an exception&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">for&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">domestic water equipment to be located within the fire pump room.</span></span><span data-contrast="auto" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:240}" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1018"><span data-contrast="auto" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">There are many&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">factors to consider when designing a fire pump.</span></span><span data-contrast="auto" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">&nbsp;NFPA 20 contains valuable</span></span><span data-contrast="auto" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">requirements</span></span><span data-contrast="auto" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">,</span></span><span data-contrast="auto" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">which should be strictly followed to ensure that the fire pump will perform as intended</span></span><span data-contrast="auto" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">,&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">should it ever be needed.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:240}" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1017" instrument_node="">
</span><p class="contribute-link-container" data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">Do you have experience and expertise with the topics mentioned in this content? You should consider contributing to our CFE Media editorial team and getting the recognition you and your company deserve. Click </span><a alt="How to Contribute" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//controleng.dragonforms.com/loading.do%3Fomedasite%3DbrandContributor%26pk%3DCSE" target="_blank" title="How to Contribute"><span data-dcnode-id="1015" instrument_node="">here</span></a><span data-dcnode-id="1013" instrument_node=""> to start this process.</span></p><span data-dcnode-id="1011" instrument_node="">
