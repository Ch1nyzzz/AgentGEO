">                                                        it then drains into an IBC sump, water is then pumped from the</span><br data-dcnode-id="7704"><span data-dcnode-id="7703" instrument_node="">                                                        IBC sump up to the fish tank to complete the water cycle.</span></p><p data-dcnode-id="7701"></p><h2 data-dcnode-id="7699"><span data-dcnode-id="7700" instrument_node="">                                                           Steve has used a rock media in the bottom section of the</span></h2><br data-dcnode-id="7698"><span data-dcnode-id="7697" instrument_node="">                                                        growbeds with expanded clay on top of the rock to make it</span><br data-dcnode-id="7696"><span data-dcnode-id="7695" instrument_node="">                                                        easier when planting seedlings. After some early problems</span><br data-dcnode-id="7694"><span data-dcnode-id="7693" instrument_node="">                                                        with leaks out of the base of the top halves of the IBC</span><br data-dcnode-id="7692"><span data-dcnode-id="7691" instrument_node="">                                                        growbeds, Steve managed to fix this problem and now the</span><br data-dcnode-id="7690"><span data-dcnode-id="7689" instrument_node="">                                                        system is starting to take off. Seeds have been planted and</span><br data-dcnode-id="7688"><span data-dcnode-id="7687" instrument_node="">                                                        they are sprouting. Plans are already underway for the next</span><br data-dcnode-id="7686"><span data-dcnode-id="7685" instrument_node="">                                                        system and a second IBC sump has already been dug into the</span><br data-dcnode-id="7684"><span data-dcnode-id="7683" instrument_node=""> ="7648"><span data-dcnode-id="7653" instrument_node="">                                          Backyard</span><br data-dcnode-id="7652"><span data-dcnode-id="7651" instrument_node="">                                           AQUAPONICS</span><br data-dcnode-id="7650"><span data-dcnode-id="7649" instrument_node="">                                           Bringing food production home</span></p><p data-dcnode-id="7647"></p><h2 data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">                                                 Ph: 9414 9334</span></h2><br data-dcnode-id="7644"><span data-dcnode-id="7643" instrument_node="">                                           www.backyardaquaponics.com</span><br data-dcnode-id="7642"><span data-dcnode-id="7641" instrument_node="">                                         Display centre Cnr Jandakot Rd &amp; Berrigan Dr,</span><br data-dcnode-id="7640"><span data-dcnode-id="7639" instrument_node="">                                                       Jandakot WA 6164</span><br data-dcnode-id="7638"><span data-dcnode-id="7637" instrument_node="">                                          Aquaponics is the most water efficient</span><br data-dcnode-id="7636"><span data-dcnode-id="7635" instrument_node="">                                          way to grow fresh, seasonal fruit and</span><br data-dcnode-id="7634"><span data-dcnode-id="7633" instrument_node="">                                          vegetables without the use of chemical</span><br data-dcnode-id="7632"><span data-dcnode-id="7631" instrument_node="">                                          fertilizers and pesticides.</span><p data-dcnode-id="7630"></p><p data-dcnode-id="7629"></p><h2 data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">                                             Come and see us online, give us a call or pop</span></h2><br data-dcnode-id="7626"><span data-dcnode-id="7625" instrument_node=""> to the</span><br data-dcnode-id="7600"><span data-dcnode-id="7599" instrument_node="">                                                 IBC fish tank. From here it flows out into the growbeds, before</span><br data-dcnode-id="7598"><span data-dcnode-id="7597" instrument_node="">                                                 draining back into the sump tank.</span></p><p data-dcnode-id="7568"><span data-dcnode-id="7595" instrument_node="">                                                     The buried IBC that acts as a sump tank has had insulation</span><br data-dcnode-id="7594"><span data-dcnode-id="7593" instrument_node="">                                                 put around it to help keep the temperature constant, this</span><br data-dcnode-id="7592"><span data-dcnode-id="7591" instrument_node="">                                                 sump IBC has a large section cut out of the top for access</span><br data-dcnode-id="7590"><span data-dcnode-id="7589" instrument_node="">                                                 into the tank, however fishfodder has also installed a wooden</span><br data-dcnode-id="7588"><span data-dcnode-id="7587" instrument_node="">                                                 cover over the top of the IBC for safety. For the outlet coming</span><br data-dcnode-id="7586"><span data-dcnode-id="7585" instrument_node="">                                                 out of the fish tank to the growbeds, Fishfodder has used a</span><br data-dcnode-id="7584"><span data-dcnode-id="7583" instrument_node="">                                                 black bulkhead fitting. These bulkhead fittings are great when</span><br data-dcnode-id="7582"><span data-dcnode-id="7581" instrument_node="">                                                 plumbing into thin plastic like you find in an IBC. The growbeds</span><br data-dcnode-id="7580"><span data-dcnode-id="7579" instrument_node="">                                                 have auto siphons in them to control the flooding and draining</span><br data-dcnode-id="7578"><span data-dcnode-id="7577" instrument_node="">                                                 of the beds.</span><br data-dcnode-id="7576"><span data-dcnode-id="7575" instrument_node="">                                    like crazy</span><br data-dcnode-id="7574"><span data-dcnode-id="7573" instrument_node="">  Growbeds taking off and growing                   Once finished, the fish tank IBC was clad with timber. The</span><br data-dcnode-id="7572"><span data-dcnode-id="7571" instrument_node="">                                                 timber has two purposes, it makes the system more attractive</span><br data-dcnode-id="7570"><span data-dcnode-id="7569" instrument_node="">                                                 and also protects the IBC from degradation due to UV light.</span></p><p data-dcnode-id="7567"></p><h2 data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">                                                    The system also has an insulated roof added to the fish</span></h2><br data-dcnode-id="7564"><span data-dcnode-id="7563" instrument_node="">                                                 tank to try and maintain a more constant temperature. More</span><br data-dcnode-id="7562"><span data-dcnode-id="7561" instrument_node="">                                                 constant temperatures maintains better fish health.</span><p data-dcnode-id="7560"></p><p data-dcnode-id="7559"></p><h2 data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">                                                     As a later addition to the system Fishfodder added a</span></h2><br data-dcnode-id="7556"><span data-dcnode-id="7555" instrument_node="">                                                 couple of yabby tanks and small growbeds that sit on top of</span><br data-dcnode-id="7554"><span data-dcnode-id="7553" instrument_node="">                                                 the sump tank. He has a small pump in the sump tank, that</span><br data-dcnode-id="7552"><span data-dcnode-id="7551" instrument_node="">                                                 pumps water from the sump to these extra yabby tanks and</span><br data-dcnode-id="7550"><span data-dcnode-id="7549" instrument_node="">                                                 grow beds, a nice little extension added to the system to</span><br data-dcnode-id="7548"><span data-dcnode-id="7547" instrument_node="">                                                 increase productivity.</span><p data-dcnode-id="7546"></p><p data-dcnode-id="7545"></p><h2 data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">                                                    Fishfodder has created a very attractive and highly</span></h2><br data-dcnode-id="7542"><span data-dcnode-id="7541" instrument_node="">                                                 productive system using 2 IBCs and green growbeds.</span><p data-dcnode-id="7540"></p><p data-dcnode-id="7539"></p><h2 data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">                                                                                         ut, fres   h fish and</span></h2><br data-dcnode-id="7536"><span data-dcnode-id="7535" instrument_node="">                                                      This is what aquaponics is all abo</span><br data-dcnode-id="7534"><span data-dcnode-id="7533" instrument_node="">                                                      vegetables</span><p data-dcnode-id="7532"></p><p data-dcnode-id="7528"><span data-dcnode-id="7531" instrument_node="">28  www.backyardaquaponics.com</span><br data-dcnode-id="7530"><span data-dcnode-id="7529" instrument_node="">f The IBC of Aquaponics               Fishfodders System</span></p><p data-dcnode-id="7527"></p><h2 data-dcnode-id="7525"><span data-dcnode-id="7526"         way to go. Ian has further instructions and information about</span><br data-dcnode-id="7324"><span data-dcnode-id="7323" instrument_node="">                                 his system on the Backyard Aquaponics forum; there was also</span><br data-dcnode-id="7322"><span data-dcnode-id="7321" instrument_node="">                                 an article in edition ten of the Backyard Aquaponics Magazine.</span></p><p data-dcnode-id="7316"><span data-dcnode-id="7319" instrument_node="">36  www.backyardaquaponics.com</span><br data-dcnode-id="7318"><span data-dcnode-id="7317" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7312"><span data-dcnode-id="7315" instrument_node="">37  www.backyardaquaponics.com</span><br data-dcnode-id="7314"><span data-dcnode-id="7313" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7310"><span data-dcnode-id="7311" instrument_node="">  1                                 2</span></p><p data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">  3                                 4</span></p><p data-dcnode-id="7302"><span data-dcnode-id="7307" instrument_node="">  5                                 6</span><br data-dcnode-id="7306"><span data-dcnode-id="7305" instrument_node="">38  www.backyardaquaponics.com</span><br data-dcnode-id="7304"><span data-dcnode-id="7303" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">  7                                 8</span></p><p data-dcnode-id="7298"><span data-dcnode-id="7299" instrument_node=""> 9                                 10</span></p><p data-dcnode-id="7292"><span data-dcnode-id="7297" instrument_node=""> 11                                12</span><br data-dcnode-id="7296"><span data-dcnode-id="7295" instrument_node="">39  www.backyardaquaponics.com</span><br data-dcnode-id="7294"><span data-dcnode-id="7293" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node=""> 13                                14</span></p><p data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node=""> 15                                16</span></p><p data-dcnode-id="7282"><span data-dcnode-id="7287" instrument_node=""> 17                                18</span><br data-dcnode-id="7286"><span data-dcnode-id="7285" instrument_node="">40  www.backyardaquaponics.com</span><br data-dcnode-id="7284"><span data-dcnode-id="7283" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node=""> 19                               20</span></p><p data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node=""> 21                                22</span></p><p data-dcnode-id="7272"><span data-dcnode-id="7277" instrument_node=""> 23                                24</span><br data-dcnode-id="7276"><span data-dcnode-id="7275" instrument_node="">41  www.backyardaquaponics.com</span><br data-dcnode-id="7274"><span data-dcnode-id="7273" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node=""> 25                                26</span></p><p data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">27                                 28</span></p><p data-dcnode-id="7262"><span data-dcnode-id="7267" instrument_node="">29                                 30</span><br data-dcnode-id="7266"><span data-dcnode-id="7265" instrument_node="">42  www.backyardaquaponics.com</span><br data-dcnode-id="7264"><span data-dcnode-id="7263" instrument_node="">f The IBC of Aquaponics           Ian’s DIY System</span></p><p data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node=""> 31                                32</span></p><p data-dcnode-id="7259"></p><h2 data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">      Get some dirt under</span></h2><br data-dcnode-id="7256"><span data-dcnode-id="7255" instrument_node="">      your nails</span><p data-dcnode-id="7254"></p><p data-dcnode-id="7248"><span data-dcnode-id="7253" instrument_node="">                                             Backyard</span><br data-dcnode-id="7252"><span data-dcnode-id="7251" instrument_node="">                                             Farming</span><br data-dcnode-id="7250"><span data-dcnode-id="7249" instrument_node="">                                              Bringing food production home</span></p><p data-dcnode-id="7247"></p><h2 data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">                                                    Ph: 9414 9334</span></h2><br data-dcnode-id="7244"><span data-dcnode-id="7243" instrument_node="">                                              www.backyardfarming.com.au</span><br data-dcnode-id="7242"><span data-dcnode-id="7241" instrument_node="">                                            Display centre Cnr Jandakot Rd &amp; Berrigan Dr,</span><br data-dcnode-id="7240"><span data-dcnode-id="7239" instrument_node="">                                                  Jandakot Western Australia 6164</span><p data-dcnode-id="7238"></p><p data-dcnode-id="7234"><span data-dcnode-id="7237" instrument_node="">43  www.backyardaquaponics.com</span><br data-dcnode-id="7236"><span data-dcnode-id="7235" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="7190"><span data-dcnode-id="7233" instrument_node="">                                  Andywhite’s</span><br data-dcnode-id="7232"><span data-dcnode-id="7231" instrument_node="">                                      IBC system</span><br data-dcnode-id="7230"><span data-dcnode-id="7229" instrument_node="">                                                           A</span><br data-dcnode-id="7228"><span data-dcnode-id="7227" instrument_node="">                                                                   ndy lives in Brisbane and he wanted to keep things</span><br data-dcnode-id="7226"><span data-dcnode-id="7225" instrument_node="">                                                                   very simple by building a system with a pump, an IBC</span><br data-dcnode-id="7224"><span data-dcnode-id="7223" instrument_node="">                                                                   and a fiberglass growbed. He decided on a “flood</span><br data-dcnode-id="7222"><span data-dcnode-id="7221" instrument_node="">                                                           and drain” style setup to fill fast and drain slowly each</span><br data-dcnode-id="7220"><span data-dcnode-id="7219" instrument_node="">                                                           hour. After doing his homework each evening on the forum</span><br data-dcnode-id="7218"><span data-dcnode-id="7217" instrument_node="">                                                           he was able to formulate a simple and effective aquaponic</span><br data-dcnode-id="7216"><span data-dcnode-id="7215" instrument_node="">                                                           system without breaking the bank. Andy decided that he</span><br data-dcnode-id="7214"><span data-dcnode-id="7213" instrument_node="">                                                           would dig the IBC far enough into the ground so that the bed</span><br data-dcnode-id="7212"><span data-dcnode-id="7211" instrument_node="">                                                           would drain back into the fish tank. The growbed is about</span><br data-dcnode-id="7210"><span data-dcnode-id="7209" instrument_node="">                                                           a metre away from the fish tank ensuring that there is lots</span><br data-dcnode-id="7208"><span data-dcnode-id="7207" instrument_node="">                                                           of room around the bed for easy maintenance. Andy set up</span><br data-dcnode-id="7206"><span data-dcnode-id="7205" instrument_node="">                                                           the plumbing so that in the main pipeline from the fish tank</span><br data-dcnode-id="7204"><span data-dcnode-id="7203" instrument_node="">                                                           to the growbed, he’s included a T-piece with a side pipe and</span><br data-dcnode-id="7202"><span data-dcnode-id="7201" instrument_node="">                                                           valve going back into the fish tank, this helps provide extra</span><br data-dcnode-id="7200"><span data-dcnode-id="7199" instrument_node="">                                                           aeration by splashing water back into the fish tank, but if he</span><br data-dcnode-id="7198"><span data-dcnode-id="7197" instrument_node="">                                                           needs more water going to the growbed, he can easily shut</span><br data-dcnode-id="7196"><span data-dcnode-id="7195" instrument_node="">                                                           the valve off, pushing all the water to the growbed. He’s also</span><br data-dcnode-id="7194"><span data-dcnode-id="7193" instrument_node=""> The security screen hinges for easy access                included a removable coupling (barrel union) which makes</span><br data-dcnode-id="7192"><span data-dcnode-id="7191" instrument_node="">                                                           for easy removal of the pump if required.</span></p><p data-dcnode-id="7189"></p><h2 data-dcnode-id="7187"><span data-dcnode-id="7188" instrument_node="">                                                              30 Silver perch were added to the system to provide a</span></h2><br data-dcnode-id="7186"><span data-dcnode-id="7185" instrument_node="">                                                           source of nutrients for the plants. The growbed receives 6</span><br data-dcnode-id="7184"><span data-dcnode-id="7183" instrument_node="">                                                           hours a day of full sun followed by dappled shade throughout</span><br data-dcnode-id="7182"><span data-dcnode-id="7181" instrument_node="">                                                           the afternoon. Gravel media provides good support for a</span><br data-dcnode-id="7180"><span data-dcnode-id="7179" instrument_node="">                                                           range of lettuces and herbs planted in the bed. A nice simple</span><br data-dcnode-id="7178"><span data-dcnode-id="7177" instrument_node="">                                                           system utilizing an IBC as a fish tank.</span><p data-dcnode-id="7176"></p><p data-dcnode-id="7175"></p><h2 data-dcnode-id="7173"><span data-dcnode-id="7174" instrument_node=""> Fiberglass growbed filled with media provides growing</span></h2><br data-dcnode-id="7172"><span data-dcnode-id="7171" instrument_node=""> space for seasonal produce</span><p data-dcnode-id="7170"></p><p data-dcnode-id="7169"></p><h2 data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">                                                             In this picture the fiberglass grow</span></h2><br data-dcnode-id="7166"><span data-dcnode-id="7165" instrument_node="">                                                             be positioned around a metre awabed shows how it can</span><br data-dcnode-id="7164"><span data-dcnode-id="7163" instrument_node=""> Security screen stops unwanted visitors and debris          which has been dug in to the grou y from the fish tank,</span><br data-dcnode-id="7162"><span data-dcnode-id="7161" instrument_node=""> entering the container and can be opened to gain access     gravity drain                       nd allowing a slow</span><br data-dcnode-id="7160"><span data-dcnode-id="7159" instrument_node=""> for fish harvest</span><p data-dcnode-id="7158"></p><p data-dcnode-id="7154"><span data-dcnode-id="7157" instrument_node="">44  www.backyardaquaponics.com</span><br data-dcnode-id="7156"><span data-dcnode-id="7155" instrument_node="">f    The IBC of Aquaponics</span></p><p data-dcnode-id="7146"><span data-dcnode-id="7153" instrument_node="">                   Backyard</span><br data-dcnode-id="7152"><span data-dcnode-id="7151" instrument_node="">                   AQUAPONICS</span><br data-dcnode-id="7150"><span data-dcnode-id="7149" instrument_node="">            One of the oldest and most trusted aquaponics suppliers.</span><br data-dcnode-id="7148"><span data-dcnode-id="7147" instrument_node="">           Helping people get started in aquaponics for over six years.</span></p><p data-dcnode-id="7140"><span data-dcnode-id="7145" instrument_node=""> Backyard</span><br data-dcnode-id="7144"><span data-dcnode-id="7143" instrument_node=""> AQUAPONICS</span><br data-dcnode-id="7142"><span data-dcnode-id="7141" instrument_node=""> Bringing food production home</span></p><p data-dcnode-id="7139"></p><h2 data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">       Ph: 9414 9334</span></h2><br data-dcnode-id="7136"><span data-dcnode-id="7135" instrument_node=""> www.backyardaquaponics.com</span><br data-dcnode-id="7134"><span data-dcnode-id="7133" instrument_node="">Display centre Cnr Jandakot Rd &amp; Berrigan Dr,</span><br data-dcnode-id="7132"><span data-dcnode-id="7131" instrument_node="">      Jandakot Western Australia 6164</span><br data-dcnode-id="7130"><span data-dcnode-id="7129" instrument_node="">  45  www.backyardaquaponics.com</span><br data-dcnode-id="7128"><span data-dcnode-id="7127" instrument_node="">f The IBC of Aquaponics</span><p data-dcnode-id="7126"></p><p data-dcnode-id="7112"><span data-dcnode-id="7125" instrument_node="">                                 Tristrin’s</span><br data-dcnode-id="7124"><span data-dcnode-id="7123" instrument_node="">                                  IBC system</span><br data-dcnode-id="7122"><span data-dcnode-id="7121" instrument_node="">                                 T</span><br data-dcnode-id="7120"><span data-dcnode-id="7119" instrument_node="">                                       ristrin and her husband have a number of aquaponic</span><br data-dcnode-id="7118"><span data-dcnode-id="7117" instrument_node="">                                       systems. They have both off the shelf kit systems as</span><br data-dcnode-id="7116"><span data-dcnode-id="7115" instrument_node="">                                       well as homemade IBC systems, obviously they’ve been</span><br data-dcnode-id="7114"><span data-dcnode-id="7113" instrument_node="">                                 bitten quite badly by the aquaponics bug.</span></p><p data-dcnode-id="7111"></p><h2 data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">                                          The first of Tristrins system was a reasonably straight</span></h2><br data-dcnode-id="7108"><span data-dcnode-id="7107" instrument_node="">                                     forward CHIFT PIST system using three IBC’s, though</span><br data-dcnode-id="7106"><span data-dcnode-id="7105" instrument_node="">                                     it had a few modifications most IBC systems may not</span><br data-dcnode-id="7104"><span data-dcnode-id="7103" instrument_node="">                                     have. They have used the frames in an ingenious way</span><br data-dcnode-id="7102"><span data-dcnode-id="7101" instrument_node="">                                     for supporting the growbeds. Most people normally cut</span><br data-dcnode-id="7100"><span data-dcnode-id="7099" instrument_node="">                                     their frames horizontally if you were looking at the IBC</span><br data-dcnode-id="7098"><span data-dcnode-id="7097" instrument_node="">                                     standing normally, however Tristrin has cut hers vertically.</span><br data-dcnode-id="7096"><span data-dcnode-id="7095" instrument_node="">                                     This vertical cutting of the IBC frame has allowed for</span><br data-dcnode-id="7094"><span data-dcnode-id="7093" instrument_node="">                                     the construction of a far better growbed support, large</span><br data-dcnode-id="7092"><span data-dcnode-id="7091" instrument_node="">                                     enough for three growbeds.</span><p data-dcnode-id="7090"></p><p data-dcnode-id="7089"></p><h2 data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">                                         This growbed frame sits on the bottom half of an IBC</span></h2><br data-dcnode-id="7086"><span data-dcnode-id="7085" instrument_node="">                                     that is acting as a sump at one end, while the other end</span><br data-dcnode-id="7084"><span data-dcnode-id="7083" instrument_node="">                                     is attached to the frame of the IBC that is the fish tank.</span><br data-dcnode-id="7082"><span data-dcnode-id="7081" instrument_node="">                                     As with all CHIFT PIST systems, the water is pumped</span><br data-dcnode-id="7080"><span data-dcnode-id="7079" instrument_node="">                                     from the sump tank up into the fish tank, from here it</span><br data-dcnode-id="7078"><span data-dcnode-id="7077" instrument_node="">                                     overflows into the growbeds before draining into the</span><br data-dcnode-id="7076"><span data-dcnode-id="7075" instrument_node="">                                     sump tank. Tristrin and her husband have used flanged</span><br data-dcnode-id="7074"><span data-dcnode-id="7073" instrument_node="">                                     tank fittings for all protrusions into the main fish tank, a</span><br data-dcnode-id="7072"><span data-dcnode-id="7071" instrument_node="">                                     great added safety measure. This particular system also</span><br data-dcnode-id="7070"><span data-dcnode-id="7069" instrument_node="">                                     has two feeds from the fish tank out to the growbeds.</span><p data-dcnode-id="7068"></p><p data-dcnode-id="7064"><span data-dcnode-id="7067" instrument_node="">46  www.backyardaquaponics.com</span><br data-dcnode-id="7066"><span data-dcnode-id="7065" instrument_node="">f The IBC of Aquaponics           Tristrin’s System</span></p><p data-dcnode-id="7060"><span data-dcnode-id="7063" instrument_node="">                                   Download all 3D</span><br data-dcnode-id="7062"><span data-dcnode-id="7061" instrument_node=""> System 1                          Google Sketchups</span></p><p data-dcnode-id="7059"></p><h2 data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">                                        This was the first of Tristrins aqu</span></h2><br data-dcnode-id="7056"><span data-dcnode-id="7055" instrument_node="">                                                                              aponic systems</span><p data-dcnode-id="7054"></p><p data-dcnode-id="7050"><span data-dcnode-id="7053" instrument_node="">47  www.backyardaquaponics.com</span><br data-dcnode-id="7052"><span data-dcnode-id="7051" instrument_node="">f The IBC of Aquaponics                                       Tristrin’s System</span></p><p data-dcnode-id="7016"><span data-dcnode-id="7049" instrument_node="">                                                               System 2</span><br data-dcnode-id="7048"><span data-dcnode-id="7047" instrument_node="">                                                                   The second system has a few further modifications and</span><br data-dcnode-id="7046"><span data-dcnode-id="7045" instrument_node="">                                                               tweaks. Using the same style of growbed frame structure,</span><br data-dcnode-id="7044"><span data-dcnode-id="7043" instrument_node="">                                                               this time they made it big enough for four growbeds. It’s the</span><br data-dcnode-id="7042"><span data-dcnode-id="7041" instrument_node="">                                                               same style of operation, running as a CHIFT PIST system</span><br data-dcnode-id="7040"><span data-dcnode-id="7039" instrument_node="">                                                               with the pump in the sump tank, pumping into the fish</span><br data-dcnode-id="7038"><span data-dcnode-id="7037" instrument_node="">                                                               tank which overflows into the growbeds before draining via</span><br data-dcnode-id="7036"><span data-dcnode-id="7035" instrument_node="">                                                               autosiphons into the sump. One major difference here is that</span><br data-dcnode-id="7034"><span data-dcnode-id="7033" instrument_node="">                                                               the system has 3 sumps, all bases of IBC’s. These sumps</span><br data-dcnode-id="7032"><span data-dcnode-id="7031" instrument_node="">                                                               are all joined together by pipe work, with the pump being</span><br data-dcnode-id="7030"><span data-dcnode-id="7029" instrument_node="">                                                               in one of the sumps. Originally the pipe work between the</span><br data-dcnode-id="7028"><span data-dcnode-id="7027" instrument_node="">                                                               sumps was 25mm but when two siphons from different beds</span><br data-dcnode-id="7026"><span data-dcnode-id="7025" instrument_node="">                                                               emptied at the same time it caused a sump to overflow. The</span><br data-dcnode-id="7024"><span data-dcnode-id="7023" instrument_node="">                                                               interconnectors between the sumps were changed to 50mm to</span><br data-dcnode-id="7022"><span data-dcnode-id="7021" instrument_node="">                                                               increase the flow between the tanks and vent mesh cowls are</span><br data-dcnode-id="7020"><span data-dcnode-id="7019" instrument_node="">                                                               placed on the end of the pipe to stop things getting into the</span><br data-dcnode-id="7018"><span data-dcnode-id="7017" instrument_node="">                                                               pipes and blocking the flow.</span></p><p data-dcnode-id="7015"></p><h2 data-dcnode-id="7013"><span data-dcnode-id="7014" instrument_node="">                                                                  Plumbing between the two different tanks</span></h2><p data-dcnode-id="7012"></p><p data-dcnode-id="7008"><span data-dcnode-id="7011" instrument_node=""> Here you can clearly see the interconnected sumps under the growbed, all three are plumbed together with a pump only in</span><br data-dcnode-id="7010"><span data-dcnode-id="7009" instrument_node=""> one of them, to pump the water back to the fish tank</span></p><p data-dcnode-id="7004"><span data-dcnode-id="7007" instrument_node="">48  www.backyardaquaponics.com</span><br data-dcnode-id="7006"><span data-dcnode-id="7005" instrument_node="">f  The IBC of Aquaponics                                           Tristrin’s System</span></p><p data-dcnode-id="6980"><span data-dcnode-id="7003" instrument_node="">System 3</span><br data-dcnode-id="7002"> ="6823" instrument_node="">    The growbeds got quite hot during the day over the               Apart from this unfortunate accident the aquaponic</span><br data-dcnode-id="6822"><span data-dcnode-id="6821" instrument_node="">summer so Lungy set up a simple shade cloth cover to keep         system was a great success, and the destroyed shed was soon</span><br data-dcnode-id="6820"><span data-dcnode-id="6819" instrument_node="">things a little cooler.                                           replaced so that things could get back on track.</span></p><p data-dcnode-id="6817"></p><h2 data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node=""> Above: Early design stages drawn up in google sketchup</span></h2><p data-dcnode-id="6814"></p><p data-dcnode-id="6813"></p><h2 data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">53  www.backyardaquaponics.com                                                      www.backyardaquaponics.com   53</span></h2><br data-dcnode-id="6810"><span data-dcnode-id="6809" instrument_node="">f The IBC of Aquaponics                                    Lungy’s System</span><p data-dcnode-id="6808"></p><p data-dcnode-id="6807"></p><h2 data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node=""> Beds all set up with a layer of gravel around the area</span></h2><p data-dcnode-id="6804"></p><p data-dcnode-id="6800"><span data-dcnode-id="6803" instrument_node="">                                                                                                    to the growbeds</span><br data-dcnode-id="6802"><span data-dcnode-id="6801" instrument_node="">                                                                 Piping from the IBCs heading out</span></p><p data-dcnode-id="6799"></p><h2 data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">                                                             This was a tricky bit of plumbing as the main sump was</span></h2><br data-dcnode-id="6796"><span data-dcnode-id="6795" instrument_node="">                                                             just a rubber liner</span><p data-dcnode-id="6794"></p><p data-dcnode-id="6790"><span data-dcnode-id="6793" instrument_node=""> The main sump tank what contains the pump; Sumps all        The individual sumptanks for under each bed, buried and</span><br data-dcnode-id="6792"><span data-dcnode-id="6791" instrument_node=""> set up, stands partially buried to a better height          plumbed together</span></p><p data-dcnode-id="6786"><span data-dcnode-id="6789" instrument_node="">54  www.backyardaquaponics.com</span><br data-dcnode-id="6788"><span data-dcnode-id="6787" instrument_node="">f The IBC of Aquaponics                                    Lungy’s System</span></p><p data-dcnode-id="6785"></p><h2 data-dcnode-id="6783"><span data-dcnode-id="6784" instrument_node="">  After effects of the fire</span></h2><p data-dcnode-id="6782"></p><p data-dcnode-id="6781"></p><h2 data-dcnode-id="6779"><span data-dcnode-id="6780" instrument_node="">Fantastic growth in the beds</span></h2><p data-dcnode-id="6778"></p><p data-dcnode-id="6777"></p><h2 data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">  Some shadecloth was set up to provide shelter for the</span></h2><br data-dcnode-id="6774"><span data-dcnode-id="6773" instrument_node="">  plants during the hot summer                               The shed and fish tanks were lined to provide insulation</span><p data-dcnode-id="6772"></p><p data-dcnode-id="6768"><span data-dcnode-id="6771" instrument_node="">55  www.backyardaquaponics.com</span><br data-dcnode-id="6770"><span data-dcnode-id="6769" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="6754"><span data-dcnode-id="6767" instrument_node="">                                 Arkantex’s</span><br data-dcnode-id="6766"><span data-dcnode-id="6765" instrument_node="">                                    IBC system</span><br data-dcnode-id="6764"><span data-dcnode-id="6763" instrument_node="">                                   A</span><br data-dcnode-id="6762"><span data-dcnode-id="6761" instrument_node="">                                           rkantex has set up a beautiful IBC system that’s a</span><br data-dcnode-id="6760"><span data-dcnode-id="6759" instrument_node="">                                           really good size as well. This is a perfect example of</span><br data-dcnode-id="6758"><span data-dcnode-id="6757" instrument_node="">                                           how you can have a great aquaponic system for very</span><br data-dcnode-id="6756"><span data-dcnode-id="6755" instrument_node="">                                   little money if you can find a cheap source of IBC’s.</span></p><p data-dcnode-id="6753"></p><h2 data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">                                       The system consists of an IBC fish tank, 5 IBCs set up</span></h2><br data-dcnode-id="6750"><span data-dcnode-id="6749" instrument_node="">                                   as growbeds. These beds have been set up beautifully, they</span><br data-dcnode-id="6748"><span data-dcnode-id="6747" instrument_node="">                                   have been cut in half, however the top section of the frame</span><br data-dcnode-id="6746"><span data-dcnode-id="6745" instrument_node="">                                   has been set on the ground, with the bottom section of the</span><br data-dcnode-id="6744"><span data-dcnode-id="6743" instrument_node="">                                   inner plastic liner placed in here on the ground. Then the</span><br data-dcnode-id="6742"><span data-dcnode-id="6741" instrument_node="">                                   frame base mounts perfectly on top of this. This is a great</span><br data-dcnode-id="6740"><span data-dcnode-id="6739" instrument_node="">                                   way of setting up a system because normally if you take the</span><br data-dcnode-id="6738"><span data-dcnode-id="6737" instrument_node="">                                   top of an IBC and try to turn it upside down there’s only two</span><br data-dcnode-id="6736"><span data-dcnode-id="6735" instrument_node="">                                   small bars supporting the growbed. But by placing the top</span><br data-dcnode-id="6734"><span data-dcnode-id="6733" instrument_node="">                                   section of frame on the ground and slipping the bottom half</span><br data-dcnode-id="6732"><span data-dcnode-id="6731" instrument_node="">                                   of the IBC liner in this, the liner is sitting on the ground so it’s</span><br data-dcnode-id="6730"><span data-dcnode-id="6729" instrument_node="">                                   well supported. Then the normally poorly supported top liner</span><br data-dcnode-id="6728"><span data-dcnode-id="6727" instrument_node="">                                   section goes upside down into the frame base which contains</span><br data-dcnode-id="6726"><span data-dcnode-id="6725" instrument_node="">                                   a solid support.</span><p data-dcnode-id="6724"></p><p data-dcnode-id="6723"></p><h2 data-dcnode-id="6721"><span data-dcnode-id="6722" instrument_node="">                                       The system is set up as CHIFT PIST, with a full IBC, half</span></h2><br data-dcnode-id="6720"><span data-dcnode-id="6719" instrument_node="">                                   buried in the ground acting as the sump. Water is pumped</span><br data-dcnode-id="6718"><span data-dcnode-id="6717" instrument_node="">                                   from the sump up into the fish tank IBC, from here if flows</span><br data-dcnode-id="6716"><span data-dcnode-id="6715" instrument_node="">                                   into the 5 half IBC growbeds. There are taps at each growbed</span><br data-dcnode-id="6714"><span data-dcnode-id="6713" instrument_node="">                                   to control the water distribution on all the beds. The water</span><br data-dcnode-id="6712"><span data-dcnode-id="6711" instrument_node="">                                   then drains into the half IBC sump tanks beneath the</span><br data-dcnode-id="6710"><span data-dcnode-id="6709" instrument_node="">                                   growbeds. These are plumbed together externally and flow</span><br data-dcnode-id="6708"><span data-dcnode-id="6707" instrument_node="">                                   into the drain tank. It’s surprising the system you can come</span><br data-dcnode-id="6706"><span data-dcnode-id="6705" instrument_node="">                                   up with when you have a few fittings, a pump and some pipe,</span><br data-dcnode-id="6704"><span data-dcnode-id="6703" instrument_node="">                                   with of course IBC’s.</span><p data-dcnode-id="6702"></p><p data-dcnode-id="6701"></p><h2 data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">                                      You might have noticed that Arkantex is also building a</span></h2><br data-dcnode-id="6698"><span data-dcnode-id="6697" instrument_node="">                                   greenhouse around the system to help keep the temperatures</span><br data-dcnode-id="6696"><span data-dcnode-id="6695" instrument_node="">                                   more stable.</span><p data-dcnode-id="6694"></p><p data-dcnode-id="6686"><span data-dcnode-id="6693" instrument_node="">                                     Download 3D</span><br data-dcnode-id="6692"><span data-dcnode-id="6691" instrument_node="">                                     Google Sketchup</span><br data-dcnode-id="6690"><span data-dcnode-id="6689" instrument_node="">56  www.backyardaquaponics.com</span><br data-dcnode-id="6688"><span data-dcnode-id="6687" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="6642"><span data-dcnode-id="6685" instrument_node="">                                    Bonsaibelly’s</span><br data-dcnode-id="6684"><span data-dcnode-id="6683" instrument_node="">                                         IBC system</span><br data-dcnode-id="6682"><span data-dcnode-id="6681" instrument_node="">                                         B</span><br data-dcnode-id="6680"><span data-dcnode-id="6679" instrument_node="">                                                 onsaibelly wanted an expandable system that he</span><br data-dcnode-id="6678"><span data-dcnode-id="6677" instrument_node="">                                                 could add to later, so he decided 2 IBC’s would</span><br data-dcnode-id="6676"><span data-dcnode-id="6675" instrument_node="">                                                 be better than 1, as well as 2 blue barrels cut in</span><br data-dcnode-id="6674"><span data-dcnode-id="6673" instrument_node="">                                         half lengthways. It didn’t take much effort to wash out</span><br data-dcnode-id="6672"><span data-dcnode-id="6671" instrument_node="">                                         the barrels which had been used for storing glucose. The</span><br data-dcnode-id="6670"><span data-dcnode-id="6669" instrument_node="">                                         available space is 4 metres x 3 metres wide narrowing down</span><br data-dcnode-id="6668"><span data-dcnode-id="6667" instrument_node="">                                         to about 1 metre. He ended up using poly irrigation piping</span><br data-dcnode-id="6666"><span data-dcnode-id="6665" instrument_node="">                                         which is more expensive than pvc, but easy to use. It screws</span><br data-dcnode-id="6664"><span data-dcnode-id="6663" instrument_node="">                                         together and you can snip the pipe easily with secateurs.</span mised it was super fresh and pretty</span><br data-dcnode-id="6590"><span data-dcnode-id="6589" instrument_node="">a minimum water level of 50cm, another form of backup in         much organic. Great to see kids try new food.” A variety of</span><br data-dcnode-id="6588"><span data-dcnode-id="6587" instrument_node="">the event that something does go wrong. Bonsaibelly like         produce can be grown easily including fruiting crops such as</span><br data-dcnode-id="6586"><span data-dcnode-id="6585" instrument_node="">many others does not want to come home to a dry tank and         tomatoes, broccoli and peas. Leafy greens also do very well</span><br data-dcnode-id="6584"><span data-dcnode-id="6583" instrument_node="">dead fish . The 400 watt submersible pump has more than          including English spinach, silverbeet and lettuces.</span><br data-dcnode-id="6582"><span data-dcnode-id="6581" instrument_node="">enough power to get 3 more barrels going in the future. He</span><br data-dcnode-id="6580"><span data-dcnode-id="6579" instrument_node="">says “I am happier with the pump and timer system- it just</span><br data-dcnode-id="6578"><span data-dcnode-id="6577" instrument_node="">seemed a little less complicated and I was a little scared</span></p><p data-dcnode-id="6572"><span data-dcnode-id="6575" instrument_node="">59  www.backyardaquaponics.com</span><br data-dcnode-id="6574"><span data-dcnode-id="6573" instrument_node="">f  The IBC of Aquaponics</span></p><p data-dcnode-id="6552"><span data-dcnode-id="6571" instrument_node="">                                                  Chainsaw’s</span><br data-dcnode-id="6570"><span data-dcnode-id="6569" instrument_node="">                                                     IBC system</span><br data-dcnode-id="6568"><span data-dcnode-id="6567" instrument_node="">                                                           C</span><br data-dcnode-id="6566"><span data-dcnode-id="6565" instrument_node="">                                                                   hainsaw system started out as 3 IBCs and 24 half</span><br data-dcnode-id="6564"><span data-dcnode-id="6563" instrument_node="">                                                                   blue barrels, which has been running for around 2</span><br data-dcnode-id="6562"><span data-dcnode-id="6561" instrument_node="">                                                                   years now. The barrels were cut in half lengthways</span><br data-dcnode-id="6560"><span data-dcnode-id="6559" instrument_node="">                                                           and set up in a neat looking greenhouse. He really likes the</span><br data-dcnode-id="6558"><span data-dcnode-id="6557" instrument_node="">                                                           idea of using top hat grommets as they are very cheap and</span><br data-dcnode-id="6556"><span data-dcnode-id="6555" instrument_node="">                                                           ideal for use in the barrels, they provide a seal around take-off</span><br data-dcnode-id="6554"><span data-dcnode-id="6553" instrument_node="">                                                           adaptors and poly fitting when connecting in to PVC.</span></p><p data-dcnode-id="6534"><span data-dcnode-id="6551" instrument_node="">                                                                The three IBC s are all connected with a SLO. The sump</span><br data-dcnode-id="6550"><span data-dcnode-id="6549" instrument_node="">                                                           tank is one of the three IBC’s and it holds the sump pump with</span><br data-dcnode-id="6548"><span data-dcnode-id="6547" instrument_node="">                                                           float switch. This pump is on a timer which allows it to pump</span><br data-dcnode-id="6546"><span data-dcnode-id="6545" instrument_node="">                         k keeps ou   t the sunlight and</span><br data-dcnode-id="6544"><span data-dcnode-id="6543" instrument_node="">Hay surrounding fish tan                                   water every second hour for 15 minutes. The water is pumped</span><br data-dcnode-id="6542"><span data-dcnode-id="6541" instrument_node="">acts as insulatio n</span><br data-dcnode-id="6540"><span data-dcnode-id="6539" instrument_node="">                                                           up to the growbeds which then drain back to the first fish tank,</span><br data-dcnode-id="6538"><span data-dcnode-id="6537" instrument_node="">                                                           SLO to the second fish tank and SLO to the sump tank, which</span><br data-dcnode-id="6536"><span data-dcnode-id="6535" instrument_node="">                                                           is the third full sized IBC.</span></p><p data-dcnode-id="6533"></p><h2 data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">                                                               Chainsaw occasionally adds seasol, a seaweed</span></h2><br data-dcnode-id="6530"><span data-dcnode-id="6529" instrument_node="">                                                           concentrate, to the system as it is safe for the fish and gives</span><br data-dcnode-id="6528"><span data-dcnode-id="6527" instrument_node="">                                                           the plants a range of nutrients and trace elements. It is</span><br data-dcnode-id="6526"><span data-dcnode-id="6525" instrument_node="">                                                           always a good idea to ensure that anything being added to an</span><br data-dcnode-id="6524"><span data-dcnode-id="6523" instrument_node="">                                                           aquaponic system is safe for fish. Chainsaw started a thread</span><br data-dcnode-id="6522"><span data-dcnode-id="6521" instrument_node="">                                                           on the Backyard Aquaponics forum titled “Beware the Pest</span><br data-dcnode-id="6520"><span data-dcnode-id="6519" instrument_node="">                                                           Control Man” after an annual routine spray turned in to any</span><br data-dcnode-id="6518"><span data-dcnode-id="6517" instrument_node="">                                                           Aquaponics enthusiasts worst nightmare. After losing all his</span><br data-dcnode-id="6516"><span data-dcnode-id="6515" instrument_node="">                                                           silver perch, Chainsaw has some Jade perch coming along</span><br data-dcnode-id="6514"><span data-dcnode-id="6513" instrument_node="">                                                           nicely. We look forward to seeing them reach harvest size.</span><p data-dcnode-id="6512"></p><p data-dcnode-id="6508"><span data-dcnode-id="6511" instrument_node="">   IBC fish tank with pump and float switch. Jade perch</span><br data-dcnode-id="6510"><span data-dcnode-id="6509" instrument_node="">   growing well</span></p><p data-dcnode-id="6507"></p><h2 data-dcnode-id="6505"><span data-dcnode-id="6506" instrument_node="">   Bell Syphons                                              Fish tanks</span></h2><p data-dcnode-id="6504"></p><p data-dcnode-id="6500"><span data-dcnode-id="6503" instrument_node="">60  www.backyardaquaponics.com</span><br data-dcnode-id="6502"><span data-dcnode-id="6501" instrument_node="">f The IBC of Aquaponics                                Chainsaw’s System</span></p><p data-dcnode-id="6499"></p><h2 data-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node=""> Greenhouses offer protections from unwanted guests</span></h2><p data-dcnode-id="6496"></p><p data-dcnode-id="6495"></p><h2 data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node=""> Growbeds full of plants                                Barra fingerlings</span></h2><p data-dcnode-id="6492"></p><p data-dcnode-id="6488"><span data-dcnode-id="6491" instrument_node="">61  www.backyardaquaponics.com</span><br data-dcnode-id="6490"><span data-dcnode-id="6489" instrument_node="">f  The IBC of Aquaponics</span></p><p data-dcnode-id="6442"><span data-dcnode-id="6487" instrument_node="">                                                                      Hillsy’s</span><br data-dcnode-id="6486"><span data-dcnode-id="6485" instrument_node="">                                                                      IBC system</span><br data-dcnode-id="6484"><span data-dcnode-id="6483" instrument_node="">                                                                H</span><br data-dcnode-id="6482"><span data-dcnode-id="6481" instrument_node="">                                                                         illsy’s system comprises of two IBCs and three</span><br data-dcnode-id="6480"><span data-dcnode-id="6479" instrument_node="">                                                                         fibreglass bathtubs acting as growbeds. He has</span><br data-dcnode-id="6478"><span data-dcnode-id="6477" instrument_node="">                                                                         created a very neat looking system at an affordable</span><br data-dcnode-id="6476"><span data-dcnode-id="6475" instrument_node="">                                                                price. The style of the system is based on a CHIFT PIST</span><br data-dcnode-id="6474"><span data-dcnode-id="6473" instrument_node="">                                                                method, a term coined in the early days of aquaponics,</span><br data-dcnode-id="6472"><span data-dcnode-id="6471" instrument_node="">                                                                standing for constant height in fish tank pump in sump tank.</span><br data-dcnode-id="6470"><span data-dcnode-id="6469" instrument_node="">                                                                The main fish tank is a complete IBC , this will hold around</span><br data-dcnode-id="6468"><span data-dcnode-id="6467" instrument_node="">                                                                1000 litres of water which will be maintained at this height.</span><br data-dcnode-id="6466"><span data-dcnode-id="6465" instrument_node="">    Extra external filters have been added to the system over   He has cut out the top of the IBC, allowing easy access to the</span><br data-dcnode-id="6464"><span data-dcnode-id="6463" instrument_node="">    time                                                        fish, the sump tank is a second IBC positioned next to the</span><br data-dcnode-id="6462"><span data-dcnode-id="6461" instrument_node="">                                                                main fish tank in which another species of fish could be kept,</span><br data-dcnode-id="6460"><span data-dcnode-id="6459" instrument_node="">                                                                or ideal for use as a fingerling tank. The submersible 6000lph</span><br data-dcnode-id="6458"><span data-dcnode-id="6457" instrument_node="">                                                                pump sits in the sump tank and pumps constantly to the main</span><br data-dcnode-id="6456"><span data-dcnode-id="6455" instrument_node="">                                                                fish tank, then overflows to the three growbeds which are</span><br data-dcnode-id="6454"><span data-dcnode-id="6453" instrument_node="">                                                                operated by auto siphons. The standpipes are made using a</span><br data-dcnode-id="6452"><span data-dcnode-id="6451" instrument_node="">                                                                25-20mm reducing coupling which sits snugly in the existing</span><br data-dcnode-id="6450"><span data-dcnode-id="6449" instrument_node="">                                                                drain of the bath tubs. Hillsy used the standard bath tub</span><br data-dcnode-id="6448"><span data-dcnode-id="6447" instrument_node="">                                                                fitting before connecting in to a threaded adaptor and 40mm</span><br data-dcnode-id="6446"><span data-dcnode-id="6445" instrument_node="">                                                                plumbing pipe commonly known as DWV. A swirl filter has also</span><br data-dcnode-id="6444"><span data-dcnode-id="6443" instrument_node="">                                                                been added to the system as an additional solids filter.</span></p><p data-dcnode-id="6441"></p><h2 data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">                                                                   The bathtubs have been installed on limestone blocks</span></h2><br data-dcnode-id="6438"><span data-dcnode-id="6437" instrument_node="">System all laid out and ready for plumbing                      which make for an ideal height for planting and harvesting the</span><br data-dcnode-id="6436"><span data-dcnode-id="6435" instrument_node="">                                                                vegetables. Gravel media has been used to grow the plants</span><p data-dcnode-id="6434"></p><p data-dcnode-id="6433"></p><h2 data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">                                             Download 3D Google Sketchup</span></h2><br data-dcnode-id="6430"><span data-dcnode-id="6429" instrument_node="">62  www.backyardaquaponics.com</span><br data-dcnode-id="6428"><span data-dcnode-id="6427" instrument_node="">f  The IBC of Aquaponics                                            Hillsy’s System</span><p data-dcnode-id="6426"></p><p data-dcnode-id="6425"></p><h2 data-dcnode-id="6423"><span data-dcnode-id="6424" instrument_node="">   The rewards of Hillsy’s system</span></h2><p data-dcnode-id="6422"></p><p data-dcnode-id="6412"><span data-dcnode-id="6421" instrument_node="">and Hillsy advises others to make sure that they wash the pea</span><br data-dcnode-id="6420"><span data-dcnode-id="6419" instrument_node="">gravel very well, as he found that weeks later the fine clay was</span><br data-dcnode-id="6418"><span data-dcnode-id="6417" instrument_node="">still coming out of the growbeds. He planted up the beds and</span><br data-dcnode-id="6416"><span data-dcnode-id="6415" instrument_node="">planted some tomatoes, garlic chives, capsicum and tomatoes</span><br data-dcnode-id="6414"><span data-dcnode-id="6413" instrument_node="">which before long began to show some good results.</span></p><p data-dcnode-id="6406"><span data-dcnode-id="6411" instrument_node="">  Here we can see the bubbles from the venturi sucking air</span><br data-dcnode-id="6410"><span data-dcnode-id="6409" instrument_node="">  into the water stream. Also the 90mm Solids lift overflow in</span><br data-dcnode-id="6408"><span data-dcnode-id="6407" instrument_node="">  the background                                                      These are the bell siphons in the growbeds</span></p><p data-dcnode-id="6402"><span data-dcnode-id="6405" instrument_node="">63  www.backyardaquaponics.com</span><br data-dcnode-id="6404"><span data-dcnode-id="6403" instrument_node="">f The IBC of Aquaponics                                        Hillsy’s System</span></p><p data-dcnode-id="6401"></p><h2 data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node=""> Swirl filter addition to the system</span></h2><p data-dcnode-id="6398"></p><p data-dcnode-id="6397"></p><h2 data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">   The drain pipe has a breather; Grav</span></h2><br data-dcnode-id="6394"><span data-dcnode-id="6393" instrument_node="">   neatly laid out                     el growbeds are very         Fish tank and sump tank installed in place</span><p data-dcnode-id="6392"></p><p data-dcnode-id="6390"><span data-dcnode-id="6391" instrument_node=""> Gravel growbeds are very neatly laid out                        Plants are just starting to take off</span></p><p data-dcnode-id="6386"><span data-dcnode-id="6389" instrument_node="">64  www.backyardaquaponics.com</span><br data-dcnode-id="6388"><span data-dcnode-id="6387" instrument_node="">f The IBC of Aquaponics           Hillsy’s System</span></p><p data-dcnode-id="6382"><span data-dcnode-id="6385" instrument_node="">65  www.backyardaquaponics.com</span><br data-dcnode-id="6384"><span data-dcnode-id="6383" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="6370"><span data-dcnode-id="6381" instrument_node="">                                 Freoboy’s</span><br data-dcnode-id="6380"><span data-dcnode-id="6379" instrument_node="">                                   IBC system</span><br data-dcnode-id="6378"><span data-dcnode-id="6377" instrument_node="">                                  F</span><br data-dcnode-id="6376"><span data-dcnode-id="6375" instrument_node="">                                        reoboys IBC system began as one of the simplest</span><br data-dcnode-id="6374"><span data-dcnode-id="6373" instrument_node="">                                        systems you can make with an IBC- cut the top off and</span><br data-dcnode-id="6372"><span data-dcnode-id="6371" instrument_node="">                                        turn it upside down, fill it with media and there you go.</span></p><p data-dcnode-id="6369"></p><h2 data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">                                      This might be how it started, but it hasn’t been left there,</span></h2><br data-dcnode-id="6366"><span data-dcnode-id="6365" instrument_node="">                                  Freoboy has souped up the simple system with quite a few</span><br data-dcnode-id="6364"><span data-dcnode-id="6363" instrument_node="">                                  “extras”. He’s added a 35L filter made from large diameter</span><br data-dcnode-id="6362"><span data-dcnode-id="6361" instrument_node="">                                  pipe, the pipe is filled with expanded clay and water is pumped</span><br data-dcnode-id="6360"><span data-dcnode-id="6359" instrument_node="">                                  through the filter continuously. This aids the filtration of the</span><br data-dcnode-id="6358"><span data-dcnode-id="6357" instrument_node="">                                  system greatly. However it quickly became evident that the</span><br data-dcnode-id="6356"><span data-dcnode-id="6355" instrument_node="">                                  200L growbed and filter was not adequate for the amount of</span><br data-dcnode-id="6354"><span data-dcnode-id="6353" instrument_node="">                                  fish Freoboy wanted to grow.</span><p data-dcnode-id="6352"></p><p data-dcnode-id="6351"></p><h2 data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">                                      Freoboy has since removed the 35L filter, and added an</span></h2><br data-dcnode-id="6348"><span data-dcnode-id="6347" instrument_node="">                                  additional 400L fiberglass pond as a growbed. Then an old</span><br data-dcnode-id="6346"><span data-dcnode-id="6345" instrument_node="">                                  150L fiberglass live bait tank was added as a sump tank, and</span><br data-dcnode-id="6344"><span data-dcnode-id="6343" instrument_node="">                                  later filled with hydroton to act as a constant flood growbed</span><br data-dcnode-id="6342"><span data-dcnode-id="6341" instrument_node="">                                  for water loving plants (mint, watercress, celery etc.). There</span><br data-dcnode-id="6340"><span data-dcnode-id="6339" instrument_node="">                                  have been a few more filter arrangements added to the system</span><br data-dcnode-id="6338"><span data-dcnode-id="6337" instrument_node="">                                  signs of an active student mind.</span><p data-dcnode-id="6336"></p><p data-dcnode-id="6335"></p><h2 data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">                                       The system now consists of an 800L IBC fish tank, 200L</span></h2><br data-dcnode-id="6332"><span data-dcnode-id="6331" instrument_node="">                                  IBC lid growbed, 400L pond growbed, 150L growbed/sump,</span><br data-dcnode-id="6330"><span data-dcnode-id="6329" instrument_node="">                                  and 3 airlift bio-filters, to provide extra aeration and filtration</span><br data-dcnode-id="6328"><span data-dcnode-id="6327" instrument_node="">                                  if the water pumps fail or there is a power loss. Freoboy</span><br data-dcnode-id="6326"><span data-dcnode-id="6325" instrument_node="">                                  now manages to raise 30 fish at a time, plus plenty of fresh</span><br data-dcnode-id="6324"><span data-dcnode-id="6323" instrument_node="">                                  vegetables for him and his family.</span><p data-dcnode-id="6322"></p><p data-dcnode-id="6314"><span data-dcnode-id="6321" instrument_node="">                                    Download 3D</span><br data-dcnode-id="6320"><span data-dcnode-id="6319" instrument_node="">                                    Google Sketchup</span><br data-dcnode-id="6318"><span data-dcnode-id="6317" instrument_node="">66  www.backyardaquaponics.com</span><br data-dcnode-id="6316"><span data-dcnode-id="6315" instrument_node="">f The IBC of Aquaponics           Freoboy’s System</span></p><p data-dcnode-id="6313"></p><h2 data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">                                       IBC covered with bamboo</span></h2><p data-dcnode-id="6310"></p><p data-dcnode-id="6306"><span data-dcnode-id="6309" instrument_node="">67  www.backyardaquaponics.com</span><br data-dcnode-id="6308"><span data-dcnode-id="6307" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="6284"><span data-dcnode-id="6305" instrument_node="">             Outbackozzie’s</span><br data-dcnode-id="6304"><span data-dcnode-id="6303" instrument_node="">                    IBC system</span><br data-dcnode-id="6302"><span data-dcnode-id="6301" instrument_node="">                                 O</span><br data-dcnode-id="6300"><span data-dcnode-id="6299" instrument_node="">                                          utbackozzie has been a member of the Backyard</span><br data-dcnode-id="6298"><span data-dcnode-id="6297" instrument_node="">                                          Aquaponics Forum for many years and he’s created a</span><br data-dcnode-id="6296"><span data-dcnode-id="6295" instrument_node="">                                          few classic aquaponic systems utilizing IBC’s. In fact,</span><br data-dcnode-id="6294"><span data-dcnode-id="6293" instrument_node="">                                 I think that of the many systems he’s built only his very first</span><br data-dcnode-id="6292"><span data-dcnode-id="6291" instrument_node="">                                 system didn’t have any IBC’s in them. Since that first bath tub</span><br data-dcnode-id="6290"><span data-dcnode-id="6289" instrument_node="">                                 system, all of his systems have incorporated IBCs to some</span><br data-dcnode-id="6288"><span data-dcnode-id="6287" instrument_node="">                                 extent, and more recently with his large commercial systems</span><br data-dcnode-id="6286"><span data-dcnode-id="6285" instrument_node="">                                 he has included many IBC’s into the design of the system.</span></p><p data-dcnode-id="6274"><span data-dcnode-id="6283" instrument_node="">                                     Firstly we’ll take a look at his IBC and Blue barrel system in</span><br data-dcnode-id="6282"><span data-dcnode-id="6281" instrument_node="">                                 his backyard. This started as an IBC system, however the IBC’s</span><br data-dcnode-id="6280"><span data-dcnode-id="6279" instrument_node="">                                 had to be removed and replaced after a while. Four IBC’s were</span><br data-dcnode-id="6278"><span data-dcnode-id="6277" instrument_node="">                                 buried in the ground and a number of Blue 200L barrels were</span><br data-dcnode-id="6276"><span data-dcnode-id="6275" instrument_node="">                                 cut in half across their middle to be used as growbeds.</span></p><p data-dcnode-id="6264"><span data-dcnode-id="6273" instrument_node="">                                     The plan for this initial system was well thought out. 4</span><br data-dcnode-id="6272"><span data-dcnode-id="6271" instrument_node="">                                 IBC’s were buried in the ground as fish tank, these were</span><br data-dcnode-id="6270"><span data-dcnode-id="6269" instrument_node="">                                 all plumbed together underground so that the tanks could</span><br data-dcnode-id="6268"><span data-dcnode-id="6267" instrument_node=""> Lots of digging</span><br data-dcnode-id="6266"><span data-dcnode-id="6265" instrument_node="">                                 equalize water heights between them. The IBC tanks on either</span></p><p data-dcnode-id="6260"><span data-dcnode-id="6263" instrument_node="">68  www.backyardaquaponics.com</span><br data-dcnode-id="6262"><span data-dcnode-id="6261" instrument_node="">f The IBC of Aquaponics           Outbackozzie’s System</span></p><p data-dcnode-id="6259"></p><h2 data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">                                     The growbed in full glory</span></h2><p data-dcnode-id="6256"></p><p data-dcnode-id="6255"></p><h2 data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">                                  end had 4500L/h pumps in them, these pumps pumped</span></h2><br data-dcnode-id="6252"><span data-dcnode-id="6251" instrument_node="">                                  up out of the IBC fish tanks and down the side of the row of</span><br data-dcnode-id="6250"><span data-dcnode-id="6249" instrument_node="">                                  growbeds. The growbeds are 200L blue barrels cut in half</span><br data-dcnode-id="6248"><span data-dcnode-id="6247" instrument_node="">                                  around their middle. At each growbed there’s a T in the main</span><br data-dcnode-id="6246"><span data-dcnode-id="6245" instrument_node="">                                  line with a riser coming up to the bed with a small valve to</span><br data-dcnode-id="6244"><span data-dcnode-id="6243" instrument_node="">                                  control the flow going to each bed.</span><p data-dcnode-id="6242"></p><p data-dcnode-id="6241"></p><h2 data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">                                      The growbeds are sitting on bricks, with a main 90mm</span></h2><br data-dcnode-id="6238"><span data-dcnode-id="6237" instrument_node="">                                  drain line running down the centre that each growbed drains</span><br data-dcnode-id="6236"><span data-dcnode-id="6235" instrument_node="">                                  into. Each growbed has a standpipe and a outer standpipe</span><br data-dcnode-id="6234"><span data-dcnode-id="6233" instrument_node="">                                  surround to keep the media away from the standpipe, the</span><br data-dcnode-id="6232"><span data-dcnode-id="6231" instrument_node="">                                  system works with the beds being constantly flooded with</span><br data-dcnode-id="6230"><span data-dcnode-id="6229" instrument_node="">                                  water to the height of the standpipe.</span><p data-dcnode-id="6228"></p><p data-dcnode-id="6227"></p><h2 data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">                                      All the main 25mm irrigation pipelines in the system are</span></h2><br data-dcnode-id="6224"><span data-dcnode-id="6223" instrument_node="">                                  joined together, and both pumps are actually hooked into the</span><br data-dcnode-id="6222"><span data-dcnode-id="6221" instrument_node="">                                  same system, This means that should there ever be a pump</span><br data-dcnode-id="6220"><span data-dcnode-id="6219" instrument_node="">                                  failure then the system will keep going, just at lower flow levels</span><br data-dcnode-id="6218"><span data-dcnode-id="6217" instrument_node="">                                  to each bed.</span><p data-dcnode-id="6216"></p><p data-dcnode-id="6212"><span data-dcnode-id="6215" instrument_node="">69  www.backyardaquaponics.com</span><br data-dcnode-id="6214"><span data-dcnode-id="6213" instrument_node="">f  The IBC of Aquaponics                                             Outbackozzie’s System</span></p><p data-dcnode-id="6211"></p><h2 data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">    To neaten the whole system up and hide the pipe work</span></h2><br data-dcnode-id="6208"><span data-dcnode-id="6207" instrument_node="">OBO brought in a lot of dirt, piling it over all the pipe work</span><br data-dcnode-id="6206"><span data-dcnode-id="6205" instrument_node="">around the base of all the barrel growbeds. Not only was this</span><br data-dcnode-id="6204"><span data-dcnode-id="6203" instrument_node="">dirt going to act as a cover for the pipe work, but also it would</span><br data-dcnode-id="6202"><span data-dcnode-id="6201" instrument_node="">act as an insulator from the harsh extremes of heat often</span><br data-dcnode-id="6200"><span data-dcnode-id="6199" instrument_node="">experienced in Kalgoorlie.</span><p data-dcnode-id="6198"></p><p data-dcnode-id="6197"></p><h2 data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">    After some time, a problem with the system became quite</span></h2><br data-dcnode-id="6194"><span data-dcnode-id="6193" instrument_node="">apparent, the IBC buried fish tanks were starting to collapse.</span><br data-dcnode-id="6192"><span data-dcnode-id="6191" instrument_node="">They had been buried without their steel cages, and without</span><br data-dcnode-id="6190"><span data-dcnode-id="6189" instrument_node="">any additional support and the external pressure from the</span><br data-dcnode-id="6188"><span data-dcnode-id="6187" instrument_node="">ground especially after rains, was too much and they all began</span><br data-dcnode-id="6186"><span data-dcnode-id="6185" instrument_node="">collapsing.</span><p data-dcnode-id="6184"></p><p data-dcnode-id="6183"></p><h2 data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">    Time for another plan. The IBC’s were removed, the</span></h2><br data-dcnode-id="6180"><span data-dcnode-id="6179" instrument_node="">hole dug out a little more and used steel drill rods, a waste</span><br data-dcnode-id="6178"><span data-dcnode-id="6177" instrument_node="">product from the mining industry, were used to line the hole.</span><br data-dcnode-id="6176"><span data-dcnode-id="6175" instrument_node="">These were welded into place before a rubber pond liner was</span><br data-dcnode-id="6174"><span data-dcnode-id="6173" instrument_node="">installed. Now the system had just the one very substantial</span><br data-dcnode-id="6172"><span data-dcnode-id="6171" instrument_node="">fish pond, but no IBC’s in the system.</span><p data-dcnode-id="6170"></p><p data-dcnode-id="6169"></p><h2 data-dcnode-id="6167"><span data-dcnode-id="6168" instrument_node="">    A second expansion of growbeds was under way. These</span></h2><br data-dcnode-id="6166"><span data-dcnode-id="6165" instrument_node="">were being installed around the corner behind the shed, 4</span><br data-dcnode-id="6164"><span data-dcnode-id="6163" instrument_node="">complete IBC’s with the tops cut out, installed as growbeds.</span><br data-dcnode-id="6162"><span data-dcnode-id="6161" instrument_node="">This adds a huge amount of biofiltration to the system and</span><br data-dcnode-id="6160"><span data-dcnode-id="6159" instrument_node="">another 4sqm of growing area. These beds remain constantly</span><br data-dcnode-id="6158"><span data-dcnode-id="6157" instrument_node="">flooded just below the surface of the media, they are filled</span><br data-dcnode-id="6156"><span data-dcnode-id="6155" instrument_node="">with blue metal with a layer of expanded clay on top to make it</span><br data-dcnode-id="6154"><span data-dcnode-id="6153" instrument_node="">easier to work.</span><p data-dcnode-id="6152"></p><p data-dcnode-id="6146"><span data-dcnode-id="6151" instrument_node="">   As you can see from all the photos of plant growth and fish</span><br data-dcnode-id="6150"><span data-dcnode-id="6149" instrument_node="">harvests, this system has been very productive over the past           Mounding soil around the barrels</span><br data-dcnode-id="6148"><span data-dcnode-id="6147" instrument_node="">couple of years in its various forms.</span></p><p data-dcnode-id="6142"><span data-dcnode-id="6145" instrument_node="">70  www.backyardaquaponics.com</span><br data-dcnode-id="6144"><span data-dcnode-id="6143" instrument_node="">f The IBC of Aquaponics                           Outbackozzie’s System</span></p><p data-dcnode-id="6141"></p><h2 data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node=""> Common 90mm drainpipe runs under the
