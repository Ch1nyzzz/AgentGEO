ty.</span></p><p data-dcnode-id="4777"></p><h2 data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">                                                                There are two growbeds on the system, these are made</span></h2><br data-dcnode-id="4774"><span data-dcnode-id="4773" instrument_node="">                                                            from half IBCs so they are a good deep growbed. Mantis has</span><br data-dcnode-id="4772"><span data-dcnode-id="4771" instrument_node="">                                                            used two bottom halves of the metal outer part of the IBC. This</span><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">                                                            is a great idea for growbeds because you have the additional</span><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">                                                            support for the media filled growbeds. The second metal base</span><br data-dcnode-id="4766"><span data-dcnode-id="4765" instrument_node="">                                                            came from the sump tank, the buried sump needs it’s outer</span><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">                                                            frame support but it doesn’t need the steel base, it only needs</span><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">                                                            a flat earth base to sit the inner plastic container of the IBC.</span><p data-dcnode-id="4760"></p><p data-dcnode-id="4759"></p><h2 data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node=""> Details of the standpipe and media guard in the growbed,</span></h2><br data-dcnode-id="4756"><span data-dcnode-id="4755" instrument_node=""> with the drain pipe coming out of the bottom into the          There’s a 9000L/h pump in the sump that pumps water up</span><br data-dcnode-id="4754"><span data-dcnode-id="4753" instrument_node=""> sump                                                       to the fish tank IBC through the main 40mm pipe, the water</span><br data-dcnode-id="4752"><span data-dcnode-id="4751" instrument_node="">                                                            then flows out of the fish tank into the two beds before flowing</span><br data-dcnode-id="4750"><span data-dcnode-id="4749" instrument_node="">                                                            from the beds into the sump again. All of the IBC components</span><br data-dcnode-id="4748"><span data-dcnode-id="4747" instrument_node="">                                                            above ground have been painted green for the dual purpose</span><br data-dcnode-id="4746"><span data-dcnode-id="4745" instrument_node="">                                                            of looking a little nicer as well as making the plastic more</span><br data-dcnode-id="4744"><span data-dcnode-id="4743" instrument_node="">                                                            resistant to UV degradation. Mantis is adding to his system</span><br data-dcnode-id="4742"><span data-dcnode-id="4741" instrument_node="">                                                            and modifying quite a bit, when we first started this manual he</span><br data-dcnode-id="4740"><span data-dcnode-id="4739" instrument_node="">                                                            only had the one bed, now he has 3 growbeds. By the time you</span><br data-dcnode-id="4738"><span data-dcnode-id="4737" instrument_node="">                                                            read this, who knows how many beds he will have.</span><p data-dcnode-id="4736"></p><p data-dcnode-id="4730"><span data-dcnode-id="4735" instrument_node="">                                                              Download 3D</span><br data-dcnode-id="4734"><span data-dcnode-id="4733" instrument_node=""> Great flow rate coming from the pump</span><br data-dcnode-id="4732"><span data-dcnode-id="4731" instrument_node="">                                                              Google Sketchup</span></p><p data-dcnode-id="4726"><span data-dcnode-id="4729" instrument_node="">110  www.backyardaquaponics.com</span><br data-dcnode-id="4728"><span data-dcnode-id="4727" instrument_node="">f The IBC of Aquaponics                                         Mantis’s System</span></p><p data-dcnode-id="4725"></p><h2 data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node=""> Second growbed being set up</span></h2><p data-dcnode-id="4722"></p><p data-dcnode-id="4721"></p><h2 data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">                                                                     Sump tank finally in it’s hole</span></h2><p data-dcnode-id="4718"></p><p data-dcnode-id="4714"><span data-dcnode-id="4717" instrument_node=""> IBC’s are painted not only to look nice but also to stop UV</span><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node=""> degradation of the plastic</span></p><p data-dcnode-id="4710"><span data-dcnode-id="4713" instrument_node=""> The steel base of the IBC cage is not required when              Pump set up ready to go</span><br data-dcnode-id="4712"><span data-dcnode-id="4711" instrument_node=""> burying</span></p><p data-dcnode-id="4706"><span data-dcnode-id="4709" instrument_node="">111  www.backyardaquaponics.com</span><br data-dcnode-id="4708"><span data-dcnode-id="4707" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="4702"><span data-dcnode-id="4705" instrument_node="">                 AQUAPONICS</span><br data-dcnode-id="4704"><span data-dcnode-id="4703" instrument_node="">                  Not just for vegetables</span></p><p data-dcnode-id="4698"><span data-dcnode-id="4701" instrument_node="">112  www.backyardaquaponics.com</span><br data-dcnode-id="4700"><span data-dcnode-id="4699" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4697" instrument_node="">                                                                  Joey’s</span><br data-dcnode-id="4696"><span data-dcnode-id="4695" instrument_node="">                                                                IBC system</span><br data-dcnode-id="4694"><span data-dcnode-id="4693" instrument_node="">                                                          J</span><br data-dcnode-id="4692"><span data-dcnode-id="4691" instrument_node="">                                                               oey’s IBC system has a 1000 litre IBC partially buried</span><br data-dcnode-id="4690"><span data-dcnode-id="4689" instrument_node="">                                                               under the fish tank and offset so that he can put a step</span><br data-dcnode-id="4688"><span data-dcnode-id="4687" instrument_node="">                                                               on top of it to gain easy access to the fish tank.</span></p><p data-dcnode-id="4685"></p><h2 data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">                                                              The growbed is 2.5‘ x 11’ which is just over 200 gallons</span></h2><br data-dcnode-id="4682"><span data-dcnode-id="4681" instrument_node="">                                                          and made from ¾” ply and lined with black plastic liner. 2 x</span><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">And so it begins                                          4 timbers are used around the whole frame and then screwed</span><br data-dcnode-id="4678"><span data-dcnode-id="4677" instrument_node="">                                                          together with 4 1/2” strong tie tags, about 60 of them in total.</span><p data-dcnode-id="4676"></p><p data-dcnode-id="4675"></p><h2 data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">                                                              A 1hp pump was used initially to deliver water from the</span></h2><br data-dcnode-id="4672"><span data-dcnode-id="4671" instrument_node="">                                                          bottom IBC to the top IBC which in turn overflows through a</span><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">                                                          4” pipe to the growbed. The bed fills in around 10 minutes</span><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">                                                          and the water then drains out of the growbed in around 10</span><br data-dcnode-id="4666"><span data-dcnode-id="4665" instrument_node="">                                                          minutes, through small holes and back to the sump tank. A</span><br data-dcnode-id="4664"><span data-dcnode-id="4663" instrument_node="">                                                          ball valve in the bottom of the growbed allows for adjustment</span><br data-dcnode-id="4662"><span data-dcnode-id="4661" instrument_node="">                                                          in the system. The system then had a greenhouse frame</span><br data-dcnode-id="4660"><span data-dcnode-id="4659" instrument_node="">                                                          constructed with clear plastic to protect against pests and</span><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">                                                          extreme weather conditions. Though Joey found that when</span><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">                                                          a storm blew the roof off and the plants became exposed</span><br data-dcnode-id="4654"><span data-dcnode-id="4653" instrument_node="">                                                          they started to grow much better. Some of the growth had</span><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node="">                                                          been quite leggy indicating they were not getting the sunlight</span><br data-dcnode-id="4650"><span data-dcnode-id="4649" instrument_node="">                                                          they needed for optimum growth. Additions are planned for</span><br data-dcnode-id="4648"><span data-dcnode-id="4647" instrument_node="">                                                          the system in the form of NFT channels as well as another</span><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">                                                          growbed. Aquaponic systems are often expanded or second</span><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">                                                          systems begin evolving, sometimes even before the first ones</span><br data-dcnode-id="4642"><span data-dcnode-id="4641" instrument_node="">                                                          are complete.</span><p data-dcnode-id="4640"></p><p data-dcnode-id="4639"></p><h2 data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node=""> Simple standpipe with surround acting as a media guard</span></h2><p data-dcnode-id="4636"></p><p data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node=""> Design Layout</span></p><p data-dcnode-id="4630"><span data-dcnode-id="4633" instrument_node="">113  www.backyardaquaponics.com</span><br data-dcnode-id="4632"><span data-dcnode-id="4631" instrument_node="">f     The IBC of Aquaponics                                     Joey’s System</span></p><p data-dcnode-id="4629"></p><h2 data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">Here is a new input pip</span></h2><br data-dcnode-id="4626"><span data-dcnode-id="4625" instrument_node="">tank as we felt having e from the sump tank to the fish</span><br data-dcnode-id="4624"><span data-dcnode-id="4623" instrument_node="">things up enough       just the 90 at the end did</span><br data-dcnode-id="4622"><span data-dcnode-id="4621" instrument_node="">                                                 n’t stir</span><p data-dcnode-id="4620"></p><p data-dcnode-id="4616"><span data-dcnode-id="4619" instrument_node="">      Pumping from the sump tank into the bed with the giant</span><br data-dcnode-id="4618"><span data-dcnode-id="4617" instrument_node="">      pump</span></p><p data-dcnode-id="4615"></p><h2 data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">      When I was standing waist deep in the hole I was</span></h2><br data-dcnode-id="4612"><span data-dcnode-id="4611" instrument_node="">      beginning to wonder if I’d lost my mind. The wife</span><br data-dcnode-id="4610"><span data-dcnode-id="4609" instrument_node="">      questioned my sanity when I was inside the IBC in my        Testing the waters</span><br data-dcnode-id="4608"><span data-dcnode-id="4607" instrument_node="">      swimming trunks with assorted scrub brushes and soaps</span><p data-dcnode-id="4606"></p><p data-dcnode-id="4602"><span data-dcnode-id="4605" instrument_node="">   114  www.backyardaquaponics.com</span><br data-dcnode-id="4604"><span data-dcnode-id="4603" instrument_node="">f The IBC of Aquaponics                                    Joey’s System</span></p><p data-dcnode-id="4601"></p><h2 data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node=""> Carrots transplanted in to the growbeds</span></h2><p data-dcnode-id="4598"></p><p data-dcnode-id="4597"></p><h2 data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">                                                            The biggest tomato pla</span></h2><br data-dcnode-id="4594"><span data-dcnode-id="4593" instrument_node="">                                                            blossoms or fruit      nt, looking very viney wit</span><br data-dcnode-id="4592"><span data-dcnode-id="4591" instrument_node="">                                                                                                              h no</span><p data-dcnode-id="4590"></p><p data-dcnode-id="4589"></p><h2 data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node=""> Looking down the growbed the basil has perked up a bit</span></h2><p data-dcnode-id="4586"></p><p data-dcnode-id="4585"></p><h2 data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node=""> Some rather spindly looking squash and zucchini</span></h2><p data-dcnode-id="4582"></p><p data-dcnode-id="4578"><span data-dcnode-id="4581" instrument_node="">115  www.backyardaquaponics.com</span><br data-dcnode-id="4580"><span data-dcnode-id="4579" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4577" instrument_node="">                                  Quachy’s</span><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">                                   IBC system</span><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">                                  A</span><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">                                          fter the success of Quachys first concept system</span><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">                                          he decided that it was time to get serious with his</span><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">                                          second system, now that he had seen for himself that</span><br data-dcnode-id="4566"><span data-dcnode-id="4565" instrument_node="">                                  aquaponics really works. He set out with 4 IBCs and decided</span><br data-dcnode-id="4564"><span data-dcnode-id="4563" instrument_node="">                                  on the popular CHIFT PIST method. This allows the water to</span><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">                                  remain at a constant height in the 3 IBC’s that would serve as</span><br data-dcnode-id="4560"><span data-dcnode-id="4559" instrument_node="">                                  fish tanks and the fourth IBC acts as a sump tank. The sump</span><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">                                  tank is dug in to the ground and a hatched deck has been</span><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">                                  created over the top and hinged for easy access to the tank</span><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">                                  below. Drain pipes are covered making it a very neat system.</span><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">                                  The fish tanks have been screened with bamboo fencing to</span><br data-dcnode-id="4550"><span data-dcnode-id="4549" instrument_node="">Beetroot                          keep out the sunlight and stop algae growing.</span></p><p data-dcnode-id="4547"></p><h2 data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">                                      The benefit of having separate tanks include having</span></h2><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">                                  different species of fish as well as being able to grade fish by</span><br data-dcnode-id="4542"><span data-dcnode-id="4541" instrument_node="">                                  size, essential with some species. The original system can be</span><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">                                  used as a nursery for fingerlings or as a hospital tank.</span><p data-dcnode-id="4538"></p><p data-dcnode-id="4528"><span data-dcnode-id="4537" instrument_node="">                                       The growbeds were made from 500 litre stock troughs and</span><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">                                  filled with gravel, donated by a friend. Quachy’s aim was to</span><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">                                  have a ratio of one to one, so for every litre of water he would</span><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">                                  have a litre of growbed medium as his biofilter. 3000 litres of</span><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node="">                                  fish tank water and 3000 litres of growbed medium.</span></p><p data-dcnode-id="4527"></p><h2 data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">                                      For Quachy the progression to Aquaponics from a</span></h2><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">                                  traditional dirt garden was very easy as both he and his</span><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">                                  wife are keen organic gardeners. He joined the Backyard</span><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">                                  Aquaponics forum after doing a quick search on the web</span><br data-dcnode-id="4518"><span data-dcnode-id="4517" instrument_node="">                                  and spent hours upon hours of reading and designing before</span><br data-dcnode-id="4516"><span data-dcnode-id="4515" instrument_node="">                                  posting pictures and sharing the progress of his successes</span><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">                                  with other forum members. He says “being able to provide fish</span><br data-dcnode-id="4512"><span data-dcnode-id="4511" instrument_node="">                                  for the family were added bonuses to the masses of fruit and</span><br data-dcnode-id="4510"><span data-dcnode-id="4509" instrument_node="">                                  vegies aquaponics can and does produce.”</span><p data-dcnode-id="4508"></p><p data-dcnode-id="4507"></p><h2 data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node=""> Healthy crop of tomatoes           Garnished and ready for steaming</span></h2><p data-dcnode-id="4504"></p><p data-dcnode-id="4500"><span data-dcnode-id="4503" instrument_node="">116  www.backyardaquaponics.com</span><br data-dcnode-id="4502"><span data-dcnode-id="4501" instrument_node="">f The IBC of Aquaponics                Quachy’s System</span></p><p data-dcnode-id="4499"></p><h2 data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">                             Download 3D Google Sketchup</span></h2><p data-dcnode-id="4496"></p><p data-dcnode-id="4495"></p><h2 data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node=""> It is only the beginning</span></h2><p data-dcnode-id="4492"></p><p data-dcnode-id="4488"><span data-dcnode-id="4491" instrument_node="">117  www.backyardaquaponics.com</span><br data-dcnode-id="4490"><span data-dcnode-id="4489" instrument_node="">f The IBC of Aquaponics                                     Quachy’s System</span></p><p data-dcnode-id="4487"></p><h2 data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">                                                             Decking is hinged and can be accessed when required</s >tank will overflow through a 50mm pvc pipe on to the growbed</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">via gravity feed and then from growbed to sump tank.</span></p><p data-dcnode-id="4391"></p><h2 data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">    The bath tubs are metal and have been thoroughly</span></h2><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">checked over for any signs of damage due to leaching and the</span><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">risk to fish. The volume that each bathtub can hold is around</span><br data-dcnode-id="4384"><span data-dcnode-id="4383" instrument_node="">600 litres of media, which in this case will be a course gravel.</span><br data-dcnode-id="4382"><span data-dcnode-id="4381" instrument_node="">The water level in the bed has been managed with a simple</span><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">standpipe and surround acting as a media guard. Water flow is</span><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">adjusted at each of the beds using ball valves.</span><p data-dcnode-id="4376"></p><p data-dcnode-id="4375"></p><h2 data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">   The channels were originally plumbed with 19mm and</span></h2><p data-dcnode-id="4372"></p><p data-dcnode-id="4368"><span data-dcnode-id="4371" instrument_node="">                                                                     Download 3D</span><br data-dcnode-id="4370"><span data-dcnode-id="4369" instrument_node="">                                                                     Google Sketchup</span></p><p data-dcnode-id="4367"></p><h2 data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">  Garlic and brassicas                                               Celery stalks covered and growing well</span></h2><p data-dcnode-id="4364"></ ="4259" instrument_node="">one you buy. Say you have a 4 port valve, one inlet, and four        the 2000L fish tank.</span><br data-dcnode-id="4258"><span data-dcnode-id="4257" instrument_node="">outlets. When you turn the pump on, water will flow out of port</span><br data-dcnode-id="4256"><span data-dcnode-id="4255" instrument_node="">1, then when you turn the pump off then on again it will stop           As you can see from the plans, this system is still going to</span><br data-dcnode-id="4254"><span data-dcnode-id="4253" instrument_node="">coming out of port 1 and come out of port 2, then when you           be added to over time. At the moment, a third zone is planned</span><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">turn it off and on again water will flow out of port 3. Then port    with 1 additional complete IBC and 4 blue barrels filled with</span><br data-dcnode-id="4250"><span data-dcnode-id="4249" instrument_node="">4 and then back to port 1. This sort of device allows you to         blue metal rock media. To get the latest updates, get online</span><br data-dcnode-id="4248"><span data-dcnode-id="4247" instrument_node="">have many growbeds and by switching the pump off and on              and check out the latest posts on Ivan’s third system.</span><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">you can water different growbeds sequentially rather than all</span><br data-dcnode-id="4244"><span data-dcnode-id="4243" instrument_node="">at once. Of course, a timer or similar is used to continuously</span><br data-dcnode-id="4242"><span data-dcnode-id="4241" instrument_node="">cycle the pump off and on. But back to Ivan’s system.</span><p data-dcnode-id="4240"></p><p data-dcnode-id="4239"></p><h2 data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">   In the first zone (port 1) water is pumped into two complete</span></h2><br data-dcnode-id="4236"><span data-dcnode-id="4235" instrument_node="">IBC’s that act as very deep growbeds, filled with blue metal</span><p data-dcnode-id="4234"></p><p data-dcnode-id="4230"><span data-dcnode-id="4233" instrument_node="">    The whole IBC growbed is filled with crushed granite               Peaches starting to ripen on the dwarf peach tree in half</span><br data-dcnode-id="4232"><span data-dcnode-id="4231" instrument_node="">    media                                                              barrel</span></p><p data-dcnode-id="4229"></p><h2 data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">                                              Download 3D Google Sketchup</span></h2><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">127  www.backyardaquaponics.com</span><br data-dcnode-id="4224"><span data-dcnode-id="4223" instrument_node="">f   The IBC of Aquaponics                  Ivansng’s System</span><p data-dcnode-id="4222"></p><p data-dcnode-id="4221"></p><h2 data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Super long standpipe and</span></h2><br data-dcnode-id="4218"><span data-dcnode-id="4217" instrument_node="">standpipe surround</span><p data-dcnode-id="4216"></p><p data-dcnode-id="4215"></p><h2 data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">    Tank cover over the 2000L fish tank</span></h2><p data-dcnode-id="4212"></p><p data-dcnode-id="4208"><span data-dcnode-id="4211" instrument_node=""> 128  www.backyardaquaponics.com</span><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">f The IBC of Aquaponics                                  Ivansng’s System</span></p><p data-dcnode-id="4207"></p><h2 data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">             Dwarf peach tree producing a strong crop</span></h2><p data-dcnode-id="4204"></p><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node=""> PVC greenhouse frame in place                             Dwarf lime tree planted in half barrel</span></p><p data-dcnode-id="4198"><span data-dcnode-id="4201" instrument_node="">129  www.backyardaquaponics.com</span><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="4170"><span data-dcnode-id="4197" instrument_node="">                        Skygazer’s</span><br data-dcnode-id="4196"><span data-dcnode-id="4195" instrument_node="">                            IBC system</span><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">                                  S</span><br data-dcnode-id="4192"><span data-dcnode-id="4191" instrument_node="">                                           kygazer has created a classic recycled system here</span><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">                                           using lots of different recycled materials. The IBC is the</span><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">                                           fish tank, then there’s two bath tubs for growbeds, and</span><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">                                  finally a recycled wheelie bin for a drain tank. Because of the</span><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node="">                                  slope in the land and the way the system was laid out against</span><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">                                  the house , there is one pump in the fish tank with a timer</span><br data-dcnode-id="4180"><span data-dcnode-id="4179" instrument_node="">                                  on it pumping into the bathtub growbeds. The growbeds then</span><br data-dcnode-id="4178"><span data-dcnode-id="4177" instrument_node="">                                  drain into a partially buried wheelie bin, under the house just</span><br data-dcnode-id="4176"><span data-dcnode-id="4175" instrument_node="">                                  behind the steps. This wheelie bin sump has a sump pump in</span><br data-dcnode-id="4174"><span data-dcnode-id="4173" instrument_node="">                                  it with a float switch, this allows the water to be pumped back</span><br data-dcnode-id="4172"><span data-dcnode-id="4171" instrument_node="">                                  to the IBC automatically.</span></p><p data-dcnode-id="4169"></p><h2 data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">                                      The pump in the fish tank is only 1000L/hour, while the</span></h2><br data-dcnode-id="4166"><span data-dcnode-id="4165" instrument_node="">                                  sump pump in the sump tank is about 7000L/hour. The pump</span><br data-dcnode-id="4164"><span data-dcnode-id="4163" instrument_node="">                                  in the fish tank only runs for 30 minutes, then it’s off for 30</span><br data-dcnode-id="4162"><span data-dcnode-id="4161" instrument_node="">                                  minutes giving time for the beds to drain. Then of course the</span><br data-dcnode-id="4160"><span data-dcnode-id="4159" instrument_node="">                                  pump in the sump only turns on with its float switch, being</span><br data-dcnode-id="4158"><span data-dcnode-id="4157" instrument_node="">                                  7000L/hour it doesn’t stay on for long when it pumps back to</span><br data-dcnode-id="4156"><span data-dcnode-id="4155" instrument_node=""> Week two growth                  the fish tank. Originally the system was only stocked with half</span><br data-dcnode-id="4154"><span data-dcnode-id="4153" instrument_node="">                                  a dozen goldfish to cycle the system, once things were running</span><br data-dcnode-id="4152"><span data-dcnode-id="4151" instrument_node="">                                  well, 20 Silver Perch were stocked into the IBC fish tank.</span><p data-dcnode-id="4150"></p><p data-dcnode-id="4149"></p><h2 data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">                                     Use of bathtubs for growbeds was quite handy because</span></h2><br data-dcnode-id="4146"><span data-dcnode-id="4145" instrument_node="">                                  they have built in drain fittings. To make it a little more</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">                                  aesthetically pleasing one of the growbeds has been</span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">                                  surrounded with timber. Ultimately the plan is to cover the</span><br data-dcnode-id="4140"><span data-dcnode-id="4139" instrument_node="">                                  other growbed with timber as well so that it blends in with the</span><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">                                  house. This system was a proof of concept for Skygazer to try</span><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node="">                                  out aquaponics on a small cheap scale before advancing to a</span><br data-dcnode-id="4134"><span data-dcnode-id="4133" instrument_node="">                                  much larger system.</span><p data-dcnode-id="4132"></p><p data-dcnode-id="4131"></p><h2 data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node=""> IBC fish tank                      Timber surround on the fish tank</span></h2><p data-dcnode-id="4128"></p><p data-dcnode-id="4124"><span data-dcnode-id="4127" instrument_node="">130  www.backyardaquaponics.com</span><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">f The IBC of Aquaponics                                      Skygazer’s System</span></p><p data-dcnode-id="4123"></p><h2 data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node=""> Second bathtub grow bed has been added to the system</span></h2><p data-dcnode-id="4120"></p><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node=""> Timber slats around the bathtub to help it blend in           Netting placed around plants to protect them</span></p><p data-dcnode-id="4114"><span data-dcnode-id="4117" instrument_node=""> Silver perch were added to the system once it was cycled      Great crop in second tub</span><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node=""> with goldfish</span></p><p data-dcnode-id="4110"><span data-dcnode-id="4113" instrument_node="">131  www.backyardaquaponics.com</span><br data-dcnode-id="4112"><span data-dcnode-id="4111" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="4090"><span data-dcnode-id="4109" instrument_node="">                             Alosthippy’s</span><br data-dcnode-id="4108"><span data-dcnode-id="4107" instrument_node="">                                  IBC system</span><br data-dcnode-id="4106"><span data-dcnode-id="4105" instrument_node="">                                  T</span><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">                                         he lost hippy just goes to show how cheaply and easily</span><br data-dcnode-id="4102"><span data-dcnode-id="4101" instrument_node="">                                         you can start an aquaponics system using readily</span><br data-dcnode-id="4100"><span data-dcnode-id="4099" instrument_node="">                                         available items that others are throwing away. In his own</span><br data-dcnode-id="4098"><span data-dcnode-id="4097" instrument_node="">                                  words “I went for a gleaning day through the local industrial</span><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">                                  area and got more 44 gallon drums that I needed, some wheel</span><br data-dcnode-id="4094"><span data-dcnode-id="4093" instrument_node="">                                  rims, 2 beds, pallets etc! The only thing getting in the way now</span><br data-dcnode-id="4092"><span data-dcnode-id="4091" instrument_node="">                                  is work.”</span></p><p data-dcnode-id="4089"></p><h2 data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">                                      To be able to work with the 24 degree slope of his land the</span></h2><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">                                  drums were dug in before being filled with water to keep them</span><br data-dcnode-id="4084"><span data-dcnode-id="4083" instrument_node="">                                  in place. Pallets were placed above them to create a base for</span><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">                                  the top third of an IBC that he was going to use as a growbed.</span><br data-dcnode-id="4080"><span data-dcnode-id="4079" instrument_node="">                                  Other growbeds included 160 litre black plastic tubs from</span><br data-dcnode-id="4078"><span data-dcnode-id="4077" instrument_node="">                                  Bunnings, the national hardware chain store, and preloved</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">                                  bath tubs. Many of the plumbing components came from</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">                                  demolition yards and the local hardware store. He confesses</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">                                  that he has spent countless hours reading the Backyard</span><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">                                  Aquaponics forum and asking numerous questions.</span><p data-dcnode-id="4068"></p><p data-dcnode-id="4067"></p><h2 data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">                                       The growbeds are filled with a course gravel medium which</span></h2><br data-dcnode-id="4064"><span data-dcnode-id="4063" instrument_node=""> Fish tank                        is irrigated from the fish tank along pvc pipes which then change</span><br data-dcnode-id="4062"><span data-dcnode-id="4061" instrument_node="">                                  to a black poly pipe. An inline tap is fitted and water is then</span><br data-dcnode-id="4060"><span data-dcnode-id="4059" instrument_node="">                                  diverted to each of the growbeds, where it drains with the help of</span><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">                                  a siphon. A siphon system relies on a certain level of water being</span><br data-dcnode-id="4056"><span data-dcnode-id="4055" instrument_node="">                                  in the system. Water levels must be kept up to allow the siphons</span><br data-dcnode-id="4054"><span data-dcnode-id="4053" instrument_node="">                                  to run, if the level drops the siphons are unable to operate.</span><br data-dcnode-id="4052"><span data-dcnode-id="4051" instrument_node="">                                  Fortunately he installed a diversion pipe back to the sump which</span><br data-dcnode-id="4050"><span data-dcnode-id="4049" instrument_node="">                                  means if the siphons failed to trigger the pump would still be</span><br data-dcnode-id="4048"><span data-dcnode-id="4047" instrument_node="">                                  moving water and wouldn’t pump dry. One bucket of water can</span><br data-dcnode-id="4046"><span data-dcnode-id="4045" instrument_node="">                                  make all the difference and when added to the system is all that</span><br data-dcnode-id="4044"><span data-dcnode-id="4043" instrument_node="">                                  was required to trigger the siphons and away it goes again. This</span><br data-dcnode-id="4042"><span data-dcnode-id="4041" instrument_node="">                                  can become a problem in areas that are both hot and dry and</span><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">                                  prone to high evaporation rates.</span><p data-dcnode-id="4038"></p><p data-dcnode-id="4037"></p><h2 data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node=""> IBC cut to make a growbed          View along the outflow</span></h2><p data-dcnode-id="4034"></p><p data-dcnode-id="4030"><span data-dcnode-id="4033" instrument_node="">132  www.backyardaquaponics.com</span><br data-dcnode-id="4032"><span data-dcnode-id="4031" instrument_node="">f The IBC of Aquaponics                                 Alosthippy’s System</span></p><p data-dcnode-id="4026"><span data-dcnode-id="4029" instrument_node=""> Crustaceans make great inhabitants of sump tanks as      PVC offcuts form hidey holes for yabbies and redclaw.</span><br data-dcnode-id="4028"><span data-dcnode-id="4027" instrument_node=""> they help keep the bottom clean</span></p><p data-dcnode-id="4025"></p><h2 data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node=""> One month after planting</span></h2><p data-dcnode-id="4022"></p><p data-dcnode-id="4021"></p><h2 data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node=""> Jim still standing guard                                 The growbed</span></h2><p data-dcnode-id="4018"></p><p data-dcnode-id="4014"><span data-dcnode-id="4017" instrument_node="">133  www.backyardaquaponics.com</span><br data-dcnode-id="4016"><span data-dcnode-id -dcnode-id="3885" instrument_node="">  Blue barrels filled with pea gravel                               tank</span><p data-dcnode-id="3884"></p><p data-dcnode-id="3880"><span data-dcnode-id="3883" instrument_node="">137  www.backyardaquaponics.com</span><br data-dcnode-id="3882"><span data-dcnode-id="3881" instrument_node="">f The IBC of Aquaponics                                      Edroe’s System</span></p><p data-dcnode-id="3879"></p><h2 data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">                                         Download 3D Google Sketchup</span></h2><p data-dcnode-id="3876"></p><p data-dcnode-id="3875"></p><h2 data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node=""> Fish tank showing water return elbowed to create current</span></h2><p data-dcnode-id="3872"></p><p data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node=""> Tank and polypipe returns                                     Sump tank buried and supported in ground</span></p><p data-dcnode-id="3866"><span data-dcnode-id="3869" instrument_node="">138  www.backyardaquaponics.com</span><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node="">f  The IBC of Aquaponics</span></p><p data-dcnode-id="3865"></p><h2 data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Plant some veggies</span></h2><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">You owe it to your kids</span><p data-dcnode-id="3860"></p><p data-dcnode-id="3859"></p><h2 data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">                                   Backyard                                Ph: 9414 9334</span></h2><p data-dcnode-id="3856"></p><p data-dcnode-id="3842"><span data-dcnode-id="3855" instrument_node="">                                   Farming</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">                                                                     www.backyardfarming.com.au</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">                                                                   Display centre Cnr Jandakot Rd &amp; Berrigan Dr,</span><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">                                                                         Jandakot Western Australia 6164</span><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">                                   Bringing food production home</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node=""> 139  www.backyardaquaponics.com</span><br data-dcnode-id="3844"><span data-dcnode-id="3843" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="3804"><span data-dcnode-id="3841" instrument_node="">                                                          Edwood’s</span><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">                                                           IBC system</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">                                                          E</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">                                                                  dwood lives on the Mornington Peninsula, not far from</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">                                                                  the coast and believes this is one of the reasons that</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">                                                                  he has been able to keep trout in his system over the</span><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">                                                           summer months. Another factor that he attributes to keeping</span><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">                                                           the water cool is the fact that his fish tank is insulated and the</span><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">                                                           growbeds are buried in the ground. He has an IBC as a sump</span><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">                                                           tank and this is also buried, it provides a home to around 40</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">                                                           yabbies and a few mosquito fish. The fish tank is rectangle in</span><br data-dcnode-id="3820"><span data-dcnode-id="3819" instrument_node="">                                                           shape made from fiberglass, measuring 3 metres in length,</span><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">Structure supports climbing plants                         800mm wide and 800 mm deep. It has a V shape in the</span><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">                                                           bottom with flow holes for added water flow. When the tank</span><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node="">                                                           was set up it was surrounded with insulwool to help maintain</span><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node="">                                                           the temperature. The system is very neat with the majority</span><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">                                                           of the pipe work being out of sight, the irrigation pipes from</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">                                                           the fish tank run along the fence behind the growbeds and</span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">                                                           screened behind a wall of foliage.</span></p><p data-dcnode-id="3803"></p><h2 data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">                                                              This fish tank and sump tank supports 4 growbeds which</span></h2><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">                                                           have been dug in to the ground, four of these measuring 2.1</span><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">                                                           metres 700mm wide and around 300mm deep. These beds</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">                                                           drain in to the sump tank which is where the submersible</span><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">                                                           pump is located. Rock like white marble fills the beds and</span><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">                                                           provide a stable source to anchor the roots of the plants</span><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">                                                           as well as acting as the biofilter in the system. Two of the</span><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">                                                           beds are operated by auto siphons, while the other two are</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">                                                           constantly filled with water. A structure was erected to train</span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">                                                           plants like tomatoes allowing for vertical growth. The tomato</span><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">                                                           plants are doing very well being constantly flooded, however</span><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node=""> Growbeds installed at ground level and all drain pipes    the capsicum plants seem to prefer better drainage.</span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node=""> buried. Irrigation line runs along the fence behind</span><p data-dcnode-id="3776"></p><p data-dcnode-id="3772"><span data-dcnode-id="3775" instrument_node=""> Hinged fish tank cover keeps out sun and protects fish      Buried IBC with childproof cover</span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node=""> from predators</span></p><p data-dcnode-id="3768"><span data-dcnode-id="3771" instrument_node="">140  www.backyardaquaponics.com</span><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">f The IBC of Aquaponics                                        Edwood’s System</span></p><p data-dcnode-id="3767"></p><h2 data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node=""> Vertical gardens hide an old shed                              Rainbow trout fingerlings</span></h2><p data-dcnode-id="3764"></p><p data-dcnode-id="3763"></p><h2 data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node=""> Summer fruits such as tomatoes make use of vertical spaces</span></h2><p data-dcnode-id="3760"></p><p data-dcnode-id="3759"></p><h2 data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node=""> View of growbeds and IBC sump tank                             Rainbow trout</span></h2><p data-dcnode-id="3756"></p><p data-dcnode-id="3752"><span data-dcnode-id="3755" instrument_node="">141  www.backyardaquaponics.com</span><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="3730"><span data-dcnode-id="3751" instrument_node="">                                      The Native’s</span><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">                                          IBC system</span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">                                                              T</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">                                                                     he Native has created lined ponds in the ground to hold</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">                                                                     a large volume of water for keeping his fish. There are</span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">                                                                     three in total, two hold 400 gallons each and the third</span><br data-dcnode-id="3740"><span data-dcnode-id="3739" instrument_node="">                                                              is around 350 gallons. Originally he had created a ledge and</span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">                                                              one pond was higher, overflowing to the next. He realised that</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">                                                              he could almost double the size by removing the steps in the</span><br data-dcnode-id="3734"><span data-dcnode-id="3733" instrument_node="">                                                              pond and they could overflow between them if the ponds were</span><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">                                                              at the same height.</span></p><p data-dcnode-id="3729"></p><h2 data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">                                                                  IBC s created ideal growbeds when they were cut in half,</span></h2><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node="">                                                              each having a depth of around 500mm. He started off with</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">                                                              gravel but in time made some renovations, which included</span><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node="">                                                              changing over to ¾” black lava rock or scoria. The Native says</span><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node="">                                                              that it is has more benefits than the gravel as it is cheaper,</span><br data-dcnode-id="3718"><span data-dcnode-id="3717" instrument_node="">                                                              lightweight - therefore easier to shovel, it hasn’t affected</span><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">Renovation in progress                                        the pH and it has a high porosity making an idea surface for</span><br data-dcnode-id="3714"><span data-dcnode-id="3713" instrument_node="">                                                              beneficial bacteria.</span><p data-dcnode-id="3712"></p><p data-dcnode-id="3711"></p><h2 data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">                                                                  An Affnan bell siphon controls the flood and drain in each</span></h2><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">                                                              of the growbeds, the bell is 4” and the standpipe is 2.5” which</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node="">                                                              reduces to 1.25” as it exits the grow beds. All the growbeds</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">                                                              drain in to 4” drainage pipe which then returns water to the</span><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">                                                              pond. The standpipe is housed in a media guard made of pvc</span><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">                                                              pipe which is 6” in diameter allowing access in the event that</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node="">                                                              the siphon requires any attention. The other end of the bed</span><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node="">                                                              also has a 6” pipe that is a worm feeding station.</span><p data-dcnode-id="3694"></p><p data-dcnode-id="3693"></p><h2 data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">                                                                  The pump used was a 800 GPH (3000lph) probably</span></h2><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">                                                              requiring an upgrade at so
