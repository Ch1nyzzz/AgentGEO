growbeds</span></h2><p data-dcnode-id="6138"></p><p data-dcnode-id="6134"><span data-dcnode-id="6137" instrument_node="">71  www.backyardaquaponics.com</span><br data-dcnode-id="6136"><span data-dcnode-id="6135" instrument_node="">f The IBC of Aquaponics                                            Outbackozzie’s System</span></p><p data-dcnode-id="6133"></p><h2 data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">                                                                     Harvesting some trout</span></h2><p data-dcnode-id="6130"></p><p data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">A nice cabbage</span></p><p data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">  Soil level raised around the growbeds by using old drill rods</span></p><p data-dcnode-id="6122"><span data-dcnode-id="6125" instrument_node="">72  www.backyardaquaponics.com</span><br data-dcnode-id="6124"><span data-dcnode-id="6123" instrument_node="">f The IBC of Aquaponics                 Outbackozzie’s System</span></p><p data-dcnode-id="6121"></p><h2 data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node=""> String supports for climbing plants</span></h2><p data-dcnode-id="6118"></p><p data-dcnode-id="6114"><span data-dcnode-id="6117" instrument_node="">73  www.backyardaquaponics.com</span><br data-dcnode-id="6116"><span data-dcnode-id="6115" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="6102"><span data-dcnode-id="6113" instrument_node="">                                              Struisje’s</span><br data-dcnode-id="6112"><span data-dcnode-id="6111" instrument_node="">                                                IBC system</span><br data-dcnode-id="6110"><span data-dcnode-id="6109" instrument_node="">                                              S</span><br data-dcnode-id="6108"><span data-dcnode-id="6107" instrument_node="">                                                      truisje has built a simple yet interesting robust system</span><br data-dcnode-id="6106"><span data-dcnode-id="6105" instrument_node="">                                                      here. Using 2 IBCs, a couple of heavy duty beams, a</span><br data-dcnode-id="6104"><span data-dcnode-id="6103" instrument_node="">                                                      pallet and some large bricks or cinder blocks.</span></p><p data-dcnode-id="6092"><span data-dcnode-id="6101" instrument_node="">                                                  The fish tank IBC has just had the very top cut off the thin</span><br data-dcnode-id="6100"><span data-dcnode-id="6099" instrument_node="">                                               inner plastic container, leaving maximum depth for lots of water,</span><br data-dcnode-id="6098"><span data-dcnode-id="6097" instrument_node="">                                               and the cage surrounding it was left intact. The growbeds were</span><br data-dcnode-id="6096"><span data-dcnode-id="6095" instrument_node="">                                               another IBC that was cut in half and then trimmed down to be</span><br data-dcnode-id="6094"><span data-dcnode-id="6093" instrument_node="">                                               about 35cm each in height for the two growbeds.</span></p><p data-dcnode-id="6086"><span data-dcnode-id="6091" instrument_node="">                                                   Struisje was hoping to bury the fish tank at least half way</span><br data-dcnode-id="6090"><span data-dcnode-id="6089" instrument_node="">                                               into the ground but when digging the hole he ran into some</span><br data-dcnode-id="6088"><span data-dcnode-id="6087" instrument_node="">                                               buried foundations, so it’s only about 1/3 buried.</span></p><p data-dcnode-id="6085"></p><h2 data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">                                                   A small cinderblock wall was then created just over 1</span></h2><br data-dcnode-id="6082"><span data-dcnode-id="6081" instrument_node="">                                               metre away from the fish tank, this was to act as growbed</span><br data-dcnode-id="6080"><span data-dcnode-id="6079" instrument_node="">                                               support, while at the other end, the fish tank frame would act</span><br data-dcnode-id="6078"><span data-dcnode-id="6077" instrument_node="">                                               as the support.</span><br data-dcnode-id="6076"><span data-dcnode-id="6075" instrument_node=""> Two weeks growth</span><br data-dcnode-id="6074"><span data-dcnode-id="6073" instrument_node="">                                                  Two heavy planks have been placed across the fish tank</span><br data-dcnode-id="6072"><span data-dcnode-id="6071" instrument_node="">                                               and onto the cinder blocks at the other end, a pallet has then</span><br data-dcnode-id="6070"><span data-dcnode-id="6069" instrument_node="">                                               been placed on the planks, this pallet ensures that there’s</span><br data-dcnode-id="6068"><span data-dcnode-id="6067" instrument_node=""> Harvest fresh                                 greater support covering the whole base of the growbed.</span><p data-dcnode-id="6066"></p><p data-dcnode-id="6056"><span data-dcnode-id="6065" instrument_node=""> food everyday                                    A three thousand litre pump has been placed into the fish</span><br data-dcnode-id="6064"><span data-dcnode-id="6063" instrument_node="">                                               tank, from here water is pumped up to both growbeds, the</span><br data-dcnode-id="6062"><span data-dcnode-id="6061" instrument_node=""> for your family                               growbeds are filled with expanded clay and autosiphons have</span><br data-dcnode-id="6060"><span data-dcnode-id="6059" instrument_node="">                                               been installed to flood and drain the individual beds with a</span><br data-dcnode-id="6058"><span data-dcnode-id="6057" instrument_node="">                                               continuously running 3000L/h pump.</span></p><p data-dcnode-id="6055"></p><h2 data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">                                                   Struisje has built a nice little greenhouse to cover both of</span></h2><br data-dcnode-id="6052"><span data-dcnode-id="6051" instrument_node="">                                               the growbeds, very handy thing to have in the cold weather as</span><br data-dcnode-id="6050"><span data-dcnode-id="6049" instrument_node="">                                               it helps to extent the growing season of many plants.</span><p data-dcnode-id="6048"></p><p data-dcnode-id="6042"><span data-dcnode-id="6047" instrument_node="">             Backyard</span><br data-dcnode-id="6046"><span data-dcnode-id="6045" instrument_node="">             Farming</span><br data-dcnode-id="6044"><span data-dcnode-id="6043" instrument_node="">              Bringing food production home</span></p><p data-dcnode-id="6041"></p><h2 data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">                     Ph: 9414 9334</span></h2><br data-dcnode-id="6038"><span data-dcnode-id="6037" instrument_node="">               www.backyardfarming.com.au        Drainpipe and flexible irrigation pipe in background</span><p data-dcnode-id="6036"></p><p data-dcnode-id="6032"><span data-dcnode-id="6035" instrument_node="">74  www.backyardaquaponics.com</span><br data-dcnode-id="6034"><span data-dcnode-id="6033" instrument_node="">f The IBC of Aquaponics           Struisje’s System</span></p><p data-dcnode-id="6031"></p><h2 data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node=""> A sturdy simple IBC system</span></h2><p data-dcnode-id="6028"></p><p data-dcnode-id="6027"></p><h2 data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node=""> A nice little greenhouse</span></h2><p data-dcnode-id="6024"></p><p data-dcnode-id="6020"><span data-dcnode-id="6023" instrument_node="">75  www.backyardaquaponics.com</span><br data-dcnode-id="6022"><span data-dcnode-id="6021" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5992"><span data-dcnode-id="6019" instrument_node="">                                                  Markcaso’s</span><br data-dcnode-id="6018"><span data-dcnode-id="6017" instrument_node="">                                                     IBC system</span><br data-dcnode-id="6016"><span data-dcnode-id="6015" instrument_node="">                                                            M</span><br data-dcnode-id="6014"><span data-dcnode-id="6013" instrument_node="">                                                                       arkcaso has built a nice simple CHIFT PIST system</span><br data-dcnode-id="6012"><span data-dcnode-id="6011" instrument_node="">                                                                       here from a couple of different types of barrels and</span><br data-dcnode-id="6010"><span data-dcnode-id="6009" instrument_node="">                                                                       an IBC. The IBC acts as a fish tank with only a very</span><br data-dcnode-id="6008"><span data-dcnode-id="6007" instrument_node="">                                                            small hole cut in the top of it for access to the fish. Out from</span><br data-dcnode-id="6006"><span data-dcnode-id="6005" instrument_node="">                                                            the side of the fish tank a 50mm main pipe line runs off to the</span><br data-dcnode-id="6004"><span data-dcnode-id="6003" instrument_node="">                                                            growbeds, Mark has combined a couple of different aquaponic</span><br data-dcnode-id="6002"><span data-dcnode-id="6001" instrument_node="">                                                            methods here, firstly he has 4 half barrels filled with media,</span><br data-dcnode-id="6000"><span data-dcnode-id="5999" instrument_node="">                                                            then a floating raft tank amongst the barrels. The main 50mm</span><br data-dcnode-id="5998"><span data-dcnode-id="5997" instrument_node="">                                                            irrigation line coming from the fish tank runs at the back of</span><br data-dcnode-id="5996"><span data-dcnode-id="5995" instrument_node="">                                                            the growbeds, each growbed has an outlet with a tap from the</span><br data-dcnode-id="5994"><span data-dcnode-id="5993" instrument_node="">                                                            main line to provide water.</span></p><p data-dcnode-id="5991"></p><h2 data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">                                                                The media filled barrels have autosiphons in them for</span></h2><br data-dcnode-id="5988"><span data-dcnode-id="5987" instrument_node="">                                                            flooding and draining, and the drains all run back to a 1/3rd</span><br data-dcnode-id="5986"><span data-dcnode-id="5985" instrument_node="">                                                            buried black plastic drum. This black plastic drum acts as</span><br data-dcnode-id="5984"><span data-dcnode-id="5983" instrument_node="">                                                            the sump and as such houses the 4000L/h pump for the</span><br data-dcnode-id="5982"><span data-dcnode-id="5981" instrument_node="">                                                            system. There is also an overflow from the fish tank back into</span><br data-dcnode-id="5980"><span data-dcnode-id="5979" instrument_node="">                                                            the sump barrel in case of any problems with the water levels</span><br data-dcnode-id="5978"><span data-dcnode-id="5977" instrument_node=""> Download 3D                                                in the tank.</span><br data-dcnode-id="5976"><span data-dcnode-id="5975" instrument_node=""> Google Sketchup</span><p data-dcnode-id="5974"></p><p data-dcnode-id="5973"></p><h2 data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">                                                                  Biofilter added to the system onc</span></h2><br data-dcnode-id="5970"><span data-dcnode-id="5969" instrument_node="">                                                                                                      e it was up and running</span><p data-dcnode-id="5968"></p><p data-dcnode-id="5964"><span data-dcnode-id="5967" instrument_node=""> Two different siphons were tried, one bell siphon with a     The second type of siphon used in this system, an Affnan</span><br data-dcnode-id="5966"><span data-dcnode-id="5965" instrument_node=""> breather hose                                                siphon</span></p><p data-dcnode-id="5960"><span data-dcnode-id="5963" instrument_node="">76  www.backyardaquaponics.com</span><br data-dcnode-id="5962"><span data-dcnode-id="5961" instrument_node="">f      The IBC of Aquaponics                                    Markcaso’s System</span></p><p data-dcnode-id="5959"></p><h2 data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">                                                                    As a later addition to the system Markcaso added a</span></h2><br data-dcnode-id="5956"><span data-dcnode-id="5955" instrument_node="">                                                                separate biofilter off the side of his fish tank, once again this</span><br data-dcnode-id="5954"><span data-dcnode-id="5953" instrument_node="">                                                                is a black plastic barrel, the type with a removable lid as he</span><br data-dcnode-id="5952"><span data-dcnode-id="5951" instrument_node="">                                                                has used for the sump tank of the system. These black barrels</span><br data-dcnode-id="5950"><span data-dcnode-id="5949" instrument_node="">                                                                aren’t much good for cutting in half as a growbed, but having a</span><br data-dcnode-id="5948"><span data-dcnode-id="5947" instrument_node="">                                                                large removable lid makes them ideal for use as biofilters, and</span><br data-dcnode-id="5946"><span data-dcnode-id="5945" instrument_node="">                                                                sumps. One interesting feature that Markcaso has obviously</span><br data-dcnode-id="5944"><span data-dcnode-id="5943" instrument_node="">                                                                thought about with this system is a pump out point. In the</span><br data-dcnode-id="5942"><span data-dcnode-id="5941" instrument_node="">Early testing of the system before filling the beds with</span><br data-dcnode-id="5940"><span data-dcnode-id="5939" instrument_node="">media                                                           main pump line from the sump tank up into the fish tank he’s</span><br data-dcnode-id="5938"><span data-dcnode-id="5937" instrument_node="">                                                                included a T with a valve off to the side. This means that he</span><br data-dcnode-id="5936"><span data-dcnode-id="5935" instrument_node="">                                                                can attach a hose and open the valve, pumping water out of</span><br data-dcnode-id="5934"><span data-dcnode-id="5933" instrument_node="">                                                                the system into the garden if required.</span><p data-dcnode-id="5932"></p><p data-dcnode-id="5926"><span data-dcnode-id="5931" instrument_node="">                                                                   The system was stocked with Tilapia and has been very</span><br data-dcnode-id="5930"><span data-dcnode-id="5929" instrument_node="">                                                                productive with both fish production and vegetables as you’ll</span><br data-dcnode-id="5928"><span data-dcnode-id="5927" instrument_node="">                                                                see from the pictures.</span></p><p data-dcnode-id="5922"><span data-dcnode-id="5925" instrument_node="">       Early on plant growth is rather impressive                 Tilapia are nearly always hungry, especially when the</span><br data-dcnode-id="5924"><span data-dcnode-id="5923" instrument_node="">                                                                  water is nice and warm</span></p><p data-dcnode-id="5921"></p><h2 data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">                                                                          Scoria is a media suitable for use in aquaponic systems</span></h2><p data-dcnode-id="5918"></p><p data-dcnode-id="5917"></p><h2 data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">      Floating raft tank ready to go, planted with seedlings</span></h2><p data-dcnode-id="5914"></p><p data-dcnode-id="5910"><span data-dcnode-id="5913" instrument_node="">    77  www.backyardaquaponics.com</span><br data-dcnode-id="5912"><span data-dcnode-id="5911" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5888"><span data-dcnode-id="5909" instrument_node="">                                                                 Boris’s</span><br data-dcnode-id="5908"><span data-dcnode-id="5907" instrument_node="">                                                               IBC system</span><br data-dcnode-id="5906"><span data-dcnode-id="5905" instrument_node="">                                                         B</span><br data-dcnode-id="5904"><span data-dcnode-id="5903" instrument_node="">                                                                 oris started with a 1250 litre IBC and plans to expand,</span><br data-dcnode-id="5902"><span data-dcnode-id="5901" instrument_node="">                                                                 which is most often the case when ones starts down</span><br data-dcnode-id="5900"><span data-dcnode-id="5899" instrument_node="">                                                                 the aquaponics path. After designing a custom fish</span><br data-dcnode-id="5898"><span data-dcnode-id="5897" instrument_node="">                                                         tank that he built himself from bricks and mortar, he used cut</span><br data-dcnode-id="5896"><span data-dcnode-id="5895" instrument_node="">                                                         down IBCs as growbeds to provide a shelter over the rectangle</span><br data-dcnode-id="5894"><span data-dcnode-id="5893" instrument_node="">                                                         shaped brick fish tank. The growbeds provide some protection</span><br data-dcnode-id="5892"><span data-dcnode-id="5891" instrument_node="">                                                         for the fish as well as proving shelter for rabbit pens he</span><br data-dcnode-id="5890"><span data-dcnode-id="5889" instrument_node="">                                                         planned on adding later.</span></p><p data-dcnode-id="5887"></p><h2 data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">                                                            The system utilises the back wall of a courtyard and Boris</span></h2><br data-dcnode-id="5884"><span data-dcnode-id="5883" instrument_node="">                                                         aims to clad the IBC’s with wood to give the system artistic</span><br data-dcnode-id="5882"><span data-dcnode-id="5881" instrument_node="">                                                         appeal.</span><p data-dcnode-id="5880"></p><p data-dcnode-id="5879"></p><h2 data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">                                                             Gravel was used as Boris’s grow media of choice in the</span></h2><br data-dcnode-id="5876"><span data-dcnode-id="5875" instrument_node="">                                                         growbeds and he used square patio tube cut to length to</span><br data-dcnode-id="5874"><span data-dcnode-id="5873" instrument_node="">                                                         support the front of the growbeds as the weight of the media</span><br data-dcnode-id="5872"><span data-dcnode-id="5871" instrument_node="">                                                         is quite substantial, the back of the beds are supported by</span><br data-dcnode-id="5870"><span data-dcnode-id="5869" instrument_node="">                                                         bricks, built in to the fish tank structure. Water is pumped</span><br data-dcnode-id="5868"><span data-dcnode-id="5867" instrument_node=""> IBC growbed                                             from the 2000 litre brick fish tank up to the three growbeds,</span><br data-dcnode-id="5866"><span data-dcnode-id="5865" instrument_node="">                                                         water returning from each of these provides aeration to the</span><br data-dcnode-id="5864"><span data-dcnode-id="5863" instrument_node="">                                                         fish tank below.</span><p data-dcnode-id="5862"></p><p data-dcnode-id="5861"></p><h2 data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">                                                             Initially a wine barrel was designed to hold water or for a</span></h2><br data-dcnode-id="5858"><span data-dcnode-id="5857" instrument_node="">                                                         future deep gravel growbed, however this failed to hold water</span><br data-dcnode-id="5856"><span data-dcnode-id="5855" instrument_node="">                                                         and was later replaced by a 200 litre blue barrel. There is</span><p data-dcnode-id="5854"></p><p data-dcnode-id="5850"><span data-dcnode-id="5853" instrument_node="">                                                           The metal base for the IBC is just deep enough that it can</span><br data-dcnode-id="5852"><span data-dcnode-id="5851" instrument_node=""> Gravel media waiting to be placed in to first growbed     fit a 90 degree outflow pipe</span></p><p data-dcnode-id="5846"><span data-dcnode-id="5849" instrument_node="">78  www.backyardaquaponics.com</span><br data-dcnode-id="5848"><span data-dcnode-id="5847" instrument_node="">f  The IBC of Aquaponics                                          Boris’s System</span></p><p data-dcnode-id="5845"></p><h2 data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">  IBC growbeds supported over custom designed fish tank</span></h2><p data-dcnode-id="5842"></p><p data-dcnode-id="5841"></p><h2 data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">  IBC growbed supported at the back with bricks and at the</span></h2><br data-dcnode-id="5838"><span data-dcnode-id="5837" instrument_node="">  front steel legs were bolted on to provide the support</span><p data-dcnode-id="5836"></p><p data-dcnode-id="5830"><span data-dcnode-id="5835" instrument_node="">another blue barrel at the other end of the system which feeds</span><br data-dcnode-id="5834"><span data-dcnode-id="5833" instrument_node="">a 100 litre raised growbed, which drains back to the blue</span><br data-dcnode-id="5832"><span data-dcnode-id="5831" instrument_node="">barrel and overflows to the main fish tank.</span></p><p data-dcnode-id="5829"></p><h2 data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">   The design is styled on the flood and drain media based</span></h2><br data-dcnode-id="5826"><span data-dcnode-id="5825" instrument_node="">system which operates using a stand pipe. Operating on a</span><br data-dcnode-id="5824"><span data-dcnode-id="5823" instrument_node="">timed cycle, water is pumped up to the growbeds allowing</span><br data-dcnode-id="5822"><span data-dcnode-id="5821" instrument_node="">the water level to rise to about two cms below the surface of</span><br data-dcnode-id="5820"><span data-dcnode-id="5819" instrument_node="">the media, flooding for a short while, before draining back to</span><br data-dcnode-id="5818"><span data-dcnode-id="5817" instrument_node="">the fish tank below. Boris has been an active contributor to</span><br data-dcnode-id="5816"><span data-dcnode-id="5815" instrument_node="">the Backyard Aquaponics forum and hosted a get together to</span><br data-dcnode-id="5814"><span data-dcnode-id="5813" instrument_node="">showcase his system with other likeminded individuals.</span><p data-dcnode-id="5812"></p><p data-dcnode-id="5811"></p><h2 data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">                                                                    Custom designed fish tank in progress</span></h2><p data-dcnode-id="5808"></p><p data-dcnode-id="5804"><span data-dcnode-id="5807" instrument_node="">79  www.backyardaquaponics.com</span><br data-dcnode-id="5806"><span data-dcnode-id="5805" instrument_node="">f The IBC of Aquaponics                                    Boris’s System</span></p><p data-dcnode-id="5803"></p><h2 data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node=""> The plates on the IBC cage are</span></h2><br data-dcnode-id="5800"><span data-dcnode-id="5799" instrument_node=""> the perfect size to use as lids for</span><br data-dcnode-id="5798"><span data-dcnode-id="5797" instrument_node=""> the two ends of the pond                                                      Design showing the IBC growbeds and</span><br data-dcnode-id="5796"><span data-dcnode-id="5795" instrument_node="">                                                                               layout of the custom built fish tank.</span><p data-dcnode-id="5794"></p><p data-dcnode-id="5793"></p><h2 data-dcnode-id="5791"><span data-dcnode-id="5792" instrument_node="">                                                                Water is pumped up the black growbed positioned</span></h2><br data-dcnode-id="5790"><span data-dcnode-id="5789" instrument_node="">                                                                above, returns to the blue barrel as shown here and</span><br data-dcnode-id="5788"><span data-dcnode-id="5787" instrument_node="">                                                                overflows to the main fish tank.</span><p data-dcnode-id="5786"></p><p data-dcnode-id="5785"></p><h2 data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node=""> Square patio tubing supports the front of the growbeds</span></h2><p data-dcnode-id="5782"></p><p data-dcnode-id="5781"></p><h2 data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">                                                             Originally a wine barrel was used here to hold water but</span></h2><br data-dcnode-id="5778"><span data-dcnode-id="5777" instrument_node=""> Timber cladding brings style to the humble IBC              leaked and had to be replaced</span><p data-dcnode-id="5776"></p><p data-dcnode-id="5772"><span data-dcnode-id="5775" instrument_node="">80  www.backyardaquaponics.com</span><br data-dcnode-id="5774"><span data-dcnode-id="5773" instrument_node="">f The IBC of Aquaponics                                      Boris’s System</span></p><p data-dcnode-id="5771"></p><h2 data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node=""> Rainbow trout on the barbecue. A very satisfying harvest</span></h2><p data-dcnode-id="5768"></p><p data-dcnode-id="5767"></p><h2 data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node=""> Rabbit hutches are shown here in the shade of the</span></h2><br data-dcnode-id="5764"><span data-dcnode-id="5763" instrument_node=""> growbed and are a great way to utilise the space              100 litre growbed filled with expanded clay fills from</span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node=""> underneath                                                    pump in a blue barrel</span><p data-dcnode-id="5760"></p><p data-dcnode-id="5756"><span data-dcnode-id="5759" instrument_node="">81  www.backyardaquaponics.com</span><br data-dcnode-id="5758"><span data-dcnode-id="5757" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5730"><span data-dcnode-id="5755" instrument_node="">                                                      Snake’s</span><br data-dcnode-id="5754"><span data-dcnode-id="5753" instrument_node="">                                                      IBC system</span><br data-dcnode-id="5752"><span data-dcnode-id="5751" instrument_node="">                                                T</span><br data-dcnode-id="5750"><span data-dcnode-id="5749" instrument_node="">                                                       wo stainless steel milk tanks had been given to</span><br data-dcnode-id="5748"><span data-dcnode-id="5747" instrument_node="">                                                       Snakes, which had been lying around doing nothing</span><br data-dcnode-id="5746"><span data-dcnode-id="5745" instrument_node="">                                                       for a couple of years, right up until the time she found</span><br data-dcnode-id="5744"><span data-dcnode-id="5743" instrument_node="">                                                out about aquaponics. It wasn’t long before she decided</span><br data-dcnode-id="5742"><span data-dcnode-id="5741" instrument_node="">                                                that these could come in very handy for keeping fish. So she</span><br data-dcnode-id="5740"><span data-dcnode-id="5739" instrument_node="">                                                began collecting IBCs as well as blue barrels and she began</span><br data-dcnode-id="5738"><span data-dcnode-id="5737" instrument_node="">                                                designing two systems, one at her dads place and one at her</span><br data-dcnode-id="5736"><span data-dcnode-id="5735" instrument_node="">                                                own house. Snakes got the blue barrels from her work and</span><br data-dcnode-id="5734"><span data-dcnode-id="5733" instrument_node="">                                                found the IBCs available for free, they had been previously</span><br data-dcnode-id="5732"><span data-dcnode-id="5731" instrument_node="">                                                been used for fertiliser and just needed a good clean.</span></p><p data-dcnode-id="5729"></p><h2 data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">                                                    The first growbeds were made from a blue barrel cut in</span></h2><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">                                                half lengthways as well as the top of an IBC which was cut and</span><br data-dcnode-id="5724"><span data-dcnode-id="5723" instrument_node="">                                                supported with extra bracing underneath. It wasn’t strong</span><br data-dcnode-id="5722"><span data-dcnode-id="5721" instrument_node="">                                                enough and the bed began to sag under the weight of the</span><br data-dcnode-id="5720"><span data-dcnode-id="5719" instrument_node="">                                                gravel, so Snakes decided that next time she would be using</span><br data-dcnode-id="5718"><span data-dcnode-id="5717" instrument_node="">                                                lighter expanded clay media.</span><p data-dcnode-id="5716"></p><p data-dcnode-id="5715"></p><h2 data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">                                                     Snakes used the remainder of the base of the first IBC to</span></h2><br data-dcnode-id="5712"><span data-dcnode-id="5711" instrument_node="">  Rockmelon                                     set up a sump tank. She estimates this will hold around 400</span><br data-dcnode-id="5710"><span data-dcnode-id="5709" instrument_node="">                                                litres of water. The system is set up on a flood and drain cycle</span><br data-dcnode-id="5708"><span data-dcnode-id="5707" instrument_node="">                                                using standpipes.</span><p data-dcnode-id="5706"></p><p data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node=""> Framework for the barrels under construction     Tomatoes are fruiting a bit early!</span></p><p data-dcnode-id="5700"><span data-dcnode-id="5703" instrument_node="">82  www.backyardaquaponics.com</span><br data-dcnode-id="5702"><span data-dcnode-id="5701" instrument_node="">f  The IBC of Aquaponics                                         Snake’s System</span></p><p data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">  Blue drums have been in for 5 weeks, and big white one for 4 weeks</span></p><p data-dcnode-id="5697"></p><h2 data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">  Tomatoes fruiting well</span></h2><p data-dcnode-id="5694"></p><p data-dcnode-id="5693"></p><h2 data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">     Water is pumped to the growbeds using a 3600 litre per</span></h2><br data-dcnode-id="5690"><span data-dcnode-id="5689" instrument_node="">hour pump through black poly pipe, with a tap at each of the</span><br data-dcnode-id="5688"><span data-dcnode-id="5687" instrument_node="">beds to regulate the flow The timer is set to pump fifteen</span><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">minutes on and thirty minutes off. Water drains through the</span><br data-dcnode-id="5684"><span data-dcnode-id="5683" instrument_node="">growbeds and PVC pipe back to the sump tank. When the</span><br data-dcnode-id="5682"><span data-dcnode-id="5681" instrument_node="">water level raises to a predetermined height the float switch</span><br data-dcnode-id="5680"><span data-dcnode-id="5679" instrument_node="">kicks in and returns water from the sump tank, back to the</span><br data-dcnode-id="5678"><span data-dcnode-id="5677" instrument_node="">main fish tank using a 6000lph pump. The system has since</span><br data-dcnode-id="5676"><span data-dcnode-id="5675" instrument_node="">had additional growbeds added, including a blue barrel cut</span><br data-dcnode-id="5674"><span data-dcnode-id="5673" instrument_node="">crossways another IBC made into a growbed with the frame</span><br data-dcnode-id="5672"><span data-dcnode-id="5671" instrument_node="">from the bottom acting as a stand, as well as more half blue</span><br data-dcnode-id="5670"><span data-dcnode-id="5669" instrument_node="">barrels.</span><br data-dcnode-id="5668"><span data-dcnode-id="5667" instrument_node="">    The system was stocked with Barramundi and a couple of</span><br data-dcnode-id="5666"><span data-dcnode-id="5665" instrument_node="">water heaters were added to keep the water temperature up.</span><br data-dcnode-id="5664"><span data-dcnode-id="5663" instrument_node="">Snakes reports that their growth so far has been fantastic.       Johnny looks on with interest at the stainless steel fish</span><br data-dcnode-id="5662"><span data-dcnode-id="5661" instrument_node="">                                                                  tank</span><p data-dcnode-id="5660"></p><p data-dcnode-id="5656"><span data-dcnode-id="5659" instrument_node="">83  www.backyardaquaponics.com</span><br data-dcnode-id="5658"><span data-dcnode-id="5657" instrument_node="">f The IBC of Aquaponics                          Snake’s System</span></p><p data-dcnode-id="5655"></p><h2 data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">            Stainless steel milk tank</span></h2><p data-dcnode-id="5652"></p><p data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">                                                   And so it begins</span></p><p data-dcnode-id="5649"></p><h2 data-dcnode-id="5647"><span data-dcnode-id="5648" instrument_node=""> Sump tank with 6000lph pump and float switch</span></h2><p data-dcnode-id="5646"></p><p data-dcnode-id="5645"></p><h2 data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">                                                   Planted 3 beds today with tomatoes, spring onion, garlic,</span></h2><br data-dcnode-id="5642"><span data-dcnode-id="5641" instrument_node="">                                                   raspberries, strawberries, parsley, lettuce, bok choy,</span><br data-dcnode-id="5640"><span data-dcnode-id="5639" instrument_node="">                                                   rhubarb, asparagus, snow peas</span><p data-dcnode-id="5638"></p><p data-dcnode-id="5637"></p><h2 data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node=""> The IBC collective!</span></h2><br data-dcnode-id="5634"><span data-dcnode-id="5633" instrument_node="">                                                 The Barramundi have definitely grown, and look very healthy</span><br data-dcnode-id="5632"><span data-dcnode-id="5631" instrument_node="">                                                 indeed</span><br data-dcnode-id="5630"><span data-dcnode-id="5629" instrument_node="">84  www.backyardaquaponics.com</span><br data-dcnode-id="5628"><span data-dcnode-id="5627" instrument_node="">f The IBC of Aquaponics                                            Snake’s System</span><p data-dcnode-id="5626"></p><p data-dcnode-id="5620"><span data-dcnode-id="5625" instrument_node="">The tomatoes are still going nuts, and I’ve been eating</span><br data-dcnode-id="5624"><span data-dcnode-id="5623" instrument_node="">tomatoes, lettuce, bok choy, and strawberries for a few</span><br data-dcnode-id="5622"><span data-dcnode-id="5621" instrument_node="">weeks now. Picked my first beetroot yesterday</span></p><p data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">                                                                      My dad- in awe!</span></p><p data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node=""> Learnt a few lessons so far - gravel is really, really heavy, and the beds need a LOT of support!</span></p><p data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node=""> Not enough support for this bed when the gravel went in               And some new beds</span></p><p data-dcnode-id="5610"><span data-dcnode-id="5613" instrument_node="">85  www.backyardaquaponics.com</span><br data-dcnode-id="5612"><span data-dcnode-id="5611" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5582"><span data-dcnode-id="5609" instrument_node="">                                             WATCH</span><br data-dcnode-id="5608"><span data-dcnode-id="5607" instrument_node="">                                            the Video</span><br data-dcnode-id="5606"><span data-dcnode-id="5605" instrument_node="">                                                        Mattyry’s</span><br data-dcnode-id="5604"><span data-dcnode-id="5603" instrument_node="">                                                         IBC system</span><br data-dcnode-id="5602"><span data-dcnode-id="5601" instrument_node="">                                                         M</span><br data-dcnode-id="5600"><span data-dcnode-id="5599" instrument_node="">                                                                     att’s aquaponics adventures continued with the</span><br data-dcnode-id="5598"><span data-dcnode-id="5597" instrument_node="">                                                                     development of his second system. He returned home</span><br data-dcnode-id="5596"><span data-dcnode-id="5595" instrument_node="">                                                                     one afternoon with 4 IBCs loaded up and well strapped</span><br data-dcnode-id="5594"><span data-dcnode-id="5593" instrument_node="">                                                         to the trailer. This system was designed to go in to a hot house so</span><br data-dcnode-id="5592"><span data-dcnode-id="5591" instrument_node="">                                                         that he could gain some better growth during the cooler months</span><br data-dcnode-id="5590"><span data-dcnode-id="5589" instrument_node="">                                                         of the year. The original plan was to include a 1000 litre sump</span><br data-dcnode-id="5588"><span data-dcnode-id="5587" instrument_node="">                                                         tank, dug in to the ground. However those plans changed when it</span><br data-dcnode-id="5586"><span data-dcnode-id="5585" instrument_node="">                                                         was discovered that there was an easement in that location, and</span><br data-dcnode-id="5584"><span data-dcnode-id="5583" instrument_node="">                                                         digging would be almost impossible.</span></p><p data-dcnode-id="5581"></p><h2 data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">                                                             Matt liked the idea of a CHIFT PIST system, so planned that</span></h2><br data-dcnode-id="5578"><span data-dcnode-id="5577" instrument_node="">                                                         a 1100 litre fish tank made from a single IBC would house the</span><br data-dcnode-id="5576"><span data-dcnode-id="5575" instrument_node="">                                                         fish and this could overflow to three growbeds, before draining</span><br data-dcnode-id="5574"><span data-dcnode-id="5573" instrument_node="">                                                         to the sump tank. The water level of the fish tank sits around</span><br data-dcnode-id="5572"><span data-dcnode-id="5571" instrument_node="">                                                         200-300mm above the top of the growbeds. An opening was</span><br data-dcnode-id="5570"><span data-dcnode-id="5569" instrument_node="">                                                         cut in to the top of the fish tank for feeding as well as allowing</span><br data-dcnode-id="5568"><span data-dcnode-id="5567" instrument_node="">                                                         access when it comes to harvest time. The IBCs that he had</span><br data-dcnode-id="5566"><span data-dcnode-id="5565" instrument_node="">                                                         purchased were originally clear/white ones but he wanted to</span><br data-dcnode-id="5564"><span data-dcnode-id="5563" instrument_node=""> 4 IBCs en route to their new destination                block out the sunlight so they were spray painted black. Three</span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">                                                         of them were then cut into 350 mm deep growbeds and the</span><br data-dcnode-id="5560"><span data-dcnode-id="5559" instrument_node="">                                                         bottom of the IBC became the stand/sump. He wanted the</span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">                                                         growbeds to all be the same height and he used two cypress</span><br data-dcnode-id="5556"><span data-dcnode-id="5555" instrument_node="">                                                         posts to support them on the bases. The bottom sections</span><br data-dcnode-id="5554"><span data-dcnode-id="5553" instrument_node="">                                                         were then linked together increasing the sump size to around</span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">                                                         1500 litres of water volume.</span><p data-dcnode-id="5550"></p><p data-dcnode-id="5549"></p><h2 data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">                                                           Bases were spray painted to reduce light and stop algae</span></h2><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">  Broccoli                                                 growing</span><p data-dcnode-id="5544"></p><p data-dcnode-id="5540"><span data-dcnode-id="5543" instrument_node="">86  www.backyardaquaponics.com</span><br data-dcnode-id="5542"><span data-dcnode-id="5541" instrument_node="">f  The IBC of Aquaponics                                          Mattyry’s System</span></p><p data-dcnode-id="5539"></p><h2 data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">  Lettuces growing well in gravel media</span></h2><p data-dcnode-id="5536"></p><p data-dcnode-id="5535"></p><h2 data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">  Newly planted first growbed</span></h2><p data-dcnode-id="5532"></p><p data-dcnode-id="5531"></p><h2 data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">   Water is pumped from the interconnected sump tanks to</span></h2><br data-dcnode-id="5528"><span data-dcnode-id="5527" instrument_node="">the main fish tank from here it overflows through a SLO to the</span><br data-dcnode-id="5526"><span data-dcnode-id="5525" instrument_node="">growbeds .</span><p data-dcnode-id="5524"></p><p data-dcnode-id="5523"></p><h2 data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">    Each of the growbeds has a ball valve inline which can</span></h2><br data-dcnode-id="5520"><span data-dcnode-id="5519" instrument_node="">be adjusted or even turned off if required. Matt is very</span><br data-dcnode-id="5518"><span data-dcnode-id="5517" instrument_node="">happy with his system, it has produced an abundant variety</span><br data-dcnode-id="5516"><span data-dcnode-id="5515" instrument_node="">of vegetables including beetroot, broccoli, cucumbers and</span><br data-dcnode-id="5514"><span data-dcnode-id="5513" instrument_node="">lettuces. Matt has also grown silver perch as well as some           Beetroot</span><br data-dcnode-id="5512"><span data-dcnode-id="5511" instrument_node="">trout in the system.</span><p data-dcnode-id="5510"></p><p data-dcnode-id="5506"><span data-dcnode-id="5509" instrument_node="">87  www.backyardaquaponics.com</span><br data-dcnode-id="5508"><span data-dcnode-id="5507" instrument_node="">f The IBC of Aquaponics                                      Mattyry’s System</span></p><p data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node=""> Preparations begin by separating the IBC forming a sump tank and growbed</span></p><p data-dcnode-id="5503"></p><h2 data-dcnode-id="5501"><span data-dcnode-id="5502" instrument_node=""> Silverbeet, cucumbers, broccoli and lettuce</span></h2><p data-dcnode-id="5500"></p><p data-dcnode-id="5496"><span data-dcnode-id="5499" instrument_node="">88  www.backyardaquaponics.com</span><br data-dcnode-id="5498"><span data-dcnode-id="5497" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5472"><span data-dcnode-id="5495" instrument_node="">                                Lord Viykor’s</span><br data-dcnode-id="5494"><span data-dcnode-id="5493" instrument_node="">                                     IBC system</span><br data-dcnode-id="5492"><span data-dcnode-id="5491" instrument_node="">                                                              L</span><br data-dcnode-id="5490"><span data-dcnode-id="5489" instrument_node="">                                                                    ord Viykor found an IBC on Ebay for his first attempt at</span><br data-dcnode-id="5488"><span data-dcnode-id="5487" instrument_node="">                                                                    an aquaponic system. He cut away the top part of the</span><br data-dcnode-id="5486"><span data-dcnode-id="5485" instrument_node="">                                                                    cage and created a standard 300 mm deep growbed, to</span><br data-dcnode-id="5484"><span data-dcnode-id="5483" instrument_node="">                                                              which he added some strapping underneath for extra support.</span><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">                                                              This section was rotated 90 degrees and sits above the base</span><br data-dcnode-id="5480"><span data-dcnode-id="5479" instrument_node="">                                                              which is the fish tank, trimmed to hold around 600 litres and</span><br data-dcnode-id="5478"><span data-dcnode-id="5477" instrument_node="">                                                              allowing access from the front through an opening in the</span><br data-dcnode-id="5476"><span data-dcnode-id="5475" instrument_node="">                                                              framework. The cage bars pointing upwards were edged with</span><br data-dcnode-id="5474"><span data-dcnode-id="5473" instrument_node="">                                                              timber to stop any injuries from the sharp metal.</span></p><p data-dcnode-id="5460"><span data-dcnode-id="5471" instrument_node="">                                                                  A 4800 litre per hour pump was placed at the back of the</span><br data-dcnode-id="5470"><span data-dcnode-id="5469" instrument_node="">                                                              fish tank, and water is pumped up to the growbeds for 15</span><br data-dcnode-id="5468"><span data-dcnode-id="5467" instrument_node="">                                                              minutes each hour. Some slight modifications were made</span><br data-dcnode-id="5466"><span data-dcnode-id="5465" instrument_node="">                                                              to the system, the pump was moved to the front area of the</span><br data-dcnode-id="5464"><span data-dcnode-id="5463" instrument_node="">                                                              fish tank. It will be much easier to access if there are any</span><br data-dcnode-id="5462"><span data-dcnode-id="5461" instrument_node="">                                                              problems.</span></p><p data-dcnode-id="5459"></p><h2 data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">                                                                  20mm gravel was chosen and works very well as a</span></h2><br data-dcnode-id="5456"><span data-dcnode-id="5455" instrument_node="">                                                              variety of different plants have grown easily in this system.</span><br data-dcnode-id="5454"><span data-dcnode-id="5453" instrument_node="">                                                              Jade perch as well as goldfish live in the fish tank providing</span><br data-dcnode-id="5452"><span data-dcnode-id="5451" instrument_node="">                                                              nutrients for plants growing in the growbed above. Shadecloth</span><br data-dcnode-id="5450"><span data-dcnode-id="5449" instrument_node="">                                                              was wrapped around the fish tank to minimise sunlight</span><br data-dcnode-id="5448"><span data-dcnode-id="5447" instrument_node="">                                                              causing algal growth. Vegetables grown in the growbed have</span><br data-dcnode-id="5446"><span data-dcnode-id="5445" instrument_node="">                                                              included tomatoes, habanero chillies, coriander, lettuce,</span><br data-dcnode-id="5444"><span data-dcnode-id="5443" instrument_node="">                                                              strawberries and basil.</span><p data-dcnode-id="5442"></p><p data-dcnode-id="5441"></p><h2 data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node=""> IBC cut in two the growbed is rotated 90 degrees to sit on</span></h2><br data-dcnode-id="5438"><span data-dcnode-id="5437" instrument_node=""> the base</span><p data-dcnode-id="5436"></p><p data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">                                                                Also put an edge around the grow bed on the IBC frame</span></p><p data-dcnode-id="5430"><span data-dcnode-id="5433" instrument_node="">89  www.backyardaquaponics.com</span><br data-dcnode-id="5432"><span data-dcnode-id="5431" instrument_node="">f The IBC of Aquaponics                                    Lord Viykor’s System</span></p><p data-dcnode-id="5429"></p><h2 data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">                                                                 An inline tap allows for flow adjustme</span></h2><br data-dcnode-id="5426"><span data-dcnode-id="5425" instrument_node=""> 20mm washed river gravel for the grow bed                     pumped to growbed as well as to the nt as water is</span><br data-dcnode-id="5424"><span data-dcnode-id="5423" instrument_node="">                                                               providing additional aeration.        surface of the fish tank</span><p data-dcnode-id="5422"></p><p data-dcnode-id="5421"></p><h2 data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node=""> Filling the growbed with water as a test run</span></h2><p data-dcnode-id="5418"></p><p data-dcnode-id="5417"></p><h2 data-dcnode-id="5415"><span data-dcnode-id="5416" instrument_node="">                                                                   The cap will have a 38mm hole cut into</span></h2><br data-dcnode-id="5414"><span data-dcnode-id="5413" instrument_node="">                                                                   will be enlarged for the 40mm pvc wate the centre, then it</span><br data-dcnode-id="5412"><span data-dcnode-id="5411" instrument_node="">                                                                                                          r pipe</span><p data-dcnode-id="5410"></p><p data-dcnode-id="5409"></p><h2 data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node=""> Standpipe surround ready to hold back media. Holes are</span></h2><br data-dcnode-id="5406"><span data-dcnode-id="5405" instrument_node=""> cut to allow water to flow through                          Fittings installed in the lid of the IBC</span><p data-dcnode-id="5404"></p><p data-dcnode-id="5400"><span data-dcnode-id="5403" instrument_node="">90  www.backyardaquaponics.com</span><br data-dcnode-id="5402"><span data-dcnode-id="5401" instrument_node="">f The IBC of Aquaponics                                       Lord Viykor’s System</span></p><p data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node=""> Habanero chili</span></p><p data-dcnode-id="5390"><span data-dcnode-id="5397" instrument_node="">                                                 sed to be</span><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">                         d from Ebay and suppo</span><br data-dcnode-id="5394"><span data-dcnode-id="5393" instrument_node="">  The IBC was purchase</span><br data-dcnode-id="5392"><span data-dcnode-id="5391" instrument_node="">  uv resistant hdpe</span></p><p data-dcnode-id="5389"></p><h2 data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">                                                                Strapping has been added for extra strength</span></h2><p data-dcnode-id="5386"></p><p data-dcnode-id="5382"><span data-dcnode-id="5385" instrument_node="">91  www.backyardaquaponics.com</span><br data-dcnode-id="5384"><span data-dcnode-id="5383" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5356"><span data-dcnode-id="5381" instrument_node="">                                                                     Zman’s</span><br data-dcnode-id="5380"><span data-dcnode-id="5379" instrument_node="">                                                                    IBC system</span><br data-dcnode-id="5378"><span data-dcnode-id="5377" instrument_node="">                                                              Z</span><br data-dcnode-id="5376"><span data-dcnode-id="5375" instrument_node="">                                                                     man found an IBC that had previously been used</span><br data-dcnode-id="5374"><span data-dcnode-id="5373" instrument_node="">                                                                     for storing window cleaner. He firstly cut it in to two</span><br data-dcnode-id="5372"><span data-dcnode-id="5371" instrument_node="">                                  fish tank   to reduce the</span><br data-dcnode-id="5370"><span data-dcnode-id="5369" instrument_node="">Shadecloth was wrapped around the                                    sections, one that would hold around 600 litres of</span><br data-dcnode-id="5368"><span data-dcnode-id="5367" instrument_node="">light in the fish tank                                        water and the remaining section would form the growbed of</span><br data-dcnode-id="5366"><span data-dcnode-id="5365" instrument_node="">                                                              around 400 litres. He began by cleaning the IBC with warm</span><br data-dcnode-id="5364"><span data-dcnode-id="5363" instrument_node="">                                                              soapy water before letting it dry out in the sun. He tested the</span><br data-dcnode-id="5362"><span data-dcnode-id="5361" instrument_node="">                                                              tank to see if it was fish safe by adding a couple of goldfish</span><br data-dcnode-id="5360"><span data-dcnode-id="5359" instrument_node="">                                                              that were easily available. Later silver perch and yabbies were</span><br data-dcnode-id="5358"><span data-dcnode-id="5357" instrument_node="">                                                              added to the system.</span></p><p data-dcnode-id="5355"></p><h2 data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">                                                                   The water in the fish tank is pumped up to the growbed</span></h2><br data-dcnode-id="5352"><span data-dcnode-id="5351" instrument_node="">                                                              using a 4000 litre per hour pump and was initially running</span><br data-dcnode-id="5350"><span data-dcnode-id="5349" instrument_node="">                                                              full time, maintaining a water level height just 2cm below the</span><br data-dcnode-id="5348"><span data-dcnode-id="5347" instrument_node="">                                                              surface of the media. The fish tank water runs through 25mm</span><br data-dcnode-id="5346"><span data-dcnode-id="5345" instrument_node="">                                                              pipe and elbows channel the flow directly over the surface of</span><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">                                                              the Hydroton. A ball valve and tee under the growbed divert</span><br data-dcnode-id="5342"><span data-dcnode-id="5341" instrument_node="">                                                              some of the water flow back to the main fish tank providing</span><br data-dcnode-id="5340"><span data-dcnode-id="5339" instrument_node="">                                                              aeration. Additional aeration is supplied by an airpump with 4</span><br data-dcnode-id="5338"><span data-dcnode-id="5337" instrument_node="">                                                              clear airlines attached to stones, these sit on the floor of the</span><br data-dcnode-id="5336"><span data-dcnode-id="5335" instrument_node=""> Growbeds must be well supported to save pain and             fish tank and bubble up through the water.</span><br data-dcnode-id="5334"><span data-dcnode-id="5333" instrument_node=""> heartache later</span><br data-dcnode-id="5332"><span data-dcnode-id="5331" instrument_node="">                                                                  The spinach was not growing well as the roots seemed</span><br data-dcnode-id="5330"><span data-dcnode-id="5329" instrument_node="">                                                              to be getting water logged so the standpipe was trimmed by</span><br data-dcnode-id="5328"><span data-dcnode-id="5327" instrument_node="">                                                              a further 1cm and this worked well, later some seeds were</span><br data-dcnode-id="5326"><span data-dcnode-id="5325" instrument_node="">                                                              added and began to germinate within a few days.</span><p data-dcnode-id="5324"></p><p data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node=""> IBC and olive barrels                                          Piping and fittings under the bed</span></p><p data-dcnode-id="5318"><span data-dcnode-id="5321" instrument_node="">92  www.backyardaquaponics.com</span><br data-dcnode-id="5320"><span data-dcnode-id="5319" instrument_node="">f The IBC of Aquaponics                           Zman’s System</span></p><p data-dcnode-id="5317"></p><h2 data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">                                                Plant growth is coming along nicely</span></h2><p data-dcnode-id="5314"></p><p data-dcnode-id="5313"></p><h2 data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node=""> Seedlings are easy to plant in expanded clay</span></h2><p data-dcnode-id="5310"></p><p data-dcnode-id="5309"></p><h2 data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">                                                            This growbed holds around 300 - 350</span></h2><br data-dcnode-id="5306"><span data-dcnode-id="5305" instrument_node="">                                                                                                  litres of media</span><p data-dcnode-id="5304"></p><p data-dcnode-id="5303"></p><h2 data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">                                                      I now regret setting up the GB on top of the FT. So hard</span></h2><br data-dcnode-id="5300"><span data-dcnode-id="5299" instrument_node=""> Seeds and seedlings doing well                       to look at the fish and yabbies!!!</span><p data-dcnode-id="5298"></p><p data-dcnode-id="5294"><span data-dcnode-id="5297" instrument_node="">93  www.backyardaquaponics.com</span><br data-dcnode-id="5296"><span data-dcnode-id="5295" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5246"><span data-dcnode-id="5293" instrument_node="">                                                                           Blissy’s</span><br data-dcnode-id="5292"><span data-dcnode-id="5291" instrument_node="">                                                                           IBC system</span><br data-dcnode-id="5290"><span data-dcnode-id="5289" instrument_node="">                                                                     B</span><br data-dcnode-id="5288"><span data-dcnode-id="5287" instrument_node="">                                                                              lissy’s system consists of eight grow beds which are</span><br data-dcnode-id="5286"><span data-dcnode-id="5285" instrument_node="">                                                                              made from 200 litre blue drums cut in half. Two bath</span><br data-dcnode-id="5284"><span data-dcnode-id="5283" instrument_node="">                                                                              tubs were used as sumps and a 1000 litre IBC as a</span><br data-dcnode-id="5282"><span data-dcnode-id="5281" instrument_node="">                                                                     fish tank. The system is CHIFT PIST, with water flowing through</span><br data-dcnode-id="5280"><span data-dcnode-id="5279" instrument_node="">                                                                     25mm poly pipe to the growbeds. The beds then drain through</span><br data-dcnode-id="5278"><span data-dcnode-id="5277" instrument_node="">                                                                     19mm poly into the bathtub sumps which have been stocked</span><br data-dcnode-id="5276"><span data-dcnode-id="5275" instrument_node="">                                                                     with a few yabbies. Shade cloth has been used to cover the</span><br data-dcnode-id="5274"><span data-dcnode-id="5273" instrument_node="">                                                                     entire system, to minimise evaporation as well as to keep</span><br data-dcnode-id="5272"><span data-dcnode-id="5271" instrument_node="">                                                                     sunlight off the IBC and reduce the amount of algal growth.</span><br data-dcnode-id="5270"><span data-dcnode-id="5269" instrument_node="">                                                                     The IBC originally had citrus based environmentally friendly</span><br data-dcnode-id="5268"><span data-dcnode-id="5267" instrument_node="">                                                                     degreaser in it, but was thoroughly cleaned out for use. There</span><br data-dcnode-id="5266"><span data-dcnode-id="5265" instrument_node="">                                                                     was a little algae growing in the fish tank which is a good sign</span><br data-dcnode-id="5264"><span data-dcnode-id="5263" instrument_node="">                                                                     that it can harbour beneficial organisms. PVC pipes were cut</span><br data-dcnode-id="5262"><span data-dcnode-id="5261" instrument_node="">                                                                     to lengths and placed in the sump bathtubs for yabbies to</span><br data-dcnode-id="5260"><span data-dcnode-id="5259" instrument_node="">                                                                     hide in. Blissy later managed to get hold of an old rainwater</span><br data-dcnode-id="5258"><span data-dcnode-id="5257" instrument_node="">                                                                     tank which held more than 3000 litres of water and this was</span><br data-dcnode-id="5256"><span data-dcnode-id="5255" instrument_node="">                                                                     eventually added to the system. The materials were locally</span><br data-dcnode-id="5254"><span data-dcnode-id="5253" instrument_node="">                                                                     sourced and show how resourceful and cheap a backyard</span><br data-dcnode-id="5252"><span data-dcnode-id="5251" instrument_node=""> 3000lph submersible pump                                            aquaponic system can be. Fresh fish and vegetables can be</span><br data-dcnode-id="5250"><span data-dcnode-id="5249" instrument_node="">                                                                     easy to grow in your own backyard saving you the trouble of</span><br data-dcnode-id="5248"><span data-dcnode-id="5247" instrument_node="">                                                                     getting to the shops and then storing the produce for later use.</span></p><p data-dcnode-id="5242"><span data-dcnode-id="5245" instrument_node=""> Poly pipe is directed to each of the blue barrels to irrigate the     3000 litre rain water tank added to the system</span><br data-dcnode-id="5244"><span data-dcnode-id="5243" instrument_node=""> plants</span></p><p data-dcnode-id="5238"><span data-dcnode-id="5241" instrument_node="">94  www.backyardaquaponics.com</span><br data-dcnode-id="5240"><span data-dcnode-id="5239" instrument_node="">f The IBC of Aquaponics                     Blissy’s System</span></p><p data-dcnode-id="5237"></p><h2 data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node=""> The system is now 1 year old.</span></h2><p data-dcnode-id="5234"></p><p data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">                                                   Trout harvest</span></p><p data-dcnode-id="5231"></p><h2 data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node=""> Rainbow trout growing well in system</span></h2><p data-dcnode-id="5228"></p><p data-dcnode-id="5224"><span data-dcnode-id="5227" instrument_node=""> Shadecloth covering reduces evaporation      Shadecloth covering was added as summer temperatures</span><br data-dcnode-id="5226"><span data-dcnode-id="5225" instrument_node="">                                              reach 42 degrees</span></p><p data-dcnode-id="5220"><span data-dcnode-id="5223" instrument_node="">95  www.backyardaquaponics.com</span><br data-dcnode-id="5222"><span data-dcnode-id="5221" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5219"></p><h2 data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">Jaymie and  Axl’s</span></h2><br data-dcnode-id="5216"><span data-dcnode-id="5215" instrument_node="">         IBC system</span><br data-dcnode-id="5214"><span data-dcnode-id="5213" instrument_node="">                                                         W</span><br data-dcnode-id="5212"><span data-dcnode-id="5211" instrument_node="">                                                                    hen Jaymie and Axl scored another free IBC they</span><br data-dcnode-id="5210"><span data-dcnode-id="5209" instrument_node="">                                                                    decided that it was time to set up a system that</span><br data-dcnode-id="5208"><span data-dcnode-id="5207" instrument_node="">                                                                    would house redclaw. They managed to get a couple</span><br data-dcnode-id="5206"><span data-dcnode-id="5205" instrument_node="">                                                         of bathtubs and set about building a rack on top of the IBC</span><br data-dcnode-id="5204"><span data-dcnode-id="5203" instrument_node="">                                                         to support them. The fish tank IBC has also been set up with</span><br data-dcnode-id="5202"><span data-dcnode-id="5201" instrument_node="">                                                         plastic bread crates stacked on top of each other to make</span><br data-dcnode-id="5200"><span data-dcnode-id="5199" instrument_node="">                                                         homes for the redclaw. Bricks have been placed above the</span><br data-dcnode-id="5198"><span data-dcnode-id="5197" instrument_node="">                                                         bread crates to weigh them down and stop them from floating.</span><br data-dcnode-id="5196"><span data-dcnode-id="5195" instrument_node="">                                                         A pond pump in the IBC pumps water straight up to the two</span><br data-dcnode-id="5194"><span data-dcnode-id="5193" instrument_node="">                                                         bath tubs, where it is diverted at a tee piece and dumped</span><br data-dcnode-id="5192"><span data-dcnode-id="5191" instrument_node="">                                                         directly on the surface of the gravel. Simple standpipes are</span><br data-dcnode-id="5190"><span data-dcnode-id="5189" instrument_node="">                                                         used in each bed and the water is run on a timed cycle of 15</span><br data-dcnode-id="5188"><span data-dcnode-id="5187" instrument_node="">                                                         minutes every hour. Water then drains back via gravity from</span><br data-dcnode-id="5186"><span data-dcnode-id="5185" instrument_node="">                                                         the beds to the redclaw tank below.</span><p data-dcnode-id="5184"></p><p data-dcnode-id="5172"><span data-dcnode-id="5183" instrument_node="">                                                            The beds are in the blazing sun with limited shade and</span><br data-dcnode-id="5182"><span data-dcnode-id="5181" instrument_node="">                                                         are producing sage, thyme, rosemary, welsh onions, fennel,</span><br data-dcnode-id="5180"><span data-dcnode-id="5179" instrument_node="">                                                         tomatoes and Ceylon spinach which are all doing very well.</span><br data-dcnode-id="5178"><span data-dcnode-id="5177" instrument_node=""> Bathtub growbeds filled with gravel                     The redclaw manage to keep out of sight and the tank is now</span><br data-dcnode-id="5176"><span data-dcnode-id="5175" instrument_node="">                                                         home to 8 large rainbow fish and 2 juvenile tandanus catfish</span><br data-dcnode-id="5174"><span data-dcnode-id="5173" instrument_node="">                                                         as well.</span></p><p data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node=""> Bread crates must be weighted down as they will float     Bread crates provide multi level living spaces for redclaw</span></p><p data-dcnode-id="5166"><span data-dcnode-id="5169" instrument_node="">96  www.backyardaquaponics.com</span><br data-dcnode-id="5168"><span data-dcnode-id="5167" instrument_node="">f   The IBC of Aquaponics                                          Jaymie &amp; Axl’s System</span></p><p data-dcnode-id="5165"></p><h2 data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">Jaymie planting out the bed with little helper</span></h2><p data-dcnode-id="5162"></p><p data-dcnode-id="5161"></p><h2 data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">    The rack on the sump will support the bathtub growbeds</span></h2><p data-dcnode-id="5158"></p><p data-dcnode-id="5157"></p><h2 data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">    Water returning from bath adding aerations as it breaks the</span></h2><br data-dcnode-id="5154"><span data-dcnode-id="5153" instrument_node="">    surface</span><p data-dcnode-id="5152"></p><p data-dcnode-id="5148"><span data-dcnode-id="5151" instrument_node="">97  www.backyardaquaponics.com</span><br data-dcnode-id="5150"><span data-dcnode-id="5149" instrument_node="">f The IBC of Aquaponics                 Jaymie and Axl’s System</span></p><p data-dcnode-id="5144"><span data-dcnode-id="5147" instrument_node="">                                             Redclaw</span><br data-dcnode-id="5146"><span data-dcnode-id="5145" instrument_node=""> Redclaw haven</span></p><p data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node=""> 20 redclaw added to their new home       Redclaw hides can be made from simple PVC pipes</span></p><p data-dcnode-id="5141"></p><h2 data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">                                          Welsh onions, thyme, rosemary, sage, basil, fennel and</span></h2><br data-dcnode-id="5138"><span data-dcnode-id="5137" instrument_node=""> Vines planted to shade the chookpen      some feral cherry tomatoes</span><p data-dcnode-id="5136"></p><p data-dcnode-id="5132"><span data-dcnode-id="5135" instrument_node="">98  www.backyardaquaponics.com</span><br data-dcnode-id="5134"><span data-dcnode-id="5133" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="5106"><span data-dcnode-id="5131" instrument_node="">                                              WATCH</span><br data-dcnode-id="5130"><span data-dcnode-id="5129" instrument_node="">                                             the Video</span><br data-dcnode-id="5128"><span data-dcnode-id="5127" instrument_node="">                                                           Zsazsa’s</span><br data-dcnode-id="5126"><span data-dcnode-id="5125" instrument_node="">                                                           IBC system</span><br data-dcnode-id="5124"><span data-dcnode-id="5123" instrument_node="">                                                         Z</span><br data-dcnode-id="5122"><span data-dcnode-id="5121" instrument_node="">                                                                sazsa is from Hungary, and Hungary has a continental</span><br data-dcnode-id="5120"><span data-dcnode-id="5119" instrument_node="">                                                                climate, where winter temperatures can get down to</span><br data-dcnode-id="5118"><span data-dcnode-id="5117" instrument_node="">                                                                minus 17C, however summer can also be fairly warm</span><br data-dcnode-id="5116"><span data-dcnode-id="5115" instrument_node="">                                                         reaching 35C. Because of these contrasting conditions a great</span><br data-dcnode-id="5114"><span data-dcnode-id="5113" instrument_node="">                                                         deal of thought would have to go into not only the system</span><br data-dcnode-id="5112"><span data-dcnode-id="5111" instrument_node="">                                                         design but also how the system is housed. When temperatures</span><br data-dcnode-id="5110"><span data-dcnode-id="5109" instrument_node="">                                                         are down to -15C, if your aquaponic system is this cold then</span><br data-dcnode-id="5108"><span data-dcnode-id="5107" instrument_node="">                                                         you’re not going to get any plant growth let alone fish growth.</span></p><p data-dcnode-id="5105"></p><h2 data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">
