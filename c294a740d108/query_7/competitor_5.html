n></p><p data-dcnode-id="3480"><span data-dcnode-id="3519" instrument_node="">                                                  Curnow’s</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">                                                   IBC system</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">                                                  C</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">                                                           urnow set up his first system with one IBC, though it</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">                                                           is like most other IBC systems, he has come up with</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node="">                                                           another innovative way of recycling using an old pump.</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">                                                  Curnow decided to try something a little different, when he</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">                        snugly in to position     salvaged a couple of pumps from some old dishwashers.</span><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">Threaded adaptor fits</span><br data-dcnode-id="3502"><span data-dcnode-id="3501" instrument_node="">                                                  The pumps have two outlets on them and he decided to use</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">                                                  one outlet for the growbed and the other to the tank to stir</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">                                                  up the sediment and move it towards the pump. The black</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">                                                  pipe delivers around 45 litres per minutes and the grey pipe</span><br data-dcnode-id="3494"><span data-dcnode-id="3493" instrument_node="">                                                  delivers 30 litres per minute, the small clear pipe delivers only</span><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node="">                                                  3 litres per minute. (As it is of little to no use, it was blanked</span><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node="">                                                  off.) He was very pleased with this trial and believes it has</span><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">                                                  the potential to pump to two growbeds simultaneously. The</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">                                                  pump sits outside of the fishtank at the bottom of the IBC and</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">                                                  was relatively easy to plumb. Because it sits out in the open a</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">                                                  weather proof cover was made to protect it from the elements.</span></p><p data-dcnode-id="3479"></p><h2 data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">                                                      The pump operates on a timer and water is pumped up</span></h2><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">                                                  to the beds which are filled with expanded clay. Curnow</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">                                                  discovered the 2” thread came in very handy and fits easily to</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">                                                  a threaded PVC adaptor, making it easy to install a stand pipe</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">                                                  and media surround.</span><p data-dcnode-id="3468"></p><p data-dcnode-id="3448"><span data-dcnode-id="3467" instrument_node="">   2 inch thread on lid makes for easy adaption       The system was stocked with yabbies from a mates</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node="">                                                  dam and Curnow found that they rather enjoyed the cherry</span><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node="">                                                  tomatoes that he had in abundance. They also regularly get</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">                                                  fed lupins and carrot. The system has come along in leaps</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">                                                  and bounds in a short space of time and Curnow is also</span><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">                                                  growing plants in hanging basket that filter the water back to</span><br data-dcnode-id="3456"><span data-dcnode-id="3455" instrument_node="">                                                  the fish tank, although the coir media has turned the water</span><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">                                                  brown. The fish tank was later wrapped in underfelt and a</span><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">                                                  tank cover was also made to reduce the amount of sunlight</span><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">                                                  and algal growth.</span></p><p data-dcnode-id="3447"></p><h2 data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">   Framework ads style to a humble IBC              Dishwasher pump</span></h2><p data-dcnode-id="3444"></p><p data-dcnode-id="3440"><span data-dcnode-id="3443" instrument_node="">150  www.backyardaquaponics.com</span><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">f The IBC of Aquaponics                     Curnow’s System</span></p><p data-dcnode-id="3439"></p><h2 data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node=""> Slope is handy for gravity flow systems</span></h2><p data-dcnode-id="3436"></p><p data-dcnode-id="3435"></p><h2 data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">                                                   Water return lines to fish tank</span></h2><p data-dcnode-id="3432"></p><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node=""> Finished</span></p><p data-dcnode-id="3426"><span data-dcnode-id="3429" instrument_node="">151  www.backyardaquaponics.com</span><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">f The IBC of Aquaponics                                        Curnow’s System</span></p><p data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node=""> Corn is doing well and the bed is filling out very quickly</span></p><p data-dcnode-id="3423"></p><h2 data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">                              de from gutter guard</span></h2><br data-dcnode-id="3420"><span data-dcnode-id="3419" instrument_node=""> Coarse filter for inlet ma</span><p data-dcnode-id="3418"></p><p data-dcnode-id="3417"></p><h2 data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">                                                              Seeds beginning to germinate in expanded clay</span></h2><p data-dcnode-id="3414"></p><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node=""> Dishwasher pump trial works well                                Root growth from sweet corn</span></p><p data-dcnode-id="3408"><span data-dcnode-id="3411" instrument_node="">152  www.backyardaquaponics.com</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">f The IBC of Aquaponics                                Curnow’s System</span></p><p data-dcnode-id="3407"></p><h2 data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node=""> Test kits are handy to check water quality results</span></h2><p data-dcnode-id="3404"></p><p data-dcnode-id="3403"></p><h2 data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node=""> The plants are growing at an astonishing rate</span></h2><p data-dcnode-id="3400"></p><p data-dcnode-id="3396"><span data-dcnode-id="3399" instrument_node=""> Cucumber trellis added                                 Water flows through the conconut fibre and coir turning</span><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">                                                        the water brown</span></p><p data-dcnode-id="3392"><span data-dcnode-id="3395" instrument_node="">153  www.backyardaquaponics.com</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="3328"><span data-dcnode-id="3391" instrument_node="">            Siphonphobia’s</span><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">                   IBC system</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">                                                         S</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">                                                                  iphonphobia has created a neat looking system using</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">                                                                  3 interlinked IBCs, as he saw it as a cheap way to get</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">                                                                  a 2000 litre fish tank. The IBCs were cut with the top</span><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">                                                         portion becoming the growbed and supported on the base</span><br data-dcnode-id="3378"><span data-dcnode-id="3377" instrument_node="">                                                         below. He used a couple of different ideas as supports such</span><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">                                                         as pine logs and metal rods, but quickly realised just how</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">                                                         much weight you have to support. He purchased the pipe</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">                                                         and fittings which were needed to link the tanks. Water was</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">                                                         able to move between the base of the fish tanks though it is a</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">                                                         good idea to protect the opening with filter mesh to stop fish</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">                                                         being caught in the tap area. The fish tanks were stocked</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">                                                         with sivler perch and some mussels were also added to the</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">                                                         system. Unfortunately the mussels found their way in to the</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">                                                         pump and stopped it from working. An 8000 lph submersible</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">                                                         pump with float switch was installed which is a little larger</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">                                                         than was required, but easily fixed by placing a tee in the line</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">                                                         and returning water to the fish tank, providing extra aeration at</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">                                                         the same time. The advantage of a float switch is that when</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">                                                         the water level drops to a certain point the pump will stop</span><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node=""> A couple of different supports were used to determine   pumping water rather than completely draining the fish tank.</span><br data-dcnode-id="3346"><span data-dcnode-id="3345" instrument_node=""> what would work best</span><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">                                                             The growbeds are filled with expanded clay which is</span><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">                                                         lightweight in comparison to other gravel media, though the</span><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">                                                         supports underneath need to be fairly sturdy as the IBC plastic</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">                                                         is not terribly strong in itself and will bow easily. As anybody</span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">                                                         will tell you having an aquaponics system will take you on a</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">                                                         wonderful journey of discovery and there are many people</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">                                                         from all over the world who willingly share their experience on</span><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">                                                         the Backyard Aquaponics Forum.</span></p><p data-dcnode-id="3327"></p><h2 data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node=""> Overflow from tank to tank                                Growbeds supported above fish tank</span></h2><p data-dcnode-id="3324"></p><p data-dcnode-id="3320"><span data-dcnode-id="3323" instrument_node="">154  www.backyardaquaponics.com</span><br data-dcnode-id="3322"><span data-dcnode-id="3321" instrument_node="">f The IBC of Aquaponics                    Siphonphobia’s System</span></p><p data-dcnode-id="3319"></p><h2 data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">                                 Download 3D Google Sketchup</span></h2><p data-dcnode-id="3316"></p><p data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node=""> What not to do</span></p><p data-dcnode-id="3313"></p><h2 data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node=""> Shadecloth to reduce sunlight               Water returning to the tank</span></h2><p data-dcnode-id="3310"></p><p data-dcnode-id="3306"><span data-dcnode-id="3309" instrument_node="">155  www.backyardaquaponics.com</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">f The IBC of Aquaponics                                         Siphonphobia’s System</span></p><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node=""> The water level should be below the surface of the media. This was too high</span></p><p data-dcnode-id="3300"><span data-dcnode-id="3303" instrument_node="">                              h float switch</span><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">     Submersible pump wit</span></p><p data-dcnode-id="3299"></p><h2 data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">                                                                Silver perch fingerlings</span></h2><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node=""> Fish caught in tank outlet</span><p data-dcnode-id="3294"></p><p data-dcnode-id="3290"><span data-dcnode-id="3293" instrument_node="">156  www.backyardaquaponics.com</span><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">f The IBC of Aquaponics            Siphonphobia’s System</span></p><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node=""> IBCs connected</span></p><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node=""> First plant</span></p><p data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">                                     Azolla</span></p><p data-dcnode-id="3280"><span data-dcnode-id="3283" instrument_node="">157  www.backyardaquaponics.com</span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="3256"><span data-dcnode-id="3279" instrument_node="">                                            Wal’s</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">                                        IBC system</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">                                  W</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">                                              al lives in the remote north west town of Tom Price</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">                                              where conditions can be harsh. Extreme heat and</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">                                              cool nights are one of the challenges that he faced</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">                                  when venturing in to aquaponics. His two fish tanks are made</span><br data-dcnode-id="3266"><span data-dcnode-id="3265" instrument_node="">                                  from the bases of the IBCs which he insulated with pink batts and</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">                                  set up in a shed. The fish tanks are connected with a balance</span><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">                                  pipe, which allows water to flow between the two tanks and</span><br data-dcnode-id="3260"><span data-dcnode-id="3259" instrument_node="">                                  provides a total fish tank volume of around 1200 litres. The tops</span><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">                                  are used to provide a total growbed volume of around 650 litres.</span></p><p data-dcnode-id="3255"></p><h2 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">                                      The system is fitted with two 3500 litre per hour</span></h2><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">                                  submersible pumps as well as two air pumps which maintain</span><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">                                  oxygen levels during the warmer weather. A backup system has</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">                                  also been included in the event of a power failure.</span><p data-dcnode-id="3246"></p><p data-dcnode-id="3245"></p><h2 data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">                                      Old packing boxes have been used as stands as they are</span></h2><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">                                  sturdy and support the weight of the expanded clay media. The</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">                                  growbeds are situated on the outside of the shed allowing them</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">                                  plenty of sunlight while the fish tanks are on the inside where</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">                                  day time temperatures are 3-5 degrees cooler.</span><p data-dcnode-id="3234"></p><p data-dcnode-id="3233"></p><h2 data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">                                     The expanded clay was washed in the cool of the evening</span></h2><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">                                  and early morning to avoid the heat which climbed to 38</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">                                  degrees. The beds were set up, filled with media, washed and</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">                                  planted. A simple shade house was constructed to protect the</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">                                  plants from the hot sun.</span><p data-dcnode-id="3222"></p><p data-dcnode-id="3221"></p><h2 data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">                                      Barramundi fingerlings were flown in which went off</span></h2><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">                                  without a hitch and the system has been powering away as</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">                                  you can see from the photographs. An NFT style system was</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">                                  added and the results are fantastic, producing lush healthy</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">                                  lettuce plants.</span><p data-dcnode-id="3210"></p><p data-dcnode-id="3209"></p><h2 data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">                                    Contemplating the design</span></h2><p data-dcnode-id="3206"></ .</span><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">a stand at the back of the growbed, this allowed a greater</span><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node="">opening over the fish tank allowing him to access the fish.            The pump is connected with 25mm pipe and two ball</span><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">                                                                   valves allow for flow adjustments. One goes to the growbed</span><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">    The growbed was cut off at the 400 litre mark, this was        and the other returns water back to the fish tank.</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">stamped on the side of the IBC. He marked the spot for the</span><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">drain hole (double nut fitting as he calls it), making sure the       Charlie admits that although he is relatively new to</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">space was flat and without seams. Once the magic spot was          Aquaponics he is absolutely addicted. Everyone that visits his</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">marked, it was cut out with a hole saw, followed by an opening     house is very intrigued and wants to get their own thing going,</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">in the base plate. Three timber supports were used to sit          because everyone loves fish and everyone loves food. It is a</span><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node="">the growbed on, although Charlie would recommend steel             winning combo! His only wish is that he had started years ago.</span><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node="">box tube as the timber is already starting to bow and needs</span></p><p data-dcnode-id="3066"><span data-dcnode-id="3069" instrument_node="">                                                                                     showing frame</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">                                                              Underside of growbed</span></p><p data-dcnode-id="3065"></p><h2 data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">  Timber supports must be heavy duty to support the weight</span></h2><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">  of heavy media beds</span><p data-dcnode-id="3060"></p><p data-dcnode-id="3056"><span data-dcnode-id="3059" instrument_node="">  Water flows to the growbed and tee returns water to the            Floating basket provides a safe haven for new fingerlings</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">  fish tank</span></p><p data-dcnode-id="3052"><span data-dcnode-id="3055" instrument_node="">165  www.backyardaquaponics.com</span><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">f The IBC of Aquaponics                            Charlie’s System</span></p><p data-dcnode-id="3051"></p><h2 data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node=""> Compact system fits neatly in to a small space</span></h2><p data-dcnode-id="3048"></p><p data-dcnode-id="3047"></p><h2 data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node=""> 25mm pipe and ball valves</span></h2><p data-dcnode-id="3044"></p><p data-dcnode-id="3043"></p><h2 data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node=""> Electrical rack made from IBC frame</span></h2><p data-dcnode-id="3040"></p><p data-dcnode-id="3036"><span data-dcnode-id="3039" instrument_node="">166  www.backyardaquaponics.com</span><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="3035"></p><h2 data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">                           Bringing Food Production Home</span></h2><p data-dcnode-id="3032"></p><p data-dcnode-id="3026"><span data-dcnode-id="3031" instrument_node="">                           Backyard</span><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node="">                             Aquaponics</span><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">                                  Magazine</span></p><p data-dcnode-id="3025"></p><h2 data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">                                     For all your aquaponics information !</span></h2><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">                                     www.byapmagazine.com</span><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">167  www.backyardaquaponics.com</span><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">f  The IBC of Aquaponics</span><p data-dcnode-id="3016"></p><p data-dcnode-id="2996"><span data-dcnode-id="3015" instrument_node="">                                                         Bigdaddy’s</span><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">                                                            IBC system</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">                                                                  B</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">                                                                          iddaddy has a challenge working with a tiered backyard</span><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">                                                                          and it means that every time he brings materials in,</span><br data-dcnode-id="3006"><span data-dcnode-id="3005" instrument_node="">                                                                          there are steps to climb. He has used two IBC’s for his</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">                                                                  fish tanks which are set on a higher level. The ground level</span><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">                                                                  drops away about a metre to the growbeds, which are built</span><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">                                                                  in behind the brick wall, retaining the patio area. The bed is</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">                                                                  lined with plastic and then filled with riverstones.</span></p><p data-dcnode-id="2958"><span data-dcnode-id="2995" instrument_node="">                                                                      The fish tanks are connected with a 50mm PVC pipe at the</span><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node="">                                                                  1000 litre mark. Rubber couplings with jubilee clips supplied</span><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">                                                                  from Bunnings were fitted to the ball valves at the base of the</span><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node="">                                                                  IBC and then attached to a 50-90mm reducer to the coupling.</span><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">                                                                  Tees in to the 90mm drain allow for what Bigdaddy describes</span><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">                                                                  as the emergency dump valves. There is a 200 litre sump tank,</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node="">                                                                  a 9000lph pump with float switch and a washing basket full</span><br data-dcnode-id="2982"><span data-dcnode-id="2981" instrument_node="">                                                                  of clay balls providing extra filtration. Ball valves have been</span><br data-dcnode-id="2980"><span data-dcnode-id="2979" instrument_node="">                                                                  installed to the 25mm irrigation line so that when the pump</span><br data-dcnode-id="2978"><span data-dcnode-id="2977" instrument_node="">                                                                  pumps, all the fish tanks and growbeds are balanced out and</span><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">                                                                  you can allow as much water as you want to flow through them.</span><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">   Drain from the barra grow bed ready to be hooked into</span><br data-dcnode-id="2972"><span data-dcnode-id="2971" instrument_node="">   the new IBC drain</span><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">                                                                     The system works in a very simple fashion with just one</span><br data-dcnode-id="2968"><span data-dcnode-id="2967" instrument_node="">                                                                  pump. Water is delivered to the fish tank and then flows to the</span><br data-dcnode-id="2966"><span data-dcnode-id="2965" instrument_node="">                                                                  growbeds, the flows are adjusted by the ball valves, they all</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">                                                                  drain back to the solids filter and then to the sump tank, when</span><br data-dcnode-id="2962"><span data-dcnode-id="2961" instrument_node="">                                                                  the float switch rises the pump is activated and pumps to all</span><br data-dcnode-id="2960"><span data-dcnode-id="2959" instrument_node="">                                                                  the growbeds and fish tanks.</span></p><p data-dcnode-id="2950"><span data-dcnode-id="2957" instrument_node="">                                                      ration on</span><br data-dcnode-id="2956"><span data-dcnode-id="2955" instrument_node="">                         wing the drain to the filt</span><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">IBC’s on the right sho</span><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">the lef t</span></p><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">   Looking from the filter and sump module                          Older grow bed in distance</span></p><p data-dcnode-id="2944"><span data-dcnode-id="2947" instrument_node="">168  www.backyardaquaponics.com</span><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">f The IBC of Aquaponics                                     Bigdaddy’s System</span></p><p data-dcnode-id="2943"></p><h2 data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node=""> Other side of barbie, second bay of grow bed</span></h2><p data-dcnode-id="2940"></p><p data-dcnode-id="2939"></p><h2 data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node=""> Shows top view of IBC and skimmer box</span></h2><p data-dcnode-id="2936"></p><p data-dcnode-id="2935"></p><h2 data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">                                                              Side view showing where they are situated in the</span></h2><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">                                                              backyard. Home made level control skimmer boxes. 90</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node=""> The peas and the other plants have taken off just three      mm storm water PVC with removable ends for cleaning</span><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node=""> weeks old</span><p data-dcnode-id="2926"></p><p data-dcnode-id="2922"><span data-dcnode-id="2925" instrument_node="">169  www.backyardaquaponics.com</span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">f The IBC of Aquaponics            Bigdaddy’s System</span></p><p data-dcnode-id="2918"><span data-dcnode-id="2921" instrument_node="">                                     The fish tanks and barra bed drains tee into the trout bed</span><br data-dcnode-id="2920"><span data-dcnode-id="2919" instrument_node=""> Solids filter                       drain and go into the filter</span></p><p data-dcnode-id="2914"><span data-dcnode-id="2917" instrument_node="">170  www.backyardaquaponics.com</span><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="2838"><span data-dcnode-id="2913" instrument_node="">                                             Jet’s</span><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">                                        IBC system</span><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">                                  J</span><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">                                         et has created a very neat system from IBC’s with three</span><br data-dcnode-id="2906"><span data-dcnode-id="2905" instrument_node="">                                         blue barrels incorporated into the system. This neat</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">                                         system is based on the CHIFT PIST principle with two</span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">                                  1000L IBC’s acting as fish tanks. The water leaves the IBC’s via</span><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">                                  a fairly modified solids lift overflow, from here the water flows</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">                                  into a swirl separator made from a blue barrel. In the separator</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">                                  the heavy solid particles of fish waste and uneaten food drop</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">                                  to the base where they can be removed when required via</span><br data-dcnode-id="2892"><span data-dcnode-id="2891" instrument_node=""> Dual IBC fish tanks</span><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">                                  a drain with a tap in the base. The cleaner water leaves this</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">                                  drum via a pipe near the surface in the middle of the barrel,</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">                                  then flows through two different types of biofilters. The first</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">                                  biofilter is a fixed media filter, while the second is a moving bed</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node="">                                  biofilter, both of these have about 50L of Kaldnes K1 media in</span><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">                                  them. Once the water has passed through the biofilters, it then</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">                                  continues to flow through to the growbeds where there is a tap</span><br data-dcnode-id="2876"><span data-dcnode-id="2875" instrument_node="">                                  on each bed to control how much water enters individual beds.</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">                                      The growbeds are filled with a course rock media , each</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">                                  growbed is the base section of an IBC, there are five growbeds</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">                                  in total, that sit on some large timber beams supported off</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">                                  the ground by cinder blocks or large cement building blocks.</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">                                  Under the growbeds are three IBC tops which have been</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">                                  inverted and plumbed together to act as the sump for the</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">                                  system. The growbeds have been fitted with autosiphons to</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">                                  control their flooding and draining cycles. From the sumps,</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">                                  the water is pumped back to the fish tank where the process</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">                                  starts all over again.</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">                                      A few things that Jet has changed, modified or added</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node=""> Pipework from the fish tank      since building his system are a battery backup pump in case</span><br data-dcnode-id="2850"><span data-dcnode-id="2849" instrument_node="">                                  of power outages. The return to the fish tank is now inside</span><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">                                  the tank, he has added a second pump in the bottom of the</span><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">                                  moving bed biofilter which means he can bypass the growbeds</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">                                  at night when it’s cold, helping to keep up the heat in the fish</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">                                  tank. There are also a few more changes or planned changes,</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">                                  hopefully we might be able to cover these in the next edition.</span></p><p data-dcnode-id="2834"><span data-dcnode-id="2837" instrument_node=""> Download 3D</span><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node=""> Google Sketchup                    One of the biofilters in action</span></p><p data-dcnode-id="2830"><span data-dcnode-id="2833" instrument_node="">171  www.backyardaquaponics.com</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">f The IBC of Aquaponics              Jet’s System</span></p><p data-dcnode-id="2829"></p><h2 data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node=""> The complete system in operation</span></h2><p data-dcnode-id="2826"></p><p data-dcnode-id="2825"></p><h2 data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node=""> Swirl separator                       The swirl separator and two biofilter barrels</span></h2><p data-dcnode-id="2822"></p><p data-dcnode-id="2818"><span data-dcnode-id="2821" instrument_node="">172  www.backyardaquaponics.com</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">f The IBC of Aquaponics                         Jet’s System</span></p><p data-dcnode-id="2817"></p><h2 data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node=""> Plants starting to take off in the growbeds</span></h2><p data-dcnode-id="2814"></p><p data-dcnode-id="2813"></p><h2 data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node=""> Plants growing well</span></h2><p data-dcnode-id="2810"></p><p data-dcnode-id="2806"><span data-dcnode-id="2809" instrument_node="">173  www.backyardaquaponics.com</span><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">f The IBC of Aquaponics</span></p><p data-dcnode-id="2750"><span data-dcnode-id="2805" instrument_node="">                                                                    Netab’s</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">                                                                    IBC system</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">                                                              N</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">                                                                        etabs system is one of the biggest systems we</span><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">                                                                        have seen to date. An enormous amount of effort</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">                                                                        has been put into this system, both in the planning</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">                                                              and construction. In total there are 21 IBC halves used</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">                                                              as growbeds and filled with river stone, as well as 16 IBC</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">                                                              yabby/duckweed 2 tier tanks. These top tiers will eventually</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">                                                              be converted to gravel growbeds. Two 2000 litre and five</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">                                                              500 litre fish tanks are housed in an adjoining shadecloth</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">                                                              structure. The growbed layout was designed to best utilise</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node=""> n><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node="">f The IBC of Aquaponics                                            For Your Reference</span></p><p data-dcnode-id="2406"><span data-dcnode-id="2411" instrument_node="">frequently asked</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">questions</span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node=""> My fish appear unwell, gasping at the surface or showing labouring breathing, or erratic behaviour, perhaps flashing?</span></p><p data-dcnode-id="2405"></p><h2 data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node=""> My water has gone green. What should I do?</span></h2><p data-dcnode-id="2402"></p><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node=""> The sides and bottom of my tank is covered with green slime, should I clean it off?</span></p><p data-dcnode-id="2399"></p><h2 data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node=""> I have long strands of algae growing in my tank, what should I do?</span></h2><p data-dcnode-id="2396"></p><p data-dcnode-id="2395"></p><h2 data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node=""> How long can I leave my fish without feeding them?</span></h2><p data-dcnode-id="2392"></p><p data-dcnode-id="2391"></p><h2 data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node=""> My fish are off their feed, what should I do?</span></h2><p data-dcnode-id="2388"></p><p data-dcnode-id="2387"></p><h2 data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node=""> How much should I feed my fish?</span></h2><p data-dcnode-id="2384"></p><p data-dcnode-id="2383"></p><h2 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node=""> What sized pump do I need for my system?</span></h2><p data-dcnode-id="2380"></p><p data-dcnode-id="2379"></p><h2 data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node=""> What fish can I grow in my system?</span></h2><p data-dcnode-id="2376"></p><p data-dcnode-id="2375"></p><h2 data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node=""> My pH is high or low what should I do?</span></h2><p data-dcnode-id="2372"></p><p data-dcnode-id="2371"></p><h2 data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node=""> My ammonia/nitrites/nitrate levels are high, what should I do?</span></h2><p data-dcnode-id="2368"></p><p data-dcnode-id="2367"></p><h2 data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node=""> My ammonia/nitrites/nitrate levels are low or nonexistent, what should I do?</span></h2><p data-dcnode-id="2364"></p><p data-dcnode-id="2363"></p><h2 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node=""> Do fish need sunlight?</span></h2><p data-dcnode-id="2360"></p><p data-dcnode-id="2359"></p><h2 data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node=""> Can I put plants and other features into my fish tank?</span></h2><p data-dcnode-id="2356"></p><p data-dcnode-id="2355"></p><h2 data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node=""> Do I need an air pump for my system?</span></h2><p data-dcnode-id="2352"></p><p data-dcnode-id="2351"></p><h2 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node=""> I have algae on my growbed media, what should I do?</span></h2><p data-dcnode-id="2348"></p><p data-dcnode-id="2336"><span data-dcnode-id="2347" instrument_node="">181  www.backyardaquaponics.com</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">f  The IBC of Aquaponics                                             For Your Reference</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">My fish appear unwell, gasping at the surface or showing labouring breathing, or erratic behaviour, perhaps flashing?</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">If your system is pumping on a timed cycle increase the pumping to 100% of the time, if your system has not been salted before,</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">salt your system water. Using pool salt, salt your system to 3ppt, this means in 1000L of water you would add 3kg of salt. Salt</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">aids fish health and at these levels most plants will remain unaffected, however some plants like strawberries may suffer.</span></p><p data-dcnode-id="2335"></p><h2 data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">My water has gone green. What should I do?</span></h2><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">Normally a problem in the first weeks of setting up a new system. This is suspended algae we are talking about, if you were to</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">dip a glass into your fish tank and fill it with water then hold it up, the water looks very green and is hard to see through it. This</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">is a natural phase your system will go through as cycling happens. Pump full time if you aren’t already. Stop all feeding, any</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">nutrient going into the system will only feed the algal bloom. If possible cover the top of your fish tank to keep light away from</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">the water.</span><p data-dcnode-id="2322"></p><p data-dcnode-id="2314"><span data-dcnode-id="2321" instrument_node="">The sides and bottom of my tank is covered with green slime, should I clean it off?</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">No, this is biofilm and we don’t recommend that you take this off, generally it only grows as a thin layer on the surface of your</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">tank, it causes no harm to the fish or the system in any way and it helps by harbouring the beneficial bacteria. Many species of</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">fish may peck at the biofilm on the sides of the tank, eating it.</span></p><p data-dcnode-id="2313"></p><h2 data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">I have long strands of algae growing in my tank, what should I do?</span></h2><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">Stringy or filamentous algae, not very nice and it can start to take over your fish tank with its long strands of algae. Try to keep</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">the light off the water if you can by covering the tank. Remove what you can from the sides of the tank manually. Perhaps add</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">some known algae eaters to the tank if you can. We added a few yabbies to one of our tanks which had filamentous algae, they</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">have cleaned it up nicely.</span><p data-dcnode-id="2302"></p><p data-dcnode-id="2301"></p><h2 data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">How long can I leave my fish without feeding them?</span></h2><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">Almost all species of fish will live happily for weeks without feeding. If you are going away on holiday for a week or two, we would</span><br data-dcnode-id="2296"><span data-dcnode-id="2295" instrument_node="">recommend that you get a friend family member or neighbour to come around once or twice a week to check your system and</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">feed your fish. If this is not possible, then leaving the fish without feed for a week or two will not cause any major problems. I</span><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">would rather leave them without feed than have an automated feeding method because if they are off the feed for some reason,</span><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node="">the automated feeder will keep dumping it into the system and it may foul the water.</span><p data-dcnode-id="2288"></p><p data-dcnode-id="2287"></p><h2 data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">My fish are off their feed, what should I do?</span></h2><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">If it’s only been a day or two, don’t panic. Think about things: what sort of fish do you have? What are their ideal conditions and</span><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">what are your water temperatures? How long have they been in the system? Fish can often take a few weeks to settle into a new</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">home. Stand back and throw just a few pellets at a time, they might be shy, then come back in a while and check if they have</span><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">eaten them.</span><p data-dcnode-id="2276"></p><p data-dcnode-id="2275"></p><h2 data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">How much should I feed my fish?</span></h2><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">As much as they want to eat if your system is cycled and all is well. You will find that different species have different</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">personalities. Some fish, like trout are eating machines, throw a handful of feed into your fish tank and they will go crazy leaping</span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">out of the water. They seem to have an almost insatiable appetite. Other species are shyer and will eat more cautiously. Once</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">your system is established, the simple rule of thumb is to feed them as much as they want to eat within a few minutes. Throw a</span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">small handful of feed in, if they eat it all, throw some more in, and so on. When they start slowing down and don’t appear to be</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">so hungry, stop feeding them. Some fish are happy to eat all day long, others may prefer to eat at certain times of the day. You</span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">can tend to train the fish, if you have been feeding them every day when you get home from work, then don’t be surprised if they</span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">don’t eat when you decide to feed them in the morning for a change.</span><p data-dcnode-id="2256"></p><p data-dcnode-id="2255"></p><h2 data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">What sized pump do I need for my system?</span></h2><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">A question often asked! A general rule of thumb that can be applied is that you want to turn over the fish tank volume once an</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">hour. So, say you have designed a system using a couple of IBC’s, you have a 1000L IBC fish tank and two growbeds above the</span><br data-dcnode-id="2248"><span data-dcnode-id="2247" instrument_node="">fish tank made from the other IBC. Firstly you need to know roughly what head your pump will be pumping to, this is the height</span><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node="">from the surface of the water where the pump is, up to the highest point it will be pushing the water. Say for this example it</span><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node="">might be about 70cm from water surface in the fish tank to the top of the growbeds where the water inlet is. So you will want a</span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">pump that can pump at least 1000L litres/hour at a head of 70cm. If you check out pump boxes then you will notice that most</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">of them have a graph comparing pumping rates at different heads. Personally I tend to go a little more because this allows for</span><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">future expansion and changes, or extra plumbing if required at some stage. Remember that if a pump says it’s flow rate is say</span><br data-dcnode-id="2236"><span data-dcnode-id="2235" instrument_node="">2000L/h, that is at 0 head, with no restrictions from pipes and fittings.</span><p data-dcnode-id="2234"></p><p data-dcnode-id="2233"></p><h2 data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">What fish can I grow in my system?</span></h2><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node=""> That’s going to depend totally on your location. Major factors are, relevant government agencies or bodies and what they allow</span><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">in your area, you might have a fishing and gaming or agricultural department you can check with. The next factor is climate,</span><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">I really recommend growing a fish which will be happy at the natural temperatures of your system without requiring external</span><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">heating and or cooling. I have seen some elaborate attempts over the years at heating and cooling water to keep a particular</span><br data-dcnode-id="2222"><span data-dcnode-id="2221" instrument_node="">species of fish, in reality they don’t tend to last long term because of the expense or effort in maintaining optimum temperatures</span><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">for the particular species. If you live in England, don’t try and grow Tilapia, you can grow them, but you need to keep the water</span><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">temperatures elevated year round. Grow trout, they will grow year round without any heating.</span><p data-dcnode-id="2216"></p><p data-dcnode-id="2215"></p><h2 data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">My pH is high or low what should I do?</span></h2><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">There are a few things you can do, however always remember little and often rather than large changes. After running</span><br data-dcnode-id="2210"><span data-dcnode-id="2209" instrument_node="">aquaponic systems for well over 10 years, I have never adjusted my pH in any of my systems. Here at the display centre we</span><br data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node="">recently tested some of our systems and found that a few of them had a pH down around 5.5 which is considered to be very</span><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node="">182  www.backyardaquaponics.com</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">f  The IBC of Aquaponics                                            For Your Reference</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">low. In fact in a lot of literature may tell you that nitrification will stop at levels below 6, we’ve found this to not be true. Some</span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">fish species don’t like low pH, other species are quite happy at a low pH, it might be worth checking your own fish species to find</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">out if they are ok. The plants are certainly happy at a lower pH and more elements are available at low pH. High pH is generally</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">more of a problem than low, high pH means that ammonia is more toxic to fish and that many micronutrients are locked up and</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">not available to plants. pH naturally comes down in an aquaponic system and generally people are trying to find ways of keeping</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">the pH up. If your pH is high you need to look at a few things, check the water you are using to top up your system. If it has a high</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">pH find another water source for a while. If it’s not your top up water perhaps it’s your media in the growbeds, test your media</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">with the vinegar test. Whatever your pH reading is, remember “don’t panic”. This is especially true during the early stages of an</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">aquaponic system, during cycling and for a while after, perhaps the first 6 months of operation, you can experience some swings</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">in pH, just let the system settle and mature, if you have checked your media and top up water and they are fine, just leave your</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">system to do its thing.</span><p data-dcnode-id="2180"></p><p data-dcnode-id="2179"></p><h2 data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">My ammonia/nitrites/nitrate levels are high, what should I do?</span></h2><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">Firstly, if it’s your nitrates, don’t panic these aren’t highly toxic to fish, you need to think about planting some more plants to use</span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">up the nitrates. If it’s Ammonia or nitrites, there are a few things you should do. Number one thing, STOP FEEDING. Secondly</span><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">look for uneaten feed on the bottom of your tank and remove any that you find. If you aren’t already pumping full time, turn the</span><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">water pump on 24/7 for at least a few days, salt the system (to 1ppt), this will aid your fish if the nitrite levels are high.</span><p data-dcnode-id="2168"></p><p data-dcnode-id="2167"></p><h2 data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">My ammonia/nitrites/nitrate levels are low or nonexistent, what should I do?</span></h2><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">Be happy! :o) Many of the systems we run at the display centre here show levels of 0 for all of the above, the systems are</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">producing well, all nutrients are being converted, and also the plants aren’t being force fed to any extent by having constant</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">levels of nitrates in the water.</span><p data-dcnode-id="2158"></p><p data-dcnode-id="2157"></p><h2 data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Do fish need sunlight?</span></h2><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">No not at all, or at least only in very small amounts, ultimately it’s great if you can keep the sun off your fish tank, fish are happy</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node="">when they feel protected and in the shadows, there aren’t many fish that like sitting in the sunshine. This has come about</span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">through many generations of breeding, those sitting out in the sun would be picked off quickly by predators from in the water</span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">or the sky. Happy fish are fish that aren’t stressed so they will be less susceptible to disease and they will eat more and put on</span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">weight quicker.</span><p data-dcnode-id="2144"></p><p data-dcnode-id="2143"></p><h2 data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Can I put plants and other features into my fish tank?</span></h2><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">It’s recommended that you keep your tank as free as possible of objects if you want to keep maximum numbers of fish. The</span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">more things in your fish tank, the more places there are for solids to catch and build up. We sometimes put in a couple of short</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">sections of pipe in the bottom of the fish tank for crustaceans to hide in to give them protection from the fish. Pot plants like</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">water lilies, lotus plants, Chinese water chestnuts etc may be attacked by either fish or any crustaceans in your tank. If you have</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">low stocking levels or the right species of fish you may be ok. Floating plants can work very well in a system and they have been</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">talked about previously in the plant section of this manual.</span><p data-dcnode-id="2128"></p><p data-dcnode-id="2127"></p><h2 data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Do I need an air pump for my system?</span></h2><br data-dcnode-id="2124"><span data-dcnode-id="2123" instrument_node="">Probably not, this will depend on a number of aspects of your system. We have found that in all of our systems the water</span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">splashing back into the fish tank creates enough dissolved oxygen in the water for the fish of a fully stocked system at the</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node="">recommended stocking levels. A little extra air certainly doesn’t go astray, but there is no reason to get a huge air pump with lots</span><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node="">of air stones for your IBC system.</span><p data-dcnode-id="2116"></p><p data-dcnode-id="2115"></p><h2 data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">I have algae on my growbed media, what should I do?</span></h2><br data-dcnode-id="2112"><span data-dcnode-id="2111" instrument_node="">You need to look at a couple of things, do you have water going out over the top of your media where the sun can hit it? This</span><br data-dcnode-id="2110"><span data-dcnode-id="2109" instrument_node="">will cause algae to grow. Best if you can try and make sure the water goes straight down into the media away from the sunlight.</span><br data-dcnode-id="2108"><span data-dcnode-id="2107" instrument_node="">Another way to help this problem is to put some worms into your growbed, composting worms help consume uneaten food, algae</span><br data-dcnode-id="2106"><span data-dcnode-id="2105" instrument_node="">and old dead root matter within the growbed.</span><p data-dcnode-id="2104"></p>
