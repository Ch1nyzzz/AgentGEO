development workshop will
run the BAO course in full for
members who require the
qualification and will act as an</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">BUSH FIREbulletin //GENERAL NEWS 27</span></p></section><hr data-dcnode-id="1444"><section aria-label="Page 30" data-dcnode-id="1429"><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">New round of recruitment
for State Mitigation Support Services</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Story and photo by Glenn Woods, Business Support Officer,
Operational and Mitigation Support Services</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">The last edition of the Bush
Fire Bulletin showcased the
work of State Mitigation
Support Services (SMSS) and
how they assist and support
brigades across the State with
preparation of hazard reduction
burns and assisting residents
through the Assist Infirm
Disabled and Elderly Residents
(AIDER) Program. In February
2011, SMSS began recruiting
an additional 80 seasonal State
Mitigation members. The first
round of recruitment focused
on Glendenning, Mittagong
and Oberon along with the
second, third and fourth
round of recruitment focusing
on Lismore, Coffs Harbour/
Urunga, Taree, Tamworth,
Moree, Mudgee, Dubbo,
Cobar, Cessnock, Nowra,
Queanbeyan, Cooma, Mogo
and Glendenning.
Over 165 applications were
received for these positions and
through an intensive process
of interviews, medicals and the
Arduous Pack Test, volunteers
from around these areas
advanced to undertake the
new State Mitigation Induction
Program. Phil Brockett a
new Crew Leader based at</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">28 BUSH FIREbulletin //GENERAL NEWS</span></p><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Glendenning said: “I think that
SMSS is a very dynamic unit
and I have a variety of skills that
I can offer the team”.
The new candidates undertook
an enhanced State Mitigation
Crew Member Induction
Program over the course of
three weeks. The intensive
program included training in
safety, injury prevention, RFS
Code of Conduct and Ethics,
managing risk factors, working
with vulnerable people and
management of equipment as
well as Safe Work on Roofs
(SWR), Remote Area First Aid
Training, Trim and Cross Cut
Felled Trees (TFT) and Aviation
Basic Knowledge (ABK). Crew
members with appropriate
qualifications also undertook
specialised training in Remote
Area Firefighting Training
and Advanced Resuscitation
Techniques.
During the Induction
Programs, crews were visited
by Commissioner Shane
Fitzsimmons and Deputy
Commissioner Rob Rogers.
The Crews also travelled
to various locations around
the State as part of their</span></p><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">training with existing crews,
this included participating in
mitigation jobs in areas such
as Mt Tomah within the Blue
Mountains, Hilltop within
the Wingecarribee District
and around Oakdale in the
Wollondilly Shire.
After the three week
Induction, new SMSS Crew
Leaders completed an extra
week of training which
included Conduct Briefings
and Debriefings (CBD), an
introduction to prescribed
burning and intensive training
in Occupational Health
and Safety. Gary Hansen a
new Crew Leader based at
Glendenning said: “I want to
assist in the service of the
volunteers, by helping with the
preparation of their mitigation
work and to aid residents
who need help preparing
their property in the event of
bush fire.”
Brent King a new Crew Leader
based at Tamworth said: “The
thing I am most looking forward
to once starting in my role
is being out in the open and
the satisfaction of making a
difference.”</span></p><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Since the start of the induction
programmes the new
mitigation crew personnel are
nowworking to assist brigades
with the protection of their
local communities through the

(AIDER) programme, post burn
rehabilitation works, assistance
with prescribed burning and
vegetation clearing on fire trails.
Peter Heward a new Crew
Member based at Glendenning
said: “I believe Mitigation to
be a service that can do some

saves lives.” Recruitment for
new seasonal crew positions
in Warialda, Coffs Harbour/

Wagga, Lismore, Mudgee,

For further information

Rural Fire Service Crest 1961- 2011
While the history of volunteer bush firefighting in NSW dates back
to 1898, the use of the official Crest only began in 1961.
By Chief Superintendent Alan Brinkworth,
AFSM, Manager State Operations</span></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The story of the Crest,
like many stories within
the NSW RFS, has become
folklore. As legislation and
the needs of the day
determined, the name of our
organisation has evolved
from Bush Fire Brigades,
then Bush Fire Services,
Bush Fire Service and in 1997
we became the NSW Rural
Fire Service. There were
also many versions of the</span></p><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">associated advisory bodies
culminating in 1988 in the
formation of the Department
of Bush Fire Services.
As well as the official
changes, there has also been
the unofficial evolution of the
Crest. Personal taste made
its mark with some Districts
designing their own variations
to the Crest for use on their
uniforms and trucks.</span></p><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">We have pieced together
anecdotes and evidence about
the Crest and have determined
that there were four main
phases in the development of
the NSW RFS Crest and these
are shown below.
The following liftout pages
show the many versions,
changes and evolution of the
Crest over time.</span></p><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">1961
It began with a firefighter in the Heathcote area south of Sydney. Ray Watchorn is celebrated as the
creator of the original Bush Fire Brigades Crest - a burning tree with a blue background surmounted
by a small crown (Imperial or Tudor).
The crown is traditionally used to signify authority and credibility. The burning bush represents the control
and management of fire to protect the people and the landscape of the Australian continent.
Mr Watchorn was a foundation member of Heathcote Bush Fire Brigade and later became Fire Control
Officer in Sutherland. He was instrumental in the growth of bush fire brigades in the area south of
Sydney, introducing improvements in laws and equipment that benefited not only the Shire, but in many
instances, the whole State of NSW. He was well qualified to dream up the logo that would represent all
brigades in NSW.
In 1963 the crown was enlarged. Later as various patches for use on uniforms were manufactured,
two different crowns appeared on the Crest, the Imperial or Tudor Crown, commonly referred to as the
King’s Crown and the St Edwards Crown also known as the Coronation Crown or Queen’s Crown.</span></p><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">1965
In 1965 it was proposed that the cloth insignia for use on the shoulder, chest or a cap would
be available free from the NSW Bush Fire Committee. In July 1965, the new transfers and rank
identification for vehicles and helmets became available at a cost of 15 shillings per 100.
The crown used in these official Crests was the St Edward’s Crown.</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">1983
In 1983 a wreath of green laurel leaves was included on the Bush Fire Brigades Patch. In the
mythology of ancient Greece, the god Apollo’s favourite tree was the laurel tree and this came to
symbolise a heroic act or victory. The green leaves also symbolise growth and regeneration that
follows the management of fire.</span></p><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">1997 I 2009
RUR</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">S E R VI</span></p><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">W</span></p><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">FIRE</span></p><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">C</span></p><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">AL</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">The NSW Rural Fire Service was established by an Act of Parliament in 1997 and the Crest was
adapted accordingly. More recently in 2009, the Crest was adjusted slightly to remove the full stops
in NSW to bring it into alignment with Australian Government style guidelines.</span></p><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">BUSH FIREbulletin // LIFTOUT 29</span></p><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">E</span></p><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">NS</span></p></section><hr data-dcnode-id="1392"><section aria-label="Page 32" data-dcnode-id="1349"><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">1961- 1964</span></p><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">1961 NSW Bush Fire

step by step</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">On Australia Day 2011 the NSW Rural Fire
Service combined forces with several other
emergency service agencies in Bombala on
the NSW south coast to demonstrate what
happens during a motor vehicle accident.
The scenario was conducted before a large
crowd at the Bombala Showground and
included members of Fire &amp;amp; Rescue NSW
(FRNSW, formerly NSW Fire Brigades) ,
Ambulance Service of NSW, NSW Police
Force and the Snowy Hydro South Care
rescue helicopter.</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Story and photos by Colin Green, Bombala Brigade</span></p><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">1</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The scenario was of a single vehicle accident involving two
occupants. The passenger had been unrestrained while the
driver sustained serious lacerations, internal injuries and fractures.
The vehicle had come to rest on its side.
Stablising the vehicle was the first priority. Here we see the
Holton Foot being assembled, which is a a device for stabilising
the vehicle prior to rescue.</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">2 3</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The inventor of the Holton
Foot, Mick Holton provided
commentary for the crowd.</span></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Mr Holton is a former FRNSW
Senior Rescue Instructor and
is currently the NSW RFS
Monaro Team Learning and
Development Officer. He
explained that the Holton Foot
is designed to stablise the
vehicle prior to the extraction
of occupants thus preventing
risk of injury to the rescuers
and further injury to the
victims. â&amp;amp;#x20AC;&amp;amp;#x153;The principles of
its application are simple and
could be achieved using a crow
bar, a couple of pocket lines
and some basic knot tying
skills,â&amp;amp;#x20AC;? he said.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">36 BUSH FIREbulletin // GENERAL NEWS</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The Snowy Hydro South Care helicopter joined the exercise.
In this scenario the Snowy Hydro South Care staff monitored
the extraction of the occupants and the attending doctor gave
a demonstration of current CPR methods. The helicopter is
an invaluable backup to emergency services in the Bombala
area, providing hands-on resusitation, victim stablisation and
management in preparation for extraction to the helicopter.</span></p></section><hr data-dcnode-id="1180"><section aria-label="Page 39" data-dcnode-id="1159"><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">4</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">While FRNSW conducted
the rescue, the NSW RFS
Bombala Brigade provided
fire suppression services.
Spills of fuel and other
contaminents and ignitions
are always a danger in
motor vehicle accidents.
The presence of the NSW RFS
ensures the safety of both the
victim and rescuers while the
rescue is taking place.</span></p><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">5</span></p><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The NSW RFS may also be
called upon to manage traffic
around an accident.</span></p><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">FRNSW and Ambulance
Service of NSW removed the
roof of the vehicle and the
extracted the victims. In order
to minimise movement, and
therefore reduce the risk of
further injury, the victims were
transferred to spine boards to
be taken out of the vehicle.</span></p><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Throughout the scenario
speakers conducted
commentary to convey the
various roles of the emergency
services at such a accident
scene. The Ambulance Service
of NSW was represented by
an incident paramedic who
explained to the audience how
the patient was being managed
and what treatment she was
receiving for her injuries.</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">6</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">7</span></p><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">After the victims had been removed from the vehicle, the NSW
RFS members were called upon to assist with the removal of the
vehicle and the rehabilitation of the site by removing debris and
spillage from the roadway.
Fortunately the number of accidents in the Bombala area is
relatively few, so a combined services scenario such as this
provides the NSW RFS members with a valuable opportunity
to sharpen their skills.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">BUSH FIREbulletin // GENERAL NEWS 37</span></p></section><hr data-dcnode-id="1158"><section aria-label="Page 40" data-dcnode-id="1143"><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">infocus</span></p><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Thomas the Tanker
On Saturday 11 December 2010, Bell Brigade, located in the north
western corner of the Blue Mountains District, held a small Truck
Naming Ceremony.
The new Cat 1 Tanker was handed over to the brigade in
November. On delivery of the new vehicle the brigade had no
hesitation in naming their new truck - Thomas the Tanker. It is
in honour and memory of Les Thomas who passed away from
cancer in December 2007.
At the time of his death, Les Thomas was the Bell Brigade
President and for many years was the brigade Engine Officer.
Les Thomas’ widow Yvonne and grandson Harry unveiled the
newly named truck. They are seen here with Captain Greg
Honeysett and President Rick Whitbread.
Emily Honeysett
Bell Brigade</span></p><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Flashing the yellows at Mardi Gras!
By Susie McGregor, South
Katoomba Brigade</span></p><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">On Saturday 5 March 2011 I
attended the Gay and Lesbian
Mardi Gras in Sydney.
I had never attended the
Mardi Gras, but throughout
my life have had many gay
friends. When the NSW RFS
called for people to join the
Mardi Gras march in support
of our gay comrades and as a
demonstration of the spirit of
acceptance within the NSW
RFS, it seemed too good an
opportunity to miss.
Two of us travelled from the
upper Blue Mountains, arriving
at the meeting place in Hyde
Park at 5.30pm. Already, the
excitement in the air was
palpable. All sorts of amazingly
costumed people, many with
supporters in tow, were milling
around. We thought that we
would go get something to
eat however the preparations
for the parade were far too
interesting to leave. We
wandered around looking at the
final practices of dance routines
and the preparation of
a bewildering amount of floats.
The enormous amount of work
that goes into many of the
costumes is mind boggling not
to mention time given up to the
practice of parade routines.</span></p><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">The feeling in the staging
area was of acceptance,
happiness and mutual respect.
Almost every float had its own
individual sound system which
was played at full volume. As
day turned to night members
of each contingent started to
dance and display.
The NSW RFS contingent
comprised a Cat 1, a command
vehicle and about 40 members.
As we came up College Street
and prepared to turn into
Oxford Street, the main route
for the Mardi Gras parade,
the marshals called for us to
halt for about a minute. Then
we swung around into Oxford
Street and a great roar went up
from the crowd! It was quite
overwhelming!
We then marched, hugged,
grinned and waved our way
to the Sydney Cricket Ground,
throwing small gifts into the
crowd and generally having a
fantastic time.
I was enormously glad that
I had been motivated enough
to go and I will endeavour to
return each year. It was just
great. I know that next year
there will be more people from
our brigade and more from
Fire Control Centre - which
will make it even more fun.</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">38 BUSH FIREbulletin // in focus VOLUNTEERS</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">ABOVE: Susie McGregor with an unnamed participant in the Mardi Gras

The Berowra RFB produces a quarterly
newsletter and asks its members to
contribute articles. Below is a letter that was
received from one of the newest members
of the brigade.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">New kids
on the block</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">“From the moment that I joined the Berowra Brigade I felt
welcome. Shy by nature, I felt a little nervous and out-of-place
but was made to feel right at home. Everyone that I have met
has been warm, honest and friendly.
The knowledge, expertise, guidance, help, advice and tips
I have received have been greatly appreciated. Whenever
I tried a task for the first time and failed miserably (even on
the second, third and fourth attempts) I was never made the
object of derision. Instead I was patiently encouraged to try
again and again until that skill had been mastered.
The stories all of you have told me have kept me both
informed and entertained. Social gatherings I have so far
attended have been great fun. Whenever I cannot attend an
event due to prior commitments I honestly feel a little miffed!!
My girlfriend is amazed at how happy I have been since
joining the brigade and slightly suspicious at my willingness
to drop everything on very short notice to ‘attend training’.
Workmates have also commented upon the general
improvement of my demeanour. Privately I feel better about
myself. I find that I walk with my head up, back straight and a
spring in my step. This is not due to arrogance; it is because
you have instilled confidence in me. I do, however, feel proud
to be associated with people of your calibre.
I truly hope that I pass the upcoming course evaluation and
live up to your expectations. I know that I have a lot more to
learn and a long way to go and with this brigade I’m sure I’ll
achieve any goals placed before me. When the day arrives
that I will be in your position welcoming the new members
I can only pray that I will be able to maintain the high standard
you have displayed.
You’re a great bunch of guys and gals and don’t let anyone tell
you otherwise.
Leon Haxton, Berowra Brigade
Berowra Brigades’ four newest members (L-R) Mal Desmarchelier,
Craig Wilkins, Debbie Wain, Leon Haxton after the completion of
their first Hazard Reduction. Photo by Josh Topham</span></p><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">“Here we are five happy and relieved faces

theoretical weekend, followed

sessions with our fearless
captain Chris Francis, our
wonderful Deputy Captain
Dave Taylor, and other
supportive members of our
brigade. We are now training
with the rest of the team on
Saturday mornings, which has
been a real eye opener!
I attended The Bay’s Open Day
last year, as I was new to the
community. There I discovered
that I was living in Firezone
8, which got me thinking that

My biggest challenge is that
I have not experienced a
fire! Imaginary scenarios are</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">invaluable training tools, but
the real thing would have
cemented what I was learning
into reality.
I am looking forward to
becoming a dependable crew
member, and to further my
NSW RFS education via the
training modules… I would like
to drive the truck some day.
Thank you to our teachers at
The Bays for their nurturing
and strict support over the
months. Thank you also goes
out to our Assessment Team
at Kariong Fire Com who made
the day fun and less daunting
than I thought it was going to
be. Now we are qualified BF’s,
we can go out and gain the
experience!
Cimi Ross, The Bays Brigade</span></p><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">BUSH FIREbulletin // in focus VOLUNTEERS 41</span></p></section><hr data-dcnode-id="1076"><section aria-label="Page 44" data-dcnode-id="1059"><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">BRIGADE IN PROFILE</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Name of Brigade: Copacabana
Year Brigade formed: 1962
Current Captain: Chris Bygrave
Current President: Jim Bruton
District: Gosford</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">(
!</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Can you give us a brief
history of the brigade?
The Copacabana Rural Fire
Brigade was formed in 1962.
The brigade’s first station was
a single tanker bay, which
later underwent extensions
to create a second vehicle
bay and office. The brigade
occupied this station until June
2009, when it moved into its
new building on the beach front
at Copacabana. The brigade
had no option other than to
relocate, as the existing station
was built on a stormwater
easement. Our new station is
currently home to our Category
1 tanker, Category 9 striker and
new Category 11 pumper - as
well as several of our members
who always seem to have
something to do at the station.
What are some unique parts
of your brigade’s history?
Copacabana Brigade has a
unique group of very dedicated
honorary members known
as ‘The Crafty Ladies’. These
women are from Broadwater
Court Retirement Village in
nearby Kincumber. They work
tirelessly preparing art and
craft items and then donate all
money raised from the sale of
these to our brigade. The ladies</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">have been involved with the
brigade for over 10 years and
have contributed more than
$27,000 to the brigade. Money
donated by the Crafty Ladies
is used to purchase better
equipment for our vehicles and
station. To say thank you for
this wonderful contribution, the
brigade put on barbecue for
the ladies, who really enjoy the
company of the Copacabana
Brigade members.
What are some recent
milestones the brigade has
achieved?
Since the mid-1990s the
brigade has been working
towards building a new fire
station. As the brigade had
become one of the busiest and
most reliable brigades in the
District, it had become clear
that the brigade needed bigger
premises. A new station finally
became a reality in July 2009
with the brigade moving into
a new building on the beach
front at Copacabana. The
new building features three
vehicle bays, a multi-purpose
area, an office, kitchen and
a mezzanine training room.
Diligent fund-raising by brigade
members including the Crafty
Ladies’ support, meant that</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">42 BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">the brigade itself contributed
more than $35,000 to the
project. This money was used
to pay for the training room,
remote control roller doors,
air conditioning, concrete
paths, painting and furniture.
At the end of 2010 the brigade
was delivered a brand new
Category 11 urban pumper to
enhance fire protection for the
local community.
What type of area do you
cover? (E.g. farm/urban/
bushland)
Copacabana Brigade covers
a very diverse area. There are
approximately 1,500 homes
in the town of Copacabana
and the town is surrounded
by dense bushland, including
forest and coastal scrub. The
brigade regularly responds
to calls for assistance in the
neighbouring brigades of Avoca
Beach and Macmasters Beach.
These neighbouring areas
include multi-story structures,
petrol stations, national parks
and significant roads.
What types of incidents
does your brigade attend?
Copacabana Brigade attends
between 90 and 120 incidents
per year involving everything</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">from bush fires to structure
fires and motor vehicle
accidents. We also regularly
enjoy an evening walk on
the beach attending to illegal
bonfires.
What vehicles do you have?
The brigade currently has a
1998 Isuzu dual cab Category
1 tanker, a 2004 Land Rover
Defender dual cab Category
9 striker and a 2010 Hino
Category 11 urban pumper.
The brigade was to be
delivered a brand new tanker
in 2001 but was disappointed
to learn that the new model
vehicles were too high for the
old brigade station. So we have
had to wait for our new station
before we could have a new
tanker.
What type of training do you
conduct and how do you go
about doing this?
Copacabana Brigade is a very
active brigade, training twice
a week. Recently we have
been conducting joint training
with Avoca Beach Brigade
on a Wednesday night and
have been finding that our
members are getting more
out of training with a larger
group, as well as being able</span></p></section><hr data-dcnode-id="1058"><section aria-label="Page 45" data-dcnode-id="1043"><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">to share the experience from
both brigades. This also takes
the pressure off the training
officers as each brigade takes
turns to organise training. It
also helps us to maintain a
good working relationship with
our neighbouring brigade.
As there are many younger
members in both brigades,
we like to keep our training
practical, interesting, relevant
and fun! We feel it is most
important to have everyone
walking away from training
having enjoyed being there.
Sessions can range from
basic hose and pump drills,
to structure fire training
involving several crews and
breathing apparatus.
What are some unique skills
and features of your brigade?
Copacabana Brigade has
changed significantly in the last
20 years. It has transformed
from been known as ‘Dad’s
Army’ dominated by local
retirees who could always
be counted on to turn out,
to being now known as ‘the
kindergarten brigade’. This
came about because many of
the current members of the
brigade joined at a very young
age. Many of them now fill
significant roles in the brigade
including the current Captain,
Senior Deputy Captain,
Equipment Officer, Station
Officer, First Aid Officer and
Executive Member - all of
whom are under the age of 25
and have been with the brigade
since the age of 14! So while
they have a lot of experience
and commitment, they are also
quite young.</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The brigade strives to have
all of its members trained
to at least Village Firefighter
standard and First Aid qualified.
Recently a number of members
completed the Safe Working
on Roofs training, as well
as advanced oxygen
resuscitation.
Within the brigade we have
breathing apparatus (CABA)
operators, tree fellers and
crosscut chainsaw operators,
a Deputy Group Captain, Rural
Fire Instructors, Rural Fire
Assessors, prescribed burn
supervisors and community
safety assistants.
What are some unique
features of your community?
Copacabana is a beachfront
community consisting of
approximately 1,500 homes,
a school, 13 small shops
and a surf club. Much of the
community is surrounded by
dense bushland and coastal
scrub. There are many
steep hills and tight roads
in Copacabana and access
to many properties is quite
limited due to the steep slopes.
This proves challenging for
the brigade, and highlights
the need for regular area
familiarisation.</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">We find the enthusiasm of the younger
members is a driving force within the brigade.
They don’t have a ‘this is how it has always
been’ attitude so they are always coming up
with new ideas, new ways of achieving tasks
and that includes embracing new technology.
Copacabana Brigade has a
strong working relationship with
the Copacabana Community
Association and Neighbourhood
Watch group. Both these groups
use our station to hold their
meetings. The Community
Association also played a large
role in the building of our new
station and without them we
would not have the facility that
we do now.
What community events
does your brigade
participate in?
In 2009 the brigade attended
the first Copacabana
Community Christmas Carols
by assisting with road closures
and selling glow sticks. It
appears this may have become
an annual event as the 2010
Carols were of equal success
despite unfavourable weather.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Every year the brigade attends
the local festival at Kincumber,
conducting fire demonstrations
and bringing along a fire truck
for display. The brigade also
has regular visits from the
local primary school students
who always enjoy visiting the
fire station.
Copacabana Brigade participates
in the annual NSW RFS Open
Day, and was delighted with the
success last year with over 100
people visiting our new station
that day.
Written by Christian Yanni,
Senior Deputy Captain,
Copacabana Brigade
All photos courtesy of Leigh
Pilkington, Significant Imagery,
Avoca Beach Brigade</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">We find the enthusiasm of the
younger members is a driving
force within the brigade. They
don’t have a ‘this is how it has
always been’ attitude so they
are always coming up with new
ideas, new ways of achieving
tasks and that includes
embracing new technology.
A brigade with such a large
contingent of young members,
however, comes with its
own challenges. There is
stress put on the brigade’s
drivers as many of the young
members are not eligible to
obtain a truck licence. We
also have a constant battle
ensuring the young ones tidy
up after themselves around the
station. This is where the older
members keep a nice balance
and remind the young ones
it is not all about riding in the
truck - maintenance is equally
important.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">OPPOSITE PAGE: Copacabana Brigade members
at the official opening of their new building.
ABOVE: Glen Beasley and Ashley Bruton
practicing forcible entry on cars at training.
right: Brigade member Hannah Langbridge
practices forcible entry on cars at training.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS 43</span></p></section><hr data-dcnode-id="1042"><section aria-label="Page 46" data-dcnode-id="1027"><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">BRIGADE IN PROFILE
Name of Brigade: Mt Wilson/
Mt Irvine Rural Fire Brigade
– First Responder
Year brigade formed: 1958
Current Captain: Beth Raines
Current President: David Howell
District: Blue Mountains</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">(
!</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Can you give us a brief
history of the brigade?
In its current incarnation, the
brigade was formed after the
fires of 1957 when the Mt
Wilson and Mt Irvine brigades
combined. At that time the Mt
Wilson station was established
as headquarters for the
brigade. Documents in our
local Historic Society archives
indicate that a brigade at Mt
Wilson was originally formed
in 1939.
What are some unique parts
of your brigade’s history?
The first fire truck at Mt Irvine
was a blitz, and the second
was a 1945 Studebaker
with a water tank on it. The
Studebaker was sold in 1992.
It still goes and its hoses are
all in working order, in fact it
was sold on the condition that
it would be made available for
firefighting if required. After it
left our brigade the Studebaker
went on to have a successful
movie career. You may have
seen it repainted as a Darwin
Fire Brigade vehicle in the
movie Australia!
In 2007 the brigade
volunteered to be the first
rural fire brigade in the State
to join the Community First
Responder (CFR) Program - a
joint initiative of the NSW RFS
and the Ambulance Service of
NSW. Seven members of the
brigade were trained to provide
immediate emergency medical
assistance pending the arrival
of paramedics. Approximately
one third of all incident calls
that the brigade responds to
are medical emergencies.
Previous to the CFR program
starting call outs were split
equally between fire calls and
storm damage/ trees down.
What are some recent
milestones the brigade
has achieved?</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">In the late 1990s a new
building replaced an old two
door brick garage as our new
brigade headquarters at Mt
Wilson. Later this year the
brigade is planning to expand
the building to house a larger
number of vehicles. The Mt
Irvine station is a single door
brick building in which it is
increasingly difficult to house
the larger vehicles. The brigade
has plans to enlarge this
building as well.
There is no mains water supply
at Mt Wilson or Mt Irvine so
securing a reliable source
of water is always a priority.
Thanks to the generosity of
residents five 35,000 litre tanks
have been placed at strategic
locations throughout the two
villages and an Emergency
Management Australia Grant,
received in 2006, allowed the
construction of two 120,000
litre concrete tanks, one beside
each station.
An observant and quick
thinking member secured
an unused communications
tower (almost for free) for
the brigade. Both the NSW
RFS and Ambulance Service
of NSW have installed
equipment on the tower which
is vital in providing better
communications, especially
for canyon rescues in the
surrounding rugged terrain
and the brigade station will
be ready to act as a Div Com
(Divisional Command) in
major incidents. The brigade
has also installed its own
weather station and aims to
have current weather details
available on the brigade’s
website.
What type of area do
you cover?
Mt Wilson and Mt Irvine are
isolated villages in the upper
Blue Mountains surrounded
by the Blue Mountains World
Heritage Wilderness. They
are on the remains of old
volcanoes and their rich basalt
soil results in lush temperate
rainforest vegetation, a
complete contrast to the
surrounding dry sclerophyll
vegetation of sandstone
country. Mt Wilson developed
in the nineteenth century as
a ‘hill station’ (it is at 1,000m
and two hours drive from
Sydney), a place for wealthy
Sydneysiders to escape the
summer heat. Today it is still a
weekend retreat and famous</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">44 BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">for its European style gardens.
Mt Irvine at 800m is more rural
in character and is famous for
its walnut and chestnut trees.
What types of incidents
does your brigade attend?
As most emergency services
are some distance from our
villages, our local brigade
attends to a wide range of
emergencies – bush fires,
structural fires, motor vehicle
accidents on Bell’s Line of
Road, search and rescues,
storm damage and medical
emergencies. We also provide
assistance to other brigades
and states and sent crews to
assist Victorian firefighters
during the 2009 Black Saturday
fires in Victoria.
What vehicles do you have?
One Cat 11 Pumper, one Cat 1,
one twin cab Cat 7, one Cat 9
Landcruiser and one Personnel
Carrier Hilux (fitted out as a
Community First Responder
vehicle).
What type of training do you
conduct and how do you go
about doing this?
As most of our members are
weekenders, we conduct
training on the first Sunday
of each month. Several of
our regular training days are</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">devoted to joint training with
other brigades in our sector.
Occasionally, extra training
sessions are provided. In late
2010 we provided training for
volunteers working as station
officers during a major incident.
There was also a two-day
Remote Area Firefighting
Team (RAFT) exercise in our
area. Of the 30 or so in the
Blue Mountains RAFT team
members, three are from our
brigade. Community First
Responder training is held
on the first Friday of every
month with the assistance
of paramedics from Lithgow
Ambulance.
What are some unique
skills and features of your
brigade?
In villages where the
population largely consists
of professionals from nearby
Sydney, there is no shortage
of management and strategic
skills; but with so many
weekenders, finding a crew
mid-week can sometimes be
a challenge. We are lucky to
have a highly energetic and
committed captain in Beth
Raines - the only female
captain in the District. Her
leadership skills and great
personal charm have ensured
strong support for the brigade</span></p></section><hr data-dcnode-id="1026"><section aria-label="Page 47" data-dcnode-id="1005"><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">ABOVE: We are lucky to have a highly energetic and committed captain in Beth Raines - the only female captain in the District. TOP: Willy to Billy:
Our largest fund raising event is a 34km bush run from Mt Wilson to Bilpin. ABOVE: Our catering team are renowned for their home made cakes,
slices and scones!</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">in the community. Her abilities
are recognised throughout
the District and she recently
travelled to Lord Howe Island
as part of a team of four
to provide training and
support for the local rural
fire brigade there.
Community engagement is
considered an important part
of preparing the community
for bush fire emergencies.
Street meetings were held
throughout the two villages
last year covering all streets
to advise the residents on
property protection. Street
coordinators have been
appointed throughout the two
villages to act as an information
source in the case of a bush
fire, thereby freeing up phones
at the station and allowing
the captain and station officer
to concentrate on crews and
managing the incident. As the
villages are isolated, properties
are large and most residents
are weekenders, members are
kept up to date via email and
through the brigade’s website.
The beautiful World Heritage
Wilderness that surrounds
Mt Wilson attracts many
canyoners and bushwalkers.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The terrain is rugged and
some of the fitter members
of the brigade have developed
skills and knowledge to assist
in the rescue of injured and
lost parties. A local group of
NSW RFS volunteers regularly
explore different canyons in
the Wollangambe to familiarise
themselves with the area –
all hard work of course! We
have been told that the other
emergency services enjoy
coming to Mt Wilson, not only
for the professional assistance
they receive but also for the
hospitality. Our catering team
are renowned for their home
made cakes and slices!</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">ready for harvesting! Visitors
at that time of year bring
the population up to 500 on
weekends. The World Heritage
Wilderness around Mt Wilson
attracts many bushwalkers,
canyoners and campers. In the
warmer months their numbers
can peak on weekends at
200 per day. The villages are
accessed from Bell’s Line of
Road, a busy, largely two-lane
road from Sydney to Lithgow.
NRMA has declared this road:
‘currently one of the most
dangerous in Australia’.</span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">What are some unique
features of your community?</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Our largest fund raising
event is a 34km bush run
from Mt Wilson to Bilpin
(in the neighbouring district
of Hawkesbury). The run is
organised jointly by the Mt
Wilson/ Mt Irvine and Bilpin
Brigades and is colloquially
known as the “Willy to Billy”.
Over 350 runners registered
for the event in 2010 and it
is one of the most popular in
the running calendar. The run
is renowned for the beauty
of the scenery and the rural
hospitality and friendliness of</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Between the two villages
there are approximately 250
residents, 70 percent of whom
are weekenders. A large
proportion of residents are
retirees. Of the approximately
75 permanent residents, only
12 are under the age of 50.
The peak times for visitors are
Spring and particularly Autumn
when the colours of the trees
are so spectacular and the
walnuts and chestnuts are</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">What community events
does your brigade
participate in?</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">the volunteers at the start,
at the drink stations along the
way and the barbecue at the
end. This year the start was
delayed 30 minutes which
gave some contestants,
according to comments on
running websites, the chance
to score a ‘personal best’
in eating scones!
Any final thoughts or
comments you would like
to make?
The brigade receives strong
support from the community
but with an ageing and largely
non-resident population, it is
always a challenge putting a
crew together. Nevertheless,
a core group of about 20 very
active members led by a very
committed captain, means that
we always manage to acquit
ourselves well. We can always
be relied upon to provide
support to other brigades and
emergency services in the
mountains and further afield.
Written by Kathleen Oakes,
District Administration Officer NSW RFS Blue Mountains District
and Volunteer, Mt Wilson/ Mt
Irvine Brigade
Photos by Kathleen Oakes</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS 45</span></p></section><hr data-dcnode-id="1004"><section aria-label="Page 48" data-dcnode-id="991"><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">BRIGADE IN PROFILE</span></p><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">What is a Community First Responder
The Community First
Responders provide a quick
initial local response to Triple
Zero (000) calls to Ambulance
Service of NSW by providing
initial emergency care before
the ambulance arrives.
Another vital part of the First
Responderâ&amp;amp;#x20AC;&amp;amp;#x2122;s role is to meet
the ambulance and escort it to
the patient to ensure no time is
wasted. They are able to locate
and operate all equipment on
an ambulance to assist the
paramedics once they arrive.
In a medical emergency the
immediate response should
still be to call Triple Zero (000).
At the same time as the call
goes out to the ambulance,
First Responders will be paged
and can respond to the patient
immediately.
The Community First
Responder program was
devised as a practical solution
to the health needs of
remote communities where
an ambulance can take half
an hour or more to attend a
medical emergency.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Community First Responders
are accredited and operate
under Ambulance Service of
NSW governance and training.
NSW RFS volunteers respond
under a formal Memorandum
of Understanding with the
Ambulance Service of NSW.
The Mt Wilson/ Mt Irvine
Brigade was well placed to
provide NSW first batch of First
Responders already having a
defibrillators and two oxygen
resuscitation units purchased
with community donations.
Why did you decide to take
up the CFR program at Mt
Wilson/ Mt Irvine?
Our isolation means that
an ambulance can take up
to 45 minutes to arrive. On
top of that, most properties
are identified by names not
numbers and there are several
dirt roads and long entrance
driveways making it quite
confusing for the ambulance
service.
The decision to join the CFR
program was crystallised when
a resident fell and broke their</span></p><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">46 BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS</span></p><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">leg. The ambulance couldnâ&amp;amp;#x20AC;&amp;amp;#x2122;t
locate the property and while
they eventually got directions
from a local, the medical
assistance was quite delayed.
Now, we can provide the first
response for any medical
emergency in the area and
directing the ambulance has
become part of the service.
How many of your brigade
are involved in the CFR?
Seven brigade members
are trained and regularly
participate.
Did they have previous
medical experience?
Six of the seven in the team
had no medical experience and
one person was trained as a
nurse but had not practised for
many years.
What kind of training is
involved?
Community First Responders
receive intensive training from
Ambulance Service of NSW
officers and from Charles Sturt
University trainers.</span></p><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Successful graduates are
known as Honorary Ambulance
Officer â&amp;amp;#x20AC;&amp;amp;#x201C; First Responder
and are trained in the skills
required to sustain life until an
ambulance arrives.
First Responders are qualified
to administer CPR techniques
and defibrillation in the case of
heart attacks, and to administer
specified medications. They
are able to deal with diabetic
emergencies, anaphylaxis
(severe and life-threatening
allergic reaction), and monitor
vital signs until the arrival of
qualified medical assistance.
Once the First Responders
are certified, each person is
supplied with a personal kit and
the brigade also has a kit kept
at the Mt Wilson Fire Station.
NSW RFS provided a Personnel
Carrier vehicle for transport and
the Ambulance
ABOVE: In 2007 the brigade
volunteered to be the first rural
fire brigade in the State to join
the Community First Responder
Program - a joint initiative of the
NSW RFS and the Ambulance
Service of NSW</span></p></section><hr data-dcnode-id="990"><section aria-label="Page 49" data-dcnode-id="977"><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">St Florian’s Day 2011:
The NSW Rural Fire Service Internal Bravery and Service Awards</span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">It’s the day in the
Service calendar when
pomp and ceremony
are invited to the NSW
RFS Headquarters.</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">On 4 May, St Florian’s
Day every year NSW RFS
Headquarter’s hosts a
ceremony to present the
Internal Bravery and Service
Awards to acknowledge the
extraordinary acts of bravery
and service of volunteers
across NSW.
This year it began with the
NSW RFS Pipes and Drums
and then the Commissioner
and Parliamentary Secretary
for Police and Emergency</span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Services, Steve Cansdell,
presented the Awards. At this

Group Captain Mark Hoskinson
Bland Temora Zone, Region West
Late in the afternoon of 21
December 2007, following
heavy rain in the area, Mr
Hoskinson was advised that
a mother and her three young
children were stranded in
their car on a causeway.
Mr Hoskinson drove to a
neighbour’s property in failing
light and torrential rain where
he swapped his utility for
a tractor.
The floodwaters intensified
to the extent that water was
penetrating the cabin and
the tractor was being pushed
sideways. Mr Hoskinson
persisted with the search in
these dangerous conditions
and eventually found the
vehicle with the family still
inside with water lapping the</span></p><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">windows and seeping under
the doors. Aligning the tractor
with the car, he got everyone
out through the windows and
into the cabin of the tractor
and drove them to safety.
Mr Hoskinson then received
advice that two men were
also stranded in their utility.
He drove the tractor to the area
and found the men trapped
with water up to the windows
of the vehicle. He placed a
winch cable on their stranded
vehicle and pulled them
to safety.
Mr Hoskinson’s actions in
rescuing six people stranded
in floodwater under dangerous
conditions were in line with
the best traditions of the NSW
Rural Fire Service.</span></p><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">The Commissioner’s Commendation for Service (Individual)</span></p><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Commissioner’s Commendation for Service (Individual)</span></p><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Firefighter Christopher Smith

members</span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Young Members
take a stand
By Amanda Scott,
Acting Youth
Development Officer</span></p><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">After a State-wide search, the NSW Rural Fire Service has appointed
nine young people for the inaugural NSW RFS Young Members Group.
In March 2010 the
Commissioner, in conjunction
with the RFS/ RFSA
Membership Services
Consultative Committee,
endorsed a proposal to
establish a sub-group
specifically for young members
of the NSW RFS.
A call for nominations went
out and 18 outstanding
applicants from brigades across
NSW were invited
to attend a leadership and
training program in Sydney.
Of these 18, nine were selected
to form the inaugural Young
Members Group. The Group
members are:
Elise Tasker (Chair)
Jason Conn (Deputy Chair)
Petia Grear
Stephanie Nadalini
Tiffany Outridge
Shane Hole
Lawrence Knight
Patrick Mooney
Christian Yanni
(RFSA representative).
These nine were selected for
their leadership potential and
their ability to represent the
diversity of young volunteers
across NSW. Members come
from a variety of backgrounds
ranging from those engaged
in full-time study and living in</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">metropolitan locations, to those
working full-time on farms in
remote areas. All NSW RFS
regions are represented on
the Group.
The Group will meet regularly
to discuss matters pertaining
to the young members of the
NSW RFS. Their primary role
is to advise the Membership
Services Consultative
Committee and to provide
advice to other business areas
of the NSW RFS. The delegates
are appointed for a one year
term, after which there will be
an opportunity for other young
members to apply for selection.</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">First Young Members
Forum in Bathurst
At their first meeting in
December 2010 the Group
agreed that their priority was
to consult with other young
members. Consequently the
inaugural Young Members
Forum was held in Bathurst
in late April 2011 with over
60 members attending.
The young members’ energy
and enthusiasm attracted a
lot of interest both within and
without the Service. Over 30
mentions of the forum were
made in the media over the
two days of the forum including
a feature on the Central West
WIN TV news.</span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Chair of the Young Members
Group, Firefighter Elise Tasker
was thrilled to be promoting
the Service in this way. She
said it shows that the Service
is leading the way in embracing
everything that young people
have to offer. The media were
also interested in how many
women involved in the young
members forum.
Commissioner Shane
Fitzsimmons joined the
forum on the second day and
acknowledged the important
part young members have to
play in setting the direction
for the NSW RFS today and
into the future. He engaged
with the young members and
sought their opinion in the three
key topics they had identified
for the NSW RFS today:
communications, leadership
and bridging the gap between
young and older generations.
The Commissioner joked that,
due to the ageing demographic
of the Service, the Young
Members forum was one of
the rare occasions where he
felt old.
“By volunteering their time and
taking on a proactive role,“he
said, “our young members are
demonstrating they have the
skills, abilities and attributes to
be future leaders.”</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">The Young Members Group would like to hear from young members about their concerns,
aspirations, ideas and experiences in the NSW RFS. The Young Members Group can be contacted at:

to find out more information.</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">54 BUSH FIREbulletin // SPOTLIGHT ON VOLUNTEERS</span></p></section><hr data-dcnode-id="808"><section aria-label="Page 57" data-dcnode-id="787"><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Star</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">in the ranks</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Cadets honoured twice
on Australia Day
Cadets from the Young Shire received double
honours on Australia Day this year.
Not only did they attend the
celebrations on Darling Harbour
to receive their award for
winning the Cadet title at the
2010 State Championships,
they were also nominated for
a Community Service award
by Young Shire Council –
presented on the same day.
The Community Service award
was given to the community
service organisation or group
which has made the most
outstanding contribution in
the local community in the
past year.
Zone Manager Superintendent
Trevor Reeves says, “These
kids are a terrific example of the
young people in our community
and are not only an asset to the
RFS but an asset to our whole
community.”
Throughout the Young Shire
there are 23 junior members
spread over seven brigades.
Despite their age the cadets
from South West Slopes Zone
are veterans of local, State, and
National competitions having
represented their Zone at the
2008 State Championships in
Tweed and the 2009 National
Fire Cadet Championships
in Penrith.
With so many young members
in the area, selecting the
best team for the 2010 State
Championships became a
difficult task. Superintendent
Reeves, who helped select and</span></p><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">NSW RFS members at Llandilo Brigade are exceptionally proud
of their ‘star’ probationary senior firefighter - Sarah Earl.
Sixteen-year-old Sarah is not just a dedicated firefighter, she
is also blitzing it as a singer in the Penrith area. The photo here
shows her performing before the game at the NRL Penrith
Panthers home game at the Credit Unions Australia Stadium.
In 2010 Sarah performed twice at the NRL Panthers, as well
as the Penrith Working Truck Show and was awarded First
Place at the Penrith District Show Search for a Star Talent
Quest. In true volunteer spirit she also offers her singing
services at the local NSW RFS events.</span></p><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">train the team, says the team
managers looked for six cadets
who would work together well
as a team and have fun during
the training sessions leading up
to the Championships.</span></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Sarah joined the Llandilo Cadets in June 2007, she has been
Junior Captain and has completed her BF training. In September
2010 she became a probationary senior member. Sarah was the
team captain at the 2008 RFS Championships at Tweed Heads
and is the Captain of the team representing Llandilo Brigade at
the Dubbo Championships.</span></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">The team were given
tremendous support by their
parents, the District and by the
management team. Training

and trainers kept the focus
on teamwork, leadership
and basic skills. “We always
said this isn’t about winning

participating and gaining the

said Superintendent Reeves.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Sarah feels at home at Llandilo Brigade, given that her

Proud grandfather and Llandilo Captain Perce Denton said:
“Sarah has an exceptional voice and talent and is a great

certainly had our eyes opened
to the issues facing the locals.
Now let’s forget the fact that
you get the occasional lion,
elephant or leopard rushing
out of the bush when you have
a fire, there are other larger
challenges...
The first of these is
communications. Can you
imagine how interesting it
would make fire management
if the incident controller at the
fire could only give one SITREP
(Situational Report) each day
and had to drive 250km to get
radio coverage so he could
make that report? Well that is
one of their challenges.
Another is the equipment
available. Next time you think
of complaining about a hard
days firefighting have a thought
for the Botswana locals
whose main firefighting tools
are beaters made out of an
aluminium handle with a thick
piece of rubber on the end.
(See photo)</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Mother and baby on</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">bank of Chobe River</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Sandra Huer
in Kasane. Photo by</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">The
interesting
the NSW RFS
places sends you to…
By Grant Wargren,
Group Captain,
Hornsby/ Ku-ring-gai District</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">A disastrous fire season in Botswana in 2008
followed by an even more devastating season
in 2010 sparked an international response.
As well as the death of 12 villagers, the country
lost around 11 million hectares in 2008 and
near to 13 million hectares in 2010.
Encouraged and supported by the State
and Federal Governments, the NSW RFS
has embarked on five-year partnership
with Botswana titled the Botswana Fire
Management Program.
Now in its second year the program has
seen 33 NSW RFS members (including
19 volunteers) visit Botswana to offer
training. Here two members share about
their experience of being part of the program.</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">56 BUSH FIREbulletin // GENERAL NEWS</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">When I joined my local Bush
Fire Brigade in 1977 I never
expected the NSW RFS to
send me much past the greater
metropolitan area of Sydney.
In fact our old Studebaker
truck probably would not
have made it much further!
But here we are in 2011, and
the Service is sending crews
all around Australia and even
internationally, not only to fight
fires but to train firefighters.
In February 2011 three of
us, Superintendant Bryan
Daly, Inspector Steve Prior
and myself, Group Officer
Grant Wargren, departed for
Botswana to undertake training
on fireground management
and ICS (Incident Control
Systems) for members of the
Department of Forest and
Range Resources, police,
military, Department of Wildlife
and others in Botswana.
Our first stop was Maun in
the north west of Botswana.
We had a week there and ran
several two-day workshops
which were attended by a
great diversity of people, some
of whom had driven half way
across the country to attend
- so keen is their desire to
learn. They were an interesting
bunch. Some were field staff
who fought the fires in 2008
and some were highly-ranked
civil servants, responsible
for the administration of
whole districts.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">After our week in Maun,
we headed to the capital of
Botswana, Gaborone, where
we conducted a further
two workshops. One of the
workshops was attended
by the President’s Scientific
Committee for Disaster
Management and the other by
police and some members of
the military. These workshops
were very different to the
ones in Maun and gave us an
insight into the higher level
challenges the country faces
in putting together an effective
fire management structure.
One key discussion focussed
on how to develop a culture
of volunteering in Botswana.
It will no doubt be the subject
of future cooperation between
the NSW RFS and Botswana.
All up it was a fascinating trip
and gave us a real insight into
the issues facing Botswana.
I hope that it also provided a
constructive introduction for
them on how to organise a
fireground and how the ICS
used by the NSW RFS so
successfully, can assist them.
More specialised training
in ICS is planned for the
coming years.
On the weekends there were
some great opportunities to
see some of the wonders of
Botswana. We managed to
spend a few very long days
seeing the local wildlife, driving
around fire breaks and seeing
the sights on offer. It was a
wonderful experience and
certainly not one that any of
us ever even dreamt of when
we first joined up.</span></p></section><hr data-dcnode-id="766"><section aria-label="Page 59" data-dcnode-id="751"><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">africa time</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">By Sandra Huer, Senior Deputy Captain, Oaks Flats Brigade</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Imagine the challenge
of fighting fires in
a largely desert
landscape, where
lions may snack on
you, elephants and
rhinos may stomp on
you and crocodiles are
usually lurking nearby
whenever you need
water? It’s even worse
when the only tools
you have to actually
fight fires (and fend off
predators) are beaters,
shovels and branches
from the closest tree!</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">These are just some of the
many challenges I came to
appreciate after spending two
weeks in Botswana as part of
the NSW RFS program being
assisted by AusAID.
I was like an excited school kid
after receiving confirmation
that I was selected as a part of
the project and would be given
the opportunity to explore and
experience a vastly different
culture and way of life.
My preconceptions of Africa
were of deserts, poverty and
a lack of running water and
infrastructure. As a result I think
I packed half my local chemist
shop! But as it turned out,
I was misinformed - Botswana
is developed and wealthy.
The Botswana Fire
Management Program is
focusing on developing
firefighting capability, strategic
fire management and fire line
decision making in Botswana.
To achieve these goals NSW
RFS members have delivered
training in ICS, basic firefighter
skills, and are assisting to
develop an entirely new fire
management structure within
Botswana’s Department of
Forestry and Range Resources
(DFRR).
The project is being
implemented by using a
progressive layered approach,
with individual teams travelling
to Botswana and building on
the previous team’s work.
The real challenge is how to</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">impart 100 years of firefighting
management experience
without the natural and gradual
organisational learning that the
NSW RFS has experienced.
The current success of the
project, marked by the training
of over 1,000 firefighters across
the country and significant
money being invested by the
Republic of Botswana, will
only really become apparent
once effective control and
containment of fires occurs.
Animals are a large part of
the psyche of the community
and provide income and
employment through tourism.
Driving in Botswana can be
interesting, dodging donkeys,
goats, cows, baboons and
elephants on the roads.
The Batswana people live
harmoniously with the animals
and animals roam freely in
and an around villages and
towns. A particularly uniqueto-Africa story was relayed
to me while I was over there.
One day a large Mamba
snake was apparently known
to be crossing the main road
between two large towns in
the north of Botswana.
To protect the snake, the road
was closed for 40 minutes.
I cannot imagine that happening
in Australia.
I spoke to some firefighters
in northern Botswana and
asked them what it was like to
fight fires amongst predatory
animals such as lions that might</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">like to eat you. One of them
earnestly replied: “When you
put out the fire and turn to
realise a lion is under the tree
watching you, you know he is
your friend if you haven’t been
eaten.” I guess that is a simple,
but sound enough, basis for
friendship.
The Batswana people are
very proud and friendly, they
want to get to you know
you. When walking around in
towns we stood out because
of our strange uniforms and
white faces, but people would
stop and want to know who
we were and what we were
doing in Botswana. I felt proud
to explain about the role of
Australia and the NSW RFS
in particular.
