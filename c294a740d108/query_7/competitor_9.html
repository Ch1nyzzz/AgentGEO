evolved over the past 100 years or so, the Service continues to develop and adapt
to the times.
One of the most enduring changes in recent decades has been the growing role
of women in the Service. Whereas only a few decades ago it may have been
somewhat uncommon to see women on the frontline, the NSW RFS now has one
of the highest rates of female participation in the emergency service sector, with
close to a quarter of our membership being women. While there is still more to
do, this is a major achievement which was recently celebrated in a new publication,
Making a Difference: Women in the NSW Rural Fire Service.
From the Service’s beginnings more than a hundred years ago, our role has also
evolved, with a strong focus on protecting the community before the big events
by working together to improve the level of protection.
Take for instance our adaptation of the Community Fire Unit program, which
is seeing 120 units rolled out to communities across the State. This is another
way we can engage with our communities and assist them in understanding
and preparing for the threat of fire. Another example of this is our continued
focus and investment in hazard reduction and in this edition of the Bulletin,
you will see some of the great work achieved in this area by our members.
The evolution of the NSW RFS continues with the development of new
technology. The Service is in a period of significant change with the establishment
of the Computer Aided Dispatch System which will transform the way our
brigades are dispatched to incidents. Also, a major upgrade of radio and paging
networks is underway.</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">IN THE NSW RURAL FIRE SERVICE</span></p><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Just as our communication systems are changing, so too is the way we’re
communicating with our people and the broader community. We’re making a more
concerted effort to move into the online world, including the use of social media
and online technologies, like Facebook and Twitter. I am even having a crack
at it, with my own Facebook page at www.facebook.com/rfscommissioner,
sharing some of my experiences as I travel around the State and meet members.</span></p><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">community and environment</span></p><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">New technology also means a new opportunity for developing the skills of our
members and Learning and Development have embraced online technology
with the launch of e-learning programs such as online safety inductions for new
members, allowing people to complete this training at their own pace at any time
of the day. This is a significant step forward in making NSW RFS training more
flexible and accessible to all members.</span></p><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">WE VALUE</span></p><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">support, friendship and camaraderie
knowledge and learning

development of new online forums in the coming months.
Finally, just as there is change in the NSW RFS, there’s also been a change
in government in NSW. I would like to take this opportunity to welcome the
Honourable Michael Gallacher MLC to the portfolio of Police and Emergency
Services. The Minister is no stranger to the Service and bush fires and has
made it known quite clearly that he is a strong supporter of the NSW RFS
and its members.

appointment as the new Minister for Police and Emergency
Services.
He addressed over 150 managers and senior volunteers at
the inaugural NSW Rural Fire Service Leadership Forum in
Bathurst at the end of April.
The Minister expressed his respect and support for the NSW
RFS, all of its members and the role they play in protecting
communities throughout NSW.
He explained that as a young police officer on the Central
Coast of NSW he witnessed first hand the devastation of the
bush fire emergency over the Christmas and New Year period
in 1993/ 94.
“I was so impressed by the bravery shown by volunteer rural
firefighters,” he said.
The Minister is also a regular volunteer with his local Surf Life
Saving Club and has a genuine appreciation and respect for
volunteering and volunteers.
Minister Gallacher takes a direct and proactive approach
to his work saying: “What you see is what you get.”
“I plan to drop in unexpectedly to brigades and fire control
centres across NSW but there is no need for morning teas,”
he said. ”I want to meet people doing what they do every
day and hear about their concerns.”</span></p><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">, Volunteer Relations</span></p><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Welcome to the Minister for Police and

Minister</span></p><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">GUNDAGAI STUDENT wins</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">cadet of
the year
Gundagai High School student James Petty is the 2011 NSW
RFS Cadet of the Year.
The announcement was made by the new Minister for Police
and Emergency Services, the Hon Michael Gallacher in a
special ceremony at NSW Parliament House in May 2011.
“It is my pleasure to announce that the 2011 NSW RFS Cadet
of the Year is James Petty from Gundagai High School.”
After presenting the award to James, the Minister escorted
him to the floor of Parliament where it was announced
formally to the other Members of Parliament.
James’ parents Lynda and Ian were also present at the
ceremony along with his siblings.
James Petty completed the Secondary Schools Cadet
Program at Gundagai High, as a Year 8 student with an
exceptional degree of energy and commitment.
James has also been involved in assisting the SES with flood
notices and sandbagging during the recent foods in Gundagai
and as well as fund raising for a local cancer assistance
network.
The NSW RFS Cadet Program started at Gundagai High in
2010 largely thanks to the tireless work of Tumblong Captain
Brian Lewin. So far over 50 students from Gundagai High have
participated in the program.</span></p><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Photo by Jacqueline Murphy, Organisational Communications</span></p><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">The NSW RFS Cadet of the Year award is open to students

State Emergency
Management Committee</span></p><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">The former NSW RFS Commissioner Phil Koperberg AO
AFSM BEM has been appointed as the new Chair of the State
Emergency Management Committee.
Premier Barry O’Farrell told the NSW Parliament in May that
Mr Koperberg was a standout candidate, and would ensure
NSW received the best advice in preparing for and responding
to emergency situations across the State.
“We have seen this year - through the floods in Queensland and
the earthquakes in Christchurch and Japan - the importance of
having the best possible strategic advice on dealing with natural
disasters,” Mr O’Farrell said.
“When it comes to providing advice on the best way to deal with
natural disasters and emergencies there is no better-credentialed
candidate than Mr Koperberg.”
The State Emergency Management Committee is responsible
for advising government on the State’s emergency response
strategies and ensures that NSW has a robust system to cope
with emergencies and hazards.
Mr Koperberg joined the NSW RFS in 1967 as a volunteer and
progressed through the ranks to become the Service’s first
Commissioner in 1997. In his long career in the Service he
had been the Director-General of the Department of Bush Fire
Services and the Commissioner of Bush Fire Services.</span></p><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Phil Koperberg speaking at the
International Wildfire Conference in 2009</span></p><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Communications’
gets
backbone adjustment
NSW RFS Group Manager
Mobile Assets and
Infrastructure, Chief
Superintendent Bruce
McDonald recently announced
two exciting projects to
upgrade the paging and
radio networks.
The reliability of communication
systems, such as paging and
radio networks, is critical
for the effective operational
activities of NSW RFS
volunteers and staff. The
systems cover 95 percent of
geographic NSW and are used
to minimise the impact of bush
fires and emergency incidents
on people, the environment and
the economy.
“It is essential for the NSW
RFS to upgrade these networks
as they approach the end of
their practical life,“ he said,
“So we are launching the</span></p><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Statewide Emergency Paging
Network Upgrade and the
Radio Networks Upgrade.”
The projects are collectively
referred to as the
Communications Systems
Upgrade Program and they will
run for just over three financial
years from 2010/11 to 2013/14
with infrastructure replaced
progressively.
“Paging systems will be
upgraded to replace ‘single
broadcast technology’ with the
latest simulcast technology
and operating systems will be
standardised across NSW.
“Radio systems will move to a
newer digital P25 technology,
providing added capabilities and
resilience and enabling us to
adapt the system to the
changing and developing needs
of the organisation,” he said.</span></p><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Radio technology assessments
to determine the most
appropriate product for a
Statewide solution will be
completed by June 2011 and
then a detailed implementation
program will be developed.
“It is important to point out that
the Program is about upgrading
the backbone communications
infrastructure, not the</span></p><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">radio handsets or pagers
themselves, and planned
maintenance will continue as
normal,” Chief Superintendent
McDonald said.
More information and
schedules will be provided
as the upgrades progress.
To request additional
information please email
comms.upgrade@rfs.nsw.gov.au</span></p><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">BUSH FIREbulletin // IN FOCUS 5</span></p></section><hr data-dcnode-id="1916"><section aria-label="Page 8" data-dcnode-id="1895"><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">ASSUME THE POWER IS ON:
EVEN IF YOU HAVE TURNED IT OFF
A cautionary tale</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">By Andrew Macdonald, Deputy Group Captain,
Macarthur Zone</span></p><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Main
Fuse Box</span></p><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Secondary
Fuse Box</span></p><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Solid
Colorbond
fence
New
House</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Shed
destroyed
by fire</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Power Supply
At approximately 0930hrs on 18 May 2010 the
NSW RFS received a call to a structure alight
at Bringelly, south west of Sydney. A number
of NSW RFS brigades were responded and
together with the assistance of FRNSW the fire
was extinguished. The shed and its contents
were substantially damaged.</span></p><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">No one was at home during
the initial stages of the
incident, however, it was
obvious that the shed had
power supplied to it due to
what appeared to be melted
electrical fittings on the walls
and melted light fittings on the
underside of the shed roof.
As there was no fuse box
attached to the shed, the
Officer In Charge correctly
decided to turn off all power
to the house located on the
same block as the shed.
(Refer to in the attached
diagram as New House
and Secondary Fuse Box).
There was a solid 1.8m high
fence running between the
property affected by fire and
the neighbouring property.
The two blocks of land did not
appear to be related to each</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">6 BUSH FIREbulletin // INCIDENTS</span></p><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">other and both had separate
entrances and mailboxes.
After the fire was extinguished,
the next door neighbour turned
up and informed us that he
owned both blocks of land. He
said that the power supply for
the shed which had caught fire
came from his house through
a direct underground supply.
In fact his house had two
separate underground supplies
â&amp;amp;#x20AC;&amp;amp;#x201C; one to the new house and
one to the shed.
The fuse box at the New
House which the Officer
In Charge so diligently turned
off, did not control or supply
power to the shed affected
by fire. While we all thought
that we had isolated the power
to the shed, it turned out that
we hadnâ&amp;amp;#x20AC;&amp;amp;#x2122;t! Luckily, no one
was injured.</span></p></section><hr data-dcnode-id="1894"><section aria-label="Page 9" data-dcnode-id="1879"><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">a purrfect</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">rescue
By Leigh Pilkington, Captain, Avoca Beach Brigade</span></p><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">For me it is one more
validation as to exactly why
I am a firefighter and why
I dedicate my time to the
Avoca Beach Brigade and
to the NSW RFS.
It was a cold night on 3
April 2011 when a call came
through to assist NSW Police
‘with a ladder’ at an address
in Avoca Beach.
Without any further details to
go on, Avoca 1, Copacabana
Pumper and Group 8 were all
dispatched to the incident.
Avoca 1 arrived on scene
and soon found out that our
assistance was required
to rescue a cat that was
stuck ten metres up a large
eucalyptus. There were
some very worried owners
waiting below as the cat had
been up there for 36 hours.
After seeing just how high
up the cat was, I requested
that Copacabana Pumper
continue proceeding to the
scene - their long ladder
was definitely needed on
this one!</span></p><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">ABOVE: This is me with my brother. I am the one with a pink nose.
:) x thanku.
top: Chris Douglas (above) and Christian Yanni 10 metres up to
rescue Porridge. Photo by Leigh Pilkington</span></p><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">After crews worked quickly
in the dark to erect and
safely foot the ladder, Chris
Douglas and Christian Yanni,
from Copacabana Brigade,
worked together to secure
the ladder to the tree in a
number of places. The two
then worked as a team, Chris
on the high side working to
remove the cat and Christian,
a rung below him, providing
support and safety. The
cat was frightened and
exhausted and made some
rigorous noise but put up
little resistance when Chris
picked him up and started</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">the slow descent down the
ladder with the support of
Christian. It was a great
display of teamwork and
safety with Christian bringing
Chris down to the bottom
supporting his weight under
his armpits to allow the cat
to be held all the way down.
With the cat safely back on
the ground and in the care
of its relieved owners, we
all returned to our stations.
The following day, an email
from Porridge, the cat,
arrived in Avoca’s inbox:
Thank you for saving me last
night. I am very tired and my
legs are a bit sore but I am
so happy to be back with my
brother and family (minus
the dog).
You have given my family
lots to talk about at school as
it seems many friends heard
or saw you passing by their
houses. Great fun for them,
but lifesaving for me.
Purr purr purr
Lots of love
Porridge (sister of Pawl and
baby of Annabelle) xoxoxo
These are the sorts of
praise that come few and
far between to volunteers,
but when they do, they truly
remind you of why you
became a firefighter. Avoca
and Copacabana brigades
now know they have
another fan amongst their
community – and Porridge’s
human family are no doubt
thankful as well.</span></p><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">BUSH FIREbulletin // Incidents 7</span></p></section><hr data-dcnode-id="1878"><section aria-label="Page 10" data-dcnode-id="1861"><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Nine burns in four days â&amp;amp;#x20AC;&amp;amp;#x201C;
Warialda gets treated</span></p><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Inspector Brett Loughlin,
Community Safety Officer,
Namoi Gwydir Team</span></p><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">In early February 2011
firefighters from the
Namoi Gwydir Team
undertook an intensive
four-day hazard
reduction program
around the township
of Warialda.</span></p><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">The town of Warialda is rated
as Extreme in the Gwydir
Bush Fire Risk Management
Plan as it is surrounded by
dry sclerophyll forest and
has a large amount of urban
interface. The soil around
Warialda is also very sandy,
which means that moisture
dries off much more quickly
than in other parts of the
Gwydir Shire. To manage the
risk of bush fire the NSW Rural
Fire Service developed a Village
Protection Strategy which has
been implemented without
fail for many years. The wetter
than average conditions over
the past few years, however,
has meant that several planned
hazard reductions had not been
conducted.
Therefore, to catch up and
then get ahead of the program,
the four-day hazard reduction
campaign was launched.
In the month leading up to the
burns, staff from the Namoi/
Gwydir Team finalised existing
burn plans, and wrote several
new ones, to have a total of 14
low intensity hazard reductions
planned and ready to go.</span></p><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">8 BUSH FIREbulletin // INCIDENTS</span></p><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Many of these burns would not
have been possible without
the tireless work of the State
Mitigation Support Service
(SMSS) who established
control lines, fire trails, and
asset protection zones. This
allowed firefighters to show up
to each burn and start lighting
up without the need to spend
any time on preparation.
The weeks leading up to
the burns were also spent
organising volunteers and
vehicles to ensure that
enough people-power and
equipment would be present
to achieve the goals of each
burn. The volunteers of the
Namoi/ Gwydir Team were,
as always, amazing. We had
large numbers of volunteers
present on each of the four
days. Personnel numbers were
further supplemented with
SMSS crews, who crewed
vehicles alongside local
volunteers to help make up
the numbers. There was an
average of 43 firefighters on
the fireground each day and six
Cat 1s, one bulk water carrier,
two Cat 9s, and two Support
Vehicles each and every day.</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">A fortnight before the burns,
the long range weather
forecast was perfect for
hazard reduction burning:
it was going to be a week of
warm days, high humidity
and rainfall predicted for the
weekend. And the forecast did
not disappoint. Temperatures
were 38-40 degrees each
day, and the relative humidity
never dropped below 30
percent. So while other parts
of the State suffered through
TOBANs (Total Fire Bans), the
Namoi/ Gwydir Team was busy
conducting hazard reductions!</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Day One
Day One saw the resources
split into two strike teams, with
each strike team conducting
a separate burn on opposite
sides of the town. Both burns
were 15ha in size and both
were textbook low intensity
burns. Assets protected by
these two burns included the
local swimming pool, motel
and more than 20 homes.
Both strike teams met back
at the Warialda Fire Control
Centre for lunch before going</span></p></section><hr data-dcnode-id="1860"><section aria-label="Page 11" data-dcnode-id="1839"><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">their separate ways again to
conduct another two burns.
Despite the high afternoon
temperature, and one patch
in particular of excessive fire
behaviour, these two burns
were also completed and all
crews stood down by 1830hrs.
Although it had been a long and
hot day, and there had been
a minor injury, four burns had
been completed without any
major problems.</span></p><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Day Two
Day Two started with a
briefing at 0830hrs, and all
the resources were brought
together to spend the day
working on the 42ha Archery
Club hazard reduction burn. This
burn, on the north west side of
the town had not been burnt for
10 years and some patches had
very high fuel loading.
As the briefing was being
conducted, two personnel
from SMSS went ahead and
to ensure the containment
line was ready. Crews arrived
shortly thereafter and were
split into their sectors and
began lighting the fire.
During the morning Prime
News stopped in for a couple
of hours, and turned several
of our firefighters into TV
celebrities on the 6pm News.
While the news crew were in
attendance everything was
going perfectly, however,
after they left, some variable
winds arrived. There was
some ‘excitement’ with a spot
over into an area to be burnt
that afternoon. The spot over
was fought head on and after
15 minutes of hard work and
intense activity the spot over
was extinguished and crews
were able to pause to have
lunch. Prime News was very</span></p><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">disappointed that they missed
all the excitement!
During efforts to extinguish
the spot over, the danger
of burning embers was
highlighted. A Cat 1 very briefly
caught fire due to embers
landing in the crew area and
igniting a short length of 65mm
canvas hose. The crew of the
truck, who were having a wellearned drink at the time, turned
around to find smoke coming
from the crew area. The fire
was quickly extinguished
without any damage to the
vehicle - the 65mm hose,
however, was a write-off.
After lunch the remaining
area of the Archery Club was
burnt without issue, despite
a section of tricky slope and
high grass fuels. By 1730hrs
all crews were stood down,
and the 32ha burn had been
conducted in accordance with
the average prescription set by
the burn plan.</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Day Three
After a 0830hrs start, all crews
spent the day working on the
36ha West Street burn. The
burn area, on the western side
of the town, is near the local
tip which has been subjected
to repeated arson fires. The
burn area also borders several
residential streets so it was a
really good burn to get done.
This burn in particular couldn’t
have happened without the
hard work of the SMSS crews,
who cut over a kilometre of
containment line through very
thick scrub. The containment
line was so good that it was
able to be navigated by 2WD
without difficulty.
The crew from the mighty
Stonefield Brigade had a
bumpy start to the day,</span></p><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">experiencing some early
‘traction’ issues – which were
quickly resolved before the
crew went straight back to
work! Crews worked so well
on this burn, despite the 39
degree temperature, that it was
all finished by 1430hrs. All the
personnel were so dedicated
that as soon as that fire was
finished, a majority of the units
were sent to the West Warialda
Parking Area to conduct
another burn.
With two units remaining
behind to patrol and mop up,
everyone else arrived at the
parking area to commence the
18ha grassland burn. When
the Strike Team arrived we
discovered the most dedicated
parking area campers ever.
They were set up on the edge
of the parking area, so when we
explained our desire to conduct
the burn they simply packed
up, moved the 4WD and
caravan into the middle of the
parking area and watched the
firefighters at work! As soon as
the area they had been in was
extinguished they moved right
back and were set up enjoying
a cold drink without a single
complaint.
Traffic control was conducted
on the Gwydir Highway and
the burn was finished and
mopped up by 1830hrs. For
most crews that was the end
of the day, however, several
personnel from SMSS, and a
tanker of local volunteers went
back to the West Street burn
and dealt with a large tree
near a road. These dedicated
personnel finally made it home
by 1930hrs.</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">to an area 20kms outside
Warialda which had been part
of the Roadside Vegetation
Management Trial. Eight
hectares was burnt, with crews
working hard conducting the
burn and managing the traffic.
All personnel arrived back in
Warialda at 1215hrs, and then
after filling up with water met
at Stephen Street to conduct
the last burn of the day. The
1ha burn was on Crown Land
that backed onto eight homes
and three businesses.
Crews worked until 1500hrs
before all personnel were sent
to the Warialda Swimming Pool
for a debriefing and rehydrating
session! The Pool Manager
could not believe his eyes as 40
firefighters wandered through
the front gates. A BBQ lunch
was underway and everyone
enjoyed a very well-earned rest!
A final ‘debrief’ was held at the
pool so everyone could cool
down before returning home.</span></p><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Success all round
In the end nine burns were
completed and an area of more
than 150ha was treated. No
serious injuries were reported,
and despite all vehicles
suffering some degree of
damage (none too serious)
the week was a huge success.
The support of the Warialda
community was overwhelming.
Many people expressed their
thanks to the firefighters who
worked so hard to minimise
the risk to the community.
A huge thanks is owed to the
personnel listed below who
all made the Warialda Hazard
Reduction Campaign possible.</span></p><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Day Four
The last day arrived, and the
Strike Team made their way</span></p><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Thanks to:
Allan Minty, Alina Roper, Andrew Farrar, Bill Farrar, Brant Murphy,
Chris Blessington, Chris Farrar, Chris Firkins, Colin Biddle, Corey
Philip, Damian Kelly, Damien Lees, Darryal Luxford, Dave Martin,
Digit Farrell, Grahame Hicks, Greg Turner, Ian Sireet, Jillian Guest,
John Bateman, John Farrar, John Riley, Karen Hedges, Kim
Wells, Kode Lea’uanae, Leanne Blessington, Lynn Baker, Marcus
Mantscheff, Norm Minty, Rob Evans, Rob Gallagher,
Robin Trindall, Rodney Sweedman, Rory Firkins, Scott Mack,
Scott McPherson, Sharon Holloway, Simon Waller, Stuart Dick,
Tim Baxter, Tony Roden, Ty Saunders and Will Allport.
OPPOSITE PAGE: Two personnel from SMSS went ahead and to ensure
the containment line was ready before crews arrived to begin lighting
the fire. Photo by Graham Hicks
RIGHT: The town of Warialda is surrounded by dry sclerophyll forest
and has a large amount of urban interface. A four-day hazard reduction
campaign was held in February 2011 to reduce hazard around the town.
Photo by Graham Hicks</span></p><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">BUSH FIREbulletin // INCIDENTS 9</span></p></section><hr data-dcnode-id="1838"><section aria-label="Page 12" data-dcnode-id="1817"><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">The</span></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Firefighters’
Pocket Book
has been completely updated</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">A new fourth edition of the Firefighters’
Pocket Book is now available.
By Chief Superintendent, Alan Brinkworth AFSM,
Manager State Operations</span></p><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">A major review of the third
edition of the Firefighters’
Pocket Book, June 2008
was made subsequent to
the 2009 Victorian Bushfires
Royal Commission and the
implementation of various
operational recommendations,
together with feedback,
constructive comments and
the passage of time.
The new edition incorporates
a few significant changes,
some minor changes and
also introduces a few new
topics. A further 60,000
Firefighters’ Pocket Information
Books and 10,000 complete
Firefighters’ Pocket Books
have been printed.
Volunteer members who
have been issued with either
the 2004, 2005 or the 2008
pocket book will shortly receive
a new Firefighters’ Pocket
Book information book only to
replace the existing information
book. New members will
receive a completely new
Firefighters’ Pocket Book
including the notebook, grid
roamer and plastic cover.</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">History
In the late 1980s Paul
Macmichael, Regional Officer,
Highlands Region, assembled
a loose leaf field book
which contained some basic
information sheets, various</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">10 BUSH FIREbulletin // GENERAL NEWS</span></p><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">check lists, a note book and a
grid roamer, all in a red plastic
folder. A small number of
these were distributed around
the State. So this was really
our first pocket book. Later in
1995 a Section 41f Incident
Controller’s Checklist Pocket
Book was produced and then
in 2000, Phil Robeson
published and distributed the
Pocket Tactics, Pocket Comms
and Pocket Procedures.</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The Firefighters’ Pocket Book
In 2001, I recognised the need
for a Firefighters’ Pocket Book
and incorporated this into the
State Operations business
plan. The proposal was also
supported by the Rural Fire
Service Association and so
the long and involved project
commenced. I had not, at the
time, realised the enormous
magnitude of the task I was
about to undertake!
The first step was to establish
a list of contents which
was created in consultation
with various sections at
Headquarters, Regional
and District staff, the State
Operations Committee, various
Group Officers and a selection
of other volunteers.
A considerable amount of
research and consultation
with other agencies and
organisations ensued in</span></p><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">compiling the required
information and, of course,
it was also necessary to ensure
that service standards, policies,
procedures and training
material were consistent with
the detailed information.
A graphic artist gradually
created the pages and with
the expert assistance of our
then Media Officer, Rebel
Talbert, the layout, colours and
presentation were established
to achieve a visually attractive
and user-friendly product.
The Pocket Book, all in a
plastic cover, was created in
two parts:
1) an information section with
waterproof pages and
2) a replaceable notebook
together with a grid roamer.
While some of the information
contained is in summary
form and is a rough ‘rule of
thumb’, it is sufficient to make
operational decisions. In the
field there are a number of
important things all firefighters
need to know; from basic
safety to vehicle and officer
recognition. This information
book was designed to provide
a fast, easy reference guide to
these and other important facts
you will need at your fingertips.
The replaceable notebook
section has been produced
using ordinary paper to keep</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">the cost down so that when it
has been filled up it can easily
be replaced. You may use
the pages in the notebook in
any way you wish, but they
have been set out with a grid
for ease of writing or drawing
maps and have a series of
four pages which can be used
for each incident, plus there
are three sets of primary and
secondary assessment casualty
forms at the back.
The grid roamer is a replica
of the old Bush Fire Council
grid roamer with 360 degree
compass, corner divisions to
suit 1:25,000 and 1:50,000
scale maps and a 90cm scale
along one side.
The plastic cover was one
of the hardest things to get
right and many samples were
produced to find the best
material and the best weld,
that would not only be strong
enough but that would leave
no sharp edges.
There was a four month testing
period for the Pocket Book
taking place in the field with
particular emphasis on the
plastic pages chosen for the
reference guide. These were
tested against diesel, drip torch
fuel, foam, oil, dirt and many
other abrasive substances
found on the fireground. In the
end the only thing that affected
the printing was sunscreen!</span></p></section><hr data-dcnode-id="1816"><section aria-label="Page 13" data-dcnode-id="1787"><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">First Edition</span></p><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Second Edition</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">New Edition</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">The first 5,000 copies of the

Cargelligo. It was one of the first
four RFS CFUs in NSW. Photos by
Bernie Oâ&amp;amp;#x20AC;&amp;amp;#x2122;Rourke and Ian Maidens</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Community Fire Units (CFUs)

Women in the NSW Rural Fire Service
By Kristine Wendtmann, Making a Difference Project Officer</span></p><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Times have changed since 1970 when the 16 female active firefighters
of the Horsley Park Brigade were dubbed ‘The Panty Hose Brigade’ in a
major national newspaper article. In 2011 our total female membership is
approaching 25 percent and women are represented in roles right across
the organisation.
The wealth of practical
experience accumulated by our
female members became the
basis for the development of
Making a Difference: Women
in the NSW Rural Fire Service
– a new resource to encourage
women to join the NSW RFS.</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">“We needed to create
something which would
support female members and
which was specific to the
NSW RFS,” she said, “This
organisation has a unique
history and culture and we
wanted to reflect that.”</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Members across the Service
contributed the stories and
photos which feature in the
booklet to inspire other women
and highlight the benefits of
diversity in our membership.</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">“The aim of Making a
Difference: Women in the
NSW Rural Fire Service is to
showcase the role of women
in the NSW RFS both past
and present.</span></p><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">The resource is the brainchild
of the Volunteer Relations
and Workforce Planning Unit.
Manager of that Unit Narelle
Koteff said that traditionally,
many roles within the NSW
RFS, particularly senior
and operational roles, have
been filled by male staff or
volunteers.</span></p><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">14 BUSH FIREbulletin // Feature</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">“The booklet provides practical
information and advice on
being a member of the NSW
RFS. It also offers assistance
to organisational leaders
on how to encourage more
women to consider the
opportunities available to
them in the Service.”</span></p><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">The first step in creating the
booklet was talking to female
members about what they
thought of the idea, and how
they wanted to promote the
Service to other women. The
loud and clear message from
these initial discussions was
that women in the NSW RFS
are proud of their achievements
and proud to be part of an
organisation devoted to helping
the community. Our members
also indicated that they wanted
a resource which would:
•	 celebrate the positive
contributions of our female
members as well as pave the
way for future improvements
in gender diversity
•	 showcase the experiences
and achievements of women
in the NSW RFS
•	 be relevant to all members,
not just women.</span></p></section><hr data-dcnode-id="1652"><section aria-label="Page 17" data-dcnode-id="1649"><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">The Northern Daily Leader in

(Back row) Vikki Scanlon, Sue

main theme of the resource

why they had joined the NSW
RFS many women spoke about
wanting to make a difference to

I wanted to put something back
into the community. There’s great
camaraderie and it’s like a big family.
My husband saw me having all this
fun, so he joined too.”
Sue Taylor, Kingswood Brigade</span></p><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Making a Difference was
launched on 8 March 2011
the 100th Anniversary of
International Women’s Day.
This year the Day marked 100

the ideal opportunity to launch

It was a way of formally
recognising the women who
contribute their time, effort and
skills to the job of protecting
the community.
Commissioner Shane
Fitzsimmons launched the</span></p><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">16 BUSH FIREbulletin // Feature</span></p><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">booklet at a morning tea held
at the NSW RFS Headquarters
in Lidcombe.
“International Women’s Day
is an ideal occasion to pay
tribute to the many female
members of the NSW RFS who
contribute their time, effort and
skills to the job of protecting
the community,” he said.
“In 2011 our total female
leadership is approaching
25 percent and women are
represented at all levels of
the organisation. I’d like to
thank all of you for helping to
achieve this great result, and
for continuing to support the

Printed copies of the booklet
have been distributed across
the State and it is available on
the NSW RFS intranet, internet
and MyRFS. More copies can
be obtained by contacting
the Volunteer Relations and
Workforce Planning Unit at
volunteer@rfs.nsw.gov.au.</span></p></section><hr data-dcnode-id="1636"><section aria-label="Page 19" data-dcnode-id="1627"><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">“My husband Mark joined the Clarence Town Brigade
in 1989, and in 1991 as the Captain at the time, asked me
to run for the Secretary position at the AGM. The room was
full of farmers when I walked into the meeting and they
looked at me in surprise as if I was entering sacred
ground - I was the first female to dare do so.
It wasn’t long before I got itchy feet watching the males
jump on the truck and me staying at home organising
crews for the next shift. Also, I figured that if I ever wanted
to see my husband again I had better become a firefighter!
That of course was a first in our District as well.
I did my BF and the rest they say is history. I broke ground
for the females in the Dungog District.”
Di Bennett from Clarence Town, who joined
the NSW RFS 20 years ago, recalled her early
experiences in Making A Difference, Women
in the NSW Rural Fire Service</span></p><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Women step up
in Martins Creek</span></p><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The tiny village of Martins Creek, near Gresford in the Hunter
Valley, rallied to save its volunteer bush fire brigade early in
2010 when around 20 community members signed up for
basic firefighter training.
Of those 20 new recruits, half were women.
In May 2010 Martins Creek came very close to losing its
rural fire brigade unless a fresh injection of volunteers could
be found, as Group Captain Grahame Chevalley explained.
“Decisions had to be made whether the brigade would
continue as a functional brigade,” he said, “Membership
had deteriorated, and it was really up to the community to rally
together and decide whether they wanted to support a brigade
in their area.”
Crunch time came at a community meeting when about 30
people turned up. Of those present about 20 people signed
up for basic firefighter training and half of those new recruits
were women.
“I was really surprised by the numbers that were there,”
said Grahame Chevalley, “With a population of less than 350
it was a very good result.”
While the brigade did not deliberately set out to increase the
female membership, they did make it very clear that both men
and women were welcome and needed.
Suzette Paton, a Martins Creek stay-at-home mum, expressed
delight in donning the fluorescent yellow overalls, although she
jokes there has been talk of dying the uniforms pink.
“Once we started getting into the training and stuff it was
really interesting,” she said. “The social side is really good
(too) and we have a great time.”
Sue Coutts, one of the new recruits and pictured on the cover
of the Bush Fire Bulletin, has completed her Basic Firefighter
training.
“People need communities whether they realise it now,
or whether they realise it later on,” she said.
“When you’re living in a rural environment like this you
especially need your community.”

By Lana Andrews, Coordinator Hotspots Program with contributions by Wayne Andrews
(The Hills), Geoff Selwood (Canobolas), Jamie Bertram (Mid North Coast) and Terry Hill
(NSW RFS Aboriginal Services Coordinator)</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">18 BUSH FIREbulletin // Feature</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">A look at traditional
Aboriginal
fire management</span></p></section><hr data-dcnode-id="1616"><section aria-label="Page 21" data-dcnode-id="1601"><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">In 2010 five staff from the NSW RFS attended a Traditional Aboriginal Fire
Management workshop on Kaanji Homelands, Chuulangun on Cape York
Peninsula. The workshop was run jointly with the Chuulangun Aboriginal
Corporation and Traditional Knowledge Revival Pathways (TKRP) which
records traditional knowledge of Indigenous elders in a modern world.
The fire workshop was held
over three days and focused
on fire demonstrations, GPS
fire scar mapping and training,
flora and fauna surveying (both
traditional indigenous and
modern academic methods)
and video recording and
interviewing techniques.
The workshop aimed to share
the traditional knowledge of
the Northern Kaanju people
with those at the workshop,
and to also give participants
some new skills with new
technologies in order for them
to go back to their own country
and record their own traditional
knowledge in a similar way.
We camped at Chuulangun
Aboriginal community with
over 50 others who had come
from various Indigenous
communities in Cape York,
Torres Strait and Kalgoorlie as
well as from Bush Heritage
Australia, Torres Strait Regional
Authority, NSW National Parks
and Wildlife Service and the
NSW RFS.</span></p><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">The Northern Kaanju
People and Chuulangun
Aboriginal Corporation
The Northern Kaanju people are
traditional owners of 840,000
hectares of country on the
upper Wenlock and Pascoe
rivers in the uplands of Cape
York Peninsular.
Kuuku I yu Ngaachi (northern
Kaanju homelands) features
many important cultural sites
and landscapes including story
(or Dreaming) places. There are
also a number of sites that hold
historical value for traditional
owners, as it is at these sites
that Aboriginal people were
‘rounded up’ and held before</span></p><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">being forcibly removed from
country under the protection
and assimilation policies in the
twentieth century.
On 4 June 2008 the Kaanju
Ngaachi Wenlock and Pascoe
Rivers Indigenous Protected
Area (IPA) was officially
declared. This was the first
stage of the Kaanju Ngaachi
IPA which covers an area of
197,500 hectares of culturally,
spiritually and biologically
significant country.
The IPA is managed by
the Chuulangun Aboriginal
Corporation for the Northern
Kaanju traditional owners.
Chuulangun is located
about two to three hours
drive (depending on road
conditions) from the Cape York
communities of Lockhart River
(90 kilometres east), Weipa
(150 kilometres north-west)
and Coen (120 kilometres
south). Chuula lies within
the boundary of the former
Lockhart River Deed of Grant
in Trust lands, which in 2001
were transferred back to
traditional owner groups.
Chuula is occupied permanently
throughout the year, however
is cut off by road for up to six
months during the wet season
from November to April.
A number of land management
activities on the IPA are
undertaken by Chuulangun
Rangers which include:
•	 Fire management
•	 Weed and feral animal control
•	 Visitor management including
issuing of camping permits
and patrols of the IPA
•	 Cultural, biophysical and
water quality surveys and
monitoring;</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">•	 Preserving key wetlands,
catchments and ecosystems
of high biodiversity and
cultural significance; and
•	 Flora and fauna surveys.
Under Kaanju law and custom
the traditional owners are
obliged to look after their
Ngaachi (homelands) in a
sustainable manner. In return
their stories, which are the land,
will look after them physically,
culturally and spiritually.</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">“We all felt
that the
experience and
understanding
of the Kaanju
people and their
traditional fire
regimes was
invaluable.”
Having the opportunity to
participate in traditional
burning is a privileged learning
experience. We all felt that the
experience and understanding
of the Kaanju people and their
traditional fire regimes was
invaluable.
During the workshop numerous
fires were lit every day (and
one at night) to demonstrate
the approaches to burn
site selection, ignition and
containing fire by using natural
barriers. Most of the land
selected for burning at this
time of year is burnt when the
country is ready, not when the
people are ready - a contrast to</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">modern management.
The timing is dependant on
the grasses and whether
certain species have flowered
and expelled all their seed,
rather than just waiting for it
to have cured enough to burn.
Interestingly the containment
of fires is left to differences in
grass species and relying on the
curing rates being lower than
the grass that was targeted for
burning. No need for mineral
earth containment lines!
Instead of drip torches, stringy
bark is removed from trees
and used to start the fires
using spot ignition by one
of the elders. Other rangers
then joined the elder in lighting.
We had the opportunity
to assist in lighting up and
watched as low intensity burns
moved through the grasses,
assisted by mild winds.
The management of the land is
something that comes naturally
to Kaanju ‘Old Man Dundee’,
one of the elders at the
workshop. The Old Man called
the shots at each burn and all
of the Kaanju mob followed
his lead. His connection to
the country was obvious to
everyone; he seemed to be
part of this land, not simply
a man walking through it. The
Old Man approached each fire
in a spiritual way, talking to the
land before lighting anything
to ensure that the land was
indeed ready to be burnt. This
intimate connection with the
land comes from years of
walking the country. The elders
at the workshop have spent
many many years observing the
cycles of nature. The workshop
is a way that they are passing
this knowledge onto future
generations.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">BUSH FIREbulletin // Feature 19</span></p></section><hr data-dcnode-id="1600"><section aria-label="Page 22" data-dcnode-id="1585"><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">TOP LEFT: Dr Tommy George (Kuku Thaypan Elder). TOP RIGHT: Old Man Dundee (Elder) lighting a burn at Chuulangun with stringy bark removed
from trees. Photo by J. Bertram LOWER LEFT: Kaanju Ngaachi homelands sign. LOWER RIGHT: NSW RFS members with some of the workshop
leaders (L-R): Lana Andrews, Geoff Selwood, Gordon (Chuula Ranger), Wayne Andrews, Jamie Bertram, Tommy George (Elder) and Terry Hill at
Chuula Photos by Jamie Bertram, Lana Andrews and Wayne Andrews.</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">“The elders at

way that they

this knowledge
onto future
generations.”</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">The Kaanju Homelands
landscape
The country of Cape York
is quite different from most
vegetated areas in NSW.
With open savannahs
dominated by grasses, the
country is called sandridge and
consists mainly of sand with
small amounts of clay. The
dominant grass species include
giant spear grass, cockatoo
grass and annual fire grass.
The dominant tree species
include bloodwoods and
stringybarks (amongst others)
and termite mounds are
scattered across the landscape.
The grasses are important
as a food source and habitat
for many fauna species and
have cultural significance for
the traditional owners. As an
example, the seeds of fire grass
are an important food source
for the Golden Shouldered and
the Hooded Parrots. Ants also
collect the seeds in piles to
build their nests.
The traditional owners at the
workshop stressed that the
burning of fire grass at the
incorrect time of year will cause</span></p><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">20 BUSH FIREbulletin // Feature</span></p><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">the vegetation to become
shrubbier which, after several
years, will cause the fire grass
to die out. This drastically
reduces the food available for
the local fauna. The increase
in a shrubby layer also increases
fuel loads and therefore the
likelihood of more intense and
less controllable fires.</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">The contrasts between
traditional and modern fire
management
The fire management practices
of the Kaanju people are in
contrast to the way in which
much of NSW is managed.
Burning for the needs of the
landscape is interwoven with
cultural beliefs and the living
requirements of the traditional
owners. Unlike NSW, parts
of the Cape are burnt every
year with the open savannah
maintaining its health through
this regime of burning.
Kaanju land management is
focused on the health of the
country whereas in modern
methods, consideration of
the land as a resource for
commercial gain is also
important. David Claudie,</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">a traditional owner and CEO
of the Chuulungun Aboriginal
Corporation, was one of the
elders sharing his knowledge
of country at the workshop.
David is a man of measured
words and when sharing
his thoughts on fire and its
application for regeneration
of the country he said: “It’s
not just about fire, it’s about
everything, the trees, the
grass, the animals, the soil.
It is not just about fire.”
Traditionally burning has
been used for a wide range
of complex purposes. After
a burn the new shoots of
regeneration on plants attracts
animals which can be hunted.
Burns also remove older plants,
encourage new growth and
allow easy access to land by
foot. The smoke from the
burns was used for signalling,
ceremonies and as a natural
insect repellent. The hot ash
produced by the fires was
used medicinally.
The way country is burnt also
incorporates traditional beliefs.
For example, burns which are
low in intensity do not damage
canopy foliage, which they</span></p></section><hr data-dcnode-id="1584"><section aria-label="Page 23" data-dcnode-id="1533"><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">ABOVE: Old Man Dundee at Chuula burn. Photo by Wayne Andrews</span></p><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Traditional Practices</span></p><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Modern Practices</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">believe should never be burnt
as the toxins released have
adverse effects on humans.</span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Know the vegetation types
(through observation and
passing down of knowledge)</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Identify the vegetation types</span></p><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Learn from the elders
when to burn</span></p><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Burn when fuel loads dictate</span></p><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">In learning the traditional ways
of fire management, differences
and similarities could be seen
with modern management
practices. Some observations
were made and can be seen in
the table to the left.</span></p><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Burn for the health of
vegetation, which will protect
assets, as fire will not travel</span></p><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Reduce fuel loads to
protect assets</span></p><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Burn country to refresh the
land so all flora and fauna will
benefit</span></p><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Burn within the stipulated
time limits as per legislation</span></p><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Burn annual grasses/low shrub
layer at the correct time</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Burn for the best results to
maximize asset protection</span></p><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Burn with the wind to allow
fauna time to escape based on
direction of smoke drift</span></p><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Burn against the wind to
reduce ground speed of
the fire</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Burn fine fuels only</span></p><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Burn fine fuels and some
larger fuels due to time lapse
of the fire front</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Keep soil cool</span></p><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Warm soil to allow seeds
to germinate</span></p><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Transfer knowledge of the
burn sites to others by word
of mouth</span></p><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Map fire grounds by satellite
and GPS technology</span></p><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Challenges into the future
There are conflicting views
between traditional owners
and government agencies on
burning regimes in the Cape.
Traditional owners are working
closely with their neighbours
and land managers, however,
to ensure collaborative fire
management into the future.
Indigenous peoples in
northern Australia are
extremely concerned about
the maintenance of their
culture. Traditional owners
living at Chuulangun have
repeatedly expressed concern
at the rate at which elders
and knowledgeable people
are passing away and the
consequential loss of local
indigenous knowledge
and language. The loss of
this unique and important</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">knowledge, along with the
loss of linguistic diversity, is
as significant to Cape York
ecologically as are the current
physical changes threatening
biodiversity.
These workshops are definitely
a positive step toward
preserving that knowledge and
sharing it with indigenous and
non-indigenous fire managers.
Our chance to spend time with
the Kaanju mob was indeed
a rewarding and enriching
experience. To be able to see
a different way of using fire
opened our eyes to a practice
that is thousands of years old.
There are many more things to
be learned from our indigenous
friends and there are plans to
hold similar workshops in parts
of NSW.

response
An overview of the
Computer Aided
Dispatch - Incident Response
System Project
By Mariell Taylor, Senior Project Officer,
CAD-IRS Scoping Project</span></p><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">22 BUSH FIREbulletin // GENERAL NEWS</span></p></section><hr data-dcnode-id="1526"><section aria-label="Page 25" data-dcnode-id="1513"><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The unusual pink light at this fire in Long Point in February 2011 was produced by the
unique mix of smoke and emergency lights. Photo by Anthony Clark, Media Services</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Dispatching resources in
response to Triple Zero
(000) calls is part of the daily
business of the NSW RFS.
While most Australian fire
agencies have converted to
a Computer Aided Dispatch
(CAD) system, the NSW
RFS continues to dispatch
its fire trucks and personnel
using a manual system. The
Service is currently analysing
the possibility of making the
change to CAD as well.
The CAD technology would
assist in identifying the nearest,
most, appropriate appliances to
respond to reported incidents.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Once identified, the brigades
would be notified from a
central Communications Centre
(ComCen), and once â&amp;amp;#x20AC;&amp;amp;#x2DC;on airâ&amp;amp;#x20AC;&amp;amp;#x2122;
will be dispatched to the
incident. This technology would
replace the manual processes
currently in place.
The use of this technology in the
NSW RFS, which would be one
of the biggest changes to the
Service for many years, has been
made possible by an upgrade of
the CAD system at the Fire &amp;amp;
Rescue NSW (FRNSW).
FRNSW recently gained
government approval to replace
their current CAD system.</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Funding for the new system
was contingent on them
making the software available
across the whole emergency
services sector. As a result the
NSW RFS now has access to
the latest CAD software.
The Service is now engaged
in a thorough and complete
analysis of the suitability of the
CAD system for the NSW RFS.
The Service needs to identify,
review and, if the project is
approved for implementation,
develop the required policies,
systems, practices and training.
It is important to note that
the Service we will not be</span></p><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">implementing CAD until a full
analysis of these issues has
been completed.
The Scoping Project engaged
in analysing the requirements
of the CAD system is titled:
Computer Aided Dispatch Incident Response System
(CAD-IRS). It is a long title
and acronym but it seeks
to acknowledge both the
technological component
as well as the operational
processes, procedures,
protocols, roles and
responsibilities involved.</span></p><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">BUSH FIREbulletin // GENERAL NEWS 23</span></p></section><hr data-dcnode-id="1512"><section aria-label="Page 26" data-dcnode-id="1493"><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">CAD-IRS is designed to
improve incident receipt,
notification and response by:
•	 Implementing a consistent
system across the State
•	 Reducing workload and
improving the quality of life
for staff and volunteer
Duty Officers
•	 Speeding up response
notification times by reducing
the number of steps in the
process
•	 Automatically recording
incident data on both NSW
RFS and FRNSW CAD
systems simultaneously to
assist in identification of
appropriate appliances
for dispatch
•	 Automatically recording
incident information to
assist brigades in post
incident reporting
•	 Providing dedicated dispatch
personnel operating in
a specialist operating
environment.
The FRNSW along with most
other Australian fire agencies
have been using CAD systems
for many years. All have
learned lessons along the way,</span></p><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">24 BUSH FIREbulletin //GENERAL NEWS</span></p><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">and part of the Scoping Project
Team’s role is to gather those
lessons to ensure the greatest
opportunity for success for the
NSW RFS.
The NSW RFS CAD-IRS
Program comprises two
projects, namely:
•	 Project 1 – CAD-IRS
Scoping
•	 Project 2 - CAD-IRS
Implementation</span></p><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">1. CAD-IRS Scoping
The Scoping Project is being
undertaken from 2010 to 2012.
The issues and factors to be
considered by the project
include:
•	 The CAD-IRS business
model and process
•	 The design and configuration
of a suitable NSW RFS
Communication Centre
(ComCen) for incident
dispatch
•	 The structure of the NSW
RFS ComCen and District
staff roles
•	 The relationship of the CADIRS to the future Operations
Management System</span></p><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">•	 Communication requirements
including radio, paging and
telephony systems
•	 Doctrine, policy and
procedural changes
•	 The data requirements
for a CAD-IRS
•	 Change management
planning and communication
with stakeholders (including
NSW RFS staff and
volunteers).
•	 Identifying potential changes
to staff terms and conditions
of employment
•	 Potential training
requirements
•	 Arrangements for disaster
recovery and business
continuity management
•	 Options to be considered
with complete costs finalised
•	 Proposing an implementation
schedule.</span></p><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Trial in the Mid North
Coast Team
As a component of Project 1,
the Commissioner has directed
the implementation of a trial
dispatch and communication
project in the Mid North Coast
Team. This Team, based around
Coffs Harbour and Bellingen,</span></p><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">already uses a commercial
call centre so they already have
significant experience in the
use of centralised dispatch.
While we won’t be using a CAD
system in this trial we will be
able to ‘test the waters’ for a
centralised incident notification
and dispatch process in
an NSW RFS operating
environment. The trial will
take place in July 2011.</span></p><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Business Representative Groups
In mid to late 2011 the Project
Team will establish a number
of Business Representative
Groups. Each group will be
responsible for developing the
Service’s position in a given
key area. These Business
Representative Groups will
comprise 35 salaried and
volunteer representatives from
across the Service including
key business units from
Headquarters, Regions and
Districts.</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The story so far
A considerable amount of work
has been already undertaken
within the scoping phase of the
project, including:</span></p></section><hr data-dcnode-id="1492"><section aria-label="Page 27" data-dcnode-id="1471"><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">•	 Visits to other organisations
in the ACT, Queensland,
Victoria, South Australia as
well as NSW to view their
CAD systems
•	 Development of draft CADIRS response processes and
business requirements
•	 Participation in the
configuration and
establishment of the FRNSW
CAD system
•	 Researching Communication
Centre designs and layouts
•	 Preparation of draft papers
to determine the potential
radio, pager and telephony
requirements as well as
the resources required for
technical support.
The CAD-IRS Scoping Project
is a significant initiative for
the Service and much work
is required to meet the current
target of developing a report
to the NSW RFS Executive by
mid-2012.</span></p><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">2. CAD-IRS
Implementation
If it is approved, the
Implementation Project will be
a phased roll-out over several
years. The implementation
of a CAD-IRS will be a
significant change to many
of the Service’s customs and
practices and it is important
not to unnecessarily rush the
change if people or operating
systems are not ready.
In Year 1, the Project Team
will be starting with a number
of pilot Districts and this will
be followed by the first of the
phased implementation.
The phased implementation of
CAD-IRS would be undertaken
over a period of four to five
years following the pilots.</span></p><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Need more information?
For further information and to
view some Frequently Asked</span></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">The CAD-IRS process:
How it could work in the NSW RFS</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Questions check the CAD-IRS
Project page on MyRFS and the
NSW RFS intranet. You can also
contact the CAD-IRS Project
Team at: CAD@rfs.nsw.gov.au.</span></p><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Opposite page: Some typical
CAD displays, showing a list of
incident locations and map views.</span></p><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">One of the largest programs
ever undertaken
The community of NSW
relies on the NSW Rural
Fire Service to provide
help and support under
difficult circumstances.
Some of the most
critical portions of an
incident are when they
first occur, and the more
quickly emergency
services can respond
and attend, the more
likely the problem will
be speedily resolved.
As with all public
sector organisations,
the community
expect continuing
improvements with
the service we provide.</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">For many years the Service’s response procedures have served us well. In the modern
environment, however, there are improvements that can be made. In particular, we can minimise
the number of steps required to report an incident and therefore speed up the process, we can
also provide back-up procedures and reduce the variety of systems used across the State.
During 2010, I commissioned a project to further improve on our Incident Response System
by investigating potential linkage to the new Computer Aided Dispatch (CAD) system being
implemented by Fire &amp;amp; Rescue NSW (FRNSW).
The Computer Aided Dispatch-Incident Response System (CAD-IRS) Scoping Project will
continue through to 2011/12 and will examine radio communication, paging, response policies
and procedures, workforce planning, training, communication centre design and a host of other
related factors prior to considering implementation. We are working closely with the FRNSW
to ensure we take a unified approach in order to maximise efficiencies and lower costs.
In developing this project, a broad range of views will be canvassed. Both staff and volunteers
will be represented on the Project Team as well as the Business Representative Groups which
will be set up in 2011/12. Members of the Project Team will be communicating with staff and
volunteer groups over the next year and I ask you to make use of this opportunity to contribute.
If the results of the CAD-IRS Scoping Project support implementation in the NSW RFS, it will
be one of the largest programs we’ve ever undertaken.
For further information, and to view some Frequently Asked Questions, I strongly encourage
you to have a look at the CAD-IRS Project page link on the MyRFS homepage. The Project Team
can be contacted at CAD@rfs.nsw.gov.au.
I’m confident the development and eventual implementation of the CAD-supported Incident
Response System will be a great support to volunteers as we all strive to better meet the needs
of the community.
I look forward to your participation and support of this important program.</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Shane Fitzsimmons, AFSM
NSW RFS Commissioner</span></p><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">BUSH FIREbulletin //GENERAL NEWS 25</span></p></section><hr data-dcnode-id="1470"><section aria-label="Page 28" data-dcnode-id="1463"><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Photo by Matthew Reeves, Learning and Development Officer</span></p><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">develop your

By Matthew Reeves, Learning and Development Officer</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">26 BUSH FIREbulletin // GENERAL NEWS</span></p></section><hr data-dcnode-id="1462"><section aria-label="Page 29" data-dcnode-id="1445"><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Throughout 2011 over 300 NSW RFS members will participate in
training and workshops provided through Learning and Development
Systems at the NSW RFS Headquarters in Lidcombe.
These courses and workshops
cover a range of competencies
and professional development
topics and allow for members
to gain new competencies as
well as refresh and renew skills.
Learning and Development
Systems (L&amp;amp;D) is the unit
responsible for developing
training programs and
managing the NSW
RFS Registered Training
Organisation (RTO) status.
In addition to developing the
courses that members attend
at District and Regional level,
the Unit trials new programs
prior to their wider release,
develops and facilitates
professional development
programs such as the
Certificate IV Training and
Education (TAE) upgrade, Lead
and Develop Teams (LDR)
and Monitor Brigade Safety
(SAF) programs and instructor/
assessor development
workshops. They also develop
and facilitate the Serviceâ&amp;amp;#x20AC;&amp;amp;#x2122;s
high level Command, Control
and Communication training
and Incident Management
Workshops as well as the
Incident Controller, Major
Incident program.
Throughout April and May over
25 Crew Leader Instructors
attended professional
development training. They
spent a weekend enhancing
their skills and knowledge in
Incident Control Systems (ICS),
inter-personal communications,
leadership techniques and
Crew Leader course delivery.
This workshop generated a lot
of discussion and will result
in the introduction of new
ideas that will round out the
delivery of Crew Leader training
across the State over the
coming years.
In the wake of the 2009 Black
Saturday fires in Victoria,
the L&amp;amp;D Unit, along with
Operational Services has been
working hard to analyse and
further develop our command
level training. The Research
and Development team
have recreated the Incident
Management Workshop which
is the pathway to Incident
Management qualifications
such as Planning, Operations,
Logistics and Control. This
workshop is in the process
of being piloted with senior</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">NSW RFS managers and
senior personnel from other
emergency service agencies,
including interstate agencies.
The benefits of attending
State level training programs
are numerous. In particular
the L&amp;amp;D team is dedicated to
updating the learning material
whenever there are changes to
techniques and standards.
For this reason the professional
development workshops are
an opportunity for district
instructors and assessors to get
updated on the latest practices
and knowledge. An example of
this is the Breathing Apparatus
Instructor workshops run
in 2010 and 2011. These
workshops have focused on
new concepts in the delivery of
BA training as well as advanced
structural fire behaviour
knowledge and application.</span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">August training in Village
Firefighter and Breathing
Apparatus
In August 2011 the L&amp;amp;D
team will facilitate further
professional development
workshops for members who
instruct and assess Village
Firefighter (VF) as well as
for members who instruct
Breathing Apparatus or require
the Breathing Apparatus
Operator qualification. This
is relevant for Districts that
are introducing BA in the near
future and need a pool of
members qualified to assist
with the start up, or for L&amp;amp;D
or Operations Officers who
have BA in their District
and would like to develop
delivery course skills and
gain certification. The August
workshop will be held at the
Mogo training facility, which
is part of the Far South
Coast team.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">opportunity for instructors who
have attended our advanced
workshops to practice their
delivery skills. It will also be an
ideal refresher and update for
district staff that have BAO, but
have lapsed in their currency
and need to refresh their skills
and competencies.
The workshops are challenging,
but they offer a chance for
instructors and assessors to
develop technical firefighting
and training delivery skills and
well as establish instructor/
assessor networks and develop
team effectiveness.
Nominations for the Village
Firefighter Instructors
workshop and/ or the Breathing
Apparatus Workshop and
course can be submitted
through your local Learning
and Development Officer.
Nominations close 8 July and
further information can be
obtained by calling Matthew
Reeves from Learning and
Development Systems on
8741 5210 or email: matthew.
reeves@rfs.nsw.gov.au.</span></p><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">ART program
Another major development
to come out of the L&amp;amp;D Unit
this year is the Advanced</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Resuscitation Techniques
(ART) program. Districts can
now run the ART training
program which consolidates
the former Advanced Oxygen
Resuscitation (AOR) training
and now includes Automated
External Deliberator (AED)
training. The ART program
builds on the First Aid
Application (FAA) program and
was developed with a reference
team of NSW RFS members
who have utilised their medical,
paramedical and emergency
service backgrounds. This
program puts Districts in the
position to deliver the absolute
latest in Advance Resuscitation
Techniques and compliments
the roll out of AEDs across
the Service.
For the full 2011 State training
calendar, log on to MyRFS or
take a look at the 2011 Training
Information Book, available
from your local office.
If you have any comments,
suggestions or feedback on
NSW RFS State level training,
they can be forwarded to Grant
Kingston, Supervisor, Quality
and Compliance, Learning and
Development Systems on
02 8741 5211 or email:
grant.kingston@rfs.nsw.gov.au.</span></p><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The VF workshop is aimed at
instructors and will cover topics
such as advanced structural
fire behaviour (incorporating
dolls house lesson delivery),
gas fire attack techniques,
emerging technologies such
as solar power systems and
new vehicle technologies.
