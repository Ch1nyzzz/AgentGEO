</span><article class="tg-meta-style-one post-3079 post type-post status-publish format-standard hentry category-nfpa-standards tag-nfpa-1620-pre-incident-planning zakra-single-article zakra-article-post" data-dcnode-id="318" id="post-3079"><span data-dcnode-id="1698" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">
</span></header><span data-dcnode-id="1694" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">
</span></div><span data-dcnode-id="1690" instrument_node="">
</span><div class="entry-content" data-dcnode-id="321"><span data-dcnode-id="1689" instrument_node="">
</span><div class="elementor elementor-3079" data-dcnode-id="327" data-elementor-id="3079" data-elementor-type="wp-post"><span data-dcnode-id="1688" instrument_node="">
</span><section class="elementor-section elementor-top-section elementor-element elementor-element-97ad5fe elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="329" data-element_type="section" data-id="97ad5fe"><span data-dcnode-id="1687" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="331"><span data-dcnode-id="1686" instrument_node="">
</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-3686ae7" data-dcnode-id="333" data-element_type="column" data-id="3686ae7"><span data-dcnode-id="1685" instrument_node="">
</span><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="335"><span data-dcnode-id="1684" instrument_node="">
</span><div class="elementor-element elementor-element-a5aaa00 elementor-widget elementor-widget-text-editor" data-dcnode-id="337" data-element_type="widget" data-id="a5aaa00" data-widget_type="text-editor.default"><span data-dcnode-id="1683" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="339"><span data-dcnode-id="1682" instrument_node="">
</span><h1 data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">NFPA 1620 Pre-incident Planning</span></h1><h2 data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Assembly Occupancy</span></h2><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">An occupancy (1) used for a gathering of 50 or more persons for deliberation, worship, entertainment, eating, drinking, amusement, awaiting trans­portation, or similar uses; or (2) used as a special amusement building, regardless of occupant load.</span></p><ul data-dcnode-id="1671"><li data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">A large-volume space created by a floor opening or series of floor openings connecting two or more stories that is covered at the top of the series of openings and is used for purposes other than an enclosed stairway; an elevator hoistway; an escalator opening; or as a utility shaft used for plumbing, electrical, air-conditioning, or communications facilities. \101, 20181</span></li><li data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Bulk Merchandising Retail Building. A building in which the sales area includes the storage of combustible materi­als on pallets, in solid piles, or in racks in excess of 3.7 m (12 ft) in storage height.</span></li></ul><h2 data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Business Occupancy</span></h2><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">An occupancy used for account and record keeping or the transaction of business other than mercantile.</span></p><ul data-dcnode-id="1654"><li data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Clean Agent. Electrically nonconductive, volatile, or gaseous fire extinguishant that does not leave a residue upon evaporation.</span></li><li data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Combustible Dust. A finely divided combustible partic­ulate solid that presents a flash fire hazard or explosion hazard when suspended in air or the process-specific oxidizing medium over a range of concentrations.</span></li><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Combustible Particulate Solid. Any solid material composed of distinct particles or pieces, regardless of size, shape, or chemical composition, that presents a fire hazard.</span></li><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Competent Person. One who is capable of identifying existing and predictable hazards in the surroundings or work­ing conditions that are unsanitary, hazardous, or dangerous to employees, and who has authorization to take prompt correc­tive measures to eliminate them. [1006, 2017 |</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Confined Space. A space that is large enough and so configured that an employee can bodily enter and perform assigned work; and has limited or restricted means for entry or exit (for example, tanks, vessels, silos, storage bins, hoppers, vaults, and pits are spaces that may have limited means of entry); and is not designed for continuous employee occu­pancy.</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Controlled Atmosphere Warehouse. A facility for stor­ing specialty products, such as fruits, that generally includes sealed storage rooms, with controlled temperature and air content, the most common being an atmosphere containing a high percentage of a gas such as nitrogen.</span></li></ul><h2 data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Covered Mall Building.</span></h2><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">A building, including the covered mall, enclosing a number of tenants and occupancies, such as retail stores, drinking and dining establishments, enter­tainment and amusement facilities, offices, and other similar uses, wherein two or more tenants have a main entrance into the covered mall.</span></p><h2 data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Defend in Place.</span></h2><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">The operational response in which the action is to relocate the affected occupants to a safe place within the structure during an emergency.</span></p><h2 data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Detention and Correctional Occupancy.</span></h2><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">An occu­pancy used to house four or more persons under varied degrees of restraint or security where such occupants are mostly incapable of self-preservation because of security meas­ures not under the occupants’ control.</span></p><h2 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Dormitory.</span></h2><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">A building or a space in a building in which group sleeping accommodations are provided for more than 16 persons who are not members of the same family in one room, or a series of closely associated rooms, under joint occupancy and single management, with or without meals, but without individual cooking facilities.</span></p><h2 data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Educational Occupancy.</span></h2><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">An occupancy used for educational purposes through the twelfth grade by six or more persons for 4 or more hours per day or more than 12 hours per week.</span></p><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Elevator Evacuation System. A system, including a vertical series of elevator lobbies and associated elevator lobby doors, an elevator shaft(s), and a machine room(s), that provides protection from fire effects for elevator passengers, people waiting to use elevators, and elevator equipment so that elevators can be used safely for egress. \101, 20181</span></p><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Emergency Operations Center. A fixed, designated area to be used in supporting and coordinating operations during emergencies.</span></p><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Emergency Power Supply (EPS). An electric power source of the capacity and quality required for an EPS system.</span></p><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Emergency Services Organization (ESO). Any public, private, governmental, or military organization that provides emergency response and other related activities, whether for profit, not for profit, or govern men tally owned and operated.</span></p><h2 data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Evacuation Capability.</span></h2><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">The ability of occupants, resi­dents, and staff as a group either to evacuate a building or to relocate from the point of occupancy to a point of safety.</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">A planned nonemergency activity (e.g., sporting event, concert, parade, mass gathering).</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Permanent, semi-permanent, or temporary commercial or industrial property such as a building, plant, or structure, built, established, or installed for the performance of one or more specific activities or functions including all processes performed therein.</span></p><h2 data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Facility Emergency Action Plan.</span></h2><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">A plan of designated actions by employers, employees, and other building occupants to ensure their safety from fire and other emergencies.</span></p><h2 data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Fire Alarm System</span></h2><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">A system or portion of a combina­tion system that consists of components and circuits arranged to monitor and annunciate the status of fire alarm or supervi­sory signal-initiating devices and to initiate the appropriate response to those signals.</span></p><h2 data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Fire Barrier</span></h2><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">A continuous membrane or a membrane with discontinuities created by protected openings with a speci­fied fire protection rating, where such membrane is designed and constructed with a specified fire resistance rating to limit the spread of fire, and that also restricts the movement of smoke.</span></p><h2 data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Fire Compartment</span></h2><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">A space within a building that is enclosed by fire barriers on all sides, including the top and bottom.</span></p><h2 data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Fire Wall</span></h2><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">A wall separating buildings or subdividing a building to prevent the spread of fire and having a fire resist­ance rating and structural stability.</span></p><h2 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Health Care Occupancy</span></h2><p data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">An occupancy used for purposes of medical or other treatment or care of four or more persons where such occupants are mostly incapable of self</span><sup data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">1 </span></sup><span data-dcnode-id="1592" instrument_node="">preservation due to age, physical or mental disability, or because of security measures not under the occupants’ control.</span></p><h2 data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Hotel.</span></h2><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">A building or groups of buildings under the same management in which there are sleeping accommoda­tions for more than 16 persons and primarily used by transients for lodging with or without meals.</span></p><ul data-dcnode-id="1582"><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">An acronym for heating, ventilation, and air conditioning systems and their related components.</span></li><li data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Incident Action Plan. The objectives reflecting the overall incident strategy, tactics, risk management, and member safety that are developed by the incident commander. Incident action plans are updated throughout the incident.</span></li></ul><h2 data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Industrial Occupancy</span></h2><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">An occupancy in which prod­ucts are manufactured or in which processing, assembling, mixing, packaging, finishing, decorating, or repair operations are conducted.</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">A mechanically or electrically operated platform used to work at various heights.</span></p><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Lock Box</span></h2><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">A locked container often used to store building entry keys, pre-incident plans, and/or related data.</span></p><h2 data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Lodging or Rooming House</span></h2><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">A building or portion thereof that does not qualify as a one- or two-family dwelling, that provides sleeping accommodations for a total of 16 or fewer people on a transient or permanent basis, without personal care services, with or without meals, but without sepa­rate cooking facilities for individual occupants.</span></p><h2 data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Mass Gatherings.</span></h2><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">An event expected to be attended by a sufficient number of people to strain the planning and response resources of the hosting community, state, prov­ince, nation, or region where it is being held.</span></p><h2 data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Mercantile Occupancy.</span></h2><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">An occupancy used for the display and sale of merchandise.</span></p><ul data-dcnode-id="1553"><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">On-Site Emergency Representative. The person responsible for coordinating and implementing the site emer­gency action plan during an incident.</span></li><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Permit-Required Confined Space. A confined space that has one or more of the following characteristics: (1) contains or has a potential to contain a hazardous atmos­phere; (2) contains a material that has the potential for engulf­ing an entrant; (3) has an internal configuration such that an entrant could be trapped or asphyxiated by inwardly converg­ing walls or by a floor which slopes downward and tapers to a smaller cross-section; or (4) contains any other recognized seri­ous safety or health hazard.</span></li><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Pre-incident Plan. A document developed by gathering general and detailed data that is used by responding personnel in effectively managing emergencies for the protection of occu­pants, participants, responding personnel, property, and the environment.</span></li></ul><h2 data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Pre-Incident Plan Developer.</span></h2><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">The individual, group, or agency responsible for developing or maintaining die pre- incident plan.</span></p><h2 data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Process Hazard Analysis.</span></h2><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">An analysis of a process or system used to identify potential cause and effect relationships and resultant hazards or system failures.</span></p><h2 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Remain in Place.</span></h2><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The operational response of direct­ing occupants to remain inside the structure, at their locations, during an emergency.</span></p><h2 data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Residential Board and Care Occupancy.</span></h2><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">A building or portion thereof that is used for lodging and boarding of four or more residents, not related by blood or marriage to the owners or operators, for the purpose of providing personal care services.</span></p><h2 data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Responding Personnel.</span></h2><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Personnel, whether public or private, available to respond to emergencies.</span></p><ul data-dcnode-id="1526"><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Safety Data Sheet (SDS). Formatted information provi­ded by chemical manufacturers and distributors of hazardous products that contains information about chemical composi­tion, physical and chemical properties, health and safety hazards, emergency response, and waste disposal of the mate­rial. [472,20181</span></li><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Sally Port (Security Vestibule). A compartment provi­ded with two or more doors where the intended purpose is to prevent continuous and unobstructed passage by allowing the release of only one door at a time.</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Scissor Stair. Two interlocking stairways providing two separate paths of egress located within one stairwell enclosure.</span></li></ul><h2 data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Security Vulnerability Assessment.</span></h2><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Security vulnerabil­ity assessment methodology identifies and assesses potential security threats, risks, and vulnerabilities and guides the chemi­cal facility industry in making security improvements.</span></p><ul data-dcnode-id="1517"><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Site Liaison. An individual who has in-depth operating knowledge of the site or facility.</span></li><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Sky Lobby. An intermediate floor where people can change from an express elevator that only stops at the sky lobby to a local elevator which stops at every floor within a segment of the building.</span></li></ul><h2 data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Smoke Barrier.</span></h2><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">A continuous membrane, or a membrane with discontinuities created by protected openings, where such membrane is designed and constructed to restrict the movement of smoke.</span></p><ul data-dcnode-id="1506"><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Smoke Compartment. A space within a building enclosed by smoke barriers on all sides, including the top and bottom.</span></li><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Spill Prevention Control and Countermeasure (SPCC) Plan. A plan prepared for facilities with a chemical or chemi­cals that exceed certain capacities in accordance with govern­mental regulations.</span></li><li data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Sprinkler System. For fire protection purposes, an inte­grated system of underground and overhead piping designed in accordance with fire protection engineering standards. The installation includes one or more automatic water supplies. The portion of the sprinkler system above ground is a network of specially sized or hydraulically designed piping installed in a building, structure, or area, generally overhead, and to which sprinklers are attached in a systematic pattern. The valve controlling each system riser includes a device for actuating an alarm when the system is in operation. The system is usually activated by heat from a fire and discharges water over the fire area.</span></li></ul><h2 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Standpipe System.</span></h2><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">An arrangement of piping, valves, hose connections, and allied equipment installed in a building or structure, with the hose connections located in such a manner that water can be discharged in streams or spray patterns through attached hose and nozzles, for the purpose of extinguishing a fire, thereby protecting a building or structure and its contents in addition to protecting the occupants. This is accomplished by means of connections to water supply systems or by means of pumps, tanks, and other equipment necessary to provide an adequate supply of water to the hose connec­tions.</span></p><h2 data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Storage Occupancy.</span></h2><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">An occupancy used primarily for the storage or sheltering of goods, merchandise, products, vehicles, or animals.</span></p><ul data-dcnode-id="1493"><li data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">S. National Grid (USNG). An alphanumeric point reference system that has been overlaid on the Universal Trans­verse Mercator (UTM) numerical grid. Every modest-size home in a discrete area (city) can be described using 8 digits (e.g., 1234 5678). By adding a two-letter prefix (e.g., XX 1234 5678), the location is uniquely identified regionally (statewide). The U.S. National Grid is functionally identical to the Military Grid Reference System (MGRS) used by the U.S. military and NATO since 1949.</span></li><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Vacant Building. A building that is currently unoccu­pied/unused and for which there is intention to reoccupy and reuse in the future.</span></li></ul><h2 data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Pre-Incident Planning Process</span></h2><h3 data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Potential life safety hazard, including emergency responder safety</span></h3><h3 data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Structure size and operations complexity</span></h3><h3 data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Economic impact</span></h3><h3 data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Importance to the community</span></h3><h3 data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Location and seasonal variations</span></h3><h3 data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Presence of hazardous materials</span></h3><h3 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Susceptibility to natural disasters</span></h3><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Chapter 5 Physical and Site Considerations</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">5.1* General. Physical elements and site considerations shall be classified into the following five groups:</span></p><h5 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Construc tion (see Section 5.2)</span></h5><h5 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Building management systems and utilities (see Section 5.3)</span></h5><h5 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">External site conditions (see Section 5.4)</span></h5><h5 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Internal and external security (see Section 5.5)</span></h5><h5 data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Fences or other barriers (see Section 5.6)</span></h5><h2 data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Construction.</span></h2><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Area, Height, and Age. The entire building size, including overall height, number of stories, square footage, and approximate or actual year of original construction, shall be determined and included in the pre-incident plan.</span></p><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Building Features.</span></p><ul data-dcnode-id="1429"><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">The construction type of the building, including the combustibility of the building, shall be noted or summarized in the pre-incident plan.</span></li><li data-dcnode-id="1430"><span data-dcnode-id="1454" instrument_node="">Data on the following items shall be recorded:</span><ul data-dcnode-id="1431"><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">* Wall construction and insulation</span></li><li data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">* Roof construction</span></li><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">* Floor construction</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">* Other pertinent building features</span></li><li data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Floor plan with room identifier and occupancy and use of each room</span></li><li data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">* Location, types, and construction of access features</span></li><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">* Areas where fire, products of combustion, or other contaminants could spread due to a lack of structural barriers</span></li><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">* Atriums</span></li><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">* Structural integrity of walls, roofs, and floors</span></li><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">* Storage arrangements</span></li><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Fire command center location, access, and fire rating of the area fire walls</span></li></ul></li></ul><h2 data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">PHYSICAL AND SITE CONSIDERATIONS</span></h2><h2 data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Emergency Contact Information.</span></h2><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Emergency contact information shall be recorded in the pre-incident plan for persons responsible for the operation of building systems and utilities and for persons knowledgeable of the supervisory control and data acquisition or similar systems.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Electrical Components, Power Supplies, and Energy Sources.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">ransformers. The location of transformers filled with combustible and flammable fluids shall be recorded in the pre- incident plan.</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Electric Utility Rooms. The location of electric utility rooms shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&nbsp;Alternative Energy Sources. The location of alterna­tive energy sources shall be recorded in the pre-incident plan.</span></p><h2 data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Emergency Power Supply.</span></h2><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The following features of the emergency power supply (EPS) shall be identified and recorded in the pre- incident plan:</span></p><h5 data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Location</span></h5><h5 data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Fuel supplies</span></h5><h5 data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Areas served</span></h5><h5 data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Equipment served</span></h5><h5 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Duration</span></h5><h5 data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Isolation</span></h5><h5 data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">An EPS requiring manual action shall be recorded in the pre-incident plan.</span></h5><h5 data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">The location of the EPS’ disconnecting means shall be recorded in the pre-incident plan.</span></h5><h5 data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Domestic Water and Process Water. Water shutoff locations shall be recorded in the pre-incident plan, with special consideration given to any equipment or processes that require an uninterrupted supply of water.</span></h5><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">&nbsp;Internal and External Security.</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">5.5.1 Security Measures.</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">5.5.1.1* Internal and external security measures shall be recorded in the pre-incident plan.</span></p><ul data-dcnode-id="1382"><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">The pre-incident plan shall include the location of and access to keys, fobs, and RFID cards to enter secure areas.</span></li><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The pre-incident plan shall document the perform­ance of access control systems if primary power is lost.</span></li></ul><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">5.5.2* Security Animals. The use of security animals shall be noted in the pre-incident plan.</span></p><h2 data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Security Systems.</span></h2><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Data regarding intruder security systems shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Data regarding an on-site security service shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">&nbsp;Fences or Other Barriers. The height, construction, and ingress/egress points of fences or other barriers shall be recor­ded in the pre-incident plan.</span></p><h2 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Geospatial Position.</span></h2><h2 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Standard Coordinates.</span></h2><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Geospatial Positioning System [e.g., U.S. National Grid (USNG)] coordinates shall be utilized to record and specify locations of the facilities, structures, assets, utility components, water supplies, and so forth.</span></p><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Occupancy Considerations</span></h2><ul data-dcnode-id="1359"><li data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">The pre-incident plan shall document the occupancy type and use. (See Annex C.)</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Life Safety Considerations. 6.2.1 General.</span></li></ul><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">6.2.1.1 The following information shall be noted in the pre- incident plan:</span></p><ul data-dcnode-id="1346"><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">* Hours of operation</span></li><li data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">* Occupant load</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">* Occupant accountability</span></li><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">* Assistance for people with self-evacuation limits</span></li><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">* Strategies for protecting facility occupants, other than evacuation</span></li></ul><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">6.2.2* Means of Egress. The number of exits, their location, and any special locking conditions, such as delayed release, limited security access, and stairwell locking, shall be noted on the pre-incident plan.</span></p><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">6.3 On-Site Emergency Organization.</span></p><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">6.3.1* Facility Emergency Action Plan. If a facility has an emergency action plan, it shall be obtained for reference during an emergency.</span></p><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">6.3.2* Emergency Response Capabilities. The on-site emer­gency response capabilities and their coordination with responding personnel shall be incorporated into the pre- incident plan.</span></p><ul data-dcnode-id="1335"><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Specialized Operations, Processes, and Hazards. Where occupancies contain specialized operations, processes, and hazards that can pose unique challenges in an emergency, the emergency operating procedures and personnel knowledgea­ble of these conditions shall be documented in the pre- incident plan.</span></li></ul><h2 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Water Supplies and Fire Protection Systems</span></h2><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">7.1 General. Information on water supplies and fire protec­tion systems shall be included in the pre-incident plan.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">7.2* Water Supplies. Water supplies for fire suppression oper­ations and water-based fire protection systems shall be de­scribed and identified in the pre-incident plan.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">7.2.1* Required Fire Flow. The required fire flow shall be determined by the AHJ.</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">7.2.2* Available Water Supply.</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">7.2.2.1 The available water supply shall be included in the pre- incident plan.</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">7.2.2.2* Where the required fire flow exceeds the available water supply, the pre-incident plan shall address a response to mitigate the deficiency.</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">7.2.3* Public and Private Water Supply Utility Sources. The source of water supply, whether it is from a public or private water distribution system, shall be recorded in the pre-incident plan.</span></p><h2 data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Static Water Supply Sources.</span></h2><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">7.2.4.1 Static water sources, such as ponds, lakes, rivers, tanks, and cisterns, shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">7.2.4.2* The pre-incident plan shall include seasonal variation information for bodies of water.</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">7.2.4.3 The method of drafting from the water source shall be recorded in the pre-incident plan.</span></p><h2 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Water Storage Tanks.</span></h2><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">7.2.5.1 Where a water storage tank is used as a source of water, the water storage capacity shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">7.2.5.2* The method of obtaining water from the water stor­age tank shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">7.2.6* Fire Hydrants. The location of fire hydrants shall be recorded in the pre-incident plan.</span></p><h2 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Water-Based Fire Protection Systems.</span></h2><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">7.3.1* Sprinkler and Water Spray. Water-based systems, including type of system, location and identification of main riser valves, extent of coverage, and means of manual activa­tion, shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">7.3.2* Standpipe Systems. Standpipe systems, including type of system, location and identification of control valves, location of hose valves, and presence of pressure reducing devices (PRV), shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">7.3.3* Fire Pumps. Fire pump(s), including location of, and access to, the fire pump and controller; rated capacity; source of water supply; and areas or systems served, shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">7.3.4 Fire Department Connection (FDC). Fire department connection(s) (FIX;) shall be recorded in the pre-incident plan, including physical location, size, type, locking means, and area/systems supplied.</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">7.4* Non-Water-Based Fire Protection Systems. Non-water- based fire protection system(s) shall be recorded in the pre- incident plan, including type of system, hazard or area protected, means of activation, location of abort devices, loca­tion of control panel, location of agent supply and reserve containers, and personnel hazards following agent release.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">7.5* Fire Alarm Systems. Fire alarm systems shall be recorded in the pre-incident plan, including area of coverage, location of fire alarm control unit (FACU) and remote annunciator panels, method of system activation, and method and extent of occupant notification.</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">7.6* Portable Fire Extinguishers. The pre-incident plan shall note the location and type of large, wheeled equipment or specialized extinguishers or both.</span></p><h2 data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Smoke Control Systems.</span></h2><ul data-dcnode-id="1282"><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Pressurization-Based Smoke Management Systems. A</span></li></ul><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">smoke management system (s) shall be recorded in the pre- incident plan, including location of areas served by system, location of control systems, system operation information, loca­tion of manual override controls, and location of supply and discharge arrangement.</span></p><ul data-dcnode-id="1277"><li data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Smoke and Heat Vents. Smoke and heat vents shall be recorded in the pre-incident plan, including location and type of activation (manual or automatic).</span></li></ul><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Hazardous Materials.</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">8.2.1 General. The pre-incident plan shall identify and docu­ment hazardous materials recognized by the AHJ that present life safety challenges, operations challenges, or other chal­lenges to emergency responders.</span></p><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">8.2.1.1 Pre-incident plans for hazardous materials shall include the specifications of Sections 8.2.4 through 8.2.10.1.</span></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">8.2.2* Transient Conditions. Where hazardous materials exist intermittently, the AHJ shall determine the need to identify and record relevant information for each hazard and the length of time the hazard is expected to be present.</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">8.2.3* Inventory. Where the storage or use of hazardous materials has been identified as a special hazard, the pre- incident plan shall include the anticipated maximum inventory and bulk storage locations.</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">8.2.4 Explosives. The use or storage of explosive materials in an occupancy shall require preplanning as determined by the AHJ.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">8.2.4.1 The presence, approximate amount, explosive class and division, and location of explosive materials shall be recor­ded in the pre-incident plan.</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">8.2.4.2* Materials that have the potential to explode upon exposure to fire, heat, and pressure shall be documented on the pre-incident plan.</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">8.2.4.3 Isolation and evacuation distances based on the type and quantity of explosives within a facility shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">8.2.5* Flammable and Combustible Liquids. Where the AHJ has determined that a facility using, handling, or storing flam­mable and combustible liquids requires pre-incident planning, the following shall be recorded in the pre-incident plan:</span></p><ul data-dcnode-id="1250"><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">* Drainage, such as the location where the flammable or combustible liquid will flow and collect if spilled</span></li><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Secondary containment, such as the presence of, and capacity of, built-in secondary containment features for the collection of fire-fighting water and spilled product</span></li><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">* Specialized extinguishing agents, such as indicated product-specific requi remen ts</span></li></ul><h2 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Toxic or Biological Agents.</span></h2><ul data-dcnode-id="1243"><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The location and quantity of toxic or biological agents shall be documented in the pre-incident plan.</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The impact of toxic or biological agents on neighbor­ing or downwind occupancies shall be evaluated.</span></li></ul><h2 data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Radioactive Materials.</span></h2><ul data-dcnode-id="1238"><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The location and type of radioactive materials and radiation-producing devices shall be recorded in the pre- incident plan.</span></li></ul><h2 data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Reactive Chemicals and Materials.</span></h2><ul data-dcnode-id="1231"><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Reactive chemicals and materials shall be recorded in the pre-incident plan.</span></li><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Isolation and evacuation distances, based on the type and quantity of reactive chemical and material within a facility, shall be recorded in the pre-incident plan.</span></li></ul><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Combustible Dusts.</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Operations that generate, collect, or store combustible dusts shall be recorded in the pre-incident plan.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">8.2.10* Special Atmospheres. Any area of an occupancy that contains rooms or equipment storing or using special gases or vapors that can present a hazard to the emergency responders shall be identified in the pre-incident plan.</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">8.2.10.1 The pre-incident plan shall identify special agents or procedures for emergency response to hazardous material (e.g., metal dusts and water reactive metals).</span></p><h2 data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Vacant and Abandoned Structures.</span></h2><ul data-dcnode-id="1168"><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Temporary Conditions. Where vacant and abandoned structures exist temporarily, the AHJ shall determine the need to identify and record relevant information for each hazard and the length of time the hazard is expected to be present.</span></li><li data-dcnode-id="1198"><span data-dcnode-id="1218" instrument_node="">Physical and Site Considerations. In addition to the building characteristics identified in Chapter 5, the following details shall be considered as part of the pre-incident plan for vacant and abandoned structures:</span><ul data-dcnode-id="1199"><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Last known type of occupancy</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Open shafts</span></li><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Pits and holes due to removal of equipment</span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Structural degradation due to weather and vandalism</span></li><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Exposed structural members</span></li><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Penetrations in barriers such as walls, floors, and ceilings that allow abnormal fire travel</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Combustible contents</span></li><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Maze-like configuration</span></li><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Blocked, damaged, or missing stairs</span></li></ul></li><li data-dcnode-id="1169"><span data-dcnode-id="1197" instrument_node="">Potential Hazards. The following potential hazards shall be considered as part of the pre-incident plan for vacant and abandoned structures:</span><ul data-dcnode-id="1170"><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Unstable structure</span></li><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Fall and trip hazards</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Standing water in basement</span></li><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Vermin</span></li><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Unexpected occupancy</span></li><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Ongoing criminal activity</span></li><li data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Rapid fire growth potential</span></li><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Status of utilities (e.g., active, inactive, unknown)</span></li><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Holes and penetrations in floors, walls, and roofs</span></li><li data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Fire escape access</span></li><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Maze-like configuration</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Previous fires in building</span></li><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Unsecured structure</span></li></ul></li></ul><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">8.3.5* Structure Markings. The presence of structural mark­ings shall be noted in the pre-incident plan.</span></p><ul data-dcnode-id="1159"><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Buildings Under Construction.</span></li><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">A pre-incident plan shall be developed for buildings under construction as determined by the AHJ.</span></li><li data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Temporary Conditions.</span></li></ul><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">8.4.2.1* Where construction features exist temporarily, the AHJ shall determine the need to identify and record relevant information for the following:</span></p><ul data-dcnode-id="1152"><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Each hazard present</span></li><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Length of time the hazard is expected to be present approach; planning; reviewing; training; and evaluating. Pre- incident plans within a jurisdiction should he similar in style, procedures, and content to maximize effectiveness and to reduce the time required to familiarize responding forces with the pre-incident plan.</span></li></ul><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Emergency response programs are planned; emergencies are not. The best time to learn about an occupancy is before the incident.</span></p><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">A.4.1.2 The pre-incident plan developer should be able to prepare a pre-incident survey, given the necessary forms and tools, so that all necessary occupancy information is recorded, items of concern are noted, and accurate sketches or diagrams are prepared.</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Requisite Knowledge: Familiarity with sources of water supply for fire protection; fundamentals of fire suppression and detec­tion systems; common symbols used in diagramming construc­tion features, utilities, hazards, and fire protection systems; departmental requirements for a pre-incident survey and form completion; and importance of accurate diagrams.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Requisite Skills: Ability to identify the components of fire suppression and detection systems; sketch the site, buildings, and special features; detect hazards and special considerations to include in the pre-incident plan; and complete all related departmental forms.</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Agencies and organizations, other than the fire department, might need different knowledge and skills to complete pre- incident plans that are applicable to their disciplines.</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">A.4.1.5 The pre-incident plan will be most effective when coordinated with an incident management system, such as the one presented in NFPA 1561.</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">A.4.1.6 The pre-incident plan developer should determine the average and maximum response time of each responding agency, including, but not limited to, fire department, emer­gency medical services, law enforcement, hazardous materials response, and rescue service. The evaluation should seek to determine whether the responding agency’s equipment, personnel, and training enable the agency to effectively manage an incident at the site or facility.</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">A.4.1.8 The pre-incident planning process should begin during the construction design process of the proposed facility to identify emergency responders’ concerns. The pre-incident planning process should allow for revisions to the pre-incident plan during different phases of construction. Design professio­nals should submit construction documents to identify data for inclusion in the pre-incident plan.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">A.4.2.2 During a site visit, the pre-incident plan developer(s) should abide by all applicable safety and health procedures, which can include, but are not limited to, fall protection, confined space entry, personal protective equipment (PPE) and restricted access.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">A.4.3 Pre-incident plan data includes quantitative and qualita­tive information about the facility (such as physical site, opera­tion features, personnel, and protection features).</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">A.4.3.1 Effective pre-incident plans of simple sites or facilities or a pre-incident plan with simple objectives can be developed with minimal amounts of data. Additional data are required for pre-incident plans for more complex sites or facilities, facilities with more numerous potential hazards, pre-incident plans with more complex objectives, or potential incidents with greater risks. Data that might be useful should be collected with the understanding that it can be filtered out later if not needed in the final pre-incident plan. If a pre-incident plan developer intends to prepare a single pre-incident plan, the requirements provided in Chapters 1 through 10 and the information in Annex C can be followed to aid in determining the types of data that could be needed. Alternatively, data collection forms can be developed to aid in the efficient and consistent collec­tion of data for pre-incident plan development. Sample data collection forms are provided in Annex D.</span></p><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">It is helpful to understand the intended audience for the final pre-incident plan and to obtain consensus regarding the information that is needed and the threshold of information that the pre-incident plan user can effectively utilize once an incident has occurred. These considerations should govern the scope of the data collection effort.</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">A.4.3.1.1 The sources of data should include fire protection engineers, sprinkler and fire alarm contractors, building archi­tects or engineers, building officials, water authorities, facility information experts, and insurance professionals. The collec­tion of data could be limited by several factors, such as available resources, time, proprietary information, and privacy concerns. It will be necessary for the pre-incident plan developer to deter­mine which data will be most critical and to prioritize the data collection effort to obtain the largest data sets given the estab­lished constraints.</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Historical data on similar occupancies/events involved in emergencies should be reviewed for items that could cause problems in the structure or venue being surveyed.</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">A.4.3.1.2 For this effort, it is critical that the pre-incident plan developer and user(s) interact. An overabundance of informa­tion can be as detrimental to a pre-incident plan user as a lack of information if the user cannot easily distinguish critical information. Additionally, the specifics of any particular inci­dent cannot be exhaustively anticipated. Therefore, the pre- incident plan should not attempt to perform incident command or management functions (e.g., placing apparatus, specifying attack strategies), although this could be desirable in certain instances.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">A.4.4 A successful strategy for pre-incident plan development is an incremental process where simple pre-incident plans are developed and issued (in lieu of having none) and subse­quently revised and enhanced. As an example, a local munici­pality could prepare simple pre-incident plans for all of the hospitals in its community for a given resource expenditure. As additional resources become available, the pre-incident plans for all of the hospitals can be brought up to another level. This method might be preferable to expending all of the available resources to prepare a complex and comprehensive pre- incident plan for one hospital while leaving the other hospitals without any pre-incident plan.</span></p><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Annex D provides an example of a pre-incident plan field collection card and a completed pre-incident plan facility data record. Consideration should be given to interoperability with other emergency services organizations (ESOs).</span></p><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">A.4.4.2 The pre-incident plan document should be consistent and concise. Three manageable levels of building intelligence should be considered for a pre-incident plan.</span></p><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Certain processes might require electrical power to operate properly. Disconnect could cause the shutdown of agitators or other safety equipment that could result in an uncontrolled reaction. Disconnect or loss of power in certain medical facili­ties, such as those with ventilator-dependent patients, might require first responders to provide manual medical interven­tion to keep patients stabilized.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">A.5.3.2.2 Electric utility rooms might consist of electrical distribution centers, motor control centers, utility service inter­face, or rectifier or inverter equipment (ac/dc).</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">A.5.3.2.3 Alternative energy sources should be documented in the pre-incident plan in order to identify potentially hazardous exposure to energized electrical sources. All sources of alterna­tive electrical energy should be identified. The location of control circuitry, disconnection methods, lock out procedures, and isolation methods should be documented. Any special tools, information, responder training, and on-site contacts able to assist with rendering these systems safe should be contained in the planning documents. The location and method of storing the electrical energy produced should be documented. The location of the inverter system for converting the dc current to ac current should be identified. System voltages (dc and ac) should be documented.</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">A.5.3.2.4.1 Examples of emergency power supply (EPS) that should be recorded include, but are not limited to, generators, batteries, uninterruptible power supply systems, stored energy, and other sources.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">A.5.3.2.6 All gases and gaseous mixtures should be noted and quantities recorded. Peak inventories should be noted. Be aware of incompatible gas storage. Special consideration should be given to any equipment or processes that might pose a hazard if the compressed or liquefied gas supply is interrup­ted.</span></p><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">A.5.3.2.7 Steam pressure lines can vary from low pressure to high pressure.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">A.5.3.3 Elevator information should include the following:</span></p><ul data-dcnode-id="1071"><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Number and location of cars or elevator banks, or both</span></li><li data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Location of elevator machine rooms (machine rooms might be located remote from hoistways)</span></li><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Floors served</span></li><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Type (e.g., electric or hydraulic, passenger or freight, manual or automatic, service, stretcher accessible)</span></li><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Restrictions</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Location of emergency access key</span></li><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Power lockout location</span></li><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Emergency access to car (e.g., roof hatch, sidewall panel)</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Overall height of elevator shafts</span></li><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Blind shaft and access panels</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Location of sky lobby</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Access point into elevator pit rooms</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Elevator recall</span></li><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Fire-fighter service override</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Eme rge ncy power</span></li></ul><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">A.5.3.3.2 Some elevator lobbies are formed by activation of a power-operated sliding door by the fire alarm system. These doors have either a swinging door or a special release device to open the door to a predefined width [typically 81 cm (32 in.)]. Other types of operable elevator lobby separations are availa­ble.</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">A.5.4.1 Points of access might include the following:</span></p><ul data-dcnode-id="1056"><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Basement level of building</span></li><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Main level of building</span></li><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">If needed, access to special areas/floors of building</span></li><li data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Roof of building</span></li><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Adjoining buildings that might provide a tactical strategic advantage by way of tunnels or sk)walks</span></li></ul><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">A.5.4.2 Conditions that would hamper the access of respond­ing personnel include the following:</span></p><ul data-dcnode-id="1039"><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Bridge width or weight restrictions</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Narrow rights-of-way</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Roads subject to flooding, drifting snow, washout, or other blockage</span></li><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Low overhead clearances, railroad grade crossings, and drawbridges</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Security checkpoints and barriers</span></li><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Speed control devices</span></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Traffic</span></li></ul><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">A.5.5 Security requirements are dynamic and can restrict access or egress to or from a facility. These measures can include various types of locking devices, access control features, and physical barriers. Some of these measures might be inter­locked with fire alarm systems, surveillance, and other opera­tional management systems.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Occupancies or facilities might also include extraordinary security measures or features that could delay response or evac­uation. Some security measures might change, based on an increase or decrease in threat levels as dictated by the U.S. Department of Homeland Security. These types of facilities might include, but are not limited to, the following:</span></p><ul data-dcnode-id="1016"><li data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Jails and detention centers</span></li><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Specialized wards in health care facilities</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Large-scale data processing centers</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Secure warehouses</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Government installations</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Public or mass transit (e.g., airports, ferry terminals, subways)</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Power plants and transmission yards (e.g., nuclear power plants, electrical substations)</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Bulk loading/unloading facilities with and without marine access</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Precious metal processing</span></li></ul><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">(10) High profile or landmark facilities</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">A.5.5.1.1 Data relating to surveillance systems can include, but are not limited to, the following:</span></p><ul data-dcnode-id="1003"><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Site plan showing exterior camera locations and angles of view</span></li><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Floor plan showing interior camera locations and angles of view</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Locations where surveillance camera images can be viewed</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Remote and wireless access to surveillance systems includ­ing URL/IP address and login credentials</span></li></ul><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">A.5.5.2 Contact information should be obtained for the person (s) responsible for the security animals.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">A.5.5.3.1 The following are examples of intruder security systems:</span></p><ul data-dcnode-id="994"><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Mantraps</span></li><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Motion detection tors, or other areas or devices that could result in exposure to responders.</span></li></ul><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">A.8.2.8 Many chemicals can produce an adverse reaction if contaminated or mixed with other materials. Chemicals could also undergo a chemical reaction when exposed to elevated temperatures as in a fire and have the potential for buildup of pressure in containers and the generation of toxic by-products and heat.</span></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Reactive chemicals that require cooling, for example, in a refrigerated warehouse, should also be noted, because it is likely that power could be interrupted during an emergency. Plan for any chemical processes that could become hazardous if interrupted or left unattended (e.g., during the building evacuation).</span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Materials that react upon exposure to air or water should also be documented on the pre-incident plan. Include informa­tion about any secondary containment to prevent exposure to hazardous conditions.</span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">A.8.2.9 Combustible dust can accumulate on any upward- facing surface. Fine dusts can even cling to vertical surfaces. A large amount of combustible dust often accumulates overhead on structural components or other surfaces where it is hard to notice or clean. Historically, these dust accumulations are asso­ciated with cascading secondary explosions that lead to major or total facility loss. The following standards provide guidance on combustible dusts:</span></p><ul data-dcnode-id="975"><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">NFPA654</span></li><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">NFPA 655</span></li><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">NFPA 664</span></li><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">NFPA 61</span></li><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">NFPA 484</span></li></ul><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The following fire-fighting operations can inadvertently increase the chance of a combustible dust explosion:</span></p><ul data-dcnode-id="964"><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Tactics that cause dust clouds to form or reach the explo­sive range</span></li><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Tactics that introduce air, creating an explosive atmos­phere</span></li><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Application of incorrect or incompatible extinguishing agents</span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Use of equipment or tools that can become an ignition source</span></li></ul><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">OSHA 3644-04, “Firefighting Precautions at Facilities with Combustible Dust,” can be referenced for additional guidance and operational considerations.</span></p><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">A.8.2.10 Examples of places that might contain hazardous atmospheres include the following:</span></p><ul data-dcnode-id="947"><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Confined spaces</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Inert atmospheres</span></li><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Ripening facilities</span></li><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Special equipment treating atmospheres</span></li><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Fumigation chambers or active fumigation operation fire- fighting</span></li><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Magnetic resonance imaging (MRI) quench gases</span></li></ul><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">A.8.3.1 Vacant and abandoned buildings pose significant risk to responding emergency service delivery providers. These buildings have caused countless deaths and injuries to fire fighters who have responded to these locations for fires, gas leaks, or other emergencies. These facilities have many hidden dangers that must be recognized and preplanned by respond­ers prior to emergencies. These structures are subject to deteri­oration, primarily from lack of maintenance, and illegal entrance. Pre-incident planning should be performed on these properties to reduce risk to emergency responders. (See Section B.6.)</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">A.8.3.5 Useful information on marking can be found in the FEMA Urban Search and Rescue (US&amp;R) Response System and the fire fighter safety building marking system (see Annex E in NFPA 1).</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">A.8.4.2.1 Prior to the installation of the sprinkler or standpipe system, there is a greater risk of fire spread and a greater danger to occupants. When a temporary sprinkler or standpipe system is installed and made operational this hazard is reduced. Hence, the AHJ may wish to identify the period of time the building is without a sprinkler or standpipe system in their pre- incident plan.</span></p><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">A.8.4.3 A great deal of information found in the pre-fire plan when developed in accordance with NFPA 241 can provide useful information for the pre-incident plan.</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">A.8.6.1 See Annex F of NFPA 502 for a typical emergency response plan that can be used as the basis of a pre-incident plan.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">A.8.6.5 The Pipeline and Hazardous Materials Safety Adminis­tration (PHMSA) Safety Alert by the International Association of Fire Chiefs (IAFC) provides guidance on elements that should be contained in a pre-incident plan.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">A.9.1 Guidance on the development of all hazard emergency operations and post-incident recovery procedures can be found in state and local plans and many documents, including, but not limited to, the following:</span></p><ul data-dcnode-id="918"><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">NFPA 472</span></li><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">NFPA 473</span></li><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">NFPA 600</span></li><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">NFPA 1600</span></li><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">NFPA 1710</span></li><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">NFPA 1720</span></li><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Notice FRL-5512-8, The National Response Team’s Integrated Con tingency Pre-incident Plan</span></li></ul><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The pre-incident plan should identify the emergency response resources’ availability and access. Documented agree­ments should be in place to ensure all organizations involved are committed to providing requested support.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Various national, state, and local laws define the roles, responsibilities, and authority of government agencies during specific emergency conditions. Some of these laws might also extend jurisdiction or responsibility to property owners or semi-government agencies. In order to provide for effective emergency operations, it is critical that a single incident action plan be developed and implemented. This action plan should be managed with an incident management system and, whether a unified or single command is utilized, the lines of authority and command should be clearly defined. In the event that competing action plans occur during an emergency, the action plan for the legally authorized agency should supersede all other action plans.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrume
