tems’ designs should be noted, along with any special design features, such as in-rack systems, large-drop sprinklers, early suppression fast-response (ESFR) sprinklers, sprinkler control valves, and hydraulic plac­ard information.</span></p><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">C.10.5.1.2 Design Deficiency. Sprinkler system design defi­ciencies can occur where the water supply is not adequate to support the system design, or where the system design is not appropriate for the commodity stored or its arrangement, and those deficiencies should be noted on the pre-incident plan.</span></p><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">C.10.5.2 Water Supply.</span></p><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">C.10.5.2.1 A sprinkler system’s water supply should be capable of meeting not only the sprinkler demand, but also the demand for hose streams.</span></p><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">C.10.5.2.2 The water supply should be evaluated to determine if it is adequate for the sprinkler system design, storage, and configuration and the warehouse occupancy class.</span></p><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">C.10.5.3 Products of Combustion or Contaminants and Heat Venting.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">C.10.5.3.1 The pre-incident plan should note how venting of products of combustion or contaminants and hot gases can be accomplished and the location of any manual or automatic controls.</span></p><ol data-dcnode-id="367" start="10"><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">10.5.3.2 Control of products of combustion or contami­nants is important in warehouse occupancies due to the large volume of combustible commodities stored within them.</span></li></ol><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Proper venting of products of combustion or contaminants and hot gases minimizes property damage and increases responding personnel effectiveness and safety.</span></p><ol data-dcnode-id="358" start="10"><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">10.5.3.3 Automatic venting details should be noted in the pre-incident plan, because such venting could affect fire behav­ior.</span></li><li data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">10.5.3.3.1 The power supply to fans and ventilation equip­ment should be investigated to determine if it is reliable enough to remain in service during a fire.</span></li><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">10.5.3.3.2 The fan components should be able to withstand the heat of a fire if they are to be of value during a fire.</span></li></ol><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">C.10.6 Special Hazards.</span></p><ol data-dcnode-id="343" start="10"><li data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">10.6.1 Storage. The commodity class should be recorded on the pre-incident plan and changed when a change in classi­fications occurs.</span></li><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">10.6.2 High Hazard Items. Storage of high hazard items, such as plastics, toxic materials, aerosols, or flammable or combustible liquids, can test the limits of protection, even in a fully sprinklered warehouse. New commodities can be intro­duced or moved within the warehouse. If the commodity changes, existing protection might be inadequate.</span></li><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">10.6.3 Storage Configuration. Storage configuration and the use of any floor-marking system should be recorded.</span></li><li data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">10.6.3.1 Storage and Fire Fighting Operations. Some commodities require extensive manual fire-fighting operations. All interior operations should be conducted with full knowl­edge that the stored commodity might not be stable and that fire fighters are at risk from collapsing commodity storage. Stock can be stored in bulk or palletized piles, in racks, or on shelves. Fire behavior of a given material can vary with such factors as storage height, shelving, presence or absence of verti­cal flue and aisle spaces, and pile stability.</span></li><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">10.6.3.2 Storage Configuration Variations. The pre-incident plan should note the possibility of storage configuration varia­tions due to daily, weekly, monthly, or seasonal changes that, in turn, could lead to arriving or departing shipments being double stacked on the rack level, or stored temporarily in access aisles, despite efforts to prevent excessive storage heights or storage in aisles.</span></li><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">10.6.4 Material-Handling Operations. The number, availa­bility, and operation of the material-handling equipment should be investigated.</span></li></ol><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Personnel using lift trucks powered by batteries or internal combustion engines remain the most common means of moving stock in warehouses. Some high-capacity warehouses use specialized equipment such as computerized stackers. In high-rack warehouses, storage height can reach over 30.5 m (100 ft). In such situations, the custom stackers provide the only practical means of gaining quick access to the racks for suppression, rescue, or overhaul. Personnel with special train­ing will be required to operate the equipment. Full-scale fire tests in warehouse storage arrangements have shown that over-</span></p><span data-dcnode-id="340" instrument_node=""> </span></div><span data-dcnode-id="338" instrument_node="">
</span></div><span data-dcnode-id="336" instrument_node="">
