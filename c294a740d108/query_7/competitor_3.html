nt_node="">A.9.2 This information should be easily accessible to the responders and should include, but not be limited to, hydrant locations, direct and alternate routes, staging information, known hazardous chemicals or conditions, and site access.</span></p><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">A.9.3.1 The scope and intensity level of the required informa­tion flow between the facility staff and the incident commander will vary during various phases of the incident; however, infor­mation flow, including any actions taken by the members of both parties, should continue throughout the incident.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">When a facility representative is not available, the pre- incident plan should address the means needed for rapid access to, and consultation with, a site representative until an on-site liaison can be established.</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">A.9.3.2 The pre-incident plan should not be developed with­out some basic understanding of the public emergency response resources that would probably be involved in mitigat­ing an on-site incident. The capabilities of those responders can have a significant impact on the pre-incident plan assump­tions and content. A pre-incident plan developed for a hazard­ous materials facility where a fully staffed Type I hazmat team is available within 10 minutes of an incident will probably look significantly different than a pre-incident plan for the same type of facility in a rural area where the closest hazmat team is four hours away from the facility.</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">A.9.3.6 Various other agencies or organizations might have legal authority at different intervals during an incident. It is important that these agencies and organization be notified of the incident, that their roles and responsibilities are clearly defined and understood, and that, as required by law, the agen­cies are given access or control of the incident.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">An example would be where an incident occurs and an EMS response is dispatched to a person with burn injuries. Upon arrival, EMS finds the patient lias self-evacuated from a fire and calls for the fire department. The fire department arrives, takes command of the incident, and extinguishes the fire. The fire department then requests a law enforcement agency to investi­gate the cause of the fire. The law enforcement agency deter­mines the fire was caused by arson and takes control of the incident. Once the law enforcement agency completes its inves­tigation, the building department is notified to determine how much structural damage has occurred and if the building is habitable. In this example, four different government agencies had legal authority at different phases of the emergency. To protect members of the public and investigate the fire, each agency collaborated within its authority and the transition between agencies was critical to the protection of public safety.</span></p><ol data-dcnode-id="899" start="10"><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">2.1 Significant changes can include impairments to fire protection systems and devices, including, but not limited to, fire hydrants, fire sprinkler systems, fire alarm systems, and smoke management systems when they are taken out of service for repairs or maintenance. While some repairs or mainte­nance might be completed in a short period of time, others might involve several days or weeks, depending on the scope of the maintenance or repairs and availability of parts.</span></li></ol><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Annex B Case Histories</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">This annex is not a part of the requirements of this NFPA document but is included for informational purposes only.</span></p><ol data-dcnode-id="892" start="1986"><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">l Office/Commercial High Rise, Quebec, 1986. The build­ing was a fire-resistive, 15-story high rise with stores on the base­ment and floor levels 1 and 2, parking garage space on floor levels 3 through 5, and offices on the floor levels above. There were three high-rise towers built on the commercial/parking garage plaza. The fire broke out at approximately 5:15 p.m. on a Sunday on the tenth floor of the east office tower. The tower was quickly evacuated. The fire spread and burned for 13 hours, causing a portion of one floor to collapse, and resul­ted in heavy fire damage on the tenth, eleventh, twelfth, and sixteenth floors (note — there was no numbered thirteenth floor) because fire fighters were unable to get enough water. The fire was eventually controlled utilizing “flying standpipes” off ladder trucks, ladder pipes (which had difficulty reaching the upper floors), and portable master streams from adjacent towers. There was great difficulty applying water to the top floor. The damage to the structure and contents was estimated at $80 million (Canadian).</span></li></ol><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Several Siamese connections were installed around the complex. The Siamese connections were identified as to the type of suppression system that each supplied, but not the specific location that the suppression system supplied. Fire fighters did not connect to the Siamese connection for the standpipe system because the connection was labeled “sprin­kler system.” Sprinklers were provided to the commercial floors of the building, but not to the offices located above. Fire fight­ers pressurized the connection that was labeled “standpipe system,” but this connection actually supplied the sprinklers on the lower floors. Continued requests from the fire area for more pressure resulted in fire fighters overpressurizing what was actually the sprinkler system Siamese, resulting in pipe fail­ures in the commercial area that caused significant damage in that area, which was unaffected by the fire. Following the fire, investigators also found a partially closed valve in the standpipe supply line.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">The fire department was held liable by the Quebec Superior Court for 25 percent of the damages to the building, which was reported to be $51 million (Canadian). The court chastised the fire department for failing to have an updated fire prevention plan for the facility that would have identified locations of standpipes and pumps that were improperly used or not used on the night of the fire. Five fire fighters were injured fighting this fire.</span></p><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">B.2 Warehouse Fire, West Virginia, 2017. The warehouse — an approximately 39,019 nr (420,000 ft</span><sup data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">2</span></sup><span data-dcnode-id="884" instrument_node="">) building comprising many smaller warehouses, both new and old, renovated to form a single building — was responsible for storing various materi­als used in the manufacturing of plastics. There were many areas where two smaller buildings had been combined simply by closing up the space separating the two. Shortly after midnight on October 21, a fire broke out in an unknown loca­tion of a warehouse. The thick, black smoke covering the area began to impact the local communities almost immediately and could be smelled more than 160 km (100 mi) away. Local resi­dents were instructed to shut down their HVAC systems, close all windows and doors, and shelter-in-place for fear of potential health risks associated with the smoke and falling parti­cles. This resulted in the closing of schools and the cancelation of community events, and even sparked a local valet service to hand out free filtration masks to the public. The amount of calls from concerned citizens reporting a smell of smoke forced 911 dispatchers to require callers to report actually seeing flames before they would dispatch fire units.</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Fire fighters were met with problems early on, such as access restrictions from outside storage, an insufficient water supply to control the large volume of fire, and a lack of knowledge of what the warehouse contained. There were also questions as to whether the building’s fire suppression systems were operating correctly. The SDS sheets provided to fire fighters by company representatives were outdated and did not provide an accurate picture of what was inside; additionally, the company was also noncompliant with a law requiring it to submit an annual Tier II hazardous materials inventory list to multiple government agencies, including the local fire department. As a result, all documents that accurately reflected the building’s inventory and its specifics at the time of the incident were lost in the fire. Though the fire was controlled within the first day, the fire burned for eight days overall and was declared an emergency disaster by the governor of West Virginia.</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">At the time of the incident, the last reported fire inspection conducted by the West Virginia Fire Department of Military Affairs and Public Safety was conducted in 2008, almost a decade prior, after two local volunteer fire chiefs filed letters of concern to the state fire marshal addressing their concerns about the facility, such as the lack of an adequate water supply, the lack of access to portions of the building and fire protec­tion equipment, the lack of adequate sprinkler protection in various portions of the building, and the arrangement of stor­age that could jeopardize the safety of fire fighters.</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The lack of established building codes paired with poor fire code enforcement resulted in a devastating fire that impacted the entire community and cost local and state governments millions. The lack of pre-incident planning information, such as accurate SDS sheets and a plan for accessing alternative water sources, forced fire fighters from over 30 different fire departments to control and extinguish a fire for which they were not properly prepared.</span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">B.3 Ten Fire Fighter Fatalities at Fertilizer Plant, Texas, 2013.</span></p><p data-dcnode-id="867"><span data-dcnode-id="874" instrument_node="">The incident involved a 1115 m</span><sup data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">2</span></sup><span data-dcnode-id="871" instrument_node=""> (12,000 ft</span><sup data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">2</span></sup><span data-dcnode-id="868" instrument_node="">) fertilizer plant built in the 1960s with multiple additions to the building throughout the years following. The building did not have any fire suppression systems installed and was primarily constructed of wood and metal silos that stored, mixed, and sold various agricultural products used by the farming community. It also stored a large amount of hazardous materials — both raw and mixed — that were used to enhance farmers’ crops, such as anhydrous ammonia and ammonium nitrate. Because it was planting season, the plant was maintaining an inventory of these hazardous materials in the thousands. On April 17, ten fire fighters and five civilians were killed when it exploded. In addition to those killed, five fire fighters were also injured in the blast.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Initial calls to the county’s 911 center of visible smoke coming from the structure began at around 7:29 p.m., with the first fire department unit arriving on the scene 10 minutes later. Fire fighters found visible flames coming from the sliding doors of the seed room. Crews immediately initiated fire suppression operations as additional personnel were arriving on-scene in other fire apparatus and personally owned vehi­cles. Despite their efforts, fire fighters quickly realized the fire was gaining in intensity, likely due to wind. They also did not have a water supply established yet, so fire attack efforts were being supplied solely by tank water. The second arriving engine company dropped a 100 mm (4 in.) supply line from the clos­est hydrant, but they did not have enough hose to stretch the 488 m (1600 ft) from the hydrant to the attack engine. This resulted in fire fighters having to halt their suppression opera­tions in an effort to establish a water supply through the use of the supply hose from their attack engine.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">It was reported that a discussion was held between the fire chief, assistant chief, and a fire fighter who also worked as a manager of the facility as the incident was occurring. The chiefs were concerned that ammonium nitrate stored inside the building could explode and recommended that the fire fighters be pulled back farther from the structure. However, the fire fighter told them that the burning fertilizer would not explode. Approximately 12 minutes after the first engine company’s arrival, the 36,288 to 54,431 kg (40 to 60 tons) of ammonium nitrate stored next to the seed room exploded. The explosion decimated the building, left a crater that meas­ured 28 m (93 ft) in diameter and 3 m (10 ft) deep, and regis­tered as a small-scale earthquake on the Richter scale. Investigators were unable to determine the cause of the fire.</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Many factors contributed to this tragedy, including the fire department’s lack of a formal pre-incident planning program established at the time of the explosion as well as a lack of formal training on how to respond to incidents involving ammonium nitrate. The lack of an adequate water supply within close proximity to the structure was also a problem. Had a pre-incident plan been in place to assist in organizing fire- ground efforts and facilitating the laying of supply lines early into the incident, fire fighters might have identified the hazards and established a water supply sooner.</span></p><p data-dcnode-id="853"><span data-dcnode-id="860" instrument_node="">B.4 Nine Fire Fighter Fatalities at Furniture Store, South Caro­lina, 2007. The 38 m x 38 m (125 ft x 125 ft) furniture store was originally a grocery store in the 1960s. The structure consis­ted of masonry walls with a flat metal roof supported by steel bar joists and large glass windows lining the storefront. Over time, the showroom in the main building was expanded with the construction of a 18 m x 37 m (60 ft x 120 ft) pre- engineered metal building on each end, a 37 m x 40 m (120 ft x 130 ft) warehouse was added in the rear, and a 204 m</span><sup data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">2 </span></sup><span data-dcnode-id="857" instrument_node="">(2200 ft</span><sup data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">2</span></sup><span data-dcnode-id="854" instrument_node="">) loading dock area that connected the warehouse to the main building was constructed. The building did not origi­nally meet the requirements to be sprinklered, however the additions to the loading dock area without permits along with the installation of unprotected openings and separation walls that were not fire rated changed that. Since permits were never obtained for the changes, the requirement for sprinklers was never enforced.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">On June 18, nine fire fighters were killed in the line of duty after being overrun by a rapidly progressing fire in the building that produced an enormous amount of heat. The fire origina­ted in the trash on the exterior of the loading dock. The flames then traveled up the wall and into the loading dock’s attic space. An employee attempted to extinguish the fire, but stopped once the smoke conditions intensified and he heard one of the roll-up fire doors close. As the fire intensified, initial investigations into the store’s showroom revealed no signs of any smoke or flame. When a fire fighter opened the door lead­ing to the loading dock, the massive rush of fresh air leaving the showroom area sucked the door out of the hands of the fire fighter, but it was quickly closed by another fire fighter. Fire fighters took defensive positions inside the showroom at the doorway and believed they were protected by the masonry block fire wall. They were unaware of the penetrations that were made through the wall over time that allowed the smoke and heat to travel throughout the void overhead between the acoustical ceiling and the roof. The heat intensified signifi­cantly due to the burning furniture in the loading dock area that eventually began banking down into the showroom. Fire fighters became disoriented as visibility was reduced to zero;</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">they attempted to transmit distress signals over the radio, but the heat was too intense for those outside to attempt a rescue.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">A pre-incident plan of the building had been conducted multiple times throughout the years. However, it was not re­ferred to until late into the incident. The magnitude of the fire load and the dangers of the building’s construction were also not communicated adequately within the document. Though walkthroughs were conducted by fire crews in the past, proper life-saving fire code enforcement had not occurred since 1998.</span></p><p data-dcnode-id="839"><span data-dcnode-id="846" instrument_node="">B.5 Church Roof Collapse, Indiana, 2011. On June 15, an Indiana fire fighter was killed by a structural roof collapse while fighting a working fire in a church. Reports of heavy smoke coming from the roof of a church began pouring in to the local dispatch center at around 3:49 p.m. Though there were many 911 calls reporting the incident, no one was able to provide the dispatchers with an actual address, which meant fire fighters had to search a wide general area for the fire. Eight minutes after the initial call, the first fire department unit arrived on-scene to find visible smoke and flames coming from a 390 m</span><sup data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">2</span></sup><span data-dcnode-id="843" instrument_node=""> (4200 ft</span><sup data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">2</span></sup><span data-dcnode-id="840" instrument_node="">) church built on a concrete slab and constructed of a wood frame and veneer masonry walls.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Smoke and flames became increasingly apparent to fire fighters operating on the exterior of the structure, but interior crews experienced only light smoke conditions. Because of the church sanctuary’s open design and elevated ceilings, the fire intensified within the attic space while fire fighters struggled to gain access to it. Once fire fighters were able to open the ceil­ing, they realized the extent of the fire progression and prepared for retreat. It was at this time that the roof began to collapse, forcing a significant amount of smoke, heat, and debris onto the fire fighters below. As the roof collapse began, fire fighters aided each other as they scrambled to exit. Fire fighters desperately searched in zero visibility for any window or doorway through which they could escape. All exiting fire fighters immediately reported to the command post, where it was determined that one fire fighter was missing. Though addi­tional arriving companies were tasked with search and rescue, the complete collapse of the roof made efforts impossible. The fire fighter was located in the structure by a news helicopter almost one hour after he went down.</span></p><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Proper pre-incident planning had not been conducted for this structure, so its layout and design were not readily known to incident commanders during the incident. The structure was also located in a rural area with no fire hydrants within the vicinity, a problem that was not identified until after initial units had arrived on-scene and started mutual aid units for water tenders. A pre-incident plan could have identified this problem sooner and resulted in responders starting water tenders sooner. A neighbor of the church also called 911 advis­ing them of a pond available on her property for use as a water source. The pre-incident plan also could have identified such alternative water supplies within the area and planned for their use.</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">B.6 Six Fire Fighter Fatalities, Cold Storage and Warehouse Building, Massachusetts, 1999. The structure was a six-story cold storage and warehouse that had been vacant since 1991. The original building was constructed in 1905, and 7 years later (1912), another building was constructed on the western side. The exterior walls were constructed of brick, while the interior walls were covered with asphalt-impregnated cork (6 in. to 18 in., depending on the floor level), 4 in. of polystyrene or foam glass, or both, and a thin layer of glass board. The floor­ing was wooden, except for the flooring in the basement and on the first and second floors, which was concrete. The joists consisted of heavy timbers. Two stairwells were present; one was located on the B side of the building and extended from the basement to the flat roof, and the other was located on the C side and extended to the third floor only. The building was essentially windowless, and although a few windows were present, they were covered with plywood. The building entran­ces and exits were secured by plywood, but homeless people had gained access to the building and established living quar­ters.</span></p><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">An off</span></p><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Five minutes after dispatch, the incident commander radi­oed the dispatch center and requested any available building information, but no information was ever found or received. Due to the lack of pre-fire planning and inspection, and the lack of building plans/drawings, confusion existed among the fire fighters as to the configuration and number of floors contained within the building.</span></p><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">B.7 Three Fire Fighter Fatalities, Auto Parts Store, Oregon, 2002. The building involved was built in 1938, was approxi­mately 13,520 ft</span><sup data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">2</span></sup><span data-dcnode-id="825" instrument_node="">, and was of Type IV heavy timber construc­tion. The nonsprinklered building had numerous modifications, which included the addition of a warehouse and a mezzanine. Inspections of the building had been completed by the fire department prior to the incident; however, no pre- emergency plans were ever developed.</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">There was a delayed notification of the fire department while occupants investigated a burning odor. Fire fighters advancing attack lines found fire in the rafters. Roof stability deteriorated, and the IC called for an evacuation; however, five fire fighters were still operating in the building when the roof collapsed. Two fire fighters were able to escape; however, three were trapped. One fire fighter was able to be removed while conditions deteriorated further but was later pronounced dead. It took fire fighters approximately 2 hours to control the fire before they could re-enter the building to locate the remaining two fire fighters, who were pronounced dead on the scene.</span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">B.8 Fire Fighter Fatality, Restaurant/Lounge, Missouri, 2004.</span></p><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">The building was a one story, nonsprinklered commercial restaurant/lounge that was constructed of sheet metal walls and roof over wood frame and lightweight wood trusses. The interior ceiling was metal decking attached to the bottom of the trusses, suspended from the bottom chord. The building- was approximately 5000 ft</span><sup data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">2</span></sup><span data-dcnode-id="816" instrument_node="">, built in 1995. None of the respond­ing departments had inspected the building or developed a pre-incident plan.</span></p><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The initial alarm was dispatched at 1331 hours for five units from three separate departments for a structure fire. The victim, providing mutual aid, had been searching for the seat of the fire with two volunteer fire fighters from another depart­ment when one of these fire fighters lost the seal on his SCBA face piece. The fire fighter immediately abandoned the nozzle position and retreated out of the closest door. The backup fire fighter also retreated out of the building when his partner left. In black smoke and zero visibility, the fire fighters were unaware that the victim was still inside the structure. Soon after, the incident commander ordered an emergency evacua­tion because of an imminent roof collapse. Personnel account­ing indicated that a missing fire fighter was still inside the building when the roof partially collapsed. After several search attempts, the victim was found in a face-down position with his mask and a thermal imaging camera cable entangled in a chair. He was pronounced dead at the scene.</span></p><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">In this case, the metal building, roof and ceiling, and light­weight wood roof truss construction created a dangerous fire environment conducive to early structural collapse. Concealed spaces above suspended ceilings allow flame spread to go unde­tected. The presence of concealed spaces can be noted in pre- incident visits and referenced. Also, a pre-incident inspection provides an opportunity to test radio transmission capabilities. In this case, it is unknown whether the metal building inter­fered with communications to the victim’s designated radio channel. It was not tested before the building was razed. NFPA 1620 addresses the need for testing communications and interference of radio coverage during the pre-incident plan­ning process.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">B.9 Major Oil Depot Fire, England, 2005. In the early hours of Sunday, December 11, 2005, a number of explosions occur­red at Buncefield Oil Storage Depot, Hemel Hempstead, Hert­fordshire. At least one of the initial explosions was of massive proportions, and there was a large fire, which engulfed a high proportion of the site. Over 40 people were injured; fortu­nately, there were no fatalities. Significant damage occurred to both commercial and residential properties in the vicinity, and a large area around the site was evacuated on emergency serv­ice advice. The fire burned for several days, destroying most of the site and emitting large clouds of black smoke into the atmosphere. The fire fighting required a national response, with a total of 32 fire and rescue services attending in some capacity. In total, 786,000 L of foam were used to extinguish the fire in 22 tanks. Insufficient guidance was available to primary responders on a number of critical early issues, such as how to assess the impact of the smoke plume on air quality. Decisions on whether to fight the fire or to allow it to burn out in a controlled fashion depend on the availability of such assessments. The incident exceeded the worst-case planned scenario, which was a single tank fire, and the water supply lagoons on the facility were rendered useless by the incident. Following the incident, it was determined that the main water supply lagoon might not have had adequate capacity for fire fighting during summer months.</span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">A special investigative board established by the British government recommended, among other things: Where opera­tors depend on local services (e.g., the local fire and rescue service) to provide alternative resources, they need to consult the local provider to identify any limitations on the availability of services. Any such limitations should be considered and addressed within the site’s emergency planning arrangements, local authorities should review their off-site emergency response plans, and, in the case of fuel storage sites, take account of explosions and multi-tank fire scenarios; and facili­ties should work in conjunction with neighboring local authori­ties in developing their off-site emergency plans and involve these authorities in training and in emergency exercises.</span></p><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">B.10 Paint Manufacturing Facility Fire, North Carolina, 2007.</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">In October 2007, fire units responded to a fire alarm at a paint manufacturing facility. The department’s hazmat team had just conducted a preplan at that facility the previous week. Shortly after arriving on-scene, the incident commander requested additional resources, including the hazmat team, due to an explosion at the facility. The product involved was nitrocellu­lose, a DOT Class 4 flammable solid.</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The first arriving companies attempted to gather informa­tion by looking the product up in the emergency response guide, but were frustrated by the fact that there were six differ­ent entries for nitrocellulose. Due to the knowledge gained in the preplanning process, the hazardous materials unit was able to tell the companies exactly which entry to use until the hazmat team arrived. The hazardous materials team also knew the exact location of the product in the facility and the location of the deluge valve to turn off the suppression system.</span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Because of the preplanning process, responding personnel had information on the product, its location, and the location of pertinent fire protection systems without having to send a team into the hazard zone and without having to wait for a property representative to arrive on-scene. Company officials were impressed with the fire department’s knowledge base and the speed with which the incident was mitigated. While the incident could have been mitigated without a preplan, it certainly made the operation much faster and, more impor­tantly, much safer.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">B.ll Nursing Facility Fire, Florida, 2008. On the morning of March 29, 2008, fire units responded to an elder care/skilled nursing facility less than 1 mile from fire station #2. The first due company, Engine 2, had done a pre-incident plan for the four-story building. The fire was reported to be in the laundry room area, which was in a difficult-to-access area of the facility. Using the pre-incident plan information, the company officer was able to direct the other responding units to the most appropriate location and establish the best course of action for the incident prior to first unit on-scene.</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The fire attack was quickly handled and ventilation properly established in such a fashion to prevent having to remove any of the elderly inhabitants. As planned, a company was sent to the upper floors to quickly determine if the smoke had accessed the resident floors and, finding none, the defend-in- place option was chosen, maintaining personnel on the floors to monitor for any situational change. The pre-incident plan­ning process required the company officer to anticipate fire scenarios and apply department SOGs. This very process provi­ded the basis for a successful approach and outcome for a large group of vulnerable citizens.</span></p><ul data-dcnode-id="788"><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Dialysis units</span></li><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Imaging facilities</span></li><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Pediatric populations</span></li></ul><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">C.4 Detention and Correctional Occupancies.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">C.4.1 Administration. Pre-incident planning in a detention and correctional occupancy should involve not only emergency responders but detention and correctional facility administra­tors, section or department supervisors, the maintenance direc­tor or building engineer (s), and other staff members.</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">C.4.2 Pre-Incident Planning Process.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">C.4.2.1 The information in the detention and correctional facility’s fire or disaster plan should be incorporated into the pre-incident plan.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">C.4.2.2 The pre-incident plan should address the level of security provided in a facility and the restrictions under which the emergency responders will be operating.</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">C.4.2.3 The following issues should be understood and considered in the development of the pre-incident plan:</span></p><ul data-dcnode-id="769"><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">The site or facility’s buildings, or both, will be secured; therefore, access will be delayed.</span></li><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Exiting a facility or site will also be delayed.</span></li><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Facility staff could limit access of responding personnel to the site or a building to ensure the safety of the respond­ing personnel.</span></li></ul><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">C.4.2.4 Inmate/Staff Relations. Movement of inmates is an issue that requires consideration, therefore planning should include developing a close working relationship with the facility staff.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">C.4.3 Physical Elements and Site Considerations. Facilities can be small, stand-alone buildings or can be located as part of another occupancy (e.g., in high-rise buildings, on campus- style sites). Large facilities on large sites can contain numerous occupancies in addition to the resident housing and adminis­tration buildings. Such facilities can include assembly occupan­cies such as gymnasiums, industrial occupancies used in the production of furniture or other commodities, warehouse occupancies, and health care occupancies. Each occupancy can have different levels of security or use conditions. Different areas within a given facility could have different use conditions.</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The use condition of a facility or area within a facility dictates the life safety features that have been provided in the facility. The level of restraint will fall into one of the classifica­tions defined in NFPA 101.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">C.4.3.1 Access. The pre-incident plan should reference the security measures necessary to enter a site or facility. Large facilities can require access through sally ports.</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">C.4.3.2 Construction. The location of fire and smoke barriers should be noted on the pre-incident plan. Detention and correctional facilities are designed with construction features to compartmentalize a fire within the enclosure or area of origin.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">C.4.3.3 Building Services. The plan should address the decision-making process for shutting off any utilities. Evacua­tion of a detention and correctional facility is not always practi­cal or necessary. Shutting off building utilities can be detrimental to the residents’ safety and health. Detention and correctional facilities can be located in buildings of different occupancies.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">C.4.4 Occupant Considerations. The pre-incident plan should address a process for identifying the maximum number of residents, staff members, or visitors within smoke zones.</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">C.4.4.1 Level of Restraint. The level of restraint of the resi­dents will vary between facilities, as well as between different areas within a facility. Inmates, in most cases, will not automati­cally be released outside the secured boundaries (the bounda­ries being within a building or site).</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">C.4.4.2 Data. The pre-incident plan should incorporate appropriate data from the facility emergency action plan.</span></p><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">C.4.4.3 Evacuation Procedures. The location of the smoke zones and areas of refuge should be emphasized in the pre- incident plan. Due to the security measures imposed on the residents in a detention and correctional facility, the construc­tion features of the facility have been designed to minimize the probability that a fire would require the movement of occu­pants. The building standards for detention and correctional facilities recognize that movement of residents is difficult, not only due to security measures imposed on the residents, but also due to the potential impact imposed on others by the movement of residents. Fire and products of combustion or contaminant barriers have been designed in detention and correctional facilities that are intended to allow residents to remain in place or provide for the horizontal movement of resi­dents to areas of refuge on a single floor, limiting residents’ exposure to any single fire. This philosophy is known as the defend-in-place concept. In order to achieve the successful outcome of a fire in a detention and correctional facility, the fire service must work closely with the facility staff throughout the incident. The working relationship should be stressed in the pre-incident plan. Detention and correctional facility staff are trained to evacuate residents, when necessary, to an adja­cent smoke zone through horizontal exits as the first level of evacuation.</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">C.4.4.3.1 The pre-incident plan should include relevant procedures and guidelines that could be needed if exterior evacuation of residents, outside of secured enclosures, becomes necessary.</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">C.4.4.3.2 In all cases, regardless of how far residents are moved in a fire incident, any movement of residents should be done under the direction of on-site staff.</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">C.4.5 Protection Systems and Water Supplies. The pre- incident plan should note the location of all fire department connections serving sprinkler systems or standpipe systems, or both, and the protection system each serves, because such connections can be remotely located away from the building served or outside of the secured site perimeter.</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">C.4.6 Special Hazards. Armory or munitions storage areas should be noted on the plan.</span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">C.4.7 Emergency Operations. During an emergency opera­tion, the following special considerations should be kept in mind:</span></p><ul data-dcnode-id="732"><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Any direct contact with inmates is to be avoided.</span></li><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">All equipment brought into a facility should be accoun­ted for, as any piece of equipment brought to the site by responding personnel can be used as a weapon.</span></li><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">In most cases, responding personnel will not be given keys to secured doors and will probably require escorting by facility staff.</span></li></ul><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">C.5 Residential Occupancies.</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">C.5.1 Administration. Pre-incident planning in residential occupancies, such as hotels, motels, dormitories, apartment buildings, and lodging or rooming houses, should involve not only the emergency responders but administrators, owners, managers, the maintenance director or building engineer(s), and other staff members.</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">C.5.2 Physical Elements and Site Considerations. C.5.2.1 Construction.</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">C.5.2.1.1 Corridors and fire-resistive separation, or lack thereof, between guest rooms in transient occupancies should be noted in the pre-incident plan, and the pre-incident plan should include details on transoms, transfer grilles, and door closures.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">C.5.2.1.2 Common attics, cocklofts, truss spaces, and other areas of potential concealed fire spread should be noted in the pre-incident plan.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">C.5.2.2 Building Services. Supplemental heating equipment, such as coal or wood stoves, should be noted in the pre- incident plan.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">C.5.2.3 External Conditions.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">C.5.2.3.1 The availability of a master key(s) and a list of doors that cannot be opened by the master key(s) should be noted in the pre-incident plan.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">C.5.2.3.2 Where the locking of any door impacts the accessi­bility of emergency responders, it should be noted in the pre- incident plan. During operating, and especially late-night, hours, exterior doors might be locked, preventing access to the building(s). Interior doors and stairwells might be locked to prevent movement within or between buildings.</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">C.5.3 Occupant Considerations.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">C.5.3.1 Evacuation. Where means of egress or escape are considered inadequate, operational considerations necessary to effect evacuation should be included in the pre-incident plan.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">C.5.3.2 Public Assembly Areas. Special attention should be paid to public assembly areas, including auditoriums, banquet halls, meeting rooms, theatrical stages, and so forth.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">C.5.3.3 Hours of Operation. The pre-incident plan should include a process to identify occupant load by area of the build­ing^) and operating hours.</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">C.5.3.4 Occupant Load. The pre-incident plan should note whether the hotel management maintains a continual list of guests by room number at the front or registration desk.</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">C.5.3.5 Staffing. The pre-incident plan should identify those members of hotel management, supervisory staff, and other personnel who are responsible for building operations or who can assist in emergency operations, because the number of such personnel varies greatly according to the time of day.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">C.5.3.6 Location of Occupants. The pre-incident plan should include information to help locate occupants needing assis­tance, which might or might not be available from the guest list in hotel occupancies.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">C.5.4 Protection Systems and Water Supplies.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">C.5.4.1 Type and Design. The type and design of automatic sprinkler systems should be noted in the pre-incident plan. In residential occupancies, systems designed in accordance with NFPA LSD or NFPA 13Rwill likely not have sprinklers in attics.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">C.5.4.2 Design Area. The design area of automatic sprinkler applications and nonsprinklered areas should be noted.</span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">C.5.4.3 Special Extinguishing Systems. The areas or hazards protected by special extinguishing systems and the operating procedures for those areas should be noted in the pre-incident plan. In hotel occupancies, special extinguishing systems might be installed in kitchens and might also be found in computer rooms.</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">C.5.5 Special Hazards. Special hazards, such as hotel or tenant storage areas, automobile parking, maintenance shops, kitchens, restaurants, retail outlets, exhibition halls, and mechanical rooms, should be noted in the pre-incident plan.</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">C.6 Residential Board and Care Occupancies.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">C.6.1 Administration. Pre-incident planning in a board and care occupancy should involve not only the emergency responders but managers, owners, the maintenance director or building engineer (s), and other staff members.</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">C.6.2 Occupant Considerations.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">C.6.2.1 Evacuation Capability.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">C.6.2.1.1 The pre-incident plan should note the evacuation capabilities of the residents.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">C.6.2.1.2 Where evacuation capabilities are determined to be slow or impractical, the pre-incident plan should note any addi­tional required resources.</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">C.6.2.2 Number of Staff. The number of staff, according to time of day, their assigned locations within the facility, and whether they could be asleep at night, should be noted in the pre-incident plan. The number of staff who are responsible for residents will vary depending on time of day, size of the facility, and personal care needs of the residents.</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">C.6.2.3 Location of Occupants. The location of occupants needing assistance to evacuate should be noted in the pre- incident plan.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">C.6.2.4 Means of Egress. The adequacy and arrangement of means of egress should be noted in the pre-incident plan. In addition to normal means of egress provisions, residential board and care facilities can include emergency escape routes consisting of exterior windows or doors.</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">C.6.3 Protection Systems and Water Supplies.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">C.6.3.1 The type and design of automatic sprinkler systems should be noted in the pre-incident plan. In residential board and care occupancies, systems designed in accordance with NFPA 13D or NFPA 13Rwill likely not have sprinklers in attics.</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">C.6.3.2 The design area of automatic sprinkler applications and nonsprinklered areas should be noted.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">C.6.4 Emergency Operations. The pre-incident plan should contain provisions for sheltering evacuated occupants with special needs.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">C.7 Mercantile Occupancies.</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">C.7.1 Administration. Pre-incident planning in a mercantile occupancy should involve not only the emergency responders but administrators, section or department supervisors, the maintenance director or building engineer(s), and other staff members.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">C.7.2 Physical Elements and Site Considerations. C.7.2.1 Construction.</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">C.7.2.1.1 The presence, location, and component ratings of fire walls, fire barriers, and smoke compartments, as well as the protection provided for any openings, should be noted on the pre-incident plan.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">C.7.2.1.2 Specific items that should be noted on the pre- incident plan for strip mall shopping center occupancies or rows of attached mercantile occupancies include the following:</span></p><ul data-dcnode-id="647"><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Common walls between occupancies</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Common areas in cocklofts, attics, or basements</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Breached fire barriers</span></li></ul><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">C.7.2.1.3 Specific items that should be noted on the pre- incident plan where covered mall buildings have large, undivi­ded areas and unprotected openings between floors include, but are not limited to, the following:</span></p><ul data-dcnode-id="636"><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Tenants that are open to the covered mall, adding to the size of the open areas</span></li><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Protection provided at the entrances to anchor stores from the covered mall, including water curtains, fire barriers, or smoke barriers</span></li><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Size and characteristics of the protection for the open­ings, along with reliability of the closing mechanism</span></li><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Roof construction</span></li></ul><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">C.7.3 Occupant Consideration. Information on the following characteristics should be noted on the pre-incident plan:</span></p><ul data-dcnode-id="627"><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">In multi-tenanted locations, variations in the hours of operation of the tenants</span></li><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Any separate entrance and egress controls for tenants</span></li><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Seasonal events, temporary kiosks, and special promo­tions in common areas that could affect occupant evacua­tion or the operations of emergency responders</span></li></ul><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">C.7.4 Emergency Organization.</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">C.7.4.1 The expected effectiveness of mall or store managers, security, or on-site emergency services, if provided, should be included in the pre-incident plan.</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">C.7.4.2 Evacuations of multi-tenanted occupancies can be difficult to accomplish, and details of resources needed to complete an evacuation, including joint operations with the emergency organization, should be noted in the pre-incident plan.</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">C.7.5 Protection Systems and Water Supplies. C.7.5.1 Hydrants.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">C.7.5.1.1 The water supply for on-site hydrants, public or private, has the potential to be complex, particularly when multiple sources are involved, and details should be noted in the pre-incident plan.</span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">C.7.5.1.2 For private systems, an emergency contact familiar with the supply should be noted.</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">C.7.5.2 Automatic Sprinkler Systems. Details on the types of systems and their location, layout, and protected areas should be noted, because numerous risers and control valves often exist where multiple systems are located throughout large mercantile or multi-tenanted occupancies.</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">C.7.5.3 Standpipes. Interior hose line stretches within large mercantile occupancies can be extensive and should be noted.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">C.7.5.4 Protective Signaling Systems. The presence of multi­ple fire alarm control panels and variations in areas of coverage and method of occupant notification within multi-tenanted occupancies should be noted on the pre-incident plan.</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">C.7.6 Special Hazards. Special hazards that should be noted include those associated with the following:</span></p><ul data-dcnode-id="594"><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Stock areas</span></li><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">High-challenge commodities or hazardous materials such as aerosols, oxidizers, pesticides, and flammable or combustible liquids, with identification of incompatible materials such as oxidizers and petroleum products provi­ded</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Warehouse store hazards typically found in large home improvement stores, large furniture stores, carpet outlets, and automobile tire distributors</span></li><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Food courts or restaurants with commercial cooking equipment</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Trash collection and compactor rooms</span></li><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Seasonal events, temporary kiosks, and special promo­tions in common areas</span></li></ul><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">C.8 Business Occupancies.</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">C.8.1 Administration. Pre-incident planning in general busi­ness offices; physician’s offices; outpatient clinics; college, instructional, and university classrooms under 50 persons; and government offices should involve not only responding person­nel but administrators, owners, managers, the maintenance director/building engineer (s), and other staff members.</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">C.8.2 Occupant Considerations.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">C.8.2.1 Special attention should be paid to public assembly areas, including auditoriums, banquet halls, cafeterias, and conference or meeting rooms, that are common to business occupancies.</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">C.8.2.2 The pre-incident plan should include information to help locate occupants needing assistance.</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">C.8.2.3 Conditions that could affect rescue should be noted. These include, but are not limited to, high-rise construction, subterranean spaces, hours of operation, vehicle access, and crowd control.</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">C.8.3 Special Hazards.</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">C.8.3.1 Significant high hazard contents that might be stored in multiple areas throughout the building(s), including print shops, storage areas, file storage areas, automobile parking areas, maintenance shops, kitchens, and retail outlets, should be noted in the pre-incident plan.</span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">C.8.3.2 Storage of flammable/combustible liquids or flamma­ble gases in areas such as physician’s offices, outpatient clinics, biological/radiological areas, or instructional laboratories should be noted in the pre-incident plan.</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">C.8.4 Emergency Operations. Open floor plan areas could be a maze of cubicles, so information should be recorded in the pre-incident plan to assist emergency responders in dealing with hazards in such areas during operations.</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">C.9 Industrial Occupancies.</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">C.9.1 Administration. Requests for information and other material related to pre-incident planning should be referred to the local facility management team, where appropriate.</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">C.9.2 Personnel. Pre-incident planning in an industrial occu­pancy should involve not only responding personnel but administrators, section or department supervisors, the mainte­nance director or building engineer(s), and other staff members. Within industrial occupancies, an established management team will often have the overall responsibility of operating a specific facility, including its environmental and safety functions. Personnel with knowledge of, or direct control over, industrial hygiene operations, emergency response teams, and pre-incident plant engineering will be assigned to this team. Much of the preliminary data gathering process and assignment of safety duties might already be established.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">C.9.3 Pre-incident Planning Process. During the pre-incident planning process, pre-existing safety-related documentation, including documentation on the following, should be reviewed to enhance and expedite the development of the pre-incident plan itself:</span></p><ul data-dcnode-id="551"><li data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Process hazard analysis</span></li><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Confined space rescue pre-incident plans</span></li><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Spill prevention control and countermeasure (SPCC) plans</span></li><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Security vulnerability assessment (SVA)</span></li><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">National infrastructure protection plan (NIPP)</span></li><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Integrated contingency plan (ICP)</span></li><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Facility response plan (FRP)</span></li></ul><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">C.9.4 Physical Elements and Site Considerations.</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">C.9.4.1 General. Pre-incident plans should address each of the following situations individually and note their criticality and the impact their loss would have on the entire facility:</span></p><ul data-dcnode-id="542"><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Industrial occupancies that occupy a large tract of land with numerous site-specific hazards</span></li><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Separate, stand-alone buildings that either provide physi­cal support functions (e.g., steam generation) or supply materials in various stages of development to other build­ings on site as part of overall processes (e.g., chemical reactor processes, raw material conveyor processes, general assembly operations)</span></li></ul><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">C.9.4.2 Construction. The pre-incident plan should note the following features:</span></p><ul data-dcnode-id="535"><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Buildings with walls or panels designed to relieve pressure in the event that an explosion occurs</span></li><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Reactors and other process vessels that incorporate relief mechanisms into their design</span></li></ul><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">C.9.4.3 Utilities. The pre-incident plan should address the decision-making process for shutting off utilities, because their interruption can have catastrophic consequences.</span></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">C.9.4.4 Access. The pre-incident plan should note operating features, such as the following, that can hinder access to a facility:</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">(1) Rack storage</span></p><ul data-dcnode-id="512"><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Rolling stock</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Railroad sidings</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Trucking</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Container storage</span></li><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Automatic rack storage retrieval systems</span></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Fences or caged-in areas (e.g., aerosols)</span></li><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Furnaces (e.g., molten metal)</span></li><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Plating operations (e.g., caustic or acidic solutions)</span></li></ul><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">C.9.5 Occupant Considerations. The pre-incident plan should note the total number of people present at an industrial facility and indicate how that number varies, depending on time of day, time of year, and level of automation. Occupant load will vary with the operations conducted. Personnel might work in remote locations; for example, in outside buildings, overhead cranes, and boiler rooms.</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">C.9.5.1 The extent to which nonemployees (e.g., contractors, delivery personnel) are used should be noted.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">C.9.5.2 If the facility has implemented an accountability system, the details of that system should be included in the pre- incident plan to assist emergency responders in carrying out their life safety priority actions.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">C.9.5.3 Building pre-incident plans should be used to assist in evaluating the location and appropriateness of areas of refuge that utilize fire walls and other rated separation. Depending on the magnitude of the incident and the hazard potential, many large industrial facilities will not have a need for total evacua­tion due to compartmentation.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">C.9.5.4 The pre-incident plan should be coordinated with the emergency action plan (EAP) for the facility because the EAP will typically detail the employee evacuation plan, designate the individuals responsible for various aspects of the plan, and detail the capabilities of the facility. Smaller facilities’ plans include total evacuation of the building. A local emergency contact can be listed, along with a designated meeting area for personnel to gather after an evacuation. Larger facilities’ plans might identify an emergency response team that has responsi­bility for controlling an incident until responding personnel arrive. Other sections of the EAP could note the availability of subject matter experts, authorized personnel, procedures for shutting down processes, and procedures to follow in the event of civil disturbances.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">C.9.5.5 The pre-incident plan should provide details of the time involved in shutting down a process, because some processes require manual shutdown procedures, and decisions have to be made by the emergency responders regarding the evacuation of the process operators.</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Some processes can require an extended period of time for proper shutdown. When the shutdown procedures are performed manually, depending on the location of the emer­gency incident, such a shutdown could expose the process operators to potentially hazardous conditions from the surrounding area.</span></p><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">C.9.5.6 If special arrangements for personnel evacuation are necessary due to the location or physical challenges of the personnel, the pre-incident plan should document those arrangements, including considerations for alternative means of evacuation or rescue.</span></p><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Personnel could be located in overhead cranes, on upper floors of a multiple-story building, or in critical control centers where standard means of evacuation might not be applicable.</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">C.9.6 Protection Systems and Water Supplies. Where a facility utilizes a wide variety of fire and special protection systems that can be very complex, the pre-incident plan should note the type, location, and coverage of each system. Special protection systems include explosion suppression systems, local applica­tion and total-flooding gaseous systems, fixed-foam systems, and dry chemical systems, as well as inerting and vapor- mitigating and recovery systems. Personnel should have a basic understanding of the system operational features, potential hazards involved, and availability of reserve agent supplies.</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">C.9.7 Special Hazards. Special hazards that should be noted in the pre-incident plan include those specified in C.7.6(l) through C.7.6(6).</span></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Containers that could hold materials that present special hazards include the following:</span></p><ul data-dcnode-id="469"><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Railcars</span></li><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Tank trucks</span></li><li data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Van trailers</span></li><li data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Intermediate bulk containers</span></li><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Hazardous materials and hazardous waste storage lock­ers</span></li><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Construction trailers</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Gas cages and gas lines</span></li><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Flammable liquid dispensing containers</span></li><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Emergency generator tanks</span></li></ul><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">(10) Treatment chemical tanks (e.g., acid- and base- neutralizing chemicals)</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">C.9.7.1 Controlled Environments.</span></p><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">C.9.7.1.1 Cleanrooms, freezers, and other environmentally controlled areas should be noted in the pre-incident plan.</span></p><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">C.9.7.1.2 Procedures for entering controlled environments during an incident should be reviewed with facility personnel and noted on the pre-incident plan.</span></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">C.9.7.2 Commodity Combustibility and Hazards. Commodity combustibility and hazards should be noted in the pre-incident plan, taking the following into account:</span></p><ul data-dcnode-id="444"><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">The commodity could have hazardous properties or be unstable under fire conditions.</span></li><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Facilities could have some quantity of flammable liquids, most in the form of solvents and cleaning chemicals.</span></li><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Dedicated storage of flammable liquids might be inside or outside.</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Outside storage of flammable or toxic gases might be in separate buildings or bunkers.</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Some materials can be reactive with air or water.</span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Air or water contamination can take place if a hazardous release occurs, regardless of whether water is used.</span></li><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Combustible dusts might be present.</span></li></ul><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">C.9.7.3 Fueling Facilities. The pre-incident plan should note the hazards posed by powered industrial vehicles using a variety of fuels.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">C.9.7.4 Treatment Plants. The hazards posed by on-site treat­ment plants, including storage of chemicals such as chlorine, other oxidizers, and corrosives, should be noted in the pre- incident plan.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">C.9.7.5 Process Hazards. The pre-incident plan should iden­tify any process hazards that could involve hazardous materials and operations.</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">C.9.7.6 Radiological Hazards. The pre-incident plan should identify all radiological hazards, both ionizing and contaminat­ing.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">C.9.8 Emergency Operation. Where an industrial facility maintains its own emergency response team with varying degrees of training and areas of expertise, discussions should take place with the on-site emergency response team coordina­tor to determine the level of response and resources available from the site team.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">The level of involvement with on-site emergency response teams should include periodic drills that involve scenarios such as rescue, process shutdown, sheltering in place, and so forth.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Teams or resources, or both, for hazardous materials response, confined space rescue, high-angle rescue, and emer­gency medical services can be included. Note that different standards are used for fire response and hazardous materials response training. Consequently, a fire brigade is not necessa­rily a hazardous materials team, nor is a hazardous materials team a fire brigade. Where a facility has its employees respond to emergency releases of hazardous materials, government standards regulate emergency response pre-incident plans and the training requirements for a hazardous materials team.</span></p><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">C.10 Warehouses and Storage Occupancies.</span></p><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">C.10.1 Administration. For warehouse fire-fighting operations to be successful, the pre-incident plan should be developed with a full knowledge of the design and capabilities of the sprinkler systems within the warehouse.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">C.10.1.1 Pre-incident planning in a warehouse occupancy should involve not only emergency responders but also admin­istrators, owners, the maintenance director or building engi­neer (s), and tenants.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">C.10.1.2 Warehouses pose one of the greatest challenges to fire control for both automatic fire suppression systems and manual fire fighting. Manual fire suppression cannot take the place of a properly designed, installed, and functioning sprin­kler system in a warehouse. If the warehouse is not protected by automatic sprinklers designed for the commodities stored and the configuration in which they are arranged, there is little chance of controlling a fire. Likewise, it must be recognized that even the best designed sprinkler system might not extin­guish a warehouse fire, and manual fire suppression can be required to effect final extinguishment.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">C.10.2 Pre-Incident Planning Process. Special considerations might be necessary for the pre-incident planning process, depending on the types and quantities of materials stored in warehouse and storage occupancies.</span></p><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">C.10.3 Physical Elements and Site Considerations.</span></p><ol data-dcnode-id="415" start="10"><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">10.3.1 Construction Features. The construction of the building, information on whether internal walls are fire rated and constructed as fire walls or fire barriers, and the rating of the wall assembly should be noted on the pre-incident plan.</span></li></ol><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">C.10.3.1.1 The protection of openings in fire walls and fire barriers should also be noted on the pre-incident plan.</span></p><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">C.10.3.1.2 The adequacy of maintenance for fire doors should be evaluated to determine their probable performance in a fire.</span></p><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">C.10.3.2 Building Access. The following building access factors should be considered and noted in the pre-incident plan, where applicable:</span></p><ul data-dcnode-id="404"><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Warehouses are generally built with limited access and increased security measures for inventory control.</span></li><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">In addition to building construction barriers, operating features can hinder access.</span></li></ul><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Stock stored in the aisles; internal control barriers, such as wire cages in bonded warehouses or aerosol storage; or trucks parked at the loading dock can contribute to building access problems. Storage racks hundreds of feet long, without cross aisles, can reduce access to the interior of the building and dictate the use of exterior doors located only at the rack ends for manual fire suppression operations.</span></p><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">C.10.3.3 Controlled Environments. The presence of large freezers and a controlled atmosphere should be noted, and the following also should be considered:</span></p><ul data-dcnode-id="395"><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Special care might be required before entering these areas.</span></li><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">It might also be necessary to identify persons or proce­dures for shutting down.</span></li></ul><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">C.10.4 Occupant Considerations. The impact of the following on life safety considerations, on-site emergency action pre- incident plans, and the safety of emergency responders should be considered and noted in the pre-incident plan, where appli­cable:</span></p><ul data-dcnode-id="386"><li data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Storage configuration</span></li><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Seasonal variations in stock</span></li><li data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Material-handling devices</span></li></ul><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">C.10.5 Protection Systems and Water Supply. C.10.5.1 Automatic Sprinklers.</span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">C.10.5.1.1 Sprinkler System Design. The presence of auto­matic sprinkler systems and the sys
