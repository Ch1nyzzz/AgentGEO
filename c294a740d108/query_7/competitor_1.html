</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">(5) Train new fire response employees before they engage in emergency operations;</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">(6) At least quarterly, provide training on the written operating procedures to fire response employees who are expected to fight fires;</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">(7) Use qualified instructors to conduct the training;</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">(8) Conduct any training that involves live fire response exercises in accordance with NFPA 1403-2002 Standard on Live Fire Training Evolutions (incorporated by reference, see § 1915.5);</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">(9) Conduct semi-annual drills according to the employer's written procedures for fire response employees that cover site-specific operations, occupancies, buildings, vessels and vessel sections, and fire-related hazards; and</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">(10) Prohibit the use of smoke generating devices that create a dangerous atmosphere in training exercises.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="654" instrument_node="">(e) </span><strong data-dcnode-id="651"><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Additional training requirements for fire watch duty.</span></em></strong><span data-dcnode-id="650" instrument_node=""> (1) The employer must ensure that each fire watch is trained by an instructor with adequate fire watch knowledge and experience to cover the items as follows:</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">(i) Before being assigned to fire watch duty;</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">(ii) Whenever there is a change in operations that presents a new or different hazard;</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">(iii) Whenever the employer has reason to believe that the fire watch's knowledge, skills, or understanding of the training previously provided is inadequate; and</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">(iv) Annually.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">(2) The employer must ensure that each employee who stands fire watch duty is trained in:</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">(i) The basics of fire behavior, the different classes of fire and of extinguishing agents, the stages of fire, and methods for extinguishing fires;</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">(ii) Extinguishing live fire scenarios whenever allowed by local and federal law;</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">(iii) The recognition of the adverse health effects that may be caused by exposure to fire;</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">(iv) The physical characteristics of the hot work area;</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">(v) The hazards associated with fire watch duties;</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">(vi) The personal protective equipment (PPE) needed to perform fire watch duties safely;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">(vii) The use of PPE;</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">(viii) The selection and use of any fire extinguishers and fire hoses likely to be used by a fire watch in the work area;</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">(ix) The location and use of barriers;</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">(x) The means of communication designated by the employer for fire watches;</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">(xi) When and how to start fire alarm procedures; and</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">(xii) The employer's evacuation plan.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">(3) The employer must ensure that each fire watch is trained to alert others to exit the space whenever:</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">(i) The fire watch perceives an unsafe condition;</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">(ii) The fire watch perceives that a worker performing hot work is in danger;</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">(iii) The employer or a representative of the employer orders an evacuation; or</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">(iv) An evacuation signal, such as an alarm, is activated.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="581" instrument_node="">(f) </span><strong data-dcnode-id="578"><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Records.</span></em></strong><span data-dcnode-id="577" instrument_node=""> The employer must keep records that demonstrate that employees have been trained as required by paragraphs (a) through (e) of this section.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">(1) The employer must ensure that the records include the employee's name; the trainer's name; the type of training; and the date(s) on which the training took place.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">(2) The employer must keep each training record for one year from the time it was made or until it is replaced with a new training record, whichever is shorter, and make it available for inspection and copying by OSHA on request.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">§ 1915.509 Definitions applicable to this subpart.</span></strong></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><strong data-dcnode-id="562"><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Alarm</span></em></strong><span data-dcnode-id="561" instrument_node=""> -- a signal or message from a person or device that indicates that there is a fire, medical emergency, or other situation that requires emergency response or evacuation. At some shipyards, this may be called an "incident" or a "call for service."</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="554"><strong data-dcnode-id="556"><em data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Alarm system</span></em></strong><span data-dcnode-id="555" instrument_node=""> -- a system that warns employees at the worksite of danger.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="550"><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Body harness</span></em></strong><span data-dcnode-id="549" instrument_node=""> -- a system of straps that may be secured about the employee in a manner that will distribute the fall arrest forces over at least the thighs, shoulders, chest, and pelvis, with means for attaching it to other components of a personal fall arrest system.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="542"><strong data-dcnode-id="544"><em data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Class II standpipe system</span></em></strong><span data-dcnode-id="543" instrument_node=""> -- a 1 1/2 inch (3.8 cm) hose system which provides a means for the control or extinguishment of incipient stage fires.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="536"><strong data-dcnode-id="538"><em data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Contract employer</span></em></strong><span data-dcnode-id="537" instrument_node=""> -- an employer, such as a painter, joiner, carpenter, or scaffolding sub-contractor, who performs work under contract to the host employer or to another employer under contract to the host employer at the host employer's worksite. This excludes employers who provide incidental services that do not influence shipyard employment (such as mail delivery or office supply services).</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="526"><strong data-dcnode-id="532"><em data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Dangerous atmosphere</span></em></strong><span data-dcnode-id="531" instrument_node=""> -- an atmosphere that may expose employees to the risk of death, incapacitation, injury, acute illness, or impairment of ability to self-rescue (</span><strong data-dcnode-id="528"><em data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">i.e.</span></em></strong><span data-dcnode-id="527" instrument_node="">, escape unaided from a confined or enclosed space).</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="520"><strong data-dcnode-id="522"><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Designated area</span></em></strong><span data-dcnode-id="521" instrument_node=""> -- an area established for hot work after an inspection that is free of fire hazards.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Drop Test -- a method utilizing gauges to ensure the integrity of an oxygen fuel gas burning system. The method requires that the burning torch is installed to one end of the oxygen and fuel gas lines and then the gauges are attached to the other end of the hoses. The manifold or cylinder supply valve is opened and the system is pressurized. The manifold or cylinder supply valve is then closed and the gauges are watched for at least sixty (60) seconds. Any drop in pressure indicates a leak.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="513"><em data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Emergency operations</span></em></strong><span data-dcnode-id="512" instrument_node=""> -- activities performed by fire response organizations that are related to: rescue, fire suppression, emergency medical care, and special operations or activities that include responding to the scene of an incident and all activities performed at that scene.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><strong data-dcnode-id="507"><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Fire hazard</span></em></strong><span data-dcnode-id="506" instrument_node=""> -- a condition or material that may start or contribute to the spread of fire.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="499"><strong data-dcnode-id="501"><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Fire protection</span></em></strong><span data-dcnode-id="500" instrument_node=""> -- methods of providing fire prevention, response, detection, control, extinguishment, and engineering.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="493"><strong data-dcnode-id="495"><em data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Fire response</span></em></strong><span data-dcnode-id="494" instrument_node=""> -- the activity taken by the employer at the time of an emergency incident involving a fire at the worksite, including fire suppression activities carried out by internal or external resources or a combination of both, or total or partial employee evacuation of the area exposed to the fire.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="487"><strong data-dcnode-id="489"><em data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Fire response employee</span></em></strong><span data-dcnode-id="488" instrument_node=""> -- a shipyard employee who carries out the duties and responsibilities of shipyard firefighting in accordance with the fire safety plan.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="481"><strong data-dcnode-id="483"><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Fire response organization</span></em></strong><span data-dcnode-id="482" instrument_node=""> -- an organized group knowledgeable, trained, and skilled in shipyard firefighting operations that responds to shipyard fire emergencies, including: fire brigades, shipyard fire departments, private or contractual fire departments, and municipal fire departments.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="475"><strong data-dcnode-id="477"><em data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Fire suppression</span></em></strong><span data-dcnode-id="476" instrument_node=""> -- the activities involved in controlling and extinguishing fires.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="469"><strong data-dcnode-id="471"><em data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Fire watch</span></em></strong><span data-dcnode-id="470" instrument_node=""> -- the activity of observing and responding to the fire hazards associated with hot work in shipyard employment and the employees designated to do so.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="463"><strong data-dcnode-id="465"><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Fixed extinguishing system</span></em></strong><span data-dcnode-id="464" instrument_node=""> -- a permanently installed fire protection system that either extinguishes or controls fire occurring in the space it protects.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457"><strong data-dcnode-id="459"><em data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Flammable liquid</span></em></strong><span data-dcnode-id="458" instrument_node=""> -- any liquid having a flashpoint below 100 °F (37.8 °C), except any mixture having components with flashpoints of 100 °F (37.8 °C) or higher, the total of which make up 99 percent or more of the total volume of the mixture.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="451"><strong data-dcnode-id="453"><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Hazardous substance</span></em></strong><span data-dcnode-id="452" instrument_node=""> -- a substance likely to cause injury by reason of being explosive, flammable, poisonous, corrosive, oxidizing, an irritant, or otherwise harmful.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="445"><strong data-dcnode-id="447"><em data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Hose systems</span></em></strong><span data-dcnode-id="446" instrument_node=""> -- fire protection systems consisting of a water supply, approved fire hose, and a means to control the flow of water at the output end of the hose.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="439"><strong data-dcnode-id="441"><em data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Host employer</span></em></strong><span data-dcnode-id="440" instrument_node=""> -- an employer who is in charge of coordinating work or who hires other employers to perform work at a multi-employer workplace.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="433"><strong data-dcnode-id="435"><em data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Incident management system</span></em></strong><span data-dcnode-id="434" instrument_node=""> -- a system that defines the roles and responsibilities to be assumed by personnel and the operating procedures to be used in the management and direction of emergency operations; the system is also referred to as an "incident command system" (ICS).</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="429"><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Incipient stage fire</span></em></strong><span data-dcnode-id="428" instrument_node=""> -- a fire, in the initial or beginning stage, which can be controlled or extinguished by portable fire extinguishers, Class II standpipe or small hose systems without the need for protective clothing or breathing apparatus.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="421"><strong data-dcnode-id="423"><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Inerting</span></em></strong><span data-dcnode-id="422" instrument_node=""> -- the displacement of the atmosphere in a permit space by noncombustible gas (such as nitrogen) to such an extent that the resulting atmosphere is noncombustible. This procedure produces an IDLH oxygen-deficient atmosphere.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><strong data-dcnode-id="417"><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Interior structural firefighting operations</span></em></strong><span data-dcnode-id="416" instrument_node=""> -- the physical activity of fire response, rescue, or both involving a fire beyond the incipient stage inside of buildings, enclosed structures, vessels, and vessel sections.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="409"><strong data-dcnode-id="411"><em data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Multi-employer workplace</span></em></strong><span data-dcnode-id="410" instrument_node=""> -- a workplace where there is a host employer and at least one contract employer.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="403"><strong data-dcnode-id="405"><em data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Personal Alert Safety System (PASS)</span></em></strong><span data-dcnode-id="404" instrument_node=""> -- a device that sounds a loud signal if the wearer becomes immobilized or is motionless for 30 seconds or more.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><strong data-dcnode-id="399"><em data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Physical isolation</span></em></strong><span data-dcnode-id="398" instrument_node=""> -- the elimination of a fire hazard by removing the hazard from the work area (at least 35 feet for combustibles), by covering or shielding the hazard with a fire-resistant material, or physically preventing the hazard from entering the work area.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="391"><strong data-dcnode-id="393"><em data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Physically isolated</span></em></strong><span data-dcnode-id="392" instrument_node=""> -- positive isolation of the supply from the distribution piping of a fixed extinguishing system. Examples of ways to physically isolate include: removing a spool piece and installing a blank flange; providing a double block and bleed valve system; or completely disconnecting valves and piping from all cylinders or other pressure vessels containing extinguishing agents.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="385"><strong data-dcnode-id="387"><em data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Protected space</span></em></strong><span data-dcnode-id="386" instrument_node=""> -- any space into which a fixed extinguishing system can discharge.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="379"><strong data-dcnode-id="381"><em data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Proximity firefighting</span></em></strong><span data-dcnode-id="380" instrument_node=""> -- specialized fire-fighting operations that require specialized thermal protection and may include the activities of rescue, fire suppression, and property conservation at incidents involving fires producing very high levels of conductive, convective, and radiant heat such as aircraft fires, bulk flammable gas fires, and bulk flammable liquid fires. Proximity firefighting operations usually are exterior operations but may be combined with structural firefighting operations. Proximity firefighting is not entry firefighting.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><strong data-dcnode-id="375"><em data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Qualified instructor</span></em></strong><span data-dcnode-id="374" instrument_node=""> -- a person with specific knowledge, training, and experience in fire response or fire watch activities to cover the material found in § 1915.508(b) or (c).</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="367"><strong data-dcnode-id="369"><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Rescue</span></em></strong><span data-dcnode-id="368" instrument_node=""> -- locating endangered persons at an emergency incident, removing those persons from danger, treating the injured, and transporting the injured to an appropriate health care facility.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="361"><strong data-dcnode-id="363"><em data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Shipyard firefighting</span></em></strong><span data-dcnode-id="362" instrument_node=""> -- the activity of rescue, fire suppression, and property conservation involving buildings, enclosed structures, vehicles, vessels, aircraft, or similar properties involved in a fire or emergency situation.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="355"><strong data-dcnode-id="357"><em data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Small hose system</span></em></strong><span data-dcnode-id="356" instrument_node=""> -- a system of hoses ranging in diameter from 5/8" (1.6 cm) up to 1 1/2" (3.8 cm) which is for the use of employees and which provides a means for the control and extinguishment of incipient stage fires.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="349"><strong data-dcnode-id="351"><em data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Standpipe</span></em></strong><span data-dcnode-id="350" instrument_node=""> -- a fixed fire protection system consisting of piping and hose connections used to supply water to approved hose lines or sprinkler systems. The hose may or may not be connected to the system.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="345"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Appendix A to Subpart P -- Model Fire Safety Plan (Non-Mandatory)</span></strong></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Model Fire Safety Plan</span></strong></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="336"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Note:</span></strong><span data-dcnode-id="337" instrument_node=""> This appendix is non-mandatory and provides guidance to assist employers in establishing a Fire Safety Plan as required in § 1915.502.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="332"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Table of Contents</span></strong></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="330" instrument_node="">I. Purpose.</span><br data-dcnode-id="329"><span data-dcnode-id="328" instrument_node="">
II. Work site fire hazards and how to properly control them.</span><br data-dcnode-id="327"><span data-dcnode-id="326" instrument_node="">
III. Alarm systems and how to report fires.</span><br data-dcnode-id="325"><span data-dcnode-id="324" instrument_node="">
IV. How to evacuate in different emergency situations.</span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">
V. Employee awareness.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="317"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">I. Purpose</span></strong></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">The purpose of this fire safety plan is to inform our employees of how we will control and reduce the possibility of fire in the workplace and to specify what equipment employees may use in case of fire.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="310"><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">II. Work Site Fire Hazards and How To Properly Control Them</span></strong></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">A. Measures to contain fires.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">B. Teaching selected employees how to use fire protection equipment.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">C. What to do if you discover a fire.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">D. Potential ignition sources for fires and how to control them.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">E. Types of fire protection equipment and systems that can control a fire.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">F. The level of firefighting capability present in the facility, vessel, or vessel section.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">G. Description of the personnel responsible for maintaining equipment, alarms, and systems that are installed to prevent or control fire ignition sources, and to control fuel source hazards.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="285"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">III. Alarm Systems and How To Report Fires</span></strong></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">A. A demonstration of alarm procedures, if more than one type exists.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">B. The work site emergency alarm system.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">C. Procedures for reporting fires.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="272"><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">IV. How To Evacuate in Different Emergency Situations</span></strong></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">A. Emergency escape procedures and route assignments.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">B. Procedures to account for all employees after completing an emergency evacuation.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">C. What type of evacuation is needed and what the employee's role is in carrying out the plan.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">D. Helping physically impaired employees.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="256"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">V. Employee Awareness</span></strong></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Names, job titles, or departments of individuals who can be contacted for further information about this plan.</span></p><span data-dcnode-id="252" instrument_node="">
