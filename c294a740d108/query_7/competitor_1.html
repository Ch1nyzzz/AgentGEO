</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">In paragraph (d)(2) of § 1915.505, OSHA proposed that the employer: "[s]et up written administrative regulations, standard operating procedures, and departmental orders for fire response functions." The proposed language was based on Chapter 4 of NFPA 1500- 2002 addressing the organization of fire response providers and Chapter 2.1 of NFPA 600-2001 addressing the general administration of industrial fire brigades.</span></p><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">No comments were received on paragraph (d)(2). However, upon reconsideration, OSHA has decided that the requirement was not easily understood, and it was unclear how it differed from the written policy requirements for internal fire response proposed at § 1915.505(b)(1). Therefore, OSHA has modified § 1915.505(d)(2) using NFPA 600-2001 to require employers to: "Establish lines of authority and assign responsibilities to ensure that the components of the internal fire response are accomplished." This language provides a clearer description of the provision's requirements than the terms "administrative regulations" and "departmental orders." There is no need to include a requirement for "standard operating procedures," as they are already required in § 1915.505(b)(1).</span></p><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">In paragraph (d)(3) of § 1915.505, OSHA requires the employer to set up an Incident Management System (IMS) to coordinate and direct fire response functions. This system must include specific fire emergency responsibilities; how the employer will account for all fire response employees during an emergency operation; and what resources would be offered by outside organizations. This is consistent with the goals and language found in paragraph 8.1 of NFPA 1500-2002.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">The Connecticut Department of Labor raised a question regarding the provision, asking: "Why does the proposed standard change the customary verbiage of incident command system to incident management system? Will this confuse fire departments that will also be involved in the firefighting?" (Ex. 22-4).</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">While the Incident Command System (ICS) term is customary language often used by firefighting professionals, OSHA proposed to use the IMS term to be consistent with the terms currently in use by firefighting organizations and training institutions. The most recent NFPA standards use the IMS term, including NFPA 1500-2002 Fire Department Occupational Safety and Health Program, NFPA 600-2000 Requirements for All Industrial Fire Brigades, and NFPA 1561-2000 Emergency Services Incident Management System. In addition, the IMS term is commonly used by organizations that train firefighters. For example, individual courses on incident management are currently offered by the Maryland Fire and Rescue Institute (http://apps.mfri.orrg) and the Federal Emergency Management Agency National Fire Academy (http://www.usfa.fema.gov/fire-service/nfa/nfa.shtm). Because the IMS is the preferred term, OSHA is using the IMS term in the final rule.</span></p><span data-dcnode-id="2831" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">OSHA is also modifying the proposed definition of IMS in § 1915.509 to match the definition used by NFPA in NFPA 1500-2002, which is: "A system that defines the roles and responsibilities to be assumed by personnel and the operating procedures to be used in the management and direction of emergency operations; the system is also referred to as an incident command system (ICS)." This modification does not change the meaning or intent of the proposed term, and is more consistent with the NFPA's use of IMS.</span></p><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Paragraph (d)(4) of § 1915.505 requires that employers provide specified information to the outside fire response organization to be used. These provisions are consistent with existing OSHA requirements (29 CFR 1910.120 Hazardous waste operations and emergency response and 29 CFR 1910.156 Fire brigades). No comments were received on paragraph (d)(4), and it is included in the final standard.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Personal Protective Clothing and Equipment for Fire Response Employees</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Paragraph (e) of § 1915.505 contains the requirements for providing personal protective clothing and personal protective equipment for shipyard fire response personnel. Paragraph (e)(1) requires that the employer must provide fire response employees with hazard specific personal protective clothing and equipment at no cost to the employees. The employer must also make sure that each employee wears the appropriate personal protective clothing and equipment that offers protection from the hazards to which that employee is likely to be exposed. This is consistent with the language found in Chapter 7 of NFPA 1500-2002 (Ex. 19-5). It is also consistent with existing OSHA standards.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">In § 1915.505(e)(2), OSHA states the requirements for thermal stability and flame resistance or protective clothing. Paragraph (e)(2)(i) requires the employer to make sure that each fire response employee exposed to flame hazards wears clothing that minimizes the extent of injury that the fire response employee would sustain. Paragraph (e)(2)(ii) specifically prohibits the wearing of clothing made from acetate, nylon, or polyester, either alone or in blends, unless it can be shown that the fabric can withstand the flammability hazard that could be encountered, or that the clothing is worn in such a way to eliminate the flammability hazard that may be encountered. This language is consistent with the language in existing OSHA standards and in paragraph 7.1.6 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Paragraph (e)(3) of § 1915.505 addresses respiratory protection for shipyard fire response employees. Under paragraph (e)(3)(i), the employer must provide self-contained breathing apparatus (SCBA) to all shipyard fire response employees who are involved in emergency operations in an atmosphere that is or may become immediately dangerous to life or health (IDLH), or is unknown. This language is consistent with existing OSHA standards and paragraph 7.8.7 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2813" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Under paragraph (e)(3)(ii) of § 1915.505, the employer must provide SCBAs to fire response employees performing emergency operations during hazardous chemical emergencies that will expose them to airborne chemicals. OSHA recognizes that there may be a potential for employee exposure to hazardous chemicals during fire response emergencies due to the nature of shipyard employment. This requirement would limit employers to the use of SCBAs for this type of chemical exposure.</span></p><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Under paragraph (e)(3)(iii) of § 1915.505, the employer must provide either SCBA or respiratory protective devices to fire response employees who perform or support emergency operations that will expose them to hazardous chemicals. The SCBA or respiratory device must be certified as required in § 1910.134, and as required by NIOSH under 42 CFR Part 84 as suitable for the specific chemical environment.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Under paragraph (e)(3)(iv) of § 1915.505, the employer must ensure that additional outside air supplies used in conjunction with respirators be positive pressure systems and certified by NIOSH under 42 CFR Part 84. Again, this is consistent with existing OSHA standards and paragraph 7.10.1.1 of NFPA 1500-2002 (Ex. 19-5). No comments were received on paragraphs (e)(3)(i) through (e)(3)(iv) and OSHA has adopted them as proposed.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Under paragraph (e)(3)(v) of § 1915.505, the employer must provide SCBAs that meet the requirements of NFPA 1981-1997, Standard on Open-Circuit Self-Contained Breathing Apparatus for the Fire Service (Ex. 19-7). This is standard equipment for all fire response organizations throughout the country.</span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">NAVSEA stated that: "The latest version of National Fire Protection Association (NFPA) 1981, Standard on Open-Circuit Self- Contained Breathing Apparatus for Fire and Emergency Services is 2002 versus 1997." (Ex. 22-15). In the proposed rule (67 FR 76231). OSHA proposed using the 1997 version. Thus, adequate notice and comment on updating to the 2002 version has not been provided. As a result, the 1997 version is referenced in § 1915.505(e)(3)(v) in the final standard. With publication of this document, OSHA recognizes that several of the NFPA standards have been revised since the proposed rule was published. OSHA intends to publish a direct final rule to update the references to the most recent NFPA standards in the near future.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">In § 1915.505(e)(3)(vi), OSHA requires that the employer ensure that the establishment of a respiratory protection program and use of respiratory protective equipment is in compliance with § 1915.154 Respiratory protection. Similar requirements are found in 29 CFR 1910.134, and 29 CFR 1910.156 for general industry. The Connecticut Department of Labor raised the following:</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">§ 1915.505(e)(3)(vi) mandates compliance with 29 CFR 1915.154, which in turn incorporates by reference 29 CFR 1910.134. Does the language of this subsection of the proposed section which mandates compliance with the respiratory protection program of § 1910.134, include the procedures for IDLH atmospheres referenced in § 1910.134(g)(3) and (4) of the respiratory standard, including the requirement for what's known as two in and two out? (Ex. 22-4).</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">As the State of Connecticut points out, OSHA states in § 1915.154 that respiratory protection for shipyards is covered under 29 CFR 1910.134. Therefore, shipyard employment is covered by the entire section, which would include § 1910.134(g) as well as all other provisions of § 1910.134.</span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Paragraph (e)(4) of § 1915.505 addresses personal protective equipment for fire response employees who are exposed to the hazards of interior structural firefighting within shipyard employment. The employer must provide, at no cost to the employee, helmets, gloves, footwear, and protective hoods, and either protective coats and trousers, or protective coveralls that meet the applicable recommendations in NFPA 1971-2000 Standard on Protective Ensemble for Structural Fire Fighting (Ex. 19-8). Paragraph (e)(4) is based upon Chapter 7 of NFPA 1500-2002 (Ex. 19-5). OSHA received no comments on this paragraph, and the proposed language is carried forward in the final standard.</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2785" instrument_node="">Under paragraph (e)(5), the employer must, at no cost to employees, supply all fire response employees who are exposed to the hazards of proximity firefighting with the appropriate protective proximity clothing that meets the applicable requirements of NFPA 1976-2000, </span><strong data-dcnode-id="2782"><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Standard on Protective Ensemble for Proximity Fire Fighting</span></em></strong><span data-dcnode-id="2781" instrument_node=""> (Ex.19-9). Only shipyard employees who engage in operations that expose them to the intense radiant heat of a proximity firefighting incident (the proximity hot zone) must be equipped with specialized proximity firefighting protective clothing. No comments were received on this provision and OSHA has adopted it as proposed.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Under paragraph (e)(6) of § 1915.505, the employer must provide a Personal Alert Safety System (PASS) device to each fire response employee involved in firefighting operations. The PASS devices must meet the recommendations in NFPA 1982-1998 Standard on Personal Alert Safety Systems (PASS) (Ex. 19-10). This requirement is consistent with paragraph 7.13.1 of NFPA 1500-2002 (Ex. 19-5) and no comments were received. The provision is adopted as proposed.</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">A PASS is a device that is attached to or is an integral part of self-contained breathing apparatus (SCBA). It automatically sounds a distinctive alarm (some units also display a flashing strobe light) if a fire response employee becomes immobile for a pre-determined period of time (usually 30-40 seconds). For example, the device would be activated in the event a fire responder becomes incapacitated from structural collapse or runs out of breathing air. Fire response employees who might become trapped or lost can also activate the device manually to help searchers locate them. The shrill alarm allows rescuers to locate the wearer quickly in dark or heavy smoke conditions. The alerting sound of a PASS can easily be distinguished from a low air supply alarm emitted by a SCBA. PASS devices are now considered standard issue for fire fighters and are recommended by NFPA 1982-1998. (Ex. 19-10).</span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Section 1915.505(e)(7) addresses life safety ropes, body harnesses, and hardware. No comments were received on these provisions and they are being adopted as proposed. Under paragraph (e)(7)(i), OSHA requires all life safety ropes, body harnesses, and hardware used by fire response employees for emergency operations to meet the applicable requirements of NFPA 1983-2001, Standard on Fire Service Life Safety Rope and System Components (Ex. 19-11). This is consistent with Subpart I of this Part and paragraph 7.14.1 of NFPA 1500-2002 (Ex. 19-5). Under paragraph (e)(7)(ii) of § 1915.505, the employer may allow only Class I body harnesses to be used to attach fire response employees to ladders and aerial devices. This is consistent with NFPA 1983-2001 (Ex. 19-11). Under paragraph (e)(7)(iii), the employer may only allow Class II and Class III body harnesses to be used by fire response employees for fall arrest and rappelling operations. This is consistent with NFPA 1983-2001 (Ex. 19-11). No comments were received on paragraph (e)(7) and OSHA has carried it forward in the final rule.</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Equipment Maintenance</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Paragraph (f) of § 1915.505 addresses the maintenance of personal protective equipment and fire response equipment. Under paragraph (f)(1), the employer must inspect and maintain personal protective equipment used to protect fire response employees to ensure that it provides the intended protection. Such inspection and maintenance is consistent with OSHA's personal protective equipment standards, § 1910.132.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Under paragraph (f)(2), the employer must test and maintain fire response equipment consistent with sound safety practices and the requirements for tools and equipment found in Chapter 7 of NFPA 1500- 2002 (Ex. 19-5). Paragraph (f)(2)(i) requires the employer to keep fire response equipment in a state of readiness. In paragraph (f)(2)(ii), the employer must make sure that all fire hose coupling and connection threads are standardized throughout a facility and on vessels and vessel sections by providing the same type of hose coupling and connection threads for hoses of the same or similar diameter.</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">If the employer uses an outside fire organization for fire response, and the employer expects them to use the fire response equipment belonging to the employer, then under paragraph (f)(2)(iii), the employer must ensure that either all of its facility's hose and coupling connection threads are the same as those used by the outside fire authority or that suitable adapter couplings are supplied. This requirement is consistent with paragraph 9.3 of NFPA 14-2000 (Ex. 19- 12). The Agency did not receive any comments on this paragraph, and the provisions are being adopted as proposed.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2754"><strong data-dcnode-id="2755"><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Section 1915.506 Hazards of Fixed Extinguishing Systems on Board Vessels and Vessel Sections</span></em></strong></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">This section addresses the hazards associated with fixed extinguishing systems on vessels and vessel sections that could create a dangerous atmosphere when such systems are activated. Of particular concern is the incorrect or inadvertent activation of these systems. Fixed fire extinguishing systems at land-side facilities are covered by the next section of this proposed subpart, § 1915.507 Land-side fire protection systems.</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">The hazards associated with the use of fixed extinguishing systems on vessels and vessel sections have long been recognized by the United States Coast Guard as evidenced by Coast Guard Commandant Notices and Instructions that date from 1978. The International Maritime Organization (the United Nations' specialized agency responsible for improving maritime safety and preventing pollution from ships) has also addressed this issue by issuing regulations that are part of the International Convention for the Safety of Life at Sea (SOLAS).</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2746" instrument_node="">Testing vessels' fixed extinguishing systems has led to several fatalities. In October 1996, aboard the Italian flag ship SNAM PORTVENERE, an American Bureau of Shipping surveyor and five shipyard technicians were killed when carbon dioxide (CO</span><sub data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">2</span></sub><span data-dcnode-id="2743" instrument_node="">) was released accidentally from a fixed fire extinguishing system that was being tested. On May 3, 1993, while a contractor was testing a low- pressure CO</span><sub data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">2</span></sub><span data-dcnode-id="2740" instrument_node=""> system aboard the M/V CAPE DIAMOND that protected the ship's engine room, CO</span><sub data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">2</span></sub><span data-dcnode-id="2737" instrument_node=""> was discharged accidentally, causing the deaths of a Coast Guard marine inspector and a shipyard contractor. Additionally, an intentional activation of a manual CO</span><sub data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">2</span></sub><span data-dcnode-id="2734" instrument_node=""> extinguishing system aboard the Australian naval vessel HMS APPLELEAF caused the accidental death of four persons. These incidents were attributed to human error in which the discharge of CO</span><sub data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">2</span></sub><span data-dcnode-id="2731" instrument_node=""> extinguishing systems protecting spaces aboard vessels was allowed to occur while employees were working inside.</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">This section has gone through some modifications since the proposal. The section has been modified in several areas to address concerns raised by commenters, and to assure that the section adequately addresses the hazards associated with fixed extinguishing systems on board vessels and vessel sections.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Employer Responsibilities</span></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2722" instrument_node="">The Committee recognized, and OSHA agrees, that although the casualty history reveals problems only with CO</span><sub data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">2</span></sub><span data-dcnode-id="2719" instrument_node=""> systems, similar hazards exist for the use of new extinguishing agents and application methods. Therefore, the employer's responsibilities under paragraph (a) of § 1915.506 apply to all fixed extinguishing systems on vessels and vessel sections that may result in a dangerous atmosphere if discharged. It is very likely that the only systems that may be affected by this standard will be those that employ gaseous or two- phase (gaseous/liquid) extinguishing agents. However, by including all systems that may create a dangerous atmosphere when activated, the standard is broad enough to cover future systems and extinguishing agents. Examples of future possibilities include systems employing dry chemical extinguishing agents (these systems currently exist but are not typically installed on vessels), combination dual water/dry chemical systems, and systems using Halon alternative agents.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Several comments were received on paragraph (a) of § 1915.506, including:</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2713" instrument_node="">The proposed standard does not recognize differences between fire suppression systems and different extinguishing agents. Alternatives to CO</span><sub data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">2</span></sub><span data-dcnode-id="2710" instrument_node=""> often do not present the same hazards as fixed CO</span><sub data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">2</span></sub><span data-dcnode-id="2707" instrument_node=""> systems. * * * Rewrite 1915.506(a) "* * * The employer must comply with the provisions of this section whenever employees are exposed to fixed extinguishing systems charged with materials that could create hazardous atmosphere when activated aboard vessels and vessels sections, regardless of geographic location. Fixed systems that do not cause hazardous atmospheres when activated, including those charged with foam, inert materials, or water sprinklers, are not subject to this section." (Exs. 21-10, 21-15, 21-16, 22-1, 22-6, 22-7 through 22-11).</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">NGNN stated:</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">NGNN agrees with the need to address controls required for working in spaces with fixed extinguishing systems. We believe that systems should remain armed only when the risk to the vessel and workers outweighs the risk if the system were to be inadvertently activated by the work being performed. Therefore, NGNN has instituted procedures and training to ensure work can be safely performed in those rare cases when a system must remain armed. However, our procedures recognize the greater risk posed by a carbon dioxide system versus less hazardous extinguishing media, such as halon. We recommend that OSHA consider the differences in various shipboard fire suppression systems that do not present the same risk as carbon dioxide systems. Some systems use the same compounds used in computer rooms across the country and present far less risk than carbon dioxide systems. (Ex. 21-8).</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Great Lakes stated that:</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">§ 1915.506 (a) of the proposed rule introduces ambiguity. The rule should be clarified so that "exposure to fixed extinguishing systems that could create a hazardous atmosphere" refers to the properties of the agent itself and not to by-products of the combustion process or extinguishment. Actual fire events should be treated separately and require crew egress from the affected space prior to extinguishing system discharge, as required by fire standards. Section 1-6.1.2 of NFPA 2001 standard for clean agent fire extinguishing systems deals with the issue of human exposure to the agent itself. While exposure to any clean agent should be minimized, the standard does specify safe human exposure times to clean agents at various design concentrations in normally occupied spaces. In the case of HFC-227ea (the active ingredient in FM-200 brand clean agent) the standards allow for installation of systems in occupied spaces up to the LOAEL (Lowest Observable Adverse Effect Level) of 10.5% v/v. In Table 1-6.1.2.18 of NFPA 2001, the recommended exposure time to HFC-227ea for concentrations of 10.5% v/v or less is five minutes. It should also be noted that HFC-227ea is approved by U.S. FDA as a replacement for ozone- depleting CFC propellants in asthma inhalers. In contrast, the standard for carbon dioxide extinguishing agent (NFPA 12) prohibits human exposure to the agent due to its inherent lethality. The time limit for safe human exposure is determined by the toxicological profile of each agent. Therefore, we recommend the proposed rule be revised to base worker exposure to any fire extinguishing agent on the agent's human safety profile. We also recommend the proposed rule direct shipyard employers to follow safety procedures contained in the NFPA standard for their chosen fire suppression agent. (Ex. 22-5).</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">While developing this standard, the Committee discussed whether to include requirements for other systems that do not cause dangerous atmospheres when activated, such as foam and automatic water sprinkler systems. After extensive discussion, the Committee decided that a standard for these systems was not necessary because they are not typically relied upon on board vessels and vessel sections, and they do not pose a significant safety and health threat to employees. The Agency agreed and proposed to cover only systems that could create a hazardous atmosphere when activated. Both NGNN and Great Lakes supported the provision not applying when the extinguishing agent is not hazardous. OSHA continues to believe that this is the proper approach and has not altered this provision in the final standard. It is up to the employer to determine when a dangerous atmosphere will be created, either by the properties of the extinguishing agent, or the byproducts that may be produced when it is used. If a dangerous atmosphere will be created, the employer must take action under § 1915.506 to protect its employees.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Requirements for Automatic and Manual Systems</span></p><span data-dcnode-id="2687" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Under paragraph (b) of § 1915.506, the employer must protect its employees who may be exposed to a dangerous atmosphere by a fixed fire extinguishing system by taking one of two actions. First, the employer may physically isolate the system by disconnecting or blanking, or by using other positive means to prevent the system's discharge. This is possible for most types of shipyard work, and is the preferable method of protection because when the system is isolated, employees cannot be exposed to a dangerous atmosphere. However, OSHA recognizes that some shipyard work must be conducted with the system activated. In those situations, the employer must take the second form of action by ensuring that employees are trained to recognize the system's discharge and evacuation alarms and the appropriate evacuation routes, and by ensuring that they are knowledgeable about the extinguishing system, its components, and its hazards.</span></p><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">In paragraphs (b), (e), and (f) of § 1915.506, the term "physically isolated" refers to physically preventing the extinguishing agent from entering the work area. This is typically done by installing a blank (a flat piece of metal between two flanges) in the supply line of the extinguishing system so that the extinguishing agent can not possibly be released into the protected area.</span></p><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Several comments were received on proposed Paragraph 1915.505(b). Bath Iron Works stated:</span></p><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">There is confusion as to how the five paragraphs in this section fit together. The section addresses work in a space equipped with fixed extinguishing systems. It mandates that the system be physically isolated (para 1) or that employees be trained to recognize systems discharge, evacuation alarms and escape routes (para 2). It appears that there are three additional requirements (para 3, 4 and 5) to the options listed in paragraphs 1 and 2 and that all three must occur, as they are separated by the word "and." If the system is isolated, as in paragraph 1, paragraphs 2- 5 should not apply? After all there cannot be a discharge if the system is isolated. If employees are trained, as in paragraph 2, then all the following paragraphs should apply because the system is still energized and represents a potential hazard if activated. It appears that the word "and" was left off the end of paragraph 2. Recommend: Add the word "and" to the end of paragraph (b)(2). (Ex. 21-3).</span></p><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">OSHA agrees with Bath Iron Works that the proposed regulatory text was confusing because it combined "and" statements and "or" statements in a way that was difficult to follow. Therefore, the Agency has changed the regulatory text to clarify the requirements. Paragraph (b) of the final rule only includes the requirements for physical isolation of the system, or employee training, as discussed above. Paragraph (b) now contains the provisions that were proposed as paragraphs (b)(1), (b)(2), and (b)(5). Paragraph (d) includes the actions that must be taken if activation of the system could result in a positive pressure in the protected space. Paragraph (d) now contains the provisions that were proposed as paragraphs (b)(3) and (b)(4). The remaining paragraphs of section 1915.506 have been renumbered consecutively.</span></p><span data-dcnode-id="2672" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Bath Iron Works stated:</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">It is not fully understood why work cannot be accomplished in a space that is protected by a fixed extinguishing system. The systems are installed to protect employees and equipment and there is "work" that does not pose a threat of an extinguishing system being activated. On the other hand, it is clearly understood that work that has the potential to activate an extinguishing system poses a real threat. If there is no threat why should any of the requirements in this section apply? The term "work" needs to be expanded to qualify it as "work that has the potential to cause system activation" or some other qualifying phrase. To expect the system to be physically isolated when routine work is to be performed in the space, without qualifying the type of work is unrealistic. Example: Prior to the vessel going to sea/sea trials all systems are operational, including fixed extinguishing systems. Typical work assignments at this stage of construction are to touch up paint that has been disturbed, or stencil piping systems. With all systems up and running, the protection of the fire extinguishing system is a safety feature that should not be eliminated. This section requires that it be deactivated, or that paragraphs 2 through 5 are complied with. Neither is feasible, nor do they provide additional protection to the employee". * * * Revise paragraph (b) to further define the intent of work. 'Before any work that has the potential to cause systems activation * * * (Ex. 21-3).</span></p><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">NASSCO stated: "The term 'any work' does not consider the work done during sea trials and other test activities that would not activate the system. We recommend that the paragraph read: 'any work that could activate the system' or 'any hot work.' " (Ex. 22-14).</span></p><span data-dcnode-id="2663" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">OSHA believes that this comment relates to the confusion caused by the construction of the proposed regulatory text. The Agency concludes that the qualification in paragraph (a) limits the applicability of this section only to systems that create hazards. In addition, the employer may conduct work with the system activated, so long as employees are trained pursuant to paragraph (b)(2)(i) of § 1915.506. As discussed above, the employer must take one of two courses of action. First, the employer could physically isolate the system or have other positive means to prevent the system from discharging. Second, the employer could train employees on the system's discharge and the associated hazards, and the evacuation alarms and routes.</span></p><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">If the employer chooses the second option, paragraph (b)(2)(i) of § 1915.506 requires employees to be trained to recognize fire extinguishing systems' discharge and evacuation alarms, and to recognize the appropriate escape routes. This training consists of making sure that employees, including the employees of contractors, recognize the discharge and evacuation alarms and escape routes in accordance with § 1915.508 of this subpart. Paragraph (b)(2)(ii) of § 1915.506, which was proposed as § 1915.506(b)(5), requires that employees be trained on the hazards of the fixed extinguishing system and the dangers associated with disturbing system components. Such components and equipment include piping, cables, linkages, detection devices, activation devices, and alarm devices. Employees in shipyards typically rig materials and equipment in and out of vessels and vessel sections using chain falls and come-alongs. Employees unaware of the dangers of disturbing system components could accidentally activate the system while in the process of rigging.</span></p><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Sea and Dock Trials</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Paragraph 1915.506(c) of the final rule requires employers to ensure that fire extinguishing systems are activated during sea and dock trials, which is a different requirement from proposed paragraph (c). The hazards that were addressed in the proposed paragraph (c) are now addressed in paragraphs (b) and (g). The proposed paragraph (c) addressed the risk of intentional or accidental activation of a manual system during sea or dock trials by requiring that all activation stations, whether remote or local, be secured under lock and key or an attendant posted. The intent was to prevent unauthorized persons access to the activation controls of a manual system because a manual system that is activated while employees are in the protected space may result in fatalities. During trials many persons are present who may not be completely familiar with the ship's operation, and OSHA believes that only authorized persons should have the authority and ability to manually activate the systems when employees are working in the protected spaces.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Bath Iron Works stated:</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">The intent of this paragraph needs to be clarified or the paragraph deleted. Does it pertain only to sea trials or are dock trials included? What constitutes work? Many spaces protected by fixed manual systems are manned spaces. The personnel assigned to these spaces perform "work" of various types. The space should be protected by a fire extinguishing system especially during sea trials. If employees are trained, as is required by proposed paragraphs (b)(2) and (b)(5), they will not activate the system unless it is necessary because they know the hazards associated with it. To keep the pull stations under lock and key prohibits immediate use if the need presented itself. If an unauthorized person wanted to activate the system, a lock is not going to stop him, nor is a guard. * * * Delete this entire paragraph as it does not increase the level of safety for employees and the hazard has been addressed in previous paragraphs. (Ex. 21-3).</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Several commenters stated: "This paragraph should be deleted from the proposed rule because it was written before paragraph (b) contained all of the sub-paragraphs as it currently does. Therefore, paragraphs (b)(1) and (2) provide the same coverage as paragraph (c)." (Exs. 21- 4; 21-5; 21-6; 21-7; 21-13; 22-2).</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">NGNN recommended that:</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">[O]SHA delete this paragraph. No Captain, Vessel Owner, or employer should put the safety of their vessel and personnel in peril by locking out the fire suppression system if it is the designated means of fire protection for the compartment. We have not experienced malicious activation of a fire suppression system and believe it sends the wrong message to lock out or otherwise prevent the use of a fire suppression manual activation device. If a system is to be disarmed, then it should be properly isolated, not by locking out the manual pulls. If it is determined that the risks of disarming the system outweigh the risks of leaving it armed then the manual pulls should be left available for use and workers should be trained on the proper actions to take in the event the system is activated. (21-8).</span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Several commenters stated:</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">While a vessel is on sea trials, the extinguishing system must remain operational and ready for activation to protect the vessel in the event of a fire. A tag would be sufficient to inform that personnel are in the space. Recommendation: 1915.506(c) be reworded 'Before any work * * *, the employer must ensure that during sea trials activation stations are tagged, informing personnel they are in the protected space.' " (Exs. 21-10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11).</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">OSHA agrees with these commenters, and has deleted the requirement to lock the manual fire suppression system. Although the intent of the proposal was to prevent accidental activation of the system, it also may have prevented employees from activating the system when needed in an emergency situation. In its place, OSHA has added a provision to require the systems to be operational during sea and dock trails, which is consistent with the views of the commenters that these systems should always be available for use during trials. While on a sea trial, the shipyard fire response employees, or outside fire response, would not be able to access the vessel. Therefore, the extinguishing systems must be operational at all times. While OSHA does not agree that paragraph (b) alone provides sufficient protection from the hazard posed by manually activating a system while employees are within the protected space, OSHA has determined that the hazard is adequately addressed by the combined provisions of paragraphs (b) and (g). Paragraph (g) covers the use of fixed manual extinguishing systems, and is discussed below.</span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Doors and Hatches</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2623" instrument_node="">Paragraph (d) of § 1915.506 was proposed as paragraphs (b)(3) and (b)(4). This section was included as a result of United States Coast Guard information about a casualty at sea. (67 FR 76233) In this incident, the chief engineer inadvertently discharged CO</span><sub data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">2</span></sub><span data-dcnode-id="2620" instrument_node=""> into a space with an inward opening door. Members of the crew were unable to open the door until pressure in the space subsided. During that time, crewmembers trapped in the space were asphyxiated. As a result of this incident, the Coast Guard recommended that during inspections, CO</span><sub data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">2</span></sub><span data-dcnode-id="2617" instrument_node=""> storage provisions and means of escape should be evaluated. The Coast Guard stated further that protective measures should be provided, such as making sure that doors open outward, that there are kick-out panels in doors or bulkheads, that doors are blocked open when the space is occupied, or that there are sufficient vent openings to the atmosphere. These recommendations are also recognized in the United States Coast Guard Marine Safety Manual, COMDTINST 16000.7, Vol. II (Ex. 17) and SOLAS 74/78 (Ex.18), which require outward opening access doors in CO</span><sub data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">2</span></sub><span data-dcnode-id="2614" instrument_node=""> protected spaces aboard vessels.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Paragraph § 1915.506(d)(1) addresses the concerns about inward opening doors, hatches, scuttles, and other potential barriers that may close off escape routes as a result of system activation. The paragraph requires that, when employees are working in a space with inward opening doors, the doors must be removed, locked open, braced, or otherwise secured so they will not close and trap employees in the space. OSHA recognizes that placing a blocking device in a fire door is normally an unacceptable practice. However, in order to comply with the requirements of § 1915.506(d)(1), because of the hazard of asphyxiation, OSHA will allow a fire door to be blocked open, as long as the blocks are removed when the employees are no longer working in the protected space.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Paragraph (d)(2) of § 1915.506 (proposed paragraph (b)(4)) requires that all inward opening doors, hatches, scuttles, and other potential barriers to safe exit must be removed, locked open, braced, or otherwise secured so that they remain open and accessible for escape. This is to ensure that, in the event of the systems' activation that could result in a positive pressure in the protected spaces that all employees would be able to safely escape.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Great Lakes stated that:</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2597"><span data-dcnode-id="2602" instrument_node="">[T]o operate a vessel at sea with doors, hatches and scuttles in the closed position ensures the fire suppression system operates as designed, but violates the proposed rule. To operate the vessel with doors, hatches and scuttles locked in the open position complies with the proposed rule, but places the ship in grave danger should a fire break out. To isolate, lock out or otherwise render an extinguishing system inoperable while under way, or to keep all doors, hatches and scuttles locked open ensures that the agent will fail to reach its extinguishing concentration and hold time. Gaseous agents such as FM-200 (HFC-227ea) depend on achieving a specific design concentration in the protected space and maintaining that concentration until it is determined that the fire has been successfully suppressed. The inability to maintain the agent's design concentration (</span><strong data-dcnode-id="2599"><em data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">e.g.</span></em></strong><span data-dcnode-id="2598" instrument_node="">, open doors and hatches) can quickly lead to an uncontrollable fire, severe damage and a potentially life- threatening situation. (Ex. 22-5).</span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Several other commenters recommended that: "1915.506 (b)(3) be changed by inserting the language "[I]n the protected spaces, the emergency exit route doors, hatches or scuttles remain open and accessible," [and] 1915.506 (b)(4) insert the language: "[I]n the protected spaces, the emergency exit route doors, hatches, scuttles or other potential barriers to safe exit must be removed. * *' " (Exs. 21-10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11).</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Bath Iron Works stated:</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">OSHA needs to define positive pressure or clarify the intent of this paragraph. Many naval ships are designed to maintain positive pressure in spaces, including machinery spaces, via their ventilation system. Positive pressure is only an issue if it is great enough to prevent escape via inward opening doors. To mandate that these be removed, or locked open, prevents the halon fire extinguishing system from extinguishing the fire because compartment integrity has been compromised. A greater hazard has been created in complying with the standard. * * * Revise the paragraph to show that the requirements apply only if the positive pressure is great enough to prevent the opening of inward opening doors. This can be achieved by the following revision: "If systems activation could result in a positive pressure great enough to prevent the opening of doors in the protected spaces, all inward opening doors, hatches, scuttles * * *." (Ex. 21-3).</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">The purpose of this section is to protect employees who might be exposed to hazardous conditions when they are trapped by doors that are sealed by positive pressure within the space. If the fire suppression system will not create a pressure sufficient to seal an inward opening door, the paragraph does not apply. This section specifically protects the lives of employees working in protected spaces while a fixed extinguishing system is activated. For example, employees working in a shaft alley are in a confined space. Should the alarm be activated, the door(s) will shut automatically, creating a trapping situation for those employees. Although some vessels may have an escape hatch, not all vessels have such hatches. In this circumstance, employees must be trained to block open those doors when entering the space to conduct work. Should the system be activated, the alarm will sound and the employees will leave the space immediately. Upon their exit, they should remove the blocks and shut the door behind them, thus allowing the fire suppression system to perform as designed. By training employees to block those doors open, the trapping hazard is then abated. The Coast Guard, the Committee, and OSHA agree that this section will save lives.</span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Testing the System and Conducting System Maintenance</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2580" instrument_node="">Paragraphs (e) and (f) (formerly (d) and (e)) of § 1915.506 address system testing and system maintenance operations. Testing and maintenance have been demonstrated to be the most likely causes of accidental system activation. The Coast Guard currently requires fixed fire extinguishing systems to be disconnected when undergoing any testing or maintenance. The need for these requirements is demonstrated clearly by the fatalities that occurred while testing the fixed system on the M/V CAPE DIAMOND mentioned above. As a result of this incident, the Coast Guard recommended that personnel in spaces protected by CO</span><sub data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">2</span></sub><span data-dcnode-id="2577" instrument_node=""> systems be evacuated during testing, unless suitable safeguards are instituted, such as isolating the CO</span><sub data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">2</span></sub><span data-dcnode-id="2574" instrument_node=""> supply from the protected space or providing personnel with self-contained breathing apparatus (SCBA).</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">OSHA proposed to both physically isolate the system and to evacuate non-essential personnel during testing because testing of such a system typically results in alarm activation and could result in a discharge of the extinguishing agent, putting any employees in the space in danger of death or injury.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Bath Iron Works stated:</span></p><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">The paragraph mandates both "physically isolating" the system and evacuation of employees not directly involved in "testing the system." The standard does not explain what "testing the system" means. Judging from the summary and explanation the concern is during a system's concentration test when extinguishing media is actually discharged into the space so the concentration can be measured. This really confuses the intent of this paragraph for the following reasons. (1) You cannot test a physically isolated system because the definition of physically isolated in this standard prevents the system from being hooked to a supply, (2) If the system is physically isolated there is no potential for discharge so evacuation is unnecessary and (3) If there was a potential for the discharge of extinguishing media into a space, then all personnel should be evacuated not just those, "not involved in the testing." This paragraph is extremely confusing. * * * Assuming that the committee's intent is to protect employees during a concentration test, revise the paragraph to read "The employer will ensure that the protected space and affected adjacent spaces are evacuated during system's testing that could result in the discharge of extinguishing media into the space."</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2559"><strong data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Note:</span></strong><span data-dcnode-id="2560" instrument_node=""> There is no need to specify vessels and vessel sections as it is the title of this part. (Ex. 21-3).</span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">NGNN commented:</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Does this mean that it is acceptable for personnel directly involved in testing to remain in the compartment during actual discharge? * * * Delete the words, "not directly involved in testing it." The modified paragraph will then read, "The employer must make sure that the system is isolated and that all employees are evacuated from the protected spaces when levels of extinguishant can prevent self rescue, before testing any fixed extinguishing system" (Ex. 21-8).</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">These commenters are correct in noting that there are two types of tests that are performed on automatic fire extinguishing systems. One method involves the total release of extinguishing medium into a space (total flooding), while the other does not. As noted by the commenters, the proposed rule did not address the hazards caused by each type of test, making the proposed rule confusing, and providing inadequate protections for testing involving total flooding. To make the requirement clearer, and to make sure that appropriate protections are in place for employees who may be exposed to hazards by each type of test, OSHA has revised paragraph (e) to address both types of testing.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2548" instrument_node="">Paragraph § 1915.506(e)(1) addresses the first test in which the system is intentionally activated to determine whether or not it will introduce sufficient fire extinguishing material to be effective. In this case, the final standard requires the employer to ensure that all employees are evacuated from the space and that no employees remain in the space during the discharge, as recommended by the commenters. OSHA is requiring that, after the discharge of the extinguishing medium into the space, the employer must ensure that the atmosphere is safe for employees to reenter. OSHA is requiring the employer to follow the requirements found in § 1915.12, </span><strong data-dcnode-id="2545"><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Precautions and the order of testing before entering confined and enclosed spaces and other dangerous atmospheres</span></em></strong><span data-dcnode-id="2544" instrument_node="">. OSHA is adding these requirements to eliminate confusion. Paragraph § 1915.506(e)(2) addresses the second, and more common type of test, which involves the use of air or nitrogen as a replacement for the extinguishing medium so that sensors, valves, and heads can be tested individually for their proper operation. This type of testing is commonly performed during ship repair and maintenance work. To perform the test, technicians physically isolate the system's extinguishing medium and then activate individual components to verify proper function. Fire alarms are activated during this testing, and other employees in the area will not know if the alarm is part of the test, or if it is a real alarm. Therefore, the final standard requires the employer to physically isolate the system to assure that the system does not introduce extinguishing medium into the space, and to assure that any employees not directly involved in the testing are evacuated. This evacuation is a reasonable safety precaution because a real alarm may be ignored as a false or nuisance alarm by non-essential employees until it is too late to evacuate the space safely.</span></p><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Paragraph (f) (proposed paragraph (e)) requires that the employer ensure that the system is physically isolated before conduction maintenance on a fixed extinguishing system. OSHA did not receive comment on this paragraph and has included it in the final rule without revision.</span></p><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Using Fixed Manual Extinguishing Systems for Fire Protection</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">In paragraph (g) (formerly paragraph (f)) of § 1915.506, OSHA addresses the hazards associated with using fixed fire extinguishing systems by requiring that employees be trained and designated as necessary to operate and activate the system properly. Further, OSHA requires that all employees be evacuated from spaces, and accounted for before the discharge of the system. As described in the preamble to the proposed rule, these requirements are necessary to prevent fatalities from overexposures to carbon dioxide (67 FR 76234).</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Paragraph (g)(1) requires that only authorized employees be allowed to activate fixed manual extinguishing systems. This is based on the proposed requirement that would have required employers to lock out the manual pull stations or post an attendant at them. While OSHA determined that the systems should not be locked out, additional regulatory language was needed to clarify that not all employees should be able to activate a manual fixed extinguishing system. An authorized person must be available to activate the system, if necessary, following the evacuation of the employees who are working in the space. The authorized person or persons should be the only person to activate the system. This will alleviate the possibility of someone activating the system who has not been trained, or does not know what hazards are involved with the activation of the system.</span></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">OSHA is not instructing the employer on who should be an authorized person, or on the number of authorized persons they must train. These are determinations that need to be made by each employer. Authorized employees are required to be trained. Therefore, the employer must make the determination of the number of employees that will be authorized to activate the system. Should an employer desire to have all employees designated as authorized, those employees must be trained. Conversely, an employer may designate foremen, or senior employees, as authorized, and train those few employees.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Paragraph (g)(2) requires that authorized employees be trained to operate fixed manual systems when the employer expects these systems to be relied on in the event of a fire. This was proposed as paragraphs (f)(1), and OSHA has modified this provision to ensure that only authorized employees are trained to operate and activate the system. As proposed, the provision allowed for employees to be trained and designated. OSHA wanted to ensure that only authorized employees, rather then designated, would have access to activate the system. NGNN stated:</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">The paragraph could be interpreted to require us to designate and train our employees to operate ship's fixed fire extinguishing systems. Current work practices on U.S. Navy vessels do not permit this action by non-Navy personnel. Responsibilities for fire response are established via contract, memorandum of understanding or other means depending on the stage of construction or repair. Similarly, other employers at a host site may not have authority to operate a particular fire extinguishing system, but should ensure their personnel understand their required actions in the event of a fire. Recommend: 1915.506 (f)(1) be changed to read as follows: "Employees are instructed on the appropriate actions to be taken in the event of fire or activation of the fire extinguishing system within the compartment. (Ex. 21-8).</span></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">OSHA does not agree with this commenter's suggested revision. The employer is responsible for making sure that someone is present who is designated to operate the manual fire suppression system and is trained to do so safely. Not all employees have the right or authorization to activate a system. The designation of employees to activate the system should come from an agreement with the shipyard, the vessel owner, and the captain to designate a person or persons. The person or persons who are selected need to be trained to operate and activate the system. In addition, Paragraph (g)(3) requires that all other employees need to be evacuated from the protected spaces and accounted for before the system is activated.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Paragraph (g)(3) of § 1915.506, proposed as (f)(2), requires that the protected space be evacuated completely and all employees accounted for before discharge of the fixed manual extinguishing system. OSHA received no comments on this provision, and it is included in the final rule as it was proposed.</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2511"><strong data-dcnode-id="2512"><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Section 1915.507 Land-Side Fire Protection Systems</span></em></strong></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">This section consolidates various existing requirements as well as providing references to current applicable national consensus standards. (See the proposal to the NPRM for a discussion of existing requirements (67 FR 76235).</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Employer Responsibilities</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Under paragraph (a) of § 1915.507, the employer must ensure that all fixed and portable fire protection systems installed to meet a particular OSHA standard comply with the appropriate requirements of this section. The provisions in this section do not apply to fixed or portable fire protection systems the employer has installed to meet requirements other than OSHA's, such as local requirements, or ships systems.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Portable Fire Extinguishers and Host Systems</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">In § 1915.507(b), OSHA regulates the use of portable fire extinguishers and hose systems. By incorporating by reference NFPA 10- 1998 Standard for Portable Fire Extinguishers (Ex. 19-1) in paragraph (b) of this section, the employer may replace up to one-half of the required complement of fire extinguishers by uniformly spaced 1-inch (3.8 cm) hose stations. If the employer chooses to use hose systems, then the employer must meet the recommendations of NFPA 14-2000 Standard for the Installation of Standpipe, Private Hydrant, and Hose Systems (Ex. 19-12). This is consistent with current OSHA practice under 29 CFR 1910.157 and 1910.158. The incorporation by reference in § 1915.507(b)(1) will permit some flexibility in offering protection for incipient stage fires.</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">In paragraph (b)(2) of this section, OSHA is allowing the employer to use hose lines attached to Class II or Class III standpipe systems in place of portable fire extinguishers if those hose systems meet the applicable selection, installation, inspection, maintenance, and testing requirements of NFPA 14-2000 Standard for the Installation of Standpipe, Private Hydrant, and Hose Systems (Ex. 19-12).</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Several commenters were concerned about incorporating NFPA standards by reference:</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">This section requires installation, maintenance and testing in accordance with National Fire Protection Association (NFPA) standards. NFPA is not required to seek non-member participation in the development of standards. Also, these standards are not available free of cost to employers. These consensus standards have been a problem for the shipyard community because once they are incorporated by reference; the NFPA can change or impose a new regulation on industry without industry participation in the process. If OSHA incorporates these standards by reference, OSHA should provide the version that will be enforced to the regulated community, and ensure public participation in additional rulemaking that may result from changes to the standards (Exs. 21-4; 21-5; 21- 6; 21-7; 21-13).</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Reliance on national consensus standards such as those referenced here is a U.S. government policy. The U.S. Office of Management and Budget in Circular A-119 directs federal agencies to use voluntary consensus standards in lieu of government-unique standards except where inconsistent with law or otherwise impractical. The NFPA also includes the public during the process of developing new codes and standards, and when NFPA standards are revised. OSHA incorporates consensus standards by reference only in the notice and comment rulemaking process, such as here. OSHA proposed incorporation, received public comment, analyzed the comments, and only then determined if the specific NFPA consensus standard would be incorporated.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2482" instrument_node="">NFPA does not provide free copies of their standards to the public. They must be purchased. Due to legal restrictions, OSHA cannot publish another agency or association's standards when OSHA incorporates them by reference into an OSHA standard. However, when OSHA does incorporate by reference, that particular standard or code is submitted to the </span><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Federal Register</span></strong><span data-dcnode-id="2479" instrument_node=""> and to the OSHA Docket Office. As set forth in § 1915.5, the materials may be purchased from the organization that publishes them, and are available for inspection at the </span><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Federal Register</span></strong><span data-dcnode-id="2476" instrument_node="">, the OSHA Docket Office, or in OSHA regional offices. Apart from minor editorial changes, paragraphs (a) and (b) in § 1915.507 are carried forward unchanged in the final standard.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">General Requirements for Fixed Extinguishing Systems</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Under § 1915.507(c), OSHA addresses the general requirements of fixed extinguishing systems the employer must install to meet a particular OSHA standard. In paragraph (c)(1), OSHA requires the use of fixed extinguishing systems that have been approved by a National Recognized Testing Laboratory (NRTL). This is consistent with OSHA's current practice of requiring that all fire protection equipment and systems are approved for their purpose and design by a NRTL.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">In paragraph (c)(2) of § 1915.507, OSHA requires that employers notify employees and take the necessary precautions to protect employees when a fire extinguishing system becomes inoperable. Precautions must remain in place until the system is working again.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">In paragraph (c)(3) of § 1915.507, OSHA also requires that a qualified technician or mechanic repair any inoperable system. This requirement is consistent with current fire protection standards (29 CFR 1910.160 and NFPA 12-2000).</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">OSHA requires in § 1915.507(c)(4) that when an area remains hazardous to employee safety or health as a result of the discharge of an extinguishing agent, effective safeguards must be provided to warn employees not to enter the discharge area. This is consistent with the requirements in § 1910.160(b). Should an employee need to enter this discharge area for emergency reasons, personal protective equipment must be provided. An emergency could include the rescue of another employee or to shut down equipment or processes to ensure that additional conditions do not arise.</span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2458" instrument_node="">This paragraph is necessary because some systems are designed to discharge extinguishing agents in concentrations greater than is safe for humans. These systems have the potential to create a hazard to employees and need special consideration and control. OSHA has incorporated the requirements in § 1910.160(b) in this final standard, recognizing that the hazards of such systems need to be identified and controlled in shipyard employment. This is particularly true of systems using carbon dioxide and some of the newer Halon replacement agents. OSHA is also adding a sentence to this paragraph directing the reader to § 1915.12, </span><strong data-dcnode-id="2455"><em data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Precautions and the order of testing before entering confined and enclosed spaces and other dangerous atmospheres</span></em></strong><span data-dcnode-id="2454" instrument_node="">, for additional requirements for entry into dangerous atmospheres created by the discharge of certain extinguishing agents.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">In paragraph (c)(5) of § 1915.507, OSHA requires the employer to post hazard warning or caution signs at both the entrance to and inside of areas protected by fixed extinguishing systems that could discharge extinguishing agents in concentrations that are known to be hazardous to employee safety or health. This is consistent with paragraph (b)(5) of 29 CFR 1910.160.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">In § 1915.507(c)(6), OSHA requires the employer to select, install, inspect, maintain, and test all automatic fire detection systems and emergency alarms according to NFPA 72-1999, National Fire Alarm Code (Ex. 19-13). Several technological advancements have occurred in both fire detection and fire alarm technology in recent years. Incorporating NFPA 72-1999 as the OSHA standard for designing and installing all fire detection and alarm systems will provide employees with protections consistent with protections provided by other codes and standards used by local authorities having jurisdiction or other building codes. No comments were received on paragraph (c), and OSHA is carrying it forward in the final standard.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Fixed Extinguishing Systems</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">In § 1915.507(d), OSHA requires that the selection, installation, maintenance, inspection, and testing of specific types of fixed fire extinguishing systems meet the requirements of particular NFPA standards. The Agency received no comments on this paragraph and has adopted it in the final standard.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">In paragraph (d)(1), OSHA requires that standpipe and hose systems in land-side facilities follow the requirements in NFPA 14-2000 Standard for the Installation of Standpipe, Private Hydrant, and Hose Systems (Ex. 19-12).</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">In § 1915.507(d)(2), OSHA is incorporating by reference NFPA 13-1999 Standard for the Installation of Sprinkler Systems (Ex. 19-14); NFPA 750-2000 Standard on Water Mist Fire Protection Systems (Ex. 19- 15); and NFPA 25-2002 Standard for the Inspection, Testing, and Maintenance of Water-based Fire Protection Systems (Ex. 19-16), to address the installation of OSHA-required automatic sprinkler systems in land-side facilities. NFPA 13-1999 and NFPA 750-2000 provide, respectively, requirements for automatic sprinklers and automatic mist systems. NFPA 25-5002 has maintenance and inspection requirements for both of these water systems.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">In paragraph (d)(3) of § 1915.507, OSHA is incorporating by reference several NFPA standards with specifications for fixed extinguishing systems that use water spray or foam for the extinguishing agent. These include the NFPA 11-1998 Standard for Low- Expansion Foam (Ex. 19-17); NFPA 11A-1999 Standard for Medium- and High-Expansion Foam Systems (Ex. 19-18); and NFPA 15-2001 Standard for Water Spray Fixed Systems for Fire Protection (Ex. 19-19). In paragraph (d)(4) of § 1915.507, OSHA is incorporating by reference NFPA 17- 2002 Standard for Dry Chemical Extinguishing Systems (Ex. 19-20) for fixed extinguishing systems using dry chemical as the extinguishing agent.</span></p><span data-dcnode-id="2431" instrument_node="">
