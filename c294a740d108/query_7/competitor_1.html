</span><p data-dcnode-id="3740"><strong data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Fire Protection in Shipyard Employment</span></strong></p><span data-dcnode-id="3739" instrument_node="">
</span><p data-dcnode-id="3735"><strong data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">AGENCY:</span></strong><span data-dcnode-id="3736" instrument_node=""> Occupational Safety and Health Administration (OSHA), U.S. Department of Labor.</span></p><span data-dcnode-id="3734" instrument_node="">
</span><p data-dcnode-id="3730"><strong data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">ACTION:</span></strong><span data-dcnode-id="3731" instrument_node=""> Final rule.</span></p><span data-dcnode-id="3729" instrument_node="">
</span><hr data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3723"><strong data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">SUMMARY:</span></strong><span data-dcnode-id="3724" instrument_node=""> By this rule, OSHA promulgates a fire protection standard for shipyard employment. The proposed rule was developed through a negotiated rulemaking process. The final standard provides increased protection for shipyard employment workers from the hazards of fire on vessels and vessel sections and at land-side facilities. The standard reflects new technologies and current national consensus standards. It also gathers all fire-related safety practices for shipyard employment into a single subpart, which will make them more accessible and understandable for employers and employees.</span></p><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3712"><strong data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">DATES:</span></strong><span data-dcnode-id="3719" instrument_node=""> The final rule becomes effective December 14, 2004. The incorporation by reference of certain publications listed in this rule is approved by the Director of the </span><strong data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">Federal Register</span></strong><span data-dcnode-id="3716" instrument_node=""> as of December 14, 2004. However, affected parties are not required to respond to the information collection (paperwork) requirements until OMB approves those requirements and OSHA announces that approval in the </span><strong data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Federal Register</span></strong><span data-dcnode-id="3713" instrument_node="">.</span></p><span data-dcnode-id="3711" instrument_node="">

</span><p data-dcnode-id="3655"><strong data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">I. Background</span></strong></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3650"><strong data-dcnode-id="3651"><em data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Fire Hazards in Shipyard Employment</span></em></strong></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">The purpose of this standard is to increase the protection of shipyard employment workers from fire hazards. Such workers are subject to a high risk of injury and death from fires and explosions during ship repair, shipbuilding, shipbreaking, and related work activities as well as firefighting activities. Many of the basic tasks involved in shipyard employment, such as welding, grinding, and cutting metal with torches, provide an ignition source for fires. There are also many combustible materials on vessels and in shipyards, including flammable fuels, cargo, wood structures, building materials, and litter. When cutting torches are used in enclosed or confined spaces, accidentally oxygen-enriched atmospheres can cause normally fire-resistant materials to readily burn. When fires do occur, employees are often working in confined or enclosed spaces that may make escape difficult or impossible. Fires in such confined or enclosed spaces can also result in atmospheres of combustible gases, toxic fumes, or oxygen-depleted air.</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Shipyard employees are therefore at risk from fires, explosions, toxic gases, and fumes that can result in burns, death, and asphyxiation from a lack of oxygen. Based on data collected by the Bureau of Labor Statistics, for a workforce totaling 97,822, there is an annual average of one fatality, 110 lost-workday "heat/burn" injuries, and more than three times that many total injuries due to shipyard fires (Ex. 15).</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Employees are also at special risk when fighting fires in shipyards. Fighting fires at land-side facilities in shipyards can be similar to traditional firefighting at typical industrial manufacturing facilities. The usual firefighting hazards encountered include compressed gas cylinders, flammable liquid processes and storage, high-voltage electric switches and transformers, and high-density combustible materials storage. Structures at shipyards can range from single-story office buildings to warehouses to massive fabrication shops. Fires can also be encountered in tunnel sections, rail cars, vessel components, and similar units under construction, repair, or demolition at the shipyard site.</span></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">However, firefighting on board vessels is considerably different from structural firefighting. When traditional structural firefighting techniques are used on a vessel fire, the result can be ineffective and even catastrophic. The potential is much greater for serious injury to firefighting personnel when tactics do not reflect the unique nature of firefighting on vessels. Typically, in structural firefighting, immediate steps are taken to open up the structure, vertically and horizontally, to remove smoke and heat. Hose lines are then used to attack the fire. When fighting a vessel fire, there may be little or no ability to ventilate the heat, smoke, and gases produced by a fire. One of the first steps that may be taken is to shut down ventilation systems to close off the fire's progression and starve it of oxygen. Hose lines are used to cool down surrounding metal decks and bulkheads. For large or intense structural fires, a defensive fire-fighting option is to "surround and drown." This means that hose lines are positioned outside the structure and voluminous amounts of water are applied until the fire goes out. Strategic options for vessel fires, on the other hand, are very limited and nearly always require an aggressive interior attack.</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">While larger shipyards may have their own fire responders, smaller shipyards use outside fire responders, typically the local fire department. These municipal or other fire departments may have little experience in fighting fires in shipyards, especially on vessels. Proper coordination, familiarization, and training are necessary to ensure the safety of outside firefighters who respond to shipyard fires.</span></p><span data-dcnode-id="3634" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Fighting vessel fires may also be more complicated than traditional firefighting because outside firefighters seldom have the opportunity to learn the layout of the vessel. Vessels under construction or modification may have constantly changing structures. Firefighters operating on vessels under adverse conditions caused by heat and smoke can easily become disoriented or confused. Access to the vessel may be restricted by its location, such as within a dry dock, causing firefighters boarding the ship to converge on one or two access locations. This can lead to congestion of personnel and delay in locating and extinguishing the fire. Equipment, tools, and vessel components and structures can also restrict access. Staging platforms, scaffolding, rigging, cranes, and even mooring lines can hamper deploying hose lines and positioning firefighting apparatus, again causing delays and confusion. Even with unrestricted access to the vessel, deploying hose lines can be time consuming and labor intensive. To attack a fire deep within a ship, firefighting hoses may have to be stretched hundreds of feet, a task that requires time and many trained personnel.</span></p><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">Maintaining an adequate supply of air is another tactical problem for firefighting operations on ships. Firefighters are usually equipped with self-contained breathing apparatus (SCBA) that optimally provide a 30-minute supply, after which the compressed air bottle has to be refilled or replaced. Vessel firefighting operations can last many hours so firefighters have to be rotated frequently to resupply their SCBA and counteract fatigue.</span></p><span data-dcnode-id="3628" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">Vessel fires may also present a problem firefighters do not often have to think about -- introducing a large amount of water into the vessel, so much so that the vessel may become unstable and possibly capsize or sink. This potential problem may require consultation with experts, such as naval architects or U.S. Coast Guard engineers, to assure vessel stability.</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Radio communication is another complicating factor common to fighting vessel fires. Steel bulkheads and compartments in ships block or limit radio signal transmissions. To compensate, firefighters have to relay messages from within the ship by stationing personnel with radios close enough to allow transmissions. Other alternatives include using runners or deploying hard-wire communications systems. All possible solutions to this problem involve additional personnel and delays in establishing command and control, which may increase the potential for mishaps.</span></p><span data-dcnode-id="3622" instrument_node="">
</span><p data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">Fires in shipyards present serious hazards to those who work to control them. Fire response employees are exposed to dangers such as heat, flame, smoke, explosion, structural collapse, and hazardous materials. These hazards can be found in shipbuilding, as well as in shipbreaking and ship repair. Because firefighters must function on both land-side and on board vessels, they need a single standard to cover both these situations. Likewise, other shipyard employees can benefit from a single fire protection standard for all aspects of shipyard employment by having fires extinguished more rapidly and effectively.</span></p><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">OSHA's general industry standards for fire protection are in Subpart L, 29 CFR Part 1910.155 through 1910.165, but § 1910.155(b) exempts maritime employments from coverage. Subpart L addresses fire prevention and firefighting methods typically used by general industry. OSHA compliance policy, set out in OSHA Instruction CPL 02-00-133, addresses typical land-side fire hazards in shipyards. Since the Agency has no specific standards that address the risks of fire on board vessels and vessel sections (also referred to as just "vessels" hereafter), OSHA has used the General Duty Clause Section 5(a)(1) of the Occupational Safety and Health Act (OSH Act or Act) to cite fire safety hazards at land-side facilities at shipyards and on board vessels and vessel sections. Because enforcement under the General Duty Clause requires OSHA to show, on a case by case basis, the existence of a hazard, that the hazard is recognized, that the hazard is causing or likely to cause serious physical harm to employees, and that a feasible means exists to abate the hazard, employers have not been given clear regulatory requirements to follow and enforcement has been difficult.</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">The Agency has concluded that codifying relevant issues for fire protection in shipyards into a single subpart in 29 CFR Part 1915 will substantially clarify an employer's responsibilities in protecting shipyard employees from fire hazards. The Agency believes that this in turn will lead to better protection for these employees.</span></p><span data-dcnode-id="3613" instrument_node="">
</span><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Simply extending the application of the current general industry standards to shipyards would not be appropriate. First, most of the provisions in the general industry standards have been in effect since 1980. They would need revision to take into account technological advances that could improve fire protection in shipyard employment. Secondly, shipyard employment encompasses many tasks and worksites that are unique to the maritime industry. Employers, labor representatives, and professional and trade associations have repeatedly asked OSHA to allow all shipyard employment to be covered by a single set of standards. They point out that the work situations found within shipyard employment have more in common with each other than with those in general industry and that the hazards and methods of controlling the hazards are similar throughout the shipyard. Finally, they point out that work at land-side facilities and aboard vessels is located within the same general area and performed by the same workforce. Fire protection services are usually provided by the same in-yard plant or out-of-yard fire crews to all areas of shipyard employment. The Fire Protection in Shipyard Employment Negotiated Rulemaking Advisory Committee concluded that when fire response crews find shipyards following a single fire protection standard on vessels and land-side facilities, the crews are more effective in their fire response activities. OSHA agrees and has concluded that a single new standard addressing fire hazards for all shipyard employment, land-side and on board vessels, is reasonably necessary and appropriate to protect shipyard employees.</span></p><span data-dcnode-id="3610" instrument_node="">
</span><p data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">The Agency has concluded that fire and firefighting activities in shipyard employment pose a significant risk to employees that can result in death, burns and other serious fire-related injuries. OSHA further concludes that the standard's requirements relating to fire hazards will help save lives and prevent injuries. The Agency has also concluded that the standard is technologically and economically feasible as well as cost-effective. It will substantially reduce the risk from fire hazards by recognizing and, in some cases, requiring new fire protection technologies.</span></p><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3603"><strong data-dcnode-id="3604"><em data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Advisory Committees and Procedural History</span></em></strong></p><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">OSHA relied on the involvement of several advisory committees to develop this shipyard fire protection standard. The committees are the Shipyard Employment Standards Advisory Committee (SESAC), the predecessor of the Maritime Advisory Committee on Occupational Safety and Health (MACOSH), which, after reviewing pertinent federal regulations and guidelines issued by professional associations, drafted a shipyard employment fire protection standard (SESAC, Ex. 9); MACOSH, which urged OSHA to proceed with a fire protection standard in 1995; and the Fire Protection in Shipyard Employment Negotiated Rulemaking Advisory Committee (hereafter referred to as "the Committee"), formed in 1996 under the Federal Advisory Committee Act and the Negotiated Rulemaking Act (61 FR 28824).</span></p><span data-dcnode-id="3599" instrument_node="">
</span><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">The members of the Committee were: Chris Myskowski, U.S. Coast Guard; Paul Jensen, National Institute for Occupational Safety and Health (NIOSH); Joseph V. Daddura, Office of Maritime Standards, OSHA; G. F. Hurley, Norfolk Naval Shipyard; Richard Duffy, International Association of Firefighters (AFL-CIO, CLC); E.P. Kaiser, South Tidewater Association of Ship Repairs, Inc.; Guy Colonna, National Fire Protection Association (NFPA); Russ Sill, Portland Fire Bureau; Alton Glass, United Steel Workers of America (AFL-CIO, CLC), who was later replaced by John Molovich; George Broussard, Bollinger's Shipbuilding and Ship Repair, who was later replaced by Mark Duley, Walker Boat Yard, Inc.; Glenn Harris, Ingalls Shipbuilding; Donald Mozick, Atlantic Marine, who was later replaced by Terry Guidry, Bollinger's Shipbuilding and Ship Repair; Michael Buchet, United Brotherhood of Carpenters and Joiners of America, who was later replaced by Joseph Durst; Jim Paulson, National Steel &amp; Shipbuilding Co.; and Peter Schmidt, Office of Specialty Compliance Programs, Washington State Department of Labor and Industry. The Agency wishes to thank all of the Committee members for their time, effort, and patience in helping to develop the draft proposed standard.</span></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">The Committee met nine times between October 1996 and February 2002 (Ex. 5). At its final meeting, the Committee unanimously approved a recommended standard for fire protection in shipyards. With minor editorial revisions, the Agency published the recommendations as a proposed standard on December 11, 2002 (67 FR 76213). A comment period to the proposed rule of 90 days ended on March 11, 2003. OSHA received 31 comments. The final standard continues to reflect most of the Committee's recommendations, with minor modifications made in response to the comments received from the public. The comments and modifications are discussed in the Summary and Explanation of the final standard below.</span></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Some commenters expressed support for the proposed standard. Shipbuilders Council of America (SCA), Southwest Shipyard, Detyens Shipyards, Inc., and Gladding-Hearn Shipbuilding commended "OSHA for recognizing the fact that day-to-day shipyard operations differ considerably from general industry and that an industry specific guideline is needed to address shipyard fire hazards" (Exs. 21-5; 21- 6; 21-7; 21-13). In addition, these commenters stated "[t]hat the Negotiated Rulemaking Committee (Neg Reg) process that was used to draft the Shipyard Fire Protection NPRM was overall beneficial" (Exs. 21-4; 21-5; 21-6; 21-7; 21-13). SCA, Detyens Shipyards, and Gladding- Hearn went further to state that they "[R]ecommend using the Neg Reg for industry-specific issues that may develop in the future." (Exs. 21-5; 21-7; 21-13). Trinity Industries also stated that it was "[p]leased with the Shipyard Fire Protection NPRM" (Ex. 21-4). Puget Sound Shipbuilders Association stated:</span></p><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">With a few exceptions, I find this document follows what the Seattle Fire Department Administrative Regulation 49.1 mandates for hotwork in shipyard, boatyard, and water front operations. The Seattle Fire Department regulation has made a major and positive impact on the overall safety of hot-work operations within their areas of responsibility". Areas of Incident Command, interagency training and communication are key elements to successfully resolve issues prior to an emergency at a facility. These issues may be new to some facilities and I would encourage those who need assistance to contact the local Fire or Emergency Services Department. Many of these agencies will provide training at little or no expense. We in Puget Sound Shipyard are fortunate to have Safety Staff experienced in these elements and conduct annual training with the Seattle Fire Department. Areas of Confined Space Rescue, Pre-fire tours/planning, as well as the annual facility inspection enhance our report with the fire department. Complying with the PPE requirements should be of no strain to any maritime industry. Respirator fit testing and such is an ongoing event. Those facilities that have an "in house" Fire Department or Fire Brigade should already be complying with the current OSHA regulations as well as NFPA recommendations (Ex. 21-2).</span></p><span data-dcnode-id="3587" instrument_node="">
</span><p data-dcnode-id="3584"><strong data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">II. Pertinent Legal Authority</span></strong></p><span data-dcnode-id="3583" instrument_node="">
</span><p data-dcnode-id="3577"><span data-dcnode-id="3582" instrument_node="">The purpose of the OSH Act, 29 U.S.C. 651 </span><strong data-dcnode-id="3579"><em data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="3578" instrument_node="">, is to "assure so far as possible every working man and woman in the nation safe and healthful working conditions and to preserve our human resources" (29 U.S.C. 651(b)). To achieve this goal, Congress authorized the Secretary of Labor to issue and enforce occupational safety and health standards. (See 29 U.S.C. 655(a) authorizing summary adoption of existing consensus and federal standards within two years of the Act's enactment, 655(b) authorizing promulgation of standards pursuant to notice and comment, and 654(b) requiring employers to comply with OSHA standards).</span></p><span data-dcnode-id="3576" instrument_node="">
</span><p data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">A safety or health standard is a standard "which requires conditions, or the adoption or use of one or more practices, means, methods, operations, or processes, reasonably necessary or appropriate to provide safe or healthful employment or places of employment." 29 U.S.C. 652(8).</span></p><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">A standard is reasonably necessary or appropriate within the meaning of section 652(8) if it substantially reduces or eliminates significant risk; is economically feasible; technologically feasible; cost effective; is consistent with prior Agency action or is a justified departure; is supported by substantial evidence; and is better able to effectuate the Act's purposes than any national consensus standard it supersedes. See 58 FR 16612-16616 (March 30, 1993).</span></p><span data-dcnode-id="3570" instrument_node="">
</span><p data-dcnode-id="3552"><span data-dcnode-id="3569" instrument_node="">A standard is technologically feasible if the protective measures it requires already exist, can be brought into existence with available technology, or can be created with technology that can reasonably be expected to be developed. </span><strong data-dcnode-id="3566"><em data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">American Textile Mfrs. Institute</span></em></strong><span data-dcnode-id="3565" instrument_node=""> v. </span><strong data-dcnode-id="3562"><em data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">OSHA</span></em></strong><span data-dcnode-id="3561" instrument_node=""> 452 U.S. 490, 513 (1981) ("ATMI"), </span><strong data-dcnode-id="3558"><em data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">American Iron and Steel Institute</span></em></strong><span data-dcnode-id="3557" instrument_node=""> v. </span><strong data-dcnode-id="3554"><em data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">OSHA</span></em></strong><span data-dcnode-id="3553" instrument_node="">, 939 F.2d 975, 980 (D.C. Cir 1991) ("AISI").</span></p><span data-dcnode-id="3551" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3550" instrument_node="">A standard is economically feasible if industry can absorb or pass on the cost of compliance without threatening its long term profitability or competitive structure. See ATMI, 452 U.S. at 530 n.55; AISI, 939 F.2d at 980. A standard is cost effective if the protective measures it requires are the least costly of the available alternatives that achieve the same level of protection. ATMI, 453 U.S. at 514 n.32; </span><strong data-dcnode-id="3547"><em data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">International Union, UAW</span></em></strong><span data-dcnode-id="3546" instrument_node=""> v. </span><strong data-dcnode-id="3543"><em data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">OSHA</span></em></strong><span data-dcnode-id="3542" instrument_node="">, 37 F.3d 665, 668 (D.C. Cir. 1994) ("LOTO II").</span></p><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">Section 6(b)(7) authorizes OSHA to include among a standard's requirements labeling, monitoring, medical testing and other information gathering and transmittal provisions. 29 U.S.C. 655(b)(7). All standards must be highly protective. See 58 FR 16614-16615; LOTO II, 37 F.3d at 668. Finally, whenever practical, standards shall "be expressed in terms of objective criteria and of the performance desired." 29 U.S.C. 655(b)(5).</span></p><span data-dcnode-id="3537" instrument_node="">
</span><p data-dcnode-id="3534"><strong data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">III. Summary and Explanation of the Final Standard</span></strong></p><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">The comments OSHA received on the proposed standard supported the Committee's general approach to the issues, as well as the need for the standard. There were suggestions related to specific provisions, and these are addressed below in the discussion of each section. OSHA has revised the proposed regulatory text where appropriate in response to comments, and has also made minor editorial revisions to better clarify the final regulatory text.</span></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">In this rule, OSHA is incorporating by reference 19 National Fire Protection Association (NFPA) consensus standards. In keeping with past practice, the consensus standards are listed in § 1915.5, Incorporation by Reference (IBR). There are ten additional NFPA standards referenced in the preamble, but they are not incorporated by reference. Reliance on national consensus standards such as those referenced in Subpart P is a longstanding U.S. government policy. The U.S. Office of Management and Budget, in Circular A-119, directs federal agencies to use voluntary consensus standards in lieu of government-unique standards except where inconsistent with law or otherwise impractical. The majority of these consensus standards are referenced in § 1915.505, Fire Response, and § 1915.507, Land-side Fire Protection systems.</span></p><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">In the proposed rule, there were several incorrect references to NFPA standards that OSHA has identified and corrected in this final rule. These errors were minor and the correct referenced versions of the NFPA standards can be found in OSHA docket S-051. The following table lists the NFPA standards incorrectly cited in the proposal along with the correct citation used in the final rule:</span></p><span data-dcnode-id="3524" instrument_node="">

</span><table class="table table-bordered" data-dcnode-id="3460"><tbody data-dcnode-id="3461"><tr data-dcnode-id="3512"><td data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">Incorrect citations</span></td><td data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Correct citations</span></td><td data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">NPRM page location</span></td></tr><tr data-dcnode-id="3500"><td data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">NFPA 10-2002 Standard for Portable Fire Extinguishers.</span></td><td data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">NFPA 10-1998 Standard for Portable Fire Extinguishers.</span></td><td data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">76250 (2 locations).</span></td></tr><tr data-dcnode-id="3487"><td data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">NFPA 11-2000 Standard for Low-Expansion Foam.</span></td><td data-dcnode-id="3492"><span data-dcnode-id="3494" instrument_node="">NFPA 11-1998 Standard for Low-Expansion Foam.</span><br data-dcnode-id="3493"></td><td data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">76236, 76250.</span></td></tr><tr data-dcnode-id="3475"><td data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">NFPA 15-2002 Standard for Water Spray Fixed Systems for Fire Protection (Ex. 20-19).</span></td><td data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">NFPA 15-2001 Standard for Water Spray Fixed Systems for Fire Protection (Ex. 19-19).</span></td><td data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">76236.</span></td></tr><tr data-dcnode-id="3463"><td data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">NFPA 17-1998 Standard for Dry Chemical Extinguishing Systems (Ex. 19-20).</span></td><td data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">NFPA 17-2002 Standard for Dry Chemical Extinguishing Systems (Ex. 19-20).</span></td><td data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">76237, 76250.</span></td></tr></tbody></table><span data-dcnode-id="3459" instrument_node="">
</span><br data-dcnode-id="3458"><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">In the NPRM, OSHA proposed to delete section 1915.52, Fire prevention, which is located in Subpart D Welding, Cutting and Heating, because it is superceded by the comprehensive fire protection requirements in the new Subpart P. Section 1915.52 included the fire prevention standards for welding and burning in shipyard employment, and was the basis for many of the requirements now found in Subpart P, Section 1915.503 -- Precautions for hot work. No comments were received and OSHA is therefore deleting this section as proposed. Section 1915.52 will be listed as "reserved" to avoid any need to renumber subsequent sections, and it will be available for future use, if needed.</span></p><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">OSHA also proposed to delete paragraphs (d), (f), and (g) of § 1915.55, Gas welding and heating, in the NPRM. These paragraphs included provisions for the "Use of fuel gas," "Hose," and "Torches," respectively. After re-examining this proposed deletion, OSHA has found it is necessary to retain these paragraphs. Without them, the final standard would not address potentially hazardous situations. Thus, to ensure the continued protection of workers while welding, cutting, and heating, OSHA will not delete the paragraphs.</span></p><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3446"><strong data-dcnode-id="3447"><em data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Section 1915.501 General Provisions</span></em></strong></p><span data-dcnode-id="3445" instrument_node="">
</span><p data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Purpose</span></p><span data-dcnode-id="3442" instrument_node="">
</span><p data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">In § 1915.501(a), OSHA states the purpose of the standard is to require employers to protect all employees from fire hazards in shipyard employment, including employees engaged in fire response activities.</span></p><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Scope</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Paragraph (b) of § 1915.501 describes the scope of the final standard, which is all shipyard employment work, including work on vessels and vessel sections and at land-side operations, regardless of geographic location. The final requirement is nearly identical to the proposed requirement. The only change is to replace "and/or" with "and." The scope of this subpart is consistent with that in Subpart B, Confined and Enclosed Spaces and Other Dangerous Atmospheres in Shipyard Employment, and Subpart I, Personal Protective Equipment for Shipyard Employment. It is also consistent with OSHA's previous policy concerning the scope of the Part 1915 standards.</span></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">The scope of this standard includes all fire response provided by the employers' workers, whether they are part of a fire brigade, shipyard fire department, or simply designated by the employer. Shipyard employment includes shipbuilding, ship conversion, ship repairing, shipbreaking, and related employments. It also includes operations performed during the final outfitting of vessels under construction or repair. Examples of such operations include technical support from the providers of shipboard electronic equipment as well as suppliers of internal furnishings.</span></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">The scope of the standard has broad coverage because shipyard employers are increasingly engaged in non-traditional shipyard employment such as steel fabrication of products not directly related to ships. This could include work such as construction of railroad cars, bridges, tunnel sections, smoke stacks, and boilers.</span></p><span data-dcnode-id="3427" instrument_node="">
</span><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Shipyard employment also includes support operations necessary for vessel construction and repair. Such support operations include metal fabrication, machine shops, electrical shops, and paint shops, which are facilities typically found within a shipyard. Many vessel sections and vessel components are built in these shops more easily than they can be built on board a vessel. The materials are the same and often the hazards encountered are similar to fabrication on a vessel.</span></p><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">OSHA has included the phrase "regardless of geographic location" in the scope so that protection is afforded to employees wherever they engage in shipyard employment: on vessels, on vessel sections, at land- side facilities, or at any other location where they perform shipyard employment. This has been the Agency's long-standing policy on shipyard employment, and is the scope of both Subparts B and I.</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Shipyard employment also occurs on vessels and vessel sections within the navigable waters of the United States, and includes work on a vessel or part of a vessel that is being constructed, repaired, or broken up, or whether it is in the shipyard or dockside, at anchor, or underway for testing. The requirements in this subpart will apply to all vessels within OSHA's jurisdictional boundaries.</span></p><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Several commenters recommended a revision of paragraph (b) (Exs. 21-10; 21-15; 21-16; 22-1; 22-2; 22-3; 22-4; 22-5; 22-6; 22-7; 22-8; 22-9; 22-10; 22-11; 22-13). They suggested that the phrase "or on land-side operations regardless of geographic location" be replaced with "or at facilities where vessels or vessel sections are located." The commenters were concerned about the application of the standard to off-site suppliers and contractors, such as a metal shop not engaged in shipyard employment that supplies duct work to a shipyard. The commenters did not think it would be appropriate for Subpart P to apply to such establishments that only supply materials or subcomponents to be installed on a vessel or used in a shipyard.</span></p><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">OSHA has carried forward the proposed scope language in the final rule. However, in order to address the concerns raised, the Agency wants to clarify the degree to which it intends to regulate contract employers at shipyards. Contractors who engage in work outside of shipyards do not have to follow Subpart P within their own facilities. For example, Subpart P would not cover the metal shop described above. However, when the metal shop employees are engaged in shipyard activities within the shipyard, they must comply with Subpart P. The scope of Subpart P does not include shore side support services, such as those provided by vending equipment and mail delivery companies.</span></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">The scope of the final rule includes all employees doing shipyard- related work wherever that work takes place. For instance, whether the work is in the employers' shipyard, on a ship at anchor, or at a ship at a dock several miles away, it is considered shipyard employment. When subcontractors perform work in a shipyard, they must follow the standards of 29 CFR Part 1915.</span></p><span data-dcnode-id="3409" instrument_node="">
</span><p data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Employee Involvement</span></p><span data-dcnode-id="3406" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">In § 1915.501(c), OSHA requires employee participation in shipyard safety and health program activities. OSHA requires the employer to provide for the participation of employees and employee representatives in the development and review of programs and policies adopted to comply with this standard. The Committee also recommended that such employee participation and involvement be included in the standard.</span></p><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Several commenters suggested that OSHA replace the word "and" with "and/or" in § 1915.501(c).</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">In large companies it may not be feasible to include employees as well as employee representatives in the development of programs and policies. It is more likely that the employee representatives will participate in the development process and solicit input from their respective constituents. A large company may depend on labor union stewards or safety committee members to represent the labor force. In either case employee input is obtained. Recommendation: Make this an "and/or" situation. "The employer must provide ways for the employees and/or employee representatives * * *" (Exs. 21- 3; 21-10; 21-15; 21-16; 22-1; 22-6; 22-7; 22-8; 22-9; 22-10; 22-11; 22-14).</span></p><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Naval Sea Systems Command (NAVSEA) commented that</span></p><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">The size of the organization/facility may limit its ability to include employees and employee representatives in the development of programs and policies. Employee representatives and/or safety boards/committees will be more likely to participate in the development process, and solicit input from their respective constituents (Ex. 22-15).</span></p><span data-dcnode-id="3391" instrument_node="">
</span><p data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">The comments raised the issue that it may not be practical for both employees and their representative to participate. The Committee and OSHA viewed the employee involvement requirement as crucial. However, the Agency agrees with these commenters that the participation of either employees or employee representatives in the development or review of programs or policies is sufficient. Examples of employee representatives include employee safety boards and committees or labor union stewards. The Agency has altered the final language will read "employees, employee representatives, or both to participate" to allow for employees, their representatives, or both to participate in developing and periodically reviewing programs and policies.</span></p><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Multi-Employer Worksites</span></p><span data-dcnode-id="3385" instrument_node="">
</span><p data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Paragraph (d) of § 1915.501 sets minimum requirements for exchanging information and coordinating responsibilities for fire protection among host and contract employers. These requirements are fundamental to any effective fire safety program on a multi-employer worksite. A multi-employer workplace is defined for the purposes of this rule as a workplace where there is a host employer and at least one contract employer.</span></p><span data-dcnode-id="3382" instrument_node="">
</span><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">The multi-employer requirements are necessary because the existence of additional employers and their employees at a workplace makes addressing safety and health conditions at the workplace more complex. For example, at a multi-employer worksite, one employer may introduce hazards into the workplace about which employees of other employers are unaware. All employers need information about relevant hazards present at the worksite to enable them to fulfill their obligations to protect workers. For these reasons, communication and coordination among employers are essential.</span></p><span data-dcnode-id="3379" instrument_node="">
</span><p data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Failure to communicate about hazards between employers can be tragic. For example, the 1989 explosion at a Phillips 66 chemical complex in Houston, which killed 23 people and injured more than 100 workers, resulted largely from the failure to coordinate safety and health activities on a multi-employer worksite. Such tragic events and the increased reliance on contractors throughout the shipyard industry have led OSHA to conclude that responsibility for fire safety must be specifically assigned to all employers, who must then be held accountable for discharging those responsibilities. In the shipyard industry, it is common practice to hire contractors for non-routine or specialized work situations. For example, painting, joining, carpentry, and scaffolding contractors are routinely used in shipyard employment.</span></p><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">In the final standard, OSHA has retained in paragraph (d)(1)(i) and (ii) the proposed provisions that host employers must inform all employers at the work site about the contents of the host's fire safety plan, including hazards, controls, and emergency procedures, and assign any appropriate responsibilities for fire safety to other employers. OSHA specifically requested input from the public on the use of the terms "host employer" and "contract employer" and whether it is clear which employer is responsible under the provisions, and whether there is another way to define or clarify which employer is responsible for implementing the requirements. Northrop Grumman/ Newport News Shipyard (NGNN) submitted the only comment on this issue:</span></p><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">The rule should be clarified to reflect the fact that there is typically more than one host employer at a shipyard work site or on board a vessel. For example, a ship owner may conduct work on its own vessel, or hire other contractors that are not under contract to or supervised by the shipyard where the vessel is temporarily located. Additionally, each "host employer" will have its own subcontractors and its specific work for the safety of which it should be responsible. The various host employers should be able to allocate among themselves in manners suitable to the individual circumstances (Ex. 21-8).</span></p><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">It was the clear intent of the proposal that a single shipyard employer have responsibility for acquainting every employer on site of the contents of the fire safety plan and emergency procedures. However, OSHA agrees with Newport News Shipyard that there may be circumstances where a vessel owner may also be a host employer. Therefore, OSHA is adding a new provision, paragraph (d)(1)(iii), which also has a clarifying sentence to ensure that all employers are communicating and following their fire safety plans (see discussion below).</span></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">The definition of "host employer" in § 1915.509 Definitions is an employer who is in charge of coordinating work or who hires other employers to perform work at a multi-employer workplace. The definition of "contract employer" is an employer who performs work under contract to a host employer or to another employer under contract to the host employer at the worksite. This definition specifically excludes employers who provide incidental services that do not influence shipyard employment (such as mail delivery or office supply services).</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">The responsibilities of host employers are established in § 1915.501(d)(1). In paragraph (d)(1)(i), OSHA requires the host employers to ensure that information about fire hazards, controls, safety and health rules, and emergency procedures is given to all contract employers. The information includes whatever a contract employer must have to carry out its own duties as an employer under this rule.</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">OSHA is requiring in paragraph (d)(1)(ii) that the host employer make sure that fire protection responsibilities are specifically assigned to the various employers and contractors working at a multi- employer worksite. Some of these responsibilities include fire hazard abatement, informing employees of fire hazards before exposure, and stopping work because of an imminent danger situation. The host employer must, in conjunction with the contract employers, decide who is to train employees and control which hazards.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">Contract employers must know (from the host employer) about other hazards related to fire which their employees might encounter at the workplace. Such knowledge allows contract employers to plan effectively, safely carry out their work, and understand procedures, such as what to do when a fire alarm is sounded to evacuate a vessel. Contract employers also need to inform employees of the fire hazards to which they are exposed at that worksite, the controls in place to reduce or eliminate those fire hazards, the safety and health procedures to be followed, and the steps to be taken in a fire emergency. This information lessens the likelihood that accidents will occur.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">To further clarify the roles of the host employer, the Agency has added a new provision, § 1915.501(d)(1)(iii), to ensure that when there is more than one host employer, each host employer must communicate to other host employers relevant information about fire- related hazards. In addition, OSHA is adding a clarifying sentence as follows: "When a vessel owner or operator (temporarily) becomes a host shipyard employer, by directing the work of ships' crews on repair or modification of the vessel or hiring other contractors directly, the vessel owner or operator must also comply with these provisions for host employers."</span></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Paragraph (d)(2) of § 1915.501 states the responsibilities for contract employers. The contract employer must inform the host employer of any fire hazards that could be created by the work being performed by its employees, and what steps the contract employer must take to address those hazards. In addition, OSHA requires that any hazards that were not previously identified by the host employer, but were identified by the contract employer, must be shared with the host employer. No comments were received on paragraph (d)(2) and OSHA has carried it forward in the final standard.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3345"><strong data-dcnode-id="3346"><em data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Section 1915.502 Fire Safety Plan</span></em></strong></p><span data-dcnode-id="3344" instrument_node="">
</span><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">The final standard includes requirements for an overall program that would establish the location, type, and capacity of firefighting equipment such as extinguishers, fire hose and stand pipes, smoke detectors, automatic sprinklers, and other fixed firefighting systems in accordance with applicable fire codes. The plan must provide for the routine inspection, maintenance, and replacement of this equipment and mandate training for new workers and refresher training for all shipyard employment workers. The plan must include procedures for the control of fire hazards, such as flammable and non-flammable compressed gases, ignition sources, combustible materials, and welding and hot work operations, and must include procedures for evacuation. Employer Responsibilities</span></p><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">In § 1915.502(a), OSHA is requiring the employer to develop and implement a written fire safety plan that covers all the actions that employers and employees must take to ensure employee safety in the event of a fire. A written plan enables employers and employees to see how the employer intends to protect workers; enables employers to readily exchange information; provides continuity of procedures; and provides a practical means of communication to fire response organizations. Updating the plan to reflect changing fire control technology or changing the plan to reflect different fire hazards in different work situations is readily accomplished with a written plan.</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">In § 1915.502(a), OSHA refers readers to an outline for a model fire safety plan, Appendix A, a non-mandatory appendix to this subpart. The purpose of Appendix A is to give guidance to any employers who may not have the expertise available to develop their own plan. If an employer chooses to use the model plan for a specific worksite, the employer meets the minimum requirements of this section, provided the employer's plan correctly follows the model outline and appropriately addresses the particular conditions at the employer's specific worksite.</span></p><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Several comments were received regarding § 1915.502(a) (Exs. 21-4; 21-5; 21-6; 21-7; 21-13; 22-2). They questioned whether an employer that already has an integrated emergency action plan has to also have a separate fire safety plan. And if so, they wanted to know if the "fire safety plan" is meant to supersede all provisions under § § 1910.38 and 1910.39 (Emergency Action Plans and Fire Prevention Plans). Atlantic Marine recommended that a provision be added which would accept an existing emergency action plan in place of a fire safety plan if it already met the requirements of both § 1910.38 and § 1915.502(a) (Ex. 21-17-1-1).</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">OSHA notes that while the Agency was developing the Part 1915 subpart F standard, OSHA also revised Part 1910, Subpart E, Exit Routes, Emergency Action Plans, and Fire Prevention Plans (67 FR 67949- 67965 (11/07/2002)), which apply to general industry workplaces as well as shipyard employers. In the Part 1910 Subpart E rulemaking, OSHA revised the previous requirements for exit routes using clearer language so they are easier to understand by employers, employees, and others who use them. In addition, these revisions reorganized the text, removed inconsistencies among sections, and eliminated duplicative requirements.</span></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">The employee emergency plans and fire prevention plans that are covered by § § 1910.38 and .39 are similar to the fire safety plans required by § 1915.502. However, there are a few key differences. Section 1910.38 requires the employer to plan for all emergencies, not just fire emergencies. Therefore, the § 1915.502 fire safety plan provisions do not adequately replace the § 1910.38 requirements and shipyard employers will still be required to comply with § 1910.38. For § 1910.39 Fire protection plans, OSHA has determined that paragraphs (a), (b), and (d) are covered by § 1915.502, and shipyard employers are no longer required to comply with these provisions of § 1910.39. However, paragraph § 1910.39(c) contains provisions requiring employers to identify and control certain fire hazards. These provisions are not adequately addressed by § 1915.502, so OSHA has determined that shipyard employers will continue to be required to comply with the § 1910.39(c) provisions.</span></p><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">The Agency understands that shipyard employers who are currently complying with § § 1910.38 and 1910.39 will now also be required to comply with the additional requirements of § 1915.502. However, there is no need to produce three separate plans, unless the employer wishes to do so. OSHA does not require employers to have separate plans as long as the unified plan covers the applicable general industry employee emergency plan and fire prevention plan provisions, as well as the shipyard employment fire safety plan. OSHA will accept one unified plan that meets all of the requirements in § § 1910.38, 1910.39, and 1915.502.</span></p><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Plan Elements</span></p><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">In § 1915.502(b), OSHA sets forth the elements that the employer must include in the fire safety plan. These are the identification of significant fire hazards; procedures for recognizing and reporting unsafe conditions; alarm procedures; procedures for notifying employees of a fire emergency; procedures for notifying fire response organizations of a fire emergency; procedures for evacuation; procedures to account for all employees after an evacuation; and the names, job titles, and departments for individuals who can be contacted for further information about the plan.</span></p><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">Reviewing the Plan With Employees</span></p><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">In § 1915.502(c), OSHA requires the employer to review the fire safety plan with each employee within 90 days of the effective date of this standard for employees who are currently working. It also requires employers to review the fire safety plan with new employees upon initial assignment and whenever the actions the employee must take under the plan change because of a change in duties or a change in the plan. Employees include those employees who perform hot work and fire watches, fire responders, and all other employees who are in the shipyard.</span></p><span data-dcnode-id="3311" instrument_node="">
</span><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">Additional Employer Requirements</span></p><span data-dcnode-id="3308" instrument_node="">
</span><p data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">In § 1915.502(d), OSHA requires the employer to keep the plan readily accessible for review by employees, their representatives, and OSHA; review and update the plan whenever necessary but at least annually; document that affected employees have been informed of the plan; and give a copy of the plan to any outside fire response organization that the employer expects may respond to fires at a worksite.</span></p><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">NAVSEA commented on this paragraph:</span></p><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">The standard requiring a "readily accessible" "updated" fire safety plan is vague. For example, will maintenance of training records suffice as a fire safety plan? Recommend revising the standard to better define the requirements of the fire safety plan. (Ex. 22-15).</span></p><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">The Agency has used the terms "readily accessible" and "updated" in numerous OSHA standards. Definitions of "readily accessible" include that in § 1910.1200(f)(8) ("as long as no barriers to immediate employee access exist") and § 1910.399 ("Capable of being reached quickly for operation, renewal, or inspections, without requiring those to whom ready access is requisite to climb over or remove obstacles or to resort to portable ladders, chairs, etc."). Employees must be able to access the fire safety plan at any time during the work shift. The plan may be in a notebook, on a computer, or in any other appropriate format. The employer may have one or more locations for all safety plans and related information. Employees must know where to go to access this information and must be able to obtain the information in a timely manner. The Agency believes that the term "readily accessible" both in its plain meaning and other applications in OSHA regulations is sufficiently clear that no additional definition in § 1915.509 is necessary.</span></p><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">Updating the plan when necessary would include when there is a change in the system, the process, or in technology. This ensures that the fire safety plan will be effective for the work that is being performed at any given facility at any given time. OSHA understands that a shipyard may be working on several types of vessels during a year, and that each vessel may involve different hazards. The plan may need to be updated to cover those changes as well. For instance, if a shipyard only repairs barges, employees should be aware of the hazards associated with that particular vessel. However, if a ferry is in the shipyard for modifications or repair, the elements of the fire safety plan may need revision to address the different fire hazards associated with such a vessel. The employer must review and update the plan when necessary but at least annually. Should the process, system, and technology remain the same after one year, no update is needed. However, the employer must review the plan to ensure that no changes are needed. OSHA believes that the meaning of "update the plan" in § 1915.502(d)(2) is clear and this provision has been included in the final standard.</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">In § 1915.502(d)(3) of the proposed rule, OSHA proposed that employers certify in writing that each employee has been informed about the plan. Numerous commenters replied that this paragraph was not justified. In addition, they believed that adding a certification requirement adds no substantive protection for employees and is inconsistent with the recommendation of the Committee, which specifically approved a "recordkeeping" mechanism for ensuring compliance (Exs. 21-10; 21-15; 21-16; 22-1; 22-6; 22-7; 22-8; 22-9; 22- 10; 22-11). Bath Iron Works stated that: "The request for a company to 'certify in writing * * *' is unclear. Is the standard calling for a record to be maintained and does an electronic data base of training records meet the intent of the standards?" (Ex. 21-3). All of these commenters recommended revising this paragraph and using terms such as "maintain records," "maintain training documentation," or "document training records."</span></p><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Additionally, NGNN stated that:</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">We do not believe that electronic media or other equally effective means should be excluded as methods that an employer may use to demonstrate to OSHA that all affected employees are informed or trained on the fire safety plan. It is impractical for the employer to be continually issuing a new "certification" each time an employee is hired. Training records or other means may be used more efficiently and without creating a redundant need for a separate "certification." OSHA should not dictate the method but rather make it incumbent upon the employer to demonstrate that employees have been informed of the plan. (Ex. 21-8).</span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">It recommended that the paragraph read: "[A]ssure that each affected employee has been informed about the plan as required by paragraph (c) of this section; and * * *." (Id.)</span></p><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">OSHA's intent was to require the employer to certify that its employees have been informed, not to require a new certification for each employee. However, OSHA agrees with the commenters that the proposed language was unclear, and has changed the language to require that the employer: "[D]ocument that affected employees have been informed * * *." Many employers have developed databases that track the training that each employee has completed. This form of documentation is acceptable, as is any other effective method of documenting that all affected employees have received the training.</span></p><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">In paragraph (d)(4), OSHA requires that the employer provide a copy of the plan to any outside fire response organization that the employer expects to respond to fires at its worksite. No comments were received on this requirement. OSHA made minor editorial changes to this paragraph in the final standard.</span></p><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Contract Employers</span></p><span data-dcnode-id="3272" instrument_node="">
</span><p data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">In § 1915.502(e), OSHA requires a contract employer's fire safety plan to be in compliance with the host employer's fire safety program. Because of the nature of the work at any given time, there may be many employers within one particular shipyard. Safety and health hazards may increase at such multi-employer worksites. OSHA's intent with this paragraph is that all employers take responsible actions to reduce these hazards when possible, and to alert other employers when hazards exist. The successful recognition of fire hazards and response to fire emergencies requires all employers on the site to follow the host employer's fire safety plan.</span></p><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Several identical comments were received on this paragraph. The concern was that the wording implied that there must be two distinct and separate plans. "The same degree of contractor safety can be achieved if the contractor agrees, in writing if necessary, to comply with the host employer's fire safety plan. This would ease the burden on the contractor and promote consistency within the shipyard." (Exs. 21-3; 21-10; 21-15; 21-16; 22-1; 22-6; 22-7; 22-8; 22-9; 22-10; 22-11; 22-14). OSHA agrees with these comments. If the host employer's plan includes the fire hazards the contract employer's employees will encounter, it is acceptable for a sub-contractor to simply adopt or follow the host employer's fire safety plan.</span></p><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">The Agency's intent was for contractor and sub-contractor employees to be provided the same level of protection as the host employer's employees while on site. It is also important that contractor employees respond as effectively as other employees to evacuations. For example, to follow the host employer's fire safety plan would include following all of § 1915.502, including reviewing the plan with employees, keeping the plan accessible and updated, and certifying that all employees have been informed of the plan. Recognizing hazards, communicating about developing hazards and responding to emergencies in a safe manner require all employers on the site to follow the host employer's fire safety plan.</span></p><span data-dcnode-id="3263" instrument_node="">
</span><p data-dcnode-id="3259"><strong data-dcnode-id="3260"><em data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Section 1915.503 Precautions for Hot Work</span></em></strong></p><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">The purpose of this section is to reduce the potential of fire hazards and to reduce the frequency and severity of any fires resulting from hot work. Three elements are normally present for a fire to occur: An ignition source, oxygen, and a fuel source. If one element is removed, then a fire will not occur. The final rule focuses on reducing the hazards associated with fuel sources and ignition sources by removing any fuel source from the area where hot work is to be performed. If that is not possible, then isolating the fuels by using protection (shielding), posting a fire watch, or other positive means can be used to comply with the provision. These requirements reflect current industry practices and the requirements associated with § 1915.14 for flammable and combustible materials within confined and enclosed spaces and other dangerous atmospheres. Other materials may also be present that have properties that may increase the hazards associated with a fire, such as oxidizers and water reactive chemicals. The Agency concludes that fires resulting from hot work can be prevented through an authorization procedure and proper inspection of the worksite before hot work. This involves identifying fire hazards and implementing appropriate control measures that include removing hazards, inerting spaces, shielding combustibles, or posting fire watches. The Agency believes this approach will better protect shipyard workers from fire hazards associated with hot work while also reflecting the best practices of the industry.</span></p><span data-dcnode-id="3255" instrument_node="">
</span><p data-dcnode-id="3249"><span data-dcnode-id="3254" instrument_node="">The purpose of OSHA's requirement is to make sure that the employer identifies all fire hazards in a hot work area and takes appropriate action to prevent fires. This section relies heavily upon requirements adapted from the existing § § 1915.52 Fire Prevention, § 1910.252 Welding, Cutting and Brazing, and from an industry consensus standard, NFPA 51B-1998 </span><strong data-dcnode-id="3251"><em data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Standard for Fire Prevention in Use of Cutting and Welding Processes</span></em></strong><span data-dcnode-id="3250" instrument_node=""> (Ex. 19-3).</span></p><span data-dcnode-id="3248" instrument_node="">
</span><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">General Requirements</span></p><span data-dcnode-id="3245" instrument_node="">
</span><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Paragraph (a) makes clear that the requirements cover all hot work except for operations covered by Subpart B Confined and Enclosed Spaces and Other Dangerous Atmospheres in Shipyard Employment. Subpart B already covers the hazards of performing hot work in these areas. Addressing them again in Subpart P would be duplicative and unnecessary.</span></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Paragraph (a)(1) allows the employer to designate certain areas for hot work. In designating such areas, the employer must determine through an inspection, that they are free from fire hazards. These areas are typically designed for hot work, and include fabricating shops, sub-assembly areas, and welding and burning areas within shops, such as pipe, boiler, and sheet metal shops. In "designated areas," hot work operations are regular and continuous as opposed to incidental hot work operations occurring throughout the yard. Nonetheless, such areas must be initially inspected to establish them as "designated areas" and then maintained as such, as required in paragraph (b)(1) of this section.</span></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">OSHA received comments relating to paragraph (a)(1). One group of commenters argued that the word "only" should be removed from: "[t]he employer may only designate areas for hot work" because it implies that an employer is limited to designating areas for hot work (Exs. 21-4; 21-5; 21-6; 21-8; 21-13). OSHA agrees with these commenters and has deleted "only" from the requirement.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Several comments were received objecting to the term "potential fire hazard." (Exs. 21-8; 21-10; 21-15; 21-16; 21-17-1; 22-1; 22-6; 22-7 through 22-11; 22-14) The commenters felt that this terminology was too broad and vague, could be improperly interpreted in the field, and should be clearly defined or changed. One suggestion was to substitute the term with "free of fire hazards," which would be consistent with language used in § § 1915.503(a)(2)(ii) and (b)(1). Another comment on this term was that: "The use of the word "potential" is confusing and could be improperly interpreted in the field. Either an area has a "fire hazard" or it does not." (Exs. 21- 10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11). OSHA agrees with these commenters that using the phrase "potential fire hazards" could be misconstrued. Therefore, OSHA has changed the language to read "free of fire hazards."</span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Alabama Shipyard and Atlantic Marine-Mobile noted that the rule does not specify how such areas should be designated, such as by posting signs, inclusion in the fire safety plan, or some other mechanism (Ex. 22-2). In response, OSHA notes that the Agency is allowing employers flexibility in determining how to designate these hot work areas, and only requires that they do so in an effective manner.</span></p><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Paragraph (a)(2) of this section contains the requirements for authorization of hot work in non-designated areas. In § 1915.503(a)(2)(i), OSHA requires that, before authorizing hot work in a non-designated area, the employer must visually inspect the area where hot work is to be performed, including adjacent spaces, to ensure that the area is free of fire hazards, unless a Marine Chemist's certificate or Shipyard Competent Person's log is used for the authorization. OSHA believes that by requiring authorization before hot work is performed in a non-designated area, the employer will pre-plan the operation and thereby identify and control the hazards associated with hot work.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">OSHA recognizes that, although Marine Chemists and Shipyard Competent Persons have specific functions to perform under Subpart B, the employer may also use them to assess whether designated and non- designated hot work areas are free from fire hazards. However, the employer is not required to do so. In a related comment, Bath  Iron Works remarked that:</span></p><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Using the term '[the employer] must' implies that no one else can do the inspection. A trained mechanic may be more effective than a supervisor to perform such an inspection. Can the employer utilize employees to perform the inspection prior to hot work if it is part of their internal procedures and the employees are trained to do so? (Ex. 21-3).</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">OSHA does not intend for the words "employer must" to be interpreted to mean that a supervisory individual must conduct the visual inspection. A supervisor, the hot worker, a fire watch, or some other employee who is capable of performing the inspection may be delegated to do the inspection. Of course, it remains the employer's responsibility to ensure the area is free of fire hazards.</span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3217" instrument_node="">The paragraph requires that the inspection be performed to make sure the area is free of fire hazards. If during the inspection, combustible materials, (</span><strong data-dcnode-id="3214"><em data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">e.g.</span></em></strong><span data-dcnode-id="3213" instrument_node="">, lunch bags, newspapers, coffee cups, or rags) are within 35 feet of the hot work area, the employer can do a number of things. The employer can remove the combustible materials from the area, use barriers to safely isolate the combustible materials, post a fire watch, or not perform the intended hot work.</span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Similarly, as OSHA explained in the proposal (67 FR 76224), the employer is not required to produce a written authorization. While some employers will choose to produce written authorizations, such as those required by U.S. Navy contracts, others will choose to use verbal authorizations. The Agency's intent is to enable the employer to perform the steps and to assess the hazard each time it authorizes hot work, but not to require a formal written permit. Therefore, in this paragraph OSHA does not specify what form of authorization must be used.</span></p><span data-dcnode-id="3208" instrument_node="">
