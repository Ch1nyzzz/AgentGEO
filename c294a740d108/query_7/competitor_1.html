</span><strong data-dcnode-id="1756"><em data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Regulatory Flexibility Analysis</span></em></strong></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1753" instrument_node="">The Regulatory Flexibility Act of 1980 (RFA), as amended in 1996 (5 U.S.C. 601 </span><strong data-dcnode-id="1750"><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="1749" instrument_node="">), requires regulatory agencies to determine whether regulatory actions will adversely affect small entities. SBA defines small entities in terms of number of employees or annual receipts. For employers in SIC 3731 (shipbuilding and repair), small firms are defined by SBA as those with fewer than 1,000 employees. As shown in Table IV-3, for firms with fewer than 1,000 employees, costs are 1.61 percent of profits and 0.06 percent of revenues. OSHA also examined costs as a percentage of profits and revenues for firms with fewer than 250 employees, as recommended by the Committee, and for firms with fewer than 20 employees to see whether there might be significant impacts on the very smallest firms. For firms with fewer than 250 employees, costs were 1.83 percent of profits and 0.07 percent of revenues. For firms with fewer than 20 employees, costs were 3.09 percent of profits and 0.11 percent of revenues.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">A major source of these disparate impacts is lower levels of baseline compliance by small firms. Although the economic impacts on the smallest size class of employers are low, they are somewhat higher than for larger employers.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">OSHA has set the criteria that if costs exceed one percent of revenues or five percent of profits, then the impact on small entities is considered significant for purposes of complying with the RFA. For all of the classes of affected small firms in the shipbuilding and repair and shipbreaking sectors, costs were less than one percent of revenues and five percent of profits. OSHA therefore certifies that this regulation will not have an economically significant impact on a substantial number of small entities. The Agency did not receive any substantive comments on this portion of the analysis.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Non-Regulatory Alternatives</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">OSHA concludes that economic and social alternatives to a federal workplace standard fail to adequately protect workers from the hazards associated with fires in the shipbuilding and repair and shipbreaking industries. Tort liability laws and workers' compensation provide some protection, but institutional factors limit effective means of addressing the significant costs of occupational injuries and illnesses. Therefore, OSHA finds that this final standard will provide the necessary remedy.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1732"><strong data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">V. Regulatory Flexibility Certification</span></strong></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">In accord with the Regulatory Flexibility Act, OSHA has examined the regulatory requirements of the final rule to determine if it will have a significant economic effect on a substantial number of small entities. As indicated in the previous section of this preamble, the final standard does not increase employers' compliance costs, and may even reduce the regulatory burden on all affected employers, both large and small. Accordingly, the Agency certifies that the final standard does not have a significant economic effect on a substantial number of small entities.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1725"><strong data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">VI. Environmental Impact Assessment</span></strong></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1723" instrument_node="">In accordance with the requirements of the National Environmental Policy Act (NEPA) of 1969 (42 U.S.C. 4321 </span><strong data-dcnode-id="1720"><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="1719" instrument_node="">), Council on Environmental Quality regulations (40 U.S.C. part 1500 </span><strong data-dcnode-id="1716"><em data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="1715" instrument_node="">), and the Department of Labor's NEPA regulations (29 CFR part 11), the Assistant Secretary has determined that this final rule will not have a significant impact on the external environment.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1710"><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">VII. Paperwork Reduction Act</span></strong></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1708" instrument_node="">This final rule contains several collections of information (paperwork) requirements that are subject to review by the Office of Management and Budget (OMB) under the Paperwork Reduction Act of 1995 (PRA-95), 44 U.S.C. 3501 </span><strong data-dcnode-id="1705"><em data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="1704" instrument_node="">, and its regulation at 5 CFR 1320. A collection of information is defined in PRA[n x dash]95 to mean "the obtaining, causing to be obtained, soliciting, or requiring the disclosure to third parties or the public of facts or opinions by or for an agency regardless of form or format." (44 U.S.C. 3502(3)(A).</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">In the preamble to the proposed rule, OSHA asked for comment on each of the paperwork requirements in Subpart P (67 FR 76243-76246). OSHA received no comments on the paperwork burdens or OSHA's estimation of those burdens. Therefore, the Agency has made no changes to the paperwork package. OSHA estimates the total burden hours associated with all of the collection of information requirements at 5,344 burden hours in the first year and 4,788 burden hours in the second and subsequent years.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node="">Potential respondents are not required to respond to the information collection requirements until they have been approved by OMB, and a currently valid OMB control number is displayed. OMB is currently reviewing OSHA's request for approval of the 29 CFR Part 1915 Subpart P information collections. OSHA will publish a subsequent </span><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Federal Register</span></strong><span data-dcnode-id="1695" instrument_node=""> document when OMB takes further action on the information collection requirements in the shipyard fire protection rule.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1690"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">VIII. Unfunded Mandates</span></strong></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">For the purposes of the Unfunded Mandates Reform Act of 1995, this rule does not include any Federal mandate that may result in increased expenditures by State, local, and tribal governments, or increased expenditures by the private sector of more than $100 million in any year.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1683"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">IX. Federalism</span></strong></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">OSHA has reviewed this final rule in accordance with the Executive Order on Federalism (Executive Order 13132, 64 FR 43255) which requires that agencies, to the extent possible, refrain from limiting state policy options, consult with states prior to taking any actions that would restrict state policy options, and take such actions only when there is clear constitutional authority and the presence of a problem of national scope. The Order provides for preemption of State law only if there is a clear Congressional intent for the Agency to do so. Any such preemption is to be limited to the extent possible.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1678" instrument_node="">Section 18 of the OSH Act (29 U.S.C. 651 </span><strong data-dcnode-id="1675"><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">et seq.</span></em></strong><span data-dcnode-id="1674" instrument_node="">) expresses Congress' intent to preempt state laws where OSHA has promulgated occupational safety and health standards. Under the OSH Act, a state can avoid preemption on issues covered by Federal standards only if it submits, and obtains Federal approval of, a plan for the development of such standards and their enforcement (State-Plan state). 29 U.S.C. 667. Occupational safety and health standards developed by such State-Plan states must, among other things, be at least as effective in providing safe and healthful employment and places of employment as the Federal standards. As Congress has expressed a clear intent for OSHA standards to preempt State job safety and health rules in areas addressed by OSHA standards, in States without OSHA-approved State plans, this rule limits State policy options only to the extent required by law. In States with OSHA-approved State Plans, this action does not significantly limit State policy options.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1669"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">X. State-Plan States</span></strong></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1667" instrument_node="">The 26 States or U.S. Territories with their own OSHA approved occupational safety and health plans must revise their standards to reflect this final standard or show OSHA why there is no need for action, </span><strong data-dcnode-id="1664"><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">e.g.</span></em></strong><span data-dcnode-id="1663" instrument_node="">, because an existing state standard covering this area is already "at least as effective as" the new Federal standard. The state standard must be at least as effective as this final standard, must be applicable to both the private and public (State and local government employees) sectors, and must be completed within six months of the publication date of this final Federal rule.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Currently only five States (California, Minnesota, Oregon, Vermont, and Washington) with their own State plans cover private sector onshore maritime activities in whole or in part. Federal OSHA enforces maritime standards offshore in all States and provides onshore coverage of maritime activities in Federal OSHA States, in the five States above, to the extent not covered by them, and in all the other State Plan States: Alaska, Arizona, Connecticut (plan covers only State and local government employees), Hawaii, Indiana, Iowa, Kentucky, Maryland, Michigan, Nevada, New Jersey (plan covers only State and local government employees), New Mexico, New York (plan covers only State and local government employees), North Carolina, Puerto Rico, South Carolina, Tennessee, Utah, Virginia, Virgin Islands (plan covers only territorial government employees), and Wyoming. All State Plans must also extend protection to any public sector workers engaged in maritime activities.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1655"><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">List of Subjects in 29 CFR Part 1915</span></strong></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Fire protection, Hazardous substances, Incorporation by reference, Longshore and harbor workers, Occupational safety and health, Reporting and recordkeeping requirements, Shipyards, Vessels.</span></p><span data-dcnode-id="1651" instrument_node="">

</span><p data-dcnode-id="1501"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">§ 1915.501 General provisions.</span></strong></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1499" instrument_node="">(a) </span><strong data-dcnode-id="1496"><em data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Purpose</span></em></strong><span data-dcnode-id="1495" instrument_node="">. The purpose of the standard in this subpart is to require employers to protect all employees from fire hazards in shipyard employment, including employees engaged in fire response activities.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1492" instrument_node="">(b) </span><strong data-dcnode-id="1489"><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Scope</span></em></strong><span data-dcnode-id="1488" instrument_node="">. This subpart covers employers with employees engaged in shipyard employment aboard vessels and vessel sections, and on land- side operations regardless of geographic location.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1485" instrument_node="">(c) </span><strong data-dcnode-id="1482"><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Employee participation</span></em></strong><span data-dcnode-id="1481" instrument_node="">. The employer must provide ways for employees or employee representatives, or both to participate in developing and periodically reviewing programs and policies adopted to comply with this subpart.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1478" instrument_node="">(d) </span><strong data-dcnode-id="1475"><em data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Multi-employer worksites</span></em></strong><span data-dcnode-id="1474" instrument_node="">. (1) </span><strong data-dcnode-id="1471"><em data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Host employer responsibilities</span></em></strong><span data-dcnode-id="1470" instrument_node="">. The host employer's responsibilities are to:</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">(i) Inform all employers at the worksite about the content of the fire safety plan including hazards, controls, fire safety and health rules, and emergency procedures;</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">(ii) Make sure the safety and health responsibilities for fire protection are assigned as appropriate to other employers at the worksite; and</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">(iii) If there is more than one host employer, each host employer must communicate relevant information about fire-related hazards to other host employers. When a vessel owner or operator (temporarily) becomes a host shipyard employer by directing the work of ships' crews on repair or modification of the vessel or by hiring other contractors directly, the vessel owner or operator must also comply with these provisions for host employers.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1458" instrument_node="">(2) </span><strong data-dcnode-id="1455"><em data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Contract employer responsibilities</span></em></strong><span data-dcnode-id="1454" instrument_node="">. The contract employer's responsibilities are to:</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">(i) Make sure that the host employer knows about the fire-related hazards associated with the contract employer's work and what the contract employer is doing to address them; and</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">(ii) Advise the host employer of any previously unidentified fire- related hazards that the contract employer identifies at the worksite.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">§ 1915.502 Fire safety plan</span></strong><span data-dcnode-id="1443" instrument_node="">.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1440" instrument_node="">(a) </span><strong data-dcnode-id="1437"><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Employer responsibilities</span></em></strong><span data-dcnode-id="1436" instrument_node="">. The employer must develop and implement a written fire safety plan that covers all the actions that employers and employees must take to ensure employee safety in the event of a fire. (See Appendix A to this subpart for a Model Fire Safety Plan.)</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1433" instrument_node="">(b) </span><strong data-dcnode-id="1430"><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Plan elements</span></em></strong><span data-dcnode-id="1429" instrument_node="">. The employer must include the following information in the fire safety plan:</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">(1) Identification of the significant fire hazards;</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">(2) Procedures for recognizing and reporting unsafe conditions;</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">(3) Alarm procedures;</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">(4) Procedures for notifying employees of a fire emergency;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">(5) Procedures for notifying fire response organizations of a fire emergency;</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">(6) Procedures for evacuation;</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">(7) Procedures to account for all employees after an evacuation; and</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">(8) Names, job titles, or departments for individuals who can be contacted for further information about the plan.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1402" instrument_node="">(c) </span><strong data-dcnode-id="1399"><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Reviewing the plan with employees</span></em></strong><span data-dcnode-id="1398" instrument_node="">. The employer must review the plan with each employee at the following times:</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">(1) Within 90 days of December 14, 2004, for employees who are currently working;</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">(2) Upon initial assignment for new employees; and</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">(3) When the actions the employee must take under the plan change because of a change in duties or a change in the plan.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1386" instrument_node="">(d) </span><strong data-dcnode-id="1383"><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Additional employer requirements</span></em></strong><span data-dcnode-id="1382" instrument_node="">. The employer also must:</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">(1) Keep the plan accessible to employees, employee representatives, and OSHA;</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">(2) Review and update the plan whenever necessary, but at least annually;</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">(3) Document that affected employees have been informed about the plan as required by paragraph (c) of this section; and</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">(4) Ensure any outside fire response organization that the employer expects to respond to fires at the employer's worksite has been given a copy of the current plan.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1367" instrument_node="">(e) </span><strong data-dcnode-id="1364"><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Contract employers</span></em></strong><span data-dcnode-id="1363" instrument_node="">. Contract employers in shipyard employment must have a fire safety plan for their employees, and this plan must comply with the host employer's fire safety plan.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1358"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">§ 1915.503 Precautions for hot work.</span></strong></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1356" instrument_node="">(a) </span><strong data-dcnode-id="1353"><em data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">General requirements</span></em></strong><span data-dcnode-id="1352" instrument_node="">. (1) Designated Areas. The employer may designate areas for hot work in sites such as vessels, vessel sections, fabricating shops, and subassembly areas that are free of fire hazards.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1349" instrument_node="">(2) </span><strong data-dcnode-id="1346"><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Non-designated Areas</span></em></strong><span data-dcnode-id="1345" instrument_node="">. (i) Before authorizing hot work in a non- designated area, the employer must visually inspect the area where hot work is to be performed, including adjacent spaces, to ensure the area is free of fire hazards, unless a Marine Chemist's certificate or Shipyard Competent Person's log is used for authorization.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">(ii) The employer shall authorize employees to perform hot work only in areas that are free of fire hazards, or that have been controlled by physical isolation, fire watches, or other positive means.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Note to paragraph (a)(2):</span></strong><span data-dcnode-id="1337" instrument_node=""> The requirements of paragraph (a)(2) apply to all hot work operations in shipyard employment except those covered by § 1915.14.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1334" instrument_node="">(b) </span><strong data-dcnode-id="1331"><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Specific requirements.</span></em></strong><span data-dcnode-id="1330" instrument_node=""> (1) </span><strong data-dcnode-id="1327"><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Maintaining fire hazard-free conditions</span></em></strong><span data-dcnode-id="1326" instrument_node="">. The employer must keep all hot work areas free of new hazards that may cause or contribute to the spread of fire. Unexpected energizing and energy release are covered by 29 CFR 1915.181, Subpart L. Exposure to toxic and hazardous substances is covered in 29 CFR 1915.1000 through 1915.1450, subpart Z.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1323" instrument_node="">(2) </span><strong data-dcnode-id="1320"><em data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Fuel gas and oxygen supply lines and torches.</span></em></strong><span data-dcnode-id="1319" instrument_node=""> The employer must make sure that:</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">(i) No unattended fuel gas and oxygen hose lines or torches are in confined spaces;</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">(ii) No unattended charged fuel gas and oxygen hose lines or torches are in enclosed spaces for more than 15 minutes; and</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">(iii) All fuel gas and oxygen hose lines are disconnected at the supply manifold at the end of each shift;</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">(iv) All disconnected fuel gas and oxygen hose lines are rolled back to the supply manifold or to open air to disconnect the torch; or extended fuel gas and oxygen hose lines are not reconnected at the supply manifold unless the lines are given a positive means of identification when they were first connected and the lines are tested using a drop test or other positive means to ensure the integrity of fuel gas and oxygen burning system.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1302"><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">§ 1915.504 Fire watches.</span></strong></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1300" instrument_node="">(a) </span><strong data-dcnode-id="1297"><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Written fire watch policy.</span></em></strong><span data-dcnode-id="1296" instrument_node=""> The employer must create and keep current a written policy that specifies the following requirements for employees performing fire watch in the workplace:</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">(1) The training employees must be given (§ 1915.508(c) contains detailed fire watch training requirements);</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">(2) The duties employees are to perform;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">(3) The equipment employees must be given; and</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">(4) The personal protective equipment (PPE) that must be made available and worn as required by 29 CFR Part 1915, Subpart I.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1281" instrument_node="">(b) </span><strong data-dcnode-id="1278"><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Posting fire watches.</span></em></strong><span data-dcnode-id="1277" instrument_node=""> The employer must post a fire watch if during hot work any of the following conditions are present:</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">(1) Slag, weld splatter, or sparks might pass through an opening and cause a fire;</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">(2) Fire-resistant guards or curtains are not used to prevent ignition of combustible materials on or near decks, bulkheads, partitions, or overheads;</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">(3) Combustible material closer than 35 ft. (10.7m) to the hot work in either the horizontal or vertical direction cannot be removed, protected with flame-proof covers, or otherwise shielded with metal or fire-resistant guards or curtains;</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">(4) The hot work is carried out on or near insulation, combustible coatings, or sandwich-type construction that cannot be shielded, cut back, or removed, or in a space within a sandwich type construction that cannot be inerted;</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">(5) Combustible materials adjacent to the opposite sides of bulkheads, decks, overheads, metal partitions, or sandwich-type construction may be ignited by conduction or radiation;</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">(6) The hot work is close enough to cause ignition through heat radiation or conduction on the following:</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">(i) Insulated pipes, bulkheads, decks, partitions, or overheads; or</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">(ii) Combustible materials and/or coatings;</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">(7) The work is close enough to unprotected combustible pipe or cable runs to cause ignition; or</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">(8) A Marine Chemist, a Coast Guard-authorized person, or a shipyard Competent Person, as defined in 29 CFR Part 1915, Subpart B, requires that a fire watch be posted.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1244" instrument_node="">(c) </span><strong data-dcnode-id="1241"><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Assigning employees to fire watch duty.</span></em></strong><span data-dcnode-id="1240" instrument_node=""> (1) The employer must not assign other duties to a fire watch while the hot work is in progress.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">(2) Employers must ensure that employees assigned to fire watch duty:</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">(i) Have a clear view of and immediate access to all areas included in the fire watch;</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">(ii) Are able to communicate with workers exposed to hot work;</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">(iii) Are authorized to stop work if necessary and restore safe conditions within the hot work area;</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">(iv) Remain in the hot work area for at least 30 minutes after completion of the hot work, unless the employer or its representative surveys the exposed area and makes a determination that there is no further fire hazard;</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">(v) Are trained to detect fires that occur in areas exposed to the hot work;</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">(vi) Attempt to extinguish any incipient stage fires in the hot work area that are within the capability of available equipment and within the fire watch's training qualifications, as defined in § 1915.508;</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">(vii) Alert employees of any fire beyond the incipient stage; and</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">(viii) If unable to extinguish fire in the areas exposed to the hot work, activate the alarm.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">(3) The employer must ensure that employees assigned to fire watch are physically capable of performing these duties.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1205"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">§ 1915.505 Fire response.</span></strong></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1203" instrument_node="">(a) </span><strong data-dcnode-id="1200"><em data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Employer responsibilities.</span></em></strong><span data-dcnode-id="1199" instrument_node=""> The employer must:</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">(1) Decide what type of response will be provided and who will provide it; and</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">(2) Create, maintain, and update a written policy that:</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">(i) Describes the internal and outside fire response organizations that the employer will use; and</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">(ii) Defines what evacuation procedures employees must follow, if the employer chooses to require a total or partial evacuation of the worksite at the time of a fire.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1184" instrument_node="">(b) </span><strong data-dcnode-id="1181"><em data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Required written policy information.</span></em></strong><span data-dcnode-id="1180" instrument_node=""> (1) Internal fire response. If an internal fire response is to be used, the employer must include the following information in the employer's written policy:</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">(i) The basic structure of the fire response organization;</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">(ii) The number of trained fire response employees;</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">(iii) The fire response functions that may need to be carried out; (iv) The minimum number of fire response employees necessary, the number and types of apparatuses, and a description of the fire suppression operations established by written standard operating procedures for each type of fire response at the employer's facility;</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">(v) The type, amount, and frequency of training that must be given to fire response employees; and</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">(vi) The procedures for using protective clothing and equipment.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1162" instrument_node="">(2) </span><strong data-dcnode-id="1159"><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Outside fire response.</span></em></strong><span data-dcnode-id="1158" instrument_node=""> If an outside fire response organization is used, the employer must include the following information in the written policy:</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">(i) The types of fire suppression incidents to which the fire response organization is expected to respond at the employer's facility or worksite;</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">(ii) The liaisons between the employer and the outside fire response organizations; and</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">(iii) A plan for fire response functions that:</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">(A) Addresses procedures for obtaining assistance from the outside fire response organization;</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">(B) Familiarizes the outside fire response organization with the layout of the employer's facility or worksite, including access routes to controlled areas, and site-specific operations, occupancies, vessels or vessel sections, and hazards; and,</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">(C) Sets forth how hose and coupling connection threads are to be made compatible and includes where the adapter couplings are kept; or</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">(D) States that the employer will not allow the use of incompatible hose connections.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1134" instrument_node="">(3) </span><strong data-dcnode-id="1131"><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">A combination of internal and outside fire response.</span></em></strong><span data-dcnode-id="1130" instrument_node=""> If a combination of internal and outside fire response is to be used, the employer must include the following information, in addition to the requirements in paragraphs (b)(1) and (2) of this section, in the written policy:</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">(i) The basic organizational structure of the combined fire response;</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">(ii) The number of combined trained fire responders;</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">(iii) The fire response functions that may need to be carried out;</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">(iv) The minimum number of fire response employees necessary, the number and types of apparatuses, and a description of the fire suppression operations established by written standard operating procedures for each particular type of fire response at the worksite; and</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">(v) The type, amount, and frequency of joint training with outside fire response organizations if given to fire response employees.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1112" instrument_node="">(4) </span><strong data-dcnode-id="1109"><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Employee evacuation.</span></em></strong><span data-dcnode-id="1108" instrument_node=""> The employer must include the following information in the employer's written policy:</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">(i) Emergency escape procedures;</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">(ii) Procedures to be followed by employees who may remain longer at the worksite to perform critical shipyard employment operations during the evacuation;</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">(iii) Procedures to account for all employees after emergency evacuation is completed;</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">(iv) The preferred means of reporting fires and other emergencies; and</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">(v) Names or job titles of the employees or departments to be contacted for further information or explanation of duties.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1090" instrument_node="">(5) </span><strong data-dcnode-id="1087"><em data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Rescue and emergency response.</span></em></strong><span data-dcnode-id="1086" instrument_node=""> The employer must include the following information in the employer's written policy:</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">(i) A description of the emergency rescue procedures; and</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">(ii) Names or job titles of the employees who are assigned to perform them.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1077" instrument_node="">(c) </span><strong data-dcnode-id="1074"><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Medical requirements for shipyard fire response employees</span></em></strong><span data-dcnode-id="1073" instrument_node="">. The employer must ensure that:</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">(1) All fire response employees receive medical examinations to assure that they are physically and medically fit for the duties they are expected to perform;</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">(2) Fire response employees, who are required to wear respirators in performing their duties, meet the medical requirements of § 1915.154;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">(3) Each fire response employee has an annual medical examination; and</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">(4) The medical records of fire response employees are kept in accordance with § 1915.1020.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1058" instrument_node="">(d) </span><strong data-dcnode-id="1055"><em data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Organization of internal fire response functions.</span></em></strong><span data-dcnode-id="1054" instrument_node=""> The employer must:</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">(1) Organize fire response functions to ensure enough resources to conduct emergency operations safely;</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">(2) Establish lines of authority and assign responsibilities to ensure that the components of the internal fire response are accomplished;</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">(3) Set up an incident management system to coordinate and direct fire response functions, including:</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">(i) Specific fire emergency responsibilities;</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">(ii) Accountability for all fire response employees participating in an emergency operation; and</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">(iii) Resources offered by outside organizations; and</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">(4) Provide the information required in this paragraph (d) to the outside fire response organization to be used.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1030" instrument_node="">(e) </span><strong data-dcnode-id="1027"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Personal protective clothing and equipment for fire response employees.</span></em></strong><span data-dcnode-id="1026" instrument_node=""> (1) </span><strong data-dcnode-id="1023"><em data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">General requirements</span></em></strong><span data-dcnode-id="1022" instrument_node="">. The employer must:</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">(i) Supply to all fire response employees, at no cost, the appropriate personal protective clothing and equipment they may need to perform expected duties; and</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">(ii) Ensure that fire response employees wear the appropriate personal protective clothing and use the equipment, when necessary, to protect them from hazardous exposures.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1013" instrument_node="">(2) </span><strong data-dcnode-id="1010"><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Thermal stability and flame resistance.</span></em></strong><span data-dcnode-id="1009" instrument_node=""> The employer must:</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">(i) Ensure that each fire response employee exposed to the hazards of flame does not wear clothing that could increase the extent of injury that could be sustained; and</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">(ii) Prohibit wearing clothing made from acetate, nylon, or polyester, either alone or in blends, unless it can be shown that:</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">(A) The fabric will withstand the flammability hazard that may be encountered; or</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">(B) The clothing will be worn in such a way to eliminate the flammability hazard that may be encountered.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="994" instrument_node="">(3) </span><strong data-dcnode-id="991"><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Respiratory protection.</span></em></strong><span data-dcnode-id="990" instrument_node=""> The employer must:</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">(i) Provide self-contained breathing apparatus (SCBA) to all fire response employees involved in an emergency operation in an atmosphere that is immediately dangerous to life or health (IDLH), potentially IDLH, or unknown;</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">(ii) Provide SCBA to fire response employees performing emergency operations during hazardous chemical emergencies that will expose them to known hazardous chemicals in vapor form or to unknown chemicals;</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">(iii) Provide fire response employees who perform or support emergency operations that will expose them to hazardous chemicals in liquid form either:</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">(A) SCBA, or</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">(B) Respiratory protective devices certified by the National Institute for Occupational Safety and Health (NIOSH) under 42 CFR Part 84 as suitable for the specific chemical environment;</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">(iv) Ensure that additional outside air supplies used in conjunction with SCBA result in positive pressure systems that are certified by NIOSH under 42 CFR Part 84;</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">(v) Provide only SCBA that meet the requirements of NFPA 1981-1997 Standard on Open-Circuit Self-Contained Breathing Apparatus for the Fire Service (incorporated by reference, see § 1915.5); and</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">(vi) Ensure that the respiratory protection program and all respiratory protection equipment comply with § 1915.154.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="963" instrument_node="">(4) </span><strong data-dcnode-id="960"><em data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Interior structural firefighting operations.</span></em></strong><span data-dcnode-id="959" instrument_node=""> The employer must:</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">(i) Supply at no cost to all fire response employees exposed to the hazards of shipyard fire response, a helmet, gloves, footwear, and protective hoods, and either a protective coat and trousers or a protective coverall; and</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">(ii) Ensure that this equipment meets the applicable recommendations in NFPA 1971-2000 Standard on Protective Ensemble for Structural Fire Fighting (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="950" instrument_node="">(5) </span><strong data-dcnode-id="947"><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Proximity firefighting operations.</span></em></strong><span data-dcnode-id="946" instrument_node=""> The employer must provide, at no cost, to all fire response employees who are exposed to the hazards of proximity firefighting, appropriate protective proximity clothing meets the applicable recommendations in NFPA 1976-2000 Standard on Protective Ensemble for Proximity Fire Fighting (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="943" instrument_node="">(6) </span><strong data-dcnode-id="940"><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Personal Alert Safety System (PASS) devices.</span></em></strong><span data-dcnode-id="939" instrument_node=""> The employer must:</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">(i) Provide each fire response employee involved in firefighting operations with a PASS device; and</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">(ii) Ensure that each PASS device meets the recommendations in NFPA 1982-1998 Standard on Personal Alert Safety Systems (PASS), (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="930" instrument_node="">(7) </span><strong data-dcnode-id="927"><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Life safety ropes, body harnesses, and hardware.</span></em></strong><span data-dcnode-id="926" instrument_node=""> The employer must ensure that:</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">(i) All life safety ropes, body harnesses, and hardware used by fire response employees for emergency operations meet the applicable recommendations in NFPA 1983-2001, Standard on Fire Service Life Safety Rope and System Components (incorporated by reference, see § 1915.5);</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">(ii) Fire response employees use only Class I body harnesses to attach to ladders and aerial devices; and</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">(iii) Fire response employees use only Class II and Class III body harnesses for fall arrest and rappelling operations.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="914" instrument_node="">(f) </span><strong data-dcnode-id="911"><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Equipment maintenance.</span></em></strong><span data-dcnode-id="910" instrument_node=""> (1) </span><strong data-dcnode-id="907"><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Personal protective equipment.</span></em></strong><span data-dcnode-id="906" instrument_node=""> The employer must inspect and maintain personal protective equipment used to protect fire response employees to ensure that it provides the intended protection.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="903" instrument_node="">(2) </span><strong data-dcnode-id="900"><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Fire response equipment.</span></em></strong><span data-dcnode-id="899" instrument_node=""> The employer must:</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">(i) Keep fire response equipment in a state of readiness;</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">(ii) Standardize all fire hose coupling and connection threads throughout the facility and on vessels and vessel sections by providing the same type of hose coupling and connection threads for hoses of the same or similar diameter; and</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">(iii) Ensure that either all fire hoses and coupling connection threads are the same within a facility or vessel or vessel section as those used by the outside fire response organization, or supply suitable adapter couplings if such an organization is expected to use the fire response equipment within a facility or vessel or vessel section.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="885"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">§ 1915.506 Hazards of fixed extinguishing systems on board vessels and vessel sections.</span></strong></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="883" instrument_node="">(a) </span><strong data-dcnode-id="880"><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Employer responsibilities.</span></em></strong><span data-dcnode-id="879" instrument_node=""> The employer must comply with the provisions of this section whenever employees are exposed to fixed extinguishing systems that could create a dangerous atmosphere when activated in vessels and vessel sections, regardless of geographic location.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="876" instrument_node="">(b) </span><strong data-dcnode-id="873"><em data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Requirements for automatic and manual systems.</span></em></strong><span data-dcnode-id="872" instrument_node=""> Before any work is done in a space equipped with fixed extinguishing systems, the employer must either:</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">(1) Physically isolate the systems or use other positive means to prevent the systems' discharge; or</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">(2) Ensure employees are trained to recognize:</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">(i) Systems' discharge and evacuation alarms and the appropriate escape routes; and</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">(ii) Hazards associated with the extinguishing systems and agents including the dangers of disturbing system components and equipment such as piping, cables, linkages, detection devices, activation devices, and alarm devices.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="857" instrument_node="">(c) </span><strong data-dcnode-id="854"><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Sea and dock trials.</span></em></strong><span data-dcnode-id="853" instrument_node=""> During trials, the employer must ensure that all systems shall remain operational.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="850" instrument_node="">(d) </span><strong data-dcnode-id="847"><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Doors and hatches.</span></em></strong><span data-dcnode-id="846" instrument_node=""> The employer must:</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">(1) Take protective measures to ensure that all doors, hatches, scuttles, and other exit openings remain working and accessible for escape in the event the systems are activated; and</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">(2) Ensure that all inward opening doors, hatches, scuttles, and other potential barriers to safe exit are removed, locked open, braced, or otherwise secured so that they remain open and accessible for escape if systems' activation could result in a positive pressure in the protected spaces sufficient to impede escape.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="837" instrument_node="">(e) </span><strong data-dcnode-id="834"><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Testing the system.</span></em></strong><span data-dcnode-id="833" instrument_node=""> (1) When testing a fixed extinguishing system involves a total discharge of extinguishing medium into a space, the employer must evacuate all employees from the space and assure that no employees remain in the space during the discharge. The employer must retest the atmosphere in accordance with § 1915.12 to ensure that the oxygen levels are safe for employees to enter.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">(2) When testing a fixed extinguishing system does not involve a total discharge of the systems extinguishing medium, the employer must make sure that the system's extinguishing medium is physically isolated and that all employees not directly involved in the testing are evacuated from the protected space.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="827" instrument_node="">(f) </span><strong data-dcnode-id="824"><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Conducting system maintenance.</span></em></strong><span data-dcnode-id="823" instrument_node=""> Before conducting maintenance on a fixed extinguishing system, the employer must ensure that the system is physically isolated.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="820" instrument_node="">(g) </span><strong data-dcnode-id="817"><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Using fixed manual extinguishing systems for fire protection.</span></em></strong><span data-dcnode-id="816" instrument_node=""> If fixed manual extinguishing systems are used to provide fire protection for spaces in which the employees are working, the employer must ensure that:</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">(1) Only authorized employees are allowed to activate the system;</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">(2) Authorized employees are trained to operate and activate the systems; and</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">(3) All employees are evacuated from the protected spaces, and accounted for, before the fixed manual extinguishing system is activated.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">§ 1915.507 Land-side fire protection systems.</span></strong></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="800" instrument_node="">(a) </span><strong data-dcnode-id="797"><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Employer responsibilities.</span></em></strong><span data-dcnode-id="796" instrument_node=""> The employer must ensure all fixed and portable fire protection systems needed to meet an OSHA standard for employee safety or employee protection from fire hazards in land- side facilities, including, but not limited to, buildings, structures, and equipment, meet the requirements of this section.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="793" instrument_node="">(b) </span><strong data-dcnode-id="790"><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Portable fire extinguishers and hose systems.</span></em></strong><span data-dcnode-id="789" instrument_node=""> (1) The employer must select, install, inspect, maintain, and test all portable fire extinguishers according to NFPA 10-1998 Standard for Portable Fire Extinguishers (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">(2) The employer is permitted to use Class II or Class III hose systems, in accordance with NFPA 10-1998, as portable fire extinguishers if the employer selects, installs, inspects, maintains, and tests those systems according to the specific recommendations in NFPA 14-2000 Standard for the Installation of Standpipe, Private Hydrant, and Hose Systems (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="783" instrument_node="">(c) </span><strong data-dcnode-id="780"><em data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">General requirements for fixed extinguishing systems.</span></em></strong><span data-dcnode-id="779" instrument_node=""> The employer must:</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">(1) Ensure that any fixed extinguishing system component or extinguishing agent is approved by an OSHA Nationally Recognized Testing Laboratory, meeting the requirements of 29 CFR 1910.7, for use on the specific hazards the employer expects it to control or extinguish;</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">(2) Notify employees and take the necessary precautions to ensure employees are safe from fire if for any reason a fire extinguishing system stops working, until the system is working again;</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">(3) Ensure all repairs to fire extinguishing systems and equipment are done by a qualified technician or mechanic;</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">(4) Provide and ensure employees use proper personal protective equipment when entering discharge areas in which the atmosphere remains hazardous to employee safety or health, or provide safeguards to prevent employees from entering those areas. See § 1915.12 for additional requirements applicable to safe entry into spaces containing dangerous atmospheres;</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">(5) Post hazard warning or caution signs at both the entrance to and inside of areas protected by fixed extinguishing systems that use extinguishing agents in concentrations known to be hazardous to employee safety or health; and</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">(6) Select, install, inspect, maintain, and test all automatic fire detection systems and emergency alarms according to NFPA 72-1999 National Fire Alarm Code (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="758" instrument_node="">(d) </span><strong data-dcnode-id="755"><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Fixed extinguishing systems.</span></em></strong><span data-dcnode-id="754" instrument_node=""> The employer must select, install, maintain, inspect, and test all fixed systems required by OSHA as follows:</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">(1) Standpipe and hose systems according to NFPA 14-2000 Standard for the Installation of Standpipe, Private Hydrant, and Hose Systems (incorporated by reference, see § 1915.5);</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">(2) Automatic sprinkler systems according to NFPA 25-2002 Standard for the Inspection, Testing, and Maintenance of Water-based Fire Protection Systems, (incorporated by reference, see § 1915.5), and either NFPA 13-1999 Standard for the Installation of Sprinkler Systems (incorporated by reference, see § 1915.5) or NFPA 750-2000 Standard on Water Mist Fire Protection Systems (incorporated by reference, see § 1915.5);</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">(3) Fixed extinguishing systems that use water or foam as the extinguishing agent according to NFPA 15-2001 Standard for Water Spray Fixed Systems for Fire Protection (incorporated by reference, see § 1915.5); NFPA 11-1998 Standard for Low-Expansion Foam (incorporated by reference, see § 1915.5); and NFPA 11A-1999 Standard for Medium- and High-Expansion Foam Systems (incorporated by reference, see 1915.5);</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">(4) Fixed extinguishing systems using dry chemical as the extinguishing agent according to NFPA 17-2002 Standard for Dry Chemical Extinguishing Systems (incorporated by reference, see § 1915.5); and</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">(5) Fixed extinguishing systems using gas as the extinguishing agent according to NFPA 12-2000 Standard on Carbon Dioxide Extinguishing Systems (incorporated by reference, see § 1915.5); NFPA 12A-1997 Standard on Halon 1301 Fire Extinguishing Systems (incorporated by reference, see § 1915.5); and NFPA 2001-2000 Standard on Clean Agent Fire Extinguishing Systems (incorporated by reference, see § 1915.5).</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">§ 1915.508 Training.</span></strong></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">(a) The employer must train employees in the applicable requirements of this section:</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">(1) Within 90 days of December 14, 2004, for employees currently working;</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">(2) Upon initial assignment for new employees; and</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">(3) When necessary to maintain proficiency for employees previously trained.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="720" instrument_node="">(b) </span><strong data-dcnode-id="717"><em data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Employee training.</span></em></strong><span data-dcnode-id="716" instrument_node=""> The employer must ensure that all employees are trained on:</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">(1) The emergency alarm signals, including system discharge alarms and employee evacuation alarms; and</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">(2) The primary and secondary evacuation routes that employees must use in the event of a fire in the workplace. While all vessels and vessel sections must have a primary evacuation route, a secondary evacuation route is not required when impracticable.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="707" instrument_node="">(c) </span><strong data-dcnode-id="704"><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Additional training requirements for employees expected to fight incipient stage fires.</span></em></strong><span data-dcnode-id="703" instrument_node=""> The employer must ensure that employees expected to fight incipient stage fires are trained on the following:</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">(1) The general principles of using fire extinguishers or hose lines, the hazards involved with incipient firefighting, and the procedures used to reduce these hazards;</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">(2) The hazards associated with fixed and portable fire protection systems that employees may use or to which they may be exposed during discharge of those systems; and</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">(3) The activation and operation of fixed and portable fire protection systems that the employer expects employees to use in the workplace.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="691" instrument_node="">(d) </span><strong data-dcnode-id="688"><em data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Additional training requirements for shipyard employees designated for fire response.</span></em></strong><span data-dcnode-id="687" instrument_node=""> The employer must:</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">(1) Have a written training policy stating that fire response employees must be trained and capable of carrying out their duties and responsibilities at all times;</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">(2) Keep written standard operating procedures that address anticipated emergency operations and update these procedures as necessary;</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">(3) Review fire response employee training programs and hands-on sessions before they are used in fire response training to make sure that fire response employees are protected from hazards associated with fire response training;</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">(4) Provide training for fire response employees that ensures they are capable of carrying out their duties and responsibilities under the employer's standard operating procedures;</span></p><span data-dcnode-id="673" instrument_node="">
