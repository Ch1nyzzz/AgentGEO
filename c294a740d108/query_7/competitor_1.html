</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">In paragraph (d)(5) of § 1915.507, OSHA is incorporating by reference the current edition of NFPA standards that address fixed extinguishing systems using gas as the extinguishing agent. Specifically, OSHA is referencing NFPA 12-2000 Standard on Carbon Dioxide Extinguishing Systems (Ex. 19-21); NFPA 12A-1997 Standard on Halon 1301 Extinguishing Systems (Ex. 19-22); and NFPA 2001-2000 Standard on Clean Agent Fire Extinguishing Systems (Ex. 19-23).</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">OSHA recognizes that the fire-extinguishing agent Halon 1301 is being phased out because of environmental concerns. However, for economic reasons, existing Halon 1301 systems may remain in service until such time as an alternative agent replaces them. Therefore, OSHA is promulgating the requirements in § 1915.507(d)(5) for the design and installation of Halon 1301 systems to ensure employee safety. For the systems that will replace Halon, OSHA is requiring that the employer meet NFPA 12-2000 Standard on Carbon Dioxide Extinguishing Systems (Ex. 19-21) or NFPA 2001-2000 Standard on Clean Agent Fire Extinguishing Systems (Ex. 19-23) for their design and installation. No comments were received on paragraph (d), and OSHA is carrying it forward in the final standard.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2421"><strong data-dcnode-id="2422"><em data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Section 1915.508 Training</span></em></strong></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Employee training is a critical element of an employer's program in combating the hazards of fire in shipyard employment. The proposed standard placed a specific emphasis on hazard recognition, fire watch, and fire response. This final standard has been reformatted and edited to provide clearer guidance for training employees who are required to evacuate during an emergency, expected to fight an incipient stage fire, designated as fire watch workers, or designated as fire response employees.</span></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">First, all employees need training on alarms and proper evacuation procedures. In some cases, employers may want some or all employees to evacuate the work area during a fire emergency and not respond to the fire, so limited training is needed. Second, the employer may decide to designate certain employees to fight incipient stage fires. For example, an employer may designate and train all shift supervisors, or security personnel, on fighting incipient stage fires, while the remaining employees evacuate the work area. These employees need basic knowledge of fire extinguishing equipment and the hazards they may face. Third, fire watch workers who are more likely to actually fight an incipient stage fire require additional training to allow them to perform this duty safely. Finally, fire response employees may be called upon to fight fires that have advanced beyond the incipient stage, and need advanced firefighting knowledge to perform this inherently dangerous work. This section has been reformatted and renumbered from the proposed standard to reflect the additional training requirements required for each type of employee.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Regardless of the amount of training that employees will receive, they must be trained within the time restrictions that are required in paragraph (a). Proposed paragraph (a) required that affected employees be trained when they first start working, or as necessary to maintain proficiency on the following: (1) The general principles of using fire extinguishers or hose lines, the hazards involved with incipient firefighting, and the procedures used to reduce these hazards; (2) the hazards associated with fixed and portable fire protection systems that they may use or to which they may be exposed during discharge of those systems; (3) the activation and operations of fixed and portable fire protection systems provided for their use in the workplace; (4) the emergency alarm signals, including system discharge and employee evacuation alarms; and (5) the primary and secondary evacuation routes they must use in the event of a fire in the workplace.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">In the final standard, this paragraph has been divided into three new paragraphs. The final requirement in paragraph (a) requires that all employees be trained within 90 days from the effective date of this standard for employees currently working, upon initial assignment for new employees, and when necessary to maintain proficiency for employees previously trained. Under the proposed language, it was not sufficiently clear that the training requirements apply to both current and new employees. This final language is consistent with § 1915.502(c) to provide training for current and new employees. The requirement to train and retrain selected employees is based upon the requirements of 29 CFR 1910.157.</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Employee Training</span></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Proposed paragraphs (a)(1) through (a)(5) have been divided into two new paragraphs and renumbered. Proposed paragraphs (a)(4) and (a)(5) are now required for all employees in paragraph (b), regardless of their level of participation in fire response. Paragraph (b) requires that all employees be trained on the emergency alarm signals, including system discharge alarms and employee evacuation alarms, and the primary and secondary evacuation routes. OSHA has determined that all employees must be trained on these two basic fire safety issues to protect lives.</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">In proposed paragraph § 1915.508(a)(5), now paragraph (b)(2), regarding training on the primary and secondary evacuation routes a fire watch employee must use in the event of a fire in the workplace, OSHA proposed a note stating that vessels and vessel sections may not always have a secondary evacuation route (67 FR 76237). In the final rule, in paragraph (b)(2), OSHA has incorporated this note into the regulatory text and modified it to read: "While all vessels and vessel sections must have a primary evacuation route, a secondary evacuation route is not required when impracticable." This change reflects OSHA's view that multiple evacuation routes provide a greater degree of safety for employees, and that the employer must provide a secondary route unless it is impracticable. The change is also compatible with the requirements of 29 CFR 1910.36, which requires two or more exit routes for buildings and other structures at the shipyard, with certain exceptions. Similar to the § 1910.36 standard, OSHA recognizes that there are circumstances where a second evacuation route is not practicable. In those situations, the employer must train employees only on the primary evacuation route. This change remains consistent with the recommendations of the Committee to recognize the uniqueness of vessels and vessel sections in comparison to buildings and other land-side structures, while providing greater clarity on the need for safe evacuation procedures.</span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Additionally, comments received on paragraph (a) stated: "This section should include an additional paragraph, which allows for a combined training session that incorporates all emergency training into one session" (Exs. 21-4; 21-5; 21-6; 21-7; 21-13; 22-2). The employer is already free to incorporate all training into one session, or to train all employees at the same time as long as all requirements are met. This requirement is performance-oriented. OSHA indicates what training is required and allows the employer to decide the best way to comply with all of the requirements,</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Additional Training Requirements for Employees Expected To Fight Incipient Stage Fires</span></p><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Proposed paragraphs (a)(1) through (a)(3) have been moved and are now included in the training requirements for those employees designated to fight fires in paragraph (c). These employees will be designated by the employer as employees who attempt to extinguish an incipient stage fire. Paragraph (c)(1) requires that these employees be trained on the hazards involved with incipient stage firefighting, and the procedures used to reduce these hazards, as well as the principles of using fire extinguishers or hose lines. In addition, paragraphs (c)(2) and (c)(3) require these employees to be trained on the hazards associated with fixed and portable fire protection systems that they may use or to which they may be exposed during discharge of those systems, as well as the activation and operation of fixed and portable fire protection systems that the employer expects them to use. Proposed paragraphs (a)(1) through (a)(3) have been carried forward in the final rule.</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Additional Training Requirements for Shipyard Employees Designated for Fire Response</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">These requirements were proposed as paragraphs (b)(1) through (b)(10), and have been renumbered as (d)(1) through (d)(10). In § 1915.508(d), OSHA addresses the additional training requirements for fire response employees and the training requirement that will replace paragraph (c) of § 1915.52. Fire response employees may be exposed to many hazards associated with fire suppression, including heat, flame, smoke, explosion, structural collapse, or hazardous materials. It is important that these employees are provided with training specific to what they might encounter. No comments were received on proposed paragraphs (b)(1) through (b)(8), and they are carried forward renumbered as (d)(1) through (d)(8).</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">In paragraph (d)(1) of § 1915.508, OSHA requires that the employer have a written training policy stating that fire response employees must be trained and capable of carrying out their duties and responsibilities at all times. This is consistent with the requirements found in 29 CFR 1910.156 and NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">In paragraph (d)(2), OSHA requires the employer to keep written standard operating procedures that address anticipated emergency operations and to update these procedures as necessary. Emergency operations are activities, such as rescue, fire suppression, and emergency medical care that are performed by a fire response organization. In some incidents, these emergency operations may include special operations, such as hazardous materials response (HAZMAT), HAZMAT release mitigation, standby for flight operations, protection of structures exposed to nearby off-site fires, or mutual-aid at other workplaces. Written standard operating procedures are training tools and represent the best practice in the industry. This is consistent with the language in paragraphs 3-1.5 and 3-1.8 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">In § 1915.508(d)(3), OSHA requires the employer to review fire response employee training programs and hands-on sessions before they are used to make sure that fire response employees are protected from hazardous training conditions. This should help to prevent the occurrence of training accidents resulting from unexpected events such as flare-ups, collapses, entrapments, and stress-induced injuries.</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">In paragraph (d)(4) of § 1915.508, OSHA requires all fire response employees to be adequately trained to carry out their duties and responsibilities under the employer's standard operating procedures. This training program must provide the information necessary to ensure that these employees are competent to respond appropriately to a fire. For example, the fire response employee must know how to respond to a fire on board a vessel, where the pier hook- ups are located, how to gain access to the vessel, and how to determine the location and type of fire within the vessel.</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">In § 1915.508(d)(5), OSHA requires the employer to train new fire response employees before they engage in emergency duties so that they can work safely and effectively at a fire scene. This language is consistent with paragraph 3-1.3 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">In paragraph (d)(6) of § 1915.508, the employer must provide training for firefighters at least quarterly on the employer's written operational procedures. Because of the complexity of hazards involved in shipyard firefighting, the quarterly training requirement is appropriate. In addition, most fire response operations in shipyard employment, whether on a vessel or in land-side facilities, go beyond the incipient stage and most likely involve an interior attack.</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">In paragraph (d)(7) of § 1915.508, OSHA requires that all fire response operations training be conducted by qualified instructors. This language is consistent with paragraph 5.2.11 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">In § 1915.508(d)(8), OSHA requires any live firefighting training exercises to follow NFPA 1403-2002 Standard on Live Fire Training Evolutions (Ex. 19-24). This is consistent with paragraphs 4.9.4 and 5.2.10 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">In paragraph (d)(9) of § 1915.508, the employer must provide semiannual drills that cover site-specific operations, occupancies, buildings, vessels and vessel sections, and fire-related hazards, according to the employer's written operational procedures. The semiannual requirement for drills is consistent with the recommended frequency found in paragraph 5.3 of NFPA 1500-2002 (Ex. 19-5).</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Bath Iron Works stated:</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">OSHA does not state that an actual fire response qualifies as meeting the requirement of a drill. To maintain consistency with 29 CFR 1915.12(e) which allows an actual confined space rescue to qualify as meeting the training requirements the paragraph should be revised. Recommendation: Add the following text: "Conduct semi annual drills unless the team performs an actual fire response during the 6 month period." (Ex. 21-3).</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">OSHA disagrees with Bath Iron works and is convinced that fire responses are not adequate substitutes for training drills. A training drill is intended to be used for assessing and improving operational or deployment procedures. Actual fires provide useful learning experiences, and it is usual and customary to evaluate fires for this purpose, but they do not provide the same training opportunity as drills. When an actual alarm is sounded and the shipyard fire department responds, the on-scene command is coordinating the scene and ensuring that firefighters respond safety and effectively. They cannot effectively observe, document, and evaluate the response at the same time. Drills are used for the sole purpose of training, while fire response is focused on saving lives and property. This issue was discussed during the negotiated rulemaking process and Committee members had varying positions. OSHA was convinced by the position of most of the Committee members that the rule should require semiannual drills without regard to actual fire responses for the above reasons. The Agency has not received compelling reasons to change its position. Therefore, this paragraph has not been changed for the final standard.</span></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">In paragraph (d)(10) of § 1915.508, OSHA prohibits the employer from using smoke generating devices that could create a dangerous atmosphere in training exercises. This includes training done on vessels and vessel sections as well as in buildings and other structures. This requirement is consistent with paragraph 8.3.2 of NFPA 1500-2002 (Ex. 19-5). Where the employer must simulate emergency conditions that require smoke generation, smoke-generating devices that do not create a hazard must be used. OSHA received no comments on proposed paragraph (b)(10), and it has been carried forward in the final rule as (d)(10).</span></p><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Additional Training Requirements for Fire Watch Duty</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Proposed paragraph (c) of § 1915.508, which has been renumbered as paragraph (e), sets forth the additional training requirements for any person assigned to fire watch duty. In shipyard employment, some employers hire contract workers as needed for the sole purpose of fire watch. The employer is ultimately responsible for ensuring that these fire watches are trained in accordance with § 1915.508(f). One way to do this is for the employer to have a written evaluation of the contractor's training program that the employer can review and thereby ensure compliance with the OSHA standard. Again, OSHA wants to make clear that it is the employer's responsibility to make sure that all fire watches are trained.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">In paragraph (e)(1) of § 1915.508, OSHA requires the employer to make sure the fire watch has been trained: (i) Before beginning the fire watch; (ii) when there is a change in operations that presents a hazard for which the worker has not been previously trained; (iii) when the employer determines that the fire watch employee needs to be trained; and (iv) annually.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Marine Chemist Services, Inc. submitted the following comment on the training of fire watches:</span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Unlike the requirement in paragraph 1915.508(b)(7) Training requirements for shipyard employees designated for fire response to "(u)se qualified instructors to conduct the training", there is no similar requirement for fire watch training instructors. As a result, literally anyone will be able train fire watches. Consequently, the fire watch training program will contain as much or as little detail as the trainer is knowledgeable (through education and experience) and/or has time. * * * Recommendation: add the words "in an approved fire watch training course taught by a qualified instructor" (Ex. 22-12).</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">OSHA agrees with this comment. Although most shipyard employers would use a qualified instructor, one could interpret this standard incorrectly, and employees could be trained incompletely or inadequately. Therefore, OSHA is changing the regulatory text of § 1915.508(e)(1) to read: "The employer must ensure that each fire watch is trained by an instructor with adequate fire watch knowledge and experience to cover the items as follows:'</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Marine Chemist Services also stated:</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2323" instrument_node="">It is agreed that a fire watch's knowledge and understanding must be adequate in order for him or her to properly perform fire watch duties; but so, too, must be one's skill. Even the requirement to extinguish live fire scenarios seems to suggest the importance of one's skill, both in terms of physical (</span><strong data-dcnode-id="2320"><em data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">e.g.</span></em></strong><span data-dcnode-id="2319" instrument_node=""> strength) and mental (</span><strong data-dcnode-id="2316"><em data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">e.g.</span></em></strong><span data-dcnode-id="2315" instrument_node=""> remaining calm) abilities. Therefore, knowledge and skill and understanding are needed here. Recommendation: insert "skill" as follows: Whenever the employer has reason to believe that the fire watch's knowledge, skill or understanding of the training previously provided is inadequate. (Ex. 22-12).</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">OSHA agrees that skills are an important component of the training requirements, as are the knowledge and understanding of the duties to be performed, and has included the word "skills" in § 1915.508(e)(1)(iii) as suggested by Marine Chemist Services.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Under paragraph (e)(1)(iv) of § 1915.508, employers must retrain fire watches annually. Annual training is an industry practice. In addition, annual training is already required by Navy contracts throughout the country.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">NAVSEA stated: "Recommend modifying this requirement as follows: 'Annual refresher training to include discussion of the types of fires seen recently in operations that the fire watch may encounter in the next year.' " (Ex. 22-15). OSHA agrees that it would be prudent for any shipyard that has an incident to discuss the incident during the annual retraining, and encourages shipyards to do so if the discussion will add to the knowledge and understanding of fire watches. However, OSHA has concluded that the employer is in the best position to determine if a discussion of past fires would always be useful or necessary for its fire watch workers. Therefore, OSHA does not believe modification of this provision is necessary and has not modified the standard.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Paragraph (e)(2) of § 1915.508 contains 12 items the employer must include in fire watch training. The training includes how to anticipate and be aware of the hazards that may be faced while performing fire watch duties, such as limited egress or possible changes in atmospheric conditions. To recognize the adverse health effects that may be caused by exposure to fire, employees have to be trained under OSHA's Hazard Communication Standard, 29 CFR 1910.1200. Workers need to be knowledgeable about fire prevention practices so they can correctly react to changes in the hot work environment that introduce hazards not identified at the start of hot work. Examples are deterioration of housekeeping or introduction of combustible or flammable materials.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">Paragraph (e)(2)(i) of § 1915.508 requires the employer to train a fire watch on the basics of fire behavior, classes of fires, extinguishing agents, stages of fire, and methods of extinguishment. The basics of fire behavior usually include the definition of the fire triangle and tetrahedron as set forth by NFPA 1001-1997 Standard for Fire Fighter Professional Qualification (Ex. 19-25). Extinguishing agents commonly used in shipyard employment are dry chemicals, water, and CO</span><sub data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">2</span></sub><span data-dcnode-id="2297" instrument_node="">. Methods of extinguishing require removing one or more of the following: heat (ignition), oxygen, fuel, or chemical chain reactions. OSHA received no comments on this paragraph, and it is carried forward as proposed.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Paragraph (e)(2)(ii) requires that each fire watch be trained using live fire scenarios whenever allowed by law. The training exercise would be a controlled burn and would teach the trainee the proper way to approach the fire. There are different requirements and restrictions across the country in this regard.</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Numerous comments were received on this issue.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">We believe it is unnecessary to create a hazard with a live fire exercise, employees can demonstrate proper operation of a fire extinguisher with other equipment. Use of charged extinguishers and live fires is costly and may add little reality to the training. Employers should have the option to use alternative instructional methods and equipment for fire watches. (Exs. 21-10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11).</span></p><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">In addition, National Steel and Shipbuilding Company stated: "Live fire scenarios are not required to demonstrate the ability to use a fire extinguisher. Employees can be effectively trained without the need to extinguish live fire scenarios. We recommend that the requirement be for live fire scenarios be removed." (Ex. 22-14).</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">NGNN recommended that this paragraph be deleted:</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">[P]aragraph (c)(2)(viii) requires the employer to instruct employees assigned to fire watch on how to select and use fire extinguishing equipment and this is sufficient. * * * Our current practice of providing practical hands-on use of the various extinguishers without the presence or a live fire has proven effective at our facility as evidenced by our fire safety record described in our cover letter. * * * We strongly encourage OSHA to use performance-oriented language, such as in paragraph (c)(2)(viii), rather than prescriptive language in this regard. (Ex. 21-8).</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">There are some localities that prohibit burning due to smog or clean air provisions. If this is the case, then live fire training should not be used. If this is not the case, live fire scenarios must be used and employees are expected to use fire extinguishers on such fires. Learning the different types of fires and appropriate fire extinguishers is more effective when live fire scenarios are used. In addition, fire watches need to know and be able to demonstrate that they can adequately use a fire extinguisher to extinguish a fire. The Committee was unanimous in its support of live fire training as the most effective means to train fire watches for their duties, because it provides the best simulation of actual firefighting technique. The Agency agrees that this is the case, and finds the comments that live fire training is unnecessary unpersuasive. Therefore, this provision is being included in the final standard as proposed. The only exception is for situations where a state or local law prohibits open burning and the employer is unable to obtain an exception for the training. In this case, the Agency does not wish to put the employer in the position of violating a local fire rule to comply with the OSHA standard.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Paragraphs (e)(2)(iii), (iv), and (v) require, respectively, that employees who stand fire watch duty must be knowledgeable of the adverse health effects that may be caused by exposure to fire, the physical characteristics of the hot work area, and the hazards associated with fire watch duties.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Paragraphs (e)(2)(vi) and (vii) of § 1915.508 require training on personal protective equipment (PPE), including what PPE is appropriate in a particular situation, as well as how to use it. A fire watch may need the same or different items of PPE from that used by a hot worker. The fire watch could be assigned to an isolated or confined space and, therefore, would need the additional protection that is required under other sections of Part 1915.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Paragraph (e)(2)(viii) of § 1915.508 requires that an employee who stands fire watch duty be trained to select and operate fire extinguishers and fire hoses likely to be used by the fire watch. As in the case of fire extinguishers, whenever a fire watch is expected to use a fire hose, the fire watch must be trained in its use. A fire watch who has been trained with a fire extinguisher but not a fire hose does not necessarily understand how to use a fire hose. Fire watches need targeted training if they may have to deal with these different types of equipment within their shipyard employment.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">The Agency requires that a fire watch be trained to select and operate the different types of fire extinguishers and fire hoses likely to be used by fire watches in the area. These requirements are similar to those found in 29 CFR 1910.157 in which OSHA requires the employer to train any employee who has been designated to use portable fire extinguishers (or, as stated in paragraph (e)(2)(viii) of this section, fire hoses), and for these employees to be familiar with the general principles of fire extinguisher use and the hazards of fighting incipient stage fires. OSHA does not believe that adopting this training requirement from Part 1910 imposes any new burden on shipyard employers beyond what currently exists.</span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Paragraph (e)(2)(ix) of § 1915.508 requires fire watch personnel to be trained to know the location and use of barriers that are part of the employer's fire protection program. It is a common shipyard practice to use barriers to prevent molten metal or sparks from traveling to uncleaned areas where flammable materials may be ignited. However, such barriers can also create hazards by blocking an employee's evacuation route or by suppressing ventilation to the point where fumes or vapors can accumulate. Therefore, a worker who stands fire watch must understand how to use the barriers safely.</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">In § 1915.508(e)(2)(x), OSHA requires that the fire watch be trained in the means of communicating with each worker performing hot work to ensure the safety of workers. Effective communication is especially important when a fire watch can not see a hot worker because, for example, the fire watch is on the other side of a compartment from the hot worker. In this case, the means of communication may be as simple as tapping on the bulkhead to signal whether the hot worker can continue or must stop, or an electronic communication system such as a two-way radio.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">In paragraphs (e)(2)(xi) and (xii) of § 1915.508, OSHA requires that fire watches be trained to know when and how to initiate fire alarm procedures and to be familiar with the shipyard's evacuation plan. OSHA recognizes that fire watch work assignments may change between vessels or vessel sections and land-side facilities and that each may have different alarm systems, evacuation plans, and exit routes. For example, a shipyard may be performing repair work on a Navy vessel, a cruise liner, and a tug at the same time, all with different alarm systems.</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Regardless of the system, a primary responsibility of a fire watch must be to recognize when to initiate a fire alarm procedure and begin evacuation. A fire watch needs to know when a fire has progressed beyond the incipient stage, when a fire alarm should be activated, and when evacuation should be initiated. The employer must make sure that fire watches are familiar with the type of alarm systems being used on the vessel where they are working.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">OSHA received no comment on proposed paragraphs (c)(2)(iii) through (c)(2)(xii) of § 1915.508 and they are being adopted as paragraphs (e)(2)(iii) through (e)(2)(xii).</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Proposed paragraph (c)(3) of § 1915.508, now (e)(3), requires the employer to ensure that each fire watch is trained to alert others to exit the work area whenever: (i) The fire watch perceives an unsafe condition associated with hot work; (ii) the fire watch perceives that a hot worker is in danger; (iii) evacuation is ordered by the employer or designated representative; or (iv) an evacuation signal such as an alarm is activated. OSHA received no comment on these provisions, and they are carried forward in the final rule renumbered.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Records</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Proposed paragraph (d) of § 1915.508, now renumbered as (f), requires that the employer document that the training required by paragraphs (a) through (e) has been accomplished. In § 1915.508(f)(1), OSHA requires the employer to document the worker's training by keeping a record of the worker's name, the name of the trainer, the type of training, and the date(s) of the training. As proposed, this requirement was separated into four separate provisions, paragraphs (d)(1)(i) through (iv). In this final standard, OSHA has collapsed all of these requirements into one provision, paragraph (f)(1), in order to make them easier to read. No comments were received on these four requirements, and OSHA is carrying them forward as proposed, with the exception of the renumbering.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">In addition, OSHA requires in paragraph (f)(2) of § 1915.508 that the employer keep the documentation for at least one year and, consistent with other OSHA standards, make the record available for inspection and copying by OSHA personnel on request. The record that must be kept is minimal. It can be kept as part of the worker's personnel file, in a master file of training, or in any other format the employer chooses. A record in an electronic file or database is sufficient. However, regardless of how the record is kept, it must be available for inspection by the persons authorized to see it. To be available means that it can be easily found, so the employer must first decide how the record is to be kept, and then make certain there is easy access to it.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">This record must be kept until it is replaced by a worker's new training record, or for one year from when the record was made, whichever is longest. In the case of a worker who will no longer perform fire watch duties, or is no longer employed at the shipyard, OSHA requires the employer to keep that employee's training record for one year. This information may be relevant in determining whether the employer's fire watch training program was adequate, and for research on the effectiveness of the standard. OSHA sought comment on whether the requirement for training record retention should be one or three years. No comments were received on this issue, or any other aspect of recordkeeping in this paragraph. Therefore, OSHA has renumbered the proposed paragraphs, and carried them forward in the final standard.</span></p><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2228"><strong data-dcnode-id="2229"><em data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Section 1915.509 Definitions</span></em></strong></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Most of the definitions in OSHA's proposed standard have been carried forward unchanged in the final standard. Additions or modifications have been made in response to various comments, and to provide appropriate definitions for the new terms used in the final standard. The following section discusses the terms for which comments were received, the definitions added to the rule, the definitions OSHA has modified to improve clarity, and the terms that have been included in the final rule without change.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Comments on the Proposed Definitions</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">OSHA's proposed definition for "fire response employee" was "a shipyard employee who performs shipyard employment firefighting." Atlantic Marine submitted a comment stating that the proposed definition was too broad (Ex. 21-17-1). "This definition could mean any employee that discharges a fire extinguisher at the shipyard, including office and administrative personnel." OSHA agrees that the term could be misinterpreted as defined. OSHA has modified the definition of "fire response employee" in the final standard to read "a shipyard employee who carries out duties and responsibilities of shipyard firefighting in accordance with the fire safety plan. A fire response employee may be a full-time employee, may occupy any position or rank within the shipyard, and may engage in fire emergency operations."</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Several commenters submitted comments on the definition of "hazardous atmosphere" (Exs. 21-3; 21-8; 21-14; 22-4; 22-15). NFPA commented that the definition of "hazardous atmosphere" was taken from a general industry standard (29 CFR 1910.146 Permit required confined spaces) and inappropriately applied to a maritime industry context in the proposed standard (Ex. 21-14). In addition, there was concern that the use of the term "dangerous atmosphere" in addition to "hazardous atmosphere" was unnecessary and could cause confusion (Exs. 21-14; 22-4). The term "dangerous atmosphere" was used in the proposed standard in the note to § 1915.507(c)(4) and was defined in § 1915.509. The term "hazardous atmosphere" was used in § § 1915.506(a) and .508(b)(10) and defined in § 1915.509. OSHA agrees with these commenters. The term "hazardous atmosphere" in § § 1915.506(a) and .508(b)(10) in the final standard has been replaced with the term "dangerous atmosphere" and the definition of "hazardous atmosphere" in § 1915.509 has been deleted. The proposed definition of "dangerous atmosphere" has been carried forward unchanged into the final standard.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">The Connecticut Department of Labor raised a question regarding the term "incident management system" (IMS), asking: "Why does the proposed standard change the customary verbiage of incident command system to incident management system? Will this confuse fire departments that will also be involved in the firefighting?" (Ex. 22- 4)</span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">While the Incident Command System (ICS) term is customary language often used by firefighting professionals, OSHA proposed to use the IMS term to be consistent with the terms currently in use by firefighting organizations and training institutions. However, OSHA is modifying the proposed definition of IMS in § 1915.509 to match the definition used in NFPA 1500-2002, which is: "A system that defines the roles and responsibilities to be assumed by personnel and the operating procedures to be used in the management and direction of emergency operations; the system is also referred to as an incident command system (ICS)". This modification does not change the meaning or intent of the proposed term, and is more consistent with the NFPA's use of the term IMS. For more discussion, see § 1915.505(d)(3) above. Definitions Added to the Final Rule</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Marine Chemist Services, Inc. suggested that a new definition be added for "approved fire watch training course." As addressed in the discussion of § 1915.508 above, OSHA will be altering § 1915.508(c)(1) to require training to be given by a qualified instructor. OSHA believes that there is no need for an additional definition for "approved fire watch training course" and has not added this term to the definition section of the final standard.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">NGNN suggested that OSHA add a description or a definition for "drop test" in order to clarify the term (Ex. 21-8). Drop test is a term found in § 1915.503(b)(2)(iv) "* * * and a drop test is done using gauges or other positive means. * * *" NGNN's suggested definition was:</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Method utilizing gauges to ensure the integrity of an oxygen fuel gas system. Prior to lighting a torch, but after all connections have been safely made, adjust the operating pressures by turning the adjusting screws clockwise. The pressure at the regulators should be set slightly higher than the required tip pressures. Close the manifold or cylinder supply valves and watch the gauges for at least sixty (60) seconds. Any drop in pressure indicates a leak. Do not turn on the supply valve again until the leak has been repaired. Other than pressure testing gas lines while submerged in water at test shops, only the use of pressure gauges provides a positive measure of line integrity.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">OSHA agrees with NGNN that a definition would be appropriate. However, OSHA has modified the definition of "drop test" in the final standard to read:</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">* * * [M]ethod utilizing gauges to ensure the integrity of an oxygen fuel gas burning system. The method requires that the burning torch is installed to one end of the oxygen and fuel gas lines and then the gauges are attached to the other end of the hoses. The manifold or cylinder supply valve is opened and the system is pressurized. The manifold or cylinder supply valve is then closed and the gauges are watched for at least sixty (60) seconds. Any drop in pressure indicates a leak. * * *</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">The final sentences of the NGNN suggestion are procedural rather than part of the definition and are therefore unnecessary.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">OSHA has added three additional new definitions to the final standard. The definitions of "class II standpipe system," "incipient stage fire," and "small hose system" have been added for clarity. These definitions are identical to the definitions used in 29 CFR 1910.155(c). In the NPRM (67 FR 76241), OSHA referred to "incipient stage fire" as a definition used in Part 1910 that would also be utilized for this subpart. There were no comments received on this definition, nor any objections to using this definition from Part 1910. OSHA has also included "class II standpipe system" and "small hose system" in this final standard because they are technical terms used within the definition of incipient stage fire. Including these definitions in the final standard provides greater clarity and reduces the need to reference Part 1910 standards in the final standard.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Definitions Modified by OSHA</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">In order to be more compatible with the regulatory text, and the remainder of Part 1915, OSHA has revised the following definitions for clarity and uniformity. The proposed rule defined a "designated area" as "an area established for hot work after an assessment of fire hazard potential of facilities, vessels, or vessel sections such as a fabrication shop." OSHA has simplified this definition to define a designated area as "an area established for ongoing hot work after an inspection has determined that the area is free of fire hazards."</span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">The proposed definition of "emergency operations" defined the activities performed by a fire response organization. The last portion of the definition included examples of special operations that may be performed, such as HAZMAT release mitigation, standby for flight operations and off-site fires. Because special operations could include any number of activities in addition to these examples, and the examples did not add clarity to the definition, they have been removed.</span></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">"Fire suppression" defines the activities involved in controlling and extinguishing fires. The proposed definition included a list of the hazards associated with fire suppression. OSHA realizes that the act of fire suppression creates many hazards, and that employees must be protected from those hazards. However, the Agency has deleted examples of these hazards from the definition since they are not a necessary part of the definition of fire suppression.</span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">"Shipyard firefighting" is the activity of rescue, fire suppression, and property conservation in all shipyard workplaces. The proposed definition included the sentence: "Shipyard firefighting includes any fire that requires a fire attack hose line of 1\1/2\ inch diameter or larger to fight, and self-contained breathing apparatus by responders." OSHA did not want to imply that the definition of shipyard firefighting was limited to the use of specific equipment. Therefore, the final definition does not include examples of specific equipment.</span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Definitions Deleted by OSHA</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">OSHA has deleted three proposed definitions from the final standard; the terms "affected employee," "hot work," and "shipyard employment." No comments were received on these definitions. The Agency decided to not define "affected employees" since employers can make the determination of who is affected. The terms "hot work" and "shipyard employment" are both currently defined in § 1915.4 for the entire part 1915. OSHA has concluded it is unnecessary to define them again for this subpart.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Definitions Included Without Change</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">OSHA did not receive comments on the remaining definitions and believes that all of the terms used in this subpart are "terms of the industry" and are universally recognized by shipyard employees and employers. These terms include "alarm," "alarm system," "body harness," "contract employer," "designated area," "fire hazard," "fire protection," "fire response," "fire response organization," "fire watch," "fixed extinguishing system," "flammable liquid," "hazardous substance," "hose systems," "host employer," "inerting," "interior structural firefighting operations," "multi-employer workplace," "personal alert safety system," "physically isolated," "physical isolation," "protected space," "proximity firefighting," "qualified instructor," "rescue," and "standpipe." Therefore, OSHA has adopted these proposed definitions in this final standard.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2157"><strong data-dcnode-id="2158"><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">IV. Summary of the Final Economic and Regulatory Flexibility Analysis</span></em></strong></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2152"><strong data-dcnode-id="2153"><em data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Introduction</span></em></strong></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">OSHA's Final Economic and Regulatory Flexibility Analysis addresses issues related to the costs, benefits, technological feasibility, and economic impacts (including small business impacts) of the Agency's "Fire Protection in Shipyard Employment" standard. This analysis also evaluates the non-regulatory alternatives to this standard.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">The final standard will affect approximately 669 employers and about 98,000 employees in the shipbuilding, ship repair and shipbreaking industries. OSHA estimates that the final standard will prevent 1 death and 292 workplace injuries (102 lost workday injuries and 190 non-lost workday injuries) annually. The Agency estimates approximately $6.2 million in cost savings from these 292 injuries.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">OSHA has determined that this final standard is not an economically significant regulatory action under E.O. 12866 and not a major rule under the Congressional Review provisions of the Small Business Regulatory Enforcement Fairness Act. OSHA has provided the Office of Information and Regulatory Affairs with an assessment of the costs, benefits, and alternatives, as required by section 6(a)(3)(C) of E.O. 12866, which is summarized below. Executive Order (EO) 12866 requires regulatory agencies to conduct an economic analysis for rules that meet certain criteria. The most frequently used criterion under EO 12866 is that the rule will impose annual costs on the economy of $100 million or more. Neither the benefits nor the costs of this rule exceed $100 million.</span></p><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">The Regulatory Flexibility Act of 1980 (RFA), as amended in 1996, requires OSHA to determine whether the Agency's regulatory actions will have a significant impact on a substantial number of small entities. OSHA's analysis indicates that the final rule will not have significant impacts on a substantial number of small entities. OSHA's Final Economic Analysis (FEA) and regulatory flexibility analysis include: A description of the industries potentially affected by the standard; an evaluation of the risks addressed; an assessment of the benefits attributable to the final standard; a determination of the technological feasibility of the requirements of the standard; an estimate of the costs employers will incur to comply with the standard; A determination of the economic feasibility of compliance with the standard; and an analysis of the economic and other impacts associated with this rulemaking, including those on small businesses. The FEA has been provided to the docket as Ex. 23. This section of the preamble summarizes the results of that analysis.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2135"><strong data-dcnode-id="2136"><em data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Affected Industries</span></em></strong></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">The final Fire Protection in Shipyard Employment standard will affect all establishments in the shipbuilding, shipbreaking, and ship repair industries. These include large shipyards, government shipyards, and shipyards operated under Navy contracts, operations owning a dock or dry dock, and the vast majority of small firms that perform shipbuilding and repair work, such as metal fabricators, painters, asbestos removal, etc., who do not own or rent docks. For purposes of this analysis, OSHA has defined small firms as: (1) Firms with fewer than 1,000 employees (the Small Business Administration (SBA) definition of small businesses in this sector); (2) firms with fewer than 250 employees (the definition of small business recommended by the negotiated rulemaking committee); and (3) firms with fewer than 20 employees. OSHA has based its estimates of number of firms, establishments, employment, and wages on general Bureau of Labor Statistics (BLS) and Department of Commerce data for the standard industrial classification (SIC) codes for shipbuilding and ship repair 3731 and shipbreaking 4499. OSHA has based its estimates concerning revenues of firms on SBA data, and concerning profit rates on Robert Morris Associate's data. Table IV-1 shows the total number of establishments, number of firms, employment, and revenues and profits per firm affected by the rule. As the table shows, there are 717 establishments owned by 669 firms in the industries. The industries employ 97,822 workers, of whom 70 percent are production employees.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">The Passenger Vessel Association (PVA) commented that there may be considerably more employers with "[n]o more than 250 employees who have employees engaged in "shipyard employment" but that are not included in the government's shipbuilding and shipbreaking categories." (Ex. 21-9). PVA further stated: "If your estimate of 621 affected companies with no more than 250 employees is too low, as we suspect it is, then you have underestimated the total costs and economic impacts of the proposed standard." OSHA derived the estimate of establishments having less than 250 employees (alternate definition of a small firm) from a manipulation of the SBA and Bureau of the Census (BOC) County Business Patterns data. This involved OSHA applying the distribution of County Business Patterns for the categories of 100- 249 employees and 250-499 employees to the profile data for the SBA 100-499 size classification. Having thus estimated SBA profile data for the firm size classification of 250-499 employees, OSHA subtracted these data totals from the totals for the size classification 1-500 employees presented in Table II-1 in the FEA; this calculation yielded SBA totals for a size category of 1-250 employees shown in Column 9 in Table II-2 in the FEA. (Ex. 23). This was necessary because neither data source publishes establishment counts using this size classification. PVA did not supply OSHA with the necessary data to refute the Agency's findings, thus OSHA is continuing to use its mathematical method of estimation with the SBA data using the BOC distribution percentages. In summary, OSHA has used the best available data for the purpose of estimating the number of affected entities. It is possible that these data omit some firms that engaged in shipbuilding, shipbreaking and ship repair -- particularly establishments that do this as only a small part of their total work. However, there are no data available on the number of such establishments. Conversely, OSHA may have overestimated the costs by including some employees as working in establishments that are primarily engaged in shipbuilding, shipbreaking, and repair when they actually work in other industries.</span></p><span data-dcnode-id="2128" instrument_node="">

-id="2000" instrument_node="">$15,540</span></p></td></tr><tr data-dcnode-id="1970"><td data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Profits Per Firm ($1,000)</span></td><td data-dcnode-id="1988"><p class="pull-right" data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">$24</span></p></td><td data-dcnode-id="1984"><p class="pull-right" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">$85</span></p></td><td data-dcnode-id="1980"><p class="pull-right" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">$213</span></p></td><td data-dcnode-id="1976"><p class="pull-right" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">$25,854</span></p></td><td data-dcnode-id="1972"><p class="pull-right" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">$559</span></p></td></tr></tbody></table><span data-dcnode-id="1966" instrument_node="">

</span><p data-dcnode-id="1959"><strong data-dcnode-id="1960"><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Evaluation of Risk and Potential Benefits</span></em></strong></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">For this Final Economic Analysis, OSHA used the same approach as in the Preliminary Economic Analysis (PEA) used in the proposed rule. The PEA involved developing a profile of the risks facing workers in shipyards that might be affected by the standard. OSHA's risk profile for exposure to fire-based risks in shipyards is based on data from the BLS' National Census of Fatal Occupational Injuries, data from the BLS' Survey of Occupational Injuries and Illnesses, and an analysis of OSHA fatality/catastrophe inspection data obtained from the Agency's Integrated Management Information System.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">OSHA anticipates that the final standard will significantly reduce the number of fire and explosion related incidents and resulting injuries and fatalities currently reported in the shipyard industry. OSHA believes that the final standard's requirements for inspection prior to hot work, fire watches, planning, and training will help to save lives and prevent injuries in the shipyard workforce. OSHA estimates that approximately 1 fatality, 110 injuries involving days away from work, and 204 injuries not involving days away from work occur annually among shipyard workers due to fire and explosions. This is the current industry risk baseline used in this analysis. OSHA projects that full compliance with the proposed standard would annually prevent 0.88 fatalities, 102 injuries involving days away from work, and 190 injuries not involving days away from work. No comments were received regarding these estimated benefits.</span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">In addition to saving lives and improving overall safety in shipyards, OSHA believes that full compliance with the final standard would yield substantial cost savings to parties within and connected with the industry and ultimately to society as a whole. These monetized benefits take the form of reductions in employer and insurer accident- related costs in several areas: Value of lost output associated with temporary total disabilities and permanent partial disabilities, an income-based measure derived from estimates of workers' compensation indemnity payments; reductions in accident-related medical costs; administrative expenses incurred by workers' compensation insurers; and indirect costs related to productivity losses, work stoppages, and accident investigations and reports. Applying data from the insurance industry on the direct costs of accidents and data from the literature on the indirect costs of accidents and other administrative-related costs to OSHA's preliminary estimate of avoided injuries, the Agency monetized the value of the cost savings employers and society will accrue by avoiding these injuries. OSHA estimates that annual costs savings of $6.2 million will result from compliance with the final standard. These savings are those associated with injuries due to fires. OSHA did not attempt to quantify the cost savings resulting from reduced fire damage to property and reduced need to respond to fires.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Some commenters questioned: "[H]ow can there be a general savings for the shipyards if they are spending more money on both training and equipment in order to meet the new requirements of the proposed rule?" [Exs. 21-4, 21-5, 21-6, 21-7, 21-13, 21-16, 22-1, and 22-2]. This general savings (or cost savings) estimate is based on the estimated reduction in injury-related costs due to the standard (developed in the Benefits chapter). This estimate includes indemnity payments, lost income, medical costs, and administrative costs for both temporary total disability and permanent partial disability injuries. These cost savings accrue partially to individual employers, partially to the industry as a whole, partially to the government in the form of reduced taxes, and partially to injured employees. Thus, the cost savings are not necessarily savings to employers, but savings to society as a whole.</span></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">On the other hand, the annualized compliance costs estimates are annualized costs to employers, discounted using a 7 percent rate over ten years, which the employer is projected to spend to comply with the standard. These estimates are based on the employment and establishment counts in the Industrial Profile and the dollar costs needed to comply with the standard. In addition to the employment and establishment counts, these estimates also include non-compliance rates to account for establishments that have already complied with the requirements.</span></p><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Thus, OSHA estimates that the final standard will prevent approximately 292 injuries and one death per year. As a result of prevention of the injuries, OSHA estimates that there will be direct cost savings to society of $6.2 million per year, excluding savings associated with reduced property damage and reduced fire response costs. For informational purposes, OSHA also estimates $6.3 million in cost savings from the 1 prevented death, for a total of $12.5 million in monetized benefits.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1936"><strong data-dcnode-id="1937"><em data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Technological Feasibility and Compliance Costs</span></em></strong></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Consistent with the legal framework established by the OSH Act, Executive Order 12866, and court decisions, OSHA has assessed the technological feasibility of the fire protection in shipyards standard. The standard does not require any practices not already undertaken in many shipyards today. Moreover, the final standard is based on a consensus draft recommended to the Agency by a negotiated rulemaking committee (the Committee) consisting of representatives from labor, government, and industry. These representatives included small employers who would be affected by changes to the maritime regulations. The Committee reached consensus on the language of the draft, thereby implicitly acknowledging the feasibility of the proposed revisions to the standard. Therefore, based on the fact that many firms in the industry are already implementing the controls and practices required by the standard and that the Committee reached consensus on the proposed revisions, OSHA has determined that the final fire protection in shipyard employment standard is technologically feasible.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">OSHA developed estimates of the costs of compliance for shipyard employers subject to the final standard. To develop these estimates, OSHA first examined the extent to which shipyard employers were already in compliance with the requirements of the standard as a result of existing OSHA requirements, compliance with rules of other parties (such as the U.S. Navy in some shipyards), and compliance with voluntary codes and good practices. Eliminating provisions for which there is already substantial compliance, OSHA arrived at the list of activities for which shipyard employers would incur costs shown in Table IV-2. Table IV-2 shows that the annualized costs of the final standard are $4.3 million per year. Ninety-one percent of the costs are associated with fire watch-related provisions; most of these costs are for posting additional fire watch personnel in situations in which fire watches are not currently being posted.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Many commenters stated that: "[T]he analysis estimates that for the industry as a whole, the average cost per employee for training is around $1." (Exs. 21-4, 21-5, 21-6, 21-7, 21-13, 22-1, 22-2). These same commenters state that the additional requirements for annual fire safety and fire watch training would increase the training time from 0.5 hours to 1 hour per employee, suggesting a far greater additional cost than $1 per employee. One commenter stated that it employs 117 employees with a training cost of $850 per employee (Ex. 21-13). OSHA assumed that large establishments are in compliance with the training requirements, thus they would not incur new training cost burdens. Even in smaller size establishments, OSHA estimated that some employers now comply with these training requirements. (Table V-1 on page V-4 of the FEA (Ex. 23)). Further, not all employees need fire watch training. Finally, OSHA computed an annualized cost in which it assumed that most training occurs in the initial year and would not need to be repeated for all workers. These costs only apply to small and medium size establishments that were estimated to not be in compliance with the final standard. Therefore, the similarity between the estimate for Fire Watch Training ($95,204) in Table V-2 of the proposed rule and the number of estimated employees (97,822) in Table V-1 of the proposed rule is merely coincidence (67 FR 76242-76243).</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">In regard to the provisions on training and use of fire watches, the majority of shipbuilding and repair activity is for the U.S. Navy. The Navy already requires its shipyard contractors to employ fire watches for hot work. The Agency also received comment on the cost of supplying pressure gauges for drop tests of fuel gas and oxygen hoses (Exs. 21-4; 21-5; 21-6; 21-7; 21-13; 21-17; 22-2). The final standard does not require employers to perform drop tests with gauges, since hoses can simply be rolled back to the supply manifold. Since this is the least cost alternative, the Agency did not include estimates of costs for gauges.</span></p><span data-dcnode-id="1923" instrument_node="">

</span><p data-dcnode-id="1840"><strong data-dcnode-id="1841"><em data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Economic Impacts</span></em></strong></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1838" instrument_node="">OSHA analyzed the impacts of these compliance costs on firms in the shipbuilding and repair sector. In order to do this, OSHA determined costs as a percentage of revenues and costs as a percentage of profits. These two measures (in percent) correspond to two assumptions used by economists to bound the range of possible impacts: The assumption of no-cost pass-through, </span><strong data-dcnode-id="1835"><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">i.e.</span></em></strong><span data-dcnode-id="1834" instrument_node="">, that employers will be unable to pass any of the costs of compliance forward to their customers (compliance costs as a percentage of profits), and the assumption of full-cost pass- through (compliance costs as a percentage of revenues), </span><strong data-dcnode-id="1831"><em data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">i.e.</span></em></strong><span data-dcnode-id="1830" instrument_node="">, that employers will be able to pass all of the costs of compliance forward to their customers. As summarized in Table IV-3 below, OSHA estimates that, if affected firms in the shipbuilding sector were forced to absorb these compliance costs entirely from profits (a highly unlikely scenario), profits would be reduced by an average of 1.14 percent. If, at the other extreme, affected firms were able to pass all of these compliance costs forward to their customers, OSHA projects that the price (revenue) increase required to pay for these costs would be less than 0.1 percent (0.04 percent). Given the minimal impact on both prices and profits, OSHA concludes that the regulation is economically feasible. To the contrary, NNGN stated in its comments that it has serious concerns with several aspects of the proposed rule that will result in more than $35 million annually to its company with little to no added benefit to its health and safety program or the industry at large (Ex. 21-8). NGNN is a large shipyard with "845 trained and qualified fire wardens whose primary responsibilities are fire prevention and emergency evacuation and 3,325 fire watch qualified employees whose primary responsibility is fire prevention and response in support of a specific hot work job." (Id.) In addition, the company reports that it has "long-standing fire safety practices that in many cases go beyond that required in existing regulations, as well as the proposed standard." OSHA is perplexed by NGNN's assertion that the rule will result in costs of more than $35 million annually to this company. The Agency assumed that this firm was in compliance with the requirements of the final standard, which seems to be validated by its comments. Thus, this company would not incur a high compliance cost burden and its economic impact would be minimal.</span></p><span data-dcnode-id="1828" instrument_node="">
