</span><p data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">In § 1915.503(a)(2), the employer can only authorize employees to do hot work in areas that are free of fire hazards or where fire hazards are controlled by physical isolation, fire watches, or other positive means such as inerting. Decisions about authorizing hot work must be based on an inspection by the employer, a Marine Chemist, or a Shipyard Competent Person. Authorization for hot work is appropriate only when such an inspection has shown that there are no uncontrolled combustible or flammable materials in the area.</span></p><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">The note to paragraph (a)(2) states: "[T]he requirements of paragraph (a)(2) apply to all hot work operations in shipyard employment except those covered by § 1915.14." This note is a reminder to employers that there are instances when a Marine Chemist, a U.S. Coast Guard Authorized Person, or a Shipyard Competent Person, is required to inspect a work area prior to hot work. Under these circumstances, the employer would not need to re-inspect the same work area. Conversely, the employer's inspection will not be accepted in lieu of an inspection by a Marine Chemist, a U.S. Coast Guard Authorized Person, or a Shipyard Competent Person when required by § 1915.14.</span></p><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">The likelihood of the hot work areas containing combustible materials during ship repair is greater than in shipbuilding. During ship repair, as in other work, the employer must control the fire hazards prior to performing the hot work. As required in paragraph (a)(2)(ii), control of fire hazards can be by physical isolation, posting fire watches, or other positive means. For example, an employer can achieve physical isolation of combustibles by shielding them or moving them to an area at least 35 feet away from the hot work (see definition of "physical isolation"). The 35-foot vertical and horizontal distance is consistent with current industry practice. Where combustibles cannot be moved or otherwise physically isolated, the employer can post a fire watch to control the fire hazard. Additionally, when flammable atmospheres are found adjacent to the hot work area, the employer can control the fire hazard by inerting the adjacent space with a non-reactive substance that will not support combustion. [For further information on controlling spaces (flammable atmospheres) adjacent to where hot work is being performed, see Subpart B of this Part.]</span></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">The Connecticut Department of Labor submitted the following questions in regard to these requirements:</span></p><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Pertaining to § 1915.503, what is the covered employer's responsibility regarding hot work and maintaining fire hazard free conditions when the outside contractor is on covered property? * * * How is such an outside contractor/employer treated through the entire scenario under the standard for example, does this employer need to be covered by the plan? (Ex. 22-4).</span></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">As discussed in the Scope section, contractors who perform work at shipyards are required to comply with the OSHA shipyard standards, including the requirements regarding hot work.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">NAVSEA recommended that two classes of hot work be identified. These would include most hazardous (stick welding and oxyfuel cutting) and less hazardous hot work (grinding, brazing, and TIG welding) (Ex. 22-15). By separating these two, there would be separate fire watch requirements. This commenter further stated that:</span></p><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">The hot worker may serve as his/her own fire watch for less hazardous hot work with the supervisor's approval. In addition, they must have an extinguisher and fire watch training. Recommend differentiating between 'aggressive' hot work and 'other' hot work. Two definitions of hot work would legitimize minor incidental gas igniters in areas that are safe to enter, but not safe for 'aggressive' industrial hot work. (Id.)</span></p><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">OSHA has not incorporated this suggestion into the final rule. The Agency believes that a single approach to ensuring safe hot work is simple and effective, and that for any hot work where the area has not been cleared of fire hazards, the employer must control the fire hazard with physical isolation, fire watches, or other positive means. Allowing the employer to designate particular areas for hot work addresses many of the concerns expressed by NAVSEA. In addition, the Agency does not allow the hot worker to also be the fire watch. Fire watch issues are discussed below.</span></p><span data-dcnode-id="3181" instrument_node="">
</span><p data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Specific Requirements</span></p><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">In § 1915.503(b)(1), OSHA requires employers to keep all hot work areas free of hazards that may cause or contribute to the spread of fire. This requirement prevents the introduction of combustible or flammable materials during the performance of hot work. Even though safe conditions often exist at the start of the hot work process, over the duration of the work, materials may be brought to the site, creating a fire hazard. For example, one worker may be performing hot work at the same time a worker from another job introduces combustible or flammable materials within 35 feet of the hot work operation. It is the intent of § 1915.503(b)(1) that hazard assessment be a continual process and not a singular, one-time event. Therefore, after authorizing hot work, the employer must continue to maintain a fire hazard free area. A note has been added to refer the reader to § 1915.181, Subpart L, for unexpected energizing and energy release. In addition, the reader should refer to § § 1915.1000 to .1450, Subpart Z, for exposure to toxic and hazardous substances. No comments were received on this paragraph, and the proposed language is carried forward in the final rule.</span></p><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3169"><span data-dcnode-id="3174" instrument_node="">Paragraph (b)(2) deals with fire safety issues related to fuel gas and oxygen supply lines and torches that are typically used for cutting and brazing. Paragraph (b)(2)(i) requires the employer to make sure that no unattended fuel gas and oxygen hose lines or torches are left in confined spaces. The final language in paragraph (b)(2)(i) has been adapted from 29 CFR Parts 1910.252 and § 1915.52 and NFPA 312-2000 </span><strong data-dcnode-id="3171"><em data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Standard for Protection of Vessels During Construction, Repair, and Lay-up</span></em></strong><span data-dcnode-id="3170" instrument_node=""> (Ex. 20-4). This requirement reflects the current practice in the industry, and was recommended by the Committee.</span></p><span data-dcnode-id="3168" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">The potential danger associated with unattended fuel gas and oxygen hoses or torches in confined spaces is apparent and universally accepted. Leaking fuel gas and oxygen from unattended hoses or torches can accumulate rapidly in confined spaces leading to several hazardous conditions such as increased fire hazards, oxygen-enriched atmospheres, explosive atmospheres, and similar conditions. This paragraph seeks to eliminate the hazards associated with unattended fuel gas and oxygen hoses or torches in confined spaces.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">A number of comments were received on § 1915.503(b)(2), stating that these paragraphs were not the intent of the Committee (Exs. 21-4; 21-5; 21-6; 21-7; 21-13; 21-17-1-1; 22-2). Some commenters stated that the Committee intended these requirements only for charged lines, not lines in general. (Exs. 21-8; 21-17; 21-17-1). These commenters stated that (b)(2)(i) would require the burner to leave someone to attend his or her torch while the burner returned to the supply manifold to turn on the gas. Two of these commenters raised the question of what OSHA's practice will be with the "no unattended * * * lines" wording (Exs. 21-7; 21-13). Other than minor editorial changes, the requirement in § 1915.503(b)(2) is the language voted upon and approved unanimously by the Committee. In addition, this will eliminate the hazard of leaving leaking lines in a confined space. The provision does not require two employees because the burner can turn on the gas and transport the torch with a charged line to the confined space. If the burner leaves the confined space, the burner can take the torch to an enclosed space, where it can be left unattended for 15 minutes. The final standard maintains the provision as proposed.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3161" instrument_node="">In § 1915.503(b)(2)(ii), OSHA requires employers to prohibit unattended charged fuel gas and oxygen hose lines or torches in enclosed spaces for more than 15 minutes. The language in this paragraph was adapted from 29 CFR § 1910.252 and § 1915.52 and NFPA 312-2000 </span><strong data-dcnode-id="3158"><em data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Standard for Protection of Vessels During Construction, Repair, and Lay-up</span></em></strong><span data-dcnode-id="3157" instrument_node=""> (Ex. 19-4). The potential for fire or explosion caused by unattended charged lines in enclosed spaces far outweighs the burden of pulling to open air or disconnecting.</span></p><span data-dcnode-id="3155" instrument_node="">
</span><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Paragraph (b)(2)(ii) received a number of comments related to what would be considered "charged." NGNN stated that:</span></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">NGNN considers the word "charged" to mean that the gas is shut off at the supply manifold or cylinder and that the hose is not required to be disconnected so as to maintain the integrity of the original drop test. We are concerned that the proposed language in 1915.503(b)(2)(ii), if interpreted to mean that the line must be disconnected during unattended periods of 15 minutes or more, would permit the re-connection of the hose without positive verification of line integrity and thus create the potential for gas to be released in an enclosed space. Furthermore, we believe re-connecting and performing a drop test with the hose and torch left in place below deck is poor practice and even unsafe since gas could be released while the torch operator is determining that the line is open or leaking. Proven and equally or more protective alternative methods, such as described below, are currently used that minimize the risk in the event that hose integrity is compromised. (Ex. 21- 8).</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">In addition, NGNN recommended that the standard be revised to read: "No unattended fuel gas or oxygen hose lines or torches are in enclosed spaces for more than 15 minutes unless the gas supply manifold or cylinder valves are closed and the hose lines are inspected or a positive means is used to verify there is no gas leakage, prior to re- opening the manifold or cylinder supply valves." (Id.)</span></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Other commenters considered lines to be uncharged when:</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">[T]he gas supply [is] turned off at the manifold valve and/or cylinder valve only, and hose connection [is] not disconnected from the supply. This would allow the hose to not be charged with pressure supplied by the manifold, or cylinder, only the pressure of a drop test. The hose should not be disconnected, interfering with the integrity of the original drop test, and requiring that the drop test be redone. Disconnection of the hose could result in the possibility of mistaken connections (Exs. 21-10; 22-1; 22-6; 22-13).</span></p><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">OSHA's interpretation of "charged line" is any line that is connected to the manifold and filled with gas. Until all of the contents are discharged from the lines, there is the potential of a leak, a cut line, or a disconnection, all of which could contribute to a fire. Therefore, we do not agree with NGNN's recommendation and are maintaining this interpretation in the final rule.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">OSHA finds that fuel gas or oxygen in charged hose lines has the potential to empty into an enclosed space and create a fire hazard. Therefore, the final rule includes the provision as proposed, which is consistent with the Committee's recommendation, consensus standards, and sound fire safety practice.</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">In paragraph (b)(2)(iii) of § 1915.503, the employer must ensure that employees disconnect all fuel gas and oxygen hoses at the supply manifold at the end of each shift. This reduces the possibility of releasing gas into an enclosed space and creating a fire hazard. However, this procedure requires the employer to make sure that hoses are safely reconnected. As described in the preamble to the proposed rule (67 FR 76225), OSHA is concerned about the possibility of hooking up at the supply manifold a different (wrong) hose whose torch end was left hanging in an enclosed space. If the wrong hose is reconnected, it may dispense oxygen and fuel gas into a space without anyone knowing, thus creating a fire or explosion hazard.</span></p><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">OSHA deals with this potential problem in paragraph (b)(2)(iv) of § 1915.503. When fuel gas and oxygen lines are to be disconnected, the employer has two options. One is to completely roll the lines back to the supply manifold or to open air and then disconnect the torch. The other is to use a positive means of identification on the fuel gas and oxygen hose lines before rolling out or extending the line to assure that the proper extended lines are disconnected and that the proper lines will be reconnected, thus eliminating the hazard. Selecting the positive means of identification for the fuel gas and oxygen hose lines is left to the discretion of the employer. Examples of the positive means of identification include color coding, stamped brass tags, and stenciling of both ends of the line. Using performance language as an alternative to requiring specific methods to identify the lines provides employers with flexibility and will help to nurture developing technology in these areas.</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">In an identical comment, several commenters objected to proposed paragraphs (b)(2)(iii)(A) and (B), as follows:</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">The preamble on pages 76225, paragraph 9 misrepresents current industry practice with regard to the use of gauges to test for compression integrity. Only one or two shipyards use gauges for the integrity test. The implied necessity of gauges imposes a large cost for many shipyards, and leaving the existing language in the final rule makes it incumbent on the shipyard to demonstrate that their practice exceeds a gauge as a means of ensuring integrity. Further, the "locking" system described in the preamble ensures positive identification, but does nothing to ensure integrity as implied in the discussion. As a result, we recommend that the language in the proposed rule be changed to:</span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">"Extended fuel gas and oxygen hose lines are not reconnected at the supply manifold unless the lines are given a positive means of identification when they were first connected and positive means to insure the integrity of fuel gas and oxygen burning system is identified in employer fire plan" (Exs. 21-4; 21-5; 21-6; 21-7; 21- 13; 22-2).</span></p><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">OSHA disagrees with these comments. As discussed above, the employer could use stenciling of both ends of the line, color coding, stamped brass tags, and so forth to identify the lines. Of course, the lines must be identified at both ends regardless of how many sections are joined to create the run. While the preferred way to maintain integrity of the lines is the drop test using gauges, the employer may use other methods such as testing a pressurized system by using soapy water at all connections. The use of gauges may also be avoided entirely by rolling hoses back to open air.</span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Therefore, apart from the minor editorial changes, the only difference between the provisions of the final rule and the proposed rule is that the sections have been renumbered from § 1915.503(b)(iii)(A) and (B) to § 1915.503(b)(iii) and (iv). Thus, paragraph (iii) clarifies that the hoses must be disconnected, and paragraph (iv) makes clear that two options are available to the employer to assure that hoses are properly reconnected. The employer may roll the lines back to the supply manifold or to open air and then disconnect the torch, or the employer may keep the lines in place, identify the hose lines to assure that the proper lines are reconnected and check them for integrity. OSHA has also added a definition of "drop test" to the rule, as discussed in the definitions section below.</span></p><span data-dcnode-id="3113" instrument_node="">
</span><p data-dcnode-id="3109"><strong data-dcnode-id="3110"><em data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Section 1915.504 Fire Watches</span></em></strong></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">The fire watch requirements of this section are divided into three parts: (a) The employer's written policy on fire watches; (b) the posting of a fire watch; and (c) fire watch assignments.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Written Fire Watch Policy</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Paragraph (a) of § 1915.504 requires employers to create and keep current a written policy on fire watches. This written policy must specify the training that fire watches must receive (paragraph (a)(1)); the duties that they will perform (paragraph (a)(2)); the equipment that they will be given (paragraph (a)(3)); and the personal protective equipment (PPE) necessary for fire watches in the workplace (paragraph (a)(4)). The PPE that fire watches will need is specified in 29 CFR Part 1915 Subpart I Personal Protective Equipment. OSHA did not propose a specific format for the written policy, and none has been included in the final rule. OSHA recognizes that the employer needs the discretion to tailor the policy to its workplace.</span></p><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">No comments were received on the proposed text in paragraphs (a)(1) through (a)(3); OSHA is adopting them in this final rule without changes. One comment was received regarding paragraph (a)(4) of § 1915.504. Atlantic Marine recommended that: "[T]he wording of this proposed rule be changed from 'must be given' to 'must be made available' to ensure consistency with 29 CFR 1915.152(a) -- Provision and use of [personal protective] equipment" (Ex. 21-17-1). Proposed paragraph (a)(4) stated that employees "must be given" PPE as required in Subpart I, and § 1915.152(a) states that the employer shall provide and shall ensure that each affected employee uses the appropriate PPE. OSHA agrees with this comment and has revised this provision to read: "The personal protective equipment (PPE) must be made available and worn as required by 29 CFR Part 1915, Subpart I." With this wording, the employer has an obligation to provide the proper PPE to all fire watch employees. In addition, the employer must ensure that employees are wearing and utilizing each piece of PPE appropriately as required in § 1915.152(a).</span></p><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Posting Fire Watches</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Paragraph (b) of § 1915.504 requires the employer to post a fire watch during hot work if any one of eight specific conditions is present (each condition is discussed in detail below). OSHA's requirements for this paragraph are based on the Committee's recommendations.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Comments received stated that: "There is a question of whether this is an 'and' or an 'or' listing of fire hazards." These commenters recommended changing the language to read: "The employer must post a fire watch if during hot work any of the following apply:" (Exs. 21-3; 21-10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11). OSHA agrees and the regulatory text has been changed to read: "The employer must post a fire watch if during hot work any of the following conditions are present."</span></p><span data-dcnode-id="3087" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Atlantic Marine stated that the proposed rule "[i]s cost burdensome to small and medium-sized shipyards." (Ex. 21-17-1). It requested that the eight conditions listed in § 1915.504(b) be replaced with the following language: "An employer must post a fire watch if a Marine Chemist, a Coast Guard-authorized person, or a Shipyard Competent Person, as defined in 29 CFR 1915 Subpart B, requires that a fire watch be posted." (Id.)</span></p><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">OSHA disagrees with this commenter. Paragraph (b) is a compilation of conditions that could, according to the Committee, arise in any size shipyard employment, including small, medium, and large shipyards. The current § 1915.52(b)(3) requires:</span></p><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">When the welding, cutting, or heating operation is such that normal fire prevention precautions are not sufficient, additional personnel shall be assigned to guard against fire while the actual welding, cutting, or heating operation is being performed and for a sufficient period of time after completion of the work to insure that no possibility of fire exists. Such personnel shall be instructed as to the specific anticipated fire hazards and how the fire fighting equipment provided is to be used.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">The new requirements for fire watches should not therefore pose any additional burdens on employers, and will provide additional guidance for employers to help them determine when a fire watch is necessary. OSHA has concluded that these provisions are necessary and has included them in the final standard.</span></p><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Paragraph (b)(1) of § 1915.504 requires controlling ignition sources for work processes that generate slag, weld splatter, or sparks that might pass through an opening and cause a fire. It has been adapted from NFPA 51B-1999 Standard for Fire Prevention During Welding, Cutting, and Other Hot Work, (Ex. 19-3) and § 1910.252(a)(2)(iii)(A)(3). The intent is to have a performance oriented requirement. If a spark can get through an opening and cause a fire, then the area must be protected. No change has been made to this provision in the final rule.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Paragraph (b)(2) of § 1915.504 recognizes that ignition sources can be controlled through the use of fire-resistant guards or curtains. Where the combustible materials cannot be protected from a possible ignition source, the employer must post a fire watch. Combustible materials can be protected through the use of fire-resistant guards or curtains. For example, a sandwich-type bulkhead could be safely protected from ignition of the combustible materials during hot work by using a fire-resistant guard or curtain. No comments were received on this paragraph. OSHA has adopted this paragraph without change.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Paragraph (b)(3) of § 1915.504 includes the 35-foot requirements (minimum distance of combustible materials from hot work) from the § 1910.252(a)(2)(vii) Subpart Q, Welding, Cutting and Brazing and NFPA 51B-1999 Standard for Fire During Welding, Cutting, and Other Hot Work (Ex. 19-3). In this paragraph, OSHA requires that an employer post a fire watch unless combustible materials are relocated to at least 35 feet beyond the hot work area, or are protected by shielding.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Numerous commenters objected to the 35 foot limit in this paragraph (Exs. 21-10; 21-15; 21-16; 22-1; 22-6 through 22-11; 22-14). In a representative comment, Bath Iron Works stated:</span></p><span data-dcnode-id="3063" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">In many cases hot work can be safely performed within 35 feet from unprotected, unshielded combustible materials because the ignition source cannot physically reach the combustible material. The material is considered to be protected by location. For instance: The overhead of a space contains combustible insulation. A welder needs to weld a deck penetration in the space. The welder's sparks cannot physically reach the combustible materials on the overhead because of their location. This is considered to be guarded or shielded by location. It meets the intent of the standard by adequately preventing fires. The standard does not explain that if there is no potential for the hot work to ignite the combustible material then the 35-foot rule is not applicable (Ex. 21-3).</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">NGNN added:</span></p><span data-dcnode-id="3057" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">[W]e recommend performance oriented language that requires the employer to ensure that combustibles are removed or protected when they could be ignited by the intended hot work. Removing or shielding combustible materials for a distance of 35 feet when it is not necessary to prevent ignition places a significant financial burden on the employer with no added degree of safety. We estimate that the current language will cost NGNN approximately $28 million dollars annually in labor alone. (Ex. 21-8).</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">NGNN recommended that paragraph (b)(3) be changed to read: "Combustible materials that could be affected by the intended hot work must be removed, protected with flame proof covers, or otherwise shielded with metal or fire resistant guards or curtains so that material will not be ignited by the hot work." (Ex. 21-8).</span></p><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">The Committee discussed the 35-foot distance at length and agreed that if hot work is within 35 feet of combustible material in any way, a fire watch must be posted. The 35-foot distance has been in regulatory requirements and national consensus standards for many years and reflects the current industry practice. The Agency has concluded that such protection is reasonable and necessary, and has included the 35-foot rule in the final standard.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Paragraph (b)(4) of § 1915.504 addresses the hazards associated with combustible coatings, sandwich-type construction, or other insulating materials. Besides shielding, cutting back, removing the materials, and posting a fire watch, an industry practice for the acoustic foams that are commonly found in inaccessible voids within sandwich type construction is to inert the areas to make them safe for hot work. Industry practice in these situations has been to also provide fire watches with charged fire hoses or portable extinguishers as fire protection measures.</span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">OSHA received many comments on this paragraph expressing a concern with the practice of inerting spaces (Exs. 21-8; 21-10; 21-15; 21-16; 22-1; 22-7 through 22-11). In a representative comment, Bath Iron Works stated:</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">The Summary and Explanation of the Proposed Rule further complicates matters by stating that "when flammable atmospheres are found adjacent to the hot work area, the employer can control the fire hazard by inerting the adjacent space with a non-reactive substance that will not support combustion." OSHA should correct this statement as it falsely implies that the employer can inert flammable atmospheres. This promotes employers to prepare spaces that contain flammable atmospheres without seeking a Marine Chemist's assistance. This is a recipe for disaster if performed by an unqualified individual. Flammable atmospheres are covered under Subpart B where a Marine Chemist certificate is required for hot work. NFPA 306, Standard for the Control of Gas Hazards on Vessels, states that "The Marine Chemist will approve the use of the inerting medium and personally supervise introduction of the inerting medium into the space being inerted, except in situations where an inerting medium has been introduced prior to the vessel's arrival at the repair facility." It recognizes the hazards associated with the inerting process and places the responsibility with the Marine Chemist. It would be in OSHA's best interest to maintain this status quo (Ex. 21-3).</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Recommendations for revising paragraph (b)(4) in the proposed standard from several commenters included (1) removing the language "or the space inerted;" (2) adding the words "or the space inerted by a Marine Chemist or Coast Guard authorized person;" and (3) adding the words "or the space inerted by a qualified individual" and identifying who is qualified. In addition, Bath Iron Works stated that "[T]he summary and Explanation should be corrected as it improperly states that employers can inert flammable atmospheres." (Ex. 21-3).</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">OSHA agrees with these commenters that inerting a space is an activity that requires strict procedures to assure worker safety during the operation. However, it was not OSHA's intent to imply that the inerting of any space was an alternative. It was OSHA's intent to only allow inerting within the inaccessible space inside a sandwich type construction, not in any other confined or enclosed space. When an employer is dealing with a confined or enclosed space, the requirements for the use of a marine chemist under Subpart B continue to apply. To make it clear that the inerting allowed in § 1915.504 only applies in limited circumstances, OSHA has reworded the § 1915.504(b)(4) requirements as follows: "On or near insulation, combustible coatings, or sandwich-type construction, that cannot be shielded, cut back or removed, or on a space within a sandwich type construction that cannot be inerted."</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Paragraph (b)(5) of § 1915.504 addresses the potential hazards of adjacent spaces. This paragraph is adapted from existing § 1915.52(a)(3), which states: "[S]ince direct penetration of sparks or heat transfer may introduce a fire hazard to an adjacent compartment, the same precautions shall be taken on the opposite side as are taken on the side on which the welding is performed." During hot work on or near insulation, combustible coatings, or sandwich-type construction on either side, if the employer cannot cut back or remove the materials or inert the space within the sandwich type construction, a fire watch must also be posted on the opposite side of the hot work. This requirement is intended to address the increased fire hazard potential that results from hot work conducted in areas with, or adjacent to, polyurethane or other organic foams.</span></p><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">In cases where hot material from hot work could spread or fall over more than one level, as in trunks and machinery spaces, a fire watch must be stationed at each affected level unless positive means are available to prevent the spread or fall of hot material. Positive means could be accomplished by placing barriers or by physically isolating an area. The same is true for adjacent spaces; a fire watch must be stationed at each affected work area. In these instances, two or more employees may be needed to perform the fire watch. OSHA received no comments on this paragraph; it is carried forward in the final rule without change.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Paragraph (b)(6) of § 1915.504 requires a fire watch during hot work when it is performed on pipes or other metal in contact with insulation, combustible coatings, or combustible materials on or near decks, bulkheads, partitions, or overheads if the work is close enough to cause ignition by radiation or conduction. The Agency requested information from the industry on the use of the term "bulkhead" and "deck" since they refer only to vessels and vessel sections. Bath Iron Works stated that these terms "[a]re well known by the vast majority of shipyard employees." From a large shipyard's view point, bulkhead and deck is the proper method of identifying these structures." (Ex. 21-3-1). OSHA agrees and has maintained these terms in the final standard. No other comments were received on this paragraph and OSHA has carried it forward in the final rule.</span></p><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Paragraph (b)(7) of § 1915.504 requires a fire watch if hot work is conducted close enough to combustible pipe or cable runs to cause ignition. This provision takes into account the large number of cable runs through vessel compartments. Although these cables must have low flame spread and smoke production rates, they are still combustible and have been responsible for the spread of fires. Also, the use of combustible piping is increasing, and although required to meet strict flame spread and smoke production criteria, the potential for fire spread through pipe runs is the same as through cable runs and should therefore be safeguarded.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">In the one comment received on this paragraph, Bath Iron Works stated that:</span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Paragraphs (b)(5), (b)(6) and (b)(7) can be rolled into paragraph (b)(4). They all address the potential for hot work to ignite combustible materials and the prevention methods are already listed in (b)(4), which are shielding, removal or inerting. It is unclear why these 4 paragraphs were treated separately as they appear to address the same hazard (Ex. 21-3).</span></p><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Paragraph (b)(4) contains a general requirement to post a fire watch when hot work is being performed on or near insulation, combustible coatings, or sandwich type construction that cannot be protected, while the three following paragraphs provide detailed guidance for specific situations. Paragraph (b)(5) requires a fire watch when there is a fire danger caused by combustible material on the opposite side of the object on which hot work is being performed. Paragraph (b)(6) requires a fire watch when hot work is being performed in proximity to insulated materials and combustible materials or coatings, and paragraph (b)(7) requires a fire watch when hot work is being performed near unprotected combustible pipe or cable runs. OSHA believes that these paragraphs provide additional information describing the specific circumstances when a fire watch is needed, and will be of value for employers, employees, and safety professionals who are determining when a fire watch is required. OSHA has therefore maintained the regulatory language in the final standard.</span></p><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Assigning Employees To Fire Watch Duty</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Paragraph (c) of § 1915.504 outlines the assignment of fire watch duty. Proposed paragraph (c)(1) of § 1915.504 stated that the employer must not assign other duties to an employee assigned to fire watch. OSHA has further clarified in the final standard that an employee must not be assigned other duties when designated as fire watch by the employer while hot work is in progress. The fire watch posting is crucial to maintaining safe working areas. For example, welders with their shields down rely totally on the fire watch's observations. The watch should not be distracted by having other duties assigned at the same time.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Two commenters stated that:</span></p><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">[T]here are a variety of other duties that can be accomplished by a fire watch that will not interfere with his/her ability to perform their duties as a fire watch, and in some cases may serve as a means of fire prevention, including activities such as removal and management of potentially combustible material generated during the hot work operations, assisting with welding lead and burning line management, positioning of local area ventilation, etc. We suggest that the language in § 1915.504 (c)(1) be amended to read; "The employer may only assign other duties to an employee assigned to fire watch, that will not interfere with the performance of a fire watch's primary duty;"* * *. (Exs. 21-17-1; 22-2).</span></p><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Another recommendation was: "The employer may only assign other duties to an employee assigned to fire watch, while the hot work is [not] in progress." (Exs. 21-4; 21-5; 21-6).</span></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">A group of commenters stated:</span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">[T]his entire section defines the duties of a fire watch. It specifically states that the employer cannot assign any additional duties to this employee. It appears to have been written with a focus on a fire watch's reactions to a fire, rather than a fire watch helping to prevent and/or eliminate the potential for fire. Assigning a fire watch implies that a fire hazard exists and someone has determined it is necessary to implement additional controls. The proposed standard's description of a fire watch's duty must provide latitude for the employer to permit the fire watch to maintain safe conditions. Duties such as keeping fire resistant guards or curtains wet, ensuring that fire resistant guards or curtains are maintained in their original position and general housekeeping must be permitted. Preventing fires should be an integral part of a fire watch's duty. In the preamble, OSHA recognized the importance of maintaining conditions. Recommendation: Rewrite § 1915.504(c)(1) "The employer must not assign other duties to an employee assigned to fire watch that would prevent him or her from performing their fire watch duties. Fire watch duties may include, for example, watching for and extinguishing incipient fires, ensuring that fire resistant guards or curtains are maintained in their original position, general housekeeping and maintaining the conditions of the area to eliminate combustible hazards' (Exs. 21-10; 21-15; 21-16; 22-1; 22-6; 22-7 through 22-11).</span></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">OSHA does not agree that fire watches should have other duties, such as those mentioned in the comments, while hot work is in progress. Fire watches must not have any distractions while performing their duties. The point is not that they only react to actual fires, but that they observe incipient fires as soon as possible. Accidents and fatalities have occurred where fire watches have been busy with other tasks or not directly observing employees performing hot work. It is crucial that a fire watch have only one task at hand " to watch for and respond to fire hazards that occur during hot work. Should that employee be distracted in any way by performing another task, the safety of other employees is at risk.</span></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">OSHA does agree with the comments that under certain conditions the fire watch should be able to assist with fire prevention duties. In order to effectively carry out the fire watch duties, the fire watch must not perform other duties during hot work. After the hot work is completed, however, the fire watch must remain in the area for at least 30 minutes to assure that there is no further fire hazard, unless the employer or its representative surveys the area and determines that there is no further fire hazard. During this 30-minute period, the fire watch can perform other fire prevention duties. When hot work is not being performed, there is no longer a fire watch, and the fire watch can perform other work.</span></p><span data-dcnode-id="2985" instrument_node="">
</span><p data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">If the employer has authorized hot work under § 1915.503, the area must be free of fire hazards and deemed safe for the hot work. Therefore, the employer only needs to address a change in the original conditions, such as combustible material or an out of position fire curtain. Immediate action to maintain fire hazard free conditions under § 1915.503(b)(1) is required. In this situation, the fire watch is allowed to stop the hot work and assist with fire prevention activities, such as wetting down a fire blanket, repositioning a fire curtain, and removing combustible debris that has entered the area. OSHA has modified the language of § 1915.504(c)(1) to prohibit the assignment of other duties "while hot work is in progress," and has added a requirement in § 1915.504(c)(2)(iii), (discussed below) for the employer to authorize the fire watch to stop work, if necessary, and restore safe conditions in the area.</span></p><span data-dcnode-id="2982" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Paragraph (c)(2)(i) requires that a fire watch must have a clear view of all areas assigned. Depending on the specific circumstances, two or more employees may be required in the fire watch to assure that all areas are within view. For example, a fire watch employee may be needed on each side of a bulkhead on which hot work is being performed. This requirement also effectively precludes a hot work employee acting as his or her own fire watch.</span></p><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Paragraph (c)(2)(ii) of § 1915.504 requires the employer to ensure that employees assigned to fire watch duty can communicate with workers exposed to hot work. Communication is important because a fire watch employee may not be able to see a hot worker when, for example, the fire watch employee is on the other side of a bulkhead from the hot worker (a situation that may require two or more employees to perform the fire watch). OSHA does not want to limit the means of communication. For example, in the case of a fire watch employee on the other side of the bulkhead from the employee doing hot work, the means may be as simple as tapping on the bulkhead to signal whether the hot worker can continue or must stop, or it could be an electronic communication system such as radio communication.</span></p><span data-dcnode-id="2976" instrument_node="">
</span><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">NGNN commented that an additional provision should be included in this paragraph:</span></p><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Duties of fire watch and hot workers should include maintaining and reestablishing safe conditions if conditions are altered during their absence. Recommend: that a new paragraph (2)(iii) be added: "Ensures that safe conditions are maintained within the area affected by the hot work." (Ex. 21-8).</span></p><span data-dcnode-id="2970" instrument_node="">
</span><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">OSHA agrees that this is a useful addition to the paragraph. In addition to detecting potential fires, the fire watch should also ensure safe conditions. Fire watches are trained to detect fires and can attempt to extinguish any fire in the area if they are qualified and able to do so. If they are not qualified or able to extinguish the fire, they then must alert employees and activate the alarm, which will start the evacuation procedures. All of these factors qualify as ensuring safe conditions. As discussed above, OSHA agrees with the above recommendation of adding a provision that would ensure that safe conditions are maintained. This does not impose any additional requirements on the employer, and is consistent with the remaining provisions in § 1915.504(c). Therefore, OSHA has added the following provision at (c)(2)(iii) requiring the employer to assure that employees assigned to fire watch duty: "Are authorized to stop hot work, if necessary, and restore safe conditions within the work area." The remaining provisions in § 1915.504(c) have been renumbered.</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Proposed paragraph (c)(2)(iii) of § 1915.504 specified that the fire watch must remain in the hot work area at least 30 minutes after hot work is completed. The fire watch can be relieved sooner if the employer or the employer's representative surveys the exposed areas, conducts a post-work hazard assessment, and determines that no further fire hazard exists. Obviously, this determination can only be made after a hazard assessment is completed. The intent of this provision is to encourage employers or their representative to use the hazard assessment process throughout the work -- at the beginning, middle (to see if conditions have changed), and at the end (to determine how long the fire watch may be needed). No comments were received on the proposed provision and OSHA has carried it forward in the final rule renumbered as (c)(2)(iv).</span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Proposed paragraph (c)(2)(iv) of § 1915.504 required that the employer ensure that employees assigned to fire watch duty are trained to detect fires that occur in areas exposed to hot work. (For a further explanation, see the Training section at § 1915.508.) Proposed paragraph (c)(2)(v) of § 1915.504 required that the fire watch must attempt to extinguish any incipient stage fires in the assigned work area that are within the available equipment's capacity and within the fire watch's training qualifications as defined in § 1915.508 Training. The term "incipient stage fire" is defined in the general industry fire protection standard 29 CFR 1910.155(c)(26): "Incipient stage fire means a fire which is in the initial or beginning stage and which can be controlled or extinguished by portable fire extinguishers, Class II standpipe or small hose systems without the need for protective clothing or breathing apparatus." In its proposal, OSHA specifically asked whether this definition needed to be in the final standard (67 FR 76228). No comments were received on this subject. However, the Agency has added this term into the definitions (see § 1915.509 for discussion). Proposed paragraphs (c)(2)(iv) and (v) have been carried forward unchanged in the final standard but have been re- numbered as (c)(2)(v) and (c)(2)(vi).</span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Proposed paragraph (c)(2)(vi) of § 1915.504 required that the fire watch alert employees of any fire that goes beyond the incipient stage. The method the fire watch uses to alert other employees is not specified. The fire watch can alert in the way most suited to the worksite and conditions. Whether this is accomplished by shouting, radioing across bulkheads, waving of arms, or making hand signals is left up to the employer who will have to instruct the fire watch. In a noisy working environment, it might be most appropriate to tap hot workers on the shoulder and then motion to them to follow or exit the area. In a smoky situation, vocal communication would be more appropriate. Proposed paragraph (c)(2)(vii) of § 1915.504 stated that if fire watches are unable to extinguish fire in the areas exposed to the hot work, they must activate the alarm and start the evacuation procedure as trained, according to § 1915.508(c)(2)(xi) and the employer's fire safety plan, § 1915.502. No comments were received on these paragraphs, and they have been carried forward in the final standard re-numbered as (c)(2)(vii) and (c)(2)(viii).</span></p><span data-dcnode-id="2958" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Paragraph (c)(3) of § 1915.504 requires the employer to ensure that employees assigned to fire watch are physically capable of performing these duties.</span></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">During the Committee meetings, there was a concern that each member of a fire watch be able to do his or her job. Although there was much discussion on the issue, the Committee did not include a requirement stating that the employer must make sure that personnel who are expected to stand fire watch be capable of carrying out the duties of fire watch. The Committee members believed that the employer would be the best judge of physical capability and mental alertness of the fire watch. OSHA, therefore, did not include such a requirement in its proposal. Nevertheless, Bath Iron Works commented that:</span></p><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">There are no physical requirements for the fire watch to comply with. This has been a common Labor/management conflict and a cause for concern.* * * Management may select employees on "light duty" (not capable of lifting an extinguisher) to act as a fire watch, or choose not to hire others that cannot perform the function as a result of a physical limitation. In either case, only employees that are physically capable of utilizing the fire extinguishing equipment in a variety of scenarios such as: lugging an extinguisher down inclined ladders or up vertical ladders, hauling hoses, etc. should be assigned to this duty. By spelling out this requirement in the standard we can be assured that employees performing this critical function are those that are capably fit to do so. Recommend: Add a new paragraph (c)(4) The employer shall ensure that each fire watch is physically capable to carry out his/her expected functions (Ex. 21-3).</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Although it is the employer's responsibility to select an appropriate fire watch, OSHA feels that in performing this duty, the employer must assure that the employee be in good enough physical condition to fulfill his or her duties. For instance, an employee would need to have the use of both arms to lift and correctly use a fire extinguisher; be able to evacuate the work area if needed; and be able to communicate adequately in the event of a fire. If an employee cannot physically perform all of the duties of fire watch, the employer should not put that employee in such a work situation. Therefore, an additional requirement is being added to § 1915.504(c). Paragraph (c)(3) requires that: "The employer must ensure that employees assigned to fire watch are physically capable of performing these duties."</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2942"><strong data-dcnode-id="2943"><em data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Section 1915.505 Fire Response</span></em></strong></p><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2940" instrument_node="">At present, OSHA does not have any specific requirements in Part 1915 for fire response in shipyard employment. This new section creates a standard that addresses shipyard fire response and is derived from the requirements of 29 CFR 1910.156 Fire brigades and from some of the provisions in NFPA 1500-2002 </span><strong data-dcnode-id="2937"><em data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Standard on Fire Department Occupational Safety and Health Program</span></em></strong><span data-dcnode-id="2936" instrument_node=""> (Ex. 19-5).</span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">Responders to shipyard fires encounter a complex set of fire hazards involving buildings, as well as vessels in dry-dock, underway, afloat, or docked alongside a quay. Fire responders need to be prepared to safely and successfully handle a wide range of fire scenarios, from a flammable liquid storage room in a shipyard building to oil-soaked rags in the engine room of a ship. The types of fires could include ordinary combustible materials (such as wood, paper, or cloth), flammable or combustible liquids (such as oil, fuels, paints, or chemicals), insulation and other materials that may give off toxic gases and smoke during a fire, electrical fires (involving energized motors, circuit controls, transformers, or wiring), or even a rare combustible metal fire (involving metals such as magnesium, or titanium).</span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">A fire response organization, as defined in section 1915.509 Definitions, may be provided by: (1) Fire brigades; (2) shipyard fire departments; (3) private or contractual fire departments; and (4) municipal fire departments.</span></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Consistent with the recommendations of the Committee, OSHA is requiring that the shipyard liaison's communication with an outside fire response organization address facility and layout familiarization and coordination protocols. Federal OSHA does not have jurisdiction over state and municipal fire departments or volunteers so the standard does not cover them. However, OSHA intends to promote coordination between the shipyard and the outside fire response organization so they can work together safely. OSHA believes that any fire response organization that expects to respond to shipyard fires will benefit from the coordination activities required by this standard, and will be able to respond to fires faster, more effectively, and with greater safety for the shipyard workers and their own fire response members.</span></p><span data-dcnode-id="2925" instrument_node="">
</span><p data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">OSHA also wants to be clear that shipyard fire responders do not include support personnel responding at or near fires who have only limited support functions to perform. These support functions may include providing information to fire responders, and securing utilities, such as electrical, ventilation, and compressed air and oxy- fuel lines. These support personnel are not expected to fight fires but to perform such tasks as shutting down gas lines or disconnecting electrical service that support the fire response personnel. NFPA submitted a statement in support of this provision.</span></p><span data-dcnode-id="2922" instrument_node="">
</span><p data-dcnode-id="2916"><span data-dcnode-id="2921" instrument_node="">NFPA also supports the proposed requirements in § 1915.505 pertaining to Fire Response. The negotiated rulemaking committee highlighted a number of issues during its deliberations related to the complex fire hazards that could be encountered by any fire response unit, whether shipyard personnel or outside fire response organization. Shipyard fires could involve structural fires associated with the shipyard buildings or the fires could occur on the vessels during construction or repair. This fact about the potential locations for fires demonstrates the complex nature of the task facing any response unit. The Committee relied on OSHA's Fire Brigade requirements from 29 CFR 1910.156 and those requirements from NFPA 1500, </span><strong data-dcnode-id="2918"><em data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Fire Department Occupational Safety and Health Program</span></em></strong><span data-dcnode-id="2917" instrument_node=""> to develop a comprehensive standard that specifically addresses the shipyard fire response structure and function. NFPA commends OSHA for using voluntary consensus standards where applicable in this proposed standard. (Ex. 21-14).</span></p><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">Employer Responsibilities</span></p><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">In paragraph (a)(1) of § 1915.505, the shipyard employer is required to determine who will perform fire response in the shipyard and what type of response will be provided. Some shipyard employers, typically those with very large facilities, employ full-time shipyard firefighters and provide them with response apparatus and equipment. At the other end of the spectrum are employers at small shipyards who must rely largely on public fire protection. Because fire response capabilities vary widely within the shipyard industry, each shipyard employer must take responsibility for determining who will provide fire response services and what those services will be.</span></p><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Paragraph (a)(2)(i) of § 1915.505 requires the employer to create and maintain a written policy that describes the internal and outside fire response organizations that the employer will use. In the proposal, OSHA required a "written statement or policy" (67 FR 76248) in § 1915.505. Upon further review, OSHA was concerned that this would cause some confusion with other requirements in subpart P. Therefore, the Agency decided to alter the language in § 1915.505 to read "written policy" in all requirements that were proposed as "written statement or policy." This word change can be found in paragraphs (a)(2(i) and (ii), (b)(1), (b)(2), (b)(3), (b)(4), and (b)(5) of § 1915.505.</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Paragraph (a)(2)(ii) of § 1915.505 requires the employer to create, maintain, and update a written policy that defines what evacuation procedures employees must follow if the employer chooses to require a total or partial evacuation of the worksite at the time of a fire. No comments were received on paragraphs (a)(1) to (a)(3), and OSHA is carrying them forward in the final rule.</span></p><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Required Written Policy Information</span></p><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Paragraph (b) of § 1915.505 describes the information that must be included in the written policy required by this section. The written policy must set forth the basis for operating an internal fire response service, working with an outside fire response service, or using a combination of internal and outside fire response. A key point is to set out clearly the specific functions the fire response service is authorized and expected to perform. Employers must establish the specific functions that the fire response service will provide. The employer also must furnish the necessary resources for delivering the designated services. Such services might include structural fire response, emergency medical services, hazardous materials response, high-angle rescue, and heavy rescue.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">OSHA requires in paragraph (b)(1) of § 1915.505 that, if the employer chooses to provide internal fire response, then the employer must create, maintain, and update a written policy that defines the fire response to be provided. The information would include the organizational structure of the fire response service; the number of trained fire response employees; the minimum number of fire response employees necessary; the number and types of apparatuses; a description of the fire suppression operations at the employer's facility; training requirements; expected fire response functions that may need to be carried out; and procedures for use of protective clothing and equipment. Spelling out the specific parameters of services to be provided allows the fire response service to plan, staff, equip, train, and deploy members to perform these duties.</span></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Similarly, OSHA requires in paragraph (b)(2) of § 1915.505 that, if the employer chooses to use an outside fire response organization, then the employer must include specific information in the employer's written policy. The policy must include the following: The types of fire suppression incidents to which the fire response organization is expected to respond at the employer's facility or worksite (paragraph (b)(2)(i)); the liaison between the employer and the outside fire response organization (paragraph (b)(2)(ii)); and a plan for fire response functions (paragraph (b)(2)(iii)). This plan for fire response functions must include procedures for obtaining help from other fire response organizations (paragraph(b)(2)(iii)(A)), familiarizing the external fire response organization with the layout of the employer's facility or worksite, including access routes to controlled areas, and site-specific operations, occupancies, vessels or vessel sections, and hazards (paragraph (b)(2)(iii)(B)). The plan must also set forth how hose and coupling connection threads are to be made compatible and where the adapter couplings are kept (paragraph (b)(2)(iii)(C)), or, as an alternative, must state that the employer will not allow the use of incompatible hose connections (paragraph (b)(2)(iii)(D)).</span></p><span data-dcnode-id="2891" instrument_node="">
</span><p data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">OSHA further requires in paragraph (b)(3) of § 1915.505 that, if the employer chooses to use a combination of an internal and an outside fire response organization, then the employer must define the fire response services in addition to the requirements in paragraphs (b)(1) and (2) above, that will be provided by each fire response organization. Specifically, the following information must be included: The basic organizational structure of the combined fire response; the number of combined trained fire responders; the fire response functions that need to be carried out; the minimum number of fire response employees necessary; the number and types of apparatus; and a description of the fire suppression operations established by written standard operating procedures for each particular type of fire response at the worksite; and the type, amount, and frequency of joint training with the outside fire response organizations if given to fire response employees (paragraphs (b)(3)(i) through (v)).</span></p><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Paragraph (b)(3) requires that the employer develop a written policy that describes joint training activities if such training is part of the employers plan. However, OSHA is not requiring fire responders from an outside fire response organization to participate in joint training because the standard does not apply to such outside fire organizations. The employer must make sure that the internal and external fire responses are coordinated so that the fire response is safe and effective. It would be sensible and responsible to coordinate training efforts between the two groups of fire responders. OSHA strongly recommends that internal and outside fire responders participate in joint training. In addition, it would be responsible to have the outside fire response organizations involved in the development of the written policy.</span></p><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Paragraph (b)(4) of § 1915.505 addresses OSHA's longstanding policy that employers must ensure employee safety through evacuation in case of fire. The employer's evacuation policy must include the following: Emergency escape procedures; procedures to be followed by employees who may remain longer in the worksite to perform critical shipyard operations before they evacuate; procedures to account for all employees after emergency evacuation is completed; the preferred means of reporting fires and other emergencies; and names or job titles of the employees or departments who may be contacted for further information or explanation of duties. These requirements are based on similar requirements found in the general industry standards for employee emergency plans and fire prevention plans (29 CFR 1910.38 and .39).</span></p><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Paragraph (b)(4)(i) requires that emergency escape procedures be included in the written policy. Emergency escape procedures in shipyard employment can vary greatly depending upon whether the worksite is located on a vessel or vessel section or in a land-side facility. For example, on a vessel at anchorage, escape routes from the vessel may be more difficult to identify than those found in land-side facilities, such as a machine shop, welding shop, cafeteria, employment office, or similar worksite. Paragraph (b)(4)(ii) requires procedures to protect employees who must remain behind to perform critical shipyard operations before they evacuate. Critical shipyard operations may include shutting down a vessel's power plant, securing utilities to the fire area, or similar activities. Additionally, accountability procedures for all employees following emergency evacuation must be established, as set forth in paragraph (b)(4)(iii). For example, employees could be directed to report to a specific location after evacuation. Another important element of the evacuation policy, found in paragraph (b)(4)(iv), is the preferred means of reporting fires or other emergencies. Examples include telephone or radio communications, fire alarms, steam whistles, verbal communication, or other tactile, visual, or audible means of communication at the employer's discretion. Finally, as a means to administer the evacuation policy effectively, the written policy must indicate the key individuals by name, job title, or department to be contacted for further information or explanation of duties under the policy, paragraph (b)(4)(v).</span></p><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Paragraph (b)(5) requires that the employer include a description of the emergency rescue procedures and names or job titles of the employees who are assigned to perform rescue and emergency response. OSHA received no comments on any of the requirements in § 1915.505(b), and is carrying them forward in the final standard.</span></p><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Medical Requirements for Shipyard Fire Response Employees</span></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Paragraph (c) of § 1915.505 addresses the physical and medical provisions for shipyard fire response employees. In paragraph (c)(1) of § 1915.505, OSHA requires that all fire response employees receive medical examinations to assure that they are physically and medically fit for the duties they are expected to perform. This approach is consistent with NFPA 600-2000 (Ex. 19-6) and NFPA 1500-2002 (Ex. 19-5), and with other OSHA standards, such as 29 CFR 1910.120 and 29 CFR 1910.156. Employees who perform fire response activities must be able to perform them properly without jeopardizing the safety and health of themselves and other firefighters. Fighting fires is a very hazardous and strenuous job. Some employees may not be physically able to engage in a fire response situation that would require hours of difficult and heavy-duty work. OSHA is requiring the employee's physical and mental fitness be in accord with the duties the employee will perform.</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Paragraph (c)(2) of § 1915.505 requires that fire response employees who are required to wear respirators while performing their duties meet the medical requirements of § 1915.154 Respiratory protection. This requirement is consistent with 29 CFR 1910.134(c)(1) that requires employers whose employees use respirators to develop and implement a respiratory protection program. One of the elements of a respiratory protection program is providing medical evaluations for employees who use respirators.</span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Paragraph (c)(3) of § 1915.505 requires that the employer provide all fire response employees with an annual medical examination. Further, in paragraph (c)(4), medical records of fire response employees must be kept according to § 1915.1020 Access to employee exposure and medical records. These proposed requirements are consistent with existing regulations found in 29 CFR 1910.156 and 29 CFR 1910.134.</span></p><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">NGNN questioned the proposed requirements:</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Does OSHA mean that a medical examination should be conducted to identify any condition that may interfere with a fire fighter doing his or her job, or does OSHA intend that shipyard fire fighters also meet certain physical fitness standards? OSHA needs to address how the medical examination/physical standards requirement applies to shipyards that are unionized and have collective bargaining agreements in place. Can implementation be delayed for the remainder of the current agreement's term? Or until a fixed date, or are employers and unions required to reopen and negotiate impact and implementation of the new standards? This requirement should receive much more detailed consideration. (Ex. 21-8).</span></p><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">The employer is responsible for ensuring that employees are qualified for the fire response activities. The fire response employees must be able to perform their duties and not create another hazard by jeopardizing the safety and health of themselves or others. OSHA has not set specific physical fitness standards that the fire response worker must meet. It is up to the employer to determine the physical fitness level that will be needed to keep each fire response person safe. This will depend upon the duties each of them is assigned.</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Likewise, OSHA has not included any provisions to account for existing union agreements. The employer is responsible for addressing any issues related to union bargaining agreements. Employees must be protected equally under the standard, whether or not a union contract is in effect. In summary, without an annual examination, the employer can not be sure that the fire responder is able to do the job at hand. Therefore, OSHA has adopted this provision as proposed.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Organization of Internal Fire Response Functions</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Paragraph (d)(1) of § 1915.505 requires the employer to organize its fire response functions to ensure that there are enough resources to safely conduct emergency operations at the site. This language is consistent with the goals and language of paragraph 4.1.1 of NFPA 1500-2002 (Ex. 19-5) addressing the fire department's organizational statement. No comments were received on paragraph (d)(1) and OSHA has included it in the final rule as it was proposed.</span></p><span data-dcnode-id="2846" instrument_node="">
