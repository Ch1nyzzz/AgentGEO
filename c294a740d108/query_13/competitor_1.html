</span><h1 class="entry-title" data-dcnode-id="1210" itemprop="headline"><span data-dcnode-id="1211" instrument_node="">Types of Pumps</span></h1><span data-dcnode-id="1209" instrument_node=""> </span></header><span data-dcnode-id="1207" instrument_node="">
</span><div class="entry-content" data-dcnode-id="249" itemprop="text"><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">There are different types of pumps</span><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node=""> </span></strong><span data-dcnode-id="1202" instrument_node="">to transfers the water or gas, while we had made a detailed classification of pumps with merits &amp; demerits.</span></p><div data-dcnode-id="1199" data-inserter-version="2" id="ezoic-pub-ad-placeholder-121"></div><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">A pump is a device that is used to transfer fluids which may be liquids or slurries from one point to another.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">These pumps circulate fluid flows through the system over great distances which are unrestricted and uninterrupted.</span></p><div data-dcnode-id="1190" data-inserter-version="2" id="ezoic-pub-ad-placeholder-129"></div><span data-dcnode-id="1188" instrument_node="">
</span><div class="toc_transparent no_bullets contracted" data-dcnode-id="1136" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1180"><span data-dcnode-id="1187" instrument_node="">Table of Content</span><span data-dcnode-id="1186" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">[</span><a data-dcnode-id="1183" href="#"><span data-dcnode-id="1184" instrument_node="">show</span></a><span data-dcnode-id="1182" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1137" style="display: none;"><li data-dcnode-id="1177"><a data-dcnode-id="1178" href="#Different_Types_of_Pumps_in_Construction"><span data-dcnode-id="1179" instrument_node="">Different Types of Pumps in Construction:</span></a></li><li data-dcnode-id="1174"><a data-dcnode-id="1175" href="#Classification_of_pumps_Based_on_the_Principles_of_Operation"><span data-dcnode-id="1176" instrument_node="">Classification of pumps Based on the Principles of Operation:</span></a></li><li data-dcnode-id="1171"><a data-dcnode-id="1172" href="#1Displacement_pumps"><span data-dcnode-id="1173" instrument_node="">1.Displacement pumps:</span></a></li><li data-dcnode-id="1168"><a data-dcnode-id="1169" href="#A_Reciprocating_pumps"><span data-dcnode-id="1170" instrument_node="">A) Reciprocating pumps:</span></a></li><li data-dcnode-id="1165"><a data-dcnode-id="1166" href="#B_Rotary_Pumps"><span data-dcnode-id="1167" instrument_node="">B) Rotary Pumps:</span></a></li><li data-dcnode-id="1162"><a data-dcnode-id="1163" href="#2Centrifugal_pumps"><span data-dcnode-id="1164" instrument_node="">2.Centrifugal pumps:</span></a></li><li data-dcnode-id="1159"><a data-dcnode-id="1160" href="#A_Volute_pumps"><span data-dcnode-id="1161" instrument_node="">A) Volute pumps:</span></a></li><li data-dcnode-id="1156"><a data-dcnode-id="1157" href="#B_Turbine_pump"><span data-dcnode-id="1158" instrument_node="">B) Turbine pump:</span></a></li><li data-dcnode-id="1153"><a data-dcnode-id="1154" href="#5Impulse_pump"><span data-dcnode-id="1155" instrument_node="">5.Impulse pump:</span></a></li><li data-dcnode-id="1150"><a data-dcnode-id="1151" href="#Classification_of_pumps_Based_on_the_power_used"><span data-dcnode-id="1152" instrument_node="">Classification of pumps Based on the power used:</span></a></li><li data-dcnode-id="1147"><a data-dcnode-id="1148" href="#4Electric_motors"><span data-dcnode-id="1149" instrument_node="">4.Electric motors:</span></a></li><li data-dcnode-id="1144"><a data-dcnode-id="1145" href="#5Gasoline_or_Oil_Engine"><span data-dcnode-id="1146" instrument_node="">5.Gasoline or Oil Engine:</span></a></li><li data-dcnode-id="1141"><a data-dcnode-id="1142" href="#6Steam_engine"><span data-dcnode-id="1143" instrument_node="">6.Steam engine:</span></a></li><li data-dcnode-id="1138"><a data-dcnode-id="1139" href="#Conclusion"><span data-dcnode-id="1140" instrument_node="">Conclusion:</span></a></li></ul></div><span data-dcnode-id="1135" instrument_node="">
</span><h2 data-dcnode-id="1132" id="0-classification-of-pumps"><span data-dcnode-id="1133" id="Different_Types_of_Pumps_in_Construction"><span data-dcnode-id="1134" instrument_node="">Different Types of Pumps in Construction:</span></span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">The pumps can be classified by using different criteria, following are some of the essential criteria used for classifying the pumps:</span></p><span data-dcnode-id="1128" instrument_node="">
</span><h3 data-dcnode-id="1125" id="1-based-on-the-principles-of-operation-types-of-pumps"><span data-dcnode-id="1126" id="Classification_of_pumps_Based_on_the_Principles_of_Operation"><span data-dcnode-id="1127" instrument_node="">Classification of pumps Based on the Principles of Operation:</span></span></h3><span data-dcnode-id="1124" instrument_node="">
</span><h4 data-dcnode-id="1121" id="2-displacement-pumps"><span data-dcnode-id="1122" id="1Displacement_pumps"><span data-dcnode-id="1123" instrument_node="">1.Displacement pumps:</span></span></h4><span data-dcnode-id="1120" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1117"><figure class="alignright size-large is-resized" data-dcnode-id="1118"><img alt="Displacement pumps" data-dcnode-id="1119" height="209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-xN9GU7F0p50/XqpMQG7Fc4I/AAAAAAAABQ0/VooAoP6yMnoBMxYT1JTB6Y1_m4sqkvdiwCLcBGAsYHQ/s1600/Displacement%252Bpumps.jpg&amp;raw" width="345"></figure></div><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The movable parts of the pumps create a vacuum.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">This is done mechanically, i.e. the water is withdrawn into the pump by pressure, the mechanical part is displaced and the water is exhaled through the valve.</span></p><div data-dcnode-id="1109" data-inserter-version="2" id="ezoic-pub-ad-placeholder-130"></div><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The backflow of water is prevented by using appropriate types of valves.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">The displacement pumps are further classified as follows:</span></p><span data-dcnode-id="1101" instrument_node="">
</span><h4 data-dcnode-id="1098" id="3-reciprocating-pumps"><span data-dcnode-id="1099" id="A_Reciprocating_pumps"><span data-dcnode-id="1100" instrument_node="">A) Reciprocating pumps:</span></span></h4><span data-dcnode-id="1097" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1094"><figure class="alignleft size-large is-resized" data-dcnode-id="1095"><img alt="Reciprocating pumps" data-dcnode-id="1096" height="247" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-PKl7V8DiS4s/XqpMRADYCsI/AAAAAAAABQ8/Qz7HOKu2oDAX8YnFk_tAy5qK7GAjr8_PACLcBGAsYHQ/s1600/Reciprocating%252Bpumps.jpg&amp;raw" width="351"></figure></div><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">The </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constructionor.com/reciprocating-pump/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1091" instrument_node="">reciprocating pump</span></a><span data-dcnode-id="1089" instrument_node=""> is a positive displacement pump where a particular amount of liquid is collected in an enclosed volume.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">It is discharged using pressure for the required application.</span></p><div data-dcnode-id="1083" data-inserter-version="2" id="ezoic-pub-ad-placeholder-131"></div><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Reciprocating pumps are more suitable for low volume flow at high pressures.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">These pumps also can be further divided as,</span></p><span data-dcnode-id="1075" instrument_node="">
</span><ol data-dcnode-id="1066"><li data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Simple hand-operated reciprocating pumps.</span></li><li data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Power-operated deep, well reciprocating pumps.</span></li><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Single-acting reciprocating pumps.</span></li><li data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Double-acting reciprocating pumps.</span></li></ol><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Advantages of reciprocating pumps:</span></strong></p><span data-dcnode-id="1061" instrument_node="">
</span><ol data-dcnode-id="1054"><li data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The reciprocating pump gives high pressure at the outlet which has a high suction lift.</span></li><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">This pump does not require priming.</span></li><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">They are also used for wind.</span></li></ol><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1050"><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Disadvantages of reciprocating pumps:</span></strong></p><div data-dcnode-id="1048" data-inserter-version="2" id="ezoic-pub-ad-placeholder-132"></div><span data-dcnode-id="1046" instrument_node="">
</span><ol data-dcnode-id="1039"><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">High wear and tear therefore requiring very high maintenance.</span></li><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The initial cost is very high.</span></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">More substantial and heavier in size.</span></li></ol><span data-dcnode-id="1038" instrument_node="">
</span><h4 data-dcnode-id="1035" id="4-rotary-pumps"><span data-dcnode-id="1036" id="B_Rotary_Pumps"><span data-dcnode-id="1037" instrument_node="">B) Rotary Pumps:</span></span></h4><span data-dcnode-id="1034" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1031"><figure class="alignright size-large is-resized" data-dcnode-id="1032"><img alt="Rotary" data-dcnode-id="1033" height="263" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-Br8iX5M7rTg/XqpMR8GtmRI/AAAAAAAABRA/XoQQlR0yaW8oDBixZuz2AWpL7U0Cke-UQCLcBGAsYHQ/s1600/Rotary%252BPumps.png&amp;raw" width="395"></figure></div><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">In these pumps, rotating blades fit into the casing, and these blades push water through their displacement.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The water is pushed upward through the discharge pipe.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Rotary pumps are of two types such as </span></p><span data-dcnode-id="1021" instrument_node="">
</span><ul data-dcnode-id="1016"><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Gears rotary pump and</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Rotary pump.</span></li></ul><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1012"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Advantages of rotary pumps:</span></strong></p><div data-dcnode-id="1010" data-inserter-version="2" id="ezoic-pub-ad-placeholder-133"></div><span data-dcnode-id="1008" instrument_node="">
</span><ol data-dcnode-id="997"><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">They are self-primed.</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Their efficiency ranges from low to medium (up to the discharge of 2000 liters/minute).</span></li><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">They have no valves and easy to manufacture.</span></li><li data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Also, give steady flow.</span></li><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">They can also be used for personal use in the building for fire protection.</span></li></ol><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Disadvantages </span><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">of rotary pump</span></strong><span data-dcnode-id="992" instrument_node="">s:</span></strong></p><span data-dcnode-id="989" instrument_node="">
</span><ol data-dcnode-id="982"><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The required cost of the pump is high.</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Due to the abrasion of cams and gears, the maintenance cost increases.</span></li><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">They are unable to pump water with suspended material.</span></li></ol><span data-dcnode-id="981" instrument_node="">
</span><h4 data-dcnode-id="978" id="5-centrifugal-pumps"><span data-dcnode-id="979" id="2Centrifugal_pumps"><span data-dcnode-id="980" instrument_node="">2.Centrifugal pumps:</span></span></h4><span data-dcnode-id="977" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="974"><figure class="alignleft size-large is-resized" data-dcnode-id="975"><img alt="Centrifugal pumps" data-dcnode-id="976" height="219" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-MLBfDsg6pQs/XqpMQ-ThMRI/AAAAAAAABQ4/BCGNrTwCVF0cOiuBmwmpPebRFw3Tz_LxQCLcBGAsYHQ/s1600/Centrifugal%252Bpumps.png&amp;raw" width="422"></figure></div><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">This </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constructionor.com/centrifugal-pump/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">centrifugal pump</span></a><span data-dcnode-id="969" instrument_node=""> is designed to operate on the principles of centrifugal force.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The water entering the pump is rotated at a very high speed using an impeller.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Due to the centrifugal force, water is sent to the periphery.</span></p><div data-dcnode-id="960" data-inserter-version="2" id="ezoic-pub-ad-placeholder-134"></div><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Depending on the function, centrifugal pumps are classified as follows:</span></p><span data-dcnode-id="955" instrument_node="">
</span><h4 data-dcnode-id="952"><span data-dcnode-id="953" id="A_Volute_pumps"><span data-dcnode-id="954" instrument_node="">A) Volute pumps:</span></span></h4><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">In volute pumps, the velocity of water remains the same at all points in the channel allowing the water to be distributed at a higher rate in the pipe.</span></p><span data-dcnode-id="948" instrument_node="">
</span><h4 data-dcnode-id="945"><span data-dcnode-id="946" id="B_Turbine_pump"><span data-dcnode-id="947" instrument_node="">B) Turbine pump:</span></span></h4><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">In turbine pumps, the velocity of the water decreases before it enters the casing, these pumps converted the velocity head into the pressure head.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">These types of pumps are classified on the basis of the number of impellers used, i.e. the centrifugal pump using one impeller is known as a single-stage pump and where more than one impeller is used are known as double or multi-stage pumps.</span></p><div data-dcnode-id="937" data-inserter-version="2" id="ezoic-pub-ad-placeholder-135"></div><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Advantages of centrifugal pumps:</span></strong></p><span data-dcnode-id="931" instrument_node="">
</span><ol data-dcnode-id="920"><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">As centrifugal pumps are compact, they require less space.</span></li><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">They can be fixed to a high-speed driving mechanism.</span></li><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Due to its rotary motion, no noise is produced.</span></li><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The cost of production, therefore the price is low.</span></li><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The fixed easy mechanism, operation, and repair are also safe.</span></li></ol><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Disdvantages of centrifugal pumps</span></strong><span data-dcnode-id="916" instrument_node="">:</span></p><span data-dcnode-id="914" instrument_node="">
</span><ol data-dcnode-id="907"><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Additional priming is required.</span></li><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">High head may not be able to work.</span></li><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Cannot deal with high viscous fluid.</span></li></ol><span data-dcnode-id="906" instrument_node="">
</span><h4 data-dcnode-id="903" id="8-impulse-pump"><span data-dcnode-id="904" id="5Impulse_pump"><span data-dcnode-id="905" instrument_node="">5.Impulse pump:</span></span></h4><span data-dcnode-id="902" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="899"><figure class="alignright size-large is-resized" data-dcnode-id="900"><img alt="Impulse" data-dcnode-id="901" height="217" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-zbrbO9cOYgA/XqpMPzaYbjI/AAAAAAAABQw/tD5MrtJ2i9QEdM-uxlg-FFiJpGN__p1LQCLcBGAsYHQ/s1600/Impulse%252Bpump.jpg&amp;raw" width="315"></figure></div><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="897" instrument_node="">It is also known as a hydraulic ram and works on the principles of impulse.</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">By using a hydraulic ram, the water can be lifted to a considerable height.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="892" instrument_node="">These types of pumps have an inlet pipe, waste valve, distribution valve, piston, air chamber, and distribution pipe.</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">When this waste valve is not operating it is kept open, and the delivery valve remains closed.</span></p><div data-dcnode-id="887" data-inserter-version="2" id="ezoic-pub-ad-placeholder-136"></div><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="882"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Advantages of the Impulse pump:</span></strong></p><span data-dcnode-id="881" instrument_node="">
</span><ol data-dcnode-id="874"><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Impulse pump has very long durability.</span></li><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The work is very simple.</span></li><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">No external power is required to operate the pump, therefore it is very cheap to operate.</span></li></ol><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="870"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Disadvantages of the Impulse pump:</span></strong></p><span data-dcnode-id="869" instrument_node="">
</span><ol data-dcnode-id="864"><li data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">When it is in operation, it produces noise.</span></li><li data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">The dissipation of water is very high, it varies between 6: 1 and 2: 1.</span></li></ol><span data-dcnode-id="863" instrument_node="">

</span><h3 data-dcnode-id="329" id="9-based-on-the-power-used-types-of-pumps"><span data-dcnode-id="330" id="Classification_of_pumps_Based_on_the_power_used"><span data-dcnode-id="331" instrument_node="">Classification of pumps Based on the power used:</span></span></h3><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">The pumps are operated using various electrical engines, which based on the energy used to drive the drivers, we can classify them as follows:</span></p><span data-dcnode-id="325" instrument_node="">
</span><h4 data-dcnode-id="322"><span data-dcnode-id="323" id="4Electric_motors"><span data-dcnode-id="324" instrument_node="">4.Electric motors:</span></span></h4><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">They are used in the area where power supply is available.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Generally for city water supplies, electric motors are used because they operate during the off-peak period.</span></p><div data-dcnode-id="314" data-inserter-version="2" id="ezoic-pub-ad-placeholder-137"></div><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">When the electric motor is to be selected for the pumping station, its cost, simplicity, roughness, power factor starting torque and variation in speed are some of the essential points that are considered.</span></p><span data-dcnode-id="309" instrument_node="">
</span><h4 data-dcnode-id="306"><span data-dcnode-id="307" id="5Gasoline_or_Oil_Engine"><span data-dcnode-id="308" instrument_node="">5.Gasoline or Oil Engine:</span></span></h4><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">The cost of these engines is so high that they are commonly used as reserve arrangements.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">These type of pumps that are used in remote areas where electricity is not available.</span></p><span data-dcnode-id="299" instrument_node="">
</span><h4 data-dcnode-id="296"><span data-dcnode-id="297" id="6Steam_engine"><span data-dcnode-id="298" instrument_node="">6.Steam engine:</span></span></h4><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Steam engine was used in the past when electricity was not available.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Now in most places, they have been replaced by electric motors.</span></p><div data-dcnode-id="288" data-inserter-version="2" id="ezoic-pub-ad-placeholder-138"></div><span data-dcnode-id="286" instrument_node="">
</span><pre class="wp-block-verse" data-dcnode-id="276"><span data-dcnode-id="285" instrument_node="">Also read: </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constructionor.com/types-of-pipes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="284" instrument_node="">Types of Pipes</span></a><span data-dcnode-id="282" instrument_node="">, </span><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constructionor.com/types-of-arches/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="281" instrument_node="">Types of Arches</span></a><span data-dcnode-id="279" instrument_node=""> &amp; </span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constructionor.com/types-of-valves/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">Types of Valves</span></a></pre><span data-dcnode-id="275" instrument_node="">
</span><h3 data-dcnode-id="272" id="14-conclusion"><span data-dcnode-id="273" id="Conclusion"><span data-dcnode-id="274" instrument_node="">Conclusion:</span></span></h3><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="270" instrument_node="">There are many types of pump designs, but they are </span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ufdc.ufl.edu/IR00004603/00001" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="269" instrument_node="">classified</span></a><span data-dcnode-id="267" instrument_node=""> into centrifugal pumps and positive displacement pumps.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="264" instrument_node="">For </span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oaktrust.library.tamu.edu/handle/1969.1/164227" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="263" instrument_node="">performing</span></a><span data-dcnode-id="261" instrument_node=""> the construction activity properly, the correct type of pumps must be specified for each application.</span></p><span data-dcnode-id="259" instrument_node="">
