</span><article class="post-3392 post type-post status-publish format-standard has-post-thumbnail hentry category-marine-engines" data-dcnode-id="659" id="post-3392"><span data-dcnode-id="1093" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Pumps: Types of Pumps Used in Ship</span></h1><span data-dcnode-id="1089" instrument_node="">
</span></header><span data-dcnode-id="1087" instrument_node="">
</span><div class="entry-thumb" data-dcnode-id="1083"><span data-dcnode-id="1086" instrument_node="">
</span><img alt="" data-dcnode-id="1085" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/wp-content/uploads/2017/08/amsterdam-ship-bay-harbor-68135.jpeg&amp;raw"><span data-dcnode-id="1084" instrument_node="">
</span></div><span data-dcnode-id="1082" instrument_node="">
</span><div class="entry-meta clearfix" data-dcnode-id="1061"><span data-dcnode-id="1081" instrument_node="">
</span><span class="post-author" data-dcnode-id="1077"><span class="author vcard" data-dcnode-id="1078"><a class="url fn n" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/author/sailorinsight/"><span data-dcnode-id="1080" instrument_node="">Sailorinsight</span></a></span></span><span class="posted-on" data-dcnode-id="1070"><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/different-types-of-pumps-used-in-ship/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1075" datetime="2017-09-08T14:39:46+05:30"><span data-dcnode-id="1076" instrument_node="">September 8, 2017</span></time><span data-dcnode-id="1074" instrument_node="">
</span><time class="updated" data-dcnode-id="1072" datetime="2017-10-26T13:44:10+05:30"><span data-dcnode-id="1073" instrument_node="">October 26, 2017</span></time></a></span><span class="cat-links" data-dcnode-id="1067"><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/marine-engines/" rel="category tag"><span data-dcnode-id="1069" instrument_node="">Marine Engines</span></a></span><span data-dcnode-id="1066" instrument_node=""> </span><span class="comments-count" data-dcnode-id="1063"><a data-dcnode-id="1064" href="#respond"><span data-dcnode-id="1065" instrument_node="">0</span></a></span><span data-dcnode-id="1062" instrument_node=""> </span></div><span data-dcnode-id="1060" instrument_node="">
</span><div class="entry-content" data-dcnode-id="664"><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1056"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Gear pump/gear wheel pump / positive displacement pump</span></strong></p><span data-dcnode-id="1055" instrument_node="">
</span><ol data-dcnode-id="1029"><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">This is a rotary displacement or a rotary positive displacement pump.</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">There are two gears, one is driven by an electric motor through a chain or wheel drive. The other gear is known as the idle gear.</span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Initially, when there is no liquid in the pump casing, there is air inside it.</span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">As the gears start to move, the air gets trapped between each pair of two consecutive teeth and is dragged along the casing to the discharge side until there is no air left.</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Liquid from the tank will thus rise up into the suction side and is discharged in a similar manner.</span></li><span data-dcnode-id="1039" instrument_node="">
</span><li data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">For this reason, the pump is a self-priming pump.</span></li><span data-dcnode-id="1036" instrument_node="">
</span><li data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">These pumps give low discharge rate but a high discharge pressure.</span></li><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The flow rate is controlled by controlling the speed of the prime mover and also by the help of a by-pass valve attached to the suction and discharge lines.</span></li><span data-dcnode-id="1030" instrument_node="">
</span></ol><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1025"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Uses:</span></strong></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">This pump is used as lub-oil pump, </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/tag/boiler/"><span data-dcnode-id="1022" instrument_node="">boiler</span></a><span data-dcnode-id="1020" instrument_node=""> fuel oil pump, fuel oil transfer pump, main engine driven lub-oil pump.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Screw pump</span></strong></p><span data-dcnode-id="1014" instrument_node="">
</span><ol data-dcnode-id="994"><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">This type of a pump contains two shafts, each shaft has two screws, one right-handed and other left-handed.</span></li><span data-dcnode-id="1010" instrument_node="">
</span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">The screws are driven in phase by timing gear, unlike the gear pump in which one gear drives the other. This ensures that correct clearance is maintained between the screws. This avoids overheating and a possible seizure.</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">When the screws rotate, their close relation to each other causes small pockets in the helices, these pockets move axially and have the same effect as a piston moving constantly in one direction.</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">This type of a pump has suction sides on the outer ends from where the liquid is drawn into the screws and pumped inwards to discharge into the pump outlet.</span></li><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Even if the liquid level in the tank is below the pump level, the pump first draws in air or gases and creates a vacuum in the line, the liquid, therefore, rises up and reaches the pump.</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">A relief valve is fitted to avoid build-up of excessive pressure.</span></li><span data-dcnode-id="995" instrument_node="">
</span></ol><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Advantages</span></strong></p><span data-dcnode-id="989" instrument_node="">
</span><ol data-dcnode-id="975"><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Is self-priming, thus is very useful for high vapor pressure liquids. (chemicals/liquefied gases),</span></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Since these pumps can discharge both liquid and gases, they are very useful for tank draining and where the liquid flow is not constant, which may occur in lube oil systems of main engines, with the vessel rolling and pitching,</span></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">They are suitable for operation at high rpm, and thus can be driven by electric motor,</span></li><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">They are good for high viscosity fluids, pumps are quiet, smooth running and reliable.</span></li><span data-dcnode-id="976" instrument_node="">
</span></ol><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="971"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Double acting reciprocating pump</span></strong></p><span data-dcnode-id="970" instrument_node="">
</span><ol data-dcnode-id="935"><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Such type of pumps have a bucket type piston inside a cylindrical liner, the bucket is lined with piston rings.</span></li><span data-dcnode-id="966" instrument_node="">
</span><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">The bucket is connected to the gearbox by a piston rod, crosshead, and a conrod assembly. This gearbox is driven by an electric motor.</span></li><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">The liner is connected to independent sets of spring type discharge and suction valves.</span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The downward movement of the bucket creates a vacuum on the top of the bucket. Due to this, the suction valve of the top set opens and draws liquid into the liner.</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">The upward movement of the bucket creates a suction below the bucket, the suction valve in the bottom set now opens and draws liquid into the liner</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The upward movement of the bucket also causes the liquid on the top of the bucket to be forced into the top set, thus causing the discharge valve to lift. As the discharge valve lifts, the liquid flows into the discharge line.</span></li><span data-dcnode-id="951" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The next downward movement similarly causes the liquid below the bucket to be forced into the bottom set, thus lifting the discharge valve. The liquid flows into the discharge line.</span></li><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The same downward movement causes the similar effect as explained in point 4.</span></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">As this pump causes liquid to be discharged from both top and bottom, it is known as a double acting reciprocating pump.</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">An air vessel is provided in the discharge line to reduce the pressure fluctuations caused by up and down movement of the bucket.</span></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">A relief valve is also provided to avoid excessive pressure build up.</span></li><span data-dcnode-id="936" instrument_node="">
</span></ol><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Advantages</span></strong></p><span data-dcnode-id="930" instrument_node="">
</span><ol data-dcnode-id="919"><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">As they can handle large volumes of air/gases, they can be used as stripping pumps for oil, chemical or gas tankers,</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">As they are self-priming and can handle high suction lifts, they can be used as priming pumps, </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/tag/engine-room/"><span data-dcnode-id="924" instrument_node="">engine room</span></a><span data-dcnode-id="922" instrument_node=""> bilge pumps and cargo hold bilge pumps.</span></li><span data-dcnode-id="920" instrument_node="">
</span></ol><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Disadvantages</span></strong></p><div class="code-block code-block-1" data-dcnode-id="902" style="margin: 8px 0; clear: both;"><span data-dcnode-id="914" instrument_node="">
</span><span data-dcnode-id="911" instrument_node="">
</span><span data-dcnode-id="909" instrument_node="">
</span><div data-dcnode-id="904" id="568463721"><span data-dcnode-id="908" instrument_node="">
</span><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span><ol data-dcnode-id="896"><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Construction is complicated due to the presence of suction valve, discharge valve, air vessel and relief valve. All positive displacement pumps need a relief valve to prevent excess built up of pressure if delivery lines are closed.</span></li><span data-dcnode-id="897" instrument_node="">
</span></ol><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="892"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Centrifugal pumps</span></strong></p><span data-dcnode-id="891" instrument_node="">
</span><ol data-dcnode-id="850"><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">This type of a pump contains a rotating impeller with a stationary casing.</span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The impeller consists of curved vanes,</span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">There is an opening, eye at the center, from where the liquid is drawn into the pump.</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The impeller is connected to an electric motor by means of a shaft.</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The impeller rotates at a very high speed.</span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Fluid is thrown outward by the blades, due to centrifugal force.</span></li><span data-dcnode-id="872" instrument_node="">
</span><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The high-velocity fluid is collected in a specially shaped volute casing, where some of the kinetic energy is converted into pressure energy.</span></li><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">The fluid under pressure now leaves the impeller producing a drop in pressure behind in the eye of the impeller,</span></li><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">This causes the liquid from the suction line to flow into the pump, this fluid is also subsequently thrown out, the process continues.</span></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">This is possible only when there is fluid in the pump initially,</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">If there is no liquid initially, there will be air. As the air is very light </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/tag/density/"><span data-dcnode-id="858" instrument_node="">density</span></a><span data-dcnode-id="856" instrument_node="">, for a centrifugal pump to throw out air, it will have to rotate at a very very high speed (turbocharger blower).</span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">For the above reason, a centrifugal pump is not a self-priming pump. It has to initially primed with fluid.</span></li><span data-dcnode-id="851" instrument_node="">
</span></ol><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Priming of centrifugal pump </span></strong></p><span data-dcnode-id="843" instrument_node="">
</span><ol data-dcnode-id="832"><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">Use an air pump to initially drive out air from the suction branch and thus make the liquid rise into the eye of the impeller. Example </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sailorinsight.com/tag/emergency/"><span data-dcnode-id="840" instrument_node="">emergency</span></a><span data-dcnode-id="838" instrument_node=""> fire pump, bilge and ballast pump</span></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Priming can also be done by opening the sea chest valve, so that water which is at a higher level, flows inside the eye. Once liquid flows into the eye of the rotating impeller, suction can be changed over from the seaside to engine room bilges etc and pumping can now commence.</span></li><span data-dcnode-id="833" instrument_node="">
</span></ol><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="828"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Difference between positive displacement pump and centrifugal pump</span></strong></p><span data-dcnode-id="827" instrument_node="">

strument_node="">4</span></strong></td><td data-dcnode-id="764" width="336"><span data-dcnode-id="765" instrument_node="">Have low discharge rates.</span></td><td data-dcnode-id="761" width="336"><span data-dcnode-id="762" instrument_node="">Can have very high discharge rates.</span></td></tr><tr data-dcnode-id="746"><td data-dcnode-id="754" width="31"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">5</span></strong></td><td data-dcnode-id="751" width="336"><span data-dcnode-id="752" instrument_node="">Should never be started with the discharge valve shut.</span></td><td data-dcnode-id="748" width="336"><span data-dcnode-id="749" instrument_node="">Can be started with the discharge valve shut.</span></td></tr><tr data-dcnode-id="733"><td data-dcnode-id="741" width="31"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">6</span></strong></td><td data-dcnode-id="738" width="336"><span data-dcnode-id="739" instrument_node="">Needs a relief valve to be fitted on the discharge side.</span></td><td data-dcnode-id="735" width="336"><span data-dcnode-id="736" instrument_node="">A relief valve need not be fitted.</span></td></tr><tr data-dcnode-id="720"><td data-dcnode-id="728" width="31"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">7</span></strong></td><td data-dcnode-id="725" width="336"><span data-dcnode-id="726" instrument_node="">These pumps can be used for effective stripping.</span></td><td data-dcnode-id="722" width="336"><span data-dcnode-id="723" instrument_node="">Cannot be used for stripping as they loose suction once the liquid level falls too low.</span></td></tr></tbody></table><span data-dcnode-id="715" instrument_node="">
