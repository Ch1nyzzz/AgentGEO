</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="962" id="mntl-sc-block_1-0-1"><span data-dcnode-id="966" instrument_node="">
Water pumps are commonly used on construction sites for </span><a data-component="link" data-dcnode-id="964" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/what-is-dewatering-844520"><span data-dcnode-id="965" instrument_node="">dewatering</span></a><span data-dcnode-id="963" instrument_node=""> or removing excess water accumulation. Water can build up due to heavy rains or from a high water table, and pumps allow you to move the water quickly to minimize downtime. Water pumps suitable for this application come in two main types and can be electric, gas-powered, hydraulic, or manual.
</span></p><span data-dcnode-id="961" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="950" id="mntl-sc-block_1-0-2"><div class="comp mntl-block" data-dcnode-id="951" id="mntl-block_10-0"><span data-dcnode-id="960" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard1-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="953" data-height="1050" id="billboard1-sticky-dynamic_1-0" style="height: 1050px; top: 228px;"><span data-dcnode-id="959" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard1-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-immediate-ad" data-dcnode-id="955" id="mntl-sc-sticky-billboard-ad_1-0"><span data-dcnode-id="958" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="a5c285905877455993c237b6e6c2c126" data-auction-floor-value="415" data-dcnode-id="957" data-pos="atf" data-priority="2" data-rtb="true" data-sizes="[[300, 250],[300, 600],[160, 600],[300, 1050],[1, 2],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard"></div><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span></div><span data-dcnode-id="952" instrument_node="">
</span></div></div><span data-dcnode-id="949" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="948" id="toc-water-pump-types"></span><span data-dcnode-id="947" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="942" id="mntl-sc-block_1-0-3"><span data-dcnode-id="946" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> Water Pump Types </span></span><span data-dcnode-id="943" instrument_node=""> </span></h2><span data-dcnode-id="941" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="939" id="mntl-sc-block_1-0-5"><span data-dcnode-id="940" instrument_node="">
There are two basic types of water pumps: centrifugal and positive displacement. Both types are designed to move water from one place to another continuously.
</span></p><span data-dcnode-id="938" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="927" id="mntl-sc-block_1-0-6"><div class="comp mntl-block" data-dcnode-id="928" id="mntl-block_11-0"><span data-dcnode-id="937" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard2-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="930" data-height="600" id="billboard2-sticky-dynamic_1-0" style="height: 600px; top: 1378px;"><span data-dcnode-id="936" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard2-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-immediate-ad" data-dcnode-id="932" id="mntl-sc-sticky-billboard-ad_3-0"><span data-dcnode-id="935" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="2703e4e4838a416cb92cac93a4801b8d" data-auction-floor-value="285" data-dcnode-id="934" data-pos="btf1" data-priority="3" data-rtb="true" data-sizes="[[300, 250],[300, 600],[300, 601],[160, 600],[300, 251],[2, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard2"></div><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="929" instrument_node="">
</span></div></div><span data-dcnode-id="926" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="924" id="mntl-sc-block_1-0-8"><span data-dcnode-id="925" instrument_node="">
A centrifugal water pump uses a rotating impeller to move water into the pump and pressurize the discharge flow. Centrifugal water pumps come in several different types, including standard, trash, and submersible models. All liquids can be pumped using centrifugal water pumps, even those with low viscosity. These pumps work well with thin liquids and offer high flow rates.
</span></p><span data-dcnode-id="923" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="912" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="913" id="mntl-block_12-0"><span data-dcnode-id="922" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard3-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="915" data-height="600" id="billboard3-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="921" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard3-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="917" id="mntl-sc-sticky-billboard-ad_5-0"><span data-dcnode-id="920" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="401cb39de6db442db785bc77d6ddb6dc" data-auction-floor-value="240" data-dcnode-id="919" data-pos="btf2" data-priority="5" data-rtb="true" data-sizes="[[300, 250],[300, 252],[3, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard3"></div><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span></div></div><span data-dcnode-id="911" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="909" id="mntl-sc-block_1-0-11"><span data-dcnode-id="910" instrument_node="">
Positive displacement water pumps deliver a fixed amount of flow through the mechanical contraction and expansion of a flexible diaphragm. Positive displacement pumps are used in many industries that manage high-viscosity liquids and where sensitive solids may be present. They are recommended for applications requiring a combination of low flow and high pressure.
</span></p><span data-dcnode-id="908" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="907" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="906" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="905" id="toc-considerations-for-centrifugal-water-pumps"></span><span data-dcnode-id="904" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="899" id="mntl-sc-block_1-0-13"><span data-dcnode-id="903" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node=""> Considerations for Centrifugal Water Pumps </span></span><span data-dcnode-id="900" instrument_node=""> </span></h2><span data-dcnode-id="898" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="896" id="mntl-sc-block_1-0-15"><span data-dcnode-id="897" instrument_node="">
Centrifugal pumps are used in many construction and water system applications, in addition to dewatering. They are employed to pump water supplies in buildings and are compatible with pneumatic systems and where no suction lift is required. They are also used to pump water from domestic wells and to boost pressure in water intake lines. Centrifugal pumps can provide a continuous pressure source for fire protection systems, and they can serve as sump pumps in either vertical or horizontal configurations.
</span></p><span data-dcnode-id="895" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="894" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="893" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="891" id="mntl-sc-block_1-0-18"><span data-dcnode-id="892" instrument_node="">
Centrifugal pumps are prone to several common problems. Some pumps may need recirculating liquid to prevent overheating caused by low flows. Centrifugal pumps must be primed, or filled with the pumped fluid, to operate properly. When the positive suction head of a system is too low for the selected pump, it can result in cavitation, a condition where air bubbles form near the impeller, leading to shockwaves inside the pump. Finally, wear of the pump impeller can be worsened by suspended solids in the liquid.
</span></p><span data-dcnode-id="890" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="879" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="880" id="mntl-block_13-0"><span data-dcnode-id="889" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="882" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="888" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="884" id="mntl-native__adunit_1-0"><span data-dcnode-id="887" instrument_node="">
</span><div class="wrapper" data-dcnode-id="886" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span></div><span data-dcnode-id="881" instrument_node="">
</span></div></div><span data-dcnode-id="878" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="877" id="toc-considerations-for-positive-displacement-water-pumps"></span><span data-dcnode-id="876" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="871" id="mntl-sc-block_1-0-20"><span data-dcnode-id="875" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node=""> Considerations for Positive Displacement Water Pumps </span></span><span data-dcnode-id="872" instrument_node=""> </span></h2><span data-dcnode-id="870" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="868" id="mntl-sc-block_1-0-22"><span data-dcnode-id="869" instrument_node="">
Positive displacement water pumps, sometimes called rotary pumps, are very efficient due to the fact that they remove air from the lines and thus eliminate the need to bleed the air. These pumps are also effective for dealing with high-viscosity liquids.
</span></p><span data-dcnode-id="867" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="856" id="mntl-sc-block_1-0-23"><div class="comp mntl-block" data-dcnode-id="857" id="mntl-block_14-0"><span data-dcnode-id="866" instrument_node="">

The primary drawback of positive displacement pumps is that they require a very small clearance between the rotating pump and the outer edge of the unit. As a result, the rotation must occur at very slow speeds. If the pump is operated at higher speeds, the liquids can erode and eventually reduce the efficiency of the water pump.
