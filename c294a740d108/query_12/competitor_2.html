</span><cite data-dcnode-id="1099" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1103" itemprop="name"><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Djjmoore73"><span data-dcnode-id="1105" instrument_node="">jjmoore73</span></a></span><span data-dcnode-id="1102" instrument_node=""> </span><span class="usertype" data-dcnode-id="1100" itemprop="jobTitle"><span data-dcnode-id="1101" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="1098" instrument_node="">

</span></header><span data-dcnode-id="1090" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="1049" itemprop="text"><span data-dcnode-id="1089" instrument_node="">I have a single story 100,000 sq. ft. concrete fitness center project.  It will have automatic sprinklers and a Class I Standpipe system with 13 2.5" hose valve locations.</span><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
According to 7.10.1.1.1 the minimum flow rate should be 500gpm at the most remote location through two 2.5" outlets at one location, then 250gpm at the next two remote hose connections in accordance with 7.10.1.2.</span><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">
</span><br data-dcnode-id="1082"><span data-dcnode-id="1081" instrument_node="">
Based on 7.10.1.1.2, AHJ said I only need to flow 750gpm total for this project because it is a horizontal standpipe. (250gpm for 3 different hose valves)  What say you? </span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
</span><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">
Based on 7.10.1.1.3, leads me to believe I should not only have 1000gpm total, but 500gpm should be at the two most remote locations.</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
Based on 7.10.1.2.2 says I need to calculate 250gpm at the three hydraulically most remote hose connections on the standpipe AND at the topmost outlet of each of the other standpipes. Say what?</span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">
</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
I need some help determining how many and which hose valves need to be calculated.  Based on the attached plan, I am thinking 250GPM at F,G,H,L.  I am also showing where I am planning on the isolation valves.  If I need to calculate 500gpm at one location, do I need to provide 2 hose valves at that location?</span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">
</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
Thanks - J</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">

</span><header data-dcnode-id="981"><span data-dcnode-id="993" instrument_node="">
</span><cite data-dcnode-id="986" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="990" itemprop="name"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3D3cio"><span data-dcnode-id="992" instrument_node="">3cio</span></a></span><span data-dcnode-id="989" instrument_node=""> </span><span class="usertype" data-dcnode-id="987" itemprop="jobTitle"><span data-dcnode-id="988" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="985" instrument_node="">

</span><div class="tgml wordwrap" data-dcnode-id="956" itemprop="text"><span data-dcnode-id="979" instrument_node="">Good day!</span><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">
</span><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">
Just to be clear, NFPA-7.10.1.1 discuss about the flow rates and NFPA 7.10.1.2 discuss about the hydraulic calculation procedures.</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">
</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
Base on your attached drawing, you only have one standpipe.(NFPA-14 clause 3.3.14 - Standpipe is the system piping that delivers the water supply for hose connections and for sprinklers on combined systems, vertically from floor to floor.)</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
In this case, you need only to satisfy NFPA-14 clause 7.10.1.1.2 &amp; 7.10.1.2.2. the word "and at the topmost outlet of each of the other standpipes" is not applicable to your design since you only have one standpipe. that is why it will arrive only at 750GPM.</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">

</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
Hope it helps,  </span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">

</span><header data-dcnode-id="934"><span data-dcnode-id="949" instrument_node="">
</span><cite data-dcnode-id="942" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="946" itemprop="name"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Djjmoore73"><span data-dcnode-id="948" instrument_node="">jjmoore73</span></a></span><span data-dcnode-id="945" instrument_node=""> </span><span class="usertype" data-dcnode-id="943" itemprop="jobTitle"><span data-dcnode-id="944" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="941" instrument_node="">
</span><div class="op" data-dcnode-id="939" title="jjmoore73 is the OP (Original Poster) of this thread"><span data-dcnode-id="940" instrument_node="">(OP)</span></div><span data-dcnode-id="938" instrument_node="">
</span><time data-dcnode-id="936" datetime="2014-01-10 11:51:35" itemprop="dateCreated"><span data-dcnode-id="937" instrument_node="">10 Jan 14 11:51</span></time><span data-dcnode-id="935" instrument_node="">
</span></header><span data-dcnode-id="933" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="927" itemprop="text"><span data-dcnode-id="932" instrument_node="">CDAFD... Yes this is how I was looking at it.  However, there appears to be different guidelines for horizontal standpipes.  I wonder what Stookey and Travis think?</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">

3CIO... This is very similar to the thoughts of the AHJ.  I want to purchase a 750GPM pump but my gut is telling me I need a 1000GPM. </span></div><span data-dcnode-id="926" instrument_node="">
</span></article><span data-dcnode-id="924" instrument_node=""> </span><article class="answer" data-dcnode-id="877" id="post-7843158" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="922" itemprop="name"><span data-dcnode-id="923" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="921" instrument_node="">
</span><header data-dcnode-id="908"><span data-dcnode-id="920" instrument_node="">
</span><cite data-dcnode-id="913" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="917" itemprop="name"><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="919" instrument_node="">cdafd</span></a></span><span data-dcnode-id="916" instrument_node=""> </span><span class="usertype" data-dcnode-id="914" itemprop="jobTitle"><span data-dcnode-id="915" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="912" instrument_node="">
</span><time data-dcnode-id="910" datetime="2014-01-10 12:39:56" itemprop="dateCreated"><span data-dcnode-id="911" instrument_node="">10 Jan 14 12:39</span></time><span data-dcnode-id="909" instrument_node="">
</span></header><span data-dcnode-id="907" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="879" itemprop="text"><span data-dcnode-id="906" instrument_node="">Not near the book and this is from 2003. I was looking for the definition of standpipe</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
There are also special hydraulic calculation procedures for horizontal standpipes. They will require that where a horizontal standpipe on a Class I and Class III system supplies three or more hose connections on any floor, hydraulic calculations and pipe sizes for each standpipe shall be based on providing 250 gpm at the three hydraulically most remote hose connections on the standpipe and at the topmost outlet of each of the other standpipes at the minimum residual pressure required. The total flow is still required to be up to 1,250 gpm (1,000 gpm when sprinklered.)</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
</span><br data-dcnode-id="895"><span data-dcnode-id="894" instrument_node="">
The definition for a standpipe will now include both vertical risers and the horizontal portions of standpipes that are the water supply for more than two hose connections on a single level. Prior to this change, horizontal standpipes commonly used in locations such as stadiums, transit system tunnels, and malls were not explicitly addressed. The intent of these changes collectively is to distinguish between a secondary line to one or two hose connections on a single floor, and the primary distribution system of risers and mains that may, occasionally be run on a horizontal orientatin. Where unique conditions require more than two outlets on the same level that can only be fed by a horizontal distribution system, the arrangement shall be considered a "horizontal standpipe."</span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.firesprinkler.org/sprinkleragesite/sprinklerage.cfm%3Fid%3D484" rel="nofollow" target="_blank"><span data-dcnode-id="883" instrument_node="">http://www.firesprinkler.org/sprinkleragesite/spri...</span></a><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">
</span></article><span data-dcnode-id="876" instrument_node=""> </span><article class="answer odd" data-dcnode-id="828" id="post-7843176" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="874" itemprop="name"><span data-dcnode-id="875" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="873" instrument_node="">
</span><header data-dcnode-id="860"><span data-dcnode-id="872" instrument_node="">
</span><cite data-dcnode-id="865" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="869" itemprop="name"><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DTravisMack"><span data-dcnode-id="871" instrument_node="">TravisMack</span></a></span><span data-dcnode-id="868" instrument_node=""> </span><span class="usertype" data-dcnode-id="866" itemprop="jobTitle"><span data-dcnode-id="867" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="864" instrument_node="">
</span><time data-dcnode-id="862" datetime="2014-01-10 13:48:08" itemprop="dateCreated"><span data-dcnode-id="863" instrument_node="">10 Jan 14 13:48</span></time><span data-dcnode-id="861" instrument_node="">
</span></header><span data-dcnode-id="859" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="830" itemprop="text"><span data-dcnode-id="858" instrument_node="">I will take a stab at this.</span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
</span><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">
First, you only have a single standpipe.  It is truly a horizontal standpipe per the definitions in Chap 3.</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">
</span><br data-dcnode-id="851"><span data-dcnode-id="850" instrument_node="">
Now, looking at Chap 7, we have to decide on flows.  I understand your issue about floors greater than 80k sq ft, but that is when you have multiple standpipes.  You only have ONE standpipe, so that does not apply.  Using NFPA 14, 2010, section 7.10.1.2.2 states when you have 3 or more outlets on a single floor, you flow 250 gpm at a maximum of 3 outlets, then you pick up any additional flows you need at the top of additional standpipes.  Since you don't have this situation, then the additional flows don't apply.</span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
</span><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">
This gets me to where you need 750 gpm total at your F,G&amp;H. </span><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
</span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">
There is also another interesting question that arises in this scenario.  You obviously do not have a high-rise building.  As such, manual wet standpipes are allowed in non high-rise buildings.  So, could you just calculate this to the fire dept connection.  Per the appendix in NFPA 14, a typical truck will be delivering about 200 psi at 700 gpm and 150 psi at 1000 gpm.  So, you have somewhere in that range to get your 175 psi.  If the AHJ will accept a manual wet standpipe in this case, and if your water supply is adequate to supply your sprinkler system, you may be able to eliminate the on-site fire pump as well.  </span><p class="sig" data-dcnode-id="832"><span data-dcnode-id="841" instrument_node="">Travis Mack</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
MFP Design, LLC</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
</span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfpdesign.com/" rel="nofollow" target="_blank"><span data-dcnode-id="836" instrument_node="">www.mfpdesign.com</span></a><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">
</span></p><span data-dcnode-id="831" instrument_node=""> </span></div><span data-dcnode-id="829" instrument_node="">
</span></article><span data-dcnode-id="827" instrument_node=""> </span><article class="answer" data-dcnode-id="792" id="post-7843233" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="825" itemprop="name"><span data-dcnode-id="826" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="824" instrument_node="">
</span><header data-dcnode-id="808"><span data-dcnode-id="823" instrument_node="">
</span><cite data-dcnode-id="816" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="820" itemprop="name"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Djjmoore73"><span data-dcnode-id="822" instrument_node="">jjmoore73</span></a></span><span data-dcnode-id="819" instrument_node=""> </span><span class="usertype" data-dcnode-id="817" itemprop="jobTitle"><span data-dcnode-id="818" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="815" instrument_node="">
</span><div class="op" data-dcnode-id="813" title="jjmoore73 is the OP (Original Poster) of this thread"><span data-dcnode-id="814" instrument_node="">(OP)</span></div><span data-dcnode-id="812" instrument_node="">
</span><time data-dcnode-id="810" datetime="2014-01-10 16:27:29" itemprop="dateCreated"><span data-dcnode-id="811" instrument_node="">10 Jan 14 16:27</span></time><span data-dcnode-id="809" instrument_node="">
</span></header><span data-dcnode-id="807" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="794" itemprop="text"><span data-dcnode-id="806" instrument_node="">And now the rest of the story...I didn't want to make things more confusing, as I didn't think the 2nd floor would matter.  AHJ wanted me to calculate the 2nd floor as a separate calculation.  Travis, does your opinion change if part of this building has a 2nd story?  The middle of the buildings has a 2nd floor.  C,D,E,H,I,J,K each go vertical to supply hose valves on the 2nd floor.</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
</span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
The jurisdiction does not recognize manual standpipes.  Standpipes must be Automatic per local amendments.  </span><p class="sig" data-dcnode-id="796"><span data-dcnode-id="801" instrument_node="">J. Moore</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
NICET III - Water Based</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
</span></p><span data-dcnode-id="795" instrument_node=""> </span></div><span data-dcnode-id="793" instrument_node="">
</span></article><span data-dcnode-id="791" instrument_node=""> </span><article class="answer odd" data-dcnode-id="751" id="post-7843238" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="789" itemprop="name"><span data-dcnode-id="790" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="788" instrument_node="">
</span><header data-dcnode-id="775"><span data-dcnode-id="787" instrument_node="">
</span><cite data-dcnode-id="780" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="784" itemprop="name"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DTravisMack"><span data-dcnode-id="786" instrument_node="">TravisMack</span></a></span><span data-dcnode-id="783" instrument_node=""> </span><span class="usertype" data-dcnode-id="781" itemprop="jobTitle"><span data-dcnode-id="782" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="779" instrument_node="">
</span><time data-dcnode-id="777" datetime="2014-01-10 16:38:03" itemprop="dateCreated"><span data-dcnode-id="778" instrument_node="">10 Jan 14 16:38</span></time><span data-dcnode-id="776" instrument_node="">
</span></header><span data-dcnode-id="774" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="753" itemprop="text"><span data-dcnode-id="773" instrument_node="">Yes, it does change.  Because now, you do have more of a traditional standpipe system.  You have verticals that are fed by a common horizontal bulk.  I would have a sectional valve for each of those standpipes that feed 2 floors and call them a "traditional" standpipe.  At that point, because you are now having standpipes with multiple verticals, I would flow 500 gpm through 2 of those and get to 1000 gpm.  </span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">

</span><cite data-dcnode-id="630" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="634" itemprop="name"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="636" instrument_node="">cdafd</span></a></span><span data-dcnode-id="633" instrument_node=""> </span><span class="usertype" data-dcnode-id="631" itemprop="jobTitle"><span data-dcnode-id="632" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="629" instrument_node="">

</span></header><span data-dcnode-id="624" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="622" itemprop="text"><span data-dcnode-id="623" instrument_node="">3.3.14.1 Horizontal Standpipe.   The horizontal portion of the system piping that delivers the water supply for two or more hose connections, and for sprinklers on combined systems, on a single level.  </span></div><span data-dcnode-id="621" instrument_node="">
</span></article><span data-dcnode-id="619" instrument_node=""> </span><article class="answer" data-dcnode-id="590" id="post-7843787" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="617" itemprop="name"><span data-dcnode-id="618" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="616" instrument_node="">
</span><header data-dcnode-id="603"><span data-dcnode-id="615" instrument_node="">
</span><cite data-dcnode-id="608" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="612" itemprop="name"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="614" instrument_node="">cdafd</span></a></span><span data-dcnode-id="611" instrument_node=""> </span><span class="usertype" data-dcnode-id="609" itemprop="jobTitle"><span data-dcnode-id="610" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="607" instrument_node="">
</span><time data-dcnode-id="605" datetime="2014-01-13 10:47:22" itemprop="dateCreated"><span data-dcnode-id="606" instrument_node="">13 Jan 14 10:47</span></time><span data-dcnode-id="604" instrument_node="">
</span></header><span data-dcnode-id="602" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="592" itemprop="text"><span data-dcnode-id="601" instrument_node="">7.10.1.1.2*   Where a horizontal standpipe on a Class I or Class III system supplies three or more hose connections on any floor, the minimum flow rate for the hydraulically most demanding horizontal standpipe shall be 750 gpm (2840 L/min), and the calculation procedure shall be in accordance with 7.10.1.2.2.</span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
</span><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">
</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
7.10.1.2.2    Where a horizontal standpipe on a Class I and Class III system supplies three or more hose connections on any floor, hydraulic calculations and pipe sizes for each standpipe shall be based on providing 250 gpm (946 L/min) at the three hydraulically most remote hose connections on the standpipe and at the topmost outlet of each of the other standpipes at the minimum residual pressure required by Section 7.8. </span></div><span data-dcnode-id="591" instrument_node="">
</span></article><span data-dcnode-id="589" instrument_node=""> </span><article class="answer odd" data-dcnode-id="553" id="post-7843789" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="587" itemprop="name"><span data-dcnode-id="588" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="586" instrument_node="">

</span><time data-dcnode-id="575" datetime="2014-01-13 10:52:18" itemprop="dateCreated"><span data-dcnode-id="576" instrument_node="">13 Jan 14 10:52</span></time><span data-dcnode-id="574" instrument_node="">
</span></header><span data-dcnode-id="572" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="555" itemprop="text"><span data-dcnode-id="571" instrument_node="">I would shoot conservative and do A/B/F @ 250 gpm / 100 psi and then pick up L at an additional 250 gpm.  This would be a total demand of 1000 gpm.</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
That may be overkill, but you already have a 1000 gpm pump specified in the project.  When things look to be in a grey area like this one is, I tend to err on the side of caution.  AHJ's can be wrong.  He may be right about 750 gpm demand as the most needed.  However, if something goes wrong, it will not be the AHJ that has his butt in a sling...it will be you having to defend why you chose what you did.  </span><p class="sig" data-dcnode-id="557"><span data-dcnode-id="566" instrument_node="">Travis Mack</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">

</span><cite data-dcnode-id="541" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="545" itemprop="name"><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dmellis1967"><span data-dcnode-id="547" instrument_node="">mellis1967</span></a></span><span data-dcnode-id="544" instrument_node=""> </span><span class="usertype" data-dcnode-id="542" itemprop="jobTitle"><span data-dcnode-id="543" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="540" instrument_node="">

</span><div class="tgml wordwrap" data-dcnode-id="533" itemprop="text"><span data-dcnode-id="534" instrument_node="">I'm following this thread with great interest.  I'm currently working on a similar project, with a 140,000 sf covered sports facility with a 20,000 sf mezzanine.  I understand the fire pump sizing portion of it, but I'm questioning where to find the code that requires a horizontal standpipe system in the first place.  I'm under IBC and I can't find anything requiring them.  Can anyone help?  Thanks. </span></div><span data-dcnode-id="532" instrument_node="">
</span></article><span data-dcnode-id="530" instrument_node=""> </span><article class="answer odd" data-dcnode-id="509" id="post-7907539" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="528" itemprop="name"><span data-dcnode-id="529" instrument_node="">RE: Horizontal Standpipe</span></h3><span data-dcnode-id="527" instrument_node="">
</span><header data-dcnode-id="514"><span data-dcnode-id="526" instrument_node="">
</span><cite data-dcnode-id="519" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="523" itemprop="name"><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstookeyfpe"><span data-dcnode-id="525" instrument_node="">stookeyfpe</span></a></span><span data-dcnode-id="522" instrument_node=""> </span><span class="usertype" data-dcnode-id="520" itemprop="jobTitle"><span data-dcnode-id="521" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="518" instrument_node="">
</span><time data-dcnode-id="516" datetime="2014-07-10 09:02:56" itemprop="dateCreated"><span data-dcnode-id="517" instrument_node="">10 Jul 14 09:02</span></time><span data-dcnode-id="515" instrument_node="">
</span></header><span data-dcnode-id="513" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="511" itemprop="text"><span data-dcnode-id="512" instrument_node="">It's not required. The only time a horizontal standpipe is ever prescribed by the 2006, 2009 or 2012 IBC is at a horizontal exit. The fire code official may prescribe to reduce hose lay distances inside a building, but I won't speculate on this. </span></div><span data-dcnode-id="510" instrument_node="">
