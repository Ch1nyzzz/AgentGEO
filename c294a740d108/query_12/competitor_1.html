</span><h3 data-dcnode-id="1505" style="text-align: center;"><span data-dcnode-id="1506" style="color: #3333ff;"><span data-dcnode-id="1509" instrument_node="">Standpipes,
        Tanks, Towers and Architecture </span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">
</span></span></h3><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502" style="margin-left: 200px;margin-right: 200px;"><span data-dcnode-id="1503" instrument_node="">Standpipes refer to two
      separate technologies used in water systems.&nbsp; The original use was to
      describe cylindrical towers used to maintain water pressure for
      distribution systems, while more recently the term describes dedicated
      piping systems within buildings used for fire fighting.&nbsp; Standpipes
      were used to provide pressure for a water distribution system as well as
      protecting against water hammer from pumping.&nbsp; </span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1490" style="margin-left: 200px;margin-right: 200px;"><span data-dcnode-id="1500" instrument_node="">The earliest American
      reference to a "standing column" was by </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.waterworkshistory.us/bio/McAlpine/"><span data-dcnode-id="1499" instrument_node="">William
        J. McAlpine</span></a><span data-dcnode-id="1497" instrument_node=""> in his 1850 report on the Albany water works, in which
      he refers to similar columns in England.&nbsp; The first known
      installation of a standpipe in America was one built in </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.waterworkshistory.us/PA/Germantown/"><span data-dcnode-id="1496" instrument_node="">Germantown</span></a><span data-dcnode-id="1494" instrument_node="">,
      Pennsylvania in 1851, and operated until 1872.&nbsp; A picture was taken
      of this standpipe being raised.&nbsp; Three other standpipes were built in
      Philadelphia, including one at&nbsp; Fairmount works in 1852, Schuylkill
      works in 1855 and West Pennsylvania (24th Ward Works in 1855).&nbsp;
      Another was built was built by McAlpine in </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.waterworkshistory.us/IL/Chicago/"><span data-dcnode-id="1493" instrument_node="">Chicago</span></a><span data-dcnode-id="1491" instrument_node="">
      that began service in 1854.</span></p><span data-dcnode-id="1489" instrument_node="">
