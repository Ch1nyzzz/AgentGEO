 data-dcnode-id="2689"><label data-dcnode-id="2690" for="document_search"><span class="label_text visually_hidden" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Search inside document </span></span><div class="input_wrapper" data-dcnode-id="2691"><span aria-hidden="true" class="icon-ic_search search_icon" data-dcnode-id="2693" role="presentation"></span><input class="document_search" data-dcnode-id="2692" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="2683"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2684" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2685"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2686"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="1822"><h1 data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Building Codes</span></h1><p data-dcnode-id="2673"><span data-dcnode-id="2678" instrument_node="">Contents</span><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node=""> Analysis of the organization, intent and use of codes in general and the</span><br data-dcnode-id="2675"><span data-dcnode-id="2674" instrument_node=""> International Building Code IBC in particular</span></p><p data-dcnode-id="2669"><span data-dcnode-id="2672" instrument_node=""> Reasons why the codes exist and how they form an integral part of the design</span><br data-dcnode-id="2671"><span data-dcnode-id="2670" instrument_node=""> criteria for every building project.</span></p><p data-dcnode-id="2661"><span data-dcnode-id="2668" instrument_node=""> The more you know about the code, the more it can become a tool for design rather</span><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node=""> than an impediment. The better the underlying criteria for code development and</span><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node=""> the reasons for code provisions are understood, the easier it is to create code-</span><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node=""> compliant designs.</span></p><p data-dcnode-id="2660"></p><h2 data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node=""> Early understanding and incorporation of code-compliant design provisions in a</span></h2><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node=""> project reduces the necessity for costly and time-consuming rework or awkward</span><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node=""> rationalizations to justify dubious code decisions late in project documentation, or</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node=""> even during construction.</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">fBrief History</span><p data-dcnode-id="2649"></p><p data-dcnode-id="2643"><span data-dcnode-id="2648" instrument_node="">If a builder builds a house for someone, and does not construct it properly, and the</span><br data-dcnode-id="2647"><span data-dcnode-id="2646" instrument_node="">house which is built falls in and kills its owner, then that builder shall be put to</span><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">death. (Hammurabi’s Code of Laws, ca. 1780 BC)</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2642" instrument_node="">Chicago developed a building code in 1875 to placate the National Board of Fire</span><br data-dcnode-id="2641"><span data-dcnode-id="2640" instrument_node="">Underwriters who threatened to cut off insurance for businesses after the fire of</span><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">1871.</span></p><p data-dcnode-id="2627"><span data-dcnode-id="2636" instrument_node="">The first model codes were written from the point of view of insurance</span><br data-dcnode-id="2635"><span data-dcnode-id="2634" instrument_node="">companies to reduce fire risks. Model codes are developed by private code groups</span><br data-dcnode-id="2633"><span data-dcnode-id="2632" instrument_node="">for subsequent adoption by local and state government agencies as legally</span><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">enforceable regulations.</span><br data-dcnode-id="2629"><span data-dcnode-id="2628" instrument_node="">fThree Model-Code Agencies</span></p><p data-dcnode-id="2623"><span data-dcnode-id="2626" instrument_node="">The first major model-code group was the Building Officials and Code</span><br data-dcnode-id="2625"><span data-dcnode-id="2624" instrument_node="">Administrators (BOCA), founded in 1915, currently located in Country Club Hills, IL</span></p><p data-dcnode-id="2622"></p><h2 data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">The International Conference of Building Officials (ICBO) was formed in 1922,</span></h2><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">presently located in Whittier, CA. The first edition of their Uniform Building Code</span><br data-dcnode-id="2617"><span data-dcnode-id="2616" instrument_node="">was published in 1927.</span><p data-dcnode-id="2615"></p><p data-dcnode-id="2611"><span data-dcnode-id="2614" instrument_node="">The Southern Building Code Congress International (SBCCI) was founded in 1940,</span><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">Birmingham, AL. They publish the Southern Building Code.</span></p><p data-dcnode-id="2610"></p><h2 data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The ICBO Uniform Building Code               was used West of Mississippi</span></h2><br data-dcnode-id="2607"><span data-dcnode-id="2606" instrument_node="">The BOCA National Building Code              was used North-central, North-east</span><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">The SBCCI Standard Building Code             was used Southeast</span><br data-dcnode-id="2603"><span data-dcnode-id="2602" instrument_node="">fInternational Code Council and the IBC</span><p data-dcnode-id="2601"></p><p data-dcnode-id="2593"><span data-dcnode-id="2600" instrument_node="">International Code Council (ICC) was formed in 1994 with representatives from</span><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">three major model-code groups. Their first achievement, despite differences, was</span><br data-dcnode-id="2597"><span data-dcnode-id="2596" instrument_node="">that the organization of each code became the same, thus allowing direct</span><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">comparisons.</span></p><p data-dcnode-id="2592"></p><h2 data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">International Building Code (IBC) published and maintained by representatives of</span></h2><br data-dcnode-id="2589"><span data-dcnode-id="2588" instrument_node="">three agencies, the International Code Congress, in Falls Church, VA</span><p data-dcnode-id="2587"></p><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">In addition</span></p><p data-dcnode-id="2584"></p><h2 data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">International Residential Code (IRC)</span></h2><p data-dcnode-id="2581"></p><p data-dcnode-id="2580"></p><h2 data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Americans with Disabilities Act (ADA). It is a federal civil-rights legislation, an</span></h2><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">enforced law, rather than just a code. ADA Accessibility Guidelines (ADAAG)</span><p data-dcnode-id="2575"></p><p data-dcnode-id="2574"></p><h2 data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Federal Fair Housing Act (FFHD)</span></h2><br data-dcnode-id="2571"><span data-dcnode-id="2570" instrument_node="">fAdoptions of Codes by States, Counties and Cities</span><p data-dcnode-id="2569"></p><p data-dcnode-id="2565"><span data-dcnode-id="2568" instrument_node="">The three major regional differences still exist. For instance, until the IBC was</span><br data-dcnode-id="2567"><span data-dcnode-id="2566" instrument_node="">adopted, Georgia adopted more codes according to the Standard Building Code</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2564" instrument_node="">Larger cities such as Los Angeles, New York City, Chicago and San Francisco</span><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">adopt many revisions to the model codes, sometimes having no basis on the model-</span><br data-dcnode-id="2561"><span data-dcnode-id="2560" instrument_node="">codes.</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2558" instrument_node="">It is imperative to check first what kinds of codes or regulations are adopted by the</span><br data-dcnode-id="2557"><span data-dcnode-id="2556" instrument_node="">county, city or the state in which the project is located.</span><br data-dcnode-id="2555"><span data-dcnode-id="2554" instrument_node="">fSpecialized Codes | the AHJs</span></p><p data-dcnode-id="2547"><span data-dcnode-id="2552" instrument_node="">Life Safety Code (NFPA-101) published by the National Fire Protection Association.</span><br data-dcnode-id="2551"><span data-dcnode-id="2550" instrument_node="">This codes serves as the basis for the egress portion of other model codes. Hospital</span><br data-dcnode-id="2549"><span data-dcnode-id="2548" instrument_node="">and federal projects use NFPA-101.</span></p><p data-dcnode-id="2543"><span data-dcnode-id="2546" instrument_node="">Fire codes are typically considered maintenance codes. They are intended to</span><br data-dcnode-id="2545"><span data-dcnode-id="2544" instrument_node="">provide for the public safety and the daily operation of a structure.</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2542" instrument_node="">Planning, zoning, fire and building officials that have something to say about</span><br data-dcnode-id="2541"><span data-dcnode-id="2540" instrument_node="">building are known as Authorities Having Jurisdiction (AHJ). Often, there are</span><br data-dcnode-id="2539"><span data-dcnode-id="2538" instrument_node="">overlapping or duplicity of jurisdictions.</span></p><p data-dcnode-id="2531"><span data-dcnode-id="2536" instrument_node="">It is imperative to determine first which codes and standards are to be enforced for</span><br data-dcnode-id="2535"><span data-dcnode-id="2534" instrument_node="">a project and by which agency.</span><br data-dcnode-id="2533"><span data-dcnode-id="2532" instrument_node="">fLegal Basis for Codes | Standard of Care | Priorities</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2530" instrument_node="">The model codes have no force of law unto themselves. Only after being adopted</span><br data-dcnode-id="2529"><span data-dcnode-id="2528" instrument_node="">by a governmental agency, do they become enforceable under the police</span><br data-dcnode-id="2527"><span data-dcnode-id="2526" instrument_node="">powers of the state, county or city.</span></p><p data-dcnode-id="2524"></p><h2 data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Determine what kinds of construction require application of code. Some remodeling</span></h2><br data-dcnode-id="2521"><span data-dcnode-id="2520" instrument_node="">work is exempt from code regulations.</span><p data-dcnode-id="2519"></p><p data-dcnode-id="2515"><span data-dcnode-id="2518" instrument_node="">One exception is the ADA which is a civil-rights law and is not enforced by building</span><br data-dcnode-id="2517"><span data-dcnode-id="2516" instrument_node="">officials, while still not relieving the owner from obligations under the ADA.</span></p><p data-dcnode-id="2514"></p><h2 data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Codes are legally and ethically considered to be the minimum criteria to be</span></h2><br data-dcnode-id="2511"><span data-dcnode-id="2510" instrument_node="">met.</span><p data-dcnode-id="2509"></p><p data-dcnode-id="2499"><span data-dcnode-id="2508" instrument_node="">The basis for building-code development is the safeguarding of the public, while</span><br data-dcnode-id="2507"><span data-dcnode-id="2506" instrument_node="">having a strong component of property protection. Sprinklers help both public and</span><br data-dcnode-id="2505"><span data-dcnode-id="2504" instrument_node="">buildings. Security measures against burglary might interfere with life safety of</span><br data-dcnode-id="2503"><span data-dcnode-id="2502" instrument_node="">occupants.</span><br data-dcnode-id="2501"><span data-dcnode-id="2500" instrument_node="">fFuture Trends | Performance vs. Prescriptive Codes</span></p><p data-dcnode-id="2498"></p><h2 data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">At the present condition, the IBC is prescriptive in nature. It is developed to</span></h2><br data-dcnode-id="2495"><span data-dcnode-id="2494" instrument_node="">mitigate concerns by creating specific and prescribed responses to problems</span><br data-dcnode-id="2493"><span data-dcnode-id="2492" instrument_node="">that have been identified. For instance, an assumed problem is falling over an edge</span><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">higher then 30” above the adjacent grade. The solution – guardrails of 42” height</span><br data-dcnode-id="2489"><span data-dcnode-id="2488" instrument_node="">are required for differences in grade exceeding 30”. Note: a handrail is not a</span><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">guardrail.</span><p data-dcnode-id="2485"></p><p data-dcnode-id="2475"><span data-dcnode-id="2484" instrument_node="">Performance codes define the problem and allow the designer to devise a solution.</span><br data-dcnode-id="2483"><span data-dcnode-id="2482" instrument_node="">The word ‘performance’ refers to the problem definition and to setting</span><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">parameters for deciding if a solution solves the problem. For instance, ‘the building</span><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">shall allow all of its prospective occupants to safely leave the building in case of</span><br data-dcnode-id="2477"><span data-dcnode-id="2476" instrument_node="">fire’. The language of modern performance based codes is an objective-based one.</span></p><p data-dcnode-id="2474"></p><h2 data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Objective: What is to be accomplished? (Example, prevention from falling 30”)</span></h2><br data-dcnode-id="2471"><span data-dcnode-id="2470" instrument_node="">Functional Statement: Why do we want this? (We want to safeguard occupants</span><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">from accidentally falling from a height that might result in injury)</span><br data-dcnode-id="2467"><span data-dcnode-id="2466" instrument_node="">Performance requirement: How is this to be accomplished? Guardrails. (might</span><br data-dcnode-id="2465"><span data-dcnode-id="2464" instrument_node="">become prescriptive)</span><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">f2 | Navigating the Code</span><br data-dcnode-id="2461"><span data-dcnode-id="2460" instrument_node="">The key word to remember about how all building codes are developed and how</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node="">they work is intent. The intent of the author of a building code section is to solve a</span><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">specific design problem with prescriptive words.</span><p data-dcnode-id="2455"></p><p data-dcnode-id="2445"><span data-dcnode-id="2454" instrument_node="">Designers also have intent as they are trying to achieve certain functional or formal</span><br data-dcnode-id="2453"><span data-dcnode-id="2452" instrument_node="">goals in the design of the building. Designers should measure their own intent for</span><br data-dcnode-id="2451"><span data-dcnode-id="2450" instrument_node="">the design against their interpretations of the intent of the code. When examined</span><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node="">together, the intent of the code and that of the design solution should be</span><br data-dcnode-id="2447"><span data-dcnode-id="2446" instrument_node="">concurrent.</span></p><p data-dcnode-id="2435"><span data-dcnode-id="2444" instrument_node="">The responsibility for understanding, applying and fulfilling the requirements of the</span><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">code always rests with the design professional. Approvals by the AHJ do not</span><br data-dcnode-id="2441"><span data-dcnode-id="2440" instrument_node="">relieve the designer of social and licensing responsibilities to maintain the health,</span><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node="">safety and welfare of society.</span><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">fIntent and Interpretation</span></p><p data-dcnode-id="2434"></p><h2 data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Each section of the code was developed to solve a certain problem.</span></h2><p data-dcnode-id="2431"></p><p data-dcnode-id="2425"><span data-dcnode-id="2430" instrument_node="">Sections are organized into chapters based upon common themes, but usually</span><br data-dcnode-id="2429"><span data-dcnode-id="2428" instrument_node="">are developed in isolation from one another with little attention to continuity of the</span><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node="">whole document.</span></p><p data-dcnode-id="2417"><span data-dcnode-id="2424" instrument_node="">Code language usually arises from a specific issue the code writer wishes to</span><br data-dcnode-id="2423"><span data-dcnode-id="2422" instrument_node="">address based on experience or upon a construction or life safety issue. The writer</span><br data-dcnode-id="2421"><span data-dcnode-id="2420" instrument_node="">then makes the requirements general so that they apply to more typical conditions</span><br data-dcnode-id="2419"><span data-dcnode-id="2418" instrument_node="">than the specific instance that generated the concern.</span></p><p data-dcnode-id="2411"><span data-dcnode-id="2416" instrument_node="">The intent of the code is a crucial idea to understand. Why is a much more</span><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node="">important question that what when you are puzzled by the actual language of a</span><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node="">code passage.</span></p><p data-dcnode-id="2405"><span data-dcnode-id="2410" instrument_node="">Do not try to memorize passages from the code, rather learn the organization of</span><br data-dcnode-id="2409"><span data-dcnode-id="2408" instrument_node="">the code.</span><br data-dcnode-id="2407"><span data-dcnode-id="2406" instrument_node="">fAlternate Means and Methods</span></p><p data-dcnode-id="2404"></p><h2 data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">The alternative is to be approved when “the</span></h2><br data-dcnode-id="2401"><span data-dcnode-id="2400" instrument_node="">proposed design is satisfactory and complies</span><br data-dcnode-id="2399"><span data-dcnode-id="2398" instrument_node="">with the intent of the provisions of this code, and</span><br data-dcnode-id="2397"><span data-dcnode-id="2396" instrument_node="">that the material, method or work offered is, for</span><br data-dcnode-id="2395"><span data-dcnode-id="2394" instrument_node="">the purpose intended, at least the equivalent of</span><br data-dcnode-id="2393"><span data-dcnode-id="2392" instrument_node="">that prescribed in the code in quality,</span><br data-dcnode-id="2391"><span data-dcnode-id="2390" instrument_node="">strength, effectiveness, fire resistance,</span><br data-dcnode-id="2389"><span data-dcnode-id="2388" instrument_node="">durability and safety. ( § 104.11)</span><br data-dcnode-id="2387"><span data-dcnode-id="2386" instrument_node="">fAlternate Means</span><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">and Methods</span><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">fCode interpretations</span><p data-dcnode-id="2381"></p><p data-dcnode-id="2380"></p><h2 data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Designers and code officials approach</span></h2><br data-dcnode-id="2377"><span data-dcnode-id="2376" instrument_node="">interpretations from quite different perspectives.</span><p data-dcnode-id="2375"></p><p data-dcnode-id="2374"></p><h2 data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">The designer is trying to make his design</span></h2><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node="">solution compliant with the code while satisfying</span><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">project requirements.</span><p data-dcnode-id="2367"></p><p data-dcnode-id="2366"></p><h2 data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">The AHJ examines the solution for compliance</span></h2><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">with the code being unaware about the practical</span><br data-dcnode-id="2361"><span data-dcnode-id="2360" instrument_node="">requirements of the building design.</span><p data-dcnode-id="2359"></p><p data-dcnode-id="2358"></p><h2 data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">When differences occur, the designer and AHJ</span></h2><br data-dcnode-id="2355"><span data-dcnode-id="2354" instrument_node="">work together to reconcile the intent of the</span><br data-dcnode-id="2353"><span data-dcnode-id="2352" instrument_node="">design solution with the intent of the code</span><br data-dcnode-id="2351"><span data-dcnode-id="2350" instrument_node="">fDocumenting Code interpretations</span><p data-dcnode-id="2349"></p><p data-dcnode-id="2348"></p><h2 data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Every project should receive a detailed code</span></h2><br data-dcnode-id="2345"><span data-dcnode-id="2344" instrument_node="">analysis that is recorded as a permanent part</span><br data-dcnode-id="2343"><span data-dcnode-id="2342" instrument_node="">of the permit documents</span><p data-dcnode-id="2341"></p><p data-dcnode-id="2340"></p><h2 data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">All code interpretations and citations should</span></h2><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node="">have a reference to the code sections in</span><br data-dcnode-id="2335"><span data-dcnode-id="2334" instrument_node="">order to allow retracting steps in the code</span><br data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">analysis</span><p data-dcnode-id="2331"></p><p data-dcnode-id="2330"></p><h2 data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">This figures shows the minimum required</span></h2><br data-dcnode-id="2327"><span data-dcnode-id="2326" instrument_node="">items</span><p data-dcnode-id="2325"></p><p data-dcnode-id="2324"></p><h2 data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Also, site plan, floor plan, detail egress</span></h2><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">requirements, exit discharge paths, exit</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">quantities and locations.</span><br data-dcnode-id="2317"><span data-dcnode-id="2316" instrument_node="">f  Using the Code</span><br data-dcnode-id="2315"><span data-dcnode-id="2314" instrument_node="">1 Classify the building according to occupancy, type of construction, location of</span><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">property, floor area, height and number of stories.</span><p data-dcnode-id="2311"></p><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">        A                   B                   C                   D               E</span></p><p data-dcnode-id="2308"></p><h2 data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">2 Review the building for conformity with occupancy requirements</span></h2><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">3 Review the building for conformity with the type of construction requirements</span><br data-dcnode-id="2303"><span data-dcnode-id="2302" instrument_node="">4 Review the building for conformity with egress requirements</span><br data-dcnode-id="2301"><span data-dcnode-id="2300" instrument_node="">5 Review the building for other detailed code regulations</span><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node="">6 Review the building for conformity with structural engineering regulations and</span><br data-dcnode-id="2297"><span data-dcnode-id="2296" instrument_node="">requirements for materials of construction</span><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node="">fClassifying the Building</span><p data-dcnode-id="2293"></p><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">1A        Occupancy Classification</span></p><p data-dcnode-id="2290"></p><h2 data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Determine the occupancy group that the use of</span></h2><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">building or portion thereof most nearly</span><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">resembles.</span><p data-dcnode-id="2283"></p><p data-dcnode-id="2282"></p><h2 data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Compute the floor area and occupant load of the</span></h2><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">building or portion thereof.</span><p data-dcnode-id="2277"></p><p data-dcnode-id="2276"></p><h2 data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">See appropriate sections in Chapter 3 for</span></h2><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">buildings with mixed occupancies.</span><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node="">fClassifying the Building</span><p data-dcnode-id="2269"></p><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">1B         Type of Construction</span></p><p data-dcnode-id="2266"></p><h2 data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Determine the type of construction by the</span></h2><br data-dcnode-id="2263"><span data-dcnode-id="2262" instrument_node="">materials used and the fire-resistance of the</span><br data-dcnode-id="2261"><span data-dcnode-id="2260" instrument_node="">parts of the building.</span><br data-dcnode-id="2259"><span data-dcnode-id="2258" instrument_node="">fClassifying the Building</span><p data-dcnode-id="2257"></p><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">1C         Location on Property</span></p><p data-dcnode-id="2254"></p><h2 data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Determine the location of the building on the site</span></h2><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">and clearances to property lines and other</span><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">buildings from the plot plan.</span><p data-dcnode-id="2247"></p><p data-dcnode-id="2246"></p><h2 data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Determine the fire-resistance requirements for</span></h2><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node="">exterior walls and wall-openings requirements</span><br data-dcnode-id="2241"><span data-dcnode-id="2240" instrument_node="">based on proximity to property.</span><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">fClassifying the Building</span><p data-dcnode-id="2237"></p><p data-dcnode-id="2236"></p><h2 data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">1D         Allowable Floor Area</span></h2><p data-dcnode-id="2233"></p><p data-dcnode-id="2232"></p><h2 data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Determine the allowable floor area of the</span></h2><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">building.</span><p data-dcnode-id="2227"></p><p data-dcnode-id="2226"></p><h2 data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Use basic allowable floor area (tabular area)</span></h2><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">based on occupancy group and type of</span><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node="">construction.</span><p data-dcnode-id="2219"></p><p data-dcnode-id="2218"></p><h2 data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Determine allowable floor area of multistory</span></h2><br data-dcnode-id="2215"><span data-dcnode-id="2214" instrument_node="">buildings.</span><p data-dcnode-id="2213"></p><p data-dcnode-id="2212"></p><h2 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Determine allowable increases based on</span></h2><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">location on property and installation of an</span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">approved automatic fire-sprinkler system.</span><br data-dcnode-id="2205"><span data-dcnode-id="2204" instrument_node="">fClassifying the Building</span><p data-dcnode-id="2203"></p><p data-dcnode-id="2202"></p><h2 data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">1E        Height and Number of Stories</span></h2><p data-dcnode-id="2199"></p><p data-dcnode-id="2198"></p><h2 data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Compute the height of the building and</span></h2><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">determine the number of stories.</span><p data-dcnode-id="2193"></p><p data-dcnode-id="2192"></p><h2 data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Determine the maximum height and number of</span></h2><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">stories permitted based on occupancy group and</span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node="">type of construction.</span><p data-dcnode-id="2185"></p><p data-dcnode-id="2184"></p><h2 data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Determine allowable height and story increase</span></h2><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">based on the installation of an approved</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">automatic fire-sprinkler system.</span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">fCode Components</span><p data-dcnode-id="2175"></p><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Occupancy Type</span></p><p data-dcnode-id="2172"></p><h2 data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Projects are almost always defined based on</span></h2><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">occupancy type. A client asks a designer for</span><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">facility with a defined need. The use of that</span><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node="">facility determines the occupancy group to which</span><br data-dcnode-id="2163"><span data-dcnode-id="2162" instrument_node="">it belongs.</span><p data-dcnode-id="2161"></p><p data-dcnode-id="2160"></p><h2 data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Each occupancy group has specific</span></h2><br data-dcnode-id="2157"><span data-dcnode-id="2156" instrument_node="">requirements related to allowable area, height</span><br data-dcnode-id="2155"><span data-dcnode-id="2154" instrument_node="">and means of egress with potential construction</span><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">types growing out of these requirements.</span><p data-dcnode-id="2151"></p><p data-dcnode-id="2150"></p><h2 data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">The codes are fundamentally use</span></h2><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">(occupancy) based.</span><p data-dcnode-id="2145"></p><p data-dcnode-id="2144"></p><h2 data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Chapter 3 includes the definitions about</span></h2><br data-dcnode-id="2141"><span data-dcnode-id="2140" instrument_node="">occupancy classification</span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">fCode Components</span><p data-dcnode-id="2137"></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Construction Type</span></p><p data-dcnode-id="2134"></p><h2 data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Construction types are categorized with regard</span></h2><br data-dcnode-id="2131"><span data-dcnode-id="2130" instrument_node="">to their resistance to fire in structural</span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">applications.</span><p data-dcnode-id="2127"></p><p data-dcnode-id="2126"></p><h2 data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Construction type gives some indication about</span></h2><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node="">the amount of time available for evacuation.</span><br data-dcnode-id="2121"><span data-dcnode-id="2120" instrument_node="">(wood, steel, reinforced concrete). More</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">resistant construction types are allowed to have</span><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node="">more occupants, larger area, and more stories.</span><p data-dcnode-id="2115"></p><p data-dcnode-id="2114"></p><h2 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Rule of thumb: occupancy quantities and</span></h2><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">construction costs will both decrease with</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">building type from Type I to Type V.</span><p data-dcnode-id="2107"></p><p data-dcnode-id="2106"></p><h2 data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Chapter 6 and Table 601 gives a synopsis of</span></h2><br data-dcnode-id="2103"><span data-dcnode-id="2102" instrument_node="">the minimum fire requirements of each main</span><br data-dcnode-id="2101"><span data-dcnode-id="2100" instrument_node="">construction element</span><br data-dcnode-id="2099"><span data-dcnode-id="2098" instrument_node="">fffCode Components</span><p data-dcnode-id="2097"></p><p data-dcnode-id="2096"></p><h2 data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Building or Floor Area</span></h2><p data-dcnode-id="2093"></p><p data-dcnode-id="2092"></p><h2 data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">After one knows the occupancy group and</span></h2><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">construction type, it is important to establish the</span><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">permissible area for each floor, for each use and</span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">for the entire building.</span><p data-dcnode-id="2083"></p><p data-dcnode-id="2082"></p><h2 data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Some types of construction are limited in size</span></h2><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">based on occupancy and concentration of</span><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">people.</span><p data-dcnode-id="2075"></p><p data-dcnode-id="2074"></p><h2 data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Allowable height and areas are tabulated in</span></h2><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node="">Table 503.</span><p data-dcnode-id="2069"></p><p data-dcnode-id="2068"></p><h2 data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Section 506 shows allowable increases based</span></h2><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">on location on the property and allowance for</span><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">installation of automatic fire-sprinkler systems.</span><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">ffffCode Components</span><p data-dcnode-id="2059"></p><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Exits / Egress</span></p><p data-dcnode-id="2056"></p><h2 data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Determining egress requirements and provision</span></h2><br data-dcnode-id="2053"><span data-dcnode-id="2052" instrument_node="">of safe means of egress is one of the most</span><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">important functions of building codes.</span><p data-dcnode-id="2049"></p><p data-dcnode-id="2048"></p><h2 data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">There are specific requirements for size,</span></h2><br data-dcnode-id="2045"><span data-dcnode-id="2044" instrument_node="">spacing and travel distances for all</span><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">components such as floor plans, doors,</span><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">corridors and stairs.</span><p data-dcnode-id="2039"></p><p data-dcnode-id="2038"></p><h2 data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">In simple terms a means of egress consists of</span></h2><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">three main components: an exit access, an exit</span><br data-dcnode-id="2033"><span data-dcnode-id="2032" instrument_node="">and and exit discharge.</span><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">fCode Components</span><p data-dcnode-id="2029"></p><p data-dcnode-id="2028"></p><h2 data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Building Separation and Shafts</span></h2><p data-dcnode-id="2025"></p><p data-dcnode-id="2024"></p><h2 data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">In case of mixed occupancies, codes require</span></h2><br data-dcnode-id="2021"><span data-dcnode-id="2020" instrument_node="">fire-rated partitions separating the occupancies.</span><p data-dcnode-id="2019"></p><p data-dcnode-id="2018"></p><h2 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Separations may also be used to allow more</span></h2><br data-dcnode-id="2015"><span data-dcnode-id="2014" instrument_node="">area for a particular occupancy on a single floor</span><br data-dcnode-id="2013"><span data-dcnode-id="2012" instrument_node="">in certain types of construction where otherwise</span><br data-dcnode-id="2011"><span data-dcnode-id="2010" instrument_node="">such sizes of use would not be permitted.</span><p data-dcnode-id="2009"></p><p data-dcnode-id="2008"></p><h2 data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Openings between floors such as for stairs,</span></h2><br data-dcnode-id="2005"><span data-dcnode-id="2004" instrument_node="">elevators and mechanical shafts can allow the</span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">passage of smoke, heat and flames. Hence,</span><br data-dcnode-id="2001"><span data-dcnode-id="2000" instrument_node="">codes have requirements based on occupancy,</span><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">building type and building height related to shaft</span><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node="">protection.</span><p data-dcnode-id="1995"></p><p data-dcnode-id="1991"><span data-dcnode-id="1994" instrument_node="">Chapter 7</span><br data-dcnode-id="1993"><span data-dcnode-id="1992" instrument_node="">fCode Components</span></p><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Fire Protection</span></p><p data-dcnode-id="1988"></p><h2 data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Fire protection is divided in two broad categories</span></h2><br data-dcnode-id="1985"><span data-dcnode-id="1984" instrument_node="">passive or active protection.</span><p data-dcnode-id="1983"></p><p data-dcnode-id="1982"></p><h2 data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Passive protection is the one built into the</span></h2><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">structure, either inherent or added as part of</span><br data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">protective membranes (wood, steel, reinforced</span><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">concrete – combustible or non-combustible)</span><p data-dcnode-id="1973"></p><p data-dcnode-id="1972"></p><h2 data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Active protection is the one where the fire</span></h2><br data-dcnode-id="1969"><span data-dcnode-id="1968" instrument_node="">causes a reaction in the systems that serve to</span><br data-dcnode-id="1967"><span data-dcnode-id="1966" instrument_node="">combat the fire (e.g., sprinklers). Code analysis</span><br data-dcnode-id="1965"><span data-dcnode-id="1964" instrument_node="">and design often includes trade-offs between</span><br data-dcnode-id="1963"><span data-dcnode-id="1962" instrument_node="">active and passive systems.</span><p data-dcnode-id="1961"></p><p data-dcnode-id="1957"><span data-dcnode-id="1960" instrument_node="">to be continued</span><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">fCode Components</span></p><p data-dcnode-id="1956"></p><h2 data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Fire Protection Standards         continued</span></h2><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">Fire Resistive Standards Include:</span><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">1 Structure Hour Rating:</span><br data-dcnode-id="1949"><span data-dcnode-id="1948" instrument_node="">Requirements of how long it takes for a fire to</span><br data-dcnode-id="1947"><span data-dcnode-id="1946" instrument_node="">weaken a structural element to the point of</span><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node="">failure. Minimum time for evacuation and fire-</span><br data-dcnode-id="1943"><span data-dcnode-id="1942" instrument_node="">fighting response.</span><p data-dcnode-id="1941"></p><p data-dcnode-id="1940"></p><h2 data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">2 Area or Occupancy Separation Rating:</span></h2><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node="">Requirements of how long it will take for a fire to</span><br data-dcnode-id="1935"><span data-dcnode-id="1934" instrument_node="">penetrate a wall partition, floor or roof assembly.</span><p data-dcnode-id="1933"></p><p data-dcnode-id="1932"></p><h2 data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">3 Flame Spread and Smoke Generation:</span></h2><br data-dcnode-id="1929"><span data-dcnode-id="1928" instrument_node="">Requirements of how long it takes a fire to move</span><br data-dcnode-id="1927"><span data-dcnode-id="1926" instrument_node="">along the surface of the building and how much</span><br data-dcnode-id="1925"><span data-dcnode-id="1924" instrument_node="">and what toxicity of smoke is generated.</span><p data-dcnode-id="1923"></p><p data-dcnode-id="1919"><span data-dcnode-id="1922" instrument_node="">Chapters 7 and 8</span><br data-dcnode-id="1921"><span data-dcnode-id="1920" instrument_node="">fCode Components</span></p><p data-dcnode-id="1918"></p><h2 data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Fire Extinguishing Systems</span></h2><p data-dcnode-id="1915"></p><p data-dcnode-id="1914"></p><h2 data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Fire sprinklers, standpipes, fire detection and</span></h2><br data-dcnode-id="1911"><span data-dcnode-id="1910" instrument_node="">fire-alarm systems are an integral part of many</span><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">buildings. Use of such systems often results in</span><br data-dcnode-id="1907"><span data-dcnode-id="1906" instrument_node="">trade-offs for additional height or area.</span><p data-dcnode-id="1905"></p><p data-dcnode-id="1904"></p><h2 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Trade-offs only apply when the systems are not</span></h2><br data-dcnode-id="1901"><span data-dcnode-id="1900" instrument_node="">otherwise required by the code. The idea of a</span><br data-dcnode-id="1899"><span data-dcnode-id="1898" instrument_node="">trade-off recognizes that this is a mitigation</span><br data-dcnode-id="1897"><span data-dcnode-id="1896" instrument_node="">measure over and above basic code</span><br data-dcnode-id="1895"><span data-dcnode-id="1894" instrument_node="">requirements to achieve the desired level of</span><br data-dcnode-id="1893"><span data-dcnode-id="1892" instrument_node="">safety different from those spelled out in the</span><br data-dcnode-id="1891"><span data-dcnode-id="1890" instrument_node="">code.</span><p data-dcnode-id="1889"></p><p data-dcnode-id="1885"><span data-dcnode-id="1888" instrument_node="">Chapter 9</span><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">fCode Components</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Engineering Requirements</span></p><p data-dcnode-id="1882"></p><h2 data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">One of the bases of codes is structural adequacy</span></h2><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">of building for both static loading such as</span><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">occupants and equipment as well as dynamic</span><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">loading such as earthquakes, snow and wind</span><p data-dcnode-id="1873"></p><p data-dcnode-id="1872"></p><h2 data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Chapters 16-18 deal with forces, inspections</span></h2><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node="">and foundations</span><p data-dcnode-id="1867"></p><p data-dcnode-id="1866"></p><h2 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Chapters 19-23 deal with materials: concrete,</span></h2><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">lightweight materials, masonry, steel and wood.</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">fCode Analysis</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">Every Project, no matter how small , should have a code analysis performed!</span><p data-dcnode-id="1857"></p><p data-dcnode-id="1823"><span data-dcnode-id="1856" instrument_node="">Wherever possible consult with the building department and other Authorities</span><br data-dcnode-id="1855"><span data-dcnode-id="1854" instrument_node="">Having Jurisdiction prior to design.</span><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">Do not expect the code official to do the analysis work for you. Remember,</span><br data-dcnode-id="1851"><span data-dcnode-id="1850" instrument_node="">compliance is the responsibility of the designer, not the code official.</span><br data-dcnode-id="1849"><span data-dcnode-id="1848" instrument_node="">However, codes are subject to interpretation. So it’s always in your best interest to</span><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">determine what, if any, interpretations will be needed for a project.</span><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">REMEMBER: DO NOT TRY AND MEMORIZE PARTS OF THE CODE!!! As</span><br data-dcnode-id="1843"><span data-dcnode-id="1842" instrument_node="">sections change and interpretations alter meanings, such memorization is a recipe</span><br data-dcnode-id="1841"><span data-dcnode-id="1840" instrument_node="">for future trouble.</span><br data-dcnode-id="1839"><span data-dcnode-id="1838" instrument_node="">Clients may expect you to rattle off code requirements, but it’s not in the best interest</span><br data-dcnode-id="1837"><span data-dcnode-id="1836" instrument_node="">of project or client to do so and possibly make”snap” code decisions.</span><br data-dcnode-id="1835"><span data-dcnode-id="1834" instrument_node="">DO NOT PROCEED ON MEMORY OR ANALOGY FROM OTHER JOBS!</span><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">Remember where to look up information and check your decisions each time you</span><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">apply them.</span><br data-dcnode-id="1829"><span data-dcnode-id="1828" instrument_node="">Even seasoned code professionals use the index to locate familiar phrases and</span><br data-dcnode-id="1827"><span data-dcnode-id="1826" instrument_node="">locations of information, especially since items are often relocated as the code</span><br data-dcnode-id="1825"><span data-dcnode-id="1824" instrument_node="">evolves.</span></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="1811"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="1812"><h2 class="title" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="1813"><li class="link_wrapper" data-dcnode-id="1817"><a class="interest_link link" data-category_id="38980" data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Building-Code/explore"><span data-dcnode-id="1819" instrument_node="">Building Code</span></a></li><li class="link_wrapper" data-dcnode-id="1814"><a class="interest_link link" data-category_id="34450" data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Fires/explore"><span data-dcnode-id="1816" instru
