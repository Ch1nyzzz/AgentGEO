an></span></li><li class="list-inline-item mx-2 mx-md-3" data-dcnode-id="3533"><a class="text-reset" data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DInformation%2520for%2520codes%2520officials%2520on%2520how%2520to%2520create%2520a%2520building%2520evacuation%2520diagram.%2520https%3A//go.usa.gov/xzk8G" rel="me" title="Share this page on Twitter"><svg aria-hidden="true" class="svg-inline--fa fa-twitter-square" data-dcnode-id="3537" data-fa-i2svg="" data-icon="twitter-square" data-prefix="fab" focusable="false" role="img" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M400 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48zm-48.9 158.8c.2 2.8.2 5.7.2 8.5 0 86.7-66 186.6-186.6 186.6-37.2 0-71.7-10.8-100.7-29.4 5.3.6 10.4.8 15.8.8 30.7 0 58.9-10.4 81.4-28-28.8-.6-53-19.5-61.3-45.5 10.1 1.5 19.2 1.5 29.6-1.2-30-6.1-52.5-32.5-52.5-64.4v-.8c8.7 4.9 18.9 7.9 29.6 8.3a65.447 65.447 0 0 1-29.2-54.6c0-12.2 3.2-23.4 8.9-33.1 32.3 39.8 80.8 65.8 135.2 68.6-9.3-44.5 24-80.6 64-80.6 18.9 0 35.9 7.9 47.9 20.7 14.8-2.8 29-8.3 41.6-15.8-4.9 15.2-15.2 28-28.8 36.1 13.2-1.4 26-5.1 37.8-10.2-8.9 13.1-20.1 24.7-32.9 34z" data-dcnode-id="3538" fill="currentColor"></path></svg><span data-dcnode-id="3535" instrument_node=""> Twitter</span></a></li><li class="list-inline-item mx-2 mx-md-3" data-dcnode-id="3527"><a class="text-reset" data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.usfa.fema.gov/blog/cb-052417.html" rel="me" title="Share this page on Facebook"><svg aria-hidden="true" class="svg-inline--fa fa-facebook-square" data-dcnode-id="3531" data-fa-i2svg="" data-icon="facebook-square" data-prefix="fab" focusable="false" role="img" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M400 32H48A48 48 0 0 0 0 80v352a48 48 0 0 0 48 48h137.25V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.27c-30.81 0-40.42 19.12-40.42 38.73V256h68.78l-11 71.69h-57.78V480H400a48 48 0 0 0 48-48V80a48 48 0 0 0-48-48z" data-dcnode-id="3532" fill="currentColor"></path></svg><span data-dcnode-id="3529" instrument_node=""> Facebook</span></a></li><li class="list-inline-item mx-2 mx-md-3" data-dcnode-id="3521"><a class="text-reset" data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%253A//www.usfa.fema.gov/blog/cb-052417.html" rel="me" title="Share this page on LinkedIn"><svg aria-hidden="true" class="svg-inline--fa fa-linkedin" data-dcnode-id="3525" data-fa-i2svg="" data-icon="linkedin" data-prefix="fab" focusable="false" role="img" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M416 32H31.9C14.3 32 0 46.5 0 64.3v383.4C0 465.5 14.3 480 31.9 480H416c17.6 0 32-14.5 32-32.3V64.3c0-17.8-14.4-32.3-32-32.3zM135.4 416H69V202.2h66.5V416zm-33.2-243c-21.3 0-38.5-17.3-38.5-38.5S80.9 96 102.2 96c21.2 0 38.5 17.3 38.5 38.5 0 21.3-17.2 38.5-38.5 38.5zm282.1 243h-66.4V312c0-24.8-.5-56.7-34.5-56.7-34.6 0-39.9 27-39.9 54.9V416h-66.4V202.2h63.7v29.2h.9c8.9-16.8 30.6-34.5 62.9-34.5 67.2 0 79.7 44.3 79.7 101.9V416z" data-dcnode-id="3526" fill="currentColor"></path></svg><span data-dcnode-id="3523" instrument_node=""> LinkedIn</span></a></li></ul><div class="row justify-content-center d-none d-md-flex" data-dcnode-id="3517"><div class="col-12 col-md-9 col-lg-7" data-dcnode-id="3518"><p class="lead" data-dcnode-id="3519"></p></div></div></div></div><div data-dcnode-id="186" id="mainContent"><section class="container" data-dcnode-id="187"><div class="row justify-content-center mb-lg-5" data-dcnode-id="3511"><div class="col-12 col-md-9 col-lg-7" data-dcnode-id="3512"><p class="lead" data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">This bulletin provides information for codes officials on how to create a simple building evacuation diagram.</span></p></div></div><div class="row justify-content-center align-items-center mb-5" data-dcnode-id="3483"><div class="col-12 col-md-9 col-lg-7 col-xl-5" data-dcnode-id="3504"><p class="lead" data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">In addition to exit signs that guide people to safety, some buildings — like hotels, hospitals, nursing homes, schools, offices and high-rise buildings — are required to post an evacuation diagram. These diagrams are critical to the safe evacuation of people during an emergency.</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">However, there is no fire or building code standard for building evacuation diagrams: what they must contain, where they are located, what language(s) they must use, or any other item that may go on a diagram.</span></p><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">That’s why it’s important for codes officials to create their own policies for diagrams that help building managers evacuate people.</span></p></div><div class="col-12 col-md-6 col-lg-3 text-center" data-dcnode-id="3495"><h3 data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">Sample evacuation diagram</span></h3><p class="small" data-dcnode-id="3501"></p><a data-bs-target="#exampleModal" data-bs-toggle="modal" data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usfa.fema.gov/img/charts/evacuation_diagram.1800x1200.png"><img alt="evacuation diagram" class="border img-fluid mb-3" data-dcnode-id="3500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usfa.fema.gov/img/charts/evacuation_diagram.450x300.png&amp;raw"><br data-dcnode-id="3499"><span class="small" data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">Touch or click to view/download</span></span></a></div><div aria-hidden="true" aria-labelledby="exampleModalLabel" class="modal fade" data-dcnode-id="3484" id="exampleModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg" data-dcnode-id="3485"><div class="modal-content" data-dcnode-id="3486"><div class="modal-header" data-dcnode-id="3489"><h5 class="modal-title" data-dcnode-id="3493" id="exampleModalLabel"><span data-dcnode-id="3494" instrument_node="">Sample evacuation diagram</span></h5><button aria-label="Close" class="btn-close" data-bs-dismiss="modal" data-dcnode-id="3490" type="button"><span aria-hidden="true" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">×</span></span></button></div><div class="modal-body" data-dcnode-id="3487"><img alt="evacuation diagram" class="img-fluid" data-dcnode-id="3488" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usfa.fema.gov/img/charts/evacuation_diagram.1800x1200.png&amp;raw"></div></div></div></div></div><div class="row justify-content-center mb-5" data-dcnode-id="3423"><div class="col-12 col-md-9 col-lg-7" data-dcnode-id="3424"><h2 class="mt-5" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">General guidelines for building evacuation&nbsp;diagrams</span></h2><ul data-dcnode-id="3472"><li class="mb-3" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Keep it simple. Show the basic layout of the building (by floor level), including walls and doors.</span></li><li class="mb-3" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Make the sign large enough so that it is clearly seen.</span></li><li class="mb-3" data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">Color-code items on the sign to make them easier to understand.</span></li><li class="mb-3" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Post signs at or near means of egress, entrances to stairs, in elevator lobbies, and in any area where there are a lot of people.</span></li></ul><h2 class="mt-5" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">What to include in a&nbsp;diagram</span></h2><ul data-dcnode-id="3459"><li class="mb-3" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Identify the starting point with the words “You are here.” This will vary according to where the sign is posted.</span></li><li class="mb-3" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Provide a simple compass in one corner of the plan, showing north with the letter “N.”</span></li><li class="mb-3" data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">Mark the egress paths that are available from the starting point. Highlight exterior or stair enclosure doors with the word “Exit.”</span></li><li class="mb-3" data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Show the location of fire extinguishers and manual fire alarm pull stations.</span></li><li class="mb-3" data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Identify any outdoor gathering areas.</span></li></ul><h2 class="mt-5" data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Other diagram items to&nbsp;consider</span></h2><ul data-dcnode-id="3450"><li class="mb-3" data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Mark accessible exits, first-aid kits, automated external defibrillators (AEDs), eyewash stations, Material Safety Data Sheet locations, the telephone switchboard, or any other item that is significant to the building.</span></li><li class="mb-3" data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Include Braille code for any wording.</span></li><li class="mb-3" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Use other languages that are appropriate for your community.</span></li></ul><div class="bg-light p-1 p-lg-2 my-5 text-center" data-dcnode-id="3447"><h3 class="border border-white p-3 p-lg-5 m-0" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">If changes to the floor plan are made, review the building evacuation diagram, make the necessary changes and post revised evacuation diagrams where appropriate.</span></h3></div><div class="bg-danger p-3 p-lg-5 text-white my-5" data-dcnode-id="3437"><h3 data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">Action steps for better building evacuation diagrams</span></h3><ol data-dcnode-id="3438"><li class="mb-3" data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Create or review policies that address and standardize building evacuation diagrams.</span></li><li class="mb-3" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Gather examples of best practices for diagrams that you can share with building managers.</span></li><li class="mb-3" data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Review building evacuation diagrams when you conduct codes inspections.</span></li></ol></div><h3 class="mt-5" data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">More information about evacuation diagrams</span></h3><ul class="list-unstyled" data-dcnode-id="3425"><li class="mb-3" data-dcnode-id="3432"><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D101" rel="nofollow"><span data-dcnode-id="3434" instrument_node="">National Fire Protection Association (NFPA) 101 – Life Safety Code®</span></a></li><li class="mb-3" data-dcnode-id="3429"><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D5000" rel="nofollow"><span data-dcnode-id="3431" instrument_node="">National Fire Protection Association (NFPA) 5000 – Building Construction and Safety Code®</span></a></li><li class="mb-3" data-dcnode-id="3426"><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codes.iccsafe.org/content/IBC2018" rel="nofollow"><span data-dcnode-id="3428" instrument_node="">International Code Council – 2018 International Building Code</span></a></li></ul></div></div><div class="mixitup d-print-none" data-dcnode-id="188"><h3 class="text-center mb-3" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Explore more articles:</span></h3><ul class="list-inline text-center mb-5" data-dcnode-id="3369"><li class="list-inline-item mb-2" data-dcnode-id="3418"><span class="text-muted" data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Filter:</span></span></li><li class="list-inline-item mb-2" data-dcnode-id="3415"><button class="btn btn-sm btn-light filterControl" data-dcnode-id="3416" data-toggle=".covid" type="button"><span data-dcnode-id="3417" instrument_node="">COVID-19</span></button></li><li class="list-inline-item mb-2" data-dcnode-id="3412"><button class="btn btn-sm btn-light filterControl" data-dcnode-id="3413" data-toggle=".codes" type="button"><span data-dcnode-id="3414" instrument_node="">Codes &amp; standards</span></button></li><li class="list-inline-item mb-2" data-dcnode-id="3409"><button class="btn btn-sm btn-light filterControl" data-dcnode-id="3410" data-toggle=".crr" type="button"><span data-dcnode-id="3411" instrument_node="">CRR</span></button></li><li class="list-inline-item mb-2" data-dcnode-id="3406"><button class="btn btn-sm btn-light filterControl" data-dcnode-id="3407" data-toggle=".data" type="button"><span data-dcnode-id="3408" instrument_node="">Data</span></button></li><li class="list-inline-item mb-2" data-dcnode-id="3403"><button class="btn btn-sm btn-light filterControl" data-dcnode-id="3404" data-toggle=".ems" type="button"><span data-dcnode-id="3405" instrument_node="">EMS</span></button></li><li class="list-inl
