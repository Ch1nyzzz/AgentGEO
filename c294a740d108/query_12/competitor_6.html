</span><meta content="Communities throughout the world are investigating various approaches to reduce violence, especially gun violence. The objective of this study is to determine the cost-effectiveness of the Peace Management Initiative as an intervention to reduce the homicide rate in volatile community in Kingston, Jamaica. A preliminary longitudinal study tracked the homicide rate in a selected volatile community in Kingston, Jamaica, over the 5-year period of PMI intervention in this community. The changes in the incidence of homicides were costed according to direct medical costs and productivity losses assuming that, without intervention, the number of homicides per year would have remained at the 2005 level. This was used to estimate the cost-effectiveness of the intervention. The Peace Management Initiative approach reduced homicides by 96.9% over the 5-year intervention period. The cost/benefit ratio for the intervention has been estimated to be JMD $12.38 saved per dollar spent on intervention. The Peace Management Initiative approach was seen to significantly reduce the murder rate over the 5-year intervention period and provides a promising cost-effective approach for violence prevention." data-dcnode-id="1772" name="dc.description"><span data-dcnode-id="1771" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="456" data-track-component="article body"><span data-dcnode-id="1155" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1134" data-gtm-vis-first-on-screen-50443292_562="995" data-gtm-vis-first-on-screen-50443292_563="995" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="995" data-gtm-vis-recent-on-screen-50443292_563="995" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1135" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1153" id="Abs1"><span data-dcnode-id="1154" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1136" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="1151" data-test="abstract-sub-heading"><span data-dcnode-id="1152" instrument_node="">Objectives</span></h3><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Communities throughout the world are investigating various approaches to reduce violence, especially gun violence. The objective of this study is to determine the cost-effectiveness of the Peace Management Initiative as an intervention to reduce the homicide rate in volatile community in Kingston, Jamaica.
</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1147" data-test="abstract-sub-heading"><span data-dcnode-id="1148" instrument_node="">Methods</span></h3><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">A preliminary longitudinal study tracked the homicide rate in a selected volatile community in Kingston, Jamaica, over the 5-year period of PMI intervention in this community. The changes in the incidence of homicides were costed according to direct medical costs and productivity losses assuming that, without intervention, the number of homicides per year would have remained at the 2005 level. This was used to estimate the cost-effectiveness of the intervention.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1143" data-test="abstract-sub-heading"><span data-dcnode-id="1144" instrument_node="">Results</span></h3><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The Peace Management Initiative approach reduced homicides by 96.9% over the 5-year intervention period. The cost/benefit ratio for the intervention has been estimated to be JMD $12.38 saved per dollar spent on intervention.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1139" data-test="abstract-sub-heading"><span data-dcnode-id="1140" instrument_node="">Conclusions</span></h3><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The Peace Management Initiative approach was seen to significantly reduce the murder rate over the 5-year intervention period and provides a promising cost-effective approach for violence prevention.</span></p></div></div></section><span data-dcnode-id="1133" instrument_node="">
</span><section data-dcnode-id="1018" data-gtm-vis-first-on-screen-50443292_562="995" data-gtm-vis-first-on-screen-50443292_563="995" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="995" data-gtm-vis-recent-on-screen-50443292_563="995" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1019" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1131" id="Sec1"><span data-dcnode-id="1132" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1020" id="Sec1-content"><p data-dcnode-id="1123"><span data-dcnode-id="1130" instrument_node="">Communities throughout the world are investigating various approaches to reduce violence, especially gun violence. Given that Jamaica’s homicide rate is currently the highest in the Caribbean and the third highest globally, the need for evidence-based and cost-effective interventions to reduce violence is especially critical (Clavel </span><a aria-label="Reference 2018" data-dcnode-id="1128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d142525516e463" title="Clavel T (2018) InSight Crime’s 2017 homicide round-up. investigation and analysis of organized crime. 
                    https://www.insightcrime.org/news/analysis/2017-homicide-round-up/
                    
                  . Accessed 17 Dec 2017"><span data-dcnode-id="1129" instrument_node="">2018</span></a><span data-dcnode-id="1127" instrument_node="">). In Jamaica, interpersonal violence now ranks as the fourth leading cause of premature death behind diabetes, cerebrovascular disease and ischaemic heart disease, underscoring its pronounced public health impact (Institute for Health Metrics and Evaluation </span><a aria-label="Reference 2016" data-dcnode-id="1125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d142525516e466" title="Institute for Health Metrics and Evaluation (2016) Jamaica Health Data. Institute for Health Metrics and Evaluation, University of Washington. 
                    http://www.healthdata.org/jamaica
                    
                  . Accessed Feb 2018"><span data-dcnode-id="1126" instrument_node="">2016</span></a><span data-dcnode-id="1124" instrument_node="">).</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1122" instrument_node="">While the birth of violence in Jamaica was deeply rooted in political rivalry, many attribute the current homicide rate to additional factors such as unstable families, the drug trade, income and social inequalities, poor education and weakened authority of the state in vulnerable areas of the country (Levy </span><a aria-label="Reference 2012" data-dcnode-id="1120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d142525516e472" title="Levy H (2012) Youth, gangs and organized crime. International Development Research Centre, Ottawa, Canada"><span data-dcnode-id="1121" instrument_node="">2012</span></a><span data-dcnode-id="1119" instrument_node="">; Hemenway and Lemard </span><a aria-label="Reference 2006" data-dcnode-id="1117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d142525516e475" title="Hemenway D, Lemard G (2006) Violence in Jamaica: an analysis of homicides 1998–2002. Inj Prev 12:15–18"><span data-dcnode-id="1118" instrument_node="">2006</span></a><span data-dcnode-id="1116" instrument_node="">; Gray </span><a aria-label="Reference 2007" data-dcnode-id="1114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d142525516e478" title="Gray S (2007) Trends in urban crime and violence in Kingston, Jamaica. United Nations Human Settlements Programme. 
                    https://unhabitat.org/wp-content/uploads/2008/07/GRHS.2007.CaseStudy.Crime_.Kingston.pdf
                    
                  . Accessed 5 Dec 2017"><span data-dcnode-id="1115" instrument_node="">2007</span></a><span data-dcnode-id="1113" instrument_node="">). The strategies by the state to reduce violence have emphasized either heightened law enforcement or punitive measures to deter violence and, to a lesser extent, the use of a more social change-based approach which emphasizes social interventions as a way to tackle the perceived root causes of violence (Leslie </span><a aria-label="Reference 2010" data-dcnode-id="1111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d142525516e481" title="Leslie G (2010) confronting the don: the political economy of gang violence in Jamaica. Small Arms Survey, Geneva, Switzerland"><span data-dcnode-id="1112" instrument_node="">2010</span></a><span data-dcnode-id="1110" instrument_node="">).
</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1108" instrument_node="">Internationally, several strategies appear to be beneficial in reducing homicides, but the most acclaimed models generally depend on law enforcement and use either suppression or deterrence of offenders, or both. While this approach is meant to create behaviour change in the offender, it depends heavily on the power of the state to punish criminal behaviour (Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e487" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1107" instrument_node="">2015</span></a><span data-dcnode-id="1105" instrument_node="">). Enforcement-based violence reduction methods can create immediate results, but they have not necessarily been shown to lead to deeper social change (Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1103" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e490" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1104" instrument_node="">2015</span></a><span data-dcnode-id="1102" instrument_node="">). They have been shown to be ineffective in the long term in the Caribbean and Latin American region (Harriot </span><a aria-label="Reference 2003" data-dcnode-id="1100" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d142525516e493" title="Harriot A (2003) Understanding crime in Jamaica: new challenges for public policy. University of the West Indies Press, Kingston, Jamaica"><span data-dcnode-id="1101" instrument_node="">2003</span></a><span data-dcnode-id="1099" instrument_node="">; Schuberth </span><a aria-label="Reference 2016" data-dcnode-id="1097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d142525516e496" title="Schuberth M (2016) Beyond Gang Truces and Mano Dura policies: towards substitutive security governance in Latin America. Int J Secur Dev. 
                    http://doi.org/10.5334/sta.450
                    
                  
                        "><span data-dcnode-id="1098" instrument_node="">2016</span></a><span data-dcnode-id="1096" instrument_node="">). Several scholars and practitioners have argued that real and lasting change must address the root causes and social norms that perpetuate violence and homicides (Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e499" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1095" instrument_node="">2015</span></a><span data-dcnode-id="1093" instrument_node="">). One such strategy is the use of the public health approach. Most popular among them are the Boston TenPoint Coalition (BTPC) and Cure Violence. Both approaches attempt to change behaviour by modifying the social environment rather than by using the coercive power of law enforcement and incarceration (Boston TenPoint Coalition </span><a aria-label="Reference 2015" data-dcnode-id="1091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d142525516e503" title="Boston TenPoint Coalition (2015) Boston TenPoint Coalition: embracing the challenge. 
                    http://btpcoalition.org/about-us/
                    
                  . Accessed 21 Dec 2017"><span data-dcnode-id="1092" instrument_node="">2015</span></a><span data-dcnode-id="1090" instrument_node="">; Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e506" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1089" instrument_node="">2015</span></a><span data-dcnode-id="1087" instrument_node="">). They similarly employ tools of mediation and counselling of at-risk youth and gang members (Boston TenPoint Coalition </span><a aria-label="Reference 2015" data-dcnode-id="1085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d142525516e509" title="Boston TenPoint Coalition (2015) Boston TenPoint Coalition: embracing the challenge. 
                    http://btpcoalition.org/about-us/
                    
                  . Accessed 21 Dec 2017"><span data-dcnode-id="1086" instrument_node="">2015</span></a><span data-dcnode-id="1084" instrument_node="">; Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e512" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1083" instrument_node="">2015</span></a><span data-dcnode-id="1081" instrument_node="">). Evaluations of both BTPC and CV have shown significant reductions in homicide victimization and shootings in intervention communities (Webster et al. </span><a aria-label="Reference 2012" data-dcnode-id="1079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d142525516e515" title="Webster D, Whitehill J, Vernick J, Parker E (2012) Evaluation of Baltimore’s safe streets program: effects on attitudes. Participants’ Experience and Gun Violence, Baltimore"><span data-dcnode-id="1080" instrument_node="">2012</span></a><span data-dcnode-id="1078" instrument_node="">; Braga et al. </span><a aria-label="Reference 2001" data-dcnode-id="1076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d142525516e518" title="Braga A, Kennedy D, Waring E, Piehl A (2001) Problem-oriented policing, deterrence, and youth violence: an evaluation of Boston’s Operation Ceasefire. J Res Crime Delinq 38:195–225. 
                    https://doi.org/10.1177/0022427801038003001
                    
                  
                        "><span data-dcnode-id="1077" instrument_node="">2001</span></a><span data-dcnode-id="1075" instrument_node="">). Unfortunately, there is a lack of cost-effectiveness research associated with these violence reduction strategies, the lack of which hampers expansion and replication of these strategies (Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="1073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e522" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="1074" instrument_node="">2015</span></a><span data-dcnode-id="1072" instrument_node="">).</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">In Jamaica, there are few evaluations of interventions which employ a public health approach to reduce homicides altogether. Even fewer assess their cost-effectiveness, an important parameter for policy considerations. Evidence-based solutions for homicide prevention and control are critical in order to identify strategies that work and expand them to the most vulnerable areas. Furthermore, assessing cost-effectiveness provides incentive for policy makers and government to invest in prevention rather than responding after the fact through law enforcement and prosecution. The objective of this paper is to present the methodology of an organization which has employed a unique public health approach to address the causes of homicides and evaluate its cost-effectiveness as an intervention for homicide prevention.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1067" id="Sec2"><span data-dcnode-id="1068" instrument_node="">Description of Peace Management Initiative (PMI) intervention</span></h3><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">The PMI is a combination of government funding and civil society support which is charged with the responsibility to reduce community violence. The PMI, originally based in Kingston, was established by the Government in 2002 with a mandate to mitigate and diffuse community violence. Members of the PMI board include representatives from both of the main political parties in Jamaica (the Jamaica Labour Party and People’s National Party), civil society organizations, the church, academia, the police force as well as the legal fraternity. The PMI has a well-published, four-pronged strategy to reduce violent crime in a community. These are as follows:</span></p><ol class="u-list-style-none" data-dcnode-id="1024"><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1056"><span data-dcnode-id="1063" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">1.</span></span><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Mediation and dispute resolution</span></p><span data-dcnode-id="1057" instrument_node="">
</span></li><span data-dcnode-id="1055" instrument_node="">
</span><li data-dcnode-id="1047"><span data-dcnode-id="1054" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">2.</span></span><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Grief counselling and therapy for persons affected by violence</span></p><span data-dcnode-id="1048" instrument_node="">
</span></li><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1045" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">3.</span></span><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Mainstreaming unattached youth</span></p><span data-dcnode-id="1039" instrument_node="">
</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1026"><span data-dcnode-id="1036" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">4.</span></span><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">Involving the wider community in building a culture of peace (Levy </span><a aria-label="Reference 2012" data-dcnode-id="1030" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d142525516e579" title="Levy H (2012) Youth, gangs and organized crime. International Development Research Centre, Ottawa, Canada"><span data-dcnode-id="1031" instrument_node="">2012</span></a><span data-dcnode-id="1029" instrument_node="">).</span></p><span data-dcnode-id="1027" instrument_node="">
</span></li><span data-dcnode-id="1025" instrument_node="">
</span></ol><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">PMI’s programmes are largely aimed at stabilizing communities by supporting and sustaining ceasefire initiatives, deepening the integration in once polarized communities through sports and other community engagement activities, implementing counselling and therapy programmes to heal the pain of losing family members and providing young men involved in gang activity with immediate opportunities to change their lifestyle. This is encouraged through participation in behaviour change and life skills workshops, residential retreats, educational assistance and income-generating programmes. The PMI liaison officers are now known as violence interrupters who work at the community level to directly intervene in community conflicts, reduce retaliation killings, counsel and mainstream youths and facilitate community engagement events. PMI has developed a process of working with key persons of influence in the communities who show the potential to change. It specifically targets high-risk youth.</span></p></div></div></section><section data-dcnode-id="958" data-gtm-vis-first-on-screen-50443292_562="995" data-gtm-vis-first-on-screen-50443292_563="996" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="995" data-gtm-vis-recent-on-screen-50443292_563="996" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Methods"><div class="c-article-section" data-dcnode-id="959" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1016" id="Sec3"><span data-dcnode-id="1017" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="960" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="1014" id="Sec4"><span data-dcnode-id="1015" instrument_node="">Study design</span></h3><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">This study is a cost-effective analysis of a community-based violence intervention programme. The PMI intervention took place over the course of 5&nbsp;years in a community that will be referred to as Xtown to preserve anonymity. Xtown was chosen due to the ease of availability of homicide data for the community and its larger population size when compared to other, smaller communities in which the PMI has intervened. The number of homicides was tracked over the intervention period (2005–2009) for Xtown using Jamaica Constabulary Force data verified by community development groups. The changes in the incidence of homicides were costed considering the impact of direct medical costs and productivity losses assuming that, without intervention, the number of homicides per year would have remained at the 2005 level. This was used to estimate the cost-effectiveness of the intervention.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="1010" id="Sec5"><span data-dcnode-id="1011" instrument_node="">Xtown</span></h3><p data-dcnode-id="999"><span data-dcnode-id="1009" instrument_node="">Xtown is located in downtown Kingston, near one of the main arterial roads, and is a historic garrison community, also known as a political stronghold. In 2002, Xtown had an estimated population of ~ 15,000. There was a 30% unemployment rate compared to the national average of 15% (Statistical Institute of Jamaica </span><a aria-label="Reference 2011" data-dcnode-id="1007" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d142525516e610" title="Statistical Institute of Jamaica (2011) Population Census 2011, Kingston"><span data-dcnode-id="1008" instrument_node="">2011</span></a><span data-dcnode-id="1006" instrument_node="">; Ministry of Labour and Social Security </span><a aria-label="Reference 2006" data-dcnode-id="1004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d142525516e613" title="Ministry of Labour and Social Security (2006) National Employment Report Jamaica, Kingston"><span data-dcnode-id="1005" instrument_node="">2006</span></a><span data-dcnode-id="1003" instrument_node="">). Thirty percentages of the residents used a shared toilet facility, and 33.5% collected water from a water standpipe in the yard. 35.5% of the population lived in households with 5 or more members (Statistical Institute of Jamaica </span><a aria-label="Reference 2011" data-dcnode-id="1001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d142525516e616" title="Statistical Institute of Jamaica (2011) Population Census 2011, Kingston"><span data-dcnode-id="1002" instrument_node="">2011</span></a><span data-dcnode-id="1000" instrument_node="">).</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="997" id="Sec6"><span data-dcnode-id="998" instrument_node="">The intervention</span></h3><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">In 2005, PMI activities in Xtown began with a ‘peace walk’ through the community. The peace walk involved violence interrupters and community members walking through the community advocating for peace. The peace walk aims to (1) familiarize community members with the PMI, (2) garner community ownership of the peace and (3) allow residents to contribute their opinions and ideas for maintaining the peace.</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">After this, a closed-door mediation was held with key persons from warring factions responsible for the violence in a location outside of the community to broker peace. During these meetings, a peace agreement was reached by all parties involved to commence a ceasefire. Residential retreats were then held for the main rival gangs in a location outside of the community. The purpose of this was to target, rehabilitate and mainstream these youths and encourage them to live together peacefully.</span></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Grief counselling was held in the community for the families of lost loved ones and others affected by community violence. Community outreach events such as sporting competitions were held where youth from opposing teams played on the same teams. Dances were held with all sections of the community in attendance in order to mainstream the at-risk youth.</span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">In 2006, peace council district representatives were elected from the community to comprise the community development council (CDC) which is responsible for directing community development depending on the areas of greatest need. In 2006, the organization helped all the members of the community to obtain birth certificates, carry out a skills inventory and set up homework programmes.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">In addition, a PMI liaison officer was appointed to remain within the community and act as an early warning system should violence or the threat of violence flare up in the future. The need for intervention is relayed by the liaison officer to trained PMI staff to allow the process to restart from the first step before more violence occurs. In 2007, sporting events were organized and small income-generating activities began such as chicken rearing, furniture making and the opening of a local restaurant. 2008 saw a continuation of sporting activities and the introduction of a summer camp and homework programmes. In 2009, two residential retreats were carried out with key persons involved in community violence. These were run outside of the city in green spaces with the objective of breaking down barriers between rival groups and negotiating peace.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="985" id="Sec7"><span data-dcnode-id="986" instrument_node="">Intervention costs</span></h3><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The cost associated with the PMI intervention in Xtown was derived for the period 2005–2009. Resources were designated towards community outreach activities, residential retreats, educational assistance for students, start-up funding for income-generating programmes, skill building and other workshops as well as stipends for the violence interrupters. Total intervention costs over the 5-year period amounted to JMD $97M.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="981" id="Sec8"><span data-dcnode-id="982" instrument_node="">Estimating costs associated with homicides</span></h3><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Cost savings because of the intervention were calculated, assuming that the number of homicides in 2005 would have remained at this level without intervention since PMI entered in 2005. From this baseline, the net number of homicides averted can be calculated by subtracting the expected number of homicides over the 5-year period from the actual number of homicides. The net events avoided were then multiplied by the direct medical costs of fatal injuries and, separately, by the productivity losses associated with fatal injuries.</span></p><p data-dcnode-id="965"><span data-dcnode-id="978" instrument_node="">A lifetime approach was used to estimate the economic cost of fatal injury based on incidence data and disaggregated hospital unit cost data. The savings in direct medical cost were found using estimates for the cost of medical care for fatalities in Jamaica in 2006 published by Ward et al. (</span><a aria-label="Reference 2009" data-dcnode-id="976" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d142525516e660" title="Ward E, McCartney T, Brown D, Grant A, Butchart A, Taylor M (2009) Results of an exercise to estimate the costs of interpersonal violence in Jamaica. W Ind Med J 58:446–451"><span data-dcnode-id="977" instrument_node="">2009</span></a><span data-dcnode-id="975" instrument_node="">). Productivity loss cost savings due to homicides were also found by using estimates published by Ward et al. (</span><a aria-label="Reference 2009" data-dcnode-id="973" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d142525516e663" title="Ward E, McCartney T, Brown D, Grant A, Butchart A, Taylor M (2009) Results of an exercise to estimate the costs of interpersonal violence in Jamaica. W Ind Med J 58:446–451"><span data-dcnode-id="974" instrument_node="">2009</span></a><span data-dcnode-id="972" instrument_node="">). Productivity loss was calculated using the World Health Organization methodology for estimating the costs of violence-related injuries (Brown et al. </span><a aria-label="Reference 2008" data-dcnode-id="970" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d142525516e666" title="Brown D, Butchart A, Corso P, Florquin N, Khanh A (2008) Manual for estimating the economic costs of injuries due to interpersonal and self-directed violence.  World Health Organization, Geneva"><span data-dcnode-id="971" instrument_node="">2008</span></a><span data-dcnode-id="969" instrument_node="">). As recommended by WHO, a standard discount rate of 3% per year was used to calculate the present value of a sum of money to be earned in the future (Brown et al. </span><a aria-label="Reference 2008" data-dcnode-id="967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d142525516e669" title="Brown D, Butchart A, Corso P, Florquin N, Khanh A (2008) Manual for estimating the economic costs of injuries due to interpersonal and self-directed violence.  World Health Organization, Geneva"><span data-dcnode-id="968" instrument_node="">2008</span></a><span data-dcnode-id="966" instrument_node="">).</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="963" id="Sec9"><span data-dcnode-id="964" instrument_node="">Estimating cost-effectiveness of PMI intervention</span></h3><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Cost-effectiveness was identified by dividing the costs of the intervention by the cost of net events averted.</span></p></div></div></section><section data-dcnode-id="882" data-title="Results"><div class="c-article-section" data-dcnode-id="883" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="956" id="Sec10"><span data-dcnode-id="957" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="884" id="Sec10-content"><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">The PMI intervention in Xtown began in 2005. In 2005, before the intervention, there were 65 homicides in this community, representing a murder rate of ~ 433/100,000, compared to a national murder rate of 63/100,000 for the same year (Jamaica Constabulary Force </span><a aria-label="Reference 2005" data-dcnode-id="953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d142525516e689" title="Jamaica Constabulary Force (2005) Crime Statistics Review. Jamaica Constabulary Force, Kingston"><span data-dcnode-id="954" instrument_node="">2005</span></a><span data-dcnode-id="952" instrument_node="">).</span></p><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">In the community of Xtown, the PMI methodology resulted in a drop of 89.2% in the number of homicides in 1&nbsp;year. Five years after the initial intervention, the murder rate dropped by a total of 96.9% (Table&nbsp;</span><a data-dcnode-id="948" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="949" instrument_node="">1</span></a><span data-dcnode-id="947" instrument_node="">). This represents a fall in the annual murder rate from 433/100,000 in 2005 to 13/100,000 in 2009. Comparatively, the national murder rate reduced by only 1.61% over the 5-year period.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="931" data-test="inline-table" id="table-1"><figure data-dcnode-id="932"><figcaption class="c-article-table__figcaption" data-dcnode-id="943"><b data-dcnode-id="944" data-test="table-caption" id="Tab1"><span data-dcnode-id="945" instrument_node="">Table&nbsp;1 Number of homicides and homicides averted over the course of the Peace Management Initiative intervention in Xtown (Jamaica, 2005–2009)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="933"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="934" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00038-018-1163-x/tables/1" rel="nofollow"><span data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="935" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="936" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="937" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="940" instrument_node="">

</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="904" data-test="inline-table" id="table-2"><figure data-dcnode-id="905"><figcaption class="c-article-table__figcaption" data-dcnode-id="916"><b data-dcnode-id="917" data-test="table-caption" id="Tab2"><span data-dcnode-id="918" instrument_node="">Table&nbsp;2 Estimated average direct medical costs and productivity losses for each incident of fatal, serious and slight injuries due to interpersonal violence in 2006 in Jamaica (Jamaica, 2006) (Ward 2009)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="906"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="907" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00038-018-1163-x/tables/2" rel="nofollow"><span data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="908" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="909" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="910" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="913" instrument_node="">

</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="896" fill-rule="evenodd"></path><span data-dcnode-id="895" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">An estimated JMD $17M was saved in direct medical costs as a result of the intervention. Indirect costs saved are estimated at JMD $3.7B which, after being discounted by 3% to give the present value of this sum of money, amounted to JMD $1.19B. As a result, the total direct and indirect costs saved have been estimated at JMD $1.20B. Given that the PMI programme costs were JMD $97M over the same period, the cost/benefit ratio for the intervention has been estimated to be JMD $12.38 saved per dollar spent on intervention.</span></p></div></div></section><section data-dcnode-id="841" data-title="Discussions"><div class="c-article-section" data-dcnode-id="842" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="880" id="Sec11"><span data-dcnode-id="881" instrument_node="">Discussions</span></h2><div class="c-article-section__content" data-dcnode-id="843" id="Sec11-content"><p data-dcnode-id="872"><span data-dcnode-id="879" instrument_node="">The results of our analysis indicate that the PMI intervention is not only effective in reducing homicides in Xtown but also presents as a cost-effective approach. This positions the PMI as a promising method for violence prevention that can act as an alternative to the use of suppression or deterrence by law enforcement, a method which has not been successful in the past in the Caribbean and Latin American region (Harriot </span><a aria-label="Reference 2003" data-dcnode-id="877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d142525516e1228" title="Harriot A (2003) Understanding crime in Jamaica: new challenges for public policy. University of the West Indies Press, Kingston, Jamaica"><span data-dcnode-id="878" instrument_node="">2003</span></a><span data-dcnode-id="876" instrument_node="">; Schuberth </span><a aria-label="Reference 2016" data-dcnode-id="874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d142525516e1231" title="Schuberth M (2016) Beyond Gang Truces and Mano Dura policies: towards substitutive security governance in Latin America. Int J Secur Dev. 
                    http://doi.org/10.5334/sta.450
                    
                  
                        "><span data-dcnode-id="875" instrument_node="">2016</span></a><span data-dcnode-id="873" instrument_node="">). Furthermore, the intervention presents the viability of the public health approach in a developing country setting outside of more popular programmes functioning in the USA such as Cure Violence and Boston TenPoint Coalition. The research presented also aims to address the unfortunate lack of cost-effectiveness research associated with these types of violence reduction strategies, the lack of which hampers their expansion and replication.</span></p><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">While the costs derived encompass the direct and indirect losses as a result of homicides, this value is likely a severe underestimation of the true economic burden of violence on the country. It is especially difficult to estimate the cost of witnessing or losing a loved one due to homicide and the effect of this on children, families, communities and the society. While various studies have captured the direct medical cost and productivity loss of such injuries, as yet, the loss of productivity to the Jamaican economy as a result of lost tourism income, foreign direct investment, increased security expenditure and depressed real-estate values has not yet been estimated (Ward et al. </span><a aria-label="Reference 2009" data-dcnode-id="869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d142525516e1237" title="Ward E, McCartney T, Brown D, Grant A, Butchart A, Taylor M (2009) Results of an exercise to estimate the costs of interpersonal violence in Jamaica. W Ind Med J 58:446–451"><span data-dcnode-id="870" instrument_node="">2009</span></a><span data-dcnode-id="868" instrument_node="">). No measure can truly quantify the impact of this preventable loss of human life on the Jamaican society.</span></p><p data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">Evaluations of multifaceted interventions like PMI targeted to community change are particularly challenging to assess. When measuring community-level change, few research designs control for the various types of confounding factors that influence violence apart from the intervention being studied (Butts et al. </span><a aria-label="Reference 2015" data-dcnode-id="864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d142525516e1243" title="Butts J, Roman C, Bostwick L, Porter J (2015) Cure violence: a public health approach. Annu Rev Publ Health 36:39–53. 
                    https://doi.org/10.1146/annurev-publhealth-031914-122509
                    
                  
                        "><span data-dcnode-id="865" instrument_node="">2015</span></a><span data-dcnode-id="863" instrument_node="">). Due to the lack of a control community (one in which no intervention takes place), it is difficult to compare the findings to natural fluctuations in violence. This places constraints on accounting for the findings solely to the work of PMI. However, the case for the PMI approach is strengthened by similar successes it has seen in other communities. An overall 75% reduction in homicides was seen for four communities over a similar 5-year intervention period conducted by PMI (Levy </span><a aria-label="Reference 2012" data-dcnode-id="861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d142525516e1246" title="Levy H (2012) Youth, gangs and organized crime. International Development Research Centre, Ottawa, Canada"><span data-dcnode-id="862" instrument_node="">2012</span></a><span data-dcnode-id="860" instrument_node="">). Furthermore, this reduction in the murder rate has been sustained post-intervention over the last 10&nbsp;years in Xtown.</span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">The impact of this intervention warrants an independent external evaluation of a fully funded programme of PMI activities. Armed with further evidence of the impact of PMI, a greater case can be made for a wide-scale PMI intervention across the island. If the PMI model is to be a sound example of the public health approach to violence reduction, then various sectors must unite to utilize data and evaluation that can create a rigorous test of the intervention. It must also be noted that the effect of the intervention on other forms of violence outside of homicides was not assessed but is vital to evaluate in future explorations.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The emphasis on community development is a critical part of the PMI approach. In the earlier phase of the PMI intervention, it pacifies these volatile communities to allow for social development agencies to enter the community and for community members to become engaged in local activities (use of playgrounds, church attendance, school attendance, etc.). After the initial drop in the homicide rate, other agencies including the Citizen Security and Justice Programme (CSJP), Community Security Initiative (CSI), Jamaica Social Investment Fund (JSIF) and Ministry of Health (MOH) re-entered the community. Investments were made into the physical assets of the communities. These included road repairs, a multipurpose court and the rehabilitation of a park in the neighbourhood by the Jamaican Social Investment Fund (JSIF). CSJP and CSI played an important role in the latter part of the intervention by providing parenting programmes, after-school activities, life skills training programmes, job trainings and work placements. Work has continued in subsequent years to improve the standard of living of these communities and maintain peace guided by the CDC. It effectively serves as a bridge for the entry of other agencies for long-term community development to begin.</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Specifically, the PMI ensures that the community take ownership of the peace and responsibility for policing the at-risk youth. Other social intervention projects may have had a limited impact (in comparison with PMI) on reducing the homicide rate because they focus more narrowly on the gang elements or target their interventions towards other specific subgroups of the community. On the other hand, the PMI engages the whole community, and specifically at-risk youth, to change community norms. To further promote community ownership, local community members are trained to become leaders of the community and become part of the CDC. PMI’s inclusion of CDCs builds on the peace by attracting further investment into the assets and infrastructure of the community. Dealing with the traumatic effects of community violence is another critical part of the PMI which serves to placate grieving community members and reduce retaliation killings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="851" id="Sec12"><span data-dcnode-id="852" instrument_node="">Conclusion</span></h3><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The results from our case study show a reduction in the homicide rate of 96.9% in Xtown that has been attributed to the efforts of the PMI intervention and provides cost savings of at least $12 dollars for every dollar spent. This positions the PMI as a promising method for violence prevention that can act as an alternative to the use of suppression or deterrence by law enforcement. The impact of this intervention warrants an independent external evaluation of PMI activities if it is to serve as a sound example of the public health approach to violence reduction.</span></p><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">Historically, most public security in the Caribbean has&nbsp;invested in&nbsp;law enforcement and corrections with little, though increasing, focus on violence prevention (UNDP </span><a aria-label="Reference 2012" data-dcnode-id="846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d142525516e1269" title="United Nations Development Programme (2012) Caribbean Human Development Report: Human Development and the Shift to Better Citizen Security. New York, USA"><span data-dcnode-id="847" instrument_node="">2012</span></a><span data-dcnode-id="845" instrument_node="">). While enforcement-based violence reduction methods are necessary,&nbsp;interventions using a public health approach&nbsp;would&nbsp;lead to deeper and lasting social change.&nbsp;To change negative community norms and attitudes and to disrupt the underlying sociocultural conditions, law enforcement, corrections and prevention strategies must be employed collectively to build sustainable peace.
</span></p></div></div></section><span data-dcnode-id="840" instrument_node="">
</span><div data-dcnode-id="712" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="713" data-title="References"><div class="c-article-section" data-dcnode-id="714" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="838" id="Bib1"><span data-dcnode-id="839" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="715" id="Bib1-content"><div data-container-section="references" data-dcnode-id="716"><ul class="c-article-references" data-dcnode-id="726"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="832"><p class="c-article-references__text" data-dcnode-id="833" id="ref-CR1"><span data-dcnode-id="837" instrument_node="">Boston TenPoint Coalition (2015) Boston TenPoint Coalition: embracing the challenge. </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//btpcoalition.org/about-us/"><span data-dcnode-id="836" instrument_node="">http://btpcoalition.org/about-us/</span></a><span data-dcnode-id="834" instrument_node="">. Accessed 21 Dec 2017</span></p></li><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="819"><p class="c-article-references__text" data-dcnode-id="827" id="ref-CR2"><span data-dcnode-id="831" instrument_node="">Braga A, Kennedy D, Waring E, Piehl A (2001) Problem-oriented policing, deterrence, and youth violence: an evaluation of Boston’s Operation Ceasefire. J Res Crime Delinq 38:195–225. </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0022427801038003001"><span data-dcnode-id="830" instrument_node="">https://doi.org/10.1177/0022427801038003001</span></a><span data-dcnode-id="828" instrument_node="">
