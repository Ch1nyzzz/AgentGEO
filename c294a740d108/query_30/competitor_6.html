</span><p data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">This page provides free access to model building codes, specific provincial, state, city or other building codes and various building standards.</span></p><span data-dcnode-id="5867" instrument_node="">

</span><p data-dcnode-id="5853"><span data-dcnode-id="5860" instrument_node="">We also provide  an </span><a data-dcnode-id="5858" href="#MasterIndex"><span data-dcnode-id="5859" instrument_node="">ARTICLE INDEX</span></a><span data-dcnode-id="5857" instrument_node=""> for this topic,  or you can  try the page top or bottom </span><a data-dcnode-id="5855" href="#QA"><span data-dcnode-id="5856" instrument_node="">SEARCH BOX</span></a><span data-dcnode-id="5854" instrument_node=""> as a quick way to find information you need. </span></p><span data-dcnode-id="5852" instrument_node="">

</span><p data-dcnode-id="5838"><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/NFPA%2520HVAC%252090A-8%25204.3%2520Air%2520Distribution.pdf"><img alt="NFPA 4.3.1 code on air duct materials at InspectApedia.com" class="Image_Standard" data-dcnode-id="5841" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/aircond/NFPA%2520AIr%2520Ducts%25204.3.1.jpg&amp;raw"></a><span data-dcnode-id="5839" instrument_node="">This section of this page provides downloadable PDF copies of various building codes &amp; standards.</span></p><span data-dcnode-id="5837" instrument_node="">
</span><p data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">We also provide contact information for various building code &amp; standard agencies. Some of these permit free online access to building codes in non-printable or non-downloadable versions and all of the code agencies permit purchase of copies of the codes they maintain.</span></p><span data-dcnode-id="5834" instrument_node="">
</span><p data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">Because various states or provinces also have adopted versions of the model codes, often a copy of these is available from the state or province at no charge.</span></p><span data-dcnode-id="5831" instrument_node="">
</span><p data-dcnode-id="5827"><span data-dcnode-id="5830" instrument_node="">Shown here, an excerpt from NFPA 90A covering the construction, installation, operation, and maintenance of air conditioning and ventilation systems, including filters, ducts, and related equipment, [in order] to protect life and property from fire, smoke, and gases resulting from fire or conditions that have manifestations similar to fire. </span><em data-dcnode-id="5828"><span data-dcnode-id="5829" instrument_node="">[Click to enlarge any image] </span></em></p><span data-dcnode-id="5826" instrument_node="">
</span><p data-dcnode-id="5822"><strong data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">Tip</span></strong><span data-dcnode-id="5823" instrument_node="">: use your browser's on-page search feature (CTRL-F or on a Mac CMD-F) to look for one or two keywords narrowing your interest, such as "septic" that will find septic system design codes &amp; guidelines. Or use the InspectApedia page top or bottom SEARCH BOX to find articles including codes on a specific topic.</span></p><span data-dcnode-id="5821" instrument_node="">

</span><li class="LI_Spaced" data-dcnode-id="5641"><strong data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">Australia National Construction Code</span></strong><span data-dcnode-id="5655" instrument_node="">, NCC 2016: Website: http://www.abcb.gov.au/Resources/Publications/NCC/NCC-2016-Complete-Series offers a login to download a zipped file of the NCC itself. You will have to register first at http://www.abcb.gov.au/User/Register</span><br data-dcnode-id="5654"><br data-dcnode-id="5653"><span data-dcnode-id="5652" instrument_node="">The 2016 NCC was adopted by the Australian states and territories on 1 May 2016.</span><br data-dcnode-id="5651"><span data-dcnode-id="5650" instrument_node="">Website excerpts:</span><br data-dcnode-id="5649"><br data-dcnode-id="5648"><span data-dcnode-id="5647" instrument_node="">
</span><em data-dcnode-id="5642"><span data-dcnode-id="5646" instrument_node="">NCC 2016, Complete Series contains NCC 2016 Volumes One, Two, Three, The Guide and the Consolidated Performance Requirements. The series is a uniform set of technical provisions for the design and construction of buildings and other structures throughout Australia, which allows for variations in climate and geological or geographic conditions.</span><br data-dcnode-id="5645"><br data-dcnode-id="5644"><span data-dcnode-id="5643" instrument_node="">The National Construction Code (NCC) provides the minimum necessary requirements for safety, health, amenity and sustainability in the design and construction of new buildings (and new building work in existing buildings) throughout Australia</span></em></li><span data-dcnode-id="5640" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="5634"><em data-dcnode-id="5635"><span data-dcnode-id="5639" instrument_node="">. It is a uniform set of technical provisions for building work and plumbing and drainage installations throughout Australia whilst allowing for variations in climate and geological or geographic conditions.</span><br data-dcnode-id="5638"><br data-dcnode-id="5637"><span data-dcnode-id="5636" instrument_node="">The NCC is an initiative of the Council of Australian Governments (COAG) developed to incorporate all on-site construction requirements into a single code. The NCC is comprised of the Building Code of Australia (BCA), Volume One and Two; and the Plumbing Code of Australia (PCA), Volume Three.</span></em></li><span data-dcnode-id="5633" instrument_node="">
</span></ul><span data-dcnode-id="5631" instrument_node="">
</span><h2 data-dcnode-id="5628"><a data-dcnode-id="5630" name="Canadians"></a><span data-dcnode-id="5629" instrument_node="">Canada Model Building Codes</span></h2><span data-dcnode-id="5627" instrument_node="">
</span><h4 data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">Canadian building codes </span></h4><span data-dcnode-id="5624" instrument_node="">
</span><p data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">2022 update: excerpted from email received 28 May 2022</span></p><span data-dcnode-id="5621" instrument_node="">
</span><p data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">New direct access to free electronic codes and user’s guides!</span></p><span data-dcnode-id="5618" instrument_node="">
</span><p data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">The National Research Council of Canada (NRC) provides</span></p><span data-dcnode-id="5615" instrument_node="">
</span><ul data-dcnode-id="5608"><span data-dcnode-id="5614" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="5610"><a data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//outreach-nrc.canada.ca/T/OFC4/L2S/6391/B2726809/z8MC/743433/28026135/MSHjeG/1/1603408/BAAAXFBo/I/756512/nC8N0V.html%3Fh%3D0LBuH2W88i_yqsXaM9ZQOd1LY2dHw72ywPerd7QNlLA"><span data-dcnode-id="5613" instrument_node="">FREE ELECTRONIC ACCESS TO THE NATIONAL MODEL CODES of CANADA</span></a><span data-dcnode-id="5611" instrument_node=""> in April 2019, through funding from the Government of Canada in support of freely available and harmonized building codes.</span></li><span data-dcnode-id="5609" instrument_node="">
</span></ul><span data-dcnode-id="5607" instrument_node="">
</span><p data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">As of March 28, 2022, code users can access the latest, updated editions of the National Model Codes, including the National Building Code of Canada 2020, the National Fire Code of Canada 2020, the National Plumbing Code of Canada 2020, and the National Energy Code of Canada for Buildings 2020. </span></p><span data-dcnode-id="5604" instrument_node="">
</span><p data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">The Codes are developed by the Canadian Commission on Building and Fire Codes (CCBFC), and are published by the National Research Council of Canada (NRC).</span></p><span data-dcnode-id="5601" instrument_node="">
</span><p data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">The CCBFC has included nearly 400 updates in the latest editions of the National Model Codes. These replace the 2015 and 2017 editions of the codes.</span></p><span data-dcnode-id="5598" instrument_node="">

</span><p data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">The 2020 National Model Codes are available for free, in electronic format, through</span></p><span data-dcnode-id="5592" instrument_node="">

</span><p data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">and for purchase, in printed format, from </span></p><span data-dcnode-id="5583" instrument_node="">
</span><p data-dcnode-id="5578"><span data-dcnode-id="5582" instrument_node="">the </span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop-magasin.nrc-cnrc.gc.ca/nrcb2c/app/displayApp/%28layout%3D7.54-7_1_72_64_134_6_9%26carea%3D%2524ROOT%29/.do%3Frf%3Dy"><span data-dcnode-id="5581" instrument_node="">NRC's VIRTUAL STORE</span></a><span data-dcnode-id="5579" instrument_node=""> [Website] .</span></p><span data-dcnode-id="5577" instrument_node="">
</span><p data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Previous editions of the codes also remain available through these websites.</span></p><span data-dcnode-id="5574" instrument_node="">
</span><p data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">Making the codes freely available in electronic format has given more Canadians access to the</span></p><span data-dcnode-id="5571" instrument_node="">
</span><ul data-dcnode-id="5550"><span data-dcnode-id="5570" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="5567"><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//outreach-nrc.canada.ca/T/OFC4/L2S/6391/B2726809/z8MC/743433/28026136/nXYnjm/1/1603408/BAAAXFBo/I/756512/nC8N0V.html%3Fh%3D9OFOcKAnyE5Q_nIdYDuRGPMsXFNn8cJNiPYiUfpR-g0"><span data-dcnode-id="5569" instrument_node="">NATIONAL BUILDING CODE OF CANADA (NBC)</span></a></li><span data-dcnode-id="5566" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="5562"><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//outreach-nrc.canada.ca/T/OFC4/L2S/6391/B2726809/z8MC/743433/28026137/KyYLsE/1/1603408/BAAAXFBo/I/756512/nC8N0V.html%3Fh%3DNRvwioJkVunsxP2teLDktR0z--HSn6VSzpkva723wvA"><span data-dcnode-id="5565" instrument_node="">THE NATIONAL FIRE CODE OF CANADA (NFC)</span></a><span data-dcnode-id="5563" instrument_node="">,</span></li><span data-dcnode-id="5561" instrument_node="">

</span></ul><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">as well as the provincial codes published by the NRC. These codes play a critical role in protecting the health and safety of Canadians when their homes, their places of work and other buildings are built or renovated.</span></p><span data-dcnode-id="5546" instrument_node="">
</span><p data-dcnode-id="5542"><span data-dcnode-id="5545" instrument_node="">The NRC is pleased to share two recent updates that aim to further improve access to the National Model Codes and related publications for Canadians:</span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">  Free user’s guides</span></p><span data-dcnode-id="5541" instrument_node="">

</span><li class="LI_Spaced" data-dcnode-id="5429"><p data-dcnode-id="5431"><span data-dcnode-id="5435" instrument_node=""> Earlier Canadian building code adoptions are dated as follows:</span><br data-dcnode-id="5434"><br data-dcnode-id="5433"><span data-dcnode-id="5432" instrument_node="">The first National Building Code of Canada (NBC) was published in 1941; subsequent editions were published in 1953, 1960, 1965, 1970, 1975, 1977, 1980, 1985, 1990 and 1995.</span></p><span data-dcnode-id="5430" instrument_node="">

</span><em data-dcnode-id="5397"><span data-dcnode-id="5410" instrument_node="">The Historical Editions of Codes Canada publications on-line is a single collection of the English and French editions of all Code documents published between 1941 and 1998. The first National Building Code of Canada (NBC) was published in 1941;</span><br data-dcnode-id="5409"><br data-dcnode-id="5408"><span data-dcnode-id="5407" instrument_node="">subsequent editions were published in 1953, 1960, 1965, 1970, 1975, 1977, 1980, 1985, 1990 and 1995.</span><br data-dcnode-id="5406"><br data-dcnode-id="5405"><span data-dcnode-id="5404" instrument_node="">The first National Fire Code of Canada was published in 1963; subsequent editions were published in 1975, 1977, 1980, 1985, 1990 and 1995.</span><br data-dcnode-id="5403"><br data-dcnode-id="5402"><span data-dcnode-id="5401" instrument_node="">Plumbing requirements were included in all editions of the NBC up until 1970 when they were published as a separate Code. The first National Farm Building Code of Canada (NFBC) was published in 1960.</span><br data-dcnode-id="5400"><br data-dcnode-id="5399"><span data-dcnode-id="5398" instrument_node="">Subsequent editions were published in 1965, 1970, 1975, 1977, 1983, 1990, and 1995. The Model National Energy Codes for Buildings and Houses were published in 1997..</span></em></p><span data-dcnode-id="5395" instrument_node="">

within partitions, walls, floors, roofs, stairs, furring, pipe spaces, 
column enclosures, etc. that would permit passage of flame

roof space, or from one concealed area to another, 
shall be firestopped to form an effective draft barrier, or shall be filled 
with noncombustible material in accordance with the requirements of this section.</span><br data-dcnode-id="3867"><br data-dcnode-id="3866"><span data-dcnode-id="3865" instrument_node="">Firestopping shall not be required where a
    concealed space is sprinklered in accordance with the

</span><em data-dcnode-id="3847"><strong data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">(a) Firestopping materials.</span></strong><span data-dcnode-id="3858" instrument_node="">- In buildings of construction
    group I, firestopping or fill shall be of noncombustible
    material that can be shaped, fitted, and permanently
    secured in position.</span><br data-dcnode-id="3857"><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">
    In buildings of construction group II,
    firestopping may be of combustible material consisting of
    wood 
    not less than two inches nominal thickness with
    tight joints, two layers of one inch nominal thickness
    assembled so that there are no through joints or of onehalf
    inch exterior type plywood with joints backed,
    except that noncombustible firestopping shall be used in
    concealed spaces of fire divisions and where in contact
    with fireplaces, flues, and chimneys.</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">
</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">Noncombustible

    three- quarter inch thick mortar or plaster on
    noncombustible lath, plasterboard at least three-eighths
    of an inch thick, fire-rated wallboard at least five eighths
    of an inch thick, sheet metal at least No. 14 U.S.
    std. gage thick, solid web metal structural members,
    asbestos-cement board at least one-quarter of an inch
    thick, or equivalent rigid noncombustible material.</span><br data-dcnode-id="3850"><br data-dcnode-id="3849"><span data-dcnode-id="3848" instrument_node="">Mineral, slag, or rockwool may be used for firestopping

</span><em data-dcnode-id="3819"><span data-dcnode-id="3832" instrument_node="">1.1* Scope. A.1.1 This standard provides a range of sprinkler system approaches, design development alternatives, and component options that are all acceptable. Building owners and their designated representatives are advised to carefully evaluate proposed selections for appropriateness and preference.</span><br data-dcnode-id="3831"><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">1.1.1 This standard shall provide the minimum requirements for the design and installation of automatic fire sprinkler systems and exposure protection sprinkler systems covered within this standard.</span><br data-dcnode-id="3828"><br data-dcnode-id="3827"><span data-dcnode-id="3826" instrument_node="">1.1.2 This standard shall not provide requirements for the design or installation of water mist fire protection systems, which are not considered fire sprinkler systems and are addressed by NFPA 750.</span><br data-dcnode-id="3825"><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">1.1.3* This standard is written with the assumption that the sprinkler system shall be designed to protect against a single fire originating within the building. A.1.1.3 This standard also provides guidance for the installation of systems for exterior protection and specific hazards.</span><br data-dcnode-id="3822"><br data-dcnode-id="3821"><span data-dcnode-id="3820" instrument_node="">Where these systems are installed, they are also designed for protection of a fire from a single ignition source.</span></em></li><span data-dcnode-id="3817" instrument_node="">

</span><em data-dcnode-id="3475"><span data-dcnode-id="3488" instrument_node="">This handbook is a guide for those approving HUD-code manufactured homes on permanent foundations, including engineers, manufacturers, and site owners seeking approval. It provides current technical information, recommendations, and tables of analytical data, expanding and clarifying the definition of a permanent foundation.</span><br data-dcnode-id="3487"><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">It updates 1989 loading requirements for snow, wind, and seismic forces.</span><br data-dcnode-id="3484"><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">Because of the increased use of multi-section manufactured homes, the guide now includes consideration of large openings along the length of marriage walls in multi-section units.</span><br data-dcnode-id="3481"><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">The construction recommendations assure that the home, foundation, and site are all compatible. In addition to the new technical recommendations, the guide has been expanded and reorganized for easy reference with more illustrations and clarifications.</span><br data-dcnode-id="3478"><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">The handbook can greatly assist preparation of the worksheets needed to apply for an FHA mortgage</span></em></li><span data-dcnode-id="3473" instrument_node="">

</span><li class="LI_Spaced" data-dcnode-id="1325"><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/ventilation/KitchenAid-Canopy-Range-Hood-Guide.pdf"><span data-dcnode-id="1328" instrument_node="">KITCHENAID ISLAND CANOPY RANGE HOOD INSTALLATION</span></a><span data-dcnode-id="1326" instrument_node=""> [PDF] , retrieved 2018/03/23, original sourcehttps://www.kitchenaid.com/ digitalassets/KXI4336YSS Dimension%20Guide_EN.pdf</span></li><span data-dcnode-id="1324" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1320"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inspectapedia.com/Design/ICC-Chapter%25204_Ventilation-NYC-2008.pdf"><span data-dcnode-id="1323" instrument_node="">NEW YORK CITY MECHANICAL CODE (2008)</span></a><span data-dcnode-id="1321" instrument_node=""> [PDF] adapted from the ICC Mechanical code, Chapter 4, VENTILATION, retrieved 2017/08/01,original source: http://www2.iccsafe.org/states/newyorkcity/Mechanical/PDFs/Chapter%204_Ventilation.pdf</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li class="LI_Spaced" data-dcnode-id="1206"><span data-dcnode-id="1318" instrument_node="">Ontario Canada Building Code OBC 9.10.22. Fire Protection for Gas, Propane and Electric Cooktops </span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">Excerpts:</span><br data-dcnode-id="1315"><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">
</span><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">9.10.22.1. Installation of Ranges </span></strong><br data-dcnode-id="1310"><em data-dcnode-id="1272"><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">(1) Reserved </span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">(2) Clearances for and protection around gas, propane and electric ranges shall be not less than those provided in Articles 9.10.22.2. and 9.10.22.3.</span><br data-dcnode-id="1305"><br data-dcnode-id="1304"><span data-dcnode-id="1303" instrument_node="">9.10.22.2. Vertical Clearances above Cooktops</span><br data-dcnode-id="1302"><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
(1) Except as provided in Sentence (2), framing, finishes and cabinetry installed directly above the location of the cooktop shall be not less than 750 mm above the level of cooktop burners or elements.</span><br data-dcnode-id="1299"><br data-dcnode-id="1298"><span data-dcnode-id="1297" instrument_node="">
(2) The vertical clearance described in Sentence (1) for framing, finishes and cabinets located directly above the location of the cooktop is permitted to be reduced to 600 mm above the level of the elements or burners provided the framing, finishes and cabinets,</span><br data-dcnode-id="1296"><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
(a) are noncombustible, or</span><br data-dcnode-id="1293"><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">
(b) are protected by,</span><br data-dcnode-id="1290"><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
(i) asbestos millboard not less than 6 mm thick, covered with sheet metal not less than 0.33 mm thick, or</span><br data-dcnode-id="1287"><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">
(ii) a metal hood with a 125 mm projection beyond the framing, finishes and cabinets.</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">9.10.22.3. Protection Around Cooktops</span><br data-dcnode-id="1281"><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">
(1) Except as provided in Sentences (2) and (3), combustible wall framing, finishes or cabinets within 450 mm of the area where the cooktop is to be located shall be protected above the level of the heating elements or burners by material providing fire resistance not less than that of a 9.5 mm thickness of gypsum board.</span><br data-dcnode-id="1278"><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
(2) Countertop splash boards or back plates that extend above the level of the heating elements or burners need not be protected as described in Sentence (1).</span><br data-dcnode-id="1275"><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">
(3) Except for cabinetry described in Article 9.10.22.2., cabinetry located not less than 450 mm above the level of the heating elements or burners need not be protected as described in Sentence (1).</span></em><br data-dcnode-id="1271"><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">
</span><br data-dcnode-id="1268"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">9.32.3.12. Outdoor Intake and Exhaust Openings</span></strong><br data-dcnode-id="1265"><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">
</span><em data-dcnode-id="1207"><span data-dcnode-id="1262" instrument_node="">(1) Separate air intake and exhaust outlet openings, when located on the same wall or roof, shall be installed so as to avoid contamination of the ventilation air by the exhaust air.</span><br data-dcnode-id="1261"><br data-dcnode-id="1260"><span data-dcnode-id="1259" instrument_node="">
(2) Intake openings shall be located so as to avoid contamination of the ventilation air from other local sources such as automobile exhausts and exhaust from adjacent buildings.</span><br data-dcnode-id="1258"><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
(3) The distance from the bottom of an air intake opening to finished ground level or to any nearer and lower permanent horizontal surface shall be not less than 450 mm or the depth of expected snow accumulation, whichever is greater.</span><br data-dcnode-id="1255"><br data-dcnode-id="1254"><span data-dcnode-id="1253" instrument_node="">
(4) The distance separating air intakes from building envelope penetrations that are potential sources of contaminants, such as gas vents or oil fill pipes, shall be not less than 900 mm.</span><br data-dcnode-id="1252"><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">
(5) Air intakes shall be clearly labelled as such for identification from locations outside the dwelling unit.</span><br data-dcnode-id="1249"><br data-dcnode-id="1248"><span data-dcnode-id="1247" instrument_node="">
(6) The distance from the bottom of an exhaust outlet to finished ground level or to any nearer and lower permanent horizontal surface shall be not less than 100 mm.</span><br data-dcnode-id="1246"><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">
(7) Where air intake and exhaust openings are in exposed locations, provision shall be made to protect them from the entry of precipitation by the use of louvres, weather cowls or other suitable protection.</span><br data-dcnode-id="1243"><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
(8) Air intake openings shall incorporate screens or grilles to protect against the entry of animals and insects.</span><br data-dcnode-id="1240"><br data-dcnode-id="1239"><span data-dcnode-id="1238" instrument_node="">
(9) Except for exhaust outlets serving heat recovery ventilators, exhaust outlets shall incorporate backdraft dampers.</span><br data-dcnode-id="1237"><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">
(10) Except for clothes dryers, exhaust outlets shall be fitted with screens of mesh not larger than 15 mm, except where climatic conditions may require larger openings.</span><br data-dcnode-id="1234"><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">
(11) Where a screen or grille required by Sentences (8) and (10) has a screen mesh less than 6 mm, the screen or grille shall be removable for cleaning.</span><br data-dcnode-id="1231"><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
(12) The gross area of the screens or grilles installed in intake and exhaust openings shall be three times that of the duct served.</span><br data-dcnode-id="1228"><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">
(13) Screens and grilles shall be of corrosion-resistant material.</span><br data-dcnode-id="1225"><br data-dcnode-id="1224"><span data-dcnode-id="1223" instrument_node="">
(14) The net free area of an air intake or exhaust outlet shall be equal to or greater than the cross-sectional area of the duct served.</span><br data-dcnode-id="1222"><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">9.32.3.13. Installation</span><br data-dcnode-id="1219"><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">
(1) Installation of fans and heat recovery ventilators shall be in accordance with manufacturer’s instructions for minimizing noise and vibration transmission and achieving the required sound rating.</span><br data-dcnode-id="1216"><br data-dcnode-id="1215"><span data-dcnode-id="1214" instrument_node="">
(2) Where flow-regulating dampers are required, they shall be adjustable and accessible without requiring the removal of fans, motors, or insulating materials and without the need for specialized tools.</span><br data-dcnode-id="1213"><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">
(3) Ventilation equipment shall be accessible for inspection, maintenance, repair and cleaning.</span><br data-dcnode-id="1210"><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">
(4) Ventilation equipment installed in unheated spaces shall be installed so as to avoid condensation of moisture on fans and motors in accordance with the manufacturer’s instructions.</span></em></li><span data-dcnode-id="1205" instrument_node="">
</span></ul><span data-dcnode-id="1203" instrument_node="">

</span><p class="recent-comment-hdr" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">On 2021-06-22 by inspectapedia.com.moderator (mod) - theatre seating  fire &amp; safety codes</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1112" instrument_node="">
      @Dean Read,</span><br data-dcnode-id="1111"><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">I think we need to add detail here about theatre seating but from just the four words in your brief question we may be missing what's needed for your case.</span><br data-dcnode-id="1108"><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">I note that the theater seating manufacturers are themselves good sources of basic standards and terms for theater seating measurements such as the</span><br data-dcnode-id="1105"><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">Brown, Jenna, "10 Seating Terms To Know When Planning An Auditorium", Irwin Seating Company, 3251 Fruit Ridge NW, Grand Rapids, MI 49544 USA, Tel:  616-574-7400 or Toll Free: 1-866-GO IRWIN (464-7946) </span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">
      retrieved 2021/06/22 original source: https://blog.irwinseating.com/10-seating-terms-to-know-when-planning-an-auditorium</span><br data-dcnode-id="1100"><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">Among these terms (regrettably she did not include dimensions, just definitions of terms, probably because they vary by building code jurisdiction) a few critical ones  for moving in and out of the theatre or auditorium safely (we've edited the original text for clarity) might incude</span><br data-dcnode-id="1097"><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">- Clear passage space: free walking area between the front of the chair to the portion of the back of the chair in front of it that most projects into the walking space.</span><br data-dcnode-id="1094"><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">- Row length: total outside dimension of an entire row of seats - maximum possible walking distance from aisle to aisle</span><br data-dcnode-id="1091"><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">- Row spacing - between rows - including to meet ADA requirements</span><br data-dcnode-id="1088"><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">and I would add:</span><br data-dcnode-id="1085"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">- Aisle widths and lengths</span><br data-dcnode-id="1082"><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">- Location and number of exits</span><br data-dcnode-id="1079"><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">- Slope of flooring, aisles, passageways</span><br data-dcnode-id="1076"><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">- Stair riser heights (you can find those at InspectApedia)</span><br data-dcnode-id="1073"><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">- Handrailing and guardrail heights (you can find those at InspectApedia)</span><br data-dcnode-id="1070"><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">- Distances to emergency exits</span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">- Lighting and marking for emergency exits (you can find those at InspectApedia)</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">- Fire codes on flammability of chairs, seating, carpets, etc. for public auditoriums and halls
      </span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
      (See NFPA 260 &amp; California 117 on the Smoldering Cigarette test and </span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
      See California 133 on Chair Flame Testing)</span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">And of course there is still longer list of chair pitch, chair dimensions such as width etc. even
      </span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
      details of the requirements for the security of floor mounting of seating.</span><br data-dcnode-id="1052"><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">From all of this my suggestion is to identify your building code jurisdiction so that one might focus on the specific codes that you'd have to meet.</span><br data-dcnode-id="1049"></p><span data-dcnode-id="1047" instrument_node="">
</span><p class="recent-comment-hdr" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">On 2021-06-18 by inspectapedia.com.moderator (mod)    </span></p><span data-dcnode-id="1044" instrument_node="">
