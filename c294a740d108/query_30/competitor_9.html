</span><div class="page-center" data-dcnode-id="1541"><span data-dcnode-id="1551" instrument_node="">
</span><div class="main-container" data-dcnode-id="1543"><span data-dcnode-id="1550" instrument_node="">
</span><div class="content" data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">
</span><div class="content" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">
</span></div><span data-dcnode-id="1546" instrument_node="">
</span></div><span data-dcnode-id="1544" instrument_node="">
</span></div><span data-dcnode-id="1542" instrument_node="">
</span></div><span data-dcnode-id="1540" instrument_node="">
</span></div><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span><article data-dcnode-id="1293"><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="1294" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">The basic purpose of a generator is to provide electric power whenever the supply from the local electric utility company suffers an interruption. Depending on the application, a generator can be a luxury item or a critical system that is required by law:</span></p><span data-dcnode-id="1533" instrument_node="">
</span><span data-dcnode-id="1531" instrument_node="">
</span><ul data-dcnode-id="1517"><span data-dcnode-id="1530" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">In households, the main function of a generator is to provide comfort for occupants: Normally there are no drastic consequences from interrupting the power supply, but it can cause discomfort, especially during nighttime when lighting is needed, or during hot or cold days when HVAC systems are used extensively.</span></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">In commercial locations, there is actually a financial </span><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/when-is-a-generator-required"><span data-dcnode-id="1525" instrument_node="">benefit from owning a generator</span></a><span data-dcnode-id="1523" instrument_node=""> because it allows business operations to continue even when there is no power supply</span></li><span data-dcnode-id="1521" instrument_node="">
</span><li data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Finally, there are locations when backup power is critical. For example, if any healthcare facility is left without backup power even for a short amount of time, the consequences can be severe</span></li><span data-dcnode-id="1518" instrument_node="">
</span></ul><span data-dcnode-id="1516" instrument_node="">
</span><hr data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">
</span><h2 data-dcnode-id="1512" style="text-align: center;"><span data-dcnode-id="1513" instrument_node="">Our electrical engineers can specify the best emergency generator for your building.</span></h2><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1501"><span class="hs-cta-wrapper" data-dcnode-id="1503" id="hs-cta-wrapper-9f1640ac-fdd9-40ef-9783-15bbf9f5a022"><span class="hs-cta-node hs-cta-9f1640ac-fdd9-40ef-9783-15bbf9f5a022" data-dcnode-id="1507" data-hs-drop="true" id="hs-cta-9f1640ac-fdd9-40ef-9783-15bbf9f5a022" style="visibility: visible; display: block; text-align: center;"><a class="cta_button ylo-cta" cta_dest_link="https://www.ny-engineers.com/contact-us" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/cs/c/%3Fcta_guid%3Dac8cc18c-c2a0-4920-825f-4be266abcccc%26signature%3DAAH58kGKqDkBoaKOLu286vQ_nI1MV1BkUQ%26pageId%3D4410052059%26placement_guid%3D9f1640ac-fdd9-40ef-9783-15bbf9f5a022%26canon%3Dhttps%253A%252F%252Fwww.ny-engineers.com%252Fblog%252Fwhen-is-a-generator-required%26portal_id%3D2004318" id="cta_button_2004318_ac8cc18c-c2a0-4920-825f-4be266abcccc" style="margin: 20px auto;" title="Contact Us"><span data-dcnode-id="1509" instrument_node="">Contact Us</span></a></span></span></p><span data-dcnode-id="1500" instrument_node="">
</span><hr data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Backup power systems can be classified into two subtypes, depending on how critical their role is:</span></p><span data-dcnode-id="1495" instrument_node="">
</span><ul data-dcnode-id="1485"><span data-dcnode-id="1494" instrument_node="">
</span><li data-dcnode-id="1490"><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/when-is-a-generator-required"><span data-dcnode-id="1493" instrument_node="">Emergency power systems</span></a><span data-dcnode-id="1491" instrument_node=""> are those that provide backup power for building systems that create a safety hazard for humans if they cease to operate. Due to their critical role, emergency power systems are always required by law</span></li><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Standby power systems may be either optional or required by law, depending on local codes. They provide backup power for building systems that may cause discomfort or business disruption if they cease to operate, but where there is no hazard to human life in case of an interruption</span></li><span data-dcnode-id="1486" instrument_node="">
</span></ul><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">In the case of New York City, the requirements for emergency and standby generators are established in Chapter 27 of the 2014 New York City Building Code. In addition, these systems must comply with the two following standards from the National Fire Protection Association (NFPA):</span></p><span data-dcnode-id="1481" instrument_node="">
</span><ul data-dcnode-id="1473"><span data-dcnode-id="1480" instrument_node="">
</span><li data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">NFPA 110 – Standard for Emergency and Standby Power Systems</span></li><span data-dcnode-id="1477" instrument_node="">
</span><li data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">NFPA 111 – Standard on Stored Electrical Energy Emergency and Standby Power Systems</span></li><span data-dcnode-id="1474" instrument_node="">
</span></ul><span data-dcnode-id="1472" instrument_node="">
</span><h2 data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">General Requirements</span></h2><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Some requirements in the New York City Building Code apply regardless of whether the generator is used to supply emergency or backup power.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><ul data-dcnode-id="1437"><span data-dcnode-id="1465" instrument_node="">
</span><li data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The fuel supply on site must be sufficient for the generator to operate at full output for at least six hours.</span></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Diesel is the preferred source of fuel for a generator and is code required for all Legally Required Emergency Systems. Diesel fuel is stored on site in either a fuel tank mounted to the base of the generator (sub-base fuel tank) or in a remote tank with a day tank in the generator room.</span></li><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Natural gas from the utility company is allowed as the fuel source in Residential Group R-2 occupancies and for standby power systems, but it requires a cut-off valve to separate the supply from that of other appliances that run on gas.</span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">All generators must be listed according to the UL 2200 standard by Underwriters Laboratories</span></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Generators and their associated electrical distribution systems must be located in a separate room from the main electrical service equipment. This must be a dedicated room with a fire barrier rated for at least two hours and/or horizontal assemblies according to section 712 of the NYC Building Code</span></li><span data-dcnode-id="1450" instrument_node="">
</span><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Only fuel tanks that will be used for the generator are allowed in the room, and the only piping allowed is that of sprinkler systems, or any piping required by generator cooling systems. Piping associated with other systems may go through the room, but only if it is uninterrupted</span></li><span data-dcnode-id="1447" instrument_node="">
</span><li data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Multiple generators may share a fuel supply if they will power only emergency loads, or a combination of emergency and optional standby loads</span></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">All equipment that is powered by fuel combustion, including emergency and standby generators, must be registered with the NYC Department of Environmental Protection</span></li><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Automatic transfer switches and their associated electrical feeders must be located in a separate room from both the main service equipment and the generator. If the ATS is not located at the load, it must have a dedicated room with similar requirements as that used for the generator: a 2-hour fire barrier or horizontal assemblies, and having no piping other than sprinkler systems</span></li><span data-dcnode-id="1438" instrument_node="">
</span></ul><span data-dcnode-id="1436" instrument_node="">
</span><h2 data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">When is a Generator Required for Emergency Power?</span></h2><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">As mentioned above, emergency generators are legally required for any electrical systems where interruption of the power supply can cause hazards for human life. The NYC Building Code requires emergency power in the following applications:</span></p><span data-dcnode-id="1430" instrument_node="">
</span><ul data-dcnode-id="1404"><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">Voice and </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/wireless-fire-alarm-requirements-in-new-york-city"><span data-dcnode-id="1427" instrument_node="">alarm systems</span></a><span data-dcnode-id="1425" instrument_node=""> in occupancies classified as Assembly Group A: this includes most locations where groups of people gather for civic, social, religious or similar purposes.</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">All exit signs and means of egress illumination must be provided with emergency power, regardless of location, even those on temporary buildings such as tents. Note that this can be accomplished using battery backup systems for smaller buildings and in certain occupancies.</span></li><span data-dcnode-id="1420" instrument_node="">
</span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Semiconductor fabrication facilities</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Any location with toxic, highly toxic or pyrophoric materials must have emergency power, and in the case of hazardous materials it can be either standby or emergency power</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">High-rise and underground buildings must have both emergency and standby power.</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Doors in occupancies classified as Institutional Group I-3, inhabited by five or more persons who are under restraint due to security reasons, for example prisons and mental healthcare facilities</span></li><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Emergency power is required for specific elevator system components: controls, cab lights, ventilation and any equipment that is necessary for operation</span></li><span data-dcnode-id="1405" instrument_node="">
</span></ul><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Special Requirements for Occupancy Groups R-1, B and E</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">All occupancies that are classified as Residential Group R-1 must be equipped with both emergency and standby power, as well Business Group B and Educational Group E that meet the following conditions:</span></p><span data-dcnode-id="1397" instrument_node="">
</span><ul data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Having an occupied floor more than 75 feet above the lowest access for fire trucks</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">An area exceeding 15,000 square feet per floor, or 100,000 square feet in total</span></li><span data-dcnode-id="1390" instrument_node="">
</span></ul><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The emergency power system in these occupancy groups must be capable of powering exit signs, means of egress illumination, elevator car lighting, voice/alarm communication systems, automatic fire detection systems, fire alarm systems and electrical fire pumps.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h2 data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">When is a Generator required for Standby Power?</span></h2><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Although standby power is optional in many scenarios, the NYC Building Code makes it mandatory in the following cases:</span></p><span data-dcnode-id="1379" instrument_node="">
</span><ul data-dcnode-id="1341"><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Smoke control systems</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Elevators that are part of an accessible means of egress</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">All components of normal elevator systems for which emergency power is not required</span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Horizontal sliding doors</span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Auxiliary inflation systems in membrane structures</span></li><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Locations where hazardous materials are stored must have either standby or emergency power</span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Any location with organic peroxides</span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Voice and alarm communication systems in covered malls</span></li><span data-dcnode-id="1354" instrument_node="">
</span><li data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">High-rise and underground buildings</span></li><span data-dcnode-id="1351" instrument_node="">
</span><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Airport traffic control towers</span></li><span data-dcnode-id="1348" instrument_node="">
&gt;
</span><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Smoke-proof enclosures</span></li><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Pressurized elevator shafts</span></li><span data-dcnode-id="1342" instrument_node="">
</span></ul><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Special Requirements for Occupancy Groups R-1, B and E</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">The general requirements for standby power in these locations are the same presented in the section for emergency power. The specific building systems that require standby power are: </span><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/ventilation-system-configurations"><span data-dcnode-id="1335" instrument_node="">ventilation systems</span></a><span data-dcnode-id="1333" instrument_node=""> that are used for smoke control, staircase pressurization systems and the fire command center. At least three elevators at a time must be supplied with standby power, with a manual switch to transfer the power supply to other elevators if needed</span></p><span data-dcnode-id="1331" instrument_node="">
</span><h2 data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Generators Providing Optional Standby Power</span></h2><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">As implied by their name, optional standby power systems are those not required by law. However, whenever they are deployed, they must be capable of powering the following systems in addition to their normal load:</span></p><span data-dcnode-id="1325" instrument_node="">
</span><ul data-dcnode-id="1304"><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Emergency lighting</span></li><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1318"><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny-engineers.com/blog/wireless-fire-alarm-requirements-in-new-york-city"><span data-dcnode-id="1320" instrument_node="">Fire alarm systems</span></a></li><span data-dcnode-id="1317" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Elevators, according to the following requirements:</span></li><span data-dcnode-id="1314" instrument_node="">
</span><ul data-dcnode-id="1306"><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">In Residential Group R-2 occupancies taller than 125 feet, the optional standby generator must be able to power one elevator that serves all floors. If multiple banks of elevators serve separate floors, one elevator per bank must be powered</span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">In any other buildings with occupied floors more than 75 feet above the lowest fire truck access, the optional standby generator must be able to power at least one elevator that serves all floors</span></li><span data-dcnode-id="1307" instrument_node="">
</span></ul><span data-dcnode-id="1305" instrument_node="">
</span></ul><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Normally, these systems would be powered by emergency or legally-required standby generators, but the optional standby power system must be able to take over the load as an additional safety measure</span></p><span data-dcnode-id="1300" instrument_node="">
</span><h2 data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Concluding Remarks</span></h2><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Code compliance is a very important factor in any project where an electric generator will be installed. In addition to being necessary for the project to be approved during inspections, code compliance ensures safe conditions for all building occupants</span></p></span></article><span data-dcnode-id="1292" instrument_node="">
