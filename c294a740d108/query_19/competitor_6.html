................................. 9-5                         Procedure ........................................................................................................................... 9-5                  9.12 Program Chip Change (Model 99 Units) ............................................................................... 9-6                         Equipment, Fixtures, Special Tools ..................................................................................... 9-6                         Procedure ........................................................................................................................... 9-6                  9.13 Display (Model 99 Units) ..................................................................................................... 9-6                         Procedure ........................................................................................................................... 9-6                  9.14 Printer (Model 99 Units) ...................................................................................................... 9-6                         Procedure ........................................................................................................................... 9-6                  9.15 Pressure Transducer (Model 99 Units) ................................................................................. 9-7                         Procedure ........................................................................................................................... 9-7                  9.16 Paper Replacement Procedure (Model 89 and 90 Units) ...................................................... 9-8                         Procedure ........................................................................................................................... 9-8                  9.17 Paper Roll and Ink Cartridge Replacement Procedure ........................................  render it unsafe. Customers are encouragedto develop their own safety procedures to enhance and compliment the safety precautions.WARNING – PERSONAL INJURY AND/OR EQUIPMENT DAMAGE HAZARD:       Safe and reliable operation of this equipment requires regularly scheduled preventive mainte-       nance, in addition to the faithful performance of routine maintenance. Contact STERIS Service to       schedule preventive maintenance.       Repairs and adjustments to this equipment must be made only by fully qualified service       personnel. Maintenance performed by inexperienced, unqualified personnel or installation of       unauthorized parts could cause personal injury, invalidate the warranty, or result in costly       equipment damage. Contact STERIS regarding service options.       Operating Instructions are listed in this manual for service personnel reference. Equipment users       should refer to the SYSTEM 1 Operating Manual.       Do not use the SYSTEM 1 until it has been properly installed and its electromechanical perfor-       mance has been verified.       The SYSTEM 1 may be used only in hospital-grade rooms when it is installed according to the       applicable specification (VDE 0107, Class 1, Group C NFPA rating).       The SYSTEM 1 is not intended for operation in explosion-endangered areas.       Danger: Risk of explosion if used in the presence of flammable anesthetics.       Risk of Fire: Replace power supply fuse with proper type as marked.       The SYSTEM 1 is not protected against water spillage or spray. Take precautions in the use of       liquid during cleaning or insertion of devices.       Connect the SYSTEM 1 to a hospital-grade, GFI electrical receptacle only, to prevent electrical       shock hazard.WARNING – SLIPPING HAZARD:       To avoid slippery floor conditions, immediately wipe up any spilled liquids in the SYSTEM 1       loading and unloading areas.WARNING – ELECTRIC SHOCK AND BURN HAZARD:                                                                                                                               Continued ...                                                                        1-1                                                                                     764330-115</span><br data-dcnode-id="380"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">Disconnect all utilities to the SYSTEM 1 before servicing. Do not service the unit unless all utilities       have been properly locked out. Always follow OSHA Lockout-Tagout and electrical safety-related       work practice standards. (See 29 CFR 1910.147 and .331 through .335.)WARNING – STERILITY VERIFICATION HAZARD:       Failure to thoroughly clean devices prior to processing may result in an ineffective sterile       process.       Use the Quick Connect adapter specifically designed for the device being processed.       Do not use Sterilant Concentrate after the expiration date indicated on the label.       Do not substitute any other product for STERIS 20™ Sterilant Concentrate.       Always verify that the sterilant container is empty at the end of the cycle.       Devices are not sterilized and/or adequately rinsed when a sterile processing cycle is cancelled.CAUTION – POSSIBLE EQUIPMENT DAMAGE HAZARD:       Do not force lid to close.       After a cycle is cancelled, if fluid remains in the chamber, call STERIS.       When replacing the control board, use care when picking up the sheet metal/board assembly,       because the display and printer cables are still connected under the board.       In the Service Mode, do not energize Heater unless chamber is full of water; element failure will       occur.       In the Service Mode, do not energize Seal Relief Valve/Compressor with water in the chamber; spill       will occur.       To prevent damage to the SYSTEM 1, potential fluid leakage, and failure of the sterile filter       membrane, limit inlet water pressure to 50 psi.       To avoid jamming paper in printer, do not force paper into printer mechanism and do not attempt       to feed uneven, tattered, wrinkled paper.       To avoid damage to the SYSTEM 1 prior to boxing for shipment, follow procedures 2.4.2 to aid in       the process.       Do not place hard or rigid suctioning devices into the probes. Damage to thermocouples or       concentration probes could occur.       Do not energize h, heater element (HTR1) unless chamber is full of water; element failure will       occur.       Do not energize s2, seal release valve (SOL2) with water in the chamber; spill will occur.                                                                        1-2                                                                                     764330-115</span><br data-dcnode-id="377"><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">Section 2: General Information2.1 GENERAL                                     Water RequirementsThis Maintenance Manual is applicable for SYS-  • Pressure: 40 to 50 psi (276-345 kPa).TEM 1® Sterile Processing System, Models 89A1,  • Flow Rate: 4 gpm (15 lpm) at 40 psi (276 kPa).90B1, 90A1, 90A2, 99A1 and 99A2.                • Temperature: 43° to 48°C (110° to 118°F).2.2 TECHNICAL SPECIFICATIONS                       For optimum cycle time, water temperature should                                                   be between 46° to 48°C (115° to 118°F).2.2.1 Overall Size                              • Connection: 3/4\" (190 mm) male hose connector.                                                • Quality: Potable/tap water.Width:        32\" (813 mm)                      • Drain: 1-1/4\" (318 mm) I.D. (minimum) non-                                                   backpressuring drain.Depth:        24\" (610 mm)                      • Supply Line: 1/2\" (127 mm) I.D. (minimum) 3/4\"                                                   (190 mm) I.D., optimum. Backflow prevention byHeight:  Add STERIS 20 Sterilant Concentrate.          WARNING: Do not use Sterilant Concen-          trate after the expiration date indicatedon the label.         WARNING: Do not substitute any other         product for STERIS 20™ Sterilant Con-centrate.   Sterilant compartment is located in lower right-   hand corner of processing tray.   Push sterilant container down until lid is flush   with tray.Step 3. Insert Aspirator Probe.   Line up tip of aspirator probe over crosscuts   located in center of sterilant lid.   Insert probe in a downward motion until top of   aspirator is resting on lid of sterilant.   Aspirator probe assembly in the correct posi-   tion   Illustration to right shows correct position of   aspirator probe assembly with connected flexible   tube in 5 o’clock position when probe is placed   into sterilant.                                                                        3-20                                                                                     764330-115</span><br data-dcnode-id="293"><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">BE MINDFUL AND OBSERVANT – TUBING   MUST NOT BE KINKED AT ANY POINT.Step 4. Close Lid.   If resistance is met, STOP, inspect positioning of   processing tray/container, device and aspirator   assembly.          CAUTION: Do not force lid to close.Step 5. Press START.   Light 1–ON   READY light–OFF   Printer starts.   Printout advances to show STERIS logo, date,   time, load ID, and space for remarks.                                                                        3-21                                                                                     764330-115</span><br data-dcnode-id="290"><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Step 6. Sterile Processing Cycle.   Total cycle time is generally less than 30 minutes.   Cycle time is dependent on temperature and pres-   sure of incoming water and filter cleanliness. As   cycle advances, lights 2 through 4 sequentially   are turned on, indicating progress of cycle.Step 7. Sterile Processing Cycle Complete.   Audible tone - five 1-second beeps.   Lights 1 through 4 - OFF   COMPLETE light - ON   Printer begins printing cycle information when   COMPLETE light comes on. It finishes printing   all but chamber-opened time a few seconds after   beeping stops.   CANCEL button may be pressed as soon as COM-   PLETE light is on. Beeping stops, but printer   continues to print.Step 8. Press CANCEL.   Inflatable seal deflates.   Printer prints chamber-opened time and advance   to show completed cycle record.                                                                       3-22                                                                                     764330-115</span><br data-dcnode-id="287"><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">READY light comes on. COMPLETE light turns   off.Step 9. Lift Handle, Open Lid.   Lid may be opened as soon as seal deflates.                                                                       3-23                                                                                     764330-115</span><br data-dcnode-id="284"><br data-dcnode-id="283"><span data-dcnode-id="282" instrument_node="">Step 10. Remove Aspirator Probe From Sterilant            Container.Step 11. Remove Empty Sterilant Container And            Discard.          WARNING: Always verify that the sterilant          container is empty.   If container is not empty, then load cannot be   considered sterile. Refer to SECTION 3.7, DISPOSAL   OF STERIS 20 USE-DILUTION, for disposal instruc-   tions.   Call STERIS.Step 12. Remove Processed Items.   Processing Tray/Container:   Follow departmental procedures for removal and   transportation to sterile field.   Flexible Processing Tray:   Disconnect all tubing from left and right fluid   ports. Remove all tubing and adapters from de-   vice.   Follow departmental procedures for removal and   transportation to sterile field.                                                                       3-24                                                                                     764330-115</span><br data-dcnode-id="281"><br data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">3.6 CANCELLED CYCLE: MODEL 89A1,      90B1, 90A1 AND 90A2The CANCEL function is initiated automatically bythe SYSTEM 1 if one or more of the parameters forsterilization have not been achieved or maintained.A cycle may also be cancelled by the operator. Ineither case, whenever CANCEL occurs, the devicesis NOT sterilized and/or adequately rinsed.The reason for cancellation and the stage the cycle isin at the time of cancellation must be taken intoconsideration when developing departmental poli-cies and procedures for the disposition of the de-vices. Minimum requirements should include ad-equate rinsing of the devices and alternative pro-cessing procedures.         WARNING : Devices are not sterilized and/         or adequately rinsed when a sterile pro-         cessing cycle is cancelled.Step 1. CANCEL light comes on. Unit starts to drain.    Printer starts to print.   Approximately 40 seconds later, there is a warn-   ing tone for five seconds.   Next, COMPLETE light comes on. CANCEL light   remains on.   Cycle information including message WARNING   STERILIZATION NOT COMPLETE and reason is   printed. Cycle cancelled time is also recorded.   Printout advances to show warning message.                                                                       3-25                                                                                     764330-115</span><br data-dcnode-id="278"><br data-dcnode-id="277"><span data-dcnode-id="276" instrument_node="">Step 2. Look into processing chamber to verify fluid    has drained from chamber.          CAUTION: If fluid remains in the chamber          call STERIS.Step 3. Press CANCEL Button.   Inflatable seal deflates.   The pr
