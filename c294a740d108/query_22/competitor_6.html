</span><h1 class="color-text" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Why 2020 Fire?</span></h1><span data-dcnode-id="1499" instrument_node="">
</span><h2 data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Less Headaches.</span></h2><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Sydney’s strata, facility and building managers know fire compliance is necessary. They also know just how frustrating, expensive and time consuming it can be dealing with incompetent and deceptive fire safety contractors. What should be straight forward and as clear as 20/20 vision can be anything but. That’s why 10 years ago we set-up 2020 Fire Protection. We take modern day technology and service to make fire compliance easier.
					</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The company was built on the mantra of applying 20/20 vision to service – making fire protection easier for our clients. This means having a dedicated manager that knows your building inside-out. It’s making bookings with our service team simple, through online booking calendars. Having clear and transparent reporting you can count on. Most importantly, it means having a fire protection company that has your back 24/7 for any emergency!
					</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">
</span><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">There is no fire protection company that is more focused on customer service than 2020 Fire Protection. We provide all the info you need to achieve a simple, justifiable annual fire safety statement. #lessheadaches
						</span></em><span data-dcnode-id="1486" instrument_node="">
</span></p><span data-dcnode-id="1484" instrument_node="">

</span><div class="tab-content__img" data-dcnode-id="1017"><img alt="" class="img-fluid" data-dcnode-id="1020" data-lazy-src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/pictures/tab_1.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">&lt;img class="img-fluid" src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/pictures/tab_1.jpg" alt=""&gt;</span></noscript></div><span data-dcnode-id="1016" instrument_node="">
</span><div class="tab-content__review" data-dcnode-id="1006"><span data-dcnode-id="1015" instrument_node="">
</span><div class="tab-content__review__said" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">“Thanks Mike, we couldn’t have resolved this without your hard work!”

</span><div class="tab-content__review__person" data-dcnode-id="1008"><span data-dcnode-id="1011" instrument_node="">Inger, Premium Strata</span><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">COO</span></div><span data-dcnode-id="1007" instrument_node="">

</span><article data-dcnode-id="923"><span data-dcnode-id="999" instrument_node="">
</span><h4 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Client</span></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Premium Strata</span></p><span data-dcnode-id="993" instrument_node="">
</span><h4 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">BUILDING TYPE</span></h4><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Residential Strata – High-rise - Parramatta</span></p><span data-dcnode-id="987" instrument_node="">
</span><h4 data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Situation</span></h4><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">This 133 unit, mixed-use, residential tower requires monthly inspection and testing of their fire
							                        systems and equipment. As mandated by NSW law, the building needs to have all equipment maintained
							                        annually for the purposes of assessment for the annual fire safety statement.
						</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">2020 Fire Protection was engaged by the owners via Premium Strata to undertake the inspection and
							                        testing of this newly constructed building in accordance with AS1851-2012 - including accessing every
							                        apartment and every common area of the building.
						</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">
							During this testing, a large quantity of defects were identified that related to building works.
						</span></p><span data-dcnode-id="975" instrument_node="">
</span><em data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Examples of defects included:</span></em><span data-dcnode-id="972" instrument_node="">
</span><ul data-dcnode-id="955"><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">All Fire doors having non-compliant gaps.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Valves to feed the hydrant systems fitted back to front – no fire-fighting water in certain situations.</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Pressure reducing station omitted and valves in place causing building to shake when operated.</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Flows and pressures to sprinklers inadequate to operate in accordance with the design.</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Fire Pump for sprinklers not adequate to supply water to meet the sprinkler design.</span></li><span data-dcnode-id="956" instrument_node="">
</span></ul><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">2020 Fire Protection’s initial estimate to rectify the defects was $250k+.</span></p><span data-dcnode-id="951" instrument_node="">
</span><h4 data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Actions Taken</span></h4><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The defects noted as likely to be construction related were reported to the Strata Manager who, due
							                        to
							                        the building being under 2 years since completion, passed these to the developer for action.
						</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The developer and builder argued the validity of these defects and said they related to maintenance
							                        and
							                        should be fixed by the owners who had just moved in. The developers questioned 2020 Fire Protection’s
							                        competence, they argued that they had an engineer who had passed it, they argued that council had
							                        accepted the building and the like.
						</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Over a 2 year period following the initial report, 2020 Fire Protection’s team attended site more
							                        times
							                        than can be counted; met with the developers, the owners, the builder and the Strata Manager, received
							                        rulings from the regulatory authorities, were abuse verbally and in-writing by the developers as to
							                        the
							                        competence of our advice.
						</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">The easiest thing would have been to walk away.</span></p><span data-dcnode-id="936" instrument_node="">
</span><h4 data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Outcome</span></h4><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">2020 Fire Protection proved, beyond a shadow of a doubt that the defects were construction related.
							                        We
							                        negotiated directly and through strata, council and the Fire Brigade to prove this and we helped the
							                        Strata Manager force the developer and builder to fix those defects.
						</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">2020 Fire Protection saved the owners $250,000+ in repairs, but MORE importantly;</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">2 years after our initial report, there was a balcony fire. Just like the ones you’ve seen on the
							                        news
							                        that have destroyed buildings and lives. The sprinkler system, which was fixed due to 2020 Fire’s
							                        competent reporting, worked correctly, extinguished the fire and the damage was minimal.
						</span></p><span data-dcnode-id="924" instrument_node="">
</span></article><span data-dcnode-id="922" instrument_node="">

</span><div class="tab-content__review__person" data-dcnode-id="899"><span data-dcnode-id="902" instrument_node="">Michael, Intermain</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">Senior Project Manager</span></div><span data-dcnode-id="898" instrument_node="">

</span><article data-dcnode-id="853"><span data-dcnode-id="890" instrument_node="">
</span><h4 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Client</span></h4><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Intermain</span></p><span data-dcnode-id="884" instrument_node="">
</span><h4 data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">BUILDING TYPE</span></h4><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Commercial Office – 10 floors – Sydney CBD</span></p><span data-dcnode-id="878" instrument_node="">
</span><h4 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Situation</span></h4><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">This heritage building, built in 110 years ago, was being used for C grade office space. The owners
							                        wanted to convert it to A-grade space that reflected the industrial style of yesteryear. To do this
							                        required a significant upgrade to all the services in the building – including fire protection.
						</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The design was done and the tender won, when planning discussions between the project manager, fire
							                        engineer, certifier and 2020 Fire Protection which identified that that the designs provided would not
							                        fit in the building, nor meet the deem-to-satisfy requirements of the BCA and may impinge upon the
							                        viability of the project. The issues related to the building having been inaccurately categorised as
							                        low-rise (under 25metres); yet it was actually high-rise (above 25 metres) and the impact this would
							                        have on the systems to be installed – particularly relating to the water supplies for hydrants and
							                        sprinklers.
						</span></p><span data-dcnode-id="869" instrument_node="">
</span><h4 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Actions Taken</span></h4><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">2020 Fire Protection on behalf of the owners and our client, went directly to the fire engineers and
							                        certifier and discussed, negotiated and planned a hybrid system that could be validated under a Fire
							                        Engineering Solution accepted by the Certifier and the regulatory Authorities.
						</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">This required significant greater interfacing with council and other authorities, having to dig up a
							                        major street – including removing a tree and working around live gas, power, fibre-optic internet
							                        back-bone cables, heritage sandstone and many other services.
						</span></p><span data-dcnode-id="860" instrument_node="">
</span><h4 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Outcome</span></h4><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The floor space and structural impact of the originally required tanks were removed, freeing up
							                        valuable lettable space for the owner’s long-term benefit and delivering a compliant building, safe
							                        for many more years of occupation.
						</span></p><span data-dcnode-id="854" instrument_node="">
</span></article><span data-dcnode-id="852" instrument_node="">
</span></div><span data-dcnode-id="850" instrument_node="">

</span><div class="row" data-dcnode-id="761"><span data-dcnode-id="844" instrument_node="">
</span><div class="col-12 col-md-5" data-dcnode-id="823"><span data-dcnode-id="843" instrument_node="">
</span><div class="tab-content--left-col" data-dcnode-id="825"><span data-dcnode-id="842" instrument_node="">
</span><div class="tab-content__img" data-dcnode-id="838"><img alt="" class="img-fluid" data-dcnode-id="841" data-lazy-src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/pictures/tab_3.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&lt;img class="img-fluid" src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/pictures/tab_3.jpg" alt=""&gt;</span></noscript></div><span data-dcnode-id="837" instrument_node="">
</span><div class="tab-content__review" data-dcnode-id="827"><span data-dcnode-id="836" instrument_node="">
</span><div class="tab-content__review__said" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">“The replacement of the damaged deluge pipe was completed with
								                           great success. Rob from 2020 Fire &amp; and his crew did an excellent job”
							</span></div><span data-dcnode-id="833" instrument_node="">
</span><div class="tab-content__review__person" data-dcnode-id="829"><span data-dcnode-id="832" instrument_node="">Andrew, Ventia</span><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">Electrical Supervisor</span></div><span data-dcnode-id="828" instrument_node="">
</span></div><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span><div class="col-12 col-md-7" data-dcnode-id="763"><span data-dcnode-id="821" instrument_node="">
</span><article data-dcnode-id="765"><span data-dcnode-id="820" instrument_node="">
</span><h4 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Client</span></h4><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Ventia</span></p><span data-dcnode-id="814" instrument_node="">
</span><h4 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">BUILDING TYPE</span></h4><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Road Tunnel</span></p><span data-dcnode-id="808" instrument_node="">
</span><h4 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Situation</span></h4><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">2020 Fire was engaged to undertake the inspection and testing of all fire services in this major
							                        arterial road-tunnel in Sydney. At 11:23pm during scheduled night-closures and during regular testing
							                        to ensure the systems work, a 200mm deluge pipe in the tunnel broke, flooding the roadway,
							                        cross-passage and comms/ valve room with 7000 litres per minute of water.
						</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The comms/valve room contained sub-panels that controlled the fire detection and suppression for that
							                        part of the tunnel, 10 valves that controlled the deluge systems, lighting controls, signage controls,
							                        telephony and more. They were all flooded and almost all electrical controls damaged or destroyed.
						</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Without these operating, the tunnel may not be operated – meaning hundreds of thousands of
							                        Sydney-siders may be delayed in getting to work the next day.
						</span></p><span data-dcnode-id="796" instrument_node="">
</span><h4 data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Actions Taken</span></h4><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Immediately that the pipe failure was known, 2020 Fire Protection dispatched staff to shut off the
							                        main pumps, isolate the mains either side of the break and then re-commission the rest of the tunnels
							                        fire system.
						</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Once the comms room power was made safe, 2020 Fire Protection entered the room and assessed the
							                        condition of the fire systems within.
						</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The fire detection system panel was destroyed by water and therefore could not detect heat, nor
							                        activate the 10 x deluge systems in the case of a fire. This panel is a custom-made unit, not
							                        available off-the-shelf. This meant a 500m section of the tunnel in both directions did not have an
							                        automatic deluge system as required to operate the tunnel safely.
						</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">2020 Fire Protection’s management came to site in the early hours of the morning and met with the
							                        tunnel management to brain-storm an outcome that would result in the tunnel being opened in the
							                        morning.
						</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">
							2020 Fire Protection established a local control centre for manual deluge operation with radios,
							                        radio back-up, air-quality monitoring, phone and computer in the sprinkler valve room in the tunnel,
							                        the tunnel operators forced-on the cameras in the area with no detection and monitored, plus stayed in
							                        contact with our staff in the tunnel, we shipped in spare parts from an alternative tunnel and started
							                        re-building the destroyed panel and we ordered the parts to rectify the original pipe blow-out.
						</span></p><span data-dcnode-id="778" instrument_node="">
</span><h4 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Outcome</span></h4><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">The tunnel was deemed safe to open in the morning by the road control centre and Sydney’s already
							                        horrific traffic was not affected.
						</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The deluge pipe was fixed the following night, re-pressurised and re-tested.
							                        The fire panel was re-built and brought back-on-line for automatic system operation by the end of that
							                        week, eliminating the need for on-site manual personnel.
						</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The tunnel operators and Sydney-siders generally were spared huge inconvenience and associated costs
							                        by the quick thinking and solutions presented by 2020 Fire Protection.
						</span></p><span data-dcnode-id="766" instrument_node="">

</span><section class="faq" data-dcnode-id="445"><span data-dcnode-id="522" instrument_node="">
</span><h2 class="text-center" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">FAQ's</span></h2><span data-dcnode-id="519" instrument_node="">
</span><div class="row" data-dcnode-id="447"><span data-dcnode-id="518" instrument_node="">
</span><div class="col-12 col-lg-4 pr-lg-0" data-dcnode-id="488"><span data-dcnode-id="517" instrument_node="">
</span><ul class="faq__list" data-dcnode-id="490"><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="508"><span data-dcnode-id="515" instrument_node="">
</span><h5 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">What is the risk to the owner if the annual fire safety statement is wrong?</span></h5><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">From July 1st 2020, you must use an Accredited Practitioner (Fire Safety); previously known as a CFSP. They must be accredited to endorse an Annual Fire Safety Statement for each type of essential fire safety measure on your premises (there are over 20 separate accreditation categories to maintain.) If they are an approved fire safety company, you reduce your risk regarding the accuracy and content of the statement. If your supplier is not accredited for all measures (assuming is not good enough), council will not accept the statement, you as the building owner take on the full risk of the annual statement incorrect issue and council may impose fines on the owners. This can have serious implications on your legal liability, insurance coverage, premiums, possible fire upgrade orders and the buildings’ ability to remain occupied.</span></p><span data-dcnode-id="509" instrument_node="">
</span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="499"><span data-dcnode-id="506" instrument_node="">
</span><h5 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">How often do my fire extinguishers have to be checked?</span></h5><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Australian Standard AS1851-2012, requires all extinguishers to be checked and tagged every six months.
							Depending on the type of extinguisher, they also need an overhaul every one to five years.</span></p><span data-dcnode-id="500" instrument_node="">
</span></li><span data-dcnode-id="498" instrument_node="">
</span><li data-dcnode-id="492"><h5 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Do I need to issue an ‘Annual Fire Safety Statement’ to council?</span></h5><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Yes. Every building other than class 1 (house) is required to provide an annual statement to council.
							This
							is required under the Environmental Planning and Assessment Regulation 2000.</span></p></li><span data-dcnode-id="491" instrument_node="">
</span></ul><span data-dcnode-id="489" instrument_node="">
</span></div><span data-dcnode-id="487" instrument_node="">
</span><div class="col-12 col-lg-4 text-center d-none d-lg-block" data-dcnode-id="481"><span data-dcnode-id="486" instrument_node="">
</span><img alt="" class="img-fluid" data-dcnode-id="485" data-lazy-src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/images/man-faq.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">&lt;img class="img-fluid" src="https://www.2020fireprotection.com.au/wp-content/themes/fire-protection-2020-wordpress-theme/static/images/man-faq.png" alt=""&gt;</span></noscript><span data-dcnode-id="482" instrument_node="">
</span></div><span data-dcnode-id="480" instrument_node="">
</span><div class="col-12 col-lg-4 pl-lg-0" data-dcnode-id="449"><span data-dcnode-id="479" instrument_node="">
</span><ul class="faq__list" data-dcnode-id="451"><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="477" instrument_node="">
</span><h5 data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">How much does an annual fire safety statement cost?</span></h5><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Every building will be different, so a fixed price is impossible without an inspection. You can be sure
							that every piece of fire equipment and every part of the building will need to be inspected and tested, so
							if the price seems too good to be true, it probably is opening the building owner and occupants to
							unnecessary risk.</span></p><span data-dcnode-id="471" instrument_node="">
</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="468" instrument_node="">
</span><h5 data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">So less headaches is guaranteed? What happens if I think you've caused more headaches than the last company completed an equivalent task?</span></h5><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">We fix it free and credit $200 off your next invoice.</span><br data-dcnode-id="463"><small data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Please note that the $200 credit relates to subsequent work, after the job at hand.</span></small></p><span data-dcnode-id="459" instrument_node="">
</span></li><span data-dcnode-id="457" instrument_node="">
</span><li class="text-center text-lg-left" data-dcnode-id="453"><a class="btn btn--primary btn--large" data-dcnode-id="455" href="#free_site_visit"><span data-dcnode-id="456" instrument_node="">Enquire Now</span></a><span data-dcnode-id="454" instrument_node="">
</span></li><span data-dcnode-id="452" instrument_node="">
</span></ul><span data-dcnode-id="450" instrument_node="">
