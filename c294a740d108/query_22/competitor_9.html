c_search search_icon" data-dcnode-id="4076" role="presentation"></span><input class="document_search" data-dcnode-id="4075" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="4066"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="4067" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="4068"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="4069"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2049"><h1 data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">FIRE SAFETY</span></h1><p data-dcnode-id="4061"></p><h2 data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">GOOD SERVANT BUT A BAD MASTER</span></h2><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">fLEARNING</span><br data-dcnode-id="4056"><span data-dcnode-id="4055" instrument_node="">OUTCOMES</span><p data-dcnode-id="4054"></p><p data-dcnode-id="4032"><span data-dcnode-id="4053" instrument_node=""> Understanding Fire</span><br data-dcnode-id="4052"><span data-dcnode-id="4051" instrument_node=""> Causes of Fire</span><br data-dcnode-id="4050"><span data-dcnode-id="4049" instrument_node=""> Responsibilities</span><br data-dcnode-id="4048"><span data-dcnode-id="4047" instrument_node=""> Risk Assessment</span><br data-dcnode-id="4046"><span data-dcnode-id="4045" instrument_node=""> Fire Prevention</span><br data-dcnode-id="4044"><span data-dcnode-id="4043" instrument_node=""> Fire Detection</span><br data-dcnode-id="4042"><span data-dcnode-id="4041" instrument_node=""> Fire Fighting</span><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node=""> Fire Drills &amp; Evacuation</span><br data-dcnode-id="4038"><span data-dcnode-id="4037" instrument_node=""> Legal Requirements &amp;</span><br data-dcnode-id="4036"><span data-dcnode-id="4035" instrument_node="">  Building Code</span><br data-dcnode-id="4034"><span data-dcnode-id="4033" instrument_node="">fWHAT IS FIRE?</span></p><p data-dcnode-id="4031"></p><h2 data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Fire is a chemical reaction, usually the</span></h2><br data-dcnode-id="4028"><span data-dcnode-id="4027" instrument_node="">combustion of carbon and or hydrogen with</span><br data-dcnode-id="4026"><span data-dcnode-id="4025" instrument_node="">oxygen, resulting in release if energy in form of</span><br data-dcnode-id="4024"><span data-dcnode-id="4023" instrument_node="">heat, light and sound.</span><br data-dcnode-id="4022"><span data-dcnode-id="4021" instrument_node="">fFIRE PREVENTION</span><br data-dcnode-id="4020"><span data-dcnode-id="4019" instrument_node="">Fire prevention happens before the fires even ignites.</span><br data-dcnode-id="4018"><span data-dcnode-id="4017" instrument_node="">One of the most effective tools for fire prevention is an inspection.</span><br data-dcnode-id="4016"><span data-dcnode-id="4015" instrument_node="">Regular property inspections can be used to identify vulnerable</span><br data-dcnode-id="4014"><span data-dcnode-id="4013" instrument_node="">areas in your facility and, once identified, to fix them.</span><br data-dcnode-id="4012"><span data-dcnode-id="4011" instrument_node="">These vulnerable areas can be things like overloaded electrical</span><br data-dcnode-id="4010"><span data-dcnode-id="4009" instrument_node="">outlets, improperly maintained systems, and improperly stored</span><br data-dcnode-id="4008"><span data-dcnode-id="4007" instrument_node="">materials.</span><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node="">Once these problems have been identified, it is important to take</span><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">the steps to remove the threat and to ensure it does not get to be</span><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">that way again.</span><br data-dcnode-id="4000"><span data-dcnode-id="3999" instrument_node="">fFIRE PROTECTION</span><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node=""> Fire protection is a combination of different fire safety</span><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node="">  equipment and procedures that are used to defend your property</span><br data-dcnode-id="3994"><span data-dcnode-id="3993" instrument_node="">  line from fire.</span><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node=""> While it is different for every company, there are some elements</span><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node="">  that should be found in every commercial facility.</span><br data-dcnode-id="3988"><span data-dcnode-id="3987" instrument_node=""> Fire protection often includes equipment like fire alarms,</span><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">  extinguishers, and sprinkler systems.</span><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node=""> Together these systems work to ensure your property is</span><br data-dcnode-id="3982"><span data-dcnode-id="3981" instrument_node="">  constantly protected.</span><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node=""> When  combined, these systems work to provide your</span><br data-dcnode-id="3978"><span data-dcnode-id="3977" instrument_node="">  commercial space with the ultimate fire protection.</span><br data-dcnode-id="3976"><span data-dcnode-id="3975" instrument_node="">f             Active Fire Protection</span><p data-dcnode-id="3974"></p><p data-dcnode-id="3973"></p><h2 data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">             • Fire Suppression System</span></h2><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">             • Fire Sprinkler System</span><br data-dcnode-id="3968"><span data-dcnode-id="3967" instrument_node="">             • Fire Detection System</span><br data-dcnode-id="3966"><span data-dcnode-id="3965" instrument_node="">   FIRE</span><br data-dcnode-id="3964"><span data-dcnode-id="3963" instrument_node="">PROTECTION</span><br data-dcnode-id="3962"><span data-dcnode-id="3961" instrument_node="">             Passive Fire Protection</span><br data-dcnode-id="3960"><span data-dcnode-id="3959" instrument_node="">  TYPES</span><br data-dcnode-id="3958"><span data-dcnode-id="3957" instrument_node="">             •   Fire Resistant Walls</span><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">             •   Fireproof Doors</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">             •   Spark Proof Tools</span><br data-dcnode-id="3952"><span data-dcnode-id="3951" instrument_node="">             •   Fire Resistant Glass</span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">fWHAT IS FIRE</span><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">SAFETY?</span><p data-dcnode-id="3946"></p><p data-dcnode-id="3945"></p><h2 data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">Fire safety is the set of</span></h2><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">practices intended to reduce the</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">destruction caused by fire.</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">Fire safety measures include</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">those that are intended to</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">prevent       ignition of an</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">uncontrolled fire, and those</span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">that are used to limit the</span><br data-dcnode-id="3928"><span data-dcnode-id="3927" instrument_node="">development and effects of a</span><br data-dcnode-id="3926"><span data-dcnode-id="3925" instrument_node="">fire after it starts.</span><br data-dcnode-id="3924"><span data-dcnode-id="3923" instrument_node="">fREASONS FOR FIRE</span><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">fWHAT ARE THE CONTENTS OF AIR?</span><br data-dcnode-id="3920"><span data-dcnode-id="3919" instrument_node="">fAIR</span><p data-dcnode-id="3918"></p><p data-dcnode-id="3904"><span data-dcnode-id="3917" instrument_node=""> 78.09%&nbsp;nitrogen</span><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node=""> 20.95%&nbsp;oxygen</span><br data-dcnode-id="3914"><span data-dcnode-id="3913" instrument_node=""> 0.93%&nbsp;argon</span><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node=""> 0.04%&nbsp;carbon dioxide</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node=""> Small amounts of other</span><br data-dcnode-id="3908"><span data-dcnode-id="3907" instrument_node="">  gases</span><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node="">fOXYGEN</span></p><p data-dcnode-id="3903"></p><h2 data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">A natural component of air @ 21%</span></h2><br data-dcnode-id="3900"><span data-dcnode-id="3899" instrument_node="">Enriched atmospheres, &gt; 21% oxygen</span><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node="">   labs, oxygen storage</span><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">Situations where oxygen / air is more difficult to control:</span><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">   Outdoors</span><br data-dcnode-id="3892"><span data-dcnode-id="3891" instrument_node="">   Automatic ventilation systems</span><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">   Open doors or windows</span><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">fWHAT IS A FUEL?</span><br data-dcnode-id="3886"><span data-dcnode-id="3885" instrument_node="">fFUEL</span><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node=""> Chemicals - acetone, ether, methanol, etc</span><br data-dcnode-id="3882"><span data-dcnode-id="3881" instrument_node=""> Gases - hydrogen, natural gas</span><br data-dcnode-id="3880"><span data-dcnode-id="3879" instrument_node=""> Plastics - PCs, cable insulation, research equipment</span><br data-dcnode-id="3878"><span data-dcnode-id="3877" instrument_node=""> Paper and cardboard - packaging</span><br data-dcnode-id="3876"><span data-dcnode-id="3875" instrument_node=""> Wood - desks, benches</span><br data-dcnode-id="3874"><span data-dcnode-id="3873" instrument_node=""> Fabrics - chairs, blinds, clothing</span><br data-dcnode-id="3872"><span data-dcnode-id="3871" instrument_node=""> You…</span><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">fTYPES OF FUEL</span><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node=""> Solid Fuel – Wood, Paper, Cotton</span><br data-dcnode-id="3866"><span data-dcnode-id="3865" instrument_node="">  o Tinder Fuel</span><br data-dcnode-id="3864"><span data-dcnode-id="3863" instrument_node="">  o Kindling Fuel</span><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">  o Bulk Fuel</span><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node=""> Liquid Fuel</span><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">  o Lighter than Water – Petrol, Diesel</span><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">  o Heavier than Water – Carbon Di Sulphide</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">  o Mixable with Water - Alcohol</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node=""> Gaseous Fuel</span><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">  o Lighter than Air</span><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">  o Heavier than Air</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">fWHAT ARE THE SOURCES OF HEAT?</span><br data-dcnode-id="3844"><span data-dcnode-id="3843" instrument_node="">fSOURCES OF HEAT</span><p data-dcnode-id="3842"></p><p data-dcnode-id="3820"><span data-dcnode-id="3841" instrument_node="">                   Friction</span><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">                   Spark</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">                   Lightning</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">                   Cell phones</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">                   Static Electricity</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">                   Heating appliances</span><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">                   Electrical equipment's</span><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">                   Smoking materials</span><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">                   Arson</span><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">                   Act of God</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">fELECTRICITY AS IGNITION SOURCE</span></p><p data-dcnode-id="3819"></p><h2 data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node=""> Misuse of electric wires &amp; cables</span></h2><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node=""> Poor maintenance. Lack of a preventive maintenance.</span><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node=""> Ground failure</span><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node=""> Damaged insulation</span><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node=""> Sparking</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node=""> Circuit overload</span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node=""> Short circuit</span><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node=""> Arcing</span><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">f                          Conduction</span><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">MODES OF HEAT TRANSFER    Convection</span><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">                          Radiation</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">fCONDUCTION</span><p data-dcnode-id="3794"></p><p data-dcnode-id="3793"></p><h2 data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">              This image shows how a fire may</span></h2><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">              spread in a building due to the</span><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">              conduction of heat along an</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">              unprotected steel girder.</span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">fCONVECTION</span><p data-dcnode-id="3782"></p><p data-dcnode-id="3781"></p><h2 data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">This image shows how</span></h2><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node=""> fire can spread   by</span><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node=""> convection.</span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">fRADIATION</span><p data-dcnode-id="3772"></p><p data-dcnode-id="3771"></p><h2 data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">             This image shows fire can start by</span></h2><br data-dcnode-id="3768"><span data-dcnode-id="3767" instrument_node="">              radiation.</span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">fBACK DRAFT</span><p data-dcnode-id="3764"></p><p data-dcnode-id="3763"></p><h2 data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">             A back draught is caused when</span></h2><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">             air rushes into a room and</span><br data-dcnode-id="3758"><span data-dcnode-id="3757" instrument_node="">             reignites an oxygen deprived</span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">             fire.</span><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">fFLASHOVER</span><p data-dcnode-id="3752"></p><p data-dcnode-id="3751"></p><h2 data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">            The stage of fire when all surfaces and</span></h2><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">            objects are heated to their ignition</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">            temperature (flash point) and flame</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">            breaks out almost at once over the entire</span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">            surface.</span><br data-dcnode-id="3740"><span data-dcnode-id="3739" instrument_node="">fSTAGES OF FIRE</span><p data-dcnode-id="3738"></p><p data-dcnode-id="3716"><span data-dcnode-id="3737" instrument_node=""> Ignition Stage :&nbsp;Fuel, oxygen and heat join together in a sustained chemical reaction. At this</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">  stage, a fire extinguisher can control the fire.</span><br data-dcnode-id="3734"><span data-dcnode-id="3733" instrument_node=""> Growth Stage : &nbsp;With the initial flame as a heat source, additional fuel ignites. Convection and</span><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">  radiation ignite more surfaces. The size of the fire increases and the plume reaches the ceiling.</span><br data-dcnode-id="3730"><span data-dcnode-id="3729" instrument_node="">  Hot gases collecting at the ceiling transfer heat, allowing all fuels in a room to come closer to</span><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">  their ignition temperature at the same time.</span><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node=""> Fully developed Stage :&nbsp;Fire has spread over much if not all the available fuel; temperatures</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">  reach their peak, resulting in heat damage. Oxygen is consumed rapidly.</span><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node=""> Decay (Burnout) Stage :&nbsp;The fire consumes available fuel, temperatures decrease, fire gets less</span><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node="">  intense.</span><br data-dcnode-id="3718"><span data-dcnode-id="3717" instrument_node="">fCLASSIFICATION OF DANGEROUS GOODS</span></p><p data-dcnode-id="3668"><span data-dcnode-id="3715" instrument_node=""> Classified by US DOT</span><br data-dcnode-id="3714"><span data-dcnode-id="3713" instrument_node=""> For the ease of fire fighting and transporting</span><br data-dcnode-id="3712"><span data-dcnode-id="3711" instrument_node="">ff    CLASSIFICATION OF</span><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node=""> HAZARDOUS LOCATIONS AS</span><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">        PER NFPA</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node=""> Class I Locations</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">    Class I, Division 1</span><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">    Class I, Division 2</span><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">    Class 1, Zone 0</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node="">    Class 1, Zone 1</span><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node="">    Class 1, Zone 2</span><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node=""> Class II Locations</span><br data-dcnode-id="3692"><span data-dcnode-id="3691" instrument_node="">    Class II, Division 1</span><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">    Class II, Division 2</span><br data-dcnode-id="3688"><span data-dcnode-id="3687" instrument_node=""> Class III Locations</span><br data-dcnode-id="3686"><span data-dcnode-id="3685" instrument_node="">    Class III, Division 1</span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">    Class III, Division 2</span><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">fCLASS, DIVISION &amp; ZONE</span><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node=""> Class I – areas in which flammable gases, flammable liquid-produced vapours, or combustible liquid-produced vapours</span><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">   are or may be present in the air in quantities sufficient to produce explosive or ignitable mixtures</span><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node=""> Class II – locations in which combustible dust is present; dust is defined as solid material less than 420 microns (0.017</span><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">   in.) or smaller in diameter</span><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node=""> Class III – locations in which easily ignitable fibres or flying's, such as rayon, cotton, jute, hemp and cocoa fibre are</span><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">   present</span></p><p data-dcnode-id="3662"><span data-dcnode-id="3667" instrument_node=""> Division I – is a location where combustible materials are routinely present in ignitable concentrations.</span><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node=""> Division 2 – is one in which the same materials are handled, processed, or used, but in which the materials are normally</span><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">   confined and can escape only in case of accident or breakdown or failure of ventilation equipment.</span></p><p data-dcnode-id="3661"></p><h2 data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node=""> Zone 0 – Flammable Atmosphere will Always Present &amp; Continuously</span></h2><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node=""> Zone 1 – Flammable Atmosphere will Present Under Normal Running Conditions</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node=""> Zone 2 – Flammable Atmosphere will Present for Short Period of Time.</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">ffGROUPING</span><p data-dcnode-id="3652"></p><p data-dcnode-id="3636"><span data-dcnode-id="3651" instrument_node=""> Group A – acetylene</span><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node=""> Group B – Hydrogen</span><br data-dcnode-id="3648"><span data-dcnode-id="3647" instrument_node=""> Group C – Ethylene</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node=""> Group D – Propane</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node=""> Group E – Metal Dusts</span><br data-dcnode-id="3642"><span data-dcnode-id="3641" instrument_node=""> Group F – Coal, Carbon, Charcoal</span><br data-dcnode-id="3640"><span data-dcnode-id="3639" instrument_node=""> Group G – Flour, Grain, Wood, Plastics &amp; Chemicals</span><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">fSAFE DESIGN OF ELECTRICAL EQUIPMENT</span></p><p data-dcnode-id="3635"></p><h2 data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">                             OSHA established the requirements for electric</span></h2><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">                              equipment and wiring in locations that are</span><br data-dcnode-id="3630"><span data-dcnode-id="3629" instrument_node="">                              classiﬁed.</span><br data-dcnode-id="3628"><span data-dcnode-id="3627" instrument_node="">                             The type of equipment approved for use in</span><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">                              hazardous locations must be selected based upon</span><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">                              the properties of the ﬂammable vapours, liquids, or</span><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">                              gases or combustible dusts or ﬁbres that may be</span><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">                              present therein and the likelihood that a ﬂammable</span><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">                              or combustible concentration or quantity is present.</span><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">fBASIC TERMINOLOGIES</span><p data-dcnode-id="3614"></p><p data-dcnode-id="3590"><span data-dcnode-id="3613" instrument_node=""> Flash Point</span><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">   It is the lowest temperature of a flammable material at which the</span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">     vapors of the material will ignite, when an ignition source is</span><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">     introduced.</span><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node=""> Fire Point</span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">   It is the lowest temperature of a flammable material at which the</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">     vapors of the material will continue to burn for at least 5 seconds</span><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">     after ignition.</span><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node=""> Auto Ignition Temperature</span><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">   It is the lowest temperature of any material at which it spontaneously</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">     ignites in normal atmosphere without an external source of ignition.</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">fFLAMMABLE LIQUIDS &amp; COMBUSTIBLE LIQUIDS</span></p><p data-dcnode-id="3589"></p><h2 data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">                            Flammable liquids are any liquids</span></h2><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">                             having a ﬂash point below 100 deg F</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">                            Combustible liquids are any liquid</span><br data-dcnode-id="3582"><span data-dcnode-id="3581" instrument_node="">                             having a ﬂash point at or above 100</span><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">                             deg F</span><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">fCLASSIFICATION OF FLAMMABLES &amp; COMBUSTIBLES BY NFPA</span><p data-dcnode-id="3576"></p><p data-dcnode-id="3575"></p><h2 data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">     Hazard classification for flammable liquids</span></h2><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">             Class                   Flash point           Boiling point           Examples</span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node="">              I-A              below 73°F (23°C)      below 100°F (38°C)   diethyl ether, pentane,</span><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">                                                                           ligroin, petroleum ether</span><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">               I-B            below 73°F (23°C)       at or above 100°F    acetone, benzene,</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">                                                      (38°C)               cyclohexane, ethanol</span><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">              I-C              73-100°F (24-38°C)                ----      p-xylene</span><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">     Hazard classification for combustible liquids</span><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">               II              101-140°F (39-60°C)              ----       diesel fuel, motor oil,</span><br data-dcnode-id="3556"><span data-dcnode-id="3555" instrument_node="">                                                                           kerosene, cleaning</span><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">                                                                           solvents</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">              III-A           141-199°F (61-93°C)               ----       paints (oil base), linseed</span><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node="">                                                                           oil, mineral oil</span><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">              III-B           200°F (93°C) or above             ----       paints (oil base),</span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">                                                                           neatsfoot oil</span><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">fUPPER &amp; LOWER LIMITS</span><p data-dcnode-id="3542"></p><p data-dcnode-id="3530"><span data-dcnode-id="3541" instrument_node=""> The minimum concentration of a particular combustible gas or vapor necessary to support its combustion in air is</span><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">   defined as the Lower Explosive Limit (LEL) for that gas. Below this level, the mixture is too “lean” to burn.</span><br data-dcnode-id="3538"><span data-dcnode-id="3537" instrument_node=""> The maximum concentration of a gas or vapor that will burn in air is defined as the Upper Explosive Limit</span><br data-dcnode-id="3536"><span data-dcnode-id="3535" instrument_node="">   (UEL). Above this level, the mixture is too “rich” to burn.</span><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node=""> The range between the LEL and UEL is known as the flammable range for that gas or vapor.</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">ffCLASSIFICATION OF FIRE (OLD)</span></p><p data-dcnode-id="3529"></p><h2 data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node=""> "A" Class Fire : solid fuels , e.g. wood, paper, cotton.</span></h2><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node=""> "B" Class Fire : liquid fuels.&nbsp; e.g. petrol , diesel ,</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">  kerosene.</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node=""> "C" Class Fire : gas fuels. e.g.&nbsp; LPG, CNG .</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node=""> "D" Class Fire : combustible metals. e.g.&nbsp; sodium ,</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">  phosphorus , magnesium. (all used in crackers , match</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">  sticks). &nbsp;</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node=""> "E" Class Fire : live electrical equipment's . e.g. switch</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">  board, transformer.</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node=""> "K" Class Fire : kitchen oil.</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">fCLASSIFICATION</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">OF FIRE ( NEW)</span><p data-dcnode-id="3504"></p><p data-dcnode-id="3503"></p><h2 data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node=""> "A" Class Fire : Solid fuels ,</span></h2><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">   e.g. wood, paper, cotton.</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node=""> "B" Class Fire : liquid fuels.&nbsp;</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">   e.g. petrol , diesel , kerosene.</span><br data-dcnode-id="3494"><span data-dcnode-id="3493" instrument_node=""> "C" Class Fire : gas fuels. e.g.&nbsp;</span><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node="">   lpg, cng &amp; Electric Fire</span><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node=""> "D" Class Fire : combustible</span><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">   metals.    e.g.&nbsp;    sodium      ,</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">   phosphorus , magnesium. (all</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">   used in crackers , match sticks).</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">fCLASS A FIRE</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">Class A fires are defined as</span><br data-dcnode-id="3478"><span data-dcnode-id="3477" instrument_node="">ordinary combustibles. These</span><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">types are fires use commonly</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">flammable material as their</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">fuel source.</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">Wood, fabric, paper &amp; trash</span><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">are common sources of Class A</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node="">fires.</span><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node="">This is essentially the common</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">accidental fire encountered</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">across      several     different</span><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">industries. Trash fires are one</span><br data-dcnode-id="3456"><span data-dcnode-id="3455" instrument_node="">such example.</span><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">Class A fires are commonly put</span><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">out     with       water    or</span><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">monoammonium phosphate.</span><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">fCLASS B FIRE</span><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">The Class B fire is defined as one</span><br data-dcnode-id="3444"><span data-dcnode-id="3443" instrument_node="">that uses a flammable liquid or</span><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">gas as its fuel base. Common</span><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">liquid based fuel sources include</span><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">petroleum based oils and paints,</span><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">kerosene,      and        gasoline.</span><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">Flammable gases such as butane</span><br data-dcnode-id="3432"><span data-dcnode-id="3431" instrument_node="">or propane are also common fuel</span><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">sources in Class B fires.</span><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">Class B fires are a common</span><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">hazard in industries dealing with</span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">fuels, lubricants, and certain</span><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">types of paint.</span><br data-dcnode-id="3420"><span data-dcnode-id="3419" instrument_node="">Smothering these types of fires to</span><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">remove oxygen is a common</span><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">solution as are chemical reactions</span><br data-dcnode-id="3414"><span data-dcnode-id="3413" instrument_node="">that produce similar effects.</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">fCLASS C FIRE</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">The Class C fire is defined as a fire</span><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">that uses electrical components</span><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">and/or energized equipment as its</span><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">fuel source.</span><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">Electrical fires are often fuelled by</span><br data-dcnode-id="3400"><span data-dcnode-id="3399" instrument_node="">motors, appliances, and electronic</span><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">transformers. Electrical fires are</span><br data-dcnode-id="3396"><span data-dcnode-id="3395" instrument_node="">common in industries that deal with</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">energy or make use of heavy</span><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">electrically-powered equipment.</span><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">However, electrical fires can occur</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">on smaller scales in all businesses</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">(i.e. an overloaded surge protector</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">or bad wiring) and should be taken</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">seriously.</span><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">To extinguish such fires you cut the</span><br data-dcnode-id="3378"><span data-dcnode-id="3377" instrument_node="">power off and use non-conductive</span><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">chemicals to extinguish the fire. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">fCLASS D FIRE</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">The Class D fire is defined as one that</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">uses a combustible metal as its fuel</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">source. Examples of such combustible</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">metals include titanium, magnesium,</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">aluminium, and potassium.</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">Class D fires are a danger in</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">laboratory environments. However,</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">be aware that combustible metals are</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">used as part of production and other</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">industry processes, and you need to</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">be certain of what materials you are</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">using for day-to-day operations.</span><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">When confronted with such a fire,</span><br data-dcnode-id="3346"><span data-dcnode-id="3345" instrument_node="">common extinguishing agents such as</span><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">water are ineffective and can be</span><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">hazardous.</span><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">To extinguish a Class D fire, use a</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">special dry powder agent.</span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">This absorbs the heat the fire requires</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">to burn and smothers it as well. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">fFIRE FIGHTING METHODS</span><p data-dcnode-id="3330"></p><p data-dcnode-id="3329"></p><h2 data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">                         Cooling Method – Removal of Heat by</span></h2><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">                          Pouring Water</span><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">                         Starvation Method – Removal of Fuel</span><br data-dcnode-id="3322"><span data-dcnode-id="3321" instrument_node="">                          by Removing/Isolating</span><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">                         Blanketing &amp; Smothering Method –</span><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">                          Removal of Oxygen by Covering the</span><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">                          Fire from Top/All Sides</span><br data-dcnode-id="3314"><span data-dcnode-id="3313" instrument_node="">                         Cut the Chain Reaction – Breaking the</span><br data-dcnode-id="3312"><span data-dcnode-id="3311" instrument_node="">                          Chemical Process of Combustion &amp;</span><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">                          Oxidation by Fire Extinguishers</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">fFIRE FIGHTING METHODS</span><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">CLASS         SOURCE                                METHOD                          FIRE EXTINGUISHER</span><p data-dcnode-id="3304"></p><p data-dcnode-id="3303"></p><h2 data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node=""> A        Paper, Wood, Cloth                    Cooling, Blanketing                     Water, Sand</span></h2><p data-dcnode-id="3300"></p><p data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node=""> B      Petrol, Diesel, Kerosene   Smothering, Starvation, Cut the Chain Reaction   Sand, CO2, DCP, Foam</span></p><p data-dcnode-id="3297"></p><h2 data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node=""> C      Electrical Equipment's                Smothering, Starvation                     CO2, DCP</span></h2><p data-dcnode-id="3294"></p><p data-dcnode-id="3293"></p><h2 data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node=""> D      Aluminum, Magnesium                         Smothering                         Special Powder</span></h2><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">f                            PRESSURE GAUGE</span><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">      DISCHARGE LEVER       (not found on CO2</span><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">FIRE EXTINGUISHERS          extinguishers)</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">    DISCHARGE LOCKING PIN         CARRYING</span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">    AND SEAL                      HANDLE</span><p data-dcnode-id="3280"></p><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">       DISCHARGE HOSE</span></p><p data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">                               DATA PLATE</span></p><p data-dcnode-id="3275"></p><h2 data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">      DISCHARGE NOZZLE            BODY</span></h2><p data-dcnode-id="3272"></p><p data-dcnode-id="3266"><span data-dcnode-id="3271" instrument_node="">      DISCHARGE ORIFICE</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">ff                  PASS Method</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">HOW TO OPERATE     o P – Pull the Pin</span></p><p data-dcnode-id="3265"></p><h2 data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">     A FIRE        o A – Aim at Base of Fire</span></h2><p data-dcnode-id="3262"></p><p data-dcnode-id="3261"></p><h2 data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node=""> EXTINGUISHER?     o S – Squeeze the Lever</span></h2><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">                   o S – Sweep the Nozzle</span><br data-dcnode-id="3256"><span data-dcnode-id="3255" instrument_node="">fFIRE EXTINGUISHING</span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node="">      AGENTS</span><p data-dcnode-id="3252"></p><p data-dcnode-id="3251"></p><h2 data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node=""> Soda Acid (Banned)</span></h2><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node=""> Water</span><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node=""> Carbon Di Oxide</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node=""> Chemical Powder</span><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">    Dry</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">    Wet</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node=""> Clean Agent</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node=""> Foam</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node=""> Halogenated Agents (Banned)</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node=""> Combustible Metal</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">  Extinguishing Agents</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">f SODA ACID</span><p data-dcnode-id="3226"></p><p data-dcnode-id="3225"></p><h2 data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node=""> Contains Sulphuric Acid &amp; Sodium Bi Carbonate</span></h2><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">  (Baking Soda) Solution.</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node=""> Both mixes and create Sulphuric Sodium Sulphate Di</span><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">  Oxide.</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node=""> Harmful to Human &amp; Environment. Banned.</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">fWATER</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">Water is by far the most</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">commonly      used     and</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">readily          available</span><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">extinguishing agent.</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">Water works well because</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">it has a large capacity for</span><br data-dcnode-id="3200"><span data-dcnode-id="3199" instrument_node="">absorbing heat.</span><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">1 Litre of Water will</span><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node="">Convert into 1600 Litres</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">of Steam, which absorbs</span><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">more heat.</span><br data-dcnode-id="3190"><span data-dcnode-id="3189" instrument_node="">fCARBON DI OXIDE</span><p data-dcnode-id="3188"></p><p data-dcnode-id="3187"></p><h2 data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Carbon dioxide (CO2) is a gaseous fire</span></h2><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">control agent that is stored under pressure</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">as a liquid.</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">It is rated for class B and C fires.</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node="">The major advantages of carbon dioxide</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node="">are that it leaves no residue and is</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">nonconducting.</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">The main disadvantage of carbon dioxide</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">is that it can create an oxygen deficient</span><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node="">area where it has been used that poses a</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">significant risk to personnel.</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">Also it is stored at a temperature of -22</span><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node="">deg c which will create frost bite if</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node="">touched.</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">f DRY CHEMICAL POWDER</span><p data-dcnode-id="3156"></p><p data-dcnode-id="3140"><span data-dcnode-id="3155" instrument_node=""> Dry chemicals are commonly used extinguishing agents. They can be found</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node="">   in both ﬁxed systems and portable ﬁre extinguishers.</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node=""> There are different types of dry-chemical products on the market.</span><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node=""> Examples of dry-chemical agents include sodium bicarbonate, potassium</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">   bicarbonate, potassium chloride, and monoammonium phosphate.</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node=""> The most widely used dry-chemical agent is monoammonium phosphate.</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">    Also called as triclass extinguishers.</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">    Can be used for A, B &amp; C class fires.</span></p><p data-dcnode-id="3139"></p><h2 data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node=""> Extinguishers which contain sodium bicarbonate, potassium bicarbonate can</span></h2><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">   be used against B &amp; C class fires.</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">f     DRY CHEMICAL</span><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">       POWDER</span><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">Sodium bicarbonate, when heated by</span><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">ﬁre, releases CO2 and smothers the ﬁre.</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">Monoammonium phosphate, on the</span><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">other hand, forms a sticky ﬁlm that</span><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node="">smothers the ﬁre.</span><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">Dry-chemical agents can also extinguish</span><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node="">a ﬁre by interrupting the ﬁre’s chemical</span><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node="">chain reaction by preventing the</span><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">particles of combustion (free radicals)</span><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">from coming together and continuing</span><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node="">the reaction.</span><br data-dcnode-id="3108"><span data-dcnode-id="3107" instrument_node="">The materials are nontoxic; however,</span><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">when inhaled in heavy concentrations,</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">they can be irritant.</span><br data-dcnode-id="3102"><span data-dcnode-id="3101" instrument_node="">These chemical powders will create a</span><br data-dcnode-id="3100"><span data-dcnode-id="3099" instrument_node="">residue hence it may not be very useful</span><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">against fire on delicate electrical</span><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node="">equipment's such as computers &amp;</span><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">servers.</span><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">fWET CHEMICAL POWDER</span><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node=""> Wet Chemical Extinguishers are suitable for use on Class A &amp; F Fires.</span><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">   These ranges of extinguishers are specialists in regards to cooking fires</span><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">   caused by fat and oils.</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node=""> Extinguishers such as Water, Foam, Powder &amp; CO2 will not always put</span><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">   out big cooking fires and are also extremely dangerous because the</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">   pressure of these extinguishers can cause the oil to jet out and cause</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">   serious harm.</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node=""> Wet Chemical Fire Extinguishers contains a solution of potassium which</span><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node="">   effectively attacks the flame in two methods:</span><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node=""> Firstly the mist cools the fire and lowers the temperature to stop the fire</span><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">   spreading, also prevents splashing of the hot oils/fat.</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node=""> Secondly the potassium salts react with the hot oil and causes the process</span><br data-dcnode-id="3066"><span data-dcnode-id="3065" instrument_node="">   of saponification, coating the surface of the cooking oil or fat in soapy</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">   foam that is non combustible and acts as a barrier between the fat and</span><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">   oil.</span><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node=""> Wet Chemical Fire Extinguishers are ideal for Restaurants and Kitchens</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">   being for use on fats and oils..</span><br data-dcnode-id="3056"><span data-dcnode-id="3055" instrument_node="">ff HALOGENATED AGENTS</span><p data-dcnode-id="3054"></p><p data-dcnode-id="3053"></p><h2 data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node=""> Halogenated materials use a hydrocarbon material such as Fluorine,</span></h2><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">   Chlorine, Bromine and Iodine.</span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node=""> Halon 104 (Carbon Tetra Chloride) was first introduced.</span><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node=""> The most widely used Halon are Halon 1211 &amp; Halon 1301.</span><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">   o   Digit 1: number of carbon atoms in the chemical</span><br data-dcnode-id="3042"><span data-dcnode-id="3041" instrument_node="">   o   Digit 2: number of ﬂuorine atoms</span><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">   o   Digit 3: number of chlorine atoms</span><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">   o   Digit 4: number of bromine atoms</span><br data-dcnode-id="3036"><span data-dcnode-id="3035" instrument_node="">   o   Digit 5: number of iodine atoms, if any (if omitted, none are used)</span><br data-dcnode-id="3034"><span data-dcnode-id="3033" instrument_node="">f HALOGENATED AGENTS</span><p data-dcnode-id="3032"></p><p data-dcnode-id="3031"></p><h2 data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node=""> Halogenated agents are commonly used in handheld ﬁre extinguishers and</span></h2><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">   ﬁxed extinguishing systems protecting electrical equipment and electronics.</span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node=""> Halon agents vaporize quickly in a ﬁre and leave no corrosive or abrasive</span><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">   residue. Because of this property, halon extinguishing agents do not damage</span><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">   the electrical components like dry-chemical agents; as a result, they became</span><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">   very popular in industry.</span><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node=""> Although they have been very effective extinguishing agents, Halon 1301,</span><br data-dcnode-id="3016"><span data-dcnode-id="3015" instrument_node="">   2402, and 1211 were identiﬁed as the Substances that Deplete the Ozone</span><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">   Layer as ozone-depleting substances.</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node=""> Halons are bromated chloroﬂuorocarbons and are very effective at</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">   destroying the earth’s ozone layer.</span><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node=""> As a result, their use is being banned.</span><br data-dcnode-id="3006"><span data-dcnode-id="3005" instrument_node="">f  REPLACEMENT FOR</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node=""> HALOGENATED AGENTS</span><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">To     replace     halon,       new</span><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">extinguishing agents have been</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">developed     with     the     same</span><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">ﬁreﬁghting characteristics as halon.</span><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node="">Examples      of    two     new</span><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">extinguishing agents replacing</span><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node="">halon are Halotron, manufactured</span><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">by    Halotron,    and   FE-36,</span><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">manufactured by Dupont.</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node="">Inergen is another environmentally</span><br data-dcnode-id="2982"><span data-dcnode-id="2981" instrument_node="">friendly ﬁre-suppression agent</span><br data-dcnode-id="2980"><span data-dcnode-id="2979" instrument_node="">manufactured by Ansul.</span><br data-dcnode-id="2978"><span data-dcnode-id="2977" instrument_node="">Inergen is a blend of three</span><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">naturally occurring gases, nitrogen,</span><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">argon, and carbon dioxide, and</span><br data-dcnode-id="2972"><span data-dcnode-id="2971" instrument_node="">does not deplete the ozone layer.</span><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">f FOAM EXTINGUISHING AGENTS</span><p data-dcnode-id="2968"></p><p data-dcnode-id="2967"></p><h2 data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node=""> Foam is lighter than liquids, it will ﬂoat on top of ﬂammable and</span></h2><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">   combustible liquid, producing a layer that excludes oxygen, cools, and</span><br data-dcnode-id="2962"><span data-dcnode-id="2961" instrument_node="">   produces a vapor seal.</span><br data-dcnode-id="2960"><span data-dcnode-id="2959" instrument_node=""> The foam agent is produced by mixing a concentrate with water, then</span><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">   aerating the mixture.</span><br data-dcnode-id="2956"><span data-dcnode-id="2955" instrument_node=""> Foams are deﬁned by their expansion ratio, which is the volume of foam</span><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">   after air is added to the volume of the foam before it is added.</span><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node=""> The classiﬁcations of foam extinguishing agents are as follows:</span><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">   o   Low-expansion foam: 20:1</span><br data-dcnode-id="2948"><span data-dcnode-id="2947" instrument_node="">   o   Medium-expansion foam: 20 to 200:1</span><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">   o   High-expansion foam: 200 to 1,000:1</span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">fFOAM EXTINGUISHING</span><br data-dcnode-id="2942"><span data-dcnode-id="2941" instrument_node="">      AGENTS</span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">Aqueous film-forming foam (AFFF),</span><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">used on A and B fires and for vapor</span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">suppression.</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">AFFF forms a film that floats over the</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">oil, sealing the surface and smothering</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node="">the fire by excluding oxygen.</span><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">Alcohol-resistant aqueous film-forming</span><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">foams (AR-AFFF), used on fuel fires</span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">containing alcohol. Forms a membrane</span><br data-dcnode-id="2922"><span data-dcnode-id="2921" instrument_node="">between the fuel and the foam</span><br data-dcnode-id="2920"><span data-dcnode-id="2919" instrument_node="">preventing the alcohol from breaking</span><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">down the foam blanket.</span><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">Film-forming fluoroprotein (FFFP)</span><br data-dcnode-id="2914"><span data-dcnode-id="2913" instrument_node="">contains naturally occurring proteins</span><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">from animal by-products and synthetic</span><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">film-forming agents to create a foam</span><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">blanket that is more heat resistant than</span><br data-dcnode-id="2906"><span data-dcnode-id="2905" instrument_node="">the strictly synthetic AFFF foams.</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">FFFP works well on alcohol-based</span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">liquids and is used widely in</span><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">motorsports.</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">ff COMBUSTIBLE METAL EXTINGUISHING</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node=""> AGENTS</span><p data-dcnode-id="2894"></p><p data-dcnode-id="2893"></p><h2 data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node=""> Fires involving combustible metals, such as sodium, magnesium, and</span></h2><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">   potassium, pose special ﬁre hazards.</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node=""> Water-based extinguishing agents are reactive with these metals, and</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">   common dry-chemical extinguishers are ineffective on ﬁres involving these</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">   materials.</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node=""> Specially formulated dry chemical agents have been developed for ﬁres</span><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">   involving combustible metals, and there are only a few acceptable agents</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">   that have been approved as extinguishing agents.</span><br data-dcnode-id="2876"><span data-dcnode-id="2875" instrument_node=""> Met-L-X powder, for example, is suitable for use with ﬁres involving</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">   magnesium, sodium, potassium, and sodium-potassium alloy.</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node=""> Na-X is a suitable extinguishing agent for use on low- or nonchlorine-</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">   containing sodium ﬁres.</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">fSUITABILITY OF FIRE EXTINGUISHERS</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">f           Wood Crib      Wood Panel   Softwood</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node=""> Rating</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">            (inches)        (Feet)       (lbs)</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">  1-A     20 x 20 x 20      8x8           6</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">  2-A     25 x 26 x 26     10 x 10       12</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">  3-A     30 x 30 x 30     12 x 12       18</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">  4-A     33 x 30 x 30     14 x 14       24</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">  6-A     38x&nbsp;38 x 38      17 x 17       36</span><br data-dcnode-id="2850"><span data-dcnode-id="2849" instrument_node="">  10-A    48 x 48 x 48     17 x 17       36</span><p data-dcnode-id="2848"></p><p data-dcnode-id="2826"><span data-dcnode-id="2847" instrument_node="">FE RATINGS – CLASS A FE</span><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">f                      Pan Size    Gallons of</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">       Rating</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">                       (sq ft)     Heptane</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">        1-B                2.5      3.25</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">        2-B                5.0      6.25</span><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">        5-B               12.5      15.5</span><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node="">        10-B              25.0      31.0</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">        20-B              50.0      65.0</span><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">        30-B              75.0      95.0</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">        40-B              100.0     125.0</span></p><p data-dcnode-id="2822"><span data-dcnode-id="2825" instrument_node="">FE RATINGS – CLASS B FE</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">fQUESTION</span></p><p data-dcnode-id="2821"></p><h2 data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node=""> If a a ﬁre extinguisher is rated and classiﬁed as 4-A:20-B:C</span></h2><br data-dcnode-id="2818"><span data-dcnode-id="2817" instrument_node=""> Where can it be used?</span><br data-dcnode-id="2816"><span data-dcnode-id="2815" instrument_node="">fSELECTION, INSTALLATION &amp; MAINTENANCE OF FIRE</span><br data-dcnode-id="2814"><span data-dcnode-id="2813" instrument_node="">         EXTINGUISHERS – IS 2190 : 2010</span><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">fCLASSIFICATION OF HAZARDS</span><p data-dcnode-id="2810"></p><p data-dcnode-id="2809"></p><h2 data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node=""> Light Hazard (Low)</span></h2><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node=""> Ordinary Hazard (Moderate)</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node=""> Extra Hazard (High)</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">fLIGHT HAZARD (LOW)</span><p data-dcnode-id="2800"></p><p data-dcnode-id="2799"></p><h2 data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node=""> Total amount of Class A combustible materials, including furnishings, decorations,</span></h2><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">  and contents, is of minor quantity. This can include some buildings or rooms occupied</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">  as offices, classrooms, churches, assembly halls &amp; guest room areas of hotels/motels.</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node=""> Total amount of Class B flammable liquids are less than 4 litre and provided that they</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">  are kept in closed containers and safely stored.</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">fORDINARY HAZARD (MODERATE)</span><p data-dcnode-id="2786"></p><p data-dcnode-id="2772"><span data-dcnode-id="2785" instrument_node=""> Total amount of Class A combustibles and Class B flammables are present in greater amounts that expected under</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">   light (low) hazard occupancies. These occupancies could consist of dining areas, mercantile shop and storage,</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">   light manufacturing operations, research labs, auto showrooms, packing garages workshops etc of light (low)</span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node="">   hazard occupancies, and warehouses.</span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node=""> Total amount of Class B flammable liquids are 4 to 20 litre and provided that they are kept in closed containers</span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node="">   and safely stored.</span><br data-dcnode-id="2774"><span data-dcnode-id="2773" instrument_node="">fEXTRA HAZARD (HIGH)</span></p><p data-dcnode-id="2758"><span data-dcnode-id="2771" instrument_node=""> Total amount of Class A combustibles and Class B flammables present, in storage, production, use, finished</span><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">   product, or combination thereof, is over and above those expected in occupancies classed as ordinary (moderate)</span><br data-dcnode-id="2768"><span data-dcnode-id="2767" instrument_node="">   hazard. These occupancies could consist of woodworking; vehicle repair; aircraft and boat servicing; cooking</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">   area; individual product display showrooms; product convention centre displays; and storage and manufacturing</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">   processes such as painting; dipping, and coating, including flammable liquid handling.</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node=""> Total amount of the flammable liquids may be more than 20 litre.</span><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">fNUMBER &amp; SIZE OF FIRE EXTINGUISHERS</span></p><p data-dcnode-id="2744"><span data-dcnode-id="2757" instrument_node=""> Fire extinguishers should be provided both for protecting building structure as well as occupancy hazard contained</span><br data-dcnode-id="2756"><span data-dcnode-id="2755" instrument_node="">   therein.</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">fNUMBER &amp; SIZE OF FE – CLASS A</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">ffNUMBER &amp; SIZE OF FE – CLASS B</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">fNUMBER &amp; SIZE OF FE – CLASS C</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">fNUMBER &amp; SIZE OF FE – CLASS D</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">fFE WEEKLY INSPECTION CHECKLIST POINTS</span></p><p data-dcnode-id="2743"></p><h2 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node=""> Location in designated place;</span></h2><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node=""> No obstruction to access or visibility;</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node=""> Operating instructions on nameplate legible and facing outward;</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node=""> Safety seals and tamper indicators not broken or missing;</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node=""> Fullness determined by weighing or lifting;</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node=""> Examination for obvious physical damage, corrosion, leakage, or clogged nozzle;</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node=""> Pressure gauge reading or indicator in the operable range or position; and h) Condition of tyres, wheels, carriage,</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">   hose, and nozzle checked (for wheeled units).</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">fFE QUARTERLY INSPECTION CHECKLIST POINTS</span><p data-dcnode-id="2724"></p><p data-dcnode-id="2700"><span data-dcnode-id="2723" instrument_node=""> Clean the exterior of the extinguisher, polish the painted portion with wax polish, the brass/ gun metal parts with</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">   metal polish, chromium plated parts with silver polish and plasti
