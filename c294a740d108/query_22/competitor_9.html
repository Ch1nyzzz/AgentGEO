c components to be thoroughly washed with soap</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">   solution and sun dried.</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node=""> Check the nozzle outlet and vent holes as well as the threaded portion of the cap for clogging, and check that</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">   plunger is clean and moving freely.</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node=""> Ensure that the cap washer is intact and also grease the threads of the cap, plunger, etc, and wipe clean.</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node=""> Make sure that the extinguisher is in proper condition and is not accidentally discharged. In case of stored pressure</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">   extinguisher, pressure gauge is to be checked for correct pressure.</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node=""> Check all the components of the extinguisher as per the maintenance check list given for each type of extinguisher</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">   under Annex C.</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node=""> Maintenance shall be carried out by the manufacturers or his authorised agent or professional firemen.</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">fTESTING OF FE</span></p><p data-dcnode-id="2699"></p><h2 data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node=""> Hydraulic Pressure Test (HPT)</span></h2><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node=""> Discharge Test</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">fREFILLING OF FE</span><p data-dcnode-id="2692"></p><p data-dcnode-id="2668"><span data-dcnode-id="2691" instrument_node=""> Once in 2 years</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">   o   Water type – Stored pressure</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">   o   Mechanical foam type – Stored pressure</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node=""> Once in 3 years</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">   o   Powder type</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node=""> Once in 5 years</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">      Water type – Cartridge</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">      Mechanical Foam type – Cartridge</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">      CO2 type</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">fHPT FREQUENCY OF FE</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">fLIFE OF FE</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">fNBC – NATIONAL BUILDING CODE</span></p><p data-dcnode-id="2648"><span data-dcnode-id="2667" instrument_node=""> Group A – Residential</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node=""> Group B – Educational</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node=""> Group C – Institutional</span><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node=""> Group D – Assembly</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node=""> Group E – Business</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node=""> Group F – Mercantile</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node=""> Group G – Industrial</span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node=""> Group H – Storage</span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node=""> Group J - Hazardous</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">fGROUP A RESIDENTIAL BUILDINGS</span></p><p data-dcnode-id="2647"></p><h2 data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node=""> Subdivision A-1 Lodging and rooming houses</span></h2><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node=""> Subdivision A-2 One or two family private dwellings</span><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node=""> Subdivision A-3 Dormitories</span><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node=""> Subdivision A-4 Apartment houses S</span><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node=""> ubdivision A-5 Hotels</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node=""> Subdivision A-6 Starred hotels</span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">fGROUP B EDUCATIONAL BUILDINGS</span><p data-dcnode-id="2632"></p><p data-dcnode-id="2631"></p><h2 data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node=""> Subdivision B-1 Schools up to senior secondary level</span></h2><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node=""> Subdivision B-2 All others/training institutions</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">fGROUP C INSTITUTIONAL BUILDINGS</span><p data-dcnode-id="2624"></p><p data-dcnode-id="2623"></p><h2 data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node=""> Subdivision C-1 Hospitals and sanatoria</span></h2><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node=""> Subdivision C-2 Custodial institutions</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node=""> Subdivision C-3 Penal and mental institutions</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">fGROUP D ASSEMBLY BUILDINGS</span><p data-dcnode-id="2614"></p><p data-dcnode-id="2586"><span data-dcnode-id="2613" instrument_node=""> Subdivision D-1 Buildings having a theatrical or motion picture or any other stage and fixed seats for over 1&nbsp;000</span><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">   persons</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node=""> Subdivision D-2 Buildings having a theatrical or motion picture or any other stage and fixed seats up to 1&nbsp;000</span><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">   persons</span><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node=""> Subdivision D-3 Buildings without a permanent stage having accommodation for 300 or more persons but no</span><br data-dcnode-id="2604"><span data-dcnode-id="2603" instrument_node="">   permanent seating arrangement</span><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node=""> Subdivision D-4 Buildings without a permanent stage having accommodation for less than 300 persons with no</span><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">   permanent seating arrangement</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node=""> Subdivision D-5 All other structures including temporary structures designed for assembly of people not covered by</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">   Subdivisions D-1 to D-4, at ground level</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node=""> Subdivision D-6 Buildings having mixed occupancies of assembly and mercantile (for example, shopping malls</span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">   providing facilities such as shopping, cinema theatres, multiplexes and restaurants/food courts)</span><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node=""> Subdivision D-7 Underground and elevated mass rapid transit system</span><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">fGROUP E BUSINESS BUILDINGS</span></p><p data-dcnode-id="2570"><span data-dcnode-id="2585" instrument_node=""> Subdivision E-1 Offices, banks, professional establishments, like offices of architects, engineers, doctors, lawyers,</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">   post offices and police stations</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node=""> Subdivision E-2 Laboratories, outpatient clinics, research establishments, libraries and test houses</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node=""> Subdivision E-3 Electronic data processing centres, computer installations, information technology parks and call</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">   centres</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node=""> Subdivision E-4 Telephone exchanges</span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node=""> Subdivision E-5 Broadcasting stations, T.V. stations and air traffic control towers</span><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">fGROUP F MERCANTILE BUILDINGS</span></p><p data-dcnode-id="2562"><span data-dcnode-id="2569" instrument_node=""> Subdivision F-1 Shops, stores, departmental stores, markets (any with covered area up to 500 m2)</span><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node=""> Subdivision F-2 Shops, stores, departmental stores, markets (any with covered area more than 500m2)</span><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node=""> Subdivision F-3 Underground shopping centres</span><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">fGROUP G INDUSTRIAL BUILDINGS</span></p><p data-dcnode-id="2561"></p><h2 data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node=""> Subdivision G-1 Buildings used for low hazard industries</span></h2><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node=""> Subdivision G-2 Buildings used for moderate hazard industries</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node=""> Subdivision G-3 Buildings used for high hazard industries</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">fGROUP H STORAGE BUILDINGS</span><p data-dcnode-id="2552"></p><p data-dcnode-id="2540"><span data-dcnode-id="2551" instrument_node=""> These shall include any building or part of a building used primarily for the storage or sheltering (including</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">   servicing, processing or repairs incidental to storage) of goods, ware or merchandise (except those that involve</span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">   highly combustible or explosive products or materials), vehicles or animals, for example, warehouses, cold</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">   storages, freight depots, transit sheds, storehouses, truck and marine terminals, garages, hangars, grain elevators,</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">   barns and stables.</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">fGROUP J HAZARDOUS BUILDINGS</span></p><p data-dcnode-id="2524"><span data-dcnode-id="2539" instrument_node=""> storage, under pressure of more than 0.1N/mm2 and in quantities exceeding 70 m3, of acetylene, hydrogen,</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">   illuminating and natural gases, ammonia, chlorine, phosgene, sulphur dioxide, carbon dioxide, methyl oxide and</span><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">   all gases subject to explosion, fume or toxic hazard, cryogenic gases, etc;</span><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node=""> storage and handling of hazardous and highly flammable liquids, liquefiable gases like LPG, rocket propellants,</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">   etc;</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node=""> storage and handling of hazardous and highly flammable or explosive materials (other than liquids); and</span><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node=""> manufacture of artificial flowers, synthetic leather, ammunition, explosives and fireworks.</span><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">fFIRE ZONES – USED FOR LAND DEVELOPMENT PLAN</span></p><p data-dcnode-id="2504"><span data-dcnode-id="2523" instrument_node=""> Fire Zone No. 1 This shall comprise areas having residential (Group A), educational (Group B), institutional</span><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">   (Group C), assembly (Group D), small business (Subdivision E-1) and mercantile (Group F) buildings, or areas</span><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">   which are under development for such occupancies.</span><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node=""> Fire Zone No. 2 This shall comprise business (Subdivisions E-2 to E-5) and industrial buildings (Subdivisions G-</span><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">   1 and G-2), except high hazard industrial buildings (Subdivision G-3) or areas which are under development for</span><br data-dcnode-id="2514"><span data-dcnode-id="2513" instrument_node="">   such occupancies.</span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node=""> Fire Zone No. 3 This shall comprise areas having high hazard industrial buildings (Subdivision G-3), storage</span><br data-dcnode-id="2510"><span data-dcnode-id="2509" instrument_node="">   buildings (Group H) and buildings for hazardous uses (Group J) or areas which are under development for such</span><br data-dcnode-id="2508"><span data-dcnode-id="2507" instrument_node="">   occupancies.</span><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">fTYPES OF CONSTRUCTION</span></p><p data-dcnode-id="2503"></p><h2 data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node=""> Buildings erected in Fire Zone No. 1 shall conform to construction of Type 1, 2, 3 or 4.</span></h2><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node=""> Buildings erected in Fire Zone No. 2 shall conform to construction of Type 1, 2 or 3.</span><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node=""> Buildings erected in Fire Zone No. 3 shall conform to construction of Type 1 or 2.</span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">ffffffFIRE LOAD</span><p data-dcnode-id="2494"></p><p data-dcnode-id="2482"><span data-dcnode-id="2493" instrument_node=""> Quantity of heat liberated per unit area when a building and its contents are completely burnt.</span><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node=""> All occupancies/buildings, etc. can be graded according to their fire hazard and are to be provided for with</span><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">   suitable fire precautions on the basis of the fire load.</span><br data-dcnode-id="2488"><span data-dcnode-id="2487" instrument_node=""> Hence, grading of buildings according to both fire load and fire resistance can be made. The formula for</span><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">   calculating fire load is as stated.</span><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">fCALORIFIC VALUE</span></p><p data-dcnode-id="2481"></p><h2 data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Natural gas      12500 kcal/kg</span></h2><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">Propane-butane   11950 kcal/kg</span><br data-dcnode-id="2476"><span data-dcnode-id="2475" instrument_node="">Disel            10000 kcal/kg</span><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node="">Fuel oil         9520 kcal/kg</span><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">Brown coal       3500 kcal/kg</span><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">Woods            2500 kcal/kg</span><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">fHAZARD CLASSIFICATION BASED ON FIRE LOAD</span><p data-dcnode-id="2466"></p><p data-dcnode-id="2465"></p><h2 data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">            FIRE LOAD                 HAZARD CATEGORY</span></h2><p data-dcnode-id="2462"></p><p data-dcnode-id="2461"></p><h2 data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">      0 to 2,75,000 kcal/sq.mtr          Low Fire Hazard</span></h2><p data-dcnode-id="2458"></p><p data-dcnode-id="2457"></p><h2 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">   2,75,000 to 5,50,000 kcal/sq.mtr    Moderate Fire Hazard</span></h2><p data-dcnode-id="2454"></p><p data-dcnode-id="2453"></p><h2 data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">  5,50,000 to 11,00,000 kcal/sq.mtr     High Fire Hazard A</span></h2><p data-dcnode-id="2450"></p><p data-dcnode-id="2449"></p><h2 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">    Above 11,00,000 kcal/sq.mtr         High Fire Hazard B</span></h2><br data-dcnode-id="2446"><span data-dcnode-id="2445" instrument_node="">fFIRE GRADING OF STRUCTURES</span><p data-dcnode-id="2444"></p><p data-dcnode-id="2443"></p><h2 data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node=""> Grade 1…………………… 6 hours – High B</span></h2><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node=""> Grade 2…………………… 4 hours – High A</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node=""> Grade 3…………………… 2 hours – Moderate</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node=""> Grade 4…………………… 1 hours – Low</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node=""> Grade 5…………………… 0.5 hours – Low</span><br data-dcnode-id="2432"><span data-dcnode-id="2431" instrument_node="">fffHISTORY OF FIRE SPRINKLERS</span><p data-dcnode-id="2430"></p><p data-dcnode-id="2420"><span data-dcnode-id="2429" instrument_node=""> Officially developed and used by Henry Parmalee in 1874 to protect his piano factory.</span><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node=""> Used clay and wood pipes with holes drilled into them.</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node=""> A tank on the roof of the structure was drained during a fire and released the water into the pipes.</span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node=""> Winter was a problem and making sure someone was always watching .</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">fHISTORY OF FIRE SPRINKLERS</span></p><p data-dcnode-id="2406"><span data-dcnode-id="2419" instrument_node=""> 1806 -John Carey designs a system of perforated pipes, plungers, and burning strings.</span><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node=""> 1812 -Colonel William Congreve designs perforated pipes with valves.</span><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node=""> 1875 -Parmelee invents the first modern sprinkler. It consists of shell and soldered brass cap.</span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node=""> 1882 -Grinnell invents an improved sprinkler that can withstand higher pressures and distributes water more</span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">   evenly.</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node=""> 1896 -N.F.P.A. is officially formed and publishes codes for automatic sprinkler installation.</span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">ffTYPES OF SPRINKLER SYSTEM</span></p><p data-dcnode-id="2405"></p><h2 data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node=""> Wet Sprinkler System</span></h2><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node=""> Dry Sprinkler System</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node=""> Deluge Sprinkler System</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node=""> Pre-Action Sprinkler System</span><br data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">f             OS&amp;Y-Outside Stem and Yoke</span><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node=""> PARTS OF    PIV-Post Indicator Valve</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">SPRINKLER    Main Control Valve-Controls water for whole system</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">  SYSTEM     Main Drain-Drains System</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">             Inspector Test-Tests system</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">             Alarms-Water flow or Air Alarms</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">fWET SYSTEM</span><p data-dcnode-id="2382"></p><p data-dcnode-id="2381"></p><h2 data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node=""> Water is always in branch lines and at the sprinkler heads</span></h2><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node=""> Wet Systems cannot be in areas that may freeze</span><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node=""> Water pressure must always be maintained</span><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node=""> Water Pumps are put in place to keep water pressure at a certain PSI</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node=""> There is no delay in time that water is put on the fire</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node=""> Require the least amount of maintenance</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">fDRY SYSTEM</span><p data-dcnode-id="2366"></p><p data-dcnode-id="2365"></p><h2 data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node=""> Require Air Pressure instead of water in the Branch Lines.</span></h2><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node=""> The Air Pressure holds down a Clapper Valve, so that water can not be introduced into the system, unless the air</span><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">   pressure is lost</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node=""> Used in areas that may freeze.</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node=""> An air compressor keeps a constant pressure in the system.</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node=""> When a Fire releases a sprinkler head, the air is released from the piping, and stops holding down the valve that was</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">   holding the water back, and water is released.</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node=""> Standpipes are used in stairwells to have a water way established for hand lines.</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node=""> These systems have a high maintenance cost, due to corrosion in the pipe with only air, and a little bit of water.</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node=""> Might take up to 60 seconds to get water on the fire, depending on how big the system is.</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">fDELUGE VALVE SYSTEM</span><p data-dcnode-id="2342"></p><p data-dcnode-id="2341"></p><h2 data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node=""> Deluge Valves are used in special areas</span></h2><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node=""> Sprinkler heads are always open</span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node=""> Used in High Hazard areas</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node=""> Deluge Valve opens during a smoke or heat detection</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node=""> Deluge systems are needed where high velocity suppression is</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">   necessary to prevent fire spread</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">fPRE ACTION SYSTEM</span><p data-dcnode-id="2326"></p><p data-dcnode-id="2325"></p><h2 data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node=""> Same as a Dry System</span></h2><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node=""> Water is held back by an electronically operated valve</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node=""> Two things need to happen before water is released</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node=""> The detection system must identify that there is a problem with smoke or flame</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node=""> Water is then released into the piping</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node=""> Secondly the sprinkler heads must be activated and</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">fTYPES OF SPRINKLER HEADS</span><p data-dcnode-id="2310"></p><p data-dcnode-id="2300"><span data-dcnode-id="2309" instrument_node=""> Pendants</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node=""> Uprights</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node=""> Sidewalls</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node=""> Special Coverage</span><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">fPENDENT HEAD</span></p><p data-dcnode-id="2299"></p><h2 data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">                Most common head</span></h2><br data-dcnode-id="2296"><span data-dcnode-id="2295" instrument_node="">                Extends down from a ceiling</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">                Sprinkler sprays a stream downward onto a deflector</span><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">fUPRIGHT HEAD</span><p data-dcnode-id="2290"></p><p data-dcnode-id="2289"></p><h2 data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">                Sits on top of the piping</span></h2><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">                Sprays water up towards the deflector</span><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">                Can not be used as a pendant</span><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">fSIDEWALL HEAD</span><p data-dcnode-id="2280"></p><p data-dcnode-id="2279"></p><h2 data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">                 Comes out of a wall to protect
