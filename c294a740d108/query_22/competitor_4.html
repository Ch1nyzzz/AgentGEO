</span><h2 data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Transformer Fire Protection</span></h2><span data-dcnode-id="1327" instrument_node=""> </span><article class="question" data-dcnode-id="1253" id="post-7681554" itemscope="" itemtype="http://schema.org/Question"><h2 data-dcnode-id="1325" itemprop="name"><span data-dcnode-id="1326" instrument_node="">Transformer Fire Protection</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><header data-dcnode-id="1308"><span data-dcnode-id="1323" instrument_node="">
</span><cite data-dcnode-id="1316" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1320" itemprop="name"><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DMechProjectEng"><span data-dcnode-id="1322" instrument_node="">MechProjectEng</span></a></span><span data-dcnode-id="1319" instrument_node=""> </span><span class="usertype" data-dcnode-id="1317" itemprop="jobTitle"><span data-dcnode-id="1318" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="1315" instrument_node="">
</span><div class="op" data-dcnode-id="1313" title="MechProjectEng is the OP (Original Poster) of this thread"><span data-dcnode-id="1314" instrument_node="">(OP)</span></div><span data-dcnode-id="1312" instrument_node="">
</span><time data-dcnode-id="1310" datetime="2012-10-18 02:12:56" itemprop="dateCreated"><span data-dcnode-id="1311" instrument_node="">18 Oct 12 02:12</span></time><span data-dcnode-id="1309" instrument_node="">
</span></header><span data-dcnode-id="1307" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="1255" itemprop="text"><span data-dcnode-id="1306" instrument_node="">Hi all,</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">
</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
Hoping for some advice:</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
We have a recently constructed substation. The substation is a stand alone and unmanned building consisting of 3 rooms: HV Switchgear Room, LV Switchgear Room and Transformer Room. Overal size of substation is 25m x 10m. Concrete frame building.</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
Two walls of the transformer room are exterior walls of the substation. These walls have cluster block/air brick blockwork, and the doors to exterior are wire mesh gates. I.e. the transformer rooms are naturally ventilated, and are effectively open to the external environment. The other two walls (between transformer room and HV/LV switchgear rooms) have 2 hour fire resistance, and there is also a concrete roof slab overhead.</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
</span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">
The transformer room houses two (2) 1250kVA transformers and one 2500kV transformer. All are oil filled with mineral oil. There are no separation walls between the transformers.</span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
</span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">
It seems our designer had not fully considered the code requirements, and as the substation has already been constructed, our AHJ has provided us with the following options:</span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
-Add a deluge system.</span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">
-Replace the mineral oil with an approved 'less flammable' oil.</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">
</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
Both options are problematic for us. </span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">
</span><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">
The deluge system option has a fairly major problem of drainage, due to some cable trenches which link the transformer room to the switchgear rooms, which would be practically very difficult to seal to prevent flooding.</span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">
</span><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">
The implication of changing the transformer oil is that the transformers may have to be de-rated, having electrical implications on our process, and the other problem is that the transformers apparently have to be shipped back to the factory (overseas) to have the oil replaced and be re-tested.</span><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">
</span><br data-dcnode-id="1265"><span data-dcnode-id="1264" instrument_node="">
I would appreciate any comments you may have, including:</span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node="">
-The code requirements for our particular type of installation; stand alone substation, unmanned etc. Does the code actually require a deluge system in this situation?</span><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">
-Does anyone have any alternative options/ideas which we could discuss with our AHJ.</span><br data-dcnode-id="1259"><span data-dcnode-id="1258" instrument_node="">
</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
Thanks in advance. </span></div><span data-dcnode-id="1254" instrument_node="">
</span></article><div class="gAdScript" data-dcnode-id="1231"><span data-dcnode-id="1252" instrument_node="">

</span><header data-dcnode-id="1213"><span data-dcnode-id="1225" instrument_node="">
</span><cite data-dcnode-id="1218" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1222" itemprop="name"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="1224" instrument_node="">cdafd</span></a></span><span data-dcnode-id="1221" instrument_node=""> </span><span class="usertype" data-dcnode-id="1219" itemprop="jobTitle"><span data-dcnode-id="1220" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="1217" instrument_node="">
</span><time data-dcnode-id="1215" datetime="2012-10-18 07:56:14" itemprop="dateCreated"><span data-dcnode-id="1216" instrument_node="">18 Oct 12 07:56</span></time><span data-dcnode-id="1214" instrument_node="">
</span></header><span data-dcnode-id="1212" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="1206" itemprop="text"><span data-dcnode-id="1211" instrument_node="">Did they give you a code section requiring protection int the first place???</span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">
</span><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">
If so what book, section, edition???? </span></div><span data-dcnode-id="1205" instrument_node="">
</span></article><span data-dcnode-id="1203" instrument_node=""> </span><article class="answer" data-dcnode-id="1179" id="post-7681643" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="1201" itemprop="name"><span data-dcnode-id="1202" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="1200" instrument_node="">
</span><header data-dcnode-id="1184"><span data-dcnode-id="1199" instrument_node="">
</span><cite data-dcnode-id="1192" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1196" itemprop="name"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DMechProjectEng"><span data-dcnode-id="1198" instrument_node="">MechProjectEng</span></a></span><span data-dcnode-id="1195" instrument_node=""> </span><span class="usertype" data-dcnode-id="1193" itemprop="jobTitle"><span data-dcnode-id="1194" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="1191" instrument_node="">
</span><div class="op" data-dcnode-id="1189" title="MechProjectEng is the OP (Original Poster) of this thread"><span data-dcnode-id="1190" instrument_node="">(OP)</span></div><span data-dcnode-id="1188" instrument_node="">
</span><time data-dcnode-id="1186" datetime="2012-10-18 08:04:45" itemprop="dateCreated"><span data-dcnode-id="1187" instrument_node="">18 Oct 12 08:04</span></time><span data-dcnode-id="1185" instrument_node="">
</span></header><span data-dcnode-id="1183" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="1181" itemprop="text"><span data-dcnode-id="1182" instrument_node="">I have been referred to NFPA 70 450.26 which talks about oil filled transformers installed indoors. Yet it is unclear to me what aspects are applicable in our situation, where we have an unmanned stand alone substaiton. </span></div><span data-dcnode-id="1180" instrument_node="">
</span></article><span data-dcnode-id="1178" instrument_node=""> </span><article class="answer odd" data-dcnode-id="1067" id="post-7681677" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="1176" itemprop="name"><span data-dcnode-id="1177" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="1175" instrument_node="">
</span><header data-dcnode-id="1162"><span data-dcnode-id="1174" instrument_node="">
</span><cite data-dcnode-id="1167" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1171" itemprop="name"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="1173" instrument_node="">cdafd</span></a></span><span data-dcnode-id="1170" instrument_node=""> </span><span class="usertype" data-dcnode-id="1168" itemprop="jobTitle"><span data-dcnode-id="1169" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="1166" instrument_node="">
</span><time data-dcnode-id="1164" datetime="2012-10-18 09:18:16" itemprop="dateCreated"><span data-dcnode-id="1165" instrument_node="">18 Oct 12 09:18</span></time><span data-dcnode-id="1163" instrument_node="">
</span></header><span data-dcnode-id="1161" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="1069" itemprop="text"><span data-dcnode-id="1160" instrument_node="">82 x 32  2,624 sq ft and they want fire protection???</span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">
are the buildings there more for weather protection than anything????</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
</span><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">
</span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">
not sure what edition of 70 they are using, from 2011 edition</span><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
</span><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">
</span><br data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">
</span><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">
450.26 Oil-Insulated Transformers Installed Indoors.Oil-insulated transformers installed indoors shall be installed in a vault constructed as specified in Part III of this article. </span><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">
</span><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">
</span><br data-dcnode-id="1137"><span data-dcnode-id="1136" instrument_node="">
Exception No. 1: Where the total capacity does not exceed 112 1/2 kVA, the vault specified in Part III of this article shall be permitted to be constructed of reinforced concrete that is not less than 100 mm (4 in.) thick.</span><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">
</span><br data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">
</span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node="">
</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
Exception No. 2: Where the nominal voltage does not exceed 600, a vault shall not be required if suitable arrangements are made to prevent a transformer oil fire from igniting other materials and the total capacity in one location does not exceed 10 kVA in a section of the building classified as combustible or 75 kVA where the surrounding structure is classified as fire-resistant construction.</span><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
Exception No. 3: Electric furnace transformers that have a total rating not exceeding 75 kVA shall be permitted to be installed without a vault in a building or room of fire-resistant construction, provided suitable arrangements are made to prevent a transformer oil fire from spreading to other combustible material.</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">
Exception No. 4: A transformer that has a total rating not exceeding 75 kVA and a supply voltage of 600 volts or less that is an integral part of charged-particle-accelerating equipment shall be permitted to be installed without a vault in a building or room of noncombustible or fire-resistant construction, provided suitable arrangements are made to prevent a transformer oil fire from spreading to other combustible material.</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
</span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">
</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
Exception No. 5: Transformers shall be permitted to be installed in a detached building that does not comply with Part III of this article if neither the building nor its contents present a fire hazard to any other building or property, and if the building is used only in supplying electric service and the interior is accessible only to qualified persons.</span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
</span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
</span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">
Exception No. 6: Oil-insulated transformers shall be permitted to be used without a vault in portable and mobile surface mining equipment (such as electric excavators) if each of the following conditions is met: </span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">
</span><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">
</span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
(a)</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">
Provision is made for draining leaking fluid to the ground. </span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">
</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
(b)</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
Safe egress is provided for personnel.</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
(c)</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
A minimum 6-mm ( 1/4-in.) steel barrier is provided for personnel protection.</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span></article><span data-dcnode-id="1066" instrument_node=""> </span><article class="answer" data-dcnode-id="1012" id="post-7681680" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="1064" itemprop="name"><span data-dcnode-id="1065" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="1063" instrument_node="">

</span><time data-dcnode-id="1049" datetime="2012-10-18 09:24:04" itemprop="dateCreated"><span data-dcnode-id="1050" instrument_node="">18 Oct 12 09:24</span></time><span data-dcnode-id="1048" instrument_node="">

</span><div class="tgml wordwrap" data-dcnode-id="1014" itemprop="text"><span data-dcnode-id="1045" instrument_node="">Thanks cdafd,</span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">
</span><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">
Yes, AHJ asking for fire protection for this size of unmanned building.</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">

Yes, this is one of the clauses. </span><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">
</span><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">
I tried to argue that we could use exception  No.5 as we have a detached substaion building. But the AHJ argued that this is not a deached building as the HV and LV switchgear rooms are in the same building.</span><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">

Yes, for the transformer room, the roof and walls are only for weather protection.</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">
</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">

</span></article><span data-dcnode-id="1011" instrument_node=""> </span><article class="answer odd" data-dcnode-id="986" id="post-7681714" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="1009" itemprop="name"><span data-dcnode-id="1010" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="1008" instrument_node="">
</span><header data-dcnode-id="995"><span data-dcnode-id="1007" instrument_node="">
</span><cite data-dcnode-id="1000" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="1004" itemprop="name"><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstookeyfpe"><span data-dcnode-id="1006" instrument_node="">stookeyfpe</span></a></span><span data-dcnode-id="1003" instrument_node=""> </span><span class="usertype" data-dcnode-id="1001" itemprop="jobTitle"><span data-dcnode-id="1002" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="999" instrument_node="">
</span><time data-dcnode-id="997" datetime="2012-10-18 10:17:22" itemprop="dateCreated"><span data-dcnode-id="998" instrument_node="">18 Oct 12 10:17</span></time><span data-dcnode-id="996" instrument_node="">
</span></header><span data-dcnode-id="994" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="988" itemprop="text"><span data-dcnode-id="993" instrument_node="">I'm unsure where you are but in my state utility transformers are under the authority of the State Public Utility Commission. We have high-rise buildings in my town with large vaults with no sprinkler protection. In fact, neither the owner or firefighters have keys to these rooms.</span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">
</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">
Your governmental authority over utility power systems may take precedence over the community's fire code. </span></div><span data-dcnode-id="987" instrument_node="">
</span></article><span data-dcnode-id="985" instrument_node=""> </span><article class="answer" data-dcnode-id="900" id="post-7681812" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="983" itemprop="name"><span data-dcnode-id="984" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="982" instrument_node="">
</span><header data-dcnode-id="969"><span data-dcnode-id="981" instrument_node="">
</span><cite data-dcnode-id="974" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="978" itemprop="name"><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="980" instrument_node="">cdafd</span></a></span><span data-dcnode-id="977" instrument_node=""> </span><span class="usertype" data-dcnode-id="975" itemprop="jobTitle"><span data-dcnode-id="976" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="973" instrument_node="">
</span><time data-dcnode-id="971" datetime="2012-10-18 12:38:58" itemprop="dateCreated"><span data-dcnode-id="972" instrument_node="">18 Oct 12 12:38</span></time><span data-dcnode-id="970" instrument_node="">
</span></header><span data-dcnode-id="968" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="902" itemprop="text"><span data-dcnode-id="967" instrument_node="">what Stookey said!!!</span><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">
also out of the international fire code:::</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">
</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
903.3.1.1 NFPA 13 sprinkler systems. Where the provisions</span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">
of this code require that a building or portion</span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">
thereof be equipped throughout with an automatic sprinkler</span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
system in accordance with this section, sprinklers</span><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">
shall be installed throughout in accordance with NFPA</span><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
13 except as provided in Section 903.3.1.1.1.</span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
903.3.1.1.1 Exempt locations. Automatic sprinklers</span><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">
shall not be required in the following rooms or areas</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
where such rooms or areas are protected with an</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
approved automatic fire detection system in accordance</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
with Section 907.2 that will respond to visible</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
or invisible particles of combustion. Sprinklers shall</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
not be omitted from any room merely because it is</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
damp, of fire-resistance rated construction or contains</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
electrical equipment.</span><br data-dcnode-id="930"><span data-dcnode-id="929" instrument_node="">
1. Any room where the application of water, or</span><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">
flame and water, constitutes a serious life or fire</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">
hazard.</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
2. Any room or space where sprinklers are considered</span><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">
undesirable because of the nature of the</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
contents, when approved by the fire code official.</span><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">
3. Generator and transformer rooms separated</span><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">
from the remainder of the building by walls and</span><br data-dcnode-id="914"><span data-dcnode-id="913" instrument_node="">
floor/ceiling or roof/ceiling assemblies having</span><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">
a fire-resistance rating of not less than 2 hours.</span><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">
4. Rooms or areas that are of noncombustible constructionwith</span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">
wholly noncombustible contents.</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">
5. Fire service access elevator machine rooms and</span><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">
machinery spaces. </span></div><span data-dcnode-id="901" instrument_node="">
</span></article><span data-dcnode-id="899" instrument_node=""> </span><article class="answer odd" data-dcnode-id="864" id="post-7682034" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="897" itemprop="name"><span data-dcnode-id="898" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="896" instrument_node="">
</span><header data-dcnode-id="883"><span data-dcnode-id="895" instrument_node="">
</span><cite data-dcnode-id="888" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="892" itemprop="name"><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DSdpaddler50"><span data-dcnode-id="894" instrument_node="">Sdpaddler50</span></a></span><span data-dcnode-id="891" instrument_node=""> </span><span class="usertype" data-dcnode-id="889" itemprop="jobTitle"><span data-dcnode-id="890" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="887" instrument_node="">
</span><time data-dcnode-id="885" datetime="2012-10-18 19:33:51" itemprop="dateCreated"><span data-dcnode-id="886" instrument_node="">18 Oct 12 19:33</span></time><span data-dcnode-id="884" instrument_node="">
</span></header><span data-dcnode-id="882" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="866" itemprop="text"><span data-dcnode-id="881" instrument_node="">Transformer fires can be a beast when large amounts of hydrocarbon based oil are present. Arcing faults within the coils literally cause an explosion of burning oil when these things blow. Its a real threat. On the other hand, sounds like you have a relatively low value, stand alone vault, so I do understand the arguement you are making.</span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">
</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
Couple comments: </span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
-Retrofitting with a less flam oil, like FM approved fluid is very difficult for electrical compatibility reasons. Great idea for new installations, but I have never heard of it being done on a retro basis. </span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
-Sprinklers are a good protection choice (when needed). Typical wet, closed head systems are often sufficient. Deluge systems are generally used for the very large units, 4160V, and often these are outside so you dont have the drainage issues.</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
-If push comes to shove, another option you could consider if this is a normally unocuppied space is Co2. With the required pre-discharge warnings, etc, (as outlined in NFPA 12 if i remember correctly) this can be effective. It is even used on very large arc furnace transformers (AFT's) in steel mills. The AFT is normally in an unmanned, concrete vault, so CO2 is viable. Yes, sprinklers/water is the best solution, but C02 is an option.</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">
</span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span></article><span data-dcnode-id="863" instrument_node=""> </span><article class="answer" data-dcnode-id="838" id="post-7682042" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="861" itemprop="name"><span data-dcnode-id="862" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="860" instrument_node="">
</span><header data-dcnode-id="847"><span data-dcnode-id="859" instrument_node="">
</span><cite data-dcnode-id="852" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="856" itemprop="name"><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="858" instrument_node="">cdafd</span></a></span><span data-dcnode-id="855" instrument_node=""> </span><span class="usertype" data-dcnode-id="853" itemprop="jobTitle"><span data-dcnode-id="854" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="851" instrument_node="">
</span><time data-dcnode-id="849" datetime="2012-10-18 20:08:46" itemprop="dateCreated"><span data-dcnode-id="850" instrument_node="">18 Oct 12 20:08</span></time><span data-dcnode-id="848" instrument_node="">
</span></header><span data-dcnode-id="846" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="840" itemprop="text"><span data-dcnode-id="845" instrument_node="">The op indicates the room is not enclosed</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
The building is just there for weather protection. </span></div><span data-dcnode-id="839" instrument_node="">
</span></article><span data-dcnode-id="837" instrument_node=""> </span><article class="answer odd" data-dcnode-id="812" id="post-7682045" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="835" itemprop="name"><span data-dcnode-id="836" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="834" instrument_node="">
</span><header data-dcnode-id="821"><span data-dcnode-id="833" instrument_node="">
</span><cite data-dcnode-id="826" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="830" itemprop="name"><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="832" instrument_node="">cdafd</span></a></span><span data-dcnode-id="829" instrument_node=""> </span><span class="usertype" data-dcnode-id="827" itemprop="jobTitle"><span data-dcnode-id="828" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="825" instrument_node="">
</span><time data-dcnode-id="823" datetime="2012-10-18 20:14:11" itemprop="dateCreated"><span data-dcnode-id="824" instrument_node="">18 Oct 12 20:14</span></time><span data-dcnode-id="822" instrument_node="">
</span></header><span data-dcnode-id="820" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="814" itemprop="text"><span data-dcnode-id="819" instrument_node="">This is out of the international fire code the chapter dealing with hazardous materials</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
2704.13 Weather protection. Where overhead noncombustible construction is provided for sheltering outdoor hazardous material storage areas, such storage shall not be considered indoor storage when the area is constructed in accordance with the requirements for weather protection as required by the International Building Code.  </span></div><span data-dcnode-id="813" instrument_node="">
</span></article><span data-dcnode-id="811" instrument_node=""> </span><article class="answer" data-dcnode-id="790" id="post-7682526" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="809" itemprop="name"><span data-dcnode-id="810" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="808" instrument_node="">
</span><header data-dcnode-id="795"><span data-dcnode-id="807" instrument_node="">
</span><cite data-dcnode-id="800" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="804" itemprop="name"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstookeyfpe"><span data-dcnode-id="806" instrument_node="">stookeyfpe</span></a></span><span data-dcnode-id="803" instrument_node=""> </span><span class="usertype" data-dcnode-id="801" itemprop="jobTitle"><span data-dcnode-id="802" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="799" instrument_node="">
</span><time data-dcnode-id="797" datetime="2012-10-20 00:41:20" itemprop="dateCreated"><span data-dcnode-id="798" instrument_node="">20 Oct 12 00:41</span></time><span data-dcnode-id="796" instrument_node="">
</span></header><span data-dcnode-id="794" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="792" itemprop="text"><span data-dcnode-id="793" instrument_node="">The original poster hasn't responded so we've given him/her everything she/he needs.  </span></div><span data-dcnode-id="791" instrument_node="">
</span></article><span data-dcnode-id="789" instrument_node=""> </span><article class="answer odd" data-dcnode-id="757" id="post-7682646" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="787" itemprop="name"><span data-dcnode-id="788" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="786" instrument_node="">
</span><header data-dcnode-id="770"><span data-dcnode-id="785" instrument_node="">
</span><cite data-dcnode-id="778" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="782" itemprop="name"><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DMechProjectEng"><span data-dcnode-id="784" instrument_node="">MechProjectEng</span></a></span><span data-dcnode-id="781" instrument_node=""> </span><span class="usertype" data-dcnode-id="779" itemprop="jobTitle"><span data-dcnode-id="780" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="777" instrument_node="">
</span><div class="op" data-dcnode-id="775" title="MechProjectEng is the OP (Original Poster) of this thread"><span data-dcnode-id="776" instrument_node="">(OP)</span></div><span data-dcnode-id="774" instrument_node="">
</span><time data-dcnode-id="772" datetime="2012-10-21 00:30:11" itemprop="dateCreated"><span data-dcnode-id="773" instrument_node="">21 Oct 12 00:30</span></time><span data-dcnode-id="771" instrument_node="">
</span></header><span data-dcnode-id="769" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="759" itemprop="text"><span data-dcnode-id="768" instrument_node="">Stookey: Thanks. I'm based in the middle east, not in the US, and the authority does fall with our AHJ in our case.</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
cdafd:Internatinoal Fire Code 903.3.1.1.1 - Exception 4 may be applicable to us.  2704.13 Weather protection - Will also investigate this avenue as to whether it can be reasoned that the area is 'outdoor'.</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
sdpaddler: Thanks for the advice and other options for consideration. A wet closed head sprinkler system may well be a good compromise with our AHJ (if needed). This would alleviate our drainge problem.  CO2 will not work in our case as the room is open to exterior (wire mesh gates and clusterblock walls).  </span></div><span data-dcnode-id="758" instrument_node="">

</span><cite data-dcnode-id="719" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="723" itemprop="name"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DMechProjectEng"><span data-dcnode-id="725" instrument_node="">MechProjectEng</span></a></span><span data-dcnode-id="722" instrument_node=""> </span><span class="usertype" data-dcnode-id="720" itemprop="jobTitle"><span data-dcnode-id="721" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="718" instrument_node="">

</span><header data-dcnode-id="689"><span data-dcnode-id="701" instrument_node="">
</span><cite data-dcnode-id="694" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="698" itemprop="name"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="700" instrument_node="">cdafd</span></a></span><span data-dcnode-id="697" instrument_node=""> </span><span class="usertype" data-dcnode-id="695" itemprop="jobTitle"><span data-dcnode-id="696" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="693" instrument_node="">
</span><time data-dcnode-id="691" datetime="2012-10-21 16:49:22" itemprop="dateCreated"><span data-dcnode-id="692" instrument_node="">21 Oct 12 16:49</span></time><span data-dcnode-id="690" instrument_node="">
</span></header><span data-dcnode-id="688" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="686" itemprop="text"><span data-dcnode-id="687" instrument_node="">Do other fairly new set ups like this have fire protection systems installed, around your area????? </span></div><span data-dcnode-id="685" instrument_node="">
</span></article><span data-dcnode-id="683" instrument_node=""> </span><article class="answer odd" data-dcnode-id="662" id="post-7682772" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="681" itemprop="name"><span data-dcnode-id="682" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="680" instrument_node="">
</span><header data-dcnode-id="667"><span data-dcnode-id="679" instrument_node="">
</span><cite data-dcnode-id="672" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="676" itemprop="name"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dchicopee"><span data-dcnode-id="678" instrument_node="">chicopee</span></a></span><span data-dcnode-id="675" instrument_node=""> </span><span class="usertype" data-dcnode-id="673" itemprop="jobTitle"><span data-dcnode-id="674" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="671" instrument_node="">
</span><time data-dcnode-id="669" datetime="2012-10-21 18:23:13" itemprop="dateCreated"><span data-dcnode-id="670" instrument_node="">21 Oct 12 18:23</span></time><span data-dcnode-id="668" instrument_node="">
</span></header><span data-dcnode-id="666" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="664" itemprop="text"><span data-dcnode-id="665" instrument_node="">If fire protection is a must, then have a chemical extinguishing system instead of water; basically a system simular to automatic chemical extinguishing systems covering fryolators and grills in commercial cooking facilty. </span></div><span data-dcnode-id="663" instrument_node="">
</span></article><span data-dcnode-id="661" instrument_node=""> </span><article class="answer" data-dcnode-id="633" id="post-7682861" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="659" itemprop="name"><span data-dcnode-id="660" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="658" instrument_node="">
</span><header data-dcnode-id="642"><span data-dcnode-id="657" instrument_node="">
</span><cite data-dcnode-id="650" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="654" itemprop="name"><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DMechProjectEng"><span data-dcnode-id="656" instrument_node="">MechProjectEng</span></a></span><span data-dcnode-id="653" instrument_node=""> </span><span class="usertype" data-dcnode-id="651" itemprop="jobTitle"><span data-dcnode-id="652" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="649" instrument_node="">
</span><div class="op" data-dcnode-id="647" title="MechProjectEng is the OP (Original Poster) of this thread"><span data-dcnode-id="648" instrument_node="">(OP)</span></div><span data-dcnode-id="646" instrument_node="">
</span><time data-dcnode-id="644" datetime="2012-10-22 04:20:19" itemprop="dateCreated"><span data-dcnode-id="645" instrument_node="">22 Oct 12 04:20</span></time><span data-dcnode-id="643" instrument_node="">
</span></header><span data-dcnode-id="641" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="635" itemprop="text"><span data-dcnode-id="640" instrument_node="">cdafd: Most other oil filled installations in the area are installed outdoors in fenced compounds. Some (typically larger) installations are equipped with deluge systems, but not all.</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
chicopee:  Thanks, I will look into chemical extinguishing. I don't know much about this. </span></div><span data-dcnode-id="634" instrument_node="">
</span></article><span data-dcnode-id="632" instrument_node=""> </span><article class="answer odd" data-dcnode-id="611" id="post-7683094" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="630" itemprop="name"><span data-dcnode-id="631" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="629" instrument_node="">
</span><header data-dcnode-id="616"><span data-dcnode-id="628" instrument_node="">
</span><cite data-dcnode-id="621" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="625" itemprop="name"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DSdpaddler50"><span data-dcnode-id="627" instrument_node="">Sdpaddler50</span></a></span><span data-dcnode-id="624" instrument_node=""> </span><span class="usertype" data-dcnode-id="622" itemprop="jobTitle"><span data-dcnode-id="623" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="620" instrument_node="">
</span><time data-dcnode-id="618" datetime="2012-10-22 12:43:22" itemprop="dateCreated"><span data-dcnode-id="619" instrument_node="">22 Oct 12 12:43</span></time><span data-dcnode-id="617" instrument_node="">
</span></header><span data-dcnode-id="615" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="613" itemprop="text"><span data-dcnode-id="614" instrument_node="">The most common/accepted approach to protect these is water since the hazard is a combustible liquid ; closed wet head system for smaller units, and larger, open head deluge for the big, high voltage systems normally in yard areas. CO2 is also an accepted method, but rarely used. I have never heard of, or seen a dry chemical system. If you are referring to a dry chemical powder type extinguisher, these make a mess when discharged and dont get along with electrical systems very well. For example, a small computer room should have clean agent portable fire extinguishers hanging on the wall, not dry chemical for the same reason. </span></div><span data-dcnode-id="612" instrument_node="">
</span></article><span data-dcnode-id="610" instrument_node=""> </span><article class="answer" data-dcnode-id="585" id="post-7683794" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="608" itemprop="name"><span data-dcnode-id="609" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="607" instrument_node="">
</span><header data-dcnode-id="594"><span data-dcnode-id="606" instrument_node="">
</span><cite data-dcnode-id="599" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="603" itemprop="name"><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstevenal"><span data-dcnode-id="605" instrument_node="">stevenal</span></a></span><span data-dcnode-id="602" instrument_node=""> </span><span class="usertype" data-dcnode-id="600" itemprop="jobTitle"><span data-dcnode-id="601" instrument_node="">(Electrical)</span></span></cite><span data-dcnode-id="598" instrument_node="">
</span><time data-dcnode-id="596" datetime="2012-10-23 16:12:51" itemprop="dateCreated"><span data-dcnode-id="597" instrument_node="">23 Oct 12 16:12</span></time><span data-dcnode-id="595" instrument_node="">
</span></header><span data-dcnode-id="593" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="587" itemprop="text"><span data-dcnode-id="592" instrument_node="">FR3 is less flammable, recommended for retrofilling, and makes tasty fries :) </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spxtransformersolutions.com/assets/documents/S900-20-2FR3fluidretrofillguide-Sept2006CPS_001.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="591" instrument_node="">http://www.spxtransformersolutions.com/assets/docu...</span></a><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
</span></div><span data-dcnode-id="586" instrument_node="">
</span></article><span data-dcnode-id="584" instrument_node=""> </span><article class="answer odd" data-dcnode-id="486" id="post-7684704" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="582" itemprop="name"><span data-dcnode-id="583" instrument_node="">RE: Transformer Fire Protection</span></h3><span data-dcnode-id="581" instrument_node="">
</span><header data-dcnode-id="568"><span data-dcnode-id="580" instrument_node="">
</span><cite data-dcnode-id="573" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="577" itemprop="name"><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DDavidCR"><span data-dcnode-id="579" instrument_node="">DavidCR</span></a></span><span data-dcnode-id="576" instrument_node=""> </span><span class="usertype" data-dcnode-id="574" itemprop="jobTitle"><span data-dcnode-id="575" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="572" instrument_node="">
</span><time data-dcnode-id="570" datetime="2012-10-25 11:02:18" itemprop="dateCreated"><span data-dcnode-id="571" instrument_node="">25 Oct 12 11:02</span></time><span data-dcnode-id="569" instrument_node="">
</span></header><span data-dcnode-id="567" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="488" itemprop="text"><span data-dcnode-id="566" instrument_node="">Hi"mech" and everybody.</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
1.</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">
First, if you already haven´t, I´d recommend you to download IEEE979, IEEE980, and Reclamation´s "Facilities Instructions, Standards, and Techniques Volume 3-32" Transformer Fire Protection (</span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usbr.gov/power/data/fist/fist3_32/fist3-32.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="559" instrument_node="">http://www.usbr.gov/power/data/fist/fist3_32/fist3...</span></a><span data-dcnode-id="557" instrument_node="">) or just Google "reclamation transformer fire protection". Also consider NFPA 850/851. These docs include most of the criteria dealing with oil transformers. Dealing with this the need is not in NEC.</span><br data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">
</span><br data-dcnode-id="554"><span data-dcnode-id="553" instrument_node="">
2.</span><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
If you cannot hold a deluge system water spill, you could be having troubles with oil containment as per IEEE 980. Your AHJ should be giving more importance to oil spill installations, than to deluge system requirement. The deluge system is a relatively useful protection, but good oil containment is a really important difference. And if you cannot accomplish basic oil spill requirements, how will you know if in case of a disaster the insurance company will pay for the losses, or the owner will be issued for operating with a dangerous non standard installation.</span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">
</span><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">
3.</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">
I´m not sure but I think you have not mentioned two important aspects:</span><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">
-Volume of oil. Most deluge system requirements are based on the quantity of oil you have, you decided to operate with the good old mineral oil so you have to take care of it. A point to remember: even transformer oil is a high flash point liquid, in a fire it is sprayed and it is potentially explosive, and releases lots of heat.</span><br data-dcnode-id="542"><span data-dcnode-id="541" instrument_node="">
-Whats nearby, depending on that, I´ll endorse or not any requirement from your AHJ.</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
-The importance of the substation for your company.</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
These aspects will help you to sell the idea of protection investments.</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
4.</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">
Anyway. A deluge system, even it is a directly accepted protection for transformers, is a problem on unmanned facilities: it will go off and nobody stops the water, it has to be tested will actual discharge, etc. "If you cannot test it, how will you know if in case of a disaster the insurance company will pay for the losses".</span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">
If you don´t have water in good quantity and pressure, and you don´t have someone to supervise and maintain the deluge, system, I will say it is not a good recommendation from you AHJ, the standards recommend the deluge system as a useful help to reduce losses but it is not a complete solution.</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
5.</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
Options for active fire protection order of relatively cost, if accepted by your AHJ:</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
- Aerosol dust protection (search for Aero-K, Stat X), small transformers could be a good application for this type of system. In your case you should analyze if this is an option form you.</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
- CO2. But the place should be closed.</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
- Dry chemical.</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
- Water Deluge. Do you have water and pump for this?</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
- CAF foam system.</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">
- Water mist.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">
</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
6.</span><br data-dcnode-id="506"><span data-dcnode-id="505" instrument_node="">
Passive protection. You may ask if your AHJ will have a different position if you invest on good oil containment and good  fire stopping systems. And effective ways to isolate, smoke, flames, spills, heat all around the enclosed area.  </span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">
</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
7.</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
Explosion risk protection. Think of a "Transformer Protector"/SERGI system. Maybe your local AHJ will be happy if you at least you eliminate the risk of a violent fire explosion, some companies give a lot of importance of this type of protection and is referred by NFPA. It is not a general transformer fire protection but a tested protection for arc-fault explosions.</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
8.</span><br data-dcnode-id="494"><span data-dcnode-id="493" instrument_node="">
For the next time: give lots of importance to distances, separations, oil containment. These in general eliminate the need of fire suppression means.</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
Hope this helps. </span></div><span data-dcnode-id="487" instrument_node="">
</span></article><span data-dcnode-id="485" instrument_node=""> </span></section><span data-dcnode-id="483" instrument_node="">
