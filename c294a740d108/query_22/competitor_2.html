</span><h2 class="entry-title" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Firefighter Access</span></h2><span data-dcnode-id="393" instrument_node="">
</span><div class="standard post-477 chapter type-chapter status-web-only hentry" data-dcnode-id="72" id="post-477"><span data-dcnode-id="392" instrument_node="">
</span><div class="entry-content" data-dcnode-id="75"><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><span class="blueBoldTwelve" data-dcnode-id="388"><a data-dcnode-id="390" name="2firefighter"></a><span data-dcnode-id="389" instrument_node="">FIREFIGHTER ACCESS</span></span></p><span data-dcnode-id="386" instrument_node="">
</span><hr data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="381"><span class="blackTen" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Once firefighters have arrived and positioned their apparatus, they must go to work. Some factors affecting their efficiency include: the distance and terrain between the apparatus access and the building; how easily they can enter the building; the building’s interior layout and vertical access (stairs/elevators/roof access); and, how quickly firefighters can locate fire protection features and utilities. The designer can make a positive impact in all of these areas.</span></span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="375"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Site access </span></strong><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">
Firefighters must hand carry all equipment beyond the point where apparatus access ends. Increased distance translates into additional time and effort to set up ladders, hose lines, and other equipment. If the area is easy to negotiate by foot, firefighters can move more quickly. The IFC and NFPA 1 contain requirements for access to building openings, such as approved walkways that lead from the apparatus access points to the entry doors.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Fire department pumpers carry hose lines for attacking fires. These are usually smaller in diameter than the hose lines used to supply water to the pumper from a water source. Many pumpers have one or more hose loads of a fixed length connected into a pump discharge. These are “pre-connected” hose lines, often called simply “preconnects.” Firefighters deploy them rapidly for quick fire attack. However, their useful range is limited by their length, which is generally between 100 and 400 feet. Designers planning unusual designs for their buildings or working with unusual sites should coordinate with the local fire department regarding hose line access unless a standpipe system is provided in the building.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Buildings under construction or renovation pose their own particular concerns to the fire service. Code provisions can be found in the IFC Chapter 14, IBC Chapter 33, NFPA 5000 Chapter 14, and NFPA 241. Designers should consider the accessibility of fire department connections, fire hydrants, and entry points. Some locations may be more likely to be obstructed by construction storage, truck unloading, cranes, phasing of the construction, and security fences. Designers should consider specifying these locations and the location of temporary and permanent fire protection equipment to avoid conflicts (Figures 5.14 and 5.15).</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="363"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Key Boxes and Entry Doors </span></strong><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">
If firefighters need to conduct interior fire suppression operations, they must enter the building at one or more points. The fire service has an array of tools to force entry into buildings. However, forcing entry takes extra time and usually damages the building.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Key boxes (also called “access boxes” or “lock boxes”) are small lockable vaults mounted outside building entrances (Figure 2.18). They are opened with a master key held by the fire department. Inside the box are the building’s keys. Some jurisdictions require key boxes; others give building owners the option of installing them, or risking the need for firefighters to force entry into their buildings along with any resulting damage. Code officials enforcing the IFC and NFPA 1 may require key boxes. When key boxes are optional, designers may want to educate owners on their benefits.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">&nbsp;</span></p><span data-dcnode-id="356" instrument_node="">
</span><div align="center" data-dcnode-id="343"><span data-dcnode-id="355" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="348" style="width: 210px"><img alt="(Fig. 2.18) Key box adjacent to fire command center.  Theses boxes are often provided at main building entry doors.  Note the fire department connection on the left." data-dcnode-id="354" height="230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.18.jpg&amp;raw" width="200"><p data-dcnode-id="353"></p><span data-dcnode-id="352" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">(Fig. 2.18) Key box adjacent to fire command center. Theses boxes are often provided at main building entry doors. Note the fire department connection on the left.</span></p><span data-dcnode-id="349" instrument_node="">
</span></div><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">&nbsp;</span></p><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="339"><span class="blackTen" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">First arriving firefighters will often base their point of entry on which windows have fire or smoke venting from them. In most cases, entrances that serve any particular window will be readily apparent from the outside. If it is not obvious which door to enter to reach which area, signs or diagrams should be provided outside each entrance door indicating portions of the building accessible from the corresponding door (Figure 2.19).</span></span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">&nbsp;</span></p><span data-dcnode-id="335" instrument_node="">
</span><div align="center" data-dcnode-id="322"><span data-dcnode-id="334" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="327" style="width: 261px"><img alt="(Fig. 2.19) Apartment locator.  This door does not access apartments whose windows flack it." class="" data-dcnode-id="333" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.19.jpg&amp;raw" width="251"><p data-dcnode-id="332"></p><span data-dcnode-id="331" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">(Fig. 2.19) Apartment locator. This door does not access apartments whose windows flack it.</span></p><span data-dcnode-id="328" instrument_node="">
</span></div><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">&nbsp;</span></p><span data-dcnode-id="323" instrument_node="">
</span></div><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="318"><span class="blackTen" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">In multi-tenant buildings, such as shopping centers and malls, tenants usually have rear exit doors that firefighters may access. Often these doors look alike, making it hard to correlate a given door with a particular tenant. Labeling rear doors on the outside with the tenant’s name, address number and/or suite number, using lettering at least six inches high with a 1/2 inch stroke (thickness of lines in each letter) prevents this problem (Figure 2.20).</span></span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">&nbsp;</span></p><span data-dcnode-id="314" instrument_node="">
</span><div align="center" data-dcnode-id="301"><span data-dcnode-id="313" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="306" style="width: 255px"><img alt="(Fig. 2.20) Rear doors of a shopping center labeled for rapid access: utility room, fire protection equipment room, and individual tenant space." data-dcnode-id="312" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.20.jpg&amp;raw" width="245"><p data-dcnode-id="311"></p><span data-dcnode-id="310" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">(Fig. 2.20) Rear doors of a shopping center labeled for rapid access: utility room, fire protection equipment room, and individual tenant space.</span></p><span data-dcnode-id="307" instrument_node="">
</span></div><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">&nbsp;</span></p><span data-dcnode-id="302" instrument_node="">
</span></div><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="297"><span class="blackTen" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Any door that appears to be functional from the outside, but is unusable for any reason, should have a sign reading “THIS DOOR BLOCKED. ” The lettering should be at least six inches high with a 1/2 inch stroke. If these doors are properly marked, firefighters will not waste time trying to gain entry through them.</span></span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="291"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Interior Access</span></strong><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
Large, unusual, or complex buildings present a challenge to maneuvering and locating specific areas. Directional signs with room/tenant numbers, and graphic directories of tenant/agency layout can assist the public (Figure 2.21). The same diagrams may assist firefighters if they include: stairway and elevator identifiers, fire hose valve locations, fire alarm control panel location, fire alarm annunciator location, fire pump location and other fire protection features. Diagrams should also contain features to assist unfamiliar users with orientation, such as road names or a compass point. Detailed floor plans showing building layout and fire protection systems can assist the fire service. In buildings with fire command centers, a good location for these plans is in this command center. In other buildings, these plans may be locked inside the fire alarm annunciator panel.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">&nbsp;</span></p><span data-dcnode-id="287" instrument_node="">
</span><div align="center" data-dcnode-id="273"><span data-dcnode-id="286" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="279" style="width: 210px"><img alt="(Fig. 2.21) Shopping complex diagram with views of the overall complex as well as the interior tenant diagram of the building in which the diagram is located." data-dcnode-id="285" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.21.jpg&amp;raw" width="200"><p data-dcnode-id="284"></p><span data-dcnode-id="283" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Fig. 2.21) Shopping complex diagram with views of the overall complex as well as the interior tenant diagram of the building in which the diagram is located.</span></p><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="275"><span class="blackEight" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">(</span></span></p><span data-dcnode-id="274" instrument_node="">
</span></div><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="266"><span class="blackTen" data-dcnode-id="267"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Equipment and Utility Identification</span></strong><br data-dcnode-id="269"><span data-dcnode-id="268" instrument_node="">
A routine function in any advanced fire suppression operation is to control (usually shut down) utilities. Making it easy to locate and identify utilities will speed firefighters’ progress. Electric, gas, and other fuel controls should be located either in dedicated rooms with exterior marked entrances, or at exterior locations away from openings such as windows or doors (Figure 2.20).</span></span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">NFPA 170, Standard for Symbols for Use by the Fire Service, contains symbols for marking gas and electric shut-offs. Air handling equipment should also be prominently marked, especially if located out of sight. The fire service may need to quickly access rooms containing the following equipment: water service, control valves, fire pumps, electric service, switchgear, generators, fans and other mechanical equipment. Lettering for this signage should be at least six inches high with a 1/2 inch stroke (thickness of lines in each letter), unless the standard symbols are used.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Marking of fire protection system devices within buildings is discussed further in the chapters on fire alarm systems, sprinkler systems, standpipe systems, and fire department connections.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">&nbsp;</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="251"><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Elevators</span></strong><br data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
The use of elevators during fire incidents is very controversial. Elevators are not usually used for occupant evacuation. One exception is trained operators evacuating occupants with special needs. They should, however, be designed for fire service use. The elevator standard widely referenced in building and fire codes is ANSI A17.1, Safety Code for Elevators and Escalators. It details the two phases of emergency operation.</span></p><span data-dcnode-id="250" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="242" id="attachment_696" style="width: 310px"><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy.jpg"><img alt="elevator panel no 13th floor " class="wp-image-696 size-medium" data-dcnode-id="249" height="199" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy-300x199.jpg&amp;raw" srcset="https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy-300x199.jpg 300w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy-65x43.jpg 65w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy-225x149.jpg 225w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy-350x232.jpg 350w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061337/elevator-no-13th-floor-Copy.jpg 640w" width="300"></a><p data-dcnode-id="247"></p><span data-dcnode-id="246" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">What happened to the 13th floor?</span></p><span data-dcnode-id="243" instrument_node="">
</span></div><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Phase 1 of elevator emergency operation consists of a recall system that automatically sends elevators to a “designated” primary level. This occurs upon activation of a manual recall switch at the designated level or upon activation of smoke detectors in the elevator lobbies, hoistways, or machine rooms. If a detector is activated on the designated primary level, the elevator cars go to an alternate floor level. In either case, the elevators are rendered unavailable to building occupants. They remain at the recall level with doors open, so the fire service can quickly determine that they are clear of occupants and then use them in a manual control mode.</span></p><span data-dcnode-id="238" instrument_node="">
</span><div class="wp-nocaption size-medium wp-image-759" data-dcnode-id="235"><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z.jpg"><img alt="In case of fire do not use elevator." class="size-medium wp-image-759" data-dcnode-id="237" height="300" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z-225x300.jpg&amp;raw" srcset="https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z-225x300.jpg 225w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z-65x86.jpg 65w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z-350x466.jpg 350w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061517/2220430553_e338168731_z.jpg 480w" width="225"></a></div><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Did you know? Elevators can not be used during a fire by building occupants.</span></p><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">The designated recall level usually is the ground or entry level. This will facilitate rapid fire department access. For buildings with entrances on multiple levels, designers should consult the fire department about the entrance firefighters intend to use initially. The fire department may also prefer to coordinate the designated recall level with the location of the fire alarm annunciator, fire control room, and/or the fire department connection.</span></p><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Phase 2 emergency operation permits the fire service to use the elevators under their manual control. Phase 2 operation overrides all automatic controls, including the Phase 1 recall.</span></p><span data-dcnode-id="225" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="217" id="attachment_693" style="width: 310px"><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy.jpg"><img alt="Fire Service Elevator Bypass." class="size-medium wp-image-693" data-dcnode-id="224" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy-300x225.jpg&amp;raw" srcset="https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy-300x225.jpg 300w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy-65x48.jpg 65w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy-225x168.jpg 225w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy-350x262.jpg 350w, https://s3-us-west-2.amazonaws.com/courses-images-archive-read-only/wp-content/uploads/sites/454/2015/06/21061333/elevator-bypass-Copy.jpg 640w" width="300"></a><p data-dcnode-id="222"></p><span data-dcnode-id="221" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Fire Service Elevator Bypass.</span></p><span data-dcnode-id="218" instrument_node="">
</span></div><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Solid-state elevator control equipment operates correctly only if maintained within a certain temperature range. NFPA 101, NFPA 5000, and the IBC require independent ventilation in machine rooms containing solid-state equipment that controls elevators traveling over certain distances. Whenever such elevators receive emergency power, their corresponding machine room ventilation would also receive emergency power. These features help maintain at least one elevator operational throughout fire suppression operations.</span></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Currently, ANSI A17.1 requires an automatic power shutdown feature for elevators that have fire sprinklers located in their machine rooms and, under certain conditions, in hoistways. Shutdown occurs upon or prior to the discharge of water, usually when heat detectors mounted next to each sprinkler head are activated. These heat detectors have both a lower temperature rating and a higher sensitivity (a lower response time index) than the sprinkler. However, to minimize the chance that firefighters will be trapped by a power shutdown, the temperature rating of the heat detector should be as high as feasible. Another shutdown method involves water flow detectors; however, these detectors cannot employ a time delay, so designers seldom choose this method. Note that in many cases NFPA 13, Standard for the Installation of Sprinkler Systems, permits sprinklers to be omitted from these areas.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The National Fire Alarm Code, NFPA 72, requires that smoke detectors in either the elevator hoistway or the elevator machine rooms trigger separate and distinct visible annunciation at both the fire alarm control unit and the fire alarm annunciator. This alarm notifies firefighters that the elevators are no longer safe to use, and it also provides some warning time prior to the shutdown feature that is required with sprinkler protection. In addition, ANSI A17.1 requires a warning light in elevator cabs to flash when an elevator problem is imminent.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="202"><strong data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Stairs</span></strong><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">
NFPA 1, NFPA 101, NFPA 5000, the IBC, and the IFC all require that identification signage be provided inside stairwells at every level (Figure 2.22). These standards all require stairwell signs in buildings over a certain height, but the height thresholds vary. Signage should show the stair identifier, floor level, terminus of the top and bottom, roof accessibility, discharge level, and direction to exit discharge. On floors that require upward travel to reach the exit, a directional indicator should also be provided. It is important that these signs be located 5 feet above the floor and be visible with the stair door open or closed. In hotels or other buildings with room or suite numbers, the signs should also include the room or suite numbers most directly accessed by each stair on every level, (i.e., second floor of stairway 3 has direct access to rooms 202 through 256). The latter signage would be extremely important where certain stairways provide no access to some sections of the building.</span></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">&nbsp;</span></p><span data-dcnode-id="198" instrument_node="">
</span><div align="center" data-dcnode-id="185"><span data-dcnode-id="197" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="190" style="width: 190px"><img alt="(Fig. 2.22) Stairway ID sign." data-dcnode-id="196" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.22.jpg&amp;raw" width="180"><p data-dcnode-id="195"></p><span data-dcnode-id="194" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">(Fig. 2.22) Stairway ID sign.</span></p><span data-dcnode-id="191" instrument_node="">
</span></div><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="186" instrument_node="">
</span></div><span data-dcnode-id="184" instrument_node="">
</span><p data-dcnode-id="181"><span class="blackTen" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Buildings more than 3 stories in height above grade should have roof access. The IBC and IFC require this, except for buildings with steeply-pitched roofs (with a more than 4:12 slope).</span></span></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">As stated above, the IFC, the IBC, NFPA 5000, and NFPA 241 contain special construction/demolition requirements. One stairway should be completed as construction advances. Conversely, as demolition progresses, one stairway should be maintained. These standards also address lighting and fire rating of the enclosure.</span></p><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="172"><strong data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Stair Capacity</span></strong><br data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">
Building and fire codes typically require that stairs accommodate exiting occupants. Fire service personnel who may use the stairs are not factored into exit capacity calculations. In situations where occupants are still exiting and firefighters are using the same stairs to enter the building (“counter-flow”), the evacuation may take longer.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Furthermore, in most cases, stairway capacity is designed based on the floor with the highest occupant load. Typically, stairs are not widened as one travels in the direction of egress unless the stairs converge from both above and below. This approach assumes that people will evacuate in a phased manner, beginning with the floor(s) closest to the fire origin. In an immediate general evacuation, or when people from other areas self-evacuate, the increased load will slow evacuation.</span></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Both of these bottlenecks will be made worse as the height of the building increases. Furthermore, total evacuation is becoming more commonplace due to concerns about terrorism.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">An effective solution to the counter-flow issue is a dedicated firefighting stairway. Codes in the United Kingdom contain specifications for such fire-fighting stairs, elevators, and intervening lobbies in buildings of a certain height (Figure 2.23). Current U.S. codes do not require dedicated stairways or elevators. The disadvantages of dedicated firefighting stairways include: cost, space, and the effort needed to keep them clear and in operating order.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">A solution to egress delays caused by either counter-flow or total evacuation is to provide additional exit capacity by means of additional stairs or widened stairs. Cost and space are also disadvantages of this solution.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">&nbsp;</span></p><span data-dcnode-id="156" instrument_node="">
</span><div align="center" data-dcnode-id="146"><span data-dcnode-id="155" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="148" style="width: 230px"><img alt="(Fig. 2.23) Dedicated firefighting stairway/elevator tower. © Crown Copyright 2000 Queen's Printer of Acts of Parliament." data-dcnode-id="154" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/Publications/3256-07N-2006/2.23.jpg&amp;raw" width="220"><p data-dcnode-id="153"></p><span data-dcnode-id="152" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Fig. 2.23) Dedicated firefighting stairway/elevator tower. © Crown Copyright 2000 Queen’s Printer of Acts of Parliament.</span></p><span data-dcnode-id="149" instrument_node="">
</span></div><span data-dcnode-id="147" instrument_node="">
</span></div><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="142"><span class="blackTen" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">These issues currently remain unresolved in the code community; however, a designer may encounter these issues on projects for large, high-security, or high-profile facilities. Further guidance on the movement of people in buildings can be found in the Society of Fire Protection Engineers’ publication, Human Behavior in Fire.</span></span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">&nbsp;</span></p><span data-dcnode-id="138" instrument_node="">
</span><div align="center" data-dcnode-id="80"><span data-dcnode-id="137" instrument_node="">
</span><fieldset data-dcnode-id="82"><span data-dcnode-id="136" instrument_node="">
</span><div align="center" data-dcnode-id="132"><span class="blackBoldTen" data-dcnode-id="133"><span class="blackBoldTen" data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Considerations – Firefighter Access</span></span></span></div><span data-dcnode-id="131" instrument_node="">
</span><ul data-dcnode-id="84"><span data-dcnode-id="130" instrument_node="">
</span><li data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Consider firefighter foot access in site design.</span></li><span data-dcnode-id="127" instrument_node="">
</span><li data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Avoid using areas that are likely to be obstructed (i.e., shipping and receiving areas).</span></li><span data-dcnode-id="124" instrument_node="">
</span><li data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">Label blocked doors with exterior signage.</span></li><span data-dcnode-id="121" instrument_node="">
</span><li data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">Coordinate temporary construction storage and loading areas with access points and fire protection features.</span></li><span data-dcnode-id="118" instrument_node="">
</span><li data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Provide key boxes when required; recommend their use in other areas.</span></li><span data-dcnode-id="115" instrument_node="">
</span><li data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Locate key boxes as recommended by the particular fire department.</span></li><span data-dcnode-id="112" instrument_node="">
</span><li data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Include fire protection features on the building directories.</span></li><span data-dcnode-id="109" instrument_node="">
</span><li data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">Provide signs or diagrams at limited access entrances.</span></li><span data-dcnode-id="106" instrument_node="">
</span><li data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Identify rooms containing utility shutoffs and fire protection equipment.</span></li><span data-dcnode-id="103" instrument_node="">
</span><li data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Coordinate elevator recall level with fire service operating procedures.</span></li><span data-dcnode-id="100" instrument_node="">
</span><li data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Design elevator shutdown feature to minimize the chance of trapping firefighters.</span></li><span data-dcnode-id="97" instrument_node="">
</span><li data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Provide identification signs at each level of every stairway.</span></li><span data-dcnode-id="94" instrument_node="">
</span><li data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Exten stairs up or down with construction or demolition; consider the need for lighting and rated enclosure.</span></li><span data-dcnode-id="91" instrument_node="">
</span><li data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">Where total evacuation of a large building is likely, consider additional egress capacity.</span></li><span data-dcnode-id="88" instrument_node="">
</span><li data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">Where firefighter counter-flow is expected, consider additional egress capacity or dedicated firefighter stairs.</span></li><span data-dcnode-id="85" instrument_node="">
</span></ul><span data-dcnode-id="83" instrument_node="">
