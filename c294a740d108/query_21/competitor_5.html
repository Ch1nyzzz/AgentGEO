</span><dl class="faq" data-dcnode-id="464" title="Septic Tanks"><span data-dcnode-id="538" instrument_node="">
</span><dt class="closed" data-dcnode-id="536" tabindex="0"><span data-dcnode-id="537" instrument_node="">Does the Alaska Department of Environmental Conservation (ADEC) have a list of approved prefabricated septic tanks?</span></dt><span data-dcnode-id="535" instrument_node="">
</span><dd data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">No. Tanks selected must comply with </span><abbr data-dcnode-id="532" title="Alaska Department of Environmental Conservation"><span data-dcnode-id="533" instrument_node="">ADEC</span></abbr><span data-dcnode-id="531" instrument_node=""> regulations and the Uniform Plumbing Code.</span></dd><span data-dcnode-id="529" instrument_node="">
</span><dt class="closed" data-dcnode-id="527" tabindex="0"><span data-dcnode-id="528" instrument_node="">What are some of the requirements</span></dt><span data-dcnode-id="526" instrument_node="">
</span><dd data-dcnode-id="509"><span data-dcnode-id="525" instrument_node="">A partial list includes: (see regulations/standards for the full list)
</span><ul data-dcnode-id="511"><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">At least 1,000 gallons plus 250 gallons per bedroom over three</span></li><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Manufacturer certification for required bury depth</span></li><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Two chambers</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Watertight covers bolted, locked or covered with fill</span></li><span data-dcnode-id="512" instrument_node="">
</span></ul><span data-dcnode-id="510" instrument_node="">
</span></dd><span data-dcnode-id="508" instrument_node="">
</span><dt class="closed" data-dcnode-id="506" tabindex="0"><span data-dcnode-id="507" instrument_node="">What are the full regulations and standards governing the construction of septic tanks?</span></dt><span data-dcnode-id="505" instrument_node="">
</span><dd data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">18 </span><abbr data-dcnode-id="502" title="Alaska Administrative Code"><span data-dcnode-id="503" instrument_node="">AAC</span></abbr><span data-dcnode-id="501" instrument_node=""> and Appendix H of the 2012 Uniform Plumbing Code</span></dd><span data-dcnode-id="499" instrument_node="">
</span><dt class="closed" data-dcnode-id="497" tabindex="0"><span data-dcnode-id="498" instrument_node="">What are the applicable quality assurance and control standards for prefabricated septic tanks?</span></dt><span data-dcnode-id="496" instrument_node="">
</span><dd data-dcnode-id="480"><span data-dcnode-id="495" instrument_node="">
</span><ul data-dcnode-id="482"><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Underwriters Laboratories (UL) coating for steel septic tanks</span></li><span data-dcnode-id="491" instrument_node="">
</span><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">International Association of Plumbing and Mechanical Officials (IAPMO) and American National Standards Institute (ANSI) Z1000 (and referenced American Society for Testing and Materials (ASTM) standards) for concrete septic tanks</span></li><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="484"><abbr data-dcnode-id="486" title="International Association of Plumbing and Mechanical Officials"><span data-dcnode-id="487" instrument_node="">IAPMO</span></abbr><span data-dcnode-id="485" instrument_node=""> or National Sanitation Foundation (NSF) 40 certification for plastic or composite tanks</span></li><span data-dcnode-id="483" instrument_node="">
</span></ul><span data-dcnode-id="481" instrument_node="">
</span></dd><span data-dcnode-id="479" instrument_node="">
</span><dt class="closed" data-dcnode-id="474" tabindex="0"><span data-dcnode-id="478" instrument_node="">How does </span><abbr data-dcnode-id="476" title="Alaska Department of Environmental Conservation"><span data-dcnode-id="477" instrument_node="">ADEC</span></abbr><span data-dcnode-id="475" instrument_node=""> approve cast-in-place or non-prefabricated septic tanks?</span></dt><span data-dcnode-id="473" instrument_node="">
</span><dd data-dcnode-id="466"><abbr data-dcnode-id="471" title="Alaska Department of Environmental Conservation"><span data-dcnode-id="472" instrument_node="">ADEC</span></abbr><span data-dcnode-id="470" instrument_node=""> will review and approve engineering plans for individual tanks only under 18 </span><abbr data-dcnode-id="468" title="Alaska Administrative Code"><span data-dcnode-id="469" instrument_node="">AAC</span></abbr><span data-dcnode-id="467" instrument_node=""> 72.200</span></dd><span data-dcnode-id="465" instrument_node="">

</span><dt class="closed" data-dcnode-id="322" tabindex="0"><span data-dcnode-id="323" instrument_node="">Which systems require engineered plans?</span></dt><span data-dcnode-id="321" instrument_node="">
</span><dd data-dcnode-id="289"><span data-dcnode-id="320" instrument_node="">
</span><ul data-dcnode-id="291"><span data-dcnode-id="319" instrument_node="">
</span><li data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Holding Tanks</span></li><span data-dcnode-id="316" instrument_node="">
</span><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Mound-type absorption beds</span></li><span data-dcnode-id="313" instrument_node="">
</span><li data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Other non-conventional or alternative onsite wastewater systems</span></li><span data-dcnode-id="310" instrument_node="">

</span><li data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Reduced separation distance</span></li><span data-dcnode-id="304" instrument_node="">
</span><li data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Sewage lift stations (except pre-approved designs such as Anchorage Tank, Greer Tank, etc.)</span></li><span data-dcnode-id="301" instrument_node="">
</span><li data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Soils with a percolation rate slower than 60 minutes per inch</span></li><span data-dcnode-id="298" instrument_node="">
</span><li data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Surface discharges &amp; discharges to waters of the United States</span></li><span data-dcnode-id="295" instrument_node="">
</span><li data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Systems with any non-domestic wastewater</span></li><span data-dcnode-id="292" instrument_node="">
</span></ul><span data-dcnode-id="290" instrument_node="">
</span></dd><span data-dcnode-id="288" instrument_node="">
</span><dt class="closed" data-dcnode-id="286" tabindex="0"><span data-dcnode-id="287" instrument_node="">Can a certified installer install a conventional onsite system in silt (ML) soils?</span></dt><span data-dcnode-id="285" instrument_node="">
</span><dd data-dcnode-id="266"><span data-dcnode-id="284" instrument_node="">
</span><ul data-dcnode-id="268"><span data-dcnode-id="283" instrument_node="">
</span><li data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">Only with an engineer's soil log and percolation test. Based on the percolation rate, the absorption field is then sized using the application rate specified in Division 20 Article 5.4 of the </span><abbr data-dcnode-id="280" title="Onsite Wastewater System Installation Manual"><span data-dcnode-id="281" instrument_node="">OWSIM</span></abbr><span data-dcnode-id="279" instrument_node="">. A copy of the engineer's soil log and percolation test must be included with the Documentation of Construction</span></li><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="270"><abbr data-dcnode-id="275" title="Alaska Department of Environmental Conservation"><span data-dcnode-id="276" instrument_node="">ADEC</span></abbr><span data-dcnode-id="274" instrument_node=""> offices may issue region specific guidance or exceptions based on soil survey data. Contact the </span><abbr data-dcnode-id="272" title="Alaska Department of Environmental Conservation"><span data-dcnode-id="273" instrument_node="">ADEC</span></abbr><span data-dcnode-id="271" instrument_node=""> office where the installation will take place</span></li><span data-dcnode-id="269" instrument_node="">
</span></ul><span data-dcnode-id="267" instrument_node="">

</span><p data-dcnode-id="248"><span data-dcnode-id="255" instrument_node="">"small commercial facility" from 18 </span><abbr data-dcnode-id="253" title="Alaska Administrative Code"><span data-dcnode-id="254" instrument_node="">AAC</span></abbr><span data-dcnode-id="252" instrument_node=""> 72.990(71) means "a single commercial building with an expected peak design flow of 500 </span><abbr data-dcnode-id="250" title="gallons per day"><span data-dcnode-id="251" instrument_node="">gpd</span></abbr><span data-dcnode-id="249" instrument_node=""> or less of domestic wastewater</span></p><span data-dcnode-id="247" instrument_node="">
