</span><p class="body-l2" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">     All reasonable measures shall be taken for the protection and safe operation of traffic during and after installation of facilities. For all utility maintenance or construction operations within public highway rights-of-way:</span></p><span data-dcnode-id="2207" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">3.2.1.1       All traffic control shall conform to the requirements specified in the most current DelDOT manual Traffic Controls for Streets and Highways Construction, Maintenance, and Utility Operations ("Traffic Control Manual") and any other applicable State and federal regulations.</span></p><span data-dcnode-id="2204" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">3.2.1.2       A traffic control plan, referencing the Traffic Control Manual, must be submitted and approved whenever a permit is required.</span></p><span data-dcnode-id="2201" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">3.2.1.3       Failure by a utility to provide for traffic safety will be cause for immediate suspension of operations. The work will not be allowed to continue until the District is satisfied that proper traffic control is established.</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">3.2.1.4       If there are any discrepancies between the Manual on Uniform Traffic Control Devices (MUTCD) and the Traffic Control Manual, the DelDOT Safety Section shall be contacted for clarification. In all questions of interpretations of the MUTCD and the Traffic Control Manual, the judgment of the Chief Traffic Engineer shall be final. The protection prescribed for each situation shall be based on the speed and volume of traffic, duration of operation and exposure to hazards. The term "street" refers to all the streets in any municipality, including cities, towns, villages, or other local jurisdictions.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">3.2.2    Traffic Control And Safety References</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">3.2.2.1       Title 17 of the </span><b data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2188" instrument_node=""> provides for the establishment of traffic control and safety standards to be observed during utility construction and maintenance operations on or adjoining any public highway, road, or street. Public and private utilities, contractors under contract with utility companies, and all others engaged in utility construction and maintenance are required to comply with these standards.</span></p><span data-dcnode-id="2186" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2181"><span data-dcnode-id="2185" instrument_node="">3.2.2.2       The </span><i data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Traffic Control Manual</span></i><span data-dcnode-id="2182" instrument_node=""> explains in detail the principles and requirements of traffic control and safety standards. It covers traffic control procedures, responsibilities of involved parties, required training for personnel, and descriptions of approved control devices.</span></p><span data-dcnode-id="2180" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">3.2.2.3       Responsible utility officials are strongly encouraged to obtain the </span><i data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Traffic Control Manual</span></i><span data-dcnode-id="2176" instrument_node="">, study its contents, and make copies available to their field supervisors. The </span><i data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Traffic Control Manual</span></i><span data-dcnode-id="2173" instrument_node=""> can be found online at http://www.deldot.gov/static/publications_forms.shtml. The standards are to be implemented through the training and supervision of utility employees. Failure to meet standards will result in stoppage of work until deficiencies are brought into compliance.</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">3.2.2.4       All workers within state right of way shall have high visibility safety apparel that meets ANSI 107-2004 standard requirements. This apparel will meet the standard performance for Class 2 risk exposure. The apparel background material color shall be fluorescent yellow-green as defined in the standard. The reflective material shall be either orange, yellow, white, silver, yellow-green, or a fluorescent version of these colors, and shall be visible at a minimum distance of 1000'. For nighttime work, apparel meeting standard performance for Class 3 risk exposure is recommended.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">3.2.3    Traffic Control Plan</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">3.2.3.1       The traffic control plan is an important aspect of the project. It shall be prepared by qualified individuals and understood by all affected parties before work begins. In preparing the traffic control plan; the sample cases in the </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Traffic Control Manual </span></i><span data-dcnode-id="2161" instrument_node="">shall be followed. The plan must be submitted or traffic control case identified when applying to the District Office for a construction permit. If utility officials need to veer from standard case studies, an ATSSA Certified Traffic Control Supervisor must submit changes to DelDOT Safety for approval prior to applying for the permit.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">3.2.3.2       The utility work shall not begin until the District approvals have been obtained and the approved permit information including traffic control are on the job site. Once the job has begun, the utility inspectors must ensure that the plan is followed throughout the project.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">        In the case of emergency work where there is no prior approval of a traffic control plan; the utility is still required to follow the DelDOT Traffic Control Manual.</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">        The requirement for a utility traffic control plan may be waived on construction projects when the utility adjustments are made simultaneously with the highway contractor's operations and the highway contractor provides the traffic control. Under these circumstances, the utility and highway contractor must cooperate and coordinate their work so that neither is delayed by the other's operation. See Section 5.4.2.3.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">3.2.4     Flaggers And Traffic Control</span></p><span data-dcnode-id="2147" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">3.2.4.1        Flaggers are essential in controlling traffic when one lane is closed and motorists must alternately use the remaining lane. Other important assignments for flaggers are necessary in utility work, such as lane closures for equipment passage, the pulling of cable crossings, and the control of traffic speed.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">3.2.4.2       The Department has specific requirements for flagger warning signs, safety clothing, training, and associated flagger concerns, as described in the Traffic Control Manual. Utility supervisors are expected to understand and abide by these requirements. Flaggers are required to be ATSSA certified, expected to be alert, and to know the correct way to stop traffic, slow it down, and keep it moving.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">3.2.5     Inspection Of Traffic Control</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">     Routine inspections of traffic control elements must be made to ensure acceptable levels of operation. Inspections will be performed by trained District personnel and shall be accomplished at a frequency corresponding to the magnitude of the:</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">3.2.5.1      utility activity,</span></p><span data-dcnode-id="2132" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">3.2.5.2      traffic volumes, and</span></p><span data-dcnode-id="2129" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">3.2.5.3      other contributing factors.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">When a utility or utility contractor fails to follow the approved traffic control plan, inspectors will suspend the work until the required traffic control is in place. Failure to follow the traffic control plan violates 21</span><b data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node=""> Del.C. </span></b><span data-dcnode-id="2122" instrument_node="">§4105 and is subject to punishment by law.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">3.3   Location Of Utility Facilities</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">    In planning utility locations on highway rights-of-way, consideration must be given at all times to sound engineering principles, public safety, and economic benefits to the State. The planning must consider safety, the visual quality of the highway, and efficiency of maintenance.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">3.3.1    Specifically, the following items must be considered:</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">3.3.1.1       Minimize future project interference. New utility facilities shall be located to minimize the need for later adjustments to accommodate future highway improvements or other utility installations. The location should allow for adequate access to the facilities and accommodate future maintenance. In addition to meeting with DelDOT to discuss future projects, the following are sources to check on projects:</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">The Capital Transportation Program (CTP):</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Wilmington Area Planning Council (WILMAPCO):</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">http://www.wilmapco.org/RTP/index.htm</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">The Statewide Long Range Transportation Plan</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Dover/Kent County Metropolitan Planning Organization (MPO)</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">3.3.1.2       Minimize future interference to traffic. Consider methods to maintain utility facilities with minimum interference to highway traffic.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">3.3.1.3       Preserve safe traffic operation and future space. New longitudinal installations shall be located on a uniform alignment as near as practicable to the right of way line and outside the clear zone to provide a safe environment for traffic operation and preserve space for future highway improvements or other utility installations.</span></p><span data-dcnode-id="2087" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">3.3.1.4       Comply with ADA. The location of utility facilities and appurtenances shall be in accordance with the Americans With Disabilities Act.</span></p><span data-dcnode-id="2084" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">3.3.1.5        Allow only Perpendicular Crossings. Utility lines shall cross the highway on a line generally perpendicular to the highway alignment.</span></p><span data-dcnode-id="2081" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">3.3.1.6       Consider utility facility's ownership, operation, and maintenance methods for all facilities that it installs within the boundaries of the right-of-way as well as private underground services or other facilities. </span></p><span data-dcnode-id="2078" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">3.3.1.7       Comply with Clearances and Clear Zone policies. Conform to horizontal and vertical clearances of aboveground utility lines with the "clear zone" roadside policies applicable to the system and the particular highway section involved. The locations of aboveground utility facilities shall be consistent with the clearances applicable to all roadside obstacles for the type of highway involved. See Section 2 for the definitions of "clear roadside policy", "clear zone" and "horizontal clearances."</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">        Clear zones are established for new construction and major reconstruction projects. Clear zones on other existing roadways may be less than desirable. Utilities shall check with District Public Works to determine the clear zone widths for specific locations for utility work performed under permits. The calculation of clear zone widths is explained in DelDOT's Road Design Manual and the AASHTO Roadside Design Guide.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">        If there is no feasible alternative to locating appurtenances within the clear zone, the appurtenances (including fire hydrants) must meet breakaway criteria.</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">3.3.1.8       Consider future drainage. Future drainage requirements shall be considered when determining location of utility installations. Existing swales or ditches may need to be deepened. New drainage ditches may need to be constructed. New storm water drainage pipelines may need to be installed in the future.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">3.3.2    Highways With Fully Controlled Access</span></p><span data-dcnode-id="2063" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">     Freeways and some expressways have full control of access. Full control of access to highways means that preference is given to through traffic by providing access connections only with selected public roads and by prohibiting at-grade crossings and direct private driveway connections. Delaware highways with full access control include:</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">all interstate highways,</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">freeways</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">toll roads, and</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">other roadways as determined by the Department.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">3.3.2.1       Crossing Of Freeway Right-of-way</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">        New utility installations, and adjustments or relocations of existing utilities, are permitted to cross a freeway only in exceptional cases. The installation's effect on safety must be considered. All installations shall cross the freeway on a line perpendicular to its longitudinal alignment. Underground crossings are preferred. Overhead crossings are not desirable and shall be avoided. If a utility believes there is no feasible alternative to an overhead crossing, it must submit a written request to the district. The utility request must include the proposed cost of the overhead installation, describe other alternatives, and detail the associated costs of those alternatives. District Public Works will use the information in making a final decision.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">        The following applies to developed areas or areas that are planned for development:</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">        Spacing - The utility distribution or feeder line crossings of freeways will be spaced as needed to serve consumers in a general area.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">        Approval - Crossings of the freeway by utility service connections may be permitted with approval of District Public Works. Consideration will be given only when utility services are not available within reasonable distances along the side of the freeway.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">        Maintenance - Access points to service utilities must be located outside the denial-of-access lines of throughways or ramps. The placement of underground utilities across freeways must preclude the need to disturb the roadway for maintenance Or Expansion Operations.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">3.3.1.2       Utilities Along Freeways - Lateral Positioning</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p class="body-l4" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">3.3.1.2.1        Longitudinal installations of utilities will not be permitted within the denial-of-access lines of a freeway and other roads as determined by District Public Works. Frontage roads, where provided, may be used for placement of utilities with the approval of District Public Works. Utilities located outside the access lines cannot be serviced by entrance from through-traffic roadways or ramps.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p class="body-l4" data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">3.3.2.2.2        Utilities located on existing highway rights-of-way where the highway facility is being upgraded to a freeway must normally be moved. Permission for such utilities to remain in place may be granted if all service can be made from outside the access control line.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">3.3.2.3      Utilities Along Roads Or Streets Crossing Freeways</span></p><span data-dcnode-id="2018" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">        Where a utility follows a road or street that crosses a freeway, the utility shall cross the freeway on the location of the crossroad or street, and generally within its right-of-way. The utility must be serviced without access from the freeway. All work is subject to State and FHWA regulations in effect at the time. Overhead crossings are not desirable and shall be avoided as noted in Section 3.3.2.1.</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">3.3.3    Partial-access-control Highways</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">     On partial-access-control highways, preference is given to through traffic to a degree that, in addition to access connections with selected public roads, there may also be some other roads crossing at grade as well as some private driveway connections. Except for the types of highways listed under full access control in Section 3.3.1, most highways in Delaware have partial access control.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p class="body-l3" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">3.3.3.1       Utilities Along Partial-access-control Highways - Lateral Positioning</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p class="body-l4" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">3.3.3.1.1  In considering an aboveground facility along a partial-access-control highway, the following constraints apply with respect to the location of the facilities. Any exceptions to these requirements can be submitted by the utility and will be considered by the Department.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">• Clear zone - Overhead utilities and appurtenances, placed longitudinally on the State's right-of-way, will be positioned outside of clear zones and as close to the right-of-way line as possible.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">• Curves - It is not desirable that aboveground installations be placed on the outside of curves on roadways where the speed limit is above 30 miles per hour. Permission may be granted on a hardship basis. Rebuilding or upgrading existing facilities currently on the outside of a curve must conform to this section unless outside of the adjusted clear zone.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">• Daylight corners and traffic islands - Aboveground features-such as poles, guys, enclosures, etc.-shall not be placed in corner cuts ("daylight corners") or on traffic islands.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">• Incorporated areas - In incorporated areas, aboveground utilities will be placed as close as possible to the right-of-way line. If utilities cannot be placed as close as possible to the right-of-way line, the designs shall be reviewed and approved by District Public Workson a case-by-case basis, to minimize the impact on the traveled way. In curbed sections, the utilities will be located as far as possible behind the curbs-and in compliance with the ADA. They shall never be closer than the horizontal clearance established in DelDOT's Road Design Manual and A Policy on Geometric Design of Highways and Streets (AASHTO's Green Book) and the AASHTO Road Design Guide.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">• Occupy only one side of a roadway - Every effort shall be made to place a utility line on one side of the roadway. New aerial service connections shall be avoided if possible. A Utility Construction Permit shall not be issued to place one utility's facilities along both sides of a traveled way unless justified and approved by the Chief Engineer.</span></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">• Pole foundations - When pole foundations will be utilized, the Department must approve the types and locations prior to the permit request.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">• Rural areas - In rural, unincorporated areas, aboveground utilities will be installed 30 feet or more from the traveled way if State right-of-way is available. District Public Works must expressly approve closer placement when sufficient right-of-way is not available. Aboveground utilities will not be placed within the clear zone.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">• Slopes and Ditches - Poles, guys, stub poles, or other equipment will not be placed on front slopes, back slopes or at ditch bottoms.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">3.3.3.1.2        In considering an aboveground facility along a partial-access-control highway, the requirements below apply with respect to the design of the facilities. Any exceptions to these requirements can be submitted by the utility and will be considered by the Department.</span></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">• Joint-use - Joint-use single-pole construction must be used at locations where more than one utility or type of facility is involved. This is most important at locations where the right-of-way widths approach the minimum required for safe operations or maintenance, or where separate installations may require extensive removal or alteration of trees. Exceptions will be made only in cases of hardship as determined by District Public Works on a case-by-case basis. The pole owner should ensure that the pole is sized adequately to allow space for the joint use facilities.</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1969"><b data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">        Note</span></b><span data-dcnode-id="1970" instrument_node="">: The holder of a franchise must not grant permission to another utility facility to jointly occupy its pole line without notifying the other facility of the Department's requirements.</span></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">• Single-pole construction - Any longitudinal installations of overhead lines on the highway right-of-way must be limited to single-pole construction.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">• Special Protection - Only approved protective measures will be permitted where special protection is required under AASHTO guidelines for aboveground installations.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">• The owner of any abandoned pole within state right-of-way is responsible for ensuring its removal in a timely manner.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">3.3.3.2       Utilities Along Highways - Vertical Positioning</span></p><span data-dcnode-id="1956" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">3.3.3.2.1       Overhead electric power and communications structures, lines and cables shall be installed in compliance with the latest edition of the National Electrical Safety Code. Existing lines and cables shall be maintained at minimum clearance of 23.5 feet above track rails of railroads and a minimum clearance of 18 feet above roads, streets, entrances and other areas subject to truck traffic. The above two clearances shall be maintained under all conditions, i.e. maximum conductor sag conditions (subject to terms of railroad permit requirements) and a minimum of 18 feet above all roadways-or in accordance with the codes described in Section 3.4, whichever is greater.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">3.3.3.2.2       The owner of utility facilities is responsible for moving them to eliminate any visual obstruction or interference to any traffic control device. This includes moving structures, overhead lines and cables, splice boxes, enclosures, and other appurtenances in order to provide adequate visibility of a traffic control device.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">3.3.3.3       Historic Sites, Scenic Areas, Parks, Etc.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">        Aboveground utility installations-including those needed for highway purposes such as highway lighting or to serve a weigh station, rest area, or recreation area-are not permitted on highway rights-of-way or other lands which are acquired or improved with federal aid or direct federal highway funds and are located within or adjacent to areas of scenic enhancement and natural beauty. Such areas include public park and recreational lands, wildlife and waterfowl refuges, historic sites as described in 23 U.S.C. 138, scenic strips, overlooks, rest areas, and landscaped areas. However, the Department may permit exceptions provided that the conditions described in the current Program Guide Utility Relocation and Accommodation on Federal-Aid Highway Projects are met. Relocation of pre-existing utility facilities from overhead to underground is subject to reimbursement within the guidelines described in Section 5.0.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">3.3.4    Subdivisions</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">3.3.4.1      Subdivision Streets Not Yet Accepted For State Maintenance</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">        The Subdivision Developer shall be responsible for submitting utility installation site plans to District Public Works for review and approval prior to commencement of street construction within the subdivision and prior to utility installation.</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">        It is not necessary for a utility to obtain a construction permit in new subdivisions. Upon completion and acceptance of the subdivision streets, the utilities that are located within the State right-of-way shall be franchised in accordance with the existing Annual Master Franchise for each utility.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">        The utilities in a subdivision will be located as follows:</span></p><span data-dcnode-id="1929" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">3.3.4.1.1       Utilities will be allowed within the right-of-way.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">3.3.4.1.2       Aboveground utilities must be avoided if possible. If pole lines are to be used, they must be placed behind the clear zone.</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">3.3.4.1.3       Where feasible, underground utilities shall be placed behind the proposed curb line or in an established utility easement.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">3.3.4.1.4       The main lines of underground utilities must be longitudinally located between the right-of-way line and the curb or edge of pavement-except for sanitary sewers that will be placed to avoid the wheel path when they cannot be located outside the roadway. If possible, sanitary sewers should avoid the crown of the roadway. Service lines may cross under the paved area to connect residences with main lines.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">3.3.4.2       Subdivision Streets Accepted For State Maintenance</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">        Utility construction permits are required for existing subdivisions. Existing underground utilities will be permitted to remain in place in subdivisions with streets currently maintained by the Department. However, any utilities that are upgraded shall be located according to Section 3.3.4.1, provided there is enough right-of-way to place them behind curbs.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">3.4   Design</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">3.4.1    A Master Franchise must be in force for any utility facilities present in the highway right-of-way.  The utility's proposed design in all cases must:</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">protect the integrity of the roadway or highway structure,</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">protect the appearance of the highway,</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">minimize interference with traffic during maintenance of the facility, and</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">minimize highway maintenance problems for the State.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">3.4.2     Permit And New Service Installation</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">3.4.2.1       District Public Works will review a permit application for new or existing utilities, maintenance work and re-construction, and some utility work in advance of highway construction. If acceptable, the District Public Works Section will approve the:</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">3.4.2.1.1       proposed location for the utility facility, and</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">3.4.2.1.2       methods of installing and/or attaching the facility and repairing the highway or structure.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">3.4.2.2       The District will review and approve the traffic control plan to ensure highway safety, including the safe and free flow of traffic.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">3.4.3    Project Design And Facility Relocation</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">     On DelDOT highway construction projects the Utilities Engineer will coordinate, review, and approve the utility's proposed plans for the:</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">location of the facility, either in its existing position or in a relocated position,</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">methods of installing and/or attaching the facility,</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">timing of any proposed adjustments and/or relocations, and</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">reimbursement of work in accordance with the requirements in this manual.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">3.4.4    Requirements </span></p><span data-dcnode-id="1857" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">3.4.4.1       Utility installations on, over, or under the rights-of-way of State highways, and utility attachments to highway structures, are to meet or exceed the requirements listed below as well as any other applicable codes or regulations.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">        Electric power and communications: National Electric Safety Code (NESC).</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">        Water transmission and distribution: American Water Works Association (AWWA).</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">        Pressure pipelines: Standard Code of Pressure Piping of the American Society of Mechanical Engineers ASME B31.4 and B31.8 and applicable sections of Federal, State, local and industry codes.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1840"><span data-dcnode-id="1844" instrument_node="">        Liquid petroleum pipelines: American Petroleum Institute Recommended Practice for Steel Pipelines Crossing Railroads and Highways. U.S. DOT Rules and Regulations governing transportation of such materials, including Code of Federal Regulations Title 49</span><b data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node=""> </span></b><span data-dcnode-id="1841" instrument_node="">Part 195.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">        Pipelines carrying natural gas and hazardous materials: U.S. DOT Rules and Regulations governing transportation of such materials, including Code of Federal Regulations Title 49, Parts 192 and 195.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">        Fiber optic facilities: Standard for the Physical Location and Protection of Below-Ground Physical Plant (EIA/TIA-590); also NESC provisions for communications cable.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">3.4.4.2       Provisions for future expansion of utility facilities are to be made when planning for adjustments to existing facilities or preparing for new installations.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">3.4.4.3       Underground utilities must consider safe trenching practices when preparing their designs and constructing their facilities. Both the utilities and their contractors must comply with all Occupational Safety and Health Administration (OSHA) requirements while working on highway rights-of-way. If unsafe work environments exist, work must stop until safe conditions are established or restored.</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">3.4.5    Other Permits</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">        Utilities are responsible for obtaining all required permits from municipal, State, and federal governmental agencies and railroads. Examples of these permits include, but are not limited to:</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">      Water quality permits, DNREC Water Quality Certification,</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">DNREC subaqueous Lands/Wetlands permits,</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">DNREC Coastal Zone Consistency Certification,</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">County Floodplain permit (New Castle County only),</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">U.S. Coast Guard permit,</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">US Army Corps 404 permits,</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Sedimentation and erosion permits,</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Railroad crossing permits (See Section 4.1).</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">3.5   Utility Clearances And Depth Of Cover</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">3.5.1    Positioning And Clearances</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">     Vertical and horizontal clearances between utilities and utility clearances above roadways must conform to the utility codes cited in Section 3.4 and any other applicable industry codes and standards.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">3.5.2    Depth Of Cover</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">     Depth of cover must also conform to the utility codes cited in Section 3.4 and any other applicable codes and regulations. The Department may request greater cover in some instances due to the type of road being constructed.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">3.5.3    For Highway Appurtenances</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">3.5.3.1       Utilities must provide the minimum overhead clearances above the roadway defined in the references listed in Section 3.4. Appropriate clearances from signal poles and street lighting shall also be maintained, as applicable codes require.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">3.5.3.2   ‘    Utility accesses and valve covers shall not be located in the roadway of rural highways. If there is no feasible alternative in urban and suburban areas, they shall not be located in a wheel path or in the centerline of the roadway.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">3.5.3.3       Horizontal clearances will be in accordance with the clear zone requirements described in the DelDOT Road Design Manual and A Policy on Geometric Design of Highways and Streets (AASHTO's Green Book). Exceptions must have the approval of the District Public Works Section.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">3.6   Underground Installations</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">3.6.1    Underground Utilities Crossing Highways. Avoid utility crossings in deep cuts, near bridge and retaining wall footings, in wet or racky terrain and at highway cross drains where flow of water, drift, or streambed load may be obstructed. The crossings shall also be avoided where it is difficult to attain minimum cover, and through paved or unpaved berm slopes under structures. See Section 3.3 for more information regarding crossings of freeways and partial-access-control highways. Refer to section 3.6.3 for more information regarding pipelines.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">3.6.2    Installation Methods</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">3.6.2.1       Directional Boring, Jacking And Push-augering</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">3.6.2.1.1       Directional boring is the industry standard and the method accepted by the Department. Boring is defined as the operation by which large carriers or casings are jacked through oversize bores. The bores are carved progressively ahead of the leading edge of the advancing pipe as soil is mucked back through the pipe. Jacking is defined as the pushing of a sleeve or casing pipe under a highway to make an underground utility crossing without disturbing the roadbed by open trenching.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">3.6.2.1.2       Utilities must provide plans for proposed jacking, push-augering, or directional bore operations for approval by the District Public Works Section when applying for a construction permit. Directional bores are the preferred method and shall be considered wherever possible. Pits for jacking, push-augering or directional bore are not permitted in a proposed paving area.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">3.6.2.1.3       The pits for jacking, push-augering, or directional bore must be excavated no closer to the roadway than 5 feet from the edge of an improved shoulder. Where the shoulder is dirt or grass, the pit excavation may encroach on the shoulder but must remain at least 10 feet from the edge of pavement. Adequate measures must be taken to ensure traffic safety and the integrity of the roadway, especially where the pit is so close to the traveled way. Two approved pit layouts are shown in Figure 2-1. For curb-and-gutter sections, pits must be a minimum of 5 feet from the back of the curb. If sufficient right-of-way is unavailable in the above situations, lesser distances, 2 feet or greater, may be approved.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">3.6.2.2       Open Cutting</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">3.6.2.2.1       The open cutting of a roadway for the purpose of working on or installing new underground facilities shall be avoided. DelDOT's policy is to avoid the open cutting of any roadway for at least five years after resurfacing or reconstruction, unless there is no alternative. Exceptions will be made only in cases of hardship as determined by the Department on a case-by-case basis.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">3.6.2.2.2       The District Public Works Section shall review requests for open cutting on a case-by-case basis, and shall have final approval of how the work is to be accomplished. For work related to a DelDOT highway project, permission for open cutting shall be requested as part of the Utility Statement during the planning of the project.</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">3.6.2.2.3       In the event open cutting is allowed, the utility must adhere strictly to the backfill and restoration requirements. The District Public Works Section will specify fill material. Borrow type C can be utilized however; Flowable Fill is recommended for cross-road cuts. Flowable Fill may be required by the District Public Works Section. Information regarding Flowable Fill from the Special Provisions can be found in Appendix F of this manual.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">3.6.2.2.4       Utilities may not cover open trenches with steel plates between October 31 and April 15. The District Public Works Section may grant exceptions.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">3.6.2.3       Other Installation Methods</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">3.6.2.3.1       Methods of installing utilities beneath roadways, other than push-augering, jacking, and directional bore will be considered for approval only on a case-by-case basis for specific sites. The utility must prepare and submit complete plans and specifications for the excavation, design, and installation involved in other methods.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">3.6.2.3.2       Other methods include tunneling and installing tunnel liners or open-cut construction involving the installation of:</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">• reinforced concrete box culverts;</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">• corrugated metal, structural plate, or reinforced concrete arch culverts;</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1718" instrument_node=""> </span><u data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">or</span></u></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">• corrugated metal, structural plate, or reinforced concrete pipe culverts.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">3.6.3    Pipelines</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">     All pipeline installations must conform to the applicable regulations pertaining to the type of installation being constructed. The Department considers vents, drains, markers, manholes, and shutoffs as parts of pipeline installations.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">3.6.3.1       Permits</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">        Utilities are required to give advance notice and obtain approval from the District Office for any new pipeline or anticipated change to the current design or operation of a pipeline. The permit application shall specify the applicable codes to be used. Construction permits for pipelines shall specify the class of materials being carried, transmittant, the maximum working, test, or design pressures, and the design standards for the carrier.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">3.6.3.2       Placement Of Pipeline</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">        Pipelines installed longitudinally - The pipeline must be placed as close as possible to the outer extremities of the highway, unless approved otherwise in municipality or suburban development. The placement shall not interfere with highway drainage or with the structural integrity of the travelway shoulders or embankment.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">3.6.3.2.1        Pipeline Crossings:</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">3.6.3.2.1.1        Pipeline crossings shall not be located in deep cuts, across cuts and fills, on steep slopes, near footings of bridges or retaining wall footings, across intersections at grade or ramp terminals, in wet or rocky terrain, across drains where flows of water, drifts, or stream beds may be obstructed, or within basins of an underpass drained by a pump.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">3.6.3.2.1.2        Pipe, conduit, sewer, or other similar facility must not be placed inside any drainage pipe. Neither shall objects be placed across the ends of any drainage pipe or culvert so as to obstruct the full flow of water.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">3.6.3.2.1.3        Pipelines crossing streams must be securely suspended above flood lines or lay beneath streambeds.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">3.6.3.2.2       Pipeline Appurtenances:</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">3.6.3.2.2.1        Manholes - Manholes are not to be located in the traveled way of any expressway or public way for vehicular travel. The District Public Works Section may authorize exceptions only at locations where manholes are essential parts of existing lines that have been previously authorized to remain in place. Such installations shall avoid intersections. Manholes shall be designed and located so that they will not interfere with other utilities and planned highway expansion. Manholes are not to be located in the flow line of ditches, the centerline of the roadway, or the wheel path of traffic. All manholes must be flush with the finished grade. Refer to Section 3.3.4.1 for information regarding Subdivisions.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">3.6.3.2.2.2        Valves - Shut-off valves, preferably automatic, must be installed in lines at or near the ends of structures. Isolation valves will also be required near crossings of unusual hazards. Exceptions may be allowed when other safety devices placed within a reasonable distance of the structure or hazard can isolate the pipeline.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">3.6.3.2.2.3        Vents - Any vents shall be located at both ends of casings longer than 150 ft and at the high end of short casings. Vent standpipes shall not interfere with maintenance, use of the highway, nor affect pedestrian traffic. The standpipes shall be highly visible and preferably located on a right-of-way line.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">3.6.3.3       Hazardous Transmittants</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">        Crossings by pipelines carrying a hazardous liquid or liquefied gas (including propane) or other hazardous or volatile material shall not be allowed. Exceptions will be made only in cases of hardship as determined by the Department on a case-by-case basis with reference to federal guidelines. Natural gas pipelines, however, will be allowed via the permit review and approval process through the District Office.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">3.6.3.4       Pipeline Installation</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">• Pipeline crossings are to be identified by permanent markers.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">• Any new water line or sanitary sewer line shall be pressure-tested to assure that it is watertight.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">• Pipelines abandoned in place shall be properly purged and sealed.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">• Depth of Pipeline - The utilities must also conform to the any utility codes cited in Section 3.4.4.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">• Crossing - The critical control for the depth of cover on a non-cased pipeline crossing is the low point in the highway cross-section. Normally, this is the bottom of the longitudinal ditch. Additional protection shall be provided for any pipeline with less then minimal cover. Such measures would employ higher factor of safety in the design, construction, and testing of the uncased carrier pipe, including such features as thicker wall pipe, radiograph testing of welds, hydrostatic testing, coating and wrapping, and cathodic protection as well as well as suitable bridging or concrete slabs.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">• Longitudinal - Pipelines in the highway right-of-way must be placed at least 24 inches below the finished surface. Lines crossing ditches must be placed at least 24 inches below the ditch flow line. The nearest edge of the trench is to be at least 5 feet from the edge of the traveled way or curb line, however, this distance can be reduced to 2 feet or greater should sufficient right-of-way be unavailable. Shoring must be placed where narrow right-of-way limits this minimum offset. The shoring will protect the curb line or traveled way during utility installation.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">• Clearances between Utilities - All utilities shall be separated from one another as required by appropriate codes and ordinances.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node="">• Section 1102, Title 26,</span><b data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node=""> Delaware Code</span></b><span data-dcnode-id="1635" instrument_node=""> stipulates that a distance of at least 3 feet shall be maintained between pipes carrying steam, heat, or power and pipes carrying gas or water, unless one is crossing the other. Where pipes are crossing one another, the minimum clearance must be at least 1 foot.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">• Where a sanitary sewer line is to cross under a water line, the sanitary sewer line shall be laid with a minimum of 18 inches clearance between its top and the bottom of the water line. Where the minimum vertical clearance cannot be obtained, the District Public Works Section may approve the construction of the water line with slip-on or mechanical-joint ductile iron, cast iron, pressure, or pre-stressed concrete cylinder pipe for a distance of 10 feet on each side of the sanitary sewer. One full length of water-line pipe is to be centered over the sanitary sewer line so that both joints are as far from the sanitary sewer line as possible.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">• The horizontal separation between sanitary sewer lines and water mains must be at least 10 feet, or in compliance with American Water Works Association (AWWA) regulations. Where it is impossible to separate underground utilities horizontally the desired minimum, the water line and sanitary sewer line must be constructed of slip-on or mechanical-joint ductile iron, cast iron, pressure, or pre-stressed concrete cylinder pipe with the approval of the appropriate regulatory authority.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">3.6.4    Casings</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">3.6.4.1       A casing is a larger pipe, conduit, or duct enclosing a carrier. Underground utility crossings of roadways shall be made in sleeves or casings for the following conditions:</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">3.6.4.1.1       Utility crossings of freeways, expressways, and other controlled access highways and at other locations where it is necessary to avoid trenched construction and prevent inconvenience to highway users;</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">3.6.4.1.2       To protect carrier pipe from external loads or shock, either during or after construction of the highway; and</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">3.6.4.1.3       To prevent leaked material from saturating or damaging the highway embankment by conveying leaking fluids or gases away from the area directly beneath the roadway to a point of venting at or near the right-of-way line or to a point of drainage in the highway ditch or a natural drainage way.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">3.6.4.2       When To Utilize Casings</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">        Except for circumstances as described in Section 3.6.4.3, the Department requires that:</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">3.6.4.2.1       All crossings of full-access-control roadways (interstate highways, toll roads, freeways) shall be enclosed or cased.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">3.6.4.2.2       All crossings of existing or proposed arterial and collector roadways (partial-access-control roadways) shall be enclosed or cased. Arterial and collector roadways are identified on the DelDOT Functional Classification Maps.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">3.6.4.2.3       Casings are required for crossings of existing or proposed major entrances to commercial facilities or residential subdivisions. However, if an exception is granted, at such locations the minimum design shall be the same as the design requirements outlined in Section 3.6.4.3, or as approved by the District Public Works Section.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">3.6.4.2.4       Typically, jacked or bored installations of coated carrier pipes shall be cased unless assurance can be provided against damage to the protective coating.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">3.6.4.2.5       Consideration shall be given to encasement or other suitable protection for any pipeline</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">3.6.4.2.5.1        with less than minimum cover,</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">3.6.4.2.5.2         near footings of bridges or other highway structures,</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">3.6.4.2.5.3         across unstable or subsiding ground, or </span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">3.6.4.2.5.4        near other locations where hazardous conditions may exist.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">3.6.4.3        Exceptions To Casings</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">3.6.4.3.1       Suitable bridging, concrete slabs, or other appropriate measures should be used to protect existing uncased pipelines which by reason of shallow cover or location make them vulnerable to damage from highway construction or maintenance operations. Such existing lines may remain in place without further protection measures if they are of adequate depth and do not conflict with the highway construction or maintenance operations, provided both highway and utility officials are satisfied that the lines are, and will remain, structurally sound and operationally safe.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">3.6.4.3.2       High Density Polyethylene (HDPE) is under evaluation as an uncased carrier for natural gas.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">3.6.4.3.3       New uncased construction can be employed if approved by District Public Works for permit work or the Utilities Engineer for highway construction projects. The approval is acceptable when open cutting is approved, if necessary, and in the following circumstances:</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">3.6.4.3.3.1        The carrier is approved by the Department and conforms to the material and design requirements of the utility industry, governmental codes and standards, can support the load of the highway plus loads superimposed thereon when the pipe is operated under all ranges of pressure from maximum internal to zero pressure, with a higher factor of safety than normally required for cased construction. Carriers meeting these requirements can be used for the following installations provided a profile is submitted along with the plans for the following types of installations:</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">3.6.4.3.3.1.1          Natural Gas - utilities can employ welded steel pipe as an uncased carrier pipe with at least 42 inches of cover. All such pipes shall meet design requirements as outlined above. High Density Polyethylene (HDPE) is under evaluation as an uncased carrier.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">3.6.4.3.3.1.2          Water - The minimum requirements for waterline crossings shall be ductile iron pipe with an industry standard push joint and at least 42 inches of cover. All such ductile iron pipes shall meet design requirements as outlined above.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">3.6.4.3.3.1.3          Other Transmittants: A Department approved uncased crossing of welded steel pipelines carrying a transmittant which is flammable, corrosive, expansive, or unstable materials, particularly if carried at high pressure, may be permitted, provided additional protective measures are taken in lieu of casing. Such measures would employ higher factor of safety in the design, construction, and testing of the uncased carrier pipe, including such features as thicker wall pipe, radiograph testing of welds, hydrostatic testing, coating and wrapping, and cathodic protection</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">3.6.4.3.4       Suitable bridging, concrete slabs, or other appropriate measures shall be used to protect existing uncased pipelines which by reason of shallow cover or location make them vulnerable to damage from highway construction or maintenance operations.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">3.6.4.3.5       Any exceptions (aside from</span><b data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node=""> </span></b><span data-dcnode-id="1548" instrument_node="">those mentioned in Section 3.6.4.3.3.1) to the casing requirements shall be determined by the District Public Works Section, based upon a written request for the exception stating the hardship and proposed method of crossing. In requesting exceptions, the utility shall consider the Department's policy of no open cutting of a roadway within 5 years after it has been resurfaced, except for an emergency. In addition, there shall be no open cutting for service lateral crossings. Utilities shall also consider those areas where repairs would be restricted by lack of rights-of-way or easements.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">3.6.4.4       Permits For Casings</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">        In all situations where a casing is to be installed, the utility shall submit a plan describing the location, method, and type of casing for approval by the District Public Works Section.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">3.6.4.5       Placement Of Casing</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">3.6.4.5.1       Where casings are required, the location of the crossings must be determined carefully so that, if necessary, the utility can acquire sufficient right-of-way or private easements to remove or replace the utilities.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">3.6.4.5.2       Casings shall extend at least 5 feet beyond the curb, pavement, projected fill slopes, or ditch lines to assure proper support of roadways during any repairs to pipelines. For all access-controlled highways, the encasement shall extend from right-of-way line to right-of way line or outside outer curbs. The design shall encompass allowance for future widening of the highway without the need of utility adjustment.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">3.6.4.6       Types Of Casing</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Casings shall be designed to support the load of the highway and superimposed loads thereon and at least equal the structural requirements for highway drainage facilities. Corrugated materials shall not be allowed.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">3.6.4.6.1        Volatile Transmittant - The casings for facilities transmitting volatile materials must be of steel pipe of standard manufacture. The joints must be welded or fused sealed around the entire circumference of the pipe as industry standards and regulations allow.</span></p><span data-dcnode-id="1522" instrument_node="">
