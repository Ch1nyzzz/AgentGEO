</span><p class="body-l2" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">     In the concept phase, the Department Project Manager is responsible for defining the limits of the right-of-way necessary to construct, operate, maintain the highway and plan for utility relocation. To minimize design time and avoid costly revisions, the Project Manager shall consult with the Utilities Section early in the design process. The Project Manager collaborates with the assigned Utility Coordinator to determine potential utility impacts. The Project Manager and Utility Coordinator shall determine the extent and timing of utility designation.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p class="body-l2" data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">     The Utility Coordinator identifies existing utilities and contacts existing utility companies as necessary. The utility companies shall submit any easement or "prior rights" documentation to the Utilities Engineer. The purpose of the submittal is to establish a compensable interest if the utility is seeking reimbursement in accordance with </span><b data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Delaware Code</span></b><span data-dcnode-id="827" instrument_node="">. An executed agreement between the Department and the utility shall be in place for all eligible adjustments before any utility work can begin. Refer to Section 5.3 for more information regarding agreements.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p class="body-l2" data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">     Note: It is the sole responsibility of the utility to provide the documentation of a compensable interest and </span><b data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">not</span></b><span data-dcnode-id="821" instrument_node=""> the Department's responsibility to seek it.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p class="body-l3" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">5.1.1.1       Utility Designation</span></p><span data-dcnode-id="816" instrument_node="">
</span><p class="body-l3" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">        The Project Manager and the Utility Coordinator will determine whether utility designation will be performed through MISS UTILITY, a Subsurface Utility Engineering (SUE) consultant or if utility designation is not required. The Project Manager specifies the Federal Highway Administration (FHWA) quality level of the SUE process required for the design of the project. If test holes are required, the Project Manager also specifies the number of test holes needed. The FHWA quality levels are classified as follows:</span></p><span data-dcnode-id="813" instrument_node="">
</span><p class="body-l4" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">       Level D information is retrieved from existing utility records.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p class="body-l4" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">       Level C involves surveying visible aboveground utility facilities and correlating this information with existing utility records.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p class="body-l4" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">       Level B involves the use of surface geophysical techniques to determine the existence and horizontal position of underground utilities.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p class="body-l4" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">       Level A involves the use of non-destructive digging equipment at critical points to determine the precise horizontal and vertical position of underground utilities, as well as the type, size, condition, material, and other characteristics.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p class="body-l3" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">        The American Society of Civil Engineers Standard Guideline for the Collection and Depiction of Existing Subsurface Utility Data CI/ASCE 38-02 shall be followed for the classification and depiction of subsurface utility data.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p class="body-l3" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">        The results of the designation shall be forwarded to the Project Manager for incorporation into the plans and cross sections. The Project Manager, in coordination with the Utility Coordinator, shall determine which conflicts cannot be avoided and discuss alternatives with the affected utility company. The utility companies shall identify potential problems that could affect the project schedule at this stage of the plan development.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p class="body-l3" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">5.1.1.2       Subsurface Utility Engineering (SUE) Consultant</span></p><span data-dcnode-id="792" instrument_node="">
</span><p class="body-l3" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">        A Utilities Section SUE consultant or SUE consultant subcontracting to an approved Design Consultant may be utilized to acquire utility facility information. In all cases, the SUE consultant shall provide all information obtained from the approved tasks to the Project Manager, the approved Design Consultant for the project, and the DelDOT Utilities Section Coordinator. The SUE tasks may include utility designation, test holes, and coordination services. The SUE information includes, but is not limited to plans, test hole results, and review meetings.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p class="body-l3" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">        The utilities are required to provide or verify the designation information on their facilities regardless of the Department's use of a SUE consultant.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p class="body-l2" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">5.1.2    Survey Plans</span></p><span data-dcnode-id="783" instrument_node="">
</span><p class="body-l2" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">     The Project Manager will provide two sets of survey plans per utility to the Utility Coordinator for distribution to each utility company. The utility will identify its existing and known abandoned facilities on the plans, indicating whether they are aerial, surface, or buried underground. The utility will also include information indicating:</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">• the sizes of pipes,</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">• number of conduits,</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">• approximate depths of the facilities,</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">• private easements,</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">• any private services that may be affected,</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">• the identity of other utility company facilities (attached, housed, aerial or underground),</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">• any other information pertinent to the facilities,</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">• and any planned relocations or reconstruction to occur within the limits of the project.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p class="body-l2" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">     The utility company must return the information to the Utilities Section within 30 days of receipt unless a later date is agreed upon by the Project Manager and the utility representatives.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p class="body-l2" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">5.1.3    Preliminary Plans</span></p><span data-dcnode-id="750" instrument_node="">
</span><p class="body-l3" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">5.1.3.1       The Project Manager shall prepare preliminary plans showing the proposed alignment, typical sections, profile, schematic drainage alignment, existing right-of-way, proposed right-of-way, easements, clear zone, test hole data on cross-sections (if obtained), existing utility facilities from the survey data, and other details. The American Society of Civil Engineers Standard Guideline for the Collection and Depiction of Existing Subsurface Utility Data CI/ASCE 38-02 standards shall be followed for the classification and depiction of subsurface utility data.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p class="body-l3" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">5.1.3.2       The Project Manager will provide the Utilities Coordinator with two sets of preliminary plans to distribute to each utility involved in the project. If current, the utility information on the previously marked Survey plans will be shown on the preliminary plans.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p class="body-l3" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">5.1.3.3       The utility company is required to mark the preliminary plans with any additional right-of-way necessary for relocation of facilities. The following is typically requested with the marked Preliminary Plans:</span></p><span data-dcnode-id="741" instrument_node="">
</span><p class="body-l4" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">5.1.3.3.1       suggested design modifications that would eliminate relocations,</span></p><span data-dcnode-id="738" instrument_node="">
</span><p class="body-l4" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">5.1.3.3.2       description of utility relocations along with estimated timeframe for construction,</span></p><span data-dcnode-id="735" instrument_node="">
</span><p class="body-l4" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">5.1.3.3.3       list of stations and offsets where test holes are needed,</span></p><span data-dcnode-id="732" instrument_node="">
</span><p class="body-l4" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">5.1.3.3.4       identification of any permits that may be required, and</span></p><span data-dcnode-id="729" instrument_node="">
</span><p class="body-l4" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">5.1.3.3.5       information on any other utility's facilities located on its poles.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p class="body-l4" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">5.1.3.3.6       Joint Use or third party installation requirements.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p class="body-l3" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">5.1.3.4       A utility may be dependent upon another utility's plans and actions in order to complete the work. The Utility Coordinator should be made aware of this condition in order to ensure efficient coordination of the project.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p class="body-l3" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">5.1.3.5       The utility company owning the pole, duct system, etc is responsible for coordinating the relocation of any renters or lessees as required by the Telecommunication Act of 1996.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p class="body-l3" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">        The utility company shall return the proposed work plan on one set of plans provided by the Department within 30 days of receipt. If a site meeting is held, the plans will be returned within two weeks of the meeting. In either case, a later date may be agreed upon by the project manager and the utility representatives.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p class="body-l3" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">5.1.3.6       Coordination and Site Meeting</span></p><span data-dcnode-id="711" instrument_node="">
</span><p class="body-l3" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">        If a subsequent site meeting is held, the utilities shall return preliminary plans at the meeting or within two weeks of the meeting. The Utilities Section will forward a copy of the plans to the Project Manager.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p class="body-l3" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">        The Project Manager, in coordination with the Utility Coordinator and the utility company's representative, will review the preliminary plans for potential conflicts with existing utilities, and will determine which conflicts cannot be avoided. Any proposed signage or street lighting to be done in conjunction with the project shall also be reviewed and coordinated. If power lines must be relocated, the Project Manager shall coordinate the lighting needs, street lighting, signalization, traffic coordination installations, Traffic Impact Study (TIS) recommendations, etc. with the power company. DelDOT should apply for any necessary electric service from the utilities at this stage. If feasible, the utility poles may serve as light standards as well as carry the lines. Joint use agreements and location of DelDOT facilities shall be clarified as well.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p class="body-l3" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">5.1.3.7       Reimbursable Work</span></p><span data-dcnode-id="702" instrument_node="">
</span><p class="body-l3" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">        If reimbursable work is involved and the letter agreement has been executed, the utility shall provide a cost estimate for the preliminary engineering (PE). The Utilities Engineer may elect to waive a detailed cost estimate for Preliminary Engineering.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p class="body-l3" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">        The Utilities Engineer shall grant a notice to proceed for preliminary engineering upon Departmental authorization of funding. A notice to proceed must be issued before the utility begins preliminary engineering in order for the preliminary engineering costs to be considered reimbursable by the Department.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p class="body-l3" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">        Within 30 days of the issuance of the notice to proceed and receipt of preliminary plans, or the date agreed to by the Utilities Engineer, the utility company shall supply a Utility Plans, Specifications and Estimate (Utility PS&amp;E) package, consisting of plans, specifications, and estimate and four sets of marked color-coded plans. Utilities may submit color-coded plans electronically, however they must be printable on standard size paper. These plans indicate:</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">• existing to remain,</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">• existing to remove,</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">• proposed reimbursable and</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">• proposed non-reimbursable.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p class="body-l3" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Refer to Section 5.3 for further details on plan preparation and reimbursable work.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p class="body-l3" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">The Utilities Engineer will review the Utility PS&amp;E package and verify any proposed reimbursable work.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p class="body-l2" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">5.1.4    Semifinal Plans</span></p><span data-dcnode-id="672" instrument_node="">
</span><p class="body-l2" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">     The Project Manager will give the assigned Utility Coordinator two sets of semifinal plans to distribute to each utility involved in the project. Any unresolved conflicts with the proposed construction and the utility's proposed relocation scheme need to be resolved.</span></p><span data-dcnode-id="669" instrument_node="">
</span><p class="body-l2" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">     The proposed relocation plan will be shown on the semifinal plans with any corrections to existing facilities and submitted along with the utility company's proposed Utility Statement (Resume of proposed work).</span></p><span data-dcnode-id="666" instrument_node="">
</span><p class="body-l2" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">     The Utility Statement (Resume of proposed work), submitted by the utility company, shall contain:</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">• a description of the existing facilities;</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">• any proposed changes, adjustments, or relocations;</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">• the location, of the changes using station count and offsets;</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">• quantities of borrow Type C if necessary;</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">• the proposed time schedule (in calendar days) for completing the alterations, adjustments, or relocations for each phase of the Project's Sequence of Construction/ Maintenance of Traffic Plan; and</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">• Any other information that may impact the state's contractor.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p class="body-l2" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">     The utility will return one set of semifinal plans with the changes marked, the proposed relocation plan, and their proposed Utility Statement to the Utilities Engineer within thirty (30) days of receipt unless a coordination meeting is requested. If a coordination meeting is scheduled, the plans should be returned within two weeks of the meeting. In either case, a later date may be agreed upon by the project manager and the utility representatives. The Utilities Engineer will verify any proposed reimbursable work.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p class="body-l2" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">     The DelDOT Project Utility Statement is subsequently prepared from all of the Utility Statements submitted by each of the public utilities. The DelDOT Project Utility Statement includes construction phases in which the work will occur and may include a list of locations for open cutting of roads. The Utilities Engineer will forward the DelDOT Project Utility Statement to the Project Manager. The applicable proposed relocation plans will also be forwarded.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p class="body-l2" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">     The DelDOT Project Manager shall generate a bar chart showing the road construction sequencing and how it coordinates with the utility relocation sequencing. The Utilities Engineer with the concurrence of the Project Manager and Regional Construction Engineer may waive the bar chart requirement for minor projects. </span></p><span data-dcnode-id="636" instrument_node="">
</span><p class="body-l2" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">     The Project Utility Statement shall be submitted with the bar chart to construction. The Project Manager shall include the utility costs in the project cost estimate and append a construction sequencing bar chart, which does not contain specific dates. The following note shall be placed on the bar chart:</span></p><span data-dcnode-id="633" instrument_node="">
</span><p class="body-l2" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">     "The information shown in the Contract Documents, including the Utility Statement and the Utility Schedule contained herein, concerning the location, type and size of existing and proposed utilities, their locations, and construction timing has been compiled by the preparer based on information furnished by each of the involved Utility Companies. It shall be the responsibility of the State's Contractor to verify all information and coordinate with the Utility Companies prior to and during construction, as specified in Section 105.09 of the Standard Specifications." Other general notes referencing contractor expectations to be included on the DelDOT Utility Statement are shown in Appendix H.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p class="body-l2" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">     The Project Manager shall sign approval of the DelDOT Utility Statement and return it to the Utilities Engineer.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p class="body-l2" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">     If necessary, a coordination meeting will be scheduled with affected utility companies to review the Utility Statements and sequencing bar chart. Utility companies shall modify their Utility Statements based upon the coordination meeting. Final Utility Statements from the utility companies are to be submitted to DelDOT within 30 days of the meeting so that a revised DelDOT Utility Statement can be prepared.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p class="body-l2" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">5.1.5    Final Plans</span></p><span data-dcnode-id="621" instrument_node="">
</span><p class="body-l2" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">     When the plans are completed and the project is advertised, one set of final plans will be forwarded to each utility involved in the project. The Construction Engineer shall issue the notice to proceed with the relocation of facilities at or following the Preconstruction meeting.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p class="body-l2" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">     For reimbursable alterations, adjustments, or relocations, the Utilities Engineer shall notify the utility, Project Manager, and Construction Region when the proposed utility work has been authorized. The Utilities Engineer will also direct the utility to proceed with its alterations, adjustments, or alterations. See Section 5.3 for further details.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p class="body-l1" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">5.2   Non-reimbursable Work</span></p><span data-dcnode-id="612" instrument_node="">
</span><p class="body-l3" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Adjustments to utility facilities occupying highway right-of-way by Master Franchise are not eligible for reimbursement. Exceptions are discussed in Section 55.3. If the facilities have to be relocated due to the Department's project, the Department will provide right-of-way for relocation of the facilities. The relocation of the utility facilities will be at the sole expense of the utility.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p class="body-l1" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">5.3   Reimbursable Work </span></p><span data-dcnode-id="606" instrument_node="">
</span><p class="body-l2" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">5.3.1    Utility Reimbursement on Highway Construction Projects</span></p><span data-dcnode-id="603" instrument_node="">
</span><p class="body-l2" data-dcnode-id="592"><span data-dcnode-id="602" instrument_node="">     Section 143, Title 17, </span><b data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Delaware Code</span></b><span data-dcnode-id="599" instrument_node=""> determines the policies governing expenses of utility adjustments, removals, and relocations. A copy of Section 143 is located in Appendix F. The most recent copy of the </span><b data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Delaware Code</span></b><span data-dcnode-id="596" instrument_node=""> may be found at Online </span><b data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Delaware Code</span></b><span data-dcnode-id="593" instrument_node=""> at http://www.delcode.state.de.us/.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p class="body-l2" data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">     Utilities are required to use the procedures established by FHWA for reimbursement. These are explained in the U.S. Department of Transportation Federal Highway Administration Program Guide</span><b data-dcnode-id="588"><span data-dcnode-id="589" instrument_node=""> </span></b><span data-dcnode-id="587" instrument_node="">Utility Relocation And Accommodation on Federal-Aid Highway Projects including amendments.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p class="body-l3" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">5.3.1.1      Funding</span></p><span data-dcnode-id="582" instrument_node="">
</span><p class="body-l3" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">        The State shall fund adjustments, alterations, or relocations caused by DelDOT reconstruction, construction, relocation, repair, or maintenance of a public highway in the following circumstances:</span></p><span data-dcnode-id="579" instrument_node="">
</span><p class="body-l4" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">5.3.1.1.1       Governmental Facilities - The facilities are owned and/or operated by a public utility of a municipality or of any governmental body or political subdivision of the State.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Appendix B - Agreement 86U-04</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Appendix B - Agreement 86U-05</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Appendix B - Agreement 86U-06</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Appendix B - Agreement 86U-07</span></p><span data-dcnode-id="564" instrument_node="">
</span><p class="body-l4" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">5.3.1.1.2       Court of Chancery Decision - The facility is private but located on fee simple real estate owned by the utility, or on a documented easement granted by a third party to the utility.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Appendix B - Agreement 86U-04</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Appendix B - Agreement 86U-05</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Appendix B - Agreement 86U-06</span></p><span data-dcnode-id="552" instrument_node="">
</span><p class="body-l4" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">        If the utility is the owner of the right-of-way in fee-or if the facility is located legally on private property-and this property is acquired by the State for the reconstruction of a highway or structure, the State will assume liability for the cost of altering, adjusting, or relocating the existing facilities. The utility must provide documentation in the form of a copy of the record from the Recorder of Deeds. The utility may request "prior rights" rather than compensation by the Department before the Department extinguishes the existing easement. Documentation must be completed by DelDOT Real Estate personnel and subsequently submitted to the Recorder of Deeds in the county in which said facilities are located.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p class="body-l4" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">5.3.1.1.3       "Prior Rights" - The utility may have "prior rights". Prior rights exist when a utility is determined to have legally occupied a public right-of-way prior to the time such right-of-way was conveyed to or acquired by the Department. Please see Section 5.3.3 for further details.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p class="body-l4" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">5.3.1.1.4       "Second Move" - The Department requires a second alteration or relocation of the same nongovernmental public utility facility within ten years from the date of completion of the initial alteration or relocation.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">        Appendix B - Agreement 86U-38</span></p><span data-dcnode-id="540" instrument_node="">
</span><p class="body-l4" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">5.3.1.1.5       Change in Plans - The Department alters its plan of construction before project completion, requiring a nongovernmental public utility to relocate its facility that has already been partially or fully relocated in connection with the project. The Department shall reimburse the public utility for the cost of altering or relocating in relation to the change in the Department plans. An approved Utility PS&amp;E is required before a notice to proceed for this work can be issued.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">        Appendix B - Agreement 86U-38</span></p><span data-dcnode-id="534" instrument_node="">
</span><p class="body-l4" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">5.3.1.1.6       Delay - The Department cancels or does not commence a highway construction, reconstruction, relocation, repair, or maintenance project within a period of two (2) years from the date of authorization to proceed with nongovernmental utility work.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">        Appendix B - Agreement 86U-38</span></p><span data-dcnode-id="528" instrument_node="">
</span><p class="body-l4" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">5.3.1.1.7       Temporary Facilities - The Department requests a temporary alteration or relocation of the nongovernmental public utility facility. For example, if facilities need to be relocated temporarily for a bridge replacement and will need to be moved again when the construction project is complete.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">        Appendix B - Agreement 86U-38</span></p><span data-dcnode-id="522" instrument_node="">
</span><p class="body-l4" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">        The amount of reimbursement to be paid to a public utility in Section 5.3.1.1 is the entire cost of alteration or relocation minus any betterment of the altered or new facility and any salvage value derived from the old facility.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p class="body-l3" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">5.3.1.2       Discretionary Funding</span></p><span data-dcnode-id="516" instrument_node="">
</span><p class="body-l3" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">        Decisions to fund utility relocations and adjustments in the following circumstances are left to the discretion of the Secretary of Transportation. The Department may enter into an agreement with a nongovernmental public utility by reason of highway construction, reconstruction, relocation, repair, or maintenance project as follows:</span></p><span data-dcnode-id="513" instrument_node="">
</span><p class="body-l4" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">5.3.1.2.1       Special Circumstances - The Department may enter into an agreement with a nongovernmental public utility to reimburse for up to 50% for alterations or relocation if the facility is located within a highway right-of-way or public right-of-way by grant or franchise. The alteration or relocation must be necessitated by special circumstances with written approval from the Secretary of the Department of Transportation. A copy of the written determination of the Secretary shall be forwarded to the Public Service Commission for filing with the public records of the Commission.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">        Appendix B - Agreement 86U-36</span></p><span data-dcnode-id="507" instrument_node="">
</span><p class="body-l4" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">5.3.1.2.2       Unique Materials - The Department may enter into an agreement if the nongovernmental public utility construction specifications require the use and/or storage of unique materials or supplies in advance of the construction contract.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">        Appendix B - Agreement 86U-37</span></p><span data-dcnode-id="501" instrument_node="">
</span><p class="body-l4" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">5.3.1.2.3       Advance Move - If the Department determines it is beneficial, the Department may enter into an agreement to reimburse a nongovernmental public utility for increased expenses incurred as a result of alteration or relocations of a facility in advance of the commencement of a highway construction, reconstruction, relocation, repair or maintenance project.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">        Appendix B - Agreement 86U-37</span></p><span data-dcnode-id="495" instrument_node="">
</span><p class="body-l4" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">5.3.1.2.4       State Contractor - The Department may enter into an agreement with a nongovernmental public utility for work to be performed by the state contractor or subcontractor for specific facility alteration or relocation construction items identified and approved for construction. As part of the agreement, the public utility must agree to reimburse the Department or the Department's contractor or subcontractor for the construction items.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">        Appendix B - Agreement 86U-39</span></p><span data-dcnode-id="489" instrument_node="">
</span><p class="body-l4" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">5.3.1.2.5       Net Cost Savings Enhancement - The Department may enter into an agreement with a nongovernmental public utility to reimburse the utility for a specific facility enhancement if in the judgment of the Department, the enhancement will result in net cost savings to the Department, will expedite the project, or will otherwise result in increased public benefit and convenience.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">        Appendix B - Agreement 86U-39</span></p><span data-dcnode-id="483" instrument_node="">
</span><p class="body-l4" data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">5.3.1.2.6       Support and Protection - The Department may enter into an agreement to reimburse the utility to design and inspect facility Support and Protection as necessary per the OSHA Technical Manual Section V Chapter 1 and the </span><b data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Delaware Code</span></b><span data-dcnode-id="479" instrument_node=""> Title 26 Section 806. Costs shall be reimbursed on a force account basis.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">        Appendix B - Agreement 86U-04</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">        Appendix B - Agreement 86U-05</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">        Appendix B - Agreement 86U-06</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">        Appendix B - Agreement 86U-07</span></p><span data-dcnode-id="465" instrument_node="">
</span><p class="body-l2" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">5.3.2    Betterment</span></p><span data-dcnode-id="462" instrument_node="">
</span><p class="body-l4" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Betterment is defined as any upgrade to a facility being relocated, made solely for the benefit of and at the election of the utility and not attributable to highway construction as determined by the Utilities Engineer. The cost of a betterment or increased size in facilities is only reimbursable in accordance with FHWA regulations  (Program Guide: Utility Relocation and Accommodation on Federal Aid Highway Projects and Code of Federal Regulations Title 23 Part 645) or as allowed by specific agreements enabled by Delaware law.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p class="body-l4" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">When seeking reimbursement with betterment involved, the utility shall submit two (2) Utility PS&amp;E packages. The first detailed estimate with color-coded plans indicates relocation or adjustment in kind and the second shows the facility size increase or betterment. Right-of-way acquisition and salvage value shall be included where applicable on all estimates. Refer to Appendix C for details.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p class="body-l2" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">5.3.3    Prior Rights</span></p><span data-dcnode-id="453" instrument_node="">
</span><p class="body-l4" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Prior Rights, as mentioned above, exists when a utility's existing facilities have a compensable right to be located on DelDOT right-of-way. Prior Rights occur in the following circumstances:</span></p><span data-dcnode-id="450" instrument_node="">
</span><p class="body-l3" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">5.3.3.1       The utility facility was constructed on private property through a recorded easement of record in the Recorder of Deeds office and the facility and its easement are encompassed by a DelDOT project.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p class="body-l3" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">5.3.3.2       The utility facility was relocated onto or remained in DelDOT right-of-way under a previous project and at the time, it was agreed that if it became necessary to relocate for a future transportation project, the cost would be borne by the project participants. (For proper documentation of this right, the utility must furnish a copy of the utility agreement stating the arrangement previously agreed to by DelDOT.)</span></p><span data-dcnode-id="444" instrument_node="">
</span><p class="body-l3" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">        In cases of Prior Rights, the Department must approve all documentation. A flowchart of the process is located in Appendix K.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p class="body-l3" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">        Utilities normally do not have compensable interest or "Prior Rights" in subdivisions. The right-of-way in subdivisions belongs to the State upon recordation.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p class="body-l2" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">5.3.4    Reimbursable Work Process</span></p><span data-dcnode-id="435" instrument_node="">
</span><p class="body-l2" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">     During the process of plan review discussed in Section 5.1, reimbursable work may be discovered. If the utility and the Utilities Section agree that reimbursable work will be involved, then the following must occur:</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">• The State and the utility shall agree in writing as to the obligations and responsibilities of each party.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">• The agreement shall incorporate the conditions of occupancy for each party. The agreement shall also include the rights vested in the State and the rights and privileges retained by the utility.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">• The interest to be acquired by or vested in the State in any portion of the rights-of-way of a highway project to be used, occupied, or vacated by utilities shall be adequate in nature and extent for the construction, safe operation, and maintenance of the project.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p class="body-l2" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">5.3.5    Utility Adjustment Agreements</span></p><span data-dcnode-id="420" instrument_node="">
</span><p class="body-l2" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">     Utility alteration, adjustment, or relocation agreements are used where the Department will be responsible for the cost of the work. An executed agreement shall be in place before any work begins when State and/or federal funds are used to pay for all or part of eligible utility adjustments. Samples of these letter agreements can be found in Appendix B.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p class="body-l3" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">5.3.5.1      Agreement Requirements</span></p><span data-dcnode-id="414" instrument_node="">
</span><p class="body-l3" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">       Utility adjustment agreements must include:</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">• the incorporating limits or areas to be served;</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">• the responsibility of each party;</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">• the terms and conditions regarding the relocation, adjustments, or reconstruction;</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">• the action to be taken in case of noncompliance with State requirements; and</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">• other provisions as deemed necessary to comply with State laws and regulations.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p class="body-l3" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">       Work incidental to utility relocations shall be performed by the utility with its own forces including a utility's open-end and/or continuing construction contractor, or by an approved utility contractor, unless such work is included in the Department's construction contract by separate agreement. When a utility obtains a contractor for the relocation work, the utility, federal and state regulations apply.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p class="body-l3" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">5.3.5.2      Preparation of Agreements</span></p><span data-dcnode-id="390" instrument_node="">
</span><p class="body-l3" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">       When it is determined that a utility is to be reimbursed by the Department for a utility adjustment, the Utilities Section will prepare a letter agreement. The agreements are based upon State law and Court of Chancery decisions authorizing reimbursement, the type of ownership of the utility, state and/or federal participation, and the process for design and installation. Appendix B provides samples of letter agreements used by the Department.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p class="body-l3" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">       The Utilities Section will prepare the appropriate letter agreement for adjustment work. The agreement will include preliminary engineering that may be accomplished as part of the Department's project, either by the utility's own forces or by its contractor. The preliminary engineering is considered part of the Department's project because the existing locations and the proposed adjustments or relocations are incorporated in the Department's construction plans.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p class="body-l3" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">       The proposed letter agreement is forwarded to the Department's Deputy Attorney General for review/signature and/or comments. Any changes made by the attorney are incorporated in the agreement. Four original letter agreements are forwarded to the utility for signature and seal affixation, and returned to the Utilities Engineer. The Chief Engineer or the Assistant Director of Engineering Support as designee provides signature approval with the final authorization provided by the Director of Technology and Support Services. The agreement is considered executed when the Department's seal is affixed.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p class="body-l3" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">       The distribution of the executed agreement is as follows:</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">• original to the Director of Technology and Support Services,</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">• original to the utility,</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">• original to DelDOT Finance (upon funding authorization request, i.e. Utility PS&amp;E submission) and</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">• original retained by the Utilities Section.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">• Executed agreements are a part of the Utility PS&amp;E submissions. The approved estimate and color-coded plans of the work involved are attached and considered part of the agreement.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p class="body-l3" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">5.3.5.3      Utility Plan Preparation</span></p><span data-dcnode-id="360" instrument_node="">
</span><p class="body-l3" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">        The Project Manager will furnish the Utilities Engineer with construction plans and cross-sections for review. When reimbursable work is involved, the plans shall be used by the utility to estimate the scope of the utility work to be done. Reimbursable work is described in Section 5.3. The utility shall submit the preliminary engineering (PE) estimate for any engineering required to design the alteration, adjustments and/or relocation. The Department Utilities Engineer may elect to waive a detailed cost estimate for preliminary engineering. A sample of the engineering estimate is located in Appendix C.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p class="body-l3" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">        Utilities are required to use the procedures established by FWHA for reimbursement. The procedures are explained in the U.S. DOT FHWA Program Guide: Utility Relocation And Accommodation on Federal-Aid Highway Projects including amendments and the Federal-Aid Policy Guide (FAPG) Code of Federal Regulations Title 23.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p class="body-l3" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">        The PE estimate shall become part of the letter agreement mentioned above in Section 5.3.5.2. When the PE estimate is approved, a notice to proceed will be provided to the utility to begin the design for the adjustments and/or relocations. The utility shall prepare the Utility Plans, Specifications and Estimate (Utility PS&amp;E) for the relocation or adjustment and forward them to the Utilities Engineer for review.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p class="body-l3" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">        Once the Utility PS&amp;E package is reviewed and approved, it is forwarded to DelDOT Finance for funding authorization and approval. The Utilities Section must issue a notice to proceed before the utility can begin construction work. Any work performed prior to notice to proceed shall be at the sole expense of the utility.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p class="body-l3" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">5.3.5.4      Employment of a Consultant for Utility PS&amp;E</span></p><span data-dcnode-id="345" instrument_node="">
</span><p class="body-l3" data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">        As mutually agreed to by the Department and utility, preliminary engineering activities associated with utility relocation work may be done by an engineering consultant selected by the utility, with the approval of the Department. A utility must submit a letter to the Utilities Engineer requesting authorization to obtain a consultant to provide preliminary engineering services for utility relocations. The request shall state the type of work the consultant is expected to perform during the utility relocation for the project-i.e., prepare utility plans, specifications, estimates; inspect materials; and supervise work. The request shall meet the provisions established by federal procurement regulations of the U.S. DOT FHWA, and the applicable regulations of the Program Guide: Utility Relocation and Accommodation on Federal-Aid Highway</span><b data-dcnode-id="342"><span data-dcnode-id="343" instrument_node=""> </span></b><span data-dcnode-id="341" instrument_node="">Projects. Federal funds may participate in the cost of such services performed under existing written continuing contracts when it is demonstrated that such work is performed regularly for the utility in its own work and that the costs are reasonable.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p class="body-l3" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">        When a consultant is to prepare the Utility Plans, Specifications and Estimates, the utility must provide the DelDOT Utilities Engineer with preliminary plans, estimates, and a fee schedule from the consultant for performing the work. (The utility is required to review and approve the data before submitting it to the Utilities Engineer.) After Departmental review, the information may be forwarded to FHWA for concurrence.</span></p><span data-dcnode-id="336" instrument_node="">
</span><p class="body-l3" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">        When the estimate and other data are acceptable to the State (and to FHWA, if applicable) the utility is notified to prepare and submit to the Utilities Engineer the specifications, estimates, and a draft of the contract between the responsible consultant and the utility. The draft must stipulate the work to be done under the agreement and the method of payment for preparing the Utility PS&amp;E package.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p class="body-l3" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">        A consultant fee that is based on a percentage of the work to be performed will not be approved.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p class="body-l3" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">        When federal participation is involved in a highway construction project, the agreement with the consultant shall conform to federal procurement regulations and appropriate U.S. DOT regulations. Upon approval of the draft, the State may authorize the utility to execute the agreement with the consultant.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p class="body-l3" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">5.3.5.5      Processing Utility PS&amp;E Packages</span></p><span data-dcnode-id="324" instrument_node="">
</span><p class="body-l4" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">5.3.5.5.1       The Utility Plans, Specifications and Estimates (Utility PS&amp;E) submitted by the utility shall include:</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">• Utility Statement (See Section 5.1.4)</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="317" instrument_node="">• a detailed estimate of the work to be performed. See Appendix C for sample. </span><b data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Note: </span></b><span data-dcnode-id="314" instrument_node="">Other colors can be used provided they are legible and clearly labeled in the legend.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">• marked color coded plans indicating:</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">• existing to remain (green)</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">• existing to be removed (red)</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">• proposed reimbursable (blue) </span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">• proposed non-reimbursable (yellow)</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">• the terms under which the utility is to cross or otherwise occupy the highway rights-of-way;</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">• a description of the size, type, nature, and extent of each utility company's facility to be located within the highway rights-of-way;</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">• a description of each installation's construction requirements, traffic protection, maintenance, access restrictions, and any special conditions;</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">• adequate drawings or sketches that show the existing and proposed locations of the utility facility, including the:</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">• facility locations within the highway right-of-way with respect to the existing or planned DelDOT improvement, the traveled way, or the right-of-way, and</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">• control-of-access lines and approved access points; and</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">• the responsibilities of the utility for future adjustments of its facilities in order to accommodate Departmental improvements.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p class="body-l4" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">5.3.5.5.2       Four complete Utility PS&amp;E packages shall be forwarded to the Utilities Engineer. The utility may in submit the color-coded Utility PS&amp;E package electronically if in an acceptable format. Upon review and approval of the package for completeness and accuracy by the Utilities Engineer, the Utilities Section requests funding authorization and notifies the Project Manager. One copy of the Utility PS&amp;E package is forwarded to the Construction Region for their use in concurring that the work is done in accordance with the Utility PS&amp;E. See Section 5.4.4 for information regarding inspections.</span></p><span data-dcnode-id="273" instrument_node="">
</span><p class="body-l1" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">5.4   Construction Coordination</span></p><span data-dcnode-id="270" instrument_node="">
</span><p class="body-l2" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">5.4.1    Authorization Of Utility Work</span></p><span data-dcnode-id="267" instrument_node="">
</span><p class="body-l2" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">     The Utilities Engineer will notify the utility, Project Manager and Construction Region when the proposed utility work has been authorized. The Construction District directs the utility to proceed with its alterations, adjustments, or relocations.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p class="body-l2" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">     When State or federal funds will pay all or part of the costs of adjustments, all work done by the utility's own forces shall be on a force account basis.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p class="body-l2" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">     When a utility's request to perform the work by competitive bid has been approved, the following steps shall be taken:</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">• Two copies of the bid tabulation, with the preliminary estimate included, are forwarded to the Utilities Engineer.</span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">• One copy of the bid tabulation is forwarded to FHWA, if applicable.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">• After approval from the State and FHWA, (if applicable) the utility is instructed to award the contract.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">• An executed copy of the contract between the utility and the contractor is furnished to the Utilities Engineer.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p class="body-l2" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">     When a utility requests permission to perform the work with a current continuing contract, using an outside contractor, the following shall take place:</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">• The request is supported by an estimate based on the applicable contract unit prices.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">• After approval by the State and FHWA, (if applicable) the utility is instructed to proceed with the work.</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">• An executed copy of the contract between the utility and its contractor is furnished to the Utilities Engineer.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p class="body-l2" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">5.4.2    Coordination During Construction</span></p><span data-dcnode-id="231" instrument_node="">
</span><p class="body-l3" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">5.4.2.1       Utility Preconstruction Conferences </span></p><span data-dcnode-id="228" instrument_node="">
</span><p class="body-l3" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">        Representatives of each utility having facilities within the project limits, along with representatives of the contractor, may be required to meet with the Construction Region Engineer's representative to discuss in detail the effect that each utility's adjustment or relocation will have on the progress of the project.</span></p><span data-dcnode-id="225" instrument_node="">
</span><p class="body-l3" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">5.4.2.2       Preconstruction Conferences</span></p><span data-dcnode-id="222" instrument_node="">
</span><p class="body-l3" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">        The Construction Region Engineer will notify the appropriate utilities, the "Miss Utility" Center, and the "Miss Utility" Representative, as to the place, time, and date that a preconstruction conference will be held.</span></p><span data-dcnode-id="219" instrument_node="">
</span><p class="body-l3" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">5.4.2.3       Contractor's Schedule</span></p><span data-dcnode-id="216" instrument_node="">
</span><p class="body-l3" data-dcnode-id="211"><span data-dcnode-id="215" instrument_node="">        The utility work on Department projects most often occurs simultaneously with the contractor's work and thus requires coordination. When this coordination is via a project utility meeting, a utility representative is required to attend. The utility and the contractor shall cooperate in scheduling work so that neither one is delayed by the other's operations. In addition, all traffic control for utility work must be performed according to DelDOT's </span><i data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Traffic Control Manual </span></i><span data-dcnode-id="212" instrument_node="">(Traffic Controls for Streets and Highways Construction, Maintenance, and Utility Operations) and coordinated with the immediate DelDOT project supervisor. This will be done to avoid conflicts and unnecessary disruptions in traffic flows through construction projects.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p class="body-l3" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">        The utility is required to attend progress meetings called by the Construction Region Engineer or a designated representative to review progress on certain projects.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p class="body-l2" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">5.4.3    Revisions</span></p><span data-dcnode-id="204" instrument_node="">
</span><p class="body-l2" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">     This section refers to changes required to the plans or estimates after the notice to proceed is given. Occasionally, field conditions necessitate revision to a utility's approved plan of adjustment or relocation.</span></p><span data-dcnode-id="201" instrument_node="">
</span><p class="body-l3" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">5.4.3.1       Revision to Construction Project</span></p><span data-dcnode-id="198" instrument_node="">
</span><p class="body-l3" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">        Changes to Construction Projects and their impact on utility relocation costs shall be carefully considered before proceeding. Refer to the Section 5.3.1.1 summary of reimbursement to public utilities for "Second Moves" and "Change in Plans." The time involved, material availability, additional labor and utility costs shall be evaluated before changes are pursued.</span></p><span data-dcnode-id="195" instrument_node="">
</span><p class="body-l3" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">        The Utilities Engineer, Construction Engineer, and the Project Manager shall review any project plan revisions. Their approval is necessary in order to proceed with the revision.</span></p><span data-dcnode-id="192" instrument_node="">
</span><p class="body-l3" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">5.4.3.2       Revision of Utility Plans and Estimates</span></p><span data-dcnode-id="189" instrument_node="">
</span><p class="body-l3" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">        The utility shall forward a copy of the revised plan and/or estimate and the justification for the change for approval by the Utilities Engineer. Upon approval of the change, the Utilities Section shall request additional funds to cover the added cost.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p class="body-l3" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">5.4.3.3       Change Orders</span></p><span data-dcnode-id="183" instrument_node="">
</span><p class="body-l3" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">        The Construction Region Engineer shall send copies of all change order correspondence and copies of all correspondence directed to the utilities, to the Utilities Engineer.</span></p><span data-dcnode-id="180" instrument_node="">
</span><p class="body-l2" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">5.4.4    Progress Inspections</span></p><span data-dcnode-id="177" instrument_node="">
</span><p class="body-l2" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">     Representatives of the Construction Region Engineer are responsible for inspecting the work performed by the utility including any utility work in advance of construction. Inspectors will monitor the material used, equipment used, and number and classification of personnel working at the location; and will keep daily logs showing a record of the same.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p class="body-l1" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">5.5   Payment for Work </span></p><span data-dcnode-id="171" instrument_node="">
</span><p class="body-l2" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">5.5.1    Progress Payments</span></p><span data-dcnode-id="168" instrument_node="">
</span><p class="body-l3" data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">5.5.1.1       Utility Billing</span></p><span data-dcnode-id="165" instrument_node="">
</span><p class="body-l3" data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">        The utility may submit progress billings for costs incurred after the executed utility agreement has been approved and notice to proceed has been received. The utility may also submit progress billings for the cost of materials stockpiled at the project site or specifically purchased and delivered to the utility for use on the project following similar approval. Any materials purchased or work performed prior to written authorization from the Utilities Engineer shall be done at the Company's sole expense. All invoices shall conform to the provisions of the Federal-Aid Policy Guide (FAPG): Code of Federal Regulations, Title 23, Part 645.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p class="body-l3" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">        Billing documents shall be submitted to the Utilities Section. The Utilities Section forwards the invoice to the Construction Region Engineer for verification of work accomplished. The Utilities Section processes the payments after verification in accordance with Section 5.5.5.2.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p class="body-l3" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">5.5.1.2       DelDOT Billing Utility</span></p><span data-dcnode-id="156" instrument_node="">
</span><p class="body-l3" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">        When the Department agrees for utility alteration or relocation work to be performed by the state contractor or subcontractor, the Department may submit progress billings.</span></p><span data-dcnode-id="153" instrument_node="">
</span><p class="body-l2" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">5.5.2    Final Payment</span></p><span data-dcnode-id="150" instrument_node="">
</span><p class="body-l3" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">5.5.2.1       Final Bill From Utility</span></p><span data-dcnode-id="147" instrument_node="">
</span><p class="body-l3" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">        A final and complete billing of all costs incurred will be made by the utility within six months from the last chargeable day of the project in compliance with the executed agreement. The statement of billing must follow the order of the items in the Utility PS&amp;E identified as part of the executed letter of the agreement between the State and the utility. The statement shall be itemized to show:</span></p><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">• the State Contract Number, Federal-Aid Project Number, project location and the executed Utility Agreement Number,</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">• A brief description of work performed, identifying the Utility PS&amp;E submission incorporated in project limits,</span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">• the date on which the last work was performed on the last item of billed expense,</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">• a statement from the utility that it has or has not been paid in full for all reimbursable work performed,</span></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">• the totals for each of the following costs: labor, overhead costs, travel expenses, transportation, equipment, handling costs, material and supplies, and other services,</span></p><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">• salvage credits from recovered and replaced permanent material and recovered temporary material,</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">• the replacement cost or the original charge for temporary use of material,</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">• the location where the records and accounts billed can be audited, and the name of a contact person for auditing purposes,</span></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">• a copy of the as-built plans, and</span></p><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">• the final invoice specifying "final" and containing a summary of total project costs billed.</span></p><span data-dcnode-id="114" instrument_node="">
</span><p class="body-l3" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">5.5.2.2      Final Payment Process</span></p><span data-dcnode-id="111" instrument_node="">
</span><p class="body-l3" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">        The utility shall provide three copies of the final invoice along with as-built plans. The final billing will be processed in the following steps:</span></p><span data-dcnode-id="108" instrument_node="">
</span><p class="body-l4" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">5.5.2.2.1       The Utilities Section will check the final billing for accuracy and adequate support documentation.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p class="body-l4" data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">5.5.2.2.2       The Utilities Section will review the documentation to assure that all items are eligible for State participation.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p class="body-l4" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">5.5.2.2.3       The Utilities Section will forward billing and as-built plans to the Construction Region Engineer for verification that all work covered by the final billing has been satisfactorily completed.</span></p><span data-dcnode-id="99" instrument_node="">
</span><p class="body-l4" data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">5.5.2.2.4       The Utilities Section will process the final billing for payment after verification by the Construction Region Engineer.</span></p><span data-dcnode-id="96" instrument_node="">
</span><p class="body-l4" data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">5.5.2.2.5       DelDOT Audit is responsible for administering a final audit predicated on the relevant agreement and billing data upon notification and audit request from the Utilities Section.</span></p><span data-dcnode-id="93" instrument_node="">
</span><p class="body-l4" data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">5.5.2.2.6       DelDOT Audit will forward a copy of the completed audit report to the Utilities Section.</span></p><span data-dcnode-id="90" instrument_node="">
</span><p class="body-l4" data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">5.5.2.2.7       The Utilities Section will inform the utility of the audit findings. The utility phase of the project is closed out after the Department notifies the utility that it accepts the project.</span></p><span data-dcnode-id="87" instrument_node="">
</span><p class="body-l4" data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">        The project's administrative documents shall be closed out and funds terminated within one year of the last chargeable day of the projects. Exceptions will be approved if the Utilities Section is notified in writing of a pending invoice prior to last chargeable day.</span></p><span data-dcnode-id="84" instrument_node="">
</span><p class="citation" data-dcnode-id="81"><span data-dcnode-id="82" style="font-size: small"><span data-dcnode-id="83" instrument_node="">10 DE Reg. 1730 (05/01/07)</span></span></p><br data-dcnode-id="80"><span data-dcnode-id="79" instrument_node="">
