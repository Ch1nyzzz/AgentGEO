</span><p class="body-l4" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">3.6.4.6.2        Non-Volatile Transmittant - The casings for facilities transmitting non-volatile materials may be of standard material such as steel pipe. Other usable materials must be of a design to sustain the live and dead loads currently used in Delaware highway design. Such materials include reinforced concrete pipe, cast iron pipe, aluminum pipe, and ductile iron pipe.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">3.6.4.7       Casing Installation</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">3.6.4.7.1       All pipeline installations must conform to the applicable regulations pertaining to the type of installation being constructed. When a pipeline casing is placed under a roadway, all installations are to be made by jacking, push-augering, or other approved methods. If coated pipe is used for jacking or boring, the same pipe should not be used as a carrier pipe.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">3.6.4.7.2       A typical layout for jacking through a roadway is shown in Figure 2-1. Appropriate traffic control measures shall be used in accordance with DelDOT's </span><i data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Traffic Control Manual </span></i><span data-dcnode-id="1509" instrument_node="">due to the reduction in shoulder use by the traveling public caused by jacking operations.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">3.6.4.7.3       Other requirements for installation are as follows:</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">3.6.4.7.3.1        Non-Metallic Pipe - Installations of non-metallic pipe must include a tracer material that is detectable by locating devices that are acceptable within the industry.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">3.6.4.7.3.2        Depth of Casing - The minimum cover required over casings is 42 inches, as measured from the top of the casing. The critical control for the depth of cover on a non-cased pipeline crossing is the low point in the highway cross-section. Normally, this is the bottom of the longitudinal ditch. Additional protection shall be provided for any pipeline with less then minimal cover.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">3.6.4.7.3.3        Clearances - All utilities shall be separated from one another as required by appropriate codes and ordinances.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">3.6.4.7.3.4        Sealing of Casing - Casing pipe over 4 inches in diameter must be sealed. Where carrier pipes that carry combustibles are cased, the casing pipes must be provided with a screened vent on each end that is as near as feasible to the right-of-way boundaries.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">3.6.4.7.3.5        Drains - Drains shall be provided for casings and tunnels enclosing carriers of liquid, liquefied gas, or heavy gas. Drains may not outfall into roadside ditches. Such outfall shall not be used as a wasteway for purging the carrier unless specifically authorized by a National Pollutant Discharge Elimination System (NPDES) permit.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">3.6.4.7.3.6        Vents - Where carrier pipes that carry combustibles are cased, the casing pipes must be provided with a screened vent on each end that is as near as feasible to the right-of-way boundaries. Other requirements are as follows:</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">3.6.4.7.3.7        Vents required for cased pipes are to be located at the high end of short casings-less than 150 feet long-and at both ends of casings longer than 150 feet.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">3.6.4.7.3.8        Vent standpipes and warning markers are to be located and constructed so as not to interfere with the maintenance of the highway nor be concealed by vegetation.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">3.6.5    Electric, Communication, And CATV</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">3.6.5.1       The requirements discussed earlier in this chapter describing installations and maintenance of pipelines crossing highway rights-of-way as related to casings, markers, and installations must also be applied to underground electric, CATV, and communications lines two inches or larger. The minimum depth of cover for these cased crossings is 42". Greater cover may be required depending on the construction of the roadway.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">3.6.5.2       For underground electric, CATV, and communications lines less than two inches in diameter:</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">3.6.5.2.1       Where a conduit or casing is placed under an existing roadway, all installations must be made by jacking, push-augering, directional bore or other approved methods. The casing must have a minimum nominal diameter of 2 inches and is to be placed a minimum of 24 inches below the surface. The utilities must also conform to the National Electric Safety Code and any other utility codes cited in Section 3.4. Utilities may be required to install facilities deeper on a case by case basis depending upon the construction of the roadway. </span></p><span data-dcnode-id="1468" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">3.6.5.2.2       Where the burying of cable is permitted along the edge of pavement, it may be done by plowing or trenching methods. The nearest edge of the trench must be at least 5 feet from the edge of the pavement, however, this distance can be reduced to 2 feet or greater should sufficient right-of-way be unavailable. The minimum depth of bury for CATV, communications, and electric is 24 inches, however, these utilities must also conform to the National Electric Safety Code and any other applicable regulations.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">3.7   Attachments To Structures</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">3.7.1    General</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">3.7.1.1       Attaching utility lines to a highway structure can materially affect the structure, the safe operation of traffic, and the efficiency of maintenance, safety inspections, and structural repairs.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">3.7.1.2       New attachments of utility facilities such as water, gas, sanitary sewer mains and electrical facilities will not be allowed on new structures. Communications and other telecommunications will not be permitted unless an extreme hardship can be proven. If a utility believes there is no feasible alternative, it must submit a written request to the district. In the request, the utility must include the proposed cost of the installation, describe other alternatives, and detail the associated costs of those alternatives. The District Public Works Section, Bridge Design Engineer, and Utilities Engineer will use the information in making a decision. The request is also subject to the approval of the Assistant Director, Design and Chief Engineer. Where utility attachments are requested, they will be considered only if the structure in question is of a design that is adequate to support the additional load and to accommodate the utility facility without compromise of highway features, including reasonable ease of bridge maintenance. In all cases, gas lines or pipelines carrying explosive, corrosive, or flammable fluids must follow all applicable Federal and State codes.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">3.7.1.3       The Department may enter into an agreement to reimburse the utility to design and inspect facility support and protection during Department projects as described in Chapter 5. Refer to the OSHA Technical Manual for requirements.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">3.7.2    Request For Attachment</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">3.7.2.1       In extreme hardship cases, the utility shall submit to the Utilities Section Engineer a written request to attach its facility to a structure owned and maintained by DelDOT. The request shall include the following items:</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">3.7.2.1.1       Identification of the structure including details regarding the utility facility and its contents, such as pressure, voltage, current, flammability, freeze point, weight per foot, and any other pertinent information.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">3.7.2.1.2       Calculations performed by a Delaware registered professional engineer to demonstrate the structural impact on the existing structure. All hazardous impacts must be addressed-magnetic fields, protection against electrocution, etc.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">3.7.2.1.3       A study identifying alternate methods of getting the facility over, under, or around the obstacle, as well as the costs and problems associated with each alternative.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">3.7.2.1.4        Descriptions of the proposed method of attachment and the appropriate devices for protecting the bridge and the facility.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">3.7.2.1.5       The costs of the design and/or increased construction expenses, including the utility's commitment to pay for the construction expenses.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">3.7.2.2       The request for attachment shall then be reviewed by District Public Works, Utilities Engineer and the Bridge Design Engineer. The request is also subject to the approval of the Assistant Director, Design and Chief Engineer.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">3.7.2.3       Utilities are expected to make a good-faith effort to accommodate DelDOT maintenance or construction requirements. The Utility shall submit all material and construction specifications for inclusion in contract documents for any work to be performed by DelDOT's contractor.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">3.7.3    New Construction</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">     If the Department approves the attachment, the utility must agree to having the facility installed by the Department's contractor at the price assigned to this bid item within the Department's construction project bid, at the utility's expense. The utility shall reimburse the Department in accordance with the terms of an agreement outlining the conditions of bridge occupancy.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">3.7.4    Existing Structures</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">     The following policies apply to utilities on existing structures:</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">3.7.4.1       Existing utilities attached to a structure can remain if they are not impacted by a Department project.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">3.7.4.2       Existing utilities must be relocated off the structure if the Department's project requires either temporary or permanent relocation. </span></p><span data-dcnode-id="1405" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">3.7.4.3       Any utility that plans to replace a facility attached to a structure shall relocate the facility off the structure. </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">3.7.4.4       The utility must consult the Department District Public Works on its choice of contractor, and have the Department's District Public Work's consent. The utility, by agreement, shall pay for Department inspection, and the Department shall have an inspector on site during the construction.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">3.7.5    Attachment Procedures</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">     The following should be considered when the design of utility attachments is reviewed:</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">3.7.5.1       The attachment is designed to minimize adverse impact on structure maintenance.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">3.7.5.2       No facilities are attached to the outsides of structures.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">3.7.5.3       All utility facilities attached to structures shall be housed in casing pipes to allow for insertion and extraction of the carrier facility.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">3.7.5.4       No manholes are constructed in bridge decks.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">3.7.5.5       Utilities are placed so that the vertical clearance of the bridge above the stream, pavement, or railroad tracks is not reduced.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">3.7.5.6       Utilities are located beneath decks, between the outer girders or beams, and within a cell -above the low superstructure steel or masonry.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">3.7.5.7       Support rollers, saddles, or padded or coated hangers are used to muffle vibration noise.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">3.7.5.8       The casings of pipes or conduits that are carried through bridges, or attached to them, are effectively opened or vented at each end to prevent pressure buildups and detect gas or fluid leaks. Casing pipes shall be sealed at the ends with a flexible material to prevent flowing water or debris from entering the annular space between the casing and carrier. Casing drains shall be provided for a carrier of liquid, liquefied gas, or heavy gas.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">3.7.5.9       Additional protective measures are taken where pipes or conduits carried through or attached to structures are not cased. Such measures shall employ a higher safety factor in the design, construction, and testing of the pipeline than would normally be required for cased construction.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">3.7.5.10       Upon leaving bridges, the utilities are aligned outside the roadway in as short a distance as operationally practicable.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">3.7.5.11       Hangers or rollers are suspended from inserts below deck or from hanger rods clamped to beam flanges. No bolting through bridge floors or beams should be allowed.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">3.7.5.12       Where appropriate, the linear expansion and contraction of utilities due to temperature changes are provided for. Line bends or expansion couplings should be used.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">3.7.5.13       Suitable corrosion protection is provided.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">3.7.5.14       Communication and electric lines that are attached to structures, or pass through them, are suitably insulated and grounded, and are carried in protective conduit or pipe from the point of exit from the ground to re-entry. Carrier pipe and casing pipe shall be suitably insulated from electric power line attachments.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">3.7.5.15       Pipes and conduits that are carried through abutments are sleeved and tightly sealed with mastic, or carried through by other approved methods.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">3.8   Preservation And Restoration</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">3.8.1    Preservation</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">3.8.1.1       Utilities are prohibited from spraying, cutting, and trimming trees on public highways or street rights-of-way unless written permission has been granted by the Department. When permission is granted for a utility to cut or trim trees, the work must be performed in compliance with Department standards.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">3.8.1.2       Where tree removal is permitted, stumps must be removed, and the resulting holes shall be properly backfilled to allow for settlement in accordance with the DelDOT Standard Specifications.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">3.8.1.3       The Department has adopted the ANSI Standard A300 (Part 1) - 2001 entitled Tree Care Operations - Tree, Shrub and Other Woody Plant Maintenance - Standard Practices. The Landscaping and Reforestation Act Implementation (located in Section 2 of the DelDOT Road Design Manual) also provides guidelines for tree protection and maintenance during road construction projects.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">3.8.1.4       For all future transportation projects and maintenance activities on existing highway alignments, trees must be replaced in accordance with the Department's Landscaping and Reforestation Act Implementation located in Section 2 of the DelDOT Road Design Manual. Each employee or agent of the Department who participates in the planning, design, and construction of projects and normal maintenance of the roadways should be aware of the aesthetic and environmental effect that natural vegetation provides. Every effort must be made to preserve the beauty of Delaware's roads. However, each employee or agent must also be aware of the danger posed by hazards left along the roadside. The AASHTO Roadside Design Guide should be used as reference. The traveling public has the right to expect a reasonably safe road and roadside area when faced with potential dangers such as blowouts, evasions of other vehicles or animals, adverse weather conditions, and other uncontrollable situations.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">3.8.1.5       Utilities shall ensure that appropriate erosion control devices are in place before work starts and properly maintained during construction. The surface area disturbed by utility installations or relocations shall be kept to a minimum.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">        Care shall also be taken in utility installations to avoid disturbing existing highway or private drainage facilities or sprinkler systems. Any damage to the facilities by the utility company or its subcontractors shall be repaired at the utility company's expense.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">3.8.2    Restoration</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">3.8.2.1       Damage to highway traveled ways, shoulders, and drainage features caused by utility installations or repairs must be immediately restored to their original condition as stated in the </span><b data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Delaware Code</span></b><span data-dcnode-id="1317" instrument_node="">. If utilities have not completed restoration within 30 days, noncompliance regulations will take effect. Temporary patches from winter months shall be permanently restored by May 15 before noncompliance action will be taken. Damage to roadside areas in the right-of-way shall be repaired as soon as possible, or as specified by the District Public Works Section. Restoration is also necessary when utilities are working on active construction sites. The District Public Works Section will determine any necessary repairs.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">3.8.2.2       The utilities shall restore the damaged areas to a condition at least equivalent to that which existed prior to the utility work. In all cases, the District Public Works Section will determine the extent of restoration required. All such work will be done at the utility's expense and in accordance with the appropriate Standard Specifications. The Seeding specification is located in Section 734 of the Standard Specifications.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">3.8.2.3       The utility shall maintain the non-pavement restoration for a period of 12 months after the satisfactory completion. Utilities are responsible for maintaining pavement patches that result from utility work for three (3) years.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">3.8.2.4       Traveled Way - General</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">        To maintain traffic, not more than one lane of traffic shall be closed at a time whenever a traveled way is cut. All cross-road cuts for utilities will be made perpendicular to the longitudinal centerline of the traveled way, and perpendicular to the plane of the finished subgrade. All patches must have a minimum length of 6 feet (as measured along the roadway centerline) and the width of the lane or lanes disturbed. Any lane encroachment of one foot or more requires restoration of the full lane width. Before reopening the section, the area shall be made usable for traffic. DelDOT Standard Construction Detail P-2 illustrates cross-road cuts.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">3.8.2.5       Flowable Fill</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">        Flowable fill is recommended for restoration of cross-road cuts although Borrow Type C can be utilized. Flowable fill shall meet the requirements of Special Provision 208500 as shown in Appendix F. The District Public Works Section may require flowable fill.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">3.8.2.6       Temporary Patches</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">3.8.2.6.1       If immediate repairs to the traveled way are not feasible-and if the District Public Works Section concurs-a temporary patch may be used until permanent repairs are completed. Figure 2-3 shows the minimum design requirements for temporary patches: at least 8 inches of compacted graded aggregate overlaid by at least 2 inches of Superpave Type C 160 Gyration, PG 64-22. When weather conditions prohibit the use of such mix, District Public Works can approve 10 inches of compacted graded aggregate overlaid by at least 2 inches of cold patch mix.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">3.8.2.6.2       Figure 2-3 also illustrates trench width and backfill layer requirements. Backfill shall be placed and compacted in successive layers. Trench widths vary, but should not be less than 2 feet plus the outside diameter of the pipe. Each backfill layer is to be placed in a level, uniform cross section not exceeding 8 inches in loose depth, and then compacted with a mechanical tamper according to the Standard Specifications Division 200 regarding Earthwork.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">3.8.2.7       Surface Treatments And Hot Mix Pavements</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">3.8.2.7.1       Figure 2-4 illustrates the details of permanent cross-road or longitudinal utility patches for surface-treated or hot mix asphalt roads and shoulders. Note that this is a minimum patch. If the existing roadway has a heavier cross section than indicated in Figure 2-4, it will be replaced with the same cross section or as directed by the District Public Works Section.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">3.8.2.7.2       The compaction requirements for both the patch material and the backfill material are covered in Division 200 of DelDOT's Standard Specifications.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">3.8.2.7.3       The details for a temporary patch are shown in Figure 2-3.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">3.8.2.8       Portland Cement Concrete Pavements</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">3.8.2.8.1       Portland cement concrete (PCC) streets and roads must be patched as described in Section 503-"Patching Portland Cement Concrete Pavement"-of the Standard Specifications. The details are shown in the DelDOT's Standard Construction Detail P-2 for PCC Pavement Patching.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">3.8.2.8.2       An approved concrete saw shall be used to make a vertical, full-depth cut in the concrete pavement. The cut is to be made to ensure a straight, clean, vertical surface.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">3.8.2.8.3       Temporary patches are discouraged in PCC pavements in favor of plating the opening and returning the next day to pour permanent ones. If a temporary patch is to be used, it will require the same cross section as shown in Figure 2-3 (8 inches graded).</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">3.8.2.8.4       Other details of utility patches in PCC pavements are shown in Standard No. P2 of DelDOT's Standard Construction Details.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">3.8.2.9       Hot Mix Overlays On PCC Pavements</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">        Utility patches made in PCC pavements with hot mix overlays shall comply with the current Standard Specifications and gain approval of the District Public Works Section. The patch layout is illustrated in Standard No. P2 of DelDOT's Standard Construction Details.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">3.8.2.10       Roadsides</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">3.8.2.10.1       Damage to roadside areas in the right of way shall be repaired as soon as possible to conditions at least equivalent to those existing prior to utility work. The restoration of roadside areas is concerned mainly with trenching and backfilling requirements. First, excavation widths will vary depending on the type of utility being placed.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">3.8.2.10.2       Trenches for cables, conduits, conductors, or pipes-other than those that are plowed or cut by a small trencher with a 4-inch to 6-inch cut-must be at least 8 inches wide.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">3.8.2.10.3       Trenches for pipe (other than rectangular or square conduit) with an outside diameter of 6 inches or more must be cut 2 feet wider than the outside diameter of the pipe. The pipe will then be placed in the trench with a 1-foot clearance on each side.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">3.8.2.10.4       Trenches are to be backfilled or covered immediately after installation of the utility facility. They cannot be left open overnight because they pose a hazard to the public. Authorization to use steel plates at any time other than April 15 through October 31 must be obtained from the District Public Works Section.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">3.8.2.10.5       Acceptable material must be used to backfill trenches. It shall be placed in 8-inch layers (loose measurement) and thoroughly compacted-just as for trenches in pavement areas. The backfill material and compaction method must meet the requirements of the Standard Specifications.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">3.8.2.10.6       Excavated material that is not satisfactory for backfill shall be removed from the area immediately after excavation. Material that is satisfactory for backfill must be stockpiled in a safe and orderly manner-preferably not stored on the roadway. District Public Works can approve storage on the roadway if necessary. Material stockpiled in the immediate work area must not pose a hazard to the traveling public. All materials shall be stockpiled in accordance with the rules established by the Manual on Uniform Traffic Control Devices (MUTCD).</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">3.8.2.11       Manholes And Valve Boxes</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">3.8.2.11.1       Where manholes or valve boxes are repaired in pavement areas, backfill shall be placed in 8-inch layers (loose measurement) and thoroughly compacted-the same as for trenches in pavement areas. The backfill material (Type C Borrow) and compaction method must meet the current Standard Specifications.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">3.8.2.11.2       During construction, areas around manhole lids and valve boxes must be dug by a non-destructive method. The details of proper roadway patching around manhole lids are shown in Figure 2-5.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">3.8.2.12       Test Holes</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">3.8.2.12.1       When possible, test holes are to be dug by a nondestructive method-such as by vacuum removal in a hole less than 244 square inches. The repair shall be only the size of the hole. The fill shall be compacted in lifts, and the same amount of stone, hot mix, concrete, etc.- as the existing roadway - shall be replaced.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">3.8.2.12.2       Sometimes small holes (up to 2 inches in diameter) bored in the surface for any type of utility testing or maintenance will be repaired with a flexible embedding sealer (cold poured resilient type epoxy joint sealer) approved by the District Public Works Section.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">3.8.2.13       Highway Construction Projects</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node="">3.8.2.13.1       The restoration requirements defined in this chapter</span><b data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node=""> </span></b><span data-dcnode-id="1209" instrument_node="">apply to the placement of utilities on existing roadways and rights-of-way. Where utility relocations and adjustments are made in conjunction with a highway improvement project, some portions of the restoration by the utilities may be unnecessary. For example, full restoration is unnecessary when the area will be repaved as a part of the highway improvement. Under these circumstances, appropriate portions of the restoration requirements may be waived.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">3.8.2.13.2       The utility is responsible for restoring all sedimentation and erosion control measures to their original conditions and for maintaining temporary patches.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p class="section" data-dcnode-id="1201" style="text-indent: 0pt; margin-bottom: 2pt"><b data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">4.0 Master Franchise, Permits and Agreements</span></b></p><span data-dcnode-id="1200" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">4.1   Definitions and General Requirements</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">4.1.1    Definitions</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">     The Department uses three different types of documents to manage the installation and/or occupancy of utility facilities on, under or across State right-of-way. These documents include franchises, permits, and agreements.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1187"><b data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">“Letter Agreement” </span></b><span data-dcnode-id="1188" instrument_node="">- A letter agreement is a legal instrument between a utility and the Department to establish the utility work in conjunction with a DelDOT highway construction project that the Department has determined to be reimbursable. It describes the terms and conditions-in accordance with the State code-by which the work and subsequent payment will be handled. An executed letter agreement is required prior to the performance of any work that is to be reimbursed. See Chapter 4 for further discussion.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1179"><b data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">“Public Utility Annual Master Franchise” </span></b><span data-dcnode-id="1183" instrument_node=""> -  The Public Utility Annual Master Franchise is a legal instrument that grants the use of highway rights-of-way. It authorizes a public utility to place its facilities within State rights-of-way without any vested interest therein (under the provisions of Title 17 of the </span><b data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Delaware Code</span></b><span data-dcnode-id="1180" instrument_node="">). A franchise does not serve as a control instrument over construction methods, traffic control features, or timing as opposed to a permit, which does. The only type of franchise accepted by the Department is the Public Utility Annual Master Franchise established October of 2004. The Master Franchise eliminated the need for a public utility to apply for a franchise each time a new utility installation was to be located within State right-of-way. The public utility applies for a Master Franchise for each County where it owns facilities within the State right-of-way. The executed Master Franchise remains in force for a period of 50 years and automatically renews annually for another 50 years unless otherwise agreed to by the parties.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1174"><b data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">“Use and Occupancy Agreement” </span></b><span data-dcnode-id="1175" instrument_node=""> -  This agreement is between the Department and an individual or entity for a privately owned facility that crosses a State-maintained road. It provides the Department with information about the crossing and sets forth the conditions for it. This agreement may also be used for privately or individually owned facilities to be located on State rights-of-way.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1169"><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">“Utility Construction Permit”</span></b><span data-dcnode-id="1170" instrument_node=""> - A Utility Construction Permit authorizes a utility to construct, maintain, or repair a utility facility within State rights-of-way. The highway is under the control of District Public Works, and a Utility Construction Permit is used to secure the District Public Works Section's approval of the details controlling construction activities. </span></p><span data-dcnode-id="1168" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">4.1.2    General Requirements</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">4.1.2.1       A Master Franchise is required if a public utility locates facilities on State right-of-way. A public utility must submit a franchise application for each County where its facilities are located within the State rights-of-way.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">4.1.2.2       A Utility Construction Permit is required in all cases of maintenance or installation of utility facilities on State right-of-way, including right-of-way within a municipality unless otherwise specified for a State Highway Construction Project. A Master Franchise or a Use and Occupancy Agreement must be in force before a construction permit is valid. The application for a Utility Construction Permit must be submitted to the applicable District Office of Public Works.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">4.1.2.3       A Utility Construction Permit may not be issued to place aboveground or underground parallel facilities along both sides of a traveled way, unless justified and approved by the District Public Works Section or located within subdivisions. In the case of underground, safety and adequate space for other utilities should be considered before exceptions are approved.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">4.1.2.4       If the utility crosses over or under a railroad, the District will make a notation on the permit that the work is subject to approval by the railroad company. A copy of the railroad company approval shall be supplied upon request to the District prior to crossing the railroad.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">4.2   Master Franchise</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">4.2.1    Purpose</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">     The Master Franchise is a legal instrument by which the use of highway right-of-way is granted. It is not a control instrument over construction methods, traffic control features, or timing as opposed to a permit. The Department may grant a Master Franchise to the following utilities:</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">4.2.1.1       a public utility subject to the regulatory jurisdiction of the Public Service Commission;</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">4.2.1.2       a cable system operator or video services provider franchised by the Public Service Commission or a municipality; or</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">4.2.1.3       a utility owned, operated, controlled or created by the State, a municipality, county, or other political subdivision. The Public Utility Annual Master Franchise form is located in Appendix B of this manual.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">4.2.2    Conditions</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">     The Master Franchise requires that all facilities to be constructed must meet the requirements set forth in this manual for locations, construction, construction methods, timing, etc.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">4.2.3    Preparation</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">     The utility submits three Master Franchise forms for each County where they own facilities in the State rights-of-way. The three forms shall be signed with signature attested and the Company seal affixed. The franchise forms are to be submitted to the Utilities Engineer's office for processing.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">4.2.4    Processing</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">     The appropriate Utility Coordinator reviews the Master Franchise forms for accuracy and completeness. If satisfactory, DelDOT Deputy Attorney General, Assistant Director of Engineering Support, and the Director of Technology and Support Services will execute the agreement and affix the Departmental seal. An original will be returned to the utility, one is forwarded to the DelDOT Director of Technology and Support Services, and one is retained in the Utilities Section. A copy of the Master Franchise will be forwarded to the appropriate District.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">4.2.5    Renewals</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">     Each Master Franchise remains in effect for 50 years from the date of execution by the Department. The Master Franchise shall automatically renew annually for another 50 years unless otherwise agreed to by the parties. There is no need to file the franchise application annually.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">4.2.6    Subdivisions</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">     Upon completion and acceptance of the subdivision or industrial streets, the utilities that are located within the State right-of-way shall be franchised in accordance with the existing countywide Public Utility Annual Master Franchise for each individual utility. Future work performed in that development will require only a utility construction permit. Please refer to the Standards and Regulations for Subdivision Streets and State Highway Access for requirements regarding subdivisions.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">4.2.7    Freeway Right-of-way</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">4.2.7.1       Only in exceptional cases are utilities granted a Utility Construction Permit to cross freeway right-of-way on new locations, and rarely are they permitted to run longitudinally on freeway right-of-way.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">4.2.7.2       A utility will be permitted along a freeway on a new location only under strictly controlled conditions. An application for permission to use or occupy the freeway right-of-way must be directed to the District Public Works Section.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">4.2.7.3       The application must address the following:</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">4.2.7.3.1       the direct and indirect environmental and economic effects of any loss of productive agricultural land which may result from disapproving the use of the right-of-way,</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">4.2.7.3.2       the utility's compliance with the provisions of this manual and AASHTO policies as referred to in Appendix D,</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">4.2.7.3.3       why any other utility location would be extremely difficult and unreasonably costly for the utility consumer and</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">4.2.7.3.4       how the utility's installation on the freeway right-of-way will not adversely affect the design, construction, stability, traffic safety, or operation of the freeway.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">4.2.7.4       The District Public Works Section will assess the situation and send the application with a recommendation and justification to the Utilities Engineer for coordination and comment. The Utilities Engineer will then review the application and provide the necessary coordination. Next, the application will be sent to the Assistant Director, Engineering Support for review.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">4.2.8    Coordination Between Utility and State</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">     Both the Department and the utility company representatives need to exchange information regularly to help avoid conflicts between utility company projects and Department projects in terms of location, construction, or method of installation.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">4.3   Use and Occupancy Agreements</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">4.3.1    Purpose</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">     The Use and Occupancy Agreement (shown in Appendix B) is to be used for privately or individually owned facilities that are located on or across a State-maintained roadway. For example, if a landowner owns both sides of a State roadway and needs to convey irrigation lines, water lines, gas lines, etc., between the properties, the landowner and Department must execute a Use and Occupancy Agreement.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">     The Utility Use and Occupancy Agreement provides the Department with information about the facilities and sets forth their conditions. The owner must obtain a Utility Construction Permit for any construction, maintenance, or repair.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">4.3.2    Conditions</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">     The Use and Occupancy Agreement provides the Department with information about the crossing and sets forth the conditions for the facilities. Only crossings will be allowed; longitudinal lines will not be permitted.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">     Signs will be provided by the Department to mark the utility crossing at each right-of-way line. Furnishing the mounting post and installation in accordance with Department requirements is the responsibility of the utility owner.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">4.3.3    Preparation</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">     A Use and Occupancy Agreement must be prepared by the owner, in triplicate, for each installation where a facility is placed on a State-maintained roadway.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">4.3.4    Processing</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">     The Utility Use and Occupancy Agreement is then processed according to the following steps:</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">4.3.4.1       The agreement is reviewed by the appropriate District Public Works personnel for completeness, accuracy, and compliance with the provisions contained in this manual.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">4.3.4.2       The District Public Works Section reviews the agreement and forwards a copy with sketches to the Utilities Engineer for review.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">4.3.4.3       The Utilities Engineer reviews the information and makes comments to the District Public Works Section.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">4.3.4.4       The District Public Works Section approves and signs the agreement after all corrections have been made, and then returns one copy to the applicant, sends one copy to the Utilities Engineer, and retains one copy.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p class="body-l3" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">4.3.4.5       In event of a dispute, the Chief Engineer has final approval.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p class="body-l1" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">4.4   Construction Permits</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">4.4.1    Purpose</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">     A Utility Construction Permit form (Appendix B) must be completed for all utility construction not performed in conjunction with a DelDOT construction project. A permit is required if utility work is done in advance of the construction project where DelDOT Construction has not yet been assigned. The permit is used to secure the District Public Works Section's approval of the details controlling construction activities. An executed Public Utility Annual Master Franchise shall be on file prior to submission of a construction permit application for Public Utilities. A privately owned facility must have a Utility Construction Permit and a Use and Occupancy Agreement before any type of installation, repairs or relocation.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">     To apply for a permit, contact the appropriate District Public Works Office:</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">South District Public Works - Sussex County: 302-853-1340</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Central District Public Works - Kent County: 302-760-2473</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p class="body-l4" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">North and Canal District Public Works-New Castle County: 302-326-4679</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p class="body-l2" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">     North District: Area north of and including I-95 and I-495 (except area west of Route 7, south of Route 2), including the City of Wilmington.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p class="body-l2" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">     Canal District: Area south of I-95 and I-495 (including west of Route 7 and south of Route 2 to Kent County, including the City of Newark.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p class="body-l2" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">     Usually, four sketches or plans must be attached to the construction permit application upon submittal. However, it is best to contact the District to see if there have been any changes to the requirements.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p class="body-l2" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">4.4.2    Electronic Permits</span></p><span data-dcnode-id="991" instrument_node="">
</span><p class="body-l2" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">     A computerized permit process intended for large users may supplement the construction permit process. The utilities wishing to use the system will need to execute a letter agreement with the Department specifying the conditions of the electronic permits.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p class="body-l2" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">4.4.3    Requirements</span></p><span data-dcnode-id="985" instrument_node="">
</span><p class="body-l2" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">     A Utility Construction Permit is required any time utility construction work (including excavations or openings) will disturb anything on the roadway or State right-of-way. The permit is necessary each time a facility is upgraded or rebuilt, or an installation is added (excluding services). Project Design Work (as defined in Section 3.1) is excluded from this requirement except in cases when Utility Work is performed in advance of construction or the Department requests test holes for the locations of utilities. The District may waive the permit requirement for test holes.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p class="body-l2" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">     Permits for Public Utilities will be issued only if a Master Franchise is in force. Private owners of facilities must have a Use and Occupancy Agreement along with a permit. The new permit request must show the existing and proposed installation.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p class="body-l2" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">     A utility that performs work on the State right-of-way longer than one working day to repair or adjust an existing facility-or that disturbs the roadway-must have a construction permit. If the work takes less than one day, and does not disturb the roadway, a permit is not required. However, the utility must notify the District Public Works Office of any lane closure on any roadway outside of a subdivision before starting work. The notification must include the location and type of work to be performed.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p class="body-l2" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">     In an emergency, the utility must promptly notify the District Public Works Office. The utility is responsible for communicating the type of emergency and location of the work to be performed and other pertinent information. The utility must submit a construction permit to the District Public Works Office as soon as possible. In case of an emergency during normal business hours, call the District Public Works numbers listed in Section 4.4.1. After normal business hours, please call:</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">New Castle County:              302-323-1111</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Kent County:              302-760-2473</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Sussex County:              302-855-1111</span></p><span data-dcnode-id="964" instrument_node="">
</span><p class="body-l2" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">4.4.4    Fees</span></p><span data-dcnode-id="961" instrument_node="">
</span><p class="body-l2" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">     No fees are authorized at this time.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p class="body-l2" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">4.4.5    Preparation</span></p><span data-dcnode-id="955" instrument_node="">
</span><p class="body-l3" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">4.4.5.1       Utility Construction Permits are to be prepared in four copies (unless submitted electronically) by the utility company and submitted to the office of the District Public Works Section along with four copies of plan. The sketches or plans must show the:</span></p><span data-dcnode-id="952" instrument_node="">
</span><p class="body-l4" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">4.4.5.1.1       width of the right-of-way,</span></p><span data-dcnode-id="949" instrument_node="">
</span><p class="body-l4" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">4.4.5.1.2       type of roadway,</span></p><span data-dcnode-id="946" instrument_node="">
</span><p class="body-l4" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">4.4.5.1.3       width of traveled way,</span></p><span data-dcnode-id="943" instrument_node="">
</span><p class="body-l4" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">4.4.5.1.4       distance from the crossroad or side road to the installation,</span></p><span data-dcnode-id="940" instrument_node="">
</span><p class="body-l4" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">4.4.5.1.5       distance from the centerline of the roadway to the installation,</span></p><span data-dcnode-id="937" instrument_node="">
</span><p class="body-l4" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">4.4.5.1.6       type of shoulder,</span></p><span data-dcnode-id="934" instrument_node="">
</span><p class="body-l4" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">4.4.5.1.7       width of shoulder,</span></p><span data-dcnode-id="931" instrument_node="">
</span><p class="body-l4" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">4.4.5.1.8       drainage system in the utility area,</span></p><span data-dcnode-id="928" instrument_node="">
</span><p class="body-l4" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">4.4.5.1.9       trench and restoration details,</span></p><span data-dcnode-id="925" instrument_node="">
</span><p class="body-l4" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">4.4.5.1.10       north arrow, scale and legend, and</span></p><span data-dcnode-id="922" instrument_node="">
</span><p class="body-l4" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">4.4.5.1.11       railroads crossing roadways.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p class="body-l3" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">4.4.5.2       In addition, all sketches for pressure pipeline installations must specify the class of transmittant, the maximum working pressure, the maximum design pressures, and the design standards for the carrier.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p class="body-l3" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">4.4.5.3       When a Utility Construction Permit is needed after a DelDOT highway contract has been awarded, the utility must obtain written permission from the DelDOT contractor to work in the project area. This policy includes any utility work not caused by the construction or improvement of a highway. For an exception to be made, the utility must have written permission from DelDOT to perform such work. To give this written permission, DelDOT must first obtain a satisfactory waiver, release, and quit claim from the State's contractor. It must cover all damages and all defenses whatsoever for delays caused by the utility work. If a dispute arises or the contractor will not provide the appropriate document, then the District Public Works Section has the option of setting a time frame in which the utility may work.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p class="body-l2" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">4.4.6    Processing</span></p><span data-dcnode-id="910" instrument_node="">
</span><p class="body-l2" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">     The Utility Company submits a permit application to the District Public Works Office. The District assigns a permit number and distributes the originals as follows:</span></p><span data-dcnode-id="907" instrument_node="">
</span><p class="body-l4" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">original to the responsible District Public Works personnel,</span></p><span data-dcnode-id="904" instrument_node="">
</span><p class="body-l4" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">two copies to the utility, and</span></p><span data-dcnode-id="901" instrument_node="">
</span><p class="body-l4" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">one copy to the State Inspector</span></p><span data-dcnode-id="898" instrument_node="">
</span><p class="body-l2" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">     Utility Construction Permits are required for work to be performed on state right of way or state maintained roads within the incorporated limits of a municipality. The utility must also have approval of the municipality.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p class="body-l1" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">4.5   Utility Construction, Relocation, Or Repair Not Due To Highway Construction</span></p><span data-dcnode-id="892" instrument_node="">
</span><p class="body-l2" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">4.5.1    A public utility must not start construction of a new installation, repairs, or relocation until a Utility Construction Permit has been issued and a Master Franchise is in force. A privately owned facility must have a Utility Construction Permit and a Use and Occupancy Agreement before any type of installation, repairs or relocation.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p class="body-l2" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">4.5.2    The District Public Works office must be notified at least one working day before the start of construction. (Notification may be given in writing, orally, or by fax.) The information transmitted must include the starting date, road number, and permit number. Refer to Section 4.4.3 for further details including emergency situations.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p class="body-l2" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">4.5.3    Permits issued by the State may be revoked whenever state authorities ascertain a threat to the traveling public. Other causes for revocation may include--but may not be limited to--misuse, noncompliance with State requirements, or improper maintenance of traffic. Depending on the circumstances, any permit application may be denied.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p class="body-l2" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">4.5.4    The utility company or its contractor must have a responsible representative at the job site at all times to supervise the work. Information on the Utility Construction Permit must be available to this responsible representative.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p class="body-l2" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">4.5.6    Utilities must notify "Miss Utility" at least two working days before starting work. A "working day" shall mean every day, except Saturday, Sunday and state, federal and recognized operator holidays.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p class="body-l1" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">4.6   Noncompliance</span></p><span data-dcnode-id="874" instrument_node="">
</span><p class="body-l2" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">4.6.1    If a utility fails to comply with any of the conditions, restrictions, or regulations prescribed by DelDOT and stated in this manual, the following actions will be taken:</span></p><span data-dcnode-id="871" instrument_node="">
</span><p class="body-l3" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">4.6.1.1       The State will notify the utility, in writing, of the noncompliance. The State may also impose such actions, as it may deem appropriate, including an immediate stop work order until the utility complies.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p class="body-l3" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">4.6.1.2       The utility must correct the noncompliance within 30 days after receiving written notice from the State.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p class="body-l3" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">4.6.1.3       After the thirty 30 day period, the State will be required to take any action necessary to protect the safety of the traveling public. This may include restoration of roads or taking possession of and removing poles, pole lines, wires, pipelines, conduits, fixtures, or other structures or property owned by the utility and located on State right-of-way.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p class="body-l3" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">4.6.1.4       The utility will be responsible for all costs and expenses associated with the necessary action to correct the situation.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p class="section" data-dcnode-id="856" style="text-indent: 0pt; margin-bottom: 2pt"><b data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">5.0 Utility Adjustments for Highway Construction</span></b></p><span data-dcnode-id="855" instrument_node="">
</span><p class="body-l1" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">    Existing utilities along highways that are to be reconstructed may sometimes be allowed to remain in place, however they usually must be adjusted or relocated to accommodate the construction work and the reconstructed highway.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p class="body-l1" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">    Utility facilities must not be in the way of the reconstruction work in order to remain in place. In addition, their future maintenance must not create a hazard for the traveling public. The Utilities Engineer shall determine whether they may remain in place.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p class="body-l1" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">    In general, utilities are not reimbursed by the State for the cost of adjusting or relocating their facilities. In accordance with Section 143, Title 17, </span><b data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Delaware Code</span></b><span data-dcnode-id="845" instrument_node="">, however, some work is reimbursable. Both cases are discussed in this chapter.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p class="body-l1" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">5.1   Preconstruction Coordination</span></p><span data-dcnode-id="840" instrument_node="">
</span><p class="body-l1" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">    The Utilities Section shall manage coordination of the design process for utility relocations and adjustments associated with highway construction projects. Utility companies shall provide information to the Department for all of their facilities within the existing or proposed right-of-way. The information provided will include the facility types, sizes, and locations.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p class="body-l2" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">5.1.1    Concept Phase</span></p><span data-dcnode-id="834" instrument_node="">
