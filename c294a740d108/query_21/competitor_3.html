</span><p data-dcnode-id="3081" style="text-align: left"><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title2/2000/2400/index.shtml%23TopOfPage" target="_top"><img alt="Table Of Contents" border="0" data-dcnode-id="3086" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/gallery/royalidx.gif&amp;raw"></a><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title2/2000/2400/2402.shtml%23TopOfPage"><img alt="Next Page" border="0" data-dcnode-id="3083" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/gallery/royalpnx.gif&amp;raw"></a></p><span data-dcnode-id="3080" instrument_node="">
</span><h3 data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Title 2 Transportation</span></h3><h3 class="TitleSystem-1" data-dcnode-id="3075"><span data-dcnode-id="3076" style="font-family: 'Arial'; font-size: large"><span data-dcnode-id="3077" instrument_node="">2400 Division of Transportation Solutions</span></span></h3><span data-dcnode-id="3074" instrument_node="">
</span><p class="chapter" data-dcnode-id="3070"><a data-dcnode-id="3073" name="P0_0"></a><b data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">2400 Transportation Solutions</span></b></p><span data-dcnode-id="3069" instrument_node="">
</span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title2/2000/2400/2401.pdf"><img alt="" border="0" class="inline" data-dcnode-id="3066" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/images/pdflogo.gif&amp;raw"><span data-dcnode-id="3065" instrument_node=""> Authenticated PDF Version</span></a><a data-dcnode-id="3063" name="P2_29"></a><p class="title" data-dcnode-id="3060"><b data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">2401 Utilities Manual Regulations</span></b></p><span data-dcnode-id="3059" instrument_node="">
</span><p class="section" data-dcnode-id="3056" style="text-indent: 0pt; margin-bottom: 2pt"><b data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">1.0 Introduction</span></b></p><span data-dcnode-id="3055" instrument_node="">
</span><p class="body-l1" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">    The Mission of the State of Delaware's Department of Transportation is to provide a safe, efficient, and environmentally sensitive transportation network that offers a variety of convenient, and cost-effective choices for the movement of people and goods.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p class="body-l1" data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">    Effective management and design of utility installations are imperative for the safe and expedient construction and maintenance of the transportation network. Close coordination with utility owners is essential to meet these objectives.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p class="body-l1" data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">    This manual outlines the general practices, policies, and procedures that affect the relationship between the Delaware Department of Transportation, hereafter referred to as the Department or DelDOT, and those entities desiring to place utility lines and appurtenances within the rights-of-way of this State. This manual explains the requirements and procedures necessary to facilitate utility installation, relocation, maintenance as well as any utility work in conjunction with highway project construction within Department right-of-way.</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p class="body-l1" data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">1.1   Purpose And Objectives</span></p><span data-dcnode-id="3043" instrument_node="">
</span><p class="body-l2" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">1.1.1    The overriding goal for this manual is to allow the user to locate and understand those regulations and procedures that are most pertinent to their activities in the highway-utilities process. The process embraces a large and exceedingly complex series of issues. This manual simplifies and condenses these issues for ease of location by the user.</span></p><span data-dcnode-id="3040" instrument_node="">
</span><p class="body-l2" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">1.1.2    The manual has been prepared to accomplish these objectives:</span></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">• to provide standard arrangements for permitting the installation of utilities on Department rights-of-way and for relocating utilities due to highway construction;</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">• to help utilities accomplish their work with the least delay and minimum interference with highway contractors or other utilities;</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">• to prevent service disruptions, damage to utility facilities, and hazardous conditions;</span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">• to ensure that standards, specifications, and environmental considerations are met;</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">• to ensure the proper performance, high quality, and timely accomplishment of utility work, as well as the correct and timely reimbursement to utility companies when appropriate;</span></p><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">• to outline procedures and conditions that must be met for federal reimbursement, when utility work is part of a federal-aid project; and</span></p><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3018" instrument_node="">• to outline procedures and conditions necessary for state reimbursement of utility work when circumstances, agreements and/or </span><b data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Delaware Code</span></b><span data-dcnode-id="3015" instrument_node=""> govern.</span></p><span data-dcnode-id="3013" instrument_node="">
</span><p class="body-l2" data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">1.1.3    The information in this manual applies to all public and some private facilities, including (but not limited to) electric power, telephone, telegraph, communications, cable TV, lighting, water, gas, oil, petroleum, steam, chemicals, sewage, drainage, irrigation, and similar lines that are located within the rights-of-way of highways under the Department's jurisdiction. Underground, surface, and overhead facilities-whether singular or in combination-are covered by this manual.</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p class="body-l1" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">1.2   Statutory Authority</span></p><span data-dcnode-id="3007" instrument_node="">
</span><p class="body-l2" data-dcnode-id="3002"><span data-dcnode-id="3006" instrument_node="">1.2.1    The </span><b data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Delaware Code</span></b><span data-dcnode-id="3003" instrument_node=""> provides the Department with the authority and responsibility to regulate the use of all utilities on state highway rights-of-way. For the benefit of the reader, this manual reviews applicable portions of Delaware law.</span></p><span data-dcnode-id="3001" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">1.2.2    The Department has the sole legal authority to control the use of state highway rights-of-way. Vesting this control in a single agency was necessary to ensure the safety of motorists and the proper operation of highway facilities. The Department has formulated the guidelines, policies, and procedures in this manual as tools for regulating utilities to achieve the aforementioned purposes.</span></p><span data-dcnode-id="2998" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2993"><span data-dcnode-id="2997" instrument_node="">1.2.3    The "Delaware State Highway Department" was established into law on April 2, 1917. Chapter 166 of the 1935 Code amended the original Act that created the Highway Department. Additional amendments, including Title 17 of </span><b data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2994" instrument_node="">, were enacted by the Legislature on February 11, 1953, and approved by the governor on February 12, 1953, including all prior amendments. This act provides authorization for the State to participate in the acquisition of rights-of-way, the placement of new utilities, and the adjustment of existing utilities.</span></p><span data-dcnode-id="2992" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2987"><span data-dcnode-id="2991" instrument_node="">1.2.4    Title 26 of the </span><b data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2988" instrument_node=""> (1953) provides authorization for the State to control new installations of pipes, conduits, and wires above or beneath the public roads.</span></p><span data-dcnode-id="2986" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node="">1.2.5    Section 143, Title 17,</span><b data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node=""> Delaware Code</span></b><span data-dcnode-id="2982" instrument_node="">, established by law on January 16, 1962, made the State responsible for the entire cost of altering or relocating utilities that are within public highway rights-of-way-when the utility facilities are owned or operated by a municipality, governmental body, or subdivision of the State-as necessitated by highway construction, reconstruction, relocation, repair, or maintenance.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2975"><span data-dcnode-id="2979" instrument_node="">1.2.6    Section 132, Title 17, </span><b data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2976" instrument_node=""> (1966) provides for the State to reimburse the owner for the expense of relocating public utility facilities necessitated by any project where the State is to be reimbursed at least 90% of the project cost from federal funds or by the federal government or any agency thereof. Such expense is to be the amount paid by the owner that is properly attributable to the relocation, after deducting therefrom any increase in the value of the new facilities and any salvage value derived from the old facilities.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2969"><span data-dcnode-id="2973" instrument_node="">1.2.7    Section 143, Title 17, </span><b data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2970" instrument_node="">, amended on June 29, 2004, allows the Department of Transportation flexibility to negotiate alteration or relocation agreements with public utilities in order to improve efficiency and fairness. While not required to do so, the Department may choose to enter into an agreement with a public utility for this purpose.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">1.2.8    The opinion of the Court of Chancery, State of Delaware (1963) is the basis on which the State reimburses utility owners the expense of relocating public utility facilities on rights-of-way for which they hold title, or have permission or easement for occupancy, as necessitated by any project.</span></p><span data-dcnode-id="2965" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2960"><span data-dcnode-id="2964" instrument_node="">1.2.9    Adherence to the policies, practices and procedures of the Department of Transportation-and, more specifically, to the requirements described in the Utilities Manual-must be undertaken with full knowledge of, and compliance with, Chapter 8, Title 26, of the </span><b data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2961" instrument_node=""> entitled "Underground Utility Damage Prevention and Safety." The Department's commitment to provide for the protection of public health and safety is of major importance and must be maintained at all times.</span></p><span data-dcnode-id="2959" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">1.3   Construction And Location Requirements</span></p><span data-dcnode-id="2956" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">    The State reserves the right to review and approve the detailed location and design of all utility installations, adjustments, or relocations affecting the highway rights-of-way, and will issue permits for proposed utility work. Chapter 3 describes permitting requirements.</span></p><span data-dcnode-id="2953" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">1.4   Exceptions To Requirements</span></p><span data-dcnode-id="2950" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">    The utility company shall submit any request, for deviation from the standards described in this manual, due to extreme hardship, to the Department. The request shall be in writing and must include full justification surrounding the hardship. The Department will assess the situation and provide recommendations. The documentation will be sent to the Utilities Engineer for coordination and comment, who shall then forward it to the Chief Engineer for final action.</span></p><span data-dcnode-id="2947" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">1.5   Transmittal Of Information</span></p><span data-dcnode-id="2944" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">    Where the manual specifies the submittal of plans or other documents, utilities are encouraged to submit electronic files with the Department's approval. If utilities choose to submit plans or other documents electronically, their systems and GIS databases must be compatible with DelDOT's current systems in order to transfer files electronically.</span></p><span data-dcnode-id="2941" instrument_node="">
</span><p class="section" data-dcnode-id="2938" style="text-indent: 0pt; margin-bottom: 2pt"><b data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">2.0 Definitions</span></b></p><span data-dcnode-id="2937" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2933"><b data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">“AASHTO”</span></b><span data-dcnode-id="2934" instrument_node="">: American Association of State Highway and Transportation Officials. AASHTO is a nonprofit, nonpartisan association representing highway and transportation departments in the 50 states, the District of Columbia and Puerto Rico. It represents all five transportation modes: air, highways, public transportation, rail and water. Its primary goal is to foster the development, operation and maintenance of an integrated national transportation system.</span></p><span data-dcnode-id="2932" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2928"><b data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">“Active Federal-aid Highway Projects”</span></b><span data-dcnode-id="2929" instrument_node="">: Projects for which any phase of development has been programmed for federal aid highway funds and the State controls the highway rights of way. A project will be considered active until the date of its final acceptance by the Federal Highway Administration and thereafter will be considered complete.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node="">“</span><b data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Adjustment”</span></b><span data-dcnode-id="2923" instrument_node="">: The relocation, removal, replacement, abandonment, etc., of existing utility facilities as necessitated by a highway construction project.</span></p><span data-dcnode-id="2921" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2916"><span data-dcnode-id="2920" instrument_node="">“</span><b data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Agreement”</span></b><span data-dcnode-id="2917" instrument_node="">: A legal instrument entered into by the Department and a utility on a highway construction project which outlines the legal and financial responsibilities of both parties.</span></p><span data-dcnode-id="2915" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2910"><span data-dcnode-id="2914" instrument_node="">“</span><b data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Arterial roadway”</span></b><span data-dcnode-id="2911" instrument_node="">: The functional classification for partial-access-control roads that serve to distribute traffic and are moderate in speed. Arterials carry traffic between collector roads and freeways. The DelDOT highway system map designates which roadways are arterials.</span></p><span data-dcnode-id="2909" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2904"><span data-dcnode-id="2908" instrument_node="">“</span><b data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Authorization”</span></b><span data-dcnode-id="2905" instrument_node="">: Permission by the applicable District Engineer, Construction Region Engineer or Utilities Engineer for the utility to proceed with any phase of a project.</span></p><span data-dcnode-id="2903" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2898"><span data-dcnode-id="2902" instrument_node="">“</span><b data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Backfill”</span></b><span data-dcnode-id="2899" instrument_node="">: Material used to replace or the act of replacing material removed during construction; also may denote material placed or the act of placing material adjacent to structures.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2892"><span data-dcnode-id="2896" instrument_node="">“</span><b data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Bar Chart”</span></b><span data-dcnode-id="2893" instrument_node="">: A schedule showing the proposed start and end dates for various utility activities on a complex singular contract or project. DelDOT prepares the Bar Chart based upon the Utility Statements submitted by the utilities.</span></p><span data-dcnode-id="2891" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2886"><span data-dcnode-id="2890" instrument_node="">“</span><b data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Betterment”</span></b><span data-dcnode-id="2887" instrument_node="">: Any upgrade of the facility being relocated made solely for the benefit of and at the election of the utility, not attributable to highway construction, as determined by the Utilities Engineer.</span></p><span data-dcnode-id="2885" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2881"><b data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">“Boring”</span></b><span data-dcnode-id="2882" instrument_node="">: The operation by which large carriers or casings are jacked through oversize bores. The bores are carved progressively ahead of the leading edge of the advancing pipe as soil is mucked back through the pipe.</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2875"><span data-dcnode-id="2879" instrument_node="">“</span><b data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Casing”</span></b><span data-dcnode-id="2876" instrument_node="">: A larger pipe, conduit, or duct enclosing a carrier. Casings are installed in open cuts or by boring or driving. They are usually sealed at the ends and sometimes vented when the pipelines carry lighter-than-air gases. Casings are usually required to avoid the need for trenching through existing pavements, to prevent the destruction of the roadway due to leakage of liquids under pressure, or to prevent or contain leaking under pressure.</span></p><span data-dcnode-id="2874" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2866"><span data-dcnode-id="2873" instrument_node="">“</span><b data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Chief Engineer”</span></b><span data-dcnode-id="2870" instrument_node="">: Shall be a civil engineer registered or eligible for registration as such in Delaware and qualified to design as well as direct road engineering work as specified in the </span><b data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2867" instrument_node="">.</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2860"><span data-dcnode-id="2864" instrument_node="">“</span><b data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Clear Roadside Policy”</span></b><span data-dcnode-id="2861" instrument_node="">: The Department's policy of providing a clear recovery area (clear zone so as to increase safety, improve traffic operations, and enhance the aesthetic quality of highways by designing, constructing, and maintaining highway roadsides as wide, flat, and with no abrupt changes in slope as practical and as free as practical from natural or manufactured hazards such as trees, drainage structures, non-yielding sign supports, highway lighting supports, utility poles, and other ground-mounted structures. The policy addresses the removal of roadside obstacles that are likely to be associated with accident or injury to highway users. However, when such obstacles are essential, the policy provides for appropriate countermeasures to reduce hazards. Countermeasures include placing utility facilities at locations that shield the hazard from out-of-control vehicles by using breakaway features, impact attenuation devices, or shielding. Full consideration is to be given to sound engineering principles and economic factors in all cases. See the DelDOT Road Design Manual and the AASHTO Roadside Design Guide for more details.</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2854"><span data-dcnode-id="2858" instrument_node="">“</span><b data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Clear Zone”</span></b><span data-dcnode-id="2855" instrument_node="">: The total roadside border area, starting at the edge of the traveled way, available for safe use by errant vehicles. This area may consist of a shoulder, a recoverable slope, a non-recoverable slope, and/or a clear run-out area clear of fixed or non-traversable objects. The purpose is to provide errant vehicles a reasonable opportunity to stop safely or otherwise regain control of the vehicle. The desired width is dependent upon the traffic volumes and speeds, and on the roadside geometry. See the DelDOT Road Design Manual and the AASHTO Roadside Design Guide for calculation of Clear Zone widths.</span></p><span data-dcnode-id="2853" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2848"><span data-dcnode-id="2852" instrument_node="">“</span><b data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Code of Federal Regulations, Title 23, Part 645”</span></b><span data-dcnode-id="2849" instrument_node="">: The current regulations on utility relocations. Subpart "A" defines policy, procedure, and cost development for utility relocation, adjustments, and reimbursement. Subpart "B" defines policy and procedure for accommodating utility facilities on federal-aid highways.</span></p><span data-dcnode-id="2847" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">“</span><b data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Collector Roadway”</span></b><span data-dcnode-id="2843" instrument_node="">: The functional classification for partial-access-control roads. Provides a less highly developed level of service at a lower speed for shorter distances by collecting traffic from local roads and connecting them with arterials. The DelDOT highway system map designates which roadways are collectors.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2836"><span data-dcnode-id="2840" instrument_node="">“</span><b data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Conduit”</span></b><span data-dcnode-id="2837" instrument_node="">: An enclosed tubular casing, singular or multiple, for the protection of wires, cables, or lines, usually jacketed and often extended from manhole to manhole.</span></p><span data-dcnode-id="2835" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2830"><span data-dcnode-id="2834" instrument_node="">“</span><b data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Conflict”</span></b><span data-dcnode-id="2831" instrument_node="">: Exists when a utility is in the way of highway construction or maintenance operations and needs adjustment or relocation. The presence of utilities in the right of way does not necessarily constitute a conflict.</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2825"><b data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">“Coordination Meeting”</span></b><span data-dcnode-id="2826" instrument_node="">: Periodic meeting attended by representatives of utilities, for the purpose of informing those utilities of current policy and procedures and for discussing current topics of general interest.</span></p><span data-dcnode-id="2824" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2819"><span data-dcnode-id="2823" instrument_node="">“</span><b data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Construction”</span></b><span data-dcnode-id="2820" instrument_node="">: The actual building and all related work, including relocation or adjustments, incidental to the construction or reconstruction of a highway project-except for preliminary engineering, Subsurface Utility Engineering, test holes, or rights of way work which is programmed and authorized as a separate phase of work.</span></p><span data-dcnode-id="2818" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2813"><span data-dcnode-id="2817" instrument_node="">“</span><b data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Construction Plans”</span></b><span data-dcnode-id="2814" instrument_node="">: The large scale-usually 1 inch = 30 feet-plan sheets which show the highway project in detail.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2808"><b data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">“Consultant”</span></b><span data-dcnode-id="2809" instrument_node="">: A registered professional engineer engaged by the Department of Transportation, State of Delaware, or a utility, to develop plans, specifications, and estimates for the Department or for a utility.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2803"><b data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">“Control of Access”</span></b><span data-dcnode-id="2804" instrument_node="">: The condition where the right of owners or occupants of abutting land or other persons to access, light, air, or view in connection with a highway is fully or partially controlled by public authority.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">    Full control of access means that the authority to control access is exercised to give preference to through traffic by providing access connections with selected public roads only, by prohibiting at-grade crossings and direct private driveway connections.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">    Partial control of access means that the authority to control access is exercised to give preference to through traffic to a degree that, in addition to access connections with selected public roads, there may be some at-grade crossings and private driveway connections.</span></p><span data-dcnode-id="2796" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2792"><b data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">“Corner Cut (Daylight Corner)”</span></b><span data-dcnode-id="2793" instrument_node="">: A right-of-way area at an intersection reserved for sight clearance and/or turning clearance, usually by a diagonal right-of-way line.</span></p><span data-dcnode-id="2791" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2786"><span data-dcnode-id="2790" instrument_node="">“</span><b data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Cost of Relocation”</span></b><span data-dcnode-id="2787" instrument_node="">: The entire amount paid by or on behalf of the utility properly attributable to the relocation after deducting from that amount any increase in value of the new facility, and any salvage derived from the old facility.</span></p><span data-dcnode-id="2785" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2780"><span data-dcnode-id="2784" instrument_node="">“</span><b data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Cost of Removal”</span></b><span data-dcnode-id="2781" instrument_node="">: The amount expended to remove utility property including the cost of demolishing, dismantling, removing, transporting, or otherwise disposing of utility property and of cleaning up to leave the site in a neat and presentable condition.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2774"><span data-dcnode-id="2778" instrument_node="">“</span><b data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Cost, Replacement”</span></b><span data-dcnode-id="2775" instrument_node="">: The remaining portion of the total cost of the relocation of a facility after deducting therefrom the cost of betterment, credit for salvage, and expired service life credit.</span></p><span data-dcnode-id="2773" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2768"><span data-dcnode-id="2772" instrument_node="">“</span><b data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Cost, Right-of-Way”</span></b><span data-dcnode-id="2769" instrument_node="">: The cost of land and interests to the acquisition of land or interest in land required for the relocation of the utility facility.</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2763"><b data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">“Cost of Salvage”</span></b><span data-dcnode-id="2764" instrument_node="">: The amount expended to restore salvaged utility property to usable condition after its removal.</span></p><span data-dcnode-id="2762" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2757"><span data-dcnode-id="2761" instrument_node="">“</span><b data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Costs, Overhead or Indirect”</span></b><span data-dcnode-id="2758" instrument_node="">: Those costs, which are not readily identifiable with one specific task, job, or work order. Such costs may include indirect labor, social security taxes, insurance, stores expense, and general office expenses. Costs of this nature generally are distributed or allocated to the applicable job or work orders, other accounts and other functions to which they relate. Distribution and allocation is made on a uniform basis which is reasonable, equitable, and in accordance with generally accepted cost accounting practices.</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2751"><span data-dcnode-id="2755" instrument_node="">“</span><b data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Cover”</span></b><span data-dcnode-id="2752" instrument_node="">: Depth to top of pipe, conduit, casing, cable or similar line or utility tunnel below the earth or roadway surface. It is normally referenced from the bottom of the highway ditch.</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2746"><b data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">“Department”</span></b><span data-dcnode-id="2747" instrument_node="">: Department of Transportation, State of Delaware (DelDOT).</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2740"><span data-dcnode-id="2744" instrument_node="">“</span><b data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Designation”</span></b><span data-dcnode-id="2741" instrument_node="">: The process of using a surface geophysical method or methods to interpret the presence of a subsurface utility and to mark its approximate horizontal position (its designation) on the ground surface.</span></p><span data-dcnode-id="2739" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">“</span><b data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Designer”</span></b><span data-dcnode-id="2735" instrument_node="">: The Department employee engaged in the design of a highway project, or the outside engineering consulting firm hired by the Department for that purpose.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2728"><span data-dcnode-id="2732" instrument_node="">“</span><b data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Direct Burial”</span></b><span data-dcnode-id="2729" instrument_node="">: Installing a utility underground without encasement.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2722"><span data-dcnode-id="2726" instrument_node="">“</span><b data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">District Engineer”</span></b><span data-dcnode-id="2723" instrument_node="">: District Engineer of North, Canal, Central, or South District. The Engineer that is the highest authority in a district.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2716"><span data-dcnode-id="2720" instrument_node="">“</span><b data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">District Public Works Section”</span></b><span data-dcnode-id="2717" instrument_node="">: The unit within each district that is responsible for utility operations under the direction of the District Engineer.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">“</span><b data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Duct”</span></b><span data-dcnode-id="2711" instrument_node="">: An enclosed tubular casing for protecting wires, lines, or cables, often flexible or semi-rigid. </span></p><span data-dcnode-id="2709" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2704"><span data-dcnode-id="2708" instrument_node="">“</span><b data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Eligibility”</span></b><span data-dcnode-id="2705" instrument_node="">: The costs incurred on a project or a specific phase of a project that, when authorized, may be reimbursable provided they are legally qualified under the applicable State Highway Laws.</span></p><span data-dcnode-id="2703" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2695"><span data-dcnode-id="2702" instrument_node="">“</span><b data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Emergency”</span></b><span data-dcnode-id="2699" instrument_node="">: A situation where the safety of the traveling public or general public, or the structural integrity of the highway facility, is placed in immediate danger (as defined in the </span><b data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Delaware Code</span></b><span data-dcnode-id="2696" instrument_node="">, Title 26, Chapter 8 -- the "Miss Utility Law").</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2689"><span data-dcnode-id="2693" instrument_node="">“</span><b data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Encasement”</span></b><span data-dcnode-id="2690" instrument_node="">: A structural element that surrounds a carrier or casing.</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2683"><span data-dcnode-id="2687" instrument_node="">“</span><b data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Expired Service Life Credit”</span></b><span data-dcnode-id="2684" instrument_node="">: In any instance where the relocation involves the substitution of a replacement facility for an existing facility, a determination shall be made by the Department whether a credit is due to the project for the value of the expired service life of the facility being replaced. Such credit shall take into account the effect of such factors as wear and tear, action of the elements, and functional or economic obsolescence of the existing facility, not restored by maintenance during the years prior to the relocation.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2677"><span data-dcnode-id="2681" instrument_node="">“</span><b data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Expressway”</span></b><span data-dcnode-id="2678" instrument_node="">: A divided arterial highway for through traffic with full or partial control of access and generally with grade separations at major intersections. (See "Freeway.")</span></p><span data-dcnode-id="2676" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2671"><span data-dcnode-id="2675" instrument_node="">“</span><b data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Federal-Aid Coordinator”</span></b><span data-dcnode-id="2672" instrument_node="">: Maintains liaison with the Federal Highway Administration, insofar as fiscal matters are concerned, if federal monies are involved in the utility adjustment.</span></p><span data-dcnode-id="2670" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node="">“</span><b data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Federal-Aid Highway Projects”</span></b><span data-dcnode-id="2666" instrument_node="">: Active or completed projects administered by or through DelDOT, involving the use of federal aid highway funds for the development, acquisition of right of way, construction, or improvement of the highway or related facilities, including highway beautification projects under 23 U.S.C. 319, Landscaping and Scenic Enhancement.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2659"><span data-dcnode-id="2663" instrument_node="">“</span><b data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Federal Highway Administration (FHWA)”</span></b><span data-dcnode-id="2660" instrument_node="">: Highway agency of the U.S. Department of Transportation.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2653"><span data-dcnode-id="2657" instrument_node="">“</span><b data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Final Billing”</span></b><span data-dcnode-id="2654" instrument_node="">: The detailed summary of the actual costs incurred by the utility on their relocation including the documentation necessary to verify the amounts expended.</span></p><span data-dcnode-id="2652" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2647"><span data-dcnode-id="2651" instrument_node="">“</span><b data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Fixed or Non-traversable Objects”</span></b><span data-dcnode-id="2648" instrument_node="">: Existing or planned objects, whether natural or manufactured, such as trees, drainage structures, non-yielding sign or lighting structures, drainage ditches, retaining walls, rock outcroppings, utility facilities, etc.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2641"><span data-dcnode-id="2645" instrument_node="">“</span><b data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Force Account Basis”</span></b><span data-dcnode-id="2642" instrument_node="">: Utility work performed by the utility's own forces with reimbursement at actual cost.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2635"><span data-dcnode-id="2639" instrument_node="">“</span><b data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Freeway”</span></b><span data-dcnode-id="2636" instrument_node="">: An expressway (divided arterial highway) with full control of access.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2629"><span data-dcnode-id="2633" instrument_node="">“</span><b data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Highway, Street or Road”</span></b><span data-dcnode-id="2630" instrument_node="">: Any public way for vehicular travel, including the entire area within the rights of way and related facilities.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2623"><span data-dcnode-id="2627" instrument_node="">“</span><b data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Highway Construction Project”</span></b><span data-dcnode-id="2624" instrument_node="">: The construction, reconstruction, widening, or resurfacing of a State Highway, within the existing legal right of way or within a new required right of way, by contract or by Department forces or agent of the Department.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2617"><span data-dcnode-id="2621" instrument_node="">“</span><b data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Highway Right-of-Way”</span></b><span data-dcnode-id="2618" instrument_node="">: Real property or interests therein, acquired, dedicated, or reserved for the construction, operation, and maintenance of a highway. Lands acquired under Section 319(b), Title 23, U.S.C. (Scenic strips 1965 Highway Beautification Act) shall be considered to be under the jurisdiction of the Department.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2611"><span data-dcnode-id="2615" instrument_node="">“</span><b data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Horizontal Clearance”</span></b><span data-dcnode-id="2612" instrument_node="">: As stated in the DelDOT Road Design Manual; the lateral distance from edge of traveled way to a roadside feature or object for a roadway with barrier curb. Roadways having curbed sections should be provided with a minimum horizontal clearance of 1.5 feet beyond the face of curb, with wider offsets (if possible to the full clear zone width) provided where practical since most types of curbs provide little help in redirecting an errant vehicle. Please see the DelDOT Road Design Manual and the AASHTO Green Book for more information regarding horizontal clearance.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2605"><span data-dcnode-id="2609" instrument_node="">“</span><b data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Initial Payment”</span></b><span data-dcnode-id="2606" instrument_node="">: First relocation payment to the utility by the Department under the terms of a reimbursement agreement.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2599"><span data-dcnode-id="2603" instrument_node="">“</span><b data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Interim Payment (periodic billing)”</span></b><span data-dcnode-id="2600" instrument_node="">: Reimbursement by the Department to the utility, either in specified minimum amounts or definite billing periods, as invoices for completed relocation work are submitted, whenever provided for in the reimbursement agreement.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2593"><span data-dcnode-id="2597" instrument_node="">“</span><b data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Jacking”</span></b><span data-dcnode-id="2594" instrument_node="">: The pushing of a sleeve or casing pipe under a highway to make an underground utility crossing without disturbing the roadbed by open trenching.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2587"><span data-dcnode-id="2591" instrument_node="">“</span><b data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Manhole (Utility Access Hole”)</span></b><span data-dcnode-id="2588" instrument_node="">: An opening in an underground system which workers may enter for the purpose of making installations, removals, inspections, repairs, connections, and tests.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2578"><span data-dcnode-id="2585" instrument_node="">“</span><b data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Master Franchise”</span></b><span data-dcnode-id="2582" instrument_node="">: The legal document that authorizes a regulated Public Utility to place its facilities within State rights of way, without any vested interest therein, under the provisions of </span><b data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Delaware Code </span></b><span data-dcnode-id="2579" instrument_node="">1953, Title 17, and supplements thereto.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2572"><span data-dcnode-id="2576" instrument_node="">“</span><b data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Median”</span></b><span data-dcnode-id="2573" instrument_node="">: The portion of a divided highway separating the traveled ways for traffic in opposite directions.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">“</span><b data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Non-participating”</span></b><span data-dcnode-id="2567" instrument_node="">: Whenever utility relocations are not programmed with FHWA for reimbursement to the Department from federal funds, they are called "non-participating." Project design, right-of-way acquisition, and construction can be "participating," while utility relocations can be "non-participating." Particular utility relocations may be handled as "non-participating" on a federal-aid project, even when other utility relocation work on the same project is programmed as "participating."</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2554"><span data-dcnode-id="2564" instrument_node="">“</span><b data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Offset”</span></b><span data-dcnode-id="2561" instrument_node="">: A. “</span><b data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Surveying offset” </span></b><span data-dcnode-id="2558" instrument_node="">- A distance measured at right angles from the centerline of a highway to a specific point. B. “</span><b data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Roadway offset”</span></b><span data-dcnode-id="2555" instrument_node=""> - A measured distance along the centerline of a highway in feet from an established segment.</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2548"><span data-dcnode-id="2552" instrument_node="">“</span><b data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Participating”</span></b><span data-dcnode-id="2549" instrument_node="">: Refers to utility adjustments or relocations performed after work has been programmed with and authorized by FHWA. Such funds are requested by the State at the pro-rata share applicable for the project where FHWA requirements are met by the Department and the utility.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2542"><span data-dcnode-id="2546" instrument_node="">“</span><b data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Pipe”</span></b><span data-dcnode-id="2543" instrument_node="">: A tubular product made as a production item for sale as such. Cylinders formed from plate material in the course of the fabrication of auxiliary equipment are not pipe as defined here.</span></p><span data-dcnode-id="2541" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2536"><span data-dcnode-id="2540" instrument_node="">“</span><b data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Flexible Pipe”</span></b><span data-dcnode-id="2537" instrument_node=""> - A plastic, fiberglass, or metallic pipe having large ratio of diameter to wall thickness, which can be deformed without undue stress.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">“</span><b data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Rigid Pipe”</span></b><span data-dcnode-id="2531" instrument_node=""> - Pipe designed for diametric deflection of less than one percent.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2524"><span data-dcnode-id="2528" instrument_node="">“</span><b data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Semi-Rigid Pipe”</span></b><span data-dcnode-id="2525" instrument_node=""> - Pipe designed to tolerate from one percent to three percent diametric deflection.</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2518"><span data-dcnode-id="2522" instrument_node="">“</span><b data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Plan Sheet Index”</span></b><span data-dcnode-id="2519" instrument_node="">: The small-scale highway plan sheet, usually sheet number two, showing the entire project.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2513"><b data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">“Preliminary Engineering (PE) estimate”</span></b><span data-dcnode-id="2514" instrument_node="">: Estimate of the preliminary engineering required to design the alteration, adjustments and/or relocation.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2507"><span data-dcnode-id="2511" instrument_node="">“</span><b data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Preliminary Engineering (PE”)</span></b><span data-dcnode-id="2508" instrument_node="">: The making of surveys, the preparation of utility plans, specifications, estimates (PS&amp;E) and other related preparatory work in advance of construction operations.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node="">“</span><b data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Prior Rights”</span></b><span data-dcnode-id="2502" instrument_node="">: Exist when a utility is determined to have legally occupied a public right of way prior to the time such right of way was conveyed to or acquired by the State of Delaware's Department of Transportation.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2495"><span data-dcnode-id="2499" instrument_node="">“</span><b data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Private Lines”</span></b><span data-dcnode-id="2496" instrument_node="">: Privately owned facilities that convey or transmit utility commodities devoted exclusively to private use.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2489"><span data-dcnode-id="2493" instrument_node="">“</span><b data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Private Right-of-Way”</span></b><span data-dcnode-id="2490" instrument_node="">: Lands in which utilities have a real property interest for the purpose of distributing or transmitting service. This term, when used for determining eligibility for reimbursement, shall mean any area outside of a public right of way, except lands owned by the State that are occupied by right of a license.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2483"><span data-dcnode-id="2487" instrument_node="">“</span><b data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Private Right-of-Way Status”</span></b><span data-dcnode-id="2484" instrument_node="">: Facilities located within the right of way regarded by the Department as having private rights for the purpose of determining liability for relocation costs in the event of further relocation. In this situation, the Department is responsible for paying relocation costs or for providing substitute right of way.</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">“</span><b data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Project Manager”</span></b><span data-dcnode-id="2478" instrument_node="">: The DelDOT staff member responsible and accountable for satisfactory completion of the construction project.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">“</span><b data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Prorated Shares”</span></b><span data-dcnode-id="2472" instrument_node="">: The percentages of financial responsibility of the utility and the Department on a utility relocation necessitated by a highway construction project. Generally, proration is based on the original location of utility facilities.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2465"><span data-dcnode-id="2469" instrument_node="">“</span><b data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">PS&amp;E”</span></b><span data-dcnode-id="2466" instrument_node="">: Stands for "plans, specifications, and estimates."</span></p><span data-dcnode-id="2464" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2459"><span data-dcnode-id="2463" instrument_node="">“</span><b data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Public Right-of-way”</span></b><span data-dcnode-id="2460" instrument_node="">: The legal right of way of any public highway, street, road, or alley that is under the jurisdiction of the Department or any municipality or political subdivision. Law also designates certain navigable waterways as public rights of way.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2444"><span data-dcnode-id="2457" instrument_node="">“</span><b data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Public Utility”</span></b><span data-dcnode-id="2454" instrument_node="">: 'public utility' means a utility as defined in 26</span><b data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node=""> Del.C. </span></b><span data-dcnode-id="2451" instrument_node="">§102(2) and (4)</span><b data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node=""> </span></b><span data-dcnode-id="2448" instrument_node="">per the</span><b data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node=""> Delaware Code </span></b><span data-dcnode-id="2445" instrument_node="">§143, Title 17. A private business organization, subject to governmental regulation, that provides an essential commodity or service, such as water, gas, electricity, wastewater, or telecommunications, to the public.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2439"><b data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">“Real Property Interest Document”</span></b><span data-dcnode-id="2440" instrument_node="">: Evidence of the utility's title to a compensable real property interest.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2433"><span data-dcnode-id="2437" instrument_node="">“</span><b data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Reimburse and Participate (or their derivatives)”</span></b><span data-dcnode-id="2434" instrument_node="">: Shall mean that State funds may be used to repay the utility to the extent provided by law.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2427"><span data-dcnode-id="2431" instrument_node="">“</span><b data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Relocation”</span></b><span data-dcnode-id="2428" instrument_node="">: The adjustment of utility facilities required by the highway project. It includes removing and reinstalling the facility, including necessary temporary facilities, acquiring necessary right-of-way on the new location, moving, rearranging or changing the type of existing facilities and taking any necessary safety and protective measures. It shall also mean constructing a replacement facility that is both functionally equivalent to the existing facility and necessary for continuous operation of the utility service, the project economy, or sequence of highway construction.</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2421"><span data-dcnode-id="2425" instrument_node="">“</span><b data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Replacement Facility”</span></b><span data-dcnode-id="2422" instrument_node="">: The replacement of the function of a facility rather than installing a replica facility.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">“</span><b data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Required Right-of-Way”</span></b><span data-dcnode-id="2416" instrument_node="">: Private property to be acquired by the Department for highway purposes by amicable settlement or by Eminent Domain proceedings.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2409"><span data-dcnode-id="2413" instrument_node="">“</span><b data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Right-of-Way”</span></b><span data-dcnode-id="2410" instrument_node="">: Real property, or interests therein, acquired, dedicated, or reserved for the construction, operation, and maintenance of a highway, road, or street.</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2403"><span data-dcnode-id="2407" instrument_node="">“</span><b data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Right-of-Way Certificate”</span></b><span data-dcnode-id="2404" instrument_node="">: A contract document that certifies that the right of way necessary to construct the project is available.</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2397"><span data-dcnode-id="2401" instrument_node="">“</span><b data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Roadside”</span></b><span data-dcnode-id="2398" instrument_node="">: A general term denoting the area adjoining the outer edge of the roadway. Extensive areas between the roadways of a divided highway may also be considered roadside.</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2391"><span data-dcnode-id="2395" instrument_node="">“</span><b data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Roadway”</span></b><span data-dcnode-id="2392" instrument_node="">: In general, the portion of a highway, including shoulders, for vehicular use. A divided highway has two or more roadways. In construction specifications, the portion of a highway within the limits of construction.</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">“</span><b data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Sacrificed Life”</span></b><span data-dcnode-id="2386" instrument_node="">: A reimbursable charge in the amount of the computed value of the unused life of a facility removed from private property and not functionally replaced.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2379"><span data-dcnode-id="2383" instrument_node="">“</span><b data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Salvage”</span></b><span data-dcnode-id="2380" instrument_node="">: The material removed and used or placed in storage for future use.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2373"><span data-dcnode-id="2377" instrument_node="">“</span><b data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Salvage Value”</span></b><span data-dcnode-id="2374" instrument_node="">: The amount received from the sale of utility property that has been removed or the amount at which the recovered material is charged to the utility's accounts, if retained for reuse.</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2367"><span data-dcnode-id="2371" instrument_node="">“</span><b data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Scrap”</span></b><span data-dcnode-id="2368" instrument_node="">: Material that is not suitable for reuse and which is removed by the utility and sold, for which the State will receive proper credit.</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">“</span><b data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Service Connection”</span></b><span data-dcnode-id="2362" instrument_node="">: A line from a utility's main distribution line to the premises served, sometimes privately owned.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2356"><b data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">“Single-pole Construction”</span></b><span data-dcnode-id="2357" instrument_node="">: Use of single poles to support aerial facilities rather than double-pole arrangements such as H-frames.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2350"><span data-dcnode-id="2354" instrument_node="">“</span><b data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Sleeve”</span></b><span data-dcnode-id="2351" instrument_node="">: A short casing through pier or abutment of highway structure.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">“</span><b data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Standard Construction Details”</span></b><span data-dcnode-id="2345" instrument_node="">: The DelDOT Standard Construction Details in effect on the date work commenced. The Details can be found at the following Web address: http://www.deldot.gov/static/publications forms.html</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">“</span><b data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Standard Specifications”</span></b><span data-dcnode-id="2339" instrument_node="">: The Standard Specifications for Road and Bridge Construction of DelDOT, in effect on the date work commenced. The Specifications can be found at the following Web address: http://www.deldot.gov/static/publications forms.html</span></p><span data-dcnode-id="2337" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2332"><span data-dcnode-id="2336" instrument_node="">“</span><b data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">State”</span></b><span data-dcnode-id="2333" instrument_node="">: Department of Transportation, (DelDOT), State of Delaware.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2326"><span data-dcnode-id="2330" instrument_node="">“</span><b data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Test Hole Locating”</span></b><span data-dcnode-id="2327" instrument_node="">: The locating, through the use of test holes, of underground utility facilities. The entire procedure includes surveying and providing data for the top and bottom of the located facility as well as the existing ground at the site; tying vertical controls to a minimum of the two checked bench marks or available datum; properly backfilling the test holes and restoring the pavement to an acceptable condition approved by the Department; and providing data on Department plans as may be required.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node="">“</span><b data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Total Estimated Service Life of the Replaced facility”</span></b><span data-dcnode-id="2321" instrument_node="">: The sum of the period of actual use plus the period of expectant remaining life. In instances where such a facility is still in operation but fully depreciated on the utility accounts, there shall be a mutual determination by the interested parties to establish the expected remaining life of the replaced facility.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node="">“</span><b data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Traveled way (or travelway)”</span></b><span data-dcnode-id="2315" instrument_node="">: The portion of the roadway for the movement of vehicles, exclusive of shoulders and auxiliary lanes.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2308"><span data-dcnode-id="2312" instrument_node="">“</span><b data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Use and Occupancy agreement”</span></b><span data-dcnode-id="2309" instrument_node="">: The document (written agreement or permit) by which the Department approves the use and occupancy of highway right-of-way by utility facilities or private lines.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2302"><span data-dcnode-id="2306" instrument_node="">“</span><b data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Utility Coordinator”</span></b><span data-dcnode-id="2303" instrument_node="">: Coordinates the relocation or adjustment of all utilities between the utility and the Department of Transportation, State of Delaware.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">“</span><b data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Utilities Engineer”</span></b><span data-dcnode-id="2297" instrument_node="">: The Engineer and authorized Representative of the Chief Engineer responsible for utility coordination work performed within DelDOT Transportation Solutions, Engineering Support.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2290"><span data-dcnode-id="2294" instrument_node="">“</span><b data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Utilities Section”</span></b><span data-dcnode-id="2291" instrument_node="">: The unit within DelDOT Transportation Solutions, Engineering Support responsible for matters concerning utilities under the direction of the Utilities Engineer.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2284"><span data-dcnode-id="2288" instrument_node="">“</span><b data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Utility Clearance”</span></b><span data-dcnode-id="2285" instrument_node="">: The arrangements by the utilities to accommodate the highway construction project. It does not indicate that the utility facilities are actually removed from the area but that facilities have been either adjusted to accommodate construction or that arrangements have been made to coordinate the relocation work with the highway contractor's operations.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2278"><span data-dcnode-id="2282" instrument_node="">“</span><b data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Utility Construction Permit”</span></b><span data-dcnode-id="2279" instrument_node="">: A permit that authorizes a utility to construct, maintain, or repair a utility facility within State rights of way.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2272"><span data-dcnode-id="2276" instrument_node="">“</span><b data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Utility Design Meetings”</span></b><span data-dcnode-id="2273" instrument_node="">: Utility-DelDOT meetings held to discuss utility relocations on specific highway construction projects. Usually, two such meetings are held on each project, the initial meeting to discuss probable relocation schemes and the final meeting to review relocations for inclusion in the highway plans.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node="">“</span><b data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Utility Plans, Specifications and Estimate (Utility PS&amp;E)”</span></b><span data-dcnode-id="2267" instrument_node="">: The detailed relocation cost estimate, prepared by the utility, consisting of highway plan sheets marked to show the relocation and any additional utility drawings or supplemental sheets that are necessary to provide a clear picture of the work to be performed and how the estimated costs were determined.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">“</span><b data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Utility Statement”</span></b><span data-dcnode-id="2261" instrument_node="">: A synopsis of utility relocation work and its anticipated schedule that is incorporated in the bid package upon approval by the Department. (See Section 5.1.4)</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2254"><span data-dcnode-id="2258" instrument_node="">“</span><b data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Verification of Facilities”</span></b><span data-dcnode-id="2255" instrument_node="">: The furnishing of information by the utility to verify the type, size, and location of facilities for the mutual benefit of both parties. It is intended that this may be accomplished at nominal cost to the utility, e.g., through maps, records, etc.</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2248"><span data-dcnode-id="2252" instrument_node="">“</span><b data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Work Order System”</span></b><span data-dcnode-id="2249" instrument_node="">: A procedure for accumulating and recording into separate accounts of a utility all costs to the utility in connection with any change in its system or plant.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p class="section" data-dcnode-id="2244" style="text-indent: 0pt; margin-bottom: 2pt"><b data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">3.0 Design Requirements</span></b></p><span data-dcnode-id="2243" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">    The requirements presented in this chapter apply to the location and design of all utility installations within the highway rights-of-way.</span></p><span data-dcnode-id="2240" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">3.1   Types Of Work</span></p><span data-dcnode-id="2237" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">    There are two distinct types of utility work in highway rights-of-way:</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">3.1.1    Permit and New Service Installation Work. This work usually encompasses the maintenance of existing utility facilities or the installation of new services or utility distribution facilities. The appropriate District Public Works staff issues the permits and inspects the work.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">     The purpose of the permit is to alert DelDOT that the work is taking place, so that DelDOT can review the traffic control, proposed locations and design and inspect the work to ensure the integrity of the roadway.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">3.1.2    Project Design and Facility Relocation Work. This work results from highway construction projects where it is necessary to relocate utility facilities. Project design work is coordinated through the Utilities Engineer and the Utilities Section. A permit is usually not required for this type of work because the highway construction project supervisor inspects the work. However, a permit is required for utility work in advance of construction where DelDOT Construction is not yet assigned to the project. The permit is processed via the District Public Works office. A permit is also required for preliminary test holes for the location of utilities unless the District waives the requirement.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">     Traffic control for project design work is coordinated with the highway contractor, the highway construction project supervisor and the Construction District to ensure proper safety standards are employed.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">     The District Public Works Section administers permit work in its district. The Construction Group Engineer administers highway construction projects. The Chief Engineer and the Assistant Director of Project Development are responsible for the project design. Any situations that cannot be resolved through the normal process may be forwarded to the appropriate authority.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">3.2   Highway Safety And Traffic Control</span></p><span data-dcnode-id="2216" instrument_node="">
</span><p class="body-l1" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">    The Department considers highway safety a high priority that is an essential and indispensable component of every project from planning through the design and construction phases. Therefore, companies that install, maintain, service, operate, or otherwise work upon utilities within highway rights-of-way are always obligated to consider the safety of the general public. This includes providing appropriate traffic control within work areas.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p class="body-l2" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">3.2.1    Traffic Control</span></p><span data-dcnode-id="2210" instrument_node="">
