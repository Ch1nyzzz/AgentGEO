</span><p class="Body body-test" data-dcnode-id="5409"><a data-dcnode-id="5410" name="1039307"><span data-dcnode-id="5411" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5408" instrument_node="">
</span><div class="Title" data-dcnode-id="5405"><a data-dcnode-id="5406" name="1039308"><span data-dcnode-id="5407" instrument_node="">702 Fire Protection in Building Construction</span></a></div><span data-dcnode-id="5404" instrument_node="">
</span><div class="Body_Text" data-dcnode-id="5401" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-align: left; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5402" name="1039309"><span data-dcnode-id="5403" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="5400" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5396" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5397" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5398" name="1040738"><span data-dcnode-id="5399" instrument_node="">Chapter 1 Fire Protection In Buildings</span></a></span></p><span data-dcnode-id="5395" instrument_node="">
</span><div class="styrsid7299678_Body_Text" data-dcnode-id="5392" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-top: 0.0pt; text-align: left; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5393" name="1040739"><span data-dcnode-id="5394" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="5391" instrument_node="">
</span><p class="Section section" data-dcnode-id="5388"><a data-dcnode-id="5389" name="1040740"><span data-dcnode-id="5390" instrument_node="">1.0	New Buildings, Occupancy Conversions, Mixed Occupancies, Additions, and Repairs.</span></a></p><span data-dcnode-id="5387" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5383" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5384" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5385" name="1040741"><span data-dcnode-id="5386" instrument_node="">1.1			New Building Construction.</span></a></span></p><span data-dcnode-id="5382" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5379"><a data-dcnode-id="5380" name="1040742"><span data-dcnode-id="5381" instrument_node="">1.1.1				All buildings hereinafter constructed shall meet all applicable sections of these Regulations including the codes and standards contained within Regulation 701 as well as all applicable sections of any building code which is in effect within Delaware or any of its political subdivisions.</span></a></p><span data-dcnode-id="5378" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5374" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5375" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5376" name="1040743"><span data-dcnode-id="5377" instrument_node="">1.2			Occupancy Conversion.</span></a></span></p><span data-dcnode-id="5373" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5370"><a data-dcnode-id="5371" name="1040744"><span data-dcnode-id="5372" instrument_node="">1.2.1				Any existing occupancy hereinafter converted to another occupancy shall meet the provisions of this Regulation. All changes in occupancies shall comply with Regulation 702, Chapter 4 and Chapter 5.</span></a></p><span data-dcnode-id="5369" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5365" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5366" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5367" name="1040745"><span data-dcnode-id="5368" instrument_node="">1.3			Mixed Occupancies.</span></a></span></p><span data-dcnode-id="5364" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5361"><a data-dcnode-id="5362" name="1040746"><span data-dcnode-id="5363" instrument_node="">1.3.1				Where two or more occupancies occur in the same building or structure, and are so intermingled that separate safeguards are impracticable, means of egress facilities, construction, protection, and other safeguards shall comply with the most restrictive code requirements of the occupancies involved. </span></a></p><span data-dcnode-id="5360" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5356" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5357" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5358" name="1040747"><span data-dcnode-id="5359" instrument_node="">1.4			Additions.</span></a></span></p><span data-dcnode-id="5355" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5352"><a data-dcnode-id="5353" name="1040748"><span data-dcnode-id="5354" instrument_node="">1.4.1				All additions connected to existing buildings or structures shall meet the provisions of this Regulation and National Fire Protection Association Codes and Standards as adopted and/or modified by these Regulations.</span></a></p><span data-dcnode-id="5351" instrument_node="">
</span><div class="Exception" data-dcnode-id="5347" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5348" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5349" name="1040749"><span data-dcnode-id="5350" instrument_node="">Exception No. 1: When the addition(s) to the existing building create an aggregate, gross floor area exceeding 10,000 sq. ft., the requirements of Regulation 702, Chapter 4 shall apply. </span></a></span></div><span data-dcnode-id="5346" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5343" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="5344" name="1040754"><span data-dcnode-id="5345" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5342" instrument_node="">
</span><span data-dcnode-id="5341" instrument_node="">
</span><span data-dcnode-id="5339" instrument_node="">
</span><span data-dcnode-id="5338" instrument_node="">
</span><span data-dcnode-id="5329" instrument_node="">
</span><span data-dcnode-id="5327" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="5325" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="5340"></caption><tbody data-dcnode-id="5326"><tr data-dcnode-id="5328"><td data-dcnode-id="5330" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="5337" instrument_node="">
</span><div class="CellBody" data-dcnode-id="5332"><span data-dcnode-id="5334" style="font-weight: bold"><a data-dcnode-id="5335" name="1040753"><span data-dcnode-id="5336" instrument_node="">Note:</span></a></span><span data-dcnode-id="5333" instrument_node=""> This revision eliminates the need for a Two-Hour Rated Fire Barrier Wall (Class “C” Fire Barrier) to separate additions from existing buildings. Exception No. 1 restricts the aggregate total of the addition and existing building to 10,000 sq.ft. unless the provisions for providing a sprinkler system are met. </span></div><span data-dcnode-id="5331" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5324" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5321"><a data-dcnode-id="5322" name="1040755"><span data-dcnode-id="5323" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5320" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5317"><a data-dcnode-id="5318" name="1040756"><span data-dcnode-id="5319" instrument_node="">1.5			Building Rehabilitation.</span></a></p><span data-dcnode-id="5316" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5313"><a data-dcnode-id="5314" name="1040757"><span data-dcnode-id="5315" instrument_node="">1.5.1				All building rehabilitation shall meet the provisions of this Regulations and National Fire Protection Association Codes and Standards as adopted and/or modified by these Regulations.</span></a></p><span data-dcnode-id="5312" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5308" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5309" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5310" name="1040758"><span data-dcnode-id="5311" instrument_node="">1.6			Repair of Fire, Explosion or Other Damage.</span></a></span></p><span data-dcnode-id="5307" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5304"><a data-dcnode-id="5305" name="1040759"><span data-dcnode-id="5306" instrument_node=""> 1.6.1				Whenever a building has been damaged by fire, explosion or other cause and the damaged area is less than 50% of the total area only that section damaged shall meet the provisions of this Chapter.</span></a></p><span data-dcnode-id="5303" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5300"><a data-dcnode-id="5301" name="1040760"><span data-dcnode-id="5302" instrument_node=""> 1.6.2				Whenever a building has been damaged by fire, explosion or other cause and the damaged area is 50% or greater the entire building shall meet the provisions of this Chapter.</span></a></p><span data-dcnode-id="5299" instrument_node="">
</span><p class="Citation" data-dcnode-id="5296"><a data-dcnode-id="5297" name="1042106"><span data-dcnode-id="5298" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="5295" instrument_node="">
</span><p class="Citation" data-dcnode-id="5292"><a data-dcnode-id="5293" name="1043035"><span data-dcnode-id="5294" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="5291" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5288" style="text-align: left"><a data-dcnode-id="5289" name="1040761"><span data-dcnode-id="5290" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5287" instrument_node="">
</span><p class="Section section" data-dcnode-id="5284"><a data-dcnode-id="5285" name="1040762"><span data-dcnode-id="5286" instrument_node="">2.0	Existing Buildings.</span></a></p><span data-dcnode-id="5283" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5279" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5280" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5281" name="1040763"><span data-dcnode-id="5282" instrument_node="">2.1			Determination of Hazard; Correction.</span></a></span></p><span data-dcnode-id="5278" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5272"><a data-dcnode-id="5276" name="1040764"><span data-dcnode-id="5277" instrument_node="">2.1.1				Whenever the State Fire Prevention Commission finds a building to be a hazard so inimical to the safety of the public so as to require correction, in accordance with 16 </span></a><span data-dcnode-id="5274" style="font-weight: bold"><span data-dcnode-id="5275" instrument_node="">Del.C.</span></span><span data-dcnode-id="5273" instrument_node=""> §6603, the applicable existing occupancy sections of the Life Safety Code, NFPA 101, shall be used to provide a reasonable level of safety. In addition, the State Fire Marshal may use other Regulations, codes and standards as a guide in achieving a reasonable level of safety.</span></p><span data-dcnode-id="5271" instrument_node="">
</span><p class="Citation" data-dcnode-id="5268"><a data-dcnode-id="5269" name="1040765"><span data-dcnode-id="5270" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="5267" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5264"><a data-dcnode-id="5265" name="1043063"><span data-dcnode-id="5266" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5263" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5259" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5260" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5261" name="1040766"><span data-dcnode-id="5262" instrument_node="">Chapter 2 Fire Barriers</span></a></span></p><span data-dcnode-id="5258" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5255"><a data-dcnode-id="5256" name="1040767"><span data-dcnode-id="5257" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5254" instrument_node="">
</span><p class="Section section" data-dcnode-id="5251"><a data-dcnode-id="5252" name="1040768"><span data-dcnode-id="5253" instrument_node="">1.0	Definition.</span></a></p><span data-dcnode-id="5250" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5247"><a data-dcnode-id="5248" name="1040769"><span data-dcnode-id="5249" instrument_node="">	A fire barrier is a continuous membrane, either vertical or horizontal, such as a wall or floor assembly, that is designed and constructed with a specified fire resistance rating to limit the spread of fire and which will also restrict the movement of smoke. Fire barriers shall be required to meet all applicable sections of these Regulations.</span></a></p><span data-dcnode-id="5246" instrument_node="">
</span><p class="Citation" data-dcnode-id="5243"><a data-dcnode-id="5244" name="1042144"><span data-dcnode-id="5245" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="5242" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5239"><a data-dcnode-id="5240" name="1040770"><span data-dcnode-id="5241" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5238" instrument_node="">
</span><p class="Section section" data-dcnode-id="5235"><a data-dcnode-id="5236" name="1040771"><span data-dcnode-id="5237" instrument_node="">2.0	Reserved - (Class “A” Fire Barriers).</span></a></p><span data-dcnode-id="5234" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5231"><a data-dcnode-id="5232" name="1040772"><span data-dcnode-id="5233" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5230" instrument_node="">
</span><p class="Section section" data-dcnode-id="5227"><a data-dcnode-id="5228" name="1040773"><span data-dcnode-id="5229" instrument_node="">3.0	Two-Hour Rated Fire Wall (Class “B” Fire Barriers)</span></a></p><span data-dcnode-id="5226" instrument_node="">
</span><div class="slink51_styrsid7299678_Sectio" data-dcnode-id="5223" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5224" name="1040777"><span data-dcnode-id="5225" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="5222" instrument_node="">
</span><span data-dcnode-id="5221" instrument_node="">
</span><span data-dcnode-id="5219" instrument_node="">
</span><span data-dcnode-id="5218" instrument_node="">
</span><span data-dcnode-id="5209" instrument_node="">
</span><span data-dcnode-id="5207" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="5205" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="5220"></caption><tbody data-dcnode-id="5206"><tr data-dcnode-id="5208"><td data-dcnode-id="5210" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="5217" instrument_node="">
</span><div class="CellBody" data-dcnode-id="5212"><span data-dcnode-id="5214" style="font-weight: bold"><a data-dcnode-id="5215" name="1040776"><span data-dcnode-id="5216" instrument_node="">Note: </span></a></span><span data-dcnode-id="5213" instrument_node="">Two-Hour Rated Fire Walls (Class “B” Fire Barriers) are utilized to sub-divide buildings that exceed 10,000 aggregate gross square feet, only where no public or private water distribution is available. See Regulation 702, Chapter 4 of this Regulation.</span></div><span data-dcnode-id="5211" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5204" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5201"><a data-dcnode-id="5202" name="1040778"><span data-dcnode-id="5203" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5200" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5196" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5197" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5198" name="1040779"><span data-dcnode-id="5199" instrument_node="">3.1			A Two-Hour Rated Fire Wall may be used to reduce a fire compartment within a building to the area limitations required by Chapter 4 of this Regulation, or any other part of these Regulations.</span></a></span></p><span data-dcnode-id="5195" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5191" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5192" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5193" name="1040780"><span data-dcnode-id="5194" instrument_node="">3.2			Two-Hour Rated Fire Walls shall meet the following criteria:</span></a></span></p><span data-dcnode-id="5190" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5187"><a data-dcnode-id="5188" name="1040781"><span data-dcnode-id="5189" instrument_node="">3.2.1				The fire wall is to be constructed in accordance with the provisions of the Standard for High Challenge Fire Walls, Fire Walls, and Fire Barrier Walls, NFPA 221;</span></a></p><span data-dcnode-id="5186" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5183"><a data-dcnode-id="5184" name="1040782"><span data-dcnode-id="5185" instrument_node="">3.2.2				The fire wall is to be of masonry construction and is to have a two-hour fire resistance rating;</span></a></p><span data-dcnode-id="5182" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5179"><a data-dcnode-id="5180" name="1040783"><span data-dcnode-id="5181" instrument_node="">3.2.3				The fire wall is to be a cantilevered/free standing fire wall; or, a tied fire wall; or, a double fire wall;</span></a></p><span data-dcnode-id="5178" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5175"><a data-dcnode-id="5176" name="1040784"><span data-dcnode-id="5177" instrument_node="">3.2.4				Continuous through the roof and parapetted a minimum of thirty (30) inches. The parapet height shall measured from the top surface of the roof being protected. Roofs sloped greater than ¼ in. per ft. downward toward the wall shall be provided with a minimum thirty-six inch (36”) parapet;</span></a></p><span data-dcnode-id="5174" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5171"><a data-dcnode-id="5172" name="1040785"><span data-dcnode-id="5173" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5170" instrument_node="">
</span><div class="Exception" data-dcnode-id="5166" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5167" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5168" name="1040786"><span data-dcnode-id="5169" instrument_node="">Exception No. 1 to 3.2.4: This wall may terminate at the underside of a noncombustible roof deck.</span></a></span></div><span data-dcnode-id="5165" instrument_node="">
</span><div class="Exception" data-dcnode-id="5161" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5162" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5163" name="1040787"><span data-dcnode-id="5164" instrument_node="">Exception No. 2 to 3.2.4: Exception #1 may be utilized only one time per building exceeding 10,000 square feet. Any Barrier utilized thereafter shall be parapetted per these Regulations.</span></a></span></div><span data-dcnode-id="5160" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5157"><a data-dcnode-id="5158" name="1040788"><span data-dcnode-id="5159" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5156" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5153"><a data-dcnode-id="5154" name="1040789"><span data-dcnode-id="5155" instrument_node="">3.2.5				Openings, if any, protected with a 1 ½ hour fire rated protective assembly on both sides of the opening.</span></a></p><span data-dcnode-id="5152" instrument_node="">
</span><div class="styrsid7299678_Body-L5" data-dcnode-id="5149" style="margin-bottom: 0.0pt; margin-left: 162pt; margin-top: 0.0pt; text-align: left; text-indent: -72pt"><a data-dcnode-id="5150" name="1040793"><span data-dcnode-id="5151" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="5148" instrument_node="">
</span><span data-dcnode-id="5147" instrument_node="">
</span><span data-dcnode-id="5145" instrument_node="">
</span><span data-dcnode-id="5144" instrument_node="">
</span><span data-dcnode-id="5135" instrument_node="">
</span><span data-dcnode-id="5133" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="5131" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="5146"></caption><tbody data-dcnode-id="5132"><tr data-dcnode-id="5134"><td data-dcnode-id="5136" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="5143" instrument_node="">
</span><div class="CellBody" data-dcnode-id="5138"><span data-dcnode-id="5140" style="font-weight: bold"><a data-dcnode-id="5141" name="1040792"><span data-dcnode-id="5142" instrument_node="">Note:</span></a></span><span data-dcnode-id="5139" instrument_node="">		Exceptions No. 1 and 2 to subsection 3.2.4. These exceptions allow the use of a Class B Barrier without a parapet in buildings up to 20,000 square feet. This type of Class B Barrier can be utilized only one time, and any additional fire barriers shall be parapetted per these Regulations.</span></div><span data-dcnode-id="5137" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5130" instrument_node="">
</span><p class="Citation" data-dcnode-id="5127"><a data-dcnode-id="5128" name="1040794"><span data-dcnode-id="5129" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="5126" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5123"><a data-dcnode-id="5124" name="1043121"><span data-dcnode-id="5125" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5122" instrument_node="">
</span><p class="Section section" data-dcnode-id="5119"><a data-dcnode-id="5120" name="1040795"><span data-dcnode-id="5121" instrument_node="">4.0	Two-Hour Rated Fire Barrier Wall (Class “C” Fire Barrier).</span></a></p><span data-dcnode-id="5118" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5114" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5115" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5116" name="1040796"><span data-dcnode-id="5117" instrument_node="">4.1			A Two-hour rated fire barrier wall (for use in providing “approved” fire barriers in order to segment buildings into individual fire divisions) shall be a two-hour fire rated assembly, and shall meet the following criteria:</span></a></span></p><span data-dcnode-id="5113" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5110"><a data-dcnode-id="5111" name="1040797"><span data-dcnode-id="5112" instrument_node="">4.1.1				The fire barrier wall is to be constructed in accordance with the provisions of the Standard for High Challenge Fire Walls, Fire Walls, and Fire Barrier Walls, NFPA 221;</span></a></p><span data-dcnode-id="5109" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5106"><a data-dcnode-id="5107" name="1040798"><span data-dcnode-id="5108" instrument_node="">4.1.2				The fire barrier wall is to have a two-hour fire resistance rating; </span></a></p><span data-dcnode-id="5105" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5102"><a data-dcnode-id="5103" name="1040799"><span data-dcnode-id="5104" instrument_node="">4.1.3				The fire barrier wall shall extend from the foundation or floor below to the underside of the roof or floor deck above;</span></a></p><span data-dcnode-id="5101" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5098"><a data-dcnode-id="5099" name="1040800"><span data-dcnode-id="5100" instrument_node="">4.1.4				Openings, if any shall be protected with a 1 ½ hour fire rated protective assembly on one side of the opening.</span></a></p><span data-dcnode-id="5097" instrument_node="">
</span><span data-dcnode-id="5096" instrument_node="">
</span><span data-dcnode-id="5094" instrument_node="">
</span><span data-dcnode-id="5093" instrument_node="">
</span><span data-dcnode-id="5084" instrument_node="">
</span><span data-dcnode-id="5082" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="5080" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="5095"></caption><tbody data-dcnode-id="5081"><tr data-dcnode-id="5083"><td data-dcnode-id="5085" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="5092" instrument_node="">
</span><div class="CellBody" data-dcnode-id="5087"><span data-dcnode-id="5089" style="font-weight: bold"><a data-dcnode-id="5090" name="1040803"><span data-dcnode-id="5091" instrument_node="">Note:</span></a></span><span data-dcnode-id="5088" instrument_node=""> Two-hour rated fire barriers (Class “C” Fire Barriers) are utilized to meet the criteria set forth in Regulation 701, Chapter 2, Definitions, One- and Two-Family Dwellings, Townhouse/Rowhouse, or the occupancy is classified as a multi-family residential or apartment and is required to meet the specifications for that occupancy.</span></div><span data-dcnode-id="5086" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5079" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5075" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5076" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5077" name="1040804"><span data-dcnode-id="5078" instrument_node="">4.2			The two-hour rated fire barrier wall for use in duplex, townhouse, rowhouse, etc. shall consist of a listed assembly extending from the foundation tight to the underside of the smooth surface of the roof deck. The roof decking, extending four (4) feet to each side of the Two-hour wall assembly, shall be fire retardant or fire treated lumber or a non-combustible material. </span></a></span></p><span data-dcnode-id="5074" instrument_node="">
</span><p class="Citation" data-dcnode-id="5071"><a data-dcnode-id="5072" name="1040805"><span data-dcnode-id="5073" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="5070" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5067"><a data-dcnode-id="5068" name="1043210"><span data-dcnode-id="5069" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5066" instrument_node="">
</span><p class="Section section" data-dcnode-id="5063"><a data-dcnode-id="5064" name="1040806"><span data-dcnode-id="5065" instrument_node="">5.0	Required Plans.</span></a></p><span data-dcnode-id="5062" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5059"><a data-dcnode-id="5060" name="1040807"><span data-dcnode-id="5061" instrument_node="">	Sectional plan views of all required fire walls and fire barrier walls, shall be submitted as part of the building plans required by Regulation 701, Chapter 4. The fire wall and fire barrier wall design shall be listed by a testing laboratory meeting the requirements of Regulation 701, Chapter 5, and the design number and laboratory name shall be provided with the plan submittal.</span></a></p><span data-dcnode-id="5058" instrument_node="">
</span><p class="Citation" data-dcnode-id="5055"><a data-dcnode-id="5056" name="1042177"><span data-dcnode-id="5057" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="5054" instrument_node="">
</span><p class="Citation" data-dcnode-id="5051"><a data-dcnode-id="5052" name="1043250"><span data-dcnode-id="5053" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="5050" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5047"><a data-dcnode-id="5048" name="1040808"><span data-dcnode-id="5049" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5046" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5042" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5043" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5044" name="1040809"><span data-dcnode-id="5045" instrument_node="">Chapter 3 Special Fire Safety Provisions For Physically Handicapped People</span></a></span></p><span data-dcnode-id="5041" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="5038"><a data-dcnode-id="5039" name="1040810"><span data-dcnode-id="5040" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="5037" instrument_node="">
</span><p class="Section section" data-dcnode-id="5034"><a data-dcnode-id="5035" name="1040811"><span data-dcnode-id="5036" instrument_node="">1.0	Areas of Refuge.</span></a></p><span data-dcnode-id="5033" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5029" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5030" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5031" name="1040812"><span data-dcnode-id="5032" instrument_node="">1.1			Definition. An area of refuge for a floor area is that space which is sufficiently protected from the heat and toxic gases produced by a developing fire in the floor area and which provides a direct access to an exit. An area of refuge is intended to facilitate a safe delay in egress from the story containing the floor area, thus constituting a safe space for the handicapped or otherwise disabled persons to await assistance for their safe evacuation. </span></a></span></p><span data-dcnode-id="5028" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5024" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5025" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5026" name="1040813"><span data-dcnode-id="5027" instrument_node="">1.2			Every mid-rise building and high-rise building shall incorporate areas of refuge which shall be established and maintained in accordance with this Chapter. </span></a></span></p><span data-dcnode-id="5023" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5019" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5020" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5021" name="1040814"><span data-dcnode-id="5022" instrument_node="">1.3			Every floor area of a mid-rise building and high-rise building where barrier free access is provided above the first story shall have not less than one area of refuge. </span></a></span></p><span data-dcnode-id="5018" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="5014" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5015" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5016" name="1040815"><span data-dcnode-id="5017" instrument_node="">1.4			An area of refuge shall consist of one of the following: </span></a></span></p><span data-dcnode-id="5013" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="5010"><a data-dcnode-id="5011" name="1040816"><span data-dcnode-id="5012" instrument_node="">1.4.1				A protected space within the floor area acceptable to the State Fire Marshal that: </span></a></p><span data-dcnode-id="5009" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="5005" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5006" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5007" name="1040817"><span data-dcnode-id="5008" instrument_node="">1.4.1.1						Is separated from the remainder of the floor area by a fire separation having a fire resistance rating of not less than one hour and a level of smoke control at least equal to that required of an accredited exit; </span></a></span></p><span data-dcnode-id="5004" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="5000" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="5001" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="5002" name="1040818"><span data-dcnode-id="5003" instrument_node="">1.4.1.2						Is served by a fire fighters elevator; </span></a></span></p><span data-dcnode-id="4999" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4995" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4996" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4997" name="1040819"><span data-dcnode-id="4998" instrument_node="">1.4.1.3						Provides an aggregate clear floor space of not less than 30" X 48" per non ambulatory occupant, with a minimum of two such spaces provided; (See ANSI A117.1 1986) </span></a></span></p><span data-dcnode-id="4994" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4991"><a data-dcnode-id="4992" name="1040820"><span data-dcnode-id="4993" instrument_node="">1.4.2				A horizontal exit providing an accessible route from one floor area to another floor area; </span></a></p><span data-dcnode-id="4990" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4987"><a data-dcnode-id="4988" name="1040821"><span data-dcnode-id="4989" instrument_node="">1.4.3				A protected space that is either part of an accredited exit or connected by a door to an accredited exit and that:</span></a></p><span data-dcnode-id="4986" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4982" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4983" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4984" name="1040822"><span data-dcnode-id="4985" instrument_node="">1.4.3.1						Is separated from the remainder of the floor area by a fire separation having a fire resistance rating and level of smoke control at least equal to that required of the accredited exit;</span></a></span></p><span data-dcnode-id="4981" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4977" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4978" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4979" name="1040823"><span data-dcnode-id="4980" instrument_node="">1.4.3.2						Provides an aggregate floor space of not less than 30" X 48" per non ambulatory occupant, with a minimum of two such spaces provided; (See ANSI A117.1 1986)</span></a></span></p><span data-dcnode-id="4976" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4972" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4973" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4974" name="1040824"><span data-dcnode-id="4975" instrument_node="">1.5			Areas of refuge shall be designated as such on all building plans and identified as such within the building.  Identification within the building shall incorporate the "International Symbol of Accessibility" and be tactile in texture in accordance with ANSI Standard A117.1-1986. Except for doors, glazed openings shall not be permitted in walls separating areas of refuge from the remainder of the floor area.</span></a></span></p><span data-dcnode-id="4971" instrument_node="">
</span><p class="Citation" data-dcnode-id="4968"><a data-dcnode-id="4969" name="1040825"><span data-dcnode-id="4970" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="4967" instrument_node="">
</span><p class="Citation" data-dcnode-id="4964"><a data-dcnode-id="4965" name="1043281"><span data-dcnode-id="4966" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4963" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4960"><a data-dcnode-id="4961" name="1040826"><span data-dcnode-id="4962" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4959" instrument_node="">
</span><p class="Section section" data-dcnode-id="4956"><a data-dcnode-id="4957" name="1040827"><span data-dcnode-id="4958" instrument_node="">2.0	Emergency Communication and Fire Alarm Signaling Systems.</span></a></p><span data-dcnode-id="4955" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4951" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4952" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4953" name="1040828"><span data-dcnode-id="4954" instrument_node="">2.1			Maximum Height.</span></a></span></p><span data-dcnode-id="4950" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4947"><a data-dcnode-id="4948" name="1040829"><span data-dcnode-id="4949" instrument_node="">2.1.1				The maximum mounting height for emergency communication and alarm system devices shall not be greater than 54 inches from the highest operation control to the floor. </span></a></p><span data-dcnode-id="4946" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4942" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4943" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4944" name="1040830"><span data-dcnode-id="4945" instrument_node="">2.2			Visual Alarms Indicating Appliances. </span></a></span></p><span data-dcnode-id="4941" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4938"><a data-dcnode-id="4939" name="1040831"><span data-dcnode-id="4940" instrument_node="">2.2.1				Where fire alarm signaling systems are required by other sections of these Regulations, both audible and visible alarm indicating appliances shall be installed. </span></a></p><span data-dcnode-id="4937" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4934"><a data-dcnode-id="4935" name="1040832"><span data-dcnode-id="4936" instrument_node="">2.2.2				Visible alarm indicating devices shall be of the direct viewing strobe type unless in the opinion of the State Fire Marshal the indirect viewing type are necessary due to the nature of the occupancy. </span></a></p><span data-dcnode-id="4933" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4930"><a data-dcnode-id="4931" name="1040833"><span data-dcnode-id="4932" instrument_node="">2.2.3				All visual indicating appliances installed shall be strobe lights listed for the protective signaling purpose for which they are used. </span></a></p><span data-dcnode-id="4929" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4926"><a data-dcnode-id="4927" name="1040834"><span data-dcnode-id="4928" instrument_node="">2.2.4				Visual indicating appliances shall be installed in all areas where required by the State Fire Marshal.</span></a></p><span data-dcnode-id="4925" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4922"><a data-dcnode-id="4923" name="1040835"><span data-dcnode-id="4924" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4921" instrument_node="">
</span><p class="Section section" data-dcnode-id="4918"><a data-dcnode-id="4919" name="1040836"><span data-dcnode-id="4920" instrument_node="">3.0	Inclined Wheelchair Lifts Permitted.</span></a></p><span data-dcnode-id="4917" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4913" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4914" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4915" name="1040837"><span data-dcnode-id="4916" instrument_node="">3.1			Location.</span></a></span></p><span data-dcnode-id="4912" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4909"><a data-dcnode-id="4910" name="1040838"><span data-dcnode-id="4911" instrument_node="">3.1.1				A single inclined wheelchair lift may be installed in buildings meeting all of the following criteria:</span></a></p><span data-dcnode-id="4908" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4904" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4905" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4906" name="1040839"><span data-dcnode-id="4907" instrument_node="">3.1.1.1						Where permitted, the inclined wheelchair lift may serve only the first two (2) floors above the level of exit discharge and only one (1) floor below the level of exit discharge of any building, and;</span></a></span></p><span data-dcnode-id="4903" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4899" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4900" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4901" name="1040840"><span data-dcnode-id="4902" instrument_node="">3.1.1.2						There are at least two mean of egress from each floor of the building, that are in compliance with the applicable provisions of the State Fire Prevention Regulations, and;</span></a></span></p><span data-dcnode-id="4898" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4894" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4895" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4896" name="1040841"><span data-dcnode-id="4897" instrument_node="">3.1.1.3						The total occupant load may not exceed thirty (30) persons per floor, and;</span></a></span></p><span data-dcnode-id="4893" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4889" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4890" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4891" name="1040842"><span data-dcnode-id="4892" instrument_node="">3.1.1.4						The building to be equipped with the inclined wheelchair lift shall be protected with an automatic smoke detection and fire alarm signaling system in accordance with the National Fire Alarm Code, NFPA 72, and;</span></a></span></p><span data-dcnode-id="4888" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4884" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4885" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4886" name="1040843"><span data-dcnode-id="4887" instrument_node="">3.1.1.5						There shall be an interface of the controls for the inclined wheelchair lift and the fire alarm signaling system to have the wheelchair lift return to the level of exit discharge, and remain there, if the lift happens to be in use when the fire alarm signaling system is activated, and;</span></a></span></p><span data-dcnode-id="4883" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4879" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4880" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4881" name="1040844"><span data-dcnode-id="4882" instrument_node="">3.1.1.6						The inclined wheelchair lift shall be provided with an auxiliary power source to ensure operation of the lift in the event of a loss of building power, and;</span></a></span></p><span data-dcnode-id="4878" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4874" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4875" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4876" name="1040845"><span data-dcnode-id="4877" instrument_node="">3.1.1.7						The inclined wheelchair lift shall be provided with controls that will permit the fire department to control the movement of the lift, and;</span></a></span></p><span data-dcnode-id="4873" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4869" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4870" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4871" name="1040846"><span data-dcnode-id="4872" instrument_node="">3.1.1.8						When not in use the inclined wheelchair lift shall be stored in an upright position or shall be otherwise designed to be stored in a manner that will not obstruct egress in any way.</span></a></span></p><span data-dcnode-id="4868" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4865"><a data-dcnode-id="4866" name="1040847"><span data-dcnode-id="4867" instrument_node="">3.1.2				For each floor of a building to be served with an inclined wheelchair lift, only one of the two required means of egress as specified in §3.1.1.2 of this Chapter, may have an inclined wheelchair lift installed.</span></a></p><span data-dcnode-id="4864" instrument_node="">
</span><p class="Citation" data-dcnode-id="4861"><a data-dcnode-id="4862" name="1040848"><span data-dcnode-id="4863" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4860" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4857"><a data-dcnode-id="4858" name="1043309"><span data-dcnode-id="4859" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4856" instrument_node="">
</span><p class="Section section" data-dcnode-id="4853"><a data-dcnode-id="4854" name="1040849"><span data-dcnode-id="4855" instrument_node="">4.0	Vertical Platform Lifts Permitted.</span></a></p><span data-dcnode-id="4852" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4848" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4849" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4850" name="1040850"><span data-dcnode-id="4851" instrument_node="">4.1			Location.</span></a></span></p><span data-dcnode-id="4847" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4844"><a data-dcnode-id="4845" name="1040851"><span data-dcnode-id="4846" instrument_node="">4.1.1				A single vertical platform lift may be installed in buildings meeting all of the following criteria:</span></a></p><span data-dcnode-id="4843" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4839" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4840" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4841" name="1040852"><span data-dcnode-id="4842" instrument_node="">4.1.1.1						Where permitted, the vertical platform lift shall serve only two (2) floors; the level of exit discharge and either a level above or a level below the level of exit discharge of any building, and;</span></a></span></p><span data-dcnode-id="4838" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4834" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4835" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4836" name="1040853"><span data-dcnode-id="4837" instrument_node="">4.1.1.2						There are at least two mean of egress from each floor of the building, that are in compliance with the applicable provisions of the State Fire Prevention Regulations, and;</span></a></span></p><span data-dcnode-id="4833" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4829" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4830" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4831" name="1040854"><span data-dcnode-id="4832" instrument_node="">4.1.1.3						The building equipped with the vertical platform lift shall be protected with an automatic sprinkler system or an automatic smoke detection and fire alarm signaling system in accordance with the National Fire Alarm Code, NFPA 72, and;</span></a></span></p><span data-dcnode-id="4828" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4824" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4825" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4826" name="1040855"><span data-dcnode-id="4827" instrument_node="">4.1.1.4						Where an automatic smoke detection and fire alarm signaling system is provided, there shall be an interface of the controls for the vertical platform lift and the fire alarm signaling system to have the vertical platform lift return to the level of exit discharge, and remain there, if the lift happens to be in use when the fire alarm signaling system is activated, and;</span></a></span></p><span data-dcnode-id="4823" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4819" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4820" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4821" name="1040856"><span data-dcnode-id="4822" instrument_node="">4.1.1.5						The vertical platform lift shall be provided with an auxiliary power source to ensure operation of the lift in the event of a loss of building power, and;</span></a></span></p><span data-dcnode-id="4818" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4814" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4815" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4816" name="1040857"><span data-dcnode-id="4817" instrument_node="">4.1.1.6						The vertical platform lift shall be provided with controls that will permit the fire department to control the movement of the lift, and;</span></a></span></p><span data-dcnode-id="4813" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4809" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4810" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4811" name="1040858"><span data-dcnode-id="4812" instrument_node="">4.1.1.7						Only one installation shall be permitted in a building.</span></a></span></p><span data-dcnode-id="4808" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4805"><a data-dcnode-id="4806" name="1040859"><span data-dcnode-id="4807" instrument_node="">4.1.2				The installation of the vertical platform shall not interfere, obstruct or otherwise impede egress capacity of any of the required means of egress.</span></a></p><span data-dcnode-id="4804" instrument_node="">
</span><p class="Citation" data-dcnode-id="4801"><a data-dcnode-id="4802" name="1042220"><span data-dcnode-id="4803" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4800" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4797"><a data-dcnode-id="4798" name="1040860"><span data-dcnode-id="4799" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4796" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4792" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4793" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4794" name="1040861"><span data-dcnode-id="4795" instrument_node="">Chapter 4 Automatic Sprinkler Systems and Standpipe Systems</span></a></span></p><span data-dcnode-id="4791" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4788"><a data-dcnode-id="4789" name="1040862"><span data-dcnode-id="4790" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4787" instrument_node="">
</span><p class="Section section" data-dcnode-id="4784"><a data-dcnode-id="4785" name="1040863"><span data-dcnode-id="4786" instrument_node="">1.0	Automatic Sprinkler Systems.</span></a></p><span data-dcnode-id="4783" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4780"><a data-dcnode-id="4781" name="1040864"><span data-dcnode-id="4782" instrument_node="">1.1			This chapter shall apply to all new buildings and this chapter shall apply to all existing buildings that undergo a change in occupancy.</span></a></p><span data-dcnode-id="4779" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4776"><a data-dcnode-id="4777" name="1040865"><span data-dcnode-id="4778" instrument_node="">1.1.1				This chapter shall apply to all buildings, structures, marine vessels, premises, and conditions which are modified by more than 50% after the effective date of these Regulations. The 50% figure shall be calculated utilizing the gross square footage of the building, structure, marine vessel, premises and conditions as to arrive at the correct application.</span></a></p><span data-dcnode-id="4775" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4771"><a data-dcnode-id="4772" name="1040866"><span data-dcnode-id="4774" instrument_node="">1.1.2				Any proposal that is presented to the Office of the State Fire Marshal for review and approval for a building rehabilitation as defined in the 101 Life Safety Code, for less than 50% of the gross square footage of a non-sprinklered building, may not have another such project for the same building submitted for review and approval any sooner than three (3) years after the date of the final inspection unless sprinkler projection is provided throughout the entire building.</span><img alt="" class="Default" data-dcnode-id="4773" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.1.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4770" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4766" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4767" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4768" name="1040870"><span data-dcnode-id="4769" instrument_node="">1.2			Installation Required. Automatic sprinkler systems shall be installed in accordance with the Standard for the Installation of Sprinkler Systems (NFPA 13) in all areas and occupancies as required in the applicable codes and standards as listed in Regulation 701 of these Regulations as well as the following: </span></a></span></p><span data-dcnode-id="4765" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4762"><a data-dcnode-id="4763" name="1040871"><span data-dcnode-id="4764" instrument_node="">1.2.1				In all buildings exceeding 10,000 square feet of aggregate, gross floor area.</span></a></p><span data-dcnode-id="4761" instrument_node="">
</span><div class="styrsid7299678_Body_Text" data-dcnode-id="4758" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-left: 0pt; margin-top: 0.0pt; text-align: left; text-indent: 0pt; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4759" name="1040872"><span data-dcnode-id="4760" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4757" instrument_node="">
</span><div class="Exception" data-dcnode-id="4753" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4754" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4755" name="1040873"><span data-dcnode-id="4756" instrument_node="">Exception No. 1: One- and Two-Family dwellings.</span></a></span></div><span data-dcnode-id="4752" instrument_node="">
</span><div class="Exception" data-dcnode-id="4749" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4750" name="1040874"><span data-dcnode-id="4751" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4748" instrument_node="">
</span><div class="Exception" data-dcnode-id="4744" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4745" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4746" name="1040875"><span data-dcnode-id="4747" instrument_node="">Exception No. 2: Where no public or private water distribution system is available, a Class “B” Fire Barrier may be utilized to subdivide a one-story building into fire areas of less than 10,000 square feet.</span></a></span></div><span data-dcnode-id="4743" instrument_node="">
</span><div class="Exception" data-dcnode-id="4740" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4741" name="1040876"><span data-dcnode-id="4742" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4739" instrument_node="">
</span><div class="Exception" data-dcnode-id="4735" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4736" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4737" name="1040877"><span data-dcnode-id="4738" instrument_node="">Exception No. 3: Buildings or structures of one story in height where:</span></a></span></div><span data-dcnode-id="4734" instrument_node="">
</span><div class="Exception" data-dcnode-id="4730" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4731" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4732" name="1040878"><span data-dcnode-id="4733" instrument_node="">		1.	This Exception does not apply to places of assembly, educational or institutional occupancies.</span></a></span></div><span data-dcnode-id="4729" instrument_node="">
</span><div class="Exception" data-dcnode-id="4725" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4726" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4727" name="1040879"><span data-dcnode-id="4728" instrument_node="">		2.	The exterior and interior bearing walls, columns, beams, girders, trusses or arches are constructed of noncombustible material, per the Standard on Types of Building Construction, NFPA 220, as adopted and/or modified by these Regulations; and</span></a></span></div><span data-dcnode-id="4724" instrument_node="">
</span><div class="Exception" data-dcnode-id="4720" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4721" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4722" name="1040880"><span data-dcnode-id="4723" instrument_node="">		3.	The construction is noncombustible; and </span></a></span></div><span data-dcnode-id="4719" instrument_node="">
</span><div class="Exception" data-dcnode-id="4715" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4716" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4717" name="1040881"><span data-dcnode-id="4718" instrument_node="">		4.	The occupant load is low; and</span></a></span></div><span data-dcnode-id="4714" instrument_node="">
</span><div class="Exception" data-dcnode-id="4710" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4711" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4712" name="1040882"><span data-dcnode-id="4713" instrument_node="">		5.	The means of egress components comply with these Regulations and the Life Safety Code, NFPA 101, as adopted and/or modified by these Regulations; and</span></a></span></div><span data-dcnode-id="4709" instrument_node="">
</span><div class="Exception" data-dcnode-id="4705" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4706" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4707" name="1040883"><span data-dcnode-id="4708" instrument_node="">		6.	The fuel load is identifiable, permanent, and noncombustible.</span></a></span></div><span data-dcnode-id="4704" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4701" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="4702" name="1040887"><span data-dcnode-id="4703" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4700" instrument_node="">
</span><span data-dcnode-id="4699" instrument_node="">
</span><span data-dcnode-id="4697" instrument_node="">
</span><span data-dcnode-id="4696" instrument_node="">
</span><span data-dcnode-id="4687" instrument_node="">
</span><span data-dcnode-id="4685" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="4683" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="4698"></caption><tbody data-dcnode-id="4684"><tr data-dcnode-id="4686"><td data-dcnode-id="4688" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="4695" instrument_node="">
</span><div class="CellBody" data-dcnode-id="4690"><span data-dcnode-id="4692" style="font-weight: bold"><a data-dcnode-id="4693" name="1040886"><span data-dcnode-id="4694" instrument_node="">Note:</span></a></span><span data-dcnode-id="4691" instrument_node="">		Exception No. 3: It is the intent of this exception not to require the installation of automatic sprinklers in buildings or structures in excess of 10,000 square feet when used for the storage of an identifiable, noncombustible fuel load where the number of occupants is low. For example, a building used for the storage of concrete block, concrete pipe, steel, etc.</span></div><span data-dcnode-id="4689" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="4682" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4679"><a data-dcnode-id="4680" name="1040888"><span data-dcnode-id="4681" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4678" instrument_node="">
</span><div class="styrsid7299678_Exception_Itali" data-dcnode-id="4674" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; margin-bottom: 2.0pt; margin-top: 2.0pt; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4675" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4676" name="1040889"><span data-dcnode-id="4677" instrument_node="">Exception No. 4: Open parking structures, per the Standard for Parking Structures, NFPA 88A, as adopted and/or modified by these Regulations, constructed of noncombustible materials, per the Standard on Types of Building Construction, NFPA 220, as adopted and/or modified by these Regulations. Under this exception, open parking structures without automatic fire suppression systems shall not be located beneath any other occupancy. Also, under this exception, open parking structures without automatic fire suppression systems that are located adjacent to any other occupancy shall be properly separated by a Two-hour rated fire wall in accordance with Chapter 2, Section 3.0 of this Regulation.</span></a></span></div><span data-dcnode-id="4673" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4670"><a data-dcnode-id="4671" name="1040890"><span data-dcnode-id="4672" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4669" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4666"><a data-dcnode-id="4667" name="1040891"><span data-dcnode-id="4668" instrument_node="">1.2.2				In all buildings in excess of 40 feet in height or more than four (4) stories in height.</span></a></p><span data-dcnode-id="4665" instrument_node="">
