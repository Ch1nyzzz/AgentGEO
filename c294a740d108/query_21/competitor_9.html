</span><p class="Body-L1" data-dcnode-id="3751"><a data-dcnode-id="3752" name="1041122"><span data-dcnode-id="3753" instrument_node="">4.1			Application. The application of this Chapter pertains to any building exceeding one-hundred thousand (100,000) square feet gross floor area on any one floor. This Chapter does not apply to strip shopping/office center with no individual tenant exceeding 100,000 sq. ft.</span></a></p><span data-dcnode-id="3750" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3747"><a data-dcnode-id="3748" name="1041123"><span data-dcnode-id="3749" instrument_node="">4.1.1				If any one individual tenant in a strip shopping/office center exceeds 100,000 sq. ft. per floor, these requirements shall apply only to those tenants.</span></a></p><span data-dcnode-id="3746" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3743"><a data-dcnode-id="3744" name="1041124"><span data-dcnode-id="3745" instrument_node="">4.2			Horizontal Standpipes.</span></a></p><span data-dcnode-id="3742" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3739"><a data-dcnode-id="3740" name="1041125"><span data-dcnode-id="3741" instrument_node="">4.2.1				Horizontal standpipes shall be required in accordance with Regulation 702, Chapter 4.</span></a></p><span data-dcnode-id="3738" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3735"><a data-dcnode-id="3736" name="1041126"><span data-dcnode-id="3737" instrument_node="">4.3			Emergency Voice/Alarm Communications and Detection System.</span></a></p><span data-dcnode-id="3734" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3731"><a data-dcnode-id="3732" name="1041127"><span data-dcnode-id="3733" instrument_node="">4.3.1				Large area buildings shall be equipped with a voice alarm, communication and detection system which shall be installed in accordance with the applicable codes and standards listed in Regulation 701 of these Regulations; and approved by the Office of the State Fire Marshal</span></a></p><span data-dcnode-id="3730" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3727"><a data-dcnode-id="3728" name="1041128"><span data-dcnode-id="3729" instrument_node="">4.4			Fire Command Station.</span></a></p><span data-dcnode-id="3726" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3723"><a data-dcnode-id="3724" name="1041129"><span data-dcnode-id="3725" instrument_node="">4.4.1				Large area buildings containing health care occupancies, ambulatory health care and detention and correction occupancies shall contain a fire command center for fire department operations in a location reviewed by the responsible Fire Chief and approved by the Office of the State Fire Marshal. The Office of the State Fire Marshal may require a Fire Command Center for other large area buildings.</span></a></p><span data-dcnode-id="3722" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3719"><a data-dcnode-id="3720" name="1041130"><span data-dcnode-id="3721" instrument_node="">4.4.2				The fire command center shall contain the following:</span></a></p><span data-dcnode-id="3718" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3715"><a data-dcnode-id="3716" name="1041131"><span data-dcnode-id="3717" instrument_node="">4.4.2.1						Voice alarm and public address panels</span></a></p><span data-dcnode-id="3714" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3711"><a data-dcnode-id="3712" name="1041132"><span data-dcnode-id="3713" instrument_node="">4.4.2.2						Fire department communications panel</span></a></p><span data-dcnode-id="3710" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3707"><a data-dcnode-id="3708" name="1041133"><span data-dcnode-id="3709" instrument_node="">4.4.2.3						Fire detection and alarm system annunciator panels and smoke management panels</span></a></p><span data-dcnode-id="3706" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3703"><a data-dcnode-id="3704" name="1041134"><span data-dcnode-id="3705" instrument_node="">4.4.2.4						Status indicator for elevator and annunciator indicating which elevators are operational</span></a></p><span data-dcnode-id="3702" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3699"><a data-dcnode-id="3700" name="1041135"><span data-dcnode-id="3701" instrument_node="">4.4.2.5						Status indicators and controls for air handling systems</span></a></p><span data-dcnode-id="3698" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3695"><a data-dcnode-id="3696" name="1041136"><span data-dcnode-id="3697" instrument_node="">4.4.2.6						Controls for unlocking all fire exit stairway doors simultaneously </span></a></p><span data-dcnode-id="3694" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3691"><a data-dcnode-id="3692" name="1041137"><span data-dcnode-id="3693" instrument_node="">4.4.2.7						Emergency power, light and system controls; and status indicators</span></a></p><span data-dcnode-id="3690" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3687"><a data-dcnode-id="3688" name="1041138"><span data-dcnode-id="3689" instrument_node="">4.4.2.8						Telephone and internet access for fire department use</span></a></p><span data-dcnode-id="3686" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3683"><a data-dcnode-id="3684" name="1041139"><span data-dcnode-id="3685" instrument_node="">4.4.2.9						Emergency and standby power status indicators</span></a></p><span data-dcnode-id="3682" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3679"><a data-dcnode-id="3680" name="1041140"><span data-dcnode-id="3681" instrument_node="">4.4.2.10						Generator supervision devices and manual start and transfer features</span></a></p><span data-dcnode-id="3678" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3675"><a data-dcnode-id="3676" name="1041141"><span data-dcnode-id="3677" instrument_node="">4.4.2.11						Public address system, where specifically required by other sections of this Code</span></a></p><span data-dcnode-id="3674" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3671"><a data-dcnode-id="3672" name="1041142"><span data-dcnode-id="3673" instrument_node="">4.4.2.12						Controls required for smoke control</span></a></p><span data-dcnode-id="3670" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3667"><a data-dcnode-id="3668" name="1041143"><span data-dcnode-id="3669" instrument_node="">4.4.2.13						Important keys to include</span></a></p><span data-dcnode-id="3666" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3663"><a data-dcnode-id="3664" name="1041144"><span data-dcnode-id="3665" instrument_node="">4.4.2.13.1							Elevator machine room</span></a></p><span data-dcnode-id="3662" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3659"><a data-dcnode-id="3660" name="1041145"><span data-dcnode-id="3661" instrument_node="">4.4.2.13.2							Elevator hoistway door access key</span></a></p><span data-dcnode-id="3658" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3655"><a data-dcnode-id="3656" name="1041146"><span data-dcnode-id="3657" instrument_node="">4.4.2.13.3							Side access door elevator car key</span></a></p><span data-dcnode-id="3654" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3651"><a data-dcnode-id="3652" name="1041147"><span data-dcnode-id="3653" instrument_node="">4.4.2.13.4							Electric room keys</span></a></p><span data-dcnode-id="3650" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3647"><a data-dcnode-id="3648" name="1041148"><span data-dcnode-id="3649" instrument_node="">4.4.2.13.5							Fire pump room keys</span></a></p><span data-dcnode-id="3646" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3643"><a data-dcnode-id="3644" name="1041149"><span data-dcnode-id="3645" instrument_node="">4.4.2.13.6							Mechanical room keys</span></a></p><span data-dcnode-id="3642" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3639"><a data-dcnode-id="3640" name="1041150"><span data-dcnode-id="3641" instrument_node="">4.4.2.13.7							Any master key</span></a></p><span data-dcnode-id="3638" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3635"><a data-dcnode-id="3636" name="1041151"><span data-dcnode-id="3637" instrument_node="">4.4.2.14						As built drawings. Specific types and format of drawings to be determined by the Office of the State Fire Marshal at time of plan review.</span></a></p><span data-dcnode-id="3634" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3631"><a data-dcnode-id="3632" name="1041152"><span data-dcnode-id="3633" instrument_node="">4.4.3				The fire command center shall be separated from the remainder of the building by one-hour construction and equipped with a heating, ventilating and air conditioning system that will prevent smoke laden air from entering the space.</span></a></p><span data-dcnode-id="3630" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3627"><a data-dcnode-id="3628" name="1041153"><span data-dcnode-id="3629" instrument_node="">4.4.4				It is not the intent of this section to require a room dedicated for this purpose, but the area provided must be available for immediate use in case of emergency.</span></a></p><span data-dcnode-id="3626" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3623"><a data-dcnode-id="3624" name="1041154"><span data-dcnode-id="3625" instrument_node="">4.4.5				The room shall be a minimum of 96 square feet with a minimum dimension of 8 feet.</span></a></p><span data-dcnode-id="3622" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3619"><a data-dcnode-id="3620" name="1041155"><span data-dcnode-id="3621" instrument_node="">4.4.6				The fire command room door shall be clearly identified for use by the fire department.</span></a></p><span data-dcnode-id="3618" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3615"><a data-dcnode-id="3616" name="1041156"><span data-dcnode-id="3617" instrument_node="">4.5			Smoke Management Systems</span></a></p><span data-dcnode-id="3614" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3611"><a data-dcnode-id="3612" name="1041157"><span data-dcnode-id="3613" instrument_node="">4.5.1				Large area buildings shall be equipped with a smoke management system approved by the Office of the State Fire Marshal, designed in accordance with §4.5.2 or §4.5.3, and shall be capable of being operated by the fire department.</span></a></p><span data-dcnode-id="3610" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3607"><a data-dcnode-id="3608" name="1041158"><span data-dcnode-id="3609" instrument_node="">4.5.2				This smoke control system shall, at a minimum, consist of manually operated smoke vents installed in accordance with the Standard for Smoke and Heat Venting, NFPA 204 with the following criteria:</span></a></p><span data-dcnode-id="3606" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3603"><a data-dcnode-id="3604" name="1041159"><span data-dcnode-id="3605" instrument_node="">4.5.2.1						100 sq. ft. of venting per 25,000 sq. ft. of floor area.</span></a></p><span data-dcnode-id="3602" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3599"><a data-dcnode-id="3600" name="1041160"><span data-dcnode-id="3601" instrument_node="">4.5.2.2						All vents shall be centrally located within the 25,000 sq. ft. protected area.</span></a></p><span data-dcnode-id="3598" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3595"><a data-dcnode-id="3596" name="1041161"><span data-dcnode-id="3597" instrument_node="">4.5.3				Large Area buildings using mechanical means of smoke management shall be installed in accordance with NFPA 92 and approved by the Office of the State Fire Marshal. Such system shall provide the following:</span></a></p><span data-dcnode-id="3594" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3591"><a data-dcnode-id="3592" name="1041162"><span data-dcnode-id="3593" instrument_node="">4.5.3.1						Egress stair tower pressurization if stairs are more than three (3) communicating floor levels</span></a></p><span data-dcnode-id="3590" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3587"><a data-dcnode-id="3588" name="1041163"><span data-dcnode-id="3589" instrument_node="">4.5.3.2						Area of refuge pressurization</span></a></p><span data-dcnode-id="3586" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3583"><a data-dcnode-id="3584" name="1041164"><span data-dcnode-id="3585" instrument_node="">4.5.3.3						Horizontal exit passageway pressurization</span></a></p><span data-dcnode-id="3582" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3579"><a data-dcnode-id="3580" name="1041165"><span data-dcnode-id="3581" instrument_node="">4.5.3.4						Fire floor or fire area smoke exhaust</span></a></p><span data-dcnode-id="3578" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3575"><a data-dcnode-id="3576" name="1041166"><span data-dcnode-id="3577" instrument_node="">4.5.3.5						Other criteria as deemed necessary by the Office of the State Fire Marshal for unusual spaces</span></a></p><span data-dcnode-id="3574" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3571"><a data-dcnode-id="3572" name="1041167"><span data-dcnode-id="3573" instrument_node="">4.5.4				Smoke management system operation/actuation shall be approved by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="3570" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3567"><a data-dcnode-id="3568" name="1043796"><span data-dcnode-id="3569" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3566" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3561"><span data-dcnode-id="3563" style="font-weight: bold"><a data-dcnode-id="3564" name="1044443"><span data-dcnode-id="3565" instrument_node="">Note:</span></a></span><span data-dcnode-id="3562" instrument_node=""> As per NFPA 92, the smoke management system shall be provided with a graphic annunciator and manual override panel to be located in the fire command center. The design and operation of the graphic annunciator shall be approved by the Office of the State Fire Marshal.</span></p><span data-dcnode-id="3560" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3557"><a data-dcnode-id="3558" name="1041173"><span data-dcnode-id="3559" instrument_node="">4.6			Standby Power, Light, and Emergency Systems.</span></a></p><span data-dcnode-id="3556" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3553"><a data-dcnode-id="3554" name="1041174"><span data-dcnode-id="3555" instrument_node="">4.6.1				Large area buildings shall be equipped with standby power, light, smoke management system and emergency systems which shall comply with the provisions of the Standard for Emergency and Standby Power Systems, NFPA 110, as adopted and/or modified by these Regulations.</span></a></p><span data-dcnode-id="3552" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3549"><a data-dcnode-id="3550" name="1041175"><span data-dcnode-id="3551" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3548" instrument_node="">
</span><div class="Exception" data-dcnode-id="3544" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3545" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3546" name="1041176"><span data-dcnode-id="3547" instrument_node="">Exception: If the occupancy is such that “standard” battery operated emergency systems (emergency lighting, exit signs, fire alarm signaling system backup power, etc.), are deemed to be adequate by the State Fire Marshal.</span></a></span></div><span data-dcnode-id="3543" instrument_node="">
</span><p class="Citation" data-dcnode-id="3540"><a data-dcnode-id="3541" name="1041177"><span data-dcnode-id="3542" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="3539" instrument_node="">
</span><p class="Citation" data-dcnode-id="3536"><a data-dcnode-id="3537" name="1042648"><span data-dcnode-id="3538" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="3535" instrument_node="">
</span><p class="Citation" data-dcnode-id="3532"><a data-dcnode-id="3533" name="1043821"><span data-dcnode-id="3534" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3531" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3528"><a data-dcnode-id="3529" name="1041178"><span data-dcnode-id="3530" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3527" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3523" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3524" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3525" name="1041179"><span data-dcnode-id="3526" instrument_node="">Chapter 6 Standard for Fire Flow for Fire Protection</span></a></span></p><span data-dcnode-id="3522" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3519"><a data-dcnode-id="3520" name="1041180"><span data-dcnode-id="3521" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3518" instrument_node="">
</span><p class="Section section" data-dcnode-id="3515"><a data-dcnode-id="3516" name="1041181"><span data-dcnode-id="3517" instrument_node="">1.0	General.</span></a></p><span data-dcnode-id="3514" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3510" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3511" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3512" name="1041182"><span data-dcnode-id="3513" instrument_node="">1.1			Purpose. The purpose of this Chapter is to specify minimum requirements for water supplies for fire protection and fire fighting services (fire flow) that will provide a reasonable degree of protection to life and property from fire. </span></a></span></p><span data-dcnode-id="3509" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3505" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3506" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3507" name="1041183"><span data-dcnode-id="3508" instrument_node="">1.2			Intent. It is the intent of this Chapter that the State Fire Marshal, the fire department having jurisdiction, the land developers in the jurisdiction, and any other responsible agencies shall work together to provide and maintain the minimum fire flow requirements contained herein. </span></a></span></p><span data-dcnode-id="3504" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3500" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3501" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3502" name="1041184"><span data-dcnode-id="3503" instrument_node="">1.3			Scope. This Chapter establishes minimum requirements for water supplies for fire protection and fire fighting purposes. This Chapter also sets the requirements in rural areas where there is no public, private or central water system available from water companies. The requirements are performance oriented and allow the owner or developer the option of choosing the method of attaining the water supply required with consideration given to local conditions. </span></a></span></p><span data-dcnode-id="3499" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3495" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3496" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3497" name="1041185"><span data-dcnode-id="3498" instrument_node="">1.4			This Regulation does not apply to:</span></a></span></p><span data-dcnode-id="3494" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3491"><a data-dcnode-id="3492" name="1041186"><span data-dcnode-id="3493" instrument_node="">1.4.1				Residential sub-divisions, located with the jurisdiction of New Castle County, containing more than twenty-five (25) lots, or minimum aggregate side yard widths of less than thirty (30) feet. These requirements are contained in New Castle County Code Chapter 40, Article 12.</span></a></p><span data-dcnode-id="3490" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3487" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="3488" name="1041197"><span data-dcnode-id="3489" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3486" instrument_node="">
</span><span data-dcnode-id="3485" instrument_node="">
</span><span data-dcnode-id="3483" instrument_node="">
</span><span data-dcnode-id="3482" instrument_node="">
</span><span data-dcnode-id="3445" instrument_node="">
</span><span data-dcnode-id="3443" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="3441" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="3484"></caption><tbody data-dcnode-id="3442"><tr data-dcnode-id="3444"><td data-dcnode-id="3446" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: top; width: 489.00168pt"><span data-dcnode-id="3481" instrument_node="">
</span><div class="CellBody" data-dcnode-id="3476"><span data-dcnode-id="3478" style="font-weight: bold"><a data-dcnode-id="3479" name="1041189"><span data-dcnode-id="3480" instrument_node="">Note:</span></a></span><span data-dcnode-id="3477" instrument_node="">		New Castle County Code Chapter 40, Article 12, Sewer and Water Impact:</span></div><span data-dcnode-id="3475" instrument_node="">
</span><div class="CellBody" data-dcnode-id="3472"><a data-dcnode-id="3473" name="1041190"><span data-dcnode-id="3474" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="3471" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3468"><a data-dcnode-id="3469" name="1041191"><span data-dcnode-id="3470" instrument_node="">SECTION 40.12.210 WATER SERVICE</span></a></p><span data-dcnode-id="3467" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3464"><a data-dcnode-id="3465" name="1041192"><span data-dcnode-id="3466" instrument_node="">Each water supply company shall develop a method to determine water volumes and pressure in their systems. On-site testing shall be used as the basis for determining the capacities in lines, pumps, storage and distribution facilities. The certification of adequate capacity of the water service shall be obtained by the developer from the water supplier.</span></a></p><span data-dcnode-id="3463" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3460"><a data-dcnode-id="3461" name="1041193"><span data-dcnode-id="3462" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3459" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3456"><a data-dcnode-id="3457" name="1041194"><span data-dcnode-id="3458" instrument_node="">SECTION 40.12.115 WATER SUPPLY</span></a></p><span data-dcnode-id="3455" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3452"><a data-dcnode-id="3453" name="1041195"><span data-dcnode-id="3454" instrument_node="">A.	All proposed residential subdivisions containing more than twenty-five (25) lots or minimum aggregate side yard widths of less than thirty (30) feet shall provide a public or community water distribution system. The design and installation of such public or community system shall be subject to the approval of the appropriate State agencies, and the main sizes shall meet the requirements of the Office of the State Fire Marshal. </span></a></p><span data-dcnode-id="3451" instrument_node="">
</span><div class="CellBody" data-dcnode-id="3448"><a data-dcnode-id="3449" name="1041196"><span data-dcnode-id="3450" instrument_node="">B.	Where the subdivider proposes that individual on-site water supply systems be utilized within the subdivision, the subdivider shall either install such facilities or shall require, by deed restriction or otherwise, as a condition of the sale of each lot or parcel within the subdivision, that the facilities shall be installed by the purchaser of such lot or parcel at the time that a principal building is constructed thereon, in accordance with appropriate State requirements. Where individual on-site water supply systems are to be utilized, each lot shall be of a size and shape to allow safe location of such a system. An on-site water supply shall further require a permit from appropriate State agencies. </span></a></div><span data-dcnode-id="3447" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3440" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3437"><a data-dcnode-id="3438" name="1041198"><span data-dcnode-id="3439" instrument_node="">1.4.2				Fire hydrants located within the jurisdiction of New Castle County. These requirements are contained in New Castle County Code, Chapter 40, Article 22.</span></a></p><span data-dcnode-id="3436" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3433" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="3434" name="1041211"><span data-dcnode-id="3435" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3432" instrument_node="">
</span><span data-dcnode-id="3431" instrument_node="">

</span><table class="Text_Box" data-dcnode-id="3379" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="3430"></caption><tbody data-dcnode-id="3380"><tr data-dcnode-id="3382"><td data-dcnode-id="3384" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: top; width: 489.00168pt"><span data-dcnode-id="3427" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3422"><span data-dcnode-id="3424" style="font-weight: bold"><a data-dcnode-id="3425" name="1041201"><span data-dcnode-id="3426" instrument_node="">Note:</span></a></span><span data-dcnode-id="3423" instrument_node="">		New Castle County Code Chapter 40 Article 22, Drainage, Utilities, Septic Systems, Parking, Loading, and Lighting:</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3418"><a data-dcnode-id="3419" name="1041202"><span data-dcnode-id="3420" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3417" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3414"><a data-dcnode-id="3415" name="1041203"><span data-dcnode-id="3416" instrument_node="">SECTION 40.22.430 FIRE HYDRANTS AND FIRE LANES.</span></a></p><span data-dcnode-id="3413" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3410"><a data-dcnode-id="3411" name="1041204"><span data-dcnode-id="3412" instrument_node="">A.	Fire hydrants in subdivisions shall be installed within five hundred (500) feet of all houses, measured by way of accessible public thoroughfare, wherever a public or community water supply system is provided, as required by the National Association of Fire Underwriters, and within four hundred (400) feet of all commercial and industrial establishments, as approved by the State Fire Marshal.</span></a></p><span data-dcnode-id="3409" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3406"><a data-dcnode-id="3407" name="1041205"><span data-dcnode-id="3408" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3405" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3402"><a data-dcnode-id="3403" name="1041206"><span data-dcnode-id="3404" instrument_node="">B.	All fire hydrants shall be shown on record plans, with an indication of water main sizing connecting thereto.</span></a></p><span data-dcnode-id="3401" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3398"><a data-dcnode-id="3399" name="1041207"><span data-dcnode-id="3400" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3397" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3394"><a data-dcnode-id="3395" name="1041208"><span data-dcnode-id="3396" instrument_node="">C.	The need for and location of fire lanes for multi-family and row or group residential, commercial, industrial and institutional development will be determined by the State Fire Marshal in accordance with the guidelines contained in the publication Standard for Compliance with New Castle County published by the State Fire Marshal. In applying such guidelines, a fire lane shall be deemed necessary only where reasonable and direct accessibility by fire apparatus cannot be made to at least one (1) side of a structure from an all-weather hard surface, capable of bearing the weight of commonly used fire apparatus. Such fire lanes to be provided need not be paved with concrete, amesite or similar material, but may be surfaced in any suitable manner such as to provide an all-weather surface capable of performing the function and shall be signed in such a fashion as to indicate the purpose and intent thereof and to prohibit parking thereon.</span></a></p><span data-dcnode-id="3393" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3390"><a data-dcnode-id="3391" name="1041209"><span data-dcnode-id="3392" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3389" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3386"><a data-dcnode-id="3387" name="1041210"><span data-dcnode-id="3388" instrument_node="">D.	Where equivalent fire protection is provided by appropriately sized standpipes or similar arrangements, the requirements of subsection C of this Section shall not be applicable.</span></a></p><span data-dcnode-id="3385" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3378" instrument_node="">
</span><p class="Citation" data-dcnode-id="3375"><a data-dcnode-id="3376" name="1041212"><span data-dcnode-id="3377" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3374" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3371"><a data-dcnode-id="3372" name="1043854"><span data-dcnode-id="3373" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3370" instrument_node="">
</span><p class="Section section" data-dcnode-id="3367"><a data-dcnode-id="3368" name="1041213"><span data-dcnode-id="3369" instrument_node="">2.0	Application.</span></a></p><span data-dcnode-id="3366" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3362" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3363" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3364" name="1041214"><span data-dcnode-id="3365" instrument_node="">2.1			Notwithstanding, any other provisions of the Delaware State Fire Prevention Regulations, for all buildings or structures of less than 10,000 square feet of aggregate gross floor area, and where there is not a public water system or a central water system; the State Fire Marshal may utilize the provisions of the Standard on Water Supplies for Suburban and Rural Fire Fighting, NFPA 1142, as adopted and/or modified by these Regulations, as meeting the requirement for fire flow. (See §7.0, Dry Hydrants, at the end of this Chapter).</span></a></span></p><span data-dcnode-id="3361" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3357" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3358" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3359" name="1041215"><span data-dcnode-id="3360" instrument_node="">2.2			A building, structure or the use of a parcel of land shall not be constructed, extended, renovated, or altered in violation of this Chapter. All provisions of this Chapter shall be met prior to the existence of the exposure or hazard unless arrangements can be made to phase the installation of the fire protection, which is acceptable to the State Fire Marshal, and would not impair the intent of this Chapter.</span></a></span></p><span data-dcnode-id="3356" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3352" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3353" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3354" name="1041216"><span data-dcnode-id="3355" instrument_node="">2.3			This Chapter applies wherein the construction, renovation, or alteration constitutes a hazard or condition which could create a self-propagating fire exposing an existing structure, fuel load, or property line that could be built upon. In the event there is no existing adjacent structure, the location of the property line shall govern. </span></a></span></p><span data-dcnode-id="3351" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3347" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3348" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3349" name="1041217"><span data-dcnode-id="3350" instrument_node="">2.4			This Chapter applies to all occupancies including one- and two-family dwellings, any hazardous processes, and the handling, storing, or use of flammable and combustible liquids and flammable gases. </span></a></span></p><span data-dcnode-id="3346" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3343" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="3344" name="1041233"><span data-dcnode-id="3345" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3342" instrument_node="">

</span><p class="Body body-test" data-dcnode-id="3332"><span data-dcnode-id="3334" style="font-weight: bold"><a data-dcnode-id="3335" name="1041220"><span data-dcnode-id="3336" instrument_node="">Note:</span></a></span><span data-dcnode-id="3333" instrument_node=""> Any flammable and combustible liquid and gas site that falls within the scope of a specific NFPA code, as adopted and/or modified by these Regulations, shall be subject to additional requirements, for water supplies, including, but not limited to, the following:</span></p><span data-dcnode-id="3331" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3328"><a data-dcnode-id="3329" name="1041221"><span data-dcnode-id="3330" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3327" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3324"><a data-dcnode-id="3325" name="1041222"><span data-dcnode-id="3326" instrument_node="">	NFPA 30, Flammable and Combustible Liquids Code</span></a></p><span data-dcnode-id="3323" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3320"><a data-dcnode-id="3321" name="1041223"><span data-dcnode-id="3322" instrument_node="">	NFPA 30A, Automotive and Marine Service Station Code</span></a></p><span data-dcnode-id="3319" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3316"><a data-dcnode-id="3317" name="1041224"><span data-dcnode-id="3318" instrument_node="">	NFPA 31, Standard for the Installation of Oil Burning Equipment</span></a></p><span data-dcnode-id="3315" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3312"><a data-dcnode-id="3313" name="1041225"><span data-dcnode-id="3314" instrument_node="">	NFPA 54, National Fuel Gas Code</span></a></p><span data-dcnode-id="3311" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3308"><a data-dcnode-id="3309" name="1041226"><span data-dcnode-id="3310" instrument_node="">	NFPA 58, Storage and Handling of Liquefied Petroleum Gases											</span></a></p><span data-dcnode-id="3307" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3304"><a data-dcnode-id="3305" name="1041227"><span data-dcnode-id="3306" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3303" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3300"><a data-dcnode-id="3301" name="1041228"><span data-dcnode-id="3302" instrument_node="">Any occupancy that falls within the scope of a specific NFPA code, as adopted and/or modified by these Regulations, shall be subject to additional requirements for water supplies, including, but not limited to, the following:</span></a></p><span data-dcnode-id="3299" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3296"><a data-dcnode-id="3297" name="1041229"><span data-dcnode-id="3298" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3295" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3292"><a data-dcnode-id="3293" name="1041230"><span data-dcnode-id="3294" instrument_node="">	NFPA 45, Standard on Fire Protection for Laboratories using Chemicals</span></a></p><span data-dcnode-id="3291" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3288"><a data-dcnode-id="3289" name="1041231"><span data-dcnode-id="3290" instrument_node="">	NFPA 88A, Standard for Parking Structures</span></a></p><span data-dcnode-id="3287" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3284"><a data-dcnode-id="3285" name="1041232"><span data-dcnode-id="3286" instrument_node="">	NFPA 88B, Standard for Repair Garages</span></a></p><span data-dcnode-id="3283" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3276" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3273"><a data-dcnode-id="3274" name="1041234"><span data-dcnode-id="3275" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3272" instrument_node="">
</span><div class="styrsid7299678_Exception_Itali" data-dcnode-id="3268" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; margin-bottom: 2.0pt; margin-top: 2.0pt; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3269" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3270" name="1041235"><span data-dcnode-id="3271" instrument_node="">Exception: This Chapter does not apply to four (4) or less one- and two-family dwellings when the four (4) one- and two-family dwellings, considered as a group or one fuel station, do not create an exposure to any other structure, fuel station or property line that could be built upon. </span></a></span></div><span data-dcnode-id="3267" instrument_node="">
