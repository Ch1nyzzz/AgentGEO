</span><span data-dcnode-id="3250" instrument_node="">
</span><span data-dcnode-id="3248" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="3246" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="3261"></caption><tbody data-dcnode-id="3247"><tr data-dcnode-id="3249"><td data-dcnode-id="3251" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: top; width: 489.00168pt"><span data-dcnode-id="3258" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3253"><span data-dcnode-id="3255" style="font-weight: bold"><a data-dcnode-id="3256" name="1041238"><span data-dcnode-id="3257" instrument_node="">Note:</span></a></span><span data-dcnode-id="3254" instrument_node=""> Exception: It is the intent of this exception not to require water distribution systems when four or less single-family detached dwellings are constructed in close proximity to each other (less than 100 feet). It is not the intent of this exception to allow or condone the construction of multiple groups of four (4) or less single family detached dwelling units wherein the arrangement of those groups constitutes a configuration that, in the opinion of the State Fire Marshal, would support a self-propagating fire from one fuel station to the next. </span></p><span data-dcnode-id="3252" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3245" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3242"><a data-dcnode-id="3243" name="1041240"><span data-dcnode-id="3244" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3241" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3237" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3238" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3239" name="1041241"><span data-dcnode-id="3240" instrument_node="">2.5			The owner or his representative shall submit adequate plans of any construction, renovation, alteration or the use of a parcel of land prior to any work being performed and obtain written approval from the State Fire Marshal. The plans shall display all necessary information and calculations in accordance with this Regulation. At the completion of construction and prior to occupancy or functional use, the owner or his representative shall supply to the State Fire Marshal a report verifying the following:</span></a></span></p><span data-dcnode-id="3236" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3233"><a data-dcnode-id="3234" name="1041242"><span data-dcnode-id="3235" instrument_node="">2.5.1				That the actual exposure distances on the site as constructed are within the allowable limits of this Regulation and the approved plans;</span></a></p><span data-dcnode-id="3232" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3229"><a data-dcnode-id="3230" name="1041243"><span data-dcnode-id="3231" instrument_node="">2.5.2				That the required fire flow was obtained and verified by on site flow testing, at the required minimum residual pressure; </span></a></p><span data-dcnode-id="3228" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3225"><a data-dcnode-id="3226" name="1041244"><span data-dcnode-id="3227" instrument_node="">2.5.3				That the hydrant spacing, location and arrangement is in accordance with this Regulation and the plan approval, and;</span></a></p><span data-dcnode-id="3224" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3221"><a data-dcnode-id="3222" name="1041245"><span data-dcnode-id="3223" instrument_node="">2.5.4				That the required minimum duration of flow, as required by this Regulation and the plan approval, is obtainable as verified by field calculations of the storage facilities. </span></a></p><span data-dcnode-id="3220" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3217"><a data-dcnode-id="3218" name="1041246"><span data-dcnode-id="3219" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3216" instrument_node="">
</span><div class="Exception" data-dcnode-id="3212" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3213" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3214" name="1041247"><span data-dcnode-id="3215" instrument_node="">Exception to §2.5.4: When an unproven well (new well or a well that has been out of service for more than six months) is used as a water supply source, the owner may meet the requirements by one of the following methods: </span></a></span></div><span data-dcnode-id="3211" instrument_node="">
</span><div class="Exception" data-dcnode-id="3207" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3208" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3209" name="1041248"><span data-dcnode-id="3210" instrument_node="">	1.	Obtain certification from a recognized authority that the well is capable of providing the minimum </span></a></span></div><span data-dcnode-id="3206" instrument_node="">
</span><div class="Exception" data-dcnode-id="3202" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3203" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3204" name="1041249"><span data-dcnode-id="3205" instrument_node="">required fire flow for the minimum required duration.</span></a></span></div><span data-dcnode-id="3201" instrument_node="">
</span><div class="Exception" data-dcnode-id="3197" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3198" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3199" name="1041250"><span data-dcnode-id="3200" instrument_node="">OR</span></a></span></div><span data-dcnode-id="3196" instrument_node="">
</span><div class="Exception" data-dcnode-id="3192" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3193" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3194" name="1043887"><span data-dcnode-id="3195" instrument_node="">	2.	Provide flow test results verifying that the unproven well was tested and provided the required </span></a></span></div><span data-dcnode-id="3191" instrument_node="">
</span><div class="Exception" data-dcnode-id="3187" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3188" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3189" name="1043888"><span data-dcnode-id="3190" instrument_node="">minimum fire flow for the required minimum duration.</span></a></span></div><span data-dcnode-id="3186" instrument_node="">
</span><p class="Citation" data-dcnode-id="3183"><a data-dcnode-id="3184" name="1043889"><span data-dcnode-id="3185" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3182" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3179"><a data-dcnode-id="3180" name="1043894"><span data-dcnode-id="3181" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3178" instrument_node="">
</span><p class="Section section" data-dcnode-id="3175"><a data-dcnode-id="3176" name="1041254"><span data-dcnode-id="3177" instrument_node="">3.0	Required Fire Flows.</span></a></p><span data-dcnode-id="3174" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3170" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3171" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3172" name="1041255"><span data-dcnode-id="3173" instrument_node="">3.1			Fire Flow Tables.</span></a></span></p><span data-dcnode-id="3169" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3166"><a data-dcnode-id="3167" name="1041256"><span data-dcnode-id="3168" instrument_node="">3.1.1				Required fire flows are to be determined from the Fire Flow Tables 1 and 2 based on exposure hazard, building areas, and the occupancy use of the structure(s) being considered. The Fire Flow Tables specify required minimum hydrant spacing and required fire flow and duration. </span></a></p><span data-dcnode-id="3165" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3162"><a data-dcnode-id="3163" name="1041257"><span data-dcnode-id="3164" instrument_node="">3.1.2				Where existing public, private, or central water systems including municipalities, cannot meet the fire flow requirements specified in Fire Flow Table 2, the provisions of Fire Flow Table 1 shall apply.</span></a></p><span data-dcnode-id="3161" instrument_node="">
</span><div class="Exception" data-dcnode-id="3158" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3159" name="1041258"><span data-dcnode-id="3160" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="3157" instrument_node="">
</span><div class="Exception" data-dcnode-id="3153" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3154" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3155" name="1041259"><span data-dcnode-id="3156" instrument_node="">Exception: The requirements of Fire Flow Table 3 may be applied to areas where there is a public, private, or central water system, but the requirements of Fire Flow Table 2 cannot be met. The setbacks may be reduced proportionally based on the amount of water available. This exception does not apply to new public, private, or central water systems, including municipalities, nor does it apply to expansions to existing public, private, or central water systems, including municipalities.</span></a></span></div><span data-dcnode-id="3152" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3149"><a data-dcnode-id="3150" name="1041260"><span data-dcnode-id="3151" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3148" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3145"><a data-dcnode-id="3146" name="1041261"><span data-dcnode-id="3147" instrument_node="">3.1.3				All areas are aggregate gross square footage as shown in the Fire Flow Tables. In all unusual structures and mixed occupancies not shown in the Fire Flow Tables, the State Fire Marshal shall determine required flows, hydrant spacing, duration, and available capacity.</span></a></p><span data-dcnode-id="3144" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3141"><a data-dcnode-id="3142" name="1041262"><span data-dcnode-id="3143" instrument_node="">3.1.4				Where a fire alarm signaling system is required by Fire Flow Table 1, this system shall be automatic, supervised off-site, and shall consist of full coverage by smoke detection and alarm notification. Where smoke detection devices will not function by reason of device limitation, heat detection shall be provided in those specific locations. Fire alarm signaling system plans and specifications shall be submitted for review, in accordance with Regulation 701, Chapter 4.</span></a></p><span data-dcnode-id="3140" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3137"><a data-dcnode-id="3138" name="1041263"><span data-dcnode-id="3139" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3136" instrument_node="">
</span><div class="Exception" data-dcnode-id="3132" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3133" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3134" name="1041264"><span data-dcnode-id="3135" instrument_node="">Exception: Where the building is protected throughout by an automatic sprinkler system. </span></a></span></div><span data-dcnode-id="3131" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3128"><a data-dcnode-id="3129" name="1041265"><span data-dcnode-id="3130" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3127" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3123" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3124" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3125" name="1041266"><span data-dcnode-id="3126" instrument_node="">3.2			Modification for Sprinkler System Installations.</span></a></span></p><span data-dcnode-id="3122" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3119"><a data-dcnode-id="3120" name="1041267"><span data-dcnode-id="3121" instrument_node="">3.2.1				Where the structure being considered is protected throughout by an automatic sprinkler system, the required fire flow shall be modified to meet the designed sprinkler demand where hydraulically calculated plus outside hose streams as specified in the applicable NFPA Codes and Standards as adopted and/or modified by these Regulations. </span></a></p><span data-dcnode-id="3118" instrument_node="">
</span><div class="Exception" data-dcnode-id="3115" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3116" name="1041268"><span data-dcnode-id="3117" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="3114" instrument_node="">
</span><div class="Exception" data-dcnode-id="3110" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3111" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3112" name="1041269"><span data-dcnode-id="3113" instrument_node="">Exception: Hose stream allowance may be eliminated by the State Fire Marshal where there is no public nor private water system supplying the automatic sprinklers.</span></a></span></div><span data-dcnode-id="3109" instrument_node="">
</span><div class="Exception" data-dcnode-id="3106" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3107" name="1041270"><span data-dcnode-id="3108" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="3105" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3102"><a data-dcnode-id="3103" name="1041271"><span data-dcnode-id="3104" instrument_node="">3.2.2				Where a pipe schedule system is installed, the fire flow shall be modified to meet the minimum acceptable flow at the base of the riser and residual pressures as specified in the applicable NFPA Regulations as adopted and/or modified by these Regulations, plus outside hose stream requirements. </span></a></p><span data-dcnode-id="3101" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3098"><a data-dcnode-id="3099" name="1041272"><span data-dcnode-id="3100" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3097" instrument_node="">
</span><div class="Exception" data-dcnode-id="3093" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3094" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3095" name="1041273"><span data-dcnode-id="3096" instrument_node="">Exception: Hose stream allowance may be eliminated by the State Fire Marshal where there is no public or private water system supplying the automatic sprinklers.</span></a></span></div><span data-dcnode-id="3092" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3089"><a data-dcnode-id="3090" name="1041274"><span data-dcnode-id="3091" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3088" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3085"><a data-dcnode-id="3086" name="1041275"><span data-dcnode-id="3087" instrument_node="">3.2.3				Where the structure being considered is protected throughout by a residential sprinkler system, the required fire flow shall be modified to meet the designed sprinkler demand as hydraulically calculated, plus estimated domestic demands during peak use times as determined by the water supplier.</span></a></p><span data-dcnode-id="3084" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3080" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3081" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3082" name="1041276"><span data-dcnode-id="3083" instrument_node="">3.3			Modification for Flammable and Combustible Liquids and Gases and Special Hazard Sites.</span></a></span></p><span data-dcnode-id="3079" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3076"><a data-dcnode-id="3077" name="1041277"><span data-dcnode-id="3078" instrument_node="">3.3.1				Where the site being considered contains flammable and combustible liquids and gas installations, the required fire flows are to be determined by the Office of the State Fire Marshal based on exposure hazards, aggregate capacity of the installation, the specific hazard of the installation, and as specified in the applicable NFPA Codes and Standards as adopted and/or modified by these Regulations.</span></a></p><span data-dcnode-id="3075" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3072"><a data-dcnode-id="3073" name="1043930"><span data-dcnode-id="3074" instrument_node="">3.3.2				Where the site being considered contains outdoor tire storage or disposal operations and falls under the scope of Regulation 706, Chapter 5, then the provisions of Regulation 706, Chapter 5 shall apply.</span></a></p><span data-dcnode-id="3071" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3068"><a data-dcnode-id="3069" name="1043926"><span data-dcnode-id="3070" instrument_node="">3.3.3				Where, in the opinion of the State Fire Marshal, the site being considered constitutes or is in need of such a level of advanced designed or engineering criteria, the State Fire Marshal may require a Fire Protection Engineering Analysis in accordance with Regulation 701, Chapter 4, Section 9.0.</span></a></p><span data-dcnode-id="3067" instrument_node="">
</span><p class="Citation" data-dcnode-id="3064"><a data-dcnode-id="3065" name="1041281"><span data-dcnode-id="3066" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3063" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3060"><a data-dcnode-id="3061" name="1043949"><span data-dcnode-id="3062" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3059" instrument_node="">
</span><p class="Section section" data-dcnode-id="3056"><a data-dcnode-id="3057" name="1041282"><span data-dcnode-id="3058" instrument_node="">4.0	Water Distribution Systems.</span></a></p><span data-dcnode-id="3055" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3051" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3052" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3053" name="1041283"><span data-dcnode-id="3054" instrument_node="">4.1			Where water is available and a water distribution system is required for stand alone/detached one- and two-family dwelling sites, the infrastructure for fire protection water shall be provided. The infrastructure for fire flow shall consist of properly listed and sized underground mains, stub ups for hydrants, and associated valves. The fire hydrants shall be installed prior to the fire flow requirements taking effect.</span></a></span></p><span data-dcnode-id="3050" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3047"><a data-dcnode-id="3048" name="1041284"><span data-dcnode-id="3049" instrument_node="">4.1.1				For purposes of this Regulation, water for fire protection shall be considered “available” whenever any portion of a proposed project’s property or any portion of a proposed subdivision is situated within one thousand (1000) feet of any portion of a water supplier’s new or existing infrastructure that includes water supply piping of 4 inches or more in nominal internal diameter. This measurement shall be calculated by way of accessible public thoroughfare(s) from the proposed property or subdivision and may not necessarily be a radius.</span></a></p><span data-dcnode-id="3046" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3043"><a data-dcnode-id="3044" name="1041285"><span data-dcnode-id="3045" instrument_node="">4.1.2				In the event the project or subdivision is situated in a geographical area that has been authorized to be provided with water service by a supplier other than the water supplier whose infrastructure is within the specified distance, the State Fire Marshal, on a case by case basis, may re-evaluate the requirements of §4.1.1.</span></a></p><span data-dcnode-id="3042" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3038" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3039" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3040" name="1041286"><span data-dcnode-id="3041" instrument_node="">4.2			The requirements of Fire Flow Table 1, with respect to the Standard on Water Supplies for Suburban and Rural Fire Fighting, NFPA 1142, as adopted and/or modified by these Regulations, may be applied to subdivisions of 25 or less lots of one and two-family detached homes, where central water is provided. However, the requirement for water flow for fire protection shall be required when:</span></a></span></p><span data-dcnode-id="3037" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3034"><a data-dcnode-id="3035" name="1041287"><span data-dcnode-id="3036" instrument_node="">4.2.1				Additional development creates a subdivision in excess of 25 lots of detached one or two-family dwellings or</span></a></p><span data-dcnode-id="3033" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3030"><a data-dcnode-id="3031" name="1041288"><span data-dcnode-id="3032" instrument_node="">4.2.2				In the opinion of the State Fire Marshal the probability of additional development will occur in excess of 25 lots of detached one or two-family dwellings then the infrastructure for fire flow capability must be installed to accommodate the fire flow requirements.</span></a></p><span data-dcnode-id="3029" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3025" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3026" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3027" name="1041289"><span data-dcnode-id="3028" instrument_node="">4.3			The requirements of Fire Flow Table 2 shall take effect where water is available and be provided under the following circumstances:</span></a></span></p><span data-dcnode-id="3024" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3021"><a data-dcnode-id="3022" name="1041290"><span data-dcnode-id="3023" instrument_node="">4.3.1				For subdivisions of 50 or more lots of detached one and two-family dwellings the water flow for fire protection shall be provided upon completion of the 50th lot, and prior to the development of the 51st lot.</span></a></p><span data-dcnode-id="3020" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3017"><a data-dcnode-id="3018" name="1041291"><span data-dcnode-id="3019" instrument_node="">4.3.2				For subdivisions of 26 through 49 lots of detached one and two-family dwellings the water flow for fire protection shall be provided at the completion of the last lot to be built.</span></a></p><span data-dcnode-id="3016" instrument_node="">
</span><p class="Citation" data-dcnode-id="3013"><a data-dcnode-id="3014" name="1041292"><span data-dcnode-id="3015" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3012" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3009"><a data-dcnode-id="3010" name="1043991"><span data-dcnode-id="3011" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3008" instrument_node="">
</span><p class="Section section" data-dcnode-id="3005"><a data-dcnode-id="3006" name="1041293"><span data-dcnode-id="3007" instrument_node="">5.0	Fire Hydrants.</span></a></p><span data-dcnode-id="3004" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3000" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="3001" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="3002" name="1041294"><span data-dcnode-id="3003" instrument_node="">5.1			Spacing and Location.</span></a></span></p><span data-dcnode-id="2999" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2996"><a data-dcnode-id="2997" name="1041295"><span data-dcnode-id="2998" instrument_node="">5.1.1				Hydrant spacing as shown in the Fire Flow Tables shall be used as a general rule. Hydrants shall be located at the direction of the State Fire Marshal so as to minimize friction in fire hose. All hydrant spacing shall be located along available roads or at the direction of the State Fire Marshal. This measurement shall be calculated by way of accessible thoroughfare(s) from the building to be protected to the hydrant and may not necessarily be a radius.</span></a></p><span data-dcnode-id="2995" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2992"><a data-dcnode-id="2993" name="1041296"><span data-dcnode-id="2994" instrument_node="">5.1.2				Hydrants shall be provided in such a manner that all fire department connections and/or standpipe connections shall be within 300' of a hydrant and shall meet the provisions of the applicable NFPA Regulations as adopted and/or modified by these Regulations. This measurement shall be calculated by way of accessible thoroughfare(s) from the proposed fire department connection to the hydrant and may not necessarily be a radius.</span></a></p><span data-dcnode-id="2991" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2988"><a data-dcnode-id="2989" name="1041297"><span data-dcnode-id="2990" instrument_node="">5.1.3				Additional hydrants shall be provided when the State Fire Marshal deems it necessary based on the configuration of the site, building(s), exposures, construction, occupancy, and/or specific hazard(s).</span></a></p><span data-dcnode-id="2987" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2983" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2984" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2985" name="1041298"><span data-dcnode-id="2986" instrument_node="">5.2			Number. </span></a></span></p><span data-dcnode-id="2982" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2979"><a data-dcnode-id="2980" name="1041299"><span data-dcnode-id="2981" instrument_node="">5.2.1				The number of hydrants required shall be based on spacing and location requirements or number of required fire hydrants, whichever is greater. </span></a></p><span data-dcnode-id="2978" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2975"><a data-dcnode-id="2976" name="1041300"><span data-dcnode-id="2977" instrument_node="">5.2.2				Required fire hydrants shall be the number of fire hydrants required to extract the required flow from the distribution system in a form and arrangement usable by the fire department.</span></a></p><span data-dcnode-id="2974" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2970" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2971" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2972" name="1041301"><span data-dcnode-id="2973" instrument_node="">5.3			Installation.</span></a></span></p><span data-dcnode-id="2969" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2966"><a data-dcnode-id="2967" name="1041302"><span data-dcnode-id="2968" instrument_node="">5.3.1				Fire hydrants and water mains shall be installed in accordance with American Water Works Association Standard and all applicable NFPA codes and standards as adopted and/or modified by these Regulations. </span></a></p><span data-dcnode-id="2965" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2962"><a data-dcnode-id="2963" name="1041303"><span data-dcnode-id="2964" instrument_node="">5.3.2				Fire hydrants shall be supplied by not less than a six inch diameter main installed on a looped system or not less than an eight inch diameter main if the system is not looped or the fire hydrant is installed on a dead end main exceeding 300 feet in length.</span></a></p><span data-dcnode-id="2961" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2958"><a data-dcnode-id="2959" name="1041304"><span data-dcnode-id="2960" instrument_node="">5.3.3				Dead end mains shall not exceed 600 feet in length for main sizes under 10 inches in diameter.</span></a></p><span data-dcnode-id="2957" instrument_node="">
</span><div class="Exception" data-dcnode-id="2954" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2955" name="1041305"><span data-dcnode-id="2956" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="2953" instrument_node="">
</span><div class="Exception" data-dcnode-id="2949" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2950" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2951" name="1041306"><span data-dcnode-id="2952" instrument_node="">Exception: Dead end mains exceeding 600 feet may be a minimum of 8 inches in diameter if an engineering analysis, acceptable to the Office of the State Fire Marshal, is submitted by a registered Professional Engineer demonstrating that the minimum flows and duration specified elsewhere in this Regulation are met or exceeded.</span></a></span></div><span data-dcnode-id="2948" instrument_node="">
</span><div class="Exception" data-dcnode-id="2945" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2946" name="1041307"><span data-dcnode-id="2947" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="2944" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2940" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2941" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2942" name="1041308"><span data-dcnode-id="2943" instrument_node="">5.4			Other.</span></a></span></p><span data-dcnode-id="2939" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2936"><a data-dcnode-id="2937" name="1041309"><span data-dcnode-id="2938" instrument_node="">5.4.1				Fire hydrants installed in accordance with this requirement shall not be removed or shut down, except when repairs are necessary, without the permission of the State Fire Marshal.</span></a></p><span data-dcnode-id="2935" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="2932"><a data-dcnode-id="2933" name="1041310"><span data-dcnode-id="2934" instrument_node="">5.4.2				The water supplier shall call the local fire dispatch center to report when a fire hydrant is taken out of service for repairs or maintenance. The supplier is to state the location and the approximate length of time the hydrant will be out of service. The supplier is to notify the local fire dispatch center when the hydrant is put back in service.</span></a></p><span data-dcnode-id="2931" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2928"><a data-dcnode-id="2929" name="1041311"><span data-dcnode-id="2930" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="2927" instrument_node="">
</span><p class="Section section" data-dcnode-id="2924"><a data-dcnode-id="2925" name="1041312"><span data-dcnode-id="2926" instrument_node="">6.0	Storage Capacities.</span></a></p><span data-dcnode-id="2923" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2919" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2920" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2921" name="1041313"><span data-dcnode-id="2922" instrument_node="">6.1			Calculations for storage capacity shall be based on the following formula:</span></a></span></p><span data-dcnode-id="2918" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2915" style="text-align: center"><a data-dcnode-id="2916" name="1041314"><span data-dcnode-id="2917" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="2914" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2911" style="text-align: center"><a data-dcnode-id="2912" name="1041315"><span data-dcnode-id="2913" instrument_node="">Required Flow x Duration x 102%</span></a></p><span data-dcnode-id="2910" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2907" style="text-align: center"><a data-dcnode-id="2908" name="1041316"><span data-dcnode-id="2909" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="2906" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2902" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2903" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2904" name="1041317"><span data-dcnode-id="2905" instrument_node="">6.2			Storage capacity shall be calculated above system capacity. All required flows and storage capacities shall be designed above domestic demand.</span></a></span></p><span data-dcnode-id="2901" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2898"><a data-dcnode-id="2899" name="1041318"><span data-dcnode-id="2900" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="2897" instrument_node="">
</span><p class="Section section" data-dcnode-id="2894"><a data-dcnode-id="2895" name="1041319"><span data-dcnode-id="2896" instrument_node="">7.0	Dry Hydrants.</span></a></p><span data-dcnode-id="2893" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2889" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2890" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2891" name="1041320"><span data-dcnode-id="2892" instrument_node="">7.1			Where there is not a public water system or a central water system, the State Fire Marshal may require the installation of a dry hydrant at the nearest public body of water to provide access to a water source for fire protection for all buildings of less than 10,000 square feet of aggregate gross floor area.</span></a></span></p><span data-dcnode-id="2888" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2884" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2885" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2886" name="1041321"><span data-dcnode-id="2887" instrument_node="">7.2			The provision in subsection 7.1 of this Chapter for the providing of a dry hydrant shall also be meant that access to the dry hydrant and provisions for positioning fire apparatus to make use of the dry hydrant shall be provided.</span></a></span></p><span data-dcnode-id="2883" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2879" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2880" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2881" name="1041322"><span data-dcnode-id="2882" instrument_node="">7.3			The requirements of subsection 7.1 and subsection 7.2 of this Chapter shall meet the standards and specifications pursuant to the Construction Specifications for Dry Hydrant and Water Delivery Systems, Delaware 1991, prepared by the U. S. Department of Agriculture Soil Conversation Service and any updates thereto.</span></a></span></p><span data-dcnode-id="2878" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2874" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2875" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2876" name="1041323"><span data-dcnode-id="2877" instrument_node="">7.4			It is the responsibility of the developer, builder and/or owner to apply for and obtain any required permits for the installation of the dry hydrant.</span></a></span></p><span data-dcnode-id="2873" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2869" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2870" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2871" name="1041324"><span data-dcnode-id="2872" instrument_node="">7.5			It is the responsibility of the project developer, builder, and/or owner to provide the dry hydrants and any needed construction operations to place the dry hydrants in service.</span></a></span></p><span data-dcnode-id="2868" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="2864" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="2865" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="2866" name="1041325"><span data-dcnode-id="2867" instrument_node="">7.6			All dry hydrants installed and accepted under this section shall be inspected, tested, and maintained in accordance with Regulation 703, Chapter 1, subsection 4.9. </span></a></span></p><span data-dcnode-id="2863" instrument_node="">
</span><p class="Citation" data-dcnode-id="2860"><a data-dcnode-id="2861" name="1041326"><span data-dcnode-id="2862" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="2859" instrument_node="">
</span><p class="Section section" data-dcnode-id="2856" style="text-align: center"><a data-dcnode-id="2857" name="1041327"><span data-dcnode-id="2858" instrument_node="">Fire Flow Table 1*</span></a></p><span data-dcnode-id="2855" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2852"><a data-dcnode-id="2853" name="1041328"><span data-dcnode-id="2854" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="2851" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="2848"><a data-dcnode-id="2849" name="1041329"><span data-dcnode-id="2850" instrument_node="">The requirements of Fire Flow Table 1 apply to rural areas where public, private, or central water is not available and where specified elsewhere in these Regulations.</span></a></p><span data-dcnode-id="2847" instrument_node="">

</span><p class="Body body-test" data-dcnode-id="331"><a data-dcnode-id="332" name="1041986"><span data-dcnode-id="333" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="330" instrument_node="">
</span><p class="Section section" data-dcnode-id="327"><a data-dcnode-id="328" name="1041987"><span data-dcnode-id="329" instrument_node="">1.0	General.</span></a></p><span data-dcnode-id="326" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="322" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="323" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="324" name="1041988"><span data-dcnode-id="325" instrument_node="">1.1			Scope.</span></a></span></p><span data-dcnode-id="321" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="318"><a data-dcnode-id="319" name="1041989"><span data-dcnode-id="320" instrument_node="">1.1.1				This Chapter establishes the minimum requirements for all water suppliers when extending or improving their franchise district, their coverage areas, their distribution, transmission or supply infrastructure and any modifications to their water supply systems.</span></a></p><span data-dcnode-id="317" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="314"><a data-dcnode-id="315" name="1041990"><span data-dcnode-id="316" instrument_node="">1.1.2				Where this Chapter provides minimum standards and specifications for water suppliers to be in conformance with, such standard and specifications found in this Chapter are not to be construed as lessening any requirements of Chapter 6 of this regulation, which may require additional flows, durations, and/or fire hydrants at the time of construction or site development.</span></a></p><span data-dcnode-id="313" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="309" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="310" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="311" name="1041991"><span data-dcnode-id="312" instrument_node="">1.2			Purpose.</span></a></span></p><span data-dcnode-id="308" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="305"><a data-dcnode-id="306" name="1041992"><span data-dcnode-id="307" instrument_node="">1.2.1				The purpose of the Chapters is to provide minimum requirements for water flow for fire protection in duration and amounts required and the installation of fire hydrants by water suppliers.</span></a></p><span data-dcnode-id="304" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="300" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="301" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="302" name="1041993"><span data-dcnode-id="303" instrument_node="">1.3			Application.</span></a></span></p><span data-dcnode-id="299" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="296"><a data-dcnode-id="297" name="1041994"><span data-dcnode-id="298" instrument_node="">1.3.1				This Chapter is applicable to all water suppliers, be they public, private, corporations, companies, or individual(s) when providing water for any occupancy, development or sub-division; and shall apply when extending or improving their franchise districts, their coverage areas, their distribution, transmission or supply infrastructure, and any modifications to their water systems.</span></a></p><span data-dcnode-id="295" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="292"><a data-dcnode-id="293" name="1041995"><span data-dcnode-id="294" instrument_node="">1.3.2				This Chapter does not apply to sources of water from individual wells when supplying an individual one- and two-family dwelling.</span></a></p><span data-dcnode-id="291" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="288"><a data-dcnode-id="289" name="1041996"><span data-dcnode-id="290" instrument_node="">1.3.3				This Chapter does not apply to a water supplier that connects its water transmission system to the private distribution system of an existing development, subdivision, manufactured housing community or condominium in order to supply bulk water where the existing distribution at the time of interconnection is unable to provide the minimum requirements for fire protection that would be required by these Regulations provided the following conditions are met:</span></a></p><span data-dcnode-id="287" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="284"><a data-dcnode-id="285" name="1041997"><span data-dcnode-id="286" instrument_node="">1.3.3.1						A plan review submission is required in accordance with these Regulations prior to the installation of any infrastructure. The submittal shall also include an executed water service agreement between the water provider and the proposed customer defining ownership of the existing and proposed infrastructure.</span></a></p><span data-dcnode-id="283" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="280"><a data-dcnode-id="281" name="1041998"><span data-dcnode-id="282" instrument_node="">1.3.3.2						A public fire hydrant shall be installed, as determined by the water supplier and approved by The Office of the State Fire Marshal, at or near the entrance to the community. The public fire hydrant shall be owned and maintained by the water supplier in accordance with these Regulations. Water supplier shall provide the minimum flow and duration as required by subsection 2.1 and subsection 3.1 of this Chapter of these Regulations.</span></a></p><span data-dcnode-id="279" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="276"><a data-dcnode-id="277" name="1041999"><span data-dcnode-id="278" instrument_node="">1.3.3.3						Any infrastructure, water mains, valves, pumps, distribution systems, appliances or other equipment included as part of the distribution systems shall be replaced as needed with like in kind materials. In the event that 50% or more of the infrastructure, water mains, valves, pumps, distributions systems, appliances or other equipment included as part of the distribution systems are required to be replaced the responsible party identified in the water service agreement shall be responsible for providing full fire protection in accordance with these Regulations. The requirement for full fire protection shall become effective once the existing water distribution system has reached repair or replacement of 50% of the system at any time.</span></a></p><span data-dcnode-id="275" instrument_node="">
</span><span data-dcnode-id="274" instrument_node="">
</span><span data-dcnode-id="272" instrument_node="">
</span><span data-dcnode-id="271" instrument_node="">
</span><span data-dcnode-id="262" instrument_node="">
</span><span data-dcnode-id="260" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="258" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 526.2012pt" summary=""><caption data-dcnode-id="273"></caption><tbody data-dcnode-id="259"><tr data-dcnode-id="261"><td data-dcnode-id="263" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: top; width: 526.2012pt"><span data-dcnode-id="270" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="265"><span data-dcnode-id="267" style="font-weight: bold"><a data-dcnode-id="268" name="1042002"><span data-dcnode-id="269" instrument_node="">Note:</span></a></span><span data-dcnode-id="266" instrument_node=""> This section would not apply to new construction, but only to existing developments with the current infrastructure unable to provide adequate fire protection in accordance with these Regulations. Any agreements, alternatives, variances or exceptions granted prior to the adoption of this change shall remain in effect.</span></p><span data-dcnode-id="264" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="257" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="254"><a data-dcnode-id="255" name="1042003"><span data-dcnode-id="256" instrument_node="">1.4			Definitions.</span></a></p><span data-dcnode-id="253" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="250"><a data-dcnode-id="251" name="1042004"><span data-dcnode-id="252" instrument_node="">1.4.1				The definitions as found in the section shall be in addition to the definitions found in other sections of these Regulations and shall be applicable to Chapter 6 of this regulation.</span></a></p><span data-dcnode-id="249" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="243"><a data-dcnode-id="247" name="1042005"><span data-dcnode-id="248" instrument_node="">				“</span></a><span data-dcnode-id="245" style="font-weight: bold"><span data-dcnode-id="246" instrument_node="">Central or Public Water System</span></span><span data-dcnode-id="244" instrument_node="">” shall mean all suppliers of or providers of water with the exception as noted in subsection 1.3.1 of this Chapter.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="236"><a data-dcnode-id="240" name="1042006"><span data-dcnode-id="241" instrument_node="">				“</span></a><span data-dcnode-id="238" style="font-weight: bold"><span data-dcnode-id="239" instrument_node="">Distribution, Transmission or Supply Infrastructure</span></span><span data-dcnode-id="237" instrument_node="">” shall mean all mains, water lines, distribution, transmission or supply mains or lines, fire hydrants, fittings, connections, tanks, and all equipment intended for water distribution.</span></p><span data-dcnode-id="235" instrument_node="">
</span><p class="Citation" data-dcnode-id="232"><a data-dcnode-id="233" name="1042007"><span data-dcnode-id="234" instrument_node="">16 DE Reg. 620 (12/01/12)</span></a></p><span data-dcnode-id="231" instrument_node="">
</span><p class="Citation" data-dcnode-id="228"><a data-dcnode-id="229" name="1044284"><span data-dcnode-id="230" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="227" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="224"><a data-dcnode-id="225" name="1042008"><span data-dcnode-id="226" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="223" instrument_node="">
</span><p class="Section section" data-dcnode-id="220"><a data-dcnode-id="221" name="1042009"><span data-dcnode-id="222" instrument_node="">2.0	Minimum Flows.</span></a></p><span data-dcnode-id="219" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="216"><a data-dcnode-id="217" name="1042010"><span data-dcnode-id="218" instrument_node="">	All water suppliers covered under the provisions of this Chapter shall provide a minimum flow of water to all areas of their system of at least 500 GPM above calculated domestic demand at a residual pressure of at least 20 PSI.</span></a></p><span data-dcnode-id="215" instrument_node="">
</span><p class="Citation" data-dcnode-id="212"><a data-dcnode-id="213" name="1042706"><span data-dcnode-id="214" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="211" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="208"><a data-dcnode-id="209" name="1042011"><span data-dcnode-id="210" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="207" instrument_node="">
</span><p class="Section section" data-dcnode-id="204"><a data-dcnode-id="205" name="1042012"><span data-dcnode-id="206" instrument_node="">3.0	Minimum Duration.</span></a></p><span data-dcnode-id="203" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="200"><a data-dcnode-id="201" name="1042013"><span data-dcnode-id="202" instrument_node="">	All water suppliers covered under the provisions of this Chapter shall provide a water supply capable of the minimum flow of 500 GPM at a residual pressure of at least 20 PSI for at least two (2) hours. Where the water supply serves only one and two-family dwellings, it shall be capable of the minimum flow of 500 GPM at a residual pressure of at least 20 PSI for at least one (1) hour.</span></a></p><span data-dcnode-id="199" instrument_node="">
</span><p class="Citation" data-dcnode-id="196"><a data-dcnode-id="197" name="1042737"><span data-dcnode-id="198" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="195" instrument_node="">
</span><p class="Citation" data-dcnode-id="192"><a data-dcnode-id="193" name="1044312"><span data-dcnode-id="194" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="191" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="188"><a data-dcnode-id="189" name="1042014"><span data-dcnode-id="190" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="187" instrument_node="">
</span><p class="Section section" data-dcnode-id="184"><a data-dcnode-id="185" name="1042015"><span data-dcnode-id="186" instrument_node="">4.0	Hydrants.</span></a></p><span data-dcnode-id="183" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="179" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="180" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="181" name="1042016"><span data-dcnode-id="182" instrument_node="">4.1			Fire hydrants shall be located as specified in Chapter 6 of this regulation for all occupancies and structures and buildings found within the State Fire Prevention Regulations.</span></a></span></p><span data-dcnode-id="178" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="174" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="175" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="176" name="1042017"><span data-dcnode-id="177" instrument_node="">4.2			Notwithstanding the provisions of subsection 4.1 of this Chapter of this Regulation, fire hydrants shall be located as prescribed for the hazard by the State Fire Marshal.</span></a></span></p><span data-dcnode-id="173" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="169" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="170" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="171" name="1042018"><span data-dcnode-id="172" instrument_node="">4.3			When a water supplier is extending any transmission, distribution or supply water main or piping, fire hydrants shall be installed so as not to exceed a maximum distance of 2,000 feet between hydrants.</span></a></span></p><span data-dcnode-id="168" instrument_node="">
</span><p class="Citation" data-dcnode-id="165"><a data-dcnode-id="166" name="1044475"><span data-dcnode-id="167" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="164" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="161"><a data-dcnode-id="162" name="1042019"><span data-dcnode-id="163" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="160" instrument_node="">
</span><p class="Section section" data-dcnode-id="157"><a data-dcnode-id="158" name="1042020"><span data-dcnode-id="159" instrument_node="">5.0	Installation.</span></a></p><span data-dcnode-id="156" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="152" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="153" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="154" name="1042021"><span data-dcnode-id="155" instrument_node="">5.1			Fire hydrants and water mains shall be installed in accordance with American Water Works Standards; the Standard for the Installation of Private Fire Service Mains and Their Appurtenances, NFPA 24, as adopted and/or modified by these Regulations; and in conformance with accepted engineering principles and practices.</span></a></span></p><span data-dcnode-id="151" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="147" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="148" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="149" name="1042022"><span data-dcnode-id="150" instrument_node="">5.2			The water supplier shall coordinate with the local Fire Department, to assure that the operation of the fire hydrant, including the direction of force needed to open the hydrant, is consistent with all other hydrants within the fire department’s district as approved by the State Fire Marshal.</span></a></span></p><span data-dcnode-id="146" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="142" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="143" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="144" name="1042023"><span data-dcnode-id="145" instrument_node="">5.3			The water supplier shall coordinate with the local Fire Department, to assure that all the characteristics of the hose connections and pumper connections on all new hydrants are consistent with all other hydrants within the fire department’s district as approved by the State Fire Marshal. The characteristics of these connections shall include, but not be limited to, the internal diameter of the openings, the outside (thread) diameter of the connections, the number of threads per inch, the configuration of the thread, and the depth of the thread.</span></a></span></p><span data-dcnode-id="141" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="137" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="138" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="139" name="1042024"><span data-dcnode-id="140" instrument_node="">5.4			As fire hydrants are replaced for whatever reason, including replacement of damaged hydrants, the water supplier shall install only hydrants that meet the operational criteria and thread specifications stated above.</span></a></span></p><span data-dcnode-id="136" instrument_node="">
</span><p class="Citation" data-dcnode-id="133"><a data-dcnode-id="134" name="1042025"><span data-dcnode-id="135" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="132" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="129"><a data-dcnode-id="130" name="1044367"><span data-dcnode-id="131" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="128" instrument_node="">
</span><p class="Section section" data-dcnode-id="125"><a data-dcnode-id="126" name="1042026"><span data-dcnode-id="127" instrument_node="">6.0	Auxiliary Power Supply.</span></a></p><span data-dcnode-id="124" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="121"><a data-dcnode-id="122" name="1042027"><span data-dcnode-id="123" instrument_node="">	All water suppliers that depend on electrically driven pumps to sustain the water distribution systems must provide auxiliary power systems to drive the pumps in the event of an electrical failure that will render the electric pumps out-of-service.</span></a></p><span data-dcnode-id="120" instrument_node="">
</span><p class="Citation" data-dcnode-id="117"><a data-dcnode-id="118" name="1042776"><span data-dcnode-id="119" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="116" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="113"><a data-dcnode-id="114" name="1042028"><span data-dcnode-id="115" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="112" instrument_node="">
</span><p class="Section section" data-dcnode-id="109"><a data-dcnode-id="110" name="1042029"><span data-dcnode-id="111" instrument_node="">7.0	Submission of Plans.</span></a></p><span data-dcnode-id="108" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="105"><a data-dcnode-id="106" name="1042030"><span data-dcnode-id="107" instrument_node="">	All water suppliers must submit engineering grade plans, hydraulic calculations, pump data, and other required specifications to the Office of the State Fire Marshal for review and approval, pursuant to the State Fire Prevention Regulations with respect to submission of plans and fees, for all work when extending or improving their franchise districts, their coverage areas, their distribution transmission or supply infrastructure, and any modifications to their water systems.</span></a></p><span data-dcnode-id="104" instrument_node="">
</span><p class="Citation" data-dcnode-id="101"><a data-dcnode-id="102" name="1042031"><span data-dcnode-id="103" instrument_node="">1 DE Reg. 197 (08/01/97)</span></a></p><span data-dcnode-id="100" instrument_node="">
</span><p class="Citation" data-dcnode-id="97"><a data-dcnode-id="98" name="1042032"><span data-dcnode-id="99" instrument_node="">6 DE Reg. 1638 (06/01/03)</span></a></p><span data-dcnode-id="96" instrument_node="">
</span><p class="Citation" data-dcnode-id="93"><a data-dcnode-id="94" name="1042033"><span data-dcnode-id="95" instrument_node="">8 DE Reg. 416 (09/01/04)</span></a></p><span data-dcnode-id="92" instrument_node="">
</span><p class="Citation" data-dcnode-id="89"><a data-dcnode-id="90" name="1042034"><span data-dcnode-id="91" instrument_node="">10 DE Reg. 342 (08/01/06)</span></a></p><span data-dcnode-id="88" instrument_node="">
</span><p class="Citation" data-dcnode-id="85"><a data-dcnode-id="86" name="1042035"><span data-dcnode-id="87" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="84" instrument_node="">
</span><p class="Citation" data-dcnode-id="81"><a data-dcnode-id="82" name="1042036"><span data-dcnode-id="83" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="80" instrument_node="">
</span><p class="Citation" data-dcnode-id="77"><a data-dcnode-id="78" name="1044397"><span data-dcnode-id="79" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="76" instrument_node="">
