</span><p class="Body-L2" data-dcnode-id="4662"><a data-dcnode-id="4663" name="1040892"><span data-dcnode-id="4664" instrument_node="">1.2.3				In all buildings or areas thereof used for the storage, fabricating, assembling, manufacturing, processing, display or sale of combustible goods, wares, merchandise, products, or materials when more than two (2) stories or 25 feet in height.</span></a></p><span data-dcnode-id="4661" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4658"><a data-dcnode-id="4659" name="1040893"><span data-dcnode-id="4660" instrument_node="">1.2.4				In all basement areas exceeding 2,500 square feet floor area.</span></a></p><span data-dcnode-id="4657" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4654"><a data-dcnode-id="4655" name="1040894"><span data-dcnode-id="4656" instrument_node="">1.2.5				In residential occupancies when of: </span></a></p><span data-dcnode-id="4653" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4649" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4650" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4651" name="1040895"><span data-dcnode-id="4652" instrument_node="">1.2.5.1						Type V (0,0,0) or Type III (2,0,0) construction and exceeding two (2) stories or 25 feet in height.</span></a></span></p><span data-dcnode-id="4648" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4644" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4645" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4646" name="1040896"><span data-dcnode-id="4647" instrument_node="">1.2.5.2						Type V (1,1,1) and Type III (2,1,1) or Type IV (2,H,H) construction exceeding three (3) stories or 35 feet in height. </span></a></span></p><span data-dcnode-id="4643" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4640" style="text-transform: none; vertical-align: baseline"><a data-dcnode-id="4641" name="1040900"><span data-dcnode-id="4642" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4639" instrument_node="">
</span><span data-dcnode-id="4638" instrument_node="">
</span><span data-dcnode-id="4636" instrument_node="">
</span><span data-dcnode-id="4635" instrument_node="">
</span><span data-dcnode-id="4626" instrument_node="">
</span><span data-dcnode-id="4624" instrument_node="">
</span><table class="Text_Box" data-dcnode-id="4622" style="margin-bottom: 6.0pt; margin-left: 0pt; margin-right: 0pt; margin-top: 6.0pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; text-align: center; width: 489.00168pt" summary=""><caption data-dcnode-id="4637"></caption><tbody data-dcnode-id="4623"><tr data-dcnode-id="4625"><td data-dcnode-id="4627" style="border-bottom-color: #000000; border-bottom-style: solid; border-bottom-width: 0.5pt; border-left-color: #000000; border-left-style: solid; border-left-width: 0.5pt; border-right-color: #000000; border-right-style: solid; border-right-width: 0.5pt; border-top-color: #000000; border-top-style: solid; border-top-width: 0.5pt; padding-bottom: 6pt; padding-left: 6pt; padding-right: 6pt; padding-top: 6pt; vertical-align: middle; width: 489.00168pt"><span data-dcnode-id="4634" instrument_node="">
</span><div class="CellBody" data-dcnode-id="4629"><span data-dcnode-id="4631" style="font-weight: bold"><a data-dcnode-id="4632" name="1040899"><span data-dcnode-id="4633" instrument_node="">Note:</span></a></span><span data-dcnode-id="4630" instrument_node=""> Above referenced construction classifications are defined under the Standard on Types of Building Construction, NFPA 220. </span></div><span data-dcnode-id="4628" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="4621" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4618"><a data-dcnode-id="4619" name="1040901"><span data-dcnode-id="4620" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4617" instrument_node="">
</span><div class="Exception" data-dcnode-id="4613" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4614" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4615" name="1040902"><span data-dcnode-id="4616" instrument_node="">Exception No. 1:					Single family detached dwellings are exempted from this requirement. </span></a></span></div><span data-dcnode-id="4612" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4609"><a data-dcnode-id="4610" name="1040903"><span data-dcnode-id="4611" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4608" instrument_node="">
</span><div class="Exception" data-dcnode-id="4604" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4605" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4606" name="1040904"><span data-dcnode-id="4607" instrument_node="">Exception No. 2:					Attached one- and two-family dwellings are exempted from this requirement when dwelling units are separated by two-hour rated construction, in accordance with Regulation 701, Chapter 2.</span></a></span></div><span data-dcnode-id="4603" instrument_node="">
</span><div class="styrsid7299678_Exception_Itali" data-dcnode-id="4600" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-top: 0.0pt; text-align: left; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4601" name="1040905"><span data-dcnode-id="4602" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4599" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4596"><a data-dcnode-id="4597" name="1040906"><span data-dcnode-id="4598" instrument_node="">1.2.6				In all residential apartment buildings storage areas except individual unit closets that are located within individual residential living units.</span></a></p><span data-dcnode-id="4595" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4592"><a data-dcnode-id="4593" name="1040907"><span data-dcnode-id="4594" instrument_node="">1.2.7				In all buildings used as health care occupancies as defined in the Life Safety Code, NFPA 101, as adopted and/or modified by these Regulations. </span></a></p><span data-dcnode-id="4591" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4588"><a data-dcnode-id="4589" name="1040908"><span data-dcnode-id="4590" instrument_node="">1.2.8				In all buildings or areas classified as "high hazard" under the Life Safety Code, NFPA 101, or "extra hazard" under the Standard for the Installation of Sprinkler Systems, NFPA 13, as adopted and/or modified by these Regulations. </span></a></p><span data-dcnode-id="4587" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4581"><a data-dcnode-id="4585" name="1040909"><span data-dcnode-id="4586" instrument_node="">1.2.9				All buildings used as dormitories, in whole or in part, to house students at a public or private school or public or private institution of higher education. (16 </span></a><span data-dcnode-id="4583" style="font-weight: bold"><span data-dcnode-id="4584" instrument_node="">Del.C. </span></span><span data-dcnode-id="4582" instrument_node="">Ch. 88) This applies to all such dormitories regardless if new or existing.</span></p><span data-dcnode-id="4580" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4576" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4577" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4578" name="1040910"><span data-dcnode-id="4579" instrument_node="">1.3			Installation and Plan Review.</span></a></span></p><span data-dcnode-id="4575" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4572"><a data-dcnode-id="4573" name="1040911"><span data-dcnode-id="4574" instrument_node="">1.3.1				All automatic fire suppression systems shall be installed in accordance with the applicable codes and standards as listed in Regulation 701. </span></a></p><span data-dcnode-id="4571" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4568"><a data-dcnode-id="4569" name="1040912"><span data-dcnode-id="4570" instrument_node=""> </span></a></p><span data-dcnode-id="4567" instrument_node="">
</span><div class="Exception" data-dcnode-id="4563" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4564" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4565" name="1040913"><span data-dcnode-id="4566" instrument_node="">Exception No. 1:					The State Fire Marshal may accept a fire suppression system which does not meet the strict provisions of the applicable codes and standards when in his opinion the proposed system will provide an equivalent level of life safety.</span></a></span></div><span data-dcnode-id="4562" instrument_node="">
</span><div class="Exception" data-dcnode-id="4559" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4560" name="1040914"><span data-dcnode-id="4561" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4558" instrument_node="">
</span><div class="Exception" data-dcnode-id="4554" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-align: justify; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4555" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4556" name="1040915"><span data-dcnode-id="4557" instrument_node="">Exception No. 2:				 	Whenever an NFPA 13R system is proposed, the Fire Marshal shall evaluate the effect of NFPA 13R exceptions on the fire safety of the building. When in the opinion of the Fire Marshal an adequate level of fire safety cannot be achieved with the application of the exception, he may disapprove the use of the exception.</span></a></span></div><span data-dcnode-id="4553" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4550"><a data-dcnode-id="4551" name="1040916"><span data-dcnode-id="4552" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4549" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4546"><a data-dcnode-id="4547" name="1040917"><span data-dcnode-id="4548" instrument_node="">1.3.1.1						The fire department connection(s) shall use hose connections compatible with the local fire company.</span></a></p><span data-dcnode-id="4545" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4542"><a data-dcnode-id="4543" name="1040918"><span data-dcnode-id="4544" instrument_node="">1.3.1.1.1							Fire department connections shall be located or arranged as required by the Chief Officer of the fire department having jurisdiction according to the following:</span></a></p><span data-dcnode-id="4541" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4538"><a data-dcnode-id="4539" name="1040919"><span data-dcnode-id="4540" instrument_node="">1.3.1.1.1.1	The Office of the State Fire Marshal will give notice to the Chief Officer of a building that is proposed for construction that is to be protected with an automatic sprinkler system, and the Chief Officer must respond, in writing, within 5 working days, as to their requirement for the location of the fire department connection.</span></a></p><span data-dcnode-id="4537" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4534"><a data-dcnode-id="4535" name="1040920"><span data-dcnode-id="4536" instrument_node="">1.3.1.1.1.2							In the event that the Chief Officer does not respond according to subsection 1.3.1.1.1.1 of this Chapter, the Office of the State Fire Marshal will determine the location for the fire department connection. This provision will permit the Office of the State Fire Marshal to locate the fire department connection so that hose can be readily and conveniently attached; and the fire department connections will be located in a manner consistent with nationally recognized practices.</span></a></p><span data-dcnode-id="4533" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4530"><a data-dcnode-id="4531" name="1040921"><span data-dcnode-id="4532" instrument_node="">1.3.1.1.1.3							Each fire department connection to sprinkler systems shall be designated by a sign having raised letters at least 1 in. (25.4 mm) in height cast on plate or fitting, reading service design, e.g., "AUTOSPRK", "OPEN SPRK AND STANDPIPE." A sign shall also indicate the pressure required at the inlets to deliver the greatest system demand.</span></a></p><span data-dcnode-id="4529" instrument_node="">
</span><div class="Normal" data-dcnode-id="4526" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-left: 0pt; margin-top: 0.0pt; text-align: left; text-decoration: underline; text-indent: 0pt; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4527" name="1040922"><span data-dcnode-id="4528" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4525" instrument_node="">
</span><div class="Normal" data-dcnode-id="4521" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-left: 0pt; margin-top: 0.0pt; text-align: left; text-indent: 0pt; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4522" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: italic; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4523" name="1040923"><span data-dcnode-id="4524" instrument_node="">Exception to 1.3.1.1.1.3: The sign is not required where the system demand pressure is less than 150 psi (10.3 bars).</span></a></span></div><span data-dcnode-id="4520" instrument_node="">
</span><div class="Normal" data-dcnode-id="4517" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-left: 0pt; margin-top: 0.0pt; text-align: left; text-indent: 0pt; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4518" name="1040924"><span data-dcnode-id="4519" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4516" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4513"><a data-dcnode-id="4514" name="1040925"><span data-dcnode-id="4515" instrument_node="">1.3.1.2						Preaction systems shall be a single interlock system, which admits water to sprinkler piping upon operation of detection devices, a non-interlock system, which admits water to sprinkler piping upon operation of detection devices or automatic sprinklers, or a double interlock system, which admits water to sprinkler piping upon operation of both detection devices and automatic sprinklers. A double interlock preaction system shall not be used except where specifically acceptable to the State Fire Marshal Office.</span></a></p><span data-dcnode-id="4512" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4509"><a data-dcnode-id="4510" name="1040926"><span data-dcnode-id="4511" instrument_node="">1.3.1.3						Sprinklers shall be required to be installed on porches, balconies, decks, and in corridors and stairs, regardless of whether or not they are open to outside air in all residential occupancies except one and two-family dwellings.</span></a></p><span data-dcnode-id="4508" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4505"><a data-dcnode-id="4506" name="1040927"><span data-dcnode-id="4507" instrument_node="">1.3.1.4						Sprinklers shall be required to be installed in closets on exterior balconies, regardless of whether or not it opens directly into the dwelling unit.</span></a></p><span data-dcnode-id="4504" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4501"><a data-dcnode-id="4502" name="1040928"><span data-dcnode-id="4503" instrument_node="">1.3.1.5						A hydraulically designed sprinkler system shall be designed to provide a 10 PSI safety factor over and above the system demand.</span></a></p><span data-dcnode-id="4500" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4497"><a data-dcnode-id="4498" name="1040929"><span data-dcnode-id="4499" instrument_node="">1.3.2				Plans of all proposed automatic fire suppression systems shall be submitted to the State Fire Marshal for review and approval in accordance with the provisions of Regulation 701, Chapter 4.</span></a></p><span data-dcnode-id="4496" instrument_node="">
</span><p class="Citation" data-dcnode-id="4493"><a data-dcnode-id="4494" name="1042284"><span data-dcnode-id="4495" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4492" instrument_node="">
</span><p class="Citation" data-dcnode-id="4489"><a data-dcnode-id="4490" name="1043428"><span data-dcnode-id="4491" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4488" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4485"><a data-dcnode-id="4486" name="1040930"><span data-dcnode-id="4487" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4484" instrument_node="">
</span><p class="Section section" data-dcnode-id="4481"><a data-dcnode-id="4482" name="1040931"><span data-dcnode-id="4483" instrument_node="">2.0	Standpipes.</span></a></p><span data-dcnode-id="4480" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4477"><a data-dcnode-id="4478" name="1040932"><span data-dcnode-id="4479" instrument_node="">2.1			This chapter shall apply to all new buildings and this chapter shall apply to all existing buildings that undergo a change in occupancy.</span></a></p><span data-dcnode-id="4476" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4473"><a data-dcnode-id="4474" name="1040933"><span data-dcnode-id="4475" instrument_node="">2.1.1				This chapter shall apply to all buildings, structures, marine vessels, premises, and conditions which are modified by more than 50% after the effective date of these Regulations. The 50% figure shall be calculated utilizing the gross square footage of the building, structure, marine vessel, premises and conditions as to arrive at the correct application.</span></a></p><span data-dcnode-id="4472" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4468"><a data-dcnode-id="4469" name="1040934"><span data-dcnode-id="4471" instrument_node="">2.1.2				Any proposal that is presented to the Office of the State Fire Marshal for review and approval for a building rehabilitation as defined in the 101 Life Safety Code, for less than 50% of the gross square footage of a non-sprinklered building, may not have another such project for the same building submitted for review and approval any sooner than three (3) years after the date of the final inspection unless sprinkler projection is provided throughout the entire building.</span><img alt="" class="Default" data-dcnode-id="4470" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.2.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4467" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4463" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4464" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4465" name="1040938"><span data-dcnode-id="4466" instrument_node="">2.2			Where Required.</span></a></span></p><span data-dcnode-id="4462" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4459"><a data-dcnode-id="4460" name="1040939"><span data-dcnode-id="4461" instrument_node="">2.2.1				Standpipes shall be provided in all areas and buildings as required in the codes and standards listed in Regulation 701 as well as the following areas or buildings: </span></a></p><span data-dcnode-id="4458" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4455"><a data-dcnode-id="4456" name="1040940"><span data-dcnode-id="4457" instrument_node="">2.2.2				In all Class A and Class B places of assembly and institutional occupancies two (2) stories or 25 feet in height or over. </span></a></p><span data-dcnode-id="4454" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4451"><a data-dcnode-id="4452" name="1040941"><span data-dcnode-id="4453" instrument_node="">2.2.3				In any building over three (3) stories.</span></a></p><span data-dcnode-id="4450" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4447"><a data-dcnode-id="4448" name="1040942"><span data-dcnode-id="4449" instrument_node="">2.2.4				In any building over 35 feet in height.</span></a></p><span data-dcnode-id="4446" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4443"><a data-dcnode-id="4444" name="1040943"><span data-dcnode-id="4445" instrument_node="">2.2.5				In any building that has a floor above the first floor over 10,000 square feet gross floor area.</span></a></p><span data-dcnode-id="4442" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4439"><a data-dcnode-id="4440" name="1040944"><span data-dcnode-id="4441" instrument_node="">2.2.6				In all buildings where the 1st floor exceeds 60,000 gross square feet, a Class I horizontal standpipe system installed in accordance with the applicable codes and standards listed in Regulation 701 of these Regulations shall be provided.</span></a></p><span data-dcnode-id="4438" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4434" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4435" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4436" name="1040945"><span data-dcnode-id="4437" instrument_node="">2.3			Installation. </span></a></span></p><span data-dcnode-id="4433" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4430"><a data-dcnode-id="4431" name="1040946"><span data-dcnode-id="4432" instrument_node="">2.3.1				All standpipe systems shall be installed in accordance with the applicable codes and standards listed in Regulation 701.</span></a></p><span data-dcnode-id="4429" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4426"><a data-dcnode-id="4427" name="1040947"><span data-dcnode-id="4428" instrument_node="">2.3.2				The standpipe system shall be carried up with each floor and shall be installed and ready for use as each floor progresses. Standpipes shall not be more than one floor below the highest forms of staging.</span></a></p><span data-dcnode-id="4425" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4422"><a data-dcnode-id="4423" name="1040948"><span data-dcnode-id="4424" instrument_node="">2.3.3				The 2½-inch of hose connections on Class I systems shall be provided in the following locations:</span></a></p><span data-dcnode-id="4421" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4418"><a data-dcnode-id="4419" name="1040949"><span data-dcnode-id="4420" instrument_node="">2.3.3.1						At the highest intermediate landing between floor levels in every required exit stairway.</span></a></p><span data-dcnode-id="4417" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4414"><a data-dcnode-id="4415" name="1040950"><span data-dcnode-id="4416" instrument_node="">2.3.3.2						Where intermediate landings are not provided, hose connections shall be permitted to be located at the main floor landings in exit stairways when approved by the authority having jurisdiction.</span></a></p><span data-dcnode-id="4413" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4409"><a data-dcnode-id="4410" name="1040951"><span data-dcnode-id="4412" instrument_node="">2.3.4				Where the local fire department has the capability of providing the required pressure, hydraulically designed standpipe systems in fully sprinklered, non-highrise buildings shall be designed to provide the required waterflow rate.</span><img alt="" class="Default" data-dcnode-id="4411" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.3.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4408" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4404" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4405" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4406" name="1040955"><span data-dcnode-id="4407" instrument_node="">2.4			Floor Level Identification.</span></a></span></p><span data-dcnode-id="4403" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4400"><a data-dcnode-id="4401" name="1040956"><span data-dcnode-id="4402" instrument_node="">2.4.1				A sign shall be provided at each landing, in all interior stairways, designating the floor level.</span></a></p><span data-dcnode-id="4399" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4396"><a data-dcnode-id="4397" name="1040957"><span data-dcnode-id="4398" instrument_node="">2.5			Fire Department Connection</span></a></p><span data-dcnode-id="4395" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4392"><a data-dcnode-id="4393" name="1040958"><span data-dcnode-id="4394" instrument_node="">2.5.1				Fire department connections shall be located or arranged as required by the Chief Officer of the fire department having jurisdiction according to the following:</span></a></p><span data-dcnode-id="4391" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4388"><a data-dcnode-id="4389" name="1040959"><span data-dcnode-id="4390" instrument_node="">2.5.1.1						The Office of the State Fire Marshal will give notice to the Chief Officer of a building that is proposed for construction that is to be protected with a standpipe system, and the Chief Officer must respond, in writing, within 5 working days, as to their requirement for the location of the fire department connection.</span></a></p><span data-dcnode-id="4387" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4384"><a data-dcnode-id="4385" name="1042864"><span data-dcnode-id="4386" instrument_node="">2.5.1.2						In the event that the Chief Officer does not respond according to subsection 2.5.1.1 of this Chapter, the Office of the State Fire Marshal will determine the location for the fire department connection. This provision will permit the Office of the State Fire Marshal to locate the fire department connection so that hose can be readily and conveniently attached; and the fire department connections will be located in a manner consistent with nationally recognized practices.</span></a></p><span data-dcnode-id="4383" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4380"><a data-dcnode-id="4381" name="1040961"><span data-dcnode-id="4382" instrument_node="">2.5.1.3						Each fire department connection to standpipe systems shall be designated by a sign having raised letters at least 1 in. (25.4 mm) in size cast on the plate or fitting, reading, "STANDPIPE." If automatic sprinklers are also supplied by the fire department connection, the sign or combination of signs shall indicate both designated services, e.g., "STANDPIPE AND AUTOSPRK." or "AUTOSPRK AND STANDPIPE." A sign shall also indicate the pressure required at the inlets to deliver the system demand.</span></a></p><span data-dcnode-id="4379" instrument_node="">
</span><p class="Citation" data-dcnode-id="4376"><a data-dcnode-id="4377" name="1042827"><span data-dcnode-id="4378" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4375" instrument_node="">
</span><p class="Citation" data-dcnode-id="4372"><a data-dcnode-id="4373" name="1043487"><span data-dcnode-id="4374" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4371" instrument_node="">
</span><div class="Normal" data-dcnode-id="4368" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; margin-bottom: 0.0pt; margin-top: 0.0pt; text-align: left; text-indent: NaNpt; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4369" name="1040962"><span data-dcnode-id="4370" instrument_node="">&nbsp;</span></a></div><span data-dcnode-id="4367" instrument_node="">
</span><p class="Section section" data-dcnode-id="4364"><a data-dcnode-id="4365" name="1040963"><span data-dcnode-id="4366" instrument_node="">3.0	Fire Pump</span></a></p><span data-dcnode-id="4363" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4360"><a data-dcnode-id="4361" name="1040964"><span data-dcnode-id="4362" instrument_node="">3.1			Review of Electrical Plans</span></a></p><span data-dcnode-id="4359" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4356"><a data-dcnode-id="4357" name="1040965"><span data-dcnode-id="4358" instrument_node="">3.1.1				At least two complete sets of electrical plans for motors driving fire pumps, stamped and signed by a Delaware Registered Professional Engineer shall be submitted to, reviewed, and approved by an electrical inspection agency that is approved by the State Board of Electrical Examiners and recognized by the Office of the State Fire Marshal. The approval of these electrical plans is required prior to the submittal of fire pump plans to the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="4355" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4352"><a data-dcnode-id="4353" name="1040966"><span data-dcnode-id="4354" instrument_node="">3.1.2				The plans shall be reviewed by the approved electrical inspection agency for compliance to the National Electrical Code® (NFPA 70) and National Fire Protection Association’s Standard for Installation of Fire Pumps (NFPA 20).</span></a></p><span data-dcnode-id="4351" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4348"><a data-dcnode-id="4349" name="1040967"><span data-dcnode-id="4350" instrument_node="">3.1.3				The electrical inspection agency that approves the plans shall provide documentation authenticating the approval to the Office of the State Fire Marshal. This documentation will need to accompany the building plans where an electric motor driven fire pump will be installed. In the case of an existing building, the documentation will need to accompany the fire protection plans where an electric motor driven fire pump will be installed.</span></a></p><span data-dcnode-id="4347" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4344"><a data-dcnode-id="4345" name="1040968"><span data-dcnode-id="4346" instrument_node="">3.1.4				At least one set of the plans approved by the electrical inspection agency shall be kept on the job site until the final inspection of the fire pump installation by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="4343" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4339"><a data-dcnode-id="4340" name="1040969"><span data-dcnode-id="4342" instrument_node="">3.1.5				The acceptance test for a new, electric motor-driven fire pump installation shall not be conducted by the Office of the State Fire Marshal until a field inspection of the electrical portion of the installation by an electrical inspection agency leads to their “FINAL INSPECTION PASSED” sticker being adhered to the fire pump controller.</span><img alt="" class="Default" data-dcnode-id="4341" height="126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.4.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4338" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4335"><a data-dcnode-id="4336" name="1040973"><span data-dcnode-id="4337" instrument_node="">3.2			Installations</span></a></p><span data-dcnode-id="4334" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4331"><a data-dcnode-id="4332" name="1040974"><span data-dcnode-id="4333" instrument_node="">3.2.1				Starting and Stopping Arrangement</span></a></p><span data-dcnode-id="4330" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4326"><a data-dcnode-id="4327" name="1040975"><span data-dcnode-id="4329" instrument_node="">3.2.1.1						Regardless if the controller is arranged to start automatically, start automatically for testing, start manually, or start in any other manner, it shall be arranged to require manual stopping.</span><img alt="" class="Default" data-dcnode-id="4328" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.5.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4325" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4322"><a data-dcnode-id="4323" name="1040979"><span data-dcnode-id="4324" instrument_node="">3.2.2				Devices in Suction Piping</span></a></p><span data-dcnode-id="4321" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4318"><a data-dcnode-id="4319" name="1040980"><span data-dcnode-id="4320" instrument_node="">3.2.2.1						No device or assembly such as check valves and backflow prevention devices shall be installed in the suction piping of a fire pump installation.</span></a></p><span data-dcnode-id="4317" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4314"><a data-dcnode-id="4315" name="1040981"><span data-dcnode-id="4316" instrument_node="">3.2.2.2						Where required by the water provider having jurisdiction, check valves and backflow prevention devices and assemblies may be installed in suction piping and shall be in accordance with NFPA 20 including the following:</span></a></p><span data-dcnode-id="4313" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4310"><a data-dcnode-id="4311" name="1040982"><span data-dcnode-id="4312" instrument_node="">3.2.2.2.1							All check valves and backflow prevention devices and assemblies:</span></a></p><span data-dcnode-id="4309" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4306"><a data-dcnode-id="4307" name="1040983"><span data-dcnode-id="4308" instrument_node="">3.2.2.2.1.1								Shall be listed for fire protection service, and</span></a></p><span data-dcnode-id="4305" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4302"><a data-dcnode-id="4303" name="1040984"><span data-dcnode-id="4304" instrument_node="">3.2.2.2.1.2								Device location(s) shall be noted on sprinkler plan submissions, and</span></a></p><span data-dcnode-id="4301" instrument_node="">
</span><p class="Body-L5" data-dcnode-id="4297"><a data-dcnode-id="4298" name="1040985"><span data-dcnode-id="4300" instrument_node="">3.2.2.2.1.3								Manufacturers’ specifications for such devices shall be included in the sprinkler plan submittal for review and approval.</span><img alt="" class="Default" data-dcnode-id="4299" height="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.6.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4296" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4293"><a data-dcnode-id="4294" name="1040989"><span data-dcnode-id="4295" instrument_node="">3.2.3				Electric Motor Driver Reliability</span></a></p><span data-dcnode-id="4292" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4289"><a data-dcnode-id="4290" name="1040990"><span data-dcnode-id="4291" instrument_node="">3.2.3.1						Auxiliary or supplemental power requirements for electrically driven fire pump shall be required by the State Fire Marshal’s Office:</span></a></p><span data-dcnode-id="4288" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4285"><a data-dcnode-id="4286" name="1040991"><span data-dcnode-id="4287" instrument_node="">3.2.3.1.1		 					ONLY when specifically required by SFPR or an adopted NFPA code or standard.</span></a></p><span data-dcnode-id="4284" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4280"><a data-dcnode-id="4281" name="1040992"><span data-dcnode-id="4283" instrument_node="">3.2.3.1.2							When the height of the structure is beyond the pumping capability of the fire departments apparatus</span><img alt="" class="Default" data-dcnode-id="4282" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.7.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="4279" instrument_node="">
</span><p class="Citation" data-dcnode-id="4276"><a data-dcnode-id="4277" name="1040996"><span data-dcnode-id="4278" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="4275" instrument_node="">
</span><p class="Citation" data-dcnode-id="4272"><a data-dcnode-id="4273" name="1042374"><span data-dcnode-id="4274" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4271" instrument_node="">
</span><p class="Citation" data-dcnode-id="4268"><a data-dcnode-id="4269" name="1043520"><span data-dcnode-id="4270" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4267" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4264"><a data-dcnode-id="4265" name="1040997"><span data-dcnode-id="4266" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4263" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4259" style="text-align: center; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4260" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: bold; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4261" name="1040998"><span data-dcnode-id="4262" instrument_node="">Chapter 5 Mid-rise, High-rise and Large Area Buildings</span></a></span></p><span data-dcnode-id="4258" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4255"><a data-dcnode-id="4256" name="1040999"><span data-dcnode-id="4257" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4254" instrument_node="">
</span><p class="Section section" data-dcnode-id="4251"><a data-dcnode-id="4252" name="1041000"><span data-dcnode-id="4253" instrument_node="">1.0	Application</span></a></p><span data-dcnode-id="4250" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4247"><a data-dcnode-id="4248" name="1041001"><span data-dcnode-id="4249" instrument_node="">1.1				This chapter shall apply to all new buildings and this chapter shall apply to all existing buildings that undergo a change in occupancy.</span></a></p><span data-dcnode-id="4246" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4243"><a data-dcnode-id="4244" name="1041002"><span data-dcnode-id="4245" instrument_node="">1.2				This chapter shall apply to all buildings, structures, marine vessels, premises, and conditions which are modified by more than 50% after the effective date of these Regulations. The 50% figure shall be calculated utilizing the gross square footage of the building, structure, marine vessel, premises and conditions as to arrive at the correct application.</span></a></p><span data-dcnode-id="4242" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4235"><a data-dcnode-id="4240" name="1041003"><span data-dcnode-id="4241" instrument_node="">1.3				Any proposal that is presented to the Office of the State Fire Marshal for review and approval for a building rehabilitation as defined in the 101 Life Safety Code, for less than 50% of the gross square footage of a non-sprinklered building, may not have another such project for the same building submitted for review</span></a><span data-dcnode-id="4238" style="text-decoration: underline"><span data-dcnode-id="4239" instrument_node=""> </span></span><span data-dcnode-id="4237" instrument_node="">and approval any sooner than three (3) years after the date of the final inspection unless sprinkler projection is provided throughout the entire building.</span><img alt="" class="Default" data-dcnode-id="4236" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.8.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></p><span data-dcnode-id="4234" instrument_node="">
</span><p class="Citation" data-dcnode-id="4231"><a data-dcnode-id="4232" name="1042839"><span data-dcnode-id="4233" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4230" instrument_node="">
</span><p class="Citation" data-dcnode-id="4227"><a data-dcnode-id="4228" name="1043549"><span data-dcnode-id="4229" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4226" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4223"><a data-dcnode-id="4224" name="1041007"><span data-dcnode-id="4225" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4222" instrument_node="">
</span><p class="Section section" data-dcnode-id="4219"><a data-dcnode-id="4220" name="1041008"><span data-dcnode-id="4221" instrument_node="">2.0	Mid-rise Building Fire Protection Features Required.</span></a></p><span data-dcnode-id="4218" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4214" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><span data-dcnode-id="4215" style="color: #000000; font-family: Arial; font-size: 10.0pt; font-style: normal; font-variant: normal; font-weight: normal; text-transform: none; vertical-align: baseline"><a data-dcnode-id="4216" name="1041009"><span data-dcnode-id="4217" instrument_node="">2.1			Fire Command Center</span></a></span></p><span data-dcnode-id="4213" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4210"><a data-dcnode-id="4211" name="1041010"><span data-dcnode-id="4212" instrument_node="">2.1.1				Every mid-rise building shall contain a fire command center for fire department operations in a location reviewed by the responsible Fire Chief and approved by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="4209" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4206"><a data-dcnode-id="4207" name="1041011"><span data-dcnode-id="4208" instrument_node="">2.1.2				The fire command center shall contain the following:</span></a></p><span data-dcnode-id="4205" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4202"><a data-dcnode-id="4203" name="1041012"><span data-dcnode-id="4204" instrument_node="">2.1.2.1						Fire detection and alarm system annunciator panels and smoke management panels</span></a></p><span data-dcnode-id="4201" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4198"><a data-dcnode-id="4199" name="1041013"><span data-dcnode-id="4200" instrument_node="">2.1.2.2						Status indicator for elevator and annunciator indicating which elevators are operational</span></a></p><span data-dcnode-id="4197" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4194"><a data-dcnode-id="4195" name="1041014"><span data-dcnode-id="4196" instrument_node="">2.1.2.3						Status indicators and controls for air handling</span></a></p><span data-dcnode-id="4193" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4190"><a data-dcnode-id="4191" name="1041015"><span data-dcnode-id="4192" instrument_node="">2.1.2.4						Emergency power, light and system controls; and status indicators</span></a></p><span data-dcnode-id="4189" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4186"><a data-dcnode-id="4187" name="1041016"><span data-dcnode-id="4188" instrument_node="">2.1.2.5						Telephone and internet access for fire department use</span></a></p><span data-dcnode-id="4185" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4182"><a data-dcnode-id="4183" name="1041017"><span data-dcnode-id="4184" instrument_node="">2.1.2.6						Emergency and standby power status indicators</span></a></p><span data-dcnode-id="4181" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4178"><a data-dcnode-id="4179" name="1041018"><span data-dcnode-id="4180" instrument_node="">2.1.2.7						Generator supervision devices and manual start and transfer features</span></a></p><span data-dcnode-id="4177" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4174"><a data-dcnode-id="4175" name="1041019"><span data-dcnode-id="4176" instrument_node="">2.1.2.8						Controls for unlocking fire exit stairway doors simultaneously</span></a></p><span data-dcnode-id="4173" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4170"><a data-dcnode-id="4171" name="1041020"><span data-dcnode-id="4172" instrument_node="">2.1.2.9						Controls required for smoke control</span></a></p><span data-dcnode-id="4169" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4166"><a data-dcnode-id="4167" name="1041021"><span data-dcnode-id="4168" instrument_node="">2.1.2.10						Important keys to include</span></a></p><span data-dcnode-id="4165" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4162"><a data-dcnode-id="4163" name="1041022"><span data-dcnode-id="4164" instrument_node="">2.1.2.10.1							Elevator machine room</span></a></p><span data-dcnode-id="4161" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4158"><a data-dcnode-id="4159" name="1041023"><span data-dcnode-id="4160" instrument_node="">2.1.2.10.2							Elevator hoistway door access key</span></a></p><span data-dcnode-id="4157" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4154"><a data-dcnode-id="4155" name="1041024"><span data-dcnode-id="4156" instrument_node="">2.1.2.10.3							Side access door elevator car key</span></a></p><span data-dcnode-id="4153" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4150"><a data-dcnode-id="4151" name="1041025"><span data-dcnode-id="4152" instrument_node="">2.1.2.10.4							Electric room keys</span></a></p><span data-dcnode-id="4149" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4146"><a data-dcnode-id="4147" name="1041026"><span data-dcnode-id="4148" instrument_node="">2.1.2.10.5							Fire pump room keys</span></a></p><span data-dcnode-id="4145" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4142"><a data-dcnode-id="4143" name="1041027"><span data-dcnode-id="4144" instrument_node="">2.1.2.10.6							Mechanical room keys</span></a></p><span data-dcnode-id="4141" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="4138"><a data-dcnode-id="4139" name="1041028"><span data-dcnode-id="4140" instrument_node="">2.1.2.10.7							Any master key</span></a></p><span data-dcnode-id="4137" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4134"><a data-dcnode-id="4135" name="1041029"><span data-dcnode-id="4136" instrument_node="">2.1.2.11						As built drawings. Specific types and format of drawings to be determined by the Office of the State Fire Marshal at time of plan review.</span></a></p><span data-dcnode-id="4133" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4130"><a data-dcnode-id="4131" name="1041030"><span data-dcnode-id="4132" instrument_node="">2.1.3				The Office of the State Fire Marshal may reduce the requirements of §1.1.2 of this Chapter if the Office of the State Fire Marshal determines that a specific item is not necessary for a specific building.</span></a></p><span data-dcnode-id="4129" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4126"><a data-dcnode-id="4127" name="1041031"><span data-dcnode-id="4128" instrument_node="">2.1.4				It is not the intent of this section to require a room solely for the purpose of a fire command center. The fire command center can be constructed as part of a lobby, security office, or other accessible gathering area. However, this area must meet the minimum criteria specified in this section for equipment, location, and personnel use.</span></a></p><span data-dcnode-id="4125" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4122"><a data-dcnode-id="4123" name="1041032"><span data-dcnode-id="4124" instrument_node="">2.2			Fire Alarm and Detection</span></a></p><span data-dcnode-id="4121" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4118"><a data-dcnode-id="4119" name="1041033"><span data-dcnode-id="4120" instrument_node="">2.2.1				Every mid-rise building shall be provided with a fire alarm and detection system in accordance with the Life Safety Code, (NFPA 101) and other provisions of the Delaware State Fire Prevention Regulations.</span></a></p><span data-dcnode-id="4117" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4114"><a data-dcnode-id="4115" name="1041034"><span data-dcnode-id="4116" instrument_node="">2.2.2				Every mid-rise building shall be provided with a standard manual fire alarm system with audio and visual devices in accordance with the National Fire Alarm Code (NFPA 72).</span></a></p><span data-dcnode-id="4113" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4110"><a data-dcnode-id="4111" name="1041035"><span data-dcnode-id="4112" instrument_node="">2.3			Smoke Management</span></a></p><span data-dcnode-id="4109" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4106"><a data-dcnode-id="4107" name="1041036"><span data-dcnode-id="4108" instrument_node="">2.3.1				Every mid-rise building shall have fire exit stair tower pressurization in accordance with NFPA 92 and include Areas of Refuge if located in an enclosed area other than an exit stair tower.</span></a></p><span data-dcnode-id="4105" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4102"><a data-dcnode-id="4103" name="1041037"><span data-dcnode-id="4104" instrument_node="">2.3.2				Except for the lobby at main entrance level, all elevators lobbies shall be separated from the remainder of the floor by a smoke barrier. The elevator lobby is permitted to serve additional elevators.</span></a></p><span data-dcnode-id="4101" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4098"><a data-dcnode-id="4099" name="1041038"><span data-dcnode-id="4100" instrument_node="">2.3.3				The elevator lobbies shall be permitted to be open to the remainder of the floor in buildings equipped with a mechanical smoke control system that will restrict smoke and hot gases from entering the elevator shaft on the fire floor.</span></a></p><span data-dcnode-id="4097" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4094"><a data-dcnode-id="4095" name="1041039"><span data-dcnode-id="4096" instrument_node="">2.4			Standby Power, Light, and Emergency Systems</span></a></p><span data-dcnode-id="4093" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4090"><a data-dcnode-id="4091" name="1041040"><span data-dcnode-id="4092" instrument_node="">2.4.1				Every mid-rise building shall be provided with an emergency power supply.</span></a></p><span data-dcnode-id="4089" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4086"><a data-dcnode-id="4087" name="1041041"><span data-dcnode-id="4088" instrument_node="">2.4.2				Standby power, light and emergency systems shall comply with the provisions of NFPA 110, or NFPA 111 as adopted and modified by these Regulations.</span></a></p><span data-dcnode-id="4085" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4082"><a data-dcnode-id="4083" name="1041042"><span data-dcnode-id="4084" instrument_node="">2.4.3				The fuel supply located on premises shall be sufficient for not less than two hours of the full demand operation of the system.</span></a></p><span data-dcnode-id="4081" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4078"><a data-dcnode-id="4079" name="1041043"><span data-dcnode-id="4080" instrument_node="">2.4.4				The standby system shall have a rated capability needed to simultaneously supply all equipment required to be operational during an emergency. </span></a></p><span data-dcnode-id="4077" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4074"><a data-dcnode-id="4075" name="1041044"><span data-dcnode-id="4076" instrument_node="">2.4.5				All required lighting, smoke management pressurization, electrically powered fire pumps and at least one elevator shall be connected to the standby power source. Elevators shall be provided with a selective load switch to allow transfer of power to each elevator. This will permit each elevator to be returned to the lobby and placed out of service except for fire department service.</span></a></p><span data-dcnode-id="4073" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4070"><a data-dcnode-id="4071" name="1041045"><span data-dcnode-id="4072" instrument_node="">2.4.6				Emergency Systems. Exit signs, exit illumination, and elevator car lighting shall be considered emergency systems, shall be connected to the standby source and shall operate within ten seconds of failure of the normal power supply.</span></a></p><span data-dcnode-id="4069" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4066"><a data-dcnode-id="4067" name="1041046"><span data-dcnode-id="4068" instrument_node="">2.4.7				Areas of Refuge. Areas of refuge shall be provided in accordance with the requirements of this Regulation, Chapter 3.</span></a></p><span data-dcnode-id="4065" instrument_node="">
</span><p class="Citation" data-dcnode-id="4062"><a data-dcnode-id="4063" name="1041047"><span data-dcnode-id="4064" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="4061" instrument_node="">
</span><p class="Citation" data-dcnode-id="4058"><a data-dcnode-id="4059" name="1042476"><span data-dcnode-id="4060" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="4057" instrument_node="">
</span><p class="Citation" data-dcnode-id="4054"><a data-dcnode-id="4055" name="1043595"><span data-dcnode-id="4056" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="4053" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="4050"><a data-dcnode-id="4051" name="1041048"><span data-dcnode-id="4052" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="4049" instrument_node="">
</span><p class="Section section" data-dcnode-id="4046"><a data-dcnode-id="4047" name="1041049"><span data-dcnode-id="4048" instrument_node="">3.0	High-Rise Building Fire Protection Features Required.</span></a></p><span data-dcnode-id="4045" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="4042"><a data-dcnode-id="4043" name="1041050"><span data-dcnode-id="4044" instrument_node="">3.1			Fire Command Center</span></a></p><span data-dcnode-id="4041" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4038"><a data-dcnode-id="4039" name="1041051"><span data-dcnode-id="4040" instrument_node="">3.1.1				Every high-rise building shall contain a fire command center for fire department operations in a location reviewed by the responsible Fire Chief and approved by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="4037" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="4034"><a data-dcnode-id="4035" name="1041052"><span data-dcnode-id="4036" instrument_node="">3.1.2				The fire command center shall contain the following:</span></a></p><span data-dcnode-id="4033" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4030"><a data-dcnode-id="4031" name="1041053"><span data-dcnode-id="4032" instrument_node="">3.1.2.1						Voice alarm and public address panels</span></a></p><span data-dcnode-id="4029" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4026"><a data-dcnode-id="4027" name="1041054"><span data-dcnode-id="4028" instrument_node="">3.1.2.2						Fire department communications panel</span></a></p><span data-dcnode-id="4025" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4022"><a data-dcnode-id="4023" name="1041055"><span data-dcnode-id="4024" instrument_node="">3.1.2.3						Fire detection and alarm system annunciator panels and smoke management panels</span></a></p><span data-dcnode-id="4021" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4018"><a data-dcnode-id="4019" name="1041056"><span data-dcnode-id="4020" instrument_node="">3.1.2.4						Status indicator for elevator and annunciator indicating which elevators are operational</span></a></p><span data-dcnode-id="4017" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4014"><a data-dcnode-id="4015" name="1041057"><span data-dcnode-id="4016" instrument_node="">3.1.2.5						Status indicators and controls for air handling systems</span></a></p><span data-dcnode-id="4013" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4010"><a data-dcnode-id="4011" name="1041058"><span data-dcnode-id="4012" instrument_node="">3.1.2.6						Controls for unlocking all fire exit stairway doors simultaneously </span></a></p><span data-dcnode-id="4009" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4006"><a data-dcnode-id="4007" name="1041059"><span data-dcnode-id="4008" instrument_node="">3.1.2.7						Emergency power, light and system controls; and status indicators</span></a></p><span data-dcnode-id="4005" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="4002"><a data-dcnode-id="4003" name="1041060"><span data-dcnode-id="4004" instrument_node="">3.1.2.8						Telephone and internet access for fire department use</span></a></p><span data-dcnode-id="4001" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3998"><a data-dcnode-id="3999" name="1041061"><span data-dcnode-id="4000" instrument_node="">3.1.2.9						Emergency and standby power status indicators</span></a></p><span data-dcnode-id="3997" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3994"><a data-dcnode-id="3995" name="1041062"><span data-dcnode-id="3996" instrument_node="">3.1.2.10						Generator supervision devices and manual start and transfer features</span></a></p><span data-dcnode-id="3993" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3990"><a data-dcnode-id="3991" name="1041063"><span data-dcnode-id="3992" instrument_node="">3.1.2.11						Public address system, where specifically required by other sections of this Code</span></a></p><span data-dcnode-id="3989" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3986"><a data-dcnode-id="3987" name="1041064"><span data-dcnode-id="3988" instrument_node="">3.1.2.12						Controls required for smoke control</span></a></p><span data-dcnode-id="3985" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3982"><a data-dcnode-id="3983" name="1041065"><span data-dcnode-id="3984" instrument_node="">3.1.2.13						Important keys to include</span></a></p><span data-dcnode-id="3981" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3978"><a data-dcnode-id="3979" name="1041066"><span data-dcnode-id="3980" instrument_node="">3.1.2.13.1							Elevator machine room</span></a></p><span data-dcnode-id="3977" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3974"><a data-dcnode-id="3975" name="1041067"><span data-dcnode-id="3976" instrument_node="">3.1.2.13.2							Elevator hoistway door access key</span></a></p><span data-dcnode-id="3973" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3970"><a data-dcnode-id="3971" name="1041068"><span data-dcnode-id="3972" instrument_node="">3.1.2.13.3							Side access door elevator car key</span></a></p><span data-dcnode-id="3969" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3966"><a data-dcnode-id="3967" name="1041069"><span data-dcnode-id="3968" instrument_node="">3.1.2.13.4							Electric room keys</span></a></p><span data-dcnode-id="3965" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3962"><a data-dcnode-id="3963" name="1041070"><span data-dcnode-id="3964" instrument_node="">3.1.2.13.5							Fire pump room keys</span></a></p><span data-dcnode-id="3961" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3958"><a data-dcnode-id="3959" name="1041071"><span data-dcnode-id="3960" instrument_node="">3.1.2.13.6							Mechanical room keys</span></a></p><span data-dcnode-id="3957" instrument_node="">
</span><p class="Body-L4" data-dcnode-id="3954"><a data-dcnode-id="3955" name="1041072"><span data-dcnode-id="3956" instrument_node="">3.1.2.13.7							Any master key</span></a></p><span data-dcnode-id="3953" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3950"><a data-dcnode-id="3951" name="1041073"><span data-dcnode-id="3952" instrument_node="">3.1.2.14						As built drawings. Specific types and format of drawings to be determined by the Office of the State Fire Marshal at time of plan review.</span></a></p><span data-dcnode-id="3949" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3946"><a data-dcnode-id="3947" name="1041074"><span data-dcnode-id="3948" instrument_node="">3.1.3				The fire command center shall be separated from the remainder of the building by one-hour construction and equipped with a heating, ventilating and air conditioning system that will prevent smoke laden air from entering the space.</span></a></p><span data-dcnode-id="3945" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3942"><a data-dcnode-id="3943" name="1041075"><span data-dcnode-id="3944" instrument_node="">3.1.4				It is not the intent of this section to require a room dedicated for this purpose, but the area provided must be available for immediate use in case of emergency.</span></a></p><span data-dcnode-id="3941" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3938"><a data-dcnode-id="3939" name="1041076"><span data-dcnode-id="3940" instrument_node="">3.1.5				The room shall be a minimum of 96 square feet with a minimum dimension of 8 feet.</span></a></p><span data-dcnode-id="3937" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3934"><a data-dcnode-id="3935" name="1041077"><span data-dcnode-id="3936" instrument_node="">3.1.6				The fire command room door shall be clearly identified for use by the fire department.</span></a></p><span data-dcnode-id="3933" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3930"><a data-dcnode-id="3931" name="1041078"><span data-dcnode-id="3932" instrument_node="">3.2			Emergency Voice/Alarm Communications and Detection System</span></a></p><span data-dcnode-id="3929" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3926"><a data-dcnode-id="3927" name="1041079"><span data-dcnode-id="3928" instrument_node="">3.2.1				Every high-rise building shall be equipped with a voice alarm, communication and detection system which shall be installed in accordance with the applicable codes and standards listed in Regulation 701 of these Regulations; and approved by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="3925" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3922"><a data-dcnode-id="3923" name="1041080"><span data-dcnode-id="3924" instrument_node="">3.3			Public Address System</span></a></p><span data-dcnode-id="3921" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3918"><a data-dcnode-id="3919" name="1041081"><span data-dcnode-id="3920" instrument_node="">3.3.1				A public address communication system shall be part of the Emergency Voice/Alarm Communications System as required in §3.2 of this Chapter. The system shall be designed to be clearly heard by all occupants of the building and shall operate from the fire command center. It shall be established on a selective or general basis to the following terminal areas:</span></a></p><span data-dcnode-id="3917" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3914"><a data-dcnode-id="3915" name="1041082"><span data-dcnode-id="3916" instrument_node="">3.3.1.1						Elevators</span></a></p><span data-dcnode-id="3913" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3910"><a data-dcnode-id="3911" name="1041083"><span data-dcnode-id="3912" instrument_node="">3.3.1.2						Elevator lobbies</span></a></p><span data-dcnode-id="3909" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3906"><a data-dcnode-id="3907" name="1041084"><span data-dcnode-id="3908" instrument_node="">3.3.1.3						Corridors</span></a></p><span data-dcnode-id="3905" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3902"><a data-dcnode-id="3903" name="1041085"><span data-dcnode-id="3904" instrument_node="">3.3.1.4						Exit stairways</span></a></p><span data-dcnode-id="3901" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3898"><a data-dcnode-id="3899" name="1041086"><span data-dcnode-id="3900" instrument_node="">3.3.1.5						Rooms and tenant spaces exceeding 1,000 square feet in area</span></a></p><span data-dcnode-id="3897" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3894"><a data-dcnode-id="3895" name="1041087"><span data-dcnode-id="3896" instrument_node="">3.3.1.6						Dwelling units and guest rooms or suites.</span></a></p><span data-dcnode-id="3893" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3890"><a data-dcnode-id="3891" name="1041088"><span data-dcnode-id="3892" instrument_node="">3.4			Fire Department Communication System</span></a></p><span data-dcnode-id="3889" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3883"><a data-dcnode-id="3887" name="1041089"><span data-dcnode-id="3888" instrument_node="">3.4.1				A two-way fire department communication system in accordance with the </span></a><span data-dcnode-id="3885" style="font-style: italic"><span data-dcnode-id="3886" instrument_node="">National Fire Alarm Code </span></span><span data-dcnode-id="3884" instrument_node="">(NFPA 72) shall be provided for fire department use.</span></p><span data-dcnode-id="3882" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3879"><a data-dcnode-id="3880" name="1041090"><span data-dcnode-id="3881" instrument_node="">3.4.2				An alternative fire department radio enhancement system installed within the building shall be permitted in lieu of a two-way fire department communications system, when approved by the Office of the State Fire Marshal.</span></a></p><span data-dcnode-id="3878" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3875"><a data-dcnode-id="3876" name="1041091"><span data-dcnode-id="3877" instrument_node="">3.5			Door Operation</span></a></p><span data-dcnode-id="3874" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3871"><a data-dcnode-id="3872" name="1041092"><span data-dcnode-id="3873" instrument_node="">3.5.1				All fire exit stairway doors which are to be locked from the stairway side shall have the capability of being unlocked simultaneously without unlatching upon a signal from the Fire Command Center.</span></a></p><span data-dcnode-id="3870" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3867"><a data-dcnode-id="3868" name="1041093"><span data-dcnode-id="3869" instrument_node="">3.6			Elevators</span></a></p><span data-dcnode-id="3866" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3863"><a data-dcnode-id="3864" name="1041094"><span data-dcnode-id="3865" instrument_node="">3.6.1				In every high-rise building at least one elevator service shall be provided for fire department emergency access to all floors.</span></a></p><span data-dcnode-id="3862" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3859"><a data-dcnode-id="3860" name="1041095"><span data-dcnode-id="3861" instrument_node="">3.6.2				Except for the main entrance level, all elevators shall open into a lobby (which may serve additional elevators) separated from the remainder of the building by a smoke barrier. Janitor closets, chutes, guest or tenant rooms, and service rooms shall not open into the elevator lobby. In addition, the provisions of ANSI Standard A 17.1 shall apply.</span></a></p><span data-dcnode-id="3858" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3855"><a data-dcnode-id="3856" name="1041096"><span data-dcnode-id="3857" instrument_node="">3.6.3				The elevator lobbies shall be permitted to be open to the remainder of the floor in buildings equipped with a mechanical smoke control system that will restrict smoke and hot gases from entering the elevator shaft on the fire floor.</span></a></p><span data-dcnode-id="3854" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3851"><a data-dcnode-id="3852" name="1041097"><span data-dcnode-id="3853" instrument_node="">3.7			Smoke Management Systems</span></a></p><span data-dcnode-id="3850" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3847"><a data-dcnode-id="3848" name="1041098"><span data-dcnode-id="3849" instrument_node="">3.7.1				In every high-rise building a Smoke Management system shall be installed in accordance with NFPA 92 and approved by the Office of the State Fire Marshal. Such system shall provide the following:</span></a></p><span data-dcnode-id="3846" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3843"><a data-dcnode-id="3844" name="1041099"><span data-dcnode-id="3845" instrument_node="">3.7.1.1						Egress stair tower pressurization</span></a></p><span data-dcnode-id="3842" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3839"><a data-dcnode-id="3840" name="1041100"><span data-dcnode-id="3841" instrument_node="">3.7.1.2						Area of refuge pressurization</span></a></p><span data-dcnode-id="3838" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3835"><a data-dcnode-id="3836" name="1041101"><span data-dcnode-id="3837" instrument_node="">3.7.1.3						Horizontal exit passageway pressurization</span></a></p><span data-dcnode-id="3834" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3831"><a data-dcnode-id="3832" name="1041102"><span data-dcnode-id="3833" instrument_node="">3.7.1.4						Fire floor smoke exhaust</span></a></p><span data-dcnode-id="3830" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3827"><a data-dcnode-id="3828" name="1041103"><span data-dcnode-id="3829" instrument_node="">3.7.1.5						Floor above and below fire floor pressurization</span></a></p><span data-dcnode-id="3826" instrument_node="">
</span><p class="Body-L3" data-dcnode-id="3823"><a data-dcnode-id="3824" name="1041104"><span data-dcnode-id="3825" instrument_node="">3.7.1.6						Other criteria as deemed necessary by the Office of the State Fire Marshal for unusual spaces.</span></a></p><span data-dcnode-id="3822" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3818"><a data-dcnode-id="3819" name="1041108"><span data-dcnode-id="3821" instrument_node="">3.7.2				Smoke management system operation/actuation shall be approved by the Office of the State Fire Marshal.</span><img alt="" class="Default" data-dcnode-id="3820" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//regulations.delaware.gov/AdminCode/title1/700/images/702.21.1.9.jpg&amp;raw" style="display: block; left: 0.0pt; top: 0.0pt" width="656"></a></p><span data-dcnode-id="3817" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3814"><a data-dcnode-id="3815" name="1041109"><span data-dcnode-id="3816" instrument_node="">3.8			Standby Power, Light, and Emergency Systems</span></a></p><span data-dcnode-id="3813" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3810"><a data-dcnode-id="3811" name="1041110"><span data-dcnode-id="3812" instrument_node="">3.8.1				In every high-rise building an emergency power supply shall be installed.</span></a></p><span data-dcnode-id="3809" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3806"><a data-dcnode-id="3807" name="1041111"><span data-dcnode-id="3808" instrument_node="">3.8.2				Standby power, light and emergency systems shall comply with the provisions of the Standard for Emergency and Standby Power Systems, NFPA 110, as adopted and/or modified by these Regulations.</span></a></p><span data-dcnode-id="3805" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3802"><a data-dcnode-id="3803" name="1041112"><span data-dcnode-id="3804" instrument_node="">3.8.3				Fuel Supply. An on-premises fuel supply sufficient for not less than two hours full demand operation of the system shall be provided.</span></a></p><span data-dcnode-id="3801" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3798"><a data-dcnode-id="3799" name="1041113"><span data-dcnode-id="3800" instrument_node="">3.8.4				Generating Capacity. The standby system shall have a capacity and rating that will supply all equipment required to be operational at the same time. The generating capacity need not be sized to operate all the connected electrical equipment simultaneously.</span></a></p><span data-dcnode-id="3797" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3791"><a data-dcnode-id="3795" name="1041114"><span data-dcnode-id="3796" instrument_node="">3.8.5				All power, lighting, signal, and communication systems required by this Regulation shall automatically transfer to a standby source. The standby power system shall be connected to all systems listed in the NFPA </span></a><span data-dcnode-id="3793" style="font-style: italic"><span data-dcnode-id="3794" instrument_node="">101 Life Safety Code</span></span><span data-dcnode-id="3792" instrument_node="">.</span></p><span data-dcnode-id="3790" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3787"><a data-dcnode-id="3788" name="1041115"><span data-dcnode-id="3789" instrument_node="">3.9			Emergency Systems</span></a></p><span data-dcnode-id="3786" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3783"><a data-dcnode-id="3784" name="1041116"><span data-dcnode-id="3785" instrument_node="">3.9.1				Exit signs, exit illumination, and elevator car lighting are classified as emergency systems and shall operate within ten seconds of failure of the normal power supply and must also be connected to the standby source.</span></a></p><span data-dcnode-id="3782" instrument_node="">
</span><p class="Body-L2" data-dcnode-id="3779"><a data-dcnode-id="3780" name="1041117"><span data-dcnode-id="3781" instrument_node="">3.9.2				All required lighting, smoke management pressurization, electrically powered fire pumps and at least one elevator shall be connected to the standby power source. Elevators shall be provided with a selective load switch to allow transfer of power to each elevator. This will permit each elevator to be returned to the lobby and placed out of service except for fire department service.</span></a></p><span data-dcnode-id="3778" instrument_node="">
</span><p class="Body-L1" data-dcnode-id="3775"><a data-dcnode-id="3776" name="1041118"><span data-dcnode-id="3777" instrument_node="">3.10			Areas of Refuge. Areas of refuge shall be provided in accordance with the requirements of Regulation 702, Chapter 3.</span></a></p><span data-dcnode-id="3774" instrument_node="">
</span><p class="Citation" data-dcnode-id="3771"><a data-dcnode-id="3772" name="1041119"><span data-dcnode-id="3773" instrument_node="">13 DE Reg. 629 (11/01/09)</span></a></p><span data-dcnode-id="3770" instrument_node="">
</span><p class="Citation" data-dcnode-id="3767"><a data-dcnode-id="3768" name="1042581"><span data-dcnode-id="3769" instrument_node="">19 DE Reg. 843 (03/01/16)</span></a></p><span data-dcnode-id="3766" instrument_node="">
</span><p class="Citation" data-dcnode-id="3763"><a data-dcnode-id="3764" name="1043662"><span data-dcnode-id="3765" instrument_node="">25 DE Reg. 74 (07/01/21)</span></a></p><span data-dcnode-id="3762" instrument_node="">
</span><p class="Body body-test" data-dcnode-id="3759"><a data-dcnode-id="3760" name="1041120"><span data-dcnode-id="3761" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="3758" instrument_node="">
</span><p class="Section section" data-dcnode-id="3755"><a data-dcnode-id="3756" name="1041121"><span data-dcnode-id="3757" instrument_node="">4.0	Large Area Buildings.</span></a></p><span data-dcnode-id="3754" instrument_node="">
