de-id="6009" instrument_node="">Whenever death results in any fire incident identified to be INTENTIONAL in nature, the MOTIVE</span><br data-dcnode-id="6008"><span data-dcnode-id="6007" instrument_node="">for the commission of arson must immediately established in order to ascertain whether a crime of</span><br data-dcnode-id="6006"><span data-dcnode-id="6005" instrument_node="">MURDER qualifies. Murder cases committed thru the burning of one’s property may be referred to the</span><br data-dcnode-id="6004"><span data-dcnode-id="6003" instrument_node="">Philippine National Police for proper disposition. However, the FAI should still pursue the filing of the</span><br data-dcnode-id="6002"><span data-dcnode-id="6001" instrument_node="">arson case.</span><br data-dcnode-id="6000"><span data-dcnode-id="5999" instrument_node="">The FAI can immediately effect arrest on any suspect/s once such person is / are POSITIVELY</span><br data-dcnode-id="5998"><span data-dcnode-id="5997" instrument_node="">IDENTIFIED by a complaint or witnesses to be the one who perpetrated the commission of the crime</span><br data-dcnode-id="5996"><span data-dcnode-id="5995" instrument_node="">during the course of actual investigation, most specifically during the event of the actual fire incident,</span><br data-dcnode-id="5994"><span data-dcnode-id="5993" instrument_node="">and in accordance with the law.</span><br data-dcnode-id="5992"><span data-dcnode-id="5991" instrument_node="">The following rights of the arrested suspect shall be observed by the FAI during CUSTODIAL</span><br data-dcnode-id="5990"><span data-dcnode-id="5989" instrument_node="">INVESTIGATION as embodied under the provisions of R.A. 7438. The suspect shall be apprised of his</span><br data-dcnode-id="5988"><span data-dcnode-id="5987" instrument_node="">constitutional rights in accordance to Section 12, Article III, 1987 Constitution, to wit:</span><br data-dcnode-id="5986"><span data-dcnode-id="5985" instrument_node="">a. Any person under investigation for the commission of an offense shall have the right to</span><br data-dcnode-id="5984"><span data-dcnode-id="5983" instrument_node="">be informed of his right to remain silent;</span><br data-dcnode-id="5982"><span data-dcnode-id="5981" instrument_node="">b. To have competent and independent counsel preferably of his own choice;</span><br data-dcnode-id="5980"><span data-dcnode-id="5979" instrument_node="">c. If the person cannot afford to the services of counsel, he must be provided with one;</span><br data-dcnode-id="5978"><span data-dcnode-id="5977" instrument_node="">d. These rights cannot be waived except in writing and in the presence of a counsel.</span><br data-dcnode-id="5976"><span data-dcnode-id="5975" instrument_node="">All suspects, once arrested / invited by the FAI and determined to have the probability to</span><br data-dcnode-id="5974"><span data-dcnode-id="5973" instrument_node="">commit the crime must immediately be INQUEST to the city / municipal prosecutor before the lapse of</span><br data-dcnode-id="5972"><span data-dcnode-id="5971" instrument_node="">thirty six (36) hours or the legal regulated period.</span><br data-dcnode-id="5970"><span data-dcnode-id="5969" instrument_node="">The following are the special / supplemental guidelines for FAI in conducting arson investigation</span><br data-dcnode-id="5968"><span data-dcnode-id="5967" instrument_node="">and filing of complaint procedures:</span><br data-dcnode-id="5966"><span data-dcnode-id="5965" instrument_node="">- Arson is established by proving the corpus delicti, usually in the form of CIRCUMSTANCIAL</span><br data-dcnode-id="5964"><span data-dcnode-id="5963" instrument_node="">EVIDENCE such as the criminal agency, meaning the substance used, like gasoline, kerosene, or other</span><br data-dcnode-id="5962"><span data-dcnode-id="5961" instrument_node="">combustible materials which caused the fire. It can also be in the form of electrical wires, mechanical,</span><br data-dcnode-id="5960"><span data-dcnode-id="5959" instrument_node="">chemical or electronic contrivance designed to start a fire; or ashes or traces of such objects which are</span><br data-dcnode-id="5958"><span data-dcnode-id="5957" instrument_node="">ffound in the ruins of the burned premises.</span><br data-dcnode-id="5956"><span data-dcnode-id="5955" instrument_node="">- If the crime of ARSON was employed by the offender as a means to kill the offended party, the</span><br data-dcnode-id="5954"><span data-dcnode-id="5953" instrument_node="">crime committed is MURDER. The burning of the property as the MEANS to kill the victim is what is</span><br data-dcnode-id="5952"><span data-dcnode-id="5951" instrument_node="">contemplated by the word “fire” under Article 248 of the Revised Penal Code which qualifies the crime</span><br data-dcnode-id="5950"><span data-dcnode-id="5949" instrument_node="">to MURDER.</span><br data-dcnode-id="5948"><span data-dcnode-id="5947" instrument_node="">- When the burning of the property was done by the offender only to cause damage but the</span><br data-dcnode-id="5946"><span data-dcnode-id="5945" instrument_node="">ARSON resulted to the DEATH of the person, the crime committed is still ARSON because the death of</span><br data-dcnode-id="5944"><span data-dcnode-id="5943" instrument_node="">the victim is a mere CONSEQUENCE and not the INTENTION of the offender.</span><br data-dcnode-id="5942"><span data-dcnode-id="5941" instrument_node="">- There is no special complex crime of ARSON WITH HOMICIDE. What matters in resolving cases</span><br data-dcnode-id="5940"><span data-dcnode-id="5939" instrument_node="">involving arson is the CRIMINAL INTENT of the offender.</span><br data-dcnode-id="5938"><span data-dcnode-id="5937" instrument_node="">- When the burning of one’s property results from reckless imprudence and it leads to serious</span><br data-dcnode-id="5936"><span data-dcnode-id="5935" instrument_node="">physical injuries and / or damage to property of another, the penalty to be imposed shall not be for the</span><br data-dcnode-id="5934"><span data-dcnode-id="5933" instrument_node="">crime of arson under P.D. 1613 but rather, the penalty shall be based on Article 365 of the Revised Penal</span><br data-dcnode-id="5932"><span data-dcnode-id="5931" instrument_node="">Code as a felony committed by means of culpa – imprudence and negligence. (e.g. Reckless Imprudence</span><br data-dcnode-id="5930"><span data-dcnode-id="5929" instrument_node="">Resulted to Damage to Property / Reckless Imprudence Resulted to Serious Physical Injuries)</span><br data-dcnode-id="5928"><span data-dcnode-id="5927" instrument_node="">IX. GENERAL RESPONSIBILITIES</span><br data-dcnode-id="5926"><span data-dcnode-id="5925" instrument_node="">Section 1. – The respective Regional Directors for Fire Protection / District and Provincial Fire</span><br data-dcnode-id="5924"><span data-dcnode-id="5923" instrument_node="">Marshals / City and Municipal Fire Marshals shall supervise the proper implementation of this Standard</span><br data-dcnode-id="5922"><span data-dcnode-id="5921" instrument_node="">Operating Procedure to ensure that their subordinates will comply and respond effectively to the</span><br data-dcnode-id="5920"><span data-dcnode-id="5919" instrument_node="">requirements as stipulated in this Standard Operating Procedure.</span><br data-dcnode-id="5918"><span data-dcnode-id="5917" instrument_node="">Section 2. – City / Municipal Fire Marshals shall seek assistance from their respective District /</span><br data-dcnode-id="5916"><span data-dcnode-id="5915" instrument_node="">Provincial / Regional Investigation and Intelligence Offices or at the office of the Investigation and</span><br data-dcnode-id="5914"><span data-dcnode-id="5913" instrument_node="">Intelligence Division – BFP National Headquarters, if deemed needed.</span><br data-dcnode-id="5912"><span data-dcnode-id="5911" instrument_node="">Section 3. – As the highest fire and arson investigating agency of the Bureau of Fire Protection,</span><br data-dcnode-id="5910"><span data-dcnode-id="5909" instrument_node="">the Office of the Investigation and Intelligence Division – BFP National Headquarters shall have the</span><br data-dcnode-id="5908"><span data-dcnode-id="5907" instrument_node="">authority to monitor, evaluate, conduct of arbitrary verification to the fire cases and investigation</span><br data-dcnode-id="5906"><span data-dcnode-id="5905" instrument_node="">procedures conducted by the lower investigating units of the BFP. The aforementioned office may also</span><br data-dcnode-id="5904"><span data-dcnode-id="5903" instrument_node="">be sought to provide technical knowledge, assistance, suggestions and recommendations to lower</span><br data-dcnode-id="5902"><span data-dcnode-id="5901" instrument_node="">investigating units of the BFP.</span><br data-dcnode-id="5900"><span data-dcnode-id="5899" instrument_node="">X. RESCISION CLAUSE</span><br data-dcnode-id="5898"><span data-dcnode-id="5897" instrument_node="">All publications, memoranda and SOPs in which by any form or part found to be inconsistent</span><br data-dcnode-id="5896"><span data-dcnode-id="5895" instrument_node="">with this new Standard Operating Procedures are hereby rescinded.</span><br data-dcnode-id="5894"><span data-dcnode-id="5893" instrument_node="">XI. ADMINISTRATIVE SANCTION / PENALTY</span><br data-dcnode-id="5892"><span data-dcnode-id="5891" instrument_node="">All BFP personnel found violating any provision of this Standard Operating Procedure shall be</span><br data-dcnode-id="5890"><span data-dcnode-id="5889" instrument_node="">subjected to administrative action for neglect of duty / any other related charges (criminal), and if found</span><br data-dcnode-id="5888"><span data-dcnode-id="5887" instrument_node="">guilty, shall be immediately relieved from post.</span><br data-dcnode-id="5886"><span data-dcnode-id="5885" instrument_node="">Administrative sanctions shall be governed by the R.A. 6713, otherwise known as The Code of</span><br data-dcnode-id="5884"><span data-dcnode-id="5883" instrument_node="">Ethics and Professional Standards for Government Employees, other pertinent Civil Service Laws, Office</span><br data-dcnode-id="5882"><span data-dcnode-id="5881" instrument_node="">Rules, Regulations and Policies, without prejudice of filing criminal charges if evidence so warrants.</span><br data-dcnode-id="5880"><span data-dcnode-id="5879" instrument_node="">XII. SEPARABILITY CLAUSE</span><br data-dcnode-id="5878"><span data-dcnode-id="5877" instrument_node="">If for any reason, any part of this Standard Operating Procedure is declared as contrary to law,</span><br data-dcnode-id="5876"><span data-dcnode-id="5875" instrument_node="">the remainder hereof not affected shall continue to remain in force and effect.</span><br data-dcnode-id="5874"><span data-dcnode-id="5873" instrument_node="">SIGNED, this 18th day of September 2008 at the Bureau of Fire Protection National</span><br data-dcnode-id="5872"><span data-dcnode-id="5871" instrument_node="">Headquarters, Union Square Condominium, Nr. 145, 15th Avenue, Cubao, Quezon City, Philippines.</span><br data-dcnode-id="5870"><span data-dcnode-id="5869" instrument_node="">THIS STANDARD OPERATING PROCEDURE SHALL TAKE EFFECT IMMEDIATELY.</span><p data-dcnode-id="5868"></p><p data-dcnode-id="5867"></p><h2 data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">       Administrative Matters (10%)</span></h2><br data-dcnode-id="5864"><span data-dcnode-id="5863" instrument_node="">RA 6975 and its IRR</span><br data-dcnode-id="5862"><span data-dcnode-id="5861" instrument_node="">The Lawphil Project - Arellano Law Foundation</span><br data-dcnode-id="5860"><span data-dcnode-id="5859" instrument_node="">REPUBLIC ACT No. 6975 December 13, 1990</span><br data-dcnode-id="5858"><span data-dcnode-id="5857" instrument_node="">REPUBLIC ACT No. 6975</span><br data-dcnode-id="5856"><span data-dcnode-id="5855" instrument_node="">AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED</span><br data-dcnode-id="5854"><span data-dcnode-id="5853" instrument_node="">fDEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER</span><br data-dcnode-id="5852"><span data-dcnode-id="5851" instrument_node="">PURPOSES</span><br data-dcnode-id="5850"><span data-dcnode-id="5849" instrument_node="">Section 1. Title of the Act. ? This Act shall be known as the "Department of the Interior and</span><br data-dcnode-id="5848"><span data-dcnode-id="5847" instrument_node="">Local Government Act of 1990."</span><br data-dcnode-id="5846"><span data-dcnode-id="5845" instrument_node="">Section 2. Declaration of Policy. ? It is hereby declared to be the policy of the State to promote</span><br data-dcnode-id="5844"><span data-dcnode-id="5843" instrument_node="">peace and order, ensure public safety and further strengthen local government capability aimed</span><br data-dcnode-id="5842"><span data-dcnode-id="5841" instrument_node="">towards the effective delivery of the basic services to the citizenry through the establishment of a</span><br data-dcnode-id="5840"><span data-dcnode-id="5839" instrument_node="">highly efficient and competent police force that is national in scope and civilian in character.</span><br data-dcnode-id="5838"><span data-dcnode-id="5837" instrument_node="">Towards this end, the State shall bolster a system of coordination and cooperation among the</span><br data-dcnode-id="5836"><span data-dcnode-id="5835" instrument_node="">citizenry, local executives and the integrated law enforcement and public safety agencies</span><br data-dcnode-id="5834"><span data-dcnode-id="5833" instrument_node="">created under this Act.</span><br data-dcnode-id="5832"><span data-dcnode-id="5831" instrument_node="">The police force shall be organized, trained and equipped primarily for the performance of police</span><br data-dcnode-id="5830"><span data-dcnode-id="5829" instrument_node="">functions. Its national scope and civilian character shall be paramount. No element of the police</span><br data-dcnode-id="5828"><span data-dcnode-id="5827" instrument_node="">force shall be military nor shall any position thereof be occupied by active members of the</span><br data-dcnode-id="5826"><span data-dcnode-id="5825" instrument_node="">Armed Forces of the Philippines.</span><br data-dcnode-id="5824"><span data-dcnode-id="5823" instrument_node="">Section 3. Promulgation of Comprehensive Policies by Congress. ? Subject to the limitations</span><br data-dcnode-id="5822"><span data-dcnode-id="5821" instrument_node="">provided in the Constitution, the President shall recommend to Congress the promulgation of</span><br data-dcnode-id="5820"><span data-dcnode-id="5819" instrument_node="">policies on public order and safety to protect the citizenry from all forms of lawlessness,</span><br data-dcnode-id="5818"><span data-dcnode-id="5817" instrument_node="">criminality and other threats to peace and order.</span><br data-dcnode-id="5816"><span data-dcnode-id="5815" instrument_node="">CHAPTER I</span><br data-dcnode-id="5814"><span data-dcnode-id="5813" instrument_node="">THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT</span><br data-dcnode-id="5812"><span data-dcnode-id="5811" instrument_node="">Section 4. The Department of the Interior and Local Government. ? To carry out the policies and</span><br data-dcnode-id="5810"><span data-dcnode-id="5809" instrument_node="">purposes of this Act, the Department of Local Government is hereby reorganized into the</span><br data-dcnode-id="5808"><span data-dcnode-id="5807" instrument_node="">Department of the Interior and Local Government, hereinafter referred to as the Department, in</span><br data-dcnode-id="5806"><span data-dcnode-id="5805" instrument_node="">accordance with the provisions of this Act.</span><br data-dcnode-id="5804"><span data-dcnode-id="5803" instrument_node="">Section 5. Powers and Functions of the Department. ? In furtherance of the objectives of this</span><br data-dcnode-id="5802"><span data-dcnode-id="5801" instrument_node="">Act, the Department shall continue to exercise the powers and functions of the Department of</span><br data-dcnode-id="5800"><span data-dcnode-id="5799" instrument_node="">Local Government in addition to the powers and functions as herein provided.</span><br data-dcnode-id="5798"><span data-dcnode-id="5797" instrument_node="">Section 6. Organization. ? The Department shall consist of the Department Proper, the existing</span><br data-dcnode-id="5796"><span data-dcnode-id="5795" instrument_node="">bureaus and offices of the Department of Local Government, the National Police Commission,</span><br data-dcnode-id="5794"><span data-dcnode-id="5793" instrument_node="">the Philippine Public Safety College, and the following bureaus: the Philippine National Police,</span><br data-dcnode-id="5792"><span data-dcnode-id="5791" instrument_node="">the Bureau of Fire Protection, and the Bureau of Jail Management and Penology.</span><br data-dcnode-id="5790"><span data-dcnode-id="5789" instrument_node="">Section 7. Department Proper. ? The Department Proper shall consist of the existing staff</span><br data-dcnode-id="5788"><span data-dcnode-id="5787" instrument_node="">services as provided for under Executive Order No. 262 and the following offices:</span><br data-dcnode-id="5786"><span data-dcnode-id="5785" instrument_node="">(a) Office of the Secretary. ? The office of the Secretary shall consist of the Secretary and</span><br data-dcnode-id="5784"><span data-dcnode-id="5783" instrument_node="">his immediate staff; and</span><br data-dcnode-id="5782"><span data-dcnode-id="5781" instrument_node="">(b) Office of the Undersecretaries and Assistant Secretaries. ? The Secretary shall be</span><br data-dcnode-id="5780"><span data-dcnode-id="5779" instrument_node="">Page 1 of 27 R.A. 6975</span><br data-dcnode-id="5778"><span data-dcnode-id="5777" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5776"><span data-dcnode-id="5775" instrument_node="">assisted by two (2) Undersecretaries, one (1) for local government and the other for peace</span><br data-dcnode-id="5774"><span data-dcnode-id="5773" instrument_node="">and order, at least one (1) of whom must belong to the career executive service, and three</span><br data-dcnode-id="5772"><span data-dcnode-id="5771" instrument_node="">(3) career Assistant Secretaries.</span><br data-dcnode-id="5770"><span data-dcnode-id="5769" instrument_node="">Section 8. Head of Department. ? The head of the Department. ? The head of the Department,</span><br data-dcnode-id="5768"><span data-dcnode-id="5767" instrument_node="">hereinafter referred to as the Secretary, shall also be the ex-officio Chairman of the National</span><br data-dcnode-id="5766"><span data-dcnode-id="5765" instrument_node="">Police Commission and shall be appointed by the President subject to confirmation of the</span><br data-dcnode-id="5764"><span data-dcnode-id="5763" instrument_node="">Commission on Appointments. No retired or resigned military officer or police official may be</span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node="">appointed as Secretary within one (1) year from the date of his retirement or resignation.</span><br data-dcnode-id="5760"><span data-dcnode-id="5759" instrument_node="">Section 9. General Powers, Term of Office and Compensation of the Secretary. ? The authority</span><br data-dcnode-id="5758"><span data-dcnode-id="5757" instrument_node="">and responsibility for the exercise of the Department's powers and functions shall be vested in</span><br data-dcnode-id="5756"><span data-dcnode-id="5755" instrument_node="">the Secretary, who shall hold office at the pleasure of the President and shall receive the</span><br data-dcnode-id="5754"><span data-dcnode-id="5753" instrument_node="">compensation, allowances and other emoluments to which heads of departments are entitled.</span><br data-dcnode-id="5752"><span data-dcnode-id="5751" instrument_node="">Section 10. Specific Powers and Functions of the Secretary. ? In addition to his powers and</span><br data-dcnode-id="5750"><span data-dcnode-id="5749" instrument_node="">functions as provided in Executive Order No. 262, the Secretary as Department head shall have</span><br data-dcnode-id="5748"><span data-dcnode-id="5747" instrument_node="">the following powers and functions:</span><br data-dcnode-id="5746"><span data-dcnode-id="5745" instrument_node="">f(a) Prepare and submit periodic reports, including a Quarterly Anti-Crime Operations</span><br data-dcnode-id="5744"><span data-dcnode-id="5743" instrument_node="">Report and such other reports as the President and Congress may require;</span><br data-dcnode-id="5742"><span data-dcnode-id="5741" instrument_node="">(b) Act as Chairman and Presiding Officer of the National Police Commission; and</span><br data-dcnode-id="5740"><span data-dcnode-id="5739" instrument_node="">(c) Delegate authority to exercise any substantive or administrative function to the</span><br data-dcnode-id="5738"><span data-dcnode-id="5737" instrument_node="">members of the National Police Commission or other officers of rank within the</span><br data-dcnode-id="5736"><span data-dcnode-id="5735" instrument_node="">Department.</span><br data-dcnode-id="5734"><span data-dcnode-id="5733" instrument_node="">Section 11. Regional Offices. ? The Department shall establish, operate and maintain a regional</span><br data-dcnode-id="5732"><span data-dcnode-id="5731" instrument_node="">office in each of the administrative regions of the country to implement the policies and programs</span><br data-dcnode-id="5730"><span data-dcnode-id="5729" instrument_node="">of the Department. Each regional office shall be headed by a regional director to be assisted by</span><br data-dcnode-id="5728"><span data-dcnode-id="5727" instrument_node="">two (2) assistant regional directors: one (1) for jail management and penology and another for</span><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">fire protection in addition to the present assistant regional directors of the Department of Local</span><br data-dcnode-id="5724"><span data-dcnode-id="5723" instrument_node="">Government.</span><br data-dcnode-id="5722"><span data-dcnode-id="5721" instrument_node="">Section 12. Relationship of the Department with the Department of National Defense. ? During</span><br data-dcnode-id="5720"><span data-dcnode-id="5719" instrument_node="">a period of twenty-four (24) months from the effectivity of this Act, the Armed Forces of the</span><br data-dcnode-id="5718"><span data-dcnode-id="5717" instrument_node="">Philippines (AFP) shall continue its present role of preserving the internal and external security</span><br data-dcnode-id="5716"><span data-dcnode-id="5715" instrument_node="">of the State: Provided, That said period may be extended by the President, if he finds it</span><br data-dcnode-id="5714"><span data-dcnode-id="5713" instrument_node="">justifiable, for another period not exceeding twenty-four (24) months, after which, the</span><br data-dcnode-id="5712"><span data-dcnode-id="5711" instrument_node="">Department shall automatically take over from the AFP the primary role of preserving internal</span><br data-dcnode-id="5710"><span data-dcnode-id="5709" instrument_node="">security, leaving to the AFP its primary role of preserving external security. However, even after</span><br data-dcnode-id="5708"><span data-dcnode-id="5707" instrument_node="">the Department has assumed primary responsibility on matters affecting internal security,</span><br data-dcnode-id="5706"><span data-dcnode-id="5705" instrument_node="">including the suppression of insurgency, and there are serious threats to national security and</span><br data-dcnode-id="5704"><span data-dcnode-id="5703" instrument_node="">public order, such as where insurgents have gained considerable foothold in the community</span><br data-dcnode-id="5702"><span data-dcnode-id="5701" instrument_node="">thereby necessitating the employment of bigger tactical forces and the utilization of higher</span><br data-dcnode-id="5700"><span data-dcnode-id="5699" instrument_node="">caliber armaments and better armored vehicles, the President may, upon recommendation of</span><br data-dcnode-id="5698"><span data-dcnode-id="5697" instrument_node="">the peace and order council, call upon the Armed Forces of the Philippines to assume the</span><br data-dcnode-id="5696"><span data-dcnode-id="5695" instrument_node="">primary role and the Philippine National Police (PNP) to play the supportive role in the area</span><br data-dcnode-id="5694"><span data-dcnode-id="5693" instrument_node="">concerned.</span><br data-dcnode-id="5692"><span data-dcnode-id="5691" instrument_node="">In times of national emergency, all elements of the PNP, the Bureau of Fire Protection, and the</span><br data-dcnode-id="5690"><span data-dcnode-id="5689" instrument_node="">Bureau of Jail Management and Penology shall, upon direction of the President, assist the</span><br data-dcnode-id="5688"><span data-dcnode-id="5687" instrument_node="">Armed Forces of the Philippines in meeting the national emergency.</span><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">Page 2 of 27 R.A. 6975</span><br data-dcnode-id="5684"><span data-dcnode-id="5683" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5682"><span data-dcnode-id="5681" instrument_node="">The complementary relationship between the Department of the Interior and Local Government</span><br data-dcnode-id="5680"><span data-dcnode-id="5679" instrument_node="">and the Department of National Defense in any of the preceding eventualities shall be jointly</span><br data-dcnode-id="5678"><span data-dcnode-id="5677" instrument_node="">prescribed by their respective Secretaries in a memorandum of agreement that shall thereafter</span><br data-dcnode-id="5676"><span data-dcnode-id="5675" instrument_node="">be published and implemented.</span><br data-dcnode-id="5674"><span data-dcnode-id="5673" instrument_node="">CHAPTER II</span><br data-dcnode-id="5672"><span data-dcnode-id="5671" instrument_node="">THE NATIONAL POLICE COMMISSION</span><br data-dcnode-id="5670"><span data-dcnode-id="5669" instrument_node="">Section 13. Creation and Composition. ? A National Police Commission, hereinafter referred to</span><br data-dcnode-id="5668"><span data-dcnode-id="5667" instrument_node="">as the Commission, is hereby created for the purpose of effectively discharging the functions</span><br data-dcnode-id="5666"><span data-dcnode-id="5665" instrument_node="">prescribed in the Constitution and provided in this Act. The Commission shall be a collegial body</span><br data-dcnode-id="5664"><span data-dcnode-id="5663" instrument_node="">within the Department. It shall be composed of a Chairman and four (4) regular commissioners,</span><br data-dcnode-id="5662"><span data-dcnode-id="5661" instrument_node="">one (1) of whom shall be designated as Vice-Chairman by the President. The Secretary of the</span><br data-dcnode-id="5660"><span data-dcnode-id="5659" instrument_node="">Department shall be the ex-officio Chairman of the Commission, while the Vice-Chairman shall</span><br data-dcnode-id="5658"><span data-dcnode-id="5657" instrument_node="">act as the executive officer of the Commission.</span><br data-dcnode-id="5656"><span data-dcnode-id="5655" instrument_node="">Section 14. Powers and Functions of the Commission. ? The Commission shall exercise the</span><br data-dcnode-id="5654"><span data-dcnode-id="5653" instrument_node="">following powers and functions:</span><br data-dcnode-id="5652"><span data-dcnode-id="5651" instrument_node="">(a) Exercise administrative control over the Philippine National Police;</span><br data-dcnode-id="5650"><span data-dcnode-id="5649" instrument_node="">(b) Advise the President on all matters involving police functions and administration;</span><br data-dcnode-id="5648"><span data-dcnode-id="5647" instrument_node="">(c) Foster and develop policies and promulgate rules and regulations, standards and</span><br data-dcnode-id="5646"><span data-dcnode-id="5645" instrument_node="">procedures to improve police services based on sound professional concepts and</span><br data-dcnode-id="5644"><span data-dcnode-id="5643" instrument_node="">principles;</span><br data-dcnode-id="5642"><span data-dcnode-id="5641" instrument_node="">(d) Examine and audit, and thereafter establish the standards for such purposes on a</span><br data-dcnode-id="5640"><span data-dcnode-id="5639" instrument_node="">continuing basis, the performance, activities, and facilities of all police agencies</span><br data-dcnode-id="5638"><span data-dcnode-id="5637" instrument_node="">fthroughout the country;</span><br data-dcnode-id="5636"><span data-dcnode-id="5635" instrument_node="">(e) Prepare a police manual prescribing rules and regulations for efficient organization,</span><br data-dcnode-id="5634"><span data-dcnode-id="5633" instrument_node="">administration, and operation, including recruitment, selection, promotion and retirement;</span><br data-dcnode-id="5632"><span data-dcnode-id="5631" instrument_node="">(f) Establish a system of uniform crime reporting;</span><br data-dcnode-id="5630"><span data-dcnode-id="5629" instrument_node="">(g) Conduct surveys and compile statistical data for the proper evaluation of the efficiency</span><br data-dcnode-id="5628"><span data-dcnode-id="5627" instrument_node="">and effectiveness of all police units in the country;</span><br data-dcnode-id="5626"><span data-dcnode-id="5625" instrument_node="">(h) Render to the President and to Congress an annual report on its activities and</span><br data-dcnode-id="5624"><span data-dcnode-id="5623" instrument_node="">accomplishments during the thirty (30) days after the end of the calendar year, which shall</span><br data-dcnode-id="5622"><span data-dcnode-id="5621" instrument_node="">include an appraisal of the conditions obtaining in the organization and administration of</span><br data-dcnode-id="5620"><span data-dcnode-id="5619" instrument_node="">police agencies in the municipalities, cities and provinces throughout the country, and</span><br data-dcnode-id="5618"><span data-dcnode-id="5617" instrument_node="">recommendations for appropriate remedial legislation;</span><br data-dcnode-id="5616"><span data-dcnode-id="5615" instrument_node="">(i) Approve or modify plans and programs on education and training, logistical</span><br data-dcnode-id="5614"><span data-dcnode-id="5613" instrument_node="">requirements, communications, records, information systems, crime laboratory, crime</span><br data-dcnode-id="5612"><span data-dcnode-id="5611" instrument_node="">prevention and crime reporting;</span><br data-dcnode-id="5610"><span data-dcnode-id="5609" instrument_node="">(j) Affirm, reverse or modify, through the National Appellate Board, personnel disciplinary</span><br data-dcnode-id="5608"><span data-dcnode-id="5607" instrument_node="">actions involving demotion or dismissal from the service imposed upon members of the</span><br data-dcnode-id="5606"><span data-dcnode-id="5605" instrument_node="">Philippine National Police by the Chief of the Philippine National Police;</span><br data-dcnode-id="5604"><span data-dcnode-id="5603" instrument_node="">(k) Exercise appellate jurisdiction through the regional appellate boards over</span><br data-dcnode-id="5602"><span data-dcnode-id="5601" instrument_node="">Page 3 of 27 R.A. 6975</span><br data-dcnode-id="5600"><span data-dcnode-id="5599" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5598"><span data-dcnode-id="5597" instrument_node="">administrative cases against policemen and over decisions on claims for police benefits;</span><br data-dcnode-id="5596"><span data-dcnode-id="5595" instrument_node="">(l) Recommend to the President, through the Secretary, within sixty (60) days before the</span><br data-dcnode-id="5594"><span data-dcnode-id="5593" instrument_node="">commencement of each calendar year, a crime prevention;</span><br data-dcnode-id="5592"><span data-dcnode-id="5591" instrument_node="">(m) Prescribe minimum standards for arms, equipment, and uniforms and, after</span><br data-dcnode-id="5590"><span data-dcnode-id="5589" instrument_node="">consultation with the Philippine Heraldy Commission, for insignia of ranks, awards and</span><br data-dcnode-id="5588"><span data-dcnode-id="5587" instrument_node="">medals of honor;</span><br data-dcnode-id="5586"><span data-dcnode-id="5585" instrument_node="">(n) Issue subpoena and subpoena duces tecum in matters pertaining to the discharge of</span><br data-dcnode-id="5584"><span data-dcnode-id="5583" instrument_node="">its own powers and duties, and designate who among its personnel can issue such</span><br data-dcnode-id="5582"><span data-dcnode-id="5581" instrument_node="">processes and administer oaths in connection therewith; and</span><br data-dcnode-id="5580"><span data-dcnode-id="5579" instrument_node="">(o) Perform such other functions necessary to carry out the provisions of this Act and as</span><br data-dcnode-id="5578"><span data-dcnode-id="5577" instrument_node="">the President may direct.</span><br data-dcnode-id="5576"><span data-dcnode-id="5575" instrument_node="">Section 15. Qualifications. ? No person shall be appointed regular member of the Commission</span><br data-dcnode-id="5574"><span data-dcnode-id="5573" instrument_node="">unless:</span><br data-dcnode-id="5572"><span data-dcnode-id="5571" instrument_node="">(a) He is at least thirty-five (35) years of age;</span><br data-dcnode-id="5570"><span data-dcnode-id="5569" instrument_node="">(b) A member of the Philippine Bar or a holder of a master's degree in public</span><br data-dcnode-id="5568"><span data-dcnode-id="5567" instrument_node="">administration, business administration, management, sociology, criminology, law</span><br data-dcnode-id="5566"><span data-dcnode-id="5565" instrument_node="">enforcement, national security administration, defense studies, and other related</span><br data-dcnode-id="5564"><span data-dcnode-id="5563" instrument_node="">discipline; and</span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">(c) Has had experience in law enforcement work for at least five (5) years .</span><br data-dcnode-id="5560"><span data-dcnode-id="5559" instrument_node="">Section 16. Term of Office. ? The four (4) regular and full-time Commissioners shall be</span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">appointed by the President upon the recommendation of the Secretary. Of the first four (4)</span><br data-dcnode-id="5556"><span data-dcnode-id="5555" instrument_node="">commissioners to be appointed, two (2) commissioners shall serve for six (6) years and the two</span><br data-dcnode-id="5554"><span data-dcnode-id="5553" instrument_node="">(2) other commissioners for four (4) years. All subsequent appointments shall be for a period of</span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">six (6) years each, without reappointment or extension.</span><br data-dcnode-id="5550"><span data-dcnode-id="5549" instrument_node="">Section 17. Temporary or Permanent Incapacity of the Chairman. ? In case of absence due to</span><br data-dcnode-id="5548"><span data-dcnode-id="5547" instrument_node="">temporary or permanent incapacity of the Chairman, the President shall designate an Acting</span><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">Chairman. In case of death or permanent incapacity or disqualification of the Chairman, the</span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">Acting Chairman shall also act as such until a new Chairman shall have been appointed and</span><br data-dcnode-id="5542"><span data-dcnode-id="5541" instrument_node="">qualified.</span><br data-dcnode-id="5540"><span data-dcnode-id="5539" instrument_node="">Section 18. Removal from Office. ? The members of the Commission may be removed from</span><br data-dcnode-id="5538"><span data-dcnode-id="5537" instrument_node="">office for cause. All vacancies in the Commission, except through expiration of term, shall be</span><br data-dcnode-id="5536"><span data-dcnode-id="5535" instrument_node="">filled up for the unexpired term only: Provided, That any person who shall be appointed in this</span><br data-dcnode-id="5534"><span data-dcnode-id="5533" instrument_node="">case shall be eligible for regular appointment for another full term.</span><br data-dcnode-id="5532"><span data-dcnode-id="5531" instrument_node="">Section 19. Prohibitions. ? The Chairman and members of the Commission shall not engage in</span><br data-dcnode-id="5530"><span data-dcnode-id="5529" instrument_node="">fthe practice of any profession, or intervene, directly or indirectly, in the management and control</span><br data-dcnode-id="5528"><span data-dcnode-id="5527" instrument_node="">of any private enterprise. They shall not, directly or indirectly, have any financial or material</span><br data-dcnode-id="5526"><span data-dcnode-id="5525" instrument_node="">interest in any transaction requiring the approval of their office.</span><br data-dcnode-id="5524"><span data-dcnode-id="5523" instrument_node="">Section 20. Organizational Structure. ? The Commission shall consist of the following units:</span><br data-dcnode-id="5522"><span data-dcnode-id="5521" instrument_node="">(a) Commission Proper. ? This is composed of the offices of the Chairman and the four (4)</span><br data-dcnode-id="5520"><span data-dcnode-id="5519" instrument_node="">commissioners.</span><br data-dcnode-id="5518"><span data-dcnode-id="5517" instrument_node="">Page 4 of 27 R.A. 6975</span><br data-dcnode-id="5516"><span data-dcnode-id="5515" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5514"><span data-dcnode-id="5513" instrument_node="">(b) Staff Services. ? The staff services of the Commission shall be as follows:</span><br data-dcnode-id="5512"><span data-dcnode-id="5511" instrument_node="">(1) The planning and Research Service, which shall provide technical services to</span><br data-dcnode-id="5510"><span data-dcnode-id="5509" instrument_node="">the Commission in areas of overall policy formulation, strategic and operational</span><br data-dcnode-id="5508"><span data-dcnode-id="5507" instrument_node="">planning, management systems or procedures, evaluation and monitoring of the</span><br data-dcnode-id="5506"><span data-dcnode-id="5505" instrument_node="">Commission's programs, projects and internal operations; and shall conduct</span><br data-dcnode-id="5504"><span data-dcnode-id="5503" instrument_node="">thorough research and analysis on social and economic conditions affecting peace</span><br data-dcnode-id="5502"><span data-dcnode-id="5501" instrument_node="">and order in the country;</span><br data-dcnode-id="5500"><span data-dcnode-id="5499" instrument_node="">(2) The Legal Affairs Service, which shall provide the Commission with efficient and</span><br data-dcnode-id="5498"><span data-dcnode-id="5497" instrument_node="">effective service as legal counsel of the Commission; draft or study contracts</span><br data-dcnode-id="5496"><span data-dcnode-id="5495" instrument_node="">affecting the Commission and submit appropriate recommendations pertaining</span><br data-dcnode-id="5494"><span data-dcnode-id="5493" instrument_node="">thereto; and render legal opinions arising from the administration and operation of</span><br data-dcnode-id="5492"><span data-dcnode-id="5491" instrument_node="">the Philippine National Police and the Commission;</span><br data-dcnode-id="5490"><span data-dcnode-id="5489" instrument_node="">(3) The Crime Prevention and Coordination Service, which shall undertake</span><br data-dcnode-id="5488"><span data-dcnode-id="5487" instrument_node="">criminological researches and studies; formulate a national crime prevention plan;</span><br data-dcnode-id="5486"><span data-dcnode-id="5485" instrument_node="">develop a crime prevention and information program and provide editorial direction</span><br data-dcnode-id="5484"><span data-dcnode-id="5483" instrument_node="">for all criminology research and crime prevention publications;</span><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">(4) The Administrative Service, which shall provide the Commission with assistance</span><br data-dcnode-id="5480"><span data-dcnode-id="5479" instrument_node="">on budgetary and financial matters; provide the necessary services relating to</span><br data-dcnode-id="5478"><span data-dcnode-id="5477" instrument_node="">records, correspondence, supplies, property and equipment, security and general</span><br data-dcnode-id="5476"><span data-dcnode-id="5475" instrument_node="">services, and the maintenance and utilization of facilities; and provide services</span><br data-dcnode-id="5474"><span data-dcnode-id="5473" instrument_node="">relating to manpower, career planning and development, personnel transactions</span><br data-dcnode-id="5472"><span data-dcnode-id="5471" instrument_node="">and employee welfare;</span><br data-dcnode-id="5470"><span data-dcnode-id="5469" instrument_node="">(5) The Inspection and Monitoring Service, which shall conduct continuous</span><br data-dcnode-id="5468"><span data-dcnode-id="5467" instrument_node="">inspection and management audit of personnel, facilities and operations at all levels</span><br data-dcnode-id="5466"><span data-dcnode-id="5465" instrument_node="">of command of the PNP and shall monitor the implementation of the Commission's</span><br data-dcnode-id="5464"><span data-dcnode-id="5463" instrument_node="">programs and projects relative to law enforcement; and</span><br data-dcnode-id="5462"><span data-dcnode-id="5461" instrument_node="">(6) The Installations and Logistics Service, which shall review the Commission's</span><br data-dcnode-id="5460"><span data-dcnode-id="5459" instrument_node="">plans and programs and formulate policies and procedures regarding acquisition,</span><br data-dcnode-id="5458"><span data-dcnode-id="5457" instrument_node="">inventory, control, distribution, maintenance and disposal of supplies and shall</span><br data-dcnode-id="5456"><span data-dcnode-id="5455" instrument_node="">oversee the implementation of programs on transportation facilities and installations</span><br data-dcnode-id="5454"><span data-dcnode-id="5453" instrument_node="">and the procurement and maintenance of supplies and equipment.</span><br data-dcnode-id="5452"><span data-dcnode-id="5451" instrument_node="">(c) Disciplinary Appellate Boards. ? The Commission shall establish a formal</span><br data-dcnode-id="5450"><span data-dcnode-id="5449" instrument_node="">administrative disciplinary appellate machinery consisting of the National Appellate Board</span><br data-dcnode-id="5448"><span data-dcnode-id="5447" instrument_node="">and the regional appellate boards.</span><br data-dcnode-id="5446"><span data-dcnode-id="5445" instrument_node="">The National Appellate Board shall decide cases on appeal from decisions rendered by the PNP</span><br data-dcnode-id="5444"><span data-dcnode-id="5443" instrument_node="">chief, while the regional appellate boards shall decide cases on appeal from decisions rendered</span><br data-dcnode-id="5442"><span data-dcnode-id="5441" instrument_node="">by officers other than the PNP chief, the mayor, and the People Law Enforcement Board (PLEB)</span><br data-dcnode-id="5440"><span data-dcnode-id="5439" instrument_node="">created hereunder.</span><br data-dcnode-id="5438"><span data-dcnode-id="5437" instrument_node="">Section 21. Regional Offices. ? The Commission shall establish, operate and maintain regional</span><br data-dcnode-id="5436"><span data-dcnode-id="5435" instrument_node="">offices headed by regional directors who shall implement the policies and programs of the</span><br data-dcnode-id="5434"><span data-dcnode-id="5433" instrument_node="">Commission in their respective regions. For administrative purposes, the regional offices of the</span><br data-dcnode-id="5432"><span data-dcnode-id="5431" instrument_node="">Commission shall be attached to the general offices of the Department.</span><br data-dcnode-id="5430"><span data-dcnode-id="5429" instrument_node="">Subject to the standards that shall be prescribed by the Commission, the regional offices shall</span><br data-dcnode-id="5428"><span data-dcnode-id="5427" instrument_node="">likewise perform the functions of adjudication of benefit claims.</span><br data-dcnode-id="5426"><span data-dcnode-id="5425" instrument_node="">Page 5 of 27 R.A. 6975</span><br data-dcnode-id="5424"><span data-dcnode-id="5423" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5422"><span data-dcnode-id="5421" instrument_node="">fSection 22. Qualifications of Regional Directors. ? No person shall be appointed regional</span><br data-dcnode-id="5420"><span data-dcnode-id="5419" instrument_node="">director unless:</span><br data-dcnode-id="5418"><span data-dcnode-id="5417" instrument_node="">(a) He is at least thirty (30) years of age;</span><br data-dcnode-id="5416"><span data-dcnode-id="5415" instrument_node="">(b) A holder of a baccalaureate degree and appropriate civil service eligibility; and</span><br data-dcnode-id="5414"><span data-dcnode-id="5413" instrument_node="">(c) Has at least five (5) years experience in the field of law enforcement, criminology or</span><br data-dcnode-id="5412"><span data-dcnode-id="5411" instrument_node="">police administration.</span><br data-dcnode-id="5410"><span data-dcnode-id="5409" instrument_node="">CHAPTER III</span><br data-dcnode-id="5408"><span data-dcnode-id="5407" instrument_node="">A. THE PHILIPPINE NATIONAL POLICE ORGANIZATION</span><br data-dcnode-id="5406"><span data-dcnode-id="5405" instrument_node="">Section 23. Composition. ? Subject to the limitations provided for in this Act, the Philippine</span><br data-dcnode-id="5404"><span data-dcnode-id="5403" instrument_node="">National Police, hereinafter referred to as the PNP, is hereby established, initially consisting of</span><br data-dcnode-id="5402"><span data-dcnode-id="5401" instrument_node="">the members of the police forces who were integrated into the Integrated National Police (INP)</span><br data-dcnode-id="5400"><span data-dcnode-id="5399" instrument_node="">pursuant to Presidential Decree No. 765, and the officers and enlisted personnel of the</span><br data-dcnode-id="5398"><span data-dcnode-id="5397" instrument_node="">Philippine Constabulary (PC). For purposes of this Act, the officers and enlisted personnel of the</span><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">PC shall include those assigned with the Narcotics Command (NARCOM) or the Criminal</span><br data-dcnode-id="5394"><span data-dcnode-id="5393" instrument_node="">Investigation Service (CIS); and those of the technical services of the AFP assigned with the PC</span><br data-dcnode-id="5392"><span data-dcnode-id="5391" instrument_node="">and the civilian operatives of the CIS. The regular operatives of the abolished NAPOLCOM</span><br data-dcnode-id="5390"><span data-dcnode-id="5389" instrument_node="">Inspection, Investigation and Intelligence Branch may also be absorbed by the PNP. In addition,</span><br data-dcnode-id="5388"><span data-dcnode-id="5387" instrument_node="">a PC officer or enlisted personnel may transfer to any of the branches or services of the Armed</span><br data-dcnode-id="5386"><span data-dcnode-id="5385" instrument_node="">Forces of the Philippines in accordance with the provisions of Section 85 of this Act.</span><br data-dcnode-id="5384"><span data-dcnode-id="5383" instrument_node="">In order to be qualified for transfer to the PNP units in Metropolitan Manila and in highly</span><br data-dcnode-id="5382"><span data-dcnode-id="5381" instrument_node="">urbanized cities, an individual must have completed not less than second year collegiate work or</span><br data-dcnode-id="5380"><span data-dcnode-id="5379" instrument_node="">its equivalent in training of seventy-two (72) collegiate units.</span><br data-dcnode-id="5378"><span data-dcnode-id="5377" instrument_node="">Anyone who has any pending administrative or criminal case or has been adjudged liable or</span><br data-dcnode-id="5376"><span data-dcnode-id="5375" instrument_node="">convicted of any crime pending appeal shall be allowed to join the PNP provisionally without</span><br data-dcnode-id="5374"><span data-dcnode-id="5373" instrument_node="">prejudice to final judgment by a body of competent jurisdiction.</span><br data-dcnode-id="5372"><span data-dcnode-id="5371" instrument_node="">The permanent civilian employees of the present PC, INP, Narcotics Command, CIS, and the</span><br data-dcnode-id="5370"><span data-dcnode-id="5369" instrument_node="">technical services of the AFP assigned with the PC, including NAPOLCOM hearing officers</span><br data-dcnode-id="5368"><span data-dcnode-id="5367" instrument_node="">holding regular items as such, shall be absorbed by the Department as employees thereof,</span><br data-dcnode-id="5366"><span data-dcnode-id="5365" instrument_node="">subject to existing laws and regulations.</span><br data-dcnode-id="5364"><span data-dcnode-id="5363" instrument_node="">Section 24. Powers and Functions. ? The PNP shall have the following powers and functions:</span><br data-dcnode-id="5362"><span data-dcnode-id="5361" instrument_node="">(a) Enforce all laws and ordinances relative to the protection of lives and properties;</span><br data-dcnode-id="5360"><span data-dcnode-id="5359" instrument_node="">(b) Maintain peace and order and take all necessary steps to ensure public safety;</span><br data-dcnode-id="5358"><span data-dcnode-id="5357" instrument_node="">(c) Investigate and prevent crimes, effect the arrest of criminal offenders, bring offenders</span><br data-dcnode-id="5356"><span data-dcnode-id="5355" instrument_node="">to justice and assist in their prosecution;</span><br data-dcnode-id="5354"><span data-dcnode-id="5353" instrument_node="">(d) Exercise the general powers to make arrest, search and seizure in accordance with</span><br data-dcnode-id="5352"><span data-dcnode-id="5351" instrument_node="">the Constitution and pertinent laws;</span><br data-dcnode-id="5350"><span data-dcnode-id="5349" instrument_node="">(e) Detain an arrested person for a period not beyond what is prescribed by law, informing</span><br data-dcnode-id="5348"><span data-dcnode-id="5347" instrument_node="">the person so detained of all his rights under the Constitution;</span><br data-dcnode-id="5346"><span data-dcnode-id="5345" instrument_node="">Page 6 of 27 R.A. 6975</span><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5342"><span data-dcnode-id="5341" instrument_node="">(f) Issue licenses for the possession of firearms and explosives in accordance with law;</span><br data-dcnode-id="5340"><span data-dcnode-id="5339" instrument_node="">(g) Supervise and control the training and operations of security agencies and issue</span><br data-dcnode-id="5338"><span data-dcnode-id="5337" instrument_node="">licenses to operate security agencies, and to security guards and private detectives, for</span><br data-dcnode-id="5336"><span data-dcnode-id="5335" instrument_node="">the practice of their professions; and</span><br data-dcnode-id="5334"><span data-dcnode-id="5333" instrument_node="">(h) Perform such other duties and exercise all other functions as may be provided by law.</span><br data-dcnode-id="5332"><span data-dcnode-id="5331" instrument_node="">In addition, the PNP shall absorb the office of the National Action Committee on Anti-Hijacking</span><br data-dcnode-id="5330"><span data-dcnode-id="5329" instrument_node="">(NACAH) of the Department of National Defense, all the functions of the present Philippine Air</span><br data-dcnode-id="5328"><span data-dcnode-id="5327" instrument_node="">Force Security Command (PAFSECOM), as well as the police functions of the Coast Guard. In</span><br data-dcnode-id="5326"><span data-dcnode-id="5325" instrument_node="">order to perform its powers and functions efficiently and effectively, the PNP shall be provided</span><br data-dcnode-id="5324"><span data-dcnode-id="5323" instrument_node="">with adequate land, sea, and air capabilities and all necessary material means of resources.</span><br data-dcnode-id="5322"><span data-dcnode-id="5321" instrument_node="">Section 25. Organization. ? The PNP shall be headed by a Chief who shall be assisted by two</span><br data-dcnode-id="5320"><span data-dcnode-id="5319" instrument_node="">(2) deputy chief, one (1) for operations and one (1) for administration, both of whom shall be</span><br data-dcnode-id="5318"><span data-dcnode-id="5317" instrument_node="">appointed by the President upon recommendation of the Commission from among the most</span><br data-dcnode-id="5316"><span data-dcnode-id="5315" instrument_node="">senior and qualified officers in the service: Provided, however, That in no case shall any officer</span><br data-dcnode-id="5314"><span data-dcnode-id="5313" instrument_node="">fwho has retired or is retirable within six (6) months from his compulsory retirement age be</span><br data-dcnode-id="5312"><span data-dcnode-id="5311" instrument_node="">appointed as Chief of the PNP. The PNP shall be composed of a national office, regional offices,</span><br data-dcnode-id="5310"><span data-dcnode-id="5309" instrument_node="">provincial offices, district offices, city or municipal stations.</span><br data-dcnode-id="5308"><span data-dcnode-id="5307" instrument_node="">At the national level, the PNP shall maintain its office in Metropolitan Manila which shall house</span><br data-dcnode-id="5306"><span data-dcnode-id="5305" instrument_node="">the directorial staff, service staff and special support units.</span><br data-dcnode-id="5304"><span data-dcnode-id="5303" instrument_node="">At the regional level, the PNP shall have regional offices, including that of the National Capital</span><br data-dcnode-id="5302"><span data-dcnode-id="5301" instrument_node="">Region, which may be divided into two (2) separate regions without prejudice to the pertinent</span><br data-dcnode-id="5300"><span data-dcnode-id="5299" instrument_node="">provisions of the Organic Act for the Autonomous Regions of the Cordilleras and Muslim</span><br data-dcnode-id="5298"><span data-dcnode-id="5297" instrument_node="">Mindanao relative to the creation of a regional police force in the area of autonomy. Each of</span><br data-dcnode-id="5296"><span data-dcnode-id="5295" instrument_node="">these regional offices shall be headed by a regional director for peace and order.</span><br data-dcnode-id="5294"><span data-dcnode-id="5293" instrument_node="">At the provincial level, there shall be a PNP office, each headed by a provincial director. In the</span><br data-dcnode-id="5292"><span data-dcnode-id="5291" instrument_node="">case of large provinces, police districts may be established by the Commission to be headed by</span><br data-dcnode-id="5290"><span data-dcnode-id="5289" instrument_node="">a district director.</span><br data-dcnode-id="5288"><span data-dcnode-id="5287" instrument_node="">At the city or municipal level, there shall be a PNP station, each headed by a chief of police.</span><br data-dcnode-id="5286"><span data-dcnode-id="5285" instrument_node="">The Chief of the PNP shall, within sixty (60) days from the effectivity of this Act and in</span><br data-dcnode-id="5284"><span data-dcnode-id="5283" instrument_node="">accordance with the broad guidelines set forth herein, recommend the organizational structure</span><br data-dcnode-id="5282"><span data-dcnode-id="5281" instrument_node="">and staffing pattern of the PNP to the Commission.</span><br data-dcnode-id="5280"><span data-dcnode-id="5279" instrument_node="">Section 26. Powers, Functions and term of Office of the PNP Chief . ? The command and</span><br data-dcnode-id="5278"><span data-dcnode-id="5277" instrument_node="">direction of the PNP shall be vested in the Chief of the PNP who shall have the power to direct</span><br data-dcnode-id="5276"><span data-dcnode-id="5275" instrument_node="">and control tactical as well as strategic movements, deployment, placement, utilization of the</span><br data-dcnode-id="5274"><span data-dcnode-id="5273" instrument_node="">PNP or any of its units and personnel, including its equipment, facilities and other resources.</span><br data-dcnode-id="5272"><span data-dcnode-id="5271" instrument_node="">Such command and direction of the Chief of the PNP may be delegated to subordinate officials</span><br data-dcnode-id="5270"><span data-dcnode-id="5269" instrument_node="">with the respect to the units under their respective commands, in accordance with the rules and</span><br data-dcnode-id="5268"><span data-dcnode-id="5267" instrument_node="">regulation prescribed by the Commission. The Chief of the PNP shall also have the power to</span><br data-dcnode-id="5266"><span data-dcnode-id="5265" instrument_node="">issue detailed implementing policies and instructions regarding personnel, funds, properties,</span><br data-dcnode-id="5264"><span data-dcnode-id="5263" instrument_node="">records, correspondence and such other matters as may be necessary to effectivity carry out the</span><br data-dcnode-id="5262"><span data-dcnode-id="5261" instrument_node="">functions, powers and duties of the Bureau. The Chief of the PNP shall be appointed by the</span><br data-dcnode-id="5260"><span data-dcnode-id="5259" instrument_node="">President from among the senior officers down to the rank of chief superintendent, subject to</span><br data-dcnode-id="5258"><span data-dcnode-id="5257" instrument_node="">confirmation by the Commission on Appointments: Provided, That the Chief of the PNP shall</span><br data-dcnode-id="5256"><span data-dcnode-id="5255" instrument_node="">serve a term of office not to exceed four (4) years: Provided, further, That in times of war or</span><br data-dcnode-id="5254"><span data-dcnode-id="5253" instrument_node="">other national emergency declared by Congress, the President may extend such term of office.</span><br data-dcnode-id="5252"><span data-dcnode-id="5251" instrument_node="">Page 7 of 27 R.A. 6975</span><br data-dcnode-id="5250"><span data-dcnode-id="5249" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5248"><span data-dcnode-id="5247" instrument_node="">Section 27. Manning Levels. ? On the average nationwide, the manning levels of the PNP shall</span><br data-dcnode-id="5246"><span data-dcnode-id="5245" instrument_node="">be approximately in accordance with a police-to-population ratio of one (1) policeman for every</span><br data-dcnode-id="5244"><span data-dcnode-id="5243" instrument_node="">five hundred (500) persons. The actual strength by cities and municipalities shall depend on the</span><br data-dcnode-id="5242"><span data-dcnode-id="5241" instrument_node="">state of peace and order, population density and actual demands of the service in the particular</span><br data-dcnode-id="5240"><span data-dcnode-id="5239" instrument_node="">area: Provided, That the minimum police-to-population ratio shall not be less than one (1)</span><br data-dcnode-id="5238"><span data-dcnode-id="5237" instrument_node="">policeman for every one thousand (1,000) persons: Provided, further, That urban areas shall</span><br data-dcnode-id="5236"><span data-dcnode-id="5235" instrument_node="">have a higher minimum police-to-population ratio as may be prescribed by regulations.</span><br data-dcnode-id="5234"><span data-dcnode-id="5233" instrument_node="">Section 28. Rank Classification. ? For purposes of efficient administration, supervision and</span><br data-dcnode-id="5232"><span data-dcnode-id="5231" instrument_node="">control, the rank classification of the members of the PNP shall be as follows:</span><br data-dcnode-id="5230"><span data-dcnode-id="5229" instrument_node="">Director General</span><br data-dcnode-id="5228"><span data-dcnode-id="5227" instrument_node="">Deputy Director General</span><br data-dcnode-id="5226"><span data-dcnode-id="5225" instrument_node="">Director</span><br data-dcnode-id="5224"><span data-dcnode-id="5223" instrument_node="">Chief Superintendent</span><br data-dcnode-id="5222"><span data-dcnode-id="5221" instrument_node="">Senior Superintendent</span><br data-dcnode-id="5220"><span data-dcnode-id="5219" instrument_node="">Superintendent</span><br data-dcnode-id="5218"><span data-dcnode-id="5217" instrument_node="">Chief Inspector</span><br data-dcnode-id="5216"><span data-dcnode-id="5215" instrument_node="">Senior Inspector</span><br data-dcnode-id="5214"><span data-dcnode-id="5213" instrument_node="">Inspector</span><br data-dcnode-id="5212"><span data-dcnode-id="5211" instrument_node="">Senior Police Officer IV</span><br data-dcnode-id="5210"><span data-dcnode-id="5209" instrument_node="">Senior Police Officer III</span><br data-dcnode-id="5208"><span data-dcnode-id="5207" instrument_node="">Senior Police Officer II</span><br data-dcnode-id="5206"><span data-dcnode-id="5205" instrument_node="">fSenior Police Officer I</span><br data-dcnode-id="5204"><span data-dcnode-id="5203" instrument_node="">Police Officer III</span><br data-dcnode-id="5202"><span data-dcnode-id="5201" instrument_node="">Police Officer II</span><br data-dcnode-id="5200"><span data-dcnode-id="5199" instrument_node="">Police Officer I</span><br data-dcnode-id="5198"><span data-dcnode-id="5197" instrument_node="">Section 29. Key Positions. ? The head of the PNP with the rank director general shall have the</span><br data-dcnode-id="5196"><span data-dcnode-id="5195" instrument_node="">position title of Chief of the PNP. The second in command of the PNP with the rank of deputy</span><br data-dcnode-id="5194"><span data-dcnode-id="5193" instrument_node="">director general shall be the Deputy Chief of the PNP for Administration. The third in command</span><br data-dcnode-id="5192"><span data-dcnode-id="5191" instrument_node="">with the rank also of deputy director general shall be the Deputy Chief of the PNP for</span><br data-dcnode-id="5190"><span data-dcnode-id="5189" instrument_node="">Operations.</span><br data-dcnode-id="5188"><span data-dcnode-id="5187" instrument_node="">At the national office, the head of the directorial staff with the rank of deputy director general</span><br data-dcnode-id="5186"><span data-dcnode-id="5185" instrument_node="">shall be known as Chief of the Directorial Staff of the PNP.</span><br data-dcnode-id="5184"><span data-dcnode-id="5183" instrument_node="">The heads of the various staff divisions in the directorial staff shall have the rank of director with</span><br data-dcnode-id="5182"><span data-dcnode-id="5181" instrument_node="">Page 8 of 27 R.A. 6975</span><br data-dcnode-id="5180"><span data-dcnode-id="5179" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5178"><span data-dcnode-id="5177" instrument_node="">the position title of Director of the Directorial Staff of their respective functional divisions. The</span><br data-dcnode-id="5176"><span data-dcnode-id="5175" instrument_node="">head of the Inspectorate Division with the rank of chief superintendent shall assume the position</span><br data-dcnode-id="5174"><span data-dcnode-id="5173" instrument_node="">title of Inspector General. The heads of the administrative and operational support divisions shall</span><br data-dcnode-id="5172"><span data-dcnode-id="5171" instrument_node="">have the rank of chief superintendent.</span><br data-dcnode-id="5170"><span data-dcnode-id="5169" instrument_node="">The head of the NCR with the rank of director shall assume the position title of NCR Director.</span><br data-dcnode-id="5168"><span data-dcnode-id="5167" instrument_node="">The heads of the regional offices with the rank of chief superintendent shall assume the position</span><br data-dcnode-id="5166"><span data-dcnode-id="5165" instrument_node="">title of Regional Director.</span><br data-dcnode-id="5164"><span data-dcnode-id="5163" instrument_node="">The heads of the NCR district offices with the rank of chief superintendent shall have the</span><br data-dcnode-id="5162"><span data-dcnode-id="5161" instrument_node="">position title of District Director.</span><br data-dcnode-id="5160"><span data-dcnode-id="5159" instrument_node="">The heads of provincial offices with the rank of senior superintendent shall be known as</span><br data-dcnode-id="5158"><span data-dcnode-id="5157" instrument_node="">Provincial Director.</span><br data-dcnode-id="5156"><span data-dcnode-id="5155" instrument_node="">The heads of the district offices with the rank of superintendent shall have the position title of</span><br data-dcnode-id="5154"><span data-dcnode-id="5153" instrument_node="">District Director.</span><br data-dcnode-id="5152"><span data-dcnode-id="5151" instrument_node="">The heads of the municipality or city offices with the rank of chief inspector shall be known as</span><br data-dcnode-id="5150"><span data-dcnode-id="5149" instrument_node="">Chief of Police.</span><br data-dcnode-id="5148"><span data-dcnode-id="5147" instrument_node="">Section 30. General Qualifications for Appointment. ? No person shall be appointed as officer or</span><br data-dcnode-id="5146"><span data-dcnode-id="5145" instrument_node="">member of the PNP unless he possesses the following minimum qualifications:</span><br data-dcnode-id="5144"><span data-dcnode-id="5143" instrument_node="">(a) A citizen of the Philippines;</span><br data-dcnode-id="5142"><span data-dcnode-id="5141" instrument_node="">(b) A person of good moral conduct;</span><br data-dcnode-id="5140"><span data-dcnode-id="5139" instrument_node="">(c) Of sound mind and body;</span><br data-dcnode-id="5138"><span data-dcnode-id="5137" instrument_node="">(d) Must possess a formal baccalaureate degree for appointment as officer and must have</span><br data-dcnode-id="5136"><span data-dcnode-id="5135" instrument_node="">finished at least second year college or the equivalent of seventy-two (72) collegiate units</span><br data-dcnode-id="5134"><span data-dcnode-id="5133" instrument_node="">for appointment as non-officer or an equivalent training or experience for those already in</span><br data-dcnode-id="5132"><span data-dcnode-id="5131" instrument_node="">the service upon the effectivity of this Act.</span><br data-dcnode-id="5130"><span data-dcnode-id="5129" instrument_node="">(e) Must be eligible in accordance with the standards set by the Commission;</span><br data-dcnode-id="5128"><span data-dcnode-id="5127" instrument_node="">(f) Must not have been dishonorably discharged from military employment or dismissed for</span><br data-dcnode-id="5126"><span data-dcnode-id="5125" instrument_node="">cause from any civilian position in the Government;</span><br data-dcnode-id="5124"><span data-dcnode-id="5123" instrument_node="">(g) Must not have been convicted be final judgment of an offense or crime involving moral</span><br data-dcnode-id="5122"><span data-dcnode-id="5121" instrument_node="">turpitude;</span><br data-dcnode-id="5120"><span data-dcnode-id="5119" instrument_node="">(h) Must be at least one meter and sixty-two centimeters (1.62 m.) in height for male and</span><br data-dcnode-id="5118"><span data-dcnode-id="5117" instrument_node="">one meter and fifty-seven centimeters (1.57 m.) for female;</span><br data-dcnode-id="5116"><span data-dcnode-id="5115" instrument_node="">(i) Must weight not more or less than five kilograms (5 kg.) of the standard weight</span><br data-dcnode-id="5114"><span data-dcnode-id="5113" instrument_node="">corresponding to his or her height, age, and sex; and</span><br data-dcnode-id="5112"><span data-dcnode-id="5111" instrument_node="">(j) For a new applicant, must not be less than twenty-one (21) nor more than thirty (30)</span><br data-dcnode-id="5110"><span data-dcnode-id="5109" instrument_node="">years of age.</span><br data-dcnode-id="5108"><span data-dcnode-id="5107" instrument_node="">Section 31. Appointment of PNP Officers and Members. ? The appointment of the officers and</span><br data-dcnode-id="5106"><span data-dcnode-id="5105" instrument_node="">Page 9 of 27 R.A. 6975</span><br data-dcnode-id="5104"><span data-dcnode-id="5103" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5102"><span data-dcnode-id="5101" instrument_node="">members of the PNP shall be effected in the following manner:</span><br data-dcnode-id="5100"><span data-dcnode-id="5099" instrument_node="">(a) Police Officer I to Senior Police Officer IV . ? Appointed by the PNP regional director</span><br data-dcnode-id="5098"><span data-dcnode-id="5097" instrument_node="">ffor regional personnel or by the Chief of the PNP for the national headquarters personnel</span><br data-dcnode-id="5096"><span data-dcnode-id="5095" instrument_node="">and attested by the Civil Service Commission.</span><br data-dcnode-id="5094"><span data-dcnode-id="5093" instrument_node="">(b) Inspector to Superintendent. ? Appointed by the Chief of the PNP, as recommended</span><br data-dcnode-id="5092"><span data-dcnode-id="5091" instrument_node="">by their immediate superiors, attested by the Civil Service Commission;</span><br data-dcnode-id="5090"><span data-dcnode-id="5089" instrument_node="">(c) Senior Superintendent to Deputy Director General. ? Appointed by the President upon</span><br data-dcnode-id="5088"><span data-dcnode-id="5087" instrument_node="">recommendation of the chief of the PNP, with proper endorsement by the Chairman of the</span><br data-dcnode-id="5086"><span data-dcnode-id="5085" instrument_node="">Civil Service Commission and subject to confirmation by the Commission on</span><br data-dcnode-id="5084"><span data-dcnode-id="5083" instrument_node="">Appointments; and</span><br data-dcnode-id="5082"><span data-dcnode-id="5081" instrument_node="">(d) Director General. ? Appointed by the President from among the senior officers down to</span><br data-dcnode-id="5080"><span data-dcnode-id="5079" instrument_node="">the rank of chief superintendent in the service, subject to confirmation by the Commission</span><br data-dcnode-id="5078"><span data-dcnode-id="5077" instrument_node="">on Appointments: Provided, That the Chief of the PNP shall serve a tour of duty not to</span><br data-dcnode-id="5076"><span data-dcnode-id="5075" instrument_node="">exceed four (4) years: Provided, further, That, in times of war or other national emergency</span><br data-dcnode-id="5074"><span data-dcnode-id="5073" instrument_node="">declared by Congress, the President may extend such tour of duty.</span><br data-dcnode-id="5072"><span data-dcnode-id="5071" instrument_node="">Section 32. Examinations for Policemen. ? The Civil Service Commission shall administer the</span><br data-dcnode-id="5070"><span data-dcnode-id="5069" instrument_node="">qualifying entrance examinations for policemen on the basis of the standards set by the</span><br data-dcnode-id="5068"><span data-dcnode-id="5067" instrument_node="">NAPOLCOM.</span><br data-dcnode-id="5066"><span data-dcnode-id="5065" instrument_node="">Section 33. Lateral Entry of Officers into the PNP. ? In general, all original appointments of</span><br data-dcnode-id="5064"><span data-dcnode-id="5063" instrument_node="">commissioned officers in the PNP shall commence with the rank of inspector, to include all those</span><br data-dcnode-id="5062"><span data-dcnode-id="5061" instrument_node="">with highly technical qualifications applying for the PNP technical services, such as dentist,</span><br data-dcnode-id="5060"><span data-dcnode-id="5059" instrument_node="">optometrists, nurses, engineers, and graduates of forensic sciences. Doctors of medicine,</span><br data-dcnode-id="5058"><span data-dcnode-id="5057" instrument_node="">members of the Bar, and chaplains shall be appointed to the rank of senior inspector in their</span><br data-dcnode-id="5056"><span data-dcnode-id="5055" instrument_node="">particular technical service. Graduates of the Philippine National Police Academy (PNPA) shall</span><br data-dcnode-id="5054"><span data-dcnode-id="5053" instrument_node="">be automatically appointed to the initial rank of inspector. Licensed criminologists may be</span><br data-dcnode-id="5052"><span data-dcnode-id="5051" instrument_node="">appointed to the rank of inspector to fill up any vacancy after promotions from the ranks are</span><br data-dcnode-id="5050"><span data-dcnode-id="5049" instrument_node="">completed.</span><br data-dcnode-id="5048"><span data-dcnode-id="5047" instrument_node="">Section 34. Qualifications of Chief of City and Municipal Police Stations. ? No person may be</span><br data-dcnode-id="5046"><span data-dcnode-id="5045" instrument_node="">appointed chief of a city police station unless he holds a bachelor's degree from a recognized</span><br data-dcnode-id="5044"><span data-dcnode-id="5043" instrument_node="">institution of learning or has served in the Philippine Constabulary or in the police department of</span><br data-dcnode-id="5042"><span data-dcnode-id="5041" instrument_node="">any city or municipality with the rank of captain or its equivalent therein for at least three (3)</span><br data-dcnode-id="5040"><span data-dcnode-id="5039" instrument_node="">years.</span><br data-dcnode-id="5038"><span data-dcnode-id="5037" instrument_node="">No person may be appointed chief of a municipal police station unless he holds a bachelor's</span><br data-dcnode-id="5036"><span data-dcnode-id="5035" instrument_node="">degree from a recognized institution of learning or has served as officer in the Philippine</span><br data-dcnode-id="5034"><span data-dcnode-id="5033" instrument_node="">Constabulary or in the police department of any city or municipality for at least two (2) years with</span><br data-dcnode-id="5032"><span data-dcnode-id="5031" instrument_node="">the rank lieutenant or its equivalent: Provided, That a member of the Bar with at least five (5)</span><br data-dcnode-id="5030"><span data-dcnode-id="5029" instrument_node="">years experience in active law practice and who possesses the general qualifications under</span><br data-dcnode-id="5028"><span data-dcnode-id="5027" instrument_node="">Section 30 of this Act shall be qualified for appointment as chief of a city or municipal police</span><br data-dcnode-id="5026"><span data-dcnode-id="5025" instrument_node="">station: Provided, further, That the chief of police shall be appointed in accordance with the</span><br data-dcnode-id="5024"><span data-dcnode-id="5023" instrument_node="">provisions of Section 51, paragraph b), subparagraph (4) (i) of this Act.</span><br data-dcnode-id="5022"><span data-dcnode-id="5021" instrument_node="">Section 35. Support Units. ? The PNP shall be supported by administrative and operational</span><br data-dcnode-id="5020"><span data-dcnode-id="5019" instrument_node="">support units. The administrative support units shall consist of the Crime Laboratory, Logistic</span><br data-dcnode-id="5018"><span data-dcnode-id="5017" instrument_node="">Unit, Communications Unit, Computer Center, Finance Center and Civil Security Unit. The</span><br data-dcnode-id="5016"><span data-dcnode-id="5015" instrument_node="">operational support units shall be composed of the Maritime Police Unit, Police Intelligence Unit,</span><br data-dcnode-id="5014"><span data-dcnode-id="5013" instrument_node="">Police Security Unit, Criminal Investigation Unit, Special Action Force, Narcotics units, Aviation</span><br data-dcnode-id="5012"><span data-dcnode-id="5011" instrument_node="">Security Unit, Traffic Management Unit, the Medical and Dental Centers and the Civil Relations</span><br data-dcnode-id="5010"><span data-dcnode-id="5009" instrument_node="">Page 10 of 27 R.A. 6975</span><br data-dcnode-id="5008"><span data-dcnode-id="5007" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="5006"><span data-dcnode-id="5005" instrument_node="">Unit. To enhance police operational efficiency and effectiveness, the Chief of the PNP may</span><br data-dcnode-id="5004"><span data-dcnode-id="5003" instrument_node="">constitute such other support units as may be necessary subject to the approval of the</span><br data-dcnode-id="5002"><span data-dcnode-id="5001" instrument_node="">Commission: Provided, That no support unit headed by a chief superintendent or a higher rank</span><br data-dcnode-id="5000"><span data-dcnode-id="4999" instrument_node="">can be created unless provided by law.</span><br data-dcnode-id="4998"><span data-dcnode-id="4997" instrument_node="">(a) Administrative Support Units. ? (1) Crime Laboratory. There shall be established a</span><br data-dcnode-id="4996"><span data-dcnode-id="4995" instrument_node="">central Crime Laboratory to be headed by a Director with the rank of chief superintendent,</span><br data-dcnode-id="4994"><span data-dcnode-id="4993" instrument_node="">which shall provides scientific and technical investigative aid and support to the PNP and</span><br data-dcnode-id="4992"><span data-dcnode-id="4991" instrument_node="">other government investigative agencies.</span><br data-dcnode-id="4990"><span data-dcnode-id="4989" instrument_node="">fIt shall also provide crime laboratory examination, evaluation and identification of physical</span><br data-dcnode-id="4988"><span data-dcnode-id="4987" instrument_node="">evidences involved in crimes with primary emphasis on their medical, chemical, biological</span><br data-dcnode-id="4986"><span data-dcnode-id="4985" instrument_node="">and physical nature.</span><br data-dcnode-id="4984"><span data-dcnode-id="4983" instrument_node="">There shall be likewise be established regional and city crime laboratories as may be</span><br data-dcnode-id="4982"><span data-dcnode-id="4981" instrument_node="">necessary in all regions and cities of the country.</span><br data-dcnode-id="4980"><span data-dcnode-id="4979" instrument_node="">(2) Logistic Unit. ? Headed by a Director with the rank of chief superintendent, the</span><br data-dcnode-id="4978"><span data-dcnode-id="4977" instrument_node="">Logistics Unit shall be responsible for the procurement, distributions and</span><br data-dcnode-id="4976"><span data-dcnode-id="4975" instrument_node="">management of all the logistical requirements of the PNP including firearms and</span><br data-dcnode-id="4974"><span data-dcnode-id="4973" instrument_node="">ammunition.</span><br data-dcnode-id="4972"><span data-dcnode-id="4971" instrument_node="">(3) Communications Unit. ? Headed by a Director with the rank of chief</span><br data
