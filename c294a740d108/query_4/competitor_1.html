e="">twenty (20) years to a maximum of ninety percent (90%) for thirty-six (36) years of active service</span><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node="">and over.</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node="">fSection 76. Death and Disability Benefits. ? A uniformed personnel and/or his heirs shall be</span><br data-dcnode-id="3908"><span data-dcnode-id="3907" instrument_node="">entitled to all benefits relative to the death or permanent incapacity of said personnel, as</span><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node="">provided for under this Act, and/or other existing laws.</span><br data-dcnode-id="3904"><span data-dcnode-id="3903" instrument_node="">Section 77. Exemption from Attachment and Taxes. ? All benefits granted by this Act, including</span><br data-dcnode-id="3902"><span data-dcnode-id="3901" instrument_node="">benefits received from the Government Service Insurance System, shall not be subject to</span><br data-dcnode-id="3900"><span data-dcnode-id="3899" instrument_node="">attachment, levy, execution or any tax of whatever nature.</span><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node="">Section 78. Uniformed Personnel Missing in Action. ? Any uniformed personnel who while in the</span><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">performance of duty or by reason of his being an officer or member of the PNP, Fire or Jail</span><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">Force, is officially confirmed missing in action, kidnapped or captured by lawless elements shall,</span><br data-dcnode-id="3892"><span data-dcnode-id="3891" instrument_node="">while so absent, be entitled to receive or to have credited to his account the same pay and</span><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">allowances to which such officer or uniformed member was entitled at the time of the incident:</span><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">Provided, That the compulsory retirement of a person missing in action shall be processed to</span><br data-dcnode-id="3886"><span data-dcnode-id="3885" instrument_node="">allow the members of the next of kin to enjoy the retirement benefits: Provided, further, That</span><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node="">should the Chief of the PNP, Fire or Jail Force, as the same may be, upon the recommendation</span><br data-dcnode-id="3882"><span data-dcnode-id="3881" instrument_node="">of the proper authority and/or immediate supervisor, subsequently determine that the officer or</span><br data-dcnode-id="3880"><span data-dcnode-id="3879" instrument_node="">uniformed member concerned have been absent from duty without authority, such member or</span><br data-dcnode-id="3878"><span data-dcnode-id="3877" instrument_node="">his heirs shall reimburse the PNP, Fire or Jail Force all such amount and allowances received by</span><br data-dcnode-id="3876"><span data-dcnode-id="3875" instrument_node="">Page 23 of 27 R.A. 6975</span><br data-dcnode-id="3874"><span data-dcnode-id="3873" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="3872"><span data-dcnode-id="3871" instrument_node="">him in accordance with this section and the following section.</span><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">Section 79. Payment of Salary and Allowances to the Heirs of Uniformed Personnel. ? In case</span><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node="">any uniformed personnel has been officially confirmed as missing in action under any of the</span><br data-dcnode-id="3866"><span data-dcnode-id="3865" instrument_node="">circumstances provided in the preceding section, the Chief of the PNP, Fire or Jail Force, as the</span><br data-dcnode-id="3864"><span data-dcnode-id="3863" instrument_node="">case may be, shall direct payment of the absent uniformed personnel's monthly salary and</span><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">allowances and other emoluments pertinent thereto his/her heirs for their support for a maximum</span><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node="">period of one (1) year from the date of commencement of absent or when last heard from as</span><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">those kidnapped or captured by lawless elements.</span><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">Section 80. Finding of Death and Termination of Payment of Salary and Allowances. ? Upon the</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">termination of the one (1) year period as specified in the preceding section, the missing</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">uniformed personnel shall be automatically terminated. In the event said personnel shall</span><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">thereafter be found to have been alive and is not entitled to the benefits paid under the</span><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">preceding sections of this Act, said benefits shall be reimbursed to the State within six (6)</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">months from the discovery of the fact or his reappearance. However, if his continued</span><br data-dcnode-id="3844"><span data-dcnode-id="3843" instrument_node="">disappearance was fraudulent or made in bad faith he shall, together with his co-conspirators,</span><br data-dcnode-id="3842"><span data-dcnode-id="3841" instrument_node="">be prosecuted according to law.</span><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">Section 81. Complaints and Grievances. ? Uniformed personnel shall have the right to present</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">complaints and grievances to their superiors or commanders and have them heard and</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">adjudicated as expeditiously as possible in the best interest of the service, with due regard to</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">due process in every case. Such complaints or grievances shall be resolved at the lowest</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">possible level in the unit of command and the respondent shall have the right to appeal from an</span><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">adverse decision to higher authorities.</span><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">Section 82. Prohibitions; Penalties. ? As professional police, fire and jail officers and members</span><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">responsible for the maintenance of peace and order and public safety, the members and officers</span><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">of the PNP, Fire or Jail Force are hereby prohibited from engaging in strikes, rallies,</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">demonstrations and other similar concerted activities, or performing other acts prejudicial to</span><br data-dcnode-id="3820"><span data-dcnode-id="3819" instrument_node="">good order and police discipline.</span><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">Any PNP, fire or Jail Force member found guilty by final judgment of violating the provisions of</span><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">the preceding paragraph shall be dismissed from the service without prejudice to whatever</span><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node="">criminal or civil liability he may have incurred in relation to such violations.</span><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node="">CHAPTER VIII</span><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">TRANSITORY PROVISIONS</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">Section 83. Secretary of the Department of Local Government on Holdover Capacity. ? The</span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">incumbent Secretary of the Department of Local Government shall perform the functions of the</span><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">Secretary of the Interior and Local Government on holdover capacity until such time when a new</span><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">fSecretary shall have been appointed by the President and confirmed by the Commission on</span><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">Appointments.</span><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">Section 84. Special Oversight Committee. ? A special Over-sight Committee is hereby created,</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">composed of the Secretary as Chairman, the Secretary of Budget and Management as Cochairman,</span><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">the Secretary of National defense, the incumbent PC-INP Director General, the</span><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">incumbent Chairman of the Civil Service Commission, the respective Chairmen of the</span><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">Committee on Local Government and the Committee on National Defense and Security in the</span><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">Senate, and the respective Chairmen of the Committee on Public Order and Security and the</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">Committee on National Defense in the House of Representatives, as members, which shall plan</span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">and oversee the expeditious implementation of the transfer, merger and/or absorption into the</span><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">Department of the personnel, property, appropriations and installations of involved agencies.</span><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node="">Page 24 of 27 R.A. 6975</span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">Section 85. Phases of Implementation. ? The implementation of this Act shall be undertaken in</span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">three (3) phases, to wit:</span><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">Phase I ? Exercise of option by the uniformed members of the Philippine Constabulary,</span><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">the PC elements assigned with the Narcotics Command, CIS, and the personnel of the</span><br data-dcnode-id="3768"><span data-dcnode-id="3767" instrument_node="">technical services of the AFP assigned with the PC to include the regular CIS</span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">investigating agents and the operatives and agents of the NAPOLCOM Inspection,</span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">Investigation and Intelligence Branch, and the personnel of the absorbed National Action</span><br data-dcnode-id="3762"><span data-dcnode-id="3761" instrument_node="">Committee on Anti-Hijacking (NACAH) of the Department of National Defense to be</span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">completed within six (6) months from the date of the effectivity of this Act. At the end of</span><br data-dcnode-id="3758"><span data-dcnode-id="3757" instrument_node="">this phase, all personnel from the INP, PC; AFP Technical Services, NACAH and</span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">NAPOLCOM Inspection, Investigation and Intelligence Branch shall have been covered by</span><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">official orders assigning them to the PNP, Fire and Jail Forces by their respective units.</span><br data-dcnode-id="3752"><span data-dcnode-id="3751" instrument_node="">Phase II ? Approval of the table of organization and equipment of all bureaus and offices</span><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">created under this Act, preparation and filling up of their stalling pattern, transfer of assets</span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">to the Department and organization of the Commission, to be completed within twelve (12)</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">months from the effectivity date hereof. At the end of this phase, all personnel to be</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">absorbed by the Department shall have been issued appointment papers, and the</span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">organized Commission and the PNP shall be fully operational.</span><br data-dcnode-id="3740"><span data-dcnode-id="3739" instrument_node="">The PC officers and enlisted personnel who have not opted to join the PNP shall be</span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">reassigned to the Army, Navy or Air Force, or shall be allowed to retire under existing AFP</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">rules and regulations. Any PC-INP officer or enlisted personnel may, within the twelvemonth</span><br data-dcnode-id="3734"><span data-dcnode-id="3733" instrument_node="">period from the effectivity of this Act, retire and be paid retirement benefits</span><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">corresponding to a position two (2) ranks higher than his present grade, subject to the</span><br data-dcnode-id="3730"><span data-dcnode-id="3729" instrument_node="">conditions that at the time he applies for retirement, he has rendered at least twenty (20)</span><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">years of service and still has, at most, twenty-four (24) months of service remaining before</span><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node="">the compulsory retirement age as provided by existing law for his office.</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">Phase III ? Adjustment of ranks and establishment of one (1) lineal roster of officers and</span><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node="">another for non-officers, and the rationalization of compensation and retirement systems;</span><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node="">taking into consideration the existing compensation schemes and retirement and</span><br data-dcnode-id="3718"><span data-dcnode-id="3717" instrument_node="">separation benefit systems of the different components of the PNP, to ensure that no</span><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">member of the PNP shall suffer any diminution in basic longevity and incentive pays,</span><br data-dcnode-id="3714"><span data-dcnode-id="3713" instrument_node="">allowances and retirement benefits due there before the creations of the PNP, to be</span><br data-dcnode-id="3712"><span data-dcnode-id="3711" instrument_node="">completed within eighteen (18) months from the effectivity of this Act. To accomplish the</span><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node="">task of Phase III, the Commission shall create a Board of officers composed of the</span><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">following: NAPOLCOM Commissioner as Chairman and one (1) representative each for</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node="">the PC, Budget and Management.</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">Upon the effectivity of this Act, the Secretary shall exercise administrative supervision as</span><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">well as operational control over the transferred, merged and/or absorbed AFP and INP</span><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">units. The incumbent Director General of the PC-INP shall continue to act as Director</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node="">General of the PNP until such time as he shall have been replaced by the President.</span><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node="">Section 86. Assumption by the PNP of Police Functions. ? The PNP shall absorb the functions</span><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">fof the PC, the INP and the Narcotics Command upon the effectivity of this Act.</span><br data-dcnode-id="3692"><span data-dcnode-id="3691" instrument_node="">All functions of the PAFSECOM and the police functions of the Coast Guard shall be taken over</span><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">by the PNP when it acquires the capability to perform such functions after the transition period of</span><br data-dcnode-id="3688"><span data-dcnode-id="3687" instrument_node="">eighteen (18) months. The personnel of the PAFSECOM or the Coast Guard shall, within the</span><br data-dcnode-id="3686"><span data-dcnode-id="3685" instrument_node="">transition period, have the option to join the PNP or remain with the PAFSECOM or the Coast</span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">Guard, as the case may be.</span><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">Section 87. Absorption by the Department of the National Action Committee on Anti-Hijacking. ?</span><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">Page 25 of 27 R.A. 6975</span><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">The Department shall absorb the National Action Committee on Anti-Hijacking under the</span><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">Department of National Defense, and the transfer of assets, personnel and accountabilities of</span><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">this office to the Department shall proceed in accordance with the provisions of this chapter.</span><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">Section 88. Transfer, Merger, and Absorption of Offices and Personnel. ? All properties,</span><br data-dcnode-id="3668"><span data-dcnode-id="3667" instrument_node="">equipment, finances of the transferred and absorbed agencies, including their respective</span><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">accountabilities, are hereby transferred to the Department.</span><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">The transfer, merger and/or absorption of any government office/unit concerned shall include the</span><br data-dcnode-id="3662"><span data-dcnode-id="3661" instrument_node="">functions, appropriations, funds, records, equipment, facilities, choses in action, rights, other</span><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">assets, and liabilities, if any, of the transferred Office/unit as well as the personnel thereof, who</span><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">shall; unless removed for cause and after due process; in a holdover capacity, continue to</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">perform their respective duties and responsibilities and receive their corresponding salaries and</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">benefits. Those personnel of the transferred, merged, and/or absorbed office/unit whose</span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">positions are not included in the new position structure and staffing pattern approved by the</span><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node="">Department or who are not reappointed shall be given preference to join the Department or any</span><br data-dcnode-id="3648"><span data-dcnode-id="3647" instrument_node="">of the offices thereunder or shall be allowed to retire under existing laws, rules and regulations.</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">Otherwise, they shall be deemed separated and paid gratuity equivalent to one and one-fourth</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">(11/4) months basic salary for every year of service or a fraction thereof.</span><br data-dcnode-id="3642"><span data-dcnode-id="3641" instrument_node="">The personnel of the existing Department of Local Government shall, unless removed for cause</span><br data-dcnode-id="3640"><span data-dcnode-id="3639" instrument_node="">and after due process, continue to perform their duties and responsibilities and shall receive</span><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">their corresponding salaries and benefits.</span><br data-dcnode-id="3636"><span data-dcnode-id="3635" instrument_node="">The heads of the various bureaus and offices created under this Act shall, within six (6) months</span><br data-dcnode-id="3634"><span data-dcnode-id="3633" instrument_node="">from the effectivity of this Act, recommended the organizational structure and staffing pattern of</span><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">their bureaus, and offices for approval by the Secretary.</span><br data-dcnode-id="3630"><span data-dcnode-id="3629" instrument_node="">Section 89. Compulsory Retirement for INP Members. ? Any provision hereof to the contrary</span><br data-dcnode-id="3628"><span data-dcnode-id="3627" instrument_node="">notwithstanding and within the transition period of four (4) years following the effectivity of this</span><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">Act, the following members of the INP shall be considered compulsorily retired:</span><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">(a) Those who shall attain the age of sixty (60) on the first year of the effectivity of this Act.</span><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">(b) Those who shall attain the age of fifty-nine (59) on the second year of the effectivity of</span><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">this Act; and</span><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">(c) Those who shall attain the age of fifty-eight (58) on the third year of the effectivity of</span><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">this Act.</span><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">(d) Those who shall attain the age of fifty-seven (57) on the fourth year of the effectivity of</span><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">this Act.</span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">Section 90. Status of Present NAPOLCOM, PC-INP. ? Upon the effectivity of this Act, the</span><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">present National Police Commission, and the Philippine Constabulary-Integrated National Police</span><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">shall cease to exist. The Philippine Constabulary, which is the nucleus of the integrated</span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">Philippine Constabulary-Integrated National Police, shall cease to be a major service of the</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">Armed Forces of the Philippines. The Integrated National Police, which is the civilian component</span><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">of the Philippine Constabulary-Integrated National Police, shall cease to be the national police</span><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node="">force and in lieu thereof, a new police force shall be established and constituted pursuant to this</span><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">Act.</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">CHAPTER IX</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">FINAL PROVISIONS</span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">Page 26 of 27 R.A. 6975</span><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">fSection 91. Application of Civil Service Laws. ? The Civil Service Law and its implementing</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">rules and regulations shall apply to all personnel of the Department.</span><br data-dcnode-id="3582"><span data-dcnode-id="3581" instrument_node="">Section 92. Funding. ? For purpose of organizing and constituting the Department, and for</span><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">carrying out the provisions of this Act, the appropriations of the abolished, transferred or</span><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">reconstituted offices for the current fiscal year shall be transferred to the Department. Thereafter,</span><br data-dcnode-id="3576"><span data-dcnode-id="3575" instrument_node="">such as may be necessary to carry out the provisions of this Act shall be included in the annual</span><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">General Appropriations Act.</span><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">Section 93. Implementing Rules and Regulations. ? Within ninety (90) days from his</span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node="">appointment, the Secretary shall promulgate rules and regulations necessary to ensure the</span><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">effective implementation of this Act.</span><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">Section 94. Separability Clause. ? If any portion or provision of this Act is declared</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">unconstitutional, the same shall not effect the validity and effectivity of the other provisions not</span><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">affected thereby.</span><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">Section 95. Repealing Clause. ? All laws, decrees, executive orders, rules and regulations, and</span><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">other issuances or parts thereof which are inconsistent with this Act hereby repealed, amended</span><br data-dcnode-id="3556"><span data-dcnode-id="3555" instrument_node="">or modified accordingly.</span><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">The provisions of Executive Order No. 262 shall remain valid insofar as they are not inconsistent</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">with the provisions of this Act.</span><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node="">Section 96. Effectivity. ? This Act shall take effect after fifteen (15) days following its publication</span><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">in two (2) national newspapers of general circulation.</span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">Approved: December 13, 1990</span><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">The Lawphil Project - Arellano Law Foundation</span><br data-dcnode-id="3542"><span data-dcnode-id="3541" instrument_node="">Page 27 of 27 R.A. 6975</span><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><p data-dcnode-id="3538"></p><p data-dcnode-id="3537"></p><h2 data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">RA 9263 and its IRR</span></h2><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">f                                         Republic of the Philippines</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">                                         Congress of the Philippines</span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node="">                                               Metro Manila</span><br data-dcnode-id="3528"><span data-dcnode-id="3527" instrument_node="">                                              Twelfth Congress</span><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">                                            Third Regular Session</span><p data-dcnode-id="3524"></p><p data-dcnode-id="2996"><span data-dcnode-id="3523" instrument_node="">Begun and held in Metro Manila, on Monday, the twenty-eight day of July, two thousand three.</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">Republic Act No. 9263         March 10, 2004</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">  AN ACT PROVIDING FOR THE PROFESSIONALIZATION OF THE BUREAU OF FIRE PROTECTION (BFP) AND</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">   THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), AMENDING CERTAIN, PROVISIONS OF</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">          REPUBLIC ACT NO. 6975, PROVIDING FUNDS THEREOF AND FOR OTHER PURPOSES</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">Be it enacted by the Senate and House of Representatives of the Philippines in Congress assembled:</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">SECTION 1. Title. - This Act shall be known as the "Bureau of Fire Protection and Bureau of Jail Management</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node="">and Penology Professionalization Act of 2004."</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">SEC 2. Declaration of Policy and Principles. – It is declared policy of the state to maintain peace and order,</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">protect life, liberty and property, and promote the general welfare essential for the enjoyment by all the</span><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">people of the blessings of democracy (Article II, Section 5 of the Philippine Constitution) Moreover it</span><br data-dcnode-id="3502"><span data-dcnode-id="3501" instrument_node="">recognizes the responsibility of the state to strengthen government capability aimed towards the</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">strengthening of the delivery of basic services to the citizenry though the institutionalization of highly</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">efficient and competent fire and jail services.</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">It is provided for under Republic Act No. 6975, other wise known as the "Department of the Interior and</span><br data-dcnode-id="3494"><span data-dcnode-id="3493" instrument_node="">Local Government Act 1990", that the task of fire protection, and jail management and penology shall be</span><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node="">the responsibility of the Bureau of Fire Protection (BFP) and the Bureau of Jail Management and Penology</span><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node="">(BJMP), respectively.</span><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">Moreover, Section 3 of the Republic Act No. 8551, otherwise known as the "Philippine National Police</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">Reform and Reorganization Act of 1998", provides that in times of national emergency, BFP and the BJMP</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">along with the Philippine National Police (PNP) shall, upon the direction of the President, assist the Armed</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">Forces of the Philippines (AFP) in meeting the national emergency, in addition to the performance of their</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">inherent functions as mandated by law.</span><br data-dcnode-id="3478"><span data-dcnode-id="3477" instrument_node="">It is therefore recognized that the uniformed personnel of the BFP and the BJMP, as member of the</span><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">uniformed service of the government under the Department of the Interior and Local Government (DILG),</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">are required the same amount of sacrifice, service and dedication like their counterparts in the4 PNP and</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">the AFP to carry out their respective duties to the extent of risking their lives and limbs.</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">Towards this end, the State shall provide for the Professionalization and restructuring of the BFP and the</span><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">BJMP by upgrading the level of qualifications of their uniformed personnel and standardizing their base pay,</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node="">retirement and other benefits, making it at par with those of the PNP and the AFP.</span><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node="">SEC. 3. Organization and Key Positions of the BFP and the BJMP. – The BFP and the BJMP shall be</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">respectively headed by a Chief who shall be assisted by two (2) deputy chiefs, one (1) for administration and</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">one (1) for operations, all of whom shall be appointed by the President upon recommendation of the</span><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">Secretary of the DILG from among the qualified officers with at least the rank of senior superintendent in</span><br data-dcnode-id="3456"><span data-dcnode-id="3455" instrument_node="">the service: Provided, that in no case shall any officer who has retired or is retirable within six (6) months</span><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">from his/her compulsory retirement age be appointed as Chief of the Fire Bureau or Chief of the Jail Bureau,</span><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">as the case may be, Provided, further, that the Chief of the Fire Bureau and Chief of the Jail Bureau shall</span><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">serve a tour of duty not to exceed four (4) years: Provided, however, that in times of war or other national</span><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">emergency declared by Congress, the President may extend such tour of duty.</span><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">The Heads of the BFP and the BJMP with the rank of director shall have the position title of Chief of the Fire</span><br data-dcnode-id="3444"><span data-dcnode-id="3443" instrument_node="">Bureau and the Chief of the Jail Bureau, respectively. The second officers in command of the BFP and the</span><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">fBJMP with the rank of chief superintendent shall have the position title of Deputy Chief for Administration</span><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">of the Jail Bureau, respectively. The third officer in command of the BFP and the BJMP with the rank of chief</span><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">superintendent shall have the position title of Deputy Chief for Operation of Fire Bureau and Deputy Chief</span><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">for Operation of the Jail Bureau, respectively. The fourth officers in command of the BFP and the BJMP with</span><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">the rank of chief superintendent shall have the respective position title of Chief of Directorial Staff of the</span><br data-dcnode-id="3432"><span data-dcnode-id="3431" instrument_node="">Fire Bureau and Chief of Directorial Staff of the Jail Bureau, who shall be assisted by the directors of the</span><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">directorates in the respective national headquarters office with at least the rank of senior superintendent.</span><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">The BFP and the shall establish, operate and maintain their respective regional offices in each of the</span><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">administrative regions of the country which shall be respectively headed by a Regional Director for Fire</span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">Protection and a Regional Director of Jail Management and Penology with the rank of senior</span><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">superintendent. He/She shall be respectively assisted by the following officers with the rank of</span><br data-dcnode-id="3420"><span data-dcnode-id="3419" instrument_node="">superintendent: Assistant Regional Director for Administration, Assistant Regional Director for Operations,</span><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">and Regional Chief of Directorial Staff.</span><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">SEC. 4. Professionalization and Upgrading of Qualification Standards in the Appointment of Uniformed</span><br data-dcnode-id="3414"><span data-dcnode-id="3413" instrument_node="">Personnel to the BFP and the BJMP. – No person shall be appointed as uniformed personnel of the BFP and</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">the BJMP unless he/she possesses the following minimum qualifications:</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">        a) A citizen of the Republic of the Philippines;</span><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">        b) A person of good moral character;</span><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">        c) Must have passed the psychiatric/psychological, drug and physical test for the purpose of</span><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">        determining his/her physical and mental health;</span><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">        d) Must possess a baccalaureate degree from recognized institution of learning;</span><br data-dcnode-id="3400"><span data-dcnode-id="3399" instrument_node="">        e) Must possess the appropriate civil service eligibility;</span><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">        f) Must not have been dishonorably discharged of dismissal for cause from previous employment;</span><br data-dcnode-id="3396"><span data-dcnode-id="3395" instrument_node="">        g) Must not have been convicted by final judgement of an offense or crime involving moral</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">        turpitude;</span><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">        h) Must be at least one meter and sixty-two centimeters (1.62 m.) in height for male, and one meter</span><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">        and fifty-seven centimeters (1.57 m.) for female: Provided, That a waiver for height and age</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">        requirement \s shall be automatically granted to applicants belonging to the cultural communities;</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">        and</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">        i) Must weight not more or less than five kilograms (5 kgs.) from the standard weight corresponding</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">        to his/her height, age and sex;</span><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">Provided, That a new applicants must be less than twenty one (21) nor more than thirty (30 years of age:</span><br data-dcnode-id="3378"><span data-dcnode-id="3377" instrument_node="">except for this particular provision, the above–enumerated qualifications shall be continuing in character</span><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">and an absence of any one of them at any given time shall be ground for separation or retirement from the</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">service: Provided,further, That the uniformed personnel who are already in the service upon the effectivity</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">of this Act shall be given five (5) years to obtain the minimum educational qualification and one (1) year to</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">satisfy the weight requirement.</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">After the lapse of the time of period for the satisfaction of a specific requirement, current uniformed</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">personnel of the BFP and the BJMP who will fail to satisfy any of the requirements enumerated under this</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">Section shall be separated from the service if they are below fifty (50) years of age and have served in the</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">government for less than twenty (20) years, or retired if they are age fifty (50) and above and have served in</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">the government for at least twenty (20) years without prejudice in either case to the payment of benefits</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">they may be entitled to under existing laws.</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">SEC. 5. Appointment of Uniformed Personnel to the BFP and the BJMP. – The appointment of the BFP and</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">the BJMP shall be effected in the following manners:</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">        a) Fire/Jail Officer I to Senior Fire/Jail Officer IV. – Appointed by the respective Regional Director for</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">        Fire Protection and Regional Director for Jail Management and Penology for the regional office</span><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">f        uniformed personnel or by the respective Chief of the Fire Bureau and Chief of the Jail Bureau for</span><br data-dcnode-id="3346"><span data-dcnode-id="3345" instrument_node="">        the national headquarters office uniformed personnel, and attested by the Civil Service Commission</span><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">        (CSC);</span><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">        b) "Fire/Jail Inspector to Fire/Jail Superintendent. – Appointed by the respective Chief of the Fire</span><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">        Bureau and Chief of the Jail Bureau, as recommended by their immediate superiors, and attested by</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">        the CSC;</span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">        c) Fire/Jail Senior Superintendent. – Appointed by the Secretary of the DILG upon recommendation</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">        of the respective Chief of the Fire Bureau and Chief of the Jail Bureau, with the proper attestation of</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">        the CSC; and</span><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">        d) Fire/ Jail Chief Superintendent. To Fire/Jail Director.- Appointed by the President upon</span><br data-dcnode-id="3328"><span data-dcnode-id="3327" instrument_node="">        recommendation of the Secretary of the DILG, with the proper endorsement by the Chairman of the</span><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">        CSC.</span><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">SEC. 6. Lateral Entry of Officer into the BFP and the BJMP. – In general, all original appointments of officers</span><br data-dcnode-id="3322"><span data-dcnode-id="3321" instrument_node="">in the Fire Bureau and Jail Bureau shall commence the rank of fire/jail inspector wherein applicants for</span><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">lateral entry into the BFP shall include all those with highly specialized and technical qualifications such as,</span><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">but not limited to, civil engineers, mechanical engineers, electrical engineers, chemical engineers, chemist,</span><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">architects, criminologists, certified public accountants, nurses, physical therapists, and dentists, while</span><br data-dcnode-id="3314"><span data-dcnode-id="3313" instrument_node="">applicants for lateral entry into the BJMP shall include all those with highly specialized and technical</span><br data-dcnode-id="3312"><span data-dcnode-id="3311" instrument_node="">qualifications such as, but not limited to, social workers, psychologists, teachers, nurses, dentists and</span><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">engineers. Doctor of Medicine, members of the Philippine Bar and chaplains shall be appointed to the rank</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">of fire/jail senior inspector in their particular technical service. Graduate of the Philippine National Police</span><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">Academy (PNPA) shall be automatically appointed to the initial rank of fire/jail inspector.</span><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">SEC. 7. Professionalization and Upgrading of Qualification Standards in the Designation of Uniformed</span><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">Personnel of the BFP and the BJMP to Key Positions. -</span><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">        a) No person shall be designated to the following key positions of the BFP and the BJMP unless</span><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">        he/she has met the qualifications provided therein:</span><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">                1) Municipal Fire Marshal. – Should have the rank of senior inspector, who must have</span><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">                finished at least second year Bachelor of Laws or earned at least twelve (12) units in a</span><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">                master's degree program in public administration, management, engineering, public safety,</span><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">                criminology or other related discipline from recognized institution of learning, and must</span><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">                have satisfactory passed the necessary training of career courses for such position as may</span><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">                be established by the Fire Bureau;</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">                2) City Fire Marshal. - Should the rank of chief of senior inspector, who must have finished</span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">                at least second year Bachelor of Laws or earned at least twenty four (24) units in a master's</span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">                degree program in public administration, management, engineering, public safety,</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">                criminology or other related disciplines from recognized institution of learning, and must</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">                have satisfactory passed the necessary training or career courses for such position as may</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">                be established by the Fire Bureau;</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">                3) District Fire Marshal, Provincial Fire Marshal, Assistant Regional Director for</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">                Administration, Assistant Regional Director for Operations and Regional Chief of Directorial</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">                Staff. – Should have the rank of superintendent, who must be a graduate of Bachelor of</span><br data-dcnode-id="3266"><span data-dcnode-id="3265" instrument_node="">                Laws or a holder of a mater's degree in public administration, management, engineering,</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">                public safety, criminology or other related disciplines from recognized institution of</span><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">                learning, and must have satisfactory passed the necessary training or career courses for</span><br data-dcnode-id="3260"><span data-dcnode-id="3259" instrument_node="">                such position as may be established by the Fire Bureau;</span><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">                4) District Fire Marshal for the National Capital Region, Regional Director for Fire Protection</span><br data-dcnode-id="3256"><span data-dcnode-id="3255" instrument_node="">                and Director of the Directorate of the National Headquarters Office. – Should have at least</span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node="">                the rank of senior superintendent, who must be a graduate of Bachelor of Laws or a holder</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">                of master's degree in public administration, management, engineering, public safety,</span><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">f       criminology or other related disciplines from a recognized institution of learning, and must</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">       have satisfactory passed the necessary training or career course for such position as may be</span><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node="">       established by the Fire Bureau;</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">       5) Deputy Chief for Administration of the Fire Bureau, Deputy Chief for Operations of the</span><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">       Fire Bureau and Chief Directorial Staff of the Fire Bureau.- Should have the rank of</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">       superintendent, who must be a member of the Philippine Bar or a holder of a master's</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">       degree in public administration, management, engineering, public safety, criminology or</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">       other related disciplines from recognized institution of learning, and must have satisfactory</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">       passed the necessary training or career courses for such as may be established by the Fire</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">       Bureau; and</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">       6) Chief of the Fire Bureau. – Should have the rank of director, who must be a member of</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">       the Philippine Bar or a holder of a master's degree in public administration, management,</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">       engineering, public safety, criminology or other related discipline from a recognized</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">       institution of learning, and must satisfactory passed the necessary training or career courses</span><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">       for such position as may be established by the Fire Bureau.</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">b) No person shall be designated to the following key positions of the BJMP unless he/she has met</span><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">the qualification provided therein:</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">       1) Municipal Jail Warden. – Should have the rank of chief inspector, who have finished at</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">       least second year Bachelor of Laws or earned at least twelve (12) units in a master' degree</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">       program in management, public administration, public safety, criminology, penology,</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">       sociology, national security administration, defense studies, or other related disciplines from</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">       a recognized institution of learning, and must have satisfactory passed the necessary</span><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">       training or career courses for such position as may be established by the Jail Bureau;</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">       2) City Jail Warden. – Should have the rank of chief inspector, who must have finished at</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">       least second year Bachelor of Laws or earned at least twenty four (24) units in master's</span><br data-dcnode-id="3200"><span data-dcnode-id="3199" instrument_node="">       degree program in management, public administration, public safety, criminology, penology,</span><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">       sociology, national security administration, defense studies or related disciplines from a</span><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node="">       recognized institution of learning and must satisfactory passed the necessary training or</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">       career courses for such position as may be established by the Jail Bureau: Provided, That in</span><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">       city jails with a population of one thousand (1,000) or more inmates, the city jail warden</span><br data-dcnode-id="3190"><span data-dcnode-id="3189" instrument_node="">       shall the rank and qualification of a district jail warden;</span><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">       3) District Jail Warden, Provincial Jail Administrator, Assistant Regional Director for</span><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">       Administration, Assistant Regional Director for Operations and Regional Chief of Directorial</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">       Staff. – Should have the rank of senior superintendent, who must be a graduate of Bachelor</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">       of Laws or a holder of a master's degree in management, public administration, public</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">       safety, criminology, penology, sociology, national security administration, defense studies or</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node="">       other related discipline from a recognized institution of learning, and must satisfactory</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node="">       passed the necessary training or career courses for such position as may be established by</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">       the Jail bureau;</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">       4) Regional Director for Jail Management and Penology and Director of the Directorate of</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">       the National Headquarters Office. – Should have the rank of senior superintendent, who</span><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node="">       must be a graduate of Bachelor of Laws or a holder of a master's degree in management,</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">       public administration, public safety, criminology, penology, sociology, national security</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">       administration, defense studies or other related discipline from a recognized institution of</span><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node="">       learning, and must satisfactory passed the necessary training or career courses for such</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node="">       position as may be established by the Jail bureau;</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">       5) Deputy Chief for Administration of the Jail Bureau, Deputy Chief for Operations of the Jail</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node="">       Bureau and Chief of Directorial Staff of the Jail Bureau. – Should have the rank of senior</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node="">       superintendent, who must be a member of the Philippine Bar or a holder of a master's</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node="">       degree in management, public administration, public safety, criminology, penology,</span><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">f                sociology, national security administration, defense studies or other related discipline from</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">                a recognized institution of learning, and must satisfactory passed the necessary training or</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">                career courses for such position as may be established by the Jail bureau; and</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">                6) Chief of the Jail Bureau. – Should have the rank of director, who must be a member of the</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">                Philippine Bar or a holder of a master's degree in management, public administration,</span><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node="">                public safety, criminology, penology, sociology, national security administration, defense</span><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">                studies or other related discipline from a recognized institution of learning, and must</span><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">                satisfactory passed the necessary training or career courses for such position as may be</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">                established by the Jail bureau.</span><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">Any uniformed personnel of the BFP and the BJMP who is currently occupying such position but lacks any of</span><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">the qualifications mentioned therein shall be given three(3) years upon the effectivity of this Act to comply</span><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">with the requirements, otherwise he/she shall be relieved from the position.</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">SEC. 8. Professionalization and Qualifications Upgrading Program. – The DILG shall design and establish a</span><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">professionalization and qualifications upgrading program for uniformed personnel of the BFP and the BJMP</span><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node="">in coordination with the CSC and the Commission on Higher Education (CHED) though an off-campus</span><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">education program or other similar programs within ninety (90) days from the effectivity of this Act.</span><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node="">SEC. 9. Attrition System for the Uniformed Personnel of the BFP and the BJMP. - There shall be established</span><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node="">a system of attrition for the uniformed personnel of the BFP and the BJMP within one (1) year from the</span><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">effectivty of this Act to be submitted by said bureaus to the DILG for approval. Such attrition system shall</span><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">include, but is not limited to, the provision of the following principles:</span><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node="">        a) Attrition by Demotion in Position or Rank. – Any uniformed personnel of the BFP and the BJMP</span><br data-dcnode-id="3108"><span data-dcnode-id="3107" instrument_node="">        who is relieved and assigned to a position lower than that is established for his/her grade in the</span><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">        respective staffing pattern of the Fire Bureau and the Jail Bureau, and who shall not be assigned to a</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">        position commensurate to his/her grade within two (2) years after such demotion in position shall</span><br data-dcnode-id="3102"><span data-dcnode-id="3101" instrument_node="">        be separated or retired from the service;</span><br data-dcnode-id="3100"><span data-dcnode-id="3099" instrument_node="">        b) Attrition by Non-Promotion. – Any uniformed personnel of the BFP and the BJMP who has not</span><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">        been promoted for a continuous period of ten (10) years shall be separated or retired from the</span><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node="">        service, except for those who are occupying a third-level position;</span><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">        c) Attrition by Other Means. – Any uniformed personnel of the BFP and the BJMP with at least five</span><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">        (5) years of accumulated active service shall be separated from the service based on any of the</span><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node="">        following factors:</span><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">                1) Inefficiency based on poor performance during the last two (2) successive semestral</span><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">                ratings period;</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">                2) Inefficiency based on poor performance for three (3) cumulative semestral rating period;</span><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">                3) Physical and/or mental incapacity to perform his/her duties and functions; or</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">                4) Failure to complete the required career courses and/or appropriate civil service eligibility</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">                for his/her position except for justifiable; and</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">        d) Separation or Retirement from the Fire Bureau and the Jail Bureau under this Section. – Any</span><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node="">        personnel who is dismissed from the BFP and the BJMP pursuant to the above-enumerated</span><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node="">        principles in this Section shall be separated if he/she has rendered less than twenty (20) years of</span><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">        service, and be retired if he/she has rendered at least twenty (20) years of service unless the</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">        concerned personnel is disqualified by law to receive such benefits.</span><br data-dcnode-id="3066"><span data-dcnode-id="3065" instrument_node="">SEC. 10. Promotion System for the Uniformed Personnel of the BFP and BJMP. – Within six (6) months after</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">the effectivity of this Act, the DILG shall establish a system of promotion for the uniformed personnel of the</span><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">BFP and the BJMP though the following principles:</span><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">        a) Rationalized Promotion System. – The system of promotion shall be based on merits and on the</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">        availability of vacant ranks in the BFP and the BJMP staffing pattern. Such system shall be gender-</span><br data-dcnode-id="3056"><span data-dcnode-id="3055" instrument_node="">f       fair so as to ensure that women personnel of the Fire Bureau and the Jail Bureau shall enjoy equal</span><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">       opportunity for promotion as to men;</span><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">       b) Requirement for Promotion. -</span><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">                1) Any personnel of the BFP and the BJMP shall not eligible for promotion to a higher rank</span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">                unless he/she has met the minimum qualification standards or the appropriate civil service</span><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">                eligibility set by the CSC, and has the satisfactorily passed the required</span><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">                psychiatric/psychological, drug and physical test;</span><br data-dcnode-id="3042"><span data-dcnode-id="3041" instrument_node="">                2) Any personnel of the BFP and the BJMP who has exhibited act of conspicuous courage</span><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">                and gallantry at the risk his/her life above and beyond the call of duty, or selected as such in</span><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">                a nationwide search conducted by any accredited civic organization, shall be promoted to</span><br data-dcnode-id="3036"><span data-dcnode-id="3035" instrument_node="">                the next higher rank,Provided, That these shall be validated by the DILG and the CSC based</span><br data-dcnode-id="3034"><span data-dcnode-id="3033" instrument_node="">                on established criteria.</span><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">SEC. 11. Performance Evaluation System. - There shall be established a performance evaluation system</span><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node="">which shall be administered with accordance with the rules, regulations and standards, and a code of</span><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">conduct for the uniformed personnel of the BFP and the BJMP to be promulgated by the Fire Bureau and</span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">the Jail Bureau through the DILG. Such performance evaluation system shall be administered in such a way</span><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">as to foster the improvement of the individual efficiency and behavioral discipline as well as the promotion</span><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">of organizational effectiveness and commitment to service.</span><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">The rating system as contemplated herein shall be based on standard prescribed by the Fire Bureau and the</span><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">Jail Bureau through the DILG and shall be consider the result of the annual psychiatric/psychological and</span><br data-dcnode-id="3016"><span data-dcnode-id="3015" instrument_node="">physical test conducted on the uniformed personnel of the BFP and the BJMP.</span><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">SEC. 12. Standardization of the Base Pay, Retirement and other Benefits of the Uniformed Personnel of</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">the BFP and the BJMP. – In order to enhance the general welfare, commitment to service and</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">professionalism of the uniformed personnel of the BFP and the BJMP, they shall receive the minimum</span><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">starting salary equivalent to the salary grade level of the corresponding rank classification of their</span><br data-dcnode-id="3006"><span data-dcnode-id="3005" instrument_node="">counterparts in the PNP, as provided under Section 36 of Republic Act No. 8551, and in the AFP, as provided</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">under Section 2 of Republic Act No. 9166.</span><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">The rate of the base pay of the uniformed personnel of the BFP and the BJMP shall be adjusted in</span><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">accordance with the following salary grade schedule:</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">        RANK SALARY                                GRADE</span></p><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">        Fire/Jail Director                              28</span></p><p data-dcnode-id="2993"></p><h2 data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">        Fire/Jail Chief Superintendent                  27</span></h2><p data-dcnode-id="2990"></p><p data-dcnode-id="2989"></p><h2 data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">        Fire/Jail Senior Superintendent                 26</span></h2><p data-dcnode-id="2986"></p><p data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">        Fire/Jail Superintendent                        25</span></p><p data-dcnode-id="2983"></p><h2 data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">        Fire/Jail Chief Inspector                       24</span></h2><p data-dcnode-id="2980"></p><p data-dcnode-id="2979"></p><h2 data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">        Fire/Jail Senior Inspector                      23</span></h2><p data-dcnode-id="2976"></p><p data-dcnode-id="2975"></p><h2 data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">        Fire/ Jail Inspector                            22</span></h2><p data-dcnode-id="2972"></p><p data-dcnode-id="2971"></p><h2 data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">        Senior Fire/Jail Officer IV                     19</span></h2><br data-dcnode-id="2968"><span data-dcnode-id="2967" instrument_node="">f        Senior Fire/Jail Officer III                       18</span><p data-dcnode-id="2966"></p><p data-dcnode-id="2965"></p><h2 data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">        Senior Fire/Jail Officer II                        17</span></h2><p data-dcnode-id="2962"></p><p data-dcnode-id="2961"></p><h2 data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">        Senior Fire/Jail Officer I                         16</span></h2><p data-dcnode-id="2958"></p><p data-dcnode-id="2957"></p><h2 data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">        Fire/ Jail Officer III                             14</span></h2><p data-dcnode-id="2954"></p><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">        Fire/Jail Officer II                               12</span></p><p data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">        Fire/Jail Officer I                                10</span></p><p data-dcnode-id="2900"><span data-dcnode-id="2949" instrument_node="">Provided, That all benefits currently receive by the uniformed personnel of the BFP and the BJMP under</span><br data-dcnode-id="2948"><span data-dcnode-id="2947" instrument_node="">existing laws shall continue to be received by them: Provided, Further, That their retirement pay shall be</span><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">subject to adjustment/s based on the prevailing scale of base pay of the uniformed personnel in the active</span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">service.</span><br data-dcnode-id="2942"><span data-dcnode-id="2941" instrument_node="">SEC. 13. Implementation. – The implementation of this Act shall be undertaken in staggered phases, but</span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">not to exceed three (3) years, taking into consideration the financial position of the national</span><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">government: Provided, That any partial implementation shall be uniform and proportionate for all ranks.</span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">SEC. 14. Implementation Rules and Regulations. – The DILG in coordination with the BFP and the BJMP, the</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">CSC, the Department of Budget and Management (DBM), and the Department of Finance (DOF) shall,</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">within ninety (90) days from the effectivity of this Act, promulgate the rules and regulations necessary to</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node="">implement the provision of this Act.</span><br data-dcnode-id="2928"><spa
