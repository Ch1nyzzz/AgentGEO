d="7050"><span data-dcnode-id="7049" instrument_node="">             approved.</span><br data-dcnode-id="7048"><span data-dcnode-id="7047" instrument_node="">         3. No building shall be altered nor arranged so as to reduce the size of any room or the</span><br data-dcnode-id="7046"><span data-dcnode-id="7045" instrument_node="">             relative area of windows to less than that provided for buildings, or to create an additional</span><br data-dcnode-id="7044"><span data-dcnode-id="7043" instrument_node="">             room unless it conforms to the requirements of this Rule.</span><br data-dcnode-id="7042"><span data-dcnode-id="7041" instrument_node="">         4. No building shall be enlarged so that the dimensions of the required court or yard would be</span><br data-dcnode-id="7040"><span data-dcnode-id="7039" instrument_node="">             less than what is prescribed for such building lot.</span></p><p data-dcnode-id="7037"></p><h2 data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">   3. Percentage of Site Occupancy (PSO)</span></h2><br data-dcnode-id="7034"><span data-dcnode-id="7033" instrument_node="">          1. Maximum site occupancy shall be governed by use, type of construction and height of the</span><br data-dcnode-id="7032"><span data-dcnode-id="7031" instrument_node="">             building and the use, area, nature and location of the site and subject to local zoning</span><br data-dcnode-id="7030"><span data-dcnode-id="7029" instrument_node="">             requirements.</span><p data-dcnode-id="7028"></p><p data-dcnode-id="7027"></p><h2 data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">   4. Minimum Requirements for Total Open Spaces within Lot (TOSL)</span></h2><p data-dcnode-id="7024"></p><p data-dcnode-id="6974"><span data-dcnode-id="7023" instrument_node="">               ◦ Group A buildings or Residential 1 (R-!) uses shall follow the minimum yard standards in</span><br data-dcnode-id="7022"><span data-dcnode-id="7021" instrument_node="">                 Table VIII.6.1 to comply with the TOSL.</span><br data-dcnode-id="7020"><span data-dcnode-id="7019" instrument_node="">f5. Sizes and dimensions of courts and yards</span><br data-dcnode-id="7018"><span data-dcnode-id="7017" instrument_node="">       1. Minimum horizontal dimension of courts and yards shall be not less than two m. all inner</span><br data-dcnode-id="7016"><span data-dcnode-id="7015" instrument_node="">           courts shall be connected to a street or yard, either by a passageway with a minimum width</span><br data-dcnode-id="7014"><span data-dcnode-id="7013" instrument_node="">           of 1.20 m or by a door through a room or rooms.</span><br data-dcnode-id="7012"><span data-dcnode-id="7011" instrument_node="">       2. Abutments on the side and rear property lines may be allowed provided that the following</span><br data-dcnode-id="7010"><span data-dcnode-id="7009" instrument_node="">           requirements are first complied with:</span><br data-dcnode-id="7008"><span data-dcnode-id="7007" instrument_node="">               1. Open space as prescribed in Tables VIII.5.1 and VIII.6.1</span><br data-dcnode-id="7006"><span data-dcnode-id="7005" instrument_node="">               2. Window opening as prescribed in Section 10</span><br data-dcnode-id="7004"><span data-dcnode-id="7003" instrument_node="">               3. Firewall with a minimum of two hours fire-resistive rating constructed with a</span><br data-dcnode-id="7002"><span data-dcnode-id="7001" instrument_node="">                   minimum height clearance of 0.40 m above the roof. Fig. VIII.6.1</span><br data-dcnode-id="7000"><span data-dcnode-id="6999" instrument_node="">               4. The required open space shall be located totally or distributed anywhere within the</span><br data-dcnode-id="6998"><span data-dcnode-id="6997" instrument_node="">                   lot in such a manner as to provide maximum light and ventilation into the building</span><br data-dcnode-id="6996"><span data-dcnode-id="6995" instrument_node="">                   (Fig. VIII.6.2 to VIII.6.5).</span><br data-dcnode-id="6994"><span data-dcnode-id="6993" instrument_node="">               5. Every court shall have a width of not less than 2 m for one or two storey buildings,</span><br data-dcnode-id="6992"><span data-dcnode-id="6991" instrument_node="">                   however this may be reduced to 1.50 m in case of quadruplexes, rowhouses with</span><br data-dcnode-id="6990"><span data-dcnode-id="6989" instrument_node="">                   adjacent courts with an area of not less than 3.00 sq.m. provided that the</span><br data-dcnode-id="6988"><span data-dcnode-id="6987" instrument_node="">                   separation fence shall not be higher than 2.00 m. irregularly-shaped lots may be</span><br data-dcnode-id="6986"><span data-dcnode-id="6985" instrument_node="">                   exempted from having a minimum width of not less than what is required in Table</span><br data-dcnode-id="6984"><span data-dcnode-id="6983" instrument_node="">                   VIII.5.2 and as shown in Figures VIII.6.6, VIII.6.7, VIII.6.8 and VIII.6.9.</span><br data-dcnode-id="6982"><span data-dcnode-id="6981" instrument_node="">               6. For buildings of more than two storeys in height, the minimum width of the rear or</span><br data-dcnode-id="6980"><span data-dcnode-id="6979" instrument_node="">                   side court shall be increased at the rate of 300 mm for each additional storey up to</span><br data-dcnode-id="6978"><span data-dcnode-id="6977" instrument_node="">                   the fourteenth storey. For buildings exceeding 14 storeys in height, the required</span><br data-dcnode-id="6976"><span data-dcnode-id="6975" instrument_node="">                   width of the court shall be computed on the basis of 14 storeys.</span></p><p data-dcnode-id="6958"><span data-dcnode-id="6973" instrument_node="">6. Ceiling Heights</span><br data-dcnode-id="6972"><span data-dcnode-id="6971" instrument_node="">        1. Habitable rooms provided with artificial ventilation shall have ceiling heights not less than</span><br data-dcnode-id="6970"><span data-dcnode-id="6969" instrument_node="">            2.40m. For buildings of more than 1 storey, the minimum ceiling height of the first storey</span><br data-dcnode-id="6968"><span data-dcnode-id="6967" instrument_node="">            shall be 2.70 m, for the second storey, 2.40 m. and for the succeeding storeys, 2.10</span><br data-dcnode-id="6966"><span data-dcnode-id="6965" instrument_node="">            m. Above-stated rooms with natural ventilation shall have ceiling heights of not less than</span><br data-dcnode-id="6964"><span data-dcnode-id="6963" instrument_node="">            2.70m.</span><br data-dcnode-id="6962"><span data-dcnode-id="6961" instrument_node="">        2. Mezzanine floors shall have a clear ceiling height of not less than 1.80 m above and below</span><br data-dcnode-id="6960"><span data-dcnode-id="6959" instrument_node="">            it.</span></p><p data-dcnode-id="6957"></p><h2 data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">7. Sizes and Dimension of Rooms</span></h2><br data-dcnode-id="6954"><span data-dcnode-id="6953" instrument_node="">       1. Minimum sizes of rooms and their least horizontal dimensions shall be as follows:</span><br data-dcnode-id="6952"><span data-dcnode-id="6951" instrument_node="">               1. Rooms for human habitation “ 6.00 sq.m. with a least dimension of 2.00 m.</span><br data-dcnode-id="6950"><span data-dcnode-id="6949" instrument_node="">               2. Kitchen “ 3.00 sq. m. with a least dimension of 1.50 m.</span><br data-dcnode-id="6948"><span data-dcnode-id="6947" instrument_node="">               3. Bath and Toilet “ 1.20 sq. m. with a least dimension of 900mm.</span><p data-dcnode-id="6946"></p><p data-dcnode-id="6924"><span data-dcnode-id="6945" instrument_node="">8. Window Openings</span><br data-dcnode-id="6944"><span data-dcnode-id="6943" instrument_node="">      1. Rooms intended for any use not provided with artificial ventilation shall be provided with a</span><br data-dcnode-id="6942"><span data-dcnode-id="6941" instrument_node="">         window with a total free area equal to at least 10% of the floor area of the room but not</span><br data-dcnode-id="6940"><span data-dcnode-id="6939" instrument_node="">         less than 1.00 sq.m. Toilet and bath rooms and laundry rooms shall be provided with</span><br data-dcnode-id="6938"><span data-dcnode-id="6937" instrument_node="">         window with an area not less than 1/20 of the floor area but not less than 240 sq.mm. Such</span><br data-dcnode-id="6936"><span data-dcnode-id="6935" instrument_node="">         windows shall open directly to a court, yard, public street or alley or open watercourse.</span><br data-dcnode-id="6934"><span data-dcnode-id="6933" instrument_node="">      2. Eaves, canopies, awnings over required windows shall not be less than 750 mm from the</span><br data-dcnode-id="6932"><span data-dcnode-id="6931" instrument_node="">         side and rear property lines.</span><br data-dcnode-id="6930"><span data-dcnode-id="6929" instrument_node="">      3. There shall absolutely be no openings on/at/within/through all types of abutments</span><br data-dcnode-id="6928"><span data-dcnode-id="6927" instrument_node="">         (firewalls) erected along property lines except for permitted vent wells (3.00 m x 1.50 m).</span><br data-dcnode-id="6926"><span data-dcnode-id="6925" instrument_node="">f    9. Roads Right-of-Way (RROW) Access Streets</span></p><p data-dcnode-id="6920"><span data-dcnode-id="6923" instrument_node="">9.1 No building shall be constructed unless it adjoins or has direct access to public space, yard or</span><br data-dcnode-id="6922"><span data-dcnode-id="6921" instrument_node="">street/road on at least 1 of its sides. All buildings shall face a public street, alley or a road.</span></p><p data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">RULE 1X SANITATION</span></p><p data-dcnode-id="6910"><span data-dcnode-id="6917" instrument_node="">       All buildings shall be provided with adequate and potable water supply, plumbing installation and</span><br data-dcnode-id="6916"><span data-dcnode-id="6915" instrument_node="">        suitable wastewater treatment or disposal system, storm water drainage, pest and vermin control,</span><br data-dcnode-id="6914"><span data-dcnode-id="6913" instrument_node="">        noise abatement device and other measures for protection and promotion of health of persons</span><br data-dcnode-id="6912"><span data-dcnode-id="6911" instrument_node="">        occupying the premises and others living nearby.</span></p><p data-dcnode-id="6909"></p><h2 data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">RULE X BUILDING PROJECTION OVER PUBLIC STREET</span></h2><p data-dcnode-id="6906"></p><p data-dcnode-id="6905"></p><h2 data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">                        Footings and foundations may be permitted to project into alleys or streets</span></h2><br data-dcnode-id="6902"><span data-dcnode-id="6901" instrument_node="">                         provided the same shall not obstruct any existing utilities/services such as power,</span><br data-dcnode-id="6900"><span data-dcnode-id="6899" instrument_node="">                         water, sewer, gas, communication, and drainage lines</span><br data-dcnode-id="6898"><span data-dcnode-id="6897" instrument_node="">                        The horizontal clearance between the outermost edge of marquee and the curb</span><br data-dcnode-id="6896"><span data-dcnode-id="6895" instrument_node="">                         line shall be not less than 300 mm while the vertical clearance shall be not less than</span><br data-dcnode-id="6894"><span data-dcnode-id="6893" instrument_node="">                         3.00 m.</span><p data-dcnode-id="6892"></p><p data-dcnode-id="6891"></p><h2 data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">RULE XI PROTECTION OF PEDESTRIANS DURING CONSTRUCTION OR DEMOLITION</span></h2><p data-dcnode-id="6888"></p><p data-dcnode-id="6884"><span data-dcnode-id="6887" instrument_node="">               No person shall use or occupy a street, alley or public sidewalk for the performance of work</span><br data-dcnode-id="6886"><span data-dcnode-id="6885" instrument_node="">                covered by a building permit except in accordance with the provisions of this Rule.</span></p><p data-dcnode-id="6883"></p><h2 data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">RULE XII GENERAL DESIGN AND CONSTRUCTION REQUIREMENTS</span></h2><p data-dcnode-id="6880"></p><p data-dcnode-id="6876"><span data-dcnode-id="6879" instrument_node="">       All buildings shall be placed in or upon private property or duly designated public land and shall be</span><br data-dcnode-id="6878"><span data-dcnode-id="6877" instrument_node="">        securely constructed in conformance with the requirements of this Code.</span></p><p data-dcnode-id="6875"></p><h2 data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">BFP Citizens Charter, SOP/MC’s on Fire Safety Inspection</span></h2><p data-dcnode-id="6872"></p><p data-dcnode-id="6871"></p><h2 data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">       Fire Investigation (15%)</span></h2><br data-dcnode-id="6868"><span data-dcnode-id="6867" instrument_node="">The Law on Arson in the Philippines (RPC)</span><br data-dcnode-id="6866"><span data-dcnode-id="6865" instrument_node="">f                                                MALACAÑANG</span><br data-dcnode-id="6864"><span data-dcnode-id="6863" instrument_node="">                                                 Manila</span><br data-dcnode-id="6862"><span data-dcnode-id="6861" instrument_node="">PRESIDENTIAL DECREE No. 1613</span><br data-dcnode-id="6860"><span data-dcnode-id="6859" instrument_node="">                                       AMENDING THE LAW ON ARSON</span><br data-dcnode-id="6858"><span data-dcnode-id="6857" instrument_node="">WHEREAS, findings of the police and intelligence agencies of the government reveal that fires and other</span><br data-dcnode-id="6856"><span data-dcnode-id="6855" instrument_node="">crimes involving destruction in Metro Manila and other urban centers in the country are being perpetrated</span><br data-dcnode-id="6854"><span data-dcnode-id="6853" instrument_node="">by criminal syndicates, some of which have foreign connections;</span><br data-dcnode-id="6852"><span data-dcnode-id="6851" instrument_node="">WHEREAS, the current law on arson suffers from certain inadequacies that impede the successful</span><br data-dcnode-id="6850"><span data-dcnode-id="6849" instrument_node="">enforcement and prosecution of arsonists;</span><br data-dcnode-id="6848"><span data-dcnode-id="6847" instrument_node="">WHEREAS, it is imperative that the high incidence of fires and other crimes involving destruction be</span><br data-dcnode-id="6846"><span data-dcnode-id="6845" instrument_node="">prevented to protect the national economy and preserve the social, economic and political stability of the</span><br data-dcnode-id="6844"><span data-dcnode-id="6843" instrument_node="">country;</span><br data-dcnode-id="6842"><span data-dcnode-id="6841" instrument_node="">NOW, THEREFORE, I, FERDINAND E. MARCOS, President of the Philippines, by virtue of the powers vested in</span><br data-dcnode-id="6840"><span data-dcnode-id="6839" instrument_node="">me by the Constitution, do hereby order and decree as part of the law of the land, the following:</span><br data-dcnode-id="6838"><span data-dcnode-id="6837" instrument_node="">Section 1. Arson. Any person who burns or sets fire to the property of another shall be punished by Prision</span><br data-dcnode-id="6836"><span data-dcnode-id="6835" instrument_node="">Mayor.</span><br data-dcnode-id="6834"><span data-dcnode-id="6833" instrument_node="">The same penalty shall be imposed when a person sets fire to his own property under circumstances which</span><br data-dcnode-id="6832"><span data-dcnode-id="6831" instrument_node="">expose to danger the life or property of another.</span><br data-dcnode-id="6830"><span data-dcnode-id="6829" instrument_node="">Section 2. Destructive Arson. The penalty of Reclusion Temporal in its maximum period to Reclusion</span><br data-dcnode-id="6828"><span data-dcnode-id="6827" instrument_node="">Perpetua shall be imposed if the property burned is any of the following:</span><br data-dcnode-id="6826"><span data-dcnode-id="6825" instrument_node="">       1. Any ammunition factory and other establishment where explosives, inflammable or combustible</span><br data-dcnode-id="6824"><span data-dcnode-id="6823" instrument_node="">       materials are stored.</span><br data-dcnode-id="6822"><span data-dcnode-id="6821" instrument_node="">       2. Any archive, museum, whether public or private, or any edifice devoted to culture, education or</span><br data-dcnode-id="6820"><span data-dcnode-id="6819" instrument_node="">       social services.</span><br data-dcnode-id="6818"><span data-dcnode-id="6817" instrument_node="">       3. Any church or place of worship or other building where people usually assemble.</span><br data-dcnode-id="6816"><span data-dcnode-id="6815" instrument_node="">       4. Any train, airplane or any aircraft, vessel or watercraft, or conveyance for transportation of</span><br data-dcnode-id="6814"><span data-dcnode-id="6813" instrument_node="">       persons or property</span><br data-dcnode-id="6812"><span data-dcnode-id="6811" instrument_node="">       4. Any building where evidence is kept for use in any legislative, judicial, administrative or other</span><br data-dcnode-id="6810"><span data-dcnode-id="6809" instrument_node="">       official proceedings.</span><br data-dcnode-id="6808"><span data-dcnode-id="6807" instrument_node="">       5. Any hospital, hotel, dormitory, lodging house, housing tenement, shopping center, public or</span><br data-dcnode-id="6806"><span data-dcnode-id="6805" instrument_node="">       private market, theater or movie house or any similar place or building.</span><br data-dcnode-id="6804"><span data-dcnode-id="6803" instrument_node="">       6. Any building, whether used as a dwelling or not, situated in a populated or congested area.</span><br data-dcnode-id="6802"><span data-dcnode-id="6801" instrument_node="">Section 3. Other Cases of Arson. The penalty of Reclusion Temporal to Reclusion Perpetua shall be imposed</span><br data-dcnode-id="6800"><span data-dcnode-id="6799" instrument_node="">if the property burned is any of the following:</span><br data-dcnode-id="6798"><span data-dcnode-id="6797" instrument_node="">       1. Any building used as offices of the government or any of its agencies;</span><br data-dcnode-id="6796"><span data-dcnode-id="6795" instrument_node="">       2. Any inhabited house or dwelling;</span><br data-dcnode-id="6794"><span data-dcnode-id="6793" instrument_node="">       3. Any industrial establishment, shipyard, oil well or mine shaft, platform or tunnel;</span><br data-dcnode-id="6792"><span data-dcnode-id="6791" instrument_node="">       4. Any plantation, farm, pastureland, growing crop, grain field, orchard, bamboo grove or forest;</span><br data-dcnode-id="6790"><span data-dcnode-id="6789" instrument_node="">       4. Any rice mill, sugar mill, cane mill or mill central; and</span><br data-dcnode-id="6788"><span data-dcnode-id="6787" instrument_node="">       5. Any railway or bus station, airport, wharf or warehouse.</span><br data-dcnode-id="6786"><span data-dcnode-id="6785" instrument_node="">Section 4. Special Aggravating Circumstances in Arson. The penalty in any case of arson shall be imposed in</span><br data-dcnode-id="6784"><span data-dcnode-id="6783" instrument_node="">its maximum period;</span><br data-dcnode-id="6782"><span data-dcnode-id="6781" instrument_node="">       1. If committed with intent to gain;</span><br data-dcnode-id="6780"><span data-dcnode-id="6779" instrument_node="">f        2. If committed for the benefit of another;</span><br data-dcnode-id="6778"><span data-dcnode-id="6777" instrument_node="">        3. If the offender is motivated by spite or hatred towards the owner or occupant of the property</span><br data-dcnode-id="6776"><span data-dcnode-id="6775" instrument_node="">        burned;</span><br data-dcnode-id="6774"><span data-dcnode-id="6773" instrument_node="">        4. If committed by a syndicate.</span><br data-dcnode-id="6772"><span data-dcnode-id="6771" instrument_node="">The offense is committed by a syndicate if its is planned or carried out by a group of three (3) or more</span><br data-dcnode-id="6770"><span data-dcnode-id="6769" instrument_node="">persons.</span><br data-dcnode-id="6768"><span data-dcnode-id="6767" instrument_node="">Section 5. Where Death Results from Arson. If by reason of or on the occasion of the arson death results,</span><br data-dcnode-id="6766"><span data-dcnode-id="6765" instrument_node="">the penalty of Reclusion Perpetua to death shall be imposed.</span><br data-dcnode-id="6764"><span data-dcnode-id="6763" instrument_node="">Section 6. Prima Facie evidence of Arson. Any of the following circumstances shall constitute prima facie</span><br data-dcnode-id="6762"><span data-dcnode-id="6761" instrument_node="">evidence of arson:</span><br data-dcnode-id="6760"><span data-dcnode-id="6759" instrument_node="">        1. If the fire started simultaneously in more than one part of the building or establishment.</span><br data-dcnode-id="6758"><span data-dcnode-id="6757" instrument_node="">        2. If substantial amount of flammable substances or materials are stored within the building note</span><br data-dcnode-id="6756"><span data-dcnode-id="6755" instrument_node="">        necessary in the business of the offender nor for household us.</span><br data-dcnode-id="6754"><span data-dcnode-id="6753" instrument_node="">        3. If gasoline, kerosene, petroleum or other flammable or combustible substances or materials</span><br data-dcnode-id="6752"><span data-dcnode-id="6751" instrument_node="">        soaked therewith or containers thereof, or any mechanical, electrical, chemical, or electronic</span><br data-dcnode-id="6750"><span data-dcnode-id="6749" instrument_node="">        contrivance designed to start a fire, or ashes or traces of any of the foregoing are found in the ruins</span><br data-dcnode-id="6748"><span data-dcnode-id="6747" instrument_node="">        or premises of the burned building or property.</span><br data-dcnode-id="6746"><span data-dcnode-id="6745" instrument_node="">        4. If the building or property is insured for substantially more than its actual value at the time of the</span><br data-dcnode-id="6744"><span data-dcnode-id="6743" instrument_node="">        issuance of the policy.</span><br data-dcnode-id="6742"><span data-dcnode-id="6741" instrument_node="">        4. If during the lifetime of the corresponding fire insurance policy more than two fires have occurred</span><br data-dcnode-id="6740"><span data-dcnode-id="6739" instrument_node="">        in the same or other premises owned or under the control of the offender and/or insured.</span><br data-dcnode-id="6738"><span data-dcnode-id="6737" instrument_node="">        5. If shortly before the fire, a substantial portion of the effects insured and stored in a building or</span><br data-dcnode-id="6736"><span data-dcnode-id="6735" instrument_node="">        property had been withdrawn from the premises except in the ordinary course of business.</span><br data-dcnode-id="6734"><span data-dcnode-id="6733" instrument_node="">        6. If a demand for money or other valuable consideration was made before the fire in exchange for</span><br data-dcnode-id="6732"><span data-dcnode-id="6731" instrument_node="">        the desistance of the offender or for the safety of the person or property of the victim.</span><br data-dcnode-id="6730"><span data-dcnode-id="6729" instrument_node="">Section 7. Conspiracy to commit Arson. Conspiracy to commit arson shall be punished by Prision Mayor in</span><br data-dcnode-id="6728"><span data-dcnode-id="6727" instrument_node="">its minimum period.</span><br data-dcnode-id="6726"><span data-dcnode-id="6725" instrument_node="">Section 8. Confiscation of Object of Arson. The building which is the object of arson including the land on</span><br data-dcnode-id="6724"><span data-dcnode-id="6723" instrument_node="">which it is situated shall be confiscated and escheated to the State, unless the owner thereof can prove that</span><br data-dcnode-id="6722"><span data-dcnode-id="6721" instrument_node="">he has no participation in nor knowledge of such arson despite the exercise of due diligence on his part.</span><br data-dcnode-id="6720"><span data-dcnode-id="6719" instrument_node="">Section 9. Repealing Clause. The provisions of Articles 320 to 326-B of the Revised Penal Code and all laws,</span><br data-dcnode-id="6718"><span data-dcnode-id="6717" instrument_node="">executive orders, rules and regulations, or parts thereof, inconsistent with the provisions of this Decree are</span><br data-dcnode-id="6716"><span data-dcnode-id="6715" instrument_node="">hereby repealed or amended accordingly.</span><br data-dcnode-id="6714"><span data-dcnode-id="6713" instrument_node="">Section 10. Effectivity. This Decree shall take effect immediately upon publication thereof at least once in a</span><br data-dcnode-id="6712"><span data-dcnode-id="6711" instrument_node="">newspaper of general circulation.</span><br data-dcnode-id="6710"><span data-dcnode-id="6709" instrument_node="">Done in the City of Manila, this 7th day of March, in the year of Our Lord, nineteen hundred and seventy-</span><br data-dcnode-id="6708"><span data-dcnode-id="6707" instrument_node="">nine.</span><p data-dcnode-id="6706"></p><p data-dcnode-id="6705"></p><h2 data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">Constitutional Rights of the Accused</span></h2><p data-dcnode-id="6702"></p><p data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">1. The right to free access to the courts and adequate legal assistance.</span></p><p data-dcnode-id="6696"><span data-dcnode-id="6699" instrument_node="">2. The right to be informed of his right to remain silent and to have counsel when under investigation for</span><br data-dcnode-id="6698"><span data-dcnode-id="6697" instrument_node="">the commission of an offense.</span></p><p data-dcnode-id="6692"><span data-dcnode-id="6695" instrument_node="">3. The right against the use of torture, force, violence, threat, intimidation, or any other means which</span><br data-dcnode-id="6694"><span data-dcnode-id="6693" instrument_node="">fvitiates the free will.</span></p><p data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">4. The right against being held in secret, incommunicado, or similar forms of solitary detention;</span></p><p data-dcnode-id="6689"></p><h2 data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">5. The right to bail and against excessive bail.</span></h2><p data-dcnode-id="6686"></p><p data-dcnode-id="6685"></p><h2 data-dcnode-id="6683"><span data-dcnode-id="6684" instrument_node="">6. The right to due process of law.</span></h2><p data-dcnode-id="6682"></p><p data-dcnode-id="6681"></p><h2 data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">7. The right to presumption of innocence.</span></h2><p data-dcnode-id="6678"></p><p data-dcnode-id="6677"></p><h2 data-dcnode-id="6675"><span data-dcnode-id="6676" instrument_node="">8. The right to be heard by himself and counsel.</span></h2><p data-dcnode-id="6674"></p><p data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">9. The right to be informed of the nature and cause of the accusation against him.</span></p><p data-dcnode-id="6671"></p><h2 data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">10. The right to have speedy, impartial, and public trial.</span></h2><p data-dcnode-id="6668"></p><p data-dcnode-id="6667"></p><h2 data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">11. The right to meet the witnesses face to face.</span></h2><p data-dcnode-id="6664"></p><p data-dcnode-id="6660"><span data-dcnode-id="6663" instrument_node="">12. The right to have compulsory process to secure the attendance of witnesses and the production of</span><br data-dcnode-id="6662"><span data-dcnode-id="6661" instrument_node="">evidence in his behalf.</span></p><p data-dcnode-id="6659"></p><h2 data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">13. The right against self-incrimination.</span></h2><p data-dcnode-id="6656"></p><p data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">14. The right against detention by reason of political beliefs and aspirations.</span></p><p data-dcnode-id="6653"></p><h2 data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">15. The right against excessive fines.</span></h2><p data-dcnode-id="6650"></p><p data-dcnode-id="6649"></p><h2 data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">16. The right against cruel, degrading or inhuman punishment.</span></h2><p data-dcnode-id="6646"></p><p data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">17. The right against infliction of the death penalty except for heinous crimes.</span></p><p data-dcnode-id="6643"></p><h2 data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">18. The right against double jeopardy.</span></h2><p data-dcnode-id="6640"></p><p data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">19. The right against ex post facto law and bill of attainder.</span></p><p data-dcnode-id="6637"></p><h2 data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">Prima Facie Evidence of Arson</span></h2><br data-dcnode-id="6634"><span data-dcnode-id="6633" instrument_node="">Prima Facie evidence of Arson. Any of the following circumstances shall constitute prima facie evidence of</span><br data-dcnode-id="6632"><span data-dcnode-id="6631" instrument_node="">arson:</span><br data-dcnode-id="6630"><span data-dcnode-id="6629" instrument_node="">       1. If the fire started simultaneously in more than one part of the building or establishment.</span><br data-dcnode-id="6628"><span data-dcnode-id="6627" instrument_node="">        2. If substantial amount of flammable substances or materials are stored within the building note</span><br data-dcnode-id="6626"><span data-dcnode-id="6625" instrument_node="">        necessary in the business of the offender nor for household us.</span><br data-dcnode-id="6624"><span data-dcnode-id="6623" instrument_node="">        3. If gasoline, kerosene, petroleum or other flammable or combustible substances or materials</span><br data-dcnode-id="6622"><span data-dcnode-id="6621" instrument_node="">        soaked therewith or containers thereof, or any mechanical, electrical, chemical, or electronic</span><br data-dcnode-id="6620"><span data-dcnode-id="6619" instrument_node="">        contrivance designed to start a fire, or ashes or traces of any of the foregoing are found in the ruins</span><br data-dcnode-id="6618"><span data-dcnode-id="6617" instrument_node="">        or premises of the burned building or property.</span><br data-dcnode-id="6616"><span data-dcnode-id="6615" instrument_node="">        4. If the building or property is insured for substantially more than its actual value at the time of the</span><br data-dcnode-id="6614"><span data-dcnode-id="6613" instrument_node="">        issuance of the policy.</span><br data-dcnode-id="6612"><span data-dcnode-id="6611" instrument_node="">        4. If during the lifetime of the corresponding fire insurance policy more than two fires have occurred</span><br data-dcnode-id="6610"><span data-dcnode-id="6609" instrument_node="">        in the same or other premises owned or under the control of the offender and/or insured.</span><br data-dcnode-id="6608"><span data-dcnode-id="6607" instrument_node="">        5. If shortly before the fire, a substantial portion of the effects insured and stored in a building or</span><br data-dcnode-id="6606"><span data-dcnode-id="6605" instrument_node="">        property had been withdrawn from the premises except in the ordinary course of business.</span><br data-dcnode-id="6604"><span data-dcnode-id="6603" instrument_node="">f        6. If a demand for money or other valuable consideration was made before the fire in exchange for</span><br data-dcnode-id="6602"><span data-dcnode-id="6601" instrument_node="">        the desistance of the offender or for the safety of the person or property of the victim.</span><p data-dcnode-id="6600"></p><p data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">Rules of Court</span></p><p data-dcnode-id="6597"></p><h2 data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">Procedure and Techniques</span></h2><br data-dcnode-id="6594"><span data-dcnode-id="6593" instrument_node="">Identification, Preservation and Handling of Evidence</span><br data-dcnode-id="6592"><span data-dcnode-id="6591" instrument_node="">Other Related Procedure and Techniques</span><p data-dcnode-id="6590"></p><p data-dcnode-id="6589"></p><h2 data-dcnode-id="6587"><span data-dcnode-id="6588" instrument_node="">SOP’s on Fire and Arson Investigation</span></h2><br data-dcnode-id="6586"><span data-dcnode-id="6585" instrument_node="">REPUBLIC OF THE PHILIPPINES</span><br data-dcnode-id="6584"><span data-dcnode-id="6583" instrument_node="">DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT</span><br data-dcnode-id="6582"><span data-dcnode-id="6581" instrument_node="">BUREAU OF FIRE PROTECTION</span><br data-dcnode-id="6580"><span data-dcnode-id="6579" instrument_node="">Rm 618, 145 Union Square Condominium, 15th Avenue, Cubao, Quezon City</span><br data-dcnode-id="6578"><span data-dcnode-id="6577" instrument_node="">Tel. No. 911-7085 Tel Fax: (02)911-7060</span><br data-dcnode-id="6576"><span data-dcnode-id="6575" instrument_node="">BUREAU OF FIRE PROTECTION</span><br data-dcnode-id="6574"><span data-dcnode-id="6573" instrument_node="">STANDARD OPERATING PROCEDURE</span><br data-dcnode-id="6572"><span data-dcnode-id="6571" instrument_node="">(BFP-SOP) NUMBER: IID 2008-01</span><br data-dcnode-id="6570"><span data-dcnode-id="6569" instrument_node="">OPERATIONAL STANDARDS ON COMPREHENSIVE</span><br data-dcnode-id="6568"><span data-dcnode-id="6567" instrument_node="">FIRE AND ARSON INVESTIGATION</span><br data-dcnode-id="6566"><span data-dcnode-id="6565" instrument_node="">AND FILING OF CRIMINAL COMPLAINT PROCEDURES</span><br data-dcnode-id="6564"><span data-dcnode-id="6563" instrument_node="">I. GENERAL</span><br data-dcnode-id="6562"><span data-dcnode-id="6561" instrument_node="">As mandated by the provisions of Section 50, Rule VIII, Implementing Rules and Regulations of</span><br data-dcnode-id="6560"><span data-dcnode-id="6559" instrument_node="">Republic Act 6975, otherwise known as the Department of the Interior and Local Government Act of</span><br data-dcnode-id="6558"><span data-dcnode-id="6557" instrument_node="">1990, stipulates among others that the Bureau of Fire Protection shall have the power to investigate all</span><br data-dcnode-id="6556"><span data-dcnode-id="6555" instrument_node="">causes of fire and if necessary, file the proper complaint with the City or Provincial Prosecutor’s Office</span><br data-dcnode-id="6554"><span data-dcnode-id="6553" instrument_node="">which has jurisdiction over the case. The tasks and responsibility of the fire arson investigators are not</span><br data-dcnode-id="6552"><span data-dcnode-id="6551" instrument_node="">only limited in conducting exhaustive investigations and filing of complaints to the prosecutor’s office</span><br data-dcnode-id="6550"><span data-dcnode-id="6549" instrument_node="">but also includes the appearance and giving of testimonies before the court of law during legal</span><br data-dcnode-id="6548"><span data-dcnode-id="6547" instrument_node="">proceedings.</span><br data-dcnode-id="6546"><span data-dcnode-id="6545" instrument_node="">The criminal offense of Arson is punishable under the Revised Penal Code particularly Articles</span><br data-dcnode-id="6544"><span data-dcnode-id="6543" instrument_node="">320 to 326-B as amended by Presidential Decree 1613, 1744 and Section 10 of Republic Act 7659</span><br data-dcnode-id="6542"><span data-dcnode-id="6541" instrument_node="">(Heinous Crime Law). As provided by law it is the prosecution who has burden of proof and the quantum</span><br data-dcnode-id="6540"><span data-dcnode-id="6539" instrument_node="">of evidence is proof beyond reasonable doubt. Once proven, the maximum highest penalty for its</span><br data-dcnode-id="6538"><span data-dcnode-id="6537" instrument_node="">commission is life imprisonment under the present rule since the abolition of the death penalty law.</span><br data-dcnode-id="6536"><span data-dcnode-id="6535" instrument_node="">Arson is a classic heinous crime that requires skillful, scientific and systematic investigation procedure</span><br data-dcnode-id="6534"><span data-dcnode-id="6533" instrument_node="">thus, the respective chiefs of the investigation and intelligence offices of the BFP are joined closely</span><br data-dcnode-id="6532"><span data-dcnode-id="6531" instrument_node="">supervise the conduct of the investigation in order to attain effective and plausible results.</span><br data-dcnode-id="6530"><span data-dcnode-id="6529" instrument_node="">This BFP Standard Operating Procedure Nr. IID 2008 – 01 shall be known as: OPERATIONAL</span><br data-dcnode-id="6528"><span data-dcnode-id="6527" instrument_node="">STANDARDS ON COMPREHENSIVE FIRE AND ARSON INVESTIGATION AND FILING OF CRIMINAL</span><br data-dcnode-id="6526"><span data-dcnode-id="6525" instrument_node="">COMPLAINT PROCEDURES.</span><br data-dcnode-id="6524"><span data-dcnode-id="6523" instrument_node="">II. PURPOSE</span><br data-dcnode-id="6522"><span data-dcnode-id="6521" instrument_node="">A. To have a uniform and systematic procedures in the conduct of fire and arson investigation</span><br data-dcnode-id="6520"><span data-dcnode-id="6519" instrument_node="">from the BFP National Headquarters down to the lowest investigation and intelligence units, to</span><br data-dcnode-id="6518"><span data-dcnode-id="6517" instrument_node="">include the prompt submission of fire investigation reports.</span><br data-dcnode-id="6516"><span data-dcnode-id="6515" instrument_node="">B. To have a clear and explicable guidelines in conducting fire and arson investigation and the filing</span><br data-dcnode-id="6514"><span data-dcnode-id="6513" instrument_node="">of the necessary complaint documents before the office of the City/Provincial Prosecutor.</span><br data-dcnode-id="6512"><span data-dcnode-id="6511" instrument_node="">C. To ensure the quality and value of the investigation being conducted by all BFP fire and arson</span><br data-dcnode-id="6510"><span data-dcnode-id="6509" instrument_node="">investigators and to expedite the investigation process and disposition of fire and arson cases.</span><br data-dcnode-id="6508"><span data-dcnode-id="6507" instrument_node="">III. INITIAL ACTIONS DURING FIRE ALARM</span><br data-dcnode-id="6506"><span data-dcnode-id="6505" instrument_node="">During the occurrence of a fire incident, the following initial actions should be assumed by the</span><br data-dcnode-id="6504"><span data-dcnode-id="6503" instrument_node="">fire arson investigator.</span><br data-dcnode-id="6502"><span data-dcnode-id="6501" instrument_node="">Section 1. – Upon the notification of a fire call or fire incident, the duty Fire Arson Investigator</span><br data-dcnode-id="6500"><span data-dcnode-id="6499" instrument_node="">(FAI) who has jurisdiction over the location of the fire incident shall mandatory to immediately respond</span><br data-dcnode-id="6498"><span data-dcnode-id="6497" instrument_node="">fat the soonest possible time. The conduct of initial inquiry through interview and elicitation from all</span><br data-dcnode-id="6496"><span data-dcnode-id="6495" instrument_node="">available witnesses at the fire scene must be done instantaneously.</span><br data-dcnode-id="6494"><span data-dcnode-id="6493" instrument_node="">Section 2. – As soon as the area of origin or the focal point of the fire is ascertained, the FAI shall</span><br data-dcnode-id="6492"><span data-dcnode-id="6491" instrument_node="">make necessary coordination with BFP firefighting personnel to include the volunteer fire brigades to</span><br data-dcnode-id="6490"><span data-dcnode-id="6489" instrument_node="">exert diligent and careful efforts in the conduct of fire suppression operation in the identified AREA OF</span><br data-dcnode-id="6488"><span data-dcnode-id="6487" instrument_node="">ORIGIN to preserve the EVIDENTIAL VALUE and the focal point of the fire that might be destroyed due to</span><br data-dcnode-id="6486"><span data-dcnode-id="6485" instrument_node="">excessive flooding in the area.</span><br data-dcnode-id="6484"><span data-dcnode-id="6483" instrument_node="">Section 3. – The fire scene should be well protected and secured. Coordination with the local</span><br data-dcnode-id="6482"><span data-dcnode-id="6481" instrument_node="">police units or barangay personnel should be done in order to secure the fire scene from looters and</span><br data-dcnode-id="6480"><span data-dcnode-id="6479" instrument_node="">other persons who has intention of entering the burned premises, so as to avoid contamination of the</span><br data-dcnode-id="6478"><span data-dcnode-id="6477" instrument_node="">fire area.</span><br data-dcnode-id="6476"><span data-dcnode-id="6475" instrument_node="">Section 4. – In the event that the FAI discovered SUSPECTED HAZARDOUS MATERIALS /</span><br data-dcnode-id="6474"><span data-dcnode-id="6473" instrument_node="">suspected illegal or regulated chemicals, during the conduct of investigation of the burned premises, the</span><br data-dcnode-id="6472"><span data-dcnode-id="6471" instrument_node="">circumstances shall be immediately reported to proper office ( e.g: BFP Hazardous Materials Office, or</span><br data-dcnode-id="6470"><span data-dcnode-id="6469" instrument_node="">other law enforcement agency).</span><br data-dcnode-id="6468"><span data-dcnode-id="6467" instrument_node="">Section 5. – Once the Fire Ground Commander (FGC) declared “FIRE OUT” the FAI shall take</span><br data-dcnode-id="6466"><span data-dcnode-id="6465" instrument_node="">cognizance the responsibilities of PROTECTING and SECURING the whole fire scene by sealing / closing</span><br data-dcnode-id="6464"><span data-dcnode-id="6463" instrument_node="">the perimeter with barricade tape (Fire Lines). Posting of uniformed BFP personnel for security purposes</span><br data-dcnode-id="6462"><span data-dcnode-id="6461" instrument_node="">may also be carry out as deemed necessary.</span><br data-dcnode-id="6460"><span data-dcnode-id="6459" instrument_node="">IV. DUTIES OF THE FIRE ARSON INVESTIGATOR</span><br data-dcnode-id="6458"><span data-dcnode-id="6457" instrument_node="">The following are the mandatory duties of the Fire Arson Investigators conducting thorough</span><br data-dcnode-id="6456"><span data-dcnode-id="6455" instrument_node="">investigation on the fire scene:</span><br data-dcnode-id="6454"><span data-dcnode-id="6453" instrument_node="">Section 1. – Shall perform systematic scientific examinations and visual reconstruction of the</span><br data-dcnode-id="6452"><span data-dcnode-id="6451" instrument_node="">fire scene. This is also to include the COMPLETE DOCUMENTATION AND PROPER RECORDING of the fire</span><br data-dcnode-id="6450"><span data-dcnode-id="6449" instrument_node="">area by the use of photography, diagrammatic sketch and notes. The diagrammatic sketch should clearly</span><br data-dcnode-id="6448"><span data-dcnode-id="6447" instrument_node="">depict the FIRE SCENE, its AREA / POINT OF ORIGIN, AREA MEASUREMENTS, LOCATION OF EVIDENCE</span><br data-dcnode-id="6446"><span data-dcnode-id="6445" instrument_node="">and other important details.</span><br data-dcnode-id="6444"><span data-dcnode-id="6443" instrument_node="">Section 2. – Conduct interview to all witnesses. The interview should be done in QUESTION AND</span><br data-dcnode-id="6442"><span data-dcnode-id="6441" instrument_node="">ANSWER FORM and shall be done under oath preferably by a person of authority whenever available, or</span><br data-dcnode-id="6440"><span data-dcnode-id="6439" instrument_node="">be administered by the concerned BFP officer with the rank of INSPECTOR and above. The authority of a</span><br data-dcnode-id="6438"><span data-dcnode-id="6437" instrument_node="">BFP officer to administer oath is pursuant to the provisions of Chapter III, Section 50 of R.A. 6975. All</span><br data-dcnode-id="6436"><span data-dcnode-id="6435" instrument_node="">witnesses to be conducted with a formal interview shall be FORMALLY INVITED to the fire station /</span><br data-dcnode-id="6434"><span data-dcnode-id="6433" instrument_node="">investigation office concerned in a form of INVITATION LETTER. (Please see attached Invitation Letter for</span><br data-dcnode-id="6432"><span data-dcnode-id="6431" instrument_node="">reference – Annex A)</span><br data-dcnode-id="6430"><span data-dcnode-id="6429" instrument_node="">Section 3. – Conduct THOROUGH ANALYSIS of the fire scene in order to identify the IGNITION</span><br data-dcnode-id="6428"><span data-dcnode-id="6427" instrument_node="">SOURCE, initial materials ignited and other factors which bring them together to produce a fire.</span><br data-dcnode-id="6426"><span data-dcnode-id="6425" instrument_node="">Examination of FIRE SPREAD and FIRE PATTERN which includes thermal effects on materials such as</span><br data-dcnode-id="6424"><span data-dcnode-id="6423" instrument_node="">charring, oxidation, consumption of combustibles, smoke and soot deposits, distortion, melting effect,</span><br data-dcnode-id="6422"><span data-dcnode-id="6421" instrument_node="">color change, changes of material structure and structural collapse, must be conducted.</span><br data-dcnode-id="6420"><span data-dcnode-id="6419" instrument_node="">Section 4. – Identify, recognize and collect physical evidence found at the fire scene that have</span><br data-dcnode-id="6418"><span data-dcnode-id="6417" instrument_node="">PROBATIVE VALUE on fire cause determination. Pieces of evidence to be collected shall be</span><br data-dcnode-id="6416"><span data-dcnode-id="6415" instrument_node="">photographed first and shall be collected in the presence of witnesses independent to the investigating</span><br data-dcnode-id="6414"><span data-dcnode-id="6413" instrument_node="">body. PROPER DOCUMENTATION, SEALING and PACKAGING of evidence recovered prior to submission</span><br data-dcnode-id="6412"><span data-dcnode-id="6411" instrument_node="">to Arson Laboratory Section (ALS) – BFP National Headquarters for laboratory examination shall be</span><br data-dcnode-id="6410"><span data-dcnode-id="6409" instrument_node="">observed.</span><br data-dcnode-id="6408"><span data-dcnode-id="6407" instrument_node="">The FAI shall strictly follow the instructions pertaining to evidence collection and handling as</span><br data-dcnode-id="6406"><span data-dcnode-id="6405" instrument_node="">stipulated in MEMORANDUM CIRCULAR NR: 2006-01: GUIDELINES IN THE HANDLING, PRESERVATION,</span><br data-dcnode-id="6404"><span data-dcnode-id="6403" instrument_node="">TRANSPORT AND SUBMISSION OF PHYSICAL EVIDENCE AT THE ALS – BFP NATIONAL HEADQUARTERS.</span><br data-dcnode-id="6402"><span data-dcnode-id="6401" instrument_node="">(Memorandum Circular Nr. 2006-01 is hereto attached for reference – Annex B)</span><br data-dcnode-id="6400"><span data-dcnode-id="6399" instrument_node="">Section 5. – On the first phase of the investigation, the FAI shall prepare the LISTING OF</span><br data-dcnode-id="6398"><span data-dcnode-id="6397" instrument_node="">DOCUMENTS needed to be accomplished / submitted by the fire victim/s, building occupant/s and other</span><br data-dcnode-id="6396"><span data-dcnode-id="6395" instrument_node="">parties affected by fire. The required documents are as follows: (Please see attached standard letter for</span><br data-dcnode-id="6394"><span data-dcnode-id="6393" instrument_node="">these requirements for the fire victims – Annex C)</span><br data-dcnode-id="6392"><span data-dcnode-id="6391" instrument_node="">A. Affidavit of Loss pertaining to Fire Damage (itemized and duly notarized)</span><br data-dcnode-id="6390"><span data-dcnode-id="6389" instrument_node="">fB. Sworn statement of loss submitted to insurance adjusters / companies</span><br data-dcnode-id="6388"><span data-dcnode-id="6387" instrument_node="">C. Latest complete inventory of stocks prior to the fire incident</span><br data-dcnode-id="6386"><span data-dcnode-id="6385" instrument_node="">D. Complete inventory of salvaged items after the fire incident</span><br data-dcnode-id="6384"><span data-dcnode-id="6383" instrument_node="">E. Complete copies of insurance policies to include co-insurances</span><br data-dcnode-id="6382"><span data-dcnode-id="6381" instrument_node="">F. Income Tax Return (ITR) for the last three (3) years</span><br data-dcnode-id="6380"><span data-dcnode-id="6379" instrument_node="">G. Financial statements for the last three (3) years</span><br data-dcnode-id="6378"><span data-dcnode-id="6377" instrument_node="">H. Balance sheets for the last three (3) years</span><br data-dcnode-id="6376"><span data-dcnode-id="6375" instrument_node="">I. Mayor’s permit and Business License</span><br data-dcnode-id="6374"><span data-dcnode-id="6373" instrument_node="">J. Occupancy permit</span><br data-dcnode-id="6372"><span data-dcnode-id="6371" instrument_node="">K. Department of Trade and Industry (DTI) registration</span><br data-dcnode-id="6370"><span data-dcnode-id="6369" instrument_node="">L. Securities and Exchange Commission (SEC) registration</span><br data-dcnode-id="6368"><span data-dcnode-id="6367" instrument_node="">M. Latest Fire Safety Inspection Certificate (FSIC)</span><br data-dcnode-id="6366"><span data-dcnode-id="6365" instrument_node="">N. Complete list of employees</span><br data-dcnode-id="6364"><span data-dcnode-id="6363" instrument_node="">O. Approved Floor, Building and Electrical Plans</span><br data-dcnode-id="6362"><span data-dcnode-id="6361" instrument_node="">P. Copy of lease contract agreement</span><br data-dcnode-id="6360"><span data-dcnode-id="6359" instrument_node="">Q. Land title / tax declaration</span><br data-dcnode-id="6358"><span data-dcnode-id="6357" instrument_node="">Section 5.1 – The above listed documents to be secured to the fire victim will vary based on the</span><br data-dcnode-id="6356"><span data-dcnode-id="6355" instrument_node="">TYPE OF UCCUPANCY or the INVOLVED STRUCTURE gutted by fire. Any other documents that may be</span><br data-dcnode-id="6354"><span data-dcnode-id="6353" instrument_node="">irrelevant based on type of occupancy may not be required. In addition, the FAI are also AUTHORIZE TO</span><br data-dcnode-id="6352"><span data-dcnode-id="6351" instrument_node="">REQUIRE any other pertinent documents, materials and items to the fire victims as determined by the</span><br data-dcnode-id="6350"><span data-dcnode-id="6349" instrument_node="">FAI concerned, that will give support to the conduct of investigation.</span><br data-dcnode-id="6348"><span data-dcnode-id="6347" instrument_node="">Section 6 – The FAI must inform all concerned persons, occupants and managements of the</span><br data-dcnode-id="6346"><span data-dcnode-id="6345" instrument_node="">burned premises that the fire scene is RESTRICTED TO ENTRY to any person until the investigation being</span><br data-dcnode-id="6344"><span data-dcnode-id="6343" instrument_node="">conducted by the BFP at the burned premises is COMPLETED and / or TERMINATED.</span><br data-dcnode-id="6342"><span data-dcnode-id="6341" instrument_node="">Any REMOVAL, RETRIEVAL of items stored at the scene of the fire, DEMOLITION,</span><br data-dcnode-id="6340"><span data-dcnode-id="6339" instrument_node="">RECONSTRUCTION and REHABILITATION of the fire scene is only allowed upon securing approval to the</span><br data-dcnode-id="6338"><span data-dcnode-id="6337" instrument_node="">investigating body through submission of a formal written request by the fire victim.</span><br data-dcnode-id="6336"><span data-dcnode-id="6335" instrument_node="">The said formal written request should contain specific purpose. It should be addressed to the</span><br data-dcnode-id="6334"><span data-dcnode-id="6333" instrument_node="">respective CHIEFS OF THE BFP INVESTIGATION AND INTELLIGENCE OFFICES through the FIRE ARSON</span><br data-dcnode-id="6332"><span data-dcnode-id="6331" instrument_node="">INVESTIGATOR handling the case. The concerned Chief of the Investigation and Intelligence Office,</span><br data-dcnode-id="6330"><span data-dcnode-id="6329" instrument_node="">together with his proper recommendation, shall endorse the subject letter request of the fire victim to</span><br data-dcnode-id="6328"><span data-dcnode-id="6327" instrument_node="">the concerned BFP HEAD OF OFFICE, who shall then issue the PROPERTY RECOVERY AND CLEARING</span><br data-dcnode-id="6326"><span data-dcnode-id="6325" instrument_node="">PERMIT (PRCP), to the requesting party. (Please see attached standard PRCP format for reference –</span><br data-dcnode-id="6324"><span data-dcnode-id="6323" instrument_node="">Annex D)</span><br data-dcnode-id="6322"><span data-dcnode-id="6321" instrument_node="">In such case that the fire incident is suspected to be INTENTIONAL in nature, issuance of PRCP is</span><br data-dcnode-id="6320"><span data-dcnode-id="6319" instrument_node="">temporarily RESTRICTED, until proven otherwise. If the fire incident is found to be intentional in nature</span><br data-dcnode-id="6318"><span data-dcnode-id="6317" instrument_node="">and case was already filed in the court of law, it will be the discretion of the court handling the case</span><br data-dcnode-id="6316"><span data-dcnode-id="6315" instrument_node="">whether to issue appropriate document in the clearing or demolition of the burned premises.</span><br data-dcnode-id="6314"><span data-dcnode-id="6313" instrument_node="">Section 7. – In such event that death results from a fire incident (FATAL FIRES), the concerned</span><br data-dcnode-id="6312"><span data-dcnode-id="6311" instrument_node="">FAI shall immediately sought the assistance of the Philippine National Police – Scene Of the Crime</span><br data-dcnode-id="6310"><span data-dcnode-id="6309" instrument_node="">Operation (PNP – SOCO), or any other legal / recognized group for lifting and autopsy of the cadaver /</span><br data-dcnode-id="6308"><span data-dcnode-id="6307" instrument_node="">body found at the fire / crime scene.</span><br data-dcnode-id="6306"><span data-dcnode-id="6305" instrument_node="">Section 8. – All conduct of follow-up investigation to the fire incident should be covered with</span><br data-dcnode-id="6304"><span data-dcnode-id="6303" instrument_node="">appropriate Letter / Mission Order signed by the respective BFP Head of Office. (Please see attached</span><br data-dcnode-id="6302"><span data-dcnode-id="6301" instrument_node="">standard form of Mission Order for reference – Annex E)</span><br data-dcnode-id="6300"><span data-dcnode-id="6299" instrument_node="">Section 9. – All FAI are also directed and mandated to perform any other task as deemed</span><br data-dcnode-id="6298"><span data-dcnode-id="6297" instrument_node="">essential to the development of case build-up and the exhaustive investigation being conducted.</span><br data-dcnode-id="6296"><span data-dcnode-id="6295" instrument_node="">V. FIRE REPORT CLASSIFICATIONS AND REPORTING SYSTEM</span><br data-dcnode-id="6294"><span data-dcnode-id="6293" instrument_node="">A. Spot Investigation Report (SIR) – Shall be made and accomplished by the FAI concerned</span><br data-dcnode-id="6292"><span data-dcnode-id="6291" instrument_node="">during the actual response to a fire incident. The SIR should contain basic information about the fire</span><br data-dcnode-id="6290"><span data-dcnode-id="6289" instrument_node="">incident. (Please see attached standard SIR format for reference – Annex F)</span><br data-dcnode-id="6288"><span data-dcnode-id="6287" instrument_node="">All SIR must be submitted IMMEDIATELY (within 24 hours) to respective Fire Marshals with copy</span><br data-dcnode-id="6286"><span data-dcnode-id="6285" instrument_node="">furnished the OFFICE OF THE CHIEF, BUREAU OF FIRE PROTECTION, thru fax message at the office of the</span><br data-dcnode-id="6284"><span data-dcnode-id="6283" instrument_node="">INVESTIGATION AND INTELLIGENCE DIVISION – BFP National Headquarters with Telephone / Fax</span><br data-dcnode-id="6282"><span data-dcnode-id="6281" instrument_node="">fNumber: (02) 911-7223, for immediate information and recording purposes.</span><br data-dcnode-id="6280"><span data-dcnode-id="6279" instrument_node="">The copy (original copy / photo copy) of the SIR of all fire incident transpired within the</span><br data-dcnode-id="6278"><span data-dcnode-id="6277" instrument_node="">respective Area Of Responsibility (AOR) shall be consolidate and be submitted thru proper CHANNEL.</span><br data-dcnode-id="6276"><span data-dcnode-id="6275" instrument_node="">The respective OFFICE OF THE REGIONAL DIRECTOR FOR FIRE PROTECTION shall then submit the</span><br data-dcnode-id="6274"><span data-dcnode-id="6273" instrument_node="">consolidate SIR to the office of the IID – BFP National Headquarters in BI-MONTHLY basis (every 15th and</span><br data-dcnode-id="6272"><span data-dcnode-id="6271" instrument_node="">30th day of the month) thru mail courier, for recording and proper disposition.</span><br data-dcnode-id="6270"><span data-dcnode-id="6269" instrument_node="">B. Progress Investigation Report (PIR) – Shall be made and accomplished by the FAI concerned</span><br data-dcnode-id="6268"><span data-dcnode-id="6267" instrument_node="">after the conduct of follow-up investigation was made. The PIR or any succeeding PIRs (2nd PIR) shall be</span><br data-dcnode-id="6266"><span data-dcnode-id="6265" instrument_node="">accomplished within 7 to 15 days. (Please see attached standard PIR format for reference –Annex G)</span><br data-dcnode-id="6264"><span data-dcnode-id="6263" instrument_node="">The copy (original copy / photo copy) of the PIR of all fire incident transpired within the</span><br data-dcnode-id="6262"><span data-dcnode-id="6261" instrument_node="">respective (AOR) shall be consolidate and be submitted thru proper CHANNEL. The respective OFFICE OF</span><br data-dcnode-id="6260"><span data-dcnode-id="6259" instrument_node="">THE REGIONAL DIRECTOR FOR FIRE PROTECTION shall then submit the consolidate PIR to the office of</span><br data-dcnode-id="6258"><span data-dcnode-id="6257" instrument_node="">the IID – BFP National Headquarters in BI-MONTHLY basis (every 15th and 30th day of the month) thru</span><br data-dcnode-id="6256"><span data-dcnode-id="6255" instrument_node="">mail courier, for recording and proper disposition.</span><br data-dcnode-id="6254"><span data-dcnode-id="6253" instrument_node="">C. Final Investigation Report (FIR) – Shall be made and accomplished by the FAI concerned upon</span><br data-dcnode-id="6252"><span data-dcnode-id="6251" instrument_node="">the completion of the exhaustive investigation. All completed FIR should be signed by the concerned FAI</span><br data-dcnode-id="6250"><span data-dcnode-id="6249" instrument_node="">and its respective Chief of the Investigation and Intelligence Office. (Please see attached standard FIR</span><br data-dcnode-id="6248"><span data-dcnode-id="6247" instrument_node="">format for reference – Annex H)</span><br data-dcnode-id="6246"><span data-dcnode-id="6245" instrument_node="">The FIR should be submitted the soonest time the case was resolved by the investigating office</span><br data-dcnode-id="6244"><span data-dcnode-id="6243" instrument_node="">handling the case. The maximum allowable time for the investigating body to submit the FIR shall be 30</span><br data-dcnode-id="6242"><span data-dcnode-id="6241" instrument_node="">to 45 DAYS commencing from the first day of investigation. On the given period, the FAI shall already</span><br data-dcnode-id="6240"><span data-dcnode-id="6239" instrument_node="">come up with a proper RESOLUTION or RECOMMENDATION about the case being investigated.</span><br data-dcnode-id="6238"><span data-dcnode-id="6237" instrument_node="">For the lower investigating units, the FIR shall be accomplished in five (5) complete copies for</span><br data-dcnode-id="6236"><span data-dcnode-id="6235" instrument_node="">distribution to:</span><br data-dcnode-id="6234"><span data-dcnode-id="6233" instrument_node="">1. Office of the Chief, BFP thru the office of the Investigation and Intelligence Division, BFP</span><br data-dcnode-id="6232"><span data-dcnode-id="6231" instrument_node="">National Headquarters;</span><br data-dcnode-id="6230"><span data-dcnode-id="6229" instrument_node="">2. Office of the Regional Director for Fire Protection;</span><br data-dcnode-id="6228"><span data-dcnode-id="6227" instrument_node="">3. Office of the District / Provincial Fire Marshal;</span><br data-dcnode-id="6226"><span data-dcnode-id="6225" instrument_node="">4. Office of the City / Municipal Fire Marshals.</span><br data-dcnode-id="6224"><span data-dcnode-id="6223" instrument_node="">The last copy (ORIGINAL or DOCUMENT ORIGINAL) shall remain in the possession of the FAI</span><br data-dcnode-id="6222"><span data-dcnode-id="6221" instrument_node="">concerned for his own personal copy and for future verification.</span><br data-dcnode-id="6220"><span data-dcnode-id="6219" instrument_node="">No UNDETERMINED cause should be reflected in any FIR.</span><br data-dcnode-id="6218"><span data-dcnode-id="6217" instrument_node="">D. Fire Incident Investigation Report (FIIR) – This kind of investigation report can only be made in</span><br data-dcnode-id="6216"><span data-dcnode-id="6215" instrument_node="">such circumstances that the investigation report cannot be completed for some reasons</span><br data-dcnode-id="6214"><span data-dcnode-id="6213" instrument_node="">independent to the will of the FAI. (Please see attached standard FIIR format for reference –</span><br data-dcnode-id="6212"><span data-dcnode-id="6211" instrument_node="">Annex I)</span><br data-dcnode-id="6210"><span data-dcnode-id="6209" instrument_node="">FIIR can only be accomplished in fire cases with UNDETERMINED cause and this kind of case</span><br data-dcnode-id="6208"><span data-dcnode-id="6207" instrument_node="">should be considered as ON_PENDING INVESTIGATION, subject to REOPENING in circumstances that</span><br data-dcnode-id="6206"><span data-dcnode-id="6205" instrument_node="">relevant evidence and / or a witness shall surface in the future.</span><br data-dcnode-id="6204"><span data-dcnode-id="6203" instrument_node="">The copy (original copy / photo copy) of the FIIR of all fire incident transpired within the</span><br data-dcnode-id="6202"><span data-dcnode-id="6201" instrument_node="">respective AOR should also be consolidated and be submitted thru proper CHANNEL to the higher</span><br data-dcnode-id="6200"><span data-dcnode-id="6199" instrument_node="">headquarters in BI-MONTHLY basis (every 15th and 30th day of the Month) thru mail courier, for</span><br data-dcnode-id="6198"><span data-dcnode-id="6197" instrument_node="">recording and proper disposition.</span><br data-dcnode-id="6196"><span data-dcnode-id="6195" instrument_node="">VI. LEVEL OF AUTHORITY TO CONDUCT INVESTIGATION</span><br data-dcnode-id="6194"><span data-dcnode-id="6193" instrument_node="">Since fire incidents entails damages to property, the level of authority in conducting fire and</span><br data-dcnode-id="6192"><span data-dcnode-id="6191" instrument_node="">arson investigation and completion of FIR will be based on the degree or the amount and value of the</span><br data-dcnode-id="6190"><span data-dcnode-id="6189" instrument_node="">total (aggregated) damages incurred in a certain fire incident. These levels of authority are as follows:</span><br data-dcnode-id="6188"><span data-dcnode-id="6187" instrument_node="">A. Municipal Fire Marshal – Municipal Limit, LEVEL 1 – The municipal level, through its</span><br data-dcnode-id="6186"><span data-dcnode-id="6185" instrument_node="">MUNICIPAL INVESTIGATION AND INTELLIGENCE UNIT (MIIU) shall have the full responsibility and</span><br data-dcnode-id="6184"><span data-dcnode-id="6183" instrument_node="">power to investigate fire incidents with a total amount of damage not exceeding to Twenty Million</span><br data-dcnode-id="6182"><span data-dcnode-id="6181" instrument_node="">Pesos (Php 20,000,000.00).</span><br data-dcnode-id="6180"><span data-dcnode-id="6179" instrument_node="">B. City Fire Marshal – City Limit, LEVEL 2 – The city level, through its CITY INVESTIGATION</span><br data-dcnode-id="6178"><span data-dcnode-id="6177" instrument_node="">AND INTELLIGENCE SECTION (CIIS) shall have the full responsibility and power to investigate fire</span><br data-dcnode-id="6176"><span data-dcnode-id="6175" instrument_node="">incidents with a total amount of damage not exceeding to Thirty Million Pesos (Php 30,000,000.00).</span><br data-dcnode-id="6174"><span data-dcnode-id="6173" instrument_node="">fC. District Fire Marshal – District Limit, LEVEL 3 – The district level, through its DISTRICT</span><br data-dcnode-id="6172"><span data-dcnode-id="6171" instrument_node="">INVESTIGATION AND INTELLIGENCE BRANCH (DIIB) shall have the full responsibility and power to</span><br data-dcnode-id="6170"><span data-dcnode-id="6169" instrument_node="">investigate fire incidents with a total damages amounting to above Thirty Million Pesos (Php</span><br data-dcnode-id="6168"><span data-dcnode-id="6167" instrument_node="">30,000,000.00), but not exceeding to Forty Million Pesos (Php 40,000,000.00). DIIB operatives can</span><br data-dcnode-id="6166"><span data-dcnode-id="6165" instrument_node="">assume the conduct of investigation on fire incidents with damages amounting to more than 20 Million</span><br data-dcnode-id="6164"><span data-dcnode-id="6163" instrument_node="">Pesos in Municipal Levels only within their respective jurisdictions.</span><br data-dcnode-id="6162"><span data-dcnode-id="6161" instrument_node="">D. Provincial Fire Marshal – Provincial Limit, LEVEL 3 – The provincial level, through its</span><br data-dcnode-id="6160"><span data-dcnode-id="6159" instrument_node="">PROVINCIAL INVESTIGATION AND INTELLIGENCE BRANCH (PIIB) shall have the full responsibility and</span><br data-dcnode-id="6158"><span data-dcnode-id="6157" instrument_node="">power to investigate fire incidents with a total damages amounting to above Thirty Million Pesos (Php</span><br data-dcnode-id="6156"><span data-dcnode-id="6155" instrument_node="">30,000,000.00), but not exceeding to Forty Million Pesos (Php 40,000,000.00). PIIB operatives can</span><br data-dcnode-id="6154"><span data-dcnode-id="6153" instrument_node="">assume the conduct of investigation on fire incidents with damages amounting to more than 20 Million</span><br data-dcnode-id="6152"><span data-dcnode-id="6151" instrument_node="">Pesos in Municipal Levels only within their respective jurisdictions.</span><br data-dcnode-id="6150"><span data-dcnode-id="6149" instrument_node="">E. Regional Director for Fire Protection – Regional Limit, LEVEL 4 – The regional director</span><br data-dcnode-id="6148"><span data-dcnode-id="6147" instrument_node="">for fire protection level, through its REGIONAL INVESTIGATION AND INTELLIGENCE BRANCH (RIIB) shall</span><br data-dcnode-id="6146"><span data-dcnode-id="6145" instrument_node="">have the full responsibility and power to investigate fire incidents with a total damages amounting to</span><br data-dcnode-id="6144"><span data-dcnode-id="6143" instrument_node="">above Forty Million Pesos (Php 40,000,000.00), but not exceeding to Sixty Million Pesos (Php</span><br data-dcnode-id="6142"><span data-dcnode-id="6141" instrument_node="">60,000,000.00).</span><br data-dcnode-id="6140"><span data-dcnode-id="6139" instrument_node="">F. Chief, Bureau of Fire Protection – National, LEVEL 5 – The Chief, Bureau of Fire</span><br data-dcnode-id="6138"><span data-dcnode-id="6137" instrument_node="">Protection, through the office of the INVESTIGATION AND INTELLIGENCE DIVISION – BFP National</span><br data-dcnode-id="6136"><span data-dcnode-id="6135" instrument_node="">Headquarters (IID) shall have the full responsibility and power to investigate fire incidents with a total</span><br data-dcnode-id="6134"><span data-dcnode-id="6133" instrument_node="">damages amounting to above Sixty Million Pesos (Php 60,000,000.00).</span><br data-dcnode-id="6132"><span data-dcnode-id="6131" instrument_node="">- SPECIAL PROVISIONS ON CHAPTER VI OF THIS SOP:</span><br data-dcnode-id="6130"><span data-dcnode-id="6129" instrument_node="">Section 1. – In determination of the total damages incurred in a certain fire incident, the copy of</span><br data-dcnode-id="6128"><span data-dcnode-id="6127" instrument_node="">the AFFIDAVIT OF LOSS (duly notarized and itemized) from the fire victim shall prevail. The amount of</span><br data-dcnode-id="6126"><span data-dcnode-id="6125" instrument_node="">damages to be determined with regards to the Level of Authority to Conduct Investigation shall be the</span><br data-dcnode-id="6124"><span data-dcnode-id="6123" instrument_node="">TOTAL AGGREGATED DAMAGES or the TOTAL SUM OF DAMAGES of all fire victims of the subject fire</span><br data-dcnode-id="6122"><span data-dcnode-id="6121" instrument_node="">incident.</span><br data-dcnode-id="6120"><span data-dcnode-id="6119" instrument_node="">Section 2. – The fire damage estimate made by the investigating team / FAI shall not be the full</span><br data-dcnode-id="6118"><span data-dcnode-id="6117" instrument_node="">basis for determination of jurisdictional level of investigation. Be it noted that Aggregate Damages refers</span><br data-dcnode-id="6116"><span data-dcnode-id="6115" instrument_node="">to the total damage of the whole area burned, which will be used to determine the Level of Authority to</span><br data-dcnode-id="6114"><span data-dcnode-id="6113" instrument_node="">Conduct Investigation. In such circumstances that the damage to property is apparently high or</span><br data-dcnode-id="6112"><span data-dcnode-id="6111" instrument_node="">evidently beyond the level of authority of the present investigating units, the case shall be turned-over</span><br data-dcnode-id="6110"><span data-dcnode-id="6109" instrument_node="">to higher investigating unit.</span><br data-dcnode-id="6108"><span data-dcnode-id="6107" instrument_node="">Section 3. – In circumstances that the property gutted by fire is currently insured in any</span><br data-dcnode-id="6106"><span data-dcnode-id="6105" instrument_node="">insurance company, all copy of the duly accomplished SWORN STATEMENT OF LOSS submitted to the</span><br data-dcnode-id="6104"><span data-dcnode-id="6103" instrument_node="">INSURANCE ADJUSTERS by the fire victim must also FORM PART and be ATTACHED together with the</span><br data-dcnode-id="6102"><span data-dcnode-id="6101" instrument_node="">AFFIDAVIT OF LOSS submitted by the fire victim to the BFP investigating body.</span><br data-dcnode-id="6100"><span data-dcnode-id="6099" instrument_node="">Section 4. – In connection with the Level of Authority to Conduct Investigation, the concerned</span><br data-dcnode-id="6098"><span data-dcnode-id="6097" instrument_node="">office handling the investigation of the fire incident shall issue FIRE CLEARANCE CERTIFICATE (FCC) to the</span><br data-dcnode-id="6096"><span data-dcnode-id="6095" instrument_node="">fire victim in lieu of the Final Investigation Report (FIR), for purposes of insurance claims and for other</span><br data-dcnode-id="6094"><span data-dcnode-id="6093" instrument_node="">lawful applications. FCC can only be issued to fire incidents which is ACCIDENTAL in nature. (Please see</span><br data-dcnode-id="6092"><span data-dcnode-id="6091" instrument_node="">attached two forms of FCC, for insurance and non-insurance purpose – Annex J)</span><br data-dcnode-id="6090"><span data-dcnode-id="6089" instrument_node="">In such case that any BUILDING PREMISES WITH MULTIPLE OCCUPANCIES were gutted by fire,</span><br data-dcnode-id="6088"><span data-dcnode-id="6087" instrument_node="">the FCC should only be issued to the concerned party where the FIRE ORIGINATED. Other occupants</span><br data-dcnode-id="6086"><span data-dcnode-id="6085" instrument_node="">AFFECTED by the fire incident shall be issued with FIRE INCIDENT CERTIFICATION (FIC) for their record</span><br data-dcnode-id="6084"><span data-dcnode-id="6083" instrument_node="">purposes and other legal use upon request. (Please see attached two forms of FCC, for insurance and</span><br data-dcnode-id="6082"><span data-dcnode-id="6081" instrument_node="">non-insurance purpose – Annex K)</span><br data-dcnode-id="6080"><span data-dcnode-id="6079" instrument_node="">Section 5. – Issuance of the copy of the FIR to any concerned party can only be allowed in</span><br data-dcnode-id="6078"><span data-dcnode-id="6077" instrument_node="">circumstances that RELEVANT LEGAL ISSUES and or QUESTIONABLE MATTERS may arise. The request for</span><br data-dcnode-id="6076"><span data-dcnode-id="6075" instrument_node="">FIR should be made in writing by the requesting party and should be addressed to respective Chiefs of</span><br data-dcnode-id="6074"><span data-dcnode-id="6073" instrument_node="">BFP Offices / Fire Marshals who handled the conduct of investigation on the fire incident for their</span><br data-dcnode-id="6072"><span data-dcnode-id="6071" instrument_node="">appropriate action.</span><br data-dcnode-id="6070"><span data-dcnode-id="6069" instrument_node="">Section 6. – All written request for a copy of the FIR should COPY FURNISHED the Chief, Bureau</span><br data-dcnode-id="6068"><span data-dcnode-id="6067" instrument_node="">of Fire Protection with attention to the office of the IID – BFP National Headquarters, for documentary</span><br data-dcnode-id="6066"><span data-dcnode-id="6065" instrument_node="">freference.</span><br data-dcnode-id="6064"><span data-dcnode-id="6063" instrument_node="">VII. TURN OVER OF INVESTIGATION TO HIGHER HEADQUARTERS</span><br data-dcnode-id="6062"><span data-dcnode-id="6061" instrument_node="">Once a fire incident could be determined by the investigating body to be beyond their Level of</span><br data-dcnode-id="6060"><span data-dcnode-id="6059" instrument_node="">Authority to Conduct Investigation, the Conduct of Investigation, the conduct of investigation should be</span><br data-dcnode-id="6058"><span data-dcnode-id="6057" instrument_node="">immediately turned-over to the proper office concerned in a form of ENDORSEMENT, together with the</span><br data-dcnode-id="6056"><span data-dcnode-id="6055" instrument_node="">SIR and or PIR, to include all pertinent documents / attachments. (Please see attached standard</span><br data-dcnode-id="6054"><span data-dcnode-id="6053" instrument_node="">Endorsement form for reference – Annex L)</span><br data-dcnode-id="6052"><span data-dcnode-id="6051" instrument_node="">Any other recognized investigating body of the government cannot INTERCEDE in the conduct of</span><br data-dcnode-id="6050"><span data-dcnode-id="6049" instrument_node="">fire and arson investigation without formal communication to the concerned office handling the</span><br data-dcnode-id="6048"><span data-dcnode-id="6047" instrument_node="">investigation. The intercession of any investigating body of the government should have LEGAL</span><br data-dcnode-id="6046"><span data-dcnode-id="6045" instrument_node="">AUTHORITY in order to be allowed to conduct LATERAL INVESTIGATION in the investigation being</span><br data-dcnode-id="6044"><span data-dcnode-id="6043" instrument_node="">conducted by the BFP. In case that a CONTROVERSY INVOLVED and / or CONCERNING TO CONFLICTING</span><br data-dcnode-id="6042"><span data-dcnode-id="6041" instrument_node="">ISSUES arises in the conduct of investigation, subject fire incident case shall be turned over to the NEXT</span><br data-dcnode-id="6040"><span data-dcnode-id="6039" instrument_node="">LEVEL OF INVESTIGATING BODY for appropriate action and disposition. However, lower investigating</span><br data-dcnode-id="6038"><span data-dcnode-id="6037" instrument_node="">units are fully encouraged to resolve fire cases that fall within their respective Level of Authority.</span><br data-dcnode-id="6036"><span data-dcnode-id="6035" instrument_node="">In case that a fire incident resulted to a GREAT NUMBERS OF FATALITY / MULTIPLE DEATHS</span><br data-dcnode-id="6034"><span data-dcnode-id="6033" instrument_node="">(death of 10 persons and above), or any other issues concerning to the death of the fire victims, the</span><br data-dcnode-id="6032"><span data-dcnode-id="6031" instrument_node="">investigation of the subject fire incident upon the approval of the Chief BFP, should be turned over to</span><br data-dcnode-id="6030"><span data-dcnode-id="6029" instrument_node="">the office of the IID – BFP National Headquarters for appropriate action.</span><br data-dcnode-id="6028"><span data-dcnode-id="6027" instrument_node="">Any other fire incidents shall be immediately turned over to the higher headquarters for</span><br data-dcnode-id="6026"><span data-dcnode-id="6025" instrument_node="">investigation and completion of the Final Investigation Report upon the written order and direction of</span><br data-dcnode-id="6024"><span data-dcnode-id="6023" instrument_node="">the Chief, Bureau of Fire Protection.</span><br data-dcnode-id="6022"><span data-dcnode-id="6021" instrument_node="">VIII. FILING OF COMPLAINT PROCEDURE</span><br data-dcnode-id="6020"><span data-dcnode-id="6019" instrument_node="">If a prima facie evidence of arson is established or the case is suspected to be INTENTIONAL in</span><br data-dcnode-id="6018"><span data-dcnode-id="6017" instrument_node="">nature, the FAI concerned with the guidance of their respective City / Municipal Fire Marshal, should</span><br data-dcnode-id="6016"><span data-dcnode-id="6015" instrument_node="">IMMEDIATELY file the appropriate charge to the prosecutors office who has jurisdiction over the case</span><br data-dcnode-id="6014"><span data-dcnode-id="6013" instrument_node="">and the same must also be reported to the IID, BFP National Headquarters for further appropriate</span><br data-dcnode-id="6012"><span data-dcnode-id="6011" instrument_node="">disposition and guidance. (Please see attached Complaint Sheet for reference – Annex M)</span><br data-dcnode-id="6010"><span data-dcno
