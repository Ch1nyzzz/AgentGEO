-dcnode-id="4970"><span data-dcnode-id="4969" instrument_node="">superintendent, the Communications Unit shall be responsible for establishing an</span><br data-dcnode-id="4968"><span data-dcnode-id="4967" instrument_node="">effective police communications network.</span><br data-dcnode-id="4966"><span data-dcnode-id="4965" instrument_node="">(4) Computer Center. ? Headed by a Director with the rank of chief superintendent,</span><br data-dcnode-id="4964"><span data-dcnode-id="4963" instrument_node="">the Computer Center shall be responsible for the design, implementation and</span><br data-dcnode-id="4962"><span data-dcnode-id="4961" instrument_node="">maintenance of a database system for the PNP.</span><br data-dcnode-id="4960"><span data-dcnode-id="4959" instrument_node="">(5) Finance Center. ? Headed by a Director with the rank of chief superintendent,</span><br data-dcnode-id="4958"><span data-dcnode-id="4957" instrument_node="">the Finance Center shall be responsible for providing finance services to the PNP.</span><br data-dcnode-id="4956"><span data-dcnode-id="4955" instrument_node="">(6) Civil Security Unit. ? Headed by a Director with the rank of chief superintendent,</span><br data-dcnode-id="4954"><span data-dcnode-id="4953" instrument_node="">the Civil Security Unit shall provide administrative services and general supervision</span><br data-dcnode-id="4952"><span data-dcnode-id="4951" instrument_node="">over organization, business operation and activities of all organized private</span><br data-dcnode-id="4950"><span data-dcnode-id="4949" instrument_node="">detectives, watchmen, security guard agencies and company guard houses.</span><br data-dcnode-id="4948"><span data-dcnode-id="4947" instrument_node="">The unit shall likewise supervise the licensing and registration of firearms and explosives.</span><br data-dcnode-id="4946"><span data-dcnode-id="4945" instrument_node="">The approval applications for licenses to operate private security agencies, as well as the</span><br data-dcnode-id="4944"><span data-dcnode-id="4943" instrument_node="">issuance of licenses to security guards and the licensing of firearms and explosives, shall</span><br data-dcnode-id="4942"><span data-dcnode-id="4941" instrument_node="">be decentralized to the PNP regional offices.</span><br data-dcnode-id="4940"><span data-dcnode-id="4939" instrument_node="">(b) Operational Support Units. ? (1) Maritime Police Unit. Headed by a Director with the</span><br data-dcnode-id="4938"><span data-dcnode-id="4937" instrument_node="">rank of chief superintendent, the Maritime Police Unit shall perform all police functions</span><br data-dcnode-id="4936"><span data-dcnode-id="4935" instrument_node="">over Philippine territorial waters and rivers.</span><br data-dcnode-id="4934"><span data-dcnode-id="4933" instrument_node="">(2) Police Intelligence Unit. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4932"><span data-dcnode-id="4931" instrument_node="">superintendent, the Police Intelligence Unit shall serve as the intelligence and</span><br data-dcnode-id="4930"><span data-dcnode-id="4929" instrument_node="">counterintelligence operating unit of the PNP.</span><br data-dcnode-id="4928"><span data-dcnode-id="4927" instrument_node="">(3) Police Security Unit. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4926"><span data-dcnode-id="4925" instrument_node="">superintendent, Police Security Unit shall provide security for government officials,</span><br data-dcnode-id="4924"><span data-dcnode-id="4923" instrument_node="">visiting dignitaries and private individuals authorized to be given protection.</span><br data-dcnode-id="4922"><span data-dcnode-id="4921" instrument_node="">Page 11 of 27 R.A. 6975</span><br data-dcnode-id="4920"><span data-dcnode-id="4919" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4918"><span data-dcnode-id="4917" instrument_node="">(4) Criminal Investigation Unit. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4916"><span data-dcnode-id="4915" instrument_node="">superintendent, the Criminal Investigation Unit shall undertake the monitoring,</span><br data-dcnode-id="4914"><span data-dcnode-id="4913" instrument_node="">investigation and prosecution of all crimes involving economic sabotage, and other</span><br data-dcnode-id="4912"><span data-dcnode-id="4911" instrument_node="">crimes of such magnitude and extent as to indicate their commission by highly</span><br data-dcnode-id="4910"><span data-dcnode-id="4909" instrument_node="">placed or professional criminal syndicates and organizations.</span><br data-dcnode-id="4908"><span data-dcnode-id="4907" instrument_node="">This unit shall likewise investigate all major cases involving violations of the</span><br data-dcnode-id="4906"><span data-dcnode-id="4905" instrument_node="">Revised Penal Code and operate against organized crime groups, unless the</span><br data-dcnode-id="4904"><span data-dcnode-id="4903" instrument_node="">President assigns the case exclusively to the National Bureau of Investigation</span><br data-dcnode-id="4902"><span data-dcnode-id="4901" instrument_node="">(NBI).</span><br data-dcnode-id="4900"><span data-dcnode-id="4899" instrument_node="">(5) Special Action Force. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4898"><span data-dcnode-id="4897" instrument_node="">superintendent, the Special Action Force shall function as a mobile strike force or</span><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">reaction unit to augment regional, provincial, municipal and city police forces for</span><br data-dcnode-id="4894"><span data-dcnode-id="4893" instrument_node="">civil disturbance control, counterinsurgency, hostage-taking rescue operations, and</span><br data-dcnode-id="4892"><span data-dcnode-id="4891" instrument_node="">other special operations.</span><br data-dcnode-id="4890"><span data-dcnode-id="4889" instrument_node="">(6) Narcotics Unit. ? Headed by a Director with the rank of chief superintendent, the</span><br data-dcnode-id="4888"><span data-dcnode-id="4887" instrument_node="">Narcotics Unit shall enforce all laws relative to the protection of the citizenry against</span><br data-dcnode-id="4886"><span data-dcnode-id="4885" instrument_node="">dangerous and other prohibited drugs and substances.</span><br data-dcnode-id="4884"><span data-dcnode-id="4883" instrument_node="">(7) Aviation Security Unit. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4882"><span data-dcnode-id="4881" instrument_node="">fsuperintendent, the Aviation Security Unit, in coordination with airport authorities,</span><br data-dcnode-id="4880"><span data-dcnode-id="4879" instrument_node="">shall secure all the country's airports against offensive and terroristic acts that</span><br data-dcnode-id="4878"><span data-dcnode-id="4877" instrument_node="">threaten civil aviation, exercise operational control and supervision over all</span><br data-dcnode-id="4876"><span data-dcnode-id="4875" instrument_node="">agencies involved in airport security operation, and enforce all laws and regulations</span><br data-dcnode-id="4874"><span data-dcnode-id="4873" instrument_node="">relative to air travel protection and safety.</span><br data-dcnode-id="4872"><span data-dcnode-id="4871" instrument_node="">(8) Traffic Management Unit. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4870"><span data-dcnode-id="4869" instrument_node="">superintendent, the Traffic Management Unit shall enforce traffic laws and</span><br data-dcnode-id="4868"><span data-dcnode-id="4867" instrument_node="">regulations.</span><br data-dcnode-id="4866"><span data-dcnode-id="4865" instrument_node="">(9) Medical and Dental Centers. ? Headed by a Director with the rank of chief</span><br data-dcnode-id="4864"><span data-dcnode-id="4863" instrument_node="">superintendent, the Medical and Dental Centers shall be responsible for providing</span><br data-dcnode-id="4862"><span data-dcnode-id="4861" instrument_node="">medical and dental services for the PNP.</span><br data-dcnode-id="4860"><span data-dcnode-id="4859" instrument_node="">(10) Civil Relations Units. ? Headed with a Director with the rank of chief</span><br data-dcnode-id="4858"><span data-dcnode-id="4857" instrument_node="">superintendent, the Civil Relations Unit shall implement plans and programs that</span><br data-dcnode-id="4856"><span data-dcnode-id="4855" instrument_node="">will promote community and citizens' participation in the maintenance of peace and</span><br data-dcnode-id="4854"><span data-dcnode-id="4853" instrument_node="">order and public safety.</span><br data-dcnode-id="4852"><span data-dcnode-id="4851" instrument_node="">Section 36. Status of Members of the Philippine National Police. ? The members of the PNP</span><br data-dcnode-id="4850"><span data-dcnode-id="4849" instrument_node="">shall be considered employees of the National Government and shall draw their salaries</span><br data-dcnode-id="4848"><span data-dcnode-id="4847" instrument_node="">therefrom: Provided, That PNP members assigned in Metropolitan Manila, chartered cities and</span><br data-dcnode-id="4846"><span data-dcnode-id="4845" instrument_node="">first class municipalities may be paid in additional monthly allowance by the local government</span><br data-dcnode-id="4844"><span data-dcnode-id="4843" instrument_node="">unit concerned.</span><br data-dcnode-id="4842"><span data-dcnode-id="4841" instrument_node="">B. PROFESSIONALISM, WELFARE AND BENEFITS</span><br data-dcnode-id="4840"><span data-dcnode-id="4839" instrument_node="">Section 37. Performance Evaluation System. ? There shall be established a performance</span><br data-dcnode-id="4838"><span data-dcnode-id="4837" instrument_node="">evaluation system which shall be administered in accordance with the rules, regulations and</span><br data-dcnode-id="4836"><span data-dcnode-id="4835" instrument_node="">standards, and a code of conduct promulgated by the Commission for members of the PNP.</span><br data-dcnode-id="4834"><span data-dcnode-id="4833" instrument_node="">Such performance evaluation system be administered in such a way as to foster the</span><br data-dcnode-id="4832"><span data-dcnode-id="4831" instrument_node="">improvement of individual efficiency and behavioral discipline as well as the promotion of</span><br data-dcnode-id="4830"><span data-dcnode-id="4829" instrument_node="">organizational effectiveness and respect for the constitutional and human rights of citizens,</span><br data-dcnode-id="4828"><span data-dcnode-id="4827" instrument_node="">Page 12 of 27 R.A. 6975</span><br data-dcnode-id="4826"><span data-dcnode-id="4825" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4824"><span data-dcnode-id="4823" instrument_node="">democratic principles and ideals and the supremacy of civilian authority over the military.</span><br data-dcnode-id="4822"><span data-dcnode-id="4821" instrument_node="">The rating system as contemplated herein shall be based on standards prescribed by the</span><br data-dcnode-id="4820"><span data-dcnode-id="4819" instrument_node="">Commission and shall consider results of annual physical, psychological and neuropsychiatric</span><br data-dcnode-id="4818"><span data-dcnode-id="4817" instrument_node="">examinations conducted on the PNP officer or member concerned.</span><br data-dcnode-id="4816"><span data-dcnode-id="4815" instrument_node="">Section 38. Promotions. ? (a) A member of the PNP shall not be eligible for promotion to a</span><br data-dcnode-id="4814"><span data-dcnode-id="4813" instrument_node="">higher position or rank unless he has successfully passed the corresponding promotional</span><br data-dcnode-id="4812"><span data-dcnode-id="4811" instrument_node="">examination given by the Commission, or the Bar or corresponding board examinations for</span><br data-dcnode-id="4810"><span data-dcnode-id="4809" instrument_node="">technical services and other professions, and has satisfactorily completed an appropriate and</span><br data-dcnode-id="4808"><span data-dcnode-id="4807" instrument_node="">accredited course in the PNP or equivalent training institutions. In addition, no member of the</span><br data-dcnode-id="4806"><span data-dcnode-id="4805" instrument_node="">PNP shall eligible for promotion unless he has been cleared by the People's Law Enforcement</span><br data-dcnode-id="4804"><span data-dcnode-id="4803" instrument_node="">Board (PLEB) of complaints proffered against him, if any.</span><br data-dcnode-id="4802"><span data-dcnode-id="4801" instrument_node="">(b) Special promotion may be extended to any member of the PNP for acts of</span><br data-dcnode-id="4800"><span data-dcnode-id="4799" instrument_node="">conspicuous courage and gallantry at the risk of his life above and beyond the call of duty,</span><br data-dcnode-id="4798"><span data-dcnode-id="4797" instrument_node="">or selected as such in a nationwide search conducted by the PNP or any accredited civic</span><br data-dcnode-id="4796"><span data-dcnode-id="4795" instrument_node="">organization.</span><br data-dcnode-id="4794"><span data-dcnode-id="4793" instrument_node="">Section 39. Compulsory Retirement. ? Compulsory retirement, for officer and non-officer, shall</span><br data-dcnode-id="4792"><span data-dcnode-id="4791" instrument_node="">be upon the attainment of age fifty-six (56): Provided, That, in case of any officer with the rank of</span><br data-dcnode-id="4790"><span data-dcnode-id="4789" instrument_node="">chief superintendent, director or deputy director general, the Commission may allow his retention</span><br data-dcnode-id="4788"><span data-dcnode-id="4787" instrument_node="">in the service for an unextendible period of one (1) year.</span><br data-dcnode-id="4786"><span data-dcnode-id="4785" instrument_node="">Section 40. Optional Retirement. ? Upon accumulation of at least twenty (20) years of</span><br data-dcnode-id="4784"><span data-dcnode-id="4783" instrument_node="">satisfactory active service, an officer or non-officer, at his own request and with the approval of</span><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">the Commission, shall be retired from the service and entitled to receive benefits provided by</span><br data-dcnode-id="4780"><span data-dcnode-id="4779" instrument_node="">law.</span><br data-dcnode-id="4778"><span data-dcnode-id="4777" instrument_node="">C. ADMINISTRATIVE DISCIPLINARY MACHINERY</span><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">Section 41. (a) Citizen's Complaints. ? Any complaint by an individual person against any</span><br data-dcnode-id="4774"><span data-dcnode-id="4773" instrument_node="">fmember of the PNP shall be brought before the following:</span><br data-dcnode-id="4772"><span data-dcnode-id="4771" instrument_node="">(1) Chiefs of police, where the offense is punishable by withholding of privileges,</span><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">restriction to specified limits, suspension or forfeiture of salary, or any combination</span><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">thereof for a period not exceeding fifteen (15) days;</span><br data-dcnode-id="4766"><span data-dcnode-id="4765" instrument_node="">(2) Mayors of cities or municipalities, where the offense is punishable by</span><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">withholding of privileges, restriction to specified limits, suspension or forfeiture of</span><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">salary, or any combination thereof, for a period of not less than sixteen (16) days</span><br data-dcnode-id="4760"><span data-dcnode-id="4759" instrument_node="">but not exceeding thirty (30) days;</span><br data-dcnode-id="4758"><span data-dcnode-id="4757" instrument_node="">(3) People's Law Enforcement Board, as created under Section 43 hereof, where</span><br data-dcnode-id="4756"><span data-dcnode-id="4755" instrument_node="">the offense is punishable by withholding of privileges, restriction to specified limits,</span><br data-dcnode-id="4754"><span data-dcnode-id="4753" instrument_node="">suspension of forfeiture of salary, or any combination thereof, for a period</span><br data-dcnode-id="4752"><span data-dcnode-id="4751" instrument_node="">exceeding thirty (30) days; or by dismissal.</span><br data-dcnode-id="4750"><span data-dcnode-id="4749" instrument_node="">The Commission shall provide in its implementing rules and regulations a scale of</span><br data-dcnode-id="4748"><span data-dcnode-id="4747" instrument_node="">penalties to be imposed upon any member of the PNP under this section.</span><br data-dcnode-id="4746"><span data-dcnode-id="4745" instrument_node="">(b) Internal Discipline. ? In dealing with minor offenses involving internal discipline found</span><br data-dcnode-id="4744"><span data-dcnode-id="4743" instrument_node="">to have been committed by any regular member of their respective commands, the duly</span><br data-dcnode-id="4742"><span data-dcnode-id="4741" instrument_node="">designated supervisors and equivalent officers of the PNP shall, after due notice and</span><br data-dcnode-id="4740"><span data-dcnode-id="4739" instrument_node="">summary hearing, exercise disciplinary powers as follows:</span><br data-dcnode-id="4738"><span data-dcnode-id="4737" instrument_node="">Page 13 of 27 R.A. 6975</span><br data-dcnode-id="4736"><span data-dcnode-id="4735" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4734"><span data-dcnode-id="4733" instrument_node="">(1) Chiefs of police or equivalent supervisors may summarily impose the</span><br data-dcnode-id="4732"><span data-dcnode-id="4731" instrument_node="">administrative punishment of admonition or reprimand; restriction to specified limits;</span><br data-dcnode-id="4730"><span data-dcnode-id="4729" instrument_node="">withholding of privileges; forfeiture of salary or suspension; or any of the</span><br data-dcnode-id="4728"><span data-dcnode-id="4727" instrument_node="">combination of the foregoing: Provided; That, in all cases, the total period shall not</span><br data-dcnode-id="4726"><span data-dcnode-id="4725" instrument_node="">exceed fifteen (15) days;</span><br data-dcnode-id="4724"><span data-dcnode-id="4723" instrument_node="">(2) Provincial directors or equivalent supervisors may summarily impose the</span><br data-dcnode-id="4722"><span data-dcnode-id="4721" instrument_node="">administrative punishment of admonition or reprimand; restriction to specified limits;</span><br data-dcnode-id="4720"><span data-dcnode-id="4719" instrument_node="">withholding of privileges; forfeiture of salary or suspension; or any combination of</span><br data-dcnode-id="4718"><span data-dcnode-id="4717" instrument_node="">the foregoing: Provided, That, in all cases, the total period shall not exceed thirty</span><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">(30) days;</span><br data-dcnode-id="4714"><span data-dcnode-id="4713" instrument_node="">(3) Police regional directors or equivalent supervisors shall have the power to</span><br data-dcnode-id="4712"><span data-dcnode-id="4711" instrument_node="">impose upon any member the disciplinary punishment of dismissal from the</span><br data-dcnode-id="4710"><span data-dcnode-id="4709" instrument_node="">service. He may also impose the administrative punishment of admonition or</span><br data-dcnode-id="4708"><span data-dcnode-id="4707" instrument_node="">reprimand; restriction to specified limits; withholding of privileges; suspension or</span><br data-dcnode-id="4706"><span data-dcnode-id="4705" instrument_node="">forfeiture of salary; demotion; or any combination of the foregoing: Provided, That,</span><br data-dcnode-id="4704"><span data-dcnode-id="4703" instrument_node="">in all cases, the total period shall not exceed sixty (60) days;</span><br data-dcnode-id="4702"><span data-dcnode-id="4701" instrument_node="">(4) The Chief of the PNP shall have the power to impose the disciplinary</span><br data-dcnode-id="4700"><span data-dcnode-id="4699" instrument_node="">punishment of dismissal from the service; suspension or forfeiture of salary; or any</span><br data-dcnode-id="4698"><span data-dcnode-id="4697" instrument_node="">combination thereof for a period not exceeding one hundred eighty (180) days.</span><br data-dcnode-id="4696"><span data-dcnode-id="4695" instrument_node="">(c) Exclusive Jurisdiction. ? A complaint or a charge filed against a PNP member shall be</span><br data-dcnode-id="4694"><span data-dcnode-id="4693" instrument_node="">heard and decided exclusively by the disciplining authority who has acquired original</span><br data-dcnode-id="4692"><span data-dcnode-id="4691" instrument_node="">jurisdiction over the case and notwithstanding the existence of concurrent jurisdiction as</span><br data-dcnode-id="4690"><span data-dcnode-id="4689" instrument_node="">regards the offense: Provided, That offenses which carry higher penalties referred to a</span><br data-dcnode-id="4688"><span data-dcnode-id="4687" instrument_node="">disciplining authority shall be referred to the appropriate authority which has jurisdiction</span><br data-dcnode-id="4686"><span data-dcnode-id="4685" instrument_node="">over the offense.</span><br data-dcnode-id="4684"><span data-dcnode-id="4683" instrument_node="">For purposes of this Act, a "minor offense" shall refer to an act or omission not involving moral</span><br data-dcnode-id="4682"><span data-dcnode-id="4681" instrument_node="">turpitude, but affecting the internal discipline of the PNP, and shall include, but not limited to:</span><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">(1) Simple misconduct or negligence;</span><br data-dcnode-id="4678"><span data-dcnode-id="4677" instrument_node="">(2) Insubordination;</span><br data-dcnode-id="4676"><span data-dcnode-id="4675" instrument_node="">(3) Frequent absences or tardiness;</span><br data-dcnode-id="4674"><span data-dcnode-id="4673" instrument_node="">(4) Habitual drunkenness; and</span><br data-dcnode-id="4672"><span data-dcnode-id="4671" instrument_node="">(5) Gambling prohibited by law.</span><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">Section 42. Summary Dismissal Powers of the PNP Chief and Regional Directors. ? The Chief</span><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">of the PNP and regional directors, after due notice and summary hearings, may immediately</span><br data-dcnode-id="4666"><span data-dcnode-id="4665" instrument_node="">fremove or dismiss any respondent PNP member in any of the following cases:</span><br data-dcnode-id="4664"><span data-dcnode-id="4663" instrument_node="">(a) When the charge is serious and the evidence of guilt is strong;</span><br data-dcnode-id="4662"><span data-dcnode-id="4661" instrument_node="">(b) When the respondent is a recidivist or has been repeatedly charged and there are</span><br data-dcnode-id="4660"><span data-dcnode-id="4659" instrument_node="">reasonable grounds to believe that he is guilty of the charges; and</span><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">(c) When the respondent is guilty of conduct unbecoming of a police officer.</span><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">Page 14 of 27 R.A. 6975</span><br data-dcnode-id="4654"><span data-dcnode-id="4653" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node="">Section 43. People's Law Enforcement Board (PLEB). ? (a) Creation and Functions. ? Within</span><br data-dcnode-id="4650"><span data-dcnode-id="4649" instrument_node="">thirty (30) days from the issuance of the implementing rules and regulations by the Commission,</span><br data-dcnode-id="4648"><span data-dcnode-id="4647" instrument_node="">there shall be created by the sangguniang panlungsod/bayan in every city and municipality such</span><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">number of People's Law Enforcement Boards (PLEBs) as may be necessary: Provided, That</span><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">there shall be at least one (1) PLEB for every municipality and for each of the legislative districts</span><br data-dcnode-id="4642"><span data-dcnode-id="4641" instrument_node="">in a city. The PLEB shall have jurisdiction to hear and decide citizen's complaints or cases filed</span><br data-dcnode-id="4640"><span data-dcnode-id="4639" instrument_node="">before it against erring officers and members of the PNP. There shall be at least one (1) PLEB</span><br data-dcnode-id="4638"><span data-dcnode-id="4637" instrument_node="">for every five hundred (500) city or municipal police personnel.</span><br data-dcnode-id="4636"><span data-dcnode-id="4635" instrument_node="">(b) Composition and Term of Office. ? The PLEB shall be composed of the following:</span><br data-dcnode-id="4634"><span data-dcnode-id="4633" instrument_node="">(1) Any member of the sangguniang panlungsod/bayan chosen by his respective</span><br data-dcnode-id="4632"><span data-dcnode-id="4631" instrument_node="">sanggunian;</span><br data-dcnode-id="4630"><span data-dcnode-id="4629" instrument_node="">(2) Any barangay captain of the city or municipality concerned chosen by the</span><br data-dcnode-id="4628"><span data-dcnode-id="4627" instrument_node="">association of barangay captains; and</span><br data-dcnode-id="4626"><span data-dcnode-id="4625" instrument_node="">(3) Three (3) other members who shall be chosen by the peace and order council</span><br data-dcnode-id="4624"><span data-dcnode-id="4623" instrument_node="">from among the respected members of the community known for their probity and</span><br data-dcnode-id="4622"><span data-dcnode-id="4621" instrument_node="">integrity, one (1) of whom must be a member of the Bar or, in the absence thereof,</span><br data-dcnode-id="4620"><span data-dcnode-id="4619" instrument_node="">a college graduate, or the principal of the central elementary school in the locality.</span><br data-dcnode-id="4618"><span data-dcnode-id="4617" instrument_node="">The Chairman of the PLEB shall be elected from among its members. The term of office</span><br data-dcnode-id="4616"><span data-dcnode-id="4615" instrument_node="">of the members of the PLEB shall be for a period of two (2) years from assumption of</span><br data-dcnode-id="4614"><span data-dcnode-id="4613" instrument_node="">office. Such member shall hold office until his successor shall have been chosen and</span><br data-dcnode-id="4612"><span data-dcnode-id="4611" instrument_node="">qualified.</span><br data-dcnode-id="4610"><span data-dcnode-id="4609" instrument_node="">(c) Compensation ? Membership in the PLEB is a civic duty. However, PLEB members</span><br data-dcnode-id="4608"><span data-dcnode-id="4607" instrument_node="">may be paid per diem as may be determined by the city or municipal council from city or</span><br data-dcnode-id="4606"><span data-dcnode-id="4605" instrument_node="">municipal funds.</span><br data-dcnode-id="4604"><span data-dcnode-id="4603" instrument_node="">(d) Procedure ? (1) The PLEB, by a majority vote of all its members and its Chairman</span><br data-dcnode-id="4602"><span data-dcnode-id="4601" instrument_node="">shall determine whether or not the respondent officer or member of the PNP is guilty of</span><br data-dcnode-id="4600"><span data-dcnode-id="4599" instrument_node="">the charge upon which the complaint is based.</span><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">(2) Each case shall be decided within sixty (60) days from the time the case has</span><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">been filed with the PLEB.</span><br data-dcnode-id="4594"><span data-dcnode-id="4593" instrument_node="">(3) The procedures in the PLEB shall be summary in nature, conducted in</span><br data-dcnode-id="4592"><span data-dcnode-id="4591" instrument_node="">accordance with due process, but without strict regard to technical rules of</span><br data-dcnode-id="4590"><span data-dcnode-id="4589" instrument_node="">evidence.</span><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">(4) The Commission shall issue the necessary implementing guidelines and</span><br data-dcnode-id="4586"><span data-dcnode-id="4585" instrument_node="">procedures to be adopted by the PLEB, including graduated penalties which may</span><br data-dcnode-id="4584"><span data-dcnode-id="4583" instrument_node="">be imposed by the PLEB.</span><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">(5) The Commission may assign the present NAPOLCOM hearing officers to act as</span><br data-dcnode-id="4580"><span data-dcnode-id="4579" instrument_node="">legal consultants of the PLEBs and provide, whenever necessary, legal services,</span><br data-dcnode-id="4578"><span data-dcnode-id="4577" instrument_node="">assistance and advise to the PLEBs in hearing and deciding cases against officers</span><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">and members of the PNP, especially those involving difficult questions of law:</span><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">Provided, That these lawyers may also be assigned to investigate claims for death</span><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">and disability benefits of PNP members or their heirs.</span><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">(e) Decisions ? The decision of the PLEB shall become final and executory: Provided,</span><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">That a decision involving demotion or dismissal from the service may be appealed by</span><br data-dcnode-id="4566"><span data-dcnode-id="4565" instrument_node="">Page 15 of 27 R.A. 6975</span><br data-dcnode-id="4564"><span data-dcnode-id="4563" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">either party with the regional appellate board within ten (10) days from receipt of the copy</span><br data-dcnode-id="4560"><span data-dcnode-id="4559" instrument_node="">of the decision.</span><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">fSection 44. Disciplinary Appellate Boards. ? The formal administrative disciplinary machinery for</span><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">the PNP shall be the National Appellate Board and the regional appellate boards.</span><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">The National Appellate Board shall consist of four (4) divisions, each division composed of a</span><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">Commissioner as Chairman and two (2) other members. The Board shall consider appeals from</span><br data-dcnode-id="4550"><span data-dcnode-id="4549" instrument_node="">decisions of the Chief of the PNP.</span><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">The National Appellate Board may conduct its hearings or sessions in Metropolitan Manila or</span><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">any part of the country as it may deem necessary.</span><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">There shall be at least one (1) regional appellate board per administrative region in the country</span><br data-dcnode-id="4542"><span data-dcnode-id="4541" instrument_node="">to be composed of a senior officer of the regional Commission as Chairman and one (1)</span><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">representative each from the PNP, and the regional peace and order council as members. It</span><br data-dcnode-id="4538"><span data-dcnode-id="4537" instrument_node="">shall consider appeals from decisions of the regional directors, other officials, mayors, and the</span><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">PLEBs: Provided, That the Commission may create additional regional appellate boards as the</span><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">need arises.</span><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">Section 45. Finality of Disciplinary Action. ? The disciplinary action imposed upon a member of</span><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node="">the PNP shall be final and executory: Provided, That a disciplinary action imposed by the</span><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">regional director or by the PLEB involving demotion or dismissal from the service may be</span><br data-dcnode-id="4526"><span data-dcnode-id="4525" instrument_node="">appealed to the regional appellate board within ten (10) days from receipt of the copy of the</span><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">notice of decision: Provided, further, That the disciplinary action imposed by the Chief of the</span><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">PNP involving demotion or dismissal may be appealed to the National Appellate Board within ten</span><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">(10) days from receipt thereof: Provided, furthermore, That the regional or National Appellate</span><br data-dcnode-id="4518"><span data-dcnode-id="4517" instrument_node="">Board, as the case may be, shall decide the appeal within sixty (60) days from receipt of the</span><br data-dcnode-id="4516"><span data-dcnode-id="4515" instrument_node="">notice of appeal: Provided, finally, That failure of the regional appellate board to act on the</span><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">appeal within said period shall render the decision final and executory without prejudice,</span><br data-dcnode-id="4512"><span data-dcnode-id="4511" instrument_node="">however, to the filing of an appeal by either party with the Secretary.</span><br data-dcnode-id="4510"><span data-dcnode-id="4509" instrument_node="">Section 46. Jurisdiction in Criminal Cases. ? Any provision of law to the contrary</span><br data-dcnode-id="4508"><span data-dcnode-id="4507" instrument_node="">notwithstanding, criminal cases involving PNP members shall within the exclusive jurisdiction of</span><br data-dcnode-id="4506"><span data-dcnode-id="4505" instrument_node="">the regular courts: Provided, That the courts-martial appointed pursuant to Presidential Decree</span><br data-dcnode-id="4504"><span data-dcnode-id="4503" instrument_node="">No. 1850 shall continue to try PC-INP members who have already been arraigned, to include</span><br data-dcnode-id="4502"><span data-dcnode-id="4501" instrument_node="">appropriate actions thereon by the reviewing authorities pursuant to Commonwealth Act No.</span><br data-dcnode-id="4500"><span data-dcnode-id="4499" instrument_node="">408, otherwise known as the Articles of War, as amended, and Executive Order No. 178,</span><br data-dcnode-id="4498"><span data-dcnode-id="4497" instrument_node="">otherwise known as the Manual for Courts-Martial: Provided, further, That criminal cases against</span><br data-dcnode-id="4496"><span data-dcnode-id="4495" instrument_node="">PC-INP members who may have not yet been arraigned upon the effectivity of this Act shall be</span><br data-dcnode-id="4494"><span data-dcnode-id="4493" instrument_node="">transferred to the proper city or provincial prosecutor or municipal trial court judge.</span><br data-dcnode-id="4492"><span data-dcnode-id="4491" instrument_node="">Section 47. Preventive Suspension Pending Criminal Case. ? Upon the filing of a complaint or</span><br data-dcnode-id="4490"><span data-dcnode-id="4489" instrument_node="">information sufficient in form and substance against a member of the PNP for grave felonies</span><br data-dcnode-id="4488"><span data-dcnode-id="4487" instrument_node="">where the penalty imposed by law is six (6) years and one (1) day or more, the court shall</span><br data-dcnode-id="4486"><span data-dcnode-id="4485" instrument_node="">immediately suspend the accused from office until the case is terminated. Such case shall be</span><br data-dcnode-id="4484"><span data-dcnode-id="4483" instrument_node="">subject to continuous trial and shall be terminated within ninety (90) days from arraignment of</span><br data-dcnode-id="4482"><span data-dcnode-id="4481" instrument_node="">the accused.</span><br data-dcnode-id="4480"><span data-dcnode-id="4479" instrument_node="">Section 48. Entitlement to Reinstatement and Salary. ? A member of the PNP who may have</span><br data-dcnode-id="4478"><span data-dcnode-id="4477" instrument_node="">been suspended from office in accordance with the provisions of this Act or who shall have been</span><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">terminated or separated from office shall, upon acquittal from the charges against him, be</span><br data-dcnode-id="4474"><span data-dcnode-id="4473" instrument_node="">entitled to reinstatement and to prompt payment of salary, allowances and other benefits</span><br data-dcnode-id="4472"><span data-dcnode-id="4471" instrument_node="">withheld from him by reason of such suspension or termination.</span><br data-dcnode-id="4470"><span data-dcnode-id="4469" instrument_node="">Page 16 of 27 R.A. 6975</span><br data-dcnode-id="4468"><span data-dcnode-id="4467" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4466"><span data-dcnode-id="4465" instrument_node="">Section 49. Legal Assistance. ? The Secretary of the Department of Justice, the Chairman of</span><br data-dcnode-id="4464"><span data-dcnode-id="4463" instrument_node="">the Commission or the Chief of the PNP may authorize lawyers of their respective agencies to</span><br data-dcnode-id="4462"><span data-dcnode-id="4461" instrument_node="">provide legal assistance to any member of the PNP who is facing before the prosecutor's office,</span><br data-dcnode-id="4460"><span data-dcnode-id="4459" instrument_node="">the court or any competent body, a charge or charges arising from any incident which is related</span><br data-dcnode-id="4458"><span data-dcnode-id="4457" instrument_node="">to the performance of his official duty: Provided, That government lawyers so authorized shall</span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node="">have the power to administer oaths. The Secretary of Justice, the Chairman of the Commission,</span><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node="">and the Chief of the PNP shall jointly promulgate rules and regulations to implement the</span><br data-dcnode-id="4452"><span data-dcnode-id="4451" instrument_node="">provisions of this section.</span><br data-dcnode-id="4450"><span data-dcnode-id="4449" instrument_node="">fSection 50. Power to Administer Oaths. ? Officials of the Commission who are appointed by the</span><br data-dcnode-id="4448"><span data-dcnode-id="4447" instrument_node="">President, as well as officers of the PNP from rank of inspector to senior superintendent, shall</span><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node="">have the power to administer oaths on matters which are connected with the performance of</span><br data-dcnode-id="4444"><span data-dcnode-id="4443" instrument_node="">their official duties.</span><br data-dcnode-id="4442"><span data-dcnode-id="4441" instrument_node="">D. PARTICIPATION OF LOCAL EXECUTIVES IN THE ADMINISTRATION OF THE PNP</span><br data-dcnode-id="4440"><span data-dcnode-id="4439" instrument_node="">Section 51. Powers of Local Government Officials Over the PNP Units or Forces. ? Governors</span><br data-dcnode-id="4438"><span data-dcnode-id="4437" instrument_node="">and mayors shall be deputized as representatives of the Commission in their respective</span><br data-dcnode-id="4436"><span data-dcnode-id="4435" instrument_node="">territorial jurisdiction. As such, the local executives shall discharge the following functions:</span><br data-dcnode-id="4434"><span data-dcnode-id="4433" instrument_node="">(a) Provincial Governor ? (1) Power to Choose the Provincial Director. ? The provincial</span><br data-dcnode-id="4432"><span data-dcnode-id="4431" instrument_node="">governor shall choose the provincial director from a list of three (3) eligible recommended</span><br data-dcnode-id="4430"><span data-dcnode-id="4429" instrument_node="">by the PNP regional director.</span><br data-dcnode-id="4428"><span data-dcnode-id="4427" instrument_node="">(2) Overseeing the Provincial Public Safety Plan Implementation. ? The governor,</span><br data-dcnode-id="4426"><span data-dcnode-id="4425" instrument_node="">as chairman of the provincial peace and order council, shall oversee the</span><br data-dcnode-id="4424"><span data-dcnode-id="4423" instrument_node="">implementation of the provincial public safety plan, which is prepared taking into</span><br data-dcnode-id="4422"><span data-dcnode-id="4421" instrument_node="">consideration the integrated community safety plans, as provided under paragraph</span><br data-dcnode-id="4420"><span data-dcnode-id="4419" instrument_node="">(b) (2) of this section.</span><br data-dcnode-id="4418"><span data-dcnode-id="4417" instrument_node="">(b) City and Municipal Mayors ? (1) Operational Supervision and Control. The city and</span><br data-dcnode-id="4416"><span data-dcnode-id="4415" instrument_node="">municipal mayors shall exercise operational supervision and control over PNP units in</span><br data-dcnode-id="4414"><span data-dcnode-id="4413" instrument_node="">their respective jurisdiction except during the thirty (30) day period immediately preceding</span><br data-dcnode-id="4412"><span data-dcnode-id="4411" instrument_node="">and the thirty (30) days following any national, local and barangay elections. During the</span><br data-dcnode-id="4410"><span data-dcnode-id="4409" instrument_node="">said period, the local police forces shall be under the supervision and control of the</span><br data-dcnode-id="4408"><span data-dcnode-id="4407" instrument_node="">Commission on Elections.</span><br data-dcnode-id="4406"><span data-dcnode-id="4405" instrument_node="">The term "operational supervision and control" shall mean the power to direct,</span><br data-dcnode-id="4404"><span data-dcnode-id="4403" instrument_node="">superintend, oversee and inspect the police units and forces.</span><br data-dcnode-id="4402"><span data-dcnode-id="4401" instrument_node="">It shall include the power to employ and deploy units or elements of the PNP,</span><br data-dcnode-id="4400"><span data-dcnode-id="4399" instrument_node="">through the station commander, to ensure public safety and effective maintenance</span><br data-dcnode-id="4398"><span data-dcnode-id="4397" instrument_node="">of peace and order within the locality. For this purpose, the term "employ" and</span><br data-dcnode-id="4396"><span data-dcnode-id="4395" instrument_node="">"deploy" shall mean as follows:</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">"Employ" refers to utilization of units or elements of the PNP for purposes of</span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">protection of lives and properties, enforcement of laws, maintenance of peace and</span><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">order, prevention of crimes, arrest of criminal offenders and bringing the offenders</span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">to justice, and ensuring public safety, particularly in the suppression of disorders,</span><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">riots, lawless violence, rebellious seditious conspiracy, insurgency, subversion or</span><br data-dcnode-id="4384"><span data-dcnode-id="4383" instrument_node="">other related activities.</span><br data-dcnode-id="4382"><span data-dcnode-id="4381" instrument_node="">"Deploy" shall mean the orderly organized physical movement of elements or units</span><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">of the PNP within the province, city or municipality for purposes of employment as</span><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">herein defined.</span><br data-dcnode-id="4376"><span data-dcnode-id="4375" instrument_node="">Page 17 of 27 R.A. 6975</span><br data-dcnode-id="4374"><span data-dcnode-id="4373" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4372"><span data-dcnode-id="4371" instrument_node="">(2) Integrated Community Safety Plans. ? The municipal/city mayor shall, in</span><br data-dcnode-id="4370"><span data-dcnode-id="4369" instrument_node="">coordination with the local peace and order council of which he is the chairman</span><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">pursuant to Executive Order No. 309, as amended, develop and establish an</span><br data-dcnode-id="4366"><span data-dcnode-id="4365" instrument_node="">integrated area/community public safety plan embracing priorities of action and</span><br data-dcnode-id="4364"><span data-dcnode-id="4363" instrument_node="">program thrusts for implementation by the local PNP stations.</span><br data-dcnode-id="4362"><span data-dcnode-id="4361" instrument_node="">It shall, likewise, be the duty of the city or municipal mayor to sponsor periodic</span><br data-dcnode-id="4360"><span data-dcnode-id="4359" instrument_node="">seminars for members of the PNP assigned or detailed in his city or municipality in</span><br data-dcnode-id="4358"><span data-dcnode-id="4357" instrument_node="">order to update them regarding local ordinances and legislations.</span><br data-dcnode-id="4356"><span data-dcnode-id="4355" instrument_node="">(3) Administrative Disciplinary Powers. ? In the areas of discipline, city and</span><br data-dcnode-id="4354"><span data-dcnode-id="4353" instrument_node="">municipal mayors shall have the powers to impose, after due notice and summary</span><br data-dcnode-id="4352"><span data-dcnode-id="4351" instrument_node="">hearings, disciplinary penalties for minor offenses committed by members of the</span><br data-dcnode-id="4350"><span data-dcnode-id="4349" instrument_node="">PNP assigned to their respective jurisdictions, as provided in Section 41 of this Act.</span><br data-dcnode-id="4348"><span data-dcnode-id="4347" instrument_node="">(4) Other Powers. ? In addition to the aforementioned powers, city and municipal</span><br data-dcnode-id="4346"><span data-dcnode-id="4345" instrument_node="">mayors shall have the following authority over the PNP units in their respective</span><br data-dcnode-id="4344"><span data-dcnode-id="4343" instrument_node="">jurisdictions:</span><br data-dcnode-id="4342"><span data-dcnode-id="4341" instrument_node="">f(i) Authority to choose the chief of police from a list of five (5) eligibles</span><br data-dcnode-id="4340"><span data-dcnode-id="4339" instrument_node="">recommended by the provincial police director, preferably from the same</span><br data-dcnode-id="4338"><span data-dcnode-id="4337" instrument_node="">province, city or municipality.</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">(ii) Authority to recommend the transfer, reassignment or detail of PNP</span><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">members outside of their respective city or town residences; and</span><br data-dcnode-id="4332"><span data-dcnode-id="4331" instrument_node="">(iii) Authority to recommend, from a list of eligibles previously screened by</span><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">the peace and order council, the appointment of new members of the PNP to</span><br data-dcnode-id="4328"><span data-dcnode-id="4327" instrument_node="">be assigned to their respective cities or municipalities without which no such</span><br data-dcnode-id="4326"><span data-dcnode-id="4325" instrument_node="">appointment shall be attested.</span><br data-dcnode-id="4324"><span data-dcnode-id="4323" instrument_node="">Section 52. Suspension of Operational Supervision and Control. ? The President may, upon</span><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">consultation with the provincial governor and congressman concerned, suspend the power of</span><br data-dcnode-id="4320"><span data-dcnode-id="4319" instrument_node="">operational supervision and control of any local executive over police units assigned or stationed</span><br data-dcnode-id="4318"><span data-dcnode-id="4317" instrument_node="">in his jurisdiction for any of the following grounds:</span><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">(a) Frequent unauthorized absences;</span><br data-dcnode-id="4314"><span data-dcnode-id="4313" instrument_node="">(b) Abuse of authority;</span><br data-dcnode-id="4312"><span data-dcnode-id="4311" instrument_node="">(c) Providing material support to criminal elements; or</span><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node="">(d) Engaging in acts inimical to national security or which negate the effectiveness of the</span><br data-dcnode-id="4308"><span data-dcnode-id="4307" instrument_node="">peace and order campaign.</span><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">Upon good cause shown, the President may, motu propio or upon the recommendation of the</span><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">National Police Commission, restore such power withdrawn from any local executive.</span><br data-dcnode-id="4302"><span data-dcnode-id="4301" instrument_node="">CHAPTER IV</span><br data-dcnode-id="4300"><span data-dcnode-id="4299" instrument_node="">BUREAU OF FIRE PROTECTION</span><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">Section 53. Composition. ? The Bureau of Fire Protection, hereinafter referred to as the Fire</span><br data-dcnode-id="4296"><span data-dcnode-id="4295" instrument_node="">Bureau, is hereby created initially consisting of the existing officers and uniformed members of</span><br data-dcnode-id="4294"><span data-dcnode-id="4293" instrument_node="">the fire service of the Integrated National Police as constituted under Presidential Decree No.</span><br data-dcnode-id="4292"><span data-dcnode-id="4291" instrument_node="">Page 18 of 27 R.A. 6975</span><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4288"><span data-dcnode-id="4287" instrument_node="">765.</span><br data-dcnode-id="4286"><span data-dcnode-id="4285" instrument_node="">Section 54. Powers and Functions. ? The Fire Bureau shall be responsible for the prevention</span><br data-dcnode-id="4284"><span data-dcnode-id="4283" instrument_node="">and suppression of all destructive fires on buildings, houses and other structures, forest, land</span><br data-dcnode-id="4282"><span data-dcnode-id="4281" instrument_node="">transportation vehicles and equipment, ships or vessels docked at piers or wharves or anchored</span><br data-dcnode-id="4280"><span data-dcnode-id="4279" instrument_node="">in major seaports, petroleum industry installations, plane crashes and other similar incidents, as</span><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">well as the enforcement of the Fire Code and other related laws.</span><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">The Fire Bureau shall have the power to investigate all causes of fires and, if necessary, file the</span><br data-dcnode-id="4274"><span data-dcnode-id="4273" instrument_node="">proper complaints with the city or provincial prosecutor who has jurisdiction over the case.</span><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node="">Section 55. Organization. ? The Fire Bureau shall be headed by a chief who shall be assisted</span><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">by a deputy chief. It shall be composed of provincial offices, district offices and city or municipal</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">stations.</span><br data-dcnode-id="4266"><span data-dcnode-id="4265" instrument_node="">At the provincial level, there shall be an office of the provincial fire marshall which shall</span><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">implement the policies, plans and programs of the Department; and monitor, evaluate and</span><br data-dcnode-id="4262"><span data-dcnode-id="4261" instrument_node="">coordinate the operations and activities of the fire service operating units at the city and</span><br data-dcnode-id="4260"><span data-dcnode-id="4259" instrument_node="">municipal levels. In the case of large provinces, district offices may be established, to be headed</span><br data-dcnode-id="4258"><span data-dcnode-id="4257" instrument_node="">by a district fire marshall.</span><br data-dcnode-id="4256"><span data-dcnode-id="4255" instrument_node="">At the city or municipal level, there shall be a fire station, each headed by a city or municipal fire</span><br data-dcnode-id="4254"><span data-dcnode-id="4253" instrument_node="">marshall: Provided, That, in the case of large cities and municipalities, a district office with</span><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">subordinate fire stations headed by a district fire marshall may be organized as necessary.</span><br data-dcnode-id="4250"><span data-dcnode-id="4249" instrument_node="">The Fire Chief shall recommended to the Secretary the organizational structure and staffing</span><br data-dcnode-id="4248"><span data-dcnode-id="4247" instrument_node="">pattern, as well as the disciplinary machinery for officers and men of the Bureau, in accordance</span><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">with the guidelines set forth herein and as provided in Section 85 of this Act.</span><br data-dcnode-id="4244"><span data-dcnode-id="4243" instrument_node="">The local government units at the city and municipal levels shall be responsible for the fire</span><br data-dcnode-id="4242"><span data-dcnode-id="4241" instrument_node="">protection and various emergency services such as rescue and evacuation of injured people at</span><br data-dcnode-id="4240"><span data-dcnode-id="4239" instrument_node="">fire-related incidents and, in general, all fire prevention and suppression measures to secure the</span><br data-dcnode-id="4238"><span data-dcnode-id="4237" instrument_node="">safety of life and property of the citizenry.</span><br data-dcnode-id="4236"><span data-dcnode-id="4235" instrument_node="">Section 56. Establishment of Fire Station. ? There shall be established at least one (1) fire</span><br data-dcnode-id="4234"><span data-dcnode-id="4233" instrument_node="">fstation with adequate personnel, firefighting facilities and equipment in every provincial capital,</span><br data-dcnode-id="4232"><span data-dcnode-id="4231" instrument_node="">city and municipality subject to the standards, rules and regulations as may be promulgated by</span><br data-dcnode-id="4230"><span data-dcnode-id="4229" instrument_node="">the Department. The local government unit shall, however, provide the necessary and or site of</span><br data-dcnode-id="4228"><span data-dcnode-id="4227" instrument_node="">the station.</span><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">Section 57. Qualification Standards. ? The qualification standards of the members of the Fire</span><br data-dcnode-id="4224"><span data-dcnode-id="4223" instrument_node="">Bureau shall be as prescribed by the Department based on the requirement of the service.</span><br data-dcnode-id="4222"><span data-dcnode-id="4221" instrument_node="">Section 58. Rank Classification. ? For purposes of efficient administration, supervision and</span><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">control, the rank classification of the members of the Fire Bureau shall be as follows:</span><br data-dcnode-id="4218"><span data-dcnode-id="4217" instrument_node="">Director</span><br data-dcnode-id="4216"><span data-dcnode-id="4215" instrument_node="">Chief Superintendent</span><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">Senior Superintendent</span><br data-dcnode-id="4212"><span data-dcnode-id="4211" instrument_node="">Superintendent</span><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">Page 19 of 27 R.A. 6975</span><br data-dcnode-id="4208"><span data-dcnode-id="4207" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4206"><span data-dcnode-id="4205" instrument_node="">Chief Inspector</span><br data-dcnode-id="4204"><span data-dcnode-id="4203" instrument_node="">Senior Inspector</span><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">Inspector</span><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">Senior Fire Officer IV</span><br data-dcnode-id="4198"><span data-dcnode-id="4197" instrument_node="">Senior Fire Officer III</span><br data-dcnode-id="4196"><span data-dcnode-id="4195" instrument_node="">Senior Fire Officer II</span><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">Senior Fire Officer I</span><br data-dcnode-id="4192"><span data-dcnode-id="4191" instrument_node="">Fire Officer III</span><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">Fire Officer II</span><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">Fire Officer I</span><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">Section 59. Key Positions. ? The head of the Fire Bureau with the rank of director shall have the</span><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node="">position title of Chief of the Fire Bureau. He shall be assisted by a deputy chief with the rank of</span><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">chief superintendent.</span><br data-dcnode-id="4180"><span data-dcnode-id="4179" instrument_node="">The assistant heads of the Department's regional offices with the rank of senior superintendent</span><br data-dcnode-id="4178"><span data-dcnode-id="4177" instrument_node="">shall assume the position title of Assistant Regional Director for Fire Protection as provided in</span><br data-dcnode-id="4176"><span data-dcnode-id="4175" instrument_node="">Section 11 of this Act; the heads of the NCR district offices with the rank of senior</span><br data-dcnode-id="4174"><span data-dcnode-id="4173" instrument_node="">superintendent shall have the position title of District Fire Marshall; the heads of the provincial</span><br data-dcnode-id="4172"><span data-dcnode-id="4171" instrument_node="">offices with the rank of superintendent shall be known as Provincial Fire Marshall; the heads of</span><br data-dcnode-id="4170"><span data-dcnode-id="4169" instrument_node="">the district offices with the rank of chief inspector shall have the position title of District Fire</span><br data-dcnode-id="4168"><span data-dcnode-id="4167" instrument_node="">Marshall; and the heads of the municipal or city stations with the rank of senior inspector shall be</span><br data-dcnode-id="4166"><span data-dcnode-id="4165" instrument_node="">known as Chief of Municipal/City Fire Station.</span><br data-dcnode-id="4164"><span data-dcnode-id="4163" instrument_node="">CHAPTER V</span><br data-dcnode-id="4162"><span data-dcnode-id="4161" instrument_node="">BUREAU OF JAIL MANAGEMENT AND PENOLOGY</span><br data-dcnode-id="4160"><span data-dcnode-id="4159" instrument_node="">Section 60. Composition. ? The Bureau of Jail Management and Penology, hereinafter referred</span><br data-dcnode-id="4158"><span data-dcnode-id="4157" instrument_node="">to as the Jail Bureau, is hereby created initially consisting of officers and uniformed members of</span><br data-dcnode-id="4156"><span data-dcnode-id="4155" instrument_node="">the Jail Management and Penology Service as constituted under Presidential Decree No. 765.</span><br data-dcnode-id="4154"><span data-dcnode-id="4153" instrument_node="">Section 61. Powers and Functions. ? The Jail Bureau shall exercise supervision and control</span><br data-dcnode-id="4152"><span data-dcnode-id="4151" instrument_node="">over all city and municipal jails. The provincial jails shall be supervised and controlled by the</span><br data-dcnode-id="4150"><span data-dcnode-id="4149" instrument_node="">provincial government within its jurisdiction, whose expenses shall be subsidized by the National</span><br data-dcnode-id="4148"><span data-dcnode-id="4147" instrument_node="">Government for not more than three (3) years after the effectivity of this Act.</span><br data-dcnode-id="4146"><span data-dcnode-id="4145" instrument_node="">Section 62. Organization. ? The Jail Bureau shall be headed by a Chief who shall be assisted</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">by a deputy chief.</span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">The jail Bureau shall composed of city and municipal jails, each headed by a city or municipal jail</span><br data-dcnode-id="4140"><span data-dcnode-id="4139" instrument_node="">warden: Provided, That, in the case of large cities and municipalities, a district jail with</span><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">subordinate jails headed by a district jail warden may be established as necessary.</span><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node="">The Chief of the Jail Bureau shall recommended to the Secretary the organizational structure</span><br data-dcnode-id="4134"><span data-dcnode-id="4133" instrument_node="">and staffing pattern of the Bureau as well as the disciplinary machinery for officers and men of</span><br data-dcnode-id="4132"><span data-dcnode-id="4131" instrument_node="">Page 20 of 27 R.A. 6975</span><br data-dcnode-id="4130"><span data-dcnode-id="4129" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4128"><span data-dcnode-id="4127" instrument_node="">the Bureau in accordance with the guidelines set forth herein and as prescribed in Section 85 of</span><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">fthis Act.</span><br data-dcnode-id="4124"><span data-dcnode-id="4123" instrument_node="">Section 63. Establishment of District, City or Municipal Jail. ? There shall be established and</span><br data-dcnode-id="4122"><span data-dcnode-id="4121" instrument_node="">maintained in every district, city and municipality a secured, clean adequately equipped and</span><br data-dcnode-id="4120"><span data-dcnode-id="4119" instrument_node="">sanitary jail for the custody and safekeeping of city and municipal prisoners, any fugitive from</span><br data-dcnode-id="4118"><span data-dcnode-id="4117" instrument_node="">justice, or person detained awaiting investigation or trial and/or transfer to the national</span><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node="">penitentiary, and/or violent mentally ill person who endangers himself or the safety of others,</span><br data-dcnode-id="4114"><span data-dcnode-id="4113" instrument_node="">duly certified as such by the proper medical or health officer, pending the transfer to a medical</span><br data-dcnode-id="4112"><span data-dcnode-id="4111" instrument_node="">institution.</span><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">The municipal or city jail service shall preferably be headed by a graduate of a four (4) year</span><br data-dcnode-id="4108"><span data-dcnode-id="4107" instrument_node="">course in psychology, psychiatry, sociology, nursing, social work or criminology who shall assist</span><br data-dcnode-id="4106"><span data-dcnode-id="4105" instrument_node="">in the immediate rehabilitation of individuals or detention of prisoners. Great care must be</span><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">exercised so that the human rights of this prisoners are respected and protected, and their</span><br data-dcnode-id="4102"><span data-dcnode-id="4101" instrument_node="">spiritual and physical well-being are properly and promptly attended to.</span><br data-dcnode-id="4100"><span data-dcnode-id="4099" instrument_node="">Section 64. Rank Classification. ? For purpose of efficient administration, supervision and</span><br data-dcnode-id="4098"><span data-dcnode-id="4097" instrument_node="">control, the rank classification of the members of the Jail Bureau shall be as follows:</span><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">Director</span><br data-dcnode-id="4094"><span data-dcnode-id="4093" instrument_node="">Chief Superintendent</span><br data-dcnode-id="4092"><span data-dcnode-id="4091" instrument_node="">Senior Superintendent</span><br data-dcnode-id="4090"><span data-dcnode-id="4089" instrument_node="">Superintendent</span><br data-dcnode-id="4088"><span data-dcnode-id="4087" instrument_node="">Chief Inspector</span><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">Senior Inspector</span><br data-dcnode-id="4084"><span data-dcnode-id="4083" instrument_node="">Inspector</span><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">Senior Jail Officer IV</span><br data-dcnode-id="4080"><span data-dcnode-id="4079" instrument_node="">Senior Jail Officer III</span><br data-dcnode-id="4078"><span data-dcnode-id="4077" instrument_node="">Senior Jail Officer II</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">Senior Jail Officer I</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">Jail Officer III</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">Jail Officer II</span><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">Jail Officer I</span><br data-dcnode-id="4068"><span data-dcnode-id="4067" instrument_node="">Section 65. Key Positions. ? The head of the Jail Bureau with the rank of director shall have the</span><br data-dcnode-id="4066"><span data-dcnode-id="4065" instrument_node="">position title of Chief of Jail Bureau. He shall be assisted by a deputy chief with the rank of chief</span><br data-dcnode-id="4064"><span data-dcnode-id="4063" instrument_node="">superintendent.</span><br data-dcnode-id="4062"><span data-dcnode-id="4061" instrument_node="">The assistant heads of the Department's regional offices with the rank of senior superintendent</span><br data-dcnode-id="4060"><span data-dcnode-id="4059" instrument_node="">Page 21 of 27 R.A. 6975</span><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="4056"><span data-dcnode-id="4055" instrument_node="">shall assume the position title of Assistant Regional Director of Jail Management and Penology</span><br data-dcnode-id="4054"><span data-dcnode-id="4053" instrument_node="">as provided by Section 12 of this Act; the heads of district offices with the rank of chief inspector</span><br data-dcnode-id="4052"><span data-dcnode-id="4051" instrument_node="">shall have the position title of District Jail Warden; and the heads of the city or municipal stations</span><br data-dcnode-id="4050"><span data-dcnode-id="4049" instrument_node="">with the rank of senior inspector shall be known as City/Municipal Jail Warden.</span><br data-dcnode-id="4048"><span data-dcnode-id="4047" instrument_node="">CHAPTER VI</span><br data-dcnode-id="4046"><span data-dcnode-id="4045" instrument_node="">THE PHILIPPINE PUBLIC SAFETY COLLEGE</span><br data-dcnode-id="4044"><span data-dcnode-id="4043" instrument_node="">Section 66. Creation of the Philippine Public Safety College. ? There is hereby created the</span><br data-dcnode-id="4042"><span data-dcnode-id="4041" instrument_node="">Philippine Public Safety College (PPSC), which shall be the premier educational institution for</span><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">the training, human resource development and continuing education of all personnel of the PNP,</span><br data-dcnode-id="4038"><span data-dcnode-id="4037" instrument_node="">Fire and Jail Bureaus.</span><br data-dcnode-id="4036"><span data-dcnode-id="4035" instrument_node="">Said College shall be under the direct supervision of a Board of Trustees composed of the</span><br data-dcnode-id="4034"><span data-dcnode-id="4033" instrument_node="">Secretary and the three (3) bureau heads.</span><br data-dcnode-id="4032"><span data-dcnode-id="4031" instrument_node="">Section 67. Composition, Powers and Functions. ? The College shall consist of the present</span><br data-dcnode-id="4030"><span data-dcnode-id="4029" instrument_node="">Philippine National Police Academy (PNPA) established pursuant to Section 13 of Presidential</span><br data-dcnode-id="4028"><span data-dcnode-id="4027" instrument_node="">Decree No. 1184, the Fire Service Training Center, the Philippine National Training Center</span><br data-dcnode-id="4026"><span data-dcnode-id="4025" instrument_node="">(PNTC), the National Police College, and other special training centers as may be created by the</span><br data-dcnode-id="4024"><span data-dcnode-id="4023" instrument_node="">Department, whose functions shall be as follows:</span><br data-dcnode-id="4022"><span data-dcnode-id="4021" instrument_node="">(a) Formulate and implement training programs for the personnel of the Department;</span><br data-dcnode-id="4020"><span data-dcnode-id="4019" instrument_node="">(b) Establish and maintain adequate physical training facilities;</span><br data-dcnode-id="4018"><span data-dcnode-id="4017" instrument_node="">f(c) Develop and implement research and development to support educational training</span><br data-dcnode-id="4016"><span data-dcnode-id="4015" instrument_node="">programs;</span><br data-dcnode-id="4014"><span data-dcnode-id="4013" instrument_node="">(d) Conduct an assessment of the training needs of all its clientele; and</span><br data-dcnode-id="4012"><span data-dcnode-id="4011" instrument_node="">(e) Perform such other related functions as may be prescribed by the Secretary.</span><br data-dcnode-id="4010"><span data-dcnode-id="4009" instrument_node="">Section 68. Organization. ? The structure and staffing pattern of the College shall be prescribed</span><br data-dcnode-id="4008"><span data-dcnode-id="4007" instrument_node="">by the Secretary.</span><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node="">CHAPTER VII</span><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">COMMON PROVISIONS FOR UNIFORMED PERSONNEL</span><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">Section 69. Incentives and Awards. ? There shall be established an incentives and awards</span><br data-dcnode-id="4000"><span data-dcnode-id="3999" instrument_node="">system which shall be administered by a board under such rules, regulations and standards as</span><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node="">may be promulgated by the Department: Provided, That equivalent awards shall be given by the</span><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node="">Department for every award duly given by respectable civic organizations in a nationwide</span><br data-dcnode-id="3994"><span data-dcnode-id="3993" instrument_node="">selection for outstanding achievement and/or performance of any member.</span><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">Section 70. Health and Welfare. ? It shall be the concern of the Department to provide</span><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node="">leadership and assistance in developing health and welfare programs for its personnel.</span><br data-dcnode-id="3988"><span data-dcnode-id="3987" instrument_node="">The heads of all bureaus and other offices created under this Act shall take all proper steps</span><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">towards the creation of an atmosphere conducive to a good supervisor-subordinate relationship</span><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node="">and the improvement of personnel morale.</span><br data-dcnode-id="3982"><span data-dcnode-id="3981" instrument_node="">Section 71. Longevity Pay and Allowances. ? Uniformed personnel of the Department shall be</span><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node="">entitled to a longevity pay of ten percent (10%) of their basic monthly salaries for every five (5)</span><br data-dcnode-id="3978"><span data-dcnode-id="3977" instrument_node="">Page 22 of 27 R.A. 6975</span><br data-dcnode-id="3976"><span data-dcnode-id="3975" instrument_node="">2/3/2009 http://www.lawphil.net/statutes/repacts/ra1990/ra_6975_1990.html</span><br data-dcnode-id="3974"><span data-dcnode-id="3973" instrument_node="">years of service, which shall be reckoned from the date of the personnel's original appointment</span><br data-dcnode-id="3972"><span data-dcnode-id="3971" instrument_node="">in the AFP, or appointment in the police, fire jail or other allied services to the integration of the</span><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">PC and the INP: Provided, That the totality of such longevity pay shall not exceed fifty percent</span><br data-dcnode-id="3968"><span data-dcnode-id="3967" instrument_node="">(50%) of the basic pay. They shall also continue to enjoy the subsistence allowance, quarters</span><br data-dcnode-id="3966"><span data-dcnode-id="3965" instrument_node="">allowance, clothing allowance cost of living allowance, hazard pay, and all other allowances as</span><br data-dcnode-id="3964"><span data-dcnode-id="3963" instrument_node="">provided by existing laws.</span><br data-dcnode-id="3962"><span data-dcnode-id="3961" instrument_node="">Section 72. Active Service. ? For purposes of this Act, active service of the uniformed personnel</span><br data-dcnode-id="3960"><span data-dcnode-id="3959" instrument_node="">shall refer to services rendered as an officer and non-officer, cadet, trainee or draftee in the</span><br data-dcnode-id="3958"><span data-dcnode-id="3957" instrument_node="">PNP, Fire or Jail Force or in the municipal police prior to the integration of the PC-INP or in the</span><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">AFP, and services rendered as a civilian official or employee in the Philippine Government prior</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">to the date of separation or retirement from the PNP, Fire or Jail Force: Provided, That, for</span><br data-dcnode-id="3952"><span data-dcnode-id="3951" instrument_node="">purposes of retirement he shall have rendered at least ten (10) years of active service as officer</span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">or non-officer in the AFP, and /or in the INP and/or in the PNP, Fire or Jail Force: Provided,</span><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">further, That services rendered as cadet, probationary officer, trainee or draftee in the AFP or as</span><br data-dcnode-id="3946"><span data-dcnode-id="3945" instrument_node="">cadet or trainee in the INP and PNP shall be credited for purposes of longevity pay: Provided,</span><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">finally, That, for cadet services, the maximum number of service to be credited shall not exceed</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">the duration of the pre-commissionship course specified in the curriculum.</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">Section 73. Permanent Physical Disability. ? An officer or non-officer who, having accumulated</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">at least twenty (20) years of active service, incurs total permanent physical disability in line of</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">duty shall be compulsorily retired: Provided, That, if he has accumulated less than twenty (20)</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">years of active service, he shall be separated from the service and be entitled to a separation</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">pay equivalent to one and one-fourth (11/4) months base pay for every year of service, or a</span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">fraction thereof, and longevity pay of the permanent grade he holds.</span><br data-dcnode-id="3928"><span data-dcnode-id="3927" instrument_node="">Section 74. Retirement in the Next Higher Grade. ? Uniformed personnel covered under this Act</span><br data-dcnode-id="3926"><span data-dcnode-id="3925" instrument_node="">shall, for purposes of retirement pay, be retired in one (1) grade higher than the permanent</span><br data-dcnode-id="3924"><span data-dcnode-id="3923" instrument_node="">grade last held: Provided, That they have served for at least one (1) year of active service in the</span><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">permanent grade.</span><br data-dcnode-id="3920"><span data-dcnode-id="3919" instrument_node="">Section 75. Retirement Benefits. ? Monthly retirement pay shall be fifty percent (50%) of the</span><br data-dcnode-id="3918"><span data-dcnode-id="3917" instrument_node="">base pay and longevity pay of the retired grade in case of twenty (20) years of active service,</span><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node="">increasing by two and one-half percent (2.5%) for every year of active service rendered beyond</span><br data-dcnode-id="3914"><span data-dcnode-id="3913" instrument_nod
