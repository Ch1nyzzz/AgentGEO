e-id="8640"><span data-dcnode-id="8639" instrument_node="">        Remedial Fire Safety Measures</span><br data-dcnode-id="8638"><span data-dcnode-id="8637" instrument_node="">    2. MC No. 2010-67 – Repeal of MC 2005-143, dated Dec. 15, 2005, and Titled, “Fire and Life Safety</span><br data-dcnode-id="8636"><span data-dcnode-id="8635" instrument_node="">        Assessment Report”</span><br data-dcnode-id="8634"><span data-dcnode-id="8633" instrument_node="">    3. MC no. 2011-05 – Intensifying Fire Safety Enforcement in the BFP and Institutionalizing Standard</span><br data-dcnode-id="8632"><span data-dcnode-id="8631" instrument_node="">        Processes in the Conduct of Inspection and Defining Accountabilities of Concerned BFP Personnel in</span><br data-dcnode-id="8630"><span data-dcnode-id="8629" instrument_node="">        the Inspection and Issuance of Fire Safety Inspection Certificate</span><br data-dcnode-id="8628"><span data-dcnode-id="8627" instrument_node="">    4. MC No. 2011-06 – Supplemental Guidelines for the Effective Transitory Compliance from the Old</span><br data-dcnode-id="8626"><span data-dcnode-id="8625" instrument_node="">        Fire Code (PD 1185) to the New Fire Code of 2008 (RA 9514) Amending Sec 14.0.0.7 of the</span><br data-dcnode-id="8624"><span data-dcnode-id="8623" instrument_node="">        Implementing Rules and Regulations of RA 9514</span><br data-dcnode-id="8622"><span data-dcnode-id="8621" instrument_node="">    5. MC No. 2009-010 – Submission of Accomplishment Report for Fire Prevention Activities</span><br data-dcnode-id="8620"><span data-dcnode-id="8619" instrument_node="">    6. MC No. 2009-011 – Creation of the Fire Code Implementation Action Group (FCIAG)</span><br data-dcnode-id="8618"><span data-dcnode-id="8617" instrument_node="">    7. MC No. 2009-016 – Training Module for Fire Volunteers, Members of Fire Brigade and Fire Safety</span><br data-dcnode-id="8616"><span data-dcnode-id="8615" instrument_node="">        Practitioners</span><br data-dcnode-id="8614"><span data-dcnode-id="8613" instrument_node="">    8. MC No. 2009-017 – Guidelines on the Issuance of Certificate of Competency for Fire Volunteers,</span><br data-dcnode-id="8612"><span data-dcnode-id="8611" instrument_node="">        Members of Fire Brigades, Fire Safety Practitioners and Organizations Dealing with Fire Safety</span><br data-dcnode-id="8610"><span data-dcnode-id="8609" instrument_node="">    9. MC No. 2009-018 – Guidelines in the Production, Control and Distribution of Standard Fire</span><br data-dcnode-id="8608"><span data-dcnode-id="8607" instrument_node="">        Prevention Forms</span><br data-dcnode-id="8606"><span data-dcnode-id="8605" instrument_node="">    10. MC No. 2011-007 – Guidelines in the Printing and Production of BFP Warning Signs</span><br data-dcnode-id="8604"><span data-dcnode-id="8603" instrument_node="">    11. MC No. 2011-009 – Supplemental Guidelines in the Printing of Standard Fire Prevention Forms and</span><br data-dcnode-id="8602"><span data-dcnode-id="8601" instrument_node="">        Posting of BFP Advocacy Campaign Against Personnel Directly or Indirectly Participating in the</span><br data-dcnode-id="8600"><span data-dcnode-id="8599" instrument_node="">        Selling and/or Posing as Agent of Fire</span><br data-dcnode-id="8598"><span data-dcnode-id="8597" instrument_node="">    12. MC No. 2012-06 – Collection of Fire Code Revenues</span><br data-dcnode-id="8596"><span data-dcnode-id="8595" instrument_node="">    13. MC No. 2011-73 – Implementing Details of Sec.14.0.0.7 of the IRR of RA 9514</span><br data-dcnode-id="8594"><span data-dcnode-id="8593" instrument_node="">    14. MC No. SOP-2012-001 – SOP in the Preparation and Issuance of Inspecton Order, After Inspection</span><br data-dcnode-id="8592"><span data-dcnode-id="8591" instrument_node="">        Report and Level of Authority of City/Municipal Fire Station, Provincial/District Offices and Regional</span><br data-dcnode-id="8590"><span data-dcnode-id="8589" instrument_node="">        Headquarters in the Conduct of Fire Safety Inspection</span><br data-dcnode-id="8588"><span data-dcnode-id="8587" instrument_node="">    15. MC No. 2009-188 – Guidelines for the Assessment, Collection, Deposit, Remittance and Utilization</span><br data-dcnode-id="8586"><span data-dcnode-id="8585" instrument_node="">        of the Fire Code Revenues</span><p data-dcnode-id="8584"></p><p data-dcnode-id="8572"><span data-dcnode-id="8583" instrument_node="">BFP Issuances</span><br data-dcnode-id="8582"><span data-dcnode-id="8581" instrument_node="">    1. Fire Safety Inspection Clearance</span><br data-dcnode-id="8580"><span data-dcnode-id="8579" instrument_node="">    2. Fire Safety Evaluation Clearance</span><br data-dcnode-id="8578"><span data-dcnode-id="8577" instrument_node="">    3. Fire Safety Inspection Certificate</span><br data-dcnode-id="8576"><span data-dcnode-id="8575" instrument_node="">    4. Certificate of Competency</span><br data-dcnode-id="8574"><span data-dcnode-id="8573" instrument_node="">    5. Fire Safety Installation Certificate</span></p><p data-dcnode-id="8564"><span data-dcnode-id="8571" instrument_node="">ELECTRICAL CODE:</span><br data-dcnode-id="8570"><span data-dcnode-id="8569" instrument_node="">BRANCHES OF ENGINEERING IN THE FIELD OF ELECTRICITY</span><br data-dcnode-id="8568"><span data-dcnode-id="8567" instrument_node="">Electrical Engineering – A field that is concerned with the generation, distribution, and use of electrical</span><br data-dcnode-id="8566"><span data-dcnode-id="8565" instrument_node="">power.</span></p><p data-dcnode-id="8560"><span data-dcnode-id="8563" instrument_node="">Electronics Engineering – A related branch of the field of electricity devoted to the processing,</span><br data-dcnode-id="8562"><span data-dcnode-id="8561" instrument_node="">communication, and storage of information by electronic means.</span></p><p data-dcnode-id="8559"></p><h2 data-dcnode-id="8557"><span data-dcnode-id="8558" instrument_node="">                     EXCERPTS FROM THE PHILIPPINE ELECTRICAL CODE (2000 Edition)</span></h2><br data-dcnode-id="8556"><span data-dcnode-id="8555" instrument_node=""> Includes all revisions and additions adopted by the Code Committee indorsed by the Institute of Electrical</span><br data-dcnode-id="8554"><span data-dcnode-id="8553" instrument_node="">Engineers and approved by the Board of Electrical Engineering Professional Regulations Commission. It</span><br data-dcnode-id="8552"><span data-dcnode-id="8551" instrument_node="">supersedes all previous editions dated 1962, 1969, 1980, 1985, and 1992.</span><p data-dcnode-id="8550"></p><p data-dcnode-id="8540"><span data-dcnode-id="8549" instrument_node="">Objective: The Philippine Electrical Code have been formulated and developed to safeguard persons and</span><br data-dcnode-id="8548"><span data-dcnode-id="8547" instrument_node="">property from hazards arising from the use of electricity.</span><br data-dcnode-id="8546"><span data-dcnode-id="8545" instrument_node="">fAuthority: Resolution #57 (Board of Electrical Engineering, PRC) – Adoption of the Revised Philippine</span><br data-dcnode-id="8544"><span data-dcnode-id="8543" instrument_node="">Electrical Code, 2000Ed as part of the rules and regulations governing the practice of electrical engineering</span><br data-dcnode-id="8542"><span data-dcnode-id="8541" instrument_node="">as a referral code</span></p><p data-dcnode-id="8534"><span data-dcnode-id="8539" instrument_node="">                                               ENFORCEMENT</span><br data-dcnode-id="8538"><span data-dcnode-id="8537" instrument_node="">This code is intended for mandatory application by government bodies exercising legal jurisdiction over</span><br data-dcnode-id="8536"><span data-dcnode-id="8535" instrument_node="">electrical installation.</span></p><p data-dcnode-id="8526"><span data-dcnode-id="8533" instrument_node=""> These government bodies will have the responsibility of implementing the provisions of this code in</span><br data-dcnode-id="8532"><span data-dcnode-id="8531" instrument_node="">deciding on the approval of equipment and materials and for granting the special permission contemplated</span><br data-dcnode-id="8530"><span data-dcnode-id="8529" instrument_node="">in this code, where it is assured that equivalent objectives can be achieved by establishing and maintaining</span><br data-dcnode-id="8528"><span data-dcnode-id="8527" instrument_node="">effective safety.</span></p><p data-dcnode-id="8522"><span data-dcnode-id="8525" instrument_node="">                                                    SCOPE</span><br data-dcnode-id="8524"><span data-dcnode-id="8523" instrument_node="">This Code covers electric conductors, cables, and equipment installed within or on, to or from:</span></p><p data-dcnode-id="8521"></p><h2 data-dcnode-id="8519"><span data-dcnode-id="8520" instrument_node="">1. Private and public buildings;</span></h2><p data-dcnode-id="8518"></p><p data-dcnode-id="8517"></p><h2 data-dcnode-id="8515"><span data-dcnode-id="8516" instrument_node="">2. Electric generating plants;</span></h2><p data-dcnode-id="8514"></p><p data-dcnode-id="8512"><span data-dcnode-id="8513" instrument_node="">3. Industrial plants;</span></p><p data-dcnode-id="8510"><span data-dcnode-id="8511" instrument_node="">4. Transformer stations;</span></p><p data-dcnode-id="8509"></p><h2 data-dcnode-id="8507"><span data-dcnode-id="8508" instrument_node="">5. Permanent and temporary sub-stations;</span></h2><p data-dcnode-id="8506"></p><p data-dcnode-id="8504"><span data-dcnode-id="8505" instrument_node="">6. Airfields;</span></p><p data-dcnode-id="8502"><span data-dcnode-id="8503" instrument_node="">7. Railways switchyards;</span></p><p data-dcnode-id="8501"></p><h2 data-dcnode-id="8499"><span data-dcnode-id="8500" instrument_node="">8. Yards, carnival, parking and other lots;</span></h2><p data-dcnode-id="8498"></p><p data-dcnode-id="8497"></p><h2 data-dcnode-id="8495"><span data-dcnode-id="8496" instrument_node="">9. Quarries and mines;</span></h2><p data-dcnode-id="8494"></p><p data-dcnode-id="8492"><span data-dcnode-id="8493" instrument_node="">10. Watercrafts;</span></p><p data-dcnode-id="8490"><span data-dcnode-id="8491" instrument_node="">11. Dockyards;</span></p><p data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">12. Trailers;</span></p><p data-dcnode-id="8487"></p><h2 data-dcnode-id="8485"><span data-dcnode-id="8486" instrument_node="">13. Mobile homes;</span></h2><p data-dcnode-id="8484"></p><p data-dcnode-id="8483"></p><h2 data-dcnode-id="8481"><span data-dcnode-id="8482" instrument_node="">14. Offshore facilities; and</span></h2><br data-dcnode-id="8480"><span data-dcnode-id="8479" instrument_node="">f15. Other premises requiring electrical installations, except aircraft, motor vehicles and railway rolling</span><br data-dcnode-id="8478"><span data-dcnode-id="8477" instrument_node="">stocks.</span><p data-dcnode-id="8476"></p><p data-dcnode-id="8470"><span data-dcnode-id="8475" instrument_node="">                                            DEFINITION OF TERMS</span><br data-dcnode-id="8474"><span data-dcnode-id="8473" instrument_node="">1. Accessible (as applied to wiring methods) – Capable of being removed or exposed without damaging the</span><br data-dcnode-id="8472"><span data-dcnode-id="8471" instrument_node="">building structure or finish or not permanently closed in by the structure or finish of the building.</span></p><p data-dcnode-id="8466"><span data-dcnode-id="8469" instrument_node="">2. Accessible (as applied to equipment) – Admitting close approach, not guarded by locked doors, elevation</span><br data-dcnode-id="8468"><span data-dcnode-id="8467" instrument_node="">or other effective means.</span></p><p data-dcnode-id="8460"><span data-dcnode-id="8465" instrument_node=""> 3. Accessible, readily – Capable of being reached quickly for operation, renewal or inspection, without</span><br data-dcnode-id="8464"><span data-dcnode-id="8463" instrument_node="">requiring those to whom ready access is requisite to climb over or remove obstacles or to resort to portable</span><br data-dcnode-id="8462"><span data-dcnode-id="8461" instrument_node="">ladders.</span></p><p data-dcnode-id="8456"><span data-dcnode-id="8459" instrument_node="">4. Ampacity – The current in amperes that a conductor can carry continuously under the conditions of use</span><br data-dcnode-id="8458"><span data-dcnode-id="8457" instrument_node="">without exceeding its temperature rating.</span></p><p data-dcnode-id="8455"></p><h2 data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">5. Amperage – Strength of an electrical current.</span></h2><p data-dcnode-id="8452"></p><p data-dcnode-id="8448"><span data-dcnode-id="8451" instrument_node="">6. Appliances – Utilization equipment, generally other than industrial, normally built in standardized sizes or</span><br data-dcnode-id="8450"><span data-dcnode-id="8449" instrument_node="">types, which are installed or connected as a unit to perform one or more functions.</span></p><p data-dcnode-id="8447"></p><h2 data-dcnode-id="8445"><span data-dcnode-id="8446" instrument_node="">7. Circuit – The entire course traversed by an electrical current.</span></h2><p data-dcnode-id="8444"></p><p data-dcnode-id="8440"><span data-dcnode-id="8443" instrument_node=""> 8. Branch Circuit - The circuit conductors between the final overcurrent device protecting the circuit and</span><br data-dcnode-id="8442"><span data-dcnode-id="8441" instrument_node="">the outlet/s.</span></p><p data-dcnode-id="8434"><span data-dcnode-id="8439" instrument_node=""> 9. Circuit Breaker – A device designed to open and close a current by non-automatic means and to open the</span><br data-dcnode-id="8438"><span data-dcnode-id="8437" instrument_node="">circuit automatically on a predetermined overcurrent without damage to itself when properly applied</span><br data-dcnode-id="8436"><span data-dcnode-id="8435" instrument_node="">within its rating.</span></p><p data-dcnode-id="8432"><span data-dcnode-id="8433" instrument_node="">10. Closed Circuit – Current is not interrupted and the flow of electricity is continuous.</span></p><p data-dcnode-id="8430"><span data-dcnode-id="8431" instrument_node="">11. Open Circuit – When the circuit is interrupted and the current will stop flowing.</span></p><p data-dcnode-id="8429"></p><h2 data-dcnode-id="8427"><span data-dcnode-id="8428" instrument_node="">12. Current – Movement or flow of electricity passing through a conductor.</span></h2><p data-dcnode-id="8426"></p><p data-dcnode-id="8425"></p><h2 data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">13. Alternating Current - Current which periodically reverses its direction.</span></h2><p data-dcnode-id="8422"></p><p data-dcnode-id="8421"></p><h2 data-dcnode-id="8419"><span data-dcnode-id="8420" instrument_node="">14. Direct Current – Current flowing continuously from one direction.</span></h2><p data-dcnode-id="8418"></p><p data-dcnode-id="8414"><span data-dcnode-id="8417" instrument_node="">15. Electric sign – A fixed, stationary or portable electrical illuminated utilization equipment with words or</span><br data-dcnode-id="8416"><span data-dcnode-id="8415" instrument_node="">fsymbols designed to convey information or attract attention.</span></p><p data-dcnode-id="8410"><span data-dcnode-id="8413" instrument_node=""> 16. Emergency light – All lights in theaters or any other building used for public assembly which is kept</span><br data-dcnode-id="8412"><span data-dcnode-id="8411" instrument_node="">lighted continuously while the building is being used to provide safe exit or entry.</span></p><p data-dcnode-id="8406"><span data-dcnode-id="8409" instrument_node="">17. Exposed – As applied to live parts, capable of being inadvertently touched or approach nearer than a</span><br data-dcnode-id="8408"><span data-dcnode-id="8407" instrument_node="">safe place or distance by a person.</span></p><p data-dcnode-id="8402"><span data-dcnode-id="8405" instrument_node="">18. Jumper – A short length of conductor used for connection between terminals or around a break in a</span><br data-dcnode-id="8404"><span data-dcnode-id="8403" instrument_node="">circuit.</span></p><p data-dcnode-id="8398"><span data-dcnode-id="8401" instrument_node="">19. Junction box – A box with a cover which serves the purpose of joining different run of wires or cables</span><br data-dcnode-id="8400"><span data-dcnode-id="8399" instrument_node="">and is provided with sufficient space for connection or branching of enclosed conductors.</span></p><p data-dcnode-id="8396"><span data-dcnode-id="8397" instrument_node="">20. Outlet – A point on the wiring system at which current is taken to supply utilization equipment.</span></p><p data-dcnode-id="8394"><span data-dcnode-id="8395" instrument_node="">21. Over current – Any current in excess of the rated current of an equipment or ampacity of a conductor.</span></p><p data-dcnode-id="8390"><span data-dcnode-id="8393" instrument_node="">22. Overload - Operation of an equipment in excess of normal full load rating, or of a conductor in excess</span><br data-dcnode-id="8392"><span data-dcnode-id="8391" instrument_node="">of greater ampacity.</span></p><p data-dcnode-id="8386"><span data-dcnode-id="8389" instrument_node="">23. Service drop – The overhead service conductors from the last pole or other aerial support to and</span><br data-dcnode-id="8388"><span data-dcnode-id="8387" instrument_node="">including the splices, if any, connecting the service entrance conductors at the building or other structure.</span></p><p data-dcnode-id="8382"><span data-dcnode-id="8385" instrument_node="">24. Voltage drop – The difference between the magnitude of the sending end voltage and the receiving end</span><br data-dcnode-id="8384"><span data-dcnode-id="8383" instrument_node="">voltage.</span></p><p data-dcnode-id="8376"><span data-dcnode-id="8381" instrument_node="">                                               KINDS OF RULES</span><br data-dcnode-id="8380"><span data-dcnode-id="8379" instrument_node=""> 1. Mandatory Rules – Mandatory rules of this Code are those that identify actions that are specifically</span><br data-dcnode-id="8378"><span data-dcnode-id="8377" instrument_node="">required or prohibited and are characterized by the use of the terms shall and shall not.</span></p><p data-dcnode-id="8370"><span data-dcnode-id="8375" instrument_node=""> 2. Permissive Rules – Those that identify actions that are allowed but not required, and are normally used</span><br data-dcnode-id="8374"><span data-dcnode-id="8373" instrument_node="">to describe options or alternative methods and are characterized by the use of the terms shall be permitted</span><br data-dcnode-id="8372"><span data-dcnode-id="8371" instrument_node="">or shall not be required.</span></p><p data-dcnode-id="8369"></p><h2 data-dcnode-id="8367"><span data-dcnode-id="8368" instrument_node=""> 3. Explanatory Materials – Explanatory materials, such as references to other standards, references to</span></h2><br data-dcnode-id="8366"><span data-dcnode-id="8365" instrument_node="">related sections of this Code, or information related to referral Code rule, are included in this Code in the</span><br data-dcnode-id="8364"><span data-dcnode-id="8363" instrument_node="">form of fine print notes (FPN). Fine print notes are informational only and are not enforceable as</span><br data-dcnode-id="8362"><span data-dcnode-id="8361" instrument_node="">requirements of this Code.</span><p data-dcnode-id="8360"></p><p data-dcnode-id="8359"></p><h2 data-dcnode-id="8357"><span data-dcnode-id="8358" instrument_node="">                                 EXAMINATION OF EQUIPMENT FOR SAFETY</span></h2><br data-dcnode-id="8356"><span data-dcnode-id="8355" instrument_node="">It is the intent of this Code that factory-installed internal wiring or the construction of equipment need not</span><br data-dcnode-id="8354"><span data-dcnode-id="8353" instrument_node="">be inspected at the time of installation of the equipment, except to detect alterations or damage, if the</span><br data-dcnode-id="8352"><span data-dcnode-id="8351" instrument_node="">fequipment has been tested by a qualified testing laboratory that is recognized as having facilities described</span><br data-dcnode-id="8350"><span data-dcnode-id="8349" instrument_node="">above and that requires suitability for installation in accordance with this Code.</span><p data-dcnode-id="8348"></p><p data-dcnode-id="8340"><span data-dcnode-id="8347" instrument_node="">                                               WIRING PLANNING</span><br data-dcnode-id="8346"><span data-dcnode-id="8345" instrument_node=""> 1. Future Expansion and Convenience – Plans and specifications that provide ample space in raceways,</span><br data-dcnode-id="8344"><span data-dcnode-id="8343" instrument_node="">spare raceways, and additional spaces will allow for future increases in the use of electricity. Distribution</span><br data-dcnode-id="8342"><span data-dcnode-id="8341" instrument_node="">centers located in readily accessible locations will provide convenience and safety for operation.</span></p><p data-dcnode-id="8334"><span data-dcnode-id="8339" instrument_node=""> 2. Number of Circuits in Enclosures – It is provided in this Code that the number of wires and circuits</span><br data-dcnode-id="8338"><span data-dcnode-id="8337" instrument_node="">confined in a single enclosure will minimize the damaging effects from short circuit or ground fault in the</span><br data-dcnode-id="8336"><span data-dcnode-id="8335" instrument_node="">circuit.</span></p><p data-dcnode-id="8333"></p><h2 data-dcnode-id="8331"><span data-dcnode-id="8332" instrument_node="">                                    PERMITS AND INSPECTION CERTIFICATES</span></h2><br data-dcnode-id="8330"><span data-dcnode-id="8329" instrument_node=""> Before starting any installation work, alteration, repair, or extension on any electrical system, the owner,</span><br data-dcnode-id="8328"><span data-dcnode-id="8327" instrument_node="">leaser, operator, occupant, or electrical practitioner shall obtain an Electrical Permit for buildings, trailers,</span><br data-dcnode-id="8326"><span data-dcnode-id="8325" instrument_node="">mobile houses or other premises from the Office of the Local Building Official and for watercrafts from the</span><br data-dcnode-id="8324"><span data-dcnode-id="8323" instrument_node="">Maritime Industry Authority (MARINA).</span><p data-dcnode-id="8322"></p><p data-dcnode-id="8321"></p><h2 data-dcnode-id="8319"><span data-dcnode-id="8320" instrument_node="">                         REQUIREMENTS FOR APPLICATION OF ELECTRICAL PERMITS</span></h2><br data-dcnode-id="8318"><span data-dcnode-id="8317" instrument_node="">1. Application filed in due form, with following information contained:</span><p data-dcnode-id="8316"></p><p data-dcnode-id="8315"></p><h2 data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">     Box 1 – Duly qualified Electrical Practitioner.</span></h2><p data-dcnode-id="8312"></p><p data-dcnode-id="8310"><span data-dcnode-id="8311" instrument_node="">     Box 2 – Professional Electrical Engineer who signed and sealed electrical plans and specifications.</span></p><p data-dcnode-id="8309"></p><h2 data-dcnode-id="8307"><span data-dcnode-id="8308" instrument_node="">     Box 3 – Duly registered Electrical Contractor with specialty in electrical works.</span></h2><p data-dcnode-id="8306"></p><p data-dcnode-id="8305"></p><h2 data-dcnode-id="8303"><span data-dcnode-id="8304" instrument_node="">Box 4 – Electrical Practitioner in charge of installation.</span></h2><p data-dcnode-id="8302"></p><p data-dcnode-id="8301"></p><h2 data-dcnode-id="8299"><span data-dcnode-id="8300" instrument_node="">       Box 5 – Owner/ Authorized Representative.</span></h2><p data-dcnode-id="8298"></p><p data-dcnode-id="8294"><span data-dcnode-id="8297" instrument_node="">2. Five (5) sets of complete electrical plans and specifications signed and sealed by Professional Electrical</span><br data-dcnode-id="8296"><span data-dcnode-id="8295" instrument_node="">Engineer.</span></p><p data-dcnode-id="8293"></p><h2 data-dcnode-id="8291"><span data-dcnode-id="8292" instrument_node="">                                        ISSUANCE OF ELECTRICAL PERMIT</span></h2><br data-dcnode-id="8290"><span data-dcnode-id="8289" instrument_node=""> The application, upon receipt, shall be checked immediately by the Local Building Official or his</span><br data-dcnode-id="8288"><span data-dcnode-id="8287" instrument_node="">representative for compliance of requirements. If complied, the electrical permit shall be issued upon</span><br data-dcnode-id="8286"><span data-dcnode-id="8285" instrument_node="">payment of the corresponding fees.</span><p data-dcnode-id="8284"></p><p data-dcnode-id="8276"><span data-dcnode-id="8283" instrument_node=""> If the project is extensive and require more time for checking and computations of fees, the issuance of an</span><br data-dcnode-id="8282"><span data-dcnode-id="8281" instrument_node="">electrical permit need not be issued immediately. The delay shall be longer than five (5) working days after</span><br data-dcnode-id="8280"><span data-dcnode-id="8279" instrument_node="">which the application, together with the accompanying plans shall be considered as complying with all the</span><br data-dcnode-id="8278"><span data-dcnode-id="8277" instrument_node="">requirements and the electrical permit shall issued immediately thereafter, upon payment of fees.</span></p><p data-dcnode-id="8275"></p><h2 data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">                                        POSTING OF ELECTRICAL PERMIT</span></h2><br data-dcnode-id="8272"><span data-dcnode-id="8271" instrument_node="">A copy of the electrical permit shall be posted in a conspicuous location on the job site and shall not be</span><br data-dcnode-id="8270"><span data-dcnode-id="8269" instrument_node="">fremoved until final inspection and approval of the work shall have been made.</span><p data-dcnode-id="8268"></p><p data-dcnode-id="8262"><span data-dcnode-id="8267" instrument_node="">                                          ELECTRICAL INSPECTIONS</span><br data-dcnode-id="8266"><span data-dcnode-id="8265" instrument_node=""> Application for Inspection – An application for inspection shall be filed with the government authority</span><br data-dcnode-id="8264"><span data-dcnode-id="8263" instrument_node="">concerned before preliminary or final inspection is done.</span></p><p data-dcnode-id="8261"></p><h2 data-dcnode-id="8259"><span data-dcnode-id="8260" instrument_node=""> Certificate of Inspection – No electrical installation, alteration and/or addition shall be connected or</span></h2><br data-dcnode-id="8258"><span data-dcnode-id="8257" instrument_node="">reconnected to any power supply or any other source of electrical energy without a Certificate of Final</span><br data-dcnode-id="8256"><span data-dcnode-id="8255" instrument_node="">Inspection/Completion obtained from the government authority concerned.</span><p data-dcnode-id="8254"></p><p data-dcnode-id="8246"><span data-dcnode-id="8253" instrument_node="">                                               SPECIAL PERMITS</span><br data-dcnode-id="8252"><span data-dcnode-id="8251" instrument_node=""> Temporary Installation – For temporary electrical installation, the same procedure stated shall be followed.</span><br data-dcnode-id="8250"><span data-dcnode-id="8249" instrument_node="">At the end of the period covered by the certificate of inspection, the temporary installation shall be</span><br data-dcnode-id="8248"><span data-dcnode-id="8247" instrument_node="">removed. Extended use of the temporary installation shall require a new approved electrical permit.</span></p><p data-dcnode-id="8242"><span data-dcnode-id="8245" instrument_node="">Reconnection of Disconnected Service – Where service has been cut off for more than one (1) year, a new</span><br data-dcnode-id="8244"><span data-dcnode-id="8243" instrument_node="">certificate of final electrical inspection shall be required before reconnection.</span></p><p data-dcnode-id="8236"><span data-dcnode-id="8241" instrument_node=""> Installation Without Permit – Installation of not more than two (2) additional general purpose branch</span><br data-dcnode-id="8240"><span data-dcnode-id="8239" instrument_node="">circuit for lighting and receptacle/convenience outlets may be done without electrical permit and certificate</span><br data-dcnode-id="8238"><span data-dcnode-id="8237" instrument_node="">of final inspection/completion.</span></p><p data-dcnode-id="8230"><span data-dcnode-id="8235" instrument_node="">Special Permission – Electrical equipment and wiring not specifically covered or mentioned in the various</span><br data-dcnode-id="8234"><span data-dcnode-id="8233" instrument_node="">articles of this Code shall require special permission and approval of the enforcing government authority</span><br data-dcnode-id="8232"><span data-dcnode-id="8231" instrument_node="">concerned prior to installation.</span></p><p data-dcnode-id="8229"></p><h2 data-dcnode-id="8227"><span data-dcnode-id="8228" instrument_node="">                                         PLANS AND SPECIFICATIONS</span></h2><br data-dcnode-id="8226"><span data-dcnode-id="8225" instrument_node="">Plan Requirements:</span><p data-dcnode-id="8224"></p><p data-dcnode-id="8223"></p><h2 data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">     1. Location and site plans</span></h2><p data-dcnode-id="8220"></p><p data-dcnode-id="8219"></p><h2 data-dcnode-id="8217"><span data-dcnode-id="8218" instrument_node="">     2. Legend and symbols.</span></h2><p data-dcnode-id="8216"></p><p data-dcnode-id="8215"></p><h2 data-dcnode-id="8213"><span data-dcnode-id="8214" instrument_node="">     3. General notes and or specifications.</span></h2><p data-dcnode-id="8212"></p><p data-dcnode-id="8210"><span data-dcnode-id="8211" instrument_node="">     4. Electrical layout.</span></p><p data-dcnode-id="8208"><span data-dcnode-id="8209" instrument_node="">     5. Schedule of loads.</span></p><p data-dcnode-id="8206"><span data-dcnode-id="8207" instrument_node="">     6. Design analysis.</span></p><p data-dcnode-id="8200"><span data-dcnode-id="8205" instrument_node="">     7. One-line Diagram.</span><br data-dcnode-id="8204"><span data-dcnode-id="8203" instrument_node="">f                                                 OTHER DETAILS</span><br data-dcnode-id="8202"><span data-dcnode-id="8201" instrument_node="">Exposed Conductors:</span></p><p data-dcnode-id="8199"></p><h2 data-dcnode-id="8197"><span data-dcnode-id="8198" instrument_node="">     1. Means of support and type of insulator.</span></h2><p data-dcnode-id="8196"></p><p data-dcnode-id="8195"></p><h2 data-dcnode-id="8193"><span data-dcnode-id="8194" instrument_node="">     2. Spacing and clearances.</span></h2><p data-dcnode-id="8192"></p><p data-dcnode-id="8191"></p><h2 data-dcnode-id="8189"><span data-dcnode-id="8190" instrument_node="">Private pole installation</span></h2><p data-dcnode-id="8188"></p><p data-dcnode-id="8187"></p><h2 data-dcnode-id="8185"><span data-dcnode-id="8186" instrument_node="">              LOCATION OF POLES AND CLEARANCES OFPOWER LINES ALONG PUBLIC ROADS</span></h2><br data-dcnode-id="8184"><span data-dcnode-id="8183" instrument_node="">All poles located on public roads shall be covered by Approved Pole Location plan from the Highway District</span><br data-dcnode-id="8182"><span data-dcnode-id="8181" instrument_node="">City/Municipal Engineer.</span><p data-dcnode-id="8180"></p><p data-dcnode-id="8174"><span data-dcnode-id="8179" instrument_node=""> Poles and transformer supports shall be located not more than 500 mm. inside from the road right-of-way</span><br data-dcnode-id="8178"><span data-dcnode-id="8177" instrument_node="">or property line, and shall not obstruct the sidewalk, pedestrian path and/or the road drainage canal or</span><br data-dcnode-id="8176"><span data-dcnode-id="8175" instrument_node="">structure, existing or proposed.</span></p><p data-dcnode-id="8168"><span data-dcnode-id="8173" instrument_node=""> Primary lines shall have a minimum vertical clearance of 10 M. from the crown of the pavement when</span><br data-dcnode-id="8172"><span data-dcnode-id="8171" instrument_node="">crossing the highway and 7.5 M. from the top of the shoulder or sidewalk when installed along the side of</span><br data-dcnode-id="8170"><span data-dcnode-id="8169" instrument_node="">the highway or street in a highly urbanized areas.</span></p><p data-dcnode-id="8162"><span data-dcnode-id="8167" instrument_node="">Secondary, neutral and service lines shall have a minimum vertical clearance of 7.5 M. from the crown of</span><br data-dcnode-id="8166"><span data-dcnode-id="8165" instrument_node="">the road pavement when crossing the highway and from the top of the shoulder or sidewalk when installed</span><br data-dcnode-id="8164"><span data-dcnode-id="8163" instrument_node="">along the side of the highway or street in highly urbanized areas.</span></p><p data-dcnode-id="8158"><span data-dcnode-id="8161" instrument_node="">Clearances of Supporting Structures such as Poles, Towers, and others and their guys and braces measured</span><br data-dcnode-id="8160"><span data-dcnode-id="8159" instrument_node="">from the nearest part of the objects concerned:</span></p><p data-dcnode-id="8157"></p><h2 data-dcnode-id="8155"><span data-dcnode-id="8156" instrument_node="">     1. From fire hydrants, not less than 5 M.</span></h2><p data-dcnode-id="8154"></p><p data-dcnode-id="8150"><span data-dcnode-id="8153" instrument_node="">      2. From Street Corners, where fire hydrants are located, poles and towers shall not be set so far from</span><br data-dcnode-id="8152"><span data-dcnode-id="8151" instrument_node="">the corners as to make necessary the use of the flying taps which are inaccessible from the poles.</span></p><p data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">     3. From curbs, not less than 150 mm. measured from the curb away from the roadway.</span></p><p data-dcnode-id="8144"><span data-dcnode-id="8147" instrument_node="">     4. Guy wires and other structures shall in no way be installed as to obstruct pedestrian and/or</span><br data-dcnode-id="8146"><span data-dcnode-id="8145" instrument_node="">vehicular traffic.</span></p><p data-dcnode-id="8143"></p><h2 data-dcnode-id="8141"><span data-dcnode-id="8142" instrument_node="">                            ATTACHMENT ON AND CLEARANCES FROM BUILDINGS</span></h2><br data-dcnode-id="8140"><span data-dcnode-id="8139" instrument_node=""> Where buildings exceed 15 M. in height, overhead lines shall be arranged where practicable so that a clear</span><br data-dcnode-id="8138"><span data-dcnode-id="8137" instrument_node="">space or zone at least 2 M. wide will be left, either adjacent to the building or beginning not over 2.5 M.</span><br data-dcnode-id="8136"><span data-dcnode-id="8135" instrument_node="">from the building to facilitate the raising of ladders when necessary for fire fighting.</span><br data-dcnode-id="8134"><span data-dcnode-id="8133" instrument_node="">f                                       CLEARANCES OF SERVICE DROPS</span><br data-dcnode-id="8132"><span data-dcnode-id="8131" instrument_node="">Clearances Over Roof: Conductors shall have a clearance of not less than 2.5 M. from the highest point of</span><br data-dcnode-id="8130"><span data-dcnode-id="8129" instrument_node="">roofs over which they pass with the following exceptions:</span><p data-dcnode-id="8128"></p><p data-dcnode-id="8124"><span data-dcnode-id="8127" instrument_node="">      1. Where the voltage between the conductors does not exceed 300 volts and the roof has a slope of</span><br data-dcnode-id="8126"><span data-dcnode-id="8125" instrument_node="">not less than 100 mm. in 300 mm., the clearance may not be less than 1 M.</span></p><p data-dcnode-id="8116"><span data-dcnode-id="8123" instrument_node="">     2. Service drop conductors of 300 volts or less which do not pass over, other than a maximum of 1.2</span><br data-dcnode-id="8122"><span data-dcnode-id="8121" instrument_node="">M. of the overhang portion of the roof for the purpose of terminating at a through-the-roof service raceway</span><br data-dcnode-id="8120"><span data-dcnode-id="8119" instrument_node="">or approved support may be maintained at a minimum of 500 mm. from any portion of the roof over which</span><br data-dcnode-id="8118"><span data-dcnode-id="8117" instrument_node="">they pass.</span></p><p data-dcnode-id="8112"><span data-dcnode-id="8115" instrument_node=""> Clearance from the Ground: Conductors shall have a clearance of not less than 3 M. from the ground or</span><br data-dcnode-id="8114"><span data-dcnode-id="8113" instrument_node="">from any platform or projection from which they might be reached.</span></p><p data-dcnode-id="8106"><span data-dcnode-id="8111" instrument_node=""> Clearance from Building Openings: Conductors shall have a horizontal clearance of not less than 1 M. from</span><br data-dcnode-id="8110"><span data-dcnode-id="8109" instrument_node="">windows, doors, porches, fire escapes, or similar locations and shall be run at least 500 mm. above the top</span><br data-dcnode-id="8108"><span data-dcnode-id="8107" instrument_node="">level of a window or opening.</span></p><p data-dcnode-id="8102"><span data-dcnode-id="8105" instrument_node=""> Service Drop of communication lines, when crossing a street, shall have a clearance of not less than 5.5 M.</span><br data-dcnode-id="8104"><span data-dcnode-id="8103" instrument_node="">from the crown of the street or sidewalk over which it passes.</span></p><p data-dcnode-id="8098"><span data-dcnode-id="8101" instrument_node="">Service drop of communication lines shall have a minimum clearance of 3.0 M. above ground at its point</span><br data-dcnode-id="8100"><span data-dcnode-id="8099" instrument_node="">of attachment to the building or pedestal.</span></p><p data-dcnode-id="8088"><span data-dcnode-id="8097" instrument_node="">                                            EMERGENCY SYSTEMS</span><br data-dcnode-id="8096"><span data-dcnode-id="8095" instrument_node=""> The provisions of this Section shall apply to the installation, operation and maintenance of circuits, systems</span><br data-dcnode-id="8094"><span data-dcnode-id="8093" instrument_node="">and equipment intended to supply illumination and power in the event of failure of the normal supply or in</span><br data-dcnode-id="8092"><span data-dcnode-id="8091" instrument_node="">the event of accident to elements of a system and property where such systems or circuits are required by</span><br data-dcnode-id="8090"><span data-dcnode-id="8089" instrument_node="">the Fire Code or by any government agency having jurisdiction.</span></p><p data-dcnode-id="8076"><span data-dcnode-id="8087" instrument_node="">Emergency systems are generally installed in places of assembly where artificial illumination is required,</span><br data-dcnode-id="8086"><span data-dcnode-id="8085" instrument_node="">such as buildings subject to occupancy by large numbers of persons, hotels, theaters, sports arenas,</span><br data-dcnode-id="8084"><span data-dcnode-id="8083" instrument_node="">hospitals and similar institutions. Emergency systems provide power for such functions as refrigeration,</span><br data-dcnode-id="8082"><span data-dcnode-id="8081" instrument_node="">operation of mechanical breathing apparatus, ventilation essential to human life, illumination and power for</span><br data-dcnode-id="8080"><span data-dcnode-id="8079" instrument_node="">hospital rooms, fire alarm systems, fire pumps, industrial processes where current interruption would</span><br data-dcnode-id="8078"><span data-dcnode-id="8077" instrument_node="">produce serious hazards, and other similar functions.</span></p><p data-dcnode-id="8068"><span data-dcnode-id="8075" instrument_node="">                                               INTERPRETATION</span><br data-dcnode-id="8074"><span data-dcnode-id="8073" instrument_node=""> The Board of Electrical Engineers, Professional Regulations Commission, shall render the final decision in</span><br data-dcnode-id="8072"><span data-dcnode-id="8071" instrument_node="">the interpretation of any portion of the Philippine Electrical Code in case of a controversy.</span><br data-dcnode-id="8070"><span data-dcnode-id="8069" instrument_node="">f                                   THE NEW NATIONAL BUILDING CODE</span></p><p data-dcnode-id="8067"></p><h2 data-dcnode-id="8065"><span data-dcnode-id="8066" instrument_node="">                                 IMPLEMENTING RULES AND REGULATIONS</span></h2><p data-dcnode-id="8064"></p><p data-dcnode-id="8063"></p><h2 data-dcnode-id="8061"><span data-dcnode-id="8062" instrument_node="">RULE I: GENERAL PROVISIONS</span></h2><p data-dcnode-id="8060"></p><p data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">1. Title</span></p><p data-dcnode-id="8054"><span data-dcnode-id="8057" instrument_node="">1.1 REVISED IMPLEMENTING RULES AND REGULATIONS OF THE NATIONAL BUILDING CODE OF THE</span><br data-dcnode-id="8056"><span data-dcnode-id="8055" instrument_node="">PHILIPPINES (P.D. 1096) referred to as the IRR</span></p><p data-dcnode-id="8052"><span data-dcnode-id="8053" instrument_node="">2. Declaration of Policy</span></p><p data-dcnode-id="8046"><span data-dcnode-id="8051" instrument_node="">2.1 To safeguard life, health, property, and public welfare and to provide a framework of minimum</span><br data-dcnode-id="8050"><span data-dcnode-id="8049" instrument_node="">standards and requirements to regulate and control the location of buildings, site, design, quality of</span><br data-dcnode-id="8048"><span data-dcnode-id="8047" instrument_node="">material, construction, use and maintenance.</span></p><p data-dcnode-id="8045"></p><h2 data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">3. Scope and Application</span></h2><p data-dcnode-id="8042"></p><p data-dcnode-id="8034"><span data-dcnode-id="8041" instrument_node="">3.1 Shall cover architectural, civil/structural, electrical, mechanical, sanitary, plumbing, electronics and</span><br data-dcnode-id="8040"><span data-dcnode-id="8039" instrument_node="">interior design. Shall apply to design, location, siting, construction, alteration, repair, conversion, use,</span><br data-dcnode-id="8038"><span data-dcnode-id="8037" instrument_node="">occupancy, maintenance, moving, demolition of and addition to public and private building and structures</span><br data-dcnode-id="8036"><span data-dcnode-id="8035" instrument_node="">except traditional indigenous family dwellings and economic and socialized housing projects.</span></p><p data-dcnode-id="8030"><span data-dcnode-id="8033" instrument_node="">3.2 Existing buildings without building permits/certificates of occupancy may be issued same provided they</span><br data-dcnode-id="8032"><span data-dcnode-id="8031" instrument_node="">conform to these rules and regulations</span></p><p data-dcnode-id="8029"></p><h2 data-dcnode-id="8027"><span data-dcnode-id="8028" instrument_node="">RULE II “ ADMINISTRATION AND ENFORCEMENT</span></h2><p data-dcnode-id="8026"></p><p data-dcnode-id="8022"><span data-dcnode-id="8025" instrument_node="">1. Responsibility for Administration and Enforcement “ Secretary of Department of Public Works and</span><br data-dcnode-id="8024"><span data-dcnode-id="8023" instrument_node="">Highways</span></p><p data-dcnode-id="8016"><span data-dcnode-id="8021" instrument_node="">2. Professional and Technical Assistance “ created the National Building Code Development Council (NBCDC)</span><br data-dcnode-id="8020"><span data-dcnode-id="8019" instrument_node="">with the Board of Consultants (BOC) “ undertake research and development of building systems to develop</span><br data-dcnode-id="8018"><span data-dcnode-id="8017" instrument_node="">suitable guidelines, standards, upgrade existing IRR and other codes.</span></p><p data-dcnode-id="8004"><span data-dcnode-id="8015" instrument_node="">3. Fees</span><br data-dcnode-id="8014"><span data-dcnode-id="8013" instrument_node="">f            1. Bases of assessment</span><br data-dcnode-id="8012"><span data-dcnode-id="8011" instrument_node="">                  1. Character of occupancy or use of building</span><br data-dcnode-id="8010"><span data-dcnode-id="8009" instrument_node="">                  2. Cost of construction “ 10,000/sq.m (A,B,C,D,E,G,H,I), 8,000 (F), 6,000 (J)</span><br data-dcnode-id="8008"><span data-dcnode-id="8007" instrument_node="">                  3. Floor area</span><br data-dcnode-id="8006"><span data-dcnode-id="8005" instrument_node="">                  4. Height</span></p><p data-dcnode-id="8002"><span data-dcnode-id="8003" instrument_node="">4. Administrative Sanctions</span></p><p data-dcnode-id="8001"></p><h2 data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">4.1 Administrative sanctions for non-compliance of the Code:</span></h2><p data-dcnode-id="7998"></p><p data-dcnode-id="7997"></p><h2 data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">4.1.1 Non-issuance, suspension or revocation of permits</span></h2><p data-dcnode-id="7994"></p><p data-dcnode-id="7993"></p><h2 data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">4.1.2 Non-issuance, suspension or revocations of certificates of occupancy</span></h2><p data-dcnode-id="7990"></p><p data-dcnode-id="7989"></p><h2 data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">4.1.3 Issuance of Work Stoppage Order or Notice.</span></h2><p data-dcnode-id="7986"></p><p data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">4.1.4 Issuance of Order for Discontinuance of Use or Occupancy of Buildings or parts thereof</span></p><p data-dcnode-id="7983"></p><h2 data-dcnode-id="7981"><span data-dcnode-id="7982" instrument_node="">                    5. Abatement and/or demolition of dangerous/ruinous buildings</span></h2><br data-dcnode-id="7980"><span data-dcnode-id="7979" instrument_node="">                    6. Impositions of administrative fines, surcharges and penalties</span><p data-dcnode-id="7978"></p><p data-dcnode-id="7977"></p><h2 data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">    5. Grounds for the Non-issuance, Suspension, Revocation of Permit</span></h2><br data-dcnode-id="7974"><span data-dcnode-id="7973" instrument_node="">          1. Non-compliance of plans and specifications with the Code</span><br data-dcnode-id="7972"><span data-dcnode-id="7971" instrument_node="">          2. Incorrect or inaccurate data or information found in the application</span><br data-dcnode-id="7970"><span data-dcnode-id="7969" instrument_node="">          3. Non-compliance with terms and conditions of permit</span><br data-dcnode-id="7968"><span data-dcnode-id="7967" instrument_node="">          4. Failure to commence work within one year</span><br data-dcnode-id="7966"><span data-dcnode-id="7965" instrument_node="">          5. Abandonment of work for 120 calendar days</span><br data-dcnode-id="7964"><span data-dcnode-id="7963" instrument_node="">          6. Unauthorized change in the submitted plans and specifications and in the type of</span><br data-dcnode-id="7962"><span data-dcnode-id="7961" instrument_node="">              construction</span><br data-dcnode-id="7960"><span data-dcnode-id="7959" instrument_node="">          7. Failure to engage an architect/civil engineer to undertake full time supervision or failure to</span><br data-dcnode-id="7958"><span data-dcnode-id="7957" instrument_node="">              keep a logbook of the progress of construction</span><br data-dcnode-id="7956"><span data-dcnode-id="7955" instrument_node="">          8. Failure to submit the original design plans stamped by the BO or the as-built plans prior to</span><br data-dcnode-id="7954"><span data-dcnode-id="7953" instrument_node="">              renovation, alteration, conversion or any change affecting structural stability, architectural</span><br data-dcnode-id="7952"><span data-dcnode-id="7951" instrument_node="">              presentability and type of construction</span><p data-dcnode-id="7950"></p><p data-dcnode-id="7949"></p><h2 data-dcnode-id="7947"><span data-dcnode-id="7948" instrument_node="">    6. Grounds for Non-issuance or revocation of Certificates of Occupancy:</span></h2><br data-dcnode-id="7946"><span data-dcnode-id="7945" instrument_node="">                  1. Non-compliance with terms and conditions of permits</span><br data-dcnode-id="7944"><span data-dcnode-id="7943" instrument_node="">                  2. Incorrect or inaccurate data or information supplied and incomplete requirements</span><br data-dcnode-id="7942"><span data-dcnode-id="7941" instrument_node="">                      in the application</span><br data-dcnode-id="7940"><span data-dcnode-id="7939" instrument_node="">                  3. Failure to submit the logbook, duly notarized Certificate of Completion, as-built</span><br data-dcnode-id="7938"><span data-dcnode-id="7937" instrument_node="">                      plans and specifications, and building inspection sheets</span><p data-dcnode-id="7936"></p><p data-dcnode-id="7935"></p><h2 data-dcnode-id="7933"><span data-dcnode-id="7934" instrument_node="">    7. Issuance of Work Stoppage Order or Notice:</span></h2><br data-dcnode-id="7932"><span data-dcnode-id="7931" instrument_node="">                   1. Non-compliance with the terms and conditions of permits</span><br data-dcnode-id="7930"><span data-dcnode-id="7929" instrument_node="">f                      2. Unauthorized change, modification or alteration in the approved plans and</span><br data-dcnode-id="7928"><span data-dcnode-id="7927" instrument_node="">                         specifications or in the type of construction</span><p data-dcnode-id="7926"></p><p data-dcnode-id="7925"></p><h2 data-dcnode-id="7923"><span data-dcnode-id="7924" instrument_node="">                      3. Failure to engage the services of an architect/civil engineer to supervise</span></h2><br data-dcnode-id="7922"><span data-dcnode-id="7921" instrument_node="">                         construction</span><br data-dcnode-id="7920"><span data-dcnode-id="7919" instrument_node="">                      4. Erecting, constructing, altering, moving, converting or demolishing without permit</span><br data-dcnode-id="7918"><span data-dcnode-id="7917" instrument_node="">                      5. Alteration, addition, repair in buildings constructed before the adoption of this</span><br data-dcnode-id="7916"><span data-dcnode-id="7915" instrument_node="">                         code without permit</span><br data-dcnode-id="7914"><span data-dcnode-id="7913" instrument_node="">                      6. Unauthorized change during construction from the approved plans and</span><br data-dcnode-id="7912"><span data-dcnode-id="7911" instrument_node="">                         specifications</span><p data-dcnode-id="7910"></p><p data-dcnode-id="7909"></p><h2 data-dcnode-id="7907"><span data-dcnode-id="7908" instrument_node="">    8. Issuance of Order for Discontinuance of Use or Occupancy “ annual inspection</span></h2><br data-dcnode-id="7906"><span data-dcnode-id="7905" instrument_node="">                   1. Dangerous or Ruinous Building</span><br data-dcnode-id="7904"><span data-dcnode-id="7903" instrument_node="">                   2. Occupancy of building without a Certificate of Occupancy</span><br data-dcnode-id="7902"><span data-dcnode-id="7901" instrument_node="">                   3. Change in the existing use or occupancy classification without Certificate of Change</span><br data-dcnode-id="7900"><span data-dcnode-id="7899" instrument_node="">                       of Occupancy</span><br data-dcnode-id="7898"><span data-dcnode-id="7897" instrument_node="">                   4. Errors found in the application for Certificate of Occupancy, As-built plan, Notarized</span><br data-dcnode-id="7896"><span data-dcnode-id="7895" instrument_node="">                       Certificate of Completion and Logbook</span><br data-dcnode-id="7894"><span data-dcnode-id="7893" instrument_node="">                   5. Maintaining hazardous, dangerous and excessive occupancy loading beyond the</span><br data-dcnode-id="7892"><span data-dcnode-id="7891" instrument_node="">                       designed capacity of the building</span><p data-dcnode-id="7890"></p><p data-dcnode-id="7889"></p><h2 data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">    9. Non-conforming Use or Occupancy</span></h2><br data-dcnode-id="7886"><span data-dcnode-id="7885" instrument_node="">                 1. The use of non-conforming buildings legally authorized under the Code maybe</span><br data-dcnode-id="7884"><span data-dcnode-id="7883" instrument_node="">                     continued.</span><br data-dcnode-id="7882"><span data-dcnode-id="7881" instrument_node="">                 2. However, non-conforming buildings cannot be enlarged, increased or extended to</span><br data-dcnode-id="7880"><span data-dcnode-id="7879" instrument_node="">                     occupy a greater area of land than that already occupied.</span><p data-dcnode-id="7878"></p><p data-dcnode-id="7877"></p><h2 data-dcnode-id="7875"><span data-dcnode-id="7876" instrument_node="">    10. Abatement/Demolition of Dangerous/Ruinous Building</span></h2><br data-dcnode-id="7874"><span data-dcnode-id="7873" instrument_node="">           1. The BO shall order the repair, vacation or demolition of dangerous or ruinous</span><br data-dcnode-id="7872"><span data-dcnode-id="7871" instrument_node="">              building. Conditions or defects of dangerous or ruinous buildings:</span><br data-dcnode-id="7870"><span data-dcnode-id="7869" instrument_node="">                  1. Structural Hazards</span><br data-dcnode-id="7868"><span data-dcnode-id="7867" instrument_node="">                  2. Fire Hazard</span><br data-dcnode-id="7866"><span data-dcnode-id="7865" instrument_node="">                  3. Hazardous Electrical Wiring</span><br data-dcnode-id="7864"><span data-dcnode-id="7863" instrument_node="">                  4. Hazardous Mechanical Installation</span><br data-dcnode-id="7862"><span data-dcnode-id="7861" instrument_node="">                  5. Inadequate Sanitation/Plumbing and Health Facilities</span><br data-dcnode-id="7860"><span data-dcnode-id="7859" instrument_node="">                  6. Improper Occupancy and Architectural Eyesore</span><br data-dcnode-id="7858"><span data-dcnode-id="7857" instrument_node="">                  7. Improper/Unauthorized Location</span><br data-dcnode-id="7856"><span data-dcnode-id="7855" instrument_node="">                  8. Illegal Construction</span><p data-dcnode-id="7854"></p><p data-dcnode-id="7853"></p><h2 data-dcnode-id="7851"><span data-dcnode-id="7852" instrument_node="">RULE III “ BUILDING PERMITS AND INSPECTIONS</span></h2><p data-dcnode-id="7850"></p><p data-dcnode-id="7848"><span data-dcnode-id="7849" instrument_node="">1. Building Permits</span></p><p data-dcnode-id="7842"><span data-dcnode-id="7847" instrument_node="">1.1 No person, firm or corporation shall construct, alter, repair, convert, use, occupy, move span data-dcnode-id="7803" instrument_node="">the plans and specifications</span></p><p data-dcnode-id="7801"></p><h2 data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">3.1 Bank and records vaults</span></h2><p data-dcnode-id="7798"></p><p data-dcnode-id="7797"></p><h2 data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">3.2 Swimming pools</span></h2><p data-dcnode-id="7794"></p><p data-dcnode-id="7793"></p><h2 data-dcnode-id="7791"><span data-dcnode-id="7792" instrument_node="">3.3 Firewalls separate from the building</span></h2><p data-dcnode-id="7790"></p><p data-dcnode-id="7788"><span data-dcnode-id="7789" instrument_node="">3.4 Towers</span></p><p data-dcnode-id="7786"><span data-dcnode-id="7787" instrument_node="">3.5 Silos</span></p><p data-dcnode-id="7782"><span data-dcnode-id="7785" instrument_node="">3.6 Smokestacks</span><br data-dcnode-id="7784"><span data-dcnode-id="7783" instrument_node="">f3.7 Chimneys</span></p><p data-dcnode-id="7781"></p><h2 data-dcnode-id="7779"><span data-dcnode-id="7780" instrument_node="">3.8 Commercial/industrial fixed ovens</span></h2><p data-dcnode-id="7778"></p><p data-dcnode-id="7777"></p><h2 data-dcnode-id="7775"><span data-dcnode-id="7776" instrument_node="">3.9 Industrial kilns/furnaces</span></h2><p data-dcnode-id="7774"></p><p data-dcnode-id="7773"></p><h2 data-dcnode-id="7771"><span data-dcnode-id="7772" instrument_node="">3.10 Water/Waste water treatment tanks, septic vault</span></h2><p data-dcnode-id="7770"></p><p data-dcnode-id="7769"></p><h2 data-dcnode-id="7767"><span data-dcnode-id="7768" instrument_node="">3.11 Concrete and steel tank</span></h2><p data-dcnode-id="7766"></p><p data-dcnode-id="7765"></p><h2 data-dcnode-id="7763"><span data-dcnode-id="7764" instrument_node="">3.12 Booths, kiosks and stages</span></h2><p data-dcnode-id="7762"></p><p data-dcnode-id="7761"></p><h2 data-dcnode-id="7759"><span data-dcnode-id="7760" instrument_node="">3.13 Tombs, mausoleums and niches</span></h2><p data-dcnode-id="7758"></p><p data-dcnode-id="7756"><span data-dcnode-id="7757" instrument_node="">3.14 Others</span></p><p data-dcnode-id="7755"></p><h2 data-dcnode-id="7753"><span data-dcnode-id="7754" instrument_node="">4 Accessory Permits - activities</span></h2><p data-dcnode-id="7752"></p><p data-dcnode-id="7751"></p><h2 data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node="">4.1 Ground preparation and excavation permit</span></h2><p data-dcnode-id="7748"></p><p data-dcnode-id="7747"></p><h2 data-dcnode-id="7745"><span data-dcnode-id="7746" instrument_node="">4.2 Encroachment of foundation to public area permit</span></h2><p data-dcnode-id="7744"></p><p data-dcnode-id="7743"></p><h2 data-dcnode-id="7741"><span data-dcnode-id="7742" instrument_node="">4.3 Fencing permit for fence exceeding 1.80 m high</span></h2><p data-dcnode-id="7740"></p><p data-dcnode-id="7739"></p><h2 data-dcnode-id="7737"><span data-dcnode-id="7738" instrument_node="">4.4 Sidewalk construction permit</span></h2><p data-dcnode-id="7736"></p><p data-dcnode-id="7735"></p><h2 data-dcnode-id="7733"><span data-dcnode-id="7734" instrument_node="">4.5 Temporary sidewalk enclosure and occupancy permit</span></h2><p data-dcnode-id="7732"></p><p data-dcnode-id="7731"></p><h2 data-dcnode-id="7729"><span data-dcnode-id="7730" instrument_node="">4.6 Erection of scaffolding permit</span></h2><p data-dcnode-id="7728"></p><p data-dcnode-id="7727"></p><h2 data-dcnode-id="7725"><span data-dcnode-id="7726" instrument_node="">4.7 Erecting, repair, removal of sign permit</span></h2><p data-dcnode-id="7724"></p><p data-dcnode-id="7723"></p><h2 data-dcnode-id="7721"><span data-dcnode-id="7722" instrument_node="">4.8 Repairs permit</span></h2><br data-dcnode-id="7720"><span data-dcnode-id="7719" instrument_node="">f4.9 Raising Permit</span><p data-dcnode-id="7718"></p><p data-dcnode-id="7717"></p><h2 data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">4.10 Demolition permit</span></h2><p data-dcnode-id="7714"></p><p data-dcnode-id="7713"></p><h2 data-dcnode-id="7711"><span data-dcnode-id="7712" instrument_node="">4.11 Moving permit</span></h2><p data-dcnode-id="7710"></p><p data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">4.12 Other</span></p><p data-dcnode-id="7707"></p><h2 data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">5. Exemption from Building Permits</span></h2><p data-dcnode-id="7704"></p><p data-dcnode-id="7688"><span data-dcnode-id="7703" instrument_node="">A building permit shall not be required for the following minor constructions:</span><br data-dcnode-id="7702"><span data-dcnode-id="7701" instrument_node="">Minor Constructions</span><br data-dcnode-id="7700"><span data-dcnode-id="7699" instrument_node="">Sheds, outhouses, greenhouses, childrens playhouses, aviaries, poultry houses and the like not exceeding</span><br data-dcnode-id="7698"><span data-dcnode-id="7697" instrument_node="">           six sq.m. completely detached from any building</span><br data-dcnode-id="7696"><span data-dcnode-id="7695" instrument_node="">Addition of open terraces or patios directly on the ground not exceeding twenty sq.m. for private use</span><br data-dcnode-id="7694"><span data-dcnode-id="7693" instrument_node="">Installation of window grilles</span><br data-dcnode-id="7692"><span data-dcnode-id="7691" instrument_node="">Garden pools, aquarium fish not exceeding five hundred mm in depth and for private use</span><br data-dcnode-id="7690"><span data-dcnode-id="7689" instrument_node="">Garden masonry wall not exceeding 1.20 m in height, footpaths, residential garden walks and driveways</span></p><p data-dcnode-id="7662"><span data-dcnode-id="7687" instrument_node="">                     2. Repair works</span><br data-dcnode-id="7686"><span data-dcnode-id="7685" instrument_node="">                           1. Repair works not affecting structural members</span><br data-dcnode-id="7684"><span data-dcnode-id="7683" instrument_node="">                           2. Repair of non-load bearing partition walls</span><br data-dcnode-id="7682"><span data-dcnode-id="7681" instrument_node="">                           3. Repair of any interior portion of a house not involving addition or alteration</span><br data-dcnode-id="7680"><span data-dcnode-id="7679" instrument_node="">                           4. Repair/replacement of doors and windows</span><br data-dcnode-id="7678"><span data-dcnode-id="7677" instrument_node="">                           5. Repair/replacement of flooring</span><br data-dcnode-id="7676"><span data-dcnode-id="7675" instrument_node="">                           6. Repair of perimeter fence and walls</span><br data-dcnode-id="7674"><span data-dcnode-id="7673" instrument_node="">                           7. Repair/replacement of plumbing fixtures, fittings or pipings for single</span><br data-dcnode-id="7672"><span data-dcnode-id="7671" instrument_node="">                                detached dwellings and duplexes</span><br data-dcnode-id="7670"><span data-dcnode-id="7669" instrument_node="">                           8. Repair/replacement of defective and deteriorated wires, wiring devices,</span><br data-dcnode-id="7668"><span data-dcnode-id="7667" instrument_node="">                                fixtures and safety devices provided that no alterations on the electrical</span><br data-dcnode-id="7666"><span data-dcnode-id="7665" instrument_node="">                                service entrance and the main safety switch or circuit breaker and without</span><br data-dcnode-id="7664"><span data-dcnode-id="7663" instrument_node="">                                additional circuits to existing installations for single detached dwellings</span></p><p data-dcnode-id="7660"><span data-dcnode-id="7661" instrument_node="">6. Requirements</span></p><p data-dcnode-id="7659"></p><h2 data-dcnode-id="7657"><span data-dcnode-id="7658" instrument_node="">        ◦ In case the applicant is the registered owner of the lot:</span></h2><br data-dcnode-id="7656"><span data-dcnode-id="7655" instrument_node="">          ▪ Certified true copy of OCT/TCT, on file with the Registry of Deeds</span><br data-dcnode-id="7654"><span data-dcnode-id="7653" instrument_node="">          ▪ Tax Declaration</span><br data-dcnode-id="7652"><span data-dcnode-id="7651" instrument_node="">          ▪ Current Real Property Tax Receipt</span><br data-dcnode-id="7650"><span data-dcnode-id="7649" instrument_node="">        ◦ In case the applicant is not the registered owner of the lot in addition to the above:</span><br data-dcnode-id="7648"><span data-dcnode-id="7647" instrument_node="">          ▪ Duly notarized copy of the Contract of Lease or Sale</span><br data-dcnode-id="7646"><span data-dcnode-id="7645" instrument_node="">          ▪ Duly notarized copy of the Deed of Absolute Sale</span><p data-dcnode-id="7644"></p><p data-dcnode-id="7620"><span data-dcnode-id="7643" instrument_node="">             3. Five sets of survey plans, design plans, specifications signed and sealed by:</span><br data-dcnode-id="7642"><span data-dcnode-id="7641" instrument_node="">f                    1.  Architect, in case of architectural documents</span><br data-dcnode-id="7640"><span data-dcnode-id="7639" instrument_node="">                    2.  Civil Engineer, in case of civil/structural documents</span><br data-dcnode-id="7638"><span data-dcnode-id="7637" instrument_node="">                    3.  Professional Electrical Engineer, in case of electrical documents</span><br data-dcnode-id="7636"><span data-dcnode-id="7635" instrument_node="">                    4.  Professional Mechanical Engineer, in case of mechanical documents</span><br data-dcnode-id="7634"><span data-dcnode-id="7633" instrument_node="">                    5.  Sanitary Engineer, in case of sanitary documents</span><br data-dcnode-id="7632"><span data-dcnode-id="7631" instrument_node="">                    6.  Master Plumber, in case of plumbing documents</span><br data-dcnode-id="7630"><span data-dcnode-id="7629" instrument_node="">                    7.  Electronics Engineer, in case of electronics documents</span><br data-dcnode-id="7628"><span data-dcnode-id="7627" instrument_node="">                    8.  Environmental Planner who is also an architect or civil engineer in case of</span><br data-dcnode-id="7626"><span data-dcnode-id="7625" instrument_node="">                        developmental/environmental documents</span><br data-dcnode-id="7624"><span data-dcnode-id="7623" instrument_node="">                    9. Interior Designer, in case of interior design documents</span><br data-dcnode-id="7622"><span data-dcnode-id="7621" instrument_node="">                    10. Geodetic Engineer, in case of lot survey documents</span></p><p data-dcnode-id="7619"></p><h2 data-dcnode-id="7617"><span data-dcnode-id="7618" instrument_node="">    7. Issuance of Building Permit</span></h2><p data-dcnode-id="7616"></p><p data-dcnode-id="7612"><span data-dcnode-id="7615" instrument_node="">7.1 When satisfied that the plans and specifications conforms to the requirements of the Code and its IRR,</span><br data-dcnode-id="7614"><span data-dcnode-id="7613" instrument_node="">the BO shall within fifteen days from payment of the required fees, issue the Building Permit.</span></p><p data-dcnode-id="7611"></p><h2 data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">            2. Non-issuance, Suspension or Revocation of Building Permit</span></h2><br data-dcnode-id="7608"><span data-dcnode-id="7607" instrument_node="">                  1. Errors found in the plans and specifications</span><br data-dcnode-id="7606"><span data-dcnode-id="7605" instrument_node="">                  2. Incorrect or inaccurate data or information supplied</span><br data-dcnode-id="7604"><span data-dcnode-id="7603" instrument_node="">                  3. Non-compliance with the pertinent provisions of the Code and its IRR</span><p data-dcnode-id="7602"></p><p data-dcnode-id="7601"></p><h2 data-dcnode-id="7599"><span data-dcnode-id="7600" instrument_node="">            3. Terms and Conditions of Permits</span></h2><br data-dcnode-id="7598"><span data-dcnode-id="7597" instrument_node="">                  1. Submitted plans and specifications shall not be changed, modified or altered</span><br data-dcnode-id="7596"><span data-dcnode-id="7595" instrument_node="">                      without the approval of the BO.</span><p data-dcnode-id="7594"></p><p data-dcnode-id="7593"></p><h2 data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">            4. Validity of a Building Permit</span></h2><br data-dcnode-id="7590"><span data-dcnode-id="7589" instrument_node="">                   1. A building permit shall become null and void if the work is not commenced within</span><br data-dcnode-id="7588"><span data-dcnode-id="7587" instrument_node="">                        one year and if suspended or abandoned for 120 days.</span><p data-dcnode-id="7586"></p><p data-dcnode-id="7585"></p><h2 data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">8. Processing of Application for Certificate of Occupancy</span></h2><p data-dcnode-id="7582"></p><p data-dcnode-id="7581"></p><h2 data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">            1. The owner shall submit to the BO</span></h2><br data-dcnode-id="7578"><span data-dcnode-id="7577" instrument_node="">                   1. A duly notarized Certificate of Completion together with the logbook, as-built plans</span><br data-dcnode-id="7576"><span data-dcnode-id="7575" instrument_node="">                      and specifications and the Building Inspection Sheet all signed by the contractor</span><br data-dcnode-id="7574"><span data-dcnode-id="7573" instrument_node="">                      and the architect/engineer who undertook the full ctures</span></h2><br data-dcnode-id="7192"><span data-dcnode-id="7191" instrument_node="">f                3.    sheds</span><br data-dcnode-id="7190"><span data-dcnode-id="7189" instrument_node="">                4.    barns</span><br data-dcnode-id="7188"><span data-dcnode-id="7187" instrument_node="">                5.    poultry houses</span><br data-dcnode-id="7186"><span data-dcnode-id="7185" instrument_node="">                6.    piggeries</span><br data-dcnode-id="7184"><span data-dcnode-id="7183" instrument_node="">                7.    hatcheries</span><br data-dcnode-id="7182"><span data-dcnode-id="7181" instrument_node="">                8.    stables</span><br data-dcnode-id="7180"><span data-dcnode-id="7179" instrument_node="">                9.    greenhouses</span><br data-dcnode-id="7178"><span data-dcnode-id="7177" instrument_node="">                10.   granaries</span><p data-dcnode-id="7176"></p><p data-dcnode-id="7175"></p><h2 data-dcnode-id="7173"><span data-dcnode-id="7174" instrument_node="">Division J-2 Accessory</span></h2><p data-dcnode-id="7172"></p><p data-dcnode-id="7171"></p><h2 data-dcnode-id="7169"><span data-dcnode-id="7170" instrument_node="">               private garages, carports</span></h2><br data-dcnode-id="7168"><span data-dcnode-id="7167" instrument_node="">               towers and silos, smokestacks and chimneys</span><br data-dcnode-id="7166"><span data-dcnode-id="7165" instrument_node="">               swimming pools including shower and locker room</span><br data-dcnode-id="7164"><span data-dcnode-id="7163" instrument_node="">               stages, platforms and similar structures</span><br data-dcnode-id="7162"><span data-dcnode-id="7161" instrument_node="">               pelota, tennis or basketball courts</span><br data-dcnode-id="7160"><span data-dcnode-id="7159" instrument_node="">               tombs, mausoleums, niches</span><br data-dcnode-id="7158"><span data-dcnode-id="7157" instrument_node="">               fence over 1.80 m high</span><br data-dcnode-id="7156"><span data-dcnode-id="7155" instrument_node="">               steel or concrete tanks</span><br data-dcnode-id="7154"><span data-dcnode-id="7153" instrument_node="">               aviaries and aquariums and zoo structures</span><br data-dcnode-id="7152"><span data-dcnode-id="7151" instrument_node="">               banks and record vaults</span><p data-dcnode-id="7150"></p><p data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">    3. Occupant loads</span></p><p data-dcnode-id="7138"><span data-dcnode-id="7147" instrument_node="">            1. Determination of occupant load “ the occupant load shall be determined by dividing the</span><br data-dcnode-id="7146"><span data-dcnode-id="7145" instrument_node="">               floor area assigned to that use by the unit area per occupant set forth in Table VIII.3.1 or in</span><br data-dcnode-id="7144"><span data-dcnode-id="7143" instrument_node="">               the Architectural Code of the Philippines whichever required more exits.</span><br data-dcnode-id="7142"><span data-dcnode-id="7141" instrument_node="">            2. The occupant load of any area having fixed seats shall be determined by the number of</span><br data-dcnode-id="7140"><span data-dcnode-id="7139" instrument_node="">               fixed seats installed.</span></p><p data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">4. Parking Slot, Parking Area and Loading/Unloading Space Requirements “ refer to attached Table VII.5.1</span></p><p data-dcnode-id="7126"><span data-dcnode-id="7135" instrument_node="">        ◦ In computing for parking slots, a fraction of 50% and above shall be considered as one car</span><br data-dcnode-id="7134"><span data-dcnode-id="7133" instrument_node="">          parking slot.</span><br data-dcnode-id="7132"><span data-dcnode-id="7131" instrument_node="">        ◦ In areas where adequate public parking lots/multi-floor parking garages are available within 200</span><br data-dcnode-id="7130"><span data-dcnode-id="7129" instrument_node="">          m of the proposed building, only 30% of parking requirement need to be provided within their</span><br data-dcnode-id="7128"><span data-dcnode-id="7127" instrument_node="">          premises.</span></p><p data-dcnode-id="7125"></p><h2 data-dcnode-id="7123"><span data-dcnode-id="7124" instrument_node="">    5. Allowable Maximum Total Gross Floor Area (TGFA)</span></h2><br data-dcnode-id="7122"><span data-dcnode-id="7121" instrument_node="">           1. General. The Allowable Maximum Total Gross Floor Area (TGFA) of any proposed building</span><br data-dcnode-id="7120"><span data-dcnode-id="7119" instrument_node="">              shall only be as allowed under this Rule</span><br data-dcnode-id="7118"><span data-dcnode-id="7117" instrument_node="">           2. TGFA Limitation “ In Table Vii.6.1. the percentages indicated in the 3 rd through 8th columns</span><br data-dcnode-id="7116"><span data-dcnode-id="7115" instrument_node="">              are the percentages of the Total Lot Area (TLA) that may be used to determine the</span><br data-dcnode-id="7114"><span data-dcnode-id="7113" instrument_node="">              Allowable Maximum TGFA while the multiplier numbers 3, 5, 12, 18 and 30 represent the</span><br data-dcnode-id="7112"><span data-dcnode-id="7111" instrument_node="">              number of storeys.</span><br data-dcnode-id="7110"><span data-dcnode-id="7109" instrument_node="">           3. The Allowable Maximum TGFA should not exceed the Allowable Maximum Volume of</span><br data-dcnode-id="7108"><span data-dcnode-id="7107" instrument_node="">f               Building (AMVB). If exceeded, the Allowable Maximum TGFA must be adjusted since the</span><br data-dcnode-id="7106"><span data-dcnode-id="7105" instrument_node="">               AMVB must always prevail.</span><p data-dcnode-id="7104"></p><p data-dcnode-id="7103"></p><h2 data-dcnode-id="7101"><span data-dcnode-id="7102" instrument_node="">   6. Allowed Height of Buildings/Structures</span></h2><br data-dcnode-id="7100"><span data-dcnode-id="7099" instrument_node="">          1. General. The maximum height and number of storeys of proposed building shall be</span><br data-dcnode-id="7098"><span data-dcnode-id="7097" instrument_node="">             dependent upon the character of use or occupancy, on the type of construction, on end-</span><br data-dcnode-id="7096"><span data-dcnode-id="7095" instrument_node="">             user population density, light and ventilation, width of road right-of-way, building bulk, off-</span><br data-dcnode-id="7094"><span data-dcnode-id="7093" instrument_node="">             street cum off-site parking requirements and local land use plan and zoning regulations.</span><br data-dcnode-id="7092"><span data-dcnode-id="7091" instrument_node="">          2. The Building Height Limit (BHL) shall only be as allowed under this Rule or under the duly</span><br data-dcnode-id="7090"><span data-dcnode-id="7089" instrument_node="">             approved city zoning ordinance, whichever is more restrictive (refer to Table VII.7.1)</span><p data-dcnode-id="7088"></p><p data-dcnode-id="7087"></p><h2 data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">RULE VIII â€“ LIGHT AND VENTILATION</span></h2><p data-dcnode-id="7084"></p><p data-dcnode-id="7058"><span data-dcnode-id="7083" instrument_node="">   1. Definitions</span><br data-dcnode-id="7082"><span data-dcnode-id="7081" instrument_node="">          1. Maximum Allowable PERCENTAGE OF SITE OCCUPANCY (PSO) “ Maximum Allowable</span><br data-dcnode-id="7080"><span data-dcnode-id="7079" instrument_node="">               Building Footprint (AMBF) divided by Total Lot Area (TLA). Percentage of the maximum</span><br data-dcnode-id="7078"><span data-dcnode-id="7077" instrument_node="">               allowable enclosed floor area of any building at the ground floor in relation to the</span><br data-dcnode-id="7076"><span data-dcnode-id="7075" instrument_node="">               TLA. (Table VIII.4.1)</span><br data-dcnode-id="7074"><span data-dcnode-id="7073" instrument_node="">          2. Maximum Allowable IMPERVIOUS SURFACE AREA (ISA) “ percentage of the maximum</span><br data-dcnode-id="7072"><span data-dcnode-id="7071" instrument_node="">               allowable floor area of any paved, tiled or hardscaped surface at the ground floor in relation</span><br data-dcnode-id="7070"><span data-dcnode-id="7069" instrument_node="">               to the TLA.</span><br data-dcnode-id="7068"><span data-dcnode-id="7067" instrument_node="">          3. Maximum Allowable Construction Area (MACA) “ the combined total of the Maximum</span><br data-dcnode-id="7066"><span data-dcnode-id="7065" instrument_node="">               Allowable PSO and the Maximum Allowable ISA.</span><br data-dcnode-id="7064"><span data-dcnode-id="7063" instrument_node="">          4. Maximum Allowable Unpaved Surface Area (USA) “ portion of the lot that shall remain</span><br data-dcnode-id="7062"><span data-dcnode-id="7061" instrument_node="">               unpaved and reserved for softscaping/planting</span><br data-dcnode-id="7060"><span data-dcnode-id="7059" instrument_node="">          5. Total Open Space Within Lot (TOSL) “ the total open space required for each type of use.</span></p><p data-dcnode-id="7038"><span data-dcnode-id="7057" instrument_node="">   2. General Provisions</span><br data-dcnode-id="7056"><span data-dcnode-id="7055" instrument_node="">         1. Every building shall be designed, constructed and equipped to provide adequate light and</span><br data-dcnode-id="7054"><span data-dcnode-id="7053" instrument_node="">             ventilation</span><br data-dcnode-id="7052"><span data-dcnode-id="7051" instrument_node="">         2. All buildings shall face a street or public alley or a private street which has been duly</span><br data-dcnode-i
