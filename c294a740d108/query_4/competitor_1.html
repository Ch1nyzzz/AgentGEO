_wrapper" data-dcnode-id="10422"><input class="page_number" data-dcnode-id="10423" id="jump_page" name="page_number" type="tel" value="1"></div></label></div><span aria-atomic="true" aria-live="polite" data-dcnode-id="10415"><span class="visually_hidden" data-dcnode-id="10418"><span data-dcnode-id="10419" instrument_node="">You are on page 1</span></span><span class="page_of" data-dcnode-id="10416"><span data-dcnode-id="10417" instrument_node="">of 91</span></span></span></div></div><div class="right_tools" data-dcnode-id="10399"><div class="wrapper__doc_page_App_Page_Body_DocumentSearch" data-dcnode-id="10404"><div class="search_wrapper" data-dcnode-id="10405"><div class="wrapper__text_input input_row document_search text" data-dcnode-id="10406"><label data-dcnode-id="10407" for="document_search"><span class="label_text visually_hidden" data-dcnode-id="10411"><span data-dcnode-id="10412" instrument_node="">Search inside document </span></span><div class="input_wrapper" data-dcnode-id="10408"><span aria-hidden="true" class="icon-ic_search search_icon" data-dcnode-id="10410" role="presentation"></span><input class="document_search" data-dcnode-id="10409" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="10400"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="10401" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="10402"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="10403"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2229"><h1 data-dcnode-id="10396"><span data-dcnode-id="10397" instrument_node="">FIRE OFFICER EXAMINATION</span></h1><p data-dcnode-id="10395"></p><h2 data-dcnode-id="10393"><span data-dcnode-id="10394" instrument_node="">SCOPE OF THE EXAMINATION</span></h2><p data-dcnode-id="10392"></p><p data-dcnode-id="10391"></p><h2 data-dcnode-id="10389"><span data-dcnode-id="10390" instrument_node="">General Ability (25%) : Verbal, Analytical, Numerical</span></h2><p data-dcnode-id="10388"></p><p data-dcnode-id="10387"></p><h2 data-dcnode-id="10385"><span data-dcnode-id="10386" instrument_node="">Specialized Area (75%) :</span></h2><p data-dcnode-id="10384"></p><p data-dcnode-id="10383"></p><h2 data-dcnode-id="10381"><span data-dcnode-id="10382" instrument_node="">       Fire Suppression (30%)</span></h2><br data-dcnode-id="10380"><span data-dcnode-id="10379" instrument_node="">*Introduction</span><p data-dcnode-id="10378"></p><p data-dcnode-id="10358"><span data-dcnode-id="10377" instrument_node="">FIRE</span><br data-dcnode-id="10376"><span data-dcnode-id="10375" instrument_node="">         Active principle of burning characterized by the heat and light of combustion</span><br data-dcnode-id="10374"><span data-dcnode-id="10373" instrument_node="">         Is a rapid, self-sustaining oxidation process accompanied by the evolution of heat and light of</span><br data-dcnode-id="10372"><span data-dcnode-id="10371" instrument_node="">          varying intensity.</span><br data-dcnode-id="10370"><span data-dcnode-id="10369" instrument_node="">         Is a chemical reaction. It is the rapid oxidation of a fuel producing heat and light.</span><br data-dcnode-id="10368"><span data-dcnode-id="10367" instrument_node="">         It is an oxidation taking place with a rate rapid enough to produce heat and light.</span><br data-dcnode-id="10366"><span data-dcnode-id="10365" instrument_node="">         Is a chemical process caused by the combination of one or more substances with oxygen.</span><br data-dcnode-id="10364"><span data-dcnode-id="10363" instrument_node="">         In order to start this chemical process, normally an initial source of heat is required. During this</span><br data-dcnode-id="10362"><span data-dcnode-id="10361" instrument_node="">          process, fuel and oxygen are consumed and as a result heat, light, smoke and toxic gases are</span><br data-dcnode-id="10360"><span data-dcnode-id="10359" instrument_node="">          produced.</span></p><p data-dcnode-id="10346"><span data-dcnode-id="10357" instrument_node="">FIRE TETRAHEDRON</span><br data-dcnode-id="10356"><span data-dcnode-id="10355" instrument_node="">          For combustion to occur, four components are necessary:</span><br data-dcnode-id="10354"><span data-dcnode-id="10353" instrument_node="">     Oxygen (oxidizing agent)</span><br data-dcnode-id="10352"><span data-dcnode-id="10351" instrument_node="">     Fuel</span><br data-dcnode-id="10350"><span data-dcnode-id="10349" instrument_node="">     Heat</span><br data-dcnode-id="10348"><span data-dcnode-id="10347" instrument_node="">     Self-sustained chemical reaction</span></p><p data-dcnode-id="10324"><span data-dcnode-id="10345" instrument_node="">                                                 CLASSES OF FIRE</span><br data-dcnode-id="10344"><span data-dcnode-id="10343" instrument_node="">CLASS A</span><br data-dcnode-id="10342"><span data-dcnode-id="10341" instrument_node="">                 Fires involving ordinary combustibles such as: wood, paper, cloth, plastics and rubber.</span><br data-dcnode-id="10340"><span data-dcnode-id="10339" instrument_node="">                 It can be extinguished with water, water- based agents or foam, and multi-purpose dry</span><br data-dcnode-id="10338"><span data-dcnode-id="10337" instrument_node="">                  chemicals.</span><br data-dcnode-id="10336"><span data-dcnode-id="10335" instrument_node="">                 Water is usually used by the fire dept.</span><br data-dcnode-id="10334"><span data-dcnode-id="10333" instrument_node="">CLASS B</span><br data-dcnode-id="10332"><span data-dcnode-id="10331" instrument_node="">                 Fires involving flammable and combustible liquids, gases and greases such as: gasoline,</span><br data-dcnode-id="10330"><span data-dcnode-id="10329" instrument_node="">                  oils, alcohol, propane and cooking oils.</span><br data-dcnode-id="10328"><span data-dcnode-id="10327" instrument_node="">                 Common extinguishing agents are carbon dioxide (CO2), regular and multi-purpose dry</span><br data-dcnode-id="10326"><span data-dcnode-id="10325" instrument_node="">                  chemical and foam.</span></p><p data-dcnode-id="10310"><span data-dcnode-id="10323" instrument_node="">CLASS C</span><br data-dcnode-id="10322"><span data-dcnode-id="10321" instrument_node="">                 Fires involving energized electrical equipment, which eliminates the use of water-based</span><br data-dcnode-id="10320"><span data-dcnode-id="10319" instrument_node="">                  agents to put them out.</span><br data-dcnode-id="10318"><span data-dcnode-id="10317" instrument_node="">                 The recommended method of fighting these fires is to turn-off or disconnect electrical</span><br data-dcnode-id="10316"><span data-dcnode-id="10315" instrument_node="">                  power and then use an appropriate extinguisher depending on the remaining fuel source.</span><br data-dcnode-id="10314"><span data-dcnode-id="10313" instrument_node="">                 Extinguishing agents includes carbon dioxide (CO2), regular and multi-purpose dry</span><br data-dcnode-id="10312"><span data-dcnode-id="10311" instrument_node="">                  chemical.</span></p><p data-dcnode-id="10298"><span data-dcnode-id="10309" instrument_node="">CLASS D</span><br data-dcnode-id="10308"><span data-dcnode-id="10307" instrument_node="">                 Fires involving combustible metals and alloys such as: magnesium, sodium, lithium, and</span><br data-dcnode-id="10306"><span data-dcnode-id="10305" instrument_node="">                  potassium.</span><br data-dcnode-id="10304"><span data-dcnode-id="10303" instrument_node="">                 Great case must be used when attempting to extinguish in these types of fuels.</span><br data-dcnode-id="10302"><span data-dcnode-id="10301" instrument_node="">f                 Extinguishing agents for this class of fire are called dry powders and should not be</span><br data-dcnode-id="10300"><span data-dcnode-id="10299" instrument_node="">                  confused with dry chemical.</span></p><p data-dcnode-id="10292"><span data-dcnode-id="10297" instrument_node="">CLASS E</span><br data-dcnode-id="10296"><span data-dcnode-id="10295" instrument_node="">                 Fires involving high voltage electrical installation and bulk LPG.</span><br data-dcnode-id="10294"><span data-dcnode-id="10293" instrument_node="">                 This class of fire needs special fire fighting operation by trained personnel.</span></p><p data-dcnode-id="10280"><span data-dcnode-id="10291" instrument_node="">CLASS K</span><br data-dcnode-id="10290"><span data-dcnode-id="10289" instrument_node="">                 Is a new classification of fire as of 1998 and involves fires in combustible cooking fuels such</span><br data-dcnode-id="10288"><span data-dcnode-id="10287" instrument_node="">                  as vegetable or animal oils and fats.</span><br data-dcnode-id="10286"><span data-dcnode-id="10285" instrument_node="">                 Its fuels are similar to Class B fuels but involves high temperature cooking oils and</span><br data-dcnode-id="10284"><span data-dcnode-id="10283" instrument_node="">                  therefore have special characteristics.</span><br data-dcnode-id="10282"><span data-dcnode-id="10281" instrument_node="">                 Class K agents are usually wet chemicals.</span></p><p data-dcnode-id="10279"></p><h2 data-dcnode-id="10277"><span data-dcnode-id="10278" instrument_node="">                                        CLASSIFICATION OF CAUSES OF FIRE</span></h2><p data-dcnode-id="10276"></p><p data-dcnode-id="10270"><span data-dcnode-id="10275" instrument_node="">   1. ACCIDENTAL</span><br data-dcnode-id="10274"><span data-dcnode-id="10273" instrument_node="">          does not involve deleberate human act to ignite or spread fire into an area where the fire</span><br data-dcnode-id="10272"><span data-dcnode-id="10271" instrument_node="">             should not be</span></p><p data-dcnode-id="10266"><span data-dcnode-id="10269" instrument_node="">   2. NATURAL</span><br data-dcnode-id="10268"><span data-dcnode-id="10267" instrument_node="">          caused without direct human intervention</span></p><p data-dcnode-id="10260"><span data-dcnode-id="10265" instrument_node="">   3. INCENDIARY</span><br data-dcnode-id="10264"><span data-dcnode-id="10263" instrument_node="">           one deliberately set under circumstances in which the person knows the fire should not be</span><br data-dcnode-id="10262"><span data-dcnode-id="10261" instrument_node="">             set</span></p><p data-dcnode-id="10256"><span data-dcnode-id="10259" instrument_node="">   4. UNDETERMINED</span><br data-dcnode-id="10258"><span data-dcnode-id="10257" instrument_node="">          cause not be proven, classification undetermined</span></p><p data-dcnode-id="10252"><span data-dcnode-id="10255" instrument_node="">Pre-Fire Planning</span><br data-dcnode-id="10254"><span data-dcnode-id="10253" instrument_node="">Firefighting Techniques and Procedures</span></p><p data-dcnode-id="10251"></p><h2 data-dcnode-id="10249"><span data-dcnode-id="10250" instrument_node="">                                        BASIC DIVISION OF FIREFIGHTING</span></h2><br data-dcnode-id="10248"><span data-dcnode-id="10247" instrument_node="">         PRE- FIRE PLANNING</span><br data-dcnode-id="10246"><span data-dcnode-id="10245" instrument_node="">                  The objective of the pre fire planning is to fight the fire before it occurs. It involves collecting</span><br data-dcnode-id="10244"><span data-dcnode-id="10243" instrument_node="">                  information and using information to plan ahead of time how fire will be fought if they</span><br data-dcnode-id="10242"><span data-dcnode-id="10241" instrument_node="">                  occurs in various parts of the building.</span><p data-dcnode-id="10240"></p><p data-dcnode-id="10239"></p><h2 data-dcnode-id="10237"><span data-dcnode-id="10238" instrument_node="">          During inspection information should be obtained on the following;</span></h2><br data-dcnode-id="10236"><span data-dcnode-id="10235" instrument_node="">                   The size and construction of the building</span><br data-dcnode-id="10234"><span data-dcnode-id="10233" instrument_node="">                   The life hazard Fire and smoke travel</span><br data-dcnode-id="10232"><span data-dcnode-id="10231" instrument_node="">                   The contents of the building</span><br data-dcnode-id="10230"><span data-dcnode-id="10229" instrument_node="">                   On site fire protection</span><br data-dcnode-id="10228"><span data-dcnode-id="10227" instrument_node="">                   Ventilation problems</span><br data-dcnode-id="10226"><span data-dcnode-id="10225" instrument_node="">                   Building access</span><br data-dcnode-id="10224"><span data-dcnode-id="10223" instrument_node="">                   Hazardous materials</span><br data-dcnode-id="10222"><span data-dcnode-id="10221" instrument_node="">                   Hazards to firefighters</span><br data-dcnode-id="10220"><span data-dcnode-id="10219" instrument_node="">                   Utility controls</span><br data-dcnode-id="10218"><span data-dcnode-id="10217" instrument_node="">f                Salvage</span><br data-dcnode-id="10216"><span data-dcnode-id="10215" instrument_node="">                Hose requirements</span><br data-dcnode-id="10214"><span data-dcnode-id="10213" instrument_node="">                Water supply</span><p data-dcnode-id="10212"></p><p data-dcnode-id="10206"><span data-dcnode-id="10211" instrument_node="">   SIZE- UP</span><br data-dcnode-id="10210"><span data-dcnode-id="10209" instrument_node="">            Estimate of existing conditions (Personnel, equipment, water supply, life hazard, time of day,</span><br data-dcnode-id="10208"><span data-dcnode-id="10207" instrument_node="">            weather, type of occupancy, what is burning and the size of the fire.)</span></p><p data-dcnode-id="10200"><span data-dcnode-id="10205" instrument_node="">             The size-up commences long before the alarm sounds and continues throughout the</span><br data-dcnode-id="10204"><span data-dcnode-id="10203" instrument_node="">             duration of the emergency. For practical purposes it can be divided into 3 parts - the PRE-</span><br data-dcnode-id="10202"><span data-dcnode-id="10201" instrument_node="">             ALARM SIZE-UP, RESPONSE SIZE-UP, and the FIRE GROUND SIZE-UP.</span></p><p data-dcnode-id="10190"><span data-dcnode-id="10199" instrument_node="">    A. PRE-ALARM SIZE-UP</span><br data-dcnode-id="10198"><span data-dcnode-id="10197" instrument_node="">                    Pre-alarm size-up first manifest itself when any information on the fire building or</span><br data-dcnode-id="10196"><span data-dcnode-id="10195" instrument_node="">            its exposure that could affect operations on the fire ground is initially gathered.</span><br data-dcnode-id="10194"><span data-dcnode-id="10193" instrument_node="">                    This might have taken place on a previous response to the occupancy, however it</span><br data-dcnode-id="10192"><span data-dcnode-id="10191" instrument_node="">            generally occurs during an inspection of the building which is made prior to the fire.</span></p><p data-dcnode-id="10172"><span data-dcnode-id="10189" instrument_node="">    B. RESPONSE SIZE-UP</span><br data-dcnode-id="10188"><span data-dcnode-id="10187" instrument_node="">                   Knowing the location of the emergency will provide knowledge as to the number</span><br data-dcnode-id="10186"><span data-dcnode-id="10185" instrument_node="">            and types of companies that can be expected.</span><br data-dcnode-id="10184"><span data-dcnode-id="10183" instrument_node="">                   If the address is in a residential area, at least 2 engines companies and a truck</span><br data-dcnode-id="10182"><span data-dcnode-id="10181" instrument_node="">           companies will be received on the first alarm.</span><br data-dcnode-id="10180"><span data-dcnode-id="10179" instrument_node="">                initial info about the location</span><br data-dcnode-id="10178"><span data-dcnode-id="10177" instrument_node="">                type of occupancy</span><br data-dcnode-id="10176"><span data-dcnode-id="10175" instrument_node="">                time of day</span><br data-dcnode-id="10174"><span data-dcnode-id="10173" instrument_node="">                weather</span></p><p data-dcnode-id="10171"></p><h2 data-dcnode-id="10169"><span data-dcnode-id="10170" instrument_node="">    C. FIRE GROUND SIZE-UP</span></h2><br data-dcnode-id="10168"><span data-dcnode-id="10167" instrument_node="">                      Fire ground size-up can be divided into two distinct phases</span><br data-dcnode-id="10166"><span data-dcnode-id="10165" instrument_node="">                      Preliminary size-up is the immediate estimate of the situation made by officer in</span><br data-dcnode-id="10164"><span data-dcnode-id="10163" instrument_node="">            charge of the fire upon arrival. It form a basis for initial deployment of personnel and</span><br data-dcnode-id="10162"><span data-dcnode-id="10161" instrument_node="">            equipment and for the calling of additional help.</span><br data-dcnode-id="10160"><span data-dcnode-id="10159" instrument_node="">                      Continuous size-up is the continuous and comprehensive estimate of the situation</span><br data-dcnode-id="10158"><span data-dcnode-id="10157" instrument_node="">            as firefighting operations proceeds. Things can change rapidly at a fire, explosion, and</span><br data-dcnode-id="10156"><span data-dcnode-id="10155" instrument_node="">            backdraft or flashover can quickly change what appeared to a controlled situation into a</span><br data-dcnode-id="10154"><span data-dcnode-id="10153" instrument_node="">            nightmare.</span><p data-dcnode-id="10152"></p><p data-dcnode-id="10140"><span data-dcnode-id="10151" instrument_node="">   RESCUE</span><br data-dcnode-id="10150"><span data-dcnode-id="10149" instrument_node="">             No greater service can be given by any fire department than the saving of a human life.</span><br data-dcnode-id="10148"><span data-dcnode-id="10147" instrument_node="">             When fire or other emergency occurs, it is the duty of the fire department to be equipped</span><br data-dcnode-id="10146"><span data-dcnode-id="10145" instrument_node="">             to render quick and efficient service.</span><br data-dcnode-id="10144"><span data-dcnode-id="10143" instrument_node="">             In order to meet this responsibility, firefighters must keep rescue equipment in first-class</span><br data-dcnode-id="10142"><span data-dcnode-id="10141" instrument_node="">             condition and be thoroughly trained in the proper use and limitations of that equipment.</span></p><p data-dcnode-id="10139"></p><h2 data-dcnode-id="10137"><span data-dcnode-id="10138" instrument_node="">    Rescue Principles, Practices and Equipment</span></h2><p data-dcnode-id="10136"></p><p data-dcnode-id="10112"><span data-dcnode-id="10135" instrument_node="">                      As applied to fire fighting, rescue is the removal of humans from places involved in</span><br data-dcnode-id="10134"><span data-dcnode-id="10133" instrument_node="">             fire or other disaster. The factor of life saving or “life hazard” decides the first or immediate</span><br data-dcnode-id="10132"><span data-dcnode-id="10131" instrument_node="">             operating procedure at a fire or other emergency. Rescue is the first consideration to be</span><br data-dcnode-id="10130"><span data-dcnode-id="10129" instrument_node="">             taken on arrival at a fire. Therefore, each officer and fire fighter should thoroughly</span><br data-dcnode-id="10128"><span data-dcnode-id="10127" instrument_node="">             understand the principles governing rescue.</span><br data-dcnode-id="10126"><span data-dcnode-id="10125" instrument_node="">                      A careful search should be made when there is any chance of anyone having failed</span><br data-dcnode-id="10124"><span data-dcnode-id="10123" instrument_node="">f            to escape from the involved building.</span><br data-dcnode-id="10122"><span data-dcnode-id="10121" instrument_node="">                    It must be remembered that it only takes a small amount of heated air, smoke or</span><br data-dcnode-id="10120"><span data-dcnode-id="10119" instrument_node="">            gases to render a person unconscious.</span><br data-dcnode-id="10118"><span data-dcnode-id="10117" instrument_node="">                    In such places of public assembly as schools, churches, hospitals, dormitories,</span><br data-dcnode-id="10116"><span data-dcnode-id="10115" instrument_node="">            theaters, factories and stores, the actual fire is not the only factor causing a serious rescue</span><br data-dcnode-id="10114"><span data-dcnode-id="10113" instrument_node="">            problem.</span></p><p data-dcnode-id="10094"><span data-dcnode-id="10111" instrument_node="">                      Panic, rather than fire, has been the major cause of death in places of public</span><br data-dcnode-id="10110"><span data-dcnode-id="10109" instrument_node="">            assembly. A false shout of fire, the discovery of smoke, some incident such as an explosion,</span><br data-dcnode-id="10108"><span data-dcnode-id="10107" instrument_node="">            collapse of part of the building or any other unexpected event can cause the necessary</span><br data-dcnode-id="10106"><span data-dcnode-id="10105" instrument_node="">            spark of excitement which can cause panic.</span><br data-dcnode-id="10104"><span data-dcnode-id="10103" instrument_node="">                      The best method of panic prevention is for the assembled people to be trained to</span><br data-dcnode-id="10102"><span data-dcnode-id="10101" instrument_node="">            perform a well disciplined emergency exit drill.</span><br data-dcnode-id="10100"><span data-dcnode-id="10099" instrument_node="">                      This is the reason that systematic emergency exit drills should be conducted. Where</span><br data-dcnode-id="10098"><span data-dcnode-id="10097" instrument_node="">            it is not possible or practical to train occupants in emergency exit drills, the only safeguard</span><br data-dcnode-id="10096"><span data-dcnode-id="10095" instrument_node="">            against panic is for the building to have adequate exits which conform with the standard.</span></p><p data-dcnode-id="10080"><span data-dcnode-id="10093" instrument_node="">   EXPOSURE</span><br data-dcnode-id="10092"><span data-dcnode-id="10091" instrument_node="">          Every fire the firefighter encounters present as an exposure hazard. Exposures used in the</span><br data-dcnode-id="10090"><span data-dcnode-id="10089" instrument_node="">          fire service, means any building or material that is likely to become involve either directly or</span><br data-dcnode-id="10088"><span data-dcnode-id="10087" instrument_node="">          in directly with existing fire.</span><br data-dcnode-id="10086"><span data-dcnode-id="10085" instrument_node="">          There are two types of exposure hazard, INTERIOR and EXTERIOR.</span><br data-dcnode-id="10084"><span data-dcnode-id="10083" instrument_node="">          The study of exposure covers the works that necessary to prevent the extension of fire to</span><br data-dcnode-id="10082"><span data-dcnode-id="10081" instrument_node="">          the other parts of the involved building or other building or property.</span></p><p data-dcnode-id="10079"></p><h2 data-dcnode-id="10077"><span data-dcnode-id="10078" instrument_node="">    Ways on which heat may be transmitted:</span></h2><br data-dcnode-id="10076"><span data-dcnode-id="10075" instrument_node="">           1. DIRECT CONTACT</span><br data-dcnode-id="10074"><span data-dcnode-id="10073" instrument_node="">           2. CONDUCTION</span><br data-dcnode-id="10072"><span data-dcnode-id="10071" instrument_node="">           3. RADIATION</span><br data-dcnode-id="10070"><span data-dcnode-id="10069" instrument_node="">           4. CONVECTION</span><p data-dcnode-id="10068"></p><p data-dcnode-id="10036"><span data-dcnode-id="10067" instrument_node="">    COVERING EXPOSURES</span><br data-dcnode-id="10066"><span data-dcnode-id="10065" instrument_node="">                   The covering of exposures as it applies to fire service consists completely</span><br data-dcnode-id="10064"><span data-dcnode-id="10063" instrument_node="">          surrounding the fire with streams so that the fire will be checked at each possible avenue of</span><br data-dcnode-id="10062"><span data-dcnode-id="10061" instrument_node="">          extension.</span><br data-dcnode-id="10060"><span data-dcnode-id="10059" instrument_node="">                   A quick survey by an officer or department member usually determines at just what</span><br data-dcnode-id="10058"><span data-dcnode-id="10057" instrument_node="">          joint efforts to combat the fire have to be exerted.</span><br data-dcnode-id="10056"><span data-dcnode-id="10055" instrument_node="">                   If available, one of the most effective means of covering exposures is by the use of</span><br data-dcnode-id="10054"><span data-dcnode-id="10053" instrument_node="">          a “deck gun”.</span><br data-dcnode-id="10052"><span data-dcnode-id="10051" instrument_node="">                   It can be placed at such point as to reach either the fire building or the exposed</span><br data-dcnode-id="10050"><span data-dcnode-id="10049" instrument_node="">          building and, due to easy manipulation of its stream even under high pressure, it can be</span><br data-dcnode-id="10048"><span data-dcnode-id="10047" instrument_node="">          quickly switched from side to side as necessity demands.</span><br data-dcnode-id="10046"><span data-dcnode-id="10045" instrument_node="">                   Other methods of covering exposures within the building or adjoining building</span><br data-dcnode-id="10044"><span data-dcnode-id="10043" instrument_node="">          consist of closing doors, trap doors, and other openings by which the fire may communicate</span><br data-dcnode-id="10042"><span data-dcnode-id="10041" instrument_node="">          from one building to another or from one part of a building to another.</span><br data-dcnode-id="10040"><span data-dcnode-id="10039" instrument_node="">                   It is very necessary to see that all wall openings of adjoining buildings are properly</span><br data-dcnode-id="10038"><span data-dcnode-id="10037" instrument_node="">          protected by fire doors.</span></p><p data-dcnode-id="10008"><span data-dcnode-id="10035" instrument_node="">   CONFINEMENT</span><br data-dcnode-id="10034"><span data-dcnode-id="10033" instrument_node="">          As applied to the first service, confinement is that action which is necessary to contain the</span><br data-dcnode-id="10032"><span data-dcnode-id="10031" instrument_node="">          fire in the smallest possible area.</span><br data-dcnode-id="10030"><span data-dcnode-id="10029" instrument_node="">          Modern air-conditioning systems have introduced a new problem in confining fires. Non-</span><br data-dcnode-id="10028"><span data-dcnode-id="10027" instrument_node="">          standard systems may have ducts lined with combustible material and are not provided</span><br data-dcnode-id="10026"><span data-dcnode-id="10025" instrument_node="">          with interior automatic fire shutters.</span><br data-dcnode-id="10024"><span data-dcnode-id="10023" instrument_node="">f            Such non-standard systems may spread smoke and flames through the entire building.</span><br data-dcnode-id="10022"><span data-dcnode-id="10021" instrument_node="">                                                                                             The officer</span><br data-dcnode-id="10020"><span data-dcnode-id="10019" instrument_node="">            in charge, upon arrival of the department, should note the direction and velocity of the</span><br data-dcnode-id="10018"><span data-dcnode-id="10017" instrument_node="">            wind and then determine which is the most likely direction the fire might extend and take</span><br data-dcnode-id="10016"><span data-dcnode-id="10015" instrument_node="">            immediate action to halt the progress of the fire in that direction.</span><br data-dcnode-id="10014"><span data-dcnode-id="10013" instrument_node="">                                                                                             Action</span><br data-dcnode-id="10012"><span data-dcnode-id="10011" instrument_node="">            must be taken to prevent high tension wires and electrical equipment from catching fire,</span><br data-dcnode-id="10010"><span data-dcnode-id="10009" instrument_node="">            falling and/or endangering life and property.</span></p><p data-dcnode-id="9988"><span data-dcnode-id="10007" instrument_node="">   VENTILATION</span><br data-dcnode-id="10006"><span data-dcnode-id="10005" instrument_node="">                                                                                             The</span><br data-dcnode-id="10004"><span data-dcnode-id="10003" instrument_node="">            planned, methodical, and systematic removal of pressure, heat, smoke, gases and in some</span><br data-dcnode-id="10002"><span data-dcnode-id="10001" instrument_node="">            cases, even flame from an enclosed area through predetermined paths.</span><br data-dcnode-id="10000"><span data-dcnode-id="9999" instrument_node="">                                                                                             One way is</span><br data-dcnode-id="9998"><span data-dcnode-id="9997" instrument_node="">            by quick extinguishment of the fire for the heat generated can be transmitted to expose</span><br data-dcnode-id="9996"><span data-dcnode-id="9995" instrument_node="">            combustible material, causing the fire to spread.</span><br data-dcnode-id="9994"><span data-dcnode-id="9993" instrument_node="">            The success attained however, is dependent upon how far the fire progress, the rapidity of</span><br data-dcnode-id="9992"><span data-dcnode-id="9991" instrument_node="">            the burning, the natural barriers to prevent spread, the ability of the department and</span><br data-dcnode-id="9990"><span data-dcnode-id="9989" instrument_node="">            available equipment for quick extinguishment.</span></p><p data-dcnode-id="9976"><span data-dcnode-id="9987" instrument_node="">   EXTINGUISHMENT</span><br data-dcnode-id="9986"><span data-dcnode-id="9985" instrument_node="">          One way is by quick extinguishment of the fire for the heat generated can be transmitted to</span><br data-dcnode-id="9984"><span data-dcnode-id="9983" instrument_node="">          expose combustible material, causing the fire to spread.</span><br data-dcnode-id="9982"><span data-dcnode-id="9981" instrument_node="">          The success attained however, is dependent upon how far the fire progress, the rapidity of</span><br data-dcnode-id="9980"><span data-dcnode-id="9979" instrument_node="">          the burning, the natural barriers to prevent spread, the ability of the department and</span><br data-dcnode-id="9978"><span data-dcnode-id="9977" instrument_node="">          available equipment for quick extinguishment.</span></p><p data-dcnode-id="9970"><span data-dcnode-id="9975" instrument_node="">   SALVAGE</span><br data-dcnode-id="9974"><span data-dcnode-id="9973" instrument_node="">          It is the process of applying techniques that minimize damage to contents and structure</span><br data-dcnode-id="9972"><span data-dcnode-id="9971" instrument_node="">          during and after fire suppression.</span></p><p data-dcnode-id="9969"></p><h2 data-dcnode-id="9967"><span data-dcnode-id="9968" instrument_node="">                   Two (2) Benefits:</span></h2><br data-dcnode-id="9966"><span data-dcnode-id="9965" instrument_node="">            1. There would be a considerable reduction in the fire loss.</span><br data-dcnode-id="9964"><span data-dcnode-id="9963" instrument_node="">            2. The public relations of the department would be enhance.</span><p data-dcnode-id="9962"></p><p data-dcnode-id="9961"></p><h2 data-dcnode-id="9959"><span data-dcnode-id="9960" instrument_node="">            Salvage Company Operations:</span></h2><br data-dcnode-id="9958"><span data-dcnode-id="9957" instrument_node="">                 spreading covers</span><br data-dcnode-id="9956"><span data-dcnode-id="9955" instrument_node="">                 bagging</span><br data-dcnode-id="9954"><span data-dcnode-id="9953" instrument_node="">                 diverting and removing water</span><p data-dcnode-id="9952"></p><p data-dcnode-id="9942"><span data-dcnode-id="9951" instrument_node="">   OVERHAUL</span><br data-dcnode-id="9950"><span data-dcnode-id="9949" instrument_node="">          Overhaul is the final task performed by firefighter at the fire scene.</span><br data-dcnode-id="9948"><span data-dcnode-id="9947" instrument_node="">          Although the primary objective of overhaul is to ensure that the fire is out, it generally</span><br data-dcnode-id="9946"><span data-dcnode-id="9945" instrument_node="">          includes doing whatever is necessary to leave the premises in as safe and secure as</span><br data-dcnode-id="9944"><span data-dcnode-id="9943" instrument_node="">          possible.</span></p><p data-dcnode-id="9941"></p><h2 data-dcnode-id="9939"><span data-dcnode-id="9940" instrument_node="">   POST FIRE ANALYSIS</span></h2><br data-dcnode-id="9938"><span data-dcnode-id="9937" instrument_node="">           Assisting the fire investigator is a skill that should be second to all firefighters. The gathering</span><br data-dcnode-id="9936"><span data-dcnode-id="9935" instrument_node="">           of information from the time of dispatch throughout the incident should become</span><br data-dcnode-id="9934"><span data-dcnode-id="9933" instrument_node="">           automatic. Every little detail should be noted and passed along to the investigator.</span><br data-dcnode-id="9932"><span data-dcnode-id="9931" instrument_node="">f                 Fire investigators are just another part of the team that is attempting to make this strategy</span><br data-dcnode-id="9930"><span data-dcnode-id="9929" instrument_node="">                 for the owner as tolerable as possible. Determining the cause and origin of the incident is</span><br data-dcnode-id="9928"><span data-dcnode-id="9927" instrument_node="">                 every firefighter’s duty and, like all of the other things we do to control an incident, a very</span><br data-dcnode-id="9926"><span data-dcnode-id="9925" instrument_node="">                 important factor.</span><br data-dcnode-id="9924"><span data-dcnode-id="9923" instrument_node="">                 Firefighters always want to assist and not hinder an investigation or criminal prosecution.</span><br data-dcnode-id="9922"><span data-dcnode-id="9921" instrument_node="">                 Firefighters have an obligation to make sure that the building is secured after they have</span><br data-dcnode-id="9920"><span data-dcnode-id="9919" instrument_node="">                 completed all of their operations.</span><p data-dcnode-id="9918"></p><p data-dcnode-id="9917"></p><h2 data-dcnode-id="9915"><span data-dcnode-id="9916" instrument_node="">Tools and Equipment and Apparatus</span></h2><p data-dcnode-id="9914"></p><p data-dcnode-id="9888"><span data-dcnode-id="9913" instrument_node="">Fire Apparatus - Any fire department emergency vehicles that participate in fire suppression or other</span><br data-dcnode-id="9912"><span data-dcnode-id="9911" instrument_node="">emergency situation</span><br data-dcnode-id="9910"><span data-dcnode-id="9909" instrument_node="">Hose - A fire hose is a high-pressure hose used to carry water or other fire retardant (such as foam) to a fire</span><br data-dcnode-id="9908"><span data-dcnode-id="9907" instrument_node="">to extinguish it.</span><br data-dcnode-id="9906"><span data-dcnode-id="9905" instrument_node="">Nozzle - A nozzle is a device designed to control the direction or characteristics of a fluid flow (especially to</span><br data-dcnode-id="9904"><span data-dcnode-id="9903" instrument_node="">increase velocity) as it exits (or enters) an enclosed chamber or pipe.</span><br data-dcnode-id="9902"><span data-dcnode-id="9901" instrument_node="">Forcible Entry Devices - Devices used to gain entry to secured areas and buildings at fires and other</span><br data-dcnode-id="9900"><span data-dcnode-id="9899" instrument_node="">emergencies</span><br data-dcnode-id="9898"><span data-dcnode-id="9897" instrument_node="">      Striking tools</span><br data-dcnode-id="9896"><span data-dcnode-id="9895" instrument_node="">      Prying tools</span><br data-dcnode-id="9894"><span data-dcnode-id="9893" instrument_node="">      Pushing/Pulling tools</span><br data-dcnode-id="9892"><span data-dcnode-id="9891" instrument_node="">      Cutting tools</span><br data-dcnode-id="9890"><span data-dcnode-id="9889" instrument_node="">      Through-the-lock</span></p><p data-dcnode-id="9748"><span data-dcnode-id="9887" instrument_node="">Striking Tools - Used to deliver impact to other tools in order to drive it into place</span><br data-dcnode-id="9886"><span data-dcnode-id="9885" instrument_node="">Can also be used to deliver impact directly to and break the door or lock to be forced</span><br data-dcnode-id="9884"><span data-dcnode-id="9883" instrument_node="">      Sledgehammer</span><br data-dcnode-id="9882"><span data-dcnode-id="9881" instrument_node="">      Maul</span><br data-dcnode-id="9880"><span data-dcnode-id="9879" instrument_node="">      Ball hammer</span><br data-dcnode-id="9878"><span data-dcnode-id="9877" instrument_node="">      Punches</span><br data-dcnode-id="9876"><span data-dcnode-id="9875" instrument_node="">      Pick head axe</span><br data-dcnode-id="9874"><span data-dcnode-id="9873" instrument_node="">      Flat head axe</span><br data-dcnode-id="9872"><span data-dcnode-id="9871" instrument_node="">      Battering ram</span><br data-dcnode-id="9870"><span data-dcnode-id="9869" instrument_node="">Prying Tools - Used to spread apart a door from ts jamb, move objects, or expose a locking device</span><br data-dcnode-id="9868"><span data-dcnode-id="9867" instrument_node="">      Crow bar</span><br data-dcnode-id="9866"><span data-dcnode-id="9865" instrument_node="">      Flat bar</span><br data-dcnode-id="9864"><span data-dcnode-id="9863" instrument_node="">      Pry bar</span><br data-dcnode-id="9862"><span data-dcnode-id="9861" instrument_node="">      Halligan tool</span><br data-dcnode-id="9860"><span data-dcnode-id="9859" instrument_node="">      Claw tool</span><br data-dcnode-id="9858"><span data-dcnode-id="9857" instrument_node="">      Pry axe</span><br data-dcnode-id="9856"><span data-dcnode-id="9855" instrument_node="">      Hydraulic door opener</span><br data-dcnode-id="9854"><span data-dcnode-id="9853" instrument_node="">Pushing/Pulling Tools - Used to open up walls and ceilings, to vent windows, and to pull up roof boards or</span><br data-dcnode-id="9852"><span data-dcnode-id="9851" instrument_node="">other building materials</span><br data-dcnode-id="9850"><span data-dcnode-id="9849" instrument_node="">      Pike pole</span><br data-dcnode-id="9848"><span data-dcnode-id="9847" instrument_node="">      Plastic hook</span><br data-dcnode-id="9846"><span data-dcnode-id="9845" instrument_node="">      Clemens hook</span><br data-dcnode-id="9844"><span data-dcnode-id="9843" instrument_node="">      Drywall hook</span><br data-dcnode-id="9842"><span data-dcnode-id="9841" instrument_node="">f      San Francisco hook</span><br data-dcnode-id="9840"><span data-dcnode-id="9839" instrument_node="">      Roofman's hook</span><br data-dcnode-id="9838"><span data-dcnode-id="9837" instrument_node="">Cutting tools - Used to cut away materials and expose the locking device or cut through a door or wall to</span><br data-dcnode-id="9836"><span data-dcnode-id="9835" instrument_node="">accomplish forcible entry</span><br data-dcnode-id="9834"><span data-dcnode-id="9833" instrument_node="">      Rotary saw</span><br data-dcnode-id="9832"><span data-dcnode-id="9831" instrument_node="">      Ventilation saw</span><br data-dcnode-id="9830"><span data-dcnode-id="9829" instrument_node="">      Chain saw</span><br data-dcnode-id="9828"><span data-dcnode-id="9827" instrument_node="">      Reciprocating saw</span><br data-dcnode-id="9826"><span data-dcnode-id="9825" instrument_node="">      Carpenter's handsaw</span><br data-dcnode-id="9824"><span data-dcnode-id="9823" instrument_node="">      Keyhole saw</span><br data-dcnode-id="9822"><span data-dcnode-id="9821" instrument_node="">      Hacksaw</span><br data-dcnode-id="9820"><span data-dcnode-id="9819" instrument_node="">      Coping saw</span><br data-dcnode-id="9818"><span data-dcnode-id="9817" instrument_node="">      Through-the-lock</span><br data-dcnode-id="9816"><span data-dcnode-id="9815" instrument_node="">The “K-tool”is designed to pull out lock cylinders and expose the mechanism in order to open the lock with</span><br data-dcnode-id="9814"><span data-dcnode-id="9813" instrument_node="">the various key tools</span><br data-dcnode-id="9812"><span data-dcnode-id="9811" instrument_node="">      K-tool</span><br data-dcnode-id="9810"><span data-dcnode-id="9809" instrument_node="">      A-tool</span><br data-dcnode-id="9808"><span data-dcnode-id="9807" instrument_node="">      Bam-bam tool</span><br data-dcnode-id="9806"><span data-dcnode-id="9805" instrument_node="">      Hammer headed pick</span><br data-dcnode-id="9804"><span data-dcnode-id="9803" instrument_node="">      Locking pliers and chain</span><br data-dcnode-id="9802"><span data-dcnode-id="9801" instrument_node="">      Hockey puck lock breaker</span><br data-dcnode-id="9800"><span data-dcnode-id="9799" instrument_node="">      Duck-billed lock breaker</span><br data-dcnode-id="9798"><span data-dcnode-id="9797" instrument_node="">Head Protection (HELMET) - Prevents the head from impact and puncture injuries as well as from scalding</span><br data-dcnode-id="9796"><span data-dcnode-id="9795" instrument_node="">water</span><br data-dcnode-id="9794"><span data-dcnode-id="9793" instrument_node="">Eye Protection - Protects the wearer's eyes from flying solid particles or liquids</span><br data-dcnode-id="9792"><span data-dcnode-id="9791" instrument_node="">Hearing Protection - Limits noise-induced damage to the fire fighter's ears when loud situations cannot be</span><br data-dcnode-id="9790"><span data-dcnode-id="9789" instrument_node="">avoided</span><br data-dcnode-id="9788"><span data-dcnode-id="9787" instrument_node="">Protective hoods - Provides protection of the fire fighter's neck, ears and face but not covered by healmet</span><br data-dcnode-id="9786"><span data-dcnode-id="9785" instrument_node="">or coat from exposure to extreme heat</span><br data-dcnode-id="9784"><span data-dcnode-id="9783" instrument_node="">Protective Coats and Trousers - Used to protect the upper and lower extremities against cuts, abrasions, and</span><br data-dcnode-id="9782"><span data-dcnode-id="9781" instrument_node="">burn injuries resulting from radiant heat and provide limited protection against corrosive liquids</span><br data-dcnode-id="9780"><span data-dcnode-id="9779" instrument_node="">Feet Protection - Protect the feet from burn injuries and puncture wounds (Safety shoes and boots)</span><br data-dcnode-id="9778"><span data-dcnode-id="9777" instrument_node="">Hand Protection - Protects the hands from cuts, abrasions, wounds, and burn injuries</span><br data-dcnode-id="9776"><span data-dcnode-id="9775" instrument_node="">Must have enough dexterity (handiness) for proper fit to the wearer</span><br data-dcnode-id="9774"><span data-dcnode-id="9773" instrument_node="">Personal Alert Safety System - Provides life-safety protection by emitting a loud shriek if the firefighter</span><br data-dcnode-id="9772"><span data-dcnode-id="9771" instrument_node="">should collapse or remain motionless for approximately 30 seconds (PAD-Personal Alert Device)</span><br data-dcnode-id="9770"><span data-dcnode-id="9769" instrument_node="">Personal Escape Safety Kit/System - Provides life-safety protection for the firefighter for fast, reliable means</span><br data-dcnode-id="9768"><span data-dcnode-id="9767" instrument_node="">of egress from a burning multi storey structure</span><br data-dcnode-id="9766"><span data-dcnode-id="9765" instrument_node="">Self-Contained Breathing Apparatus (SCBA) - Protects the face and lungs from toxic smoke and gases, and</span><br data-dcnode-id="9764"><span data-dcnode-id="9763" instrument_node="">other products of combustion</span><br data-dcnode-id="9762"><span data-dcnode-id="9761" instrument_node="">Portable Fire Extinguisher - Is a device within its chemical, fluids, and gases for extinguishing and used for</span><br data-dcnode-id="9760"><span data-dcnode-id="9759" instrument_node="">small area of fire</span><br data-dcnode-id="9758"><span data-dcnode-id="9757" instrument_node="">Operating the Fire Extinguisher</span><br data-dcnode-id="9756"><span data-dcnode-id="9755" instrument_node="">P – Pull the pin</span><br data-dcnode-id="9754"><span data-dcnode-id="9753" instrument_node="">A – Aim to the base of fire</span><br data-dcnode-id="9752"><span data-dcnode-id="9751" instrument_node="">S – Squeeze the operating lever</span><br data-dcnode-id="9750"><span data-dcnode-id="9749" instrument_node="">S – Sway side to side</span></p><p data-dcnode-id="9747"></p><h2 data-dcnode-id="9745"><span data-dcnode-id="9746" instrument_node="">        Fire Safety and Prevention (20%)</span></h2><br data-dcnode-id="9744"><span data-dcnode-id="9743" instrument_node="">Fire Code of the Philippines</span><p data-dcnode-id="9742"></p><p data-dcnode-id="9741"></p><h2 data-dcnode-id="9739"><span data-dcnode-id="9740" instrument_node="">Republic Act No. 9514</span></h2><br data-dcnode-id="9738"><span data-dcnode-id="9737" instrument_node="">(Approved by PGMA on December 19, 2008)</span><br data-dcnode-id="9736"><span data-dcnode-id="9735" instrument_node="">fAN ACT ESTABLISHING A COMPREHENSIVE FIRE CODE OF THE PHILIPPINES, REPEALING PRESIDENTIAL</span><br data-dcnode-id="9734"><span data-dcnode-id="9733" instrument_node="">DECREE NO. 1185 AND FOR OTHER PURPOSES</span><br data-dcnode-id="9732"><span data-dcnode-id="9731" instrument_node="">    "Revised Fire Code of the Philippines of 2008".</span><p data-dcnode-id="9730"></p><p data-dcnode-id="9518"><span data-dcnode-id="9729" instrument_node="">Definition of Terms</span><br data-dcnode-id="9728"><span data-dcnode-id="9727" instrument_node="">Abatement - Any act that would remove or neutralize a fire hazard.</span><br data-dcnode-id="9726"><span data-dcnode-id="9725" instrument_node="">Administrator - Any person who acts as agent of the owner and manages the use of a building for him.</span><br data-dcnode-id="9724"><span data-dcnode-id="9723" instrument_node="">Blasting Agent - Any material or mixture consisting of a fuel and oxidizer used to set off explosives.</span><br data-dcnode-id="9722"><span data-dcnode-id="9721" instrument_node="">Cellulose Nitrate or Nitro Cellulose - A highly combustible and explosive compound produced by the</span><br data-dcnode-id="9720"><span data-dcnode-id="9719" instrument_node="">reaction of nitric acid with a cellulose material.</span><br data-dcnode-id="9718"><span data-dcnode-id="9717" instrument_node="">Cellulose Nitrate Plastic (Pyroxylin) - Any plastic substance, materials or compound having cellulose nitrate</span><br data-dcnode-id="9716"><span data-dcnode-id="9715" instrument_node="">(nitro cellulose) as base.</span><br data-dcnode-id="9714"><span data-dcnode-id="9713" instrument_node="">Combustible, Flammable or Inflammable - Descriptive of materials that are easily set on fire.</span><br data-dcnode-id="9712"><span data-dcnode-id="9711" instrument_node="">Combustible Fiber - Any readily ignitable and free burning fiber such as cotton, oakum, rags, waste cloth,</span><br data-dcnode-id="9710"><span data-dcnode-id="9709" instrument_node="">waste paper, kapok, hay, straw, Spanish moss, excelsior and other similar materials commonly used in</span><br data-dcnode-id="9708"><span data-dcnode-id="9707" instrument_node="">commerce.</span><br data-dcnode-id="9706"><span data-dcnode-id="9705" instrument_node="">Combustible Liquid - Any liquid having a flash point at or above 37.8_C (100_F).</span><br data-dcnode-id="9704"><span data-dcnode-id="9703" instrument_node="">Corrosive Liquid - Any liquid which causes fire when in contact with organic matter or with certain</span><br data-dcnode-id="9702"><span data-dcnode-id="9701" instrument_node="">chemicals.</span><br data-dcnode-id="9700"><span data-dcnode-id="9699" instrument_node="">Curtain Board - A vertical panel of non-combustible or fire resistive materials attached to and extending</span><br data-dcnode-id="9698"><span data-dcnode-id="9697" instrument_node="">below the bottom chord of the roof trusses, to divide the underside of the roof into separate compartments</span><br data-dcnode-id="9696"><span data-dcnode-id="9695" instrument_node="">so that heat and smoke will be directed upwards to a roof vent.</span><br data-dcnode-id="9694"><span data-dcnode-id="9693" instrument_node="">Cryogenic - Descriptive of any material which by its nature or as a result of its reaction with other elements</span><br data-dcnode-id="9692"><span data-dcnode-id="9691" instrument_node="">produces a rapid drop in temperature of the immediate surroundings.</span><br data-dcnode-id="9690"><span data-dcnode-id="9689" instrument_node="">Damper - A normally open device installed inside an air duct system which automatically closes to restrict</span><br data-dcnode-id="9688"><span data-dcnode-id="9687" instrument_node="">the passage of smoke or fire.</span><br data-dcnode-id="9686"><span data-dcnode-id="9685" instrument_node="">Distillation - The process of first raising the temperature in separate the more volatile from the less volatile</span><br data-dcnode-id="9684"><span data-dcnode-id="9683" instrument_node="">parts and then cooling and condensing the resulting vapor so as to produce a nearly purified substance.</span><br data-dcnode-id="9682"><span data-dcnode-id="9681" instrument_node="">Duct System - A continuous passageway for the transmission of air.</span><br data-dcnode-id="9680"><span data-dcnode-id="9679" instrument_node="">Dust - A finely powdered substance which, when mixed with air in the proper proportion and ignited will</span><br data-dcnode-id="9678"><span data-dcnode-id="9677" instrument_node="">cause an explosion.</span><br data-dcnode-id="9676"><span data-dcnode-id="9675" instrument_node="">Electrical Arc - An extremely hot luminous bridge formed by passage of an electric current across a space</span><br data-dcnode-id="9674"><span data-dcnode-id="9673" instrument_node="">between two conductors or terminals due to the incandescence of the conducting vapor.</span><br data-dcnode-id="9672"><span data-dcnode-id="9671" instrument_node="">Ember - A hot piece or lump that remains after a material has partially burned, and is still oxidizing without</span><br data-dcnode-id="9670"><span data-dcnode-id="9669" instrument_node="">the manifestation of flames.</span><br data-dcnode-id="9668"><span data-dcnode-id="9667" instrument_node="">Finishes - Materials used as final coating of a surface for ornamental or protective purposes.</span><br data-dcnode-id="9666"><span data-dcnode-id="9665" instrument_node="">Fire - The active principle of burning, characterized by the heat and light of combustion.</span><br data-dcnode-id="9664"><span data-dcnode-id="9663" instrument_node="">Fire Trap - A building unsafe in case of fire because it will burn easily or because it lacks adequate exits or</span><br data-dcnode-id="9662"><span data-dcnode-id="9661" instrument_node="">fire escapes.</span><br data-dcnode-id="9660"><span data-dcnode-id="9659" instrument_node="">Fire Alarm - Any visual or audible signal produced by a device or system to warn the occupants of the</span><br data-dcnode-id="9658"><span data-dcnode-id="9657" instrument_node="">building or fire fighting elements of the presence or danger of fire to enable them to undertake immediate</span><br data-dcnode-id="9656"><span data-dcnode-id="9655" instrument_node="">action to save life and property and to suppress the fire.</span><br data-dcnode-id="9654"><span data-dcnode-id="9653" instrument_node="">Fire Door - A fire resistive door prescribed for openings in fire separation walls or partitions.</span><br data-dcnode-id="9652"><span data-dcnode-id="9651" instrument_node="">Fire Hazard - Any condition or act which increases or may cause an increase in the probability of the</span><br data-dcnode-id="9650"><span data-dcnode-id="9649" instrument_node="">occurrence of fire, or which may obstruct, delay, hinder or interfere with fire fighting operations and the</span><br data-dcnode-id="9648"><span data-dcnode-id="9647" instrument_node="">safeguarding of life and property.</span><br data-dcnode-id="9646"><span data-dcnode-id="9645" instrument_node="">Fire Lane - The portion of a roadway or publicway that should be kept opened and unobstructed at all times</span><br data-dcnode-id="9644"><span data-dcnode-id="9643" instrument_node="">for the expedient operation of fire fighting units.</span><br data-dcnode-id="9642"><span data-dcnode-id="9641" instrument_node="">Fire Protective and Fire Safety Device - Any device intended for the protection of buildings or persons to</span><br data-dcnode-id="9640"><span data-dcnode-id="9639" instrument_node="">include but not limited to built-in protection system such as sprinklers and other automatic extinguishing</span><br data-dcnode-id="9638"><span data-dcnode-id="9637" instrument_node="">system, detectors for heat, smoke and combustion products and other warning system components,</span><br data-dcnode-id="9636"><span data-dcnode-id="9635" instrument_node="">personal protective equipment such as fire blankets, helmets, fire suits, gloves and other garments that may</span><br data-dcnode-id="9634"><span data-dcnode-id="9633" instrument_node="">be put on or worn by persons to protect themselves during fire.</span><br data-dcnode-id="9632"><span data-dcnode-id="9631" instrument_node="">Fire Safety Constructions - Refers to design and installation of walls, barriers, doors, windows, vents, means</span><br data-dcnode-id="9630"><span data-dcnode-id="9629" instrument_node="">fof egress, etc. integral to and incorporated into a building or structure in order to minimize danger to life</span><br data-dcnode-id="9628"><span data-dcnode-id="9627" instrument_node="">from fire, smoke, fumes or panic before the building is evacuated. These features are also designed to</span><br data-dcnode-id="9626"><span data-dcnode-id="9625" instrument_node="">achieve, among others, safe and rapid evacuation of people through means of egress sealed from smoke or</span><br data-dcnode-id="9624"><span data-dcnode-id="9623" instrument_node="">fire, the confinement of fire or smoke in the room or floor of origin and delay their spread to other parts of</span><br data-dcnode-id="9622"><span data-dcnode-id="9621" instrument_node="">the building by means of smoke sealed and fire resistant doors, walls and floors. It shall also mean to</span><br data-dcnode-id="9620"><span data-dcnode-id="9619" instrument_node="">include the treatment of buildings components or contents with flame</span><br data-dcnode-id="9618"><span data-dcnode-id="9617" instrument_node="">retardant chemicals.</span><br data-dcnode-id="9616"><span data-dcnode-id="9615" instrument_node="">Flash Point - The minimum temperature at which any material gives off vapor in sufficient concentration to</span><br data-dcnode-id="9614"><span data-dcnode-id="9613" instrument_node="">form an ignitable mixture with air.</span><br data-dcnode-id="9612"><span data-dcnode-id="9611" instrument_node="">Forcing - A process where a piece of metal is heated prior to changing its shape or dimensions.</span><br data-dcnode-id="9610"><span data-dcnode-id="9609" instrument_node="">Fulminate - A kind of stable explosive compound which explodes by percussion.</span><br data-dcnode-id="9608"><span data-dcnode-id="9607" instrument_node="">Hazardous Operation/ Process - Any act of manufacturing, fabrication, conversion, etc., that uses or</span><br data-dcnode-id="9606"><span data-dcnode-id="9605" instrument_node="">produces materials which are likely to cause fires or explosions.</span><br data-dcnode-id="9604"><span data-dcnode-id="9603" instrument_node="">Horizontal Exit - Passageway from one building to another or through or around a wall in approximately the</span><br data-dcnode-id="9602"><span data-dcnode-id="9601" instrument_node="">same floor level.</span><br data-dcnode-id="9600"><span data-dcnode-id="9599" instrument_node="">Hose Box - A box or cabinet where fire hoses, valves and other equipment are stored and arranged for fire</span><br data-dcnode-id="9598"><span data-dcnode-id="9597" instrument_node="">fighting.</span><br data-dcnode-id="9596"><span data-dcnode-id="9595" instrument_node="">Hose Reel - A cylindrical device turning on an axis around which a fire hose is wound and connected.</span><br data-dcnode-id="9594"><span data-dcnode-id="9593" instrument_node="">Hypergolic Fuel - A rocket or liquid propellant which consist of combinations of fuels and oxidizers which</span><br data-dcnode-id="9592"><span data-dcnode-id="9591" instrument_node="">ignite spontaneously on contact with each other.</span><br data-dcnode-id="9590"><span data-dcnode-id="9589" instrument_node="">Industrial Baking and Drying - The industrial process of subjecting materials to heat for the</span><br data-dcnode-id="9588"><span data-dcnode-id="9587" instrument_node="">purpose of removing solvents or moisture from the same, and/or to fuse certain chemical salts to form a</span><br data-dcnode-id="9586"><span data-dcnode-id="9585" instrument_node="">uniform glazing the surface of materials being treated.</span><br data-dcnode-id="9584"><span data-dcnode-id="9583" instrument_node="">Jumper - A piece of metal or an electrical conductor used to bypass a safety device in an electrical system.</span><br data-dcnode-id="9582"><span data-dcnode-id="9581" instrument_node="">Occupancy - The purpose for which a building or portion thereof is used or intended to be used.</span><br data-dcnode-id="9580"><span data-dcnode-id="9579" instrument_node="">Occupant - Any person actually occupying and using a building or portions thereof by virtue of a lease</span><br data-dcnode-id="9578"><span data-dcnode-id="9577" instrument_node="">contract with the owner or administrator or by permission or sufferance of the latter.</span><br data-dcnode-id="9576"><span data-dcnode-id="9575" instrument_node="">Organic Peroxide - A strong oxidizing organic compound which releases oxygen readily. It causes fire when in</span><br data-dcnode-id="9574"><span data-dcnode-id="9573" instrument_node="">contact with combustible materials especially under conditions of high temperature.</span><br data-dcnode-id="9572"><span data-dcnode-id="9571" instrument_node="">Overloading - The use of one or more electrical appliances or devices which draw or consume electrical</span><br data-dcnode-id="9570"><span data-dcnode-id="9569" instrument_node="">current beyond the designed capacity of the existing electrical system.</span><br data-dcnode-id="9568"><span data-dcnode-id="9567" instrument_node="">Owner - The person who holds the legal right of possession or title to a building or real property.</span><br data-dcnode-id="9566"><span data-dcnode-id="9565" instrument_node="">Oxidizing Material - A material that readily yields oxygen in quantities sufficient to stimulate or support</span><br data-dcnode-id="9564"><span data-dcnode-id="9563" instrument_node="">combustion.</span><br data-dcnode-id="9562"><span data-dcnode-id="9561" instrument_node="">Pressurized Or Forced Draft Burning Equipment - Type or burner where the fuel is subjected to pressure</span><br data-dcnode-id="9560"><span data-dcnode-id="9559" instrument_node="">prior to discharge into the combustion chamber and/or which includes fans or other provisions for the</span><br data-dcnode-id="9558"><span data-dcnode-id="9557" instrument_node="">introduction of air at above normal atmosphere pressure into the same combustion chamber.</span><br data-dcnode-id="9556"><span data-dcnode-id="9555" instrument_node="">Public Assembly Building - Any building or structure where fifty (50) or more people</span><br data-dcnode-id="9554"><span data-dcnode-id="9553" instrument_node="">congregate, gather, or assemble for any purpose.</span><br data-dcnode-id="9552"><span data-dcnode-id="9551" instrument_node="">Public Way - Any street, alley or other strip of land unobstructed from the ground to the sky, deeded,</span><br data-dcnode-id="9550"><span data-dcnode-id="9549" instrument_node="">dedicated or otherwise permanently appropriated for public use.</span><br data-dcnode-id="9548"><span data-dcnode-id="9547" instrument_node="">Pyrophoric - Descriptive of any substance that ignites spontaneously when exposed to air.</span><br data-dcnode-id="9546"><span data-dcnode-id="9545" instrument_node="">Refining - A process where impurities and/or deleterious materials are removed from a mixture in order to</span><br data-dcnode-id="9544"><span data-dcnode-id="9543" instrument_node="">produce a pure element of compound. It shall also refer to partial distillation and electrolysis.</span><br data-dcnode-id="9542"><span data-dcnode-id="9541" instrument_node="">Self-Closing Doors - Automatic closing doors that are designed to confine smoke and heat and delay the</span><br data-dcnode-id="9540"><span data-dcnode-id="9539" instrument_node="">spread of fire.</span><br data-dcnode-id="9538"><span data-dcnode-id="9537" instrument_node="">Smelting - Melting or fusing of metallic ores or compounds so as to separate impurities from pure metals.</span><br data-dcnode-id="9536"><span data-dcnode-id="9535" instrument_node="">Sprinkler System - An integrated network of hydraulically designed piping installed in a building, structure or</span><br data-dcnode-id="9534"><span data-dcnode-id="9533" instrument_node="">area with outlets arranged in a systematic pattern which automatically discharges water when activated by</span><br data-dcnode-id="9532"><span data-dcnode-id="9531" instrument_node="">heat or combustion products from a fire.</span><br data-dcnode-id="9530"><span data-dcnode-id="9529" instrument_node="">Standpipe System - A system of vertical pipes in a building to which fire hoses can be attached on each floor,</span><br data-dcnode-id="9528"><span data-dcnode-id="9527" instrument_node="">including a system by which water is made available to the outlets as needed.</span><br data-dcnode-id="9526"><span data-dcnode-id="9525" instrument_node="">Vestibule - A passage hall or antechamber between the outer doors and the interior parts of a house or</span><br data-dcnode-id="9524"><span data-dcnode-id="9523" instrument_node="">building.</span><br data-dcnode-id="9522"><span data-dcnode-id="9521" instrument_node="">fVertical Shaft - An enclosed vertical space of passage that extends from floor to floor, as well as from the</span><br data-dcnode-id="9520"><span data-dcnode-id="9519" instrument_node="">base to the top of the building.</span></p><p data-dcnode-id="9517"></p><h2 data-dcnode-id="9515"><span data-dcnode-id="9516" instrument_node="">Responsibility for the Enforcement of this Code.</span></h2><br data-dcnode-id="9514"><span data-dcnode-id="9513" instrument_node="">a. Issue implementing rules and regulations, and prescribe standards, schedules of fees/fire service charges</span><br data-dcnode-id="9512"><span data-dcnode-id="9511" instrument_node="">and administrative penalties therefore as provided in the pertinent provisions of this Code;</span><p data-dcnode-id="9510"></p><p data-dcnode-id="9509"></p><h2 data-dcnode-id="9507"><span data-dcnode-id="9508" instrument_node="">b. Reorganize the BFP as may be necessary and appropriate;</span></h2><p data-dcnode-id="9506"></p><p data-dcnode-id="9486"><span data-dcnode-id="9505" instrument_node="">c. Support and assist fire volunteers, practitioners and fire volunteer organizations in the country who shall</span><br data-dcnode-id="9504"><span data-dcnode-id="9503" instrument_node="">undergo mandatory fire suppression, inspection, rescue, emergency medical services and related</span><br data-dcnode-id="9502"><span data-dcnode-id="9501" instrument_node="">emergency response trainings and competency evaluations to be conducted by the BFP. In the case of the</span><br data-dcnode-id="9500"><span data-dcnode-id="9499" instrument_node="">Fire practitiones, they shall undergo mandatory continuous professional education and competency</span><br data-dcnode-id="9498"><span data-dcnode-id="9497" instrument_node="">evaluation of their expertise, knowledge and skills in the area of fire science, engineering and technology to</span><br data-dcnode-id="9496"><span data-dcnode-id="9495" instrument_node="">be conducted by the BFP; The BFP may enter into external party agreements for the conduct of training,</span><br data-dcnode-id="9494"><span data-dcnode-id="9493" instrument_node="">education and evaluation of fire volunteers, practitioners and fire volunteer organizations, which shall be</span><br data-dcnode-id="9492"><span data-dcnode-id="9491" instrument_node="">under the full control and supervision of the BFP: Provided, however, That during firefighting operations,</span><br data-dcnode-id="9490"><span data-dcnode-id="9489" instrument_node="">fire volunteer organizations shall be under the direct operational control of the fire ground commanders of</span><br data-dcnode-id="9488"><span data-dcnode-id="9487" instrument_node="">the BFP;</span></p><p data-dcnode-id="9476"><span data-dcnode-id="9485" instrument_node="">d. Enter into long term agreement, either through public biddings or negotiations in accordance with the</span><br data-dcnode-id="9484"><span data-dcnode-id="9483" instrument_node="">provisions of Republic Act No. 9184, otherwise known as the Government Procurement Reform Act of 2003,</span><br data-dcnode-id="9482"><span data-dcnode-id="9481" instrument_node="">for the acquisition of fire prevention, fire protection and fire fighting investigation, rescue, paramedics,</span><br data-dcnode-id="9480"><span data-dcnode-id="9479" instrument_node="">hazardous material handling equipment, supplies, materials and related technical services necessary for the</span><br data-dcnode-id="9478"><span data-dcnode-id="9477" instrument_node="">fire services;</span></p><p data-dcnode-id="9468"><span data-dcnode-id="9475" instrument_node="">e. Enter into Memoranda of Agreement with other departments, bureaus, agencies, offices and</span><br data-dcnode-id="9474"><span data-dcnode-id="9473" instrument_node="">corporations of the government, as well as private institutions, in order to define areas of cooperation and</span><br data-dcnode-id="9472"><span data-dcnode-id="9471" instrument_node="">coordination and delineate responsibility on fire prevention education, fire safety, fire prevention, fire</span><br data-dcnode-id="9470"><span data-dcnode-id="9469" instrument_node="">suppression and other matters of common concern;</span></p><p data-dcnode-id="9464"><span data-dcnode-id="9467" instrument_node="">f. Call on the police, other law enforcement agencies, and local government assistance to render necessary</span><br data-dcnode-id="9466"><span data-dcnode-id="9465" instrument_node="">assistance in the enforcement of this Code;</span></p><p data-dcnode-id="9454"><span data-dcnode-id="9463" instrument_node="">g. Designate a fire safety inspector through his/her duly authorized representative, who shall conduct an</span><br data-dcnode-id="9462"><span data-dcnode-id="9461" instrument_node="">inspection of every building or structure within his area of responsibility at least once a year and every time</span><br data-dcnode-id="9460"><span data-dcnode-id="9459" instrument_node="">the owner, administrator or occupant shall renew his/her business permit or permit to operate; No</span><br data-dcnode-id="9458"><span data-dcnode-id="9457" instrument_node="">occupancy permit, business or permit to operate shall be issued without securing a Fire Safety Inspection</span><br data-dcnode-id="9456"><span data-dcnode-id="9455" instrument_node="">Certification (FSIC) from the Chief, BFP, or his/her duly authorized representative;</span></p><p data-dcnode-id="9442"><span data-dcnode-id="9453" instrument_node="">h. Inspect at reasonable time, any building, structure, installation or premises for dangerous or hazardous</span><br data-dcnode-id="9452"><span data-dcnode-id="9451" instrument_node="">conditions or materials as set forth in this Code, provided that in case of single family dwelling, an</span><br data-dcnode-id="9450"><span data-dcnode-id="9449" instrument_node="">inspection must be upon the consent of the occupant or upon lawful order from the proper court. The</span><br data-dcnode-id="9448"><span data-dcnode-id="9447" instrument_node="">Chief, BFP or his/her duly authorized representative shall order the owner/occupant to remove hazardous</span><br data-dcnode-id="9446"><span data-dcnode-id="9445" instrument_node="">materials and/or stop hazardous operation/process in accordance with the standards set by this Code or its</span><br data-dcnode-id="9444"><span data-dcnode-id="9443" instrument_node="">implementing rules or regulations or other pertinent laws;</span></p><p data-dcnode-id="9438"><span data-dcnode-id="9441" instrument_node="">i. Where conditions exist and are deemed hazardous to life and property, to order the</span><br data-dcnode-id="9440"><span data-dcnode-id="9439" instrument_node="">owner/occupant of any building or structure to summarily abate such hazardous conditions;</span></p><p data-dcnode-id="9434"><span data-dcnode-id="9437" instrument_node="">j. Require the building owner/occupant to submit plans and specifications, and other pertinent documents</span><br data-dcnode-id="9436"><span data-dcnode-id="9435" instrument_node="">of said building to ensure compliance with applicable codes and standards; and</span></p><p data-dcnode-id="9426"><span data-dcnode-id="9433" instrument_node="">k. Issue a written notice to the owner and/or contractor to stop work on portion of any work due to</span><br data-dcnode-id="9432"><span data-dcnode-id="9431" instrument_node="">fabsence, or in violation of approved plans and specifications, permit and/or clearance or certification as</span><br data-dcnode-id="9430"><span data-dcnode-id="9429" instrument_node="">approved by the Chief, BFP or his/her duly authorized representative. The notice shall state the nature of</span><br data-dcnode-id="9428"><span data-dcnode-id="9427" instrument_node="">the violation and no work shall be continued on that portion until the violation has been corrected.</span></p><p data-dcnode-id="9418"><span data-dcnode-id="9425" instrument_node="">Section 7. Inspections, Safety Measures, Fire Safety, Constructions, and Protective and/or</span><br data-dcnode-id="9424"><span data-dcnode-id="9423" instrument_node="">Warning Systems. - As may be defined and provided in the Rules and Regulations, owners, administrators or</span><br data-dcnode-id="9422"><span data-dcnode-id="9421" instrument_node="">occupants of buildings, structures and their premises or facilities and other responsible persons shall be</span><br data-dcnode-id="9420"><span data-dcnode-id="9419" instrument_node="">required to comply with the following, as may be appropriate:</span></p><p data-dcnode-id="9412"><span data-dcnode-id="9417" instrument_node="">a. Inspection Requirement - A fire safety inspection shall be conducted by the Chief, BFP or his duly</span><br data-dcnode-id="9416"><span data-dcnode-id="9415" instrument_node="">authorized representative as prerequisite to the grants of permits and/or licenses by local governments and</span><br data-dcnode-id="9414"><span data-dcnode-id="9413" instrument_node="">other government agencies concerned, for the:</span></p><p data-dcnode-id="9408"><span data-dcnode-id="9411" instrument_node="">    1. Use or occupancy of buildings, structures, facilities or their premises including the installation or fire</span><br data-dcnode-id="9410"><span data-dcnode-id="9409" instrument_node="">       protection and fire safety equipment, and electrical system in any building structure or facility; and</span></p><p data-dcnode-id="9404"><span data-dcnode-id="9407" instrument_node="">    2. Storage, handling and/or use of explosives or of combustible, flammable, toxic andother hazardous</span><br data-dcnode-id="9406"><span data-dcnode-id="9405" instrument_node="">       materials;</span></p><p data-dcnode-id="9344"><span data-dcnode-id="9403" instrument_node="">b. Safety Measures for Hazardous Materials - Fire safety measures shall be required for the manufacture,</span><br data-dcnode-id="9402"><span data-dcnode-id="9401" instrument_node="">storage, handling and/or use of hazardous materials involving:</span><br data-dcnode-id="9400"><span data-dcnode-id="9399" instrument_node="">(1) cellulose nitrate plastic of any kind;</span><br data-dcnode-id="9398"><span data-dcnode-id="9397" instrument_node="">(2) combustible fibers;</span><br data-dcnode-id="9396"><span data-dcnode-id="9395" instrument_node="">(3) cellular materials such as foam, rubber, sponge rubber and plastic foam;</span><br data-dcnode-id="9394"><span data-dcnode-id="9393" instrument_node="">(4) flammable and combustible liquids or gases of any classification;</span><br data-dcnode-id="9392"><span data-dcnode-id="9391" instrument_node="">(5) flammable paints, varnishes, stains and organic coatings;</span><br data-dcnode-id="9390"><span data-dcnode-id="9389" instrument_node="">(6) high-piled or widely spread combustible stock;</span><br data-dcnode-id="9388"><span data-dcnode-id="9387" instrument_node="">(7) metallic magnesium in any form;</span><br data-dcnode-id="9386"><span data-dcnode-id="9385" instrument_node="">(8) corrosive liquids, oxidizing materials, organic peroxide, nitromethane, ammonium</span><br data-dcnode-id="9384"><span data-dcnode-id="9383" instrument_node="">nitrate, or any amount of highly toxic, pyrophoric, hypergolic, or cryogenic materials</span><br data-dcnode-id="9382"><span data-dcnode-id="9381" instrument_node="">or poisonous gases as well as material compounds which when exposed to heat or</span><br data-dcnode-id="9380"><span data-dcnode-id="9379" instrument_node="">flame become a fire conductor, or generate excessive smoke or toxic gases;</span><br data-dcnode-id="9378"><span data-dcnode-id="9377" instrument_node="">(9) blasting agents, explosives and special industrial explosive materials, blasting caps,</span><br data-dcnode-id="9376"><span data-dcnode-id="9375" instrument_node="">black powder, liquid nitro-glycerine, dynamite, nitro cellulose, fulminates of any kind,</span><br data-dcnode-id="9374"><span data-dcnode-id="9373" instrument_node="">and plastic explosives containing ammonium salt or chlorate;</span><br data-dcnode-id="9372"><span data-dcnode-id="9371" instrument_node="">(10) fireworks materials of any kind or form;</span><br data-dcnode-id="9370"><span data-dcnode-id="9369" instrument_node="">(11) matches in commercial quantities;</span><br data-dcnode-id="9368"><span data-dcnode-id="9367" instrument_node="">(12) hot ashes, live coals and embers;</span><br data-dcnode-id="9366"><span data-dcnode-id="9365" instrument_node="">(13) mineral, vegetable or animal oils and other derivatives/by products;</span><br data-dcnode-id="9364"><span data-dcnode-id="9363" instrument_node="">(14) combustible waste materials for recycling or resale;</span><br data-dcnode-id="9362"><span data-dcnode-id="9361" instrument_node="">(15) explosive dusts and vapors; and</span><br data-dcnode-id="9360"><span data-dcnode-id="9359" instrument_node="">(16) agriculture, forest, marine or mineral products which may undergo spontaneous</span><br data-dcnode-id="9358"><span data-dcnode-id="9357" instrument_node="">combustion.</span><br data-dcnode-id="9356"><span data-dcnode-id="9355" instrument_node="">(17) any other substance with potential to cause harm to persons, property or the</span><br data-dcnode-id="9354"><span data-dcnode-id="9353" instrument_node="">environment because of one or more of the following: a) The chemical</span><br data-dcnode-id="9352"><span data-dcnode-id="9351" instrument_node="">properties of the substance; b) The physical properties of the substance; c) The</span><br data-dcnode-id="9350"><span data-dcnode-id="9349" instrument_node="">biological properties of the substance. Without limiting the definition of</span><br data-dcnode-id="9348"><span data-dcnode-id="9347" instrument_node="">hazardous material, all dangerous goods, combustible liquids and chemicals are</span><br data-dcnode-id="9346"><span data-dcnode-id="9345" instrument_node="">hazardous materials.</span></p><p data-dcnode-id="9343"></p><h2 data-dcnode-id="9341"><span data-dcnode-id="9342" instrument_node="">c. Safety Measures for Hazardous Operation/Processes - Fire Safety measures shall be</span></h2><br data-dcnode-id="9340"><span data-dcnode-id="9339" instrument_node="">required for the following hazardous operation/processes:</span><br data-dcnode-id="9338"><span data-dcnode-id="9337" instrument_node="">(1) welding or soldering;</span><br data-dcnode-id="9336"><span data-dcnode-id="9335" instrument_node="">(2) industrial baking and drying;</span><br data-dcnode-id="9334"><span data-dcnode-id="9333" instrument_node="">f(3) waste disposal;</span><br data-dcnode-id="9332"><span data-dcnode-id="9331" instrument_node="">(4) pressurized/forced-draft burning equipment;</span><br data-dcnode-id="9330"><span data-dcnode-id="9329" instrument_node="">(5) smelting and forging;</span><br data-dcnode-id="9328"><span data-dcnode-id="9327" instrument_node="">(6) motion picture projection using electrical arc lamps;</span><br data-dcnode-id="9326"><span data-dcnode-id="9325" instrument_node="">(7) refining, distillation and solvent extraction; and</span><br data-dcnode-id="9324"><span data-dcnode-id="9323" instrument_node="">(8) such other operations or
