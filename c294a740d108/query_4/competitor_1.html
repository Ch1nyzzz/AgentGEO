 processes as may hereafter be prescribed in the Rules and</span><br data-dcnode-id="9322"><span data-dcnode-id="9321" instrument_node="">Regulations.</span><p data-dcnode-id="9320"></p><p data-dcnode-id="9319"></p><h2 data-dcnode-id="9317"><span data-dcnode-id="9318" instrument_node="">d. Provision on Fire Safety Construction, Protective and Warning System - Owners,</span></h2><br data-dcnode-id="9316"><span data-dcnode-id="9315" instrument_node="">occupants or administrator or buildings, structures and their premises or facilities, except</span><br data-dcnode-id="9314"><span data-dcnode-id="9313" instrument_node="">such other buildings or structures as may be exempted in the rules and regulations to be</span><br data-dcnode-id="9312"><span data-dcnode-id="9311" instrument_node="">promulgated under Section 5 hereof, shall incorporate and provide therein fire safety</span><br data-dcnode-id="9310"><span data-dcnode-id="9309" instrument_node="">construction, protective and warning system, and shall develop and implement fire safety</span><br data-dcnode-id="9308"><span data-dcnode-id="9307" instrument_node="">programs, to wit:</span><br data-dcnode-id="9306"><span data-dcnode-id="9305" instrument_node="">(1) Fire protection features such as sprinkler systems, hose boxes, hose reels or standpipe systems and</span><br data-dcnode-id="9304"><span data-dcnode-id="9303" instrument_node="">other fire fighting equipment;</span><br data-dcnode-id="9302"><span data-dcnode-id="9301" instrument_node="">(2) Fire Alarm systems;</span><br data-dcnode-id="9300"><span data-dcnode-id="9299" instrument_node="">(3) Fire walls to separate adjoining buildings, or warehouses and storage areas from other occupancies in</span><br data-dcnode-id="9298"><span data-dcnode-id="9297" instrument_node="">the same building;</span><br data-dcnode-id="9296"><span data-dcnode-id="9295" instrument_node="">(4) Provisions for confining the fire at its source such as fire resistive floors and walls extending up to the</span><br data-dcnode-id="9294"><span data-dcnode-id="9293" instrument_node="">next floor slab or roof, curtain boards and other fire containing or stopping components;</span><br data-dcnode-id="9292"><span data-dcnode-id="9291" instrument_node="">(5) Termination of all exits in an area affording safe passage to a public way or safe dispersal area;</span><br data-dcnode-id="9290"><span data-dcnode-id="9289" instrument_node="">(6) Stairway, vertical shafts, horizontal exits and other means of egress sealed from smoke and heat;</span><br data-dcnode-id="9288"><span data-dcnode-id="9287" instrument_node="">(7) A fire exit plan for each floor of the building showing the routes from each other room to appropriate</span><br data-dcnode-id="9286"><span data-dcnode-id="9285" instrument_node="">exits, displayed prominently on the door of such room;</span><br data-dcnode-id="9284"><span data-dcnode-id="9283" instrument_node="">(8) Self-closing fire resistive doors leading to corridors;</span><br data-dcnode-id="9282"><span data-dcnode-id="9281" instrument_node="">(9) Fire dampers in centralized airconditioning ducts;</span><br data-dcnode-id="9280"><span data-dcnode-id="9279" instrument_node="">(10) Roof vents for use by fire fighters; and</span><br data-dcnode-id="9278"><span data-dcnode-id="9277" instrument_node="">(11) Properly marked and lighted exits with provision for emergency lights to adequately illuminate exit</span><br data-dcnode-id="9276"><span data-dcnode-id="9275" instrument_node="">ways in case of power failure.</span><p data-dcnode-id="9274"></p><p data-dcnode-id="9216"><span data-dcnode-id="9273" instrument_node="">Section 8. Prohibited Acts. - The following are declared as prohibited act and omission.</span><br data-dcnode-id="9272"><span data-dcnode-id="9271" instrument_node="">(a) Obstructing or blocking the exit ways or across to buildings clearly marked for fire safety purposes, such</span><br data-dcnode-id="9270"><span data-dcnode-id="9269" instrument_node="">as but not limited to aisles in interior rooms, any part of stairways,</span><br data-dcnode-id="9268"><span data-dcnode-id="9267" instrument_node="">hallways, corridors, vestibules, balconies or bridges leading to a stairway or exit of any</span><br data-dcnode-id="9266"><span data-dcnode-id="9265" instrument_node="">kind, or tolerating or allowing said violations;</span><br data-dcnode-id="9264"><span data-dcnode-id="9263" instrument_node="">(b) Constructing gates, entrances and walkways to buildings components and yards which</span><br data-dcnode-id="9262"><span data-dcnode-id="9261" instrument_node="">obstruct the orderly and easy passage of fire fighting vehicles and equipment;</span><br data-dcnode-id="9260"><span data-dcnode-id="9259" instrument_node="">(c) Prevention, interference or obstruction of any operation of the Fire Service, or of duly</span><br data-dcnode-id="9258"><span data-dcnode-id="9257" instrument_node="">organized and authorized fire brigades;</span><br data-dcnode-id="9256"><span data-dcnode-id="9255" instrument_node="">(d) Obstructing designated fire lanes or access to fire hydrants;</span><br data-dcnode-id="9254"><span data-dcnode-id="9253" instrument_node="">(e) Overcrowding or admission of persons beyond the authorized capacity in movie houses, theaters,</span><br data-dcnode-id="9252"><span data-dcnode-id="9251" instrument_node="">coliseums, auditoriums or other public assembly buildings, except in other assembly areas on the ground</span><br data-dcnode-id="9250"><span data-dcnode-id="9249" instrument_node="">floor with open sides or open doors sufficient to provide safe exits;</span><br data-dcnode-id="9248"><span data-dcnode-id="9247" instrument_node="">(f) Locking fire exits during period when people are inside the building;</span><br data-dcnode-id="9246"><span data-dcnode-id="9245" instrument_node="">(g) Prevention or obstruction of the automatic closure of fire doors or smoke partitions or</span><br data-dcnode-id="9244"><span data-dcnode-id="9243" instrument_node="">dampers;</span><br data-dcnode-id="9242"><span data-dcnode-id="9241" instrument_node="">(h) Use of fire protective of fire fighting equipment of the fire service other than for fire fighting except in</span><br data-dcnode-id="9240"><span data-dcnode-id="9239" instrument_node="">other emergencies where their use are justified;</span><br data-dcnode-id="9238"><span data-dcnode-id="9237" instrument_node="">(i) Giving false or malicious fire alarms;</span><br data-dcnode-id="9236"><span data-dcnode-id="9235" instrument_node="">(j) Smoking in prohibited areas as may be determined by fire service, or throwing of cigars,</span><br data-dcnode-id="9234"><span data-dcnode-id="9233" instrument_node="">cigarettes, burning objects in places which may start or cause fire;</span><br data-dcnode-id="9232"><span data-dcnode-id="9231" instrument_node="">(k) Abandoning or leaving a building or structure by the occupant or owner without appropriate safety</span><br data-dcnode-id="9230"><span data-dcnode-id="9229" instrument_node="">measures;</span><br data-dcnode-id="9228"><span data-dcnode-id="9227" instrument_node="">f(l) Removing. destroying, tampering or obliterating any authorized mark, seal, sign or tag</span><br data-dcnode-id="9226"><span data-dcnode-id="9225" instrument_node="">posted or required by the fire service for fire safety in any building, structure or processing</span><br data-dcnode-id="9224"><span data-dcnode-id="9223" instrument_node="">equipment; and</span><br data-dcnode-id="9222"><span data-dcnode-id="9221" instrument_node="">(m) Use of jumpers or tampering with electrical wiring or overloading the electrical system</span><br data-dcnode-id="9220"><span data-dcnode-id="9219" instrument_node="">beyond its designated capacity or such other practices that would tend to undermine the</span><br data-dcnode-id="9218"><span data-dcnode-id="9217" instrument_node="">fire safety features of the electrical system.</span></p><p data-dcnode-id="9174"><span data-dcnode-id="9215" instrument_node="">Section 9. Violation, Penalties and Abatement of Fire Hazard. - Fire hazards shall be abated immediately. The</span><br data-dcnode-id="9214"><span data-dcnode-id="9213" instrument_node="">Chief, BFP or his/her duly authorized representative, upon the report that a violation of this Code or other</span><br data-dcnode-id="9212"><span data-dcnode-id="9211" instrument_node="">pertinent laws, rules and regulations is being committed, shall issue notice/order to comply to the owner,</span><br data-dcnode-id="9210"><span data-dcnode-id="9209" instrument_node="">administrator, occupant or other person responsible for the condition of the building or structure, indicating</span><br data-dcnode-id="9208"><span data-dcnode-id="9207" instrument_node="">among other things, the period within which compliance shall be effected, which shall be within ten (10) to</span><br data-dcnode-id="9206"><span data-dcnode-id="9205" instrument_node="">fifteen (15) days after the receipt of the notice/order, depending on the reasonableness to adequately</span><br data-dcnode-id="9204"><span data-dcnode-id="9203" instrument_node="">comply with the same. If, after the lapse of the aforesaid period, the owner, administrator, occupant or</span><br data-dcnode-id="9202"><span data-dcnode-id="9201" instrument_node="">other responsible person failed to comply, the Chief, BFP or his/her authorized representative shall put up a</span><br data-dcnode-id="9200"><span data-dcnode-id="9199" instrument_node="">sign in front of the building or structure that it is fire hazard. Specifically, the notice shall bear the words</span><br data-dcnode-id="9198"><span data-dcnode-id="9197" instrument_node="">"WARNING:</span><br data-dcnode-id="9196"><span data-dcnode-id="9195" instrument_node="">THIS BUILDING/STRUCTURE IS A FIRE HAZARD", which shall remain posted until such time that the owner,</span><br data-dcnode-id="9194"><span data-dcnode-id="9193" instrument_node="">administrator, occupant or other person responsible for the condition of the building, structure and their</span><br data-dcnode-id="9192"><span data-dcnode-id="9191" instrument_node="">premises or facilities abate the same, but such period shall not exceed fifteen (15) days from the lapse of</span><br data-dcnode-id="9190"><span data-dcnode-id="9189" instrument_node="">the initial period given in the notice/order to comply. Finally, with the failure of the owner, administrator,</span><br data-dcnode-id="9188"><span data-dcnode-id="9187" instrument_node="">occupant or other person responsible for the condition of the building, structure and their premises or</span><br data-dcnode-id="9186"><span data-dcnode-id="9185" instrument_node="">facilities to comply within the period specified above, the Chief, BFP may issue order for such abatement. If</span><br data-dcnode-id="9184"><span data-dcnode-id="9183" instrument_node="">the owner, administrator or occupant of buildings, structure and their premises or facilities does not abate</span><br data-dcnode-id="9182"><span data-dcnode-id="9181" instrument_node="">the same within the period fixed in said order, the building, structure, premises or facilities shall be ordered</span><br data-dcnode-id="9180"><span data-dcnode-id="9179" instrument_node="">closed by the Chief, BFP or</span><br data-dcnode-id="9178"><span data-dcnode-id="9177" instrument_node="">his/her duly authorized representative notwithstanding any permit clearance or certificate earlier issued by</span><br data-dcnode-id="9176"><span data-dcnode-id="9175" instrument_node="">the local authorities.</span></p><p data-dcnode-id="9144"><span data-dcnode-id="9173" instrument_node="">Any building or structure assessed and declared by the chief, BFP or his/her duly authorized representative</span><br data-dcnode-id="9172"><span data-dcnode-id="9171" instrument_node="">as a firetrap on account of the gravity or palpability of the violation or is causing clear and present imminent</span><br data-dcnode-id="9170"><span data-dcnode-id="9169" instrument_node="">fire danger to adjoining establishments and habitations shall be declared a public nuisance, as defined in</span><br data-dcnode-id="9168"><span data-dcnode-id="9167" instrument_node="">the Civil Code of the Philippines in a notice to be issued to the owner, administrator, occupant or other</span><br data-dcnode-id="9166"><span data-dcnode-id="9165" instrument_node="">person responsible for the condition of the building, structure and their premises or facilities. If the</span><br data-dcnode-id="9164"><span data-dcnode-id="9163" instrument_node="">assessed value of the nuisance or the amount to be spent in abating the same is not more than One</span><br data-dcnode-id="9162"><span data-dcnode-id="9161" instrument_node="">hundred thousand pesos (P100,000.00), the owner, administrator or occupant thereof shall abate the</span><br data-dcnode-id="9160"><span data-dcnode-id="9159" instrument_node="">hazard within fifteen (15) days, or if the assessed value is more than One hundred thousand pesos</span><br data-dcnode-id="9158"><span data-dcnode-id="9157" instrument_node="">(P100,000.00), within thirty (30) days from receipt of the order declaring said building or structure a public</span><br data-dcnode-id="9156"><span data-dcnode-id="9155" instrument_node="">nuisance; otherwise, the Chief, BFP or his/her duly authorized representative shall forthwith cause its</span><br data-dcnode-id="9154"><span data-dcnode-id="9153" instrument_node="">summary abatement. failure to comply within five (5) days from the receipt of the notice shall cause the</span><br data-dcnode-id="9152"><span data-dcnode-id="9151" instrument_node="">Chief, BFP or his/her duly authorized representative to put up a sign in front of the building or structure, at</span><br data-dcnode-id="9150"><span data-dcnode-id="9149" instrument_node="">or near the entrance of such premises, notifying the public that such building or structure is a "FIRETRAP",</span><br data-dcnode-id="9148"><span data-dcnode-id="9147" instrument_node="">which shall remain until the owner, administrator, occupant or other person responsible for the condition of</span><br data-dcnode-id="9146"><span data-dcnode-id="9145" instrument_node="">the building, structure and their premises or facilities abate the same within the specified period.</span></p><p data-dcnode-id="9134"><span data-dcnode-id="9143" instrument_node="">Summary abatement as used herein shall mean all corrective measures undertaken to abate hazards which</span><br data-dcnode-id="9142"><span data-dcnode-id="9141" instrument_node="">shall include, but not limited to remodeling, repairing, strengthening, reconstructing, removal and</span><br data-dcnode-id="9140"><span data-dcnode-id="9139" instrument_node="">demolition, either partial or total, of the building or structure. The expenses incurred by the government for</span><br data-dcnode-id="9138"><span data-dcnode-id="9137" instrument_node="">such summary abatement shall be borne by the owner, administrator or occupant. These expenses shall</span><br data-dcnode-id="9136"><span data-dcnode-id="9135" instrument_node="">constitute a prior lien upon such property.</span></p><p data-dcnode-id="9122"><span data-dcnode-id="9133" instrument_node="">Section 10. Enforcement of The Lien. - If the owner, administrator or occupant fails to reimburse the</span><br data-dcnode-id="9132"><span data-dcnode-id="9131" instrument_node="">government of the expenses incurred in the summary abatement within ninety (90) days from the</span><br data-dcnode-id="9130"><span data-dcnode-id="9129" instrument_node="">completion of such abatement, the building or structure shall be sold at public auction in accordance with</span><br data-dcnode-id="9128"><span data-dcnode-id="9127" instrument_node="">fexisting laws and rules. No property subject of lien under Section 9 hereof, may be sold at a price lower</span><br data-dcnode-id="9126"><span data-dcnode-id="9125" instrument_node="">than the abatement expenses incurred by the government. The property shall be forfeited in favor of the</span><br data-dcnode-id="9124"><span data-dcnode-id="9123" instrument_node="">government if the highest bid is not at least equal to the abatement expenses.</span></p><p data-dcnode-id="9121"></p><h2 data-dcnode-id="9119"><span data-dcnode-id="9120" instrument_node="">Section 11. Penalties. –</span></h2><br data-dcnode-id="9118"><span data-dcnode-id="9117" instrument_node="">1. Against the private individual:</span><br data-dcnode-id="9116"><span data-dcnode-id="9115" instrument_node="">a) Administrative fine - Any person who violates any provision of the Fire Code or any</span><br data-dcnode-id="9114"><span data-dcnode-id="9113" instrument_node="">of the rules and regulations promulgated under this Act shall be penalized by an</span><br data-dcnode-id="9112"><span data-dcnode-id="9111" instrument_node="">administrative fine of not exceeding Fifty thousand (P50,000.00) pesos or in the</span><br data-dcnode-id="9110"><span data-dcnode-id="9109" instrument_node="">proper case, by stoppage of operations or by closure of such buildings, structures</span><br data-dcnode-id="9108"><span data-dcnode-id="9107" instrument_node="">and their premises or facilities which do not comply with the requirements or by</span><br data-dcnode-id="9106"><span data-dcnode-id="9105" instrument_node="">both such administrative fine and closure/stoppage of operation to be imposed by</span><br data-dcnode-id="9104"><span data-dcnode-id="9103" instrument_node="">the Chief, BFP. Provided, That the payment of the fine, stoppage of operations</span><br data-dcnode-id="9102"><span data-dcnode-id="9101" instrument_node="">and/or closure of such buildings, structures, and their premises or facilities shall</span><br data-dcnode-id="9100"><span data-dcnode-id="9099" instrument_node="">not absolve the violator from correcting the deficiency or abating the fire hazard.</span><br data-dcnode-id="9098"><span data-dcnode-id="9097" instrument_node="">The decision of the Chief, BFP, under this subsection, may be appealed to the</span><br data-dcnode-id="9096"><span data-dcnode-id="9095" instrument_node="">Secretary of the Interior and Local Government. Unless ordered by the Secretary</span><br data-dcnode-id="9094"><span data-dcnode-id="9093" instrument_node="">of the Interior and Local Government the appeal shall not stay the execution of the</span><br data-dcnode-id="9092"><span data-dcnode-id="9091" instrument_node="">order of the Chief, BFP. The decision of the Secretary of the Interior and Local</span><br data-dcnode-id="9090"><span data-dcnode-id="9089" instrument_node="">Government shall be final and executory.</span><p data-dcnode-id="9088"></p><p data-dcnode-id="9052"><span data-dcnode-id="9087" instrument_node="">(b) Punitive - In case of willful failure to correct the deficiency or abate the fire hazard</span><br data-dcnode-id="9086"><span data-dcnode-id="9085" instrument_node="">as provided in the preceding subsection, the violator shall, upon conviction, be</span><br data-dcnode-id="9084"><span data-dcnode-id="9083" instrument_node="">punished by imprisonment of not less than six (6) months nor more than six (6)</span><br data-dcnode-id="9082"><span data-dcnode-id="9081" instrument_node="">years, or by a fine of not more than One hundred thousand (P100,000.00) pesos</span><br data-dcnode-id="9080"><span data-dcnode-id="9079" instrument_node="">or both such fine and imprisonment; Provided, however, that in case of a</span><br data-dcnode-id="9078"><span data-dcnode-id="9077" instrument_node="">corporation, firm, partnership or association, the fine and/or imprisonment shall be</span><br data-dcnode-id="9076"><span data-dcnode-id="9075" instrument_node="">imposed upon its officials responsible for such violation, and in case the guilty</span><br data-dcnode-id="9074"><span data-dcnode-id="9073" instrument_node="">party is an alien, in addition to the penalties herein prescribed, he shall</span><br data-dcnode-id="9072"><span data-dcnode-id="9071" instrument_node="">immediately be deported; Provided, finally, that were the violation is attended by</span><br data-dcnode-id="9070"><span data-dcnode-id="9069" instrument_node="">injury, loss of life and/or damage to property, the violator shall be proceeded</span><br data-dcnode-id="9068"><span data-dcnode-id="9067" instrument_node="">against under the applicable provisions of the Revised Penal Code.</span><br data-dcnode-id="9066"><span data-dcnode-id="9065" instrument_node="">Any person who, without authority, maliciously removes the sign that a building or</span><br data-dcnode-id="9064"><span data-dcnode-id="9063" instrument_node="">structure is a fire hazard/firetrap placed by the authorized person in this Code shall</span><br data-dcnode-id="9062"><span data-dcnode-id="9061" instrument_node="">be liable for imprisonment for thirty (30) days or a fine not exceeding One hundred</span><br data-dcnode-id="9060"><span data-dcnode-id="9059" instrument_node="">thousand pesos (P100,000.00) or both in the discretion of the court.</span><br data-dcnode-id="9058"><span data-dcnode-id="9057" instrument_node="">Any person, who disobeys the lawful order of the fire ground commander during a</span><br data-dcnode-id="9056"><span data-dcnode-id="9055" instrument_node="">firefighting operation shall be penalized with imprisonment of one (1) day to thirty</span><br data-dcnode-id="9054"><span data-dcnode-id="9053" instrument_node="">(30) days and a fine of five thousand pesos (P5,000.00).</span></p><p data-dcnode-id="9051"></p><h2 data-dcnode-id="9049"><span data-dcnode-id="9050" instrument_node="">2. Against the public officer/employee</span></h2><br data-dcnode-id="9048"><span data-dcnode-id="9047" instrument_node="">a) Administrative - The following acts or omissions shall render the public</span><br data-dcnode-id="9046"><span data-dcnode-id="9045" instrument_node="">officer/employee in charge of the enforcement of this Code, its implementing</span><br data-dcnode-id="9044"><span data-dcnode-id="9043" instrument_node="">rules and regulation and other pertinent laws, administratively liable, and shall</span><br data-dcnode-id="9042"><span data-dcnode-id="9041" instrument_node="">be punished by reprimand, suspension or removal in the discretion of the</span><br data-dcnode-id="9040"><span data-dcnode-id="9039" instrument_node="">disciplining authority, depending on the gravity of the offense and without</span><br data-dcnode-id="9038"><span data-dcnode-id="9037" instrument_node="">prejudice to the provisions of other applicable laws:</span><p data-dcnode-id="9036"></p><p data-dcnode-id="9035"></p><h2 data-dcnode-id="9033"><span data-dcnode-id="9034" instrument_node="">(1) Unjustified failure of the public officer/employee to conduct inspection</span></h2><br data-dcnode-id="9032"><span data-dcnode-id="9031" instrument_node="">of buildings or structures at least once a year;</span><p data-dcnode-id="9030"></p><p data-dcnode-id="9029"></p><h2 data-dcnode-id="9027"><span data-dcnode-id="9028" instrument_node="">(2) Deliberate failure to put up a sign in front of the building or structure</span></h2><br data-dcnode-id="9026"><span data-dcnode-id="9025" instrument_node="">within his/her area of responsibility found to be violating this Code, its</span><br data-dcnode-id="9024"><span data-dcnode-id="9023" instrument_node="">implementing rules and regulations and other pertinent laws, that the</span><br data-dcnode-id="9022"><span data-dcnode-id="9021" instrument_node="">fsame is a "FIRE HAZARD" or a "FIRETRAP";</span><p data-dcnode-id="9020"></p><p data-dcnode-id="9019"></p><h2 data-dcnode-id="9017"><span data-dcnode-id="9018" instrument_node="">(3) Endorsing to the Chief, BFP or his/her duly authorized representative</span></h2><br data-dcnode-id="9016"><span data-dcnode-id="9015" instrument_node="">for the certification, or submitting a report that the building or structure</span><br data-dcnode-id="9014"><span data-dcnode-id="9013" instrument_node="">complies with the standards set by this Code, its implementing rules</span><br data-dcnode-id="9012"><span data-dcnode-id="9011" instrument_node="">or regulations or other pertinent laws when the same is contrary to</span><br data-dcnode-id="9010"><span data-dcnode-id="9009" instrument_node="">fact;</span><p data-dcnode-id="9008"></p><p data-dcnode-id="9007"></p><h2 data-dcnode-id="9005"><span data-dcnode-id="9006" instrument_node="">(4) Issuance or renewal of occupancy or business permit without the fire</span></h2><br data-dcnode-id="9004"><span data-dcnode-id="9003" instrument_node="">safety inspection certificate issued by the Chief, BFP or his/her duly</span><br data-dcnode-id="9002"><span data-dcnode-id="9001" instrument_node="">authorized representative;</span><p data-dcnode-id="9000"></p><p data-dcnode-id="8988"><span data-dcnode-id="8999" instrument_node="">(5) Failure to cancel the occupancy or business permit after the owner,</span><br data-dcnode-id="8998"><span data-dcnode-id="8997" instrument_node="">administrator, occupant or other person responsible for the condition</span><br data-dcnode-id="8996"><span data-dcnode-id="8995" instrument_node="">of the building, structure and other premises failed to comply with the</span><br data-dcnode-id="8994"><span data-dcnode-id="8993" instrument_node="">notice/order for compliance with the standards set by this Code, its</span><br data-dcnode-id="8992"><span data-dcnode-id="8991" instrument_node="">implementing rules and regulations and other pertinent laws, within</span><br data-dcnode-id="8990"><span data-dcnode-id="8989" instrument_node="">the specified period;</span></p><p data-dcnode-id="8982"><span data-dcnode-id="8987" instrument_node="">(6) Failure to abate a public nuisance within fifteen (15) days after the</span><br data-dcnode-id="8986"><span data-dcnode-id="8985" instrument_node="">owner, administrator, occupant or other responsible person failed to</span><br data-dcnode-id="8984"><span data-dcnode-id="8983" instrument_node="">abate the same within the period contained in the notice to abate;</span></p><p data-dcnode-id="8981"></p><h2 data-dcnode-id="8979"><span data-dcnode-id="8980" instrument_node="">(7) Abusing his/her authority in the performance of his/her duty through</span></h2><br data-dcnode-id="8978"><span data-dcnode-id="8977" instrument_node="">acts of corruption and other unethical practices; or</span><p data-dcnode-id="8976"></p><p data-dcnode-id="8975"></p><h2 data-dcnode-id="8973"><span data-dcnode-id="8974" instrument_node="">(8) Other willful impropriety or gross negligence in the performance of</span></h2><br data-dcnode-id="8972"><span data-dcnode-id="8971" instrument_node="">his/her duty as provided in this act or its implementing rules and</span><br data-dcnode-id="8970"><span data-dcnode-id="8969" instrument_node="">regulations.</span><p data-dcnode-id="8968"></p><p data-dcnode-id="8967"></p><h2 data-dcnode-id="8965"><span data-dcnode-id="8966" instrument_node="">b) Punitive - In the case of willful violation involving the abovementioned acts or</span></h2><br data-dcnode-id="8964"><span data-dcnode-id="8963" instrument_node="">omissions enumerated under Section 11 subparagraph 2(A) the public</span><br data-dcnode-id="8962"><span data-dcnode-id="8961" instrument_node="">officer/employees shall, upon conviction, be punished by imprisonment of not</span><br data-dcnode-id="8960"><span data-dcnode-id="8959" instrument_node="">less than six (6) months nor more than six (6) years or by a fine of not more</span><br data-dcnode-id="8958"><span data-dcnode-id="8957" instrument_node="">than One hundred thousand (P100,000.00) or both such fine and</span><br data-dcnode-id="8956"><span data-dcnode-id="8955" instrument_node="">imprisonment: Provided, That where the violation is attended by injury, loss of</span><br data-dcnode-id="8954"><span data-dcnode-id="8953" instrument_node="">life and/or property, the violator shall be proceeded against under the</span><br data-dcnode-id="8952"><span data-dcnode-id="8951" instrument_node="">applicable provisions of the Revised Penal Code.</span><p data-dcnode-id="8950"></p><p data-dcnode-id="8949"></p><h2 data-dcnode-id="8947"><span data-dcnode-id="8948" instrument_node="">Section 12. Appropriation and Sources of Income. -</span></h2><br data-dcnode-id="8946"><span data-dcnode-id="8945" instrument_node="">(a) To support the manpower, infrastructure and equipment needs of the fire service of the</span><br data-dcnode-id="8944"><span data-dcnode-id="8943" instrument_node="">BFP, such amount as may be necessary to attain the objectives of the Fire Code shall be</span><br data-dcnode-id="8942"><span data-dcnode-id="8941" instrument_node="">appropriated and included in the annual appropriation of the BFP.</span><p data-dcnode-id="8940"></p><p data-dcnode-id="8898"><span data-dcnode-id="8939" instrument_node="">(b) To partially provide for the funding of the fire service the following taxes and fees which</span><br data-dcnode-id="8938"><span data-dcnode-id="8937" instrument_node="">shall accrue to the General Fund of the National Government, are hereby imposed:</span><br data-dcnode-id="8936"><span data-dcnode-id="8935" instrument_node="">(1) Fees to be charged for the issuance of certificates, permits and licenses as</span><br data-dcnode-id="8934"><span data-dcnode-id="8933" instrument_node="">provided for in Section 7 (a) hereof;</span><br data-dcnode-id="8932"><span data-dcnode-id="8931" instrument_node="">(2) One-tenth of one per centum (0.1%) of the verified estimated value of buildings or</span><br data-dcnode-id="8930"><span data-dcnode-id="8929" instrument_node="">structures to be erected, from the owner thereof, but not to exceed fifty thousand</span><br data-dcnode-id="8928"><span data-dcnode-id="8927" instrument_node="">(P50,000.00) pesos, one half to be paid prior to the issuance of the building</span><br data-dcnode-id="8926"><span data-dcnode-id="8925" instrument_node="">permit, and the balance, after final inspection and prior to the issuance of the use</span><br data-dcnode-id="8924"><span data-dcnode-id="8923" instrument_node="">and occupancy permit;</span><br data-dcnode-id="8922"><span data-dcnode-id="8921" instrument_node="">(3) One-hundredth of one per centum (0.10%) of the assessed value of buildings or</span><br data-dcnode-id="8920"><span data-dcnode-id="8919" instrument_node="">fstructures annually payable upon payment of the real estate tax, except on</span><br data-dcnode-id="8918"><span data-dcnode-id="8917" instrument_node="">structures used as single family dwellings;</span><br data-dcnode-id="8916"><span data-dcnode-id="8915" instrument_node="">(4) Two per centum (2%) of all premiums, excluding re-insurance premiums for the</span><br data-dcnode-id="8914"><span data-dcnode-id="8913" instrument_node="">sale of fire, earthquake and explosion hazard insurance collected by companies,</span><br data-dcnode-id="8912"><span data-dcnode-id="8911" instrument_node="">persons or agents licensed to sell such insurances in the Philippines;</span><br data-dcnode-id="8910"><span data-dcnode-id="8909" instrument_node="">(5) Two per centum (2%) of gross sales of companies, persons or agents selling fire</span><br data-dcnode-id="8908"><span data-dcnode-id="8907" instrument_node="">fighting equipment, appliances or devices, including hazard detection and warning</span><br data-dcnode-id="8906"><span data-dcnode-id="8905" instrument_node="">systems; and</span><br data-dcnode-id="8904"><span data-dcnode-id="8903" instrument_node="">(6) Two per centum (2%) of the service fees received from fire, earthquake, and</span><br data-dcnode-id="8902"><span data-dcnode-id="8901" instrument_node="">explosion hazard reinsurance surveys and post loss service of insurance</span><br data-dcnode-id="8900"><span data-dcnode-id="8899" instrument_node="">adjustment companies doing business in the Philippines directly through agents.</span></p><p data-dcnode-id="8886"><span data-dcnode-id="8897" instrument_node="">Section 13. Collection of Taxes, Fees and Fines. - All taxes, fees and fines provided in this Code, shall be</span><br data-dcnode-id="8896"><span data-dcnode-id="8895" instrument_node="">collected by the BFP. Provided, That twenty percent (20%) of such collection shall be set aside and retained</span><br data-dcnode-id="8894"><span data-dcnode-id="8893" instrument_node="">for use by the city or municipal government concerned, which shall appropriate the same exclusive for the</span><br data-dcnode-id="8892"><span data-dcnode-id="8891" instrument_node="">use of the operation and maintenance of its local fire station, including the construction and repair of fire</span><br data-dcnode-id="8890"><span data-dcnode-id="8889" instrument_node="">station: Provided, further, That the remaining eighty (80%) shall be remitted to the National Treasury under</span><br data-dcnode-id="8888"><span data-dcnode-id="8887" instrument_node="">a trust fund assigned for the modernization of the BFP.</span></p><p data-dcnode-id="8880"><span data-dcnode-id="8885" instrument_node="">"Sec. 13-A. Assessment of Fire Code Taxes, Fees and Fines. - The assessment of fire code taxes, fees and</span><br data-dcnode-id="8884"><span data-dcnode-id="8883" instrument_node="">fines is vested upon the BFP. The BFP shall, subject to the approval of the DILG, prescribe the procedural</span><br data-dcnode-id="8882"><span data-dcnode-id="8881" instrument_node="">rules for such purpose.</span></p><p data-dcnode-id="8874"><span data-dcnode-id="8879" instrument_node="">Sec. 13-B. Collection and Assessment of Local Taxes, Fees and Fines. - The collection and assessment of</span><br data-dcnode-id="8878"><span data-dcnode-id="8877" instrument_node="">taxes, fees and fines as prescribed in the Local Government Code, except those contained in this Code, shall</span><br data-dcnode-id="8876"><span data-dcnode-id="8875" instrument_node="">be function of the concerned local government units.</span></p><p data-dcnode-id="8864"><span data-dcnode-id="8873" instrument_node="">Sec. 13-C. Use of Income Generated from the Enforcement of the Fire Code. - The Chief, BFP is authorized,</span><br data-dcnode-id="8872"><span data-dcnode-id="8871" instrument_node="">subject to the approval of the Secretary of the Interior and Local Government, to use the income generated</span><br data-dcnode-id="8870"><span data-dcnode-id="8869" instrument_node="">under the Fire Code for procurement of fire protection and fire fighting investigation, rescue, paramedics,</span><br data-dcnode-id="8868"><span data-dcnode-id="8867" instrument_node="">supplies and materials, and related technical services necessary for the fire service and the improvement of</span><br data-dcnode-id="8866"><span data-dcnode-id="8865" instrument_node="">facilites of the Bureau of Fire Protection and abatement of fire hazards.</span></p><p data-dcnode-id="8846"><span data-dcnode-id="8863" instrument_node="">The BFP shall determine the optimal number of equipment, including, but not limited to, fire trucks and fire</span><br data-dcnode-id="8862"><span data-dcnode-id="8861" instrument_node="">hydrants, required by every local government unit for the proper delivery of fire protection services in its</span><br data-dcnode-id="8860"><span data-dcnode-id="8859" instrument_node="">jurisdiction.</span><br data-dcnode-id="8858"><span data-dcnode-id="8857" instrument_node="">In the procurement of fire fighting and investigation supplies and materials, the Bureau of Product</span><br data-dcnode-id="8856"><span data-dcnode-id="8855" instrument_node="">Standards of the Department of Trade and Industry shall evaluate, determine and certify if the supply to</span><br data-dcnode-id="8854"><span data-dcnode-id="8853" instrument_node="">procured conforms to the product standards fixed by the BFP. For this purpose, the BFP shall submit to the</span><br data-dcnode-id="8852"><span data-dcnode-id="8851" instrument_node="">Bureau of Product Standards a detailed set of product standards that must be complied with in the</span><br data-dcnode-id="8850"><span data-dcnode-id="8849" instrument_node="">procurement of fire fighting and investigation supplies and materials within six (6) months from the</span><br data-dcnode-id="8848"><span data-dcnode-id="8847" instrument_node="">effectivity of this act.</span></p><p data-dcnode-id="8838"><span data-dcnode-id="8845" instrument_node="">Sec. 13-D. Monitoring the Implementation of the Fire Code and the Amount of the Fees Collected. - The</span><br data-dcnode-id="8844"><span data-dcnode-id="8843" instrument_node="">Chief, BFP shall, within six (6) month from the effectivity of this Code, submit to the Secretary of the Interior</span><br data-dcnode-id="8842"><span data-dcnode-id="8841" instrument_node="">and Local Government for his/her approval, a management tool or mechanism that would ensure effective</span><br data-dcnode-id="8840"><span data-dcnode-id="8839" instrument_node="">monitoring of the enforcement of the Fire Code to include the amount of Fire Code fees collected.</span></p><p data-dcnode-id="8836"><span data-dcnode-id="8837" instrument_node="">IRR of RA 9514</span></p><p data-dcnode-id="8794"><span data-dcnode-id="8835" instrument_node="">*NOTES</span><br data-dcnode-id="8834"><span data-dcnode-id="8833" instrument_node="">SECTION 13.0.0.3 JURISDICTION</span><br data-dcnode-id="8832"><span data-dcnode-id="8831" instrument_node="">A. Fines</span><br data-dcnode-id="8830"><span data-dcnode-id="8829" instrument_node="">f1. Fines up to thirty thousand pesos (PhP 30,000.00) shall be imposed by</span><br data-dcnode-id="8828"><span data-dcnode-id="8827" instrument_node="">the City/Municipal Fire Marshal having jurisdiction.</span><br data-dcnode-id="8826"><span data-dcnode-id="8825" instrument_node="">2. Fines exceeding thirty thousand pesos but not more than forty</span><br data-dcnode-id="8824"><span data-dcnode-id="8823" instrument_node="">thousand pesos (PhP 40,000.00) shall be imposed by the</span><br data-dcnode-id="8822"><span data-dcnode-id="8821" instrument_node="">Provincial/District Fire Marshal having jurisdiction.</span><br data-dcnode-id="8820"><span data-dcnode-id="8819" instrument_node="">3. Fines exceeding forty thousand pesos up to fifty thousand pesos (PhP</span><br data-dcnode-id="8818"><span data-dcnode-id="8817" instrument_node="">50,000.00) shall be imposed by the Regional Director having</span><br data-dcnode-id="8816"><span data-dcnode-id="8815" instrument_node="">jurisdiction.</span><br data-dcnode-id="8814"><span data-dcnode-id="8813" instrument_node="">B. Stoppage of Operation/Closure of Buildings</span><br data-dcnode-id="8812"><span data-dcnode-id="8811" instrument_node="">This penalty shall be imposed by the Regional Director upon the</span><br data-dcnode-id="8810"><span data-dcnode-id="8809" instrument_node="">recommendation of the City/Municipal Fire Marshal having jurisdiction</span><br data-dcnode-id="8808"><span data-dcnode-id="8807" instrument_node="">thru channel. The implementation of this order may be delegated to the</span><br data-dcnode-id="8806"><span data-dcnode-id="8805" instrument_node="">Provincial/District Fire Marshal having jurisdiction.</span><br data-dcnode-id="8804"><span data-dcnode-id="8803" instrument_node="">C. Declaration of Public Nuisance</span><br data-dcnode-id="8802"><span data-dcnode-id="8801" instrument_node="">The declaration of a building, structure or facility as a public nuisance</span><br data-dcnode-id="8800"><span data-dcnode-id="8799" instrument_node="">pursuant to Section 9 of RA 9514 shall be made by the Chief, BFP upon the</span><br data-dcnode-id="8798"><span data-dcnode-id="8797" instrument_node="">recommendation of the City/Municipal Fire Marshal having jurisdiction</span><br data-dcnode-id="8796"><span data-dcnode-id="8795" instrument_node="">thru channel.</span></p><p data-dcnode-id="8793"></p><h2 data-dcnode-id="8791"><span data-dcnode-id="8792" instrument_node="">SECTION 10.2.4.2 CLASSIFICATION OF HAZARD OF CONTENTS</span></h2><br data-dcnode-id="8790"><span data-dcnode-id="8789" instrument_node="">A. The hazard of contents of any building or structure shall be classified as</span><br data-dcnode-id="8788"><span data-dcnode-id="8787" instrument_node="">follows:</span><br data-dcnode-id="8786"><span data-dcnode-id="8785" instrument_node="">1. Low Hazard</span><br data-dcnode-id="8784"><span data-dcnode-id="8783" instrument_node="">Those of such low combustibility that no self-propagating fire therein</span><br data-dcnode-id="8782"><span data-dcnode-id="8781" instrument_node="">can occur and that consequently, the only probable danger requiring</span><br data-dcnode-id="8780"><span data-dcnode-id="8779" instrument_node="">the use of emergency exits will be from panic, fumes or smoke or fire</span><br data-dcnode-id="8778"><span data-dcnode-id="8777" instrument_node="">from some external source.</span><br data-dcnode-id="8776"><span data-dcnode-id="8775" instrument_node="">2. Moderate Hazard</span><br data-dcnode-id="8774"><span data-dcnode-id="8773" instrument_node="">Those which are liable to burn with moderate rapidity or to give off a</span><br data-dcnode-id="8772"><span data-dcnode-id="8771" instrument_node="">considerable volume of smoke but from which neither poisonous</span><br data-dcnode-id="8770"><span data-dcnode-id="8769" instrument_node="">fumes nor explosions are to be expected in the event of fire.</span><br data-dcnode-id="8768"><span data-dcnode-id="8767" instrument_node="">3. High Hazard</span><br data-dcnode-id="8766"><span data-dcnode-id="8765" instrument_node="">Those which are liable to burn with extreme rapidity or from which</span><br data-dcnode-id="8764"><span data-dcnode-id="8763" instrument_node="">poisonous gases or explosions are to be expected in the event of fire.</span><p data-dcnode-id="8762"></p><p data-dcnode-id="8738"><span data-dcnode-id="8761" instrument_node="">Classification of Occupancy</span><br data-dcnode-id="8760"><span data-dcnode-id="8759" instrument_node="">    1. Assembly</span><br data-dcnode-id="8758"><span data-dcnode-id="8757" instrument_node="">    2. Educational</span><br data-dcnode-id="8756"><span data-dcnode-id="8755" instrument_node="">    3. Health Care</span><br data-dcnode-id="8754"><span data-dcnode-id="8753" instrument_node="">    4. Detention &amp; Correctional</span><br data-dcnode-id="8752"><span data-dcnode-id="8751" instrument_node="">    5. Residential</span><br data-dcnode-id="8750"><span data-dcnode-id="8749" instrument_node="">    6. Mercantile</span><br data-dcnode-id="8748"><span data-dcnode-id="8747" instrument_node="">    7. Business</span><br data-dcnode-id="8746"><span data-dcnode-id="8745" instrument_node="">    8. Industrial</span><br data-dcnode-id="8744"><span data-dcnode-id="8743" instrument_node="">    9. Storage</span><br data-dcnode-id="8742"><span data-dcnode-id="8741" instrument_node="">    10. Mixed Occupancies</span><br data-dcnode-id="8740"><span data-dcnode-id="8739" instrument_node="">    11. Miscellaneous</span></p><p data-dcnode-id="8737"></p><h2 data-dcnode-id="8735"><span data-dcnode-id="8736" instrument_node="">Fire Marshals – has descretion on the classifications of buildings</span></h2><br data-dcnode-id="8734"><span data-dcnode-id="8733" instrument_node="">3 or less storeys bldg – heat resistance = 1hr</span><br data-dcnode-id="8732"><span data-dcnode-id="8731" instrument_node="">4 or more storeys bldg – heat resistance = 2hr</span><br data-dcnode-id="8730"><span data-dcnode-id="8729" instrument_node="">Means of Egress – a continous and unobstructed path of travel (either horizontal or vertical) from the</span><br data-dcnode-id="8728"><span data-dcnode-id="8727" instrument_node="">remotest part of the bldg leading to a public way</span><br data-dcnode-id="8726"><span data-dcnode-id="8725" instrument_node="">f3 Distinct Parts of Means of Egress</span><br data-dcnode-id="8724"><span data-dcnode-id="8723" instrument_node="">    1. Exit Access – should not be more than 46m; leads to an exit; 61m if w/ sprinklers/emergency lights</span><br data-dcnode-id="8722"><span data-dcnode-id="8721" instrument_node="">    2. Exit – separated from all other spaces of bldg/structure by construction/equipment that provides a</span><br data-dcnode-id="8720"><span data-dcnode-id="8719" instrument_node="">         protected path of travel to the exit discharge</span><br data-dcnode-id="8718"><span data-dcnode-id="8717" instrument_node="">    3. Exit Discharge</span><p data-dcnode-id="8716"></p><p data-dcnode-id="8694"><span data-dcnode-id="8715" instrument_node="">Drills – inculcating safest &amp; fastest way to evacuate a bldg during emergency situations</span><br data-dcnode-id="8714"><span data-dcnode-id="8713" instrument_node="">Exit sign – illuminated</span><br data-dcnode-id="8712"><span data-dcnode-id="8711" instrument_node="">Exit door – self-closing</span><br data-dcnode-id="8710"><span data-dcnode-id="8709" instrument_node="">Exit discharge – between the termination of an exit and a public way</span><br data-dcnode-id="8708"><span data-dcnode-id="8707" instrument_node="">High-rise bldg – 15m and above; 1storey = 3m/4-5m</span><br data-dcnode-id="8706"><span data-dcnode-id="8705" instrument_node="">FDAS – Fire Detection &amp; Alarm System</span><br data-dcnode-id="8704"><span data-dcnode-id="8703" instrument_node="">Sound Alarm – not less than 85 decibels</span><br data-dcnode-id="8702"><span data-dcnode-id="8701" instrument_node="">Strobe Lights – blinkers</span><br data-dcnode-id="8700"><span data-dcnode-id="8699" instrument_node="">Dry Standpipe – orifice 1 ½; connect hose from firetruck to connect to sprinklers</span><br data-dcnode-id="8698"><span data-dcnode-id="8697" instrument_node="">Wet Standpipe – inlet w/ 4inches orifice; has water; mandatory to bldg w/ occupant load of &gt;/= 1000;</span><br data-dcnode-id="8696"><span data-dcnode-id="8695" instrument_node="">4storey &amp; above; school, hospital, detention &amp; correctional</span></p><p data-dcnode-id="8693"></p><h2 data-dcnode-id="8691"><span data-dcnode-id="8692" instrument_node="">FIRE EXTINGUISHERS FOR DIFFERENT TYPES OF CLASS A HAZARDS</span></h2><p data-dcnode-id="8690"></p><p data-dcnode-id="8689"></p><h2 data-dcnode-id="8687"><span data-dcnode-id="8688" instrument_node="">TYPE OF                      MIN.                     MAX. TRAVEL                MAX. AREA</span></h2><br data-dcnode-id="8686"><span data-dcnode-id="8685" instrument_node="">HAZARD                       EXTINGUISHER             DISTANCE TO                (OPEN AREA) PER</span><br data-dcnode-id="8684"><span data-dcnode-id="8683" instrument_node="">                             RATING                   EXTINGUISHER               EXTINGUISHER</span><br data-dcnode-id="8682"><span data-dcnode-id="8681" instrument_node="">                                                      (m)                        (m2)</span><p data-dcnode-id="8680"></p><p data-dcnode-id="8679"></p><h2 data-dcnode-id="8677"><span data-dcnode-id="8678" instrument_node="">Low                          2-A                      15                         200</span></h2><p data-dcnode-id="8676"></p><p data-dcnode-id="8675"></p><h2 data-dcnode-id="8673"><span data-dcnode-id="8674" instrument_node="">Moderate                     3-A                      12                         100</span></h2><br data-dcnode-id="8672"><span data-dcnode-id="8671" instrument_node="">High                         4-A                      10                         75</span><p data-dcnode-id="8670"></p><p data
