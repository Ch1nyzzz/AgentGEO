n data-dcnode-id="2927" instrument_node="">SEC. 15. Annual Report. – The BFP and the BJMP through the DILG and the DBM shall jointly submit to the</span><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">President of the Senate and the Speaker of the House of Representatives an annual report on the</span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">implementation of this Act. This report shall include information on the application of the budget for the</span><br data-dcnode-id="2922"><span data-dcnode-id="2921" instrument_node="">salary and other benefits provided under this Act. The DBM, in consultation with the BFP and the BJMP</span><br data-dcnode-id="2920"><span data-dcnode-id="2919" instrument_node="">though the DILG, shall periodically review and adjust every five (5) years the rates of base pay, taking into</span><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">consideration labor productivity, consumer price index, oil price and other similar economic indicators as</span><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">may be determined by the National Economic and Development authority (NEDA).</span><br data-dcnode-id="2914"><span data-dcnode-id="2913" instrument_node="">SEC. 16. Separability Clause.- If any portion or provision of this Act is declared unconstitutional, the same</span><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">shall not affect the validity and effectivity of the other provisions not affected thereby.</span><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">SEC. 17. Repealing Clause. – All laws, decrees, orders, rules and regulations, and other issuances, or parts</span><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">thereof, which are inconsistent with the provisions of this Act, are hereby deemed repealed, amended or</span><br data-dcnode-id="2906"><span data-dcnode-id="2905" instrument_node="">modified accordingly.</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">SEC. 18. Effectivity. – This Act shall take effect fifteen (15) days after its complete publication in the Official</span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">Gazette or in at least two (2) newspapers of general circulation, whichever comes earlier.</span></p><p data-dcnode-id="2892"><span data-dcnode-id="2899" instrument_node="">        Approved,</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">     FRANKLIN DRILON                    JOSE DE VENECIA JR.</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">   President of the Senate             Speaker of the House of</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">                                          Representatives</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2891" instrument_node="">This Act which is a consolation of Senate Bill No. 2373 and House Bill No. 6557 was finally passed</span><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">by the Senate and the House of Representatives on January 29, 2004 and February 2, 2004,</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">respectively.</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">       OSCAR G. YABES                  ROBERTO P. NAZARENO</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">f     Secretary of Senate       Secretary General</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node="">                             House of Represenatives</span></p><p data-dcnode-id="2879"></p><h2 data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">       Approved: March 10, 2004</span></h2><br data-dcnode-id="2876"><span data-dcnode-id="2875" instrument_node="">                                  GLORIA MACAPAGAL-ARROYO</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">                                   President of the Philippines</span><p data-dcnode-id="2872"></p><p data-dcnode-id="2871"></p><h2 data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">RA 9592 and its IRR</span></h2><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">f       RULES AND REGULATIONS IMPLEMENTING REPUBLIC ACT NO. 9592, AN ACT EXTENDING FOR FIVE</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">(5) YEARS THE REGLEMENTARY PERIOD FOR COMPLYING WITH THE MINIMUM EDUCATIONAL</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">QUALIFICATION AND APPROPRIATE ELIGIBILITY IN THE APPOINTMENT TO THE BUREAU OF FIRE</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">PROTECTION (BFP) AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), AMENDING FOR</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 9263, OTHERWISE KNOWN AS THE “BUREAU</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">OF FIRE PROTECTION AND BUREAU OF JAIL MANAGEMENT AND PENOLOGY PROFESSIONALIZATION ACT</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">OF 2004” AND FOR OTHER PURPOSES</span><p data-dcnode-id="2854"></p><p data-dcnode-id="2846"><span data-dcnode-id="2853" instrument_node="">        Pursuant to Section 3 of Republic Act No. 9592 which took effect on May 27, 2009, the Department</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">of the Interior and Local Government, in coordination with the Bureau of Fire Protection, the Bureau of Jail</span><br data-dcnode-id="2850"><span data-dcnode-id="2849" instrument_node="">Management and Penology, the Civil Service Commission and the Commission on Higher Education (CHED),</span><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">hereby adopts and promulgates the following implementing rules and regulations:</span></p><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">                                                           RULE I</span></p><p data-dcnode-id="2843"></p><h2 data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">                    QUALIFICATIONS FOR INITIAL APPOINTMENT TO THE BFP AND THE BJMP</span></h2><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">                    AND AMENDMENTS TO THE EDUCATION AND ELIGIBILITY REQUIREMENTS</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">                                FOR INCUMBENT UNIFORMED PERSONNEL</span><p data-dcnode-id="2836"></p><p data-dcnode-id="2835"></p><h2 data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">SECTION 1. GENERAL QUALIFICATIONS FOR APPOINTMENT</span></h2><p data-dcnode-id="2832"></p><p data-dcnode-id="2831"></p><h2 data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">                                                  Initial Appointment – No person shall be appointed as</span></h2><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">           uniformed personnel of the BFP and the BJMP unless he/she possesses the following minimum</span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">           qualifications:</span><p data-dcnode-id="2824"></p><p data-dcnode-id="2823"></p><h2 data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">          A citizen of the Republic of the Philippines;</span></h2><p data-dcnode-id="2820"></p><p data-dcnode-id="2819"></p><h2 data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">          A person of good moral character;</span></h2><p data-dcnode-id="2816"></p><p data-dcnode-id="2812"><span data-dcnode-id="2815" instrument_node="">          Must have passed the psychiatric/psychological, drug and physical tests for the purpose of</span><br data-dcnode-id="2814"><span data-dcnode-id="2813" instrument_node="">           determining his/her physical and mental health;</span></p><p data-dcnode-id="2811"></p><h2 data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">          Must possess a baccalaureate degree from a recognized institution of learning;</span></h2><p data-dcnode-id="2808"></p><p data-dcnode-id="2807"></p><h2 data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">          Must possess the appropriate civil service eligibility;</span></h2><p data-dcnode-id="2804"></p><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">          Must not have been dishonorably discharged or dismissed for cause from previous employment;</span></p><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">          Must not have been convicted by final judgment of an offense or crime involving moral turpitude;</span></p><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">          Must not be less than twenty-one (21) nor more than thirty (30) years of age;</span></p><p data-dcnode-id="2786"><span data-dcnode-id="2797" instrument_node="">          Must be at least one meter and sixty-two centimeters (1.62 m.) in height for male, and one meter</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">           and fifty-seven centimeters (1.57 m.) for female; Provided, that a waiver for height and age</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">           requirements shall be automatically granted to applicants belonging to the cultural communities;</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">           and</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">f      Must weigh not more or less than five kilograms (5 kgs.) from the standard weight corresponding to</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">       his/her height, age and sex.</span></p><p data-dcnode-id="2785"></p><h2 data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">              The above-enumerated qualifications shall be continuing in character, except for paragraph</span></h2><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">       8, and an absence of any one of them at any given time shall be a ground for separation or</span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node="">       retirement from the service.</span><p data-dcnode-id="2778"></p><p data-dcnode-id="2772"><span data-dcnode-id="2777" instrument_node="">       B. Incumbent Uniformed Personnel – All incumbent uniformed personnel of the BFP and the BJMP</span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node="">       shall continuously possess the qualifications under Section 1 paragraph A of this IRR, subject to the</span><br data-dcnode-id="2774"><span data-dcnode-id="2773" instrument_node="">       following:</span></p><p data-dcnode-id="2764"><span data-dcnode-id="2771" instrument_node="">                    Uniformed personnel who are already in the service prior to the effectivity of</span><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">                   Republic Act No. 9263 shall be given another five (5) years to obtain the minimum</span><br data-dcnode-id="2768"><span data-dcnode-id="2767" instrument_node="">                   educational qualification and appropriate civil service eligibility to be reckoned from</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">                   May 27, 2009, the date of the effectivity of Republic Act No. 9592;</span></p><p data-dcnode-id="2763"></p><h2 data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">                    Incumbent uniformed personnel who have acquired NAPOLCOM eligibility prior to</span></h2><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">                   the effectivity of Republic Act No. 9263 shall be considered to have complied with the</span><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">                   appropriate civil service eligibility;</span><p data-dcnode-id="2756"></p><p data-dcnode-id="2738"><span data-dcnode-id="2755" instrument_node="">                    BFP and BJMP uniformed personnel who do not meet the minimum educational</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">                   qualification and eligibility requirement, but have rendered more than fifteen (15) years</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">                   of service at the time of the effectivity of Republic Act No. 9592 shall no longer be</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">                   required to comply with the aforementioned educational and eligibility requirements.</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">                   However, they shall not be qualified for promotion to the next higher rank via regular</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">                   promotion unless they have complied with the educational and eligibility requirements.</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">                   Nevertheless, they shall be exempted from Section 14, Rule VII and Section 14, Rule XVI</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">                   of the IRR of RA 9263 or the attrition provision of the law if not promoted within a</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">                   period of ten (10) consecutive years;</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2737" instrument_node="">                    Similarly, incumbent BFP and BJMP uniformed personnel with first level civil service</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">                   eligibility prior to Republic Act No. 9263, shall be appointed in permanent status,</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">                   provided they met the other requirements of the rank;</span></p><p data-dcnode-id="2712"><span data-dcnode-id="2731" instrument_node="">                    After the lapse of the five-year reglementary period given to those who have served</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">                   the BFP or the BJMP for fifteen (15) years or less upon the effectivity of Republic Act</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">                   No. 9592, current BFP and BJMP uniformed personnel who still fail to satisfy any of the</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">                   aforementioned requirements shall be separated from the service if they are below fifty</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">                   (50) years of age and have served in the government for less than twenty (20) years, or</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">                   retired if they are from age fifty (50) and above and have served in the government for</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">                   at least twenty (20) years without prejudice in either case to the payment of benefits</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">                   they may be entitled to under existing laws; Provided, that personnel who have served</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">                   the government for at least twenty (20) years but whose age is less than fifty (50) may</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">                   avail of optional retirement.</span></p><p data-dcnode-id="2700"><span data-dcnode-id="2711" instrument_node="">SECTION 2. WAIVER FOR INITIAL APPOINTMENT TO THE BFP AND THE BJMP</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">f8.                                          Waiver for height and age, requirement shall be</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">automatically granted by the Chief, BFP and the Chief, BJMP to applicants belonging to the cultural</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">communities; Provided, that applicants who belong to cultural communities must submit proof of</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">their membership in a particular cultural minority as certified by the National Commission on</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">Indigenous People (NCIP) or the Office of Muslim Affairs (OMA).</span></p><p data-dcnode-id="2699"></p><h2 data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">9.                                         In all other cases, as may be determined and upon</span></h2><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">recommendation of the BFP Personnel Selection Board in the Regions or the National</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">Headquarters, waiver of age and height requirement may be granted by the Chief, BFP to applicants</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">who possess any of the following:</span><p data-dcnode-id="2690"></p><p data-dcnode-id="2684"><span data-dcnode-id="2689" instrument_node="">           </span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">           Outstanding scholastic accomplishments, such as being honor graduates, consistent</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">           academic scholars, board/bar topnotchers and the like;</span></p><p data-dcnode-id="2676"><span data-dcnode-id="2683" instrument_node="">           </span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">           Possession of special skills in fire suppression, fire prevention, knowledge and skill in</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">           operation of heavy equipment, such as aerial ladder, squirt, lighting tower truck, rescue</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">           tender and other apparatus and equipment, rescue and emergency medical services;</span></p><p data-dcnode-id="2672"><span data-dcnode-id="2675" instrument_node="">           </span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">           Holder of professional driver’s license with 2 and 3 restriction code;</span></p><p data-dcnode-id="2666"><span data-dcnode-id="2671" instrument_node="">           </span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">           Mechanic with TESDA mechanic trade test certificate with expertise in pump operation,</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">           auto diesel engine and auto electrical troubleshooting; or</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2665" instrument_node="">           </span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">           Other skills that will sustain the traditions/other demands of the uniformed service.</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2661" instrument_node="">Waiver for age and height requirements may only be granted by the Chief, BJMP upon the</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">recommendation of the National or the Regional Recruitment and Selection Board (NRSB/RRSB).</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">The recipient of a waiver in the BJMP shall possess any redeeming qualification, professional</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">competence or skill like:</span></p><p data-dcnode-id="2653"></p><h2 data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">      Outstanding scholastic accomplishments, such as being honor graduates, consistent</span></h2><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">       academic scholars, board/bar topnotchers and the like;</span><p data-dcnode-id="2648"></p><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">      Possessing a technical skill needed by the BJMP as may be identified by the NRSB/RRSB;</span></p><p data-dcnode-id="2645"></p><h2 data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">      Possessing experience of value to the BJMP as may be identified by the NRSB/RRSB; or</span></h2><p data-dcnode-id="2642"></p><p data-dcnode-id="2641"></p><h2 data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">      Possessing an educational qualification higher than or in addition to, the requisite</span></h2><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">f                educational or academic requirement.</span><p data-dcnode-id="2636"></p><p data-dcnode-id="2630"><span data-dcnode-id="2635" instrument_node="">        Provided, that waiver under Section 2 paragraph B hereof may be granted only when the number of</span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">        qualified applicants falls below the minimum quota, except in cases where an applicant with waiver</span><br data-dcnode-id="2632"><span data-dcnode-id="2631" instrument_node="">        possesses superior qualifications.</span></p><p data-dcnode-id="2629"></p><h2 data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">        10.                                          Waiver of age requirement under Section 2 paragraph</span></h2><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">        B hereof may be granted provided that the applicant shall not be over thirty-five (35) years of age.</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">        For purposes of this paragraph, one is considered to be not over thirty-five (35) years old if he/she</span><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">        has not yet reached his or her thirty-sixth (36 th) birthday on the date of the effectivity of his/ her</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">        appointment; Provided, that in case an applicant was previously with the government service, the</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node="">        age difference when the number of years in the government is subtracted from his/ her actual age</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">        at the time of appointment must not exceed forty (40) years; Provided, finally, that his/her previous</span><br data-dcnode-id="2614"><span data-dcnode-id="2613" instrument_node="">        separation from the government service was not for cause;</span><p data-dcnode-id="2612"></p><p data-dcnode-id="2611"></p><h2 data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">        11.                                        Waiver of height requirement under Section 2</span></h2><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">        paragraph B hereof may be granted only to a male applicant who is at least 1 meter and 57</span><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">        centimeters (1.57m) and to a female applicant who is at least 1 meter and 52 centimeters (1.52m);</span><br data-dcnode-id="2604"><span data-dcnode-id="2603" instrument_node="">        and</span><p data-dcnode-id="2602"></p><p data-dcnode-id="2601"></p><h2 data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">        12.                                          The height and age requirements shall only be waived</span></h2><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">        subject to the condition that the applicant meets and possesses all other qualification standards.</span><p data-dcnode-id="2596"></p><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">                                                   RULE II</span></p><p data-dcnode-id="2593"></p><h2 data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">                             AMENDMENTS TO PROMOTION REQUIREMENTS</span></h2><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node="">                               OF BFP AND BJMP UNIFORMED PERSONNEL</span><p data-dcnode-id="2588"></p><p data-dcnode-id="2576"><span data-dcnode-id="2587" instrument_node="">SECTION 3. RATIONALIZED PROMOTION SYSTEM – The DILG through the recommendation of the BFP and</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">the BJMP shall establish a system of promotion for uniformed personnel of the BFP and the BJMP which</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">shall be based on merit and fitness in consonance with the Civil Service Law and Rules and on the</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">availability of vacant ranks in the BFP and the BJMP staffing pattern. Such system shall be gender-fair and</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">shall ensure that all members of the Fire Bureau and the Jail Bureau shall enjoy equal opportunity for</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">promotion.</span></p><p data-dcnode-id="2572"><span data-dcnode-id="2575" instrument_node="">SECTION 4. MODES OF PROMOTION – The two (2) modes of promotion in the BFP and the BJMP are as</span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">follows:</span></p><p data-dcnode-id="2556"><span data-dcnode-id="2571" instrument_node="">        A. Regular Promotion – Any uniformed personnel of the BFP and the BJMP who has met the</span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">        minimum qualifications for a rank which shall include education, experience, training, and</span><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">        appropriate civil service eligibility, and has satisfactorily passed the required</span><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">        psychiatric/psychological, drug and physical tests shall be eligible for promotion to the next higher</span><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">        rank. For purposes of the eligibility requirement, BFP and BJMP personnel who have obtained</span><br data-dcnode-id="2562"><span data-dcnode-id="2561" instrument_node="">        NAPOLCOM eligibility prior to the effectivity of Republic Act No. 9263, hereunder classified, shall be</span><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">        considered to have complied with the appropriate civil service eligibility requirement.</span><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node="">f              Holders of the following NAPOLCOM eligibilities may apply for promotion:</span></p><p data-dcnode-id="2555"></p><h2 data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">                                 UP TO THE RANK OF SFO4/SJO4</span></h2><p data-dcnode-id="2552"></p><p data-dcnode-id="2516"><span data-dcnode-id="2551" instrument_node="">                              Patrolman (CC)/(MN)</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">                              Patrolman Entrance (CC)/(MN)</span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">                              Patrolwoman (CC)/(MN)</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">                              INP Entrance</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">                              Patrolman First Class (CC)/(MN)</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">                              Police Corporal (CC)/(MN)</span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">                              Police Officer</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">                              Police Officer II</span><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">                              Police Officer III</span><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">                              PNP Entrance</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">                              Senior Police Officer I</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">                              Senior Police Officer II</span><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">                              Senior Police Officer III</span><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">                              Police Sergeant (CC)/(MN)</span><br data-dcnode-id="2524"><span data-dcnode-id="2523" instrument_node="">                              Police Officer Third Class (PO 3rd Class)</span><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">                              Fire Officer Third Class (FO 3rd Class)</span><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">                              Senior Police Officer IV</span><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">                              Senior Police Officer</span></p><p data-dcnode-id="2515"></p><h2 data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">       UP TO THE RANK OF INSPECTOR</span></h2><p data-dcnode-id="2512"></p><p data-dcnode-id="2511"></p><h2 data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">              Police Lieutenant (CC)/(MN)</span></h2><br data-dcnode-id="2508"><span data-dcnode-id="2507" instrument_node="">              Police Inspector (taken April 28, 1991 and November 24, 1991)</span><p data-dcnode-id="2506"></p><p data-dcnode-id="2505"></p><h2 data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">       UP TO THE RANK OF SENIOR INSPECTOR</span></h2><p data-dcnode-id="2502"></p><p data-dcnode-id="2501"></p><h2 data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">                              Police Captain (CC)/(MN)</span></h2><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node="">                              Police Officer Second Class (PO 2nd Class)</span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">                              Fire Officer Second Class (FO 2nd Class)</span><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">                              Police Senior Inspector</span><p data-dcnode-id="2492"></p><p data-dcnode-id="2491"></p><h2 data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">       UP TO THE RANK OF CHIEF INSPECTOR</span></h2><p data-dcnode-id="2488"></p><p data-dcnode-id="2487"></p><h2 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">              Police Major (CC)/(MN)</span></h2><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">              Police Chief Inspector</span><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">              Police Inspector (taken April 26, 1992 to April 03, 2004)</span><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">f       UP TO THE RANK OF SUPERINTENDENT</span><p data-dcnode-id="2478"></p><p data-dcnode-id="2477"></p><h2 data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">                  Police Lt/Colonel (CC)/(MN)</span></h2><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node="">                  Police Colonel (CC)/(MN)</span><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">                  Police Superintendent (taken on April 28, 1991 &amp; November 24, 1991)</span><p data-dcnode-id="2470"></p><p data-dcnode-id="2469"></p><h2 data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">       UP TO THE RANK OF SENIOR SUPERINTENDENT</span></h2><p data-dcnode-id="2466"></p><p data-dcnode-id="2465"></p><h2 data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">              Deputy Chief of Police (CC)/(MN)</span></h2><br data-dcnode-id="2462"><span data-dcnode-id="2461" instrument_node="">              Chief of Police (CC)/(MN)</span><p data-dcnode-id="2460"></p><p data-dcnode-id="2459"></p><h2 data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">       UP TO THE HIGHEST RANK</span></h2><p data-dcnode-id="2456"></p><p data-dcnode-id="2455"></p><h2 data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">              Police Officer First Class (PO 1st Class)</span></h2><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">              Fire Officer First Class (FO 1st Class)</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">              Police Superintendent (taken on April 26, 1992 to April 3, 2004)</span><p data-dcnode-id="2448"></p><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">        B. Special Promotion</span></p><p data-dcnode-id="2440"><span data-dcnode-id="2445" instrument_node="">              Meritorious Promotion - Any uniformed personnel of the BFP and the BJMP who has</span><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">               exhibited acts of conspicuous courage and gallantry at the risk of his/her life above and</span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">               beyond the call of duty shall be promoted to the next higher rank;</span></p><p data-dcnode-id="2434"><span data-dcnode-id="2439" instrument_node="">              Special Promotion based on awards - BFP and BJMP personnel selected for an award in a</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">               nationwide search conducted by any accredited civic organization shall be promoted to the</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">               next higher rank;</span></p><p data-dcnode-id="2433"></p><h2 data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">              On-the-spot promotion - a special promotion granted instantaneously at or near the scene</span></h2><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node="">               of an incident or occurrence or at any place immediately thereafter to any BFP or BJMP</span><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node="">               uniformed personnel who has exhibited acts of conspicuous courage and gallantry at the</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node="">               risk of his or her life above and beyond the call of duty conferred by an appointing authority</span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">               such as Regional Director of the BFP and the BJMP or Chief, BFP and Chief, BJMP as the case</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">               may be, DILG Undersecretary for Public Safety, DILG Secretary or the President of the</span><br data-dcnode-id="2420"><span data-dcnode-id="2419" instrument_node="">               Republic of the Philippines according to his/her sound judgment or discretion which require</span><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node="">               no further evaluation by the Promotions Board;</span><p data-dcnode-id="2416"></p><p data-dcnode-id="2408"><span data-dcnode-id="2415" instrument_node="">              Posthumous Promotion –any BFP or BJMP uniformed personnel who die in line of duty but</span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node="">               eligible for optional retirement should be given rank promotion.</span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">f               All modes of special promotion shall be validated by the DILG and the CSC based on</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">       respective BFP and BJMP established criteria as mandated by existing law.</span></p><p data-dcnode-id="2398"><span data-dcnode-id="2407" instrument_node="">               Considering the peculiar nature of special promotion, qualification standards (QS) for</span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">       various ranks as approved by the CSC shall not apply. In lieu thereof, specific guidelines for special</span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">       promotion shall be prepared by the BFP and the BJMP in close coordination with the DILG and the</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">       CSC. The guidelines may be amended to conform to the existing conditions and/or when such</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">       amendment will serve greater public interest.</span></p><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">                                                 RULE III</span></p><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">                                            FINAL PROVISIONS</span></p><p data-dcnode-id="2388"><span data-dcnode-id="2393" instrument_node="">SECTION 5. SEPARABILITY CLAUSE – If for any reason, any provision hereof is declared to be</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">unconstitutional or invalid, the other sections or provision hereof which are not affected thereby shall</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">continue to be in full force and effect.</span></p><p data-dcnode-id="2382"><span data-dcnode-id="2387" instrument_node="">SECTION 6. REPEALING CLAUSE – All laws, decrees, memorandum circulars, resolutions, orders and other</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">issuances or parts thereof which are inconsistent with Republic Act No. 9592 and with these Implementing</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">Rules and Regulations are hereby repealed, amended or modified accordingly.</s
