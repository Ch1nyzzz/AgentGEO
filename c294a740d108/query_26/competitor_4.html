</span><div class="dslc-code-empty-title dslc-clearfix" data-dcnode-id="864"><h1 class="entry-title dslc-modules-section-wrapper" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Fire Suppression Systems</span></h1></div><span data-dcnode-id="863" instrument_node=""> </span><div class="left-wrapper" data-dcnode-id="778"><span data-dcnode-id="862" instrument_node="">
</span><article class="post-2045 page type-page status-publish hentry" data-dcnode-id="781" id="post-2045"><span data-dcnode-id="861" instrument_node="">
</span><div class="entry-content" data-dcnode-id="784"><span data-dcnode-id="860" instrument_node="">
</span><div class="dslc-content dslc-clearfix" data-dcnode-id="786" id="dslc-content"><div data-dcnode-id="787" id="dslc-main"><span data-dcnode-id="859" instrument_node="">
</span><div class="dslc-modules-section" data-dcnode-id="789" style=""><span data-dcnode-id="858" instrument_node="">
</span><div class="dslc-modules-section-wrapper dslc-clearfix" data-dcnode-id="790"><span data-dcnode-id="857" instrument_node=""> </span><div class="dslc-modules-area dslc-col dslc-12-col dslc-last-col" data-dcnode-id="792" data-size="12"><span data-dcnode-id="856" instrument_node="">
</span><div class="dslc-module-front dslc-module-DSLC_Text_Simple dslc-in-viewport-check dslc-in-viewport-anim-none dslc-col dslc-12-col dslc-last-col dslc-module-handle-like-regular dslc-in-viewport" data-dcnode-id="795" data-dslc-anim="none" data-dslc-anim-delay="0" data-dslc-anim-duration="650" data-dslc-anim-easing="ease" data-dslc-module-id="DSLC_Text_Simple" data-dslc-module-size="12" data-dslc-preset="none" data-module-id="178" id="dslc-module-178" style="animation: 0.65s ease 0s 1 normal none running forwards;"><span data-dcnode-id="855" instrument_node="">
</span><div class="dslc-text-module-content" data-dcnode-id="797"><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Automatic kitchen fire suppression systems are intended to control and extinguish fires without human intervention. A well designed and working kitchen fire suppression system can keep a small fire from becoming a big fire, often saving lives and property.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">A well designed and maintained kitchen fire suppression system is a critical necessity if you own a bar, restaurant, food truck or food trailer. Fortunately, All Florida Fire Equipment is the recognized expert in the greater Tampa area for designing and maintaining kitchen fire suppression systems that will protect your business.</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Annually, there are over 8,000 fires that occur at restaurants and bars, which results in excess of $245 million in property damage each year. The majority of these fires are caused by equipment used during the cooking of food. The push to lower fat in our food has resulted in increased use of vegetable oil for cooking. While healthier, vegetable oil burns at a higher temperature, making ‘grease’ fires harder to extinguish.&nbsp;</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">As a result, kitchen fire protection systems have evolved to using a ‘wet chemical’ system, as recommended by the UL 300 compliance guide for modern kitchens.&nbsp; The wet chemical system has the advantage of not only smothering the fire but also cooling the area to keep the fire from reigniting. All Florida Fire Equipment has the expertise needed to design, install and maintain the most effective and efficient system for your restaurant or bar.</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">As is the case with all fire protection products, your kitchen fire suppression system must be maintained in tip-top share in order to be effective. In fact, Florida law requires that your fire suppression system is inspected semi-annually.</span></p><h2 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">All Florida Fire Equipment sells, inspects and services a wide variety of pre-engineered kitchen fire suppression systems.&nbsp;</span></h2><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Fire suppression systems for restaurants and bars have stringent code requirements, and we can help you be certain your business is in compliance with local requirements. &nbsp;Our mobile team of technicians will come to your location to provide you with the best in service and support.</span></p><p data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">If you are anywhere in the Tampa, St. Petersburg, Clearwater, Lakeland, Largo, Sarasota, or Bradenton areas, we are just a phone call or email away. Call us at 727-525-5950, or email us at </span><a data-dcnode-id="838" href="mailto:service@allfloridafire.com"><span data-dcnode-id="839" instrument_node="">service@allfloridafire.com</span></a><span data-dcnode-id="837" instrument_node="">. If you prefer, fill out our easy Contact Us form, and we’ll reach out to you.</span></p><h2 data-dcnode-id="829"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Here are some of the systems we service and install</span></strong><span data-dcnode-id="833" instrument_node="">:</span><img align="right" alt="system" class="entered lazyloaded" data-dcnode-id="832" data-lazy-src="https://allfloridafire.com/wp-content/uploads/2014/01/system.gif" data-ll-status="loaded" height="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allfloridafire.com/wp-content/uploads/2014/01/system.gif&amp;raw" vspace="0" width="424"><noscript data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&lt;img class="" src="https://allfloridafire.com/wp-content/uploads/2014/01/system.gif" alt="system" width="424" height="273" align="right" vspace="0"&gt;</span></noscript></h2><h3 data-dcnode-id="807"><span data-dcnode-id="828" instrument_node="">• Ansul R-102 UL-300 Restaurant Fire Suppression System (Ansul Fire System)</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node=""> • Amerex Hood Fire Suppression Systems (KP,ZD,IS)</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node=""> • Buckeye Kitchen Mister UL300 Hood Fire System</span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node=""> • Kidde WHDR UL300 Kitchen Hood Suppression System</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node=""> • Range Guard Commercial Fire Suppression System</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">• Pem All Fire Suppression System</span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">• Protex Fire Suppression Systems</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">• PyroChem Suppression Systems (PCL)</span><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">• Fireboy</span><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">• Seafire</span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">• Guardian Residential Fire Suppression Systems</span></h3><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">We are the Tampa Bay Areas experts on Ansul Fire Systems. We install, inspect, maintain and repair Ansul Fire Systems as well as all other types and brands of pre-engineered fire systems.</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Below is an example of a properly laid out kitchen fire suppression system and extinguishers.&nbsp;</span></p><p data-dcnode-id="798"><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allfloridafire.com/wp-content/uploads/2020/01/Kitchen-Hood-Fire-Suppression-System.jpg"><img alt="" class="aligncenter wp-image-3853 size-full entered lazyloaded" data-dcnode-id="802" data-lazy-src="https://allfloridafire.com/wp-content/uploads/2020/01/Kitchen-Hood-Fire-Suppression-System.jpg" data-ll-status="loaded" height="1060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allfloridafire.com/wp-content/uploads/2020/01/Kitchen-Hood-Fire-Suppression-System.jpg&amp;raw" width="1400"><noscript data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">&lt;img class="aligncenter wp-image-3853 size-full" src="https://allfloridafire.com/wp-content/uploads/2020/01/Kitchen-Hood-Fire-Suppression-System.jpg" alt="" width="1400" height="1060"&gt;</span></noscript></a></p></div><span data-dcnode-id="796" instrument_node="">
