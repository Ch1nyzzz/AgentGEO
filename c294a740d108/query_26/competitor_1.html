tnoir.eu/?index=cw22&amp;url=https%3A//www.totalfire.com.au/contact-us.html" id="menu-item-241155" target="_self"><span data-dcnode-id="340" instrument_node="">Contact Us</span></a></li></ul></div><div class="clearfloat" data-dcnode-id="335"></div></div></div></div><div class="col-md-1 col-sm-12 col-xs-12 secnav" data-dcnode-id="330"><img alt="Total Fire Solutions" data-dcnode-id="331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.cdn.thewebconsole.com/S3WEB8223/l/secnav.png&amp;raw" usemap="#Map"></div><div class="clearfloat" data-dcnode-id="329"></div></div></div><div class="clearfloat" data-dcnode-id="326"></div></div></div></div></header><section class="main-con-bg-in" data-dcnode-id="202"><div class="container" data-dcnode-id="203"><div class="row" data-dcnode-id="204"><div class="wow fadeInUp" data-dcnode-id="206" id="cmsbody" style="visibility: visible; animation-name: fadeInUp;"><div class="container-empty twc-container" data-dcnode-id="207" id="defaultTwcPageContainer"><div class="column" data-dcnode-id="208" id="ef6efe93e" style="position:relative;"><div class="section-container" data-dcnode-id="209" id="section-container-ef6efe93e"><div class="section-container-inner container columns lazyloaded" data-bg="" data-dcnode-id="210" style="padding: 0px 15px;"><div class="row twc-section-row" data-dcnode-id="211"><div class="col-md-12 col-xs-12 sec-md twc-flexed-child column twc-section-col column-1" data-dcnode-id="212" id="ef6efe93e-container-1"><div class="twc-container twc-section-col-inner dropzone container-empty lazyloaded" data-bg="" data-dcnode-id="213"><div class="heading" data-dcnode-id="316" id="e4b576121" style="position:relative;"><div class="header-component" data-dcnode-id="317"><h1 data-dcnode-id="318" style="display:inline-block;margin:0px;padding:0px;background:none;text-indent:0;border:0;"><span data-dcnode-id="319" instrument_node="">Fire Suppression Systems</span></h1></div></div><div class="text" data-dcnode-id="309" id="e6f46f56d" style="position:relative;"><div class="text-module-container" data-dcnode-id="310" id="text-module-container-e6f46f56d"><div data-dcnode-id="311"><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">
 A fire suppression system has three functions: efficient detection of a fire, appropriate reaction to the size and type of fire, and effective application of an agent to suppress and extinguish the fire.</span></p><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">
 Total Fire Solutions are experienced in designing, installing and maintaining effective fire suppression systems that comply with Australian Fire Protection Standards and protect your plant equipment, premises and employees. We design, install and manage both fixed and portable fire supression systems.&nbsp;</span></p></div></div></div><div class="heading" data-dcnode-id="305" id="e679ce3d9" style="position:relative;"><div class="header-component" data-dcnode-id="306"><h2 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">What is a Fire Suppression System?</span></h2></div></div><div class="text" data-dcnode-id="278" id="eff0e39c5" style="position:relative;"><div class="text-module-container" data-dcnode-id="279" id="text-module-container-eff0e39c5"><div data-dcnode-id="280"><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">
 A fire suppression system is an engineered system that includes built-in components that detect fires. They're used to prevent fires in plant equipment or buildings. These systems may combine dry chemicals, inert gases and water and foam solutions to suppress fires.</span></p><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">
 Suppression systems offer a wide range of protection levels which are not found with traditional fire sprinkler systems. There are five (5) different types of suppression systems:</span></p><h3 data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">
 1. Environmentally friendly Foam Deluge System</span></h3><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">
 For chemical or fuel fires where using water would be hazardous. A foam/water mix provides blanket cover.</span></p><h3 data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">
 2. Dry chemical</span></h3><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">
 Releases a dry chemical powder to extinguish the fire. Often used in overhead applications to protect large areas with multiple and varying obstacles .</span></p><h3 data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">
 3. Water Mist Systems</span></h3><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">
 Improves traditional water sprinkler systems by producing ultra-fine water droplets. Used typically in closed areas to control Class C gas fires or high flow nozzles typically used to protect oil filled high voltage transformers.</span></p><h3 data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">
 4. Gaseous systems also known as "Clean Agent" systems</span></h3><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">
 Typically used in computer and switch rooms with sensitive equipment that may be ruined by water. They reduce oxygen levels to smother or react chemically to break the combustion chain reaction.</span></p><h3 data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">
 5. Early warning detection systems</span></h3><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">
 Uses infrared technology or air sampling systems most typically in sensitive areas to allow early, targeted action, such as shutting down the power to the area and the subsequent controlled discharge of the agent.</span></p></div></div></div><div class="heading" data-dcnode-id="274" id="e3cea0d89" style="position:relative;"><div class="header-component" data-dcnode-id="275"><h2 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Fire Suppression Installation</span></h2></div></div><div class="text" data-dcnode-id="260" id="e984cb202" style="position:relative;"><div class="text-module-container" data-dcnode-id="261" id="text-module-container-e984cb202"><div data-dcnode-id="262"><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">
 Our experienced team of technicians, installers and design specialists follow this process:</span></p><ol data-dcnode-id="263"><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">
  Perform risk-based assessment with all project stakeholders such as engineers, council, site engineers and equipment manufacturers to determine the needs of the area.</span></li><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">
  Identify equipment required for efficient detection, appropriate reaction and effective application.</span></li><li data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">
  Design in-house or with an external fire engineer. Measure performance of the system against design.</span></li><li data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">
  Install system and provide ongoing maintenance.</span></li></ol></div></div></div><div class="heading" data-dcnode-id="256" id="e64d22a9f" style="position:relative;"><div class="header-component" data-dcnode-id="257"><h2 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Fire Equipment Servicing</span></h2></div></div><div class="text" data-dcnode-id="249" id="e349cf2b2" style="position:relative;"><div class="text-module-container" data-dcnode-id="250" id="text-module-container-e349cf2b2"><div data-dcnode-id="251"><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">
 It's important to keep your fire suppression system in top working condition so you can rely on it to respond properly in an emergency. We'll create a regular service schedule to keep your fire suppression equipment and system both compliant and safe.</span></p><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">
 We maintain all fire system brands and OEM equipment and where necessary, we conduct regular equipment updates and maintenance plus carry out any breakdown repairs that may arise.</span></p></div></div></div><div class="heading" data-dcnode-id="245" id="e4e4e2be9" style="position:relative;"><div class="header-component" data-dcnode-id="246"><h2 data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Other Support Services</span></h2></div></div><div class="text" data-dcnode-id="241" id="eeef28fcd" style="position:relative;"><div class="text-module-container" data-dcnode-id="242" id="text-module-container-eeef28fcd"><div data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">A fire suppression system is just part of your company's total fire solution. We've developed a range of support services including risk assessments, evacuation planning and training to help you develop the most comprehensive fire plan possible.</span></div></div></div><div class="heading" data-dcnode-id="237" id="ef9d9314b" style="position:relative;"><div class="header-component" data-dcnode-id="238"><h2 data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Why Total Fire Solutions?</span></h2></div></div><div class="text" data-dcnode-id="222" id="eddf1a514" style="position:relative;"><div class="text-module-container" data-dcnode-id="223" id="text-module-container-eddf1a514"><div data-dcnode-id="224"><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Total Fire Solutions delivers high-quality design, installation and maintenance services of fire protection and safety, specialising in mining and heavy industry.</span></p><p data-dcnode-id="227"><span data-dcnode-id="234" instrument_node="">Our experienced staff of fire protection professionals in </span><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.totalfire.com.au/location/new-south-wales.html"><span data-dcnode-id="233" instrument_
