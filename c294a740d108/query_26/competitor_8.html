</span><div class="span12 widget-span widget-type-custom_widget" data-dcnode-id="825" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="865" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-rich_text widget-type-rich_text" data-dcnode-id="827" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_158763958492401" style=""><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_rich_text" data-dcnode-id="828" data-hs-cos-general-type="widget" data-hs-cos-type="rich_text" id="hs_cos_wrapper_module_158763958492401_" style=""><h3 data-dcnode-id="862"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">On Road Vehicle Fire Protection</span></strong></h3><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="860" instrument_node="">On road vehicle automatic fire suppression systems cover the Bus &amp; Coach sector or passenger vehicle services (PSV). Millions of people rely on this method of transport and is a part of everyday life. This means a large amount of the population is exposed to potential fire risks on a regular basis.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="857" instrument_node="">For more information on transport and logistics automatic fire suppression, please click </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/who-we-protect/transport-and-logistics/" rel="noopener"><span data-dcnode-id="856" instrument_node="">HERE</span></a><span data-dcnode-id="854" instrument_node="">.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="851" instrument_node="">These vehicles contain all the necessary ingredients for fires to not only start but propagate quickly. It is not just the fire itself that poses a threat, the by-products of combustion can quickly take over a bus and impede the safe exit of passengers.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="848" instrument_node="">Protecting life and allowing passengers and operators safe egress is a critical part of any risk assessment for these applications. It is important to know that Installing a Reacton® Automatic Fire Suppression System for buses and coaches will provide a certified solution that has undergone rigorous testing by a globally recognised research institute.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="845" instrument_node="">Detailed investigations from the leading transport authorities &amp; fire protection agencies promote the installation of Automatic Fire Suppression Systems on Buses &amp; Coaches to try to reduce the risk to human life.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="838" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="842" instrument_node="">Such requirements can be seen with accreditations such as the </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/resources/accreditations-and-memberships/" rel="noopener"><span data-dcnode-id="841" instrument_node="">P-Mark SPCR 183</span></a><span data-dcnode-id="839" instrument_node=""> and the mandatory UNECE Regulation 107. Reacton® can fully support these with the wide range of approved systems all scoring the highest pass marks possible.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="836" instrument_node="">With over 800 fires a year being recorded in the U.K alone the integration of an effective </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/how-we-protect/vehicle-fire-suppression-systems/" rel="noopener"><span data-dcnode-id="835" instrument_node="">vehicle fire suppression system</span></a><span data-dcnode-id="833" instrument_node=""> is essential in providing a safe framework to modern transport vehicles.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829" style="font-size: 15px; line-height: 1.15; text-align: justify;"><span data-dcnode-id="830" instrument_node="">The Reacton® vehicle automatic fire suppression systems will detect and deliver the extinguishing agent at the earliest opportunity and minimise the spread of the fire and risk to passengers.</span></p></span></div><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="817" instrument_node="">
</span><div class="row-fluid-wrapper row-depth-1 row-number-44" data-dcnode-id="774"><span data-dcnode-id="816" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="777"><span data-dcnode-id="815" instrument_node="">
</span><div class="span12 widget-span widget-type-custom_widget" data-dcnode-id="780" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="814" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-rich_text widget-type-rich_text" data-dcnode-id="782" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_158763961536803" style=""><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_rich_text" data-dcnode-id="783" data-hs-cos-general-type="widget" data-hs-cos-type="rich_text" id="hs_cos_wrapper_module_158763961536803_" style=""><h4 data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">High Performance Vehicle Fire Suppression Systems</span></strong></h4><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span data-dcnode-id="809" instrument_node="">When protecting your on road applications from fire, your suppression products should meet or exceed the same vehicle testing standards that they were subject to. That is exactly what Reacton® have done.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805" style="line-height: 1.15; font-size: 15px;"><span data-dcnode-id="806" instrument_node="">Our On Road vehicle fire suppression system features include:</span></p><span data-dcnode-id="804" instrument_node="">
</span><ul data-dcnode-id="784" style="font-size: 15px; line-height: 1.5;"><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">System &amp; components tested to ISO 16750-3:2007</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Corrosion resistance to ISO 21207:2016</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Multi Port High Flow Discharge Valve</span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Robust detection system</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Compact systems</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">High performance with low nozzle count</span></li><span data-dcnode-id="785" instrument_node="">
</span></ul></span></div><span data-dcnode-id="781" instrument_node="">

</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-rich_text widget-type-rich_text" data-dcnode-id="713" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_158763958492402" style=""><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_rich_text" data-dcnode-id="714" data-hs-cos-general-type="widget" data-hs-cos-type="rich_text" id="hs_cos_wrapper_module_158763958492402_" style=""><h3 data-dcnode-id="738"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Why Dry Powder </span></strong></h3><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span data-dcnode-id="736" instrument_node="">Whilst Reacton’s product range for On Road vehicle automatic fire suppression is not limited to just Dry Powder for this application, we do realise that Dry Powder is the tried and tested solution for engine fire suppression. Dry Powder or Dry Chemical is an outstanding automatic fire suppression agent due to its rapid-fire knockdown capabilities and its ability to tackle hidden fires that other mediums may not be able to reach.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span data-dcnode-id="733" instrument_node="">The Reacton® CTX Indirect™ fire suppression system utilises FUREX 770 ABC Dry Powder which is a Mono Ammonium Phosphate (NH4H2PO4). Reacton® select a high-grade variant of the ABC Dry Powder that has a high Mono Ammonium Phosphate (MAP) content and is silicone coated for its water repellency and fluidised flow properties. It is stable at extremely high and low temperatures and ideally suited for vehicle fire suppression.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span data-dcnode-id="730" instrument_node="">ABC Dry Powder is an extremely effective firefighting medium and is utilised in areas where the introduction of water-based protection is not ideal. It is electrically non-conductive and therefore can safely protect your electrical hazards along with any Class A or B risks.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span data-dcnode-id="727" instrument_node="">Reacton® have an extensive testing history with Dry Powder and enjoy the safety margins and benefits it provides to our customer base.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="715" style="line-height: 1.15; font-size: 15px; text-align: justify;"><span class="hs-cta-wrapper" data-dcnode-id="717" id="hs-cta-wrapper-faf38ec3-817d-45c4-b5ed-ebc34b2f185e"><span class="hs-cta-node hs-cta-faf38ec3-817d-45c4-b5ed-ebc34b2f185e" data-dcnode-id="721" data-hs-drop="true" id="hs-cta-faf38ec3-817d-45c4-b5ed-ebc34b2f185e" style="visibility: visible;"><a class="cta_button button color-2 empty small" cta_dest_link="https://www.reactonfire.com/contact-us" data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reactonfire.com/cs/c/%3Fcta_guid%3D55bcad9f-fcf1-4457-b132-2ac9d36b8b20%26signature%3DAAH58kFRBcrUx5uJv5niHfQHfxNVREI5WA%26pageId%3D22161737465%26placement_guid%3Dfaf38ec3-817d-45c4-b5ed-ebc34b2f185e%26canon%3Dhttps%253A%252F%252Fwww.reactonfire.com%252Fwhat-we-protect%252Fon-road-vehicles%252F%26portal_id%3D5608552" id="cta_button_5608552_55bcad9f-fcf1-4457-b132-2ac9d36b8b20" style=""><span data-dcnode-id="723" instrument_node="">Contact Us</span></a></span></span></p></span></div><span data-dcnode-id="712" instrument_node="">
