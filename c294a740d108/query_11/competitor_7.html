</span><div class="blog-body" data-dcnode-id="1381" id="339869010639763105-blog" style="float: left;"><span data-dcnode-id="4078" instrument_node="">
</span><div data-dcnode-id="1383" id="wsite-content"><span data-dcnode-id="4077" instrument_node=""> </span><div class="blog-post" data-dcnode-id="3970" id="blog-post-308135561463301032"><span data-dcnode-id="4076" instrument_node="">
</span><div class="blog-header" data-dcnode-id="4059"><span data-dcnode-id="4075" instrument_node="">
</span><h2 class="blog-title" data-dcnode-id="4070"><span data-dcnode-id="4074" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/standpipe-hose-connections-egress-clearance"><span data-dcnode-id="4073" instrument_node="">Standpipe Hose Connections: Egress Clearance</span></a><span data-dcnode-id="4071" instrument_node="">
</span></h2><span data-dcnode-id="4069" instrument_node="">
</span><p class="blog-date" data-dcnode-id="4064"><span data-dcnode-id="4068" instrument_node="">
</span><span class="date-text" data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">
		6/13/2019
	</span></span><span data-dcnode-id="4065" instrument_node="">
</span></p><span data-dcnode-id="4063" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">
</span></p><span data-dcnode-id="4060" instrument_node="">
</span></div><span data-dcnode-id="4058" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">&nbsp;</span></div><span data-dcnode-id="4055" instrument_node="">
</span><div class="blog-content" data-dcnode-id="3977"><span data-dcnode-id="4054" instrument_node="">
</span><div class="paragraph" data-dcnode-id="4047"><span data-dcnode-id="4053" instrument_node="">Hope your week in fire protection is going well.</span><br data-dcnode-id="4052"><br data-dcnode-id="4051"><span data-dcnode-id="4049" style="color:rgb(63, 63, 63)"><span data-dcnode-id="4050" instrument_node="">Standpipes within stairs can be an important item to coordinate with the project architect, as the fix for the lack of coordination can be extremely difficult to accomplish in the field.&nbsp;This week I'm breaking down an enlarged floor plan detail for a standpipe hose connection within a stairwell.</span></span><br data-dcnode-id="4048"></div><span data-dcnode-id="4046" instrument_node=""> </span><div data-dcnode-id="4036"><div class="wsite-image wsite-image-border-none" data-dcnode-id="4037" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="4045" instrument_node=""> </span><a data-dcnode-id="4041"><span data-dcnode-id="4044" instrument_node=""> </span><img alt="Standpipe Hose Connection" data-dcnode-id="4043" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/145-v2-600_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="4042" instrument_node=""> </span></a><span data-dcnode-id="4040" instrument_node=""> </span><div data-dcnode-id="4039" style="display:block;font-size:90%"></div><span data-dcnode-id="4038" instrument_node=""> </span></div></div><span data-dcnode-id="4035" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3979" style="text-align:left;"><br data-dcnode-id="4034"><strong data-dcnode-id="4031"><font data-dcnode-id="4032" size="4"><span data-dcnode-id="4033" instrument_node="">Avoiding the Egress Path</span></font></strong><br data-dcnode-id="4030"><span data-dcnode-id="4029" instrument_node="">The image above shows the clear span that's required to maintain clearance. How do you know the radius of this line? Just take the width of the stair, set the center of your arc to the edge of the stair, and draw your arc from one end of the stair to the other. This is an extension of the required egress of the stair to turn on the landing and move the other direction.</span><br data-dcnode-id="4028"><br data-dcnode-id="4027"><span data-dcnode-id="4026" instrument_node="">Is it possible and allowed to locate small parts of the hose connection within this clear span? There could be a basis for it.&nbsp;</span><br data-dcnode-id="4025"><br data-dcnode-id="4024"><span data-dcnode-id="4023" instrument_node="">In design I try to avoid any controversy by locating both the standpipe and those valve entirely outside of this egress path. Doing so may require a little extra space on the landing, but it is far better than finding out after the stair is constructed that you're short on space.</span><br data-dcnode-id="4022"><br data-dcnode-id="4021"><strong data-dcnode-id="4018" style="color:rgb(63, 63, 63)"><font data-dcnode-id="4019" size="4"><span data-dcnode-id="4020" instrument_node="">Structural Conflicts</span></font></strong><br data-dcnode-id="4017"><span data-dcnode-id="4015" style="color:rgb(63, 63, 63)"><span data-dcnode-id="4016" instrument_node="">A traditional new-construction stair will likely have support for the stairwell landing incorporated into the stair enclosure, or contain a beam across the landing where the landing meets the beginning of the stairs if it's a concrete stair. These new builds don't present too much of a challenge to coordinate with structure.</span></span><br data-dcnode-id="4014"><br data-dcnode-id="4013"><span data-dcnode-id="4011" style="color:rgb(63, 63, 63)"><span data-dcnode-id="4012" instrument_node="">However, for retrofits or stairs that do not simply jog back and forth, beware of beams that could run where you'd like to locate the standpipe connections. Core drilling a 4-inch to 10-inch hole through a concrete beam will not make you good friends with the structural engineer.</span></span><br data-dcnode-id="4010"><br data-dcnode-id="4009"><strong data-dcnode-id="4006"><font data-dcnode-id="4007" size="4"><span data-dcnode-id="4008" instrument_node="">Handle Clearance</span></font></strong><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">The hose connection is required to have 3-inches of clearance on all sides of the handle. (NFPA 14 2013-19 4.7.5)</span><br data-dcnode-id="4003"><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">​It's not enough to just stick your hand and start turning the valve, we have to remember that it's the firefighter's thermally insulated and rigid gloves that must turn the hose valve while the building is literally on fire. Giving 3-inches of clearance just feels like a minimally-nice gesture to thank your local first responder.</span><br data-dcnode-id="4000"><br data-dcnode-id="3999"><strong data-dcnode-id="3996"><font data-dcnode-id="3997" size="4"><span data-dcnode-id="3998" instrument_node="">Drain Riser</span></font></strong><br data-dcnode-id="3995"><span data-dcnode-id="3994" instrument_node="">Lastly, don't forget about the drain riser.</span><br data-dcnode-id="3993"><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">If the standpipe includes pressure-reducing valves, these valves require testing and it's required to have a way to connect directly to an oversized drain riser that can handle the testing. This can be done with capped outlets on the drain riser that can accept a hose connection for testing.</span><br data-dcnode-id="3990"><br data-dcnode-id="3989"><span data-dcnode-id="3988" instrument_node="">NFPA 14 provides guidance on sizing the drain riser in this scenario: 3-inch drain riser for 2-1/2-inch pressure reducing devices, a 2-inch riser for 1-1/2-inch pressure reducing devices, or sized large enough to handle the full flow from the largest pressure reducing device. (NFPA 14 20037.12, 2007-19 7.11.1)</span><br data-dcnode-id="3987"><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">Know someone who might be interested in content like this? Please forward them a link.</span><br data-dcnode-id="3984"><br data-dcnode-id="3983"><span data-dcnode-id="3982" instrument_node="">Want to get weekly articles like this yourself? </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/subscribe.html"><span data-dcnode-id="3981" instrument_node="">Subscribe here.</span></a></div><span data-dcnode-id="3978" instrument_node="">
</span></div><span data-dcnode-id="3976" instrument_node="">

</span><h2 class="blog-title" data-dcnode-id="3962"><span data-dcnode-id="3966" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/standpipes-for-fire-suppression-an-introduction"><span data-dcnode-id="3965" instrument_node="">Standpipes for Fire Suppression: An Introduction</span></a><span data-dcnode-id="3963" instrument_node="">
</span></h2><span data-dcnode-id="3961" instrument_node="">
</span><p class="blog-date" data-dcnode-id="3956"><span data-dcnode-id="3960" instrument_node="">
</span><span class="date-text" data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">

	</span></span><span data-dcnode-id="3957" instrument_node="">
</span></p><span data-dcnode-id="3955" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">
</span></p><span data-dcnode-id="3952" instrument_node="">
</span></div><span data-dcnode-id="3950" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3947" instrument_node="">
</span><div class="blog-content" data-dcnode-id="3705"><span data-dcnode-id="3946" instrument_node="">
</span><div class="paragraph" data-dcnode-id="3939"><span data-dcnode-id="3945" instrument_node="">Hope your week is going very well.</span><br data-dcnode-id="3944"><br data-dcnode-id="3943"><span data-dcnode-id="3942" instrument_node="">This week I'd like to open a short series on standpipes. Today's article is a basic overview of some basic requirements associated with standpipes used for fire suppression.</span><br data-dcnode-id="3941"><br data-dcnode-id="3940"></div><span data-dcnode-id="3938" instrument_node=""> </span><div data-dcnode-id="3928"><div class="wsite-image wsite-image-border-none" data-dcnode-id="3929" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="3937" instrument_node=""> </span><a data-dcnode-id="3933"><span data-dcnode-id="3936" instrument_node=""> </span><img alt="Fire Standpipe" data-dcnode-id="3935" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/143-2-v3_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="3934" instrument_node=""> </span></a><span data-dcnode-id="3932" instrument_node=""> </span><div data-dcnode-id="3931" style="display:block;font-size:90%"></div><span data-dcnode-id="3930" instrument_node=""> </span></div></div><span data-dcnode-id="3927" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3924" style="text-align:center;"><em data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Basic components of a standpipe for fire suppression.</span></em></div><span data-dcnode-id="3923" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3871" style="text-align:left;"><strong data-dcnode-id="3920"><font data-dcnode-id="3921" size="4"><span data-dcnode-id="3922" instrument_node="">Purpose</span></font></strong><br data-dcnode-id="3919"><span data-dcnode-id="3918" instrument_node="">Standpipes are used to support manual firefighting efforts by delivering water to hard-to-reach areas of a building. The intent of a standpipe system is to avoid having to distribute and connect hundreds of feet of hose for a single interior attack by firefighters.</span><br data-dcnode-id="3917"><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node="">Hard-to-reach areas of a building aren't confined to one direction. Buildings which are very tall (highrises) or are deep underground, or are very wide by nature could all have portions of the building which would be difficult to reach.</span><br data-dcnode-id="3914"><br data-dcnode-id="3913"><strong data-dcnode-id="3910"><font data-dcnode-id="3911" size="4"><span data-dcnode-id="3912" instrument_node="">Applicable Codes &amp; Standards</span></font></strong><br data-dcnode-id="3909"><span data-dcnode-id="3908" instrument_node="">In the US, the International Building Code (IBC) and International Fire Code (IFC) are often the first stop for standpipe requirements. While the two codes mirror each other, the International Building Code requires standpipes based on:</span><ul data-dcnode-id="3879"><li data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">height (a story located more than 30 feet above the lowest level of fire department access, or 30 feet below the highest level of fire department access) (see IBC Section 905.3.1)</span></li><li data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">unsprinklered assembly occupancies (see IBC Section 905.3.2)</span></li><li data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">covered and open mall buildings (see IBC Section 905.3.3)</span></li><li data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">stages (see IBC Section 905.3.4)</span></li><li data-dcnode-id="3895"><span data-dcnode-id="3899" instrument_node="">underground buildings (see IBC </span><span data-dcnode-id="3897" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3898" instrument_node="">Section&nbsp;</span></span><span data-dcnode-id="3896" instrument_node="">905.3.5)</span></li><li data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node="">helistops and heliports (see IBC </span><span data-dcnode-id="3892" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3893" instrument_node="">Section&nbsp;</span></span><span data-dcnode-id="3891" instrument_node="">905.3.6)</span></li><li data-dcnode-id="3885"><span data-dcnode-id="3889" instrument_node="">marinas and boatyards (see IBC </span><span data-dcnode-id="3887" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3888" instrument_node="">Section&nbsp;</span></span><span data-dcnode-id="3886" instrument_node="">905.3.7)</span></li><li data-dcnode-id="3880"><span data-dcnode-id="3884" instrument_node="">rooftop gardens and landscaped roofs (see IBC </span><span data-dcnode-id="3882" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3883" instrument_node="">Section&nbsp;</span></span><span data-dcnode-id="3881" instrument_node="">905.3.8)</span></li></ul><br data-dcnode-id="3878"><span data-dcnode-id="3877" instrument_node="">Once it has been determined whether a standpipe system is required or not, the IBC and IFC defer to NFPA 14 to prescribe&nbsp;</span><em data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">how&nbsp;</span></em><span data-dcnode-id="3874" instrument_node="">the system is to be installed.</span><br data-dcnode-id="3873"><br data-dcnode-id="3872"></div><span data-dcnode-id="3870" instrument_node=""> </span><div data-dcnode-id="3860"><div class="wsite-image wsite-image-border-none" data-dcnode-id="3861" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="3869" instrument_node=""> </span><a data-dcnode-id="3865"><span data-dcnode-id="3868" instrument_node=""> </span><img alt="Standpipe System" data-dcnode-id="3867" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/144-v4-600_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="3866" instrument_node=""> </span></a><span data-dcnode-id="3864" instrument_node=""> </span><div data-dcnode-id="3863" style="display:block;font-size:90%"></div><span data-dcnode-id="3862" instrument_node=""> </span></div></div><span data-dcnode-id="3859" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3707" style="text-align:left;"><br data-dcnode-id="3858"><strong data-dcnode-id="3855"><font data-dcnode-id="3856" size="4"><span data-dcnode-id="3857" instrument_node="">Class of Standpipes</span></font></strong><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">Standpipes can be classified in several areas. The first is the&nbsp;</span><em data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">class&nbsp;</span></em><span data-dcnode-id="3850" instrument_node="">of standpipe, which relates directly to the hose connection type and the intended user. Based on 1-1/2 inch hose failures and the associated testing that goes along with them, 1-1/2 inch hose stations are much less common today.</span><br data-dcnode-id="3849"><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">I've found many situations with sprinklered buildings where hose stations have been removed as they are no longer required and are a burden for testing and maintenance. Here are the standpipe classifications, with Class I being by far the most common in the US today:</span><ul data-dcnode-id="3834"><li data-dcnode-id="3843"><strong data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Class I</span></strong><span data-dcnode-id="3844" instrument_node="">: provides 2-1/2 inch (64 mm) hose connections for fire department and trained use.</span></li><li data-dcnode-id="3839"><strong data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Class II</span></strong><span data-dcnode-id="3840" instrument_node="">: provides 1-1/2 inch (38 mm) hose stations to supply for building occupants or initial fire department response</span></li><li data-dcnode-id="3835"><strong data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Class III</span></strong><span data-dcnode-id="3836" instrument_node="">: provides 1-1/2 inch (38 mm) hose stations for building occupants and 2-1/2 inch (64 mm) hose connections for fire department and trained use</span></li></ul><br data-dcnode-id="3833"><strong data-dcnode-id="3830"><font data-dcnode-id="3831" size="4"><span data-dcnode-id="3832" instrument_node="">Types of Standpipe</span></font></strong><br data-dcnode-id="3829"><span data-dcnode-id="3828" instrument_node="">The other defining description for standpipe is when water is delivered, and at what relative pressure. Types of standpipes include:</span><ul data-dcnode-id="3811"><li data-dcnode-id="3824"><strong data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Automatic dry</span></strong><span data-dcnode-id="3825" instrument_node="">: normally filled with pressurized air where water is delivered automatically when a standpipe hose cap is removed. The water, when delivered, is capable of supplying the system demand.</span></li><li data-dcnode-id="3820"><strong data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Automatic wet</span></strong><span data-dcnode-id="3821" instrument_node="">: normally filled with water capable of supplying the system demand automatically.</span></li><li data-dcnode-id="3816"><strong data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">Manual dry</span></strong><span data-dcnode-id="3817" instrument_node="">: normally filled with air and without a permanent water supply. Water is required from a pumper truck in order to meet system demand.</span></li><li data-dcnode-id="3812"><strong data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">Manual wet</span></strong><span data-dcnode-id="3813" instrument_node="">: normally filled with water that is not at a pressure capable of supplying the system demand. Manual wet systems require&nbsp; water to be pressurized by a fire department pump in order to meet system demand.</span></li></ul><br data-dcnode-id="3810"><br data-dcnode-id="3809"><font data-dcnode-id="3805" size="4"><strong data-dcnode-id="3806"><em data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Components of a Vertical Standpipe</span></em></strong></font><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">Standpipes are not always vertical standpipes, but for multi-story buildings they are the most prevalent and are the topic of discussion this week.</span><br data-dcnode-id="3802"><br data-dcnode-id="3801"><strong data-dcnode-id="3798"><font data-dcnode-id="3799" size="4"><span data-dcnode-id="3800" instrument_node="">Flexible Coupling</span></font></strong><ul data-dcnode-id="3785"><li data-dcnode-id="3794"><strong data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Purpose</span></strong><span data-dcnode-id="3795" instrument_node="">: Flexible couplings are included near floor levels to prevent catastrophic damage to the suppression system from the building structure while the building structure is moving in an earthquake. Flexible couplings allow the vertical pipe within a standpipe (or sprinkler system) to tolerate the horizontal building movement and still stay connected.</span></li><li data-dcnode-id="3790"><strong data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Where Required</span></strong><span data-dcnode-id="3791" instrument_node="">: Within 12 inches above and 24 inches below floor level in multi-story buildings. [NFPA 13 2002-16 9.3.2.3(2), 2019 18.2.3]</span></li><li data-dcnode-id="3786"><strong data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">When Required</span></strong><span data-dcnode-id="3787" instrument_node="">: When the building requires seismic protection (seismic design category C, D, E, or F). Couplings are also provided at each floor level (often just above the floor level) to aid in installation.</span></li></ul><br data-dcnode-id="3784"><strong data-dcnode-id="3781"><font data-dcnode-id="3782" size="4"><span data-dcnode-id="3783" instrument_node="">Isolation Valve</span></font></strong><ul data-dcnode-id="3772"><li data-dcnode-id="3777"><strong data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Purpose</span></strong><span data-dcnode-id="3778" instrument_node="">: Standpipe isolation valves allow shutdown of a single standpipe without interrupting the water supply to other vertical standpipes. This can play an important role with maintenance, repair, modification, or during active firefighting scenarios.</span></li><li data-dcnode-id="3773"><strong data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Where Required</span></strong><span data-dcnode-id="3774" instrument_node="">: Isolation valves are required on all standpipes (including dry standpipes). [NFPA 14 2003 6.2.2, 2007-19 6.3.2]</span></li></ul><br data-dcnode-id="3771"><strong data-dcnode-id="3768"><font data-dcnode-id="3769" size="4"><span data-dcnode-id="3770" instrument_node="">Penetration Clearance</span></font></strong><ul data-dcnode-id="3755"><li data-dcnode-id="3764"><strong data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Purpose</span></strong><span data-dcnode-id="3765" instrument_node="">: Clearance around floor penetrations are important for seismic bracing, again to prevent damage to the system from the building structure during an earthquake.</span></li><li data-dcnode-id="3760"><strong data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Size</span></strong><span data-dcnode-id="3761" instrument_node="">: The diameter of the hole or sleeve must be 2-inches larger for pipes 1 to 3-inches in diameter, or 4-inches larger than the pipe for pipe 4-inches or larger in diameter. [NFPA 13 2002-16 9.3.4.2 and 9.3.4.3, 2019 18.4.2 and 18.4.3]</span></li><li data-dcnode-id="3756"><strong data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Where Required</span></strong><span data-dcnode-id="3757" instrument_node="">: Where pipe passes through platforms, foundations, walls or floors, except where flexible couplings are located within 1-foot of each side of the penetration. [NFPA 13 2002-16 9.3.4.5, 2019 18.4.5]</span></li></ul><br data-dcnode-id="3754"><strong data-dcnode-id="3751"><font data-dcnode-id="3752" size="4"><span data-dcnode-id="3753" instrument_node="">Pressure Gauge</span></font></strong><ul data-dcnode-id="3742"><li data-dcnode-id="3747"><strong data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Size</span></strong><span data-dcnode-id="3748" instrument_node="">: Not smaller than ¼-inch (6 mm). [NFPA 14 2003 5.6.1, 2007-19 5.5.1]</span></li><li data-dcnode-id="3743"><strong data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Where Required</span></strong><span data-dcnode-id="3744" instrument_node="">: For standpipes, a pressure gauge is required at the top of each standpipe. [NFPA 14 2003 5.6.1, 2007-19 5.5.1]</span></li></ul><br data-dcnode-id="3741"><strong data-dcnode-id="3738"><font data-dcnode-id="3739" size="4"><span data-dcnode-id="3740" instrument_node="">Riser Clamp</span></font></strong><ul data-dcnode-id="3729"><li data-dcnode-id="3734"><strong data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Purpose</span></strong><span data-dcnode-id="3735" instrument_node="">: Riser clamps are used to provide support to vertical pipe.</span></li><li data-dcnode-id="3730"><strong data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Where Required</span></strong><span data-dcnode-id="3731" instrument_node="">: Within 24-inches (610 mm) of the centerline of the riser, to support the riser horizontally. In multi-story buildings, riser supports are required at the lowest level, at each alternate level, above and below offsets, and at the top of the riser. [NFPA 13 2002 9.2.5.3.1, 2007-16 9.2.5.4.1, 2019 17.4.5.4.1] Support above the lowest level to prevent movement upward when flexible fittings are used. [NFPA 13 2002 9.2.5.3.2, 2007-16 9.2.5.4.2, 2019 17.4.5.4.2]</span></li></ul><br data-dcnode-id="3728"><strong data-dcnode-id="3725"><font data-dcnode-id="3726" size="4"><span data-dcnode-id="3727" instrument_node="">Standpipe Hose Connections</span></font></strong><ul data-dcnode-id="3712"><li data-dcnode-id="3721"><strong data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">Purpose</span></strong><span data-dcnode-id="3722" instrument_node="">: To provide a point of connection for firefighters to connect hoses and get water to manually fight the fire.</span></li><li data-dcnode-id="3717"><strong data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Where Located</span></strong><span data-dcnode-id="3718" instrument_node="">: At 3-feet (0.9 m) to 5-feet (1.5 m) above floor level. [NFPA 14 2003 7.3.1, 2007-19 7.3.1.1]</span></li><li data-dcnode-id="3713"><strong data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">Where Required</span></strong><span data-dcnode-id="3714" instrument_node="">: We’ll explore this in greater detail in the articles to come. There's volumes of information about these requirements, but for reference be sure to check NFPA 14 2003-19 7.3.2-7.3.4 and IFC 905.4-905.6.</span></li></ul><br data-dcnode-id="3711"><span data-dcnode-id="3710" instrument_node="">Want to follow the rest of this series, or know someone who might be interested? </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/subscribe.html"><span data-dcnode-id="3709" instrument_node="">Subscribe here.</span></a></div><span data-dcnode-id="3706" instrument_node="">

</span></div><span data-dcnode-id="3697" instrument_node=""> </span><div class="blog-post" data-dcnode-id="3458" id="blog-post-674179931356815749"><span data-dcnode-id="3696" instrument_node="">
</span><div class="blog-header" data-dcnode-id="3679"><span data-dcnode-id="3695" instrument_node="">
</span><h2 class="blog-title" data-dcnode-id="3690"><span data-dcnode-id="3694" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/whats-on-your-sprinkler-design-checklist"><span data-dcnode-id="3693" instrument_node="">What's on your Sprinkler Design Checklist?</span></a><span data-dcnode-id="3691" instrument_node="">
</span></h2><span data-dcnode-id="3689" instrument_node="">
</span><p class="blog-date" data-dcnode-id="3684"><span data-dcnode-id="3688" instrument_node="">
</span><span class="date-text" data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">
		2/28/2019
	</span></span><span data-dcnode-id="3685" instrument_node="">
</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">
</span></p><span data-dcnode-id="3680" instrument_node="">
</span></div><span data-dcnode-id="3678" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3675" instrument_node="">
</span><div class="blog-content" data-dcnode-id="3465"><span data-dcnode-id="3674" instrument_node="">
</span><div class="paragraph" data-dcnode-id="3612"><strong data-dcnode-id="3668"><font data-dcnode-id="3672" size="4"><span data-dcnode-id="3673" instrument_node="">What Project?</span></font><br data-dcnode-id="3671"><font data-dcnode-id="3669" size="3"><span data-dcnode-id="3670" instrument_node="">​</span></font></strong><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">When I first started in the industry I worked on a long line of high-end retail projects scattered across the United States. Six months after starting I got a question from a project manager about concealed space wood-structure sprinkler protection on a particular store in San Jose.</span><br data-dcnode-id="3665"><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">San Jose? I was positive I never worked on a project in San Jose.</span><br data-dcnode-id="3662"><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">A little digging later revealed I did in fact work on a small retail shop in San Jose. The only problem was that it looked just like the other 30 stores I had worked on in-between. Did I evaluate protection or even consider the combustible above-ceiling space? Did I discuss anything with the AHJ?</span><br data-dcnode-id="3659"><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">No idea.</span><br data-dcnode-id="3656"><br data-dcnode-id="3655"><span data-dcnode-id="3654" instrument_node="">I quickly realized that if I didn't take project-specific design notes I'd have no way of revisiting my thought process when a question inevitably arose later in the project.</span><br data-dcnode-id="3653"><br data-dcnode-id="3652"><strong data-dcnode-id="3646"><font data-dcnode-id="3650" size="4"><span data-dcnode-id="3651" instrument_node="">The Mad Man</span></font><br data-dcnode-id="3649"><font data-dcnode-id="3647" size="3"><span data-dcnode-id="3648" instrument_node="">​</span></font></strong><br data-dcnode-id="3645"><span data-dcnode-id="3644" instrument_node="">Ever since then, and not entirely due to my undiagnosed organization issues, I've been on a mad hunt to find the&nbsp;</span><em data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">best&nbsp;</span></em><span data-dcnode-id="3641" instrument_node="">way to record project notes in the cleanest and most insanely-quick process possible.</span><br data-dcnode-id="3640"><br data-dcnode-id="3639"><span data-dcnode-id="3638" instrument_node="">For me it's partially about recording the design thought process, and partially about reminding myself about all the considerations that need to occur for a project.</span><br data-dcnode-id="3637"><br data-dcnode-id="3636"><span data-dcnode-id="3635" instrument_node="">I can't say I've tried every method for project note taking, but I have used word templates, checklists, spreadsheets, OneNote files, linked databases, access databases, and the good old pen and paper.</span><br data-dcnode-id="3634"><br data-dcnode-id="3633"><strong data-dcnode-id="3627" style=""><font data-dcnode-id="3630" size="4"><span data-dcnode-id="3632" instrument_node="">Important Pieces</span><br data-dcnode-id="3631"></font><font data-dcnode-id="3628" size="3"><span data-dcnode-id="3629" instrument_node="">​</span></font></strong><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">I have several goals when devising project notes for me and the staff I work with:</span><ol data-dcnode-id="3616"><li data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">It must be easy to edit</span></li><li data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">It must be clean</span></li><li data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">It must be consolidated (one page maximum)</span></li><li data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">It must be insanely quick to edit</span></li></ol><span data-dcnode-id="3615" instrument_node=""> If any one of those four items above aren't considered, the likelihood of adoption by people outside me is minimal.</span><br data-dcnode-id="3614"><br data-dcnode-id="3613"></div><span data-dcnode-id="3611" instrument_node=""> </span><div data-dcnode-id="3601"><div class="wsite-image wsite-image-border-medium" data-dcnode-id="3602" style="padding-top:5px;padding-bottom:10px;margin-left:0px;margin-right:10px;text-align:center"><span data-dcnode-id="3610" instrument_node=""> </span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/design_cheatsheet__example_.pdf" target="_blank"><span data-dcnode-id="3609" instrument_node=""> </span><img alt="Picture" data-dcnode-id="3608" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/example-3-x550_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="3607" instrument_node=""> </span></a><span data-dcnode-id="3605" instrument_node=""> </span><div data-dcnode-id="3604" style="display:block;font-size:90%"></div><span data-dcnode-id="3603" instrument_node=""> </span></div></div><span data-dcnode-id="3600" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3597" style="text-align:center;"><em data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">​An example project design sheet (click to see full PDF)</span></em></div><span data-dcnode-id="3596" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3568"><br data-dcnode-id="3595"><font data-dcnode-id="3591" size="4"><strong data-dcnode-id="3593" style=""><span data-dcnode-id="3594" instrument_node="">Latest Rendition</span></strong><br data-dcnode-id="3592"></font><span data-dcnode-id="3590" instrument_node="">​</span><br data-dcnode-id="3589"><span data-dcnode-id="3588" instrument_node="">Here's where I am now - an excel-based, single page note page where a quick "X" above a cell highlights the one below. If I know all of the information in a project, it can be filled out completely in less than 3 minutes.</span><br data-dcnode-id="3587"><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">It can be a helpful accompaniment for sprinkler contractor clients when we're submitting a bid, or helpful notes to accompany a QC set of drawings.</span><br data-dcnode-id="3584"><br data-dcnode-id="3583"><strong data-dcnode-id="3577" style=""><font data-dcnode-id="3580" size="4"><span data-dcnode-id="3582" instrument_node="">What Am I Missing?</span><br data-dcnode-id="3581"></font><font data-dcnode-id="3578" size="3"><span data-dcnode-id="3579" instrument_node="">​</span></font></strong><br data-dcnode-id="3576"><span data-dcnode-id="3575" instrument_node="">I'm sure your checklists and cheatsheets include a wide variety of considerations. In my attempt to better this one and incorporate the whole spreadsheet, </span><strong data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">what important elements am I missing?</span></strong><span data-dcnode-id="3572" instrument_node=""> View PDFs below, and </span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/whats-on-your-sprinkler-design-checklist"><span data-dcnode-id="3571" instrument_node="">post your comments &amp; feedback about important things to add here</span></a><span data-dcnode-id="3569" instrument_node="">.</span></div><span data-dcnode-id="3567" instrument_node=""> </span><div data-dcnode-id="3479"><div class="wsite-multicol" data-dcnode-id="3480"><div class="wsite-multicol-table-wrap" data-dcnode-id="3481" style="margin:0 -15px;"><span data-dcnode-id="3566" instrument_node=""> </span><span data-dcnode-id="3565" instrument_node=""> </span><span data-dcnode-id="3564" instrument_node=""> </span><span data-dcnode-id="3563" instrument_node=""> < </span><div class="paragraph" data-dcnode-id="3419"><span data-dcnode-id="3433" instrument_node="">If you've been following the blog for awhile, you might already know about the Toolkit that has really taken off lately. This past week I've incorporated some (great) user feedback and now have a new version to present:</span><br data-dcnode-id="3432"><br data-dcnode-id="3431"><strong data-dcnode-id="3428"><font data-dcnode-id="3429" size="4"><span data-dcnode-id="3430" instrument_node="">I've revamped the organization and it's FAR easier to navigate and use now.</span></font></strong><br data-dcnode-id="3427"><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">With a new main menu and crisp pages the Toolkit is FAR easier to navigate. Now you can get what you need, quickly.</span><br data-dcnode-id="3424"><br data-dcnode-id="3423"><span data-dcnode-id="3422" instrument_node="">If you're already a subscriber to the Toolkit, use the download link below to get the latest version right now. No need for any new access codes - it just updates the Toolkit right over your current version.</span><br data-dcnode-id="3421"><br data-dcnode-id="3420"></div><span data-dcnode-id="3418" instrument_node=""> </span><div data-dcnode-id="3408"><div class="wsite-image wsite-image-border-none" data-dcnode-id="3409" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:10px;text-align:center"><span data-dcnode-id="3417" instrument_node=""> </span><a data-dcnode-id="3413"><span data-dcnode-id="3416" instrument_node=""> </span><img alt="Picture" data-dcnode-id="3415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/2019-02-21-new-toolkit-web_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="3414" instrument_node=""> </span></a><span data-dcnode-id="3412" instrument_node=""> </span><div data-dcnode-id="3411" style="display:block;font-size:90%"></div><span data-dcnode-id="3410" instrument_node=""> </span></div></div><span data-dcnode-id="3407" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3404" style="text-align:center;"><em data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">A clip of the latest version of the Sprinkler Obstruction Calculator on the MeyerFire Toolkit.</span></em></div><span data-dcnode-id="3403" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3383"><strong data-dcnode-id="3400"><font data-dcnode-id="3401" size="4"><span data-dcnode-id="3402" instrument_node="">​What is the Toolkit, and what does it include?</span></font></strong><br data-dcnode-id="3399"><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">The MeyerFire Toolkit is a downloadable series of excel-based tools that allow fire protection designers, engineers and code authorities to quickly calculate a myriad of regular applications. With this tool you can save time with quick but powerful tools that you can save, PDF, or print.</span><br data-dcnode-id="3396"><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node="">The Toolkit contains&nbsp;</span><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/toolkit.html"><em data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">all&nbsp;</span></em><span data-dcnode-id="3391" instrument_node="">of the tools you see on this website</span></a><span data-dcnode-id="3389" instrument_node=""> - plus the popular </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/sprinkler.html"><span data-dcnode-id="3388" instrument_node="">Fire Sprinkler Database</span></a><span data-dcnode-id="3386" instrument_node=""> - which is a live collection of all fire sprinklers on the market where you can sort and filter to see what products exist for your application, and then specify or design the ones that best match your design goals.</span><br data-dcnode-id="3385"><br data-dcnode-id="3384"></div><span data-dcnode-id="3382" instrument_node=""> </span><div data-dcnode-id="3372"><div class="wsite-image wsite-image-border-none" data-dcnode-id="3373" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="3381" instrument_node=""> </span><a data-dcnode-id="3377"><span data-dcnode-id="3380" instrument_node=""> </span><img alt="Picture" data-dcnode-id="3379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/2015-05-27-toolkit-box-cover-web-small_8_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="3378" instrument_node=""> </span></a><span data-dcnode-id="3376" instrument_node=""> </span><div data-dcnode-id="3375" style="display:block;font-size:90%"></div><span data-dcnode-id="3374" instrument_node=""> </span></div></div><span data-dcnode-id="3371" instrument_node=""> </span><div data-dcnode-id="3361" style="text-align:center;"><div data-dcnode-id="3370" style="height: 10px; overflow: hidden;"></div><span data-dcnode-id="3369" instrument_node=""> </span><a class="wsite-button wsite-button-small wsite-button-highlight" data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/download.html" target="_blank"><span data-dcnode-id="3368" instrument_node=""> </span><span class="wsite-button-inner" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">DOWNLOAD UPDATES (CURRENT USERS)</span></span><span data-dcnode-id="3365" instrument_node=""> </span></a><span data-dcnode-id="3363" instrument_node=""> </span><div data-dcnode-id="3362" style="height: 10px; overflow: hidden;"></div></div><span data-dcnode-id="3360" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3342"><strong data-dcnode-id="3357"><font data-dcnode-id="3358" size="4"><span data-dcnode-id="3359" instrument_node="">What's Next?</span></font></strong><br data-dcnode-id="3356"><br data-dcnode-id="3355"><span data-dcnode-id="3354" instrument_node="">There's a few new additions to the Toolkit I hope to debut in the next couple weeks based on suggestions from users just like you. If you're an expert in fire flow calculations or water storage tank design and are interested in early testing, email me at jdmeyer@meyerfire.com.&nbsp;</span><br data-dcnode-id="3353"><br data-dcnode-id="3352"><strong data-dcnode-id="3349"><font data-dcnode-id="3350" size="4"><span data-dcnode-id="3351" instrument_node="">Subscribe</span></font></strong><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">If you know someone who might be interested in giving the Toolkit a try, email them about downloading it today. As always, you can </span><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/subscribe.html"><span data-dcnode-id="3345" instrument_node="">subscribe to these weekly articles &amp; resources here</span></a><span data-dcnode-id="3343" instrument_node="">.</span></div><span data-dcnode-id="3341" instrument_node="">

</span><h2 class="blog-title" data-dcnode-id="3325"><span data-dcnode-id="3329" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/components-of-basic-wet-pipe-riser-assemblies"><span data-dcnode-id="3328" instrument_node="">Components of Basic Wet-Pipe Riser Assemblies</span></a><span data-dcnode-id="3326" instrument_node="">
</span></h2><span data-dcnode-id="3324" instrument_node="">
</span><p class="blog-date" data-dcnode-id="3319"><span data-dcnode-id="3323" instrument_node="">
</span><span class="date-text" data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">
		1/10/2019
	</span></span><span data-dcnode-id="3320" instrument_node="">
</span></p><span data-dcnode-id="3318" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">

</span></div><span data-dcnode-id="3313" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3310" instrument_node="">
</span><div class="blog-content" data-dcnode-id="3235"><span data-dcnode-id="3309" instrument_node="">
</span><div class="paragraph" data-dcnode-id="3301"><span data-dcnode-id="3308" instrument_node="">This week we're covering a basic riser manifold configuration for wet-pipe fire sprinkler systems. This is not for a shotgun-style single riser, nor for a wet riser using an alarm check valve (we'll explore both of those later).</span><br data-dcnode-id="3307"><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">​If you haven't checked it out, there are great ongoing discussions (some of which covered these topics) on the </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/daily.html"><span data-dcnode-id="3304" instrument_node="">MeyerFire Daily page here</span></a><span data-dcnode-id="3302" instrument_node="">.&nbsp;</span></div><span data-dcnode-id="3300" instrument_node=""> </span><div data-dcnode-id="3291"><div class="wsite-image wsite-image-border-none" data-dcnode-id="3292" style="padding-top:10px;padding-bottom:10px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="3299" instrument_node=""> </span><a data-dcnode-id="3296"><span data-dcnode-id="3298" instrument_node=""> </span><img alt="Wet Fire Sprinkler Riser" data-dcnode-id="3297" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/uploads/1/6/0/7/16072416/comparison-500x500_orig.jpg&amp;raw" style="width:auto;max-width:100%"></a><span data-dcnode-id="3295" instrument_node=""> </span><div data-dcnode-id="3294" style="display:block;font-size:90%"></div><span data-dcnode-id="3293" instrument_node=""> </span></div></div><span data-dcnode-id="3290" instrument_node=""> </span><div class="paragraph" data-dcnode-id="3245"><br data-dcnode-id="3289"><strong data-dcnode-id="3286"><font data-dcnode-id="3287" size="4"><span data-dcnode-id="3288" instrument_node="">Overview</span></font></strong><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">Wet-pipe systems form the backbone of traditional fire sprinkler system design, comprising the most popular and most economical system type available. Here's the major components that go into a wet-pipe fire sprinkler assembly:</span><br data-dcnode-id="3283"><br data-dcnode-id="3282"><strong data-dcnode-id="3279" style="color:rgb(63, 63, 63)"><font data-dcnode-id="3280" size="4"><span data-dcnode-id="3281" instrument_node="">Check Valve</span></font></strong><ul data-dcnode-id="3265" style="color:rgb(63, 63, 63)"><li data-dcnode-id="3275"><strong data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Purpose</span></strong><span data-dcnode-id="3276" instrument_node="">: Allows the system to retain pressure over time, prevents and siphonage of water in a system to serve standpipes or other systems, and helps prevent nuisance waterflow alarm paddle movement by maintaining water in each system.</span></li><li data-dcnode-id="3270"><strong data-dcnode-id="3273" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3274" instrument_node="">Where Required</span></strong><span data-dcnode-id="3271" style="color:rgb(63, 63, 63)"><span data-dcnode-id="3272" instrument_node="">: a check valve is required in any system, but may also be accomplished by a single backflow preventer in a multi-system manifold. Check valves are required on each sprinkler system where the supply serves both sprinklers and standpipes.</span></span></li><li data-dcnode-id="3266"><strong data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Orientation</span></strong><span data-dcnode-id="3267" instrument_node="">: must be horizontal or vertical-up in accordance with its listing (NFPA 13 2002 8.15.1.1.3.4, 2007 -16 8.16.1.1.3.4, 2019 16.9.5.4)</span></li></ul><br data-dcnode-id="3264"><strong data-dcnode-id="3261" style="color:rgb(63, 63, 63)"><font data-dcnode-id="3262" size="4"><span data-dcnode-id="3263" instrument_node="">FDC Connection</span></font></strong><ul data-dcnode-id="3248" style="color:rgb(63, 63, 63)"><li data-dcnode-id="3257"><strong data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Purpose</span></strong><span data-dcnode-id="3258" instrument_node="">: Allows the fire department to supply supplementary pressure and flow to the system during a fire event.</span></li><li data-dcnode-id="3253"><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Where Required</span></strong><span data-dcnode-id="3254" instrument_node="">: on any sprinkler system that does not meet exceptions for being inaccessible, large-capacity deluge systems, or single-story buildings not over 2,000 sqft (185 sq.m.). (NFPA 13 2002 8.16.2.2, 2007-16 8.17.2.2, 2019 16.12.2)</span></li><li data-dcnode-id="3249"><strong data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Where Located</span></strong><span data-dcnode-id="3250" instrument_node="">: for a single system it must be on the system side of the main system control valve, check, and alarm valves, and is permitted to be connected to the main piping directly (NFPA 13 2002 8.16.2.4.2, 2007-16 8.17.2.4.2, 2019 16.12.5.2), for multiple systems the FDC connection must be between the supply control valves and system control valves (on the manifold) (NFPA 13 2002 8.16.2.4.3, 2007-16 8.17.2.4.3, 2019 16.12.5.4).</span></li></ul><span data-dcnode-id="3247" instrument_node="">​</span><br data-dcnode-id="3246"></div><span data-dcnode-id="3244" instrument_node="">
</span><br data-dcnode-id="3243"><span data-dcnode-id="3242" instrument_node="">

</span><div class="paragraph" data-dcnode-id="3181"><span data-dcnode-id="3203" instrument_node="">I receive feedback regularly from many users and observers - and I'm very grateful for both!</span><br data-dcnode-id="3202"><br data-dcnode-id="3201"><strong data-dcnode-id="3198"><font data-dcnode-id="3199" size="3"><span data-dcnode-id="3200" instrument_node="">Sprinkler Database Interest &amp; Feedback</span></font></strong><br data-dcnode-id="3197"><span data-dcnode-id="3196" instrument_node="">One member recently reached out about the </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/sprinklerdatabase.html"><span data-dcnode-id="3195" instrument_node="">Sprinkler Database</span></a><span data-dcnode-id="3193" instrument_node=""> and said:</span><br data-dcnode-id="3192"><br data-dcnode-id="3191"><em data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">"I appreciate all the work you’ve done on that site.&nbsp; The sprinkler database has helped tremendously when looking for specialty sprinklers, specifically available storage sprinkler is odd configurations!"</span></em><br data-dcnode-id="3188"><br data-dcnode-id="3187"><span data-dcnode-id="3186" instrument_node="">It's a tool that is basic in premise but can save tons of time when you're looking to compare sprinklers, find a specific type of sprinkler, or see if a solution exists for your specific problem. </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DDsLPg4GKaCU" target="_blank"><span data-dcnode-id="3185" instrument_node="">Here's a quick overview</span></a><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">​</span></div><span data-dcnode-id="3180" instrument_node=""> </span><div class="wsite-youtube" data-dcnode-id="2655" style="margin-bottom:10px;margin-top:10px;"><div class="wsite-youtube-wrapper wsite-yout </span><h2 class="blog-title" data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/methods-of-connecting-fire-sprinkler-pipe"><span data-dcnode-id="2229" instrument_node="">Methods of Connecting Fire Sprinkler Pipe</span></a><span data-dcnode-id="2227" instrument_node="">
</span></h2><span data-dcnode-id="2225" instrument_node="">
</span><p class="blog-date" data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">

</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">

</span></div><span data-dcnode-id="2214" instrument_node="">
</span><div class="blog-separator" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2211" instrument_node="">
</span><div class="blog-content" data-dcnode-id="1617"><span data-dcnode-id="2210" instrument_node="">
</span><div class="paragraph" data-dcnode-id="2188"><span data-dcnode-id="2209" instrument_node="">One of the popular aspects of fire sprinkler installations that is overwhelmingly familiar to fitters in the field yet something I hardly understood back as a new graduate is pipe connections. Today I'm breaking out some of the popular methods of joining steel pipe in fire sprinkler systems.</span><br data-dcnode-id="2208"><br data-dcnode-id="2207"><font data-dcnode-id="2203" size="4"><strong data-dcnode-id="2205" style=""><span data-dcnode-id="2206" instrument_node="">Steel Pipe</span></strong><br data-dcnode-id="2204"></font><span data-dcnode-id="2202" instrument_node="">While copper, CPVC and PEX are listed for use in fire sprinkler systems (PEX is only for NFPA 13D systems), black steel pipe remains the most popular pipe material for commercial fire sprinkler applications, at least within the United States.</span><br data-dcnode-id="2201"><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">For steel pipe, the primary means of connecting the pipe include threaded fittings, grooved fittings, plain-end compression fittings, flanged connections, and welding.</span><br data-dcnode-id="2198"><br data-dcnode-id="2197"><font data-dcnode-id="2193" size="4"><strong data-dcnode-id="2195" style=""><span data-dcnode-id="2196" instrument_node="">Plain End Pipe</span></strong><br data-dcnode-id="2194"></font><span data-dcnode-id="2192" instrument_node="">Steel pipe when initially formed has flat cut, unpolished ends. This is generally referred to as plain end pipe.&nbsp;</span><br data-dcnode-id="2191"><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">Plain end pipe can be connected by compression fittings or push-on fittings, which bite into the pipe to prevent separation. While popular for other building systems, use of plain end pipe and compression or push-on fittings are not used in sprinkler systems due to the relatively high pressures sprinkler systems experience.</span></div><span data-dcnode-id="2187" instrument_node=""> </span><div data-dcnode-id="2177"><div class="wsite-image wsite-image-border-none" data-dcnode-id="2178" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="2186" instrument_node=""> </span><a data-dcnode-id="2182"><span data-dcnode-id="2185" instrument_node=""> </span><img alt="Black Steel Plain End Pipe" data-dcnode-id="2184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/plain-end-v1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="2183" instrument_node=""> </span></a><span data-dcnode-id="2181" instrument_node=""> </span><div data-dcnode-id="2180" style="display:block;font-size:90%"></div><span data-dcnode-id="2179" instrument_node=""> </span></div></div><span data-dcnode-id="2176" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2167"><font data-dcnode-id="2172" size="4"><strong data-dcnode-id="2174" style=""><span data-dcnode-id="2175" instrument_node="">Threaded Pipe</span></strong><br data-dcnode-id="2173"></font><span data-dcnode-id="2171" instrument_node="">​Perhaps the most common current method of joining fire sprinkler pipe for smaller pipe diameters, threaded pipe makes use of helical crests that screw into a female threaded fitting.</span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">To create threaded pipe, a plain-end pipe is cut with a threaded machine decreasing the thickness of the pipe wall. As a result, the areas remaining below and adjacent to the thread become weaker and more susceptible to corrosion breakthroughs with the thinner wall of pipe.</span></div><span data-dcnode-id="2166" instrument_node=""> </span><div data-dcnode-id="2156"><div class="wsite-image wsite-image-border-none" data-dcnode-id="2157" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="2165" instrument_node=""> </span><a data-dcnode-id="2161"><span data-dcnode-id="2164" instrument_node=""> </span><img alt="Threaded Fire Sprinkler Pipe" data-dcnode-id="2163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/threaded-v1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="2162" instrument_node=""> </span></a><span data-dcnode-id="2160" instrument_node=""> </span><div data-dcnode-id="2159" style="display:block;font-size:90%"></div><span data-dcnode-id="2158" instrument_node=""> </span></div></div><span data-dcnode-id="2155" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2152"><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">​As compared to grooving or welding pipe, the pipe wall thickness must be thicker to accommodate the cut-in threads (ASME B1.20.1) for threaded pipe. NFPA 13 6.5.1.2 (2002-2016 Editions) addresses minimum pipe thicknesses for threaded pipe up to 300 psi, unless the pipe is separately listed for fire sprinkler use:</span></div><span data-dcnode-id="2151" instrument_node=""> </span><div data-dcnode-id="2061"><div class="wsite-multicol" data-dcnode-id="2062"><div class="wsite-multicol-table-wrap" data-dcnode-id="2063" style="margin:0 -15px;"><span data-dcnode-id="2150" instrument_node="">

</span></div></div></div><span data-dcnode-id="2060" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2048"><span data-dcnode-id="2059" instrument_node="">When connecting threaded pipe, joint compound or pipe tape is applied to the male thread to avoid water leakage.&nbsp;</span><br data-dcnode-id="2058"><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">While threading larger pipe was common throughout the early to mid twentieth century, the weight of Schedule 40 pipe and difficulty of turning large diameter threaded pipe makes threading an uncommon choice for larger diameter sprinkler pipe today.</span><br data-dcnode-id="2055"><br data-dcnode-id="2054"><font data-dcnode-id="2050" size="4"><strong data-dcnode-id="2052" style=""><span data-dcnode-id="2053" instrument_node="">Grooved Pipe</span></strong><br data-dcnode-id="2051"></font><span data-dcnode-id="2049" instrument_node="">Grooved pipe is a popular method of pipe joining invented by Victaulic with roots in both World Wars to deliver water and petroleum with faster, more reliable method of pipe connection.&nbsp;</span></div><span data-dcnode-id="2047" instrument_node=""> </span><div data-dcnode-id="2037"><div class="wsite-image wsite-image-border-none" data-dcnode-id="2038" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="2046" instrument_node=""> </span><a data-dcnode-id="2042"><span data-dcnode-id="2045" instrument_node=""> </span><img alt="Grooved Fire Sprinkler Pipe" data-dcnode-id="2044" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/grooved-v1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="2043" instrument_node=""> </span></a><span data-dcnode-id="2041" instrument_node=""> </span><div data-dcnode-id="2040" style="display:block;font-size:90%"></div><span data-dcnode-id="2039" instrument_node=""> </span></div></div><span data-dcnode-id="2036" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2024"><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">Grooved pipe is formed by either cutting into the pipe (cut groove) or by pressing an indentation into the pipe (roll groove). </span><br data-dcnode-id="2033"><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">Cut groove pipe results in a lesser pipe thickness, weakening the pipe and also offering less protection against corrosion. </span><br data-dcnode-id="2030"><br data-dcnode-id="2029"><span data-dcnode-id="2028" instrument_node="">Roll grooving, while keeping the pipe wall thickness, also poses issues in low-sloped dry and pre-action systems as the rolls on the interior side of the pipe create areas to trap water and create an air-water interface for corrosion to occur.</span><br data-dcnode-id="2027"><span data-dcnode-id="2026" instrument_node="">​</span><br data-dcnode-id="2025"></div><span data-dcnode-id="2023" instrument_node=""> </span><div data-dcnode-id="2013"><div class="wsite-image wsite-image-border-none" data-dcnode-id="2014" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="2022" instrument_node=""> </span><a data-dcnode-id="2018"><span data-dcnode-id="2021" instrument_node=""> </span><img alt="Roll vs Cut Groove Fire Sprinkler Pipe" data-dcnode-id="2020" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/grooved-differences-v1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="2019" instrument_node=""> </span></a><span data-dcnode-id="2017" instrument_node=""> </span><div data-dcnode-id="2016" style="display:block;font-size:90%"></div><span data-dcnode-id="2015" instrument_node=""> </span></div></div><span data-dcnode-id="2012" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2009"><br data-dcnode-id="2011"><span data-dcnode-id="2010" instrument_node="">Grooved pipe has a number of inherent advantages. Smaller pipe thicknesses are permitted for grooved pipe, resulting in thinner pipe which makes transporting, carrying, and lifting into place easier. Minimum thicknesses for Grooved Pipe:&nbsp;</span></div><span data-dcnode-id="2008" instrument_node=""> </span><div data-dcnode-id="1814"><div class="wsite-multicol" data-dcnode-id="1815"><div class="wsite-multicol-table-wrap" data-dcnode-id="1816" style="margin:0 -15px;"><span data-dcnode-id="2007" instrument_node="">

</span></div></div></div><span data-dcnode-id="1813" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1803"><br data-dcnode-id="1812"><span data-dcnode-id="1811" instrument_node="">With thinner, lighter pipe and easy grooved coupling options, labor can be less difficult and significantly quicker.</span><br data-dcnode-id="1810"><br data-dcnode-id="1809"><font data-dcnode-id="1805" size="4"><strong data-dcnode-id="1807" style=""><span data-dcnode-id="1808" instrument_node="">Welded &amp; Flanged Pipe</span></strong><br data-dcnode-id="1806"></font><span data-dcnode-id="1804" instrument_node="">A less common but additional option for restraining pipe is welding. Pipe can be welded as an outlet - where a welding equipment cuts a hole in one pipe whereafter another pipe segment is held in place and the two are welded together.</span></div><span data-dcnode-id="1802" instrument_node=""> </span><div data-dcnode-id="1792"><div class="wsite-image wsite-image-border-none" data-dcnode-id="1793" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="1801" instrument_node=""> </span><a data-dcnode-id="1797"><span data-dcnode-id="1800" instrument_node=""> </span><img alt="Welded Fire Sprinkler Pipe" data-dcnode-id="1799" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/welded-v1_1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="1798" instrument_node=""> </span></a><span data-dcnode-id="1796" instrument_node=""> </span><div data-dcnode-id="1795" style="display:block;font-size:90%"></div><span data-dcnode-id="1794" instrument_node=""> </span></div></div><span data-dcnode-id="1791" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1780"><br data-dcnode-id="1790"><span data-dcnode-id="1789" instrument_node="">Welding has a few advantages - it can be (and often is) performed in a fabrication shop, does not require any additional fittings, and can allow for more custom pipe arrangements.</span><br data-dcnode-id="1788"><br data-dcnode-id="1787"><span data-dcnode-id="1786" instrument_node="">For instance:&nbsp;a 4-inch x 4-inch x 1/2-inch outlet for a pressure gauge connection might be a special order reducing tee (ie: costly); as a welded outlet, it could be quickly and easily welded into place with the outlet easily threaded or grooved.</span><br data-dcnode-id="1785"><br data-dcnode-id="1784"><span data-dcnode-id="1783" instrument_node="">Welding is not limited to outlets, however. "Slip-on flanges" can be welded to the hub side of the flange to a piece of pipe, allowing two flanged fittings to be bolted together with a gasket in-between.</span><br data-dcnode-id="1782"><span data-dcnode-id="1781" instrument_node="">​</span></div><span data-dcnode-id="1779" instrument_node=""> </span><div data-dcnode-id="1769"><div class="wsite-image wsite-image-border-none" data-dcnode-id="1770" style="padding-top:0px;padding-bottom:0px;margin-left:0px;margin-right:0px;text-align:center"><span data-dcnode-id="1778" instrument_node=""> </span><a data-dcnode-id="1774"><span data-dcnode-id="1777" instrument_node=""> </span><img alt="Flanged Fire Sprinkler Pipe" data-dcnode-id="1776" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/flanged-v1_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="1775" instrument_node=""> </span></a><span data-dcnode-id="1773" instrument_node=""> </span><div data-dcnode-id="1772" style="display:block;font-size:90%"></div><span data-dcnode-id="1771" instrument_node=""> </span></div></div><span data-dcnode-id="1768" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1765"><br data-dcnode-id="1767"><span data-dcnode-id="1766" instrument_node="">Flanged pipe and fittings are common around fire pump assemblies, as NFPA 20 annex material even notes that "flanges welded to pipe are preferred" despite screwed, flanged mechanical joints or other approved fittings are allowable (NFPA 20 2003-2007 5.13.2.1, 2010-2013 4.13.2, 2016 4.14.2, 2019 4.15.2).</span></div><span data-dcnode-id="1764" instrument_node=""> </span><div data-dcnode-id="1637"><div class="wsite-multicol" data-dcnode-id="1638"><div class="wsite-multicol-table-wrap" data-dcnode-id="1639" style="margin:0 -15px;"><span data-dcnode-id="1763" instrument_node="">

</span><h2 class="blog-title" data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meyerfire.com/blog/flow-test-reports-and-the-n185-supply-graph"><span data-dcnode-id="1605" instrument_node="">Flow Test Reports and the N^1.85 Supply Graph</span></a><span data-dcnode-id="1603" instrument_node="">
</span></h2><span data-dcnode-id="1601" instrument_node="">
</span><p class="blog-date" data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">

	</span></span><span data-dcnode-id="1597" instrument_node="">
</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p class="blog-comments" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">

</span><div class="blog-content" data-dcnode-id="1405"><span data-dcnode-id="1586" instrument_node="">
</span><div class="paragraph" data-dcnode-id="1576"><span data-dcnode-id="1585" instrument_node="">
A few weeks ago I received a call from a sprinkler contractor who needed to provide a water supply graph for a flow test he conducted.</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
I had a canned sheet I had developed for my own flow tests, but it was a basic graph that showed a curve and didn't match the traditional N^1.85 hydraulic graphs common for water supply curves. Since then I've tinkered and come up with an accurate chart that takes flow test input values, calculates total flow and draws the curve along the N^1.85 chart.</span><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">
</span><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">
</span></div><span data-dcnode-id="1575" instrument_node="">
</span><div data-dcnode-id="1565"><span data-dcnode-id="1574" instrument_node="">

</span><a data-dcnode-id="1571"><img alt="Picture" data-dcnode-id="1572" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/78-e_orig.jpg&amp;raw" style="width:auto;max-width:100%"></a><span data-dcnode-id="1570" instrument_node="">
</span><div data-dcnode-id="1569" style="display:block;font-size:90%"></div><span data-dcnode-id="1568" instrument_node="">
</span></div><span data-dcnode-id="1566" instrument_node="">
</span></div><span data-dcnode-id="1564" instrument_node="">
</span><div class="paragraph" data-dcnode-id="1554"><span data-dcnode-id="1563" instrument_node="">
</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
</span><span data-dcnode-id="1559" style="color:rgb(63, 63, 63)"><span data-dcnode-id="1560" instrument_node="">​The N^1.85 chart is particularly useful for fire suppression systems because the Hazen-Williams formula is based on the relationship that pressure relates to flow to the 1.85th power.</span></span><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">
</span><br data-dcnode-id="1556"><span data-dcnode-id="1555" instrument_node="">
</span></div><span data-dcnode-id="1553" instrument_node="">

</span><a data-dcnode-id="1549"><img alt="Picture" data-dcnode-id="1550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/uploads/1/6/0/7/16072416/hazen-williams-formula_orig.jpg&amp;raw" style="width:auto;max-width:100%"></a><span data-dcnode-id="1548" instrument_node="">
</span><div data-dcnode-id="1547" style="display:block;font-size:90%"></div><span data-dcnode-id="1546" instrument_node="">
</span></div><span data-dcnode-id="1544" instrument_node="">

</span><span data-dcnode-id="1536" style="color:rgb(63, 63, 63)"><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">
</span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/blog/flow-test-reports-and-the-n185-supply-graph"><span data-dcnode-id="1538" instrument_node="">Take a look at the N1.85 Water Supply Curve tool here and let me know what you think in the comment section below.</span></a></span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">

</span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedrive.live.com/toolkit.html"><span data-dcnode-id="1447" instrument_node="">Download this Tool</span></a><span data-dcnode-id="1445" instrument_node="">

</span><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">
​When the x-axis, or the hydraulic flow is then scaled to the 1.85th power, hydraulic curves become straight lines which becomes easier to graph and compare. Prior to everyone carrying a computer in their pocket, these graphs were likely much easier to use for summaries and comparisons.</span><br data-dcnode-id="1439"><span data-dcnode-id="1438" instrument_node="">
</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">
The water supply information is what is provided as part of a two-hydrant flow test. The design input information would be the system demand side and can be used for quick comparisons.</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
</span><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">
Personally, I only use this setup for flow test reports and water supply comparisons. Fire sprinkler hydraulic calculation software takes care of the graphs and outputs I need after I've completed the hydraulic calculations.
