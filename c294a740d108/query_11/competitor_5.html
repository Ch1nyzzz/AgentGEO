</span><h1 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">What is a dry standpipe system?</span></h1><span data-dcnode-id="764" instrument_node="">
</span></div><span data-dcnode-id="762" instrument_node="">
</span><div class="answer" data-dcnode-id="666" style="font-size:16px;"><span data-dcnode-id="761" instrument_node="">
</span><div data-dcnode-id="754"><span data-dcnode-id="755"><span data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">A </span><b data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">dry standpipe</span></b><span data-dcnode-id="757" instrument_node=""> is a network of in-place piping allowing connection of a water supply (usually a fire department mobile apparatus known as a pumper) to a dedicated inlet at street level, with hose outlet valves on each floor.</span></span></span></div><br data-dcnode-id="753"><p data-dcnode-id="746"><a class="lc" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askinglot.com/open-detail/656896" rel="nofollow" target="_blank"><span data-dcnode-id="752" instrument_node="">Click to see full answer</span></a><span data-dcnode-id="750" instrument_node="">. </span><br data-dcnode-id="749"><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node=""> Simply so,  what is the purpose of a standpipe system?</span></p><p data-dcnode-id="730"><span data-dcnode-id="731"><span data-dcnode-id="732"><span data-dcnode-id="745" instrument_node="">Wet and Dry </span><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Standpipe Systems</span></b><span data-dcnode-id="742" instrument_node="">. A </span><b data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Standpipe</span></b><span data-dcnode-id="739" instrument_node=""> is a type of rigid water piping which is built into multi-story buildings in a vertical position, to which fire hoses can be connected, allowing manual application of water to the fire. Within buildings </span><b data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">standpipes</span></b><span data-dcnode-id="736" instrument_node=""> thus serve the same </span><b data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">purpose</span></b><span data-dcnode-id="733" instrument_node=""> as fire hydrants.</span></span></span></p><p data-dcnode-id="713"><span data-dcnode-id="729" instrument_node=""> what is the difference between a standpipe and a riser? </span><span data-dcnode-id="714"><span data-dcnode-id="715"><span data-dcnode-id="728" instrument_node="">The </span><b data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">standpipe riser</span></b><span data-dcnode-id="725" instrument_node=""> must be securely supported and restrained at each alternate floor; </span><b data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Standpipe</span></b><span data-dcnode-id="722" instrument_node=""> hose outlets must be </span><b data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">in</span></b><span data-dcnode-id="719" instrument_node=""> accessible locations near usable stairs. They must be protected from physical damage; </span><b data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Standpipe</span></b><span data-dcnode-id="716" instrument_node=""> hose outlets must have thread connections matching the local fire departments' hoses.</span></span></span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node=""> Considering this,  what is the most common standpipe system?</span></p><p data-dcnode-id="691"><span data-dcnode-id="710" instrument_node=""> </span><span data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">Class III </span><b data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Systems</span></b><span data-dcnode-id="706" instrument_node="">:</span></span><span data-dcnode-id="704" instrument_node=""> </span><span data-dcnode-id="692"><span data-dcnode-id="693"><span data-dcnode-id="703" instrument_node="">A “Class I” </span><b data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">standpipe</span></b><span data-dcnode-id="700" instrument_node=""> is the </span><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">most common</span></b><span data-dcnode-id="697" instrument_node=""> type of fire protection </span><b data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">standpipe system</span></b><span data-dcnode-id="694" instrument_node=""> today.</span></span></span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">What are the five types of standpipe systems?</span></p><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node=""> </span><b data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Following are four types of standpipes that you will find in use:</span></b><span data-dcnode-id="685" instrument_node=""> </span></p><ul data-dcnode-id="670"><span data-dcnode-id="683" instrument_node=""> </span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Wet system. Here, water is in the pipes at all times and is supplied by a water source.</span></li><span data-dcnode-id="680" instrument_node=""> </span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Automatic dry standpipe. Here, there is always air stored inside the standpipe at a constant pressure.</span></li><span data-dcnode-id="677" instrument_node=""> </span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Semi-automatic dry standpipe.</span></li><span data-dcnode-id="674" instrument_node=""> </span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Manual dry standpipe.</span></li><span data-dcnode-id="671" instrument_node=""> </span></ul><span data-dcnode-id="669" instrument_node=""> </span><p data-dcnode-id="668"></p><span data-dcnode-id="667" instrument_node="">

</span><div class="related-answer" data-dcnode-id="640" style="font-size:14px;"><span data-dcnode-id="641" instrument_node="">
