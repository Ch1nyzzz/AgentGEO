</span><div data-dcnode-id="1043"><span data-dcnode-id="1044"><span data-dcnode-id="1045"><b data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Manual</span></b><span data-dcnode-id="1055" instrument_node="">-</span><b data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">wet standpipe systems</span></b><span data-dcnode-id="1052" instrument_node=""> need water from a fire department pumper (or the like) to be pumped into the </span><b data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">system</span></b><span data-dcnode-id="1049" instrument_node=""> in order to meet flow and pressure requirements. • Automatic-Dry </span><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">standpipe</span></b><span data-dcnode-id="1046" instrument_node="">, filled with pressurized air, is connected to a permanent water supply that is capable. of meeting flow and pressure requirements.</span></span></span></div><br data-dcnode-id="1042"><p data-dcnode-id="1035"><a class="lc" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/96688" rel="nofollow" target="_blank"><span data-dcnode-id="1041" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="1039" instrument_node=""> </span><br data-dcnode-id="1038"><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node=""> Simply so,  how does a wet standpipe system work?</span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017"><span data-dcnode-id="1018"><span data-dcnode-id="1034" instrument_node="">A "</span><b data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">wet</span></b><span data-dcnode-id="1031" instrument_node="">" </span><b data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">standpipe</span></b><span data-dcnode-id="1028" instrument_node=""> is filled with water and is pressurized at all times. In contrast to dry </span><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">standpipes</span></b><span data-dcnode-id="1025" instrument_node="">, which can be used only by firefighters, </span><b data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">wet standpipes</span></b><span data-dcnode-id="1022" instrument_node=""> can be used by building occupants. </span><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Wet standpipes</span></b><span data-dcnode-id="1019" instrument_node=""> generally already come with hoses so that building occupants may fight fires quickly.</span></span></span></p><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Also,  what are the five types of standpipe systems?  </span><b data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Following are four types of standpipes that you will find in use:</span></b><span data-dcnode-id="1012" instrument_node=""> </span></p><ul data-dcnode-id="997"><span data-dcnode-id="1010" instrument_node=""> </span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Wet system. Here, water is in the pipes at all times and is supplied by a water source.</span></li><span data-dcnode-id="1007" instrument_node=""> </span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Automatic dry standpipe. Here, there is always air stored inside the standpipe at a constant pressure.</span></li><span data-dcnode-id="1004" instrument_node=""> </span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Semi-automatic dry standpipe.</span></li><span data-dcnode-id="1001" instrument_node=""> </span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Manual dry standpipe.</span></li><span data-dcnode-id="998" instrument_node=""> </span></ul><span data-dcnode-id="996" instrument_node=""> </span><p data-dcnode-id="995"></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node=""> Subsequently, one may also ask,  what is the purpose of a standpipe?</span></p><p data-dcnode-id="979"><span data-dcnode-id="992" instrument_node=""> </span><span data-dcnode-id="980"><span data-dcnode-id="981"><span data-dcnode-id="991" instrument_node="">A </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Standpipe</span></b><span data-dcnode-id="988" instrument_node=""> is a type of rigid water piping which is built into multi-story buildings in a vertical position, to which fire hoses can be connected, allowing manual application of water to the fire. Within buildings </span><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">standpipes</span></b><span data-dcnode-id="985" instrument_node=""> thus serve the same </span><b data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">purpose</span></b><span data-dcnode-id="982" instrument_node=""> as fire hydrants.</span></span></span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">What is the difference between standpipe and sprinkler?</span></p><p data-dcnode-id="961"><span data-dcnode-id="962"><span data-dcnode-id="963"><span data-dcnode-id="976" instrument_node="">Some older buildings only have </span><b data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">standpipe</span></b><span data-dcnode-id="973" instrument_node=""> systems while many newer buildings will have a combination system, which supplies the fire </span><b data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">sprinkler</span></b><span data-dcnode-id="970" instrument_node=""> system and the </span><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">standpipe</span></b><span data-dcnode-id="967" instrument_node=""> system. </span><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Standpipe</span></b><span data-dcnode-id="964" instrument_node=""> systems are designed to provide fire protection water for hose lines in strategically placed locations inside a building or structure.</span></span></span></p><span data-dcnode-id="960" instrument_node=""> </span></div><span data-dcnode-id="958" instrument_node="">

</span><p data-dcnode-id="668" style="display:inline;"></p><div data-dcnode-id="652"><span data-dcnode-id="653"><span data-dcnode-id="654"><span data-dcnode-id="667" instrument_node="">Most </span><b data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">washing machines</span></b><span data-dcnode-id="664" instrument_node=""> require a </span><b data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">standpipe</span></b><span data-dcnode-id="661" instrument_node=""> with a height of at least 36 inches. Check your manual to find out the requirements for your particular unit, and ensure your </span><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">standpipe</span></b><span data-dcnode-id="658" instrument_node=""> meets this minimum requirement. Placing your </span><b data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">standpipe</span></b><span data-dcnode-id="655" instrument_node=""> too low or too high can cause backflow and overflow.</span></span></span></div><p data-dcnode-id="651"></p><span data-dcnode-id="650" instrument_node="">
