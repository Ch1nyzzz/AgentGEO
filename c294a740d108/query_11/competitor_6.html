</span><div class="tgml wordwrap" data-dcnode-id="903" itemprop="text"><span data-dcnode-id="913" instrument_node="">I have a manual dry standpipe, it's the only one I've ever done in my life the reason being most jurisdictions I've worked in never allowed dry manual standipipes, and I just got approved drawings back with a note requiring a 6" check valve with ball drip between the 3-Way FDC &amp; system.</span><br data-dcnode-id="912"><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">Hey, I got approved drawings so I'm going to argue but what is the reason for the check valve?</span><br data-dcnode-id="909"><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">BTW I did have a ball drip check at the 6" elbow through wall.</span><br data-dcnode-id="906"><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">Anyone? </span></div><span data-dcnode-id="902" instrument_node="">

</span><cite data-dcnode-id="866" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="870" itemprop="name"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DCidona"><span data-dcnode-id="872" instrument_node="">Cidona</span></a></span><span data-dcnode-id="869" instrument_node=""> </span><span class="usertype" data-dcnode-id="867" itemprop="jobTitle"><span data-dcnode-id="868" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="865" instrument_node="">

</span></header><span data-dcnode-id="860" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="849" itemprop="text"><span data-dcnode-id="859" instrument_node="">I think it's just for good luck:)</span><br data-dcnode-id="858"><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">A couple of reason come to mind though they might not be the reasons it was incorporated into the standard.</span><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">a) Allows pressure testing without modifications.</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">b) Gives control of draining the system once the pumper has stoped pumping.</span><br data-dcnode-id="851"><span data-dcnode-id="850" instrument_node="">Intersted to hear other reasons people have. </span></div><span data-dcnode-id="848" instrument_node="">
</span></article><span data-dcnode-id="846" instrument_node=""> </span><article class="answer" data-dcnode-id="815" id="post-1120441" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="844" itemprop="name"><span data-dcnode-id="845" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="843" instrument_node="">
</span><header data-dcnode-id="827"><span data-dcnode-id="842" instrument_node="">
</span><div class="votes" data-dcnode-id="840" title="1 member likes this post!"><meta content="1" data-dcnode-id="841" itemprop="upvoteCount"></div><span data-dcnode-id="839" instrument_node="">
</span><cite data-dcnode-id="832" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="836" itemprop="name"><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="838" instrument_node="">cdafd</span></a></span><span data-dcnode-id="835" instrument_node=""> </span><span class="usertype" data-dcnode-id="833" itemprop="jobTitle"><span data-dcnode-id="834" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="831" instrument_node="">
</span><time data-dcnode-id="829" datetime="2008-07-17 22:29:47" itemprop="dateCreated"><span data-dcnode-id="830" instrument_node="">17 Jul 08 22:29</span></time><span data-dcnode-id="828" instrument_node="">
</span></header><span data-dcnode-id="826" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="817" itemprop="text"><span data-dcnode-id="825" instrument_node="">1.does nfpa 14 requie it?</span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">2. so the water does not come back against the fdc?</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">3. because I said so?</span><br data-dcnode-id="820"><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">4. ask for a section reference </span></div><span data-dcnode-id="816" instrument_node="">
</span></article><span data-dcnode-id="814" instrument_node=""> </span><article class="answer odd" data-dcnode-id="787" id="post-1120442" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="812" itemprop="name"><span data-dcnode-id="813" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="811" instrument_node="">
</span><header data-dcnode-id="798"><span data-dcnode-id="810" instrument_node="">
</span><cite data-dcnode-id="803" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="807" itemprop="name"><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DRWF7437"><span data-dcnode-id="809" instrument_node="">RWF7437</span></a></span><span data-dcnode-id="806" instrument_node=""> </span><span class="usertype" data-dcnode-id="804" itemprop="jobTitle"><span data-dcnode-id="805" instrument_node="">(Civil/Environmental)</span></span></cite><span data-dcnode-id="802" instrument_node="">
</span><time data-dcnode-id="800" datetime="2008-07-18 00:22:04" itemprop="dateCreated"><span data-dcnode-id="801" instrument_node="">18 Jul 08 00:22</span></time><span data-dcnode-id="799" instrument_node="">
</span></header><span data-dcnode-id="797" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="789" itemprop="text"><span data-dcnode-id="796" instrument_node="">The most probable reason is to prevent a cross connection between the public, potable, water supply and a water source whose quality is possibly contaminated or simply unknown. A sudden drop in pressure on the public side of the connection could allow flow from the building sprinkler system ( which may contain brackish water or antifreeze, back into the drinking water system.&nbsp;&nbsp;Most often, a double check valve would be required to ensure such contamination does NOT occur.</span><br data-dcnode-id="795"><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">Such a pressure drop is especially likely to occur during a fire when very large demands are placed on the supply.</span><br data-dcnode-id="792"><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">You didn't say which way the check valve is allowed to flow. </span></div><span data-dcnode-id="788" instrument_node="">
</span></article><span data-dcnode-id="786" instrument_node=""> </span><article class="answer" data-dcnode-id="756" id="post-1120443" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="784" itemprop="name"><span data-dcnode-id="785" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="783" instrument_node="">
</span><header data-dcnode-id="770"><span data-dcnode-id="782" instrument_node="">
</span><cite data-dcnode-id="775" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="779" itemprop="name"><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="781" instrument_node="">cdafd</span></a></span><span data-dcnode-id="778" instrument_node=""> </span><span class="usertype" data-dcnode-id="776" itemprop="jobTitle"><span data-dcnode-id="777" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="774" instrument_node="">
</span><time data-dcnode-id="772" datetime="2008-07-18 00:35:43" itemprop="dateCreated"><span data-dcnode-id="773" instrument_node="">18 Jul 08 00:35</span></time><span data-dcnode-id="771" instrument_node="">
</span></header><span data-dcnode-id="769" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="758" itemprop="text"><span data-dcnode-id="768" instrument_node="">RWF7437</span><br data-dcnode-id="767"><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">it is dry, the pipe has no water in it and is not connected to a water supply</span><br data-dcnode-id="764"><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">the fd pumps into it, so for cros contam it would have to flow back through the fire truck pump and back through the hydrant.</span><br data-dcnode-id="761"><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">&nbsp; </span></div><span data-dcnode-id="757" instrument_node="">
</span></article><span data-dcnode-id="755" instrument_node=""> </span><article class="answer odd" data-dcnode-id="734" id="post-1120444" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="753" itemprop="name"><span data-dcnode-id="754" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="752" instrument_node="">
</span><header data-dcnode-id="739"><span data-dcnode-id="751" instrument_node="">
</span><cite data-dcnode-id="744" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="748" itemprop="name"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DCidona"><span data-dcnode-id="750" instrument_node="">Cidona</span></a></span><span data-dcnode-id="747" instrument_node=""> </span><span class="usertype" data-dcnode-id="745" itemprop="jobTitle"><span data-dcnode-id="746" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="743" instrument_node="">
</span><time data-dcnode-id="741" datetime="2008-07-18 00:43:19" itemprop="dateCreated"><span data-dcnode-id="742" instrument_node="">18 Jul 08 00:43</span></time><span data-dcnode-id="740" instrument_node="">
</span></header><span data-dcnode-id="738" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="736" itemprop="text"><span data-dcnode-id="737" instrument_node="">With enough head pressure I wouldn't see why that wouldn't happen. I think RWF mentions a good point. I wonder if the water going back through the pumper would have a negative impact on the pump.&nbsp;&nbsp; </span></div><span data-dcnode-id="735" instrument_node="">
</span></article><span data-dcnode-id="733" instrument_node=""> </span><article class="answer" data-dcnode-id="695" id="post-1120445" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="731" itemprop="name"><span data-dcnode-id="732" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="730" instrument_node="">
</span><header data-dcnode-id="717"><span data-dcnode-id="729" instrument_node="">
</span><cite data-dcnode-id="722" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="726" itemprop="name"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DRWF7437"><span data-dcnode-id="728" instrument_node="">RWF7437</span></a></span><span data-dcnode-id="725" instrument_node=""> </span><span class="usertype" data-dcnode-id="723" itemprop="jobTitle"><span data-dcnode-id="724" instrument_node="">(Civil/Environmental)</span></span></cite><span data-dcnode-id="721" instrument_node="">
</span><time data-dcnode-id="719" datetime="2008-07-18 00:56:20" itemprop="dateCreated"><span data-dcnode-id="720" instrument_node="">18 Jul 08 00:56</span></time><span data-dcnode-id="718" instrument_node="">
</span></header><span data-dcnode-id="716" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="697" itemprop="text"><span data-dcnode-id="715" instrument_node="">cdafd,</span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">It is perfectly possible for water to flow backward through a pump. I have seen pumps that ran backward for 20 years. They didn't run well but they ran !</span><br data-dcnode-id="712"><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">Cidona,</span><br data-dcnode-id="709"><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">Unless the pump itself has a check valve, and the check valve is working, and unless the pump is the only source of pressure, backward flow is possible.&nbsp;&nbsp;Although the water supplier has a duty to provide fire flows, the supplier's principal duty is to protect the public health by preventing contamination of the supply.</span><br data-dcnode-id="706"><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">Very few, if any, Fire departments pay for water.&nbsp;&nbsp;Very few, if any, pay any attention to contamination or the cost of providing water, or the other uses of water. It is the supplier who bears these responsibilities, and legal liabilities.</span><br data-dcnode-id="703"><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">Damage to a pump on a fire truck would be the least of the undesirable consequences.</span><br data-dcnode-id="700"><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">I'm not a fireman, or a sprinkler designer, just an old water system guy. </span></div><span data-dcnode-id="696" instrument_node="">
</span></article><span data-dcnode-id="694" instrument_node=""> </span><article class="answer odd" data-dcnode-id="657" id="post-1120446" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="692" itemprop="name"><span data-dcnode-id="693" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="691" instrument_node="">
</span><header data-dcnode-id="675"><span data-dcnode-id="690" instrument_node="">
</span><div class="votes" data-dcnode-id="688" title="1 member likes this post!"><meta content="1" data-dcnode-id="689" itemprop="upvoteCount"></div><span data-dcnode-id="687" instrument_node="">
</span><cite data-dcnode-id="680" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="684" itemprop="name"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstookeyfpe"><span data-dcnode-id="686" instrument_node="">stookeyfpe</span></a></span><span data-dcnode-id="683" instrument_node=""> </span><span class="usertype" data-dcnode-id="681" itemprop="jobTitle"><span data-dcnode-id="682" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="679" instrument_node="">
</span><time data-dcnode-id="677" datetime="2008-07-18 00:56:54" itemprop="dateCreated"><span data-dcnode-id="678" instrument_node="">18 Jul 08 00:56</span></time><span data-dcnode-id="676" instrument_node="">
</span></header><span data-dcnode-id="674" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="659" itemprop="text"><span data-dcnode-id="673" instrument_node="">The check valve is required so if too much crap is in the standpipe, the firefighters can sacrifice a section of hose, cut it with an axe, and return to service.</span><br data-dcnode-id="672"><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">It's a real problem. Which is why I hate dry standpipes and worse, Class II hose connections.</span><br data-dcnode-id="669"><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">I spent 36 hours at Parkland Memorial Hospital in Dallas 25 years ago dealing with a heroin addict needle that shoved through my gear dealing with a dry standpipe on a 7 story parking garage. The assignment was a crappy car fire. I would have rather laid a horizontal hose load and hurt my back. I am Hepatitis C free but the testing for the virus was a royal pain in the rear.</span><br data-dcnode-id="666"><br data-dcnode-id="665"><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">We firefighters (OK, I am a former firefigher) are not perfect. As engineers, we are even less intelligent. </span><br data-dcnode-id="662"><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">A true story. </span></div><span data-dcnode-id="658" instrument_node="">
</span></article><span data-dcnode-id="656" instrument_node=""> </span><article class="answer" data-dcnode-id="618" id="post-1120447" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="654" itemprop="name"><span data-dcnode-id="655" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="653" instrument_node="">
</span><header data-dcnode-id="640"><span data-dcnode-id="652" instrument_node="">
</span><cite data-dcnode-id="645" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="649" itemprop="name"><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dcdafd"><span data-dcnode-id="651" instrument_node="">cdafd</span></a></span><span data-dcnode-id="648" instrument_node=""> </span><span class="usertype" data-dcnode-id="646" itemprop="jobTitle"><span data-dcnode-id="647" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="644" instrument_node="">
</span><time data-dcnode-id="642" datetime="2008-07-18 09:01:20" itemprop="dateCreated"><span data-dcnode-id="643" instrument_node="">18 Jul 08 09:01</span></time><span data-dcnode-id="641" instrument_node="">
</span></header><span data-dcnode-id="639" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="620" itemprop="text"><span data-dcnode-id="638" instrument_node="">OK STOP the conspiracy theories and stop beating up on the plan checker.</span><br data-dcnode-id="637"><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">see item 1 and 3 on above post</span><br data-dcnode-id="634"><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">take the poor plan checker a doughnut and some glasses so he can see you already gave him what he asked for</span><br data-dcnode-id="631"><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">Get your NFPA off the shelf dust it off and if you have the 07 check 6.4</span><br data-dcnode-id="628"><br data-dcnode-id="627"><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">6.4* Fire Department Connections.</span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">6.4.1&nbsp;&nbsp;Shutoff valves shall not be installed between the fire department connection and the system.</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">6.4.2&nbsp;&nbsp;A listed check valve shall be installed in each fire department connection and located as near as practicable to the point where it joins the system. </span></div><span data-dcnode-id="619" instrument_node="">
</span></article><span data-dcnode-id="617" instrument_node=""> </span><article class="answer odd" data-dcnode-id="590" id="post-1120448" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="615" itemprop="name"><span data-dcnode-id="616" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="614" instrument_node="">
</span><header data-dcnode-id="601"><span data-dcnode-id="613" instrument_node="">
</span><cite data-dcnode-id="606" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="610" itemprop="name"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DFFP1"><span data-dcnode-id="612" instrument_node="">FFP1</span></a></span><span data-dcnode-id="609" instrument_node=""> </span><span class="usertype" data-dcnode-id="607" itemprop="jobTitle"><span data-dcnode-id="608" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="605" instrument_node="">
</span><time data-dcnode-id="603" datetime="2008-07-18 09:21:33" itemprop="dateCreated"><span data-dcnode-id="604" instrument_node="">18 Jul 08 09:21</span></time><span data-dcnode-id="602" instrument_node="">
</span></header><span data-dcnode-id="600" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="592" itemprop="text"><span data-dcnode-id="599" instrument_node="">I already have a very good opinion of Stookeyfpe, but I am even more impressed knowing he is a FPE with firefighter experience. My brother is a full time fire fighter (Lieutenant) and I am very close to many fire fighting companies in my area. </span><br data-dcnode-id="598"><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">The check valve is a good requirement. I would agree the primary purpose is for hydrostatic testing and to ensure the firefighters can use the same standard operating procedures as they would for any normally 'wet" fire department connection. If firefighters have a problem with one hose (during a fire), how would they change the hose without draining the entire standpipe system? Check valve allows a short duration with no flow and then they are back in business after connecting the replacement hose. This is just the best example I can think of off of the top of my head. </span><br data-dcnode-id="595"><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">All of the nonsense about backflow preventors and pump backwash for a dry standpipe system is on the borderline of a complete waste of time.&nbsp;&nbsp; </span></div><span data-dcnode-id="591" instrument_node="">
</span></article><span data-dcnode-id="589" instrument_node=""> </span><article class="answer" data-dcnode-id="554" id="post-1120449" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="587" itemprop="name"><span data-dcnode-id="588" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="586" instrument_node="">
</span><header data-dcnode-id="570"><span data-dcnode-id="585" instrument_node="">
</span><cite data-dcnode-id="578" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="582" itemprop="name"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DSprinklerDesigner2"><span data-dcnode-id="584" instrument_node="">SprinklerDesigner2</span></a></span><span data-dcnode-id="581" instrument_node=""> </span><span class="usertype" data-dcnode-id="579" itemprop="jobTitle"><span data-dcnode-id="580" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="577" instrument_node="">
</span><div class="op" data-dcnode-id="575" title="SprinklerDesigner2 is the OP (Original Poster) of this thread"><span data-dcnode-id="576" instrument_node="">(OP)</span></div><span data-dcnode-id="574" instrument_node="">
</span><time data-dcnode-id="572" datetime="2008-07-18 11:38:05" itemprop="dateCreated"><span data-dcnode-id="573" instrument_node="">18 Jul 08 11:38</span></time><span data-dcnode-id="571" instrument_node="">
</span></header><span data-dcnode-id="569" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="556" itemprop="text"><span data-dcnode-id="568" instrument_node="">"If firefighters have a problem with one hose (during a fire), how would they change the hose without draining the entire standpipe system?"</span><br data-dcnode-id="567"><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">Excellent point!</span><br data-dcnode-id="564"><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">I've never been a fireman. :)</span><br data-dcnode-id="561"><br data-dcnode-id="560"><span data-dcnode-id="559" instrument_node="">Thanks.</span><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">&nbsp; </span></div><span data-dcnode-id="555" instrument_node="">
</span></article><span data-dcnode-id="553" instrument_node=""> </span><article class="answer odd" data-dcnode-id="529" id="post-1120450" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="551" itemprop="name"><span data-dcnode-id="552" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="550" instrument_node="">
</span><header data-dcnode-id="537"><span data-dcnode-id="549" instrument_node="">
</span><cite data-dcnode-id="542" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="546" itemprop="name"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DPEDARRIN2"><span data-dcnode-id="548" instrument_node="">PEDARRIN2</span></a></span><span data-dcnode-id="545" instrument_node=""> </span><span class="usertype" data-dcnode-id="543" itemprop="jobTitle"><span data-dcnode-id="544" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="541" instrument_node="">
</span><time data-dcnode-id="539" datetime="2008-07-18 12:05:00" itemprop="dateCreated"><span data-dcnode-id="540" instrument_node="">18 Jul 08 12:05</span></time><span data-dcnode-id="538" instrument_node="">
</span></header><span data-dcnode-id="536" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="531" itemprop="text"><span data-dcnode-id="535" instrument_node="">Do dry manual standpipes have a valve at the hose connection?</span><br data-dcnode-id="534"><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">I know dry automatic standpipes do - if they are using compressed air. </span></div><span data-dcnode-id="530" instrument_node="">
</span></article><span data-dcnode-id="528" instrument_node=""> </span><article class="answer" data-dcnode-id="505" id="post-1120451" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="526" itemprop="name"><span data-dcnode-id="527" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="525" instrument_node="">
</span><header data-dcnode-id="512"><span data-dcnode-id="524" instrument_node="">
</span><cite data-dcnode-id="517" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="521" itemprop="name"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DCidona"><span data-dcnode-id="523" instrument_node="">Cidona</span></a></span><span data-dcnode-id="520" instrument_node=""> </span><span class="usertype" data-dcnode-id="518" itemprop="jobTitle"><span data-dcnode-id="519" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="516" instrument_node="">
</span><time data-dcnode-id="514" datetime="2008-07-22 12:12:29" itemprop="dateCreated"><span data-dcnode-id="515" instrument_node="">22 Jul 08 12:12</span></time><span data-dcnode-id="513" instrument_node="">
</span></header><span data-dcnode-id="511" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="507" itemprop="text"><span data-dcnode-id="510" instrument_node="">PEDARRIN2,</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">If you mean do they have hoses at the required locations as oppossed to just having some kind of threaded outlet then yes, they have hose valves. Otherwise you would have water coming out all the locations when the FD started pumping water in. Is the hose valve, the valve you were speaking of? </span></div><span data-dcnode-id="506" instrument_node="">
</span></article><span data-dcnode-id="504" instrument_node=""> </span><article class="answer odd" data-dcnode-id="477" id="post-1120452" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="502" itemprop="name"><span data-dcnode-id="503" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="501" instrument_node="">
</span><header data-dcnode-id="488"><span data-dcnode-id="500" instrument_node="">
</span><cite data-dcnode-id="493" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="497" itemprop="name"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DPEDARRIN2"><span data-dcnode-id="499" instrument_node="">PEDARRIN2</span></a></span><span data-dcnode-id="496" instrument_node=""> </span><span class="usertype" data-dcnode-id="494" itemprop="jobTitle"><span data-dcnode-id="495" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="492" instrument_node="">
</span><time data-dcnode-id="490" datetime="2008-07-22 13:28:39" itemprop="dateCreated"><span data-dcnode-id="491" instrument_node="">22 Jul 08 13:28</span></time><span data-dcnode-id="489" instrument_node="">
</span></header><span data-dcnode-id="487" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="479" itemprop="text"><span data-dcnode-id="486" instrument_node="">Yes.</span><br data-dcnode-id="485"><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">That way there is a way to "seal" the piping.</span><br data-dcnode-id="482"><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">Sometimes I have seen a cap on the end also, but that is not required. </span></div><span data-dcnode-id="478" instrument_node="">
</span></article><span data-dcnode-id="476" instrument_node=""> </span><article class="answer" data-dcnode-id="455" id="post-1120453" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="474" itemprop="name"><span data-dcnode-id="475" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="473" instrument_node="">
</span><header data-dcnode-id="460"><span data-dcnode-id="472" instrument_node="">
</span><cite data-dcnode-id="465" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="469" itemprop="name"><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DCidona"><span data-dcnode-id="471" instrument_node="">Cidona</span></a></span><span data-dcnode-id="468" instrument_node=""> </span><span class="usertype" data-dcnode-id="466" itemprop="jobTitle"><span data-dcnode-id="467" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="464" instrument_node="">
</span><time data-dcnode-id="462" datetime="2008-07-22 14:23:58" itemprop="dateCreated"><span data-dcnode-id="463" instrument_node="">22 Jul 08 14:23</span></time><span data-dcnode-id="461" instrument_node="">
</span></header><span data-dcnode-id="459" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="457" itemprop="text"><span data-dcnode-id="458" instrument_node="">My understanding is that the caps are required to protected the threads. </span></div><span data-dcnode-id="456" instrument_node="">
</span></article><span data-dcnode-id="454" instrument_node=""> </span><article class="answer odd" data-dcnode-id="427" id="post-1120454" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="452" itemprop="name"><span data-dcnode-id="453" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="451" instrument_node="">
</span><header data-dcnode-id="438"><span data-dcnode-id="450" instrument_node="">
</span><cite data-dcnode-id="443" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="447" itemprop="name"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3Dstookeyfpe"><span data-dcnode-id="449" instrument_node="">stookeyfpe</span></a></span><span data-dcnode-id="446" instrument_node=""> </span><span class="usertype" data-dcnode-id="444" itemprop="jobTitle"><span data-dcnode-id="445" instrument_node="">(Specifier/Regulator)</span></span></cite><span data-dcnode-id="442" instrument_node="">
</span><time data-dcnode-id="440" datetime="2008-07-22 23:05:20" itemprop="dateCreated"><span data-dcnode-id="441" instrument_node="">22 Jul 08 23:05</span></time><span data-dcnode-id="439" instrument_node="">
</span></header><span data-dcnode-id="437" instrument_node="">
</span><div class="tgml wordwrap" data-dcnode-id="429" itemprop="text"><span data-dcnode-id="436" instrument_node="">The caps protect the threads. They are also designed to protect the interior of the standpipe from coke cans, tennis balls, dog poop, used diapers, and gatorade bottles. I've seen all of this and more shoved in FDCs.</span><br data-dcnode-id="435"><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">Contrary to other posts, protective caps or covers </span><span data-dcnode-id="431" style="font-weight:bold;"><span data-dcnode-id="432" instrument_node="">ARE</span></span><span data-dcnode-id="430" instrument_node=""> required. See NFPA 14 and IFC Section 913. </span></div><span data-dcnode-id="428" instrument_node="">
</span></article><span data-dcnode-id="426" instrument_node=""> </span><article class="answer" data-dcnode-id="399" id="post-1120455" itemprop="suggestedAnswer" itemscope="" itemtype="http://schema.org/Answer"><h3 data-dcnode-id="424" itemprop="name"><span data-dcnode-id="425" instrument_node="">RE: Manual dry standpipe FDC / Why a check valve?</span></h3><span data-dcnode-id="423" instrument_node="">
</span><header data-dcnode-id="410"><span data-dcnode-id="422" instrument_node="">
</span><cite data-dcnode-id="415" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="419" itemprop="name"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng-tips.com/userinfo.cfm%3Fmember%3DPEDARRIN2"><span data-dcnode-id="421" instrument_node="">PEDARRIN2</span></a></span><span data-dcnode-id="418" instrument_node=""> </span><span class="usertype" data-dcnode-id="416" itemprop="jobTitle"><span data-dcnode-id="417" instrument_node="">(Mechanical)</span></span></cite><span data-dcnode-id="414" instrument_node="">
