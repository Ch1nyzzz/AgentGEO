</span><div class="bbWrapper" data-dcnode-id="4472"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote" data-dcnode-id="4500"><span data-dcnode-id="4517" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="4512"><span data-dcnode-id="4516" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-451337" data-dcnode-id="4514" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fordtransitusaforum.com/goto/post%3Fid%3D451337"><span data-dcnode-id="4515" instrument_node="">lhill7 said:</span></a><span data-dcnode-id="4513" instrument_node="">
</span></div><span data-dcnode-id="4511" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="4502"><span data-dcnode-id="4510" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">
What's the difference?
</span></div><span data-dcnode-id="4507" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="4504"><a data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="4503" instrument_node="">
</span></div><span data-dcnode-id="4501" instrument_node="">
</span></blockquote><span data-dcnode-id="4499" instrument_node="">Based on your other thread you're looking for a wagon? If so wagons come in 150, 350 and 350HD variants. 250s are cargo/van only. In terms of a wagon 150s are 130" wheelbased vehicles that can come in low roof or medium roof (afaik). 130" == RWB - Regular Wheel Base (150). These are 8 or 10 passenger wagons that may be equipped with all engine options. Keep in mind a 3.5, RWB in anything other than white is a rare bird and would likely need to be ordered. </span><br data-dcnode-id="4498"><span data-dcnode-id="4497" instrument_node="">
</span><br data-dcnode-id="4496"><span data-dcnode-id="4495" instrument_node="">
148" == LWB - Long Wheel Base (350). Come in all heights low-roof (LR), medium-roof (MR), high-roof (hand-shaking god/HR). All engine options are available but when wanting more than 3 specific options they begin to start getting rare unless ordering. 12 passenger and 15 passenger, said to be running more spring and tend to come with factory installed swaybar.</span><br data-dcnode-id="4494"><span data-dcnode-id="4493" instrument_node="">
</span><br data-dcnode-id="4492"><span data-dcnode-id="4491" instrument_node="">
148" + junk in the trunk == EL - Extended Length (350HD). Come in high-roof. May be duallies (DRW) or single wheels (SRW) on the back. Adds nearly 3ft to the back of a LWB. 15 passenger. Another rarer bird. </span><br data-dcnode-id="4490"><span data-dcnode-id="4489" instrument_node="">
</span><br data-dcnode-id="4488"><span data-dcnode-id="4487" instrument_node="">
It's about as clear as mud unless you see them in person.</span><br data-dcnode-id="4486"><span data-dcnode-id="4485" instrument_node="">
</span><br data-dcnode-id="4484"><span data-dcnode-id="4483" instrument_node="">
If you want to get real gory with the details consult this document:</span><br data-dcnode-id="4482"><span data-dcnode-id="4481" instrument_node="">
</span><br data-dcnode-id="4480"><span data-dcnode-id="4479" instrument_node="">
</span><a class="link link--external" data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fleet.ford.com/truckbbas/topics/2016/16_Transit_SB.pdf" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="4478" instrument_node="">https://www.fleet.ford.com/truckbbas/topics/2016/16_Transit_SB.pdf</span></a><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">
</span><br data-dcnode-id="4474"><span data-dcnode-id="4473" instrument_node="">
Be warned that it can become information overload quickly and make sure you consult the Wagon section (if you want the wagon specs of course).</span></div><span data-dcnode-id="4471" instrument_node="">
</span><div class="js-selectToQuoteEnd" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">&nbsp;</span></div><span data-dcnode-id="4468" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="3930"><span data-dcnode-id="3959" instrument_node="">CrewVanMan - I tried to send you a private message, but it said that I haven't posted enough so I don't have that privilege yet. Here is what I said:</span><br data-dcnode-id="3958"><span data-dcnode-id="3957" instrument_node="">
</span><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">
Thank you for your offer to check up on vans for me. We've found a couple, but we haven't made any final decisions yet. Here's what we're looking for:</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">
</span><br data-dcnode-id="3952"><span data-dcnode-id="3951" instrument_node="">
10 passenger</span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">
low roof</span><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">
xlt (which I believe all have reclining back seats and rear air conditioning, but we'd want to confirm that it has those, too)</span><br data-dcnode-id="3946"><span data-dcnode-id="3945" instrument_node="">
sliding door</span><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">
new</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">
</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">
Those are the big "must-haves." Other than that, we'd prefer a darker exterior color, privacy glass, remote start, and running board, but those are all things we are willing to go without if we can't find a van with them.</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">
</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">
My zip code is 55347. Most of the ones we have found are in other states, but dealers we have been working with are able to get them shipped here.</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">
</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">
If you have a chance to check, that would be great! Thank you so much!</span></div><span data-dcnode-id="3929" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="3061"><span data-dcnode-id="3066" instrument_node="">Your dealer can look and see where your Transit is at any point. Once it gets on the rail car, you can get the car number and the railroad company from your dealer and track it via the railroad. You can follow it all the way to the Regional Distribution Center where it is offloaded. Then you have to use the dealer who can watch it until it gets to the dealership.</span><br data-dcnode-id="3065"><span data-dcnode-id="3064" instrument_node="">
</span><br data-dcnode-id="3063"><span data-dcnode-id="3062" instrument_node="">
Over the last few years I have tracked some Shelbys and F-150s around the country. Even followed a 2016 Shelby GT350 down the road taking pictures of the railcar and in one instance in 2013, my friend in Houston was at the Regional Distribution Center and has pictures of his Boss 302 Laguna Seca being offloaded from the rail car to the lot. Really doesn't get it there faster, just get your hopes up knowing it is on the way.</span></div><span data-dcnode-id="3060" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="2877"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote is-expandable" data-dcnode-id="2884"><span data-dcnode-id="2905" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="2900"><span data-dcnode-id="2904" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-452033" data-dcnode-id="2902" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fordtransitusaforum.com/goto/post%3Fid%3D452033"><span data-dcnode-id="2903" instrument_node="">CrewVanMan said:</span></a><span data-dcnode-id="2901" instrument_node="">
</span></div><span data-dcnode-id="2899" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="2886"><span data-dcnode-id="2898" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="2892"><span data-dcnode-id="2897" instrument_node="">
Your dealer can look and see where your Transit is at any point. Once it gets on the rail car, you can get the car number and the railroad company from your dealer and track it via the railroad. You can follow it all the way to the Regional Distribution Center where it is offloaded. Then you have to use the dealer who can watch it until it gets to the dealership.</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">
</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">
Over the last few years I have tracked some Shelbys and F-150s around the country. Even followed a 2016 Shelby GT350 down the road taking pictures of the railcar and in one instance in 2013, my friend in Houston was at the Regional Distribution Center and has pictures of his Boss 302 Laguna Seca being offloaded from the rail car to the lot. Really doesn't get it there faster, just get your hopes up knowing it is on the way.
</span></div><span data-dcnode-id="2891" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="2888"><a data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="2887" instrument_node="">
</span></div><span data-dcnode-id="2885" instrument_node="">
</span></blockquote><span data-dcnode-id="2883" instrument_node="">OK, thanks. I was thinking you had the tools to confer superpowers that I could use to keep my dealer on a leash. As it is they already think so because I've been able to use what I do know (thanks to your help). I guess I'll pass on exposing the fact my powers have faded. </span><img alt=":)" class="smilie smilie--sprite smilie--sprite1" data-dcnode-id="2882" data-shortname=":)" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Smile    :)"><br data-dcnode-id="2881"><span data-dcnode-id="2880" instrument_node="">
</span><br data-dcnode-id="2879"><span data-dcnode-id="2878" instrument_node="">
* - Jezz! Where is this forum based? According to the time stamping it is 8 time zones away from me.</span></div><span data-dcnode-id="2876" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="2507"><span data-dcnode-id="2513" instrument_node="">Just saw your zip code and realized I'm in the same area. I bought my Transit from Metropolitan Ford used. At the time they had a couple of them on the lots, but no short wheelbase models. </span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">
</span><br data-dcnode-id="2510"><span data-dcnode-id="2509" instrument_node="">
Bought my F150 from Apple Valley Ford and was pleased with the buying experience. They don't haggle, so the price you see on the website is the price you get unless you're eligible for additional rebates like military, law enforcement, or private cash offers. Worked with Dan at Metropolitan Ford and Andrea Holtan at Apple Valley, both were up-front and good to work with. Good luck in your search. </span><img alt=":)" class="smilie smilie--sprite smilie--sprite1" data-dcnode-id="2508" data-shortname=":)" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Smile    :)"></div><span data-dcnode-id="2506" instrument_node="">

</span><div class="bbCodeBlock-title" data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">

</span><div class="bbCodeBlock-content" data-dcnode-id="2111"><span data-dcnode-id="2129" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="2117"><span data-dcnode-id="2128" instrument_node="">
I was under the impression that 150, 250 and 350 were weight capability designations, like the pickups. </span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">
150=half ton</span><br data-dcnode-id="2125"><span data-dcnode-id="2124" instrument_node="">
250=3/4 ton</span><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node="">
350=1 ton</span><br data-dcnode-id="2121"><span data-dcnode-id="2120" instrument_node="">
</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">
I think I saw many 150 148 wagons, but the 150 wagons did not have as many seats as the 350 wagon.
</span></div><span data-dcnode-id="2116" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="2113"><a data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="2112" instrument_node="">
</span></div><span data-dcnode-id="2110" instrument_node="">
</span></blockquote><span data-dcnode-id="2108" instrument_node="">The 150, 250, 350 used to be capacity/capability designations but they are far more muddied than they used to be. </span><br data-dcnode-id="2107"><span data-dcnode-id="2106" instrument_node="">
</span><br data-dcnode-id="2105"><span data-dcnode-id="2104" instrument_node="">

</span><div class="bbWrapper" data-dcnode-id="1706"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote is-expandable" data-dcnode-id="1712"><span data-dcnode-id="1739" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-452329" data-dcnode-id="1736" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fordtransitusaforum.com/goto/post%3Fid%3D452329"><span data-dcnode-id="1737" instrument_node="">surly Bill said:</span></a><span data-dcnode-id="1735" instrument_node="">
</span></div><span data-dcnode-id="1733" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="1714"><span data-dcnode-id="1732" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="1720"><span data-dcnode-id="1731" instrument_node="">
I was under the impression that 150, 250 and 350 were weight capability designations, like the pickups. </span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">
150=half ton</span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
250=3/4 ton</span><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">
350=1 ton</span><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">
</span><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">
I think I saw many 150 148 wagons, but the 150 wagons did not have as many seats as the 350 wagon.
</span></div><span data-dcnode-id="1719" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="1716"><a data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="1715" instrument_node="">
</span></div><span data-dcnode-id="1713" instrument_node="">
</span></blockquote><span data-dcnode-id="1711" instrument_node="">That's incorrect, a 148" Transit 150 has never rolled off the assembly line. LWB Transit wagons are all called "350s". </span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node="">
</span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">
There are an assortment of GVWRs depending on configuration, and 350s are higher than 150s, but not by a whole lot. The 130" Transit Wagons all have 8,550 lb GVWRs, and the 148" wagons are between 9,000 lbs for the gas engines, and 9,250 lbs for diesel models.</span></div><span data-dcnode-id="1705" instrument_node="">
</span><div class="js-selectToQuoteEnd" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1702" instrument_node="">
