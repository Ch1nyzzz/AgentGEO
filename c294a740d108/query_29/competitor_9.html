</span><div class="bbWrapper" data-dcnode-id="2684"><blockquote class="bbCodeBlock bbCodeBlock--expandable bbCodeBlock--quote" data-dcnode-id="2731"><span data-dcnode-id="2748" instrument_node="">
</span><div class="bbCodeBlock-title" data-dcnode-id="2743"><span data-dcnode-id="2747" instrument_node="">
</span><a class="bbCodeBlock-sourceJump" data-content-selector="#post-2674969" data-dcnode-id="2745" data-xf-click="attribution" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedieselstop.com/goto/post%3Fid%3D2674969"><span data-dcnode-id="2746" instrument_node="">ranger275c said:</span></a><span data-dcnode-id="2744" instrument_node="">
</span></div><span data-dcnode-id="2742" instrument_node="">
</span><div class="bbCodeBlock-content" data-dcnode-id="2733"><span data-dcnode-id="2741" instrument_node="">
</span><div class="bbCodeBlock-expandContent" data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">
my local dealer says he just got a bulletin that said LV supperceeds the SP.
</span></div><span data-dcnode-id="2738" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="2735"><a data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="2734" instrument_node="">
</span></div><span data-dcnode-id="2732" instrument_node="">
</span></blockquote><span data-dcnode-id="2730" instrument_node="">If you click on the link that bismic supplied, it states exactly what he said it did. </span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">
</span><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node="">
I'm puzzled on your local dealer saying they just got the " bulletin that said LV supperceeds the SP". check out this thread from 11/2009 - </span><a class="link link--internal" data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedieselstop.com/forums/f23/mercon-lv-vs-sp-242106/"><span data-dcnode-id="2725" instrument_node="">http://www.thedieselstop.com/forums/f23/mercon-lv-vs-sp-242106/</span></a><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">
</span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">
There are other threads documenting this information on other sites as well.</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">
</span><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">
Here is a cut 'n paste:</span><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">
</span><i data-dcnode-id="2688"><span data-dcnode-id="2713" instrument_node="">The 09+ SD trucks already used LV for the factory fill, and for the 08 and down vehicles:</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">
Ford Special Service </span><a class="link link--external" data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.powerstroke.org/forum/" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="2708" style="color: #009900"><u data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Message</span></u></span><img alt="" class="bbImage" data-dcnode-id="2707" data-url="http://images.intellitxt.com/ast/adTypes/icon1.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.intellitxt.com/ast/adTypes/icon1.png&amp;raw" style="" title=""></a><span data-dcnode-id="2705" instrument_node=""> 21114</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">
REPLACEMENT </span><a class="link link--external" data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/s/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dautomotive%26field-keywords%3Dtransmission%252Bfluid" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="2702" instrument_node="">TRANSMISSION FLUID</span></a><span data-dcnode-id="2700" instrument_node=""> FOR SERVICING TORQSHIFT TRANSMISSIONS</span><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">
ALL 2003-2008 F-SUPER DUTY, 2003-2005 EXCURSION, 2004-2008 E-SERIES AND 2006-2008 LCF VEHICLES EQUIPPED WITH A TORQSHIFT AUTOMATIC TRANSMISSIONS SHOULD BE SERVICED WITH MERCON LV AUTOMATIC TRANSMISSION FLUID IN PLACE OF MERCON SP. THIS INCLUDES TOP OFF AS WELL AS FLUID REPLACEMENT. MIXING MERCON LV AND MERCON SP IN THE TORQSHIFT TRANSMISSION IS ACCEPTABLE. USE MERCON LV TRANSMISSION FLUID TO SERVICE VEHICLES EQUIPPED WITH TORQSHIFT TRANSMISSIONS. WHEN ADDING OR REPLACING </span><a class="link link--external" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/s/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dautomotive%26field-keywords%3Dtransmission%252Bfluid" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="2697" instrument_node="">TRANSMISSION FLUID</span></a><span data-dcnode-id="2695" instrument_node=""> IN A VEHICLE EQUIPPED WITH A TORQSHIFT TRANSMISSION, USE MERCON LV TRANSMISSION FLUID.</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">
EFFECTIVE DATE: 11/26/2009 </span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">
</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">
</span></i><span data-dcnode-id="2687" instrument_node="">From this thread:</span><a class="link link--external" data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.powerstroke.org/forum/general-6-4l-discussion/137628-mercon-lv.html" rel="nofollow ugc noopener" target="_blank"><span data-dcnode-id="2686" instrument_node="">mercon lv - Ford Powerstroke Diesel Forum</span></a></div><span data-dcnode-id="2683" instrument_node="">

Mark...same here. But, interesting read.........</span><br data-dcnode-id="1952"><span data-dcnode-id="1951" instrument_node="">
</span><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node="">
James (tks) pdf fluid chart link says...Owner/rebuilders use whats listed in o.g. book. Mine says tranny takes SP not LV. BUT Dealers/others using this chart suppose to us "LV". Appears to me to be conflicting info.?
</span></div><span data-dcnode-id="1947" instrument_node="">
</span><div class="bbCodeBlock-expandLink" data-dcnode-id="1944"><a data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Click to expand...</span></a></div><span data-dcnode-id="1943" instrument_node="">
</span></div><span data-dcnode-id="1941" instrument_node="">
</span></blockquote><span data-dcnode-id="1939" instrument_node="">If I was to guess on that, it is because the owners and most aftermarket shops do not have access to this. In the case of the 5R110W, either SP or LV can be used and intermixed. My sisters 05 has been running LV in her tranny for 100K now. The truck has 225K on it and the transmission has never been opened up. I like SP because it does not have the high expansion rate like LV but SP is very expensive compared LV. Im not aware of any changes made to the 5R110W when it was factory filled with LV other than the dipstick indicator with the updated writing.</span></div><span data-dcnode-id="1937" instrument_node="">
