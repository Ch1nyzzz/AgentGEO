</span></div></div><h3 data-dcnode-id="2270"><img alt="logo" class="aligncenter wp-image-450383" data-dcnode-id="2271" height="86" loading="lazy" sizes="(max-width: 245px) 100vw, 245px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/logo-217.png&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/logo-217.png 379w, https://manuals.plus/wp-content/uploads/2021/08/logo-217-300x105.png 300w" width="245"></h3><span data-dcnode-id="2269" instrument_node="">
</span><h4 data-dcnode-id="2266"><span data-dcnode-id="2267" id="hotpoint_washer_dryer"><span data-dcnode-id="2268" instrument_node="">Hotpoint Washer Dryer</span></span></h4><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2263"><img alt="product" class="aligncenter wp-image-450384" data-dcnode-id="2264" height="381" loading="lazy" sizes="(max-width: 381px) 100vw, 381px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/product-268.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/product-268.jpg 1000w, https://manuals.plus/wp-content/uploads/2021/08/product-268-300x300.jpg 300w, https://manuals.plus/wp-content/uploads/2021/08/product-268-150x150.jpg 150w, https://manuals.plus/wp-content/uploads/2021/08/product-268-768x768.jpg 768w, https://manuals.plus/wp-content/uploads/2021/08/product-268-120x120.jpg 120w" width="381"></p><span data-dcnode-id="2262" instrument_node="">
</span><h4 data-dcnode-id="2259"><span data-dcnode-id="2260" id="installation"><span data-dcnode-id="2261" instrument_node="">Installation</span></span></h4><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2250"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Warning!</span></strong><span data-dcnode-id="2255" instrument_node=""> Keep this instruction manual in a safe place for future reference. Should the appliance be sold, transferred or moved, make sure the instruction manual accompanies the washer dryer to inform the new owner as to its operation and features.</span><br data-dcnode-id="2254"><strong data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Caution!</span></strong><span data-dcnode-id="2251" instrument_node=""> Read these instructions carefully: they contain vital information on installation, use and safety.</span></p><div class="57be77cde1a6ddba353152d58844f9cf" data-dcnode-id="2245" data-index="5" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="2249" instrument_node="">
</span><div data-dcnode-id="2247" id="ezoic-pub-ad-placeholder-115"><span data-dcnode-id="2248" instrument_node=""> </span></div><span data-dcnode-id="2246" instrument_node="">
</span></div><span data-dcnode-id="2244" instrument_node="">
</span><h5 data-dcnode-id="2241"><span data-dcnode-id="2242" id="unpacking_and_levelling"><span data-dcnode-id="2243" instrument_node="">Unpacking and levelling</span></span></h5><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2236"><strong data-dcnode-id="2237"><span data-dcnode-id="2239" instrument_node="">Unpacking</span><img alt="image 1" class="aligncenter wp-image-450369" data-dcnode-id="2238" height="341" loading="lazy" sizes="(max-width: 367px) 100vw, 367px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-1-165.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-1-165.jpg 459w, https://manuals.plus/wp-content/uploads/2021/08/image-1-165-300x279.jpg 300w" width="367"></strong></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2229"><span data-dcnode-id="2234" instrument_node="">This is a separate part of the polystyrene base and should be removed with the base.</span><br data-dcnode-id="2233"><strong data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">IMPORTANT</span></strong><span data-dcnode-id="2230" instrument_node=""> check when unpacking your machine.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><ol data-dcnode-id="2211"><li data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Unpack the washer-dryer.</span></li><span data-dcnode-id="2225" instrument_node="">
</span><li data-dcnode-id="2222"><span data-dcnode-id="2224" instrument_node="">Check whether the washer-dryer has been damaged during transport. If this is the case, do not install it and contact your retailer.</span><img alt="image 2" class="aligncenter wp-image-450370" data-dcnode-id="2223" height="246" loading="lazy" sizes="(max-width: 241px) 100vw, 241px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-2-153.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-2-153.jpg 457w, https://manuals.plus/wp-content/uploads/2021/08/image-2-153-293x300.jpg 293w" width="241"></li><span data-dcnode-id="2221" instrument_node="">
</span><li data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Remove the 4 protective screws and the rubber bush with the respective spacer, situated on the rear of the appliance (see also the installation leaflet).</span></li><span data-dcnode-id="2218" instrument_node="">
</span><li data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Seal the gaps using the plastic plugs provided.</span></li><span data-dcnode-id="2215" instrument_node="">
</span><li data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Keep all the parts: you will need them again if the washer-dryer needs to be moved to another location. Packaging materials are not children’s toys.</span></li><span data-dcnode-id="2212" instrument_node="">
</span></ol><h5 data-dcnode-id="2208"><span data-dcnode-id="2209" id="levelling"><span data-dcnode-id="2210" instrument_node="">Levelling</span></span></h5><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2206" instrument_node="">Your machine may make a considerable amount of noise if the two front feet have not been adjusted correctly.</span><img alt="image 3" class="aligncenter size-full wp-image-450371" data-dcnode-id="2205" height="354" loading="lazy" sizes="(max-width: 330px) 100vw, 330px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-3-130.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-3-130.jpg 330w, https://manuals.plus/wp-content/uploads/2021/08/image-3-130-280x300.jpg 280w" width="330"></p><div class="57be77cde1a6ddba353152d58844f9cf" data-dcnode-id="2199" data-index="6" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="2203" instrument_node="">
</span><div data-dcnode-id="2201" id="ezoic-pub-ad-placeholder-116"><span data-dcnode-id="2202" instrument_node=""> </span></div><span data-dcnode-id="2200" instrument_node="">
</span></div><span data-dcnode-id="2198" instrument_node="">
</span><ol data-dcnode-id="2191"><li data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Install the washer-dryer on a flat sturdy floor, without resting it up against walls, cabinets or anything else.</span></li><span data-dcnode-id="2195" instrument_node="">
</span><li data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">If the floor is not perfectly level, compensate for any unevenness by tightening or loose ning the adjustable front feet (see figure); the angle of inclination, measured according to the worktop, must not exceed 2°. Levelling your appliance correctly will provide it with stability and avoid any vibrations, noise and shifting during operation. If it is placed on a fitted or loose carpet, adjust the feet in such a way as to allow enough room for ventilation beneath the washer-dryer.</span></li><span data-dcnode-id="2192" instrument_node="">
</span></ol><h5 data-dcnode-id="2188"><span data-dcnode-id="2189" id="electric_and_water_connections"><span data-dcnode-id="2190" instrument_node="">Electric and water connections</span></span></h5><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2183"><strong data-dcnode-id="2184"><span data-dcnode-id="2186" instrument_node="">Connecting the water inlet hose</span><img alt="image 4" class="aligncenter size-full wp-image-450372" data-dcnode-id="2185" height="574" loading="lazy" sizes="(max-width: 292px) 100vw, 292px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-4-115.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-4-115.jpg 292w, https://manuals.plus/wp-content/uploads/2021/08/image-4-115-153x300.jpg 153w" width="292"></strong></p><span data-dcnode-id="2182" instrument_node="">
</span><ol data-dcnode-id="2158"><li data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Connect the supply pipe by screwing it to a cold water tap using a 3/4 gas threaded connection (see figure). Before performing the connection, allow the water to run freely until it is perfectly clear.</span></li><span data-dcnode-id="2179" instrument_node="">
</span><li data-dcnode-id="2176"><span data-dcnode-id="2178" instrument_node="">Connect the other end of the water inlet hose to the washer dryer, screwing it onto the appliance’s cold water inlet, situated on the top right-hand side on the rear of the appliance (see figure).</span><img alt="image 5" class="aligncenter wp-image-450373" data-dcnode-id="2177" height="307" loading="lazy" sizes="(max-width: 302px) 100vw, 302px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-5-95.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-5-95.jpg 445w, https://manuals.plus/wp-content/uploads/2021/08/image-5-95-295x300.jpg 295w" width="302"></li><span data-dcnode-id="2175" instrument_node="">
</span><li data-dcnode-id="2160"><span data-dcnode-id="2174" instrument_node="">Make sure there are no kinks or bends in the hose.
</span><ul data-dcnode-id="2161"><li data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">The water pressure at the tap must be within the values indicated in the Technical details table (on the page 5).</span></li><span data-dcnode-id="2171" instrument_node="">
</span><li data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">If the water inlet hose is not long enough, contact a specialist store or an authorised serviceman.</span></li><span data-dcnode-id="2168" instrument_node="">
</span><li data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Ensure that the supply taps are allowing water through. Old taps may seize in the closed position and thus prevent water reaching the machine.</span></li><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Never use second-hand or old inlet hoses; use the products supplied with the machine.</span></li><span data-dcnode-id="2162" instrument_node="">
</span></ul></li><span data-dcnode-id="2159" instrument_node="">
</span></ol><h5 data-dcnode-id="2154"><span data-dcnode-id="2155" id="connecting_the_drain_hose"><span data-dcnode-id="2157" instrument_node="">Connecting the drain hose</span><img alt="image 6" class="aligncenter size-full wp-image-450374" data-dcnode-id="2156" height="763" loading="lazy" sizes="(max-width: 237px) 100vw, 237px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-6-80.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-6-80.jpg 237w, https://manuals.plus/wp-content/uploads/2021/08/image-6-80-93x300.jpg 93w" width="237"></span></h5><span data-dcnode-id="2153" instrument_node="">
</span><ul data-dcnode-id="2143"><li data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Connect the drain hose, without bending it, to a draining duct or a wall drain situated between 65 and 100 cm from the floor;</span></li><span data-dcnode-id="2150" instrument_node="">
</span><li data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">The drain hose may be connected to an under-sink trap. Before connecting the drain hose from the machine ensure that any blanks or removable ends have been taken off the spigot.</span></li><span data-dcnode-id="2147" instrument_node="">
</span><li data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">If it is placed over the edge of a basin or sink be sure the free end of the hose should not be underwater.! We advise against the use of hose extensions; in case of absolute need, the extension must have the same diameter as the original hose and must not exceed 150 cm in length. Ensure that if the drain hose is pushed into a standpipe, that the end does not go down more than 15cms (6 inches). If the hose is pushed down too far, this may cause the machine to self -syphon ie. continuously empty as it is filling.</span></li><span data-dcnode-id="2144" instrument_node="">
</span></ul><h5 data-dcnode-id="2140"><span data-dcnode-id="2141" id="electric_connection"><span data-dcnode-id="2142" instrument_node="">Electric connection</span></span></h5><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Before plugging the appliance into the mains socket, make sure that:</span></p><span data-dcnode-id="2136" instrument_node="">
</span><ul data-dcnode-id="2072"><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">the socket is earthed and in compliance with the applicable law;</span></li><span data-dcnode-id="2133" instrument_node="">
</span><li data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">the socket is able to sustain the appliance’s maximum power load indicated on the Technical Data Plate fixed on the machine;</span></li><span data-dcnode-id="2130" instrument_node="">
</span><li data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">the supply voltage is included within the values indicated on the Technical Data Plate fixed on the machine.</span></li><span data-dcnode-id="2127" instrument_node="">
</span><li data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">the socket is compatible with the washer dryer’s plug. If this is not the case, replace the socket or the plug. Your appliance is now supplied with a 13 amp fused plug it can be plugged into a 13 amp socket for immediate use. Before using the appliance please read the instructions below.</span></li><span data-dcnode-id="2124" instrument_node="">
</span><li data-dcnode-id="2113"><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">WARNING –</span></strong><span data-dcnode-id="2121" instrument_node=""> THIS APPLIANCE MUST BE EARTHED. THE FOLLOWING OPERATIONS SHOULD BE CARRIED OUT BY A QUALIFIED ELECTRICIAN.</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node="">
Replacing the fuse:</span><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node="">
When replacing a faulty fuse, a 13 amp ASTA approved fuse to BS 1362 should always be used, and the fuse cover re-fitted. If the fuse cover is lost, the plug must not be used until a replacement is obtained.</span><br data-dcnode-id="2116"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Replacement fuse covers:</span></strong></li><span data-dcnode-id="2112" instrument_node="">
</span><li data-dcnode-id="2107"><span data-dcnode-id="2111" instrument_node="">If a replacement fuse cover is fitted, it must be of the correct colour as indicated by the coloured marking or the colour that is embossed in words on the base of the plug. Replacements can be obtained directly from your nearest Service Depot.</span><br data-dcnode-id="2110"><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Removing the plug:</span></strong></li><span data-dcnode-id="2106" instrument_node="">
</span><li data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">If your appliance has a non-rewireable moulded plug and you should wish to re-route the mains cable through partitions, units etc., please ensure that either: the plug is replaced by a fused 13 ampere rewireable plug bearing the BSI mark of approval. or: the maincable is wired directly into a 13 amp cable outlet, controlled by a switch, (in compliance with BS 5733) which is accessible without moving the appliance.</span><br data-dcnode-id="2104"><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Disposing of the plug:</span></strong></li><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2088"><span data-dcnode-id="2099" instrument_node="">Ensure that before disposing of the plug itself, you make the pins unusable so that it cannot be accidentally inserted into a socket. Instructions for connecting cable to an alternative plug:</span><br data-dcnode-id="2098"><strong data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Important:</span></strong><span data-dcnode-id="2095" instrument_node=""> the wires in the mains lead are coloured in accordance with the following code:</span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">
Green &amp; Yellow Earth</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">
Blue Neutral</span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">
Brown Live</span></li><span data-dcnode-id="2087" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2086" instrument_node="">As the colours of the wires in the lead may not correspond with the coloured markings identifying the terminals in your plug, proceed as</span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">
follows: Connect Green &amp; Yellow wire to terminal marked E or or coloured Green or Green &amp;</span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">
Yellow. Connect Brown wire to terminal marked L or coloured Red. Connect Blue wire to terminal marked N or coloured Black. If a 13 amp plug (BS 1363) is used it must be fitted with a 13 amp fuse, either in the plug or adaptor or at the distribution board. If you are in any doubt regarding the electrical supply to your machine, consult a qualified electrician before use. How to connect an alternative plug: The wires in this mains lead are coloured in accordance with the following code:</span><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">
BLUE NEUTRAL (N)</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">
BROWN LIVE (L)</span><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">
GREEN &amp; YELLOW EARTH (E)</span><img alt="image 7" class="aligncenter wp-image-450375" data-dcnode-id="2075" height="463" loading="lazy" sizes="(max-width: 471px) 100vw, 471px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-7-70.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-7-70.jpg 680w, https://manuals.plus/wp-content/uploads/2021/08/image-7-70-300x294.jpg 300w" width="471"></li><span data-dcnode-id="2073" instrument_node="">

</span><h5 data-dcnode-id="1930"><span data-dcnode-id="1931" id="cutting_off_the_water_and_electricity_supplies"><span data-dcnode-id="1932" instrument_node="">Cutting off the water and electricity supplies</span></span></h5><span data-dcnode-id="1929" instrument_node="">
</span><ul data-dcnode-id="1922"><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Turn off the water tap after every wash cycle. This will limit wear on the hydraulic system inside the washer-dryer and help to prevent leaks.</span></li><span data-dcnode-id="1926" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Unplug the washer-dryer when cleaning it and during all maintenance work.</span></li><span data-dcnode-id="1923" instrument_node="">
</span></ul><h5 data-dcnode-id="1919"><span data-dcnode-id="1920" id="cleaning_the_washer-dryer"><span data-dcnode-id="1921" instrument_node="">Cleaning the washer-dryer</span></span></h5><span data-dcnode-id="1918" instrument_node="">
</span><ul data-dcnode-id="1907"><li data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">The outer parts and rubber components of the appliance can be cleaned using a soft cloth soaked in lukewarm soapy water. Do not use solvents or abrasives.</span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1912"><span data-dcnode-id="1914" instrument_node="">The washer-dryer has a “Auto Clean” programme for its internal parts that must be run with no load in the drum. To help the wash cycle you may want to use either the detergent (i.e. a quantity 10% the quantity specified for lightly-soiled garments) or special additives to clean the washer-dryer. We recommend running a cleaning programme every 40 wash cycles.</span><img alt="image 8" class="aligncenter wp-image-450376" data-dcnode-id="1913" height="315" loading="lazy" sizes="(max-width: 311px) 100vw, 311px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-8-60.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-8-60.jpg 436w, https://manuals.plus/wp-content/uploads/2021/08/image-8-60-296x300.jpg 296w" width="311"></li><span data-dcnode-id="1911" instrument_node="">
</span><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">To start the programme press buttons A and B simultaneously for 5 seconds (see figure). The programme will start automatically and will run for about 70 minutes. To stop the cycle press the START/PAUSE button.</span></li><span data-dcnode-id="1908" instrument_node="">
</span></ul><p data-dcnode-id="1903"><strong data-dcnode-id="1904"><span data-dcnode-id="1906" instrument_node="">Cleaning the detergent dispenser drawer</span><img alt="image 9" class="aligncenter wp-image-450377" data-dcnode-id="1905" height="395" loading="lazy" sizes="(max-width: 392px) 100vw, 392px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-9-53.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-9-53.jpg 648w, https://manuals.plus/wp-content/uploads/2021/08/image-9-53-297x300.jpg 297w, https://manuals.plus/wp-content/uploads/2021/08/image-9-53-150x150.jpg 150w, https://manuals.plus/wp-content/uploads/2021/08/image-9-53-120x120.jpg 120w" width="392"></strong></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Remove the dispenser by raising it and pulling it out (see figure). Wash it under running water; this operation should be repeated frequently.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1896"><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Caring for the door and drum of your appliance</span></strong></p><span data-dcnode-id="1895" instrument_node="">
</span><ul data-dcnode-id="1891"><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Always leave the porthole door ajar in order to prevent unpleasant odours from forming.</span></li><span data-dcnode-id="1892" instrument_node="">
</span></ul><p data-dcnode-id="1885"><strong data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Cleaning the pump</span></strong><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">
The washer-dryer is fitted with a self-cleaning pump which does not require any maintenance. Sometimes, small items (such as coins or buttons) may fall into the pre-chamber which protects the pump, situated in its bottom part. ! Make sure the wash cycle has finished and unplug the appliance. To access the pre-chamber:</span><img alt="image 10" class="aligncenter wp-image-450378" data-dcnode-id="1886" height="566" loading="lazy" sizes="(max-width: 272px) 100vw, 272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-10-46.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-10-46.jpg 291w, https://manuals.plus/wp-content/uploads/2021/08/image-10-46-144x300.jpg 144w" width="272"></p><span data-dcnode-id="1884" instrument_node="">
</span><ol data-dcnode-id="1868"><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">sing a screwdriver, remove the cover panel on the lower front part of the washer-dryer (see figure);</span></li><span data-dcnode-id="1881" instrument_node="">
</span><li data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">unscrew the lid by rotating it anticlockwise (see figure): a little water may trickle out. This is perfectly normal;</span></li><span data-dcnode-id="1878" instrument_node="">
</span><li data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">clean the inside thoroughly;</span></li><span data-dcnode-id="1875" instrument_node="">
</span><li data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">screw the lid back on;</span></li><span data-dcnode-id="1872" instrument_node="">
</span><li data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">reposition the panel, making sure the hooks are securely in place before you push it onto the appliance.</span></li><span data-dcnode-id="1869" instrument_node="">
</span></ol><p data-dcnode-id="1865"><strong data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Checking the water inlet hose</span></strong></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Check the inlet hose at least once a year. If there are any cracks, it should be replaced immediately: during the wash cycles, water pressure is very strong and a cracked hose could easily split open. &nbsp;Never use second-hand hoses.</span></p><span data-dcnode-id="1861" instrument_node="">
</span><h4 data-dcnode-id="1858"><span data-dcnode-id="1859" id="precautions_and_tips"><span data-dcnode-id="1860" instrument_node="">Precautions and tips</span></span></h4><span data-dcnode-id="1857" instrument_node="">
</span><ul data-dcnode-id="1853"><li data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">This washer-dryer was designed and constructed in accordance with international safety regulations. The following information is provided for safety reasons and must therefore be read carefully.</span></li><span data-dcnode-id="1854" instrument_node="">
</span></ul><h5 data-dcnode-id="1850"><span data-dcnode-id="1851" id="general_safety"><span data-dcnode-id="1852" instrument_node="">General safety</span></span></h5><span data-dcnode-id="1849" instrument_node="">
</span><ul data-dcnode-id="1780"><li data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">This appliance can be used by children aged from 8 years and above and persons with reduced physical, sensory or mental capabilities or lack of experience and knowledge if they have been given supervision or instruction concerning use of the appliance in a safe way and understand the hazards involved. Children shall not play with the appliance. Cleaning and user maintenance shall not be made by children without supervision.</span></li><span data-dcnode-id="1846" instrument_node="">
</span><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Do not dry unwashed items in the tumble dryer.</span></li><span data-dcnode-id="1843" instrument_node="">
</span><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Items that have been soiled with substances such as cooking oil, acetone, alcohol, petrol, kerosene, spot removers, turpentine, waxes and wax removers should be washed in hot water with an extra amount of detergent before being dried in the tumble dryer.</span></li><span data-dcnode-id="1840" instrument_node="">
</span><li data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Items such as foam rubber (latex foam), shower caps, waterproof textiles, rubber backed articles and clothes or pillows fitted with foam rubber pads should not be dried in the tumble dryer.</span></li><span data-dcnode-id="1837" instrument_node="">
</span><li data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Fabric softeners, or similar products, should be used as specified by the fabric softener instructions.</span></li><span data-dcnode-id="1834" instrument_node="">
</span><li data-dcnode-id="1828"><span data-dcnode-id="1833" instrument_node="">The final part of a tumble dryer cycle occurs without heat (cool down cycle) to ensure that the items are left at a temperature that ensures that the items will not be damaged.</span><br data-dcnode-id="1832"><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">WARNING:</span></strong><span data-dcnode-id="1829" instrument_node=""> Never stop a tumble dryer before the end of the drying cycle unless all items are quickly removed and spread out so that the heat is dissipated.</span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">This appliance was designed for domestic use only.</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Do not touch the machine when barefoot or with wet or damp hands or feet.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Do not pull on the power supply cable when unplugging the appliance from the electricity socket. Hold the plug and pull.</span></li><span data-dcnode-id="1818" instrument_node="">
</span><li data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Do not touch the drained water as it may reach extremely high temperatures.</span></li><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Never force the porthole door. This could damage the safety lock mechanism designed to prevent accidental opening.</span></li><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1806"><span data-dcnode-id="1811" instrument_node="">If the appliance breaks down, do not under any circumstances access the internal mechanisms in an attempt to repair it yourself.</span><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">
• Always keep children well away from the appliance</span><br data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node="">
while it is operating.</span></li><span data-dcnode-id="1805" instrument_node="">
</span><li data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">If it must be moved, proceed with the help of two or three people and handle it with the utmost care. Never try to do this alone, because the appliance is very heavy.</span></li><span data-dcnode-id="1802" instrument_node="">
</span><li data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Before loading laundry into the washer dryer, make sure the drum is empty.</span></li><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">During the drying phase, the door tends to get quite hot.</span></li><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Do not use the appliance to dry clothes that have been washed with flammable solvents (e.g. trichlorethylene).</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Do not use the appliance to dry foam rubber or similar elastomers.</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Make sure that the water tap is turned on during the drying cycles.</span></li><span data-dcnode-id="1787" instrument_node="">
</span><li data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Children of less than 3 years should be kept away from the appliance unless continuously supervised.</span></li><span data-dcnode-id="1784" instrument_node="">
</span><li data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Remove all objects from pockets such as lighters and matches.</span></li><span data-dcnode-id="1781" instrument_node="">
</span></ul><p data-dcnode-id="1777"><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Disposal</span></strong></p><span data-dcnode-id="1776" instrument_node="">
</span><ul data-dcnode-id="1769"><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Disposing of the packaging materials: observe local regulations so that the packaging may be re-used.</span></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">The European Directive 2012/19/EU (WEEE) on Waste Electrical and Electronic Equipment, requires that old household electrical appliances must not be disposed of in the normal unsorted municipal waste stream. Old appliances must be collected separately in order to optimise the recovery and recycling of the materials they contain and reduce the impact on human health and the environment. The crossed out “wheeled bin” symbol on the product reminds you of your obligation, that when you dispose of the appliance it must be separately collected. Consumers should contact their local authority or retailer for information concerning the correct disposal of their old appliance.</span></li><span data-dcnode-id="1770" instrument_node="">
</span></ul><h4 data-dcnode-id="1766"><span data-dcnode-id="1767" id="description_of_the_washer-dryer_and_starting_a_wash_cycle"><span data-dcnode-id="1768" instrument_node="">Description of the washer-dryer and starting a wash cycle</span></span></h4><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1761"><strong data-dcnode-id="1762"><span data-dcnode-id="1764" instrument_node="">Control panel</span><img alt="image 11" class="aligncenter wp-image-450379" data-dcnode-id="1763" height="462" loading="lazy" sizes="(max-width: 978px) 100vw, 978px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-11-35.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-11-35.jpg 1256w, https://manuals.plus/wp-content/uploads/2021/08/image-11-35-300x142.jpg 300w, https://manuals.plus/wp-content/uploads/2021/08/image-11-35-1024x483.jpg 1024w, https://manuals.plus/wp-content/uploads/2021/08/image-11-35-768x363.jpg 768w" width="978"></strong></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1732"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Detergent dispenser drawer:</span></strong><span data-dcnode-id="1757" instrument_node=""> used to dispense detergents and washing additives (see “Detergents and laundry”).</span><br data-dcnode-id="1756"><strong data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">ON/OFF button:</span></strong><span data-dcnode-id="1753" instrument_node=""> switches the washer-dryer on and off. WASH CYCLE knob: programmes the wash cycles. During the wash cycle, the knob does not move.</span><br data-dcnode-id="1752"><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">FUNCTION buttons with indicator light:</span></strong><span data-dcnode-id="1749" instrument_node=""> used to select the available functions. The indicator light corresponding to the selected function will remain lit.</span><br data-dcnode-id="1748"><strong data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">TEMPERATURE knob:</span></strong><span data-dcnode-id="1745" instrument_node=""> sets the temperature or the cold wash cycle (see “Personalisation”).</span><br data-dcnode-id="1744"><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">DRYING knob:</span></strong><span data-dcnode-id="1741" instrument_node=""> used to set the desired drying programme (see “Personalisation”).</span><br data-dcnode-id="1740"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">WASH CYCLE PROGRESS indicator lights:</span></strong><span data-dcnode-id="1737" instrument_node=""> used to monitor the progress of the wash cycle. The illuminated indicator light shows which phase is in progress.</span><br data-dcnode-id="1736"><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">DOOR LOCKED indicator light:</span></strong><span data-dcnode-id="1733" instrument_node=""> indicates whether the door may be opened or not (see next page).</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1722"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">START/PAUSE button with indicator light:</span></strong><span data-dcnode-id="1728" instrument_node=""> starts or temporarily interrupts the wash cycles. N.B. To pause the wash cycle in progress, press this button; the corresponding indicator light will flash orange, while the indicator light for the current wash cycle phase will remain lit in a fixed manner. If the DOOR LOCKED indicator light is switched off, the door may be opened (wait approximately 3 minutes). To start the wash cycle from the point at which it was interrupted, press this button again.</span><br data-dcnode-id="1727"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Standby mode</span></strong><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">
This washer-dryer, in compliance with new energy saving regulations, is fitted with an automatic standby system which is enabled after about 30 minutes if no activity is detected. Press the ON-OFF button briefly and wait for the machine to start up again. Consumption in off-mode: 0.5 W Consumption in Left-on: 8 W.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1716"><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Indicator lights</span></strong><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">
The indicator lights provide important information. This is what they can tell you: Wash cycle phase indicator lights Once the desired wash cycle has been selected and has begun, the indicator lights switch on one by one to indicate which phase of the cycle is currently in progress.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1711"><strong data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Note:</span></strong><span data-dcnode-id="1712" instrument_node=""> during the “Drain” phase, the indicator light corresponding to the “Spin” cycle phase will illuminate.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1705"><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Function buttons and corresponding indicator lights</span></strong><br data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">
When a function is selected, the corresponding indicator light will illuminate. If the selected function is not compatible with the programmed wash cycle, the corresponding indicator light will flash and a sound alert (3 beeps); the function will not be activated. If a function which is incompatible with another function selected previously, only the most recent selection will remain active.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1699"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Door locked indicator light</span></strong><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">
If this indicator light is on, the appliance door is locked to prevent it from being opened accidentally; to avoid any damage, wait for the indicator light to switch off before you open the appliance door (wait approximately 3 minutes). ! If the START/PAUSE indicator light (orange) flashes rapidly at the same time as the function indicator light, this indicates a problem has occurred (see “Troubleshooting”).</span></p><div class="57be77cde1a6ddba353152d58844f9cf" data-dcnode-id="1691" data-index="2" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="1698" instrument_node="">
</span><div data-dcnode-id="1693" id="ezoic-pub-ad-placeholder-103"><span data-dcnode-id="1697" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0545639743190253" data-ad-format="auto" data-ad-slot="8389352297" data-dcnode-id="1696" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1695" instrument_node="">
</span><span data-dcnode-id="1694" instrument_node="">
</span></div><span data-dcnode-id="1692" instrument_node="">
</span></div><span data-dcnode-id="1690" instrument_node="">
</span><h5 data-dcnode-id="1687"><span data-dcnode-id="1688" id="starting_a_wash_cycle"><span data-dcnode-id="1689" instrument_node="">Starting a wash cycle</span></span></h5><span data-dcnode-id="1686" instrument_node="">
</span><ol data-dcnode-id="1658"><li data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Turn the washer-dryer on by pressing the ON/OFF button. All the indicator lights will turn on for a few seconds, then only the indicator lights relative to the selected programme settings will remain lit and the START/PAUSE indicator light will flash.</span></li><span data-dcnode-id="1683" instrument_node="">
</span><li data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Load the laundry and close the door.</span></li><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Set the WASH CYCLE knob to the desired programme.</span></li><span data-dcnode-id="1677" instrument_node="">
</span><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Set the washing temperature (see “Personalisation”).</span></li><span data-dcnode-id="1674" instrument_node="">
</span><li data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Set the drying cycle if necessary (see “Personalisation”).</span></li><span data-dcnode-id="1671" instrument_node="">
</span><li data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Measure out the detergent and washing additives (see “Detergents and laundry”).</span></li><span data-dcnode-id="1668" instrument_node="">
</span><li data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Select the desired functions.</span></li><span data-dcnode-id="1665" instrument_node="">
</span><li data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Start the wash cycle by pressing the START/PAUSE button and the corresponding indicator light will remain lit in a fixed manner, in green. To cancel the set wash cycle, pause the machine by pressing the START/PAUSE button and select a new cycle.</span></li><span data-dcnode-id="1662" instrument_node="">
</span><li data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">At the end of the wash cycle the indicator light will switch on. The DOOR LOCKED indicator light will switch off, indicating that the door may be opened (wait approximately 3 minutes). Take out your laundry and leave the appliance door ajar to make sure the drum dries completely. Switch the washer-dryer off by pressing the ON/OFF button.</span></li><span data-dcnode-id="1659" instrument_node="">

Turn the WASH CYCLE knob to one of the drying settings (12-13-14) according to the type of fabric, then select the desired drying duration using the DRYING knob. Selecting the cotton drying cycle ( position) through the programme selector knob and pressing the “Eco” button activates an automatic drying cycle that allows for saving energy, thanks to an optimal combination of air temperature and cycle duration.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="850"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Functions</span></strong><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
The various wash functions available with this washer-dryer will help to achieve the desired results, every time.</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
To activate the functions:</span></p><span data-dcnode-id="849" instrument_node="">
</span><ol data-dcnode-id="842"><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Press the button corresponding to the desired function;</span></li><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">the function is enabled when the corresponding indicator light is illuminated.</span></li><span data-dcnode-id="843" instrument_node="">
</span></ol><p data-dcnode-id="839"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Note:</span></strong></p><span data-dcnode-id="838" instrument_node="">
</span><ul data-dcnode-id="831"><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">If the selected function is not compatible with the programmed wash cycle, the corresponding indicator light will flash and a sound alert (3 beeps); the function will not be activated.</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">If a function which is incompatible with another function selected previously, only the most recent selection will remain active.</span></li><span data-dcnode-id="832" instrument_node="">
</span></ul><p data-dcnode-id="811"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Super Wash</span></strong><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
This option offers a high-performance wash due to the greater quantity of water used in the initial phase of the cycle, and due to the increased wash cycle duration, is particularly useful for the removal of stubborn stains.</span><br data-dcnode-id="826"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Slow Spin</span></strong><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
By selecting this function, reduces the spin speed.</span><br data-dcnode-id="821"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Timer Saver</span></strong><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
If you select this option, the wash cycle duration will be reduced by up to 50%, depending on the selected cycle, thereby guaranteeing simultaneous water and energy saving. Use this cycle for lightly soiled garments.</span><br data-dcnode-id="816"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Eco Wash</span></strong><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">
The Eco Wash option saves energy by not heating the water used to wash your laundry – an advantage both to the environment and to your energy bill. Instead, intensified wash action and water optimisation ensure great wash results in the same average time of a standard cycle. For the best washing results we recommend the usage of a liquid detergent.&nbsp; By also turning the DRYING knob to the position, a drying cycle automatically activates at the end of the wash cycle that also helps to reduce energy consumption, thanks to an optimal combination of air temperature and cycle duration.</span></p><span data-dcnode-id="810" instrument_node="">
</span><h4 data-dcnode-id="807"><span data-dcnode-id="808" id="detergents_and_laundry"><span data-dcnode-id="809" instrument_node="">Detergents and laundry</span></span></h4><span data-dcnode-id="806" instrument_node="">
</span><h5 data-dcnode-id="803"><span data-dcnode-id="804" id="detergent_dispenser_drawer"><span data-dcnode-id="805" instrument_node="">Detergent dispenser drawer</span></span></h5><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Successful washing results also depend on the correct dose of detergent: adding too much detergent will not necessarily result in a more efficient wash, and may in fact cause build up on the inside of your appliance and contribute to environmental pollution.</span></p><span data-dcnode-id="799" instrument_node="">
</span><ul data-dcnode-id="776"><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Use powder detergent for white cotton garments, for prewashing, and for washing at temperatures over 60°C.</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Follow the instructions given on the detergent packaging.</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="792" instrument_node="">Do not use hand washing detergents; they create too much foam.</span><img alt="image 12" class="aligncenter wp-image-450380" data-dcnode-id="791" height="333" loading="lazy" sizes="(max-width: 332px) 100vw, 332px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/image-12-32.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/image-12-32.jpg 442w, https://manuals.plus/wp-content/uploads/2021/08/image-12-32-300x300.jpg 300w, https://manuals.plus/wp-content/uploads/2021/08/image-12-32-150x150.jpg 150w, https://manuals.plus/wp-content/uploads/2021/08/image-12-32-120x120.jpg 120w" width="332"></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Open the detergent dispenser drawer and pour in the detergent or washing additive, as follows.</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Do not pour detergent into the middle compartment (*). Detergent should only be poured into the compartment</span></li><span data-dcnode-id="783" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">compartment 1: Detergent for the wash cycle (powder or liquid) If liquid detergent is used, it is recommended that the removable plastic partition A (supplied) be used for proper dosage.</span></li><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">If powder detergent is used, place the partition into slot B. compartment 2: Additives (fabric softeners, etc.) The fabric softener should not overflow the grid.</span></li><span data-dcnode-id="777" instrument_node="">
</span></ul><p data-dcnode-id="773"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Preparing the laundry</span></strong></p><span data-dcnode-id="772" instrument_node="">
</span><ul data-dcnode-id="756"><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Divide the laundry according to:</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">the type of fabric/the symbol on the label</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">the colours: separate coloured garments from whites.</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Empty all garment pockets and check the buttons.</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Do not exceed the values listed in the “Table of wash cycles”, which refer to the weight of the laundry when dry.</span></li><span data-dcnode-id="757" instrument_node="">
</span></ul><p data-dcnode-id="743"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">How much does your laundry weigh?</span></strong><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
1 sheet 400-500 g</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">
1 pillow case 150-200 g</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">
1 tablecloth 400-500 g</span><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">
1 bathrobe 900-1,200 g</span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">
1 towel 150-250 g</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="735"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Garments requiring special care</span></strong><br data-dcnode-id="739"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Anti-Stain:</span></strong><span data-dcnode-id="736" instrument_node=""> this programme is suitable to heavily-soiled garments with resistant colours. It ensures a washing class that is higher than the standard class (A class). When running the programme, do not mix garments of different colours. We recommend the use of powder detergent. Pre-treatment with special additives is recommended if there are obstinate stains.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="733" instrument_node="">If the drying function is selected, a drying cycle automatically activates at the end of the wash cycle that resembles open-air drying, with the added advantages of preserving garments from yellowing due to sunlight exposure and preventing loss of whiteness caused by the possible presence. of dust in the air. Drying cycles can only be selected on a level basis. Dryness level “ ” recommended.</span><br data-dcnode-id="732"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Anti-Stain Quick:</span></strong><span data-dcnode-id="729" instrument_node=""> this programme is ideal for washing the most difficult daily stains in 1 hour. It is ideal for mixed fabrics and coloured garments, caring for your clothes as it washes. If the drying function is selected, a drying cycle automatically activates at the end of the wash cycle that resembles open-air drying, with the added advantages of preserving garments from yellowing due to sunlight exposure and preventing loss of whiteness caused by the possible presence of dust in the air. Drying cycles can only be selected on a level basis. Dryness level “ ” recommended.</span><br data-dcnode-id="728"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Anti Allergy:</span></strong><span data-dcnode-id="725" instrument_node=""> use programme 7 to remove major allergens such as pollen, mites, cat’s and dog’s hair. Wool – Woolmark Apparel Care – Green: the wool wash cycle of this machine has been approved by The Woolmark Company for the washing of wool garments labelled as “hand wash” provided that the products bare washed according to the instructions on the garment label and those issued by the manufacturer of this washing machine (M1318)</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="722" instrument_node="">In UK, Eire, Hong Kong and India the Woolmark trade mark is a Certification trade mark.</span><br data-dcnode-id="721"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Delicates:</span></strong><span data-dcnode-id="718" instrument_node=""> use programme 9 to wash very delicate garments with decorative features, such as diamantes and sequins. We recommend turning the garments inside out before washing and placing small items into the special bag for washing delicates. When selecting an exclusively time-based drying function, a drying cycle is performed at the end of the wash cycle that is particularly delicate, thanks to light handling and appropriate temperature control of the water jet.</span><br data-dcnode-id="717"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The recommended durations are:</span></strong><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
1 kg of synthetic garments –&gt; 150 min</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
1 kg of synthetic and cotton garments –&gt; 180 min</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">
1 kg of cotton garments –&gt; 180 min</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">
The degree of dryness depends on the load and fabric composition.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="701"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Wash &amp; Dry 45’:</span></strong><span data-dcnode-id="702" instrument_node=""> select programme 11 for washing and drying lightly soiled garments (Cotton and Synthetics) in a short time. This cycle may be used to wash and dry a laundry load of up to 1 kg in just 45 minutes. To achieve optimum results, use liquid detergent and pretreat cuffs, collars and stains.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Load balancing system</span></strong><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">
Before every spin cycle, to avoid excessive vibrations and to distribute the load in a uniform manner, the drum rotates continuously at a speed which is slightly greater than the washing rotation speed. If, after several attempts, the load is not balanced correctly, the machine spins at a reduced spin speed. If the load is excessively unbalanced, the washer dryer performs the distribution process instead of spinning. To encourage improved load distribution and balance, we recommend small and large garments are mixed in the load.</span></p><span data-dcnode-id="694" instrument_node="">
</span><h4 data-dcnode-id="691"><span data-dcnode-id="692" id="troubleshooting"><span data-dcnode-id="693" instrument_node="">Troubleshooting</span></span></h4><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">Your washer-dryer could fail to work. Before contacting the Technical Assistance Centre (see “Assistance”), make sure that the problem cannot be solved easily using the following list.</span><img alt="table 1" class="aligncenter size-full wp-image-450498" data-dcnode-id="688" height="688" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/table-1-8.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/table-1-8.jpg 749w, https://manuals.plus/wp-content/uploads/2021/08/table-1-8-300x276.jpg 300w" width="749"><img alt="table 2" class="aligncenter size-full wp-image-450499" data-dcnode-id="687" height="202" loading="lazy" sizes="(max-width: 755px) 100vw, 755px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/table-2-3.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/table-2-3.jpg 755w, https://manuals.plus/wp-content/uploads/2021/08/table-2-3-300x80.jpg 300w" width="755"><img alt="table 3" class="aligncenter size-full wp-image-450500" data-dcnode-id="686" height="830" loading="lazy" sizes="(max-width: 734px) 100vw, 734px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manuals.plus/wp-content/uploads/2021/08/table-3-1.jpg&amp;raw" srcset="https://manuals.plus/wp-content/uploads/2021/08/table-3-1.jpg 734w, https://manuals.plus/wp-content/uploads/2021/08/table-3-1-265x300.jpg 265w" width="734"></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="680"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Remember,</span></strong><span data-dcnode-id="681" instrument_node=""> you will be charged for a service call for problems caused by incorrect installation, as indicated on pages 2 to 4. Not emptying contents from pockets may cause pump or drain blockages, or may damage the machine. Do not wash items which do not have a wash label, or wash items that are not intended as machine washable.</span></p><span data-dcnode-id="679" instrument_node="">
</span><h4 data-dcnode-id="676"><span data-dcnode-id="677" id="product_guarantee_and_repair_information"><span data-dcnode-id="678" instrument_node="">Product Guarantee and Repair Information</span></span></h4><span data-dcnode-id="675" instrument_node="">
</span><h5 data-dcnode-id="672"><span data-dcnode-id="673" id="guarantee"><span data-dcnode-id="674" instrument_node="">Guarantee</span></span></h5><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="664"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">12 Months Parts and Labour Guarantee</span></strong><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
Your appliance has the benefit of our manufacturer’s guarantee, which covers the cost of breakdown repairs for twelve months from the date of purchase. This gives you the reassurance that if, within that time, your appliance is proven to be defective because of either workmanship or materials, we will, at our discretion, either repair or replace the appliance at no cost to you:</span><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
This guarantee is subject to the following conditions:</span></p><span data-dcnode-id="663" instrument_node="">
</span><ul data-dcnode-id="630"><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">The appliance has been installed and operated correctly and in accordance with our operating and maintenance instructions.</span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">The appliance is used only on the electricity or gas supply printed on the rating plate.</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The appliance has been used for normal domestic purposes only.</span></li><span data-dcnode-id="654" instrument_node="">
