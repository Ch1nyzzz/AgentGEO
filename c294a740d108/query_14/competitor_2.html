</span><div class="row" data-dcnode-id="591"><span data-dcnode-id="1187" instrument_node="">
</span><div class="col-sm-8 post-content" data-dcnode-id="1010"><span data-dcnode-id="1186" instrument_node="">
</span><div class="col-sm-12 blog-entry clearfix" data-dcnode-id="1013"><span data-dcnode-id="1185" instrument_node="">
</span><h2 class="post-title" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Combination Sprinkler-Standpipe Systems: You Might Be Surprised</span></h2><span data-dcnode-id="1182" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1161"><span data-dcnode-id="1181" instrument_node="">
</span><div class="tags" data-dcnode-id="1167"><span data-dcnode-id="1180" instrument_node="">
</span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/tag/codes-standards/"><span data-dcnode-id="1179" instrument_node="">Codes &amp; Standards</span></a><span data-dcnode-id="1177" instrument_node="">
</span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/tag/nfpa-14/"><span data-dcnode-id="1176" instrument_node="">NFPA 14</span></a><span data-dcnode-id="1174" instrument_node="">
</span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/tag/standpipe/"><span data-dcnode-id="1173" instrument_node="">Standpipe</span></a><span data-dcnode-id="1171" instrument_node="">
</span><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/tag/terin-hopkins/"><span data-dcnode-id="1170" instrument_node="">Terin Hopkins</span></a><span data-dcnode-id="1168" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span><span class="date" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">January 6, 2020</span></span><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">
</span><img class="post-thumbnail img-responsive" data-dcnode-id="1159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/wp-content/uploads/2020/01/Terin_Combination-system-Blog-Hopikns-pic-1-770x200.jpg&amp;raw"><span data-dcnode-id="1158" instrument_node="">
</span><div class="cks-basic-editor" data-dcnode-id="1046"><span data-dcnode-id="1157" instrument_node="">
</span><h2 data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">What makes up a combination sprinkler-standpipe system—and what are some key considerations?</span></strong></h2><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1152" instrument_node="">Understanding combination sprinkler standpipe systems is simple. The fire sprinkler system and standpipe system share a common riser. Section 3.3.20.3 of the 2019 edition of&nbsp;</span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D14" rel="noopener" target="_blank" title="NFPA 14"><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">NFPA 14</span></em></a><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">: Standard for the Installation of Standpipes and Hose Systems </span></em><span data-dcnode-id="1146" instrument_node="">defines a combined system as:</span></p><span data-dcnode-id="1144" instrument_node="">
</span><blockquote data-dcnode-id="1141"><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">A standpipe system that supplies both hose connections and automatic sprinklers.</span></p></blockquote><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">That definition also holds a hidden clue to understanding the design implication of a combined fire sprinkler system and standpipe system. While it states “automatic sprinklers,” it does not reference the type of required standpipe activation. That leads us to a discussion of the different kinds of standpipes systems and their unique characteristics.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><h2 data-dcnode-id="1134"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Types of standpipes in combination systems</span></strong></h2><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">The 2019 edition of NFPA 14 defines seven different types of standpipes systems:</span></p><span data-dcnode-id="1130" instrument_node="">
</span><ul data-dcnode-id="1107"><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Automatic dry standpipe system</span></li><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Automatic wet standpipe system</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Combined system</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Manual dry standpipe system</span></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Manual wet standpipe system</span></li><span data-dcnode-id="1114" instrument_node="">
</span><li data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Semiautomatic dry standpipe system</span></li><span data-dcnode-id="1111" instrument_node="">
</span><li data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Wet standpipe system</span></li><span data-dcnode-id="1108" instrument_node="">
</span></ul><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1105" instrument_node="">However, only certain types of standpipe systems can be combined with fire sprinklers. We can quickly eliminate a manual dry standpipe system, as it does not have a permanent water supply capable of supplying our automatic sprinkler design. The semiautomatic standpipe system is simply eliminated by the “automatic” sprinkler requirements found in&nbsp;</span><em data-dcnode-id="1101"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D13" rel="noopener" target="_blank" title="NFPA 13"><span data-dcnode-id="1104" instrument_node="">NFPA 13</span></a><span data-dcnode-id="1102" instrument_node="">: Standard for the Installation of Sprinkler Systems.&nbsp;</span></em></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1098" instrument_node="">The combined system and wet systems are obvious choices and only indicate that the risers are shared wet risers. This essentially leaves us with a choice between automatic dry standpipe, automatic wet standpipe, and a manual wet standpipe system—the key difference being the choice between automatic and manual. The term “</span><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">automatic</span></strong><span data-dcnode-id="1095" instrument_node="">” simply means that the system will automatically provide required pressure and flow while, in contrast, the “</span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">manual</span></strong><span data-dcnode-id="1092" instrument_node="">” system water supply is only required to meet sprinkler demand.&nbsp;The manual standpipe side of the system will require supplemental pressure and flow to be supplied by the fire service.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><h2 data-dcnode-id="1087"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Hose connections in combination systems</span></strong></h2><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">For this discussion, one must also understand that while hose connections are found in combination systems, hose connections may not always be required to meet both the flow and pressure requirements of a class I or III standpipe system. It must also be noted that combination systems are not allowed in all occupancies. Combined-riser-designed systems are typically found in large or multiple floor-structures below the local jurisdiction’s height limitations for high-rises.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><img alt="Picture of Hose Connection" class="alignnone wp-image-10116 size-full img-responsive" data-dcnode-id="1082" height="380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nfsa.org/wp-content/uploads/2020/01/hose-connections-in-combination-systems-scaled-e1590881585307.jpg&amp;raw" title="Picture of Hose Connection" width="600"></p><span data-dcnode-id="1080" instrument_node="">
</span><h2 data-dcnode-id="1077"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Choosing the right combination sprinkler standpipe system</span></strong></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The choice of a manual wet set-up supplementing a combination standpipe system over an automatic wet is used to reduce total system cost by relying on the fire service to provide pump pressure.&nbsp;This allows a mid-rise building to be constructed without the need for a building fire pump. This often comes as a surprise to the fire service, which often believes that all standpipe hose connections are created equal when it comes to pressure and flow requirements. There must be a clear strategic plan for the use of combination systems, and fire service tactical considerations must start with the building’s system design.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">The local officials, both fire service and building officials, must understand local capabilities and have an in-depth understanding of the design differences and implications to be able to adequately provide the best level of fire protection for their communities.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">Have more questions about combination sprinkler standpipe systems? NFSA members can reach out </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//members.nfsa.org/general/%3Ftype%3DCONTACT" title="Contact NFSA"><span data-dcnode-id="1068" instrument_node="">via our website</span></a><span data-dcnode-id="1066" instrument_node=""> or by calling 443-863-4464 for answers and support from our code, standards, and engineering experts. Not an NFSA member yet? Join today!</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1061" instrument_node="">
