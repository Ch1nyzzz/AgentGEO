ew tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="928" instrument_node="">. A </span><a data-dcnode-id="923" data-id="https://www.nfpa.org/-/media/Files/News-and-Research/Fire-statistics-and-reports/Suppression/ossprinklers.pdf" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/-/media/Files/News-and-Research/Fire-statistics-and-reports/Suppression/ossprinklers.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="927" instrument_node="">report</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="926" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="922" instrument_node=""> from July 2017 by the National Fire Protection Association (NFPA) – U.S. Experience with Sprinklers – shows that sprinklers can reduce property damage by more than 58% and deaths related to residential fires by more than 81%.</span></p><span data-dcnode-id="920" instrument_node="">

="832" instrument_node="">How do I choose between the various fire sprinkler systems and designs that are available?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="827"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="828" href="#What_is_the_safety_record_for_facilities_that_are_fully_sprinkled" title="What is the safety record for facilities that are fully sprinkled?"><span data-dcnode-id="829" instrument_node="">What is the safety record for facilities that are fully sprinkled?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="824"><a class="ez-toc-link ez-toc-heading-26" data-dcnode-id="825" href="#What_is_the_cost_of_installing_an_automatic_fire_sprinkler_system_into_an_existing_facility" title="What is the cost of installing an automatic fire sprinkler system into an existing facility?"><span data-dcnode-id="826" instrument_node="">What is the cost of installing an automatic fire sprinkler system into an existing facility?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="821"><a class="ez-toc-link ez-toc-heading-27" data-dcnode-id="822" href="#Can_I_get_a_fire_sprinkler_installed_on_my_property_for_a_discount_amount" title="Can I get a fire sprinkler installed on my property for a discount amount?"><span data-dcnode-id="823" instrument_node="">Can I get a fire sprinkler installed on my property for a discount amount?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="818"><a class="ez-toc-link ez-toc-heading-28" data-dcnode-id="819" href="#Does_the_presence_of_sprinkles_create_a_window_for_water_damage" title="Does the presence of sprinkles, create a window for water damage?"><span data-dcnode-id="820" instrument_node="">Does the presence of sprinkles, create a window for water damage?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="815"><a class="ez-toc-link ez-toc-heading-29" data-dcnode-id="816" href="#How_do_exactly_do_fire_sprinklers_work" title="How do exactly do fire sprinklers work?"><span data-dcnode-id="817" instrument_node="">How do exactly do fire sprinklers work?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="812"><a class="ez-toc-link ez-toc-heading-30" data-dcnode-id="813" href="#Can_fire_sprinklers_affect_the_looks_of_my_building" title="Can fire sprinklers affect the looks of my building?"><span data-dcnode-id="814" instrument_node="">Can fire sprinklers affect the looks of my building?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="809"><a class="ez-toc-link ez-toc-heading-31" data-dcnode-id="810" href="#Where_can_I_find_a_reputable_contractor_to_install_a_fire_sprinkler_system_in_my_home" title="Where can I find a reputable contractor to install a fire sprinkler system in my home?"><span data-dcnode-id="811" instrument_node="">Where can I find a reputable contractor to install a fire sprinkler system in my home?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="806"><a class="ez-toc-link ez-toc-heading-32" data-dcnode-id="807" href="#Should_I_install_a_wet_pipe_or_a_dry_pipe_sprinkler_system_in_my_home" title="Should I install a wet pipe or a dry pipe sprinkler system in my home?"><span data-dcnode-id="808" instrument_node="">Should I install a wet pipe or a dry pipe sprinkler system in my home?</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="801"><a class="ez-toc-link ez-toc-heading-33" data-dcnode-id="802" href="#Final_note" title="Final note"><span data-dcnode-id="803" instrument_node="">Final note</span></a></li></ul></nav></div><span data-dcnode-id="797" instrument_node="">
</span><h2 data-dcnode-id="793"><span class="ez-toc-section" data-dcnode-id="796" id="How_to_choose_a_sprinkler_system"></span><span data-dcnode-id="795" instrument_node="">How to choose a sprinkler system</span><span class="ez-toc-section-end" data-dcnode-id="794"></span></h2><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Since there are different sprinkler systems available, it is likely going to be a challenge for you to choose the one that will suit the needs of your property. To make an informed decision, it is important that you learn as much as you can about the common sprinkler systems that are available.</span></p><span data-dcnode-id="789" instrument_node="">
</span><h3 data-dcnode-id="785"><span class="ez-toc-section" data-dcnode-id="788" id="1_Wet_pipe"></span><span data-dcnode-id="787" instrument_node="">1. Wet pipe</span><span class="ez-toc-section-end" data-dcnode-id="786"></span></h3><span data-dcnode-id="784" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="777"><figure class="alignright size-large" data-dcnode-id="778"><img alt="" class="error" data-dcnode-id="783" data-lazy-src="/wp-content/uploads/2020/09/Wet_Pipe_Sprinkler_System-300x200.jpg" data-ll-status="error" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/uploads/2020/09/Wet_Pipe_Sprinkler_System-300x200.jpg&amp;raw"><noscript data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">&lt;img src="/wp-content/uploads/2020/09/Wet_Pipe_Sprinkler_System-300x200.jpg" alt=""/&gt;</span></noscript><figcaption data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Wet Pipe Sprinkler System</span></figcaption></figure></div><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Wet pipe sprinkler systems are filled with water at all times and discharge water when there is a rapid increase in heat in the area in which they are installed. They are best suited for climate controlled building and should never be installed in areas or spaces that aren’t able to maintain above 35 to 40F.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">According to </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D13" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="771" instrument_node="">NFPA 13</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="770" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="766" instrument_node="">, the responsibility of maintaining the temperature of the area where the sprinkler system is installed is on the owner of the building. Yes, there are means to prevent wet pipe sprinklers from freezing (in cold regions) such as heat trace and insulation. However, these options may or may not be permitted by the local authority having jurisdiction. The reason why thermal operating elements are often not permitted is that they are susceptible to physical damage, which may make the system to dispense water inadvertently.</span></p><span data-dcnode-id="764" instrument_node="">
</span><h3 data-dcnode-id="760"><span class="ez-toc-section" data-dcnode-id="763" id="2_Antifreeze"></span><span data-dcnode-id="762" instrument_node="">2. Antifreeze</span><span class="ez-toc-section-end" data-dcnode-id="761"></span></h3><span data-dcnode-id="759" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="752"><figure class="alignright size-large" data-dcnode-id="753"><img alt="Antifreeze Sprinkler System" class="lazyloaded" data-dcnode-id="758" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/uploads/2020/09/Antifreeze_Sprinkler_System-300x200.jpg&amp;raw"><noscript data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">&lt;img src="/wp-content/uploads/2020/09/Antifreeze_Sprinkler_System-300x200.jpg" alt="Antifreeze Sprinkler System"/&gt;</span></noscript><figcaption data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Antifreeze Sprinkler System</span></figcaption></figure></div><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">This is a sprinkler system that is designed to be used in cold regions. For the system to function properly, a specific concentration of antifreeze is needed in the sprinkler piping. If you plan to use this system, you need to keep it in mind that when the antifreeze solution isn’t properly mixed, it may become flammable when discharged by a sprinkler.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Research is presently being carried out to create non-combustible antifreeze. In the main time, it is wise to install dry sprinkler systems in areas that are exposed to extreme temperatures (cold and freezing). Facilities and structures that use antifreeze systems should ensure that the solution is moderately concentrated and the solution stays well mixed.</span></p><span data-dcnode-id="745" instrument_node="">
</span><h3 data-dcnode-id="741"><span class="ez-toc-section" data-dcnode-id="744" id="3_Deluge"></span><span data-dcnode-id="743" instrument_node="">3. Deluge</span><span class="ez-toc-section-end" data-dcnode-id="742"></span></h3><span data-dcnode-id="740" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="733"><figure class="alignright size-large" data-dcnode-id="734"><img alt="Deluge Sprinkler System" class="lazyloaded" data-dcnode-id="739" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/uploads/2020/09/Deluge_Sprinkler_System-300x200.jpg&amp;raw"><noscript data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&lt;img src="/wp-content/uploads/2020/09/Deluge_Sprinkler_System-300x200.jpg" alt="Deluge Sprinkler System"/&gt;</span></noscript><figcaption data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Deluge Sprinkler System</span></figcaption></figure></div><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">Deluge sprinklers are best suited for </span><a data-dcnode-id="729" data-id="84" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-hazards-around-the-workplace/"><span data-dcnode-id="730" instrument_node="">protecting areas with high challenge fire hazards</span></a><span data-dcnode-id="728" instrument_node=""> like a flammable liquid storage plant. If there happen to be a fire in this region, it will spread so quickly that regular sprinklers won’t be able to put it out on time, as their activation time is too slow.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Deluge systems are exclusively designed to protect highly combustible gasses and liquids, not for ordinary combustibles.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="722" instrument_node="">The sprinkler head in a deluge system does not have a thermal heating element. So the system is activated when a </span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-detection-introduction/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="721" instrument_node="">fire detection</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="720" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="716" instrument_node=""> device like </span><a data-dcnode-id="711" data-id="119" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-detectors-thermal-detectors/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="715" instrument_node="">heat</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="714" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="710" instrument_node=""> or </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-detectors-smoke-alarms/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="709" instrument_node="">smoke detector</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="708" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="704" instrument_node=""> triggers an alarm or by a manual means.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Deluge systems are permitted in cold and warm environments due to the lack of water in the piping of the system under normal conditions. When activated, water is discharged from every sprinkler connected to the system.</span></p><span data-dcnode-id="699" instrument_node="">
</span><h3 data-dcnode-id="695"><span class="ez-toc-section" data-dcnode-id="698" id="4_Pre-action_system"></span><span data-dcnode-id="697" instrument_node="">4. Pre-action system</span><span class="ez-toc-section-end" data-dcnode-id="696"></span></h3><span data-dcnode-id="694" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="687"><figure class="alignright size-large" data-dcnode-id="688"><img alt="Pre-Action Sprinkler System" class="lazyloaded" data-dcnode-id="693" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/uploads/2020/09/Pre-Action_Sprinkler_System-300x200.jpg&amp;raw"><noscript data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">&lt;img src="/wp-content/uploads/2020/09/Pre-Action_Sprinkler_System-300x200.jpg" alt="Pre-Action Sprinkler System"/&gt;</span></noscript><figcaption data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Pre-Action Sprinkler System</span></figcaption></figure></div><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="685" instrument_node="">When </span><a data-dcnode-id="680" data-id="113" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-sprinklers-system/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">fire sprinkler systems</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="683" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="679" instrument_node=""> are installed to protect valuable assets that are prone to water damage, pre-action systems becomes necessary. In these instances, there is a need for a second confirmation of a fire, in addition to the heat sensing element embedded in the sprinkler. The second confirmation is usually by a smoke or heat detector connected to a fire alarm panel or a local releasing panel. This configuration is known as a single-interlock. This means of detection can be combined with nitrogen in the system piping as a means of limiting water flow into the piping system in a double check configuration.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Upon activation, a pre-action valve is released, allowing water to flow into the system piping. Once the thermal element embedded in the sprinkler is activated, pressurized gas and water is discharged. Note that, with the activation of the second detection device, damage to the sprinkler head would prevent water from flowing out.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Since piping in pre-action systems isn’t filled with water, they can be used in cold or warm environments. To function properly, these systems need additional components like a releasing panel, pre-action valve, potential air compressor, and fire detection system.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">A pre-action system is more expensive to purchase and maintain especially when compared to dry and wet piping systems, but it provides extra security that other systems do not offer.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h3 data-dcnode-id="664"><span class="ez-toc-section" data-dcnode-id="667" id="5_Combination_sprinkler"></span><span data-dcnode-id="666" instrument_node="">5. Combination sprinkler</span><span class="ez-toc-section-end" data-dcnode-id="665"></span></h3><span data-dcnode-id="663" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="656"><figure class="alignright size-large" data-dcnode-id="657"><img alt="Pre-Action Sprinkler System" class="lazyloaded" data-dcnode-id="662" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/uploads/2020/09/Pre-Action_Sprinkler_System-300x200.jpg&amp;raw"><noscript data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">&lt;img src="/wp-content/uploads/2020/09/Pre-Action_Sprinkler_System-300x200.jpg" alt="Pre-Action Sprinkler System"/&gt;</span></noscript><figcaption data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Pre-Action Sprinkler System</span></figcaption></figure></div><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="654" instrument_node="">A Standpipe or combination system is a non-automatic sprinkler system that is commonly used in combination with other sprinkler systems. A pure standpipe system can be found in older buildings and garages without a sprinkler and are used to provide water for </span><a data-dcnode-id="649" data-id="9" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-fighting-introduction/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">a responding firefighter</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="652" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="648" instrument_node="">.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">There is no restriction as to the installation of combination sprinkler systems. In these systems, the vertical rise of a sprinkler serves as a hose both as a sprinkler system piping and a hose valve. A separate installation standard was created by the NFPA for standpipe systems.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Automatic sprinkler systems are regarded as one of the best property protection and life safety choices that can be made by a professional design team or homeowner. The building codes enforce this by creating room for flexibility in construction and design. While the building codes encourage the installation of automatic sprinklers, they may leave the design choice to the owner of the structure or building when it comes to the </span><a data-dcnode-id="637" data-id="165" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/prepare-for-apartment-fire/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="641" instrument_node="">preparation of an apartment fire</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="640" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="636" instrument_node="">. Design choice may include, but not exclusive to the design approach, the type of sprinkler and the type of system. Having a clear understanding of the common design choice will help you as an engineer or homeowner alike to choose the best sprinkler system for their structure.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="630"><span class="ez-toc-section" data-dcnode-id="633" id="Sprinkler_inspection_and_maintenance"></span><span data-dcnode-id="632" instrument_node="">Sprinkler inspection and maintenance</span><span class="ez-toc-section-end" data-dcnode-id="631"></span></h2><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="628" instrument_node="">Have you recently had your sprinkler system inspected? As you probably know, fire sprinklers are very important </span><a data-dcnode-id="623" data-id="81" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-prevention-introduction/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="627" instrument_node="">fire protection system</span><img alt="Opens in a new tab." class="externallinkimage lazyloaded" data-dcnode-id="626" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/wp-content/themes/acabado/img/extlink.png&amp;raw" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="622" instrument_node="">. In order for them to function well and put out flames in the event of a fire, they need to be inspected annually or bi-annually. Most jurisdictions in the United States like Washington DC, Maryland, and Virginia among others require constant inspection of sprinkler system. Irrespective of where you live in the US or any part of the world, it is important that you inspect your fire sprinkler at least once a year.</span></p><span data-dcnode-id="620" instrument_node="">
</span><h3 data-dcnode-id="616"><span class="ez-toc-section" data-dcnode-id="619" id="Annual_fire_sprinkler_inspection"></span><span data-dcnode-id="618" instrument_node="">Annual fire sprinkler inspection</span><span class="ez-toc-section-end" data-dcnode-id="617"></span></h3><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The NFPA requires home or building owners to inspect their fire sprinklers annually. In addition, they make arrangements for an inspection anytime they:</span></p><span data-dcnode-id="612" instrument_node="">
</span><ul data-dcnode-id="605"><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Change the layout or use of a building</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Add a water meter or a backflow-preventer to a building or structure</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Face water shortage or other public water supply changes.</span></li></ul><span data-dcnode-id="604" instrument_node="">
</span><h3 data-dcnode-id="600"><span class="ez-toc-section" data-dcnode-id="603" id="Fire_sprinkler_inspection_process"></span><span data-dcnode-id="602" instrument_node="">Fire sprinkler inspection process</span><span class="ez-toc-section-end" data-dcnode-id="601"></span></h3><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The following are likely going to occur during a fire sprinkler inspection:</span></p><span data-dcnode-id="596" instrument_node="">
</span><ul data-dcnode-id="573"><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Valves will be lubricated.</span></li><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Supervisory devices and alarms will be inspected to ensure that they are working properly.</span></li><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Main drain test will be carried out and its results will be used to verify if proper water pressure and volume are available for the fire sprinkler system.</span></li><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Visual inspection and clearance of sprinkler heads and piping systems that is accessible from the floor.</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Tamper switches are tested by verifying the signals received at the control panel of the alarm and by exercising the valve through the full range of motion.</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Fire department connection will be inspected for being unobstructed and for proper caps.</span></li><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The gauge calibration date of the system will be inspected to see if water pressure is adequate.</span></li><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Verification of signals received at the main monitoring station.</span></li><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Sprinkler heads and wrenches will be inspected.</span></li><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Valves will be checked to see if they are the properly sealed and in the right position.</span></li><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Check for the right signage on valves.</span></li></ul><span data-dcnode-id="572" instrument_node="">
</span><h3 data-dcnode-id="568"><span class="ez-toc-section" data-dcnode-id="571" id="Easy_ways_to_keep_your_sprinklers_safe_between_inspections"></span><span data-dcnode-id="570" instrument_node="">Easy ways to keep your sprinklers safe between inspections</span><span class="ez-toc-section-end" data-dcnode-id="569"></span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">There are a handful of things you could do to keep your sprinkler in a perfect working condition.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Below are a few of them:</span></p><span data-dcnode-id="561" instrument_node="">
</span><ul data-dcnode-id="550"><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Make sure your control valves are in the open position at all times.</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Don’t paint your fire sprinkler heads.</span></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Don’t stack anything close to your sprinkler head or within 18 inches of it.</span></li><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Promptly report any damage to your sprinkler system to a reputable protection company.</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Don’t hang anything from your sprinkler heads.</span></li></ul><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="548" instrument_node="">See, you don’t need to be </span><a data-dcnode-id="543" data-id="160" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-fighting-startups/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="547" instrument_node="">tech-savvy like these</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="546" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="542" instrument_node=""> to keep your fire sprinkler in an excellent working condition. However, when it comes to annual inspection, it is wise for you to leave it to the pros. Even if you are able to able to carry out some of the annual inspections on your own, it is wise you hire a trained professional to do it for you so that you don’t incur more harm than good.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h2 data-dcnode-id="536"><span class="ez-toc-section" data-dcnode-id="539" id="Advantages_and_disadvantages_of_having_fire_sprinklers_installed_in_your_home"></span><span data-dcnode-id="538" instrument_node="">Advantages and disadvantages of having fire sprinklers installed in your home</span><span class="ez-toc-section-end" data-dcnode-id="537"></span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="534" instrument_node="">Over the last couple of years, many states in the US have been trying to pass binding laws that would require new homes and structure to have automatic fire sprinklers installed in them. While there are presently no state that has this requirement in place, this has gotten a lot of people wondering if there if they should or shouldn’t install a fire sprinkler system in their home. If you are presently remodelling your home or building a new home, you may be giving serious thoughts to the idea of </span><a data-dcnode-id="529" data-id="113" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-sprinklers-system/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="533" instrument_node="">installing a residential fire sprinkler system</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="532" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="528" instrument_node=""> to protect the lives of your family and your property </span><a data-dcnode-id="523" data-id="83" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-hazards-around-the-home/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="527" instrument_node="">in the event of a fire</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="526" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="522" instrument_node="">. Learning the highs and the lows associated with fire sprinklers will put in a better position to make an informed decision as to whether you should install a residential fire sprinkler system or not.</span></p><span data-dcnode-id="520" instrument_node="">
</span><h3 data-dcnode-id="516"><span class="ez-toc-section" data-dcnode-id="519" id="Disadvantages_of_installing_fire_sprinkler_systems_in_your_home"></span><span data-dcnode-id="518" instrument_node="">Disadvantages of installing fire sprinkler systems in your home</span><span class="ez-toc-section-end" data-dcnode-id="517"></span></h3><span data-dcnode-id="515" instrument_node="">
</span><h4 data-dcnode-id="511"><span class="ez-toc-section" data-dcnode-id="514" id="Cost_of_installation"></span><span data-dcnode-id="513" instrument_node="">Cost of installation</span><span class="ez-toc-section-end" data-dcnode-id="512"></span></h4><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">Buying and installing a fire sprinkler in your home is likely going to cost you a small fortune. The National Construction Estimate (NCE) shows that the average cost of installing a fire system in a home is about 4 dollars per square foot. This means that it would cost about </span><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">4000 dollars to install the system in a 1000 square foot home</span></strong><span data-dcnode-id="506" instrument_node="">. As you know, renovating or building a home is very expensive. So, if you are on a tight budget, you may not have enough money to embark on this type of project.</span></p><span data-dcnode-id="504" instrument_node="">
</span><h4 data-dcnode-id="500"><span class="ez-toc-section" data-dcnode-id="503" id="Maintenance"></span><span data-dcnode-id="502" instrument_node="">Maintenance</span><span class="ez-toc-section-end" data-dcnode-id="501"></span></h4><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Another disadvantage of fire sprinklers is that they require continuous testing, inspection, and maintenance to function properly. Fire sprinkler systems need to be inspected at least once a year to ensure that they will work when there is a fire. Sprinkler heads need to be replaced every now and then, as they are prone to damage from rust and other elements. Sprinkler heads may be cleaned occasionally to remove dust and dirt. Unfortunately, the cost of repairing and inspecting a sprinkler system is somewhat expensive. The reason why it is expensive is that inspection and repairs can only be done by a trained professional and as you know, their services don’t come cheap. If you struggling to make ends meet or your budget cannot cover your home maintenance needs, then installing a fire sprinkler may not be a smart move.</span></p><span data-dcnode-id="496" instrument_node="">
</span><h3 data-dcnode-id="492"><span class="ez-toc-section" data-dcnode-id="495" id="Advantages_of_installing_a_fire_sprinkler_system_in_your_home"></span><span data-dcnode-id="494" instrument_node="">Advantages of installing a fire sprinkler system in your home</span><span class="ez-toc-section-end" data-dcnode-id="493"></span></h3><span data-dcnode-id="491" instrument_node="">
</span><h4 data-dcnode-id="487"><span class="ez-toc-section" data-dcnode-id="490" id="Home_insurance_policy"></span><span data-dcnode-id="489" instrument_node="">Home insurance policy</span><span class="ez-toc-section-end" data-dcnode-id="488"></span></h4><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Do you know that installing a fire sprinkler system in your home can help cut down the cost of your homeowner’s insurance? Your homeowner’s insurance bill can be lowered by 10% or more when you install a fire sprinkler system. Granted, it is costly to install a fire sprinkler system, but you are going to get some of the money you spent on it by lowering your insurance cost. Since sprinkler systems can last for a long time when properly maintained, you can continue to reap this reward for a long time. In the long run, this will suffice for the money you spent on the system.</span></p><span data-dcnode-id="483" instrument_node="">
</span><h4 data-dcnode-id="479"><span class="ez-toc-section" data-dcnode-id="482" id="Protect_lives_and_property"></span><span data-dcnode-id="481" instrument_node="">Protect lives and property</span><span class="ez-toc-section-end" data-dcnode-id="480"></span></h4><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="477" instrument_node="">As you know, the biggest benefit of installing a fire sprinkler system is that it can protect your property from large-scale fire damage and </span><a data-dcnode-id="472" data-id="158" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-safety-for-kids/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">save the lives of your family members and pets</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="475" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="471" instrument_node="">. A small fire can spread quickly and become a massive inferno in a matter of minutes. According to the USFA, about 2,620 people die because of residential fires and about 13,000 people were seriously injured in 2006. The FEMA and USFA believe that most of the injuries and death that resulted from residential fires could have been prevented had the home had a working fire sprinkler.</span></p><span data-dcnode-id="469" instrument_node="">
</span><h3 data-dcnode-id="465"><span class="ez-toc-section" data-dcnode-id="468" id="Why_you_should_install_a_residential_fire_sprinkler_in_your_home"></span><span data-dcnode-id="467" instrument_node="">Why you should install a residential fire sprinkler in your home</span><span class="ez-toc-section-end" data-dcnode-id="466"></span></h3><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Making the decision to install a residential fire sprinkler in your home is by no means an easy one. And this is because it is very expensive and it requires regular maintenance. But this shouldn’t stop you because the benefit you are going to enjoy when you have it installed in your home out-weighs the cost of buying and maintaining it.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="460" instrument_node="">According to the (NFPA) </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="459" instrument_node="">National Fire Protection Association</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="458" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="454" instrument_node="">, over 358,000 residential fire fires occur each year. Yes, </span><a data-dcnode-id="449" data-id="130" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-detectors-smoke-alarms/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="453" instrument_node="">smoke detectors</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="452" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="448" instrument_node=""> have proved to be a lifesaver over the years, as they alert the occupant of a home or building of a fire before it engulfs the entire building, cutting off every exit. However, a report from the NBC shows that the speed with which a fire can ravage a home is alarming. Since the interior of many homes is loaded with combustible materials, fires are likely going spread quicker, causing large-scale damage within minutes. Back in the 1980s, </span><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">residents had about 15 minutes to get out of their home</span></strong><span data-dcnode-id="445" instrument_node=""> </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">safely</span></strong><span data-dcnode-id="442" instrument_node=""> in the event of a fire. The same cannot be said right now. Today, families have less than five minutes max to escape from their homes when there is a fire.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Since the window for you and your loved ones to leave your home unharmed have shrunken over the last couple of years, it is important that you give thoughts to installing a residential fire sprinkler in your home.</span></p><span data-dcnode-id="437" instrument_node="">
</span><h4 data-dcnode-id="433"><span class="ez-toc-section" data-dcnode-id="436" id="Cooking"></span><span data-dcnode-id="435" instrument_node="">Cooking</span><span class="ez-toc-section-end" data-dcnode-id="434"></span></h4><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Deaths from residential related fires are terrifyingly common these days. According to the analysis by the NFPA, about 2,560 people have lost their lives in these fires annually. As you probably know, cooking is the main cause of the residential fires, 44% of which lead to serious injury and 19% of which are deadly.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="428" instrument_node="">Time and time again, home sprinkler systems have proved to be a reliable fire suppression system. Countless studies have shown that the risk of death is cut by 80% when a structure is outfitted with automatic fire sprinklers. The reason why fire sprinklers are so effective is that they can effectively put out flames before it spreads and causes serious damage. Unlike other fire suppressing equipment like the </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/fire-extinguishers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="427" instrument_node="">fire extinguisher</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="426" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="422" instrument_node=""> that needs to be operated manually, fire sprinklers are automatic systems. This means that they will trigger an alarm and put out the flames without you doing anything- amazing right?</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">The loss of life is obviously the costliest elements of residential fires; they are expensive to recover from, both in repairs, medical bills, and other expenses. The National Fire Prevention Association estimates that six billion US dollars are lost annually to home fires. However, fire sprinklers can reduce fire-related death by 41% and cut down medical expenses resulting from fire injuries by more than 53%.</span></p><span data-dcnode-id="417" instrument_node="">
</span><h4 data-dcnode-id="413"><span class="ez-toc-section" data-dcnode-id="416" id="Fire_sprinklers_are_affordable"></span><span data-dcnode-id="415" instrument_node="">Fire sprinklers are affordable</span><span class="ez-toc-section-end" data-dcnode-id="414"></span></h4><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">The cost associated with the purchasing, installing and maintaining fire sprinklers is the reason why most people linger from installing it in their homes. But you may be surprised to learn that the </span><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">cost of installing sprinklers in some region is as low as $3.35 per square foot</span></strong><span data-dcnode-id="408" instrument_node="">, which is equivalent to the price of installing a driveway or heated bathtub. Before making a decision as to whether to install it or not, it is wise that you visit any reputable fire protection shops or centres to learn how much it is going to cost to install a fire sprinkler system in your home.</span></p><span data-dcnode-id="406" instrument_node="">
</span><h2 data-dcnode-id="402"><span class="ez-toc-section" data-dcnode-id="405" id="Water_damage_and_false_alarms"></span><span data-dcnode-id="404" instrument_node="">Water damage and false alarms</span><span class="ez-toc-section-end" data-dcnode-id="403"></span></h2><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">According to the FEMA, water damage is the main cause of property loss, especially when compared to other risks. So, the possibility of sprinklers going off after a false alarm- dousing furniture with water may be another impediment to installation. However, experts explain that the fire sprinkler’s intelligence and technology have dramatically improved and can accurately distinguish between a live flame and film of smoke from a burning toast or cigarette.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">It is facts like this that spurs people to install fire sprinklers in their home. From saving lives to protecting the property from damage- both repair cost and insurance, fire sprinklers are the most effective ways to keep flames at bay.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h2 data-dcnode-id="391"><span class="ez-toc-section" data-dcnode-id="394" id="Important_questions_you_must_consider_before_installing_a_fire_sprinkler_system_in_your_home"></span><span data-dcnode-id="393" instrument_node="">Important questions you must consider before installing a fire sprinkler system in your home</span><span class="ez-toc-section-end" data-dcnode-id="392"></span></h2><span data-dcnode-id="390" instrument_node="">
</span><h3 data-dcnode-id="386"><span class="ez-toc-section" data-dcnode-id="389" id="Are_fire_sprinklers_reliable"></span><span data-dcnode-id="388" instrument_node="">Are fire sprinklers reliable?</span><span class="ez-toc-section-end" data-dcnode-id="387"></span></h3><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="384" instrument_node="">Yes, they are. In fact, they are the only system that can detect a fire, sound an alarm to </span><a data-dcnode-id="379" data-id="169" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/steps-to-take-during-a-building-fire/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="383" instrument_node="">notify the occupant of the building it is installed in to flee to safety</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="382" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="378" instrument_node=""> and put out the flames. Fire sprinklers are designed to quickly put out fires before it spreads and this can prevent or hinder large-scale damage.</span></p><span data-dcnode-id="376" instrument_node="">
</span><h3 data-dcnode-id="372"><span class="ez-toc-section" data-dcnode-id="375" id="How_do_I_choose_between_the_various_fire_sprinkler_systems_and_designs_that_are_available"></span><span data-dcnode-id="374" instrument_node="">How do I choose between the various fire sprinkler systems and designs that are available?</span><span class="ez-toc-section-end" data-dcnode-id="373"></span></h3><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">The National Fire Protection Association, the governing body for fire protection systems and building codes, has developed 3 main types of fire sprinkler design that can protect different structures. The fire design standards know as NFPA 13R has been developed solely for residential building facilities less than 4 stories. The NFPA 13R standard doesn’t require the installation of fire sprinklers in a vacant or unoccupied area of a building. They also allow the use of cost-effective materials from a labor and material standpoint.</span></p><span data-dcnode-id="368" instrument_node="">
</span><h3 data-dcnode-id="364"><span class="ez-toc-section" data-dcnode-id="367" id="What_is_the_safety_record_for_facilities_that_are_fully_sprinkled"></span><span data-dcnode-id="366" instrument_node="">What is the safety record for facilities that are fully sprinkled?</span><span class="ez-toc-section-end" data-dcnode-id="365"></span></h3><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">A study conducted by the National Fire Protection Association revealed that about twenty lives are lost annually in buildings that have sprinklers installed in them in the United State. The study went on to show that about 4000 lives are lost annually in buildings that are not protected by fire sprinklers. 68% of the deaths recorded in sprinkled buildings were due to the fact that the fire originated in a part of the building that sprinklers were not installed in.</span></p><span data-dcnode-id="360" instrument_node="">
</span><h3 data-dcnode-id="356"><span class="ez-toc-section" data-dcnode-id="359" id="What_is_the_cost_of_installing_an_automatic_fire_sprinkler_system_into_an_existing_facility"></span><span data-dcnode-id="358" instrument_node="">What is the cost of installing an automatic fire sprinkler system into an existing facility?</span><span class="ez-toc-section-end" data-dcnode-id="357"></span></h3><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">The cost of installing fire sprinklers into an existing structure depends on the number of rooms in the structure, the size of the structure and the amount of the structure that is occupied. That being said, fire sprinklers can be installed in a building for a cost ranging from $ 3.5 to $10 per square inch.</span></p><span data-dcnode-id="352" instrument_node="">
</span><h3 data-dcnode-id="348"><span class="ez-toc-section" data-dcnode-id="351" id="Can_I_get_a_fire_sprinkler_installed_on_my_property_for_a_discount_amount"></span><span data-dcnode-id="350" instrument_node="">Can I get a fire sprinkler installed on my property for a discount amount?</span><span class="ez-toc-section-end" data-dcnode-id="349"></span></h3><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Yes, you can. You see, discounts are provided for facilities and structures that meet the I3R standards by the NFPA in an effort to encourage the installation of fire sprinklers. Discounts ranging from 40 to 50 percent are applied for the first year 2 years after the installation of a fire sprinkler system. You may need to complete and remit a fire sprinkler application in order to apply for this discount.</span></p><span data-dcnode-id="344" instrument_node="">
</span><h3 data-dcnode-id="340"><span class="ez-toc-section" data-dcnode-id="343" id="Does_the_presence_of_sprinkles_create_a_window_for_water_damage"></span><span data-dcnode-id="342" instrument_node="">Does the presence of sprinkles, create a window for water damage?</span><span class="ez-toc-section-end" data-dcnode-id="341"></span></h3><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">The presence of sprinklers in a facility doesn’t create a significant room for water discharge exposure. One in five hundred thousand sprinkler head discharges accidentally annually. Even more, a sprinkler system uses about 350 gallons of water to put out a fire. On the other hand, use about 3000 gallons to extinguish a fire which is like going to cause serious water damage. To crown it up, the sprinkler head operates as a single unit. This means that, if one head discharges to water, other heads will blindly start squirting water. Most times, one or two sprinklers can keep the fire at bay and prevent it from spreading.</span></p><span data-dcnode-id="336" instrument_node="">
</span><h3 data-dcnode-id="332"><span class="ez-toc-section" data-dcnode-id="335" id="How_do_exactly_do_fire_sprinklers_work"></span><span data-dcnode-id="334" instrument_node="">How do exactly do fire sprinklers work?</span><span class="ez-toc-section-end" data-dcnode-id="333"></span></h3><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Fire sprinkler systems consist of a gird of sprinkler heads linked to a water supply pipe. Each sprinkler head consists of a fusible link or heat-sensitive glass bulb, which contains a special liquid and vapor. In the event of a fire, the liquid expands and will break the bulb when it reaches 165 F. This, in turn, will trigger the release of water from the sprinkler head.</span></p><span data-dcnode-id="328" instrument_node="">
</span><h3 data-dcnode-id="324"><span class="ez-toc-section" data-dcnode-id="327" id="Can_fire_sprinklers_affect_the_looks_of_my_building"></span><span data-dcnode-id="326" instrument_node="">Can fire sprinklers affect the looks of my building?</span><span class="ez-toc-section-end" data-dcnode-id="325"></span></h3><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">The rapid advances in sprinkler technology have paved way for better-looking sprinklers that will complement the décor of your home. Sprinklers can now be concealed behind walls and are available in a range of sizes and colour to blend into the design of the area it is installed in.</span></p><span data-dcnode-id="320" instrument_node="">
</span><h3 data-dcnode-id="316"><span class="ez-toc-section" data-dcnode-id="319" id="Where_can_I_find_a_reputable_contractor_to_install_a_fire_sprinkler_system_in_my_home"></span><span data-dcnode-id="318" instrument_node="">Where can I find a reputable contractor to install a fire sprinkler system in my home?</span><span class="ez-toc-section-end" data-dcnode-id="317"></span></h3><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">If you want your sprinkler system to work perfectly, it is important that you hire a reputable contractor who has a good track record to install your sprinkler system. Consult with Local Sororities and fraternity and ask them about the contractors they used in the past. Alternatively, you can search for the decorated contractors on the National Fire Sprinkler Association website. When selecting a contractor for your project, be sure that they can carry liability insurance. Request that they add the National Fraternity as an additional insured on their policy.</span></p><span data-dcnode-id="312" instrument_node="">
</span><h3 data-dcnode-id="308"><span class="ez-toc-section" data-dcnode-id="311" id="Should_I_install_a_wet_pipe_or_a_dry_pipe_sprinkler_system_in_my_home"></span><span data-dcnode-id="310" instrument_node="">Should I install a wet pipe or a dry pipe sprinkler system in my home?</span><span class="ez-toc-section-end" data-dcnode-id="309"></span></h3><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Wet pipe systems are a preferred choice for most homeowners because it has a relatively simple design and effectiveness. The major operating components of the system are the automatic alarm check valve and sprinkler heads. Automatic water supply is connected to the system to provide pressured water to the system piping. The sprinkler head doesn’t discharge this water until the temperature of the areas it is installed in exceeds 165 F. </span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Dry pipe system are designed to be installed in cold environments or region, where the ambient temperature can freeze the water in a wet pipe system. Unlike the wet pipe system, dry pipe systems are pressurized with air. So, when there is a significant amount of heat in the area it is installed, it opens allowing the pressurized air in it to vent out from the sprinkler. As the air pressure of the piping slowly drops, water rapidly enters the piping system. </span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">The obvious reason why the dry pipe system isn’t as effective as a wet pipe system is that it delays the flow of water on the air that the system has vented out completely. The complex design of the dry pipe sprinkler system is another reason why many people refrain from installing them. Since its design is complicated, it is definitely going to be difficult and expensive to install and maintain. Even more, the system is prone to corrosion.</span></p><span data-dcnode-id="298" instrument_node="">
</span><h2 data-dcnode-id="294"><span class="ez-toc-section" data-dcnode-id="297" id="Final_note"></span><span data-dcnode-id="296" instrument_node="">Final note</span><span class="ez-toc-section-end" data-dcnode-id="295"></span></h2><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The importance of installing a fire sprinkler in a home or office cannot be overemphasized. Unlike other fire suppression systems, fire sprinklers can detect and put out flames without causing serious property damage. To ensure that your fire sprinkler works in the event of a fire, it is important that you clean it regularly and have it inspected by a professional on a yearly basis. While doing this might be a little expensive, it will go a long way in ensuring the safety of your life and that of your loved ones when there is a fire.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="289" instrument_node="">If you’re new to fire safety, you should also learn about </span><a data-dcnode-id="284" data-id="163" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firesafety.tips/summer-fire-safety-tips/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="288" instrument_node="">these important fire safety tips</span><img alt="Opens in a new tab." class="externallinkimage" data-dcnode-id="287" data-lazy-src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E" style="background-image:none;" title="Opens in a new tab."><noscript data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">&lt;img src="https://firesafety.tips/wp-content/themes/acabado/img/extlink.png" alt="Opens in a new tab." title="Opens in a new tab." class="externallinkimage" style="background-image:none;"&gt;</span></noscript></a><span data-dcnode-id="283" instrument_node="">. </span></p><span data-dcnode-id="281" instrument_node="">
