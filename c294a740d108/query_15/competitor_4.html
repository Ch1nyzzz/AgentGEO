</span><p data-dcnode-id="2613"><span data-dcnode-id="2621" instrument_node="">Fire alarm monitoring is a critical part of a </span><u data-dcnode-id="2618"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.koorsen.com/does-your-fire-protection-system-fall-short" rel="noopener" target="_blank"><span data-dcnode-id="2620" instrument_node="">comprehensive fire protection system</span></a></u><span data-dcnode-id="2617" instrument_node="">. When a fire alarm goes off in your building, monitoring ensures that the signal is quickly assessed to verify that it’s not a false alarm and then transmitted to first responders within minutes. With </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.koorsen.com/products-services/security/central-station-monitoring/" rel="noopener"><span data-dcnode-id="2616" instrument_node="">fire alarm monitoring</span></a><span data-dcnode-id="2614" instrument_node="">, business owners can be confident that even if a fire breaks out when their building is unoccupied, it will still be quickly reported to emergency services, saving potentially tens of thousands of dollars in property damage.&nbsp;</span></p><span data-dcnode-id="2612" instrument_node="">
</span><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">This post will help you determine whether your building requires fire alarm monitoring and what your options are for meeting those requirements.&nbsp;&nbsp;</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2592"><span class="hs-cta-wrapper" data-dcnode-id="2594" id="hs-cta-wrapper-203959a2-7d11-4a44-aa59-fea48748e9ba"><span class="hs-cta-node hs-cta-203959a2-7d11-4a44-aa59-fea48748e9ba" data-dcnode-id="2598" data-hs-drop="true" id="hs-cta-203959a2-7d11-4a44-aa59-fea48748e9ba" style="visibility: visible; display: block; text-align: center;"><a class="cta_button" cta_dest_link="https://info.koorsen.com/fire-security-monitoring-quote" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.koorsen.com/cs/c/%3Fcta_guid%3D25e07e0f-0ab9-4997-aae2-039aa9775da5%26signature%3DAAH58kHqeC7MwarKnWxD3V3NY_59a1RRZw%26pageId%3D20980214627%26placement_guid%3D203959a2-7d11-4a44-aa59-fea48748e9ba%26canon%3Dhttps%253A%252F%252Fblog.koorsen.com%252Fmonitoring-requirements-for-fire-alarms%26portal_id%3D1973249" id="cta_button_1973249_25e07e0f-0ab9-4997-aae2-039aa9775da5" style="margin: 20px auto;" title="Monitoring Questions? CLICK TO CONTACT US NOW"><span data-dcnode-id="2603" style="color: #000000;"><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Monitoring Questions?</span></strong></span><br data-dcnode-id="2602"><span data-dcnode-id="2600" style="color: #000000;"><span data-dcnode-id="2601" instrument_node="">CLICK TO CONTACT US NOW</span></span></a></span></span></p><span data-dcnode-id="2591" instrument_node="">
</span><h2 data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">How to Determine if your Building Requires Fire Alarm Monitoring&nbsp;</span></h2><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2568"><span data-dcnode-id="2587" instrument_node="">The most important consideration in determining whether a fire alarm system is required is the occupancy classification of the building in question. Depending on your local authority having jurisdiction (AHJ), this may be based on the </span><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//up.codes/viewer/utah/ibc-2015/chapter/3/use-and-occupancy-classification%233" rel="noopener" target="_blank"><em data-dcnode-id="2584"><u data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">International Building</span></u></em><span data-dcnode-id="2583" instrument_node=""> </span><em data-dcnode-id="2580"><u data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Code</span></u></em></a><span data-dcnode-id="2578" instrument_node=""> (IBC) occupancy classifications or those contained in the National Fire Protection Association (NFPA) </span><em data-dcnode-id="2574"><u data-dcnode-id="2575"><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D101" rel="noopener" target="_blank"><span data-dcnode-id="2577" instrument_node="">101 Life Safety Code</span></a></u></em><span data-dcnode-id="2573" instrument_node="">. However, a </span><u data-dcnode-id="2570"><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.nfpa.org/community/nfpa-today/blog/2017/02/24/quick-guide-to-nfpa-101-occupancy-types-vs-ibc-occupancy-groups" rel="noopener" target="_blank"><span data-dcnode-id="2572" instrument_node="">comparison</span></a></u><span data-dcnode-id="2569" instrument_node=""> of the classifications defined in these codes will reveal that they are very similar. For this post, we will summarize the requirements for fire alarm monitoring based on the occupancy classifications in NFPA 101.&nbsp;&nbsp;</span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2566" instrument_node="">The main requirements for</span><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.koorsen.com/products-services/security/central-station-monitoring/" rel="noopener"><span data-dcnode-id="2565" instrument_node=""> fire alarm monitoring</span></a><span data-dcnode-id="2563" instrument_node=""> and notification are found in NFPA 101, Section 9.6.4.2, which states that fire alarm systems required for any occupancy be equipped to transmit notification of a fire alarm or other emergency automatically to the municipal fire department and fire brigade (if provided). Any of the following means may be used if acceptable to the authority having jurisdiction (AHJ):</span></p><span data-dcnode-id="2561" instrument_node="">
</span><ul data-dcnode-id="2547"><span data-dcnode-id="2560" instrument_node="">
</span><li data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Central Supervising Station</span></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Remote Supervising Station</span></li><span data-dcnode-id="2554" instrument_node="">
</span><li data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Proprietary Supervising Station</span></li><span data-dcnode-id="2551" instrument_node="">
</span><li data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Auxiliary System</span></li><span data-dcnode-id="2548" instrument_node="">
</span></ul><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">The table below summarizes the monitoring and notification requirements for most occupancies. Note that the requirements differ a bit between new and existing occupancies (i.e. buildings/facilities). For example, fire alarm systems in most new occupancies must be equipped to transmit notification of a fire alarm or other emergency automatically, as well as supervisory signals. Trouble signals must also be audible and visibly displayed either at an approved, remotely located receiving facility or at a location within the protected building that is constantly attended by qualified personnel.&nbsp;</span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">For existing installations where none of the means described in Section 9.6.4.2 are available, a plan for monitoring and notification of the municipal fire department is allowed if approved by the AHJ.&nbsp;</span></p><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2539" instrument_node="">There are no specific monitoring and notification requirements for structures in which fire alarms are not required. In these cases, owners are advised to work with a company that specializes in </span><u data-dcnode-id="2536"><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.koorsen.com/products-services/fire-protection/fire-alarm-systems/" rel="noopener" target="_blank"><span data-dcnode-id="2538" instrument_node="">fire protection systems design</span></a></u><span data-dcnode-id="2535" instrument_node=""> to determine the best monitoring equipment to be used based on their goals and objectives.&nbsp;</span></p><span data-dcnode-id="2533" instrument_node="">

</span><p data-dcnode-id="2495"><span data-contrast="auto" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Monitoring and fire department notification is</span></span><span data-contrast="auto" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">&nbsp;required for any assembly occupancy where the maximum occupant load exceeds 300 people. When required, the building must have someone manning a receiving station where the alarm must send a signal whenever it’</span></span><span data-contrast="auto" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">s initiated.</span></span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2487"><span data-contrast="auto" data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">For new occupancies, if the AHJ determines that having a constantly attended receiving station isn’t practical, the owner may instead provide automatically transmitted evacuation or relocation instructions and a system that is monitored by&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">a supervising station.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2486" instrument_node="">
</span></td><td data-dcnode-id="2468" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2476" style="text-align: left;"><span data-contrast="auto" data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Monitoring and fire department notification is required for any assembly occupancy where the maximum occupant load exceeds 300 people. When required, the building must have someone manning a receiving station where the alarm must se</span></span><span data-contrast="auto" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">nd a signal whenever it’s initiated.&nbsp;&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2470"><span data-contrast="auto" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">For existing occupancies, if the AHJ finds that providing monitoring by a supervising station is impractical, the owner may implement a voice-only announcement.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2469" instrument_node="">
</span></td></tr><tr data-dcnode-id="2457" style="height: 25px; background-color: #ccc5c5;"><th colspan="2" data-dcnode-id="2459" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2460"><span class="TextRun SCXW126479496 BCX0" data-contrast="auto" data-dcnode-id="2461" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW126479496 BCX0" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Business and Mercantile Occupancies</span></span></span></strong></th></tr><tr data-dcnode-id="2437" style="height: 25px;"><td data-dcnode-id="2449" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW235081639 BCX0" data-contrast="auto" data-dcnode-id="2452" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW235081639 BCX0" data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Monitoring and fire department notification in all new business and mercantile occupancies must follow the requirements established in NFPA 101, Section 9.6.4.</span></span></span><span class="EOP SCXW235081639 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">&nbsp;</span></span></td><td data-dcnode-id="2439" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW241903503 BCX0" data-contrast="auto" data-dcnode-id="2445" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW241903503 BCX0" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Existing businesses and mercantile occupancies are generally not required to meet monitoring requirements until they replace their fire alarms, at which time they will have to install alarms equipped for monitoring and notification as required by NFPA 101,</span></span></span><span class="TextRun SCXW241903503 BCX0" data-contrast="auto" data-dcnode-id="2440" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW241903503 BCX0" data-dcnode-id="2441"><span data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2442" instrument_node="">Section 9.6.4.&nbsp;</span></span></span></td></tr><tr data-dcnode-id="2426" style="height: 25px; background-color: #ccc5c5;"><td colspan="2" data-dcnode-id="2428" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2429"><span class="TextRun SCXW222653933 BCX0" data-contrast="auto" data-dcnode-id="2432" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW222653933 BCX0" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Educational Facilities</span></span></span><span class="EOP SCXW222653933 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335551550&quot;:2,&quot;335551620&quot;:2,&quot;335559740&quot;:240}" data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">&nbsp;</span></span></strong></td></tr><tr data-dcnode-id="2401" style="height: 25px;"><td data-dcnode-id="2418" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW48285801 BCX0" data-contrast="auto" data-dcnode-id="2421" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW48285801 BCX0" data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">New educational facilities must meet the monitoring and fire department notification requirements in NFPA 101, Section 9.6.4</span></span></span><span class="EOP SCXW48285801 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">&nbsp;</span></span></td><td data-dcnode-id="2403" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2411"><span data-contrast="auto" data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Wherever the school authorities determine that an actual fire exists, they must immediately call the local fire department using the public fire alarm system or other available facilities.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2405"><span data-contrast="auto" data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">They may continue to use this method of notification until it comes time to replace their fire alarm system, at which point they must install a means for monitoring and automatic emergency forces notification that complies with NFPA 101, Section 9.6.4.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2404" instrument_node="">
</span></td></tr><tr data-dcnode-id="2389" style="height: 25px; background-color: #ccc5c5;"><td colspan="2" data-dcnode-id="2391" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2392"><span class="TextRun SCXW224103840 BCX0" data-contrast="auto" data-dcnode-id="2396" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW224103840 BCX0" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Dayc</span></span></span><span class="TextRun SCXW224103840 BCX0" data-contrast="auto" data-dcnode-id="2393" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW224103840 BCX0" data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">are Facilities</span></span></span></strong></td></tr><tr data-dcnode-id="2363" style="height: 25px;"><td data-dcnode-id="2378" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW89849301 BCX0" data-contrast="auto" data-dcnode-id="2384" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW89849301 BCX0" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Monitoring and fire department notification for new day</span></span></span><span class="TextRun SCXW89849301 BCX0" data-contrast="auto" data-dcnode-id="2381" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW89849301 BCX0" data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">care facilities must follow the requirements established in NFPA 101, Section 9.6.4.</span></span></span><span class="EOP SCXW89849301 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">&nbsp;</span></span></td><td data-dcnode-id="2365" style="width: 50%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW56779703 BCX0" data-contrast="auto" data-dcnode-id="2374" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW56779703 BCX0" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">All existing day</span></span></span><span class="TextRun SCXW56779703 BCX0" data-contrast="auto" data-dcnode-id="2371" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW56779703 BCX0" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">care facilities except those caring for 100 clients or less, must meet the moni</span></span></span><span class="TextRun SCXW56779703 BCX0" data-contrast="auto" data-dcnode-id="2368" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW56779703 BCX0" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">toring and fire department notification requirements established in NFPA 101, Section 9.6.4</span></span></span><span class="EOP SCXW56779703 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">&nbsp;</span></span></td></tr><tr data-dcnode-id="2352" style="height: 25px; background-color: #ccc5c5;"><td colspan="2" data-dcnode-id="2354" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2355"><span class="TextRun SCXW204784679 BCX0" data-contrast="auto" data-dcnode-id="2358" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW204784679 BCX0" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Health Care Facilities</span></span></span><span class="EOP SCXW204784679 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335551550&quot;:2,&quot;335551620&quot;:2,&quot;335559740&quot;:240}" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">&nbsp;</span></span></strong></td></tr><tr data-dcnode-id="2342" style="height: 25px;"><td colspan="2" data-dcnode-id="2344" style="width: 100%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW30889140 BCX0" data-contrast="auto" data-dcnode-id="2347" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW30889140 BCX0" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Monitoring and fire department notification for all new and existing health care facilities must follow the requirements established in NFPA 101, Section 9.6.4.</span></span></span><span class="EOP SCXW30889140 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">&nbsp;</span></span></td></tr><tr data-dcnode-id="2331" style="height: 25px; background-color: #ccc5c5;"><td colspan="2" data-dcnode-id="2333" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2334"><span class="TextRun SCXW69541765 BCX0" data-contrast="auto" data-dcnode-id="2337" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW69541765 BCX0" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Ambulatory Health Care Facilities</span></span></span><span class="EOP SCXW69541765 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335551550&quot;:2,&quot;335551620&quot;:2,&quot;335559740&quot;:240}" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">&nbsp;</span></span></strong></td></tr><tr data-dcnode-id="2316" style="height: 25px;"><td colspan="2" data-dcnode-id="2318" style="width: 100%; height: 25px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW215171318 BCX0" data-contrast="auto" data-dcnode-id="2326" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW215171318 BCX0" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Monitoring and fire department notification for all new and</span></span></span><span class="TextRun SCXW215171318 BCX0" data-contrast="auto" data-dcnode-id="2321" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW215171318 BCX0" data-dcnode-id="2322"><span data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2323" instrument_node="">existing ambulatory health care facilities must follow the requirements established in NFPA 101, Section 9.6.4.</span></span></span><span class="EOP SCXW215171318 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">&nbsp;</span></span></td></tr><tr data-dcnode-id="2307" style="height: 25px; background-color: #ccc5c5;"><td colspan="2" data-dcnode-id="2309" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2310"><span class="TextRun SCXW32223994 BCX0" data-contrast="auto" data-dcnode-id="2311" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW32223994 BCX0" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Residential Board and Care Facilities</span></span></span></strong></td></tr><tr data-dcnode-id="2292" style="height: 25px;"><td colspan="2" data-dcnode-id="2294" style="height: 25px; width: 100%; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW39982864 BCX0" data-contrast="auto" data-dcnode-id="2302" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW39982864 BCX0" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Monitoring and fire department notification in new and existing residential board and care facilities must follow the requirements established in NFPA 101, Section 9.6.4,</span></span></span><span class="TextRun SCXW39982864 BCX0" data-contrast="auto" data-dcnode-id="2297" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW39982864 BCX0" data-dcnode-id="2298"><span data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2299" instrument_node="">if they provide sleeping accommodations for more than 16 residents.</span></span></span><span class="EOP SCXW39982864 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">&nbsp;</span></span></td></tr><tr data-dcnode-id="2280" style="background-color: #ccc5c5; height: 25px;"><td colspan="2" data-dcnode-id="2282" style="width: 100%; text-align: center; height: 25px; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2283"><span class="TextRun SCXW242647251 BCX0" data-contrast="auto" data-dcnode-id="2287" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW242647251 BCX0" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Industrial and St</span></span></span><span class="TextRun SCXW242647251 BCX0" data-contrast="auto" data-dcnode-id="2284" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW242647251 BCX0" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">orage Occupancies</span></span></span></strong></td></tr><tr data-dcnode-id="2244" style="height: 175px;"><td colspan="2" data-dcnode-id="2246" style="width: 100%; height: 175px; padding: 3px; border: 1px solid #99acc2;"><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2275" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Monitoring is required for storage or industrial occupancies only when the building is occupied. Given this, if your storage or industrial facility is rarely occupied, it</span></span></span><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2268" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2269"><span data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2272" instrument_node="">may be</span><span data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">&nbsp;</span></span></span></span><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2265" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">tempting to forgo monitoring. However, doing so is ri</span></span></span><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2260" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2261"><span data-dcnode-id="2264" instrument_node="">sky business when you consider</span><span data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">&nbsp;</span></span></span></span><span class="TextRun Underlined SCXW194766910 BCX0" data-contrast="none" data-dcnode-id="2257" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">recent data</span></span></span><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2252" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2253"><span data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2254" instrument_node="">from the NFPA, which shows that on average, U.S. businesses suffer more than $6</span></span></span><span class="TextRun SCXW194766910 BCX0" data-contrast="auto" data-dcnode-id="2249" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW194766910 BCX0" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">45 million in property losses each year from fires in their storage facilities alone. Compared to these numbers, the cost of monitoring your storage or industrial facility, even when unoccupied, makes good sense.&nbsp;</span></span></span><span class="EOP SCXW194766910 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">&nbsp;</span></span></td></tr><tr data-dcnode-id="2235" style="background-color: #ccc5c5; height: 25px;"><td colspan="2" data-dcnode-id="2237" style="width: 100%; height: 25px; text-align: center; padding: 3px; border: 1px solid #99acc2;"><strong data-dcnode-id="2238"><span class="TextRun SCXW69184370 BCX0" data-contrast="auto" data-dcnode-id="2239" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW69184370 BCX0" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Detention and Correctional Facilities</span></span></span></strong></td></tr><tr data-dcnode-id="2213" style="height: 297px;"><td colspan="2" data-dcnode-id="2215" style="width: 100%; height: 297px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2225"><span data-contrast="auto" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Monitoring and fire department notification in correctional occupancies must meet the requirements of NFPA 101, Section 9.6.4. However, if the facility has a system that employs a positive alarm sequence or staff who can promptly notify the fire department</span></span><span data-contrast="auto" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">&nbsp;to monitor the alarm system, no other monitoring is required.&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2217"><span data-contrast="auto" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Likewise, the requirements in Section 9.6.4 do not apply where there is a constantly attended location on&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">site that can promptly notify the fire department or has instead direct communication&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">with a control room that can notify the fire department. In these cases, the procedures for logging alarms and immediate notification of the fire department must be documented in the facility’s fire plan.</span></span></p><span data-dcnode-id="2216" instrument_node="">
</span></td></tr><tr data-dcnode-id="2199" style="background-color: #ccc5c5; height: 0px;"><td colspan="2" data-dcnode-id="2201" style="width: 100%; height: 0px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2203" style="text-align: center;"><strong data-dcnode-id="2206"><span class="TextRun SCXW17248474 BCX0" data-contrast="auto" data-dcnode-id="2207" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW17248474 BCX0" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Hotels and Dormitories</span></span></span></strong><span class="TextRun SCXW17248474 BCX0" data-contrast="auto" data-dcnode-id="2204" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW17248474 BCX0" data-dcnode-id="2205"></span></span></p><span data-dcnode-id="2202" instrument_node="">
</span></td></tr><tr data-dcnode-id="2169" style="height: 200px;"><td data-dcnode-id="2185" style="width: 50%; height: 200px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2187"><span data-contrast="auto" data-dcnode-id="2188"><span class="TextRun SCXW17248474 BCX0" data-contrast="auto" data-dcnode-id="2189" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW17248474 BCX0" data-dcnode-id="2190"><span class="TextRun SCXW248521682 BCX0" data-contrast="auto" data-dcnode-id="2193" lang="EN" xml:lang="EN"><span class="NormalTextRun SCXW248521682 BCX0" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Monitoring and fire department notification in all new hotels and dormitories must follow the requirements established in NFPA 101, Section 9.6.4.</span></span></span><span class="EOP SCXW248521682 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">&nbsp;</span></span></span></span></span></p><span data-dcnode-id="2186" instrument_node="">
</span></td><td data-dcnode-id="2171" style="width: 50%; height: 200px; padding: 3px; border: 1px solid #99acc2;"><span data-dcnode-id="2183" instrument_node="">

</span><h2 data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Understanding your Options for Fire Alarm Monitoring and Notification</span></h2><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2063" instrument_node="">Monitored alarm systems are those in which the </span><u data-dcnode-id="2060"><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Fire_alarm_control_panel" rel="noopener" target="_blank"><span data-dcnode-id="2062" instrument_node="">fire alarm control panel</span></a></u><span data-dcnode-id="2059" instrument_node=""> relays any alarm signals to a supervising station via a telephone line, cellular connection, radio channel, or over the Internet. When a signal is received, trained monitoring station staff alert emergency services to the facility’s alarm. A supervising station is a facility that receives signals from the premises where the fire alarms are installed and which is staffed with personnel trained to assess and respond to fire alarm signals. The four different options for monitoring and fire department notification allowed by NFPA 101, Section 9.6.4.2 are described in more detail below:</span></p><span data-dcnode-id="2057" instrument_node="">
</span><ul data-dcnode-id="2027"><span data-dcnode-id="2056" instrument_node="">
</span><li data-dcnode-id="2044"><em data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Central Supervising Stations</span></em><span data-dcnode-id="2053" instrument_node=""> – These are monitoring stations that meet the </span><u data-dcnode-id="2050"><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//standardscatalog.ul.com/standards/en/standard_827" rel="noopener" target="_blank"><span data-dcnode-id="2052" instrument_node="">UL 827 Standard</span></a></u><span data-dcnode-id="2049" instrument_node=""> for Central Station Alarm Services, which requires more stringent standards than remote station monitoring. Central supervising station monitoring services are by far the most common method for fire alarm monitoring services and can only be obtained by a </span><u data-dcnode-id="2046"><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.koorsen.com/products-services/security/central-monitoring-station/" rel="noopener" target="_blank"><span data-dcnode-id="2048" instrument_node="">UL-listed provider</span></a></u><span data-dcnode-id="2045" instrument_node="">. Central monitoring services provide the installation, inspection, testing, and maintenance for the alarm system, 24/7 monitoring services by trained personnel, and a runner service. With a runner service, a runner is a person who, with every alarm, supervisory or trouble signal received, goes to the building to investigate.&nbsp;</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2039"><em data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Remote Supervising Stations</span></em><span data-dcnode-id="2040" instrument_node=""> – While similar to central supervising stations, remote supervising stations put the responsibility for installation, inspection, testing, and maintenance of the alarm system on the owner. While the requirement for 24/7 monitoring still applies, there is no requirement for a runner to check on the signals received.&nbsp;&nbsp;</span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2034"><em data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Proprietary Supervising Stations</span></em><span data-dcnode-id="2035" instrument_node=""> – Proprietary supervising stations are those that protect multiple properties under the same ownership, which may or may not be contiguous. As with the other types of supervising stations, the personnel staffing them must be properly trained to assess and respond to fire alarm signals.</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2029"><em data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Auxiliary Systems</span></em><span data-dcnode-id="2030" instrument_node=""> – These fire alarm systems work like central monitoring stations except that the signal is transmitted directly to the public fire reporting system, which is owned and operated by the local municipality. Transmission is accomplished through a fire alarm box that is connected to municipal circuits or with the municipal alarm receiving station. Regardless of which type of supervisory station is used, when the alarm system is triggered, visible and audible alarms should activate in the station. In cases where none of the above monitoring options are practical, the facility may use a different, approved plan for notifying emergency forces.</span></li><span data-dcnode-id="2028" instrument_node="">
</span></ul><span data-dcnode-id="2026" instrument_node="">
</span><h2 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Koorsen Can Help</span></h2><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="2022" instrument_node="">Knowing that your fire alarm system requires monitoring is the first step to ensuring it will protect your building and your business if a fire ever breaks out. Making sure you have the </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">right</span></em><span data-dcnode-id="2019" instrument_node=""> fire alarm system – one that is equipped with the proper monitoring devices and </span><u data-dcnode-id="2016"><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.koorsen.com/products-services/security/central-monitoring-station/%3Futm_term%3D%252Bfire%2520%252Balarm%2520%252Bmonitoring%26utm_campaign%3DKFS%2B-%2BLocation%2B-%2BIndianapolis%26utm_source%3Dadwords%26utm_medium%3Dppc%26hsa_tgt%3Dkwd-300529460624%26hsa_grp%3D60794157795%26hsa_src%3Dg%26hsa_net%3Dadwords%26hsa_mt%3Db%26hsa_ver%3D3%26hsa_ad%3D300737788207%26hsa_acc%3D2581641280%26hsa_kw%3D%252Bfire%2520%252Balarm%2520%252Bmonitoring%26hsa_cam%3D636583375%26gclid%3DEAIaIQobChMI25O8s6Cs5QIVDLbICh02CwNIEAMYAiAAEgJmm_D_BwE" rel="noopener" target="_blank"><span data-dcnode-id="2018" instrument_node="">reliable notification services</span></a></u><span data-dcnode-id="2015" instrument_node=""> – could be the difference between life and death for your business. According to the the </span><u data-dcnode-id="2012"><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iii.org/article/when-disaster-strikes-preparation-response-and-recovery" rel="noopener" target="_blank"><span data-dcnode-id="2014" instrument_node="">U.S. Federal Emergency Management Administration</span></a></u><span data-dcnode-id="2011" instrument_node=""> (FEMA), 40 percent of businesses never reopen after a disaster like a fire. And, 25 percent of those that do reopen, fail within the first year. Koorsen offers one-stop shopping for busi
