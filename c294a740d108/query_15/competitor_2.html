</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Fire pumps are part of an applications water supply and are powered by electricity, diesel or steam. They activate when the pressure in the fire sprinkler systems falls beneath a certain level and provide water flow at a very high pressure to the sprinkler system, which is then disposed onto the fire.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="749" instrument_node="">SPP Pumps is the world's leading specialist manufacturer of quality</span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/markets/pumps/fire-pump-packages/"><span data-dcnode-id="748" instrument_node=""> fire protection pump packages</span></a><span data-dcnode-id="746" instrument_node="">. Our unrivalled experience in design and manufacture together with </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/about-us/manufacturing-facilities/"><span data-dcnode-id="745" instrument_node="">advanced testing</span></a><span data-dcnode-id="743" instrument_node=""> and </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/about-us/certificates-and-accreditations/"><span data-dcnode-id="742" instrument_node="">accreditation</span></a><span data-dcnode-id="740" instrument_node=""> ensures the utmost in fire pump reliability.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">The protection of life is not a matter for compromise. This is particularly true when regarding fire protection pumps and systems&nbsp;where they are only as strong as their 'weakest link' and compromise may result in a devastating&nbsp;loss of life or property.</span></p><span data-dcnode-id="735" instrument_node="">
</span><h3 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Proven Expertise</span></h3><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">SPP Pumps Fire Pumps are designed specifically for the very particular needs of fire protection and are approved by major fire protection bodies around the world. As the first company to achieve fire pump approval and listing by the Loss Prevention Certification Board (LPCB) SPP Pumps has more approved and fire pump listed equipment than any other manufacturer, now including the FM approved </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/markets/pumps/multi-stage-multi-outlet-pumps/"><span data-dcnode-id="730" instrument_node="">Multi-Stage Multi Outlet (MSMO) Pumps</span></a><span data-dcnode-id="728" instrument_node="">.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">By selecting fire pumps by SPP Pumps, that are system approved as part of an approved system and maintained in accordance with standards such as NFPA 20, you can sleep easy knowing that you have chosen the best fire system package you can get.</span></p><span data-dcnode-id="723" instrument_node="">
</span><h3 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">New Fire Pump Range for Residential Buildings</span></h3><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="716"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/markets/pumps/resi-stream-pumps/"><span data-dcnode-id="719" instrument_node="">SPP’s Resi-Stream</span></a><span data-dcnode-id="717" instrument_node=""> range for residential fire sprinkler applications incorporates a motor control panel, which via Human Machine Interface (HMI)&nbsp;enables an easily adjustable, automatic test cycle as standard. Control panel options include an Automatic Transfer Switch (ATS) version among others. All components are mounted on a compact common baseplate for ease of installation. Please follow the link below to find out more about our EN 12259-12 &amp; BS9251 compliant fire pump packages.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="712"><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spppumps.com/spppumps/assets/File/SPP_ResiStream_Brochure.pdf"><span data-dcnode-id="714" instrument_node="">Learn more about SPP's Resi-Stream range&nbsp;&gt;</span></a></p><span data-dcnode-id="711" instrument_node="">
</span><h3 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">A Global Fire Support Network</span></h3><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">SPP Pumps’ customers can be assured they have lifetime global support for all fire pumps and fire pump equipment; thanks to our expert service engineers who travel more than 600,000 miles afar, providing qualified round-the-clock provision.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Human life is priceless and knowing you have a well-established fire pump solution in place is just not enough. Fire pumps need to be monitored, assessed regularly and kept up to standard, ensuring they work correctly when relied upon. Our field engineers will not only be on hand to execute systematic checks, pump testing services and system maintenance, but are also positioned to respond to emergency circumstances 24/7.</span></p><span data-dcnode-id="702" instrument_node="">
