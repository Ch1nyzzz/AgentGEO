</span><p data-dcnode-id="1587"><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Concealed, low flow sprinklers</span></strong><span data-dcnode-id="1588" instrument_node=""> are small, neat and completely unobtrusive.</span></p><span data-dcnode-id="1586" instrument_node="">

</span><p data-dcnode-id="1556"><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Residential fire sprinkler systems</span></strong><span data-dcnode-id="1560" instrument_node=""> are primarily installed to help in the escape from fires in buildings. In this respect they are a </span><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">‘life safety’</span></strong><span data-dcnode-id="1557" instrument_node=""> essential in many modern building schemes where exiting during a fire may otherwise prove difficult.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">In Scotland they are fitted to all new Nursing and Care Homes, and in Wales they are now also fitted to all new build residential and domestic properties. The standard for all of these installations is </span><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">BS9251:2021</span></strong><span data-dcnode-id="1551" instrument_node="">, and is specified by Building Control throughout the UK.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node="">Modern</span><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node=""> low flow</span></strong><span data-dcnode-id="1545" instrument_node=""> sprinkler heads, each operating independently, ensures that only a limited amount of water is used to control a fire. They have proved themselves to be very reliable over several&nbsp; decades and have operated successfully on many occasions in the UK to control and extinguish fires that would otherwise have become very serious events.</span></p><span data-dcnode-id="1543" instrument_node="">

</span><h2 class="m-0" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">FAQ's</span></h2><span data-dcnode-id="751" instrument_node="">
</span></div><span data-dcnode-id="749" instrument_node="">

</span><div class="col-lg-12 mt-3" data-dcnode-id="512"><span data-dcnode-id="746" instrument_node="">
</span><div class="content-panel" data-dcnode-id="514"><span data-dcnode-id="745" instrument_node="">
</span><div class="faqs" data-dcnode-id="516" id="faqGroup"><span data-dcnode-id="744" instrument_node="">
</span><div class="card" data-dcnode-id="724"><span data-dcnode-id="743" instrument_node="">
</span><div class="card-header" data-dcnode-id="737" id="heading1"><span data-dcnode-id="742" instrument_node="">
</span><button aria-controls="collapse1" aria-expanded="false" data-dcnode-id="739" data-target="#collapse1" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="741"></span><span data-dcnode-id="740" instrument_node=""> What are the main differences between BS9251:2014 &amp; BS9251:2021?</span></button><span data-dcnode-id="738" instrument_node="">
</span></div><span data-dcnode-id="736" instrument_node="">
</span><div aria-labelledby="heading1" class="collapse" data-dcnode-id="726" data-parent="#faqGroup" id="collapse1"><span data-dcnode-id="735" instrument_node="">
</span><div class="card-body" data-dcnode-id="728"><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="733" instrument_node="">BS9251:2014 had 3 Categories of building type which required different design strategies.</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
In the latest version dated 2021, a new category 4 has been introduced which has added additional requirements, particularly for taller buildings over 18m.</span></p><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span></div><span data-dcnode-id="725" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node="">
</span><div class="card" data-dcnode-id="703"><span data-dcnode-id="722" instrument_node="">
</span><div class="card-header" data-dcnode-id="716" id="heading2"><span data-dcnode-id="721" instrument_node="">
</span><button aria-controls="collapse2" aria-expanded="false" data-dcnode-id="718" data-target="#collapse2" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="720"></span><span data-dcnode-id="719" instrument_node=""> What are the servicing intervals?</span></button><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><div aria-labelledby="heading2" class="collapse" data-dcnode-id="705" data-parent="#faqGroup" id="collapse2"><span data-dcnode-id="714" instrument_node="">
</span><div class="card-body" data-dcnode-id="707"><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="712" instrument_node="">Regular 12 monthly servicing is recommended to ensure that the sprinkler system is maintained in good working order.</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
Pumped systems generally need more attention due to the extra complexity of the system, although post 2014 systems are now installed with built in automatic testing features designed to exercise the pumps on a regular basis.</span></p><span data-dcnode-id="708" instrument_node="">
</span></div><span data-dcnode-id="706" instrument_node="">
</span></div><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span><div class="card" data-dcnode-id="678"><span data-dcnode-id="701" instrument_node="">
</span><div class="card-header" data-dcnode-id="695" id="heading3"><span data-dcnode-id="700" instrument_node="">
</span><button aria-controls="collapse3" aria-expanded="false" data-dcnode-id="697" data-target="#collapse3" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="699"></span><span data-dcnode-id="698" instrument_node=""> What is the difference between sprinklers and water misting?</span></button><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span><div aria-labelledby="heading3" class="collapse" data-dcnode-id="680" data-parent="#faqGroup" id="collapse3"><span data-dcnode-id="693" instrument_node="">
</span><div class="card-body" data-dcnode-id="682"><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">In residential and domestic applications fire sprinklers and water misting systems operate in the exactly the same way. They both have similar fixed pipe work and fixed heads concealed within the ceiling voids, and actuate by sensing the heat from a fire at ceiling level.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">There is a small difference in the water deployed during a fire activation. Low flow sprinklers use less heads and typically flow at 34-49 litre/min, where as misting heads flow at 20-30 litres/min. each although more than one head may operate. Both systems will be designed to run for 10 minutes in domestic dwellings, or 30 minutes for residential homes.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Because of the higher pressure needed for misting heads to operate, mains water connections are not possible.</span></p><span data-dcnode-id="683" instrument_node="">
</span></div><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div class="card" data-dcnode-id="653"><span data-dcnode-id="676" instrument_node="">
</span><div class="card-header" data-dcnode-id="670" id="heading4"><span data-dcnode-id="675" instrument_node="">
</span><button aria-controls="collapse4" aria-expanded="false" data-dcnode-id="672" data-target="#collapse4" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="674"></span><span data-dcnode-id="673" instrument_node=""> How do I get a Quote for residential fire sprinklers?</span></button><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span><div aria-labelledby="heading4" class="collapse" data-dcnode-id="655" data-parent="#faqGroup" id="collapse4"><span data-dcnode-id="668" instrument_node="">
</span><div class="card-body" data-dcnode-id="657"><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Your quotation is completely free and without obligation.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Simply send your property plans to us at Autoquench, either by email as a PDF attachment, or as a hard copy in the post.  We will undertake a provisional design study and recommend a scheme to protect your property. Using BS9251:2014 hydraulic calculation software we will determine the water flow and pressure requirements needed and the labour/material costs to install each sprinkler system.  The quotation will then be sent to you together with a data pack containing relevant suppot information. </span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">We aim to produce quotations within 48 hours of receiving an enquiry.</span></p><span data-dcnode-id="658" instrument_node="">
</span></div><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">
</span></div><span data-dcnode-id="652" instrument_node="">
</span><div class="card" data-dcnode-id="628"><span data-dcnode-id="651" instrument_node="">
</span><div class="card-header" data-dcnode-id="645" id="heading5"><span data-dcnode-id="650" instrument_node="">
</span><button aria-controls="collapse5" aria-expanded="false" data-dcnode-id="647" data-target="#collapse5" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="649"></span><span data-dcnode-id="648" instrument_node=""> What is the UK standard for domestic fire sprinklers?</span></button><span data-dcnode-id="646" instrument_node="">
</span></div><span data-dcnode-id="644" instrument_node="">
</span><div aria-labelledby="heading5" class="collapse" data-dcnode-id="630" data-parent="#faqGroup" id="collapse5"><span data-dcnode-id="643" instrument_node="">
</span><div class="card-body" data-dcnode-id="632"><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">BS9251:2014</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Scope - Code of Practice for the design, installation, components, water supplies and testing of automatic fire sprinkler systems for the use in domestic and residential occupancies. There are 3 categories defining the design requirements for dwellings including domestic, HMO's, B&amp;B's, Apartments, High-rise blocks, Residential Homes, Care and Nursing Homes, Dormitories and Hostels.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Previously BS9251:2005 from original draft DD251</span></p><span data-dcnode-id="633" instrument_node="">
</span></div><span data-dcnode-id="631" instrument_node="">
</span></div><span data-dcnode-id="629" instrument_node="">
</span></div><span data-dcnode-id="627" instrument_node="">
</span><div class="card" data-dcnode-id="609"><span data-dcnode-id="626" instrument_node="">
</span><div class="card-header" data-dcnode-id="620" id="heading6"><span data-dcnode-id="625" instrument_node="">
</span><button aria-controls="collapse6" aria-expanded="false" data-dcnode-id="622" data-target="#collapse6" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="624"></span><span data-dcnode-id="623" instrument_node=""> Concealed fire sprinklers - How do they look?</span></button><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span><div aria-labelledby="heading6" class="collapse" data-dcnode-id="611" data-parent="#faqGroup" id="collapse6"><span data-dcnode-id="618" instrument_node="">
</span><div class="card-body" data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Residential fire sprinkler systems are designed specifically for the domestic environment. The sprinklers themselves are small, neat, and discrete. They look very much like modern recessed light fittings and are completely unobtrusive. The process of installation is similar to putting in central heating where pipe work is concealed within ceiling voids.</span></p><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="608" instrument_node="">
</span><div class="card" data-dcnode-id="590"><span data-dcnode-id="607" instrument_node="">
</span><div class="card-header" data-dcnode-id="601" id="heading7"><span data-dcnode-id="606" instrument_node="">
</span><button aria-controls="collapse7" aria-expanded="false" data-dcnode-id="603" data-target="#collapse7" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="605"></span><span data-dcnode-id="604" instrument_node=""> Do all the fire sprinklers operate together?</span></button><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span><div aria-labelledby="heading7" class="collapse" data-dcnode-id="592" data-parent="#faqGroup" id="collapse7"><span data-dcnode-id="599" instrument_node="">
</span><div class="card-body" data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">No, only the sprinkler nearest the fire will operate when the heat from a fire raises the sprinkler to its operating temperature, then that sprinkler head activates. In most cases the fire is controlled by the operation of a single head.</span></p><span data-dcnode-id="595" instrument_node="">
</span></div><span data-dcnode-id="593" instrument_node="">
</span></div><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node="">
</span><div class="card" data-dcnode-id="562"><span data-dcnode-id="588" instrument_node="">
</span><div class="card-header" data-dcnode-id="582" id="heading8"><span data-dcnode-id="587" instrument_node="">
</span><button aria-controls="collapse8" aria-expanded="false" data-dcnode-id="584" data-target="#collapse8" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="586"></span><span data-dcnode-id="585" instrument_node=""> What are the benefits of fire sprinklers for Architects?</span></button><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><div aria-labelledby="heading8" class="collapse" data-dcnode-id="564" data-parent="#faqGroup" id="collapse8"><span data-dcnode-id="580" instrument_node="">
</span><div class="card-body" data-dcnode-id="566"><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">One of the most often ignored benefits of sprinklers is the additional flexibility which this equipment provide to designers and builders.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">In unconventional or unusual buildings including sprinklers in a specification will often enable Building Regulations compliance to be achieved in a very cost-effective manner. Where changes of use are being anticipated, utilising sprinklers is often the only way in which means of escape requirements can be provided.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">In other situations, the freedom architects seek to implement a stylish or unorthodox design can only be accomplished using sprinklers. Sprinklers have also been used as a compensating feature in developments where the Building Regulations cannot be complied with in respect of means of escape or access for the fire brigade.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Some projects have even reported that providing sprinklers has resulted in a cost saving where the building authority has permitted trade-offs in respect of means of escape facilities.</span></p><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span></div><span data-dcnode-id="561" instrument_node="">
</span><div class="card" data-dcnode-id="540"><span data-dcnode-id="560" instrument_node="">
</span><div class="card-header" data-dcnode-id="554" id="heading9"><span data-dcnode-id="559" instrument_node="">
</span><button aria-controls="collapse9" aria-expanded="false" data-dcnode-id="556" data-target="#collapse9" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="558"></span><span data-dcnode-id="557" instrument_node=""> Is there any risk of Legionnaires?</span></button><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span><div aria-labelledby="heading9" class="collapse" data-dcnode-id="542" data-parent="#faqGroup" id="collapse9"><span data-dcnode-id="552" instrument_node="">
</span><div class="card-body" data-dcnode-id="544"><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">After extensive research by the Fire Prevention Association and the Loss Prevention Council, it has been determined that there is no risk provided systems are maintained. During maintenance periods the water is usually drained down and refreshed.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">There have been no recorded cases of Legionella being contracted from any fire protection system anywhere in the world.</span></p><span data-dcnode-id="545" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span></div><span data-dcnode-id="539" instrument_node="">
</span><div class="card" data-dcnode-id="518"><span data-dcnode-id="538" instrument_node="">
</span><div class="card-header" data-dcnode-id="532" id="heading10"><span data-dcnode-id="537" instrument_node="">
</span><button aria-controls="collapse10" aria-expanded="false" data-dcnode-id="534" data-target="#collapse10" data-toggle="collapse" type="button"><span class="icon-angle-down" data-dcnode-id="536"></span><span data-dcnode-id="535" instrument_node=""> Can Listed buildings be protected with fire sprinklers?</span></button><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span><div aria-labelledby="heading10" class="collapse" data-dcnode-id="520" data-parent="#faqGroup" id="collapse10"><span data-dcnode-id="530" instrument_node="">
</span><div class="card-body" data-dcnode-id="522"><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Yes, Autoquench have installed fire sprinklers into several listed buildings.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Listed buildings require a high level of attention to detail, where skills and experience are all important.</span></p><span data-dcnode-id="523" instrument_node="">
</span></div><span data-dcnode-id="521" instrument_node="">
</span></div><span data-dcnode-id="519" instrument_node="">
</span></div><span data-dcnode-id="517" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
