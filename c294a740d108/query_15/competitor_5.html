</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebigredguide.com/insights/expert-commentary/pumps.html" title="Pumps - Expert Commentary"><span data-dcnode-id="691" instrument_node="">Pumps - Expert Commentary</span></a><span data-dcnode-id="689" instrument_node="">
</span></h2><span data-dcnode-id="687" instrument_node="">
</span><div class="row" data-dcnode-id="594"><span data-dcnode-id="685" instrument_node="">
</span><div class="col-12 col-sm-4 col-md-4 col-lg-4 col-xl-4 mb-2 mb-sm-0 mb-md-0 mb-lg-0" data-dcnode-id="656"><span data-dcnode-id="684" instrument_node="">
</span><div class="card thumb-card border" data-dcnode-id="658"><span data-dcnode-id="683" instrument_node="">
</span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebigredguide.com/insights/fire-construction-industry-experts-discuss-spring.1648725322.html"><span data-dcnode-id="682" instrument_node="">
</span><div class="responsive-image" data-dcnode-id="678"><span data-dcnode-id="681" instrument_node="">
</span><img alt="UK Fire And Construction Industry Experts Discuss: The Spring Statement 2022" class="card-img-top img-fluid" data-dcnode-id="680" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebigredguide.com/img/news/612/solar-panels-image.jpg&amp;raw"><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span></a><span data-dcnode-id="675" instrument_node="">
</span><div class="card-body" data-dcnode-id="660"><span data-dcnode-id="674" instrument_node="">
</span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebigredguide.com/insights/fire-construction-industry-experts-discuss-spring.1648725322.html"><span data-dcnode-id="673" instrument_node="">
</span><div class="card-title two-line-text" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">UK Fire And Construction Industry Experts Discuss: The Spring Statement 2022</span></div><span data-dcnode-id="670" instrument_node="">
</span></a><span data-dcnode-id="668" instrument_node="">
</span><div class="separator" data-dcnode-id="667"></div><span data-dcnode-id="666" instrument_node="">
</span><p class="card-text four-line-text" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Following the UK Chancellor of the Exchequer Rishi Sunak’s Spring Statement on 23 March, several imminent and future changes were laid out by the UK government.
This included VAT scrappage for residential energy-saving measures like heat pumps and solar panels, a 12-month cutting of fuel duty by 5p per liter, and to support the decarbonization of commercial premises, targeted business rate exemptions for eligible plant and machinery used in onsite renewable energy generation and storage. This is complemented by a 100% relief for eligible low-carbon heat networks with their own rates bill.
focus on research and development
There was also a distinct focus on research and development. Tax credits are to be reformed, with the potential to increase the R&amp;D expenditure credit after the summer months.
This is a top-line view of just some of the government’s announcements. As the dust has settled, we’ve asked fire and construction sector professionals what they make of the statement. Read on to find out how they believe the Spring Statement will impact the industry.
Upskilling the employees
We need rapid innovation to ensure that the built environment can cope with climate change and energy demands"
Russell Haworth, the CEO, of NBS, says, "We need rapid innovation to ensure that the built environment can cope with climate change and energy demands. Construction product manufacturers need regulatory and policy clarity along with incentives to innovate. Unfortunately, this is another chance missed to make the UK a world leader in combatting climate change impact.”
“While productivity was touched upon, it’s very ‘jam tomorrow’ and neglects the elephant in the room, which is the reskilling of existing employees to cope with the digital future. Providing support now to up-skill employees would have been to everyone’s future benefit, including the Treasury.”
Building safety
Ian King, COO, Zeroignition, says, “With materials hard to get hold of and prices rising rapidly, construction is under pressure. It's encouraging to see the Government is taking a step towards solving the climate crisis and bringing forward the business rate exemptions for green technology.”
“So too is throwing businesses a lifeline by reducing the tax to incentivize firms to invest and innovate more. Yet the proof is in the pudding and the autumn budget will reveal the true extent of this investment. One oversight is around building safety with construction product testing facing backlogs. Significant funding needs to be unlocked to create new testing labs.”
Decarbonization
We’d like to see the support of a broader range of strategies and technologies to give more builders to make a sustainable impact"
Fraser Robb, Managing Director, Perega, says, "By not adequately acknowledging or progressing the aims of COP26, the Spring Statement fell short of building on last November’s momentum. As engineers, we’re here to make things possible, including decarbonizing the built environment, but we need a budget and governmental support to have any hope of success.”
“Along with increased funding, we’d like to see the support of a broader range of strategies and technologies to give more builders, large companies, and SMEs alike, the opportunity to make a lasting, sustainable impact."
Reducing fuel prices
Ben Hancock, Managing Director, Oscar Acoustics, says, “Companies of all sizes are being squeezed and warnings that prices could rise to potential double-digit percentages have loomed heavy for bosses. Seeing the government take the relevant action by cutting fuel duty will help the construction sector. These moves will be particularly welcome at the sub-contractor level working to keen margins.”
“However, given the UK is facing its highest tax burden as a proportion of GDP since the 1950s, more initiatives that help contractors and small business owners combat the rising cost of raw materials would have been welcomed.”
Addressing supply chain challenge
The energy crisis and high inflation are putting immediate pressure on the market"
Ibrahim Imam, Co-Founder, and Co-CEO, PlanRadar, says, “Unblocking supply chain issues have been a major, persistent concern within UK construction and the Chancellor’s statements have failed to address this long-standing problem. While the 12 months cut on fuel duty may go some way to easing financial pressures felt by housebuilders, developers and contractors alike, we’re disappointed not to see the government do more for this essential sector.”
“It’s obvious the energy crisis and high inflation are putting immediate pressure on the market, but it’s also important not to lose sight of long-term goals if we are to reach challenging sustainability targets, such as Net Zero 2050, and it would have been heartening to see the Chancellor address this.”
Energy efficiency
Erik Boyter, CEO, WindowMaster, says, "UK construction has a critical role to play in relieving the pressure of skyrocketing energy prices, and we’re yet to see this fully realized in a holistic, multidisciplinary discussion. There are so many instruments, in the form of building methods and complementary technology, available to implement a sea change in energy efficiency if only government would play conductor and lead from the front. Every option must be considered.”
“Crucially, the government needs to give due consideration to how we might improve energy efficiency by harnessing natural elements within commercial and residential property environment itself, such as through intelligent natural ventilation or passive solar design. I hope the Government’s move to reduce VAT on energy-saving devices to zero won’t be an exercise in bureaucracy and meeting narrow thresholds, otherwise only a privileged few will benefit."</span></p><span data-dcnode-id="663" instrument_node="">

</span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebigredguide.com/insights/fire-sprinkler-failures-buildings-co-1739-ga.1620811169.html"><span data-dcnode-id="643" instrument_node="">
</span><div class="card-title two-line-text" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Fire Sprinkler Failures In Buildings: Why They Happen &amp; What To Do</span></div><span data-dcnode-id="640" instrument_node="">
</span></a><span data-dcnode-id="638" instrument_node="">
</span><div class="separator" data-dcnode-id="637"></div><span data-dcnode-id="636" instrument_node="">
</span><p class="card-text four-line-text" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">The fire sprinkler system in your building is a critical safety measure and, when needed, it can save lives. Still, even the best systems can malfunction, and sprinklers do occasionally fail. When they do, they can drench the interior of your building, damaging everything from furniture and personal belongings to drywall and building materials. 
As a property manager, dealing with fire sprinkler failure can feel overwhelming. What do you do next? Where do you start? And why did the sprinkler system fail in the first place? In this post, we’ll discuss the common causes of accidental discharge, and what to do if it happens to you.
Reasons for Fire Sprinkler Systems Failure
Today, all building fire sprinkler systems must meet NFPA 13 standards. These National Fire Protection Association benchmarks define safety requirements for components and installation, and help ensure that sprinkler systems are well maintained and ready to perform.
Still, fire sprinkler systems can fail. Here are a few of the most common culprits:

Aging parts
Building renovations (collisions with construction equipment, displacement or disturbance, etc.)
Incorrectly placed heating systems that activate sprinklers
Vulnerable pipes that freeze and cause sprinkler heads to burst
Corrosion

Fire sprinkler malfunctions can be incredibly problematic, causing extensive damage to your building 
Regardless of what causes the sprinklers to discharge accidentally, fire sprinkler malfunctions can be incredibly problematic, causing extensive damage to your building and requiring costly repairs from a water damage repair contractor.
5 Things to do if Your Sprinklers Fail
There are no flames in your building, but your sprinklers are soaking everything in sight. You have to move quickly to avoid even more damage.
Stay calm and follow these five steps:

Get everyone out

Even if there’s not an active fire in the building, water poses its own set of dangers. To avoid problematic slip and fall conditions, get everyone out of the area immediately. Move them to a safe location outside the building, preferably one you’ve agreed on in a previously established evacuation plan.

Shut off electrical equipment

Water and electricity are a deadly combination. To avoid electrical shocks, shut off all nearby electrical equipment and appliances, and then, turn off the building’s main power supply, as you exit the building.

Turn off the water main

Instead of wasting time shutting off broken sprinkler heads individually, go to the building’s main water supply immediately and shut it off at the valve. This will stop all water flow and prevent additional water damage.

Take photos of the scene

Once it’s safe to re-enter the building, document the scene. Use your smartphone to take photos of broken sprinkler heads or anything else you believe may have caused the accidental discharge.
Additionally, take photos of the damage the sprinklers caused to floors, walls, personal belongings, and more. These photos can help response specialists understand the cause of the malfunction and may streamline your insurance claims process.

Contact a restoration specialist

Even if your water damage looks minimal, you’ll need to contact a skilled water damage restoration expert, like the Chicago-based maintenance and service company, ServiceMaster Restoration by Zaba.&nbsp;
Accidental sprinkler discharges soak drywall, destroy carpets and textiles, and lead to dangerous mold and mildew growth, which can happen just 24-48 hours after water exposure. Prevent worsening damage and the dangerous conditions by contacting a sprinkler repair specialist right away.
Cleanup and water damage restoration services
Using your documentation, your insurance company will work to determine the cause of the sprinkler failure
Using your documentation, your insurance company will work to determine the cause of the sprinkler failure. This can be a lengthy process that takes weeks or even months.
As that happens, your cleanup team will focus on providing water damage restoration services. Typically, fire sprinkler water damage involves ‘blackwater’- a dangerous mixture of sediments and other contaminants that leave behind an unpleasant smell and a film that can destroy belongings.
To reclaim your space, the water damage restoration service will focus on extracting the remaining water, drying the space to prevent mold and mildew formation, and decontaminating all surfaces. This is a critical step that you can’t afford to rush. Work with the best water damage cleanup company you can find to ensure positive results.
Protecting Your Sprinkler Systems in the Future
While it’s impossible to completely avoid every accidental discharge, there are certain steps you can take to safeguard your sprinkler system.
Proper maintenance, for example, allows you to avoid preventable issues that could lead to malfunction. You should also take care to keep all remodeling and construction work away from sprinkler heads and systems to avoid accidental damage.
These are simple tips, but they can help keep your building and tenants safe and dry - both now and in the future.</span></p><span data-dcnode-id="633" instrument_node="">

</span><div class="card-title two-line-text" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Mobile Firefighting Systems Provide Flexible Fire Protection For Major Facilities</span></div><span data-dcnode-id="610" instrument_node="">
</span></a><span data-dcnode-id="608" instrument_node="">
</span><div class="separator" data-dcnode-id="607"></div><span data-dcnode-id="606" instrument_node="">
</span><p class="card-text four-line-text" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Within traditional commercial and industrial firefighting systems, engineers have primarily focused on permanent installation designs rather than entertaining alternative or supplemental mobile firefighting systems. Permanent installation design is typically better understood, supported, and supplied throughout the fire protection engineering and manufacturing community.
However, mobile firefighting systems provide unique solutions and advantages compared to their permanent installation cousins such as flexible deployment, simpler servicing, improved economy, and much higher performance availability. The combination of both systems is frequently the most strategic solution for the facility operator.
Limitations of fixed installation systems
Permanent installation (fixed) systems include everything from sprinklers, foam systems, primary watermain pumps, and the plethora of piping in between. A large refinery complex will need to address various hazard mitigation and control problems that span both hardware and personnel needs. In the event standard hazard mitigation safety procedures and equipment have failed, the facility immediately initiates a hazard control operation.
Passive fixed systems automatically engage the hazard through an array of sensors, mechanical triggers, and control algorithms. A properly designed system with adequate hazard coverage, preplanning, preventative maintenance, and testing will successfully terminate the hazard, while firefighting personnel respond and ensure no further hazards develop. This conceptual approach relies on hardware and personnel all operating as planned….
Combining permanent and mobile apparatus
“According to plan” would never have any failures or fires, but history has a different script. In the worst-case petrochemical scenario, fixed systems fail to extinguish a hazard putting the entire response on human and mobile hardware resources. This would include but is not limited to firetrucks, mobile high-flow pumping systems, large mobile monitors, foam proportioning units, and large diameter layflat hose. This type of response escalates into a larger scale operation, sometimes involving agencies beyond the facility operator itself. Although a low probability event, the risk to life and property is significantly substantial. Fixed systems may be rendered inoperable due to the loss of electrical power or actual physical damage
Reducing fire-related expenditureMore typical than the worst-case scenario, facilities experience both maintenance-related system downtimes and natural phenomena damage such as extreme weather and seismic events. In this case, fixed systems may be rendered inoperable due to the loss of electrical power or actual physical damage.
In any of these situations, mobile fire apparatus may fill the gap requirements of the facility as their flexible storage and deployment would protect them from everything but the worst natural disasters. Their further benefit is that a smaller set of mobile apparatus resources may be used to protect a larger amount of infrastructure, especially while in use in a mutual-aid program between facilities and communities.
According to the NFPA’s report “Total Cost of Fire in the United States”, fire-related damages and expenditures from 1980 to 2014 have risen from roughly $200B (adjusted for inflation to 2014) to nearly $330B. The greatest expenditure is in fire safety costs in building construction, amounting to $57.4B. Although the overall losses per year as a ratio to protection expenditures has dropped by roughly 70% over the past 30 years, petrochemical facility losses have continued to rise over the same time.






In the worst-case petrochemical scenario, fixed systems fail to extinguish a hazard&nbsp;



Petrochemical facility challenges
According to the NFPA, refineries or natural gas plants had reported an average of 228 fires or explosions per year through the 1990s. Furthering this data with Marsh’s “100 Largest Losses, 25th edition”, refinery losses have continually expanded throughout the last two decades with 11 of the top 20 largest losses of the past 40 years happening during or after the year 2000. Two primary drivers of this trend are the advanced age of petrochemical facilities and their staggering complexity.
As oil margins fall, upstream operational businesses are detrimentally affected by reduced investment in everything to new equipment, maintenance and passive safety systems. There is an observable correlation between a major oil price drop followed by upstream facility fire losses. Even with reduced investment and oil throughput growth rates, US refinery utilisation at the end 2017 was at 96.7%, the highest since 2005 (Marsh, The Impact of the Price of Oil). The short story is that systems and personnel are being asked to do more with less with each passing year.
Cost-effective mobile apparatus systems&nbsp;
Mobile fire apparatus is generally more cost-effective to procure when using standardised designs and application methodology. They can access open water sources by either drafting (when in close proximity to the water) or using floating source pumps (for variable level or difficult access water sources). Mobile fire apparatus is generally more cost-effective to procure when using standardized designs and application methodology
With this open water access, they can provide significantly more water (upwards of 10,000 GPM or more per system if necessary) than any typical fixed fire pumping solution. Moreover, as their primary benefit, they are easy to move and deploy. This benefit allows them to be utilised at the point of hazard as needed while being easily accessible for service.
While fixed systems are installed at “every known” hazard and must be continually maintained to operate effectively, mobile systems may be used sitewide or across facilities. This flexibility reduces overall capital expenditure requirements and establishes a valuable primary and secondary firefighting system depending on the hazard and facility resources.
Combining fixed and mobile systems
Permanent installation fire suppression systems are a mainstay of modern day firefighting. They provide immediate passive response with little human intervention. However, as facility utilisation is pushed to maximum capacity while fixed systems continually age out without adequate replacement or maintenance, mobile systems will need to both fill the response gap and provide a final wall to total loss incidents.
The reality is that both fixed and mobile systems need to work together to provide the safest possible operation. Service and training requirements need to also be maintained to manage an adequate, or even better, exemplary response to hazard control incidents.
Managing major facility uptime requires continuous oversight and to drive hazard mitigation standards throughout the organisation, including executive management. A safe, reliable and fully-functional plant is also a profitable and cost-effective plant much like a healthy worker is a better worker. Protect your people and property and you will protecting your company’s future.</span></p><span data-dcnode-id="603" instrument_node="">
