</span><article class="uk-article" data-dcnode-id="1475"><span data-dcnode-id="1646" instrument_node="">
</span><h1 class="uk-article-title" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Fire Sprinkler Pumps</span></h1><span data-dcnode-id="1643" instrument_node="">
</span><h2 data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Sprinkler System Pumps</span></h2><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1639" instrument_node="">Ideally, every small to medium residential fire sprinkler system would be connected directly to the town mains. This is often the case in other countries where mains water pressures tend to be higher than that of the UK. Consequently, there are many systems that are fed by a storage system which will incorporate a ‘</span><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">fire pump’ </span></strong><span data-dcnode-id="1636" instrument_node="">or also referred to as a</span><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">‘ fire set’</span></strong><span data-dcnode-id="1633" instrument_node="">.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1630" instrument_node="">The original version of </span><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">BS9251</span></strong><span data-dcnode-id="1627" instrument_node=""> focused much more on the technical aspects of mains water supplies than storage systems presumably, because no-one envisaged the amount of problems that have been created by Water Authorities throughout the country.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><img alt="water pump mist suppression" class="alignnone wp-image-3541" data-dcnode-id="1624" height="168" loading="lazy" sizes="(max-width: 224px) 100vw, 224px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-300x225.jpg&amp;raw" srcset="https://www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-300x225.jpg 300w, https://www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-1024x768.jpg 1024w, https://www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-768x576.jpg 768w, https://www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-1536x1152.jpg 1536w, https://www.radfiresprinklers.com/wp-content/uploads/2022/03/Typical-small-fire-set-Custom-1-2048x1536.jpg 2048w" title="Fire Sprinkler Pumps" width="224"></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1621" instrument_node="">A major shortcoming of the </span><strong data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">British Standard (BS9251-05)</span></strong><span data-dcnode-id="1618" instrument_node="">&nbsp;was the lack of attention given to the problems associated with any pump standing idle and not regularly moving water. The original standard simply suggested that the fire pump should be activated periodically* on a bi-monthly basis in order to stop them seizing up. It was very unlikely that anyone would perform this duty especially as so many of these systems were installed in lofts. &nbsp;At the time, Lowara and Grundfos were manufacturing fire-sets which had been produced to provide what was considered a minimum level of functionality. It is true to say that they were fairly costly but this reflected the research &amp; development costs associated with the product and the size of the </span><strong data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">residential sprinkler market</span></strong><span data-dcnode-id="1615" instrument_node=""> at the time.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">It was generally assumed by the pioneering Residential &nbsp;Sprinkler Association (RSA) in their training all those years ago that installers would use a fire pump-set specifically designed for the purpose. However, as more and more installers entered the market, standards were reduced in an effort to reduce costs in order to gain a share of the slowly expanding market and more and more pumps without adequate automation were installed in early systems.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">These problems were addressed to some extent by the industry within the training courses and technical bulletins issued to </span><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">RSA and BAFSA members</span></strong><span data-dcnode-id="1606" instrument_node="">.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><h2 data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Sprinkler Pump Installation</span></h2><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Here at RAD Fire Sprinklers, we offer sprinkler pump installations to both individuals and businesses. We offer a range of fire pump systems that are suitable for use with a number of fire protection systems. With a team of experts, we’ll ensure your sprinkler system is fitted with the correct type of fire sprinkler pump.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">We have been carrying out fire sprinkler pump installations for many years and have become well-known for the service we provide. With years of experience, we have all the skills, knowledge and tools needed to ensure a professional and efficient service is provided. When it comes to sprinkler pump installations, be sure to get in touch with RAD Fire Sprinklers.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><h3 data-dcnode-id="1592"><strong data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Why can’t a standard pump be installed in a Domestic or Residential Fire sprinkler system?</span></strong></h3><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><img alt="Sprinkler Pumps" class="wp-image-1515" data-dcnode-id="1590" height="193" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.radfiresprinklers.com/wp-content/uploads/2012/04/Lowara.jpg&amp;raw" title="Sprinkler Pumps" width="166"></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">The answer is very simple and no company should fit a normal pump to a life safety system which may lie dormant for many years.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">The two most fundamental requirements for any fire pump set is that it should carry out the following actions automatically:</span></p><span data-dcnode-id="1582" instrument_node="">
</span><ul data-dcnode-id="1574"><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">carry out some form of activation cycle periodically to prevent it seizing up and</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">that it should provide a fault alarm if the power is disconnected from the system. Neither of these were a requirement of BS9251-05</span></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">The publication of BS9251-15 has provided very clear guidance regarding fire sets and they must be designed to include an automatic test cycle which will active the pump at least monthly. *</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1567"><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">*It is important to understand that during a test, the fire &nbsp;set doesn’t need to deliver the large volumes of water required during an activation. Flows are restricted and re-circulated back into the water tank</span></em></p><span data-dcnode-id="1566" instrument_node="">
</span><h2 data-dcnode-id="1565"></h2><span data-dcnode-id="1564" instrument_node="">
</span><h3 data-dcnode-id="1561"><strong data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Is it possible to combine the domestic water supply with the fire sprinkler supply? – YES</span></strong></h3><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><img alt="Sprinkler Pump" class="wp-image-1510" data-dcnode-id="1559" height="173" loading="lazy" sizes="(max-width: 231px) 100vw, 231px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.radfiresprinklers.com/wp-content/uploads/2017/06/Typical-Fire-Connection-to-a-cold-water-booster-system-adjusted-300x225.jpg&amp;raw" srcset="https://www.radfiresprinklers.com/wp-content/uploads/2017/06/Typical-Fire-Connection-to-a-cold-water-booster-system-adjusted-300x225.jpg 300w, https://www.radfiresprinklers.com/wp-content/uploads/2017/06/Typical-Fire-Connection-to-a-cold-water-booster-system-adjusted-768x576.jpg 768w, https://www.radfiresprinklers.com/wp-content/uploads/2017/06/Typical-Fire-Connection-to-a-cold-water-booster-system-adjusted-1024x768.jpg 1024w" title="Sprinkler Pump" width="231"></p><span data-dcnode-id="1557" instrument_node="">
</span><ul data-dcnode-id="1549"><span data-dcnode-id="1556" instrument_node="">
</span><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">BS9251-15 provides clarity on this issue by suggesting that the two supplies can be combined providing that the storage tank has sufficient capacity.</span></li><span data-dcnode-id="1553" instrument_node="">
</span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">The pump must also have the capacity to supply the combined total of the domestic and fire supply or, whichever is higher provided that a shut-off valve is connected to the domestic supply which will automatically divert all the available water to the sprinkler system in the event of an activation.</span></li><span data-dcnode-id="1550" instrument_node="">
</span></ul><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1545"><em data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">All our storage systems are supplied and have been supplied in the past with full monitoring and an automatic periodical movement cycle.</span></em></p><span data-dcnode-id="1544" instrument_node="">
</span><h3 data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Why Choose Us For Sprinkler Pumps?</span></h3><span data-dcnode-id="1541" instrument_node="">
