</span><div class="et_pb_text_inner" data-dcnode-id="481"><h1 data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">NFPA Fire Pump Testing Requirements</span></h1></div><span data-dcnode-id="480" instrument_node="">
</span></div><span data-dcnode-id="478" instrument_node="">
</span></div><span data-dcnode-id="476" instrument_node="">
</span></div><span data-dcnode-id="474" instrument_node="">
</span></div><div class="et_pb_section et_pb_section_1_tb_body et_section_regular" data-dcnode-id="309"><span data-dcnode-id="472" instrument_node="">
</span><div class="et_pb_row et_pb_row_1_tb_body" data-dcnode-id="311"><span data-dcnode-id="471" instrument_node="">
</span><div class="et_pb_column et_pb_column_3_5 et_pb_column_1_tb_body et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="409"><span data-dcnode-id="470" instrument_node="">
</span><div class="et_pb_module et_pb_post_content et_pb_post_content_0_tb_body" data-dcnode-id="411"><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">A fire pump is an essential component in a city’s fire safety system because it is used when a facility’s water supply is unable to provide enough pressure to meet the hydraulic design requirements of the fire protection system. This is commonly the case in high rise buildings and large storage warehouses.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">The fire pump is powered either by electric or diesel fuel and uses water from an external water source to increase the water’s pressure, so it can reach wherever necessary to extinguish the flames. To ensure these pumps are always ready and working, they need to be tested on a regular basis.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">According to NFPA 25, fire pumps are required to be tested on both a monthly and annual basis to ensure that they will perform as designed.</span></p><span data-dcnode-id="460" instrument_node="">
</span><h2 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Difference Between Monthly and Annual Fire Pump Testing Requirements</span></h2><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">The monthly fire pump test is what is known as a “churn” test. The FDNY requires electric powered pumps to be tested as follows:</span></p><span data-dcnode-id="454" instrument_node="">
</span><ul data-dcnode-id="428"><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The pump should be run for a minimum of 10 minutes</span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">The pump starting pressure is recorded</span></li><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">The system suction and discharge pressure gauge readings are recorded</span></li><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The pump packing glands are checked for signs of discharge</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Glands nuts are adjusted; if necessary</span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">System is checked for unusual noises or vibrations</span></li><span data-dcnode-id="435" instrument_node="">
</span><li data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Packing boxes, bearings or pump casings are checked for overheating</span></li><span data-dcnode-id="432" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Final results are interpreted</span></li><span data-dcnode-id="429" instrument_node="">
</span></ul><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The annual fire pump test is called a “flow” test and it is designed to measure the pump’s flow and pressure. This test is performed by attaching hoses to the discharge test header. The hoses are then run to a safe location where the discharge of water will cause no damage.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">As the pump is run through its various stages, pressure readings are recorded. The test results are then compared to the pump manufacturer’s specifications and the test results from previous years. If there is a significant reduction in the pump’s performance, the technician will conduct a further examination to determine the cause and the necessary repairs.</span></p><span data-dcnode-id="421" instrument_node="">
</span><h2 data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Stay Compliant – Get Your Fire Protection System Inspected Today</span></h2><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Your fire pump system needs to work when it is called on. To ensure that happens, it needs to be properly inspected and tested according to the latest NFPA fire pump testing requirements. </span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//metrofireinspections.com/contact/"><span data-dcnode-id="416" instrument_node="">Contact Metro Fire Inspections today to schedule your next inspection</span></a><span data-dcnode-id="414" instrument_node="">. We’re a full-service fire sprinkler systems company with licensure in New York City, and Westchester, Nassau, and Suffolk counties, and our fire protection experts can help ensure your facility is safe and compliant with all current fire codes.</span></p><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="410" instrument_node="">
