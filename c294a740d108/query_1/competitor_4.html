</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">There is still no clarity from the government about the proposed ‘upgrade’ to C rating for all PRS lets as yet…but…</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Are Grade 2 listed properties completely exempt from having to go through the ‘wrap first’ initiatives? My Local Authority does not have a conservation officer/Dept just to simply double-check, so any request for advice has to be paid for first and forwarded to Planning. No one else has clearly asked, as a quick call to Planning confirmed this, so do I bother now or later?</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">If the cap is raised for Landlords to put towards initiatives (talk of up to £10k instead of current £3.5k), do I assume this means that any costs involved in trying to determine even the if possible exemption, can come under this category?</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">I am wondering if I can also claim costs if I get an expert out to assess that (as external insulation not viable because of listing) that equally internal insulation is not viable (how is house supposed to breathe?) so these can be taken into account?</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">I am struggling to see how on earth it is going to be possible to make my properties a C when both are buildings are listed, in addition to being in a conservation area, terraced with no external/outside space, restrictions on any window changes from sash’s and three stories high. No chance of solar panels, wind turbines or ground source heat pumps. They don’t have gas supplies either.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Are there any details on exemptions anywhere???</span></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">DSR</span></p><span data-dcnode-id="1985" instrument_node="">

</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The right to be informed about Our collection and use of personal data;</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The right of access to the personal data We hold about you (see section 12);</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The right to rectification if any personal data We hold about you is inaccurate or incomplete (please contact Us using the details in section 14);</span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The right to be forgotten – i.e. the right to ask Us to delete any personal data We hold about you (We only hold your personal data for a limited time, as explained in section 6 but if you would like Us to delete it sooner, please contact Us using the details in section 14);</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The right to restrict (i.e. prevent) the processing of your personal data;</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The right to data portability (obtaining a copy of your personal data to re-use with another service or organisation);</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The right to object to Us using your personal data for particular purposes; and</span></li><span data-dcnode-id="728" instrument_node="">
</span></ul><span data-dcnode-id="726" instrument_node="">
</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">If you have any cause for complaint about Our use of your personal data, please contact Us using the details provided in section 14 and We will do Our best to solve the problem for you. If We are unable to help, you also have the right to lodge a complaint with the UK’s supervisory authority, the Information Commissioner’s Office.</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">For further information about your rights, please contact the Information Commissioner’s Office or your local Citizens Advice Bureau.</span></li><span data-dcnode-id="718" instrument_node="">

</span><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">All personal data is processed and stored securely, for no longer than is necessary in light of the reason(s) for which it was first collected. We will comply with Our obligations and safeguard your rights under the GDPR at all times. For more details on security see section 7, below.</span></li><span data-dcnode-id="664" instrument_node="">

</span><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Personalising and tailoring our products and or services for you;</span></li><span data-dcnode-id="653" instrument_node="">

</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Analysing your use of our site and gathering feedback to enable us to continually improve our site and your user experience;</span></li><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Provide information to our partner service and product suppliers at your request.</span></li><span data-dcnode-id="641" instrument_node="">
</span></ul><span data-dcnode-id="639" instrument_node="">
</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">With your permission and/or where permitted by law, We may also use your data for marketing purposes which may include contacting you by email and or telephone with information, news and offers on our products and or We will not, however, send you any unsolicited marketing or spam and will take all reasonable steps to ensure that We fully protect your rights and comply with Our obligations under the GDPR and the Privacy and Electronic Communications (EC Directive) Regulations 2003.</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">You have the right to withdraw your consent to us using your personal data at any time, and to request that we delete it.</span></li><span data-dcnode-id="631" instrument_node="">

</span><li data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Anti-Money Laundering information and tax consultancy records are to be kept as required by law for up to seven years.</span></li><span data-dcnode-id="623" instrument_node="">
