</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id2&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Publisher Summary</h2><div id=&quot;aep-abstract-sec-id3&quot;><p id=&quot;fsabs001&quot;>This chapter introduces main types of pumps grouped into Rotodynamic along with the discussion of principles applicable for their operation. There are different types of pumps. Pumps operate by two basic principles: rotodynamic and positive displacement, but there are a few pump designs outside this categorization. Most pumps are driven by standard AC squirrel-cage motors. It may be advantageous to consider a steam or gas turbine for fast pumps. New motor designs, like switched reluctance, are very good for high speed but require a “black-box” of electronics. Alternatively, an engine may be better for slow pumps. Steam or compressed air power supplies can be beneficial in a hazardous area. In the pump industry, users and manufacturers often refer to or call a pump type by different names. This is inevitable given the range of pumps and the immeasurable number of process applications in which they are used. The same applies to pump terminology. The chapter also highlights various definitions and terminology associated with pump technology</p></div></div></div>" data-dcnode-id="702" lang="en" name="citation_abstract"><span data-dcnode-id="701" instrument_node="">

anded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="440" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="443" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="444" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="430" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/B978-185617476-3/50003-2" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="434" instrument_node="">https://doi.org/10.1016/B978-185617476-3/50003-2</span></a><a class="rights-and-content" data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9781856174763500032%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="432" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="429"></section><section class="ReferencedArticles" data-dcnode-id="428"></section><div class="PageDivider" data-dcnode-id="427"></div><div class="Abstracts u-font-serif" data-dcnode-id="420" id="abstracts"><div class="abstract author" data-dcnode-id="421" id="aep-abstract-id2"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Publisher Summary</span></h2><div data-dcnode-id="422" id="aep-abstract-sec-id3"><p data-dcnode-id="423" id="fsabs001"><span data-dcnode-id="424" instrument_node="">This chapter introduces main types of pumps grouped into Rotodynamic along with the discussion of principles applicable for their operation. There are different types of pumps. Pumps operate by two basic principles: rotodynamic and positive displacement, but there are a few pump designs outside this categorization. Most pumps are driven by standard AC squirrel-cage motors. It may be advantageous to consider a steam or gas turbine for fast pumps. New motor designs, like switched reluctance, are very good for high speed but require a “black-box” of electronics. Alternatively, an engine may be better for slow pumps. Steam or compressed air power supplies can be beneficial in a hazardous area. In the pump industry, users and manufacturers often refer to or call a pump type by different names. This is inevitable given the range of pumps and the immeasurable number of process applications in which they are used. The same applies to pump terminology. The chapter also highlights various definitions and terminology associated with pump technology</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="397" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="409"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781856174763500020"><svg class="icon icon-navigate-left" data-dcnode-id="418" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="419"></path></svg><span class="button-alternative-text" data-dcnode-id="411"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="398"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781856174763500044"><span class="button-alternative-text" data-dcnode-id="402"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="400" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="401"></path></svg></a></li></ul><div class="RawText" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Pump types   1   1.1 Introduction   1.2 Checklist of pump terminology and definitions   1.3 Rotodynamic pumps 1.3.1 Small centrifugal pumps for domestic water/heating/ sanitation applications 1.3.2 Domestic water  supply pump packages 1.3.3 Small centrifugal pumps for machine tool cutting oil applications 1.3.4  Horizontal  single-stage  end-suction  overhung impeller centrifugal pumps (for general purposes includes fixed irrigation pumps, EN 733 pumps) 1.3.5  Horizontal  single-stage  end-suction  overhung impeller centrifugal pumps (for chemical applications includes ISO 2858, ISO  3069, ISO 3661, ASME/ANSI B73.1 designs) 1.3.6  Horizontal  single-stage  end-suction  overhung impeller centrifugal pumps  (for heavy-duty applications includes ISO 13709, API 610 designs) 1.3.7 Horizontal single-stage double-suction axially- split  pumps (for general purposes) 1.3.8 Horizontal single-stage double-suction radially-split pumps (for heavy-duty applications  includes ISO 13709, API 610 designs) 1.3.9 Horizontal two-stage end-suction overhung impeller centrifugal pumps 1.3.10  Vertical single-stage overhung impeller centrifugal pumps for general applications 1.3.11 Vertical single-stage overhung  impeller centrifugal pumps (for chemical applications includes ASME/ANSI B73.2 designs) 1.3.12 Vertical multi-stage ntrifugal  pumps for general applications (including segmental pumps, dH &lt; 300 m, deep well ejector applications, wash water) 1.3.13  Vertical wet-pit pumps 1.3.14 Vertical dry-pit pumps Self priming pumps 1.3.15 Marine pumps 1.3.16 Submersible pumps with  electric motor 1.3.17 Non-electric submersible pumps 1.3.18 Submersible pumps for deep well applications 1.3.19 Portable  self-priming pumps 1.3.20 Horizontal two-stage axially-split centrifugal pumps (includes ISO 13709, API 610 designs) 1.3.21  Horizontal two-stage radially-split centrifugal pumps (includes ISO 13709, API 610 designs) 1.3.22 Multi-stage segmental  centrifugal pumps dH &gt; 300m 1.3.23 Horizontal multi-stage axially-split centrifugal pumps (includes ISO 13709, API 610  designs)  1.3.24 Horizontal multi-stage radially-split centrifugal pumps (includes ISO 13709, API 610 designs) 1.3.25 Large vertical  multi-stage centrifugal pumps (includes ISO 13709, API 610 designs) 1.3.26 Single-stage centrifugal pumps with integral  gearing 1 3.27 Multi-stage centrifugal pumps with integral gearing 1 3.28 Centrifugal pumps for pulp 1 3.29 Centrifugal pumps  for handling solids &lt; 10 mm 1 3.30 Centrifugal pumps for handling solids &gt; 10 mm 1 3.31 Non-clogging pumps 1 3.32 Submersible  non-clogging pumps 1 3.33 Mixed-flow pumps 1 3.34 Axial flow pumps 1.3.35 Non-metallic rotodynamic pumps 1.3.36  Hygienic-quality rotodynamic pumps 1.3.37 Magnetic drive rotodynamic pumps 1.3.38 Canned motor rotodynamic pumps 1.3.39  Rotodynamic pumps without drivers (for specific applications including mobile agricultural applications and mobile fire pumps)  1.4 Special rotodynamic pumps 1.4.1 Peripheral pumps 1.4.2 Pitot tube pumps 1.4.3 Disc pumps 1.4.4 Pumps as power-recovery  turbines 1.5 Positive displacement pumps 1.5.1 External gear pumps 1.5.2 Internal gear pumps 1.5.3 Archimedes screw pumps  1.5.4 Twin-rotor screw pumps 1.5.5 Triple-rotor and 5-rotor screw pumps 1.5.6 Twin-rotor geared-screw pumps 1.5.7 Progressive  cavity pumps 1.5.8 Lobe pumps (including circumferential piston pumps) 1.5.9 Vane pumps 1.5.10 Peristaltic pumps(including  rotary peristaltic pumps) 1 5.11 Rotary eccentric piston pumps 1 5.12 Axial and radial piston pumps 1 5.13 Inline piston pumps  1 5.14 Descaling pumps 1 5.15 Plunger pumps(includes horizontal and vertical) 1 5.16 Syringe pumps 1 5.17 Diaphragm pumps  (includes mechanical and hyd- raulic actuation) 1.5.18 Air-operated double-diaphragm pumps  PUMPING MANUAL International                           1   1 Pump types   1.5.19 Metering pumps (flow within + 0.1% to + 3% with substantial dp changes) 1.5.20  Direct-acting  reciprocating  pumps  (includes pneumatic, hydraulic and steam actuation) 1.5.21 Non-metallic positive displacement pumps 1.5.22 Sealless positive  displacement pumps 1.5.23 Hydraulic motors  1.6 Other pump types 1.6.1 Ejectors 1.6.2 Barrel-emptying pumps (powered and hand pumps) 1.6.3 Hydraulic-ram pumps 1.6.4  Air-lift pumps 1.6.5 Contraction pumps 1.6.6 Macerators  2                         PUMPING MANUAL International   1 Pump types   1.1 Introduction There are many different pump types. Pumps operate via two basic principles, rotodynamic and positive  displacement, but there are a few pump designs outside this categorisation. NOTE: If the reader is unfamiliar with the  concepts of 'rotodynamic' and 'positive displacement' then Chapter 4 should be reviewed before the pump types in this chapter  are examined. Rotodynamic machines try to be 'constant energy' devices but don't quite make it work because of the variable  inefficiencies and the limitations of manufacturing. Positive displacement machines try to be 'constant flow' devices but  don't quite man- age to make it work because of the liquid properties and manu- facturing requirements. But ! there is a  special case when con- stant flow is achieved. The reader should know which concept is better for a particular application  before reading Chapter 1. All pumps are not equal ! There are a wide range of pump types because some designs are better; more  efficient or more consistent or last longer; at handling specific operating condi- tions or specific liquid properties. Each  application should be assessed individually, on merit, when considering: •  Liquid properties •  Allowable leakage •  Driver  type •  Installation arrangement •  Operating efficiency required •  Duty cycle •  Allowable noise level •  Operational safety  •  Site facilities and local staff capabilities Remember, sometimes the liquid properties must be aug- mented with the  properties of entrained solids, gases or vapour. Mixtures of liquids need all components defined in detail; very small  concentrations can create corrosion problems. There are plenty of benign liquids which may be allowed to drip on the floor.  Some liquids are so hazardous that the vapour must not be allowed to escape. Simple seals can be very small; compli- cated  seals may require a lot of space plus an external system piped in. Not all pumps can accommodate complicated seals. Not all  pump designs can accommodate complicated sealing system piping. It is not always possible to upgrade from a re- laxed approach  to leakage to strict leakage control; a change of pump type may be necessary if initial leakage requirements were wrong !  Remember, the entrained/dissolved gas may be much more of a hazard than the liquid ! Most pumps are driven by standard AC  squirrel-cage motors. However, it may be advantageous to consider a steam or gas turbine for fast pumps. New motor designs,  like switched reluc- tance, are very good for high speed but require a 'black-box' of electronics. Alternatively, an engine  may be better for slow pumps. Steam or compressed air power supplies can be bene- ficial in a hazardous area. Don't forget  about the installation ar- rangement until the last minute. A submerged pump or a verti- cal pump may provide the smallest  installation footprint. Also remember, that poor piping design can have an adverse affect on performance, reliability and  labour. Piping which is not self-venting and not self-draining may require physical atten- tion during each start and stop.  Consider the piping arrange- ment while thinking about the pump configuration ! Much time is wasted troubleshooting 'pumps'  when it is the piping causing all the problems ! Efficiency can be very important for large pumps; large electric- ity bills !  Efficiency may be important when trying to find a pump  to operate from a 13A socket or on a 12V or 110V supply. Some pump types are much more efficient than others. The duty cycle  must be defined as it can significantly affect pump selection. Some pumps can operate continuously for ten years; other pumps  need tender-loving-care after twelve hours. The pump duty cycle limitations may necessitate the installation of standby units.  Some installations require very quiet pumps. The noise of cen- tral heating pumps can sometimes be heard all over a building.  Laboratories usually require very quiet pumps. Pumps, which are in close proximity to staff or the public, may have to be  inher- ently safe. The site services obviously affect pump and driver selection. A steam turbine may be the preferred driver  for the pump; not if there's no steam available. Larger pumps may need 3.3 kV or 6.6 kV powerfor the best motor sizing; there  may be additional cost expenditure required at the substation. If the application warrants a complicated pump unit, can the  local site personnel operate it safely and maintain it ? The supplier will be very happy to maintain it, at a cost. If the  local site personnel don't understand the pump, or the process, the cost of mainte- nance may be much higher than expected Y  When considering the information to be used to define the pump application it is very easy to spot 'maximums' and forget that  'minimums' might be just as important. It is worthwhile to take the time and consider that 'normal' might be much more  important than the occasional 'maximum' or 'minimum'. It might be very worthwhile to consider the duration of 'maximum' or  'minimum' in the context of long-term 'normals'. Unless specifi- cally defined to the contrary, the pump supplier will assume  all process changes occur slowly; any rapid changes must be de- scribed in detailY When the pump application is initially  considered, any applica- ble specifications, standards or regulations must be listed for discussion. Important factors, based  on either the liquid or the installation, can have a significant impact on pump selection, pump design and other equipment  selection. Remember in Eu- rope, that ATEX regulations apply to mechanical equipment such as pumps and gearboxes, as well as  motors. Size, that is much bigger size, may be required for compliance. Many speci- fications, standards and regulations  cannot be applied retro- spectively because of the effect on equipment selection. 1.2 Checklist of pump terminology and  definitions Modern communication can be very difficult. English is the de facto standard language for technical subjects BUT  there are different versions of English! American English is different to UK English. Many versions of English have been  developed by engineers who use English as a second language. In the pump industry, users and manufacturers often refer to or  call a pump type by different names! This is inevitable given the range of pumps and the immeasurable number of process ap-  plications in which they are used. The same applies to pump terminology. This terminology or "jargon" can be very confusing  and indeed often misleading. This Section attempts to highlight a few things to watch out for and provides an explanation of  and gives guidance on some of the more important key pump terms and descriptions that occur in daily pump usage many of which  are referred to within this book. Barrel pump - radially-split centrifugal pump. Bearing bracket- the structural component  which houses the pump bearings. Bearing pedestal- bearing bracket. Boiler feed pump - usually a multi-stage centrifugal pump  feeding treated water.  PUMPING MANUAL International                          3   1 Pump types   Booster pump - two different common uses. In hydraulic fluid power, a booster pump takes a high pressure and increases it  significantly. In process pumps, a booster pump is used where there is insufficient pressure to supply adequate NPSH or NPIP.  The booster pump provides a small increase in pressure so the main pump can operate reliably. Dead head - closed valve head  (do not assume a rotodynamic pump will run successfully at this condition!). Duty cycle - how the pump will be operated with  reference to time.  Eccentric screw pump - progressive cavity pump. Ejector - jet pump.   Fire pump - a pump used to pressurise water for fire-fighting. (Considered an intermittent application). Flooded suction - an  imprecise term to be avoided; specify the suction head/pressure and NPSHa/NPIPa.  Fluid - not necessarily liquid; use very carefully; this term is not interchangeable with liquid!   Head - a measure of energy in a rotodynamic pump system.   Heat pump - a system with a compressor.   Helical gear pump - progressive cavity pump. Helical rotor pump - progressive cavity pump or a screw pump.   Helical screw pump - progressive cavity pump. Hydraulic motor- a positive displacement machine which ex- tracts energy from  liquid. Hydraulic turbine - a rotodynamic machine which extracts en- ergy from liquid. Inline pump - a pump casing design  where the suction and dis- charge pipes are on the same centre-line; concentric, but on opposite sides.  Injector - jet pump. Liquid ring pump - a compressor. Modular multi-stage pump - segmental pump. Monoblock pump - a pump which  utilises the motor bearings for radial support and axial alignment. Motor stool - the structural space which supports a  vertical electric motor.  Mud motor- a progressive cavity pump extracting energy from drilling mud. NPIPa - see Section 4.4 of Chapter 4.   NPIPr- see Section 4.4 of Chapter 4.   NPSHa - see Section 4.4 of Chapter 4.   NPSHr- see Section 4.4 of Chapter 4.   Pinion pump - gear pump. Pipeline pump - a pump used to move liquid over considerable distance, perhaps 1000 kin. Pressure - a  measure of energy in a positive displacement pump system. Priming - filling a pump with liquid prior to starting. Pump package  - sometimes used when more than one pump is built on a baseplate. Also used when multiple pumps are driven from one gearbox.  Pump unit - the pump plus any power transmission equipment and the driver; everything mounted on the baseplate. Reciprocating  pump - a type of positive displacement pump which cannot run in reverse.  Ring section pump - segmental pump. Rotary pump - a type of positive displacement pump utilising rotating elements.  Rotodynamic pump - a type of pump which adds rotating ki- netic energy to the liquid then converts to static head.  Self-priming - a pump which can remove gas from the suction piping and not run dry. Side channel pump - peripheral pump. Snore  - the ability to run dry then self-prime when liquid is pres- ent. Suction stage - first stage. Siphoning - liquid flowing  through the pump when the pump is stationary. Turbining - a pump running backwards and acting as a turbine. Vacuum pump - a  compressor. Venting - removing air and/or gas from a pump prior to starting. Vertical turbine pump - a vertical multi-stage  pump probably with mixed-flow impellers. Waste water pump - vague! Could be surface water, dirty wa- ter or foul water  (sewage). 1.3 Rotodynamic pumps 1.3.1 Small centrifugal pumps for domestic water/ heatinglsanitation applications There are  specially developed pumps, so-called heating, water and sanitation pumps for the different pumping requirements in buildings.  One of their general characteristics is a low noise and vibration level, the requirements varying in accordance with the size  of the building from a noise level of approximately 25dB(A) for a private house, to approximately 65 dB(A) for pumps placed in  a well insulated machine room in a larger building. These different pump requirements are covered by: •  Heating circulation  pumps for circulating water in a central heating system. Smaller sizes up to a power requirement of normally 100W are of the  wet type, i.e. wet rotor motors, Figure 1.1. All the rotating parts, including the motor rotor are sealed inside a stainless  steel can. The stator windings are placed around the outside of the can and the rotating  Figure 1.1 Central heating circulator pumps with inline connections. The up- per illustration is the "wet" type. The lower  illustration is the conventional dry motor Courtesy of Grundfos  4                          PUMPING MANUAL International   1 Pump types   Figure 1.2 Heating circulation pump of the twin design Courtesy of Grundfos magnetic field passes through the can wall. No  seals are necessary; the bearings are usually ceramic lubricated by the hot water. Pump casings are usually cast iron or alu-  minium alloy with bronze or stainless steel impellers. The pumps are mass produced with fixed performance, but in order to  match the circulator to the system and avoid noise in the piping system, they are supplied with a two or three speed motor.  So-called twin pump packages, i.e. a pump casing with two pumps built as a unit ready for installation in one suction and  discharge pipe. The pumps can be operated together for parallel operation, see Figure 1.2, or series operation. The unit  includes a non-return valve system, controlled by the flow of liquid so that either pump can be operated independ- ently or  together with the other pump.  Hot water pumps for circulating domestic hot water in larger buildings so that the hot water is almost immediately avail- able  when the tap is turned on. In contrast to central heating pumps the parts in contact with the fluid are made of bronze  or stainless steel instead of cast iron. Wet motors are avail- able, as well as dry motors using special designs for motor and  shaft seals in order to avoid blockages due to furring or deposition of the natural salts.  •  Other pumps in buildings are pressure boosting pumps, (see multi-stage pumps, ground-water pumps and to some extent also  standard water pumps for fire systems). •  Complete pump packages are supplied in buildings with water central heating  systems, to maintain the static pres- sure in the heating circuit and make up any leaks. Most of these pumps are of the inline  design. The pump and motor form an integral package and the suction and discharge connections are inline so that the package  can be fitted into a straight pipe run. Most pumps do not require external support but rely entirely on the rigidity of the  pipework. Pumps can be mounted with the motors vertically or horizontally. In most de- signs the pump cannot be mounted  vertically above the motor. BS 1394 should be reviewed for relevant requirements. EN 1151 specifies the European requirements  for circulating pumps. Electrical safety requirements are given in Chapter 17, Section 17.1.4.  1.3.2 Domestic water supply pump packages Automatic water packages are used for supplying drinking wa- ter to households and  properties which are not connected to the national water distribution network. The water is normally taken from a well with a  suction lift for the pump of 3 to 7 m. The pump's flow and head are suitable for 1 to 3 outlets connected to the pump by  relatively short pipes or hoses. The package consists a self-priming pump, (centrifugal or liquid ring type), an electric  motor, an accumulator (pressurised hold- ing tank) and usually a pressure switch. The pressure switch ensures that the pump  starts when the pressure falls due to wa- ter being drawn off and stops when the accumulator has filled up due to the  corresponding increase in pressure. There are many different makes and models available as illus- trated in Figure 1.3. When  purchasing, account should be taken   i ii~ii~!~¸ i   m,   Figure 1.3 Automatic water supply packages - a selection of models (Top right hand illustration - Courtesy ofAquaTech Ltd)   PUMPING MANUAL International                           5   1 Pump types   Figure 1.4 Coolant pump for machine tools   of the noise level as well as the fact that the water package should fulfil current electrical, hygienic, and  legal require-  ments. 1.3.3 Small centrifugal pumps for machine tool cut- ting oil applications Special pumps are used for pumping  coolant/cutting oil, or White Water, for machine tools, lathes, grinding machines, etc. The liquid can be a specially blended  oil or an emulsion of it in water, the oil content being from 2% to 15%. The flow usually varies between 0.3 and 20 m3/h with  heads varying between 2 and 20m. This type of pump is standardised in Germany in ac- cordance with DIN 5440. This standard  indicates both perfor- mance and those dimensions which have an influence on interchangeability. The pump unit is constructed  so that the pump casing is submerged in the liquid with the motor placed outside the tank, Figure 1.4. The immersed depth is  up to 500 mm. Due to this construction, no shaft seal is required. BS 3766:1990 specifies ten sizes in the form of dimensions  and minimum performance characteristics for vertical top and side mounted units. DIN 5440 specifies six pump sizes in sub-  merged and external forms. The French Standard, NF E44-301 incorporates DIN 5440 requirements. Normally coolant pumps are  manufactured in cast iron or aluminium alloy but there are special types available in plastic. EN 12157, includes six sizes of  pumps, from 1.5m3/h to 15 m3/h, for depths from 90 mm to 550 mm. 1.3.4 Horizontal single-stage end-suction overhung impeller  centrifugal pumps (for general purposes includes fixed irrigation pumps, EN 733 pumps) Standard water pumps These are pumps  designed to operate with clean water, at tem- peratures up to 80/120 °C. They are used for clean liquids com-  Horizontal compact pump with im- peller mounted on the motor shaft (close coupled). End suction, top discharge; central or  tangential.  Vertical compact pump with impel- ler mounted on the end of the mo- tor shaft (close-coupled). Inline connections.   Figure 1.5 Various designs of standard pumps   patible with cast iron and in some special cases bronze. Impel- lers may be cast iron, bronze or plastic. Small pumps will  gener- ally not have wear rings. A wide range of styles and designs is available, nevertheless, a classification into main  categories can be made in accordance with Figure 1.5. Compact pumps with the impeller mounted directly on the mo- tor shaft  end, close-coupled, are suitable for flows up to a maxi- mum of approximately 300 m3/h and for differential heads of up to  100m. Casing pressure ratings can be up to 10 barg. Motor output can be over 100 kW however, motors exceeding 20 kW will  require lifting facilities. Close coupled pumps rely on the motor bearings to absorb axial thrust and radial loads. Suction  pressure may be restricted. Most of the hydraulics specified in Section 1.3.4 for EN 733 pumps are also available in close  cou- pled units which do not comply with the dimensional part of the Standard.  Smaller vertical compact pumps can often be mounted directly in pipework without supports, this of course assumes that the  pipework has sufficient rigidity. Larger vertical compact pumps have a foot to rest on a support. Normally the pump can be  mounted at any angle, with the exception that the motor must not be located under the pump because of the risk of motor damage  in the event of seal leakage. Mounting, other than ver- tical, can cause maintenance problems. Small pumps may have female  screwed connections as an alternative to flanges. Space around the stuffing box is restricted and the choice of packing and  seal arrangements will be limited. Pumps with bearing brackets, housing their own radial and axial bearings, are available to  cover most of the operational range of close coupled pumps. Pumps with bearing brackets will not have the same restrictions on  suction pressure and sealing ar- rangements. Somewhat larger pumps are produced in this con- figuration. A coupling is  required between pump and motor as is a baseplate for horizontal units. These units are slightly longer than the equivalent  compact close coupled pump but more ver- satile. Some pumps are designed to be back-pull-out; the com- plete rotating assembly  plus the bearing bracket can be re- moved leaving the casing connected to the pipework. If a spacer coupling to the motor is  used, the pump can be main- tained without disturbing the pipework or the motor. These pumps are capable of 2000 m3/h at  differential heads of 160 m and pressure ratings up to 16 barg. EN ISO 9908 could be useful for both horizontal and vertical  pump requirements. BS 4082 could be useful for vertical pump requirements. Stuffing box and seal cavities should comply with  ISO 3069.  Standard pumps to EN 733   In Germany and a few other European countries for many years, there were standardised pumps for non-hazardous liq- uids. The  German Standard DIN 24255 was probably the most popular. The German Standard has been replaced by a very similar European  Standard, EN 733. The Standard relates to foot mounted horizontal pumps with a bearing bracket, see Fig-  Horizontal pump with bearing bracket mounted with motor on baseplate. End suction, top dis- charge; central or tangential.   Vertical pump with support feet, bearing bracket and extended mo- tor stool for spacer coupling. Inline connections.   6                         PUMPING MANUAL International   1 Pump types   //'l II /   i!  !   Figure 1.6 A pump in accordance with EN 733   Fixed irrigation pumps Irrigation and other agricultural applications make use of differ- ent pumps depending upon the  location and what power sources are available. Permanent surface installations nor- mally have single-stage pumps in  accordance with Section 1.3.4 or multi-stage pumps in accordance with Sections 1.3.12 and 1.3.21. When wells have been sunk,  submersible deep-well pumps in accordance with Sections 1.3.13, 1.3.18 and 1.6.3 are used. The drive is generally an electric  motor al- though diesel or LPG operation are alternatives. Some large in- stallations in very remote locations use crude oil  burning en- gines or natural gas. The required pump performance depends upon the type and size of the installation. Normal  duties lie within the range 10 to 100 m3/h with heads of the order of 50 to 120m.  1.3.5 Horizontal single-stage end-suction overhung impeller centrifugal pumps (for chemical applica- tions includes ISO 2858,  ISO 3069, ISO 3661, ASMEIANSI B73.1 designs) ANSI, the American National Standards Institute, has a philos- ophy more similar  to DIN than ISO in that it specifies materials and mechanical seal options. B73.1 is a standard for single stage centrifugal  pumps, with back pull-out, intended for chemi- cal and corrosive duties. Construction is similar to Section 1.3.21. The  Standard specifies bareshaft pump dimensions, also installation dimensions for complete packages with motor and baseplate. The  Standard does not specify hydraulic duties. Mechanical seal arrangements, with various piping p pumps in more exotic materi-  als such as; Carpenter 20, Hastelloy B &amp; C, duplex stainless steels; as well as non-metallic materials like glass reinforced  polymer. The Standard requires a corrosion allowance of 0.125", 3 mm. Pump sizes vary from 11/2 to 10 suction connections with  flanges to ANSI B16.1, B16.5 or B16.42. Impeller diameters range from 6" to 15". At 3600 rpm, pumps are capable of 1680m3/h at  heads up to 300m. At 3000 rpm the performance falls off slightly to 1400 m3/h at 208 m. ANSI does specify pres- sure ratings  for the pumps; 125LB/150LB flange rating, 12 barg and 20 barg. An option for 250LB/300LB flanges is given. The Standard  specifies a minimum bearing life of 17500 hours at maximum load conditions. On test, with a speed of + 10% of operating speed,  the peak velocity of vibration shall not exceed 0.25 in/s, 6.35 mm/s. End-suction pumps can suffer high axial thrust due to  high suc- tion pressure. Shortened bearing life may result. Manufactur- ers should confirm the bearing life if it is less than  the standard requirement. ISO has prepared a standard recommendation, ISO 2858 for end-suction centrifugal pumps, pressure  rating PN 16 (maxi- mum pressure 1.6 MPa = 16 barg). This is included in British Standard EN 22858 and equivalent to the  German Standard DIN 24256. The Standard specifies the principal dimensions  PUMPING MANUAL International                         7   1 Pump types   Figure 1.8 Typical standard ISO 2858 pumps   and nominal duty point. Figure 1.8 shows typical standard pumps. General note on ASME/ANSI Standards The ANSI B73 Standards  were produced in response to re- quests by users to standardise manufacturers products for the chemical industries. The  end-suction pump Standard was intro- duced in 1974 and the vertical inline in 1975. The standards were based on  recommendations by users but compiled by a committee of mostly manufacturers. There are many American chemical installations  worldwide and manufacturers and users should be aware of these standards. General note on ISO 13709 and API 610 API is the  American Petroleum Institute which is predominantly a trade association of pump users concerned with oil and gas production  and refining. Pump manufacturers are represented on the API committees but are outnumbered by the users. For example, API 610  specifications have a complete section for Vendor's Data; they do not have a section for Purchaser's Data. API is a long  established organisation and has a large catalogue of specifications, publications and recommended practices. Since American  technology is used worldwide in oil and gas related sectors, it is logical to use proven methodology where appropriate. API  610 is a mature specification currently up to the eighth edi- tion published in August 1995. API is unlike the majority of  DIN, and EN pump standards in that it is more a philosophy to achieve results rather than instructions. It is not a  dimensional standard which would allow interchangeability between manu- facturers. It does contain requirements but also many  by agree- ments which are frowned upon by European standards authori- ties because of the lack of control and uniformity.  However API 610 does specify materials of construction. API and ISO have collaborated on a new ISO Standard, ISO 13709. The  first two requirements are a 20 year service life and the ca- pability of three years uninterrupted operation. API does follow  these requirements with a statement that these are design cri- teria. From a European viewpoint both are not verifiable and  are application specific. Bearing this in mind, API 610 pumps are heavier and more robust than most other pump designs, no  pressure or temperature limitations are specified, and are suit- able for the most arduous duties. Drain rim baseplates are  stan- dard and most pumps are centre-line mounted to reduce align- ment problems caused by thermal growth. Allowable forces  and moments on process nozzles are large necessitating sub- stantial baseplates. Pump selection is guided by a requirement  to have BEP between the normal operating point and the rated duty point. API 610 specifies the size of seal cavities and the  distance to the closest obstruction and specifies mechanical seals, single balanced, as a minimum. The space available allows  for com- plex double or tandem seal arrangements. The Standard re- quirement is for mechanical seals and systems to comply  with ISO 21049/API 682. Arrangements for other auxiliary piping, cooling water for seals, bearing housings, jackets and  pedestals, are also shown in API 610. Spacer couplings are standard with a minimum spacer length of 127mm. Bearings, seal(s)  and rotor must be removable without disturbing the driver or the casing. API 610 specifies 11 material columns covering the  following range of casing materials: •  Cast iron  •  Carbon steel   •  12% chrome steel   •  18-8 stainless steel   •  18-10-2 stainless steel   Although cast iron is specified as an acceptable material the lowest specification applied in practice is carbon steel. It is  very unlikely that cast iron casings could support the nozzle load requirements. 1.3.6 Horizontal single'stage end-suction  overhung impeller centrifugal pumps (for heavy-duty applica- tions includes ISO 13709, API 610 designs) These are the most  popular style of process pumps. Basic pump design is similar to EN 733, Section 1.3.4 and ISO 2858, Section 1.3.21, with a  back pull-out feature. In practice, the min- imum material readily available is carbon steel. Some manu- facturers will make  specials in bronze when commercially at- tractive. Standard flanges are inch to ANSI standards, B16.1, B16.5 or B16.42. Both  suction and discharge flanges must be the same pressure rating. Rolling bearings, typically ring oiled, are supported in a  cast housing bolted to the stuffing box or cas- ing. Bearing housings are steel for hazardous liquids. Pumps are available  with flows over 2000 m3/h at differential heads of 300 m. Operating temperatures from -30 to 425 °C are common, down to -180  °C is possible. Popular pumps range from suction branch sizes of 2" to 12". Pressure ratings of smaller pumps are up to 100  barg reducing to 40 barg for the larger sizes. Pressure/temperature rating variations with mate- rials are important, so check  flange specifications. 1.3.7 Horizontal single-stage double-suction axially-split pumps (for general purposes) Thirty-five  years ago the double suction pump was the predomi- nant water pump for applications where the pipe size exceeded 200 mm. The  classic design with a large impeller between two  Figure 1.9 Double suction axially-split pump with sleeve bearings and tilting pad thrust   8                          PUMPING MANUAL International   1 Pump types   172  1211  2   216   N8 54 211   1  3  11  4  126   I0  12  164   tMO PUMP   SHAF5 COUPLING   PART NO 172 164 1BTB 1B?A 128 126 811A M 21   NAME OF PART   PART                             PART NO           NAME OF PART                                                NO   SUPPORT HEAD                                                          12              COUPLING KEY  308 COUPLING NUT                             11       IMPELLER KEY  2Ba FLINGER-THRUST 8RG,                                             t0              SHAFT  267B FLINGER-PLAtN BRG                                                 6  CASING RiNG                                                             287A LOCKNUT                                  4  IMPELLER RING                            216B IMPELLER LOCKNUT                                                  3  IMPELLER                                                                    215A STUFFING BOX BUSHING  1                 CASING                                                                       200 THRUST  COLLAR KEY                                                420            MECHANICAL SEAL-COMPLETE  11~ THRUST COLLAR y different two-stage versions. A two-stage pump with single  en- try second stage was used as a condensate extraction pump for steam turbo-generators. The pump grew to unmanageable  proportions in the 1960s as generators became much larger. The design concept changed and the condensate extraction pump  became a vertical multi-stage pump. A two-stage pump with two double entry impellers has also been available, partic- ularly  in the United States. This style of pump was designed when axial thrust was not fully understood and resulted in a hy-  draulically balanced rotor. Neither of the two-stage designs de- scribed here are popular currently in pump applications.   1.3.8 Horizontal single-stage double-suction radi- ally-split pumps (for heavy-duty applications in- cludes ISO 13709, API 610  designs) This pump, see Figure 1.10, is not as popular as the end-suc- tion pump. It is similar in some respects to Section  1.3.7 pumps but has centre-line mounted radially split casings. Generally with top-top process connections, but side-side and  other vari- ations are available. The double entry impeller mounted be- tween two bearings. Rolling bearings are standard,  sliding bearings and various lube oil systems can be made to order. The mechanical seals can be serviced by removing the cou-  pling and bearing housings. A spacer coupling is required. The rotor assembly is withdrawn from the casing, away from the  driver.  These pumps tend to be slightly larger than the end-suction pumps. Flows over 5000 m3/h are possible at heads up to 500 m.  Suction sizes from 8" to 16" are popular with pressure rat- ings up to 60 barg. Materials and flanges are similar to Section  1.3.6 types.  1.3.9 Horizontal two-stage end-suction overhung impeller centrifugal pumps These pumps are a logical extension to the  single-stage pumps described earlier. The design problem to overcome is shaft de- flection. The weight of both impellers is  cantilevered from the front bearing. Also remember that some space must be left for shaft sealing, further increasing the  overhang. Pumps for be- nign liquids, in days past, could be sealed by a simple soft-packed arrangement. This simple, but very  effective ar- rangement also provided a useful degree of support and damp- ing for the shaft. These effects helped to minimise  vibration. The primary disadvantage to soft-packing is the skill required to pack a box, run the packing-in, and then nurture  the packing  PUMPING MANUAL International                          9   1 Pump types   throughout its useful life with tender loving care. These skills are disappearing and there is no time, now, to bed packing-in  properly followed by almost continuous adjustment. The mod- ern mechanical seal is seen as a gift from heaven for accoun-  tants, but provides no shaft support and no damping. Shaft di- ameters must be increased to limit shaft deflection and to  increase critical speeds. There is a point reached, when shaft diameter increases, that a between-bearing pump is almost cost  comparable  ......  except that it has two mechanical seals, not one!  Figure 1.11 shows a novel approach to the two-stage concept. The first stage is mixed-flow rather than truly radial. This  combi- nation allows the return passage of the diffuser to be slightly smaller than the tip diameter of the second radial  stage. The de- sign produces an effective back pullout assembly which greatly enhances maintainability, leaving the casing in  situ and process connections undisturbed. Both stages have front and back wear rings; these will provide some dynamic  stability as well as reducing internal leakage. This style of pump is aimed at the process industries, particularly paper  making. These pumps, in super-duper 25Cr 5Ni 2Mo, can handle 1080 m3/h and produce differential heads of 220 m. The casings  are designed to cope with 25 barg and 180°C. The two-stage overhung pump is vigorously disliked by API and many in the Oil &amp;  Gas industry. This is probably due to past fail- ures and unreliability. The Oil &amp; Gas industry was renowned though for  getting duty conditions wrong in the past, and this pump design may have attracted an unwarranted reputation. This style of  design will be susceptible to vibration, rubbing and seizure when operated well away from BEP, if gas slugs pass through and  if started without being primed properly. All of these happen regularly in the Oil &amp; Gas environment. These pumps would tend  to fair much better when not used for water and se- lected for a minimum viscosity 4 cSt. The wear rings would perform as much  better bearings. Future developments will probably centre on enhanced bearing materials for the wear rings; the first stage  wear rings at least.  Figure 1.11 A horizontal two-stage end-suction pump Courtesy of Sulzer Pumps   Figure 1.12 Wear rings for better bearing performance   Improved bearing performance will allow larger pumps to run successfully. Figure 1.12 shows a style of wear ring which may  become common. Alternatively, a ceramic rolling-contact bear- ing may be a more reliable option for very clean liquid  applications.  1.3.10 Vertical single-stage overhung impeller cen- trifugal pumps for general applications   Vertical single-stage pumps, pumps which have a suction con- nection and are not submerged, fall into two basic design types.  Some pumps use standard electric motors and have flexible couplings. These pumps have radial and thrust bearings in the pump.  The other pump design requires a special electric motor; an electric motor with a thrust bearing. The pump includes a ra- dial  bearing but relies on the electric motor for axial setting. Also available, is an almost off-the-shelf horizontal end-suction  pump which is mounted vertically. A short, bent pipe section is attached to the usual suction connection to obtain the  'inline' configuration. Vertical single-stage pumps in this category are similar to central heating circulators  ......  but  !the pump must be supported! The pump does not hang in the pipework; they are too heavy for that.  Pumps with a bearing bracket follow the design rules of hori- zontal end-suction pumps and use a number of the same parts. A  motor stool is used to support the flanged motor from the pump. These pumps can save floor space but the piping ar- rangement  must be appropriate. Small pumps can handle 400 m3/h while the largest pump can pass 3500 m3/h. Differential head can be from  230 m to 900 m. Some pumps can cope with quite cold liquid, down to 185°C, and up to about 400°C. Pres- sure ratings can be  light, 24 barg, to heavy-duty, 100 barg. These pumps can utilise the flexible coupling of purchaser's choice. Awide range of  material combinations is possible to suit most applications. Mechanical seal chambers may comply with ISO 21049/API 682  requirements. There are mag-drive ver- sions available when leaks are intolerable.  The pumps without a bearing bracket, like their horizontal equivalents, produce a very small, neat package. Thrust bear- ings  in the motor absorb the pump axial thrust and locate the impeller in the casing. Motor bearings will usually be grease-lu-  bricated and can be regreased while running. The motor can have a special extended shaft for mounting the impeller directly,  or be connected via a solid muff coupling. The coupling can in- corporate the pump axial setting adjustment. Space for a me-  chanical seal is likely to be restricted; double seals with "bells and whistles" might not be possible. Benign liquids, with  just traces of hazardous/toxic compounds, might be out-of-bounds. However, it is possible to squeeze a lot out of these little  pack- ages; variable speed motors are becoming more popular. Matching the pump to the process conditions, to save energy, is  worthwhile economically. Speeds up to 8000 rpm are possible.  Small pumps are limited to 25 m3/h at differential heads up to 600 m. Larger pumps can handle 500 m3/h with slightly less head  rise, 275 m. Casing design pressures of 40 bar(g) are typ- ical and designs cope from -40 to 400°C.  One of the most prevalent problems associated with these pumps, is poor piping layout. It is not unusual to see these pumps in  a dogleg from a long, straight, pipe run. The straight length of pipe on the suction connection is usually too short; 5D is  the rule-of-thumb for a minimum. Increased turbulence in the impeller produces vibration leading to wear and short bearing  life. In a number of cases, the vertical pump was the wrong style for the equipment layout; an end-suction pump would have  better!  10                         PUMPING MANUAL International   1 Pump types   1.3.11 Vertical single-stage overhung impeller cen- trifugal pumps (for chemical applications includes ASME/ANSI B73.2  designs) There is some confusion regarding the style of inline pumps. Inline construction requires the suction and discharge  connec- tions to be concentric; that is the longitudinal centre-line of the suction pipework is also the longitudinal  centre-line of the dis- charge pipework. Imagine a straight length of pipe; if a section of pipe is removed an inline pump can  replace the pipe section. Some standards, like BS 4082 U style, have both pump con- nections on one side of the pump; this  cannot be an inline pump. The pump flanges may be specified as identical sizes and rating. There may be disadvantages to using  the same schedule pipework on the suction as the discharge. The basic philosophy of vertical inline pumps is identical to  pumps in Section 1.3.1. The pump is mounted in the pipework and is not bolted down to foundations. ANSI B73.2 pumps are larger  than these, all pumps must be mounted with the motor vertically above the pump and the pump can be optionally sup- ported by a  stool. The weight of the pump package is supported by the stool but the pump is free to move to accommodate pipe movement. The  Standard is dimensional, to allow inter- changeability between manufacturers, but does not specify hy- draulic performance.  Pump sizes with suction/discharge from 2"/11½,, to 6"/4" are covered; length across flange faces is from 15" to 30".  Three pump designs are included within a common envelope. A close coupled design, VM, using a NEMA JM or JP flange mounted  motor, with motor shaft and mounting dimensions and tolerances to NEMA MG 1-18.614. Obviously the motor must be moved to  inspect the seal or remove the rotating assembly. The second design, VC, is a short pump shaft rigidly coupled and spaced to a  NEMA P-base flange mounted motor. Motor flanges, dimensions and tolerances are to NEMA MG 1-18.620. Removal of the pump  rotating assembly or seal does not need the motor to be moved.  The third design option, VB, is for pumps with bearing housings driven through flexible spacer couplings, see Figure 1.5.  These motors shall be NEMA C-face to NEMA MG 1-11.35 with solid shafts. Again removal of the pump rotating assembly or seal  does not need the motor to be moved. Designs VC and VM have specified bearing L10 lives of 26000 hours at rated duty or 17500  hours at maximum load. Pumps to VB shall have bear- ings suitable for 17500 hours at maximum load. On test, run- ning at  100/105% speed and + 5% rated flow, the unfiltered vi- bration on the top pump or motor bearing housing shall not exceed 0.25  in/sec or 0.0025 in peak-to-peak displacement.  The Standard specifies pressure ratings of 125 LB for cast iron pumps and 150 LB for steel and stainless steel; 12 and 20  barg. An option is given for 250 LB and 300 LB flanges. Pres- sure/temperature ratings are in accordance with ANSi B16.1 and  B16.5. Material requirements are similar to Section 1.3.5 types with a 0.125" corrosion allowance. Allowable nozzle loads must  be specified by the manufacturer for the material of- fered at the specified operating temperature.  The Standard specifies a seal cavity which must be capable of accepting double seals with a pumping ring for forced circula-  tion of buffer liquid. A packed stuffing box is optional.  At 60Hz pumps are capable of 320 m3/h at heads of 120 m; 50Hz performance is reduced to 265 m3/h at heads of 83 m. The  Standard specifies the maximum pump absorbed power to be 172.5 hp, 128 kW.  Some manufacturers build a heavier version of the vertical inline pump to the VC design which complies with the require- ments  of API 610. Removal of the coupling allows seal inspec- tion and replacement without disturbing the motor. In some de-  signs the rotating assembly cannot be removed without detach- ing the motor stool. Capacities up to 1150 m3/h at heads up to  230 m are possible at 60 Hz. Suction/discharge sizes go up to 14"/8" and pressure ratings of 100 barg are available on some  sizes. Vertical inline pumps are really end-suction pumps with an ex- tension on the suction nozzle. High suction pressure  creates axial thrust which will reduce bearing life. The manufacturer should be asked to confirm the bearing life if any doubt  exists about the magnitude of the suction pressure. 1.3.12 Vertical multi-stage centrifugal pumps for general applications  (including segmental pumps, dH &lt; 300 m, deep well ejector applications, wash water) The differential head produced by a  centrifugal pump is de- pendant upon the impeller diameter and the speed. In very sim- ple theory, it would be possible to  increase the diameter or the speed to produce any desired head. In practice life is more complicated. If a pump for a small  flow and high differential was designed with a single impeller running at a 2-pole motor speed, a large diameter and narrow  tip width would result. At some stage in the range progression the impeller would be- come impossible to cast or machine. Also  the pump would be large in diameter requiring too much material. Friction losses between the sides of the impeller and pump  casing increase proportionally to the fifth power of the impeller diameter result- ing in low efficiency. The pump speed  cannot be increased in- definitely because impellers can disintegrate under the influ- ence of centrifugal forces which  increase with the square of the speed. The solution to the problem is to divide the total differen- tial head across several  impellers working in series. The impel- lers, usually identical, each do a proportion of the work. The segmental pump, or ring  section pump, is a popular mass- produced design to fulfil these requirements. Very small vertical segmental pumps are  produced for low flow high head applications. These pumps are similar, in some ways, to the vertical inline pumps shown in  Figure 1.13. A base, with inline suction and discharge connections and a mounting foot, is used to support the stack of  segments and the electric motor. Each segment consist of a diffuser, an impeller and a spacer. The diffuser forms the outer  pressure casing and col- lects the flow from the tip of one impeller and redirects it into the eye of the next impeller. The  spacer is used to separate the im- pellers. On small pumps the seal between diffusers is metal-to-metal; good surface finish  and accurate machining being essential. Larger pumps use O rings. The bearings and ~.     ) [ 1 Wear ring 2 Wear ring 3  Impeller 4 Balancing hole for returning the leakage past the upper sealing                      clearance 1  3  4   2 Figure 1.13 Vertical inline pump with support feet, bearing bracket and ex- tended motor stool for spacer coupling.   PUMPING MANUAL International                          11   1 Pump types   ///  ........................     ............................  ,\   Figure 1.14 Two typical larger vertical segmental pumps Courtesy of Sterling SIHI GmbH   seals are housed in the base and a motor mounting stool at the top. The complete pump assembly being held together by long  tie-rods around the outside of the diffusers. Very small units of this style are limited to 5 to 10 kW. Pumps in cast iron and  bronze with pr
