T -= Figure 1.17 Single-stage vertical wet-pit pump   1.3.13 Vertical wet-pit pumps This pump type comprises all those pumps designed to be sus- pended into the liquid with the  drive motor on top. Figure 1.17 shows a typical single-stage design where the pump discharge is piped separately through the  mounting plate. The pump seal is mounted in the pump casing below liquid level. The thrust bearing is included in the mounting  plate assembly. The style of construction shown in Figure 1.17 is limited to fairly low power pumps. The column surrounding  the shaft is rela- tively small in diameter and the discharge pipe helps to in- crease rigidity of the assembly. As the shaft  length increases in- termediate bearings must be added to reduce shaft deflection and vibration. Special rubber bearings are  available which can operate with water as the sole lubricant. Larger pumps-- centrifugal, mixed-flow and axial propeller, are  constructed with a column which encloses the shaft and also acts as the discharge pipe. See Figure 1.18. The column diam- eter  is increased to accommodate a reasonable liquid velocity. The column is extended through the mounting plate to allow a branch  to be fitted for the discharge connection. A seal, rated for discharge pressure, must be fitted above the discharge con-  nection. Again, intermediate bearings must be fitted as the col- umn length extends. Pumps are available for flows in excess  of 6000 m3/h at heads up to 150m. Vertical pumps, especially in the larger sizes, can be prone to vibration problems. The  problems are caused by pump or mo- tor shaft unbalance occurring at a frequency which coincides with a natural frequency of  the column. Because of this it is es- sential that large pumps are tested in the manufacturer's works under conditions which  duplicate, as closely as possible, the  Figure 1.18 Single-stage vertical wet-pit pumps in centrifugal, mixed-flow and axial propeller designs   .\,, .\ \   '1 ,l )             "   Figure 1.19 Vertical dry-pit pumps   site operating conditions. Extensive testing and modification is much easier in the works than on site.   A variation of the vertical wet-pit pump is the vertical canned pump. A vertical wet-pit pump is built inside a can or  pressure vessel which is also suspended from the mounting plate. The can has a flanged pipe connection, pump suction, which  may be attached above or below the mounting plate. This type of de- sign is used for volatile liquids with low NPSHa. The  liquid is taken from the suction line elevation down the can to the first stage impeller eye. The NPSHa is increased by the  difference in levels between the suction line and the impeller eye. This variation is used extensively for liquified gas  applications.  1.3.14 Vertical dry-pit pumps Vertical dry-pit pumps are quite similar to wet-pit pumps but the pump casing in not immersed in  the liquid. The liquid is carried from the pit to the pump suction by concrete ducts or metal pipework. Figure 1.19 shows two  examples of dry-pit pump in- stallations.  The left hand installation shows a pump with metal suction pipe and a separate discharge pipe. The right hand installation  shows a concrete suction duct and the discharge within the col- umn. Pump sizes are similar to wet-pit pumps.  1.3.15 Marine pumps Marine pumps are included as important components in, not only ships and oil rigs, but also underwater  equipment. Pumps for ships can be classified as follows:  Systems for propulsion, e.g. pumping fuel, lubricating oil, cooling water, feed water and condensate   •  Systems dependent on the cargo   Safety systems, e.g. for bilge pumping, ballast pumping, for fire fighting   Domestic housekeeping type systems for making and pumping drinking water, hot and cold fresh water, sewage etc   The types of pumps used for fuel is dependant upon the type of fuel. Many ships use heavy fuel which is about 3500 Redwood No  1. Rotodynamic pumps would be inappropriate. Double act- ing piston pumps act as transfer and low pressure feed pumps. Plunger  pumps, usually built by the engine manufacturer, inject the fuel into the cylinder. Special lubricators, driven by eccen-  trics or geared to an engine shaft, inject lubricating oil into the cylinders. Screw or gear pumps provide pressurised  lubricating oil. Fresh water for engine cooling, and seawaterfor cooling are provided by centrifugal pumps. Packages are  available using double ended motors which supply fresh and seawater simulta- neously from two pumps on a common baseplate.  Vertical units have been built with fresh and seawater pumps driven by a nor- mal motor. Steam turbine ships use multi-stage  centrifugal pumps for boiler feed and condensate extraction duties. Again, the type of cargo pump is dependant upon the cargo.  Crude is a common load but is extremely variable, with low to  PUMPING MANUAL International                          13   1 Pump types   very high viscosity. Steam driven, direct acting, vertical piston pumps are available which can operate on petrol through to  the most viscous crude oil. Electrically driven piston pumps are also available but are not so versatile as the steam  versions. Liquified petroleum gas and anhydrous ammonia have become popular as a sea cargo. Special centrifugal pumps are  available for loading and unloading.  Safety systems for marine applications are usually designed around seawater because it is readily available. Bilge pumps  largely cater for seawater. Some modern pumps have monitor- ing systems fitted which shut down the bilge pumps if the oil  content is higher than 15 parts per million (ppm). The amount of liquid able to be pumped from the bilges is dependant upon  the age of the ship. Modern ships tend to have mechanical seals on the stern tube so that very little leakage enters via that  route. Soft packed stern tubes require some leakage for lubrication. In some vessels the level in the bilges must be watched  very closely as it has a great effect on stability. Depending on the age of the ship the bilges may be pumped every two hours,  at the end of each watch or automatically by float controls. The pumps may be reciprocating or centrifugal or ejectors powered  by sea- water. Reciprocating and centrifugal pumps would have a prim- ing system to evacuate the suction line. Ballast and  fire fighting pumps operate on seawater and would be centrifugal pumps.  Turbine and engine driven vessels can make fresh water from seawater by evaporation or reverse osmosis. Evaporation is a low  pressure process requiring single-stage centrifugal pumps. Reverse osmosis for seawater operates at 70 barg and re- quires a  reciprocal pump or a multi-stage segmental pump. Other domestic water circuits would have single-stage centrifu- gal pumps  similar to those used onshore.  Ships at sea should be able to function safely and entirely inde- pendently, therefore special safety and reliability  requirements are necessary. These are determined by marine insurance companies (classification societies) and each country's  re- spective maritime authority. In certain cases additional require- ments are imposed by, for example, port and canal  authorities. Various types of pumps are used for the pumping systems men- tioned earlier in the same manner as those land  based systems.  Rotodynamic pumps on board are often of the vertical type in order to reduce space. The mechanical design is adapted, gen-  erally reinforced, to take account of the ship's movement at sea and automatic, separate or built-in air ejection systems are  present to avoid operational problems in the case of long suc- tion lines or if the suction intake is momentarily above the  sur- face of the liquid. As a general rule, bronze or gunmetal is used when pumping seawater and the same material as in the  case of land based systems is chosen for other liquids.  Figure 1.20 shows a typical vertical pump for general use on board ship. This is a double suction pump with the pump casing  divided axially (in a vertical plane)in order to facilitate servicing. Single suction impellers with axially or radially split  casings are used for smaller flows. In the case of a radially split casing, the pump's rotor should be able to be disassembled  in a simple manner, like for example, Figure 1.5. Chapter 16, Section 16.3 shows the installation of cargo oil pumps as a  practical example.  For marine use, there are many interesting pump applications, such as the steering/propulsion jet operation of non-anchored  oil rigs with automatic positioning. A pump system as shown in Figure 1.21 and comprising axial pumps designed to operate with  any flow direction, is used to limit heeling when loading for example; or for the intentional generation of heel angle in the  case of icebreakers.  Small pleasure craft, cruisers and yachts, use flexible vane pumps for many applications. Hand-operated diaphragm   _   ..................  ~ ~i~ := ~,,        F,  .......  ' :~-  ~'-~t~U'-   Figure 1.20 Vertical ship's pump with soluble suction impeller   . J L  ........  JJ  ....   S _   Figure 1.21 Heeling pump for ships   pumps have been used for bilge pumps. EN 28849, ISO 8849, specify the requirements for DC electric bilge pumps.   Self-priming pumps   The majority of pumps must be vented and primed prior to start-up. With pumps that have flooded suctions, this usually in-  volves opening small valves on top of the discharge pipework, so that all the air trapped in the suction pipework and in the  pump will be forced out and replaced by liquid. Some designs require vent valves on the casing to fill the pump completely.  When the pump suction is not flooded the vent valve in the dis- charge pipework is coupled to an air ejector. The air is with-  drawn by a partial vacuum and the liquid fills the void. Submers- ible pumps do not suffer these inconveniences as the pump is  always full of liquid.  Self-priming pumps are designed to overcome these problems. The casing of a self-priming pump is constructed to retain enough  liquid so that the impeller is always flooded. The casing needs priming only once provided the liquid does not evaporate or  leak away through poor seals. The pump casing is shaped so that any gas or air bubbles become completely surrounded by liquid  and are pumped from the suction to the discharge. Since there is only a limited amount of liquid during evacuation the gas and  liquid must be separated, whereupon the liquid is re- turned to the suction side to recirculate. The internal design and  14                         PUMPING MANUAL International   1 Pump types   shape of the pump casing to achieve this effect varies consider- ably depending on the manufacturer. When selecting a pump it  is important to take into account the wearing effect which for ex- ample sand, may have upon the pump's evacuating abilities.  When electric power is not available, on building sites for exam- ple, other sources of power must be used, such as engines,  compressed air from mobile compressors or hydraulically from a separate power pack or one which is built into a vehicle. This  type of pump is also suitable for intermittent use in construction work such as road making, rock blasting and excavating or  as a fire precaution when carrying out stubble burning or site clear- ing. Priming of engine-driven units can be assisted by  using the en- gine inlet manifold vacuum or a separate engine-driven exhauster.  1.3.16 Submersible pumps with electric motor Submersible pumps placed in ponds, ditches and sumps are used to drain, mostly  water from locations which are deeper than the sewage system. Three types are available: •  Simple, small, self contained for  clean water •  Heavy duty for contaminated water •  Special purpose forsludge Small submersible pumps tend to be made of  plastic where ever possible. This style of construction removes many of the insulation problems associated with electrical  equipment. The pumps are close-coupled and completely self-contained. The motor is totally enclosed and cooled by the water  surrounding the pump. Level switches, either internally or mounted exter- nally on the casing, detect the water level and  switch the pump on and off. Low voltage versions, 110V and 240V, single phase as well as 380V three phase are available. EN  60335-1 and EN60335-2 should be consulted for relevant electrical safety requirements. The smallest units will pump 10m3/h  against a head of 7m. Pipe connections are usually screwed and a non-return valve is required on the smallest units. Heavy  duty electrically driven submersible pumps are close coupled pumps and comprise, together with external level con- trols, a  complete unit. Their weight is the lowest possible due to the use of light metal alloys although their resistance to corro-  sion is low. The parts which are exposed to wear from the liquid are, on the other hand, of high quality. Typical features are  a hard metal impeller, rubberised wear parts around the impeller  Figure 1.22 Cross-sectional arrangement of a heavy duty submersible pump   d   .j   .......  ,q _               = -        ,. . _2   _       q   Figure 1.23 Installation of submersible pump in sump   and hard-faced seals. A non-return valve is built into the discharge connection. The electric motor is completely encapsulated  and cooled by the pumped liquid through a double jacket. In order to protect the motor in the case of blockage or operation  without liquid, the motor is provided with a specially built-in motor protection unit. Normally the motor windings have  thermistors which stop the motor when the temperature is too high by means of an inbuilt contactor. The shaft seal is nearly  always of a double type with an intermediate oil chamber, see Figure 1.22. Normally con- struction pumps have suction  strainers which limit the particle size to 5-10 mm, but there are special models with a through flow of up to approximately  100 mm for pumping larger solids. Figure 1.23 shows a heavy duty pump located in a sump with external level switches. Heavy  duty pumps can handle up to 7000 m3/h at heads up to 100 m. Heavy duty submersible pumps are used for draining all types of  building sites from the smallest ditch or hole to the large pro- jects such as tunnelling in mountains or harbour building.  This type of pump is practical in the event of flooding and for all other temporary pumping requirements. Of particular  convenience is the fact that pump companies in this field offer both small and large pumps for hire for periods ranging from  one day to several months. A special adaptation of the heavy duty submersible pump has been developed for sludge and heavy  muds. The impeller and casing are made from hard wear resistant iron alloys, not rub- ber coated, with an agitator mounted on  the shaft end where an inducer would be fitted. The pump is intended for use on liquid solid mixtures with very high solids  content where the pump can sit, initially, on the surface. The agitator beats the mixture and induces moisture to travel  towards the impeller. The extra mois- ture locally helps the mixture to flow and the agitator action al- lows the pump to  settle in the mixture. The novel design of the agitator allows these pumps to handle liquid solid mixtures which would  otherwise be moved by shovels. 1.3.1 7 Non-electric submersible pumps Electric submersible pumps are potentially very  dangerous. Many small submersible pumps are used with water. Water and electricity is of course a dangerous combination. The  motor manufacturer takes extreme precautions to prevent the water and electricity mixing. Large submersible pumps are used for  handling hazardous liquids, such as crude oil. It is flammable but is not a pure liquid. Crude oil is a mixture of liquids,  and pos- sibly gases such as carbon dioxide and hydrogen sulphide. Hy- drogen sulphide is potentially poisonous as well as  flammable. Removing electricity from the pump installation therefore removes a very serious hazard!  PUMPING MANUAL International                          15   1 Pump types   Figure 1.24 Compressed-air driven submersible pump   Sometimes electric power is not available, on building sites for example; and so other sources of power must be used, such as  engines, compressed air from mobile compressors or hydrauli- cally from a separate power pack, or one which is built into a  ve- hicle. This type of pump is also suitable for intermittent use in construction work such as road making, rock blasting and  exca- vating or as a fire precaution when carrying out stubble burning or site clearing. Compressed air-driven rotodynamic  submersible pumps are of similar construction to those which are electrically driven. They are equipped both with or without  special heavy-duty compo- nents for pumping large solids. The high speed compressed air motor, lubricated by oil mist, can  compete on performance with electrically driven units, see Figure 1.24. Also remember, the air-operated double-diaphragm pump  can be treated as a sub- mersible pump. The air exhaust should be piped to above the maximum liquid level to prevent  'flooding' and potential corrosion of the air valve.  Jet pumps can be submerged, these pumps can handle large solids providing large quantities of liquid are moved, and large  quantities of driving fluid are provided.  1.3.18 Submersible pumps for deep well applica- tions   Submersible deep well pumps in smaller sizes have the same range of applications as deep well pumps with ejectors. The dif-  ference here being that the pump is placed directly in the bore- hole connected by means of a delivery hose and electric  cable.  Pump section   Largest outside diameter less than 100 mm   Water intake " :':::=:;'=':::::  with strainer Electric motor   Figure 1.25 Small submersible deep well pump   Delivery connection  i   ~iI;; :-fllll i.o. |t,+-,~   =   f   i o   ,% Figure 1.26 Deep well pumps placed in wells - illustrations 1 and 2, and placed in pipe section for pressure boosting -  illustrations 3 and 4 Since the smallest borehole diameter is 4", the diameter of the pump must be somewhat less, see Figure  1.25. Impellers are between centrifugal and mixed-flow designs with as many as 100 stages. The pump is a multi-stage  centrifugal pump driven by a special type of long thin electric motor located beneath the pump and cooled by the water in the  borehole. For small pumps, suitable for domestic applications, the pump length L varies according to the depth of the borehole  between 500 and 2500 mm. Submersible deep well pumps of larger sizes have outside di- ameters of up to approximately 500 mm  and lengths of up to 5 metres. Their hydraulic data varies considerably, the maximum values being: flow 5000 m3/h and  differential head 1000 m. Mo- tor outputs of several megawatts are available when using high voltage motors. These pumps are  used for municipal drinking water supply, re- duction of ground water levels and mine drainage. Deep well pumps find favour in  oil field applications, on and offshore. Units are used for secondary oil recovery prior to water injection. Typ- ical  applications are to be found in restricted wells or shafts, Fig- ure 1.26. They can also be used for pressure boosting in  drink- ing water supply networks, where the pump may be integrated in a section of pipe. The electric motors are always  squirrel-cage liquid-filled induc- tion motors, which naturally makes very great demands upon the motor's electrical  insulation. The liquid filling is either clean water, water-oil emulsion or oil depending on the requirements of each specific  case. The liquid filling is separated from the pumped liquid by a mechanical seal and a diaphragm to com- pensate for  variations in volume, due to temperature changes. The pump and motor rotors run in liquid-lubricated plain bear- ings. The  axial thrust bearing is the most heavily loaded, which is why some manufacturers employ opposed impeller construc- tion to  reduce unbalanced axial forces. Special models are available for sand contaminated or corrosive water. 1.3.19 Portable  self-priming pumps Most pumps must be vented and primed prior to start-up. For pumps which have flooded suctions this usually  involves open- ing small valves on top of the discharge pipework, so that all the air trapped in the suction pipework and in  the pump will be forced out and replaced by liquid. Some pump designs require vent valves on the casing to fill the pump  completely. When the pump suction is not flooded the vent valve in the discharge  16                         PUMPING MANUAL International   1 Pump types   Figure 1.27 Engine driven self-priming pump Courtesy of Hale Products Europe   pipework is coupled to an air ejector. The air is withdrawn by a partial vacuum and the liquid fills the void.   Self-priming pumps are also designed to overcome these prob- lems. The casing of a self-priming pump is constructed to retain  sufficient liquid so that the impeller is always flooded. The cas- ing needs priming only once provided the liquid does not  evapo- rate or leak away through poor seals. The pump casing is shaped so that any gas or air bubbles become completely sur-  rounded by liquid and are pumped from the suction to the dis- charge. Since there is only a limited amount of liquid in the  pump casing during evacuation, the gas and liquid must be separated, whereupon the liquid is returned to the suction side to  recirculate. The internal design and shape of the pump cas- ing to achieve this effect varies considerably depending on the  manufacturer. When choosing a pump it is important to take into account the wearing effect which sand, for example, may have  upon the pump's evacuating capabilities. When consider- ing the suction system design, the volume of gas in the suction piping  should be minimised.  Engine-driven self-priming pumps are usually single-stage centrifugal pumps as shown in Figure 1.27. In order to be  self-priming the pump must be filled with liquid prior to starting. The evacuation times quoted usually refer to the time  taken to obtain the full pressure at the pump discharge for a specific suc- tion lift, using a hose having the same diameter  as the pump's suction connection and whose length exceeds the suction lift by 2 metres. The pump performance can be adapted to  actual re- quirements by varying the engine speed. Figure 1.28 shows a typical small portable self-priming pump.  Engine-driven pumps can handle solid particles of up to 10 to 15 mm. The suction hose is reinforced because of the vacuum  caused by pumping. The normal suction strainer can usually be replaced with a much shallower design in order to facilitate  pumping down to within a few millimetres off a floor. The pump should be equipped with a protective safety frame and runners,  skids or a wheeled trailer to enable it to stand on soft ground. Priming of engine driven units can be assisted by using the  en- gine inlet manifold vacuum or a separate air pump.  Engine-driven single cylinder reciprocating pumps are also used as self-priming pumps especially for construction sites and  road work. Engine-driven pumps are available with suction sizes up to 150 mm which can handle flows of 400 m3/h at heads up to  30m. Engines sizes up to 30 kW are not unusual. Single cylinder mechanical diaphragm pumps are also avail- able, see Figure  1.100. If compressed air is available, then the air-operated double-diaphragm pump can be considered. These pumps will not  handle such large solids but are useful for 'clean' applications. Care should be taken to supervise these  Figure 1.28 A typical small portable self-priming pump Courtesy of Varisco Srl   pumps. If the liquid supply 'dries-up' the pump will race and con- sume a large quantity of air while doing zero work.  Engine-driven units can be very noisy. Current designs pay special attention to noise reduction, levels of below 80 dBA at 1 m  are desirable. To achieve this level of noise it is usually nec- essary to fit silencers to both the inlet and exhaust sides.  The engines are normally splash-lubricated which means that the pump must be placed on a relatively flat surface the  inclination may seldom exceed 20°. Engine-driven compressors can also be extremely noisy.  1.3.20 Horizontal two-stage axially-split centrifugal pumps (includes ISO 13709, API 610 designs) These pumps are similar in  many respects to the double-suc- tion and multi-stage pumps described later. The use of two-stages provides extra differential  head. The advantage of the split casing is usually found in maintenance. Suction and discharge connections can be located in  the bottom half, the top half being easily removed without disturbing piping. Pro- cess connections can be located in the top  half with the obvious extra maintenance work. A radially-split design would remove this complication; see later. A  radially-split design is recom- mended by ISO 13709 and API 610 for 'hazardous liquid' applications.  Impellers are usually mounted back-to-back. Two-stage pumps of this design are usually larger than the end-suction two-stage  pumps and require the impellers to be placed between bear- ings. Impellers usually have a front wear ring. A common back wear  ring, a centre bush, reduces leakage between the stages. The centre bush also acts as a bearing and provides some shaft  stiffness. Engineering plastics can really improve the bearing effectiveness. A double-suction first stage can be used when  NPSHa is low but this increases the cost significantly. The increased cost should be less than that of providing a separate  booster pump and driver plus associated electrics and controls. A reorganisation of the plant layout may improve NPSHa and  obviate a double-suction. Casings may be diffuser or volute. Diffuser pumps can be more efficient if the duty point is  calculated accurately. Depending upon the size of the pump, bearings may be rolling contact or sliding. Back-to-back angular  contact ball bearings have become popular as a combined radial and thrust bearing. A very compact bearing housing is possible.  Oil-ring lubrication is simple and effective. Larger pumps, with sliding bearings, usually have a tilting pad thrust bearing  and a lube oil system. Some users prefer oil mist for rolling contact bearings and build a central supply system.  PUMPING MANUAL International                          17   1 Pump types   Shaft sealing is accomplished by a wide range of mechanical seals, although soft packing may be possible. Cast iron casings  probably have restricted sealing space as cast iron is not rec- ommended for handling many hazardous liquids. Connecting small  bore vent and drain piping is only possible via threaded holes in many casings. These two-stage pumps are manufactured in a  wide range of materials, see Table 1.1. Pumps in super stainless steels may be available to order.  Casing                              Impeller Cast iron                              Cast iron Cast iron  Bronze Carbon steel                            Cast iron Carbon steel                          Carbon steel Carbon steel  11-13% Cr Carbon steel                         Stainless steel Stainless steel  Stainless steel  Table 1.1 Two-stage axially-split pumps -- materials of manufacture Two-stage pumps can usually handle flows up to about 2000  m3/h and differential heads of up to 600 m. 1.3.21 Horizontal two-stage radially-split centrifu- gal pumps (includes ISO  13709, API 610 designs) These pumps are similar in many respects to the double-suc- tion pumps described in Section 1.3.8 and  multi-stage pumps described later in Section 1.3.25. A radially-split design is rec- ommended by ISO 13709 and API 610 for  'hazardous liquid' applications. The use of two-stages provides extra differential head. The advantage of the radially-split  casing is found in ap- plication and maintenance. These pumps can be centreline-mounted to remove thermal growth problems  expe- rienced in high temperature applications. The use of circular gaskets, for the main pressure containment closure(s),  removes problems associated with large flat gas- kets and bolting. Elastomer 'O'-rings can be used when temper- atures permit.  Hybrid fibre and metal gaskets can be used for higher temperatures. Metal 'O'-rings can be used for the most arduous  applications. Suction and discharge connections can be placed at any orientation, virtually, to suit the plant layout. Some  connection layouts are more popular than others; top-top is the manufacturers default arrangement; this is the shortest  delivery time because there are no pattern modifications. If the plant layout is considered, practically, for piping venting  and  priming, then good arrangements can be accommodated in the appropriate time scale. Maintenance of the pump does not re- quire  the casing connections to be broken. Two-stage pumps of this design are usually larger than the end-suction two-stage pumps  and require the impellers to be placed between bearings. Impellers are usually mounted back-to-back to minimise axial thrust  and have front and back wear rings. A double-suction first stage can be used when NPSHa is low but this increases the cost  significantly. The in- creased cost should be less than that of providing a separate booster pump and driver plus associated  electrics and controls. A reorganisation of the plant layout may improve NPSHa and obviate a double-suction. Suction pipe  venting should be checked. Casings may be diffuser or volute;larger pumps may have double volutes. Diffuser pumps can be more  efficient if the duty point is calculated accurately. Depending upon the size of the pump, bearings may be rolling contact or  sliding. Back-to-back angular contact ball bearings have become popular as a combined radial and thrust bearing. A very  compact bearing housing is possible. Oil-ring lubrication is simple and effective. Larger pumps, with sliding bearings,  usually have a tilting pad thrust bearing and a lube oil system. Some users prefer oil mist for rolling contact bearings and  build a central supply system. Shaft sealing is accomplished by a wide range of mechanical seals, usually to EN ISO 21049/API  682. These two-stage pumps are manufactured in a wide range of materials. Lowest cost is carbon steel with cast iron  stationary internal parts and cast iron wear rings. Materials progress through all carbon steel, 11-13Cr, austenitic stainless  steel and super stainless steels. Some manufacturers produce pumps in 19Cr 13Ni 3Mo low carbon as standard. Pumps can be built  with any range of compatible materials, to order, if sufficient time is allowed in the contract timetable.  Two-stage pumps can usually handle flows up to about 2000 m3/h and differential heads of up to 800 m with pressure ratings of  100 bar(g). Operating temperatures up to 425°C are typical.  1.3.22 Multi-stage segmental centrifugal pumps dH &gt; 300 rn   These pumps are a larger version of those in Section 1.3.12; horizontal pumps only with flows up to 3000 m3/h at heads up to  4500 m are available requiring drivers up to 10 MW. Special de- signs for boiler feed pumps allow operation over 200 °C at 500  barg. Larger pumps are available in a wider range of materials; cast iron, steel, bronze, 18-10-2 austenitic stainless steel  ii~!i~iii!!ii!!!    i :~:i !i i~i~ii;i~   Figure 1.29 Large 4-stage segmental pump with balance drum, sleeve bearings and tilting pad thrust bearing   18                         PUMPING MANUAL International   1 Pump types   ~:=i_  ......... :::~ ii iii                                                     I   Figure 1.30 A high pressure segmental pump with balance disc and roller bearings Courtesy of KSB A G   and construction being determined by the specific functions and components. •  Diffuser type •  First stage impeller •  Thrust  balancing •  Bearing types The theory of rotodynamic pumps shows that the kinetic energy of the liquid produced in the  impeller must be converted to pres- sure energy by efficiently reducing the velocity of the liquid. Two methods are used;  vaned diffusers and vaneless diffusers called volutes. The two main groupings of axially-split pumps are diffuser pumps,  meaning vaned diffusers, and volute pumps. Modern trends are leaning towards volute pumps as these are cheaper, in theory, to  produce.  Figure 1.31 A typical installation of a hot high pressure segmental pump Courtesy of KSB A G   _        _  ~._     ~   Figure 1.32 A double-suction arrangement for a high pressure segmental pump Courtesy of KSB A G   duplex stainless steel. Some manufacturers have opted for fab- ricated suction and discharge heads, using thick boiler plate  machined to the required profiles. Interstage connections are possible. Hydraulic axial thrust reduction can be implemented by  disc, drum or double-drum (a balance drum with two diame- ters). Pumps can be fitted with rolling contact or sliding bear-  ings. Tilting pad thrust bearings are available. The previous comments regarding hazards liquids still apply. Higher head  segmental pumps are popular as boiler feed pumps and sea- water pumps for desalination and reverse osmosis. Also useful in  mining, irrigation and gas scrubbing processes. Figure 1.29 shows a large 4-stage segmental pump. Examples of high pressure  pumps are shown in Figures 1.30, 1.31 and 1.32.  1.3.23 Horizontal multi-stage axially-split centrifu- gal pumps (includes ISO 13709, API 610 designs)   Large multi-stage axially-split pumps have a very wide range of applications, notably mine drainage, boiler feed and process  in- dustries. A sectional view of this pump type, during routine overhaul and general view, are shown in Figures 1.33 to 1.35  respectively. They are also used extensively in the refining, pet- rochemical industries and in oil field production. The  design  Figure 1.33 Sectional view of a multi-stage axially-split case pump, API 610 code BB3 Courtesy of Weir Pumps Ltd   Figure 1.34 Multi-stage axially-split case pump during routine overhaul Courtesy of Weir Pumps Ltd   PUMPING MANUAL International                          19   1 Pump types   ~   Figure 1.35 Multi-stage axially-split case pump, API 610 code BB3 Courtesy of Weir Pumps Ltd   There are also two choices of first stage impeller; single entry and double entry. Double entry impellers are used in low  NPSHa applications to try to obviate the need for separate booster pumps.  For moderate pressure increases it is possible to absorb the ax- ial thrust directly in the thrust bearings. However, it is  generally necessary to balance out the thrust. The most common method of balancing thrust is by opposing the direction of the  impellers and balance discs or by means of balance drums. Opposing im- pellers leads to some complications with the casing  castings due to the transfer passages and can lead to poor casting integ- rity and weld repairs. Experts argue endlessly about  the merits of balance disc and drums; personal experience with the specific application may be the best guide.  Depending upon the pump size, ball bearings are probably the standard with angular contacts, back-to-back, for the thrust.  Sliding bearings with tilting pad thrust bearings may be an op- tion or become the standard as pump speed increases. At higher  speeds the life of rolling contact bearings is reduced whereas sliding bearings can have an almost unlimited life. Lube system  options will cover all requirements.  Small multi-stage pumps, like borehole pumps, can have many stages, 50 or 100. Larger multi-stage pumps are limited by shaft  deflection and critical speeds and the number of stages rarely exceeds 15. It is often required to run them at higher speeds  than those produced directly by electric motors, this means us- ing steam or gas turbines or geared-up electric motors. The  speed is generally 5000 to 8000 rpm. Some recent develop- ment trends are towards high speed single stage pumps but this is  not universal.  Pumps are available in many material combinations with cas- ings in carbon steel, 13% Cr steel, 18-10-2 stainless steel and  duplex stainless steel. Pumps at 2900 rpm can handle 2400 m3/h at heads over 1400 m. Running at higher speeds will pro- duce  more flow at higher heads. Standard casing designs are available for pressure ratings up to 280 barg. The maximum rat- ing to  date is thought to be 430 barg. Connections are usually in the bottom half so that all maintenance can be accomplished without  disturbing the process pipework. Other connection po- sitions are sometimes optional. Stuffing boxes and seal cavities tend to  be big enough to cope with most requirements. Some manufacturers can incorporate intermediate connections on the pump so that  liquid can be added or extracted at an interme- diate stage.  Figure 1.36 An example of capnuts on a horizontal joint Courtesy of Weir Pumps Ltd   Pumps are available to API 610 requirements. API excludes the use of axially-split pumps when: •  Liquid temperature of 205°C  or higher •  Flammable or toxic liquid with SG 0.7 •  Flammable or toxic liquid over 69 barg The main weakness in the  axially-split design is the joint be- tween the casing halves. Some designs employ gaskets and others metal-to-metal joints.  As the pump pressure increases the joint bolting becomes more heavily loaded and tends to stretch reducing the interface  pressure at the joint faces. The number and size of bolts or studs which can be fitted around the joint is finite. Capnuts can  be used to eliminate the space re- quired for spanners but the highly loaded stud/bolt cross sec- tion still sustains the  tensile stress, see Figure 1.36. This weak- ness in design is cured by the pump design in the next Section. 1.3.24 Horizontal  multi-stage radially-split centrifu- gal pumps (includes ISO 13709, API 610 designs) As developments within the process  industries have increased so the range of hazardous liquids has increased. The limitation of the axially-split multi-stage  pumps was addressed to remove fears of potential leaks of hazardous liquids and the radi- ally-split pump design evolved.  Consider the multi-stage segmental pump shown in Figure 1.29. It has already been stated that this pump design has many  potential leak paths. However if the stack of segments is housed with a pressure vessel any leakage would be con- tained; this  is the basic design principle of radially-split pumps is illustrated in Figure 1.37. Figure 1.38 shows a horizontally-split  casing assembly encapsulated in a radially-split pressure con- tainment. The process pipe connections can be flanged or pre-  pared for direct pipe welding as shown. The small clearance around the outside of the segments is usu- ally at discharge  pressure so that the segments do not have to be designed to cope with high tensile stresses caused by inter- nal pressure.  Unlike axially-split pumps, radially-split pumps all have vaned diffusers and usually balance compensation by disc or drum.  Some very special pumps have opposed impel- lers. The segmental stack, together with seals and bearing as- semblies, is built  as a complete assembly, called the cartridge, which is inserted into the pressure vessel from the non-drive end. This allows  all work on the pump to be carried out without disturbing the motor or the pressure vessel and process pipework. Three types  of construction of radially-split pumps are built as standard, the variation being in the pressure vessel which is normally  called a barrel. Hence the popular name for this type of pump, the barrel pump; not to be confused with very small barrel  emptying pumps described in Section 1.6.2. Small and  20                         PUMPING MANUAL International   1 Pump types   ~ii ~ i:¸ ::. -::~?~ ~   .......  ~ _~.~:z¸   Figure 1.37 Cross-section of a multi-st These vertical pumps are used for high flows in applications such as cooling water where  one or two pumps feed a ring main which supplies a whole site. Construction details vary considerably including centrifugal  and mixed-flow impeller types. Pumps are produced individually to order based on a range of standard designs. Countless  material combinations are available at every conceivable level of quality. Pumps can be built with flanged vertical motors  mounted di- rectly on top of the pump. Small pumps can be coupled with rigid couplings utilising thrust bearings built into  the motor. Larger pumps have self-contained bearing assemblies, rolling or sliding, and are driven through flexible couplings.  Some pumps are built with a right-angle gear box mounted on top; these pumps must have self-contained bearings. The pumps are  driven via flexible couplings by motors or engines. This style of pump is popular in offshore installations. Flows over 70000  m3/h are possible, differential heads vary from 50m to over 400m. Vibration can be a problem on vertical pumps. It would be  rea- sonable to purchase large pumps from manufacturers who have facilities to test pumps in the fully assembled condition.  Balancing requirements on motors and rotating elements may need tightening to reduce problems. 1.3.26 Single-stage centrifugal  pumps with integral gearing The process industries have shown considerable interest in high speed pumps. Lower speed  multi-stage pumps can be re- placed with smaller, more compact packages. Pumps consist of a specially designed radial vane  centrifugal impeller and casing which incorporates one or two step-up gears driven by a stan- dard 2-pole motor. The maximum,  practical, gear ratio for a pair of gears is 6:1 so that 60 Hz pumps could run up to 120000 rpm and 50 Hz to 105000 rpm. A  very wide speed range is available at both frequencies. Only vertical pumps are available for pro- cess applications;  horizontal single-stage pumps proved diffi- g solids &lt; 10ram  For very abrasive mixtures with particle sizes of up to approx 10 mm, the components in contact with the pumped fluid are rub-  berised or rubber coated. Typical solids handled would be some sands, iron and copper ore and mine tailings. Pumps which are  rubber coated can have the coating repaired or re- placed if the damage is not severe. Rubber lined pumps are built so that  the lining of the casing can be removed and completely replaced. Smaller pumps, 2" to 4" suctions, may limit solid sizes to 6  mm or less. Stuffing box requirements and drive arrangements are similar to those shown in Section 1.3.30. Small pumps are  simi- lar in hydraulic performance to all metal pumps. Larger pumps can handle more flow; a 16" suction will pass 5000 m3/h at  up to 48 m.  1.3.30 Centrifugal pumps for handling solids &gt; 10 mm   Solids handling pumps are used for pumping suspensions and liquid/solid mixtures of various solid particle sizes up 70% sol-  ids by weight. Two types of construction for rotodynamic pumps are available; all metal and rubber coated or rubber lined. The  particle sizes and the abrasiveness of the solids determine the choice of construction. Abrasiveness can be measured by the  Miller Number according to ASTM G75-82, Test method for slurry abrasivity by Miller Number. All metallic materials are used in  the case of larger particles and higher liquid temperatures, see also Chapter 7, Section 7.5. Some manufacturers restrict the  size of small particles which can be mixed with the large. With particles over 50 mm it is un- likely that 70% concentrations  can be achieved. Pumps are available in various materials from plain cast iron to chrome irons with 2.5% to 27% Cr. Despite  the use of extremely wear-resistant materials the operational life is relatively short- of the order of a few months and  depending greatly upon the speed of flow, rpm, particle size and nature. Figures 1.41 to 1.44 show examples of typical heavy  duty hard metal  Pumps having semi-axial impellers and axial pumps (pro- peller pumps) for larger flow rates and lower differential heads   The free area, the through-flow for non-clogging pumps, is nor- mally 60 to 100mm for the smaller pump sizes and 125 to 150 mm  for the larger pumps. The obviously desirable feature that particles as large as the connection diameter should be able to  pass through the pump is not usually possible because of hy- draulic problems and pump efficiency. Any solids should, in the-  ory, be surrounded by liquid. See Table 1.2 for guidance. For small flow requirements, in order to obtain sufficient liquid  flow, oversize pumps must be used. All sewage handling pumps comprise single suction impellers. This is to avoid the necessity  of locating the pump shaft in the  24                         PUMPING MANUAL International   1 Pump types   intake. Pump materials chosen are usually grey cast iron or SG iron for municipal sewage and grey cast iron or stainless steel  for industrial effluent.  Pumps with channel impellers have always been the most well developed and constitute a special class of their own on ac- count  of the number of different types and the numbers of pumps in use. In practice most pumps have impellers with sin- gle or  double channels, although larger pumps sometimes have three channels, Figure 1.45. As implied by the description 'through-  flow' impeller, the pumped liquid passes through the pump impeller and out through the delivery connection after leaving the  pump intake. Pumps with through-flow impellers are characterised by their high degree of efficiency over a large part of the  H-Q curve. The overall efficiency at the nominal duty point for medium size pumps is about 60%. The wear resistance of the  impeller is moderately good when used in combined systems and good in separate systems. The shape and design of free-flow  recessed impeller pumps dif- fers from through-flow pumps in that the location of the impeller and the utilisation of the pump  casing is different, Figure 1.46. The pump impeller is symmetrical with open vanes. The profile is low and its pulled back  location, recessed in the stuffing box wall, leaves the pump casing completely or partially free. The free-flow pump can be  described as a centrifugal pump having very large sealing clearance. The liquid and contaminants flow freely under the pump  impeller and out through the delivery connection. The absence of sealing clearance results in a re- duction in efficiency  compared with through flow pumps. The overall efficiency at the nominal duty point for small and medium size pumps is 40 to  42%. A special version of the semi-axial design pump has an impeller like a corkscrew. This style of pump has been called a  screw-centrifugal pump. The flow passages are large and the leading and trailing edges are sharp to cut fibrous material.  These are low head machines but water efficiency can be quite high, up to 84%. Gentle handling !!! Pumps, similar in design to  sewage handling pumps, are used for transporting larger delicate solids, such as whole fish, fruit  Single-channel     Double-channel Figure 1.45 Various types of channel impeller   3-channel   Figure 1.46 Free-flow recessed impeller pump   // /   Figure 1.47 Waste pump with "compression screw" for feeding the centrifugal pump unit   [:    Ill   Figure 1.48 Oblique disc pump (Gorator pump) for simultaneous disintegra- tion and pumping   and root vegetables by means of water. The channel areas and shapes are designed to cause the least amount of damage to the  product being pumped. See Chapter 16, Section 16.10 for an example of the pumping of live fish and food. In direct contrast  there are other types of non-clogging or chokeless pumps where deliberate attempts are made to finely disintegrate the  material being transported. Apart from sewage handling pumps with a integral fine disintegration device or macerater there are  pumps specially developed for the han- dling  pump. These pumps are nearly always installed with the impeller immersed in the liquid,  flooded, and the motor located above, so called extended shaft pumps for immersed installation. For relatively clean fluids  the central support tube also functions as a delivery pipe while for contaminated liquids the delivery pipe is separate,  similar to Figure 1.17 in Section 1.3.13.  Typical of immersed installation pumps, at least for the larger sizes, is that the delivery connections and mounting plates  are located according to each particular installation, if the total height of the pump exceeds the available height required  for as- sembling and disassembling then the support and the delivery pipe as well as the shaft may be divided into segments.  For long shafts it is necessary to fit intermediate bearings to prevent vi- bration and to increase critical speeds. There is  a clear trend to- wards replacing extended shaft pumps with submersible pumps in the smaller sizes.  The hydraulic design and number of stages is varied according to the duty requirements. Typical applications include wells and  boreholes, condenser circulating water, condenser extraction and drainage pumps. Pump sizes start at 20m3/h and approxi-  mately 30 m differential per stage. Pumps are available in all popular pumping materials.  1.3.34 Axial flow pumps   Many of the comments in Section 1.3.33 can be applied to axial flow pumps. Most pumps are vertical, the vast majority are sin-  gle stage. Some horizontal versions are available which look like pipe elbows. Axial flow pumps can be equipped with adjust-  able blades which can be set, either when the pump is at rest,  pre-set, or during operation, variable, by means of mechanical or hydraulic actuators. The differential head produced by axial  flow pumps is much less than mixed-flow or centrifugal pumps; typically 15 m per stage. Because of the simplicity of the con-  struction they are easy to build in large sizes. Axial flow pumps are generally used for flows greater than 400/h; flows of  30000 m3/h are not uncommon.  A special version of multi-stage axial propeller pump has be- come popular in the last few years. A heavy duty version of the  pump has found some applications in the multi-phase flow field. The cost of oil well exploitation can be significantly reduced  if the well products can be piped or pumped to a central gathering station or pre-treatment plant. The cost of individual  wellhead installations can be prohibitive if gases and liquids are sepa- rated and then pumped/compressed. A pump which can  handle crude oil, light hydrocarbon liquid fractions, sour water and natural gases is extremely useful. The pump looks like an  extremely rugged version of an axial com- pressor. The rotor drum is of relatively large diameter and the blade height is  unusually short. The rotor stages have few blades but each blade extends for 60 or 70 degrees around the circumference. The  casing stages have more nozzles and re- semble the high pressure nozzles from a steam turbine. Hori- zontally-split casings  are used for ten or more stages. Good ex- perience has been accumulated with flows of 500 m3/h and differential pressures up  to 14 bar. Gas volume fractions are generally in the region of 80 to 90% at suction but pumps have continued to operate with  100% gas for 15 minutes. These multi-stage axial flow pumps operate at speeds up to 4000 rpm. if higher differential pressures  are required, or the mixture con- tains solids, then twin-geared screw pumps, in Section 1.5.4, should be considered.  1.3.35 Non-metallic rotodynamic pumps   Non-metallic pumps are most suitable when used for pumping acids, alkalis and corrosive salt solutions. A general review of  physical properties and corrosive resistance of various non-metallic materials is given in Chapter 7, Sections 7.2.12 and 7.3.  Larger sizes of non-metallic pumps must, because of the physi- cal properties of the material, be equipped with an outer rein-  forcement casing to carry the nozzle loads and to absorb forces due to the fluid pressure, Figure 1.51. This outer casing is  not necessary for smaller pumps or if the particular non-metallic material has suitably good physical properties or is fibre  rein- forced internally. Since the liquids handled are of a dangerous nature, great care must be given to the type of shaft  seals. The construction generally being similar to that of the ISO 2858, ANSi B73 and AP1610 standard pumps. The pump shaft is  usu-  Figure 1.51 Non-metallic pump with surrounding reinforcement casing   26                         PUMPING MANUAL International   1 Pump types     ......   Figure 1.52 Hygienic-quality centrifugal pump   ally 18-10-2 stainless steel minimum and can be completely isolated from the liquid by a non-metallic shaft sleeve under the  mechanical seal.  Pumps are available for 400 m3/h at differential heads up to 80m; pressure ratings of 7 bar and temperatures up to 100 °C are  possible.  1.3.36 Hygienic-quality rotodynamic pumps Within the food processing, chemical and pharmaceutical in- dustries, special  centrifugal pumps are used, Figure 1.52. Their shape and construction is distinctive and determined by the hy- gienic and  sterile requirements.  The materials used are usually stainless steels with O-ring gas- kets etc. of approved hygienic quality. Both exterior and  interior surfaces must be smooth and polished to approved hygienic standards, it should also be possible to disassemble the  pump quickly for cleaning and washing. When cleaning without disas- sembling, Cleaning In Place or CIP, is specified, it must  be pos- sible to carry out this process quickly and effectively. This means that all components and clearances must be  designed for this purpose, especially with respect to temperature. To sim- plify external cleaning, the electric motor is  often encased in a polished stainless steel casing. For reasons of hygiene many foodstuffs pumps may not have oil lubricated  shaft bearings. Food processing centrifugal pumps are normally available up to approximately 30 kW. Cen- trifugal pumps cannot  be used for viscous and shear sensitive products such as yoghurt, cheese, liver paste etc.. In such cases lobe rotor pumps are  generally used, see Section 1.5.8. CEN Standard EN 1672 covers the requirements for hygiene for machinery used in the  preparation of food for human or ani- mal consumption. The Standard describes methods of con- struction and the types of  acceptable fittings, couplings and flanged joints. Single-stage end-suction pumps can handle over 400 m3/h at heads up to  100m. Close coupled end-suction pumps can be constructed like a segmental pump, shown in Sections 1.3.12 and 1.3.21, with up  to three stages. These pumps can handle 50 m3/h at heads up to 180m. ISO is producing new standards for hygienic machinery  requirements. ISO 14159 deals with machinery design. The American Standard T-02-09, which de- fines the requirements for 3-A  Sanitary Standards originally for the dairy industry, is popular in many countries. Traditional hygienic pumps have been used  in food manufac- turing processes. European standards use the term Agri- foodstuffs to include food products for animals as  well as food for human consumption. The biotechnology industry has be- come an important user of hygienic pumps. EN 12690  deals with the risks to personnel and the environment due to the emission of micro-organisms from assembled working pumps  or inadequately cleaned pumps which are disassembled. A biohazard is defined as danger or harm associated with a bio- logical  agent able to cause infection, allergy or toxicity in animals, humans, plants or the environment. 1.3.37 Magnetic drive  rotodynamic pumps Magnetic drive pumps are a type of glandless pump. Glandless pumps are characterised by the fact that their  design and con- struction physically prevents leakage to the surrounding envi- ronment. Packing or a mechanical seal type of  shaft seal can- not in this context in any way be considered as leakage free, even if it is barrier liquid or very dilute  process liquid/vapour in minute quantities which escapes. The description glandless pumps is therefore associated with the  alternative description hermetically sealed pumps or canned pumps. Glandless pumps must be used for the most dangerous liquids  from the point of view of toxicity, environmental hazards and ra- dioactivity. In some cases for high or very low  temperatures. Leakage may occur however when handling certain types of highly penetrative liquids due to penetration through  minute faults in static seals. Magnetically driven pumps can avoid this problem by having the containment can welded to the  casing. When ordering pumps for these types of liquids the level of acceptable leakage should be specified. Two types of  magnetic drive are available: •  Synchronous magnetic couplings •  Magnetic induction couplings In both cases the pump is  driven by a standard motor. However the motor does not drive the pump shaft carrying the impeller(s) directly. The motor  drives a rotating magnet assembly. In syn- chronous magnetic couplings, Figure 1.53, the rotating mag- netic field drives  another set of magnets coupled to the impel- ler(s). In magnetic induction couplings the rotating magnets create a magnetic  field in a rotor of copper bars, very similar to a standard squirrel cage motor rotor. The magnetic properties of materials  decay as temperature increases so that synchronous magnetic couplings suffer from a loss in torque. Magnetic in- duction  couplings are better at elevated temperatures because the magnets are not in contact with the liquid. The pump shaft proper is  totally immersed in the process liquid and runs in bearings which are process lubricated. Silicon car- bide ceramics and some  carbon are popular as bearing materi- als. Solids in the liquid can cause high bearing wear and in some designs can accumulate  in the can and cause obstruc- tions. This problem can be solved by using an external feed to the bearings. Process liquid can  be diverted from the pump dis- charge, filtered and cooled if necessary, and re-injected into a lubrication circuit. This  extra complexity will be worthwhile when considering the enhanced reliability and extended bearing life. Bearing wear  monitoring is a useful facility on any magnetically driven pump. A variety of magnetic materials are used of which aluminium,  nickel and cobalt are probably the most widely and successfully  Rotating   -rotating sleeve   Motor sh;   shaft ~r magnet }r magnet   Figure 1.53 Synchronous magnetic coupling for "sealless" torque transfer   PUMPING MANUAL International                          27   1 Pump types   Pump impeller   Intake   Figure 1.54 Close coupled magnetically driven pump   employed. Some designs use rare earth elements, such as sa- marium cobalt and neodymium iron boron for the upper end of the  torque range, the higher costs involved being more than off- set by improved performance. Magnetic drive pumps cannot run dry.  The pump and can must be thoroughly vented and primed before start up. The process liquid provides lubrication and cooling for  the pump internal bearings. The process liquid also removes heat generated by the magnetic coupling. Failure to provide the  appropriate liquid filling will cause significant wear of bearings and may cause the pump to seize before venting and priming  is accomplished. Dry running monitoring could save major maintenance expenses. Close coupled magnetically driven pumps, Figure  1.54, have become increasingly popular for critical applications where un- scheduled process stoppages create additional plant  problems as well as loss of revenue. Mechanical seals are seen as a maintenance intensive item, difficult to install and  set-up, with costly spares and attendant inventory costs. Removing the me- chanical seal and operating pumps of a modified  design can save d. This style of construc- tion allows very high pump speeds to be used without worrying  about bearing performance or life. NOTE: Magnetic drive and canned motor pumps. The Ameri- can Standards body, the Hydraulic  Institute, has issued a Standard covering sealless pumps, ANSI HI 5.1-5.6. This Standard is designed to eliminate  misunderstand- ings between purchasers and manufacturers and to help the purchaser specify a pump correctly. The Stan- dard  covers; pump types, definitions, applications, in- stallation, commissioning, operation, maintenance and testing. Details of  monitoring devices unique to sealless pumps are given; testing specific to sealless pumps; can integrity and winding Integrity  for canned motor pumps. The application section deals with gas- kets and joints, venting and draining and internal process  liquid lubricated bearings. The Standard includes descriptions of piping arrange- ments for process liquid circulation and  recommenda- tions on how to prevent problems caused by solids, magnetic material and gas/vapour evolution. B73.3 covers  sealless versions of the ASME/ANSi B73.1 and B73.2 style pumps. 1.3.39 Rotodynamic pumps without drivers (for specific  applications including mobile agricultural applications and mobile fire pumps) Pumps specially adapted to be driven from the  power take-off of a tractor are used for temporary installations, during the prepa- ration period for a permanent installation  and for mobile appli- cations. The speed of the tractor power take-off is too slow, ap- proximately 500 rpm, for a small  centrifugal pump. The specially adapted pumps have built-in gears to increase the speed to 3000 to 4000 rpm, see Figure 1.57.  1.4 Special rotodynamic pumps It is possible to construct rotary machines which use the kinetic energy of all liquids but  which do not obey the conventional me- chanics of the centrifugal pump. Impellers do not look like con- ventional pump  impellers. Kinetic energy can be transferred to the liquid in increments, by the use of many vanes, or all the en- ergy can be  achieved by a single stage. These pumps occupy a position between rotodynamic pumps and rotary positive dis- placement pumps;  their theory of operation having some of the characteristics of both types.  U   i   Figure 1.57 Typical tractor driven centrifugal pump with built-in gears   The positive displacement feature makes it possible to pump air or gas provided that a certain quantity of liquid is available  to act as a seal. These pumps have therefore good self-priming characteristics. High heads are possible with a single-stage  but efficiency is lower than other pump styles. 1.4.1 Peripheral pumps Peripheral pumps are also called regenerative pumps. In  princi- ple, liquid within the casing is separated into elements by means of rotating vanes but the radial clearance permits a  large percentage of recirculation. Energy is successively imparted to the liquid by contact with each vane in a manner which  is remi- niscent of rotodynamic pumps. When pumping, energy is trans- ferred to each enclosed element of liquid by the action  of the passing vanes. The increase in head for a given outer diameter and speed is 5 to 10 times that of an equivalent  rotodynamic pump. There are usually many vanes mounted on the periphery of the rotating disc. In practice the vanes are formed  by making cut-outs in the pe- riphery of the disc and supply energy during almost a complete revolution. The H-Q  characteristic of peripheral pumps is char- acteristically steep, Figure 1.58, which is ideally suitable for au- tomatic  operation on conjunction with an accumulator. Also the NPSHr characteristic is steep. This type of pump is not usually  permitted to operate at very low flow rates. Because of the pumps steep H-Q characteristic the power demand increases with  reduced flow rate and increased differential head. This can cause overloading of electric drive motors designed to meet the  demand at the design opera
