ses. The Pitot tube pump is more efficient in this respect. Maximum efficiencies of 50 to 60 % are  possible. The performance curves for a Pitot tube pump are similar to those for a centrifugal pump, see Figure 1.62. Curves  can be unstable and minimum flow requirements must be observed. Absorbed power increases as flow increases. Safety valves, as  a protection against overloading or overpressure, are not necessary and the pump can be regulated by throttling.  The advantages of the Pitot tube are:   •  Large differential head in a single stage   •  Reasonable efficiency for small flows   •  Non-lubricating liquids can be pumped   The Pitot tube pump cannot compete with the centrifugal pump for normal flows. Pitot tube pumps are not suitable for contami-  nated, abrasive or viscous liquids. Some manufacturers see  30                         PUMPING MANUAL International   1 Pump types   their pumps as being in direct competition with piston and plunger pumps. The Pitot tube pump is not a direct competitor  because it still has a rotodynamic style characteristic while be- ing able to achieve quite high pressures in a single stage.  The velocities involved are much greater that the 2 m/s from a recip- rocating pump. Pitot tube pumps can achieve about 820 m  or 80 bar based on water at flows up to 105 m3/h. Small close-cou- pled pumps, see Figure 1.3 are used for domestic water  boost- ing applications for private sources originating from wells. 1.4.3 Disc pumps The disc pump is very similar in  construction to the end-suction centrifugal pump however the impeller does not have vanes like a centrifugal pump impeller.  Two rotating parallel discs are used to create viscous drag which generates the forces to move the liquid. The pump  characteristics are very similar to centrifugal pumps. The disc pump can handle small and large solids, stringy solids and is  not so susceptible to viscosity degradation as a centrifugal pump of the same size. The pump is classified as non-clogging.  Impeller wear in solids handling applications is greatly reduced because solids do not impinge on rotating surfaces. The disc  pump can also handle quite large volumes of entrained gas without losing prime. Disc pumps have proved useful in the paper  industry. Dense pulp, up to 18% dry solids, has been handled in existing installa- tions. The disc pump can also be built to  3A-Sanitary require- ments. These pumps can handle flows to over 2000 m3/h at heads up to 300 m. 1.4.4 Pumps as power-recovery  turbines Rotodynamic pumps can run in reverse as turbines. This fact is long-established and is one of the reasons why  non-return valves are fitted in pump discharge lines. Pumps and their driv- ers have suffered damage as a result of turbining  due to pro- cess upsets or non-return valve failures. The power available from pumps running in reverse can be captured and  harnessed for useful work. Serious interest in power recovery turbines stems from the oil crisis of the 70s and the escalating  cost of energy. Some widely used processes are ideal for considering power recovery. In oil refining, the hydrocracker process  operates at over 100 barg and gas scrubbing at various pressures over 50 barg. In drink- ing water production by reverse  osmosis from seawater, the process operates at 70 barg. In these cases the process only degrades the pressure slightly leaving  a large amount of pres- sure energy to be throttled or recovered. When considering power recovery from high pressure process  streams there are three basic choices for installation: •  Use the power as the sole power supply to drive a pump or other  machine •  Use the power as the sole power supply to drive a generator •  Use the powerto assist in driving a pump or other  machine Standard mixed-flow and centrifugal pumps are popular for these applications; both types are in effect fixed geometry  Fran- cis turbines. The Francis turbine is an inward flow radial turbine and, depending upon the head to be converted, can be  mixed-flow or truly radial. Power generation turbine manufac- turers, in general, do not build small machines thus making  standard pumps an ideal option. The slight loss of efficiency, 2 or 3%, is more than offset by the economic benefits of  purchasing a standard piece of equipment. If the power recovered is used as the sole power supply it must be remembered that  the turbine will not produce power until the flow reaches 40% of design. Also, speed control may be neces- sary. If the  recovered power is used to assist in driving then the speed control of the prime driver should suffice. Assisted driv- ing is  probably the most common application because of its  simplicity but it is not the most efficient utilisation of either energy stream. Consider a pump driven by a squirrel-cage  motor which has two drive shafts, a double extended motor. The extra drive shaft is coupled, via an automatic clutch, to the  turbine. The pump is started in the normal manner. If there is no flow through the tur- bine it remains stationary. The pump  process conditions can be adjusted and allowed to stabilise. If during this period flow, and some pressure, appear at the  turbine inlet the turbine will start to spin. As the turbine design conditions are approached the turbine speed will increase  until it tries to run faster than the mo- tor. As the turbine tries to overspeed, the clutch locks and power is transmitted to  the motor. As the turbine transmits power into the motor, the motor speed increases slightly, un- loads by the amount of power  supplied by the turbine and the motor power consumption is reduced. If the turbine liquid sup- ply fails the turbine will  reduce in speed and when the motor at- tempts to drive the turbine the clutch will disengage leaving the motor to supply all  the power. In typical applications, such as hydrocracking and reverse os- mosis, the pump and turbine are the same pump type.  Hydrocrackers use radially-split, barrel machines. Depending upon the size, reverse osmosis systems use multi-stage seg-  mental or axially-split machines. It is possible to purchase multi-stage segmental machines with the pump and turbine in the  same casing; precautions must be taken to prevent the turbine running dry.  1.5 Positive displacement pumps   Positive displacement (pd) pumps operate on completely differ- ent principles to rotodynamic pumps. The most important differ-  ence is speed. Positive displacement pumps do not rely on speed to develop pressure. And now we talk of pressure, not head,  because the small velocity head is not converted to static head. Velocities tend to be very low compared to rotodynamic pumps.  Also differential head is replaced by discharge pres- sure. Positive displacement pumps do not try to increase the suction  head by a fixed differential head. Positive displacement pumps develop sufficient discharge pressure to force the liquid into  the discharge system.  In broad terms, positive displacement pumps compress the liq- uid from suction conditions to discharge conditions and can  achieve this at any speed. As already stated, velocities tend to be low so there are no problems in ignoring the kinetic  energies in the suction and discharge pipes. The pressures developed tend to be very large in comparison to the physical  dimensions of the pumps; so there are no problems in ignoring potential en- ergy due to elevation in the suction and discharge  systems. Positive displacement pumps can produce very high pres- sures, over 10000 barg is possible but uncommon. Standard  pumps used for high pressure cleaning and descaling operate at 1000 barg to 2000 barg. Pumps used for water jet cutting and  cold pasteurisation operate up to 4000 barg. Liquids are com- pressible. The liquid volume at discharge conditions may be  considerably smaller than at suction conditions; less than 85%. If the discharge flow rate is important, rather than the mass  flow, compressibility cannot be ignored and must be included in pump and system design calculations. Power is required to  compress liquids. The standard power approximation may un- der estimate the power required to drive a pump when the liquid is  very compressible.  NOTE: A review of the first paragraph of Section 1.1, before reading the following Sections is recommended.   1.5.1 External gear pumps   Gear pumps generally have two gears. Some designs are avail- able with three, one gear being driven by the motor, the others  by meshing with the driven gear. The driven gear usually runs in  PUMPING MANUAL International                          31   1 Pump types   Figure 1.63 Gear pump with external gears   Oil reserv~ with filter   Hot coolal return   Hydrau gear pL   Thermostatic valve Hydraulic gear motor with switching valve drives cooling fan Cold coolant supply   Figure 1.64 External gear pump - hydrostatic fan cooling drive   plain bearings. The bearings and shaft journals are located in the pump casing and surrounded by the pumped liquid. These  bearings are thus dependent upon the lubricating qualities of the pumped liquid. Gear pumps are not therefore suitable for  handling non-lubricating liquids. For reasonably acceptable pump life, gear pumps should not be used for such dry liquids as  water or petrol. Paraffin and diesel oil are examples of liquids whose lubricating properties, whilst not being good, are  perfectly acceptable for gear pumps.  The simplest gear pump has two external gears, Figure 1.63. This type is used for relatively free-flowing liquids and can pro-  duce quite high pressures. Pumps for process applications start at 7 bar, hydraulic power applications have a standard rat-  ing of 170 bar but pumps are available for 300 barg. Gear pumps are self-priming with a suction capacity of 4 to 8 metres.  Pumps are built in cast iron, steel, stainless steel, titanium, Hastelloy and non-metallic materials.  Simple gear pumps are used for hydraulic power applications, where the motor can be a gear pump running in reverse. Figure  1.64 shows a low power application for driving a radiator fan on an engine. The thermostatic control valve provides speed con-  trol for energy saving and faster engine warm up. This type of drive is useful in hazardous areas where electrical equipment  is bulky and costly.  Figure 1.65 shows an external gear pump with four stuffing boxes, external bearings and external timing gears. This style of  pump is used for viscous liquids with solids, such as asphalt. External gear pumps can be equipped with heating or cooling  jackets and complex sealing systems.  1.5.2 Internal gear pumps   A far greater range of application is possible with gear pumps having a small rotor mounted eccentrically within a larger  exter- nal gear. A crescent shaped partition separates the two gears,  Figure 1.65 External gear pump with four stuffing boxes Courtesy of Albany Engineering Company Ltd Figure 1.66. When the rotor  is driven, the gear also rotates. The difference between the diameters of the rotor and gear and the eccentric location means  that the gear teeth engage only at one point. The tooth of the gear successively rotates out of the gear pocket in the rotor  during the first half of rotation. This induces a vacuum and the gear pocket is filled with liquid from the suction line. The  liquid is forced out into the discharge line by the gear teeth during the second half of rotation. The number of teeth is kept  to a minimum in order to make max- imum use of material to obtain deep pockets between the teeth and achieve large  displacement. By using sophisticated tooth profiles the number of teeth for external gear pumps can be as low as 10 to 15.  Internal gear pumps can utilise the advantages of more favourable gear tooth engagement and therefore have even less teeth,  see Figure 1.67. The pressure of fluid causes side forces on the gear which are taken up by the bearings. The axial force is  usually relatively small, although the variations in side clearance and resulting pressure variations can cause wear. Wear  which causes in- creased gear clearance does not affect the internal leakage as much as wear at the teeth tips and sides. It  is important to know the temperature range within which a gear pump is going to operate. Working components must take up  greater clearances than normal if the pump is to operate with liquids at high temperatures. Some manufacturers supply pumps  suitable for operating at temperatures of up to 300 °C. Gear pumps should be used with care for liquids containing solid  particles and for abrasive liquids. Pumps are available for hard solids up to 15 mm and soft solids up to 100 mm. Slow speeds  are recommended. Wear can be reduced, when han- dling abrasive liquids, by selecting a pump having a somewhat larger capacity  enabling it to operate at lower speeds. Gear pumps are not suitable for use within the food industry where compliance with  hygiene regulations is mandatory. They should not be used for handling shear-sensitive liquids. The respective uses and  applications for external and internal gear pumps varies somewhat. Greater pressure increases and increased flow is obtained  with external gears, whereas internal gears are more suitable for high viscosity liquids and have better suction capabilities.  To obtain a good volumetric effi- ciency it is always necessary to adjust pump speed or suction pressure to suit the viscosity  of the liquid. A high viscosity re- quires a lower speed or higher suction pressure. Shaft seals for pumps handling lube oil  can be as simple as a U ring. Stuffing boxes or mechanical seals are available to cope with many liquids. To increase pump  life when handling non-lu- bricating liquids, special precautions such as shaft journals, self-lubricating plain bearings and  special gear tooth surface treatment may be necessary.  32                         PUMPING MANUAL International   1 Pump types   Filling Figure 1.66 Internal gear pump showing the 3 working phases   Figure 1.67 An internal gear pump with heating jacket and double mechanical seal Courtesy of J P Pumps Ltd   There are many models suitable for small flows designed for laboratory use, whilst larger industrial pumps have maximum flows  over 3000 m3/h.  External gear pumps offer an excellent middle-of-the-road choice between performance and cost. Gear pumps are ex- tremely  compact for the power they develop. Although unable to match the high pressure capability of piston pumps, gear pumps develop  higher pressures than vane or lobe types. By the use of precision-cut gears and close tolerance assembly, particularly between  the tips of the teeth and the casing, volu- metric efficiencies in excess of 90% are normal.  Gear pumps must be one of the most popular pump types, since every automobile engine has at least one for lube oil. Some  gearboxes and differentials have separate pumps for their lube systems. A major area of application for external gear pumps is  on mobile plant and machinery. They provide a power source for a variety of lifting services, as well as acting as  power-assisted steering pumps. When assembled as a tandem unit the pump becomes a compact, economic solution serving a number  of circuits. In the agricultural industry, tractors often depend upon engine driven external gear pumps for powering on-board  services. These pumps are also popular for use with PTO shafts, with or without assistance from a gearbox.  A number of magnetically driven sealed gear pump designs are available. These are especially useful for hazardous viscous  liquids or liquids which must not come into contact with air. A disadvantage with some designs is that bearing wear can be  Transfer   Delivery   quickly followed by damage to the magnetic coupling with the result that the complete unit is unfit for further service. With  other models, should wear reach the point at which the gears come into contact with the pump casing, the magnetic coupling, by  far the most expensive component, will immediately spin free without damage.  1.5.3 Archimedes screw pumps The Archimedean screw is the oldest known type of rotating pump. The rotor is in the form of a  thin helical screw. The thread form being made by plate wound around the shaft. The number of threads varying from one to  three. The rotor usually rotates in an open channel having a circular cross-section, enclosing about three-quarters of the  rotor periphery. The rigid screw shaft is usually inclined at an angle of 30° to the horizontal, the length of the screw being  approximately twice the lift obtained. The lift heads are rarely in excess of 10 m. In- creased nominal flow is obtained by  increasing the rotor diame- ter and reducing speed. Speeds range between 20 and 80 rpm. Delivery heads are virtually  independent of flow up to a maxi- mum flow, maximum capacity loss factor or filling coefficient. The efficiency curve is flat  as shown in Figure 1.68. The effi- ciency is only reduced by about 5% from maximum flow to 50% flow.  There are special types of rigid screw pumps, like that shown in Figure 1.69, where the channel is totally enclosed and  rotates with the screw. Provided that the drive and shaft bearings are  ...................................................  Y   (-. ~E "~',-.-.-'~t ~ ,~~~ chute point ,        ax:mu'a,,owaO,  eoumo,no ,     ~~  !" Inclination angle  100% Q-r/-Diagram 65            -"'%~--'"'""    --- - 6O       -'fl"~- i 55        .,~"     I 50    //! r/screw only  .......... s.o t-,.o%  ~, screw with drive gear without motor   100%   Figure 1.68 Rigid screw pump - construction and efficiency   PUMPING MANUAL International                         33   Helical blades   Reinforcement tube I  Flange for Belt drive  disassembling ,   t/   1 Pump types   Support bearing   \\\\\\\\\ \,, Figure 1.69 Rigid screw pump with rotating channel   completely isolated from the liquid it is possible to transport a wide variety of liquids and mixtures. Rigid screw pumps are  used for transporting liquids containing large solid contaminants, untreated sewage for example. They are also ideal for low  delivery heads and large flows, up to 21000 m3/h. As a sewage pump the rigid screw pump is self-regulating according to the  supply flow. When the level in the pump sinks then the capacity loss factor, or filling coeffi- cient, automatically reduces  causing the pump flow to de- crease.  The advantages of the rigid screw pump are: •  High efficiency •  Simple robust construction •  No seals   •  Can run dry •  Flat efficiency curve •  Self-regulating forvarying output •  Not sensitive to contaminants   1.5.4 Twin-rotor screw pumps All screw pumps are grouped together in this section even though the operating principles of two  screw pumps is different to three and five screw pumps. Two screw pumps consist of two identical profiles meshing to- gether  and sometimes with external timing gears. Without ex- ternal timing, the idler screw is driven by liquid pressure be- tween  the profiles. The two screws do not touch and a minute flow path from discharge to suction always exists. The most common type  of screw pump has three rotating screws of two different profiles, Figure 1.70. The central screw is the driver whilst the  basic function of the two idler screws is to provide sealing by hydrodynamic bearing films. The screw he- lixes form a number  of sealing elements with the pump casing which transports the liquid axially when the screw rotates. The liquid flow is smooth  without disturbing flow variations. The screw pump is quiet running and can be run at speeds up to 4500 rpm. By constructing  pumps with longer screws more sealed elements can be obtained resulting in higher discharge pressures. Screw pumps rely on  viscosity for sealing, and in triple screw pumps for driving the idle screws. Figure 1.71 shows the effect of viscosity on  flow and power at constant speed and differential pressure. 1.5.5 Tripl S content. Centrifugal pumps can only accept approximately 15% gas percentage by volume before losing prime. Twin  screw pumps have been developed to handle continuously variable mixtures from 100% liquid to 97% gas. Screw pumps are made  from grey cast iron, nodular cast iron and carbon steel. Special surface treatment of components can improve wear resistance.  Shaft sealing is by means of stuffing boxes or mechanical seals.  Axial thrust is taken up partly by hydraulic balancing and partly by thrust bearings. Large pumps are constructed with two op-  posed screws on each shaft. Liquid enters at the centre of the  34                         PUMPING MANUAL International   1 Pump types   Figure 1.72 A typical vertical pump with end-suction connection Courtesy of AIIweiler AG   Figure 1.73 A typical horizontal monoblock "tie-bolt" pump Courtesy of AIIweiler A G   shaft and flows outward to the discharge. Equal and opposite flows creating a high degree of hydraulic balance. With regard to  the construction of thrust bearings, screw pumps are nor- mally designed for one direction of rotation and flow. Twin  synchronised screw pumps are available up to approxi- mately 2200 m3/h at pressures of 240 bar. These pumps can handle water  and there is no maximum limit on viscosity. Gas entrained in viscous liquid tends to reduce the effective viscos- ity. Slugs  of 100% gas and entrained abrasive solids, such as sand, can be handled.  1.5.7 Progressive cavity pumps Progressive cavity pumps may seem to be a new pump type. This is the modern name for an old  pump. In the past, these pumps have been called, eccentric screw pumps, eccentric gear pumps and helical gear pumps. The new  name is better as it describes the action of the pump. The principle of operation was first established in the 1930s by Rene  Moineau.  Progressive cavity pumps have only one rotor working within a rubber stator. The rotor, which looks something like an elon-  gated corkscrew, rotates in a flexible stator having double inter- nal helixes. The pitch of the stator helix is twice that of  the ro-  tor's. The difference in pitch forms sealed cavities between the rotor and the stator which, with rotation of the rotor, are  caused to travel axially along the stator resulting in a smooth axial flow. Since the end of the rotor describes a circle when  rotating, drive is usually by means of a cardan shaft with standard universal joints (Hooke's joints) at both ends which lie  in the liquid flow, see Figure 1.74. Alternative methods of flexible power transmission have been developed by different  manufacturers to cope with the wide range of operating conditions, see Figure 1.75. (a) shows a simple single pin coupling.  This style of coupling is suitable for small pumps when the torque requirement is low. The O ring is used to provide a  flexible seal; it keeps the lubricant inside the coupling and the product outside. (b)is an open version of (a). (b) is used  for small hygienic pumps when it is important to be able to clean the pump internals thoroughly. (c) and (d) show two  different approaches for Hooke's joints. A crossed pin pro- vides four bearing surfaces; two for each side of the coupling.  These are the most popular types of coupling used and are suit- able for any pump size and most applications. The pin bearings  can be plain or the needle roller type. Lubricant is sealed in the coupling by the flexible outer cover. All of the pin joints  suffer a common drawback; the possibility of cyclic angular velocity changes. If a single Hooke's joint is used to transmit  rotary power between two shafts which are not parallel, the driven shaft will not rotate at a constant angular velocity. The  shaft speed continuously changes as the shaft rotates. The driven shaft can transmit the effects of the cyclic velocity  changes to the drive shaft as torsional oscillations. The cyclic angular ve- locity effects on the pumping element can be  largely eliminated by using two Hooke's joints in series, one at each end of the drive shaft.  However this approach is only completely effective when the two joint angles are identical. The rotor is housed within a  flexi- ble stator and does have a degree of freedom regarding posi- tioning. The elimination of the cyclic angular velocity  effects on the pumping process, can not be guaranteed. They can be  (a)                  (b)                      (c)   Y   ......  !  ~--~ i  i  7- ~i~ax~,.~.~~"  k~.-  ..........  ',,i   i/  ~!~)..  !  (d)                   (e)                    (0   Figure 1.75 Variations of flexible couplings for progressive cavity pumps   ~~7  .......  !"~ ~.~ 1=Rotor 2=Stator I..__~ 3=Connectingrod 4=Drivejoint ~  5=Shaft  ~_1   Figure 1.74 A progressive cavity pump   PUMPING MANUAL International                         35   1 Pump types   completely eliminated by using a different style of coupling, the constant velocity coupling, see (e) and (f). Both couplings  use a crowned gear to mesh with a toothed annulus. The load is dis- tributed over many tooth flanks and the angular motion is  guided by a spherical bearing. (e) is a double-sealed version for higher operating pressures.  All coupling problems such as bearing wear, lubrication and cy- clic angular velocity, can be managed by using a relatively  new driving shaft style, the flexible shaft. The flexible shaft is just that. A drive shaft with proportions which are  adequate to sup- port the torsional and axial loads but thin enough to be able to bend to follow the end of the rotor. The  flexible shaft is bolted or clamped between the bearing housing shaft and the rotor. In some cases the useful life of the  flexible shaft may be limited by fatigue and routine replacement may be necessary. Given the full operating condition the pump  manufacturer can select the most appropriate drive shaft option.  Increasing the length of the rotor and stator makes possible greater differential pressures. Pressure differential for a low  pressure pump is 6 bar. Differential pressures up to 40 bar can be obtained by increasing the length. Pumps are available for  flows over 300 m3/h.  Progressive cavity pumps are used for practically all types of liquid from very fluid to very viscous. They can handle liquids  containing abrasive contaminants and are relatively insensitive to solid particles. Larger pumps can allow the passage of ran-  dom hard particles of 30 mm and soft particles over 100 mm. Special adaptations can be made to feed very viscous product in to  the pump suction. Progressive cavity pumps have good suction capacity up to 8 m but their extreme sensitivity to dry running  requires venting and priming prior to starting for long stator life.  Many different materials are used in the manufacture of the pump casings and rotors ranging from cast iron to titanium. The  stator can be made from a wide variety of elastomers, for exam- ple natural rubber, nitrile rubber, Neoprene and Viton&amp;. In  order to select the correct elastomer it is necessary to know the chemical properties of the liquid to be pumped, the nature  of any solids and the temperature at which the pump is to operate. The choice of material is often a very difficult and  complex mat- ter due to the wide range of materials available. When in doubt, consult a manufacturer who has experience of the  duty.  1.5.8 Lobe pumps (including circumferential piston pumps) Lobe pumps have two rotors, which, unlike gear pumps, oper- ate  without metallic contact with each other. Both rotors are driven by synchronising gears which are completely separated from  the pump chamber, see Figure 1.76. The pump shaft bear- ings are also situated in the gear case. The pumped liquid does not  therefore come into contact with the bearings. Synchronis- ing drive gears cause the rotors to rotate in opposite directions.  The inlet liquid flow is divided into two halves, trapped in the space formed between the rotor and the pump casing and  Figure 1.77 Lobe pump working principles   transferred, without change in volume, towards the outlet where the rotors meet, thereby reducing the cavity and forcing the  liquid out, Figure 1.77. Lobe pumps are not usually applied to pressures over 30 bar so there are no problems with volume  changes due to compressibility. The absence of metallic contact between the surfaces of the ro- tors themselves or between the  pump casing and the rotors means that wear of the rotating parts is insignificant. The only wear which occurs is due to  erosion of the pumped liquid or en- trained solids. Since the shaft bearings are normally mounted outside the pump casing, the  shaft ends are relatively long and unsupported which imposes limits in terms of working pressure. For pressures in excess of  12 bar some manufacturers fit plain bearings inside the pump casing. Others mount an extra bear- ing bracket on the outboard  side of the pump casing. The latter case giving rise to four shaft seals. The profile of the rotors varies from manufacturer  to manufac- turer. The most usual is shown in Figure 1.78. The profile does not alter the principle of operation. It can be  said however that rotors with one or two lobes give rise to greater pressure pulsa- tions than rotors having three lobes. For  gentle handling of liq- uids, rotors having one or two lobes should be chosen. Rotary piston pumps are lobe pumps with greatly  modified lobe profiles. The rotors are designed so that much more tip surface area is presented to the bore of the casing.  This modification changes the pump viscosity characteristic and also the pump- ing action. The liquid is no longer squeezed  out of the pockets between the lobes but is pushed directly out of the discharge. Figure 1.79 shows two typical rotor  profiles. Lobe and rotary piston pumps are suitable for both fluid and vis- cous products. Special feeding arrangements are  necessary for extremely viscous liquids which cannot otherwise flow. Liq- uid temperatures of up to 200 °C can be handled if  the clear-  I I 0 II 0   gl   g   Figure 1.76 Exploded view of a lobe pump   36                         PUMPING MANUAL International   1 Pump types   Figure 1.78 Lobe pumps - popular rotor profiles   Figure 1.79 Rotary piston pumps rotor profiles   ances between the rotors and the covers are increased. By in- creasing the rotor side clearances it is possible to handle  liquid at temperatures of down to - 40 °C. To maintain constant tem- perature, pumps may also be fitted with heating or  cooling jackets.  Lobe pumps and rotary piston pumps handle the pumped liquid very gently. Examples of this phenomenon can be found within the  foodstuffs industry where pumps are used for pumping cooked pea soup, preserves containing whole berries and other similar  applications including handling whole fish. In these cases the pumps are specially constructed to fulfil the hy- giene  requirements; being easily dismantled and suitable for washing by hand or in accordance with the CIP method.  Pumps can also be equipped for completely aseptic pumping for use within the pharmaceutical industry. They are also exten-  sively employed in the chemical industry for handling both cor- rosive and non-corrosive products. Special dense-pulp pumps  have been developed for the cellulose industry, these being suitable for pulp concentrations ranging from 6 to 30%, Figure  1.80. Special derivatives are manufactured for sewage han- dling. These pumps can have adjustable rubber lobes.  Pumps usually operate at relatively low speeds and they are of- ten used for high viscosity liquids. The pump is quiet running  and delivers a largely pulsation-free flow. For most pumps the components in contact with the liquid are manufactured in  stainless steel. Pumps for non-corrosive applications can have a cast iron casing with rotors and shafts made of steel. Some-  times the rotor material can be varied in order to increase the pump's suction capacity, for example, by the use of nitrite  rub- ber rotors. Shaft seals consist of various forms of mechanical seals and stuffing boxes. Since the pump has two shafts  which pass through the pump casing, two sets of seals are needed for each pump.  The rotary piston pump is a successful variant of the lobe de- sign. Also called the circumferential piston pump, it uses arc  shaped pistons or rotor wings, as shown in Figure 1.79. The ro- tor wings are manufactured in a corrosion resistant,  non-galling copper free nickel alloy and are designed to operate with very close clearances. This feature, combined with the  geometry of the rotor wings, produces a long sealing path between inlet and outlet resulting in minimal slip when pumping low  viscosity liq- uids. On viscous liquids and when handling products with solids in suspension, the large liquid cavities in the  rotor wings com- bined with low operating speeds and carefully profiled anti-cavi-  Figure 1.80 Dense-pulp pump with feed screw   tation ports produces a smooth, pulsation free, low shear pumping action. Twin wing rotors are fitted for the majority of  duties; single wing rotors are preferred for easily damaged products. Lobe pumps and rotary piston pumps are available in a  wide va- riety of sizes from 0.1 to over 300 m3/h. A sewage version can handle 900 m3/h at 6 bar. Discharge pressures are  normally up to 30 bar. Suction capacities vary between 1 and 5 m, depend- ing upon internal clearances, pump size and speed.  Solids han- dling capabilities are good with solids up to 100 mm on the larg- est pumps.  1.5.9 Vane pumps In a rigid vane pump the rotor is eccentrically located in the pump casing and the vanes slide in and out to  maintain contact with the casing wall. In a flexible vane pump the rotor is mounted eccentrically in the pump casing and the  vanes flex to maintain contact with the casing wall. The pumping action is created by the variation in volume between the  vanes, Figures 1.81 and 1.82.  In both types of pump the liquid is drawn into the pump by an in- creasing volume between the vanes on the suction side,  trans- ported to the discharge side whilst trapped between the vanes and a proportion forced out by a decreasing volume. The  vanes in sliding vane pumps may be controlled by springs, hydraulic pressure or rely entirely upon centrifugal forces in-  duced by rotation. Some types use a rotating cam to guide the movement of the vanes.  There are many types of vane pump where the vanes are lo- cated in the pump casing (stator), Figure 1.83. Another variant of  vane pump is the sliding shoe pump where the vanes are U-shaped and operate against two separate sur-  Figure 1.81 Operating principles for vane pumps   PUMPING MANUAL International                         37   1 Pump types   Figure 1.82 Vane pump with sliding vanes in the rotor   Figure 1.83 Vane pump with vanes in the stator   faces, one against the rotating cam, whilst another surface slides against a valve plate, Figure 1.84. The pump casing and  rotors for vane pumps with sliding vanes are usually made of cast iron, gunmetal or stainless steel, whilst bronze or glass  fibre reinforced PTFE is used for the vanes.  Vane pumps with sliding vanes are suitable for most clean liq- uids and especially suited for those with entrained gases or  those having a low latent heat; petrol or ammonia for example. Maintenance costs are relatively low due to the ease of  replace- ment of the vanes, even when being used to pump liquids which are somewhat contaminated, waste oil for example. Vane  pumps can operate within a large range of viscosities, although it is necessary to compensate for the speed, i.e. the higher  the viscosity the lower the speed. This phenomenon is common to most displacement pumps. Vane pumps are capable of suction  lifts of 2 to 5 m. Flexible vane pumps are suitable for discharge pressures up to 5 bar, sliding vane process pumps of over 10  bar. Sliding vane pumps for hydraulic power applications can run at over 3000 rpm at pressures to 200 bar.  In a flexible vane pump, the rotor (flexible impeller), made of a synthetic elastomer, creates a seal between suction and dis-  charge side. The pumps are therefore dry self-priming with a suction lift of 4 to 5 m, i.e. do not require to be vented and  primed. With liquid in the pump it is capable of a vacuum of up to 500 to 600 mm Hg.  As the rotor material depends on the liquid pumped for lubrica- tion, it is generally recommended that the pump should not op-  erate without liquid for more than 30 seconds. This is more than sufficient time for self priming with properly designed  pipework.  Flow capacities for flexible vane pumps range from 0.1 to over 30 m3/h, sliding vane pumps are available for over 300 m3/h.   The single rotor, multi-vane principle, provides largely pulsa- tion-free flow and enables the pump to handle products suscep-  tible to damage.  Chemical resistance information, compiled by manufacturers of flexible vane pumps, provides a guide to the compatibility of  various elastomers with liquids commonly used in industry.  Suction phase Figure 1.84 Sliding shoe pump   Delivery phase   Broadly speaking the temperature range of some of these rotor materials is as follows: •  Neoprene      4 to 80 °C •  Nitrile  rubber    10 to 90 °C •  Viton®         4 to 90 °C However, as with any type of pump when pumping liquids which are not cold,  great care must be taken to observe suction limita- tions and provide sufficient NPIP. (Viton is a registered trade mark of  DuPont Performance Elas- tomers LLC.) 1.5.10 Peristaltic pumps (including rotary peristal- tic pumps) Peristaltic hose pumps A  peristaltic hose pump transports liquid by mechanically squeezing a space enclosed by a flexible element. The most usual  peristaltic pump, the flexible hose pump, operates by means of rollers or cams acting directly upon the hose contain- ing the  liquid, Figure 1.85. The number of rollers or cams vary depending upon the manufacturer; industrial pumps have 2 or 3 but  small laboratory scale pumps can have as many as 7. Fig- ure 1.86 shows an industrial size pump with two spring-loaded  rollers. A pump may be fitted with one or more hoses, sometimes as many as thirty. At one time the use of peristaltic pumps  was confined largely to laboi'atory and similar specialised applications but develop- ments in rubber technology have resulted  in a new generation of heavy duty pumps and peristaltic units are now to be found on a wide range of industrial duties  involving viscous and/or abrasive sludges and slurries as well as products with high solids content. An important factor in  favour of the peristaltic concept is the pump's ability to handle solids up to the full bore of the hose tube. With most pump  designs, solids handling capacity is re- stricted to approximately 15% of the pump branch sizes.  Figure 1.85 Peristaltic hose pump   38                         PUMPING MANUAL International   1 Pump types   Figure 1.86 Industrial size peristaltic pump   In one modern heavy duty design the roll/squeeze peristaltic movement takes place in a sealed housing partially filled with a  mixture of glycerine and glycol. This not only lubricates the cams or sliding shoes from which the roll/squeeze motion is de-  rived; it also acts as both coolant and lubricant to the exterior of the pump hose tube. This prolongs hose life and reduces  the in- cidence of mechanical failure. Hose life in excess of 3,000 hours is quite common. The same design uses a hose tube  with an inner core of soft natural rubber or NBR rubber with an outer covering of hard natural rubber reinforced with braided  nylon. During the roll/squeeze phase of the peristaltic cycle, solids present in the pumped liquid are cushioned in the soft  inner core of the tube with minimal damage or erosive effect and are released gently back into the liquid stream when the  squeeze cycle is con- cluded. This enables delicate, shear sensitive solids to be pumped without damage and abrasive material  to be handled with little or no effect on the hose interior. The peristaltic design is inherently sealless, with the pumped  liquid completely enclosed with no possibility of leakage except in the case of a hose failure. Failure from a cause other  than mechanical stress is rare and, under stable operating condi- tions, can often be predicted with considerable accuracy.  Regu- lar hose inspection is of course advisable. Peristaltic pumps can be used for all types of liquids and to some extent  even gases. The suction capacity varies greatly for different constructions. Discharge pressures are usually be- low 10 bar  but pumps have been used up to 40 bar; tube life is extremely short! Large pumps, with 125 mm tubes, are rated at 2.5 bar. The  capacities vary from very small metering quantities of 0.001 I/h up to flows of 50 m3/h. Special pumps are available for over  3000 m3/h. Rotary peristaltic pumps Another type of peristaltic pump, sometimes called an orbital lobe pump, works by means of  an eccentric rotor operating within a flexible elastomeric element with the liquid trapped be- tween the elastomeric element  and the pump casing. The rota- tion of the eccentric rotor transfers the liquid from the inlet to the outlet, Figure 1.87.  This pump is leak-free, conditional on the flexible elastomeric element not failing as a result of the mechanical stresses.  The elastomeric element should therefore be replaced regularly to avoid unexpected failures. In order to select the correct  elasto- mer and the correct pump casing material it is important to know the chemical properties and temperature of the liquid  to be handled. Capacities range from 0.06 to over 50 m3/h. Suc- tion capacity 1 to 3 m. The pump creates a strongly pulsating  Figure 1.87 Rotary peristaltic pump   flow making it advisable to use flexible hoses in the suction and delivery lines. If fixed pipes are used some type of  pulsation damper should be fitted between the pump and the pipe. Rotary peristaltic pumps are suitable for pressures over 10  bar. 1.5.11 Rotary eccentric piston pumps The rotary eccentric piston pump can be considered as a type of single wing  circumferential piston pump or a peristaltic pump without a tube. The casing forms a circular cylinder. The piston is circular  but of a smaller diameter than the cylinder. The piston does not rotate but is forced to precess eccentrically around the  cylinder with a minimum clearance. A viscous seal forms in the minimum clearance to reduce internal slip. Incoming liquid is  swept around the circumference of the cylinder to the discharge port. The pumping action produces very little liquid shear and  is extremely gentle. There are two slightly different versions of the pump in common use. One version uses a bearing bracket  very similar to an end-suction centrifugal pump. Piston eccentricity is maintained by spring loading. These pumps have a  U-ring seal, mechanical seal or stuffing box to match the liquid characteristics. These pumps cannot run dry without special  sealing arrangements. The other version uses a special non-rotating eccentric drive arrangement which does not require a  rotating seal. Sealing is accomplished by rubber or metallic bellows which allows the pump to run dry. Both pump styles are  self-priming and revers- ible. Figure 1.88 shows an exploded view and Figure 1.89 a longitudinal cross-section of an eccentric  drive pump. The rotary eccentric piston pump is manufactured in cast iron, steel, bronze and stainless steel and can be built  to hygienic and aseptic requirements. Test have shown that CIP with 120°C water is completely effective. The pump is used  exten- sively in the dairy industry for handling milk and milk products. Other pumped products include; alcoholic drinks, cake  mixes, chocolate, ink, jam and marmalade, mineral oil, paint, resin, soap, toothpaste and varnish. Pumps can handle flows up  to 85 m3/h at pressures up to 12 bar.  Figure 1.88 Exploded view of an eccentric drive pump   PUMPING MANUAL International                         39   1 Pump types   ! ~ ~  .....  ~ ! Wi~ll~l~i~~iill~ ) ~l~i~~  I   Figure 1.89 Longitudinal cross-section of an eccentric drive pump   1.5.12 Axial and radial piston pumps   These are piston pumps for hydraulic power applications and water pumps as well !! They are characterised by their lack of  external lubrication and not having any seals on the piston. All moving parts are lubricated by the product. Early systems all  used mineral oil as the motive liquid and this may have been a standard industrial lubricating oil. Installations in hazardous  ar- eas, where the problems caused by any fire were great, looked for replacement liquids to reduce fire risks. Mixtures such  as water/glycerine and water/glycol were tried but equipment needed derating to cope with the poor lubrication properties.  Soluble oils were developed which led eventually to 95/5 and 97/3 water/oil emulsions.  Modern oils are biodegradable and can be disposed of in nor- mal sewers. However, they are also costly and so leaks are kept  to a minimum. Piston leakage is controlled by the clearance be- tween the piston and the cylinder bore. Any leakage returns to  suction. Piston pumps for hydraulic applications fall into two broad categories; axial piston and radial piston. Inline piston  pumps, the forerunner of modern axial and radial pumps, are still used for a few applications.  Axial piston pumps consist of a number of cylinder bores in a ro- tating block. The pistons can be anchored in various ways to  produce the stroke as the cylinder block rotates. Most pumps have pistons which are driven sinusoidally. The stroke can be  variable. Variable flow can be produced from fixed speed pumps. Some pumps can adjust the stroke so that the pump runs in  reverse, i.e. the suction becomes the discharge. Suction and discharge valve functions are performed by ports in the cyl-  inder block support plate which connects cylinders to the suc- tion or discharge at the correct part of the stroke.  Inline pumps are similar in construction to inline car engines. Several cylinders are mounted above a cam shaft. Pumps tend to  be of fixed capacity. Pumps are available for pressures up to 670 bar for flows up to 8 I/s and operate at speeds up to 5000  rpm. Applications for these pumps are the hydraulic systems found in all parts of in- dustry. The list below is not  exhaustive: •  Agricultural machinery •  Coal mining •  Crude oil production •  Direct-acting process pumps •  Earth moving  equipment •  Machine tools •  Power transmission •  Raw steel products •  Steelmaking Pumps are now available with axial  piston designs in ceramics for use on water and seawater. Low cost offshore develop- ments are in seabed mounted wellheads  with pipelines linking to centralised facilities. Wellhead hydraulic requirements ser- viced by seawater would have no leakage  or liquid shortage problems. Optimising proportions and material combinations to reduce wear and extend operational life is a  continuing priority. Current designs are limited to 160 bar. 1.5.13 Inline piston pumps Piston pumps are similar to plunger  pumps but have a moving seal on the piston. Piston pumps can be single acting or double acting. Double acting pumps have a  stuffing box similar to a plunger pump stuffing box. The piston is driven by means of a rotating crank or eccentric,  connecting rod and crosshead, see Figure 1.90. This Figure shows the use of Mission valves, the most popular type, and has an  internal single reduction gear set built into the crankcase. (See Figure 1.96 for other valves for plunger pumps.)  Applications for piston pumps are wide ranging but duties on drilling rigs handling drill mud and crude oil production far ex-  ceed all others. Piston pumps are ideal for viscous liquids and handling solids which are not abrasive. Special pumps have  been developed for pumping coal. Coal ca gh suction pressure; over 135 bar in some  applications. High suction pressure is defined as a suction pressure which produces a plunger load higher than a prescribed  limit. Some pump designs use 5% as the benchmark, others 20%. High suction pressure must be con- sidered in the selection  process because it affects volumetric and mechanical efficiency. Mechanical efficiency is reduce be- cause of increased  friction losses during the suction sroke. Plunger pumps should not be used in self-priming applications unless the  manufacturer has fully approved the operating con- ditions. Pumping air or vapour corresponds to 100% cavitation and will do  no damage. The damage will occur during the transi- tion from 100% cavitation to zero cavitation. Very high internal pressures  may be created, far higher than the normal dis- charge pressure. This will lead to increased wear and component failure due to  fatigue. The most common failures are: •  High bearing wear and failure of bearing shells or bail/ rollers •  Crankshaft  failure •  Crosshead failure •  Very short packing life •  Liquid end stud/bolt fracture •  Suction valve failure, rapid seat  wear •  Cylinder cracking Plunger pumps are capable of working at the highest pres- sures, with the most difficult liquids and  with abrasive solids if necessary. Pressures to 500 bar are common in process appli- cations. Discharge pressures of 1000 bar  Figure 1.97 A cam-operated vertical plunger pump Courtesy of National Oilweli Varco   descaling and high pressure water jetting. Pumps for 3500 bar are available to order. Flows up to 500 m3/h are possible at  pressures up to 100 bar.  In addition, plunger pumps are used for low pressure, difficult applications where good suction capabilities are required and  low speed is essential to reduce wear. Tank bottom residues, sediment, industrial and municipal wastes and sewage are typi-  cal mixtures handled by the original vertical pump design, shown in Figure 1.92.  The crankcase as stable from zero to maximum. The high pressure d-a air-driven pump can be used for other applications such as clamping or  water cutting. Special versions are available to work with refrigerants. NOTE: Investigate the availability of high pressure  pipework and fittings before spending a lot of time designing a system for over 420 barg. Pulsation dampers, or the size of  pulsation dampers, may be an additional prob- lem.  Air-driven pumps are also popular for barrel and container emp- tying applications. It is possible to construct a long,  slender pis- ton pump with a cylinder outer diameter small enough to pass through the standard connection on drums and  intermediate bulk containers (IBCs). Pumps are manufactured in standard diameters and lengths as shown in Table 1.5.  Pump diameter mm   27   34   42   76   84   120   Standard lengths mm   490   210,460,1000,1090   230,1020   225,1170   278,335,1000,1015   330,1110   327,1100   396,1130   465,900   Flow range I/min   2, 7.5   4, 6.7   6, 10.5   7.4, 12.5   14, 24   14,24   20,33   31, 52   Table 1.5 Standard sizes of container emptying pumps   Pumps normally have ball valves so viscous liquids can be han- dled, up to 10000 Poise. Spring-loaded chevron packing is an  option to reduce routine maintenance. Pistons have PTFE rings. Most pump parts are 304 or 316 stainless steel. Pumps have  ratios between 1 and 33 to allow pressures up to 150 barg to be developed. Pressure pulsations may be a problem when pumps  operate at high speed and high pressure. Some pump manufacturers produce their own pulsation dampers.  Hydraulically-driven pumps are used for two vastly different types of application; high viscosity/large solid mixtures and  high pressure liquids. Hydraulically-driven reciprocating pumps are  PUMPING MANUAL International                          47   1 Pump types   ideal for very arduous applications because the pumps can op- erate at very low speed to reduce wear and pressure pulsation  problems.  One of the most popular applications for hydraulically-driven pumps is handling cement on building sites. For viscous liquids  with small solids a standard double-acting horizontal piston liq- uid end can be used driven by a double-acting hydraulic  cylin- der. Hydraulic power is provided by a power pack. An axial pis- ton swashplate pump is normally used to provide a  variable hydraulic flow from a constant speed pump. Control is via a small programmable logic controller (PLC). Process liquid  valves can be flexible elastomer for low pressure pumps, plate, tapered plug or ball. Cylinder liners and piston rods are nor-  mally protected by a substantial layer of chrome plate. Other coatings can be applied for improved wear/abrasion resis- tance.  A single-acting piston liquid end can be used for ex- tremely viscous liquids. A plunger pump liquid end, with actu- ated  valves, can be used for the most abrasive products or very large solids. This style of horizontal pump is very versatile  because the stroke length is easily adjustable to produce larger or smaller pumps.  Hydraulically-driven pumps are produced in low pressure, 2barg, and higher pressures, up to 160 barg, versions. There are no  practical limits for the design pressures of special pumps. Standard pumps can maintain flows of 480 m3/h. NPIPr can be as low  as 0.1 bar. In applications where the process me- dium does not flow easily a screw conveyor can be attached to the pump  suction to provide a positive supply. Special provision can be made for self-priming and dry running. Avertical plunger pump  version is very popular in the sewage treatment industry; these pumps are built as simplexes and duplexes. Standard pumps can  handle 216 m3/h at pressures up to 20 barg.  A special version of the hydraulically-driven pump uses the pro- cess liquid as the motive power to produce a higher pressure.  This type of pump is usually called an intensifier. Intensifiers are used to produce the highest possible pressures, 10300  barg. Intensifiers are used in water cutting applications and in oil well servicing applications.  Many pump users think the steam pump is obsolete and has been replaced by modern technology; this is not completely correct.  New steam pumps are still installed in refineries and on board ships. Steam pumps are very good with high viscosity liq- uids  and for tank emptying duties. Steam pumps, like other d-a pumps, can operate extremely slowly and can have very low NPIPr.  Also, at low speed the d-a pump can handle liquid/gas or liquid/vapour mixtures if the differential pressure is low. Steam  pumps are ideal for tank stripping. Large tanks would be emp- tied quickly by a centrifugal pump. As the tank level reduced  the NPSHa for the pump would reduce. At some point the centrifu- gal pump would cavitate and have to stop. A steam pump is  then used to strip the dregs out of the tank. Steam pumps are usually double-acting piston pumps and are built as simplexes or  duplexes; horizontal and vertical styles are available. Hori- zontal pumps are preferred for land installations and some  marine users prefer vertical pumps.  Figure 1.107 shows horizontal duplex piston pump with dis- charge pulsation damper. The suction connection, at the bot- tom,  and the valve access covers are easily seen. Pumps are capable of flows up to 545 m3/h and rated pressures are from 10 to 55  barg. Steam conditions do not normally exceed 17barg and 380 °C. Figure 1.108 shows a special quadruplex plunger steam pump  for a high pressure application. Pumps of this style are capable of 500 barg.  1.5.21 Non-metallic positive displacement pumps   Positive displacement pumps are often described as 'low-flow, high-pressure' pumps; this description completely ignores the  pumps which are designed for 2.5 barg discharge pressure. In  Figure 1.107 A typical horizontal duplex steam pump Courtesy of Dawson Downie Lamont Ltd   Figure 1.108 A special horizontal quadruplex plunger steam pump Courtesy of Dawson Downie Lamont Ltd   simplistic terms, high-pressure pumps cannot be non-metallic because non-metallic materials are not strong enough to sup- port  the stresses generated. However, non-metallic materials do possess exceptional corrosion resistance. Providing the strength  limitations are strictly observed, low strength materials can make very useful pumps. The low strength of materials can be  partially compensated by external reinforcing. This tech- nique is used on centrifugal pumps, see Figures 1.52 and 7.9 in  Chapter 7. External reinforcing substantially increases the al- lowable forces and moments which can be applied by piping.  Metallic pumps can have wetted surfaces coated with non-me- tallic material. These pumps should be considered as a special  case of metallic pumps.  The most popular non-metallic positive displacement pump is the air-operated double-diaphragm pump; this is one of the best  selling pump types of all categories!! Typical casing mate- rials include Acetal, nylon, polypropylene (PP), polyvinylidene  (PVDF) and polytetrafluoroethylene (PTFE). Diaphragms are slightly more complicated. Because of the flexure, fatigue due to  stressing becomes a problem. Popular materials are chloro- prene, neoprene, nitrile rubber, polyurethane, ethylene propyl- ene  diene (EPDM), Santoprene® and fluorocarbon alloys. The diaphragm can be reinforced with fibres, such as nylon mesh, to  increase strength. Diaphragms can be coated, or moulded in layers, so that a good flexible material could have its corrosion  resistance improved. Neoprene can be coated with a Viton ®/PTFE alloy or nitrile rubber faced with PTFE.  48                         PUMPING MANUAL International   1 Pump types   Direct-acting pumps, driven by compressed air, are fairly easy to manufacture without metal components. Pressure ratings would  be much reduced compared to their metallic relatives. Some rotary pd pumps are easy to manufacture from 'plastics' which can  be extruded. Pd pumps don't necessarily require complicated castings. Figure 1.63 shows an external gear pump with a casing  machined from a solid block; this manufac- turing route can be applied to plastic bar of the appropriate size. Other pump  types which are amenable to this treatment in- clude; internal gear pumps, triple-rotor and 5-rotor screw pumps, lobe pumps,  circumferential piston pumps, vane pumps, piston pumps, plunger pumps, syringe pumps and me- tering pumps. The peristaltic  pump is always a non-metallic pump. The only component in contact with the liquid is an elas- tomer tube. The pump structure  is usually metallic, but not normally 'in-contact'. When considering a non-metallic pump for a specific applica- tion, it is  important think about the piping at the same time. Flex- ible pipes, hoses, do not transmit significant forces and mo- ments  to the pump connections. But, flexible pipes do try to straighten out when pressurised. Also they can 'kick' a lot when the  liquid flow pulsates. Non-metallic pulsation dampers are available to alleviate these problems. 1.5.22 Sealless positive  displacement pumps The term 'sealless' is being used irrationally by some pump manufacturers. The original intent of  'sealless' was to describe a pump which did not have a dynamic leak path requiring a dy- namic seal of some description.  Sealless meant a static seal; a stationary boundary. Most pump developments are driven by centrifugal pump requirements and  new ideas are tried on them first. There are two solutions to the 'sealless' problem, canned drive motors and magnetic drives.  Canned motors cannot be used on all applications because the process liquid may dam- age the motor. Magnetic drives can be  used on a wide range of applications. Manufacturers of peristaltic pumps are claiming them to be 'sealless'. This claim is  true to the extent that the pump does not have a rotating shaft seal or a reciprocating rod seal. But! the pump does have a  dynamic seal, the hose! The hose may fail due to wear or fatigue. Static seals don't usually wear and do not suffer from  fatigue problems. The peristaltic pump is a very useful pump but it isn't sealless! (One manufacturer claims his peristaltic  pumps are contactless! Be very wary of pump manufacturers' literature!) Reciprocating pumps cannot be sealless. A diaphragm  pump can be sealless to the same extent as the peristaltic pump; the seal is dynamic. Rotary positive displacement pumps can  be sealless in the same ways as rotodynamic pumps. Canned motor pumps are very rare. Small sliding vane pumps powered by 12 V  DC are used as petrol pumps on some vehicles; this is the only canned motor pd pump seen to date. Some rotary pd pumps are  Figure 1.109 A magnetic drive internal gear pump   able as magnetic drive versions: internal gear pumps (see Fig- ure 1.109), external gear pumps, triple screw pumps and pro-  gressive cavity pumps. Pump materials are not affected. Just one last thought  .....  the jet pump is sealless. Of course it  is a mixer as well. So why not multi-task and save time and money? It can be a heater as well  .....  if you use steam !  Figure 1.109 raises a very interesting question. Why would an exotic shaft seal be necessary if threaded process connections  were adequate?  1.5.23 Hydraulic motors   Most positive displacement pumps can run in reverse and act as a motor. Reciprocating pumps with valves; diaphragm, pis- ton,  plunger; can't run backwards unless there is a major leak- age problem with the valves. Both suction and discharge valves must  be worn to allow this to happen. The pump may not rotate; this depends upon the speed ratio to the driver. Reciprocating pumps  don't usually require a non-return valve in the discharge piping because the internal valves prevent reverse flow. Rotary  pumps can usually run in both directions; not necessarily with the same effectiveness. Whether a pump can operate as a hy-  draulic motor, intentionally or unintentionally, is dependant upon the speed ratio to the driver and the nature of the power  transmission and driver. Many rotary positive displacement pumps are installed without non-return valves and the possibil- ity  of 'turbining' exists. The level of static pressure in the dis- charge system is a critical factor.  Hydraulic motors are used extensively in hydraulic fluid power applications. The most popular styles are vane, gear and pis-  ton. This book is concerned with the process applications of pumps and hydraulic fluid power is mentioned only in passing.  Process applications for hydraulic motors are relatively limited but this is likely to change as the move towards greater  operat- ing efficiency, to reduce energy consumption and energy costs, concentrates attention on process detail design.  Hydraulic mo- tors are used in applications where the inclusion produces obvi- ous operational advantages.  One area of pump use has adopted hydraulic motors to im- prove operations, well drilling, most notably oil well drilling.  Drill- ing rigs, for oil wells, use 'mud' to lubricate the drill bit and to re- move cuttings/debris from the hole bottom. The  mud is pressurised by pumps on the rig. The potential energy of the mud can be used to drive a motor. Progressing cavity pumps  have been adapted to provide rotary power for the drill bit and other tools, reamers, rereamers and underreamers. These mo-  tors are usually called 'mud motors'.  Mud motors driving drill bits are used for three basic reasons: speed, reach and accuracy. Typically, a mud motor drill head  will penetrate up to four times faster than a drill-string assembly. Tests have been conducted with high pressure mud, 690  barg, so that the rotary drill action can be augmented by high pres- sure jets. Tests showed a speed increase up to eight  times for drilling sandstone and limestone. Tests were very short-term due wear problems experienced by the high pressure  nozzles. Remember, drilling mud is abrasive; it's not like clean water. Faster drilling speeds reduce production costs and  allow a rig to drill more wells. Mud motors have been used to drill much lon- ger angled and horizontal wells. This allows  more reservoir to be coupled to a central base; cheaper installation. Mud motor assemblies have been controlled to within +1.5  metres; this might have been at the end of a 8000 metre well. Instrument packages can analyse the mud, close to the drill bit,  and con- firm the pressures and formation composition.  Mud motors must be designed to fit inside standard well casing bores. Typical sizes range from 1~6" (36.5 mm) to 11~" (286  mm). Motor assemblies range from about 2.2 m long to 7 m. Stator designs follow the pump pattern, normal variable thick- ness  elastomer and constant thickness elastomer. Power  PUMPING MANUAL International                         49   1 Pump types   transmission from the rotor is accomplished by flexi-shaft, sometimes in titanium, or a shaft with two sealed flexible cou-  pling. Bearings, radial and thrust, are sealed and lubricated. Tests have been conducted with diamond-faced thrust bear- ings  to cope with higher loads and produce smaller bearings. Typically, motors run with a 15 to 35 bar differential pressure and  rotate, when loaded, between 50 and 150 rpm. A small mo- tor will require about 10 m3/h.  1.6 Other pump types 1.6.1 Ejectors Jet pumps or injectors operate by converting the potential en- ergy of a motive fluid to  kinetic energy of the driving jet thus re- ducing the static pressure and moving the pumped liquid di- rectly without the  assistance of moving mechanical components. The motive medium can be gas, air for example, steam or a liquid, e.g. water.  There are different combinations of motive-pumped media. The most usual are water/steam - air, water/steam - water, air-  water, water- water. Jet pumps work- ing with gases as the pumped medium are called ejectors. By applying the momentum  equation, equation 3.7, in Chapter 3, to a c  in potentially hazardous atmo- spheres and air motors. The pump design for fluid liquids is of  the centrifugal or mixed-flow type whilst screw or progressing cavity pump types are used for viscous liquids. Pumps are ca-  pable of flows up to 14.5 m3/h and heads of 25m. Semi-rotary hand pumps and rotary hand pumps When power of any type is not  available muscle-power must be used. Semi-rotary hand pumps are similar to vane pumps but with valves. One set of valves are  in the vanes, the others in the casing. On the filling stroke, the valve in the vane opens to allow liquid to change sides.  When the vane is moved in the opposite direction, the liquid is squeezed in the casing opening the cas- ing valve. Pumps  normally have two chambers providing a suc- tion and discharge stroke for each action. Semi-rotary hand pumps have good  suction lift capabilities and work well with fairly viscous liquids. As well as barrel-emptying applications, these pumps are  often used for priming lube and fuel oil sys- tems on large engines, pumps, compressors and other equip- ment.  1.6.3 Hydraulic-ram pumps The principle of a hydraulic-ram is illustrated in Figure 1.115. The supply line must be of a  certain length, usually 5 to 20 m. The air vessel is located 0.5 to 3 m below the water surface and pumps water up to a higher  level, usually a tank for fresh water supply. If the waste valve suddenly closes, the mass of water in the sup- ply pipe is  subjected to rapid deceleration which causes a rise in pressure at the waste valve and delivery valve. The delivery valve  opens and water is forced up into the air vessel. When the water in the supply line momentarily changes direction, a partial  vacuum is created at the waste valve causing it to open, where- upon water begins to flow in the supply line again. The action  of water flowing through the waste valve causes it to close again and the cycle is repeated. The following applies for the  hydraulic ram: Q~ .Hp = q-Qe .Hd
