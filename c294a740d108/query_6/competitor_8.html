J. Paul Guyer, P.E., R.A., Fellow ASCE, Fellow AEI
COURSE CONTENT
1. INTRODUCTION
This is an introductory course in fire protection engineering for all of the members of the
building design team. The architectural, civil, structural, mechanical and electrical
features of buildings and their related infrastructure are all affected by the principles of
fire protection engineering. Engineers need to know how fire safety requirements affect
the design work they do in their individual technical disciplines. This course will tell you
about the principle requirements of fire safety in building design, show you some
illustrative examples, and direct you to specific codes and other technical resources you
will need to efficiently and effectively incorporate fire protection considerations in your
building designs. This is a course that will broaden your skills, add value to your career,
and allow you to design safe and cost-effective buildings and related infrastructure for
your company, agency, clients and the public.
As you go through this course, and in your engineering practice, keep some points in
mind:
• Fire protection engineering is almost completely code-and-regulation driven.
With the exception of the hydraulic principles of fluid flow in sprinkler system
pipes, there is little in the field that is theoretical in nature. This means that in
order to find out what you need to do in a given situation you will almost always
need to refer to a code or regulation.
• Fire safety is a highly regulated enterprise. This means that your building
designs will be meticulously reviewed by the regulatory authorities. In the case

• Managing fire department reviews requires a special level of diplomacy and care.
Absent the fire department approval, your project will never get built. As fire
departments have developed over the years, the individuals who review drawings
for new construction are almost always individuals who began their careers as
fire fighters. Rarely is a professional engineer the reviewer at the fire
department. Occasionally a fire department reviewer may feel a bit defensive
when dealing with a professional engineer during the review process. The only
way to manage this type of situation is to take special care to clearly explain your
design in terms as non-technical as possible, deferentially accept the fact that the
fire department reviewer controls the fate of your project, and just plain be
diplomatic.
• Keep in mind that this course is only an introductory overview of fire protection
engineering. As noted above, in practice you must always be guided by the
codes and regulations applicable to your project in your local jurisdiction.
References to specific codes and regulations in this course are for illustration
only.

3. BUILDING MATERIALS AND DESIGN
Basic Criteria
Conform building construction to fire resistance requirements, allowable floor areas,
building height limitations, and building separation distance requirements of the
International Building Code (IBC). These include:
• Egress and Safety to Life. Comply with National Fire Protection Association
(NFPA) 101 for building construction related to egress and safety to life. For
conflicts between the IBC and NFPA 101 related to fire resistance rating,
consider favoring NFPA 101.
• Partitions. IBC fire resistance requirements for permanent partitions do not
apply to non-bearing partitions. For fire resistance ratings of non-bearing
partitions comply with NFPA 101. Occupancy separation must comply with the
“Required Separation of Occupancies” table in the IBC.
• Type of Construction. Follow the requirements of the IBC to determine the
permitted types of construction, except where approved by local authority Type V
(wood) roofs may be constructed on buildings of Type I or II construction
provided that they are separated from all other areas of the building by horizontal
2-hour concrete or masonry fire resistive construction. Such roofs will not require
sprinkler protection but will require draft stops to divide the spaces into areas not
exceeding 3000 SF, with self-closing and latching access doors of similar
construction in the draft stop where there is no other means of access to the
area.
• Separation Between Buildings. Use the IBC to determine required separation
distances between buildings.
Fire Areas
Conform to the IBC.
Height Limitations
Conform to the IBC.

Limiting Interior Fire Spread
• Door Openings: Door openings, in fire resistive construction, must be protected
in accordance with NFPA 80, Fire Doors and Fire Windows. Fire door
assemblies are required on each side of the door opening in 4-hour fire walls
when openings are fitted with 3-hour rolling or sliding fire doors. Use fire doors
listed by Underwriters Laboratories Inc. (UL), FM, or a nationally recognized
testing laboratory (NRTL). Do not modify approved fire doors in the field. Local
fabrication of fire doors is not permitted.
• Penetrations: The protection of ducts at point of passage through firewalls must
be in accordance with NFPA 90A, Installation of Air-Conditioning and Ventilating
Systems, and/or NFPA 90B, Installation of Warm Air Heating and Air-
Conditioning Systems. All other penetrations, such as piping, conduit, and
wiring, through firewalls must be protected with a material or system of the same
hourly rating that is listed by UL, FM, or a NRTL.
Means of Egress
• Requirements: Comply with the requirements of NFPA 101.
• Means of Egress Marking: Mark means of egress in accordance with NFPA
101. Signs must have lettering on an opaque background. Internally illuminated
signs must be light emitting diode (LED) type, electroluminescence (LEC), or cold
cathode type. Incandescent fixtures are not permitted except existing fixtures,
which may remain in use. Radioluminous exit signs are not permitted.
Photoluminescent exit signs and egress path marking is permitted only where
provided with a reliable external illumination (charging) source providing a
minimum illumination of 54 lux (5 foot-candles) of unfiltered fluorescent light.
Interior Finish
• Interior Wall and Ceiling Finish: Wall and ceiling finishes and movable
partitions must conform to the requirements of NFPA 101 for interior finishes.
Drop-out ceilings are not permitted.

• Plenums. Plenums may be used as an integral part of an air handling system
only if they conform to the requirements of NFPA 90A. Under no circumstances
may combustible materials be located within the plenum space. Electrical wiring
passing through the space, including telephone and communication wiring, must
be plenum rated or must be in metal conduit. Rooms or areas that form a
plenum space or that are used as a plenum must not be occupied for any
purpose except during repairs or maintenance operations to the air handling
equipment.
• Smoke and Heat Vents. Smoke and heat vents may be considered in buildings
where a high rate of heat release is anticipated during a fire. In buildings without
automatic sprinklers, smoke and heat vents must be arranged to operate
automatically in accordance with NFPA 204, Smoke and Heat Venting. In
buildings with automatic sprinkler protection, smoke and heat vents must be
arranged to operate in the manual mode only. Skylights are the preferred
method of providing manual smoke and heat vents.
Plastic Pipe and Conduit
Penetrations by plastic pipe or conduit through fire-rated walls, partitions, shafts, and
floors must be fire-stopped by an approved or listed method in accordance with ASTM
E814, Standard Test Method for Fire Tests of Through-Penetration Fire Stops or UL
1479, Fire Tests of Through-Penetration Firestops. Plastic pipe and conduit must not be
installed in exit stair enclosures, or in air plenum spaces unless specifically listed for
that application.
Fire Retardant Treated (FRT) Plywood
Use of FRT plywood is prohibited except as permitted by the IBC or local authority.
FRT plywood must not be used in any part of the roof or roofing system.

4. WATER SUPPLY FOR FIRE PROTECTION
Factors Influencing the Water Demand for Sprinklers
The water demand required for sprinkler protection depends upon occupancy,
discharge density, design area, and type of sprinkler system (wet or dry), type of
construction, and other building features.
Water Demand for Sprinklers
• The water demand required for sprinklers must be determined from Figure 4.
(Figure 4 is, as always, for illustration purposes only. Applicable codes and
regulations must be used.)
• Design densities indicated in Figure 4 are minimum densities, and each
• sprinkler in the design area must discharge at least the flow rate required to
• produce the stipulated density.
• Design areas shown in Figure 4 are the hydraulically most remote areas. Hose
streams are needed concurrently with sprinkler discharge in order to effect final
extinguishment or to wet down adjacent structures.

domestic, industrial, and other demands must be added to these requirements to

• Total Storage Capacity. The total supply stored for fire protection purposes
must be sufficient to meet the maximum required fire flow demand for the
durations specified in applicable codes and regulations.
• Reduction in Storage Capacity. In computing the fire protection storage
requirement, a reduction in storage capacity is acceptable if an adequate

reliability of the makeup facility, its sustained flow capacity, its method of

must reach required volume during normal consumption within 48 hours, and
within 24 hours curtailing normal consumption.
Water for Fire Protection
One or more of the following reliable means shall provide water to an installation for fire
protection:
• Multiple connections to looped or gridded public water distribution system(s)
arranged so that during any single-point failure, at least 50% of the maximum
required fire flow demand plus 100% of domestic demand can still be supplied to
the activity / facility.
• A single connection to a public water distribution system, plus on-site storage
that is adequate to supply domestic demand for 24 hours plus the maximum
required fire flow demand in the event the connection to the public system is lost.
• One or more on-site sources, such as wells or open bodies of water, with treated
water storage capacity adequate to supply domestic demand for 24 hours plus
the maximum required fire flow demand.

Pumps for fire protection must have adequate capacity with reliable power and water
supply. This equipment must conform to requirements of NFPA 20, Standard for the
Installation of Stationary Pumps for Fire Protection. Fire pumps, drivers, and other
equipment including automatic accessories must be listed by UL, approved by FM, or
listed or classified by an NRTL.

required fire flow in case of a single break. Dead-end mains must be avoided.
Distribution systems must be designed in accordance with American Water
Works Association Manual M31 Distribution System Requirements for Fire
Protection, NFPA 24, Installation of Private Fire Service Mains and Their
Appurtenances.

4. FIRE EXTINGUISHING SYSTEMS
Water Flow Testing
Conduct water flow tests, in accordance with the procedures contained in NFPA 291, to
determine available water supply for the water-based fire extinguishing systems.
Automatic Sprinkler Systems
• Characteristics. Properly engineered and installed automatic sprinkler systems
are designed to detect the presence of fire, activate both local and remote (fire
department) alarms, and distribute water in sufficient quantity to either control or
extinguish the fire.
• Design Requirements. Sprinkler systems must use equipment and devices
listed by a nationally recognized testing laboratory (NRTL).
• Sprinkler Density and Hose Stream Requirements. Building and structures
requiring sprinkler protection must be provided with sprinkler systems that are
designed using the Area/Density Method of NFPA 13.
• Quick Response Automatic Sprinklers. The use of quick response automatic
sprinklers (QRAS) is limited to wet pipe systems.
• Hydraulic Calculations. New sprinkler systems protecting areas of 1,500 ft²
and greater must be designed using hydraulic calculations. Use of pipe schedule
designs is discouraged for any sprinkler system. Calculations must follow the
format of NFPA 13. Pipe friction losses and equivalent lengths of pipe for fittings
and valves must be in accordance with NFPA 13.
• Sprinkler Coverage. In buildings protected by automatic sprinklers, sprinklers
must provide coverage throughout 100 percent of the building except as
permitted by NFPA 13. This includes, but is not limited to, telephone rooms,
electrical equipment rooms, boiler rooms, switchgear rooms, transformer rooms,
and other electrical and mechanical spaces. Coverage per sprinkler must be in
accordance with NFPA 13.

be a combination sprinkler/standpipe riser in at least two stairwells that are

electronic equipment because the gases do not damage the equipment. A major
challenge with gas extinguishing systems, however, in facilities where people are

because, coupled with an annunciation (alarm) system, provided a safe environment
that allowed time for personnel to evacuate the fire zone. Regrettably, Halon 1301 was

Fixed wet chemical systems are suitable for protection of certain types of special
occupancies, hazards, and facilities, such as cooking surfaces, cooking exhaust
systems, and dip tanks. Wet chemical systems must conform to NFPA 17A, Wet

Clean Agent Fire Extinguishing Systems
Clean agent fire extinguishing systems are suitable for protection of certain types of
special occupancies, hazards, and facilities. Clean agent fire extinguishing systems are
not a substitute for required automatic sprinkler systems. Clean agent fire
extinguishing systems must conform to NFPA 2001, Clean Agent Fire Extinguishing
Systems.
Water Mist Fire Protection Systems
Water mist fire protection systems are suitable for protection of certain types of special
occupancies, hazards, and facilities. Water mist fire protection systems are not a
substitute for required automatic sprinkler systems. Water mist fire protection systems
must conform to NFPA 750, Water Mist Fire Protection Systems.

5. FIRE ALARM SYSTEMS
Fire Alarm Reporting Systems
Fire alarm reporting systems are reporting systems that connect the building fire alarm
control panel(s) to the fire department. Required systems are to be digital, telephonic,
radio, or supervised conductor types. Consider compatibility of extensions of fire
reporting systems with existing equipment. Alarm reporting systems must conform to
NFPA 72, National Fire Alarm Code, NFPA 70, National Electric Code.
Fire Alarm Evacuation Systems
Fire alarm evacuation systems must be provided in the following locations:
o Buildings required by NFPA 101.
o Buildings requiring automatic detection or suppression systems.
These systems consist primarily of initiating devices and notification appliances.
Manual pull stations must be provided where fire alarm evacuation systems are
required. Automatic alarm initiating devices such as detectors and water flow alarms
must be connected to these systems when provided. Fire alarm systems must be
connected to a central alarm location, fire department, or alarm monitoring location.
Building fire alarm evacuation systems must be installed in accordance with NFPA 72.
Fire alarm systems must be independent, stand-alone systems that are not an integral
part of a security, an energy monitoring and control system (EMCS), or other system,
except that a fire alarm system may be combined with a building mass notification
system or with a combination building mass notification and public address system.
Fire alarm systems may be connected to security systems or an EMCS for monitoring
purposes only, but must in no way rely on any components of those other systems for
operation. Wireless interior fire alarms are not permitted.

6. SPECIAL OCCUPANCIES AND HAZARDS
There are many special occupancies and hazards that require special fire protection
features are required by applicable codes and regulations. Only a few are discussed
here, for illustration purposes.
Food Preparation Areas
• Hood and duct systems for commercial cooking equipment that produces smoke
or grease-laden vapors must comply with NFPA 96, Ventilation Control and Fire
Protection of Commercial Cooking Operations. Limit kitchen-extinguishing
systems to wet chemical or automatic sprinklers installed in accordance with
NFPA 96. Install fire suppression systems that sound a general building fire
alarm and transmit a signal to the fire department or to a constantly monitored
location.
• Areas, other than dwelling units, that are provided with residential type range top
cooking surfaces must be equipped with an approved residential range top
extinguishing system. The range top extinguishing system must be connected to
the building fire alarm system to sound a general building fire alarm and must
automatically shut off all sources of fuel and electric power that produce heat to
the equipment being protected by that unit.
Medical Facilities
Medical facilities include hospitals, composite medical facilities, ambulatory health care
centers, occupational health clinics, outpatient clinics, dental clinics, flight medicine
clinics, medical logistics facilities, biological safety and medical laboratories, and similar
facilities. There are many special requirements for medical facilities called for by
applicable codes and regulations. A discussion of these requirements is far beyond the
scope of this introduction to fire protection engineering principles.

Electronic Equipment Installations
• These areas include major automatic data processing (ADP) areas,
communication centers, command and control systems, and other mission critical
systems. Incidental electronic equipment such as word processing stations,
printers, and systems; desk top computers; office automation systems; individual
data output stations (e.g., printers, etc.); individual computer work stations;
telephones; video conference centers; administrative telephone rooms;
reproduction equipment; and similar equipment do not require protection under
this section.
• Construct and protect electronic equipment installations in accordance with
NFPA 75, Protection of Information Technology Equipment.
• Electronic equipment installations must be located in buildings protected by wet-
pipe automatic sprinklers. Provide complete coverage throughout the building
including electronic equipment areas. Protect electrical equipment installations
by disconnecting the power upon activation of the fire protection system.
• Consideration may be given to the use of a supplementary clean agent fire
extinguishing system inside the electronic equipment units or a total flooding
system for the room and raised floor. Supplementary clean agent fire
extinguishing systems will augment the wet-pipe automatic sprinkler system and
will not be considered as a substitute.
• Power and communication (data) cabling installed in spaces above ceilings or
below raised floors must be plenum rated or installed in metallic conduit. If this
cannot be achieved, the spaces must be protected by an automatic fire
suppression system.

8. OCCUPANCY HAZARD CLASSIFICATION SYSTEM
The principal occupancy classifications are light hazard, ordinary hazard, and extra
hazard. Listed below are the classifications with examples of common occupancies
listed under each. The basic hazard classification of occupancy does not define the fire
hazard present in all areas of that occupancy. If more hazardous processes or areas
exist within a given occupancy, protect these areas in accordance with the fire
protection requirements pertaining to the hazard classification of that area. Determine
the classification for unlisted occupancies from the definitions or by comparison with
one of the listed occupancies.
Light Hazard Occupancies
Occupancies or portions of occupancies where the quantity and combustibility of the
contents are low and fires with relatively low rates of heat release are expected. Small,
scattered amounts of flammable liquids in closed containers are allowable in quantities
not exceeding 5 gal per fire area. Examples of this classification include: offices,
churches, gymnasiums, and child development centers.
Ordinary Hazard, Group 1
Occupancies or portions of occupancies where combustibility is low, quantity of
combustibles is moderate, stockpiles of combustibles do not exceed 8 ft, and fires with
moderate rates of heat release are expected. Modest, scattered amounts of flammable
liquid, in closed containers are allowable in quantities not to exceed 20 gal per fire area.
Examples of this classification include: kitchens and bakeries, sheet metal shops,
laundries, parking garages, theatres and auditoriums.
Ordinary Hazard, Group 2
Occupancies or portion of occupancies where quantity and combustibility of contents is
moderate, stockpiles do not exceed 12 ft, and fires with moderate rate of heat release
are expected. Moderate, scattered amounts of flammable liquids in closed containers
are allowable in quantities not exceed 50 gal per fire area. Small amounts of flammable
liquids may be exposed as required by normal operations. Examples of this

Special Occupancies
Special occupancies are facilities or areas that cannot be assigned a specific
classification because of special protection requirements. Refer to the appropriate
NFPA codes and standards. Examples of this classification include: warehouses and
aircraft hangars.

12. AN AFTERWORD: THE NFPA/ICC ISSUE
The NFPA was formed in 1896 by a group of insurance companies for the purpose of
standardizing the new market of fire sprinkler systems. The scope of the NFPA's
activities expanded over time to also include building electrical systems and other
aspects of building design and construction.
The International Code Council (ICC) was established in 1994 as a nonprofit
organization dedicated to developing a single set of comprehensive and coordinated
national model construction codes. The founders of the ICC are Building Officials and
Code Administrators International, Inc. (BOCA), International Conference of Building
Officials (ICBO), and Southern Building Code Congress International, Inc. (SBCCI).
Since the early part of the last century, these nonprofit organizations developed the
three separate sets of model codes used throughout the United States. Although
regional code development has been effective and responsive to our country’s needs,
the time came for a single set of codes. The nation’s three model code groups
responded by creating the International Code Council and by developing codes without
regional limitations the International Codes.
Notably absent from the group of the IBC developers was NFPA. NFPA joined ICC in a
collective effort to develop the International Fire Code (IFC). This effort however fell
apart at the completion of the first draft of the document. Subsequent efforts by ICC and
NFPA to reach agreement on this and other documents have been unsuccessful.
The result is all sorts of conflicts and confusion in the industry. For example Figure 8
shows there is not even agreement on basic building construction type definitions
between the ICC’s IBC and NFPA 220 (as well as the earlier widely used Uniform
Building Code (UBC).
