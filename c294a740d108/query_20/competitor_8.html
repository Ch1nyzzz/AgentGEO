</span><p data-dcnode-id="407"></p><h2 class="soc-headline" data-dcnode-id="403" data-font-size-phone="20px" data-font-size-regular="40px" data-font-size-tablet="30px" style="color:#000;font-size:40px;text-align:center;text-shadow:none;margin-top:25px;margin-bottom:50px;"><span data-dcnode-id="406" instrument_node="">INSTALLATION, REPAIR &amp; TESTING OF ALL TYPES OF FIRE SUPPRESSION SYSTEM</span><br data-dcnode-id="405"><span data-dcnode-id="404" instrument_node="">
</span></h2><p data-dcnode-id="402"></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="400"></p><div class="soc_one_half" data-dcnode-id="394"><hr data-dcnode-id="399" style="display:block;height : 0px; margin-top : 50px; "><span data-dcnode-id="398" instrument_node=""> </span><img class="aligncenter" data-dcnode-id="397" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fosh.com.my/wp-content/uploads/2021/02/FSS1-CO2.jpg&amp;raw" width="100%"><span data-dcnode-id="396" instrument_node=""> </span><hr data-dcnode-id="395" style="display:block;height : 0px; margin-top : 50px; "></div><span data-dcnode-id="393" instrument_node=""> </span><div class="soc_one_half soc_last" data-dcnode-id="359"><p data-dcnode-id="392"></p><span data-dcnode-id="391" instrument_node="">
</span><h4 data-dcnode-id="388"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Carbon Dioxide (CO2) Fire Suppression System</span></strong></h4><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">This system takes advantage of the high density level of carbon dioxide to rapidly suppress fires. If your business houses critical electrical and electronic equipment, this is for you.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="360"><strong data-dcnode-id="380"><span data-dcnode-id="383" instrument_node="">Commonly install to protect:</span><br data-dcnode-id="382"><span data-dcnode-id="381" instrument_node="">
</span></strong><span data-dcnode-id="379" instrument_node="">MSB Room, HV Room, LV, Room, TNB Room, Genset Room</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">
</span><strong data-dcnode-id="373"><span data-dcnode-id="376" instrument_node="">Advantages:</span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
</span></strong><span data-dcnode-id="372" instrument_node="">1. Lowest price among all fire suppression system</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
</span><strong data-dcnode-id="366"><span data-dcnode-id="369" instrument_node="">Disadvantages:</span><br data-dcnode-id="368"><span data-dcnode-id="367" instrument_node="">
</span></strong><span data-dcnode-id="365" instrument_node="">1. Not suitable for normally occupied rooms as the CO2 will deplete oxygen in the room</span><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">
2. CO2 emission to the environment. Increase greenhouse effect</span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">
3. Standard cylinder size. More challenging to be installed at upper level floors without lift </span></p></div><div class="soc_clearboth" data-dcnode-id="358"></div><p data-dcnode-id="357"></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="355"></p><hr data-dcnode-id="354" style="display:block;height : 0px; margin-top : 25px; "><p data-dcnode-id="353"></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="351"></p><div class="soc_one_half" data-dcnode-id="347"><span data-dcnode-id="350" instrument_node=""> </span><img class="aligncenter" data-dcnode-id="349" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fosh.com.my/wp-content/uploads/2021/02/FSS2-FM200.jpg&amp;raw" width="100%"><span data-dcnode-id="348" instrument_node=""> </span></div><span data-dcnode-id="346" instrument_node=""> </span><div class="soc_one_half soc_last" data-dcnode-id="312"><p data-dcnode-id="345"></p><span data-dcnode-id="344" instrument_node="">
</span><h4 data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">FM-200 Fire Suppression System</span></strong></h4><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Pressurized with nitrogen to 500 PSI it rapidly extinguishes a fire through a combination of heat absorption and some chemical interference with the flame. If the protection area is normally occupied with working people, this is for you.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="333"><span data-dcnode-id="336" instrument_node="">Commonly install to protect:</span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">
</span></strong><span data-dcnode-id="332" instrument_node="">Control Room, Medical Records Room,</span><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node="">
</span><strong data-dcnode-id="326"><span data-dcnode-id="329" instrument_node="">Advantages:</span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">
</span></strong><span data-dcnode-id="325" instrument_node="">1. Safe in normally occupied room</span><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node="">
2. Small footprints</span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">
</span><strong data-dcnode-id="317"><span data-dcnode-id="320" instrument_node="">Disadvantages:</span><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node="">
</span></strong><span data-dcnode-id="316" instrument_node="">1. Relatively higher cost to the CO2 system</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="313"></p></div><div class="soc_clearboth" data-dcnode-id="311"></div><p data-dcnode-id="310"></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="308"></p><hr data-dcnode-id="307" style="display:block;height : 0px; margin-top : 25px; "><p data-dcnode-id="306"></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="304"></p><div class="soc_one_half" data-dcnode-id="300"><span data-dcnode-id="303" instrument_node=""> </span><img class="aligncenter" data-dcnode-id="302" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fosh.com.my/wp-content/uploads/2021/02/FSS3-Inergen.jpg&amp;raw" width="100%"><span data-dcnode-id="301" instrument_node=""> </span></div><span data-dcnode-id="299" instrument_node=""> </span><div class="soc_one_half soc_last" data-dcnode-id="265"><p data-dcnode-id="298"></p><span data-dcnode-id="297" instrument_node="">
</span><h4 data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Inert Gas Fire Suppression System</span></strong></h4><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">It uses a mixture of naturally available gases, argon and nitrogen as an extinguishing agent and is based in the principle of reducing the oxygen concentration inside the protected hazard until it reaches a level where combustion is no longer supported.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="266"><strong data-dcnode-id="286"><span data-dcnode-id="289" instrument_node="">Commonly install to protect:</span><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">
</span></strong><span data-dcnode-id="285" instrument_node="">Control Room, Medical Records Room</span><br data-dcnode-id="284"><span data-dcnode-id="283" instrument_node="">
</span><strong data-dcnode-id="279"><span data-dcnode-id="282" instrument_node="">Advantages:</span><br data-dcnode-id="281"><span data-dcnode-id="280" instrument_node="">
</span></strong><span data-dcnode-id="278" instrument_node="">1. Safe in normally occupied room</span><br data-dcnode-id="277"><span data-dcnode-id="276" instrument_node="">
2. No greenhouse effect</span><br data-dcnode-id="275"><span data-dcnode-id="274" instrument_node="">
</span><strong data-dcnode-id="270"><span data-dcnode-id="273" instrument_node="">Disadvantages:</span><br data-dcnode-id="272"><span data-dcnode-id="271" instrument_node="">

2. Standard cylinder size. More challenging to be installed at upper level floors without lift </span></p></div><div class="soc_clearboth" data-dcnode-id="264"></div><p data-dcnode-id="263"></p><span data-dcnode-id="262" instrument_node="">

</span><h4 data-dcnode-id="247"><strong data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Kitchen Fire Suppression System</span></strong></h4><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The system releases wet chemical extinguishing agents designed to put out cooking fires. These chemicals react with grease to create a harmless soapy substance that can’t re-ignite. This process protects the hoods, appliances, and plenum areas from the ravages of fire. For added safety, the system also shuts off the electricity and gas powering your commercial kitchen.</span></p></div><div class="soc_clearboth" data-dcnode-id="242"></div><p data-dcnode-id="241"></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="239"></p><hr data-dcnode-id="238" style="display:block;height : 0px; margin-top : 25px; "><p data-dcnode-id="237"></p><span data-dcnode-id="236" instrument_node="">

</span><p data-dcnode-id="226"><span data-dcnode-id="231" instrument_node="">• Dry Chemical Fire Suppression System</span><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">
• Aerosol Fire Suppression System</span><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">
• Water-Mist Fire Suppression System</span></p><span data-dcnode-id="225" instrument_node="">

</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Clearly, there is a wide variety of options to consider when choosing the right fire suppression system for your situation. The right one is for you all depend on the applications you need and the facility, occupants, and materials you have to protect.</span></p><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">FOSH Engineering can help you with all of the ins and outs of fire suppression systems and help you choose the very best one for you.</span></p><span data-dcnode-id="215" instrument_node="">
