"et_pb_module et_pb_text et_pb_text_1 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_light" data-dcnode-id="1813"><span data-dcnode-id="1818" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1815"><h3 class="vc_custom_heading" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">The RIGHT FIRE SUPPRESSION AVOIDS CAUSING MORE DAMAGE THAN THE FIRE ITSELF.</span></h3></div><span data-dcnode-id="1814" instrument_node=""> </span></div><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_light" data-dcnode-id="1798"><span data-dcnode-id="1812" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1800"><p class="BasicParagraph" data-dcnode-id="1809"><span data-dcnode-id="1811" instrument_node="">Not all fires should be extinguished using water. To further illustrate the point, water can often cause as much damage as the fire itself. That’s why coordinating the extinguishing agent with the hazard is a critical part of the system design.</span><o:p data-dcnode-id="1810"></o:p></p><span data-dcnode-id="1808" instrument_node=""> </span><p class="BasicParagraph" data-dcnode-id="1805"><span data-dcnode-id="1807" instrument_node="">Keystone has been designing special hazard suppression systems for over 65 years. In fact, it’s how we started. We have the best solutions for protecting specialized capital such as artwork, data storage rooms, commercial cooking operations, and flammable industrial hazards, to ensure zero downtime to your process and zero damage to your assets.</span><o:p data-dcnode-id="1806"></o:p></p><span data-dcnode-id="1804" instrument_node=""> </span><p class="BasicParagraph" data-dcnode-id="1801"><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/shared-files/230770/%3FKeystone-Fire-Suppression-Systems.pdf" rel="noopener noreferrer" target="_blan e_divider" data-dcnode-id="1775" style=""></div><span data-dcnode-id="1774" instrument_node=""> </span></div><div class="et_pb_section et_pb_section_2 et_hover_enabled et_pb_with_background et_section_regular" data-dcnode-id="1338"><span data-dcnode-id="1772" instrument_node=""> </span><div class="et_pb_row et_pb_row_2" data-dcnode-id="1761"><span data-dcnode-id="1771" instrument_node=""> </span><div class="et_pb_column et_pb_column_4_4 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1763"><span data-dcnode-id="1770" instrument_node=""> </span><div class="et_pb_button_module_wrapper et_pb_button_0_wrapper et_pb_button_alignment_center et_pb_module et_had_animation" data-dcnode-id="1765" style=""><span data-dcnode-id="1769" instrument_node=""> </span><a class="et_pb_button et_pb_button_0 et_pb_bg_layout_light" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-systems/fire-suppression"><span data-dcnode-id="1768" instrument_node="">CONTACT US</span></a><span data-dcnode-id="1766" instrument_node=""> </span></div><span data-dcnode-id="1764" instrument_node=""> </span></div><span data-dcnode-id="1762" instrument_node=""> </span></div><div class="et_pb_row et_pb_row_3 et_pb_equal_columns et_pb_gutters1" data-dcnode-id="1699" id="fire-suppression-clean-agent"><span data-dcnode-id="1760" instrument_node=""> </span><div class="et_pb_column et_pb_column_2_3 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1714"><span data-dcnode-id="1759" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_dark" data-dcnode-id="1737"><span data-dcnode-id="1758" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1739"><h4 data-dcnode-id="1743"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A/ nt_node="">Clean agents are colorless, odorless, electrically non-conductive, leave no residue, and are safe for humans. Clean agents interrupt the chemical chain of fire, accelerating suppression and absorbing heat, without damaging sensitive equipment or electronics.</span><o:p data-dcnode-id="1734"></o:p></p><span data-dcnode-id="1732" instrument_node=""> </span><p class="BasicParagraph" data-dcnode-id="1729"><span data-dcnode-id="1731" instrument_node="">Protect high-value assets like data centers or priceless artifacts in a museum with waterless, environmentally friendly clean agents. Keystone proudly designs and installs clean agent fire suppression systems from the industry’s leading fire suppression manufacturer, Kidde Fire Systems.</span><o:p data-dcnode-id="1730"></o:p></p></div><span data-dcnode-id="1727" instrument_node=""> </span></div><div class="et_pb_button_module_wrapper et_pb_button_1_wrapper et_pb_button_alignment_tablet_center et_pb_module" data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node=""> </span><a class="et_pb_button et_pb_button_1 et_pb_bg_layout_light" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-systems/fire-suppression"><span data-dcnode-id="1724" instrument_node="">CONTACT US</span></a><span data-dcnode-id="1722" instrument_node=""> </span></div><div class="et_pb_button_module_wrapper et_pb_button_2_wrapper et_pb_button_alignment_tablet_center et_pb_module" data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node=""> </span><a class="et_pb_button et_pb_button_2 et_hover_enabled et_pb_bg_layout_light" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-systems/fire-suppression/calculator-clean-agent/"><span data-dcnode-id="1719" instrument_node="">ESTIMATE YOUR PROJECT</span></a><span data-dcnode-id="1717" instrument_node=""> </span></div><sp column et_pb_column_2_3 et_pb_column_9 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1616"><span data-dcnode-id="1665" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_dark" data-dcnode-id="1643"><span data-dcnode-id="1664" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1645"><h4 data-dcnode-id="1649"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/fire-protection-system-design-installation/"><span data-dcnode-id="1663" instrument_node="">DESIGN</span></a><span data-dcnode-id="1661" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/fire-protection-system-design-installation/"><span data-dcnode-id="1660" instrument_node="">INSTALL</span></a><span data-dcnode-id="1658" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/fire-system-inspections/"><span data-dcnode-id="1657" instrument_node="">INSPECT</span></a><span data-dcnode-id="1655" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/fire-protection-specialty-testing/"><span data-dcnode-id="1654" instrument_node="">TEST</span></a><span data-dcnode-id="1652" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/emergency-services/"><span data-dcnode-id="1651" instrument_node="">REPAIR</span></a></h4><span data-dcnode-id="1648" instrument_node=""> </span><h2 data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Carbon Dioxide Systems</span></h2></div><span data-dcnode-id="1644" instrument_node=""> </span></div><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_dark" data-dcnode-id="1628"><span data-dcnode-id="1642" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1630"><p data-dcnode-id="1634"><span data-dcnode-id="1641" instrument_node="">CO2 is an odorless, colorless, inert gas that extinguishes fire primarily by reducing oxygen that supports combustion in or around the hazard. It can be designed to flood a space, or to be applied locally to a specific hazard or surface. </span><span data-dcnode-id="1636" style="color:#ff0;"><strong data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">C</span></strong><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">O2 is not recommended for normally occupied spaces,</span></strong></span><span data-dcnode-id="1635" instrument_node=""> except when other means of fire protection are not effective.</span></p><span data-dcnode-id="1633" instrument_node=""> </span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">CO2 requires no cleanup, which greatly reduces cost and downtime. CO2 systems are applicable to a wide range of flammable and combustible materials and are approved for class A, B, and C exposures. Typical hazards protected include printing presses, vaults, open pits, dip tanks, spray booths, ovens, engine rooms, coating machines, hoods and ducts, generators, and flammable liquid storage areas.</span></p></div><span data-dcnode-id="1629" instrument_node=""> </span></div><div class="et_pb_button_module_wrapper et_pb_button_5_wrapper et_pb_button_alignment_tablet_center et_pb_module" data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node=""> </span><a class="et_pb pan></a><span data-dcnode-id="1475" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/fire-protection-specialty-testing/"><span data-dcnode-id="1474" instrument_node="">TEST</span></a><span data-dcnode-id="1472" instrument_node="">&nbsp; &nbsp; &nbsp; </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-services/emergency-services/"><span data-dcnode-id="1471" instrument_node="">REPAIR</span></a></h4><span data-dcnode-id="1468" instrument_node=""> </span><h2 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">DRY CHEMICAL INDUSTRIAL SYSTEMS</span></h2></div><span data-dcnode-id="1464" instrument_node=""> </span></div><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_text_align_center-tablet et_pb_bg_layout_dark" data-dcnode-id="1451"><span data-dcnode-id="1462" instrument_node=""> </span><div class="et_pb_text_inner" data-dcnode-id="1453"><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Dry chemical suppression (IND) systems are a great choice for areas where sprinklers and water are not preferred. They are specifically designed to meet the unique demands of rigorous industrial hazards typically found in manufacturing environments. While dry chemical systems have one of the least desirable cleanup profiles, they are one of the least expensive fire suppression systems to install and maintain.</span></p><span data-dcnode-id="1459" instrument_node=""> </span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">IND systems offer the choice of two dry chemical agents, ABC powder and BC powder. ABC is a multipurpose agent and can be used for Class A hazards like wood, paper, and other ordinary combustibles. BC is most effective on Class B flammable liquid fires and Class C electrical fires.</span></p><span data-dcnode-id="1456" instrument_node=""> </span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">&nbsp;</span></p></div><span data-dcnode-id="1452" instrument_node=""> </span></div><div class="et_pb_button_module_wrapper et_pb_button_13_wrapper et_pb_button_alignment_tablet_center et_pb_module" data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node=""> </span><a class="et_pb_button et_pb_button_13 et_hover_enabled et_pb_bg_layout_light" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-systems/fire-suppression"><span data-dcnode-id="1449" instrument_node="">CONTACT US</span></a><span data-dcnode-id="1447" instrument_node=""> </span></div><span data-dcnode-id="1445" instrument_node=""> </span></div><span data-dcnode-id="1443" instrument_node=""> </span></div><div class="et_pb_row et_pb_row_11 nitro-offscreen" data-dcnode-id="1429"><span data-dcnode-id="1441" instrument_node=""> </span><div class="et_pb_column et_pb_column_1_2 et_pb_column_19 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1433"><span data-dcnode-id="1440" instrument_node=""> </span><div class="et_pb_button_module_wrapper et_pb_button_14_wrapper et_pb_module" data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node=""> </span><a class="et_pb_button et_pb_button_14 et_hover_enabled et_pb_bg_layout_light" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystonefire.com/fire-protection-systems/fire-suppression"><span data-dcnode-id="1438" instrument_node="">CONTACT US</span></a><span data-dcnode-id="1436" instrument_node=""> </span></div><span data-dcnode-id="1434" instrument_node=""> </span></div><div class="et_pb_column et_pb_column_1_2 et_pb_column_20 et_pb_css_mix_blend_mode_passthrough et-last-child et_pb_column_empty" data-dcnode-id="1431"><span data-dcnode-id=
