</span><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Fire Suppression System Installation, Maintenance, Repair, and Testing</span></h3><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="599" instrument_node="">We will install, maintain, repair and design the right gas or chemical</span><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node=""> fire suppression system</span></strong><span data-dcnode-id="596" instrument_node=""> to suit your needs. We will provide you with the right </span><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">fire safety equipment</span></strong><span data-dcnode-id="593" instrument_node="">, including </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.activefire.ca/services/fire-extinguisher-dry-chemical-green" title="Fire Extinguisher Equipment Servicing, Inspections, Testing and Installation"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">fire extinguishers</span></strong></a><span data-dcnode-id="589" instrument_node=""> to aid in fire suppression.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The nature of your business, or the type of fire your building or operation is at risk for, will determine the best type of fire suppression system for you. We can help you assess the many systems currently on the market and come up with a fire suppression design that will meet your needs and fit your budget.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Jump to a section on this page:</span></strong></p><span data-dcnode-id="580" instrument_node="">
</span><ul data-dcnode-id="534"><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="576"><a data-dcnode-id="577" href="#types-of-fire-extinguishers"><span data-dcnode-id="578" instrument_node="">Types of fire extinguishers</span></a></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="572"><a data-dcnode-id="573" href="#fire-suppression-system-installation"><span data-dcnode-id="574" instrument_node="">Suppression System Installation</span></a></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">popular Fire Extinguisher Manufacturers</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">FE200 &amp; Halon 1301 Fire Extinguishers</span></li><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Halocarbons – Clean Agent Fire Extinguishers</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Environmentally Friendly Fast Response Fire Extinguisher</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Clean Agent Fire Suppression (Inert Gases)</span></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Carbon Dioxide Fire Suppression</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Dry &amp; Wet Chemical Agent Fire Suppression</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Wet Chemical &amp; Kitchen Fire Suppression</span></li><span data-dcnode-id="547" instrument_node="">

</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Where To Place Fire Extinguishers</span></li><span data-dcnode-id="538" instrument_node="">

</span></ul><span data-dcnode-id="533" instrument_node="">
</span><h3 data-dcnode-id="531" id="types-of-fire-extinguishers"><span data-dcnode-id="532" instrument_node="">Types of Fire Extinguishers for Fire Suppression</span></h3><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="526"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Chemical and gas fire suppression systems</span></strong><span data-dcnode-id="527" instrument_node=""> are used in operations where water is either an inappropriate extinguishing agent or where water could cause irreparable damage to a building’s contents.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="524" instrument_node="">Fire suppression systems operate similarly to </span><strong data-dcnode-id="521"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.activefire.ca/services/sprinkler-system-wet-dry" title="Sprinkler System Installations and Annual Inspection Services"><span data-dcnode-id="523" instrument_node="">fire sprinklers</span></a></strong><span data-dcnode-id="520" instrument_node="">. The fire suppressant is stored in pressurized containers, usually in a dedicated room or central station. From there, the cylinders are connected to an overhead pipe grid. Upon activation of the </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.activefire.ca/blog/fire-safety-equipment/vigilant-fire-alarm-systems" title="Vigilant Fire Alarm Systems and Control Panels – Top Life Safety Equipment Manufacturer"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">fire alarm panel</span></strong></a><span data-dcnode-id="516" instrument_node=""> or a manual pull station, the suppressant floods the pipes and is then dispersed through affixed nozzles.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Suppression systems are either total flood or local. Total flood means that is they are piped into a room that has been sealed. Local means they are dispersed through specified nozzles in unsealed rooms. Our suppression systems are made up of many parts, and we use only the best installation methods and manufacturers to ensure your system stays in tact for many years to come.</span></p><span data-dcnode-id="511" instrument_node="">
</span><h3 data-dcnode-id="509" id="fire-suppression-system-installation"><span data-dcnode-id="510" instrument_node="">Suppression System Installation, Maintenance, Testing, Upgrades and Replacement Services</span></h3><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="507" instrument_node="">We provide </span><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">fire extinguisher and suppression system installation</span></strong><span data-dcnode-id="504" instrument_node="">. When we service such systems, each piece of equipment goes through a thorough inspection to ensure quality and safety. Our fire suppression systems go through a carefully calculated design process. We ensure placement is optimal and will provide you with the fire protection you need. This is needed to maintain </span><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">life safety</span></strong><span data-dcnode-id="501" instrument_node="">.</span></p><span data-dcnode-id="499" instrument_node="">
</span><h3 data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Popular Fire Extinguisher Manufacturers</span></h3><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="495" instrument_node="">We use a variety of quality </span><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">fire extinguishers</span></strong><span data-dcnode-id="492" instrument_node=""> from trusted manufacturers. Popular manufacturers we have access to include Novec, Ansul (Tyco, Inergen), Protex, Range Guard, Kidde and Afex. Each manufacturer makes a range of different types of fire extinguishers. The systems we most often install and maintain include:</span></p><span data-dcnode-id="490" instrument_node="">
</span><ul data-dcnode-id="455"><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Halocarbons</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Halon</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">CO2 Low Pressure Systems</span></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Inert Gas Systems</span></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Pre-Engineered Wet Kitchen Systems</span></li><span data-dcnode-id="474" instrument_node="">
</span><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Marine System</span></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Water</span></li><span data-dcnode-id="468" instrument_node="">
</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Clean Agent</span></li><span data-dcnode-id="465" instrument_node="">
</span><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Automatic</span></li><span data-dcnode-id="462" instrument_node="">
</span><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Wet and Dry Chemical</span></li><span data-dcnode-id="459" instrument_node="">
</span><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Foam</span></li><span data-dcnode-id="456" instrument_node="">
</span></ul><span data-dcnode-id="454" instrument_node="">
</span><h3 data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Popular Fire Extinguishers and Fire Suppression Systems</span></h3><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">&nbsp;</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">We will go into some detail about a the most popular pieces of fire extinguishing equipment and suppression systems around.</span></p><span data-dcnode-id="445" instrument_node="">
</span><h3 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">FE 200 Rapid Fire Extinguishing System (Environmentally Friendly) and the Halon 1301</span></h3><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">For a long time Halon 1301 was classified as the superior method of fire suppression in the extinguishment for all classes of fire without causing damage to the equipment being protected.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Due to severe environmental contamination issues &amp; depletion of the ozone layer a new method of protection of valuable assets was developed: FE 200.</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">FE 200 systems are engineered to achieve extinguishment of a fire within 10 seconds or less. Contact us for more info for both service and installation.</span></p><span data-dcnode-id="433" instrument_node="">
</span><h3 data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Halocarbons – Clean Agent Replacements for Halon 1230</span></h3><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="429" instrument_node="">Prior to 1994, the </span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Halon</span></strong><span data-dcnode-id="426" instrument_node=""> line of fire extinguishers was the industry-standard for complete fire suppression. However, due to its ozone-depleting properties, its manufacture was phased out in 1994. This created a need for suppressants of similar quality that could be used in operations where humans would be present. Today, the most prevalent halon replacements include FE 200, Novec 1231 and Halotron.</span></p><span data-dcnode-id="424" instrument_node="">
</span><h4 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Environmentally Friendly and Fast Response Fire Extinguisher</span></h4><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="420" instrument_node="">These products are usually stored as pressurized liquids and dispersed as vapors or gasses. They work by interrupting the fire’s chemical reaction. They act extremely quickly, with </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">FE 200</span></strong><span data-dcnode-id="417" instrument_node=""> having the ability to </span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">extinguish a fire within 10 seconds</span></strong><span data-dcnode-id="414" instrument_node="">. These products have low toxicity, excellent environmental profiles and do not leave behind any debris or particulate. They’re extremely safe for occupants. We recommend them for number of applications that are vulnerable to Class A, B or C fires including:</span></p><span data-dcnode-id="412" instrument_node="">
</span><ul data-dcnode-id="401"><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">electrical and utility operations</span></li><span data-dcnode-id="408" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">electronic hubs and data centres</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">museums and fine art installations</span></li><span data-dcnode-id="402" instrument_node="">
</span></ul><span data-dcnode-id="400" instrument_node="">
</span><h3 data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Clean Agent Fire Suppression (Inert Gases)</span></h3><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="393"><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Inert gases extinguish fires</span></strong><span data-dcnode-id="394" instrument_node=""> by reducing the level of oxygen in a room to below 15% by volume. At that level, a fire cannot sustain itself. Inert gas fire suppression is usually a combination of nitrogen and argon, and sometimes carbon dioxide. Ratios of the gases vary depending on the manufacturer’s proprietary blend. Popular types are Argonite, IG-55, Inergen.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Inert gas fire suppression is considered a clean agent, with little or no adverse effect on the environment. It leaves behind no particulate or debris, and is not electrically conductive. It is safe for humans while they evacuate, although prolonged exposure to a lack of oxygen is lethal. Operations that we recommend inert gas for include:</span></p><span data-dcnode-id="389" instrument_node="">
</span><ul data-dcnode-id="369"><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Electrical Rooms</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Computer Rooms</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Tape &amp; Archival Rooms</span></li><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Electronic Hubs</span></li><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Telecommunications</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Laboratories</span></li><span data-dcnode-id="370" instrument_node="">
</span></ul><span data-dcnode-id="368" instrument_node="">
</span><h3 data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Environmentally Friendly Fire Suppression – Carbon Dioxide</span></h3><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="361"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Carbon dioxide fire suppression</span></strong><span data-dcnode-id="362" instrument_node=""> is inexpensive, does not harm the environment and does not leave behind debris or particulate. However, we don’t recommend it in occupied areas as it significantly reduces the amount of oxygen humans need to breathe. For total flood applications, it is only recommended for unoccupied areas such as spray-paint booths and mechanical rooms.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Carbon Dioxide is also an excellent choice for marine applications. Boats and other marine vessels present a number of fire hazards including flammable liquids, fuel lines, oils and solvents all within a contained environment that must be fire-suppressant self-sufficient.</span></p><span data-dcnode-id="357" instrument_node="">
</span><h3 data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Chemical Agents – Dry &amp; Wet Chemical</span></h3><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="345"><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Chemical fire suppression systems</span></strong><span data-dcnode-id="351" instrument_node=""> work by smothering the fire. Chemical formulations can be a dry chemical, or wet and dispersed as foam. Dry chemical fire suppression is used in </span><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Class A, B and C Fires</span></strong><span data-dcnode-id="348" instrument_node=""> while wet chemical is most prevalent in</span><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node=""> Class K fires.</span></strong></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Multipurpose ABC dry chemical is used most often for A, B &amp; C classes of fires while BC, or sodium bicarbonate, is used most often for Class B fires where flammable liquids provide the fire risk. Specific operations that we may recommend dry chemical suppression systems are:</span></p><span data-dcnode-id="341" instrument_node="">
</span><ul data-dcnode-id="327"><span data-dcnode-id="340" instrument_node="">
</span><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Chemical or petroleum operations</span></li><span data-dcnode-id="337" instrument_node="">
</span><li data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Heavy industrial or metallurgical operations</span></li><span data-dcnode-id="334" instrument_node="">
</span><li data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Industrial plants</span></li><span data-dcnode-id="331" instrument_node="">
</span><li data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Electrical and electronic applications</span></li><span data-dcnode-id="328" instrument_node="">
</span></ul><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">In general, there is considerable overlap with gaseous agents in terms of the most effective fire suppressant. The specifics of your operation will be considered when deciding whether a gaseous or chemical suppressant is more suitable.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Wet Chemical fire suppression is used primarily in commercial kitchens where cooking oil and fat is the inherent fire risk.</span></p><span data-dcnode-id="320" instrument_node="">
</span><h3 data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Wet Chemical Fire Suppression &amp; Pre-Engineered Wet Kitchen Systems</span></h3><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="310"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Commercial kitchens</span></strong><span data-dcnode-id="314" instrument_node=""> in hotels, restaurants and catering facilities where grease and oil are heated to high temperatures are extremely vulnerable to fire. The best suppressant in the instance of a </span><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Class K is a chemical-based foam</span></strong><span data-dcnode-id="311" instrument_node="">. The foam basically extinguishes the fire through saponification – turning the oil or grease into a soapy residue.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="308" instrument_node="">We can either install dedicated piping for a </span><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">wet fire suppression system</span></strong><span data-dcnode-id="305" instrument_node=""> above your cooking areas and in the ductwork, or, more commonly, we can install a pre-engineered wet kitchen hood system with the fire suppression built into it.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="302" instrument_node="">In addition to fixed suppression systems, </span><strong data-dcnode-id="299"><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.activefire.ca/services/fire-extinguisher-dry-chemical-green" title="Fire Extinguisher Equipment Servicing, Inspections, Testing and Installation"><span data-dcnode-id="301" instrument_node="">fire extinguishers</span></a></strong><span data-dcnode-id="298" instrument_node=""> containing the appropriate extinguishing agent are part of a complete fire suppression strategy.</span></p><span data-dcnode-id="296" instrument_node="">
</span><h3 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Water Fire Suppression &amp; Fire Sprinklers</span></h3><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="281"><strong data-dcnode-id="289"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.activefire.ca/services/sprinkler-system-wet-dry" title="Sprinkler System Installations and Annual Inspection Services"><span data-dcnode-id="292" instrument_node="">Fire sprinkler systems</span></a><span data-dcnode-id="290" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="288" instrument_node="">are the most prevalent form of fire suppression for </span><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">class A</span></strong><span data-dcnode-id="285" instrument_node="">, regular combustible fires. They are used in </span><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">commercial, industrial and residential</span></strong><span data-dcnode-id="282" instrument_node=""> settings. There are a number of different types of fire sprinkler systems including deluge, pre action, dry and wet. For more information on our fire sprinkler services, please refer to our sprinkler system page.</span></p><span data-dcnode-id="280" instrument_node="">
</span><h3 data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Common Fire Safety Equipment Used to Suppress Fires</span></h3><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Along with suppression systems, sprinklers and extinguishers, there are other fire suppression devices that work in tandem with your fire suppression system. It is important to have all of the necessary fire equipment at hand in case a fire breaks out. Here are the common pieces of equipment that can stop a fire:</span></p><span data-dcnode-id="274" instrument_node="">
</span><ul data-dcnode-id="260"><span data-dcnode-id="273" instrument_node="">
</span><li data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">fire hose</span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">fire blanket</span></li><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">fire ex (fire extinguisher)</span></li><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">kitchen fire suppression hood</span></li><span data-dcnode-id="261" instrument_node="">
</span></ul><span data-dcnode-id="259" instrument_node="">
</span><h3 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Fire Extinguisher for Portable Fire Suppression</span></h3><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="255" instrument_node="">Fire extinguishers are </span><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">portable fire suppression system</span></strong><span data-dcnode-id="252" instrument_node="">s. They contain many of the same chemical or gaseous agents as fire suppression systems. They are used in tandem with fire suppression systems and should be located at strategic points throughout your operation. For more information on fire extinguishers, please visit our fire extinguisher page.</span></p><span data-dcnode-id="250" instrument_node="">
</span><h3 data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Common Places Where Fire Extinguishers are Placed In Residential, Commercial and Industrial Areas</span></h3><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">There are many places where you would want to be protected in the event of a fire. Fire extinguishers are an integral part of a great fire suppression system. Contact us at Active Fire and Safety Services Ltd for a free quote for servicing in a:</span></p><span data-dcnode-id="244" instrument_node="">
</span><ul data-dcnode-id="218"><span data-dcnode-id="243" instrument_node="">
</span><li data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Server Room</span></li><span data-dcnode-id="240" instrument_node="">
</span><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Data Centre</span></li><span data-dcnode-id="237" instrument_node="">
</span><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Office Building</span></li><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Warehouse</span></li><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Department Store</span></li><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Shopping Mall</span></li><span data-dcnode-id="225" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Paint Booth</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Commercial Kitchen</span></li><span data-dcnode-id="219" instrument_node="">
</span></ul><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Request More Information About Fire Suppression Systems and Keyword</span></h3><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="211"><em data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Hire us to ensure BC Building Code and BC Fire Code compliance.</span></em></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="209" instrument_node="">We hope that you now have a better idea of what </span><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">fire suppression system</span></strong><span data-dcnode-id="206" instrument_node=""> is for you. There are many types of fire suppression systems on the market, and it can be confusing to know which one you need. The best one for your operation is one that will fit your budget, fit the needs of your business or operation and is tailored to the </span><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">types of fire</span></strong><span data-dcnode-id="203" instrument_node=""> your operation is most at risk for. At Active Fire, we’ll advise you on the best type of system to suppress a fire as quickly and thoroughly as possible, decreasing the risk of property damage and loss of life. Contact us today for your fire suppression system needs! Use the form to the left or call 604-590-0149.</span></p><span data-dcnode-id="201" instrument_node="">
