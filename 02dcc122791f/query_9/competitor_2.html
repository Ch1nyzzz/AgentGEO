</span><p data-dcnode-id="3340"><span data-dcnode-id="3344" instrument_node="">The clue to what they do is in the name, but do air purifiers help with bad smells too? As concerns around indoor and outdoor air pollution rise, the air purifier market has expanded, and with more research emerging every day on how air purifiers may also help to reduce airborne viruses according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="3342" data-url="https://www.cdc.gov/coronavirus/2019-ncov/community/ventilation.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/coronavirus/2019-ncov/community/ventilation.html" target="_blank"><span data-dcnode-id="3343" instrument_node="">CDC</span></a><span data-dcnode-id="3341" instrument_node="">, it's no wonder they’re becoming more popular.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="3339" id="ad-unit-1"></div><p data-dcnode-id="3331"><span data-dcnode-id="3338" instrument_node="">Manufacturers of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/best-air-purifiers"><span data-dcnode-id="3337" instrument_node="">best air purifiers</span></a><span data-dcnode-id="3335" instrument_node=""> claim they can remove bad odors from our environments by improving air quality, but is this really true? We look at the research around air purifiers and consider whether there’s enough evidence to prove that air purifiers really can tackle and remove bad smells in our homes. If you're looking for more advice, we have a separate investigation on '</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/do-air-purifiers-help-with-allergies"><span data-dcnode-id="3334" instrument_node="">do air purifiers help with allergies</span></a><span data-dcnode-id="3332" instrument_node="">', which digs deeper into the subject.</span></p><h3 class="article-body__section" data-dcnode-id="3328" id="section-can-air-purifiers-really-help-with-bad-smells"><span data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Can air purifiers really help with bad smells?</span></span></h3><aside class="hawk-nest hawk-processed" data-dcnode-id="3327" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="3730017481336739300" data-widget-type="seasonal"></aside><p data-dcnode-id="3321"><span data-dcnode-id="3326" instrument_node="">The jury seems to be out for the time being. According to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="3323" data-url="https://www.epa.gov/indoor-air-quality-iaq/air-cleaners-and-air-filters-home" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/air-cleaners-and-air-filters-home" target="_blank"><u data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">United States Environmental Protection Agency</span></u></a><span data-dcnode-id="3322" instrument_node=""> (EPA), it’s possible that by removing indoor air pollutants the air may be cleaner and fresher, but it’s not guaranteed to work for all odors and lingering smells.</span></p><div class="in-article ad-unit" data-dcnode-id="3276" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="3277" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="3278"><div data-dcnode-id="3279"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="3280" id="trc_wrapper_53334" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data mobile-taboola-mid-article"></div></div><p data-dcnode-id="3268"><span data-dcnode-id="3273" instrument_node="">The EPA's 2018 </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="3270" data-url="https://www.epa.gov/sites/default/files/2018-07/documents/guide_to_air_cleaners_in_the_home_2nd_edition.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2018-07/documents/guide_to_air_cleaners_in_the_home_2nd_edition.pdf" target="_blank"><u data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Consumer Guide to Air Cleaners in the Home</span></u></a><span data-dcnode-id="3269" instrument_node=""> recommends indoor air purifiers as a supplementary method, alongside good ventilation, to freshen indoor air, remove bad odors, and improve air quality. So, while it’s not quite the panacea to an odor-free home, it may be a helpful step in improving your surroundings while you’re working indoors.</span></p><div class="van_vid_carousel vid-present" data-dcnode-id="2726"><div class="van_vid_carousel__padding" data-dcnode-id="2727"><div class="van_vid_carousel__container" data-dcnode-id="2728"><svg data-dcnode-id="3266" height="64" viewBox="0 0 45 64" width="45" xmlns="http://www.w3.org/2000/svg"><path d="M44.99394 31.4744L0 63.5v-64z" data-dcnode-id="3267" fill="#CCC" fill-rule="evenodd"></path></svg><div class="future__jwplayer--carousel" data-dcnode-id="2729"><div class="jw-carousel" data-dcnode-id="2730"><div class="carousel__title carousel__title--black-logo" data-dcnode-id="3255"><span data-dcnode-id="3264" instrument_node="">RECOMMENDED VIDEOS FOR YOU...</span><svg data-dcnode-id="3256" height="28" role="img" viewBox="0 0 230 28" width="230" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="3262">Live Science</title><g data-dcnode-id="3257" fill="none" fill-rule="evenodd"><g data-dcnode-id="3260" fill="#FFF"><path d="M209.454.464v27.072h20.613v-5.298h-14.696v-5.685h14 : 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-970-80.jpg 970w" type="image/jpeg"><img alt="Do air purifiers help with bad smells: image of air purifier" class="lazy-image-van optional-image loaded" data-dcnode-id="2721" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/tuqLar2Uq7cEtgjsQocRa4-970-80.jpg 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="2714" itemprop="caption description"><span class="credit" data-dcnode-id="2715" itemprop="copyrightHolder"><span data-dcnode-id="2716" instrument_node="">(Image credit: Getty)</span></span></figcaption></figure><p data-dcnode-id="2702"><span data-dcnode-id="2712" instrument_node="">There isn’t a great deal of reliable research around odor removal and air purifiers. Most of the available research focuses on air quality and health outcomes. For example, a 2021 systematic review in the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2710" data-url="https://www.sciencedirect.com/science/article/abs/pii/S0048969720361143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0048969720361143" target="_blank"><span data-dcnode-id="2711" instrument_node="">Science of The Total Environment Journal</span></a><span data-dcnode-id="2709" instrument_node=""> of over 20 studies into the effectiveness of air purifiers in schools, homes, and offices, found these appliances could reduce poor indoor air quality by between 22% and 92%. A</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2707" data-url="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7277583/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7277583/"><span data-dcnode-id="2708" instrument_node=""> </span></a><span data-dcnode-id="2706" instrument_node="">2020 study in the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2704" data-url="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7277583/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7277583/" target="_blank"><span data-dcnode-id="2705" instrument_node="">International Journal of Environmental Research and Public Health</span></a><span data-dcnode-id="2703" instrument_node=""> found that air purifiers could slightly, but not significantly, improve indoor environments in ordinary homes.</span></p><div class="ad-unit" data-dcnode-id="2701" id="ad-unit-2"></div><p data-dcnode-id="2695"><span data-dcnode-id="2700" instrument_node="">Air purifiers work by filtering and removing particles that may cause bad smells. However, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2697" data-url="https://www.epa.gov/sites/default/files/2018-07/documents/guide_to_air_cleaners_in_the_home_2nd_edition.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2018-07/documents/guide_to_air_cleaners_in_the_home_2nd_edition.pdf" target="_blank"><u data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">EPA</span></u></a><span data-dcnode-id="2696" instrument_node=""> states that no air cleaner or filter will be able to eliminate all the particles that can cause foul odors.&nbsp;</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2694" instrument_node="">Air purifiers tend to work best in one room, so a single air purifier won’t be enough if you want to remove bad smells from your home. The larger the area you’re trying to tackle, the bigger the air purifier needs to be. An air purifier with a high CADR (Clean Air Delivery Rate) can filter more particles, tackling a larger area.&nbsp;If you want more, we have created a guide to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/how-do-air-purifiers-work"><span data-dcnode-id="2693" instrument_node="">how air purifiers work</span></a><span data-dcnode-id="2691" instrument_node="">, which goes into more detail around the technical functions of these devices.</span></p><h3 class="article-body__section" data-dcnode-id="2687" id="section-which-types-of-odors-do-air-purifiers-help-with"><span data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Which types of odors do air purifiers help with?</span></span></h3><p data-dcnode-id="2681"><span data-dcnode-id="2686" instrument_node="">This may depend on the air purifier you’re buying. According to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2683" data-url="https://www.epa.gov/sites/default/files/2018-07/documents/residential_air_cleaners_-_a_technical_summary_3rd_edition.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2018-07/documents/residential_air_cleaners_-_a_technical_summary_3rd_edition.pdf" target="_blank"><u data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">EPA</span></u></a><span data-dcnode-id="2682" instrument_node="">, some air purifiers can tackle moldy odors, alongside the usual offenders of cooking smells, pet odors, tobacco smoke, and other lingering aromas.</span></p><p data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Some air purifiers also have an activated carbon filter as well as a particle filter, which means they can tackle gas and chemical odors that may come from building materials, pesticides, and fire retardants.</span></p><div class="bordeaux-slot" data-dcnode-id="2678" data-feat-ref="bordeaux-feat-id-73" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2677" data-feat-ref="bordeaux-feat-id-76" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2666"><div class="image-full-width-wrapper" data-dcnode-id="2670"><div class="image-widthsetter" data-dcnode-id="2671" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2672" style="padding-top:56.25%;"><picture data-dcnode-id="2673"><source alt="Do air purifiers help with bad smells: image of woman covering her nose" class="lazy-image-van optional-image" data-dcnode-id="2676" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo.jpg" data-srcset="https://cd edia/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/opC3r53eLukFcEv8WyDtDo-970-80.jpg 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="2667" itemprop="caption description"><span class="credit" data-dcnode-id="2668" itemprop="copyrightHolder"><span data-dcnode-id="2669" instrument_node="">(Image credit: Getty)</span></span></figcaption></figure><h3 class="article-body__section" data-dcnode-id="2663" id="section-how-do-air-purifiers-remove-odors"><span data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">How do air purifiers remove odors?</span></span></h3><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Air purifiers work by using fans to draw in allergens from the air. The exact particles they remove depends on the type of air purifier.</span></p><p data-dcnode-id="2651"><span data-dcnode-id="2660" instrument_node="">Some purifiers use negative ion emitting technology, which helps to attract particles. However, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2657" data-url="https://www.epa.gov/sites/default/files/2018-07/documents/residential_air_cleaners_-_a_technical_summary_3rd_edition.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2018-07/documents/residential_air_cleaners_-_a_technical_summary_3rd_edition.pdf" target="_blank"><u data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">EPA</span></u></a><span data-dcnode-id="2656" instrument_node=""> warns that these air purifiers can release ozone emissions into the home, which is a health risk. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2653" data-url="https://ww2.arb.ca.gov/our-work/programs/air-cleaners-ozone-products/air-cleaner-information-consumers" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ww2.arb.ca.gov/our-work/programs/air-cleaners-ozone-products/air-cleaner-information-consumers" target="_blank"><u data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">California Air Resource Board</span></u></a><span data-dcnode-id="2652" instrument_node=""> also recommends against using ozone-generating devices at home because of the risks to health.</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Most air purifiers typically use filtering technologies to capture polluting particles and gases from the air. A washable or disposable prefilter captures pet dander, hair, and other larger particles. Don’t forget to follow your manufacturer’s instructions on replacing or cleaning this filter.</span></p><div class="bordeaux-slot" data-dcnode-id="2648" data-feat-ref="bordeaux-feat-id-74" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2647" data-feat-ref="bordeaux-feat-id-77" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2636"><div class="image-full-width-wrapper" data-dcnode-id="2640"><div class="image-widthsetter" data-dcnode-id="2641" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2642" style="padding-top:56.25%;"><picture data-dcnode-id="2643"><source alt="Do air purifiers help with bad smells: image of woman and air purifier" class="lazy-image-van optional-image" data-dcnode-id="2646" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg.webp 970w" type="image/webp"><source alt="Do air purifiers help with bad smells: image of woman and air purifier" class="lazy-image-van optional-image" data-dcnode-id="2645" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg 970w" type="image/jpeg"><img alt="Do air purifiers help with bad smells: image of woman and air purifier" class="lazy-image-van optional-image loaded" data-dcnode-id="2644" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/EziUitNKwQbkPfFJLiKnm8-970-80.jpg 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="2637" itemprop="caption description"><span class="credit" data-dcnode-id="2638" itemprop="copyrightHolder"><span data-dcnode-id="2639" instrument_node="">(Image credit: Getty)</span></span></figcaption></figure><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Smaller particles that pass through the prefilter are then captured by a high-efficiency particulate air (HEPA) filter, which is made up of layers of fiberglass threads. As the particles are drawn in, they become trapped within this high-density mesh.</span></p><p data-dcnode-id="2629"><span data-dcnode-id="2633" instrument_node="">It’s worth knowing, however, that HEPA filters designed for home use have no widely accepted definition of good performance, so quality may vary across products. They also need to be replaced according to the manufacturer’s guidelines. The ability of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/do-hepa-filters-remove-viruses"><span data-dcnode-id="2632" instrument_node="">HEPA filters to remove viruses</span></a><span data-dcnode-id="2630" instrument_node=""> is a complicated one, so we created a separate investigation into this.</span></p><p data-dcnode-id="2623"><span data-dcnode-id="2628" instrument_node="">Several air purifiers feature a further gas-phase air filter. It uses a material called a sorbent, such as activated carbon, to absorb harmful gas pollutants as they move through it. It’s worth knowing that these filters can usually only remove a limited number of gas pollutants. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2625" data-url="https://www.epa.gov/sites/default/files/2014-07/documents/aircleaners.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2014-07/documents/aircleaners.pdf" target="_blank"><u data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">EPA</span></u></a><span data-dcnode-id="2624" instrument_node=""> states that carbon monoxide, which is a dangerous gaseous pollutant, cannot currently be absorbed by residential air purifiers. So, if you have a wood burning stove, gas fire, or kerosene lamp burning, your air purifier won’t capture any of the carbon monoxide it emits.</span></p><p data-dcnode-id="2618"><span data-dcnode-id="2622" instrument_node="">Some air purifiers use ultra-violet light technology to destroy indoor air pollutants, such as bacteria, viruses, and allergens such as mold spores and pollen. However, many bacteria and mold spores require more exposure to UV light than these devices actually provide in order to be effectively destroyed according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2620" data-url="https://www.epa.gov/sites/default/files/2014-07/documents/aircleaners.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/2014-07/documents/aircleaners.pdf" target="_blank"><span data-dcnode-id="2621" instrument_node="">EPA</span></a><span data-dcnode-id="2619" instrument_node="">. So, they may not be as effective as their manufacturers claim.</span></p><ul data-dcnode-id="2611"><li data-dcnode-id="2612"><strong data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Read more:</span></strong><span data-dcnode-id="2615" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/air-purifiers-vs-humidifiers"><span data-dcnode-id="2614" instrument_node="">Air purifiers vs Dehumidifiers</span></a></li></ul><aside class="hawk-nest hawk-processed" data-dcnode-id="2501" data-feat-ref="hawk-id-3" data-model-name="BISSELL air320 Air Purifier,Honeywell AirGenius 5 Air Purifier,Dyson Purifier Cool TP07 Smart Air Purifier," data-render-type="editorial" data-result="rendered" data-viewports="tablet" data-widget-id="1178143007960105700" data-widget-title="Tod
