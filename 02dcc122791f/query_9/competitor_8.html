e-id="2619"><span data-dcnode-id="2620" instrument_node="">Share</span></span></a></div></div><blockquote data-dcnode-id="2613"><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Smoke (especially cigarette smoke) is impossible to get rid of.</span></p></blockquote><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Not true at all.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2608" instrument_node="">Cigarette smoke, wildfire smoke, even cigar, and weed smoke can be effectively removed. The device that helps you do that is an air purifier for smoke. Preferably one specialized in removing high concentrations of smoke (HEPA + activated carbon filters). The best air purifiers for smokers are those with the </span><strong data-dcnode-id="2603"><span data-dcnode-id="2607" instrument_node="">highest </span><em data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">‘smoke CADR’</span></em><span data-dcnode-id="2604" instrument_node=""> rating</span></strong><span data-dcnode-id="2602" instrument_node="">.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Let’s face it:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2597" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Nobody really likes the smell of cigarette smoke. In the cold winter, more of us do smoke indoors. We all want to get rid of the cigarette smoke as soon as possible, and opening a window doesn’t really help that much.</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">The reason for getting rid of cigarette smoke is simple. The smell is not really pleasant, and we do need to worry a bit about these negative impacts of continuously inhaling cigarette smoke:</span></p><span data-dcnode-id="2590" instrument_node="">
</span><figure aria-describedby="caption-attachment-3316" class="wp-caption aligncenter" data-dcnode-id="2584" id="attachment_3316" style="width: 990px"><noscript data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">&lt;img class="wp-image-3316 size-full" src="https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg" alt="without an air purifier for smoke there are number of negative effects" width="1000" height="188" srcset="https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg 1000w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-300x56.jpg 300w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-768x144.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript><img alt="without an air purifier for smoke there are number of negative effects" class="wp-image-3316 size-full lazyloaded" data-dcnode-id="2587" data-src="https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg" data-srcset="https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg 1000w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-300x56.jpg 300w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-768x144.jpg 768w" height="188" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg&amp;raw" srcset="https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke.jpg 1000w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-300x56.jpg 300w, https://learnmetrics.com/wp-content/uploads/negative-consequences-of-breathing-smoke-in-abscense-of-air-purifiers-for-smoke-768x144.jpg 768w" width="1000"><figcaption class="wp-caption-text" data-dcnode-id="2585" id="caption-attachment-3316"><span data-dcnode-id="2586" instrument_node="">Accumulation of smoke particles in indoor air can negatively affect our bodies.</span></figcaption></figure><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Not all air purifiers are best for cigarette smoke removal, however.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2580" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Luckily, the AHAM (Association of Home Appliance Manufacturers) has introduced its ANSI/AHAM AC-1 procedure. It’s a boring-sounding name for the procedure, but this test does one job very well:</span></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2573"><strong data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">ANSI/AHAM AC-1: It determines which air purifiers are the best for smoke.</span></strong></p><span data-dcnode-id="2572" instrument_node="">
</span><figure aria-describedby="caption-attachment-10702" class="wp-caption aligncenter" data-dcnode-id="2566" id="attachment_10702" style="width: 790px"><noscript data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">&lt;img class="size-full wp-image-10702" src="https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg" alt="smoking indoors and best air purifiers for cigarette smokers" width="800" height="533" srcset="https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg 800w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-300x200.jpg 300w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-768x512.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"&gt;</span></noscript><img alt="smoking indoors and best air purifiers for cigarette smokers" class="size-full wp-image-10702 lazyloaded" data-dcnode-id="2569" data-src="https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg" data-srcset="https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg 800w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-300x200.jpg 300w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-768x512.jpg 768w" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg&amp;raw" srcset="https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers.jpg 800w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-300x200.jpg 300w, https://learnmetrics.com/wp-content/uploads/smoking-indoors-and-best-air-purifiers-for-cigarette-smokers-768x512.jpg 768w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="2567" id="caption-attachment-10702"><span data-dcnode-id="2568" instrument_node="">The best air purifiers for cigarette smokers should include a good HEPA filter and a good activated carbon filter. Combined, they will increase smoke CADR rating and remove cigarette smoke (both particles and smell of cigarettes) effectively.</span></figcaption></figure><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">This test provides conditions for the measurement of the smoke CADR rating. What is the smoke CADR rating?</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2562" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2560" instrument_node="">Simply put, </span><strong data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">smoke CADR is a </span><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">0-450</span></em><span data-dcnode-id="2556" instrument_node=""> specification (#1 Medify MA-112 is a powerhouse with 500 smoke CADR)</span></strong><span data-dcnode-id="2554" instrument_node="">&nbsp;that tells you how well a smoke air purifier removes 0.09–1.0 µm large particles of smoke.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><blockquote data-dcnode-id="2549"><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Higher smoke CADR rating equates to better smoke removal in air purifiers.</span></p></blockquote><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Here’s the bottom line:</span></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">AHAM has developed a rating that tells you how air purifiers perform when it comes to smoke removal. It’s just a single specification. You can literally gather all air purifiers, put their specification sheets side-by-side, and compare which one has a higher rating.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2542" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2540" instrument_node="">And that’s exactly what we did in our comparison of the best air purifiers for smoke (both for </span><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">cigarette smokers</span></strong><span data-dcnode-id="2537" instrument_node=""> and for </span><strong data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">smoke coming from wildfires</span></strong><span data-dcnode-id="2534" instrument_node="">):</span></p><span data-dcnode-id="2532" instrument_node="">
</span><div class="ez-toc-v2_0_19 counter-hierarchy ez-toc-grey" data-dcnode-id="2450" id="ez-toc-container"><span data-dcnode-id="2531" instrument_node="">

</span><h2 data-dcnode-id="2151"><span class="ez-toc-section" data-dcnode-id="2154" id="Smoke_Air_Purifiers_Reviews"></span><span data-dcnode-id="2153" instrument_node="">Smoke Air Purifiers Reviews</span><span class="ez-toc-section-end" data-dcnode-id="2152"></span></h2><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Smoke consists of airborne particles that are less than 1 micron in size. In fact, more than 99% of smoke particles are sized between 0.09 µm and 1.0 µm.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2147" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">To review air purifiers that are best suited to remove cigarette, wildfire, cigar, and weed smoke, we need to look at the following specifications:</span></p><span data-dcnode-id="2143" instrument_node="">
</span><h3 data-dcnode-id="2139"><span class="ez-toc-section" data-dcnode-id="2142" id="Filters_That_Are_Best_For_Smokers"></span><span data-dcnode-id="2141" instrument_node="">Filters That Are Best For Smokers</span><span class="ez-toc-section-end" data-dcnode-id="2140"></span></h3><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Here is the most important takeaway when it comes to the best air purifier for smoke:</span></p><span data-dcnode-id="2135" instrument_node="">
</span><blockquote data-dcnode-id="2132"><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">The golden standard for smoke (be tobacco or wildfire smoke) is the combination of activated carbon filters and HEPA filters.</span></p></blockquote><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Here’s the deal when it comes to smoke:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2128" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2126" instrument_node="">You don’t need additional filters like UV-light (that’s for mold and bacteria). Nor do you need fancy PECO-filters </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/molekule-reviews/"><span data-dcnode-id="2125" instrument_node="">Molekule air purifiers</span></a><span data-dcnode-id="2123" instrument_node=""> are known for.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">To pick the best air purifier for smoke, we need to look at the quality of only two kinds of filters:</span></p><span data-dcnode-id="2118" instrument_node="">
</span><ul data-dcnode-id="2106"><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2113"><strong data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Activated carbon filter.</span></strong><span data-dcnode-id="2114" instrument_node=""> Also referred to as a charcoal filter, it’s designed to remove odors, including smoke smell (gas form). Example: If you’re looking for the best air purifier for cigarette smoke, you should choose one with a good activated carbon filter. It will adsorb and remove the odor of cigarette smoke.</span></li><span data-dcnode-id="2112" instrument_node="">
</span><li data-dcnode-id="2108"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">HEPA filter.</span></strong><span data-dcnode-id="2109" instrument_node=""> The best ones for smoke are True H13 HEPA filters; they catch and remove all varieties of smoke particles (solid form). Example: Smoke from a cigarette is made out of small particles. A good HEPA filter will catch these airborne particles and remove them from indoor air.</span></li><span data-dcnode-id="2107" instrument_node="">
</span></ul><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">The most effective air purifiers for cigarette smoke use a powerful fan to push air through HEPA filters. HEPA filters are mechanical filters made out of polyolefin polymers and glass.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2102" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2101" instrument_node="">
</span><blockquote data-dcnode-id="2095"><p data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node="">“Existing high HEPA filters filter particles of more than 0.3 μm with 99.97% efficiency fibers.” (</span><a data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/high-efficiency-particulate-air-filter"><span data-dcnode-id="2099" instrument_node="">ScienceDirect</span></a><span data-dcnode-id="2097" instrument_node="">)</span></p></blockquote><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">That’s exactly what is needed to filter out smoke particles effectively.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">We also need to take care of the smoke smell. That’s why the best air purifiers for smoke include activated carbon filters; the thicker filter, the better.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">These carbon-based filters adsorb volatile organic compounds (in a gaseous state) like smoke smell.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2085" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2084" instrument_node="">
</span><blockquote data-dcnode-id="2081"><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">HEPA filters stop solid particles by mechanical action, and charcoal filters stop gaseous smoke smell by gas adsorption.</span></p></blockquote><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">The result of actions of both these filters is measured by AHAM’s smoke CADR rating:</span></p><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2073"><span class="ez-toc-section" data-dcnode-id="2076" id="Smoke_CADR_Rating_Up_To_450"></span><span data-dcnode-id="2075" instrument_node="">Smoke CADR Rating (Up To 450)</span><span class="ez-toc-section-end" data-dcnode-id="2074"></span></h3><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">HEPA filters, in combination with an activated carbon filter, is all that’s needed.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2069" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2068" instrument_node="">
</span><blockquote data-dcnode-id="2065"><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">The bigger the smoke CADR value, the better.</span></p></blockquote><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2061"><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">How to pick the best air purifier for smoke?</span></em></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">Simple: Look for air purifiers with the </span><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">maximum smoke CADR rating</span></strong><span data-dcnode-id="2056" instrument_node="">. This is all that’s needed; always look for the sheer power of high smoke CADR rating.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">You won’t find a CADR rating for all air purifiers. Producers need to ask AHAM to measure and certify the rating voluntarily; those air purifier brands who know they will score high CADR rating, will usually opt-in. This also assures you that the rating is valid.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2051" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">In comparing smoke air cleaners above, you will find air purifiers primarily ranked based on the smoke CADR rating. Further on, you will find individual reviews of each purifier (check them out before buying one, or three for 3 rooms).</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">These are the primary specifications when choosing the best air purifiers for smoke. Let’s look at some secondary specifications:</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2041"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Secondary Specifications</span></strong></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2037"><strong data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Max. Coverage Area (540 Sq Ft To 2500 Sq Ft)</span></strong></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2036" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">The coverage area is related to the smoke CADR rating. In general, a bigger coverage area equates to a higher CADR rating. Here are two examples:</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2028"><em data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Example 1:</span></em><span data-dcnode-id="2029" instrument_node=""> Medify MA-112 (#1 pick) has the highest possible smoke CADR rating (450+). It has a maximum coverage area of up to 2,500 sq ft. That means it will remove smoke from large rooms very well.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2023"><em data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Example 2:</span></em><span data-dcnode-id="2024" instrument_node=""> Blueair 211+ (#4 pick) has a high smoke CADR rating. However, it has the lowest coverage area of 540 square feet. That means that it will remove smoke from smaller rooms very well (with multiple ACH).</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2019"><strong data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Power Output And Energy Usage (From 40W To 90W Max.)</span></strong></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2018" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Air purifiers for smoke usually run 24/7. That’s why it’s important that they don’t spend a whole lot of electricity.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">The maximum power of air purifiers in the list ranges from 40W to 100W. Here is the calculation for the maximum daily electricity cost if we run these smoke air cleaners at maximum speed, with an average kWh price of $0.1319:</span></p><span data-dcnode-id="2011" instrument_node="">
</span><ul data-dcnode-id="1997"><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">Low electricity cost (45W Alen BreatheSmart 75i): </span><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">0.15$/day</span></strong><span data-dcnode-id="2006" instrument_node="">. Uses about 1 kWh.</span></li><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">High electricity cost (95W Powerful Medify MA-112): </span><strong data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">0.30$/day</span></strong><span data-dcnode-id="2000" instrument_node="">. Uses a bit more than 2 kWh.</span></li><span data-dcnode-id="1998" instrument_node="">
</span></ul><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">In short, air purifiers for smoke are quite inexpensive as far as electricity costs are concerned. However, the wattage can be a factor when you buy more than 1 unit (people usually buy 2-3 units for 2-3 rooms).</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1993" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1992" instrument_node="">

</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">In general, it’s better to have a quiet air cleaner. However, noisy air purifiers tend to remove smoke from indoor air faster.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">For the best noise profile, air purifiers for smoke have several fan speed settings. Every setting has its own decibel level. Here is an example of how to use Medify MA-112, which removes smoke particles the fastest on the maximum setting:</span></p><span data-dcnode-id="1982" instrument_node="">

</span><li data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">During the night: Use the low-speed fan setting that produces only 30 dB of noise.</span></li><span data-dcnode-id="1975" instrument_node="">

</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Medify M-112 is as close to an industrial air purifier for smoke as it gets. With a 500 smoke CADR rating (H13 Medical-Grade HEPA + Activated Carbon filters), it’s more than capable of removing airborne smoke particles and odors. The combination of advanced H13 HEPA filters, with incredible max. coverage of 2,500 sq ft, makes the Medify M-112 the best air purifier for any kind of smoke (including cigarette and wildfire smoke).</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1836" id="AdThrive_Content_17_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1834" instrument_node="">For complete smoke removal, you really need a thorough filter. Standard HEPA filters (H10-H12) remove 99.7% of smoke particles that are 0.3 microns in size. Medify-112 uses advanced H13 HEPA filters capable of removing 99.9% of even the smallest 0.1 microns in size smoke particles. That means that the removal of smoke air particles is </span><em data-dcnode-id="1831"><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">thorough</span></strong></em><span data-dcnode-id="1830" instrument_node="">. Even the smallest smoke particles are caught in its filter.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">To generate an airflow through such a dense and thorough filter, you need one thing: Power. That’s why Medify M-112 is one of the most powerful air purifiers in general. With its 95W, it can create a big airflow that pushes air through the H13 HEPA filter. The filter captures the smoke, and the clean air passes through it without problems.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1825" id="AdThrive_Content_18_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">As a result, this big airflow (with dual air intake, mind you) prompts up the Medify M-112’s max. coverage to up to 2,500 sq ft. That’s the largest smoke air purifier; the majority of other air purifiers have a below 1,000 sq ft coverage.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">To top it off, Medify M-112 has a 450+ smoke CADR rating. The overall CADR rating is 500; that’s off the scale. For such a powerful and thorough device</span></p><span data-dcnode-id="1818" instrument_node="">

</span><h3 data-dcnode-id="1039"><span class="ez-toc-section" data-dcnode-id="1042" id="Related_Smoke_Purifier_Question_FAQ"></span><span data-dcnode-id="1041" instrument_node="">Related Smoke Purifier Question (FAQ)</span><span class="ez-toc-section-end" data-dcnode-id="1040"></span></h3><span data-dcnode-id="1038" instrument_node="">
</span><h4 data-dcnode-id="1033"><span class="ez-toc-section" data-dcnode-id="1037" id="Do_Air_Purifier_Work_For_Smoke"></span><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Do Air Purifier Work For Smoke?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1034"></span></h4><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">If by ‘work’ you mean ‘remove from air’, then yes, an air purifier can and do work for smoke. HEPA filters and activated charcoal filters capture smoke particles and remove the undesirable smoke smell.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1029" id="AdThrive_Content_29_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Air purifiers work for all kinds of smoke, including:</span></p><span data-dcnode-id="1025" instrument_node="">
</span><ul data-dcnode-id="1011"><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Cigarette smoke.</span></li><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Wildfire smoke.</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Weed smoke.</span></li><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Cigar and any other tobacco smoke.</span></li><span data-dcnode-id="1012" instrument_node="">
</span></ul><span data-dcnode-id="1010" instrument_node="">
</span><h4 data-dcnode-id="1005"><span class="ez-toc-section" data-dcnode-id="1009" id="What_Can_Absorb_Smoke"></span><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">What Can Absorb Smoke?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1006"></span></h4><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">In short, an activated carbon filter can absorb smoke.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">These carbon filters are usually in the form of a powdered block with numerous pores. It has a vast active surface area (it’s like human lungs; small but with an incredible surface area). This extensive active surface area adsorbs organic compounds in the air; smoke smell being one of them.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="998" id="AdThrive_Content_30_desktop" style="min-height: 250px;"></div><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Smoke ‘sticks’ to the porous charcoal filter and is effectively removed from the indoor air circulation.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="993" instrument_node="">That’s why all the important air purifier brands – such as </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/alen-breathesmart-air-purifier-reviews/"><span data-dcnode-id="992" instrument_node="">Alen BreatheSmart</span></a><span data-dcnode-id="990" instrument_node="">, </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/blueair-air-purifier-reviews/"><span data-dcnode-id="989" instrument_node="">Blueair</span></a><span data-dcnode-id="987" instrument_node="">, </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/best-coway-air-purifiers/"><span data-dcnode-id="986" instrument_node="">Coway</span></a><span data-dcnode-id="984" instrument_node="">, </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/winix-air-purifiers/"><span data-dcnode-id="983" instrument_node="">Winix</span></a><span data-dcnode-id="981" instrument_node="">, </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/best-honeywell-air-purifiers/"><span data-dcnode-id="980" instrument_node="">Honeywell</span></a><span data-dcnode-id="978" instrument_node="">, </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/okaysou-air-purifier-reviews/"><span data-dcnode-id="977" instrument_node="">Okaysou</span></a><span data-dcnode-id="975" instrument_node="">, </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/best-dyson-air-purifiers/"><span data-dcnode-id="974" instrument_node="">Dyson</span></a><span data-dcnode-id="972" instrument_node="">, and even </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/molekule-reviews/"><span data-dcnode-id="971" instrument_node="">Molekule</span></a><span data-dcnode-id="969" instrument_node=""> – include some sort of activated carbon filtration. You can check the </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/best-air-purifiers/"><span data-dcnode-id="968" instrument_node="">best of the best air purifiers here</span></a><span data-dcnode-id="966" instrument_node="">.</span></p><span data-dcnode-id="964" instrument_node="">
</span><h4 data-dcnode-id="960"><span class="ez-toc-section" data-dcnode-id="963" id="Can_Smoke_Smell_Go_Through_Walls"></span><span data-dcnode-id="962" instrument_node="">Can Smoke Smell Go Through Walls?</span><span class="ez-toc-section-end" data-dcnode-id="961"></span></h4><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">In some cases, yes, but not in most cases. Older brick walls are known to conduct smoke. This is troublesome because the lower indoor air quality because of tobacco smoke could be caused by having smoking neighbors in the adjacent apartment.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="956" id="AdThrive_Content_31_desktop" style="min-height: 250px;"></div><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Luckily, concrete and even modern paints don’t allow for smoke to penetrate through walls.</span></p><span data-dcnode-id="952" instrument_node="">
</span><h4 data-dcnode-id="948"><span class="ez-toc-section" data-dcnode-id="951" id="Do_HEPA_Filters_Remove_Smoke"></span><span data-dcnode-id="950" instrument_node="">Do HEPA Filters Remove Smoke?</span><span class="ez-toc-section-end" data-dcnode-id="949"></span></h4><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">HEPA filters do remove smoke particles. According to the </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.standards.doe.gov/standards-documents/3000/3020-astd-2015"><span data-dcnode-id="945" instrument_node="">DOE’s definition of HEPA filters</span></a><span data-dcnode-id="943" instrument_node="">:</span></p><span data-dcnode-id="941" instrument_node="">
</span><blockquote data-dcnode-id="938"><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">“HEPA filters capture 99.97% of particles whose diameter is equal to 0.3 μm.”</span></p></blockquote><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">That includes smoke particles. However, it does not include the smoke smell. Smoke smell is not a particle, but rather a volatile organic compound (VOCs) like all odors.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">HEPA filters don’t capture smoke smell; that’s the job the charcoal filters do well.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h4 data-dcnode-id="927"><span class="ez-toc-section" data-dcnode-id="930" id="Will_Charcoal_Filters_Remove_Smoke_Smell"></span><span data-dcnode-id="929" instrument_node="">Will Charcoal Filters Remove Smoke Smell?</span><span class="ez-toc-section-end" data-dcnode-id="928"></span></h4><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">Yes. Charcoal filters are specifically designed to remove bad smells – including </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/how-to-smoke-in-your-room-without-it-smelling/"><span data-dcnode-id="924" instrument_node="">removing smoke smell indoors</span></a><span data-dcnode-id="922" instrument_node=""> – from indoor air.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">You won’t find an air purifier for smoke smell removal without an activated charcoal filter. Smoke smell is a VOC (volatile organic compounds); it’s in a gaseous form and cannot be stopped by mechanic filters like HEPA filters.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Charcoal filters effectively adsorb all VOCs, including smoke smell, and remove them from indoor air circulation.</span></p><span data-dcnode-id="914" instrument_node="">
</span><hr data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
</span><h4 data-dcnode-id="908"><span class="ez-toc-section" data-dcnode-id="911" id="Overall_Look_At_Smoke_Air_Purifiers"></span><span data-dcnode-id="910" instrument_node="">Overall Look At Smoke Air Purifiers</span><span class="ez-toc-section-end" data-dcnode-id="909"></span></h4><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">As we have seen, it’s not all that hard to pick the best air purifier for wildire smoke. We just need which filters remove smoke:</span></p><span data-dcnode-id="904" instrument_node="">
</span><ul data-dcnode-id="896"><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">HEPA filters remove solid smoke particles.</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Gaseous smoke smell is removed by an activated charcoal filter via the process of adsorption.</span></li><span data-dcnode-id="897" instrument_node="">
</span></ul><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">How well both of these filters and overall air purifier removes smoke is measured by AHAM’s smoke CADR rating.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The higher the smoke CADR rating, the better the air purifier against smoke.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Based on that, the selection of the best air purifier for smoke is quite evident.</span></p><span data-dcnode-id="886" instrument_node="">

</span><p data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">EER = BTU</span><sub data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">cooling</span></sub><span data-dcnode-id="520" instrument_node="">/W</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">HSPF = BTU</span><sub data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">heating</span></sub><span data-dcnode-id="514" instrument_node="">/W</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">COP = Q (useful heat)/W (input work)</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="508" instrument_node="">ACH = CFM x 60/Area x Height</span><sub data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">ceiling</span></sub></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Total Heat (BTU/hr.) = 4.5 x CFM x Δh (std. air)</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Sensible Heat (BTU/hr) = 1.1 x CFM x Δt (std. air)</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Latent Heat (BTU/hr) = 0.69 x CFM x Δgr. (std. air)</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">1 HP = 746 Watts</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">1 kW = 3413 BTU</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">&nbsp;</span></p><span data-dcnode-id="486" instrument_node="">
