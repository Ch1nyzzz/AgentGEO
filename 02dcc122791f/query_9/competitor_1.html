</span><p data-dcnode-id="505"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Air purifiers have a lot of unique smells that people do not expect when they get them unboxed and turned on. Some Not So Good.</span></strong></p><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">There’s been more than once when somebody told me about an air purifier that they used to have that smelled weird.</span></p><p data-dcnode-id="500"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">My answer is “Was it an ionic air purifier?”</span></strong></p><p data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">That’s usually the best place to start when talking about why a air purifier smells funny.</span></strong></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Ionic air purifiers create ozone as a byproduct and ozone is a major contributor to the smell that an air purifier makes.</span></p><p data-dcnode-id="492"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">But not all air cleaner smells or related to Ozone, so we’ll try to do our best to lay out why and what certain smells are.</span></strong></p><div class="ez-toc-v2_0_18 counter-hierarchy counter-decimal ez-toc-grey" data-dcnode-id="454" id="ez-toc-container"><span data-dcnode-id="491" instrument_node="">

</span><h2 data-dcnode-id="447"><span class="ez-toc-section" data-dcnode-id="452" id="Why_does_my_air_purifier_smell_bad"></span><span data-dcnode-id="451" instrument_node="">Why does my air purifier smell bad?</span><br data-dcnode-id="450"><br data-dcnode-id="449"><span class="ez-toc-section-end" data-dcnode-id="448"></span></h2><p data-dcnode-id="441"><strong data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">Some of the smells associated with </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/disadvantages-of-air-purifiers/"><span data-dcnode-id="445" instrument_node="">air purifiers</span></a><span data-dcnode-id="443" instrument_node=""> include:</span></strong></p><ol data-dcnode-id="421" type="1"><li data-dcnode-id="437"><b data-dcnode-id="438"><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/what-does-ozone-smell-like-in-an-air-purifier/" rel="noopener" target="_blank"><span data-dcnode-id="440" instrument_node="">Ozone</span></a></b></li><li data-dcnode-id="434"><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Chlorine</span></b></li><li data-dcnode-id="431"><b data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Wet dog</span></b></li><li data-dcnode-id="428"><b data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Sweet</span></b></li><li data-dcnode-id="425"><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Plastic</span></b></li><li data-dcnode-id="422"><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Burning</span></b></li></ol><p data-dcnode-id="416"><b data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Not all smells associated with air purifiers are bad, just unexpected. Though any odor can be annoying if it persist.</span></b><br data-dcnode-id="418"><span data-dcnode-id="417" instrument_node="">Not everyone can handle the smell of cologne on them all day long, even though most would argue that it’s a good smell.</span></p><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">It’s the same thing with using a air cleaner that produces a smell. It’s part of the process.</span></p><p data-dcnode-id="402" style="text-align: center;"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3fqK8op" rel="noopener" target="_blank"><b data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Levoit Air Purifiers</span></b><span data-dcnode-id="411" instrument_node=""> </span><strong data-dcnode-id="406"><span data-dcnode-id="408" style="color: #993300;"><span data-dcnode-id="410" instrument_node="">are the Best Selling air cleaners on Amazon.</span><br data-dcnode-id="409"></span><span data-dcnode-id="407" instrument_node=""> Check them out here.</span></strong><img border="0" class="alignleft" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB07VVK39F7%26Format%3D_SL160_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dbreathebet0d1-20%26language%3Den_US&amp;raw"></a><img alt="" border="0" data-dcnode-id="403" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dbreathebet0d1-20%26language%3Den_US%26l%3Dli2%26o%3D1%26a%3DB07VVK39F7&amp;raw" style="border: none !important; margin: 0px !important;" width="1"></p><p data-dcnode-id="399"><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">&nbsp;</span></b></p><p data-dcnode-id="396"><b data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">&nbsp;</span></b></p><p data-dcnode-id="393"><b data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">I think that most people if they knowingly had a choice, would choose an air purifier that doesn’t create any smell compared to one that does.</span></b></p><p data-dcnode-id="390"><b data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">But that does not necessarily mean that they would be making the right choice.</span></b></p><h3 data-dcnode-id="383"><span class="ez-toc-section" data-dcnode-id="389" id="Air_purifier_smells_like_chlorine"></span><img alt="Air purifier smells like chlorine" class="aligncenter wp-image-2951 size-large lazyloaded" data-dcnode-id="388" data-src="https://breathebetterair.org/wp-content/uploads/2020/04/swimming-girl-swimming-pool-chlorine-683x1024.jpg" height="1024" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/04/swimming-girl-swimming-pool-chlorine-683x1024.jpg&amp;raw" width="683"><noscript data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">&lt;img class="aligncenter wp-image-2951 size-large" src="https://breathebetterair.org/wp-content/uploads/2020/04/swimming-girl-swimming-pool-chlorine-683x1024.jpg" alt="Air purifier smells like chlorine" width="683" height="1024" /&gt;</span></noscript><span data-dcnode-id="385" instrument_node=""> Air purifier smells like chlorine</span><span class="ez-toc-section-end" data-dcnode-id="384"></span></h3><p data-dcnode-id="380"><b data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The chlorine smell that certain air purifiers make is most likely ozone.</span></b></p><p data-dcnode-id="376"><span data-dcnode-id="379" instrument_node="">Ionic air purifiers and UV air purifiers both manufacturer ozone as a byproduct. </span><b data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Though most air purifiers do not create a dangerous amount of ozone, you can still smell ozone at a very low level.</span></b></p><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Most companies advertise their ionic best air cleaners as having a fresh after a thunderstorm smell.</span></p><p data-dcnode-id="371"><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Winix-5500-2-Purifier-PlasmaWave-Reducing/dp/B01D8DAYII%3Fasc_contentid%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26asc_contenttype%3Darticle%26ascsubtag%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26crid%3D1YMBPUZR58PNN%26cv_ct_cx%3Dair%2Bpurifier%26cv_ct_id%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26cv_ct_pg%3Dsearch%26cv_ct_we%3Dasin%26cv_ct_wn%3Dosp-single-source-pecos-desktop%26dchild%3D1%26keywords%3Dair%2Bpurifier%26pd_rd_i%3DB01D8DAYII%26pd_rd_r%3D9ed069e7-0776-4f99-a14d-cb1a9f2d7e18%26pd_rd_w%3DEIDYf%26pd_rd_wg%3D6KJGR%26pf_rd_p%3D1b34f127-880a-4b1b-855c-50e91f9e2b61%26pf_rd_r%3DE7E4YA3DEA57ZAV2VZ22%26qid%3D1621995447%26sprefix%3Dair%2B%252Caps%252C611%26sr%3D1-2-c26ac7f6-b43f-4741-a772-17cad7536576%26linkCode%3Dli2%26tag%3Dbreathebet0d1-20%26linkId%3Dbb7d228f42e85514edbb820a1cd06c1b%26language%3Den_US%26ref_%3Das_li_ss_il" rel="noopener" target="_blank"><img border="0" class="aligncenter" data-dcnode-id="373" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB01D8DAYII%26Format%3D_SL160_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dbreathebet0d1-20%26language%3Den_US&amp;raw"></a></p><p class="a-size-large a-spacing-none" data-dcnode-id="361" id="title" style="text-align: center;"><b data-dcnode-id="362"><span class="a-size-large product-title-word-break" data-dcnode-id="363" id="productTitle"><span data-dcnode-id="370" instrument_node="">Winix 5500-2 Air Purifier </span><span data-dcnode-id="368" style="color: #993300;"><span data-dcnode-id="369" instrument_node="">with True HEPA, PlasmaWave and Odor Reducing Washable AOC Carbon Filter.</span></span><br data-dcnode-id="367"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3vmN9eB" rel="noopener" target="_blank"><span data-dcnode-id="366" instrument_node="">Buy Now</span></a><span data-dcnode-id="364" instrument_node="">.</span></span></b></p><p data-dcnode-id="355"><span data-dcnode-id="360" instrument_node="">That is because a thunderstorm that produces lightning is also creating a high level of ozone in the process.</span><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node="">But though that may be true on some level, </span><b data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">ozone actually has a antiseptic smell that can be compared to chlorine or bleach.</span></b></p><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">But that isn’t always a bad thing. You expect chlorine or bleach to have a strong odor but you also realize that both are strong germ killers.</span></p><p data-dcnode-id="349"><span data-dcnode-id="352" instrument_node="">The same with ozone. </span><b data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Though there are air purifiers that create zero smell, they don’t have the same disinfectant qualities that can eliminate viruses and germs like an air purifier that creates ozone is a by-product can do.</span></b></p><h3 data-dcnode-id="342"><span class="ez-toc-section" data-dcnode-id="348" id="Air_purifier_smells_like_wet_dog"></span><img alt="Air purifier smells like wet dog" class="aligncenter size-full wp-image-2954 lazyloaded" data-dcnode-id="347" data-src="https://breathebetterair.org/wp-content/uploads/2020/04/dog-animal-pet-cocker-spaniel.jpg" height="728" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/04/dog-animal-pet-cocker-spaniel.jpg&amp;raw" width="910"><noscript data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">&lt;img class="aligncenter size-full wp-image-2954" src="https://breathebetterair.org/wp-content/uploads/2020/04/dog-animal-pet-cocker-spaniel.jpg" alt="Air purifier smells like wet dog" width="910" height="728" /&gt;</span></noscript><span data-dcnode-id="344" instrument_node="">Air purifier smells like wet dog</span><span class="ez-toc-section-end" data-dcnode-id="343"></span></h3><p data-dcnode-id="339"><b data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Wet dog is a distinctive smell.</span></b></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">All mammals including yourself and me have bacteria and yeast living on us.</span></p><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">You don’t usually notice any odors from this fact but when it comes to dogs, they have a different body chemistry that when wet unleashes a musty mixture of scents referred to as wet dog.</span></p><p data-dcnode-id="332"><b data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">People often have the same kind of complaints of wet dog smell coming from there HVAC central heat and air unit is they do from their HEPA air purifier.</span></b></p><p data-dcnode-id="329"><b data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">The smell has to do with the bacteria, yeast,&nbsp;and mold.&nbsp;</span></b></p><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Though it may be disconcerting that the machine that was supposed to eliminate the airborne contaminants is now the culprit releasing odors from the now captured germs,</span></p><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">and especially when it seems like you just replaced that filters.</span></p><h3 data-dcnode-id="317"><span class="ez-toc-section" data-dcnode-id="324" id="Air_purifier_smells_sweet"></span><img alt="Air purifier smells sweet" class="aligncenter wp-image-2953 size-full lazyloaded" data-dcnode-id="323" data-src="https://breathebetterair.org/wp-content/uploads/2020/04/cakes-candles-brithday-birthday-cake.jpg" height="607" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/04/cakes-candles-brithday-birthday-cake.jpg&amp;raw" width="910"><noscript data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">&lt;img class="aligncenter wp-image-2953 size-full" src="https://breathebetterair.org/wp-content/uploads/2020/04/cakes-candles-brithday-birthday-cake.jpg" alt="Air purifier smells sweet" width="910" height="607" /&gt;</span></noscript><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">Air purifier smells sweet</span><span class="ez-toc-section-end" data-dcnode-id="318"></span></h3><p data-dcnode-id="312"><b data-dcnode-id="313"><span data-dcnode-id="316" instrument_node="">A sweet smell coming from an air purifier is more than likely the aroma of the carbon filter.</span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">Carbon filters are known for having a sweet smell right out of the box , some people even go as far as to describe it as a cake-like smell.</span></b></p><h5 class="a-size-large a-spacing-none" data-dcnode-id="300" id="title"><span class="ez-toc-section" data-dcnode-id="311" id="Coway_AP-1512HH_Mighty_Air_Purifier_with_True_HEPA_and_Eco_Mode_Shop_Now"></span><span class="a-size-large product-title-word-break" data-dcnode-id="302" id="productTitle"><span data-dcnode-id="309" style="color: #993300;"><span data-dcnode-id="310" instrument_node="">Coway AP-1512HH Mighty Air Purifier with True HEPA and Eco Mode.</span></span><br data-dcnode-id="308"><span data-dcnode-id="304" style="color: #993300;"><span data-dcnode-id="307" instrument_node="">&nbsp; </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/34kpCiB" rel="noopener" target="_blank"><span data-dcnode-id="306" instrument_node="">Shop Now</span></a></span><br data-dcnode-id="303"></span><span class="ez-toc-section-end" data-dcnode-id="301"></span></h5><p data-dcnode-id="297"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Coway-AP-1512HH-Mighty-Purifier-True/dp/B00BTKAPUU%3Fasc_contentid%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26asc_contenttype%3Darticle%26ascsubtag%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26crid%3D1YMBPUZR58PNN%26cv_ct_cx%3Dair%2Bpurifier%26cv_ct_id%3Damzn1.osa.8f88702b-3c9f-43e9-9bef-563cb22098ad.ATVPDKIKX0DER.en_US%26cv_ct_pg%3Dsearch%26cv_ct_we%3Dasin%26cv_ct_wn%3Dosp-single-source-pecos-desktop%26dchild%3D1%26keywords%3Dair%2Bpurifier%26pd_rd_i%3DB00BTKAPUU%26pd_rd_r%3D9ed069e7-0776-4f99-a14d-cb1a9f2d7e18%26pd_rd_w%3DEIDYf%26pd_rd_wg%3D6KJGR%26pf_rd_p%3D1b34f127-880a-4b1b-855c-50e91f9e2b61%26pf_rd_r%3DE7E4YA3DEA57ZAV2VZ22%26qid%3D1621995447%26sprefix%3Dair%2B%252Caps%252C611%26sr%3D1-1-c26ac7f6-b43f-4741-a772-17cad7536576%26linkCode%3Dli1%26tag%3Dbreathebet0d1-20%26linkId%3D366443e15bb5eb1c24b64474da17bbc0%26language%3Den_US%26ref_%3Das_li_ss_il" rel="noopener" target="_blank"><img border="0" class="alignleft" data-dcnode-id="299" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB00BTKAPUU%26Format%3D_SL110_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dbreathebet0d1-20%26language%3Den_US&amp;raw"></a></p><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Though it may be annoying if you do not like the smell, you can also be a very advantageous tool when trying to decide if it’s time to change your carbon.</span></p><p data-dcnode-id="292"><b data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">That sweet smell of a carbon filter is a good indicator whether or not it’s time to change the carbon filter.</span></b></p><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Very simply,&nbsp; if the carbon still smells sweet, then you’re probably good.&nbsp; But if the sweet smell is gone, the carbon has probably adsorbed as much as it’s going to and it’s time to change the carbon filter.</span></p><h3 data-dcnode-id="286"><span class="ez-toc-section" data-dcnode-id="289" id="Air_purifier_smells_like_plastic"></span><span data-dcnode-id="288" instrument_node="">Air purifier smells like plastic</span><span class="ez-toc-section-end" data-dcnode-id="287"></span></h3><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Plastics, when they are being molded give off a very strong smell.</span></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Moulding areas must be vented very well for technicians to be able to work in their areas because of the intense smell.</span></p><p data-dcnode-id="279"><b data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Air purifiers made from plastic can retain many of the odors from the original molding process.</span></b></p><p data-dcnode-id="273"><b data-dcnode-id="274"><span data-dcnode-id="278" instrument_node="">Also since air purifiers are electronically powered, fumes from the plastic may also be re-released when </span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/how-to-stay-warm-without-heat-or-electricity/"><span data-dcnode-id="277" instrument_node="">heated up by electricity</span></a><span data-dcnode-id="275" instrument_node="">.</span></b></p><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Either way, the smell will dissipate and after a few uses the smell should be completely gone.</span></p><p data-dcnode-id="265"><b data-dcnode-id="266"><span data-dcnode-id="270" instrument_node="">If you have a plastic </span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/purifier-using-water/"><span data-dcnode-id="269" instrument_node="">air purifier</span></a><span data-dcnode-id="267" instrument_node=""> that continually smells strong&nbsp;of burning plastic even after a few uses then there may be a problem that is actually burning plastic as it is running.</span></b></p><p data-dcnode-id="262"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">That would be a fire hazard.</span></b></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">If that is the case then discontinue use and call the manufacturer.</span></p><h3 data-dcnode-id="253"><span class="ez-toc-section" data-dcnode-id="259" id="Air_purifier_smells_like_burning"></span><img alt="Air purifier smells like burning" class="aligncenter wp-image-2952 size-full lazyloaded" data-dcnode-id="258" data-src="https://breathebetterair.org/wp-content/uploads/2020/04/still-fire-flames-burning-charred-beautiful.jpg" height="607" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/04/still-fire-flames-burning-charred-beautiful.jpg&amp;raw" width="910"><noscript data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">&lt;img class="aligncenter wp-image-2952 size-full" src="https://breathebetterair.org/wp-content/uploads/2020/04/still-fire-flames-burning-charred-beautiful.jpg" alt="Air purifier smells like burning" width="910" height="607" /&gt;</span></noscript><span data-dcnode-id="255" instrument_node="">Air purifier smells like burning.</span><span class="ez-toc-section-end" data-dcnode-id="254"></span></h3><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Air purifier like any other appliance runs off of electricity.</span></p><p data-dcnode-id="245"><b data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">If you have just pulled the air purifier out of the box and ran it for the first time or even a few times, the </span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/heating/space-heater-smells-like-burning/"><span data-dcnode-id="249" instrument_node="">smell of burning may be related to off-gassing from plastics</span></a><span data-dcnode-id="247" instrument_node=""> that are being reheated by electricity.</span></b></p><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Any burning smells in this case we will probably be unnoticeable within a few days and are simply “new car” smells.</span></p><p data-dcnode-id="237"><b data-dcnode-id="238"><span data-dcnode-id="242" instrument_node="">But if you feel like there is a stronger then usual burning smell coming from your </span><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/top-7-plants-to-purify-your-air-naturally/"><span data-dcnode-id="241" instrument_node="">air purifier</span></a><span data-dcnode-id="239" instrument_node=""> and you are past the window of time of new appliance smells, then you need to turn the air purifier off and have it checked.</span></b></p><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Most of the time when there is any kind of shorting out of an appliance, it will either trip a breaker or a safety switch located on the appliance.</span></p><p data-dcnode-id="229"><b data-dcnode-id="232"><span data-dcnode-id="234" instrument_node="">Another strong or burning smell can be related to air purifiers that use ultraviolet light. If there is a very strong smell coming from a UV lamp, then the light has malfunctioned.</span><br data-dcnode-id="233"></b><br data-dcnode-id="231"><span data-dcnode-id="230" instrument_node="">A UV lamp that is malfunctioning can create a strong stench ozone.</span></p><p data-dcnode-id="226"><b data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Summary</span></b></p><p data-dcnode-id="223"><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">&nbsp;</span></b></p><p data-dcnode-id="218"><b data-dcnode-id="219"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/are-air-purifiers-a-waste-of-money/"><span data-dcnode-id="222" instrument_node="">Are air purifiers worth it?</span></a><br data-dcnode-id="220"></b></p><p data-dcnode-id="214"><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/purifiers-dry-air/"><span data-dcnode-id="217" instrument_node="">Air purifiers</span></a><span data-dcnode-id="215" instrument_node=""> have multiple reasons why they can have a smell coming from them.</span></p><p data-dcnode-id="207"><b data-dcnode-id="208"><span data-dcnode-id="213" instrument_node="">The reasons are typically ozone related,</span><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">but other reasons can include filters that are dirty, off-gassing from plastics,</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">Malfunctioning UV lamps, and the unusual sweet smell that comes from activated carbon.</span></b></p><p data-dcnode-id="199"><span data-dcnode-id="206" instrument_node="">Though most smells are normal for the type of </span><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/are-air-purifiers-safe-for-cats/"><span data-dcnode-id="205" instrument_node="">air purifier</span></a><span data-dcnode-id="203" instrument_node=""> and the </span><a data-dcnode-id="201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/how-did-the-winix-plasmawave-slip-through-the-cracks-review/"><span data-dcnode-id="202" instrument_node="">technology</span></a><span data-dcnode-id="200" instrument_node=""> that they employ,</span></p><p data-dcnode-id="194"><span data-dcnode-id="198" instrument_node="">If there is a particularly strong or burning </span><a data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/air-purifiers-help-smell/"><span data-dcnode-id="197" instrument_node="">smell not characteristic of the air purifier</span></a><span data-dcnode-id="195" instrument_node="">, then you should shut it off and call the manufacturer.</span></p><div class="yj6qo" data-dcnode-id="192" style="text-align: center;"><span data-dcnode-id="193" instrument_node="">&nbsp;</span></div><span data-dcnode-id="191" instrument_node=""> </span></div><span data-dcnode-id="189" instrument_node="">
</span></div><span data-dcnode-id="187" instrument_node="">
