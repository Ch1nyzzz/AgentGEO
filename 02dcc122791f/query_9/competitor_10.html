</span><h1 class="entry-title" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Why Does My Honeywell Air Purifier Smell?</span></h1><span data-dcnode-id="637" instrument_node=""> </span><div class="entry-meta sr-only" data-dcnode-id="621"><span data-dcnode-id="636" instrument_node="">
</span><meta content="2020-06-08" data-dcnode-id="635" itemprop="datePublished"><meta content="2020-09-25" data-dcnode-id="634" itemprop="dateModified"><span class="byline" data-dcnode-id="628"><span data-dcnode-id="633" instrument_node=""> Written by </span><span class="author vcard" data-dcnode-id="630"><a class="url fn n" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airandwaterexpert.com/author/usefulrxinfo/"><span data-dcnode-id="632" instrument_node="">Kwaku</span></a></span><span data-dcnode-id="629" instrument_node=""> </span></span><meta content="Kwaku" data-dcnode-id="627" itemprop="author"><link data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airandwaterexpert.com/why-does-my-honeywell-air-purifier-smell/&amp;raw" id="page-url" itemprop="mainEntityOfPage"><span data-dcnode-id="625" instrument_node=""> in </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airandwaterexpert.com/category/clean-air/" rel="category tag"><span data-dcnode-id="624" instrument_node="">Clean Air</span></a><span data-dcnode-id="622" instrument_node=""> </span></div><span data-dcnode-id="619" instrument_node="">

</span><img alt="Why Does My Honeywell Air Purifier Smell?" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="612" height="640" sizes="(max-width: 636px) 100vw, 636px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airandwaterexpert.com/wp-content/uploads/2020/05/stink-4265849_640.png&amp;raw" srcset="https://airandwaterexpert.com/wp-content/uploads/2020/05/stink-4265849_640.png 636w, https://airandwaterexpert.com/wp-content/uploads/2020/05/stink-4265849_640-298x300.png 298w, https://airandwaterexpert.com/wp-content/uploads/2020/05/stink-4265849_640-150x150.png 150w" width="636"><span data-dcnode-id="611" instrument_node=""> </span></div><span data-dcnode-id="608" instrument_node="">
</span><div class="entry-content" data-dcnode-id="226" itemprop="articleBody"><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The primary function of air purifiers is to remove foul odors and air pollutants from your environment or home. Manufacturers fit air purifiers is with specialized filters designed to remove impurities and allergens from the air.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">While an air purifier is one of the best ways to promote clean air and good health at home, an air purifier does require simple, regular maintenance to make sure it runs at maximum efficiency.&nbsp;</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="600" instrument_node="">Why does my Honeywell air purifier smell? </span><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Your Honeywell air purifier could smell if it is new, as it may need to run to get rid of dust or the off-gassing of new plastic. It may give off a more unpleasant smell if the filters get damp or become clogged with excess air pollutants.</span></strong></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="592"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="593" instrument_node="">If you are experiencing an odor or smell coming from your Honeywell air purifier, it may be for several different reasons.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">In this article, we will explore how to use and maintain your Honeywell air purifier, the different types of smells you may experience, and what you can do to solve the problem.</span></p><span data-dcnode-id="588" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">How Does My Honeywell Air Purifier Work?</span></h2><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Your Honeywell air purifier uses scientifically proven, patented air filtration technology to keep your home free of indoor air pollutants and allergens like pollen, dust, tobacco smoke, pet dandruff, germs, and bacteria.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">Honeywell air purifiers work by drawing the air through a series of filters, which includes a carbon pre-filter and a High-Efficiency Particulate Air (HEPA) filter (</span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellpluggedin.com/air-purifiers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="580" instrument_node="">source</span></a><span data-dcnode-id="578" instrument_node="">).</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">These filters perform the task of removing the air pollutants and absorbing foul odors and VOCs (Volatile Organic Compounds).</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The fan sucks in air through these filters and pushes it back out through the top of the air purifier. For this reason, you should always make sure that the front and top of your air purifier is clear to ensure a free flow of air.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">What are Volatile Organic Compounds?&nbsp;</span></h2><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Volatile Organic Compounds or VOCs are naturally occurring organic chemicals found both indoors and outdoors. These chemicals typically have very low boiling points, which causes them to be present as vapor in the air at ambient temperatures.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Familiar sources of indoor VOCs are household cleaning products, paint and brush cleaners, building supplies, nail polish remover, and even something as simple as a&nbsp; permanent marker (</span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/technical-overview-volatile-organic-compounds" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="562" instrument_node="">source</span></a><span data-dcnode-id="560" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="558" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">What is a HEPA filter?</span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">HEPA stands for high-efficiency particulate air, and a HEPA filter works by drawing air through a very fine mesh.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The primary material in a HEPA filter mesh is usually very fine fiberglass threads designed to capture ultra-fine airborne particles. </span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The construction of the mesh traps air pollutants such as pollen, tobacco smoke particles, dust mites, pet dandruff, germs, bacteria, and mold spores.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">The technology was initially designed by nuclear scientists to trap hazardous particles in the air. However, HEPA filters are now widely used to purify the air in both the home and office environments.&nbsp;</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">A HEPA filter is manufactured, tested, and certified to specific HEPA industry standards. In the United States, a certified HEPA filter must meet the standards which are set by the Department of Energy (DOE).</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">HEPA filters are guaranteed to remove 99.97% of all air particles down to a 0.3 microns size.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">Using a Honeywell air purifier that uses a HEPA filter in your home will help remove most airborne pollutants that cause an allergic reaction or make asthma worse (</span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.standards.doe.gov/standards-documents/3000/3025-astd-2007/%40%40images/file" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="535" instrument_node="">source</span></a><span data-dcnode-id="533" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">For more information about filters and using the right filter size, read our article </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airandwaterexpert.com/%3Fp%3D681" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="529" instrument_node="">Can I Use a 1-inch filter instead of a 5-inch?</span></a><span data-dcnode-id="527" instrument_node="">.</span></p><span data-dcnode-id="525" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Why Does My HEPA Filter Smell?&nbsp;</span></h2><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Under normal circumstances, your Honeywell HEPA filter should not smell if you change your filter regularly.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">However, if your HEPA filter does emit a strange smell, it may be because the filter has become overloaded with airborne pollutants, and you will need to clean or change the filter before the electronic filter change light has been activated.</span></p><span data-dcnode-id="516" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Can I Wash a Honeywell HEPA Filter?&nbsp;&nbsp;</span></h2><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">If you’re wondering, “Can I wash my Honeywell HEPA filter?” no, you should never wash your Honeywell HEPA filter in water, and you should never use household detergents or cleaners.&nbsp;</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Despite not being able to wash your Honeywell HEPA filter, you are able to clean your filter. </span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">To clean your Honeywell HEPA filter, gently vacuum it every few months to remove the dust particles and pollutants that have gathered on the surface of the filter.&nbsp;</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">Never try to scrub or scrape the filter or use sharp objects to clean it, as these may cause damage to the filter (</span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellsmarthomes.com/blog/advantages-timely-air-purifier-maintenance/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="502" instrument_node="">source</span></a><span data-dcnode-id="500" instrument_node="">).</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">A damaged HEPA filter will affect the efficiency of your Honeywell air purifier and will result in the need to purchase new filters before the required time.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">After cleaning and replacing your HEPA filter into your air purifying unit, you will need to reset the Electronic Filter Check light. </span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">To do this, you will need to press and hold the lighted button for a minimum of 3 seconds or until the LED light goes off. This process will reset the electronic filter check.</span></p><span data-dcnode-id="489" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Why Does My Air Purifier Smell Like a Wet Dog?&nbsp;</span></h2><span data-dcnode-id="486" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="469"><figure class="aligncenter is-resized" data-dcnode-id="470"><img alt="" data-dcnode-id="485" height="517" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh6.googleusercontent.com/JX-nAYo8PrwXS104YqKDvWaFMRQ5kM0ZByLltf-9qfz-zGf2Fq8Y3Yfjzj0BX6KdrJ5AksN6-gas_akoH1NvxE5iSOVdv7l39qoC0zufmOp7oL07xDlFanWiVAkB1knUet7ybeIW&amp;raw" width="780"><figcaption data-dcnode-id="471"><em data-dcnode-id="472"><span data-dcnode-id="484" instrument_node="">Image by</span><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node=""> </span></span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/users/jaymantri-362084/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Jay Mantri</span></span></a><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node=""> </span></span><span data-dcnode-id="476" instrument_node="">via </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/photos/dogs-beach-coast-friends-pets-569016/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Pixabay</span></span></a></em></figcaption></figure></div><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">That “wet dog” smell is very unique and unpleasant. Studies have shown that the wet dog smell itself does not emanate from your actual furry friend. The scent comes from tiny particles like yeasts, mold, and bacteria that live on your dogs’ fur.&nbsp;</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">When, or if, your dog gets wet, these tiny particles produce bad-smelling compounds, which are exaggerated when the water starts evaporating from your wet dog (</span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.akc.org/expert-advice/health/wet-dogs-smell-bad/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="463" instrument_node="">source</span></a><span data-dcnode-id="461" instrument_node="">).</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">We can apply this same reasoning to your air purifier. If your air filters have accidentally gotten wet or damp, the moisture could be reacting with the bacteria, yeast, or mold that has been trapped by your filter.&nbsp;</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">The trapped particles that are causing that “wet dog” smell will become more pronounced when you have activated your air purifier.&nbsp;The solution is to clean or change your air filters.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Other Types of Smells You May Experience</span></h2><span data-dcnode-id="450" instrument_node="">
</span><h3 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">An Ozone or Chlorine Smell&nbsp;</span></h3><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Ozone has a clean smell, something like the smell after a thunderstorm or the chlorine smell of a swimming pool. Some air purifiers and all ozone generators produce ozone as a byproduct.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">However, ozone is a powerful lung irritant, and symptoms of exposure to ozone may include coughing, tightness of the chest, and shortness of breath. Ozone-producing air purifiers have been banned for residential use in California (</span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ww2.arb.ca.gov/our-work/programs/air-cleaners-ozone-products/hazardous-ozone-generating-air-purifiers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="442" instrument_node="">source</span></a><span data-dcnode-id="440" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Honeywell air purifiers do not produce or emit any ozone, so you can be sure that the air in your home will stay safe, healthy, and clean.</span></p><span data-dcnode-id="435" instrument_node="">
</span><h3 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">A Sweet Smell</span></h3><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">While no-one expects their air purifier to smell at all, sometimes you may notice a sweet or cake-like smell when you first use your new air purifier. This sweet smell is most likely coming from a carbon filter.&nbsp;</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Air purified through a carbon filter should have a very distinct clean smell and should be void of all odors.&nbsp;</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Sometimes there is a slight sweet smell that comes from the activated carbon itself. Most people describe this sweet carbon smell as having a “fresh smell.”</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Carbon filters are well known for having a sweet smell when they are new. This sweet smell will go away with time, but it can also be a useful indicator of when to change the filter.&nbsp;</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">In normal circumstances, you should replace an activated carbon filter should after about 3,000 hours of use. </span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Mathematically, this works out to about 125 days of continuous use, depending on the ambient air quality. Again, when to change your filter will depend on the air quality of your location.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Air purifiers with filter replacement indicators can help you identify an old filter and let you know when to replace it promptly.</span></p><span data-dcnode-id="411" instrument_node="">
</span><h3 data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Plastic</span></h3><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">The body of most air purifiers is made of plastic. Plastic, during the molding process, gives off a very strong smell. </span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">The plastic smell emanating from your air purifier could be leftover residue from the production process. This smell should fade away with use over a short time.&nbsp;</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">However, if the plastic smell does not go away, or if the smell gets stronger after running your air purifier a few times, the smell could be an indication that your air purifier is burning plastic.&nbsp;</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">This plastic is a fire hazard, and you should switch off your air purifier immediately and contact the manufacturer for advice.&nbsp;&nbsp;</span></p><span data-dcnode-id="396" instrument_node="">
</span><h3 data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Burning</span></h3><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Mild smells of burning coming from your air purifier are not uncommon, especially when it is new. </span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Your air purifier runs on electricity, which produces heat. That initial burning smell could be the result of the burning off of dust collected from the packaging or the off-gassing of new plastic trapped inside the air purifier casing.&nbsp;</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">If the burning smell does not go away after a few minutes, it could be a sign of a more serious underlying technical problem. The problem may be due to faulty wiring or the motor overheating.&nbsp;</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="383" instrument_node="">Whatever the source, a burning smell that does not go away is a fire hazard. Switch off your appliance immediately and consult a technician or the manufacturer for advice (</span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/why-does-my-air-purifier-smell-bad/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="382" instrument_node="">source</span></a><span data-dcnode-id="380" instrument_node="">).</span></p><span data-dcnode-id="378" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">How Do I Set My Honeywell Air Purifier?&nbsp;</span></h2><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Honeywell offers a wide range of air purifiers designed and developed specifically for home, office, car, or commercial use.&nbsp;</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Make sure you choose the right model for your air purifying needs. Your choice will primarily depend on the size of your room. Additional features such as wifi connectivity, the type of filter, and the display will all play a part in your decision.&nbsp;</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="368" instrument_node="">If you are unsure about which air purifier model to buy, Honeywell can assist you with their unique </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellpluggedin.com/air-purifiers/buying-guide" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="367" instrument_node="">on-line buyer’s guide</span></a><span data-dcnode-id="365" instrument_node="">.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Once you have decided on the model that fits your needs, you will need to determine where to place your Honeywell air purifier.&nbsp;</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">As most of the Honeywell air purifier models are portable, they can be moved around the house to be used at different times or for various purposes.&nbsp;</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">For the best results, they recommend that you place the air purifier in the room you use the most, or you could place it in the room that has the lowest air quality.&nbsp;&nbsp;</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">If you suffer from asthma or allergies that keep you awake at night, running the air purifier in your bedroom while you are sleeping would be a good idea. </span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Your Honeywell air purifier will remove particles from the air, such as pollen, mold, and dust, that cause congestion. Cleaner air will help ensure that you get a good night’s sleep.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">In addition to your choice of room in which you will operate your air purifier, where you decide to place it is just as important.&nbsp;</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">You will need to place the air purifier somewhere where it can stand upright and where it is out of the way of foot traffic, and where it will not be easily knocked over.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Before using your Honeywell air purifier, always make sure you have read the manual to familiarise yourself with the different functions and settings.&nbsp;</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Your Honeywell air purifier comes with different settings or air cleaning levels. To get the most out of your air purifier, you should be sure to choose the right fan setting after switching it on.</span></p><span data-dcnode-id="336" instrument_node="">
</span><h3 data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">The Allergen Setting</span></h3><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">You can use the Allergen setting to remove allergens such as pollen, dust mites, animal dandruff, and other irritants from the air. It is a high setting that is most effective during the spring season when pollen counts are at their highest.&nbsp;</span></p><span data-dcnode-id="330" instrument_node="">
</span><h3 data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">The General Clean Setting</span></h3><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">The General Clean setting is a medium setting, which is best used for your everyday air cleaning needs.&nbsp;</span></p><span data-dcnode-id="324" instrument_node="">
</span><h3 data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">The Germ Setting</span></h3><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">The Germ setting is typically a low setting that is most effective when used during the cold and flu season.&nbsp;</span></p><span data-dcnode-id="318" instrument_node="">
</span><h3 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">The Turbo Clean Setting</span></h3><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The Turbo Clean setting operates the air purifying unit at the highest speed. It helps you to combat bad smells and cleans the air quickly.&nbsp;</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">To use the Turbo Clean setting, you must first select one of the above settings. After you switch off the Turbo Clean setting, your air purifying unit will go back to the previous setting you have chosen.</span></p><span data-dcnode-id="309" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Other Functions of Your Honeywell Air Purifier</span></h2><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">In addition to the different fan speeds, your Honeywell air purifier comes with other handy functions.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h3 data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The Timer Function</span></h3><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Just like any other timer function, this function allows you to set how long you would like the air purifier to run. Different models have different timer length settings, but you can generally set the timer in one-hour intervals.&nbsp;</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">The LED display will show the number of hours selected and will then count down those hours, displaying the number of hours the air purifying unit has left to run. Your unit will automatically switch off after the selected amount of time has run its course.</span></p><span data-dcnode-id="294" instrument_node="">
</span><h3 data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The Dimmer Function</span></h3><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">The dimmer function allows you to adjust the brightness of the LED display. Your Honeywell air purifying unit will always switch on with the display setting on HIGH. This light may be a bit annoying if you are trying to sleep.&nbsp;</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The dimmer function has three different settings for you to adjust the brightness of the display: HIGH, LOW or OFF.&nbsp;</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Please note, your Honeywell air purifier will still run with the dimmer function switched to OFF.</span></p><span data-dcnode-id="282" instrument_node="">
</span><h3 data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">The Electronic Filter Change Reminder</span></h3><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Most Honeywell air purifiers have two electronic filter-change-reminder check lights. One for the Pre-filter and one for the HEPA filter. These check lights will notify you when the filters need changing based on their hours of use.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="275" instrument_node="">In normal conditions of use, you should change the pre-filter every three months and the HEPA filter every twelve months (</span><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellpluggedin.com/sites/default/files/2018-04/hpa250-om%2520%25281%2529.pdf"><span data-dcnode-id="274" instrument_node="">sou</span></a><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellpluggedin.com/sites/default/files/2018-04/hpa250-om%2520%25281%2529.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="272" instrument_node="">r</span></a><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honeywellpluggedin.com/sites/default/files/2018-04/hpa250-om%2520%25281%2529.pdf"><span data-dcnode-id="270" instrument_node="">ce</span></a><span data-dcnode-id="268" instrument_node="">).</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">However, if your air quality is poor or if it contains a high quantity of air pollutants, such as pollen or tobacco smoke, you may need to change the filters more often.</span></p><span data-dcnode-id="263" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="246"><figure class="aligncenter is-resized" data-dcnode-id="247"><img alt="single cigarette stick with ashes stick" data-dcnode-id="262" height="517" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.unsplash.com/photo-1527099908998-5b73a5fe2a0d%3Fixlib%3Drb-1.2.1%26auto%3Dformat%26fit%3Dcrop%26w%3D1000%26q%3D80&amp;raw" width="780"><figcaption data-dcnode-id="248"><em data-dcnode-id="249"><span data-dcnode-id="261" instrument_node="">Image by </span><a data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40matmacq" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Mathew MacQuarrie</span></span></a><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node=""> </span></span><span data-dcnode-id="255" instrument_node="">via</span><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node=""> </span></span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/lzcKZlVPYaU" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-very-dark-gray-color" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Unsplash</span></span></a></em></figcaption></figure></div><span data-dcnode-id="245" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Final Thoughts</span></h2><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Deciding to purchase an air purifier is a step in the right direction to providing everyone in your family with safer and better quality air. Having cleaner air in your home reduces the risks of an attack for people who have asthma or other allergic reactions.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Using a Honeywell air purifier in your home is an excellent investment in your family’s health. An air purifier will help remove air allergens and pollutants caused by dust, mold, bacteria, and germs.&nbsp;</span></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Nevertheless, you cannot rely on your air purifier to remove bad odors alone. Regular vacuuming and cleaning will help reduce dust particles that may clog your filters causing them to smell.&nbsp;</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">While air purifiers are designed to remove smells as well as other contaminants from the air, they do come with a unique set of smells that may include ozone or the off-gassing of plastic.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Some of these smells may come as a surprise when you are expecting no odors, but are perfectly normal. However, if you are experiencing a particularly strong scent that does not go away, switch off the purifier and contact the manufacturer.</span></p><span data-dcnode-id="227" instrument_node="">
</span></div><span data-dcnode-id="224" instrument_node="">
