</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="875" data-fontsize="28" data-lineheight="35.28px" style="--fontSize:28; line-height: 1.26;"><span data-dcnode-id="876" instrument_node="">How Do HEPA Air Purifiers Work?</span></h2><span data-dcnode-id="874" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="869" id="attachment_21656" style="width: 760px"><img alt="RabbitAir MinusA2 Snoopy Wide" aria-describedby="caption-attachment-21656" class="lazyload size-full wp-image-21656" data-dcnode-id="873" data-orig-sizes="(max-width: 750px) 100vw, 750px" data-orig-src="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide.jpg" data-sizes="auto" data-srcset="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide-200x133.jpg 200w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide-300x200.jpg 300w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide-400x267.jpg 400w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide-600x400.jpg 600w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide-700x467.jpg 700w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide.jpg 750w" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/RabbitAir-MinusA2-Snoopy-Wide.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27750%27%20height%3D%27500%27%20viewBox%3D%270%200%20750%20500%27%3E%3Crect%20width%3D%27750%27%20height%3D%273500%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="750"><p class="wp-caption-text" data-dcnode-id="870" id="caption-attachment-21656"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yourelegantbar.com/collections/air-purifiers-smoke-eaters/%3Fref%3Dbespokeunit" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="872" instrument_node="">RabbitAir MinusA2</span></a></p></div><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">HEPA stands for “high-efficiency particulate air”, which was initially a trademark but now has become a generic term. It is used to designate an air filter’s efficiency in absorbing pollutants.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Typically, HEPA air purifiers contain filters that are essentially pads of fibreglass with gaps of between 0.5 and 2.0 micrometres. However, tobacco smoke tends to be about 0.1 microns in diameter. While most smoke will be captured by the fibres, some can pass through.</span></p><span data-dcnode-id="862" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="857" id="attachment_21660" style="width: 760px"><img alt="Austin Air Bedroom Machine" aria-describedby="caption-attachment-21660" class="lazyload wp-image-21660 size-full" data-dcnode-id="861" data-orig-sizes="(max-width: 750px) 100vw, 750px" data-orig-src="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine.jpg" data-sizes="auto" data-srcset="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine-200x133.jpg 200w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine-300x200.jpg 300w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine-400x267.jpg 400w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine-600x400.jpg 600w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine-700x467.jpg 700w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine.jpg 750w" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/09/Austin-Air-Bedroom-Machine.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27750%27%20height%3D%27500%27%20viewBox%3D%270%200%20750%20500%27%3E%3Crect%20width%3D%27750%27%20height%3D%273500%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="750"><p class="wp-caption-text" data-dcnode-id="858" id="caption-attachment-21660"><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yourelegantbar.com/collections/air-purifiers-smoke-eaters/%3Fref%3Dbespokeunit" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="860" instrument_node="">Austin Air Bedroom Machine</span></a></p></div><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Therefore, many purifiers today will feature multiple filters stacked against each other to catch any particles that managed to escape. Indeed, the USA’s ASME standards demand that a HEPA air filter captures 99.97% of 0.3-micron particles.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Although HEPA filters can capture fine particles, they don’t necessarily remove odours. Therefore, most will contain additional filters often made from activated carbon.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">High-quality filters that boast the ability to absorb odours will usually use carbon cloth filters and use the term High-Efficiency Gas Adsorption filters (HEGA).</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">As you will have seen above, air purifiers come in different shapes and sizes. Some are basically free-standing boxes, which can take a bit of space. However, there has been a growth of wall-mounted air filters, especially for cigar smokers.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">Finally, HEPA filters shouldn’t be confused with smoke eaters, which are units that use electrostatic charges to capture particles. You can learn more about them with our guide to </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bespokeunit.com/cigars/ventilation/smoke-eaters/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="842" instrument_node="">smoke eaters</span></a><span data-dcnode-id="840" instrument_node="">.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><a class="jumper" data-dcnode-id="837" name="choosing"></a></p><span data-dcnode-id="835" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="833" data-fontsize="28" data-lineheight="35.28px" style="--fontSize:28; line-height: 1.26;"><span data-dcnode-id="834" instrument_node="">How To Choose The Right Cigar Air Purifier</span></h2><span data-dcnode-id="832" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="827" id="attachment_19487" style="width: 760px"><img alt="Rabbit Air MinusA2 On Desk" aria-describedby="caption-attachment-19487" class="lazyload size-full wp-image-19487" data-dcnode-id="831" data-orig-sizes="(max-width: 750px) 100vw, 750px" data-orig-src="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk.jpg" data-sizes="auto" data-srcset="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk-200x133.jpg 200w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk-300x200.jpg 300w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk-400x266.jpg 400w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk-600x399.jpg 600w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk-700x466.jpg 700w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk.jpg 750w" height="499" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Rabbit-Air-MinusA2-On-Desk.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27750%27%20height%3D%27499%27%20viewBox%3D%270%200%20750%20499%27%3E%3Crect%20width%3D%27750%27%20height%3D%273499%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="750"><p class="wp-caption-text" data-dcnode-id="828" id="caption-attachment-19487"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/39KUY2G" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="830" instrument_node="">Rabbit Air MinusA2</span></a></p></div><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Should you decide on using an air purifier like those we listed above, bear in mind that the best one for you depends entirely on the room and your habits.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">For instance, if it’s a small room and you smoke an occasional cigar, you don’t need a device as powerful or as expensive as the IQAir.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">However, no matter how good their marketing, small tabletop purifiers are nothing more than useless when faced with cigar smoke. Therefore, it will still have to be a decent device at the very least.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Likewise, if you’re hosting several friends and will be smoking several cigars each in an evening, smaller budget-friendly purifiers will struggle to have any positive effect.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="812" data-fontsize="24" data-lineheight="30.24px" style="--fontSize:24; line-height: 1.26; --minFontSize:24;"><span data-dcnode-id="813" instrument_node="">Avoid Under-Powered Purifiers</span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="808"><img alt="Low-Powered Air Purifier" class="lazyload alignleft size-full wp-image-19494" data-dcnode-id="810" data-orig-sizes="(max-width: 350px) 100vw, 350px" data-orig-src="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier.jpg" data-sizes="auto" data-srcset="https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier-66x66.jpg 66w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier-150x150.jpg 150w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier-200x200.jpg 200w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier-300x300.jpg 300w, https://2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier.jpg 350w" height="350" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2x1dks3q6aoj44bz1r1tr92f-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/Low-Powered-Air-Purifier.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27350%27%20height%3D%27350%27%20viewBox%3D%270%200%20350%20350%27%3E%3Crect%20width%3D%27350%27%20height%3D%273350%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="350"><span data-dcnode-id="809" instrument_node="">We experienced this ourselves when Charles-Philippe received his first purifier, which was a budget model equivalent to Levoit’s Vital 100. When it first arrived, he tested it with a single Robusto in his study. Even with the window closed, it was effective at drastically reducing the smoke and residual smell.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">However, when he invited a friend over and they smoked two cigars each that evening, the purifier was overwhelmed. Not only did smoke creep under the door and into the rest of the house but the purifier’s HEPA filter became so tainted by the cold cigar smoke that it needed to be replaced after just one night of use.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Therefore, budget accordingly and opt for a device with the specs that match your needs. Although we listed them above, you can effectively ignore the ranges that brands advertise above as these rarely consider smoky environments.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Instead, you’ll need to look at the Clean Air Delivery Rate (CADR), which is listed in CFM. This stands for “cubic feet per minute” and provides an insight into how quickly they treat and circulate specific volumes of air. Some brands will even provide a smoke CADR, which is even more precise for smoky environments.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">To put this into perspective, you’ll need at least 150 to 200 CFM for a single robusto cigar in a typical 120 ft² (11 m²) room. However, 200 CFM is ideal for efficient air circulation as well as an additional 150 CFM for every extra cigar smoked at the same time.</span></p><span data-dcnode-id="795" instrument_node="">
