</span><h2 class="modal-before__text-heading" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Ozone Safety</span></h2><span data-dcnode-id="2261" instrument_node="">
</span><p class="modal-before__text-body" data-dcnode-id="2251"><span data-dcnode-id="2260" instrument_node="">Ozone generators are </span><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">for use in unoccupied spaces</span></strong><span data-dcnode-id="2257" instrument_node=""> and not running when people or pets are present. While O3 is a powerful oxidizer that will eliminate most odors, </span><strong data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">long-term exposure is not recommended</span></strong><span data-dcnode-id="2254" instrument_node=""> by government agencies because it can contribute to eye and respiratory irritation. </span><a class="showMore modal-before__text-link" data-dcnode-id="2252" href="#"><span data-dcnode-id="2253" instrument_node="">More…</span></a></p><span data-dcnode-id="2250" instrument_node="">
</span><div class="modal-before__more-text" data-dcnode-id="2240" id="OzoneExtra" style="display:none;"><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">These are valid safety concerns because the ozone breaks apart molecules as part of the oxidation process, especially odor causing molecules. However, humans and pets are also made up of molecules, so ozone at high levels has the potential to irritate the eyes and respiratory system, especially those with asthma or COPD. Therefore, ozone should be used with caution.</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2245" instrument_node="">In the recent past, some direct marketing companies sold air purifiers that produce ozone to consumers for use in occupied spaces. This created concern at the EPA, the FDA and the American Lung Association, which resulted in adverse publicity for the ozone industry. For decades prior to that time, ozone had been used commercially in the hotel, apartment, janitorial, water and fire damage remediation industries and many others, while spaces were unoccupied. So the state of California now has ozone restrictions for consumer air purifiers, and industrial ozone cleaners like the OdorFree have special labeling requirements. Beware of any type of air purifier that produces ozone and claims the product is for use in occupied spaces. </span><a class="showLess modal-before__text-link" data-dcnode-id="2243" href="#"><span data-dcnode-id="2244" instrument_node="">Less</span></a></p><span data-dcnode-id="2241" instrument_node="">
</span></div><span data-dcnode-id="2239" instrument_node="">
</span><h2 class="modal-before__text-heading" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">High Output Claims</span></h2><span data-dcnode-id="2236" instrument_node="">
</span><p class="modal-before__text-body" data-dcnode-id="2226"><span data-dcnode-id="2235" instrument_node="">Sellers on the internet often make false claims regarding the performance of their products in order to obtain a sale. </span><strong data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Beware of sales claims</span></strong><span data-dcnode-id="2232" instrument_node=""> for ozone generators with </span><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">very high ozone output</span></strong><span data-dcnode-id="2229" instrument_node=""> at a price that seems to be too good to be true. </span><a class="showMore modal-before__text-link" data-dcnode-id="2227" href="#"><span data-dcnode-id="2228" instrument_node="">More…</span></a></p><span data-dcnode-id="2225" instrument_node="">
</span><div class="modal-before__more-text" data-dcnode-id="2212" id="OutputExtra" style="display:none;"><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">In the event these units were creating the extremely high levels of output claimed, the ozone would be causing unseen damage to vulnerable materials like speakers, leather furniture, electronics and other materials. Once ozone reaches a certain level, degradation and deterioration of materials begins. Ozone can do great things, but as with any substance, too much or excessive levels will create problems. And extreme levels are not required for permanent odor removal. Moderation is the key to a successful ozone treatment.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Ozone output levels can vary as a result of air temperature, humidity, barometric pressure and other factors. And there are no set standards or protocols for testing ozone production in milligrams per hour (mg/hr). A high output number is sometimes posted simply to attract buyers. Unfortunately, there is no authority to prevent this type of misinformation from being uploaded and distributed on the web.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2217" instrument_node="">The vast majority of portable ozone generators sold in the US for commercial use employ ceramic plates. These machines generally produce ozone at output levels of 300 mg/hr to 2,000 mg/hr for the purpose of permanently removing odors. Mica plates fell into disfavor by most companies decades ago because they were not serviceable. Recently, they have reappeared with internet sellers. </span><a class="showLess modal-before__text-link" data-dcnode-id="2215" href="#"><span data-dcnode-id="2216" instrument_node="">Less</span></a></p><span data-dcnode-id="2213" instrument_node="">
</span></div><span data-dcnode-id="2211" instrument_node="">
</span><h2 class="modal-before__text-heading" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Check the Warranty</span></h2><span data-dcnode-id="2208" instrument_node="">
</span><p class="modal-before__text-body" data-dcnode-id="2195"><span data-dcnode-id="2207" instrument_node="">All ozone generators require </span><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">periodic cleaning</span></strong><span data-dcnode-id="2204" instrument_node=""> of the ozone producing elements to continue operating. </span><strong data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Beware of units</span></strong><span data-dcnode-id="2201" instrument_node=""> offered on the Internet </span><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">that cannot be maintained</span></strong><span data-dcnode-id="2198" instrument_node=""> by the buyer because they will stop functioning after a period of time. The OdorFree carries a 5 year warranty because it is built to be easily maintained. </span><a class="showMore modal-before__text-link" data-dcnode-id="2196" href="#"><span data-dcnode-id="2197" instrument_node="">More…</span></a></p><span data-dcnode-id="2194" instrument_node="">
</span><div class="modal-before__more-text" data-dcnode-id="2184" style="display:none;"><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Many ozone generators have a very short lifespan. Always check the details of the warranty that a manufacturer provides. Ozone can be corrosive and all ozone producing elements build up a film on the plates that dramatically reduces output. Even plates protected by a filter will build up a microscopic film on the plates over time that causes the ozone production to drop. Beware of ozone plates that cannot be removed and cleaned by the end user.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2189" instrument_node="">This is especially true of mica plates because the material cannot be cleaned and alignment is very important. So the mica plates have to be permanently built into a handmade assembly for protection. Thus, the mica assembly can become the most expensive component, by far, in the entire unit. Once the inevitable microscopic film builds up on the mica plates or corrosion occurs, ozone output drops dramatically, making it a throwaway product or requiring a costly return to the factory. The most expensive part in the unit will need regular maintenance but cannot be serviced, so the warranty can become somewhat meaningless. </span><a class="showLess modal-before__text-link" data-dcnode-id="2187" href="#"><span data-dcnode-id="2188" instrument_node="">Less</span></a></p><span data-dcnode-id="2185" instrument_node="">

</span></div><span data-dcnode-id="1902" instrument_node="">
</span></div><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1897"><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The OdorFree ozone generator is an excellent musty odor eliminator. Ozone goes directly to the source and will oxidize away the stale, unpleasant odors often found in damp areas, or those with little air circulation.</span></strong></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">O3 is very effective in removing musty odors. The OdorFree will produce high ozone levels for shock treatment. As the entire space fills with ozone, every interior surface including floors, ceilings, closets, furniture and clothing gets treated. While ozone is not able to pass through solid walls, it goes where normal air can go, even down into cracks and crevices.</span></p><span data-dcnode-id="1893" instrument_node="">

</span><p data-dcnode-id="1666"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Solution:</span></strong><span data-dcnode-id="1667" instrument_node="">&nbsp;To remove musty smells, close off the area to be treated and place an OdorFree unit in the space, then vacate the area.The treatment time depends on the size of the space and how deeply entrenched the odors. It can take less than an hour for small spaces with light odors but several hours or longer to remove heavy musty smells. After treatment allow the O3 to dissipate for at least an hour prior to re-occupying space. In the event that the source of the moisture has not been completely eliminated, treatment may need to be repeated periodically to prevent return.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Note: The fan on the thermostat for the air conditioner may be turned to the ON setting to circulate the O3 and remove any musty smell that has built up inside the ductwork. For long term treatment it is recommended that one window be kept open about 2 inches to provide a constant source of oxygen to the unit for ozone creation.</span></p><span data-dcnode-id="1662" instrument_node="">

</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">The Autel 1000 is able to eliminate musty odors in spaces up to 1,000 square feet, however, this unit only has a 60-Minute Timer. Most spaces will require longer treatment times, so an OdorFree model with a 12-Hour Timer is more convenient. This model has a variable ozone output control and a 60-Minute Timer that automatically turns the machine off when the treatment is completed. For deeply entrenched odors, there is also a “Hold” setting for treatment longer than 60 minutes until the machine is turned off manually. Complete with plates and filter for long-term use.</span></p><span data-dcnode-id="1527" instrument_node="">
