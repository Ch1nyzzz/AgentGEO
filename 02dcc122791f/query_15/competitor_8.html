t;social share-left sticky nav&quot;}" data-dcnode-id="2171" href="javascript:%20void(0)" onclick="window.open('https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fwww.tasteofhome.com%2Farticle%2Fmolekule-air-purifier-review%2F&amp;media=https%3A%2F%2Fwww.tasteofhome.com%2Fwp-content%2Fuploads%2F2021%2F10%2FMolekuleEnvironmentShot_Megan-Wood-e1633985275797.jpg&amp;description=This%20Appliance%20Saved%20Me%20Thousands%20on%20a%20Kitchen%20Remodel','sharer','toolbar=0,status=0,width=548,height=325');"><img alt="Pinterest" class="social-icons error" data-dcnode-id="2174" data-ll-status="error" height="32" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/wp-content/plugins/pup-social-share/images/pinterest-social-visual-website-logotype.svg&amp;raw" width="32"><noscript data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">&lt;img class="social-icons" src="https://www.tasteofhome.com/wp-content/plugins/pup-social-share/./images/pinterest-social-visual-website-logotype.svg" alt="Pinterest" width="32" height="32" /&gt;</span></noscript></a></li><li class="social-share-item" data-dcnode-id="2164"><a aria-label="Email" class="pure-menu-link email_a_friend" data-analytics-metrics="{&quot;name&quot;:&quot;email&quot;,&quot;module&quot;:&quot;content engagement&quot;,&quot;position&quot;:&quot;social share-left sticky nav&quot;}" data-dcnode-id="2165" href="javascript:%20void(0)" onclick="window.open('mailto:?subject=This Appliance Saved Me Thousands on a Kitchen Remodel&amp;body=I thought you might like this...%0D%0A %0D%0AThis Appliance Saved Me Thousands on a Kitchen Remodel %0D%0A %0D%0Ahttps%3A%2F%2Fwww.tasteofhome.com%2Farticle%2Fmolekule-air-purifier-review%3F_cmp%3Dstf %0D%0A %0D%0AHappy Cooking%2C%0D%0AYour friends from Taste of Home%0D%0A %0D%0A-- %0D%0A %0D%0AFor more great recipes and cooking inspiration signup for our newsletters https://bit.ly/2RcXV7b','_self')"><span data-dcnode-id="2169" instrument_node=""> </span><img alt="Email" class="social-icons error" data-dcnode-id="2168" data-ll-status="error" height="32" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/wp-content/plugins/pup-social-share/images/envelope.svg&amp;raw" width="32"><noscript data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&lt;img class="social-icons" src="https://www.tasteofhome.com/wp-content/plugins/pup-social-share/./images/envelope.svg" alt="Email" width="32" height="32" /&gt;</span></noscript></a></li></ul><span data-dcnode-id="2162" instrument_node=""> </span></div><span data-dcnode-id="2160" instrument_node="">
</span><div class="post-body" data-dcnode-id="1943"><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">I love my kitchen, but it’s missing one important feature: ventilation. I don’t have an external window or a range hood over the stove. Not only is it annoying to deal with lingering food odors from frying bacon and broiling salmon, but the particulate matter and smoke are downright dangerous.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2155" instrument_node="">In fact,&nbsp;the </span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/iaq-schools/why-indoor-air-quality-important-schools" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2154" instrument_node="">EPA estimates</span></a><span data-dcnode-id="2152" instrument_node=""> that indoor air quality can be two to five times worse than outdoor air quality. One of the main contributors to poor indoor air quality? The kitchen. Eek! Fed up with smelling Sunday’s meal prep well into Tuesday and nervous about breathing pollutants, I priced out the cost of a kitchen renovation and the numbers quickly hit four digits. Double eek!</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2149" instrument_node="">Instead of hiring a contractor, I decided to try the </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/air-purifiers" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2148" instrument_node="">Molekule Air Purifier</span></a><span data-dcnode-id="2146" instrument_node=""> first, to see if it could eliminate food odors and kitchen pollutants. (</span><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/collection/air-purifying-plants/"><span data-dcnode-id="2145" instrument_node="">Air-purifying plants</span></a><span data-dcnode-id="2143" instrument_node=""> can also filter home toxins.) Here’s what happened.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><h2 data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">What is a Molekule Air Purifier?</span></h2><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node="">Like the best product recommendations, I heard about Molekule Air Purifiers from a trusted friend. My cousin has one in her Portland apartment to filter gasses, </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/collection/ways-to-get-rid-of-dust/"><span data-dcnode-id="2136" instrument_node="">dust</span></a><span data-dcnode-id="2134" instrument_node=""> and odors from new paint and pet dander. Molekules are also used in luxury hotels, like the Ocean House in Rhode Island.</span></p><div data-dcnode-id="2132" data-nativo-placement-id="1101365" id="article_nativo1"></div><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Most air purifiers use traditional HEPA filters, but Molekule spent 25 years researching their own filtration system, called PECO, or photoelectrochemical oxidation. It’s very technical, but it just means free radicals break down pollutants, allergens, mold, bacteria and food smells (yes!) at a molecular level—something a HEPA filter can’t do.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2127" instrument_node="">Even better? A 2021 </span><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/molekule-mini-inactivates-strains-of-airborne-animal-coronavirus-and-influenza/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2126" instrument_node="">study</span></a><span data-dcnode-id="2124" instrument_node=""> showed that Molekule’s PECO technology also inactivates flu and coronavirus strains at a rate of 99.99 percent. Nanotechnology allows PECO to destroy pollutants 1000 times smaller than the standard filters must meet to qualify as HEPA. And yes, it’s cleared by the FDA.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><h2 data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Which Size Molekule to Choose</span></h2><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2118" instrument_node="">There are four versions of the </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/air-purifiers" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2117" instrument_node="">Molekule Air Purifier</span></a><span data-dcnode-id="2115" instrument_node="">. The main difference is size. Since I needed air purification in the kitchen (and wanted to check out the app), I chose the Air Mini+.</span></p><div class="ad" data-ad-responsive-sizes="{&quot;mobile&quot;:[[300,250],[3,3]]}" data-ad-slot-name="/article/content_1" data-ad-targeting="{&quot;tf&quot;:&quot;btf&quot;,&quot;pos&quot;:&quot;content_1&quot;,&quot;location&quot;:&quot;top&quot;}" data-dcnode-id="2113" id="ad626661276f201"></div><span data-dcnode-id="2112" instrument_node="">
</span><h3 data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Molekule Air Mini</span></h3><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">The smallest Molekule air filter is still mighty. It covers up to 250 square feet of space, making it ideal for kitchens and nurseries. The vegan leather handle is easy to transport if you want to move it from room to room to clear the air. It retails for $399.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><h3 data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Molekule Air Mini+</span></h3><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">The Molekule Air Mini+ is the same size as the original, but it has a few additional bells and whistles, and costs $499. With this model, there’s a particle sensor and an auto protect mode. Connect it to Wi-Fi to monitor your particle levels and adjust the speed remotely. That means you can watch TV in the living room and turn up the speed to clear out kitchen odors from the couch.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><h3 data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Molekule Air</span></h3><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Bigger spaces need bigger air filtrations systems. The Molekule Air works in spaces up to 600 square feet and costs $799.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><h3 data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Molekule Air Pro</span></h3><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2090" instrument_node="">Want to filter the air in your entire house? The Molekule Air Pro works up to 1,000 square feet! It also has auto protect modes and a particle sensor for maximum safeguarding. This model costs $1199.&nbsp; </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/collection/spring-cleaning-products/"><span data-dcnode-id="2089" instrument_node="">Spring cleaning</span></a><span data-dcnode-id="2087" instrument_node=""> just got a whole lot easier.</span></p><div data-dcnode-id="2085" data-nativo-placement-id="1118545" id="article_nativo2"></div><span data-dcnode-id="2084" instrument_node="">
</span><h2 data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">How We Tested It</span></h2><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Unboxing the Molekule Air Mini+ was easy. The unit arrived already assembled in a stylish cloth bag. I simply had to remove plastic wrapping, twist the base on and plug it in. Since I tested the Air Mini+, I downloaded the app and connected it to my home’s Wi-Fi.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">This is the only step in the process where I had a bit of trouble. I had to install and reinstall a few times to get the air filter to read my Wi-Fi connection. But it was worth it. I enjoy monitoring the kitchen’s air particles on the app, so I know when to turn the speeds up and down to clear the air.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The Molekule has five fan speeds. The lowest fan speed is barely audible, and the speed I keep the unit on throughout the day to clear pet dander and dust from the air. When I turn on the oven or saute garlic, I crank it up to five. It’s quieter than a vacuum but not something you’d want to listen to all day.</span></p><div class="ad" data-ad-responsive-sizes="{&quot;mobile&quot;:[[300,250],[3,3]]}" data-ad-slot-name="/article/content_2" data-ad-targeting="{&quot;tf&quot;:&quot;btf&quot;,&quot;pos&quot;:&quot;content_2&quot;,&quot;location&quot;:&quot;middle&quot;}" data-dcnode-id="2072" id="ad626661276f79f"></div><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">I’ve tested the Molekule for six months and it lives permanently on the kitchen counter, about two feet from the stove. The white shade and clean lines look minimalist and blend in with the subway tile. I’m not ashamed to have it displayed (unlike some less aesthetically pleasing air filters on the market.)</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">To really see what the Molekule could do, I turned it up to five and fried a whole pound of bacon. Bacon is something I usually avoid making because it fills my entire kitchen and adjacent living room with smoke and intense odors. Not anymore. After cleaning the kitchen, I left the house for an hour and returned. Not even a whiff of bacon!</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2064" instrument_node="">I’ve had the same stellar odor-eliminating results when </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/article/how-to-cook-bratwurst/"><span data-dcnode-id="2063" instrument_node="">grilling brats</span></a><span data-dcnode-id="2061" instrument_node=""> and roasting salmon. I’ve also noticed a significant reduction in accumulated dust. The only downside is Molekule works so well, it also blocks fragrance from </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/collection/best-fall-candles/"><span data-dcnode-id="2060" instrument_node="">scented candles</span></a><span data-dcnode-id="2058" instrument_node="">! I unplug the machine when I want to have a candle moment.</span></p><div data-dcnode-id="2056" data-nativo-placement-id="1118546" id="article_nativo3"></div><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2054" instrument_node="">After about six months of constant use at a level one (cranked up to a three or four for about an hour if I’m cooking something odorous), it was time to change the filter. The display panel indicated a filter change, and I noticed that smells weren’t dissipating as quickly. Changing the air filter was as simple as swapping a </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofhome.com/collection/best-water-filter-pitcher/"><span data-dcnode-id="2053" instrument_node="">water filter</span></a><span data-dcnode-id="2051" instrument_node="">, and the old filter was filled with dust and debris. Satisfying.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><h2 data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Are Molekules Worth It?</span></h2><span data-dcnode-id="2046" instrument_node="">
</span><h3 data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Molekule Air Purifier Pros</span></h3><span data-dcnode-id="2043" instrument_node="">
</span><ul data-dcnode-id="2020"><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">It works! The PECO Purification system destroys pollutants, odors and viruses.</span></li><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Clean lines and minimalist aesthetic look good on the kitchen counter.</span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Range of sizes to purify air in spaces from small to large.</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">The Air Mini + is portable—easily moves from the kitchen to the bedroom.</span></li><span data-dcnode-id="2030" instrument_node="">
</span><li data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Control fan speed and check pollutant levels on the app.</span></li><span data-dcnode-id="2027" instrument_node="">
</span><li data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Easy screw-off base makes replacing filters easy.</span></li><span data-dcnode-id="2024" instrument_node="">
</span><li data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Cleared by the FDA.</span></li><span data-dcnode-id="2021" instrument_node="">
</span></ul><span data-dcnode-id="2019" instrument_node="">
</span><h3 data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Molekule Air Purifier Cons</span></h3><span data-dcnode-id="2016" instrument_node="">
</span><ul data-dcnode-id="2005"><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">There are cheaper air purifiers on the market.</span></li><span data-dcnode-id="2012" instrument_node="">
</span><li data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">The app can be glitchy to set up.</span></li><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Filters are pricey and need to be changed about every six months depending on usage.</span></li><span data-dcnode-id="2006" instrument_node="">
