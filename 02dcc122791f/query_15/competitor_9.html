</span><h1 class="entry-title" data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">What Can Air Purifiers Get Rid Of? 33 Key Things Air Purifiers Remove</span></h1><span data-dcnode-id="2159" instrument_node="">
</span></header><span data-dcnode-id="2157" instrument_node="">
</span><div class="entry-content content" data-dcnode-id="542"><span data-dcnode-id="2156" instrument_node="">
</span><div class="tve_flt tcb-style-wrap" data-dcnode-id="827" id="tve_flt"><div class="tve_shortcode_editor tar-main-content" data-dcnode-id="828" data-post-id="588" id="tve_editor"><div class="thrv_wrapper tve_image_caption" data-css="tve-u-1689abe2d9c" data-dcnode-id="2153"><span class="tve_image_frame" data-dcnode-id="2154" style="width: 100%;"><img alt="Industrial Air Pollution" class="tve_image wp-image-625" data-dcnode-id="2155" data-id="625" height="438" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution.jpg&amp;raw" srcset="https://www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution.jpg 950w, https://www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution-300x138.jpg 300w, https://www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution-768x354.jpg 768w, https://www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution-100x46.jpg 100w, https://www.freshairgenie.com/wp-content/uploads/2019/01/Industrial-Pollution-862x397.jpg 862w" style="" title="Industrial Air Pollution" width="950"></span></div><div class="thrv_wrapper thrv_contentbox_shortcode thrv-content-box" data-css="tve-u-1689abdc41b" data-dcnode-id="829"><div class="tve-content-box-background" data-dcnode-id="2152"></div><div class="tve-cb" data-dcnode-id="830"><div class="thrv_wrapper thrv_text_element" data-css="tve-u-16932863666" data-dcnode-id="2054"><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">There are many things air purifiers can get rid of that its difficult to keep track especially when you start out trying to improve the air quality in your home. To this day I surprisingly can’t find one place that has a complete list of things air purifiers can get rid of. Accordingly, I decided to write this post as a one-stop resource for anyone trying to find out exactly what air purifiers can get rid.</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2149" instrument_node="">So briefly put, what can air purifiers get rid of?</span><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node=""> Air purifiers can get rid of three major categories of pollutants. These include airborne pollutants in the form of particulate matter &nbsp;(e.g. dust and pollen), gaseous and vapor airborne pollutants (e.g. odors and volatile organic compounds) and finally, surface pollutants (e.g. mold and dust mite).</span></strong></p><p data-dcnode-id="2143"><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">To list them, the 5 main groups of pollutants air purifiers can get rid of include,</span></strong></p><ol class="" data-dcnode-id="2127"><li data-dcnode-id="2140"><strong data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Particulate matter</span></strong></li><li data-dcnode-id="2137"><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Odors</span></strong></li><li data-dcnode-id="2134"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Germs and Microorganisms</span></strong></li><li data-dcnode-id="2131"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Gases and</span></strong></li><li data-dcnode-id="2128"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Insects</span></strong></li></ol><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Most of the things most air purifiers can remove are obviously airborne. However, there are some air purifiers that can even indirectly and directly help to get rid of pollutants or unwanted contaminants that you find on surfaces.</span></p><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">I detail all of the things air purifiers can remove in this post starting with the different types of air purifiers and what major category of pollutants they each remove and then in the rest of the post I give you a complete list of things air purifiers can get rid of. For each pollutant on my list, I also tell you what type of air purifier you will need to eliminate it.</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Beyond listing the different pollutants that can be eliminated, its my hope to point you in the right direction when it comes to what air purifier you should choose for the type of pollutant you are trying to get rid of.</span></p><h2 class="" data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Different Types of Air Purifiers &amp; What Major Pollutants They Can Remove</span></h2><h2 class="" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">HEPA Air Purifiers</span></h2><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">HEPA air purifiers are mechanical and filter based air purifiers that use a HEPA filter. They remove pollutants from the air by drawing air into their core and trapping pollutants in the air through a sieving mechanism enabled by the HEPA filter. The HEPA filter has tiny holes which allow particles of a certain size to go through and larger pollutant particles not to go through and remain trapped on the filters.</span></p><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Once polluted air passes through the core of a HEPA air purifier it comes out cleaner than it was. The air gets cleaner and cleaner the more times it passes through the purifier's filter core.</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">HEPA filters can unfortunately only trap air pollutants that are as small as 0.1 microns. This means they can only work for particulate matter and not gaseous pollutants (e.g. odors and VOCs) which are all much smaller than 0.1 microns.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">HEPA air purifiers will also not work for pollutants that are not airborne. As their fans only have enough power to draw air and feather-light floating particle into their core, HEPA air purifiers cannot move particles that have already settled or are growing on surfaces. So stick to HEPA air purifiers if you only want to get rid of airborne particulate pollutants.</span></p><h2 class="" data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Electrostatic &amp; Ionic Air Purifiers</span></h2><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Electrostatic and ionic air purifiers work by using electricity to attract and neutralize pollutants. The difference between the two is that ionic air purifiers release negatively charged air particles into the air which attach to pollutants and neutralize them in the air while electrostatic air purifiers create a negative charge on a set of metal plates within the core of their unit which draws and attracts oppositely charged pollutants out of the air.</span></p><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Simply put ionic purifiers chase particles in the air with negatively charged ions while electrostatic air purifiers attract and collect particles out of the air using negatively charged metal plates. Once ionic air purifiers neutralize pollutants, the neutralized particles are not collected as they are by electrostatic air purifiers in a collection compartment but rather fall to the ground and settle on surfaces around your home and you have to clean up the mess afterwards.</span></p><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Despite the mess with ionic air purifiers, at least your air gets cleaned at the end of the day. As for what these purifiers remove from your air, they will only get rid of airborne particulate matter that's greater than 0.3 microns. This means besides gases and surface pollutants they even fail to clean a lot of ultra-fine particulate matter. That said they perform well for germs, viruses, and bacteria hence their popularity in hospitals.</span></p><h2 class="" data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Ozone Generators</span></h2><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Ozone generators work by releasing ozone into the air which in turn reacts in a chemical reaction with pollutants and turns them into carbon dioxide and water molecules. Depending on what pollutants are in the air, ozone can adversely react chemically with pollutants turning them into toxic molecules.</span></p><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Moreover, ozone is known for speeding up off-gassing from household goods, causing them to release volatile organics compounds (VOCs) and some dangerous gases much faster which is not good for your indoor air. That said ozone is able to get rid of mold effectively and is commonly used to clean out odors during intense spring cleaning by professional cleaning services.</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node="">Of all the air purifiers I have seen, ozone generators are the only type of air purifier that can clean or deal with pollutants on surfaces. Ozone can kill mold and mildew on walls and </span><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/do-air-purifiers-help-with-dust-mites/" target="_blank"><span data-dcnode-id="2093" instrument_node="">dust mites</span></a><span data-dcnode-id="2091" instrument_node=""> on your bed and curtains. It's such a powerful cleaning agent, and can even kill tiny creators like insects and roaches.</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Its so strong that it is harmful to humans and animals causing respiratory and eye irritations and if you are not careful can also kill small pets, like birds, and lizards. Hence, I always recommend hiring a professional cleaning services firm for once off quarterly spring cleans with ozone generators rather than using an ozone generator yourself.</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">All in all ozone generators can remove all three major pollutants with the limitation that it can react with some air pollutants to leave behind toxic by-products. So to get the most out of ozone air purifiers, my suggestion is to have a second air purifier that can get rid of toxic airborne substances left behind after running an ozone generator.</span></p><h2 class="" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">UV Air Purifiers</span></h2><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">There are two types of UV air purifiers you can get. The pure Ultra Violet (UV) purifier and UV Germicidal Irradiation (UVGI) air purifiers. Both work the same way but UVGI just has a higher intensity UV light. Just as the UV in natural sunlight, UV purifiers work by incinerating germs, bacteria, viruses, and microorganisms floating in the air.</span></p><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">They also draw air using fans into their core where the UV bulbs are based and shine concentrated UV light on air pollutants passing through. In addition to airflow they also use convection currents to draw pollutants into their core.</span></p><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Unfortunately, UV air purifiers can only deal with airborne microorganisms and are useless for other particulate matter, gasses, and more especially pollutants on surfaces. For better use of UV purifiers, you would rather get one that comes combined with another type of air purifiers like a true-HEPA or electrostatic air purifier.</span></p><h2 class="" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">PCO Air Purifiers</span></h2><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Photocatalytic Oxidation (PCO) air purifiers work by drawing pollutants using fans into a reaction chamber where they are incinerated and turned into carbon dioxide and water vapor. The reaction contains a bulb which shines an enhanced spectrum of UV light onto a thin film of metal that absorbs pollutants and acts as a catalyst for a rapid oxidation process in which the pollutants it absorbs are literally destroyed by being burnt.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">With a PCO air purifier, you can get rid of air particles as 0.0001 microns. This means they can get rid of nearly any gas and airborne particulate matter and they don't just trap particles but literally destroy them. The problem with PCO air purifiers is that the best devices for your home are on the expensive side.</span></p><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Unless you have the budget for one, resort to PCOs when your main concern is gaseous pollution and odors. If particulate matter is your main indoor pollution concern then a HEPA air purifier will do just fine.</span></p><h2 class="" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">TSS Air Purifiers</span></h2><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Thermodynamic sterilization air purifiers destroy air pollutants by heat sterilization using a ceramic core with micro-capillaries which heats up to 200 °C (392 °F). This type of air purifier relies on air convection for air to pass through its core and once it cleans this air it is immediately cooled using heat transfer plates and released back into your home.</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2065" instrument_node="">TSS air purifiers are known for getting rid of microorganisms. They can also get rid of odors and some gases and other particulate matter. There is only one brand </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//go.freshairgenie.com/airfreeapr/px" target="_blank"><strong data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">(Airfree) of TSS air purifiers</span></strong><span data-dcnode-id="2062" instrument_node=""> </span></a><span data-dcnode-id="2060" instrument_node="">I have seen so far on the market and these guys don’t make any claims that their device can remove all types of air pollutants. &nbsp;Stick to TSS purifiers if you want to specifically get rid of certain but not all gaseous and particulate pollutants.</span></p><h2 class="" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Air Revitalizers</span></h2><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Air revitalizers are water-based air filtration systems. Their core has water as an air filter. They extract air from your room using a fan, pass it through water and release it back into your room as water vapor or mist. They work like humidifiers in a way with the exception of actually cleansing your air.</span></p></div><div class="thrv_responsive_video thrv_wrapper" data-dcnode-id="1532" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=d-KLb6HnNgs"><div class="tve_responsive_video_container" data-dcnode-id="1533"><div class="video_overlay" data-dcnode-id="2053"></div><span data-dcnode-id="2052" instrument_node=""> </span><iframe allowfullscreen="" data-code="d-KLb6HnNgs" data-dcnode-id="1534" data-provider="youtube" frameborder="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/d-KLb6HnNgs%3Frel%3D0%26modestbranding%3D0%26controls%3D1%26showinfo%3D1%26fs%3D1%26wmode%3Dtransparent&amp;raw" wmode="Opaque"><html data-cast-api-enabled="true" data-dcnode-id="1536" dir="ltr" lang="en"><head data-dcnode-id="2026"><meta charset="utf-8
