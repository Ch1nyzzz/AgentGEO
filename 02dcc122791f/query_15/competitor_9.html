svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1554" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1552" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=d-KLb6HnNgs" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="831"><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">You don’t want this kind of air purifier if your humidity levels are already high but they can serve you well in dry weather conditions. Air revitalizers can filter out certain gaseous air pollutants and odors and some insoluble particulate matter. Like TSS air purifiers they won’t get rid of every type of airborne gas and particulate.&nbsp;</span></p><h2 class="" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Adsorbent Air Purifiers</span></h2><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Adsorbents are materials that absorb gases and odors. Some common adsorbents include activated carbon, baking soda, coffee, and volcanic minerals. Adsorbent air purifiers can literally be a porous bag containing one of these substances. However, you also find your typical convection and fan-based air purifier which contain a filter core made out of an adsorbent.</span></p><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The most common I have seen is an activated carbon air filter. Like UV light air purifiers such air purifiers are better placed when they are combined in one unit with other purification technologies such as HEPA, Ionic or PCO air purifiers.</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">The best combination from a cost and pollutant filtration capacity perspective is a HEPA and activated carbon combo. Besides the actual machine type air purifiers, as I briefly touched on earlier, you can also get adsorbents on their own either in a can or air purifier bag. Cans and bags are usually used for odors but they can absorb other dangerous gases.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">You just place these as close to your source of pollution as possible and they naturally absorb the odors. The adsorbent can only remove certain gas pollutant from your air and are useless for particulate matter. Combine adsorbents with other types of purifiers to remove both airborne particulate matter and gases.</span></p><h2 class="" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Combo Air Purifiers</span></h2><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">So I have talked about combining air purifiers under some of the types of air purifiers. You can get air purifiers with up to 5 different purification technologies contained in their core. The challenge with this type of device is that it becomes difficult to maintain when you have to replace its different parts as they wear out.</span></p><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Rather go for combo air purifiers with 2-3 technologies and the technologies should give you the best of both worlds from one device and remove both gases and particulates from the air. I swear by the PCO and activated carbon and the HEPA and Activated Carbon combo. Additionally, on the HEPA and activated carbon combo, you can get one with a UV light air purifier.</span></p><p data-dcnode-id="1508"><span data-dcnode-id="1513" instrument_node="">If you want more detail on the different types of air purifiers, you can check out my more comprehensive guide&nbsp;</span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/what-are-the-different-types-of-air-purifiers/" target="_blank"><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">here</span></strong></a><span data-dcnode-id="1509" instrument_node="">. Now lets delve into the different pollutants that can pollute your indoor air and which types of air purifiers will work best for each of them.</span></p><h2 class="" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">List of Pollutants That Air Purifiers Can Remove</span></h2><h2 class="" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">1. Mold &amp; Mildew</span></h2><p data-dcnode-id="1500"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1501" instrument_node="">Mold and mildew are particulate matter. They are fungi that grow on walls and various surfaces and become airborne.</span></p><p data-dcnode-id="1490"><strong data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Source:</span></strong><span data-dcnode-id="1497" instrument_node=""> Mold and mildew are naturally present in the air but they can infest your home if your home is not well cleaned and has damp or high humidity levels. Basement, bathroom, and kitchens are the usual breeding grounds for mold. Once mold and mildew start growing on walls, it means your indoor air is badly polluted with mold.</span><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/best-air-quality-testing-gear/" target="_blank"><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">You can test your house before the mold is visible</span></strong></a><span data-dcnode-id="1491" instrument_node=""> to see if you have dangerous levels of mold present in your air.</span></p><p data-dcnode-id="1486"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1487" instrument_node="">Mold and mildew flare up allergies and can make you really sick. You can get sick building syndrome, fungal infections, and allergic reactions like rashes, asthma attacks, watery eyes, and runny noses. They even affect your mood with some researchers saying they contribute to depression.</span></p><p data-dcnode-id="1477"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1483" instrument_node="">Use HEPA, PCO, TSS to get rid of mold and mildew. In addition, use a </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/can-you-use-a-dehumidifier-and-air-purifier-in-the-same-room/" target="_blank"><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">dehumidifier</span></strong><span data-dcnode-id="1480" instrument_node=""> </span></a><span data-dcnode-id="1478" instrument_node="">to deal with moisture, and ensure proper drainage and plumbing to prevent damp on your walls and floors.</span></p><h2 class="" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">2. Aspergillus Fungus</span></h2><p data-dcnode-id="1471"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1472" instrument_node="">This is just a type of mold.</span></p><p data-dcnode-id="1467"><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Source:</span></strong><span data-dcnode-id="1468" instrument_node=""> Warm damp weather and indoor conditions.</span></p><p data-dcnode-id="1459"><strong data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1464" instrument_node="">Aspergillus spores can be 2-3 micrometer in diameter which enables them to penetrate deep into our lungs, even as far as individual </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-are-alveoli-2249043" rel="noopener" target="_blank"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">alveoli</span></strong></a><span data-dcnode-id="1460" instrument_node="">. They result in sinusitis, runny noses, and other allergic reactions.</span></p><p data-dcnode-id="1455"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1456" instrument_node="">Use PCO, HEPA, and TSS to remove them.</span></p><h2 class="" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">3. Germs, Viruses &amp; Bacteria</span></h2><p data-dcnode-id="1449"><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1450" instrument_node="">Germs including bacteria and viruses are particulate matter ranging from 0.004 to 10 microns in size.</span></p><p data-dcnode-id="1445"><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Source:</span></strong><span data-dcnode-id="1446" instrument_node=""> Airborne germs come from many places. Some of the common places include people coughing and sneezing, pets, and even bacteria colonies built up in your air con if it's not maintained.</span></p><p data-dcnode-id="1441"><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1442" instrument_node="">Airborne germs in your home can cause you to catch different types of flu, eczema, and other communicable infections. Meningitis, TB, chicken pox and many other diseases can be caught through indoor air and air purifiers can help minimize the chances of this happening in your home.</span></p><p data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1438" instrument_node="">Use, PCO, TSS, HEPA, Ionic or UV air purifiers to get rid of airborne germs around your home.</span></p><h2 class="" data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">4. Dust Mite</span></h2><p data-dcnode-id="1431"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1432" instrument_node="">Dust mite are particulate matter and they are microscopic insect-like pests. They actually look like spiders when you look at them on a microscope.</span></p><p data-dcnode-id="1427"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Source:</span></strong><span data-dcnode-id="1428" instrument_node=""> Dust mite are naturally everywhere but they thrive in homes where there is a lot of dust, warmth, and humidity. Their colonies grow rapidly in homes where there is a lot of dead skin flakes from pets and humans for them to feed on. If such conditions are sustained long enough, they start to reproduce on beds, blankets, curtains and other fabrics around your home.</span></p><p data-dcnode-id="1423"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1424" instrument_node="">Dust mite themselves are not dangerous but what's dangerous about them is their fecal matter and body parts once they die. These become airborne and when inhaled can cause asthma flare-ups, skin irritations, and other allergies.</span></p><p data-dcnode-id="1415"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1420" instrument_node="">You can use ozone generators to </span><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/do-air-purifiers-help-with-dust-mites/" target="_blank"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">kill dust mite</span></strong></a><span data-dcnode-id="1416" instrument_node=""> on surfaces like curtains, furniture, and bedding's but take the necessary precautions to protect yourself against ozone. As for airborne dust mite pollutants, PCO and HEPA air purifiers will serve you well.</span></p><h2 class="" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">5. Cockroach Pollutants</span></h2><p data-dcnode-id="1409"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1410" instrument_node="">I think we all know what roaches are. They cause particulate pollution in your home.</span></p><p data-dcnode-id="1405"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Source:</span></strong><span data-dcnode-id="1406" instrument_node=""> They are part of our living world and they normally infest places and homes where rubbish and food is left out in the open for too long.</span></p><p data-dcnode-id="1401"><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1402" instrument_node="">Like dust mite cockroach feces and body parts also trigger various allergies and other irritations in some people.</span></p><p data-dcnode-id="1397"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1398" instrument_node="">Ozone generators are not as effective for cockroaches but HEPA and PCO air purifiers perform well against airborne feces and body parts they may leave behind.</span></p><h2 class="" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">6. Pet Hair</span></h2><p data-dcnode-id="1391"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1392" instrument_node="">Pet hair is particulate matter. It consists of tiny microscopic flecks of skin from cats, dogs, birds, and other feathered and furred pets.</span></p><p data-dcnode-id="1387"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Source:</span></strong><span data-dcnode-id="1388" instrument_node=""> Pet hair comes from pets shedding their skin naturally or from rubbing on surfaces, scratching or being stroked by their owners among other things.</span></p><p data-dcnode-id="1383"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1384" instrument_node="">If you pets, over time these tiny specs of hair become airborne and if inhaled or triggers allergic reactions in some people.</span></p><p data-dcnode-id="1379"><strong data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1380" instrument_node="">Many types of air purifiers are designed specifically with pet owners in mind and they include HEPA, PCO, and ionic air purifiers. These will all help remove pet hair in your indoor air.</span></p><h2 class="" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">7. Pet Dander</span></h2><p data-dcnode-id="1373"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1374" instrument_node="">Dander is related to pet hair. It is microscopic skin particles which are naturally shed periodically by pets.</span></p><p data-dcnode-id="1369"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Source:</span></strong><span data-dcnode-id="1370" instrument_node=""> Dander comes from mammals to reptile pets which all shed skin periodically as part of their natural skin replacement process.</span></p><p data-dcnode-id="1365"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1366" instrument_node="">Dander can collect on your bedding's, furniture and various surfaces around your home in addition to being airborne. It triggers rhinitis and various other allergies in humans.</span></p><p data-dcnode-id="1361"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1362" instrument_node="">You can also get rid of pet dander using HEPA, PCO and ionic/electrostatic air purifiers. Take note that if I mention ionic air purifiers this also means electrostatic purifiers can help.</span></p><h2 class="" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">8. Skin Flakes</span></h2><p data-dcnode-id="1355"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1356" instrument_node="">Skin flakes are pretty much like pet dander and in addition to animal skin flakes you also get human dead skin.</span></p><p data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Source:</span></strong><span data-dcnode-id="1352" instrument_node=""> Skin flakes spread around your home as you scratch your skin, especially when it's dry, and naturally as your body replaces dead cells.</span></p><p data-dcnode-id="1347"><strong data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Dangers:</span></strong><span data-dcnode-id="1348" instrument_node=""> Skin cells from humans are not dangerous. However, both human and animal skin cells are the main part of what microorganism like dust mite and bed bugs in your home feed on.</span></p><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">If your house is full of skin flakes in the air which eventually end up on surfaces then you create an environment where these microorganisms can thrive. The microorganism, in turn, causes a variety of problems for humans and pets but mainly allergies.</span></p><p data-dcnode-id="1341"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1342" instrument_node="">Get rid of skin cells in your air before they collect on surfaces using PCO and HEPA air purifiers.</span></p><h2 class="" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">9. Pollen</span></h2><p data-dcnode-id="1335"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1336" instrument_node="">Pollen is particulate matter and a coarse powdery substance containing pollen grain which is a male plants version of sperm.</span></p><p data-dcnode-id="1331"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Source:</span></strong><span data-dcnode-id="1332" instrument_node=""> Pollen comes from plants and usually plants release pollen in large quantities of spring and summer as part of their reproductive process. Pollen is then spread from male to female plants through the air and through insects.</span></p><p data-dcnode-id="1327"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1328" instrument_node="">Pollen spread through the air enters and becomes airborne in homes. It can trigger asthma attacks but more commonly pollen causes hay fever.</span></p><p data-dcnode-id="1323"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Which Air Purifier Can Remove It:</span></strong><span data-dcnode-id="1324" instrument_node=""> If you have any reactions to pollen you can use PCO and HEPA air purifiers to significantly reduce the amount airborne pollen in your dwelling.</span></p><h2 class="" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">10. Insects</span></h2><p data-dcnode-id="1317"><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1318" instrument_node="">Insects are among the largest group of invertebrates and they cause particulate pollution in your home.</span></p><p data-dcnode-id="1313"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Source:</span></strong><span data-dcnode-id="1314" instrument_node=""> They are naturally everywhere outdoors. The main culprits are airborne insects that fly into your home after shelter, food, and light.</span></p><p data-dcnode-id="1309"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1310" instrument_node="">Some insects bite and can spread viruses by biting or stinging you, while others release fecal matter into your air which causes you all sorts of allergies and others have allergy causing body parts which become airborne in your home once they die and you are prone to inhaling their remains.</span></p><p data-dcnode-id="1301"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1306" instrument_node="">The first line of defense against insects when it comes to air purifiers is mesh screens for doors leading outside your home. A good example of this is </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/other-recommended-gear-for-better-air-quality/" target="_blank"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Magic Mesh</span></strong></a><span data-dcnode-id="1302" instrument_node="">. Next PCO, Ionic, and HEPA air purifiers can help to greatly reduce pollutant byproducts of insects and some air purifiers even clean out tiny airborne insects like mosquitoes and gnats.</span></p><h2 class="" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">11. Dust</span></h2><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1296" instrument_node="">Dust is simply fine particles of solid matter that settles on surfaces.</span></p><p data-dcnode-id="1291"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Source:</span></strong><span data-dcnode-id="1292" instrument_node=""> It generally is in the atmosphere and comes from soil, and day to day human activity like driving and construction and is blown into the air by the wind. You also get dust forming from a collection of dead human and animal skin in your home.</span></p><p data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1288" instrument_node="">The main concern with dust is that it causes allergies. Besides this, it can cause various lung diseases. People with sinusitis are no stranger to how dust can really cause you discomfort. Besides health problems dust can make your house dirty and stuffy and unpleasant to live in. There is so much more to be said about dust but we can all generally agree that we want minimal dust in our indoor air.</span></p><p data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1284" instrument_node="">HEPA air purifiers are your best bet with dust but you can also use PCO, TSS, Revitalizers and PCO air purifiers to deal with it. Stick to true-HEPA air purifiers for the finest of dust particles.&nbsp;</span></p><h2 class="" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">12. Lead</span></h2><p data-dcnode-id="1277"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1278" instrument_node="">Lead is a heavy metal and particulate pollutant in the air in the form of dust.</span></p><p data-dcnode-id="1273"><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Source:</span></strong><span data-dcnode-id="1274" instrument_node=""> In the home, it comes from lead-based paints and materials and from traffic pollution.</span></p><p data-dcnode-id="1269"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1270" instrument_node="">Lead cause a variety of problems including slow growth, brain damage, irritability, abdominal pain, fatigue, headaches and a host of other problems.</span></p><p data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1266" instrument_node="">Get rid of airborne lead indoors using HEPA and PCO air purifiers.</span></p><h2 class="" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">13. Asbestos</span></h2><p data-dcnode-id="1259"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1260" instrument_node="">Asbestos is a collection of long tiny fibrous crystals that can be found in your air as particulate pollutants.</span></p><p data-dcnode-id="1255"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Source:</span></strong><span data-dcnode-id="1256" instrument_node=""> Asbestos is used in a lot of products because of its favorable properties. It's mostly used in building materials and that's how it mostly gets into your home's indoor air.</span></p><p data-dcnode-id="1251"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1252" instrument_node="">Asbestos is a known carcinogen. When inhaled its fibers cause abrasion and aggravate lung tissues causing them to scar. You will get eventually get shortness of breath, and a dry crackling sound in your lungs when inhaling if you exposed to asbestos in dangerous quantities.</span></p><p data-dcnode-id="1247"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1248" instrument_node="">Get HEPA and PCO air purifiers to remove asbestos from your indoor air.</span></p><h2 class="" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">14. Traffic Pollution</span></h2><p data-dcnode-id="1241"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1242" instrument_node="">Traffic pollution consists of VOCs and particulate matter including, dust, benzene, lead, carbon monoxide, and many other pollutants.</span></p><p data-dcnode-id="1237"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Source:</span></strong><span data-dcnode-id="1238" instrument_node=""> It comes from cars commuting on roads</span></p><p data-dcnode-id="1233"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1234" instrument_node="">It can cause lung damage, breathing and neurological problems, and also your home to become covered with soot and dirt.</span></p><p data-dcnode-id="1229"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1230" instrument_node="">Get rid of traffic pollution with an activated carbon HEPA air purifier or PCO air purifier also combined with activated carbon.</span></p><h2 class="" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">15. Second-Hand Smoke</span></h2><p data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1224" instrument_node="">Second-hand smoke is tobacco or marijuana smoke inhaled involuntarily by others who are not doing the smoking. It consists of both particulate (tar) and gaseous (odor) pollutants.</span></p><p data-dcnode-id="1219"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Source:</span></strong><span data-dcnode-id="1220" instrument_node=""> This all comes from humans smoking inside or near your home.</span></p><p data-dcnode-id="1215"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1216" instrument_node="">Tobacco cause numerous health problems including sudden infant death syndrome, asthma attacks, ear infections, and respiratory problems. Long term exposure leads to cancer. Things are not as bad with weed smoke but you can get mentally impaired with long term exposure. Besides all this stuff smells bad if you are not a smoker and you do not want your baby or child breathing secondhand smoke.</span></p><p data-dcnode-id="1211"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1212" instrument_node="">You will need an activated carbon HEPA or PCO air purifiers to deal with second-hand smoke.</span></p><h2 class="" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">16. Wildfire Smoke</span></h2><p data-dcnode-id="1205"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1206" instrument_node="">This is smoke resulting from uncontrolled bush and forest fires. It contains both particulate and gaseous air pollutants.</span></p><p data-dcnode-id="1201"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Source:</span></strong><span data-dcnode-id="1202" instrument_node=""> Wildfire smoke is as a result of wildfires caused by extremely hot weather conditions that burn large proportion of forest, grass, and bushes.</span></p><p data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1198" instrument_node="">If you stay in the vicinity of wildfires, even after the fires stop burning the smoke can last for months afterward. Long term exposure to this smoke can cause respiratory problems, headaches and your home and air just smell like smoke which can be rather uncomfortable.</span></p><p data-dcnode-id="1190"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1194" instrument_node="">To avoid the dangers of </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/do-air-purifiers-help-with-smoke-and-smoke-smells-the-ultimate-guide/" target="_blank"><span data-dcnode-id="1193" instrument_node="">wildfire smoke</span></a><span data-dcnode-id="1191" instrument_node=""> and the discomfort it causes, activated carbon PCO and HEPA air purifiers can rescue your indoor air problem.</span></p><h2 class="" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">17. Smog</span></h2><p data-dcnode-id="1184"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1185" instrument_node="">Smog is a mixture of fog and smoke and largely consists of smoke and sulfur dioxide but also contains other VOCs.</span></p><p data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Source:</span></strong><span data-dcnode-id="1181" instrument_node=""> It comes from massive industrial coal burning from electricity power stations and general heavy industrial processes. Smog is produced when sunlight reacts with sulfur dioxide and nitrogen oxides and at least one volatile organic compound (VOC) in the atmosphere created by industrial emissions.</span></p><p data-dcnode-id="1176"><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Dangers:</span></strong><span data-dcnode-id="1177" instrument_node=""> Smog aggravates, heart problems, bronchitis, asthma and can causes host of lung problems.</span></p><p data-dcnode-id="1172"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1173" instrument_node="">Get rid of smog in your indoor air with HEPA and PCO air purifiers.</span></p><h2 class="" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">18. Volcanic Smog &amp; Pollution</span></h2><p data-dcnode-id="1166"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1167" instrument_node="">Volcanic pollution also called VOG consists of sulfur dioxide, hydrogen pollution and various other harmful gases. It also contains solid microscopic particulates and fine ash and glass-like particles which form when lava rapidly creates steam after coming in contact with cold water. &nbsp;</span></p><p data-dcnode-id="1162"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Source:</span></strong><span data-dcnode-id="1163" instrument_node=""> The source here is obviously volcanic eruptions</span></p><p data-dcnode-id="1158"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Dangers:</span></strong><span data-dcnode-id="1159" instrument_node=""> Volcanic smoke can cause, eye, skin and lung irritations. Your asthma and bronchitis can get aggravated by pollutants in your home and you can contract other respiratory problems.</span></p><p data-dcnode-id="1154"><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1155" instrument_node="">To get rid of volcanic pollution you will need adsorbents like activated carbon. So go for HEPA and PCO air purifiers that contain activated carbon filters.</span></p><h2 class="" data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">19. Cigarette Smoke</span></h2><p data-dcnode-id="1145"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1149" instrument_node="">As mentioned for second-hand smoke, </span><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1146" instrument_node="">tobacco/cigarette smoke pollute your air with particulates and gases.</span></p><p data-dcnode-id="1141"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Source:</span></strong><span data-dcnode-id="1142" instrument_node=""> This pollution is man made by you or anyone in your home smoking.</span></p><p data-dcnode-id="1137"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1138" instrument_node="">The dangers of cigarette smoke are well known and I don’t need to repeat them here.</span></p><p data-dcnode-id="1133"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1134" instrument_node="">The best air purifiers for cigarette smoke are activated carbon HEPA and PCO air purifiers but the best thing you can do when it comes to cigarette smoke is smoke outside. Air purifiers can only minimize the dangers and smell rather than completely get rid of it.</span></p><h2 class="" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">20. Vaping Smoke/Vapor</span></h2><p data-dcnode-id="1127"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1128" instrument_node="">Vaping smoke is largely small water droplets and odor-causing gases.</span></p><p data-dcnode-id="1123"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Source:</span></strong><span data-dcnode-id="1124" instrument_node=""> It comes from you or anyone in your home smoking an e-cigarette.</span></p><p data-dcnode-id="1119"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1120" instrument_node="">The dangers of vaping are yet to be discovered but it can leave a strong odor or scent in your house and stains on your windows and walls. Vaping can also cause damage to electrical equipment if you smoke near them.</span></p><p data-dcnode-id="1107"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1116" instrument_node="">HEPA air purifiers can’t handle vaping smoke because they contain too much water, which soaks their paper-based filters and renders them useless. What you need with vaping smoke are </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.purennatural.com/the-basics-of-buying-a-smoke-eater-for-a-vape-shop" rel="noopener" target="_blank"><u data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">special types of electrostatic air purifiers</span></strong></u></a><span data-dcnode-id="1111" instrument_node=""> called smoke eaters. Also, check out the </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//go.freshairgenie.com/cloudcrusherapr/px"><span data-dcnode-id="1110" instrument_node="">Cloud Crusher </span></a><span data-dcnode-id="1108" instrument_node="">air purifier by getting the smoke out which has a filter that's very effective at absorbing vaping smoke.</span></p><h2 class="" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">21. Odors</span></h2><p data-dcnode-id="1101"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">What Is It:</span></strong><span data-dcnode-id="1102" instrument_node=""> Odors are smells of all sorts. They can be bad or good smelling. Smells are gaseous in nature.</span></p><p data-dcnode-id="1097"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Source: </span></strong><span data-dcnode-id="1098" instrument_node="">Smells come from a variety of-of sources. They are usually volatile organic compounds as they often come off solids like wood or liquids like juice or cleaning detergents.common sources of odors in your home include cooking, sink smells, your bin, pets, body odor, and your toilet.</span></p><p data-dcnode-id="1089"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1094" instrument_node="">Odors get irritating more than anything and that's why we try to get rid of them. However, they can be dangerous and cause nausea, reduce your productivity, cause headaches, dizziness and many other health problems. Some people also react to normal cologne and perfume odors as they have fragrance sensitivities </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiple_chemical_sensitivity" rel="noopener" target="_blank"><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">(MCS)</span></strong></a><span data-dcnode-id="1090" instrument_node="">.</span></p><p data-dcnode-id="1085"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Which Air Purifiers Can Remove It: </span></strong><span data-dcnode-id="1086" instrument_node="">To get rid of odors in your home you will need a HEPA or PCO air purifier with an activated carbon filter.</span></p><h2 class="" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">22. Weed Smells</span></h2><p data-dcnode-id="1079"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1080" instrument_node="">Weed smell is gas like any other odor. Its odor is specifically known as butylthiol which also make up part of skunk smell.</span></p><p data-dcnode-id="1075"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Source:</span></strong><span data-dcnode-id="1076" instrument_node=""> Weed smell can come from weed plantations but you will smell it most often when someone is smoking weed.</span></p><p data-dcnode-id="1071"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1072" instrument_node="">There are no widely recognized findings showing any serious dangers with weed smell. The main concern though is that weed smell is disruptive and annoying especially if you are a nonsmoker. The worst is when you live near a cannabis cultivation plant. The smell can travel and gets really bad especially during harvesting.</span></p><p data-dcnode-id="1062"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1068" instrument_node="">Some </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.northbaybusinessjournal.com/northbay/sonomacounty/7008462-181/cannabis-smell-management" rel="noopener" target="_blank"><u data-dcnode-id="1065"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">cannabis growers now use activated carbon cans and air purifiers </span></strong></u></a><span data-dcnode-id="1063" instrument_node="">to control weed odor in their weed plantations and stop it from spreading. In the same way, you can eliminate weed smell in your home with activated carbon PCO or HEPA air purifiers.</span></p><h2 class="" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">23. Tobacco/Cigarette Smells</span></h2><p data-dcnode-id="1056"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1057" instrument_node="">Cigarettes contain so many VOCs and some of these gases are the main elements that make up cigarette smoke.</span></p><p data-dcnode-id="1052"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Source:</span></strong><span data-dcnode-id="1053" instrument_node=""> The only source of cigarette smell is from people smoking.</span></p><p data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1049" instrument_node="">I think the dangers of cigarette smells and smoke are well documented and we all generally know them. So no need to get into the detail here.</span></p><p data-dcnode-id="1044"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1045" instrument_node="">You can rid your indoor air of cigarette, cigar or tobacco smells in general with either PCO or HEPA activated carbon air purifier.</span></p><h2 class="" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">24. Vaping Smells</span></h2><p data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1039" instrument_node="">Vaping smells are gas molecules that off-gas from the vapor blown out when some are smoking.</span></p><p data-dcnode-id="1034"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Source:</span></strong><span data-dcnode-id="1035" instrument_node="">&nbsp;You can get odorless vape juice but if you try flavored e-juice that's when vaping starts to smell. However vaping smell dissipates quickly. If you smoke enough though, the vaping smell can start to linger in your smoking area especially if flavored vapor starts to drip and stick on your walls and windows.</span></p><p data-dcnode-id="1030"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1031" instrument_node="">There are no known dangers of vaping smoke but some people just don't like the sweet smell vaping leaves behind. It can be nauseating for some people.</span></p><p data-dcnode-id="1026"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1027" instrument_node="">To get rid of vaping smell and ensure it does not linger, try a specialized vaping air purifier with activated carbon or an activated carbon PCO air purifier. HEPA air purifiers are just not designed to handle the kind of vapor that comes from vaping.</span></p><h2 class="" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">25. Musty Smells</span></h2><p data-dcnode-id="1020"><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1021" instrument_node="">Musty smells are a stale unpleasant odor in your home.</span></p><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Source:</span></strong><span data-dcnode-id="1017" instrument_node=""> They usually happen if an area in your home has had no air and has been damp for while. The smell is worsened by mold growth. The smell can also come from materials like paper in books getting old and dusty. Musty smells also commonly develop in humid basements where there is no sunshine. Musty smells catch on to your clothes and stick to furniture and leave your cupboards and closets smelling funny.</span></p><p data-dcnode-id="1012"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Dangers: </span></strong><span data-dcnode-id="1013" instrument_node="">If mold is the main cause of musty odor in your home you can end up getting frequent headaches, fatigue, and dizzy spells. On the other hand, the smell just makes you feel uncomfortable and makes breathing difficult.</span></p><p data-dcnode-id="1008"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="1009" instrument_node="">You will need an activated carbon HEPA or PCO air purifier for musty smells. In addition, Ozone generators can come in handy especially with killing mildew and mold on surfaces. Lastly, you have to reduce your humidity levels if your home is humid, especially your basement.</span></p><h2 class="" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">26. Pet Odors</span></h2><p data-dcnode-id="1002"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">What Is It: </span></strong><span data-dcnode-id="1003" instrument_node="">These consist of various chemicals including uric acid, ammonia, isovaleric acid, heptanal and more. Combined they produce your pet's body odor.</span></p><p data-dcnode-id="998"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Source:</span></strong><span data-dcnode-id="999" instrument_node=""> Pet odor comes from your pets sweating and fecal matter. Their diets also have a strong influence on how their bodies and hair or feathers smell.</span></p><p data-dcnode-id="992"><span data-dcnode-id="997" instrument_node="">Your pets odors stick mostly on fabrics they often come in contact with and sometimes if they urine somewhere in your home and you don't see it. Some of the worst pet odors come from caged animals and </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/will-an-air-purifier-help-with-cat-litter-box-smells/" target="_blank"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">cat litter boxes</span></strong></a><span data-dcnode-id="993" instrument_node="">.</span></p><p data-dcnode-id="988"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Dangers: </span></strong><span data-dcnode-id="989" instrument_node="">Pet odors can get toxic and harmful not just to you but also your pets. Usually, where there are pet odors germs also thrive and the odor can become a source of allergy triggers like dust mite in your home. Pet odors make your home an unpleasant environment for guests and also yourself.</span></p><p data-dcnode-id="984"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="985" instrument_node="">In addition to air purifiers, You have to clean up and keep tidy, with vacuuming and steam cleaning ever so often to deal with pet odor. The best air purifiers for pet odors are activated carbon PCO and HEPA air purifiers.</span></p><h2 class="" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">27. Volatile Organic Compounds</span></h2><p data-dcnode-id="978"><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">What Is It:</span></strong><span data-dcnode-id="979" instrument_node=""> I have mentioned VOCs a lot throughout this post. &nbsp;VOCs are organic chemicals that have a high vapor pressure at normal or room temperature. Common VOCs include Benzene, Formaldehyde, and Perchloroethylene.</span></p><p data-dcnode-id="974"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Source:</span></strong><span data-dcnode-id="975" instrument_node=""> They are found in various places including paint fumes, new furniture, especially carpets, fossil fuels, pesticides and hobby supplies like glue and acrylic colors, detergents and dry cleaned clothes. The list is endless and a lot of things off-gas VOCs in your home.</span></p><p data-dcnode-id="970"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Dangers: </span></strong><span data-dcnode-id="971" instrument_node="">VOCs cause a lot of sicknesses. They can cause you to feel dizzy and fatigued, give you headaches, nose and throat discomforts and some even cause cancer. The list of of dangers of VOCs is a long list and I cannot cover everything here. However let me mention that additionally, some VOCs also give off good and bad odors that can flare up fragrance sensitivities and cause you discomfort if you inhale the odors they produce long enough.</span></p><p data-dcnode-id="966"><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="967" instrument_node="">HEPA air purifiers alone will not help you with VOCs. You will need an air purifier with activated carbon. PCO air purifiers can destroy VOCs but even they will give you better performance against VOCs if combined with activated carbon.</span></p><h2 class="" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">28. Radon</span></h2><p data-dcnode-id="960"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">What Is It: </span></strong><span data-dcnode-id="961" instrument_node="">Radon is a radioactive gas which has no color or taste.</span></p><p data-dcnode-id="956"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Source:</span></strong><span data-dcnode-id="957" instrument_node=""> Radon naturally occurs in soil and enters buildings and your home through the soil and become generally present around your home.</span></p><p data-dcnode-id="952"><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Dangers: </span></strong><span data-dcnode-id="953" instrument_node="">Radon is one of the leading causes of lung cancer after cigarettes. It causes 21000 deaths every year due to lung cancer.</span></p><p data-dcnode-id="940"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="949" instrument_node="">To get rid of radon you will need a HEPA or PCO air purifier with activated carbon. You also have to take some additional measure as </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/radon/consumers-guide-radon-reduction-how-fix-your-home" rel="noopener" target="_blank"><u data-dcnode-id="946"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">recommended by the EPA </span></strong></u></a><span data-dcnode-id="944" instrument_node="">to reduce radon in your home. </span><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">I strongly suggest using a Certified Radon Mitigation Contractor</span></strong><span data-dcnode-id="941" instrument_node="">.</span></p><h2 class="" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">29. Carbon Monoxide</span></h2><p data-dcnode-id="934"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">What Is It: </span></strong><span data-dcnode-id="935" instrument_node="">Carbon monoxide is another tasteless and odorless gas.</span></p><p data-dcnode-id="930"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Source:</span></strong><span data-dcnode-id="931" instrument_node=""> At home, carbon monoxide can come from using fuel base appliances indoors, or living your car running in a garage that leads directly into your home.</span></p><p data-dcnode-id="926"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Dangers: </span></strong><span data-dcnode-id="927" instrument_node="">When you breathe in carbon monoxide it displaces the oxygen you need to stay alive. If you inhale enough carbon monoxide you can get; lethargic, with symptoms such as nausea shortness of breath, headaches, and dizziness and you can suddenly die eventually. Long-term exposure to lower concentrations (such as through smoking) could harm unborn babies or cause neurological damage.</span></p><p data-dcnode-id="916"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="923" instrument_node="">Use any type of air purifiers with activated carbon to minimize carbon monoxide pollution in your home. Additionally, try to get an air purifier with a carbon monoxide detector or just </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/air-quality-monitoring-gear/%23tab-con-1" target="_blank"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">install standalone carbon monoxide detectors</span></strong></a><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="917" instrument_node="">across your household. However, If you think your home is polluted with carbon monoxide, evacuate everyone in the house including your pets and get professionals to come run some tests and clean your indoor air.</span></p><h2 class="" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">30. Ozone</span></h2><p data-dcnode-id="910"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">What Is It: </span></strong><span data-dcnode-id="911" instrument_node="">Ozone is a gaseous molecule with a strong surgical chlorine-like smell.</span></p><p data-dcnode-id="906"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Source:</span></strong><span data-dcnode-id="907" instrument_node=""> Ozone pollution happens when the sun chemically reacts with pollutants emitted by industrial processes, and cars. This pollution then spreads with the wind and ends up in your home.</span></p><p data-dcnode-id="902"><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Dangers: </span></strong><span data-dcnode-id="903" instrument_node="">Ozone serves us well when it's up in the sky by protecting us from dangerous sun rays. However, at ground level, Ozone is harmful to humans and animals. It is a powerful cleaning agent. So powerful it can even kill tiny creatures and pets. In humans, it causes lung, eye, and skin irritations as its so corrosive and it can cause you to develop respiratory problems. Its especially dangerous for people with preexisting conditions like asthma and bronchitis and children, the elderly and the immunocompromised people.</span></p><p data-dcnode-id="898"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="899" instrument_node=""> Having an air purifier is a very effective way of dealing with ozone, and the best type of air purifiers for this pollutant are PCO air purifiers or activated carbon HEPA air purifiers.</span></p><h2 class="" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">31. Nitrogen Dioxide</span></h2><p data-dcnode-id="892"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">What Is It: </span></strong><span data-dcnode-id="893" instrument_node="">This is a red gas with a pungent smell.</span></p><p data-dcnode-id="888"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Source:</span></strong><span data-dcnode-id="889" instrument_node=""> It comes from burning of biomass and fossil fuels and also naturally occurs from wildfires and in the soil from microbial processes. &nbsp;It is a powerful oxidizing agent used in chemical processes and also rocket fuels.</span></p><p data-dcnode-id="884"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Dangers: </span></strong><span data-dcnode-id="885" instrument_node="">Nitrogen dioxide mainly causes asthma attacks but it's also linked to bronchitis in children.</span></p><p data-dcnode-id="880"><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Which Air Purifier Can Remove It:</span></strong><span data-dcnode-id="881" instrument_node=""> Use activated carbon HEPA and PCO air purifiers to get rid of nitrogen dioxide.</span></p><h2 class="" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">32. Sulfur Dioxide</span></h2><p data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">What Is It: </span></strong><span data-dcnode-id="875" instrument_node="">This a colorless gas with a very strong choking smell.</span></p><p data-dcnode-id="866"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Source:</span></strong><span data-dcnode-id="871" instrument_node=""> It occurs naturally but it's also man-made. Naturally, you will get sulfur dioxide from volcanoes and </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/do-air-purifiers-help-with-smoke-and-smoke-smells-the-ultimate-guide/" target="_blank"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">wildfires</span></strong></a><span data-dcnode-id="867" instrument_node="">. Man-made sources include car emissions, and pollution from coal power stations, industrial processes, and oil refineries. Eventually, this pollution ends up in your home as it gets carried through the air.</span></p><p data-dcnode-id="862"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Dangers: </span></strong><span data-dcnode-id="863" instrument_node="">&nbsp;This pollutant can irritate your eyes and cause or worsen respiratory and lung diseases such as asthma and bronchitis.</span></p><p data-dcnode-id="858"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="859" instrument_node="">You want to use an activated carbon PCO or HEPA air purifier to effectively eliminate sulfur dioxide in your home.</span></p><h2 class="" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">33. Ammonia</span></h2><p data-dcnode-id="852"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">What Is It: </span></strong><span data-dcnode-id="853" instrument_node="">Ammonia can either be in liquid or gas form. It is normally in gas form and as a gas, it is colorless and pungent.</span></p><p data-dcnode-id="848"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Source:</span></strong><span data-dcnode-id="849" instrument_node=""> Ammonia occurs naturally. It's used to make pharmaceuticals, bleaching and cleaning chemicals, fertilizers and various other products. It's also found in animal and human urine and feces. It can off-gas from all these products and worsen your indoor air quality.</span></p><p data-dcnode-id="844"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Dangers: </span></strong><span data-dcnode-id="845" instrument_node="">Ammonia is highly corrosive and serious concentrations in your indoor air can cause eye, nose and throat irritations.</span></p><p data-dcnode-id="840"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Which Air Purifier Can Remove It: </span></strong><span data-dcnode-id="841" instrument_node="">To get rid of airborne ammonia gas in your home, a PCO and HEPA air purifier with activated carbon filters will do the trick.&nbsp;</span></p><p data-dcnode-id="832"><span data-dcnode-id="839" instrument_node="">Ammonia marks the end of my list of 33 major pollutants air purifiers can remove. Looking at all the air purifiers that remove the various &nbsp;air pollutants, you can clearly see that PCO and HEPA air purifiers dominate the list. So you generally want to stick to these 2 types of air purifiers. &nbsp;If you would like to see my recommended &nbsp;brand for all the different types of air purifiers I have mentioned throughout this post and that are worth buying, </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/best-room-air-purifiers/" target="_blank"><span data-dcnode-id="838" instrument_node="">check out my post on best room air purifiers here</span></a><span data-dcnode-id="836" instrument_node=""> and </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshairgenie.com/best-personal-and-small-portable-air-purifiers/" target="_blank"><span data-dcnode-id="835" instrument_node="">best personal air purifiers here</span></a><span data-dcnode-id="833" instrument_node="">.</span></p></div></div></div></div></div><div class="tcb_flag" data-dcnode-id="826" style="display: none"></div><span data-dcnode-id="825" instrument_node="">
