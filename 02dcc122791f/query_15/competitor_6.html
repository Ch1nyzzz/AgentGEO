</span><p data-dcnode-id="858" style="text-align: justify;"><span data-dcnode-id="859" instrument_node="">If you notice a musty smell, it means there is a mold infestation. You need to get rid of it! Apart from running an air purifier for musty smell, you can try out a few other things. These are:</span></p><div data-dcnode-id="856" data-inserter-version="2" id="ezoic-pub-ad-placeholder-118"></div><span data-dcnode-id="854" instrument_node="">
</span><ul data-dcnode-id="832" style="text-align: justify;"><span data-dcnode-id="853" instrument_node="">
</span><li aria-level="1" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Place a small bowl of baking soda in the center of the room with musty smell. It will absorb all the smell</span></li><span data-dcnode-id="850" instrument_node="">
</span><li aria-level="1" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Use a fan to whip the air around</span></li><span data-dcnode-id="847" instrument_node="">
</span><li aria-level="1" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Open the doors and windows to let in fresh air and let out the stale air</span></li><span data-dcnode-id="844" instrument_node="">
</span><li aria-level="1" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Find the cause of the musty smell and remove it. It could pieces of rotting food, a dead rodent, mold or mildew</span></li><span data-dcnode-id="841" instrument_node="">
</span><li aria-level="1" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Use a vacuum cleaner to remove dust because it can also cause musty smell</span></li><span data-dcnode-id="838" instrument_node="">
</span><li aria-level="1" data-dcnode-id="834"><span data-dcnode-id="837" instrument_node="">Use air recommended freshener and </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humidifiercompare.com/put-essential-oils-in-humidifier-for-baby/"><span data-dcnode-id="836" instrument_node="">essential oils</span></a></li><span data-dcnode-id="833" instrument_node="">
</span></ul><span data-dcnode-id="831" instrument_node="">
</span><h2 data-dcnode-id="826" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="830" id="Conclusion"></span><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Conclusion</span></strong><span class="ez-toc-section-end" data-dcnode-id="827"></span></h2><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823" style="text-align: justify;"><span data-dcnode-id="824" instrument_node="">There is so much more that you need to know about the question of: will an air purifier help with musty smell.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817" style="text-align: justify;"><span data-dcnode-id="821" instrument_node="">There are other methods of removing musty air too. They include letting in fresh air, using a fan, baking soda, </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humidifiercompare.com/when-should-use-humidifier-plants/"><span data-dcnode-id="820" instrument_node="">indoor plants</span></a><span data-dcnode-id="818" instrument_node=""> and so on.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814" style="text-align: justify;"><span data-dcnode-id="815" instrument_node="">However, the most important thing is to get rid of the root cause of the problem. Check out for mold, it is notorious for causing damage, sickness and musty smell indoors.</span></p><span data-dcnode-id="813" instrument_node="">
