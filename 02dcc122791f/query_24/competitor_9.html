</span><br data-dcnode-id="790"><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node=""> Will the Amcor Air Purifier Give You What You Want?</span></h1></div><span data-dcnode-id="785" instrument_node=""> </span><div align="center" data-dcnode-id="779"><span data-dcnode-id="782" instrument_node="">&nbsp;</span></div><span data-dcnode-id="778" instrument_node=""> </span><span data-dcnode-id="775" instrument_node="">&nbsp;</span><span data-dcnode-id="772" instrument_node="">  An</span><b data-dcnode-id="770"><span data-dcnode-id="771" instrument_node=""> Amcor air purifier </span></b><span data-dcnode-id="769" instrument_node="">is one that will give you a better sense of air purification  in your home without making you worry about the carbon footprint you are leaving  behind by doing so. </span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">   The Amcor company is dedicated toward providing purifiers that  will use the smallest amount of parts possible and be sustainable for as long as   necessary.  This is why an Amcor air purifier could be a wise choice when you   want to clean your air but not spend a great deal of money or be damaging to the   environment.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">   Amcor itself is dedicated toward putting efficient and inexpensive purifiers on the  market.  With locations all around the world, they take advantage of local markets  to get the products they need at a lower cost, which will in turn lower the cost of   production.  They can turn around and sell Amcor air purifiers without high shipping   costs or importing taxes.  </span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">  Above all, if you buy an Amcor AM-90 air purifier, you will    know that you have made a purchase which runs on low power, can last for a long time,    and will give you great purification without making a large carbon footprint.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node=""> </span></p><h2 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Pros of Amcor AM-90</span></h2><span data-dcnode-id="758" instrument_node=""> </span><ul data-dcnode-id="744"><span data-dcnode-id="757" instrument_node=""> </span><li class="star" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The HEPA type filter is washable, allowing you to use it for up to 3 years before it needs to be replaced.</span></li><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node=""> </span></p><li class="star" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Timers are located on the unit which can allow you to program how and when it will run.</span></li><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node=""> </span></p><li class="star" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The optional ionizer can make the room more fresh and pleasant to be in.</span></li><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node=""> </span></p></ul><span data-dcnode-id="743" instrument_node=""> </span><h2 data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Cons of Amcor AM-90</span></h2><span data-dcnode-id="740" instrument_node=""> </span><ul data-dcnode-id="730"><span data-dcnode-id="739" instrument_node=""> </span><li class="star" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">The filtration is not as effective as a True HEPA filter, although it will come incredibly close to providing the same purification.</span></li><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node=""> </span></p><li class="star" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">The warranty provided is not as long-lasting as other purifiers in the same class.</span></li><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node=""> </span></p></ul><span data-dcnode-id="729" instrument_node=""> </span><br clear="all" data-dcnode-id="728"><span data-dcnode-id="727" instrument_node=""> </span><h2 class="fbg" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">What Does Amcor Air Purifier Offer?</span></h2><span data-dcnode-id="724" instrument_node=""> </span><ul data-dcnode-id="631"><span data-dcnode-id="723" instrument_node=""> </span><li class="bullet" data-dcnode-id="720"><b data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Technology Used</span></b></li><p data-dcnode-id="704"><span data-dcnode-id="719" instrument_node=""> </span><br clear="all" data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">
</span><span data-dcnode-id="712" instrument_node="">
</span><span data-dcnode-id="710" instrument_node="">
</span><br clear="all" data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="705" instrument_node=""> One of the biggest benefits of the Amcor purifier is that it is build to be long-lasting  and nearly sustainable.  The HEPA-like filter which is included with the model can be  washed up to 8 times, giving you the opportunity to use this filter for up to 3 years  before it needs to be replaced. </span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">   It will also capture up to 99% of all of the contaminates  in the air that are 0.3 microns or larger, which will be the majority of allergens which  could easily affect you.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">  On top of this high level of filtration which is provided, an optional ion generator is  included as a major function of this air purifier.  When you choose to use the ionizer  in the Amcor AM-90, you will be releasing a stream of negative ions into the air.  These  ions will work to freshen the air and remove the stale feeling that purified air can  sometimes carry.  You will enjoy the feeling this air has while you are breathing it and  you will notice just how different the quality of your atmosphere now is.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">  A pre-filter is also included with this unit that is fully washable.  It will work on  collecting all of the dust in the air before it hits the main filter, giving a better  concentration of power to the HEPA filter.  When this pre-filter is used, it will work  on capturing the highest amount of contaminates in the air before they can clog up the  main filter.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node=""> </span></p><li class="bullet" data-dcnode-id="693"><b data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Area Covered</span></b></li><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">  This purifier is best suited for the rooms that cover 400 square feet or smaller, which  can place it in nearly any environment in your home.  As long as the room size is not too  large, the Amcor AM-90 will work to clean and purify the air at a great rate.</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">    In larger rooms,  this purifier will not work as well as it would in a smaller room, where it will be  subjected to a higher rate of air change.</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node=""> </span></p><li class="bullet" data-dcnode-id="684"><b data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Maintenance Required</span></b></li><p data-dcnode-id="676"><span data-dcnode-id="683" instrument_node=""> </span><span data-dcnode-id="680" instrument_node="">&nbsp;</span><span data-dcnode-id="677" instrument_node=""> The HEPA-like filter is washable up to 8 times, which means that you should not need to  buy a new filter for up to three years.  </span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">  The washable pre-filter will also work much in   the same way.  When the time comes to clean these filters, you should simply remove these   filters from the unit.  Using a water spray, such as with a kitchen sink hose, you should   spray the surfaces of the filter until the dust is removed.  While the color of the    filter will still remain gray, the filter itself will regain its filtration qualities.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">  You should take steps to wipe down the surface of the air purifier at least every 2 weeks.   This will stop dirt and dust from accumulating on the machine, which could affect the   flow of air.  This could serve to only spread more contaminates around the room.  Simple   dusting of the unit should protect against this.</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node=""> </span></p><li class="bullet" data-dcnode-id="667"><b data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Noise Levels</span></b></li><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">  Even at the highest speed, this unit will run on less than 50 decibels.  This makes it a  very quiet unit, one that you can constantly run without having to worry about much   distraction in your home. </span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">   Owing to Amcor's dedication to being environmentally    friendly, this unit will also run on the lowest amount of electricity possible.     A mere 44 watts will sustain this machine on its highest settings.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node=""> </span></p><li class="bullet" data-dcnode-id="658"><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Price and Warranty</span></b></li><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">  This Amcor air cleaner will traditionally sell for around $99.99, depending on the retailer.  </span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">   Considering that the filter does not often need replaced and that it comes with  both filtration and an ion generator, this is a great bargain.  On top of it, this  model features a 1 year limited warranty, which can protect the unit against internal  damages which may arise.  That turns these Amcor air purifiers into a great deal.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node=""> </span></p><li class="bullet" data-dcnode-id="649"><b data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Additional Features</span></b></li><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node=""> </span></p><ul data-dcnode-id="633"><span data-dcnode-id="646" instrument_node=""> </span><li class="star" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">There is a back-lit LCD display panel, giving you an easier time of programming the machine.</span></li><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node=""> </span></p><li class="star" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The sleep timer will allow you to program the machine to run for up to 8 hours before it automatically shuts off.</span></li><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node=""> </span></p><li class="star" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">A clock is located on the unit, helping you to keep track of the time.</span></li><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node=""> </span></p></ul><span data-dcnode-id="632" instrument_node=""> </span></ul><span data-dcnode-id="630" instrument_node=""> An Amcor air purifier can be a smart option when you are looking for a reasonably  priced air purifier without many recurring maintenance costs. </span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">   When you use this  air cleaner, you will get a high rate of cleanliness without using too many natural  resources in the process.  It is a good option that you should consider for your  basic purification needs.</span></p><p data-dcnode-id="624"><span data-dcnode-id="627" instrument_node=""> </span><b data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">RECOMMENDED</span></b></p><p data-dcnode-id="620"><span data-dcnode-id="623" instrument_node=""> </span><br clear="all" data-dcnode-id="622"><span data-dcnode-id="621" instrument_node=""> </span></p><div align="center" data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">&nbsp;</span></div><span data-dcnode-id="613" instrument_node=""> </span><br clear="all" data-dcnode-id="612"><span data-dcnode-id="611" instrument_node=""> </span><div align="center" data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">&nbsp;</span></div><span data-dcnode-id="604" ins
