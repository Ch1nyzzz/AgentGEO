</span><span data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">
  The original “formula” for this product must have changed because it is not as effective as it used to be.  The first bottle I bought lasted a looooong time and only needed 1 or 2 sprays to deodorize the air and did a fantastic job with none of the awful perfumed fragrances many air deodorizer use.  When after a year or more I went to buy this product again, it was not nearly as effective.  Still doesn’t have the cloying perfumed fragrance and leaves a clean, ozone type atmosphere, but only after many more sprays than the original product.  A friend said the original company was bought out and the new company made some changes in the product and that is why it doesn’t work as well.  It is still way better than most if not all of the nasty plug ins and heavily scented products.  Just a hunch but wondering if the formula was changed to generate more profits?  More sprays needed to clear the air equals consumers having to buy the product more often.
</span></span><span data-dcnode-id="1408" instrument_node="">

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1154" data-hook="review-date"><span data-dcnode-id="1155" instrument_node="">Reviewed in the United States on November 20, 2010</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1151"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1152" data-hook="avp-badge-linkless"><span data-dcnode-id="1153" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1128"><span class="a-size-base review-text" data-dcnode-id="1129" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1130" style="max-height:300px"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1137" data-hook="review-collapsed"><span data-dcnode-id="1150" instrument_node="">
</span><span data-dcnode-id="1139"><span data-dcnode-id="1149" instrument_node="">
  You have lots of family and friends over for the holidays.  You have made the freshest and tastiest goodies and that is all you want to smell in your house full of people.  But it is unavoidable to have a moment durring the festivities where someone has stunk up the guest bathroom.  Get yourself a few bottles of Smells Begone, keep them visible in all bathrooms, and you won't cringe when you see Uncle Stinky emerge from the hallway powder room.</span><br data-dcnode-id="1148"><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">This stuff really works, seriously.  It doesn't cover up the smells with perfume, because no one wants to smell butt stank and "fresh" oranges in the smallest room of the house, this is especially true for bathrooms without windows.  It is not a pleasant thing to talk about, but it i even more unpleasant to experience.</span><br data-dcnode-id="1145"><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">It even works on our 10 month old daughter's diaper pails and other horrific odor events.</span><br data-dcnode-id="1142"><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">I highly recommend Smells Begone.
