</span><p class="head25 p-b10" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">How Do We Measure?</span></p><div class="best_measure" data-dcnode-id="1446"><img data-dcnode-id="1450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/wp-content/uploads/images/pre-filter.svg&amp;raw"><span data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Pre-filter + HEPA</span></span><span data-dcnode-id="1447" instrument_node="">
Our criteria are simple. The air cleaner must come with a pre-filter and HEPA filter with the capability to capture household allergens. A good pre-filter will stop large airborne particles from flowing to the next stage. It will also reduce the dependencies of HEPA and carbon filter. HEPA filter is the key component to capture micron size contaminants that cannot be seen by our naked eyes. What we are looking for is a dependable pre-filter whether in the form of a permanent or 2-in-1 carbon filter. The True HEPA filter has to be genuine so no settling for a lower efficiency HEPA-type filter.</span></div><span data-dcnode-id="1445" instrument_node="">
</span><div class="best_measure" data-dcnode-id="1440"><img data-dcnode-id="1444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/wp-content/uploads/images/carbonfilter.svg&amp;raw"><span data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Activated Carbon filter</span></span><span data-dcnode-id="1441" instrument_node="">
Another must-have filter to qualify in this list. Little do people know that good or bad odors can trigger an asthma attack. For example, you have good odors coming from food, flower, or perfume, and bad odors from mold musty smell, detergent fume, cigarette smoke, or VOCs. After tested more than 100 units back to back, the selected carbon filter must be able to filter all smoke particles before it reaches our lungs. It must also be compatible with the previous two filters.</span></div><span data-dcnode-id="1439" instrument_node="">
</span><h3 data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">How To Choose An Allergy Air Purifier for Asthma</span></h3><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">There are many factors to consider when you're reviewing or buying an asthma air purifier. Depending on your needs, every model has its own pros and cons that may not share the same health benefits. To ease your purchasing journey, here are the air cleaning features and terminology that you should know before ordering one.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><ul data-dcnode-id="1398"><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1425"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Coverage area</span></strong><span data-dcnode-id="1429" instrument_node=""> - Measure the room size where you </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/where-to-place-air-purifier-in-home/"><span data-dcnode-id="1428" instrument_node="">intended to place the air cleaner</span></a><span data-dcnode-id="1426" instrument_node="">. With that, you can pick a model that has the airflow capacity to cover an entire room. For asthma sufferers or hypersensitivity person, you will need to measure the coverage area at 4 air changes per hour.</span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1420"><strong data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Air Changes Per Hour (ACH)</span></strong><span data-dcnode-id="1421" instrument_node=""> - The number of times an air cleaner exchanges the air in the room hourly. The higher the number, the more clean air the device can distribute.</span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1415"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Clean Air Delivery Rate (CADR)</span></strong><span data-dcnode-id="1416" instrument_node=""> - An official numerical value used by the Association of Home Appliance Manufacturers (AHAM). Independently tested on the efficiency of an air cleaner removing specific types of pollutants in cubic feet per minute (cfm). The higher the CADR ratings, the more beneficial it is to asthma sufferers. </span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1410"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Noise levels</span></strong><span data-dcnode-id="1411" instrument_node=""> - Most air cleaners' noise falls between 30 dB (quiet rural area) to 60 dB (normal conversation). Some white noise can be expected when it is running on higher fan speed. The more silent is the operation, the less distraction there will be. You will be more inclined to turn on the machine and leave it running the whole day.</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1405"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Energy efficiency</span></strong><span data-dcnode-id="1406" instrument_node=""> - Most air purifying machines consume energy similar to a lightbulb. Even if you leave it on the whole day, you will not see a dramatic increase in the electricity bill. Pick a model that is Energy Star Rated, comes with Auto/ Sleep mode, and has decent power output.</span></li><span data-dcnode-id="1404" instrument_node="">
</span><li data-dcnode-id="1400"><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Warranty</span></strong><span data-dcnode-id="1401" instrument_node=""> - The longer the warranty duration, the higher the quality assurance you will get on the device. Every manufacturer will have slight variants in their T&amp;C, study what parts do the warranty covered, does it offer a 1-to-1 exchange, and where is the nearest service center.</span></li><span data-dcnode-id="1399" instrument_node="">
</span></ul></div><span data-dcnode-id="1396" instrument_node="">

</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Other benefits of Alen BreatheSmart Flex is the slimmer profile. At a much smaller 5 x 25 x 8.5 inches and 15 lb weight, it fits most interior space well, particularly for a small apartment. You can leave it in the corner to clean the air while you go on with your daily life. There is also the personalizable color options that you can choose from. Take note that it is not interchangeable with the Classic model. Non-allergy related issues, since it's been in the market for a while, it does not have the techiest design. The cut-cost measure also means there are no sensors for auto mode and air quality indicators. Noise level is not the most subtle at 39 to 55 decibels, treat it as pink noise and you will be fine. Being an Energy Star unit, power usage is very good at 0.8 to 56 watts averaging at 36. Overall, if you need a solid, dependable yet reasonably price air purifier, Alen BreatheSmart Flex is your call.</span></p><span data-dcnode-id="1159" instrument_node="">

</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Nothing makes an asthmatic person feel safe surrounded with purified, clean air. The first stage pre-filter airborne will trap dust, debris, dirt, and hair that is often filled with allergens. Without the pesky large particles, the inflow microbes will now have to go through a series of filtration. Starting with a medium filter that captures finer particles that manage to bypass the pre-filter. Next, the 99.97% efficiency HEPA filter will trap microscopic particles that manage to bypass the prior 2 filters. Any uncaptured smoke will be taken care of by the Charcoal-Based activated carbon filter. Negative Ion Generator is an ozone-free cleaning method that dispersed millions of negative ions into the air. Positive ions impurities will electrostatically join with the diffused ions causing it to fall for the filter to capture. Depending on the types of allergens that worsen your respiratory issues, pick a customized filter based on your needs. If your allergies are triggered by mold, bacteria, and viruses, go with the germ defense filter. If you have pets at home, obviously the pet allergy filter is the right choice. If you are hypersensitive to chemical fumes, and foul odors, either Toxin Absorber or Odor Remover will be a great addon.</span></p><span data-dcnode-id="804" instrument_node="">

</span><div class="bs" data-dcnode-id="476"><h3 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">What causes asthma?</span></h3><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Asthma AKA bronchial asthma is a chronic lung disease that inflames and narrows the breathing airways. It happens when the tubes that carry air in and out of your lungs become inflamed and muscles become swollen. More mucus will be produced that adds to the obstruction. As a result, the airway is narrower making it hard to breathe. Most asthma symptoms are related to respiratory infections triggered by airborne irritants as such:</span></p><span data-dcnode-id="752" instrument_node="">
</span><ul data-dcnode-id="722"><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="747"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Allergic asthma</span></strong><span data-dcnode-id="748" instrument_node=""> - A common chronic respiratory condition that causes the airways to become inflamed when we breathe in allergy triggers. 3/5 of asthma are passed on genetically (hereditary) and more likely to develop throughout their life.</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="742"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Mold</span></strong><span data-dcnode-id="743" instrument_node=""> - A type of fungus that thrives in damp environments like the basement, bathroom, kitchen sink. While the microorganisms might not be visible when in the air, you can scent its presence through a distinctive musty smell. There are a lot of diseases associated with mold allergy which you can learn about the severity here.</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="737"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Pollen</span></strong><span data-dcnode-id="738" instrument_node=""> - Fine powdery substances of pollen grains produced by plants and flowers. Often spread through insects, wind and stay suspended in the air for a long period of time. Pollen can cause hay fever when exposed through our mouth, nose, eyes, or throat.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="729"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Pet dander</span></strong><span data-dcnode-id="733" instrument_node=""> - Tiny flecks of skin shed from cats, dogs, birds, and other animals with hair or fur. It is the protein found in the dead skin cells that causes pet allergy. </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/can-you-develop-an-allergy-to-cats/"><span data-dcnode-id="732" instrument_node="">Cat dander is more common and allergenic compared with dogs</span></a><span data-dcnode-id="730" instrument_node="">.</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="724"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Perfumes and colognes</span></strong><span data-dcnode-id="725" instrument_node=""> - Fragrant liquid that is typically made from flower and spices extract. Mask odors with pleasant smell but can trigger allergic reactions with its chemical substances.</span></li><span data-dcnode-id="723" instrument_node="">
</span></ul><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Sometimes it is hard to tell if a symptom experience is cold, bronchitis, or asthma. A good indication is on the occurrence frequency as asthma symptoms tend to last longer. Common signs of asthma include:</span></p><span data-dcnode-id="718" instrument_node="">
</span><ul data-dcnode-id="692"><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Chronic cough especially at night</span></li><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Cough during exercise or when laughing</span></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Difficulty breathing/ Loss of breath</span></li><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Rapid breathing</span></li><span data-dcnode-id="705" instrument_node="">
</span><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Wheezing (whistling sound when breathing)</span></li><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Dizziness</span></li><span data-dcnode-id="699" instrument_node="">
</span><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Chest tightness</span></li><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Shortness of breath</span></li><span data-dcnode-id="693" instrument_node="">
</span></ul><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">Children are the most susceptible to early symptoms of asthma and will show some signs before they turn 5. This is because of the bronchial tubes in infants or toddler is very small and narrow. A slight irritation will lead to the airway being inflamed with symptoms that can last for days or weeks. Untreated asthma can kill within minutes. If one or more of the asthma symptoms occur and did not settle down after you have uses a rescue inhaler, seek medical help immediately. While there is no permanent cure, it is controllable and people can still live a normal, active life. A </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/best-hepa-air-purifier-home/"><span data-dcnode-id="689" instrument_node="">HEPA air purifier would help reduce the number of irritants in the air</span></a><span data-dcnode-id="687" instrument_node="">.</span></p><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Do Air Purifiers Help with Asthma</span></h3><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">An air purifier can help reduce the risk of an asthma attack by removing indoor allergens in a room. You will breathe better without suffering from asthma symptoms and lung irritation. The only condition is the air cleaner needs to be running all the time to protect us from incoming irritants.</span></p><span data-dcnode-id="679" instrument_node="">
</span><h3 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Asthma Facts and Figures</span></h3><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Asthma is a chronic lung disease that should not be taken lightly. Many people assume it is a common condition that happens among our peers and friends, an inhaler would probably do the trick. Unfortunately, there are far too many horrid cases that lead to fatality even at a young stage. Most of the death are preventable if safety-precaution is in place. Let's take a look at some of the scary asthma statistics from AAFA.</span></p><span data-dcnode-id="673" instrument_node="">
</span><ul data-dcnode-id="635"><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">According to CDC, 1 in 13 people has asthma and has been steadily increasing since the early 1980s.</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Asthma affects more than 25 million Americans; 6-7 million are children under the age of 18.</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="661"><span data-dcnode-id="665" instrument_node="">According to </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/news-room/q-a-detail/asthma" rel="noopener" target="_blank"><span data-dcnode-id="664" instrument_node="">WHO</span></a><span data-dcnode-id="662" instrument_node="">, more than 339 million people have asthma and is the most common chronic disease among children. One-third of children that died only have mild intermittent asthma.</span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Asthma is the top reason for children missing school days with a high 13.8 million record in 2013.</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">About 4,000 people die of asthma annually in the United States. Many of these deaths are avoidable with treatment and care.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Asthma is more common in adult women over men, children over adults, and boys over girls.</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">60-65% of breathing problems linked with asthma from children could be mitigated with an air purifier.</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Asthma has been on the rise since the early 1980s in all age, sex, and racial groups. Part of the reason is due to the increasingly poor air pollutions exposure.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Asthma is more common in adult women over men, children over adults, and boys over girls.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">More than 11.4 million people including 3 million children had one or more asthma episodes.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">According to the Asthma and Allergy Foundation of American (AAFA), the annual cost of allergies exceeded $18 billion.</span></li><span data-dcnode-id="636" instrument_node="">
</span></ul><span data-dcnode-id="634" instrument_node="">
</span><h3 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Where Should I Place An Asthma Air Purifier?</span></h3><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="627"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/best-bedroom-air-purifier/"><span data-dcnode-id="630" instrument_node="">The bedroom is the best place for an air purifier</span></a><span data-dcnode-id="628" instrument_node=""> as we spend at least 6-8 hours a night in there. When choosing a spot for the device, left 3 feet of space between walls so that it will not impede the airflow circulation. Also, never place it underneath windows or next to electronic devices. For optimum results, get an air cleaner for every room so no airborne pollutants will be able to escape.</span></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">6 Different Types of Asthma</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">According to ACAAI, there are many different types of asthma that can be triggered by different sources. While an allergist can provide you with a diagnosis and identifying the causes, let us go through all 6 common types of asthma.</span></p><span data-dcnode-id="620" instrument_node="">
</span><ul data-dcnode-id="588"><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="615"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Adult-Onset Asthma</span></strong><span data-dcnode-id="616" instrument_node=""> - Respiratory infection that only unmasks during adulthood as the person is not exposed to asthma triggers throughout their childhood.</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="610"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Allergic Asthma</span></strong><span data-dcnode-id="611" instrument_node=""> - The most common form that is triggered by inhaling airborne allergens.</span></li><span data-dcnode-id="609" instrument_node="">
</span><li data-dcnode-id="605"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Asthma-COPD Overlap (ACO</span></strong><span data-dcnode-id="606" instrument_node="">) - When you have symptoms of both asthma and chronic obstructive pulmonary disease (COPD) associated with breathing difficulty.</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="600"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Exercise-Induced Bronchoconstriction (EIB)</span></strong><span data-dcnode-id="601" instrument_node=""> - The narrowing of the airways that makes it difficult to move air out of the lungs. A condition that can occur in people with or without asthma.</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="595"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Nonallergic Asthma</span></strong><span data-dcnode-id="596" instrument_node=""> - Triggered by illnesses, medications, and environmental factors that do not involve an immune-system response.</span></li><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="590"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Occupational Asthma</span></strong><span data-dcnode-id="591" instrument_node=""> - Lung disorder that causes the airways to swell and narrow in the workplace.</span></li><span data-dcnode-id="589" instrument_node="">
</span></ul><span data-dcnode-id="587" instrument_node="">
</span><h3 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Additional Tips in Dealing With Asthma and Allergies</span></h3><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">It is a known fact that an </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/are-air-purifiers-a-waste-of-money/"><span data-dcnode-id="582" instrument_node="">air purifier can improve indoor air quality by circulating clean air</span></a><span data-dcnode-id="580" instrument_node="">, it is not a substitute for an inhaler or other necessary treatments. There are more actions you can take to minimize exposure to allergens in your home. Little things such as changing your toothpaste, drinking coffee (theophylline), or taking medication can help. Practice the steps below will help you breathe better, relieve from asthma symptoms along with other health benefits.</span></p><span data-dcnode-id="578" instrument_node="">
</span><ul data-dcnode-id="531"><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="573"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Vacuum every 1 to 2 days</span></strong><span data-dcnode-id="574" instrument_node=""> - Particulate matters can come from indoor and outdoor through open windows, clothes, and shoes. The tracked contaminants will eventually settle on the ground, wall, sofa, or shelf forming dust bunnies. A HEPA vacuum cleaner will collect the dust particles before we inhale them. Vacuum regularly from top to bottom, behind the sofa, and especially if you have carpets at home.</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="568"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Maintain HVAC filters periodically</span></strong><span data-dcnode-id="569" instrument_node=""> - Take out the air filter for cleaning every quarterly or according to the maintenance interval. Also, check if there are any damaged ducts that may lead to leakage. Hire a ventilation expert to perform the cleaning on HVAC located in hard to reach places.</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="563"><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Keep windows and doors closed</span></strong><span data-dcnode-id="564" instrument_node=""> - Especially if you are staying in an industrial area, close to highways, or during the pollen season. It will reduce the volume of clean air from going out and outdoor allergens from coming in.</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="558"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Reduce smoke at home</span></strong><span data-dcnode-id="559" instrument_node=""> - Gas and odor can aggravate allergies and trigger an asthma attack. Avoid using scented candles, incense, wood burning, stove cooking, and smoking indoor. You can open windows or turn on an exhaust fan to draw away the smoke and smog. Never start a car with the garage door closed as carbon monoxide may travel inside the house.</span></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="553"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Beware of pet allergens</span></strong><span data-dcnode-id="554" instrument_node=""> - Pets shed at an alarming rate. If you are allergic to cats or dogs, try to keep a distance from the furry one. Do not let your pet sleep in your bed or on the couch. Brush them daily and bathe them every 2-3 weeks. Wash your hands and change your clothes after petting them to reduce the exposure to pet dander. Consider getting a hypoallergenic pet that sheds less and brings fewer allergies.</span></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="548"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Substitute chemical with natural, allergen-free products</span></strong><span data-dcnode-id="549" instrument_node=""> - Toxic like volatile organic compounds is a known allergy trigger. Choose naturally made detergent, pesticides that will not off-gas toxic fumes. Opt for low VOCs paint and avoid storing the leftover indoor.</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="543"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Maintain room humidity level between 30% to 50%</span></strong><span data-dcnode-id="544" instrument_node=""> - It can discourage the growth of mold and mildew. It will also relieve allergic symptoms like flaky skin, chronic sneezing, cough, headache, and lungs irritation. Get a humidifier to increase moisture when RH drops below 30% or a dehumidifier to decrease moisture when RH exceeded 50%.</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="538"><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Wear a mask</span></strong><span data-dcnode-id="539" instrument_node=""> - Especially during this unprecedented pandemic times. Change your clothes when you return home and wash linens regularly to prevent dust mites from spreading.</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="533"><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Change daily routine</span></strong><span data-dcnode-id="534" instrument_node=""> - From sitting upright, drinking coffee or caffeinated tea (theophylline chemical), changing toothpaste, to rubbing mustard seed oil on the chest. All these little actions can relax the muscle, open up the airways, and prevent hyperventilation.</span></li><span data-dcnode-id="532" instrument_node="">
</span></ul><span data-dcnode-id="530" instrument_node="">
</span><h3 data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Types of Air Purifier For Asthma And Allergies</span></h3><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">There are many types of filtration to consider when you're comparing an air purifier for asthma. The best type will trap the finest asthma-inducing triggers inside the filter and prevent them from recirculating back into the room. </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/best-medical-grade-air-purifier/"><span data-dcnode-id="525" instrument_node="">HEPA air purifiers are the best option</span></a><span data-dcnode-id="523" instrument_node=""> for those with asthma. You can even get models that come with extra filtration as below.</span></p><span data-dcnode-id="521" instrument_node="">
</span><ul data-dcnode-id="477"><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="513"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Pre-filter</span></strong><span data-dcnode-id="517" instrument_node=""> – A </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/what-is-a-pre-filter/"><span data-dcnode-id="516" instrument_node="">first-stage filter that captures large particles</span></a><span data-dcnode-id="514" instrument_node=""> like dust, hair, and debris floating the air. Most pre-filter is designed to be washable and reusable thus prolong the lifespan of the HEPA filter.</span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="508"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">True HEPA Filter</span></strong><span data-dcnode-id="509" instrument_node=""> - Stands for high efficiency particulate air. A high dense glass fibers filter that was commercialized since the 1950s to capture fine particles through impact, interception, and diffusion. To qualify as a True HEPA filter, the air filter must meet the efficiency of U.S. DOE (99.97%) and European Standard (99.95%) of particles as small as 0.3 μm. Unlike a pre-filter, True HEPA filter cannot be wash and must be replaced after a period of time.</span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="503"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Activated carbon/ Charcoal filter</span></strong><span data-dcnode-id="504" instrument_node=""> - Adsorb odorous particles and gases like pets, cooking, and chemicals volatile organic compounds (VOCs) into the bed of activated carbon. Can be found in most air cleaner with multiple-filtration.</span></li><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="495"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">UV-C light technology</span></strong><span data-dcnode-id="499" instrument_node=""> - A sterilizing method that uses short-wavelength light to destroy the DNA structure of germs and other pathogens. The damaged nucleic acid of microorganisms will lose the ability to multiply and spread diseases. </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/are-uv-air-purifiers-safe-or-dangerous/"><span data-dcnode-id="498" instrument_node="">UV radiation is harmless to humans</span></a><span data-dcnode-id="496" instrument_node=""> but should be used with extra care.</span></li><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="487"><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Ionizer</span></strong><span data-dcnode-id="491" instrument_node=""> - Emit negative ions that electrostatically charge and latch positive ion particles in the air. The heavier particulates will be collected by a metal plate or filter. Reusable and cost-effective as the plate is washable and there are no filters to replace. Contrary to many beliefs, an </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/are-air-purifiers-with-ionizers-safe/"><span data-dcnode-id="490" instrument_node="">ionizer is safe as it does not create by-products like ozone</span></a><span data-dcnode-id="488" instrument_node="">.</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="479"><strong data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Ozone generator/ Ozonator</span></strong><span data-dcnode-id="483" instrument_node=""> - Generate colorless ozone gases that supposedly neutralize microbes by breaking part oxygen molecules. In reality, </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfuji.com/what-does-ozone-smell-like/"><span data-dcnode-id="482" instrument_node="">ozone only masks away the odors</span></a><span data-dcnode-id="480" instrument_node=""> and creates respiratory infection. According to the EPA, inhaling to a high concentration level of ozone can aggravate asthma, decrease lung function, inflammation, throat irritation, chest pain, and damaged tissue cells.</span></li><span data-dcnode-id="478" instrument_node="">
</span></ul></div><span data-dcnode-id="475" instrument_node="">
</span><span data-dcnode-id="473" instrument_node="">
