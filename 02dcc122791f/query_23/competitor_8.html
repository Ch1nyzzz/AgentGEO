</span><h3 data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">6. Negative Ions</span></h3><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Negative Ions are odorless, tasteless and invisible molecules that are found near mountains, waterfalls and beaches. Some research studies show that negative ions help to alleviate depression and boost mental energy, but that's not all that these
        tiny molecules can do. Negative Ions help your air purifier by latching onto airborne particles, thus weighing them down. This allows the particles to get trapped more easily by your air purifier's filters, or to settle onto the floor where they can be picked up by your vacuum instead of accidentally inhaled.
      </span></p><span data-dcnode-id="3933" instrument_node="">

</span><p class="text3" data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">(3) Once the sensor detects a reduction in airborne pollutants, the machine will resume its original speed.</span></p><span data-dcnode-id="3849" instrument_node="">
