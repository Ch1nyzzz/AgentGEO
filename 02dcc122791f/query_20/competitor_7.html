</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="377"><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">The most effective ways to get smells out of hair generally require access to a shower or tub and some household products. However, there are several things you can do to improve the smell of your hair while out and about. The most straightforward is to get as much fresh air flowing through your hair as you can. If your hair is up in a clip or ponytail, take it down and head outside for at least an hour, or as long as possible. Open car windows and let the wind blow through your hair; sit by an open window or fan; or even head to the restrooms and angle the hand dryer to blow through your hair for a minute or two.</span></p><span data-dcnode-id="378" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="370"><div class="inline-ad inline-ad--mobile" data-dcnode-id="371"><p class="inline-ad__label ui-label" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="374" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="372"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.ehow.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="373" id="slot1-2" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="366"><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">If smelly hair is an occupational hazard for you – for example, if you work in an atmosphere with strong odors – it's a good idea to have some on-the-go solutions with you. Dry shampoo, which is available in travel sizes ideal for keeping in a purse or car, is a handy product for getting smells out of hair. Follow the manufacturer's directions, which will generally tell you to spray or sprinkle the product around your roots, massage and let it sit for a minute or two, and then brush or comb it out. Another way to refresh the smell of your hair anywhere is with an essential oil spritz. Carry a small spray bottle filled with water and 10 to 20 drops of essential oils such as peppermint and tea tree oils.</span></p><span data-dcnode-id="367" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="359"><div class="inline-ad inline-ad--mobile" data-dcnode-id="360"><p class="inline-ad__label ui-label" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">

</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="350"><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Once you're at home, getting smells out of hair is a much easier task. The most obvious solution and the simplest is to thoroughly wash your hair, shampooing twice for more effective odor removal. Also consider adding natural deodorizers – baking soda, apple cider vinegar or lemon juice – as a rinse. Mix approximately 2 to 3 tablespoons of any of these three products into 2 cups of water, and pour the solution over your hair to saturate it. Let the product sit for about 5 minutes, then thoroughly rinse your hair.</span></p><span data-dcnode-id="351" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="343"><div class="inline-ad inline-ad--mobile" data-dcnode-id="344"><p class="inline-ad__label ui-label" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">

</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="334"><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">If your hair has an unpleasant smell on a regular basis, with no obvious external cause, you might have a scalp issue that needs to be addressed if you want to get the smell out of your hair once and for all. Rub your fingers up against your scalp and smell your fingers. If they smell bad, the cause is likely to be excess oils, dead skin cells and yeast on the scalp. This problem can often be fixed by adjusting your hair care routine, but persistent issues might warrant a visit to a doctor.</span></p><span data-dcnode-id="335" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="327"><div class="inline-ad inline-ad--mobile" data-dcnode-id="328"><p class="inline-ad__label ui-label" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">
