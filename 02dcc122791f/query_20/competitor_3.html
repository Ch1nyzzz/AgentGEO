</span><h3 data-dcnode-id="4256" style="text-align: left;"><span data-dcnode-id="4257" instrument_node="">One thing that almost every piece of thrifted leather or suede has in common is they often stink.</span></h3><span data-dcnode-id="4255" instrument_node="">
</span><p data-dcnode-id="4253" style="text-align: left;"><span data-dcnode-id="4254" instrument_node="">That really obnoxious thrift store smell that is a mixture of musty basements, moth balls and what my husband claims is dead people smell.</span></p><span data-dcnode-id="4252" instrument_node="">
</span><p data-dcnode-id="4246" style="text-align: left;"><span data-dcnode-id="4251" instrument_node="">I’ve tried everything to remove that rancid odour, washing with a damp rag and vinegar, placing the item outside for weeks on end, placing it in a bag with baking soda, using cat litter, &nbsp;you name it but </span><strong data-dcnode-id="4248"><em data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">none of these methods worked</span></em></strong><span data-dcnode-id="4247" instrument_node="">. &nbsp;Leather and suede are notoriously difficult for smell removal.</span></p><span data-dcnode-id="4245" instrument_node="">
</span><p data-dcnode-id="4243" style="text-align: left;"><span data-dcnode-id="4244" instrument_node="">Usually, this meant I had to&nbsp;break down and take that item to have it professionally dry cleaned which meant loads of cash and saying bye-bye to any profit margin when trying to resell vintage.</span></p><span data-dcnode-id="4242" instrument_node="">
</span><h2 data-dcnode-id="4240" style="text-align: left;"><span data-dcnode-id="4241" instrument_node="">How To Remove Bad Smells From Leather or Suede</span></h2><span data-dcnode-id="4239" instrument_node="">
</span><h3 data-dcnode-id="4237" style="text-align: left;"><span data-dcnode-id="4238" instrument_node="">I now have a guaranteed method to remove bad smells from leather or suede and it doesn’t cost and arm and a leg.</span></h3><span data-dcnode-id="4236" instrument_node="">
</span><p data-dcnode-id="4234" style="text-align: left;"><span data-dcnode-id="4235" instrument_node="">It is dead simple and you probably have the materials required already in your home.</span></p><span data-dcnode-id="4233" instrument_node="">

annecarillo.com/remove-bad-smells-from-leather-or-suede/diy-how-to-remove-bad-smells-from-leather-or-suede/" data-orig-file="https://i1.wp.com/suzannecarillo.com/wp-content/uploads/2016/10/DIY-how-to-remove-bad-smells-from-leather-or-suede.jpg?fit=640%2C2125&amp;amp;ssl=1" data-orig-size="640,2125" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="diy-how-to-remove-bad-smells-from-leather-or-suede" data-image-description="&amp;lt;p&amp;gt;DIY how to remove bad smells from leather or suede&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="4219" style="text-align: left;"><span data-dcnode-id="4220" instrument_node="">That’s it!</span></p><span data-dcnode-id="4218" instrument_node="">
</span><h3 data-dcnode-id="4216" style="text-align: left;"><span data-dcnode-id="4217" instrument_node="">Easy peezy.</span></h3><span data-dcnode-id="4215" instrument_node="">
</span><p data-dcnode-id="4213" style="text-align: left;"><span data-dcnode-id="4214" instrument_node="">I use a big paper bag that we normally use for collecting yard debris and I can layer in quite a few skirts, coats and purses into one bag. It is brilliant.</span></p><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210" style="text-align: left;"><span data-dcnode-id="4211" instrument_node="">I just used the coffee we had in the house but I’m sure you can use any cheap brand.</span></p><span data-dcnode-id="4209" instrument_node="">
</span><p data-dcnode-id="4207" style="text-align: left;"><span data-dcnode-id="4208" instrument_node="">Turn the coats or skirts inside out just to avoid any kind of staining. &nbsp;As long as nothing is wet or damp the coffee won’t stain anything.</span></p><span data-dcnode-id="4206" instrument_node="">
</span><p data-dcnode-id="4204" style="text-align: left;"><span data-dcnode-id="4205" instrument_node="">When the weather is nice I place the bag outdoors, but it isn’t necessary.</span></p><span data-dcnode-id="4203" instrument_node="">
</span><p data-dcnode-id="4201" style="text-align: left;"><span data-dcnode-id="4202" instrument_node="">For more stubborn smells like cigarettes, I find I may have to leave an item as long as a month but eventually the odour disappears without a trace of the dreaded wet ashtray smell. Yes, they do smell like coffee for a bit, but after a while, that smell dissipates as well.</span></p><span data-dcnode-id="4200" instrument_node="">
</span><h3 data-dcnode-id="4198" style="text-align: left;"><span data-dcnode-id="4199" instrument_node="">Also, everyone I know loves the smell of coffee, so it’s not a huge deal.</span></h3><span data-dcnode-id="4197" instrument_node="">
</span><p data-dcnode-id="4195" style="text-align: left;"><span data-dcnode-id="4196" instrument_node="">I’ve even used this method on my antique leather couch. I filled the crevices with coffee grinds and after a few weeks just vacuumed them out. Worked like a charm!</span></p><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4192" style="text-align: left;"><span data-dcnode-id="4193" instrument_node="">I hope you find this useful.</span></p><span data-dcnode-id="4191" instrument_node="">
</span><p data-dcnode-id="4189" style="text-align: left;"><span data-dcnode-id="4190" instrument_node="">Let me know if you find it as successful as I have.</span></p><span data-dcnode-id="4188" instrument_node="">
