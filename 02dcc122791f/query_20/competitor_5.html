</span><article class="post-2995 post type-post status-publish format-standard has-post-thumbnail hentry category-bathroom category-water-heaters ast-article-single" data-dcnode-id="257" id="post-2995" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="482" instrument_node="">
</span><div class="ast-post-format- single-layout-1" data-dcnode-id="259"><span data-dcnode-id="481" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="466"><span data-dcnode-id="480" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="477" itemprop="headline"><span data-dcnode-id="478" instrument_node="">How To Remove Smell From Water Tank?</span></h1><div class="entry-meta" data-dcnode-id="470"><span class="cat-links" data-dcnode-id="471"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/category/bathroom/" rel="category tag"><span data-dcnode-id="476" instrument_node="">Bathroom</span></a><span data-dcnode-id="474" instrument_node="">, </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/category/bathroom/water-heaters/" rel="category tag"><span data-dcnode-id="473" instrument_node="">Water Heaters</span></a></span></div><span data-dcnode-id="469" instrument_node=""> </span></div><span data-dcnode-id="467" instrument_node="">
</span></header><span data-dcnode-id="464" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="262" itemprop="text"><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">There are often reports in the city that the city water has a bad odour. Most of the time, the smell does not come from the water source itself but water heater tanks. Nevertheless, regardless of where you live, a bad smell coming from your water tank is not uncommon. However, this smell is unpleasant and therefore, it would help if you know how to remove smell from water tank.</span></p><span data-dcnode-id="460" instrument_node="">
</span><h2 data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">A Sulfur Odour Present In the Water</span></strong></h2><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Before finding out how to remove odour from water, you first need to identify the source and the cause.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="452" instrument_node="">A sulfur odour coming from the water tank can happen in any home. </span><span data-dcnode-id="449" style="text-decoration: underline;"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/hot-water-heater-smells-like-sulfur/"><span data-dcnode-id="451" instrument_node="">Sulfur odour resembles the smell of rotten eggs</span></a></span><span data-dcnode-id="448" instrument_node="">. This type of smell can develop in water heaters, corroded iron pipes or city water lines. .</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="445" instrument_node="">Even if the city water is chlorinated, the smell can still occur. Most of the time, water with low chlorine residual and a high sulfate level will develop this kind of smell. Likewise, water that has been inactive for days or weeks can also develop this odour, also known as blackwater. [</span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.sa.gov.au/environmental_info/water_quality/programs/grey_and_black_water_discharge" rel="noopener" target="_blank"><span data-dcnode-id="444" instrument_node="">1</span></a><span data-dcnode-id="442" instrument_node="">]</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Whether in the water line or water heater, bacteria is the main culprit that produces the rotten-egg smell. If the water in the water heater or waterline does not have enough chlorine, the bacteria level will be high. These microorganisms then react to sulfates and cause the water to smell bad.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">If you are uncertain about the source of the smell you can test by opening your faucets.&nbsp; It might be that the water tank is not the source of the smell.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="433" instrument_node="">If the cold water has a smell, then the problem is most likely coming from your home pipes or the city water line. In this case, you will have to call your local water utility company and report the problem. [</span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_utility" rel="nofollow noopener" target="_blank"><span data-dcnode-id="432" instrument_node="">2</span></a><span data-dcnode-id="430" instrument_node="">]</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">However, if the smell is coming from the hot water faucet only, the smell is most likely developing in the water heater tank.&nbsp; By knowing this you can find&nbsp; the best solution on how to remove smell from water tank.</span></p><span data-dcnode-id="425" instrument_node="">
</span><h2 data-dcnode-id="422"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">How To Remove Smell From Water Tank</span></strong></h2><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><img alt="boiler_technician.jpeg" class="size-full wp-image-2927 aligncenter" data-dcnode-id="420" height="540" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-22T104509.874.jpg&amp;raw" srcset="https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-22T104509.874.jpg 540w, https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-22T104509.874-300x300.jpg 300w, https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-22T104509.874-150x150.jpg 150w" width="540"></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Once you have established that the sulfur smell is coming from your water tank, you can find the best solution.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">There are two reasons why the water in the water heater tank can produce a sulfuric odour. It is either due to high levels of sulfur-reducing bacteria or because of a corroded anode rod.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The best way to solve the problem is to call a certified plumber. A plumber will inspect the water tank to find the leading cause of the smell coming from the water tank.</span></p><span data-dcnode-id="409" instrument_node="">
</span><h3 data-dcnode-id="406"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">How To Eliminate High Levels Of Sulfur-Reducing Bacteria?</span></strong></h3><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">If the problem lies within the water components, the tank will have to be flushed and disinfected. If you are familiar with a water heater’s functions and inner workings, you can do this yourself.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">You will have to use a water heater odour killer, such as chlorine bleach. [</span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chlorine.americanchemistry.com/Chlorine/BleachFAQs/"><span data-dcnode-id="400" instrument_node="">3</span></a><span data-dcnode-id="398" instrument_node="">] This solution will effectively remove high levels of hydrogen sulfide in the water. As the chlorine in the bleach reacts with the hydrogen sulfide, the “rotten egg” odour will be eliminated.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="395" instrument_node="">However, if you know nothing </span><span data-dcnode-id="392" style="text-decoration: underline;"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/pros-and-cons-of-tankless-water-heater/"><span data-dcnode-id="394" instrument_node="">about water heaters</span></a></span><span data-dcnode-id="391" instrument_node="">, it is best to call a professional. A plumber will use efficient methods to flush and disinfect your tank. This will remove the bacteria and particles that create hydrogen sulfide.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">If your water has a naturally high level of sulfur-reducing bacteria, the problem will most likely recur. [</span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sulfur-reducing_bacteria"><span data-dcnode-id="387" instrument_node="">4</span></a><span data-dcnode-id="385" instrument_node="">]</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Therefore it would be best to install a water purification system as prevention. A purifier that specializes in removing hydrogen sulfide would keep the rotten egg smell at bay. For this installation, you can contact a plumber to find out which one is best for your needs.</span></p><span data-dcnode-id="380" instrument_node="">
</span><h3 data-dcnode-id="377"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">What To Do If The Anode Rod Is Causing The Smell?</span></strong></h3><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><img alt="boiler_heating_element.jpeg" class="size-full wp-image-3009 aligncenter" data-dcnode-id="375" height="540" loading="lazy" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-29T164412.061.jpg&amp;raw" srcset="https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-29T164412.061.jpg 540w, https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-29T164412.061-300x300.jpg 300w, https://plumbertip.com/wp-content/uploads/2021/07/Untitled-design-2021-07-29T164412.061-150x150.jpg 150w" width="540"></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="372" instrument_node="">Another thing that can cause the water to smell bad is if its anode rod is corroded. Anode rods come forth in all standard tank-style water heaters and not in </span><span data-dcnode-id="369" style="text-decoration: underline;"><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/best-tankless-gas-water-heater-with-recirculating-pump/"><span data-dcnode-id="371" instrument_node="">tankless water heaters</span></a></span><span data-dcnode-id="368" instrument_node="">. These rods are sacrificial, meaning they are meant to break down and will have to be replaced every few years.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">The reason they are designed to corrode is to protect the water heater lining. Instead of your water heater rusting from the inside, the anode rod will draw rusty minerals and corrode instead. If your anode rod corrodes completely, it will cause the water to smell sulfuric. In this instance you will have to replace the anode rod to get rid of the smell.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Keep in mind that aluminium anodes are best for homes with hard water and a high PH. On the other hand, magnesium anode rods are better for homes with soft water.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="359" instrument_node="">Magnesium or aluminum anode rods are not a good choice for tanks that have a high level of sulfur-reducing bacteria. This is because an abundance of free electrons are created during the natural corrosion process of the rods [</span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.lumenlearning.com/boundless-chemistry/chapter/corrosion/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="358" instrument_node="">5</span></a><span data-dcnode-id="356" instrument_node="">].</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">The sulfate-reducing bacteria will then use these electrons to create elemental sulfur, hence the rotten-egg smell. Therefore, it would be best to replace an aluminum or magnesium rod with a zinc alloy anode rod.</span></p><span data-dcnode-id="351" instrument_node="">
</span><h2 data-dcnode-id="348"><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Other Odours Related To Water Heater Tanks </span></strong></h2><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">A sulfur-smell is not the only odour that can occur from a water heater tank. It is important to identify the smell to avoid other problems down the line.</span></p><span data-dcnode-id="344" instrument_node="">
</span><h3 data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Burning Rubber or Plastic</span></strong></h3><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">If your water heater smells like burning rubber or plastic, make sure to turn off the power source.&nbsp; After the power is off at the breaker, you can investigate the hot water tank.&nbsp; The plastic area around the switch can overheat and burn if it is mounted outside the water heater.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Another area that might be overheating and burning is the insulative coating on the wires. This usually occurs if the insulation is old or not adequately packed. This will eventually cause the wiring to come into contact resulting in the heating elements overheating.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Once you figure out the cause, you can adjust the plastic piece or replace the insulation. If the cause can not be located, then it is best to contact a plumber.</span></p><span data-dcnode-id="331" instrument_node="">
</span><h3 data-dcnode-id="328"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Electrical Burning</span></strong></h3><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">An electrical burning smell is a sign that something electrical is overloading. For example, an electric water heater has two standard components that can fail, causing </span><span data-dcnode-id="323" style="text-decoration: underline;"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/water-heater-smells-like-burning/"><span data-dcnode-id="325" instrument_node="">a burning smell.</span></a></span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">If a hot wiring smell of electrical fire is present, it is most likely an overheated electrical contact. This means you will have to check the wiring for arcing. Electrical connections are prone to erosion after years of operation. Thus the contact will heat up and arc, causing heat to generate at the connection rather than at the firerod.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">In another case, a fire rod can crack and short out. This means that the fire rod has failed, resulting in the excess current to form a short. Thus the thermostat and wiring will heat and emit the electrical burning smell.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">If any of these issues occur, it is best to hire a trained plumber for repairs.</span></p><span data-dcnode-id="312" instrument_node="">
</span><h3 data-dcnode-id="307"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Burning Dust</span></strong></h3><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Dust and debris accumulate over time, even on water heaters. Therefore if you smell a burning dust smell coming from the water heater, dust is burning.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The best solution to this problem is to clean the water heater from dust and debris.</span></p><span data-dcnode-id="300" instrument_node="">
</span><h3 data-dcnode-id="295"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Gas Smell</span></strong></h3><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">If you have a </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plumbertip.com/is-an-electric-water-heater-better-than-gas/"><span data-dcnode-id="292" instrument_node="">gas water heater</span></a><span data-dcnode-id="290" instrument_node=""> and smell gas coming from it, gas is leaking.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">In such a gas, you should turn off the gas immediately and air out the house. To fix gas leaks, you can call a plumber or gas company.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">However, keep in mind that gas can ignite and cause a fire. Therefore if you don’t know where to turn off the gas, get out of the home and call a fire department for help.</span></p><span data-dcnode-id="282" instrument_node="">
</span><h2 data-dcnode-id="279"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Final Thought&nbsp;</span></strong></h2><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">The rotten eggs smell coming from hot water is disgusting as a pile of sewage and a concern for many homeowners.</span></p><span data-dcnode-id="275" instrument_node="">
</span><h3 data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Therefore it is not wonder, how owners are searching “how to remove smell from water tank?”</span></h3><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">However, this does not mean the water is contaminated and harmful to you if you happen to swallow some. On the other hand, if the smell is from the cold water, it is best to contact your water distributor.&nbsp; Your local water supplier will be able to confirm whether the water is safe to drink.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Nevertheless, smelly-tap water or not, it is never good to drink or cook with water from the hot tap. The environmental protection agency warns citizens against consuming water from the hot faucet. This is because hot tap water can leach harmful contaminants like lead from your home’s pipes. Therefore, it is best to never drink the water from the hot water faucet.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Either way, just because you are not drinking the water from the hot-water heater does not mean you need to live with a nasty smell. The best solution for a water heater that has been inactive for weeks is disinfection and flushing the tank. If the water heater is 13 to 15 years old, it might be time to replace it altogether.</span></p><span data-dcnode-id="263" instrument_node="">
</span></div><span data-dcnode-id="260" instrument_node="">
