e-id="547" instrument_node=""> </span><img alt="" class="pos-featured-bg-hidden true" data-dcnode-id="546" sizes="(max-width: 639px) 98vw, (max-width: 1199px) 64vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1344154655-1-910x512.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1344154655-1-910x512.jpg?lossy=0&amp;strip=1&amp;webp=1 910w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1344154655-1-910x512.jpg?size=380x214&amp;lossy=0&amp;strip=1&amp;webp=1 380w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1344154655-1-910x512.jpg?size=760x428&amp;lossy=0&amp;strip=1&amp;webp=1 760w, "><span data-dcnode-id="545" instrument_node=""> </span></div><span data-dcnode-id="543" instrument_node=""> </span><div class="entry-content" data-dcnode-id="316"><span data-dcnode-id="542" instrument_node=""> </span><div class="hth-nonreview-article-inner-container" data-dcnode-id="428"><span data-dcnode-id="541" instrument_node=""> </span><div class="fsn-row full-width-row fsn-626c659d0b43d light" data-dcnode-id="442" style="background-repeat:repeat;background-position:left top;background-attachment:scroll;background-size:auto;"><div class="container-fluid" data-dcnode-id="443"><div class="row" data-dcnode-id="444"><div class="col-sm-12" data-dcnode-id="445"><div class="fsn-column-inner fsn-626c659d0b53c light" data-dcnode-id="446"><div class="fsn-text fsn-626c659d0b5e5" data-dcnode-id="534"><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">When the seasons change, navigating the outdoors can be a frustrating affair. Managing to control allergic reactions outside is hard enough, so when it comes to being inside, most of those who suffer from allergies want to make sure that they have a place free of pollen and other irritants.</span></p><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">In most homes, allergen-proofing starts with the HVAC system. HVAC stands for heating, ventilation and air conditioning, the three primary components of a home air care system. Most centralized HVAC systems, also referred to as central air conditioning or central air systems, come with several features that can aid allergy sufferers and ensure that your living space is as pleasant as possible. These features also extend to alternative HVAC systems, like window-mounted, portable, and multi-split units, which we’ll cover little later on.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">It’s important to note that no one HVAC system is going to reduce allergens in the air more than others. That’s why a multi-pronged approach is going to be necessary to ensure that your home is allergen-free. Here’s everything you need to know about allergen-proofing your space and the best HVAC systems for allergies.</span></p></div><div class="fsn-text fsn-626c659d0b5fc" data-dcnode-id="447"><h3 data-dcnode-id="531"><b data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Allergen-Proofing Your Space</span></b></h3><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Before we get into the various HVAC systems that may reduce allergens in the air, we need to first go over the various ways that allergens get into the home in the first place. Understanding these sources can help you determine how best to begin combating allergens in your home.</span></p><h5 data-dcnode-id="526"><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Carpets &amp; Pets</span></b></h5><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Pets can make wonderful companions, but it’s clear that they can also be a bit of a strain on interior air quality. While having an allergen-proof home is totally possible with or without pets, you may need to work a little harder if you keep a few furry friends in your home.</span></p><p data-dcnode-id="516"><span data-dcnode-id="523" instrument_node="">Pet hair and dandruff often exponentially increase the need to vacuum and clean carpets and upholstery. We recommend seeking out the </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtohome.com/best-vacuum-for-pet-hair"><span data-dcnode-id="522" instrument_node="">Best Vacuum Cleaner for Pet Hair</span></a><span data-dcnode-id="520" instrument_node=""> and establishing a cleaning routine that covers floors as well as above ground surfaces that pet hair may travel towards. Likewise, seeking </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtohome.com/best-vacuum-cleaner-for-carpets/"><span data-dcnode-id="519" instrument_node="">Best Vacuum Cleaner for Carpets</span></a><span data-dcnode-id="517" instrument_node=""> will help make sure that carpeted surfaces keep clean regardless of whether or not you have pets. You’ll also want to seek out an annual professional cleaning of all carpeted surfaces to pull out deeply imbedded dirt, debris, and to preserve the lifespan of your carpeting.</span></p><h5 data-dcnode-id="513"><b data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Running AC</span></b></h5><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">While we might think of air conditioning solely as a means to cool down the air during warm periods of the year, air conditioning is far more important to your home’s air quality than lowering the temperature. Air conditioning in an HVAC system can ventilate the home: fresh outdoor air is cooled off by the compressor and pumped into the home, while stale air indoors is pumped out to make way for the cooler air.</span></p><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">This recycles your indoor air and ensures your living space is never stale. So even if your home isn’t warm enough to justify running the air conditioning, consider turning yours on at the weakest setting from time to time. This will help you reduce allergens by pumping them back outside before they can mess with your sinuses.</span></p><h5 data-dcnode-id="506"><b data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The Problem of Humidity</span></b></h5><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Humidity is another key factor and corresponds to some extent regarding our last point about air conditioning. Since water is the stuff of life, any space that’s full of humidity and moisture is going to breed bacteria and mold growth. We know this from cleaning out old bathrooms or from discovering mold on our sandwich bread, but we rarely stop to consider how these conditions affect our health.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Overly-humid spaces leave a breeding ground for germs and other insidious organisms to take hold. And while these may not be direct allergens, they will dampen the quality of the airspace in your home. Running your air conditioner or HVAC system usually means turning on the dehumidifier, which will begin to pull the home’s moisture out of the air and release it as water elsewhere.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Some homes have the exact opposite problem, though, and struggle to keep their homes adequately humid. Too arid of a location can dry out sinuses, causing nosebleeds and irritating the lungs. Many HVAC systems built in dry regions come with humidifiers, which can be accessed at the thermostat. If you live in such a climate, you’ll need to check and see if your unit comes with a humidifier, or you might purchase a humidifier for the bedroom and other rooms with lots of traffic.</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Finding the sweet spot of humidity is a bit of a struggle since both extremes can be very damaging to sinuses. Somewhere at or a little below 50% is often cited to be the standard, so if you’re serious about humidity, feel free to bust out the hygrometer and make sure you’re within the sweet spot.</span></p><h5 data-dcnode-id="495"><b data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Air Purifiers</span></b></h5><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Another option to boost in-home air quality is to invest in an air purifier. Air purifiers use thorough filters and are often HEPA-certified to pull airborne contaminants out of your living space. While HVAC systems are often pretty good with handling allergens using a replaceable filter, an air purifier is going to go above and beyond what a central air system can be expected to pull off. Air purifiers are becoming more and more popular as homeowners get serious about their internal air quality. The best air purifiers for allergies focus on simple operation, easy filter maintenance, and optimum efficiency.</span></p><h3 data-dcnode-id="490"><b data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Allergies and HVACs</span></b></h3><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Aside from concessions that will vary home to home, there are actually a number of changes and modifications you can make to your HVAC system to ensure that allergens are sufficiently tackled. While there is no catch-all solution to allergens, a combination of the following adjustments should ensure that you’re putting your best foot forward when it comes to your HVAC system:</span></p><h5 data-dcnode-id="485"><b data-dcnode-id="486" style="font-size: inherit;"><span data-dcnode-id="487" instrument_node="">Filters</span></b></h5><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Adjusting your filters remains the most effective way to combat allergies with your HVAC unit. Depending upon the type of system you have installed and the way it operates, odds are, you’ll be dealing with one of two types of filtration systems: disposable filters or washable filters.</span></p><p data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">Most homeowners are already familiar with the process of swapping out </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtohome.com/" style="font-size: inherit; background-color: #fefefe;"><span data-dcnode-id="481" instrument_node="">disposable filters</span></a><span data-dcnode-id="479" instrument_node="">every few months to ensure that allergens and other debris are caught before they enter the main home’s air supply. Washable filters will need to be rinsed monthly. Disposable filters come with MERV ratings, which reflect the quality of the air filtration on a scale from 1 to 20 (with 1 being the worst and 20 being the best). For most homes, you want to aim for a MERV rating of 6 to 13. Any less, and there’s little need for a filter in the first place. Any more, and you may be blocking up your air supply unnecessarily.</span></p><h5 data-dcnode-id="475"><b data-dcnode-id="476" style="font-size: inherit;"><span data-dcnode-id="477" instrument_node="">UV Lights</span></b></h5><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">UV lights, also known as ultraviolet lights, are lights that release a light at a wavelength that’s deadly to bacteria. In much the same way x-rays can be damaging over time, UV lights are damaging to smaller organisms and will help to kill off bacteria that threatens to fester and pollute your home’s air supply.</span></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">UV lights are an ideal way to curtail bacterial growth in an AC or HVAC unit. These lights can be installed by trained technicians who will often place these lights near your HVAC’s evaporator, which is designed to absorb heat from your home. Some central air systems already come with UV lights or have a place designated for the installation of one, so you may want to check your evaporator to assess your unit’s capabilities.</span></p><h5 data-dcnode-id="468"><b data-dcnode-id="469" style="font-size: inherit;"><span data-dcnode-id="470" instrument_node="">Annual Maintenance</span></b></h5><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">If you’ve worked your way through our tips and tricks above and still find yourself sneezing, there’s a good chance your unit’s efficiency has diminished over time. Ducts may be leaking air, or poor insulation in your home may reduce your unit’s ability to ventilate and filter the air supply. For all HVAC units, and particularly central air systems, annual maintenance will reduce your risk of a total breakdown. HVAC units are designed to last a very long time, but the sheer amount of mechanical parts within them poses a risk of failure that will only increase as the years pass.</span></p><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Common problems, like a loud and clunky compressor or a slow heat pump, need to be addressed quickly. If you cannot recall the last time your system has been checked up on, this may need to be your first consideration when improving efficiency.</span></p><h5 data-dcnode-id="461"><b data-dcnode-id="462" style="font-size: inherit;"><span data-dcnode-id="463" instrument_node="">Portable &amp; Window-Mounted Units</span></b></h5><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">If you find your allergies continue to suffer even after working with a top-of-the-line HVAC system, you may need to consider smaller units. Portable, window-mounted, and multi-split units are less effective at cooling or heating but come with the distinction of working only with a single room or floor. Instead of working to cool, heat, and ventilate rooms where you rarely spend your time, a few window-mounted and portable units can be used to only maintain air quality in the rooms that matter the most.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Generally speaking, a portable unit in a small room will be more efficient and will ventilate more allergens than a central air system in a larger home. So, if allergen-removal is your primary objective, you may want to consider a smaller system. Your results will vary, however, depending upon your location and how often you run your units. Still, for rooms without connection to central air or a room of particular importance to you, it may be worth considering a portable unit to aid in your fight against allergies.</span></p><h5 data-dcnode-id="454"><b data-dcnode-id="455" style="font-size: inherit;"><span data-dcnode-id="456" instrument_node="">Trusted Brands</span></b></h5><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Finally, HVAC systems come in a variety of shapes, sizes, and prices. There are many brands from which to choose, and it can be difficult to know which brands are going to work better than others when it comes to allergies. To reiterate our earlier point: the difference between HVAC brands, much like the difference between central air systems and smaller units, is marginal at best when it comes to allergen removal. Generally speaking, the more efficient and powerful your unit is, the better chance you have to reduce allergies.</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">When it comes to central air systems, brands like Mitsubishi, Goodman, Carrier, and American standard remain top contenders. Maytag and Trane have also made considerable headway against the current reigning champions of HVAC and are definitely worth your attention. If you’ve got your heart set on a smaller unit, like a window-mounted or portable HVAC system, you’ll want to go with companies like Whynter, Honeywell, LG, and BLACK+DECKER. Each of these brands has proven their worth with reliable, highly-efficient units.</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Otherwise, we recommend shopping around and consulting reliable reviews to help you narrow down your search. With each type of HVAC system, there are smaller considerations, like the number of hoses or BTU ratings, that you need to consider before committing. Provided you work to allergen-proof your space using the methods we’ve outlined above, we’re confident that any reliable system from the above brands could serve your allergy needs well.</span></p></div></div></div></div></div></div><div class="test" data-dcnode-id="441" style="display: none;"></div><div class="buyers-guide-section" data-dcnode-id="437"><div class="accordion-buyersmenu hth-inner-review-content bg-list-mainclass" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node=""> </span></div><p data-dcnode-id="438"></p></div><p data-dcnode-id="434"><span data-dcnode-id="436" instrument_node=""> </span></p><div class="accordion-buyersmenu faq-bg-mainclass" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node=""> </span></div><div class="accordion-buyersmenu" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node=""> </span></div><p data-dcnode-id="429"></p></div><div class="buyers-guide-section hth-inner-review-content" data-dcnode-id="422"><h3 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Final Thoughts</span></h3><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">As you can see, there’s no one way to approach the complex issue of allergens and HVAC systems. While we wish we could name one unit or method to solve your allergy problems completely, the hard truth is that you’re going to need to put in the time to determine the best HVAC system and cleaning habits for you. Whether that means purchasing filters with higher MERV ratings, getting your HVAC system checked out, or just vacuuming more, we hope that our guide can lead you to cleaner air and a more tolerable allergy season.</span></p><p data-dcnode-id="423"></p></div><span data-dcnode-id="421" instrument_node=""> </span><div class="hth-nonreview-article-inner-container" data-dcnode-id="320"><span data-dcnode-id="420" instrument_node=""> </span><span data-dcnode-id="418" instrument_node=""> </span><h3 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Further Reading</span></h3><span data-dcnode-id="415" instrument_node=""> </span><div class="row-flex hth-related-post-new" data-dcnode-id="333"><span data-dcnode-id="414" instrument_node=""> </span><div class="cat-description-section" data-dcnode-id="335"><span data-dcnode-id="413" instrument_node=""> </span><div class="col-md-4" data-dcnode-id="387"><span data-dcnode-id="412" instrument_node=""> </span><div class="related-post-imagesection-hth" data-dcnode-id="405"><span data-dcnode-id="411" instrument_node=""> </span><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtohome.com/best-humidifier-allergies/"><span data-dcnode-id="410" instrument_node=""> </span><img alt="best humidifiers for allergies" class="attachment-medium size-medium wp-post-image" data-dcnode-id="409" loading="lazy" sizes="(max-width: 639px) 98vw, (max-width: 1199px) 64vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//735330.smushcdn.com/1314443/wp-content/uploads/2018/11/shutterstock_1015933684-1-300x169.jpg%3Fsize%3D300x300%26lossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://735330.smushcdn.com/1314443/wp-content/uploads/2018/11/shutterstock_1015933684-1-213x120.jpg?lossy=0&amp;strip=1&amp;webp=1 213w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/11/shutterstock_1015933684-1-300x169.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://735330.smushcdn.com/
