</span><div class="col-lg-8 col-12 mx-auto article-body" data-dcnode-id="445"><span data-dcnode-id="586" instrument_node="">
</span><div class="rte article-body" data-dcnode-id="447"><span data-dcnode-id="585" instrument_node="">
</span><article class="text-block" data-dcnode-id="452"><span data-dcnode-id="584" instrument_node="">
</span><div class="m-container-fluid" data-dcnode-id="578"><header data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">
</span><h1 class="h1" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Remove volatile organic compounds from the air with our VOC air purifiers</span></h1><span data-dcnode-id="580" instrument_node="">
</span></header></div><span data-dcnode-id="577" instrument_node="">
</span><img alt="methane gas leaks air purifiers" data-dcnode-id="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0488/2877/6600/files/nuaxzl7bnfjegeapvlnq.jpg&amp;raw"><span data-dcnode-id="575" instrument_node=""> </span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node=""> </span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
</span><h2 data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Methane Gas Leak</span></h2><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">The gas leak at Porter Ranch near Los Angeles in 2015/2016 has renewed attention to a growing problem with aging gas pipes. This issue chronicled in detailed in 2014.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">USA Today Reported “About every other day over the past decade, a gas leak in the United States has destroyed property, hurt someone or killed someone ... The most destructive blasts have killed at least 135 people, injured 600 and caused $2 billion in damages since 2004.”</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">There are several causes of the gas leaks however the key problem is aging metal gas pipes that are rusting and corroding. There are more than 85,000 miles of this piping. Some is more than 100 years old. The majority is located in the Northeast in New York, Boston and Detroit.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The Environmental Defense Fund measured air quality in Staten Island and found an average of one natural gas leak for every mile tested.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="552"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/newshour/updates/california-natural-gas-leak-just-one-of-thousands-across-country/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="555" instrument_node="">PBS reported</span></a><span data-dcnode-id="553" instrument_node="">, “Events of this size are rare, but major leakage across the oil and gas supply chain is not,” Director of Environmental Defense Fund’s California Oil &amp; Gas Program Tim O’Connor said in a statement. “There are plenty of mini-Aliso Canyons that add up to a big climate problem — not just in California, but across the country.”</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">“According to a 2014 </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/url%3Fsa%3Dt%26rct%3Dj%26q%3D%26esrc%3Ds%26source%3Dweb%26cd%3D1%26cad%3Drja%26uact%3D8%26ved%3D0ahUKEwjzva_nvZbTAhVI_4MKHTpJA7IQFggaMAA%26url%3Dhttp%253A%252F%252Fnews.stanford.edu%252Fnews%252F2014%252Ffebruary%252Fmethane-leaky-gas-021314.html%26usg%3DAFQjCNHK3DUP8Mfv95GOUAMiKG0byYgzRw%26sig2%3D1ut4U1g6KlS5HztYuA55VA%26bvm%3Dbv.152174688%2Cd.amc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="549" instrument_node="">Stanford University study</span></a><span data-dcnode-id="547" instrument_node="">, methane emissions may be 50 percent higher than official projections from the U.S. Environmental Protection Agency (EPA). Research published last year also found the technology that EPA and others use to measure emissions may itself be flawed, and the amount of methane leaking into the atmosphere is likely “systematically underestimated.”</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">EPA has developed methane regulations since they state that methane and other greenhouse gases are harmful to people. This is from the production of smog and ozone that are known to create health issues.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">&nbsp;</span></p><span data-dcnode-id="539" instrument_node="">
</span><h2 data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Methane Gas Air Purifiers</span></h2><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">If you have a methane gas leak you will need an advanced air filtration system to effectively remove the gases. HEPA filters are not effective for gas removal as the gases will simply pass through the HEPA filter fibers. </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oransi.com/page/complete-guide-to-activated-carbon"><span data-dcnode-id="534" instrument_node="">Activated carbon</span></a><span data-dcnode-id="532" instrument_node=""> alone is also not very effective. What you need is additional gas phase media to adsorb methane gas.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">We have developed a proprietary filter media to give you a complete solution. This carbon material is used in our </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oransi.com/products/mod-hepa-air-purifier%3Fvariant%3D37157381996725"><span data-dcnode-id="528" instrument_node="">mod HEPA air purifiers</span></a><span data-dcnode-id="526" instrument_node="">&nbsp;and&nbsp;are needed to remove methane, sulfur and other dangerous gases.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">An advantage to our filters is that they have a lot of surface area that is needed for removal but we do this in a way that minimizes the air flow resistance. This gives you more air flow and less noise to cover larger rooms. It also provides more air changes to filter your air more often producing better results.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">&nbsp;</span></p><span data-dcnode-id="518" instrument_node="">
</span><h2 data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Dangers of Methane Gas</span></h2><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">While methane can be considered non-toxic there are serious issues that can result from high concentrations. The first is the risk of explosions. At just a 5% concentration rate, methane can explode when mixed with other gases.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Asphyxiation is a second risk. This is because it replaces oxygen that you need to breathe. Minimum oxygen levels should be at 18% and with the presence methane, oxygen can reach lower, more dangerous levels.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">A third danger is carbon monoxide poisoning. Natural gas is 97% methane. When burned in homes or offices without proper ventilation can result in unsafe levels of carbon monoxide. Symptoms will show up as dizziness, fatigue, nausea, headache and irregular breathing.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">&nbsp;</span></p><span data-dcnode-id="503" instrument_node="">
</span><h2 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Natural Gas</span></h2><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Natural gas is a fossil fuel that is made of mostly methane. It is formed from decomposed plant and animal matter. Natural gas is used as fuel source for heating, cooking, automobiles and has many other applications.</span></p><span data-dcnode-id="497" instrument_node="">
</span><h2 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Sewer Gas</span></h2><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Sewer gas is a combination of toxic and nontoxic gases that are generated from sewage. Sewer gases often include common elements of what we naturally find in the air but also other gases like methane.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Most often sewer gases have an annoying odor and in some cases present health issues or the potential for explosions.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Hydrogen sulfide is primarily what you are smelling when there is a rotten egg smell. Symptoms show up as eye irritation, sore throat, and shortness of breath fatigue, pneumonia, headaches and dizziness. At very high concentrations, you will be very fatigued and can result in death.</span></p><span data-dcnode-id="485" instrument_node="">
