</span><div class="post" data-dcnode-id="1403"><span data-dcnode-id="1408" instrument_node="">
</span><h1 data-dcnode-id="1405"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/how-much-does-a-dust-collector-cost/" rel="bookmark" title="How Much Does a Dust Collector Cost?"><span data-dcnode-id="1407" instrument_node="">How Much Does a Dust Collector Cost?</span></a></h1><span data-dcnode-id="1404" instrument_node="">
</span></div><span data-dcnode-id="1402" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1389"><span data-dcnode-id="1401" instrument_node="">Posted by </span><span data-dcnode-id="1399" instrument_node=""> </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/" rel="author external" title="Visit Nicole Donnelly’s website"><span data-dcnode-id="1398" instrument_node="">Nicole Donnelly</span></a><span data-dcnode-id="1396" instrument_node=""> on </span><time data-dcnode-id="1394" datetime="2021-04-29" pubdate=""><span data-dcnode-id="1395" instrument_node="">April 29, 2021 </span></time><span data-dcnode-id="1393" instrument_node=""> | </span><a data-dcnode-id="1391" href="#comments"><span data-dcnode-id="1392" instrument_node="">4 Comments</span></a><span data-dcnode-id="1390" instrument_node=""> </span></div><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1371"><em data-dcnode-id="1372"><span data-dcnode-id="1387" instrument_node="">Summary: Small dust collectors for applications up to 1,000 CFM airflow cost between&nbsp;</span><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">$100 up to $5,000 USD.&nbsp;</span></strong><span data-dcnode-id="1384" instrument_node="">&nbsp;Pre-fab </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/industrial-dust-collection-system-design-considerations/"><span data-dcnode-id="1383" instrument_node="">dust collection systems</span></a><span data-dcnode-id="1381" instrument_node=""> such as a bin vent or cartridge type collector cost between&nbsp;</span><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">$10,000 and $80,000 USD. </span></strong><span data-dcnode-id="1378" instrument_node="">Pre-fab units accommodate&nbsp;airflow volumes between 2,000 and 10,000 CFM. Custom </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/baghouse-dust-collector-faq/"><span data-dcnode-id="1377" instrument_node="">baghouse dust collectors</span></a><span data-dcnode-id="1375" instrument_node=""> or multiple module bin vents and cartridge collectors range between </span><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">$50,000 to $1 million USD and more.</span></strong></em></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1367"><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/how-much-does-a-dust-collector-cost" rel="noopener" target="_blank"><span data-dcnode-id="1369" instrument_node="">Watch Video: How Much Does a Dust Collector Cost?</span></a></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1361"><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/how-much-does-a-dust-collector-cost" rel="noopener" target="_blank"><img alt=" How Much Does a Dust Collector Cost" class="alignnone wp-image-4713 size-medium entered lazyloaded" data-dcnode-id="1365" data-lazy-sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" data-lazy-src="https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png" data-lazy-srcset="https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png 500w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-1024x576.png 1024w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-768x432.png 768w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost.png 1280w" data-ll-status="loaded" height="281" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png&amp;raw" srcset="https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png 500w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-1024x576.png 1024w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-768x432.png 768w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost.png 1280w" width="500"><noscript data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">&lt;img class="alignnone wp-image-4713 size-medium" src="https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png" alt=" How Much Does a Dust Collector Cost" width="500" height="281" srcset="https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-500x281.png 500w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-1024x576.png 1024w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost-768x432.png 768w, https://www.usairfiltration.com/wp-content/uploads/YouTube-Thumbnail-How-Much-Does-a-DC-Cost.png 1280w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" /&gt;</span></noscript></a></p><span data-dcnode-id="1360" instrument_node="">

</span><h3 data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">What is a Dust Collector?</span></h3><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node="">Dry dust collection systems remove airborne dust that generate during manufacturing or industrial processing.&nbsp; Examples include woodworking, bulk powder processing, or food production.&nbsp; </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/industrial-dust-collection-system-design-considerations/" rel="noopener" target="_blank"><span data-dcnode-id="1326" instrument_node="">Dust collectors</span></a><span data-dcnode-id="1324" instrument_node=""> range from small portable units to extensive custom turnkey systems.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><h2 data-dcnode-id="1317"><em data-dcnode-id="1318"><img alt="wen-dust-collectors-air-filtration-3403-64_1000" class="alignright" data-dcnode-id="1321" data-lazy-src="https://images.homedepot-static.com/productImages/3f157211-0c78-496a-bc6e-dd3de2846a4e/svn/wen-dust-collectors-air-filtration-3403-64_1000.jpg" height="149" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20149%20149'%3E%3C/svg%3E" title="wen-dust-collectors-air-filtration-3403-64_1000" width="149"><noscript data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">&lt;img class="alignright" title="wen-dust-collectors-air-filtration-3403-64_1000" src="https://images.homedepot-static.com/productImages/3f157211-0c78-496a-bc6e-dd3de2846a4e/svn/wen-dust-collectors-air-filtration-3403-64_1000.jpg" alt="wen-dust-collectors-air-filtration-3403-64_1000" width="149" height="149" /&gt;</span></noscript></em></h2><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1313" instrument_node="">
</span><h3 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Dust Collector Cost</span></h3><span data-dcnode-id="1310" instrument_node="">
</span><h4 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Small Dust Collector Cost</span></h4><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1306" instrument_node="">A small dust collector that is able to handle up to 750 or 1,000 cubic feet per minute (CFM) of </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/air-to-cloth-ratio" rel="noopener" target="_blank"><span data-dcnode-id="1305" instrument_node="">airflow</span></a><span data-dcnode-id="1303" instrument_node="">&nbsp;can cost between&nbsp;</span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">$100 up to $5,000</span></strong><span data-dcnode-id="1300" instrument_node="">.&nbsp; These small retail units are ideal for ventilating two to three pieces of equipment (i.e. saw, sander, planer) for a small woodworking or metalworking shop.&nbsp; Small units must be set up extremely close to the collection point. This reduces static pressure and fan size.&nbsp; You can find these units at an online retailer or home improvement store.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><h4 data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Large Dust Collector Cost</span></h4><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Larger dust collection systems are needed to ventilate large scale processing equipment. These industrial dust collectors are found in some of the following commercial applications:</span></p><span data-dcnode-id="1292" instrument_node="">
</span><ul data-dcnode-id="1262"><span data-dcnode-id="1291" instrument_node="">
</span><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">School woodshops</span></li><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Metalworking facilities</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Sandblasting</span></li><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Chemical processing</span></li><span data-dcnode-id="1279" instrument_node="">
</span><li data-dcnode-id="1276"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.usairfiltration.com/blog/dust-collectors-filters-for-food-manufacturing" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1278" instrument_node="">Food processing</span></a></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Cement production</span></li><span data-dcnode-id="1272" instrument_node="">
</span><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Energy production</span></li><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Mining</span></li><span data-dcnode-id="1266" instrument_node="">
</span><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Foundries, and many others.</span></li><span data-dcnode-id="1263" instrument_node="">
</span></ul><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1260" instrument_node="">Large dust collectors are designed to handle a much larger dust loads, meet higher airflow, or specific temperature requirements.&nbsp; Pre-fabricated dust collection systems like a </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/dust-collectors/bin-vents-dust-collectors/" rel="noopener" target="_blank"><span data-dcnode-id="1259" instrument_node="">bin vent</span></a><span data-dcnode-id="1257" instrument_node=""> or cartridge dust collector can handle airflow volumes between 2,000 and 10,000 cubic feet per minute (CFM).&nbsp; Depending on the size of the unit, filter media, and the fan size, units can range between </span><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">$10,000 – $80,000 USD.</span></strong></p><span data-dcnode-id="1253" instrument_node="">
</span><h4 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Custom Dust Collector Cost</span></h4><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1249" instrument_node="">Custom turnkey, dust collection systems that require complete engineering can range between </span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">$50,000 – $1 million USD or more</span></strong><span data-dcnode-id="1246" instrument_node="">. These systems can include one more </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/baghouse-faq/" rel="noopener" target="_blank"><span data-dcnode-id="1245" instrument_node="">pulse jet baghouses</span></a><span data-dcnode-id="1243" instrument_node="">, multiple modular bin vents, or several </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/dust-collectors/cartridge-dust-collectors/" rel="noopener" target="_blank"><span data-dcnode-id="1242" instrument_node="">cartridge collectors</span></a><span data-dcnode-id="1240" instrument_node="">.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><h3 data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">What Goes into the Price of your Dust Collector</span></h3><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The price of your dust collection system is also determined by several variables outlined below.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><h4 data-dcnode-id="1226"><strong data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">Dust Load</span><img alt="USAF CleanFlo Collector" class="alignright wp-image-3470" data-dcnode-id="1230" data-lazy-sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" data-lazy-src="//www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in.jpg" data-lazy-srcset="https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in.jpg 5760w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-500x281.jpg 500w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-768x432.jpg 768w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-1024x576.jpg 1024w" height="237" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20420%20237'%3E%3C/svg%3E" title="USAF CleanFlo Collector" width="420"><noscript data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">&lt;img class="alignright wp-image-3470" title="USAF CleanFlo Collector" src="//www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in.jpg" alt="USAF CleanFlo Collector" width="420" height="237" srcset="https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in.jpg 5760w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-500x281.jpg 500w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-768x432.jpg 768w, https://www.usairfiltration.com/wp-content/uploads/Copy-of-Scene-05-fr-124-PRINT-19inx11in-1024x576.jpg 1024w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" /&gt;</span></noscript></strong></h4><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">Dust load is the amount or volume of </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/baghouse-dust-removal-options/" rel="noopener" target="_blank"><span data-dcnode-id="1223" instrument_node="">dust in your work environment that must be cleared</span></a><span data-dcnode-id="1221" instrument_node=""> within a given time period.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Applications with higher dust loads require more filter media to remove airborne dust particulate.&nbsp; This means you’ll need a dust collector with a larger footprint. This can drive up the overall cost of your dust collection system.&nbsp; Applications that generate less than one or two 55 gallon drums of dust per day are usually good candidates for a small cartridge collector or bin vent.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><h3 data-dcnode-id="1212"></h3><span data-dcnode-id="1211" instrument_node="">
</span><h4 data-dcnode-id="1208"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Type of Dust</span></strong></h4><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">The </span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/understanding-dust-properties" rel="noopener" target="_blank"><span data-dcnode-id="1205" instrument_node="">properties of your dust particulate</span></a><span data-dcnode-id="1203" instrument_node=""> play an important role in the following:</span></p><span data-dcnode-id="1201" instrument_node="">
</span><ul data-dcnode-id="1175"><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Size of your system</span></li><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Number of filters</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Type of filter media</span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Filter treatments your application will need.</span></li><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Air to Cloth Ratio</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Fan Size</span></li><span data-dcnode-id="1182" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Temperature</span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Material Handling and Conveying</span></li><span data-dcnode-id="1176" instrument_node="">
</span></ul><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">To understand the characteristics of your dust particulate, you can ask yourself the following questions.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><h4 data-dcnode-id="1168"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Product</span></strong></h4><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">What is being filtered?&nbsp; Does your product contain moisture or oil?&nbsp; Products with moisture content greater than 25% are not suited for a dry dust collection system. Products containing hydrocarbons, including oils, may require the application of a special treatment to get optimal filtration.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><h4 data-dcnode-id="1161"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Chemistry</span></strong></h4><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Does your airstream or dust contain chemicals that could damage filter media?&nbsp; Are there also acids or alkaline in the airstream?&nbsp; When certain compounds are combined during processing, a chemical reaction can occur. This may require additional media treatment or coating to protect the filter bags from accelerated wear.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><h4 data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Abrasion</span></strong></h4><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">How abrasive is the dust that’s being filtered?&nbsp; Consider the hardness of the material along with the shape of the dust.&nbsp; The velocity of your airflow can also make your dust more abrasive.&nbsp; Highly abrasive dust may require your housing be fabricated in stainless steel, titanium or other costly materials that are able to withstand long term wear.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><h4 data-dcnode-id="1147"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Particle Size</span></strong></h4><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">What is the size of the dust particulate are you collecting? Depending on your emissions requirements, your application may require a special membrane. This would apply if your particulate is very fine.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><h4 data-dcnode-id="1140"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Is your dust&nbsp;combustible?</span></strong></h4><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/what-is-combustible-dust/" rel="noopener" target="_blank"><span data-dcnode-id="1138" instrument_node="">Combustible dust</span></a><span data-dcnode-id="1136" instrument_node=""> can be defined as any fine material that has the ability to catch fire and explode when mixed with the proper concentration of air.&nbsp; Examples of combustible dust include:</span></p><span data-dcnode-id="1134" instrument_node="">
</span><ul data-dcnode-id="1114"><span data-dcnode-id="1133" instrument_node="">
</span><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Wood</span></li><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Food products such as grain, sugar, flour, starch, metals</span></li><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Rubber</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Chemicals</span></li><span data-dcnode-id="1121" instrument_node="">
</span><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Pesticides</span></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Plastics, and more.</span></li><span data-dcnode-id="1115" instrument_node="">
</span></ul><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">OSHA and NFPA have created guidelines to protect your plant and employees from the risks of a serious explosion.&nbsp; Also, be sure to review your state and local regulations for proper identification and management of combustible dust.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">Applications filtering combustible dust will also need an </span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/explosion-venting-strategies-for-your-dust-collection-system/" rel="noopener" target="_blank"><span data-dcnode-id="1108" instrument_node="">explosion venting strategy</span></a><span data-dcnode-id="1106" instrument_node="">. Explosion vents or Brixton latches are two common strategies that help reduce this risk. You may also need explosion isolation valves in the dust collection line. This helps prevent a deflagration from travelling back to the equipment should an event occurs inside the dust collector.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1101"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Dust Collector Filter Media</span></strong></h3><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">The </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/baghouse-filter-bags-media" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1098" instrument_node="">type of&nbsp;filter media&nbsp;you choose</span></a><span data-dcnode-id="1096" instrument_node=""> impacts your system startup and long term maintenance costs. Polyester filter media is an ideal for applications with temperatures below 250°.&nbsp; Polyester is affordable, highly efficient and readily available.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">Other&nbsp;</span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.hubspot.net/hubfs/5230475/White%2520Papers/Fabric%2520Characteristics%2520Chart.pdf" onclick="LogClick(this);" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1089" instrument_node="">common filter medias</span></a><span data-dcnode-id="1087" instrument_node=""> include Aramid (Nomex©), Fiberglass, PPS, P84 and Teflon.&nbsp; You can add treatments to&nbsp; filter media to enhance it’s efficiency and performance. Treatment for your filter is dependent on your dust characteristics.&nbsp; In addition, treatments can drive up the cost of your filter bags but also extend it’s life, reduce changeout’s and drive down long term maintenance costs.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1081"><img alt="Cartridge Dust Collector" class="alignright wp-image-3342" data-dcnode-id="1084" data-lazy-sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" data-lazy-src="//www.usairfiltration.com/wp-content/uploads/your-success-our-sucess.jpg" data-lazy-srcset="https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess.jpg 796w, https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess-500x356.jpg 500w, https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess-768x546.jpg 768w" height="349" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20491%20349'%3E%3C/svg%3E" title="Cartridge Dust Collector" width="491"><noscript data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">&lt;img class="alignright wp-image-3342" title="Cartridge Dust Collector" src="//www.usairfiltration.com/wp-content/uploads/your-success-our-sucess.jpg" alt="Cartridge Dust Collector" width="491" height="349" srcset="https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess.jpg 796w, https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess-500x356.jpg 500w, https://www.usairfiltration.com/wp-content/uploads/your-success-our-sucess-768x546.jpg 768w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" /&gt;</span></noscript></p><span data-dcnode-id="1080" instrument_node="">
</span><h3 data-dcnode-id="1077"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Air to Cloth Ratio</span></strong></h3><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1072"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/air-to-cloth-ratio" rel="noopener" target="_blank"><span data-dcnode-id="1075" instrument_node="">Air to cloth ratio</span></a><span data-dcnode-id="1073" instrument_node="">, also known as air to media ratio, is a measurement of the amount of cubic feet per minute of air passing through one square foot of filter media.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">You can calculate air to cloth ratio based on the size and type of dust particulate you are filtering. It’s an important element in the design and size of your dust collection system.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">Generally, the lower your </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.hubspot.net/hubfs/5230475/Air%2520to%2520Media%2520Guide_1.2%2520copy.pdf" onclick="LogClick(this);" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1060" instrument_node="">air to cloth</span></a><span data-dcnode-id="1058" instrument_node=""> ratio, the better your system is at removing dust from the work environment.&nbsp; However, if your air to cloth ratio is too low it can place unnecessary strain on your dust collector.&nbsp; Systems that operate at a higher air to cloth ratio have a smaller footprint, size, and price than dust collectors operating at a lower air to cloth ratio.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><h3 data-dcnode-id="1053"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Fan Size</span></strong></h3><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">Your dust load, CFM requirements, and static pressure measurements will determine the size of the fan that will pull dust through the system and turn the air.&nbsp; Your dust collector’s location is relative to the work environment being ventilated and also impacts the size of your fan.&nbsp; Systems installed close to the work environment can reduce the length of ducting and static pressure. As a result, a smaller fan may be required. The cost of a </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.usairfiltration.com/guide-to-fan-sizing" rel="noopener" target="_blank"><span data-dcnode-id="1050" instrument_node="">fan</span></a><span data-dcnode-id="1048" instrument_node=""> can vary depending on each of these factors.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1043"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Temperature</span></strong></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Applications operating above 250 degrees Fahrenheit may require more expensive filter media. These applications would need their filter to withstand long term exposure to high temperatures.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><h3 data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Material Handling &amp; Conveying</span></strong></h3><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Once your dust particulate has moved through your dust collection system and lands in the hopper, you’ll need to determine how to properly remove the dust. This ensures it doesn’t return into the airstream and plug up your system.&nbsp; Drums are the most economical option. They perform well when handling waste material with light inlet dust loading.&nbsp; Light inlet dust loading applies if you generate, at most, a one or two 55 gallon drum of dust per day.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Applications with higher dust loading requirements or those filtering non waste product, need an advanced system to convey material. This helps prevent the drum from overfilling, which can cause dust to back up or return into the hopper.&nbsp; This can also result in a processing issue that will impact your dust collector’s performance.&nbsp; In these situations you may need to upgrade from a drum to a larger dumpster, rotary or dump valve.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><h4 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Rotary Valves</span></h4><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1017"><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/rotary-valve/" rel="noopener" target="_blank"><span data-dcnode-id="1022" instrument_node="">Rotary valves</span></a><span data-dcnode-id="1020" instrument_node=""> seal the bottom of your collector. They help prevent outside air from entering the system while allowing material to be continuously emptied from the hopper.&nbsp; The cost to add a rotary valve to your dust collection system can vary between </span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">$3,000 and $5,000 USD.&nbsp;&nbsp;</span></strong></p><span data-dcnode-id="1016" instrument_node="">
</span><h4 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Pneumatic Conveying</span></h4><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Larger applications may also require a vacuum pneumatic conveying system. Their purpose is to vacuum material from the dust collector discharge to a common point.&nbsp; For example, an application with five baghouses may include a common vacuum conveying system. It would help pull discharge material from all five baghouses to one common dust collector discharge area.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h3 data-dcnode-id="1007"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Paints, Coatings&nbsp;</span></strong></h3><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Applications with high moisture levels or chemical resistance may require an upgrade to epoxy paint. It can be applied to the interior and exterior of the dust collector. This helps to reduce long term wear of the system. Facilities located near an ocean, lake, or those that process caustic chemicals would use epoxy paint.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><h3 data-dcnode-id="1000"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Unit Insulation</span></strong></h3><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Insulation may also be required if you’re airstream temperature is high and must remain above the dew point in gas form. This eliminates the risk of moisture and condensation. Airflows with high moisture content can cause performance issues with your filter bags. This can include plugging of the system and inefficient filtration. Applications requiring insulation include ventilation of exhaust air coming off boilers, burners during metal forming, and similar processes.</span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="993"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Electric Controls or Accessories</span></strong></h3><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Most baghouses, cartridge collectors, and bin vents come standard with an electrical control panel. This powers your </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D15wtH87_p6I%26t%3D89s" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="990" instrument_node="">pulse cleaning system</span></a><span data-dcnode-id="988" instrument_node=""> and your fan separately.&nbsp; Most experts recommend to integrate your control panel into a starter panel. This powers your pulse cleaning and fan at the same time.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&nbsp;</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Installation of starter panels can be done at any desired location in your plant regardless of the distance to the dust collection system. Starter panels protect your system from surges or motor damage.&nbsp; While the addition of a starter panel can add to the initial cost of your system, the ease and added safety it offers make up for startup costs.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="976"><img alt="Dust Collection Design Considerations 3" class="aligncenter wp-image-4249 size-medium" data-dcnode-id="979" data-lazy-sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" data-lazy-src="https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-500x433.png" data-lazy-srcset="https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-500x433.png 500w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-1024x887.png 1024w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-768x665.png 768w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM.png 1106w" height="433" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20433'%3E%3C/svg%3E" title="Dust Collection Design Considerations 3" width="500"><noscript data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">&lt;img class="aligncenter wp-image-4249 size-medium" title="Dust Collection Design Considerations 3" src="https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-500x433.png" alt="Dust Collection Design Considerations 3" width="500" height="433" srcset="https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-500x433.png 500w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-1024x887.png 1024w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM-768x665.png 768w, https://www.usairfiltration.com/wp-content/uploads/Screen-Shot-2020-10-13-at-4.47.14-PM.png 1106w" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px" /&gt;</span></noscript></p><span data-dcnode-id="975" instrument_node="">
</span><h3 data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Is an OEM Dust Collector like Torit Right For Me?</span></h3><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">We recently took a survey asking customers their attitude and preference towards OEM vs. aftermarket dust collection products. Here’s what we learned:</span></p><span data-dcnode-id="969" instrument_node="">
</span><ul data-dcnode-id="952"><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">15% of buyers prefer OEM dust collector parts and equipment exclusively</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">85% of buyers like the option to purchase OEM or aftermarket dust collector parts and equipment</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">65% of buyers who purchase aftermarket said they get the same performance as an OEM at a more affordable price and/or don’t care about having brand name components.</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Another 50% prefer aftermarket products because they are more affordable</span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Of the 15% of buyers who only purchase OEM,&nbsp; the most popular reason for choosing OEM is because they believe they can be trusted to perform long term (33%).</span></li><span data-dcnode-id="953" instrument_node="">
</span></ul><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="950" instrument_node="">If budget is not a factor for you and you are willing to pay more for OEM then this may be the right solution for you.&nbsp; However if you are looking to get the same long term performance from a </span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/dust-collectors/dust-collection-systems/"><span data-dcnode-id="949" instrument_node="">dust collection system</span></a><span data-dcnode-id="947" instrument_node=""> as an OEM and don’t want to pay a higher price for a brand name, then a U.S. Air Filtration </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usairfiltration.com/dust-collectors/dust-collection-systems/"><span data-dcnode-id="946" instrument_node="">system</span></a><span data-dcnode-id="944" instrument_node=""> may be a fit.</span></p><span data-dcnode-id="942" instrument_node="">
</span><h3 data-dcnode-id="939"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Summary of Dust Collector Cost</span></strong></h3><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Selecting and pricing out a dust collection system involves consideration of each variable above.&nbsp; Understanding each of these variables is critical to ensuring your dust collector performs efficiently for many years to come while also creating a clean and safe work environment. Each dust collection application is unique so it is possible that applications with very similar product characteristics or volume may require a system that is different in price and size.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&nbsp;</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">To ensure a successful solution, consult with a dust collection engineering and manufacturing company with extensive design and manufacturing experience.&nbsp; An experienced dust collection engineering firm can help you engineer a system customized to your unique application requirements.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">&nbsp;</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">If you have any questions unique to your application, give us a call at 888-221-0312. You can also email </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mail.google.com/mail/%3Fview%3Dcm%26fs%3D1%26tf%3D1%26to%3Dinfo%40usairfiltration.com" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="924" instrument_node="">info@usairfiltration.com</span></a><span data-dcnode-id="922" instrument_node="">. In addition, below are some related videos and resources that may help.</span></p><span data-dcnode-id="920" instrument_node="">
</span><h3 data-dcnode-id="917"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Dust Collection Resources</span></strong></h3><span data-dcnode-id="916" instrument_node="">
</span><ul data-dcnode-id="866"><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="911"><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DdqlG8sqi9A4%26t%3D20s" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="914" instrument_node="">Guide to Differential Pressure </span></a><span data-dcnode-id="912" instrument_node="">{Video}</span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="906"><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dyv03nfFral0" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="909" instrument_node="">CleanFlo Cartridge Collector Product Demo</span></a><span data-dcnode-id="907" instrument_node="">&nbsp;{Video}</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="902"><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.hubspot.net/hubfs/5230475/Equipment%2520Brochure.pdf" onclick="LogClick(this);" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="904" instrument_node="">USAF Dust Collector Brochure</span></a></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="898"><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.hubspot.net/hubfs/5230475/Applications%2520for%2520Cartridge%2520Collectors-1.pdf" onclick="LogClick(this);" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="900" instrument_node="">Applications for Cartridge Collectors</span></a></li><span data-dcnode-id="897" instrument_node="">
