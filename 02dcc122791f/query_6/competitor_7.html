ensor is.. It also does not define Ion mode. The buttons are okay for now (scared of how they will be for the long run).Overall, if someone wants to breathe cleaner air, suffering allergies, smoke and\/or have pets. I'd recommend trying to product out.\n\n&quot;,&quot;image_urls&quot;:[&quot;https:\/\/images-na.ssl-images-amazon.com\/images\/I\/81k55FibIpL.jpg&quot;],&quot;show_image&quot;:true,&quot;star_rating&quot;:4,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-03-15 00:53:10+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;TheLAW_TheCHIEF &quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;image_urls_optimised&quot;:[&quot;https:\/\/opinew.imgix.net\/https%3A%2F%2Fimages-na.ssl-images-amazon.com%2Fimages%2FI%2F81k55FibIpL.jpg?fit=max\u0026h=450\u0026orient=0\u0026s=e8f6c69106472ea99270a75dd78989f3&quot;],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;}],&quot;custom_fields&quot;:[],&quot;variants&quot;:[{&quot;id&quot;:42115539,&quot;name&quot;:&quot;White&quot;}]},&quot;reviews&quot;:{&quot;recent&quot;:[{&quot;id&quot;:10303183,&quot;body&quot;:&quot;We bought this air cleaner to replace our old one that we had for 10 years. We really just needed the background noise for sleeping. I am impressed with the quality of this air cleaner and all the bells and whistles that come with it for such an affordable price. I figured I was buying a noise maker and wound up with an air cleaner that really does the job of cleaning the air. Shipping takes a while due to Covid and the holidays but if you can wait a couple of weeks to get a new air cleaner it's worth the wait. &quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5, eceiving many questions from Kiki and her team but no promise of assistance, I expected to walk away from this air purifier $159 poorer and a defective product.  However, to my eternal delight and gratitude, Kiki emailed me, apologized for the questions she needed to ask, and offered to replace the entire unit at no cost to me whatsoever.  Therefore, I would recommend this product to anyone who needs an air purifier because it is a good one, and even more important than that, Kiki and her team stand behind this air purifier and deliver top-notch customer satisfaction.  Since then I have received another email from Kiki and her team announcing that my new air purifier will be arriving within 5-8 business days!!!  \n\nThank you Kiki!!&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:false,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-11-26 22:28:00.765756+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;Lynn E.&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:10014782,&quot;body&quot;:&quot;I ordered this last August and finally opened it and started using it. I like it. It is attractive. On the low speed it is really quiet, and on the medium speed it is acceptably quiet. I was using another brand so far, and it was noisy making it difficult to sleep at night. This has solved that problem.  Everything works well and it seems to be energy efficient&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-11-03 21:40:41.680376+00:00&quot  can not wait to see how it would work during the summer.I was scared when I tried to open the back panel. The panel was hard to take out and is needed to access the filter (its new and is in plastic wrap). You will have to pull really hard (don't be scared to break it). The user manual is not detailed enough. I don't know where the dust sensor is.. It also does not define Ion mode. The buttons are okay for now (scared of how they will be for the long run).Overall, if someone wants to breathe cleaner air, suffering allergies, smoke and\/or have pets. I'd recommend trying to product out.\n\n&quot;,&quot;image_urls&quot;:[&quot;https:\/\/images-na.ssl-images-amazon.com\/images\/I\/81k55FibIpL.jpg&quot;],&quot;show_image&quot;:true,&quot;star_rating&quot;:4,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-03-15 00:53:10+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;TheLAW_TheCHIEF &quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;image_urls_optimised&quot;:[&quot;https:\/\/opinew.imgix.net\/https%3A%2F%2Fimages-na.ssl-images-amazon.com%2Fimages%2FI%2F81k55FibIpL.jpg?fit=max\u0026h=450\u0026orient=0\u0026s=e8f6c69106472ea99270a75dd78989f3&quot;],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;}],&quot;smart&quot;:[{&quot;id&quot;:9984066,&quot;body&quot;:&quot;Great air purifier, lots of features for the price. We have this weird white dust in our house especially during the winter months which since using this purifier has decreased significantly. Breathing quality is much better and our baby doesn\u2019t wake up in the middle of the night with  a stuffy nose anymore. Runs quietly, we use the auto mode which adjusts the fan speed by sensing air quality. Well worth it!&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-10-29 01:18:26.086535+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;Jason&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:9900152,&quot;body&quot;:&quot;This filter works great.  An outstanding set of features for a very fair price.  I particularly like the automatic fan setting which increases air flow\/filtering when the on-board air-quality feature detects poor air quality in the room.  I run it my in my bedroom and it's really quiet.  Filter is easy to remove and lightly clean with my vacuum.  Overall, I am very pleased and plan to purchase several more for the house.&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-10-12 18:12:03.900319+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;Greg&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:10303183,&quot;body&quot;:&quot;We bought this air cleaner to replace our old one that we had for 10 years. We really just needed the background noise for sleeping. I am impressed with the quality of this air cleaner and all the bells and whistles that come with it for such an affordable price. I figured I was buying a noise maker and wound up with an air cleaner that really does the job of cleaning the air. Shipping takes a while due to Covid and the holidays but if you can wait a couple of weeks to get a new air cleaner it's worth the wait. &quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:false,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-12-19 11:26:22.073196+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;Scott&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:10014782,&quot;body&quot;:&quot;I ordered this last August and finally opened it and started using it. I like it. It is attractive. On the low speed it is really quiet, and on the medium speed it is acceptably quiet. I was using another brand so far, and it was noisy making it difficult to sleep at night. This has solved that problem.  Everything works well and it seems to be energy efficient&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-11-03 21:40:41.680376+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;upmanu l.&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:9134958,&quot;body&quot;:&quot;\n\n  I really love this air purifier. I keep it in my office and it works great - I have tested blowing smoke into it, and the purifier light immediately goes red to indicate low air quality. It is very responsive. The timer is extremely convenient - I just put it on 8 hours to get me through the work day! Filter has lasted at least 7 months which is great with daily use!\n\n&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2021-05-21 00:31:03+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;Customer&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13 Air Purifier for Home, Home Air Cleaner Filtration System&quot;,&quot;product_url&quot;:&quot;https:\/\/taotronics-shop.myshopify.com\/products\/tt-ap002-hepa-h13-air-purifier&quot;},{&quot;id&quot;:9135177,&quot;body&quot;:&quot;\n\n  I got this filter when I first started using the fireplace in my apartment, the wet wood I was using created tons of smoke so I did some research and bought this on sale.  It clears up smoke and pet dust amazingly well and stays quiet while doing so.  The air quality light actually works and reflects when I start up a fire.  The little carry handle is actually pretty useful for moving between rooms.  It has helped my girlfriend's allergies and doesn't disturb sleep.  Highly recommend.\n\n&quot;,&quot;image_urls&quot;:[],&quot;show_image&quot;:true,&quot;star_rating&quot;:5,&quot;verified_review&quot;:true,&quot;by_shop_owner&quot;:false,&quot;created_ts&quot;:&quot;2020-12-27 00:31:37+00:00&quot;,&quot;video&quot;:null,&quot;user_name&quot;:&quot;John&quot;,&quot;user_image_url&quot;:null,&quot;comment&quot;:null,&quot;resolved_message&quot;:null,&quot;custom_fields&quot;:[],&quot;product_name&quot;:&quot;HEPA H13
