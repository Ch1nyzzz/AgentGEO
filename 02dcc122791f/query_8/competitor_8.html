</span><p data-dcnode-id="2753"><span data-dcnode-id="2757" instrument_node=""> </span><span data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">The Honeywell InSight™ HPA5250BC HEPA Air Purifier for Large-Extra Large 361 Sq. Ft. (33.5 Sq. M) Room, Allergen Remover, with New InSight™ Display at-a-glance panel, captures 99.97% of microscopic particles. The Honeywell Doctor’s Choice InSight™ Series Air Purifier delivers powerful HEPA filtration and features a cutting-edge design that displays device setting information from a distance. easy to understand colour-coded feedback on the clear InSight™ Display Panel. The Air Quality indicator light displays at-a-glance the quality of your indoor air and automatically adjusts the speed to quickly clean the air. Honeywell air purifiers are the #1 brand recommended by allergists (1). The HPA5250’s effective design and filtration can circulate and clean the air an amazing up to 120x a day in a 361 square foot room (2). The Certified HEPA filters effectively capture up to 99.97% of microscopic allergens as small as 0.3 microns, from the air that passes through the filter. In addition, the carbon activated pre-filter helps trap larger particles and helps reduce odours and VOCs (volatile organic compounds). (1) Based on March 2018 USA Cascade Survey Research results reporting 48 out of 70 (69%) surveyed Allergists that recommend a brand of portable air purifiers to their patients, recommend "Honeywell" air purifiers as their first choice. (2) Based on 3rd party Independent CADR testing.</span></span><span data-dcnode-id="2754" instrument_node=""> </span></p><span data-dcnode-id="2752" instrument_node=""> </span></div><span data-dcnode-id="2750" instrument_node=""> </span><span data-dcnode-id="2747" instrument_node="">

</span><span data-dcnode-id="1060"><span data-dcnode-id="1070" instrument_node="">
  This unit is very well designed. It works great, and the auto mode is nice for automatically adjusting the fan speed based on how clean the air is. This unit uses filters that have been around for a long time, and that are so common, they are available from other manufactures - we'll be sticking with the Honeywell brand though, because it seems many of the other 'copy' filters aren't the best quality.</span><br data-dcnode-id="1069"><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">This unit is acceptably quiet on the lower settings, and it has a max ('turbo') setting to quickly clear the air in a room. The controls and display are super easy to use and understand, and it indicates the current quality of the air by a colour indicator.</span><br data-dcnode-id="1066"><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">Overall, this is one of the best quality air purifiers I've had (over many decades of having different ones). I've had many Bionaire air purifiers over the years, but the last 10 years or so, the quality of Bionaire has drastically decreased, those are now very noisy, poorly designed, don't move much air compared to others, etc; I have a couple old Bionaires that still run perfectly and make the new models look like cheap junk. I won't be buying Bionaire anymore (and I do have one recent model that is almost useless), and Honeywell has definitely won my vote and will be what I purchase from now on.</span><br data-dcnode-id="1063"><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">I'd highly recommend this particular unit - it comes in a smaller, and larger size as well - same filters, they just use 1, 2 or 3 filters depending on the model (this one uses 2). This one is rated and perfect for a large bedroom (an average bedroom you can get the small version) or an average living room or recreation room - for multiple open concept rooms, this one may work, or the larger one. I'd say the coverage area ratings of this unit are not exaggerated, go by that.
