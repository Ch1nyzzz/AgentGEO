</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="2887" id="mntl-sc-block_1-0"><span data-dcnode-id="2900" instrument_node="">
Not all of us can get (or want) a </span><a data-component="link" data-dcnode-id="2898" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/hypoallergenic-dog-breeds-1118133"><span data-dcnode-id="2899" instrument_node="">hypoallergenic dog breed</span></a><span data-dcnode-id="2897" instrument_node="">, even when we are prone to pet allergies. Pet dander isn’t the </span><a data-component="link" data-dcnode-id="2895" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/pet-allergies-2804677"><span data-dcnode-id="2896" instrument_node="">only allergen</span></a><span data-dcnode-id="2894" instrument_node=""> that your dog or cat increases in your home. If they spend any time outdoors, they may bring in pollen, along with dirt, germs, and untold grime from the streets. While a quick cleaning of their paws with a wet cloth can help, if you really want to keep your home—and the air you (and your pet because they too can have allergies, </span><a data-component="link" data-dcnode-id="2892" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/dog-excessively-snoring-4777975"><span data-dcnode-id="2893" instrument_node="">Brachycephalic breed-prone snoring</span></a><span data-dcnode-id="2891" instrument_node=""> and </span><a data-component="link" data-dcnode-id="2889" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/treat-feline-asthma-555454"><span data-dcnode-id="2890" instrument_node="">pet asthma</span></a><span data-dcnode-id="2888" instrument_node="">!) breathe—as clean as possible, an air purifier is the way to go.
</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="2884" id="mntl-sc-block_1-0-1"><span data-dcnode-id="2885" instrument_node="">
As you shop for an air purifier, you’ll want to select one that has the capacity for the size of the room where you’ll be using it. Most models indicate a recommended room size and it can vary from as little as 150 square feet to 1,000 square feet or more. You’ll also want to decide if you need any other features, like odor control, sleep mode, or air quality indicator lights. It’s also good to pay attention to how loud the machine is when it’s turned on.&nbsp;Some air purifiers provide white noise or pink noise that is intended to lull you to sleep, while other models are rather noisy.
</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="2881" id="mntl-sc-block_1-0-2"><span data-dcnode-id="2882" instrument_node="">

Stores can barely keep the recently launched Honeywell HEPA InSight Series in stock; its powerful HEPA filtration is that good. Why? It circulates and cleans the air five times every hour in rooms up to 500 square feet, removing up to 99.7 percent of even the tiniest microscopic allergens (looking at you, pet dander) as well as certain airborne viruses, bacteria, and mold spores.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2477" data-id="#citation-1"><span data-dcnode-id="2478" instrument_node="">1</span></span><span data-dcnode-id="2476" instrument_node="">

In small rooms where space is at a premium, the Levoit LV-H132 Air Purifier will only take up a small space on your bedside table or desk—its base is 8.5 inches around. Using a three-stage filtration process, its HEPA filter screens pet dander, pollen, mold, and other dog and </span><a class="pseudoStyle" data-component="link" data-dcnode-id="1562" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/decrease-your-cat-allergies-553863"><span data-dcnode-id="1563" instrument_node="">cat allergens</span></a><span data-dcnode-id="1561" instrument_node="">four times per hour in a space that’s up to 129 square feet. It’s quiet enough to sleep through, even on high speed, and has a sleek design that looks attractive anywhere you place it. The only downside to this affordable unit is that it can be hard to tell if it’s working.
</span></p><span data-dcnode-id="1559" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1211" id="toc-what-to-look-for-in-an-air-purifier"></span><span data-dcnode-id="1210" instrument_node=""> </span><h2 class="comp list__header mntl-sc-block litho-sc-block commerce-sc-block-heading--pets commerce-sc-block-heading--lifestyle commerce-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1205" id="mntl-sc-block_3-0-2"><span data-dcnode-id="1209" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node=""> What to Look for in an Air Purifier </span></span><span data-dcnode-id="1206" instrument_node=""> </span></h2><span data-dcnode-id="1204" instrument_node="">
</span><h3 class="comp mntl-sc-block litho-sc-block commerce-sc-block-subheading--pets commerce-sc-block-subheading--lifestyle commerce-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1199" id="mntl-sc-block_3-0-3"><span data-dcnode-id="1203" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node=""> Strength </span></span><span data-dcnode-id="1200" instrument_node=""> </span></h3><span data-dcnode-id="1198" instrument_node="">
</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="1196" id="mntl-sc-block_3-0-4"><span data-dcnode-id="1197" instrument_node="">
Some air purifiers are more powerful than others, and just how much power you’ll need will depend on the size of the room, how many pets you have, and what, if any, allergies your family members experience.&nbsp;Be sure to check the coverage area to be sure it meets your needs.
</span></p><span data-dcnode-id="1195" instrument_node="">
</span><div class="comp theme-recipetip text-passage mntl-sc-block litho-sc-block commerce-sc-block-callout--pets commerce-sc-block-callout--lifestyle commerce-sc-block-callout litho-sc-block-callout mntl-sc-block-callout mntl-block" data-dcnode-id="1177" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_3-0-5"><span data-dcnode-id="1194" instrument_node="">
</span><span class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1192" id="mntl-sc-block-callout-heading_1-0-2"><span data-dcnode-id="1193" instrument_node="">
Expert Buying Tip</span></span><span data-dcnode-id="1191" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1179" id="mntl-sc-block-callout-body_1-0-11"><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">"Filters are also marked with a CADR (clean air delivery rate), which describes the cubic feet per minute of airflow through the device. Be sure to match the filter’s CADR (clean air delivery rate) with the size of the room where you plan to use the filter."</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1186" instrument_node="">—</span><a data-component="link" data-dcnode-id="1184" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung.org/media/meet-our-experts/payel-gupta-md" rel="noopener" target="_blank"><span data-dcnode-id="1185" instrument_node="">Dr. Payel Gupta</span></a><span data-dcnode-id="1183" instrument_node="">, </span><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">President of the New York Allergy and Asthma Society</span></em></p></div><span data-dcnode-id="1178" instrument_node="">
</span></div><span data-dcnode-id="1176" instrument_node="">
</span><h3 class="comp mntl-sc-block litho-sc-block commerce-sc-block-subheading--pets commerce-sc-block-subheading--lifestyle commerce-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1171" id="mntl-sc-block_3-0-6"><span data-dcnode-id="1175" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node=""> Features </span></span><span data-dcnode-id="1172" instrument_node=""> </span></h3><span data-dcnode-id="1170" instrument_node="">
</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="1168" id="mntl-sc-block_3-0-7"><span data-dcnode-id="1169" instrument_node="">
Besides cleaning the air, some air purifiers come with additional features, including odor and temperature control. You may also want to consider the look of the air filter if it’s going to be in a visible spot. Some come in a variety of colors, so you can choose one to complement your decor.&nbsp;
</span></p><span data-dcnode-id="1167" instrument_node="">
</span><h3 class="comp mntl-sc-block litho-sc-block commerce-sc-block-subheading--pets commerce-sc-block-subheading--lifestyle commerce-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1162" id="mntl-sc-block_3-0-8"><span data-dcnode-id="1166" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node=""> Sound </span></span><span data-dcnode-id="1163" instrument_node=""> </span></h3><span data-dcnode-id="1161" instrument_node="">
</span><p class="comp text-passage mntl-sc-block litho-sc-block commerce-sc-block-html--pets commerce-sc-block-html--lifestyle commerce-sc-block-html mntl-sc-block-html" data-dcnode-id="1159" id="mntl-sc-block_3-0-9"><span data-dcnode-id="1160" instrument_node="">
While some love the white-noise hum of typical air purifiers, others are annoyed by it. Fortunately, there are machines that are ultra-quiet and others that allow you to adjust the volume. On some models, you can preset runs to operate at different volumes during different times of the day.&nbsp;
</span></p><span data-dcnode-id="1158" instrument_node="">

</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1098" id="mntl-sc-block-faq__accordion-content_1-0-section-0"><span data-dcnode-id="1121" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1100"><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1119" instrument_node="">Most air purifiers work in one of three ways and some utilize all three modes of cleaning the air:&nbsp;</span><br data-dcnode-id="1118"></p><ul data-dcnode-id="1102"><li data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">High-efficiency particulate air (HEPA) filter: These are pleated mechanical filters that work by forcing air through a very fine mesh to remove pet dander, dust, pollen, mold, bacteria, and other airborne particles.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1114" data-id="#citation-1"><span data-dcnode-id="1115" instrument_node="">1</span></span><span data-dcnode-id="1113" instrument_node=""> HEPA filters are the gold standard.</span></li><li data-dcnode-id="1108"><span data-dcnode-id="1111" instrument_node="">Activated carbon filters: These work to remove odor from the air by absorbing it.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1109" data-id="#citation-3"><span data-dcnode-id="1110" instrument_node="">2</span></span></li><li data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">UV filters: These use lights to inactivate germs and bacteria. </span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1105" data-id="#citation-2"><span data-dcnode-id="1106" instrument_node="">3</span></span><span data-dcnode-id="1104" instrument_node="">They’re often used in conjunction with HEPA filters.</span></li></ul><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1094" instrument_node="">
</span></li><span data-dcnode-id="1091" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="1066"><span data-dcnode-id="1090" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1085" id="mntl-sc-block-faq__content_1-section-1"><span data-dcnode-id="1089" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Do air purifiers reduce pet dander?</span></span><span data-dcnode-id="1086" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="1069"><span data-dcnode-id="1082" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1071" id="mntl-sc-block-faq__accordion-content_1-0-section-1"><span data-dcnode-id="1081" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1073"><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">When it comes to removing pet dander, an air purifier with a HEPA filter is your best choice. It filters the air and can remove tiny particles as small as 0.3 microns.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1077" data-id="#citation-1"><span data-dcnode-id="1078" instrument_node="">1</span></span><span data-dcnode-id="1076" instrument_node=""> For reference, pet dander is usually between 5 to 10 microns, so HEPA filters are good at clearing it from the air.</span></p><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></li><span data-dcnode-id="1064" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="1042"><span data-dcnode-id="1063" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1058" id="mntl-sc-block-faq__content_1-section-2"><span data-dcnode-id="1062" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Do air purifiers remove dog or cat hair?</span></span><span data-dcnode-id="1059" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="1045"><span data-dcnode-id="1055" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1047" id="mntl-sc-block-faq__accordion-content_1-0-section-2"><span data-dcnode-id="1054" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">If you have pet hair floating around your room, HEPA filters can remove them. Unfortunately, as most pet owners know, that hair is more likely to get lodged on your clothing, bedding, carpet, or sofa. That’s why you may still want to invest in pet hair removers.</span></p><span data-dcnode-id="1050" instrument_node="">
</span></div><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">
</span></li><span data-dcnode-id="1040" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="1018"><span data-dcnode-id="1039" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1034" id="mntl-sc-block-faq__content_1-section-3"><span data-dcnode-id="1038" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Where is the best place to keep your air purifier?</span></span><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1032" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="1021"><span data-dcnode-id="1031" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1023" id="mntl-sc-block-faq__accordion-content_1-0-section-3"><span data-dcnode-id="1030" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The closer air purifiers are to the source of the pollutant, the more effective they are. In the case of your pooch, keep it close to their bed, crate, or wherever else they spend the most time. Have a cat? Place it near their litter box to help clear the air of unwanted odors.</span></p><span data-dcnode-id="1026" instrument_node="">
</span></div><span data-dcnode-id="1024" instrument_node="">
</span></div><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1019" instrument_node="">
</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="994"><span data-dcnode-id="1015" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1010" id="mntl-sc-block-faq__content_1-section-4"><span data-dcnode-id="1014" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">How do you maintain an air purifier?</span></span><span data-dcnode-id="1011" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="997"><span data-dcnode-id="1007" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="999" id="mntl-sc-block-faq__accordion-content_1-0-section-4"><span data-dcnode-id="1006" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Always follow the instructions in the owner’s manual for your specific air purifier. Some have permanent or reusable filters that can be vacuumed or washed with soap and water. Others have replaceable air purifiers that should be swapped out every few months. Your air purifier may have a special light to tell you when it’s time to replace the filer otherwise, keep an eye on it after three months of use.</span></p><span data-dcnode-id="1002" instrument_node="">
</span></div><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="995" instrument_node="">
</span></li><span data-dcnode-id="992" instrument_node="">
</span></ul><span data-dcnode-id="990" instrument_node="">
</span><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
