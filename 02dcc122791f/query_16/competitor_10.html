</span><h1 data-dcnode-id="677" style="color: #052b71; font-size: 40px; font-weight: bold; text-align: center;"><span data-dcnode-id="678" instrument_node="">HVAC Air Filtration</span></h1><span data-dcnode-id="676" instrument_node="">
</span></div><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="638"><span data-dcnode-id="671" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="640"><span data-dcnode-id="670" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="666"><strong data-dcnode-id="667"><u data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Air Filtration| HVAC (Heating, Ventilation and Air Conditioning )</span></u></strong></h3><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="650"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">HEPA Filters, 95%DOP, 98%DOP, 99.97%, 99.99%, 99.999% at 0.3 micron</span></strong><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
</span><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">ULPA rated at 0.12 micron</span></strong><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
</span><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">4V filters rated for up to 2000 CFM at 1.2”w.g.</span></strong><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
</span><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">6V Super High Capacity HEPA filters up to 2400 CFM at 1” w.g.</span></strong></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">HEPA HV filters are manufactured from continuous length superior quality micro glass fiber paper media available in various efficiencies from H13 – H14. The filter media is moisture resistant and fire retardant. Anti-microbial treated papers are also available for special applications. The uniform and closed pleat filter pack grants a high crossing surface to hold the very fine dusts.</span></strong></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="642"><img alt="Air HVAC" class="size-full wp-image-1144 alignleft" data-dcnode-id="644" height="293" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-01.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-01.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-01-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-01-100x100.jpg 100w" width="291"><img alt="Air HVAC" class="size-full wp-image-1145 alignleft" data-dcnode-id="643" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-02.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-02.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-02-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/air-hvac-02-100x100.jpg 100w" width="291"></p><span data-dcnode-id="641" instrument_node="">

</span><p data-dcnode-id="602" style="clear: both;"><span data-dcnode-id="603" instrument_node="">HEPA SC &amp; HC filters are deep pleated aluminum separator filters with efficiencies ranging from 95%DOP to 99.97%, 99.99% and 99.999% at 0.3 micron and EN1822 grades E10 to H14. These filters are available in wood and metal construction. &nbsp;Box type or double turned flanged version available.</span></p><span data-dcnode-id="601" instrument_node="">

</span><p data-dcnode-id="579"><span data-dcnode-id="586" instrument_node="">High-Temperature applications with Alum separators in deep pleat box style filters.</span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">
Filters are available from MERV 12, MERV14 and HEPA range.</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
Filters are silicone free and can withstand up to 725°F/ 385°C</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
**HEPA Max 500°F</span></p><span data-dcnode-id="578" instrument_node="">

</span><h3 data-dcnode-id="560"><img alt="Air HVAC" class="size-full wp-image-1155 alignright" data-dcnode-id="561" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/vcell.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/vcell.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/vcell-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/vcell-100x100.jpg 100w" width="291"></h3><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="555"><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ASHRAE" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="558" instrument_node="">ASHRAE</span></a><span data-dcnode-id="556" instrument_node=""> 52.2 Efficiencies from MERV 12 to MERV 16 Plus DOP and HEPA rated V-cells</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">EN779 Rated&nbsp; M6, F7, F8, F9</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">EN1822 Rated E10, E11, E12, H13, H14</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">All plastic frame with 20 or 25mm Headers 12”, 16” or 17” depth</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Plastic Blow out grids to withstand up to 25” W.G.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">V-Cells are designed to use in HVAC installations where highest degree of air cleanliness is required. The compact design, larger surface area and low initial resistance made it an Ideal alternative to ordinary Bag filters &amp; Box type filters of the similar efficiencies.</span></p><span data-dcnode-id="539" instrument_node="">

</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="516"><span data-dcnode-id="529" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="518"><span data-dcnode-id="528" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="524"><strong data-dcnode-id="525"><u data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Rigid Cells| Synthetic or Glass Media</span></u></strong></h3><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><img alt="Air HVAC" class="size-full wp-image-1159 alignright" data-dcnode-id="522" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/rigid-cells.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/rigid-cells.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/rigid-cells-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/rigid-cells-100x100.jpg 100w" width="291"><span data-dcnode-id="521" instrument_node="">MERV Rated MERV 11 to MERV 15 available in BOX or Header style for Variable Air Volume Systems in 4”, 6” and 12” depths. Medium to high efficiency extended surface deep pleated rigid box filters are manufactured from a new generation range of inherently anti-microbial, high lofted synthetic fiber filter media or micro – fine glass fiber filter media. It is capable of removing contaminants from the air stream and is an ideal fine filter for HVAC systems.</span></p><span data-dcnode-id="519" instrument_node="">
</span></div><span data-dcnode-id="517" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="486"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="487"><div class="vc_column-inner" data-dcnode-id="488"><div class="wpb_wrapper" data-dcnode-id="489"><span data-dcnode-id="510" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="491"><span data-dcnode-id="509" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="493"><span data-dcnode-id="508" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="504"><strong data-dcnode-id="505"><u data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Pocket Filters | Bag Filters (Synthetic)</span></u></strong></h3><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="498"><img alt="Air HVAC" class="size-full wp-image-1163 alignright" data-dcnode-id="502" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-100x100.jpg 100w" width="291"><span data-dcnode-id="501" instrument_node="">MERV 11, MERV 12, MERV 13, MERV 14, MERV 15 and MERV 16</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
EN779 Rated&nbsp; M6, F7, F8, F9</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Medium to high efficiency extended surface bag filters are manufactured from a new generation range of inherently anti-microbial high lofted synthetic fiber filter media. S-BAG offers excellent filtration performance combined with high dust holding capacity and suitable for applications where highest degree of air cleanliness is required.</span></p><span data-dcnode-id="494" instrument_node="">
</span></div><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="461"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="462"><div class="vc_column-inner" data-dcnode-id="463"><div class="wpb_wrapper" data-dcnode-id="464"><span data-dcnode-id="485" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="466"><span data-dcnode-id="484" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="468"><span data-dcnode-id="483" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="479"><strong data-dcnode-id="480"><u data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Pocket Filters | Bag Filters ( Microglass)</span></u></strong></h3><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="473"><img alt="Air HVAC" class="size-full wp-image-1165 alignright" data-dcnode-id="477" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-bag-micro.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-bag-micro.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-bag-micro-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/pocket-filter-bag-micro-100x100.jpg 100w" width="291"><span data-dcnode-id="476" instrument_node="">MERV 12, MERV 13, MERV 14, MERV 15</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">
EN779 Rated M5, M6, F7, F8</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">G-BAG provides extended surface filtration through media formed into individual dust holding pockets. These pockets are created by internal span stitches to maintain uniform airflow channels for even dust loading and long filter life. The perfectly balanced pocket design allows full pocket inflation without crowding or restricting airflow to ensure optimum media utilization and thereby offering long service life. Each pocket is bonded and sealed to its own “J” channel support frame which is fastened to a heavy duty corrosion resistant steel frame with soft edges to avoid damage to the filter media.</span></p><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="433"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="434"><div class="vc_column-inner" data-dcnode-id="435"><div class="wpb_wrapper" data-dcnode-id="436"><span data-dcnode-id="460" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="438"><span data-dcnode-id="459" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="440"><span data-dcnode-id="458" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="454"><strong data-dcnode-id="455"><u data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Stiff Pocket Filters | Bag Filters (Synthetic)</span></u></strong></h3><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="448"><img alt="Air HVAC" class="size-full wp-image-1168 alignright" data-dcnode-id="452" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/stiff-pocket-filter.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/stiff-pocket-filter.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/stiff-pocket-filter-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/stiff-pocket-filter-100x100.jpg 100w" width="291"><span data-dcnode-id="451" instrument_node="">MERV 8, MERV 11, MERV 12, MERV 13, MERV 14, MERV 15</span><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">
EN779 Rated&nbsp; G4, M5, M6, F7, F8</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">SPX-BAG filters are medium to high efficiency extended surface self-supporting Pocket (bag) filters made of super fine synthetic (Polyester) filter media. The progressive density multi-layered fiber arrangement offers excellent filtration performance combined with very high dust holding capacity. SPX bags are Ideal for air intake applications in Automotive paint booths, powder coating and other surface treatment plants. &nbsp;This is also used in air conditioning systems in Hospitals, Pharmaceutical plants, food processing plants, electronic manufacturing facilities etc. With a unique aerodynamic design, this is also available for air intake applications like gas turbines, diesel generators.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The rigid pockets are formed by welded construction and aerodynamic design. The pockets are mechanically fastened in an ABS frame. This construction ensures 100% leak proof operation. SPX-BAG Filters are completely metal free and are designed to withstand high burst pressure tested up to 25 inches water gauge. These filters can operate well in 100% humid conditions and in salt-laden environments.</span></p><span data-dcnode-id="441" instrument_node="">
</span></div><span data-dcnode-id="439" instrument_node="">
</span></div><span data-dcnode-id="437" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="404"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="405"><div class="vc_column-inner" data-dcnode-id="406"><div class="wpb_wrapper" data-dcnode-id="407"><span data-dcnode-id="432" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="409"><span data-dcnode-id="431" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="411"><span data-dcnode-id="430" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="426"><strong data-dcnode-id="427"><u data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Mini-Pleat| Panel filters </span></u></strong></h3><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="422"><img alt="Air HVAC" class="size-full wp-image-1172 alignright" data-dcnode-id="424" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/mini-pleat.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/mini-pleat.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/mini-pleat-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/mini-pleat-100x100.jpg 100w" width="291"><span data-dcnode-id="423" instrument_node="">are the new generation of high efficiency compact filters available in a wide range of efficiencies from MERV12 to MERV 14. These filters are designed for use in HVAC installations where highest degree of air cleanliness is required. The compact design, larger surface area and low initial resistance made it an Ideal alternative to ordinary bag filters and box type filters of the similar efficiencies.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">These filters are made up of water-resistant micro glass filter media, closely pleated and separated by continuous thermo-plastic bead separators. This design accommodates a very large quantity of media which offers a longer service life and low pressure drop. The Mini-Pleated media packs are encased in a metal or plastic frame that are available with single, double or no header style. Available from 1”to 6” depth.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Also available in 100% synthetic filter media made from a modified meltblown process having graded fiber density ensuring coarse fibers upstream and fine fibers downstream is closely pleated adding</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">thermo-plastic bead separators which gives a unique V configuration to the pleats and accommodates a very large quantity of filter media. The low initial pressure drop, longer service life and the compact design made it an ideal design for all types of air conditioning installations. The filters are available in plastic or metal frames. The filter media used is inherently anti-microbial and so it inhibits the growth of micro-organisms.</span></p><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="410" instrument_node="">
</span></div><span data-dcnode-id="408" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="373"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="374"><div class="vc_column-inner" data-dcnode-id="375"><div class="wpb_wrapper" data-dcnode-id="376"><span data-dcnode-id="403" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="378"><span data-dcnode-id="402" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="380"><span data-dcnode-id="401" instrument_node="">
</span><h3 class="text-darkblue" data-dcnode-id="397"><strong data-dcnode-id="398"><u data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">High Temperature| Mini-Pleats</span></u></strong></h3><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">MPHT filters are designed for drying plants operating at high temperatures. This filter operates at 725°F /385°C , with lower pressure drop and longer service life. They replace the conventional deep pleat style filters in similar range. Maximum recommended pressure drop is 1.4” w.g.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Available in 1.6”, 2.17”and 3.08”depths and efficiencies MERV 12 and MERV 14.&nbsp;&nbsp; HEPA 99.99% grade available with a Max Temp of 500°F</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><img alt="Air HVAC" class="size-full wp-image-1176 aligncenter" data-dcnode-id="389" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-100x100.jpg 100w" width="291"></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">HT pleat filters are designed as a pre filter operating at high temperatures up to 500°F/260° C, with low pressure drop and long service life.&nbsp; Filters are classified with MERV8/G4/EU4 efficiency. They are made with a pleat distribution of 13 pleats per linear foot and are recommended to operate up to 2000 CFM.&nbsp; These filters are available in 45mm (2”) and 95mm (4”) depths. Filter face area can be custom made in many dimensions and the maximum recommended pressure drop is 1.2”w.g./300 Pa.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><img alt="Air HVAC" class="size-full wp-image-1178 aligncenter" data-dcnode-id="383" height="293" loading="lazy" sizes="(max-width: 291px) 85vw, 291px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-2.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-2.jpg 291w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-2-150x150.jpg 150w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/high-temperature-2-100x100.jpg 100w" width="291"></p><span data-dcnode-id="381" instrument_node="">
</span></div><span data-dcnode-id="379" instrument_node="">
</span></div><span data-dcnode-id="377" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="333"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="334"><div class="vc_column-inner" data-dcnode-id="335"><div class="wpb_wrapper" data-dcnode-id="336"><span data-dcnode-id="372" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="338"><span data-dcnode-id="371" instrument_node="">

</span><p data-dcnode-id="367"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Washable filters</span></strong></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="362"><u data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Expanded Aluminum Foil Filter</span></u><span data-dcnode-id="363" instrument_node=""> is an impingement type panel filter designed for use in residential, commercial and industrial HVAC applications to remove large airborne particulate. Popular applications include outside air intake ducts, rooftop hoods and air handling units. It is an ideal solution for any HVAC system that desires a washable and durable pre-filter with low resistance to airflow.</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><img alt="Air HVAC" class="size-full wp-image-1313 aligncenter" data-dcnode-id="360" height="217" loading="lazy" sizes="(max-width: 392px) 85vw, 392px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/Washable-filters-01.jpg&amp;raw" srcset="https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/Washable-filters-01.jpg 392w, https://www.cleanliquidsystems.com/wp-content/uploads/2019/05/Washable-filters-01-300x166.jpg 300w" width="392"></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="354"><strong data-dcnode-id="355"><u data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Screen Mesh available in Aluminum, Galvanized or Stainless Steel</span></u></strong></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Often used in high velocity applications, screen mesh industrial grade filters are an impingement type panel filter designed for use in residential, commercial and industrial HVAC as well as large electrical motor applications to remove large airborne particulate and mist from the airstream. &nbsp;Applications include outside air intake ducts, rooftop hoods and air handling units. It is an ideal solution for any HVAC system that desires a washable pre-filter with low resistance to airflow.&nbsp; The filter uses a metal frame to enclose the media pack consisting of multiple layers of corrugated screen wire assembled in a criss crossing pattern for strength. The pack is then placed between two layers of expanded metal and is made to fit firmly inside the frame giving the filter exceptional strength and durability. The frame is made with mitered corners and is closed with rivets. The frame has drain holes for ease in cleaning.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><img alt="Air HVAC" class="size-full wp-image-1442 aligncenter" data-dcnode-id="349" height="133" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/06/screen-mesh.jpg&amp;raw" width="249"></p><span data-dcnode-id="347" instrument_node="">
</span><ul data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">
</span><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Prefilter rolls</span></li><span data-dcnode-id="343" instrument_node="">
</span></ul><span data-dcnode-id="341" instrument_node="">
</span></div><span data-dcnode-id="339" instrument_node="">
</span></div><span data-dcnode-id="337" instrument_node="">

</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Fiberglass filter media rolls used in paint overspray collection and surface coating applications. Filter media is made up of glass fiber media. Typical thicknesses 2.5”&nbsp; are available in rolls and cut to length pads.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Various weights per sq ft of glass fiber media provide different efficiency levels and greater dust holding capacity.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="316"><img alt="Air HVAC" class="size-full wp-image-1193 alignleft" data-dcnode-id="318" height="175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/paint-booth-filter-1.jpg&amp;raw" width="206"><img alt="Air HVAC" class="size-full wp-image-1194 alignleft" data-dcnode-id="317" height="175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/paint-booth-filter-02-1.jpg&amp;raw" width="206"></p><span data-dcnode-id="315" instrument_node="">

</span><p data-dcnode-id="297"><img alt="Air HVAC" class="size-full wp-image-1316 alignright" data-dcnode-id="299" height="153" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanliquidsystems.com/wp-content/uploads/2019/05/Ring-Panels-01.jpg&amp;raw" width="128"><span data-dcnode-id="298" instrument_node="">Used in HVAC or Paint booth applications</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">2 ply panels are used in paint booth cross draft applications where the user requires a good basic filter and cost is a major consideration.&nbsp; Typical 1.5″ green, 2-ply, self-sealing, tackified polyester media. Panels are heat sealed around steel frame.&nbsp; Available in panels, pads, and blankets</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">83% efficient @ 5-10 micron range @ 100fpm</span></p><span data-dcnode-id="290" instrument_node="">

</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Extra tack panels for use in cross draft applications. &nbsp;An industry favorite, the Extra Tack is a long-life filter that is a proven performer at a great price. &nbsp;A standard 1.75″ blue, 2-ply, self-sealing, tackified polyester media.&nbsp; Panels are heat sealed around steel frame.&nbsp; Available in panels, pads, and blankets</span></p><span data-dcnode-id="272" instrument_node="">
