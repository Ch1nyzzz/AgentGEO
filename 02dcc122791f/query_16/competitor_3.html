</span><h3 data-dcnode-id="536"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">You’re probably breathing more allergens than you think</span></strong></h3><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Today’s homes are better insulated, tightly sealed and use less energy. However, sealing your home also seals in humidity, dust and indoor pollutants. In fact, the quality of air inside your home is probably worse than it is outdoors. Not only can dirty air make you less comfortable, it can create a serious problem for family members who suffer from asthma and allergies. Consider this…</span></p><span data-dcnode-id="532" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="509"><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Indoor pollutants can be 5 times higher than outdoor pollutants</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Most homes naturally generate about 40 pounds of dust per year for every 1,500 square feet of space</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">One ounce of dust can hold about 40,000 dust mites, on of the most common household allergens</span></li><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Up to 72 trillion allergens find their way in to your home every day</span></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Allergy and asthma cases have grown exponentially, causing significant health care cost increases</span></li><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">54% of single-family homes with children have someone with a respiratory ailment</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Children inhale 50% more air per pound of body weight than adults, so they are especially sensitive to air quality problems</span></li><span data-dcnode-id="510" instrument_node="">
</span></ul><span data-dcnode-id="508" instrument_node="">
</span><h2 data-dcnode-id="505"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Your family deserves clean air as well as conditioned air</span></strong></h2><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Many people believe that their heating and cooling system is already cleaning the air of these pollutants and allergens. Most systems are equipped with a standard throwaway air filter, but these filters are designed primarily to keep large particles from damaging the equipment. They are not designed to actually clean the air.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">We believe that your heating and cooling system should clean as well as condition the air. AccuClean will help your system do just that far better than any other air filtration system on the market.</span></p></div><span data-dcnode-id="497" instrument_node="">
</span></div><div class="et_pb_module et_pb_cta_0 et_pb_promo et_pb_text_align_center et_pb_bg_layout_dark" data-dcnode-id="486"><span data-dcnode-id="495" instrument_node="">
</span><div class="et_pb_promo_description" data-dcnode-id="492"><h2 class="et_pb_module_header" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Incentives and Special Financing Available!</span></h2></div><span data-dcnode-id="491" instrument_node="">
</span><div class="et_pb_button_wrapper" data-dcnode-id="488"><a class="et_pb_button et_pb_promo_button" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advancedairsystems.net/financing-and-rebates/"><span data-dcnode-id="490" instrument_node="">Learn More</span></a></div><span data-dcnode-id="487" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="331"><span data-dcnode-id="485" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="333"><h2 data-dcnode-id="482"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">AccuClean delivers unbeatable clean air comfort</span></strong></h2><span data-dcnode-id="481" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="461"><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Removes up to 99.98% of allergens from filtered air</span></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Catches particles down to .1 micron in size</span></li><span data-dcnode-id="474" instrument_node="">
</span><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">8 times more effective than the best HEPA room appliance</span></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">100 times more effective than a standard 1: throwaway filter or ionic-type room appliance</span></li><span data-dcnode-id="468" instrument_node="">
</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Delivers cleaner air, and more of it</span></li><span data-dcnode-id="465" instrument_node="">
</span><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Reusable filter can be cleaned by vacuuming</span></li><span data-dcnode-id="462" instrument_node="">
</span></ul><span data-dcnode-id="460" instrument_node="">
</span><h2 data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Feel more comfortable with up to 99.98% cleaner air</span></strong></h2><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">When you choose an American Standard AccuClean unit for your home, you get the most effective air filtration system in the nation period. It can clean up to an astonishing 99.98% of allergens from the filtered air that you family breathes, so everyone will feel more comfortable, no matter what the season.* Just think: with AccuClean, the majority of irritating particles like dust, pollen, pet hair and dander, dust mites, mildew, lint, fungus, most tobacco smoke, cooking grease, even bacteria, will be removed from the filtered air.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">What’s more, this revolutionary technology can trap allergens down to .1 micron in size. Particles like dust, soot, mold spores and bacteria are often .3 microns – so small that 2 million of them could fit on the period at the end of this sentence. These allergens can get deep into your lungs because they aren’t filtered well by your nose and throat. AccuClean removes tiny particles like these, effectively reducing the potential triggers for asthma and allergy attacks.</span></p><span data-dcnode-id="450" instrument_node="">
</span><h2 data-dcnode-id="447"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Why is American Standard AccuClean air filtration better than the rest?</span></strong></h2><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">The reason is simple, really. It’s all in the technology. Other filters, such as HEPA filters, trap airborne particles by forcing air through very dense mesh screens. Although these screens are effective at catching dirt, over time they become clogged and hamper airflow. The result is what’s referred to as a “pressure drop,” meaning the amount of air that can flow through the filter is considerably less. In other words, less air is cleaned less efficiently.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Not so with AccuClean. This patented design gives you long-lasting and consistent performance with the lowest pressure drop and highest efficiency of any filtration system on the market. That means cleaner air than you’ve ever experienced before.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">*Up to 99.98% effectiveness down to .1 micron applicable to AFD models. Other models may vary.</span></p><span data-dcnode-id="437" instrument_node="">
</span><h2 data-dcnode-id="434"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Fill you whole home with clean, consistent comfort</span></strong></h2><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">AccuClean is a whole-home air cleaner, meaning it works in conjunction with your heating and cooling system to clean up to 99.98% of airborne allergens from filtered air in every room of your home. Compare this to plug-in air cleaners that operate in a single room. To match the effect of a whole-home system, you’d have to buy several plug-in cleaners at a cost of $300 to $500 each. Even then, plug-ins are only effective within a certain radius, potentially leaving much of the air in the room unfiltered.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The AccuClean whole-home air filtration system is the best way to make sure your family breathes air that’s exceptionally clean – no matter what room they’re in – for maximum comfort.</span></p><span data-dcnode-id="427" instrument_node="">
</span><h2 data-dcnode-id="424"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">How to get even more from AccuClean</span></strong></h2><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">A heating and cooling system is only as good as the sum of its parts. And, even though each component is separate, they’re all designed and engineered to work together as a “matched system.” With AccuClean as part of an American Standard matched system, you can rest assured that you’ll experience maximum comfort, efficiency and clean air.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">This is especially true if you install AccuClean into a system that features a variable-speed fan motor. Not only will you be able to clean up to 99.98% of allergens from the filtered air, you’ll be able to reduce dust mites by keeping the air below 50% humidity. And since a variable speed motor operates at a lower speed most of the time, you’ll also save energy – and see lower utility bills** – while breathing cleaner air.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">The most common system is electric/gas:</span></p><span data-dcnode-id="414" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="404"><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Air cleaner: available in a variety of models, from standard filters to fully integrated whole-home air filtration systems that remove up to 99.98% of airborne allergens from the filtered air in your home.</span></li><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="406"><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advancedairsystems.net/air-conditioning/central-air-conditioning-installation/" title="Central Air Conditioning Installation"><span data-dcnode-id="409" instrument_node="">Air conditioner</span></a><span data-dcnode-id="407" instrument_node="">: outdoor unit that cools your home on the hottest days with reliability you can count on, year after year</span></li><span data-dcnode-id="405" instrument_node="">
</span></ul><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">or</span></p><span data-dcnode-id="400" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="388"><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="395"><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advancedairsystems.net/heat-pumps/heat-pump-installation/" title="Heat Pump Installation"><span data-dcnode-id="398" instrument_node="">Heat pump</span></a><span data-dcnode-id="396" instrument_node="">: outdoor unit that warms your home in the winter and cools your home in the summer with quiet, reliable efficiency</span></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="390"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advancedairsystems.net/gas-furnaces/gas-furnace-installation/" title="Gas Furnace Installation"><span data-dcnode-id="393" instrument_node="">Furnace</span></a><span data-dcnode-id="391" instrument_node="">: indoor unit that uses gas to warm your home in the winter</span></li><span data-dcnode-id="389" instrument_node="">
</span></ul><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">or</span></p><span data-dcnode-id="384" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="371"><span data-dcnode-id="383" instrument_node="">
</span><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Air handler: indoor unit that works with an air conditioner or heat pump to circulate conditioned air in homes that use electricity instead of gas</span></li><span data-dcnode-id="380" instrument_node="">
</span><li data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Indoor coil: the other, less visible half of your heat pump. As indoor air flows across it, heat and moisture are drawn out, leaving air that is cool, comfortable and conditioned.</span></li><span data-dcnode-id="377" instrument_node="">
</span><li data-dcnode-id="373"><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advancedairsystems.net/energy-saving-thermostats/" title="Programmable Thermostat Control"><span data-dcnode-id="376" instrument_node="">Thermostat Control</span></a><span data-dcnode-id="374" instrument_node="">: easy-to-use, easy-to-read, attractively designed thermostat that maximizes temperature control</span></li><span data-dcnode-id="372" instrument_node="">
</span></ul><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">**Potential energy savings may vary depending on your lifestyle, system settings, equipment maintenance, local climate, home construction and installation of equipment and duct system.</span></p><span data-dcnode-id="367" instrument_node="">
</span><h2 data-dcnode-id="364"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Concerned about ozone?</span></strong></h2><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Some consumers have expressed concern about the ozone emissions of ionic air cleaners. It’s a valid concern, and one that American Standard Heating &amp; Air Conditioning takes very seriously. Research has shown that plug-in air cleaners emit the highest levels of ozone while whole-home systems like AccuClean deliver almost none. In fact, AccuClean was designed to fall well below the FDA voluntary emissions limit for medical devices. American Standard considers safety and quality to be top priorities. So you can rest assured that the clean air delivered throughout your home by AccuClean is good for you and good for the environment.</span></p><span data-dcnode-id="360" instrument_node="">
</span><h2 data-dcnode-id="359"></h2><span data-dcnode-id="358" instrument_node="">
</span><h2 data-dcnode-id="355"><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">With AccuClean, you get up to 99.98% cleaner air – and so much more</span></strong></h2><span data-dcnode-id="354" instrument_node="">
</span><ul class="bulletlist" data-dcnode-id="334"><span data-dcnode-id="353" instrument_node="">
</span><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Clean Air: AccuClean removes up to 99.98% of allergens fro the filtered air throughout your home, giving you cleaner air and more of it – than any other air filtration system on the market</span></li><span data-dcnode-id="350" instrument_node="">
</span><li data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Reliability: Because American Standard products are built to last and to outperform other models, the AccuClean system has been tested to provide you and your family with clean air day after day, year after year</span></li><span data-dcnode-id="347" instrument_node="">
</span><li data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Efficiency: AccuClean offers the cleanest filtered air available with efficient operation that doesn’t hinder airflow</span></li><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Total Comfort: Unlike some air cleaners that only clean the air within a small circumference, AccuClean is designed to clean the air throughout your home for total clean air comfort</span></li><span data-dcnode-id="341" instrument_node="">
</span><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Quiet Operation: Electronic air cleaners can make a disturbing “bug zapper” noise as the air is being filtered. AccuClean is engineered to run silently, making your indoor environment comfortable and peaceful</span></li><span data-dcnode-id="338" instrument_node="">
</span><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Extraordinary Warranty: Your investment in AccuClean is well protected with a 10-year limited warranty on the electronics and a 5-year limited warranty on all other functional parts</span></li><span data-dcnode-id="335" instrument_node="">
</span></ul></div><span data-dcnode-id="332" instrument_node="">
