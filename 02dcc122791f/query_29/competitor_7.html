lthMate to filter out airborne pet allergens such as dust and dander. It also has a special proprietary granular carbon blend which captures odors most commonly caused by pets.</span></td><td class="smallText" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">In 2010, Austin Air partnered with the National Sleep Foundation to design The Bedroom Machine, the most advanced room air purifier Austin Air has ever made. The Bedroom Machine uses a 5 stage filter including 60 sq ft of medical grade True HEPA, 15 lbs of granular carbon, and military-grade carbon cloth for the ultimate in clean air, helping you get a better night's sleep.</span></td></tr></tbody></table><span data-dcnode-id="570" instrument_node="">
