ev" data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/prevent-house-damage/" title=""><span data-dcnode-id="629" instrument_node=""> </span><i class="x-icon-arrow-left" data-dcnode-id="628" data-x-icon=""></i><span data-dcnode-id="627" instrument_node=""> </span></a><span data-dcnode-id="625" instrument_node=""> </span><a class="next" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/advantages-estate-cleaning-service/" title=""><span data-dcnode-id="624" instrument_node=""> </span><i class="x-icon-arrow-right" data-dcnode-id="623" data-x-icon=""></i><span data-dcnode-id="622" instrument_node=""> </span></a></div></div></div></header><div class="x-container max width offset" data-dcnode-id="286"><div class="x-main left" data-dcnode-id="446" role="main"><article class="post-1493 post type-post status-publish format-standard has-post-thumbnail hentry category-blog tag-fire-damage tag-smoke-damage" data-dcnode-id="447" id="post-1493"><div class="entry-featured" data-dcnode-id="612"><div class="entry-thumb" data-dcnode-id="613"><noscript data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">&lt;img width="624" height="332" src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke.jpg" class="attachment-entry size-entry wp-post-image" alt="Fire Smoke" /&gt;</span></noscript><img alt="Fire Smoke" class="attachment-entry size-entry wp-post-image lazyloaded" data-dcnode-id="614" data-src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke.jpg" height="332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke.jpg&amp;raw" width="624"></div></div><div data-dcnode-id="604" id="breadcrumbs"><span data-dcnode-id="605"><span data-dcnode-id="606"><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/"><span data-dcnode-id="611" instrument_node="">Home</span></a><span data-dcnode-id="609" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">How to Get Rid of Fire Smoke Smell</span></span></span></span></div><div class="entry-wrap" data-dcnode-id="454"><header class="entry-header" data-dcnode-id="589"><h1 class="entry-title" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">How to Get Rid of Fire Smoke Smell</span></h1><p class="p-meta" data-dcnode-id="590"><span data-dcnode-id="599"><i class="x-icon-pencil" data-dcnode-id="601" data-x-icon=""></i><span data-dcnode-id="600" instrument_node=""> Steve VanDenBerg</span></span><span data-dcnode-id="595"><time class="entry-date" data-dcnode-id="596" datetime="2017-08-10T21:18:12-05:00"><i class="x-icon-calendar" data-dcnode-id="598" data-x-icon=""></i><span data-dcnode-id="597" instrument_node=""> August 10, 2017</span></time></span><span data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/blog/" title="View all posts in: “Blog”"><i class="x-icon-bookmark" data-dcnode-id="594" data-x-icon=""></i><span data-dcnode-id="593" instrument_node=""> Blog</span></a></span></p></header><div class="entry-content content" data-dcnode-id="455"><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">Fires are terrifying when they occur because they quickly create a very dangerous situation and cause extensive property damage.&nbsp; Once the fire is out and you have ensured everyone’s safety, you could be facing a long and difficult road ahead to get your property back to its original condition.&nbsp; Fires cause very serious structural damage, and the byproducts of a fire like smoke and soot can burn and tarnish various surfaces and materials.&nbsp; After waiting through an extensive </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/fire-safety-apartment-buildings/"><span data-dcnode-id="587" instrument_node="">fire damage</span></a><span data-dcnode-id="585" instrument_node=""> restoration process and getting your home back, the last thing you need is to return to a home with strong smoke odors.</span></p><h2 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Smoke Odor After a Fire</span></h2><p data-dcnode-id="571"><noscript data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">&lt;img class="alignright size-medium wp-image-1495" src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke-smell-300x225.jpg" alt="house on fire" width="300" height="225" /&gt;</span></noscript><img alt="house on fire" class="alignright size-medium wp-image-1495 lazyloaded" data-dcnode-id="579" data-src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke-smell-300x225.jpg" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/fire-smoke-smell-300x225.jpg&amp;raw" width="300"><span data-dcnode-id="578" instrument_node="">Anything from a small cooking fire to a full-blown house fire can result in lingering smoke odors.&nbsp; During a fire, the smoke spreads throughout the home or building, often beyond the areas affected by the fire, and gets absorbed into various materials such as carpeting, furniture, drywall, wood, drapes, clothing, and others.&nbsp; This is how the smoke odors get trapped in the materials of your home.&nbsp; This also explains why it is very difficult to remove smoke smell from the house.&nbsp; </span><strong data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">In most cases, it is best to have a professional provide </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/fire-damage-restoration-santa-clara-ca/"><span data-dcnode-id="576" instrument_node="">deodorization services</span></a><span data-dcnode-id="574" instrument_node=""> to eliminate smoke odor.</span></strong><span data-dcnode-id="572" instrument_node="">&nbsp; However, there are some steps you can take to help get rid of the smoke smell in your home.</span></p><h3 data-dcnode-id="568"><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Assessing the Damage from Fire</span></strong></h3><p data-dcnode-id="564"><span data-dcnode-id="567" instrument_node="">As mentioned above, smoke odors linger in your home because they get absorbed in porous building materials and objects.&nbsp; </span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">The severity of the smoke odor varies from case to case based on the following factors:</span></strong></p><ul data-dcnode-id="544"><li data-dcnode-id="560"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Extent of the Fire: </span></strong><span data-dcnode-id="561" instrument_node="">Fires that cover a large area of your home burn more materials and produce more smoke. If the fire is small and contained, it will produce less smoke.</span></li><li data-dcnode-id="553"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Exposure Time:</span></strong><span data-dcnode-id="557" instrument_node=""> Smoke will get absorbed deeper into the affected materials over time which is why you should always begin the</span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/wildfire-smoke-odor-remove/"><span data-dcnode-id="556" instrument_node=""> fire damage restoration</span></a><span data-dcnode-id="554" instrument_node=""> process as soon as possible.</span></li><li data-dcnode-id="549"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Size of the House/ Room:</span></strong><span data-dcnode-id="550" instrument_node=""> Smaller homes or rooms may have more pungent smoke smells because the odor is more concentrated.</span></li><li data-dcnode-id="545"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Burnt Materials:</span></strong><span data-dcnode-id="546" instrument_node=""> The materials that were burned by the fire such as wood, plastic, or upholstery can affect the smell.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="538" id="attachment_2924" style="width: 670px"><noscript data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">&lt;img aria-describedby="caption-attachment-2924" class="wp-image-2924 size-full" title="Assessing the Damage from Fire" src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Assessing-the-Damage-from-Fire.png" alt="Assessing the Damage from Fire" width="660" height="269" /&gt;</span></noscript><img alt="Assessing the Damage from Fire" aria-describedby="caption-attachment-2924" class="wp-image-2924 size-full lazyloaded" data-dcnode-id="541" data-src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Assessing-the-Damage-from-Fire.png" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Assessing-the-Damage-from-Fire.png&amp;raw" title="Assessing the Damage from Fire" width="660"><p class="wp-caption-text" data-dcnode-id="539" id="caption-attachment-2924"><span data-dcnode-id="540" instrument_node="">Assessing the Damage from Fire</span></p></div><h2 data-dcnode-id="533"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Smoke Odor R</span></strong><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">emoval Tips</span></strong></h2><p data-dcnode-id="526"><span data-dcnode-id="532" instrument_node="">When there is a lingering smoke smell in the home, many homeowners feel the need to light scented candles or use air freshening spray.&nbsp; These things do not remove smoke smell from the house, they merely mask the smell as the smoke particles penetrate deeper into the affected materials.&nbsp;</span><strong data-dcnode-id="527"><span data-dcnode-id="531" instrument_node=""> The following </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/cleaning-tips-advice/"><span data-dcnode-id="530" instrument_node="">smoke odor removal tips</span></a><span data-dcnode-id="528" instrument_node=""> will help you effectively eliminate smoke odors from your home.</span></strong></p><ul data-dcnode-id="513"><li data-dcnode-id="522"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Air Out your Home: </span></strong><span data-dcnode-id="523" instrument_node="">You can start to eliminate the smoke smell by airing out the home. Open the windows of your home to let out the smoke smell and allow fresh air to come in.&nbsp; You can also blow out individual rooms in your home with positive pressure.&nbsp; To do this, set up a large fan in the doorway of the room facing in.&nbsp; Turn on the fan and open one window for exhaust.&nbsp; This will force fresh air into the room and push out the smoke odor.</span></li><li data-dcnode-id="518"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Remove Curtains and Drapes: </span></strong><span data-dcnode-id="519" instrument_node="">If you have fabric window treatments in your home, take them down and hang them outside to help air out the smoke smell. Your curtains or drapes will likely need dry cleaning to completely eliminate the smell.</span></li><li data-dcnode-id="514"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Wash Solid Surfaces: </span></strong><span data-dcnode-id="515" instrument_node="">First, create a cleaning solution that consists of one gallon of water, a quarter cup of white vinegar, and one teaspoon of either shampoo or dish soap. Put some of the solution in an empty spray bottle and spray all solid surfaces including wood surfaces, tile floors, furniture, shelves, baseboards, and window sills.&nbsp; Wipe these surfaces with a clean rag and make sure to rinse the rag in fresh water.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="507" id="attachment_2922" style="width: 670px"><noscript data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">&lt;img aria-describedby="caption-attachment-2922" class="wp-image-2922 size-full" title="Wash Solid Surfaces" src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Wash-Solid-Surfaces.png" alt="Wash Solid Surfaces" width="660" height="269" /&gt;</span></noscript><img alt="Wash Solid Surfaces" aria-describedby="caption-attachment-2922" class="wp-image-2922 size-full lazyloaded" data-dcnode-id="510" data-src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Wash-Solid-Surfaces.png" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Wash-Solid-Surfaces.png&amp;raw" title="Wash Solid Surfaces" width="660"><p class="wp-caption-text" data-dcnode-id="508" id="caption-attachment-2922"><span data-dcnode-id="509" instrument_node="">Wash Solid Surfaces</span></p></div><ul data-dcnode-id="483"><li data-dcnode-id="503"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Clean Carpet and Upholstery: </span></strong><span data-dcnode-id="504" instrument_node="">If the carpeting and upholstery has absorbed smoke odors, you can treat them with baking soda. Sprinkle baking soda over the entire affected area and let it sit for at least 3 hours and absorb the odors.&nbsp; Then, vacuum the carpet or furniture to remove the baking soda.&nbsp; It is best to use a vacuum with a HEPA filter to keep the baking soda and smoke odors contained.</span></li><li data-dcnode-id="499"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Wash Window Screens: </span></strong><span data-dcnode-id="500" instrument_node="">If a decent amount of smoke escaped your home through the windows, it is a good idea to wash the screens. Remove the screens from the window and put them in a bathtub.&nbsp; Fill the tub with water and use either shampoo or dish soap to clean the screens.&nbsp; Use cool water to rinse them.</span></li><li data-dcnode-id="492"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Clean Light Fixtures:</span></strong><span data-dcnode-id="496" instrument_node=""> There is often soot from the smoke on light fixtures because the smoke rises during the fire, and then settles again when the</span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/types-of-fires-how-to-extinguish/"><span data-dcnode-id="495" instrument_node=""> fire is out</span></a><span data-dcnode-id="493" instrument_node="">. Make sure you remove your light fixtures to clean them thoroughly and put them back when finished.</span></li><li data-dcnode-id="488"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Mop Hard Floors:</span></strong><span data-dcnode-id="489" instrument_node=""> The smoke odor particles fall from the air over time and onto the floor. You must mop the entire hard surface floor several times to effectively remove the smoke particles.&nbsp; Make sure you rinse your mop under fresh running water as you work instead of rinsing in a mop bucket to ensure that the smoke particles are removed.</span></li><li data-dcnode-id="484"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Use Vinegar: </span></strong><span data-dcnode-id="485" instrument_node="">If the smoke smell is still lingering in certain areas, put a bowl of white vinegar in the room to absorb the odor. Let the vinegar sit in the room until it has evaporated.</span></li></ul><h2 data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">When To Call a Fire Restoration Professional</span></strong></h2><p data-dcnode-id="472"><span data-dcnode-id="479" instrument_node="">Smoke odor is a pungent, stubborn odor that can make your home very uncomfortable and unpleasant.&nbsp; If you have a lingering smoke odor in your home from a fire, follow the steps outlined above to help eliminate the smoke odor. </span><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">&nbsp;If the odor still lingers despite your best efforts, then contact a professional like ServiceMaster Disaster Restoration and Recovery to effectively get rid of the smoke smell.</span></strong><span data-dcnode-id="476" instrument_node="">&nbsp; We provide complete </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.servicemastersanfrancisco.com/fire-damage-restoration/"><span data-dcnode-id="475" instrument_node="">fire damage restoration</span></a><span data-dcnode-id="473" instrument_node=""> services that include deodorization.</span></p><div class="wp-caption aligncenter" data-dcnode-id="466" id="attachment_2923" style="width: 670px"><noscript data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">&lt;img aria-describedby="caption-attachment-2923" class="wp-image-2923 size-full" title="Fire Restoration Professional" src="https://www.servicemastersanfrancisco.com/wp-content/uploads/2017/08/Fire-Restoration-Professional.png" alt="Fire Restoration Professional" width="660" height="269" /&gt;</s
