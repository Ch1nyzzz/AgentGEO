</span><section class="entry-content" data-dcnode-id="546"><span data-dcnode-id="654" instrument_node="">
</span><p class="lead" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">To truly de-stink your house or apartment, you must remove the source of the problem. </span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Whether you’re a smoker and you’re trying to sell your house, or you’ve just purchased a place that reeks of cigarettes or marijuana, there are steps you can take to get rid of the smell.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">For starters, understand that spraying room fresheners or burning scented candles will only mask the odor temporarily. Opening windows to provide some ventilation will help dilute the smell, but it won’t remove it permanently.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">To truly de-stink your house or apartment, you must remove the source of the problem. That’s easier said than done because smoke particles can be smaller than one-thousandth the width of a human hair, which means they can penetrate almost any surface in any room in your house.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">You didn’t smoke in your bedroom? Chances are smoke got in there anyway. Tobacco smoke can easily circulate through your home’s ventilation system. If you live in an apartment building or condo, it’s possible tobacco smells from other tenants’ units can travel through central ventilation systems, pipe shafts or cracks in the walls until —&nbsp;bam —&nbsp;your place smells like smoke.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Getting rid of the stench isn’t easy, but if you’re trying to sell, it’s imperative.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">“House hunters are never really sure if they’ll be able to get the smoke smell out of a property, so it’s a huge turnoff for potential buyers,” said </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zillow.com/profile/tkjellander/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="634" instrument_node="">Tiffany Kjellander</span></a><span data-dcnode-id="632" instrument_node="">, owner and operations manager of Augusta, NJ-based EXIT Towne &amp; Country Realty. “It takes some work, but the best thing you can do is eliminate the smell before you put your house on the market.”</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="629" instrument_node="">It’s likely you’ll need a multi-prong approach to tackle the problem. These odor-ridding tips come from the </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nahi.org/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="628" instrument_node="">National Association of Home Inspectors</span></a><span data-dcnode-id="626" instrument_node="">,</span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agrilifeextension.tamu.edu/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="625" instrument_node=""> Texas A&amp;M AgriLife Extension Service</span></a><span data-dcnode-id="623" instrument_node=""> and </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//extension.ca.uky.edu/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="622" instrument_node="">University of Kentucky Cooperative Extension Service</span></a><span data-dcnode-id="620" instrument_node="">.</span></p><span data-dcnode-id="618" instrument_node="">
</span><h2 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">How to get rid of smoke smell in the house:</span></h2><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Open windows and turn on fans</span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Ventilation is the first step in eliminating or diluting any household odor, especially smoke. If your windows do not provide sufficient ventilation, prop open exterior doors with fans that face outward to pull out the stale air.</span></p><span data-dcnode-id="609" instrument_node="">
</span><h3 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Wash all interior walls and hard surfaces</span></h3><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Use a mild soap or other appropriate cleaning solutions or products, and rinse thoroughly. Don’t forget to clean inside cabinets, drawers and closets.</span></p><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Use a dry chemical sponge on other surfaces</span></h3><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Also known as a dry cleaning sponge or soot sponge, dry chemical sponges can be used to remove smoke residue from ceiling tiles, lampshades and other materials that can’t get wet.</span></p><span data-dcnode-id="597" instrument_node="">
</span><h3 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Steam-clean upholstery</span></h3><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Special deodorizing shampoos works to remove smoke and other odors rather than simply making them with another scent.</span></p><span data-dcnode-id="591" instrument_node="">
</span><h3 data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Set small bowls of vinegar around the house</span></h3><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Similarly, set bowls filled with kitty litter or baking soda throughout the home to help absorb odors like cigarette smoke. You can also dampen a dish towel with vinegar and wave it around the room for a minute or two.</span></p><span data-dcnode-id="585" instrument_node="">
</span><h3 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Repaint surfaces to trap odor</span></h3><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Keep in mind that it’s possible for odors to gradually seep through paint barriers. A matte finish polyurethane sealant will provide good odor protection without altering the sheen of the newly repainted wall.</span></p><span data-dcnode-id="579" instrument_node="">
</span><h3 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Remove carpeting</span></h3><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">It is nearly impossible to remove cigarette smoke particles from carpeting. Thoroughly scrub the flooring beneath before installing new carpet. If the carpet cannot be replaced, have it professionally cleaned.</span></p><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Replace curtains or have them professionally cleaned</span></h3><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">You can also soak blinds in a bathtub full of all-purpose cleanser, scrub thoroughly and hang to dry.</span></p><span data-dcnode-id="567" instrument_node="">
</span><h3 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Clean or change light bulbs</span></h3><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">In the same way that some scent diffusers rely on heat from light bulbs to disperse the aroma of the scented oil, the oily residue from nicotine and other cigarette byproducts can be dispersed throughout your living space.</span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Wash windows</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The heat that comes from sunshine can warm smoke-covered windows and disperse the smell throughout your house.</span></p><span data-dcnode-id="555" instrument_node="">
</span><h3 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Replace heating and air filters</span></h3><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Filters tend to harbor cigarette odors and other irritants. Changing these more frequently than usual can help improve air quality of a smelly home.</span></p><span data-dcnode-id="549" instrument_node="">
</span><div class="knotch_placeholder" data-dcnode-id="548"></div><span data-dcnode-id="547" instrument_node=""> </span></section><span data-dcnode-id="545" instrument_node="">
