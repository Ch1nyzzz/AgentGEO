> </span><div class="header" data-dcnode-id="952"><span data-dcnode-id="956" instrument_node=""> </span><h4 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Related Articles</span></h4><span data-dcnode-id="953" instrument_node=""> </span></div><span data-dcnode-id="951" instrument_node=""> </span><div data-dcnode-id="916"><span data-dcnode-id="950" instrument_node=""> </span><ul data-dcnode-id="918"><span data-dcnode-id="949" instrument_node=""> </span><li data-dcnode-id="944"><span data-dcnode-id="948" instrument_node=""> </span><a aria-label="Link to How to Make Bathrooms Smell Good" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/make-bathrooms-smell-good-92733.html"><span data-dcnode-id="947" instrument_node=""> How to Make Bathrooms Smell Good </span></a><span data-dcnode-id="945" instrument_node=""> </span></li><span data-dcnode-id="943" instrument_node=""> </span><li data-dcnode-id="938"><span data-dcnode-id="942" instrument_node=""> </span><a aria-label="Link to How to Size Bathroom Fans" data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/size-bathroom-fans-27358.html"><span data-dcnode-id="941" instrument_node=""> How to Size Bathroom Fans </span></a><span data-dcnode-id="939" instrument_node=""> </span></li><span data-dcnode-id="937" instrument_node=""> </span><li data-dcnode-id="932"><span data-dcnode-id="936" instrument_node=""> </span><a aria-label="Link to How Does Replacing Air Conditioner Filters Save on Costs?" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/replacing-air-conditioner-filters-save-costs-61307.html"><span data-dcnode-id="935" instrument_node=""> How Does Replacing Air Conditioner Filters Save on Costs? </span></a><span data-dcnode-id="933" instrument_node=""> </span></li><span data-dcnode-id="931" instrument_node=""> </span><li data-dcnode-id="926"><span data-dcnode-id="930" instrument_node=""> </span><a aria-label="Link to How to Remove Cigarette Smell From an Apartment" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/remove-cigarette-smell-apartment-1789.html"><span data-dcnode-id="929" instrument_node=""> How to Remove Cigarette Smell From an Apartment </span></a><span data-dcnode-id="927" instrument_node=""> </span></li><span data-dcnode-id="925" instrument_node=""> </span><li data-dcnode-id="920"><span data-dcnode-id="924" instrument_node=""> </span><a aria-label="Link to How to Remove a Stuffy Odor From a Bedroom" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/remove-stuffy-odor-bedroom-93371.html"><span data-dcnode-id="923" instrument_node=""> How to Remove a Stuffy Odor From a Bedroom </span></a><span data-dcnode-id="921" instrument_node=""> </span></li><span data-dcnode-id="919" instrument_node=""> </span></ul><span data-dcnode-id="917" instrument_node=""> </span></div><span data-dcnode-id="915" instrument_node=""> </span></div><span data-dcnode-id="913" instrument_node=""> </span></div><span data-dcnode-id="911" instrument_node=""> </span><ul data-dcnode-id="897" data-hearst-affiliate-data="" data-rendered="true" style="display: none"><span data-dcnode-id="910" instrument_node=""> </span><li data-dcnode-id="908" data-hearst-affiliate-index="1" data-hearst-affiliate-keyword="activated charcoal" data-hearst-affiliate-link="https://fave.co/3meVSOr"><span data-dcnode-id="909" instrument_node=""> </span></li><span data-dcnode-id="907" instrument_node=""> </span><li data-dcnode-id="905" data-hearst-affiliate-index="2" data-hearst-affiliate-keyword="mask" data-hearst-affiliate-link="https://fave.co/3geELZ4"><span data-dcnode-id="906" instrument_node=""> </span></li><span data-dcnode-id="904" instrument_node=""> </span><li data-dcnode-id="902" data-hearst-affiliate-index="3" data-hearst-affiliate-keyword="fans" data-hearst-affiliate-link="https://fave.co/3kckUv8"><span data-dcnode-id="903" instrument_node=""> </span></li><span data-dcnode-id="901" instrument_node=""> </span><li data-dcnode-id="899" data-hearst-affiliate-index="4" data-hearst-affiliate-keyword="fan" data-hearst-affiliate-link="https://fave.co/3kckUv8"><span data-dcnode-id="900" instrument_node=""> </span></li><span data-dcnode-id="898" instrument_node=""> </span></ul><span data-dcnode-id="896" instrument_node=""> </span><div class="freestyle-content article-content" data-dcnode-id="756"><span data-dcnode-id="895" instrument_node=""> </span><div class="parts" data-dcnode-id="884"><span data-dcnode-id="894" instrument_node=""> </span><div class="content" data-dcnode-id="891"><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Smoke odors can be noxious and pervasive no matter the source, though cigarette smoke smell can be particularly strong and difficult to eliminate. If your bathroom fan smells like cigarette smoke, all is not lost. You may be able to remove the smell even if someone was smoking in the bathroom with vents on or smoking under the extractor fan.</span></p></div><span data-dcnode-id="890" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="889"></div><span data-dcnode-id="888" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="886" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="887" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="885" instrument_node=""> </span></div><span data-dcnode-id="883" instrument_node=""> </span><h2 class="title" data-dcnode-id="881" data-for="Bathroom Fan Smells Like Cigarette Smoke"><span data-dcnode-id="882" instrument_node=""> Bathroom Fan Smells Like Cigarette Smoke</span></h2><span data-dcnode-id="880" instrument_node=""> </span><div class="parts" data-dcnode-id="858"><span data-dcnode-id="879" instrument_node=""> </span><div class="content" data-dcnode-id="876"><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Bathrooms are susceptible to smoke smells from being connected to the kitchen exhaust, issues with the bathroom exhaust fan, and lingering cigarette odors. When a cigarette burns, it releases smoke molecules that are encapsulated in microscopic particles of oil and tar. This sticky shell means the smoke molecules adhere to a variety of surfaces, and it can be very difficult to rid the area of the smell.</span></p></div><span data-dcnode-id="875" instrument_node=""> </span><div class="content" data-dcnode-id="869"><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">If there is a smell coming from the bathroom exhaust fan, make sure you clean it. Lint in bathroom fans poses a fire risk, explains </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.countrysidefire.com/bathroom-exhaust-fan-lint-is-a-fire-hazard/" rel="nofollow noopener"><span data-dcnode-id="873" instrument_node="">Countryside Fire Protection District</span></a><span data-dcnode-id="871" instrument_node="">. It can emit a burning smell. Burning something in the kitchen can mean the burning or smoky smell carries between the kitchen and bathroom exhaust systems or over the HVAC system in general. Cigarette smoke can even cling to nonporous surfaces.</span></p></div><span data-dcnode-id="868" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="867"></div><span data-dcnode-id="866" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="864" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="865" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="863" instrument_node=""> </span><div class="content" data-dcnode-id="860"><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">You may have tried commercial air fresheners, scented candles or potpourri. However, these products only mask the smell instead of eradicating it.</span></p></div><span data-dcnode-id="859" instrument_node=""> </span></div><span data-dcnode-id="857" instrument_node=""> </span><h2 class="title" data-dcnode-id="855" data-for="Removing Cigarette Odors"><span data-dcnode-id="856" instrument_node=""> Removing Cigarette Odors</span></h2><span data-dcnode-id="854" instrument_node=""> </span><div class="parts" data-dcnode-id="840"><span data-dcnode-id="853" instrument_node=""> </span><div class="content" data-dcnode-id="850"><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">First, eliminate the source. Remove burnt residue, such as that from kitchen accidents or visible burns or smoke stains. Empty and clean or even get rid of all ashtrays and cigarette stubs. Clean out the bathroom exhaust fan to get rid of the dangerous lint and to stop the smoky smell. Thoroughly vacuum all surfaces with the upholstery attachment and remove items that have absorbed the smells, like drapes and towels.</span></p></div><span data-dcnode-id="849" instrument_node=""> </span><div class="content" data-dcnode-id="846"><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The most straightforward step to take with a smoky bathroom is to simply air it out. Open any windows and place fans in them with the blades facing outward to evacuate the smoky air from the room. Additional fans placed in the room and pointing toward the windows can also help. Increase air circulation as much as possible.</span></p></div><span data-dcnode-id="845" instrument_node=""> </span><div class="content" data-dcnode-id="842"><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Then, replace all HVAC filters and clean the ducts, as cigarette smells from the air conditioner can linger for a long time. The furnace filter and any other HVAC filters in the house can absorb smoky smells and recirculate them throughout the house, and smoke residue clinging to the inside of the ducts can do the same.</span></p></div><span data-dcnode-id="841" instrument_node=""> </span></div><span data-dcnode-id="839" instrument_node=""> </span><h2 class="title" data-dcnode-id="837" data-for="Additional Smell Removal Strategies"><span data-dcnode-id="838" instrument_node=""> Additional Smell Removal Strategies</span></h2><span data-dcnode-id="836" instrument_node=""> </span><div class="parts" data-dcnode-id="819"><span data-dcnode-id="835" instrument_node=""> </span><div class="content" data-dcnode-id="829"><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">Use air purifiers or, as </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homemadesimple.com/in-the-home/how-to-get-smoke-smell-out-of-your-house-a-complete-guide/" rel="nofollow noopener"><span data-dcnode-id="833" instrument_node="">Home Made Simple</span></a><span data-dcnode-id="831" instrument_node=""> recommends, air-purifying plants. Air purifiers can absorb bacteria and fungi in the air as well, which can be important in bathrooms, while plants can absorb a number of harmful or malodorous substances and also provide a lush pop of natural beauty.</span></p></div><span data-dcnode-id="828" instrument_node=""> </span><div class="content" data-dcnode-id="825"><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Finally, you can use ozone generators to further improve the air quality. However, these pieces of equipment are more expensive and need to be operated properly. As with ammonia, another popular recommendation, it's best to exhaust the other options first.</span></p></div><span data-dcnode-id="824" instrument_node=""> </span><div class="content" data-dcnode-id="821"><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">A very good deodorizer is charcoal. While charcoal can't be rubbed or sprinkled on porous surfaces like baking soda (since it stains), it can be left out in dishes and bowls to absorb odious smells. Charcoal is very porous and has a lot of surface area, so it absorbs odors very efficiently. While charcoal briquettes, such as those used for grilling, can be used (especially when ground up), activated charcoal is the best choice. It can be found in home supply stores, pet stores, and many grocery stores and pharmacies.</span></p></div><span data-dcnode-id="820" instrument_node=""> </span></div><span data-dcnode-id="818" instrument_node=""> </span><h2 class="title" data-dcnode-id="816" data-for="Clean Hard Surfaces With Vinegar"><span data-dcnode-id="817" instrument_node=""> Clean Hard Surfaces With Vinegar</span></h2><span data-dcnode-id="815" instrument_node=""> </span><div class="parts" data-dcnode-id="757"><span data-dcnode-id="814" instrument_node=""> </span><div class="content" data-dcnode-id="808"><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Plain distilled vinegar or white vinegar is an all-natural and completely non-toxic substance that can neutralize bad smells. </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bobvila.com/articles/smoke-smell-removal/" rel="nofollow noopener"><span data-dcnode-id="812" instrument_node="">Bob Vila</span></a><span data-dcnode-id="810" instrument_node=""> states that the vinegar's low pH (as vinegar is acidic) "attacks" the more alkaline (higher pH) smoke molecules, altering them and reducing their smell. Of course, vinegar itself has a smell, but this dissipates naturally within a couple of hours as it dries or is removed by wiping. Use these properties of vinegar to clean hard surfaces.</span></p></div><span data-dcnode-id="807" instrument_node=""> </span><div class="content" data-dcnode-id="802"><p data-dcnode-id="803"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hgtv.ca/cleaning-and-organization/photos/how-to-get-rid-of-smell-of-cigarette-smoke-in-house-1928658/%23currentSlide%3D7" rel="nofollow noopener"><span data-dcnode-id="806" instrument_node="">HGTV</span></a><span data-dcnode-id="804" instrument_node=""> recommends making a solution of 2/3 distilled white vinegar to 1/3 warm water and wiping down walls, ceilings, floors, mirrors, and countertops. This may be surprising, but also wipe down all light bulbs (after turning them off or even removing them) or replace them. Smoky residue clinging to light bulbs activates as they heat up, and it is dispersed through the air.</span></p></div><span data-dcnode-id="801" instrument_node=""> </span><div class="content" data-dcnode-id="798"><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">You can also use vinegar with any washable fabrics to eliminate a smoky smell. Laundry detergent doesn't remove this smell, but vinegar does. Simply use 1/4 cup of vinegar in place of laundry detergent. Finally, you can fill several bowls or ramekins with vinegar and leave them around the affected space to absorb the smell.</span></p></div><span data-dcnode-id="797" instrument_node=""> </span><div class="section" data-dcnode-id="759" id="things-needed"><span data-dcnode-id="796" instrument_node=""> </span><h4 data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Things You Will Need</span></h4><span data-dcnode-id="793" instrument_node=""> </span><ul data-dcnode-id="761"><span data-dcnode-id="792" instrument_node=""> </span><li data-dcnode-id="789"><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Vacuum</span></p></li><span data-dcnode-id="
