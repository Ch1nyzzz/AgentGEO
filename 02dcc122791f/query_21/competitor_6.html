</span><article class="post-1800 post type-post status-publish format-standard has-post-thumbnail hentry category-dog-odor tag-dog-odor-in-concrete tag-dog-smell-carpet tag-dog-urine-smell-outside ast-article-single" data-dcnode-id="533" id="post-1800" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="777" instrument_node="">
</span><div class="ast-post-format- single-layout-1" data-dcnode-id="535"><span data-dcnode-id="776" instrument_node="">
</span><header class="entry-header" data-dcnode-id="751"><span data-dcnode-id="775" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="756"><span data-dcnode-id="774" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="772" itemprop="headline"><span data-dcnode-id="773" instrument_node="">Eliminate Dog Odor From Concrete Permanently</span></h1><div class="entry-meta" data-dcnode-id="758"><span class="cat-links" data-dcnode-id="769"><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/category/dog-odor/" rel="category tag"><span data-dcnode-id="771" instrument_node="">Dog Odor</span></a></span><span data-dcnode-id="768" instrument_node=""> / By </span><span class="posted-by vcard author" data-dcnode-id="760" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="767" instrument_node=""> </span><a class="url fn n" data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/author/odordude/" itemprop="url" rel="author" title="View all posts by The Odordude"><span data-dcnode-id="766" instrument_node="">
</span><span class="author-name" data-dcnode-id="764" itemprop="name"><span data-dcnode-id="765" instrument_node="">The Odordude</span></span><span data-dcnode-id="763" instrument_node="">
</span></a><span data-dcnode-id="761" instrument_node="">
</span></span><span data-dcnode-id="759" instrument_node="">
</span></div><span data-dcnode-id="757" instrument_node=""> </span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="post-thumb-img-content post-thumb" data-dcnode-id="753"><img alt="dog odor removal" class="attachment-large size-large wp-post-image" data-dcnode-id="754" height="426" itemprop="image" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/continental-bulldog-2437110_640.jpg&amp;raw" srcset="https://www.odordude.com/wp-content/uploads/2021/05/continental-bulldog-2437110_640.jpg 640w, https://www.odordude.com/wp-content/uploads/2021/05/continental-bulldog-2437110_640-300x200.jpg 300w" width="640"></div><span data-dcnode-id="752" instrument_node="">
</span></header><span data-dcnode-id="749" instrument_node="">
</span><div ast-blocks-layout="true" class="entry-content clear" data-dcnode-id="538" itemprop="text"><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Concrete floors in garages or basements absorb dog odor and I have removed this dog odor from concrete for hundreds of home owners using a very simple technique which has also been used by thousand of pet owners across the world. </span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="742"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Determine if the dog odor is caused by urine, poop or just general dog smell. Apply the premixed 4 part Formula 2 on the affected area and ensure the product penetrates into the concrete. Dog urine will penetrate deeper than dog poop so use 1 pint for urine and half a pint for dog poop. Tip on and leave for 10-30 minutes or until foaming stops.</span></strong></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="740" instrument_node="">To succeed in Dog Odor removal we break the odors into three categories.</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">All three smells will permeate into concrete and each one requires a slightly different approach to ensure success.</span></p><span data-dcnode-id="736" instrument_node="">
</span><ol data-dcnode-id="729"><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Dog Urine Odor</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Dog Poop Odor</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">General Dog Odor (caused by oil in fur and from anal glands) </span></li></ol><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">We look at each odor below and I provide the treatment system I use as a  professional odor removal contractor.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="721"><strong data-dcnode-id="722"><a data-dcnode-id="723" data-id="https://www.conversionplus.club/train-dog" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.conversionplus.club/train-dog" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="724" instrument_node="">Click here for a Free Course on how to stop your dog peeing inside</span></a></strong></p><span data-dcnode-id="720" instrument_node="">
</span><div data-dcnode-id="719" id="cbox-qO7pnqoi9zlsi3Av"></div><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Remove Dog Urine Smell in Concrete Floors.</span></h2><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="714" instrument_node="">Neutralizing dog urine odor in a concrete garage or basement floor is a not difficult if you use an “active” product that has the ability to penetrate into the concrete and react with the urine components. The smell is easily fixed using a cleaning formulation specifically designed for concrete floors. It’s cheap to make and highly efficient.&nbsp;</span><br data-dcnode-id="713"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/more-information/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="712" instrument_node="">Find out more here.</span></a><span data-dcnode-id="710" instrument_node="">&nbsp;</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">An “active” product means once that is mixed just prior to application so the chemicals are still reacting when the solution is applied.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="697"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Step One: Mix up the active product</span></strong><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">Mix up one gallon of our DIY odor neutralizer using </span><a data-dcnode-id="699" data-id="/more-information" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/more-information"><span data-dcnode-id="700" instrument_node="">formula 2</span></a><span data-dcnode-id="698" instrument_node=""> into a bucket or garden water plastic container.</span></p><span data-dcnode-id="696" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="694"><img alt="" class="wp-image-1824" data-dcnode-id="695" height="363" loading="lazy" sizes="(max-width: 484px) 100vw, 484px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/Mix-dog-urine-odor-remover.jpeg&amp;raw" srcset="https://www.odordude.com/wp-content/uploads/2021/05/Mix-dog-urine-odor-remover.jpeg 550w, https://www.odordude.com/wp-content/uploads/2021/05/Mix-dog-urine-odor-remover-300x225.jpeg 300w" width="484"></figure><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="686"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Step Two: Find the areas of contamination.</span></strong><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">Spray or pour the mixed formula 2 on the ground to locate the urine contamination.</span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">The product will foam white (as shown below) when it comes in contact with dog urine or other dog residues that cause odor.</span></p><span data-dcnode-id="685" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="683"><img alt="" class="wp-image-1817" data-dcnode-id="684" height="418" loading="lazy" sizes="(max-width: 478px) 100vw, 478px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/removing-dog-urine-odor-eliminator-1.png&amp;raw" srcset="https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-urine-odor-eliminator-1.png 478w, https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-urine-odor-eliminator-1-300x262.png 300w" width="478"></figure><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="669"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Step No 3: </span></strong><span data-dcnode-id="679" instrument_node="">Once the area of contamination is located </span><strong data-dcnode-id="675"><span data-dcnode-id="678" instrument_node="">apply a heavy dose of my </span><a data-dcnode-id="676" data-id="/more-information" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/more-information"><span data-dcnode-id="677" instrument_node="">formula 2</span></a></strong><span data-dcnode-id="674" instrument_node=""> to the concrete</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">Move the solution around with a soft brush broom. There is no need to scrub as the solution will do the work. </span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">Make sure the product is soaking in. If it is not soaking in it means there is oil or other contaminants on the ground and this will need to be cleaned with a broom so the product can soak in.</span></p><span data-dcnode-id="668" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="666"><img alt="" class="wp-image-1819" data-dcnode-id="667" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/How-to-remove-dog-odor-from-a-garage-1.jpeg&amp;raw" width="480"></figure><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Hot Tip: Dog odor increases when the air is damp especially in humid conditions. The easiest way to find the areas to treat is apply the formula to the most common areas and look for white foaming as shown above</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Step No Four. Leave the product to work for 30 mins or until it stops foaming. Rinse with fresh water and leave to dry</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="654"><strong data-dcnode-id="656"><span data-dcnode-id="658" instrument_node="">Hot Tip</span><br data-dcnode-id="657"></strong><span data-dcnode-id="655" instrument_node="">For older urine contaminations you may need 2 applications (as evident by excessive foaming when premixed concrete is first applied) </span></p><span data-dcnode-id="653" instrument_node="">
</span><h2 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Remove Dog Poop Odor in Concrete Floors.</span></h2><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Dog faeces residues can get walked into the porous concrete and if missed in a cleanup, the oppop starts to produce bacteria which turns into dog poo odor soon after. Follow these steps to remove the poop and the odor.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="646" instrument_node="">How to use our formulation</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">Step No 1.Make the formulation using 4 simple household chemicals mixed into a large bucket. Very cheap to make and goes a long way. </span><a data-dcnode-id="642" data-id="/more-information" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/more-information"><span data-dcnode-id="643" instrument_node="">USE FORMULA TWO</span></a><span data-dcnode-id="641" instrument_node=""> for concrete floors and boost the concentration as outlined inside the members area.</span><br data-dcnode-id="640"></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="630"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Step No 1. Mix up one gallon of formula two as outlined above</span></strong><span data-dcnode-id="635" instrument_node="">.</span><br data-dcnode-id="634"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Step No 2. Apply the formulation to the concrete floor </span></strong><span data-dcnode-id="631" instrument_node="">using a garden watering plastic container and move it around using a soft broom. Look for white foaming which indicates the product is working and burning up the feces. If the dog poop is walked into the concrete you will need to use the broom to scrub that area ensuring all poop is agitated and coated in formula 2.</span></p><span data-dcnode-id="629" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="627"><img alt="" class="wp-image-1828" data-dcnode-id="628" height="460" loading="lazy" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete.jpeg&amp;raw" srcset="https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete.jpeg 400w, https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete-300x300.jpeg 300w, https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete-150x150.jpeg 150w" width="460"></figure><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="622"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Step No 3. Look for white foaming</span></strong><span data-dcnode-id="623" instrument_node="">. More often than not some areas will be worse than others. Quite often we treated dog diarrhoea and because this is runny it penetrates deep into the concrete. This area may foam more than others as thre bacteria will be more prevalent in areas where oxygen has not come into contact</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="617"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Step No 4. Broom in gently and leave for 5-10 minutes ensuring the floor is kept wet all the time</span></strong><span data-dcnode-id="618" instrument_node="">. This gives time to allow the chemicals to work.The formulation will then eat into the dog poop contaminants and  remove the odor.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="612"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Step No 4. When the foaming has stopped leave it and walk away</span></strong><span data-dcnode-id="613" instrument_node="">. Once it is dry the odor will be gone.</span></p><span data-dcnode-id="611" instrument_node="">
</span><h2 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Remove General Dog Odor From Concrete (caused by oil in fur and from anal glands)</span></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">If you are keeping a dog in your garage at night the smell will build up over time, depending on the breed of dog. The floor smells are generally made up of urine, feces and general dog odor from the oils in the dogs fur and often from oils expressed from the anal glands (certain breeds of dogs smell stronger than others and older dogs are the worst usually) so here are some helpful tips to get rid of that infamous smell.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="597"><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Step No 1. Mix up one gallon of formula two as outlined above</span></strong><span data-dcnode-id="602" instrument_node="">.</span><br data-dcnode-id="601"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Step No 2. Apply the formulation to the concrete floor </span></strong><span data-dcnode-id="598" instrument_node="">using a garden watering plastic container and move it around using a soft broom. Look for white foaming which indicates the product is working and burning up the feces. If the dog poop is walked into the concrete you will need to use the broom to scrub that area ensuring all poop is agitated and coated in formula 2.</span></p><span data-dcnode-id="596" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="594"><img alt="" class="wp-image-1828" data-dcnode-id="595" height="460" loading="lazy" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete.jpeg&amp;raw" srcset="https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete.jpeg 400w, https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete-300x300.jpeg 300w, https://www.odordude.com/wp-content/uploads/2021/05/removing-dog-poop-odor-from-concrete-150x150.jpeg 150w" width="460"></figure><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="589"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Step No 3. Look for white foaming</span></strong><span data-dcnode-id="590" instrument_node="">. More often than not some areas will be worse than others. Quite often we treated dog diarrhoea and because this is runny it penetrates deep into the concrete. This area may foam more than others as thre bacteria will be more prevalent in areas where oxygen has not come into contact</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="584"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Step No 4. Broom in gently and leave for 5-10 minutes ensuring the floor is kept wet all the time</span></strong><span data-dcnode-id="585" instrument_node="">. This gives time to allow the chemicals to work.The formulation will then eat into the dog poop contaminants and  remove the odor.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Step No 4. When the foaming has stopped leave it and walk away</span></strong><span data-dcnode-id="580" instrument_node="">. Once it is dry the odor will be gone.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Simply apply and walk away.  Get rid of dog urine smell the easy way.</span></p><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Using Ozone Gas To Remove Dog Odor</span></h2><span data-dcnode-id="572" instrument_node="">

</span><p data-dcnode-id="547"><span data-dcnode-id="550" instrument_node="">Ozone treatment is the easiest way to finish an area of after treatment.</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">The Ozone machine shown above is very effective for providing a finishing touch and sanitizing to the treated area to remove any remaining dog odor. It also can be used also for killing mold in basements, eliminating dust mites in carpet by killing the mold, reducing cooking smells, and many other uses to purify and improve the odors in a home.</span></p><span data-dcnode-id="546" instrument_node="">
