</span></div></div><div class="eight columns omega" data-dcnode-id="1048" id="item-info"><div class="textpad" data-dcnode-id="1049" itemprop="description"><font color="red" data-dcnode-id="1079"><b data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Destroy car odors quickly and permanently with the Odor Bomb! </span></b></font><br data-dcnode-id="1078"><br data-dcnode-id="1077"><b data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The Dakota Odor Bomb is a permanent, one-time odor eliminating fogger. The Odor Bomb penetrates every crevice and crack to destroy all malodors inside your vehicle, home, boat, RV, or office. If a bad smell is lingering in your vehicle, clear the air with an Odor Bomb.</span></b><br data-dcnode-id="1074"><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">The Dakota Odor Bomb is more than an air freshener – it’s a car odor eliminator! The Odor Bomb destroys odors in an entire room with the push of a button. Odors are eliminated permanently. This is not a cover-up deodorizer. </span><b data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Odor Bomb destroys odors caused by urine, feces, decay, rancidity, fire, tobacco smoke, cooking and mildew.</span></b><span data-dcnode-id="1069" instrument_node=""> The worst smells will disappear!</span><br data-dcnode-id="1068"><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">For total annihilation of odors, use the Odor Bomb as a fogger. Place the can on a flat surface and depress the valve into the locking catch and leave the room. Do not disturb the area for at least two hours. Ventilate the room for 30 minutes before reentering. The fragrance may be strong at first. It will dissipate in about 3 days, leaving just clean air. The Odor Bomb’s valve can also be operated to deliver short bursts of spray as well.</span><br data-dcnode-id="1065"><br data-dcnode-id="1064"><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Each Odor Bomb treats 6000 cubic feet, or the size of a typical hotel room.</span></b><span data-dcnode-id="1061" instrument_node=""> The odor-destroying fog permeates fabrics, carpets, and crevices to eliminate odors everywhere. Use the Dakota Odor Bomb inside your vehicle, RV, boat cabin, home or office. Eliminate odors anywhere, safely and permanently.</span><br data-dcnode-id="1060"><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">Neutral Air Fragrance</span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">5 oz.</span><br data-dcnode-id="1054"><br data-dcnode-id="1053"><img data-dcnode-id="1052" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lib.store.yahoo.net/lib/autogeek/warning.gif&amp;raw"><font color="red" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node=""> Federal regulations prohibit the shipment of this products by air, FedEx 3 Day, FedEx 2, or US Mail. This item is shipped by FedEx Ground only. Sorry but no APO or FPO addresses.</span></font></div></div></div><h1 class="pagebanner" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Items You Might Need</span></h1><div class="row ma-item" data-dcnode-id="1021"><div class="three columns alpha info-item" data-dcnode-id="1041"><img alt="Dakota Odor Bomb Car Odor Eliminator - New Car Scent" border="0" data-dcnode-id="1044" height="115" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sep.yimg.com/ay/autogeek/dakota-odor-bomb-car-odor-eliminator-new-car-scent-11.gif&amp;raw" vspace="0" width="50"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autogeek.net/odor-bomb-new-car.html"><span data-dcnode-id="1043" instrument_node="">Dakota Odor Bomb Car Odor Eliminator - New Car Scent</span></a></div><div class="six columns omega" data-dcnode-id="1022"><for
