</span><main class="article__main" data-dcnode-id="590"><span data-dcnode-id="751" instrument_node="">
</span><div class="row" data-dcnode-id="592"><span data-dcnode-id="750" instrument_node="">
</span><div class="columns large-8 large-offset-2" data-dcnode-id="594"><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="747" style="font-weight: 400;"><span data-dcnode-id="748" instrument_node="">If you’re sniffling and sneezing your way through allergy season, adding the right air filter to your HVAC system can help </span></span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/residential/en/resources/improve-the-air-quality-in-your-home/"><span data-dcnode-id="745" style="font-weight: 400;"><span data-dcnode-id="746" instrument_node="">improve your home’s air quality</span></span></a><span data-dcnode-id="742" style="font-weight: 400;"><span data-dcnode-id="743" instrument_node=""> and ease your allergy symptoms. But deciding which filter to choose can be just as tricky as </span></span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thesurvivaldoctor.com/2015/05/04/best-allergy-medicine/" rel="noopener" target="_blank"><span data-dcnode-id="740" style="font-weight: 400;"><span data-dcnode-id="741" instrument_node="">finding the right allergy medicine</span></span></a><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">. Here’s what you need to know before you go shopping. </span></span></p><span data-dcnode-id="735" instrument_node="">
</span><h2 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Traditional Fiberglass Filters</span></h2><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="730" style="font-weight: 400;"><span data-dcnode-id="731" instrument_node="">These are the flat-panel filters that have been around for years.</span></span><span data-dcnode-id="729" instrument_node=""> </span><span data-dcnode-id="727" style="font-weight: 400;"><span data-dcnode-id="728" instrument_node="">They don’t look fancy, but they’re affordable and won’t restrict airflow in your HVAC system as much as the others. However, they’re not great at trapping allergens. These filters will capture&nbsp;less than 10% of the pollutants in your home. But if you’re allergies aren’t terrible, it’s a small investment to give these a try first. </span></span></p><span data-dcnode-id="725" instrument_node="">
</span><h2 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Pleated Fiberglass Filter</span></h2><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node="">The </span></span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/residential/en/products/add-on-components/performance-filter/" rel="noopener" target="_blank"><span data-dcnode-id="718" style="font-weight: 400;"><span data-dcnode-id="719" instrument_node="">pleated filters</span></span></a><span data-dcnode-id="715" style="font-weight: 400;"><span data-dcnode-id="716" instrument_node=""> have a lot more surface area and will filter 45% of allergens in your home — including pollen, dust mites and pet dander. You can even find </span></span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.askthebuilder.com/electrostatic-air-filters/" rel="noopener" target="_blank"><span data-dcnode-id="713" style="font-weight: 400;"><span data-dcnode-id="714" instrument_node="">electrostatic filters</span></span></a><span data-dcnode-id="710" style="font-weight: 400;"><span data-dcnode-id="711" instrument_node=""> made with electrically charged materials that are great at attracting particles. The downside is they’re a little bit more expensive and can restrict airflow in your HVAC system. This means your system will have to work harder and it’ll be hard to </span></span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/residential/en/resources/9-ways-to-save-energy-reduce-your-energy-costs-this-summer/"><span data-dcnode-id="708" style="font-weight: 400;"><span data-dcnode-id="709" instrument_node="">save money on energy costs </span></span></a><span data-dcnode-id="705" style="font-weight: 400;"><span data-dcnode-id="706" instrument_node="">during allergy season. But test one out and see if the thicker filter changes the way your heating and cooling system works. </span></span></p><span data-dcnode-id="703" instrument_node="">
</span><h2 data-dcnode-id="699"><span data-dcnode-id="702" instrument_node="">High-Efficiency Particulate Air (HEPA) filters</span><span data-dcnode-id="700" style="font-weight: 400;"><br data-dcnode-id="701"></span></h2><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="696" style="font-weight: 400;"><span data-dcnode-id="697" instrument_node="">These filters are so good that they remove up to 98% of pollutants in the air, but they’re also so thick that they require an extra fan to push air through the filter. That’s why HEPA filters have to be incorporated into a whole-house filtration system, like the </span></span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/residential/en/products/add-on-components/cleaneffects/"><span data-dcnode-id="694" style="font-weight: 400;"><span data-dcnode-id="695" instrument_node="">Trane CleanEffects™ Air Cleaner</span></span></a><span data-dcnode-id="691" style="font-weight: 400;"><span data-dcnode-id="692" instrument_node="">. Filtration systems like this can trap particles down to .1 micron in size. And while these filters have the highest cost, they also the biggest impact on improving allergy symptoms. </span></span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="679"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Before you make your final decision, compare the </span></b><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/residential/en/resources/glossary/what-is-clean-air-delivery-rate.html"><b data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Clean Air Delivery Rate</span></b></a><b data-dcnode-id="682"><span data-dcnode-id="683" instrument_node=""> (CADR) </span></b><span data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" instrument_node="">of common filter types. You may pay a little more for a higher CADR, but your sinuses will thank you.</span></span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><img alt="" class="alignleft size-large wp-image-410" data-dcnode-id="677" height="1024" sizes="(max-width: 946px) 100vw, 946px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trane.com/wp-content/uploads/2018/04/air-filters_traneCE-946x1024.jpg&amp;raw" srcset="https://www.trane.com/wp-content/uploads/2018/04/air-filters_traneCE-946x1024.jpg 946w, https://www.trane.com/wp-content/uploads/2018/04/air-filters_traneCE-277x300.jpg 277w, https://www.trane.com/wp-content/uploads/2018/04/air-filters_traneCE-768x831.jpg 768w, https://www.trane.com/wp-content/uploads/2018/04/air-filters_traneCE.jpg 957w" width="946"></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="670"><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Finally, keep in mind that an air filter is just one part of your allergy battle plan. </span></b><span data-dcnode-id="671" style="font-weight: 400;"><span data-dcnode-id="672" instrument_node="">You’ll have a better chance of wiping out allergies if you use multiple tactics. Try adding some of these simple tips into your routine.</span></span></p><span data-dcnode-id="669" instrument_node="">
</span><ul data-dcnode-id="631"><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Keep pets off of furniture and out of bedrooms. If your pets are outside often, allergens will stick to their fur and they’ll bring those particles indoors with them.</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Shower before you go to bed to remove any allergens that are on your hair and skin.</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="654"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="661" instrument_node="">Wash clothing and linens with super hot water to </span></span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/laundry-tips-to-reduce-dust-mites-2146204" rel="noopener" target="_blank"><span data-dcnode-id="658" style="font-weight: 400;"><span data-dcnode-id="659" instrument_node="">banish dust mites</span></span></a><span data-dcnode-id="655" style="font-weight: 400;"><span data-dcnode-id="656" instrument_node="">.</span></span></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="651" style="font-weight: 400;"><span data-dcnode-id="652" instrument_node="">Vacuum, vacuum, vacuum. A fast way to reduce sniffle-inducing dust and allergens is to vacuum once a day.</span></span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" style="font-weight: 400;"><span data-dcnode-id="648" instrument_node="">Keep your windows closed and limit your time outdoors to reduce exposure to pollen and outdoor allergens.</span></span></li><span data-dcnode-id="645" instrument_node="">

</span></ul><span data-dcnode-id="630" instrument_node="">
</span><blockquote data-dcnode-id="622"><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="624"><b data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">THE BOTTOM LINE:</span></b><span data-dcnode-id="625" style="font-weight: 400;"><span data-dcnode-id="626" instrument_node=""> Every allergy sufferer and HVAC system is unique, so you’ll need to see how different filters affect your allergy symptoms and your heating and cooling system’s operation. A little trial and error will help you find the perfect filter for your home (and your nose). </span></span></p><span data-dcnode-id="623" instrument_node="">
</span></blockquote><span data-dcnode-id="621" instrument_node="">
