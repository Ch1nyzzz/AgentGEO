</span><h2 data-dcnode-id="2268"><strong data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Best types of floors for those with allergies or asthma</span></strong></h2><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2260"><big data-dcnode-id="2261"><big data-dcnode-id="2262"><img alt="flooring best for allergies - best type of flooring for asthma" class="alignright wp-image-11967 size-medium entered lazyloaded" data-dcnode-id="2266" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg" data-lazy-srcset="https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-768x576.jpg 768w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-510x382.jpg 510w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies.jpg 960w" data-ll-status="loaded" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg&amp;raw" srcset="https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-768x576.jpg 768w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-510x382.jpg 510w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies.jpg 960w" width="300"><noscript data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">&lt;img class="alignright wp-image-11967 size-medium" src="https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg" alt="flooring best for allergies - best type of flooring for asthma" width="300" height="225" srcset="https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-300x225.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-768x576.jpg 768w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies-510x382.jpg 510w, https://theflooringgirl.com/wp-content/uploads/Types-of-floors-best-for-allergies.jpg 960w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2263" instrument_node="">If you or your kids have allergies or asthma, selecting the best type of flooring can have a big impact on the air quality, as many allergens can collect and get trapped in the floors.&nbsp; Often, the flooring can be the biggest source of allergens.&nbsp; </span></big></big></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2247"><big data-dcnode-id="2251"><big data-dcnode-id="2252"><span data-dcnode-id="2255" instrument_node="">As a general rule, carpeting is the worst choice for allergies while wood or cork flooring are the best selections.&nbsp; And, generally hard surfaces will be better options than carpet.</span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">
</span></big></big><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">
</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2243"><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Please note that this article may contain affiliate links.&nbsp; You can read my full disclosure at the bottom of the page.</span></em></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2239" instrument_node="">
</span><div data-dcnode-id="2238" id="mmt-08914182-dc2d-43b7-ad63-cad34f3fcbba"></div><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2234" instrument_node="">
</span><h3 data-dcnode-id="2231"><big data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Reasons to avoid carpets if you have allergies</span></big></h3><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2223"><big data-dcnode-id="2224"><big data-dcnode-id="2225"><img alt="best types of flooring if you are an allergy sufferer" class="alignright size-full wp-image-13007 entered lazyloaded" data-dcnode-id="2229" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg" data-lazy-srcset="https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies-150x300.jpg 150w" data-ll-status="loaded" height="600" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg&amp;raw" srcset="https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies-150x300.jpg 150w" width="300"><noscript data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">&lt;img class="alignright size-full wp-image-13007" src="https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg" alt="best types of flooring if you are an allergy sufferer" width="300" height="600" srcset="https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Best-flooring-if-your-have-allergies-150x300.jpg 150w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2226" instrument_node="">Allergy sufferers should avoid the deep pile of most carpets as these tend to hold allergens from dust mites, mold, pollen, pet dander, as well as dirt. Carpeting can also retain moisture, which encourages the growth of mold and mildew. </span></big></big></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2213"><big data-dcnode-id="2214"><big data-dcnode-id="2215"><span data-dcnode-id="2218" instrument_node="">Some dispute the negative relationship of carpeting to allergies, but there is no doubt that it holds more dust, dirt and moisture than any other kind of flooring, making it an ideal environment for dust mites.</span><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
</span></big></big></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2196"><big data-dcnode-id="2197"><big data-dcnode-id="2198"><span data-dcnode-id="2211" instrument_node="">If you have carpet, or area rugs (or are required to have carpet), low pile (including looped carpets) are better options and so are natural fiber carpets such as </span><span data-dcnode-id="2208" style="color: #0000ff;"><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/flooring/carpet-and-runners/wool-carpeting.html" style="color: #0000ff;"><span data-dcnode-id="2210" instrument_node="">wool</span></a></span><span data-dcnode-id="2207" instrument_node=""> or </span><span data-dcnode-id="2204" style="color: #0000ff;"><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/green-flooring/what-is-sisal-carpeting-sisal-carpet-in-westchester-county.html" style="color: #0000ff;"><span data-dcnode-id="2206" instrument_node="">sisal</span></a></span><span data-dcnode-id="2203" instrument_node="">.&nbsp; And, if you do have carpet, vacuum frequently.&nbsp; There are also hypoallergenic and low VOC carpet padding (such as felt or </span><span data-dcnode-id="2200" style="color: #0000ff;"><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/carpet-and-runners/moisture-barrier-carpet-pad-westchester-county-ny.html" style="color: #0000ff;"><span data-dcnode-id="2202" instrument_node="">Shaw’s Triple Touch Carpet padding</span></a></span><span data-dcnode-id="2199" instrument_node="">) which tend to be better for allergies or asthma.&nbsp; But, hardwood or cork (or other hard surfaces) are generally much better options.</span></big></big></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2192" instrument_node="">
</span><h3 data-dcnode-id="2189"><big data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Hardwood and Cork are the best flooring options for allergy sufferers</span></big></h3><span data-dcnode-id="2188" instrument_node="">
</span><h4 data-dcnode-id="2182" style="padding-left: 30px;"><img alt="hardwood flooring best for allergies" class="alignright wp-image-4842 size-medium entered lazyloaded" data-dcnode-id="2187" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg" data-lazy-srcset="https://theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg 300w, https://theflooringgirl.com/wp-content/uploads/90926598.jpg 800w" data-ll-status="loaded" height="199" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg&amp;raw" srcset="https://theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg 300w, https://theflooringgirl.com/wp-content/uploads/90926598.jpg 800w" width="300"><noscript data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">&lt;img class="alignright wp-image-4842 size-medium" src="https://theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg" alt="hardwood flooring best for allergies" width="300" height="199" srcset="https://theflooringgirl.com/wp-content/uploads/90926598-300x199.jpg 300w, https://theflooringgirl.com/wp-content/uploads/90926598.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><big data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Hardwood flooring</span></big></h4><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2175" style="padding-left: 30px;"><big data-dcnode-id="2176"><big data-dcnode-id="2177"><span data-dcnode-id="2180" instrument_node="">Hardwood flooring is an excellent choice for those with asthma or allergies since it’s easy to clean and maintain.&nbsp; It’s the preferred flooring surface for homes in Westchester County and the East Coast.&nbsp; Unlike carpet, hardwood doesn’t trap allergens nor does it provide an environment for them to grow.</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">
</span></big></big></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2163" style="padding-left: 30px;"><big data-dcnode-id="2165"><big data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node="">By the way, you may also find this article helpful:&nbsp; </span><span data-dcnode-id="2167" style="color: #0000ff;"><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/hardwood-flooring/the-top-5-hardwood-floor-cleaners-and-the-one-that-i-recommend.html" style="color: #0000ff;"><span data-dcnode-id="2169" instrument_node="">The Top 5 hardwood cleaning products…and the one I recommend to my customers</span></a></span></big></big><span data-dcnode-id="2164" instrument_node="">.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2159" instrument_node="">
</span><h4 data-dcnode-id="2156" style="padding-left: 30px;"><big data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Cork flooring</span></big></h4><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2145" style="padding-left: 30px;"><big data-dcnode-id="2146"><big data-dcnode-id="2147"><span data-dcnode-id="2154" instrument_node="">Cork floors are a wonderful alternative to hardwood.&nbsp; They are inherently mold and mildew resistant due to the antimicrobial presence of suberin.&nbsp; This naturally occurring substance inhibits the growth of mold, mildew, bacteria and other allergens.&nbsp; Cork also helps insulate heat, so they are warm on your feet and they are cozy on your feet. The hard surface mak</span><img alt="cork flooring good for allergies" class="alignright wp-image-11968 size-full entered lazyloaded" data-dcnode-id="2153" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/cork-and-bamboo.jpg" data-ll-status="loaded" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/wp-content/uploads/cork-and-bamboo.jpg&amp;raw" width="272"><noscript data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">&lt;img class="alignright wp-image-11968 size-full" src="https://theflooringgirl.com/wp-content/uploads/cork-and-bamboo.jpg" alt="cork flooring good for allergies" width="272" height="204" /&gt;</span></noscript><span data-dcnode-id="2150" instrument_node="">es it easy to clean with a dust mop (ideally a swiffer).&nbsp; Even though cork is porous, the finish prevents allergens from collecting and growing.</span><br data-dcnode-id="2149"><span data-dcnode-id="2148" instrument_node="">
</span></big></big></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2136" style="padding-left: 30px;"><big data-dcnode-id="2137"><big data-dcnode-id="2138"><span data-dcnode-id="2143" instrument_node="">And, cork flooring does not require a plywood subfloor, so they provide a great alternative if you have a concrete subfloor in an apartment or lower level of you house.&nbsp; Most cork floors, though, are floating, so it’s important that your subfloor is level/even, otherwise you may need to smooth and/or level out the floors prior to installing cork.&nbsp; Cork is also an eco-friendly product.&nbsp; You can </span><span data-dcnode-id="2140" style="color: #0000ff;"><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/green-flooring/cork-flooring-how-is-cork-made-and-why-is-it-considered-green.html" style="color: #0000ff;"><span data-dcnode-id="2142" instrument_node="">read more about cork here – Cork flooring – how is it made and why is it considered green</span></a></span><span data-dcnode-id="2139" instrument_node="">?</span></big></big></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2125" style="padding-left: 30px;"><big data-dcnode-id="2126"><big data-dcnode-id="2127"><span data-dcnode-id="2134" instrument_node="">If you’re interested in buying some cork flooring online, check out </span><span data-dcnode-id="2131" style="color: #0000ff;"><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flooringinc.com/wood/cork-flooring.html%3Futm_source%3DReferral%26utm_campaign%3DDebbie%2520Gartner%26utm_medium%3DAffiliate" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="2133" instrument_node="">US Floors Natural Cork line</span></a></span><span data-dcnode-id="2130" instrument_node="">.</span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">
</span></big></big></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2121" instrument_node="">
</span><h3 data-dcnode-id="2118"><big data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Tile and Linoleum are also suitable surfaces for those with allergies</span></big></h3><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2109"><big data-dcnode-id="2114"><big data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">While hardwood and cork are generally the best options for those with asthma and allergies, stone or tile flooring, as well as linoleum are also great options.&nbsp; The tile and linoleum are better options for wet and moist areas such as bathrooms and mudrooms.</span></big></big><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">
</span><span data-dcnode-id="2110" style="font-size: 11pt;"><span data-dcnode-id="2111" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2108" instrument_node="">
</span><h4 data-dcnode-id="2105" style="padding-left: 30px;"><big data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Porcelain and Ceramic Tile</span></big></h4><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2097" style="padding-left: 30px;"><big data-dcnode-id="2098"><big data-dcnode-id="2099"><img alt="tile flooring good for allergies" class="alignright size-full wp-image-3611 entered lazyloaded" data-dcnode-id="2103" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/Linear-tile-pattern.jpg" data-ll-status="loaded" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/wp-content/uploads/Linear-tile-pattern.jpg&amp;raw" width="300"><noscript data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">&lt;img class="alignright size-full wp-image-3611" src="https://theflooringgirl.com/wp-content/uploads/Linear-tile-pattern.jpg" alt="tile flooring good for allergies" width="300" height="225" /&gt;</span></noscript><span data-dcnode-id="2100" instrument_node="">Stone, porcelain and ceramic tiles are also great choices for allergy-free flooring, but the more rough the stone surface, the more dirt they will hold.</span></big></big></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2092" style="padding-left: 30px;"><big data-dcnode-id="2093"><big data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Not all tile flooring is allergy friendly. As a general rule, smooth stone will be much less likely to harbor allergens than a tile that is porous or has rough edges or is highly textured.. Polished marble and granite are excellent choices (for those with allergies), but natural-looking stone with a textured finishes and uneven surfaces can provide pockets for mold and other allergens to collect and develop.</span></big></big></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2087" style="padding-left: 30px;"><big data-dcnode-id="2088"><big data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">With natural stone, it’s important to seal it to prevent mold and bacteria from growing) and for all types of tile (natural stone, porcelain and ceramic), it’s important to seal the grout, and reseal it, ideally every 1-2 years.</span></big></big></p><span data-dcnode-id="2086" instrument_node="">
</span><h4 data-dcnode-id="2083" style="padding-left: 30px;"><big data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Linoleum</span></big></h4><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2069" style="padding-left: 30px;"><big data-dcnode-id="2070"><big data-dcnode-id="2071"><img alt="Linoleum flooring good for asthma" class="alignright size-medium wp-image-4053" data-dcnode-id="2081" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2-300x239.jpg" data-lazy-srcset="https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2-300x239.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2.jpg 615w" height="239" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20239'%3E%3C/svg%3E" width="300"><noscript data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">&lt;img class="alignright size-medium wp-image-4053" src="https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2-300x239.jpg" alt="Linoleum flooring good for asthma" width="300" height="239" srcset="https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2-300x239.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Linoleum-gray2.jpg 615w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2078" instrument_node="">Linoleum is also a natural product that also is a good option for those with allergies or asthma.&nbsp; It’s easy to clean and holds up well to water.&nbsp; Unlike vinyl, which is petroleum based, linoleum is made with linseed oil and it’s eco-friendly.&nbsp;&nbsp; You can read more about it here – </span><span data-dcnode-id="2075" style="color: #0000ff;"><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/blog/whats-the-difference-between-linoleum-and-vinyl-flooring.html" style="color: #0000ff;"><span data-dcnode-id="2077" instrument_node="">What’s the difference between linoleum and vinyl</span></a></span><span data-dcnode-id="2074" instrument_node="">?</span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">
</span></big></big></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2065" instrument_node="">
</span><h3 data-dcnode-id="2062"><big data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Laminate and vinyl are alternative flooring options for those with asthma or allergies</span></big></h3><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2057"><big data-dcnode-id="2058"><big data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Laminate and vinyl are alternative synthetic options.&nbsp; As they are synthetic products (vs. hardwood or cork which are natural), they may tend to cause other issues, especially with cheaper options.&nbsp; If you opt for a laminate or vinyl product, try to select an option that has low VOC’s (Volatile Organic Compounds) and be cognizant of the adhesive used. </span></big></big></p><span data-dcnode-id="2056" instrument_node="">
</span><h4 data-dcnode-id="2054" style="padding-left: 30px;"><span data-dcnode-id="2055" instrument_node="">Laminate flooring</span></h4><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2047" style="padding-left: 30px;"><big data-dcnode-id="2048"><big data-dcnode-id="2049"><span data-dcnode-id="2052" instrument_node="">Laminate flooring may or may not be a good choice for those with allergies – it can depend on the manufacturer and the grade of product.&nbsp; Laminate uses recycled hardwood and the product is manufactured by gluing together layers of wood composite.&nbsp; The adhesives used in the process may contain formaldehyde as well as other dangerous VOCs, and these can trigger other allergies – sometimes immediately, and other times over time.&nbsp; Always check the product to see the formaldehyde rating (E1 or E0 are the best choices).&nbsp; Nonetheless, laminate provides a hard surface that is easy to clean and like hardwood, it doesn’t harbor dust or dander.</span><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">
</span></big></big></p><span data-dcnode-id="2046" instrument_node="">
</span><h4 data-dcnode-id="2043" style="padding-left: 30px;"><big data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Vinyl</span></big></h4><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2031" style="padding-left: 30px;"><big data-dcnode-id="2032"><big data-dcnode-id="2033"><img alt="Luxury vinyl Westchester Van Gogh" class="alignright size-medium wp-image-2510" data-dcnode-id="2041" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh-300x244.jpg" data-lazy-srcset="https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh-300x244.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh.jpg 540w" height="244" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20244'%3E%3C/svg%3E" width="300"><noscript data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">&lt;img class="alignright size-medium wp-image-2510" src="https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh-300x244.jpg" alt="Luxury vinyl Westchester Van Gogh" width="300" height="244" srcset="https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh-300x244.jpg 300w, https://theflooringgirl.com/wp-content/uploads/Luxury-vinyl-Westchester-Van-Gogh.jpg 540w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2038" instrument_node="">Similar to cork flooring, some high-end vinyl floors (often called </span><span data-dcnode-id="2035" style="color: #0000ff;"><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/vinyl-flooring/luxury-vinylcan-you-believe-its-vinyl.html" style="color: #0000ff;" title="Luxury vinyl and high end vinyl flooring"><span data-dcnode-id="2037" instrument_node="">luxury vinyl</span></a></span><span data-dcnode-id="2034" instrument_node="">) can offer the advantages of a hard surface – easy to clean, no pockets for moisture – and many have an antibacterial agent built into them.&nbsp; However, especially when it comes to vinyl, you “get what you pay for,” and lower end vinyl flooring is often manufactured with VOC’s which create emissions and hence an allergen risk or other breathing challenges.</span></big></big></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2023" style="padding-left: 30px;"><big data-dcnode-id="2024"><big data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">This doesn’t mean that vinyl, (or laminates) should be avoided at all costs. On the contrary, these are durable, cost-effective products that tend to be far better for allergies than carpet; it’s just important that you research the products and select higher end options rather than cheaper alternatives.</span></big></big></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2019" instrument_node="">

</span><p data-dcnode-id="1927"><big data-dcnode-id="1928"><big data-dcnode-id="1929"><span data-dcnode-id="1934" instrument_node="">Regardless of which flooring surface you use, it’s important to keep the floors clean.&nbsp; Even solid hardwood (which is often the best choice), can result in sneezes (as well as scratches) if you don’t keep it clean.&nbsp; Thankfully, dust that has settled on hardwood is far easier to wipe away (or swiffer away) than dirt that has settled into the carpet (</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/cleaning-products.html"><span data-dcnode-id="1932" style="color: #0000ff;"><span data-dcnode-id="1933" instrument_node="">here are some cleaning products we recommend</span></span></a><span data-dcnode-id="1930" instrument_node="">).&nbsp; </span></big></big></p><span data-dcnode-id="1926" instrument_node="">

ma.</span></big></big></p><span data-dcnode-id="1914" instrument_node="">

</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">I’ve never heard of someone being allergic to trees.  I’ve heard of tree pollen and mold, but not trees.  Are you sure?  I would think, but I could be wrong, that would products would be okay as they don’t have pollen, etc.  How is your daughter surviving if she is allergic to trees.  Does that mean she can’t go outside?  Do you have any sort of wood in your house or furniture?  Do you have plywood subfloor or wood in the house?  Wouldn’t there be wood at school (e.g. at the desks, chairs, etc). I would check/get clarification with your doctor and then ask your doctor what he or she would recommend.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">BTW, an alternative to laminate, which is much better and waterproof is Coretec Plus.  </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theflooringgirl.com/blog/review-coretec-plus-luxury-vinyl-waterproof-hardwood-planks.html" rel="nofollow ugc"><span data-dcnode-id="1253" instrument_node="">https://theflooringgirl.com/blog/review-coretec-plus-luxury-vinyl-waterproof-hardwood-planks.html</span></a><span data-dcnode-id="1251" instrument_node="">.  But, it may have a tad of wood shavings in the core.  Nonetheless, the top part that would be exposed is vinyl and should be okay.  I’m not sure if that product existed at the time I wrote the allergy issue.</span></p><span data-dcnode-id="1249" instrument_node="">
