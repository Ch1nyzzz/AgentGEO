_node="">Beside above,  where are allergies worse in the US? </span><span data-dcnode-id="1059"><span data-dcnode-id="1060"><span data-dcnode-id="1076" instrument_node="">The AAFA also broke down the </span><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">allergies</span></b><span data-dcnode-id="1073" instrument_node=""> by region. McAllen is the </span><b data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">worst</span></b><span data-dcnode-id="1070" instrument_node=""> in the South while Toledo, Ohio, was the </span><b data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">worst</span></b><span data-dcnode-id="1067" instrument_node=""> spot for </span><b data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">allergies</span></b><span data-dcnode-id="1064" instrument_node=""> in the Midwest, Fresno, California was ranked bottom in the West, and Providence, Rhode Island, came in as </span><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">worst</span></b><span data-dcnode-id="1061" instrument_node=""> in the Northeast.</span></span></span></p><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node=""> Similarly, it is asked,  is a dry climate better for allergies?</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1055" instrument_node=""> </span><span data-dcnode-id="1043"><span data-dcnode-id="1044"><span data-dcnode-id="1054" instrument_node="">Many people who suffer from </span><b data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">allergy</span></b><span data-dcnode-id="1051" instrument_node=""> issues often believe that more </span><b data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">dry climates</span></b><span data-dcnode-id="1048" instrument_node="">, such as the desert, will help relieve their symptoms. While it may help some people, a more </span><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">dry climate</span></b><span data-dcnode-id="1045" instrument_node=""> may actually make things worse!</span></span></span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Are allergies better near the ocean?</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022"><span data-dcnode-id="1023"><span data-dcnode-id="1039" instrument_node="">Does living </span><b data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">close to the ocean</span></b><span data-dcnode-id="1036" instrument_node=""> (within a mile or so) help with </span><b data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">allergies</span></b><span data-dcnode-id="1033" instrument_node="">, perhaps due to lower pollen counts? A: Unfortunately, living </span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">near the ocean</span></b><span data-dcnode-id="1030" instrument_node=""> does not decrease seasonal </span><b data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">allergies</span></b><span data-dcnode-id="1027" instrument_node="">. Some types of pollen have been found up to 400 miles out to </span><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">sea</span></b><span data-dcnode-id="1024" instrument_node="">.</span></span></span></p><span data-dcnode-id="1020" instrument_node=""> </span></div><span data-dcnode-id="1018" instrument_node="">

</span><p data-dcnode-id="937" style="display:inline;"></p><div data-dcnode-id="924"><span data-dcnode-id="925"><span data-dcnode-id="926"><span data-dcnode-id="936" instrument_node="">Hot, humid air can cause </span><b data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">asthma</span></b><span data-dcnode-id="933" instrument_node=""> symptoms as well. Humidity helps common allergens like dust mites and mold thrive, aggravating allergic </span><b data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">asthma</span></b><span data-dcnode-id="930" instrument_node="">. Air pollution, ozone and pollen also go up when the </span><b data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">weather</span></b><span data-dcnode-id="927" instrument_node=""> is hot and humid. Particles in the air irritate sensitive airways.</span></span></span></div><p data-dcnode-id="923"></p><span data-dcnode-id="922" instrument_node="">
