</span><article class="fl-post post-253864 post type-post status-publish format-standard has-post-thumbnail hentry category-uncategorized" data-dcnode-id="148" id="fl-post-253864" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="343" instrument_node="">
</span><header class="fl-post-header" data-dcnode-id="309" role="banner"><span data-dcnode-id="342" instrument_node="">
</span><h1 class="fl-post-title" data-dcnode-id="340" itemprop="headline"><span data-dcnode-id="341" instrument_node="">
			Furnace Air Filter Guide: What Air Filters Are Best?					</span></h1><span data-dcnode-id="339" instrument_node="">
</span><div class="fl-post-meta fl-post-meta-top" data-dcnode-id="322"><span class="fl-post-author" data-dcnode-id="334"><span data-dcnode-id="338" instrument_node="">By </span><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comfortsystems.net/author/comfort-systems/"><span data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Comfort Systems</span></span></a></span><span class="fl-sep" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node=""> | </span></span><span class="fl-post-date" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">November 19, 2018</span></span><span class="fl-sep" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node=""> | </span></span><span class="fl-comments-popup-link" data-dcnode-id="323"><span data-dcnode-id="324"><span data-dcnode-id="327" instrument_node="">Comments Off</span><span class="screen-reader-text" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node=""> on Furnace Air Filter Guide: What Air Filters Are Best?</span></span></span></span></div><meta content="Furnace Air Filter Guide: What Air Filters Are Best?" data-dcnode-id="321" itemid="https://comfortsystems.net/furnace-air-filter-guide/" itemprop="mainEntityOfPage" itemscope="" itemtype="https://schema.org/WebPage"><meta content="2018-11-19" data-dcnode-id="320" itemprop="datePublished"><meta content="2018-11-19" data-dcnode-id="319" itemprop="dateModified"><div data-dcnode-id="317" itemprop="publisher" itemscope="" itemtype="https://schema.org/Organization"><meta content="Comfort Systems" data-dcnode-id="318" itemprop="name"></div><div data-dcnode-id="314" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><meta content="https://comfortsystems.net/author/comfort-systems/" data-dcnode-id="316" itemprop="url"><meta content="Comfort Systems" data-dcnode-id="315" itemprop="name"></div><div data-dcnode-id="311" itemprop="interactionStatistic" itemscope="" itemtype="https://schema.org/InteractionCounter"><meta content="https://schema.org/CommentAction" data-dcnode-id="313" itemprop="interactionType"><meta content="0" data-dcnode-id="312" itemprop="userInteractionCount"></div><span data-dcnode-id="310" instrument_node=""> </span></header><span data-dcnode-id="307" instrument_node="">
</span><div class="fl-post-content clearfix" data-dcnode-id="157" itemprop="text"><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="303"><img alt="Best Furnace Air Filter Guide" class="alignright size-medium wp-image-253865" data-dcnode-id="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comfortsystems.net/wp-content/uploads/2018/11/best-furnace-air-filter-guide-300x239.jpg&amp;raw"><span data-dcnode-id="304" instrument_node="">The furnace air filter is a critical component of any forced air HVAC system. There are different types and sizes offering different benefits for cleaner air and HVAC equipment. With regular furnace filter maintenance, your HVAC system will perform optimally – here’s what you need to know to make smart furnace filter choices for your home and system.</span></p><span data-dcnode-id="302" instrument_node="">
</span><h2 data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Types of Furnace Air Filters</span></h2><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">There are a few different options to choose from when it comes to selecting a furnace air filter for your system. The main types and their advantages are:</span></p><span data-dcnode-id="296" instrument_node="">
</span><h3 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Fiberglass/Synthetic Filters</span></h3><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Fiberglass or synthetic filters are a cheap and disposable option for your furnace. They catch up to 80% of particles 50 microns and larger and 25% of particles between 3 to 10 microns. Considered minimum protection, fiberglass/synthetic filters prevent dust and dirt from building up on heat exchangers, fan motors, and other surfaces. The larger particles are trapped and eliminated, so your furnace components remain clean. They allow your system to have maximum airflow but don’t filter harmful contaminants affecting your health.</span></p><span data-dcnode-id="290" instrument_node="">
</span><h3 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Polyester Filters</span></h3><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Polyester filters are made using the highest quality materials available and are median-sized. They trap and eliminate 80% to 95% of particles 5 microns or larger. A polyester filter costs fours time more than the average fiberglass/synthetic filter, but it offers more protection against pollutants that cause health issues.</span></p><span data-dcnode-id="284" instrument_node="">
</span><h3 data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Electrostatic Filters</span></h3><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Electrostatic filters use self-charging fibers to attract particles out of your air. You can purchase disposable or washable electrostatic filters depending on the requirements of your furnace. Washable versions offer a MERV rating between 4 and 10 and last considerably longer than the average filter. Maintenance on a washable filter requires soap and water to wash the filter and letting it completely dry before reinstalling it. If you install it before it completely dries, you run the risk of mildew and mold growth.</span></p><span data-dcnode-id="278" instrument_node="">
</span><h3 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Pleated Filters</span></h3><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">A pleated filter offers high-efficiency results by trapping particulates 0.3 micron in size, such as bacteria and viruses. Pleated filters are more efficient and last longer compared to fiberglass/synthetic filters. They eliminate more pollutants from your air without sacrificing airflow within your system.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">&nbsp;</span></p><span data-dcnode-id="269" instrument_node="">
</span><h3 data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">HEPA Filters</span></h3><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">High efficiency particulate air, or HEPA, filters provide high-end filtration by trapping up to 99% of particles 0.3 microns or larger. Even though they are excellent at eliminating indoor pollutants and create a healthier environment in your home, they can drastically reduce your system’s airflow, costing more money in energy usage.</span></p><span data-dcnode-id="263" instrument_node="">
</span><h2 data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Furnace Air Filter Ratings</span></h2><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">In addition to styles, furnace air filters have different ratings. Filters are rated by MERV (minimum efficiency reporting valve). The higher the number, the more efficient it is at removing contaminants from your air.</span></p><span data-dcnode-id="257" instrument_node="">
</span><ul data-dcnode-id="249"><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="251"><span data-dcnode-id="255" instrument_node="">
</span><h3 data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">MERV 1-4</span></h3><span data-dcnode-id="252" instrument_node="">
</span></li><span data-dcnode-id="250" instrument_node="">
</span></ul><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">These filters offer a minimum amount of protection as they are primarily designed to assist the cleanliness of the HVAC units by filtering out particles that can damage the coils and harm the efficiency of the unit. They remove pollen, dust mites, and other harmful fibers. With 20% dust spot efficiency, these filters are the best option where budget is a concern and health issues are minimal.</span></p><span data-dcnode-id="245" instrument_node="">
</span><ul data-dcnode-id="237"><span data-dcnode-id="244" instrument_node="">
</span><li data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">
</span><h3 data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">MERV 5-8</span></h3><span data-dcnode-id="240" instrument_node="">
</span></li><span data-dcnode-id="238" instrument_node="">
</span></ul><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">These filters are a step up from the MERV 1-4 air filters. Here, the air filter is able to also remove mold spores and dust from the air. These filters have a 20-35% dust spot efficiency and offer higher air filtration than lower rated filters while remaining budget friendly.</span></p><span data-dcnode-id="233" instrument_node="">
</span><ul data-dcnode-id="225"><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">
</span><h3 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">MERV 9-12</span></h3><span data-dcnode-id="228" instrument_node="">
</span></li><span data-dcnode-id="226" instrument_node="">
</span></ul><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">These filters catch the smaller particles such as those known to cause allergies. A MERV 9-12 filter will remove pet dander, auto emissions and other smaller airborne particles from the air, creating a cleaner air supply. This is a great choice for those who have mild to moderate allergies or other respiratory ailments. The MERV 9-12 filters will also extend the life of the HVAC system by keeping the unit clean and free of debris and dust build-up.</span></p><span data-dcnode-id="221" instrument_node="">
</span><ul data-dcnode-id="213"><span data-dcnode-id="220" instrument_node="">
</span><li data-dcnode-id="215"><span data-dcnode-id="219" instrument_node="">
</span><h3 data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">MERV 13-16</span></h3><span data-dcnode-id="216" instrument_node="">
</span></li><span data-dcnode-id="214" instrument_node="">
</span></ul><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">These filters are the highest quality home filters available other than HEPA filters, making them great for those who are often afflicted by allergies and respiratory issues. The filters in this range are the ultimate protection against dust, pollen, mold, bacteria, viruses and the smaller airborne particles that often make breathing difficult for people with advanced sensitivities to poor air quality or weakened immune systems. As the ratings of the air filters increase, so do the prices, but the extra cost is worth it to keep your home healthy and comfortable.</span></p><span data-dcnode-id="209" instrument_node="">
</span><h2 data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Sizes of Furnace Air Filters</span></h2><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Furnace air filters come in different sizes. It is important that you select a replacement furnace air filter that fits your unit’s filter cabinet correctly, or else you will have airflow obstructions, hindering the performance of your HVAC system.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">While there are a broad range of sizes available, the most common are as follows, with depths ranging from one to six inches:</span></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">10 X 20, 14 X 20, 16 X 24, 18 X 30, 12 X 12, 14 X 24, 16 X 25, 20 X 20, 12 X 20, 14 X 25, 18 X 18, 20 X 24, 12 X 24, 14 X 30, 18 X 20, 20 X 25, 12 X 30, 15 X 20, 18 X 24, 20 X 30, 12 X 36, 16 X 20, 18 X 25, 4 X 24, and 25 X 25</span></p><span data-dcnode-id="197" instrument_node="">
</span><h2 data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">How Often Should Furnace Air Filters Be Changed?</span></h2><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Furnace air filters need to be changed on a regular basis because they become clogged with pollutants over time. Failing to change your filter will result in airflow obstructions, stressing your system and leaving your home without the desired heating and cooling.</span></p><span data-dcnode-id="191" instrument_node="">
</span><h2 data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Filter Guidelines</span></h2><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Most filters have a recommended guideline detailing how long they last or when they should be changed. When you purchase a new filter, check the packaging for these details. The standard time recommended to change a high-quality air filter is at least once every three months. However, if the filter appears dirty, change it immediately! Dirty or clogged air filters prevent healthy air flow, damage components inside your air conditioner, and decrease your system’s efficiency.</span></p><span data-dcnode-id="185" instrument_node="">
</span><h3 data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Factors at Play</span></h3><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">If your filter doesn’t indicate when it should be changed, there are some factors to consider when deciding how often to change it:</span></p><span data-dcnode-id="179" instrument_node="">
</span><ul data-dcnode-id="162"><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Number of occupants in the house</span></li><span data-dcnode-id="175" instrument_node="">
</span><li data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">The overall air quality in your home</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">The type of filter your air conditioner requires</span></li><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Any construction or remodeling in or around your house</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">If there are pets in the home</span></li><span data-dcnode-id="163" instrument_node="">
</span></ul><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">When you have more contaminants in the home, from pets, people, and activities, air filters should be changed more frequently.</span></p><span data-dcnode-id="158" instrument_node="">
</span></div><span data-dcnode-id="155" instrument_node="">
</span><div class="fl-post-meta fl-post-meta-bottom" data-dcnode-id="150"><div class="fl-post-cats-tags" data-dcnode-id="151"><span data-dcnode-id="154" instrument_node="">Posted in </span><a data-dcnode-id="152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comfortsystems.net/category/uncategorized/" rel="category tag"><span data-dcnode-id="153" instrument_node="">Uncategorized</span></a></div></div><span data-dcnode-id="149" instrument_node="">
