</span><p data-dcnode-id="470"><b data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Musty is a word that is sometimes used to describe the feeling you get from a stale or a stuffy room.</span></b><span data-dcnode-id="473" instrument_node=""> It’s usually a smell that you just can’t quite put your finger on, but you know that there is something that is not quite right. </span><b data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">But in most cases that “not quite right feeling” is the presence of mold and mildew.</span></b></p><div class="ez-toc-v2_0_18 counter-hierarchy counter-decimal ez-toc-grey" data-dcnode-id="419" id="ez-toc-container"><span data-dcnode-id="469" instrument_node="">

seals</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="439"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="440" href="#4_Excessive_humidity" title="4. Excessive humidity"><span data-dcnode-id="441" instrument_node="">4. Excessive humidity</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="436"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="437" href="#5_Dew" title="5.&nbsp; Dew"><span data-dcnode-id="438" instrument_node="">5.&nbsp; Dew</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="433"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="434" href="#6_Leaves" title="6.&nbsp; Leaves"><span data-dcnode-id="435" instrument_node="">6.&nbsp; Leaves</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="430"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="431" href="#7_Moldy_items_in_trash" title="7.&nbsp; Moldy items in trash"><span data-dcnode-id="432" instrument_node="">7.&nbsp; Moldy items in trash</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="427"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="428" href="#8_Moldy_food_laying_around" title="8.&nbsp; Moldy food laying around"><span data-dcnode-id="429" instrument_node="">8.&nbsp; Moldy food laying around</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="424"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="425" href="#9_Mold_in_HVAC_ductwork" title="9. Mold in HVAC ductwork"><span data-dcnode-id="426" instrument_node="">9. Mold in HVAC ductwork</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="418" instrument_node="">
</span><h2 data-dcnode-id="411"><span class="ez-toc-section" data-dcnode-id="417" id="Why_Does_My_Room_Smell_Musty"></span><strong data-dcnode-id="413"><span data-dcnode-id="416" instrument_node="">Why Does My Room Smell Musty?</span><br data-dcnode-id="415"><br data-dcnode-id="414"></strong><span class="ez-toc-section-end" data-dcnode-id="412"></span></h2><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">A musty smell in a room is an indicator that you have moisture coming in somewhere that along with dirt or grime has become a source of food and nutrition for mold and mildew to take root. Mold can take root and grow very fast when given the right ingredients. A musty smell should be taken seriously as a warning that there is an issue with mold close by.</span></p><p data-dcnode-id="406"><b data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">I’ve had a personal experience with this.</span></b></p><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">In my neighborhood there was an issue with heavy rains that washed over the curbs and went up the driveway and eventually seeped into the backdoor of the house.</span></p><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">It didn’t seem like much at the time so we really didn’t do too much about it besides put some towels down to soak up the water. And it was the very back of the house that doesn’t get a lot of traffic anyway.</span></p><p data-dcnode-id="399"><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">A couple of months later I noticed a rotten smell coming from that area.</span></b></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">I pulled out a bookshelf that was in that corner and pulled up the edge of the carpet only to find that dark green and black mold had spread heavily underneath the carpet and had made its way all over the wall and the back of the shelf, including all the books on it.</span></p><h3 data-dcnode-id="393"><span class="ez-toc-section" data-dcnode-id="396" id="It_was_pretty_shocking_to_see_how_much_the_mold_had_taken_over"></span><span data-dcnode-id="395" instrument_node="">It was pretty shocking to see how much the mold had taken over.</span><span class="ez-toc-section-end" data-dcnode-id="394"></span></h3><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">We had to take the carpet up and remove and replace the drywall on that side of the room.</span></p><p data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">Luckily the mold did not turn out to be the dangerous </span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mold/stachy.htm" rel="noopener" target="_blank"><span data-dcnode-id="389" instrument_node="">Stachybotrys</span></a><span data-dcnode-id="387" instrument_node=""> or black mold.</span></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">All that to say that if you have a musty smell in your room, it’s a situation that you should take seriously.</span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Mold can do more destruction than you may be giving it credit for. And do it much faster than you may think.</span></p><p data-dcnode-id="374"><span data-dcnode-id="381" instrument_node="">Mold can also </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/article/med/31608429" rel="noopener" target="_blank"><span data-dcnode-id="380" instrument_node="">exasperate allergies</span></a><span data-dcnode-id="378" instrument_node=""> and is known to be a trigger for </span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/31608429/" rel="noopener" target="_blank"><span data-dcnode-id="377" instrument_node="">asthma</span></a><span data-dcnode-id="375" instrument_node="">.</span></p><p data-dcnode-id="371"><b data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">What you are looking for in your room when you have a musty smell is an inappropriate source of moisture.</span></b></p><p data-dcnode-id="366"><span data-dcnode-id="370" instrument_node="">According to the </span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/12762072/" rel="noopener" target="_blank"><span data-dcnode-id="369" instrument_node="">National Library of Medicine</span></a><span data-dcnode-id="367" instrument_node=""> , Mold spores are practically everywhere and there is really no way to get away from them or keep them out of your house. But without an adequate source of moisture, they cannot grow and colonize into a problem.</span></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">So the fundamental thing you’re looking for in the case of a musty smell is moisture and the supply of that moisture.</span></p><p data-dcnode-id="360"><img alt="Wet moldy carpet" class="lazyloaded" data-dcnode-id="363" data-src="https://breathebetterair.org/wp-content/uploads/2020/11/Wet-moldy-carpet-1024x698.jpg" height="698" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/11/Wet-moldy-carpet-1024x698.jpg&amp;raw" width="1024"><noscript data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">&lt;img src="https://breathebetterair.org/wp-content/uploads/2020/11/Wet-moldy-carpet-1024x698.jpg" alt="Wet moldy carpet" width="1024" height="698" /&gt;</span></noscript></p><h2 data-dcnode-id="355"><span class="ez-toc-section" data-dcnode-id="359" id="Why_Does_My_Room_Smell_Musty_in_The_Morning"></span><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Why Does My Room Smell Musty in The Morning?</span></strong><span class="ez-toc-section-end" data-dcnode-id="356"></span></h2><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">What could be some reasons your room smells musty?</span></p><ol data-dcnode-id="325"><li data-dcnode-id="350"><b data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Wet carpet</span></b></li><li data-dcnode-id="347"><b data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Wet drywall</span></b></li><li data-dcnode-id="344"><b data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Window seals</span></b></li><li data-dcnode-id="341"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/does-a-humidifier-help-with-dust/" rel="noopener" target="_blank"><span data-dcnode-id="343" instrument_node="">Excessive humidity</span></a></li><li data-dcnode-id="338"><b data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Dew</span></b></li><li data-dcnode-id="335"><b data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Leaves</span></b></li><li data-dcnode-id="332"><b data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Moldy items in trash</span></b></li><li data-dcnode-id="329"><b data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Moldy food laying around</span></b></li><li data-dcnode-id="326"><b data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Mold inside of the HVAC duct work</span></b></li></ol><h3 data-dcnode-id="320"><span class="ez-toc-section" data-dcnode-id="324" id="1_Wet_carpet"></span><b data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">1. Wet carpet</span></b><span class="ez-toc-section-end" data-dcnode-id="321"></span></h3><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Remember that you are looking for the source of the moisture.</span></p><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">If you have wet carpet then the ideal is to figure out why it is wet.</span></p><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Some reasons may be as simple as a soaking wet towel laying on the carpet or has there been a big spill that was not cleaned up?</span></p><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">If you have a large area that is damp, then there may be a leak that has sprung from a pipe beneath the flooring.</span></p><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">it will be worthwhile for you to peel the carpet back and make sure that your floor is not soaking wet beneath.</span></p><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">And if it is, you should make it a priority to have it fixed as soon as possible to avoid further damage and mold growth.</span></p><h3 data-dcnode-id="303"><span class="ez-toc-section" data-dcnode-id="307" id="2_Wet_drywall"></span><b data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2.&nbsp; Wet drywall</span></b><span class="ez-toc-section-end" data-dcnode-id="304"></span></h3><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">It can&nbsp;be a smell can be coming from the walls if a pipe inside of the wall has busted. Examine the walls and see if you can find any areas where they are bubbling, swelling, or peeling which would indicate that moisture has gotten inside of the drywall.</span></p><h3 data-dcnode-id="296"><span class="ez-toc-section" data-dcnode-id="300" id="3_Window_seals"></span><b data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">3.&nbsp; Window seals</span></b><span class="ez-toc-section-end" data-dcnode-id="297"></span></h3><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">One area that moisture can get into the house easily is the windows. If the windows are not sealed properly, you can find moisture creeping in around the window. If it has been going on for a long time, you will also find the frame around the window rotting.</span></p><h3 data-dcnode-id="289"><span class="ez-toc-section" data-dcnode-id="293" id="4_Excessive_humidity"></span><b data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">4. Excessive humidity</span></b><span class="ez-toc-section-end" data-dcnode-id="290"></span></h3><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">If you live in an area with a climate that is prone to high humidity, you may find that it is the humidity that is causing moisture to build up inside of your room. If this is the case, then mildew is </span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/can-a-wobbly-ceiling-fan-fall-off/"><span data-dcnode-id="287" instrument_node="">probably showing up on your walls or ceiling</span></a><span data-dcnode-id="285" instrument_node=""> somewhere.</span></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">This is the case in many basements. The level of humidity inside of the room causes condensation to build on the walls and create a natural food source for mold and mildew.</span></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">The best solution in that case is to use a dehumidifier to pull moisture out of the air so that it does not have a chance to become a problem in the form of mold.</span></p><h3 data-dcnode-id="274"><b data-dcnode-id="275"><img alt="Dew" class="lazyloaded" data-dcnode-id="279" data-src="https://breathebetterair.org/wp-content/uploads/2020/11/Dew-1024x691.jpg" height="627" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/wp-content/uploads/2020/11/Dew-1024x691.jpg&amp;raw" width="929"><noscript data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">&lt;img src="https://breathebetterair.org/wp-content/uploads/2020/11/Dew-1024x691.jpg" alt="Dew" width="929" height="627" /&gt;</span></noscript><br data-dcnode-id="276"></b></h3><h3 data-dcnode-id="269"><span class="ez-toc-section" data-dcnode-id="273" id="5_Dew"></span><b data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">5.&nbsp; Dew</span></b><span class="ez-toc-section-end" data-dcnode-id="270"></span></h3><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Many people claim to be more concerned with the dusty smell in their house in the morning time.</span></p><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">That morning musty smell is usually associated with the moisture that develops in the air in the early morning hours.</span></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">It’s the moisture that is commonly known as dew.</span></p><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Dew can help turn the volume up on the smell of mold and mildew in the morning.</span></p><h3 data-dcnode-id="256"><span class="ez-toc-section" data-dcnode-id="260" id="6_Leaves"></span><b data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">6.&nbsp; Leaves</span></b><span class="ez-toc-section-end" data-dcnode-id="257"></span></h3><p data-dcnode-id="249"><span data-dcnode-id="255" instrument_node="">Leaves, specifically in the Autumn season can pile up in gutters and around the house and make an excellent environment for mold to take root. And once the </span><a data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathebetterair.org/all-post/does-an-air-purifier-help-with-mold/"><span data-dcnode-id="254" instrument_node="">mold has colonized inside of the leaves, any sort of rustling around caused by the wind or by kicking the leaves can unleash mold spores into the air</span></a><span data-dcnode-id="252" instrument_node="">.</span><b data-dcnode-id="250"><br data-dcnode-id="251"></b></p><h3 data-dcnode-id="244"><span class="ez-toc-section" data-dcnode-id="248" id="7_Moldy_items_in_trash"></span><b data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">7.&nbsp; Moldy items in trash</span></b><span class="ez-toc-section-end" data-dcnode-id="245"></span></h3><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Sometimes a musty smell is coming from a moldy item that has been thrown away and just sitting there stinking. The trash can is one of the first places to look when you smell something musty in your room.</span></p><h3 data-dcnode-id="237"><span class="ez-toc-section" data-dcnode-id="241" id="8_Moldy_food_laying_around"></span><b data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">8.&nbsp; Moldy food laying around</span></b><span class="ez-toc-section-end" data-dcnode-id="238"></span></h3><p data-dcnode-id="231"><span data-dcnode-id="236" instrument_node="">Moldy food can cause a very pungent musty smell when it is laying out or in the trash can. Items like half eaten hamburgers and apple cores are best disposed of in the main kitchen area where the trash is taken out more frequently.</span><br data-dcnode-id="235"><span data-dcnode-id="234" instrument_node="">If you have a musty smell in your room, looking for any food that has been left out to mold is a good place to start.</span><br data-dcnode-id="233"><span data-dcnode-id="232" instrument_node="">Another place that you can find moldy musty smells is in the kitchen sink where the garbage disposal is. If the garbage disposal has not been cleaned properly in a while, you are liable to smell moldy food coming from there.</span></p><h3 data-dcnode-id="226"><span class="ez-toc-section" data-dcnode-id="230" id="9_Mold_in_HVAC_ductwork"></span><b data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">9. Mold in HVAC ductwork</span></b><span class="ez-toc-section-end" data-dcnode-id="227"></span></h3><p data-dcnode-id="223"><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">If there is mold in your ductwork, you can be sure that it will be distributed throughout the house every time the heating or air conditioning comes on.</span></b></p><p data-dcnode-id="218"><span data-dcnode-id="222" instrument_node="">According to this&nbsp;</span><a data-dcnode-id="220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/abs/10.1080/15459620701389909%3FmobileUi%3D0%26journalCode%3Duoeh20" rel="noopener" target="_blank"><span data-dcnode-id="221" instrument_node="">study</span></a><span data-dcnode-id="219" instrument_node="">, mold can be commonly found inside of an air handler, specifically the wheel fan blades, the ductwork, and the cooling coil fins.</span></p><p data-dcnode-id="215"><b data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Another source of mold coming into the house through the ductwork is the evaporative coils. Dirty evaporative coils contain all the ingredients for mold to flourish and find its way inside of the house.</span></b></p><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">If you have a musty smell coming from your HVAC ductwork, cleaning the evaporative coils located on the outside section of your unit is a good place to start to reduce the volume of mold spores coming in.</span></p><p data-dcnode-id="210"><b data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Another trouble area for HVAC systems when it comes to mold is the drip pan. If the drip pan is not draining sufficiently, water can build up in the pan and become a source of mold.</span></b></p><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Clearing any blockage from the drip pan to the outside drainage is also a good way to ensure that you do not have mold growing and coming in through your HVAC.</span></p><p data-dcnode-id="205"><b data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">UV systems are often used to target areas like evaporative coils and drip pans so that mold does not have a chance to colonize and become a problem in your air quality.</span></b></p><span data-dcnode-id="204" instrument_node=""> </span></div><span data-dcnode-id="202" instrument_node="">
</span></div><span data-dcnode-id="200" instrument_node="">
