</span><header class="entry-header" data-dcnode-id="616"><span data-dcnode-id="642" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="636" itemprop="headline"><span data-dcnode-id="641" instrument_node="">Why does my Finished Basement Smell Musty or Earthy?</span><span class="wtr-time-wrap after-title" data-dcnode-id="637"><span class="wtr-time-number" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">4</span></span><span data-dcnode-id="638" instrument_node=""> min read</span></span></h1><span data-dcnode-id="635" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="619"><span data-dcnode-id="634" instrument_node="">
</span><span class="posted-on" data-dcnode-id="628"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy/" rel="bookmark" title="12:54 am"><time class="updated" data-dcnode-id="632" datetime="2019-10-08T13:42:58+00:00" itemprop="dateModified"><span data-dcnode-id="633" instrument_node="">October 8, 2019</span></time><time class="entry-date published" data-dcnode-id="630" datetime="2019-10-04T00:54:26+00:00" itemprop="datePublished"><span data-dcnode-id="631" instrument_node="">October 4, 2019</span></time></a></span><span data-dcnode-id="627" instrument_node=""> </span><span class="byline" data-dcnode-id="621"><span class="author vcard" data-dcnode-id="622" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="626" instrument_node="">by </span><a class="url fn n" data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/author/admin/" itemprop="url" rel="author" title="View all posts by Venkat"><span class="author-name" data-dcnode-id="624" itemprop="name"><span data-dcnode-id="625" instrument_node="">Venkat</span></span></a></span></span><span data-dcnode-id="620" instrument_node=""> </span></div><span data-dcnode-id="617" instrument_node="">
</span></header><span data-dcnode-id="614" instrument_node="">
</span><div class="entry-content" data-dcnode-id="362" itemprop="text"><span data-dcnode-id="613" instrument_node="">
</span><div data-bg="#FFFFFF" data-comments="0" data-commentsbg="#ffcece" data-content-offset="0" data-dcnode-id="438" data-fg="#e86c00" data-fgopacity="1.00" data-location="page" data-mute="1" data-mutedfg="#f44813" data-mutedopacity="0.80" data-non-touch="1" data-placement="top" data-placement-offset="0" data-placement-offset-touch="0" data-placement-touch="top" data-rtl="" data-touch="1" data-transparent="" data-width="7" id="wtr-content"><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="609"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Basements are always prone to moisture intrusion, which lends themselves to the musty odor.&nbsp; While the finished basement minimizes the intrusion there is no way for the carpet, drywall, etc. to stop that feeling. </span></strong></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Excess moisture gets absorbed by the insulation and carpet and they retain it.&nbsp; This subsequently leads to the earthy or musty smell you are referring to.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">A reader asked a question for which I thought of putting out a response post instead of emailing back.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">The question was “I have finished my basement, however, it has an earthy/musty smell.&nbsp; The smell gets worse when it rains even though I can’t find any visible signs of water intrusion and&nbsp; I don’t see mold growth either.  When I checked for humidity it’s comparable to the rest of the house.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">I’m wary of bringing on a contractor to check the issue. Interests might not be aligned and the contractors might jump to the conclusion that the waterproofing needs to be addressed or something similar.&nbsp; Please advise.”</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">There are several reasons and I’m going to touch on a few that are important.&nbsp; If you’re also having this issue of finished basement smelling musty, then this post is for you.</span></p><span data-dcnode-id="593" instrument_node="">
</span><div class="counter-hierarchy" data-dcnode-id="555" id="ez-toc-container"><span data-dcnode-id="592" instrument_node="">
</span><div class="ez-toc-title-container" data-dcnode-id="584"><span data-dcnode-id="591" instrument_node="">
</span><p class="ez-toc-title" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Here's What You Are Going to See (Table of Contents)</span></p><span data-dcnode-id="588" instrument_node="">
</span><span class="ez-toc-title-toggle" data-dcnode-id="585"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="586"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="587"></i></a></span></div><span data-dcnode-id="583" instrument_node="">
</span><nav data-dcnode-id="556"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="557"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="580"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Inhibit_Mold_Growth_by_Maintaining_Indoor_Humidity" title="Inhibit Mold Growth by Maintaining Indoor Humidity"><span data-dcnode-id="582" instrument_node="">Inhibit Mold Growth by Maintaining Indoor Humidity</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="577"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Ventilation_and_Move_the_Air_to_Reduce_Musty_Smell" title="Ventilation and Move the Air to Reduce Musty Smell"><span data-dcnode-id="579" instrument_node="">Ventilation and Move the Air to Reduce Musty Smell</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="574"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Control_the_Sewer_Gas_Leakage" title="Control the Sewer Gas Leakage"><span data-dcnode-id="576" instrument_node="">Control the Sewer Gas Leakage</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="571"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Exterior_Water_Intrusion" title="Exterior Water Intrusion"><span data-dcnode-id="573" instrument_node="">Exterior Water Intrusion</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="568"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Seal_Wall_Cracks_and_the_Floor" title="Seal Wall Cracks and the Floor"><span data-dcnode-id="570" instrument_node="">Seal Wall Cracks and the Floor</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="565"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Clean_Ducts_to_Control_Mold" title="Clean Ducts to Control Mold"><span data-dcnode-id="567" instrument_node="">Clean Ducts to Control Mold</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="558"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Use_Desiccant_and_Absorbent" title="Use Desiccant and Absorbent"><span data-dcnode-id="564" instrument_node="">Use Desiccant and Absorbent</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="559"><li class="ez-toc-heading-level-3" data-dcnode-id="560"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/finished-basement-smells-musty-earthy%23Related_posts" title="Related posts:"><span data-dcnode-id="562" instrument_node="">Related posts:</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="554" instrument_node="">
</span><h2 data-dcnode-id="551"><span data-dcnode-id="553" instrument_node="">Inhibit Mold Growth by Maintaining Indoor Humidity</span><span class="ez-toc-section" data-dcnode-id="552" id="Inhibit_Mold_Growth_by_Maintaining_Indoor_Humidity"></span></h2><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="549" instrument_node="">First things first, to</span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/get-rid-of-mold-in-basement/"><span data-dcnode-id="548" instrument_node=""> inhibit mold growth</span></a><span data-dcnode-id="546" instrument_node="">, you need to have the relative humidity below 50%. The finished basement ends up being tough on the homeowner.&nbsp; In that, even if there is </span><a aria-label="mold  (opens in a new tab)" data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mold/default.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="545" instrument_node="">mold </span></a><span data-dcnode-id="543" instrument_node="">growth, that might happen behind the walls and you may not notice.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Mold spores and difficult to remove so try to take all measures to avoid ‘em.&nbsp;</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">If you don’t have a dehumidifier that is the first thing you must get and put it in the basement.&nbsp; You need to decide on the right spot to place and a perfect location to drain the collected water.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">Here is a </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/diy-homemade-dehumidifier/"><span data-dcnode-id="533" instrument_node="">low-cost DIY dehumidifier idea</span></a><span data-dcnode-id="531" instrument_node=""> worth checking.</span></p><span data-dcnode-id="529" instrument_node="">
</span><h2 data-dcnode-id="526"><span data-dcnode-id="528" instrument_node="">Ventilation and Move the Air to Reduce Musty Smell</span><span class="ez-toc-section" data-dcnode-id="527" id="Ventilation_and_Move_the_Air_to_Reduce_Musty_Smell"></span></h2><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">The main problem with many basements in North America is ventilation.&nbsp; Limited windows and poor ventilation make the problem worse.  Figure out a way to move the air, which will greatly help reduce the musty order.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h2 data-dcnode-id="519"><span data-dcnode-id="521" instrument_node="">Control the Sewer Gas Leakage</span><span class="ez-toc-section" data-dcnode-id="520" id="Control_the_Sewer_Gas_Leakage"></span></h2><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="514"><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/get-rid-of-sewage-smell/"><span data-dcnode-id="517" instrument_node="">Sewer gas</span></a><span data-dcnode-id="515" instrument_node=""> can also be causing the musty smell. I know what you are thinking.&nbsp; Sewer smell is distinct and it’s nasty right.  You are correct for the most part. Sometimes sewer doesn’t smell like a sewer after all.&nbsp;</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Remember to fill the water in all the drain pipes so all the dried P-Traps are filled with water and never let the foul smell come through.</span></p><span data-dcnode-id="510" instrument_node="">
</span><h2 data-dcnode-id="507"><span data-dcnode-id="509" instrument_node="">Exterior Water Intrusion</span><span class="ez-toc-section" data-dcnode-id="508" id="Exterior_Water_Intrusion"></span></h2><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Then comes your water intrusion scenario.&nbsp; You may not able to pinpoint correct where the water is leaking in.&nbsp; But if it is you need to take some measures to keep the water away from the foundation.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Clean your downspouts and gutters periodically. Put in a downspout extender and move the water several feet away from the foundation.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="499" instrument_node="">If you have window wells, try to</span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/window-well-covers/"><span data-dcnode-id="498" instrument_node=""> get a good window well cover</span></a><span data-dcnode-id="496" instrument_node=""> to keep the water out.</span></p><span data-dcnode-id="494" instrument_node="">
</span><h2 data-dcnode-id="491"><span data-dcnode-id="493" instrument_node="">Seal Wall Cracks and the Floor</span><span class="ez-toc-section" data-dcnode-id="492" id="Seal_Wall_Cracks_and_the_Floor"></span></h2><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Since you have a finished basement, checking for wall cracks is going to be difficult.&nbsp;</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="486" instrument_node="">If you have </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/what-is-berber/"><span data-dcnode-id="485" instrument_node="">carpet</span></a><span data-dcnode-id="483" instrument_node="">, then remove and try to clean and seal the concrete underneath. It’s good to check for Radon. While it might not smell musty, it’s better to check for the levels anyhow.</span></p><span data-dcnode-id="481" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="480" instrument_node="">Clean Ducts to Control Mold</span><span class="ez-toc-section" data-dcnode-id="479" id="Clean_Ducts_to_Control_Mold"></span></h2><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="476" instrument_node="">You should also consider calling your duct cleaning crew and give it a good nice wipe, so your </span><a aria-label="air quality (opens in a new tab)" data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="475" instrument_node="">air quality</span></a><span data-dcnode-id="473" instrument_node=""> becomes better.&nbsp; HVAC condensation can be the source of mold growth and the cause of the musty smell.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Now if you have done everything as suggested and still feeling the musty odor, there is a trick you can do to really find out if it’s a one-off issue or not.&nbsp;</span></p><span data-dcnode-id="468" instrument_node="">
</span><h2 data-dcnode-id="465"><span data-dcnode-id="467" instrument_node="">Use Desiccant and Absorbent</span><span class="ez-toc-section" data-dcnode-id="466" id="Use_Desiccant_and_Absorbent"></span></h2><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="463" instrument_node="">Get some </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/diy-homemade-dehumidifier/"><span data-dcnode-id="462" instrument_node="">desiccant or absorbent </span></a><span data-dcnode-id="460" instrument_node="">and keep it in the basement and see the change in effect. Baking soda, cat litter, charcoal combined with some air freshener should remove the smell, at least temporarily.&nbsp;</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">After a week of this treatment once you remove those items if the issue is gone, then it was a one-off issue. But if the issue reoccur you should dig deep to find the source of moisture.&nbsp;</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="454" instrument_node="">Ultimately you may end up doing a sound </span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basementgurus.com/basement-flooding-causes/"><span data-dcnode-id="453" instrument_node="">waterproofing</span></a><span data-dcnode-id="451" instrument_node="">, but it may be unnecessary if the issue is small. So, it definitely pays to check and make sure the issue is indeed relatively small.</span></p><span data-dcnode-id="449" instrument_node="">
