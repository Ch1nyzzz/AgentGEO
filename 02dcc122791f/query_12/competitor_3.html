</span><article class="et_pb_post post-9935 post type-post status-publish format-standard has-post-thumbnail hentry category-uncategorized" data-dcnode-id="1382" id="post-9935"><span data-dcnode-id="1618" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Why Does my House Smell Musty? 5 Things That Can Make your Home Smell</span></h1><span data-dcnode-id="1614" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1603"><span data-dcnode-id="1613" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1610"><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/author/george/" rel="author" title="Posts by OdorKlenz Team"><span data-dcnode-id="1612" instrument_node="">OdorKlenz Team</span></a></span><span data-dcnode-id="1609" instrument_node=""> | </span><span class="published" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Jul 27, 2017</span></span><span data-dcnode-id="1606" instrument_node=""> | </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/category/uncategorized/" rel="category tag"><span data-dcnode-id="1605" instrument_node="">Uncategorized</span></a></p><img alt="Why does my house smell musty" class="" data-dcnode-id="1602" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/AdobeStock_114857742-1.jpg&amp;raw" width="1080"><span data-dcnode-id="1601" instrument_node="">
</span></div><span data-dcnode-id="1599" instrument_node=""> </span><span data-dcnode-id="1597" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1391"><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1595" instrument_node="">A lot of smells in our homes are easily identifiable, and we can get to their source quickly because we know where they’re coming from. Garbage is smelly because last night’s leftovers are sitting in there a little too long? Just throw out the trash and the smell will go away. Other smells, however, are slightly more mysterious. When we can’t find out where the odors are coming from, and they’re left to linger too long, it can create a rather unpleasant environment to live in as well as a potential health hazard. Find out where some common household odors come from and </span><strong data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">how to get rid of strange smells in house .</span></strong></p><span data-dcnode-id="1591" instrument_node="">
</span><h2 data-dcnode-id="1588"><img alt="Pet Odor Removal Tips" class="size-medium wp-image-10113 alignleft" data-dcnode-id="1590" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-300x300.png&amp;raw" srcset="https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-300x300.png 300w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-100x100.png 100w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-510x510.png 510w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-150x150.png 150w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-768x768.png 768w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35-200x200.png 200w, https://www.odorklenz.com/wp-content/uploads/2017/07/Untitled-design-35.png 800w" width="300"><span data-dcnode-id="1589" instrument_node="">Pet Odor Removal Tips</span></h2><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Those who have been around pets know that at times they come with a characteristic odor. Usually, the bad odors ate attributed to body odors and urine smells. Pets themselves may smell like they need a bath, or the smell’s left behind in the home from when the pet is outside. Dogs will often get urine on the bottom of their paws after they go outside. Also, many cats and dogs, unfortunately, have accidents inside, especially on carpet. If your pet has spent a lot of time outside and gotten wet, their fur can also start to smell of mildew.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1583" instrument_node="">To get rid of pet smells, first determine if it’s the animal or the flooring to determine where they went to the bathroom. If so, that could be the source of the odor. If your pet smells unpleasant, give your pet a bath, paying particular attention to the pads on their feet. If it’s the carpet, you may be able to remove the urine smell easily. Steam cleaning can clean carpet thoroughly down to the padding. If it’s a new spot, you may use the </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-s-liquid/"><span data-dcnode-id="1582" instrument_node="">OdorKlenz pet urine eliminator</span></a><span data-dcnode-id="1580" instrument_node=""> to attack and neutralize the odors. If the odors have gotten down into the subflooring, you should look into the </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-subfloor-treatment-kit/"><span data-dcnode-id="1579" instrument_node="">OdorKlenz subfloor treatment kit </span></a><span data-dcnode-id="1577" instrument_node="">to inject the odors at the source. If you are uncertain of the location of the source of the odors and the carpet is worth salvaging, you may consider investing in a black light.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><h2 data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">How to Remove Drain &amp; Sewer Odors from Bathrooms</span></h2><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1569"><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell.jpeg"><img alt="" class="size-medium wp-image-9895 alignright" data-dcnode-id="1571" height="215" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-300x215.jpeg&amp;raw" srcset="https://www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-300x215.jpeg 300w, https://www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-510x365.jpeg 510w, https://www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-768x550.jpeg 768w, https://www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-1024x733.jpeg 1024w, https://www.odorklenz.com/wp-content/uploads/2017/07/How-to-Get-Rid-of-Garbage-Disposal-Smell-200x143.jpeg 200w" width="300"></a></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Have you noticed that your little-used bathroom has an unpleasant odor coming from it? Unusable bathtubs may start to give off a sulfur, rotten egg smell. This reason is that the plumbing of the drain requires water to keep functioning properly. If water isn’t running down the drain regularly, sewer gases that normally washes it out of the system can make their way back up into your home.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1564" instrument_node="">Even if you don’t plan on using the extra bathroom, it’s still a good idea to run water down the bathtub and sink drain at least once a week. That will dissipate some of the gases that build up and prevent any odors. This way, the smell will go away, and the bathroom will be ready for use when someone does need it. For quick removal of drain and sewer odors, check out the</span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-sink-disposal-cleaner-deodorizer/"><span data-dcnode-id="1563" instrument_node=""> OdorKlenz Drain and Disposal Odor Remover</span></a><span data-dcnode-id="1561" instrument_node="">.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><h2 data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Smoke Odor Removal Tips You Need to Know</span></h2><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1553"><img alt="Smoke Odor Removal Tips You Need to Know" class="size-medium wp-image-10114 alignleft" data-dcnode-id="1555" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-300x300.png&amp;raw" srcset="https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-300x300.png 300w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-100x100.png 100w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-510x510.png 510w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-150x150.png 150w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-768x768.png 768w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell-200x200.png 200w, https://www.odorklenz.com/wp-content/uploads/2017/07/Cigarette-Smell.png 800w" width="300"><span data-dcnode-id="1554" instrument_node="">You can usually tell as soon as you walk through the door of a home if a smoker lives there or not. Cigarette smoke is very invasive to homes and can embed itself in carpets, on walls, and remain airborne for months on in. Cigarette smoke is highly corrosive and stays on people’s clothing even after being washed in the laundry. Cigarette smoke doesn’t only smell bad; but it can also cause lung cancer, asthma, and other respiratory problems for both the smoker and those who inhale the smoke. Third-hand smoke refers to the inhalation of smoke left behind, even if you weren’t around the person smoking. This scent frequently occurs in homes where a smoker lives and can be as dangerous as if you were smoking the cigarette yourself.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1551" instrument_node="">Getting rid of smoke smells in homes can be a daunting task. The best course of action is a whole house approach. Carpets usually need to be steam cleaned to get all of the smoke particles out. Walls and upholstery can be treated with </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-source-odor-treatment-116-oz/"><span data-dcnode-id="1550" instrument_node="">OdorKlenz Source Odor treatment</span></a><span data-dcnode-id="1548" instrument_node=""> which works to neutralize the chemical odors associated with smoke. Stains may stay behind on walls from the smoke—to eliminate these and prevent them from returning; you can paint the walls with a sealer and primer first. This way it will lock in the stains and smoke odors, and make sure they don’t soak through to the new paint layer. It’s also important to purify the air. Opening windows and doors can help, but you’ll most likely need a professional grade air purifying system that can draw in and deactivate smoke toxins. The </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-mobile/"><span data-dcnode-id="1547" instrument_node="">OdorKlenz mobile system works to provide the end user with two stage filtration</span></a><span data-dcnode-id="1545" instrument_node="">, by addressing the removal of particulates with a medical grade HEPA filter as well as odor reduction with its patented earth mineral cartridge.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><h2 data-dcnode-id="1540"><img alt="Washing Machine Odor Removal Hacks" class="size-medium wp-image-10115 alignright" data-dcnode-id="1542" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-300x300.png&amp;raw" srcset="https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-300x300.png 300w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-100x100.png 100w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-510x510.png 510w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-150x150.png 150w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-768x768.png 768w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine-200x200.png 200w, https://www.odorklenz.com/wp-content/uploads/2017/07/Strong-Odors-From-Your-Washing-Machine.png 800w" width="300"><span data-dcnode-id="1541" instrument_node="">Washing Machine Odor Removal Hacks</span></h2><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Sometimes you may notice a strange moldy smell in your basement or laundry room. You may attribute it to wet towels or soiled laundry at first, but then realize it doesn’t go away, even though you’ve removed those items. Although they’re designed to clean, washing machines themselves can get mold and mildew buildup, causing an unpleasant odor that may even transfer over to your clothes. This statement is especially true with front-load washing machines, which close tight with a vacuum seal. Moisture inside after a wash isn’t allowed to evaporate, and the warm damp environment provides perfect conditions for mold to grow.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">To remove washing machine odors, run a laundry cycle with the</span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/product/odorklenz-washing-machine-deodorizer/"><span data-dcnode-id="1534" instrument_node=""> OdorKlenz washing machine deodorizer.</span></a><span data-dcnode-id="1532" instrument_node=""> To prevent the smell from happening in the future, you can leave the washing machine door propped open after a wash to allow for proper ventilation.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><h2 data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">How to Remove Decaying Pest Smells</span></h2><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Many residences are unlucky enough to have problems with mice or other vermin. Chimneys, behind appliances, and in small spaces in the basement are all common places people typically find dead and decaying animals. Even one little pest can cause a huge smell that permeates the whole house after it begins to rot.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">It’s best to have some pest control plan in the first place to prevent this from happening. Seal areas from outside that mice can get in, such as chimney sweeps or cracks in the foundation. If you do notice a decaying smell, follow your nose to locate the animal and dispose of it. Make sure to wear gloves, and to throw the remains away in two double garbage bags. Disinfect the area you found it as well as any tools you use to remove it. Pests can carry harmful bacteria that can make humans sick.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><h2 data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Basement Must and Other Basement Odors</span></h2><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Basements are notorious for being at risk for mold and mildew growth. This concern is because basements are dark, humid places. Appliances that use water and that can potentially leak are typically located in the basement. This set of appliances includes the water heater, main sewer line, washing machine, and sump pump. Organic materials like cardboard or paper can also grow layers of mold or mildew when they are kept stored in these conditions. A chemical caused Geosmin causes the musty smell, which occurs as mold grows.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><img alt="" class="aligncenter wp-image-12560 size-full" data-dcnode-id="1514" height="200" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odorklenz.com/wp-content/uploads/2017/07/mildew-growth.png&amp;raw" srcset="https://www.odorklenz.com/wp-content/uploads/2017/07/mildew-growth.png 500w, https://www.odorklenz.com/wp-content/uploads/2017/07/mildew-growth-300x120.png 300w, https://www.odorklenz.com/wp-content/uploads/2017/07/mildew-growth-200x80.png 200w" width="500"></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">A lot of chemicals are also usually stored in the basement. When we’ve finished with projects, we store things like paint, varnish, stain, and other cans of toxic chemicals in the basement. Many times, we don’t even need to keep these chemicals but have nowhere else to put them, and don’t know the proper disposal procedures. The cocktail created by these chemicals being stored near to each other can cause health hazards and an unpleasant smell, however.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">To fix these common basement problems, take steps to check that mold isn’t growing in or around basement appliances. Store things like paper, toys, clothes, or mementos in plastic, water-proof containers instead of cardboard boxes. Run a dehumidifier regularly in the basement. If possible, have it drain into the sump pump area, so you don’t have to empty out the water collection bin regularly. Regarding chemicals, check with local hardware stores or environmental agencies on what’s the proper way to dispose of them. If you have no further use for them, it’s better to get rid of these toxic substances than to leave them lying around the house. If you must store them, make sure to keep them somewhere cool and far away from any heating system, which could potentially cause a fire.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">For any of these common household smells, proper ventilation and air filtration is key to prevention and elimination. The majority of household odors become so bad because they’re allowed to build up within the home, rather than being diluted and filtered out with fresh outdoor air. Use common sense and follow your nose to eliminate the source of odors, and then follow the cleanup and prevention tips listed here.</span></p><span data-dcnode-id="1503" instrument_node="">

</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">“We own an athletic club in downtown Columbus and had a tough time controlling the odors down in our treadmill and elliptical sections. We decided to purchase two system after receiving some complaint from a guest on the musty and sweet smell (we are known to be a very very clean club). Once we installed the two units it took about 24 hours for the odors to go away and since the implementation of these units we have had 0 complaints but instead received compliments on our proactive approach for treating the air. Since then we have purchased units for our spin room, two locker rooms, and spa rooms and are very pleased with the results.”</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1409"><strong class="woocommerce-review__author" data-dcnode-id="1410"><span data-dcnode-id="1416" instrument_node="">General MGR. Sawmill. -</span><img alt="⭐" class="emoji" data-dcnode-id="1415" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b50.svg&amp;raw"><img alt="⭐" class="emoji" data-dcnode-id="1414" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b50.svg&amp;raw"><img alt="⭐" class="emoji" data-dcnode-id="1413" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b50.svg&amp;raw"><img alt="⭐" class="emoji" data-dcnode-id="1412" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b50.svg&amp;raw"><img alt="⭐" class="emoji" data-dcnode-id="1411" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b50.svg&amp;raw"></strong></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">“We rent a space where one of our roommates is highly allergic to cats and we happen to own three!! We were worried we would have to move because of the issue that the cat dander was causing to our roommate friend, we purchased this air purifier and leave it in the living room where the cats spend the most time in. I can honestly say that since we have turned on the system our air is a lot cleaner and there is literally no hair to be found anywhere and best of all our roommate can bow actually tolerate being around our cats. I would highly recommend using this unit for those who have allergies or need to control odors and dander.”</span></p><span data-dcnode-id="1405" instrument_node="">
