</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">For people with relatively old houses, it is common to hear them say that their floorboards smell musty. but why do my floorboards smell musty? </span></p><span data-dcnode-id="563" instrument_node="">
</span><p class="has-luminous-vivid-amber-background-color has-background" data-dcnode-id="560"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">A musty smell on your floorboard happens due to the presence of mold. The moldy odor coming from floorboards is what many people call musty. Mold presence on your floor thrives due to the presence of water moisture. Pet urine or at times due to flooding and pipe leakages,.</span></strong></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="558" instrument_node="">Of course, once you notice this, all you want to do is get rid of the smell. There are many ways of dealing with a musty smell such as; using an air purifier and cleaning the floorboard. To help you out with everything that relates to dealing with musty floorboards, here is a complete guide.</span><strong data-dcnode-id="557"></strong></p><span data-dcnode-id="555" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="551"><img alt="Why Do My Floorboards Smell Musty? what causes a musty smell on a house floor?" class="wp-image-3930 entered lazyloaded" data-dcnode-id="554" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg" data-lazy-srcset="https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg 700w, https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_-300x171.jpg 300w" data-ll-status="loaded" height="400" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg&amp;raw" srcset="https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg 700w, https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_-300x171.jpg 300w" width="700"><noscript data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">&lt;img width="700" height="400" src="https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg" alt="Why Do My Floorboards Smell Musty? what causes a musty smell on a house floor?" class="wp-image-3930" srcset="https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_.jpg 700w, https://floortechie.com/wp-content/uploads/2021/01/Why-Do-My-Floorboards-Smell-Musty_-300x171.jpg 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript></figure><span data-dcnode-id="550" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="499" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="542"><span data-dcnode-id="549" instrument_node="">Table of Contents</span><span data-dcnode-id="548" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">[</span><a data-dcnode-id="545" href="#"><span data-dcnode-id="546" instrument_node="">show</span></a><span data-dcnode-id="544" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="500" style="display: none;"><li data-dcnode-id="523"><a data-dcnode-id="540" href="#What_Causes_a_Musty_Smell_In_A_House"><span data-dcnode-id="541" instrument_node="">What Causes a Musty Smell In A House?</span></a><ul data-dcnode-id="524"><li data-dcnode-id="537"><a data-dcnode-id="538" href="#Mold"><span data-dcnode-id="539" instrument_node="">Mold</span></a></li><li data-dcnode-id="534"><a data-dcnode-id="535" href="#Vermin"><span data-dcnode-id="536" instrument_node="">Vermin</span></a></li><li data-dcnode-id="531"><a data-dcnode-id="532" href="#Dust"><span data-dcnode-id="533" instrument_node="">Dust</span></a></li><li data-dcnode-id="528"><a data-dcnode-id="529" href="#Flooding"><span data-dcnode-id="530" instrument_node="">Flooding</span></a></li><li data-dcnode-id="525"><a data-dcnode-id="526" href="#Pet_Urine"><span data-dcnode-id="527" instrument_node="">Pet Urine</span></a></li></ul></li><li data-dcnode-id="513"><a data-dcnode-id="521" href="#How_Do_You_Get_the_Smell_Out_of_Floorboards"><span data-dcnode-id="522" instrument_node="">How Do You Get the Smell Out of Floorboards?</span></a><ul data-dcnode-id="514"><li data-dcnode-id="518"><a data-dcnode-id="519" href="#When_the_Musty_Smell_is_coming_from_the_Floorboards_Surface"><span data-dcnode-id="520" instrument_node="">When the Musty Smell is coming from the Floorboards’ Surface</span></a></li><li data-dcnode-id="515"><a data-dcnode-id="516" href="#When_the_Smell_is_Coming_From_Under_the_Floorboard"><span data-dcnode-id="517" instrument_node="">When the Smell is Coming From Under the Floorboard</span></a></li></ul></li><li data-dcnode-id="510"><a data-dcnode-id="511" href="#Does_Musty_Smell_Mean_Mold"><span data-dcnode-id="512" instrument_node="">Does Musty Smell Mean Mold?</span></a></li><li data-dcnode-id="507"><a data-dcnode-id="508" href="#Is_Musty_Smell_Dangerous"><span data-dcnode-id="509" instrument_node="">Is Musty Smell Dangerous?</span></a></li><li data-dcnode-id="504"><a data-dcnode-id="505" href="#What_Does_a_Musty_Smell_Mean"><span data-dcnode-id="506" instrument_node="">What Does a Musty Smell Mean?</span></a></li><li data-dcnode-id="501"><a data-dcnode-id="502" href="#Sources_and_References"><span data-dcnode-id="503" instrument_node="">Sources and References</span></a></li></ul></div><span data-dcnode-id="498" instrument_node="">
</span><h2 data-dcnode-id="493"><span data-dcnode-id="494" id="What_Causes_a_Musty_Smell_In_A_House"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">What Causes a Musty Smell In A House?</span></strong><strong data-dcnode-id="495"></strong></span></h2><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">A musty smell, also known as mildew smell, is caused by several factors such as;</span></p><span data-dcnode-id="489" instrument_node="">
</span><h3 data-dcnode-id="484"><span data-dcnode-id="485" id="Mold"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Mold</span></strong><strong data-dcnode-id="486"></strong></span></h3><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Mold is a type of fungus that is known to grow in areas with a lot of moisture and improper ventilation. This is why the area under floorboards is a prime spot for their growth and development. When molds break down, they release Volatile Organic Compounds (VOCs). It is these compounds that cause moldy odor.</span></p><span data-dcnode-id="480" instrument_node="">
</span><h3 data-dcnode-id="475"><span data-dcnode-id="476" id="Vermin"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Vermin</span></strong><strong data-dcnode-id="477"></strong></span></h3><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Vermin is a collective name for small pests and animals that are known to destruction in homes, farms and many other areas. Some examples of such pests include; like rats and mice. Vermin can contribute to the moldy odor coming from floorboards when their droppings accumulate over time.</span></p><span data-dcnode-id="471" instrument_node="">
</span><h3 data-dcnode-id="466"><span data-dcnode-id="467" id="Dust"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Dust</span></strong><strong data-dcnode-id="468"></strong></span></h3><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Dust is a composition of microscopic pieces of skin residue, dust mites, body oil, dirt, and many other small contaminants. &nbsp;It is usually impossible to prevent, but an old house may have a relatively high amount of dust under the floorboards. The accumulation of dust under these boards is what makes the old house smell musty.</span></p><span data-dcnode-id="462" instrument_node="">
</span><h3 data-dcnode-id="457"><span data-dcnode-id="458" id="Flooding"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Flooding</span></strong><strong data-dcnode-id="459"></strong></span></h3><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Sometimes a home may smell musty after rain (floods). When this happens, there are high chances that the ground beneath the dwelling has been saturated because of the water table rising.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h3 data-dcnode-id="450"><span data-dcnode-id="451" id="Pet_Urine"><span data-dcnode-id="452" instrument_node="">Pet Urine</span></span></h3><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">If you are a pet lover, </span><a data-dcnode-id="446" data-lasso-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//floortechie.com/dog-urine-soaked-into-hardwood-floor/"><span data-dcnode-id="447" instrument_node="">dog urine soaked on your hardwood floor</span></a><span data-dcnode-id="445" instrument_node=""> can cause a musty smell on your floor.</span></p><span data-dcnode-id="443" instrument_node="">
</span><h2 data-dcnode-id="438"><span data-dcnode-id="439" id="How_Do_You_Get_the_Smell_Out_of_Floorboards"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">How Do You Get the Smell Out of Floorboards?</span></strong><strong data-dcnode-id="440"></strong></span></h2><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Get rid of musty smell in the house in the following ways;</span></p><span data-dcnode-id="434" instrument_node="">
</span><h3 data-dcnode-id="429"><span data-dcnode-id="430" id="When_the_Musty_Smell_is_coming_from_the_Floorboards_Surface"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">When the Musty Smell is coming from the Floorboards’ Surface</span></strong><strong data-dcnode-id="431"></strong></span></h3><span data-dcnode-id="428" instrument_node="">
</span><ol data-dcnode-id="423" type="1"><li data-dcnode-id="424"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Cleaning Using Vinegar</span></strong><strong data-dcnode-id="425"></strong></li></ol><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Here is how to clean using vinegar;</span></p><span data-dcnode-id="419" instrument_node="">
</span><ol data-dcnode-id="408" type="i"><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Fill a bucket with 1 cup of vinegar and 1 gallon of water.</span></li><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Damp a mop into the solution, wring it out and clean the floor.</span></li><li data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Let the floor dry.</span></li><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Sprinkle a light layer of baking soda over the surface and let it sit overnight.</span></li><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Sweep the baking soda up and mop using the water and vinegar solution.</span></li></ol><span data-dcnode-id="407" instrument_node="">
</span><h3 data-dcnode-id="402"><span data-dcnode-id="403" id="When_the_Smell_is_Coming_From_Under_the_Floorboard"><strong data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">When the Smell is Coming From Under the Floorboard</span></strong><strong data-dcnode-id="404"></strong></span></h3><span data-dcnode-id="401" instrument_node="">
</span><ol data-dcnode-id="396" type="1"><li data-dcnode-id="397"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Clearing Away Mold</span></strong><strong data-dcnode-id="398"></strong></li></ol><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Here is a step by step guide on how to remove mold from under your floorboard;</span></p><span data-dcnode-id="392" instrument_node="">
</span><ol data-dcnode-id="379" type="i"><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Remove the floorboards. If you find that the mold has spread to some of the floorboards, discard them and buy new ones.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Find the source of the mold. In most cases, you will find that there is a hole that allows cool, damp air from outside into the house. Once you have located the source, patch it with a plaster.</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Clean the floorboards with warm soapy water.</span></li><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">While the floorboards are up, wash them and then let them dry in a warm and dry area.</span></li><li data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Wipe the floorboards with vinegar. Doing so helps with eliminating any mold that may have remained.</span></li><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Return the floorboards.</span></li></ol><span data-dcnode-id="378" instrument_node="">
</span><ul data-dcnode-id="373"><li data-dcnode-id="374"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Install a Dehumidifier</span></strong><strong data-dcnode-id="375"></strong></li></ul><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">When a house smells moldy humid, it is best if you install a dehumidifier. A dehumidifier is a device that lowers the relative humidity of an area/home. When the humidity of an area is lowered, molds cannot survive.</span></p><span data-dcnode-id="369" instrument_node="">
</span><ul data-dcnode-id="364"><li data-dcnode-id="365"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Clearing Away Dust from Under the Floorboards.</span></strong><strong data-dcnode-id="366"></strong></li></ul><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">A great way of dealing with a musty smell coming from under your floorboards is by clearing out the dust. Here is how to do it;</span></p><span data-dcnode-id="360" instrument_node="">
</span><ol data-dcnode-id="351" type="i"><li data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Pick up your toolbox, broom and dustpan.</span></li><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Carefully lift the floorboard as you watch the nails so that they do not harm you.</span></li><li data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Clear out the dust with a broom and dustpan.</span></li><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Once you are done, restore the floorboards.</span></li></ol><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="346"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">NOTE:</span></strong><span data-dcnode-id="347" instrument_node="">&nbsp;Using an air purifier also helps with eradicating musty smell from floorboards as it filters dust from the air. This then prevents the foul smell from occurring.</span></p><span data-dcnode-id="345" instrument_node="">
</span><ul data-dcnode-id="340"><li data-dcnode-id="341"><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Call in the Experts</span></strong><strong data-dcnode-id="342"></strong></li></ul><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">If your floorboards have a musty smell after floods, then you need to call in the experts. Contact a restoration company that deals with such cases and they will help you out.</span></p><span data-dcnode-id="336" instrument_node="">
</span><ul data-dcnode-id="331"><li data-dcnode-id="332"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Contact the Local Authority</span></strong><strong data-dcnode-id="333"></strong></li></ul><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">If vermin are the cause of the musty smell in your home, then you should call the local authority as quickly as possible. The officials from the local authority are in a better position to advise you on what to do/how to deal with the rodents.</span></p><span data-dcnode-id="327" instrument_node="">
</span><h2 data-dcnode-id="322"><span data-dcnode-id="323" id="Does_Musty_Smell_Mean_Mold"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Does Musty Smell Mean Mold?</span></strong><strong data-dcnode-id="324"></strong></span></h2><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Not necessarily. Basically, just because you have a musty smell coming from your floorboards does not necessarily mean that there is mold. Even though mold is one of the leading causes of this phenomenon, it is not the only cause.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">There are several reasons why your floorboards may be producing such a foul smell just like we have explained above. Some of these causes include; vermin, dust, among others.</span></p><span data-dcnode-id="315" instrument_node="">
</span><h2 data-dcnode-id="310"><span data-dcnode-id="311" id="Is_Musty_Smell_Dangerous"><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Is Musty Smell Dangerous?</span></strong><strong data-dcnode-id="312"></strong></span></h2><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">In most cases, a musty smell is dangerous, especially when it is caused by mold. One of the most common dangers of moldy floorboards is that they cause significant damage to the house. This is hazardous as it can easily result in accidents for the residents.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Moldy odors are also detrimental to the health of the residents of the home. This is because they are known to cause issues like asthma and allergies, nasal stuffiness, and eye irritation.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h2 data-dcnode-id="298"><span data-dcnode-id="299" id="What_Does_a_Musty_Smell_Mean"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">What Does a Musty Smell Mean?</span></strong><strong data-dcnode-id="300"></strong></span></h2><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">By definition, musty means having a stale, moldy and damp smell. Basically, a musty smell is a clear sign that an area/floorboard is unclean. It is also an indicator that the area is damp and has been lacking proper aeration for a long time.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">In most cases, the dampness and lack of air are what gives rise to mold. That is why most musty smells are linked to mold, the harmful fungus.</span></p><span data-dcnode-id="291" instrument_node="">
