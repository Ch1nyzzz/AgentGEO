</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node=""> Similarly, you may ask,  why does my water smell musty?</span><p data-dcnode-id="996"><span data-dcnode-id="997"><span data-dcnode-id="998"><b data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Moldy</span></b><span data-dcnode-id="1020" instrument_node="">, </span><b data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">musty</span></b><span data-dcnode-id="1017" instrument_node="">, or earthy </span><b data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">smells</span></b><span data-dcnode-id="1014" instrument_node=""> in tap </span><b data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">water</span></b><span data-dcnode-id="1011" instrument_node=""> happen when algae blooms in the </span><b data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">water</span></b><span data-dcnode-id="1008" instrument_node=""> supply source. If algae isn't the problem, try thoroughly cleaning your tap, sink, and </span><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">water</span></b><span data-dcnode-id="1005" instrument_node=""> fixtures. Bacteria growth on the sink or in the pipes may also infrequently create a </span><b data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">moldy smell</span></b><span data-dcnode-id="1002" instrument_node=""> in your </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">water</span></b><span data-dcnode-id="999" instrument_node="">.</span></span></span></p><p data-dcnode-id="973"><span data-dcnode-id="995" instrument_node="">Also Know,  how do I fix smelly tap water? </span><span data-dcnode-id="974"><span data-dcnode-id="975"><span data-dcnode-id="994" instrument_node="">Use a half gallon of bleach for a 40-gallon </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">water</span></b><span data-dcnode-id="991" instrument_node=""> heater. Reconnect the cold </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">water</span></b><span data-dcnode-id="988" instrument_node=""> inlet piping. Turn on the </span><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">water</span></b><span data-dcnode-id="985" instrument_node=""> supply to the </span><b data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">water</span></b><span data-dcnode-id="982" instrument_node=""> heater. Open each hot </span><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">water faucet</span></b><span data-dcnode-id="979" instrument_node=""> in the house, one at a time, until the chlorine bleach </span><b data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">odor</span></b><span data-dcnode-id="976" instrument_node=""> can be detected.</span></span></span></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node=""> Beside this,  how do you get rid of smelly water?</span></p><p data-dcnode-id="957"><span data-dcnode-id="970" instrument_node=""> </span><span data-dcnode-id="958"><span data-dcnode-id="959"><span data-dcnode-id="969" instrument_node="">Chlorine bleach can effectively </span><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">remove</span></b><span data-dcnode-id="966" instrument_node=""> medium to high levels (over 6 mg/l) of hydrogen sulfide. The chlorine in the bleach chemically reacts with (oxi- dizes) the hydrogen sulfide eliminating the "rotten egg" </span><b data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">odor</span></b><span data-dcnode-id="963" instrument_node="">. Chlorine bleach also reacts with iron or manganese, and disinfects </span><b data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">water</span></b><span data-dcnode-id="960" instrument_node=""> supplies.</span></span></span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Is Smelly water safe to drink?</span></p><p data-dcnode-id="936"><span data-dcnode-id="937"><span data-dcnode-id="938"><span data-dcnode-id="954" instrument_node="">In most cases </span><b data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">drinking water</span></b><span data-dcnode-id="951" instrument_node=""> that has a strong rotten egg </span><b data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">odor</span></b><span data-dcnode-id="948" instrument_node="">, although particularly unpleasant, is perfectly </span><b data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">safe to drink</span></b><span data-dcnode-id="945" instrument_node="">. However in some rare occasions the </span><b data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">odor</span></b><span data-dcnode-id="942" instrument_node=""> may be caused by sewage or other contaminates in a building's </span><b data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">water</span></b><span data-dcnode-id="939" instrument_node=""> supply, which could cause health problems.</span></span></span></p><span data-dcnode-id="935" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="934" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="933" instrument_node="">

</span><p data-dcnode-id="512"></p><div data-dcnode-id="484"><span data-dcnode-id="485"><span data-dcnode-id="486"><span data-dcnode-id="511" instrument_node="">The reason your </span><b data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">water</span></b><span data-dcnode-id="508" instrument_node=""> probably </span><b data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">smells</span></b><span data-dcnode-id="505" instrument_node=""> like rotten eggs </span><b data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">is</span></b><span data-dcnode-id="502" instrument_node=""> because it contains some traces of hydrogen sulfide. Even extremely small amounts of hydrogen sulfide </span><b data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">can</span></b><span data-dcnode-id="499" instrument_node=""> cause your </span><b data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">water</span></b><span data-dcnode-id="496" instrument_node=""> to have quite the odorous </span><b data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">smell</span></b><span data-dcnode-id="493" instrument_node="">! In most cases this </span><b data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">smell</span></b><span data-dcnode-id="490" instrument_node=""> occurs due to a build-up of hydrogen sulfide in your hot </span><b data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">water</span></b><span data-dcnode-id="487" instrument_node=""> heater.</span></span></span></div><p data-dcnode-id="483"></p><span data-dcnode-id="482" instrument_node="">
