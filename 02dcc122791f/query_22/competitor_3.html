</span><section class="flexarticle" data-dcnode-id="864" data-id="58" data-m="{&quot;i&quot;:58,&quot;p&quot;:57,&quot;n&quot;:&quot;flexarticle&quot;,&quot;y&quot;:6,&quot;o&quot;:1}"><span data-dcnode-id="2016" instrument_node="">
</span><section class="articlebody" data-dcnode-id="908" data-id="59" data-m="{&quot;i&quot;:59,&quot;p&quot;:58,&quot;n&quot;:&quot;articlebody&quot;,&quot;y&quot;:6,&quot;o&quot;:1}" itemprop="articleBody" style="overflow: hidden; max-height: 1563px; margin-bottom: 3rem;"><span data-dcnode-id="2015" instrument_node="">
</span><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">The best air purifiers are designed to keep your home’s air clean and prevent polluted or dirty air from impacting your health. But with so many options out there with such a dizzying array of features, picking the right one for you is far from a breeze.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><span class="storyimage fullwidth inlineimage" data-aop="image" data-dcnode-id="1996"><span data-dcnode-id="2008" instrument_node="">
</span><span class="image" data-attrib="Provided by Live Science" data-caption="Best air purifiers: image of woman seated next to air purifier" data-dcnode-id="2004" data-id="60" data-m="{&quot;i&quot;:60,&quot;p&quot;:59,&quot;n&quot;:&quot;openModal&quot;,&quot;t&quot;:&quot;articleImages&quot;,&quot;o&quot;:1}"><span data-dcnode-id="2007" instrument_node="">
</span><img alt="Best air purifiers: image of woman seated next to air purifier" class="loaded" data-dcnode-id="2006" data-src="{&quot;default&quot;:{&quot;load&quot;:&quot;default&quot;,&quot;w&quot;:&quot;80&quot;,&quot;h&quot;:&quot;45&quot;,&quot;src&quot;:&quot;//img-s-msn-com.akamaized.net/tenant/amp/entityid/AAQ6A1q.img?h=450&amp;w=799&amp;m=6&amp;q=60&amp;o=f&amp;l=f&quot;},&quot;size3column&quot;:{&quot;load&quot;:&quot;default&quot;,&quot;w&quot;:&quot;62&quot;,&quot;h&quot;:&quot;35&quot;,&quot;src&quot;:&quot;//img-s-msn-com.akamaized.net/tenant/amp/entityid/AAQ6A1q.img?h=351&amp;w=624&amp;m=6&amp;q=60&amp;o=f&amp;l=f&quot;},&quot;size2column&quot;:{&quot;load&quot;:&quot;default&quot;,&quot;w&quot;:&quot;62&quot;,&quot;h&quot;:&quot;35&quot;,&quot;src&quot;:&quot;//img-s-msn-com.akamaized.net/tenant/amp/entityid/AAQ6A1q.img?h=351&amp;w=624&amp;m=6&amp;q=60&amp;o=f&amp;l=f&quot;}}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-s-msn-com.akamaized.net/tenant/amp/entityid/AAQ6A1q.img%3Fh%3D351%26w%3D624%26m%3D6%26q%3D60%26o%3Df%26l%3Df&amp;raw" style="width:62rem;height:35rem;"><span data-dcnode-id="2005" instrument_node="">
</span></span><span data-dcnode-id="2003" instrument_node="">
</span><span class="caption truncate" data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">
</span><span class="attribution" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">© Provided by Live Science</span></span><span data-dcnode-id="1999" instrument_node="">
 Best air purifiers: image of woman seated next to air purifier
</span></span><span data-dcnode-id="1997" instrument_node="">
</span></span><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">That’s why Live Science has put together this guide to the best air purifiers for your needs and budget. Collected below are some of the very best air purifiers on the market — we’ve put together all of the vital information you’ll need to make your choice easier. From the room size each model covers to the price and whether or not the product has an Energy Star certification, we have everything you need to know.</span></p><div class="bingadsoneclick" data-apikey="ARCHaZpX%2bfBaDJR6R3S%2bUM5YhkJTo0r%2fM0TkQLoqEc8JKfIo1lhw7%2fSdyYCmmYSgAsA%3d" data-dcnode-id="1991" data-id="100" data-m="{&quot;i&quot;:100,&quot;p&quot;:59,&quot;n&quot;:&quot;bingadsoneclick&quot;,&quot;y&quot;:8,&quot;o&quot;:31}" data-nativead-tracking="{&quot;id&quot;: &quot;bingad-ia&quot;, &quot;sdk&quot;: &quot;widget&quot;, &quot;w&quot;: &quot;300&quot;, &quot;h&quot;: &quot;250&quot;}" data-pagetype="article" id="bingadsoneclick"><span data-dcnode-id="1992" instrument_node="">
</span></div><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">But don’t just take our word for it &nbsp;— we’ve also spoken with Tim Carroll from the U.S Environmental Protection Agency to hear his recommendations of what to keep in mind while investing in your household’s clean air. First, you should keep in mind the size of the area you’re looking to use the purifier in, then pick the device with the right clean air delivery rate (CADR).&nbsp;</span></p><span data-dcnode-id="1988" instrument_node=""> </span><p data-dcnode-id="1983"><span data-dcnode-id="1987" instrument_node="">"The higher the CADR, the more particles the air cleaner can filter and the larger the area it can serve," Carroll told Live Science. "Most air cleaner packaging will tell you the largest size area or room it should be used in. Portable air cleaners often achieve a high CADR by using a high-efficiency particulate air </span><a data-dcnode-id="1985" data-id="101" data-m="{&quot;i&quot;:101,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:32}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/do-hepa-filters-remove-viruses" tabindex="0" target="_blank"><span data-dcnode-id="1986" instrument_node="">(HEPA) filter</span></a><span data-dcnode-id="1984" instrument_node="">."</span></p><p data-dcnode-id="1975"><span data-dcnode-id="1982" instrument_node="">A study from </span><a data-dcnode-id="1980" data-id="102" data-m="{&quot;i&quot;:102,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:33}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fenvs.2014.00069/full" rel="nofollow" tabindex="0" target="_blank"><span data-dcnode-id="1981" instrument_node="">Frontiers in Environmental Science</span></a><span data-dcnode-id="1979" instrument_node=""> has shown that fumes coming from outside the home, especially in city environments, can easily infiltrate our homes, posing a health risk if inhaled. You could be most concerned about tackling this problem with an air purifier, or you could be looking for the </span><a data-dcnode-id="1977" data-id="103" data-m="{&quot;i&quot;:103,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:34}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/best-air-purifiers-for-allergies" tabindex="0" target="_blank"><span data-dcnode-id="1978" instrument_node="">best air purifiers for allergies</span></a><span data-dcnode-id="1976" instrument_node="">. Whatever you have in mind, you need to make sure your device is right for the job.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Carroll warns against choosing purifiers that produce ozone, as this can cause irritation and be a danger to the lungs. "Both the California Air Resources Board and the Association of Home Appliance Manufacturers maintain lists of air cleaners that have been tested and shown to emit little or no ozone," he said.</span></p><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">You might also want to consider the size and power of the purifier. You need to make sure it’s powerful enough to work in your space, but also that it’s quiet enough to be unobtrusive — if you’re using a purifier overnight or in any other space where you like peace and quiet, you’re going to need it to be quiet too.</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">Now is a good time to invest in an air purifier; we've rounded up the </span><a data-dcnode-id="1968" data-id="104" data-m="{&quot;i&quot;:104,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:35}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/air-purifiers-on-sale" tabindex="0" target="_blank"><span data-dcnode-id="1969" instrument_node="">best Cyber Monday air purifiers deals</span></a><span data-dcnode-id="1967" instrument_node=""> to save you some money.</span></p><span data-dcnode-id="1965" instrument_node=""> </span><h3 class="article-body__section" data-dcnode-id="1962"><span data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Best air purifiers</span></span></h3><span data-dcnode-id="1961" instrument_node=""> </span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">The Levoit 400S performed best to remove airborne particles in our at-home testing, capturing at least 99.5% and up to 100% or particles during testing.</span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Its sleek and stylish cylinder shape with a neutral colorway makes it an easy addition to any room, whatever the décor, while a color-coded display gives users a great visual on air quality at any given moment.&nbsp;</span></p><span data-dcnode-id="1956" instrument_node=""> </span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">The air purifier is light and features indented handles at either side, making it easy to move from room-to-room.</span></p><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">A companion app that users can download gives useful data on air quality and allows users to schedule and time the air purifier to fit round a busy family schedule. The quietest setting is barely discernible, while the most powerful setting still clocks in at just 52 decibels.</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Stylish, quietly powerful, and with an intuitive, easy-to-use Smart interface, the Levoit 400S is our top pick of air purifiers. It could be the ideal appliance for you if you’re looking for an effective air purifier that’s big on performance but doesn’t blow the budget.</span></p><span data-dcnode-id="1949" instrument_node=""> </span><ul data-dcnode-id="1938"><li data-dcnode-id="1939"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Read the </span></strong><strong data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">full </span></strong><a data-dcnode-id="1940" data-id="105" data-m="{&quot;i&quot;:105,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:36}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/levoit-400s-air-purifier-review" tabindex="0" target="_blank"><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Levoit 400S</span></strong><strong data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node=""> review&nbsp;</span></strong></a></li></ul><span data-dcnode-id="1937" instrument_node=""> </span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">The Dyson Purifier Cool is one of the most stylish air purifiers on the market. Its unusual design marks it out as a talking point in any room, while simple but genius extras, such as a magnetic remote control, take it a step up from your average air purifier.</span></p><span data-dcnode-id="1934" instrument_node=""> </span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">The purifier also doubles up as a fan in hotter weather, although this isn’t as powerful as some users would like. Users can activate, schedule and monitor their purifier via the Dyson app, allowing them to set fan speed, timers and check air quality whether they’re home or away.</span></p><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">A clever LCD display flicks between icons that show air quality data in real time, while an auto-mode senses air particles and adjusts fan settings to suit.</span></p><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">The Dyson Purifier Cool’s high price tag may be too expensive to suit everyone’s budget, but its stylish, sleek design and smart, connected functionality is impressive.</span></p><span data-dcnode-id="1927" instrument_node=""> </span><ul data-dcnode-id="1913"><li data-dcnode-id="1914"><span data-dcnode-id="1926" instrument_node="">&nbsp;</span><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Read the </span></strong><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">full </span></strong><a data-dcnode-id="1917" data-id="106" data-m="{&quot;i&quot;:106,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:37}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/dyson-purifier-cool-review" tabindex="0" target="_blank"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Dyson Purifier Cool </span></strong><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">review</span></strong></a><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">.</span></strong></li></ul><span data-dcnode-id="1912" instrument_node=""> </span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">The Blue Pure 221 is designed to cover areas of up to 600 square feet, making it an excellent choice for homes with larger rooms or office spaces. With three power settings operated with a one-touch button, simplicity is the key for this purifier.</span></p><div data-dcnode-id="1025"><span data-dcnode-id="1909" instrument_node=""> </span><br data-dcnode-id="1908" data-embed-id="cms/api/amp/video/AARakwE" data-embed-source="content-bingmm" data-embed-type="content-auto"><p data-dcnode-id="1905" data-embed-id="cms/api/amp/video/AARakwE" data-embed-source="content-bingmm" data-embed-type="content-auto"><strong data-dcnode-id="1906 </span></div><span data-dcnode-id="1024" instrument_node=""> </span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Our at-home tests found the Blue Pure 221 to be consistently better than all the other air purifiers we tested. Despite its lack of Smart technology, it out-performed purifiers at almost double the price.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Some users may be put off by the unit’s weight and bulk. But it’s still a stylish machine that’s thoughtfully designed. Plus, its customizable fabric pre–filters make it easy to pair the unit with any home’s color scheme.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Our verdict? A dependable work horse of an air purifier that puts performance above presentation. Plus, we like the fact that it’s energy star certified and cheap to run.</span></p><span data-dcnode-id="1017" instrument_node=""> </span><ul data-dcnode-id="1007"><li data-dcnode-id="1008"><span data-dcnode-id="1016" instrument_node="">&nbsp;</span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Read the full </span></strong><a data-dcnode-id="1011" data-id="127" data-m="{&quot;i&quot;:127,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:58}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/blue-pure-211-review" tabindex="0" target="_blank"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Blue Pure 221 review</span></strong></a><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">.</span></strong></li></ul><span data-dcnode-id="1006" instrument_node=""> </span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">We’re currently in the process of testing the Coway AP 1512, with our exact findings still to come. However, the Coway AP 1512 is known as a standout air purifier due to its excellent value and high-quality performance.&nbsp;</span></p><span data-dcnode-id="1003" instrument_node=""> </span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">For an initial cost of under $300, this air purifier can offer you a four-stage filtration system, a HEPA filter and coverage of up to 361 square feet. The air purifier itself is packaged in a neat, sleek design and available in two different colors, black and white.&nbsp;</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">This air purifier excels when it comes to dust and eradicating odors, with a pre-filter and odorization filter for reducing contaminants in the air. It’s also inconspicuous when it comes to noise, making it a suitable addition to any bedroom when paired when its smaller size.&nbsp;</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The Coway AP 1512 Air Purifier also benefits from a built-in particle sensor. That means that you can get an idea of the air quality in your home from the color coding system on the top of the device. It’ll show a blue light when the air is clean, purple to flag pollution and red for high pollution. Another clever feature of the Coway AP 1512 is the sensors that can adjust the fan speed to keep the air clean, so that you don’t have to mess with the settings.&nbsp;</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The Coway AP 1512 is an air purifier suited to small spaces of rooms up to 361 square feet, making it suitable for smaller spaces and bedrooms. If you need something for a larger room, then you might want to look elsewhere while bearing in mind that this is a fantastic choice for smaller spaces.&nbsp;</span></p><span data-dcnode-id="994" instrument_node=""> </span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Small enough for any desktop or shelf, the Levoit H132’s compact size and low price makes it the ideal air purifier for someone looking to try their first air purifier at home. If you have a small apartment, or you simply want to use an air purifier in one room only, then this might be the product for you.&nbsp;</span></p><span data-dcnode-id="991" instrument_node=""> </span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The Levoit H132 might lack the wow–factor of more stylish purifiers. However, what it lacks in style, it certainly delivers in sheer affordability. Available for under $100, this is definitely one of the best air purifiers for those on a budget.&nbsp;</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">While this particular air purifier might lack the HEPA filter that gives premium air purifiers their mark of quality, it does come with an in-built dimmable nightlight, making it an ideal air purifier for a nursery or child’s bedroom. While it’s not possible to pre-program the unit, a memory function means that previous fan settings are logged before it powers down.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">The Levoit H132 may not have all the bells and whistles of a smart air purifier, but its affordability and compact size makes it the ideal entry-level indoor air purifier that performs well in small to medium-sized rooms.</span></p><span data-dcnode-id="984" instrument_node=""> </span><ul data-dcnode-id="974"><li data-dcnode-id="975"><span data-dcnode-id="983" instrument_node="">&nbsp;</span><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Read the full </span></strong><a data-dcnode-id="978" data-id="128" data-m="{&quot;i&quot;:128,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:59}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/levoit-h132-review" tabindex="0" target="_blank"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Levoit H132 review</span></strong></a><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">.</span></strong></li></ul><span data-dcnode-id="973" instrument_node=""> </span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Light and compact, the KOIOS EPI810 is the smallest air purifier we’ve reviewed. It will sit comfortably on any office desk or shelf and its 2.5lb weight makes it light enough to take travelling.&nbsp;</span></p><span data-dcnode-id="970" instrument_node=""> </span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The purifier can operate from a mains socket or via USB, while a simple one-click button control makes it one of the easiest air purifiers to operate straight out of the box. A built-in night light makes it a good choice for a nursery or kids’ room.</span></p><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">While it doesn’t have the wow factor when it comes to design, or the sophistication of a smart, connected air purifier, the KOIOS EPI810 may work well if you want something easy to operate. However, a noisy higher setting and a lacklustre performance in our at-home tests may put some users off.&nbsp;</span></p><span data-dcnode-id="965" instrument_node=""> </span><h3 class="article-body__section" data-dcnode-id="962"><span data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Are air purifiers worth it?</span></span></h3><span data-dcnode-id="961" instrument_node=""> </span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The best air purifiers are a great way to help improve the air space around you and your family. As well as protecting those with health issues from the multitude of air pollutants that gather indoors, those without specific concerns will have peace of mind that the right air purifier will make their environment cleaner.&nbsp;</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The best air purifiers that are most likely to give you the most benefit, for example those including a HEPA filter, tend to be at the higher end of budgets — generally into the hundreds of dollars. The size of the unit will also play a huge part in the cost — with the larger units that cover a larger area being greater in price. However, this Black Friday many of these pricier purifiers are on sale and you can get some of the best air purifiers for great knock-down prices.&nbsp;</span></p><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">If you have health concerns, or a recurring allergy, keeping pollutants out of your home with an air purifier is definitely worthwhile. Americans now spend roughly 90% of their time indoors, according to the </span><a data-dcnode-id="954" data-id="129" data-m="{&quot;i&quot;:129,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:60}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/report-environment/indoor-air-quality" tabindex="0" target="_blank"><span data-dcnode-id="955" instrument_node="">Environmental Protection Agency</span></a><span data-dcnode-id="953" instrument_node="">. It's here that potentially harmful air is able to build up, meaning there are up to five times higher levels of pollutants indoors, than outdoors. An air purifier can help reduce these levels significantly, though not entirely eradicate them, helping you and those around you breathe easier. &nbsp;&nbsp;&nbsp;</span></p><p data-dcnode-id="944"><span data-dcnode-id="951" instrument_node="">Depending on the type of allergy, and the trigger, air purifiers have also been found to help reduce the presence of particles in the air that cause allergic reactions, which can in turn cause asthma attacks. </span><a data-dcnode-id="949" data-id="130" data-m="{&quot;i&quot;:130,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:61}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/dehumidifiers-on-sale" tabindex="0" target="_blank"><span data-dcnode-id="950" instrument_node="">Dehumidifiers on sale</span></a><span data-dcnode-id="948" instrument_node=""> have also been shown to be </span><a data-dcnode-id="946" data-id="131" data-m="{&quot;i&quot;:131,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:62}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/are-dehumidifiers-good-for-asthma" tabindex="0" target="_blank"><span data-dcnode-id="947" instrument_node="">helpful for asthma sufferers</span></a><span data-dcnode-id="945" instrument_node="">, during times of high humidity. In cases where your indoor space has little or poor ventilation, air purifiers can also come in useful, especially if you are looking to tackle smoke and the resulting odor.&nbsp;</span></p><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">It is still unclear whether air purifiers do anything to prevent the spread of COVID-19 indoors. The Center for Disease Control (CDC) advises that you should </span><a data-dcnode-id="941" data-id="132" data-m="{&quot;i&quot;:132,&quot;p&quot;:59,&quot;n&quot;:&quot;partnerLink&quot;,&quot;y&quot;:24,&quot;o&quot;:63}" hasenterkeydown="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/coronavirus/2019-ncov/community/ventilation.html" tabindex="0" target="_blank"><span data-dcnode-id="942" instrument_node="">open doors and windows</span></a><span data-dcnode-id="940" instrument_node=""> to keep a good flow of air moving indoors — weather permitting, of course. HEPA filters, found in some air purifiers, have been found to remove some viruses from the air.&nbsp;</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">"Portable air cleaners have the potential to improve indoor air quality for any person who uses them properly" said Carroll. "The longer the air cleaner runs, the more air it filters.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">“Note that it is always important to reduce or remove the sources of indoor air pollutants and to ventilate with clean outdoor air," he said. "Filtration does not replace the need to control pollutants and ventilate." &nbsp;</span></p><span data-dcnode-id="934" instrument_node=""> </span><h3 class="article-body__section" data-dcnode-id="931"><span data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Air purifier benefits </span></span></h3><span data-dcnode-id="930" instrument_node=""> </span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">When it comes to selecting your purifier, ask yourself what kind of pollutant you need to target. "Choosing the right air cleaner will depend on the type of pollutant the user is targeting," Carroll said. "In general, to filter particles, choose a portable air cleaner that has a clean air delivery rate (CADR) that is large enough for the size of the room or area in which you will use it."</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">"The higher the CADR, the more particles the air cleaner can filter and the larger the area it can serve. Most air cleaner packaging will tell you the largest size area or room it should be used in. Portable air cleaners often achieve a high CADR by using a high-efficiency particulate air (HEPA) filter.</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">"To filter gases, choose a portable air cleaner with an activated carbon filter or other filter designed to remove gases.</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">"Consumers should be careful not to select an air cleaner that produces any ozone, which is a lung irritant. Both the California Air Resources Board and the Association of Home Appliance Manufacturers maintain lists of air cleaners that have been tested and shown to emit little or no ozone".&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
