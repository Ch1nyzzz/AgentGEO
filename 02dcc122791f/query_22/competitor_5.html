</span><p data-dcnode-id="542"><span data-dcnode-id="551" instrument_node="">Includes New Chilipad Cool Mesh Pad. Easy to Install, Remove, and Clean. Reversible Sides for Custom Comfort – Breathable Mesh Knit for Optimal Cooling Benefit (100% Polyester), Or Soft Quilted Side for All-season Comfort (52% Cotton / 48% Polyester Woven Blend).</span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">WATER-BASED SYSTEM: Utilizes an adjustable, water-based system to regulate the surface temperature of your existing mattress by actively circulating water through silicone micro-tubes in the pad, providing a more comfortable sleeping environment!</span><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">IMPROVE SLEEP QUALITY: Your body needs a physical change to signal that it’s time for sleep. This change is a drop in temperature. Use the heat-trapping properties of bedding materials to your advantage by cooling the mattress surface &amp; allowing the blankets to act as insulation. The wide temperature range – 55-115F (13-46C) – allows you to get improved, restful sleep! [*Not meant to replace conventional A/C. Peak operating performance can be impacted by ambient temperature and humidity.]IMPROVE PERFORMANCE: Allows for temperature control in one-degree increments so you can reach your ideal sleep temperature and experience the performance and productivity benefits of enhanced, rejuvenating REM sleep!</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">AID HEALTH EFFORTS: Designed with recovery benefits from cold therapy in mind, customer testimonials describe how its cooling capabilities assist in reducing sleeplessness from hot flashes, menopause, body pain &amp; night sweats, allowing a more relaxing sleep experience! Never wake up hot or tired again.</span><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">ENERGY EFFICIENT: With a power-rating of 80 Watts per cube, significantly lower than A/C, you can enjoy the benefits of energy efficiently sleeping at your ideal temperature!</span></p><span data-dcnode-id="541" instrument_node="">
