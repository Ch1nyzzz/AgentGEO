</span><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">【Clear OLED Display and Sensitive Touch Bar】Pixel style UI design shows on a clear OLED screen, enables bigger visible angle and more fun. Through the multi-colored indicator, you will know the air quality, the temperature and the humidity level of your room, with a glance from a distance. You may tap or slide the touch bar on the top to switch the readings as smoothly as to operate a touch screen.</span></li><span data-dcnode-id="469" instrument_node="">
