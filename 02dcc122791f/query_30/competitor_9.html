</span><span data-dcnode-id="1763"><span data-dcnode-id="1770" instrument_node="">
  I use a flushable clumping litter made of corn, thoroughly clean and disinfect my cat's litter pan every two weeks and fill with new litter, and keep urine clumps and stools scooped out so that she never has an excuse to take her business elsewhere. I bought this product to use between cleanings.</span><br data-dcnode-id="1769"><br data-dcnode-id="1768"><span data-dcnode-id="1767" instrument_node="">Before spraying it on the litter in the pan, I unscrewed the cap and took a sniff--the scent was light and clean. After spraying it directly on the litter however, there was an immediate bleach-like odor from the pan. I worried my cat would be put off by the pungent smell, and was relieved when it dissipated after a few minutes. Unfortunately, after the bleach odor went away, the litter pan odor returned, as if I hadn't sprayed anything at all.</span><br data-dcnode-id="1766"><br data-dcnode-id="1765"><span data-dcnode-id="1764" instrument_node="">Maybe this product would work better with clay litter--I can't say for sure because I don't use clay and don't intend to switch. But in my experience, it doesn't eliminate odor from corn litter, and I can't recommend it to anyone who uses that type of litter.

  I love ALL Zero Odor products (the ones I've tried, anyway). I have yet to be disappointed.  The Litter Box Odor Eliminator does exactly what it says ... it eliminate odor completely.  And I do mean completely.  I recently had to move into a very small studio apartment - with three cats. The only place to put the litter box is in the kitchen section of the studio.  It is imperative to keep the litter box odor absolutely at zero.  Even with a window practically right next to the box, it would be an impossible task without this product.There is a very slight smell of bleach when I first use the spray, but it's only a second or two and is very light.  When scooping or changing litter,  I give a couple of light squirts to scoop, the box and of course the litter itself.  It doesn't take much and makes what can be a very unpleasant job easier to deal with.

  This product is amazing and works exactly as described!! I was hopeful, but really didn’t expect it could do everything claimed in the description. Happily, I must say, I am just amazed at how good it works! I wouldn’t believe it if I hadn’t seen/smelled it myself. The most amazing thing I used it on was the inside of the litter genie. Ours just had such a terrible smell that I could’nt get rid of no matter what I tried. I sprayed the inside with this and closed it, waited just a little while, opened it..:no kiddin...the bad smell was totally gone. I stuck my face right down to it to prove to my husband that something absolutely amazing had just happened. Of course, he wasn’t interested..but for those of us who deal with the litter box,  it’s accessories and various challenges, smells, cleaning...having a reliable product that actually does what it is supposed to can be a rarity these days. You can use this spray for many things. When I do a complete clean of the litter box I wash n dry all the parts and spray this on all of them n let it mostly dry then wipe it off, as it will leave a white film (not sure if that’s the right word, but best I can think of). I spray it on the litter after I scoop each time. Like I said before, I use it in the litter genie, I use spray inside the top of the litter genie when I put a bag of poo in it. I sprayed the mat and floor around the litter box, the scooper...pretty much anything I think needs it, related to cat box and accessories. In my opinion this is definitely worth having if you have a pet. I’ve already ordered the refill because now that I’ve found the product I’ve been looking for,  I really don’t want to be without it. I also bought the Zero spray for pet stains and odors. Have only  used it once, on a small spot...it did fine. Will have to use it more to know, but I suspect it will do the job too.

</span><span data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">
  I have a “problem child” cat. She lets me know her displeasure after we have had any disruption in her perfect world of two-adults-no-kids  household.  I live on a lake , and my hubby’s and my families love to come for a week of lakeliving. Needless to say we go from a two-person household to as many at 18  guests for a week of chaos and noise and  fun several times per year.  This past summer my little problem child found a new place to disagree with our entertaining  plans. I didn’t catch her little deposits  until she had revisited the new place several times.  I have tried many products that promised odor elimination  but only masked the odor or left an unpleasant smell of the product. So I decided to try the Zero Odor.  It had a very fresh scent when sprayed onto the area. After drying  the offensive smell was greatly reduced.  I reapplied a few times , and each time the odor was barely noticeable.  I believe we have a winner!
