</span><h1 class="article-title" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The Invisible Man’s Ending &amp; Twists Explained</span></h1><span data-dcnode-id="1341" instrument_node="">

</span><section class="article-body" data-dcnode-id="781" id="article-body" itemprop="articleBody"><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1228"><strong data-dcnode-id="1236"><em data-dcnode-id="1237"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/invisible-man"><span data-dcnode-id="1239" instrument_node="">The Invisible Man</span></a></em></strong><span data-dcnode-id="1235" instrument_node="">&nbsp;ending helps establish Blumhouse's remake as one of the year's scariest movies - and it's full of twists and turns that may confuse some viewers.&nbsp;</span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1232" instrument_node=""> is one of the oldest ideas for a terrifying creature. The character was influential in literature when H.G. Wells first came up with the story, but the character gained a rich, new life once he joined </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/universal-monster-movies-reboot/"><span data-dcnode-id="1231" instrument_node="">Universal's stable of classical monsters</span></a><span data-dcnode-id="1229" instrument_node="">&nbsp;in the early 20th century.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1226" instrument_node="">In spite of the evergreen quality of this monster, it hasn't been an easy journey&nbsp;giving&nbsp;</span><em data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1223" instrument_node=""> a modern face-lift. Many updates to the material have happened over the years, but they usually struggle in some regard. In fact, all of Universal's classic monsters have failed to connect in a modern sense, but </span><em data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1220" instrument_node=""> has some of the least cache of the lot.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><span data-dcnode-id="1215" instrument_node="">
</span><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1208"><span class="related-single" data-dcnode-id="1209"><span data-dcnode-id="1212" instrument_node="">Related: </span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/hollow-man-movie-invisible-man-remake-bad-why/"><span data-dcnode-id="1211" instrument_node="">Hollow Man: What 2000’s Invisible Man Remake Got So Wrong</span></a></span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Writer and director Leigh Whannell uses the basic template that's been established for the Invisible Man&nbsp;but takes it to a much more cerebral and emotional place, which only amplifies the horror. It's a story that manages to be frightening - in both realistic and supernatural ways. Whannell's&nbsp;</span><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1203" instrument_node="">&nbsp;movie is by far the most successful take to come around in years and a lot of that has to do with the unexpected and ambitious places that the story goes.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><h2 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Was Adrian Really The Invisible Man Or Not? The TWO Invisible Men Explained</span></h2><span data-dcnode-id="1198" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1173"><span data-dcnode-id="1197" instrument_node="">
</span><div data-dcnode-id="1175" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1196" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1177" style="padding-bottom: 50%"><span data-dcnode-id="1195" instrument_node="">
</span><picture data-dcnode-id="1179"><span data-dcnode-id="1194" instrument_node="">
</span><span data-dcnode-id="1192" instrument_node="">
</span><source data-dcnode-id="1191" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1190" instrument_node="">
</span><source data-dcnode-id="1189" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1188" instrument_node="">
</span><source data-dcnode-id="1187" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1186" instrument_node="">
</span><source data-dcnode-id="1185" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/The-Invisible-Man-2020-Brother-Tom.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1184" instrument_node="">
</span><span data-dcnode-id="1182" instrument_node="">

</span></div><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">
</span></figure><span data-dcnode-id="1172" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1168"><span data-dcnode-id="1171" instrument_node="">
</span><span data-dcnode-id="1169" instrument_node="">
</span></div><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1166" instrument_node="">One of </span><em data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1163" instrument_node="">&nbsp;ending's biggest twists and revisions&nbsp;to the classic story is the fact that there's more than one invisible man. </span><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1160" instrument_node=""> throws a major wrench into things with the final act reveal that Adrian's brother, Tom, may have actually been responsible for the crimes in the film. As the 2020 </span><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Invisible Man</span></em><span data-dcnode-id="1157" instrument_node=""> remake entertains the idea that Tom might be the real villain, it simultaneously attempts to redeem Adrian in the process.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><span data-dcnode-id="1152" instrument_node="">
</span><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1137"><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1147" instrument_node=""> keeps both the audience and Cecilia (</span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/elisabeth-moss-best-movies-rotten-tomatoes/"><span data-dcnode-id="1146" instrument_node="">Elisabeth Moss</span></a><span data-dcnode-id="1144" instrument_node="">) guessing as to what the truth is here, and in doing so, it brilliantly extends the film’s theme on toxic relationships, trust, and doubt. With this, </span><em data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1141" instrument_node=""> doesn't just force Cecilia to wonder if there really is an invisible man but who that invisible man might be; there are multiple layers to it all. And to leave things on a more ambiguous note would be awfully wicked, but </span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">The Invisible Man </span></em><span data-dcnode-id="1138" instrument_node="">eventually relents and implicates Adrian. It turns out that Adrian manipulated his brother into helping not only stage his suicide but also fake his kidnapping. Adrian is the guilty one, and it's made clear that he really is the murderous invisible man in the film, but Tom still holds culpability in the scenario.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><span data-dcnode-id="1133" instrument_node="">
</span><span data-dcnode-id="1131" instrument_node="">
</span><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">What Was The Invisible Man's Plan?</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1103"><span data-dcnode-id="1127" instrument_node="">
</span><div data-dcnode-id="1105" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1126" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1107" style="padding-bottom: 50%"><span data-dcnode-id="1125" instrument_node="">
</span><picture data-dcnode-id="1109"><span data-dcnode-id="1124" instrument_node="">
</span><span data-dcnode-id="1122" instrument_node="">
</span><source data-dcnode-id="1121" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1120" instrument_node="">
</span><source data-dcnode-id="1119" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1118" instrument_node="">
</span><source data-dcnode-id="1117" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1116" instrument_node="">
</span><source data-dcnode-id="1115" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2020/02/oliver-jackson-cohen-in-the-invisible-man.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1114" instrument_node="">
</span><span data-dcnode-id="1112" instrument_node="">

</span></div><span data-dcnode-id="1104" instrument_node="">
</span></figure><span data-dcnode-id="1102" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1096" instrument_node="">Other takes on </span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1093" instrument_node=""> have been transparent with regards to the motivations that drive the invisible man. However, the 2020 </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Invisible Man</span></em><span data-dcnode-id="1090" instrument_node=""> remake is a very different story and it crafts a rather intricate mystery around its general horror premise. Films of this nature often hinge on the strength and plausibility of the evil master plan that's put into motion, and Adrian's scheme actually makes sense and is a relatively satisfying and surprising reveal. What's really terrifying about all of this is that Adrian's actions when he's invisible really aren't that different from how he operates beforehand. He's not interested in using this incredible ability for scientific purposes or to better mankind, but it just amplifies his </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/the-invisible-man-joker-toxic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1089" instrument_node="">abusive, predatory</span></a><span data-dcnode-id="1087" instrument_node="">&nbsp;behavior towards Cecilia.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><span data-dcnode-id="1082" instrument_node="">
</span><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span class="related-single" data-dcnode-id="1076"><span data-dcnode-id="1079" instrument_node="">Related: </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/invisible-man-2020-movie-budget-cost/"><span data-dcnode-id="1078" instrument_node="">How Much The Invisible Man Cost To Make</span></a></span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">When Adrian is together with Cecilia, he wants to break her spirit and make her dependent on him through emotional and physical abuse, not to mention toxic gaslighting. Even Adrian’s desire to trap her in a relationship with a child becomes more intense after his "death". Once Adrian becomes invisible, he takes these tactics to a whole new level as he tries to systematically make everyone, including Cecilia herself, believe she's crazy. Adrian slowly removes Cecilia’s support systems so she has no one else to turn to and needs to go back to him. Since he couldn't succeed in "life", the only way to make her truly his was to attempt this in "death". And to cap it all off, Adrian doesn't just stop with convincing Cecilia that she's having a mental breakdown; he also frames Cecilia for her sister's murder and tries to force her back into a family with him in the most evil way imaginable.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><span data-dcnode-id="1068" instrument_node="">
</span><span data-dcnode-id="1066" instrument_node="">
</span><h2 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">When Did Cecilia Become Pregnant?</span></h2><span data-dcnode-id="1063" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1038"><span data-dcnode-id="1062" instrument_node="">

</span></figure><span data-dcnode-id="1037" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1033"><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1034" instrument_node="">
</span></div><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1031" instrument_node="">Another one of the major turns and complications in the 2020&nbsp;</span><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Invisible Man</span></em><span data-dcnode-id="1028" instrument_node="">&nbsp;remake is that Cecilia becomes pregnant with Adrian's child, much to her horror. However, the film plays around with just when Cecilia becomes pregnant, with one alternative having a decidedly more disturbing implication behind it. </span><em data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1025" instrument_node="">&nbsp;ending intentionally keeps events murky, but Adrian and Cecilia are in such a destructive place before his "death," that it seems much more likely that he forces himself on her afterwards as one of the many ways that he psychologically tortures her. Both of these options are dark ideas, and Tom implies that Adrian swapped out Cecilia’s birth control beforehand. However, the more vengeful of the two scenarios seems more within Adrian's capabilities. He's absolutely hell-bent on ruining Cecilia, but Whannell's film deserves credit for grimly entertaining both options. As a film that's more about psychological horror, </span><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="1022" instrument_node=""> lets the viewers fill in the blanks themselves - and this drives that point home.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><span data-dcnode-id="1017" instrument_node="">
</span><span data-dcnode-id="1015" instrument_node="">
</span><h2 data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Cecilia Gets Away With Adrian's Murder At The End Of The Invisible Man</span></h2><span data-dcnode-id="1012" instrument_node="">

</span></div><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="974"><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="978" instrument_node="">&nbsp;ending pushes Cecilia to finally confront Adrian, her abuser, but through the guise of reconciliation. She cleverly takes advantage of Adrian's security cameras and invisibility suit to make it look like Adrian slit his own throat. Thanks to the scenario that Cecilia orchestrates, with James recording her conversation with Adrian, she's able to sell the illusion, finally end Adrian's horrors, and also get away with the invisibility suit. It initially seems like Cecilia’s plan is to try to trick Adrian to confess to his crimes, but her strategy is much more vindictive and permanent. It’s also the perfect way for Cecilia to show just how much she’s grown and that she’s much more clever than Adrian gives her credit for. She views this </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/the-rhythm-section-best-female-revenge-movies/"><span data-dcnode-id="977" instrument_node="">extreme revenge</span></a><span data-dcnode-id="975" instrument_node=""> as the only way to truly be free - and she does it by playing by Adrian's rules, just to a different level.</span></p><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="971" instrument_node="">
</span><h2 data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">What The Invisible Man's Ending Really Means</span></h2><span data-dcnode-id="968" instrument_node="">
</span><figure class="item-img" data-dcnode-id="943"><span data-dcnode-id="967" instrument_node="">
</span><div data-dcnode-id="945" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="966" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="947" style="padding-bottom: 50%"><span data-dcnode-id="965" instrument_node="">
</span><picture data-dcnode-id="949"><span data-dcnode-id="964" instrument_node="">
</span><span data-dcnode-id="962" instrument_node="">

</span></div><span data-dcnode-id="944" instrument_node="">
</span></figure><span data-dcnode-id="942" instrument_node="">
</span><div class="ad-even" data-dcnode-id="938"><span data-dcnode-id="941" instrument_node="">
</span><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="936" instrument_node="">Part of what makes this adaptation of </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The Invisible Man</span></em><span data-dcnode-id="933" instrument_node=""> narrative so engrossing is that it's just as much a story about the dangers of toxic relationships and emotional abuse as it is a horror film about supernatural murders. Yes, Cecilia has to overcome fantastical obstacles and defeat a literal monster, but what's perhaps even more important for her is that she learns how to be independent, respect herself, and avoid getting into a future relationship that preys upon her. It shows the damages of abusive behavior, how it can fester, and beget its own violence and revenge. This is the real message and triumph of </span><strong data-dcnode-id="930"><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The Invisible Man</span></em></strong><span data-dcnode-id="929" instrument_node="">&nbsp;ending, and it's a beautiful lesson to build into this monster movie.</span></p><span data-dcnode-id="927" instrument_node="">
</span><span data-dcnode-id="924" instrument_node="">
</span><span data-dcnode-id="922" instrument_node="">

</span><div class="bio-desc" data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Daniel Kurland is a freelance writer, comedian, and critic, who lives in the cultural mosaic that is Brooklyn, New York. Daniel’s work can be read on ScreenRant, Splitsider, Bloody Disgusting, Den of Geek, and across the Internet. He recently completed work on a noir anthology graphic novel titled, "Sylvia Plath’s The Bell Noir: A Rag of Bizarre Noir and Hard Boiled Tales" and he’s currently toiling away on his first novel.

Daniel knows that "Psycho II" is better than the original, that the finale of "How I Met Your Mother" doesn’t deserve the hate that it receives, and that Garth Ennis’ run of "Animal Man" may be the best superhero story of all time. He’s a fan of white grape juice and appreciates a good Fuji apple.

The owls are not what they seem.</span></p><span data-dcnode-id="795" instrument_node="">
