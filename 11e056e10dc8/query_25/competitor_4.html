</span><div class="article-content retro-folders" data-dcnode-id="1366" id="main-article"><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">
</span><span data-dcnode-id="2226" instrument_node="">
</span><span data-dcnode-id="2224" instrument_node="">
</span><span data-dcnode-id="2222" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="2217" style="width:280px;"><a class="twikilink" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/StressedEric" title="/pmwiki/pmwiki.php/WesternAnimation/StressedEric"><div class="lazy_load_img_box" data-dcnode-id="2219" style="padding-top:228.21%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/cruel_twist_ending_41.png" border="0" class="embeddedimage" data-dcnode-id="2220" height="639" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/cruel_twist_ending_41.png&amp;raw" width="280"></div></a></div><span data-dcnode-id="2216" instrument_node="">
</span><div class="acaptionright" data-dcnode-id="2214" style="width:280px;"><span data-dcnode-id="2215" instrument_node="">And they lived happily— Never mind.</span></div><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">
</span></p><div class="indent" data-dcnode-id="2197"><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">"It's not ironic, it's just mean!"</span></em><span data-dcnode-id="2207" instrument_node="">
</span><div class="indent" data-dcnode-id="2198"><span data-dcnode-id="2206" instrument_node="">— </span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Bender</span></strong><span data-dcnode-id="2203" instrument_node="">, </span><em data-dcnode-id="2200"><a class="twikilink" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Futurama" title="/pmwiki/pmwiki.php/WesternAnimation/Futurama"><span data-dcnode-id="2202" instrument_node="">Futurama</span></a></em><span data-dcnode-id="2199" instrument_node="">
</span></div></div><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2188"><span class="ad-caption" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2189" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2180"><span data-dcnode-id="2187" instrument_node="">A </span><a class="twikilink" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwistEnding" title="/pmwiki/pmwiki.php/Main/TwistEnding"><span data-dcnode-id="2186" instrument_node="">Twist Ending</span></a><span data-dcnode-id="2184" instrument_node=""> that serves no purpose other than to be </span><em data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">excessively cruel</span></em><span data-dcnode-id="2181" instrument_node="">.
</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2179" instrument_node="">The Cruel Twist Ending is basically the </span><a class="twikilink" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilCounterpart" title="/pmwiki/pmwiki.php/Main/EvilCounterpart"><span data-dcnode-id="2178" instrument_node="">Evil Counterpart</span></a><span data-dcnode-id="2176" instrument_node=""> of the </span><a class="twikilink" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicTwistEnding" title="/pmwiki/pmwiki.php/Main/KarmicTwistEnding"><span data-dcnode-id="2175" instrument_node="">Karmic Twist Ending</span></a><span data-dcnode-id="2173" instrument_node="">: in the latter, the twist is a form of divine justice, a bad thing happening to stop a bad person from </span><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserGuidedKarma" title="/pmwiki/pmwiki.php/Main/LaserGuidedKarma"><span data-dcnode-id="2172" instrument_node="">getting away with it</span></a><span data-dcnode-id="2170" instrument_node=""> (or a good thing happening to someone who deserves it). In the former, it's just </span><a class="twikilink" data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinaglesLaw" title="/pmwiki/pmwiki.php/Main/FinaglesLaw"><span data-dcnode-id="2169" instrument_node="">Finagle's Law</span></a><span data-dcnode-id="2167" instrument_node="">: the universe is a mean place and wants to hurt you. Often, a Cruel Twist Ending is what happens when a writer attempts a </span><a class="twikilink" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicTwistEnding" title="/pmwiki/pmwiki.php/Main/KarmicTwistEnding"><span data-dcnode-id="2166" instrument_node="">Karmic Twist Ending</span></a><span data-dcnode-id="2164" instrument_node="">, but fails to carry it off. It can be used for cruel irony and very dark humour but has to be undeserved and unsatisfying in order to be different from the karmic one.
</span></p><p data-dcnode-id="2138"><span data-dcnode-id="2162" instrument_node="">Most common in </span><a class="twikilink" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenreAnthology" title="/pmwiki/pmwiki.php/Main/GenreAnthology"><span data-dcnode-id="2161" instrument_node="">genre anthologies</span></a><span data-dcnode-id="2159" instrument_node=""> with a darker tone such as </span><em data-dcnode-id="2156"><a class="twikilink" data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheTwilightZone" title="/pmwiki/pmwiki.php/Franchise/TheTwilightZone"><span data-dcnode-id="2158" instrument_node="">The Twilight Zone</span></a></em><span data-dcnode-id="2155" instrument_node="">: </span><em data-dcnode-id="2152"><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TalesOfTheUnexpected" title="/pmwiki/pmwiki.php/Series/TalesOfTheUnexpected"><span data-dcnode-id="2154" instrument_node="">Tales of the Unexpected</span></a></em><span data-dcnode-id="2151" instrument_node="">, </span><em data-dcnode-id="2148"><a class="twikilink" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TalesFromTheDarkside" title="/pmwiki/pmwiki.php/Series/TalesFromTheDarkside"><span data-dcnode-id="2150" instrument_node="">Tales from the Darkside</span></a></em><span data-dcnode-id="2147" instrument_node="">, </span><em data-dcnode-id="2144"><a class="twikilink" data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Monsters" title="/pmwiki/pmwiki.php/Series/Monsters"><span data-dcnode-id="2146" instrument_node="">Monsters</span></a></em><span data-dcnode-id="2143" instrument_node="">, </span><em data-dcnode-id="2140"><a class="twikilink" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheOuterLimits1995" title="/pmwiki/pmwiki.php/Series/TheOuterLimits1995"><span data-dcnode-id="2142" instrument_node="">The Outer Limits (1995)</span></a></em><span data-dcnode-id="2139" instrument_node=""> (so often, in fact, that "Outer Limits Twist" was the previous trope name), etc.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2132"><span class="ad-caption" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2133" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2106"><span data-dcnode-id="2131" instrument_node="">Lighter-weight versions come up very often in shows where </span><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption" title="/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption"><span data-dcnode-id="2130" instrument_node="">Failure Is the Only Option</span></a><span data-dcnode-id="2128" instrument_node="">, especially when the show has run for a long time, and the writers need to contrive more and more extravagant reasons why the protagonists can't win. It can also be used as a shock subversion of a stereotypical happy ending. If it's overused, it becomes a </span><a class="twikilink" data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MandatoryTwistEnding" title="/pmwiki/pmwiki.php/Main/MandatoryTwistEnding"><span data-dcnode-id="2127" instrument_node="">Mandatory Twist Ending</span></a><span data-dcnode-id="2125" instrument_node="">. If the ending makes you wonder what the point of the story was, it can come across as a </span><a class="twikilink" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShootTheShaggyDog" title="/pmwiki/pmwiki.php/Main/ShootTheShaggyDog"><span data-dcnode-id="2124" instrument_node="">Shoot the Shaggy Dog</span></a><span data-dcnode-id="2122" instrument_node="">. The </span><a class="twikilink" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="2121" instrument_node="">Diabolus ex Machina</span></a><span data-dcnode-id="2119" instrument_node=""> also often gets involved. </span><a class="twikilink" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndThenJohnWasAZombie" title="/pmwiki/pmwiki.php/Main/AndThenJohnWasAZombie"><span data-dcnode-id="2118" instrument_node="">And Then John Was a Zombie</span></a><span data-dcnode-id="2116" instrument_node=""> is often an example. Compare </span><a class="twikilink" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotQuiteSavedEnough" title="/pmwiki/pmwiki.php/Main/NotQuiteSavedEnough"><span data-dcnode-id="2115" instrument_node="">Not Quite Saved Enough</span></a><span data-dcnode-id="2113" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuddenDownerEnding" title="/pmwiki/pmwiki.php/Main/SuddenDownerEnding"><span data-dcnode-id="2112" instrument_node="">Sudden Downer Ending</span></a><span data-dcnode-id="2110" instrument_node="">. May cause an </span><a class="twikilink" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AudienceAlienatingEnding" title="/pmwiki/pmwiki.php/Main/AudienceAlienatingEnding"><span data-dcnode-id="2109" instrument_node="">Audience-Alienating Ending</span></a><span data-dcnode-id="2107" instrument_node=""> if it's handed poorly.
</span></p><p data-dcnode-id="2105"></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2099"><span class="ad-caption" data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2100" id="proper-ad-tvtropes_mobile_ad_3"></div></div><h2 data-dcnode-id="2088"><span data-dcnode-id="2098" instrument_node="">This is a </span><a class="twikilink" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpoileredRotten" title="/pmwiki/pmwiki.php/Main/SpoileredRotten"><span data-dcnode-id="2097" instrument_node="">Spoilered Rotten</span></a><span data-dcnode-id="2095" instrument_node=""> trope, which means that </span><em data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">EVERY SINGLE EXAMPLE</span></em><span data-dcnode-id="2092" instrument_node=""> listed below is a spoiler by default and will be unmarked without a tag. </span><a class="twikilink" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Administrivia/YouHaveBeenWarned" title="/pmwiki/pmwiki.php/Administrivia/YouHaveBeenWarned"><span data-dcnode-id="2091" instrument_node="">Only proceed if you really believe you can handle this list</span></a><span data-dcnode-id="2089" instrument_node="">.</span></h2><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2086"></p><hr data-dcnode-id="2085"><h2 data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Example subpages:</span></h2><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">
</span></p><ul data-dcnode-id="2044"><li data-dcnode-id="2075"><span data-dcnode-id="2079" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/CruelTwistEnding/AnimeAndManga" title="/pmwiki/pmwiki.php/CruelTwistEnding/AnimeAndManga"><span data-dcnode-id="2078" instrument_node="">Anime &amp; Manga</span></a><span data-dcnode-id="2076" instrument_node="">

</span><ul data-dcnode-id="2002"><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node=""> An awareness campaign about child dyslexia showed a young boy sitting listlessly through a prizegiving ceremony at school, aware that he hasn't done well enough in any of his classes to receive a prize. Suddenly, his name is called, and he discovers he's won a prize for art and design (the only subject that involves little reading and writing) - then finds out his prize is a book token.
</span></li><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node=""> British charity St. John Ambulance, which trains people in first aid and provides voluntary first-aiders in the community, ran an advert showing a father undergoing cancer treatment. He survives, but then at the party intended to welcome him home from the hospital, he chokes to death because no one knows how to do first aid. The intended message was that the death rate from cancer is only slightly higher than that for people who could have been saved by basic first aid knowledge.
</span></li><li data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node=""> A controversial GoDaddy.com ad intended to run during the Super Bowl featured a puppy named Buddy getting separated from his owner and trekking a long distance to return to her. She is happy to see him...because she just sold him on her GoDaddy-hosted website. The ad drew ire from many viewers, with some activists accusing it of promoting puppy mills, and it was withdrawn.

can play those very games on the Nintendo Switch. Everyone's happy, but Cap then mentions that the portal's one-way only, meaning that the kids will never go back home again.
</span></li><li data-dcnode-id="2003"><span data-dcnode-id="2008" instrument_node=""> </span><a class="urllink" data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DBMbuBOOOX7g"><span data-dcnode-id="2007" instrument_node="">This British advert</span><img data-dcnode-id="2006" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2004" instrument_node=""> depicts a man being released from prison determined to improve his life and reconnect with his young son. He devotes himself to finding employment while spending time with his son and manages to get himself a job. With his ex-partner wishing him luck, things are looking bright...until the morning he is due to start work, as he is unable to get out of bed due to arthritis and is seen struggling to even move as his new boss gives up on him.

</span><ul data-dcnode-id="1818"><li data-dcnode-id="1962"><span data-dcnode-id="1976" instrument_node=""> </span><em data-dcnode-id="1973"><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/DanganronpaTheImmersiveLearningProgram" title="/pmwiki/pmwiki.php/Fanfic/DanganronpaTheImmersiveLearningProgram"><span data-dcnode-id="1975" instrument_node="">Danganronpa: The Immersive Learning Program</span></a></em><span data-dcnode-id="1972" instrument_node=""> ends on a </span><a class="twikilink" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Cliffhanger" title="/pmwiki/pmwiki.php/Main/Cliffhanger"><span data-dcnode-id="1971" instrument_node="">Cliffhanger</span></a><span data-dcnode-id="1969" instrument_node=""> with the titular Immersive Learning Program crashing, and the fate of the surviving students unknown. However, a single </span><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HopeSpot" title="/pmwiki/pmwiki.php/Main/HopeSpot"><span data-dcnode-id="1968" instrument_node="">Hope Spot</span></a><span data-dcnode-id="1966" instrument_node=""> precedes this with Kaede reaching for Shuichi's hand. Unfortunately, the fourth chapter of the sequel </span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Danganronpa: Academy of Discontent</span></em><span data-dcnode-id="1963" instrument_node=""> reveals that neither Shuichi or Kaede were able to get out in time, and were in fact two of the only three people not to do so, resulting in it becoming this instead.
</span></li><li data-dcnode-id="1948"><span data-dcnode-id="1961" instrument_node=""> In </span><em data-dcnode-id="1958"><a class="twikilink" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/DOOMRepercussionsOfEvil" title="/pmwiki/pmwiki.php/Fanfic/DOOMRepercussionsOfEvil"><span data-dcnode-id="1960" instrument_node="">DOOM: Repercussions of Evil</span></a></em><span data-dcnode-id="1957" instrument_node="">, the protagonist is suddenly transformed into a zombie with no explanation or foreshadowing.
</span><div class="indent" data-dcnode-id="1949"><span data-dcnode-id="1956" instrument_node=""> "</span><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MemeticMutation" title="/pmwiki/pmwiki.php/Main/MemeticMutation"><span data-dcnode-id="1955" instrument_node="">No, John. You are the demons</span></a><span data-dcnode-id="1953" instrument_node="">." </span><a class="twikilink" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndThenJohnWasAZombie" title="/pmwiki/pmwiki.php/Main/AndThenJohnWasAZombie"><span data-dcnode-id="1952" instrument_node="">And Then John Was a Zombie</span></a><span data-dcnode-id="1950" instrument_node="">.
</span></div></li><li data-dcnode-id="1936"><span data-dcnode-id="1947" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NestedStory" title="/pmwiki/pmwiki.php/Main/NestedStory"><span data-dcnode-id="1946" instrument_node="">story within a story</span></a><span data-dcnode-id="1944" instrument_node=""> of </span><em data-dcnode-id="1941"><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/FanFic/EquestriaAHistoryRevealed" title="/pmwiki/pmwiki.php/FanFic/EquestriaAHistoryRevealed"><span data-dcnode-id="1943" instrument_node="">Equestria: A History Revealed</span></a></em><span data-dcnode-id="1940" instrument_node="">, the fic's version of the end of the Hearts and Hooves Day legend certainly qualifies as this.
</span><ul data-dcnode-id="1937"><li data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node=""> The name of the book that the legend came from should have tipped somebody off, as it was supposedly titled "How the Sea-Pony Wished Upon a Star and Unknowingly Started Racial Prosecution Under An Emergent Fascist Regime: A Collection of Filly’s Tales and Legends That Start Off Whimsical But End in Destruction and Death".
</span></li></ul></li><li data-dcnode-id="1923"><span data-dcnode-id="1935" instrument_node=""> On the </span><em data-dcnode-id="1932"><a class="twikilink" data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Danganronpa" title="/pmwiki/pmwiki.php/Franchise/Danganronpa"><span data-dcnode-id="1934" instrument_node="">Danganronpa</span></a></em><span data-dcnode-id="1931" instrument_node=""> fic </span><em data-dcnode-id="1927"><a class="urllink" data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sarcasticfreedom.tumblr.com/fanganronpa"><span data-dcnode-id="1930" instrument_node="">Fangan Ronpa: Universal Despair Sale</span><img data-dcnode-id="1929" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1926" instrument_node=""> follows an alternate cast in an alternate school in the US, as usual Monobear appears and they are forced to kill each other in the Mutual Killing in the Mall of Monomerica. It mostly follows the same structure of the game: six chapters, and trials, except that in the last chapter when the remaining survivors defeat the Mastermind and earn their freedom, and then after having their last night at the mall remembering their fallen friends and vow to never forget about them once they're out just to end up in a different room, not the mall but not outside either, being part of a new batch of students and Monobear's voice:
</span><div class="indent" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node=""> Upupupu...It's time for round two!
</span></div></li><li data-dcnode-id="1910"><span data-dcnode-id="1922" instrument_node=""> </span><em data-dcnode-id="1919"><a class="twikilink" data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ThePowerpuffGirls" title="/pmwiki/pmwiki.php/WesternAnimation/ThePowerpuffGirls"><span data-dcnode-id="1921" instrument_node="">The Powerpuff Girls</span></a></em><span data-dcnode-id="1918" instrument_node=""> fic </span><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Immortality Relapse</span></em><span data-dcnode-id="1915" instrument_node=""> which actually gave two cruel twists, one for the first story </span><em data-dcnode-id="1912"><a class="twikilink" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/FanFic/ImmortalitySyndrome" title="/pmwiki/pmwiki.php/FanFic/ImmortalitySyndrome"><span data-dcnode-id="1914" instrument_node="">Immortality Syndrome</span></a></em><span data-dcnode-id="1911" instrument_node=""> and one for its own. The first comes midway though the story when Bubbles accidentally splashes some Antidote X on a revived Butch. This negates the murderous tendencies that came from being killed and revived when the Puffs were recreated. but Bubbles goes into shock when she realizes in the first story they managed to subdue Buttercup that way and Buttercup was trying to warn them before she was killed again in hopes of fixing the problem. But that pales in comparison to the ending, when it looks like they had stopped Boomer from activating his doomsday machine, but he remains alive long enough to turn it on and kill everyone on the planet. Some last-minute actions by the Professor allowed Bubble to be revived but she now the last living being alone on Earth.
</span></li><li data-dcnode-id="1882"><span data-dcnode-id="1909" instrument_node=""> </span><em data-dcnode-id="1905"><a class="urllink" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archiveofourown.org/works/10858911"><span data-dcnode-id="1908" instrument_node="">New Appreciation</span><img data-dcnode-id="1907" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1904" instrument_node=""> starts with </span><a class="twikilink" data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine" title="/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine"><span data-dcnode-id="1903" instrument_node="">Julian Bashir</span></a><span data-dcnode-id="1901" instrument_node=""> discovering his coworkers find him annoying and getting a replacement everybody hates whilst temporarily assigned elsewhere, and continues with the universe compounding the lesson by dumping </span><a class="twikilink" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TranshumanTreachery" title="/pmwiki/pmwiki.php/Main/TranshumanTreachery"><span data-dcnode-id="1900" instrument_node="">Colonel Bashir</span></a><span data-dcnode-id="1898" instrument_node=""> on them. At the end, the senior staff throw a little 'welcome back' party for the Bashir native to their universe, he and Garak get a </span><a class="twikilink" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipUpgrade" title="/pmwiki/pmwiki.php/Main/RelationshipUpgrade"><span data-dcnode-id="1897" instrument_node="">Relationship Upgrade</span></a><span data-dcnode-id="1895" instrument_node="">...and the very last line reveals that this is </span><em data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">still</span></em><span data-dcnode-id="1892" instrument_node=""> Colonel Bashir. </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeHorror" title="/pmwiki/pmwiki.php/Main/FridgeHorror"><span data-dcnode-id="1891" instrument_node="">Given how he talked about killing his counterpart if they ever met</span></a><span data-dcnode-id="1889" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillAndReplace" title="/pmwiki/pmwiki.php/Main/KillAndReplace"><span data-dcnode-id="1888" instrument_node="">the 'original' Bashir is almost certainly dead</span></a><span data-dcnode-id="1886" instrument_node="">, and probably never even knew how everyone else really felt. And the fic implies that Garak had a hand in arranging the original's transfer and replacement, making it even </span><em data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">worse</span></em><span data-dcnode-id="1883" instrument_node="">...
</span></li><li data-dcnode-id="1872"><span data-dcnode-id="1881" instrument_node=""> </span><em data-dcnode-id="1877"><span data-dcnode-id="1880" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/PokemonStrangledRed" title="/pmwiki/pmwiki.php/Fanfic/PokemonStrangledRed"><span data-dcnode-id="1879" instrument_node="">Pokemon Strangled Red</span></a></em><span data-dcnode-id="1876" instrument_node=""> has an in-universe example. In the eponymous hacked game, the aftergame consists of a </span><strong data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">giant</span></strong><span data-dcnode-id="1873" instrument_node=""> cruel twist. After winning the championship, Steven first loses Miki in an accident, then he turns into a monster in trying to bring her back to life, and finally kills Mike by strangulation.
</span></li><li data-dcnode-id="1863"><span data-dcnode-id="1871" instrument_node=""> </span><em data-dcnode-id="1868"><a class="twikilink" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/SonicXDarkChaos" title="/pmwiki/pmwiki.php/Fanfic/SonicXDarkChaos"><span data-dcnode-id="1870" instrument_node="">Sonic X: Dark Chaos</span></a></em><span data-dcnode-id="1867" instrument_node=""> has Sonic and his friends defeating Dark Tails and saving the galaxy. JUST KIDDING! Dark Tails' death allows an entire race of </span><em data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">even worse</span></em><span data-dcnode-id="1864" instrument_node=""> Lovecraftian horrors to finally escape. Which they do - and then promptly exterminate nearly all life in the universe.
</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1862" instrument_node=""> One arc of </span><em data-dcnode-id="1859"><a class="twikilink" data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/FanFic/YouGotHaruhiRolled" title="/pmwiki/pmwiki.php/FanFic/YouGotHaruhiRolled"><span data-dcnode-id="1861" instrument_node="">You Got HaruhiRolled!</span></a></em><span data-dcnode-id="1858" instrument_node=""> ends with Emiri having joined the Anti-SOS Brigade, giving them enough strength to kill all of the good guys except for Kyon and his family, and dooming the entire world. And all because Kyon told Emiri to </span><a class="twikilink" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeYourself" title="/pmwiki/pmwiki.php/Main/BeYourself"><span data-dcnode-id="1857" instrument_node="">Be Herself</span></a><span data-dcnode-id="1855" instrument_node="">. It's retconned away in the next chapter due to </span><a class="twikilink" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NegativeContinuity" title="/pmwiki/pmwiki.php/Main/NegativeContinuity"><span data-dcnode-id="1854" instrument_node="">Negative Continuity</span></a><span data-dcnode-id="1852" instrument_node="">, but still...</span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">ouch</span></em><span data-dcnode-id="1849" instrument_node="">.
</span></li><li data-dcnode-id="1819"><span data-dcnode-id="1847" instrument_node=""> </span><em data-dcnode-id="1844"><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/ADashOfLogic" title="/pmwiki/pmwiki.php/Fanfic/ADashOfLogic"><span data-dcnode-id="1846" instrument_node="">A Dash Of Logic</span></a></em><span data-dcnode-id="1843" instrument_node=""> does this to several </span><em data-dcnode-id="1840"><a class="twikilink" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/SpongeBobSquarePants" title="/pmwiki/pmwiki.php/WesternAnimation/SpongeBobSquarePants"><span data-dcnode-id="1842" instrument_node="">SpongeBob SquarePants</span></a></em><span data-dcnode-id="1839" instrument_node=""> episodes that originally had positive endings.
</span><ul data-dcnode-id="1820"><li data-dcnode-id="1831"><span data-dcnode-id="1838" instrument_node=""> In "Squid Baby", SpongeBob and Sandy travel back in time to prevent the former's past self from causing Squidward to suffer the head injury that caused him to revert back to an infant. </span><a class="twikilink" data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadFuture" title="/pmwiki/pmwiki.php/Main/BadFuture"><span data-dcnode-id="1837" instrument_node="">This somehow results in Squidward, SpongeBob, Patrick, and Mr. Krabs all suffering head injuries and Sandy being stuck taking care of them.</span></a><span data-dcnode-id="1835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ANaziByAnyOtherName" title="/pmwiki/pmwiki.php/Main/ANaziByAnyOtherName"><span data-dcnode-id="1834" instrument_node="">On top of that, they now live in a dystopian future where Man Ray rules over Bikini Bottom as a fascist dictator and Mermaid Man and Barnacle Boy have to hide in their basement.</span></a><span data-dcnode-id="1832" instrument_node="">
</span></li><li data-dcnode-id="1823"><span data-dcnode-id="1830" instrument_node=""> "Pest of the West" ends with Dead Eye Plankton </span><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBadGuyWins" title="/pmwiki/pmwiki.php/Main/TheBadGuyWins"><span data-dcnode-id="1829" instrument_node="">successfully stealing the deed to the Krusty Kantina and throwing SpongeBuck, William Krabs and Hopalong Tentacles out</span></a><span data-dcnode-id="1827" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoGoodDeedGoesUnpunished" title="/pmwiki/pmwiki.php/Main/NoGoodDeedGoesUnpunished"><span data-dcnode-id="1826" instrument_node="">all because SpongeBuck took pity on him earlier and unwittingly gave him the idea to build a giant steampunk robot to steal the deed</span></a><span data-dcnode-id="1824" instrument_node="">. To make matters worse, we then learn that the three met Sandy's ancestor, Adalynn Cheeks, and volunteered to be test subjects for her experimental aquarium. They all died in the process.
</span></li><li data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node=""> At the end of "Truth or Square", Tom Kenny tries to quit his role as SpongeBob/Patchy after finally realizing that the Nickelodeon execs no longer care about maintaining any quality with their flagship show, but is then reminded that he has signed a contract that makes him Nickelodeon's legal property and gets strongarmed by a pair of "Human Resources" thugs into staying. The poor guy can do nothing but whimper in resignation. The SpongeBob segment also reveals that the Krabby Patty formula is nothing but a sham made up by Mr. Krabs to market his food brand without spending a nickle.
</span></li></ul></li></ul></div><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1815"></p><div class="folderlabel" data-dcnode-id="1813" onclick="togglefolder('folder3');"><span data-dcnode-id="1814" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Gamebooks&nbsp;</span></div><div class="folder" data-dcnode-id="1768" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="1812" instrument_node="">
</span><ul data-dcnode-id="1769"><li data-dcnode-id="1797"><span data-dcnode-id="1811" instrument_node=""> A very, </span><em data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">very</span></em><span data-dcnode-id="1808" instrument_node=""> common trope in </span><em data-dcnode-id="1805"><a class="twikilink" data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ChooseYourOwnAdventure" title="/pmwiki/pmwiki.php/Literature/ChooseYourOwnAdventure"><span data-dcnode-id="1807" instrument_node="">Choose Your Own Adventure</span></a></em><span data-dcnode-id="1804" instrument_node=""> books, which take an extreme amount of pleasure in </span><a class="twikilink" data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveANiceDeath" title="/pmwiki/pmwiki.php/Main/HaveANiceDeath"><span data-dcnode-id="1803" instrument_node="">describing in great detail</span></a><span data-dcnode-id="1801" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheManyDeathsOfYou" title="/pmwiki/pmwiki.php/Main/TheManyDeathsOfYou"><span data-dcnode-id="1800" instrument_node="">how many ways you get killed</span></a><span data-dcnode-id="1798" instrument_node="">, even when everything up to the very last sentence leads you to believe that you reached a good ending.
</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1796" instrument_node=""> Similarly, the </span><em data-dcnode-id="1793"><a class="twikilink" data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/GiveYourselfGoosebumps" title="/pmwiki/pmwiki.php/Literature/GiveYourselfGoosebumps"><span data-dcnode-id="1795" instrument_node="">Give Yourself Goosebumps</span></a></em><span data-dcnode-id="1792" instrument_node=""> books all have far more bad endings than good endings for the reader. Many involve the player dying horribly (getting </span><a class="twikilink" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EatenAlive" title="/pmwiki/pmwiki.php/Main/EatenAlive"><span data-dcnode-id="1791" instrument_node="">Eaten Alive</span></a><span data-dcnode-id="1789" instrument_node=""> is pretty common), but readers can also end up </span><a class="twikilink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BalefulPolymorph" title="/pmwiki/pmwiki.php/Main/BalefulPolymorph"><span data-dcnode-id="1788" instrument_node="">permanently transformed into something awful</span></a><span data-dcnode-id="1786" instrument_node=""> (ex: an insect, a monster, or an </span><a class="twikilink" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndIMustScream" title="/pmwiki/pmwiki.php/Main/AndIMustScream"><span data-dcnode-id="1785" instrument_node="">immobile-yet-self-aware statue</span></a><span data-dcnode-id="1783" instrument_node="">), enslaved or imprisoned, getting hopelessly lost, or simply missing out on the whole adventure.
</span></li><li data-dcnode-id="1770"><span data-dcnode-id="1781" instrument_node=""> These show up in the similar </span><em data-dcnode-id="1778"><a class="twikilink" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/NintendoAdventureBooks" title="/pmwiki/pmwiki.php/Literature/NintendoAdventureBooks"><span data-dcnode-id="1780" instrument_node="">Nintendo Adventure Books</span></a></em><span data-dcnode-id="1777" instrument_node=""> as well. In one particular ending, you can have Mario knock down a brick wall with a hammer you found earlier in the quest (collecting certain items is necessary in all of these books)...after reading an entire page, the wall collapses </span><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">on him</span></em><span data-dcnode-id="1774" instrument_node=""> in the </span><strong data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">very last sentence</span></strong><span data-dcnode-id="1771" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1766"></p><div class="folderlabel" data-dcnode-id="1764" onclick="togglefolder('folder4');"><span data-dcnode-id="1765" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Light Novels&nbsp;</span></div><div class="folder" data-dcnode-id="1740" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="1763" instrument_node="">
</span><ul data-dcnode-id="1741"><li data-dcnode-id="1742"><span data-dcnode-id="1762" instrument_node=""> Many of the volumes of the </span><em data-dcnode-id="1759"><a class="twikilink" data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/VampireHunterD" title="/pmwiki/pmwiki.php/LightNovel/VampireHunterD"><span data-dcnode-id="1761" instrument_node="">Vampire Hunter D</span></a></em><span data-dcnode-id="1758" instrument_node=""> novels have </span><a class="twikilink" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1757" instrument_node="">Downer Endings</span></a><span data-dcnode-id="1755" instrument_node="">, but the end of the longest story, the 4-part </span><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Pale Fallen Angels</span></em><span data-dcnode-id="1752" instrument_node=""> was downright </span><em data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">sick</span></em><span data-dcnode-id="1749" instrument_node="">. Although many died, D has slain the evil vampire lord, the children are safe from the evil Guide, Taki is safe from being sacrificed and the good, evolved vampire Baron Byron Balazs is planning on forging the first links of friendship between the Nobility and mankind. Then, with no warning or preamble, a hypnotic suggestion planted in Taki causes her to attack Byron, he rips out her throat instinctively while defending himself and in his shame </span><a class="twikilink" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ICannotSelfTerminate" title="/pmwiki/pmwiki.php/Main/ICannotSelfTerminate"><span data-dcnode-id="1748" instrument_node="">he hires D to kill him</span></a><span data-dcnode-id="1746" instrument_node="">, which D does without hesitation. Apparently you just </span><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">can't</span></em><span data-dcnode-id="1743" instrument_node=""> have a happy ending in this series.
</span></li></ul></div><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1738"></p><div class="folderlabel" data-dcnode-id="1736" onclick="togglefolder('folder5');"><span data-dcnode-id="1737" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Music&nbsp;</span></div><div class="folder" data-dcnode-id="1731" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="1735" instrument_node="">
</span><ul data-dcnode-id="1732"><li data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node=""> The country music standard "The Night the Lights Went Out in Georgia". The song starts off as the narrator talking about a murder that occured in Georgia with a man murdering his unfaithful wife. The narrator mentions in the chorus that an innocent man was hanged. Near the end of the song, you learn that the innocent man was the betrayed husband. The true killer is the innocent man's sister. She killed her sister-in-law for cheating on her brother. So basically an innocent man was killed for a murder his sister committed. And she allowed her brother to die for her crime.
</span></li></ul></div><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1729"></p><div class="folderlabel" data-dcnode-id="1727" onclick="togglefolder('folder6');"><span data-dcnode-id="1728" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Newspaper Comics&nbsp;</span></div><div class="folder" data-dcnode-id="1696" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="1726" instrument_node="">
</span><ul data-dcnode-id="1697"><li data-dcnode-id="1698"><span data-dcnode-id="1725" instrument_node=""> Zany gag strip and </span><em data-dcnode-id="1722"><a class="twikilink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/FunkyWinkerbean" title="/pmwiki/pmwiki.php/ComicStrip/FunkyWinkerbean"><span data-dcnode-id="1724" instrument_node="">Funky Winkerbean</span></a></em><span data-dcnode-id="1721" instrument_node=""> spinoff </span><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">John Darling</span></em><span data-dcnode-id="1718" instrument_node=""> </span><a class="urllink" data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//funkywinkerbean.com/wpblog/wp-content/uploads/2019/10/Match-to-Flam-115.png"><span data-dcnode-id="1717" instrument_node="">(in)famously ended</span><img data-dcnode-id="1716" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">◊</span></small><span data-dcnode-id="1712" instrument_node=""> with the title character having his career ruined without ever achieving his dreams and then, completely out of the blue, being murdered on live TV by a crazed gunman. This was partially motivated by Tom Batiuk being in a contract dispute and wanting to discourage his syndicate from claiming and using the character, but Batiuk later stated the the primary goal was to give the strip (which was on the verge of cancellation due to the TV pages - which the comic was usually run on due to its TV-oriented humor - being crowded out by the explosion in cable channels) a dramatic sendoff rather than let it "wimp off into the sunset."
</span><ul data-dcnode-id="1699"><li data-dcnode-id="1700"><span data-dcnode-id="1711" instrument_node=""> This turned out to be mere foreshadowing. Two years later, </span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Funky Winkerbein</span></em><span data-dcnode-id="1708" instrument_node=""> itself (as well as </span><em data-dcnode-id="1705"><a class="twikilink" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/Crankshaft" title="/pmwiki/pmwiki.php/ComicStrip/Crankshaft"><span data-dcnode-id="1707" instrument_node="">Crankshaft</span></a></em><span data-dcnode-id="1704" instrument_node=""> to a lesser extent) made the jump from a zany gag strip to a </span><a class="twikilink" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CerebusSyndrome" title="/pmwiki/pmwiki.php/Main/CerebusSyndrome"><span data-dcnode-id="1703" instrument_node="">depressing and grim drama</span></a><span data-dcnode-id="1701" instrument_node=""> where Cruel Twist Endings are the norm.
</span></li></ul></li></ul></div><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1694"></p><div class="folderlabel" data-dcnode-id="1692" onclick="togglefolder('folder7');"><span data-dcnode-id="1693" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="1678" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="1691" instrument_node="">
</span><ul data-dcnode-id="1679"><li data-dcnode-id="1680"><span data-dcnode-id="1690" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Neuroshima" title="/pmwiki/pmwiki.php/TabletopGame/Neuroshima"><span data-dcnode-id="1689" instrument_node="">Neuroshima</span></a><span data-dcnode-id="1687" instrument_node="">: "Mercury" type campaigns are supposed to rely heavily on those.</span><span class="notelabel" data-dcnode-id="1684" onclick="togglenote('note0zn39');" style="cursor: pointer;"><sup data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1682" id="note0zn39" isnote="true" onclick="togglenote('note0zn39');" style="display: none; cursor: pointer;"><span data-dcnode-id="1683" instrument_node="">Campaigns in Neuroshima are divided into four "colours" defining the overall mood. Besides Mercury there is optimistic Steel, hedonistic Chromium and pessimistic Rust.</span></span><span data-dcnode-id="1681" instrument_node="">

</span><ul data-dcnode-id="1575"><li data-dcnode-id="1603"><span data-dcnode-id="1623" instrument_node=""> </span><em data-dcnode-id="1620"><a class="twikilink" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DokiDokiLiteratureClub" title="/pmwiki/pmwiki.php/VisualNovel/DokiDokiLiteratureClub"><span data-dcnode-id="1622" instrument_node="">Doki Doki Literature Club!</span></a></em><span data-dcnode-id="1619" instrument_node="">: The normal ending can be easily classified as this. After Monika restores the game and the rest of the characters </span><a class="twikilink" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainsDyingGrace" title="/pmwiki/pmwiki.php/Main/VillainsDyingGrace"><span data-dcnode-id="1618" instrument_node="">excluding herself</span></a><span data-dcnode-id="1616" instrument_node="">, everything seems to be going well...but unfortunately, when </span><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenkiGirl" title="/pmwiki/pmwiki.php/Main/GenkiGirl"><span data-dcnode-id="1615" instrument_node="">Sayori</span></a><span data-dcnode-id="1613" instrument_node=""> finds herself alone with the player, its revealed </span><a class="twikilink" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity" title="/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity"><span data-dcnode-id="1612" instrument_node="">her new position as the club leader transformed her into a meta</span></a><span data-dcnode-id="1610" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Yandere" title="/pmwiki/pmwiki.php/Main/Yandere"><span data-dcnode-id="1609" instrument_node="">Yandere</span></a><span data-dcnode-id="1607" instrument_node=""> just like Monika. A post-</span><a class="twikilink" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="1606" instrument_node="">Heel–Face Turn</span></a><span data-dcnode-id="1604" instrument_node=""> Monika decides the Literature Club is a place for no happiness and deletes the whole game to spare her friends from her pain.
</span></li><li data-dcnode-id="1594"><span data-dcnode-id="1602" instrument_node=""> </span><em data-dcnode-id="1599"><a class="twikilink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/RagingLoop" title="/pmwiki/pmwiki.php/VisualNovel/RagingLoop"><span data-dcnode-id="1601" instrument_node="">Raging Loop</span></a></em><span data-dcnode-id="1598" instrument_node=""> intentionally does this in its second true ending, </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlatantLies" title="/pmwiki/pmwiki.php/Main/BlatantLies"><span data-dcnode-id="1597" instrument_node="">A Wedding Celebrated By All</span></a><span data-dcnode-id="1595" instrument_node="">. After snagging the final two wolves in a single Feast, where only three humans died in the entire route, Haruaki and Rikako announce their love for one another, he brings Meiko to the police station to hopefully find her home again, then sells all his things so he can live a happy, married life in Yasumizu with Rikako and the rest of the survivors. When he gets back, he finds everyone except Rikako and Nosato with their heads split open. He searches for the other two, and finds them in the meeting hall, where Nosato is holding an axe and babbling about how the wolves are coming...and Rikako hanging from a noose in the center of it. He then kills Nosato and jumps off the cliff at the Hanging Pine. The intentionally part ties in, when it's revealed very late in the game, the entire reason behind the cruel twist was that Rikako was behind the entire event the game is around, which requires the wolves winning the Feast alongside Rikako staying alive. She was responsible for all the death, as the timeline resets upon presumably everyone in the Feast's death. In spite of this, she was having second thoughts; a part of her did legitimately want to live happily with Haruaki.
</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1593" instrument_node=""> </span><em data-dcnode-id="1590"><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SixRules" title="/pmwiki/pmwiki.php/VisualNovel/SixRules"><span data-dcnode-id="1592" instrument_node="">Six Rules</span></a></em><span data-dcnode-id="1589" instrument_node=""> is a heartwarming historical fiction short story about two children from </span><a class="twikilink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FeudingFamilies" title="/pmwiki/pmwiki.php/Main/FeudingFamilies"><span data-dcnode-id="1588" instrument_node="">Feuding Families</span></a><span data-dcnode-id="1586" instrument_node=""> who met and became friends...And then bam. Just kidding; it was a horror story all along, with no </span><a class="twikilink" data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImprobableInfantSurvival" title="/pmwiki/pmwiki.php/Main/ImprobableInfantSurvival"><span data-dcnode-id="1585" instrument_node="">Improbable Infant Survival</span></a><span data-dcnode-id="1583" instrument_node="">. The Minamoto clan is slaughtered by the Taira clan. Yukiri then reveals to a despairing Ryouji that she was manipulating him all along so to get information about the Minamoto clan. Ryuji is then captured and Yukiri mocks him for breaking the six rules before he's executed. </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Another View</span></em><span data-dcnode-id="1580" instrument_node=""> reveals she betrayed Ryuji in order to get love and recognition from her family...but the last words reveal that despite her intervention in the death of the Minamoto clan, </span><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllForNothing" title="/pmwiki/pmwiki.php/Main/AllForNothing"><span data-dcnode-id="1579" instrument_node="">her family is still cold to her and she's still as miserable as before</span></a><span data-dcnode-id="1577" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="1573" instrument_node="">

</span></li><li data-dcnode-id="1544"><span data-dcnode-id="1552" instrument_node=""> </span><em data-dcnode-id="1549"><a class="twikilink" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/PuffinForest" title="/pmwiki/pmwiki.php/WebAnimation/PuffinForest"><span data-dcnode-id="1551" instrument_node="">Puffin Forest</span></a></em><span data-dcnode-id="1548" instrument_node="">: The finale of the </span><em data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Curse of Strahd</span></em><span data-dcnode-id="1545" instrument_node=""> campaign saw the Shenani-guys successfully kill Strahd, install a new ruler, and part ways on good terms. Then the DM got to the epilogue. The new ruler turned out to be just as evil as Strahd and proceeded to break Garo's will, forcing him to become her subordinate as she slowly strangled the life and hope out of Barovia. Gouda was cursed by her patron to "always be the hero", meaning she is doomed to wander the Demi-planes of Dread for all eternity, spreading chaos in her wake. Krusk will follow Gouda for the rest of his life, unaware of just how damaging her actions are. Only Boshack had a happy ending.
</span></li><li data-dcnode-id="1507"><span data-dcnode-id="1543" instrument_node=""> </span><em data-dcnode-id="1540"><a class="twikilink" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/RWBY" title="/pmwiki/pmwiki.php/WebAnimation/RWBY"><span data-dcnode-id="1542" instrument_node="">RWBY</span></a></em><span data-dcnode-id="1539" instrument_node="">: As a </span><a class="twikilink" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RobotGirl" title="/pmwiki/pmwiki.php/Main/RobotGirl"><span data-dcnode-id="1538" instrument_node="">Robot Girl</span></a><span data-dcnode-id="1536" instrument_node=""> who seeks to be a normal girl with normal relationships, Penny obtaining the </span><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElementalPowers" title="/pmwiki/pmwiki.php/Main/ElementalPowers"><span data-dcnode-id="1535" instrument_node="">Winter Maiden power</span></a><span data-dcnode-id="1533" instrument_node=""> at the end of Volume 7 appears to conclude her Pinocchio-style journey to </span><a class="twikilink" data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecomeARealBoy" title="/pmwiki/pmwiki.php/Main/BecomeARealBoy"><span data-dcnode-id="1532" instrument_node="">become a real girl</span></a><span data-dcnode-id="1530" instrument_node="">. However, Watts hacks her in Volume 8 to force her to open the Vault of the Winter Maiden, and then self-terminate. The heroes manage to save her by turning her into a human with the </span><a class="twikilink" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtifactOfPower" title="/pmwiki/pmwiki.php/Main/ArtifactOfPower"><span data-dcnode-id="1529" instrument_node="">Relic of Creation</span></a><span data-dcnode-id="1527" instrument_node="">, fufilling Penny's lifelong dream of becoming a real girl...only for </span><a class="twikilink" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHeavy" title="/pmwiki/pmwiki.php/Main/TheHeavy"><span data-dcnode-id="1526" instrument_node="">Cinder</span></a><span data-dcnode-id="1524" instrument_node=""> to unexpectedly subvert her Pinocchio ending by </span><a class="twikilink" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="1523" instrument_node="">fatally injuring her</span></a><span data-dcnode-id="1521" instrument_node=""> </span><em data-dcnode-id="1518"><a class="twikilink" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="1520" instrument_node="">not even an hour</span></a></em><span data-dcnode-id="1517" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="1516" instrument_node="">afterwards</span></a><span data-dcnode-id="1514" instrument_node="">. The dying Penny declines to be healed and convinces Jaune to </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetterToDieThanBeKilled" title="/pmwiki/pmwiki.php/Main/BetterToDieThanBeKilled"><span data-dcnode-id="1513" instrument_node="">speed up her death</span></a><span data-dcnode-id="1511" instrument_node="">, thereby allowing her to pass the Maiden power to </span><a class="twikilink" data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StevenUlyssesPerhero" title="/pmwiki/pmwiki.php/Main/StevenUlyssesPerhero"><span data-dcnode-id="1510" instrument_node="">Winter</span></a><span data-dcnode-id="1508" instrument_node=""> instead of Cinder.

</span><p data-dcnode-id="1503"></p><div class="folderlabel" data-dcnode-id="1501" onclick="togglefolder('folder12');"><span data-dcnode-id="1502" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Webcomics&nbsp;</span></div><div class="folder" data-dcnode-id="1437" id="folder12" isfolder="true" style="display:block;"><span data-dcnode-id="1500" instrument_node="">
</span><ul data-dcnode-id="1438"><li data-dcnode-id="1485"><span data-dcnode-id="1499" instrument_node=""> The ending of the side story 'Flower Knight' in </span><em data-dcnode-id="1496"><a class="twikilink" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Drowtales" title="/pmwiki/pmwiki.php/Webcomic/Drowtales"><span data-dcnode-id="1498" instrument_node="">Drowtales</span></a></em><span data-dcnode-id="1495" instrument_node="">. A knight quested for years to find a flower beautiful enough to win the heart of his city's queen. He succeeds in finding this flower and brings it back to the city, presents it to the queen and wins her heart. The two live </span><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyEverAfter" title="/pmwiki/pmwiki.php/Main/HappilyEverAfter"><span data-dcnode-id="1494" instrument_node="">Happily Ever After</span></a><span data-dcnode-id="1492" instrument_node=""> for decades, producing </span><a class="twikilink" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BabiesEverAfter" title="/pmwiki/pmwiki.php/Main/BabiesEverAfter"><span data-dcnode-id="1491" instrument_node="">countless</span></a><span data-dcnode-id="1489" instrument_node=""> children and rule their city well. The flowers, which have bred, seeded and multiplied and are now owned by everyone in the city then drain the life out of their hosts, killing the entire Knight's family, wife, and city, leaving him the single survivor of his entire kingdom. He sets out to find and destroy the being that gave him the flower and is never heard from again. The cruelest twist? The </span><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">flowers are still around</span></em><span data-dcnode-id="1486" instrument_node=""> and threaten to begin their destructive cycle all over again.
</span></li><li data-dcnode-id="1474"><span data-dcnode-id="1484" instrument_node=""> </span><em data-dcnode-id="1481"><a class="twikilink" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/LovingReaper" title="/pmwiki/pmwiki.php/Webcomic/LovingReaper"><span data-dcnode-id="1483" instrument_node="">Loving Reaper</span></a></em><span data-dcnode-id="1480" instrument_node="">: Inverted. For a webcomic that is very tragic most of the time, the endings can sometimes be surprisingly heartwarming.
</span><ul data-dcnode-id="1475"><li data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node=""> The fox who's drowning in a pool ends up being saved by the teenage girl and Life.
</span></li><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node=""> A dog, with a seemingly maimed face, is never adopted, and belittled by people who are looking in shelters for dogs. The woman working at the shelter starts getting desperate, and gives up. She ends up taking him home and adopting him.
</span></li></ul></li><li data-dcnode-id="1465"><span data-dcnode-id="1473" instrument_node=""> In </span><em data-dcnode-id="1470"><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SluggyFreelance" title="/pmwiki/pmwiki.php/Webcomic/SluggyFreelance"><span data-dcnode-id="1472" instrument_node="">Sluggy Freelance</span></a></em><span data-dcnode-id="1469" instrument_node="">, Torg's "</span><a class="twikilink" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StylisticSuck" title="/pmwiki/pmwiki.php/Main/StylisticSuck"><span data-dcnode-id="1468" instrument_node="">Greatest Comic Book of All Time</span></a><span data-dcnode-id="1466" instrument_node="">" — Gunman Stan McKurt, the guy who shoots evil in the face, vows to kill anyone in order to keep the Gates to the City of the Damned shut. It turns out he's already inside the city and doesn't know it because he can't read.
</span></li><li data-dcnode-id="1439"><span data-dcnode-id="1464" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/PlatypusComix" title="/pmwiki/pmwiki.php/Website/PlatypusComix"><span data-dcnode-id="1463" instrument_node="">Platypus Comix</span></a><span data-dcnode-id="1461" instrument_node=""> story "Vess MacMeal Starring in: </span><a class="twikilink" data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMoreYouKnow" title="/pmwiki/pmwiki.php/Main/TheMoreYouKnow"><span data-dcnode-id="1460" instrument_node="">The More You Know</span></a><span data-dcnode-id="1458" instrument_node="">!" has an ending evoking those of cautionary stories written during the </span><a class="twikilink" data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ColdWar" title="/pmwiki/pmwiki.php/UsefulNotes/ColdWar"><span data-dcnode-id="1457" instrument_node="">Cold War</span></a><span data-dcnode-id="1455" instrument_node="">. The comic traces the introduction of an electronic tablet called, "The Kimwon". As the tale progresses, the Kimwon develops new apps that do everything from streaming movies and TV shows, to scanning groceries, to synthesizing food. These new apps eventually </span><a class="twikilink" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LuddWasRight" title="/pmwiki/pmwiki.php/Main/LuddWasRight"><span data-dcnode-id="1454" instrument_node="">take over all the Americans' jobs</span></a><span data-dcnode-id="1452" instrument_node="">. If that doesn't sound bad enough, it also turns out the Kimwon was invented by North Korean </span><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirtyCommunists" title="/pmwiki/pmwiki.php/Main/DirtyCommunists"><span data-dcnode-id="1451" instrument_node="">Dirty Communists</span></a><span data-dcnode-id="1449" instrument_node=""> as part of Kim Jong Il's plan to </span><a class="twikilink" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeOverTheWorld" title="/pmwiki/pmwiki.php/Main/TakeOverTheWorld"><span data-dcnode-id="1448" instrument_node="">Take Over the World</span></a><span data-dcnode-id="1446" instrument_node="">. If </span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">that</span></em><span data-dcnode-id="1443" instrument_node=""> doesn't sound bad enough, Kim Jong Il also reveals that </span><a class="twikilink" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SoylentGreen" title="/pmwiki/pmwiki.php/Film/SoylentGreen"><span data-dcnode-id="1442" instrument_node="">the Kimwon is made of people</span></a><span data-dcnode-id="1440" instrument_node="">!
</span></li></ul></div><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1435"></p><div class="folderlabel" data-dcnode-id="1433" onclick="togglefolder('folder13');"><span data-dcnode-id="1434" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Original&nbsp;</span></div><div class="folder" data-dcnode-id="1370" id="folder13" isfolder="true" style="display:block;"><span data-dcnode-id="1432" instrument_node="">
</span><ul data-dcnode-id="1371"><li data-dcnode-id="1414"><span data-dcnode-id="1431" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="1430" instrument_node="">Grand Finale</span></a><span data-dcnode-id="1428" instrument_node=""> of </span><em data-dcnode-id="1425"><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Machinima/ArbyNTheChief" title="/pmwiki/pmwiki.php/Machinima/ArbyNTheChief"><span data-dcnode-id="1427" instrument_node="">Arby 'n' the Chief</span></a></em><span data-dcnode-id="1424" instrument_node=""> can be considered this to a degree. Arbiter, </span><a class="twikilink" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoaringRampageOfRevenge" title="/pmwiki/pmwiki.php/Main/RoaringRampageOfRevenge"><span data-dcnode-id="1423" instrument_node="">having just ripped Master Chief to pieces for killing Cortana</span></a><span data-dcnode-id="1421" instrument_node="">, and having heard Tyler being murdered by a Police Officer outside his room, is about to kill himself by jumping out the window of Jon's Apartment from being traumatized by both events, until he is stopped by Claire. Despite Claire </span><a class="twikilink" data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAreBetterThanYouThinkYouAre" title="/pmwiki/pmwiki.php/Main/YouAreBetterThanYouThinkYouAre"><span data-dcnode-id="1420" instrument_node="">reassuring Arbiter that she'll always be there to comfort him</span></a><span data-dcnode-id="1418" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipSalvagingDisaster" title="/pmwiki/pmwiki.php/Main/RelationshipSalvagingDisaster"><span data-dcnode-id="1417" instrument_node="">and insisting on rebuilding their relationsip</span></a><span data-dcnode-id="1415" instrument_node="">, JUST as it seems it just might work, Arbiter changes his mind and joins Chief in being blown up in a gas explosion.
</span></li><li data-dcnode-id="1402"><span data-dcnode-id="1413" instrument_node=""> In 'Chuck's New Tux', a </span><em data-dcnode-id="1410"><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/HarryPartridge" title="/pmwiki/pmwiki.php/Creator/HarryPartridge"><span data-dcnode-id="1412" instrument_node="">Harry Partridge</span></a></em><span data-dcnode-id="1409" instrument_node=""> cartoon, the titular Chuck wants to avoid getting his new tuxedo stained. Of course </span><a class="twikilink" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HilarityEnsues" title="/pmwiki/pmwiki.php/Main/HilarityEnsues"><span data-dcnode-id="1408" instrument_node="">Hilarity Ensues</span></a><span data-dcnode-id="1406" instrument_node=""> when he slips on a skateboard and narrowly avoids crashing into people carrying food or paint, but just when he thinks he's going to end up falling into a cake, he instead gets brutally impaled on a fence. Audience reaction is practically split down the middle on this one, with some calling it brilliant </span><a class="twikilink" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkHumour" title="/pmwiki/pmwiki.php/Main/DarkHumour"><span data-dcnode-id="1405" instrument_node="">Dark Humour</span></a><span data-dcnode-id="1403" instrument_node=""> and others seeing it as disturbing, especially as it really is such a jarring shift in tone from the rest of the cartoon.
</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1401" instrument_node=""> The </span><em data-dcnode-id="1398"><a class="twikilink" data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LetsPlay/AchievementHunterGrandTheftAutoSeries" title="/pmwiki/pmwiki.php/LetsPlay/AchievementHunterGrandTheftAutoSeries"><span data-dcnode-id="1400" instrument_node="">Let's Play Grand Theft Auto V</span></a></em><span data-dcnode-id="1397" instrument_node=""> episode "The Grand Heist": The </span><a class="twikilink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AchievementHunter" title="/pmwiki/pmwiki.php/Creator/AchievementHunter"><span data-dcnode-id="1396" instrument_node="">Fake AH Crew</span></a><span data-dcnode-id="1394" instrument_node=""> (Geoff, Jack, Ryan, Michael and Gavin) are able to escape into a Titan and take off with Ray pulling off a </span><a class="twikilink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="1393" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="1391" instrument_node=""> to get them all into the air. It seems things are doing well until the Titan stalls out, causing it to plummet and hit a helicopter flying underneath, destroying the Titan and killing the entire team.
</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Creepypasta" title="/pmwiki/pmwiki.php/Main/Creepypasta"><span data-dcnode-id="1388" instrument_node="">Creepypasta</span></a><span data-dcnode-id="1386" instrument_node=""> "NoEnd House" ends with the protagonist, after nine rooms of psychological torment, finally escaping into the lobby and claiming his $500 prize. The dissonance between all the hell he went through and the money waiting there as if it wasn't a big deal makes him </span><a class="twikilink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaughingMad" title="/pmwiki/pmwiki.php/Main/LaughingMad"><span data-dcnode-id="1385" instrument_node="">laugh</span></a><span data-dcnode-id="1383" instrument_node="">, and he laughs all the way into his car, down the road, and to his home where a tiny "10" is etched into the door.
</span></li><li data-dcnode-id="1372"><span data-dcnode-id="1381" instrument_node=""> This short animated film </span><em data-dcnode-id="1377"><a class="urllink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dybop2CgBSfc"><span data-dcnode-id="1380" instrument_node="">Pig Me</span><img data-dcnode-id="1379" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1376" instrument_node="">, about an escaped slaughterhouse pig and his attempts to get brought like the other animals into a warm and loving household. From one commentator - </span><a class="twikilink" data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnicketWarningLabel" title="/pmwiki/pmwiki.php/Main/SnicketWarningLabel"><span data-dcnode-id="1375" instrument_node="">Caution: If you want the Happy Ending: STOP THE MOVIE BEFORE 6:00.</span></a><span data-dcnode-id="1373" instrument_node="">
</span></li></ul></div><span data-dcnode-id="1369" instrument_node="">
