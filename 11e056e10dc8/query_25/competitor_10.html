</span><h1 class="article-title" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">The 15 Most Ambiguous Endings In Movies</span></h1><span data-dcnode-id="1839" instrument_node="">
</span><p class="article-excerpt" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Some of the best movie endings don't wrap things up in a neat bow. We've rounded up 15 of the most ambiguous movie endings of all time.</span></p><span data-dcnode-id="1836" instrument_node="">

</span><source data-dcnode-id="1762" media="(min-width: 1024px)" sizes="960px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Birdman-Michael-Keaton-actor-movie.jpg?q=50&amp;fit=crop&amp;w=960&amp;h=500&amp;dpr=1.5 960w"><span data-dcnode-id="1761" instrument_node="">

</span><source data-dcnode-id="1756" media="(min-width: 0px)" sizes="480px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Birdman-Michael-Keaton-actor-movie.jpg?q=50&amp;fit=crop&amp;w=480&amp;h=300&amp;dpr=1.5 480w"><span data-dcnode-id="1755" instrument_node="">

</span></div></figure><span data-dcnode-id="1744" instrument_node="">
</span></figure></div><section class="article-body" data-dcnode-id="802" id="article-body" itemprop="articleBody"><span data-dcnode-id="1740" instrument_node="">
</span><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" style="font-weight: 400;"><span data-dcnode-id="1737" instrument_node="">Ending a movie on an ambiguous note takes a delicate touch. Some filmmakers, like the Coen Brothers or Martin Scorsese can make it look easy. But the truth is, the difference between an “ambiguous ending” and simply a non-ending is a very fine line. Even though it sometimes feels this way, ambiguous endings aren’t just endings that just suddenly stop without wrapping up the story. Ambiguous endings provide all the information the audience needs to draw their own conclusions and absorb the themes of the film, then step back and let the viewers fill in the rest. The best ambiguous endings leave viewers thinking about the film for weeks afterwards. They are endlessly discussable and constantly the subject of fan theories. </span></span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1732" style="font-weight: 400;"><span data-dcnode-id="1733" instrument_node="">We’ve rounded up our 15 absolute favorite ambiguous endings in film. Obviously, we’ll be discussing spoilers for the fifteen films below, so if you haven’t seen an entry, you’re advised to skip that one. These are the endings that don’t tie a neat bow on everything. These are the endings that stay in your head and leave you wondering. These are </span></span><b data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">The 15 Most Ambiguous Endings in Movies</span></b><span data-dcnode-id="1728" style="font-weight: 400;"><span data-dcnode-id="1729" instrument_node="">.</span></span></p><span data-dcnode-id="1726" instrument_node="">
</span><span data-dcnode-id="1724" instrument_node="">
</span><span data-dcnode-id="1722" instrument_node="">
</span><span data-dcnode-id="1720" instrument_node="">
</span><h2 data-dcnode-id="1716"><span class="item-num" data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">14</span></span><span data-dcnode-id="1717" instrument_node=""> No Country for Old Men</span></h2><span data-dcnode-id="1715" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1691"><span data-dcnode-id="1714" instrument_node=""> </span><div data-dcnode-id="1692" style="margin:0 auto;max-width:1544px;"><span data-dcnode-id="1713" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1694" style="padding-bottom: 50%"><span data-dcnode-id="1712" instrument_node="">
</span><picture data-dcnode-id="1696"><span data-dcnode-id="1711" instrument_node="">
</span><span data-dcnode-id="1709" instrument_node="">
</span><source data-dcnode-id="1708" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1707" instrument_node="">
</span><source data-dcnode-id="1706" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1705" instrument_node="">
</span><source data-dcnode-id="1704" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1703" instrument_node="">
</span><source data-dcnode-id="1702" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Tommy-Lee-Jones-No-Country-for-Old-Men.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1701" instrument_node="">
</span><span data-dcnode-id="1699" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1698"><span data-dcnode-id="1697" instrument_node="">
</span></picture><span data-dcnode-id="1695" instrument_node="">
</span></div><span data-dcnode-id="1693" instrument_node="">
</span></div></figure><span data-dcnode-id="1690" instrument_node="">
</span><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1686" style="font-weight: 400;"><span data-dcnode-id="1687" instrument_node="">Honestly, we could have almost filled this list with Coen Brothers endings. In the interest of fairness, we chose to limit ourselves to just a few of their most classic endings. We’ll begin with the poignant, mysterious finale of the Coen’s bleak, neo-western drama, </span></span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/no-country-for-old-men/" target="_blank"><i data-dcnode-id="1683"><span data-dcnode-id="1684" style="font-weight: 400;"><span data-dcnode-id="1685" instrument_node="">No Country for Old Men</span></span></i></a><span data-dcnode-id="1680" style="font-weight: 400;"><span data-dcnode-id="1681" instrument_node="">.</span></span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" style="font-weight: 400;"><span data-dcnode-id="1677" instrument_node="">In a few swift, brutal moments, several of our lead characters are left dead. Chigurh, the unholy force of evil sweeping the state, drives off, his fate uncertain. The movie finds Sheriff Ed Tom Bell (Tommy Lee Jones), the film’s ostensible conscience, talking to his wife over breakfast. Jones murmurs an enigmatic monologue, about the dreams he had the night before. Both dreams are about his father, who Bell observes is now the “younger man”, as Bell is 20 years older than his old man ever was. In one, he was supposed to receive some money from his father. In the other, he sees his father pass him on horseback on a cold mountain path, and he knows that he’ll join him up ahead. The screen goes black on this quiet moment, and the movie is over.</span></span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" style="font-weight: 400;"><span data-dcnode-id="1673" instrument_node="">Like a great piece of literature, film enthusiasts have pored over and discussed this monologue at length. It can be read in any number of ways, from a commentary on the changing society to a meditation on life and death or&nbsp;a eulogy for a simpler time. And like any great ending, all interpretations are valid.</span></span></p><span data-dcnode-id="1670" instrument_node="">
</span><span data-dcnode-id="1668" instrument_node="">
</span><span data-dcnode-id="1666" instrument_node="">
</span><span data-dcnode-id="1664" instrument_node="">
</span><h2 data-dcnode-id="1660"><span class="item-num" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">13</span></span><span data-dcnode-id="1661" instrument_node=""> The Blair Witch Project</span></h2><span data-dcnode-id="1659" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1635"><span data-dcnode-id="1658" instrument_node=""> </span><div data-dcnode-id="1636" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1657" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1638" style="padding-bottom: 50%"><span data-dcnode-id="1656" instrument_node="">
</span><picture data-dcnode-id="1640"><span data-dcnode-id="1655" instrument_node="">
</span><span data-dcnode-id="1653" instrument_node="">
</span><source data-dcnode-id="1652" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1651" instrument_node="">
</span><source data-dcnode-id="1650" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1649" instrument_node="">
</span><source data-dcnode-id="1648" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1647" instrument_node="">
</span><source data-dcnode-id="1646" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Blair-Witch-Project3.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1645" instrument_node="">
</span><span data-dcnode-id="1643" instrument_node="">
</span><img alt="Heather in The Blair Witch Project" class="lazyloaded" data-dcnode-id="1642"><span data-dcnode-id="1641" instrument_node="">
</span></picture><span data-dcnode-id="1639" instrument_node="">
</span></div><span data-dcnode-id="1637" instrument_node="">
</span></div></figure><span data-dcnode-id="1634" instrument_node="">
</span><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1630" style="font-weight: 400;"><span data-dcnode-id="1631" instrument_node="">Upon its release, </span></span><i data-dcnode-id="1627"><span data-dcnode-id="1628" style="font-weight: 400;"><span data-dcnode-id="1629" instrument_node="">The Blair Witch Project</span></span></i><span data-dcnode-id="1625" style="font-weight: 400;"><span data-dcnode-id="1626" instrument_node=""> was shrouded in mystery. Audiences wondered how much, if any, of what they were watching was actually real. The bare-bones marketing campaign made brilliant use of the nascent internet to fuel speculation and generate authenticity. All of this culminates in the final shot of the film, which is able to be completely terrifying without really revealing anything.</span></span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1621" style="font-weight: 400;"><span data-dcnode-id="1622" instrument_node="">The mysterious, chilling final shot of Mike standing in the corner is elegantly simple, yet arouses so much dread and mystery. Of course we never see an actual witch, or a killer of any sort. That would tie things up too neatly and inevitably leave us disappointed. Much more effective is the filmmakers' choice to incorporate details learned earlier in the film from the townsfolk. Early on, an old man tells the kids that a murderer in the woods used to kill children and make their friends stand in the corner as he did so. With this information in the back of our mind, that final shot of Mike in the corner sends shivers down our spine, without the film explicitly having to solve anything. We’ll have to see if the upcoming</span></span><i data-dcnode-id="1616"><span data-dcnode-id="1617" style="font-weight: 400;"><span data-dcnode-id="1620" instrument_node=""> </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/the-blair-witch-project/" target="_blank"><span data-dcnode-id="1619" instrument_node="">Blair Witch</span></a></span></i><span data-dcnode-id="1614" style="font-weight: 400;"><span data-dcnode-id="1615" instrument_node=""> sequel is able to craft an ending as chilling as the original.</span></span></p><span data-dcnode-id="1612" instrument_node="">
</span><span data-dcnode-id="1610" instrument_node="">
</span><span data-dcnode-id="1607" instrument_node="">
</span><h2 data-dcnode-id="1603"><span class="item-num" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">12</span></span><span data-dcnode-id="1604" instrument_node=""> Doubt</span></h2><span data-dcnode-id="1602" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1578"><span data-dcnode-id="1601" instrument_node=""> </span><div data-dcnode-id="1579" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1600" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1581" style="padding-bottom: 50%"><span data-dcnode-id="1599" instrument_node="">
</span><picture data-dcnode-id="1583"><span data-dcnode-id="1598" instrument_node="">
</span><span data-dcnode-id="1596" instrument_node="">
</span><source data-dcnode-id="1595" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1594" instrument_node="">
</span><source data-dcnode-id="1593" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1592" instrument_node="">
</span><source data-dcnode-id="1591" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1590" instrument_node="">
</span><source data-dcnode-id="1589" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/Philip-Seymour-Hoffman-in-Doubt.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1588" instrument_node="">
</span><span data-dcnode-id="1586" instrument_node="">
</span><img alt="Philip Seymour Hoffman in Doubt" class="lazyloaded" data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node="">
</span></picture><span data-dcnode-id="1582" instrument_node="">
</span></div><span data-dcnode-id="1580" instrument_node="">
</span></div></figure><span data-dcnode-id="1577" instrument_node="">
</span><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1573" style="font-weight: 400;"><span data-dcnode-id="1574" instrument_node="">John Patrick Shanley’s profound, subtle, and intelligent drama </span></span><i data-dcnode-id="1570"><span data-dcnode-id="1571" style="font-weight: 400;"><span data-dcnode-id="1572" instrument_node="">Doubt</span></span></i><span data-dcnode-id="1568" style="font-weight: 400;"><span data-dcnode-id="1569" instrument_node=""> is all about the unknown. The movie, based on a&nbsp;play of the same (also written by Shanley), tackles the thorny concepts of faith, religion, and trust with a nuanced and delicate touch. It’s only logical then that the emotional finale would resist easy answers as well.</span></span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" style="font-weight: 400;"><span data-dcnode-id="1565" instrument_node="">Philip Seymour Hoffman plays the charismatic new priest, Father Brendan Flynn. He charms his students and peers alike, with the notable exception of Sister Aloysius, played by Meryl Streep. Sister Aloysius is determinedly traditional in her management of the church, and she disapproves of the sweeping changes that Father Flynn represents. </span></span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" style="font-weight: 400;"><span data-dcnode-id="1561" instrument_node="">When Sister James (Amy Adams) informs Sister Aloysius that Father Flynn may be spending too much time with one particular student, Sister Aloysius begins a crusade to ruin Father Flynn. Are her suspicions justifiable? Is she letting her personal feelings inform her work? These questions are tackled deftly by the miraculous script, and all the actors provide some career best work. And of course, it ends in a beautiful and heartrending finale, where Sister Aloysius finally falters, if just for a moment. She confesses that she has her doubts. The ending beautifully sidesteps ever confirming or denying the allegations against Father Flynn. The film is far more interested in the dire consequences that doubt and suspicion and paranoia can have on the faithful.</span></span></p><span data-dcnode-id="1558" instrument_node="">
</span><span data-dcnode-id="1556" instrument_node="">
</span><span data-dcnode-id="1554" instrument_node="">
</span><h2 data-dcnode-id="1550"><span class="item-num" data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">11</span></span><span data-dcnode-id="1551" instrument_node=""> Inception</span></h2><span data-dcnode-id="1549" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1525"><span data-dcnode-id="1548" instrument_node=""> </span><div data-dcnode-id="1526" style="margin:0 auto;max-width:1560px;"><span data-dcnode-id="1547" instrument_node="">

</span><span data-dcnode-id="1543" instrument_node="">

</span><source data-dcnode-id="1536" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Inception-spinning-top.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Inception-spinning-top.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1535" instrument_node="">
</span><span data-dcnode-id="1533" instrument_node="">

</span></div><span data-dcnode-id="1527" instrument_node="">
</span></div></figure><span data-dcnode-id="1524" instrument_node="">
</span><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1520" style="font-weight: 400;"><span data-dcnode-id="1521" instrument_node="">Though it certainly has its detractors, </span></span><i data-dcnode-id="1516"><span data-dcnode-id="1517" style="font-weight: 400;"><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/inception/" target="_blank"><span data-dcnode-id="1519" instrument_node="">Inception</span></a></span></i><span data-dcnode-id="1514" style="font-weight: 400;"><span data-dcnode-id="1515" instrument_node=""> made an enormous cultural impact when it was released in summer of 2010. Despite its flaws, the Christopher Nolan blockbuster was unapologetically ambitious. A twisty, winding plot fused with stunning, mind-bending effects to create a dazzling, refreshingly original, summer spectacle.</span></span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" style="font-weight: 400;"><span data-dcnode-id="1511" instrument_node="">No doubt aiding in the film’s cultural impact was the famously ambiguous ending. Throughout the movie, Nolan plays with the audience, bending our trust, and making us question what was a dream and what was real. The characters themselves get lost in this from time to time, with Marion Cotillard’s Mal character being the most obvious example. We learn that Cobb (Leonardo DiCaprio) uses a special spinning top to help him keep reality separate from fantasy. Inevitably, when Cobb reaches his happy ending in the finale of the film, he gives the top a spin. The camera lingers on it as Cobb goes to join his family. The top keeps spinning, and spinning, and spinning and then-- the screen goes black. </span></span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" style="font-weight: 400;"><span data-dcnode-id="1507" instrument_node="">So is Cobb dreaming or did he make it back to reality? Nolan provides no easy answer. The point isn’t whether or not the ending is “real”, Nolan has stated. The point is that Cobb isn’t paying attention to the top at the end. This ambiguity is refreshing and unexpected in a tentpole summer blockbuster, and we appreciate the audacity.</span></span></p><span data-dcnode-id="1504" instrument_node="">
</span><span data-dcnode-id="1502" instrument_node="">
</span><span data-dcnode-id="1499" instrument_node="">
</span><h2 data-dcnode-id="1495"><span class="item-num" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">10</span></span><span data-dcnode-id="1496" instrument_node=""> 2001: A Space Odyssey</span></h2><span data-dcnode-id="1494" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1470"><span data-dcnode-id="1493" instrument_node=""> </span><div data-dcnode-id="1471" style="margin:0 auto;max-width:1920px;"><span data-dcnode-id="1492" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1473" style="padding-bottom: 50%"><span data-dcnode-id="1491" instrument_node="">

</span><span data-dcnode-id="1488" instrument_node="">
</span><source data-dcnode-id="1487" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2001-SPACE-ODESSEY.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2001-SPACE-ODESSEY.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1486" instrument_node="">

</span><source data-dcnode-id="1481" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2001-SPACE-ODESSEY.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2001-SPACE-ODESSEY.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1480" instrument_node="">
</span><span data-dcnode-id="1478" instrument_node="">
</span><img alt="2001: A Space Odyssey" class="lazyloaded" data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">
</span></picture><span data-dcnode-id="1474" instrument_node="">
</span></div><span data-dcnode-id="1472" instrument_node="">
</span></div></figure><span data-dcnode-id="1469" instrument_node="">
</span><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1465" style="font-weight: 400;"><span data-dcnode-id="1466" instrument_node="">“Ambiguous” somehow doesn’t even begin to capture the ending of </span></span><i data-dcnode-id="1462"><span data-dcnode-id="1463" style="font-weight: 400;"><span data-dcnode-id="1464" instrument_node="">2001: A Space Odyssey</span></span></i><span data-dcnode-id="1460" style="font-weight: 400;"><span data-dcnode-id="1461" instrument_node="">. As soon as Bowman is pulled into that colorful vortex, the film shakes loose any concerns with coherence or narrative. It becomes solely about feeling and is all the more powerful because of it.</span></span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" style="font-weight: 400;"><span data-dcnode-id="1457" instrument_node="">Spanning across millions of years, it makes sense for the film's finale to be suitably epic. The film truly is an “odyssey” in every sense and, like every odyssey, the journey is more important than the destination. Viewers aren’t necessarily supposed to fully understand what happens to Bowman at the end of the film, as he slides around in time and space. The logical part of our brain turns off as we witness the psychedelic colors and shifting cosmic landscape. We embrace the unknown, just like Bowman. A meditation on aging, history, and our place in the universe was never going to provide easy answers, and it shouldn’t. Kubrick simply asks the questions and lets us do the rest.</span></span></p><span data-dcnode-id="1454" instrument_node="">
</span><span data-dcnode-id="1452" instrument_node="">
</span><span data-dcnode-id="1450" instrument_node="">
</span><h2 data-dcnode-id="1446"><span class="item-num" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">9</span></span><span data-dcnode-id="1447" instrument_node=""> A Serious Man</span></h2><span data-dcnode-id="1445" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1421"><span data-dcnode-id="1444" instrument_node=""> </span><div data-dcnode-id="1422" style="margin:0 auto;max-width:1458px;"><span data-dcnode-id="1443" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1424" style="padding-bottom: 50%"><span data-dcnode-id="1442" instrument_node="">
</span><picture data-dcnode-id="1426"><span data-dcnode-id="1441" instrument_node="">
</span><span data-dcnode-id="1439" instrument_node="">

</span><source data-dcnode-id="1434" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2016/09/A-Serious-Man.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2016/09/A-Serious-Man.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1433" instrument_node="">

</span><span data-dcnode-id="1429" instrument_node="">
</span><img alt="A Serious Man" class="lazyloaded" data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">

</span></div><span data-dcnode-id="1423" instrument_node="">
</span></div></figure><span data-dcnode-id="1420" instrument_node="">
</span><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1416" style="font-weight: 400;"><span data-dcnode-id="1417" instrument_node="">One of the most thrilling, exhilarating, and ultimately haunting final shots of all time comes at the end of the Coen’s </span></span><i data-dcnode-id="1413"><span data-dcnode-id="1414" style="font-weight: 400;"><span data-dcnode-id="1415" instrument_node="">A Serious Man</span></span></i><span data-dcnode-id="1411" style="font-weight: 400;"><span data-dcnode-id="1412" instrument_node="">. Michael Stuhlbarg plays Larry Gopnik, a middle-aged physics professor who is undergoing a life crisis. His wife is leaving him, his unemployed brother is staying in his home, and his chances for tenure are growing slim. A plotline throughout the film is Gopnick struggling with the ethics of fudging a student’s grade to allow him to pass the class. In the final moments of the film, Gopnick makes his fateful decision. We then cut to his son on the playground as a tornado descends. Jefferson Airplane’s “Somebody to Love” blares as the screen goes black.</span></span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" style="font-weight: 400;"><span data-dcnode-id="1408" instrument_node="">It’s a beguiling and devastating ending to a brilliant film. There’s so much to unpack. Those final moments play out like a Shakespearean tragedy, and yet they don’t provide any concrete resolutions. We’re left to parse out the mystery of what we’ve seen, just as Gopnick tries to do with his own life.</span></span></p><span data-dcnode-id="1405" instrument_node="">
</span><span data-dcnode-id="1403" instrument_node="">
</span><span data-dcnode-id="1400" instrument_node="">
</span><h2 data-dcnode-id="1396"><span class="item-num" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">8</span></span><span data-dcnode-id="1397" instrument_node=""> The Graduate</span></h2><span data-dcnode-id="1395" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1371"><span data-dcnode-id="1394" instrument_node=""> </span><div data-dcnode-id="1372" style="margin:0 auto;max-width:1600px;"><span data-dcnode-id="1393" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1374" style="padding-bottom: 50%"><span data-dcnode-id="1392" instrument_node="">
</span><picture data-dcnode-id="1376"><span data-dcnode-id="1391" instrument_node="">
</span><span data-dcnode-id="1389" instrument_node="">
</span><source data-dcnode-id="1388" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Katharine-Ross-and-Dustin-Hoffman-in-The-Graduate.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1387" instrument_node="">
</span><source data-dcnode-id="1386" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Katharine-Ross-and-Dustin-Hoffman-in-The-Graduate.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1385" instrument_node="">
</span><source data-dcnode-id="1384" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Katharine-Ross-and-Dustin-Hoffman-in-The-Graduate.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1383" instrument_node="">
</span><source data-dcnode-id="1382" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/Katharine-Ross-and-Dustin-Hoffman-in-The-Graduate.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1381" instrument_node="">
</span><span data-dcnode-id="1379" instrument_node="">
</span><img alt="Katharine Ross and Dustin Hoffman in The Graduate" class="lazyload" data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">
</span></picture><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span></div></figure><span data-dcnode-id="1370" instrument_node="">
</span><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1366" style="font-weight: 400;"><span data-dcnode-id="1367" instrument_node="">This ambiguous ending is arguably the moment that propels </span></span><i data-dcnode-id="1363"><span data-dcnode-id="1364" style="font-weight: 400;"><span data-dcnode-id="1365" instrument_node="">The Graduate</span></span></i><span data-dcnode-id="1361" style="font-weight: 400;"><span data-dcnode-id="1362" instrument_node=""> from a great film to a masterpiece. The beautifully understated, darkly comedic drama is a wonderful film from the first frame. But in those last few moments, Mike Nichols shows us a glimpse of something very rarely seen in romantic dramas: uncertainty. As Benjamin Braddock (Dustin Hoffman) and Elaine&nbsp;(Katharine Ross) settle down in the back of the bus, the adrenaline they’ve just experienced from ditching her&nbsp;wedding begins to fade. Without any dialogue, we see reality set in on the actor’s faces. There’s doubt. There’s fear. There’s anxiety. And then, the film is over.</span></span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" style="font-weight: 400;"><span data-dcnode-id="1358" instrument_node="">These final moments are so brave and authentic, it’s hard to believe a studio allowed them to be included at all. The story goes that this ending wasn’t planned, but that Nichols allowed the cameras to go on filming longer than expected, and this was the reaction that he caught from Bancroft and Hoffman. Whether intentional or not, Nichols captured a profoundly human moment that cements this film as a classic. </span></span></p><span data-dcnode-id="1355" instrument_node="">
</span><span data-dcnode-id="1353" instrument_node="">
</span><span data-dcnode-id="1351" instrument_node="">
</span><span data-dcnode-id="1349" instrument_node="">
</span><span data-dcnode-id="1347" instrument_node="">
</span><h2 data-dcnode-id="1343"><span class="item-num" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">7</span></span><span data-dcnode-id="1344" instrument_node=""> Drive</span></h2><span data-dcnode-id="1342" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1318"><span data-dcnode-id="1341" instrument_node=""> </span><div data-dcnode-id="1319" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1340" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1321" style="padding-bottom: 50%"><span data-dcnode-id="1339" instrument_node="">
</span><picture data-dcnode-id="1323"><span data-dcnode-id="1338" instrument_node="">
</span><span data-dcnode-id="1336" instrument_node="">
</span><source data-dcnode-id="1335" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/08/Driver-Drive-car-Ryan-Gosling.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1334" instrument_node="">
</span><source data-dcnode-id="1333" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/08/Driver-Drive-car-Ryan-Gosling.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1332" instrument_node="">
</span><source data-dcnode-id="1331" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/08/Driver-Drive-car-Ryan-Gosling.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1330" instrument_node="">
</span><source data-dcnode-id="1329" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/08/Driver-Drive-car-Ryan-Gosling.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1328" instrument_node="">
</span><span data-dcnode-id="1326" instrument_node="">
</span><img alt="Ryan Gosling Driver Drive car toothpickRyan Gosling Driver Drive car toothpick" class="lazyload" data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">
</span></picture><span data-dcnode-id="1322" instrument_node="">
</span></div><span data-dcnode-id="1320" instrument_node="">
</span></div></figure><span data-dcnode-id="1317" instrument_node="">
</span><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1313" style="font-weight: 400;"><span data-dcnode-id="1314" instrument_node="">A lot of questions are left unanswered at the end of </span></span><i data-dcnode-id="1309"><span data-dcnode-id="1310" style="font-weight: 400;"><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/drive/" target="_blank"><span data-dcnode-id="1312" instrument_node="">Drive</span></a></span></i><span data-dcnode-id="1307" style="font-weight: 400;"><span data-dcnode-id="1308" instrument_node="">. What becomes of the Driver? Does he ever see Carey Mulligan’s character again? Does he even still drive? Nicolas Winding Refn boldly chooses to not lay this all out for his audience. He’s generous enough to show us that, no, the Driver is not dead. After a long, suspenseful take, the Driver blinks and we know he’ll survive. Any answers beyond that are not given though. </span></span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" style="font-weight: 400;"><span data-dcnode-id="1304" instrument_node="">This ambiguous ending is very fitting for the odd film that comes before it. Refn subverts tropes left and right as he tells the story of the getaway driver who falls for the girl next door. Refn traffics in gorgeous, violent visuals and pulsing action. He’s not terribly interested in cut-and-dry fairy tale endings. Like most of the movies on this list, the ambiguous ending is one of the main reasons we’re still talking about it years later. It sticks with us.</span></span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">
</span><span data-dcnode-id="1297" instrument_node="">
</span></p><h2 data-dcnode-id="1293"><span data-dcnode-id="1295" instrument_node="">7. Lost in Translation</span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/wp-content/uploads/lost-in-translation-bill-murray.jpg"></a></h2><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1291"></p><span data-dcnode-id="1290" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1266"><span data-dcnode-id="1289" instrument_node=""> </span><div data-dcnode-id="1267" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1288" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1269" style="padding-bottom: 50%"><span data-dcnode-id="1287" instrument_node="">
</span><picture data-dcnode-id="1271"><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1284" instrument_node="">
</span><source data-dcnode-id="1283" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-and-Scarlett-Johansson-in-Lost-in-Translation-ending.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1282" instrument_node="">
</span><source data-dcnode-id="1281" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-and-Scarlett-Johansson-in-Lost-in-Translation-ending.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1280" instrument_node="">
</span><source data-dcnode-id="1279" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-and-Scarlett-Johansson-in-Lost-in-Translation-ending.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1278" instrument_node="">
</span><source data-dcnode-id="1277" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-and-Scarlett-Johansson-in-Lost-in-Translation-ending.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1276" instrument_node="">
</span><span data-dcnode-id="1274" instrument_node="">
</span><img alt="Bill Murray and Scarlett Johansson in Lost in Translation ending" class="lazyload" data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">
</span></picture><span data-dcnode-id="1270" instrument_node="">
</span></div><span data-dcnode-id="1268" instrument_node="">
</span></div></figure><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1263" style="font-weight: 400;"><span data-dcnode-id="1264" instrument_node="">Sofia Coppola’s</span></span><i data-dcnode-id="1258"><span data-dcnode-id="1259" style="font-weight: 400;"><span data-dcnode-id="1262" instrument_node=""> </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/lost-in-translation/" target="_blank"><span data-dcnode-id="1261" instrument_node="">Lost in Translation</span></a></span></i><span data-dcnode-id="1256" style="font-weight: 400;"><span data-dcnode-id="1257" instrument_node=""> is as lovely and affecting now as it was when it first released in 2003. Bill Murray plays aging movie star Bob Harris, on location in Japan. In his hotel, he meets a lonely young college graduate named Charlotte, played by Scarlett Johansson. The two develop a sweet friendship, and bond over their adventures through Japan. The time goes when Bob must depart. In a wonderful move, Coppola chooses not to let the audience in on what Bob says to Charlotte as he leaves her. </span></span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" style="font-weight: 400;"><span data-dcnode-id="1253" instrument_node="">The choice to leave Bob’s farewell a mystery is absolutely perfect. We see the reactions on both of the actor’s faces, and that’s enough. Anything that we as the audience come up with in our heads is better than anything Coppola could have written. It’s a quiet, sweet ending to a quiet, sweet movie. </span></span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" style="font-weight: 400;"><span data-dcnode-id="1249" instrument_node="">Of course, with the internet being what it is, some jokers manipulated the audio to actually parse out what Bob says. But we’re not going to share that here. Coppola didn’t want us to know and we’ll respect that.</span></span></p><span data-dcnode-id="1246" instrument_node="">
</span><span data-dcnode-id="1244" instrument_node="">
</span><span data-dcnode-id="1242" instrument_node="">
</span><h2 data-dcnode-id="1238"><span class="item-num" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">6</span></span><span data-dcnode-id="1239" instrument_node=""> Blade Runner</span></h2><span data-dcnode-id="1237" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1213"><span data-dcnode-id="1236" instrument_node=""> </span><div data-dcnode-id="1214" style="margin:0 auto;max-width:1520px;"><span data-dcnode-id="1235" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1216" style="padding-bottom: 50%"><span data-dcnode-id="1234" instrument_node="">
</span><picture data-dcnode-id="1218"><span data-dcnode-id="1233" instrument_node="">
</span><span data-dcnode-id="1231" instrument_node="">
</span><source data-dcnode-id="1230" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Blade-Runner-runner-origami-unicorn.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1229" instrument_node="">
</span><source data-dcnode-id="1228" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Blade-Runner-runner-origami-unicorn.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1227" instrument_node="">
</span><source data-dcnode-id="1226" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Blade-Runner-runner-origami-unicorn.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1225" instrument_node="">
</span><source data-dcnode-id="1224" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/09/Blade-Runner-runner-origami-unicorn.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1223" instrument_node="">
</span><span data-dcnode-id="1221" instrument_node="">
</span><img alt="Blade Runner runner origami unicorn" class="lazyload" data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">
</span></picture><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span></div></figure><span data-dcnode-id="1212" instrument_node="">
</span><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node="">Is it still an ambiguous ending if the director goes and spoils it? That’s a question for philosophers! For our purposes, we are going to include </span></span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/blade-runner/" target="_blank"><i data-dcnode-id="1205"><span data-dcnode-id="1206" style="font-weight: 400;"><span data-dcnode-id="1207" instrument_node="">Blade Runner</span></span></i></a><span data-dcnode-id="1200" style="font-weight: 400;"><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/blade-runner/" target="_blank"><span data-dcnode-id="1203" instrument_node="">’s</span></a><span data-dcnode-id="1201" instrument_node=""> ambiguous finale in our list, despite Ridley Scott’s attempts to ruin all the fun.</span></span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1192"><i data-dcnode-id="1195"><span data-dcnode-id="1196" style="font-weight: 400;"><span data-dcnode-id="1197" instrument_node="">Blade Runner </span></span></i><span data-dcnode-id="1193" style="font-weight: 400;"><span data-dcnode-id="1194" instrument_node="">famously ends with the question of “Is Deckard a replicant?” still lingering in the air. The film isn’t explicit one way or another, but there is evidence to suggest that he is in fact, a replicant. At the end of the film, Deckard finds a small origami unicorn left as a gift for him. This is a callback to a dream he had earlier, implying that Gaff had access to his memories, which would only be possible if Deckard was a replicant.</span></span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" style="font-weight: 400;"><span data-dcnode-id="1190" instrument_node="">Of course, Ridley Scott made headlines a while back by announcing officially that Deckard was in fact a replicant the whole time. This certainly drains some of the mystery from the film, but taken on its own, we can still appreciate the ambiguity and mystery surrounding that finale.</span></span></p><span data-dcnode-id="1187" instrument_node="">
</span><span data-dcnode-id="1185" instrument_node="">
</span><span data-dcnode-id="1182" instrument_node="">
</span><h2 data-dcnode-id="1178"><span class="item-num" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">5</span></span><span data-dcnode-id="1179" instrument_node=""> Barton Fink</span></h2><span data-dcnode-id="1177" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1153"><span data-dcnode-id="1176" instrument_node=""> </span><div data-dcnode-id="1154" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1175" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1156" style="padding-bottom: 50%"><span data-dcnode-id="1174" instrument_node="">

</span><span data-dcnode-id="1171" instrument_node="">
</span><source data-dcnode-id="1170" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/Barton-Fink.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1169" instrument_node="">
</span><source data-dcnode-id="1168" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/Barton-Fink.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1167" instrument_node="">

</span><source data-dcnode-id="1164" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/Barton-Fink.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1163" instrument_node="">
</span><span data-dcnode-id="1161" instrument_node="">
</span><img alt="Barton Fink" class="lazyload" data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node="">
</span></picture><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
</span></div></figure><span data-dcnode-id="1152" instrument_node="">
</span><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1148" style="font-weight: 400;"><span data-dcnode-id="1149" instrument_node="">Though it initially was a box office bomb, only grossing $6 million back from its $9 million budget, </span></span><i data-dcnode-id="1145"><span data-dcnode-id="1146" style="font-weight: 400;"><span data-dcnode-id="1147" instrument_node="">Barton Fink</span></span></i><span data-dcnode-id="1143" style="font-weight: 400;"><span data-dcnode-id="1144" instrument_node=""> has gone on to become one of the most revered entries in the Coen’s incredible career. Not only is it one of their most revered films, it is also one of their most puzzled over works. Much of this is due to the absurd, heightened ending of the film. </span></span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node="">With the help of Charlie Meadows (John Goodman), Barton Fink (John Turturro) escapes the two detectives holding him in his room and flees the burning hotel that has been the source of his torturous purgatory for the past few days. Fink goes to the beach, where he encounters a woman just like the one in the picture he’s been staring at above his desk. She asks what’s in his box (which may or may not be decapitated heads) and he says he doesn’t know. The woman then assumes the pose of the girl in the photograph, and a bird flies straight into the ocean. Audiences are left with&nbsp;this baffling note. The ending is delightful in its absurdity. You can puzzle over it for hours and not even scratch the surface of this perplexing, dazzling film.</span></span></p><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1135" instrument_node="">
</span><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1129"><span class="item-num" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">4</span></span><span data-dcnode-id="1130" instrument_node=""> Birdman</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1104"><span data-dcnode-id="1127" instrument_node=""> </span><div data-dcnode-id="1105" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1126" instrument_node="">

</span><source data-dcnode-id="1119" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/08/EMMA-STONE-BIRDMAN.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1118" instrument_node="">
</span><source data-dcnode-id="1117" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/08/EMMA-STONE-BIRDMAN.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1116" instrument_node="">
</span><source data-dcnode-id="1115" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2016/08/EMMA-STONE-BIRDMAN.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1114" instrument_node="">
</span><span data-dcnode-id="1112" instrument_node="">
</span><img alt="Emma Stone in Birdman" class="lazyload" data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
</span></picture><span data-dcnode-id="1108" instrument_node="">
</span></div><span data-dcnode-id="1106" instrument_node="">
</span></div></figure><span data-dcnode-id="1103" instrument_node="">
</span><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1100" instrument_node="">Best Picture winner </span></span><i data-dcnode-id="1095"><span data-dcnode-id="1096" style="font-weight: 400;"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/birdman/" target="_blank"><span data-dcnode-id="1098" instrument_node="">Birdman</span></a></span></i><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node=""> leaves us with plenty to marvel over. The illusion of one long, unbroken take is hypnotizing and impressive. The film is stacked with marvelous actors, from Michael Keaton to Emma Stone, to Edward Norton and Naomi Watts. The writing is a pitch perfect satire of celebrity and show business. Most importantly, the movie ends on a cryptic and bizarre note that leaves viewers thinking for days.</span></span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" style="font-weight: 400;"><span data-dcnode-id="1090" instrument_node="">After his botched onstage suicide attempt, Riggan Thomson (Keaton) is left disfigured in the hospital. He’s been met with the best reviews of his life, and his daughter is no longer ashamed of him. On this high note, he makes his way to the bathroom and, seeing birds through the window, climbs out and jumps off the ledge. Sam (Emma Stone) returns, rushes to the window, then looks into the air and smiles. It’s a perfectly bizarre ending to a perfectly bizarre movie. What did she see as she looked up into the sky? That’s up to you to decide.</span></span></p><span data-dcnode-id="1087" instrument_node="">
</span><span data-dcnode-id="1085" instrument_node="">
</span><span data-dcnode-id="1082" instrument_node="">
</span><h2 data-dcnode-id="1078"><span class="item-num" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">3</span></span><span data-dcnode-id="1079" instrument_node=""> American Psycho</span></h2><span data-dcnode-id="1077" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1053"><span data-dcnode-id="1076" instrument_node=""> </span><div data-dcnode-id="1054" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1075" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1056" style="padding-bottom: 50%"><span data-dcnode-id="1074" instrument_node="">
</span><picture data-dcnode-id="1058"><span data-dcnode-id="1073" instrument_node="">
</span><span data-dcnode-id="1071" instrument_node="">
</span><source data-dcnode-id="1070" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Christian-Bale-in-American-Psycho-final-scene.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1069" instrument_node="">
</span><source data-dcnode-id="1068" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Christian-Bale-in-American-Psycho-final-scene.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1067" instrument_node="">
</span><source data-dcnode-id="1066" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Christian-Bale-in-American-Psycho-final-scene.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1065" instrument_node="">
</span><source data-dcnode-id="1064" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/Christian-Bale-in-American-Psycho-final-scene.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1061" instrument_node="">
</span><img alt="Christian Bale in American Psycho final scene" class="lazyload" data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
</span></picture><span data-dcnode-id="1057" instrument_node="">
</span></div><span data-dcnode-id="1055" instrument_node="">
</span></div></figure><span data-dcnode-id="1052" instrument_node="">
</span><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1048" style="font-weight: 400;"><span data-dcnode-id="1049" instrument_node="">One of the most notoriously ambiguous endings in the history of fiction, </span></span><i data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-weight: 400;"><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/american-psycho/" target="_blank"><span data-dcnode-id="1047" instrument_node="">American Psycho</span></a></span></i><span data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" instrument_node=""> has shocked and titillated filmgoers for years. Based on Bret Easton Ellis’ satirical novel, the film, directed by Mary Harron, is divisive and perplexing. </span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" style="font-weight: 400;"><span data-dcnode-id="1039" instrument_node="">The entire last act of the film is a genuine descent into hell. Patrick Bateman&nbsp;(an incredible early performance by Christian Bale) becomes more and more violent and insane, until he careens off the ledge and things explode into full-blown chaos. He attempts to feed a kitten to an ATM, he confesses all of his crimes to his lawyer over the phone, and he murders about half of Manhattan. And in the morning, nothing has changed. There are no bodies. His friends won’t believe his confessions. He must continue living his life, unpunished.</span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">This bizarre ending defies reality, but it drives home the themes at play in the film. Bateman, like the audience, is denied the catharsis of a punishment. He continues to live in a fugue state, not quite living and not quite dead. This purgatory is the state that we leave him in. As the sign behind him reads, "</span><em data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">This is not an exit.</span></em><span data-dcnode-id="1032" instrument_node="">"</span></span></p><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1027" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1021"><span class="item-num" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">2</span></span><span data-dcnode-id="1022" instrument_node=""> Broken Flowers</span></h2><span data-dcnode-id="1020" instrument_node="">
</span><figure class="item-img" data-dcnode-id="996"><span data-dcnode-id="1019" instrument_node=""> </span><div data-dcnode-id="997" style="margin:0 auto;max-width:1810px;"><span data-dcnode-id="1018" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="999" style="padding-bottom: 50%"><span data-dcnode-id="1017" instrument_node="">
</span><picture data-dcnode-id="1001"><span data-dcnode-id="1016" instrument_node="">
</span><span data-dcnode-id="1014" instrument_node="">
</span><source data-dcnode-id="1013" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-Broken-Flowers.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="1012" instrument_node="">
</span><source data-dcnode-id="1011" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-Broken-Flowers.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="1010" instrument_node="">
</span><source data-dcnode-id="1009" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-Broken-Flowers.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="1008" instrument_node="">
</span><source data-dcnode-id="1007" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2016/09/Bill-Murray-Broken-Flowers.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="1006" instrument_node="">
</span><span data-dcnode-id="1004" instrument_node="">
</span><img alt="Bill Murray in Broken Flowers" class="lazyload" data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
</span></picture><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span></div></figure><span data-dcnode-id="995" instrument_node="">
</span><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="991" style="font-weight: 400;"><span data-dcnode-id="992" instrument_node="">The mystery that propels the loose plot of </span></span><i data-dcnode-id="988"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Broken Flowers</span></span></i><span data-dcnode-id="986" style="font-weight: 400;"><span data-dcnode-id="987" instrument_node=""> is never really solved throughout the course of the film. Bill Murray plays Don Johnston, a former Don Juan type who is now living out his retirement in peace. He is disrupted from his bliss by a letter claiming that he has a nineteen year old son out there somewhere. This leads Don on a journey to meet with several women from his past and attempt to untangle his messy past lives. </span></span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" style="font-weight: 400;"><span data-dcnode-id="983" instrument_node="">At the end of the film, Don is no closer to answers than he was at the beginning. He begins to believe the whole “son” thing might have been a hoax. As he stands by the side of the road, a car drives by. Recognition flashes across Don’s face. The car is driven by a young man (played by Bill Murray’s real son, Homer Murray) and he is listening to the same song as Don. The movie never explicitly spells out whether or not that was Don’s son. Instead, it does something far more interesting. It asks us how much our memories are colored and affected by our present. Can we trust our past? The film, directed by Jim Jarmusch, is ponderous and deeply affecting, due in no small part to its vague ending.</span></span></p><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><span data-dcnode-id="975" instrument_node="">
</span><h2 data-dcnode-id="971"><span class="item-num" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">1</span></span><span data-dcnode-id="972" instrument_node=""> The Thing</span></h2><span data-dcnode-id="970" instrument_node="">
</span><figure class="item-img" data-dcnode-id="946"><span data-dcnode-id="969" instrument_node=""> </span><div data-dcnode-id="947" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="968" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="949" style="padding-bottom: 50%"><span data-dcnode-id="967" instrument_node="">
</span><picture data-dcnode-id="951"><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="964" instrument_node="">
</span><source data-dcnode-id="963" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/The-Thing-Poster-Art.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px"><span data-dcnode-id="962" instrument_node="">
</span><source data-dcnode-id="961" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/The-Thing-Poster-Art.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px"><span data-dcnode-id="960" instrument_node="">
</span><source data-dcnode-id="959" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/The-Thing-Poster-Art.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px"><span data-dcnode-id="958" instrument_node="">
</span><source data-dcnode-id="957" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2016/09/The-Thing-Poster-Art.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px"><span data-dcnode-id="956" instrument_node="">
</span><span data-dcnode-id="954" instrument_node="">
</span><img alt="The Thing Poster Art" class="lazyload" data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
</span></picture><span data-dcnode-id="950" instrument_node="">
</span></div><span data-dcnode-id="948" instrument_node="">
</span></div></figure><span data-dcnode-id="945" instrument_node="">
</span><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="941" style="font-weight: 400;"><span data-dcnode-id="942" instrument_node="">Our favorite ambiguous ending of all time comes at the end of one of the greatest horror films of all time: John Carpenter’s </span></span><i data-dcnode-id="937"><span data-dcnode-id="938" style="font-weight: 400;"><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/john-carpenter-the-thing-best-remake/%3Fview%3Dall" target="_blank"><span data-dcnode-id="940" instrument_node="">The Thing</span></a></span></i><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">. It’s haunting, eerie, and somehow entirely satisfying without being pandering. It leaves us replaying everything we’ve just seen in our heads, and trying to come to a conclusion. It’s brilliant.</span></span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" style="font-weight: 400;"><span data-dcnode-id="932" instrument_node="">A shapeshifting alien has wiped out almost every man on a remote Antarctic research station. Only two men remain: Mac (Kurt Russell) and Childs (Keith David). With flamethrowers trained on each other, and their camp destroyed around them, they sit in the snow. Either of them could be the alien in disguise. There’s no way to know. Of course, if one of them was the alien, he can’t reveal himself, or he’d be killed. “</span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">What do we do?</span></em><span data-dcnode-id="929" instrument_node="">” asks Childs. “</span><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Why don’t we just… wait here for a little while… see what happens?</span></em><span data-dcnode-id="926" instrument_node="">” is Mac’s response. With that chilling final line, the movie fades to black.</span></span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" style="font-weight: 400;"><span data-dcnode-id="922" instrument_node="">Did the alien survive? Will it slumber in the ice, only to wreak havoc on the world when it is set free once again? Carpenter brilliantly realized that not knowing is so much scarier than knowing.</span></span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917" style="text-align: center;"><span data-dcnode-id="918" instrument_node="">---</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" style="font-weight: 400;"><span data-dcnode-id="915" instrument_node="">What are some of your favorite ambiguous endings? Let us know in the comments below!</span></span></p><span data-dcnode-id="912" instrument_node="">
