ion":"0"}" data-image-title="reveal_1000x666" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;A picture of a mountain because in stories, character revelations often take place on one.&amp;lt;/p&amp;gt;

" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="reveal_1000x666" data-large-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?fit=1000%2C666&amp;ssl=1" data-medium-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?fit=600%2C400&amp;ssl=1" data-orig-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?fit=1000%2C666&amp;ssl=1" data-orig-size="1000,666" data-permalink="https://www.slaphappylarry.com/reversals-and-reveals/reveal_1000x666/" data-recalc-dims="1" data-sizes="(max-width: 1000px) 100vw, 1000px" data-src="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=1000%2C666" data-srcset="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?w=1000&amp;ssl=1 1000w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=600%2C400&amp;ssl=1 600w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=768%2C511&amp;ssl=1 768w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=676%2C450&amp;ssl=1 676w" height="666" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg%3Fresize%3D1000%252C666&amp;raw" srcset="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?w=1000&amp;ssl=1 1000w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=600%2C400&amp;ssl=1 600w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=768%2C511&amp;ssl=1 768w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2017/04/reveal_1000x666.jpg?resize=676%2C450&amp;ssl=1 676w" width="1000"><figcaption data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">A picture of a mountain because in stories, character revelations often take place on one.</span></figcaption></figure><blockquote class="wp-block-quote is-style-large" data-dcnode-id="1293"><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The first principle of aesthetics is either interest or suspense. You can’t expect to communicate with anyone if you’re a bore.</span></p><cite data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">John Cheever</span></cite></blockquote><h3 data-dcnode-id="1291" id="what-are-reveals"><span data-dcnode-id="1292" instrument_node="">WHAT ARE ‘REVEALS’?</span></h3><h5 data-dcnode-id="1289" id="peripeteia"><span data-dcnode-id="1290" instrument_node="">Peripeteia</span></h5><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">A sudden change of events or reversal of circumstances, especially in a literary work.</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Contemporary English speakers have a bit of trouble remembering ‘peripeteia’, myself included, so of course ‘reveal’ caught on.</span></p><h5 data-dcnode-id="1283" id="reveal"><span data-dcnode-id="1284" instrument_node="">REVEAL</span></h5><p data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">‘Reveal’ started out as a verb, but is now commonly used by writers as a noun. This happened </span><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">when novelists turned to TV, apparently</span></strong><span data-dcnode-id="1279" instrument_node="">.</span></p><blockquote class="wp-block-quote" data-dcnode-id="1272"><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">‘Oh darling, [story is]&nbsp;just two or three little surprises followed every now and again by a bigger surprise.</span></p><cite data-dcnode-id="1273"><em data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Peggy Ramsay, agent</span></em></cite></blockquote><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">A revelation is basically a surprise.</span></p><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Revelation is seen by the audience&nbsp;as motion, even if nothing has changed but knowledge or insight.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">In a low-key way, a reveal is simply the answer to a question which the storyteller has prompted the audience to ask earlier in the narrative. The job of scenes is to answer (</span><em data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">reveal </span></em><span data-dcnode-id="1264" instrument_node="">the answer to) these questions.</span></p><blockquote class="wp-block-quote" data-dcnode-id="1253"><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">The ending of every scene has to be logical; it can’t cheat the readers. They have eagerly read the scene, worrying about a question. So to play fair with them, the&nbsp;conclusion of your scene has to answer the question posed by the goal in the first place.</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">So if the question was whether the destroyer would sink the sub, the end of the scene has&nbsp;to answer that question. If the question was whether the woman would get the job, the end of the scene has to tell whether she did or didn’t get the job.</span></p><cite data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">from&nbsp;</span><em data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">38 Most Common Fiction Writing Mistakes</span></em><span data-dcnode-id="1255" instrument_node="">&nbsp;by Jack M Bickham</span></cite></blockquote><h3 data-dcnode-id="1250" id="what-are-reversals"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">WHAT ARE ‘REVERSALS’?</span></strong></h3><p data-dcnode-id="1241"><span data-dcnode-id="1249" instrument_node="">‘Reversals’ are ‘big reveals’. The audience’s understanding of </span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">everything in the story is turned on its head</span></strong><span data-dcnode-id="1246" instrument_node="">. They suddenly see every element of the plot in a new light. All reality changes in an instant. ‘Reversal’ is a term writers use. Audiences tend to just say ‘plot twist’, but that often just means a sequence they weren’t able to easily predict. For example, when Andy escapes in </span><strong data-dcnode-id="1243"><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Shawshank Redemption</span></em></strong><span data-dcnode-id="1242" instrument_node="">, that’s not a reversal. It might qualify as a twist because we generally expect life-prisoners to stay where they are.&nbsp;</span></p><p data-dcnode-id="1232"><em data-dcnode-id="1238"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The Sixth Sense</span></strong></em><span data-dcnode-id="1237" instrument_node="">, however, includes a genuine reversal because the famous revelation requires us to regard the entire story until that point in a completely different light.&nbsp;The big reversal reveal comes right at the end of the story. This has the advantage of sending the audience out of the theater with a knockout punch. It’s the biggest reason this&nbsp;movie was a hit. (M. Night Shyalaman didn’t come up with the idea of the psychologist being dead until well after his first draft. Though he managed to make it feel very new, Shyalaman was borrowing from a long tradition of </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadAllAlong"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Dead All Along</span></strong></a><span data-dcnode-id="1233" instrument_node=""> characters.)&nbsp;</span></p><figure class="wp-block-embed is-type-rich is-provider-twitter wp-block-embed-twitter" data-dcnode-id="1217"><div class="wp-block-embed__wrapper" data-dcnode-id="1218"><blockquote class="twitter-tweet" data-dcnode-id="1221" data-dnt="true" data-width="500"><p data-dcnode-id="1225" dir="ltr" lang="en"><span data-dcnode-id="1231" instrument_node="">In 'The Sixth Sense' (1999) when Cole says the famous line, 'I see dead people' the camera does a closeup on Bruce Willis' face</span><br data-dcnode-id="1230"><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">The producers were worried that might give the twist away, but fortunately, none of the test audiences picked up on it </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/eZBoaTYE7s"><span data-dcnode-id="1227" instrument_node="">pic.twitter.com/eZBoaTYE7s</span></a></p><span data-dcnode-id="1224" instrument_node="">— Film Facts 🎬 (@Factsonfilm) </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Factsonfilm/status/1291475347356049409%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1223" instrument_node="">August 6, 2020</span></a></blockquote><span data-dcnode-id="1219" instrument_node=""> </span></div></figure><p data-dcnode-id="1211"><span data-dcnode-id="1216" instrument_node="">An example of a reversal is when </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//elitedaily.com/entertainment/pretty-little-liars-finale-reveals-a-d/2004798/"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">the audience finds out who A.D. is on Pretty Little Liars</span></strong></a><span data-dcnode-id="1212" instrument_node="">. A mistake the writers of that show made was waiting seven seasons to give that information to the audience. Desperate Housewives, the writer’s mentor series, wrapped up mysteries at the end of each season, not at the end of the entire series. This is called a ‘reveal’ but is also a reversal because we realise A.D. was in front of us the whole time. We are asked to think back on everything we’ve seen so far and consider in a new light.</span></p><p data-dcnode-id="1207"><em data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">An example of the frustration experienced by viewers when information is withheld across years</span></em><span data-dcnode-id="1208" instrument_node="">:</span></p><blockquote class="wp-block-quote" data-dcnode-id="1202"><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">THIS LAST HALF HOUR BETTER BLOW MY MIND BC I WAITED 7 SEASONS TO FIND OUT AD IS SPENCERS TWIN WHEN THAT WAS PREDICTED ALREADY !!! #PLLFinale</span></p><cite data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">@mitamxmaloley, 11:27 AM – 28 Jun 2017</span></cite></blockquote><p data-dcnode-id="1196"><span data-dcnode-id="1201" instrument_node="">The Greeks called this ‘peripeteia’. A classic example is </span><strong data-dcnode-id="1198"><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Oedipus Rex</span></em></strong><span data-dcnode-id="1197" instrument_node=""> — it’s the bit where he finds out about his parents. Fast forward a few years we have Luke Skywalker finding out who his father is.</span></p><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">A story can have more than one reversal. While minor reversals can occur in every scene, bigger ones tend to divide the work into specific acts.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">A reversal reveal is most common in detective stories and thrillers.&nbsp;</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1191" instrument_node="">A </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/inversion-is-not-the-same-as-subversion/"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">subversion</span></strong><span data-dcnode-id="1188" instrument_node=""> </span></a><span data-dcnode-id="1186" instrument_node="">is not a modern invention but peripeteia itself. it is the tool that catapults the hero into the opposite of their present state — from thesis to antithesis, from home to a world unknown.</span></p><blockquote class="wp-block-quote" data-dcnode-id="1176"><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">That’s what inciting incidents are too — they are ‘explosions of opposition’, structural tools freighted with all the characteristics the characters lack; embodiments, indeed, of everything they need. Cliffhangers, inciting incidents and crisis points are essentially the same thing: a turning point at the end of an act; the unexpected entry point for the protagonists into the new world; bombs built from the very qualities they lack which explode their existing universe, hurtling them into an alien space of which they must then make sense.</span></p><cite data-dcnode-id="1177"><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">John Yorke, </span></em><strong data-dcnode-id="1178"><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Into The Woods</span></em></strong></cite></blockquote><p data-dcnode-id="1167"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCuorsbghT5M"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The final pay off must follow the internal logic established at the beginning of the story</span></strong></a><span data-dcnode-id="1172" instrument_node="">. </span><em data-dcnode-id="1169"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Scooby Doo</span></strong></em><span data-dcnode-id="1168" instrument_node=""> is hokey, but did this very well.</span></p><figure class="wp-block-image size-full" data-dcnode-id="1161"><noscript data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">&lt;img data-attachment-id="75357" data-permalink="https://www.slaphappylarry.com/reversals-and-reveals/detective-fiction-weekly-vol-53-5-oct-11-1930/" data-orig-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?fit=1200%2C1733&amp;amp;ssl=1" data-orig-size="1200,1733" data-comments-opened="0" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?fit=415%2C600&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?fit=1200%2C1733&amp;amp;ssl=1" width="1200" height="1733" src="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=1200%2C1733&amp;#038;ssl=1" alt="Detective Fiction Weekly - Vol. 53 #5 - Oct. 11, 1930" class="wp-image-75357" srcset="https://i0.wp.c y-vol-53-5-oct-11-1930/" data-recalc-dims="1" data-sizes="(max-width: 1000px) 100vw, 1000px" data-src="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=1200%2C1733&amp;ssl=1" data-srcset="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?w=1200&amp;ssl=1 1200w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=415%2C600&amp;ssl=1 415w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=768%2C1109&amp;ssl=1 768w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=1064%2C1536&amp;ssl=1 1064w" height="1733" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg%3Fresize%3D1200%252C1733%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?w=1200&amp;ssl=1 1200w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=415%2C600&amp;ssl=1 415w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=768%2C1109&amp;ssl=1 768w, https://i0.wp.com/www.slaphappylarry.com/wp-content/uploads/2021/11/Detective-Fiction-Weekly-Vol.-53-5-Oct.-11-1930.jpg?resize=1064%2C1536&amp;ssl=1 1064w" width="1200"><figcaption data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Detective Fiction Weekly – Vol. 53 #5 – Oct. 11, 1930</span></figcaption></figure><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Here’s a father making his toddler laugh with the Scooby Doo grunt:</span></p><figure class="wp-block-embed is-type-rich is-provider-twitter wp-block-embed-twitter" data-dcnode-id="1142"><div class="wp-block-embed__wrapper" data-dcnode-id="1143"><blockquote class="twitter-tweet" data-dcnode-id="1146" data-dnt="true" data-width="500"><p data-dcnode-id="1150" dir="ltr" lang="en"><span data-dcnode-id="1158" instrument_node="">Some wholesome content. </span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">(Thanks </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ofctimallen%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1155" instrument_node="">@ofctimallen</span></a><span data-dcnode-id="1153" instrument_node="">) </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/SOvfc0RpTr"><span data-dcnode-id="1152" instrument_node="">pic.twitter.com/SOvfc0RpTr</span></a></p><span data-dcnode-id="1149" instrument_node="">— Mark Humphries (@markhumphries) </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/markhumphries/status/1370341871390650377%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1148" instrument_node="">March 12, 2021</span></a></blockquote><span data-dcnode-id="1144" instrument_node=""> </span></div></figure><p data-dcnode-id="1137"><strong data-dcnode-id="1139"><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Now You See Me</span></em></strong><span data-dcnode-id="1138" instrument_node=""> (the film) has a twist which doesn’t follow the established logic and is considered a failure. It’s not interesting for an audience to see a 100% change of a character’s personality that has been built up throughout the whole movie.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">The best reversal is the kind that creates the biggest surprise without ruining the established logic.</span></p><blockquote class="wp-block-quote" data-dcnode-id="1129"><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Create suspense by providing the audience with a certain amount of information, then leave the rest to their own imagination.</span></p><cite data-dcnode-id="1130"><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Alfred Hitchcock</span></em></cite></blockquote><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Give the audience just enough to see it coming but not enough to expect it. How to test if the plot twist works or not: The story is rewatchable/re-readable. It should be just as fun if not more fun to go back and see where the writers hint at that twist. This explains why studies show that spoiling a book before a subject reads it makes the reading more enjoyable. The path towards the reversal is more exciting, even though the reader has lost the enjoyment of the surprise. Perhaps this is why lots of stories spoil the ending at the very beginning.</span></p><p data-dcnode-id="1123"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">For more on writing a twist ending, see this post</span></strong><span data-dcnode-id="1124" instrument_node="">.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="601"><div class="wp-block-embed__wrapper" data-dcnode-id="602"><span data-dcnode-id="1122" instrument_node=""> </span><span class="embed-youtube" data-dcnode-id="603" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="604" height="360" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A// tp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="624" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="622" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=zvkmLnS4sAQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></div></figure><h4 data-dcnode-id="599" id="examples-of-reveals-and-reversals"><span data-dcnode-id="600" instrument_node="">EXAMPLES OF REVEALS AND REVERSALS</span></h4><p data-dcnode-id="595"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Gone Girl</span></strong><span data-dcnode-id="596" instrument_node=""> has a big reversal when we realise the victim is bad.</span></p><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">Victimised women who are actually evil in their own right may be a trend started by Gillian Flynn. In the b-grade horror/thriller movie </span><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Pet</span></strong><span data-dcnode-id="591" instrument_node=""> (2016) a stalker captures a woman he’s interested in and keeps her in a cage in ‘the tunnels’ of a dog shelter where he works. Halfway through the movie the young woman is discovered by the security guard. The reversal is that instead of wanting to be saved, the captured woman encourages her captor to murder him brutally. The big reveal is that she is a psychopath and the reason the stalker creep has captured her is because by stalking her he has realised this about her.</span></p><p data-dcnode-id="586"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Safe Haven</span></strong><span data-dcnode-id="587" instrument_node=""> is a movie based on a Nicholas Sparks novel, which is fun to watch if you enjoy predicting romantic cliches. The minor conflict, the handsome widower, the woman who kids fall in love with. The downpour of rain, the first kiss… Eventually, however, just when there is nothing left (because they’ve fallen into bed), Sparks gives us the first major revelation: He tells the audience why his main character is being followed. All this time we weren’t sure if she’s a baddie, but now we know she’s the victim, abused and stalked by her cop ex-husband. But another supernatural revelation occurs right at the end, when we realize the woman who has befriended our main character has been a ghost all along. This is a reversal, because it causes us to see the entire progression of the relationship in a new light — this coupling hasn’t happened organically at all; it’s been ‘ordained’ by a higher power.</span></p><h4 data-dcnode-id="584" id="reversals-and-reveals-done-badly"><span data-dcnode-id="585" instrument_node="">REVERSALS AND REVEALS DONE BADLY</span></h4><h4 data-dcnode-id="582" id="the-rug-jerk"><span data-dcnode-id="583" instrument_node="">The Rug Jerk</span></h4><blockquote class="wp-block-quote" data-dcnode-id="569"><p data-dcnode-id="570"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Any gratuitous plot or character twist tossed in solely to jerk the rug out from under the reader for the sake of surprise or shock</span></strong><span data-dcnode-id="579" instrument_node="">, without sufficient foundation, foreshadowing or justification (retroactive or otherwise). Essentially </span><strong data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">any story twist that violates </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/things-to-know-about-chekhov/"><span data-dcnode-id="577" instrument_node="">Chekhov’s</span></a><span data-dcnode-id="575" instrument_node=""> principles</span></strong><span data-dcnode-id="573" instrument_node="">: “If you fire a gun in Act III, it must be seen on the wall in Act I; and if you show a gun on the wall in Act I, it must be fired in Act III.” </span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The Rug Jerk fires the gun without showing it first or explaining where it came from afterwards.</span></strong></p></blockquote><h4 data-dcnode-id="567" id="the-reset-switch-aka-the-reboot"><span data-dcnode-id="568" instrument_node="">The Reset Switch, aka The Reboot</span></h4><blockquote class="wp-block-quote" data-dcnode-id="560"><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Any device that allows a writer to completely erase any already-occurred events of a story and bring the characters back to a predefined starting point, with little or no changes to them or their universe. Time travel (“It never happened”), parallel universes (“It never happened *here*”), unconscious duplicates (“We’re all just clones/simulations/androids of the REAL characters!”) and dream-sequences (“It was all a dream!”) have all been used this way. To be avoided unless the existence of such a phenomenon is, itself, the story’s or series’ central plot point (as in *The Man Who Folded Himself* or *The Left Hand of Darkness*).</span></p><cite data-dcnode-id="561"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//critters.org/turkeycity.ht"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Critters.org</span></strong></a></cite></blockquote><h4 data-dcnode-id="558" id="a-common-misperception"><span data-dcnode-id="559" instrument_node="">A Common Misperception</span></h4><blockquote class="wp-block-quote" data-dcnode-id="515"><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">A misperception I run into a lot: </span><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">if a reader is not SHOCKED by your big twist, it’s a failure</span></strong><span data-dcnode-id="554" instrument_node="">. This isn’t true! Here’s why…</span></p><p data-dcnode-id="545"><span data-dcnode-id="552" instrument_node="">First, </span><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">guessing a surprise twist beforehand</span></strong><span data-dcnode-id="549" instrument_node=""> (as long as it isn’t insulting obvious) </span><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">can make readers feel smart</span></strong><span data-dcnode-id="546" instrument_node=""> and vindicated to see they guessed right.</span></p><p data-dcnode-id="537"><span data-dcnode-id="544" instrument_node="">Second, </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">when you use a trope</span></strong><span data-dcnode-id="541" instrument_node=""> where a certain plot twist/reveal is expected, knowing that reveal is coming </span><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">ADDS to the tension</span></strong><span data-dcnode-id="538" instrument_node="">, it doesn’t detract from it. We’re looking forward to him discovering *gasp* his gf is actually the empress! The anticipation is part of the experience.</span></p><p data-dcnode-id="527"><span data-dcnode-id="536" instrument_node="">So: </span><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">a plot twist can have value not only in being surprising, but also in being anticipated</span></strong><span data-dcnode-id="533" instrument_node="">. How to set up plot twists so they’ll delightfully surprise readers OR add to our breathless anticipation when we guess them early: </span><strong data-dcnode-id="529"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/types-of-literary-shadowing/"><span data-dcnode-id="532" instrument_node="">foreshadow</span></a><span data-dcnode-id="530" instrument_node=""> adequately, but don’t make it blindingly obvious</span></strong><span data-dcnode-id="528" instrument_node=""> (unless you don’t mean for it to be a reveal to us, only to another character).</span></p><p data-dcnode-id="519"><span data-dcnode-id="526" instrument_node="">Try to </span><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">ensure that your reveal will escalate the stakes and/or evolve at least one conflict</span></strong><span data-dcnode-id="523" instrument_node=""> (the main external one, an internal conflict, or a conflict between characters) in a new way. </span><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">If it doesn’t change things in some relevant way, it won’t impact readers</span></strong><span data-dcnode-id="520" instrument_node="">.</span></p><cite data-dcnode-id="516"><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">@NaomiHughesYA</span></em></cite></blockquote><h4 data-dcnode-id="513" id="types-of-reveals"><span data-dcnode-id="514" instrument_node="">Types of Reveals</span></h4><blockquote class="wp-block-quote" data-dcnode-id="489"><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">A few main types of plot twists/reveals:</span></p><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">1. </span><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">those that surprise us but not the character</span></strong><span data-dcnode-id="507" instrument_node=""> (this type is used often for unreliable narrators; can be super fun, but can also make a reader feel lied to, so use carefully).</span></p><p data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">2. The type of plot twist that </span><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">surprises a POV character but not us</span></strong><span data-dcnode-id="502" instrument_node="">. Often used in dual POV stories where one character has a secret that we’re in on, but the other POV character isn’t. Great for driving up tension and anticipation as you build toward the reveal.</span></p><p data-dcnode-id="493"><span data-dcnode-id="500" instrument_node="">And finally, 3. The type of </span><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">plot twist that surprises (or is meant to surprise</span></strong><span data-dcnode-id="497" instrument_node="">; refer to earlier tweet about readers guessing it early not necessarily being a bad thing) both readers and the POV characters. </span><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Often happens at midpoint &amp;/or climax</span></strong><span data-dcnode-id="494" instrument_node="">.</span></p><cite data-dcnode-id="490"><em data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">@NaomiHughesYA</span></em></cite></blockquote><h4 data-dcnode-id="487" id="planning-and-editing-a-reveals-plot"><span data-dcnode-id="488" instrument_node="">Planning and Editing A Reveals Plot</span></h4><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Further questions to ask:</span></p><ul data-dcnode-id="472"><li data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Are these revealed secrets worth knowing? There must be a direct impact on the immediate situation.</span></li><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Does the audience have enough context for this revelation to be meaningful?</span></li><li data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Is the secret simple? If it needs heaps of explaining it won’t have any punch when revealed. (“Luke, I am your father.” Not, “Luke, I am your cousin thrice removed.”)</span></li><li data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Have you foreshadowed but not telegraphed?</span></li><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Like endings, reversals should feel both inevitable and surprising at once.</span></li><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Is this so-called revelation simply one of two possible alternatives considered from the beginning? If so, the answer won’t be much of a ‘revelation’ — more like when you’re expecting a baby it’s probably going to be a boy or a girl. The surprise is pretty minimal in that regard. If you’re stuck with this problem, consider audience misdirection or hint at something different but related.</span></li></ul><h3 data-dcnode-id="470" id="twist-endings"><span data-dcnode-id="471" instrument_node="">Twist Endings</span></h3><blockquote class="wp-block-quote" data-dcnode-id="450"><p data-dcnode-id="460"><span data-dcnode-id="469" instrument_node="">The Return may have a twist to it. This is another case of misdirection: </span><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">You lead the audience to believe one thing, and then reveal at the last moment a quite different reality.</span></strong><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">No Way Out</span></em><span data-dcnode-id="464" instrument_node=""> flips you a totally different perception of the hero in the last ten seconds of the film. </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Basic Instinct</span></em><span data-dcnode-id="461" instrument_node=""> makes you suspect Sharon Stone’s character of murder for the first two acts, convinces you she is innocent in the climax, then leaps back to doubt again in an unexpected final shot.</span></p><p data-dcnode-id="456"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">There is usually an ironic or cynical tone to such Returns</span></strong><span data-dcnode-id="457" instrument_node="">, as if they mean to say “Ha, fooled ya!” You are caught foolishly thinking that human beings are decent or that good does triumph over evil. A less sardonic version of a twist Return can be found in the work of writers like O. Henry, who sometimes used the twist to show the positive side of human nature, as in his short story “The Gift of the Magi”. A poor young husband and wife make sacrifices to surprise each other with Christmas presents. They discover that the husband has sold his valuable watch to buy his wife a clip for her beautiful long hair, and the wife has cut off and sold her lovely locks to buy him a fob for his beloved watch. The gifts and sacrifices cancel each other out but the couple is left with a treasure of love.</span></p><cite data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">from </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The Writer’s Journey</span></em><span data-dcnode-id="452" instrument_node=""> by Christopher Vogler</span></cite></blockquote><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">My mother hates watching magic shows. She feels she’s being tricked. Of course, she is right. Other people love being tricked. They love magic shows and marvel at the magician’s skill.</span></p><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">I also know readers who hate stories with </span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwistEnding"><span data-dcnode-id="446" instrument_node="">twists in the tale</span></a><span data-dcnode-id="444" instrument_node="">. They feel they’ve been strung along, manipulated and then lured into a trap as an author’s prey. Other readers marvel at the skill of a tricky writer. These are the readers who can enjoy a tricky ending.</span></p><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Which kind of reader are you?</span></p><blockquote class="wp-block-quote" data-dcnode-id="433"><p data-dcnode-id="437"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">When I read a story I always seem to begin playing “Guess the Ending” about two-thirds of the way through. If I’m very lucky, I lose.</span></strong><span data-dcnode-id="438" instrument_node=""> There’s a disappointment about winning, and delicious fun in being faked out.</span></p><cite data-dcnode-id="434"><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Dennis Whitcomb, The Writer’s Digest Handbook of Short Story Writing</span></em></cite></blockquote><h4 data-dcnode-id="431" id="some-classic-films-with-twist-endings"><span data-dcnode-id="432" instrument_node="">Some Classic Films With Twist Endings</span></h4><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Thrillers, horror and mystery seem especially suited to the twist. How many of these do you know and remember? How many did you see coming? Which ones did you like?</span></p><ul data-dcnode-id="402"><li data-dcnode-id="426"><em data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Sixth Sense</span></em></li><li data-dcnode-id="423"><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Seven</span></em></li><li data-dcnode-id="418"><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/film-study-the-others-2001/"><strong data-dcnode-id="420"><em data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">The Others</span></em></strong></a></li><li data-dcnode-id="415"><em data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Signs</span></em></li><li data-dcnode-id="412"><em data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Saw</span></em></li><li data-dcnode-id="409"><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The Stepford Wives</span></em></li><li data-dcnode-id="406"><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Terminator 3</span></em></li><li data-dcnode-id="403"><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Flightplan</span></em></li></ul><p data-dcnode-id="398"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Here are some more</span></strong><span data-dcnode-id="399" instrument_node="">. Do you agree with the list?</span></p><h5 data-dcnode-id="396" id="some-masters-of-story-telling-trickery"><span data-dcnode-id="397" instrument_node="">Some masters of story-telling trickery</span></h5><ol data-dcnode-id="386"><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Agatha Christie (by setting up false villains. The twist ending is almost mandatory in a good mystery.)</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Roald Dahl (in numerous ways, especially in his short stories.)</span></li><li data-dcnode-id="387"><span data-dcnode-id="391" instrument_node="">Michael Crichton (e.g. </span><em data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Prey</span></em><span data-dcnode-id="388" instrument_node="">)</span></li></ol><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">Whatever your enjoyment of twist endings (a.k.a. switch endings, the </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="384" instrument_node="">subverted trope</span></a><span data-dcnode-id="382" instrument_node="">), there is much skill involved in doing it well. First of all,inexperienced writers (or readers) may think they are twisting the ending when they’re falling into cliche.</span></p><h4 data-dcnode-id="379" id="the-wire"><span data-dcnode-id="380" instrument_node="">The Wire</span></h4><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">John Yorke explains that a ‘twist’ might simply be a refusal to follow the usual story structure — what he refers to as ‘archetypal’ story structure:</span></p><blockquote class="wp-block-quote" data-dcnode-id="368"><p data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">Archetypal endings can … be twisted to great effect. </span><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">The Wire</span></em><span data-dcnode-id="373" instrument_node=""> found an extremely clever way of subverting the normal character arc — by brutally cutting it off at an arbitrary point. The death of Omar Little at the hands of a complete stranger works precisely because it’s so narratively wrong; it undercuts the classic hero’s journey by employing all its conventions up to the point of sudden, tawdry and unexpected death. Effectively saying this is a world where such codes don’t operate, such subversion also has the added bonus of telling us just how the cruel and godless world of Baltimore drug-dealing really works.</span></p><cite data-dcnode-id="369"><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Into The Woods by John Yorke</span></em></cite></blockquote><p data-dcnode-id="362"><span data-dcnode-id="367" instrument_node="">If you’re not sure what is meant by archetypal story structure, </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/storytelling-structure-mnemonic/"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">see here</span></strong></a><span data-dcnode-id="363" instrument_node="">.</span></p><h3 data-dcnode-id="360" id="how-to-stuff-it-up"><span data-dcnode-id="361" instrument_node="">HOW TO STUFF IT UP</span></h3><h5 data-dcnode-id="358" id="1-the-viewpoint-character-wakes-up-and-it-s-all-a-dream"><span data-dcnode-id="359" instrument_node="">1. The viewpoint character wakes up and it’s all a dream.</span></h5><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">(Didn’t you do this as a kid, at least once? I did, when time ran out in class.) Similar to this: the VP character is actually crazy and it never happened after all. In fact, any ending in which the reader learns ‘It never happened at all’. This is a disappointment because there is no usually no epiphany, nothing to be learned and the reader feels they have wasted their time.</span></p><h5 data-dcnode-id="354" id="2-the-viewpoint-character-is-already-dead"><span data-dcnode-id="355" instrument_node="">2. The viewpoint character is already dead.</span></h5><p data-dcnode-id="348"><span data-dcnode-id="353" instrument_node="">Okay,</span><strong data-dcnode-id="350"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stories.slaphappylarry.com/urban-legends-for-suprarational-ponderers/%23scrollNav-3"><span data-dcnode-id="352" instrument_node=""> I recently wrote a story like this</span></a></strong><span data-dcnode-id="349" instrument_node=""> but I had to be very careful to make it different.</span></p><h5 data-dcnode-id="346" id="3-introduce-something-random-out-of-left-field-something-obviously-contrived-and-tacked-on"><span data-dcnode-id="347" instrument_node="">3. Introduce something random, out of left field, something obviously contrived and tacked on.</span></h5><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Storytelling is like writing a transactional essay in this respect: Never introduce anything new in a conclusion. You’ll end up with classic plot holes.</span></p><h5 data-dcnode-id="342" id="4-the-shock-value-ending"><span data-dcnode-id="343" instrument_node="">4. The Shock Value Ending</span></h5><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Someone gets killed off for no good reason. Or similar.</span></p><h5 data-dcnode-id="337" id="5-unnecessary-complexity"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">5. Unnecessary Complexity</span></strong></h5><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Some post-modern story-tellers expect an audience to read/watch something more than once, and carefully, before making any sense of it. If this is your style, you’ll attract a specific sort of audience. Many people would rather not put in all that work.</span></p><h3 data-dcnode-id="333" id="rule-of-thumb"><span data-dcnode-id="334" instrument_node="">RULE OF THUMB</span></h3><p data-dcnode-id="330"><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">If you’re going to use a twist ending, have the twist affect someone other than the reader. The twist must affect a character.</span></strong></p><h3 data-dcnode-id="328" id="don-t-write-unintentional-absurdism"><span data-dcnode-id="329" instrument_node="">DON’T WRITE (UNINTENTIONAL) ABSURDISM</span></h3><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Absurdism was more popular with earlier audiences. Done well, everything does connect, but avoid the bad kind of absurdism where one weird thing happens after another. This is one way to create an unpredictable plot, but unpredictable doesn’t go far enough. Endings have to feel both surprising and inevitable.</span></p><blockquote class="wp-block-quote" data-dcnode-id="318"><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">It turns out that people don’t actually want to say, “I had no idea that was going to happen!” In fact, they’re often delighted to say, “I knew that was going to happen!” People love to get to know characters, and they feel clever when they can predict those characters’ reactions.</span></p><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Defying expectations is easy. Creating expectations is hard. To create expectations, you have to write consistent, believable, well-defined characters.</span></p><cite data-dcnode-id="319"><em data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The Secrets Of Story, Matt Bird</span></em></cite></blockquote><h5 data-dcnode-id="316" id="an-alternative-point-of-view"><span data-dcnode-id="317" instrument_node="">AN ALTERNATIVE POINT OF VIEW</span></h5><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Twists are overrated. Predictable isn’t as bad as you think it is. Audiences don’t need a twist in everything, or even in most things, so don’t manoeuvre one in to be tricky.</span></p><h3 data-dcnode-id="311" id="how-to-put-a-great-switch-in-an-ending"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">HOW TO PUT A GREAT SWITCH IN AN ENDING</span></strong></h3><h5 data-dcnode-id="309" id="1-engender-empathy-in-a-character-then-expose-that-character-for-what-they-really-are"><span data-dcnode-id="310" instrument_node="">1. Engender empathy in a character then expose that character for what they really are.</span></h5><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Bad characters are actually good. Good characters are actually bad. Such endings can make us question our own quickness to judge. It encourages us to see shades of grey in character, and this is its own epiphany. The trick-ending has a special kind of ‘epiphanic moment’, known as the ‘anagnorisis’&nbsp;(discovery) – the protagonist’s sudden recognition of their own or another character’s true identity or nature.</span></p><h5 data-dcnode-id="305" id="2-foreshadow-without-telegraphing"><span data-dcnode-id="306" instrument_node="">2. Foreshadow without telegraphing.</span></h5><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">In a good twisted tale, you can read the story again and see hints at what’s coming. You can enjoy the tale a second time in a completely new way. ‘Telegraphing’ is basically ‘stuffing up an attempt at foreshadowing’ by dropping such heavy-handed hints that any audience with half a wit knows exactly what’s coming at the end. Aim to foreshadow. Avoid the telegraph. At the end of the tale we should see how certain inconsistencies become logical.</span></p><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">Sometimes foreshadowing is done by making use of a ‘plant’ – an object that is ‘planted’ earlier but doesn’t become important until later. The plant is useful in any kind of storytelling, even if there’s no particular twist. e.g. in </span><em data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Six Feet Under</span></em><span data-dcnode-id="299" instrument_node="">, Brenda is writing a novel about the sexual exploits of a fictional character. The audience knows that she is not writing fiction; we’ve seen enough scenes where she has sex with a random stranger, confesses to her prostitute friend then types away on her laptop. One day, she writes a scene about a guy wearing a certain baseball cap. Nate reads her work. Then, while sitting on the veranda with Brenda, the guy turns up, wearing the planted baseball cap. This leads to the end of their first engagement.</span></p><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Where something – be it an object, situation or character – is introduced early in a story for use much later, this is known as Chekhov’s Gun. Anton Chekhov himself, said that everything mentioned in a short story must have a use. Do not include a gun unless there is some use for the gun.</span></p><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">When the author makes use of false foreshadowing, it’s then called a Red Herring. This is most acceptable in mystery and detective stories. Readers of other genres may have little time for this technique.</span></p><p data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">SEE ALSO: </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/types-of-literary-shadowing/"><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Types Of Literary Shadowing</span></strong></a></p><h5 data-dcnode-id="287" id="3-irony"><span data-dcnode-id="288" instrument_node="">3. Irony</span></h5><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">For example, after a long hard struggle, we learn the struggle wasn’t necessary. (e.g. </span><em data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Office Space</span></em><span data-dcnode-id="283" instrument_node="">, the movie.)</span></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Or, what a baddie gains wasn’t worth the sacrifice. Can you think of an example?</span></p><p data-dcnode-id="275"><span data-dcnode-id="279" instrument_node="">SEE ALSO: </span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/a-taxonomy-of-irony/"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">This post on irony</span></strong></a></p><h3 data-dcnode-id="273" id="twist-endings-and-certain-literary-techniques"><span data-dcnode-id="274" instrument_node="">TWIST ENDINGS AND CERTAIN LITERARY TECHNIQUES</span></h3><h5 data-dcnode-id="271" id="1-flashback"><span data-dcnode-id="272" instrument_node="">1. Flashback</span></h5><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Flashback, or analepsis, comes in useful for a variety of reasons, not least to provide a reader with backstory. In a trick ending, the flashback is used to suddenly reveal information/vital memories which provide the missing information needed to complete the puzzle.</span></p><h5 data-dcnode-id="267" id="2-the-unreliable-narrator"><span data-dcnode-id="268" instrument_node="">2. The Unreliable Narrator</span></h5><p data-dcnode-id="257"><span data-dcnode-id="266" instrument_node="">e.g. </span><em data-dcnode-id="263"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Notes on a Scandal </span></strong></em><span data-dcnode-id="262" instrument_node="">(Zoe Heller), “</span><strong data-dcnode-id="259"><a data-dcnode-id="260" data-id="17789" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/je-ne-parle-pas-francais-mansfield/"><span data-dcnode-id="261" instrument_node="">Je Ne Parle Pas Francais</span></a></strong><span data-dcnode-id="258" instrument_node="">” (Katherine Mansfield).</span></p><p data-dcnode-id="251"><span data-dcnode-id="256" instrument_node="">The reader is told a story through the eyes of a certain character who doesn’t quite have the story right. We eventually work out for ourselves that we haven’t been told the whole truth. We meet </span><strong data-dcnode-id="253"><a data-dcnode-id="254" data-id="13859" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/unreliable-narration-storytelling/"><span data-dcnode-id="255" instrument_node="">unreliable narrators</span></a></strong><span data-dcnode-id="252" instrument_node=""> in real life, too. Have you ever started a new school or workplace and been told, on your very first day, to avoid certain people in the playground or workplace because they’re idiots or whatever? Eventually, you work out the true balance of power and you realise the person who tried to get you onside on your very first day was the very person who needs friends most, because that’s the person who is&nbsp;ostracised.</span></p><h5 data-dcnode-id="249" id="3-the-cliffhanger"><span data-dcnode-id="250" instrument_node="">3. The Cliffhanger</span></h5><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">The ending is unresolved. The characters are left in the lurch.</span></p><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Some readers really hate cliffhangers. So why would you do this to your readers, who’ve loyally followed you all the way to the end? Maybe to recreate the Zeigarnik effect, in which frustrating and unresolved emotions are those best remembered.</span></p><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Cliffhangers are best used at the end of a series, and only when another series follows. This will keep the audience coming back for more, without letting them down.</span></p><h5 data-dcnode-id="241" id="4-reverse-chronology"><span data-dcnode-id="242" instrument_node="">4. Reverse Chronology</span></h5><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">The story opens after some pivotal event and works backwards via flashbacks or scenes which are dated and timed. Amnesia stories often work like this: A character wakes up and has no idea who he is. He works it out little by little.</span></p><h5 data-dcnode-id="237" id="5-non-linear-narration"><span data-dcnode-id="238" instrument_node="">5. Non-linear Narration</span></h5><p data-dcnode-id="229"><span data-dcnode-id="236" instrument_node="">Readers have to work hard to get these stories, because we are given a series of random scenes and expected to piece the story together ourselves. </span><em data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Lost </span></em><span data-dcnode-id="233" instrument_node="">makes use of this technique and I, for one, can’t be bothered. Quentin Tarantino does it better in </span><em data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Pulp Fiction</span></em><span data-dcnode-id="230" instrument_node="">. The story may begin in medias res (in the middle of things), jump backwards for say, two thirds of the story, then exist in the present for the final third, after the cliffhanger. These stories are also non-linear, but audiences can grasp these kind more easily.</span></p><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Remember, when matching wits with the reader, that your readers will be on the lookout for the twist in the tale. Especially readers of short stories, who tend to be the most widely read group of people of the lot.</span></p><h3 data-dcnode-id="225" id="related-links"><span data-dcnode-id="226" instrument_node="">Related Links</span></h3><p data-dcnode-id="221"><strong data-dcnode-id="222"><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bodyodd.msnbc.msn.com/_news/2011/08/11/7334977-spoiler-alert-spoilers-dont-ruin-stories-after-all"><span data-dcnode-id="224" instrument_node="">Spoilers don’t ruin stories after all</span></a></strong></p><p data-dcnode-id="217"><strong data-dcnode-id="218"><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//taramayastales.blogspot.com.au/2009/04/ending-twist-or-plunge.html"><span data-dcnode-id="220" instrument_node="">Tara Maya talks in terms of the ‘plunge’ ending versus the ‘twist’</span></a></strong></p><p data-dcnode-id="213"><strong data-dcnode-id="214"><a data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/list/show/13366.Books_With_Twist_Endings"><span data-dcnode-id="216" instrument_node="">A Goodreads list of books with twist endings</span></a></strong></p><p data-dcnode-id="208"><strong data-dcnode-id="210"><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sulcicollective.blogspot.co.uk/2013/05/twist-and-shout-literary-twist.html"><span data-dcnode-id="212" instrument_node="">Twist and Shout? – The literary twist considered</span></a></strong><span data-dcnode-id="209" instrument_node=""> from Sulci Collective</span></p><div class="wp- g?resize=1536%2C1152&amp;ssl=1 1536w" height="488" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201232%20924%22%3E%3C/svg%3E" width="650"></a></figure></div><p data-dcnode-id="196"><strong data-dcnode-id="197"><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stories.slaphappylarry.com/lemon-girl-new-zealand-young-adult-novella/"><span data-dcnode-id="201" instrument_node="">READ AT MY OTHER BLO</span></a><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stories.slaphappylarry.com/lemon-girl-new-zealand-young-adult-novella/" rel="nofollow"><span data-dcnode-id="199" instrument_node="">G</span></a></strong></p></div><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="194" style="height:32px"></div><div class="layout-default wp-block-group" data-dcnode-id="157"><div class="wp-container-5 wp-block-group" data-dcnode-id="160"><div class="wp-block-post-date has-small-font-size" data-dcnode-id="191" style="font-style:italic; font-weight:400;"><time data-dcnode-id="192" datetime="2017-04-11T21:05:54+10:00"><span data-dcnode-id="193" instrument_node="">April 11, 2017</span></time></div><div class="wp-block-post-author has-small-font-size" data-dcnode-id="187"><div class="wp-block-post-author__content" data-dcnode-id="188"><p class="wp-block-post-author__name" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Lynley</span></p></div></div><div class="taxonomy-category wp-block-post-terms has-small-font-size" data-dcnode-id="180"><a data-dcnode-id="185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slaphappylarry.com/category/storytelling/" rel="tag"><span data-dcnode-id="186" instrument_node="">Storytelling</span></a><span class="wp-block-post-terms__separator" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">, </span></span><a data-dcnode-id="181" href
