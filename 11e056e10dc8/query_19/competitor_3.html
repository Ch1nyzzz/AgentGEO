</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3790" style="max-height: none; height: 140px;"><span data-dcnode-id="3834" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3799" style="padding-bottom: 20px;"><span data-dcnode-id="3833" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">An intense psychological thriller for readers of</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node=""> I Am Watching You,</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">The Luckiest Girl Alive, and </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">All the Missing Girls</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">.</span></span><span class="a-text-italic" data-dcnode-id="3801"><br data-dcnode-id="3822"><br data-dcnode-id="3821"><span data-dcnode-id="3820" instrument_node=""> Two missing girls. Thirteen years apart. </span><br data-dcnode-id="3819"><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node=""> Olivia Shaw has been missing since last Tuesday. She was last seen outside the entrance of her elementary school in Hunts Point wearing a white spring jacket, blue jeans, and pink boots.</span><br data-dcnode-id="3816"><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node=""> I force myself to look at the face in the photo, into her slightly smudged features, and I can't bring myself to move. Olivia Shaw could be my mirror image, rewound to thirteen years ago. </span><br data-dcnode-id="3813"><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node=""> If you have any knowledge of Olivia Shaw's whereabouts or any relevant information, please contact... </span><br data-dcnode-id="3810"><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node=""> I've spent a long time peering into the faces of girls on missing posters, wondering which one replaced me in that basement. But they were never quite the right age, the right look, the right circumstances. Until Olivia Shaw, missing for one week tomorrow. </span><br data-dcnode-id="3807"><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node=""> Whoever stole me was never found. But since I was taken, there hasn't been another girl. </span><br data-dcnode-id="3804"><br data-dcnode-id="3803"><span data-dcnode-id="3802" instrument_node=""> And now there is. </span></span><span data-dcnode-id="3800" instrument_node=""> </span></div><span data-dcnode-id="3798" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3792" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3797"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3793" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3796"></i><span class="a-expander-prompt" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Read more</span></span></a></div><span data-dcnode-id="3791" instrument_node=""> </span></div><span data-dcnode-id="3789" instrument_node=""> </span></div><span data-dcnode-id="37 </span><div class="a-divider a-divider-section" data-dcnode-id="2928"><div class="a-divider-inner" data-dcnode-id="2929"></div></div><span data-dcnode-id="2927" instrument_node=""> </span><h2 data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2924" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2831"><span data-dcnode-id="2923" instrument_node=""> </span><h3 data-dcnode-id="2920"><span data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Review</span></span></h3><span data-dcnode-id="2919" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2851"><span data-dcnode-id="2918" instrument_node=""> </span><span data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">"Every good thriller has a shocking plot twist. </span></span><span class="a-text-italic" data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Girl Last Seen</span></span><span data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node=""> has many. Author Nina Laurin's eerie novel will stay with you for days, months, even years to come."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">HelloGiggles.com</span></span><span data-dcnode-id="2907"><br data-dcnode-id="2909"><br data-dcnode-id="2908"></span><span class="a-text-italic" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Girl Last Seen</span></span><span data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node=""> by Nina Laurin is a chilling suspense about two missing girls whose stories intertwine -- perfect for Paula Hawkins fans."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">EliteDaily.com</span></span><span data-dcnode-id="2897"><br data-dcnode-id="2900"><br data-dcnode-id="2899"><span data-dcnode-id="2898" instrument_node="">"A well-written and compelling novel that offers more than suspense; it offers a deeper understanding of how sexual assault can leave its victims broken. Ms. Laurin is to be congratulated for her achievement."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">NYJournalofBooks.com</span></span><span data-dcnode-id="2891"><br data-dcnode-id="2894"><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">"4 Stars! This debut novel is a gritty thriller with dark twists you won't see coming. The heart breaking, heart-racing journey...will keep you guessing to the nail-biting end."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">TheSuspenseIsThrillingMe.com</span></span><span data-dcnode-id="2885"><br data-dcnode-id="2888"><br data-dcnode-id="2887"><span data-dcnode-id="2886" instrument_node="">"Debut novelist Nina Laurin has created a memorable character in complicated, flawed and endearing Laine Moreno. From the very first page, </span></span><span class="a-text-italic" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Girl Last Seen </span></span><span data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">jettisons the reader into the life of a crime victim trying to outrun her past. Fast-paced and hard-edged, it is a heart-stopping thriller that had me guessing to the very end."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Heather Gudenkauf, New York Times bestselling author of The Weight of Silence and Not a Sound</span></span><span data-dcnode-id="2875"><br data-dcnode-id="2878"><br data-dcnode-id="2877"><span data-dcnode-id="2876" instrument_node="">"</span></span><span class="a-text-italic" data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Girl Last Seen </span></span><span data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">gripped me from start to finish. Lainey Moreno is a riveting heroine, a kidnapping survivor who will only escape her demons if she faces her greatest fears, and Nina Laurin brings her vividly to life. Psychological suspense doesn't come much grittier or more packed with satisfying twists and turns."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">Meg Gardiner, Edgar Award-winning author of Unsub</span></span><span data-dcnode-id="2865"><br data-dcnode-id="2868"><br data-dcnode-id="2867"><span data-dcnode-id="2866" instrument_node="">"</span></span><span class="a-text-italic" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Girl Last Seen</span></span><span data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node=""> hooked me so quickly I might have whiplash. This is a sharp, twisting, intense thriller, the heartbreaking and fast-paced story of a woman who bears the scars of a trip to hell and back but who refuses to be defeated. Don't miss this smashing debut!"―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">David Bell, bestselling author of Bring Her Home</span></span><span data-dcnode-id="2855"><br data-dcnode-id="2858"><br data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">"Laurin creates a compelling, vulnerable central character."―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Publisher's Weekly</span></span><span data-dcnode-id="2852" instrument_node=""> </span></div><span data-dcnode-id="2850" instrument_node=""> </span><h3 data-dcnode-id="2847"><span data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2846" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2833"><span data-dcnode-id="2845" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Nina Laurin</span></span><span data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node=""> studied Creative Writing at Concordia University in Montreal, where she currently lives. She arrived there when she was just twelve years old, and she speaks and reads in Russian, French, and English but writes her novels in English. She wrote her first novel while getting her writing degree, and </span></span><span class="a-text-italic" data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Girl Last Seen </span></span><span data-dcnode-id="2835"><span data-dcnode-id="2838" instrument_node="">was a bestseller a year later in 2017.</span><br data-dcnode-id="2837"><span data-dcnode-id="2836" instrument_node="">Nina is fascinated by the darker side of mundane things, and she's always on the lookout for her next twisted book idea. Learn more at NinaLaurin.com.</span></span><span data-dcnode-id="2834" instrument_node=""> </span></div><span data-dcnode-id="2832" instrument_node=""> </span></div><span data-dcnode-id="2830" instrument_node=""> </span></div><span data-dcnode-id="2828" instrument_node="">

</span><span data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">
  **spoilers** The description sounds so good but definitely fails the actual book. My biggest complaint is that the main character is so unlikable. I think people can understand and feel heartbroken and sympathize for a character that suffered a horrible experience but first of all, we only get bits and pieces of that experience. We don’t actually fully understand what happened because she drowns everything out in pills. Just when we think we may learn a bit more of what drives our character to be the way she is, she pops an anxiety pill and passes out. Then she wakes up, makes more bad choices that don’t move the story forward, takes more pills, and passes out again. On that note, I’ve taken medication before for anxiety and clearly this author hasn’t. You don’t take one and sink into oblivion like the book makes it sound. If she took a bunch, yes I get that but not one as it described (until the OD). No one likes to read an entire novel about a druggie. I sympathized and understood and rooted for her and then she kept getting worse and digging herself deeper until I just didn’t care and wished the book would end. Nothing happens (minus the main character drugging out) until the last 30 pages. So read the first 2 chapters and the last thirty pages. All you need. Super bad read and wished I could get my life bad 🙄

</span><span data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">
  I was midway through comfort-bingeing my favorite author when my copy of Girl Last Seen arrived. I stopped to skim the first chapter to decide whether to put it at the top of my to-read pile or the bottom. In the first five pages it hijacked me so thoroughly that I didn't go back to my favorite author's book until three in the morning, three days later. Nina Laurin's voice as a young woman who survived a horrific ordeal is pitch-perfect, but it's not painful to live in her skin as she tries to stop what happened to her from happening to another little girl. I was kept guessing until the very satisfying ending, and hope to see a lot more from this author SOON.

</span><span data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">
  For me, it was a predictable, disjointed, sordid story about character who constantly did idiotic stuff to make her life suck, wallowed in self pity, took a lot of drugs which seemed to affect her in unrealistic ways, and passed out a lot. I found her to be ridiculous and gross. I'm a compassionate person and I felt myself thinking it would be best if she just died. The kicker was the inordinate number of times the author referred to the character's dying phone. Very puzzling. I began to laugh out loud when the phone was brought up. I figured out the shocking twist immediately, so that made the rest of the book a real slog. The main character is non-evolving, bitter, gross, immature, and annoying.

</span><span data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">
  This book has no character you'd like. It is about the girl, Ella, dealing with post abduction trauma and who gets involved in resolving another child abduction.  As much as you feel badly for her horrifying experience, she's portrayed as a pill addict and somebody who wants to be unconscious all the time. She is just a measurable person who you don't want to have any compassion to. It feels like the author is trying to tell us that Ella wants to put everything behind her and to try to live a new life, but all Ella does as work in a strip club (as a cashier) and hooking up with a drug dealer paying him all the money she has left. There are lots of questions arise: why was the police detective slept with her, why her mother stayed with that detective, why Ella went and sold herself to that drug dealer when she wanted to start a new life next day?... So the vanishing of another girl becomes non that important. Because you already know who's the "bad guy", it is so obvious. So after putting it aways a few times, I just wanted to finish this book, just to know how it ends. For the money I paid for reading it.

</span><span data-dcnode-id="1278"><span data-dcnode-id="1285" instrument_node="">
  Lainey is still struggling emotionally and physically with the aftermath of her own kidnapping at aged 10. Having been inexplicably released, or more accurately dumped, on the side of the road 3 years later she has spent the last 10 years scrapping by in dead end jobs and battling addiction. She changed her name and tells no-one of her past seeking the anonymity to forget but she is swiftly thrown back into the glare and scrutiny of not just the press, but also the police and forced to relive her worst nightmare.</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">Barely keeping her head above water she is suddenly forced to confront everything that happened to her as a child when the parents of a child who has gone missing in eerily similar circumstances seek her out for help finding their daughter. Trying her best to help the family find their missing little girl, but also looking for some answers to her own kidnapping she's dragging further into danger than she has ever been. Can she get the answers she needs while succeeding in getting both of them out alive and can she retain her sanity while doing so?</span><br data-dcnode-id="1281"><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">Overall a good book. My only complaint would be that there are a few detours in the book that take you down paths that whilst padding out the story a little, don't actually add anything substantial to the tale and can be a little frustrating.
