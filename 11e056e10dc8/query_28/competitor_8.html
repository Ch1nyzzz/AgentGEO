alisation, relied on financial analyst reports contained in a database at the INSEAD business school library. Government agencies generally produce more information than any other source, and this is true even in countries that we consider authoritarian or that lack freedom of information laws. You can almost always obtain more information from them than you think. Some examples: - Incident reports: Agencies have rules they’re suppo- sed to follow. But employees make “mistakes.” The occasions when such errors or mishaps require an offi- cial report will be spelled out in the agency’s manual or legal codes. Demand those reports. - Inspection reports: Numerous agencies, reponsible for everything from restaurants to highway bridges, compile reports on operations or installations. Find those reports and their authors – especially if a disas- ter occurs. If there’s no report, that’s a story: Why wasn’t the agency watching? If there is, and it predicts a disaster, why was nothing done to prevent it? - Complaints: The public complains, and sometimes those complaints are justified. Who gets the com- plaints? Do they do anything? What? Government libraries. Governments at national and municipal levels, as well as parliaments generally have their own librairies and archives. So do many ministries. The parliamentary record or offi- cial journal are two key records generally kept in these libraries, but there are others. Examples: - A reporter in Syria obtained reports that the secret services refused to provide to him through the National Library. - An investigation of France’s alcohol lobby began with a trip to the Parliament to review voting records, and then to the Journal Officiel, the record of governmen- tal activity, to review campaign financing records. The hypothesis was that officials who proposed amend- ments to laws that favored the alcohol lobby had received campaign donations from lobby member firms, and it was true. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 31chapter 3 30St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Courts. At a minimum, courts keep records of judgments. In some countries, such as the United States, they provide open records of all the evidence introduced into a trial. Always seek out any and all court documents involving your targets in every country where they operate. Testimony in trials is generally protected from prosecution. If you are present at a trial, note testimony in detail, especially if no court stenographer is present. Example: Ida Tarbell’s classic investigation of the Standard Oil Trust was based largely on trial records from lawsuits involving the company. Promotional offices. The local chamber of commerce typically publishes masses of material on its region or municipality, providing information on employ- ment, types of industry and business, etc. Example: In an investigation on an infant death at a hospital, a handout from the Chamber of Commerce gave the name of a citizens’ group that had filed suit against the hospital for its maternity ward policies. The lawsuit resulted in a government report containing essential information about the hospital. Cadaster offices. These offices and related bureaus gather information on property ownership, and often on outstanding loans concerning the property. Example: In France, information about property belonging to politicians has been used to show that they have amassed far more wealth than their publicly-disclosed revenues can explain. Publicly-owned company reports and press releases. Annual reports, regulatory filings and the like contain a wealth of information about compa- nies. So do press releases, which typically provide the company rationale for strategic actions. If the firm has foreign operations, its filings abroad may contain more information that is easier to access than domestic filings. Example: Annual reports and regulatory filings with the US Securities Exchange Commission by a secretive French financier enabled reconstruction of a bond portfolio acquired under disputed circumstances, and worth bil- lions of dollars. The regulatory filings provided names of associates who sat on the boards of the companies that issued the bonds. Tribunals or registers of commerce. In every country there is an office that keeps records about who owns companies, whether or not they sell stock. The amount of infor- mation that firm owners are required to disclose may vary, but it is usually more than what reporters who never use these resources expect. In France, for example, the information disclosed includes the number of employees, revenues, debts, profits and margins, etc. Names of directors are also provided. Example: Using this information, one of us showed that a website which pretended to be a consumer defense organisation in truth belonged to a firm specialised in economic intelligence for big companies. International institutions that provide aid or information concerning situations in par- ticular countries (like the European Union, United Nations, etc.). Example: A newspaper in the Ivory Coast used a European Union audit to show that the national government had misappropriated tens of millions of dollars in aid. We could continue this list indefinitely. A serious professional will compile his or her own lists of open sources, and update them regularly as specific projects require. They are just as important as your human sources. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 32chapter 3 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 31 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts An open source strategy for investigation What open sources mean for ourmethod is that, instead of see-king sources who promise us access to secrets, we deduce from accessible facts what the secret might be. The whole process looks like this: Once again, as a brief formula: • We start with a few clues or facts. • We hypothesise the facts we don’t know yet. • We seek confirmation of our hypothesis from open sources. • We question people who can complete the information we found in open sources. Example: France’s National Front, an extreme right political party, proposed a program of “national preference” through which French cititzens would be granted employment, government benefits, and other rights before even legal immigrants. Such a policy is illegal under French and European law. However, a Front official told us that the movement’s strategists believed it could be enacted by making use of the “gray zones” in French law on governing municipalities. When asked for specifics, he shut up. Step 1: We hypothesise that in cities controlled by National Front mayors, the illegal “national preference” pro- gram is being enacted, and that this is achieved by targeting ambiguities in pertinent laws. Step 2: We review Front National campaign platforms, an open source document available from bookstores, to define the pertinent measures of the “national preference”. Step 3: We consult news articles, municipal bulletins, Interet forums and citizen group newsletters and reports for first confirmation that this program is being applied in National Front cities. Step 4: We continue the preceding step by interviewing human sources from the Front and its opposition. We also interview legal experts on how the Front’s measures could be applied without breaking the law. Outcome: Not only did we verify the hypothesis and confirm the practices on our list; Front officials, when asked to confirm the practices we identified, spontaneously offered others. But why? See below. initial facts or clues We confirm the hypothesis with human sources from a position of strength Open sources validate or disprove specific points of the hypothèsis, allowing us to deduce the secret more accurately Hypothesis : The secret is that at such time, such a one did such a thing... chapter 3 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 33chapter 3chapter 3 32St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Open sources are a source of power O pen sources place us in a positionof relative power, compared to theusual situation of asking someone to tell us a story. It is quite another to ask someone to confirm a story. It’s the difference between saying, “What happe- ned?” and saying “This is what happened, isn’t it?” Of course, it is much harder to mislead a person who asks the second question. Less obviously, it is also much more interesting to have a conversation with such a person, because he or she can appreciate the value of information and respond to it more deeply than someone who has no independent know- ledge. That is probably why Front officials gave us examples of the national preference policy that we hadn’t thought of; they knew we could appreciate their work. By making use of open sources, you demons- trate to your human sources that: 1 You are interested in the subject to the point where you commit time and energy to it. 2 You do not expect them to do work for you that you can do yourself. 3 You are not dependent on them for information. 4 You have information to share. 5 You cannot be prevented from doing the story simply because someone does not want to talk to you. Learn to go through the open doors to infor- mation before you pick up your telephone to call someone. It’s a key part of becoming a worthy witness – a person that sources want to talk to, because he or she understands and appreciates what is being said. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 34chapter 3 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 33 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Finding open sources 1. Mapping the subject Your first task is to get an overview of the field under investigation. This process is also called “backgrounding”, which refers to finding what lies behind and around the subject in the foreground. The tasks include: • Identify key actors (individuals and institutions); • Identify key issues that concern the actors; • Understand key dates and events in their history to the present. Your starting point is whatever facts you have in hand. If you begin with the name of an actor or institution, seek material related to that ele- ment. Then, follow references or allusions in that material in order to locate other material. Example: An American museum refused to say why it “loaned” a contested painting to the French national museums. News clips suggested the national museums had “impacted” its exhibitions. Annual reports showed that international loans of paintings to the museum had stopped. The French had made it happen. When you find yourself blocked, take note of the obstacle, and seek information about something related to it instead. Try, try and try again to avoid placing yourself in a position where you absolutely require specific informa- tion from one source to advance. By defining your situation thus, you place all power in the hands of the source. Instead, collect data about actors, institutions or events that are one step removed from the immediate object of your inquiry. This informa- tion can provide perspective, and open a path to new sources. Very often, when your intran- sigent “unique” source realises that everyone involved with the story is speaking to you, except for him or her, they’ll come around. Obviously, this work can quickly generate a lot of data. Please read Chapter Five to see methods of organising it from the beginning of the inquiry. You will need them. 2. Use general sources to direct you to the expert sources. General sources like those described above have their place, but you need expert open sources as well. For example, a press article about a scientific discovery is a general source. The original scientific research, which may have been published in a specialised journal, is an expert source, containing a richer level of detail. In an investigation, that detail can be critical to success, not only because the facts may be of great interest, but because know- ledge of the details enables you to dialogue with sources more powerfully. They will reco- gnise you as someone who is making an effort to understand the story, not just copying someone else’s work. The best way to discover expert open sources is to ask the professionals in a given sector which sources they use. • Government officials can tell you who keeps reports, in what form and where. • Elected officials can tell you how legislative processes work, and what kinds of paper they generate at different stages. • Property agents will know which offices keep track of property records. • Professional investors can tell you where to find company information, and how to read it. And so on. When you speak with such profes- sionals, be sure to ask them the source of facts that you find fascinating. This also applies to conversations with other investigators, including journalists, police or auditors. Don’t just collect facts: Collect the methods by which the facts are found. Example: A gendarme found a key witness in a murder case by learning her first name, and the fact that she was pre- gnant at a given moment; he went to municipal birth registries to locate women with the right name who gave birth at the right time, and found his witness. chapter 3 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 35chapter 3chapter 3 34St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts 3. Keep track of these sources and their coordinates. Make a point of using them often enough so that you do not forget how. For example, if there is a free Internet database you use for company information – in France, it is called societe.com – check on the status of the companies you do business with. 4. Harvest documents in the field You need to cultivate the habit of collecting information in depth wherever you happen to be.The information most pertinent to a given activity is nearly always found where the activity takes place. So collect all docu- ments in sight whenever you visit a place as a reporter. Example: If you are in an office and there are documents on display, pick them up and study them, so no one takes you for a thief, then ask if you may keep them. When we covered the Front National, we went to their headquarters every week and collected the journals on display. Many were otherwise unavailable, published by obscure groups or individuals within the larger movement. Others were available only to card-carrying members of the party, but were handed to us when we requested them. These were invaluable sources of information on the movement’s activity at local and regional levels, which the news media never discussed. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 36chapter 3 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 35 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts 2. Understanding what you’ve found Obtaining a document is not the same thing as understanding it. The language of official reports in the public or private sector is often very particular, and requires interpretation. This applies to open sources as diverse as annual reports or the minutes of meetings. When you find yourself confronted with such a document, your next task is to find an expert interpreter of its language and substance. In general, seek someone who is involved in the sector you are investigating, and who will find the story worthy of interest, but who has no conflict of interest in the case at hand. Example: To understand how the Front National manipulated city finances to eliminate opposition groups, we obtained a freely-available report on municipal subsidies from a city controlled by the Front, then examined it line by line with a former municipal employee of a similar city who worked on budgetary matters. Do not seek perspective from someone who will report your conversation to others, if you can avoid it. In particular, avoid discussions with individuals who have business of any kind with actors in your story, unless you are interviewing them. These people can trade their knowledge of what you are doing to their own advantage, and they will. Using experts to exploit your sources 1. Archivists are angels The fact that a source is open does not mean that you can access it efficiently, particularly where specialised librairies or archives are concerned. The solution: find out who manages the archive, and ask them to help. In fact, it is a good policy to always obtain the name of a staff archivist when you enter a library. Our experience is that archivists rightly feel under-appreciated, and someone who approaches them with respect for their expertise will be rewarded. Examples: For a follow-up investigation of France’s contaminated blood affair, the first task was to assemble all the scien- tific literature on blood transfusion and AIDS before the scandal erupted. The manager of the library of a major Paris teaching hospital provided us with a full list of relevant articles through her institution’s database, and the library contained nearly all the journals on the list. The task was completed in an afternoon. For an investigation of a Paris art dealer, we called the Ministry of Culture to ask for information about subsi- dies to the art market, and were directed to a certain functionary. As we spoke on the phone, the sound of typing on a computer keyboard was audible. When asked what she was typing, she said that she was consulting a Ministry database. Asked if it were public, she replied yes. The database contained all recipients of Ministry subsidies, and was available through a public library, to which the functionary directed us. chapter 3 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 37Using Human sources BY NILS HANSON AND MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources to enrich our understanding. Start fast… but easy! We strongly suggest that you beginan inquiry with the easiest infor-mation you can obtain from the most wide-open sources. Any investigation becomes more complex and difficult as it proceeds. But if it begins that way, some- thing is usually wrong. Specifically, if none of the elements in your hypothesis are supported in open sources, it is a sign that either your hypothesis is seriously mista- ken, or someone is working very hard to conceal the story. Conversely, if the first verifications are successful, it is a sign that you can acce- lerate and widen the inquiry. When this momentum begins, exploit it. Take the open source data as far as it will go. Deduce its meaning, and add it into your hypothesis. In the next step, you enter the space where the truth is not in a document. 36St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. chapter 3 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 38Using Human sources BY NILS HANSON AND MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources to enrich our understanding. 4 human sources chapter 3 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 39chapter 4chapter 4 38St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts T he most exciting information is usuallynot in open sources – it’s in people’s minds. How do we find these people? How do we get them to tell us what they know? Do not under-estimate the value of these skills. Not everyone has them, and your work as an investigator will develop them to a high degree. Do not abuse them, either. Never forget that as a journalist, you can hurt people – in their feelings, their livelihoods, even their personal safety. Make sure that you do not hurt them just because they were foolish enough to talk with you. In this chapter, we are going to consider the art of becoming a worthy witness – someone that a source may safely and usefully speak to. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 40chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 39 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts birthdates or jobs, or whatever you please. But in the beginning you can be much simpler, and you may not need to go further. (Even a simple source map, which takes a few minutes to prepare, will give you an advantage over most of your competition.) For the premature births story cited in Chapter 2, the basic source map looked like this: Notice some things about this map: Handicapped children are at the center, because in the end the story is about them. But they are also the hardest people to find, and to speak with. Every other source we might speak with fits around them, because in one way or another, every other source is connected to those children. Likewise, doctors are between parents and hospitals.Why? Because that’s who doctors talk to the most. This is the point: When you make a source map, use it to show the rela- tionships between the actors of the story, so that if one source is blocked, you can go to another source who can see past the obstacle. When the people in one part of your map accept you, your chances of accep- tance elsewhere on the map go up. HANDICAPPED KIDS INSURANCE REGULATORS PARENTS Source mapping T he way most news reporters findsomeone to quote is to read the firstpublished story on a given matter, pick out the names of people cited in it, and call them. Those few sources may get hundreds of calls in a day. Will they say anything new to the hundredth caller, if they pick up the phone? No. So why not find someone whom no one else has questioned? Your open source work will provide you with a list of far more interesting names to call. For example, to investigate a company you may begin by reading financial analyst reports that describe the position of the company and its toughest competitors. • Next, speak with the analysts, and then to the competitors. • Through them and industry media, find people who have left the company, either for other jobs or to retire. (Seymour Hersh found many of his sources on the CIA by following retirement announcements.) • Through these sources, find people still within the company who wish to speak. We advise you to make a simple source map as soon as you can. This is a graphic repre- sentation of all the people who are or may be directly involved in your story. The map looks like the houses of a village in which everyone knows everyone else, and the village is where the story takes place. You can make the map as complicated and rich as you like – for example, by noting the physical locations of individual sources, their PROSECTORS DOCTORS HOSPITALS chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 41chapter 4chapter 4 40St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Give sources a reason to speak P eople with interesting facts or storiesto tell may have strong reasonsnot to answer your questions. In a general sense, they do not know if you are professional, responsible, and fair (many reporters are not). Even if you are, they cannot control what you will do with information they consider valuable. Finally, your use of the information may harm their careers, their relationships, or even their physical safety. So keep this in mind when someone hesitates to speak with you: You could turn into one of the worst things that ever happens to them. The surprising thing is not that people refuse to speak to journalists, but that most of them, most of the time, do. Why do they? There are two general reasons, and they are called pride and pain. You must offer your sources the chance to satisfy one or the other. • People will talk because something excites them -- a talent or thing of beauty they have discovered, a success they have had or will soon have, a plan they have created to save the world. Discussing these subjects makes them feel happy, important or both. • Or, as doctors know, they speak because they are in pain and they badly wish that someone would help them. Generally, pain is stronger than pride, and that is why the first people to speak in most investigations are victims – those who have been wronged in some way, or whose values are deeply offended by what they have witnessed. There is also a specific reason that someone will speak with you: He or she believes that doing so is safe. For this to occur, and keep occurring, you and the source must create a relationship. In that relationship, each of you will count on the other to do certain things, more or less reliably. Both you and the source may furnish each other information, and make certain engagements. Whether or not the source keeps them, you must keep yours. It is not merely a professional obligation. It is also a matter of character. You must be instinctively trustworthy, or people will sense that they cannot trust you. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 42chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 41 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts First contacts: Preparation and invitation 1. Preparing for the meeting The safest way to communicate with a source (unless the source is physically dangerous) is in a face to face meeting. The purpose of your first contact is to make that meeting happen. Before that first call you should do some research on the person and the issues, using open sources. Concerning the person: The absolute minimum is to “google” him or her. Any news articles or other writings in which the source is mentioned should be consulted; if there are too many to read all, choose a few. The purpose here is to demonstrate your interest in the source, and knowledge of his or her career. Never go to an interview and ask a source with a public history to recount his or her career. You should know about it before you arrive. If the source has written articles for news media or specialised publications, obtain them and read them. Even secretive or shy individuals reveal their personalities, values and concerns when they write. These mate- rials can furnish hypotheses that can later be tested in an interview. For example, from his published articles and speeches we hypothesised that a certain high public official in France hated to lie, but was an expert in avoiding sub- jects he considered sensitive or dangerous. Thus by observing how and when he changed subjects, we could identify the precise points he wished to obscure, and then investigate them further. When asked to confirm our conclusions directly, in keeping with our hypothesis about his character, he did not lie. Concerning the issues: You should be aware of the latest news and public statements related to the issues. You do not need to be an expert. However, you must demonstrate awareness, if not unders- tanding, of key terms in the language of the source’s world. You may then ask the source to explain them to you. 2. Making contact Contact can be made by phone or letter – but only to the person’s home. Never call him or her at work, unless you are absolutely sure it is safe to do so. The boss might be listening, and the call can be traced (more about that later). The same applies to e-mail, even if the content is harmless. It is easy for an employer to find out who received an e-mail from a journalist. We are not speaking theoretically here. We once saw an investigative team that targeted a public official who was said to be tyrannical and paranoid, as well as corrupt. They wrote to his secretary, at their office, asking her to help them. She refused. But when the boss learned of their investigation, as targets always do, how do you think he treated that poor woman? Think about how to present yourself before making contact. You must tell the source who you are, and what you are doing, with confidence in your mission and your ability to succeed. You don’t need to say so, but you do need to feel, that you are going to get this story and tell it, and the world will be a better place when you do. Consider these examples of the right and wrong way: Wrong: “I want to ask you something, if it’s not too much trouble…” What’s wrong: You don’t want to ask, you ask. You don’t suggest to the source that speaking with you means trouble, and that you’re embarassed to be asking. Right: “Hello, my name is… I am a journalist, working for a media called …. and I am working on the story of …. I believe it’s an important story, chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 43chapter 4chapter 4 42St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts and I want to tell it fully and accurately. When may we meet to discuss it?” What’s right: You identify yourself and your purpose fully, and you give the source a good reason to speak with you. You do not ask if you may meet, you ask when. You do not use the word “interview,” which invites the source to connect his or her own name with headlines and a future full of trouble. If you are not working for a specific media, you may say which media you have worked for. If you have not worked for any, say which media you will submit the story to. Remember: What matters is not who you work for, it’s how you work. Wrong: “Please help me, you’re the only one who can!” What’s wrong: If no one else wants to help you, and you can’t help yourself, why should we? Right: “I understand that you are a true expert on this subject, and I would greatly appreciate your insight.” What’s right: You’re flattering the source, but if the flattery is justified, there’s no reason not to. You are also letting the source understand that you have other sources, who may be equally expert. The underlying principle: Always assume that you are a fascinating person doing important work, and that anyone would be delighted to encounter you. If this is too difficult for you, please consider finding work better suited to your complexes. 3. Where to meet If the source cannot be located to request a meeting, or refuses to meet you, or sets unreasonable time delays, consider presenting yourself in a place where the source can’t just go away. If the source is on trial, go to the courtroom. If the source is a professor, go to a lecture. Once a high-ranking French official refused to see us for months, until we went to an office where he had weekly meetings with his constituents, and took our place in the waiting line. When it was our turn to enter the office we said: “We’re the last in line, and you still have 20 minutes left. Let’s talk now.” He laughed and said yes. If the source is willing to meet you, go to the source’s home or another place where he or she feels comfortable. If the investigation is related to the source’s work, and the source’s organisation is aware of the interview, the source’s office is usually the best location. The office will present a great deal of information about the source – what he or she reads, his or her tastes, how he or she responds to inter- ruptions, etc. (One of the revealing moments in Connie Bruck’s landmark study of Wall Street, The Predators’ Ball, takes place when a financier screams at his secretary for no good reason.) xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 44chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 43 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Beginning the relationship: Goals and roles I n the news world, relationships withsources are often like one night standsthat leave the partner disgusted. This is particularly true at the scene of a disaster, where reporters arrive in a mass, trample everything in sight, then leave after commenting on how bad the local food, drink and manners are. Investigators are not trying to be ideal lovers – seriously, sleeping or even flirting with your sources is nearly always a terrible idea – but they are certainly seeking a more stable, long-term relationship. The beginning of the relations- hip is thus a key moment, which largely defines what follows. 1. First and last: Protecting source anonymity The most important single thing you can do in an investigation is to protect the confiden- tiality of sources who can be endangered by being in contact with you. This requirement is especially strong where sources who request anonymity are concerned. Promising anonymity means you must do everything not to leave any traces of the source. This includes situations where your notes may be seized by police or lawyers. The following methods may be used: A / Don’t call the source at work. Such calls can be traced. To be fully safe, both of you need to use mobile phones with prepaid cards. B / Avoid contact via e-mail. It’s like sen- ding a postcard. Secure e-mail contact requires encryption, a method that stands out and can bring unwanted attention. C/ Meet the source at safe places where there is minimal chance for either of you to be recognised. D / Give the source an alias or a code name (“Source A”, “Source B”). Never use the real name of the source in discussions or notes. E / Lock up all material related to the source, ideally in a place that is not identified with yourself. 2. Setting your goals Before the first encounter, define for yourself what you wish to achieve. At a minimum this should include: The assets you wish to acquire. Assets may include documents, confidences, interpretative insights or analysis, and names of further sources to contact. • You may seek only limited assets in a given meeting. Our friend Philippe Madelin, a specialist on the French secret services, said that in a typical interview he would seek to confirm or extract only one piece of information. • Or, you may seek a maximum, taking every document in sight. In that case, make sure the source knows why you are taking them. • Generally, the last asset we seek in a meeting is the name and contact information of the next person we should speak with. We usually say: “Who do you respect for their insight into the matters we’ve discussed? Do you know how we can contact them?” What you wish to reveal to the source about your project. You should expect to be asked – if not by this source, then by another – why you are involved in this project and what you hope to gain from it. Whatever answer you give to this question, it must be given on the spot, and with sincerity. We suggest that you follow chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 45chapter 4chapter 4 44St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts the three rules of British diplomacy: • Never lie. Do not give false information unless you absolutely must. Bear in mind that the disco- very of a lie will expose you to consequences that range from getting thrown out of the room to being shot through the feet and tortured (which is what happened to a Brazilian under- cover reporter whose hidden camera was discovered in a meeting with drug dealers). • Never tell the whole truth. For example, when working with the extreme right, we would say: “The image of your movement in the media does not seem accurate to us, and we want to know the truth.” We did not say, “The truth may be even worse.” • If you can’t answer a question, say so – and say when you will answer it. What you wish to learn about the source. What kind of person are we dealing with? What cues or stimuli do they respond to? What are their goals in speaking with us? Do they simply want or need to tell their sto- ries, or are they using us to a further end? British intelligence uses a three-cornered diagram that corresponds to the criteria at Sweden’s SVT television network: Please remember the following as you use this diagram: Regarding motivation: It does not matter what the particular moti- vation may be. It does matter that it be comprehensible and convincing. Regarding quality of information: In news reporting, the highest quality of information is assumed to be from the highest-level source. Investigators assume that the highest-level source is less concerned about truth than about achieving personal or organisational goals. From that perspective, higher quality information will come from those lower in the organisation, who are opposed to personal ambitions or organisational goals. Regarding access to information: As suggested above, the ideal source in most investigations is someone in the middle ranks of an organisation, at operational or planning levels. These people have access to significant documents, but have very little influence on how policies are formed or implemented. Likewise, they are extremely vulnerable within their organisations. Therefore, when such a source gives you confidential information, ask her or him immediately: “Who else knows this?” Explain that you do not want to cite information that can be directly traced to the source. If you note restricted information during a meeting, put a mark beside it to indicate that you must not quote it (we use “NFC”, meaning “not for citation”), and tell the source you are doing so. In short, let the source see that you are thinking of how to protect her or him, and then make sure you do. Revenge? Justice? Ambition? Desire for recognition or power? Is the source in the necessary position to access the information? Who else has access? Can the information be used without the source being identified? Has the person experienced, heard or seen what he or she is talking about, or is it second hand information? Does the source have documents or the names of other sources to confirm the information? Does the information fit with other data? Has the source something to hide? Has the source links to other persons or organizations that you should know about? Has the source provided correct information before? MOTIVATION FOR COLLABORATING ACCESS TO INFORMATION QUALITY OF INFORMATION xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 46chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 45 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts 3. Choosing your roles There are two primary roles that you may play during your interviews. The Expert knows most of the answers, and can fully appreciate the sometimes technically involved information that an equally expert source may provide. For the expert, conversations with sources take place at a high level that ordinary mortals might have difficulty following. We have heard sources say, “It’s good to speak with someone who really knows the case, it means I can try out my ideas.” However, if you begin as The Expert, be very sure that you will not be forced to admit, later in the interview, that your knowledge is less extensive than you pretend. You will lose face. The Innocent (or Candide) is speaking to the source precisely because he or she knows very little, and yearns to be enlightened. That does not mean that The Innocent is a fool, though he or she may sometimes prefer to be under-estimated by the source. If you have ever watched Columbo, you have seen The Innocent at work. It is probably the strongest role, because it allows you to ask naïve, simple questions as well as more complex ones. Because The Innocent needs to ask about everything, he or she avoids the danger of indicating to the source what the journalist seeks and how much the journalist already knows. Often, investigators will begin an interview as The Innocent, and then reveal themselves as The Expert as the conversation progresses. If you do this, be careful not to give the source the impression that you have lied to him, unless your precise goal is to ambush a source you will never meet again. You may use either or both of these roles during an interview. The key is to feel certain of your authenticity in a given role at a given moment. Your role vis-à-vis the source may evolve over the course of a relationship. It is a great pleasure for many sources to see that The Innocent becomes more and more able to pose Expert questions, because it shows that the investigator is listening and learning. The natural evolution of a source relationship, over time, is in this direction. chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 47chapter 4chapter 4 46St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Interview tactics E very reporter has a personal stockof interview tactics, and manyreporters never change them, like seducers who know only one line. As an investigator, spend time with people whose job includes asking questions – not just other reporters, but also police, pro- secutors, lawyers, salespeople, auditors, and so on. Ask them how they respond to specific situations, or to tell their war stories. The best interview tactics reflect the interviewer’s personality, so take that into account as you develop your own repertoire. Meanwhile, here are some of our favorite tricks. 1. Bring the gift of news Investigators often intervene after a case is well underway, which means that the news media have compiled a more or less subs- tantial record. But that record is usually full of mistakes. To start an interview and a relationship, try bringing a number of these clips. Ask the source to review them with you, so that you can see which facts are true. You do not need to explain that you consider the truth more important than your sloppy news colleagues do. 2. Take control of the situation Once we read an article in Rolling Stone magazine by a fellow who found himself hosting Mick Jagger one day, completely to the host’s surprise. He was so nervous that he forgot to offer his guest a cold drink on a hot day. When our turn came to interview Jagger, we made a point of serving him tea – not to be servile, but to make it plain he was on our ground. He appreciated the gesture and the interview began well. Think of what happens in the interview as a power struggle, because that’s what it usually is. Try to choose the spot where you sit or stand; move until you are comfortable. Keep control of your tools; do not, for example, allow the subject to handle your recording machine or notepad. (You would be amazed how often this happens.) If they do, say: “Those are my tools. I don’t handle yours, and don’t handle mine without my permission.” Do not say, “May I record this interview?” Say, “I am recording this interview to make sure it is accurate,” turn on the machine, and state the date and place of the interview and the name of the subject. If you think the source will object, bring a witness to the interview and say, “To be sure our notes are accurate, I have asked a colleague to assist me.” 3. Keep your distance Some people become journalists in order to meet people and bask in their company. That’s fine, but if an investigator needs a friend that badly, he or she should buy a dog. If you become friends with your subjects, you will end up betraying them. Apparent victims</span><span data-dcnode-id="5" instrument_node=""> are not always as innocent as they seem, visionary politicians are sometimes charlatans, captains of industry may drown their crews. Don’t sink with them. 4. Use the source’s defenses against him or her Oriana Fallaci’s classic interview with Henry Kissinger began with a humiliating encounter: He turned his back on her, then asked her if she was going to fall in love with him. Fallaci was furious, and then she realised that Kissinger had a certain problem with women. She also concluded that such an unscrupu- lous man, who would abuse a journalist doing her job, was not worthy of her pity. In the interview that followed, she alternated xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 48chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 47 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts questions focused on precise bits of informa- tion with questions that used feminine wile to provoke and flatter (such as: “So now I ask you what I asked the astronauts: What can you do after you have walked on the moon?”). Progressively unbalanced, Kissinger lost control of the conversation, and finally of himself. The resulting disclosures opened a door on the heart of power. Be like Fallaci: Have no pity for the powerful, especially when they do not play fair. If you see their weakness, use it. For example, if the record on a public figure shows that he or she prefers statements of principle to hard facts, come prepared with facts from his record that contradict the grand principles he or she likes to repeat. 5. Surprise the source If you are interviewing a public figure, the odds are that he or she has been interviewed numerous times on exactly the same sub- jects. You can use that fact to prepare an interview that breaks new ground. Simply review what’s been done, and do something different. It is sometimes astonishing what reporters have ignored. Mick Jagger, for example, had been interviewed on virtually every subject but how he made music. He turned out to be very glad to discuss it. 6. Let the source surprise you News reporters are always in a hurry, and one way they show it is by framing a question that doesn’t allow the source to say what he or she thinks is really important. Part of what will set you apart from these practices is paying attention to what the source believes is important. In particular, a source will often say some- thing like, “I can answer your question, but there’s a question you haven’t asked that matters more.” The wrong response is: “Later.” The right response: “Tell me about it.” The answer will sometimes show you an entirely different story, and it may be more important than the one you were working on. 7. Make the source work Particularly in cases where the chronology is important, a good way to begin successive interviews is to lead the source through the events that have been discussed, verifying the chronology and the details of each event (such as who was there and what was said). Sources rarely recall an event accurately or completely the first time they discuss it. Their memories must be stimulated, and painful experiences must be released. Do not be shocked when stories change as a result of this work. 8. Listen to the subtext In theatrical language, the “text” is the explicit dialogue pronounced on stage; the “subtext” is what’s behind the dialogue. Be careful that in an interview you do not ignore the subtext. In particular: • Listen for moments when the subject’s voice changes pitch, a sure sign of tension. • Also pay attention to moments when the source’s language becomes vague or repeti- tious, without the addition of additional information. (Repetition helps the memory, but it should result in new details being uncovered.) • Finally, be alert when the source answers a question that you did not ask. Is the source trying to tell you what really matters, or trying to avoid a certain territory? If the latter, that territory is probably the one you most need to explore, now or later. If you are using a recording device, be very alert to these moments when you play back the interview. 9. Get the source involved Remember that the relationship with a source may be more important than any specific information the source provides in a given interview. Over time, that relationship creates mutual bonds and obligations. As this occurs, beginning investigators may chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 49chapter 4chapter 4 48St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts unconsciously feel guilty that they are pene- trating so deeply into their sources’ experience. Just as unconsciously, they will avoid the source. This is exactly the wrong thing to do. Instead, be in regular contact with the source. Call to share information, to ask for the latest news, or to solicit comment on something the source knows about. Do not wait for the moment when you need a crucial piece of information to remind the source that you exist. By doing so, you get the source more and more deeply involved in the project. By keeping him or her informed of your progress, and your growth, and by soliciting his or her information and insight, you have given the source a stake in the outcome of the story. In effect, the source becomes your consultant on a very important issue. 10. Review your notes right away Try to leave time immediately after the inter- view – a quarter-hour may be enough – to quickly review your notes and see if there is anything you forgot to take down. Impressions of moods, ambiguities, and other details will appear to you once you leave the room. Capture them. 11. Get some rest when you can Reporters accustomed to the brief exchanges of news reporting find it very strenuous to engage in extended conversations with sources. News reporters may never conduct an interview longer than an hour or two. Investigative interviews may last for days. The reporter must be aware that during this time, fatigue or the tension of the subject at hand may make him or her aggressive. Be careful that you do not say something gratuitously nasty to your source when this happens. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 50chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 49 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts mous or not. We can hardly expect people to provide us with information under their own names if that means risking their careers and safety, and they are usually better judges of the risks they are running. It is your responsibility to make sure the source’s choice is respected. Facts must be used in such a way they cannot be traced to the source. Likewise, be very careful not to ask questions based on knowledge that could only come from one or a very few sources. Using anonymous sources transfers the risks of using the information from the source to you. Your credibility is at stake if the informa- tion is wrong. If you are prosecuted, you will have no proof of either your good faith or the accuracy of your information. For that reason, we strongly advise that you do not publish material based on anonymous sources, except under one of the following conditions: • Documentary evidence can be found from other sources. • The information provided by the anony- mous source fits into a pattern with other, verified information. • The source has been credible in the past. • If the source bases his or her information on a document, and the document cannot be traced to the source, demand the document. Do not allow a source to quote from a docu- ment without knowing the full context of the quote. (In France’s contaminated blood affair, the career of Le Monde’s medical reporter was shattered in part because a source used this trick on him.) If you cannot find such evidence, ask the original source if he or she will accept to be named, so that his part of the story may be told. On at least one occasion, when we felt that a source was on the verge of allowing attribution, we said: “We will do this story with your name included. But you will review the parts where you are cited before publication. If you are not satisfied with what you see, we’ll take it out.” Often the sources decided to allow attribution of at least some facts. On, off or anonymous? S ources love to say, “This is off therecord.” Problem is, usually theydo not know what they are saying. Unfortunately, neither do many reporters. The various categories of anonymity or attribution can be stated as follows: Off the record: The reporter promises not to use the infor- mation provided by the source, unless the information comes from another source enti- rely. The source cannot forbid the reporter to use the information under those conditions. Not for attribution: The reporter may use the information, but may not attribute it directly to the source. Another appellation, such as “a source close to the judicial hierarchy”, must be agreed on between reporter and source. On the record: The reporter may use the information and attribute it to the source. The crucial thing to know here is that when many sources say, “I want this off the record”, what they really mean is, “I want you to use this information, but not if it’s attributed to me.” Ask the source, “Do you mean you don’t want me to use this information, or you don’t want me to use your name?” If the source says, “I don’t want you to use my name,” ask: “How many other people know this information? If I use it, can anyone be certain that it came from you?” If answer is no, ask: “How shall we refer to the source?” Do not say, “Then what should we call you?” It is the source’s choice to remain anony- chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 51chapter 4chapter 4 50 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts violence was not constrained by adherence to the Ten Commandments. They were objectively more dange- rous than the Catholics, and that is why we avoided them. The facts that they were so present in the party hierarchy, and were in visible conflict with the Catholics, were highly significant. We would have missed those facts had we denied our fear. 2. Emotional osmosis As said above, the early sources in nearly every investigation are the victims, who have urgent reasons to seek aid and comfort. To the extent that the reporter opens up to their stories, the reporter is going to absorb their pain and rage. Be careful not to whine about this absorbed pain, especially with sources. But recognise that you may become depres- sed at some point in your investigation, usually before you are ready to write the story that will evacuate your feelings. Chris de Stoop, the Belgian reporter who spent a year undercover in the sex clubs of Northern Europe for a masterful investigation of sexual slavery, told us that near the end of that year, he went through a few weeks where he was so depressed, he couldn't leave his house. One way to deal with this syndrome is to work in a team, whose members can provide perspective and balance for each other. If your editor does not understand or reco- gnise this syndrome, it is a sign that he or she is incompetent concerning investiga- tion; seek support elsewhere. 3. The flypaper syndrome A reporter on an extended investigation becomes unusually sensitive to the things that motivate, excite or anguish the story's sources, and starts collecting them like flypa- per collects bugs. One sign of this is that the reporter begins seeing references to aspects of the story in the news, that he or she would not have noticed before. Another is that the reporter’s hearing will change; he or she will begin picking up conversations across rooms Using Emotions (instead of being used by them) Throughout this chapter, you mayhave noticed a continuing thread:The importance of emotion and psychology in your relations with sources. Let’s consider several aspects of this theme in detail. 1. Emotion is information A classic error of reporters trained in the canons of “objective” reporting, or of repor- ters in a hurry, is to listen to sources only for information, and not for emotion. They tend to consider emotion as noise – inclu- ding their own emotions. In his classic work The Powers That Be, David Halberstalm sug- gests that this is why two relatively inexpe- rienced reporters from the Washington Post got the Watergate story, and not their com- petitors. The young reporters allowed them- selves to be impressed by the fear of their sources, and to feel it themselves: The fear told them the story was major. At a minimum, emotion tells you that some- thing is happening, and that what is happe- ning matters. At a maximum, it indicates a direction to follow. Example: At meetings of the Front national, we found ourselves constantly drawn to one side of the room, where the same people gathered. These people were members of the Front’s integrist Catholic wing, whose racist, violent tendencies are well documented. We wondered why we were, in effect, avoiding the people on the other side of the room. Who were they? Why were we afraid of them? Investigation showed that they were pagans – worshippers of Norse gods. Unlike the Catholics, their xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 52chapter 4 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 51 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts in which certain key words appear. (Yes, it’s happened to us, and it will happen to you.) This is an incredibly exciting sensation, and can add to your energy, but it’s also unsett- ling. If you aren't careful, this new sensitivity can blind you to the world outside your story. You lose a sense of what is normal, and of the fact that society actually functions pretty well most of the time, because you are so attuned to a piece of life gone wrong. If you feel this happening, make sure you spend some time thinking about other things than your story. 4. Doubt and denial Some years ago, in the midst of a five-year investigation, we realised that sources we liked, well-respected, charming people, hap- pened to be guilty of crimes, and it was our job to prove it. They were also powerful indi- viduals, which made the prospect of telling the truth scary. In such situations, some reporters get physically sick. These crises tend to hit at the exact moment when you're asking yourself, as every honest reporter does, if you really have every fact you need to prove your case, and if there isn't some- thing important you missed. On the one hand, you've seen and heard enough to make you ill; on the other, a part of you still wants to believe it isn't so, which leads you to think you'll never have enough data. Remember this: If you do not publish, you are in a worse position than if you do. Stay within the limits of what you have found, but show respect for your own work, and get it out. 5. Objectify the emotions There is a simple method for dealing with these sorts of emotional reactions: Notate your emotions in the course of the investigation. • Write down what you are feeling, and what led to the feeling. Who were you speaking with? What did they say? What thoughts came into your head? • By setting down your feelings, your transform them into material that can be objectified and manipulated. • This material can be verified like any other. Use it to identify patterns in your interactions with sources, and in particular, the danger points in your investigation. Anxiety or fear tend to arise at specific moments. These emo- tions can indicate a need for new research. Or, they can indicate that you feel isolated, without defenses. Either way, you can act – by seeking allies, or by confirming your information. 6. Don’t forget tomorrow Too often, journalists forget their sources after publication. Don’t be one of them. If you cut off contact once the story is published, the source will perceive you as a traitor. If you keep in touch, you will begin to build a network of sources for future investigative projects. If you’re not smart enough to do the latter, you’re probably not smart enough to be an investigator. One last thing: Our journalism students often say, “Won’t we make enemies by investigating?” Sure. But if you do the job correctly, and deal with people in a way that respects their rights and your own, even your enemies will probably respect you. More important, you will make more friends than enemies, and the friends will probably be people of higher quality. chapter 4 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 53How to Set Yourself Up to Succeed BY MARK LEE HUNTER AND FLEMMING SVITH The process so far: We discover a subject,. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. 5 organisation xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 55chapter 5chapter 5 54St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts I nvestigative research generates considerablymore material than conventional news reporting, and this material must be effectively organised on an ongoing basis. This organisational work is part of a systematic writing and publishing process: You do not do research, then organise, then write. Instead, you organise as you research, and this organisation prepares and initiates the writing process. If you do not take the time to organise, you will need twice as much time for the project in the end (that’s a minimum), and your work will be harder to compose, explain and defend. Besides, you will not have as much fun, because you will be worried all the time and… disorganised, frantic, and frustrated. So here are some easy steps that you can build into your routine work. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 56chapter 5 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 55 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts There are two parts of this process. • The obvious part is that you are building a database – a searchable, orderly archive or library of your documentation. • Less obviously, as you structure your database, you are structuring your story and building your confidence in it. Making a database Building a database or archive can be done with paper folders, electronic data, or a combi- nation of both. There is, however, no point in building it if you don’t use it, so the structure has to be robust and rapid. We suggest the fol- lowing simple, efficient basic process. A/ Collect documents. A source’s business card is a document. So is an official report, a news clip, interview notes or transcripts, etc. B/ Review the document in order to assess its contents. Underline or highlight any passages that appear of particular importance, and place a physical marker at the passage. If a paper document seems particularly crucial, make at least one paper or electronic copy. C/ Give the document a title or number, if it doesn’t already have one. Any title will do as long as it reminds you of what the document contains. (This is especially important for web pages! Saving a web page under its original title is sometimes the same thing as hiding it in plain sight on your hard drive. Make sure you either change the title to save it while recording the original URL elsewhere, or copy the content that interested you in another document with the URL refe- rence.) For interviews, we suggest you use the subject’s name. If the subject is confi- dential, give him or her a code name. D/ File the documents. Put them in an order that feels natural to you. We prefer to file documents alphabeti- cally, in a physical file or a computer folder. Organise your documents T he first time we published an inves-tigation in a major US magazine,there was a wonderful anecdote we had to leave out. One of the principal actors had lied on the witness stand during a court hearing. But we weren’t there, and we’d lost the newspaper clip attesting to the event. A colleague once had to abandon an investigation when he left a briefcase containing key files in a taxi. Another spent a year looking for proof that her targets had conducted a certain study, and then reali- sed that she already had it in her files. Organisation can help you avoid these pro- blems. Investigative organisation is about making sure that: • You know what documentation you have found and the information it contains (the “assets”), • You know where a given asset is and can put your hand on it immediately (meaning within 30 seconds) • You can make connections between related facts across your assets. If you know what you have and can access it swiftly, your investigation will not collapse on its own. Just as important, you can access the same information for future pro- jects; it’s like building a capital fund. If you can’t do this, your work and your career will be poorer. So please do not think this is a minor part of the job. You can’t spend all your time on it, but you have to spend enough time so that you maintain mastery of your data and documentation at every step of the inquiry. chapter 5 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 57chapter 5chapter 5 56St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts We also prefer subject filing: we will open a subject file with a single document, then expand and sub-divide the subject headings as more documents arrive. Within subject files we arrange documents chronologically, with the more recent first. E/ Review the documents periodically. Once a month is sufficient. Make sure that the different documents are filed correctly. If a document looks unfamiliar to you, take a moment to read it. The point of this exercise is not just to keep your files updated, but to ensure that you know what they contain. F/ Exchange documents across files. If a particular event or series of events leaps out of the file to suggest a separate story, copy related documents from all pertinent files and begin a new file. Be sure to leave copies of all documents in their previous files. This is a technique used by the FBI: Whenever a docu- ment refers to another (for example, if both contain the name of the same person), copies of each document are placed in both files. The reason for this technique is that it increases the chances you will make connections bet- ween disparate bits of data. G/ Make backups. If documents are sensitive, prepare copies and store them in a place that is not your home or office, and to which you or a colleague can have access. Do not put sensitive data, such as the names of confidential sources, on your computer. Any and all data on your computer cannot be considered secure. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 58chapter 5 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 57 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts • If the data is not in electronic form – for example, paper documents – and the original form is important, scan the document, save it to an easily accessible location on your hard drive, and insert a hyperlink to the document’s location in your master file. Of course, you may include hyperlinks to web pages or other online sources. • Please do not be lazy about transcribing key passages from interviews. Every hour you spend on this part of the investigation will save several hours later on. • Make sure that every piece of data that you put in the file includes information concerning its source. For published sources, give the full bibliographical information. • Make sure as well that you document your contacts with sources. The master file should include such information as when you made the first contact with the target, what he or she said, when you made a promise to a source, and so on. This information can be of critical importance if your investigation is challenged, because it demonstrates that you made a serious effort of research. • Repeat: do not put information in the mas- ter file that may compromise the security of a source. Assume that anything on your computer may be accessed by someone else. C / As you enter data in the master file, if it has a physical location (like a file folder), note where it can be found. This will be of tremen- dous help later on. If you have questions about a given document you can find it easily. Just as important, if your lawyers want to know what proof you have before it is published, you will be able to hand them a document within seconds. (This is a heart-warming experience that no lawyer should be denied, especially the one who may have to defend you in case legal action is taken against you.) D / When you move the data, give it a prelimi- nary order. The simplest order and the most powerful from an organisational standpoint is chronological. Stack your events in the order they occurred. Insert portraits or biographical data about actors in the story at the moment they first appear in it. M Structuring the Data: Creating a master file Y our assets will do you no goodunless they add up to a story. Yourhypotheses will help to remind you of the core of your story, and to guide your research. But they will not suffice to compose a tight, well-structured narrative. To do that, you need another key tool: the master file. At the most basic level, a master file is a “data department store” – a place where you throw all the assets you’ve collected. But it is not a chaotic dump, because you are going to give it order. The point is to have all of the information that you may use in a single location and form. 1. Basics of the master file A / Create a new word processing file or data base file on your computer. Either one will do; use the one with which you are most comfortable. B / Move your data into this file. • By “data” we mean all the facts you need to do the story: your sources, interview transcripts, document extracts, notes, etc. We suggest put- ting sources first, so that you can find them easily. • If the data is in electronic form (extracts from online documents or web pages, scanned illus- trations, etc.), copy it directly into the file. chapter 5 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 59chapter 5chapter 5 58St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts E / As you create the master file, connections between different data points, as well as events or facts that seem to make no clear sense, will become evident to you. So will entire sentences or paragraphs of exegesis on your material. Note those insights in the master file. Identify them by a keyword (for example, you may use the word NOTE, in capital letters, or TN, meaning “to note”). F / Be sure that you always enter dates using the same format (mm/dd/yyyy, for example). Also, make sure that you enter names the same way every time. Otherwise you will not be able to search the master file properly. 2. Segmenting the Master File A more detailed approach to this above system has been developed by Flemming Svith, formerly the co-founder of the Danish Institute for Computer-Assisted Reporting (DICAR). Rather than use a word processing file to collect and track data, Flemming uses Excel or open-source spreadsheet software to create an index and master file of different aspects of his investigation. The method is simple: He creates a spreadsheet for the investigation. Then, he creates separate pages under the following headings: A / Document list. Flemming prefers to use a chronological sequence for his documents. In any case, he insists: “Give all documents a number and keep the paper documents in numeric order.” If there are electronic documents on his list, he includes a hyperlink to the online or hard disk location. He sets up columns of data concerning the documents as follows: B / Source list. This is where Flemming keeps track of his contacts. The data sheet looks like this (all coordinates but his name have been changed!): C / The chronology spreadsheet gives the sequence of events that appears in the investigation, including all contacts with sources. It looks like this: No Date From To Subject, content, keyword Form 1 01/02/05 Last name, First name Last name, First name keyword, keyword, keyword email 2 letter 3 telephone No Title Person Organisation Adress Zip Country Tel Org. Tel 1 Editor Flemming Svith Dicar Olof Palmes Alle 11 8200 Denmark +45 89440493 +45 89440480 2 3 Date Source Organisation Event (act) Content, keyword Source 1/02/03 Last name, first name Name Interview with... Corruption, etc. Meeting between… Release of a document…. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 60chapter 5 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 59 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts D / Next is a contact log, which looks like this: As you can see, Flemming separates different kinds of information that other reporters (like me) would put into a single file. One advantage of his method is that it builds redundancy into the system: The same information will turn up in more than one place. (A disadvantage is that there are more opportunities to create errors, too.) A second, huge advantage is that spreads- heet applications allow you to sort through files quickly to find and group all references to a particular actor or element in the investigation. You can’t do this with a word processor. We suggest that you use whatever software you’re comfortable with, until it becomes obvious that it is insufficient or inadequate for your needs. In the meanwhile, if word processors are your favorite tool, use them. If you’re handy with spreadsheets, use them. But use something that allows you to put the power of a personal computer behind your work. 3. Why bother? When? You do not need to go to these lengths on every story. But if you do not create a master file in some form for an investigation that involves, say, more than a dozen documents or sources, you will regret it later. A key dis- tinction between investigation and daily reporting is that investigation involves more information and contacts, and different kinds and qualities of information, than ordinary news reporting. The systems offered here will help you deal with that situation. You can improve them or alter them, or find a better one of your own. But don’t think that if you skip this task, you’ll go faster. You’ll either slow down, or you’ll crash. The most obvious advantages of using your computer to create one of the systems described above are: • When it’s time to write, having your data ready to hand and in order will help you avoid forgetting everything but the last thing you found. • When it’s time to fact-check, having your data and your sources in one place will save huge amounts of time an
