SBN 9 789231 041891 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 90Preface / p.1 Presenting “Story-Based Inquiry: A Manual for Investigative Journalists" by Jānis Kārkli�š, Assistant Director-General for Communication and Information, UNESCO Introduction / p.2 by Mark Lee Hunter Preface to the first edition / p.5 Investing In Investigative Journalism by Yosri Fouda Chapter 1 / p.7 What is Investigative Journalism? by Mark Lee Hunter and Nils Hanson Chapter 2 / p.13 Using hypotheses: The core of investigative method by Mark Lee Hunter, Luuk Sengers and Pia Thordsen Chapter 3 / p.27 Using the Open Doors: Backgrounding and deduction by Mark Lee Hunter Chapter 4 / p.37 Using Human sources By Nils Hanson and Mark Lee Hunter Chapter 5 / p.53 Organisation: How to Set Yourself Up to Succeed by Mark Lee Hunter and Flemming Svith Chapter 6 / p.61 Writing Investigations by Mark Lee Hunter Chapter 7 / p.75 Quality Control: Techniques and Ethics by Nils Hanson, Mark Lee Hunter, Pia Thordsen and Drew Sullivan Chapter 8 / p.83 Publish it! by Mark Lee Hunter Selected bibliography / p.87 Published by the United Nations Educational, Scientific and Cultural Organization, Communication and Information Sector, Division for Freedom of Expression, Democracy and Peace 1, rue Miollis 75732 Paris Cedex 15 France HYPERLINK "http://www.unesco.org/webworld" http://www.unesco.org/webworld UNESCO Publishing www.unewco.org/publishing © UNESCO 2011 All rights reserved ISBN 9 789231 041891 The designations employed and the presentation of material throughout this publication do not imply the expression of any opinion whatsoever on the part of UNESCO concerning the legal status of any country, territory, city or area or of its authorities, or concerning the delimitation of its frontiers or boundaries. The authors are responsible for the choice and the presentation of the facts contained in this book and for the opinions expressed therein, which are not necessarily those of UNESCO and do not commit the Organization. Cover design by and Typeset by Anne Barcat Printed by UNESCO Printed in France Table of Contents xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 2«Story-Based Inquiry: a Manual for Investigative Journalists » UNESCO has constantly fostered debate on media accountability and pro- fessional and ethical standards, which provide journalists with guiding principles on how to best exercise their profession. In collaboration with Arab Reporters for Investigative Journalism (ARIJ), UNESCO launched the first manual for investigative journalists in Arab States entitled “Story- Based Inquiry: A Manual for Investigative Journalists” in 2009. Investigative Journalism means the unveiling of matters that are concealed either deliberately by someone in a position of power, or accidentally, behind a chaotic mass of facts and circumstances - and the analysis and exposure of all relevant facts to the public. In this way investigative journa- lism crucially contributes to freedom of expression and freedom of informa- tion, which are at the heart of UNESCO’s mandate. The role media can play as a watchdog is indispensable for democracy and it is for this reason that UNESCO fully supports initiatives to strengthen investigative journalism throughout the world. I believe this publication makes a significant contri- bution to promoting investigative journalism and I hope it will be a valuable resource for journalists and media professionals, as well as for journalism trainers and educators. Jānis Kārkli"š Assistant Director-General for Communication and Information, UNESCO xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 3This manual provides a guide to basic methods and techniques ofinvestigative journalism, and it consciously fills a gap in the lite-rature of the profession. The majority of investigative manuals devote a lot of space to the subject of where to find information. They assume that once a reporter finds the information he or she seeks, he or she will be able to compose a viable story. We do not share that assumption. We do not think that the basic issue is finding information. Instead, we think the core task is telling a story. That leads to the basic methodological innovation of this manual: We use stories as the cement which holds together every step of the investigative process, from conception to research, writing, quality control and publication. We also call this approach hypothesis-based inquiry, because we begin by formulating the story we hope to write as a hypothesis that will be verified or disproved. This is the first step in an integrated process, as follows: • By analysing a hypothetical story, a reporter can more easily see which information he or she needs to seek. • An editor or publisher can more easily assess the feasibility, costs, rewards and progress of the investigative project. • As research progresses, the reporter or investigative team will be organising their material for composition, and composing specific parts of the final story. • This, in turn, will facilitate quality control, and enable closer insight into whether the story meets legal and ethical criteria. • At the end of the process, the result will be a story that can be summed up in a few hard-hitting sentences – a story that can be promoted, defended and remembered. Story-Based Inquiry: A manual for investigative journalists BY MARK LEE HUNTER WITH (IN ALPHABETICAL ORDER) NILS HANSON, RANA SABBAGH, LUUK SENGERS, DREW SULLIVAN, FLEMMING TAIT SVITH AND PIA THORDSE PREFACE BY YOSRI FOUDA xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 4We do not claim to have invented hypothesis-based inquiry. Similar methods have been used in business consulting, the social sciences, and police work. What we have done is to work through their implications for the journalistic process, and for the goals of investigative journalism – to reform a world that generates useless, needless suffering, or conversely, that ignores available solutions to its problems. This has been a long and collective process. For me, it began in 1990 with a mid-career doctoral thesis that compared French and American investigative methods, under the direction of Francis Balle. That, in turn, led to a position at the Institut français de Presse of the Université de Paris/Panthéon-Assas, where for 12 years I benefited simultaneously from the company of generous and committed col- leagues, and enthusiastic masters-level students. They allowed me to field-test the methods advocated in this manual on a scale beyond the activities of an individual reporter. In 2001, I began what I thought would be a sabbatical at INSEAD, the global business school. A temporary research position evolved into an adjunct professorship, and enabled me to benefit from the insights and experience of colleagues like Yves Doz, Luk Van Wassenhove, Ludo Van der Hayden, Kevin Kaiser, and others. Their influence on this manual is indirect but powerful. These scholars forced me to think at a more abstract level about media practices, and to consider how processes can be improved to create greater value, including in journalism. Like my co-authors, I was simultaneously engaged in investigative reporting as a practitioner. Also in 2001, the creation of the Global Investigative Journalism Network, of which me and most of my coau- thors were founding members alongside drivers Nils Mulvad of the Danish Institute for Computer-Assisted Reporting and Brant Houston of Investigative Reporters and Editors Inc., created an extraordinary forum for the exchange of best practices. In particular, elements of hypothesis-based inquiry emerged in seve- ral countries simultaneously and independently – an unmistakable sign of a major development. The Network’s congress in 2005 provi- ded me with an opportunity to present a formal concept of journalis- tic investigation by hypothesis for the first time. At the same event, Luuk Sengers (from Holland) and Flemming Svith (a Dane) showed me a simple and robust research database they had created, and other computer tools for organising investigations that could also be applied to project management. We all immediately recognised that our discoveries could fit together as components of a single process. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 5Then and later, positive feedback and criticism from participants in the Network’s bi-annual congresses convinced me that there was a need and a desire for the material in this manual. More collaborators surfaced, too, not least Nils Hanson of Sweden, the principal co-author of this manual, and an expert in reconciling quality and productivity in the news. We never forgot that too many people in our industry consider investigative reporting too slow, expensive and risky. We set out to show that investigation can also be an efficient process in which key risks can be managed. The ongoing process of collective development was powerfully reinforced by the creation of the Centre for Investigative Reporting of London and its annual Summer School. Over several years, founder Gavin McFadyen and his team allowed us to explore new ways to teach the process of composing stories. In London I first heard Drew Sullivan (an American expatriate in the Balkans) set out reporting practices on organised crime that can be applied to many other situations. A final, crucial impetus came through Rana Sabbagh, director of Arab Reporters for Investigative Journalism, and her Danish colleague Pia Thordsen, an early supporter of investigation by hypothesis, who asked me to take the lead in writing and editing this manual in the spring of 2007. Their seminars in Arabia provided the opportunity to test the presentation of the ideas in this book as it was being composed. This process, like ARIJ itself, was funded by International Media Support and the Danish Parliament. Andrea Cairola played a critical role in bringing the project to UNESCO, where Mogens Schmidt and Xianhong Hu proved to be open and valuable collaborators. Literally the day of its publication by UNESCO as a free download in August 2009, when 200 websites linked to it, “Story-Based Inquiry: A Manual for Investigative Journalists” became the best-distributed work of its kind in the history of journalism. Moreover, parts of it have been incorporated into other manuals since its publication. This is only a start: The method is still evolving, still finding new paths. Investigative journalism is a profession, and a skill set. It is also a family. I grew up in that family, and have watched it grow. This manual is your door into the family. Please become a member we can honour and admire, for your professionalism, ethics and engagement. Mark Lee Hunter Editor and principal author Paris – Aarhüs – Amman – London – Lillehammer xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 6Preface : BY YOSRI FOUDA, AL JAZEERA CHIEF INVESTIGATIVE CORRESPONDENT After the launch of Al Jazeera in 1996, I summoned my courage and put an outlandish idea to its management: to be allowed to disappear for two months at a time in return for a bi-monthly, 45-minute investigative piece. The norm in Arab TV then was that you were only allowed to disappear for 45 minutes if you promised to come back with two months’ worth of rushes (I am exaggerating only slightly). Rather expectedly, the propo- sal generated some kind-hearted laughs, and I almost entered yet another cycle of pro- fessional depression. A few months later, however, Chairman Hamad Bin Thamer Al Thani decided for some reason to offer me the chance to produce a pilot report. With a budget of next to zero, this pilot report had to be prepared, filmed and edited where I lived – London. Anthrax sounded like a good topic to me. Apart from the obvious interest, the location would be easily justifiable in light of recent leaks which implicated the previous British govern- ment in facilitating the export of so-called “dual-use equipment” to Saddam Hussein’s Iraq. Under UN sanctions, it was illegal to export to Iraq any civil equipment which could be adapted for military purposes. By yesterday’s standards the pilot report, according to many, was something of a breakthrough on the road to an Arab concept of investigative journalism. So much so, that it was unexpectedly broadcast and then re-broadcast several times. At a time when Al Jazeera was openly deplored and fiercely attacked by most Arab governments, it also represented the Qatari channel in the Cairo Festival for Radio and TV Production in 1998, and came back with an award. That was the first and last time that Al Jazeera took part in such a competition. But it was only the start of a 10-year series for “Sirri Lilghaya” (“Top Secret”). Despite some previous shy attempts at this kind of journalism in Arab newspapers, the increasingly popular, first pan-Arab 24-hour news and current affairs channel managed to identify an area of interest that was largely new to the Arab audience. I had no illu- sions as to the potential hazards and troubles that would come in the same bag, given the particular realities of our part of the world. At various levels, these difficulties still represent a huge challenge in the face of young Arab reporters and producers who aspire to become serious investigative journalists. First, from an industrial point of view, most of our news organisations are not as familiar with the culture of quality as they are with the culture of quantity. Among other things, quality requires a highly educated management, continuous training, integrated teams, realistic budgets and – dare I say – time. You will hardly come across a manager or an editor who does not passionately praise in-depth reporting. But rarely will you find them equally enthusiastic for, and capable of, translating their praise into reality. They are tra- ditionally part of the problem, although it is much better to see them as part of the solu- tion in a comprehensive attempt to change the culture. The good news is that our back- wardness in this area has nothing to do with our genes. But the bad news is that if we remain incapable of getting our own kitchen working, we will neither deserve nor achieve the honour of beginning to face up to external – and more serious – challenges. Second, from a personal security point of view, the saying that “to be a journalist is to look for trouble” could not apply to any form of journalism more than this one. Risk cal- culation thus becomes a crucial concept in investigative journalism, based on the fact that there is no single story that is worth the life of a journalist. As deceptively simple xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 7as this principle may seem, it evokes reasons for concern in a part of the world that is still learning about investigative reporting. The Arab world is full of young, impressiona- ble journalists who are eager to prove themselves, sometimes at any cost, with very lit- tle knowledge about safety and security, or even means of survival. Their courage is a promising phenomenon but it can also be a recipe for disaster. Part of the responsibility for resolving this situation lies with media departments and training centres, another part with management, but the biggest part remains on the shoulders of the journalist. He or she is the one who will pay the ultimate price should someone die, and he or she is the one who can decide to live for one more story. Third, from a legal point of view, investigative journalism is a minefield. It often frequents the same club where corruption, negligence and failure of systems can be found. Mixing with such bad company is a tremendous legal hazard, as the investiga- tor always sets out to find answers to questions that begin with “how” and “why”. To do this, he or she sometimes must apply less than transparent methods in the name of the greater good. Few journalists will be able and willing to see the difference between the public interest and the passing interests of the public. Fewer will be able to land a scoop and stay within the law at the same time. Obviously, legal awareness is crucial. Fourth, from a political point of view, most Arab governments still see danger in empo- wering their citizens with information. It is a fact that should always be observed and wisely put in context in a way that does not compromise our sacred goal: to arrive at what we honestly believe to be the truth, and relay it to our readers and viewers, rulers and ruled. Given Arab political reality, the margin of error is indeed one of the smallest in the world, which offers yet another interesting challenge. Some journalists do cherish this kind of challenge, but this requires knowledge and experience – a lot of both. The mechanisms that govern the journalist’s relationships with politicians are in one key sense similar to those that govern his or her relationships with prostitutes. They are both sources, and they both aim to use him or her for one thing or another. It is not a zero sum game. There is always a third way which will enable the journalist to arrive at what he or she aims for, and to stay alive. Fifth, from a cultural point of view, it is not easy for serious investigative journalism to flourish in a predominantly oral culture. Our culture does not appreciate numbers, figures and statistics as much as it is moved by words, rhythm and structure. Fortunately, this does not have to get in the way. On the contrary, mastering your tools can help turn it into a huge advantage. And this is another curious area which obviously can benefit from some investment. Where the real problem lies is in the general unders- tanding – or lack of it - in our societies of what investigative journalism is all about. We still have some educating to do in order to have the general public on our side. Otherwise, it will always be rather easy to be accused, while you are trying to figure out how many young Egyptians married Israeli nationals last year, of being a spy. Needless to say, there are also mental, emotional, psychological and social hazards attached to this cutting edge form of journalism. It can be so ridiculously demanding that it easily takes over your life – quite literally. You want to be somebody in this field? You might as well kiss “the pleasures of ordinary life” goodbye – well, not always, for- tunately. You have a burning passion for it? Not a bad start. What you will be able to get in return is the joy of picking up threads and connecting dots and the ultimate, indescribable pleasure when you arrive at a moment of discovery. But above all, nothing is like that healing feeling you get when someone who was not meant to know suddenly approaches you to say: “Thank you.” And that will be enough to send you back on the road for another investigation. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 8subject 1 What is investigative journalism? Investigative journalism is not reporting as usual BY MARK LEE HUNTER AND NILS HANSON The process so far: We give ourselves a good idea of what we’re doing, and why. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 9chapter 1 8St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Contrary to what some professionals like to say, investigative journalism is not just good, old-fashioned journalism that is well done. True, both forms of journalism are focused on the elements of who, what, where, and when. But the fifth element of conventional reporting, the “why”, becomes the “how” in investigation. The other elements are developed not only in terms of quantity, but also in terms of quality. The “who” is not just a name and a title, it is a personality, with character traits and a style. The “when” is not the present of the news, it is a historical continuum – a narrative. The “what” is not merely an event, but a phenomenon with causes and consequences. The “where” is not just an address, it is a setting, in which certain things become more or less possible. These elements and details give investigative journalism, at its best, a powerful esthetic quality that reinforces its emotional impact. In sum, though reporters may do both daily reporting and investigative work in the course of a career, the two roles involve sometimes profoundly different skills, work habits, pro- cesses and goals. These differences are detailed in the following table. They should not be read as distinct, irreconcilable opposites. Rather, when a situation corresponds more to the left side of the table, it means that the reporter is doing conventional reporting; as the situation shifts toward the right of the table, the reporter begins to act in an investigative manner. Investigative journalism is not reporting as usual What is investigative journalism?How is it done? Why should wedo it? Nearly half a century after Watergate, the defining moment in the history of the genre, neither the public nor journalists agree on the answers. What we think is this: Investigative journalism involves exposing to the public matters that are concealed – either deliberately by someone in a position of power, or accidentally, behind a chaotic mass of facts and circumstances that obs- cure understanding. It requires using both secret and open sources and documents. Conventional news reporting depends largely and sometimes entirely on materials provided by others (such as police, governments, companies, etc.); it is fundamentally reactive, if not passive. Investigative reporting, in contrast, depends on material gathered or generated through the reporter’s own initiative (which is why it is often called “enterprise reporting”). Conventional news reporting aims to create an objective image of the world as it is. Investigative reporting uses objectively true material – that is, facts that any reasonable observer would agree are true – toward the subjective goal of reforming the world. That is not a license to lie in a good cause. It is a responsibility, to learn the truth so that the world can change. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 10chapter 1 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 9 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Information is gathered and reported at a fixed rhythm (daily, weekly, monthly). Information cannot be published until its coherence and completeness are assured. Research is completed swiftly. No further research is done once a story is completed. Research continues until the story is confirmed, and may continue after it is published. The story is based on a necessary minimum of information and can be very short. The story is based on the obtainable maximum of information, and can be very long. The declarations of sources can substitute for documentation. The reportage requires documentation to support or deny the declarations of sources. The good faith of sources is presumed, often without verification. The good faith of sources cannot be presumed; any source may provide false information; no information may be used without verification. Official sources offer information to the reporter freely, to promote themselves and their goals. Official information is hidden from the reporter, because its revelation may compromise the interests of authorities or institutions. The reporter must accept the official version of a story, though he or she may contrast it to commentaries and statements from other sources. The reporter may explicitly challenge or deny the official version of a story, based on information from independent sources. The reporter disposes of less information than most or all of his sources. The reporter disposes of more information than any one of his sources taken individually, and of more information than most of them taken together. Sources are nearly always identified. Sources often cannot be identified for the sake of their security. Reportage is seen as a reflection of the world, which is accepted as it is. The reporter does not hope for results beyond informing the public. The reporter refuses to accept the world as it is. The story is aimed at penetrating or exposing a given situation, in order to reform it, denounce it or, in certain cases, promote an example of a better way. The reportage does not require a personal engagement from the reporter. Without a personal engagement from the reporter, the story will never be completed. The reporter seeks to be objective, without bias or judgement toward any of the parties in the story. The reporter seeks to be fair and scrupulous toward the facts of the story, and on that basis may designate its victims, heroes and wrongdoers. The reporter may also offer a judgment or verdict on the story. The dramatic structure of the reportage is not of great importance. The story does not have an end, because the news is continuous. The dramatic structure of the story is essential to its impact, and leads to a conclusion that is offered by the reporter or a source. Errors may be committed by the reporter, but they are inevitable and usually without importance. Errors expose the reporter to formal and informal sanctions, and can destroy the credibility of the reporter and the media. Outcomes Source relations Research CONVENTIONAL JOURNALISM INVESTIGATIVE JOURNALISM xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 11chapter 1 10St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Does it look like investigation is a lot more work than ordinary journalism? In fact, it is more work, at every step of the process, though you can do it efficiently and with pleasure. It is also much more rewarding – for the public, for your organisation, and for you. For the public: Viewers love stories that bring them added value – information that they can’t find anywhere else, that they can trust, and that gives them power over their lives. The infor- mation can be about politics, or finance, or the products they use in their homes. What matters is that their lives can change because of what we have to say on these subjects. So take note: Investigative journalism is not only or mainly a product, it is a service, and that service is making peoples’ lives stronger and better. For your organisation: Do not let anyone tell you that investigation is a luxury for news media. Most news media lose money, but media that conduct and manage investigations properly, and use them to enrich their value, may be very profitable. (The weekly Canard enchaîné in France and The Economist Group in the UK are two very different examples.) Moreover, such media gain great influence and good will in their communities, which increases their access to information and hence their competitive position. For you: In the decades we have spent training inves- tigators, we often heard them say: “Won’t I make enemies?” The truth is that if you do the job right, you will make many more friends than enemies. You will also make yourself much better known in the profession and outside it. Your skills will be highly valued; whether or not you remain a journalist, you will never be far from a job. That is not true of journalists who lack investigative skills; they are very easily replaceable, and their skills don’t go far in the workforce. Most important, you will change as an indi- vidual in astonishing ways. You will become stronger, because you will know yourself to be capable of finding the truth on your own, instead of waiting for someone to hand it to you. You will learn to master your fear while listening to your doubts. You will understand the world in a new, deeper way. Journalism makes many people cynical and lazy, truly good for nothing; investigation will help you to avoid that fate. In short, the rewards are so great that if you care about journalism and yourself, you will offer yourself, your viewers and your colleagues the added value that investigation creates. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 12chapter 1 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 11 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Choosing a story for investigation B eginning reporters often ask:“How do you select a story toinvestigate?” Not infrequently, they have a difficult time finding one. But as one of my students once said, “Material is everywhere.” The problem is seeing it. Luckily, there are many ways to notice a story that calls for investigation. One is to watch the media. In general, it is a good idea to monitor a given sector, so that you can begin to identify patterns, and thus realise when something unusual occurs. If you finish a story and think, “Why did that happen?”, the odds are good that there is more to investigate. Another is to pay attention to what’s changing in your environment, and not take it for granted. The great Belgian reporter Chris de Stoop began a landmark investigation of the traffic in women after noticing that the Belgian prostitutes in a neighbourhood he crossed on his way to work had given way to foreigners, and wondering why. A third is to listen to peoples’ complaints. Why must things be that way? Can nothing be done? Anyplace where people gather – village markets, Internet forums, dinner parties – you will hear of things that sound strange, shocking, or intriguing. Finally, do not look only for things that involve wrongdoing. It is often more difficult to do a good job of reporting on something that is going right – to understand a new talent, or a development project that met its goals, or a company that is creating wealth and jobs. Identifying the replicable elements of success, or “best practices”, is a valuable service to your viewers. Remember: Especially when you are starting out, there is no such thing as a small inves- tigation. The skills needed for an inquiry in a distant village are the same skills that you will need later in the capital. That is not a theory, it is our experience. Use the stories that appear where you are now to begin building those skills. Do not wait until you are involved in a high-stakes investigation to learn what you are doing. Last and first, follow your passion. There are two aspects of this principle. The first is what we call the “broken leg syn- drome.” We call it that because, until one of us broke his leg, he never noticed how many people limp. In general, we do not notice phenomena unless we are already sensitive to them. So allow your existing passions to sensitise you to stories that no one else seems to take seriously. The second aspect is that if a story does not fascinate you, or outrage you, or give you the intense desire to see something change, you should give it to someone else. Likewise, if you are an editor, pay attention to whether your reporter is treating an investigation like a mere task. If so, take back the assignment and give it to someone else. Why? Remember: Investigation involves extra work. If you don’t care about a story, you will not do that work. Of course you will have to use your critical mind to get it done; of course your manner must remain profes- sional in all circumstances. But if the story does not touch your passions, one way or another you are going to fail with it. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 13chapter 1 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 12St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Is the story worth it? T oo many investigations have beendone for the wrong reasons. Thoughpassion matters, vengeance is a passion, and some reporters and publishers use inquiries to accomplish a personal vengeance. Though investigations are hard work, some of them are done only because they are the easiest stories available. And far too many investigators never ask whe- ther a given story is important to their viewers, and why. So ask yourself the following questions when you assess whether or not a story is worth the work it will require of you: How many people are affected? (We call this “the size of the beast”.) How powerfully are they affected? (Quality matters as much as quantity here. If just one person dies, or his or her life is ruined, the story is important.) If they are affected positively, can the cause be replicated elsewhere? Or, are these people victims? Could their suffering be avoided? Can we show how? Are there wrongdoers who must be punished? Or at least, denounced? Is it important in any event to tell what happened, so it will or won’t happen again? This is how one of us looks at it: The world is full of suffering, and much of that suffering is useless, the result of vice and error. Anything that lessens suffering, cruelty and stupidity is worth undertaking. Investigation can further that end. Try to put that service first, rather than simply making use of it to advance your career. Never forget that investigation is a weapon, and you can hurt people with it – deliberately, or by your own carelessness. (Not enough is made of the fact that Woodward and Bernstein of Watergate fame, by their own admission, destroyed the careers of several innocent people along with Richard Nixon’s.) In the course of your career, you are going to be the best and the worst thing that ever happens to some other people. Be careful about which role you play, and for whom, and why. Take a good look at your own motives before you investigate others. If the story is not more important for others than it is for you, you probably shouldn’t be doing it. In the course of our careers, we have done hundreds of investigations. In every one, at some point, someone walked up to us and said: “Why are you asking all of these questions? What are you going to do with this informa- tion? What gives you the right?” If we didn’t have a good answer to that question – and saying “the public has a right to know!” is not a good answer – the investigation was finished. Usually, we said something like this: “What is happening here is important, for you and others. I’m going to tell that story, and I want it to be true. I hope you’ll help me.” Whatever you say at a moment like this, you’d better believe it, and more important, it has to make sense to whoever you’re talking to. People hate journalists, and one of the reasons is that they distrust our motives. We expect you to help change that, too. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 14hypothesis 2 Using hypotheses: The core of investigative method BY MARK LEE HUNTER, LUUK SENGERS AND PIA THORDSEN The process so far: We discover a subject. We create a hypothesis to verify. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 15chapter 2 14St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts A hypothesis is a story and a method for testing it R eporters are always complainingthat editors refuse their greatstory ideas. Sure, it happens. But often, what the editor refuses isn’t a story at all. It’s an invitation to disaster – a poorly planned inquiry that will burn time and money for a very uncertain result. When we were younger we offered a few of these lame horses to editors, and we were very lucky that they nearly always shot the stupid beasts dead before we could mount them. For example, saying “I want to investigate cor- ruption” is not a great proposition for an editor. Of course corruption exists, everywhere in the world. If you spend enough time looking for it, you’ll find some. But corruption in and of itself is a subject. It is not a story, and what journa- lists do is tell stories. If you pursue a subject instead of a story, you may become expert in the subject, but a lot of time, money and energy will be wasted along the way. And that’s why any editor with a brain will tell you, “No.” If instead you say, “Corruption in the school system has destroyed parents’ hopes that their children will lead better lives,” you are telling a specific story. That’s already more interesting. Whether you know it or not, you are also stating a hypothesis – because you have not yet proven that your story is the right one. You are proposing that corruption in the schools exists, and that it has devastating effects on at least two groups of people, parents and children. That may or may not be true; you still have to get the facts. In the meanwhile, your hypothesis defines specific questions that must be answered if you want to find out whether or not it makes sense. This happens through a process in which we take apart the hypothesis and see what separate, specific claims it makes. Then, we can verify each of those claims in turn. Moreover, we will also see what we mean by the words we use to tell the story, because we have to discover and define their meaning to get anywhere. You can answer these questions in any order, but the wisest order is almost always the one that you can follow most easily. Any investigation will become difficult sooner or later, because it involves a lot of facts, a lot of sources – which means a lot of organising your material – and a lot of worrying over whether you got the story right before risking your reputation. In our hypothetical example, probably the easiest place to start is by talking to parents and children about their hopes and their despair. Once you have found at least four sources who confirm to you that there is indeed corruption in the schools – less than four is a very risky base to stand on – you can start looking at how the school system functions. You will need to study its rules, its procedures, its stated ideals and mission. When you know how the system functions, you will see the gray and black zones in which corruption can occur. You can then compare the reality of what you have heard and discovered to the system’s claims. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 16chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 15 --S to ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Corruption in the school system has destroyed parents’ hopes that their children will lead better lives. What exactly do we mean by “corruption?” Bribes, favoritism, nepotism in hiring? How does it work in the schools, if it exists at all? Which parents have experienced corruption? What are their hopes? How did they think education would help to achieve those dreams? What kind of schools, how many? Does corruption work the same way in each? What rules are supposed to forbid corruption? Why aren’t they working? What different kinds of people work in the system, and how are power and rewards distributed among them? Are the children aware of what is going on? If so, how does it affect them? Does education really make life better for children? How? HERE’S A GRAPHIC WAY OF LOOKING AT THIS PROCESS First, we set out the hypothesis &gt; Now we separate the different terms it includes &gt; Next we define each term more closely, and see what questions it generates xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 17chapter 2 16St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts have to be looking for it.” We would add that if you’re really looking for something, you’ll find more than you were looking for. 3. A hypothesis makes it easier to manage your project. Having defined what you’re looking for, and where to start looking for it, you can esti- mate how much time the initial steps of the investigation will require. This is the first step to treating an investigation as a project that you can manage. We’ll return to this point at the end of this chapter. 4. Hypotheses are a tool that you can use again and again. When you can work in a methodical way, your career will change. More important, you will change. You will no longer need someone to tell you what to do. You will see what needs to be done to combat some of the chaos and suffering in this world, and you will be able to do it. Isn’t that why you became a journalist in the first place? 5. A hypothesis virtually guarantees that you will deliver a story, not just a mass of data. Editors want to know that at the end of a specific period of time – a specific invest- ment of resources – there will be a story to publish. A hypothesis hugely increases the likelihood of that outcome. It enables you to predict a minimum and maximum positive result for your work, as well as a worst case. • The worst case is that verification of the hypothesis will quickly show there is no story, and the project can be ended without wasting significant resources. • The minimum positive outcome is that the initial hypothesis is true, and can be quickly verified. • The maximum is that if this hypothesis is true, others must logically follow, and either a series of related stories or one very big story will result. There are even more advantages, but before going further, let us give you a word of warning. The advantages of hypothesis driven investigation D oes the above example sound likea lot of work? That’s because it isa lot of work – but only if you compare it to the way most news stories are written, which is by talking to a source or two or rewriting a press release. If you compare the hypothesis method to most other ways of investigating, the labor-saving advantages are obvious: 1. A hypothesis gives you something to verify, instead of trying to uncover a secret. People do not give up their secrets without a very good reason. They are much more likely to offer confirmation of information that is already in your possession, simply because most people hate to lie. A hypothesis enables you to ask them to confirm something, rather than to advance information. It also puts you in the position of someone who is open to discovering that there is more to the story than he or she thought at first, because you are willing to accept that there are facts beyond what you suspected at the start. 2. A hypothesis increases your chances of discovering secrets. A lot of what we call “secrets” are simply facts that no one ever asked about. A hypothesis has the psychological effect of making you more sensitive to the material, so you can ask those questions. As the French investigator Edwy Plenel said, “If you want to find something, you xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 18chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 17 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Hypotheses can be dangerous B eginning reporters worry a lot aboutwhat will happen when they get astory right. Will there be ven- geance? Will they be sued? Experienced reporters know the worst problems happen when you get a story wrong. Of course they can be sued, and sometimes they can be thrown in jail, whether they are right or wrong. But less apparently, telling an untrue story makes the world a sadder, uglier place. So keep this in mind, please: If you merely try to prove at any cost that a hypothesis is true, regardless of the evidence, you will join the ranks of the world’s professional liars – the crooked cops who condemn the inno- cent, the politicians who sell wars as if they were soap. Investigation is about more than proving you are right. It’s about finding the truth. Hypothesis-based investigation is a tool that can dig up a lot of truth, but it can also dig a deep grave for the innocent. Specifically, to make the world worse, all you need to do is leave out the facts that disprove your hypothesis. Or you can be careless (mistakes probably add as much to the confusion and suffering of the world as outright lies). Either way, you make your job easier, and you let someone else clean up the mess. Plenty of people do so every day, but that doesn’t make it acceptable. Our theory is that there are lots of journalists in Hell, and misusing hypotheses is one way they got there. So be honest and careful about how you use hypotheses: Try to disprove them as well as prove them. We will say more about this subject in Chapter 7, “Quality Control.” xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 19chapter 2 18St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts The hypothesis is stated as a story. This matters hugely, because it means that you end where you began – with a story. We are not just collecting facts, we are telling stories that we hope can change the world. The hypothesis will help you to explain the story to others, starting with your editor and publisher, and then to the public. In its most basic form, the story is nearly always a variant of these three sentences: • We are facing a situation that is causing great suffering (or that deserves to be more widely known as a good example).” • This is how we got to this point. • This is what will happen if nothing changes… and here is how we could change things for the better.” Notice something about these sentences: They have an implicit chronological order. It may not seem apparent, because the order is not a straight line from the past to the future. Instead, it tells us: • The news of the problem, which is the present; • The cause of the problem, in the past. • What must change for the problem to end, in the future. Thus, when we compose our hypothesis, we are already beginning to compose a narrative – a story that involves people who move through a particular place and time. One of the most difficult things in investigation is to keep your focus on the narrative, and not to get buried by the facts. Your hypothesis can help you. When you feel overwhelmed, stop digging and start looking at the story your facts are trying to tell you. If they don’t fit the original hypothesis, change it. After all, it’s just a hypothesis. By the way, it can be very, very difficult to show how we can put an end to a given problem. Sometimes, the best you can do is to denounce an injustice. But often, someone connected to your story has looked for a solution. Don’t neglect to look for that person. How hypotheses work 1.Why it doesn’t matter if the first hypothesis is true Framing an investigation as a hypothesis is a procedure as old as science, and it is used successfully in domains as different as police work and business consulting. (In fact, it is an aberration that it has only recently been imported into journalism as a conscious method.) In essence, it is based on a mental trick. You create a statement of what you think reality may be, based on the best information in your possession, and then you seek further information that can prove or disprove your statement. This is the process of verification. As we showed above, if the entire hypothesis can’t be confirmed, its separate terms can nonetheless be verified. If not, go back to step one and make a new hypothesis. A hypothesis that can’t be verified in whole or part is mere speculation. If the statement is reaffirmed by the evidence, that’s great: You have your story. Less appa- rently, it’s also great if the statement is not true, because that means there may be a bet- ter story than the one you originally imagined. 2. Structuring the hypothesis to succeed The initial hypothesis should be no longer than three sentences, for two very good rea- sons. If it is longer than that, you can’t explain it to someone else. More important, if it is longer than that you probably don’t understand it yourself. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 20chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 19 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts 3. The four keys to making hypotheses effective Using hypotheses is not a complicated trick, but unless you are a lot more gifted than us (we accept this possibility), it will take you several tries before the method is natural to you. There are four things you need to keep in mind to make it work: Be imaginative. Normally journalists react to situations. They report what they see or hear or read, or follow up on yesterday’s news. An investiga- tor is trying to reveal something that is not yet known. He or she is not just covering news, but making it. So he or she necessa- rily makes a leap into an uncertain future. That means trying to picture the story, and this is creative work. Be very precise. If you use the word “house” in your hypo- thesis, is it a villa, or a penthouse, or a shack? The answers matter. The more pre- cise you can be about a presumed fact, the easier it is to verify. Use your experience. If you have seen how the world works in certain ways, that may be applicable to the story you are trying to prove. Your experience can help to furnish a hypothesis. Please remember that even the most experienced people can be sur- prised by something they never saw before, and even self-respecting people can discount their own experience. Example: A massive consumer boycott in France failed, according to the target company. The media accepted the com- pany’s version. We began an investigation that proved the contrary when we realised that everyone we knew had boycotted the company. How could there be no effects? Be objective. By objectivity, we mean three very precise things. • The first is that we have to accept the reality of facts that we can prove, whether we like them or not. In other words, we are objective toward the facts. If the facts say the hypo- thesis is wrong, we change the hypothesis. We do not try to make the facts disappear. • The second is that we have to do this work with the understanding that we could be wrong. If we do not keep that in mind, we will not get the help we need from others. Would you help someone who already knows all the answers, and isn’t listening to what you have to say? • Even if you remain objective toward the facts – and you must – there is a subjective basis to this work that will not go away. Trying to make the world a better place is not an objective goal. We are not recorders when we investigate; we are reformers. We use objective facts, and are objective toward the facts, to further that goal, because we happen to believe that any attempt to reform the world will fail if it is not based on reality. In other words, we use our subjectivity as an incentive to remain neutral toward the evidence, and to incite us to take all the evidence into account. 4.What if the facts go against your wonderful hypothesis? Easy: accept the facts, and make a new hypothesis. The difficulty here is to neither cling too hard to a mistaken hypothesis, nor leap in a new direction at the first contrary fact. The best sign that something is wrong comes when you are finding a fair amount of information, but it doesn’t make sense. When that happens, either you are looking at the wrong informa- tion, or it makes sense only when you have changed your hypothesis. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 21chapter 2 20St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Using the official version as a hypothesis I t isn’t always necessary to create ahypothesis. Sometimes the reportercan treat an official statement, or an anonymous tip, as a detailed hypothesis that demands verification – a simple technique that can have amazing results. Remember an important principle: Most inves- tigations are about the difference between a promise and the reality of whether or not it was kept. Thus the official promise often serves as a hypothesis, and verification shows whether or not the promise has been kept. Example: One of the greatest stories in the history of investigative journalism, the revelation of France’s “Contaminated Blood Affair”, began like this: Reporter Anne-Marie Casteret was contacted by a hemphiliac. Hemophiliacs are men with a genetic disorder that suppresses clotting factors in the blood, so even a slight cut in the skin can lead to unstoppable, fatal bleeding. At the beginning of the AIDS epidemic, he claimed, a French government agency had deliberately and knowingly sold hemophi- liacs and their families special blood products that were contaminated by the AIDS virus. Casteret went to see the head of the agency, who told her: “It’s true that the hemophiliacs were contaminated by AIDS in our products. But… • “At the time no one knew that AIDS was in the blood supplies we used to make the products. • “No one knew how to make safer products, so none were available on the market. • “The best thing we could do was to make sure that we didn’t spread the virus further, by making sure that no one who was not yet infected received contamina- ted products.” That was the official story, and it makes coherent, logical sense. But when Casteret started checking it as though it were merely a hypothesis, she gradually discovered that none of the facts it contained could be proved. On the contrary: • The scientific literature showed that the problem of AIDS in blood supplies was known at the time. (In fact, the agency was warned that its own supplies were infected.) • There were pharmaceutical companies and other government agencies who knew how to make safe pro- ducts, but they weren’t listened to. • The agency that sold the contaminated goods had no idea of whether or not the people who used the infected products were healthy or not, because they had no tests for AIDS infection. And in any case, it is terrible medical practice to re-infect people who are already sick. • In the end, faced with incontrovertible evidence that all of its products were contaminated by AIDS, the agency made the decision to continue selling them until it had used up all the contaminated stocks. It took Casteret four years to get all of that story. Were they worth it? Well, the story put a few white-collar criminals behind bars, it gave some victims the comfort of knowing they were not alone, it led to the electoral defeat of a government that tried to conceal the scandal, and it forced reforms of a health system that had become a killing machine. If you won’t take the time to do a job like that, you can still be a journalist, but you shouldn’t be an investigator. You may be wondering why no one but Casteret took the time. The main reason – aside from the fact that at least one of her competitors worked on the side for the same people who committed the crime – is that no one could believe that respectable people could do such a thing. We will tell you some- thing more than once, and this is a good time to start: More investigations are sabo- taged by reporters who can’t accept the truth of what they’ve found than by targets seeking to protect themselves. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 22chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 21 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Start with a strategy! T ake time to consider your investiga-tive strategy – the order in whichyou will execute specific tasks, and how they will fit together. Believe us, in the end this will save you a lot of time. This will require an initial list of questions that must be answered. (For example: Who makes blood products? How do they know whether their products are safe or not?) It is a very good idea to begin research with the easiest questions, meaning those you can answer with information that does not require talking to people. Generally, the first impulse of a news reporter is to pick up the phone and start asking questions. We are of course not saying that you should not talk to people. What we are saying is that there are a lot of advantages if you start research in a way that makes no noise. Once you are further down the path, a great many people will know what you are doing. That is why you need to know whether or not there are open sources – public documents, news reports, and so on – that can serve to verify of elucidate parts of your hypothesis. If so, consult them first. You will have a better understanding of the story before you speak to people, and they will appreciate it. At the Center for Public Integrity in the US, beginning investigators are required to do several weeks of research before they are allowed to call sources. You may not need that much time. But if you’re like us and nearly all the hundreds of people we have taught to investigate, you do need to break the habit of relying on other people for infor- mation that you can find yourself. In the next chapter we will look at how to find and use open sources in detail. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 23chapter 2 22St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts A case study in hypothesis-driven inquiry: The Tragedy of Baby Doe L et’s consider an extended example ofhow hypothesis-based investigationworks. It began when we were told by the boss to investigate a tip from one of his friends. The friend said: “Doctors are killing prematurely-born babies to stop them from growing up with handicaps.” The boss made it clear that if we didn’t get the story, we would lose our job. “Doctors/ are killing/ prematurely-born babies/ to stop them from growing up with /handicaps/.” 1. Isolating the terms, finding open sources What’s wrong with this story? For a start, do you really believe that a bunch of mad doctors, trai- ned in saving lives, have suddenly turned into baby-killers? Did you ever see a doctor wearing a pin that says, “I kill babies as a public service”? Neither did we. Just where do you think you’d find them, assuming they exist? Are you going to call a hospital and ask, “Got any killers there?” Us neither. What’s right with this story, however, is that it contains several terms we can verify: What kind of doctors deliver prematurely-born babies? (If you said “obstetricians”, you’re wrong.) How do you kill a baby in a hospital? How many babies are born prematurely? Is the number rising or falling? What kind of handicaps do they have? Is the number of handicapped children rising or falling? The hardest thing to verify above is how you would kill a baby in a birthing ward. (No, you cannot just call a hospital and ask: “Have you killed any babies lately? How?”) So we put that aside. Instead, we looked for the right medical specialty, which would enable us to peruse the latest medical literature, and we also sought statistics on premature birth and handicaps. They were all freely available at the local library – the archetypal example of an o</span><span data-dcnode-id="6" instrument_node="">pen source. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 24chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 23 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts 2. The first analysis: Does the hypothesis stand up? The next step was to pull the data together a little, to see if they supported our hypothesis. From the national statistics on birth weights for babies, the standard measure of prematu- rity, and scientific studies that gave handicap rates for these children, we discovered a trend curve that looked like this: NUMBER OF PREMATURELY-BORN AND HANDICAPPED BABIES IN THE USA, 1970-1995 1970 1984 1995 In other words, from 1970 to 1984 the number of prematurely-born babies fell sharply. Since prematurity is also associated with handicaps, the number of handicapped kids fell, too. Then from 1984 on, the numbers rose again, inexorably. Does this support or deny our hypothesis? Neither. This data doesn’t tell us whether there are baby killers out there. Maybe the fact that the number of handicapped, prematurely- born kids went up again after 1984 inspired some crazies to stem the tide. We don’t know yet. Nor do we know whether these crazies were at work from 1970-1984, and then decided to stop before they were caught. All we know is that something changed in 1984. 3. Further verification We returned to the library to collect more scientific articles on handicapped, prematu- rely-born kids. One of the articles referred to something called “Baby Doe.” We called the author and asked her what “Baby Doe” meant. She replied: “It’s a law that requires us to make every possible effort to save the lives of prematurely-born babies, regardless of their handicaps or the wishes of the parents.” That single fact could destroy our hypothesis – if, that is, the law was enforced. So we asked if doctors obeyed the law. “We have to,” she said. “There’s a hot line to call the prosecutor in every hospital. If someone thinks you’re not doing your job, you get arrested.” We asked if she knew of places where that happened. Yes, she did. (Later, we obtained reports on enforcement from a Federal agency.) Then we asked when the law had taken effect. You guessed it: 1984. The original hypothesis looks very weak right now. But a new hypothesis is taking shape: “A law passed in 1984 forbade doctors to allow severely handicapped, prematurely-born babies to die a natural death at birth. The result is a new population of the handicapped.” In the following days we documented that population, because we needed to see how big the story might be. First we calculated the additional numbers of prematurely-born babies who survived, thanks to that law, between 1984 and 1995 – that is, babies who would previously have been allowed to die. This was a simple matter of subtracting the figures for premature births in 1983, the last year before the law took effect, from the figures for succeeding years. Then we calculated how many would be born with handicaps, based on scientific studies that correlate prematurity with handicaps. Then we checked with epidemiologists, because we are not doctors or mathematicians, and we could be wrong. More important, we couldn’t believe the numbers we had calcu- lated. It looked like there were at least a xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 25chapter 2 24St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts quarter-million severely handicapped chil- dren – blind, paralyzed, awfully retarded – because of that law. The experts said our numbers looked right. But there was another crucial part of the story, and it required a new hypothesis. Which brings us to a key part of the process. 4.Make new, subsidiary hypotheses to account for different angles of the story. Depth research nearly always turns up new story possibilities that were unknown when the investigation began. They often require new hypotheses that can be verified in turn. If they’re not related to your original investi- gation, you may choose to ignore them for the moment. But sometimes, the new discovery may be more important than what you were seeking in the first place. And other times, the new hypotheses will illuminate your initial hypo- thesis in a startling way. If so, you will lose the opportunity for a major story if you ignore them. In the case at hand, we have powerful sta- tistical evidence that a quarter-million han- dicapped children had been kept alive because of an obscure law. But that raises a question: What happened to those kids? We noticed that the USA had just reformed its social security laws to make it more dif- ficult for people to obtain benefits. The population that receives benefits – poor, and largely non-White – also suffers dispropor- tionately from premature births. So our hypothesis was: “The welfare reform will make it harder to take care of prematurely- born, handicapped children.” Very quickly, we obtained open source verification. There were still plenty of facts to come, but the story we wanted to investigate was in place. We went to see the boss, and said: “Boss, we can’t prove your story. You can fire us if you like. But this is a story we can prove: • A law passed in 1984 forbade doctors to allow severely handicapped, prematurely born babies to die a natural death at birth. • The result was a quarter-million crippled kids, and we cut their social security. • One law forced crippled children to live, and another law threw them on the street. • Do you want to help change those laws, boss?” Remember this: If your boss tells you “no” in a situation like this, it’s time to find another boss. The original hypothesis, which we had shot down, was the boss’s. Bad journalists try to make the facts fit their hypothesis. Good journalists change the hypothesis to fit the facts, whether they like the facts or not. No, he didn’t fire us. We published the story and won two prizes for it (you can find this and other works through our bibliography at the end of this manual). But the laws are still on the books. Do we regret that? Yes. But we’d regret it even more if we never told the story. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 26chapter 2 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 25 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Using hypotheses to manage an investigation Managing means nothing else thanformulating targets and makingsure, through constant checks, that the targets are met. It is standard procedure in every well-run organisation in the world, with the usual exception of journalism. We suggest that once you have defined a hypo- thesis and obtained evidence that it appears valid, you set down the following parameters of the project: 1. Deliverables: What is the minimum that you can commit to delivering, in terms of finished stories? What is the maximum? - We suggest that the minimum be a single original story, based on the initial hypothesis or a different hypothesis discovered through verification. If the hypothesis is of sufficient richness, it can be expanded to a series or a long-form narrative. Do not promise more than you can deliver, and try not to accept less than the project deserves. 2. Process milestones: How much time will you need to consult the first open sources? When will you contact and interview human sources? When will you be ready to begin drafting the story or stories? - We suggest that the reporter and involved colleagues conduct a weekly review of progress. Verification of the hypothesis and discovery of new information are the first concerns, but whether or not the project is on track in terms of time and costs also matters. Delays which threaten the future of the project must not be tolerated. Individuals who do not deliver on commitments should be released from the team. 3. Costs and rewards: Besides your time, which is hardly worthless, there may be travel, lodging, communications and other costs. What are they? Be as complete as you can. - If the reporter is working independently, he or she should consider whether these costs will be justified in terms of additional reve- nues, new knowledge or skills gained, new contacts, prestige or other opportunities. The organisation must consider whether the pro- ject costs can be amortised through increased sales, prestige or reputation. All involved must consider whether the project is justified from a public service perspective. All of these parame- ters are forms of value. 4. Promotion: Who will this story interest? How can this public be made aware of the story? Will this involve additional costs (including your time and the time of others)? What benefits can be gained for you or your organisation through this investment? - It makes absolutely no sense to invest in an investigation that is not promoted by the media which publish it. Moreover, promotion decreases the risks of counter-attack by tar- gets, on condition that the investigation is accurate, because it attracts the attention of potential allies. Promotion can be as simple as a headline, or as complex as using Internet forums to generate “buzz.” We will discuss this more fully in Chapter 8. These processes can be abused. For example, an editor can set unrealistic targets, with the unspoken goal of making a reporter fail. But nearly always, it’s very valuable to replace daily deadlines with some other structure in which there are expectations to be met. When all goes as it should, the hypothesis and its verification will serve as benchmarks for your progress, and as indicators of what must be done next. It is also smart to think beyond the story itself, to how it will be received by the public. Your hypothesis, which gives your story in a few sentences, is the tool that will enable you to interest others. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 27Stay focused on the story Always remember: Every hypothesisset forth by a reporter must beframed as a story that could be true. It contains news, a cause, and a solution. This means that by keeping the hypothesis firmly in view, the reporter is focused on the story, not just the facts. The facts may be the basis of your story, but they don’t tell the story. The story tells the facts. No one can remember three lines from an address book, but everyone remembers a story about every name in their address books. By framing your investigation as a story (that may or may not be true, remember) from the beginning, you don’t just help your eventual readers or viewers to remember it. You also help yourself to remember it. Believe us, that’s the hardest part of investigating – to remember the story as the facts add up. Take the time to become expert at this method. Practice it every time you investigate. It will make you lucky, and it will allow you to repeat your luck. ` And now, let’s see where we can find our open sources – or as we like to call them, “open doors.” 26St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. chapter 2 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 28Using the Open Doors: Backgrounding and deduction BY MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. 3 verification xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 29chapter 3 28St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts Introduction: Take the open door I n a film called “Harper”, actor PaulNewman plays a private detectivewho finds himself facing a door with a kid who wants to prove how tough he is. “Please, please, can I go through the door?” he begs. “Sure,” says the detec- tive. The kid hurls himself into the door and nearly breaks his shoulder. Harper walks over to the door, turns the knob, and opens it. In my experience of teaching and practicing investigation, I see a lot of people who act like that kid, trying to break down barriers that aren’t really closed, or that they can easily bypass. Typically these people suffer from a delusion: They think anything that is not secret is also not worth knowing. So they spend their time trying to get people to tell them secrets. Even people who are very, very good at this (Seymour Hersh and New Zealand’s Nicky Hager come to mind) are obliged to move slowly and carefully on this terrain. Unfortunately, for most of us, it’s hard to tell a secret from a lie. Meanwhile, you’re making a fool of yourself, because usually asking people to tell you something makes them very powerful and makes you very pitiful. Intelligence professionals, whose concerns include living long enough to collect a pension, use a different approach, based on different assumptions: • Most of what we call “secrets” are simply facts that we haven’t paid attention to. • Most of these facts – the usual estimate is about 90% -- are available for our perusal in an “open” source, meaning one that we can freely access. We have often heard that in this or that country, open source information is limited and of poor quality. That may be more or less true. But we have also noticed that there is always more open source information around than journalists are making use of. Getting your hands on it and making stories from it are often easy wins, because the competition usually isn’t doing this work. Instead, they’re begging someone to tell them a secret. An example among many: In the 1980s, a young French reporter named Hervé Liffran from the weekly Canard enchaîné was assigned to cover the city hall of Paris, but discovered that offi- cials were under orders not to speak to him. The only office he could freely enter was the city’s administrative library, where copies of all internal reports and contracts were kept. One of his first scoops was the revelation that the city had signed contracts that were scandalously rich for big water companies, and scanda- lously costly for taxpayers. When people inside the city hall saw that Liffran could not be stopped, they began talking to him. Later, he used freely available voting records to expose election-rigging in the city of Paris, by checking the lists to see if voters whose official addresses were city-owned buildings truly lived there. You get the idea. Any fact that is recorded somewhere, and is open to the public, is yours for the taking. Do not assume that because it is open to the public, this information is old, worthless, already known. Just as often, it may have explosive implications that no one ever considered. Do not just look for specific pieces of information; that’s what amateurs do. Instead, look for types of sources and approaches that you can use again and again. Your ability to use this material will be a crucial factor in your reputation. Never forget: It is always easier to get someone to confirm something you already know or have understood, than to get them to volunteer information you do not possess. We will return to this below, under “open sources are a source of power.” xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 30chapter 3 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 29 St o ry -B as ed In q u ir y : A m an u al fo r in v es ti ga ti v e jo u rn al is ts What kinds of sources are “open”? I n the contemporary world, opensources are practically infinite. Theyinclude: Information that has been published in any freely accessi- ble media. Usually these can be accessed at a public library or through the archives of the media concerned: • News (newspapers, magazines, TV, radio, Internet) • Special interest publications (unions, political parties, trade associations, etc.) • Scholarly publications • Stakeholder media (such as Internet user forums, financial analysts, union newslet- ters or magazines, protest groups, etc.) Examples: - death notices can help you find family members of people you are interested in. - protest groups may be tracking legislation or court cases. - the offices of political parties may provide not only party literature, but newsletters, tracts, and indepen- dent publications from party members, etc. - news clips can serve as ice breakers in interviews; the reporter may ask the source to confirm whether the information in the stories is accurate and go from there. Educational librairies, including public or private universities, medi- cal schools (or teaching hospitals), business schools, etc. These institutions frequently have more up-to-date equipment and deeper resources than public librairies, including news databases like Factiva or Lexis-Nexis or company databases such as Dun &amp; Bradstreet, and highly-trained personnel. See how (not if) you can negotiate access. Example: An investigation of a consumer boycott that the target company said had failed, but which in fact gravely damaged its market capit
