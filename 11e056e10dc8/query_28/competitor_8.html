d anguish. • In short, you will write faster and better. Date Time Researcher Person (Source) Org. Contact Answer Content 01/02/03 13:22 Name First name, last name Name yes Interview done corruption Call again 15.00 email set 13.05 Email answered chapter 5 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 61Writing investigations BY MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. chapter 5 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 60St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Step Four (seeing connections): The lawyer offered access to information suggesting that another group of assailants was involved, but they had never been identified. These assailants appeared to be pagans (in this specific case, worshippers of Norse Gods). We had been keeping another file on the FN’s pagan underground. We now added docu- ments from the skinhead file. Our working hypothesis, based on contacts within the FN, was that the pagans were the FN’s link to the skinheads. Step Five (reviewing and regrouping): We assembled the material from various files, looking for connections between the pagan underground, skinheads, and violent acts involving the FN. The material on hand included interviews with FN officials about skinheads, clips from FN publications, inter- views with pagans from the FN, and other assets. This file became the basis for a chapter in the book detai- ling the assault described above, and using it to expose the connections between the pagan underground, skinheads and the FN. Review: Key principles and tools of the organising process 1 Organise documents, clips, etc. in a way that allows immediate access to specific points. 2 Name, review and file data as it comes in. 3 Create a master file that groups assets and references into a single sequence. 4 Use the organisation process to identify holes in the research and objects of further study. 5 Cross the data in specific files with data from other files through review and regrouping. Making connections across files B y making your documents easierto collect, track and review, youmake it easier for your mind to make connections among the data. You will surely notice that the data generates questions that have not been answered. Thus your archive is telling you what data it needs to be completed. You will also become more sensitive to new data that relates to your hypothesis, and thus you will make unexpected discoveries. An example of the process of making new connections: Step One (initiation): In working on the Front National we observed that they were frequently on trial for various acts, and we hypothesised that judicial activism was central to their strategy. We collected documents related to their - judicial problems, including news clips and court papers. Step Two (diversification): As the number of assets increased, we divided them by type. There were new files for cases involving accusa- tions of electoral fraud, violent crime involving suspec- ted Front members, and so on. Step Three (focus): Because some of the accused in the assault cases were skinheads -- that is, neo-Nazis with shaven skulls -- we hypothesised that despite official denials, the FN maintained some sort of connection to the skinhead movement. We opened a file on skinheads, too. Eventually we noticed a report concerning the trial of two skinheads and a FN municipal council candidate who had attacked a long-haired man with a baseball bat, leaving their victim permanently handicapped. We contacted the victim’s lawyer. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 62writing Writing investigations BY MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. 6 chapter 5 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 63chapter 6chapter 6 62St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts W riting an investigativestory is not the sametask as writing a news story. We’ve already discussed how organising plays a crucial role, because it turns research work into part of the writing process. When it’s time to compose the final story, different skills are required and different creative conventions are involved than in news writing, drawing on the rules of narrative in more complex ways. The reporter must at once use the power of devices associated with fiction, and avoid composing a fiction. Finally, your emotional state enters into the text, consciously or not. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 64chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 63 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts the story matters, and so the reporter has felt it. In short, tell the story in a way that gets attention, and that the facts support. Most writers worry too much about style. Our conviction is that authentic style is per- sonal and a function of character, and that it will emerge naturally over time. Your style should not overcome the material; if it does, the material seems unimportant. Remember that a simple style can easily be made more complicated, but a complicated style is hard to simplify. Do not get caught in your own devices and mannerisms. The key to inves- tigative writing is rhythm, and too much style will slow it down. 2. The peril of doubt Most reporters are treated like lackeys or cretins by their wealthy or powerful sources. That’s one reason why some reporters do not have faith in their own worth. They become journalists so that they may frequent people they believe are more interesting, active and important than themselves. These attitudes are fatal to investigation, and they are more common than you may think. Every year, among the journalists I train are several who find a perfectly good subject, do excellent research, and then betray their own findings. They discover an unpleasant truth, but they allow a well-placed source to explain that it is not the truth, after all. Typically the well-placed source adopts a tone that mixes wisdom and warning, and the reporter unconsciously submits. For example, listen to this famous doctor at the end of an investigation into medically terminated pregnancies: “Sometimes uncer- tainty can lead couples to make choices that are acceptable for some, and less so for others.” The doctor sounds very nice, but he is denying the facts discovered by the reporters, which is that medical personnel, and not couples, were making these life and death decisions. By giving him the last word, the reporters subverted their work. Watch out for those moments of self-doubt. Elements of style 1. Please stop being dull. Most of us have been trained to think that the job of a reporter is to simply present the facts and allow the viewer to draw conclusions. Thus the facts must be uncolored by the reporter’s voice or feelings. Any other approach will not look “serious.” Of course, such a tone can have great effect when used properly and consciously. But it is nonetheless strange to hear that reporters should not allow their passions, personalities and values to appear in their work. To absorb meaning, viewers must also open their senses. In various ways, they must feel the impact of what they are seeing and hearing, or they will not understand it. An investigator who fails to give them this opportunity will fail, period. Yet the investigator must also be objective in a specific way: neutrality and honesty toward all the facts in a given situation. Such neutra- lity does not, and cannot, mean indifference toward the consequences of certain facts, which is what many politicians would love to obtain when they accuse reporters of lacking objectivity. The fundamental purpose of inves- tigative reporting is reform, and the desire to reform the world is inherently individual and subjective. Objective facts – facts whose existence can- not seriously be questioned, regardless of whom observes them – are the means rather than the end of this process. Viewers do not want or need only information. They also require meaning, and someone must create that meaning. Part of the meaning is that chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 65chapter 6chapter 6 64St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts A variation of this mistake is the reporter who launches a savage attack on his or her target, then in the last lines says something like, “Oh, he’s really not so bad after all.” This is an expression of the reporter’s unconscious fear and longing for approval. If you found the truth, tell it. Resist seeking reassurance from sources who simulta- neously congratulate you for your intelligence and take you for a fool. 3. Be cruel, not nasty The stress of conducting and concluding an investigation can lead to fatigue, frustration and anger. All of these contribute to the danger that the reporter will adopt an insul- ting, aggressive tone. It’s a defense mecha- nism, but it signals weakness to the viewer and the target, and bad faith if you go on trial for defamation. Don’t pollute serious accusations with petty insults. You will pay for it dearly. Be sure to reread your drafts for signs of gratuitous nastiness, and cut them. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 66chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 65 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Backgrounding your style: Using models N early every problem in narrativeart has already been faced andsolved by someone of genius, and even the geniuses adopted certain tech- niques and resources from someone else. (Shakespeare, for example, borrowed plots from other playwrights or historians.) You can do the same, whether or not you’re a genius. Looking for such models should be part of your research, on the same level as seeking information. When you undertake a specific project, identify narrative artists who have dealt with similar issues in their work, and study them for the elements that most concern you. This is particularly important when dealing with longer narratives. You will simply not have time to manage the information and invent all of the narrative devices you require. For example, the exposition of judicial pro- cedures is a major task for investigators, because such processes are the conduits for a great deal of harm. The problem of how to make them interesting is eternal, and no one solved it better than Balzac in Splendors and Miseries of the Courtisans. Another recurrent problem for investigators is how to deal with large casts of characters, because unlike the writer of fiction, the reporter cannot simply kill off distracting personages for the sake of narrative simplicity. The English novelist Anthony Trollope developed a scene-by- scene narrative structure that solves this issue, by breaking his casts of characters into smaller units. Roman historians like Tacitus and Suetonius respectively developed the nonfiction action narrative and the political portrait to high levels. The filmmaker King Vidor experimented assiduously with the use of rhythmic devices in acting, filming and editing. Whichever tradition is most familiar to you, use it. Study your art, not just your craft. Take what you need, and be sure to give credit for what you take. chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 67chapter 6chapter 6 66St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Defining the narrative structure: Chronology or odyssey? I nvestigations overwhelm the typicalstructure of a news story, which sim-ply gives us the famous “five W’s” – who, what, when, where and why. An investigation includes those elements, but in a much deeper, wider form. An investigation involves characters who have motivations, physical traits, perso- nal histories, and other traits beyond a title and an opinion. It takes place in locations that have specific characters and histories of their own. It shows us a past in which the story began, a present in which it is revealed, and a future that will result from the revelation. In short, it is a rich narrative. If you want it to work, you must structure it. There are two primary ways of structuring a rich narrative: • In a chronological structure, events are ordered by time, with each successive action altering the possibilities for those that follow. • In a picaresque structure, events are ordered by place, as actors move across the landscape. Each section can stand on its own, because it covers all the needed ele- ments to create a coherent mini-narrative. For the classic examples of these structures, the best example we know is the Greek poet Homer. The Iliad, his account of the Trojan War, proceeds chronologically through events. In The Odyssey, the sequence of events in time is less important than the story’s move- ment through successive places, each of which decisively influences action. One of these two forms is right for your story. The choice should be made according to the material. Some stories convey the implaca- ble unfolding of destiny, and these stories must be told chronologically. Others convey the sense of a world filled with surprising places, and in these places are powers we previously ignored. A picaresque structure works best here. For example, we used a picaresque structure in covering the Front National, because it is a heterogeneous move- ment with strong local roots. If the FN had turned out to be the centralised bulldozer of a movement depicted by some of its enemies, a chronological portrait of its development would have been more appropriate. Each form has specific advantages. The picaresque structure allows you to suggest the scope and scale of a given situation more easily than a chronology would do. But a chronology is usually far superior as a means of finding the roots of a given situation. Avoid trying to fit your material into a pre- conceived structure, just because it feels more “natural” to you that way. In this as in other ways, Michael Moore is an interesting example. His natural form is picaresque, and his typical narrative shows a sardonic stranger (Moore himself) riding through a weird land. In most of his films, it works brilliantly. It does not work in “Fahrenheit 911”, in part because the film attempts to penetrate the relationship between the Bush family and the Saudis, a friendship that could only develop over time. Let the material tell you if it is a journey in time, or in space. When you’ve made that decision, you – or more exactly, you and your computer – can start shaping the outline. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 68chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 67 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Building and bending the chronology A ccording to Aristotle in The Poetics,narratives have a beginning, middleand end. That’s very useful to know, but it doesn’t resolve key problems of journalistic narratives. First, we usually don’t know what the end of a story might be, even when we’re ready to write it. For example, we may have found a murderer, but we’re not the ones who decide whether he or she is going to jail. Moreover, we are working for a public whose first concern, and expectation, is that we will tell them something that matters to them right now. In other words, they are less concer- ned by where the story began than by its latest developments. Thus in an investigative narrative, we often begin where we are now (the present moment), go back to show how we got here (the past of the story), bring the story back to the present (to allow the reader to absorb the story), then say where it is going next (the possible future resolution). This structure – present, past, future – replies to three key questions that any viewer will want answered by the reporter: • Why should I care about this story? • How did this terrible or wonderful event come about? • Will it ever be over? How? The facts that this is the most common nar- rative structure used in long-form journalism, and that it is very effective in most situations, in no way oblige you to use it. In fact, the chronological principle is so powerful that when used properly, it can be reconfigured anyway you choose. For example, we wrote a feature about a murder case that began with the future: the parents of the victim would be hounded to trial for a crime they did not commit. The story then went into the past of the case, showing how the police had fed the press appallingly speculative infor- mation. It concluded with the present, a denunciation of this trial by opinion. Conversely, you could begin a story where it began, in the past, and proceed straight through to the question: “How can this end?” But in most cases, the core of your story will be the answer to the question: “How did this come about?” There are two major things to keep in mind when you set the chronological order of the material in your outline. • First, start with the moment that will hook the viewer – the most powerful scene you have. It could be someone who is suffering in the present moment. It could be the moment in the past when something changed forever. It could be an unbearable future that is coming our way. Whatever it is, it must lead the viewer to ask: “How did this happen?” • Second, please do not subject the viewer to repeated back and forth motion in time. If you were driving a car and you did that to your passengers, they would get sick. So will your viewer. If you take the viewer into the past, stay there long enough to say what happened, then come back to the present. Do not leap from 2008 to 1995, then to 2006, then to 1982… keep the chronological motion as direct and simple as possible. The exception to this rule requires a picaresque structure: The narrator of a picaresque story may hear of the same events from several different people, at different times and places. Keep that in mind when you choose your overall structure. chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 69chapter 6chapter 6 68St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Using the master file R emember the master file – theone that has all your documentextracts, portraits, ideas, and notes in it? It’s about to make you very glad you put it together. That’s especially true if, like us, you dislike trying to make an outline before you write. 1. Outlining with the master file • First, open the master file and read it through. • Then, save a version for editing. • Now, read it through again. This time, cut material that you will not use. • Read it through yet again. This time, cut and paste the material into the order in which you think it should be used, on a chronological or picaresque basis. • Repeat the above two steps until you feel you have the material you like best, ordered for use. Congratulations. You just wrote your preliminary outline. Now you can “write through” the file, turning notes and data into text. Simply scroll down the page of the file and rewrite as you go. Don’t forget to cut and paste document refe- rences into footnotes. Later on, this will make fact-checking and legal review far simpler. 2. Scene by scene construction with the master file Another approach, if you prefer picaresque construction, is to write headings for the scenes you know you will use. Make absolu- tely sure that: • Each scene makes a key point that advances your story. • The transitions between scenes – the rea- sons we are going from one place to another – are evident. Then, cut and paste the material appro- priate to each scene from the master file. Confirm that you know: what the place is like, who was there, what they did, what they said (dialogue), and how you know it. These are the elements you need to build a scene. In the following passage from a true crime investigation, two witnesses to the crime alert their superior. Notice how details are used to give authority to their accusations by authenticating a key document: “They entered the office of their boss, Hubert Landais, and handed him the Christie's cata- logue. The company was selling a smuggled painting by Murillo, they said…. Landais asked: ‘Do you have proof that the picture was in France recently?’ Laclotte opened his file and took out a sheet of paper, typed over by a worn machine. It was a report on the Murillo, compiled in the Louvre's own labora- tory, signed by the lab's former Chief Curator, Magdeleine Hours, and dated April 17, 1975.” If you don’t have detailed material to build each scene, or the scenes do not follow natu- rally, you’re not ready to write. In the first case you need more reporting, and in the other you need a better understanding of your story. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 70chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 69 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts 3. The story &gt; the facts The classic compositional error of investiga- tors is to bury us in facts. This error comes about either because the reporter cannot manage the sheer quantity of material he or she has accumulated, or because the repor- ter wants to impress the viewer with every- thing he or she has discovered. There are two major techniques to resolve this issue. • Think of facts as details, not just as information. We tend to think we can’t have enough information. However, we can easily have too many details. Details should add essential color and meaning to your story. So present only the details that command attention (“the house was burning”), or that provide deep insight. For example, the way an official’s office is decorated, the objects with which he or she is surrounded, can quickly tell the viewer what that person considers important. Our colleague Nils Hanson calls these details “nuggets” – glittering morcels of precious metal that shine out from the stream of the story. • For each new fact, change the scene. This means that a new source, or a new place, or a new time must be shown. These elements become vehicles for the facts. Remember: The facts do not tell the story. The story tells the facts. If the story bogs down under the weight of the facts, the reporter will fail. Do not use a fact that does not illuminate the meaning of your story, no matter how interesting it otherwise appears to you. chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 71chapter 6chapter 6 70St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Specific compositional techniques 1. The “nut graf”, or what to do with your hypothesis. At some point near the top of your story, you must compose a paragraph that tells us the essence, core or nut of the story (and by extension, why we are viewing it). If you have defined and verified a hypothesis, most times it will serve as the nut. If you do not have the paragraph, viewers may not understand where you are taking them and why. Here is an example of a “nut graf” from an award-winning story: “In 1992, a Socialist government sought to discourage politicians from holding several offices at once - a peculiar French twist on electoral democracy - by capping their salaries. But they forgot to define what would happen to the excess revenues the ‘pols’ couldn't collect. Our investigation shows that in the following decade, $45 million was quietly transferred from the state to the pockets of pols on the Left and Right alike.” Keep the nut down to a few short sentences. If you can’t say what the story is about in that space, you don’t understand it yourself. 2. The Face of Injustice: Personification One of the oldest techniques in literature is to personify a situation through a given cha- racter. This technique is probably over-used in journalism, but it remains valid, both for viewers and for reporters who are trying to sense the emotional foundation of a story. Showing the viewer a victim can be a power- ful way to get at the sense of a story quickly. A variation on this technique is to open a passage or a story with the description of a place. The technique is cinematic: We love through the environment to the core of the action. The technique does not work unless the setting has character, and unless you tell us the significance of the different traits of the setting. If you use personification, make sure of the following: • Your example really fits the story. Do not show us a dramatic case and then tell us that the story is about something else. • Use each example once, and well. Do not keep returning over and over to the same case, unless your story is about that one case. Consider the following award-winning example, in which a mother tells us what her daughter endured, so we can see the tragedy behind her – a law that should never have been written. ‘“There were times when Carol Castellano won- dered if her daughter would be better off dead. ‘Born in 1984 after only 23 weeks in the womb, Serena Castellano is one of more than a quarter of a million disabled children who owe their lives to ink: The Baby Doe legisla- tion of 1982-84, which made it a crime for doctors to do less than the maximum to keep even the least tenable prematurely-born infants alive. But the government that snat- ched these babies back from death left them crippled – then abandoned them and their families. ‘Like so many others in this virtually unnoti- ced, unreported population, Serena Castellano would not have survived the delivery room only years earlier. Born blind, brain damage xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 72chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 71 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts suffering? Unconsciously, the reporter is avoiding the sight of pain. But the viewer will see a reporter who considers himself or herself more important than the victim. If someone has suffered for your story, show them, not yourself. If you do step in front, stay beside the victims. A classic role of investigation is to defend those who cannot defend themselves. This was the role of Zola in J’accuse!, of Norbert Zongo in Burkina Faso, and of others too numerous to mention. If you play this role, you are justified in showing your character and presence. But be careful. There is little glory in building your own reputation if you do not help to save the victim’s. 4. Let the sources speak A huge amount of time is wasted in journa- lism by trying to say something that a source has already said perfectly well. It’s regrettable, because people who lived a story tell it best, with the most expression and passion. Why try to write a perfect sentence when they’ve already done it for you? The best method is to weave sources’ state- ments into your own texts as if you had written them, allowing them to advance your story. In this example, we let the spo- kesperson for a hospital express the ruin and horror of the Baby Doe laws with intimate knowledge: “Last year, doctors at Cedars Sinai Hospital in Los Angeles saved a newborn who weighed just 13 oz. Six months and $1 million in medical bills later, the infant was discharged. He died two weeks later. ‘The family were lucky - they had indemnity insurance," said Charlie Lahaie, a spokesperson for Cedars Sinai. ‘Can you imagine paying a $1 million bill and your baby’s not even alive?’” In the passage below, we quoted a Front national official at length, using an audio recording we made as source material. (We do not like recording in general, because transcribing is slow. But in this case we prevented her from speaking or chewing, and pulmonary and abdominal abnormalities required six operations in her first eight months – not one with anesthesia. "If I'd had some way of knowing what [extre- mely premature] babies endure, I wouldn't have wanted my baby to go through that," said Carol Castellano, president and co-foun- der of New Jersey Parents of Blind Children. "I adore my daughter. I'd never wish her away. But if I were in premature labor, I wouldn't go to a hospital. I'd stay home and let nature take its course."’ Note the following in this passage: • The sight of Carol Castellano pondering her daughter’s fate poses a question for the viewer: Why would any mother wish her child were dead? • This allows us to go straight to the nut paragraph and tell the reader why we are telling this story. • In the third paragraph, we show viewers some truly awful details.</span><span data-dcnode-id="4" instrument_node=""> Be careful: Viewers cannot absorb too much pain. Thus when we cut to Carol Castellano, calmly telling us what she learned, we give the viewer the benefit of her hard-earned wisdom, but we also give the viewer relief from contempla- ting a child who has suffered terribly. 3. Beware of putting yourself in front of the victim. When writing about or filming victims, reporters may figuratively or literally step in front, forcing the reader to watch their outrage or sorrow instead of the victim’s pain. It’s easy to make this mistake. In an investigation into abortions in France, some of my students showed a woman whose abortion was a nightmare, then insisted: “She and her husband would live a trauma- tizing experience…. Shock gave way to incomprehension for the young couple.” Notice how the reporter’s interpretation is suddenly more present than the victim’s chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 73chapter 6chapter 6 72St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts a. The three criteria of editing Editing should serve to make your work more limpid, and more rhythmic. These criteria help you see those qualities: The edited story should meet three basic criteria: • Is it coherent? That is, do all the details fit together? Have all contradictions that emerged in the evidence been resolved? • Is it complete? Have all questions raised by the story been answered? Are the sources for each fact that is cited appropriate? • Does it move? If the story slows down or doubles back on itself, you lose the viewer. The best way to see if these criteria have been met is to examine the story for moments of incomprehension, when the viewer may won- der what you are talking about. The most common causes of narrative fog, and quick cures, are as follows: • The passage is written from an inside pers- pective, using technical or bureaucratic jargon. It needs to be more basic, less expert. • The sentences are too long. Cut long sentences into pieces. But be careful: Too many sentences have the same slowing effect as very long sentences. • The paragraphs are too long. When a person, place or idea changes, so should the paragraph. b. A good story is like a train. It moves powerfully toward its destination. It may slow down to take on more passen- gers, or to allow you to focus on a particu- larly great piece of scenery, but it must not stop. So when you write and edit, focus on the rhythm of the story. The viewer must feel carried from one passage to the next. If this isn’t happening, the story isn’t working. Do not change the entire structure. Identify the passages where there is a problem, and cut or add material to make them more effective. made an exception, because the FN loves to sue for defamation, and a recording is evi- dence that they were accurately quoted.) The informational value of the passage is practi- cally zero; the man is talking nonsense. But the mentality of the man matters, and we couldn’t get it without using the whole pas- sage. When the book was published, this was the first excerpt taken by a magazine. "There are, in this government and its back alleys, people who should be in prison for pe- do-phi-lia. You hear me? You hear me? You can say Roger Holeindre told you that! You can give the hour! It's a quarter to five, I think! YOU HEAR ME? Well, I was saying the other night, ‘We should hang all this scum,’ and a lady in the room said, 'Ah, Mr. Holeindre, that isn't nice, why do you want to hang them?' And I replied: 'Yes, Madame, do you know what it is, pedophilia?' 'Ah, no, I don't know.' 'Well, it's men who profit from their positions... TO RAPE LITTLE CHILDREN OF THREE, FOUR OR FIVE YEARS OF AGE!' 'Oh, we have to hang them!' 'You said it, Madame!'" Remember: People are not just listening to you for the facts. They want to know the character, the tone, the color of the sources you will present to them. Dialogue is the single best vehicle to convey those elements. Edit it for length and impact, but use as much as you need. 5. Basic editing In journalism, editing is the art of making a story better than it was. At a minimum, a good outside editor should be able to suggest material that enriches your story, and tactfully suggest ways in which the writing can be improved. But before anyone else gets involved, editing should be a continual process. Get in the habit of sculpting your text every time you open it, sharpening terms and phrases. Be sure to save the latest version under a different file name (for example, including the date or version number) so that you do not continually lose or misplace material. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 74chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 73 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts faced, for the sake of publishing the story – or sometimes, because the condensed or edited version has more impact than the original, and reads or views better. (There is a lot of fat in most media.) A second solution is to propose alternatives to simple cutting. There are several publication strategies in the history of journalism that can increase the impact of a long story, as well as the benefits for the public and the media: • Serialisation: Write or edit it as a series. Instead of one long story, write several shorter ones. It will be easier for the media to publish. It will also be easier and more powerful to promote, because each installment of the series will call attention to the others. The media may also reprint the series as a whole. • Leveraging: Spread the story across different media. A newspaper may have room for only a short version of the story. But a web site may be able to accept a longer version. Make sure that you keep the rights to different versions of your story, and that you distribute it as widely as possible among different media. • Branding: Establish pre-eminence through regular appearances. How much space do you really need? A great many investigative stories are over-written, and too long. Very often, they contain material for more than one story, on different aspects of the initial hypothesis. Rather than publish a single blockbuster story, consider publishing related stories regularly – at greater intervals than a series, but not so great that the public forgets the issue and your expertise. This is one way of building your brand as a journalist, and of building the media’s brand. 6. The temptation of the ending Narrative art requires a satisfying closure – but unfortunately, journalists do not have the right to invent one. Instead of endings, we c. Rewrite only when necessary. If the techniques evoked above do not assure a story that is complete and coherent and that moves at a strong rhythm, you have to rewrite – not just change a word or two, but restructure and recompose. Try to identify passages that work, and avoid tou- ching them. Instead, focus on points where something goes wrong in the story. Most often, the passages that don’t work need to be more compact. Choose the strongest ele- ments you want to communicate, and com- pose around them, leaving the rest aside. d. Three ways to solve 95% of writing problems: Cut, cut and cut. The easiest and usually the best way to edit a problematic passage is to cut it. If you attempt to rewrite a passage more than three times, it is probably a waste of time to continue, and you should move on. There is a passage in Hemingway’s novel, For Whom the Bell Tolls, that he rewrote over 60 times. It still doesn’t sound right. If Hemingway couldn’t make it work, neither could you. So cut. e. Let obstacles in the text give you feedback If a passage can’t be made to work, either you do not understand what you are trying to say, or it is not worth saying. Usually, it’s the latter. But if it’s too important to cut, take the time to think about what you are really trying to say. This is the true work of writing, and it is in these moments that your story gets deeper and stronger. f. How Long Should You Go? Thirty years ago, it was common for magazines in the US to publish stories up to 7000 words. Now, magazines and newspapers rarely publish stories, even investigations, over 2500 words. Likewise, the market for video or film investigations now requires shorter formats. One solution to this situation is to accept the space limitations with which you are chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 75Quality Control: Techniques and Ethics BY NILS HANSON, MARK LEE HUNTER, PIA THORDSEN AND DREW SULLIVAN The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. chapter 6 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 74St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts taged by the author in the last lines, because the author does not want to hear what the story is saying, or because the author is unconsciously afraid to say it. We’ll repeat the two most common cases: The sabotage can be done by the author saying something like, “Well, maybe our tar- get isn’t such a bad person after all.” That’s your fear talking; you want the target to for- give you. (As the great psychoanalyst Erich Fromm said, some people admired Hitler because it’s less humiliating to admire such a man than to admit that he terrifies you.) Or your self-doubt may speak when you quote a Very Wise and Respected Person who says, “Life is full or problems, but we of good will and high social standing are solving them all for you.” Unfortunately, you just wrote a whole story that said otherwise. Accept the truth of what you have found. It’s harder than you think, and it’s what makes your work great. If your work has given you the right to make a judgment at the end, make it. Keep it measured, keep it fair, keep within the limits of what you know is absolutely true. But don’t deny what you’ve proven is true, either. must compose closers. The difference is signi- ficant. An ending resolves all the mysteries of a narrative. A closer simply marks the spot where the narrative stops moving forward. On the one hand, you must be careful to resist the temptation to give your story a final reso- lution when it doesn’t have one. On the other hand, you must suggest what such a resolu- tion could be like. It doesn’t have to be long. Albert Londres’s brilliant exposé of France’s penal colony in Guyane closed with the words: “I’ve finished. The government must start.” Let the reader know if anyone has an idea about what must be done. You can expose your own ideas, because if you’ve done the investigation properly, you’re now one of the experts on the subject. You may evoke those who’ve solved similar problems, and point to those who have responsibility for solving it now. A trick that often works is to allow a source, someone who lived the story, to give the last word. Another is to consciously collect moments that can serve as your ending, when you research the story. Here is an award-winning example, which we seized while investiga- ting France’s contaminated blood scandal. It is composed of a source statement combi- ned with a description of the place where it happened, a brutal, ironic thought that occurred to us as we took notes (“the victims used to have children of their own”), and a final outraged judgment: “Should doctors be better than the rest of us? Why blame this one, for example? Asked during the trial why he didn’t simply resign and denounce what was going on, he said, ‘I have children to support.’ Behind him was a courtroom full of people who used to have chil- dren of their own. Their sons are dead now, because men like this – and others, whose names we may never know – betrayed them.” Whether you speak yourself, or someone speaks for you, be sure that the last word is a true word. A lot of investigations are sabo- xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 76control Quality Control: Techniques and Ethics BY NILS HANSON, MARK LEE HUNTER, PIA THORDSEN AND DREW SULLIVAN The process so far: We discover a subject. We create a hypothesis to to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. 7 chapter 6 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 77chapter 7chapter 7 76St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts What is fact-checking? A round the world, top investigativeteams include someone – an editor,or even a full-time fact checker – whose job is to guide the process of making sure an investigation was perfectly exe- cuted and composed. There are four main components involved: • The first is making sure that you are, in fact, telling a true story – not just a story in which each fact is true, but one in which the facts add up to a larger truth. If an alternative explanation makes more sense than yours, something is wrong. • Then, you confirm that you know the source or sources for every factual assertion in the story. • In the process of verifying your sources, you identify and correct mistakes in the facts as stated. • At the same time, you remove emotional noise from your story – gratuitous bits of insult, aggression or hostility that made their way into your narrative when you were tired or frustrated or scared. Repeat: You have to get the story right, you have to cut or change the facts that aren’t right, and you must make sure the tone of your story is justified. Our friend Ariel Hart, a top fact-checker at the Columbia Journalism Review, said this: “I have never checked a story that had no mistakes, whether five pages long or two paragraphs.” She added: You’ve researched thestory, organised andwritten it. Bravo, and now let’s make sure we did it right before it gets into the public domain. This involves quality control, or in technical terms, “fact-checking.” xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 78chapter 7 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 77 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts • The fact-checker challenges in particular the author’s interpretation of the target’s motives, goals or thoughts. In general, this material should be cut. However, if there is documentation to establish its reality – for example, letters or diaries that document an individual’s state of mind at a given moment – it can be included. As you can see, this process is not complicated. It may seem a little tedious as described. Believe us, it is anything but tedious, because as the process goes on, the story becomes more and more real, and its impact becomes palpable. Going through the pro- cess is also a lot less tedious than trying to defend yourself, in a courtroom or any other space, against a charge that you didn’t know what you were talking about. “In fairness, some of the ‘mistakes’ I find are matters of interpretation, and authors usually agree to change them. Virtually all articles, though, contain errors on objective matters of fact: a year slightly off; old data; misspellings; widely reported information taken from secondary sources, but wrong. And of course, ‘facts’ pulled from the writer's mental archives. Errors often turn up when the author says, ‘You don't need to check that, I know that's right.’” You will make mistakes. Everyone does. Sometimes it’s the way you say something, and sometimes it’s the substance of what you’re saying. Either way, it’s a problem. Smart people correct these problems, and amateurs hope that no one will notice them. Unfortunately, someone always does, and it’s usually someone who is not your friend. If you’re not willing to acknowledge and cor- rect your mistakes, and to be nice about doing it, change your attitude or change your profession. It’s highly possible that no one in your shop has ever fact-checked a story before, and that no one ever fact-checked one of your stories in particular. So here’s how it works: • You need at least two people – the author, and whoever is checking the story. Each has a copy of the story. • View the entire story to get the overall picture. Is it biased, or fair? Does it feel as if something is missing? Who, or what, might be able to present a different picture? • Then go through the story fact by fact, line by line. The checker – an editor, a colleague, a lawyer, or just a competent friend – asks of every fact: “How do you know that?” • The author gives a source. If the source is a document, both parties look at the document to make sure it is quoted accurately. If the source is an interview, they look at the interview notes, or listen to the recordings or tapes. • If there is no source, the author has to find one. If no source can be found, the passage must be cut. chapter 7 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 79chapter 7chapter 7 78St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Checking your ethics Don’t misuse the power of insults Taking gratuitous hostility or aggression out of your story should be common sense: Leaving in such noise increases your legal risks, and can infuriate or humiliate your target to the point where he or she reacts violently. Of course, journalists often mock or insult their targets. It’s one thing to do so in an editorial; an editorial, after all, is an opinion, and everyone has an opinion. But the effect is far more brutal when it is cou- pled with investigative revelations. Reporters should be very, very careful about misusing this power. If an investigation leads to substantial charges against someone, it is generally not necessary to add personal insult to the recipe. In most cases we’ve seen, reporters become injurious when they are tired or frightened. Fatigue generates the fight or flight syndrome associated with the physiology of stress; so does aggression, real or imagined, on the part of the target or yourself. Do not be naïve about whether or not this can happen to you: It can, and it will. Be alert to this danger. Make sure that what you put in the story results from conscious choices. Give the target the right to reply Never, ever, ever attack someone in a story without offering them the chance to reply to your evidence. Perhaps they will offer you an absurd explanation. Quote it. Perhaps they will refuse all commentary. Tell the viewer that they chose not to reply, without suggesting that this is culpable. No one is required to speak to journalists, and refusing to do so is not a sign of guilt. (Conversely, do not assume that because someone wants to speak with you, they are fundamentally honest and good.) We urge you to contact hostile sources, or targets, early and often in an investigation, unless you have reason (beyond your fear) to think that you will be in danger as a result. The most important reason for this strategy is that often, when the target explains his or her point of view, a hypothesis will suddenly look completely wrong. This has happened to us, and sometimes weeks or months of work has been wasted. A procedure for respecting your sources At SVT television in Sweden, investigative unit chief Nils Hanson asks his reporters to use the following procedure to make sure cri- ticisms are justified: • First, review the story and mark any and all criticism of a person, organisation or company. • Has the criticised party been informed of all the criticism? If not, do it, unless you have a very powerful reason (such as, you will be arrested or murdered) not to. • Has the criticised party responded to all the criticism? If not, something is wrong. This material should have been collected earlier. • Has the reporter documented his/her efforts to obtain an answer/response? Again, collect this material as you go along. • Has the criticised party been given a reaso- nable amount of time to respond? The more complicated your question, the more time the other party may be entitled to. • Is it the right person who is responding to the criticism? You would be amazed how often a reporter settles for talking to a secretary or janitor who happens to answer the phone, but has no idea what the reporter is asking about. • Has the criticised party been given the chance to put forward his best/her best xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 80chapter 7 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 79 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts case? If not, you are treading on his or her rights, and just as important, you may be missing an important part of the story. • Have we met any reasonable demands from the party interviewed to be informed in advance of how his/her statement will be reproduced? It is reasonable for a source to ask that he or she be informed of any quotes that will be used in the story, and be allowed to correct them for accuracy (but not to remove an admission or information). It is not reasonable for a source to ask to see your whole story. Never give a source this right, except in the very rare case where the story is centered on that source, and the subject is so technically complex that the source is legiti- mately worried you will get it wrong without his or her direct involvement. (This applies, for example, to certain scientific subjects.) A procedure for dangerous sources Drew Sullivan, who has done extraordinary work covering organised crime in Eastern Europe, has compiled a list of procedures to follow when speaking with gangsters. They make equally good sense for contacts with hostile sources in any investigation: • Talk on the phone or meet in a public location; • Do not give them personal information (like the name or profession of your girlfriend, your home town, etc.); • Be professional. Do not get personal, friendly, cute, flirty, funny or macho. Do not show fear; • Make sure you give them a means to contact you for comments after you publish (but never, ever, your personal address!). • Have a backup. Get a second reporter to observe the meeting, and have numbers you can call wih a signal if there’s trouble. Of all the above, the most important, in our view, is not to show fear. Fear indicates to other actors that you are not certain of what you are doing, or that you lack confidence in yourself. It also signals that you are dange- rous, because frightened animals or people become unpredictable: They may just as easily attack as flee. Fear, of course, is natural when you are in the presence of dangerous creatures. We’ll say it again: One way to deal with it is to consider the sensation as a phenomenon that you may notate for further analysis. This objectifies your emotion and enables you to take a certain distance from it. The transparent approach An approach similar to Sullivan’s, but even more transparent and proactive, has been suggested by Pulitzer Prize-winner Deborah Nelson. At every stage in her investigations, she advises each new actor in the story in turn of what she is doing and what she is finding, and asks for comment on every dis- covery in turn. She used this approach to tell the story of a policeman who had left a trail of destruction throughout his career. Because she contacted him for comment on every point, when she read him the final report before publication he said, “That’s a great story. That’s just how I feel.” Some readers of this manual will object that it is impossible to deal in a straightforward, honest manner with authorities or other powerful targets in their countries, let alone criminals. “How can we call to confirm quotes before publication? The sources will deny ever saying anything! Or they will sup- press the story before it is published!” You will know the situation in your territory better than we do. However, in our experience, journalists have more influence over such situations than they may be aware of. In particular, if you behave as though you have the right and the power to work in a transparent way, many of your sources will believe it. Likewise, if you behave as though you were brave, your fears will be less noticeable to others. Whatever approach you choose, make sure you feel confident that it is the right one, after thinking it through. Your sources will be aware of this confidence, or its lack. chapter 7 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 81chapter 7chapter 7 80St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Using the Master File in fact-checking I n Chapter 5, we saw how setting up amaster file, or a suite of files cove-ring different aspects of the investi- gation, can help you organise your data and keep track of it. That work is about to make you very popular with lawyers and fact-checkers. If you have assembled the master file pro- perly, you should have a source in it for every fact in your story. You do not need to include all your sources in the story. However, you can, and in sensitive cases must, put your source documentation in an order that makes checking easier. The master file, if you have done it properly, will tell you where the material is, because you will have noted the source for every fact in the file. Make a new copy of every docu- ment you use, and put the documents in a stack in the order of use. This is essential for the fact-checker, but also for yourself. You will find your materials faster than if you searched through your master file, because there will always be documents you do not cite in the story. Don’t laugh, but the easiest way to get through this process that we know of is to prepare a footnoted version of the story, with the sources listed in the footnotes. It takes a little bit of time to do this, but everyone saves time and anguish in the end. That makes footnoting well worth the trouble on stories where you expect the targets to push back. If you use this technique, do not just copy and paste source descriptions from your master file to the footnotes. It’s much smar- ter to take a moment, each time you cite a source, to check what you’re writing against that source. Make sure you didn’t para- phrase, summarise or quote incorrectly. It happens all the time, and if someone com- plains about the story, these little mistakes will make you look careless. There are a few tricks that make footnoting and documenting less cumbersome. If the source is on an Internet page, you can enter the URL into a footnote. (It is advisable to download Internet pages you may need as documentary evidence before the story is published, because it is very easy to change a website, and if that happens, you can lose your proof. (The International Herald Tribune wisely downloaded an entire web- site dedicated to the target of an investiga- tion before it was published; the day the story came out, the website was taken down.) You can also upload documents to a web page and send a link to the fact- checker, or burn them to a CD. Make sure that any electronic media you use are secure. One of our friends was building a great story about a multinational company, and using a website as a document storage center. One of his reporters joined another organisation, and they looted the website. Don’t let that happen to you. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 82chapter 7 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 81 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Predictable psychological effects of fact-checking T he fact-checking process is going toaffect everyone involved, and theonly question is how. The effects can be contradictory, but they will not can- cel out on their own. First, going through your data to verify your assertions will revive the emotions you felt when you collected the data. If you were angry or frightened or depressed at the time, you will get an echo of that feeling. More sur- prisingly, you may feel pity for the targets of your inquiry; what’s behind that particular feeling is usually fear. It is wise to notate these feelings. As during the reporting process, transcribing emotions will make them into material that you can manipu- late and control. Sometimes what you write at moments like these can be used in the story. You will almost certainly feel or be made to feel, at some point in the process, that you have misunderstood something. This instinc- tive anxiety can be due to several causes, not all of them valid. It is indeed possible that you have made a mistake of substance; the best solution here is to verify your work on this point again. However, it is also possible that you have indeed discovered the truth, but you find it so distasteful, or its implications are so frighte- ning, that you would prefer not to believe it. (When Anne-Marie Casteret discovered that high functionaries of the French State were sel- ling AIDS-contaminated blood products, she briefly wondered if she had become insane.) Again, the best solution is to take another close look at your data. If the data shows that the world is a sadder, uglier place than you ever thought was possible, you can take comfort from the fact that your story may change it. If you made a mistake, admit it as soon as possible – ideally, when you have understood why the mistake occurred. That knowledge can help you to find other errors. Please note: Many mistakes occur because the mind will naturally seek to fill holes in the story with speculation. (One of Columbo’s key techniques is to invite suspects to do exactly that.) It is quite possible that your mind played this trick when you composed your investigation. It happens when you say to yourself, “I don’t know exactly what happe- ned, but it must have been like this.” Usually, what really happened is more interesting. Either tell the reader that you are specula- ting, or acknowledge what you do not know. If you don’t know something, you cannot be mis- taken in saying so, and you will reinforce the authority of what you do know. Finally, the author and fact-checker are going to get annoyed with each other. They are doing high-pressure work with high stakes, and usually that does not make people nicer. This has serious implications, and its causes and cures must be taken seriously too. The author may feel that every challenge to his or her facts and interpretations is a betrayal. On another level, the author may more or less consciously sense that his first audience, the fact-checker, either cannot or refuses to believe the story. Or, the author may be so invested in the story that every fact is carved into his or her flesh. These emotions can be exposed and addressed directly. And, the fact-checker may be worried that the reporter has done a sloppy job, or is too dri- ven by his or her emotions, and is unwilling to improve the work. chapter 7 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 83Publish it! BY MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. chapter 7 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 82St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts This conflict is inevitable, but it will be far worse if both parties are not committed to making the story the best it can possibly be. If either or both of them, for reasons of ego, fear or personal animosity, cannot trust each other to pursue that goal, they should not be working together. It is thus essential that at the start of an investigative project, the reporter knows who will be fact-checking the story, and how they will work together. Do not leave this rela- tionship until the last minute. If it goes wrong, the project can be wasted. xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 84Publish it! BY MARK LEE HUNTER The process so far: We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 8 chapter 7 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 85You’ve spent considerable time and energy definingan important story and proving it. Now you’re goingto publish it in a way that makes as much noise as possible. Why? So that something that should not continue will end, or change. In the process, you may have to defend your work in the sphere of public opinion (we have already discussed how to prepare for defending your work in the courts). Whether you defend it or not, you must promote it. Why? Because the isolated reporter is always going to lose. At best, he or she will be ignored, and remain ineffective. At worst, he or she will be punished. Conversely, studies like The Journalism of Outrage, the best work we know on how investi- gative reporting achieves results, underline the importance of coalitions and allies for the success of investigative projects. Moreover, investigation involves a greater investment of time, money and energy than conventional reporting. It is very, very foolish not to take steps that ensure an optimal return on that investment. At a minimum, a media should derive greater pres- tige and admiration from its investigative work, and greater visibility to its public. It can be demonstrated that media which offer information-rich, independent content to their viewers are more profitable than media which do not. Make sure that your viewers understand the value of what they are getting. What follows are minimal steps to take in publishing, defense and promotion. 84St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts chapter 8 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 86Publication E nsure that the story is properlyedited. Copy editors inexperiencedwith investigation may destroy the impact of a story by cutting the wrong facts. Be prepared to fight for what is important, and to concede what is not. Ensure that the story is properly illustra- ted. Poor or absent graphics or photos will make the story hard to understand and less appealing. Ensure that the story is properly announced by headlines. Don’t let an editor write a headline that misre- presents your work or sells something that’s not in the story. Do fight to get the maximum attention and best placement for your story. Defense in the public zone N otify the principal friendlysources in your story when it iscoming out and make sure they get copies or links to show their friends. Do the same with parliamentarians or other political figures concerned by the issue. Just before publication (meaning, not so close that your story can be stolen), make sure that colleagues in the media or NGOs receive the story and key documents cited in the story. They will not be able to procure these documents themselves on short notice, and they will be reluctant to cite your findings without proof. Arrange to discuss the story in public forums (other media, universities, citizen associations, etc.). Anticipate the counter-attacks of your adversaries, based on their official responses to date (which they will probably repeat) and prepare new stories demolishing their defenses. This technique was used by Anne-Marie Casteret in the contaminated blood affair with great success. S to ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts 85We discover a subject.We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. chapter 8 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 87chapter 8 We discover a subject. We create a hypothesis to verify. We seek open source data to verify the hypothesis. We seek human sources. As we collect the data, we organise it – so that it is easier to examine, compose into a story, and check. We put the data in a narrative order and compose the story. We do quality control to make sure the story is right. We publish the story, promote and defend it. 86St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Promotion P repare a news release on the story,giving its principal findings in afew sentences. Distribute it widely when the story comes out. Consider releasing the story jointly with a non-competing media, abroad or in another sector of the media (such as print if you are in radio or vice versa). Notify Internet forums and relevant citizen groups of the story following publication. In closing Whether your story appears in abig medium or a small one,make sure it is noticed by the people for whom it is important. If you achieve no other result, you will allow them to feel that someone cared about their story. Take the time to enjoy the response to your work. Listen to criticism, and make use of that criticism. Some people will treat you like a star, and that’s fine, so long as you continue to learn from the people who don’t. If you need to work on something diffe- rent, do so. Perhaps you will want to change territories, or sectors. Perhaps you will want to study something that works, instead of something that doesn’t. Remember that with every investigation, you will get stronger. Wherever you go, bring your methods with you, and you will succeed. We know, because we’ve been there. Welcome, and good luck! xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 8887 St o ry -B as ed I n q u ir y : A m an u al f o r in v es ti ga ti v e jo u rn al is ts Selected Bibliography If you care about investigative reporting, keep studying it! The resources on this page are only a start. Nearly all are in English, the international language of the profession. Take the time to get a working knowledge of the language, and to see what's going on in the field. Books LEONARD DOWNIE, JR., The New Muckrakers. New Republic Books, 1976. Written right after Watergate by a key player at the Washington Post, this book captures the spirit and the actors of a key moment. BRANT HOUSTON, Computer-assisted reporting: A Practical Guide. St. Martin's Press, 1996. The best manual on using data in investigations. BRANT HOUSTON, LEN BRUZZESE, STEVE WEINBERG The Investigative Reporter's Handbook: A Guide to Documents, Databases and Techniques. Bedford/St. Martin's, 4th Edition (2002). The latest edition of the Investigative Reporters and Editors manual, and the best full-length guide, including many advanced techniques. MARK HUNTER, Le Journalisme d'investigation en France et aux Etats-Unis. Presses universitaires de France, coll; Que sais-je?, 1997. This little book compares the evolution of investigative reporting in two very different places, and includes detailed analyses of several landmark investigations. For readers of French. GAVIN MCFADYEN, Investigative Journalism. 2nd edition. T&amp;F Books, 2009. A manual by the founder of the London Centre for Investigative Journalism, a very experienced TV investigator. DAVID L. PROTESS, FAY LOMAX COOK, JACK C. DOPPELT, AND JAMES S. ETTEMA, The Journalism of Outrage: Investigative Reporting and Agenda-Building in America. New York: The Guilford Press, 1991. This may be the best single study ever written about how investigative repor- ting achieves results, and is useful beyond its U.S. setting. Scholarly preci- sion,journalistic insight. PAUL CRISTIAN RADU, Follow the Money: A Digital Guide for Tracking Corruption. International Center for Journalists Romanian Centre for Investigative Journalism, 2008. Free download: http://www.icfj.org/Resources/Followth eMoney/tabid/1170/Default.aspx. This ground-breaking manual tells you about where to find information on businesses in numerous countries, as well as search techniques. TOM WOLFE The New Journalism. London: Pan, 1975. The introduction to this classic anthology of great articles says a lot about source relationships in depth reporting; the articles tell you a lot about how narrative technique affects impact. Not really investigation, but important for any journalist who cares about the art. Websites http://www.arij.net When Arab Reporters for Investigative Journalism began with help from International Media Support, there was doubt about whether it could accomplish anything. The work archived on its website proves that it could. The major organisation for investigative reporting in its region, and a global player. http://www.cin.ba/Home.aspx Site of the Center for Investigative Reporting in Bosnia-Herzegovina, created by Drew Sullivan. CIN in turn founded the Crime and Corruption Reporting Program, a model in the field. http://www.crji.org The Romanian Centre for Investigative Journalism shows you what a group of ambitious, smart young reporters can do in a tough place. Keep watching them. http://www.centerforinvestigativ ereporting.org One of the first and greatest independent reporting houses of the post-Watergate era, based in Oakland, California, with a long history of landmark stories. http://www.fairreporters.org The website of the Forum for African Investigative Reporters offers materials and support services tailored to Africa. http://www.globalinvestigativejo urnalism.org Homepage of the Global Investigative Journalism Network, the umbrella group for investigative reporters from some 50 countries. Its bi-annual congresses are major events. The website is currently being revised to include free tip sheets and other presentations from conferences. The GIJN also sponsors the “Global-L” mailing list, well worth joining. http://www.ire.org The homepage of Investigative Reporters and Editors Inc., the world's largest and first organisation for such as we. Key resources -- notably a massive archive of tip sheets and articles on thousands of subjects – of greatinterest to trainers are available for a membership fee. http://markleehunter.free.fr This site includes articles and book extracts cited in this manual, written using the methods in this manual. http://www.publicintegrity.org The Center for Public Integrity is one of the oldest and most influential foundation-funded institutions in the field. Their global reports set the stan- dard. By no coincidence, they also created and manage the International Consortium of Investigative Journalists. http://www.i-scoop.org The Danish organisation SCOOP supports investigative training and projects throughout Europe (and particularly in the East). It's run by people who have done investigative work at a high level. chapter 8 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 89A manual for investigative journalists BY MARK LEE HUNTER with Nils Hanson, Rana Sabbagh, Luuk Sengers, Drew Sullivan, Flemming Tait Svith and Pia Thordsen xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 1 I nvestigative Journalism means the unveiling of mattersthat are concealed either deliberately by someone in aposition of power, or accidentally, behind a chaotic mass of facts and circumstances - and the analysis and exposure of all relevant facts to the public. In this way investigative journalism crucially contributes to freedom of expression and freedom of information, which are at the heart of UNESCO’s mandate. The role media can play as a watchdog is indispensable for democracy and it is for this reason that UNESCO fully supports initiatives to strengthen investigative journalism throughout the world. I believe this publication makes a significant contribution to promoting investigative journalism and I hope it will be a valuable resource for journalists and media professionals, as well as for journalism trainers and educators. Jānis Kārkliņš Assistant Director-General for Communication and Information, UNESCO 9 789231 041891 ISBN 9 789231 041891 xpress manual final ukdouble mai 2011:Mise en page 1 21/06/11 17:21 Page 90</span></p>
