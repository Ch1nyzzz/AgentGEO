</span><div data-dcnode-id="314" data-dynamic-sections="blog_post"><div data-dcnode-id="363" data-section-id="1599688991346" id="section-1599688991346"><span data-dcnode-id="1530" instrument_node="">
</span><section class="blog-post-body" data-dcnode-id="365" kjb-settings-id="sections_1599688991346_settings_background_color"><span data-dcnode-id="1529" instrument_node="">
</span><div class="sizer" data-dcnode-id="367"><span data-dcnode-id="1528" instrument_node="">
</span><div class="container" data-dcnode-id="369"><span data-dcnode-id="1527" instrument_node="">
</span><div class="row" data-dcnode-id="371"><span data-dcnode-id="1526" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="1113"><span data-dcnode-id="1525" instrument_node="">
</span><div class="blog-post-body__panel box-shadow-medium background-light" data-dcnode-id="1115"><span data-dcnode-id="1524" instrument_node="">
</span><div class="blog-post-body__info" data-dcnode-id="1516"><span data-dcnode-id="1523" instrument_node="">
</span><h1 class="blog-post-body__title" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Writing a Novel in 2022</span></h1><span data-dcnode-id="1520" instrument_node="">
</span><span class="blog-post-body__date" data-dcnode-id="1518" kjb-settings-id="sections_1599688991346_settings_show_date"><span data-dcnode-id="1519" instrument_node="">Jan 02, 2022</span></span><span data-dcnode-id="1517" instrument_node="">
</span></div><span data-dcnode-id="1515" instrument_node="">
</span><div class="blog-post-body__media" data-dcnode-id="1511"><span data-dcnode-id="1514" instrument_node="">
</span><img alt="writing a novel" data-dcnode-id="1513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/blogs/4205/images/Sdk20oQTh2H2jNBOeLtw_BLOGS_NO_COPY_for_WP_1200_x_675_7_.jpg&amp;raw"><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span><div class="blog-post-body__content" data-dcnode-id="1139"><span data-dcnode-id="1509" instrument_node="">
</span><h5 data-dcnode-id="1506"><strong data-dcnode-id="1507" style="vertical-align: sub;"><span data-dcnode-id="1508" instrument_node="">From the desk of&nbsp;Louise Dean, founder of The Novelry.</span></strong></h5><span data-dcnode-id="1505" instrument_node="">
</span><p class="p1" data-dcnode-id="1498"><span data-dcnode-id="1504" instrument_node="">The last lines of the poem </span><em data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Lockdown</span></em><span data-dcnode-id="1501" instrument_node=""> by the Poet Laureate Simon Armitage were inspired by the mythology of the village of Eyam in Derbyshire.</span><span class="Apple-converted-space" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1497" instrument_node="">
</span><blockquote data-dcnode-id="1493" style="border-left: 8px solid #ff833b; padding-left: 32px; margin: 40px 48px; font-size: 24px; line-height: 1.75;"><em data-dcnode-id="1494"><span data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">the journey a ponderous one at times, long and slow by necessarily so.</span></span></em></blockquote><span data-dcnode-id="1492" instrument_node="">
</span><p class="p3" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">They may console writers who have not made the progress hoped for in 2021, and I'm here to bring you words of cheer and a plan for the new year... Read on, dear writer.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p class="p3" data-dcnode-id="1485"><span data-dcnode-id="1488" instrument_node="">The story goes that the plague came to the village of Eyam in 1665 when a&nbsp;flea-infested bundle of cloth arrived from London for the local tailor. Within a week his assistant George Viccars, noticing the bundle was damp, had opened it up. Before long he was dead and more began dying soon after. As the disease spread, the villagers turned for leadership to their&nbsp;Rev. William Mompesson and the Rev. Thomas Stanley. </span><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">(Next slide, please, Reverend…)</span></i></p><span data-dcnode-id="1484" instrument_node="">
</span><p class="p3" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The villagers agreed to accept strict quarantine to prevent the spread of the disease beyond the village boundary. They were supported by the Earl of Devonshire, and by other charitable but less wealthy neighbours, who provided the necessities of life during their period of isolation. The plague ran its course over 14 months and according to accounts, it killed at least 260 villagers, with only 83 surviving out of a population of 350.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p class="p3" data-dcnode-id="1477"><i data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Lockdown, </span></i><span data-dcnode-id="1478" instrument_node="">the&nbsp;poem by Simon Armitage, references the star-crossed lovers of Eyam. Emmott and her suitor Rowland, from neighbouring Middleton Dale, came to see each other each day across the quarantine boundary, until one day Emmott failed to appear…Still Rowland came, day after day, for months.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p class="p3" data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">If the stories of Eyam sound like the stuff of fiction, that’s because they were invented. A description of the plague at Eyam was first penned by Anna Seward, the 18th-century poet, and appeared in an edition of her letters edited by Walter Scott. More details appeared in writing two centuries after the event when William Wood published, “The History and Antiquities of Eyam” (1842). Later editions bore the title “Legends of the Plague”. Eyam has continued to capture the creative imagination of writers. In October 2018, “Eyam”, a play based on the plague, was performed at Shakespeare’s Globe Theatre in London.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p class="p3" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Eyam is sometimes held up as an example to the world of how we can tackle the coronavirus pandemic. The voluntary quarantine cost the lives of many but it stopped the plague spreading. So we’re told. In fact, there is evidence of many, especially the wealthy, making a run for it...</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p class="p3" data-dcnode-id="1467"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Surprise, surprise!</span></strong></p><span data-dcnode-id="1466" instrument_node="">
</span><p class="p3" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">It wasn’t physical contact that kept Emmott and Rowland faithful to their arrangement, but the mere sight and sound of each other. To be seen, to be heard, is that not what we deeply crave? If you’ve had a miserable time of it lately, despite being lucky enough not to get seriously ill, the chances are you’re missing the spontaneity of human interaction&nbsp;and conversation, unscripted and unpredictable.&nbsp;</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p class="p3" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Conversation can fly in any direction, and brings with it surprise after surprise. This is the raw material of the writer; the mistakes we make when our thoughts slip the shackles of probity and become spoken words. The things we do, the thing we never meant to do, or would never have done were we not together.&nbsp;We surprise ourselves.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p class="p3" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">What does a writer do with these human errors?&nbsp;We write them down.&nbsp;We preserve them. A writer reaps and keeps what was not meant to be said or what should not have been done.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p class="p3" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">So, what stories shall we tell, about this time we're living in?</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p class="p3" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Many are reluctant to tackle a story we find demoralising, yet in time, we will&nbsp;find&nbsp;stories of heroism, even if we have to invent them. That is what we do, don’t we? We create heroes. Our best memories, the things we cherish have at their centre&nbsp;some sort of heroism.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p class="p3" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">My wish for you in 2022&nbsp;is that your writing honours the infinite capacity of human beings to surprise us all.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p class="p3" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1445" instrument_node="">
</span><h3 class="p5" data-dcnode-id="1442"><b data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">A happy new novel!</span></b></h3><span data-dcnode-id="1441" instrument_node="">
</span><p class="p3" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">If you’re about to start writing a novel, it’s likely your fears are:</span></p><span data-dcnode-id="1438" instrument_node="">
</span><ol class="ol1" data-dcnode-id="1425"><span data-dcnode-id="1437" instrument_node="">
</span><li class="li3" data-dcnode-id="1433"><span data-dcnode-id="1436" instrument_node="">Motivation – </span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">seriously, am I going to do this?&nbsp;Because if I don’t I’ll feel bad.</span></em></li><span data-dcnode-id="1432" instrument_node="">
</span><li class="li3" data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">Structure and Plot – </span><em data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">how the hell&nbsp;do I approach the storytelling and what happens when? Will I run out of material? What happens next?</span></em><span data-dcnode-id="1428" instrument_node=""> (And repeat.)</span></li><span data-dcnode-id="1426" instrument_node="">
</span></ol><span data-dcnode-id="1424" instrument_node="">
</span><p class="p3" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">We know how it is, and we created our programme of coaching, courses and community as&nbsp;a corset for writers with outsized creative tendencies. We'll keep you safe.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p class="p3" data-dcnode-id="1418"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Motivation</span></strong></p><span data-dcnode-id="1417" instrument_node="">
</span><p class="p3" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Let's cut to the chase. Motivation? Don’t be too hard on yourself. See it as an indulgence, not a chore. Stop making an examination of this. It's not, nobody cares! Do it for you. Take time for yourself. Be a time thief. Steal what’s not yours! (I think we’ve all learned it’s time,&nbsp;more than money we really want, in these last two years.) Get up early, go to bed late, skip lunch. Close the door.&nbsp;Use our Golden Hour method as described in our courses. Remember,&nbsp;writing is your gift to you. Potter and play.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p class="p3" data-dcnode-id="1411"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Structure</span></strong></p><span data-dcnode-id="1410" instrument_node="">
</span><p class="p3" data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">I suppose we’re all sick and tired of the old chestnut ‘planner or pantser’. It’s&nbsp;not an 'either/or' answer, it's 'both', and </span><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">fast.</span></em><span data-dcnode-id="1406" instrument_node=""> At The Novelry we recommend a nimble hybrid method. A one-page plan – so you don’t get overwhelmed and heartily sick of the novel before you put pen to paper – and the glory of the wide-open acreage of the white pages with all&nbsp;their&nbsp;possibilities.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p class="p3" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">These two chums – the plan and the page – talk to each other. Every week, you correct the plan based on what’s happened on the page (think of it as the laboratory where you’ve tested your theory), then you move into the mystery again with a newly tidy plan. Over-rule a dead plan with lively mayhem. It keeps the book alive for you, the writer, and at first draft it’s all about you turning the pages. The reader comes later.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p class="p3" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">To get cracking, you need two things and everything comes from these.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p class="p3" data-dcnode-id="1395"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Character</span></strong></p><span data-dcnode-id="1394" instrument_node="">
</span><p class="p3" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Character and setting will&nbsp;probably come to you hand in hand. You need to know your main character (MC) – and the pickle they’re in – very well indeed. You’ll want to know everything you can about them. You need to love your&nbsp;MC&nbsp;and take pity on them.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p class="p3" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">With the setting, whether that's place or time, know it so you can use it, and love it so you want to spend time there. It’s the stage. Once you know its corners, you can get to work.&nbsp;</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p class="p3" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Armed with these you can allow the&nbsp;story to unfold in your mind. Think of this duo as a little tealight, modest enough to&nbsp;provide enough of a glow to bring you back to the desk. We’ll show you how to scope out the idea, build the world of your story, and ensure you’ve got to grips with your main character’s problem or dilemma before you put pen to paper. Having these things in place makes for a smooth write.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p class="p3" data-dcnode-id="1382"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The Arc</span></strong></p><span data-dcnode-id="1381" instrument_node="">
</span><p class="p3" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Consider&nbsp;the drama of the arc of change for our MC. How the story unsettles and unseats our hero for better or for worse.&nbsp;In life,&nbsp;a person may not change. In fiction,&nbsp;your main character must.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p class="p3" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Some like to do a zero draft and race through the idea from A to Z to find the arc. Not me, but I can see how that might work for writing crime in particular. We’re all different. For my next novel, I quite fancy a midpoint (where everything changes), a divine moment of understanding at about two-thirds, and I prefer not to know the ending to keep me writing.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p class="p3" data-dcnode-id="1372"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Setting</span></strong></p><span data-dcnode-id="1371" instrument_node="">
</span><p class="p3" data-dcnode-id="1367"><span data-dcnode-id="1370" instrument_node="">I don't always start planning a novel with a setting, but it's a good place to begin and many authors do.</span><span class="Apple-converted-space" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1366" instrument_node="">
</span><p class="p3" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">The setting for my novels is sometimes borne of a place&nbsp;to which I've been&nbsp;a lovestruck visitor. A temporary locus. I call it 'vacation eyes' – when&nbsp;you're&nbsp;alert and alive to what you're seeing. Sometimes our sight dims when we inhabit a place too long. Give that setting a little bit of rose-tinted vision! You may be creating a place with world-building, going back to a place you knew in the past, or doing location visits for your novel. The main thing is you want to spend time there in spirit, you want to haunt it.&nbsp; You'll need to bring it to life with art for its charisma to shimmer. Here's how...</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p class="p3" data-dcnode-id="1360"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Charismatic Description</span></strong></p><span data-dcnode-id="1359" instrument_node="">
</span><p class="p3" data-dcnode-id="1354"><span data-dcnode-id="1358" instrument_node="">The artist JMW Turner lived in a small house riverside on Cheyne Walk in London in the mid-19th century. Known as 'the painter of light', Turner put things simply as artists do (</span><i data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">and intellectuals don't </span></i><span data-dcnode-id="1355" instrument_node="">as Charles Bukowski noted).</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p class="p3" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1350" instrument_node="">
</span><blockquote data-dcnode-id="1345" style="border-left: 8px solid #ff833b; padding-left: 32px; margin: 40px 48px; font-size: 24px; line-height: 1.75;"><span data-dcnode-id="1349" instrument_node="">My business is to paint what I see.</span><br data-dcnode-id="1348"><span data-dcnode-id="1346" style="color: gray; font-size: 20px;"><span data-dcnode-id="1347" instrument_node="">JMW Turner</span></span></blockquote><span data-dcnode-id="1344" instrument_node="">
</span><p class="p3" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p class="p3" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Turner’s sketchbooks show rudimentary depictions upon which he made simple notes of mood and colour and the direction of sunlight to inform his later paintings.&nbsp;</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><img data-dcnode-id="1337" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/site/13990/products/EgWeTfTgQ7CAjuOZliv7_turnersketch.jpg&amp;raw" width="475"></p><span data-dcnode-id="1335" instrument_node="">
</span><p class="p3" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Be like Turner.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p class="p3" data-dcnode-id="1328"><span data-dcnode-id="1331" instrument_node="">Swerve grandiloquence in your prose, dodge embellishment and metaphor, in favour of simply saying what you see.</span><span class="Apple-converted-space" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1327" instrument_node="">
</span><p class="p3" data-dcnode-id="1323"><span data-dcnode-id="1326" instrument_node="">This is the method of many modern writers from Ernest Hemingway to Sally Rooney. The job is to put the reader firmly in situ and at ease and move on smartly. Remember, modern readers don't need long descriptions and spoon-feeding. They've got Google if they’re really interested. Simply say what you see.</span><span class="Apple-converted-space" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1322" instrument_node="">
</span><p class="p3" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">After Turner died, another painter took up residence in Cheyne Walk: James Abbott McNeill Whistler lived at 2 Lindsey&nbsp;Row from 1866 to 1878. Here's how he went about note-taking for a work of art.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><blockquote data-dcnode-id="1306" style="border-left: 8px solid #ff833b; padding-left: 32px; margin: 40px 48px; font-size: 24px; line-height: 1.75;"><span data-dcnode-id="1318" instrument_node="">
</span><p class="p8" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Whistler would suddenly see the view he sought, stop and stare. He would then turn his back on the river and chant to his companion, “The sky is lighter than the water, the houses darkest. There are eight houses, the second is the lowest, the fifth the highest; the tone of all is the same. The first has two lighted windows, one above the other; the second has four.” If his companion corrected him on the smallest detail, he would stop, turn and stare again at the view he was memorising and repeat the performance – sometimes a dozen times before it was perfectly imprinted on his memory. Then with a brisk “Good night” he would be off to bed, the scene to be painted next morning gathering shape and tone in his mind’s eye....</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p class="p9" data-dcnode-id="1308"><span data-dcnode-id="1314" instrument_node="">... after a long pause he turned and walked back a few yards; then with his back to the scene at which I was looking, he said, ‘Now, see if I have learned it,’ and repeated a full description of the scene, even as one might repeat a poem one had learned by heart. (...) In a few days I was at the studio again, and there on the easel was the realisation of the picture.</span><br data-dcnode-id="1313"><span data-dcnode-id="1309" style="color: gray; font-size: 20px;"><span data-dcnode-id="1310" style="color: gray; font-size: 20px;"><span data-dcnode-id="1311" style="color: gray; font-size: 20px;"><span data-dcnode-id="1312" instrument_node="">Tom Pocock, Chelsea Reach</span></span></span></span></p><span data-dcnode-id="1307" instrument_node="">
</span></blockquote><span data-dcnode-id="1305" instrument_node="">
</span><p class="p8" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Record everything on a few visits.&nbsp;Make sure you record the sounds of the place – memory can be fickle. You'll want to look at nature too, and name the trees and birds to bring the place to life.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p class="p3" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Now,&nbsp;to the business of adding charisma. Here's how.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p class="p3" data-dcnode-id="1294"><span data-dcnode-id="1298" instrument_node="">What you're looking for are the inconsistencies, what&nbsp;we might </span><em data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">not</span></em><span data-dcnode-id="1295" instrument_node=""> expect to be present so&nbsp;we can see a familiar place anew.&nbsp;For example, you can add depth and drama by paying attention to the light.&nbsp;To get the detail right, make notes, take photographs or&nbsp;record live onto your iPhone and give it some narrative to get the direction of the light and shadows at different times of the day. Light shows certain things at certain times, and the dark hides them so you’ll find you have a moving canvas for your story setting.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p class="p3" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">If you're writing historical fiction or world-building for a speculative setting, you'll want to create your own mental map. Again, try to go for depth of local detail rather than breadth, it's a shortcut to creating the illusion of a wider reality.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p class="p3" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">And relax! To get the balloon up of your illusion of place, you need to bring this luminosity of detail to the opening of your novel, to when we first enter the place, and thereafter mere notes will do (as we describe in our Lucid Compression prose method in the courses.)</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p class="p3" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">If I’m writing historical, I’ll put together a reference reading list using fiction and non-fiction written about the place at the time. I won't use contemporary historical novels. (There's many a slip between cup and lip.) I want faithful true detail and I don't want it pre-filtered. Who knows what might yet inspire me?</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p class="p3" data-dcnode-id="1281"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Perspective</span></strong></p><span data-dcnode-id="1280" instrument_node="">
</span><p class="p3" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Once I have a place, and a character, I’ll start thinking about who is telling the story, from what perspective, and to what purpose. I may rule out a narrative voice, especially if I am concerned the story might come too close to home and if it deals with issues very close to my heart. Know yourself as a writer!&nbsp;Some writers work&nbsp;like movie directors and prefer to disappear from the story and simply use the camera of their prose to record events unfolding. Make your choice based on your own comfort. Start as the director to get going, if uncertain. You may find your way into 'voice' when you get your cast speaking.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p class="p3" data-dcnode-id="1272"><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Voice</span></strong></p><span data-dcnode-id="1271" instrument_node="">
</span><p class="p3" data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">Knowing who you are, as a person and a writer, is the first step&nbsp;to having a voice. If you do one thing with your New Year's resolutions, make peace with yourself. Maybe write a list of what’s bad about you, and what’s good about you and see how they’re linked. Bingo. That’s you, bang to rights.</span><span class="Apple-converted-space" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1267" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Novels don't care if you're good or bad. You're never ugly to your novel. You’re either there – the creator, the parent – or you’re absent.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p class="p3" data-dcnode-id="1258"><span data-dcnode-id="1261" instrument_node="">At The Novelry, we're all working writers, who have a good few years of writing between us. We'll work with you to find&nbsp;an approach to creative writing that helps you produce. It's all about the material at the end of the day. We're a broad church. Nerds, too. We love the technical stuff. Our only mantra is 'tools, not rules.' The lovely thing about being open to all approaches is that one will work for you and unlock your creativity for sure. You’ve got a block? We’ve got the key.</span><span class="Apple-converted-space" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1257" instrument_node="">
</span><p class="p3" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1254" instrument_node="">
</span><h3 class="p3" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Writing a Novel&nbsp;-&nbsp;A Six Week Mini-Course</span></h3><span data-dcnode-id="1251" instrument_node="">
</span><p class="p3" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">On March 6,&nbsp;I'm launching a 6-week&nbsp;mini-course sharing my live writing process as I scope out a novel and get writing!</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p class="p3" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The module will be available&nbsp;to&nbsp;members enrolled on our courses. (Psst! You've just got time to pack in The Big Idea Course and The Classic Course to come up with your idea and start building the world of your story if you sign up in January, before we start writing together in March.)</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p class="p3" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Each&nbsp;week, we'll prepare for the writing week ahead and you'll be given direction for your week that will&nbsp;coincide&nbsp;with and enhance our novel-writing course. In hour-long live sessions on Sunday evenings for six weeks we will cover:</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p class="p3" data-dcnode-id="1239"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">1. Character and Place</span></strong></p><span data-dcnode-id="1238" instrument_node="">
</span><p class="p3" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">The kind of book you want to write. Your intentions, please. The books you admire. The questions for which you have no answer. Why and how you should lovebomb your main character to get your novel going.&nbsp; Thoughts on the dramatic irony that will power the story and the midpoint.&nbsp;Settling upon the setting for the story.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p class="p3" data-dcnode-id="1232"><span data-dcnode-id="1233" style="color: #ff833b;"><span data-dcnode-id="1234" instrument_node="">(Homework: sketching out the opening as a test run to 500 words: test and rest!)</span></span></p><span data-dcnode-id="1231" instrument_node="">
</span><p class="p3" data-dcnode-id="1228"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">2. Casting Out</span></strong></p><span data-dcnode-id="1227" instrument_node="">
</span><p class="p3" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Building the cast of players. The four types, and the character who causes conflict. Tackling the matter of backstory. Using old material. Creating Hemingway's 'iceberg' to keep the story afloat.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p class="p3" data-dcnode-id="1221"><span data-dcnode-id="1222" style="color: #ff833b;"><span data-dcnode-id="1223" instrument_node="">(Homework: deepening characterisation details for the inner circle.)</span></span></p><span data-dcnode-id="1220" instrument_node="">
</span><p class="p3" data-dcnode-id="1217"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">3. Choosing and Working with a Hero Book</span></strong></p><span data-dcnode-id="1216" instrument_node="">
</span><p class="p3" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Taking one small powerful tale as a depth charger for theme. Looking at the characterisation arcs, themes and structures of novels we love&nbsp;as&nbsp;'Hero Books'. You'll be guided to choose yours to help you stay on track and focused during your writing. In the mini-course we'll be looking at the following novels among many others:</span></p><span data-dcnode-id="1213" instrument_node="">
</span><ul data-dcnode-id="1193"><span data-dcnode-id="1212" instrument_node="">
</span><li class="p3" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Less by Andrew Sean Greer</span></li><span data-dcnode-id="1209" instrument_node="">
</span><li class="p3" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">My Sister the Serial Killer by Oyinkan Braithwaite</span></li><span data-dcnode-id="1206" instrument_node="">
</span><li class="p3" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Normal People by Sally Rooney</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li class="p3" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Sorrow and Bliss by Meg Mason</span></li><span data-dcnode-id="1200" instrument_node="">
</span><li class="p3" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The Lonely Passion of Judith Hearne by Brian Moore</span></li><span data-dcnode-id="1197" instrument_node="">
</span><li class="p3" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Notes on a Scandal&nbsp;by&nbsp;Zoe Heller</span></li><span data-dcnode-id="1194" instrument_node="">
</span></ul><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" style="color: #ff833b;"><span data-dcnode-id="1191" instrument_node="">(Homework: the arc of&nbsp;your hero book.)</span></span></p><span data-dcnode-id="1188" instrument_node="">
</span><p class="p3" data-dcnode-id="1185"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">4. Your Theme</span></strong></p><span data-dcnode-id="1184" instrument_node="">
</span><p class="p3" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Nailing your intentions for the&nbsp;book and understanding the positive and negative aspects of the central theme and organising events and the cast to pull in either direction to create plot.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p class="p3" data-dcnode-id="1178"><span data-dcnode-id="1179" style="color: #ff833b;"><span data-dcnode-id="1180" instrument_node="">(Homework: the motivational factors of a title, an epigram and a song.)</span></span></p><span data-dcnode-id="1177" instrument_node="">
</span><p class="p3" data-dcnode-id="1174"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">5. Structure</span></strong></p><span data-dcnode-id="1173" instrument_node="">
</span><p class="p3" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Sketching out the key scenes of the story according to The Five Fs of storytelling. Fixing the matter of the midpoint. Steps up, steps down. What's the reader reading to find out? Motifs, recurrences, the pay off for the reader.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p class="p3" data-dcnode-id="1167"><span data-dcnode-id="1168" style="color: #ff833b;"><span data-dcnode-id="1169" instrument_node="">(Homework: a one-pager story plan).</span></span></p><span data-dcnode-id="1166" instrument_node="">
</span><p class="p3" data-dcnode-id="1163"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">6.&nbsp;A Strong Base</span></strong></p><span data-dcnode-id="1162" instrument_node="">
</span><p class="p3" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">We'll look at the one-pager and redraft the opening chapter to include elements important to the theme, being sure to light the fuse for the explosion of meaning. This will make a nice solid base for us to move forward in writing our novels with confidence. In&nbsp;the last live working session, we'll review some pitches to ensure we have the stuff great books are made of.&nbsp;</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p class="p3" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Each week, we'll be working side-by-side to create material at a modest 250-500 words a day during the week and test our story from all directions as we deepen the interaction and engagement between members of the cast and allow unforeseen events to take us by surprise.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p class="p3" data-dcnode-id="1153"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Let this year be the year you surprise yourself.</span></strong></p><span data-dcnode-id="1152" instrument_node="">
</span><p class="p3" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">Don't leave it to someone else to change your life; take the matter into your own hands. Create with mischief, be wilful. Enjoy your writing. Let's make this our year, let's steal time and seize life and make of it what we want. Twenty-five years ago, a friend told me '</span><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">write what you need.</span></em><span data-dcnode-id="1148" instrument_node="">' That advice has never got old, but this year it might&nbsp;turn gold.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p class="p3" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Happy writing!</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p class="p3" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">
</span><span data-dcnode-id="1135" instrument_node="">
</span><div class="blog-post-cta background-light" data-dcnode-id="1117" kjb-settings-id="sections_1599688991346_settings_cta_background_color"><span data-dcnode-id="1134" instrument_node="">
</span><div class="blog-post-cta__content" data-dcnode-id="1122" kjb-settings-id="sections_1599688991346_settings_cta_content"><h3 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1131" instrument_node="">
</span><h5 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Start a new chapter today</span></h5><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">We take&nbsp;beginners and experienced authors all the way from an inkling of an idea to a&nbsp;book in a year and on towards literary agency representation with our </span><span data-dcnode-id="1124" style="color: #ff833b;"><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenovelry.com/" style="color: #ff833b;"><span data-dcnode-id="1126" instrument_node="">online creative&nbsp;writing courses.</span></a></span></p></div><span data-dcnode-id="1121" instrument_node="">

</span><a class="sidebar-categories__link" data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenovelry.com/blog" kjb-settings-id="sections_1599688991346_blocks_1600295464514_settings_all_tags"><span data-dcnode-id="1081" instrument_node="">All Categories</span></a><span data-dcnode-id="1079" instrument_node="">
