</span><p data-dcnode-id="1281"><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">This week we have a bumper guest post: we asked several writers and lit bloggers whose work collectively spans nearly every genre from historical fiction to sci-fi to tell us about their top sources of inspiration. When you’re inspired to start writing a book of your own, try the Now Novel process – it’ll help you find your central idea and start making progress.&nbsp;&nbsp;</span></em></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1277"><strong data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Martha Alderson</span></strong></p><span data-dcnode-id="1276" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1272"><figure class="alignleft" data-dcnode-id="1273"><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer.png"><img alt="Picture quote from Martha Alderson aka The Plot Whisperer" class="wp-image-2951" data-dcnode-id="1275" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Martha-Alderson-The-Plot-Whisperer.png 735w" width="200"></a></figure></div><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">My inspiration for my own writing and my work with writers comes out of a persistent urge to understand the story beneath the story, the meaning beyond the here and now. Having taught plot and the craft of writing for the past many years,&nbsp;I quickly learned the importance of&nbsp;incorporating the whole writer into the process. Leaving out the writer is like writing a story with no character development, no heart, no soul.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">As writers, we bring ourselves to the page – ours strengths and weaknesses, beliefs and judgments, fears and demons. Insight into the similarities between us and the story we craft benefits both the story and the individual. The Universal Story offers writers insight and inspiration. The story of birth, death and renewal. The promise of transformation.&nbsp;I love following the ebb and flow in the energy of stories, our lives, our writing and witnessing the transformation all writers go through when writing a story with a plot from beginning to end.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1259"><em data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">Martha Alderson is the author of the ‘Plot Whisperer’ books for writers and helps writers create stories with a plot from beginning to end in the ’27-Step Tutorial: How Do I Plot a Novel, Memoir, Screenplay?’ You can visit her at </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.marthaalderson.com/" rel="noopener noreferrer" target="_blank" title="Martha Alderson's website"><span data-dcnode-id="1263" instrument_node="">www.marthaalderson.com</span></a><span data-dcnode-id="1261" instrument_node=""> and follow her on Twitter via @plotwhisperer.</span></em></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1255"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Elizabeth Spann Craig</span></strong></p><span data-dcnode-id="1254" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1250"><figure class="alignright" data-dcnode-id="1251"><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels.png"><img alt="Elizabeth Spann Craig on how mystery writers can find inspiration in newspapers" class="wp-image-2991" data-dcnode-id="1253" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Elizabeth-Spann-Craig-on-writing-mystery-novels.png 735w" width="200"></a></figure></div><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">A considerable source of inspiration to me as a mystery writer is the varied content I read. This content is everything from local news stories to novels. Crime stories in the newspaper can be especially helpful for mystery writers. They outline suspects and hint at possible motives. When a suspect is arrested or found guilty, writers can wonder “but what if one of the other suspects were responsible?” That can conjure up an entirely different ending to the story and provide a little creative license for a crime fiction writer. As far as fictional content, I’m especially inspired by M.C. Beaton’s long-running Hamish Macbeth mystery series. Beaton is a master at character creation. Usually I’m too analytical to lose myself in a mystery, but Beaton still has the ability to thoroughly engage me in her setting and characters.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">A second source of inspiration to me is my love of series writing. I enjoy having an established story world in which I can continue visiting my characters. Writing a series means we have many variables already in place when we start writing a new book – the setting, the recurring characters, and the voice. That’s when real creativity can come into play as we come up with new situations and conflicts for the characters to face.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Thirdly, a large source of inspiration are my readers themselves. They encourage me, chide me when I haven’t lived up to their expectations, and offer up ideas. The way that my characters have become real to them so that they want to spend more time with them helps keep me focused and motivated as a writer.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1234"><em data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">Elizabeth writes the ‘Southern Quilting’ mysteries and ‘Memphis Barbeque’ mysteries for Penguin Random House and the ‘Myrtle Clover’ series for Midnight Ink and independently.&nbsp; Her website’s </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//elizabethspanncraig.com/blog/" title="Elizabeth Spann Craig's blog"><span data-dcnode-id="1238" instrument_node="">blog</span></a><span data-dcnode-id="1236" instrument_node=""> was named by Writer’s Digest as one of the 101 Best Websites for Writers.&nbsp; She curates links on Twitter as @elizabethscraig that are later shared in the free search engine www.writerskb.com.</span></em></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1230"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Stavros Halvatzis</span></strong></p><span data-dcnode-id="1229" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1225"><figure class="alignleft" data-dcnode-id="1226"><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel.png"><img alt="Writer Stavros Halvatzis describes how Googling images inspires his writing" class="wp-image-2993" data-dcnode-id="1228" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Writer-Stavros-Halvatzis-on-how-images-can-inspire-your-novel.png 735w" width="200"></a></figure></div><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Inspiration is a little like a cat. You may call her, but she decides whether she’ll condescend to let you touch her.&nbsp;Inspiration may spring from any source, really – &nbsp;a movie poster, a phrase from a book, a line of poetry, a scent. For me, once it jumps on my lap, it usually quickly morphs into an idea.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1220" instrument_node="">The inspiration for my first book,&nbsp;</span><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Scarab</span></em><span data-dcnode-id="1217" instrument_node="">, came from speculation about a Hall of Records, a chamber thought to lie buried under the great Sphinx of Giza. I happened to be reading a book about quantum computers at the time and I thought: What if the Hall of Records contains some secret knowledge that can assist in the creation of a machine capable of changing the laws of Physics? And so Scarab was born.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">My newest book,&nbsp;</span><em data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">The Land Below</span></em><span data-dcnode-id="1211" instrument_node="">,&nbsp;comes from my having Googled pictures of the giant crater formed by one of the oldest metor strikes on earth that occurred near the goldmines of Parys in Gauteng, South Africa.&nbsp;I thought: What if all that ostensibly remains of the world were&nbsp;a small number of people who survived a catastrophe centuries ago by climbing down into a goldmine and building a subterranean society down there?&nbsp;How long would it be before they sought to climb back up to the surface and check things out? And what new challenges would they face?</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">I’m currently fleshing out my next next book in the series, </span><em data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">The Land Above,</span></em><span data-dcnode-id="1205" instrument_node=""> so inspiration is key. Which reminds me, I’d better stock up on that catnip.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1197"><em data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">Stavros Halvatzis was born in Alexandria, Egypt, grew up in Greece, and lived and studied in South Africa and in London. He’s&nbsp;taught screenwriting and digital media in South Africa and in Australia, where he earned his PhD in narrative studies.&nbsp;He&nbsp;enjoys stories of all sorts, especially science fiction, mysteries, fantasy, horror, and thrillers. He’s looking forward to being the first octogenarian on board the manned mission to Mars, so long as he can upload his next novel to Amazon from up there, that is. You can read his blog on his </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stavroshalvatzis.com/" rel="noopener noreferrer" target="_blank" title="Stavros Haltvatzis' website"><span data-dcnode-id="1201" instrument_node="">website</span></a><span data-dcnode-id="1199" instrument_node="">&nbsp;and follow him on Twitter via @SHalvatzis.</span></em></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1193"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Kev Heritage</span></strong></p><span data-dcnode-id="1192" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1188"><figure class="alignright" data-dcnode-id="1189"><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration.png"><img alt="sci-fi writer Kev Heritage on where he finds inspiration" class="wp-image-2994" data-dcnode-id="1191" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/sci-fi-writer-Kev-Heritage-on-where-he-finds-inspiration.png 735w" width="200"></a></figure></div><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">If I relied on inspiration alone, I’d spent most of my time waiting around, staring out of the window and not writing. Instead, I use the following three techniques to force that inspiration out of myself:</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1181"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Number One: Keeping myself informed</span></strong></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1179" instrument_node="">I read science and technology news every day and ponder what impact these developments may have on humans in the future. </span><em data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">The what ifs.</span></em></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">It’s pretty much the same advice as ‘read voraciously’, which we all must do. Over time, I’ve learned to trust my subconscious. If I stuff it with as much information as I can, it eventually starts to spill it out into ideas and stories.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1169"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Number Two: Shooting from the hip –&nbsp;the pantster approach</span></strong></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">For most of my writing, I‘ve no fixed idea about who I’m going to meet or what’s going to happen. This ‘technique’, as it’s laughingly called, pretty much relies on making the empty page my friend.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">I find that when I have&nbsp;no idea what I’m going to write sitting down and writing anyway jump-starts my imagination. These days an empty page very rarely puts me off, but if I don’t know how to begin, I type the following mantra over and over:</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">‘The quick brown fox jumped over the lazy dog.’</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">It’s a pangram—a phrase that contains all of the letters of the alphabet. I could type other phrases. Anything really. The actual process of typing flips my mind into ‘writing mode’. And, after a short time, something sparks and I’m off.&nbsp;I don’t always need a top-notch idea before starting out. I find ideas flow best when writing, not when staring out of the window. It took me a long time to learn this and was one of the main reasons why I didn’t write. Now, I trust myself to find everything along the way. But it can be scary…</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">Sometimes just a title alone can get me started—as with my science fiction novel </span><i data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">‘</span></i><span data-dcnode-id="1152" instrument_node="">Blue Into the Rip’. I’m still surprised that a book came from it… but that’s exactly what happened.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Often, my stories evolve away from the title, but that doesn’t matter – it’s just a starting point. My present writing project is called ‘Space Adventure Mystery’, but I doubt that will be the final name!</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1144"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Number Three: Thinking Outside the Dodecahedron</span></strong></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">In a world populated with hundreds of well-written books by great authors, I’m always looking for ways to stand out. I cannot pretend to write fully outside the norm, but I do try to startle and entertain by actively doing things differently.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1137"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Damn elves!</span></strong></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">For instance, you will not find an elf, a dragon or a dwarf—or any of those stock characters in my ‘Ironscythe Sagas’. I’ve nothing against such characters, but they’ve been written about hundreds of times by more accomplished writers than myself. I can’t do any better, and I don’t want to. I much prefer to create my own races and myths.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1130"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">It’s all in the edit</span></strong></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1128" instrument_node="">When using my pantster technique, cliché, more often than not, rears its ugly head. But I have the opportunity to turn it around. To find something startling and unpredictable,&nbsp;</span><em data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">hopefully</span></em><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">.</span></em><span data-dcnode-id="1123" instrument_node=""> I can do this at any time in the writing and editing process. This may involve changing the sex of a character, taking a cliché in an unexpected direction, or playing with the story in any other number of ways. It’s calculating, but I find that it can reap great dividends in terms of new ideas and directions.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1115"><em data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Kev is a bestselling author of science fiction and fantasy, specialising in action &amp; adventure and paranormal mysteries with a comedic edge.&nbsp;His ‘Into The Rip’ series represents a return to classic, fast-paced adventure sci-fi of the ’50s, but with a modern edge.&nbsp;He was born in the UK in the previous century. Originally from Derbyshire, Kev now lives in the seaside town of Brighton. He is a tea drinker and part-time stand-up comedian. You can read more about Kev and his work on his </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kevheritage.com/" rel="noopener noreferrer" target="_blank" title="Kev Heritage's website"><span data-dcnode-id="1119" instrument_node="">website</span></a><span data-dcnode-id="1117" instrument_node="">, and follow him on Twitter via @KevHeritage.&nbsp;</span></em></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1111"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Margot Kinberg</span></strong></p><span data-dcnode-id="1110" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1106"><figure class="alignleft" data-dcnode-id="1107"><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg.png"><img alt="Picture quote of writer Margot Kinberg on writing inspiration" class="wp-image-2954" data-dcnode-id="1109" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Margot-Kinberg.png 735w" width="200"></a></figure></div><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Writers find inspiration in a lot of different places. And for me, part of making the most of that inspiration is being open to it – being aware of my surroundings and ‘tuning in.’ That said, I find that my inspiration comes from a few different sources. One of them is unquestionably music. Anyone who knows me knows that there’s nearly always a song in my mind. Those songs get me thinking and sometimes are the source of ideas I wouldn’t have thought of otherwise.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1101" instrument_node="">Another source of writing inspiration for me is what I observe around me. People, events, and sometimes things get me thinking. I don’t mean that I use particular people I’ve met or know personally in what I write. Rather, an action, a facial expression, or even the way someone’s dressed can inspire a story. I am also very much inspired by the work of other writers. I’m fortunate enough to be connected with a lot of writers in different genres and with different styles. All of them teach me.</span><a data-dcnode-id="1100" name="_GoBack"></a></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1091"><em data-dcnode-id="1092"><span data-dcnode-id="1097" instrument_node="">Margot Kinberg is a mystery novelist (she writes the ‘Joel Williams’ series) and Associate Professor. She has also been blogging about crime fiction since 2009. She has written three ‘Joel Williams’ novels and is currently working on the fourth. Margot blogs at </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//margotkinberg.wordpress.com/" rel="noopener noreferrer" target="_blank" title="Confessions of a Mystery Novelist"><span data-dcnode-id="1096" instrument_node="">Confessions of a Mystery Novelist</span></a><span data-dcnode-id="1094" instrument_node=""> and you can follow her on Twitter via @mkinberg.</span><br data-dcnode-id="1093"></em></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1087"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">C.S. Lakin</span></strong></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1082"><figure class="alignright" data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction.png"><img alt="C.S. Lakin describes how reading true histories helps her write historical fiction" class="wp-image-2999" data-dcnode-id="1085" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/CS-Lakin-on-inspiration-for-writing-historical-fiction.png 735w" width="200"></a></figure></div><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1080" instrument_node="">The authors who have influenced me greatly for my fantasy and sci-fi writing are Patricia A. McKillip, Ray Bradbury, Isaac</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">Asimov, and traditional fairy tales. I loved fairy tales growing up and when I read G. K. Chesterton’s treatise on fairy tales in his book Orthodoxy, I was reminded of how important they are to us. We live in a kind of fairy tale, this life in this world, and we often lose the awe and wonder at creation, and fail to see the magic of miracles in every aspect of life. I wanted to capture that essence in my fairy tales. McKillip, to me, is the best fantasy writer ever to live, and her books have greatly inspired my writing style and view of fairy tales.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">For my historical Westerns, Zane Grey is my greatest influence. I actually don’t read romance and although I’ve read through a few novels in my genre, my aim with my novels in this genre is more to evoke the era and the locale rather than focus on the romance. Yes, these books are very much romance stories and about relationships, but to me, the point of writing a historical novel is to try to take the reader back in time so they can experience a place they can’t in today’s world. My novels are set in the 1870s and so much of my influence comes from reading nonfiction history books about that time and place. I especially like reading books and writing by people who lived back then or whose families grew up in those Colorado towns. They are greatly insightful, especially in the way they view and word their thoughts and feelings.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1067"><em data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">C. S. Lakin is a multipublished novelist and writing coach. She works full-time as a copyeditor and critiques about two hundred manuscripts a year. She teaches writing workshops and gives instruction on her award-winning blog, </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.livewritethrive.com/" title="C.S. Lakin's blog Live, Write, Thrive"><span data-dcnode-id="1071" instrument_node="">Live Write Thrive</span></a><span data-dcnode-id="1069" instrument_node="">.&nbsp; You can follow her on Twitter via @LiveWriteThrive.</span></em></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1063"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Jimmy Rice</span></strong></p><span data-dcnode-id="1062" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1058"><figure class="alignleft" data-dcnode-id="1059"><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking.png"><img alt="Jimmy Rice on how listening on public transport helps his writing" class="wp-image-2962" data-dcnode-id="1061" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Jimmy-Rice-writing-quote-on-note-taking.png 735w" width="200"></a></figure></div><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Three of my biggest sources of inspiration are:</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1051"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Public Transport</span></strong></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">I carry around&nbsp;a notepad and it regularly comes out on the tube. I owe the commuters of London a lot! You hear some interesting conversations – particularly when a group of lads is talking about girls, or vice versa.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1044"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Women</span></strong></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Dates can be goldmines for material – particularly the uncomfortable moments. I’m fascinated by how men interact with women, what the etiquette is on dates. I ask friends about their experiences, which can spark something in my mind.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1037"><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">A Dimly Lit Room</span></strong></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">This sounds ridiculous, but before I write a chapter I sit in a dark room with the lamp on and a notepad and think everything through – the jokes, potential problems I might encounter, how the characters are feeling. By the time I get to my laptop I know exactly what I’m doing. Otherwise I’d just end up staring at a blank screen.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1027"><em data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">Jimmy Rice is a 34-year-old novelist and journalist living in London and has worked for the Sheffield Star, Liverpoolfc.com and Sky News . He is the co-author of ‘The Best Thing that Never Happened to Me’ (with Laura Tait), and the dating diary ‘Plentymorefishoutofwater’. Visit Jimmy’s </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jimmyrice.org/" title="Jimmy Rice's website"><span data-dcnode-id="1031" instrument_node="">website</span></a><span data-dcnode-id="1029" instrument_node=""> or find him on Twitter via @JimmyRiceWriter.</span></em></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Kristine Kathryn Rusch</span></strong></p><span data-dcnode-id="1022" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1018"><figure class="alignright" data-dcnode-id="1019"><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers.png"><img alt="Kristine Rusch on finding inspiration in other writers' feats" class="wp-image-3000" data-dcnode-id="1021" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Kristine-Kathryn-Rusch-on-being-inspired-by-writers.png 735w" width="200"></a></figure></div><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Oh, my. Such a tough question. I think inspiration varies as a person grows older. Initially, of course, my inspiration came from the stories I read or had read to me as a child.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">My sister Sandy taught me to read when I was three, and I’ve been reading ever since. Some things were pretty common—all the Dr. Seuss, for example—and others not so common. My parents belonged to book clubs, so they enrolled me in several children’s book clubs. They also had books around the house. I read everything (and I do mean everything) in their house, and in my Grandmother’s house. I would have read everything in my aunt’s house as well, but she took the Harlequins away from me because I wasn’t “old enough.” I was afraid of her, so I never tried to cross her. (I always crossed my folks.)</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">So I suppose my first and probably my most powerful inspiration came from my own family, filled with heavy readers.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="1007" instrument_node="">Books from that period that made an impact include </span><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">To Kill A Mockingbird</span></em><span data-dcnode-id="1004" instrument_node="">, </span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Something Wicked This Way Comes</span></em><span data-dcnode-id="1001" instrument_node="">, </span><em data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Flowers For Algernon</span></em><span data-dcnode-id="998" instrument_node="">, Alfred Hitchcock’s </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Stories To Read With The Lights On</span></em><span data-dcnode-id="995" instrument_node="">, and </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">The Flame and The Flower</span></em><span data-dcnode-id="992" instrument_node="">.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">One book had both a positive and negative impact on me. I read </span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Gone With The Wind</span></em><span data-dcnode-id="986" instrument_node=""> when I was about 12, which was the longest book I had ever read. I remember being disturbed by things I didn’t understand (why did Rhett menace Scarlett—and then she woke up happy the next day? My mother wouldn’t answer that one), and even more disturbed by the “Negro dialect” and the portrayal of blacks in the book. I think I discussed it with someone, who told me that it was a historical novel, true to its time period. But I remember being deeply disturbed by the attitudes in that novel. And I hated Scarlett O’Hara with a fierce and burning passion.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="983" instrument_node="">I referenced the novel and the film in </span><em data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">A Dangerous Road</span></em><span data-dcnode-id="980" instrument_node="">, the first novel in my Smokey Dalton series, and not in a good way. Because by the time I wrote that book, I realized what a horrible racist novel </span><em data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Gone With The Wind</span></em><span data-dcnode-id="977" instrument_node=""> really was. (And it has to be bad if a 12-year-old can figure it out.)</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">My second most important inspiration came from Kevin J. Anderson when I met him in a college creative writing class. He proved to me (and our professor!) that writers could get published. Kev’s been a dear friend ever since, and he is still an inspiration for his work ethic and his ethic-ethics.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">My final inspiration is whatever I’m reading at the moment, particularly short fiction. Writers do things that I constantly believe to be impossible, and yet, they manage to pull it off. I wonder how I could do that, and so I try.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">That’s today’s answer on my inspirations. If you ask me tomorrow, I’ll probably give you a completely different answer—at least for part of it. Because the inspirations change decade by decade—and day by day.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="960"><em data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">Kristine Kathryn Rusch’s career has spanned almost forty years and almost every genre of fiction (and a few of nonfiction). She writes under several pen names, including Kristine Grayson for romance and Kris Nelscott for mystery. She’s an award-winning writer in all of her genres and is probably best known for her science fiction and fantasy, which she writes under her own name. Her SF has hit bestseller lists worldwide and won her many awards, including science fiction’s prestigious Hugo Award. She’s the only person in the history of the field to win the Hugo as both a writer and the first and only female editor of ‘The Magazine of Fantasy &amp; Science Fiction’. You can find out more about all of her work&nbsp;on her </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kriswrites.com/" rel="noopener noreferrer" target="_blank" title="Kristine Kathryn Rusch's website"><span data-dcnode-id="964" instrument_node="">website</span></a><span data-dcnode-id="962" instrument_node="">.</span></em></p><span data-dcnode-id="959" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="955"><figure class="alignleft" data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write.png"><img alt="Alex Sokoloff on how keeping a dream journal can give you writing ideas" class="wp-image-3001" data-dcnode-id="958" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Alexandra-Sokoloff-on-how-dream-journals-can-help-you-write.png 735w" width="200"></a></figure></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Alexandra Sokoloff</span></strong><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">Three of the largest sources of inspiration for my thriller and screenplay writing are:</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Personal Experience</span></strong></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Before I sold my first screenplay, I worked in the Los Angeles County prison system, teaching juveniles, mostly teenage gang kids and very young girls who had been arrested, mostly for prostitution. Yes, they arrested the girls instead of the men who were trafficking and abusing them. The whole experience taught me a lot about the vicious circle that the so-called justice system is. We are failing our next generation, and it’s heartbreaking. I know I write crime thrillers because of that early experience, and I draw on the emotion of it – and the criminal procedure I learned during that period of my life – all the time.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="938"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Anger at Social Injustice</span></strong></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">I also find rage a great motivator. I get tremendous inspiration from things that make me angry. Social injustice especially. My supernatural thriller </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Book of Shadows</span></em><span data-dcnode-id="933" instrument_node="">, and another very different crime book that I’m outlining now were both partly inspired by the gross miscarriage of justice that resulted in the accusation and conviction of the West Memphis Three in Arkansas: three teenage boys wrongly accused of the murders of three little boys. I am especially outraged by crimes against children and women: rape, abuse, trafficking. My </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Huntress/FBI</span></em><span data-dcnode-id="930" instrument_node=""> thrillers definitely draw on my rage about those crimes and my anger at society for not making their elimination a top priority.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="923"><strong data-dcnode-id="924"><span data-dcnode-id="927" instrument_node="">Dreams </span><span data-dcnode-id="925" style="color: #000000;"><br data-dcnode-id="926"></span></strong></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">And just to lighten it up a little: I also get a lot of ideas from my dreams. My supernatural thriller </span><em data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">The Price</span></em><span data-dcnode-id="918" instrument_node=""> and several of my screenplays came from ideas I dreamed. I keep a dream journal, which I find is key to remembering dreams, which you may have to coax out at first. But I think any writer who isn’t keeping a dream journal is working too hard! Our subconscious minds love to work on story problems when we’re asleep.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="910"><em data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">Alexandra Sokoloff is the bestselling, award-winning author of eleven supernatural, paranormal and crime thrillers who the New York Times has called “a daughter of Mary Shelley.” As a screenwriter she has sold original suspense and horror scripts and written novel adaptations for numerous Hollywood studios (Sony, Fox, Disney, Miramax), for producers such as Michael Bay. Her Thriller Award-nominated Huntress Moon series is out now from Thomas &amp; Mercer. Visit Alexandra’s </span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alexandrasokoloff.com/" rel="noopener noreferrer" target="_blank" title="Alexandra Sokoloff's website"><span data-dcnode-id="914" instrument_node="">website</span></a><span data-dcnode-id="912" instrument_node="">&nbsp;or find her on Twitter via @AlexSokoloff.</span></em></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Laura Tait</span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="901"><figure class="alignright" data-dcnode-id="902"><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice.png"><img alt="Laura Tait on how reading a well-written passage by a favourite writer can inspire you to resolve writing challenges" class="wp-image-2958" data-dcnode-id="904" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/Laura-Tait-co-writer-with-Jimmy-Rice.png 735w" width="200"></a></figure></div><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Three of my strongest sources of inspiration are:</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">My friends&nbsp;</span></strong></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">I see my mates a lot, and they’re&nbsp;a constant source of comedy.&nbsp;They make me laugh loads, and it inspires me to make the ‘funny’ scenes as natural as possible. Readers aren’t stupid, and I think they can tell if a joke&nbsp;is forced, so I try to let humour play out the way it does in in real-life situations.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="887"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Music</span></strong></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">I’m never not listening to music – at work, during dinner, while I walk. Like with books, I can love one song because it’s deep, clever and ambiguous and love the next because it’s simple and feel-good. My iPod on shuffle is beyond random – so far today it’s gone from Vampire Weekend to East 17 to Elvis Costello to Phantom of the Opera to Muse to Lithuania’s entry in the 2013 Eurovision Song Contest.&nbsp;I’m especially inspired by clever, witty lyrics – Belle &amp; Sebastian are my favourite band. I know some writers prefer the quiet – including my co-writer, Jimmy Rice (though that might just be to stop me singing) – but it stops me feeling restless.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="880"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Other writers</span></strong></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Whenever I hit a mental wall with my writing I take a break, and go and read a chapter of a book I love. As well as reminding me how to string a sentence together, it gives me a reader’s perspective, so I find when I go back to my computer I’m no longer agonizing over how to phrase that one sentence I’ve been tearing my hair out over for 45 minutes, but instead thinking about how to get the story out.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="872"><em data-dcnode-id="873"><span data-dcnode-id="875" instrument_node="">Laura Tait, 33, is a writer for ‘Stylist’ and ‘Shortlist’ magazines in London and co-author of ‘The Best Thing That Never Happened To Me’ (with Jimmy Rice). Their second novel is out in January 2016. You can find her on Twitter via @TaitGallery.</span><br data-dcnode-id="874"></em></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="868"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">K.M. Weiland</span></strong></p><span data-dcnode-id="867" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="863"><figure class="alignleft" data-dcnode-id="864"><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction.png"><img alt="KM Weiland on how to get inspired to write. " class="wp-image-3002" data-dcnode-id="866" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-200x300.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-200x300.png 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-683x1024.png 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-267x400.png 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-233x350.png 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction-480x720.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/04/KM-Weiland-on-the-sources-of-inspiration-for-writing-historical-fiction.png 735w" width="200"></a></figure></div><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">I like to say that inspiration is everywhere—and it really is. I’ve picked ideas from such disparate places as the dust on my windowsill (I’m a terrible duster) to my pets to the grapefruit I had for breakfast. It’s really just a matter of being open to whatever you’re experiencing at the moment.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">But I will say that most of my inspiration is usually the result of other people’s art. The three big ones are most definitely books, movies and music.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">I feed off other people’s stories and glean little tidbits that inspire stories of my own. The characters and themes in books and movies and the half-answered questions in songs are endless sources of inspiration for me.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="834"><em data-dcnode-id="837"><span data-dcnode-id="851" lang="zxx"><span data-dcnode-id="852" instrument_node="">K.M. Weiland</span></span><span data-dcnode-id="850" instrument_node=""> is the IPPY and NIEA Award-winning and internationally published author of the Amazon bestsellers ‘</span><span data-dcnode-id="848" lang="zxx"><span data-dcnode-id="849" instrument_node="">Outlining Your Novel’</span></span><span data-dcnode-id="847" instrument_node=""> and ‘</span><span data-dcnode-id="845" lang="zxx"><span data-dcnode-id="846" instrument_node="">Structuring Your Novel’</span></span><span data-dcnode-id="844" instrument_node="">, as well as ‘</span><span data-dcnode-id="842" lang="zxx"><span data-dcnode-id="843" instrument_node="">Jane Eyre: The Writer’s Digest Annotated Classic’</span></span><span data-dcnode-id="841" instrument_node="">. She writes historical and speculative fiction from her home in western Nebraska and mentors authors on her award-winning website </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.helpingwritersbecomeauthors.com/"><span data-dcnode-id="839" lang="zxx"><span data-dcnode-id="840" instrument_node="">Helping Writers Become Authors</span></span></a></em><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">. You can follow her on Twitter via @KMWeiland.</span></em></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">Where do you find your writing inspiration? Tell us in the comments below, then get inspiration for stories using our </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/start-writing-a-book" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="831" instrument_node="">story brainstorming dashboard</span></a><span data-dcnode-id="829" instrument_node="">. </span></p><span data-dcnode-id="827" instrument_node="">

By Jordan </span></h2><span data-dcnode-id="691" instrument_node="">
