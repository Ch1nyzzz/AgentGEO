</span><span data-dcnode-id="2419" id="freeTextContainer16687314926560440514"><span data-dcnode-id="2426" instrument_node=""> "A Problem"....</span><br data-dcnode-id="2425"><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">What would happen, wonders Borges, if due to his belief in these fantasies, Don Quixote attacks and kills a real person? Borges asks a fundamental question about the human condition: what happens when the yarns spun by our narrating self cause grievous harm to ourselves or those around us? There are three main possibilities, says Borges.</span><br data-dcnode-id="2422"><br data-dcnode-id="2421"><span data-dcnode-id="2420" instrument_node="">One option is that nothing much happens. Don Quixote will not be bothered at all by killing a real man. His delusions are so overpowering that he</span></span><span data-dcnode-id="2418" instrument_node="">
</span><span data-dcnode-id="2404" id="freeText16687314926560440514" style="display:none"><span data-dcnode-id="2417" instrument_node=""> "A Problem"....</span><br data-dcnode-id="2416"><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node="">What would happen, wonders Borges, if due to his belief in these fantasies, Don Quixote attacks and kills a real person? Borges asks a fundamental question about the human condition: what happens when the yarns spun by our narrating self cause grievous harm to ourselves or those around us? There are three main possibilities, says Borges.</span><br data-dcnode-id="2413"><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">One option is that nothing much happens. Don Quixote will not be bothered at all by killing a real man. His delusions are so overpowering that he will not be able to recognise the difference between committing actual murder and dueling with the imaginary windmill giants. </span><br data-dcnode-id="2410"><br data-dcnode-id="2409"><span data-dcnode-id="2408" instrument_node="">Another option is that once he takes a person’s life, Don Quixote will be so horrified that he will be shaken out of his delusions. This is akin to a young recruit who goes to war believing that it is good to die for one’s country, only to end up completely disillusioned by the realities of warfare.</span><br data-dcnode-id="2407"><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">But there is a third option, much more complex and profound. As long as he fought imaginary giants, Don Quixote was just play-acting. However once he actually kills someone, he will cling to his fantasies for all he is worth, because only they give meaning to his tragic misdeed. Paradoxically, the more sacrifices we make for an imaginary story, the more tenaciously we hold on to it, because we desperately want to give meaning to these sacrifices and to the suffering we have caused.</span></span><span data-dcnode-id="2403" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2326" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2331" size="15x15"><span data-dcnode-id="2332" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2330" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2329" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2328" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2327" size="15x15"></span></span><span data-dcnode-id="2325" instrument_node="">
</span><span class="greyText" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">&nbsp;·&nbsp;</span></span><span data-dcnode-id="2322" instrument_node="">
</span><a class="lightGreyText" data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2747147-labyrinths" title="Paperback 9780140029819"><span data-dcnode-id="2321" instrument_node="">review of another edition</span></a><span data-dcnode-id="2319" instrument_node="">

</span><span class="readable" data-dcnode-id="2203" id="reviewTextContainer3617908442"><span data-dcnode-id="2315" instrument_node="">
</span><span data-dcnode-id="2310" id="freeTextContainer12339503686424764030"><span data-dcnode-id="2314" instrument_node="">It's eighty-one years since the earliest of these stories was published in Spanish, fifty-eight since they appeared in English. Academic critics have spent years or decades studying them. What could I, an ordinary reader, possibly have to say about this collection that won't have been said before? The answer is 'zilch', of course. Consequently, these notes are merely an aide memoire to my reading and offer no original insight. </span><br data-dcnode-id="2313"><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">In my preferred reading, it all begins with Kafka and Borges. Calvino</span></span><span data-dcnode-id="2309" instrument_node="">
</span><span data-dcnode-id="2208" id="freeText12339503686424764030" style="display:none"><span data-dcnode-id="2308" instrument_node="">It's eighty-one years since the earliest of these stories was published in Spanish, fifty-eight since they appeared in English. Academic critics have spent years or decades studying them. What could I, an ordinary reader, possibly have to say about this collection that won't have been said before? The answer is 'zilch', of course. Consequently, these notes are merely an aide memoire to my reading and offer no original insight. </span><br data-dcnode-id="2307"><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">In my preferred reading, it all begins with Kafka and Borges. Calvino, Perec, Sebald - they all tip their caps to these two masters. For me, the early Borges stories constitute an ur-text, tales to be consulted again and again. Borges was fascinated with immortality and in the composition of these short tales, he discovered the closest thing to it. </span><br data-dcnode-id="2304"><br data-dcnode-id="2303"><span data-dcnode-id="2302" instrument_node="">My bookshelves have long possessed two volumes of Borges's works, </span><i data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Ficciones</span></i><span data-dcnode-id="2299" instrument_node=""> and </span><i data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2296" instrument_node="">. Borges had been largely ignored by the English-speaking world (now there's a surprise, isn't it?). In 1962, two overlapping collections arrived, an event that must surely have amused the author. Both collections were translated by collectives, the former dominated by Anthony Kerrigan, the latter to a lesser extent by James Irby (it's telling that neither man rates his own page in the English language Wikipedia). I have to say, I find Kerrigan's translations the more elegant, notwithstanding the appearance of a third collection translated by Andrew Hurley (also on my shelves). Perhaps, one day, there will be an infinite number of translations. </span><i data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Ficciones</span></i><span data-dcnode-id="2293" instrument_node=""> comprises </span><i data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">The Garden of Forking Paths</span></i><span data-dcnode-id="2290" instrument_node=""> (1941) and </span><i data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Artifices</span></i><span data-dcnode-id="2287" instrument_node=""> (1944). </span><i data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2284" instrument_node=""> takes selections from </span><i data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Ficciones</span></i><span data-dcnode-id="2281" instrument_node=""> and from </span><i data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">El Aleph</span></i><span data-dcnode-id="2278" instrument_node=""> (1949), adding to them a number of early essays and 'parables' from the collection </span><i data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">El Hacedore</span></i><span data-dcnode-id="2275" instrument_node=""> (1960). In so doing, the Irby and Yates collection omits </span><i data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">The South</span></i><span data-dcnode-id="2272" instrument_node="">, unforgivably, in my opinion. </span><br data-dcnode-id="2271"><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">Labyrinths, libraries, the infinite, eternity, death, dreams, unreality, repetition, heresiarchs, demiurges, big cats, secret societies, crime fiction, the bible, the Koran, Quixote, Shakespeare, Berkeley, Hume, Schopenhauer... These are some of the materials out of which Borges spins his yarns of the fantastic and the metaphysical. A condemned man asks God for one more year to write his masterwork, with unforeseen consequences (it's clearly one of those demiurges who took the call). A man sleeps among ancient sacred ruins to dream alive a son. Again, the results are unpredictable. An academic rewrites three chapters of </span><i data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">The Quixote</span></i><span data-dcnode-id="2266" instrument_node=""> by living out the process of its construction. It is identical word-for-word to the original but is </span><i data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">better</span></i><span data-dcnode-id="2263" instrument_node=""> than Cervantes' version. An apparently simple boy learns that his memory is infinite. A librarian (Borges's day job) works in an infinite building in which all books are possible but most constitute random gibberish (Borges surely foresaw the internet-assisted rise of self-publishing). </span><br data-dcnode-id="2262"><br data-dcnode-id="2261"><span data-dcnode-id="2260" instrument_node="">There are stories here that would earn the collection five stars by themselves, even if the remainder were garbage, which they're not, of course. </span><i data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Tlön, Uqbar, Orbis Tertius</span></i><span data-dcnode-id="2257" instrument_node="">, </span><i data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">The Lottery in Babylon</span></i><span data-dcnode-id="2254" instrument_node="">, </span><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Funes the Memorius</span></i><span data-dcnode-id="2251" instrument_node="">, </span><i data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Death and the Compass</span></i><span data-dcnode-id="2248" instrument_node="">... ah, what works! Imagine having written just one of those. I do feel that there's an ever-so-slight dropping off of the consistency in </span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">El Aleph</span></i><span data-dcnode-id="2245" instrument_node=""> (the title tale of which is omitted, for some reason). </span><i data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">The Immortal</span></i><span data-dcnode-id="2242" instrument_node="">, </span><i data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">The Zahir</span></i><span data-dcnode-id="2239" instrument_node=""> and </span><i data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">The Waiting</span></i><span data-dcnode-id="2236" instrument_node=""> are all classic Borges, though. </span><br data-dcnode-id="2235"><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">Borges never wrote a 1000-page work, not for him the Great Argentine Novel - all the better for us and our literary indolence. Besides which, </span><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Tlön, Uqbar, Orbis Tertius</span></i><span data-dcnode-id="2230" instrument_node=""> achieves more than most books fifty times its length. I like to think of Borges as being that little bit too laid back to bother with the writing of novels, having too much fun hanging out with Adolfo Bioy Casares, Victoria and Silvina Ocampo. </span><br data-dcnode-id="2229"><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">It's worth noting what a remarkable effort has been made to describe the book on its Goodreads page. One of the editors is James </span><i data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Yerby</span></i><span data-dcnode-id="2224" instrument_node=""> and it merely contains a list of the contents, lacking correct capitalisation and with some howlers: </span><i data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Tiön, uqbar, Orbis Tertius</span></i><span data-dcnode-id="2221" instrument_node="">, </span><i data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Emmas Zunz</span></i><span data-dcnode-id="2218" instrument_node="">, </span><i data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">The Zhir</span></i><span data-dcnode-id="2215" instrument_node="">! I'm not worthy to be a Goodreads librarian, apparently, so I don't think I can correct it. </span><br data-dcnode-id="2214"><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">Many people use the internet for relentless self-promotion, so why should I be any different? Here's my tribute: </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairlightbooks.co.uk/brief-literary-career-lewis-burgess/" rel="nofollow noopener"><span data-dcnode-id="2211" instrument_node="">The Brief Literary Career of Lewis Burgess</span></a><span data-dcnode-id="2209" instrument_node="">. You could even increase its woeful 'like' count!</span></span><span data-dcnode-id="2207" instrument_node="">

</span><span data-dcnode-id="2123" id="freeTextContainer12344632214840766261"><span data-dcnode-id="2124" instrument_node="">Borges typically gets lumped into the South American "magical realism" genre along with the likes of Gabriel Garcia Marquez (whom I've still yet to read; shame on me). But his style is very peculiar. The book is supposed to be a collection of short stories, or as Borges himself called them, ficciones. But few of them are what one would typically consider stories at all. They tend to be short fictional essays, book reviews, obituaries, articles, etc. (There's also a detective story and a couple o</span></span><span data-dcnode-id="2122" instrument_node="">
</span><span data-dcnode-id="2117" id="freeText12344632214840766261" style="display:none"><span data-dcnode-id="2121" instrument_node="">Borges typically gets lumped into the South American "magical realism" genre along with the likes of Gabriel Garcia Marquez (whom I've still yet to read; shame on me). But his style is very peculiar. The book is supposed to be a collection of short stories, or as Borges himself called them, ficciones. But few of them are what one would typically consider stories at all. They tend to be short fictional essays, book reviews, obituaries, articles, etc. (There's also a detective story and a couple of first hand narratives.) Borges reviews books that have never been written, eulogizes people who have never lived, and writes articles refuting scholars that don't exist. And why? The best I could tell was that he wanted to explore what the world would be like if modern philosophy were actually true. He toys with Bishop Berkeley's idea that the physical world need not necessarily exist. So long as the sense perceptions it supposedly creates affect our consciousness it's material existence is superfluous. He also plays with Hume's denial of the existence of personal identity. Need it necessarily be the case that this string of sense perceptions which I call myself has any actual unity? Need it necessarily constitute a "person" at all? What if it is nothing more than a random string of impressions? Also, Borges enjoys meddling with the sequence of time itself. If two events happened in exactly the same way, why could they not simply be the same event? Is it necessary to posit the idea of temporal sequence at all? Could not all moments be entirely unrelated to each other? If these thoughts sound bizarre, that's because they are. But the "philosophers" are out there thinking them and Borges fictional rendering of their implications is as interesting a presentation of these ideas as one is likely to run across.</span><br data-dcnode-id="2120"><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">Another major theme of Borges thinking, and perhaps the most representative expression of his view of reality, centers on the notion of Labyrinths. For him, the mystery of reality can be best summarized by as a grand labyrinth. It is a puzzle which gives the appearance of reason/order to those trapped within its confines but which in truth is nothing more than an elaborate game. What does one accomplish upon reaching the center of a labyrinth? Is there indeed any purpose at all to the journey? And yet how can a man help but attempt it? Yet ultimately there is no meaning behind the movement; only the appearance of meaning; truly a torturous state for humans to find themselves in. But then again, that's where the modern quest has left us all at present. Final verdict: interesting but not amazing. Intensely cerebral fiction and so probably not to the taste of everyone; but short enough to make some dabbling in the work worthwhile.</span></span><span data-dcnode-id="2116" instrument_node="">

</span><b data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node=""> "It is doubtful that the world has a meaning; It is even more doubtful that it has a double or triple meaning, the unbeliever will observe."</span></b><span data-dcnode-id="2024" instrument_node="">
</span></blockquote><br data-dcnode-id="2022"><span data-dcnode-id="2021" instrument_node="">Jorge Luis Borges has composed only small essays and short fictional works.</span><br data-dcnode-id="2020"><span data-dcnode-id="2019" instrument_node="">Somebody told me that he is very intelligent and writes in a mathematical style. What? Maths in Fiction! No not maths. Only mathematical style! He was an Argentine by birth and through this book, I was reading him for the first time in detail. His </span><i data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node=""> Emma Zunz</span></i><span data-dcnode-id="2016" instrument_node=""> was the only story I </span></span><span data-dcnode-id="2014" instrument_node="">
</span><span data-dcnode-id="1969" id="freeText15023648205523751785" style="display:none"><blockquote data-dcnode-id="2009"><span data-dcnode-id="2013" instrument_node="">
</span><b data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node=""> "It is doubtful that the world has a meaning; It is even more doubtful that it has a double or triple meaning, the unbeliever will observe."</span></b><span data-dcnode-id="2010" instrument_node="">
</span></blockquote><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">Jorge Luis Borges has composed only small essays and short fictional works.</span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">Somebody told me that he is very intelligent and writes in a mathematical style. What? Maths in Fiction! No not maths. Only mathematical style! He was an Argentine by birth and through this book, I was reading him for the first time in detail. His </span><i data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node=""> Emma Zunz</span></i><span data-dcnode-id="2002" instrument_node=""> was the only story I had read so far. I was not let down. Not only mathematical, I found his fiction universal and too much symbolic also. Those features are very clear and visible. This book contains some twenty-three short works of fiction and almost ten essays. Essays are also short and precise. There are some short parables in the end.</span><br data-dcnode-id="2001"><br data-dcnode-id="2000"><span data-dcnode-id="1999" instrument_node="">I began with the Essays first and read the essay titled </span><i data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">"The wall and the books" </span></i><span data-dcnode-id="1996" instrument_node="">, where he has presented his thoughts on that Chinese emperor who erected the wall of china and ordered to burn all the books that were published before him, to erase the history. He wanted history to start from his reign. Borges has expressed his thoughts on such an emperor and this tendency of burning history. There are some other interesting essays too, "Kafka and his precursors" and " The mirror of enigmas". I found them enlightening.</span><br data-dcnode-id="1995"><br data-dcnode-id="1994"><span data-dcnode-id="1993" instrument_node="">In the short stories, there is such a precision that I can only call it masterly!</span><br data-dcnode-id="1992"><i data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">"Why to take five hundred pages," he asks " to develop an idea whose oral demonstration fits into a few minutes."</span></i><span data-dcnode-id="1989" instrument_node=""> This statement confirms his attitude and approach. There are mysteries and detective tales. His metaphysical fiction took me time to get hold of. </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Borges once claimed that the basic devices of all the fantastic literature are only four in number: the work within the work, the contamination of reality by the dream, the voyage in time, and the double! </span></i><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node="">Aren't these parameters interesting?</span><br data-dcnode-id="1984"><br data-dcnode-id="1983"><span data-dcnode-id="1982" instrument_node="">Out of the stories, the first story that I read was "</span><i data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node=""> the Garden of the forking path"</span></i><span data-dcnode-id="1979" instrument_node="">. I will call it an interesting philosophical rumination, It's a riddle and parable and its theme is time. Labyrinth of time!</span><i data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">"The Lottery in Babylon "</span></i><span data-dcnode-id="1976" instrument_node=""> was another one that I read, here in an ancient town people play the lottery- lottery. They pay in copper coins and hope to win silver coins in return and it is beautifully written. The narrator comes from a dizzy land where the lottery is the basis of reality. </span><i data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node=""> "I have known what the Greeks do not know. Certitude."</span></i><span data-dcnode-id="1973" instrument_node=""> The Babylonians threw themselves into the game and those who did not acquire chances were considered pusillanimous, cowardly. Lottery becomes life there, Somebody wrote that this story was an allegory of totalitarianism. Maybe it was but for me, it was a story of chance and the author played amazingly well with the vehemence of human nature and emotions.</span><br data-dcnode-id="1972"><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">There are other stories and essays that I liked in this book, I am going to revisit Borges again for sure, While reading these stories, especially the above two that I mentioned, the one contemporary author who instantly appeared in my imagination was Orhan Pamuk, because similar traits and philosophical ruminations with the mathematical precision, I had experienced in his books too. There is one thing that I would like to say in the end that though I liked his work in this book for its symbolism, many people may dislike it for the same reason, because If you don't like such prose, You may find it dull and dreary. For me, the book was a winner.</span></span><span data-dcnode-id="1968" instrument_node="">

</span><span data-dcnode-id="1884" id="freeTextContainer10900109657812310630"><span data-dcnode-id="1888" instrument_node="">My first Borges book, or shall I say, "My first Borges experience!"</span><br data-dcnode-id="1887"><br data-dcnode-id="1886"><span data-dcnode-id="1885" instrument_node="">Labyrinths is broken down to three sections: Fictions, Essays, and Parables. It starts complicated enough with the first story, and despite the false appearance to grow simpler, it gets more complicated as the book progresses. These are not short stories; these are conundrums blending fact, fiction, reality, and dreams. I cannot begin to fathom the amount of research that went to his stories, as even today, with the World Wide We</span></span><span data-dcnode-id="1883" instrument_node="">
</span><span data-dcnode-id="1866" id="freeText10900109657812310630" style="display:none"><span data-dcnode-id="1882" instrument_node="">My first Borges book, or shall I say, "My first Borges experience!"</span><br data-dcnode-id="1881"><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">Labyrinths is broken down to three sections: Fictions, Essays, and Parables. It starts complicated enough with the first story, and despite the false appearance to grow simpler, it gets more complicated as the book progresses. These are not short stories; these are conundrums blending fact, fiction, reality, and dreams. I cannot begin to fathom the amount of research that went to his stories, as even today, with the World Wide Web it would have taken me years to find and understand the vast amount of 'data' he throws around as if nothing. Jorge Luis Borges was a genius, a mad genius. </span><br data-dcnode-id="1878"><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">There were times when, while reading the book, I did not know whether to continue reading or whether to blow my head off. The only other book that made me feel this way was Anacalypsis by Sir Godfrey Higgins. Borges masterfully manipulates dream-like states and combines them with historical facts, mind-boggling revelations, and all this while looking at things from angles one would normally not consider. To be honest, I'm not even sure I understood this book completely (if that is even possible) but I already know I'll have to reread it. </span><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">There were stories and essays that made me question my own sanity, my own understanding of the world. There were beautiful stories that I read twice (The Library of Babel; The Secret Miracle; The Immortal; Deutsches Requiem; The Zahir). And then there were pieces that just blew me away and left me puzzled (The wall and the Books; A New Refutation of Time, for example). </span><br data-dcnode-id="1873"><br data-dcnode-id="1872"><span data-dcnode-id="1871" instrument_node="">In the end, I feel I have nothing new to say about this book that has not been said before. I'm left perplexed, yet strangely satisfied. I'm left wondering while my mind wanders, hungry for more yet unable to swallow one more morsel for fear of exploding. This will not be my favorite book of all time, it will not go down as the most memorable read of the year either...but...Borges, you shook my world in a profound, inexplicable way. </span><br data-dcnode-id="1870"><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node=""> </span><br data-dcnode-id="1867"></span><span data-dcnode-id="1865" instrument_node="">

</span><span data-dcnode-id="1747" id="freeText17520300909320635823" style="display:none"><span data-dcnode-id="1754" instrument_node="">This is the first Borges book I ever read. Since then, of course, he's died and all of his short stories have been collected in English. Mike Miley, the person who spends more money on books than anyone I've ever known (and is very generous in sharing them), purchased that complete collection, bringing it up to the cottage in Michigan during his last visit. When I saw it amidst Michael's travel bags (a small one for clothes, a big one for books and papers) I immediately asked if I could have at it. Permission granted, I probably got through the whole thing--and it's long--in a couple of evenings and nights by the wood-burning stove. Thus, all of the Labyrinths stories have been read at least twice now.</span><br data-dcnode-id="1753"><br data-dcnode-id="1752"><span data-dcnode-id="1751" instrument_node="">What I particularly like about Borges is his creative erudition. Not only is he good at mimicking the style, say, of a early sixteenth century Spanish bureaucrat, but he cleverly mingles the real with the fantastical in his often copious references, notes and asides. It makes one wonder who is to be credited for the technique which is also employed by the American authors James Branch Cabell and H.P. Lovecraft.</span><br data-dcnode-id="1750"><br data-dcnode-id="1749"><span data-dcnode-id="1748" instrument_node="">P.S. Borges visited Loyola University shortly before his death in the eighties, speaking in its chapel--perhaps the only event I ever attended there.</span></span><span data-dcnode-id="1746" instrument_node="">

</span><span data-dcnode-id="1659" id="freeText801106556493004775" style="display:none"><span data-dcnode-id="1660" instrument_node="">Mind-blowingly awesome. I only wish that for the first book that I read of Borges that it was either all short stories or all essays; I had difficulty making the transition from the last story to the first essay because the lyrical cadence of his writing style made his beautifully written essays seem almost fictive. The parables at the very end of the compilation were the cherries on top. Borges' love of all things Quixote makes me want to hunker down with that book and read, re-read, and re-re-read it until it has the mantric effect that it apparently had on him. Dostoevsky made me want to learn Russian to read him in his native language - Borges has the same effect on me w.r.t. Spanish. I'm reminded yet again how embarrassing it is to be an American monoglot. </span></span><span data-dcnode-id="1658" instrument_node="">

</span><span data-dcnode-id="1552" id="freeTextContainer10059405469224233254"><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node="">Jorge Francisco Isidoro Luis Borges not only possessed one mouthful of a name but a great literary talent. There is much that could be criticised in his manner and style, in many of his pieces his 'fictions' come across as formulaic, mathematical and structured, which at times fails to allow emotion to be properly conveyed. Yet Borges was a conscious and thinking author, despite appearing to err on the logical side of the writing spectrum, addressing his fictional work as a means to explore deep</span></span><span data-dcnode-id="1551" instrument_node="">
</span><span data-dcnode-id="1516" id="freeText10059405469224233254" style="display:none"><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">Jorge Francisco Isidoro Luis Borges not only possessed one mouthful of a name but a great literary talent. There is much that could be criticised in his manner and style, in many of his pieces his 'fictions' come across as formulaic, mathematical and structured, which at times fails to allow emotion to be properly conveyed. Yet Borges was a conscious and thinking author, despite appearing to err on the logical side of the writing spectrum, addressing his fictional work as a means to explore deep philosophical or metaphysical ideas and concepts. What is further fascinating is that Borges also created some fictional book titles, referenced in an academic way to add to</span><br data-dcnode-id="1548"><br data-dcnode-id="1547"><span data-dcnode-id="1546" instrument_node="">There are some who have said that Borges mainly wrote such very short and compact fictions (I consciously refer to these as 'fictions' because they lack the same narrative structure as a typical short story) because he possessed a degree of 'laziness' as a writer. Not that Borges did not possess a work ethic, after all he wrote many deeply thought out stories, but more that Borges did not have the patience and desire to write longer and to go through the paces of working out</span><br data-dcnode-id="1545"><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">If one looks at the period in which Borges was alive - 1899 to 1986 - one can notice pretty quickly the significance. Borges was alive through both World Wars and the Cold War. In that sense, Borges is </span><i data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">the</span></i><span data-dcnode-id="1540" instrument_node=""> quintessential 20th Century author. He, more than anyone, shows in his writing how the events of his era defined his ideologies and shows off aspects of modernity and pre-post-modernity. </span><br data-dcnode-id="1539"><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">Borges is an author who not only thinks deeply but experiments. Each of his fictions play on different genres, crafting parodies of detective fiction, theological debate, fantasy (or magical realism), horror and so on. Borges sometimes moves into creating a pastiche, but more commonly his parody is actively pushing against genre boundaries. He will start the reader on a particular path, only to pause at a set point and reveal to the reader how and what he is doing in regards to genre.</span><br data-dcnode-id="1536"><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">There are a selection of different themes that Borges regularly repeats. The word 'labyrinth' or some variation often makes its way into his lexicon along with mirrors, libraries, novels, theology, tigers (or jaguars) and knives. Each of these words helps provide a particular intertextual and metalinguistic function, linking Borges entire oeuvre together. Indeed, it is fascinating that the title of his work here is 'Labyrinths' considering the regularity in which the phrase appears. </span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">It is also interesting that considering the title, the piece I found most appealing in this work was 'The House of Asterion'. In this, Borges takes a look at the tale of Asterion </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1524" style="display: none"><span data-dcnode-id="1528" instrument_node="">[The Minotaur </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1525" instrument_node="">]</span></span><span data-dcnode-id="1523" instrument_node=""> from a new, modern perspective. Many know the story of the labyrinth and Daedalus (interestingly Borges himself becomes a kind of Daedalus of fiction) but Borges takes that story and breathes new life into it, though the story itself is only two and a half pages long.</span><br data-dcnode-id="1522"><br data-dcnode-id="1521"><span data-dcnode-id="1520" instrument_node="">Unlike a maze, a labyrinth has only one set path with no choices and one exit that serves to be the same as the entrance. Borges himself constructs labyrinths out of text, questioning as Plato did, whether there is one real version of everything that is corporeal. A real version existing elsewhere, beyond reality. This does not mean that Borges finishes where he began, necessarily, however his work does lead the reader on a set path before causing them to look back and recognise that the way back is the very same way they have come.</span><br data-dcnode-id="1519"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">The work of Jorge Luis Borges is a must read for any individual with a deep love for important literature classics. His work, for its sheer influence on modernist authors and postmodern authors and on to the current era, should be recognised as tremendously influential and remains important today. Though Borges, I have come to see, is more of an acquired taste, his work sparkles from time to time with truly appealing thought and wisdom.</span></span><span data-dcnode-id="1515" instrument_node="">

</span><span data-dcnode-id="1056" id="freeTextContainer6966922946505441418"><span data-dcnode-id="1063" instrument_node="">Did you ever wonder where the ideas came from for The Matrix, for Inception, and other amazing fantasies? Borges</span><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">Borges is unique; a metaphysician schooled in the classics and 19th century English literature, and with a very gifted imagination. His short stores – and he wrote no novels – are concise, elegant, ambiguous, highly imaginative, and often require several readings to catch the multiple meanings. </span><br data-dcnode-id="1059"><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">Borges’ references to labyrinths probably are intended to convey how complex and puzzling th</span></span><span data-dcnode-id="1055" instrument_node="">
</span><span data-dcnode-id="987" id="freeText6966922946505441418" style="display:none"><span data-dcnode-id="1054" instrument_node="">Did you ever wonder where the ideas came from for The Matrix, for Inception, and other amazing fantasies? Borges</span><br data-dcnode-id="1053"><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node="">Borges is unique; a metaphysician schooled in the classics and 19th century English literature, and with a very gifted imagination. His short stores – and he wrote no novels – are concise, elegant, ambiguous, highly imaginative, and often require several readings to catch the multiple meanings. </span><br data-dcnode-id="1050"><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">Borges’ references to labyrinths probably are intended to convey how complex and puzzling the world is and how nearly impossible it is to know with any real certainty. Similarly, he believed our attempts at philosophical systems are doomed. He said: “If life's meaning were explained to us, we probably wouldn't understand it. To think that a man can find it is absurd.”</span><br data-dcnode-id="1047"><br data-dcnode-id="1046"><span data-dcnode-id="1045" instrument_node="">David Foster Wallace wrote that “Borges' only modern equal was Kafka, but Borges’ stories are designed primarily as metaphysical arguments and they show a first-rate human mind stripped of all foundations in religious or ideological certainty. The stories are inbent, with the oblique terror of a game whose rules are unknown and its stakes everything.”</span><br data-dcnode-id="1044"><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">Borges once said “My father's library has been the chief event in my life . . . the truth is that I have never emerged from it.” He humbly viewed himself more as a reader than a writer. He had his first eye operation at age 27 and became blind in his 50s, which unfortunately severely limited his writing.</span><br data-dcnode-id="1041"><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">Tlon, Uqbar, Orbis Terius</span><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">The narrator stumbles across a centuries old conspiracy of a secret society of intellectuals who created an imaginary world, but not just any world – one that followed Bishop Berkeley’s form of idealism expanded to include time; nothing can exist separate from our perception of it. The intent of the scholars was to disintegrate the real world by spreading the rules of the imaginary world. Written in the 1930s, maybe Borges was cautioning us about the tyranny inherent in any highly organized society. It’s an amazing story.</span><br data-dcnode-id="1036"><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">The Garden of Forking Paths</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">This begins as a spy story, but becomes a riddle inside a riddle inside another riddle. A book by the spy’s grandfather that makes no sense is based on the bifurcation of time which allows for a multitude of choices at every point in time, which leads to a multitude of different paths and therefore becomes a labyrinth itself. Fabulous story.</span><br data-dcnode-id="1031"><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">The Lottery in Babylon</span><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">It can be viewed a discussion of determinism versus free will, or on how many people will prefer life based on chance, and/or how a secret dictatorial society can have hold over a population. </span><br data-dcnode-id="1026"><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">Pierre Menard, Author of the Quixote</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">Taking his cue from T.S. Elliot, Borges creates a review of a fictional author who reproduces Don Quixote (not copies, but independently writes the very same text) and pronounces it superior to the original because of the differences in time and perception.</span><br data-dcnode-id="1021"><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">The Circular Ruins</span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">A mystical story about dream within a dream brings questions about the possible unreality of the world.</span><br data-dcnode-id="1016"><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">The Library of Babel</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">The library (or the universe) is endless with an infinite number of books arranged randomly and the books themselves are written entirely randomly so somewhere there may the book that holds all the answers (man’s vindication), but since everything is entirely random, it is useless to try to find. A model of the world’s complexity and man’s futility.</span><br data-dcnode-id="1011"><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">Funes the Memorious</span><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">If we had absolute total recall, would we be able to use Plato’s idealized forms? Would not each object be so distinct and therefore unrelated to others due our memory of details, we could not make sense of a word like ‘pencil’ or ‘apple’ or ‘dog?’ Would the gift of details then eliminate our ability for abstractions? Borges is asking if there is such a thing as pure observation, and are we not always making subtle changes to what we see to fit our perceptions.</span><br data-dcnode-id="1006"><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">The Secret Miracle</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">Borges elegantly destroys the notion of time and, by doing so, the value of time.</span><br data-dcnode-id="1001"><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">Three Versions of Judas</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">Another review of a fictitious author, this time a book about Judas which shows the value of Judas and role he played.</span><br data-dcnode-id="996"><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">Death and the Compass</span><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">Borges enjoys the detective genre and in this story a scholarly detective unravels a pattern to three murders by interpreting Kabbalistic symbols and predicts the location for the fourth, only to become the prey as he outsmarts himself.</span><br data-dcnode-id="991"><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">Reading Borges has been an interesting experience – he is unique, and I would recommend him for all who are intrigued by life’s ambiguities.</span><br data-dcnode-id="988"></span><span data-dcnode-id="986" instrument_node="">

</span><span data-dcnode-id="884" id="freeTextContainer12314968730518860085"><span data-dcnode-id="888" instrument_node="">Labyrinths by Jorge Luis Borges, this book is divided in three parts; FICTION, ESSAYS and PARABLES. Basically all this three sections comprises of </span><b data-dcnode-id="886"><span data-dcnode-id="887" instrument_node=""> STORIES OF IDEAS </span></b><span data-dcnode-id="885" instrument_node=""> with the blend fact and fiction. Jorge Luis Borges seeks neither truth nor likelihood; he seeks astonishment by using metaphysics as a branch of the literature of fantasy (Like he quoted in his "Tlön, Uqbar, Orbis Tertius"). He uses themes of philosophy, politics, economics, mathematics etc and raises “n” number of paradoxes which i</span></span><span data-dcnode-id="883" instrument_node="">
</span><span data-dcnode-id="794" id="freeText12314968730518860085" style="display:none"><span data-dcnode-id="882" instrument_node="">Labyrinths by Jorge Luis Borges, this book is divided in three parts; FICTION, ESSAYS and PARABLES. Basically all this three sections comprises of </span><b data-dcnode-id="880"><span data-dcnode-id="881" instrument_node=""> STORIES OF IDEAS </span></b><span data-dcnode-id="879" instrument_node=""> with the blend fact and fiction. Jorge Luis Borges seeks neither truth nor likelihood; he seeks astonishment by using metaphysics as a branch of the literature of fantasy (Like he quoted in his "Tlön, Uqbar, Orbis Tertius"). He uses themes of philosophy, politics, economics, mathematics etc and raises “n” number of paradoxes which is beyond comprehension. </span><br data-dcnode-id="878"><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">From this collection of fiction, essays and parables I am just going to put forward my comments on few (because of my laziness).</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node=""> </span><br data-dcnode-id="873"><b data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The Garden of Forking Paths (My favourite in this collection.): </span></b><span data-dcnode-id="870" instrument_node=""> This story follows the journey of a German spy during World War I who meets a Professor who is lost in the Labyrinths of unfinished book written by his great grandfather, which is completely contradicting. Like in the third chapter the hero dies and in the fourth he is alive.</span><br data-dcnode-id="869"><img class="gr-hostedUserImg" data-dcnode-id="868" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380379115i/735214.jpg&amp;raw"><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">In this story Borges discuses about the “Dimensions of time” or “Infinite series of time”. The unfinished book (which not really unfinished) is structured with the all the possible outcomes of a single event(Chance Of Probabilities). This concept of Jorge Luis Borges is well portrayed in the movies like: Sliding Doors (English), Blind Chance (Polish), Run Lola Run (German), 12B (Tamil - Indian). Even all the new generation video games are designed with this concept. I don’t know whether any game designers thank Jorge Luis Borges for developing such a wonderful concept.</span><br data-dcnode-id="865"><br data-dcnode-id="864"><blockquote data-dcnode-id="862"><span data-dcnode-id="863" instrument_node=""> “All the time co-exist.” </span></blockquote><br data-dcnode-id="861"><b data-dcnode-id="859"><span data-dcnode-id="860" instrument_node=""> The Circular Ruins: </span></b><span data-dcnode-id="858" instrument_node=""> This is a version of Alice's Adventures in Wonderland by Jorge Luis Borges in his own way. Dreams, thoughts in our sleep; the narrator is stationed in a ruined of a burned shrine, his principle objective is to dream a man: he wanted to dream him with minute integrity and insert him into reality but night after night, the narrator dreams the man as asleep and eventually the narrator makes out life is nothing but a dream. Don’t assume the narrator himself is dreaming ...its Borges, we cannot assume.... he is a genius.</span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node=""> </span><br data-dcnode-id="855"><b data-dcnode-id="853"><span data-dcnode-id="854" instrument_node=""> The Library of Babel: </span></b><span data-dcnode-id="852" instrument_node=""> The whole universe is visualized in to a vast library with galleries hexagonal shapes and the books with the specified format, a library which doesn't just have a lot of books, it has every book that could be written with an alphabet of twenty-two letters (might be Hebrew alphabet), comma, period, and space, there are no two identical books For every person there is a book which describes their life and death. Every idea you could think of is written in books. The translation of every book into every language is also in the library.</span><br data-dcnode-id="851"><blockquote data-dcnode-id="849"><span data-dcnode-id="850" instrument_node=""> The Library is a sphere whose exact centre is any one of its hexagons and whose circumference is inaccessible. </span></blockquote><br data-dcnode-id="848"><br data-dcnode-id="847"><b data-dcnode-id="845"><span data-dcnode-id="846" instrument_node=""> Tlön, Uqbar, Orbis Tertius: </span></b><span data-dcnode-id="844" instrument_node=""> This short story about an encyclopaedia article on an unknown country called Uqbar, where state had declared that "mirrors and copulation are abominable”, since they increase the number of men (George Berkeley’s idealism which denying the reality of the world. This is what the whole story is based on). Uqbar is speculated a brave new world as the work of a secret society of astronomers, biologist, engineers, metaphysicians, poets, chemists, algebraists, moralists etc. We cannot say this is as a short story it more or less like a discussion or a debate. Greater extend of this story discuss the language which progress with the details of its language, where there are no nouns in Tlön and towards the end of this story the narrator even mentions the chance of “Specious reasoning” which would have resulted in the creation of this unknown country.</span><br data-dcnode-id="843"><br data-dcnode-id="842"><b data-dcnode-id="840"><span data-dcnode-id="841" instrument_node=""> The Lottery in Babylon: </span></b><span data-dcnode-id="839" instrument_node=""> It took a lot of time for me to understand the Labyrinths of this story; this is about the lottery in the mystic city of Babylon which deals with the lottery of life and existence.</span><br data-dcnode-id="838"><br data-dcnode-id="837"><b data-dcnode-id="835"><span data-dcnode-id="836" instrument_node=""> The Secret Miracle : </span></b><span data-dcnode-id="834" instrument_node=""> The Wheel of time (Kalachakra) is explored in this story through a play writer who is in the final stage of completing his play. There is no end ...everything will be repeated.</span><br data-dcnode-id="833"><br data-dcnode-id="832"><b data-dcnode-id="830"><span data-dcnode-id="831" instrument_node=""> Funes the Memorious: </span></b><span data-dcnode-id="829" instrument_node=""> Tells the memories the narrator about Ireneo Funes, who lives in Uruguay with extraordinary skills for an example he can tell the accurate time without looking into clock but unfortunately he becomes bed ridden as he met with an accident while riding a horse, on bed he discusses lot of ideas on language, memories and mathematics and dies at the age of 19.</span><br data-dcnode-id="828"><br data-dcnode-id="827"><b data-dcnode-id="825"><span data-dcnode-id="826" instrument_node=""> The Shape of the Sword: </span></b><span data-dcnode-id="824" instrument_node=""> An Irish man who narrates the story on how he got a large scar on his face, the story flew back to the period of Irish War of Independence and the day which he spent with his new comrade who was a coward and scared of being hurt; stayed inside their Gen’s house showcasing his old injuries and gradually turns to be traitor by selling himself.</span><br data-dcnode-id="823"><br data-dcnode-id="822"><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node=""> Theme of the Traitor and the Hero: </span></b><span data-dcnode-id="819" instrument_node=""> Borges takes the narrative of detective story for this one; this is about a guy who is in the quest to find the face of the assassin of his great-grandfathers who was killed some hundred years ago. This narrative progress with the discussion of Shakespearean literature especially of Julius Caesar’s assassination conspiracy. </span><br data-dcnode-id="818"><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">(Above three short stories is not dealing with new concepts but Borges deals these with his bizarre narratives which makes these special.)</span><br data-dcnode-id="815"><br data-dcnode-id="814"><b data-dcnode-id="812"><span data-dcnode-id="813" instrument_node=""> In Essays And Parables </span></b><br data-dcnode-id="811"><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">Needless to say Borges becomes more affluent in essays and parables on this beloved themes “Time, Space, Identity.” The recurring elements of this book is all sections were Berkeleian idealism, which denies the reality of the world , Greek philosopher Zeno of Elea's paradoxes this two I was little in- accessible. Besides this Borges discuss lot about Miguel de Cervantes’s Don Quixote; in essay headed “Partial Magic in Quixote” he interrelates the plot structures of Don Quixote, The Ramayana and One Thousand and One Nights that was one of his master stroke. </span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node=""> </span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">I started this book on a good time; because Borges makes his readers to commence an independent research of their own, with the paradoxes which he puts forward. This book contains only 288 pages but the themes convey different meaning from different dimensions and some were out of my grasp.</span><br data-dcnode-id="804"><blockquote data-dcnode-id="795"><span data-dcnode-id="803" instrument_node=""> It’s a book of </span><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> “Infinite Ideas” </span></b><span data-dcnode-id="800" instrument_node="">.</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">Jorge Luis Borges becomes the end of all “IMAGINATIONS.”</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">NOBODY CAN IMAGINE BEYOND THIS. </span></blockquote></span><span data-dcnode-id="793" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="716" title="it was amazing"><span class="staticStar p10" data-dcnode-id="721" size="15x15"><span data-dcnode-id="722" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="720" size="15x15"></span><span class="staticStar p10" data-dcnode-id="719" size="15x15"></span><span class="staticStar p10" data-dcnode-id="718" size="15x15"></span><span class="staticStar p10" data-dcnode-id="717" size="15x15"></span></span><span data-dcnode-id="715" instrument_node="">

</span><span data-dcnode-id="709" id="freeTextContainer7998387187187182926"><span data-dcnode-id="710" instrument_node="">Borges miniature masterpieces reverberate with the vastness of his imagination, each short stories is a snapshot of both his endless erudition and vast imagination, as vast as the eternity which Jaromir is trapped in as he composes his masterpiece before the firing squad, as multifarious as the Judas who occupies the mind of Nile Runeberg and as mysterious as the enigmatic planet Tlon; just as Pierre Menard’s plagiarising of Don Quixote creates a richer version of the original as he suffuses his</span></span><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="685" id="freeText7998387187187182926" style="display:none"><span data-dcnode-id="707" instrument_node="">Borges miniature masterpieces reverberate with the vastness of his imagination, each short stories is a snapshot of both his endless erudition and vast imagination, as vast as the eternity which Jaromir is trapped in as he composes his masterpiece before the firing squad, as multifarious as the Judas who occupies the mind of Nile Runeberg and as mysterious as the enigmatic planet Tlon; just as Pierre Menard’s plagiarising of Don Quixote creates a richer version of the original as he suffuses his imagination with Cervantes’s, so Borges is able to suffuse the imagination with the phosphorescent beauty of his mind, iridising with the brightness of his words, all chosen with Flaubertian precision and accuracy; each story is a unique universe condensed in a few thousand words. </span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">Borges’s surreal and wonderful descriptions echo throughout his short stories, his prose is a poetic as that of the imaginary inhabitants of the imaginary planet Tlon; </span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">“There are objects of many terms; the sun and the water on a swimmer’s chest, the vague tremulous rose colour we see with our eyes closed, the sensation of being carried along by a river and also my sleep.”</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">Indeed Borges’s stories are dream-like. They capture the limitless imaginative capacities of a dream; the freedom of a dreamer’s imagination, the vastness of the human mind is as vast as the universe in which we exist, in which all it takes is a mind to create whole new worlds and a pen and paper to suffuse these worlds with life. One feels like the paralysed Ireneo Funes who in the darkness of his room is able to recreate the world with an astonishing amount of detail, as the velvet darkness which envelopes him vibrates ceaselessly; </span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">“He was the solitary and lucid spectator of a multiform, instantaneous and almost intolerably precise world. Babylon, London and New York had overwhelmed with their ferocious splendour the imaginations of men; no one, in their populous towers or their urgent avenues, has felt the heat and pressure of reality as indefatigably as that which day and night converged upon the hapless Ireneo…Funes, lying his back on his cot in the shadows, could imagine every crevice and every moulding in the sharply defined houses around him…to think is to forget differences, to generalize, to make abstractions. In the teeming world of Funes, there were only details, almost immediate in their presence.”</span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node="">Borges’s world can be dizzying, as the reader seeks the navigate the labyrinths if his imagination, some passageways are macabre, such as ‘The Lottery in Babylon’, some mysterious as ‘The Circular Ruins’, yet all are magical, Borges in many ways resembles the character who wishes to bring forth another person via his dreams, Borges wishes to bring forth entire worlds via his fantasies, infinitesimal worlds which are the product of the ecstasy of the creative process;</span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">“He perceived the sounds and forms of the universe with a certain colourlessness: his absent son was being nurtured within the diminutions of his soul. His life’s purpose was complete; the man persisted in a kind of ecstasy.”</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">Borges’s list of influences is as infinite as the Library of Babel; Kafka, Chesterton, Flaubert, folk tales, the Arabian Nights, Schopenhauer, medieval texts and the detective novel, all of these things coalesce within the synapses of Borges’s brain and send an electrical jolt down the readers spine, as they explore the world of Borges, the world of Chinese assassins and pathetic criminals, of unknown poets and lachrymose cripples, a world in which the reverberation of sunshine on the bars of a prisoner’s room is suffused with endless meaning-or perhaps, no meaning at all;</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">“By way of a spiral staircase he arrived at the oriel. The early evening moon shone through the diamonds of the window; they were red, yellow and green.”</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">“They arrived at their miserable destination: an alley’s end, with the rose coloured walls which somehow seemed to reflect the extravagant sunset.” </span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">“The end of his meditations was sudden, though it was foretold in certain signs. First (after a long drought) a faraway cloud on a hill, light and rapid as a bird, then, towards the south, the sky which had the rose colour of the leopard’s mouth; then the smoke which corroded the metallic nights; finally, the panicky flight of animals…In a birdless dawn, the magician saw the concentric blaze close round the walls…with relief, with humiliation, with terror he understood that he too was a mere appearance, dreamt by another.”</span><br data-dcnode-id="686"></span><span data-dcnode-id="684" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2426977211%3Fbook_show_action%3Dtrue"><span data-dcnode-id="622" instrument_node="">Jul 06, 2018</span></a><span data-dcnode-id="620" instrument_node="">

</span><a class="user" data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/user/show/30718608-brian" itemprop="url" name="Brian " title="Brian "><span data-dcnode-id="618" instrument_node="">Brian </span></a><span data-dcnode-id="616" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="607" title="it was amazing"><span class="staticStar p10" data-dcnode-id="612" size="15x15"><span data-dcnode-id="613" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="611" size="15x15"></span><span class="staticStar p10" data-dcnode-id="610" size="15x15"></span><span class="staticStar p10" data-dcnode-id="609" size="15x15"></span><span class="staticStar p10" data-dcnode-id="608" size="15x15"></span></span><span data-dcnode-id="606" instrument_node="">
</span><div class="uitext greyText bookshelves" data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">
            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/30718608-brian%3Fshelf%3Dfantasy"><span data-dcnode-id="604" instrument_node="">fantasy</span></a><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span><div class="reviewText stacked" data-dcnode-id="557"><span data-dcnode-id="597" instrument_node="">
</span><span class="readable" data-dcnode-id="559" id="reviewTextContainer2426977211"><span data-dcnode-id="596" instrument_node="">
</span><span data-dcnode-id="591" id="freeTextContainer14357992588512326439"><span data-dcnode-id="595" instrument_node="">Jorge Luis Borges didn’t know if he existed.</span><br data-dcnode-id="594"><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">“Why does it disturb us that the map be included in the map and the thousand and one nights in the book ‘The Thousand and One Nights?’ Why does it disturb us that Don Quixote be a reader of the ‘Quixote’ and Hamlet a spectator of Hamlet? I believe I have found the reason: the inversions suggest that if the characters of a fictional work can be readers or spectators, we, its readers or spectators, can be fictitious. In 1833, Carlyle observed that the hi</span></span><span data-dcnode-id="590" instrument_node="">
</span><span data-dcnode-id="564" id="freeText14357992588512326439" style="display:none"><span data-dcnode-id="589" instrument_node="">Jorge Luis Borges didn’t know if he existed.</span><br data-dcnode-id="588"><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node="">“Why does it disturb us that the map be included in the map and the thousand and one nights in the book ‘The Thousand and One Nights?’ Why does it disturb us that Don Quixote be a reader of the ‘Quixote’ and Hamlet a spectator of Hamlet? I believe I have found the reason: the inversions suggest that if the characters of a fictional work can be readers or spectators, we, its readers or spectators, can be fictitious. In 1833, Carlyle observed that the history of the universe is an infinite sacred book that all men write and read and try to understand, and in which they are also written.” – Partial Magic in the Quixote (Essay)</span><br data-dcnode-id="585"><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">“We (the undivided divinity operating within us) have dreamt the world. We have dreamt it as firm, mysterious, visible, ubiquitous in space and durable in time; but in the architecture we have allowed tenuous and eternal crevices of unreason which tell us it is false.” – Avatars of the Tortoise (Essay)</span><br data-dcnode-id="582"><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">The first quote made me laugh out loud when I read that we are fictitious. Honestly, Borges sounds crazy to me, and that makes me like him. I don’t know why, but it’s true.</span><br data-dcnode-id="579"><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">In the essays, he sounds like he genuinely wants to know, is searching for meaning, and believes much of what he writes in his short stories. </span><br data-dcnode-id="576"><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">His labyrinths are a search for God (or some manifestation of that idea) and meaning in the universe. He never finds the answer I presume, looking to many religions and philosophies, especially metaphysics (science, pseudo-science, you pick).</span><br data-dcnode-id="573"><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">His themes cover the weird and mysterious, stuff that trip the mind, and loosen the hold of your sanity. The nature of time and movement (he loves Zeno and his paradox: if you cut one measure of movement in half and cut that half into half you never reach the destination because it cuts infinitely), parallel universes or realities, another Borges (he does this through metafiction, which manifests as another wave to unbalance the mind) and his manifestation in something or someone else or in another time (avatars). Repetitious labyrinths within labyrinths, doors opening and closing for eternity, never ending, always searching, looking to find, finding, and another door. Nightmarish, or fascinating, depending on the mind of the reader.</span><br data-dcnode-id="570"><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">I find the collection difficult to describe. Borges offers an enormous amount of knowledge covering archaeology, mathematics, history, philosophy, religion, and he synthesizes completely into personal theory with no final-conclusion. It draws you into it, whether by hunger for something unknown or for fantastic escape. You want to find something secret or hidden, but he brings you into a labyrinth of searching – and if he and we could live here in these bodies forever, that search would never end. The search becomes the Absolute, as I interpret Borges, a religion of searching in labyrinths for eternity.</span><br data-dcnode-id="567"><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">I started reading this again today, but going forward will refrain from rushing; maybe read a story a day, and think and process until the next story. A Psychology teacher in a Master’s program recommended this strategy. She said the mind continues to process on an unconscious level, so it’s best to intersperse learning, if possible.</span></span><span data-dcnode-id="563" instrument_node="">

</span><span data-dcnode-id="443" id="freeTextContainer13228549713399715676"><span data-dcnode-id="459" instrument_node="">How can I reasonably be expected to review a book which, over a space of some forty-five years, has become central to my existence? Ever since I was first introduced to </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/500.Jorge_Luis_Borges" rel="nofollow noopener" title="Jorge Luis Borges"><span data-dcnode-id="458" instrument_node="">Jorge Luis Borges</span></a><span data-dcnode-id="456" instrument_node=""> in a </span><b data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">New Yorker</span></b><span data-dcnode-id="453" instrument_node=""> review around 1969-70, when </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/17717.Labyrinths_Selected_Stories_and_Other_Writings" rel="nofollow noopener" title="Labyrinths Selected Stories and Other Writings by Jorge Luis Borges"><span data-dcnode-id="452" instrument_node="">Labyrinths: Selected Stories and Other Writings</span></a><span data-dcnode-id="450" instrument_node=""> and </span><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Ficciones</span></b><span data-dcnode-id="447" instrument_node=""> were first published in the United States.</span><br data-dcnode-id="446"><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">Since then, I have been following Borges's leads, which have led to to visit Iceland and Argentina (twice each), to read G.K. Chesterton's essays and fictions, to lo</span></span><span data-dcnode-id="442" instrument_node="">
</span><span data-dcnode-id="416" id="freeText13228549713399715676" style="display:none"><span data-dcnode-id="441" instrument_node="">How can I reasonably be expected to review a book which, over a space of some forty-five years, has become central to my existence? Ever since I was first introduced to </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/500.Jorge_Luis_Borges" rel="nofollow noopener" title="Jorge Luis Borges"><span data-dcnode-id="440" instrument_node="">Jorge Luis Borges</span></a><span data-dcnode-id="438" instrument_node=""> in a </span><b data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">New Yorker</span></b><span data-dcnode-id="435" instrument_node=""> review around 1969-70, when </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/17717.Labyrinths_Selected_Stories_and_Other_Writings" rel="nofollow noopener" title="Labyrinths Selected Stories and Other Writings by Jorge Luis Borges"><span data-dcnode-id="434" instrument_node="">Labyrinths: Selected Stories and Other Writings</span></a><span data-dcnode-id="432" instrument_node=""> and </span><b data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Ficciones</span></b><span data-dcnode-id="429" instrument_node=""> were first published in the United States.</span><br data-dcnode-id="428"><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">Since then, I have been following Borges's leads, which have led to to visit Iceland and Argentina (twice each), to read G.K. Chesterton's essays and fictions, to look at American literature with new eyes, to re-evaluate Robert Louis Stevenson and Rudyard Kipling.</span><br data-dcnode-id="425"><br data-dcnode-id="424"><b data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Labyrinths</span></b><span data-dcnode-id="421" instrument_node=""> is the fruit of Borges's apogee in the 1930s and 1940s. By the 1950s, he was more or less a spent force who, like his father, was going blind. Most of the book is taken up with his short fictions, including the best known ones, such as "Tlon Uqbar Orbis Tertius," "Death and the Compass," "Funes the Memorious," and "The Library of Babel." Following are some essays, which are hard to understand for most readers -- especially "A New Refutation of Time," ending with some short (and brilliant) parables and an excellent poem.</span><br data-dcnode-id="420"><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">If I were still a young man starting out in life, I would have done the same thing upon reading this book. Still, at least once a day, some epiphany based on the author's observations, elbows its way into my consciousness, leaving me breathless.</span><br data-dcnode-id="417"></span><span data-dcnode-id="415" instrument_node="">
