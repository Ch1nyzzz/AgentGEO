</span><span data-dcnode-id="5243" id="freeText14042715738407854917" style="display:none"><span data-dcnode-id="5249" instrument_node="">Although his work has been restricted to the short story, the essay, and poetry, Jorge Luis Borges of Argentina is recognized all over the world as one of the most original and significant figures in modern literature. In his preface, Andre Maurois writes: "Borges is a great writer who has composed only little essays or short narratives. Yet they suffice for us to call him great because of their wonderful intelligence, their wealth of invention, and their tight, almost mathematical style."</span><br data-dcnode-id="5248"><br data-dcnode-id="5247"><i data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Labyrinths</span></i><span data-dcnode-id="5244" instrument_node=""> is a representative selection of Borges' writing, some forty pieces drawn from various books of his published over the years. The translations are by Harriet de Onis, Anthony Kerrigan, and others, including the editors, who have provided a biographical and critical introduction, as well as an extensive bibliography.</span></span><span data-dcnode-id="5242" instrument_node="">

</span><span class="communityAnswerText" data-dcnode-id="4831"><span data-dcnode-id="4842" instrument_node="">
</span><span class="expandableContainer" data-dcnode-id="4833"><span class="truncatedContent" data-dcnode-id="4838"><span data-dcnode-id="4841" instrument_node="">In man of his stories, Borges builds a world (or even a universe) with a particular set of rules or premises and then explores the implications of thi</span><a class="jsShow showAction" data-dcnode-id="4839" href="#"><span data-dcnode-id="4840" instrument_node="">…more</span></a></span><span class="fullContent" data-dcnode-id="4834"><span data-dcnode-id="4837" instrument_node="">In man of his stories, Borges builds a world (or even a universe) with a particular set of rules or premises and then explores the implications of this. His work is something like the literary equivalent of M. C. Escher's art - exploring paradoxes and puzzles, detailed, technically very accomplished, but mostly engaging the intellect rather than the emotions. That's not to say that you won't have any emotional response to his work, but I get the impression that he is mainly seeking to engage the reader on an intellectual level. Regarding philosophy and spirituality, great deal of what he writes has to do with how we perceive and respond to the world and about questions of meaning and existence, but he is not writing in order to be 'inspirational'.</span><a class="jsHide hideAction" data-dcnode-id="4835" href="#"><span data-dcnode-id="4836" instrument_node="">(less)</span></a></span></span><span data-dcnode-id="4832" instrument_node="">

</span><span data-dcnode-id="4487" id="freeTextContainer14586343387743414744"><b data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">(Book 441 From 1001 Books) - Labyrinths: Selected Stories &amp; Other Writings, Jorge Luis Borges</span></b><br data-dcnode-id="4502"><br data-dcnode-id="4501"><span data-dcnode-id="4500" instrument_node="">Labyrinths (1962) is a collection of short stories and essays by Jorge Luis Borges. </span><br data-dcnode-id="4499"><br data-dcnode-id="4498"><span data-dcnode-id="4497" instrument_node="">It includes "Tlön, Uqbar, Orbis Tertius", "The Garden of Forking Paths", and "The Library of Babel", three of Borges' most famous stories. </span><br data-dcnode-id="4496"><br data-dcnode-id="4495"><span data-dcnode-id="4494" instrument_node="">Many of the stories are from the collections Ficciones (1944) and El Aleph (1949). </span><br data-dcnode-id="4493"><br data-dcnode-id="4492"><span data-dcnode-id="4491" instrument_node="">هزارتوهای بورخس - خورخه لوئیس بورخس (کتاب زمان) ادبیات؛ تاریخ نخستین خوانش سال 2006میلادی</span><br data-dcnode-id="4490"><br data-dcnode-id="4489"><span data-dcnode-id="4488" instrument_node="">عنوان: هزارت</span></span><span data-dcnode-id="4486" instrument_node="">
</span><span data-dcnode-id="4451" id="freeText14586343387743414744" style="display:none"><b data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">(Book 441 From 1001 Books) - Labyrinths: Selected Stories &amp; Other Writings, Jorge Luis Borges</span></b><br data-dcnode-id="4483"><br data-dcnode-id="4482"><span data-dcnode-id="4481" instrument_node="">Labyrinths (1962) is a collection of short stories and essays by Jorge Luis Borges. </span><br data-dcnode-id="4480"><br data-dcnode-id="4479"><span data-dcnode-id="4478" instrument_node="">It includes "Tlön, Uqbar, Orbis Tertius", "The Garden of Forking Paths", and "The Library of Babel", three of Borges' most famous stories. </span><br data-dcnode-id="4477"><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">Many of the stories are from the collections Ficciones (1944) and El Aleph (1949). </span><br data-dcnode-id="4474"><br data-dcnode-id="4473"><span data-dcnode-id="4472" instrument_node="">هزارتوهای بورخس - خورخه لوئیس بورخس (کتاب زمان) ادبیات؛ تاریخ نخستین خوانش سال 2006میلادی</span><br data-dcnode-id="4471"><br data-dcnode-id="4470"><span data-dcnode-id="4469" instrument_node="">عنوان: هزارتوهای بورخس؛ نویسنده: خورخه لوئیس بورخس؛ مترجم احمد میرعلایی؛ تهران، کتاب زمان، 1356، در 259ص؛ چاپ دیگر سوئد، افسانه، 1369؛ چاپ دیگر تهران، کتاب زمان، 1380، در 296ص؛ شابک 9646380166؛ چاپ دیگر با حروفچینی متفاوت 1381؛ در 296ص، شابک ایکس - 964638028؛ موضوع داستانهای کوتاه و نوشته ها و شعر شاعران آرژانتین - امریکای لاتین - سده 20م</span><br data-dcnode-id="4468"><br data-dcnode-id="4467"><span data-dcnode-id="4466" instrument_node="">نقل از بورخس: حکمت وداع: (کم کم تفاوتِ ظریفِ میان نگه‌ داشتن یک دست، و زنجیرکردن یک روح را، یاد خواهی گرفت، اینکه عشق تکیه کردن نیست، و رفاقت اطمینان خاطر، و یاد می‌گیری که بوسه‌ ها قرارداد نیستند، و هدیه‌ ها، عهد و پیمان معنی نمی‌دهند، و شکست‌هایت را خواهی پذیرفت، و سرت را بالا خواهی گرفت، با چشمان باز، با ظرافتی زنانه، و نه اندوهی کودکانه، و یاد می‌گیری که همه راه‌هایت را هم ‌امروز بسازی، که خاک فردا برای خیال‌ها مطمئن نیست، و آینده، امکانی برای سقوط به میانه ی نزاع، در خود دارد.؛ کم‌ کم یاد می‌گیری، که حتی نور خورشید می‌سوزاند، اگر زیاد آفتاب بگیری. پس باغ خود را می‌کاری، و روحت را زینت می‌دهی، به جای اینکه منتظر کسی باشی، تا برایت گل بیاورد، و یاد می‌گیری، که می‌توانی تحمل کنی، که محکم هستی، که خیلی می‌ارزی، و می‌آموزی و می‌آموزی، با هر خداحافظی، یاد می‌گیری)؛ پایان نقل از خورخه لوییس بورخس</span><br data-dcnode-id="4465"><br data-dcnode-id="4464"><span data-dcnode-id="4463" instrument_node="">به برهان ناآشنائیم به فرهنگی که، «بورخس» از آن مینالد، و ساز خویش نیز، هماره نیز خوش مینوازند، استعاره های ایشان را کمتر درمییابم، برای همین است شاید، با اینکه از خوانش و خواندن چندباره اش، لذتها برده ام، نمیدانم چرا؟ میخواهم بازهم کتاب را بخوانم؛ شاید بفهمم چه میگویند؛ روانشاد «گلشیری: (1316 - 1379هجری خورشیدی)» که آخرین افزوده را بر کتاب بنوشته اند، از خود میپرسند: «راستی نکند که بورخس، محصول رویای پدر کور خود باشد»؟ شاید هم به شیوه ی «بورخس»، بشود گفت: (آنکه در باره ی «بورخس» مینویسد، بیشتر در مورد خود، یا آثار خود مینویسد)؛</span><br data-dcnode-id="4462"><br data-dcnode-id="4461"><span data-dcnode-id="4460" instrument_node="">پس بگذارید دیدگاه خویش را نیز بنگارم، در باره ی متن نوشتارهای «خورخه»: چه احساس زیبائی، وابستگی هماره، هماورد آزادی است؛ عشق در برابر رهایی است؛ اما گویا، تنها گنجشککان اینگونه اند، هم را دوست میدارند، ولی طرف را هرگزی بندی نمیکنند؛ برهانش اینکه، آنگاه که از چیزی خوشت آمد، دلت میخواهد از آن تو باشد؛ دیگر او آزاد نیست؛ وقتی آزاد نیست، برایتان ارزشی ندارد، کس، برای به دست آوردنش، با شما نمیجنگد؛ معادن را برای یافتنش نمیکاود؛ دریاها را در جستجوی او، درنمینوردد؛ از برای صیدش، به ژرفای آبهای شور و شیرین، و گرم و سرد، سرک نمیکشد؛ مرواریدی که در موزه به تماشای دیگران گذاشته شده، هرگزی ارزش واقعی خود را، نمینمایاند؛ اما آنگاه که درون صدف خویش است، و در قعر دریا تنها، آزاد، و از آن خود است، و مالکی ندارد، چندین غواص، برایش، نفس در سینه حبس میکنند، جانها بهای اوست؛</span><br data-dcnode-id="4459"><br data-dcnode-id="4458"><span data-dcnode-id="4457" instrument_node="">کلام «خورخه»، اوج شناخت حق دیگریست؛ باید، سدی نبست، حتی به رود خشک نیز؛ وگرنه دیگر، چشمه های زلال، جاری، نیلگون، و فیروزه ای نخواهد ماند، و بود؛ آسمان را گویا از ایشان گرفته باشید، دیگر درخت بید، موی خود را، با تماشا در آب جاری، شانه نمیکند؛ از پا خواهد افتاد، و برکه ای خواهد شد، تا سمور آبی، شاید در آن به گشت و گذار بپردازد، و لانه بنا کند؛ واژه ی دوست، شاید از «دو تا است» برگزیده شده باشد، یعنی دو متفاوت، و وابسته در بعضی از خواهشها به هم، البته که به دلخواه هر دو؛ آیا ما نیز چنینیم؟ «خورخه» بسیار ظریف اندیشیده، و دیده است؛ عشق را همراهی دیده؛ اگر هدیه ای هم باشد، باید بدون مناسبت و دلخواه هدیه دهنده و گیرنده، باشد؛ البته که بدون انتظار پرسش و پاسخ؛ نه آن بندی که با آن هدیه، گوئیا ناخواسته شاید، به پای دیگری میبندیم؛ باید باغ خویشتن را خود بکاریم، و روحمان را، زینت همان باغ خویش کنیم، تا گردشگران، همچون خرده های آهن به سوی آهن ربایش، به سوی زیبائی چنان و چنین روحی، گرد آیند؛ تهران ا. شربیانی</span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node="">Apr 26, 2008</span><br data-dcnode-id="4454"><br data-dcnode-id="4453"><span data-dcnode-id="4452" instrument_node="">تاریخ بهنگام رسانی 27/05/1399هجری خورشیدی؛ 10/05/1400هجری خورشیدی؛ ا. شربیانی</span></span><span data-dcnode-id="4450" instrument_node="">

</span><span data-dcnode-id="4328" id="freeTextContainer11207325939057825958"><span data-dcnode-id="4337" instrument_node="">"You who read me, are You sure of understanding my language?"</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node=""> </span><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">Borges would have been the first to point out that an answer in the affirmative to his own question would be a likely sign that the reader indeed had understood nothing of any importance. So I won't make any claims. I did however experience something approaching perfect reading pleasure, - fully aware that perfection is unlikely to be approved by Borges - being too static, unchangeable, and definitive. </span><br data-dcnode-id="4332"><span data-dcnode-id="4331" instrument_node=""> </span><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">Halfway through the essay colle</span></span><span data-dcnode-id="4327" instrument_node="">
</span><span data-dcnode-id="4281" id="freeText11207325939057825958" style="display:none"><span data-dcnode-id="4326" instrument_node="">"You who read me, are You sure of understanding my language?"</span><br data-dcnode-id="4325"><span data-dcnode-id="4324" instrument_node=""> </span><br data-dcnode-id="4323"><span data-dcnode-id="4322" instrument_node="">Borges would have been the first to point out that an answer in the affirmative to his own question would be a likely sign that the reader indeed had understood nothing of any importance. So I won't make any claims. I did however experience something approaching perfect reading pleasure, - fully aware that perfection is unlikely to be approved by Borges - being too static, unchangeable, and definitive. </span><br data-dcnode-id="4321"><span data-dcnode-id="4320" instrument_node=""> </span><br data-dcnode-id="4319"><span data-dcnode-id="4318" instrument_node="">Halfway through the essay collection, I became acutely conscious of knowing the stories already, but I was not able to recall whether I had read them before, or just heard about them in other essay collections. It left me in the dreamlike, surreal state of mind that Borges enjoys evoking - blurring the lines between reality and literature, proving over and over again that storytelling is the origin of humankind as a thinking species.</span><br data-dcnode-id="4317"><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">Are we real? Or are we just part of a giant narrative, told in infinite volumes of books in a labyrinthine library which contains us, the universe and all our imagination, including our deities?</span><br data-dcnode-id="4314"><br data-dcnode-id="4313"><span data-dcnode-id="4312" instrument_node="">Moving from one fictional character to the next (Don Quixote, Hamlet, Dante in his fictional self) and questioning our right to claim more authenticity than these immortal characters, Borges involves his own identity as a person and as a writer in the narrative process, and makes a distinction between what Borges - the person - and Borges - the writer of mythical dimensions - represents, without being sure where one identity ends and the other begins: </span><br data-dcnode-id="4311"><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node="">"I do not know which of us has written this page."</span><br data-dcnode-id="4308"><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">Why are readers confused when they realise that characters in books turn into readers of the same book, like Don Quixote in the second part of the Cervantes' masterpiece? - Borges claims it disturbs our sense of reality. We might be part of a story ourselves, a story about a character reading about reading, and reflecting on how to establish an objective identity.</span><br data-dcnode-id="4305"><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">If our universe is a great labyrinthine library containing all the stories of the world, then time and space are meaningless measurements of life. We can be in different stories at the same time, and change pattern, plot and character in case we are not happy with the thread we are following at the moment:</span><br data-dcnode-id="4302"><br data-dcnode-id="4301"><span data-dcnode-id="4300" instrument_node="">"Next time I kill you", replied Scharlach, "I promise you that labyrinth, consisting of a single line which is invisible and unceasing."</span><br data-dcnode-id="4299"><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">Why did I like this collection so much? Why did it give me such a deep, deep sense of satisfaction, despite being obscure, incoherent, and slightly surreal?</span><br data-dcnode-id="4296"><br data-dcnode-id="4295"><span data-dcnode-id="4294" instrument_node="">I think the answer is that to me, the world is a library, and Borges gave me the narrative to prove that my reading and dreaming self is just as real as the self that is busy with everyday chores. I have always felt at home in books in a way that I rarely feel at home in the world. </span><br data-dcnode-id="4293"><br data-dcnode-id="4292"><span data-dcnode-id="4291" instrument_node="">Within Borges' labyrinth, I found my true home address. </span><br data-dcnode-id="4290"><br data-dcnode-id="4289"><span data-dcnode-id="4288" instrument_node="">Moving from Dante and Kafka over Shakespeare to Cervantes feels natural and logical to me, and I gather that I am among old friends. I identify strongly with the idea of seeing the world as an infinite number of story fragments, all available to be reinterpreted by me, the reader. I am part of the story as well, changing the narrative with my existence in time, just like Borges himself:</span><br data-dcnode-id="4287"><br data-dcnode-id="4286"><span data-dcnode-id="4285" instrument_node="">"Time is the substance I am made of. Time is a river which sweeps me along, but I am the river; it is a tiger which destroys me, but I am the tiger; it is a fire which consumes me, but I am the fire. The world, unfortunately, is real; I, unfortunately, am Borges."</span><br data-dcnode-id="4284"><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">I was Borges too, for a short time, while I read his words. And it swept me away!</span></span><span data-dcnode-id="4280" instrument_node="">

</span><span class="readable" data-dcnode-id="4078" id="reviewTextContainer1295265098"><span data-dcnode-id="4198" instrument_node="">
</span><span data-dcnode-id="4181" id="freeTextContainer4980282256426447561"><img class="gr-hostedUserImg" data-dcnode-id="4197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1479717117i/21225145.jpg&amp;raw"><br data-dcnode-id="4196"><br data-dcnode-id="4195"><span data-dcnode-id="4194" instrument_node="">The stories, essays and parables in this Borges collection, with all their esoteric references to multiple histories, cultures and literatures, are no more likely to appeal to a casual reader then a textbook on cognitive psychology. To extract literary gold from highly intricate, complex works like </span><i data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">The Garden of Forking Paths</span></i><span data-dcnode-id="4191" instrument_node="">, </span><i data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Emma Zunz</span></i><span data-dcnode-id="4188" instrument_node="">, </span><i data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">The Library of Babel</span></i><span data-dcnode-id="4185" instrument_node=""> or </span><i data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">The Zahir</span></i><span data-dcnode-id="4182" instrument_node=""> requires careful multiple readings as well as a willingness to occasionally investigate terms and references, for example here</span></span><span data-dcnode-id="4180" instrument_node="">
</span><span data-dcnode-id="4083" id="freeText4980282256426447561" style="display:none"><img class="gr-hostedUserImg" data-dcnode-id="4179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1479717117i/21225145.jpg&amp;raw"><br data-dcnode-id="4178"><br data-dcnode-id="4177"><span data-dcnode-id="4176" instrument_node="">The stories, essays and parables in this Borges collection, with all their esoteric references to multiple histories, cultures and literatures, are no more likely to appeal to a casual reader then a textbook on cognitive psychology. To extract literary gold from highly intricate, complex works like </span><i data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">The Garden of Forking Paths</span></i><span data-dcnode-id="4173" instrument_node="">, </span><i data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">Emma Zunz</span></i><span data-dcnode-id="4170" instrument_node="">, </span><i data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">The Library of Babel</span></i><span data-dcnode-id="4167" instrument_node=""> or </span><i data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">The Zahir</span></i><span data-dcnode-id="4164" instrument_node=""> requires careful multiple readings as well as a willingness to occasionally investigate terms and references, for example here are several from </span><i data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">The Zahir</span></i><span data-dcnode-id="4161" instrument_node="">: </span><i data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">The Book of Rites</span></i><span data-dcnode-id="4158" instrument_node="">, </span><i data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">Isaac Laquendem</span></i><span data-dcnode-id="4155" instrument_node="">, </span><i data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">The Nibelungen</span></i><span data-dcnode-id="4152" instrument_node="">, the novel </span><i data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">Confessions of a Thug</span></i><span data-dcnode-id="4149" instrument_node="">, </span><i data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">The Book of Things Unknown</span></i><span data-dcnode-id="4146" instrument_node="">.</span><br data-dcnode-id="4145"><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">And, speaking of </span><i data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">The Zahir</span></i><span data-dcnode-id="4140" instrument_node="">, if I were to move from referring to the tale itself to the ideas which lie behind it, how would my review read? What does it mean for a narrator to dissolve the universe into a single coin? Why does Borges describe, right at the outset, how at different times in the past the Zahir, a coin he was handed in a bar, morphed into a tiger, a blind man, a small compass, a vein in the marble of a pillar, the bottom of a well? How does one compress all time into this one sentence I am now writing? And what of the philosophical and cultural context in which Borges wrote this tale? Could a first-person short-story like </span><i data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">The Zahir</span></i><span data-dcnode-id="4137" instrument_node=""> have been written in Ancient China? Medieval Persia? Colonial America? These are questions that lie outside the framework of this Borges tale. Or do they?</span><br data-dcnode-id="4136"><br data-dcnode-id="4135"><span data-dcnode-id="4134" instrument_node="">Philosophical musing on the reality of the Zahir propels Borges (and us as readers) to multiple worlds: of a woman who seeks to makes every one of her actions correct to the point where she desires the absolute in the momentary; the dark light of the Gnostics; a dream where he, Borges the narrarator, becomes a pile of coins guarded by a gryphon. Then, after Borges’ fascination with the Zahir slides into obsession, driving him to seek out a psychiatrist, he writes, “Time, which softens memories, only makes the memory of the Zahir sharper. First I could see the face of it, then the reverse; now I can see both sides at once. It is not as though the Zahir were made of glass, since one side is not superimposed upon the other; rather it is as though the vision were spherical and the Zahir flutters in the center.”</span><br data-dcnode-id="4133"><br data-dcnode-id="4132"><span data-dcnode-id="4131" instrument_node="">Such refection bring to mind Hesse’s </span><i data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">The Glass Bead Game</span></i><span data-dcnode-id="4128" instrument_node="">, where the beads are, in fact, made of glass and can represent, in turn, cosmic topology, a fugue of celestial spheres, variations on relational placement as in the colors and lines of a Mondrian or circles with plasticity in Vasarely; only the Zahir has about it more unity then plurality, and thus one Möbius strip, one musical note, one painting, one print. Toward the very end we read: “Others will dream that I am mad, while I dream of the Zahir. When every person on earth thinks, day and night of the Zahir, which will be dream and which reality, the earth or the Zahir?”</span><br data-dcnode-id="4127"><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">Regarding the essays, </span><i data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Partial Magic in the Quixote</span></i><span data-dcnode-id="4122" instrument_node=""> opens us to a least a dozen unique angles in our approach to this Spanish classic; </span><i data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Kafka and His Precursors</span></i><span data-dcnode-id="4119" instrument_node=""> explores the connection of writers like Kierkegaard and Browning along with Zeno’s paradox to the famous author of </span><i data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">The Metamorphosis</span></i><span data-dcnode-id="4116" instrument_node="">; </span><i data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">The Mirror of Enigmas</span></i><span data-dcnode-id="4113" instrument_node=""> delves into conundrums such as the symbolic significance of Sacred Scriptures and various forms of metaphysical writings as reflected on by, among others, Philo of Alexandria. Seven more essays will bend and stretch you mind in ways you never thought possible.</span><br data-dcnode-id="4112"><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">In the parable, </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Borges and I</span></i><span data-dcnode-id="4107" instrument_node="">, the author conducts a dialogue with himself as well as, take your pick - author, public persona, alter ego, younger self, older self, second self – and is uncertain as he concludes his parable who exactly is the author of the lines he has just written. </span><i data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Everything and Nothing</span></i><span data-dcnode-id="4104" instrument_node=""> is a parable featuring Shakespeare with a multiple identity crisis; another parable, </span><i data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">The Witness</span></i><span data-dcnode-id="4101" instrument_node="">, has the narrator brooding over memory and death and yet in another parable, </span><i data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Inferno 1,32</span></i><span data-dcnode-id="4098" instrument_node="">, we encounter a leopard, Dante, and God in what could be viewed as a dreamscape.</span><br data-dcnode-id="4097"><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">Reading </span><i data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Labyrinths</span></i><span data-dcnode-id="4092" instrument_node=""> years ago, I was inspired to write this micro-fiction as a tribute to Jorge Luis Borges:</span><br data-dcnode-id="4091"><br data-dcnode-id="4090"><i data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">LIFE STORY</span></i><br data-dcnode-id="4087"><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">The bold letters on the cover read: Harold Blackman – Life Story. The book looks quite ordinary. One is required to make a special inspection to see a queer spring-like device along the spine. Harold Blackman opens the book before him. The title page is completely blank as are all the pages. He runs gnarled fingers, tips calloused and slightly trembling, lightly over this ghost of a title page and reflects on the long agonizing nights when he tried to pen the fire of his youth and the spume of his manhood without success. What he saw when the ink dried always left him feeling flat, unsettled. Closing his eyes, he repeats an incantation learned from a half-crazed Argentine, then opens them slowly, very slowly. Harold Blackman, weary adventurer, is now standing on the writing table, shrunken to the size of the book. Lying down on the title page, the back of his legs, buttocks and backbone relax to the paper’s slight give. He released a catch on the spine, the leather cover snapping shut with the vengeance of a mousetrap. But for a muffled groan all is silence. Over time, the blood seeps through the pages, forming, words, sentences, paragraphs.</span><br data-dcnode-id="4084"></span><span data-dcnode-id="4082" instrument_node="">

</span><span data-dcnode-id="3969" id="freeText12640625786393196311" style="display:none"><span data-dcnode-id="3978" instrument_node="">why haven't i read borges before?? no one knows. and he was always pushed upon me - "how can you like marquez if you haven't read borges??" "you like donoso - you should read borges." "machado is good, but you should read borges." so - fine - i did. and i am utterly underwhelmed. so there. i am learning during my "summer of classix" that most of the books i have for some reason or another overlooked were probably overlooked for a reason. i naturally gravitate towards what i like - and i seem to have a filter that prevents me from picking up too many books i don't. when i force it, this happens. and i liked some of the stories. but borges isn't for everyone (although scrolling down my "friends who have read" list, it looks as though all my friends gave it five stars.) and i'm not accusing you bitches of inflating your ratings, but i have the sense with borges that some people are guilted into liking him. or pretending that they like him more than they do because he's borges. but i won't be. because i am not ashamed of my intellectual shortcomings. i embrace them. i am incapable of abstract thought. fact. as hard as i try, that whole achilles/tortoise thing? does not compute. so all of this hexagon spiraling into hexagon on top of hexagon... i feel like i am back in college (where every single person i ever knew had a copy of this book. and was a stoner.)but this is classic stoner thinking-chains. reflections, labyrinths, it's perfect for that kind of mindset. "dooood, imagine we were in a hexagon right now??" and i know this makes sense to some people with philosophical and theological mindbents, but for me its almost pain. there were about 6 stories i liked, but the first few almost made me weep with trying to find the value in them. sorry, borges. we were never meant to be.</span><br data-dcnode-id="3977"><br data-dcnode-id="3976"><span data-dcnode-id="3975" instrument_node="">mmmmkay - it seems that there are those who think it would be valuable "in a book review" to list the stories i did like. so: the shape of the sword, theme of the traitor and the hero, death and the compass, the secret miracle, three versions of judas, story of the warrior and the captive, emma zunz, the house of asterion, and the waiting. more than i thought i liked, but still - a sad minority.</span><br data-dcnode-id="3974"><br data-dcnode-id="3973"><img class="gr-hostedUserImg" data-dcnode-id="3972" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1528725630i/25720315.png&amp;raw"><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bloggycomelately.com/" rel="nofollow noopener"><span data-dcnode-id="3971" instrument_node="">come to my blog!</span></a></span><span data-dcnode-id="3968" instrument_node="">

</span><span data-dcnode-id="3845" id="freeTextContainer8489099765234208684"><span data-dcnode-id="3852" instrument_node="">A university professor had once expounded on the supposed conflict between history and literature, the former bemoaning the irrelevance of the latter when it comes to tracing the contours of reality while the latter countering this accusation by deploying the well-known defense of </span><i data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">'there's no one way of looking at the truth'</span></i><span data-dcnode-id="3849" instrument_node="">. </span><br data-dcnode-id="3848"><br data-dcnode-id="3847"><span data-dcnode-id="3846" instrument_node="">Indeed. Why restrict ourselves to just the one way and the one reality? Why overlook the truth of infinite permutations and combinations of each eventuality and each one of</span></span><span data-dcnode-id="3844" instrument_node="">
</span><span data-dcnode-id="3808" id="freeText8489099765234208684" style="display:none"><span data-dcnode-id="3843" instrument_node="">A university professor had once expounded on the supposed conflict between history and literature, the former bemoaning the irrelevance of the latter when it comes to tracing the contours of reality while the latter countering this accusation by deploying the well-known defense of </span><i data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">'there's no one way of looking at the truth'</span></i><span data-dcnode-id="3840" instrument_node="">. </span><br data-dcnode-id="3839"><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">Indeed. Why restrict ourselves to just the one way and the one reality? Why overlook the truth of infinite permutations and combinations of each eventuality and each one of them, in turn, forking off into myriad possibilities </span><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">ad infinitum</span></i><span data-dcnode-id="3834" instrument_node="">? Why seek neat compartmentalization of two disparate disciplines and prevent their intermingling to create new streams of thought? Why believe mathematics and literature to be so fundamentally apart that there can be no blending together of both without the results being distorted beyond intelligibility? </span><br data-dcnode-id="3833"><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">The very fact that the known limits of what's considered intelligible are being breached every moment, has its roots in the reluctance of labyrinthine minds like Borges' to follow linear pathways. </span><br data-dcnode-id="3830"><br data-dcnode-id="3829"><span data-dcnode-id="3828" instrument_node="">Mysticism, mathematics, arcana, philosophy, and literary criticism. A perfect blurring of the boundaries between fact and fiction leading to the creation of an entirely new entity which challenges the normative narrative form. And a moment of perfect lucidity arising out of a churning of all these elements. Where our imaginations come to a staggering halt, Borges' begins. </span><br data-dcnode-id="3827"><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">I do not wish to squeeze out every last drop of meaning from these complex interpolations of a known truth into discrete bits of hitherto unknown logical conclusions by googling every reference I did not get. Instead I delight in Borges' perfectly synchronized demolition of all and any conventions associated with writing with an authorial preeminence, I gaze enthralled at the vision of clarity being birthed out of pure chaos. </span><br data-dcnode-id="3824"><blockquote data-dcnode-id="3819"><span data-dcnode-id="3823" instrument_node="">
</span><i data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">"In a birdless dawn the magician saw the concentric blaze close round the walls. For a moment, he thought of taking refuge in the river, but then he knew that death was coming to crown his old age and absolve him of labors. He walked into the shreds of flame. But they did not bite into his flesh, they caressed him and engulfed him without heat or combustion. With relief, with humiliation, with terror, he understood that he too was a mere appearance, dreamt by another."</span></i><span data-dcnode-id="3820" instrument_node="">
</span></blockquote><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">I let my mind latch onto his even if for a little while and let it guide me into realms where only the divinity of thought reigns supreme in its many manifestations. </span><br data-dcnode-id="3816"><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node="">And, for now, that is enough.</span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">__</span><br data-dcnode-id="3811"><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">P.S.:-It's good to know where DFW acquired his irksome yet awe-inspiring footnoting habit from.</span></span><span data-dcnode-id="3807" instrument_node="">

</span><span data-dcnode-id="3700" id="freeTextContainer8725543838414436073"><i data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">On his religious views, Borges declared himself as an agnostic, clarifying: "Being an agnostic means all things are possible, even God, even the Holy Trinity. This world is so strange that anything may happen, or may not happen"</span></i><span data-dcnode-id="3704" instrument_node="">*</span><br data-dcnode-id="3703"><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">It feels kind of strange to quote this after my initial brush with “The God Delusion” by Richard Dawkins where he refutes an agnostic stance vis-à-vis an atheist one. But I find myself adhering here with Borges. Why to rob an already incomprehensible world of its myriad </span></span><span data-dcnode-id="3699" instrument_node="">
</span><span data-dcnode-id="3655" id="freeText8725543838414436073" style="display:none"><i data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">On his religious views, Borges declared himself as an agnostic, clarifying: "Being an agnostic means all things are possible, even God, even the Holy Trinity. This world is so strange that anything may happen, or may not happen"</span></i><span data-dcnode-id="3696" instrument_node="">*</span><br data-dcnode-id="3695"><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">It feels kind of strange to quote this after my initial brush with “The God Delusion” by Richard Dawkins where he refutes an agnostic stance vis-à-vis an atheist one. But I find myself adhering here with Borges. Why to rob an already incomprehensible world of its myriad probabilities?</span><br data-dcnode-id="3692"><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">Perhaps it is not relevant to quote this here with regard to “Labyrinths” which is a distinct work in itself and can be taken as “fantastical literature” encompassing the unimagined. However there also appear to be an underline theme running discreetly for most of the stories in this collection.</span><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node=""> </span><br data-dcnode-id="3687"><i data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">Attracted by metaphysics, but accepting no system as true, Borges makes out of all of them a game for the mind. He discovers two tendencies in himself: "one to esteem religious and philosophical ideas for their aesthetic value, and even for what is magical or marvelous in their content. That is perhaps the indication of an essential skepticism. The other is to suppose in advance that the quantity of fables or metaphors of which man's imagination is capable is limited, but that this small number of inventions can be everything to everyone."</span></i><br data-dcnode-id="3684"><br data-dcnode-id="3683"><span data-dcnode-id="3682" instrument_node="">These lines from the preface to the work by André Maurois elaborates Borges’ agnostic stand and present to us a glimpse into the author’s mind which seemingly wants to exhaust all the possibilities available to him by using them in different combinations to come to the point that anything is possible. Working with the concept of time and space, myths and dreams Borges continuously constructs labyrinthine worlds whose contemplation is left to the imagination of the reader. </span><br data-dcnode-id="3681"><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">He seems to be postulating that man (also mind, the world or Universe) exists as an infinite entity whose centre is everywhere (an individual), whose circumference is nowhere (existing in infinite series of time). There are numerous references in the work which propose this.</span><br data-dcnode-id="3678"><br data-dcnode-id="3677"><span data-dcnode-id="3676" instrument_node="">According to André Maurois, Borges sets out to hunt the following metaphor, regarding infinity, through the centuries:</span><br data-dcnode-id="3675"><br data-dcnode-id="3674"><i data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">Pascal wrote: "Nature is an infinite sphere whose center is everywhere, whose circumference is nowhere."</span></i><br data-dcnode-id="3671"><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node=""> And so from an enchanted mind, inspired by the possibility of fiction as reality and vice-versa, is created an array of dreamlike worlds for the readers where readers continuously keep drifting from the boundaries of one to another dazed by the magical images appearing infinitely. </span><br data-dcnode-id="3668"><br data-dcnode-id="3667"><i data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">No one is anyone, one single immortal man is all men. Like Cornelius Agrippa, I am god, I am hero, I am philosopher, I am demon and I am world, which is a tedious way of saying that I do not exist.</span></i><br data-dcnode-id="3664"><br data-dcnode-id="3663"><br data-dcnode-id="3662"><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">------------------------------------------------------</span><br data-dcnode-id="3659"><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">* Source: Wikipedia</span><br data-dcnode-id="3656"></span><span data-dcnode-id="3654" instrument_node="">

</span><span class="readable" data-dcnode-id="3541" id="reviewTextContainer1716807028"><span data-dcnode-id="3572" instrument_node="">
</span><span data-dcnode-id="3564" id="freeTextContainer9628646212375007500"><span data-dcnode-id="3571" instrument_node="">‘Tlön is surely a labyrinth, but it is a labyrinth devised by men, a labyrinth destined to be deciphered by men.’ </span><br data-dcnode-id="3570"><br data-dcnode-id="3569"><span data-dcnode-id="3568" instrument_node="">Labyrinths is a collection of short stories, essays, and other literary works. It is my first experience with Borges, but it shall not be the last. </span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">Borges writes but he does more than that. He’s a chimaera, part philosopher, part academic, part historian, and part bibliognost. His vast accumulated knowledge penetrates his work to create meta fiction that feels truly authentic, thus o</span></span><span data-dcnode-id="3563" instrument_node="">
</span><span data-dcnode-id="3546" id="freeText9628646212375007500" style="display:none"><span data-dcnode-id="3562" instrument_node="">‘Tlön is surely a labyrinth, but it is a labyrinth devised by men, a labyrinth destined to be deciphered by men.’ </span><br data-dcnode-id="3561"><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">Labyrinths is a collection of short stories, essays, and other literary works. It is my first experience with Borges, but it shall not be the last. </span><br data-dcnode-id="3558"><br data-dcnode-id="3557"><span data-dcnode-id="3556" instrument_node="">Borges writes but he does more than that. He’s a chimaera, part philosopher, part academic, part historian, and part bibliognost. His vast accumulated knowledge penetrates his work to create meta fiction that feels truly authentic, thus one has constantly remind oneself that Borges pens works of fiction and not treatises. He bends thought, axioms, and orthodoxy in his readers. He asks that you submit to his mind. As a reward he elicits a delicious reverberation from his work and the beauty and wisdom of his stories that might appear vastly spread in theme and scope create a cohesive chef-d'oeuvre. It spotlights the mind, a labyrinth, of those before us, those that have been, might have been, those that have etched their names in the annals of history. They create the maze of thought that Borges, like Ariadne leading Theseus out of the Minotaur’s labyrinth, leads us through. </span><br data-dcnode-id="3555"><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">After a taste of a small portion of his body of work, I have realized something vastly significant that I have missed. Fiction relies as much on the accumulation of knowledge as it is an art form, that words are not only chosen and arranged, that you don’t merely tell a story. But you create a world out of all the information you’ve learned, all the systems you’ve mastered, and all the theories you’ve dissected, all the things you’ve read. Maybe a writer is not like a divine creator who creates something out of nothing, but rather a modest chef who crafts something from the ingredients he has available to him. These ingredients we get from our experiences, our studies, our reading. Not only of fiction, but of philosophy, of different disciplines, of the ancients and of the myths. People say that the best chefs are the gastronomists. Might I presume to say the same thing for writers, that the best writers are those most widely read. And Jorge Luis Borges is as well read a writer as any other. He references both trendy works and works which no one reads anymore. He creates haunting phantasms full of familiarity and novelty, unmatched works unique in sentiment. He echoes the Cabbalists, the Greeks, the European philosophers, even Twain, yet his voice is unassumingly original. In the works of others he finds his reflection staring back at him. His pen is both an enigma and a revelation. </span><br data-dcnode-id="3552"><br data-dcnode-id="3551"><span data-dcnode-id="3550" instrument_node="">‘Thus my life is a flight and I lose everything and everything belongs to oblivion, or to him. I do not know which of us has written this page.’ </span><br data-dcnode-id="3549"><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">I have walked the winding path inside the mind of Borges, and the walls of his words enchant me. If to be lost in his labyrinth is to be engulfed in silent brilliance, then I pray never to find my way again.</span></span><span data-dcnode-id="3545" instrument_node="">

deceptively short, and in fact the entire collection itself is rather on the slim side, don't expect to just plow right through it in a day or two. Well, unless for some strange reason you just really want to read something without actually reading it. These pieces will make you think, they will make you dream, they will make your head spin, you will read and reread and often stop to just simmer for awhile, and on and on I could ramble...in fact, I can't think of a more perfect title than </span><i data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Labyrinths</span></i><span data-dcnode-id="3426" instrument_node="">. They are. (In the best way.) </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3423" instrument_node="">]</span></span><span data-dcnode-id="3421" instrument_node=""> </span><br data-dcnode-id="3420"><br data-dcnode-id="3419"><span data-dcnode-id="3418" instrument_node="">Makes a great beach read, too! </span></span><span data-dcnode-id="3416" instrument_node="">

</span><span class="readable" data-dcnode-id="3216" id="reviewTextContainer552586214"><span data-dcnode-id="3292" instrument_node="">
</span><span data-dcnode-id="3281" id="freeTextContainer2576518011922590194"><span data-dcnode-id="3291" instrument_node="">Reading. No, thought. No, reality. Or, fiction? Fiction. But also time, and faith, and metonymy. </span><br data-dcnode-id="3290"><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">How close is the instantaneous you to the you in context with time, space, and the integration over the infinite?</span><br data-dcnode-id="3287"><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">What? What.</span><br data-dcnode-id="3284"><br data-dcnode-id="3283"><span data-dcnode-id="3282" instrument_node="">The what is the period of time wherein I grew fed up with the knowing and began to contemplate the thinking, unknown and yet rather persistent seeing as it continues to niggle at me. Knowing helps, of course, in the foundations of common thought from which propagates communicati</span></span><span data-dcnode-id="3280" instrument_node="">
</span><span data-dcnode-id="3221" id="freeText2576518011922590194" style="display:none"><span data-dcnode-id="3279" instrument_node="">Reading. No, thought. No, reality. Or, fiction? Fiction. But also time, and faith, and metonymy. </span><br data-dcnode-id="3278"><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">How close is the instantaneous you to the you in context with time, space, and the integration over the infinite?</span><br data-dcnode-id="3275"><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">What? What.</span><br data-dcnode-id="3272"><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">The what is the period of time wherein I grew fed up with the knowing and began to contemplate the thinking, unknown and yet rather persistent seeing as it continues to niggle at me. Knowing helps, of course, in the foundations of common thought from which propagates communication, an inherently faulty condition in an endless number of ways which we will not delve into now but would have you keep it in mind. The hypothesis, thesis, maxim and crux of touching upon the streaming moment, the schizophrenic past, the hallucinatory future, and everything in between.</span><br data-dcnode-id="3269"><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">You read a story, and you enjoy it. You read a story, and you hate it. You read a story, and think, well, it wasn't a </span><i data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">complete</span></i><span data-dcnode-id="3264" instrument_node=""> waste of time. Now, that last part, that was interesting. For you've just delineated a breaking up of time as corresponding to certain parts of a piece of work, and a differential behavior over time just begs for a formula for explicatory purposes. Wouldn't you say?</span><br data-dcnode-id="3263"><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">Or not. You're not here for math, or maths, or numbers and their rote maneuverings. You're here for ethos, pathos, and logos, on a determined length of instants inside a mind completely reliant on rather inexplicit senses, sailing upon a calibrated fortification of personal/historical/sociocultural context spreading its tendrils into a reality that, for whatever reason, exists. You enter this minute form of visual and linguistic maneuvers with the hope (There are some unfortunates who enter with assurance and/or expectations. Poor souls.) that your time will not be 'wasted'. The variable enters the formula and comes out a solution.</span><br data-dcnode-id="3260"><br data-dcnode-id="3259"><span data-dcnode-id="3258" instrument_node="">Context? Context. Jorge Luis Borges, for a fortuitous and perhaps godly (Till another word comes along that is as ripe with contextual glory and more suitable for my atheist tendencies, this will have to suffice.) reason, favored a honing of literature over development of mathematica. For an even better reason, he danced along the boundary between the two, and was not troubled in the slightest when the tenuous strands dividing the two sagged and snapped beneath his fearless weight, as there were always other webs upon which to stand and stretch and view from line to point, from word to number, from thought to full bloom with the aid of paper and pen. Always another labyrinth to enter and decorate with riotous abandon and the benefit of his own supreme erudition, with the foresight of penning down the experience so as to not have a single tale of Theseus and the Minotaur, but many. Countless. You tread the labyrinth, as do I, and the measure of our game is how badly each of us wants to get out, and what assumptions we make concerning the proper way of escaping.</span><blockquote data-dcnode-id="3253"><span data-dcnode-id="3257" instrument_node="">
</span><i data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">It may be that universal history is the history of the different intonations given a handful of metaphors.</span></i><span data-dcnode-id="3254" instrument_node="">
</span></blockquote><span data-dcnode-id="3252" instrument_node="">Here is the mystery/conspiracy/faith of the world and its sidelong lapses of recognition between fellow souls of humanity, saved now and again by the flow of common themes whose limited number is not a matter to fear, but to enjoy. Here is immortality in the flight of thought and the falling of form, for what is the assurance of death if not an instigation of the limited soul towards a mark in the infinite? Here is a question of theology going hand in hand with the philosophy, and how the two often differ only in the matter of a single variable, accorded by either side with the relative values of everything and nothing. Here is the West, and the East, and Man, and all those time-stamped frames of thought riddling Borges' brain, who as such stands accused but </span><i data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">can</span></i><span data-dcnode-id="3249" instrument_node=""> be excused only by the fact that at least he had the gumption to realize that there were other worlds and frames of (Postmodernism, the particle of you as a function of the wave of you as an answer and a question for, what? Reality, perhaps.) thought that he would never live to see. Or, </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">he</span></i><span data-dcnode-id="3246" instrument_node=""> would never live to see, in that moment of personal reflection. Just as </span><i data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">I</span></i><span data-dcnode-id="3243" instrument_node=""> will never live to see the reception of this review. Future I will, obviously. But not I.</span><i data-dcnode-id="3238"><span data-dcnode-id="3242" instrument_node="">
</span><blockquote data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Words, displaced and mutilated words, words of others, were the poor pittance left him by the hours and the centuries.</span></blockquote><span data-dcnode-id="3239" instrument_node="">
</span></i><span data-dcnode-id="3237" instrument_node="">Tell me, Borges, why do I read?</span><blockquote data-dcnode-id="3229"><span data-dcnode-id="3236" instrument_node="">
</span><i data-dcnode-id="3231"><span data-dcnode-id="3235" instrument_node="">And why wander in these labyrinths? Once more, for aesthetic reasons; because this present infinity, these "vertiginous symmetries," have their tragic beauty. The form is more important than the content.</span><br data-dcnode-id="3234"><br data-dcnode-id="3233"><span data-dcnode-id="3232" instrument_node="">-André Maurois, 'Preface'</span></i><span data-dcnode-id="3230" instrument_node="">
</span></blockquote><span data-dcnode-id="3228" instrument_node="">Tell me, Borges, why do I write?</span><blockquote data-dcnode-id="3223"><span data-dcnode-id="3227" instrument_node="">
</span><i data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">There is no pleasure more complex than that of thought and we surrendered ourselves to it.</span></i><span data-dcnode-id="3224" instrument_node="">
</span></blockquote><span data-dcnode-id="3222" instrument_node="">There we go.</span></span><span data-dcnode-id="3220" instrument_node="">

</span><span class="readable" data-dcnode-id="2942" id="reviewTextContainer636308321"><span data-dcnode-id="2985" instrument_node="">
</span><span data-dcnode-id="2983" id="freeTextContainer4197883667934936521"><span data-dcnode-id="2984" instrument_node="">Jorge Luis Borges, one of the most imaginative writers I have come across, could have been a mathematician, a physicist, a philosopher or a theologian. I can see his influence on Umberto Eco in the manipulation of text and the blending between fiction and reality. To read Borges’s Labyrinth is immerse myself in a magical world where the concept of infinity manifests in space and time, where the boundary between dream and reality fades, where the past and the future converge into an instant, wher</span></span><span data-dcnode-id="2982" instrument_node="">
</span><span data-dcnode-id="2947" id="freeText4197883667934936521" style="display:none"><span data-dcnode-id="2981" instrument_node="">Jorge Luis Borges, one of the most imaginative writers I have come across, could have been a mathematician, a physicist, a philosopher or a theologian. I can see his influence on Umberto Eco in the manipulation of text and the blending between fiction and reality. To read Borges’s Labyrinth is immerse myself in a magical world where the concept of infinity manifests in space and time, where the boundary between dream and reality fades, where the past and the future converge into an instant, where levels of texts superimpose on one another, where fiction imitates nonfiction and life is a drama on stage. To read Borges is to become children again, listening to stories of magic and wonder, of unfathomable worlds. </span><br data-dcnode-id="2980"><br data-dcnode-id="2979"><img alt="Tlön, Uqbar, Orbis Tertius" class="gr-hostedUserImg" data-dcnode-id="2978" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380424632i/846660.jpg&amp;raw" width="160"><br data-dcnode-id="2977"><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">In “Tlön, Uqbar, Orbis Tertius,” Borges creates a fictional world, where Berkeleyan idealism dominates its inhabitant’s thinking. “The world for them is not a concourse of objects in space; it is a heterogeneous series of independent acts.” Through the narrator Borges, we encounter a language without nouns, but with “personal verbs, modified by monosyllabic suffixes (or prefixes) with an adverbial value.” The author Borges has created an alternative world, where the language and the worldviews differ from our world and from it we learn of our biases and blind spots. And we can begin to imagine new worlds, new possibilities. We can create our own languages, as Tolkien has in his fiction, and as software engineers has BASIC, FORTRAN, PASCAL, and so forth. We see similar blending of fact and fiction in Umberto Eco’s </span><i data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">The Prague Cemetery</span></i><span data-dcnode-id="2972" instrument_node="">. </span><br data-dcnode-id="2971"><br data-dcnode-id="2970"><img alt="The Garden of Forking Paths" class="gr-hostedUserImg" data-dcnode-id="2969" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/books/1353676269l/9678830.jpg&amp;raw" width="160"><br data-dcnode-id="2968"><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node="">In “The Garden of Forking Paths,” we encounter an infinitely long book where at every juncture of the story, all possibilities are written and the branches grow exponentially. “In all fictional works, each time a man is confronted with several alternatives, he chooses one and eliminates the others; in the fiction of Ts’ui Pen, he chooses—simultaneously—all of them. He creates, in this way, diverse futures, diverse times which themselves also proliferate and fork.” When I was younger, I have read stories where the reader can choose one of several actions—the decision tree—and turn to the appropriate page for that choice. The story continues from there until there is another choice. And the story would have several endings. After reading this story, I realize where the idea came from. Perhaps, Borges read about the many world interpretation of Heisenberg’s Uncertainty Principle, which states that before an observation, a system could be in various states—position, momentum, time, energy—according to a probability distribution and only when someone has observed the system—photons bouncing off the object—would it collapsed into a single state. In science fiction, such as Star Trek, we read about parallel universes but this may be the first story with such a concept. </span><br data-dcnode-id="2965"><br data-dcnode-id="2964"><img alt="The Library of Babel" class="gr-hostedUserImg" data-dcnode-id="2963" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/books/1213638002l/172366.jpg&amp;raw" width="160"><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">In “The Library of Babel,” Borges again plays around with the concept of infinity, but this time also with combinatorial and I can imagine Borges as a mathematician or computer scientist. A labyrinth of infinite number of rooms stores books that include all combinations of a 22-letter alphabet plus spaces and the comma and period. Since we know the number of characters in each book, we can calculate the number of possible books (not infinite). Of course, most of them are meaningless. Is this universe of repeated rooms each with five shelves and thirty-five books a mirror of our world? Interestingly, in Eco’s The Name of the Rose, the blind monk who oversees the library is named Jorge of Burgos.</span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">I have heard of the argument that Judas betrayed Jesus to force the latter to reveal his divinity and complete God’s work, but in “Three Versions of Judas,” the controversial theologian reinterprets the Biblical text and declares Judas the savior and God’s incarnation. “To save us, He could have chosen any of the destinies which make up the complex web of history; He could have been Alexander or Pythagoras or Rurik or Jesus; He chose the vilest destiny of all: He was Judas.” Borges’s fascination with text, whether historical documents or his own creation, dominates much of his stories and Eco certainly inherits that fascination. </span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">In “The Circular Ruins” where a man is only another’s dream figment and “The Theme of the Traitor and the Hero” where a man’s execution for betrayal is part of a drama, Borges again mixes fact with fiction to create worlds as ephemeral as mist. </span><br data-dcnode-id="2953"><br data-dcnode-id="2952"><img alt="Jorge Luis Borges" class="gr-hostedUserImg" data-dcnode-id="2951" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/photos/1300663961p8/236551.jpg&amp;raw" width="160"><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">I recommend Labyrinth to anyone who wants to dream of magical worlds, who wants to reflect on reality and fiction, who wants to analyze the boundary between text and the interpreter, and who wants to contemplate on the nature of infinity. </span></span><span data-dcnode-id="2946" instrument_node="">

</span><a class="lightGreyText" data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/336116.Labyrinths" title="Paperback "><span data-dcnode-id="2864" instrument_node="">review of another edition</span></a><span data-dcnode-id="2862" instrument_node="">

</span><span data-dcnode-id="2847" id="freeTextContainer10832190100524231578"><blockquote data-dcnode-id="2853"><span data-dcnode-id="2857" instrument_node="">
</span><i data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">”This City is so horrible that its mere existence and perdurance, though in the midst of a secret desert, contaminates the past and the future and in some way even jeopardizes the stars. As long as it lasts, no one in the world can be strong or happy. I do not want to describe it; a chaos of heterogeneous words, the body of a tiger or a bull in which teeth, organs and heads monstrously pullulate in mutual conjunction and hatred can (perhaps) be approximate images.”</span></i><span data-dcnode-id="2854" instrument_node="">
</span></blockquote><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">In </span><i data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2848" instrument_node="">, Borges meand</span></span><span data-dcnode-id="2846" instrument_node="">
</span><span data-dcnode-id="2787" id="freeText10832190100524231578" style="display:none"><blockquote data-dcnode-id="2841"><span data-dcnode-id="2845" instrument_node="">
</span><i data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">”This City is so horrible that its mere existence and perdurance, though in the midst of a secret desert, contaminates the past and the future and in some way even jeopardizes the stars. As long as it lasts, no one in the world can be strong or happy. I do not want to describe it; a chaos of heterogeneous words, the body of a tiger or a bull in which teeth, organs and heads monstrously pullulate in mutual conjunction and hatred can (perhaps) be approximate images.”</span></i><span data-dcnode-id="2842" instrument_node="">
</span></blockquote><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">In </span><i data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2836" instrument_node="">, Borges meanders through some impressively intricate conceptual realms. His exquisitely crafted tales are richly layered with curious ideas from philosophy and mathematics, and that is a large part of why they are so entrancing. He playfully and skillfully arranges and rearranges thematic elements such as time, infinity, paradoxes, identity, mirrors, reality, Solipsism, dreams, the annihilation of opposites, and the infinite contained in the infinitesimal. Within these pages you’ll get lost in endless houses that repeat themselves endlessly, and discover “strange geometries” that’d surely have impressed the shit out of Lovecraft. The threads of these recurring themes are masterfully tangled, entwined, and interwoven throughout the various stories; beautiful patterns and textures emerge. </span><br data-dcnode-id="2835"><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node="">Given Borges’ penchant for paradoxes and impossible geometries, it is hard not to be reminded of M. C. Escher. Below are a few of his pictures which suitably convey some of the surreal atmosphere you’ll find in the book:</span><br data-dcnode-id="2832"><br data-dcnode-id="2831"><img class="gr-hostedUserImg" data-dcnode-id="2830" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1499633205i/23253661._SX540_.jpg&amp;raw"><br data-dcnode-id="2829"><br data-dcnode-id="2828"><img class="gr-hostedUserImg" data-dcnode-id="2827" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1499632353i/23253508._SX540_.jpg&amp;raw"><br data-dcnode-id="2826"><br data-dcnode-id="2825"><img class="gr-hostedUserImg" data-dcnode-id="2824" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1499632353i/23253510._SX540_.jpg&amp;raw"><br data-dcnode-id="2823"><br data-dcnode-id="2822"><span data-dcnode-id="2821" instrument_node="">If you’re uncertain as to whether or not you should pick this up, I’d recommend trying </span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">The House of Asterion</span></i><span data-dcnode-id="2818" instrument_node="">. At only 3 pages long, it manages to pack an incredible punch, and is fairly representative of Borges’ style. It is probably my favorite story. Others worth mentioning include </span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">The Garden of Forking Paths</span></i><span data-dcnode-id="2815" instrument_node="">, </span><i data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Pierre Menard, Author of the Quixote</span></i><span data-dcnode-id="2812" instrument_node="">, </span><i data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">The Immortal</span></i><span data-dcnode-id="2809" instrument_node="">, </span><i data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">The Zahir</span></i><span data-dcnode-id="2806" instrument_node="">, and </span><i data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Tlön, Uqbar, Orbis Tertius</span></i><span data-dcnode-id="2803" instrument_node="">.</span><br data-dcnode-id="2802"><br data-dcnode-id="2801"><span data-dcnode-id="2800" instrument_node="">Overall, this collection is full of truly captivating metaphysical mindfucks. Borges’ imaginings are eerie and dark, breathtakingly bizarre. You often experience the sensation that you’re eternally falling and yet entirely motionless at the same time. If any of this sounds agreeable to you, do yourself a favor and enter into Borges’ infinite, labyrinthine playground. It's fun to get lost sometimes.</span><br data-dcnode-id="2799"><br data-dcnode-id="2798"><blockquote data-dcnode-id="2790"><span data-dcnode-id="2797" instrument_node="">
</span><i data-dcnode-id="2792"><span data-dcnode-id="2796" instrument_node="">“…your ancestor did not believe in a uniform, absolute time. He believed in an infinite series of times, in a growing, dizzying net of divergent, convergent and parallel times. This network of times which approached one another, forked, broke off, or were unaware of one another for centuries, embraces </span><i data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">all</span></i><span data-dcnode-id="2793" instrument_node=""> possibilities of time.”</span></i><span data-dcnode-id="2791" instrument_node="">
</span></blockquote><br data-dcnode-id="2789"><img class="gr-hostedUserImg" data-dcnode-id="2788" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1499634854i/23253843.jpg&amp;raw"></span><span data-dcnode-id="2786" instrument_node="">

</span><span data-dcnode-id="2681" id="freeTextContainer2065080386024776980"><span data-dcnode-id="2682" instrument_node="">For a few years in my early-20s I was obsessed with this book. Some of these stories I have read probably 10 times. The opening story ('Tlon, Uqbar, Orbius Tertius') is one of the most challenging, rewarding mind-f**ks in all literature. Borges's style is limited - this becomes clearer in his later work - but for me this collection is well-chosen. Rarely has so much innovation been crammed into so short a space - but innovation of the controlled kind. No displays of histrionics for this Argentin</span></span><span data-dcnode-id="2680" instrument_node="">
</span><span data-dcnode-id="2663" id="freeText2065080386024776980" style="display:none"><span data-dcnode-id="2679" instrument_node="">For a few years in my early-20s I was obsessed with this book. Some of these stories I have read probably 10 times. The opening story ('Tlon, Uqbar, Orbius Tertius') is one of the most challenging, rewarding mind-f**ks in all literature. Borges's style is limited - this becomes clearer in his later work - but for me this collection is well-chosen. Rarely has so much innovation been crammed into so short a space - but innovation of the controlled kind. No displays of histrionics for this Argentine; his stories are well-wrought and concise. Every story or essay seems to focus on a paradox and explode it. </span><br data-dcnode-id="2678"><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node="">Is it only me or does anyone else see a bit of Borges in Philip K. Dick? And why are the Borg (</span><i data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Star Trek: The Next Generation</span></i><span data-dcnode-id="2673" instrument_node="">) called the Borg? I mean, the librarian in </span><i data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">The Name of the Rose</span></i><span data-dcnode-id="2670" instrument_node=""> was called Jorge for a reason. What I'm saying is these days Borges's influence seems to be everywhere. Or is it just that he condensed so many of </span><i data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">the</span></i><span data-dcnode-id="2667" instrument_node=""> key themes in literature down to such a fundamental state that now it seems as if he owns them?</span><br data-dcnode-id="2666"><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">A pre-post modernist without whom I doubt Eco or Italo Calvino could have turned out as they did, Borges is everything that's good about those two younger Italians condensed down into something you can swallow. In the mind-bending short story stakes only Edgar Allan Poe comes close. Life-changing.</span></span><span data-dcnode-id="2662" instrument_node="">

</span><span data-dcnode-id="2536" id="freeTextContainer8082878509358307098"><span data-dcnode-id="2546" instrument_node="">111th book of 2021.</span><br data-dcnode-id="2545"><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">Borges has the great gift and frustration of being wonderfully readable and hard to understand at the same time: a sort of bonus paradox/labyrinth/conundrum. It’s been a short time since I first read </span><i data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Ficciones</span></i><span data-dcnode-id="2540" instrument_node=""> so I read them again as they are here within </span><i data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2537" instrument_node=""> and found myself enjoying them more and finding them “deeper” (by which I mean more profound). “The Secret Miracle”, for example, is a beautiful, beautiful, story: it is hopeful and saddening, cathartic. Part of a s</span></span><span data-dcnode-id="2535" instrument_node="">
</span><span data-dcnode-id="2510" id="freeText8082878509358307098" style="display:none"><span data-dcnode-id="2534" instrument_node="">111th book of 2021.</span><br data-dcnode-id="2533"><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">Borges has the great gift and frustration of being wonderfully readable and hard to understand at the same time: a sort of bonus paradox/labyrinth/conundrum. It’s been a short time since I first read </span><i data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Ficciones</span></i><span data-dcnode-id="2528" instrument_node=""> so I read them again as they are here within </span><i data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2525" instrument_node=""> and found myself enjoying them more and finding them “deeper” (by which I mean more profound). “The Secret Miracle”, for example, is a beautiful, beautiful, story: it is hopeful and saddening, cathartic. Part of a sentence runs, ‘Then he reflected that reality does not usually coincide with our anticipation of it’, and how true is that? For things are always less scary, more terrifying, more hurtful, less dangerous, than we anticipate. The usual suspects still hold up too— “The Garden of Forking Paths”, “The Library of Babel”, etc. </span><i data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Labyrinths</span></i><span data-dcnode-id="2522" instrument_node=""> also contains some essays which move through Dante, Cervantes, Shakespeare. It’s reading Borges’ essays that we realise that they are not too dissimilar from his stories and that they can be equally frightening and labyrinthine (and I discovered on this reading, Dickian?) than his fiction. The end of the essay “Partial Magic in the Quixote” reads, </span><br data-dcnode-id="2521"><i data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node="">
</span><blockquote data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Why does it disturb us that the map be included in the map of the thousand and one nights in the book of the ‘Thousand and One Nights’? Why does it disturb us that Don Quixote can be a reader of the ‘Quixote’ and Hamlet a spectator of ‘Hamlet’? I believe I have found the reason : these inversions suggest that if the characters of a fictional work can be readers of spectators, we, its readers or spectators, can be fictitious. In 1833, Carlyle observed that the history of the universe is an infinite sacred book that all men write and read and try to understand, and in which they are also written.</span></blockquote><span data-dcnode-id="2517" instrument_node="">
</span></i><br data-dcnode-id="2515"><span data-dcnode-id="2514" instrument_node="">Perhaps the greatest essay ending I’ve read. And his essay on Kafka (“Kafka and his Precursors”) captures the history of literature too with the line, ‘The fact is that every writer </span><i data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">creates</span></i><span data-dcnode-id="2511" instrument_node=""> his own precursors. His work modifies our conception of the past, as it will modify the future.’ Kafka is blessed to have this essay and David Foster Wallace’s essay, “Some Remarks on Kafka’s Funniness from Which Probably Not Enough Has Been Removed”. I may add more to this as I work my way back out of Borges’ labyrinths.</span></span><span data-dcnode-id="2509" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2432" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2437" size="15x15"><span data-dcnode-id="2438" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2436" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2435" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2434" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2433" size="15x15"></span></span><span data-dcnode-id="2431" instrument_node="">
