</span><h1 class="entry-title" data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">What makes a good story? 10 elements</span></h1><span data-dcnode-id="1534" instrument_node="">
</span><div class="intro-text section-inner max-percentage small" data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">What makes a good story? Understanding the key elements of a great story and what satisfies readers regardless of finer details (such as genre) will help you write a more successful book. We’re satisfied when stories achieve certain effects, such as moving us, inspiring us to wonder. With the advent of self-publishing there are now more books than ever on the market. So how do you make a story good so it is more successful?</span></p><span data-dcnode-id="1530" instrument_node="">

</span><div class="post-inner thin" data-dcnode-id="859"><span data-dcnode-id="1474" instrument_node="">
</span><div class="entry-content" data-dcnode-id="861"><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">What makes a good story? Understanding the key elements of a great story and what satisfies readers regardless of finer details (such as genre) will help you write a more successful book. We’re satisfied when stories achieve certain effects, such as moving us, inspiring us to wonder. With the advent of self-publishing there are now more books than ever on the market. So how do you make a story good so it is more successful?</span></p><span data-dcnode-id="1470" instrument_node="">
</span><h2 data-dcnode-id="1468" id="10-ways-to-make-a-good-story-succeed"><span data-dcnode-id="1469" instrument_node="">10 ways to make a good story succeed:</span></h2><span data-dcnode-id="1467" instrument_node="">
</span><ol data-dcnode-id="1446"><li data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Give your story strong dramatic content</span></li><li data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Vary rhythm and structure in your prose</span></li><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Create believable, memorable characters</span></li><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Make the important story sections effective</span></li><li data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Deepen your plot with subplots</span></li><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Make every line of dialogue count</span></li><li data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Add what makes a good story (immersive setting)</span></li><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Create conflict and tension</span></li><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Craft beguiling beginnings</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Deliver knockout endings</span></li></ol><span data-dcnode-id="1445" instrument_node="">
</span><h2 data-dcnode-id="1443" id="1-give-your-story-strong-dramatic-content"><span data-dcnode-id="1444" instrument_node="">1. Give your story strong dramatic content</span></h2><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">‘Man has bacon and eggs for breakfast’ is not a story idea that is going to have readers clawing for a copy of your book. It also is highly unlikely this would sustain an entire novel.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">‘Man has bacon and eggs for breakfast, but the bacon is made from human flesh’ is a story scenario with much more dramatic potential (this could be a scene from one of Thomas Harris’ popular novels about the serial killer Hannibal Lector). Once you’ve found the resulting actions and the eventual outcome that develops out of your primary story scenario, you have a story idea.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><h3 data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">What are the key elements of a good, dramatic story?</span></h3><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Dramatic storytelling is a matter of including key elements of a good story such as:</span></p><span data-dcnode-id="1430" instrument_node="">
</span><ul data-dcnode-id="1414"><li data-dcnode-id="1427"><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/what-is-story-conflict-examples/" rel="noopener" target="_blank"><span data-dcnode-id="1429" instrument_node="">Conflict</span></a></li><li data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Tension</span></li><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Surprise</span></li><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Extraordinary characters or character behaviour</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Controversy</span></li><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Mystery</span></li><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Suspense</span></li></ul><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The second story idea above contains most of these elements. It’s surprising because cannibalism is a taboo most people find disturbing. The character’s behaviour is extraordinary because cannibalism is not an everyday, common behaviour. The subject matter is controversial. There is implicit tension because of the possibility the character is a murderer, given his actions. There’s mystery – who is this character and why does he engage in this activity?</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">‘Dramatic content’ isn’t necessarily shocking or controversial. It could be something as innocuous as the reader not knowing whether romantic leads will end up in each other’s arms.&nbsp;</span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/" rel="noopener" target="_blank"><span data-dcnode-id="1408" instrument_node="">Brainstorm characters, plot points or settings</span></a><span data-dcnode-id="1406" instrument_node=""> that give some of the above elements using our step-by-step prompts. Making a story good starts with finding and developing multi-faceted ideas.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h2 data-dcnode-id="1402" id="2-vary-rhythm-and-structure-in-your-prose"><span data-dcnode-id="1403" instrument_node="">2. Vary rhythm and structure in your prose</span></h2><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Writing instructors often advise creative writing classes to write shorter, punchier sentences. Short sentences are great for increasing pace and help to make scenes that have tense subject matter tenser in mood. Yet be wary of monotonous writing. Vary sentence length. Tap out the rhythm of your sentences’ syllables every now and then, or read your prose aloud. This will help you hear its cadence, its music.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">Use rhythmic structure from poetry for inspiration. For example, the japanese </span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">haiku</span></em><span data-dcnode-id="1394" instrument_node=""> is a short three-line poem in which the first line has 5 syllables, the second 7 and the third 5 again. Try write a few prose sentences with this syllabic structure, e.g.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">‘He waited all day. It was cold and darkening. Would anyone come?’</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Exploring the rhythm of your writing consciously will help you to write better sentences. A book contains many sentences, so make yours easier and lovelier to read. Consciously crafted, creative prose makes a book better in any genre.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h2 data-dcnode-id="1384" id="3-create-believable-memorable-characters"><span data-dcnode-id="1385" instrument_node="">3. Create believable, memorable characters</span></h2><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Why do we find some characters more memorable than others? Because they have one or more of the following:</span></p><span data-dcnode-id="1380" instrument_node="">
</span><ul data-dcnode-id="1368"><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Unique voices, personas and expressions</span></li><li data-dcnode-id="1375"><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/character-motivations/" rel="noopener" target="_blank"><span data-dcnode-id="1377" instrument_node="">Intriguing (or baffling) goals and motivations</span></a></li><li data-dcnode-id="1371"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/creating-loveable-flaws-characters/" rel="noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">Flaws and weaknesses</span></a><span data-dcnode-id="1372" instrument_node=""> as well as strengths</span></li><li data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Distinctive appearances (including body language, gait and mannerisms)</span></li></ul><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">Note that appearance comes last: If you simply </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/character-eyes/" rel="noopener" target="_blank"><span data-dcnode-id="1365" instrument_node="">describe your characters’ eye colour</span></a><span data-dcnode-id="1363" instrument_node="">, your character won’t stand out. Key to making a story good is creating characters you’d remember if you stood next to them in line. Even if only for 15 minutes.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Part of a memorable voice is created by your character’s origins. Do they use regional dialects or&nbsp;sayings that mark them as being from a particular place? Are their voices soft or loud? What sorts of expressions do they use? And slang?</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1357" instrument_node="">Read authors such as Charles Dickens, who is famous for creating larger-than-life, memorable characters. </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2014/aug/22/charles-dickens-hearing-voices-created-his-novels"><span data-dcnode-id="1356" instrument_node="">According to&nbsp;</span><em data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">The Guardian, ‘</span></em><span data-dcnode-id="1353" instrument_node="">hearing voices allowed Charles Dickens to create extraordinary fictional worlds’.&nbsp;</span></a></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Like their voices, characters’ goals and motivations should be wholly their own and should help us understand their behaviour.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">What does each character in your book (even the secondary, ‘walk on, walk off’ ones) crave? Why do they desire the things they do? Find </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/start-writing-a-book" rel="noopener" target="_blank"><span data-dcnode-id="1345" instrument_node="">quick story ideas</span></a><span data-dcnode-id="1343" instrument_node=""> and character profiles using our step-by-step outlining tools.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1337"><figure class="aligncenter size-full" data-dcnode-id="1338"><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel.jpg"><img alt="Quote on telling good stories" class="wp-image-12717" data-dcnode-id="1340" height="500" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel.jpg&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel.jpg 500w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel-300x300.jpg 300w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel-150x150.jpg 150w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/Tell-a-good-story-quote-Now-Novel-270x270.jpg 270w" width="500"></a></figure></div><span data-dcnode-id="1336" instrument_node="">
</span><h2 data-dcnode-id="1334" id="4-make-the-important-story-sections-effective"><span data-dcnode-id="1335" instrument_node="">4. Make the important story sections effective</span></h2><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Each part of a story needs to be effective to make it good.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1323"><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/great-first-lines-of-novels/" rel="noopener" target="_blank"><span data-dcnode-id="1329" instrument_node="">Great openings create</span></a><span data-dcnode-id="1327" instrument_node=""> fascinating introductions to authors’ worlds, characters and plot scenarios. In a </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/writing-middle-novel/" rel="noopener" target="_blank"><span data-dcnode-id="1326" instrument_node="">brilliant middle</span></a><span data-dcnode-id="1324" instrument_node="">, your story might:</span></p><span data-dcnode-id="1322" instrument_node="">
</span><ul data-dcnode-id="1313"><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Introduce new characters who help or hinder your primary character(s)</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Add subplots that supplement your main story arc (more on this in number 5 below)</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Reveal why your characters have the goals you establish at the start of your book</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Increase narrative tension by increasing what’s at stake for your characters</span></li></ul><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">Chuck Wendig has </span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//terribleminds.com/ramble/2012/06/05/25-ways-to-fight-your-storys-mushy-middle/"><span data-dcnode-id="1310" instrument_node="">a great post here on how to fight the mushy middle</span></a><span data-dcnode-id="1308" instrument_node=""> and make your own story lean and mean throughout. This is Wendig’s advice when writing the middle gets tough:</span></p><span data-dcnode-id="1306" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1303"><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Find your next steps. Discover your narrative landmarks. That’ll get you out of the woods and back onto the road.</span></p></blockquote><span data-dcnode-id="1302" instrument_node="">
</span><div class="visualcta" data-dcnode-id="1280" style="margin:24px 0;color:#333;background-color:#FFF;font-family: 'Montserrat', sans-serif;"><span data-dcnode-id="1301" instrument_node="">
</span><div data-dcnode-id="1282" style="display:flex;flex-flow:wrap-reverse;justify-content:center;align-items:center;"><span data-dcnode-id="1300" instrument_node="">
</span><div data-dcnode-id="1289" style="display:flex;flex-direction: column;align-items:flex-start;max-width:275px;"><span data-dcnode-id="1299" instrument_node="">
</span><h3 data-dcnode-id="1297" style="font-size:26px;line-height:32px;font-weight:600;text-transform:uppercase;margin:0px;padding:0px;"><span data-dcnode-id="1298" instrument_node="">Make a good story great</span></h3><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294" style="font-size:11px;font-weight:500;margin:10px 0;padding:0px;"><span data-dcnode-id="1295" instrument_node="">Learn how Now Novel helps you develop your story and get help improving your draft.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><a data-dcnode-id="1291" event-action="click" event-label="design-img-desk" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/develop-finish-your-book" id="visualcta-click" role="button" style="font-size:11px;text-transform:uppercase;font-weight:500;text-decoration:none;color:#FFF;background-color:#B8381F;padding:10px 25px;margin-top:15px;border-radius:3px;"><span data-dcnode-id="1292" instrument_node="">LEARN MORE</span></a><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span><div data-dcnode-id="1284"><span data-dcnode-id="1287" instrument_node="">
</span><img alt="" class="wp-image-11503" data-dcnode-id="1286" height="270" loading="lazy" sizes="(max-width: 355px) 100vw, 355px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2021/02/now-novel-woman-writing-355x270.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2021/02/now-novel-woman-writing-355x270.png 355w, https://www.nownovel.com/blog/wp-content/uploads/2021/02/now-novel-woman-writing-300x228.png 300w, https://www.nownovel.com/blog/wp-content/uploads/2021/02/now-novel-woman-writing-150x114.png 150w, https://www.nownovel.com/blog/wp-content/uploads/2021/02/now-novel-woman-writing.png 500w" style="width:100%;max-width:275px;height:auto;" width="355"><span data-dcnode-id="1285" instrument_node="">
</span></div><span data-dcnode-id="1283" instrument_node="">
</span></div><span data-dcnode-id="1281" instrument_node="">
</span></div><span data-dcnode-id="1279" instrument_node="">
</span><h2 data-dcnode-id="1277" id="5-deepen-your-plot-with-subplots"><span data-dcnode-id="1278" instrument_node="">5. Deepen your plot with subplots</span></h2><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">What is the definition of a subplot?</span></h3><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1263"><a data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//literarydevices.net/subplot/"><span data-dcnode-id="1272" instrument_node="">&nbsp;A subplot is ‘a secondary plot, or a strand of the main plot that runs parallel to it and supports it’</span></a><span data-dcnode-id="1270" instrument_node="">. An </span><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/subplot-ideas-better-subplots/" rel="noopener" target="_blank"><span data-dcnode-id="1269" instrument_node="">example of a subplot</span></a><span data-dcnode-id="1267" instrument_node=""> would be the departure of the character Quoyle’s wife in the early chapters of E. Annie Proulx’s novel&nbsp;</span><em data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The Shipping News</span></em><span data-dcnode-id="1264" instrument_node="">. This becomes part of the subplot of Quoyle grieving for (and looking for substitute) love. The subplot sets the tragic tone for the novel and the pathos of it, Quoyle’s heartbreak, drives&nbsp; the reader to invest emotionally in his outcome.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">To deepen your story with subplots:</span></p><span data-dcnode-id="1259" instrument_node="">
</span><ul data-dcnode-id="1250"><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Use subplots to make readers care about your characters – this grows reader investment</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Add subplots that reveal characters’ personalities and complicate their progress towards their goals</span></li><li data-dcnode-id="1251"><span data-dcnode-id="1254" instrument_node="">Find subplots that </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/theme-examples-from-literature/" rel="noopener" target="_blank"><span data-dcnode-id="1253" instrument_node="">expand key themes of your novel</span></a></li></ul><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Deepening your plot with subplots will improve your novel because readers will feel more connected to your characters. Connection arises out of understanding and empathy. A good, relevant subplot can help you create these two things.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><div class="wp-block-image wp-image-7929" data-dcnode-id="1240"><figure class="aligncenter size-large is-resized" data-dcnode-id="1241"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel.jpg"><img alt="Infographic on ten elements of a good story | Now Novel" class="wp-image-12718" data-dcnode-id="1245" height="768" loading="lazy" sizes="(max-width: 501px) 100vw, 501px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-668x1024.jpg&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-668x1024.jpg 668w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-196x300.jpg 196w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-768x1178.jpg 768w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-176x270.jpg 176w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel-98x150.jpg 98w, https://www.nownovel.com/blog/wp-content/uploads/2018/08/What-makes-a-good-story-great-Now-Novel.jpg 800w" width="501"></a><figcaption data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Pin or share this image.</span></figcaption></figure></div><span data-dcnode-id="1239" instrument_node="">
</span><h2 data-dcnode-id="1237" id="6-make-every-line-of-dialogue-count"><span data-dcnode-id="1238" instrument_node="">6. Make every line of dialogue count</span></h2><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Make every line of dialogue count. In great dialogue:</span></p><span data-dcnode-id="1233" instrument_node="">
</span><ul data-dcnode-id="1226"><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">We gain a sense of characters’ different personalities, views, quirks (everyone has their own voice)</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Dialogue serves the story (characters don’t just sit around telling each other what they had for breakfast)</span></li><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Dialogue deepens or develops connections between characters such as conflict and other emotional elements</span></li></ul><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">In a good story, characters do&nbsp;</span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">not&nbsp;</span></em><span data-dcnode-id="1221" instrument_node="">sound like real people all the time (even if they create the illusion of being real). This is because in a good story:</span></p><span data-dcnode-id="1219" instrument_node="">
</span><ul data-dcnode-id="1212"><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Characters mostly speak to the point. There are fewer pleasantries, for example, such as ‘Fine thanks and you?’</span></li><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">They don’t use filler words such as ‘like’ or ‘um’ excessively (unless this is emphasized for a justifiable reason)</span></li><li data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Characters’ dialogue serves the plot. It helps us understand what has happened, what is happening, and what will happen.</span></li></ul><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">See </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/how-to-write-dialogue-7-steps/" rel="noopener" target="_blank"><span data-dcnode-id="1209" instrument_node="">advice for writing better dialogue</span></a><span data-dcnode-id="1207" instrument_node=""> in our separate post on the subject.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><h2 data-dcnode-id="1203" id="7-add-what-makes-a-good-story-immersive-setting"><span data-dcnode-id="1204" instrument_node="">7. Add what makes a good story (immersive setting)</span></h2><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">What makes a story great?&nbsp; Besides unforgettable&nbsp;characters, a crafted plot, engaging action and dialogue? Immersive settings. A great story puts us right in the heart of its scenes, its world. </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/what-is-story-setting/" rel="noopener" target="_blank"><span data-dcnode-id="1200" instrument_node="">How do you write a great setting?</span></a></p><span data-dcnode-id="1197" instrument_node="">
</span><ol data-dcnode-id="1182"><li data-dcnode-id="1193"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Make place a character.</span></strong><span data-dcnode-id="1194" instrument_node="">&nbsp;Don’t just give a house a shape and colour. Give it personality. Is it old and dank, shutting out the light of the world, or is it light, charming and elegant? Besides giving place personality, give it something out of the ordinary to make it truly fascinating.</span></li><li data-dcnode-id="1189"><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Make place in your story change with the times.&nbsp;</span></strong><span data-dcnode-id="1190" instrument_node="">The street your characters grow up on should have changed when they return in later life, not only because places do change over time but because change is interesting. Old neighbours may have moved or passed away. Characters might feel differently about a place with passing years, too. Find the emotional connections we have to places.</span></li><li data-dcnode-id="1183"><strong data-dcnode-id="1185"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/how-to-describe-place-character/" rel="noopener" target="_blank"><span data-dcnode-id="1188" instrument_node="">Enrich your setting with detai</span></a><span data-dcnode-id="1186" instrument_node="">l.&nbsp;</span></strong><span data-dcnode-id="1184" instrument_node="">If you write about a real, historical or contemporary place in particular, know the landmarks. Know the demographics, the underprivileged areas and the rich ones. Know what the place is celebrated or nefarious for. Details, contrasts and contradictions give cities their vibrance and their complex social life.</span></li></ol><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1179" id="8-create-conflict-and-tension"><span data-dcnode-id="1180" instrument_node="">8. Create conflict and tension</span></h2><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1177" instrument_node="">When we read the word ‘conflict’ we often think immediately of violence. War, for example, or physical fights between adversaries. But there are many kinds of conflict you can use to improve your story. </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/difference-external-internal-conflict-writing/" rel="noopener" target="_blank"><span data-dcnode-id="1176" instrument_node="">Characters’ internal conflicts create tension</span></a><span data-dcnode-id="1174" instrument_node=""> by making readers wonder whether they will overcome their hurdles. Characters might also grapple with their environments. For example, in a </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/man-vs-society-story-conflicts/" rel="noopener" target="_blank"><span data-dcnode-id="1173" instrument_node="">character vs society conflict</span></a><span data-dcnode-id="1171" instrument_node=""> (such as in&nbsp;</span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">The Scarlet Letter</span></em><span data-dcnode-id="1168" instrument_node="">). Or </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/man-vs-nature-conflict-in-fiction/" rel="noopener" target="_blank"><span data-dcnode-id="1167" instrument_node="">when characters struggle with natural phenomena</span></a><span data-dcnode-id="1165" instrument_node=""> (the typical disaster story).</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">To write great conflict:</span></p><span data-dcnode-id="1160" instrument_node="">
</span><ul data-dcnode-id="1146"><li data-dcnode-id="1153"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Create and bring together characters whose personalities clash</span></strong><span data-dcnode-id="1157" instrument_node="">. The reality TV series&nbsp;</span><em data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Come Dine With Me&nbsp;</span></em><span data-dcnode-id="1154" instrument_node="">does this expertly by combining dinner guests who are guaranteed to irritate each other. The bubbly go-getter is paired with the morose man-of-few-words.</span></li><li data-dcnode-id="1149"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Combine different kinds of story conflicts within a single narrative.</span></strong><span data-dcnode-id="1150" instrument_node=""> It’s interesting when tension arises from varied sources</span></li><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Watch movies or series that are renowned for their mastery of tense conflict and note down the plot, dialogue or scene setting devices that help scriptwriters achieve their effects.</span></li></ul><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">James Duncan offers some excellent </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.abbottpress.com/mastering-conflict-and-suspense-how-to-keep-readers-turning-pages-in-any-genre/"><span data-dcnode-id="1143" instrument_node="">advice on creating conflict and tension</span></a><span data-dcnode-id="1141" instrument_node="">. Says Duncan:</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">‘Maybe the goal a character wants to accomplish is reached, but it turns out to be nothing the character expected&nbsp;…&nbsp;But the genie is hard to get back in the bottle, isn’t it?’</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Even when our wildest dreams come true, we may find there are more rivers to cross. Relationships, for example, take work.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1131" id="9-craft-beguiling-beginnings"><span data-dcnode-id="1132" instrument_node="">9. Craft beguiling beginnings</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The beginning is part of what elevates a good story to become a great one.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">What makes a good story beginning?</span></h3><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">A good beginning:</span></p><span data-dcnode-id="1121" instrument_node="">
</span><ol data-dcnode-id="1112"><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Creates questions the reader is determined to have answered (e.g. ‘Who is this mysterious killer who loves Barry Manilow’s ‘Copacabana’?’)</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Hooks readers on your writing style</span></li><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Introduces the key conflicts and/or characters of your novel (and what makes them interesting).</span></li><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Promises a meaningful reading experience (promises being moved, going on an adventure, being terrified).</span></li></ol><span data-dcnode-id="1111" instrument_node="">
</span><h3 data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">How to create good opening questions</span></h3><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">For the first element of a good story beginning, you can:</span></p><span data-dcnode-id="1105" instrument_node="">
</span><ul data-dcnode-id="1098"><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Describe a character doing something unexpected</span></li><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Introduce a perplexing scenario that must be explained (murder is the mainstay of thriller and suspense novels when it comes to creating questions)</span></li><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Tease the reader with unknowns (whether these relate to a character, an unfamiliar setting or object)</span></li></ul><span data-dcnode-id="1097" instrument_node="">
</span><h3 data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">How to hook readers in</span></h3><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">For the second story beginning element, </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/write-hook-lure-readers/" rel="noopener" target="_blank"><span data-dcnode-id="1092" instrument_node="">hooking your reader on your writing</span></a><span data-dcnode-id="1090" instrument_node="">:</span></p><span data-dcnode-id="1088" instrument_node="">
</span><ul data-dcnode-id="1079"><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Make sure your language is polished</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Cut out extraneous information – it isn’t relevant what your character ate for breakfast, unless this somehow is developed to become a crucial detail</span></li><li data-dcnode-id="1080"><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/writing-techniques-polish-your-prose/" rel="noopener" target="_blank"><span data-dcnode-id="1083" instrument_node="">Use original (but clear) language</span></a><span data-dcnode-id="1081" instrument_node=""> and the occasional fresh &nbsp;metaphor or simile</span></li></ul><span data-dcnode-id="1078" instrument_node="">
</span><h3 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Ways to introduce characters</span></h3><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">To improve your beginning:</span></p><span data-dcnode-id="1072" instrument_node="">
</span><ul data-dcnode-id="1059"><li data-dcnode-id="1068"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Describe characters in concrete terms:</span></strong><span data-dcnode-id="1069" instrument_node=""> Instead of ‘she had always been a happy child’, show a happy scene from childhood</span></li><li data-dcnode-id="1064"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Show your character at a pivotal moment:</span></strong><span data-dcnode-id="1065" instrument_node=""> hook the reader right away</span></li><li data-dcnode-id="1060"><span data-dcnode-id="1063" instrument_node="">Either </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">hint at a coming conflict or launch right into it</span></strong></li></ul><span data-dcnode-id="1058" instrument_node="">
</span><h3 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">How to create the promise of a good story</span></h3><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">To show readers your story is worth reading early on:</span></p><span data-dcnode-id="1052" instrument_node="">
</span><ul data-dcnode-id="1047"><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Set the core action of the story in motion (For example: your character receives an unmarked letter)</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Give your reader a taste of the excitement, emotional power or laughs in store</span></li></ul><span data-dcnode-id="1046" instrument_node="">
</span><h2 data-dcnode-id="1044" id="10-deliver-knockout-endings"><span data-dcnode-id="1045" instrument_node="">10.&nbsp;Deliver&nbsp;knockout endings</span></h2><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">The ending will either entice a reader to seek out other novels you’ve written or donate the book they’ve just finished. Don’t let your book be clutter. End on a lingering impression:</span></p><span data-dcnode-id="1040" instrument_node="">
</span><h3 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">What makes a good story ending?</span></h3><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">A good story ending:</span></p><span data-dcnode-id="1034" instrument_node="">
</span><ol data-dcnode-id="1025"><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Resolves the primary conflict of your story (the killer is caught or the adventurer reaches his destination)</span></li><li data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Rises&nbsp;in tension before giving the reader release</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Isn’t so tidy that it’s predictable or a cop-out</span></li><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Uses words that&nbsp;convey the sense of an ending</span></li></ol><span data-dcnode-id="1024" instrument_node="">
</span><h3 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Resolving primary story conflicts</span></h3><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">We’re satisfied when primary conflicts resolve, as there’s follow-through on preceding events. Solve conflicts by</span></p><span data-dcnode-id="1018" instrument_node="">
</span><ul data-dcnode-id="1013"><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Making wrongdoers or antagonists face the music (even if they emerge victorious in an unhappy ending for your protagonist)</span></li><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Make the outcome of your primary conflict feel explicable but not predictable. For example, make a&nbsp;killer’s escape or conviction equally possible – keep the reader guessing</span></li></ul><span data-dcnode-id="1012" instrument_node="">
</span><h3 data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">How to build rising action to your climax</span></h3><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">To make a story good throughout its final chapters:</span></p><span data-dcnode-id="1006" instrument_node="">
</span><ul data-dcnode-id="994"><li data-dcnode-id="999"><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/rising-action-definition-examples/" rel="noopener" target="_blank"><span data-dcnode-id="1005" instrument_node="">Build tension by adding story complications</span></a><span data-dcnode-id="1003" instrument_node="">. (In&nbsp;</span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">The Lord of the Rings</span></em><span data-dcnode-id="1000" instrument_node="">, Frodo must not only destroy the ring but do so with a greatly diminished party as he journeys towards the villain’s heartland)</span></li><li data-dcnode-id="995"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.writersdigest.com/writing-articles/by-writing-goal/beat-writers-block/how-to-build-tension-to-heighten-the-stakes"><span data-dcnode-id="998" instrument_node="">As Jessica Page Morrel says here</span></a><span data-dcnode-id="996" instrument_node="">, make sure that the stakes are high and the consequences for failure are dire. What does your character stand to lose if they don’t get what they want?</span></li></ul><span data-dcnode-id="993" instrument_node="">
</span><h3 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Ways to avoid a predictable ending</span></h3><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">To avoid a lame or cop-out ending and make your story go out with intrigue:</span></p><span data-dcnode-id="987" instrument_node="">
</span><ul data-dcnode-id="972"><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Make sure that you keep up dramatic tension until the end. Meaningful wins seldom come easy</span></li><li data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Keep readers guessing how things will pan out with a plot twist. If you </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/plot-twist-ideas-7-examples-tips/" rel="noopener" target="_blank"><span data-dcnode-id="983" instrument_node="">use a surprise plot twist</span></a><span data-dcnode-id="981" instrument_node="">, remember to keep the surprise believable</span></li><li data-dcnode-id="973"><span data-dcnode-id="979" instrument_node="">Avoid the&nbsp;</span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">deus ex machina,&nbsp;</span></em><span data-dcnode-id="976" instrument_node="">a practically miraculous event that lets you tie things up quickly with little exlanation. Characters developing amnesia as a plot device in soap operas is a classic example (watch a great parody of this here:&nbsp;</span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/5qLzF6mZrCw"><span data-dcnode-id="975" instrument_node="">https://youtu.be/5qLzF6mZrCw)</span></a></li></ul><span data-dcnode-id="971" instrument_node="">
</span><h3 data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">How to create the sense of an ending</span></h3><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">To give your final paragraphs a closing, rounding off feeling:</span></p><span data-dcnode-id="965" instrument_node="">
</span><ul data-dcnode-id="960"><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Read the final paragraphs of your favourite novels. What kind of language does the author use? Is it poignant, nostalgic, dramatic or epic in tone?</span></li><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Make sure the ending ties back to the preceding story. One example of this is having an ending that echoes, in imagery or themes, the opening lines of your novel</span></li></ul><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">Learn </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/start-writing-a-book" rel="noopener" target="_blank"><span data-dcnode-id="957" instrument_node="">how to make an outline for a book</span></a><span data-dcnode-id="955" instrument_node=""> by doing, with constructive feedback from our writing community.</span></p><span data-dcnode-id="953" instrument_node="">
