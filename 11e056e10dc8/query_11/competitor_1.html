</span><h2 class="date-header" data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">May 11, 2007</span></h2><span data-dcnode-id="2807" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-theater_people_tales_of entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2647" id="entry-33918494"><span data-dcnode-id="2806" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2649"><span data-dcnode-id="2805" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2801"><span data-dcnode-id="2804" instrument_node="">
</span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_the_th.html"><span data-dcnode-id="2803" instrument_node="">Suspense - The Thing in the Window</span></a></h3><span data-dcnode-id="2800" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2704"><span data-dcnode-id="2799" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2708"><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2794"><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/11/windowclaritamorguefile.jpg" onclick="window.open(this.href, '_blank', 'width=640,height=480,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Windowclaritamorguefile" border="0" data-dcnode-id="2797" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/11/windowclaritamorguefile.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Windowclaritamorguefile" width="192"></a><span data-dcnode-id="2795" instrument_node="">"The Thing in the Window" is the story of a man convinced that he sees a dead body in an apartment across the street.&nbsp; Try as he might, he can't get anyone to believe him. Obsessed with finding the phantom body, he becomes a terrific annoyance to his neighbors. </span></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2779"><span data-dcnode-id="2792" instrument_node="">The radioplay, written for </span><em data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Suspense</span></em><span data-dcnode-id="2789" instrument_node=""> by </span><a data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/Vienna/Stage/1045/Features/Fletcher.html"><span data-dcnode-id="2788" instrument_node="">Lucille Fletcher</span></a><span data-dcnode-id="2786" instrument_node="">, was performed in 1946 and 1949. The first presentation starred </span><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001072/"><span data-dcnode-id="2785" instrument_node="">Joseph Cotten</span></a><span data-dcnode-id="2783" instrument_node="">, and the second </span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0599910/"><span data-dcnode-id="2782" instrument_node="">Robert Montgomery</span></a><span data-dcnode-id="2780" instrument_node="">. There are some minor differences in the scripts and the endings, but both versions are entertaining.</span></p><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2767"><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/11/duelinthesundvd_2.jpg" onclick="window.open(this.href, '_blank', 'width=336,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Duelinthesundvd_2" border="0" data-dcnode-id="2777" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/11/duelinthesundvd_2.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Duelinthesundvd_2" width="100"></a><span data-dcnode-id="2775" instrument_node=""> When "The Thing in the Window" aired in 1946, it was Joseph Cotten's 7th guest appearance on the series. The "perennial </span><em data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Suspense</span></em><span data-dcnode-id="2772" instrument_node=""> favorite" would make a total of 17 appearances.&nbsp; At the time, he was promoting his upcoming film </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0038499/"><em data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Duel in the Sun</span></em></a><span data-dcnode-id="2768" instrument_node="">.&nbsp; </span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2765" instrument_node="">Actor, director, and </span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sag.org/sagWebApp/"><span data-dcnode-id="2764" instrument_node="">SAG</span></a><span data-dcnode-id="2762" instrument_node=""> president Robert Montgomery made a number of appearances as well. In 1944 and 1948, he starred in later adaptations of </span><em data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Suspense</span></em><span data-dcnode-id="2759" instrument_node="">'s premier episode, "</span><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspense_foreca.html"><span data-dcnode-id="2758" instrument_node="">The Lodger</span></a><span data-dcnode-id="2756" instrument_node="">". Montgomery was also the host of </span><em data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Suspense</span></em><span data-dcnode-id="2753" instrument_node=""> for a period in 1948 when the show was temporarily expanded to a one-hour format. When he appeared in "The Thing in the Window," he was promoting the movie </span><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0040499/"><em data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">June Bride</span></em></a><span data-dcnode-id="2749" instrument_node="">. </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/11/junebridevhs.jpg" onclick="window.open(this.href, '_blank', 'width=242,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Junebridevhs" border="0" data-dcnode-id="2748" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/11/junebridevhs.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Junebridevhs" width="72"></a><span data-dcnode-id="2746" instrument_node="">As it turned out, it was his last appearance on the series. It is worth noting however, that his daughter, actress </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000548/"><span data-dcnode-id="2745" instrument_node="">Elizabeth Montgomery</span></a><span data-dcnode-id="2743" instrument_node="">, would later star with </span><em data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Suspense</span></em><span data-dcnode-id="2740" instrument_node="">'s favorite actress, </span><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001547/"><span data-dcnode-id="2739" instrument_node="">Agnes Moorehead</span></a><span data-dcnode-id="2737" instrument_node="">, on the television show </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bewitched.net/"><em data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Bewitched</span></em></a><span data-dcnode-id="2733" instrument_node="">.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">"The Thing in the Window" starring Joseph Cotten aired on December 19, 1946.</span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2724"><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1946.12.19_Thing_In_The_Window.mp3"><span data-dcnode-id="2727" instrument_node="">Download Suspense.1946.12.19_Thing_In_The_Window.mp3</span></a><span data-dcnode-id="2725" instrument_node=""> </span></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">The version starring Robert Montgomery aired on January 27, 1949.</span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2716"><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1949.1.27_The_Thing_in_the_Window.mp3"><span data-dcnode-id="2719" instrument_node="">Download Suspense.1949.1.27_The_Thing_in_the_Window.mp3</span></a><span data-dcnode-id="2717" instrument_node=""> </span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">(Photo from </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/"><span data-dcnode-id="2713" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="2711" instrument_node="">)</span></p><span data-dcnode-id="2709" instrument_node="">
</span></div><span data-dcnode-id="2707" instrument_node="">

</span><div class="entry-inner" data-dcnode-id="2528"><span data-dcnode-id="2641" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2637"><span data-dcnode-id="2640" instrument_node="">
</span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_2462.html"><span data-dcnode-id="2639" instrument_node="">Suspense - 2462</span></a></h3><span data-dcnode-id="2636" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2583"><span data-dcnode-id="2635" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2587"><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2612"><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/07/rachwriting3_3.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Rachwriting3_3" border="0" data-dcnode-id="2633" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/07/rachwriting3_3.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Rachwriting3_3" width="134"></a><span data-dcnode-id="2631" instrument_node=""> While </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Escape</span></em><span data-dcnode-id="2628" instrument_node="">'s attempts at presenting heroic stories about poets fell flat, (see </span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/03/best_or_worst_e.html"><span data-dcnode-id="2627" instrument_node="">El Guitarrero</span></a><span data-dcnode-id="2625" instrument_node=""> and </span><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/best_or_worstev.html"><span data-dcnode-id="2624" instrument_node="">Evening Primrose</span></a><span data-dcnode-id="2622" instrument_node="">), </span><em data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Suspense</span></em><span data-dcnode-id="2619" instrument_node=""> produced </span><em data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">2462</span></em><span data-dcnode-id="2616" instrument_node="">, a superb episode about an American poet who rebels against the system. In this story, a man is put in prison in Arizona for wasting time and writing "doggerel" at his government job. His world, the Earth as it is 400 years into the future, is grossly overpopulated. "Nonproductive" workers like this poet are superfluous because they are not contributing to the survival of mankind with mathematical and scientific skills. He has spent his time at his job expressing himself creatively and now he has to face a trial by a computerized judicial system. Here we also learn that workers of the future are given "tranquil gum" and "happy gum." So, the future doesn't sound </span><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">all bad</span></em><span data-dcnode-id="2613" instrument_node="">.</span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2610" instrument_node="">"2462" is a thought provoking episode that makes a statement about the value of artistic expression. It was written by George Bamber and starred </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/dillyriauniversity/Suspense/NZ/ZerbeLawson.html"><span data-dcnode-id="2609" instrument_node="">Lawson Zerbe</span></a><span data-dcnode-id="2607" instrument_node=""> as the poet and </span><a data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0238719/"><span data-dcnode-id="2606" instrument_node="">Robert Dryden</span></a><span data-dcnode-id="2604" instrument_node=""> as the old prison guard.</span></p><span data-dcnode-id="2602" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">This episode aired on January 21, 1962.</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2595"><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1962.01.21_2462.mp3"><span data-dcnode-id="2598" instrument_node="">Download Suspense.1962.01.21_2462.mp3</span></a><span data-dcnode-id="2596" instrument_node=""> </span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node="">(Photo from </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D53512%26"><span data-dcnode-id="2592" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="2590" instrument_node="">)</span></p><span data-dcnode-id="2588" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">May 04, 2007</span></h2><span data-dcnode-id="2522" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2399" id="entry-33666758"><span data-dcnode-id="2521" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2401"><span data-dcnode-id="2520" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2516"><span data-dcnode-id="2519" instrument_node="">
</span><a data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_the_co.html"><span data-dcnode-id="2518" instrument_node="">Suspense - The Copper Tea Strainer</span></a></h3><span data-dcnode-id="2515" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2453"><span data-dcnode-id="2514" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2457"><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2492"><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0002107/"><span data-dcnode-id="2512" instrument_node="">Betty Grable</span></a><span data-dcnode-id="2510" instrument_node="">, famous for her "</span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bettygrable.classicactresses.com/"><span data-dcnode-id="2509" instrument_node="">million dollar legs</span></a><span data-dcnode-id="2507" instrument_node="">", is the star of </span><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Suspense's</span></em><span data-dcnode-id="2504" instrument_node=""> radio noir "The Copper Tea Strainer." Her legs aren't visible on radio, of course, but we </span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">hear her</span></em><span data-dcnode-id="2501" instrument_node=""> running around in high heels. Grable is convincing and sympathetic in this bleak but gripping, drama about a woman exhausted by having to care for her whiny, invalid mother. </span><a data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000994/"><span data-dcnode-id="2500" instrument_node="">Raymond Burr</span></a><span data-dcnode-id="2498" instrument_node=""> co-stars as the detective who comes to question her and </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0002016/"><span data-dcnode-id="2497" instrument_node="">William Conrad</span></a><span data-dcnode-id="2495" instrument_node=""> plays the boyfriend. "The Copper Tea Strainer" was written by John T. Copeland for </span><em data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Suspense.</span></em></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2490" instrument_node="">At the time she made this appearance, her only one on </span><em data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Suspense</span></em><span data-dcnode-id="2487" instrument_node="">, Betty Grable was promoting the film </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0041165/"><em data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">The Beautiful Blonde From Bashful Bend</span></em></a><em data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">, a </span></em><span data-dcnode-id="2481" instrument_node="">more light-hearted project than "The Copper Tea Strainer."</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">This episode aired on April 21, 1949. </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_4.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_3.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_2.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2469"><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1949.04.21_Copper_Tea_Strainer_The.mp3"><span data-dcnode-id="2472" instrument_node="">Download Suspense.1949.04.21_Copper_Tea_Strainer_The.mp3</span></a><span data-dcnode-id="2470" instrument_node=""> </span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2464"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_7.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Bettygrablevhs_7" border="0" data-dcnode-id="2467" height="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/04/bettygrablevhs_7.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Bettygrablevhs_7" width="170"></a><span data-dcnode-id="2465" instrument_node=""> </span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2459"><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_5.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/04/bettygrablevhs_6.jpg" onclick="window.open(this.href, '_blank', 'width=170,height=313,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><span data-dcnode-id="2460" instrument_node="">&nbsp; </span></p><span data-dcnode-id="2458" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">May 02, 2007</span></h2><span data-dcnode-id="2395" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cautionary_tales entry-category-musical_stars entry-category-world_war_ii entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2241" id="entry-33549284"><span data-dcnode-id="2394" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2243"><span data-dcnode-id="2393" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2389"><span data-dcnode-id="2392" instrument_node="">
</span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_to_fin.html"><span data-dcnode-id="2391" instrument_node="">Suspense - To Find Help</span></a></h3><span data-dcnode-id="2388" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2304"><span data-dcnode-id="2387" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2308"><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2382"><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Suspense</span></em><span data-dcnode-id="2383" instrument_node="">'s "To Find Help"&nbsp; is so plausible that it is genuinely scary.&nbsp;</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2366"><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/02/sinatraonlythelonely.jpg" onclick="window.open(this.href, '_blank', 'width=297,height=289,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.a/6a00d8341c52ee53ef0147e207e875970b-popup" onclick="window.open( this.href, '_blank', 'width=640,height=480,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0' ); return false" style="float: right;"><img alt="BewareMyLovely" class="asset asset-image at-xid-6a00d8341c52ee53ef0147e207e875970b" data-dcnode-id="2379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//escape-suspense.typepad.com/.a/6a00d8341c52ee53ef0147e207e875970b-200wi&amp;raw" style="width: 160px; margin: 0px 0px 5px 5px;" title="BewareMyLovely"></a><span data-dcnode-id="2377" instrument_node=""> The casting of this episode is what makes it intriguing. The role of a menacing young man who has "something wrong with his mind" was originally performed by </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000069/"><span data-dcnode-id="2376" instrument_node="">Frank Sinatra</span></a><span data-dcnode-id="2374" instrument_node="">, and later by </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000037/"><span data-dcnode-id="2373" instrument_node="">Gene Kelly</span></a><span data-dcnode-id="2371" instrument_node="">. Appearing in "To Find Help" is an unexpected choice for a musical star, but that is the hook. Both actors gave the performance their own flair but played it differently. The same year that this episode first aired, Sinatra starred with Kelly in the movie </span><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0037514/"><em data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Anchors Away</span></em></a><span data-dcnode-id="2367" instrument_node="">.</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2364" instrument_node="">This is a World War II era cautionary tale about an older woman who hires a young man to do some handywork around her house. She doesn't know the man well, but help is hard to find because of the war. She doesn't see any reason to worry because he seems so meek. The female role, Mrs. Gillis, was first played by </span><em data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Suspense'</span></em><span data-dcnode-id="2361" instrument_node="">s favorite actress, </span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agnes_Moorehead"><span data-dcnode-id="2360" instrument_node="">Agnes Moorehead</span></a><span data-dcnode-id="2358" instrument_node="">. </span><a data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000856/"><span data-dcnode-id="2357" instrument_node="">Ethel Barrymore</span></a><span data-dcnode-id="2355" instrument_node=""> played the role opposite Kelly in 1949. This episode was written for </span><em data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Suspense</span></em><span data-dcnode-id="2352" instrument_node=""> by </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0227571/"><span data-dcnode-id="2351" instrument_node="">Mel Dinelli</span></a><span data-dcnode-id="2349" instrument_node="">.</span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">The episode starring Frank Sinatra and Agnes Moorehead aired on January 18, 1945.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2341"><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1945-01-18_To_Find_Help.mp3"><span data-dcnode-id="2343" instrument_node="">Download Suspense.1945-01-18_To_Find_Help.mp3</span></a></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/02/anchorsaway_2.jpg" onclick="window.open(this.href, '_blank', 'width=308,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">The episode starring Gene Kelly, Ethel Barrymore and William Conrad aired on January 6, 1949.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2328"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.01.06.1949.To_Find_Help.mp3"><span data-dcnode-id="2333" instrument_node="">Download Suspense.01.06.1949.To_Find_Help.mp3</span></a><span data-dcnode-id="2331" instrument_node="">&nbsp; &nbsp; </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/02/gkelly1.gif" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><span data-dcnode-id="2329" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/02/genekelly_2.jpg" onclick="window.open(this.href, '_blank', 'width=336,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">-----</span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Added note:</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2317" instrument_node="">"To Find Help"&nbsp;play was adapted from Mel Dinelli's stage play "The Man." This story was also adapted into the film </span><em data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Beware, My Lovely</span></em><span data-dcnode-id="2314" instrument_node=""> (1952) starring Ida Lupino and Robert Ryan.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">(Revision 1/27/11)</span></p><span data-dcnode-id="2309" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">April 26, 2007</span></h2><span data-dcnode-id="2237" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cautionary_tales entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2103" id="entry-32244544"><span data-dcnode-id="2236" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2105"><span data-dcnode-id="2235" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2231"><span data-dcnode-id="2234" instrument_node="">
</span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspensedeep_de.html"><span data-dcnode-id="2233" instrument_node="">Suspense - Deep, Deep is My Love</span></a></h3><span data-dcnode-id="2230" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2160"><span data-dcnode-id="2229" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2164"><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/25/seahuntdvd.jpg" onclick="window.open(this.href, '_blank', 'width=267,height=385,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2207"><img alt="Seahuntdvd_2" border="0" data-dcnode-id="2224" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/25/seahuntdvd_2.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Seahuntdvd_2" width="106"><span data-dcnode-id="2223" instrument_node="">S</span><em data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">uspense</span></em><span data-dcnode-id="2220" instrument_node=""> producer and announcer </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0733501/bio"><span data-dcnode-id="2219" instrument_node="">William N. Robson</span></a><span data-dcnode-id="2217" instrument_node=""> introduces the episode "Deep, Deep is My Love" by stating that it is a story about skin divers, "intruding upon a world for which nature never intended them." Here we learn about the dangers of </span><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nitrogen_narcosis"><span data-dcnode-id="2216" instrument_node="">narcosis</span></a><span data-dcnode-id="2214" instrument_node="">, or as Jacques Cousteau called it, the "</span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.deep-six.com/page74.htm"><span data-dcnode-id="2213" instrument_node="">rapture of the deep</span></a><span data-dcnode-id="2211" instrument_node="">."&nbsp; The story takes place at </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parks.ca.gov/%3Fpage_id%3D623"><span data-dcnode-id="2210" instrument_node="">Point Dume</span></a><span data-dcnode-id="2208" instrument_node="">, a beach located near Santa Monica, California.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2192"><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000978/"><span data-dcnode-id="2205" instrument_node="">Lloyd Bridges</span></a><span data-dcnode-id="2203" instrument_node=""> was the star of the television show </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_Hunt"><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Sea Hunt</span></em></a><span data-dcnode-id="2199" instrument_node=""> (1958-1961) when he appeared on this episode of </span><em data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Suspense</span></em><span data-dcnode-id="2196" instrument_node="">. He plays Don, a diver who wants to investigate an unusual experience that occurred during his previous week's dive. Don and his clingy wife Joyce are at odds because she does not want him to go on the dive without her. He wants to be alone but Joyce wants them to do everything together. She relents and he escapes to a tranquil underwater realm where there is a golden girl who </span><em data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">really understands</span></em><span data-dcnode-id="2193" instrument_node=""> him.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2190" instrument_node="">The radio play was written by </span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.critiquemaster.com/"><span data-dcnode-id="2189" instrument_node="">novelist and screenwriter</span></a><span data-dcnode-id="2187" instrument_node=""> </span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0780733/"><span data-dcnode-id="2186" instrument_node="">Hank Searls</span></a><span data-dcnode-id="2184" instrument_node="">, who later wrote the best selling books </span><em data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Overboard</span></em><span data-dcnode-id="2181" instrument_node="">, </span><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Jaws II,</span></em><span data-dcnode-id="2178" instrument_node=""> and </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Sounding</span></em><span data-dcnode-id="2175" instrument_node="">. This episode also stars Marie Lynne, Tracy Roberts, and </span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0703767/"><span data-dcnode-id="2174" instrument_node="">Bill Quinn</span></a><span data-dcnode-id="2172" instrument_node="">. It was broadcast 48 years ago on April 26, 1959.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2166"><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense-59-04-26DeepDeepIsMyLove.mp3"><span data-dcnode-id="2169" instrument_node="">Download Suspense-59-04-26DeepDeepIsMyLove.mp3</span></a><span data-dcnode-id="2167" instrument_node=""> </span></p><span data-dcnode-id="2165" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">April 19, 2007</span></h2><span data-dcnode-id="2099" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cornell_woolrich entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1960" id="entry-32597954"><span data-dcnode-id="2098" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1962"><span data-dcnode-id="2097" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2093"><span data-dcnode-id="2096" instrument_node="">
</span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspense_librar.html"><span data-dcnode-id="2095" instrument_node="">Suspense - Library Book</span></a></h3><span data-dcnode-id="2092" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2017"><span data-dcnode-id="2091" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2021"><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2088"><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/19/myrna_loy_in_best_years_of_our_live.jpg" onclick="window.open(this.href, '_blank', 'width=664,height=529,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2052"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/19/myrna_loy_in_best_years_of_our_li_2.jpg" onclick="window.open(this.href, '_blank', 'width=664,height=529,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/24/myrna_loy_in_best_years_of_our_live.jpg" onclick="window.open(this.href, '_blank', 'width=422,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/24/myrna_loy_in_best_years_of_our_li_2.jpg" onclick="window.open(this.href, '_blank', 'width=422,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Myrna_loy_in_best_years_of_our_li_2" border="0" data-dcnode-id="2084" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/24/myrna_loy_in_best_years_of_our_li_2.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Myrna_loy_in_best_years_of_our_li_2" width="168"></a><span data-dcnode-id="2082" instrument_node="">In honor of </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ala.org/ala/pio/natlibraryweek/nlw.htm"><span data-dcnode-id="2081" instrument_node="">National Library Week</span></a><span data-dcnode-id="2079" instrument_node="">, here is the </span><em data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Suspense</span></em><span data-dcnode-id="2076" instrument_node=""> episode "Library Book." This episode stars </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myrna_Loy"><span data-dcnode-id="2075" instrument_node="">Myrna Loy</span></a><span data-dcnode-id="2073" instrument_node=""> as Prudence, a public librarian who stops at nothing to discover who vandalized the library's copy of </span><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Gone With the Wind</span></em><em data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">.</span></em><span data-dcnode-id="2068" instrument_node=""> She is the </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mcphee.com/items/11247.html"><span data-dcnode-id="2067" instrument_node="">stereotypical librarian</span></a><span data-dcnode-id="2065" instrument_node=""> - until she takes off her glasses. Then, for reasons she can't understand, men call her "toots." Of course, the audience understands because Prudence is really Myrna Loy, the sexy star of </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//themave.com/Powell/powloy/WmMyrna.htm"><em data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">The Thin Man</span></em></a><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node=""> </span></em><span data-dcnode-id="2059" instrument_node="">movies.</span><em data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node=""> </span></em><span data-dcnode-id="2056" instrument_node="">In her heyday in the 1930's, she was voted </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//golden_age_films.tripod.com/html/mloy/mlbio.htm"><span data-dcnode-id="2055" instrument_node="">"The Queen of Hollywood"</span></a><span data-dcnode-id="2053" instrument_node=""> by fans.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2050" instrument_node="">"Library Book" was based on the 1939 short story "The Book That Squealed" by </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//members.toast.net/woolrich/black.htm"><span data-dcnode-id="2049" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="2047" instrument_node=""> and was adapted for </span><em data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Suspense</span></em><span data-dcnode-id="2044" instrument_node=""> by </span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0818630/"><span data-dcnode-id="2043" instrument_node="">William Spier</span></a><span data-dcnode-id="2041" instrument_node="">. The dialogue is witty and the story is entertaining for anyone who has worked in a library. </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0083126/"><span data-dcnode-id="2040" instrument_node="">Conrad Binyon</span></a><span data-dcnode-id="2038" instrument_node="">, </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cathy_Lewis"><span data-dcnode-id="2037" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="2035" instrument_node=""> and </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0536890/"><span data-dcnode-id="2034" instrument_node="">Wally Maher</span></a><span data-dcnode-id="2032" instrument_node=""> also appear.&nbsp; </span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">This episode was broadcast on September 20, 1945.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2023"><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1945.09.20_Library_Book.mp3"><span data-dcnode-id="2026" instrument_node="">Download Suspense.1945.09.20_Library_Book.mp3</span></a><span data-dcnode-id="2024" instrument_node=""> </span></p><span data-dcnode-id="2022" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">April 12, 2007</span></h2><span data-dcnode-id="1956" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-victorian_horror entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1792" id="entry-32270276"><span data-dcnode-id="1955" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1794"><span data-dcnode-id="1954" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1950"><span data-dcnode-id="1953" instrument_node="">
</span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspense_foreca.html"><span data-dcnode-id="1952" instrument_node="">Suspense - (Forecast) The Lodger</span></a></h3><span data-dcnode-id="1949" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1849"><span data-dcnode-id="1948" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1853"><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1940"><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/12/hitchcock_the_lodger_2.jpg" onclick="window.open(this.href, '_blank', 'width=267,height=475,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Hitchcock_the_lodger_2" border="0" data-dcnode-id="1946" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/12/hitchcock_the_lodger_2.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Hitchcock_the_lodger_2" width="120"></a><span data-dcnode-id="1944" instrument_node=""> How did the radio show </span><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Suspense</span></em><span data-dcnode-id="1941" instrument_node=""> begin? </span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1938" instrument_node="">It first appeared on a CBS program called </span><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrsite.com/logs/logf1049.htm"><em data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Forecast</span></em></a><span data-dcnode-id="1934" instrument_node="">, which presented the pilot episodes of new shows. </span><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Forecast</span></em><span data-dcnode-id="1931" instrument_node=""> aired </span><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Suspense:</span></em><span data-dcnode-id="1928" instrument_node=""> "The Lodger" on July 22, 1940. The radio-play was based on the novel by </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marie_Belloc_Lowndes"><span data-dcnode-id="1927" instrument_node="">Marie Belloc Lowndes</span></a><span data-dcnode-id="1925" instrument_node="">, as well as many other</span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casebook.org/suspects/lodger.html"><span data-dcnode-id="1924" instrument_node=""> tales of mysterious lodgers</span></a><span data-dcnode-id="1922" instrument_node=""> who may have been </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.met.police.uk/history/ripper.htm"><span data-dcnode-id="1921" instrument_node="">Jack-the-Ripper</span></a><span data-dcnode-id="1919" instrument_node="">. </span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1916" instrument_node="">The premier episode was directed by </span><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hitchcock.tv/"><span data-dcnode-id="1915" instrument_node="">Alfred Hitchcock</span></a><span data-dcnode-id="1913" instrument_node="">, who had previously filmed </span><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Lodger%3A_A_Story_of_the_London_Fog"><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The Lodger</span></em></a><span data-dcnode-id="1909" instrument_node=""> in 1927. </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dougmacaulay.com/kingspud/sel_by_actor_index_2.php%3Factor_first%3DEdmund%26actor_last%3DGwenn"><span data-dcnode-id="1908" instrument_node="">Edmund Gwenn</span></a><span data-dcnode-id="1906" instrument_node=""> and </span><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//movies2.nytimes.com/gst/movies/filmography.html%3Fp_id%3D45795"><span data-dcnode-id="1905" instrument_node="">Herbert Marshall</span></a><span data-dcnode-id="1903" instrument_node=""> were working with Hitchcock on the movie </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/title/tt0032484/"><em data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Foreign Correspondent</span></em></a><span data-dcnode-id="1899" instrument_node=""> when they appeared on this program. "The Lodger" is a unique </span><em data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Suspense</span></em><span data-dcnode-id="1896" instrument_node=""> episode because it was performed in front of a studio audience.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1893" instrument_node="">Although the response was good, it would be another two years until </span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Suspense</span></em><span data-dcnode-id="1890" instrument_node=""> became a regular series on CBS. Once it was established in 1942, the show went on to run for twenty years! For more information about the first episode of </span><em data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Suspense</span></em><span data-dcnode-id="1887" instrument_node=""> and the show's association with Alfred Hitchcock, read </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.labyrinth.net.au/~muffin/suspense_c.html"><span data-dcnode-id="1886" instrument_node="">"Murder and Suspense: Hitchcock's Established Reputation</span></a><span data-dcnode-id="1884" instrument_node="">" by Martin Grams.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1881" instrument_node="">Herbert Marshall stars as Mr. Sleuth and Edmund Gwenn stars as Mr. Bunting. This episode also features </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0303990/"><span data-dcnode-id="1880" instrument_node="">Noreen Gammill</span></a><span data-dcnode-id="1878" instrument_node="">, </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0444012/"><span data-dcnode-id="1877" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="1875" instrument_node=""> and </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lurene_Tuttle"><span data-dcnode-id="1874" instrument_node="">Lurene Tuttle</span></a><span data-dcnode-id="1872" instrument_node="">. Alfred Hitchcock makes an appearance at the end of the show. </span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1867"><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Forecast-The_Lodger-Suspense_audition_40-07-21_CBS_.mp3"><span data-dcnode-id="1869" instrument_node="">Download Forecast-The_Lodger-Suspense_audition_40-07-22_CBS_.mp3</span></a></p><span data-dcnode-id="1866" instrument_node="">

</span><div class="entry-category-best_of_suspense entry-category-ghost_stories entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1655" id="entry-32244590"><span data-dcnode-id="1787" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1657"><span data-dcnode-id="1786" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1782"><span data-dcnode-id="1785" instrument_node="">
</span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspenseghost_h.html"><span data-dcnode-id="1784" instrument_node="">Suspense - Ghost Hunt</span></a></h3><span data-dcnode-id="1781" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1712"><span data-dcnode-id="1780" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1716"><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Listen to this episode with the lights off. </span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1770"><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/08/lalaurie_hauntedhouse_doo_3.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=600,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/24/lalaurie_hauntedhouse_doo.jpg" onclick="window.open(this.href, '_blank', 'width=379,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/24/lalaurie_hauntedhouse_doo_2.jpg" onclick="window.open(this.href, '_blank', 'width=379,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Lalaurie_hauntedhouse_doo_2" border="0" data-dcnode-id="1773" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/24/lalaurie_hauntedhouse_doo_2.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="Lalaurie_hauntedhouse_doo_2" width="151"></a><span data-dcnode-id="1771" instrument_node="">In this story about a stunt that goes wrong, radio personality Smiley Smith and paranormal investigator, Dr. Reed tour a haunted house in Malibu, California. Their experiences are recorded for playback on Smith's show. The house, known as "The Death Trap," has a bad reputation because four of its residents have committed suicide. </span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1768" instrument_node="">"Ghost Hunt" was adapted for </span><em data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Suspense</span></em><span data-dcnode-id="1765" instrument_node=""> by </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//movies2.nytimes.com/gst/movies/filmography.html%3Fp_id%3D104396"><span data-dcnode-id="1764" instrument_node="">Walter Newman</span></a><span data-dcnode-id="1762" instrument_node=""> from an original story by the renowned ghost story writer </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H._Russell_Wakefield"><span data-dcnode-id="1761" instrument_node="">Herbert Russell Wakefield</span></a><span data-dcnode-id="1759" instrument_node="">. </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.radiohof.org/musicvariety/ralphedwards.html"><span data-dcnode-id="1758" instrument_node="">Ralph Edwards</span></a><span data-dcnode-id="1756" instrument_node="">, who starred as Smiley Smith, was the creator of </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Truth or Consequences,This is Your Life, Name That Tune </span></em><span data-dcnode-id="1753" instrument_node="">and</span><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node=""> The People''s Court.</span></em><span data-dcnode-id="1750" instrument_node=""> According to the website of </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ralphedwards.com/legacy/"><span data-dcnode-id="1749" instrument_node="">Ralph Edwards Productions</span></a><span data-dcnode-id="1747" instrument_node="">, "At least one Ralph Edwards’ show has been on radio or television every year for the past 65 - a feat unmatched in Hollywood." </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dougmacaulay.com/kingspud/sel_by_actor_index_2.php%3Factor_first%3DJoseph%26actor_last%3DKearns"><span data-dcnode-id="1746" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="1744" instrument_node=""> starred as Dr. Reed and </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//legends.disney.go.com/legends/detail%3Fkey%3DPaul%2BFrees"><span data-dcnode-id="1743" instrument_node="">Paul Frees</span></a><span data-dcnode-id="1741" instrument_node="">, the voice of the "Ghost Host" at </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//disneyland.disney.go.com/disneyland/en_US/parks/attractions/detail%3Fname%3DHauntedMansionAttractionPage%26CMP%3DILC-DisDVDHauntMan%26bhcp%3D1"><span data-dcnode-id="1740" instrument_node="">Disneyland's Haunted Mansion</span></a><span data-dcnode-id="1738" instrument_node="">, was the </span><em data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Suspense</span></em><span data-dcnode-id="1735" instrument_node=""> announcer.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1729"><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Suspense</span></em><span data-dcnode-id="1730" instrument_node=""> aired this episode on June 23, 1949.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1724"><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.6.23.1949.GhostHunt.mp3"><span data-dcnode-id="1727" instrument_node="">Download Suspense.6.23.1949.GhostHunt.mp3</span></a><span data-dcnode-id="1725" instrument_node=""> </span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node="">Image from </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hauntedamericatours.com/"><span data-dcnode-id="1721" instrument_node="">Haunted America Tours</span></a><span data-dcnode-id="1719" instrument_node="">.</span></p><span data-dcnode-id="1717" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">April 05, 2007</span></h2><span data-dcnode-id="1651" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cautionary_tales entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1540" id="entry-32158982"><span data-dcnode-id="1650" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1542"><span data-dcnode-id="1649" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1645"><span data-dcnode-id="1648" instrument_node="">
</span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/suspensesomebod.html"><span data-dcnode-id="1647" instrument_node="">Suspense-Somebody Help Me</span></a></h3><span data-dcnode-id="1644" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1597"><span data-dcnode-id="1643" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1601"><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">Last week's episode, </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/03/suspensedrive_i.html"><span data-dcnode-id="1640" instrument_node="">"Drive-In,"</span></a><span data-dcnode-id="1638" instrument_node=""> warned of the dangers of getting into a car with a stranger. This week's episode, "Somebody Help Me," warns of the dangers of getting "picked-up."&nbsp; Based on a true story, this cautionary tale is still a good one. Which true story this is based on, they don't say.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1614"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/03/cornelwilde.jpg" onclick="window.open(this.href, '_blank', 'width=470,height=590,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Cornelwilde" border="0" data-dcnode-id="1635" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/03/cornelwilde.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="Cornelwilde" width="94"></a><span data-dcnode-id="1633" instrument_node=""> "Somebody Help Me" was written for </span><em data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Suspense</span></em><span data-dcnode-id="1630" instrument_node=""> by </span><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0277643/"><span data-dcnode-id="1629" instrument_node="">Morton Fine</span></a><span data-dcnode-id="1627" instrument_node=""> and </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0295053/"><span data-dcnode-id="1626" instrument_node="">David Friedkin</span></a><span data-dcnode-id="1624" instrument_node="">, who later collaborated on many television projects. Movie actor </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0928425/"><span data-dcnode-id="1623" instrument_node="">Cornel Wilde</span></a><span data-dcnode-id="1621" instrument_node=""> (pictured) starred as Eddy Franklin, and </span><em data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Suspense</span></em><span data-dcnode-id="1618" instrument_node=""> regular </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0507019/"><span data-dcnode-id="1617" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="1615" instrument_node=""> starred as Eileen.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Eddy is an unctious, chatterbox with a temper who uses his Southern gentleman's charm to pick up Eileen. The audience knows that Eileen is in trouble as soon as she gets into his car but she doesn't. This is a simple crime drama that makes its point easily. Keep in mind while listening to Wilde's performance that he was born in Hungary and spoke five languages: Hungarian, French, German, English, Italian, and Russian.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">This episode was broadcast on March 29, 1954.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1603"><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense1954.03.29%2520Somebody%2520Help%2520Me.mp3"><span data-dcnode-id="1606" instrument_node="">Download suspense1954.03.29 Somebody Help Me.mp3</span></a><span data-dcnode-id="1604" instrument_node=""> </span></p><span data-dcnode-id="1602" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">March 27, 2007</span></h2><span data-dcnode-id="1536" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cautionary_tales entry-category-musical_stars entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1417" id="entry-32159032"><span data-dcnode-id="1535" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1419"><span data-dcnode-id="1534" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1530"><span data-dcnode-id="1533" instrument_node="">
</span><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/03/suspensedrive_i.html"><span data-dcnode-id="1532" instrument_node="">Suspense-Drive In</span></a></h3><span data-dcnode-id="1529" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1477"><span data-dcnode-id="1528" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1481"><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">If you need a reminder as to why it is you should never accept a ride from a stranger -- then "Drive-In" is for you! This episode belongs to a sub-genre of </span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Suspense</span></em><span data-dcnode-id="1523" instrument_node=""> stories that are also cautionary tales. These dramas are still convincing because their warnings are still valid.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1500"><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/03/27/judygarland_2.jpg" onclick="window.open(this.href, '_blank', 'width=240,height=240,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Judygarland_2" border="0" data-dcnode-id="1520" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/03/27/judygarland_2.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="Judygarland_2" width="144"></a><span data-dcnode-id="1518" instrument_node=""> </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jgdb.com/"><span data-dcnode-id="1517" instrument_node="">Judy Garland</span></a><span data-dcnode-id="1515" instrument_node=""> stars in this episode but do not expect to hear singing. Here she demonstrates that she was just as compelling as an actress on radio as she was in movies. In 1946, the year this show aired, she also appeared in the films: </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0038589/"><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">The Harvey Girls</span></em></a><span data-dcnode-id="1511" instrument_node="">, </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0039116/"><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Ziegfield Follies</span></em></a><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">,</span></em><span data-dcnode-id="1505" instrument_node=""> and </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0039035/"><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Till the Clouds Roll By</span></em></a><span data-dcnode-id="1501" instrument_node="">.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1498" instrument_node="">"Drive-In" was written for </span><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Suspense</span></em><span data-dcnode-id="1495" instrument_node=""> by </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0227571/"><span data-dcnode-id="1494" instrument_node="">Mel Dinelli</span></a><span data-dcnode-id="1492" instrument_node=""> and </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rottentomatoes.com/p/1067777-muriel_ray_bolton/"><span data-dcnode-id="1491" instrument_node="">Muriel Ray Bolton</span></a><span data-dcnode-id="1489" instrument_node="">.&nbsp; It was broadcast three times but Garland only appeared in the lead role once. Raymond Lewis played the driver. This version was heard on November 21, 1946.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1483"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/461121_drive_in_w_judy_garland.mp3"><span data-dcnode-id="1486" instrument_node="">Download 461121_drive_in_w_judy_garland.mp3</span></a><span data-dcnode-id="1484" instrument_node=""> </span></p><span data-dcnode-id="1482" instrument_node="">
