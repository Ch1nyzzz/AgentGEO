</span></h2><span data-dcnode-id="5404" instrument_node="">
</span><span data-dcnode-id="5402" instrument_node="">
</span><h2 class="date-header" data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">July 28, 2007</span></h2><span data-dcnode-id="5399" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cornell_woolrich entry-category-suspense_television entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="5264" id="entry-36992788"><span data-dcnode-id="5398" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="5266"><span data-dcnode-id="5397" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="5393"><span data-dcnode-id="5396" instrument_node="">
</span><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/07/suspense--after.html"><span data-dcnode-id="5395" instrument_node="">Suspense - After Dinner Story</span></a></h3><span data-dcnode-id="5392" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5324"><span data-dcnode-id="5391" instrument_node="">
</span><div class="entry-body" data-dcnode-id="5328"><span data-dcnode-id="5390" instrument_node="">
</span><p data-dcnode-id="5374"><a data-dcnode-id="5388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/29/elev_shaft.jpg" onclick="window.open(this.href, '_blank', 'width=377,height=301,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Elev_shaft" border="0" data-dcnode-id="5389" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/29/elev_shaft.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Elev_shaft" width="226"></a><span data-dcnode-id="5387" instrument_node="">"After-Dinner Story" was one of many works by </span><a data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0941280/"><span data-dcnode-id="5386" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="5384" instrument_node=""> adapted for radio. </span><em data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Suspense</span></em><span data-dcnode-id="5381" instrument_node=""> presented twenty-two of his stories on their program, but his works were also performed on </span><em data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Molle Mystery Theater</span></em><span data-dcnode-id="5378" instrument_node=""> and other radio shows. </span><em data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">Suspense</span></em><span data-dcnode-id="5375" instrument_node="">'s "After Dinner Story" was based on the 1938 short story of the same name which Woolrich wrote under his pseudonym, William Irish. </span></p><span data-dcnode-id="5373" instrument_node="">
</span><p data-dcnode-id="5369"><em data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">Suspense</span></em><span data-dcnode-id="5370" instrument_node="">'s version altered the structure of the story a little, but otherwise retold the tale as it was intended. What was left out was the Depression-era setting, and so it lost some of its depth and meaning. The original short story is very tense and the description of the elevator crash is more frightening than on radio. Read Woolrich's story if you get the chance.</span></p><span data-dcnode-id="5368" instrument_node="">
</span><p data-dcnode-id="5344"><span data-dcnode-id="5367" instrument_node="">"After-Dinner Story" was adapted for radio by </span><a data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0724307/"><span data-dcnode-id="5366" instrument_node="">Robert L. Richards</span></a><span data-dcnode-id="5364" instrument_node="">. </span><a data-dcnode-id="5362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0472603/"><span data-dcnode-id="5363" instrument_node="">Otto Kruger</span></a><span data-dcnode-id="5361" instrument_node=""> appeared as Mr. Hardecker. Also featured were </span><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="5360" instrument_node="">Hans Conried</span></a><span data-dcnode-id="5358" instrument_node="">, </span><a data-dcnode-id="5356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0426954/"><span data-dcnode-id="5357" instrument_node="">William Johnstone</span></a><span data-dcnode-id="5355" instrument_node="">, and </span><a data-dcnode-id="5353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0581308/"><span data-dcnode-id="5354" instrument_node="">Lou Merrill</span></a><span data-dcnode-id="5352" instrument_node="">. This story aired once on October 26, 1943. Although it never aired again on the </span><em data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">Suspense</span></em><span data-dcnode-id="5349" instrument_node=""> radio program, the television show </span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0713884/"><em data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">Suspense</span></em></a><span data-dcnode-id="5345" instrument_node=""> aired this story on April 12, 1949. Otto Kruger starred in the same role he had played in the radio version.</span></p><span data-dcnode-id="5343" instrument_node="">
</span><p data-dcnode-id="5336"><strong data-dcnode-id="5340"><span data-dcnode-id="5341" style="font-size: 1.2em;"><span data-dcnode-id="5342" instrument_node="">.</span></span></strong><span data-dcnode-id="5339" instrument_node=""> </span><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1943.10.26_After_Dinner_Story.mp3"><span data-dcnode-id="5338" instrument_node="">Download Suspense.1943.10.26_After_Dinner_Story.mp3</span></a></p><span data-dcnode-id="5335" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">July 27, 2007</span></h2><span data-dcnode-id="5260" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="5157" id="entry-36977806"><span data-dcnode-id="5259" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="5159"><span data-dcnode-id="5258" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="5254"><span data-dcnode-id="5257" instrument_node="">
</span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/07/my-own-murderer.html"><span data-dcnode-id="5256" instrument_node="">Suspense - My Own Murderer</span></a></h3><span data-dcnode-id="5253" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5211"><span data-dcnode-id="5252" instrument_node="">
</span><div class="entry-body" data-dcnode-id="5215"><span data-dcnode-id="5251" instrument_node="">
</span><p data-dcnode-id="5244"><a data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/27/348pxoldbaileylondon900_3.jpg" onclick="window.open(this.href, '_blank', 'width=330,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="348pxoldbaileylondon900_3" border="0" data-dcnode-id="5250" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/27/348pxoldbaileylondon900_3.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="348pxoldbaileylondon900_3" width="165"></a><span data-dcnode-id="5248" instrument_node=""> Richard Samson is a London attorney who receives a visit at his home from an old friend, Alan Rennick. The circumstances prompting this visit are unpleasant. Rennick has just murdered his butler, Baines. The butler had stolen letters and then tried to blackmail him, so Rennick bashed him in the head with a poker. Now he wants his friend and attorney to hide him, or he will kill him too. Samson agrees, but nearly levels his old chum by explaining that while in hiding he will have to do his own laundry, cooking, and serving. Clearly, Rennick hadn't considered </span><em data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">all of</span></em><span data-dcnode-id="5245" instrument_node=""> the ramifications of murdering his butler.</span></p><span data-dcnode-id="5243" instrument_node="">
</span><p data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">Rennick stays in hiding at Samson's flat until his escape can be carried out. He asks his friend Margaret Farley to help and soon a plan is in motion. Their idea is to fake his death so he can assume another identity. Anita Kilner, the lady-friend who had written the letters stolen by the butler, is also called in to help. All four of them set out on a frosty night to stage the "accidental drowning" in the river. Unfortunately for Rennick, the plan doesn't play out as expected.</span></p><span data-dcnode-id="5240" instrument_node="">
</span><p data-dcnode-id="5232"><span data-dcnode-id="5239" instrument_node="">"My Own Murderer" starred </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0003339/"><span data-dcnode-id="5238" instrument_node="">Herbert Marshall</span></a><span data-dcnode-id="5236" instrument_node=""> as Richard Samson and </span><a data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0516093/"><span data-dcnode-id="5235" instrument_node="">Norman Lloyd</span></a><span data-dcnode-id="5233" instrument_node=""> as Alan Rennick. The radio-play was written by Richard Hull. This episode aired on May 24, 1945.</span></p><span data-dcnode-id="5231" instrument_node="">
</span><p data-dcnode-id="5223"><strong data-dcnode-id="5228"><span data-dcnode-id="5229" style="font-size: 1.2em;"><span data-dcnode-id="5230" instrument_node="">.</span></span></strong><span data-dcnode-id="5227" instrument_node="">&nbsp; </span><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1945.05.24.My_Own_Murderer.mp3"><span data-dcnode-id="5226" instrument_node="">Download Suspense.1945.05.24.My_Own_Murderer.mp3</span></a><span data-dcnode-id="5224" instrument_node=""> </span></p><span data-dcnode-id="5222" instrument_node="">
</span><p data-dcnode-id="5217"><span data-dcnode-id="5221" instrument_node="">(Image of the Old Bailey in London from </span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Image%3AOldbaileylondon-900.jpg"><span data-dcnode-id="5220" instrument_node="">Wikipedia.com</span></a><span data-dcnode-id="5218" instrument_node="">) </span></p><span data-dcnode-id="5216" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">July 19, 2007</span></h2><span data-dcnode-id="5153" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="5023" id="entry-36641102"><span data-dcnode-id="5152" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="5025"><span data-dcnode-id="5151" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="5147"><span data-dcnode-id="5150" instrument_node="">
</span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/07/suspense---dark.html"><span data-dcnode-id="5149" instrument_node="">Suspense - Dark Journey</span></a></h3><span data-dcnode-id="5146" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5077"><span data-dcnode-id="5145" instrument_node="">
</span><div class="entry-body" data-dcnode-id="5081"><span data-dcnode-id="5144" instrument_node="">
</span><p data-dcnode-id="5136"><span data-dcnode-id="5143" instrument_node="">In </span><em data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">Suspense</span></em><span data-dcnode-id="5140" instrument_node="">'s "Dark Journey" we learn that if we really want something to happen, we can </span><em data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">will </span></em><span data-dcnode-id="5137" instrument_node="">it to happen. At least that is what the main character, Ann Brody, believes. She concentrates on what she wants her boyfriend to do and then, using her power of will, she makes him do it. </span></p><span data-dcnode-id="5135" instrument_node="">
</span><p data-dcnode-id="5131"><a data-dcnode-id="5133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/19/morguefile163683.jpg" onclick="window.open(this.href, '_blank', 'width=160,height=157,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile163683" border="0" data-dcnode-id="5134" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/19/morguefile163683.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile163683" width="160"></a><span data-dcnode-id="5132" instrument_node=""> </span></p><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5125"><span data-dcnode-id="5129" instrument_node="">The story begins as Ann and her friend Alice arrive in New York City to meet Ann's boyfriend, Clyde Dexter. Ann is clingy and "terribly in love," a situation that signals trouble</span><em data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">.</span></em><span data-dcnode-id="5126" instrument_node=""> (Beware of this on radio--and in your own life.) Ann's boyfriend can't meet them at the train station, or have lunch with them that day, or see her the next day. We can't really blame him based on what we know about Ann so far.</span></p><span data-dcnode-id="5124" instrument_node="">
</span><p data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Alice tries to make Ann realize that she has been jilted but Ann refuses to accept that. Ann feels that it is Clyde's mother who is keeping them apart and she uses her "power of will" to get her boyfriend back. When his mother is suddenly murdered, Ann does gets her man back. Alice however, finds the whole situation creepy. She stays away until she has to take a "dark journey" back to see her friend 15 years later.</span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5116"><span data-dcnode-id="5120" instrument_node="">"Dark Journey" was a radio-play written for two actresses by </span><a data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/Vienna/Stage/1045/Features/Fletcher.html"><span data-dcnode-id="5119" instrument_node="">Lucille Fletcher</span></a><span data-dcnode-id="5117" instrument_node="">. The script leaves you guessing at the truth right up to the end. Most women have had a friend who became a little too weird over a boyfriend and this story plays on those fears and bad memories. Ann is a pathetic mess and her friend is stuck in the middle.</span></p><span data-dcnode-id="5115" instrument_node="">
</span><p data-dcnode-id="5097"><span data-dcnode-id="5114" instrument_node="">This episode starred </span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nancy_Kelly"><span data-dcnode-id="5113" instrument_node="">Nancy Kelly</span></a><span data-dcnode-id="5111" instrument_node=""> as Ann. Years later, she won a Tony Award (1955) and a nomination for an Academy Award for her role in the play and movie, </span><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Bad_Seed"><em data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">The Bad Seed</span></em></a><span data-dcnode-id="5107" instrument_node="">. </span><em data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">Suspense</span></em><span data-dcnode-id="5104" instrument_node=""> regular </span><a data-dcnode-id="5102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cathy_Lewis"><span data-dcnode-id="5103" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="5101" instrument_node=""> starred as Alice. "Dark Journey" was produced, edited and directed by </span><a data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0818630/"><span data-dcnode-id="5100" instrument_node="">William Spiers</span></a><span data-dcnode-id="5098" instrument_node="">. It aired once on April, 25, 1946.</span></p><span data-dcnode-id="5096" instrument_node="">
</span><p data-dcnode-id="5089"><strong data-dcnode-id="5093"><span data-dcnode-id="5094" style="font-size: 1.4em;"><span data-dcnode-id="5095" instrument_node="">.</span></span></strong><span data-dcnode-id="5092" instrument_node="">&nbsp; </span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense.04.25.1946.Dark%2520Journey.mp3"><span data-dcnode-id="5091" instrument_node="">Download suspense.04.25.1946.Dark Journey.mp3</span></a></p><span data-dcnode-id="5088" instrument_node="">
</span><p data-dcnode-id="5083"><span data-dcnode-id="5087" instrument_node="">(Photo by </span><a data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//morguefile.com/archive/%3Fdisplay%3D163683%26"><span data-dcnode-id="5086" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="5084" instrument_node="">)</span></p><span data-dcnode-id="5082" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">July 13, 2007</span></h2><span data-dcnode-id="5019" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-theater_people_tales_of entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4830" id="entry-36373818"><span data-dcnode-id="5018" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4832"><span data-dcnode-id="5017" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="5013"><span data-dcnode-id="5016" instrument_node="">
</span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/07/suspense---rave.html"><span data-dcnode-id="5015" instrument_node="">Suspense - Rave Notice</span></a></h3><span data-dcnode-id="5012" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4887"><span data-dcnode-id="5011" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4891"><span data-dcnode-id="5010" instrument_node="">
</span><p data-dcnode-id="4967"><span data-dcnode-id="5009" instrument_node="">"Rave Notice" was written for </span><em data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">Suspense</span></em><span data-dcnode-id="5006" instrument_node=""> by </span><a data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0688117/"><span data-dcnode-id="5005" instrument_node="">James Poe</span></a><span data-dcnode-id="5003" instrument_node="">, a scriptwriter who not only wrote intriguing original stories but also successfully adapted other author's works for radio and film. He wrote the radio-plays for a number of notable episodes of </span><em data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">Escape</span></em><span data-dcnode-id="5000" instrument_node=""> including their most famous episode</span><em data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">, "</span></em><a data-dcnode-id="4996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/escape_three_sk.html"><span data-dcnode-id="4997" instrument_node="">Three Skeleton Key</span></a><span data-dcnode-id="4995" instrument_node="">," an adaptation from the short story by George Toudouze. Among the episodes he wrote for </span><em data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">Suspense</span></em><span data-dcnode-id="4992" instrument_node="">, "</span><a data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/suspensenever_f.html"><span data-dcnode-id="4991" instrument_node="">Never Follow a Banjo Act</span></a><span data-dcnode-id="4989" instrument_node="">" and "Rave Notice" stand out as two of the best radio-plays </span><em data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Suspense</span></em><span data-dcnode-id="4986" instrument_node=""> ever presented. In 1956 he </span><a data-dcnode-id="4984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0688117/awards"><span data-dcnode-id="4985" instrument_node="">won an Academy Award</span></a><span data-dcnode-id="4983" instrument_node=""> for his work on the script for </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0048960/"><em data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Around the World in 80 Days</span></em></a><span data-dcnode-id="4979" instrument_node=""> and he was nominated three other times for his work on </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0051459/"><em data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">Cat on a Hot Tin Roof</span></em></a><span data-dcnode-id="4975" instrument_node="">, </span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0057251/"><em data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">Lillies of the Field</span></em></a><span data-dcnode-id="4971" instrument_node="">, and </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0065088/"><em data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">They Shoot Horses, Don't They?</span></em></a></p><span data-dcnode-id="4966" instrument_node="">
</span><p data-dcnode-id="4962"><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/13/singchair_2.jpg" onclick="window.open(this.href, '_blank', 'width=336,height=430,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Singchair_2" border="0" data-dcnode-id="4965" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/13/singchair_2.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Singchair_2" width="100"></a><span data-dcnode-id="4963" instrument_node=""> </span></p><span data-dcnode-id="4961" instrument_node="">
</span><p data-dcnode-id="4956"><span data-dcnode-id="4960" instrument_node="">"Rave Notice" is the story of a struggling Broadway actor named Sam who commits murder after his director replaces him in a play. In order to avoid getting the electric chair, he uses the </span><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/wnet/americanmasters/database/stanislavsky_c.html"><span data-dcnode-id="4959" instrument_node="">Stanislavsky Method</span></a><span data-dcnode-id="4957" instrument_node=""> to act as if he were insane. The glitch is that the doctors who come to examine him turn out to be the better actors.</span></p><span data-dcnode-id="4955" instrument_node="">
</span><p data-dcnode-id="4947"><span data-dcnode-id="4954" instrument_node="">This story was presented three times on </span><em data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">Suspense</span></em><span data-dcnode-id="4951" instrument_node=""> and all three presentations are excellent. Variations in the tone of the story come from the three different actors who played the lead. The first broadcast was on October 12, 1950, and </span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000926/"><span data-dcnode-id="4950" instrument_node="">Milton Berle</span></a><span data-dcnode-id="4948" instrument_node=""> starred in the role of Sam. Berle's maniacal laughter is particularly good and he could be considered the best match to this role.</span></p><span data-dcnode-id="4946" instrument_node="">
</span><p data-dcnode-id="4938"><span data-dcnode-id="4943" style="font-size: 1.2em;"><strong data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">.</span></strong></span><span data-dcnode-id="4942" instrument_node=""> </span><a data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense_10.12.1950.Rave_Notice.mp3"><span data-dcnode-id="4941" instrument_node="">Download Suspense_10.12.1950.Rave_Notice.mp3</span></a><span data-dcnode-id="4939" instrument_node=""> </span></p><span data-dcnode-id="4937" instrument_node="">
</span><p data-dcnode-id="4932"><span data-dcnode-id="4936" instrument_node="">The second time it was presented was on October 21, 1954, and </span><a data-dcnode-id="4934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4935" instrument_node="">Hans Conried</span></a><span data-dcnode-id="4933" instrument_node=""> starred as Sam.</span></p><span data-dcnode-id="4931" instrument_node="">
</span><p data-dcnode-id="4922"><span data-dcnode-id="4928" style="font-size: 1.2em;"><strong data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">.</span></strong></span><span data-dcnode-id="4927" instrument_node=""> </span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense_10.21.1954%2520Rave%2520Notice.mp3"><span data-dcnode-id="4926" instrument_node="">Download Suspense_10.21.1954 Rave Notice.mp3</span></a><span data-dcnode-id="4924" instrument_node="">&nbsp; &nbsp; </span><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/13/vincent_price_in_laura_trailer.jpg" onclick="window.open(this.href, '_blank', 'width=403,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4917"><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/13/vincent_price_in_laura_trailer_4.jpg" onclick="window.open(this.href, '_blank', 'width=403,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Vincent_price_in_laura_trailer_4" border="0" data-dcnode-id="4920" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/13/vincent_price_in_laura_trailer_4.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Vincent_price_in_laura_trailer_4" width="120"></a><span data-dcnode-id="4918" instrument_node=""> </span></p><span data-dcnode-id="4916" instrument_node="">
</span><p data-dcnode-id="4911"><span data-dcnode-id="4915" instrument_node="">The third time was on June 1, 1958, and </span><a data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001637/"><span data-dcnode-id="4914" instrument_node="">Vincent Price</span></a><span data-dcnode-id="4912" instrument_node=""> starred as Sam.</span></p><span data-dcnode-id="4910" instrument_node="">
</span><p data-dcnode-id="4902"><strong data-dcnode-id="4907"><span data-dcnode-id="4908" style="font-size: 1.2em;"><span data-dcnode-id="4909" instrument_node="">.</span></span></strong><span data-dcnode-id="4906" instrument_node=""> </span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1958.06.01_Rave_Notice.mp3"><span data-dcnode-id="4905" instrument_node="">Download Susp.1958.06.01_Rave_Notice.mp3</span></a><span data-dcnode-id="4903" instrument_node=""> </span></p><span data-dcnode-id="4901" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4900" instrument_node="">(Images of </span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Image%3ASingchair.jpg"><span data-dcnode-id="4899" instrument_node="">"Old Sparky"</span></a><span data-dcnode-id="4897" instrument_node=""> and </span><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Image%3AVincent_Price_in_Laura_trailer.jpg"><span data-dcnode-id="4896" instrument_node="">Vincent Price</span></a><span data-dcnode-id="4894" instrument_node=""> from Wikimedia Commons)</span></p><span data-dcnode-id="4892" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">July 10, 2007</span></h2><span data-dcnode-id="4826" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4703" id="entry-36281446"><span data-dcnode-id="4825" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4705"><span data-dcnode-id="4824" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4820"><span data-dcnode-id="4823" instrument_node="">
</span><a data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/07/stand-in.html"><span data-dcnode-id="4822" instrument_node="">Suspense - Stand In</span></a></h3><span data-dcnode-id="4819" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4757"><span data-dcnode-id="4818" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4761"><span data-dcnode-id="4817" instrument_node="">
</span><p data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">"Stand-In" is a radio noir about a movie queen and the people in her life who hate her. The story begins with Maggie, or Madame as she is known, returning from an extended vacation in Florida. She arrives home in Hollywood with paparrazi, yippy little dogs and a new husband in tow. </span></p><span data-dcnode-id="4814" instrument_node="">
</span><p data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">Madame's stand-in and assistant is Dianne Burke. She doesn't have the right face for movies, but she claims she's "got everything else." Dianne sees right away that Madame's new husband, Dennis O'Brien, will be trouble. Dianne and Dennis avoid each other for a while, but on the night of the Academy Awards they find themselves alone in the big empty mansion. From there they drift towards trouble.</span></p><span data-dcnode-id="4811" instrument_node="">
</span><p data-dcnode-id="4806"><span data-dcnode-id="4810" instrument_node="">Dianne is straightforward and unremorseful as events play out. In the end, she is accepting of her fate. </span><a data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/June_Havoc"><span data-dcnode-id="4809" instrument_node="">June Havoc</span></a><span data-dcnode-id="4807" instrument_node=""> played Dianne and her smoldering voice suits the dialogue of this dark drama. </span></p><span data-dcnode-id="4805" instrument_node="">
</span><p data-dcnode-id="4801"><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/09/junehavocstar.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=317,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Junehavocstar" border="0" data-dcnode-id="4804" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/09/junehavocstar.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Junehavocstar" width="224"></a><span data-dcnode-id="4802" instrument_node=""> </span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4799" instrument_node="">"Stand-In" was written for Suspense by </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0724307/"><span data-dcnode-id="4798" instrument_node="">Robert L. Richards</span></a><span data-dcnode-id="4796" instrument_node=""> and Pamela Wilcox. </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0507019/"><span data-dcnode-id="4795" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="4793" instrument_node=""> played Madame. Also appearing were </span><a data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4792" instrument_node="">Hans Conried</span></a><span data-dcnode-id="4790" instrument_node="">, </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0507163/"><span data-dcnode-id="4789" instrument_node="">Elliott Lewis</span></a><span data-dcnode-id="4787" instrument_node="">, and </span><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0536890/"><span data-dcnode-id="4786" instrument_node="">Wally Maher</span></a><span data-dcnode-id="4784" instrument_node="">. This episode was produced, edited and directed by </span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0818630/"><span data-dcnode-id="4783" instrument_node="">William Spier</span></a><span data-dcnode-id="4781" instrument_node=""> and aired on June 12, 1947.</span></p><span data-dcnode-id="4779" instrument_node="">
</span><p data-dcnode-id="4772"><strong data-dcnode-id="4776"><span data-dcnode-id="4777" style="font-size: 1.2em;"><span data-dcnode-id="4778" instrument_node="">.</span></span></strong><span data-dcnode-id="4775" instrument_node="">&nbsp; </span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense.1947.06.12_%2520StandIn.mp3"><span data-dcnode-id="4774" instrument_node="">Download Suspense.1947.06.12_ StandIn.mp3</span></a></p><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4763"><span data-dcnode-id="4770" instrument_node="">(Photo of </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0369896/"><span data-dcnode-id="4769" instrument_node="">June Havoc's</span></a><span data-dcnode-id="4767" instrument_node=""> star on the </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodchamber.net/icons/walk_fame.asp"><span data-dcnode-id="4766" instrument_node="">Hollywood Walk of Fame</span></a><span data-dcnode-id="4764" instrument_node=""> at 6618 Hollywood Blvd.) </span></p><span data-dcnode-id="4762" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">June 29, 2007</span></h2><span data-dcnode-id="4699" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4572" id="entry-34970980"><span data-dcnode-id="4698" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4574"><span data-dcnode-id="4697" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4693"><span data-dcnode-id="4696" instrument_node="">
</span><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense_noose_.html"><span data-dcnode-id="4695" instrument_node="">Suspense - Noose of Coincidence</span></a></h3><span data-dcnode-id="4692" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4626"><span data-dcnode-id="4691" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4630"><span data-dcnode-id="4690" instrument_node="">
</span><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Beware of people who introduce themselves as a "prophet of the future." They cause nothing but trouble.</span></p><span data-dcnode-id="4687" instrument_node="">
</span><p data-dcnode-id="4678"><em data-dcnode-id="4683"><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/29/ronaldcolman4.jpg" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Ronaldcolman4" border="0" data-dcnode-id="4686" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/29/ronaldcolman4.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Ronaldcolman4" width="100"></a><span data-dcnode-id="4684" instrument_node=""> Suspense</span></em><span data-dcnode-id="4682" instrument_node="">'s "Noose of Coincidence" is about a man who doubts that the future can be predicted, yet becomes involved in a series of events just as they were foretold to him.&nbsp; Set in the late 1940's, this episode stars </span><a data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//themave.com/Colman/index.htm"><span data-dcnode-id="4681" instrument_node="">Ronald Colman</span></a><span data-dcnode-id="4679" instrument_node=""> as Christopher Swann, a London bookseller forewarned that he will marry a redheaded woman and that he will be hanged on November 9th.</span></p><span data-dcnode-id="4677" instrument_node="">
</span><p data-dcnode-id="4673"><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/29/morguefile67334_2.jpg" onclick="window.open(this.href, '_blank', 'width=297,height=283,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile67334_2" border="0" data-dcnode-id="4676" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/29/morguefile67334_2.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile67334_2" width="178"></a><span data-dcnode-id="4674" instrument_node=""> </span></p><span data-dcnode-id="4672" instrument_node="">
</span><p data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">He does marry a redheaded woman named Margaret but she turns out to be an intolerable shrew. Not long afterwards, he meets another redheaded woman, Ann. Their mutual love of books brings them together and they soon fall in love. Swann realizes too late that he married the wrong redhead, but before he can do anything about it, the rest of the prophesy plays itself out.</span></p><span data-dcnode-id="4669" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4668" instrument_node="">"Noose of Coincidence" was a short story written for </span><em data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">Suspense</span></em><span data-dcnode-id="4665" instrument_node=""> by American writer </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.timestwopublishing.com/wmfifield.htm"><span data-dcnode-id="4664" instrument_node="">William Fifield</span></a><span data-dcnode-id="4662" instrument_node=""> and then adapted by </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0575022/"><span data-dcnode-id="4661" instrument_node="">Herb Meadow</span></a><span data-dcnode-id="4659" instrument_node="">. William Fifield worked as a radio announcer and scriptwriter for CBS and NBC as a young man, and while most radio writers went on to television and movies, Fifield took a more Bohemian path. He moved to Europe in 1950 where he recorded and wrote books about his conversations with men such as Pablo Picasso, Salvador Dali and other artists. His later works include fiction as well. </span></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4656" instrument_node="">Also appearing in this episode were </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4655" instrument_node="">Hans Conried</span></a><span data-dcnode-id="4653" instrument_node=""> and </span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0492980/"><span data-dcnode-id="4652" instrument_node="">Raymond Lawrence</span></a><span data-dcnode-id="4650" instrument_node="">. The names of the female actresses aren't given. This broadcast aired on April 7, 1949.</span></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4641"><span data-dcnode-id="4645" style="font-size: 1.2em;"><strong data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">.</span></strong></span><span data-dcnode-id="4644" instrument_node="">&nbsp; </span><a data-dcnode-id="4642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense_1949.04.07_Noose_Of_Coincidence.mp3"><span data-dcnode-id="4643" instrument_node="">Download Suspense_1949.04.07_Noose_Of_Coincidence.mp3</span></a></p><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4632"><span data-dcnode-id="4639" instrument_node="">(Images from </span><a data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.classicsavers.com/wallpaper/Colman.html"><span data-dcnode-id="4638" instrument_node="">Classicsavers.com</span></a><span data-dcnode-id="4636" instrument_node=""> and </span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D67334"><span data-dcnode-id="4635" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="4633" instrument_node=""> ) </span></p><span data-dcnode-id="4631" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">June 28, 2007</span></h2><span data-dcnode-id="4568" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-film_noir entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4433" id="entry-35809722"><span data-dcnode-id="4567" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4435"><span data-dcnode-id="4566" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4562"><span data-dcnode-id="4565" instrument_node="">
</span><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense---the-.html"><span data-dcnode-id="4564" instrument_node="">Suspense - The Blue Hour</span></a></h3><span data-dcnode-id="4561" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4490"><span data-dcnode-id="4560" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4494"><span data-dcnode-id="4559" instrument_node="">
</span><p data-dcnode-id="4552"><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claire_Trevor"><span data-dcnode-id="4558" instrument_node="">Claire Trevor</span></a><span data-dcnode-id="4556" instrument_node="">, the Academy Award winning actress and "Queen of Film Noir," made one of her five appearances on </span><em data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Suspense</span></em><span data-dcnode-id="4553" instrument_node=""> in the drama "The Blue Hour." Here she plays Lois LaPaul, a Chicago dancer who becomes a media darling when her wealthy paramour is murdered. Instantly in demand, she accepts an offer to perform at an "extremely chic" nightclub called the The Blue Hour in New York City. At the airport she meets Alec Mahoney, a reporter with whom she shares some saucy banter.</span></p><span data-dcnode-id="4551" instrument_node="">
</span><p data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">When she arrives at the sparkling blue nightclub she soon discovers that the owner, Anthony LaCada, has no real interest in her dancing talents. His icy interest is in her murdered boyfriend, Jason White.</span></p><span data-dcnode-id="4548" instrument_node="">
</span><p data-dcnode-id="4544"><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/28/morguefile25334_2.jpg" onclick="window.open(this.href, '_blank', 'width=255,height=242,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile25334_2" border="0" data-dcnode-id="4547" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/28/morguefile25334_2.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile25334_2" width="178"></a><span data-dcnode-id="4545" instrument_node=""> </span></p><span data-dcnode-id="4543" instrument_node="">
</span><p data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Not knowing what to do, she turns to Mahoney for help. Together they discover the blue diamond worth half a million dollars that Jason White was hiding.</span></p><span data-dcnode-id="4540" instrument_node="">
</span><p data-dcnode-id="4535"><span data-dcnode-id="4539" instrument_node="">"The Blue Hour Diamond" at the center of this story was probably based on the </span><a data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.si.edu/Encyclopedia_SI/nmnh/hope.htm"><span data-dcnode-id="4538" instrument_node="">Hope Diamond</span></a><span data-dcnode-id="4536" instrument_node="">, pictured to the right. This episode was written by Marty Schwartz and includes a number of moments of entertaining dialogue.</span></p><span data-dcnode-id="4534" instrument_node="">
</span><p data-dcnode-id="4510"><span data-dcnode-id="4533" instrument_node="">"The Blue Hour" was produced edited and directed by William Spier. The music, more prominent and detailed than usual in this episode, was composed by </span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0603188/"><span data-dcnode-id="4532" instrument_node="">Lucien Moraweck</span></a><span data-dcnode-id="4530" instrument_node=""> and conducted by </span><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0323302/"><span data-dcnode-id="4529" instrument_node="">Lud Gluskin</span></a><span data-dcnode-id="4527" instrument_node="">. At the time </span><a data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0872456/"><span data-dcnode-id="4526" instrument_node="">Claire Trevor</span></a><span data-dcnode-id="4524" instrument_node=""> appeared on this episode she was promoting the movie </span><a data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0040934/"><em data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">The Velvet Touch</span></em></a><span data-dcnode-id="4520" instrument_node="">. Also featured were </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4519" instrument_node="">Hans Conried</span></a><span data-dcnode-id="4517" instrument_node="">, </span><a data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0536890/"><span data-dcnode-id="4516" instrument_node="">Wally Maher</span></a><span data-dcnode-id="4514" instrument_node=""> and </span><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0587804/"><span data-dcnode-id="4513" instrument_node="">Sydney Miller</span></a><span data-dcnode-id="4511" instrument_node="">.&nbsp; This broadcast aired on September 25, 1947.</span></p><span data-dcnode-id="4509" instrument_node="">
</span><p data-dcnode-id="4502"><strong data-dcnode-id="4506"><span data-dcnode-id="4507" style="font-size: 1.2em;"><span data-dcnode-id="4508" instrument_node="">.</span></span></strong><span data-dcnode-id="4505" instrument_node="">&nbsp; </span><a data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense_194.09.25_The_Blue_Hour.mp3"><span data-dcnode-id="4504" instrument_node="">Download Suspense_1947.09.25_The_Blue_Hour.mp3</span></a></p><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4496"><span data-dcnode-id="4500" instrument_node="">(Photo of the Hope Diamond from </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D25334"><span data-dcnode-id="4499" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="4497" instrument_node="">) </span></p><span data-dcnode-id="4495" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">June 24, 2007</span></h2><span data-dcnode-id="4429" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cornell_woolrich entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4276" id="entry-35639602"><span data-dcnode-id="4428" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4278"><span data-dcnode-id="4427" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4423"><span data-dcnode-id="4426" instrument_node="">
</span><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense---mome.html"><span data-dcnode-id="4425" instrument_node="">Suspense - Momentum</span></a></h3><span data-dcnode-id="4422" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4333"><span data-dcnode-id="4421" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4337"><span data-dcnode-id="4420" instrument_node="">
</span><p data-dcnode-id="4406"><em data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Suspense</span></em><span data-dcnode-id="4417" instrument_node="">'s "Momentum" was adapted from a Depression era short story by </span><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cornell_Woolrich"><span data-dcnode-id="4416" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="4414" instrument_node=""> published under the titles "Momentum" and also "Murder Always Gathers Momentum." According to Frances M.Nevins in his book </span><em data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Cornell Woolrich, First You Dream, Then You Die</span></em><span data-dcnode-id="4411" instrument_node="">: "</span><strong data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">When it comes to putting us in the skin of a frightened little guy in a miserable little apartment with a hungry wife and children and no money and no job and fear of tomorrow eating him like a cancer, Woolrich has no peers. There is more of the anguish of the thirties in stories like "Goodbye, New York" (1937) and "Dusk to Dawn"(1937) and "Borrowed Crime" (1937) and "Murder Always Gathers Momentum" (1940) than in volumes of social history</span></strong><span data-dcnode-id="4408" instrument_node="">."*</span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/24/cornell_woolrich_omnibus_2.jpg" onclick="window.open(this.href, '_blank', 'width=294,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4401"><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/24/cornell_woolrich_omnibus_6.jpg" onclick="window.open(this.href, '_blank', 'width=294,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Cornell_woolrich_omnibus_6" border="0" data-dcnode-id="4404" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/24/cornell_woolrich_omnibus_6.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Cornell_woolrich_omnibus_6" width="161"></a><span data-dcnode-id="4402" instrument_node=""> Woolrich's short story opens with the main character, Richard Paine, arriving at the house of his former employer, Mr. Burroughs. Paine is desperate and has come hoping to collect back wages. Years earlier he had deferred half of his salary to help get his employer through hard times, but instead, Burroughs filed a suspicious bankruptcy cancelling his company's debts.&nbsp; Paine's attempts to retrieve what is due to him set this fugitive-on-the-run story in motion.</span></p><span data-dcnode-id="4400" instrument_node="">
</span><p data-dcnode-id="4396"><em data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Suspense</span></em><span data-dcnode-id="4397" instrument_node="">'s version skipped the Depression era setting and packaged the story differently, presumably for their contemporary audience. In this version Richard Paine's resentment towards his former employer is over a wrench that he claims to have invented. Paine, as he is portrayed here by Victor Mature, is hard to like and it doesn't appear that anyone does like him except his wife, though he doesn't treat her well.</span></p><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4391"><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/24/morguefile7937.jpg" onclick="window.open(this.href, '_blank', 'width=368,height=299,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile7937" border="0" data-dcnode-id="4394" height="89" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/24/morguefile7937.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile7937" width="110"></a><span data-dcnode-id="4392" instrument_node=""> </span></p><span data-dcnode-id="4390" instrument_node="">
</span><p data-dcnode-id="4384"><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0508203/"><em data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Alfred Hitchcock Presents</span></em><span data-dcnode-id="4387" instrument_node=""> aired "Momentum"</span></a><span data-dcnode-id="4385" instrument_node=""> in 1956 with Skip Homeier and Joanne Woodward. The teleplay kept the sadness and the frenzy of Woolrich's original story but was made clean and bloodless for television. As Paine rushes across town, dying of a gunshot wound, he does not have a speck of blood on his suit or hands. </span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4365"><em data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Suspense</span></em><span data-dcnode-id="4380" instrument_node="">'s radioplay was written by </span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0626981/"><span data-dcnode-id="4379" instrument_node="">E. Jack Neuman</span></a><span data-dcnode-id="4377" instrument_node="">. </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/24/victor_mature_in_million_dollar_m_5.jpg" onclick="window.open(this.href, '_blank', 'width=369,height=305,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><span data-dcnode-id="4375" instrument_node="">This episode aired once on October 27, 1949 and starred </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001514/"><span data-dcnode-id="4374" instrument_node="">Victor Mature</span></a><span data-dcnode-id="4372" instrument_node=""> and </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lurene_Tuttle"><span data-dcnode-id="4371" instrument_node="">Lurene Tuttle</span></a><span data-dcnode-id="4369" instrument_node="">.</span><strong data-dcnode-id="4366"><span data-dcnode-id="4367" style="font-size: 1.4em;"><span data-dcnode-id="4368" instrument_node=""> </span></span></strong></p><span data-dcnode-id="4364" instrument_node="">
</span><p data-dcnode-id="4356"><strong data-dcnode-id="4357"><span data-dcnode-id="4362" style="font-size: 1.4em;"><span data-dcnode-id="4363" instrument_node="">. </span></span><a data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1949.10.27.Momentum.mp3"><span data-dcnode-id="4361" instrument_node="">Download Suspense.1949.10.27.Momentum.mp3</span></a><span data-dcnode-id="4358" style="font-size: 1.4em;"><span data-dcnode-id="4359" instrument_node=""> </span></span></strong></p><span data-dcnode-id="4355" instrument_node="">
</span><p data-dcnode-id="4351"><span data-dcnode-id="4354" instrument_node="">The short story "Momentum" can be found in </span><em data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">The Cornell Woolrich Omnibus.</span></em></p><span data-dcnode-id="4350" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4349" instrument_node="">(Image from </span><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D154253%26"><span data-dcnode-id="4348" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="4346" instrument_node="">)</span></p><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4343" instrument_node="">*Frances M Nevins, </span><em data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Cornell Woolrich: First You Dream,Then You Die</span></em><span data-dcnode-id="4340" instrument_node=""> (New York: The Mysterious Press. 1988) pg. 127&nbsp; </span></p><span data-dcnode-id="4338" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">June 21, 2007</span></h2><span data-dcnode-id="4272" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="4130" id="entry-35580508"><span data-dcnode-id="4271" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="4132"><span data-dcnode-id="4270" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4266"><span data-dcnode-id="4269" instrument_node="">
</span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense_commut.html"><span data-dcnode-id="4268" instrument_node="">Suspense - Commuter's Ticket</span></a></h3><span data-dcnode-id="4265" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4184"><span data-dcnode-id="4264" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4188"><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4247"><em data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Suspense</span></em><span data-dcnode-id="4260" instrument_node="">'s "Commuter's Ticket" depicts a murder plot derailed by unforeseen circumstances. Mr. Bert Gavin, a teletype repair man, works for a news agency in downtown San Francisco. Everyday he rides the same commuter train into the city from the ficitional town of Laurel Creek, which is located somewhere "down the peninsula" and "out in the sticks," an area that would probably be in today's </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon_Valley"><span data-dcnode-id="4259" instrument_node="">Silicon Valley</span></a><span data-dcnode-id="4257" instrument_node="">. The commuter trains at the center of this story belong to </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caltrain.org/"><span data-dcnode-id="4256" instrument_node="">Caltrain</span></a><span data-dcnode-id="4254" instrument_node="">, which still carries commuters between </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.onlyinsanfrancisco.com/"><span data-dcnode-id="4253" instrument_node="">San Francisco</span></a><span data-dcnode-id="4251" instrument_node=""> and </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Jose%2C_California"><span data-dcnode-id="4250" instrument_node="">San Jose</span></a><span data-dcnode-id="4248" instrument_node="">.</span></p><span data-dcnode-id="4246" instrument_node="">
</span><p data-dcnode-id="4242"><a data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/20/800pxback_of_baby_bullet.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="800pxback_of_baby_bullet" border="0" data-dcnode-id="4245" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/20/800pxback_of_baby_bullet.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="800pxback_of_baby_bullet" width="224"></a><span data-dcnode-id="4243" instrument_node=""> </span></p><span data-dcnode-id="4241" instrument_node="">
</span><p data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Mr. Gavin's murder plot hinges on his prediction that his fellow commuters will ignore him when he makes a quick trip home to murder his wife. Normally they would, but as he tries to run from his crime, he becomes the center of attention no matter where he goes. </span></p><span data-dcnode-id="4238" instrument_node="">
</span><p data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">This story proves that fate catches up no matter how fast you run and might even play some nasty tricks on you along the way.</span></p><span data-dcnode-id="4235" instrument_node="">
</span><p data-dcnode-id="4209"><span data-dcnode-id="4234" instrument_node="">"Commuter's Ticket" was written for </span><em data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Suspense</span></em><span data-dcnode-id="4231" instrument_node=""> by Roy Grandy and </span><a data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0848194/"><span data-dcnode-id="4230" instrument_node="">Robert Tallman</span></a><span data-dcnode-id="4228" instrument_node="">. It starred </span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0619798/"><span data-dcnode-id="4227" instrument_node="">J. Carrol Naish</span></a><span data-dcnode-id="4225" instrument_node="">, </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000822/"><span data-dcnode-id="4224" instrument_node="">Jim Backus</span></a><span data-dcnode-id="4222" instrument_node="">, </span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0003318/"><span data-dcnode-id="4221" instrument_node="">Howard Duff</span></a><span data-dcnode-id="4219" instrument_node="">, </span><a data-dcnode-id="4217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0369617/"><span data-dcnode-id="4218" instrument_node="">Jerry Hausner</span></a><span data-dcnode-id="4216" instrument_node=""> and </span><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0536890/"><span data-dcnode-id="4215" instrument_node="">Wally Maher</span></a><span data-dcnode-id="4213" instrument_node="">. Note that two of the voices from the </span><a data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mr._Magoo"><span data-dcnode-id="4212" instrument_node="">Mr. Magoo cartoons</span></a><span data-dcnode-id="4210" instrument_node=""> appear in this episode, Backus (Magoo) and Hausner (Waldo). </span></p><span data-dcnode-id="4208" instrument_node="">
</span><p data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">This episode aired once on August 1, 1946.</span></p><span data-dcnode-id="4205" instrument_node="">
</span><p data-dcnode-id="4199"><strong data-dcnode-id="4202"><span data-dcnode-id="4203" style="font-size: 1.4em;"><span data-dcnode-id="4204" instrument_node="">. </span></span></strong><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1946.08.01.Commuter_Ticket.mp3"><span data-dcnode-id="4201" instrument_node="">Download Suspense.1946.08.01.Commuter_Ticket.mp3</span></a></p><span data-dcnode-id="4198" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4197" instrument_node="">(Image of Caltrain Baby Bullet from </span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Image%3ABack_of_Baby_Bullet.JPG"><span data-dcnode-id="4196" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="4194" instrument_node="">)</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">Rev. 6/21/07 </span></p><span data-dcnode-id="4189" instrument_node="">
