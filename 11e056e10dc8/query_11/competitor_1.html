</span><h2 class="date-header" data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">June 15, 2007</span></h2><span data-dcnode-id="4126" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-ghost_stories entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3961" id="entry-35052222"><span data-dcnode-id="4125" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3963"><span data-dcnode-id="4124" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="4120"><span data-dcnode-id="4123" instrument_node="">
</span><a data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/banquois_chair.html"><span data-dcnode-id="4122" instrument_node="">Suspense - Banquo's Chair</span></a></h3><span data-dcnode-id="4119" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4018"><span data-dcnode-id="4118" instrument_node="">
</span><div class="entry-body" data-dcnode-id="4022"><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">"Banquo's Chair" takes place when "sophisticated" crime solving meant inviting a murder suspect to your mansion for a chummy dinner party and then scaring that person into a full confession with a witty prank.</span></p><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Sir William Brent of Scotland Yard has one unresolved murder case on his illustrious record and he arranges such a dinner to elicit a confession from his prime suspect. The mansion where they will be dining was the scene of the crime and one of the guests invited to this dinner party will be the ghost of the victim.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4097"><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/15/banquosghost_3.jpg" onclick="window.open(this.href, '_blank', 'width=411,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Banquosghost_3" border="0" data-dcnode-id="4110" height="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/15/banquosghost_3.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Banquosghost_3" width="246"></a><span data-dcnode-id="4108" instrument_node="">The title "Banquo's Chair" refers to the character of </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banquo"><span data-dcnode-id="4107" instrument_node="">Banquo</span></a><span data-dcnode-id="4105" instrument_node=""> from Shakespeare's </span><a data-dcnode-id="4102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clicknotes.com/macbeth/index.html"><em data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Macbeth</span></em></a><span data-dcnode-id="4101" instrument_node="">. He is murdered by Macbeth and then </span><a data-dcnode-id="4099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clicknotes.com/macbeth/S34.html%23start"><span data-dcnode-id="4100" instrument_node="">comes back to haunt him</span></a><span data-dcnode-id="4098" instrument_node=""> during a feast. Banquo's ghost takes Macbeth's place at the table, but Macbeth is the only one who can see the apparition. </span></p><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4095" instrument_node="">"Banquo's Chair" was based on the short story and play (1930) by </span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.knittingcircle.org.uk/rupertcroftcooke.html"><span data-dcnode-id="4094" instrument_node="">Rupert Croft-Cooke</span></a><span data-dcnode-id="4092" instrument_node="">, who also wrote mystery novels under the pseudonym of </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_Bruce"><span data-dcnode-id="4091" instrument_node="">Leo Bruce</span></a><span data-dcnode-id="4089" instrument_node="">. It became the basis for the movie </span><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0037693/"><em data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">The Fatal Witness</span></em></a><span data-dcnode-id="4085" instrument_node=""> (1945) and </span><a data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0508132/"><span data-dcnode-id="4084" instrument_node="">an episode of </span><em data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">Alfred Hitchcock Presents</span></em></a><span data-dcnode-id="4080" instrument_node=""> in 1959.</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4058"><span data-dcnode-id="4077" instrument_node="">"Banquo's Chair" was adapted for </span><em data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Suspense</span></em><span data-dcnode-id="4074" instrument_node=""> by Sigmund Muller and presented three times. </span><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4073" instrument_node="">Hans Conreid</span></a><span data-dcnode-id="4071" instrument_node=""> appeared in all three versions but otherwise the cast was changed for each. It first aired on June 1, 1943 with </span><a data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0517058/"><span data-dcnode-id="4070" instrument_node="">John Loder</span></a><span data-dcnode-id="4068" instrument_node=""> and </span><a data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0938052/"><span data-dcnode-id="4067" instrument_node="">Ian Wolfe</span></a><span data-dcnode-id="4065" instrument_node="">. It was presented again on August 3, 1944 with </span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0187981/"><span data-dcnode-id="4064" instrument_node="">Donald Crisp</span></a><span data-dcnode-id="4062" instrument_node="">, John Loder, Ian Wolfe and </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0604729/"><span data-dcnode-id="4061" instrument_node="">Jane Morgan</span></a><span data-dcnode-id="4059" instrument_node="">.</span></p><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4049"><span data-dcnode-id="4056" instrument_node="">Here is the 1950 version starring </span><a data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000051/"><span data-dcnode-id="4055" instrument_node="">James Mason</span></a><span data-dcnode-id="4053" instrument_node=""> and </span><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0175788/"><span data-dcnode-id="4052" instrument_node="">Hans Conreid</span></a><span data-dcnode-id="4050" instrument_node="">. (There are a few minutes of hissing and static in the middle of this recording.)</span></p><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4044"><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense.1950.03.09_Banquo%27s_Chair.mp3"><span data-dcnode-id="4047" instrument_node="">Download suspense.1950.03.09_Banquo's_Chair.mp3</span></a><span data-dcnode-id="4045" instrument_node=""> </span></p><span data-dcnode-id="4043" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4042" instrument_node="">"</span><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrsite.com/logs/logs1014.htm"><span data-dcnode-id="4041" instrument_node="">Sleep No More</span></a><span data-dcnode-id="4039" instrument_node="">" performed "Banquo's Chair" in a fifteen minute reading by </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0647483/"><span data-dcnode-id="4038" instrument_node="">Nelson Olmsted</span></a><span data-dcnode-id="4036" instrument_node=""> on February 6, 1957. It is different from Suspense's version in that it gives more story details.</span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4030"><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/sleepnm.1957.02.06_Banquo%27s_Chair_The_Coward.mp3"><span data-dcnode-id="4033" instrument_node="">Download sleepnm.1957.02.06_Banquo's_Chair_The_Coward.mp3</span></a><span data-dcnode-id="4031" instrument_node=""> </span></p><span data-dcnode-id="4029" instrument_node="">
</span><p data-dcnode-id="4024"><span data-dcnode-id="4028" instrument_node="">(Image of "Macbeth Seeing the Ghost of Banquo" by Theodore Chasseriau (1819-1856) from </span><a data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Image%3ABanquo.jpg"><span data-dcnode-id="4027" instrument_node="">Wikipedia</span></a><span data-dcnode-id="4025" instrument_node=""> )</span></p><span data-dcnode-id="4023" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">June 13, 2007</span></h2><span data-dcnode-id="3957" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3808" id="entry-35243686"><span data-dcnode-id="3956" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3810"><span data-dcnode-id="3955" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3951"><span data-dcnode-id="3954" instrument_node="">
</span><a data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense_hellfi.html"><span data-dcnode-id="3953" instrument_node="">Suspense - Hellfire</span></a></h3><span data-dcnode-id="3950" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3862"><span data-dcnode-id="3949" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3866"><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3940"><span data-dcnode-id="3947" instrument_node="">"Hellfire", as a title, makes one hope that this episode will be a </span><em data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Suspense</span></em><span data-dcnode-id="3944" instrument_node=""> cautionary tale with such a "big lesson" that somehow eternal damnation is involved. So, it may come as a letdown to learn that this is actually a story about a fire. It's about a very big fire. A HELLFIRE!</span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/13/morguefile154877.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=299,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile154877" border="0" data-dcnode-id="3943" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/13/morguefile154877.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile154877" width="224"></a><span data-dcnode-id="3941" instrument_node=""> </span></p><span data-dcnode-id="3939" instrument_node="">
</span><p data-dcnode-id="3911"><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncrcn.org/vov/html/docRossMurry.htm"><span data-dcnode-id="3938" instrument_node="">Ross Murray</span></a><span data-dcnode-id="3936" instrument_node=""> wrote this </span><em data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Suspense</span></em><span data-dcnode-id="3933" instrument_node=""> episode about an oil well disaster in Texas</span><em data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">.</span></em><span data-dcnode-id="3930" instrument_node=""> A quote attributed to him in the book </span><em data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Suspense: Twenty Years of Thrills and Chills</span></em><span data-dcnode-id="3927" instrument_node=""> explains his inspiration: "</span><strong data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">I read a story of </span></strong><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.redadair.com/bio.html"><strong data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Red Adair</span></strong></a><strong data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node=""> or his predecessor, who went to Saudi Arabia to put out an oil well fire, and I thought how interesting it would be if some little old wild cat in Texas had his single oil well catch fire, and couldn't get a hold of the professional, and what would he do to put it out himself</span></strong><span data-dcnode-id="3919" instrument_node="">."* Firefighters Red Adair and </span><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bootsandcoots.com/History/history.htm"><span data-dcnode-id="3918" instrument_node="">Boots &amp; Coots</span></a><span data-dcnode-id="3916" instrument_node=""> were also the inspiration for the 1968 movie </span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0063060/"><em data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Hellfighters</span></em></a><span data-dcnode-id="3912" instrument_node=""> starring John Wayne.</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3893"><span data-dcnode-id="3909" instrument_node="">"Hellfire" was broadcast on September 28, 1953 and starred </span><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0388303/"><span data-dcnode-id="3908" instrument_node="">John Hodiak</span></a><span data-dcnode-id="3906" instrument_node=""> as Wally, </span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0369617/"><span data-dcnode-id="3905" instrument_node="">Jerry Hausner</span></a><span data-dcnode-id="3903" instrument_node="">, </span><a data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0444012/"><span data-dcnode-id="3902" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="3900" instrument_node="">, </span><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0692813/"><span data-dcnode-id="3899" instrument_node="">Clayton Post</span></a><span data-dcnode-id="3897" instrument_node="">, and </span><a data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0492664/"><span data-dcnode-id="3896" instrument_node="">Charlotte Lawrence</span></a><span data-dcnode-id="3894" instrument_node="">. Herb Butterfield, Junius Matthews, Dick Ryan also appear. </span></p><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3891" instrument_node="">As for the fires of Hell, firefighter extraordinaire </span><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Adair"><span data-dcnode-id="3890" instrument_node="">Red Adair</span></a><span data-dcnode-id="3888" instrument_node=""> joked about his own fate in 1991 by saying: "</span><strong data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">I've done made a deal with the devil. He said he's going to give me an air-conditioned place when I go down there, if I go there, so I won't put all the fires out</span></strong><span data-dcnode-id="3885" instrument_node="">." </span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3879"><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.09.28.1953.Hellfire.mp3"><span data-dcnode-id="3882" instrument_node="">Download Suspense.09.28.1953.Hellfire.mp3</span></a><span data-dcnode-id="3880" instrument_node=""> </span></p><span data-dcnode-id="3878" instrument_node="">
</span><p data-dcnode-id="3874"><em data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">* Suspense: Twenty Years of Thrills and Chills</span></em><span data-dcnode-id="3875" instrument_node=""> by Martin Grams Jr., pg.112 </span></p><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3872" instrument_node="">(Image from </span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D154877"><span data-dcnode-id="3871" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="3869" instrument_node="">)</span></p><span data-dcnode-id="3867" instrument_node="">
</span></div><span data-dcnode-id="3865" instrument_node="">
</span><span data-dcnode-id="3863" instrument_node="">
</span></div><span data-dcnode-id="3861" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">June 08, 2007</span></h2><span data-dcnode-id="3804" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3667" id="entry-35052194"><span data-dcnode-id="3803" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3669"><span data-dcnode-id="3802" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3798"><span data-dcnode-id="3801" instrument_node="">
</span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/always_room_at_.html"><span data-dcnode-id="3800" instrument_node="">Suspense - Always Room at the Top</span></a></h3><span data-dcnode-id="3797" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3721"><span data-dcnode-id="3796" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3725"><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3788"><em data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Suspense</span></em><span data-dcnode-id="3792" instrument_node="">'s "Always Room at the Top" was only broadcast once, which is a shame. This bizarre episode should have been given </span><em data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">at least</span></em><span data-dcnode-id="3789" instrument_node=""> a second chance.</span></p><span data-dcnode-id="3787" instrument_node="">
</span><p data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">There is a lot to like in a story that begins with a job applicant named Helen being kicked out of an interview, then continues with the interviewer, Ms.Thornton, later falling out of her office window and landing on the pavement in front of Helen. Not wasting the opportunity, Helen then barges her way back into the office and talks the boss into hiring her for Ms. Thornton's job!</span></p><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">After that, the story just gets better. In fact, so much happens so quickly in this episode that it borders on being surreal, or perhaps just silly. When it comes to stories about catty and ruthless female executives, this one takes the cake and runs away with the spoon! </span></p><span data-dcnode-id="3781" instrument_node="">
</span><p data-dcnode-id="3759"><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/07/anne_baxter_in_i_confess_trailer_2.jpg" onclick="window.open(this.href, '_blank', 'width=380,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/07/anne_baxter_in_i_confess_trailer_3.jpg" onclick="window.open(this.href, '_blank', 'width=380,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Anne_baxter_in_i_confess_trailer_3" border="0" data-dcnode-id="3779" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/07/anne_baxter_in_i_confess_trailer_3.jpg&amp;raw" style="float: right; margin: 0px 0px 5px 5px;" title="Anne_baxter_in_i_confess_trailer_3" width="171"></a><span data-dcnode-id="3777" instrument_node="">"Always Room at the Top" stars </span><a data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000879/"><span data-dcnode-id="3776" instrument_node="">Anne Baxter</span></a><span data-dcnode-id="3774" instrument_node=""> in the role of Helen Brandt. A few years later, in 1951 she appeared in the film classic about an ambitious female, </span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0042192/"><em data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">All About Eve</span></em></a><span data-dcnode-id="3770" instrument_node="">. At the time she appeared in this episode of </span><em data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Suspense </span></em><span data-dcnode-id="3767" instrument_node="">in 1947, she was promoting the movie </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0038873/"><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">The Razor's Edge</span></em></a><span data-dcnode-id="3763" instrument_node=""> for which she would receive an Academy Award and a Golden Globe for </span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0000879/awards"><span data-dcnode-id="3762" instrument_node="">Best Supporting Actress</span></a><span data-dcnode-id="3760" instrument_node="">.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3746"><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/07/anne_baxter_in_i_confess_trailer.jpg" onclick="window.open(this.href, '_blank', 'width=380,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><span data-dcnode-id="3756" instrument_node="">Also appearing in this episode are </span><a data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0536890/"><span data-dcnode-id="3755" instrument_node="">Wally Maher</span></a><span data-dcnode-id="3753" instrument_node=""> and </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0916131/"><span data-dcnode-id="3752" instrument_node="">Jack Webb</span></a><span data-dcnode-id="3750" instrument_node="">. </span><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0507019/"><span data-dcnode-id="3749" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="3747" instrument_node=""> played Marie Harris. The name of the actress playing JeanThornton is not given. </span></p><span data-dcnode-id="3745" instrument_node="">
</span><p data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">The radio-play was written by Eleanor Beeson. </span></p><span data-dcnode-id="3742" instrument_node="">
</span><p data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">"Always Room at the Top" aired on February 20, 1947.</span></p><span data-dcnode-id="3739" instrument_node="">
</span><p class="asset asset-audio at-xid-6a00d8341c52ee53ef017d3cdae5b6970c" data-dcnode-id="3736"><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/files/suspense_1947-02-20_always_room_at_the_top_.mp3"><span data-dcnode-id="3738" instrument_node="">Download Suspense_1947-02-20_Always_Room_at_the_Top_</span></a></p><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3727"><span data-dcnode-id="3734" instrument_node="">(Image from </span><em data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">I Confess </span></em><span data-dcnode-id="3731" instrument_node="">from </span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Image%3AAnne_Baxter_in_I_Confess_trailer.jpg"><span data-dcnode-id="3730" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="3728" instrument_node="">) </span></p><span data-dcnode-id="3726" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">June 06, 2007</span></h2><span data-dcnode-id="3663" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-urban_legends entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3523" id="entry-33573034"><span data-dcnode-id="3662" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3525"><span data-dcnode-id="3661" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3657"><span data-dcnode-id="3660" instrument_node="">
</span><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/06/suspense_cabin_.html"><span data-dcnode-id="3659" instrument_node="">Suspense - Cabin B-13</span></a></h3><span data-dcnode-id="3656" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3580"><span data-dcnode-id="3655" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3584"><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3640"><span data-dcnode-id="3653" instrument_node="">The urban legend of the "</span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/escapethe_vanis.html"><span data-dcnode-id="3652" instrument_node="">The Vanishing Lady</span></a><span data-dcnode-id="3650" instrument_node="">" provides the basis for the story of "Cabin B-13." The episode begins with two newlyweds, Ann and Richard Brewster, as they board an oceanliner for their honeymoon. They have $10,000 in cash and plan to travel through Europe for three months. The bride has recently recovered from "</span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreedictionary.com/brain%2Bfever"><span data-dcnode-id="3649" instrument_node="">brain fever</span></a><span data-dcnode-id="3647" instrument_node="">", an </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genealogytoday.com/genealogy/enoch/diseases.html"><span data-dcnode-id="3646" instrument_node="">archaic term</span></a><span data-dcnode-id="3644" instrument_node=""> for </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreedictionary.com/meningitis"><span data-dcnode-id="3643" instrument_node="">meningitis</span></a><span data-dcnode-id="3641" instrument_node="">, and she is still weak and vulnerable.</span></p><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Her husband Ricky takes their money to deposit in the purser's safe but then disappears. She tries to enlist help to find her lost husband, but no one believes that he really exists. She claims that they were booked into a cabin numbered B-13 but there is no such cabin. Her only help is from the ship's doctor. </span></p><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3632"><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/06/06/morguefile53546.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=299,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile53546" border="0" data-dcnode-id="3635" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/06/06/morguefile53546.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Morguefile53546" width="224"></a><span data-dcnode-id="3633" instrument_node=""> </span></p><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3620"><span data-dcnode-id="3630" instrument_node="">We are told that the story is set in "happier, peace-time days", but we don't know exactly when. The name of the ship is the S.S. Maurevania which is based on </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cunard.com/"><span data-dcnode-id="3629" instrument_node="">Cunard's</span></a><span data-dcnode-id="3627" instrument_node=""> </span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatoceanliners.net/mauretania1.html"><span data-dcnode-id="3626" instrument_node="">Mauretania</span></a><span data-dcnode-id="3624" instrument_node=""> or </span><a data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatoceanliners.net/mauretania2.html"><span data-dcnode-id="3623" instrument_node="">Mauretania II</span></a><span data-dcnode-id="3621" instrument_node="">. </span></p><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3603"><em data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Suspense</span></em><span data-dcnode-id="3616" instrument_node=""> first presented this story on March 13, 1943 with Ralph Bellamy. Here is the second broadcast which aired on Nov. 9, 1943. It starred </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0546712/"><span data-dcnode-id="3615" instrument_node="">Margo</span></a><span data-dcnode-id="3613" instrument_node="">, an early pioneer of the one-named performers, and </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0233856/"><span data-dcnode-id="3612" instrument_node="">Philip Dorn</span></a><span data-dcnode-id="3610" instrument_node="">. </span><a data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0426954/"><span data-dcnode-id="3609" instrument_node="">William Johnstone</span></a><span data-dcnode-id="3607" instrument_node=""> played Ricky Brewster and </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0388615/"><span data-dcnode-id="3606" instrument_node="">Dennis Hoey</span></a><span data-dcnode-id="3604" instrument_node=""> played Capt. Wainwright. The radio-play was written by John Dickson Carr.</span></p><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3598"><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1943.11.09.Cabin_B-13.mp3"><span data-dcnode-id="3601" instrument_node="">Download Suspense.1943.11.09.Cabin_B-13.mp3</span></a><span data-dcnode-id="3599" instrument_node=""> </span></p><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3596"></p><p data-dcnode-id="3594"><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/04/escapethe_vanis.html"></a></p><span data-dcnode-id="3593" instrument_node="">(Image from </span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morguefile.com/archive/%3Fdisplay%3D53546"><span data-dcnode-id="3592" instrument_node="">Morguefile.com</span></a><span data-dcnode-id="3590" instrument_node="">) </span><p data-dcnode-id="3589"></p><span data-dcnode-id="3588" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">May 31, 2007</span></h2><span data-dcnode-id="3519" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-victorian_horror entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3346" id="entry-34702228"><span data-dcnode-id="3518" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3348"><span data-dcnode-id="3517" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3513"><span data-dcnode-id="3516" instrument_node="">
</span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_neal_c.html"><span data-dcnode-id="3515" instrument_node="">Suspense - Neil Cream, Doctor of Poison</span></a></h3><span data-dcnode-id="3512" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3403"><span data-dcnode-id="3511" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3407"><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3496"><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//heritage.scotsman.com/topics.cfm%3Ftid%3D1349%26id%3D2078502005"><span data-dcnode-id="3509" instrument_node="">The true story of Dr. Neil Cream</span></a><span data-dcnode-id="3507" instrument_node=""> is so ghastly that it is surprising that </span><em data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Suspense</span></em><span data-dcnode-id="3504" instrument_node=""> tried to dramatize it. Bringing the Victorian horror story of the "</span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.press.uchicago.edu/cgi-bin/hfs.cgi/00/7917.ctl"><span data-dcnode-id="3503" instrument_node="">Doctor of Poison</span></a><span data-dcnode-id="3501" instrument_node="">" to the airwaves required that it be pared down considerably for a general audience. Their version does not mention the nightmarish botched abortions he performed nor the prostitutes he poisoned. </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/31/prescription_for_murder.jpg" onclick="window.open(this.href, '_blank', 'width=293,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/31/prescription_for_murder_2.jpg" onclick="window.open(this.href, '_blank', 'width=293,height=448,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Prescription_for_murder_2" border="0" data-dcnode-id="3499" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/31/prescription_for_murder_2.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Prescription_for_murder_2" width="146"></a><span data-dcnode-id="3497" instrument_node=""> </span></p><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3491"><em data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Suspense</span></em><span data-dcnode-id="3492" instrument_node=""> retained only the basic components that made the story unique and left the rest out. Their version is that of a man who had no remorse about poisoning women, but who is ultimately done in by his own manipulativeness and arrogance. The strength of this episode lies in the performances of the actors and the well written narrative.</span></p><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3480"><em data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">Suspense</span></em><span data-dcnode-id="3487" instrument_node=""> also chose not to mention that Neil Cream </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casebook.org/suspects/cream.html"><span data-dcnode-id="3486" instrument_node="">is considered by some to have been Jack-the-Ripper</span></a><span data-dcnode-id="3484" instrument_node="">. The problem with that theory is that Dr. Cream was serving time for murder in </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joliet_Prison"><span data-dcnode-id="3483" instrument_node="">Joliet Prison</span></a><span data-dcnode-id="3481" instrument_node=""> in Illinois when the Ripper crimes occurred. After his release from Joliet in 1891, Dr. Cream left America for England and quickly took up his old ways. He was finally caught and sentenced to execution in 1892. Just before he was hanged, Dr. Cream is said to have admitted, "I am Jack..." One theory as to how this could be possible proposes that he had a double who committed the Ripper murders.</span></p><span data-dcnode-id="3479" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3478" instrument_node="">This story aired once on September 17, 1951, and starred Oscar winner </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001452/awards"><span data-dcnode-id="3477" instrument_node="">Charles Laughton</span></a><span data-dcnode-id="3475" instrument_node=""> in one of his </span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/DillyriaUniversity/Suspense/GM/LaughtonCharles.html"><span data-dcnode-id="3474" instrument_node="">ten appearances</span></a><span data-dcnode-id="3472" instrument_node=""> on </span><em data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Suspense</span></em><span data-dcnode-id="3469" instrument_node="">. </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/dillyriauniversity/Suspense/AF/DavisCharles.html"><span data-dcnode-id="3468" instrument_node="">Charles Davis</span></a><span data-dcnode-id="3466" instrument_node="">, </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0634282/"><span data-dcnode-id="3465" instrument_node="">Jeannette Nolan</span></a><span data-dcnode-id="3463" instrument_node="">, </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0444012/"><span data-dcnode-id="3462" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="3460" instrument_node="">, </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/DillyriaUniversity/Suspense/GM/HartfordBetty.html"><span data-dcnode-id="3459" instrument_node="">Betty Hartford</span></a><span data-dcnode-id="3457" instrument_node="">, </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0254853/"><span data-dcnode-id="3456" instrument_node="">Georgia Ellis</span></a><span data-dcnode-id="3454" instrument_node="">, </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0493354/"><span data-dcnode-id="3453" instrument_node="">Alma Lawton</span></a><span data-dcnode-id="3451" instrument_node=""> and </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0125287/"><span data-dcnode-id="3450" instrument_node="">Herbert Butterfield</span></a><span data-dcnode-id="3448" instrument_node=""> also appear. The radioplay was written for </span><em data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Suspense</span></em><span data-dcnode-id="3445" instrument_node=""> by </span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0254703/"><span data-dcnode-id="3444" instrument_node="">Antony Ellis</span></a><span data-dcnode-id="3442" instrument_node="">. "Neil Cream, Doctor of Poison" was produced and directed by </span><a data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0507163/"><span data-dcnode-id="3441" instrument_node="">Elliott Lewis</span></a><span data-dcnode-id="3439" instrument_node="">.</span></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3429"><strong data-dcnode-id="3434"><span data-dcnode-id="3435" style="font-size: 1.2em;"><span data-dcnode-id="3436" instrument_node="">.</span></span></strong><span data-dcnode-id="3433" instrument_node="">&nbsp; </span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/NeillCreamDoctorofPoison.9.17.1951mp3.mp3"><span data-dcnode-id="3432" instrument_node="">Download NeilCreamDoctorofPoison.9.17.1951mp3.mp3</span></a><span data-dcnode-id="3430" instrument_node=""> </span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3421"><em data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Suspense</span></em><span data-dcnode-id="3425" instrument_node=""> presented the same radioplay again in 1955 under the title, "A Story of Poison."&nbsp; This time </span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imdb.com/name/nm0444012/"><span data-dcnode-id="3424" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="3422" instrument_node=""> played Dr. Cream and the show was produced and directed by Antony Ellis. This episode aired on September 13, 1955.</span></p><span data-dcnode-id="3420" instrument_node="">
</span><p data-dcnode-id="3412"><strong data-dcnode-id="3417"><span data-dcnode-id="3418" style="font-size: 1.2em;"><span data-dcnode-id="3419" instrument_node="">.</span></span></strong><span data-dcnode-id="3416" instrument_node="">&nbsp; </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense_1955.09.13_AStoryOfPoison.mp3"><span data-dcnode-id="3415" instrument_node="">Download Suspense_1955.09.13_AStoryOfPoison.mp3</span></a><span data-dcnode-id="3413" instrument_node=""> </span></p><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">(Revised 9/20/07)</span></p><span data-dcnode-id="3408" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">May 25, 2007</span></h2><span data-dcnode-id="3342" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3229" id="entry-34534954"><span data-dcnode-id="3341" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3231"><span data-dcnode-id="3340" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3336"><span data-dcnode-id="3339" instrument_node="">
</span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_the_tr.html"><span data-dcnode-id="3338" instrument_node="">Suspense - The Treasure Chest of Don Jose</span></a></h3><span data-dcnode-id="3335" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3283"><span data-dcnode-id="3334" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3287"><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3325"><span data-dcnode-id="3332" instrument_node="">If the new </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0449088/"><span data-dcnode-id="3331" instrument_node="">Pirates of the Caribbean</span></a><span data-dcnode-id="3329" instrument_node=""> movie is just a bit too long for you, and you would prefer a pirate adventure in the </span><em data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">half hour</span></em><span data-dcnode-id="3326" instrument_node=""> range, then try "The Treasure Chest of Don Jose."&nbsp; </span></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3317"><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/25/skullmorguefile32520_3.jpg" onclick="window.open(this.href, '_blank', 'width=391,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Skullmorguefile32520_3" border="0" data-dcnode-id="3323" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/25/skullmorguefile32520_3.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Skullmorguefile32520_3" width="117"></a><span data-dcnode-id="3321" instrument_node=""> This is a story about a pirate curse, a kidnapping, and a buried treasure of gold that plays out in 1950's era </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.capecodchamber.org/"><span data-dcnode-id="3320" instrument_node="">Cape Cod</span></a><span data-dcnode-id="3318" instrument_node="">. The treasure was left there many years earlier by Don Jose, the King of the Pirates, but the problem is that he and his descendants have all been cursed. So, retrieving the buried chest turns out to be tricky for Don Jose's great-grandson.</span></p><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3312"><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/25/chestmorguefile12399.jpg" onclick="window.open(this.href, '_blank', 'width=448,height=307,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Chestmorguefile12399" border="0" data-dcnode-id="3315" height="92" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/25/chestmorguefile12399.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Chestmorguefile12399" width="134"></a><span data-dcnode-id="3313" instrument_node=""> </span></p><span data-dcnode-id="3311" instrument_node="">
</span><p data-dcnode-id="3307"><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/25/skullmorguefile32520.jpg" onclick="window.open(this.href, '_blank', 'width=391,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/25/skullmorguefile32520_2.jpg" onclick="window.open(this.href, '_blank', 'width=391,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><span data-dcnode-id="3308" instrument_node="">&nbsp; </span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3296"><em data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Suspense</span></em><span data-dcnode-id="3303" instrument_node=""> presented this story three times, the first with J. Carroll Naish in the lead role on February 4, 1952, and the last with Raymond Burr on October 12, 1958. Here is the second of the three presentations. It aired on June 6, 1956, and stars Broadway, television, and movie actor </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0057422/"><span data-dcnode-id="3302" instrument_node="">Edgar Barrier</span></a><span data-dcnode-id="3300" instrument_node="">. The role of the police chief was played by </span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0444012/"><span data-dcnode-id="3299" instrument_node="">Joseph Kearns</span></a><span data-dcnode-id="3297" instrument_node="">. Christopher Anthony wrote the radioplay.</span></p><span data-dcnode-id="3295" instrument_node="">
</span><p data-dcnode-id="3292"><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/suspense.6.26.1956.Treasure_Chest_%2520Don%2520Jose.mp3"><span data-dcnode-id="3294" instrument_node="">Download suspense.6.26.1956.Treasure_Chest_ Don Jose.mp3</span></a></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">(Photos from morguefile.com) </span></p><span data-dcnode-id="3288" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">May 24, 2007</span></h2><span data-dcnode-id="3225" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="3087" id="entry-34456790"><span data-dcnode-id="3224" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="3089"><span data-dcnode-id="3223" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3219"><span data-dcnode-id="3222" instrument_node="">
</span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_sleep_.html"><span data-dcnode-id="3221" instrument_node="">Suspense - Sleep is for Children</span></a></h3><span data-dcnode-id="3218" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3141"><span data-dcnode-id="3217" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3145"><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3213"><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/24/phonemorguefile128914.jpg" onclick="window.open(this.href, '_blank', 'width=441,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/24/phonemorguefile128914_2.jpg" onclick="window.open(this.href, '_blank', 'width=441,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3200"><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/24/phonemorguefile128914_3.jpg" onclick="window.open(this.href, '_blank', 'width=441,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Phonemorguefile128914_3" border="0" data-dcnode-id="3211" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/24/phonemorguefile128914_3.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Phonemorguefile128914_3" width="132"></a><span data-dcnode-id="3209" instrument_node="">"Sleep is for Children" can best be described as "</span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspense_%28radio_program%29"><em data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Suspense</span></em></a><span data-dcnode-id="3205" instrument_node=""> meets </span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethel_and_Albert"><em data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">The Couple Next Door</span></em></a><span data-dcnode-id="3201" instrument_node="">." Here we have Walter &amp; Ellen Gordon, the perfectly normal couple next door, and in their suburban neighborhood there is a murderer on the loose.&nbsp; </span></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3198" instrument_node="">The Gordons have a daughter named Stephanie and that is where the entertainment comes in. You probably know a little girl like her or have one in your family. She is a brat, but that is what creates the tension and the suspense. We know that whatever her parents tell her to do, she </span><em data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">won't do</span></em><span data-dcnode-id="3195" instrument_node="">.&nbsp; Along with Stephanie comes her roller skates, which are perpetually in the way and a hazard to everyone throughout the episode. In the end, Stephanie gets her come-uppance as a result of her own brattiness. It's wonderful.</span></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">This episode also has an eggman, which is something like the milkman. The eggman has a lot of resentment towards the encroaching suburban community that has brought families like the Gordons into the area. </span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3173"><span data-dcnode-id="3189" instrument_node="">"Sleep is for Children" stars </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0258950/"><span data-dcnode-id="3188" instrument_node="">Elspeth Eric</span></a><span data-dcnode-id="3186" instrument_node=""> as Ellen Gordon, </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0068466/"><span data-dcnode-id="3185" instrument_node="">Ralph Bell</span></a><span data-dcnode-id="3183" instrument_node=""> as Walter Gordon, </span><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/dillyriauniversity/Suspense/AF/AdamsBill.html"><span data-dcnode-id="3182" instrument_node="">Bill Adams</span></a><span data-dcnode-id="3180" instrument_node=""> as Mr. Beckler and </span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0306608/"><span data-dcnode-id="3179" instrument_node="">Betty Garde</span></a><span data-dcnode-id="3177" instrument_node=""> as Rosa. </span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/dillyriauniversity/Suspense/NZ/TobinRuth.html"><span data-dcnode-id="3176" instrument_node="">Ruth Tobin</span></a><span data-dcnode-id="3174" instrument_node=""> and Sara Fossel also appear. It is one of two episodes written by Ralph Bell and Eugene Francis. This broadcast aired on March 6, 1960 and includes the commercials, but they are quite snappy.</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3168"><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1960.03.06_Sleep_Is_For_Children.mp3"><span data-dcnode-id="3171" instrument_node="">Download Suspense.1960.03.06_Sleep_Is_For_Children.mp3</span></a><span data-dcnode-id="3169" instrument_node=""> </span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3155"><span data-dcnode-id="3166" instrument_node="">Most of the action in "Sleep is for Children" takes place on the phone. Here is an episode of the </span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrsite.com/logs/logc1017.htm"><em data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">The Couple Next Door</span></em></a><span data-dcnode-id="3162" instrument_node=""> that also centers around a phone call and a little girl who won't cooperate. In this case, however, the little girl is the funniest part of the episode because she is so true to life. This episode aired January 1, 1958. </span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0528425/bio"><span data-dcnode-id="3161" instrument_node="">Peggy Lynch</span></a><span data-dcnode-id="3159" instrument_node=""> and </span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0120326/"><span data-dcnode-id="3158" instrument_node="">Alan Bunce</span></a><span data-dcnode-id="3156" instrument_node=""> star. </span></p><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3150"><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/CoupleNextDoor.1958.01.01_Phone_Call_To_Mexico_City.mp3"><span data-dcnode-id="3153" instrument_node="">Download CoupleNextDoor.1958.01.01_Phone_Call_To_Mexico_City.mp3</span></a><span data-dcnode-id="3151" instrument_node=""> </span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">(Photo from Morguefile.com)</span></p><span data-dcnode-id="3146" instrument_node="">

</span><p class="entry-footer-info" data-dcnode-id="3113"><span data-dcnode-id="3138" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">May 19, 2007</span></h2><span data-dcnode-id="3083" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-cornell_woolrich entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2954" id="entry-34227930"><span data-dcnode-id="3082" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2956"><span data-dcnode-id="3081" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="3077"><span data-dcnode-id="3080" instrument_node="">
</span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_three_.html"><span data-dcnode-id="3079" instrument_node="">Suspense -Three O'Clock</span></a></h3><span data-dcnode-id="3076" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3011"><span data-dcnode-id="3075" instrument_node="">
</span><div class="entry-body" data-dcnode-id="3015"><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3063"><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/18/alarmclock007_3.jpg" onclick="window.open(this.href, '_blank', 'width=420,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/18/alarmclock007_4.jpg" onclick="window.open(this.href, '_blank', 'width=420,height=336,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Alarmclock007_4" border="0" data-dcnode-id="3072" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/18/alarmclock007_4.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Alarmclock007_4" width="126"></a><span data-dcnode-id="3070" instrument_node="">"Three O'Clock" is a </span><em data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Suspense</span></em><span data-dcnode-id="3067" instrument_node=""> episode adapted from a 1938 short story by </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0941280/"><span data-dcnode-id="3066" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="3064" instrument_node="">. A man named Paul believes that his wife, Francie, is cheating on him. He takes revenge by planting a bomb in the basement of their house, but when he returns upstairs, he finds two burglars. Unaware of the bomb, they tie up Paul and leave him in the basement. He is then trapped, alone and helpless, with the ticking bomb that he had set for his wife. </span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3061" instrument_node="">In the short story, Paul is gagged and can't make any sound. On radio this isn't obvious because we are hearing what he is thinking. There aren't any special sound effects for his thoughts. </span><em data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Suspense</span></em><span data-dcnode-id="3058" instrument_node="">'s adaptation is close to Woolrich's original work, but the ending is slightly changed. The radioplay was written by </span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0628305/"><span data-dcnode-id="3057" instrument_node="">Walter Brown Newman</span></a><span data-dcnode-id="3055" instrument_node="">, who later went to have three of his screenplays nominated for Academy Awards. </span></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3052" instrument_node="">"Three O'Clock" was also done for television in 1949 for an episode of </span><a data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0505181/"><span data-dcnode-id="3051" instrument_node="">Actor's Studio</span></a><span data-dcnode-id="3049" instrument_node="">. It aired on </span><em data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Suspense</span></em><span data-dcnode-id="3046" instrument_node=""> only once, on March 10, 1949 and starred </span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0001336/"><span data-dcnode-id="3045" instrument_node="">Van Heflin</span></a><span data-dcnode-id="3043" instrument_node=""> as Paul. </span></p><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3038"><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1949.03.10.ThreeOClock.mp3"><span data-dcnode-id="3040" instrument_node="">Download Suspense.1949.03.10.ThreeOClock.mp3</span></a></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3036" instrument_node="">The radio program </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrsite.com/logs/logs1014.htm"><em data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Sleep No More</span></em></a><span data-dcnode-id="3032" instrument_node=""> performed "Three O'Clock" on December 12, 1956. It is different in that it is a dramatic reading of the story performed by </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0647483/"><span data-dcnode-id="3031" instrument_node="">Nelson Olmsted</span></a><span data-dcnode-id="3029" instrument_node="">.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3023"><a data-dcnode-id="3025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/SleepNM.1956.12.12_Three_OClock.mp3"><span data-dcnode-id="3026" instrument_node="">Download SleepNM.1956.12.12_Three_OClock.mp3</span></a><span data-dcnode-id="3024" instrument_node=""> </span></p><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">(Photo from Morguefile.com) </span></p><span data-dcnode-id="3019" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">May 18, 2007</span></h2><span data-dcnode-id="2950" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-victorian_horror entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="2811" id="entry-34084736"><span data-dcnode-id="2949" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="2813"><span data-dcnode-id="2948" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="2944"><span data-dcnode-id="2947" instrument_node="">
</span><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/05/suspense_the_bo.html"><span data-dcnode-id="2946" instrument_node="">Suspense - The Body Snatchers</span></a></h3><span data-dcnode-id="2943" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2868"><span data-dcnode-id="2942" instrument_node="">
</span><div class="entry-body" data-dcnode-id="2872"><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2934"><em data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Suspense</span></em><span data-dcnode-id="2938" instrument_node="">'s "The Body Snatchers" is a light-hearted drama, but the true history on which it is based is dark and gruesome. The story is set in the early 19th century when the legal supply of human bodies for medical research in Britain was limited only to criminals given the death penalty. This supply was insufficient for the number of medical students who needed cadavers for dissection and the difference was made up by "</span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Body-snatching"><span data-dcnode-id="2937" instrument_node="">body-snatching</span></a><span data-dcnode-id="2935" instrument_node="">", the illegal disinterment and sale of the dead. Those who dug up bodies after burial and sold them off for a profit were known as "Resurrectionists" or "Resurrection Men." </span></p><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2929"><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/17/highgate_cemetery1.jpg" onclick="window.open(this.href, '_blank', 'width=356,height=241,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/05/17/highgate_cemetery1_2.jpg" onclick="window.open(this.href, '_blank', 'width=356,height=241,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><img alt="Highgate_cemetery1" border="0" data-dcnode-id="2930" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/05/18/highgate_cemetery1.jpg&amp;raw" style="FLOAT: right; MARGIN: 0px 0px 5px 5px" title="Highgate_cemetery1" width="213"></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2927" instrument_node="">As a result, families who lost a loved one had to attend to </span><em data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">keeping</span></em><span data-dcnode-id="2924" instrument_node=""> that loved one buried. In response, there sprang up an industry to deal with graveyard crime. Specialty items like lead coffins, locks, vaults, </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.corkpastandpresent.ie/corkimages/misc-anti.shtml"><span data-dcnode-id="2923" instrument_node="">grills</span></a><span data-dcnode-id="2921" instrument_node="">, and </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geograph.org.uk/photo/347206"><span data-dcnode-id="2920" instrument_node="">mortsafes</span></a><span data-dcnode-id="2918" instrument_node=""> helped to deter robbers. It also led to fancier cemeteries for the middle class like </span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//highgate-cemetery.org/"><span data-dcnode-id="2917" instrument_node="">Highgate Cemetery</span></a><span data-dcnode-id="2915" instrument_node=""> in London (pictured), which was one of the "</span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/london/content/articles/2005/05/10/magnificent_seven_feature.shtml"><span data-dcnode-id="2914" instrument_node="">Magnificent Seven</span></a><span data-dcnode-id="2912" instrument_node="">."</span></p><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2909" instrument_node="">When dead bodies weren't available some resurrectionists committed murder for profit. </span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Port_murders"><span data-dcnode-id="2908" instrument_node="">The West Port Murders</span></a><span data-dcnode-id="2906" instrument_node=""> by William Burke and William Hare in 1827-1828 in Scotland, as well as the crimes of John Bishop and Thomas Williams (the </span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_Burkers"><span data-dcnode-id="2905" instrument_node="">London Burkers</span></a><span data-dcnode-id="2903" instrument_node="">), created a public outcry for change. In 1831 Bishop and Williams were sentenced, executed, and then dissected for study.</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2897"><a data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatomy_Act_1832"><span data-dcnode-id="2900" instrument_node="">The Anatomy Act of 1832</span></a><span data-dcnode-id="2898" instrument_node=""> altered the laws and increased the number of bodies available, thereby diminishing the need for body-snatching. The new Act stated that destitute people, with no relatives, who died while in the workhouses could be given over to medical schools. As a result however, the greatly feared public workhouses became even more terrifying in that, if you died there, you could end up being dissected in an anatomy clinic.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2895" instrument_node="">Today, the </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/US/WireStory%3Fid%3D3185981%26page%3D1"><span data-dcnode-id="2894" instrument_node="">illegal sales</span></a><span data-dcnode-id="2892" instrument_node=""> of corpses and body parts continues to be a lucrative industry in America.</span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node="">"The Body Snatchers" was for written for </span><em data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Suspense</span></em><span data-dcnode-id="2886" instrument_node=""> by John Dickson Carr and aired on November 24, 1942.</span></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2880"><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense_1942-11-24_The_Body_Snatchers.mp3"><span data-dcnode-id="2883" instrument_node="">Download Suspense_1942-11-24_The_Body_Snatchers.mp3</span></a><span data-dcnode-id="2881" instrument_node=""> </span></p><span data-dcnode-id="2879" instrument_node="">
