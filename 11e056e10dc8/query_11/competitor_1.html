</span><h2 class="date-header" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">March 18, 2007</span></h2><span data-dcnode-id="1413" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-urban_legends entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1219" id="entry-31566286"><span data-dcnode-id="1412" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1221"><span data-dcnode-id="1411" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1407"><span data-dcnode-id="1410" instrument_node="">
</span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/03/suspense_the_hi.html"><span data-dcnode-id="1409" instrument_node="">Suspense - The Hitchhiker</span></a></h3><span data-dcnode-id="1406" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1276"><span data-dcnode-id="1405" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1280"><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/03/17/hitchikerpainting.jpg" onclick="window.open(this.href, '_blank', 'width=429,height=644,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1394"><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/07/19/morguefile90693.jpg" onclick="window.open(this.href, '_blank', 'width=186,height=176,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Morguefile90693" border="0" data-dcnode-id="1400" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/07/19/morguefile90693.jpg&amp;raw" style="margin: 0px 5px 5px 0px; float: left;" title="Morguefile90693" width="186"></a><span data-dcnode-id="1398" instrument_node=""> The </span><em data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Suspense</span></em><span data-dcnode-id="1395" instrument_node=""> episode "The Hitchhiker" is well known because the radio play was transformed into a television episode, and it has since lived on in reruns. In this story, a supernatural hitchhiker follows the main character on a trip across the country.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1362"><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reelclassics.com/Actors/Welles/welles.htm"><span data-dcnode-id="1392" instrument_node="">Orson Welles</span></a><span data-dcnode-id="1390" instrument_node="">, for whom the role was written, first performed "The Hitchhiker" on the CBS network's </span><em data-dcnode-id="1386"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitaldeliftp.com/digitaldelitoo/dd2jb-mercury-theatre.html" target="_self"><span data-dcnode-id="1389" instrument_node="">Mercury Theater on the Air</span></a><span data-dcnode-id="1387" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1385" instrument_node="">in 1941,</span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1382" instrument_node="">and then again on </span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Suspense</span></em><span data-dcnode-id="1379" instrument_node=""> in 1942. The radio play was written by </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/Vienna/Stage/1045/Features/Fletcher.html"><span data-dcnode-id="1378" instrument_node="">Lucille Fletcher</span></a><span data-dcnode-id="1376" instrument_node="">, who also wrote </span><em data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Suspense</span></em><span data-dcnode-id="1373" instrument_node="">'s most famous episode, "Sorry, Wrong Number." (This episode also features her husband, legendary film-composer </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0002136/"><span data-dcnode-id="1372" instrument_node="">Bernard Herrmann</span></a><span data-dcnode-id="1370" instrument_node="">, who composed and conducted the music.) In 1960, "The Hitch-Hiker" became an episode of the CBS television show, </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Twilight_Zone"><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">The Twilight Zone</span></em></a><span data-dcnode-id="1366" instrument_node=""> but with </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geocities.com/Hollywood/Boulevard/7484/"><span data-dcnode-id="1365" instrument_node="">Inger Stevens</span></a><span data-dcnode-id="1363" instrument_node=""> in the lead role.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">The radio version has chilling sound effects. Well, chilling or hokey. It depends on your point of view. Listen for the sound effects of the phone call made by Welles. The suspense builds as his call goes from operator to operator across the country, but it also shows how many people had to be involved just to make a phone call back then!</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">This episode was broadcast on September 2, 1942.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1350"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1942.09.02_Hitchhiker.mp3"><span data-dcnode-id="1354" instrument_node="">Download Suspense.1942.09.02_Hitchhiker.mp3</span></a><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1942.09.02_Hitchiker.mp3"><span data-dcnode-id="1352" instrument_node="">&nbsp;</span></a></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1348" instrument_node="">The original presentation&nbsp;of "The Hitchhiker" performed&nbsp;by&nbsp;Orson Welles and his </span><em data-dcnode-id="1344"><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitaldeliftp.com/digitaldelitoo/dd2jb-mercury-theatre.html" target="_self"><span data-dcnode-id="1347" instrument_node="">Mercury Theater</span></a><span data-dcnode-id="1345" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1343" instrument_node="">aired on November 17, 1941, but no&nbsp;recording of that broadcast is known to exist at this time.&nbsp;However,&nbsp;a 1946 version&nbsp;performed by Orson Welles for </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The Mercury Summer Theater</span></em><span data-dcnode-id="1340" instrument_node=""> is available below.&nbsp;</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1337" instrument_node="">. </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/files/mercurytheater_1946-06-2--the-hitch-hiker.mp3"><span data-dcnode-id="1336" instrument_node="">Download MercuryTheater_1946-06-2--The Hitch-hiker</span></a></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1332" instrument_node="">(Visit&nbsp;</span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitaldeliftp.com/digitaldelitoo/dd2jb-mercury-theatre.html" target="_self"><span data-dcnode-id="1331" instrument_node="">The Digital Deli Too</span></a><span data-dcnode-id="1329" instrument_node=""> for more information&nbsp;about the </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The Mercury Theater on the Air</span></em><span data-dcnode-id="1326" instrument_node=""> and its various&nbsp;name changes and&nbsp;program logs.)&nbsp;</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322" style="text-align: left;"><span data-dcnode-id="1323" instrument_node="">_______</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319" style="text-align: left;"><span data-dcnode-id="1320" instrument_node="">Many old radio shows have stories that include hitchhikers.&nbsp;Often, they&nbsp;play on the urban legends of "The Vanishing Hitchhiker" or "The Two Hitchhikers".</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1313" style="text-align: left;"><span data-dcnode-id="1317" instrument_node="">Here is an episode from the radio series </span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">The Clock</span></em><span data-dcnode-id="1314" instrument_node=""> (1946-1948) that is also called "The Hitchhiker". It is a spin on the urban legend where one of two hitchhikers is dangerous but appearances turn out to be deceiving.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">This episode was broadcast on February 9, 1947.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1306"><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Clock.1947.02.09_The_Hitchhiker.mp3"><span data-dcnode-id="1308" instrument_node="">Download Clock.1947.02.09_The_Hitchhiker.mp3</span></a></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node="">For more information about urban legends about hitchhikers consult </span><span data-dcnode-id="1302" style="text-decoration: underline;"><span data-dcnode-id="1303" instrument_node="">The Encyclopedia of Urban Legends</span></span><span data-dcnode-id="1301" instrument_node=""> by Jan Harold Brunvand.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1298" instrument_node="">For more information about the Twilight Zone episode "The Hitch-Hiker" consult </span><span data-dcnode-id="1296" style="text-decoration: underline;"><span data-dcnode-id="1297" instrument_node="">The Twilight Zone Companion</span></span><span data-dcnode-id="1295" instrument_node=""> by Marc Scott Zicree.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">(Photo by </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//morguefile.com/archive/%3Fdisplay%3D90693%26"><span data-dcnode-id="1291" instrument_node="">Robb Kiser</span></a><span data-dcnode-id="1289" instrument_node="">)</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">----</span></p><span data-dcnode-id="1284" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">March 05, 2007</span></h2><span data-dcnode-id="1215" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-ventriloquists_dummies entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="1086" id="entry-31125206"><span data-dcnode-id="1214" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="1088"><span data-dcnode-id="1213" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1209"><span data-dcnode-id="1212" instrument_node="">
</span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/03/suspenseflesh_p.html"><span data-dcnode-id="1211" instrument_node="">Suspense-Flesh Peddler</span></a></h3><span data-dcnode-id="1208" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1143"><span data-dcnode-id="1207" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1147"><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/edgarbergenandcharliemccarthystagedoorca.jpg" onclick="window.open(this.href, '_blank', 'width=648,height=610,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1194"><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/edgarbergenandcharliemccarthystagedoorca_1.jpg" onclick="window.open(this.href, '_blank', 'width=648,height=610,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Edgarbergenandcharliemccarthystagedoorca_1" border="0" data-dcnode-id="1202" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/edgarbergenandcharliemccarthystagedoorca_1.jpg&amp;raw" style="FLOAT: left; MARGIN: 0px 5px 5px 0px" title="Edgarbergenandcharliemccarthystagedoorca_1" width="194"></a><span data-dcnode-id="1200" instrument_node="">The ventriloquist/comedy act of </span><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.radiohof.org/comedy/edgarbergen.html"><span data-dcnode-id="1199" instrument_node="">Edgar Bergen and Charlie McCarthy</span></a><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node=""> </span></strong><span data-dcnode-id="1195" instrument_node="">was a huge success during the "Golden Age of Radio" but ventriloquists and their dummies also made excellent fodder for radio thrillers and horror shows. The ventriloquists portrayed in these shows were often down on their luck, tortured souls working in seedy places -- a stark contrast to the perennially sunny Bergen &amp; McCarthy Show.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">(Bergen &amp; McCarthy are pictured here from their appearance in the movie </span><em data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Stage Door Canteen </span></em><span data-dcnode-id="1189" instrument_node="">in 1943. Bergen is the one in the turban.) </span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">The </span><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Suspense</span></em><span data-dcnode-id="1183" instrument_node=""> episode "Flesh Peddler" follows a typical "haunted" ventriloquist plot but it remains interesting because of the casting.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1180" instrument_node="">This is an old radio show with two performers who are familiar to any Gen-Xer. It stars </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.startrek.com/startrek/view/series/TOS/cast/69074.html"><span data-dcnode-id="1179" instrument_node="">Deforest Kelly</span></a><span data-dcnode-id="1177" instrument_node="">, whom we all know as </span><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Dr. McCoy</span></strong><span data-dcnode-id="1174" instrument_node=""> on</span><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">&nbsp;</span></strong><em data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Star Trek,</span></em><span data-dcnode-id="1169" instrument_node=""> but it also has </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dawsbutler.com/"><span data-dcnode-id="1168" instrument_node="">Daws Butler</span></a><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">,</span></strong><span data-dcnode-id="1164" instrument_node=""> who was the voice of </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Yogi Bear, Huckleberry Hound, Elroy Jetson</span></strong><span data-dcnode-id="1161" instrument_node=""> and numerous other cartoon characters. Anyone who watched cartoons in the 1970's will recognize his voice. </span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Deforest Kelly plays a booking agent who takes an interest in a ventriloquist act he finds at a carnival. Daws Butler provides the voice of Arthur, the slow-witted knife-thrower. It is unfortunate that they did not choose Butler to play the ventriloquist, given his enormous talent for providing character voices, but this was before he became famous for his work in cartoons. </span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">This show was broadcast on August 4, 1957. </span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1149"><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1957.08.04_Fleshpeddler.mp3"><span data-dcnode-id="1152" instrument_node="">Download Suspense.1957.08.04_Fleshpeddler.mp3</span></a><span data-dcnode-id="1150" instrument_node=""> </span></p><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1146" instrument_node="">
</span><span data-dcnode-id="1144" instrument_node="">
</span></div><span data-dcnode-id="1142" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">February 27, 2007</span></h2><span data-dcnode-id="1082" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-musical_stars entry-category-world_war_ii entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="957" id="entry-30972244"><span data-dcnode-id="1081" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="959"><span data-dcnode-id="1080" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="1076"><span data-dcnode-id="1079" instrument_node="">
</span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/suspenseyou_wer.html"><span data-dcnode-id="1078" instrument_node="">Suspense-You Were Wonderful</span></a></h3><span data-dcnode-id="1075" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1017"><span data-dcnode-id="1074" instrument_node="">
</span><div class="entry-body" data-dcnode-id="1021"><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1069"><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/horne1.gif" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/horne1_1.gif" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/horne5.jpg" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1064"><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/horne_1.jpg" onclick="window.open(this.href, '_blank', 'width=100,height=100,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Horne_1" border="0" data-dcnode-id="1067" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/horne_1.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="Horne_1" width="100"></a><span data-dcnode-id="1065" instrument_node=""> </span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1062" instrument_node="">In honor of Black History month, here is the </span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Suspense</span></em><span data-dcnode-id="1059" instrument_node=""> episode "You Were Wonderful" with </span><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Lena Horne</span></strong><span data-dcnode-id="1056" instrument_node="">. </span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">True to the title, Lena's singing </span><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">is</span></em><span data-dcnode-id="1050" instrument_node=""> wonderful despite the bad sound quality of this recording. She sings "Embraceable You", a little bit of "One Dozen Roses" and "America" (My Country 'Tis of Thee). This is a very patriotic WWII era episode that touches on the racial issues of the time. The story is set in Buenos Aires, Argentina. </span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">According to </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kennedycenter.com/calendar/index.cfm%3Ffuseaction%3DshowIndividual%26entitY_id%3D3743%26source_type%3DA"><span data-dcnode-id="1046" instrument_node="">her biography</span></a><span data-dcnode-id="1044" instrument_node=""> on the Kennedy Center's website, Lena Horne often performed for the troops in Europe during WWII but on the condition that the audience would be desegregated. She was also the most popular pin-up girl of African-American soldiers!</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1041" instrument_node="">"You Were Wonderful" aired on November 9, 1944. According to Martin Grams in </span><span data-dcnode-id="1039" style="text-decoration: underline;"><span data-dcnode-id="1040" instrument_node="">Suspense: Twenty Years of Thrills and Chills</span></span><span data-dcnode-id="1038" instrument_node="">, she was the first professional singer to appear on </span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Suspense.</span></em><span data-dcnode-id="1035" instrument_node=""> </span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1029"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/Suspense.1944.11.09_You_Were_Wonderful.mp3"><span data-dcnode-id="1032" instrument_node="">Download Suspense.1944.11.09_You_Were_Wonderful.mp3</span></a><span data-dcnode-id="1030" instrument_node=""> </span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">Image of Lena Horne from (</span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.classicsavers.com/"><span data-dcnode-id="1026" instrument_node="">www.classicsavers.com</span></a><span data-dcnode-id="1024" instrument_node="">)</span></p><span data-dcnode-id="1022" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">February 16, 2007</span></h2><span data-dcnode-id="953" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-musical_stars entry-category-theater_people_tales_of entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="842" id="entry-30443264"><span data-dcnode-id="952" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="844"><span data-dcnode-id="951" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="947"><span data-dcnode-id="950" instrument_node="">
</span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/suspensenever_f.html"><span data-dcnode-id="949" instrument_node="">Suspense-Never Follow a Banjo Act</span></a></h3><span data-dcnode-id="946" instrument_node="">
</span><div class="entry-content" data-dcnode-id="902"><span data-dcnode-id="945" instrument_node="">
</span><div class="entry-body" data-dcnode-id="906"><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="936"><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/03/31/mermaninvegas.jpg" onclick="window.open(this.href, '_blank', 'width=500,height=500,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/03/31/mermaninvegas_4.jpg" onclick="window.open(this.href, '_blank', 'width=293,height=278,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="Mermaninvegas_4" border="0" data-dcnode-id="942" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/03/31/mermaninvegas_4.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="Mermaninvegas_4" width="175"></a><span data-dcnode-id="940" instrument_node="">As I watched the Grammy Awards show this past weekend my mind drifted to the </span><em data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Suspense</span></em><span data-dcnode-id="937" instrument_node=""> episode "Never Follow a Banjo Act." </span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">The star of this episode is </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/wnet/broadway/stars/merman_e.html"><span data-dcnode-id="933" instrument_node="">Ethel Merman</span></a><span data-dcnode-id="931" instrument_node="">, and even if you aren't a big Ethel fan, you will probably enjoy this. She plays Rosie Jones, a singing star of "mature talents," who is asked to work with a heart-throb boy singer named Terry Dane. She accepts but quickly finds out that the deal she made isn't all it is cracked up to be.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">This episode is surprisingly creepy and dark, and it makes memorable statements about greed, the pop music industry, and "tousled hair". Why hasn't this episode ever been turned into a movie? </span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="916"><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Suspense </span></em><span data-dcnode-id="923" instrument_node="">broadcast this episode twice. The first presentation starred Ethel Merman on February 4, 1954, and the second starred Margaret Whiting on March 2, 1958.&nbsp; Ethel's is the better version. "Never Follow a Banjo Act" was written for </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Suspense</span></em><span data-dcnode-id="920" instrument_node=""> by </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0688117/"><span data-dcnode-id="919" instrument_node="">James Poe</span></a><span data-dcnode-id="917" instrument_node="">.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="911"><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/540201_never_follow_a_banjo_act.mp3"><span data-dcnode-id="914" instrument_node="">Download 540201_never_follow_a_banjo_act.mp3</span></a><span data-dcnode-id="912" instrument_node=""> </span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/ethelmerman.jpg" onclick="window.open(this.href, '_blank', 'width=357,height=445,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span><span data-dcnode-id="903" instrument_node="">

</span><span class="post-footers" data-dcnode-id="888"><span data-dcnode-id="898" instrument_node="">Posted on February 16, 2007 at 03:10 PM in </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/best_of_suspense/"><span data-dcnode-id="897" instrument_node="">Best of Suspense</span></a><span data-dcnode-id="895" instrument_node="">, </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/musical_stars/"><span data-dcnode-id="894" instrument_node="">Musical Stars</span></a><span data-dcnode-id="892" instrument_node="">, </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/theatrical_superstition/"><span data-dcnode-id="891" instrument_node="">Theater People (Tales of)</span></a><span data-dcnode-id="889" instrument_node=""> </span></span><span data-dcnode-id="887" instrument_node=""> </span><span class="separator" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">|</span></span><span data-dcnode-id="884" instrument_node=""> </span><a class="permalink" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/suspensenever_f.html"><span data-dcnode-id="883" instrument_node="">Permalink</span></a><span data-dcnode-id="881" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">February 08, 2007</span></h2><span data-dcnode-id="838" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="730" id="entry-30163902"><span data-dcnode-id="837" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="732"><span data-dcnode-id="836" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="832"><span data-dcnode-id="835" instrument_node="">
</span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/best_of_suspens.html"><span data-dcnode-id="834" instrument_node="">Suspense-The Pasteboard Box</span></a></h3><span data-dcnode-id="831" instrument_node="">
</span><div class="entry-content" data-dcnode-id="784"><span data-dcnode-id="830" instrument_node="">
</span><div class="entry-body" data-dcnode-id="788"><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="825"><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/250pxjoseph_cotten_in_shadow_of_a_doubt__1.jpg" onclick="window.open(this.href, '_blank', 'width=250,height=204,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="250pxjoseph_cotten_in_shadow_of_a_doubt__1" border="0" data-dcnode-id="828" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/250pxjoseph_cotten_in_shadow_of_a_doubt__1.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="250pxjoseph_cotten_in_shadow_of_a_doubt__1" width="250"></a><span data-dcnode-id="826" instrument_node=""> Don't let the dull title fool you.&nbsp; "The Pasteboard Box" is one of the best! </span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">This is a story about an evil twin and if you have ever watched </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Days of Our Lives </span></em><span data-dcnode-id="820" instrument_node="">you know that having an evil twin can be a </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">really bad thing</span></em><span data-dcnode-id="817" instrument_node="">.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="814" instrument_node="">"The Pasteboard Box" is a cold-blooded tale with some good twists and </span><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">no remorse</span></em><span data-dcnode-id="811" instrument_node="">.&nbsp; It stars movie actor </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Cotten"><span data-dcnode-id="810" instrument_node="">Joseph Cotten</span></a><span data-dcnode-id="808" instrument_node=""> in the roles of both twins, Walter and Jack. Cotten's wicked voice is superb in this episode and fortunately, he made many other appearances on </span><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Suspense</span></em><span data-dcnode-id="805" instrument_node=""> as well.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/250pxjoseph_cotten_in_shadow_of_a_doubt_.jpg" onclick="window.open(this.href, '_blank', 'width=250,height=204,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Set in New York City, "The Pasteboard Box" is a swift and clever story about identical twin brothers and a box that won't go away!&nbsp; </span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">This episode was broadcast on January 17, 1946.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="790"><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/susp.1946.01.17_The_Pasteboard_Box.mp3"><span data-dcnode-id="793" instrument_node="">Download susp.1946.01.17_The_Pasteboard_Box.mp3</span></a><span data-dcnode-id="791" instrument_node=""> </span></p><span data-dcnode-id="789" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">February 01, 2007</span></h2><span data-dcnode-id="726" instrument_node="">
</span><div class="entry-category-best_of_suspense entry-category-suspense_television entry-author-christine_a_miller entry-type-post entry" data-dcnode-id="589" id="entry-15401846"><span data-dcnode-id="725" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="591"><span data-dcnode-id="724" instrument_node="">
</span><h3 class="entry-header" data-dcnode-id="720"><span data-dcnode-id="723" instrument_node="">
</span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/2007/02/suspense_on_a_c.html"><span data-dcnode-id="722" instrument_node="">Suspense - On a Country Road</span></a></h3><span data-dcnode-id="719" instrument_node="">
</span><div class="entry-content" data-dcnode-id="646"><span data-dcnode-id="718" instrument_node="">
</span><div class="entry-body" data-dcnode-id="650"><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="713"><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/onacountry_road.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=521,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/onacountry_road_1.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=521,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/onacountryroad1.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=521,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="709"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/onacountry_road2.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=521,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/onacountry_road2_1.jpg" onclick="window.open(this.href, '_blank', 'width=800,height=521,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="694"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/14/north_by_northwest_movie_trailer_sc.jpg" onclick="window.open(this.href, '_blank', 'width=720,height=576,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"></a><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//escape-suspense.typepad.com/.shared/image.html%3F/photos/uncategorized/2007/04/14/north_by_northwest_movie_trailer__2.jpg" onclick="window.open(this.href, '_blank', 'width=720,height=576,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0'); return false"><img alt="North_by_northwest_movie_trailer__2" border="0" data-dcnode-id="706" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/images/2007/04/14/north_by_northwest_movie_trailer__2.jpg&amp;raw" style="MARGIN: 0px 5px 5px 0px; FLOAT: left" title="North_by_northwest_movie_trailer__2" width="216"></a><span data-dcnode-id="704" instrument_node=""> "On a Country Road" is regarded as one of the classic tales of </span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Suspense </span></em><span data-dcnode-id="701" instrument_node="">because</span><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node=""> </span></em><span data-dcnode-id="698" instrument_node="">it embodies all of the things at which</span><em data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">&nbsp;</span></em><span data-dcnode-id="695" instrument_node="">the radio program excelled. </span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">So now, ignore the traffic, the rain, the nearly empty gas tank, as well as those news bulletins about the escaped crazy woman on the loose, and come take a drive down a lonely side road with </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reelclassics.com/Actors/Cary/cary.htm"><span data-dcnode-id="691" instrument_node="">Cary Grant</span></a><span data-dcnode-id="689" instrument_node="">.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="686" instrument_node="">"On a Country Road" was first broadcast on November 16, 1950 and starred </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cary_Grant"><span data-dcnode-id="685" instrument_node="">Cary Grant</span></a><span data-dcnode-id="683" instrument_node="">, </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cathy_Lewis"><span data-dcnode-id="682" instrument_node="">Cathy Lewis</span></a><span data-dcnode-id="680" instrument_node="">, and </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/name/nm0634282/"><span data-dcnode-id="679" instrument_node="">Jeannette Nolan</span></a><span data-dcnode-id="677" instrument_node="">. It was repeated on January 4, 1954, December 9, 1954, and May 10, 1959, with a different cast each time. The radioplay was written for </span><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Suspense</span></em><span data-dcnode-id="674" instrument_node=""> by Walter Bazzar. The television show </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0041061/"><em data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Suspense</span></em></a><span data-dcnode-id="670" instrument_node=""> presented this story once on March 13, 1951 with John Forsythe in the lead role. </span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="664"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.escape-suspense.com/files/susp.1950.11.16_On_a_Country_Road.mp3"><span data-dcnode-id="667" instrument_node="">Download Susp.1950.11.16_On_a_Country_Road.mp3</span></a><span data-dcnode-id="665" instrument_node=""> </span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">(Image of Cary Grant in </span><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">North by Northwest</span></em><span data-dcnode-id="659" instrument_node=""> from </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Image%3ANorth_by_Northwest_movie_trailer_screenshot_%2834%29.jpg"><span data-dcnode-id="658" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="656" instrument_node="">)</span></p><span data-dcnode-id="654" instrument_node="">
