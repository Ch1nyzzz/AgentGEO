</span><div class="article-content retro-folders" data-dcnode-id="775" id="main-article"><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2254"></p><p data-dcnode-id="2253"></p><hr data-dcnode-id="2252"><div class="folderlabel" data-dcnode-id="2250" onclick="togglefolder('folder0');"><span data-dcnode-id="2251" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Nitro Plus (+Chiral)&nbsp;</span></div><div class="folder" data-dcnode-id="2148" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="2149"><li data-dcnode-id="2216"><span data-dcnode-id="2249" instrument_node=""> </span><em data-dcnode-id="2246"><a class="twikilink" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SayaNoUta" title="/pmwiki/pmwiki.php/VisualNovel/SayaNoUta"><span data-dcnode-id="2248" instrument_node="">Saya no Uta</span></a></em><span data-dcnode-id="2245" instrument_node=""> has three endings, and they are all </span><a class="twikilink" data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadEnding" title="/pmwiki/pmwiki.php/Main/BadEnding"><span data-dcnode-id="2244" instrument_node="">Bad Endings</span></a><span data-dcnode-id="2242" instrument_node="">:</span><ul data-dcnode-id="2217"><li data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node=""> In one ending, Fuminori has his brain restored so the world no longer resembles a gore-splattered hellscape, people appear normal, and food tastes normal. Saya, however, disappears immediately afterwards, unwilling to show her true form to him. Fuminori is arrested for murder and placed in a mental hospital. Saya visits him once, conversing exclusively through text messages on a phone: she is leaving to search for her father so she can return from whence she came. Fuminori </span><a class="twikilink" data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWillWaitForYou" title="/pmwiki/pmwiki.php/Main/IWillWaitForYou"><span data-dcnode-id="2240" instrument_node="">vows to wait for her,</span></a><span data-dcnode-id="2238" instrument_node=""> but the two never meet again.</span></li><li data-dcnode-id="2223"><span data-dcnode-id="2236" instrument_node=""> In another ending, Fuminori embraces his new worldview and his newfound taste for </span><a class="twikilink" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImAHumanitarian" title="/pmwiki/pmwiki.php/Main/ImAHumanitarian"><span data-dcnode-id="2235" instrument_node="">human flesh</span></a><span data-dcnode-id="2233" instrument_node="">. He attempts to kill his friend Kouji. Kouji is rescued by Dr. Tanbo, though, and he learns of Saya's true nature as well as Fuminori's "condition". The two confront Fuminori and Saya. </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="2232" instrument_node="">Tanbo dies</span></a><span data-dcnode-id="2230" instrument_node="">, but manages to mortally wound Saya with </span><a class="twikilink" data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithIce" title="/pmwiki/pmwiki.php/Main/KillItWithIce"><span data-dcnode-id="2229" instrument_node="">liquid nitrogen</span></a><span data-dcnode-id="2227" instrument_node="">. Fuminori, unable to go on without Saya, is </span><a class="twikilink" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="2226" instrument_node="">Driven to Suicide</span></a><span data-dcnode-id="2224" instrument_node="">. Kouji is left traumatized and mentally broken by these events, purchasing a gun with a single bullet in case his paranoia becomes more than he can bear. On the other hand, the world is safe now that Saya is gone.</span></li><li data-dcnode-id="2218"><span data-dcnode-id="2222" instrument_node=""> The last ending is similar to the previous one, except that Fuminori succeeds in murdering Kouji. Saya enters the final stage of her life, where she releases spores into the atmosphere that will rewrite the human genome and convert all of humanity into a race of </span><a class="twikilink" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2221" instrument_node="">Eldritch Abominations</span></a><span data-dcnode-id="2219" instrument_node=""> like Saya. An epilogue from Ougai speculates on whether the newly transformed world to be will be beautiful to Fuminori.</span></li></ul></li><li data-dcnode-id="2207"><span data-dcnode-id="2215" instrument_node=""> </span><em data-dcnode-id="2212"><a class="twikilink" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DraKoi" title="/pmwiki/pmwiki.php/VisualNovel/DraKoi"><span data-dcnode-id="2214" instrument_node="">Dra+Koi</span></a></em><span data-dcnode-id="2211" instrument_node=""> has four endings: There's a good ending where you picked all the right options, a bad ending where you either failed to go on the date or made the wrong final choice but still complete the story, and then there are two bad endings that </span><a class="twikilink" data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoFinalBossForYou" title="/pmwiki/pmwiki.php/Main/NoFinalBossForYou"><span data-dcnode-id="2210" instrument_node="">skip the final fight</span></a><span data-dcnode-id="2208" instrument_node="">. Either you get killed or the dragon does, based on which of the fights you refused to step in and help out.</span></li><li data-dcnode-id="2189"><span data-dcnode-id="2206" instrument_node=""> </span><em data-dcnode-id="2203"><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SteinsGate" title="/pmwiki/pmwiki.php/VisualNovel/SteinsGate"><span data-dcnode-id="2205" instrument_node="">Steins;Gate</span></a></em><span data-dcnode-id="2202" instrument_node=""> has six endings. Three of them are bad endings that end the story early, while the last three are determined by </span><span class="spoiler" data-dcnode-id="2200" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2201" instrument_node=""> how many of Kurisu's messages you've properly responded to</span></span><span data-dcnode-id="2199" instrument_node="">. Those last three are a bad ending, the True Ending, and another bad ending that cuts off right before the True Ending.</span><ul data-dcnode-id="2190"><li data-dcnode-id="2191"><span data-dcnode-id="2198" instrument_node=""> The "sequel" </span><em data-dcnode-id="2195"><a class="twikilink" data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SteinsGateZero" title="/pmwiki/pmwiki.php/VisualNovel/SteinsGateZero"><span data-dcnode-id="2197" instrument_node="">Steins;Gate 0</span></a></em><span data-dcnode-id="2194" instrument_node=""> is a bit more complicated. Like the first game, there are three bad endings that end the story early, but the catch is </span><span class="spoiler" data-dcnode-id="2192" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2193" instrument_node="">the story diverges into two main routes depending on a choice early in the game. You have to get to the ending of one route, then either start a new game or reload a save from before the route split and then go down the other route in order to get the True Ending.</span></span></li></ul></li><li data-dcnode-id="2150"><span data-dcnode-id="2188" instrument_node=""> </span><em data-dcnode-id="2185"><a class="twikilink" data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DramaticalMurder" title="/pmwiki/pmwiki.php/VisualNovel/DramaticalMurder"><span data-dcnode-id="2187" instrument_node="">DRAMAtical Murder</span></a></em><span data-dcnode-id="2184" instrument_node=""> has over ten different endings: a good ending and at least one bad ending for each </span><a class="twikilink" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YaoiGenre" title="/pmwiki/pmwiki.php/Main/YaoiGenre"><span data-dcnode-id="2183" instrument_node="">boyfriend</span></a><span data-dcnode-id="2181" instrument_node="">, with a </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretCharacter" title="/pmwiki/pmwiki.php/Main/SecretCharacter"><span data-dcnode-id="2180" instrument_node="">Secret Character</span></a><span data-dcnode-id="2178" instrument_node=""> (two in the </span><a class="twikilink" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/PlayStationVita" title="/pmwiki/pmwiki.php/UsefulNotes/PlayStationVita"><span data-dcnode-id="2177" instrument_node="">PlayStation Vita</span></a><span data-dcnode-id="2175" instrument_node=""> release) becoming available after you finish all the other routes. Notable for the bad endings being </span><a class="twikilink" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFuel" title="/pmwiki/pmwiki.php/Main/NightmareFuel"><span data-dcnode-id="2174" instrument_node="">absolutely</span></a><span data-dcnode-id="2172" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FateWorseThanDeath" title="/pmwiki/pmwiki.php/Main/FateWorseThanDeath"><span data-dcnode-id="2171" instrument_node="">horrible</span></a><span data-dcnode-id="2169" instrument_node="">.</span><ul data-dcnode-id="2151"><li data-dcnode-id="2152"><span data-dcnode-id="2168" instrument_node=""> </span><em data-dcnode-id="2165"><a class="twikilink" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SweetPool" title="/pmwiki/pmwiki.php/VisualNovel/SweetPool"><span data-dcnode-id="2167" instrument_node="">sweet pool</span></a></em><span data-dcnode-id="2164" instrument_node="">, made by the same company, has six endings, depending on how much you gave into your "instinct" or "reason". Notable for </span><em data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">none</span></em><span data-dcnode-id="2161" instrument_node=""> of the endings being happy; the </span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">least</span></em><span data-dcnode-id="2158" instrument_node=""> depressing one has Youji </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="2157" instrument_node="">sacrifice himself</span></a><span data-dcnode-id="2155" instrument_node=""> to save Tetsuo, and </span><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidNotGetTheGirl" title="/pmwiki/pmwiki.php/Main/DidNotGetTheGirl"><span data-dcnode-id="2154" instrument_node="">even the "true end" is soul-crushingly sad.</span></a></li></ul></li></ul></div><ul data-dcnode-id="779"><li data-dcnode-id="2059"><span data-dcnode-id="2147" instrument_node=""> Technically, every case in </span><em data-dcnode-id="2144"><a class="twikilink" data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AceAttorney" title="/pmwiki/pmwiki.php/Franchise/AceAttorney"><span data-dcnode-id="2146" instrument_node="">Ace Attorney</span></a></em><span data-dcnode-id="2143" instrument_node=""> has multiple endings </span><a class="twikilink" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="2142" instrument_node="">should you fail to defend your client</span></a><span data-dcnode-id="2140" instrument_node="">. However, here are the standout examples:</span><ul data-dcnode-id="2060"><li data-dcnode-id="2128"><span data-dcnode-id="2139" instrument_node=""> </span><em data-dcnode-id="2136"><a class="twikilink" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneyJusticeForAll" title="/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneyJusticeForAll"><span data-dcnode-id="2138" instrument_node="">Phoenix Wright: Ace Attorney – Justice For All</span></a></em><span data-dcnode-id="2135" instrument_node=""> has two endings. In the good ending, </span><span class="spoiler" data-dcnode-id="2133" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2134" instrument_node="">Shelly de Killer breaks up his contract with Matt Engarde and releases Maya, and Engarde is sent to jail.</span></span><span data-dcnode-id="2132" instrument_node=""> In the bad ending, </span><span class="spoiler" data-dcnode-id="2130" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2131" instrument_node="">the guilty-as-hell defendant is sent away scot-free, an innocent woman is declared guilty of murder, and Phoenix quits being a lawyer. "The miracle never happen..."</span></span><span data-dcnode-id="2129" instrument_node=""> Only the good ending is considered canon.</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2122"><span class="ad-caption" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2123" id="proper-ad-tvtropes_mobile_ad_1"></div></div><li data-dcnode-id="2106"><span data-dcnode-id="2121" instrument_node=""> </span><em data-dcnode-id="2118"><a class="twikilink" data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ApolloJusticeAceAttorney" title="/pmwiki/pmwiki.php/VisualNovel/ApolloJusticeAceAttorney"><span data-dcnode-id="2120" instrument_node="">Apollo Justice: Ace Attorney</span></a></em><span data-dcnode-id="2117" instrument_node=""> also has two endings. </span><span class="spoiler" data-dcnode-id="2107" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2116" instrument_node="">Since the player is in control of Jurist No. 6, s/he decides the verdict of the final case. If "guilty" is chosen, the ending has </span><a class="urllink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D3Bo6dqi_uGY"><span data-dcnode-id="2115" instrument_node="">Vera, the defendant, dying from poisoning while the verdict is never reached</span><img data-dcnode-id="2114" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2112" instrument_node="">. Choosing "not guilty" will get </span><a class="urllink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D-YDzkGj5j2I"><span data-dcnode-id="2111" instrument_node="">the good ending, where Vera is freed while guilty-as-hell Kristoph Gavin laughs with insanity in response</span><img data-dcnode-id="2110" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2108" instrument_node="">.</span></span></li><li data-dcnode-id="2080"><span data-dcnode-id="2105" instrument_node=""> </span><em data-dcnode-id="2102"><a class="twikilink" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneyDualDestinies" title="/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneyDualDestinies"><span data-dcnode-id="2104" instrument_node="">Phoenix Wright: Ace Attorney – Dual Destinies</span></a></em><span data-dcnode-id="2101" instrument_node=""> has several bad endings; all but one are a variation of a </span><a class="twikilink" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="2100" instrument_node="">Non Standard Game Over</span></a><span data-dcnode-id="2098" instrument_node=""> that shows just how much the player screwed up. They range from </span><span class="spoiler" data-dcnode-id="2081" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2097" instrument_node="">Athena being charged with a murder she did NOT commit and sent to jail, to Athena vanishing with the kidnapper (Simon's sister Aura) and never being seen again, to Simon being executed because the player failed to prove that he was innocent </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">and</span></em><span data-dcnode-id="2094" instrument_node=""> that he was </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheHeat" title="/pmwiki/pmwiki.php/Main/TakingTheHeat"><span data-dcnode-id="2093" instrument_node="">Taking the Heat</span></a><span data-dcnode-id="2091" instrument_node=""> for Athena </span><span class="notelabel" data-dcnode-id="2088" onclick="togglenote('note0o74q');" style="cursor: pointer;"><sup data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2083" id="note0o74q" isnote="true" onclick="togglenote('note0o74q');" style="display: none; cursor: pointer;"><span data-dcnode-id="2087" instrument_node="">(plus Trucy, Aura and many others vanish forever, Athena leaves the office, Apollo loses his joy to live, </span><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">and</span></strong><span data-dcnode-id="2084" instrument_node=""> Phoenix leaves law work forever)</span></span><span data-dcnode-id="2082" instrument_node="">, to Athena and Simon getting both acquitted — while the real killer is never caught, and the Dark Age of Law becomes even worse...</span></span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2074"><span class="ad-caption" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2075" id="proper-ad-tvtropes_mobile_ad_2"></div></div><li data-dcnode-id="2061"><span data-dcnode-id="2073" instrument_node=""> </span><em data-dcnode-id="2070"><a class="twikilink" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneySpiritOfJustice" title="/pmwiki/pmwiki.php/VisualNovel/PhoenixWrightAceAttorneySpiritOfJustice"><span data-dcnode-id="2072" instrument_node="">Phoenix Wright: Ace Attorney – Spirit of Justice</span></a></em><span data-dcnode-id="2069" instrument_node=""> is similar to ''Dual Destinies, in that the bad ending you get depends on where your life gauge ran out. Endings include </span><span class="spoiler" data-dcnode-id="2067" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2068" instrument_node="">Paul Atishon seizing the Founder's Orb, resulting in Phoenix and Apollo's relationship becoming strained, the protagonists failing to find the truth behind Inga's murder, Amara being convicted for Inga's murder, or Apollo and Nahyuta being forced to flee the courtroom and join the revolution.</span></span><span data-dcnode-id="2066" instrument_node=""> </span><a class="urllink" data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DEF5IIwyzUVo"><span data-dcnode-id="2065" instrument_node="">See the endings here</span><img data-dcnode-id="2064" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2062" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1995"><span data-dcnode-id="2058" instrument_node=""> </span><em data-dcnode-id="2055"><a class="twikilink" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/AnalogueAHateStory" title="/pmwiki/pmwiki.php/VisualNovel/AnalogueAHateStory"><span data-dcnode-id="2057" instrument_node="">Analogue: A Hate Story</span></a></em><span data-dcnode-id="2054" instrument_node=""> features five main endings: two for *Hyun-ae (although they are merely variations of each other), one for *Mute, one for neither, and the </span><a class="twikilink" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2053" instrument_node="">"Harem Ending"</span></a><span data-dcnode-id="2051" instrument_node="">, which requires you to </span><span class="spoiler" data-dcnode-id="2049" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2050" instrument_node="">cheat the system by showing *Mute a log that can only be seen on *Hyun-ae's route</span></span><span data-dcnode-id="2048" instrument_node="">. There are also two </span><a class="twikilink" data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="2047" instrument_node="">Non Standard Game Over</span></a><span data-dcnode-id="2045" instrument_node=""> endings, one of which requires you to </span><a class="twikilink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouLoseAtZeroTrust" title="/pmwiki/pmwiki.php/Main/YouLoseAtZeroTrust"><span data-dcnode-id="2044" instrument_node="">piss off an AI so much that they cut you off from the system</span></a><span data-dcnode-id="2042" instrument_node="">, and one for </span><a class="twikilink" data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="2041" instrument_node="">attempting to download the logs during the meltdown segment.</span></a><ul data-dcnode-id="1996"><li data-dcnode-id="1997"><span data-dcnode-id="2039" instrument_node=""> Its sequel, </span><em data-dcnode-id="2036"><a class="twikilink" data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/HatePlus" title="/pmwiki/pmwiki.php/VisualNovel/HatePlus"><span data-dcnode-id="2038" instrument_node="">Hate Plus</span></a></em><span data-dcnode-id="2035" instrument_node="">, has four endings for *Hyun-ae, two for *Mute, and, once again, a </span><a class="twikilink" data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="2034" instrument_node="">"Harem Ending"</span></a><span class="notelabel" data-dcnode-id="2030" onclick="togglenote('note1tjju');" style="cursor: pointer;"><sup data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2023" id="note1tjju" isnote="true" onclick="togglenote('note1tjju');" style="display: none; cursor: pointer;"><span data-dcnode-id="2029" instrument_node="">Which is only accessible via </span><a class="twikilink" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="2028" instrument_node="">Old Save Bonus</span></a><span data-dcnode-id="2026" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="2025" instrument_node="">New Game+</span></a></span><span data-dcnode-id="2022" instrument_node="">. Unlike the previous game, there are </span><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="2021" instrument_node="">Bittersweet Endings</span></a><span data-dcnode-id="2019" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="2018" instrument_node="">Downer Endings</span></a><span data-dcnode-id="2016" instrument_node=""> mixed in. Also parodied with the </span><a class="twikilink" data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyVII"><span data-dcnode-id="2015" instrument_node="">"Level Four Revive Materia"</span></a><span data-dcnode-id="2013" instrument_node=""> achievement, which hints at an ending where </span><span class="spoiler" data-dcnode-id="2011" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2012" instrument_node="">*Mute ends the game without committing "suicide" outside of the Harem Ending</span></span><span data-dcnode-id="2010" instrument_node="">. No such ending exists, and there is no way to get the achievement</span><span class="notelabel" data-dcnode-id="2007" onclick="togglenote('note24j1q');" style="cursor: pointer;"><sup data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1999" id="note24j1q" isnote="true" onclick="togglenote('note24j1q');" style="display: none; cursor: pointer;"><span data-dcnode-id="2006" instrument_node="">The achievement's name refers to an </span><a class="twikilink" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UrbanLegendOfZelda" title="/pmwiki/pmwiki.php/Main/UrbanLegendOfZelda"><span data-dcnode-id="2005" instrument_node="">Urban Legend of Zelda</span></a><span data-dcnode-id="2003" instrument_node=""> that allows one to revive Aerith in </span><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Final Fantasy VII</span></em><span data-dcnode-id="2000" instrument_node=""> with the namesake item, which does not actually exist</span></span><span data-dcnode-id="1998" instrument_node="">.</span></li></ul></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1989"><span class="ad-caption" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1990" id="proper-ad-tvtropes_mobile_ad_3"></div></div><li data-dcnode-id="1983"><span data-dcnode-id="1988" instrument_node=""> </span><em data-dcnode-id="1985"><a class="twikilink" data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/AnOctaveHigher" title="/pmwiki/pmwiki.php/VisualNovel/AnOctaveHigher"><span data-dcnode-id="1987" instrument_node="">An Octave Higher</span></a></em><span data-dcnode-id="1984" instrument_node=""> has five endings. Three of them are fairly lighthearted but end the story prematurely. The other two are much darker in tone and advance the story toward its proper resolution, though only one of them is considered the true ending. There's also a sixth neutral ending which doesn't resolve much of anything, though it doesn't grant an achievement in the Steam version.</span></li><li data-dcnode-id="1977"><span data-dcnode-id="1982" instrument_node=""> </span><em data-dcnode-id="1979"><a class="twikilink" data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/AoiShiro" title="/pmwiki/pmwiki.php/VisualNovel/AoiShiro"><span data-dcnode-id="1981" instrument_node="">Aoi Shiro</span></a></em><span data-dcnode-id="1978" instrument_node=""> has several different types of ending. In addition to the numerous bad ends where the protagonist Syouko dies or becomes possessed by the &lt;&lt;Sword&gt;&gt;, each co-protagonist has two or three 'Normal Ends' where everyone survives, but wind up parting ways, and a 'Good Ending' where they stay together or are reunited, with the same pattern for the Grand Route involving all the main heroines together. There are also a handful of route independent 'Normal Ends' that cut the story short by leaving early.</span></li><li data-dcnode-id="1971"><span data-dcnode-id="1976" instrument_node=""> </span><em data-dcnode-id="1973"><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/AProfile" title="/pmwiki/pmwiki.php/VisualNovel/AProfile"><span data-dcnode-id="1975" instrument_node="">A Profile</span></a></em><span data-dcnode-id="1972" instrument_node=""> has five endings, two each for Miku and Rizu and one for Miou, the last heroine. None of these are bad endings, and as a whole, are all rather optimistic.</span></li><li data-dcnode-id="1902"><span data-dcnode-id="1970" instrument_node=""> </span><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Berrywitched</span></em><span data-dcnode-id="1967" instrument_node=""> has five possible endings depending on how the </span><a class="twikilink" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="1966" instrument_node="">Player Character</span></a><span data-dcnode-id="1964" instrument_node=""> treats Strawberry, among other options:</span><ul data-dcnode-id="1903"><li data-dcnode-id="1950"><span data-dcnode-id="1963" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueEnding" title="/pmwiki/pmwiki.php/Main/TrueEnding"><span data-dcnode-id="1962" instrument_node="">Good End</span></a><span data-dcnode-id="1960" instrument_node=""> (</span><span class="spoiler" data-dcnode-id="1958" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1959" instrument_node="">Be nice to Strawberry, don't eat Strawbunny, and read Strawberry's diary after she ties you up</span></span><span data-dcnode-id="1957" instrument_node="">): </span><span class="spoiler" data-dcnode-id="1952" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1956" instrument_node=""> Strawberry turns out to be </span><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotEvilJustMisunderstood" title="/pmwiki/pmwiki.php/Main/NotEvilJustMisunderstood"><span data-dcnode-id="1955" instrument_node="">Not Evil, Just Misunderstood</span></a><span data-dcnode-id="1953" instrument_node="">, and the protagonist stays with her in her bakery</span></span><span data-dcnode-id="1951" instrument_node="">.</span></li><li data-dcnode-id="1943"><span data-dcnode-id="1949" instrument_node=""> The Loop (</span><span class="spoiler" data-dcnode-id="1947" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1948" instrument_node="">Same as above, but escape with the garden shears instead of reading the diary</span></span><span data-dcnode-id="1946" instrument_node="">): </span><span class="spoiler" data-dcnode-id="1944" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1945" instrument_node=""> The protagonist flees from the bakery with Strawbunny while Strawberry pursues with a knife, only for the protagonist to trip and lose consciousness, hearing Strawberry's words from when she first found them in the forest.</span></span></li><li data-dcnode-id="1933"><span data-dcnode-id="1942" instrument_node=""> Wicked Witch (</span><span class="spoiler" data-dcnode-id="1940" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1941" instrument_node=""> Eat Strawbunny by either making the choice after being nice to Strawberry or by being mildly rude to her, which forces you to eat it</span></span><span data-dcnode-id="1939" instrument_node="">): </span><span class="spoiler" data-dcnode-id="1934" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1938" instrument_node="">Strawberry is horrified at your actions and runs into the kitchen, with the confused protagonist following after her. While trying to talk her down, their poor </span><a class="twikilink" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InnocentlyInsensitive" title="/pmwiki/pmwiki.php/Main/InnocentlyInsensitive"><span data-dcnode-id="1937" instrument_node="">Innocently Insensitive</span></a><span data-dcnode-id="1935" instrument_node=""> choice of words causes her to panic and shove the protagonist into the oven, burning them alive. The last thing they see is a crazed smile on her face.</span></span></li><li data-dcnode-id="1920"><span data-dcnode-id="1932" instrument_node=""> What a Glorious... Cake? / Breakdown (</span><span class="spoiler" data-dcnode-id="1930" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1931" instrument_node="">Be hostile towards Strawberry, follow her into the kitchen</span></span><span data-dcnode-id="1929" instrument_node="">): </span><span class="spoiler" data-dcnode-id="1921" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1928" instrument_node="">The protagonist spots a suicide note in Strawberry's hands, but gets spotted by the witch. Strawberry, who has </span><a class="twikilink" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoneMadFromTheIsolation" title="/pmwiki/pmwiki.php/Main/GoneMadFromTheIsolation"><span data-dcnode-id="1927" instrument_node="">Gone Mad From The Isolation</span></a><span data-dcnode-id="1925" instrument_node="">, kills the protagonist and bakes them into a cake, with her dialogue and suicide note stating </span><a class="twikilink" data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="1924" instrument_node="">she plans the same fate for herself</span></a><span data-dcnode-id="1922" instrument_node="">.</span></span></li><li data-dcnode-id="1904"><span data-dcnode-id="1919" instrument_node=""> What a Glorious Cake / </span><span class="spoiler" data-dcnode-id="1917" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1918" instrument_node="">Cannibal Cake</span></span><span data-dcnode-id="1916" instrument_node=""> (</span><span class="spoiler" data-dcnode-id="1914" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1915" instrument_node="">Be hostile towards Strawberry, do not follow her into the kitchen</span></span><span data-dcnode-id="1913" instrument_node="">): </span><span class="spoiler" data-dcnode-id="1905" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1912" instrument_node=""> The protagonist falls asleep while waiting for Strawberry, only to be woken up by the Strawbunnies giving them a large cake that turns out to be meat covered in strawberry frosting</span><span class="notelabel" data-dcnode-id="1909" onclick="togglenote('note3cmgb');" style="cursor: pointer;"><sup data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1907" id="note3cmgb" isnote="true" onclick="togglenote('note3cmgb');" style="display: none; cursor: pointer;"><span data-dcnode-id="1908" instrument_node="">Never outright stated, but heavily implied to be made from Strawberry's corpse</span></span><span data-dcnode-id="1906" instrument_node="">. The protagonist flees the bakery, and decides to "do what [they] were meant to do"</span></span></li></ul></li><li data-dcnode-id="1893"><span data-dcnode-id="1901" instrument_node=""> </span><em data-dcnode-id="1898"><a class="twikilink" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/TheBottomOfTheWell" title="/pmwiki/pmwiki.php/VisualNovel/TheBottomOfTheWell"><span data-dcnode-id="1900" instrument_node="">The Bottom of the Well</span></a></em><span data-dcnode-id="1897" instrument_node=""> has quite a few variations, although most of them are dying. Besides the numerous ways that Alice can die without getting to the evacuation site, there are three different things that can happen there — she can find that she's been exposed to too much radiation and die anyway, she can be safe and yet have the feeling that it isn't the "right" ending, or she can find out (</span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GainaxEnding" title="/pmwiki/pmwiki.php/Main/GainaxEnding"><span data-dcnode-id="1896" instrument_node="">sort of</span></a><span data-dcnode-id="1894" instrument_node="">) what's going on with the dream. The game encourages you to replay for different outcomes — in fact, you can only get a vital piece of information (a code for a keypad) for the "true" ending by having gone down certain death-causing routes in past playthroughs.</span></li><li data-dcnode-id="1887"><span data-dcnode-id="1892" instrument_node=""> There are seven heroines in </span><em data-dcnode-id="1889"><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Canvas2" title="/pmwiki/pmwiki.php/VisualNovel/Canvas2"><span data-dcnode-id="1891" instrument_node="">Canvas 2</span></a></em><span data-dcnode-id="1888" instrument_node="">, and each one has her own ending.</span></li><li data-dcnode-id="1861"><span data-dcnode-id="1886" instrument_node=""> The </span><em data-dcnode-id="1883"><a class="twikilink" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Clannad" title="/pmwiki/pmwiki.php/VisualNovel/Clannad"><span data-dcnode-id="1885" instrument_node="">CLANNAD</span></a></em><span data-dcnode-id="1882" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualNovel" title="/pmwiki/pmwiki.php/Main/VisualNovel"><span data-dcnode-id="1881" instrument_node="">Visual Novel</span></a><span data-dcnode-id="1879" instrument_node=""> twists the idea of </span><a class="twikilink" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="1878" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="1876" instrument_node=""> by making them </span><span class="spoiler" data-dcnode-id="1871" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1875" instrument_node="">PLOT POINTS. The majority of the ends reward you with Light Orbs, which allows you to unlock the </span><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">After Story</span></em><span data-dcnode-id="1872" instrument_node="">.</span></span><span data-dcnode-id="1870" instrument_node=""> Then, the game takes the cake and eats it </span><span class="spoiler" data-dcnode-id="1866" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1869" instrument_node="">by only enabling the True End </span><a class="twikilink" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHundredPercentCompletion" title="/pmwiki/pmwiki.php/Main/OneHundredPercentCompletion"><span data-dcnode-id="1868" instrument_node="">once you've obtained every single other Light Orb in the game</span></a></span><span data-dcnode-id="1865" instrument_node="">. Talk about </span><a class="twikilink" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="1864" instrument_node="">Earn Your Happy Ending</span></a><span data-dcnode-id="1862" instrument_node="">.</span></li><li data-dcnode-id="1855"><span data-dcnode-id="1860" instrument_node=""> In </span><em data-dcnode-id="1857"><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DaughterForDessert" title="/pmwiki/pmwiki.php/VisualNovel/DaughterForDessert"><span data-dcnode-id="1859" instrument_node="">Daughter for Dessert</span></a></em><span data-dcnode-id="1856" instrument_node="">, there are three endings for each of the main girls (Amanda, Kathy, Heidi, and Lily): a “good” ending where the protagonist joins his chosen girl in an ideal life, a “neutral” ending where he has an okay relationship which may be permanent depending on the girl, and a “bad” ending in which the relationship, well, ends badly. Additionally, there is a hard-to-find harem ending, as well as an ending with no girls.</span></li><li data-dcnode-id="1849"><span data-dcnode-id="1854" instrument_node=""> In </span><em data-dcnode-id="1851"><a class="twikilink" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DeathRoom" title="/pmwiki/pmwiki.php/VisualNovel/DeathRoom"><span data-dcnode-id="1853" instrument_node="">Death Room</span></a></em><span data-dcnode-id="1850" instrument_node="">, there are 6 endings, but with over 300 choices, you can bet there are variations for each depending on what you said or did before.</span></li><li data-dcnode-id="1799"><span data-dcnode-id="1848" instrument_node=""> </span><em data-dcnode-id="1845"><a class="twikilink" data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DokiDokiLiteratureClub" title="/pmwiki/pmwiki.php/VisualNovel/DokiDokiLiteratureClub"><span data-dcnode-id="1847" instrument_node="">Doki Doki Literature Club!</span></a></em><span data-dcnode-id="1844" instrument_node=""> has a few different endings, although as usual, it uses the trope in a really weird way.</span><ul data-dcnode-id="1800"><li data-dcnode-id="1831"><span data-dcnode-id="1843" instrument_node=""> Normal ending, which you get by just playing normally to the end, regardless of the exact choices you make: </span><span class="spoiler" data-dcnode-id="1832" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1842" instrument_node=""> A </span><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1841" instrument_node="">Downer Ending</span></a><span data-dcnode-id="1839" instrument_node=""> with a hint of </span><a class="createlink" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BitterwsweetEnding" title="/pmwiki/pmwiki.php/Main/BitterwsweetEnding"><span data-dcnode-id="1838" instrument_node="">bittersweet</span></a><span data-dcnode-id="1836" instrument_node=""> in which everybody sort of dies as the result of a </span><a class="twikilink" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MercyKill" title="/pmwiki/pmwiki.php/Main/MercyKill"><span data-dcnode-id="1835" instrument_node="">Mercy Kill</span></a><span data-dcnode-id="1833" instrument_node=""> and the game gets "deleted" so it can't be played again without a total reset.</span></span></li><li data-dcnode-id="1818"><span data-dcnode-id="1830" instrument_node=""> Subverted bad ending: </span><span class="spoiler" data-dcnode-id="1819" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1829" instrument_node=""> Midway through the plot, no matter what you do (although the game pretends it's because you made the wrong choice), something so bad happens that it sends the </span><a class="createlink" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharater" title="/pmwiki/pmwiki.php/Main/PlayerCharater"><span data-dcnode-id="1828" instrument_node="">Player Charater</span></a><span data-dcnode-id="1826" instrument_node=""> over the </span><a class="twikilink" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="1825" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="1823" instrument_node="">, ending the game, only then you have to restart it to continue the plot and now it's different; thus, a case of </span><a class="twikilink" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FissionMailed" title="/pmwiki/pmwiki.php/Main/FissionMailed"><span data-dcnode-id="1822" instrument_node="">Fission Mailed</span></a><span data-dcnode-id="1820" instrument_node="">.</span></span></li><li data-dcnode-id="1811"><span data-dcnode-id="1817" instrument_node=""> Special good ending: </span><span class="spoiler" data-dcnode-id="1812" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1816" instrument_node=""> If you save and load the game so that you see every cutscene with every girl (even though they can't all be seen in a single play-through otherwise), then most of them don't have to die and you get a </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1815" instrument_node="">Bittersweet Ending</span></a><span data-dcnode-id="1813" instrument_node=""> in which you merely have to say goodbye (and the game gets "deleted" anyway).</span></span></li><li data-dcnode-id="1801"><span data-dcnode-id="1810" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonstandardGameOver" title="/pmwiki/pmwiki.php/Main/NonstandardGameOver"><span data-dcnode-id="1809" instrument_node="">Non-Standard Game Over</span></a><span data-dcnode-id="1807" instrument_node=""> via </span><a class="twikilink" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevelopersForesight" title="/pmwiki/pmwiki.php/Main/DevelopersForesight"><span data-dcnode-id="1806" instrument_node="">Developers' Foresight</span></a><span data-dcnode-id="1804" instrument_node="">: If you delete a plot-critical character's file from the game's folder early on, it will be like she died or never existed, and the game immediately ends sadly. </span><span class="spoiler" data-dcnode-id="1802" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1803" instrument_node=""> And the game gets "deleted". Again.</span></span></li></ul></li><li data-dcnode-id="1781"><span data-dcnode-id="1798" instrument_node=""> </span><em data-dcnode-id="1795"><a class="twikilink" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FrozenEssence" title="/pmwiki/pmwiki.php/VisualNovel/FrozenEssence"><span data-dcnode-id="1797" instrument_node="">Frozen Essence</span></a></em><span data-dcnode-id="1794" instrument_node=""> has </span><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">six</span></em><span data-dcnode-id="1791" instrument_node=""> paths to choose from, and each of them have both a Light End and a Dark End. The Light Ends generally have Mina being happily together with her love interest or at least being alive and reasonably happy, while the Dark Ends generally have her dying, being resealed, or being trapped in a </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StockholmSyndrome" title="/pmwiki/pmwiki.php/Main/StockholmSyndrome"><span data-dcnode-id="1790" instrument_node="">very twisted relationship</span></a><span data-dcnode-id="1788" instrument_node=""> with her love interest. In addition, the Life path has </span><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">three</span></em><span data-dcnode-id="1785" instrument_node=""> more endings: two are more like </span><a class="twikilink" data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="1784" instrument_node="">Non Standard Game Overs</span></a><span data-dcnode-id="1782" instrument_node=""> than anything else, but the third one happens to be the game's True End.</span></li><li data-dcnode-id="1775"><span data-dcnode-id="1780" instrument_node=""> In the Chinese PC fan-made game </span><em data-dcnode-id="1777"><a class="twikilink" data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FullmetalAlchemistBluebirdsIllusion" title="/pmwiki/pmwiki.php/VisualNovel/FullmetalAlchemistBluebirdsIllusion"><span data-dcnode-id="1779" instrument_node="">Fullmetal Alchemist: Bluebird's Illusion</span></a></em><span data-dcnode-id="1776" instrument_node="">, there's a choice of 4 possible endings depending on what you've done during the game and where you've been, the most famous being Edward becoming the homunculus Pride.</span></li><li data-dcnode-id="1764"><span data-dcnode-id="1774" instrument_node=""> </span><em data-dcnode-id="1771"><a class="twikilink" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/HatofulBoyfriend" title="/pmwiki/pmwiki.php/VisualNovel/HatofulBoyfriend"><span data-dcnode-id="1773" instrument_node="">Hatoful Boyfriend</span></a></em><span data-dcnode-id="1770" instrument_node=""> has a couple of characters who have multiple endings. Three of these are bad vs good, while one is a bit different (and is only like that in the HD remake onwards). Sakuya, Okosan and Shuu all require you to max a particular stat (charisma, vitality and wisdom respectively) in order to see their full "good" end, while in Azami's ending you can either get the fake ending (which doesn't end the game) or her romance ending (which does). </span><span class="spoiler" data-dcnode-id="1765" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1769" instrument_node="">Getting a certain amount of endings lets you unlock the </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1768" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1766" instrument_node="">, Bad Boy's Love/Hurtful Boyfriend. Getting every character's ending, including both of the endings for the characters with two, lets you see the BBL epilogue.</span></span></li><li data-dcnode-id="1739"><span data-dcnode-id="1763" instrument_node=""> </span><em data-dcnode-id="1760"><a class="twikilink" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/HeartOfTheWoods" title="/pmwiki/pmwiki.php/VisualNovel/HeartOfTheWoods"><span data-dcnode-id="1762" instrument_node="">Heart of the Woods</span></a></em><span data-dcnode-id="1759" instrument_node=""> has three endings- two </span><a class="twikilink" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1758" instrument_node="">bad endings</span></a><span data-dcnode-id="1756" instrument_node=""> and one good ending.</span><ul data-dcnode-id="1740"><li data-dcnode-id="1752"><span data-dcnode-id="1755" instrument_node=""> "Sacrifice" has </span><span class="spoiler" data-dcnode-id="1753" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1754" instrument_node="">Morgan sacrifice herself to defeat Evelyn. Tara is devastated by her girlfriend's death, and goes home with Abigail and Madison, feeling jealous of the other two(and guilty about it), but hiding it. Madison feels guilty about Morgan's death, but Abigail reassures her that Tara doesn't blame her, and Madison makes an effort to bridge the gap between herself and Tara.</span></span></li><li data-dcnode-id="1745"><span data-dcnode-id="1751" instrument_node=""> "Freedom" has </span><span class="spoiler" data-dcnode-id="1746" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1750" instrument_node="">Geladura defeat Evelyn with the last of her power. Since Geladura, the fairy queen, is now dead, Madison is forced to replace her as fairy queen, and Abigail stays behind her, resulting in the two disappearing before Tara or Morgan can stay behind. Tara and Morgan leave Eysenfeld, and Tara ultimately quits </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Taranormal.</span></em><span data-dcnode-id="1747" instrument_node=""> Tara and Madison get married years later, leaving seats for Madison and Abigail at their wedding.</span></span></li><li data-dcnode-id="1741"><span data-dcnode-id="1744" instrument_node=""> The true ending has </span><span class="spoiler" data-dcnode-id="1742" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1743" instrument_node="">the protagonists work together to restore Geladura's power, enabling her to defeat Evelyn. The forest spirit sacrifices itself to become a tree that will restore the forest. All four of the main characters then leave Eysenfeld, and are later shown going to the beach together.</span></span></li></ul></li><li data-dcnode-id="1710"><span data-dcnode-id="1738" instrument_node=""> </span><em data-dcnode-id="1735"><a class="twikilink" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/HigurashiWhenTheyCry" title="/pmwiki/pmwiki.php/VisualNovel/HigurashiWhenTheyCry"><span data-dcnode-id="1737" instrument_node="">Higurashi: When They Cry</span></a></em><span data-dcnode-id="1734" instrument_node="">: The multiple chapters are connected, but each one has its own ending that neatly wraps up the storyline. Every chapter happens during the weeks leading up to the same disaster, and as it turns out, </span><span class="spoiler" data-dcnode-id="1714" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1733" instrument_node="">it's a pseudo-</span><a class="twikilink" data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroundhogDayLoop" title="/pmwiki/pmwiki.php/Main/GroundhogDayLoop"><span data-dcnode-id="1732" instrument_node="">"Groundhog Day" Loop</span></a><span data-dcnode-id="1730" instrument_node=""> involving alternate universes created by the local deity, who keeps pressing the </span><a class="twikilink" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ResetButton" title="/pmwiki/pmwiki.php/Main/ResetButton"><span data-dcnode-id="1729" instrument_node="">Reset Button</span></a><span data-dcnode-id="1727" instrument_node=""> hoping </span><a class="twikilink" data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RippleEffectProofMemory" title="/pmwiki/pmwiki.php/Main/RippleEffectProofMemory"><span data-dcnode-id="1726" instrument_node="">that the one character who remembers what happened</span></a><span data-dcnode-id="1724" instrument_node=""> can find a way to prevent the cataclysm that keeps killing everyone in the village. Most of the endings range from </span><a class="twikilink" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1723" instrument_node="">bittersweet</span></a><span data-dcnode-id="1721" instrument_node=""> to negative, but each season finale culminates in </span><a class="twikilink" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePowerOfFriendship" title="/pmwiki/pmwiki.php/Main/ThePowerOfFriendship"><span data-dcnode-id="1720" instrument_node="">The Power of Friendship</span></a><span data-dcnode-id="1718" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="1717" instrument_node="">unshakable determination</span></a><span data-dcnode-id="1715" instrument_node="">.</span></span><ul data-dcnode-id="1711"><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node=""> Later releases of it also included bad ends for some arcs as well (such as Meakashi-hen and Tsumihoroboshi-hen). And read "bad end" as "end that probably results in a lower body count of main characters than the true end but reveals less information about the core mystery than the true end." Because most arcs' true ends are in fact bad ends in this series.</span></li></ul></li><li data-dcnode-id="1702"><span data-dcnode-id="1709" instrument_node=""> </span><em data-dcnode-id="1706"><a class="twikilink" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/KaraNoShoujo" title="/pmwiki/pmwiki.php/VisualNovel/KaraNoShoujo"><span data-dcnode-id="1708" instrument_node="">Kara no Shoujo</span></a></em><span data-dcnode-id="1705" instrument_node=""> has no real good ending and a lot of downer endings. There are only two or three endings that can really qualify as bittersweet... </span><span class="spoiler" data-dcnode-id="1703" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1704" instrument_node="">and the true ending is not really one of them.</span></span></li><li data-dcnode-id="1631"><span data-dcnode-id="1701" instrument_node=""> </span><em data-dcnode-id="1698"><a class="twikilink" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/KatawaShoujo" title="/pmwiki/pmwiki.php/VisualNovel/KatawaShoujo"><span data-dcnode-id="1700" instrument_node="">Katawa Shoujo</span></a></em><span data-dcnode-id="1697" instrument_node="">:</span><ul data-dcnode-id="1632"><li data-dcnode-id="1678"><span data-dcnode-id="1696" instrument_node=""> </span><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Katawa Shoujo</span></em><span data-dcnode-id="1693" instrument_node=""> has a Good End and Bad End for each of the five girls, plus an extra neutral end for two of them </span><span class="spoiler" data-dcnode-id="1691" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1692" instrument_node="">(Rin and Hanako)</span></span><span data-dcnode-id="1690" instrument_node="">, and a Bad End you get at the end of Act 1 if you haven't managed to get one girl by the end. In this one, Hisao has a </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MemeticMutation" title="/pmwiki/pmwiki.php/Main/MemeticMutation"><span data-dcnode-id="1689" instrument_node="">manly picnic</span></a><span data-dcnode-id="1687" instrument_node=""> with Kenji, gets drunk, </span><a class="twikilink" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAWonderfulFailure" title="/pmwiki/pmwiki.php/Main/ItsAWonderfulFailure"><span data-dcnode-id="1686" instrument_node="">and falls off the roof and dies</span></a><span data-dcnode-id="1684" instrument_node="">. The other bad ends </span><span class="spoiler" data-dcnode-id="1679" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1683" instrument_node="">generally just involves the girl becoming angry/sad at Hisao and their relationship breaking apart... which, of course, makes them much more </span><a class="twikilink" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="1682" instrument_node="">heartbreaking</span></a><span data-dcnode-id="1680" instrument_node="">.</span></span></li><li data-dcnode-id="1665"><span data-dcnode-id="1677" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1675" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1676" instrument_node="">Lilly</span></span><span data-dcnode-id="1674" instrument_node="">'s bad ending is unique in that the game stops after a certain scene late in the route, </span><span class="spoiler" data-dcnode-id="1672" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1673" instrument_node="">when she says goodbye to Hisao and Hanako before leaving to live abroads with her parents in Scotland</span></span><span data-dcnode-id="1671" instrument_node="">, instead of showing a scene you would not see otherwise. If, however, the player has made all the right decisions, the story continues until it reaches the good ending </span><span class="spoiler" data-dcnode-id="1666" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1670" instrument_node="">where she decides otherwise after Hisao pulls a </span><a class="twikilink" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaceForYourLove" title="/pmwiki/pmwiki.php/Main/RaceForYourLove"><span data-dcnode-id="1669" instrument_node="">Race for Your Love</span></a><span data-dcnode-id="1667" instrument_node=""> and almost dies as a result.</span></span></li><li data-dcnode-id="1633"><span data-dcnode-id="1664" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatCouldHaveBeen" title="/pmwiki/pmwiki.php/Main/WhatCouldHaveBeen"><span data-dcnode-id="1663" instrument_node="">leaked beta</span></a><span data-dcnode-id="1661" instrument_node=""> is infamous for having endings where the characters die. In Shizune's endings the Bad End has </span><span class="spoiler" data-dcnode-id="1656" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1660" instrument_node="">Shizune </span><a class="twikilink" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathByDespair" title="/pmwiki/pmwiki.php/Main/DeathByDespair"><span data-dcnode-id="1659" instrument_node="">dying</span></a><span data-dcnode-id="1657" instrument_node=""> of dehydration not long after Misha's suicide.</span></span><span data-dcnode-id="1655" instrument_node=""> In the Good End </span><span class="spoiler" data-dcnode-id="1650" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1654" instrument_node="">Hisao inspires Shizune to move forward and live on. It ends with them talking about future baby names, particularly naming their kids </span><a class="twikilink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadGuyJunior" title="/pmwiki/pmwiki.php/Main/DeadGuyJunior"><span data-dcnode-id="1653" instrument_node="">after Misha</span></a><span data-dcnode-id="1651" instrument_node="">.</span></span><span data-dcnode-id="1649" instrument_node=""> All two of Hanako's Bad Ends involve </span><span class="spoiler" data-dcnode-id="1646" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHeroDies" title="/pmwiki/pmwiki.php/Main/TheHeroDies"><span data-dcnode-id="1648" instrument_node="">Hisao</span></a></span><span data-dcnode-id="1645" instrument_node=""> dying while the Neutral End has </span><span class="spoiler" data-dcnode-id="1643" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1644" instrument_node="">Hanako</span></span><span data-dcnode-id="1642" instrument_node=""> committing suicide. The Good End instead </span><span class="spoiler" data-dcnode-id="1635" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1641" instrument_node="">revolves around Hanako dealing with her </span><a class="twikilink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkAndTroubledPast" title="/pmwiki/pmwiki.php/Main/DarkAndTroubledPast"><span data-dcnode-id="1640" instrument_node="">Dark and Troubled Past</span></a><span data-dcnode-id="1638" instrument_node="">. It ends on a happy note with implications of </span><a class="twikilink" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BabiesEverAfter" title="/pmwiki/pmwiki.php/Main/BabiesEverAfter"><span data-dcnode-id="1637" instrument_node="">Babies Ever After</span></a></span><span data-dcnode-id="1634" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1616"><span data-dcnode-id="1630" instrument_node=""> </span><em data-dcnode-id="1627"><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/LittleBusters" title="/pmwiki/pmwiki.php/VisualNovel/LittleBusters"><span data-dcnode-id="1629" instrument_node="">Little Busters!</span></a></em><span data-dcnode-id="1626" instrument_node=""> also plays with the multiple endings. Completing certain endings can change the main route for future playthroughs: e.g., completing Rin's first miniroute has her noticeably more confident the next time around. So far, not too unusual... </span><span class="spoiler" data-dcnode-id="1624" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1625" instrument_node="">except for the fact that this is integral to the plot: the game takes place in a world created by Kyousuke, Masato, and Kengo after a bus crash caused the entire class bar Riki and Rin to be lethally injured, and for Kyousuke, the sole purpose of this world is to make them strong enough that they can handle the aftermath on their own. So he has them repeat the same semester of school over and over, starting again each time it becomes clear they still aren't strong enough, with the different timelines having ripple-like effects on future playthroughs. Only by meeting and befriending all of the girls is Riki able to gain the confidence he needs. Therefore, it's totally possible that every single route really did happen in that world and that Kyousuke just rewound time at the end because it wasn't quite enough.</span></span><span data-dcnode-id="1623" instrument_node=""> To </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">continue</span></em><span data-dcnode-id="1620" instrument_node=""> to talk about </span><a class="twikilink" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="1619" instrument_node="">Earn Your Happy Ending</span></a><span data-dcnode-id="1617" instrument_node="">...</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1615" instrument_node=""> </span><em data-dcnode-id="1612"><a class="twikilink" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/LuxPain" title="/pmwiki/pmwiki.php/VisualNovel/LuxPain"><span data-dcnode-id="1614" instrument_node="">Lux-Pain</span></a></em><span data-dcnode-id="1611" instrument_node="">:</span><ul data-dcnode-id="1577"><li data-dcnode-id="1594"><span data-dcnode-id="1610" instrument_node=""> The standard ending is finishing after two Original </span><a class="twikilink" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MindVirus" title="/pmwiki/pmwiki.php/Main/MindVirus"><span data-dcnode-id="1609" instrument_node="">SILENT</span></a><span data-dcnode-id="1607" instrument_node=""> have been encountered and the final boss is </span><span class="spoiler" data-dcnode-id="1605" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1606" instrument_node=""> Edward Steiner</span></span><span data-dcnode-id="1604" instrument_node="">. However, this ending leaves several threads untied. Fulfilling certain conditions (including removing Honoka's SILENT, which prevents Hibiki Kiryu </span><span class="spoiler" data-dcnode-id="1602" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1603" instrument_node=""> from dying</span></span><span data-dcnode-id="1601" instrument_node="">) unlocks another chapter after the 'normal' final boss with a </span><a class="twikilink" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueFinalBoss" title="/pmwiki/pmwiki.php/Main/TrueFinalBoss"><span data-dcnode-id="1600" instrument_node="">True Final Boss</span></a><span data-dcnode-id="1598" instrument_node=""> with the third and strongest Original. Beating </span><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">this</span></em><span data-dcnode-id="1595" instrument_node=""> earns you the Good Ending, with a more cohesive and happy (well, bittersweet) finish.</span></li><li data-dcnode-id="1578"><span data-dcnode-id="1593" instrument_node=""> There is also a Bad Ending: At one point, Yui Yamase (under the influence of SILENT) attempts to kill a major suspect in your investigation. If you don't stop her, on returning home your boss will call you to say that you let a very important lead die in front of you, and that if the investigation is exhausting you so much you should pull out and come back to headquarters. Unlike the game's </span><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="1592" instrument_node="">Non Standard Game Overs</span></a><span data-dcnode-id="1590" instrument_node="">, the credits actually roll and you are given the chance to start a clear save file, as if you had got </span><a class="twikilink" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewGamePlus" title="/pmwiki/pmwiki.php/Main/NewGamePlus"><span data-dcnode-id="1589" instrument_node="">New Game+</span></a><span data-dcnode-id="1587" instrument_node="">.</span><span class="notelabel" data-dcnode-id="1584" onclick="togglenote('note046w3');" style="cursor: pointer;"><sup data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">*&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1579" id="note046w3" isnote="true" onclick="togglenote('note046w3');" style="display: none; cursor: pointer;"><span data-dcnode-id="1583" instrument_node="">This may be to prevent </span><a class="twikilink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable" title="/pmwiki/pmwiki.php/Main/UnintentionallyUnwinnable"><span data-dcnode-id="1582" instrument_node="">Unintentionally Unwinnable</span></a><span data-dcnode-id="1580" instrument_node=""> - since you can save between the shooting and getting home, doing so and then simply returning to your last save point would render it impossible to get any further in the game.</span></span></li></ul></li><li data-dcnode-id="1485"><span data-dcnode-id="1575" instrument_node=""> Both halves of the </span><em data-dcnode-id="1572"><a class="twikilink" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/MuvLuv" title="/pmwiki/pmwiki.php/Franchise/MuvLuv"><span data-dcnode-id="1574" instrument_node="">Muv-Luv</span></a></em><span data-dcnode-id="1571" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1569" href="https://chatnoir-webcontent
