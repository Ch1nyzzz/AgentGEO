.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualNovel" title="/pmwiki/pmwiki.php/Main/VisualNovel"><span data-dcnode-id="1570" instrument_node="">Visual Novel</span></a><span data-dcnode-id="1568" instrument_node=""> (</span><em data-dcnode-id="1565"><a class="twikilink" data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MuvLuvExtra" title="/pmwiki/pmwiki.php/VisualNovel/MuvLuvExtra"><span data-dcnode-id="1567" instrument_node="">Extra</span></a></em><span data-dcnode-id="1564" instrument_node=""> and </span><em data-dcnode-id="1561"><a class="twikilink" data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MuvLuvUnlimited" title="/pmwiki/pmwiki.php/VisualNovel/MuvLuvUnlimited"><span data-dcnode-id="1563" instrument_node="">Unlimited</span></a></em><span data-dcnode-id="1560" instrument_node="">) have endings for each heroine. </span><span class="spoiler" data-dcnode-id="1486" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Unlimited</span></em><span data-dcnode-id="1557" instrument_node=""> happens in a continuity </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">very</span></em><span data-dcnode-id="1554" instrument_node=""> different from that of </span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Extra</span></em><span data-dcnode-id="1551" instrument_node="">. </span><em data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Alternative</span></em><span data-dcnode-id="1548" instrument_node=""> (the sequel game) reveals that, like </span><em data-dcnode-id="1545"><a class="twikilink" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Clannad" title="/pmwiki/pmwiki.php/VisualNovel/Clannad"><span data-dcnode-id="1547" instrument_node="">CLANNAD</span></a></em><span data-dcnode-id="1544" instrument_node=""> above, </span><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">each</span></em><span data-dcnode-id="1541" instrument_node=""> of the routes in both </span><em data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Extra</span></em><span data-dcnode-id="1538" instrument_node=""> </span><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">and</span></strong><span data-dcnode-id="1535" instrument_node=""> </span><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Unlimited</span></em><span data-dcnode-id="1532" instrument_node=""> really happened (in alternate universes), and that, similar to </span><em data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Higurashi</span></em><span data-dcnode-id="1529" instrument_node=""> below, the protagonist has (due to a complicated "quantum causality" phenomenon) lived through </span><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">all</span></strong><span data-dcnode-id="1526" instrument_node=""> of the route-universes in </span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Unlimited</span></em><span data-dcnode-id="1523" instrument_node="">, and has memories of those of both </span><em data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Extra</span></em><span data-dcnode-id="1520" instrument_node=""> and </span><em data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Unlimited</span></em><span data-dcnode-id="1517" instrument_node="">, though he is not able to recall everything except in brief flashes. Gamewise, this is implemented by </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Unlimited</span></em><span data-dcnode-id="1514" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="1513" instrument_node="">reading the savefile of</span></a><span data-dcnode-id="1511" instrument_node=""> </span><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Extra</span></em><span data-dcnode-id="1508" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="1507" instrument_node="">and displaying new content accordingly</span></a><span data-dcnode-id="1505" instrument_node="">, </span><strong data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">and</span></strong><span data-dcnode-id="1502" instrument_node=""> </span><em data-dcnode-id="1499"><a class="twikilink" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MuvLuvAlternative" title="/pmwiki/pmwiki.php/VisualNovel/MuvLuvAlternative"><span data-dcnode-id="1501" instrument_node="">Alternative</span></a></em><span data-dcnode-id="1498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="1497" instrument_node="">reading both</span></a><span data-dcnode-id="1495" instrument_node=""> </span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Extra</span></em><span data-dcnode-id="1492" instrument_node="">s and </span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Unlimited</span></em><span data-dcnode-id="1489" instrument_node="">'s </span><a class="twikilink" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSaveBonus" title="/pmwiki/pmwiki.php/Main/OldSaveBonus"><span data-dcnode-id="1488" instrument_node="">savefiles in turn to do the same thing.</span></a></span></li><li data-dcnode-id="1476"><span data-dcnode-id="1484" instrument_node=""> In </span><em data-dcnode-id="1481"><a class="twikilink" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MatchesAndMatrimony" title="/pmwiki/pmwiki.php/VideoGame/MatchesAndMatrimony"><span data-dcnode-id="1483" instrument_node="">Matches and Matrimony</span></a></em><span data-dcnode-id="1480" instrument_node="">, there are seven unlockable endings in which the player character gets married to one of </span><a class="twikilink" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JaneAusten" title="/pmwiki/pmwiki.php/Creator/JaneAusten"><span data-dcnode-id="1479" instrument_node="">Jane Austen</span></a><span data-dcnode-id="1477" instrument_node="">'s heroes (or villains) — and two in which she remains single.</span></li><li data-dcnode-id="1470"><span data-dcnode-id="1475" instrument_node=""> </span><em data-dcnode-id="1472"><a class="twikilink" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MysticMessenger" title="/pmwiki/pmwiki.php/VisualNovel/MysticMessenger"><span data-dcnode-id="1474" instrument_node="">Mystic Messenger</span></a></em><span data-dcnode-id="1471" instrument_node=""> has five character routes and multiple endings for each of them: about 3 Bad Ends for each character that typically occur if you made too many selfish/mean choices, a Bad Relationship End if you didn't participate in enough chats after getting on a character's route, a Normal End if you avoided the Bad Ends but didn't convince enough people to attend the party, and a Good End if you did everything right. There are also three early Bad Ends you can get if you refuse to follow Unknown's instructions or fail to get on any available character's route, as well as two Secret Ends you can unlock after completing every character's Good End.</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1469" instrument_node=""> Prevalent in the </span><a class="twikilink" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualNovel" title="/pmwiki/pmwiki.php/Main/VisualNovel"><span data-dcnode-id="1468" instrument_node="">main works</span></a><span data-dcnode-id="1466" instrument_node=""> of the </span><a class="twikilink" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Nasuverse" title="/pmwiki/pmwiki.php/Franchise/Nasuverse"><span data-dcnode-id="1465" instrument_node="">Nasuverse</span></a><span data-dcnode-id="1463" instrument_node="">; </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">all</span></em><span data-dcnode-id="1460" instrument_node=""> of them are </span><a class="twikilink" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Canon" title="/pmwiki/pmwiki.php/Main/Canon"><span data-dcnode-id="1459" instrument_node="">Canon</span></a><span data-dcnode-id="1457" instrument_node="">, considering the </span><a class="twikilink" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMultiverse" title="/pmwiki/pmwiki.php/Main/TheMultiverse"><span data-dcnode-id="1456" instrument_node="">nature of</span></a><span data-dcnode-id="1454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVerse" title="/pmwiki/pmwiki.php/Main/TheVerse"><span data-dcnode-id="1453" instrument_node="">The 'Verse</span></a><span data-dcnode-id="1451" instrument_node="">. Various scenarios in the game are generally heroine-focused and </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateContinuity" title="/pmwiki/pmwiki.php/Main/AlternateContinuity"><span data-dcnode-id="1450" instrument_node="">mutually exclusive</span></a><span data-dcnode-id="1448" instrument_node="">, and there are Good (happy), True (medium-happy to </span><a class="twikilink" data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="1447" instrument_node="">Tear Jerker</span></a><span data-dcnode-id="1445" instrument_node="">), and Normal (outright depressing) Ends, depending on whether characters act in-personality or not, and what decisions they choose. There are also Bad Ends in the dozens, premature endings to the plot which may or may not result in death. Each Bad End will be followed by a comical, </span><a class="twikilink" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoFourthWall" title="/pmwiki/pmwiki.php/Main/NoFourthWall"><span data-dcnode-id="1444" instrument_node="">No Fourth Wall</span></a><span data-dcnode-id="1442" instrument_node=""> sequence where advice is given (and stupid choices are admonished) by various characters, including villains. Oddly enough, Bad Ends have a tendency to expand considerably on the </span><a class="twikilink" data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Canon" title="/pmwiki/pmwiki.php/Main/Canon"><span data-dcnode-id="1441" instrument_node="">Canon</span></a><span data-dcnode-id="1439" instrument_node="">, to the point where the whole plot can only be figured out by seeing all of them.</span><ul data-dcnode-id="1397"><li data-dcnode-id="1433"><span data-dcnode-id="1438" instrument_node=""> </span><em data-dcnode-id="1435"><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Tsukihime" title="/pmwiki/pmwiki.php/VisualNovel/Tsukihime"><span data-dcnode-id="1437" instrument_node="">Tsukihime</span></a></em><span data-dcnode-id="1434" instrument_node=""> has five heroine-focused scenarios and 9 endings total: 5 True Ends, 3 Good Ends, and 1 Normal End. Bad Ends range from being completely disabled to the infamous "eaten by a shark on the ninth floor of a hotel", followed by a "Teach Me, Ciel-Sensei!" session. Completing all Endings unlocks the "Eclipse" Epilogue where the protagonist meets with an old friend/teacher...</span></li><li data-dcnode-id="1409"><span data-dcnode-id="1432" instrument_node=""> </span><em data-dcnode-id="1429"><a class="twikilink" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/FateStayNight" title="/pmwiki/pmwiki.php/VisualNovel/FateStayNight"><span data-dcnode-id="1431" instrument_node="">Fate/stay night</span></a></em><span data-dcnode-id="1428" instrument_node=""> has three different scenarios which branch out depending on several choices in the beginning of the story. The first route has a single True Ending, while the latter two have multiple endings that depend on your relationship with a specific character — one route (UBW) has a Good End and a True End (both rather optimistic), while the other (HF) has a True End (positive) and a Normal End (</span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="1427" instrument_node="">ungodly</span></a><span data-dcnode-id="1425" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1424" instrument_node="">depressing</span></a><span data-dcnode-id="1422" instrument_node="">). There are 40 numbered Bad Ends followed by a "Taiga Dojo" sequence that either gives advice to the player or admonishes you for getting a stupidly-obvious choice wrong. One dojo even criticizes the player for looking up the very specific steps needed to reach that dojo and purposely seeking it out. Each sequence gives a "stamp" which are collected to unlock extra bonus videos.</span><ul data-dcnode-id="1410"><li data-dcnode-id="1411"><span data-dcnode-id="1421" instrument_node=""> Oh, and also once you get every death stamp and every game ending, you unlock the continuation of the Fate Route ending, revealing it to be both a Good and True end (</span><span class="spoiler" data-dcnode-id="1413" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1420" instrument_node="">Shirou </span><a class="twikilink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TogetherInDeath" title="/pmwiki/pmwiki.php/Main/TogetherInDeath"><span data-dcnode-id="1419" instrument_node="">reunites with</span></a><span data-dcnode-id="1417" instrument_node=""> Saber in Avalon, letting them </span><a class="twikilink" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiedHappilyEverAfter" title="/pmwiki/pmwiki.php/Main/DiedHappilyEverAfter"><span data-dcnode-id="1416" instrument_node="">be together for eternity</span></a><span data-dcnode-id="1414" instrument_node=""> in what amounts to FSN's version of heaven.</span></span><span data-dcnode-id="1412" instrument_node="">) Certainly a step up for the first Fate ending.</span></li></ul></li><li data-dcnode-id="1398"><span data-dcnode-id="1408" instrument_node=""> This is, however, subverted in Kagetsu Tohya. Very often they lead you to a situation that looks </span><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">very</span></em><span data-dcnode-id="1405" instrument_node=""> much like it should be a Bad End, such as being eaten by a Jaguar in Arcueid's room (</span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="1404" instrument_node="">It Makes Sense in Context</span></a><span data-dcnode-id="1402" instrument_node="">... </span><a class="twikilink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesJustAsMuchSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesJustAsMuchSenseInContext"><span data-dcnode-id="1401" instrument_node="">wait, no it doesn't</span></a><span data-dcnode-id="1399" instrument_node="">) or having your head pulled off. Yet these are actually all necessary parts of the continuing storyline. If you want to defeat your nightmare, Nanaya, you have to let him kill you a whole bunch. The next day simply starts like any other.</span></li></ul></li><li data-dcnode-id="1389"><span data-dcnode-id="1395" instrument_node=""> </span><em data-dcnode-id="1391"><a class="urllink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ooctaff.tumblr.com/post/96885519271/welcome-to-illusionary-trauma-trigger-warning"><span data-dcnode-id="1394" instrument_node="">Illusionary Trauma</span><img data-dcnode-id="1393" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1390" instrument_node=""> has eight endings, with two for each character. Though finding the second ending is more difficult than the first.</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1388" instrument_node=""> </span><em data-dcnode-id="1385"><a class="twikilink" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ILoveYouColonelSanders" title="/pmwiki/pmwiki.php/VisualNovel/ILoveYouColonelSanders"><span data-dcnode-id="1387" instrument_node="">I Love You, Colonel Sanders!</span></a></em><span data-dcnode-id="1384" instrument_node="">: There are four outcomes, based on whether you win Sanders' respect as a fellow chef and/or as a love interest. There are also multiple (sometimes bizarre) ways to get a </span><a class="twikilink" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameOver" title="/pmwiki/pmwiki.php/Main/GameOver"><span data-dcnode-id="1383" instrument_node="">Game Over</span></a><span data-dcnode-id="1381" instrument_node="">.</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1379" instrument_node=""> There are a total of six good endings to </span><em data-dcnode-id="1376"><a class="twikilink" data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Melody" title="/pmwiki/pmwiki.php/VisualNovel/Melody"><span data-dcnode-id="1378" instrument_node="">Melody</span></a></em><span data-dcnode-id="1375" instrument_node="">: </span><span class="spoiler" data-dcnode-id="1373" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1374" instrument_node="">three with the title character (the Perfect Ending, which shows the protagonist and Melody rich, famous, and married, the Good Ending, where they do alright for themselves but don’t make it big, and the Family Ending, which is just like the Good Ending, except that they have a baby), the High School Sweetheart Ending with Isabella, the Girl Next Door Ending with Becca, and the Cool Aunt Ending with Amy.</span></span><span data-dcnode-id="1372" instrument_node=""> Additionally, there are four bad endings throughout the story, in which the protagonist screws up big in some aspect of one or more of his relationships.</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1370" instrument_node=""> </span><em data-dcnode-id="1367"><a class="twikilink" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/NineHoursNinePersonsNineDoors" title="/pmwiki/pmwiki.php/VisualNovel/NineHoursNinePersonsNineDoors"><span data-dcnode-id="1369" instrument_node="">Nine Hours, Nine Persons, Nine Doors</span></a></em><span data-dcnode-id="1366" instrument_node=""> features 5 endings (technically 6, but one of them is just a </span><a class="twikilink" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="1365" instrument_node="">Non Standard Game Over</span></a><span data-dcnode-id="1363" instrument_node=""> if you try to get the </span><a class="twikilink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1362" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1360" instrument_node=""> too early), with an extra bad ending in the mobile port. Most of them are of the "Bad End" variety, featuring the player's untimely death. The "Safe" ending isn't really "good," but it explains certain plot points and is necessary for completion to get the True Ending. </span><span class="spoiler" data-dcnode-id="1352" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1359" instrument_node="">They're </span><em data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">all</span></em><span data-dcnode-id="1356" instrument_node=""> canon, as the game is being controlled by a little girl with the ability to </span><em data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">see through time,</span></em><span data-dcnode-id="1353" instrument_node=""> and it was exploring multiple possibilities in order to determine the best route to ensure her survival nine years in the past.</span></span><ul data-dcnode-id="1331"><li data-dcnode-id="1342"><span data-dcnode-id="1351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/VirtuesLastReward" title="/pmwiki/pmwiki.php/VisualNovel/VirtuesLastReward"><span data-dcnode-id="1350" instrument_node="">The sequel</span></a><span data-dcnode-id="1348" instrument_node=""> has a whopping </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">24 endings</span></em><span data-dcnode-id="1345" instrument_node="">. In order to facilitate easily exploring them, it uses a branching game pathway that allows you to go back to points where you make storyline-altering decisions and re-do them. </span><span class="spoiler" data-dcnode-id="1343" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1344" instrument_node="">As in the first game, they're all canon, and the 'scene select' feature is an ability of the protagonist rather than a convenience for the player.</span></span></li><li data-dcnode-id="1332"><span data-dcnode-id="1341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ZeroTimeDilemma" title="/pmwiki/pmwiki.php/VisualNovel/ZeroTimeDilemma"><span data-dcnode-id="1340" instrument_node="">The third installment in the series</span></a><span data-dcnode-id="1338" instrument_node=""> has over </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">30</span></em><span data-dcnode-id="1335" instrument_node=""> endings, with 7 "main" endings, 2 secret endings, and many more game overs. </span><span class="spoiler" data-dcnode-id="1333" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1334" instrument_node="">Once again, all of the main endings are canon, and this time even some of the game overs are canon too!</span></span></li></ul></li><li data-dcnode-id="1222"><span data-dcnode-id="1329" instrument_node=""> </span><em data-dcnode-id="1326"><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/NoThankYou" title="/pmwiki/pmwiki.php/VisualNovel/NoThankYou"><span data-dcnode-id="1328" instrument_node="">No, Thank You!!!</span></a></em><span data-dcnode-id="1325" instrument_node=""> has thirteen endings, plus many more untimely ends. </span><span class="spoiler" data-dcnode-id="1318" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1324" instrument_node="">All of the routes</span></a><span data-dcnode-id="1322" instrument_node=""> end with either Haru dying, his love interest dying, or Haru just leaving them with little chance of ever returning. Though some of them can be considered </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1321" instrument_node="">bittersweet</span></a><span data-dcnode-id="1319" instrument_node=""> at best.</span></span><ul data-dcnode-id="1223"><li data-dcnode-id="1311"><span data-dcnode-id="1317" instrument_node=""> </span><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Ryu's Bad Ending 1:</span></strong><span data-dcnode-id="1314" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1312" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1313" instrument_node="">Haru tells Ryu about his younger sister’s death, and Haru dies from bleeding.</span></span></li><li data-dcnode-id="1304"><span data-dcnode-id="1310" instrument_node=""> </span><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Ryu's Bad Ending 2:</span></strong><span data-dcnode-id="1307" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1305" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1306" instrument_node="">Ryu knows about his younger sister’s situation, breaks down, and tells Haru to kill him. Haru does.</span></span></li><li data-dcnode-id="1297"><span data-dcnode-id="1303" instrument_node=""> </span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Ryu's Good Ending:</span></strong><span data-dcnode-id="1300" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1298" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1299" instrument_node="">Ryu asks Haru to liberate his younger sister, and to take care of Yufumi.</span></span></li><li data-dcnode-id="1290"><span data-dcnode-id="1296" instrument_node=""> </span><strong data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Hiroyuki's Bad Ending 1:</span></strong><span data-dcnode-id="1293" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1291" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1292" instrument_node="">Haru is unable save Yamato, Haru kills Shindo, and Haru dies from blood loss.</span></span></li><li data-dcnode-id="1283"><span data-dcnode-id="1289" instrument_node=""> </span><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Hiroyuki's Bad Ending 2:</span></strong><span data-dcnode-id="1286" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1284" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1285" instrument_node="">Haru kills Hiroyuki.</span></span></li><li data-dcnode-id="1276"><span data-dcnode-id="1282" instrument_node=""> </span><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Hiroyuki's Good Ending:</span></strong><span data-dcnode-id="1279" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1277" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1278" instrument_node="">Haru leaves Hiroyuki, says that he will come again.</span></span></li><li data-dcnode-id="1269"><span data-dcnode-id="1275" instrument_node=""> </span><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Maki's Bad Ending 1:</span></strong><span data-dcnode-id="1272" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1270" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1271" instrument_node="">Haru has a fight with Maki, and Haru lets Maki kill him.</span></span></li><li data-dcnode-id="1262"><span data-dcnode-id="1268" instrument_node=""> </span><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Maki's Bad Ending 2:</span></strong><span data-dcnode-id="1265" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1263" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1264" instrument_node="">Haru has a fight with Maki, and Haru shoots Maki.</span></span></li><li data-dcnode-id="1255"><span data-dcnode-id="1261" instrument_node=""> </span><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Maki's Good Ending:</span></strong><span data-dcnode-id="1258" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1256" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1257" instrument_node="">Harua has a fight with Maki, and then takes the laptop.</span></span></li><li data-dcnode-id="1248"><span data-dcnode-id="1254" instrument_node=""> </span><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Kouichi's Bad Ending:</span></strong><span data-dcnode-id="1251" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1249" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1250" instrument_node="">Haru kills Kouichi with the drug.</span></span></li><li data-dcnode-id="1238"><span data-dcnode-id="1247" instrument_node=""> </span><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Kouichi's Good Ending:</span></strong><span data-dcnode-id="1244" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1239" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1243" instrument_node="">Haru drugs Kouichi—but just to let him sleep, saying that "</span><a class="twikilink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeWillMeetAgain" title="/pmwiki/pmwiki.php/Main/WeWillMeetAgain"><span data-dcnode-id="1242" instrument_node="">We Will Meet Again</span></a><span data-dcnode-id="1240" instrument_node="">".</span></span></li><li data-dcnode-id="1231"><span data-dcnode-id="1237" instrument_node=""> </span><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Other Ending 1:</span></strong><span data-dcnode-id="1234" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1232" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1233" instrument_node="">Hiroyuki dies, Haru’s true identity is exposed, and he runs away.</span></span></li><li data-dcnode-id="1224"><span data-dcnode-id="1230" instrument_node=""> </span><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Other Ending 2:</span></strong><span data-dcnode-id="1227" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1225" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1226" instrument_node="">The Manufacturing Place is found, and Haru runs away.</span></span></li></ul></li><li data-dcnode-id="1207"><span data-dcnode-id="1221" instrument_node=""> </span><em data-dcnode-id="1218"><a class="twikilink" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/PlumbersDontWearTies" title="/pmwiki/pmwiki.php/VisualNovel/PlumbersDontWearTies"><span data-dcnode-id="1220" instrument_node="">Plumbers Don't Wear Ties</span></a></em><span data-dcnode-id="1217" instrument_node=""> had this. Besides the Hollywood ending, there are other endings. </span><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebVideo/TheAngryVideoGameNerd" title="/pmwiki/pmwiki.php/WebVideo/TheAngryVideoGameNerd"><span data-dcnode-id="1216" instrument_node="">The Angry Video Game Nerd</span></a><span data-dcnode-id="1214" instrument_node="">, aka </span><a class="twikilink" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JamesRolfe" title="/pmwiki/pmwiki.php/Creator/JamesRolfe"><span data-dcnode-id="1213" instrument_node="">James Rolfe</span></a><span data-dcnode-id="1211" instrument_node="">, got to the final choice screen in the game, but he ended up picking, "Gimme something different," and James Rolfe demands for another game and throws it. Taco Man, on the other hand, does not choose the chase scene, and instead picks a option that led to an ending that was never </span><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">EVER</span></strong><span data-dcnode-id="1208" instrument_node=""> selected in the Angry Video Game Nerd's review.</span></li><li data-dcnode-id="1198"><span data-dcnode-id="1206" instrument_node=""> </span><em data-dcnode-id="1203"><a class="twikilink" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ThePortopiaSerialMurderCase" title="/pmwiki/pmwiki.php/VisualNovel/ThePortopiaSerialMurderCase"><span data-dcnode-id="1205" instrument_node="">The Portopia Serial Murder Case</span></a></em><span data-dcnode-id="1202" instrument_node=""> (1983) is an </span><a class="twikilink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UrExample" title="/pmwiki/pmwiki.php/Main/UrExample"><span data-dcnode-id="1201" instrument_node="">Ur-Example</span></a><span data-dcnode-id="1199" instrument_node=""> of multiple endings.</span></li><li data-dcnode-id="1192"><span data-dcnode-id="1197" instrument_node=""> In </span><em data-dcnode-id="1194"><a class="twikilink" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ReflectionsOnTheRiver" title="/pmwiki/pmwiki.php/VisualNovel/ReflectionsOnTheRiver"><span data-dcnode-id="1196" instrument_node="">Reflections on the River</span></a></em><span data-dcnode-id="1193" instrument_node="">, there are seven different endings, of varying levels of positivity. Three are fairly definitely bad, while the others are more ambiguous, and may vary in perceived happiness depending on how much players actually know about the plot (which isn't fully revealed by any one single route, so you may have to play through several times to even know what's a happy ending or not).</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1191" instrument_node=""> In </span><em data-dcnode-id="1187"><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/RisingAngels" title="/pmwiki/pmwiki.php/VisualNovel/RisingAngels"><span data-dcnode-id="1190" instrument_node="">Rising Angels</span></a><span data-dcnode-id="1188" instrument_node=""> Rising Angels: Reborn</span></em><span data-dcnode-id="1186" instrument_node="">, choices add up, with the results not necessarily being obvious until the end. Some of them are distinctly better than others, and there's a "true ending" (not precisely a </span><a class="twikilink" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1185" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1183" instrument_node="">, but optimistic) which the sequel will follow on from.</span></li><li data-dcnode-id="1158"><span data-dcnode-id="1181" instrument_node=""> </span><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Sacred Sand</span></em><span data-dcnode-id="1178" instrument_node=""> has </span><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">twenty-one</span></em><span data-dcnode-id="1175" instrument_node=""> endings in total, and while </span><a class="twikilink" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChildhoodFriendRomance" title="/pmwiki/pmwiki.php/Main/ChildhoodFriendRomance"><span data-dcnode-id="1174" instrument_node="">Aydin</span></a><span data-dcnode-id="1172" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandsomeLech" title="/pmwiki/pmwiki.php/Main/HandsomeLech"><span data-dcnode-id="1171" instrument_node="">Rhael</span></a><span data-dcnode-id="1169" instrument_node=""> have the majority of these endings, you can get an ending with </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">anyone</span></em><span data-dcnode-id="1166" instrument_node=""> who has a character sprite in this game. This includes the man who has a wife of his own, Rhael's brother who's in a coma for most of the game, the </span><a class="twikilink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiVillain" title="/pmwiki/pmwiki.php/Main/AntiVillain"><span data-dcnode-id="1165" instrument_node="">sort-of-villainous</span></a><span data-dcnode-id="1163" instrument_node=""> general, the only girl in the entire BL game world, and even Rhael's </span><em data-dcnode-id="1160"><a class="twikilink" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolOldGuy" title="/pmwiki/pmwiki.php/Main/CoolOldGuy"><span data-dcnode-id="1162" instrument_node="">father</span></a></em><span data-dcnode-id="1159" instrument_node="">.</span></li><li data-dcnode-id="1124"><span data-dcnode-id="1157" instrument_node=""> </span><em data-dcnode-id="1154"><a class="twikilink" data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SchoolDays" title="/pmwiki/pmwiki.php/VisualNovel/SchoolDays"><span data-dcnode-id="1156" instrument_node="">School Days</span></a></em><span data-dcnode-id="1153" instrument_node=""> is known for its more unique multiple endings compared to other visual novels. But when that's said, no one cares about the happy endings, this game is </span><a class="twikilink" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MemeticMutation" title="/pmwiki/pmwiki.php/Main/MemeticMutation"><span data-dcnode-id="1152" instrument_node="">infamous &amp; notorious</span></a><span data-dcnode-id="1150" instrument_node=""> for its </span><a class="twikilink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="1149" instrument_node="">bad endings</span></a><span data-dcnode-id="1147" instrument_node=""> in which someone will always get grotesquely killed some way or another, including (from the base HQ version of the game alone):</span><ul data-dcnode-id="1125"><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> Kotonoha slashing Sekai's neck with a hacksaw.</span></li><li data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node=""> Sekai stabbing Makoto in the gut, leaving him to slowly and painfully bleed out.</span></li><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node=""> Kotonoha committing suicide in front of Makoto and Sekai, destroying their relationship.</span></li><li data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node=""> Sekai shoving Kotonoha in front of a train.</span></li><li data-dcnode-id="1126"><span data-dcnode-id="1138" instrument_node=""> The ending picked for the anime is worse than any of the bad endings, and comes directly as a result of Makoto acting like a </span><a class="twikilink" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1137" instrument_node="">Jerkass</span></a><span data-dcnode-id="1135" instrument_node=""> to pretty much everyone he was romantically involved with. How bad is it? </span><span class="spoiler" data-dcnode-id="1127" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1134" instrument_node="">Makoto tries to commit himself to Kotonoha when he realises how badly he treated her and almost everyone has deserted him. The only problem is that to do so, he dumps Sekai (who by that point might or might not be pregnant with his child) in a really dickish way. Sekai loses it and bloodily stabs Makoto to death. Kotonoha finds his corpse, </span><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">beheads it</span></em><span data-dcnode-id="1131" instrument_node="">, places the head inside a bag, and confronts Sekai. Then, Kotonoha stabs Sekai to death </span><em data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">and cuts her body open</span></em><span data-dcnode-id="1128" instrument_node="">, then escapes into the Katsura family's yatch with Makoto's head.</span></span></li></ul></li><li data-dcnode-id="1087"><span data-dcnode-id="1123" instrument_node=""> The </span><em data-dcnode-id="1120"><a class="twikilink" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ShallWeDate" title="/pmwiki/pmwiki.php/VisualNovel/ShallWeDate"><span data-dcnode-id="1122" instrument_node="">Shall We Date?</span></a></em><span data-dcnode-id="1119" instrument_node=""> series loves using this trope. The number of endings and the types will vary with each novel. There will always be a default Bad/Normal Ending if the player refuses to meet the criteria for one of the better or best endings.</span><ul data-dcnode-id="1088"><li data-dcnode-id="1110"><span data-dcnode-id="1118" instrument_node=""> </span><em data-dcnode-id="1115"><a class="twikilink" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ShallWeDateBloodInRoses" title="/pmwiki/pmwiki.php/VisualNovel/ShallWeDateBloodInRoses"><span data-dcnode-id="1117" instrument_node="">Shall We Date?: Blood In Roses</span></a></em><span data-dcnode-id="1114" instrument_node=""> features </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">two</span></em><span data-dcnode-id="1111" instrument_node=""> good endings, which the player can choose. (Toccata or Serenade Ending). If there aren't enough points for either ending, the player will get the standard ending.</span></li><li data-dcnode-id="1104"><span data-dcnode-id="1109" instrument_node=""> </span><em data-dcnode-id="1106"><a class="twikilink" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ShallWeDateOz" title="/pmwiki/pmwiki.php/VisualNovel/ShallWeDateOz"><span data-dcnode-id="1108" instrument_node="">Shall We Date?: Oz</span></a></em><span data-dcnode-id="1105" instrument_node=""> has three Endings, two bad ones and one good end.</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1103" instrument_node=""> </span><em data-dcnode-id="1100"><a class="twikilink" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ShallWeDateNinjaShadow" title="/pmwiki/pmwiki.php/VisualNovel/ShallWeDateNinjaShadow"><span data-dcnode-id="1102" instrument_node="">Shall We Date?: Ninja Shadow</span></a></em><span data-dcnode-id="1099" instrument_node=""> has no real bad endings but a "Normal" one (which tends to be fairly happy, </span><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">at most</span></em><span data-dcnode-id="1096" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="1095" instrument_node="">it's a little bittersweet</span></a><span data-dcnode-id="1093" instrument_node="">) and a "Sweet" Ending (seen as </span><a class="twikilink" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="1092" instrument_node="">sweeter and more romantic</span></a><span data-dcnode-id="1090" instrument_node="">) for each route. Ironically, some of the Normal Endings are seen as more in-character and realistic than the Sweet ones.</span></li></ul></li><li data-dcnode-id="1081"><span data-dcnode-id="1086" instrument_node=""> </span><em data-dcnode-id="1083"><a class="twikilink" data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/ShiningSongStarnova" title="/pmwiki/pmwiki.php/VisualNovel/ShiningSongStarnova"><span data-dcnode-id="1085" instrument_node="">Shining Song Starnova</span></a></em><span data-dcnode-id="1082" instrument_node=""> has seven routes, each of which has one Good Ending and one or more bad endings. Sasami's Good Ending doubles as the True Ending, as her route cannot be played until the other six routes have been completed.</span></li><li data-dcnode-id="1069"><span data-dcnode-id="1080" instrument_node=""> </span><em data-dcnode-id="1077"><a class="twikilink" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SongsAndFlowers" title="/pmwiki/pmwiki.php/VisualNovel/SongsAndFlowers"><span data-dcnode-id="1079" instrument_node="">Songs and Flowers</span></a></em><span data-dcnode-id="1076" instrument_node=""> has four different endings, two for each of the game's love interests. The differences are whether the protagonist either has a </span><a class="twikilink" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RelationshipUpgrade" title="/pmwiki/pmwiki.php/Main/RelationshipUpgrade"><span data-dcnode-id="1075" instrument_node="">Relationship Upgrade</span></a><span data-dcnode-id="1073" instrument_node=""> with them or the two remain </span><a class="twikilink" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlatonicLifePartners" title="/pmwiki/pmwiki.php/Main/PlatonicLifePartners"><span data-dcnode-id="1072" instrument_node="">Platonic Life-Partners</span></a><span data-dcnode-id="1070" instrument_node="">. Neither is treated as a good or bad end, as the game is more about helping them overcome their personal issues rather than outright dating them.</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1068" instrument_node=""> </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Spirit Hunter</span></em><span data-dcnode-id="1065" instrument_node=""> series:</span><ul data-dcnode-id="1045"><li data-dcnode-id="1057"><span data-dcnode-id="1064" instrument_node=""> Each chapter of </span><em data-dcnode-id="1061"><a class="twikilink" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DeathMark" title="/pmwiki/pmwiki.php/VisualNovel/DeathMark"><span data-dcnode-id="1063" instrument_node="">Death Mark</span></a></em><span data-dcnode-id="1060" instrument_node=""> has alternative endings depending on who you partner with and what item you use to either appease or defeat the spirit. Generally, appeasement results in a "good" ending. </span><a class="twikilink" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolusExMachina" title="/pmwiki/pmwiki.php/Main/DiabolusExMachina"><span data-dcnode-id="1059" instrument_node="">Defeat, on the other hand...</span></a></li><li data-dcnode-id="1046"><span data-dcnode-id="1056" instrument_node=""> </span><em data-dcnode-id="1053"><a class="twikilink" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SpiritHunterNG" title="/pmwiki/pmwiki.php/VisualNovel/SpiritHunterNG"><span data-dcnode-id="1055" instrument_node="">Spirit Hunter: NG</span></a></em><span data-dcnode-id="1052" instrument_node="">:</span><ul data-dcnode-id="1047"><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node=""> Like its predecessor, the game has alternative endings for each chapter that are dependant on how the player deals with the chapter's spirit. If they 'appease' the spirit, then they get the standard good end to the chapter; destroy the spirit instead, and the companion they took along will get murdered by the last remnants of the spirit.</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node=""> The final ending of the game depends on various factors; how many companions are alive, if any of them are alive at all, and whether Akira saved Seiji or Kaoru in the Kubitarou case.</span></li></ul></li></ul></li><li data-dcnode-id="1035"><span data-dcnode-id="1043" instrument_node=""> </span><em data-dcnode-id="1040"><a class="twikilink" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/StarstruckLove" title="/pmwiki/pmwiki.php/VisualNovel/StarstruckLove"><span data-dcnode-id="1042" instrument_node="">Starstruck Love</span></a></em><span data-dcnode-id="1039" instrument_node=""> has three endings available for each guy. Oh, and it's worth mentioning that the guys are </span><a class="twikilink" data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Yandere" title="/pmwiki/pmwiki.php/Main/Yandere"><span data-dcnode-id="1038" instrument_node="">Yandere</span></a><span data-dcnode-id="1036" instrument_node="">. The Bad End, called the Extreme Love End, will show how insane he's become for the player.</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1034" instrument_node=""> </span><em data-dcnode-id="1031"><a class="twikilink" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SteamPrison" title="/pmwiki/pmwiki.php/VisualNovel/SteamPrison"><span data-dcnode-id="1033" instrument_node="">Steam Prison</span></a></em><span data-dcnode-id="1030" instrument_node=""> has thirty possible endings: five each for Eltcreed, Ulrik, Adage, and Ines, six for Yune, and four under the general heading of "Other."</span></li><li data-dcnode-id="1020"><span data-dcnode-id="1028" instrument_node=""> In </span><em data-dcnode-id="1025"><a class="twikilink" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/StrawberryVinegar" title="/pmwiki/pmwiki.php/VisualNovel/StrawberryVinegar"><span data-dcnode-id="1027" instrument_node="">Strawberry Vinegar</span></a></em><span data-dcnode-id="1024" instrument_node="">, your choices throughout the VN will influence events in it. There's one at the beginning that </span><span class="spoiler" data-dcnode-id="1022" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1023" instrument_node="">will either properly begin the rest of the storyline or have Rie be cast to Hell, cutting your gameplay quite short</span></span><span data-dcnode-id="1021" instrument_node="">.</span></li><li data-dcnode-id="1011"><span data-dcnode-id="1019" instrument_node=""> This is actually mostly averted in </span><em data-dcnode-id="1016"><a class="twikilink" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Suika" title="/pmwiki/pmwiki.php/VisualNovel/Suika"><span data-dcnode-id="1018" instrument_node="">Suika</span></a></em><span data-dcnode-id="1015" instrument_node="">. The first chapter has one ending, the second chapter has one ending, the third has two, but only one appears to be canon. The fourth has multiple endings and a true ending when you've unlocked both of the best endings from it. This unlocks an alternate route in the second chapter focusing on Mie and Souji's </span><a class="twikilink" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenAce" title="/pmwiki/pmwiki.php/Main/BrokenAce"><span data-dcnode-id="1014" instrument_node="">Broken Ace</span></a><span data-dcnode-id="1012" instrument_node=""> personality.</span></li><li data-dcnode-id="1001"><span data-dcnode-id="1010" instrument_node=""> </span><em data-dcnode-id="1006"><a class="twikilink" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Sunrider" title="/pmwiki/pmwiki.php/VisualNovel/Sunrider"><span data-dcnode-id="1009" instrument_node="">Sunrider Liberation Day</span></a><span data-dcnode-id="1007" instrument_node="">'s</span></em><span data-dcnode-id="1005" instrument_node=""> [RE]turn mode has eighteen: seven bad endings, one "worst" ending, three normal endings, two "alternative" endings, four happy endings and one secret ending. The happy endings are effectively interchangeable, as they play out the same way and the only difference between them is which </span><a class="twikilink" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveInterest" title="/pmwiki/pmwiki.php/Main/LoveInterest"><span data-dcnode-id="1004" instrument_node="">Love Interest</span></a><span data-dcnode-id="1002" instrument_node=""> Kayto ends up with.</span></li><li data-dcnode-id="993"><span data-dcnode-id="1000" instrument_node=""> </span><em data-dcnode-id="997"><a class="twikilink" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SyrupAndTheUltimateSweet" title="/pmwiki/pmwiki.php/VisualNovel/SyrupAndTheUltimateSweet"><span data-dcnode-id="999" instrument_node="">Syrup and the Ultimate Sweet</span></a></em><span data-dcnode-id="996" instrument_node=""> has ten endings, one for each character and five </span><a class="twikilink" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="995" instrument_node="">less than stellar ones.</span></a></li><li data-dcnode-id="943"><span data-dcnode-id="992" instrument_node=""> </span><em data-dcnode-id="989"><a class="twikilink" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/TokyoDark" title="/pmwiki/pmwiki.php/VisualNovel/TokyoDark"><span data-dcnode-id="991" instrument_node="">Tokyo Dark</span></a></em><span data-dcnode-id="988" instrument_node=""> has 11 possible endings.</span><ul data-dcnode-id="944"><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node=""> Revenge: Unlocked by choosing to confront Reina instead of following Tanaka, and killing her.</span></li><li data-dcnode-id="982"><span data-dcnode-id="985" instrument_node=""> Only a Child: Unlocked by choosing to confront Reina instead of following Tanaka, and forgiving her. </span><span class="spoiler" data-dcnode-id="983" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="984" instrument_node="">Reina reverts to her child, untainted self, and Ito uses the Mask to send her to her mother in the afterlife. Reina disappears with a smile, and though Tanaka has ventured too far into the Dark for Ito to find him, she feels strangely at peace.</span></span></li><li data-dcnode-id="978"><span data-dcnode-id="981" instrument_node=""> The End Of The Mask: Unlocked by destroying the Mask instead of using it. </span><span class="spoiler" data-dcnode-id="979" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="980" instrument_node="">Ito, Mai, and her grandmother perform the ritual to destroy the Mask, and they succeed. Neither Tanaka nor Reina is ever found, and the crime rate in Tokyo goes up since there is no Mask Bearer to control the Dark anymore. Ito gets her job back, but she quits later, not having enough motivation to do police work anymore.</span></span></li><li data-dcnode-id="974"><span data-dcnode-id="977" instrument_node=""> Reap What You Sow: Unlocked by killing Goto in the sewer, then going to Kamakura to purify the mask after going to Aokigahara. </span><span class="spoiler" data-dcnode-id="975" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="976" instrument_node=""> Taira (a detective whom Ito doesn't like) and Mori (an officer) catch Ito and arrest her.</span></span></li><li data-dcnode-id="970"><span data-dcnode-id="973" instrument_node=""> Goodbye, I Love You: Unlocked by choosing to follow Tanaka instead of confronting Reina, then returning to the real world alone. </span><span class="spoiler" data-dcnode-id="971" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="972" instrument_node="">Ito recognizes that Tanaka's mind has deteriorated too far to live in reality again, and leaves after a heartfelt farewell. She continues her life and discards the Mask in the ocean, though she can sense it is still connected with her mind.</span></span></li><li data-dcnode-id="963"><span data-dcnode-id="969" instrument_node=""> I'll Remember How You Were: Unlocked by choosing to follow Tanaka instead of confronting Reina, then returning to the real world with him. </span><span class="spoiler" data-dcnode-id="964" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="968" instrument_node="">Ito convinces Tanaka to leave the afterlife, but he emerges a vague </span><a class="twikilink" data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmptyShell" title="/pmwiki/pmwiki.php/Main/EmptyShell"><span data-dcnode-id="967" instrument_node="">Empty Shell</span></a><span data-dcnode-id="965" instrument_node=""> who needs to be cared for. They "live" out their days together.</span></span></li><li data-dcnode-id="959"><span data-dcnode-id="962" instrument_node=""> Alone Together: Unlocked by choosing to follow Tanaka instead of confronting Reina, then staying in the afterlife with him. </span><span class="spoiler" data-dcnode-id="960" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="961" instrument_node="">Their memories fade together- or adapt to their new plane of existence, depending on how you interpret it- and in the real world, their bodies are never found.</span></span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node=""> Lost: Unlocked by overdosing on the antipsychotics in Ito's apartment. As expected, she dies.</span></li><li data-dcnode-id="953"><span data-dcnode-id="956" instrument_node=""> Nothing Is Real: Unlocked by having too low sanity upon being nearly done exploring Aokigahara. </span><span class="spoiler" data-dcnode-id="954" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="955" instrument_node="">The scene changes, showing a visibly crazed Ito in a straitjacket. Apparently the plot was just a delusion of hers- the real (?) Ito is a crazed stalker being confined in a mental asylum. In this reality, Tanaka and Reina are a couple Ito victimized, and Ito's neighbour is her nurse.</span></span></li><li data-dcnode-id="949"><span data-dcnode-id="952" instrument_node=""> Becoming: The true ending. </span><span class="spoiler" data-dcnode-id="950" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="951" instrument_node=""> Ito helps Reina go through the Door with the Mask, and Reina disappears, her anguish gone at last. But the Mask returns, now without someone to bear it, and so Ito decides to become the Mask Bearer. She reunites with Tanaka in the Dark and bids him farewell before she kills him since she needs a sacrifice for the Mask. In the end, she stands as the new Mask Bearer, and mankind is kept safe at the cost of her happiness.</span></span></li><li data-dcnode-id="945"><span data-dcnode-id="948" instrument_node=""> The Cat God's Blessing: Unlocked by clicking on all the camouflaged cats. </span><span class="spoiler" data-dcnode-id="946" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="947" instrument_node="">Ito wakes up in a sanctum far away from the human world, with Lady Fluffington watching over her. Fluffington convinces Ito to abandon the investigation and rest. Curling up to sleep, Ito muses that she feels like she's forgotten something important...</span></span></li></ul></li><li data-dcnode-id="903"><span data-dcnode-id="942" instrument_node=""> Following </span><em data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Higurashi</span></em><span data-dcnode-id="939" instrument_node="">, </span><em data-dcnode-id="936"><a class="twikilink" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/UminekoWhenTheyCry" title="/pmwiki/pmwiki.php/VisualNovel/UminekoWhenTheyCry"><span data-dcnode-id="938" instrument_node="">Umineko: When They Cry</span></a></em><span data-dcnode-id="935" instrument_node=""> has multiple self-contained "episodes" in which things happen differently, but end in disaster for the characters involved. </span><span class="spoiler" data-dcnode-id="930" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="934" instrument_node="">This time, the different episodes are different "what-if" scenarios set up by a Game Master, who exists in a "Meta World" along with "other selves" of the characters on the "game board" </span><a class="twikilink" data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndZoidberg" title="/pmwiki/pmwiki.php/Main/AndZoidberg"><span data-dcnode-id="933" instrument_node="">and witches</span></a><span data-dcnode-id="931" instrument_node="">. Events from across the episodes are used by the said "Meta-characters" in debating and arguing about the identity/ies of the culprit(s) behind the killings.</span></span><ul data-dcnode-id="904"><li data-dcnode-id="922"><span data-dcnode-id="929" instrument_node=""> It's only towards the end of the last game that the player can actually choose between two endings: the "Magic" ending or the "Trick" ending. </span><span class="spoiler" data-dcnode-id="924" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="928" instrument_node="">The Trick ending is a rather cynical one, but the Magic ending is more </span><a class="twikilink" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="927" instrument_node="">bittersweet</span></a><span data-dcnode-id="925" instrument_node="">. Which one is canon is ultimately up to the reader's interpretation of the events of the series</span></span><span data-dcnode-id="923" instrument_node="">.</span></li><li data-dcnode-id="905"><span data-dcnode-id="921" instrument_node=""> The Magic ending can then be interpreted in two different ways depending on whether or not you believe the story is a fantasy or a mystery. The fantasy side is </span><a class="twikilink" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="920" instrument_node="">bittersweet</span></a><span data-dcnode-id="918" instrument_node="">, where </span><span class="spoiler" data-dcnode-id="916" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="917" instrument_node="">the Metaworld is real and the ending shows how Battler finally reunites with Beatrice and his family in the golden land</span></span><span data-dcnode-id="915" instrument_node="">. The mystery approach, on the other hand, is more </span><a class="twikilink" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="914" instrument_node="">depressing</span></a><span data-dcnode-id="912" instrument_node="">, as the ending is just a metaphor for how </span><span class="spoiler" data-dcnode-id="910" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="911" instrument_node="">Tohya is finally able to come to terms with his memories as Battler</span></span><span data-dcnode-id="909" instrument_node="">. The downer part is especially apparent when it's made clear that no matter what side of the fence you are standing on, </span><span class="spoiler" data-dcnode-id="907" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="908" instrument_node="">almost everyone who was on the island is dead and Ange has no family left even after finally meeting her brother again</span></span><span data-dcnode-id="906" instrument_node="">.</span></li></ul></li><li data-dcnode-id="885"><span data-dcnode-id="902" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RomanceGame" title="/pmwiki/pmwiki.php/Main/RomanceGame"><span data-dcnode-id="901" instrument_node="">Romance Games</span></a><span data-dcnode-id="899" instrument_node=""> produced by </span><a class="twikilink" data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VoltageInc" title="/pmwiki/pmwiki.php/Creator/VoltageInc"><span data-dcnode-id="898" instrument_node="">Voltage, Inc.</span></a><span data-dcnode-id="896" instrument_node=""> typically have two endings: a reasonably happy "Good Ending" in which the couple have more or less gotten together but still have some obstacles to overcome, and a "</span><a class="twikilink" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="895" instrument_node="">Happy Ending</span></a><span data-dcnode-id="893" instrument_node="">" in which everything works out and they presumably live happily ever after. Only rarely do they include endings that could be considered less than good, although this is notably the case in </span><em data-dcnode-id="890"><a class="twikilink" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/OfficeSecrets" title="/pmwiki/pmwiki.php/VisualNovel/OfficeSecrets"><span data-dcnode-id="892" instrument_node="">Office Secrets</span></a></em><span data-dcnode-id="889" instrument_node="">, which replaces the "Good Ending" with a "Normal Ending" in which the player character </span><a class="twikilink" data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidNotGetTheGirl" title="/pmwiki/pmwiki.php/Main/DidNotGetTheGirl"><span data-dcnode-id="888" instrument_node="">does not get the guy</span></a><span data-dcnode-id="886" instrument_node="">.</span></li><li data-dcnode-id="877"><span data-dcnode-id="884" instrument_node=""> </span><em data-dcnode-id="881"><a class="twikilink" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/War13thDay" title="/pmwiki/pmwiki.php/VisualNovel/War13thDay"><span data-dcnode-id="883" instrument_node="">War: 13th Day</span></a></em><span data-dcnode-id="880" instrument_node=""> has over 13 endings, each of which reveal a piece of the mystery. You have to get certain ones to unlock the True End, </span><a class="twikilink" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndingChangesEverything" title="/pmwiki/pmwiki.php/Main/TheEndingChangesEverything"><span data-dcnode-id="879" instrument_node="">which will blow your mind.</span></a></li><li data-dcnode-id="856"><span data-dcnode-id="876" instrument_node=""> </span><em data-dcnode-id="873"><a class="twikilink" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/WinterShard" title="/pmwiki/pmwiki.php/VisualNovel/WinterShard"><span data-dcnode-id="875" instrument_node="">Winter Shard</span></a></em><span data-dcnode-id="872" instrument_node=""> has eight endings: a </span><a class="twikilink" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonStandardGameOver" title="/pmwiki/pmwiki.php/Main/NonStandardGameOver"><span data-dcnode-id="871" instrument_node="">Non Standard Game Over</span></a><span data-dcnode-id="869" instrument_node=""> early in the game, a "worst" ending where Frederone dethrones </span><a class="twikilink" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilOverlord" title="/pmwiki/pmwiki.php/Main/EvilOverlord"><span data-dcnode-id="868" instrument_node="">Krotus</span></a><span data-dcnode-id="866" instrument_node=""> and rules the entire world with an iron fist, two variations of the "worst" ending where Frederone dethrones Krotus but isn't quite as ruthless as he is in the worst ending, a neutral ending where Frederone remains in </span><a class="twikilink" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndyingLoyalty" title="/pmwiki/pmwiki.php/Main/UndyingLoyalty"><span data-dcnode-id="865" instrument_node="">Undying Loyalty</span></a><span data-dcnode-id="863" instrument_node=""> to Krotus, a "better" variation of the neutral ending where Marliene joins Frederone in his </span><a class="twikilink" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndyingLoyalty" title="/pmwiki/pmwiki.php/Main/UndyingLoyalty"><span data-dcnode-id="862" instrument_node="">Undying Loyalty</span></a><span data-dcnode-id="860" instrument_node="">, a "better" ending where Frederone and Rosetta are married, and a "true" ending that's the most conclusive but </span><a class="twikilink" data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BittersweetEnding" title="/pmwiki/pmwiki.php/Main/BittersweetEnding"><span data-dcnode-id="859" instrument_node="">bittersweet</span></a><span data-dcnode-id="857" instrument_node=""> one.</span></li><li data-dcnode-id="816"><span data-dcnode-id="855" instrument_node=""> The </span><em data-dcnode-id="852"><a class="twikilink" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Yarudora" title="/pmwiki/pmwiki.php/VisualNovel/Yarudora"><span data-dcnode-id="854" instrument_node="">Yarudora</span></a></em><span data-dcnode-id="851" instrument_node=""> series, an </span><a class="twikilink" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FullMotionVideo" title="/pmwiki/pmwiki.php/Main/FullMotionVideo"><span data-dcnode-id="850" instrument_node="">interactive anime</span></a><span data-dcnode-id="848" instrument_node=""> visual novel franchise by Sony initially released in 1998, had this trope as one of its big specialities. Each </span><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Yarudora</span></em><span data-dcnode-id="845" instrument_node=""> game would sport </span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">lots</span></em><span data-dcnode-id="842" instrument_node=""> of Endings, divided in 3 categories: Good (usually 3 to 5 ones), Normal (usually 3 to 5 ones too), and Bad (usually 17 to 20 ones; </span><em data-dcnode-id="839"><a class="createlink" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/YukiwariNoHana" title="/pmwiki/pmwiki.php/VisualNovel/YukiwariNoHana"><span data-dcnode-id="841" instrument_node="">Yukiwari No Hana</span></a></em><span data-dcnode-id="838" instrument_node=""> had </span><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">32</span></strong><span data-dcnode-id="835" instrument_node="">). This series, and its first game, </span><em data-dcnode-id="832"><a class="twikilink" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DoubleCast" title="/pmwiki/pmwiki.php/VisualNovel/DoubleCast"><span data-dcnode-id="834" instrument_node="">Double Cast</span></a></em><span data-dcnode-id="831" instrument_node="">, in particular (due not only to the interactive anime style and the numerous gruesome bad endings, but also because </span><span class="spoiler" data-dcnode-id="822" title="you can set spoilers visible by default on your profile"><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Double Cast</span></em><span data-dcnode-id="828" instrument_node="">'s main heroine is ultimately revealed to have a </span><a class="twikilink" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Yandere" title="/pmwiki/pmwiki.php/Main/Yandere"><span data-dcnode-id="827" instrument_node="">Yandere</span></a><span data-dcnode-id="825" instrument_node=""> </span><a class="twikilink" data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SplitPersonality" title="/pmwiki/pmwiki.php/Main/SplitPersonality"><span data-dcnode-id="824" instrument_node="">Split Personality</span></a></span><span data-dcnode-id="821" instrument_node="">, were so revolutionary at the time, they would become a primary inspiration for the creators of </span><em data-dcnode-id="818"><a class="twikilink" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/SchoolDays" title="/pmwiki/pmwiki.php/VisualNovel/SchoolDays"><span data-dcnode-id="820" instrument_node="">School Days</span></a></em><span data-dcnode-id="817" instrument_node=""> cited above.</span></li><li data-dcnode-id="798"><span data-dcnode-id="815" instrument_node=""> </span><em data-dcnode-id="812"><a class="twikilink" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/YoJinBo" title="/pmwiki/pmwiki.php/VisualNovel/YoJinBo"><span data-dcnode-id="814" instrument_node="">Yo-Jin-Bo</span></a></em><span data-dcnode-id="811" instrument_node=""> has a total of eighteen possible endings, three for each bodyguard: the Good endings involve a final confrontation with the </span><a class="twikilink" data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="810" instrument_node="">Big Bad</span></a><span data-dcnode-id="808" instrument_node=""> and a </span><a class="twikilink" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyEverAfter" title="/pmwiki/pmwiki.php/Main/HappilyEverAfter"><span data-dcnode-id="807" instrument_node="">Happily Ever After</span></a><span data-dcnode-id="805" instrument_node="">, usually with Sayori </span><a class="twikilink" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IChooseToStay" title="/pmwiki/pmwiki.php/Main/IChooseToStay"><span data-dcnode-id="804" instrument_node="">choosing to stay in the past</span></a><span data-dcnode-id="802" instrument_node=""> to be with her chosen love interest, while the Bad endings involve Sayori being yanked back to the present, typically immediately after she and her love interest admit their feelings for one another. And then there's the "</span><a class="twikilink" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustADream" title="/pmwiki/pmwiki.php/Main/AllJustADream"><span data-dcnode-id="801" instrument_node="">forgotten dream</span></a><span data-dcnode-id="799" instrument_node="">" ending, in which the guy simply leaves and Sayori wakes up in the present with only vague memories of the experience and a feeling that she has lost something.</span></li><li data-dcnode-id="780"><span data-dcnode-id="797" instrument_node=""> </span><em data-dcnode-id="794"><a class="twikilink" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/YourTurnToDie" title="/pmwiki/pmwiki.php/VisualNovel/YourTurnToDie"><span data-dcnode-id="796" instrument_node="">Your Turn to Die</span></a></em><span data-dcnode-id="793" instrument_node=""> offers multiple Bad Endings resulting from things like failing the deadly mini games or letting Sara's </span><a class="twikilink" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SanityMeter" title="/pmwiki/pmwiki.php/Main/SanityMeter"><span data-dcnode-id="792" instrument_node="">Hallucinations</span></a><span data-dcnode-id="790" instrument_node=""> overwhelm her.</span><ul data-dcnode-id="781"><li data-dcnode-id="782"><span data-dcnode-id="789" instrument_node=""> The first named ending, </span><span class="spoiler" data-dcnode-id="787" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="788" instrument_node="">Massacre</span></span><span data-dcnode-id="786" instrument_node="">, comes at the climax of Chapter 2-2, and hinges on Sara deciding to </span><span class="spoiler" data-dcnode-id="784" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="785" instrument_node="">join Nao in sacrificing the other survivors so that the two of them can escape together, carrying the guilt of their betrayal</span></span><span data-dcnode-id="783" instrument_node="">.</span></li></ul></li></ul><p data-dcnode-id="778"></p><hr data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
