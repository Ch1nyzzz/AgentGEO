v></div><div data-dcnode-id="1712" id="ad-5cd66ebca73d460396faba54f5434cda"></div></phoenix-video></div></phoenix-video-float><div class="m-video-player--footer video-6f90906ee6e8444eb7298e142a6c97d4-footer" data-dcnode-id="1704"><div class="m-video-player--footer-container" data-dcnode-id="1705"><div class="m-video-player--footer-meta" data-dcnode-id="1706"><a class="m-video-player--footer-link" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Welcome to Owlcation</span></a></div></div></div></figure></div></div><div class="m-detail-header--content" data-dcnode-id="1682"><h1 class="m-detail-header--title" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Short Stories With a Twist Ending</span></h1><div class="m-detail-header--meta" data-dcnode-id="1683"><div class="m-description--list" data-dcnode-id="1684"><ul class="m-detail-header--horizontal-list" data-dcnode-id="1685"><li data-dcnode-id="1693"><div class="m-description--term" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Author:</span></div><div class="m-description--details m-detail-header--meta-item" data-dcnode-id="1694"><a class="m-detail-header--meta-author" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//owlcation.com/%40howardallen" onclick="return phoenixTrackClickEvent(this, event);" phx-track-id="Author Name" rel="author"><span data-dcnode-id="1696" instrument_node="">Howard Allen</span></a></div></li><li data-dcnode-id="1686"><div class="m-description--term" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Updated date:</span></div><div class="m-detail-header--date m-detail-header--publication-date m-detail-header--meta-item m-description--details" data-dcnode-id="1687"><phoenix-timeago data-dcnode-id="1688"><time data-dcnode-id="1689" datetime="2022-01-24T10:37:28-05:00" title="Jan 24, 2022"><span data-dcnode-id="1690" instrument_node="">Jan 24, 2022</span></time></phoenix-timeago></div></li></ul></div></div></div></div></header><div class="m-detail--sponsor" data-dcnode-id="1679"></div><div class="m-detail--body" data-dcnode-id="675"><p data-dcnode-id="1675"><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Howard is an avid short story reader who likes to help others find and understand stories.</span></em></p><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">It’s hard to beat a twist ending for pure entertainment value.</span></p><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Even though a twist ending is supposed to give the reader a jolt, the best ones seem inevitable and seamless. Not all the twists in these stories are sudden, but they will all be surprising in some way.</span></p><p data-dcnode-id="1665"><span data-dcnode-id="1670" instrument_node="">The stories by Jeffrey Archer are available in his first volume of </span><em data-dcnode-id="1667"><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2BtFjoK" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1669" instrument_node="">Collected Short Stories</span></a></em><span data-dcnode-id="1666" instrument_node="">, which has many other stories with twist endings and is a fun read.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1662"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1663" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&qu ode="">Here are some great short stories with surprise endings. The endings aren't revealed here, only the set-ups.</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1609"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1610" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1616"><a data-dcnode-id="1655"><picture class="is-loaded" data-dcnode-id="1656"><source data-dcnode-id="1659" sizes="(min-width: 1240px) 622px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cq_auto:eco%2Cw_380/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.webp 380w, https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cq_auto:eco%2Cw_620/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.webp 620w, https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cq_auto:eco%2Cw_622/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.webp 622w" type="image/webp"><source data-dcnode-id="1658" sizes="(min-width: 1240px) 622px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:eco%2Cw_380/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.jpg 380w, https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:eco%2Cw_620/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.jpg 620w, https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:eco%2Cw_622/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.jpg 622w"><img alt="short-stories-with-a-twist-ending" class="m-detail--tml-image m-image" data-dcnode-id="1657" data-src="https://images.saymedia-content.com/.image/c_limit%2Ccs_srgb%2Cfl_progressive%2Cq_auto:eco%2Cw_700/MTc0MzAxMzg4MzQyMzA2Njg0/short-stories-with-a-twist-ending.jpg" decoding="async" height="720" itemprop="contentUrl everal robberies.</span></p><p data-dcnode-id="1419"><em data-dcnode-id="1420"><a data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//americanenglish.state.gov/files/ae/resource_files/a-retrieved-reformation.pdf" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1422" instrument_node="">Read "A Retrieved Reformation"</span></a></em></p><h2 data-dcnode-id="1417" id="12-man-from-the-south-roald-dahl"><span data-dcnode-id="1418" instrument_node="">12. "Man From the South" | Roald Dahl</span></h2><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">An elderly man bets a young man that he can’t light his lighter ten times in a row. If it fails to light on any of the ten attempts, the young man loses the pinky finger of his left hand; if all ten attempts are successful, the young man wins a Cadillac.</span></p><p data-dcnode-id="1411"><em data-dcnode-id="1412"><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.classicshorts.com/stories/south.html" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1414" instrument_node="">Read "Man From the South"</span></a></em></p><h2 data-dcnode-id="1409" id="13-the-lame-shall-enter-first-flannery-o-connor"><span data-dcnode-id="1410" instrument_node="">13. "The Lame Shall Enter First" | Flannery O'Connor</span></h2><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">A young son mourns the loss of his mother, while his unsympathetic father is preoccupied with helping other people. The father invites a young delinquent into their home, who resists his efforts to help.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-5" data-dcnode-id="1404"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-5 hat night.</span></p><p data-dcnode-id="1075"><em data-dcnode-id="1076"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americanliterature.com/author/o-henry/short-story/after-twenty-years" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1078" instrument_node="">Read "After Twenty Years"</span></a></em></p><h2 data-dcnode-id="1073" id="44-broken-routine-jeffrey-archer"><span data-dcnode-id="1074" instrument_node="">44. "Broken Routine" | Jeffrey Archer</span></h2><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Septimus is a claims adjuster at an insurance company. He maintains a strict daily routine in his work and home life. One day he is asked to stay a little late, which turns out to be very disruptive for him.</span></p><p data-dcnode-id="1067"><em data-dcnode-id="1068"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.studfiles.ru/preview/4533352/page%3A16/" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1070" instrument_node="">Read "Broken Routine"</span></a></em></p><h2 data-dcnode-id="1065" id="45-to-serve-man-damon-knight"><span data-dcnode-id="1066" instrument_node="">45. "To Serve Man" | Damon Knight</span></h2><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Earth is visited by an alien race, the Kanamit, who look like a cross between pigs and people. They have brought valuable knowledge for producing power, increasing food supply, and other things, at no charge. Some question the purity of their motives, so the Kanamit are subjected to a lie-detector test.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-11" data-dcnode-id="1060"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-11" d rument_node="">47. "Button, Button" | Richard Matheson</span></h2><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">A hand addressed package is left at the door of Arthur and Norma Lewis. Inside is a contraption with a button on it, and a note saying that Mr. Steward will call on them at 8 PM. After assuring them that he isn't selling anything, Mr. Steward makes them a shocking proposition.</span></p><p data-dcnode-id="1031"><em data-dcnode-id="1032"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//docplayer.net/21077210-Button-button-richard-matheson-short-story-103.html" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1034" instrument_node="">Read "Button, Button"</span></a></em></p><h2 data-dcnode-id="1029" id="48-marjorie-daw-thomas-bailey-aldrich"><span data-dcnode-id="1030" instrument_node="">48. "Marjorie Daw" | Thomas Bailey Aldrich</span></h2><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">John Flemming has slipped and broken his leg, leaving him confined to his couch. His friend Edward Delaney begins corresponding with him to pass the time. Delaney describes the family who live across from him, including their mansion and beautiful young daughter.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1024"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1025" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;di ary</span></h2><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Amanda sits in her room. She's unhappy. She gets up to close her desk drawer then remembers the package of letters. She chooses one and starts reading.</span></p><h2 data-dcnode-id="853" id="63-the-bookbinder-s-apprentice-martin-edwards"><span data-dcnode-id="854" instrument_node="">63. "The Bookbinder's Apprentice" | Martin Edwards</span></h2><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Joly, a visitor in Venice, finishes reading when he is approached by an older man, Sanborn, who admires his book. He invites Joly for a drink where he is introduced to another man, Zuichini, a skilled bookbinder. Joly is suspicious of his new acquaintances but accepts their hospitality.</span></p><p data-dcnode-id="845"><em data-dcnode-id="847"><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//100vampirenovels.net/pdf-novels/the-mammoth-book-of-best-british-mysteries-by-maxim-jakubowski-free/6-page" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="850" instrument_node="">Read "The Bookbinder's Apprentice"</span></a><span data-dcnode-id="848" instrument_node=""> </span></em><span data-dcnode-id="846" instrument_node="">(scroll down over halfway)</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-17" data-dcnode-id="842"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-17" data-dcnode-id="843" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&qu
