                </span><span class="credit" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Photo-Illustration: by Vulture;  Photo by Penguin RandomHouse</span></span><span data-dcnode-id="2083" instrument_node="">
</span></div><span data-dcnode-id="2081" instrument_node="">
</span></div><span data-dcnode-id="2079" instrument_node="">
</span></div><span data-dcnode-id="2077" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2072" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wmb001r3h6gjm21aawr@published" data-word-count="113"><span data-dcnode-id="2076" instrument_node="">Ian McEwan’s 2001 novel </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Atonement </span></em><span data-dcnode-id="2073" instrument_node="">opens with a description of what it’s like to invent a world. Briony Tallis, 13 years old and enthralled by the power of storytelling (“you had only to write it down and you could have the world”) has written a little play for her family. She’s also “designed the posters, programs, and tickets, constructed the sales booth out of a folding screen tipped on its side, and lined the collection box in red crepe paper.” Every aspect of production of the seven-page drama, “written by her in a two-day tempest of composition,” fiercely belongs to her, and McEwan hovers over her labors like God dictating the Genesis story.</span></p><span data-dcnode-id="2071" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2066" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wnn001s3h6gvg9nrk1c@published" data-word-count="149"><span data-dcnode-id="2070" instrument_node="">It’s easy to forget the beginning of a novel that became famous, in part, for its tablecloth-pulling ending. But </span><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Atonement</span></em><span data-dcnode-id="2067" instrument_node=""> has the power to send you scurrying back to its first pages once you finish, ready to play whack-a-mole with its wiggly circularity. It’s a book about misinterpretations that McEwan expects to be misinterpreted until its very last pages, when we find out that the entire book we’ve just read is the sixth draft of a novel by a much-older, quite successful Briony, making her both the unreliable narrator and the unreliable author. In between is a plot borne of Austen and Richardson that sweeps through the long 19th century of realist sagas, wiggles into Modernism, and ends on a postmodern questioning of the worth of the novel itself. It’s a feat of pastiche that transcends pastiche: It preserves the intoxication of narrative fiction while admitting that it’s farce.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2042" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wpr001u3h6gx306bg2l@published" data-word-count="185"><span data-dcnode-id="2064" instrument_node="">Critics and book buyers agreed it was a masterpiece. </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Atonement</span></em><span data-dcnode-id="2061" instrument_node=""> became one of the first additions to the 21st-century canon after its publication in the U.K. twenty years ago, with a </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk/2003/feb/28/books.booksnews"><span data-dcnode-id="2060" instrument_node="">quarter million copies</span></a><span data-dcnode-id="2058" instrument_node=""> going into print in the U.S. alone before it won the National Books Critics Circle Award in 2003. (When he handed in the </span><em data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Atonement</span></em><span data-dcnode-id="2055" instrument_node=""> manuscript, McEwan told me, he informed his editor they’d be “lucky to sell 10,000 copies … because it’s really a book for other writers about reading and writing.” His editor told him it would sell in huge numbers “because it’s got the three elements that make it a must: a country house, the Second World War, a love affair.” It’s now sold </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguin.com.au/books/atonement-9780099429791%23%3A~%3Atext%3DDiscover%2520the%2520modern%2520classic%2520that%2520has%2520sold%2520over%2520two%2520million%2520copies."><span data-dcnode-id="2054" instrument_node="">over 2 million copies</span></a><span data-dcnode-id="2052" instrument_node=""> worldwide.) Academics wrote papers about it with hazy titles like </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diegesis.uni-wuppertal.de/index.php/diegesis/article/view/125/138"><span data-dcnode-id="2051" instrument_node="">“The Rhetoric of Intermediality”</span></a><span data-dcnode-id="2049" instrument_node=""> and </span><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/254339207_Briony%27s_Being-For_Metafictional_Narrative_Ethics_in_Ian_McEwan%27s_Atonement"><span data-dcnode-id="2048" instrument_node="">“Briony’s Being-For”</span></a><span data-dcnode-id="2046" instrument_node=""> and it was made into a 2007 movie starring period-piece queen Keira Knightley and directed by Joe Wright, fresh off his debut </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Pride &amp; Prejudic</span></em><span data-dcnode-id="2043" instrument_node="">e remake. And readers still gush — and whine — on book forums and reading sites about that witchy ending.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2035" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wrn001v3h6gvaf19cz6@published" data-word-count="87"><span data-dcnode-id="2040" instrument_node="">Briony’s revelation at the end that she’s reshaped this story to her whims turns her into a kind of god, master of all narratives and shaper of fates. Which leaves us her pawns, delighted little fools pulled along on a con. </span><em data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Atonement</span></em><span data-dcnode-id="2037" instrument_node=""> is, as the title asserts, Briony’s apology to the people whose lives she’s used to populate her story. But it’s also her masterpiece, proof that her regrets won’t stop her from plundering one last time. Its ending reminds readers that fiction without misrepresentation is impossible.</span><strong data-dcnode-id="2036"></strong></p><span data-dcnode-id="2034" instrument_node="">
</span><div class="divider-short" data-dcnode-id="2030" data-uri="www.vulture.com/_components/divider-short/instances/cklk41woa001t3h6gpstefddg@published"><span data-dcnode-id="2033" instrument_node="">
</span><span data-dcnode-id="2031" instrument_node="">
</span></div><span data-dcnode-id="2029" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2022" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wt0001w3h6gg9gqb6r8@published" data-word-count="123"><em data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Atonement</span></em><span data-dcnode-id="2026" instrument_node="">’s first</span><em data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node=""> </span></em><span data-dcnode-id="2023" instrument_node="">three parts are told from multiple points of view — including that of Briony, the youngest of three siblings. The first and longest section is set in 1935 over the course of one roasting hot day and night at the Tallis family’s grand country home in the Surrey Hills. Precocious Briony has a “passion for tidiness” of all kinds; the darling of the family, her writing has been praised and encouraged to excess. Her older sister Cecelia, a restless recent graduate of the ladies’ college at Cambridge, is working through a newfound sex-tinged awkwardness with Robbie Turner, their charlady’s son and her childhood playmate. Like any good mother and father in a coming-of-age novel, the Tallis parents are a scant presence.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2013" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wxp001x3h6gq4u5wi8w@published" data-word-count="198"><span data-dcnode-id="2020" instrument_node="">When Briony sees Cecelia and Robbie arguing by the fountain under her bedroom window, she imagines their quarrel — which is really over a broken heirloom vase — into her own (mis)understanding of how narrative works: Cecelia is the victim, Robbie the dastardly villain. That evening, she’ll misunderstand twice more.</span><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node=""> </span></strong><span data-dcnode-id="2017" instrument_node="">First, she sneakily opens a letter from Robbie to Cecelia that ends with the line “In my dreams I kiss your cunt, your sweet wet cunt.” She determines he’s a maniac, and later, when she walks in on them screwing in the family’s library, immediately assumes Robbie is raping her sister. Later, out searching the grounds for her visiting relatives, she makes out two figures in the tall grass, one “backing away from her and beginning to fade,” the other a frantic, disheveled Lola, her 15-year-old cousin. “In an instant, Briony understood completely,” McEwan writes. “She was nauseous with disgust and fear.” She isn’t sure, but tells Lola, “It was Robbie.” Lola never agrees with her, and the narrator hints that Briony is mistaken,</span><strong data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node=""> </span></strong><span data-dcnode-id="2014" instrument_node="">but the police believe a child’s version of events, just as we eventually do. Robbie is wrongly branded a child rapist and hauled off.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2010" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41wzk001y3h6g0fqvmeze@published" data-word-count="140"><span data-dcnode-id="2011" instrument_node="">The next two sections are set five years in the future, in 1940, as Europe steps into war. We first follow Robbie, released from prison to serve in the military, as he walks 25 miles toward the beach at Dunkirk, determined to return home to Cecelia despite the shrapnel lodged just below his heart. The next part returns to London, and to Briony, now 18, training as a war nurse and drafting “Two Figures by a Fountain,” a novella in impressions, based on the argument between Cecelia and Robbie that she saw from her bedroom window. Now wise to her own self-delusion and exhausted by guilt, she visits Cecelia to recant her accusation — and sees her sister reunited with Robbie, who insists that Briony do everything in her power to clear his name. Voilà, it’s the “atonement” readers expect.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="2007" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41x4a001z3h6g5qhjou3s@published" data-word-count="105"><span data-dcnode-id="2008" instrument_node="">Until now, a lovely, straightforward British wartime novel, full of wispy silk chiffon skirts and the buzz of the RAF — but then comes the coda. Leaping forward to 1999, we meet 77-year-old Briony as an established novelist, finishing up what will be her final manuscript: the novel we’ve just read, made of her memories, altered and reframed. She explains that Cecelia and Robbie really died in the Blitz and Dunkirk respectively. But “how could that constitute an ending?” Briony asks. “What sense of hope or satisfaction could a reader draw from such an account?” Distance, and six full drafts, have allowed her to riff.</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1968" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41x5n00203h6gug6myzy7@published" data-word-count="147"><span data-dcnode-id="2005" instrument_node="">This post-postmodern one-two punch knocked readers on their asses. While even the most formidable reviewers adored </span><em data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Atonement</span></em><span data-dcnode-id="2002" instrument_node="">’s genius, calling it </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2002/03/07/books/books-of-the-times-and-when-she-was-bad-she-was.html"><span data-dcnode-id="2001" instrument_node="">“a tour de force”</span></a><span data-dcnode-id="1999" instrument_node=""> and </span><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2002/03/04/flesh-on-flesh"><span data-dcnode-id="1998" instrument_node="">“a beautiful and majestic fictional panorama,”</span></a><span data-dcnode-id="1996" instrument_node=""> what criticism they did have was reserved for its last pages. James Wood, then ascendant at the </span><em data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">New Republic</span></em><span data-dcnode-id="1993" instrument_node="">, considered it </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newrepublic.com/article/63386/atonement-ian-mcewan-fiction"><span data-dcnode-id="1992" instrument_node="">“McEwan’s finest and most complex novel”</span></a><span data-dcnode-id="1990" instrument_node=""> while declaring the twist ending “unnecessary” and decrying its “neatness.” The </span><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Sunday Telegraph</span></em><span data-dcnode-id="1987" instrument_node=""> declared it “frustrating,” and Anita Brookner questioned its wisdom. Hermione Lee in the </span><em data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Guardian</span></em><span data-dcnode-id="1984" instrument_node=""> called it a </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2001/sep/23/fiction.bookerprize2001"><span data-dcnode-id="1983" instrument_node="">“quite familiar fictional trick.”</span></a><span data-dcnode-id="1981" instrument_node=""> The general public is still at war with itself over how they feel. Last fall, the </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/entertainment/books/worst-book-endings/2020/10/17/e9d8635a-0ee3-11eb-b1e8-16b59b92b36d_story.html"><span data-dcnode-id="1980" instrument_node="">Washington </span><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Post</span></em><span data-dcnode-id="1977" instrument_node=""> reported</span></a><span data-dcnode-id="1975" instrument_node=""> on a reader-generated list of literature’s all-time most disappointing endings: </span><em data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Atonement </span></em><span data-dcnode-id="1972" instrument_node="">was ranked second, just after </span><em data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Romeo and Juliet.</span></em><span data-dcnode-id="1969" instrument_node=""> “I was touched,” McEwan told me during a recent phone conversation, to be “right next to Shakespeare.”</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1965" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41x7j00213h6gq26agn0f@published" data-word-count="47"><span data-dcnode-id="1966" instrument_node="">“Over the years I’ve encountered many people who will be absolutely infuriated [by the ending],” he said with a little laugh. “But I can’t help feeling very flattered by that. Those are just the people I wanted to address, because they were heavily invested in the story.”</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1958" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41x9300223h6gylgpyqz8@published" data-word-count="120"><span data-dcnode-id="1963" instrument_node="">So while the “trick” at the end is the big reveal, the more rewarding aspect is the knowledge that hints about </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Atonement</span></em><span data-dcnode-id="1960" instrument_node="">’s meticulous construction are hidden along the way. On a first reading, McEwan’s breadcrumb trail is barely visible, but on the second, it’s practically Day-Glo. Perhaps overconfident, (or more indebted to postmodernism herself than she lets on) Briony repeatedly drops hints that she was even manufacturing this story as a child, and that it is shifting and changing even as she writes it from the perch of old age. Just after she witnesses the fountain scene, Briony writes, she knew “that whatever actually happened drew its significance from her published work and would not have been remembered without it.”</span><strong data-dcnode-id="1959"></strong></p><span data-dcnode-id="1957" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1949" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41xcm00233h6g0kpjc0jq@published" data-word-count="89"><span data-dcnode-id="1956" instrument_node="">In the third section, as an 18-year-old writer, Briony receives a helpful rejection letter from real-life (as in, actually real-life) magazine</span><strong data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node=""> </span></strong><span data-dcnode-id="1953" instrument_node="">editor Cyril Connolly. He praises “Two Figures by a Fountain,” as “arresting,” though her style “owed a little too much to the techniques of Mrs. Woolf.” He reminds her to think of her readers: “They retain a childlike desire to be told a story, to be held in suspense, to know what happens.” Those last two phrases are diametrical, of course, which encapsulates the experiment of </span><em data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Atonement</span></em><span data-dcnode-id="1950" instrument_node=""> itself.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1946" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41xek00243h6gmpe3rn0u@published" data-word-count="163"><span data-dcnode-id="1947" instrument_node="">The ending isn’t a feather in the novel’s cap, tacked on unnecessarily as some critics lamented. It’s the novel’s reason for being. The little girl whose play once crumbled into a mire of familial infighting pulls off an incredible caper: She’s both offered a lengthy apology and finally written the ravishing novel that she once imagined, just minutes after watching that argument between Cecelia and Robbie by the fountain: “She sensed she could write a scene like the one by the fountain and she could include a hidden observer like herself. She could imagine herself hurrying down now to her bedroom, to a clean block of lined paper and her marbled, Bakelite pen.” As for Robbie and Cecelia — still loved by her, still dead — she pats herself on the back for reviving them in her fiction, which she calls “a final act of kindness … I gave them happiness, but I was not so self-serving as to let them forgive me.”</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1940" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41xlr00253h6gwqu9esec@published" data-word-count="57"><span data-dcnode-id="1944" instrument_node="">Briony knows that her novel won’t be published until after her death or incapacitation; she won’t experience censure or scandal. Perhaps the most subversive thing about </span><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Atonement</span></em><span data-dcnode-id="1941" instrument_node=""> is that its narrator isn’t hobbled by the weight of her guilt. Instead, she’s victorious: “She was under no obligation to the truth, she had promised no one a chronicle.”</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1937" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41xqi00263h6grajnhazy@published" data-word-count="24"><span data-dcnode-id="1938" instrument_node="">I asked McEwan if some bit of Briony is triumphant. “I would take the Jamesian view,” he demurred, “that she’s lived the examined life.”</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p class="clay-paragraph" data-dcnode-id="1934" data-editable="text" data-uri="www.vulture.com/_components/clay-paragraph/instances/cklk41xsh00273h6gisqvvkd4@published" data-word-count="18"><span data-dcnode-id="1935" instrument_node="">One that’s been examined — and fiddled with — until it’s no longer a life. It’s a novel.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><section class="package-list" data-dcnode-id="1850" data-track-type="article-list" data-uri="www.vulture.com/_components/package-list/instances/cklk48t2s002t3h6g384g1vok@published"><span data-dcnode-id="1932" instrument_node="">

</span><svg data-dcnode-id="1900" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1901" fill="none" fill-rule="evenodd"><path d="M-250-641h1399v987H-250z" data-dcnode-id="1904" fill="#FFF"></path><path d="M0-1h16v16H0z" data-dcnode-id="1903"></path><path d="M0 3.439l6.12-.105S5.54.644 5.452.332c-.088-.316.21-.426.405-.244C6.188.396 14 6.86 14 6.86s-7.571 6.726-7.89 7.045c-.188.189-.49.088-.414-.23.075-.315.556-3.023.556-3.023s-4.012.056-6.252.094V3.44z" data-dcnode-id="1902" fill="#18BBEC"></path></g></svg><span data-dcnode-id="1899" instrument_node="">

</span><a class="package-list-item-link" data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vulture.com/article/tv-cliffhanger-endings-television-writers.html"><span data-dcnode-id="1896" instrument_node="">
</span><span class="headline" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">
