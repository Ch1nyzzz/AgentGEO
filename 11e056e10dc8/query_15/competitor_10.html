ian.com%2Fbooks%2F2017%2Faug%2F16%2Ftop-10-twists-in-fiction%3FCMP%3Dshare_btn_link" role="button" target="_blank"><span class="dcr-lhk7zu" data-dcnode-id="1289"><svg data-dcnode-id="1290" height="32" viewBox="0 0 32 32" width="32"><path d="M23.363 20.875H8.637v-8.938l6.545 5.687h1.637l6.544-5.687v8.938zm-1.635-9.75L16 16l-5.728-4.875h11.456zM23.363 9.5H8.637L7 11.125v9.75L8.637 22.5h14.727L25 20.875v-9.75L23.363 9.5z" data-dcnode-id="1291"></path></svg></span></a></li></ul></div><div class="dcr-1ni4us3" data-dcnode-id="1271"><div class="dcr-1kr2ya4" data-dcnode-id="1272"><div class="meta-number" data-dcnode-id="1284"></div><div class="meta-number" data-dcnode-id="1273"><gu-island clientonly="true" data-dcnode-id="1274" data-gu-ready="true" deferuntil="idle" name="CommentCount" props="{&quot;discussionApiUrl&quot;:&quot;https://discussion.theguardian.com/discussion-api&quot;,&quot;shortUrlId&quot;:&quot;/p/7x8e2&quot;,&quot;format&quot;:{&quot;display&quot;:0,&quot;theme&quot;:3,&quot;design&quot;:6}}"><data class="css-bhgepi" data-cy="comment-counts" data-dcnode-id="1275" value="489 comments on this article"><a aria-label="489 Comments" class="css-1xytc30" data-dcnode-id="1276" href="#comments"><div class="css-jd3ve2" data-dcnode-id="1281"><svg class="css-dzxbeb" data-dcnode-id="1282" height="16" viewBox="0 0 16 16" width="16"><path d="M13 0l1 1v7l-1 1H7l-2 3H4V9H2L1 8V1l1-1h11z" data-dcnode-id="1283"></path></svg></div><div aria-hidden="true" class="css-pbkcyu" data-dcnode-id="1279" data-testid="long-comment-count"><span data-dcnode-id="1280" instrument_node="">489</span></div><div aria-hidden="true" class="css-xfiylr" data-dcnode-id="1277" data-testid="short-comment-count"><span data-dcnode-id="1278" instrument_node="">489</span></div></a></data></gu-island></div></div></div></div></div></div></div></aside><div class="dcr-1jw1u7l" data-dcnode-id="926" data-gu-name="body"><div class="dcr-gxga1k" data-dcnode-id="927"><div class="dcr-7sthwg" data-dcnode-id="1004" id="maincontent" tabindex="0"><div class="article-body-commercial-selector article-body-viewer-selector dcr-18wsxay" data-dcnode-id="1005"><p class="dcr-139bh9t" data-dcnode-id="1256"><span class="dcr-1i2w9iu" data-dcnode-id="1263"><span class="dcr-1jnp7wy" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">T</span></span></span><span class="dcr-139bh9t" data-dcnode-id="1257"><span data-dcnode-id="1262" instrument_node="">he word “twist” exerts a strange power over crime fiction addicts like me. Publishers know this all too well, which is why the promise of a twist is often used to advertise books that don’t have twists at all. “You’ll never see the breathtaking twist coming!” screams the press release. Well, no, you won’t, because it doesn’t exist. And so many people think a brilliant resolution is the same thing as a twist. It isn’t. Agatha Christie’s Murder on the Orient Express</span><em data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node=""> </span></em><span data-dcnode-id="1259" instrument_node="">offers the most impressive puzzle solution in all of detective fiction. But, however ingenious and surprising, it’s not a twist ending.</span><br data-dcnode-id="1258"></span></p><p class="dcr-139bh9t" data-dcnode-id="1248"><span data-dcnode-id="1255" instrument_node=""> So what is a bona fide twist? In my view, it has to be something that overturns or negates an already drawn conclusion or a firmly entrenched </span><em data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">and reasonable </span></em><span data-dcnode-id="1252" instrument_node="">assumption (Orient Express</span><em data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node=""> </span></em><span data-dcnode-id="1249" instrument_node="">overturns an unreasonable assumption on the part of the reader, which is why I wouldn’t call it a twist).</span></p><div data-dcnode-id="1246" id="sign-in-gate"><gu-island clientonly="true" data-dcnode-id="1247" data-gu-ready="true" name="SignInGateSelector" props="{&quot;format&quot;:{&quot;display&quot;:0,&quot;theme&quot;:3,&quot;design&quot;:6},&quot;contentType&quot;:&quot;Article&quot;,&quot;sectionName&quot;:&quot;books&quot;,&quot;tags&quot;:[{&quot;id&quot;:&quot;books/series/toptens&quot;,&quot;type&quot;:&quot;Series&quot;,&quot;title&quot;:&quot;Top 10s&quot;},{&quot;id&quot;:&quot;books/crime&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Crime fiction&quot;},{&quot;id&quot;:&quot;books/books&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Books&quot;},{&quot;id&quot;:&quot;culture/culture&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Culture&quot;},{&quot;id&quot;:&quot;books/ruth-rendell&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Ruth Rendell&quot;},{&quot;id&quot;:&quot;books/gillian-flynn&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Gillian Flynn&quot;},{&quot;id&quot;:&quot;books/lionel-shriver&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Lionel Shriver&quot;},{&quot;id&quot;:&quot;books/charlottebronte&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Charlotte Brontë&quot;},{&quot;id&quot;:&quot;books/daphnedumaurier&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Daphne du Maurier&quot;},{&quot;id&quot;:&quot;books/jodi-picoult&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Jodi Picoult&quot;},{&quot;id&quot;:&quot;books/pdjames&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;PD James&quot;},{&quot;id&quot;:&quot;books/fiction&quot;,&quot;type&quot;:&quot;Keyword&quot;,&quot;title&quot;:&quot;Fiction&quot;},{&quot;id&quot;:&quot;type/article&quot;,&quot;type&quot;:&quot;Type&quot;,&quot;title&quot;:&quot;Article&quot;},{&quot;id&quot;:&quot;tone/features&quot;,&quot;type&quot;:&quot;Tone&quot;,&quot;title&quot;:&quot;Features&quot;},{&quot;id&quot;:&quot;profile/sophie-hannah&quot;,&quot;type&quot;:&quot;Contributor&quot;,&quot;title&quot;:&quot;Sophie Hannah&quot;},{&quot;id&quot;:&quot;tracking/commissioningdesk/uk-culture&quot;,&quot;type&quot;:&quot;Tracking&quot;,&quot;title&quot;:&quot;UK Culture&quot;}],&quot;isPaidContent&quot;:false,&quot;isPreview&quot;:false,&quot;host&quot;:&quot;https://www.theguardian.com&quot;,&quot;pageId&quot;:&quot;books/2017/aug/16/top-10-twists-in-fiction&quot;,&quot;idUrl&quot;:&quot;https://profile.theguardian.com&quot;}"></gu-island></div><div aria-hidden="true" class="js-ad-slot ad-slot ad-slot--im" data-dcnode-id="1245" data-label="false" data-link-name="ad slot im" data-mobile="1,1|2,2|88,85|fluid" data-name="im" data-refresh="false" id="dfp-ad--im"></div><p class="dcr-139bh9t" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Writing a twist isn’t an exact science, but part of what makes the brilliant ones so attractive in fiction is that feeling of having everything you thought you knew reversed, inverted or demolished; the fictional equivalent of being on a rollercoaster that suddenly turns upside down, leaving everything looking and feeling very different for the rest of the ride. And the new picture created by the shake-up of the twist has to be one that makes sense and is not risible. For example, if you find out at the end of the novel that the murderer is not the person whose fingerprints were on the knife, but rather his long-dead second cousin who developed marvellous fingerprint-forging technology unknown to science or the reader – that’s not a twist, it’s a travesty.</span></p><p class="dcr-139bh9t" data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">My new thriller </span><a data-dcnode-id="1240" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookshop.theguardian.com/did-you-see-melody.html"><span data-dcnode-id="1241" instrument_node="">Did You See Melody?</span></a><span data-dcnode-id="1239" instrument_node=""> is set in a five-star spa resort, where a tourist stumbles into a hotel room that is already occupied by a man and a girl. The next day, she learns about the most famous murder victim in America and suspects that she has seen her, alive and well… I didn’t intend this book to have a twist, but when I got to the end, I discovered that one of my own characters had outwitted me. So there is an enormous twist at the end, one that makes me feel like my main character is saying to me, “Ha! You complacent author – you think you’ve got it all sorted, don’t you? Well, I’ll show you!”</span></p><p class="dcr-139bh9t" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">It’s going to be very hard to do this without spoilers, but I will try. In my opinion, these are 10 excellent examples of novels with genuine twists:</span></p><p class="dcr-139bh9t" data-dcnode-id="1224"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">1. My Sister’s Keeper </span></strong><strong data-dcnode-id="1228"><span data-dcnode-id="1233" instrument_node="">by </span><a data-dcnode-id="1231" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/jodi-picoult"><span data-dcnode-id="1232" instrument_node="">Jodi Picoult</span></a><span data-dcnode-id="1230" instrument_node=""> </span><br data-dcnode-id="1229"></strong><span data-dcnode-id="1227" instrument_node="">A moving, complex moral-dilemma story about a girl who takes her family to court in order to win the right to refuse a life-saving bone marrow transplant to her dying sister. What’s great about the twist is that you were neither waiting nor hoping for it – the story feels totally satisfying and complete without it – and yet when it arrives, you realise that there was a carefully and subtly carved space all throughout the novel for that perfect twist to fit into.</span><strong data-dcnode-id="1225"><br data-dcnode-id="1226"></strong></p><figure class="dcr-10khgmf" data-dcnode-id="1199" data-spacefinder-role="inline" data-spacefinder-type="model.dotcomrendering.pageElements.ImageBlockElement" id="fee34d6c-3416-4f64-9879-d49c0f5ee956"><div class="dcr-1b267dg" data-dcnode-id="1207"><picture data-dcnode-id="1208" itemprop="contentUrl"><source data-dcnode-id="1223" media="(min-width: 980px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 980px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=0be39c15ad6d328bccaae64eb4b6c4ab 1240w"><source data-dcnode-id="1222" media="(min-width: 980px)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=620&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=2770337117d4518be4b1ef8520ba2c1f 620w"><source data-dcnode-id="1221" media="(min-width: 740px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 740px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=0be39c15ad6d328bccaae64eb4b6c4ab 1240w"><source data-dcnode-id="1220" media="(min-width: 740px)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=620&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=2770337117d4518be4b1ef8520ba2c1f 620w"><source data-dcnode-id="1219" media="(min-width: 660px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 660px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=0be39c15ad6d328bccaae64eb4b6c4ab 1240w">< dia/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=76d3a239d8021111d87de76c0456806c 445w"><source data-dcnode-id="1211" media="(min-width: 0px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 0px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=f73526c32a790b75b71e5d1a194e2aec 890w"><source data-dcnode-id="1210" media="(min-width: 0px)" srcset="https://i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=76d3a239d8021111d87de76c0456806c 445w"><img alt="Abigail Breslin and Alec Baldwin in the film adaptation of Picoult’s novel My Sister’s Keeper." class="dcr-1989ovb" data-dcnode-id="1209" height="2573" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.guim.co.uk/img/media/84c2d94ecb1631bc1e72464d5065b9c2afad3a74/0_279_4290_2573/master/4290.jpg%3Fwidth%3D445%26quality%3D45%26auto%3Dformat%26fit%3Dmax%26dpr%3D2%26s%3Df73526c32a790b75b71e5d1a194e2aec&amp;raw" width="4290"></picture></div><figcaption class="dcr-5yynor" data-dcnode-id="1200"><span class="dcr-1usbar2" data-dcnode-id="1204"><svg data-dcnode-id="1205" height="13" viewBox="0 0 18 13" width="18"><path d="M18 3.5v8l-1.5 1.5h-15l-1.5-1.5v-8l1.5-1.5h3.5l2-2h4l2 2h3.5l1.5 1.5zm-9 7.5c1.9 0 3.5-1.6 3.5-3.5s-1.6-3.5-3.5-3.5-3.5 1.6-3.5 3.5 1.6 3.5 3.5 3.5z" data-dcnode-id="1206"></path></svg></span><span class="dcr-1f2y4fi" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Subtly carved space … Abigail Breslin and Alec Baldwin in the film adaptation of Picoult’s novel My Sister’s Keeper.</span></span><span data-dcnode-id="1201" instrument_node=""> Photograph: Sidney Baldwin</span></figcaption></figure><p class="dcr-139bh9t" data-dcnode-id="1185"><strong data-dcnode-id="1195"><span data-dcnode-id="1198" instrument_node="">2. </span><a data-dcnode-id="1196" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2014/aug/20/rebecca-daphne-du-maurier-classic-literature"><span data-dcnode-id="1197" instrument_node="">Rebecca </span></a></strong><strong data-dcnode-id="1192"><a data-dcnode-id="1193" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2014/aug/20/rebecca-daphne-du-maurier-classic-literature"><span data-dcnode-id="1194" instrument_node="">by Daphne Du Maurier</span></a></strong><strong data-dcnode-id="1189"><span data-dcnode-id="1191" instrument_node=""> </span><br data-dcnode-id="1190"></strong><span data-dcnode-id="1188" instrument_node="">A psychological suspense classic about a woman who marries a man she adores, only to discover that he, his home and his staff are apparently still obsessed by his far more charismatic first wife, to whom our heroine fears she can never measure up. Without revealing anything that’s gone before to be a lie, the twist changes the meaning of everything we’ve seen so far and provides the novel with an exemplary and memorable resolution.</span><strong data-dcnode-id="1186"><br data-dcnode-id="1187"></strong></p><p class="dcr-139bh9t" data-dcnode-id="1176"><strong data-dcnode-id="1181"><span data-dcnode-id="1184" instrument_node="">3. </span><a data-dcnode-id="1182" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2013/dec/09/100-best-novels-jane-eyre"><span data-dcnode-id="1183" instrument_node="">Jane Eyre by Charlotte Brontë</span></a></strong><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">Not all superb twists need to come at the end. There’s a twist in the middle of this classic novel that takes it to another level of passion, intrigue and excitement. There are hints before the big reveal, but not even the most imaginative reader would dare to imagine the truth. Twists in the middles of stories rather than at their ends tend to say: “And what do we all think now?” rather than, “So THIS is what we’re supposed to think!” – and this one does that brilliantly.</span><strong data-dcnode-id="1177"><br data-dcnode-id="1178"></strong></p><figure class="dcr-10khgmf" data-dcnode-id="1151" data-spacefinder-role="inline" data-spacefinder-type="model.dotcomrendering.pageElements.ImageBlockElement" id="51dd6b90-48bb-456a-b688-7135d8beabcc"><div class="dcr-1b267dg" data-dcnode-id="1159"><picture data-dcnode-id="1160" itemprop="contentUrl"><source data-dcnode-id="1175" media="(min-width: 980px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 980px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=3e883df71f3613e4a23c12b051165e3a 1240w"><source data-dcnode-id="1174" media="(min-width: 980px)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=620&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=f294875b5595ce4268340f449a130180 620w"><source data-dcnode-id="1173" media="(min-width: 740px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 740px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=3e883df71f3613e4a23c12b051165e3a 1240w"><source data-dcnode-id="1172" media="(min-width: 740px)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=620&amp;quality=85&amp; d="1165" media="(min-width: 320px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 320px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=8c5573808a42e0af5f99b0c2594c7900 890w"><source data-dcnode-id="1164" media="(min-width: 320px)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=7227e35c5accd83653709990d1caf4b7 445w"><source data-dcnode-id="1163" media="(min-width: 0px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 0px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=8c5573808a42e0af5f99b0c2594c7900 890w"><source data-dcnode-id="1162" media="(min-width: 0px)" srcset="https://i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=7227e35c5accd83653709990d1caf4b7 445w"><img alt="Mia Wasikowska as Jane Eyre." class="dcr-1989ovb" data-dcnode-id="1161" height="1801" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.guim.co.uk/img/media/1556f829d26ed907b44250070d1688b2cebe7f5b/0_192_3000_1801/master/3000.jpg%3Fwidth%3D445%26quality%3D45%26auto%3Dformat%26fit%3Dmax%26dpr%3D2%26s%3D8c5573808a42e0af5f99b0c2594c7900&amp;raw" width="3000"></picture></div><figcaption class="dcr-5yynor" data-dcnode-id="1152"><span class="dcr-1usbar2" data-dcnode-id="1156"><svg data-dcnode-id="1157" height="13" viewBox="0 0 18 13" width="18"><path d="M18 3.5v8l-1.5 1.5h-15l-1.5-1.5v-8l1.5-1.5h3.5l2-2h4l2 2h3.5l1.5 1.5zm-9 7.5c1.9 0 3.5-1.6 3.5-3.5s-1.6-3.5-3.5-3.5-3.5 1.6-3.5 3.5 1.6 3.5 3.5 3.5z" data-dcnode-id="1158"></path></svg></span><span class="dcr-1f2y4fi" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Twist in the middle … Mia Wasikowska as Jane Eyre.</span></span><span data-dcnode-id="1153" instrument_node=""> Photograph: BBC Films/Sportsphoto Ltd/Allstar</span></figcaption></figure><p class="dcr-139bh9t" data-dcnode-id="1137"><strong data-dcnode-id="1147"><span data-dcnode-id="1150" instrument_node="">4. </span><a data-dcnode-id="1148" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2011/apr/16/before-i-sleep-sj-watson-review"><span data-dcnode-id="1149" instrument_node="">Before I Go to Sleep </span></a></strong><strong data-dcnode-id="1144"><a data-dcnode-id="1145" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2011/apr/16/before-i-sleep-sj-watson-review"><span data-dcnode-id="1146" instrument_node="">by SJ Watson</span></a></strong><strong data-dcnode-id="1141"><span data-dcnode-id="1143" instrument_node=""> </span><br data-dcnode-id="1142"></strong><span data-dcnode-id="1140" instrument_node="">An unputdownable novel about a woman who loses her memory every night as she sleeps, and wakes each next morning remembering nothing. The author expertly leads the reader to assume that there is a binary choice in terms of who and what to suspect, and then reveals at the last moment that there is a third and even more terrifying possibility…</span><strong data-dcnode-id="1138"><br data-dcnode-id="1139"></strong></p><p class="dcr-139bh9t" data-dcnode-id="1122"><strong data-dcnode-id="1133"><span data-dcnode-id="1136" instrument_node="">5. </span><a data-dcnode-id="1134" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/film/2011/may/17/lionel-shriver-we-need-talk-kevin"><span data-dcnode-id="1135" instrument_node="">We Need to Talk About Kevin </span></a></strong><strong data-dcnode-id="1129"><a data-dcnode-id="1131" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/film/2011/may/17/lionel-shriver-we-need-talk-kevin"><span data-dcnode-id="1132" instrument_node="">by Lionel Shriver</span></a><br data-dcnode-id="1130"></strong><span data-dcnode-id="1128" instrument_node="">You can tell when a twist is brilliant, because copycats spring up all over. The twist at the end of Lionel Shriver’s masterpiece about a school shooting and a difficult mother-son relationship is one that literally takes your breath away. I’ve read two novels since that have copied and pasted Shriver’s twist as if it hadn’t been done before (or perhaps they simply hadn’t read </span><em data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Kevin</span></em><span data-dcnode-id="1125" instrument_node="">!). Either way, neither of the copycats used the twist with Shriver’s panache.</span><strong data-dcnode-id="1123"><br data-dcnode-id="1124"></strong></p><figure class="dcr-10khgmf" data-dcnode-id="1097" data-spacefinder-role="inline" data-spacefinder-type="model.dotcomrendering.pageElements.ImageBlockElement" id="008b8342-66d3-4679-9658-e739c226323e"><div class="dcr-1b267dg" data-dcnode-id="1105"><picture data-dcnode-id="1106" itemprop="contentUrl"><source data-dcnode-id="1121" media="(min-width: 980px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 980px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/44cadabb47048ca38e301698786c66e31b0fceae/0_94_4288_2573/master/4288.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=7e5b72e7fd70607707d29e6d1ca1caad 1240w"><source data-dcnode-id="1120" media="(min-width: 980px)" srcset="https://i.guim.co.uk/img/media/44cadabb47048ca38e301698786c66e31b0fceae/0_94_4288_2573/master/4288.jpg?width=620&amp;quality= /chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.guim.co.uk/img/media/44cadabb47048ca38e301698786c66e31b0fceae/0_94_4288_2573/master/4288.jpg%3Fwidth%3D445%26quality%3D45%26auto%3Dformat%26fit%3Dmax%26dpr%3D2%26s%3D68c42168aba7df37a69e8c02c527e722&amp;raw" width="4288"></picture></div><figcaption class="dcr-5yynor" data-dcnode-id="1098"><span class="dcr-1usbar2" data-dcnode-id="1102"><svg data-dcnode-id="1103" height="13" viewBox="0 0 18 13" width="18"><path d="M18 3.5v8l-1.5 1.5h-15l-1.5-1.5v-8l1.5-1.5h3.5l2-2h4l2 2h3.5l1.5 1.5zm-9 7.5c1.9 0 3.5-1.6 3.5-3.5s-1.6-3.5-3.5-3.5-3.5 1.6-3.5 3.5 1.6 3.5 3.5 3.5z" data-dcnode-id="1104"></path></svg></span><span class="dcr-1f2y4fi" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Inspiration for copycats... We Need to Talk About Kevin.</span></span><span data-dcnode-id="1099" instrument_node=""> Photograph: Nicole Rivelli photography/Publicity image from film company</span></figcaption></figure><p class="dcr-139bh9t" data-dcnode-id="1086"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">6. Innocent Blood </span></strong><strong data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">by </span><a data-dcnode-id="1092" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/pdjames"><span data-dcnode-id="1093" instrument_node="">PD James</span></a><br data-dcnode-id="1091"></strong><span data-dcnode-id="1089" instrument_node="">I know I don’t have to choose a No 1 - this is, after all, a top 10 - but this novel contains my favourite twist in all of crime fiction. Halfway through this story of an adopted young woman determined to trace her biological parents, there is a twist that made me leap up off my sun-lounger and yell at random holiday makers that they needed to read this book urgently. I won’t say any more - just, please, read it.</span><strong data-dcnode-id="1087"><br data-dcnode-id="1088"></strong></p><p class="dcr-139bh9t" data-dcnode-id="1075"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">7. Shutter Island </span></strong><strong data-dcnode-id="1080"><span data-dcnode-id="1083" instrument_node="">by </span><a data-dcnode-id="1081" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/culture/2009/jan/24/dennis-lehane"><span data-dcnode-id="1082" instrument_node="">Dennis Lehane</span></a></strong><strong data-dcnode-id="1077"><span data-dcnode-id="1079" instrument_node=""> </span><br data-dcnode-id="1078"></strong><span data-dcnode-id="1076" instrument_node="">This novel about a US Marshal trapped on an island, trying to find an escaped murderer in a sanatorium, has a twist of such audacity, I’m not sure I’d have dared, but I’m very glad Lehane did. It’s so bold and all-encompassing, it’s perfect.</span></p><figure class="dcr-10khgmf" data-dcnode-id="1050" data-spacefinder-role="inline" data-spacefinder-type="model.dotcomrendering.pageElements.ImageBlockElement" id="dab0c9a7-ffc2-4295-8211-60de6909d951"><div class="dcr-1b267dg" data-dcnode-id="1058"><picture data-dcnode-id="1059" itemprop="contentUrl"><source data-dcnode-id="1074" media="(min-width: 980px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 980px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=620&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=c9ec64558d744ff2ca32517ec594fb37 1240w"><source data-dcnode-id="1073" media="(min-width: 980px)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=620&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=80fc1d1b827876a86618405a8f74fd3d 620w"><source data-dcnode-id="1072" media="(min-width: 740px) and (-webkit-min-device-pixel-ratio: 1.25), (m 8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=6c1ef64b210e2470efe6cdac89928e6b 890w"><source data-dcnode-id="1065" media="(min-width: 375px)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=c332081b516419b73e3a7e0e14d04995 445w"><source data-dcnode-id="1064" media="(min-width: 320px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 320px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=6c1ef64b210e2470efe6cdac89928e6b 890w"><source data-dcnode-id="1063" media="(min-width: 320px)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=c332081b516419b73e3a7e0e14d04995 445w"><source data-dcnode-id="1062" media="(min-width: 0px) and (-webkit-min-device-pixel-ratio: 1.25), (min-width: 0px) and (min-resolution: 120dpi)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=45&amp;auto=format&amp;fit=max&amp;dpr=2&amp;s=6c1ef64b210e2470efe6cdac89928e6b 890w"><source data-dcnode-id="1061" media="(min-width: 0px)" srcset="https://i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg?width=445&amp;quality=85&amp;auto=format&amp;fit=max&amp;s=c332081b516419b73e3a7e0e14d04995 445w"><img alt="Leonardo DiCaprio and Mark Ruffalo in the film of Shutter Island." class="dcr-1989ovb" data-dcnode-id="1060" height="1800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.guim.co.uk/img/media/81c46649c16e1dc8bb0bd991096eea7c3029960e/0_0_3000_1800/master/3000.jpg%3Fwidth%3D445%26quality%3D45%26auto%3Dformat%26fit%3Dmax%26dpr%3D2%26s%3D6c1ef64b210e2470efe6cdac89928e6b&amp;raw" width="3000"></picture></div><figcaption class="dcr-5yynor" data-dcnode-id="1051"><span class="dcr-1usbar2" data-dcnode-id="1055"><svg data-dcnode-id="1056" height="13" viewBox="0 0 18 13" width="18"><path d="M18 3.5v8l-1.5 1.5h-15l-1.5-1.5v-8l1.5-1.5h3.5l2-2h4l2 2h3.5l1.5 1.5zm-9 7.5c1.9 0 3.5-1.6 3.5-3.5s-1.6-3.5-3.5-3.5-3.5 1.6-3.5 3.5 1.6 3.5 3.5 3.5z" data-dcnode-id="1057"></path></svg></span><span class="dcr-1f2y4fi" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Bold … Leonardo DiCaprio and Mark Ruffalo in the film of Shutter Island.</span></span><span data-dcnode-id="1052" instrument_node=""> Photograph: Paramount Pictures/Sportsphoto Ltd/Allstar</span></figcaption></figure><p class="dcr-139bh9t" data-dcnode-id="1038"><strong data-dcnode-id="1046"><span data-dcnode-id="1049" instrument_node="">8. </span><a data-dcnode-id="1047" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2012/may/20/gillian-flynn-gone-girl-review"><span data-dcnode-id="1048" instrument_node="">Gone Girl </span></a></strong><strong data-dcnode-id="1043"><a data-dcnode-id="1044" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2012/may/20/gillian-flynn-gone-girl-review"><span data-dcnode-id="1045" instrument_node="">by Gillian Flynn</span></a></strong><strong data-dcnode-id="1040"><span data-dcnode-id="1042" instrument_node=""> </span><br data-dcnode-id="1041"></strong><span data-dcnode-id="1039" instrument_node="">This brilliant thriller contains a meta-twist, devised and inflicted by a central character within the novel rather than the author herself. It’s a middle-twist rather than an end-twist, and the character responsible spends much of the novel afterward boasting about it. It works exceptionally well.</span></p><p class="dcr-139bh9t" data-dcnode-id="1027"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">9. The Secret House of Death </span></strong><strong data-dcnode-id="1032"><span data-dcnode-id="1035" instrument_node="">by </span><a data-dcnode-id="1033" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/ruth-rendell"><span data-dcnode-id="1034" instrument_node="">Ruth Rendell</span></a></strong><strong data-dcnode-id="1029"><span data-dcnode-id="1031" instrument_node=""> </span><br data-dcnode-id="1030"></strong><span data-dcnode-id="1028" instrument_node="">A brilliant crime novel by one of the UK’s finest crime writers, in which the murder itself is the twist. You won’t understand what I mean by that – so you must read the book! The last line, which underscores how profoundly the reader has been fooled, sent a shiver down my spine.</span></p><p class="dcr-139bh9t" data-dcnode-id="1015"><strong data-dcnode-id="1023"><span data-dcnode-id="1026" instrument_node="">10. </span><a data-dcnode-id="1024" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodreporter.com/news/domestic-thriller-behind-closed-doors-getting-movie-adaptation-979181"><span data-dcnode-id="1025" instrument_node="">Behind Closed Doors </span></a></strong><strong data-dcnode-id="1020"><a data-dcnode-id="1021" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodreporter.com/news/domestic-thriller-behind-closed-doors-getting-movie-adaptation-979181"><span data-dcnode-id="1022" instrument_node="">by BA Paris</span></a></strong><strong data-dcnode-id="1017"><span data-dcnode-id="1019" instrument_node=""> </span><br data-dcnode-id="1018"></strong><span data-dcnode-id="1016" instrument_node="">I’m not sure all readers would recognise that this is a twist-based story, but it is. It twists our expectations of the entire psychological thriller genre. The novel begins as a portrait of a marriage in which the wife seems to be a little nervous around her husband… What could possibly be going on? Is he abusive? Does she have a guilty secret? I liked this novel from the start, but a few chapters in, one of the main characters provides information that’s so startling, it shakes up all of the reader’s expectations about the genre they think they’re reading, making the rest of the story all the more exciting.</span></p><ul class="dcr-139bh9t" data-dcnode-id="1006"><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1008"><span data-dcnode-id="1013" instrument_node="">Did You See Melody? by Sophie Hannah is published by Faber on 24 August, priced £12.99. </span><a data-dcnode-id="1011" data-link-name="in body link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookshop.theguardian.com/did-you-see-melody.html"><span data-dcnode-id="1012" instrument_node="">You can pre-order it from the Guardian Bookshop for £11.04, including free UK p&amp;p</span></a><span data-dcnode-id="1010" instrument_node="">.</span><br data-dcnode-id="1009"></li><span data-dcnode-id="1007" instrument_node="">
