</span></button></div></div></div></div></div></div><article class="list_listArticle__3khJ1" data-dcnode-id="452" role="main"><div class="container_container__1FDQv container_isFullWidth__3leax" data-dcnode-id="1128"><div class="container_innerContainer__3qB8K" data-dcnode-id="1129"><header class="ListHeader_listHeader__3HBcw" data-dcnode-id="1130"><div class="ListHeader_titleWrapper__2o9St" data-dcnode-id="1131"><div class="container_container__1FDQv" data-dcnode-id="1132"><div class="container_innerContainer__3qB8K" data-dcnode-id="1133"><div class="title_main__RVrtv" data-dcnode-id="1134" data-nosnippet="true"><div class="title_aboveTitleContainer__18UY3" data-dcnode-id="1160"><div class="tag_tag__qfOB- title_tagWrapper__fbWJs tag_list__vIfRp tag_big__3yPj0" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Unspeakable Times</span></div></div><h1 class="title_title__1MOMu" data-dcnode-id="1157" style="margin-bottom:10px"><span data-dcnode-id="1158" style="margin-right:15px"><span data-dcnode-id="1159" instrument_node="">12 True Crime Cases With Unexpected Plot Twists</span></span></h1><div class="byline_main__3hgTG" data-dcnode-id="1135"><img alt="Chrissy Rose" class="byline_authorImage__15boh" data-dcnode-id="1156" height="56" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_img/22599/112994620/original/112994620-u1%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26crop%3Dfaces%26h%3D56%26w%3D56&amp;raw" width="56"><div class="byline_textWrapper__yeMBl" data-dcnode-id="1136"><div data-dcnode-id="1153"><a class="byline_name__15EbD byline_authorLink__3RaEf" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/writer/chrissy-rose" rel="author" title="View Chrissy Rose's profile"><span data-dcnode-id="1155" instrument_node="">Chrissy Rose</span></a></div><div data-dcnode-id="1137"><div class="stats_main__2WISH" data-dcnode-id="1138"><span data-dcnode-id="1149"><span data-dcnode-id="1152" instrument_node="">Updated </span><span data-dcnode-id="1150" instrument_node="">October 25, 2021 </span></span><span data-dcnode-id="1143"><span data-dcnode-id="1148" instrument_node=""> </span><span data-dcnode-id="1146" instrument_node="">446.6k</span><span data-dcnode-id="1144" instrument_node=""> views</span></span><span data-dcnode-id="1139"><span data-dcnode-id="1142" instrument_node="">12</span><span data-dcnode-id="1140" instrument_node=""> items</span></span></div></div></div></div></div></div></div></div></header></div></div><div class="container_container__1FDQv" data-dcnode-id="1109"><div class="container_innerContainer__3qB8K" data-dcnode-id="1110"><div class="description_main__3Ehfh ck-content" data-dcnode-id="1111"><div class="description_text__3Xyg2 description_-full__3-HBT" data-dcnode-id="1112" data-testid="expandable-div" style="max-height:auto"><div data-dcnode-id="1113"><p data-dcnode-id="1120"><span data-dcnode-id="1127" instrument_node="">From Agatha Christie to </span><span class="edS-i" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Clue</span></span><span data-dcnode-id="1124" instrument_node="">, everybody loves a good "whodunit" mystery&nbsp;with a surprise&nbsp;ending. But sometimes, </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ranker.com/list/little-known-mysteries-with-answers/jason-f-collins" target="_blank"><span data-dcnode-id="1123" instrument_node="">truth is even stranger than fiction</span></a><span data-dcnode-id="1121" instrument_node="">. Many of these true crime stories seemed like open-and-shut cases. Too often, though,&nbsp;the public can jump to conclusions, ignoring all other possibilities. When investigators do the same, they set themselves up for major plot twists and sometimes even wrongful convictions.&nbsp;</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">True crime junkies may have heard of some of these </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/list/unexplained-mysteries-that-were-solved/setareh-janda" target="_blank"><span data-dcnode-id="1117" instrument_node="">mind-boggling&nbsp;mysteries</span></a><span data-dcnode-id="1115" instrument_node=""> in the many rabbit holes of the internet, but others have flown completely under the radar. From the disturbing cases, to the ones with happy endings, to the&nbsp;multiple cases&nbsp;involving bubble gum, all of these unbelievable true crime plot twists will leave your head spinning.&nbsp;</span></p></div></div></div></div></div><div class="container_container__1FDQv" data-dcnode-id="453"><div class="container_innerContainer__3qB8K" data-dcnode-id="454"><div class="list_contentContainer__XVNsa" data-dcnode-id="455"><div class="blogView_main__332IP" data-dcnode-id="456"><div data-dcnode-id="1107"><div data-dcnode-id="1108" id="MOBILE_GRID_NATIVE_01"></div></div><ul data-dcnode-id="458"><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="1049" role="listitem"><meta content="//www.ranker.com/review/1002518938" data-dcnode-id="1106" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="1088"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="1104"><img alt="Police Said 10-Day-Old Delimar Vera Perished In A House Fire, But Her Mother Was Convinced She'd Been Abducted" class="" data-dcnode-id="1105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_node_img/50126/1002518938/original/1002518938-photo-u1%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26w%3D375&amp;raw" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="1089"><span data-dcnode-id="1103" instrument_node="">Photo</span><span data-dcnode-id="1102" instrument_node="">:</span><span data-dcnode-id="1101" instrument_node=""> </span><span data-dcnode-id="1100" instrument_node=""></span><a class="" data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/peterjhill/" rel="noreferrer" target="_blank"><span data-dcnode-id="1099" instrument_node="">Peter Hill</span></a><span data-dcnode-id="1097" instrument_node=""> / </span><span data-dcnode-id="1096" instrument_node=""></span><a class="" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/peterjhill/19913040646" rel="noreferrer" target="_blank"><span data-dcnode-id="1095" instrument_node="">Flickr</span></a><span data-dcnode-id="1093" instrument_node=""> / </span><span data-dcnode-id="1092" instrument_node=""></span><a class="" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0/legalcode" rel="noreferrer" target="_blank"><span data-dcnode-id="1091" instrument_node="">CC-BY 2.0</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="1082"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="1083"><meta content="Police Said 10-Day-Old Delimar Vera Perished In A House Fire, But Her Mother Was Convinced She'd Been Abducted" data-dcnode-id="1087" itemprop="name"><meta content="1" data-dcnode-id="1086" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Police Said 10-Day-Old Delimar Vera Perished In A House Fire, But Her Mother Was Convinced She'd Been Abducted</span></h2></div></div><div data-dcnode-id="1051"><meta content="Just before Christmas in 1997, a fire started in the Philadelphia home of Luz Cuevas. Fighting through the smoke and flames, she ran into the room where her 10-day-old daughter, Delimar, was sleeping in her crib, but saw no sign..." data-dcnode-id="1081" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="1052" data-testid="RichText"><span data-dcnode-id="1053"><p data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">Just before Christmas in 1997, a fire started in the Philadelphia home of Luz Cuevas. Fighting through the smoke and flames, she ran into the room where her 10-day-old daughter, Delimar, was sleeping in her crib, but saw </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2004/US/Northeast/03/01/girl.found.alive/" target="_blank"><span data-dcnode-id="1079" instrument_node="">no sign of her</span></a><span data-dcnode-id="1077" instrument_node="">. Suffering burns to her face and at risk of passing out from smoke inhalation, she got out of the house with her two other children.&nbsp;</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1074" instrument_node="">Firefighters quickly put the blaze out, which was primarily contained to the baby's room. After an initial search for the newborn, authorities determined she had perished in the fire, which they said was caused by an overheated extension cord on a&nbsp;space heater. Human remains were never found in the debris, but investigators concluded any remains had been incinerated in the flames. Cuevas, however, insisted that her child had been kidnapped. But, because there was </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tampabay.com/archive/2004/03/07/daughter-lost-in-fire-returns-but-questions-swirl-in-family/" target="_blank"><span data-dcnode-id="1073" instrument_node="">no evidence of a kidnapping</span></a><span data-dcnode-id="1071" instrument_node="">&nbsp;aside from her desperate&nbsp;pleas, it was considered a closed case.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">For six years, Cuevas mourned the loss of her child and wondered what had truly become of her. In 2003, at a birthday party for an acquaintance, Cuevas saw a little girl who looked strikingly like her other children and was the exact same age as her lost&nbsp;Delimar. She was able to obtain some of the girl's hair that day under the&nbsp;ruse of getting bubblegum out of her hair.&nbsp;With assistance from a state legislator, she had police open an investigation and test the hair for DNA. The test proved that 6-year-old "Aaliyah Hernandez" was actually her daughter, Delimar Vera.&nbsp;</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node="">The woman who </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buffalonews.com/news/girl-6-parents-reunited-mother-thought-baby-died-in-a-fire/article_d53c9f97-97f7-59ee-a9f1-697b2849f59d.html" target="_blank"><span data-dcnode-id="1064" instrument_node="">kidnapped Delimar</span></a><span data-dcnode-id="1062" instrument_node="">&nbsp;was Carolyn Correa, a cousin of the child's father, Pedro Vera. Cuevas and Correa had only met the day before the fire, when Correa came by the house. The following day, Correa returned,&nbsp;claiming she had left her purse upstairs. The blaze started as Correa left the house.&nbsp;</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Delimar, still going by Aaliyah, was reunited with her parents the next year, who were both given custody. Her abductor was convicted of </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2004/mar/12/gender.uk" target="_blank"><span data-dcnode-id="1058" instrument_node="">kidnapping, arson, and other crimes</span></a><span data-dcnode-id="1056" instrument_node="">.</span></p><span data-dcnode-id="1054" instrument_node="">
</span></span></div></div><div data-dcnode-id="1050" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="1046" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="1047"><div class="ra-ad-container" data-dcnode-id="1048" id="MOBILE_BLOG_BTF_01"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="996" role="listitem"><meta content="//www.ranker.com/review/1002518955" data-dcnode-id="1045" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="1029"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="1043"><img alt="Dolly Oesterreich Claimed Her Husband Was Killed By A Burglar, But It Was Actually Her Lover, Whom She Kept Locked Up In The Attic" class="" data-dcnode-id="1044" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_node_img/50126/1002518955/original/1002518955-photo-u2%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26w%3D375&amp;raw" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="1030"><span data-dcnode-id="1042" instrument_node="">Photo</span><span data-dcnode-id="1041" instrument_node="">:</span><span data-dcnode-id="1040" instrument_node=""> </span><span data-dcnode-id="1039" instrument_node="">Los Angeles Times photographic archive</span><span data-dcnode-id="1038" instrument_node=""> / </span><span data-dcnode-id="1037" instrument_node=""></span><a class="" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AWalburga_Oesterreich%2C_circa_1930_%28crop%29.jpg" rel="noreferrer" target="_blank"><span data-dcnode-id="1036" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="1034" instrument_node=""> / </span><span data-dcnode-id="1033" instrument_node=""></span><a class="" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/publicdomain/zero/1.0/" rel="noreferrer" target="_blank"><span data-dcnode-id="1032" instrument_node="">Public domain</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="1023"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="1024"><meta content="Dolly Oesterreich Claimed Her Husband Was Killed By A Burglar, But It Was Actually Her Lover, Whom She Kept Locked Up In The Attic" data-dcnode-id="1028" itemprop="name"><meta content="2" data-dcnode-id="1027" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Dolly Oesterreich Claimed Her Husband Was Killed By A Burglar, But It Was Actually Her Lover, Whom She Kept Locked Up In The Attic</span></h2></div></div><div data-dcnode-id="998"><meta content="A petrified wife&amp;nbsp;locked in the closet. Her husband, shot dead, lying on the bedroom floor. That&amp;nbsp;was the scene police officers discovered after responding to reports of shots fired in a Southern California home in 1922...." data-dcnode-id="1022" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="999" data-testid="RichText"><span data-dcnode-id="1000"><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">A petrified wife&nbsp;locked in the closet. Her husband, shot dead, lying on the bedroom floor. That&nbsp;was the scene police officers discovered after responding to reports of shots fired in a Southern California home in 1922. It looked like a&nbsp;robbery gone wrong, and that was the wife's story. But the </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/dolly-oesterreich" target="_blank"><span data-dcnode-id="1020" instrument_node="">tale of Dolly Oesterreich</span></a><span data-dcnode-id="1018" instrument_node=""> was far more complex.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Walburga "Dolly" Oesterreich and Fred William Oesterreich had been married for about 25 years at the time of the shooting. Fred worked long hours and often preferred laying his hands on a bottle of whiskey over his wife. So one day, when Fred sent Otto Sanhuber, a 17-year-old working at his factory, over to the house to repair Dolly's sewing machine, Otto and Dolly began having an affair. But with nosy neighbors and the inconvenience of hotel rooms, the two were perplexed as to&nbsp;how they could see each other often without getting caught. Then, Dolly had the idea to hide Otto in her attic.&nbsp;</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">During the day, Otto and Dolly would cavort around the house, make bathtub gin, and spend as much time together as they liked. At night, Otto would retreat to his tiny lair to&nbsp;write pulp&nbsp;fiction novels and hide until the following day. When the Oesterreichs moved from Milwaukee to Los Angeles, Dolly's secret attic lover moved with them.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">One night, Otto heard Dolly and Fred arguing loudly. He came to his lover's defense with a pistol. A struggle over the guns ensued, and Fred was shot and killed. Otto set the scene by locking&nbsp;Dolly in the closet&nbsp;and hiding himself away in the attic, along with the guns. For years, police believed </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.milwaukeemag.com/the-legend-of-milwaukees-most-infamous-love-triangle/" target="_blank"><span data-dcnode-id="1008" instrument_node="">Dolly's story</span></a><span data-dcnode-id="1006" instrument_node="">&nbsp;of a robbery gone wrong, as there was simply no evidence to the contrary.&nbsp;</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">That is, until nearly a decade after the murder, when a subsequent boyfriend of Dolly's admitted to police that she'd asked him to ditch a gun in the nearby tar pits, and a neighbor came forward saying she had similarly asked him to bury a gun for her. Though Dolly had both another boyfriend and another husband, Otto had continued to live in the attic for much of the decade. But by the time authorities had enough evidence to arrest Otto, the statute of limitations on manslaughter charges had&nbsp;run out, and a hung jury failed to find Dolly guilty of conspiracy. Both walked free, although they seemingly went their separate ways at last.</span></p><span data-dcnode-id="1001" instrument_node="">
</span></span></div></div><div data-dcnode-id="997" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="993" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="994"><div class="ra-ad-container" data-dcnode-id="995" id="MOBILE_BLOG_BTF_02"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="928" role="listitem"><meta content="//www.ranker.com/review/1002519084" data-dcnode-id="992" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="978"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="990"><img alt="Sandra Boss Didn't Discover Her Husband's True Identity For 11 Years" class="lazyloaded" data-dcnode-id="991" data-src="https://imgix.ranker.com/user_node_img/50126/1002519084/original/1002519084-photo-u1?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_node_img/50126/1002519084/original/1002519084-photo-u1%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26w%3D375&amp;raw" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="979"><span data-dcnode-id="989" instrument_node="">Photo</span><span data-dcnode-id="988" instrument_node="">:</span><span data-dcnode-id="987" instrument_node=""> </span><span data-dcnode-id="986" instrument_node=""></span><a class="" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UC7htuVs06oduI3xSfTdcxPA" rel="noreferrer" target="_blank"><span data-dcnode-id="985" instrument_node="">48 Hours</span></a><span data-dcnode-id="983" instrument_node=""> / </span><span data-dcnode-id="982" instrument_node=""></span><a class="mediaAttributes_youtube__U4o6C" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DLuzTBDHSLXU" rel="noreferrer" target="_blank"><span data-dcnode-id="981" instrument_node="">YouTube</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="972"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="973"><meta content="Sandra Boss Didn't Discover Her Husband's True Identity For 11 Years" data-dcnode-id="977" itemprop="name"><meta content="3" data-dcnode-id="976" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Sandra Boss Didn't Discover Her Husband's True Identity For 11 Years</span></h2></div></div><div data-dcnode-id="930"><meta content="In the mid &amp;#39;90s, Stanford graduate&amp;nbsp;Sandra Boss was getting her MBA at Harvard when her sister introduced her to a man named Clark Rockefeller,&amp;nbsp;descendant of the famous business family. He wore custom-made designer..." data-dcnode-id="971" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="931" data-testid="RichText"><span data-dcnode-id="932"><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">In the mid '90s, Stanford graduate&nbsp;Sandra Boss was getting her MBA at Harvard when her sister introduced her to </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UC7htuVs06oduI3xSfTdcxPA" target="_blank"><span data-dcnode-id="969" instrument_node="">a man named Clark Rockefeller</span></a><span data-dcnode-id="967" instrument_node="">,&nbsp;descendant of the famous business family. He wore custom-made designer clothing, collected expensive art, and had an upscale New York apartment. Boss was charmed, and the two married shortly thereafter.&nbsp;</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="961"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/2011/07/10/137624164/30-year-con-from-german-kid-to-rockefeller-scion" target="_blank"><span data-dcnode-id="964" instrument_node="">Boss and Rockefeller</span></a><span data-dcnode-id="962" instrument_node=""> spent the next 11 years together. They enjoyed a stable life, thanks in large part to Boss's job as a consultant and personal wealth. The two had a&nbsp;daughter, Reigh Storrow Mills Rockefeller, lovingly referred to as "Snooks," in 2001. But&nbsp;their marriage soon began to crack. Rockefeller&nbsp;was a stay-at-home dad, and didn't hesitate to spend Boss's money to keep up his appearances. His stories, too, became inconsistent. And Boss was often baffled when Rockefeller would suddenly insist, seemingly out of the blue, that they needed to&nbsp;move. Again.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Boss served Rockefeller&nbsp;with divorce papers in 2007. Since her husband&nbsp;was jobless and a complete mystery, Boss was awarded full custody. In 2008, Clark Rockefeller was enjoying one of the three court-approved visitations with his daughter as his ex-wife waited in a Boston hotel room nearby. While walking through Boston Common, Rockefeller disappeared with his daughter.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">As investigators attempted to track down Rockefeller, they found </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/style/2009/01/fake_rockefeller200901" target="_blank"><span data-dcnode-id="955" instrument_node="">more questions than answers</span></a><span data-dcnode-id="953" instrument_node="">. He didn't have a Social Security card, a driver's license, or even a credit card in his own name. When his picture was shown on the news asking for leads, callers gave at least four different identities to go with the man shown on-screen. Investigators were flummoxed.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Then, a friend came forward with what would become crucial evidence: Rockefeller had had a glass of wine at his house the night before, and the glass had not been washed. Police lifted prints off the glass and got a match to one Christian Karl Gerhartstreiter, a German immigrant who had come to the United States almost 30&nbsp;years earlier.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Gerhartstreiter&nbsp;grew up in a middle-class family in a small town in Germany. He moved to the US as a teenager, where he stayed with a Connecticut family while claiming to be an exchange student at a local high school. He later got married and divorced, landing a green card, and moved to Los Angeles under the name of Christopher Chichester.&nbsp;He made himself at home in an upper-class neighborhood, weaving a tale of royal English ancestry and proclaiming himself a TV producer. He lived in the back house of&nbsp;a woman named Didi Sohus. Her son and daughter-in-law, John and Linda Sohus, lived on the property, as well. The two went missing in 1985, and Christopher Chichester disappeared shortly afterwards.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The skeletal remains of the couple were discovered in the backyard of the house in 1994, but by that time, Christopher Chichester had become Christopher Crowe. Crowe worked at (and was fired from) a number of&nbsp;high-level jobs on Wall Street, with no degree, no experience, and no Social Security number. As people began to catch wind of his act, and investigators tracked Sohus's missing truck back to him, he disappeared again, later turning up in Sandra Boss's life as Clark Rockefeller.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">After a five-day manhunt for him and his kidnapped daughter,&nbsp;Clark Rockefeller had become Chip Smith. But his newest alias didn't last long; the owner of the carriage house he rented called investigators, and Snooks was safely returned to her mother while Christian/Christopher/Clark/Chip was finally taken into custody.&nbsp;</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">Gerhartstreiter was </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/25491/dupe-tells-all/" target="_blank"><span data-dcnode-id="937" instrument_node="">convicted</span></a><span data-dcnode-id="935" instrument_node="">&nbsp;of kidnapping his daughter as well as the murder of John Sohus (Linda's body has never been found). He is serving a sentence of 27 years to life in prison.&nbsp;</span></p><span data-dcnode-id="933" instrument_node="">
</span></span></div></div><div data-dcnode-id="929" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="925" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="926"><div class="ra-ad-container" data-dcnode-id="927" id="MOBILE_BLOG_BTF_03"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="869" role="listitem"><meta content="//www.ranker.com/review/1002519632" data-dcnode-id="924" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="908"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="922"><img alt="For 23 Years, Sherri Rasmussen's Case Was Dismissed As A Robbery Gone Wrong" class="lazyloaded" data-dcnode-id="923" data-src="https://imgix.ranker.com/user_node_img/50126/1002519632/original/1002519632-photo-u2?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_node_img/50126/1002519632/original/1002519632-photo-u2%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26w%3D375&amp;raw" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="909"><span data-dcnode-id="921" instrument_node="">Photo</span><span data-dcnode-id="920" instrument_node="">:</span><span data-dcnode-id="919" instrument_node=""> </span><span data-dcnode-id="918" instrument_node="">Unknown</span><span data-dcnode-id="917" instrument_node=""> / </span><span data-dcnode-id="916" instrument_node=""></span><a class="" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASherri_Rasmussen.jpg" rel="noreferrer" target="_blank"><span data-dcnode-id="915" instrument_node="">Wikipedia</span></a><span data-dcnode-id="913" instrument_node=""> / </span><span data-dcnode-id="912" instrument_node=""></span><a class="" data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fairuse.stanford.edu/overview/fair-use/" rel="noreferrer" target="_blank"><span data-dcnode-id="911" instrument_node="">Fair use</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="902"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="903"><meta content="For 23 Years, Sherri Rasmussen's Case Was Dismissed As A Robbery Gone Wrong" data-dcnode-id="907" itemprop="name"><meta content="4" data-dcnode-id="906" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">For 23 Years, Sherri Rasmussen's Case Was Dismissed As A Robbery Gone Wrong</span></h2></div></div><div data-dcnode-id="871"><meta content="On February 24, 1986, John Ruetten had been trying to get a hold of his wife, Sherri Rasmussen, all day. But because she hadn&amp;#39;t felt good earlier, he didn&amp;#39;t think too much of the fact that she didn&amp;#39;t answer any of his..." data-dcnode-id="901" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="872" data-testid="RichText"><span data-dcnode-id="873"><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">On February 24, 1986, John Ruetten had been trying to get a hold of his wife, Sherri Rasmussen, all day. But because she hadn't felt good earlier, he didn't think too much of the fact that she didn't answer any of his many phone calls. Pulling into the garage of their Los Angeles-area home, he noticed glass on the ground, and Rasmussen's car missing. Still, he assumed&nbsp;she'd merely hit her mirror while backing out.&nbsp;</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">Then, Ruetten noticed the entry door was slightly ajar. He entered the house and called out his wife's name, just before he saw her, lying on the floor, motionless. Her face was </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/culture/2012/07/lapd-lazurus-murder-mystery-killer" target="_blank"><span data-dcnode-id="896" instrument_node="">bloodied and bruised</span></a><span data-dcnode-id="894" instrument_node="">. She had a bullet hole straight through her chest. He desperately checked for a pulse, but she was gone. In disbelief, he called 911.&nbsp;</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The detective assigned to the case was Lyle Mayer. He carefully documented the scene, and made note of the electronics stacked in the living room near Rasmussen's body. To him, it was clear that whoever committed the crime had intended to leave with those items, and for whatever reason had not grabbed them upon exiting the scene. He interviewed Ruetten, her newly wed husband, to do his due diligence. But in just a matter of days, he declared the incident to be one of a burglary gone wrong. &nbsp;</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">For 23 years, the case went unsolved, until Los Angeles Police Department&nbsp;detectives took another look at the case as part of their Cold Case Homicide Unit in 2009. It was then that they noticed the inconsistencies: Sherri had a bite mark on her arm which&nbsp;likely fit a woman, and most burglaries are carried out by men; Ruetten's ex-girlfriend, Stephanie Lazarus, had been&nbsp;paying unannounced visits to John's home;&nbsp;and the shattered glass on the ground that Ruetten had seen was from a bullet traveling from inside the house, not outside-in as might be expected with a break-in.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Suddenly, detectives had a prime suspect for what was apparently now premeditated murder: Stephanie Lazarus, a fellow detective of the LAPD. Before bringing her in for questioning, the detectives did some more digging. Sure enough, Lazarus had been off-duty on the day of Rasmussen's murder. And just a few weeks after the crime, she had reported a gun stolen, presumably because she had ditched the murder weapon.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Detectives interviewed Lazarus under the guise of a friendly chat amongst colleagues. They told Lazarus, who worked in art theft, that they wanted her help on a case. She gave vague answers about how well she knew (or remembered) John Ruetten&nbsp;or his wife, even when asked about reports of her jealously confronting Rasmussen over her relationship with John. But detectives didn't need her confession; they already had a positive match to her DNA.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">In 2012, Stephanie Lazarus was found guilty of </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailynews.com/2019/11/21/nbcs-dateline-to-air-special-on-murder-of-sherri-rasmussen-by-lapd-officer/" target="_blank"><span data-dcnode-id="878" instrument_node="">murdering Sherri&nbsp;Rasmussen</span></a><span data-dcnode-id="876" instrument_node="">, and given a sentence of 27 years to life in prison.</span></p><span data-dcnode-id="874" instrument_node="">
</span></span></div></div><div data-dcnode-id="870" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="866" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="867"><div class="ra-ad-container" data-dcnode-id="868" id="MOBILE_BLOG_BTF_04"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="807" role="listitem"><meta content="//www.ranker.com/review/1002519284" data-dcnode-id="865" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="853"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="863"><img alt="The Innocence Project May Have Put An Innocent Man Behind Bars" class="lazyloaded" data-dcnode-id="864" data-src="https://imgix.ranker.com/user_node_img/50126/1002519284/original/1002519284-photo-u2?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.ranker.com/user_node_img/50126/1002519284/original/1002519284-photo-u2%3Fauto%3Dformat%26q%3D60%26fit%3Dcrop%26fm%3Dpjpg%26dpr%3D2%26w%3D375&amp;raw" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="854"><span data-dcnode-id="862" instrument_node="">Photo</span><span data-dcnode-id="861" instrument_node="">:</span><span data-dcnode-id="860" instrument_node=""> </span><span data-dcnode-id="859" instrument_node="">A Murder in the Park</span><span data-dcnode-id="858" instrument_node=""> / </span><span data-dcnode-id="857" instrument_node=""></span><a class="" data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Murder-Park-Anthony-Porter/dp/B010FF7GN8%3Ftag%3Drankerimgcred-20" rel="noreferrer" target="_blank"><span data-dcnode-id="856" instrument_node="">IFC Films</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="847"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="848"><meta content="The Innocence Project May Have Put An Innocent Man Behind Bars" data-dcnode-id="852" itemprop="name"><meta content="5" data-dcnode-id="851" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The Innocence Project May Have Put An Innocent Man Behind Bars</span></h2></div></div><div data-dcnode-id="809"><meta content="In 1982, teenage sweethearts&amp;nbsp;Marilyn Green and Jerry Hillard were found murdered in Washington Park in Chicago. Anthony Porter was sentenced to death after being found guilty of the slayings in 1983. On the eve of his..." data-dcnode-id="846" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="810" data-testid="RichText"><span data-dcnode-id="811"><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">In 1982, teenage sweethearts&nbsp;Marilyn Green and Jerry Hillard were found murdered in Washington Park in Chicago. Anthony Porter was sentenced to death after being found guilty of the slayings in 1983. On the eve of his execution, he received a stay on his execution from the Illinois Supreme Court, citing concerns about his low IQ.&nbsp;</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">After Porter received the stay on his execution, journalism students at Northwestern University&nbsp;and participants in the </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedailybeast.com/a-murder-in-the-park-the-innocence-project-that-wasnt" target="_blank"><span data-dcnode-id="841" instrument_node="">Medill Innocence Project</span></a><span data-dcnode-id="839" instrument_node=""> looked at his&nbsp;case. The students, led by their professor David Protess, obtained new evidence and identified who they believed was the real killer: a man named Alstory Simon (pictured). Showing up at Simon's&nbsp;home, the self-declared investigators told him they had all of the evidence proving his guilt, and that the police were on their way to arrest him. Simon confessed to the killings, and the confession was caught on tape.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">It's worth noting that the&nbsp;"new evidence" obtained included a statement from Simon's now ex-wife and her incarcerated nephew putting Simon at the scene of the crime (this statement was later recanted). To obtain his confession, the students showed Simon video proof of another witness who said&nbsp;Simon committed the crime; however, the "witness" was an actor that the students had&nbsp;hired. Despite their shoddy and legally </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/news/2018/06/01/northwestern-wrongful-conviction-alstory-simon-david-protess/664090002/" target="_blank"><span data-dcnode-id="835" instrument_node="">questionable detective work</span></a><span data-dcnode-id="833" instrument_node="">, the students with the Innocence Project were successful in getting Alstory Simon convicted of homicide, and clearing Porter's name.&nbsp;</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Simon quickly realized that he'd been duped into confessing;&nbsp;he'd been promised&nbsp;a&nbsp;short prison sentence and subsequent big money from&nbsp;the "investigators," which failed to materialize. His defense lawyer was also a personal friend of the private investigator working with the students, and advised him to take a plea deal.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="827" instrument_node="">Simon served 15 years in prison until the county prosecutor took another look at the case and vacated his conviction, in part due to a documentary investigation into the case, </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Murder-Park-Anthony-Porter/dp/B010FF7GN8" target="_blank"><span class="edS-i" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">A Murder in the Park</span></span></a><span data-dcnode-id="823" instrument_node="">. The film showed that the journalism students neglected to interview witnesses who put Anthony Porter at the scene (and didn't fit their narrative), and suggests that Porter may have been the guilty party all along.&nbsp;</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">In 2014, Simon was finally a free man, and he promptly initiated a defamation lawsuit against the Medill Innocence Project and the school, settling for a confidential amount. According to the lawsuit:</span></p><span data-dcnode-id="818" instrument_node="">
</span><blockquote data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">With the blessing of Northwestern University, David Protess... framed an innocent man (SIMON)&nbsp;so that death row inmate Anthony Porter could become a "poster boy"&nbsp;for the bid to end executions in Illinois.</span></p><span data-dcnode-id="814" instrument_node="">
</span></blockquote><span data-dcnode-id="812" instrument_node="">
</span></span></div></div><div data-dcnode-id="808" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="804" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="805"><div class="ra-ad-container" data-dcnode-id="806" id="MOBILE_BLOG_BTF_05"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_noImageAndRank__2xWJT" data-dcnode-id="767" role="listitem"><meta content="//www.ranker.com/review/1002520154" data-dcnode-id="803" itemprop="url"><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="797"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="798"><meta content="Carolynne Watson Spent Six Days Believing She And Her Boyfriend Had Been Abducted By A Satanic Cult" data-dcnode-id="802" itemprop="name"><meta content="6" data-dcnode-id="801" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Carolynne Watson Spent Six Days Believing She And Her Boyfriend Had Been Abducted By A Satanic Cult</span></h2></div></div><div data-dcnode-id="769"><meta content="Carolynne Watson, 17, and her boyfriend Julian Buchwald, 22, were avid church-goers in the area of Melbourne, Australia. They&amp;#39;d been dating for two years when Buchwald&amp;nbsp;invited Watson on a romantic picnic in the..." data-dcnode-id="796" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="770" data-testid="RichText"><span data-dcnode-id="771"><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">Carolynne Watson, 17, and her boyfriend Julian Buchwald, 22, were avid church-goers in the area of Melbourne, Australia. They'd been dating for two years when Buchwald&nbsp;invited Watson on a romantic picnic in the Australian countryside. </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casefilepodcast.com/case-07-julian-buchwald-and-carolynne-watson/" target="_blank"><span data-dcnode-id="794" instrument_node="">As they were driving</span></a><span data-dcnode-id="792" instrument_node="">, Buchwald stopped briefly and got out to inspect a dead animal on the side of the road.&nbsp;The next thing Watson&nbsp;knew, she was being blindfolded and tied up by a balaclava-masked man, who then stripped off her clothes, threw her in the back of a trunk, and drove.&nbsp;</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">When the vehicle finally stopped, Watson's blindfold was removed by her boyfriend. Buchwald,&nbsp;too, was nude, and claimed they had both been </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theage.com.au/national/victoria/fake-indian-kidnapper-loses-appeal-20111220-1p3aq.html" target="_blank"><span data-dcnode-id="788" instrument_node="">taken by a satanic cult</span></a><span data-dcnode-id="786" instrument_node=""> and left alone in the wilderness. He managed to untie himself, and helped her do the same.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">The pair wandered through the bushland for almost a week. Despite the fact that both were very religious and had pledged to not have sex before marriage, Buchwald continuously suggested they just get married and consummate&nbsp;it then and there, in order to stay warm.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The frightening debacle came to an end when the duo were found by a farmer, who alerted the police. At first, Buchwald continued his claim that&nbsp;the two had been kidnapped. Police did have a letter left at Watson's parents' house, supposedly sent by the kidnapper, that had satanic markings all over it.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">But after being confronted by police with their suspicions, Buchwald&nbsp;quickly gave up the act and admitted he had </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyrecord.co.uk/news/uk-world-news/satanic-kidnap-fake-claim-971587" target="_blank"><span data-dcnode-id="776" instrument_node="">staged the whole thing</span></a><span data-dcnode-id="774" instrument_node="">. When asked why he would have put his girlfriend through the&nbsp;ordeal, he admitted he was trying to convince her to marry him so that they could put that celibacy stuff behind them once and for all.</span></p><span data-dcnode-id="772" instrument_node="">
</span></span></div></div><div data-dcnode-id="768" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="764" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="765"><div class="ra-ad-container" data-dcnode-id="766" id="MOBILE_BLOG_BTF_06"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="716" role="listitem"><meta content="//www.ranker.com/review/1002519712" data-dcnode-id="763" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="749"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="761"><img alt="Russ Faria Was Convicted Of Killing His Wife, But The Real Culprit Was The Prosecution's Star Witness" class="lazyload" data-dcnode-id="762" data-src="https://imgix.ranker.com/user_node_img/50126/1002519712/original/1002519712-photo-u2?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="750"><span data-dcnode-id="760" instrument_node="">Photo</span><span data-dcnode-id="759" instrument_node="">:</span><span data-dcnode-id="758" instrument_node=""> </span><span data-dcnode-id="757" instrument_node=""></span><a class="" data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCVHTypjbrXH-maZaIkwweJA" rel="noreferrer" target="_blank"><span data-dcnode-id="756" instrument_node="">KSDK News</span></a><span data-dcnode-id="754" instrument_node=""> / </span><span data-dcnode-id="753" instrument_node=""></span><a class="mediaAttributes_youtube__U4o6C" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFwWHNiexQSk" rel="noreferrer" target="_blank"><span data-dcnode-id="752" instrument_node="">YouTube</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="743"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="744"><meta content="Russ Faria Was Convicted Of Killing His Wife, But The Real Culprit Was The Prosecution's Star Witness" data-dcnode-id="748" itemprop="name"><meta content="7" data-dcnode-id="747" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Russ Faria Was Convicted Of Killing His Wife, But The Real Culprit Was The Prosecution's Star Witness</span></h2></div></div><div data-dcnode-id="718"><meta content="Betsy Faria and her husband of 10&amp;nbsp;years, Russ Faria, spent Christmas 2011 together. Earlier that year, Betsy had received a terminal cancer diagnosis, and despite the fact that the two had plenty of ups and downs in their..." data-dcnode-id="742" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="719" data-testid="RichText"><span data-dcnode-id="720"><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Betsy Faria and her husband of 10&nbsp;years, Russ Faria, spent Christmas 2011 together. Earlier that year, Betsy had received a terminal cancer diagnosis, and despite the fact that the two had plenty of ups and downs in their marriage, they were determined to make the most of their remaining time together. Two days later, that remaining time was cut short. Russ made a frantic call to 911. He said he had come home from his weekly game night with friends, and found Betsy lying&nbsp;dead in their Missouri home. She had been stabbed more than&nbsp;60 times, with a kitchen knife still protruding from her neck. He told the 911 dispatcher that he feared she'd taken her own life due to her diagnosis.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="738" instrument_node="">Investigators didn't agree, and found </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stlmag.com/longform/pam-hupp/" target="_blank"><span data-dcnode-id="737" instrument_node="">Russ's behavior&nbsp;suspicious</span></a><span data-dcnode-id="735" instrument_node="">.&nbsp;They arrested him&nbsp;for his wife's murder. Her friend and the last person to see her alive, Pamela Hupp, was the </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/dateline/pam-hupp-charged-first-degree-murder-2011-stabbing-death-betsy-n1273772" target="_blank"><span data-dcnode-id="734" instrument_node="">lead witness for the prosecution</span></a><span data-dcnode-id="732" instrument_node="">. She claimed Betsy had recently made her the beneficiary of her life insurance policy so that she could then pass the money to Betsy’s daughters from a previous marriage and bypass Russ. Furthermore, she helped detectives find a document on Betsy’s computer that detailed her alleged fear of her husband. The jury bought it, and Russ Faria was convicted of killing Betsy.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Russ appealed and eventually won a retrial, in which he was found not guilty. He was freed after spending nearly four years in prison.&nbsp;Shortly thereafter, the truth started to come out in 2016 when Hupp shot and killed Louis Gumpenberger inside her home, saying he was a </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.com/crime/russ-faria-man-framed-wifes-murder-hopes-for-new-suspects-conviction/" target="_blank"><span data-dcnode-id="728" instrument_node="">hitman hired by Russ</span></a><span data-dcnode-id="726" instrument_node="">&nbsp;to go after her.&nbsp;Gumpenberger was actually a mentally impaired man that Hupp had lured into her home to further implicate Russ.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Hupp eventually pled guilty to Gumpenberger's murder, and as of 2021 is&nbsp;awaiting trial for the murder of Betsy Faria. Prosecutors believe Hupp inserted herself into Betsy's life out of greed, killing her while she was weak after a chemotherapy appointment and framing Russ.&nbsp;None of the insurance money that Hupp received ever went to Betsy's daughters. Police have also reevaluated the death of Hupp's&nbsp;77-year-old mother, who mysteriously fell from a balcony. Hupp was the last to see her alive.</span></p><span data-dcnode-id="721" instrument_node="">
</span></span></div></div><div data-dcnode-id="717" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="713" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="714"><div class="ra-ad-container" data-dcnode-id="715" id="MOBILE_BLOG_BTF_07"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="663" role="listitem"><meta content="//www.ranker.com/review/1002520152" data-dcnode-id="712" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="698"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="710"><img alt="Netty Nance Was 24 When She Discovered She Was Actually Carlina White" class="lazyload" data-dcnode-id="711" data-src="https://imgix.ranker.com/user_node_img/50127/1002520152/original/1002520152-photo-u2?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="699"><span data-dcnode-id="709" instrument_node="">Photo</span><span data-dcnode-id="708" instrument_node="">:</span><span data-dcnode-id="707" instrument_node=""> </span><span data-dcnode-id="706" instrument_node=""></span><a class="" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCrvhNP_lWuPIP6QZzJmM-bw" rel="noreferrer" target="_blank"><span data-dcnode-id="705" instrument_node="">New York Post</span></a><span data-dcnode-id="703" instrument_node=""> / </span><span data-dcnode-id="702" instrument_node=""></span><a class="mediaAttributes_youtube__U4o6C" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D_JddaN8EAVY" rel="noreferrer" target="_blank"><span data-dcnode-id="701" instrument_node="">YouTube</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="692"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="693"><meta content="Netty Nance Was 24 When She Discovered She Was Actually Carlina White" data-dcnode-id="697" itemprop="name"><meta content="8" data-dcnode-id="696" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Netty Nance Was 24 When She Discovered She Was Actually Carlina White</span></h2></div></div><div data-dcnode-id="665"><meta content="At age 17, Netty Nance&amp;nbsp;was a senior in high school and pregnant with her daughter. Excited to become a mother, she&amp;nbsp;sought out&amp;nbsp;necessary&amp;nbsp;prenatal care. To take advantage of the state benefits, she asked her own..." data-dcnode-id="691" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="666" data-testid="RichText"><span data-dcnode-id="667"><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">At age 17, </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nymag.com/news/features/carlina-white-2011-10/" target="_blank"><span data-dcnode-id="689" instrument_node="">Netty Nance</span></a><span data-dcnode-id="687" instrument_node="">&nbsp;was a senior in high school and pregnant with her daughter. Excited to become a mother, she&nbsp;sought out&nbsp;necessary&nbsp;prenatal care. To take advantage of the state benefits, she asked her own mother for her birth certificate. Her mother stalled, and Netty became&nbsp;impatient, rummaging through her mother’s things herself. When she brought the birth certificate she had found into the Bureau of Vital Statistics in New Haven, CT, she was accused of using a false&nbsp;identity. Her mother, Ann Pettway, explained that Netty's biological parents had abandoned her, which was why she didn’t have the appropriate birth certificate.&nbsp;The real story was a little more complicated.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="681"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marieclaire.com/culture/a34385924/what-happened-to-carlina-white/" target="_blank"><span data-dcnode-id="684" instrument_node="">Carlina White</span></a><span data-dcnode-id="682" instrument_node=""> was born to Joy White and Carl Tyson, a healthy 8 pounds on July 15, 1987. A couple of weeks later,&nbsp;Carlina spiked a high fever. Her&nbsp;parents brought her back into Harlem Hospital, where a nurse told them that Carlina would need to spend the night in the hospital. The nurse didn’t have a name tag and had an odd demeanor, but the tired young couple didn’t think too much of it.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Tyson went home to sleep before work, and White went to grab a few things before returning to the hospital. Just a little over an hour after they had left, Carlina went&nbsp;missing. The one lead detectives had fizzled quickly, and no other traces of the baby or a suspect were found. White and Tyson, both depressed and angry, eventually drifted apart, each of them blaming&nbsp;the other for&nbsp;their pain.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Ann Pettway grew up in Bridgeport, CT, and had&nbsp;a minor record. In 1987, she told friends and family she was pregnant, and shortly thereafter had a baby as proof. No one knew who the father was and she didn’t say.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Her 2004 pregnancy and subsequent revelation from Pettway&nbsp;started Netty’s own private search for her true identity. The family - aunts, uncles, cousins, and grandparents - that she’d grown up with couldn’t give her any more information about her past. But one of her aunts&nbsp;did encourage her to call the National Center for Missing &amp; Exploited Children. That phone call led to pictures shared and swabs of DNA being taken.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The DNA proved Netty Nance was indeed Carlina White, and her parents were overjoyed to know she was alive and well. Carl Tyson&nbsp;and Joy White were reunited with their daughter in 2011, after she'd been missing for 23&nbsp;years.&nbsp;</span></p><span data-dcnode-id="668" instrument_node="">
</span></span></div></div><div data-dcnode-id="664" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="660" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="661"><div class="ra-ad-container" data-dcnode-id="662" id="MOBILE_BLOG_BTF_08"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="607" role="listitem"><meta content="//www.ranker.com/review/1002520155" data-dcnode-id="659" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="643"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="657"><img alt="Jennifer Pan Seemed Like The Perfect Daughter, But She'd Been Living A Double Life" class="lazyload" data-dcnode-id="658" data-src="https://imgix.ranker.com/user_node_img/50127/1002520155/original/1002520155-photo-u1?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="644"><span data-dcnode-id="656" instrument_node="">Photo</span><span data-dcnode-id="655" instrument_node="">:</span><span data-dcnode-id="654" instrument_node=""> </span><span data-dcnode-id="653" instrument_node="">York Regional Police</span><span data-dcnode-id="652" instrument_node=""> / </span><span data-dcnode-id="651" instrument_node=""></span><a class="" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJenniferPan.png" rel="noreferrer" target="_blank"><span data-dcnode-id="650" instrument_node="">Wikipedia</span></a><span data-dcnode-id="648" instrument_node=""> / </span><span data-dcnode-id="647" instrument_node=""></span><a class="" data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fairuse.stanford.edu/overview/fair-use/" rel="noreferrer" target="_blank"><span data-dcnode-id="646" instrument_node="">Fair use</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="637"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="638"><meta content="Jennifer Pan Seemed Like The Perfect Daughter, But She'd Been Living A Double Life" data-dcnode-id="642" itemprop="name"><meta content="9" data-dcnode-id="641" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Jennifer Pan Seemed Like The Perfect Daughter, But She'd Been Living A Double Life</span></h2></div></div><div data-dcnode-id="609"><meta content="Jennifer Pan was raised in Canada&amp;nbsp;by her parents,&amp;nbsp;Bich Ha and Huei Hann Pan, both immigrants from Vietnam. They earned&amp;nbsp;enough to buy a home in an upscale neighborhood, drive nice cars, and pay&amp;nbsp;for their..." data-dcnode-id="636" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="610" data-testid="RichText"><span data-dcnode-id="611"><p data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">Jennifer Pan was raised in Canada&nbsp;by her parents,&nbsp;Bich Ha and Huei Hann Pan, both immigrants from Vietnam. They earned&nbsp;enough to buy a home in an upscale neighborhood, drive nice cars, and pay&nbsp;for their daughter's skating and piano lessons. The parents&nbsp;had worked hard and </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casefilepodcast.com/case-50-jennifer-pan/" target="_blank"><span data-dcnode-id="634" instrument_node="">expected their children to do the same</span></a><span data-dcnode-id="632" instrument_node="">.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">To outward appearances, the Pans seemed like the perfect, high-achieving household. So the night of November 8, 2010, came as a shock. Three armed men rushed into the Pan house. They tied Jennifer Pan to a banister upstairs, and shot both of her parents. Her mother passed instantly, but against the odds, her father survived. But as investigators spoke with him in the hospital, he had a strange memory.&nbsp;Before losing consciousness he remembered seeing his daughter&nbsp;chatting amicably to one of the intruders.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">It turned out that while Pan seemed to meet her parents' high expectations, she'd been living a double life. Pan kept her academics a secret from her parents; they believed she was a straight-A student, but she earned mostly Bs, and failed calculus her senior year. Because of that, Ryerson University rescinded its offer of acceptance. Fearing their reaction, she never told her parents any of this, and went through the motions of college life -&nbsp;attending freshman welcome week, buying school books, and telling them she’d received scholarships so no tuition was owed. She’d pack up her school bag and head out for the day -&nbsp;going to the library, or visiting her boyfriend, or even working a part-time job.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Pan continued the lie for more than two years, even telling her parents she had been accepted&nbsp;to the pharmacology program at the University of Toronto. Eventually, her academic career was revealed to be the fiction that it was. Her parents were outraged. Not long afterward, her boyfriend of seven years, Daniel Wong, broke up with her. Pan was devastated. After reconnecting with an old high school friend, she started imagining life without her father, whom she blamed for her current situation.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Pan later reconnected with Wong, and the two began exchanging text messages&nbsp;about killing her parents. Wong&nbsp;had a friend, whom he referred to as "Homeboy," who would be willing to complete the hit for $10,000. On the night in question, Pan unlocked the door for the intruders.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Pan was eventually arrested, and soon Wong and all of Pan's&nbsp;accomplices were apprehended, as well. During the lengthy trial, Pan’s </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//torontolife.com/city/jennifer-pan-revenge/" target="_blank"><span data-dcnode-id="616" instrument_node="">many lies and personalities</span></a><span data-dcnode-id="614" instrument_node=""> were revealed; the case also sparked media debate about parenting and the psychological impact of pressure on kids. She received two life sentences -&nbsp;one for the death of her mother, and a second for the attempted murder of her father. Her sentence includes a non-communication order, as well; she is forbidden from contacting her father or brother unless they want her to.</span></p><span data-dcnode-id="612" instrument_node="">
</span></span></div></div><div data-dcnode-id="608" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="604" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="605"><div class="ra-ad-container" data-dcnode-id="606" id="MOBILE_BLOG_BTF_09"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="554" role="listitem"><meta content="//www.ranker.com/review/1002519568" data-dcnode-id="603" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="587"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="601"><img alt="Bernice Novack's Death Was Ruled An Accident Until Her Son Was Found Dead Three Months Later" class="lazyload" data-dcnode-id="602" data-src="https://imgix.ranker.com/user_node_img/50126/1002519568/original/1002519568-photo-u2?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="588"><span data-dcnode-id="600" instrument_node="">Photo</span><span data-dcnode-id="599" instrument_node="">:</span><span data-dcnode-id="598" instrument_node=""> </span><span data-dcnode-id="597" instrument_node="">Gottscho-Schleisner, Inc.</span><span data-dcnode-id="596" instrument_node=""> / </span><span data-dcnode-id="595" instrument_node=""></span><a class="" data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AFontainebleau_Hotel_1955_LOC_gsc.5a23477u.jpg" rel="noreferrer" target="_blank"><span data-dcnode-id="594" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="592" instrument_node=""> / </span><span data-dcnode-id="591" instrument_node=""></span><a class="" data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.loc.gov/rr/print/res/104_gott.html" rel="noreferrer" target="_blank"><span data-dcnode-id="590" instrument_node="">No known restrictions</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="581"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="582"><meta content="Bernice Novack's Death Was Ruled An Accident Until Her Son Was Found Dead Three Months Later" data-dcnode-id="586" itemprop="name"><meta content="10" data-dcnode-id="585" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Bernice Novack's Death Was Ruled An Accident Until Her Son Was Found Dead Three Months Later</span></h2></div></div><div data-dcnode-id="556"><meta content="Bernice Novack was the widow of famed Fountainbleu builder&amp;nbsp;Ben Novack&amp;nbsp;Sr. The famous Miami Beach hotel launched the two Novacks into the world of celebrities, athletes, presidents, and foreign dignitaries. Bernice and..." data-dcnode-id="580" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="557" data-testid="RichText"><span data-dcnode-id="558"><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Bernice Novack was the widow of famed Fountainbleu builder&nbsp;Ben Novack&nbsp;Sr. The famous Miami Beach hotel launched the two Novacks into the world of celebrities, athletes, presidents, and foreign dignitaries. Bernice and Ben lived a glamorous&nbsp;life until Ben passed of heart and lung failure in 1985. For years after his death, Bernice lived a quiet life in Ft. Lauderdale, FL.&nbsp;</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">But in 2009,&nbsp;Bernice was </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/48-hours-how-a-reporter-uncovered-the-murder-of-miami-matriarch-bernice-novack/" target="_blank"><span data-dcnode-id="575" instrument_node="">found dead in her home</span></a><span data-dcnode-id="573" instrument_node=""> at the age of 86. Investigators chalked it up to a bad fall that led to a lethal amount of brain damage. Nobody asked questions or thought anything differently - that is&nbsp;until her son, Ben Novack Jr., was found murdered just three months later.&nbsp;</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">Despite Bernice's wealth and prior fame, the authorities hadn't&nbsp;even considered that the matriarch may have been murdered. A hard-hitting&nbsp;and motivated journalist,&nbsp;Julie Knipe Brown, exposed the investigative&nbsp;deficiencies. But her suspicions weren't taken seriously&nbsp;until the police in Rye Brook (where Ben Jr.&nbsp;was killed) contacted the investigators of Bernice's death&nbsp;with some interesting news.&nbsp;They had a suspect in custody who had confessed to killing Ben Jr. at the behest of someone else. The </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.miamiherald.com/news/local/community/miami-dade/article1960727.html" target="_blank"><span data-dcnode-id="569" instrument_node="">hired killer</span></a><span data-dcnode-id="567" instrument_node="">&nbsp;also said he'd killed Bernice, and gave details on the type of weapon he used and how she died. Finally, authorities took a closer look at the case.&nbsp;</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">The following year, Ben's estranged wife, Narcy Novack, was arrested for the death of her husband and her mother-in-law. Her brother was also arrested, and the&nbsp;two were found guilty of arranging the murder of the two Novacks. </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miami.cbslocal.com/2012/12/17/sentencing-day-in-narcy-novack-family-killings-case/" target="_blank"><span data-dcnode-id="563" instrument_node="">The defense had claimed</span></a><span data-dcnode-id="561" instrument_node=""> that the real culprit was Narcy's daughter from a previous marriage, May Abad, who wanted to cash in on her stepfather's vast estate, which included expensive Batman memorabilia. The prosecution argued that Narcy had feared her husband would leave her for his mistress, cutting her out of the family wealth.&nbsp;Narcy is serving a life sentence.&nbsp;</span></p><span data-dcnode-id="559" instrument_node="">
</span></span></div></div><div data-dcnode-id="555" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="551" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="552"><div class="ra-ad-container" data-dcnode-id="553" id="MOBILE_BLOG_BTF_10"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_landscapeContent__2Auz-" data-dcnode-id="496" role="listitem"><meta content="//www.ranker.com/review/1002520156" data-dcnode-id="550" itemprop="url"><div class="blogItem_mediaItem__cin6-" data-dcnode-id="532"><figure class="Media_main__2Jlyi Media_roundedCorners__35_6W blogItem_fullWidth__1EnYk" data-dcnode-id="548"><img alt="After Lynne Turner's Boyfriend Passed From A Mysterious Illness, Her Late Husband's Body Was Exhumed" class="lazyload" data-dcnode-id="549" data-src="https://imgix.ranker.com/user_node_img/50127/1002520156/original/1002520156-photo-u1?auto=format&amp;q=60&amp;fit=crop&amp;fm=pjpg&amp;dpr=2&amp;w=375" width="375"></figure><span class="mediaAttributes_attributes__sSSks Attributes_attribution__2q48y" data-dcnode-id="533"><span data-dcnode-id="547" instrument_node="">Photo</span><span data-dcnode-id="546" instrument_node="">:</span><span data-dcnode-id="545" instrument_node=""> </span><span data-dcnode-id="544" instrument_node=""></span><a class="" data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/120600995%40N07/" rel="noreferrer" target="_blank"><span data-dcnode-id="543" instrument_node="">Jacqui Brown</span></a><span data-dcnode-id="541" instrument_node=""> / </span><span data-dcnode-id="540" instrument_node=""></span><a class="" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/120600995%40N07/14345215288/in/photolist-nRCYJ5-6oMFZi-6qYszh-2kzuwZX-2kMRV86-RwZ7A-8HFmmq-9g641g-6oMFX4-9cqkgD-Jpmnp-8sek81-bUJYgU-cnu1aN-5JPhgm-56WKkR-5iadqE-cmpkwQ-5JJXXi-
