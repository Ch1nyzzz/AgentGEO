53fsnS-5GT2fe-2pWZ3a-5GT4tc-2emBRc-ayhrMe-p8SRVb-cATX4s-anNFH1-4QWndh-5JK9ok-afbGEJ-5JPwKL-5cSGfn-8zbUSh-2oZGR-cB499-tjU9Q-dfuHcm-o5vem-5NmW68-yFZQP-8sejwu-abikSu-4fxdRg-5gsEke-5JKdCe-5xNcry-63MstA-6ZAE5o-5GT3YP" rel="noreferrer" target="_blank"><span data-dcnode-id="539" instrument_node="">Flickr</span></a><span data-dcnode-id="537" instrument_node=""> / </span><span data-dcnode-id="536" instrument_node=""></span><a class="" data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/2.0/legalcode" rel="noreferrer" target="_blank"><span data-dcnode-id="535" instrument_node="">CC-BY-SA 2.0</span></a></span></div><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="526"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="527"><meta content="After Lynne Turner's Boyfriend Passed From A Mysterious Illness, Her Late Husband's Body Was Exhumed" data-dcnode-id="531" itemprop="name"><meta content="11" data-dcnode-id="530" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">After Lynne Turner's Boyfriend Passed From A Mysterious Illness, Her Late Husband's Body Was Exhumed</span></h2></div></div><div data-dcnode-id="498"><meta content="Glenn Turner was 28 and had recently accomplished his dream of becoming a police officer in Cobb County, GA. When he met Lynne Turner, he thought his life was complete. The two were married in 1993, despite hesitation and..." data-dcnode-id="525" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="499" data-testid="RichText"><span data-dcnode-id="500"><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Glenn Turner was 28 and had recently accomplished his dream of becoming a police officer in Cobb County, GA. When he met Lynne Turner, he thought his life was complete. The two were married in 1993, despite hesitation and concerns from his family and closest friends. Lynne had been cold towards them, and controlling of Glenn, in their opinion. But still, Glenn went ahead with the nuptials and made Lynne his life insurance beneficiary.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The marriage, it turned out, would be short-lived. Lynne ran up large bills on their credit cards, and spent less and less time at home. Rumors were flying that she was having an affair, or multiple affairs, perhaps even seeing some of Glenn’s coworkers.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="518" instrument_node="">By the end of the year, Glenn Turner had accepted&nbsp;that his marriage was failing, and he told his family he was going to leave Lynne. Shortly thereafter, he came down with the worst flu of his life, telling friends he could hardly walk or talk, he was so ill. Not long after, he was found deceased in his bed. On the day of the funeral, Lynne made a phone call about Glenn's&nbsp;</span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxygen.com/charmed-to-death/crime-news/lynn-turner-murders-husband-glenn-lover-with-antifreeze" target="_blank"><span data-dcnode-id="517" instrument_node="">life insurance policy</span></a><span data-dcnode-id="515" instrument_node=""> while en route to the cemetery.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">While some may have suspected Lynne, there was no evidence of any foul play. But six years later, a former coworker of Glenn’s learned that Lynne had been seeing a firefighter named Randy Thompson and was pregnant with his child. The couple had two children and remained together for about five years. Although they never married, Lynne did convince Thompson to get a life insurance policy. She was the beneficiary.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Eventually, Thompson decided the relationship was no longer working. He moved into his own place, and not long afterward, he came down with the flu. Just like Glenn Turner, Thompson passed in his bed shortly thereafter.&nbsp;</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">Glenn’s mother, Kathy, contacted Thompson’s family to share the tragic coincidence. Glenn's family urged authorities to have his body exhumed so a full autopsy could be done. Samples taken from Thompson’s tissues were compared with samples taken from Glenn Turner. Oxalate crystals were found in tissue samples from both bodies, making one thing clear: Both men had perished of antifreeze poisoning, not the flu.&nbsp;</span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2010/CRIME/09/15/georgia.inmate.death/index.html" target="_blank"><span data-dcnode-id="505" instrument_node="">Lynne Turner</span></a><span data-dcnode-id="503" instrument_node=""> was found guilty of&nbsp;both murders and sentenced to life in prison.</span></p><span data-dcnode-id="501" instrument_node="">
</span></span></div></div><div data-dcnode-id="497" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="493" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="494"><div class="ra-ad-container" data-dcnode-id="495" id="MOBILE_BLOG_BTF_11"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_noImageAndRank__2xWJT" data-dcnode-id="459" role="listitem"><meta content="//www.ranker.com/review/1002520157" data-dcnode-id="492" itemprop="url"><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="486"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="487"><meta content="Chewing Gum Helped Solve A 34-Year-Old Cold Case" data-dcnode-id="491" itemprop="name"><meta content="12" data-dcnode-id="490" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Chewing Gum Helped Solve A 34-Year-Old Cold Case</span></h2></div></div><div data-dcnode-id="461"><meta content="In 1976, Blanche Kimball&amp;rsquo;s neighbors started to worry. Nobody had seen their friendly 70-year-old neighbor in quite some time. They called police to her Augusta, ME,&amp;nbsp;home, where they found a gruesome scene: Kimball had..." data-dcnode-id="485" itemprop="description"><div class="richText_container__3rpQz blogItem_textContainer__22V8N" data-dcnode-id="462" data-testid="RichText"><span data-dcnode-id="463"><p data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">In 1976, Blanche Kimball’s neighbors started to worry. Nobody had seen their friendly 70-year-old neighbor in quite some time. They called police to her Augusta, ME,&nbsp;home, where they found a gruesome scene: Kimball had been brutally </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bangordailynews.com/2014/06/30/news/augusta-man-gets-20-years-in-1976-murder/" target="_blank"><span data-dcnode-id="483" instrument_node="">stabbed to death</span></a><span data-dcnode-id="481" instrument_node="">, and was lying in a puddle of her own blood.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Neighbors were shocked and police were befuddled. Pictures of the scene were taken, and evidence was collected, but investigators could not make an arrest. The lone suspect they could come up with was a homeless man who had briefly lived in Kimball’s home well before the murder. He was seen breaking into a house in the neighborhood not long after the murder, but he fled town before he could be apprehended. With the only suspect nowhere to be found, the case went cold.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Thirty-four years later, in 2010, Gary Raub was homeless, living on the streets of Seattle. He got into a physical altercation with another homeless man, cutting his stomach with his knife. The victim fled the scene, but police took Raub into custody and entered his knife into evidence.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">That’s when a match came up between the DNA on Raub’s knife and the </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/US/dna-phony-chewing-gum-survey-solves-1976-cold/story%3Fid%3D17499665" target="_blank"><span data-dcnode-id="471" instrument_node="">DNA left behind</span></a><span data-dcnode-id="469" instrument_node=""> at Kimball’s house and the murder scene. When cold case investigators in Maine saw the DNA belonging to Raub, who had&nbsp;gone as Gary Robert Wilson in the 1970s, they finally had their second chance.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">With help from Seattle authorities, the Maine State Police approached Raub on the street, and asked if he would like to participate in a chewing gum survey. Raub was game, and he unknowingly chewed on a couple of pieces of gum for the detectives, handing them the exact fresh DNA they needed. Raub was arrested and convicted of&nbsp;the murder of Blanche, finally closing one of Maine’s oldest&nbsp;cold cases.&nbsp;</span></p><span data-dcnode-id="464" instrument_node="">
</span></span></div></div><div data-dcnode-id="460" style="clear:both"></div></li></ul><div class="pagination_pagination__3qR6n" data-dcnode-id="457" data-nosnippet="true"></div></div></div></div></div></article><div class="list_bottomShare__2N_Ie" data-dcnode-id="408"><aside class="bottom_main__ZjLyz" data-dcnode-id="409"><div class="bottom_socialContainer__2goDe" data-dcnode-id="419" data-nosnippet="true"><button class="share_shareItemContainer__1eVpG bottom_shareButton__Ahl2w" data-dcnode-id="444" type="button"><span class="share_shareItem__2NIJG share_outlined__1svX4 share_facebook__A0Q4k" data-dcnode-id="445"><svg data-dcnode-id="446" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><use data-dcnode-id="447" xlink:href="/img/icons/icons.svg#rsvg__social--facebook"><svg data-dcnode-id="448" id="rsvg__social--facebook" viewBox="0 0 30 30"></svg></use></svg><span data-dcnode-id="451" instrument_node="">
