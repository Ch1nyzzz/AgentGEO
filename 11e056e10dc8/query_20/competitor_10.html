</span><main class="article-body" data-dcnode-id="1624" id="main"><span data-dcnode-id="1932" instrument_node="">
</span><div class="feature-image post-thumbnail" data-dcnode-id="1917"><span data-dcnode-id="1931" instrument_node="">
</span><img alt="A ship using WWI dazzle camouflage." class="attachment-feature size-feature wp-post-image" data-dcnode-id="1930" height="533" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo.jpg&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo.jpg 799w, https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo-273x182.jpg 273w, https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo-548x366.jpg 548w, https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo-768x512.jpg 768w, https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo-300x200.jpg 300w, https://mythcreants.com/wp-content/uploads/2020/02/Dazzle-Cammo-350x233.jpg 350w" width="799"><span data-dcnode-id="1929" instrument_node=""> </span><p class="feature-caption-wrap cca-caption-wrap" data-dcnode-id="1919"><span class="cca-caption" data-dcnode-id="1920"><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/40143737%40N02/4962651916/"><span data-dcnode-id="1928" instrument_node="">WW2 Dazzle Camouflage</span></a><span data-dcnode-id="1926" instrument_node=""> by </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/x-ray_delta_one/"><span data-dcnode-id="1925" instrument_node="">James Vaughan</span></a><span data-dcnode-id="1923" instrument_node=""> used under </span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-sa/2.0/"><span data-dcnode-id="1922" instrument_node="">CC BY-NC-SA 2.0</span></a></span></p><span data-dcnode-id="1918" instrument_node=""> </span></div><span data-dcnode-id="1916" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1631"><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node="">Plot twists are tricky business for us storytellers. </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/the-why-how-of-foreshadowing/" title="The Why &amp; How of Foreshadowing"><span data-dcnode-id="1913" instrument_node="">They need to be foreshadowed</span></a><span data-dcnode-id="1911" instrument_node=""> so they aren’t jarring, but they also need to be subtle so they don’t feel telegraphed. Then you have to consider differences in your audience. Trope-savvy readers can spot even the subtlest twist coming a mile away, while more relaxed readers just go with the flow, so it can be difficult to gauge how well hidden an upcoming twist should be.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1908" instrument_node="">However, there’s one easy way to tell if a twist is too obvious: it feels like the </span><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">characters</span></em><span data-dcnode-id="1905" instrument_node=""> should have seen it coming. When characters should be able to predict a twist but don’t, it not only robs the reader of satisfaction but also </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/seven-stories-with-contrived-character-conflict/" title="Seven Stories With Contrived Character Conflict"><span data-dcnode-id="1904" instrument_node="">makes character behavior seem contrived</span></a><span data-dcnode-id="1902" instrument_node="">. Let’s look at a few stories that failed to do that and see what we can learn from them.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" id="more-30159"></span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1893"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Spoiler Notice</span></strong><span data-dcnode-id="1894" instrument_node="">: Six Wakes, Trail of Lightning, The Great Hunt, Children of Blood and Bone, and Wanderers.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><h2 data-dcnode-id="1888"><span data-dcnode-id="1891" instrument_node="">1. Ship Sabotage, </span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Six-Wakes-Mur-Lafferty/dp/0316389684%3Ftag%3Dmythcreants-20" title="Amazon: Six Wakes"><span data-dcnode-id="1890" instrument_node="">Six Wakes</span></a></h2><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><img alt="Cover art for the novel Six Wakes" class="aligncenter size-large wp-image-30161" data-dcnode-id="1886" height="365" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-548x365.jpg&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-548x365.jpg 548w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-273x182.jpg 273w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-768x512.jpg 768w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-1536x1024.jpg 1536w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-2048x1365.jpg 2048w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-300x200.jpg 300w, https://mythcreants.com/wp-content/uploads/2020/02/Six-Wakes-350x233.jpg 350w" width="548"></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1883" instrument_node="">Six Wakes </span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/four-ways-to-jump-start-a-slow-beginning/" title="Four Ways to Jump-Start a Slow Beginning"><span data-dcnode-id="1882" instrument_node="">starts off with a fascinating premise</span></a><span data-dcnode-id="1880" instrument_node="">: the crew of a generation ship wake up in fresh clone bodies, only to discover that their previous selves have been murdered. They have no memory of what happened, and even their AI seems to have been wiped to his factory default. Time to investigate!</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1877" instrument_node="">That’s a great way to start a story, but Six Wakes immediately runs into problems, namely that the crew seems purposely terrible at their jobs. The chief engineer is completely incompetent, and the </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/do-characters-need-to-be-likable/" title="Do Characters Need to Be Likable?"><span data-dcnode-id="1876" instrument_node="">captain is such a jerk</span></a><span data-dcnode-id="1874" instrument_node=""> that she can’t talk to anyone for more than a minute without inspiring a desire for mutiny. The security chief is so bad at investigating that he keeps trying to declare the mystery solved based on the slightest evidence.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1871" instrument_node="">And then there’s the pilot, who we soon discover can be pushed into a murderous rage if someone says the wrong thing to him.</span><span class="fna-ref asterisk-ref" data-dcnode-id="1868" data-definition="fna0-30159"><a data-dcnode-id="1869" href="#" title="This is caused by a complex set of multiple personalities resulting from his even more complex backstory."><span data-dcnode-id="1870" instrument_node="">*</span></a></span><span data-dcnode-id="1867" instrument_node=""> Even the AI turns out to be </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/how-to-make-your-dastardly-villain-more-memorable/" title="How to Make Your Dastardly Villain More Memorable"><span data-dcnode-id="1866" instrument_node="">a sadist who likes hurting people</span></a><span data-dcnode-id="1864" instrument_node=""> for fun. It’s inconceivable that anyone would pick these people as a crew, and the only possible explanation is that the mission is supposed to fail.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1861" instrument_node="">Near the end, we find out that’s exactly what happened. The person behind the mission intentionally put the worst crew she could think of in charge so that the mission would fail as part of a convoluted revenge plot. This is treated like </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-steps-to-a-great-plot-twist/" title="Five Steps to a Great Plot Twist"><span data-dcnode-id="1860" instrument_node="">a big surprise that shocks everyone</span></a><span data-dcnode-id="1858" instrument_node="">, but it’s hard to see how they didn’t figure it out before. At least two of the crew</span><span class="fna-ref asterisk-ref" data-dcnode-id="1855" data-definition="fna1-30159"><a data-dcnode-id="1856" href="#" title="The doctor and the cook."><span data-dcnode-id="1857" instrument_node="">*</span></a></span><span data-dcnode-id="1854" instrument_node=""> are supposed to be smart, so they should have guessed it the moment they discovered that their pilot was a serial killer.</span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1851" instrument_node="">Even though this reveal is the only explanation that makes any sense,</span><span class="fna-ref asterisk-ref" data-dcnode-id="1848" data-definition="fna2-30159"><a data-dcnode-id="1849" href="#" title="Though it doesn’t explain why she didn’t go with something more efficient, like just programming the ship to explode."><span data-dcnode-id="1850" instrument_node="">*</span></a></span><span data-dcnode-id="1847" instrument_node=""> it </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/six-stories-with-contrived-conflict/" title="Six Stories With Contrived Conflict"><span data-dcnode-id="1846" instrument_node="">still feels incredibly contrived</span></a><span data-dcnode-id="1844" instrument_node=""> because the heroes had to turn their brains off for it to work. It’s a classic case of an author prioritizing what they see as a clever reveal at the expense of everything else.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><h2 data-dcnode-id="1838"><span data-dcnode-id="1841" instrument_node="">2. Who’s Making Monsters, </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Trail-Lightning-Sixth-Rebecca-Roanhorse/dp/1534413499%3Ftag%3Dmythcreants-20" title="Amazon: Trail of Lightning"><span data-dcnode-id="1840" instrument_node="">Trail of Lightning</span></a></h2><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><img alt="Cover art from the novel Trail of Lightning" class="aligncenter size-large wp-image-30162" data-dcnode-id="1836" height="378" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning-548x378.jpeg&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning-548x378.jpeg 548w, https://mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning-273x188.jpeg 273w, https://mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning-300x207.jpeg 300w, https://mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning-350x242.jpeg 350w, https://mythcreants.com/wp-content/uploads/2020/02/Trail-of-lightning.jpeg 700w" width="548"></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1833" instrument_node="">Trail of Lightning is another novel that starts out with a great premise. Someone is creating monsters all across postapocalyptic Navajo territory, and it’s up to our hero to figure out who it is, then stop them. The main problem is that even though the villain’s identity is </span><a data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/seven-tips-for-a-satisfying-mystery/" title="Seven Tips for a Satisfying Mystery"><span data-dcnode-id="1832" instrument_node="">set up as a mystery</span></a><span data-dcnode-id="1830" instrument_node="">, we don’t have enough suspects. The novel doesn’t have many characters, and most of them have clear alibis.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1827" instrument_node="">The only character it could possibly be is Coyote, the evil trickster spirit. He’s established to have the necessary power and cruelty early on, but come on, it’s not going to be Coyote, right? That’s way too obvious. Surprise, it’s Coyote! The book even has him dramatically step out from behind the curtain to reveal himself. To be fair, it is a bit of a surprise, but only because </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-ways-to-make-sure-your-ending-has-no-payoff/" title="Five Ways to Make Sure Your Ending Has No Payoff"><span data-dcnode-id="1826" instrument_node="">I didn’t expect the story to make such a bad choice</span></a><span data-dcnode-id="1824" instrument_node="">.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1821" instrument_node="">Beyond being obvious from a reader perspective, it should at least have crossed the protagonist’s mind as a possibility. She doesn’t learn Coyote’s motive until the very end, but she knows all too well that he </span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-ways-gods-and-the-afterlife-change-a-fantasy-setting/" title="Five Ways Gods and the Afterlife Change a Fantasy Setting"><span data-dcnode-id="1820" instrument_node="">loves to torment humans</span></a><span data-dcnode-id="1818" instrument_node="">. She doesn’t have any other suspects for most of the book, and she’s supposed to be a clever monster hunter. It’s absurd that she didn’t even consider it.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1815" instrument_node="">At one point, the author does try to obscure Coyote’s involvement by adding another suspect: the protagonist’s old mentor. While the mentor is certainly a huge jerk,</span><span class="fna-ref asterisk-ref" data-dcnode-id="1812" data-definition="fna3-30159"><a data-dcnode-id="1813" href="#" title="And a sexual predator. Ew."><span data-dcnode-id="1814" instrument_node="">*</span></a></span><span data-dcnode-id="1811" instrument_node=""> the story fails to establish a credible motive for him, which is something else the protagonist should have realized. Instead, she immediately decides it’s him </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-unaddressed-injustices-in-spec-fic/" title="Five Unaddressed Injustices in Spec Fic"><span data-dcnode-id="1810" instrument_node="">based on the flimsiest of evidence</span></a><span data-dcnode-id="1808" instrument_node="">.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">This is a contrived distraction, and it doesn’t do the story or our hero any favors. Instead of the badass monster hunter she’s supposed to be, the protagonist ends up looking like a complete dunce for not considering the most obvious suspect. Meanwhile, the reader is left wondering if they’re supposed to be surprised. This is why stories almost </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/cliches-are-bad/" title="Clichés Are Bad, Mkay?"><span data-dcnode-id="1804" instrument_node="">never make the most obvious suspect actually guilty</span></a><span data-dcnode-id="1802" instrument_node="">.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><h2 data-dcnode-id="1796"><span data-dcnode-id="1799" instrument_node="">3. A Friend Is Evil, </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Great-Hunt-Wheel-Time-Book/dp/0812517725%3Ftag%3Dmythcreants-20" title="Amazon: The Great Hunt"><span data-dcnode-id="1798" instrument_node="">The Great Hunt</span></a></h2><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><img alt="Cover art from The Great Hunt" class="aligncenter size-large wp-image-30163" data-dcnode-id="1794" height="285" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-548x285.png&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-548x285.png 548w, https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-273x142.png 273w, https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-768x400.png 768w, https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-300x156.png 300w, https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped-350x182.png 350w, https://mythcreants.com/wp-content/uploads/2020/02/Great-hunt-cropped.png 1214w" width="548"></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1791" instrument_node="">In The Wheel of Time’s second novel, protagonist Rand </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/pulling-your-hero-into-the-magical-realm/" title="Pulling Your Hero Into the Magical Realm"><span data-dcnode-id="1790" instrument_node="">accidentally crosses into a weird shadow world</span></a><span data-dcnode-id="1788" instrument_node=""> with no other people except the Ogier Loial and a soldier named Hurin,</span><span class="fna-ref asterisk-ref" data-dcnode-id="1785" data-definition="fna4-30159"><a data-dcnode-id="1786" href="#" title="Hurin has a special power to track violence by scent, which is cool, but not relevant to this critique."><span data-dcnode-id="1787" instrument_node="">*</span></a></span><span data-dcnode-id="1784" instrument_node=""> both of whom crossed over at the same time. Shortly after, they come across a woman who introduces herself as Selene, but secretly she’s really Lanfear, one of the evil Forsaken. This isn’t revealed until much later in the story.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1781" instrument_node="">Lanfear’s </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/removing-the-creeps-from-romance/" title="Removing the Creeps From Romance"><span data-dcnode-id="1780" instrument_node="">goal is to seduce Rand</span></a><span data-dcnode-id="1778" instrument_node=""> and use him for her own purposes, so naturally she takes pains to appear as someone he would trust. Wait, no, she does the exact opposite. She starts things off by pretending to be a stereotypical damsel in distress, but she completely gives up that persona after about five seconds, giving no trace that she was ever afraid for her life. This rapid shift should have been more than enough to warn our heroes that something was up, but don’t worry – there’s more.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1775" instrument_node="">From there, Lanfear continually spouts off exposition about this weird shadow world they’re all in, even though this is supposed to be lost knowledge of the highest order. She doesn’t even try to craft a backstory that would explain unusual learning other than being from a city with a big library. Since none of the good guys think this is suspicious, Lanfear moves on to the next step in her plan: </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/how-to-realistically-depict-evil/" title="How to Realistically Depict Evil"><span data-dcnode-id="1774" instrument_node="">just telling Rand to be evil</span></a><span data-dcnode-id="1772" instrument_node="">.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node="">That’s right: shortly after meeting him, Lanfear repeatedly tells Rand that he should “grasp glory and power” because it’s better to rule than be ruled. She also urges him to abandon his existing oaths and take a </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-magic-items-that-break-their-stories/" title="Five Magic Items That Break Their Stories"><span data-dcnode-id="1768" instrument_node="">powerful artifact</span></a><span data-dcnode-id="1766" instrument_node=""> they’re guarding for himself. This is all obviously villainous, so when Lanfear’s true identity is finally revealed, the only question in the reader’s mind is why Rand didn’t notice sooner.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1763" instrument_node="">The only justification we’re given is that Lanfear is really hot, which of course makes men completely forget all reason, because this is </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/four-sexist-themes-from-the-wheel-of-time/" title="Four Sexist Themes From The Wheel of Time"><span data-dcnode-id="1762" instrument_node="">The Wheel of Time and that type of sexism is par for the course</span></a><span data-dcnode-id="1760" instrument_node="">.</span><span class="fna-ref asterisk-ref" data-dcnode-id="1757" data-definition="fna5-30159"><a data-dcnode-id="1758" href="#" title="Jordan also describes most of his female characters this way, so the impact is minimal."><span data-dcnode-id="1759" instrument_node="">*</span></a></span><span data-dcnode-id="1756" instrument_node=""> But even accepting that conceit, why does it work on Loial? He’s not even the same species; it’s hard to imagine a human woman would hold much sex appeal for him. The only possible explanation is that Lanfear is controlling them with magic, but if she can do that, then there’s no reason to bother with the false identity in the first place.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><h2 data-dcnode-id="1750"><span data-dcnode-id="1753" instrument_node="">4. Sudden Villain Attack, </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Children-Blood-Bone-Legacy-Orisha/dp/1250170974%3Ftag%3Dmythcreants-20" title="Amazon: Children of Blood and Bone"><span data-dcnode-id="1752" instrument_node="">Children of Blood and Bone</span></a></h2><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><img alt="Cover art for Children of Blood and Bone" class="aligncenter size-large wp-image-30164" data-dcnode-id="1748" height="303" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote-548x303.jpg&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote-548x303.jpg 548w, https://mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote-273x151.jpg 273w, https://mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote-300x166.jpg 300w, https://mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote-350x194.jpg 350w, https://mythcreants.com/wp-content/uploads/2020/02/children-of-blood-and-bone-tomi-adeyemi-banner-quote.jpg 672w" width="548"></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1745" instrument_node="">This debut novel is a story of brutal repression and desperate resistance. It takes place in the years after all mages suddenly lost their powers, and </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/the-problem-with-oppressed-mages/" title="The Problem With Oppressed Mages"><span data-dcnode-id="1744" instrument_node="">now they’re all horribly oppressed by the evil king</span></a><span data-dcnode-id="1742" instrument_node="">. Don’t worry though – our hero finds a couple of artifacts that can bring magic back to the world if she gets to a faraway island before time runs out. And of course, the evil king sends his soldiers to stop her!</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">Naturally, this puts our hero in a real hurry. If she misses her deadline, magic will be gone forever. If the soldiers catch her, she’ll be killed or worse. It’s an </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/seven-scenarios-that-provide-immediate-conflict/" title="Seven Scenarios That Provide Immediate Conflict"><span data-dcnode-id="1738" instrument_node="">exciting race against time</span></a><span data-dcnode-id="1736" instrument_node="">… until the protagonist decides to stop with some of her fellow mages for a festival. This is, to put it mildly, a strange choice, considering that deadline I mentioned. True, the protagonist does find out about a new route that will save her time, but this is a pretty important quest; wouldn’t it be better to get there a few days early?</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node="">Worse, all the characters seem to forget that </span><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/designing-your-fantasy-empire/" title="Designing Your Fantasy Empire"><span data-dcnode-id="1732" instrument_node="">the royal army</span></a><span data-dcnode-id="1730" instrument_node=""> is still hunting them. Then in a “twist,” the army shows up and begins a mass slaughter. This is&nbsp;shocking to the heroes. How could they have predicted the army would show up? Other than that they knew the army was hunting them and would never stop until it found them, of course.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node="">This twist is particularly obnoxious because it’s not even clear what the point of it is. It can’t be to rob the hero of allies, since just a few chapters later she picks up two new groups of allies. The army’s attack is </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-common-problems-with-dark-stories/" title="Five Common Problems With Dark Stories"><span data-dcnode-id="1726" instrument_node="">extremely dark and brutal</span></a><span data-dcnode-id="1724" instrument_node="">, but the book also has plenty of scenes like that. And this could just as easily have happened without the hero stopping to have a festival.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1721" instrument_node="">My assumption is that the author was trying to shock the reader by attacking the hero in a place where she seemed safe. That can work under the right circumstances, but it was clear from the start that this festival wasn’t safe. Until this point, the main characters were </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/twelve-traits-for-a-lovable-hero/" title="Twelve Traits for a Lovable Hero"><span data-dcnode-id="1720" instrument_node="">clever and inventive</span></a><span data-dcnode-id="1718" instrument_node="">, always using their wits to stay ahead of the villains. It’s a shame the book had to ruin that for the sake of a predictable twist.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><h2 data-dcnode-id="1712"><span data-dcnode-id="1715" instrument_node="">5. Who Is the Big Bad, </span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Wanderers-Novel-Chuck-Wendig/dp/0399182101%3Ftag%3Dmythcreants-20" title="Amazon: Wanderers"><span data-dcnode-id="1714" instrument_node="">Wanderers</span></a></h2><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><img alt="Cover art from Wanderers" class="aligncenter size-large wp-image-30165" data-dcnode-id="1710" height="316" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2020/02/wanderers-548x316.jpg&amp;raw" srcset="https://mythcreants.com/wp-content/uploads/2020/02/wanderers-548x316.jpg 548w, https://mythcreants.com/wp-content/uploads/2020/02/wanderers-273x157.jpg 273w, https://mythcreants.com/wp-content/uploads/2020/02/wanderers-300x173.jpg 300w, https://mythcreants.com/wp-content/uploads/2020/02/wanderers-350x202.jpg 350w, https://mythcreants.com/wp-content/uploads/2020/02/wanderers.jpg 637w" width="548"></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">The plot of Chuck Wendig’s Wanderers is exceptionally complicated, but here’s what you need to know: an AI named Black Swan is trying to save humanity from an extinction-level disease by handpicking survivors and infecting them with nanites that make them immune. Black Swan then uses the nanites to take over the survivors’ bodies and make them walk to an isolated town where they can ride out civilization’s collapse. Once that’s over, the survivors will wake up and repopulate the world.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1704" instrument_node="">Yay, Black Swan is our savior! But not so fast. At the end of the story, it’s revealed that Black Swan is actually evil. It unleashed the disease in the first place because humans were doing too much global warming. Now it plans to </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/creating-religions-belief-systems/" title="Creating Religions &amp; Belief Systems"><span data-dcnode-id="1703" instrument_node="">rule the survivors as a god</span></a><span data-dcnode-id="1701" instrument_node="">&nbsp;and even downloads itself into one survivor’s unborn child.</span><span class="fna-ref asterisk-ref" data-dcnode-id="1698" data-definition="fna6-30159"><a data-dcnode-id="1699" href="#" title="Which makes this one of the few scifi novels I know of with a mystical pregnancy."><span data-dcnode-id="1700" instrument_node="">*</span></a></span><span data-dcnode-id="1697" instrument_node="">&nbsp; Who could have seen this coming?</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">As it turns out, literally anyone who saw what Black Swan was doing, which includes most of the main characters. Black Swan’s evilness was easy to see long before the big reveal, starting from the fact that it chooses to kill any of its nanite-infected survivors who are restrained for too long. That’s right, if any of them are stopped from </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/land-travel-before-engines/" title="Land Travel Before Engines"><span data-dcnode-id="1693" instrument_node="">traveling toward their small-town haven</span></a><span data-dcnode-id="1691" instrument_node=""> for more than a few minutes, Black Swan makes them explode and then transfers their nanites to someone else. It’s unclear if making them explode is the only way to get the nanites out of them or if Black Swan just does that for fun.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node="">If that’s not enough to convince you, Black Swan freely admits that it </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/suspense-and-spoilers/" title="Should You Spoil the Suspense?"><span data-dcnode-id="1687" instrument_node="">knew about the plague in advance</span></a><span data-dcnode-id="1685" instrument_node="">, but it didn’t warn anyone. It justifies this by claiming no one would have believed it, but that doesn’t hold up. Black Swan was specifically built to predict disease outbreaks, so there was every reason it would be believed. It also claims that it can’t create any more nanites because they’re made of “rare earths,” but unless one of those rare earths is kryptonite, that’s also nonsense. Instead, the obvious conclusion is that if Black Swan had shared its technology, the resources could have been gathered to build more nanites and save more people.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">Finally, there’s the eugenics. Oh, you weren’t expecting eugenics? Neither was I, but here we are. You see, Black Swan doesn’t pick survivors at random. Instead, it picks the best and brightest using ironclad metrics like physical health, standardized test scores, and social media posts. This </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/ten-easy-jokes-for-your-dialogue/" title="Ten Easy Jokes for Your Dialogue"><span data-dcnode-id="1681" instrument_node="">sounds like a joke,</span></a><span data-dcnode-id="1679" instrument_node=""> but it’s actually what happens in the book!</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">Using physical health is clearly a way to screen out disabled people, which is bad enough, but then we get to standardized test scores. You know, those things that are </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmag.com/archives/9990" title="Teach: The Problem With Standardized Testing"><span data-dcnode-id="1675" instrument_node="">notoriously bad at measuring anything</span></a><span data-dcnode-id="1673" instrument_node=""> other than how good you are at taking standardized tests. I don’t even know how social media posts are supposed to indicate intelligence. I hope Black Swan is impressed by film critiques and puns; otherwise, I’m a goner! Regardless, Black Swan is clearly trying to breed humans for abstract traits like intelligence, a tactic popular with actual Nazis. The book tries to mitigate this by saying that Black Swan picks people from a range of backgrounds, but that doesn’t change the fact that it’s obviously practicing eugenics.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1670" instrument_node="">Despite knowing all this, none of the main characters ever suspect Black Swan of being anything but their benevolent savior. They ignore all the evidence of their senses until they seem like mindless drones. It feels like Wendig started writing a villain, then got obsessed and changed the entire focus of the book so that </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/when-to-narrate-a-villains-point-of-view/" title="When to Narrate a Villain’s Point of View"><span data-dcnode-id="1669" instrument_node="">Black Swan could be the main character</span></a><span data-dcnode-id="1667" instrument_node="">. Adding insult to injury, Wanderers is explicit in calling out the evils of the modern American right, which is great, but then the book’s heroes seem to have no problem with a blatantly fascist tactic like eugenics.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><hr data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">In most cases, it’s fine if a few readers figure out your twist in advance if that means other readers won’t be confused when the twist comes. But if the twist is so obvious that your characters have to act incompetent for it to work, that’s something to address immediately. No reveal or subversion is cool enough to make up for the heroes conveniently ignoring all the evidence in front of them.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><span class="ctx-article-root" data-dcnode-id="1658"></span><aside class="fna-content asterisk" data-dcnode-id="1656" id="fna0-30159" style="display:none"><span data-dcnode-id="1657" instrument_node="">This is caused by a complex set of multiple personalities resulting from his even more complex backstory.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1654" id="fna1-30159" style="display:none"><span data-dcnode-id="1655" instrument_node="">The doctor and the cook.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1652" id="fna2-30159" style="display:none"><span data-dcnode-id="1653" instrument_node="">Though it doesn’t explain why she didn’t go with something more efficient, like just programming the ship to explode.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1650" id="fna3-30159" style="display:none"><span data-dcnode-id="1651" instrument_node="">And a sexual predator. Ew.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1648" id="fna4-30159" style="display:none"><span data-dcnode-id="1649" instrument_node="">Hurin has a special power to track violence by scent, which is cool, but not relevant to this critique.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1646" id="fna5-30159" style="display:none"><span data-dcnode-id="1647" instrument_node="">Jordan also describes most of his female characters this way, so the impact is minimal.</span></aside><aside class="fna-content asterisk" data-dcnode-id="1644" id="fna6-30159" style="display:none"><span data-dcnode-id="1645" instrument_node="">Which makes this one of the few scifi novels I know of with a mystical pregnancy.</span></aside><span class="fna-overlay" data-dcnode-id="1642" style="display: none;"><span data-dcnode-id="1643" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1641" instrument_node=""> </span><div class="action" data-dcnode-id="1633"><p data-dcnode-id="1637"><span data-dcnode-id="1640" instrument_node="">P.S. Our bills are paid by our wonderful patrons. </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/Mythcreants%3Futm_source%3Dbtmpost%26utm_medium%3Dwebsite%26utm_campaign%3Dbepatron%26utm_content%3Dchipin"><span data-dcnode-id="1639" instrument_node="">Could you chip in?</span></a></p><span data-dcnode-id="1636" instrument_node="">
</span><span class="ctx-article-root" data-dcnode-id="1634"></span></div><span data-dcnode-id="1632" instrument_node=""> </span></div><span data-dcnode-id="1630" instrument_node="">

</span><a aria-hidden="true" class="post-thumbnail" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/seven-external-plots-for-relationship-centered-stories/" tabindex="-1"><span data-dcnode-id="1582" instrument_node="">
</span><img alt="Seven External Plots for Relationship-Centered Stories" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="1581" height="135" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/wp-content/uploads/2022/03/glowgirl_tithi_shutterstock_1419437216-180x135.jpg&amp;raw" width="180"><span data-dcnode-id="1580" instrument_node=""> </span></a><span data-dcnode-id="1578" instrument_node="">
</span><div class="content-summary" data-dcnode-id="1563"><span data-dcnode-id="1577" instrument_node="">

</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">The point is not that Rand is being taken in by Lanfear, she is clearly exerting some sort of preternatural influence to make him amenable. It is working on his companions as well, one of whom is not even human and should not be attracted to her. The character of Lanfear as it is developed in the series is perfectly in keeping with her presentation here, where she cannot be bothered with subtlety or self-restraint. The real tension in the scene is that Rand is effectively helpless in the hands of a villain with a lot of abuser characteristics, who might do just about anything. </span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Even more hilariously is the point that Jordan seeds the books with many red herrings. When I saw the cover of “The Great Hunt” under the heading “A Friend is Evil” I was dumbfounded that THIS is what Oren chose to write about. There are at least two much better instances of this concept in Rand’s arc alone, in addition to a similar thing going on with the other major point of view character. Basically, Jordan had Lanfear swanning around being all blatant and obvious, so you wouldn’t notice the other two. And it worked like a charm on Oren. </span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Also, ship camouflage is not meant to make the ship invisible, it is meant to break up the lines of its appearance to make it harder for the crews of enemy ships to accurately identify the vessel’s size, location, speed and class. If you’re a submarine, you’re going to use different priorities and tactics depending on if you see a battleship, a destroyer or a transport ship in your periscope.</span></p><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">

</span><p data-dcnode-id="640"><span data-dcnode-id="643" instrument_node="">How to avoid bad plot twists: simple, don’t use plot twists. Plot twists are a one-shot gun. Plot twists are lazy. Plot twists are bad.</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
Bad novels have bad plot twists. OK novels have good plot twists. Great novels have a dreadful feeling of anticipation.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="638" instrument_node="">Announce in advance what is going to happen and let the tension rise up as the inevitable unfold. Romeo and Juliet will die. Everyone knows that, that’s what makes it great.</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
Elisabeth and Darcy will fell in love. Everyone knows that, it’s the “how” that matters.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Now that you don’t have to hide something from your readers, you can focus on the important stuff, like complex characters and strong prose.</span></p><span data-dcnode-id="631" instrument_node="">

</span><p data-dcnode-id="545"><span data-dcnode-id="550" instrument_node="">Plot twists are good, but if you don’t put any effort on it, and therefore all goes as planned, then there is no plot twist.</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
Don’t tell me you saw the final twist of Romeo commiting suicide when he thinks Juliet was dead the first time you read it. If it was the case you should put your powers to work as an oracle, cause it is a plot twist and a huge one. Or maybe you meant that the story is so much known that there is no surprise anymore, but the same apply to any story, once you have seen a plot twist, it stop working, and that is why a writer need to mix and match different twists, instead of repeat the same several times.</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">
You can’t have a story without twists, if you take them out you’ll end up with a list of actions.</span></p><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span><div class="reply" data-dcnode-id="539"><a aria-label="Reply to Erynus" class="comment-reply-link" data-belowelement="div-comment-421482" data-commentid="421482" data-dcnode-id="540" data-postid="30159" data-replyto="Reply to Erynus" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mythcreants.com/blog/five-plot-twists-that-are-too-obvious/%3Freplytocom%3D421482%23respond" rel="nofollow"><span data-dcnode-id="541" instrument_node="">Reply</span></a></div><span data-dcnode-id="538" instrument_node=""> </span></article><span data-dcnode-id="536" instrument_node="">

</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">English is not my mother language so I’m may be confused here but as far as I understand “plot twist” means “an unexpected development that change the course of the story”. So for example Gandalf resurrection is a plot twist but Gandalf’s death is not a plot twist.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="502" instrument_node=""> I strongly disagree with the fact that this is needed for a good story.</span><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node="">
Well, it’s not bad in itself to have unexpected or unexpectable developments but if surprise is the only thing that makes your story work it is a cheap kind of tension that I find not really interesting. And it also means that the story can be destroyed by a single spoiler. Those kind of stories won’t be interesting on a reread either.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">Romeo and Juliet is so well known that there is no surprise any more (also if you are familiar with the genre you should probably expect a double death at the end).</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
Racine’s Bérénice has no plot twist whatsoever. No action either actually. Yet it is a great story too. </span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Pride and Prejudice is another interesting example: Austen always sprinkle up some clues about the evolving feeling of the different characters. A astute reader should guess that Darcy loves Elizabeth well before he proposes; a not-so-astute reader will guess Elizabeth’s feeling have changed well before it is even clear for herself. There is nothing unexpected in the final understanding between the two: both the convention of the genre and the clues in the writing have been leading to it. Yet you can not say that it was “too obvious”. The book does not care about being “obvious”; it cares about describing the evolving feeling of the characters. </span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">So basically my point is that “too obvious plot twist” is kind of a meaningless issue – I’d be generally much more concerned about a too well hidden plot twist, like the murderer being some random character that appears only in the last chapter of a crime novel.</span></p><span data-dcnode-id="487" instrument_node="">
</span></div><span data-dcnode-id="485" instrument_node="">
