</span><div class="qa_answer answer" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">

</span><div class="qa_answer answer" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">
								You run the risk of badly disappointing your reader, especially if you've done a good job of making the character likable/lovable. The loss of the main character also drastically changes the focus of your story, which can be a real challenge for the author in terms of maintaining the reader's interest and enjoyment. It's almost as if you have to write two stories instead of one.

</span><div class="qa_q_txt" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">How can I make a story with no main villain still seem interesting and challenging for the characters?</span></div><span data-dcnode-id="1477" instrument_node="">
</span><div class="qa_answers" data-dcnode-id="1418"><span data-dcnode-id="1476" instrument_node="">
</span><div class="qa_user_area" data-dcnode-id="1454"><span data-dcnode-id="1475" instrument_node="">
</span><div class="qa_user_hover hint_box" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">

</span><div class="qa_person_circle" data-dcnode-id="1466"><span data-dcnode-id="1471" instrument_node="">

</span></div><span data-dcnode-id="1465" instrument_node="">
</span><div class="qa_answerer_info" data-dcnode-id="1456"><span data-dcnode-id="1464" instrument_node="">
</span><div class="qa_user_name" data-dcnode-id="1461"><span class="qa_user_link" data-dcnode-id="1462" data-href="/User:ElizabethCollins"><span data-dcnode-id="1463" instrument_node="">Elizabeth Collins</span></span></div><span data-dcnode-id="1460" instrument_node="">
</span><div class="qa_user_label" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Community Answer</span></div><span data-dcnode-id="1457" instrument_node="">
</span></div><span data-dcnode-id="1455" instrument_node="">
</span></div><span data-dcnode-id="1453" instrument_node="">
</span><div class="qa_answer answer" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">
								Even without a main villain, the interest and challenge will still come from the struggles that the characters face. What kind of hurdles are you throwing their way? What kind of obstacles do they have to overcome? Tension is the key to an interesting plotline, so keep in mind what the stakes in your story are. Think of what will happen if the characters fail, and make sure that the audience knows it.

</span><div class="qa_divider" data-dcnode-id="1123"></div><span data-dcnode-id="1122" instrument_node="">
</span><div class="qa_li_container" data-dcnode-id="1056"><span data-dcnode-id="1121" instrument_node="">
</span><div class="qa_question_tab" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Question</span></div><span data-dcnode-id="1118" instrument_node="">
</span><div class="qa_q_txt" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">I have an antagonist who used to be in a band with my hero and he knows more about her life than she does. During a fight scene (she is a superhero), he tells her everything. How could I do this?</span></div><span data-dcnode-id="1115" instrument_node="">
</span><div class="qa_answers" data-dcnode-id="1058"><span data-dcnode-id="1114" instrument_node="">
</span><div class="qa_user_area" data-dcnode-id="1094"><span data-dcnode-id="1113" instrument_node="">
</span><div class="qa_user_hover hint_box" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node="">
</span><div class="qa_person_circle" data-dcnode-id="1104"><span data-dcnode-id="1109" instrument_node="">
</span><picture data-dcnode-id="1106"><source data-dcnode-id="1108" srcset="/images/thumb/f/f2/CommunityAvatar3.png/-crop-104-104-104px-CommunityAvatar3.png.webp" type="image/webp"><img alt="Community Answer" data-dcnode-id="1107" height="52" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.life/images/thumb/f/f2/CommunityAvatar3.png/-crop-104-104-104px-CommunityAvatar3.png&amp;raw" style="max-width:52px" width="52"></picture><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1103" instrument_node="">
</span><div class="qa_answerer_info" data-dcnode-id="1096"><span data-dcnode-id="1102" instrument_node="">
</span><div class="qa_user_name" data-dcnode-id="1101"></div><span data-dcnode-id="1100" instrument_node="">
</span><div class="qa_user_label" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Community Answer</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span></div><span data-dcnode-id="1093" instrument_node="">
</span><div class="qa_answer answer" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">
								Is she fighting him? If so, during the fight when she starts losing, he tells her to give up and if so, he’ll give her information about her past or he’ll just tell her then and there. You could also have a scene where he says something like “You're fighting for something you don’t even understand” and he tells her something shocking about her past and it escalates from there.
