</span><p data-dcnode-id="1938"><span data-dcnode-id="1943" instrument_node="">This post on books with plot twists is sponsored by </span><a data-dcnode-id="1940" href="#"><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Sympathy</span></em></a><span data-dcnode-id="1939" instrument_node=""> by Olivia Sudjic.</span></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1928"><b data-dcnode-id="1929"><a data-dcnode-id="1933" href="#" rel="nofollow"><img alt="" class="size-medium wp-image-123753 alignleft entered error" data-dcnode-id="1936" data-lazy-sizes="(max-width: 199px) 100vw, 199px" data-lazy-src="https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg" data-lazy-srcset="https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg 199w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-768x1160.jpg.optimal.jpg 768w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-678x1024.jpg.optimal.jpg 678w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-33x50.jpg.optimal.jpg 33w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres.jpg.optimal.jpg 1400w" data-ll-status="error" data-pin-title="100 Must-Read Books With Plot Twists" height="300" sizes="(max-width: 199px) 100vw, 199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg&amp;raw" srcset="https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg 199w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-768x1160.jpg.optimal.jpg 768w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-678x1024.jpg.optimal.jpg 678w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-33x50.jpg.optimal.jpg 33w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres.jpg.optimal.jpg 1400w" width="199"><noscript data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">&lt;img data-pin-title="100 Must-Read Books With Plot Twists" class="size-medium wp-image-123753 alignleft" src="https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg" alt="" width="199" height="300" srcset="https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-199x300.jpg.optimal.jpg 199w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-768x1160.jpg.optimal.jpg 768w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-678x1024.jpg.optimal.jpg 678w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres-33x50.jpg.optimal.jpg 33w, https://s2982.pcdn.co/wp-content/uploads/2017/04/sudjic_sympathy_hres.jpg.optimal.jpg 1400w" sizes="(max-width: 199px) 100vw, 199px"&gt;</span></noscript></a><em data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Sympathy</span></em><span data-dcnode-id="1930" instrument_node=""> is an electrifying debut novel of obsessive love, family secrets, and the dangers of living our lives online </span></b></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" style="font-weight: 400;"><span data-dcnode-id="1926" instrument_node="">Alice Hare has become fixated on Mizuko Himura, a Japanese writer whom Alice believes is her “Internet twin.” What seems to Mizuko like a chance encounter with Alice is anything but—after all, in the age of connectivity, nothing is coincidence. Their subsequent relationship is doomed from the outset, exposing a tangle of lies and sexual encounters as three families collide across the globe, and the most ancient of questions—where do we come from?—is answered just by searching online.</span></span></p><span data-dcnode-id="1923" instrument_node="">
</span><hr data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1920" instrument_node="">One of the best ways for a book to win me over is with a </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookriot.com/what-makes-a-great-twist/" rel="noopener" target="_blank"><span data-dcnode-id="1919" instrument_node="">killer plot twist</span></a><span data-dcnode-id="1917" instrument_node="">. I love&nbsp;feeling shocked, then going back a few pages to make sure I read that last bit correctly, then getting to the end of the book and wanting to flip it over and start at the beginning again. I want books to surprise me. I love being deceived. I love it when a book makes me want to run up to the first person I can find and say, “Holy crap, you need to read this book RIGHT NOW.”</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Of course, not every plot twist is as dramatic as this, but I love it when an author does a nifty bit of sleight-of-hand magic. In fact, I love it so much I put together&nbsp;a list of 100 books with plot twists. Some are insanely huge, some are smaller, but all are (hopefully) surprising. Don’t worry though…I won’t spoil any of these books with plot twists for you!</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1906"><em data-dcnode-id="1908"><span data-dcnode-id="1911" instrument_node="">1.&nbsp;</span><a class="butter" data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0061957852/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0061957852" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1910" instrument_node="">32 Candles</span></a></em><span data-dcnode-id="1907" instrument_node=""> – Ernessa T. Carter</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">“32 Candles is the slightly twisted, utterly romantic, and deftly wry story of Davie Jones, who, if she doesn’t stand in her own way, just might get the man of her dreams.”</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1896"><em data-dcnode-id="1898"><span data-dcnode-id="1901" instrument_node="">2. </span><a class="butter" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062315005/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062315005" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1900" instrument_node="">The Alchemist</span></a></em><span data-dcnode-id="1897" instrument_node=""> – Paulo Coelho</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">“A beloved modern fable about following your dreams and reading life’s omens.”</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1883"><em data-dcnode-id="1885"><img alt="Dallying With The Gods: 16 Books About Gods And Mythology | BookRiot.com" class="size-medium wp-image-103962 alignleft entered lazyloaded" data-dcnode-id="1891" data-lazy-sizes="(max-width: 186px) 100vw, 186px" data-lazy-src="https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg" data-lazy-srcset="https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg 186w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-31x50.jpg.optimal.jpg 31w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman.jpg.optimal.jpg 310w" data-ll-status="loaded" data-pin-title="100 Must-Read Books With Plot Twists" height="300" sizes="(max-width: 186px) 100vw, 186px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg&amp;raw" srcset="https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg 186w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-31x50.jpg.optimal.jpg 31w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman.jpg.optimal.jpg 310w" width="186"><noscript data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">&lt;img data-pin-title="100 Must-Read Books With Plot Twists" class="size-medium wp-image-103962 alignleft" src="https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg" alt="Dallying With The Gods: 16 Books About Gods And Mythology | BookRiot.com" width="186" height="300" srcset="https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-186x300.jpg.optimal.jpg 186w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman-31x50.jpg.optimal.jpg 31w, https://s2982.pcdn.co/wp-content/uploads/2016/08/american-gods-neil-gaiman.jpg.optimal.jpg 310w" sizes="(max-width: 186px) 100vw, 186px"&gt;</span></noscript><span data-dcnode-id="1888" instrument_node="">3. </span><a class="butter" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062472100/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062472100" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1887" instrument_node="">American Gods</span></a></em><span data-dcnode-id="1884" instrument_node=""> – Neil Gaiman</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">“Just released from prison, Shadow encounters Mr. Wednesday, an enigmatic stranger who seems to know a lot about him, and when Mr. Wednesday offers him a job as his bodyguard, Shadow accepts and is plunged into a dark and perilous world.”</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1872"><em data-dcnode-id="1874"><span data-dcnode-id="1878" instrument_node="">4. </span><a class="butter" data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062073486/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062073486" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1877" instrument_node="">And Then There Were None</span></a><span data-dcnode-id="1875" instrument_node=""> –&nbsp;</span></em><span data-dcnode-id="1873" instrument_node="">Agatha Christie</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Ten strangers are invited for a weekend at a private island, not realizing that they have each been marked for dead.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1862"><em data-dcnode-id="1864"><span data-dcnode-id="1867" instrument_node="">5. </span><a class="butter" data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/038572179X/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D038572179X" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1866" instrument_node="">Atonement</span></a></em><span data-dcnode-id="1863" instrument_node=""> – Ian McEwan</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">In the summer of 1935, 13-year-old Briony Tallis witnesses a scene between her older sister, Cecilia, and their housekeeper’s son, Robbie Turner, that she does not understand. By the end of the night, all three lives will have been irrevocably changed.</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1852"><em data-dcnode-id="1854"><span data-dcnode-id="1857" instrument_node="">6. </span><a class="butter" data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1616957182/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1616957182" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1856" instrument_node="">August Snow</span></a></em><span data-dcnode-id="1853" instrument_node=""> – Stephen Mack Jones</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">August Snow joined the Detroit Police, only to be forced out by corrupt cops and politicians. But after fighting back against the city and winning a multi-million dollar settlement, August is only just learning how many scores he has left to settle.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1842"><em data-dcnode-id="1844"><span data-dcnode-id="1847" instrument_node="">7. </span><a class="butter" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062060562/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062060562" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1846" instrument_node="">Before I Go to Sleep</span></a></em><span data-dcnode-id="1843" instrument_node=""> – S.J. Watson</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Every morning, Christine wakes up with no memory of the last 10 years of her life, or her husband Ben. In an attempt to keep a record of her past, Christine has started writing in a journal. But one morning, she wakes up and reads her most recent journal entry: “Don’t trust Ben.”</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1831"><em data-dcnode-id="1833"><span data-dcnode-id="1837" instrument_node="">8. </span><a class="butter" data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/125011117X/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D125011117X" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1836" instrument_node="">Behind Her Eyes</span></a><span data-dcnode-id="1834" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1832" instrument_node="">– Sarah Pinborough</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Louise is a secretary to a successful (married) psychiatrist named David, with whom she had a one-night stand. But despite her best efforts to stay away, she can’t help but be drawn into his life and the life of his wife Adele. Why is David so controlling? What isn’t Adele telling her?</span></p><span data-dcnode-id="1827" instrument_node="">

</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Follows the lives of the Trueba family, beginning with the clairvoyant Clara del Valle and ending with her granddaughter, Alba, who will lead her family and her country into a revolution.</span></p><span data-dcnode-id="1448" instrument_node="">

</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Robert Neville is the last living person on the face of the planet, but he is surrounded by legions of the undead. By day, he hunts the vampires looking for his blood, and by night he barricades himself in his home. How long can he go on like this?</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1432"><em data-dcnode-id="1434"><span data-dcnode-id="1437" instrument_node="">47. </span><a class="butter" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0375836675/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0375836675" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1436" instrument_node="">I Am the Messenger</span></a></em><span data-dcnode-id="1433" instrument_node=""> – Markus Zusak</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">“Ed Kennedy is an underage cabdriver without much of a future. He’s pathetic at playing cards, hopelessly in love with his best friend, Audrey, and utterly devoted to his coffee-drinking dog, the Doorman. His life is one of peaceful routine and incompetence until he inadvertently stops a bank robbery. That’s when the first ace arrives in the mail. That’s when Ed becomes the messenger.”</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1422"><em data-dcnode-id="1424"><span data-dcnode-id="1427" instrument_node="">48. </span><a class="butter" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1101987502/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1101987502" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1426" instrument_node="">I Hunt Killers</span></a></em><span data-dcnode-id="1423" instrument_node=""> – Barry Lyga</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">17-year-old Jazz Dennings knows a lot about serial killers from his notorious father, who now sits in jail for murdering dozens of people. Jazz is worried he’ll turn out just like his dad, but it doesn’t stop him from trying to help the police when another serial killer shows up in his town.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1412"><em data-dcnode-id="1414"><span data-dcnode-id="1417" instrument_node="">49. </span><a class="butter" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1501126946/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1501126946" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1416" instrument_node="">I Let You Go</span></a></em><span data-dcnode-id="1413" instrument_node=""> – Clare Mackintosh</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Jenna Gray has fled to the Welsh coast after the death of her young son in a hit-and-run accident. The case has been marked cold by the police, but two officers still can’t get the case out of their heads. &nbsp;But they don’t know the whole story….</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1402"><em data-dcnode-id="1404"><span data-dcnode-id="1407" instrument_node="">50. </span><a class="butter" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1501126946/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1501126946" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1406" instrument_node="">I’m Thinking of Ending Things</span></a></em><span data-dcnode-id="1403" instrument_node=""> – Ian Reid</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">The novel’s unnamed narrator and her boyfriend Jake are on a road trip to visit his parents for the first time. Something isn’t quite right about the whole situation, but it isn’t until a sudden detour on the way home that leaves Jake’s girlfriend stranded at an abandoned high school that things really start to unravel.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1392"><em data-dcnode-id="1394"><span data-dcnode-id="1397" instrument_node="">51. </span><a class="butter" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1501112333/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1501112333" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1396" instrument_node="">In a Dark, Dark Wood</span></a></em><span data-dcnode-id="1393" instrument_node="">&nbsp;– Ruth Ware</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Leonora, a reclusive crime writer, has been invited to her friend’s bachelorette party, even though she hasn’t spoken to her friend in almost ten years. 48 hours later, Leonora wakes up in the hospital, not knowing anything about what happened, except that someone is dead.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1379"><em data-dcnode-id="1381"><img alt="" class="size-medium wp-image-70687 alignleft" data-dcnode-id="1387" data-lazy-sizes="(max-width: 185px) 100vw, 185px" data-lazy-src="https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover-185x300.jpg.optimal.jpg" data-lazy-srcset="https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover-185x300.jpg.optimal.jpg 185w, https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover.jpg.optimal.jpg 309w" data-pin-title="100 Must-Read Books With Plot Twists" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20185%20300'%3E%3C/svg%3E" width="185"><noscript data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">&lt;img data-pin-title="100 Must-Read Books With Plot Twists" class="size-medium wp-image-70687 alignleft" src="https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover-185x300.jpg.optimal.jpg" alt="" width="185" height="300" srcset="https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover-185x300.jpg.optimal.jpg 185w, https://s2982.pcdn.co/wp-content/uploads/2014/10/in-the-woods-cover.jpg.optimal.jpg 309w" sizes="(max-width: 185px) 100vw, 185px"&gt;</span></noscript><span data-dcnode-id="1384" instrument_node="">52. </span><a class="butter" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0143113496/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0143113496" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1383" instrument_node="">In the Woods</span></a></em><span data-dcnode-id="1380" instrument_node=""> – Tana French</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Dublin detectives Rob Ryan and Cassie Maddox investigate the murder of a 12-year-old girl in a nearby suburb that bears striking similarities to an unsolved mystery surrounding Detective Ryan.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1369"><em data-dcnode-id="1371"><span data-dcnode-id="1374" instrument_node="">53. </span><a class="butter" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0879975628/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0879975628" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1373" instrument_node="">Kill the Dead</span></a></em><span data-dcnode-id="1370" instrument_node=""> – Tanith Lee</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Parl Dro, Ghost Slayer, will not be deterred from killing the dead. He means to destroy Ghyste Mortua, the stronghold of the dead in the mountains, and nothing will stand in his way.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1359"><em data-dcnode-id="1361"><span data-dcnode-id="1364" instrument_node="">54. </span><a class="butter" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1250067553/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1250067553" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1363" instrument_node="">The Killing Lessons</span></a></em><span data-dcnode-id="1360" instrument_node=""> – Saul Black</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">San Francisco homicide detective Valerie Hart is on the trail of two psychopaths who have left a long and bloody trail in their wake. &nbsp;But their last killing left a survivor and now Detective Hart may have the key to finding these men.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1339"><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">55. </span></em><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062267531/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062267531" target="_blank"><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">The </span></em><em data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Kind</span></em><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">&nbsp;</span></em></a><i data-dcnode-id="1343"><a class="butter" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062267531/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062267531" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1345" instrument_node="">Worth Killing</span></a></i><i data-dcnode-id="1342"></i><i data-dcnode-id="1341"></i><span data-dcnode-id="1340" instrument_node=""> – Peter Swanson</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">On an international flight, Ted Severson meets the gorgeous Lily Kintner. The two begin to share intimate details about themselves, but when Ted half-jokingly says that he’d like to kill his wife, Lily says she’d like to help.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1329"><em data-dcnode-id="1331"><span data-dcnode-id="1334" instrument_node="">56. </span><a class="butter" data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/159463193X/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D159463193X" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1333" instrument_node="">The Kite Runner</span></a></em><span data-dcnode-id="1330" instrument_node=""> – Khaled Hosseini</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">“Amir is the son of a wealthy Kabul merchant. Hassan, his servant and constant companion, is a Hazara, a despised and impoverished caste. Their uncommon bond is torn by Amir’s choice to abandon his friend amidst the increasing ethnic, religious, and political tensions of the dying years of the Afghan monarchy, wrenching them far apart. But so strong is the bond between the two boys that Amir journeys back to a distant world, to try to right past wrongs.”</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1318"><em data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node="">57. </span><a class="butter" data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1250055172/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1250055172" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1323" instrument_node="">The Language of Secrets</span></a><span data-dcnode-id="1321" instrument_node=""> –&nbsp;</span></em><span data-dcnode-id="1319" instrument_node="">Ausma Zehanat Khan</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">“Detective Esa Khattak heads up Canada’s Community Policing Section, which handles minority-sensitive cases across all levels of law enforcement. Khattak is still under scrutiny for his last case, so he’s surprised when INSET, Canada’s federal intelligence agency, calls him in on another potentially hot button issue: a local terrorist cell which is planning an attack on New Year’s Day.”</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1308"><em data-dcnode-id="1310"><span data-dcnode-id="1313" instrument_node="">58. </span><a class="butter" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1599905191/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D1599905191" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1312" instrument_node="">Liar</span></a></em><span data-dcnode-id="1309" instrument_node=""> – Justine Larbalestier</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Micah is a compulsive liar, but she’s always been able to stay ahead of her lies, until her boyfriend dies under brutal circumstances and her lies begin to catch up with her.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1298"><em data-dcnode-id="1300"><span data-dcnode-id="1303" instrument_node="">59. </span><a class="butter" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0156027321/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0156027321" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1302" instrument_node="">Life of Pi</span></a></em><span data-dcnode-id="1299" instrument_node=""> – Yann Martel</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Pi Patel, the 16-year-old son of an Indian zookeeper, travels by sea with his family to start a new life in Canada, but ultimately finds himself stranded on a raft when their boat sinks, with no one but a 450 pound Bengal tiger for company.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1287"><em data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">60. </span><a class="butter" data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0142402516/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0142402516" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1292" instrument_node="">Looking For Alaska</span></a><span data-dcnode-id="1290" instrument_node=""> –&nbsp;</span></em><span data-dcnode-id="1288" instrument_node="">John Green</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Miles “Pudge” Halter heads off to the sometimes-crazy world of Culver 62. Creek Boarding School, where he meets the screwed-up and fascinating girl, Alaska Young. She captures his heart, but after……Miles’ life will be changed forever.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1277"><em data-dcnode-id="1279"><span data-dcnode-id="1282" instrument_node="">61. </span><a class="butter" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/031615931X/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D031615931X" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1281" instrument_node="">The Man in My Basement</span></a></em><span data-dcnode-id="1278" instrument_node=""> – Walter Mosley</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Charles Blakely is a young black man on the verge of losing everything, including his old family home, until a white stranger offers Charles $50,000 and asks to be held prisoner in Charles’ basement.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1267"><em data-dcnode-id="1269"><span data-dcnode-id="1272" instrument_node="">62. </span><a class="butter" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0385737955/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0385737955" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1271" instrument_node="">The Maze Runner</span></a></em><span data-dcnode-id="1268" instrument_node=""> – James Dashner</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Thomas wakes up in an elevator, remembering nothing but his own name, and finds himself in an enclosed environment with about 60 other boys, and a new boy arriving every 30 days. &nbsp;They’ve been trying to escape for several years, but then a comatose girl appears in their midst and everything begins to change…</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1254"><em data-dcnode-id="1256"><img alt="" class="size-medium wp-image-62974 alignleft" data-dcnode-id="1262" data-lazy-sizes="(max-width: 198px) 100vw, 198px" data-lazy-src="https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-198x300.jpg.optimal.jpg" data-lazy-srcset="https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-198x300.jpg.optimal.jpg 198w, https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-225x340.jpg.optimal.jpg 225w, https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke.jpg.optimal.jpg 429w" data-pin-title="100 Must-Read Books With Plot Twists" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20198%20300'%3E%3C/svg%3E" width="198"><noscript data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">&lt;img data-pin-title="100 Must-Read Books With Plot Twists" class="size-medium wp-image-62974 alignleft" src="https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-198x300.jpg.optimal.jpg" alt="" width="198" height="300" srcset="https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-198x300.jpg.optimal.jpg 198w, https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke-225x340.jpg.optimal.jpg 225w, https://s2982.pcdn.co/wp-content/uploads/2014/03/Mind-of-Winter-Laura-Kasischke.jpg.optimal.jpg 429w" sizes="(max-width: 198px) 100vw, 198px"&gt;</span></noscript><span data-dcnode-id="1259" instrument_node="">63. </span><a class="butter" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0062284401/ref%3Das_li_tf_il%3Fie%3DUTF8%26tag%3Dboorio-20%26linkCode%3Das2%26camp%3D217145%26creative%3D399349%26creativeASIN%3D0062284401" rel="nofollow" target="_blank" title="Buy From Amazon"><span data-dcnode-id="1258" instrument_node="">Mind of Winter</span></a></em><span data-dcnode-id="1255" instrument_node=""> – Laura Kasischke</span></p><span data-dcnode-id="1253" instrument_node="">

</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">“Meet Dolores Price. She’s 13, wise-mouthed but wounded, having bid her childhood goodbye. Stranded in front of her bedroom TV, she spends the next few years nourishing herself with the Mallomars, potato chips, and Pepsi her anxious mother supplies. When she finally orbits into young womanhood at 257 pounds, Dolores is no stronger and life is no kinder. But this time she’s determined to rise to the occasion and give herself one more chance before she really goes under.”</span></p><span data-dcnode-id="1084" instrument_node="">
