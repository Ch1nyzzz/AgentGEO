</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="2842" id="firstHeading"><span data-dcnode-id="2843" instrument_node="">Plot twist</span></h1><span data-dcnode-id="2841" instrument_node="">
</span><div class="vector-body" data-dcnode-id="508" id="bodyContent"><span data-dcnode-id="2840" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="544" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="553"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="2823" style="display:none"><span data-dcnode-id="2824" instrument_node="">Narrative technique</span></div><span data-dcnode-id="2822" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2815" role="note"><span data-dcnode-id="2819" instrument_node="">For other uses, see </span><a class="mw-disambig" data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plot_Twist_%28disambiguation%29" title="Plot Twist (disambiguation)"><span data-dcnode-id="2818" instrument_node="">Plot Twist (disambiguation)</span></a><span data-dcnode-id="2816" instrument_node="">.</span></div><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2813" instrument_node="">A </span><b data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">plot twist</span></b><span data-dcnode-id="2810" instrument_node=""> is a </span><a class="mw-redirect" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literary_technique" title="Literary technique"><span data-dcnode-id="2809" instrument_node="">literary technique</span></a><span data-dcnode-id="2807" instrument_node=""> that introduces a radical change in the direction or expected outcome of the </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plot_%28narrative%29" title="Plot (narrative)"><span data-dcnode-id="2806" instrument_node="">plot</span></a><span data-dcnode-id="2804" instrument_node=""> in a work of fiction.</span><sup class="reference" data-dcnode-id="2801" id="cite_ref-SingletonConrad2000_1-0"><a data-dcnode-id="2802" href="#cite_note-SingletonConrad2000-1"><span data-dcnode-id="2803" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2800" instrument_node=""> When it happens near the end of a story, it is known as a </span><b data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">twist</span></b><span data-dcnode-id="2797" instrument_node=""> or </span><b data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">surprise ending</span></b><span data-dcnode-id="2794" instrument_node="">.</span><sup class="reference" data-dcnode-id="2791" id="cite_ref-KayGelshenen2001_2-0"><a data-dcnode-id="2792" href="#cite_note-KayGelshenen2001-2"><span data-dcnode-id="2793" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2790" instrument_node=""> It may change the audience's perception of the preceding events, or introduce a new conflict that places it in a different context. A plot twist may be </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreshadowing" title="Foreshadowing"><span data-dcnode-id="2789" instrument_node="">foreshadowed</span></a><span data-dcnode-id="2787" instrument_node="">, to prepare the audience to accept it. There are a variety of methods used to execute a plot twist, such as withholding information from the audience or misleading it with ambiguous or false information.
</span></p><p data-dcnode-id="2777"><span data-dcnode-id="2785" instrument_node="">Revealing a plot twist to readers or viewers in advance is commonly regarded as a "</span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spoiler_%28media%29" title="Spoiler (media)"><span data-dcnode-id="2784" instrument_node="">spoiler</span></a><span data-dcnode-id="2782" instrument_node="">", since the effectiveness of a plot twist usually relies on the audience's not having expected it. Even revealing the fact that a work contains plot twists – especially at the ending – can also be controversial, as it changes the audience's expectations. However, at least one study suggests that this does not affect the enjoyment of a work.</span><sup class="reference" data-dcnode-id="2779" id="cite_ref-3"><a data-dcnode-id="2780" href="#cite_note-3"><span data-dcnode-id="2781" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2778" instrument_node="">
</span></p><span data-dcnode-id="2776" instrument_node="">

</span><h2 data-dcnode-id="2637"><span class="mw-headline" data-dcnode-id="2645" id="Early_examples"><span data-dcnode-id="2646" instrument_node="">Early examples</span></span><span class="mw-editsection" data-dcnode-id="2638"><span class="mw-editsection-bracket" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">[</span></span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D1" title="Edit section: Early examples"><span data-dcnode-id="2642" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2635" instrument_node="">An early example of the romance genre</span><sup class="reference" data-dcnode-id="2632" id="cite_ref-4"><a data-dcnode-id="2633" href="#cite_note-4"><span data-dcnode-id="2634" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2631" instrument_node=""> with multiple twists</span><sup class="reference" data-dcnode-id="2628" id="cite_ref-5"><a data-dcnode-id="2629" href="#cite_note-5"><span data-dcnode-id="2630" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2627" instrument_node=""> was the </span><i data-dcnode-id="2624"><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="2626" instrument_node="">Arabian Nights</span></a></i><span data-dcnode-id="2623" instrument_node=""> tale "</span><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Three_Apples" title="The Three Apples"><span data-dcnode-id="2622" instrument_node="">The Three Apples</span></a><span data-dcnode-id="2620" instrument_node="">". It begins with a fisherman discovering a locked chest. The first twist occurs when the chest is broken open and a corpse is found inside. The initial search for the murderer fails, and a twist occurs when two men appear, separately claiming to be the murderer. A complex chain of events finally reveals the murderer to be the investigator's own slave.
</span></p><span data-dcnode-id="2618" instrument_node="">
</span><h2 data-dcnode-id="2608"><span class="mw-headline" data-dcnode-id="2616" id="Mechanics"><span data-dcnode-id="2617" instrument_node="">Mechanics</span></span><span class="mw-editsection" data-dcnode-id="2609"><span class="mw-editsection-bracket" data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">[</span></span><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D2" title="Edit section: Mechanics"><span data-dcnode-id="2613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2607" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="2570" role="presentation"><tbody data-dcnode-id="2571"><tr data-dcnode-id="2572"><td class="mbox-image" data-dcnode-id="2603"><div data-dcnode-id="2604" style="width:52px"><a class="image" data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="2606" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="2573"><div class="mbox-text-span" data-dcnode-id="2574"><span data-dcnode-id="2602" instrument_node="">This section </span><b data-dcnode-id="2598"><span data-dcnode-id="2601" instrument_node="">needs additional citations for </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2600" instrument_node="">verification</span></a></b><span data-dcnode-id="2597" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2589"><span data-dcnode-id="2596" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit"><span data-dcnode-id="2595" instrument_node="">improve this article</span></a><span data-dcnode-id="2593" instrument_node=""> by </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="2592" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="2590" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="2588" instrument_node=""> </span><span class="date-container" data-dcnode-id="2582"><i data-dcnode-id="2583"><span data-dcnode-id="2587" instrument_node="">(</span><span class="date" data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">September 2014</span></span><span data-dcnode-id="2584" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2575"><i data-dcnode-id="2576"><span data-dcnode-id="2581" instrument_node=""> (</span><small data-dcnode-id="2578"><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2580" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2577" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Literary analysts have identified several common categories of plot twists, based on how they are executed.
</span></p><span data-dcnode-id="2566" instrument_node="">
</span><h3 data-dcnode-id="2556"><span class="mw-headline" data-dcnode-id="2564" id="Anagnorisis"><span data-dcnode-id="2565" instrument_node="">Anagnorisis</span></span><span class="mw-editsection" data-dcnode-id="2557"><span class="mw-editsection-bracket" data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">[</span></span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D3" title="Edit section: Anagnorisis"><span data-dcnode-id="2561" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2512"><i data-dcnode-id="2552"><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anagnorisis" title="Anagnorisis"><span data-dcnode-id="2554" instrument_node="">Anagnorisis</span></a></i><span data-dcnode-id="2551" instrument_node="">, or discovery, is the protagonist's sudden recognition of his or her own or another character's true identity or nature.</span><sup class="reference" data-dcnode-id="2548" id="cite_ref-Baldick2008_6-0"><a data-dcnode-id="2549" href="#cite_note-Baldick2008-6"><span data-dcnode-id="2550" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2547" instrument_node=""> Through this technique, previously unforeseen character information is revealed. A notable example of anagnorisis occurs in </span><i data-dcnode-id="2544"><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oedipus_Rex" title="Oedipus Rex"><span data-dcnode-id="2546" instrument_node="">Oedipus Rex</span></a></i><span data-dcnode-id="2543" instrument_node="">: </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oedipus" title="Oedipus"><span data-dcnode-id="2542" instrument_node="">Oedipus</span></a><span data-dcnode-id="2540" instrument_node=""> kills his father and </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incest" title="Incest"><span data-dcnode-id="2539" instrument_node="">marries his mother in ignorance</span></a><span data-dcnode-id="2537" instrument_node="">, learning the truth only toward the climax of the play.</span><sup class="reference" data-dcnode-id="2534" id="cite_ref-7"><a data-dcnode-id="2535" href="#cite_note-7"><span data-dcnode-id="2536" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2533" instrument_node=""> The earliest use of this device as a twist ending in a </span><a data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crime_fiction" title="Crime fiction"><span data-dcnode-id="2532" instrument_node="">murder mystery</span></a><span data-dcnode-id="2530" instrument_node=""> was in "</span><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Three_Apples" title="The Three Apples"><span data-dcnode-id="2529" instrument_node="">The Three Apples</span></a><span data-dcnode-id="2527" instrument_node="">", a medieval </span><i data-dcnode-id="2524"><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Thousand_and_One_Nights" title="One Thousand and One Nights"><span data-dcnode-id="2526" instrument_node="">Arabian Nights</span></a></i><span data-dcnode-id="2523" instrument_node=""> tale, where the protagonist </span><a class="mw-redirect" data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ja%2527far_ibn_Yahya" title="Ja'far ibn Yahya"><span data-dcnode-id="2522" instrument_node="">Ja'far ibn Yahya</span></a><span data-dcnode-id="2520" instrument_node=""> discovers by chance a key item towards the end of the story that reveals the culprit behind the murder to have been his own slave all along.</span><sup class="reference" data-dcnode-id="2517" id="cite_ref-Pinault_8-0"><a data-dcnode-id="2518" href="#cite_note-Pinault-8"><span data-dcnode-id="2519" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="2514" id="cite_ref-Marzolph_9-0"><a data-dcnode-id="2515" href="#cite_note-Marzolph-9"><span data-dcnode-id="2516" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2513" instrument_node="">
</span></p><span data-dcnode-id="2511" instrument_node="">
</span><h3 data-dcnode-id="2501"><span class="mw-headline" data-dcnode-id="2509" id="Flashback"><span data-dcnode-id="2510" instrument_node="">Flashback</span></span><span class="mw-editsection" data-dcnode-id="2502"><span class="mw-editsection-bracket" data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">[</span></span><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D4" title="Edit section: Flashback"><span data-dcnode-id="2506" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2468"><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flashback_%28narrative%29" title="Flashback (narrative)"><span data-dcnode-id="2499" instrument_node="">Flashback</span></a><span data-dcnode-id="2497" instrument_node="">, or analepsis, a sudden, vivid reversion to a past event,</span><sup class="reference" data-dcnode-id="2494" id="cite_ref-10"><a data-dcnode-id="2495" href="#cite_note-10"><span data-dcnode-id="2496" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2493" instrument_node=""> surprises the reader with previously unknown information that solves a mystery, places a character in a different light, or reveals the reason for a previously inexplicable action. The </span><a data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Hitchcock" title="Alfred Hitchcock"><span data-dcnode-id="2492" instrument_node="">Alfred Hitchcock</span></a><span data-dcnode-id="2490" instrument_node=""> film </span><i data-dcnode-id="2487"><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marnie_%28film%29" title="Marnie (film)"><span data-dcnode-id="2489" instrument_node="">Marnie</span></a></i><span data-dcnode-id="2486" instrument_node=""> employed this type of surprise ending. Sometimes this is combined with the above category, as the flashback may reveal the true identity of one of the characters, or that the protagonist is related to one of the villain's past victims, as </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergio_Leone" title="Sergio Leone"><span data-dcnode-id="2485" instrument_node="">Sergio Leone</span></a><span data-dcnode-id="2483" instrument_node=""> did with </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Bronson" title="Charles Bronson"><span data-dcnode-id="2482" instrument_node="">Charles Bronson</span></a><span data-dcnode-id="2480" instrument_node="">'s character in </span><i data-dcnode-id="2477"><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Once_Upon_a_Time_in_the_West" title="Once Upon a Time in the West"><span data-dcnode-id="2479" instrument_node="">Once Upon a Time in the West</span></a></i><span data-dcnode-id="2476" instrument_node=""> or </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederick_Forsyth" title="Frederick Forsyth"><span data-dcnode-id="2475" instrument_node="">Frederick Forsyth</span></a><span data-dcnode-id="2473" instrument_node="">'s </span><i data-dcnode-id="2470"><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Odessa_File" title="The Odessa File"><span data-dcnode-id="2472" instrument_node="">The Odessa File</span></a></i><span data-dcnode-id="2469" instrument_node="">.
</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h3 data-dcnode-id="2457"><span class="mw-headline" data-dcnode-id="2465" id="Cliffhanger"><span data-dcnode-id="2466" instrument_node="">Cliffhanger</span></span><span class="mw-editsection" data-dcnode-id="2458"><span class="mw-editsection-bracket" data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">[</span></span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D5" title="Edit section: Cliffhanger"><span data-dcnode-id="2462" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2455" instrument_node="">A </span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cliffhanger" title="Cliffhanger"><span data-dcnode-id="2454" instrument_node="">cliffhanger</span></a><span data-dcnode-id="2452" instrument_node=""> or cliffhanger ending, is a plot device in fiction which features a main character in a precarious or difficult dilemma or confronted with a shocking revelation at the end of an episode of serialized fiction. A cliffhanger is hoped to incentivize the audience to return to see how the characters resolve the dilemma.
</span></p><span data-dcnode-id="2450" instrument_node="">
</span><h3 data-dcnode-id="2440"><span class="mw-headline" data-dcnode-id="2448" id="Unreliable_narrator"><span data-dcnode-id="2449" instrument_node="">Unreliable narrator</span></span><span class="mw-editsection" data-dcnode-id="2441"><span class="mw-editsection-bracket" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">[</span></span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D6" title="Edit section: Unreliable narrator"><span data-dcnode-id="2445" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2438" instrument_node="">An </span><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unreliable_narrator" title="Unreliable narrator"><span data-dcnode-id="2437" instrument_node="">unreliable narrator</span></a><span data-dcnode-id="2435" instrument_node=""> twists the ending by revealing, almost always at the end of the narrative, that the narrator has manipulated or fabricated the preceding story, thus forcing the reader to question his or her prior assumptions about the text.</span><sup class="reference" data-dcnode-id="2432" id="cite_ref-11"><a data-dcnode-id="2433" href="#cite_note-11"><span data-dcnode-id="2434" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2431" instrument_node=""> This </span><a class="mw-redirect" data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motif_%28literature%29" title="Motif (literature)"><span data-dcnode-id="2430" instrument_node="">motif</span></a><span data-dcnode-id="2428" instrument_node=""> is often used within </span><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noir_fiction" title="Noir fiction"><span data-dcnode-id="2427" instrument_node="">noir fiction</span></a><span data-dcnode-id="2425" instrument_node=""> and </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_noir" title="Film noir"><span data-dcnode-id="2424" instrument_node="">films</span></a><span data-dcnode-id="2422" instrument_node="">, notably in the film </span><i data-dcnode-id="2419"><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Usual_Suspects" title="The Usual Suspects"><span data-dcnode-id="2421" instrument_node="">The Usual Suspects</span></a></i><span data-dcnode-id="2418" instrument_node="">. An unreliable narrator motif was employed by Agatha Christie in </span><i data-dcnode-id="2415"><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Murder_of_Roger_Ackroyd" title="The Murder of Roger Ackroyd"><span data-dcnode-id="2417" instrument_node="">The Murder of Roger Ackroyd</span></a></i><span data-dcnode-id="2414" instrument_node="">, a novel that generated much controversy due to critics' contention that it was unfair to trick the reader in such a manipulative manner.</span><sup class="reference" data-dcnode-id="2411" id="cite_ref-12"><a data-dcnode-id="2412" href="#cite_note-12"><span data-dcnode-id="2413" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2410" instrument_node=""> Another example of unreliable narration is a character who has been revealed to be insane and thus causes the audience to question the previous narrative; notable examples of this are in the </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terry_Gilliam" title="Terry Gilliam"><span data-dcnode-id="2409" instrument_node="">Terry Gilliam</span></a><span data-dcnode-id="2407" instrument_node=""> film </span><i data-dcnode-id="2404"><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil_%281985_film%29" title="Brazil (1985 film)"><span data-dcnode-id="2406" instrument_node="">Brazil</span></a></i><span data-dcnode-id="2403" instrument_node="">, </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chuck_Palahniuk" title="Chuck Palahniuk"><span data-dcnode-id="2402" instrument_node="">Chuck Palahniuk</span></a><span data-dcnode-id="2400" instrument_node="">'s </span><i data-dcnode-id="2397"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fight_Club_%28novel%29" title="Fight Club (novel)"><span data-dcnode-id="2399" instrument_node="">Fight Club</span></a></i><span data-dcnode-id="2396" instrument_node=""> (and </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Fincher" title="David Fincher"><span data-dcnode-id="2395" instrument_node="">David Fincher</span></a><span data-dcnode-id="2393" instrument_node="">'s </span><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fight_Club" title="Fight Club"><span data-dcnode-id="2392" instrument_node="">film adaptation</span></a><span data-dcnode-id="2390" instrument_node="">), </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene_Wolfe" title="Gene Wolfe"><span data-dcnode-id="2389" instrument_node="">Gene Wolfe</span></a><span data-dcnode-id="2387" instrument_node="">'s novel </span><i data-dcnode-id="2384"><a class="mw-redirect" data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_the_New_Sun" title="Book of the New Sun"><span data-dcnode-id="2386" instrument_node="">Book of the New Sun</span></a></i><span data-dcnode-id="2383" instrument_node="">, the second episode of </span><i data-dcnode-id="2380"><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Hitchcock_Presents" title="Alfred Hitchcock Presents"><span data-dcnode-id="2382" instrument_node="">Alfred Hitchcock Presents</span></a></i><span data-dcnode-id="2379" instrument_node="">, </span><i data-dcnode-id="2376"><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premonition_%282007_film%29" title="Premonition (2007 film)"><span data-dcnode-id="2378" instrument_node="">Premonition</span></a></i><span data-dcnode-id="2375" instrument_node="">, the 1920 German silent horror film </span><i data-dcnode-id="2372"><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Cabinet_of_Dr._Caligari" title="The Cabinet of Dr. Caligari"><span data-dcnode-id="2374" instrument_node="">The Cabinet of Dr. Caligari</span></a></i><span data-dcnode-id="2371" instrument_node="">, </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iain_Pears" title="Iain Pears"><span data-dcnode-id="2370" instrument_node="">Iain Pears</span></a><span data-dcnode-id="2368" instrument_node="">'s </span><i data-dcnode-id="2365"><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/An_Instance_of_the_Fingerpost" title="An Instance of the Fingerpost"><span data-dcnode-id="2367" instrument_node="">An Instance of the Fingerpost</span></a></i><span data-dcnode-id="2364" instrument_node="">, </span><i data-dcnode-id="2361"><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shutter_Island_%28film%29" title="Shutter Island (film)"><span data-dcnode-id="2363" instrument_node="">Shutter Island</span></a></i><span data-dcnode-id="2360" instrument_node=""> and </span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Newman" title="Kim Newman"><span data-dcnode-id="2359" instrument_node="">Kim Newman</span></a><span data-dcnode-id="2357" instrument_node="">'s </span><i data-dcnode-id="2354"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life%2527s_Lottery" title="Life's Lottery"><span data-dcnode-id="2356" instrument_node="">Life's Lottery</span></a></i><span data-dcnode-id="2353" instrument_node="">.
</span></p><span data-dcnode-id="2351" instrument_node="">
</span><h3 data-dcnode-id="2341"><span class="mw-headline" data-dcnode-id="2349" id="Peripeteia"><span data-dcnode-id="2350" instrument_node="">Peripeteia</span></span><span class="mw-editsection" data-dcnode-id="2342"><span class="mw-editsection-bracket" data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">[</span></span><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D7" title="Edit section: Peripeteia"><span data-dcnode-id="2346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2294"><a data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peripeteia" title="Peripeteia"><span data-dcnode-id="2339" instrument_node="">Peripeteia</span></a><span data-dcnode-id="2337" instrument_node=""> is a sudden reversal of the protagonist's fortune, whether for good or ill, that emerges naturally from the character's circumstances.</span><sup class="reference" data-dcnode-id="2334" id="cite_ref-PayneBarbera2010_13-0"><a data-dcnode-id="2335" href="#cite_note-PayneBarbera2010-13"><span data-dcnode-id="2336" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2333" instrument_node=""> Unlike the </span><i data-dcnode-id="2330"><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deus_ex_machina" title="Deus ex machina"><span data-dcnode-id="2332" instrument_node="">deus ex machina</span></a></i><span data-dcnode-id="2329" instrument_node=""> device, peripeteia must be logical within the frame of the story. An example of a reversal for ill would be </span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agamemnon" title="Agamemnon"><span data-dcnode-id="2328" instrument_node="">Agamemnon</span></a><span data-dcnode-id="2326" instrument_node="">'s sudden murder at the hands of his wife </span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clytemnestra" title="Clytemnestra"><span data-dcnode-id="2325" instrument_node="">Clytemnestra</span></a><span data-dcnode-id="2323" instrument_node=""> in </span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aeschylus" title="Aeschylus"><span data-dcnode-id="2322" instrument_node="">Aeschylus</span></a><span data-dcnode-id="2320" instrument_node="">' </span><i data-dcnode-id="2317"><a class="mw-redirect" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Oresteia" title="The Oresteia"><span data-dcnode-id="2319" instrument_node="">The Oresteia</span></a></i><span data-dcnode-id="2316" instrument_node=""> or the inescapable situation </span><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kate_Hudson" title="Kate Hudson"><span data-dcnode-id="2315" instrument_node="">Kate Hudson</span></a><span data-dcnode-id="2313" instrument_node="">'s character finds herself in at the end of </span><i data-dcnode-id="2310"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Skeleton_Key" title="The Skeleton Key"><span data-dcnode-id="2312" instrument_node="">The Skeleton Key</span></a></i><span data-dcnode-id="2309" instrument_node="">. This type of ending was a common twist ending utilised by </span><i data-dcnode-id="2306"><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Twilight_Zone" title="The Twilight Zone"><span data-dcnode-id="2308" instrument_node="">The Twilight Zone</span></a></i><span data-dcnode-id="2305" instrument_node="">, most effectively in the episode "</span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_Enough_at_Last" title="Time Enough at Last"><span data-dcnode-id="2304" instrument_node="">Time Enough at Last</span></a><span data-dcnode-id="2302" instrument_node="">" where </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burgess_Meredith" title="Burgess Meredith"><span data-dcnode-id="2301" instrument_node="">Burgess Meredith</span></a><span data-dcnode-id="2299" instrument_node="">'s character is robbed of all his hope by a simple but devastating accident with his eyeglasses. A positive reversal of fortune would be Nicholas Van Orton's suicide attempt after mistakenly believing himself to have accidentally killed his brother, only to land safely in the midst of his own birthday party, in the film </span><i data-dcnode-id="2296"><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Game_%281997_film%29" title="The Game (1997 film)"><span data-dcnode-id="2298" instrument_node="">The Game</span></a></i><span data-dcnode-id="2295" instrument_node="">.
</span></p><span data-dcnode-id="2293" instrument_node="">
</span><h3 data-dcnode-id="2282"><span class="mw-headline" data-dcnode-id="2290" id="Deus_ex_machina"><i data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Deus ex machina</span></i></span><span class="mw-editsection" data-dcnode-id="2283"><span class="mw-editsection-bracket" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">[</span></span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D8" title="Edit section: Deus ex machina"><span data-dcnode-id="2287" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2262"><i data-dcnode-id="2278"><a data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deus_ex_machina" title="Deus ex machina"><span data-dcnode-id="2280" instrument_node="">Deus ex machina</span></a></i><span data-dcnode-id="2277" instrument_node=""> is a Latin term meaning "god from the machine." It refers to an unexpected, artificial or improbable character, device or event introduced suddenly in a work of fiction to resolve a situation or untangle a plot.</span><sup class="reference" data-dcnode-id="2274" id="cite_ref-Shipley1964_14-0"><a data-dcnode-id="2275" href="#cite_note-Shipley1964-14"><span data-dcnode-id="2276" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2273" instrument_node=""> In </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theatre_of_ancient_Greece" title="Theatre of ancient Greece"><span data-dcnode-id="2272" instrument_node="">Ancient Greek theater</span></a><span data-dcnode-id="2270" instrument_node="">, the "deus ex machina" ('ἀπὸ μηχανῆς θεός') was the character of a Greek god literally brought onto the stage via a crane (μηχανῆς—</span><i data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">mechanes</span></i><span data-dcnode-id="2267" instrument_node="">), after which a seemingly insoluble problem is brought to a satisfactory resolution by the god's will. The term is now used pejoratively for any improbable or unexpected contrivance by which an author resolves the complications of the plot in a play or novel, and which has not been convincingly prepared for in the preceding action; the discovery of a lost will was a favorite resort of Victorian novelists.</span><sup class="reference" data-dcnode-id="2264" id="cite_ref-15"><a data-dcnode-id="2265" href="#cite_note-15"><span data-dcnode-id="2266" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2263" instrument_node="">
</span></p><span data-dcnode-id="2261" instrument_node="">
</span><h3 data-dcnode-id="2251"><span class="mw-headline" data-dcnode-id="2259" id="Red_herring"><span data-dcnode-id="2260" instrument_node="">Red herring</span></span><span class="mw-editsection" data-dcnode-id="2252"><span class="mw-editsection-bracket" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">[</span></span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D9" title="Edit section: Red herring"><span data-dcnode-id="2256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2249" instrument_node="">A </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_herring" title="Red herring"><span data-dcnode-id="2248" instrument_node="">red herring</span></a><span data-dcnode-id="2246" instrument_node=""> is a false clue intended to lead investigators toward an incorrect solution.</span><sup class="reference" data-dcnode-id="2243" id="cite_ref-Asong2012_16-0"><a data-dcnode-id="2244" href="#cite_note-Asong2012-16"><span data-dcnode-id="2245" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2242" instrument_node=""> This device usually appears in </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detective_fiction" title="Detective fiction"><span data-dcnode-id="2241" instrument_node="">detective novels</span></a><span data-dcnode-id="2239" instrument_node=""> and </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mystery_fiction" title="Mystery fiction"><span data-dcnode-id="2238" instrument_node="">mystery fiction</span></a><span data-dcnode-id="2236" instrument_node="">. The red herring is a type of </span><a class="extiw" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/misdirection" title="wikt:misdirection"><span data-dcnode-id="2235" instrument_node="">misdirection</span></a><span data-dcnode-id="2233" instrument_node="">, a device intended to distract the </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protagonist" title="Protagonist"><span data-dcnode-id="2232" instrument_node="">protagonist</span></a><span data-dcnode-id="2230" instrument_node="">, and by extension the reader, away from the correct answer or from the site of pertinent clues or action. The Indian murder mystery film </span><i data-dcnode-id="2227"><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gupt%3A_The_Hidden_Truth" title="Gupt: The Hidden Truth"><span data-dcnode-id="2229" instrument_node="">Gupt: The Hidden Truth</span></a></i><span data-dcnode-id="2226" instrument_node=""> cast many veteran actors who had usually played villainous roles in previous Indian films as red herrings in this film to deceive the audience into suspecting them. In the bestselling novel </span><i data-dcnode-id="2223"><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Da_Vinci_Code" title="The Da Vinci Code"><span data-dcnode-id="2225" instrument_node="">The Da Vinci Code</span></a></i><span data-dcnode-id="2222" instrument_node="">, the misdeeds of a key character named "Bishop Aringarosa" draw attention away from the true master villain ("Aringarosa" literally translates as "pink herring"). In the </span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Diehl" title="William Diehl"><span data-dcnode-id="2221" instrument_node="">William Diehl</span></a><span data-dcnode-id="2219" instrument_node=""> novel </span><i data-dcnode-id="2216"><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primal_Fear_%28novel%29" title="Primal Fear (novel)"><span data-dcnode-id="2218" instrument_node="">Primal Fear</span></a></i><span data-dcnode-id="2215" instrument_node=""> (also adapted into a </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primal_Fear_%28film%29" title="Primal Fear (film)"><span data-dcnode-id="2214" instrument_node="">film</span></a><span data-dcnode-id="2212" instrument_node="">), a defendant named </span><a class="mw-redirect" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aaron_Stampler" title="Aaron Stampler"><span data-dcnode-id="2211" instrument_node="">Aaron Stampler</span></a><span data-dcnode-id="2209" instrument_node=""> is accused of brutally murdering the Archbishop of Chicago. He is revealed to have a </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissociative_identity_disorder" title="Dissociative identity disorder"><span data-dcnode-id="2208" instrument_node="">dissociative identity disorder</span></a><span data-dcnode-id="2206" instrument_node="">, and is not executed on plea of insanity. Near the end, Aaron's lawyer discovers that he feigned his insanity to avoid the death penalty. Agatha Christie's classic </span><i data-dcnode-id="2203"><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/And_Then_There_Were_None" title="And Then There Were None"><span data-dcnode-id="2205" instrument_node="">And Then There Were None</span></a></i><span data-dcnode-id="2202" instrument_node=""> is another famous example and includes the term as well in a murder ploy where the intended victims are made to guess that one of them will be killed through an act of treachery. The complete second timeline of the sixth season of the television series </span><i data-dcnode-id="2199"><a class="mw-redirect" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lost_%28tv_series%29" title="Lost (tv series)"><span data-dcnode-id="2201" instrument_node="">Lost</span></a></i><span data-dcnode-id="2198" instrument_node=""> is a red herring. Until the end it seems like a way that could happen, but in fact it takes place after they were all dead. A red herring can also be used as a form of false </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreshadowing" title="Foreshadowing"><span data-dcnode-id="2197" instrument_node="">foreshadowing</span></a><span data-dcnode-id="2195" instrument_node="">.
</span></p><span data-dcnode-id="2193" instrument_node="">
</span><h3 data-dcnode-id="2183"><span class="mw-headline" data-dcnode-id="2191" id="False_protagonist"><span data-dcnode-id="2192" instrument_node="">False protagonist</span></span><span class="mw-editsection" data-dcnode-id="2184"><span class="mw-editsection-bracket" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">[</span></span><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D10" title="Edit section: False protagonist"><span data-dcnode-id="2188" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2181" instrument_node="">A </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/False_protagonist" title="False protagonist"><span data-dcnode-id="2180" instrument_node="">false protagonist</span></a><span data-dcnode-id="2178" instrument_node=""> is a character presented at the start of the story as the main character, but then disposed of, usually killed to emphasize that they will not return. An example is the film </span><i data-dcnode-id="2175"><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executive_Decision" title="Executive Decision"><span data-dcnode-id="2177" instrument_node="">Executive Decision</span></a></i><span data-dcnode-id="2174" instrument_node="">, in which the </span><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_forces" title="Special forces"><span data-dcnode-id="2173" instrument_node="">special-forces</span></a><span data-dcnode-id="2171" instrument_node=""> team leader, played by highly-billed action star </span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steven_Seagal" title="Steven Seagal"><span data-dcnode-id="2170" instrument_node="">Steven Seagal</span></a><span data-dcnode-id="2168" instrument_node="">, is killed shortly after the mission begins. Another instance is </span><i data-dcnode-id="2164"><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psycho_%281960_film%29" title="Psycho (1960 film)"><span data-dcnode-id="2167" instrument_node="">Psycho</span></a><span data-dcnode-id="2165" instrument_node="">'</span></i><span data-dcnode-id="2163" instrument_node="">s Marion Crane (portrayed by </span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janet_Leigh" title="Janet Leigh"><span data-dcnode-id="2162" instrument_node="">Janet Leigh</span></a><span data-dcnode-id="2160" instrument_node="">), who is brutally murdered early in the film. The character of Casey Becker (played by then A-list actress </span><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drew_Barrymore" title="Drew Barrymore"><span data-dcnode-id="2159" instrument_node="">Drew Barrymore</span></a><span data-dcnode-id="2157" instrument_node="">) in </span><i data-dcnode-id="2154"><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scream_%281996_film%29" title="Scream (1996 film)"><span data-dcnode-id="2156" instrument_node="">Scream</span></a></i><span data-dcnode-id="2153" instrument_node=""> is killed in the first fifteen minutes. An example in literature is </span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ned_Stark" title="Ned Stark"><span data-dcnode-id="2152" instrument_node="">Ned Stark</span></a><span data-dcnode-id="2150" instrument_node=""> in </span><i data-dcnode-id="2146"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Game_of_Thrones" title="A Game of Thrones"><span data-dcnode-id="2149" instrument_node="">A Game of Thrones</span></a><span data-dcnode-id="2147" instrument_node="">,</span></i><span data-dcnode-id="2145" instrument_node=""> who is killed before the end of the first book in the series, despite receiving the most focus of the ensemble of characters.
</span></p><span data-dcnode-id="2143" instrument_node="">
</span><h3 data-dcnode-id="2133"><span class="mw-headline" data-dcnode-id="2141" id="Non-linear_narrative"><span data-dcnode-id="2142" instrument_node="">Non-linear narrative</span></span><span class="mw-editsection" data-dcnode-id="2134"><span class="mw-editsection-bracket" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">[</span></span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D11" title="Edit section: Non-linear narrative"><span data-dcnode-id="2138" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2131" instrument_node="">A </span><a class="mw-redirect" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-linear_narrative" title="Non-linear narrative"><span data-dcnode-id="2130" instrument_node="">non-linear narrative</span></a><span data-dcnode-id="2128" instrument_node=""> works by revealing plot and character in non-chronological order.</span><sup class="reference" data-dcnode-id="2125" id="cite_ref-Steiff2011_17-0"><a data-dcnode-id="2126" href="#cite_note-Steiff2011-17"><span data-dcnode-id="2127" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2124" instrument_node=""> This technique requires the reader to attempt to piece together the timeline in order to fully understand the story. A twist ending can occur as the result of information that is held until the climax and which places characters or events in a different perspective. Some of the earliest known uses of non-linear story telling occur in </span><i data-dcnode-id="2121"><a class="mw-redirect" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Odyssey" title="The Odyssey"><span data-dcnode-id="2123" instrument_node="">The Odyssey</span></a></i><span data-dcnode-id="2120" instrument_node="">, a work that is largely told in flashback via the narrator </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odysseus" title="Odysseus"><span data-dcnode-id="2119" instrument_node="">Odysseus</span></a><span data-dcnode-id="2117" instrument_node="">. </span><i data-dcnode-id="2114"><a class="mw-redirect" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Aeneid" title="The Aeneid"><span data-dcnode-id="2116" instrument_node="">The Aeneid</span></a></i><span data-dcnode-id="2113" instrument_node="">, another </span><a class="mw-redirect" data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epic_poem" title="Epic poem"><span data-dcnode-id="2112" instrument_node="">epic poem</span></a><span data-dcnode-id="2110" instrument_node="">, uses a similar approach; it begins with the main protagonist, </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aeneas" title="Aeneas"><span data-dcnode-id="2109" instrument_node="">Aeneas</span></a><span data-dcnode-id="2107" instrument_node="">, telling stories about the end of the </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trojan_War" title="Trojan War"><span data-dcnode-id="2106" instrument_node="">Trojan War</span></a><span data-dcnode-id="2104" instrument_node=""> and the first half of his journey to </span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dido" title="Dido"><span data-dcnode-id="2103" instrument_node="">Dido</span></a><span data-dcnode-id="2101" instrument_node="">, queen of </span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carthage" title="Carthage"><span data-dcnode-id="2100" instrument_node="">Carthage</span></a><span data-dcnode-id="2098" instrument_node="">. The nonlinear approach has been used in works such as the films </span><i data-dcnode-id="2095"><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mulholland_Drive_%28film%29" title="Mulholland Drive (film)"><span data-dcnode-id="2097" instrument_node="">Mulholland Drive</span></a></i><span data-dcnode-id="2094" instrument_node="">, </span><i data-dcnode-id="2091"><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sin_City_%28film%29" title="Sin City (film)"><span data-dcnode-id="2093" instrument_node="">Sin City</span></a></i><span data-dcnode-id="2090" instrument_node="">, </span><i data-dcnode-id="2087"><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premonition_%282007_film%29" title="Premonition (2007 film)"><span data-dcnode-id="2089" instrument_node="">Premonition</span></a></i><span data-dcnode-id="2086" instrument_node="">, </span><i data-dcnode-id="2083"><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arrival_%28film%29" title="Arrival (film)"><span data-dcnode-id="2085" instrument_node="">Arrival</span></a></i><span data-dcnode-id="2082" instrument_node="">, </span><i data-dcnode-id="2079"><a class="mw-redirect" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulp_Fiction_%28film%29" title="Pulp Fiction (film)"><span data-dcnode-id="2081" instrument_node="">Pulp Fiction</span></a></i><span data-dcnode-id="2078" instrument_node="">, </span><i data-dcnode-id="2075"><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memento_%28film%29" title="Memento (film)"><span data-dcnode-id="2077" instrument_node="">Memento</span></a></i><span data-dcnode-id="2074" instrument_node="">, </span><i data-dcnode-id="2071"><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babel_%28film%29" title="Babel (film)"><span data-dcnode-id="2073" instrument_node="">Babel</span></a></i><span data-dcnode-id="2070" instrument_node="">, the television shows </span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lost_%28TV_series%29" title="Lost (TV series)"><i data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Lost</span></i></a><span data-dcnode-id="2066" instrument_node="">, </span><i data-dcnode-id="2063"><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/How_to_Get_Away_with_Murder" title="How to Get Away with Murder"><span data-dcnode-id="2065" instrument_node="">How to Get Away with Murder</span></a></i><span data-dcnode-id="2062" instrument_node="">, </span><i data-dcnode-id="2059"><a class="mw-redirect" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/How_I_Met_Your_Mother_%28TV_series%29" title="How I Met Your Mother (TV series)"><span data-dcnode-id="2061" instrument_node="">How I Met Your Mother</span></a></i><span data-dcnode-id="2058" instrument_node=""> (especially in many episodes in the later seasons), </span><i data-dcnode-id="2055"><a class="mw-redirect" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heroes_%28U.S._TV_series%29" title="Heroes (U.S. TV series)"><span data-dcnode-id="2057" instrument_node="">Heroes</span></a></i><span data-dcnode-id="2054" instrument_node="">, </span><i data-dcnode-id="2051"><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westworld_%28TV_series%29" title="Westworld (TV series)"><span data-dcnode-id="2053" instrument_node="">Westworld</span></a></i><span data-dcnode-id="2050" instrument_node="">, the book </span><i data-dcnode-id="2047"><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catch-22" title="Catch-22"><span data-dcnode-id="2049" instrument_node="">Catch-22</span></a></i><span data-dcnode-id="2046" instrument_node="">, and </span><i data-dcnode-id="2043"><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WandaVision" title="WandaVision"><span data-dcnode-id="2045" instrument_node="">WandaVision</span></a></i><span data-dcnode-id="2042" instrument_node="">.</span><sup class="reference" data-dcnode-id="2039" id="cite_ref-18"><a data-dcnode-id="2040" href="#cite_note-18"><span data-dcnode-id="2041" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="2036" id="cite_ref-19"><a data-dcnode-id="2037" href="#cite_note-19"><span data-dcnode-id="2038" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2035" instrument_node="">
</span></p><span data-dcnode-id="2033" instrument_node="">
</span><h3 data-dcnode-id="2023"><span class="mw-headline" data-dcnode-id="2031" id="Reverse_chronology"><span data-dcnode-id="2032" instrument_node="">Reverse chronology</span></span><span class="mw-editsection" data-dcnode-id="2024"><span class="mw-editsection-bracket" data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">[</span></span><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_twist%26action%3Dedit%26section%3D12" title="Edit section: Reverse chronology"><span data-dcnode-id="2028" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="1971"><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reverse_chronology" title="Reverse chronology"><span data-dcnode-id="2021" instrument_node="">Reverse chronology</span></a><span data-dcnode-id="2019" instrument_node=""> works by revealing the plot in reverse order, i.e., from final event to initial event.</span><sup class="reference" data-dcnode-id="2016" id="cite_ref-Philips2006_20-0"><a data-dcnode-id="2017" href="#cite_note-Philips2006-20"><span data-dcnode-id="2018" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2015" instrument_node=""> Unlike chronological storylines, which progress through causes before reaching a final effect, reverse chronological storylines reveal the final effect before tracing the causes leading up to it; therefore, the initial cause represents a "twist ending". Examples employing this technique include the films </span><i data-dcnode-id="2012"><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irr%25C3%25A9versible" title="Irréversible"><span data-dcnode-id="2014" instrument_node="">Irréversible</span></a></i><span data-dcnode-id="2011" instrument_node="">, </span><i data-dcnode-id="2008"><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memento_%28film%29" title="Memento (film)"><span data-dcnode-id="2010" instrument_node="">Memento</span></a></i><span data-dcnode-id="2007" instrument_node="">, </span><i data-dcnode-id="2004"><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Happy_End_%281966_film%29" title="Happy End (1966 film)"><span data-dcnode-id="2006" instrument_node="">Happy End</span></a></i><span data-dcnode-id="2003" instrument_node=""> and </span><i data-dcnode-id="2000"><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/5x2" title="5x2"><span data-dcnode-id="2002" instrument_node="">5x2</span></a></i><span data-dcnode-id="1999" instrument_node="">, the play </span><i data-dcnode-id="1996"><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Betrayal_%28play%29" title="Betrayal (play)"><span data-dcnode-id="1998" instrument_node="">Betrayal</span></a></i><span data-dcnode-id="1995" instrument_node=""> by </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Pinter" title="Harold Pinter"><span data-dcnode-id="1994" instrument_node="">Harold Pinter</span></a><span data-dcnode-id="1992" instrument_node="">, and </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Amis" title="Martin Amis"><span data-dcnode-id="1991" instrument_node="">Martin Amis</span></a><span data-dcnode-id="1989" instrument_node="">' </span><i data-dcnode-id="1986"><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time%2527s_Arrow_%28novel%29" title="Time's Arrow (novel)"><span data-dcnode-id="1988" instrument_node="">Time's Arrow</span></a></i><span data-dcnode-id="1985" instrument_node="">. </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Sondheim" title="Stephen Sondheim"><span data-dcnode-id="1984" instrument_node="">Stephen Sondheim</span></a><span data-dcnode-id="1982" instrument_node=""> and </span><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Furth" title="George Furth"><span data-dcnode-id="1981" instrument_node="">George Furth's</span></a><span data-dcnode-id="1979" instrument_node=""> </span><i data-dcnode-id="1976"><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merrily_We_Roll_Along_%28musical%29" title="Merrily We Roll Along (musical)"><span data-dcnode-id="1978" instrument_node="">Merrily We Roll Along</span></a></i><span data-dcnode-id="1975" instrument_node=""> and the </span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merrily_We_Roll_Along_%28play%29" title="Merrily We Roll Along (play)"><span data-dcnode-id="1974" instrument_node="">1934 Kaufman and Hart play</span></a><span data-dcnode-id="1972" instrument_node=""> that inspired it both tell the story of the main characters in reverse order.
