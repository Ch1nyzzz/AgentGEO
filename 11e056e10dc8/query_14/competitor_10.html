</span><img alt="Plot twist ideas - 7 examples | Now Novel" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="1131" height="270" sizes="(max-width: 480px) 100vw, 480px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-7-examples.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-7-examples.png 560w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-7-examples-300x169.png 300w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-7-examples-150x84.png 150w" width="480"><span data-dcnode-id="1130" instrument_node="">

</span><div class="post-inner thin" data-dcnode-id="820"><span data-dcnode-id="1125" instrument_node="">
</span><div class="entry-content" data-dcnode-id="822"><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">A good plot twist adds intrigue, suspense or surprise to a novel. Plot twists are particularly popular in suspense-heavy novels such as murder mysteries, because they prolong suspense-creating questions about cause and identity. Read 7 examples of effective plot twists and what they teach us:</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h2 data-dcnode-id="1119" id="first-a-brief-plot-twist-definition"><span data-dcnode-id="1120" instrument_node="">First, a brief plot twist definition</span></h2><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">A plot twist is ‘an unexpected development in a book, film, television programme’ (</span><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Oxford English Dictionary</span></em><span data-dcnode-id="1114" instrument_node="">).</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Plot twists are particularly popular in short stories. In many stories they are the main event of the story arc. For example, </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.depa.univ-paris8.fr/IMG/pdf/lamb_to_the_slaughter_by_roald_dahl-2.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1110" instrument_node="">in Roald Dahl’s classic short story</span></a><span data-dcnode-id="1108" instrument_node=""> ‘Lamb to the Slaughter’, Mary Maloney kills her husband with a frozen leg of lamb. The dark-humoured twist is that Mary serves detectives investigating her husband’s disappearance the evidence.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Authors like O. Henry and Edgar Allan Poe perfected the art of the ‘twist-in-the-tale’ story. In these stories, the plot twist (like in Dahl’s story) is the climax. Yet plot twists are also popular in longer narratives.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Here are seven plot twist tips and ideas:</span></p><span data-dcnode-id="1100" instrument_node="">
</span><h2 data-dcnode-id="1098" id="1-plumb-your-themes-for-relevant-plot-twist-ideas"><span data-dcnode-id="1099" instrument_node="">1. Plumb your themes for relevant plot twist ideas</span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">Often great plot twists illustrate or </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/theme-examples-from-literature/" rel="noopener" target="_blank"><span data-dcnode-id="1095" instrument_node="">extend the themes of a story</span></a><span data-dcnode-id="1093" instrument_node="">. In the Roald Dahl example above, the author shows a darker side (violence, deceit) to mundane suburbia. The dramatic irony and contrast of this is developed even further. The detectives sit down to a cosy home-cooked meal, unaware they’re about to eat the evidence.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">A good example of a theme-developing plot twist comes from David Mitchell’s novel </span><em data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Cloud Atlas</span></em><span data-dcnode-id="1087" instrument_node=""> (2004). [NB: Spoiler alert.]</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">The first character we meet in the novel, Adam Ewing, describes a chronic ailment to a doctor aboard his ship. The doctor diagnoses a dangerous parasite and recommends a course of treatment. We only find out much later in the book that the doctor is actually poisoning Ewing deliberately, far from curing him. His motivation is theft of Ewing’s fortunes.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">This plot twist reveals the true nature of a character’s actions and intentions. It’s thematically relevant because much of Mitchell’s novel explores how individuals and groups prey on each other. For example, one setting and segment of the novel explores a futuristic Korea and the plight of enslaved clones. Mitchell’s plot twist thus continues themes of power and predatory behaviour. It demonstrates that power in history (and contemporary life) has many layers and levels, truths and lies.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h2 data-dcnode-id="1077" id="2-dont-give-your-twist-away-too-early"><span data-dcnode-id="1078" instrument_node="">2. Don’t give your twist away too early</span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Note the word ‘unexpected’ in the definition of a twist. Too much obvious foreshadowing and a twist feels predictable. The following example of a less obvious plot twist has been left vague, to avoid spoilers for newcomers to the popular series:</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">In J.K. Rowling’s </span><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Harry Potter</span></em><span data-dcnode-id="1069" instrument_node=""> series, a central character’s pet turns out to have a surprising, disturbing double life. Rowling’s twist is effective because:</span></p><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1062"><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">A pet is the last thing the reader expects to be the source of a major plot twist</span></li><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The sense of false trust that results reinforces the challenges in Rowling’s conflict-stricken world. We become doubly aware that this is a world where loyalty doesn’t always lie where you’d expect. We’re also reminded that magic means there are many additional surprises and possibilities</span></li></ul><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1060" instrument_node="">By centering a major plot twist on a very unlikely character, Rowling keeps us surprised. She avoids giving away plot twists early. [To make sure you’ve paced developments in your novel well, </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/" rel="noopener" target="_blank"><span data-dcnode-id="1059" instrument_node="">create a blueprint/outline</span></a><span data-dcnode-id="1057" instrument_node="">. Having an overview of your story you can print out will help you stay focused on key plot points.]</span></p><span data-dcnode-id="1055" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1052"><figure class="aligncenter is-resized" data-dcnode-id="1053"><img alt="Infographic - writing plot twists | Now Novel" class="wp-image-6647" data-dcnode-id="1054" height="750" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists.png 1600w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists-160x300.png 160w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists-768x1440.png 768w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists-546x1024.png 546w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists-610x1144.png 610w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Infographic-writing-plot-twists-80x150.png 80w" width="400"></figure></div><span data-dcnode-id="1051" instrument_node="">
</span><h2 data-dcnode-id="1049" id="3-make-setting-an-active-part-of-plot-twists"><span data-dcnode-id="1050" instrument_node="">3. Make setting an active part of plot twists</span></h2><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Setting in plot can prepare the way for surprising revelations. For example, in William Faulkner’s classic short story </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//xroads.virginia.edu/~drbr/wf_rose.html"><span data-dcnode-id="1046" instrument_node="">‘A Rose for Emily’</span></a><span data-dcnode-id="1044" instrument_node="">, Emily Grierson is the iron-willed town recluse. From the start, the narrator makes Emily’s house mysterious:</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">‘It was a big, squarish frame house that had once been white, decorated with cupolas and spires and scrolled balconies in the heavily lightsome style of the seventies, set on what had once been our most select street. But garages and cotton gins had encroached and obliterated even the august names of that neighborhood; only Miss Emily’s house was left, lifting its stubborn and coquettish decay above the cotton wagons and the gasoline pumps – an eyesore among eyesores.’</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Faulkner gives us a sense of this setting’s decaying isolation. He foreshadows (subtly) the surprising twist that lies inside the house. Only towards the end do we discover the decaying body of Homer Barron, a man who goes to live with Emily.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Faulkner uses the setting’s mystery to build suspense until we finally enter Grierson’s property and uncover the shocking twist.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Plot twists using setting may:</span></p><span data-dcnode-id="1030" instrument_node="">
</span><ul data-dcnode-id="1019"><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Reveal a surprising turn of plot within a setting (this could be a house, school or even a distant land – a common device in high fantasy)</span></li><li data-dcnode-id="1020"><span data-dcnode-id="1027" instrument_node="">Reveal twists about the setting </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">itself</span></em><span data-dcnode-id="1024" instrument_node=""> (for example, in Margaret Atwood’s </span><em data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Oryx and Crake</span></em><span data-dcnode-id="1021" instrument_node=""> (2003), we eventually learn the cause of the post-apocalyptic landscape. &nbsp;We understand the tragic story of Atwood’s world and her characters’ roles in environmental destruction)</span></li></ul><span data-dcnode-id="1018" instrument_node="">
</span><h2 data-dcnode-id="1016" id="4-use-plot-twists-to-increase-antagonists-power"><span data-dcnode-id="1017" instrument_node="">4. Use plot twists to increase antagonists’ power</span></h2><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">If you’re writing </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/how-to-create-a-great-villain/" rel="noopener" target="_blank"><span data-dcnode-id="1013" instrument_node="">a novel or story with a central villain</span></a><span data-dcnode-id="1011" instrument_node=""> or antagonist, a plot twist can give them surprising, additional power. We often find this device in fantasy writing (and it’s a staple of video game storytelling, too). Central characters confront a major opponent and just when they think victory is near, they hear these words: ‘This isn’t even my final form’.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1008" instrument_node="">Giving the ‘bad guy’ (or woman) power beyond expectations, in a surprising twist, serves multiple ends. For example, in the&nbsp;</span><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Harry Potter</span></em><span data-dcnode-id="1005" instrument_node=""> series, the series’ main villain has taken extra (unexpected) precautions against a final defeat.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Because of this plot twist:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="993"><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The series’ central characters face additional complications in their path to victory</span></li><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Narrative tension continues further, as the characters have new, seemingly impossible tasks to achieve</span></li><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Rowling brings home just how powerful and calculating her antagonist is. The plot twist gives us a greater sense of just how determined he is to win</span></li></ul><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Plot twists that demonstrate antagonists’ power include:</span></p><span data-dcnode-id="989" instrument_node="">
</span><ul data-dcnode-id="984"><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Measures antagonists take (unknown to protagonists) to counter and thwart their best efforts</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Actions they take to punish protagonists from beyond the grave/defeat (a non-fantasy &nbsp;example: A vindictive ex-spouse in a character drama might obtain a surprising divorce settlement, solely designed to make their ex’s life more difficult)</span></li></ul><span data-dcnode-id="983" instrument_node="">
</span><h2 data-dcnode-id="981" id="5-create-plot-twists-to-insert-useful-distractions"><span data-dcnode-id="982" instrument_node="">5: Create plot twists to insert useful distractions</span></h2><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">In mystery and suspense novels, a good plot twist leads characters off track. This is used quite literally in Sir Arthur Conan Doyle’s short story&nbsp;</span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The Final Problem</span></em><span data-dcnode-id="976" instrument_node="">, for example. While out walking in the Swiss mountains, Detective Sherlock Holmes and his sidekick Dr. Watson receive word that a woman back at their hotel needs urgent medical care. Watson rushes back to the hotel, but the message turns out to be a false alarm. It’s a fake created by the novel’s villain, designed to separate the two and leave Holmes vulnerable and alone.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">This plot revelation raises the suspense and tension. A distracting twist creates the necessary conditions for another, stake-raising plot event. It also adds credibility: Characters do make the wrong choice, sometimes.</span></p><span data-dcnode-id="971" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="968"><figure class="aligncenter" data-dcnode-id="969"><img alt="Plot twist ideas - George R. R. Martin quote | Now Novel" class="wp-image-6649" data-dcnode-id="970" height="419" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-George-R-R-Martin-quote.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-George-R-R-Martin-quote.png 500w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-George-R-R-Martin-quote-300x251.png 300w, https://www.nownovel.com/blog/wp-content/uploads/2017/08/Plot-twist-ideas-George-R-R-Martin-quote-150x126.png 150w" width="500"></figure></div><span data-dcnode-id="967" instrument_node="">
</span><h2 data-dcnode-id="965" id="6-use-plot-twists-to-shift-suspicion"><span data-dcnode-id="966" instrument_node="">6: Use plot twists to shift suspicion</span></h2><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">In novels and stories where the main unknown is the identity of a perpetrator, plot twists help to shift suspicion. Deciphering who the guilty party is &nbsp;in a murder mystery (or what their motivation is) forms a large part of the story’s pleasure.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Plot twists that shift suspicion onto other secondary or primary characters in your cast effectively complicate your narrative. You force your reader to let go of specific assumptions or guesses and press onward through adrenalin-pumping suspense.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">The cult classic murder mystery series </span><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Twin peaks</span></em><span data-dcnode-id="954" instrument_node=""> by David Lynch and Mark Frost contains many excellent examples of shifting suspicion. In the seemingly idyllic, picturesque small town, everyone seems implicated in the murder of student Laura Palmer. The town’s seedy real estate developer, for example, runs a secret brothel. Laura’s seemingly indifferent boyfriend is a drug peddler jealous of Laura’s flirtations with others. Multiple characters have motivations (from jealousy to murky underworld dealings implicating Laura).</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Individual arcs and possible murder motives are revealed in twist after twist. This makes it difficult to lay suspicion at any single character’s feet. The town appears collectively responsible, as seedy double lives run rife in its hidden underbelly.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Plot twists that shift suspicion raise narrative tension. When multiple characters are suspects, each scene involving these characters becomes laden with potential for drama, conflict and revelation.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Suspicion-shifting plot twists don’t only work in murder and mystery novels. In fantasy, for example, a secondary character such as an advisor to a monarch might turn out, in a twist, to be a spy. The whole time they’ve been feeding information about the kingdom’s defenses to an unknown third party aligned to rival forces.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">A plot twist like this creates useful narrative doubling. We see the monarch making decisions guided by the assumption their aide is trustworthy. The effect of this – the reader knowing more than a central character – is often harrowing, suspenseful.</span></p><span data-dcnode-id="940" instrument_node="">
</span><h2 data-dcnode-id="938" id="7-be-careful-with-anticlimactic-turns-of-plot"><span data-dcnode-id="939" instrument_node="">7: Be careful with anticlimactic turns of plot</span></h2><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">Plot twists don’t always </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">increase</span></em><span data-dcnode-id="933" instrument_node="">&nbsp;tension. Some plot twists reverse anticipation and suspense. For example, the climax of Kazuo Ishiguro’s novel </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The Unconsoled</span></em><span data-dcnode-id="930" instrument_node=""> (1995). The story follows the build-up to a major concert performance in an Eastern European city by Ryder, the protagonist, a renowned musician. The twist is we never get to see the concert happen. It is constantly deferred in a dream-like narrative where Ryder struggles to keep forgotten appointments and promises.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="927" instrument_node="">The danger with this type of plot twist or surprise – where an expected plot point never arrives – is that the reader could be frustrated by the lack of payoff. Indeed, the novel split critics. James Woods said the novel ‘invented its own category of badness’, while a poll of other critics voted the novel the third ‘best British, Irish, or Commonwealth novel from 1980 to 2005’.</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">The criticisms of the book involved more than the non-revealing twist at the end. Yet building up mystery and suspense without revelation and satisfaction is a tactic some readers – especially readers who expect conventional plot structures – may dislike.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Ultimately, successful plot twist ideas are often those that deepen the themes of a novel (like Mitchell’s example above) or defer major plot revelation, allowing readers to enjoy the guessing game longer.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">Ready to brainstorm key details of your plot and create an outline you can embellish with twists and turns? </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/users/sign_up" rel="noopener" target="_blank"><span data-dcnode-id="918" instrument_node="">Try Now Novel’s Idea Finder now</span></a><span data-dcnode-id="916" instrument_node="">.</span></p><span data-dcnode-id="914" instrument_node="">
