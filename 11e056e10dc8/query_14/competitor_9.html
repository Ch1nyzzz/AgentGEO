      " width="295"></div></div></div></div><span data-dcnode-id="747" instrument_node=""> </span><div class="container" data-dcnode-id="220"><div class="blogPost__body f f--around f--top" data-dcnode-id="370"><div class="share-buttons" data-dcnode-id="729" data-v-630136d0=""><a class="share__button share-button fb" data-dcnode-id="743" data-v-630136d0="" data-v-ab478982="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fnybookeditors.com%252F2018%252F02%252Fall-about-plot-twists%252F"><span data-dcnode-id="745" instrument_node=""> </span><img alt="Share on Facebook" data-dcnode-id="744" data-v-630136d0="" data-v-ab478982="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/assets/images/common/icon--facebook.svg&amp;raw"></a><span data-dcnode-id="742" instrument_node=""> </span><a class="share__button share-button tw" data-dcnode-id="738" data-v-630136d0="" data-v-ab478982="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DAll%2520About%2520Plot%2520Twists%2520via%2520%40nybookeditors%26amp%3Burl%3Dhttps%253A%252F%252Fnybookeditors.com%252F2018%252F02%252Fall-about-plot-twists%252F"><span data-dcnode-id="740" instrument_node=""> </span><img alt="Share on Twitter" data-dcnode-id="739" data-v-630136d0="" data-v-ab478982="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/assets/images/common/icon--twitter.svg&amp;raw"></a><span data-dcnode-id="737" instrument_node=""> </span><a class="share-button mail" data-dcnode-id="735" data-v-630136d0="" href="mailto:?subject=All%20About%20Plot%20Twists&amp;amp;body=http:https%3A%2F%2Fnybookeditors.com%2F2018%2F02%2Fall-about-plot-twists%2F"><img alt="Share by E-mail" data-dcnode-id="736" data-v-630136d0="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/assets/images/common/icon--mail.svg&amp;raw"></a><span data-dcnode-id="734" instrument_node=""> </span><a class="share__button share-button link" data-dcnode-id="730" data-v-630136d0="" data-v-ab478982="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/2018/02/all-about-plot-twists"><span data-dcnode-id="732" instrument_node=""> </span><img alt="Copy Link to Clipboard" data-dcnode-id="731" data-v-630136d0="" data-v-ab478982="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/assets/images/common/icon--link.svg&amp;raw"></a></div><span data-dcnode-id="728" instrument_node=""> </span><main data-dcnode-id="371"><div class="block__contentBlock redactor--standard-blog" data-dcnode-id="718"><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Plot twists are sexy. Everyone likes a surprise, especially if it’s done well.</span></p><span data-dcnode-id="725" instrument_node=""> </span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">But how do you do come up with a thrilling, unexpected, delightful twist to your story? I’d be lying if I said it was easy. Plot twists require skillful misdirection, and not everyone can do it. However, I believe in you. With guidance, you can create a winning plot twist that rivals all of the greats.</span></p><span data-dcnode-id="722" instrument_node=""> </span><p data-dcnode-id="719"><span data-dcnode-id="721" instrument_node="">Let’s discuss what you need to know about plot twists.</span><br data-dcnode-id="720"></p></div><span data-dcnode-id="717" instrument_node=""> </span><div class="block__miniSubsWidget" data-dcnode-id="629"><div class="cuWidget" data-dcnode-id="630" data-v-33ae0ef8=""><div class="f f--between f--middle f--break--stack" data-dcnode-id="711" data-v-33ae0ef8=""><div class="teaser t--bigger c--almostblack" data-dcnode-id="715" data-v-33ae0ef8=""><span data-dcnode-id="716" instrument_node="">
    Here’s a list of the different types of plot twists.
  </span></div><span data-dcnode-id="714" instrument_node=""> </span><button class="bg--yellow c--almostblack" data-dcnode-id="712" data-v-33ae0ef8=""><span data-dcnode-id="713" instrument_node="">Click Here</span></button></div><span data-dcnode-id="710" instrument_node=""> </span><div class="modal modal--box" data-dcnode-id="631" data-v-33ae0ef8=""><div class="modal__content" data-dcnode-id="632"><button class="modal__close" data-dcnode-id="704"><svg data-dcnode-id="705" height="18" viewBox="0 0 18 18" width="18" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="706" fill="#FFF" fill-rule="nonzero"><path d="M16.942 2.472c-.037.037-2.135 1.836-2.172 1.873C11.455 7.417 2.885 16.424 2.52 16.814c-.645.685-1.503 1.073-1.882.79-.374-.29-.108-1.13.542-1.82.28-.296 1.048-1.55 7.14-7.488 1.925-1.876 4.325-4.277 7.467-7.192.695-.647 1.558-.838 1.83-.448.259.365-.047 1.188-.675 1.816z" data-dcnode-id="709"></path></g></svg><span data-dcnode-id="708" instrument_node=""> </span><path d="M15.528 16.942c-.037-.037-1.836-2.135-1.873-2.172C10.583 11.455 1.576 2.885 1.186 2.52.501 1.875.113 1.017.396.638c.29-.374 1.13-.108 1.821.542.295.28 1.55 1.048 7.487 7.14 1.876 1.925 4.277 4.325 7.192 7.467.647.695.838 1.558.448 1.83-.365.259-1.188-.047-1.816-.675z" data-dcnode-id="707"></path></button><span data-dcnode-id="703" instrument_node=""> </span><div class="box" data-dcnode-id="633" data-v-33ae0ef8=""><div class="a--center c--almostblack" data-dcnode-id="696"><div class="headline h3" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">TOP 7 TYPES OF PLOT TWISTS</span></div><span data-dcnode-id="700" instrument_node=""> </span><div class="description small c--lightgrey redactor--simple" data-dcnode-id="697"><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Here’s a look at 7 popular plot twists to include in your story. Subscribe to receive this extra resource.</span></p></div></div><span data-dcnode-id="695" instrument_node=""> </span><form class="form freeform--generic" data-dcnode-id="634" data-error-message="Sorry, there was an error submitting the form. Please try again." data-freeform="" data-handle="contentUpgrade" data-honeypot="" data-honeypot-name="freeform_form_handle_519b18" data-honeypot-value="03961c812" data-id="ca830c-form-NmKV9eVx0_9wzvBlqdA_ea60fed6bcf5b85a3ae08c1061296c8e7c4fa5e6626651c54e2dd" data-success-message="Form has been submitted successfully!" method="post"><input data-dcnode-id="694" name="action" type="hidden" value="freeform/api/form"><input data-dcnode-id="693" name="formHash" type="hidden" value="NmKV9eVx0_9wzvBlqdA_ea60fed6bcf5b85a3ae08c1061296c8e7c4fa5e6626651c54e2dd"><input data-dcnode-id="692" name="CRAFT_CSRF_TOKEN" type="hidden" value="qt9wkNEXChzIuTTITTxjS97oqqaBi8Xi1Jzr-SUOgR0x7bui8GqI5uTpJNSlIDtF-usDpBdEIR-VrZ_5zd2Sk7DIiM91adQwVZr5wYcGutI="><input data-dcnode-id="691" id="form-input-tag" name="tag" type="hidden" value="184"><div aria-hidden="true" class="freeform_form_handle_519b18" data-dcnode-id="687" style="position: absolute !important; width: 0px !important; height: 0px !important; overflow: hidden !important;" tabindex="-1"><label aria-hidden="true" data-dcnode-id="689" for="freeform_form_handle_519b18" tabindex="-1"><span data-dcnode-id="690" instrument_node="">Leave this field blank</span></label><input aria-hidden="true" data-dcnode-id="688" id="freeform_form_handle_519b18" name="freeform_form_handle_519b18" tabindex="-1" type="text" value="399ec2"></div><span data-dcnode-id="686" instrument_node=""> </span><div data-dcnode-id="653"><div class="form__row" data-dcnode-id="678"><div class="form__col form__col--100" data-dcnode-id="679"><label class="small c--almostblack" data-dcnode-id="684" for="form-input-firstName"><span data-dcnode-id="685" instrument_node="">First Name</span></label><span data-dcnode-id="683" instrument_node=""> </span><input class="" data-dcnode-id="682" data-required="" id="form-input-firstName" name="firstName" placeholder="First name" type="text"><span data-dcnode-id="681" instrument_node=""> </span></div></div><span data-dcnode-id="677" instrument_node=""> </span><div class="form__row" data-dcnode-id="669"><div class="form__col form__col--100" data-dcnode-id="670"><label class="small c--almostblack" data-dcnode-id="675" for="form-input-email"><span data-dcnode-id="676" instrument_node="">Email</span></label><span data-dcnode-id="674" instrument_node=""> </span><input data-dcnode-id="673" data-required="" id="form-input-email" name="email" placeholder="Email address" type="email"><span data-dcnode-id="672" instrument_node=""> </span></div></div><span data-dcnode-id="668" instrument_node=""> </span><div class="form__row" data-dcnode-id="664"><div class="form__col form__col--100" data-dcnode-id="665"><div class="g-recaptcha" data-dcnode-id="667" data-sitekey="6LekSrgUAAAAAF-4iQkSxFWcENfiSuKcP_Eqp1WU" data-size="normal" data-theme="light"></div><input data-dcnode-id="666" name="grecaptcha_Bl6BNLPjq" type="hidden"></div></div><span data-dcnode-id="663" instrument_node=""> </span><div class="form__row" data-dcnode-id="658"><div class="form__col form__col--100 a--right" data-dcnode-id="659"><button class="submit bg--red c--white" data-dcnode-id="660" type="submit"><span data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Send me the bonus!</span></span></button></div></div><span data-dcnode-id="657" instrument_node=""> </span><div class="a--center" data-dcnode-id="654"><small class="c--lightgrey" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">No spam. Unsubscribe anytime.</span></small></div></div><span data-dcnode-id="652" instrument_node=""> </span><div class="form__success a--center" data-dcnode-id="639" style="display: none;"><div class="h4 c--almostblack" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Thank you!</span></div><span data-dcnode-id="649" instrument_node=""> </span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Download your bonus content:</span></p><span data-dcnode-id="646" instrument_node=""> </span><p data-dcnode-id="643"><a class="button bg--teal" data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.nybookeditors.com/blog/PDF/7-Types-of-Plot-Twists.pdf%3Fmtime%3D20190820025751%26focal%3Dnone"><span data-dcnode-id="645" instrument_node="">Download</span></a></p><span data-dcnode-id="642" instrument_node=""> </span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Enjoy!</span></p></div><span data-dcnode-id="638" instrument_node=""> </span><input data-dcnode-id="637" name="postSlug" type="hidden" value="all-about-plot-twists"><span data-dcnode-id="636" instrument_node=""> </span><input data-dcnode-id="635" name="matrixIndex" type="hidden" value="f58ae5fc-51d0-4b4c-853f-7f8a4e5d4d12"></form></div></div></div></div></div><span data-dcnode-id="628" instrument_node=""> </span><div class="block__contentBlock redactor--standard-blog" data-dcnode-id="561"><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">What's Makes for a Good Plot Twist?</span></h2><span data-dcnode-id="625" instrument_node=""> </span><p data-dcnode-id="613"><span data-dcnode-id="624" instrument_node="">In the simplest terms, a plot twist is a surprise development in your story. One of my favorite examples of a plot twist is nestled within Yann Martel's "</span><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Life of Pi.</span></em><span data-dcnode-id="621" instrument_node="">" Needless to say, this is a </span><em data-dcnode-id="618"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">spoiler alert</span></strong></em><span data-dcnode-id="617" instrument_node="">. The story is about a young boy named Pi who is adrift on a small raft in the Pacific Ocean for almost one year. He survives with a Bengal tiger and a host of other zoo animals. One by one, the animals eat each other until only Pi and the tiger remain. In the final part of the novel, it's revealed that the animals on Pi's raft were not animals at all, but humans, and the tiger represents Pi. </span><em data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">That</span></em><span data-dcnode-id="614" instrument_node=""> was mind blowing. But why?</span></p><span data-dcnode-id="612" instrument_node=""> </span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">The reader had come to accept that the zoo animals were actually on the boat with Pi. Pi, of course, proved to be an unreliable narrator, but that’s not revealed until the end of the book. The reader is left to grapple with the heavier, spiritual implications of the story. This plot twist gave the reader something to chew on long after closing the book.</span></p><span data-dcnode-id="609" instrument_node=""> </span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">A good plot twist forces the reader to think about it, even if you’re away from the story. Years later, the reader may still reminisce about a plot twist that through them for a loop. That’s what you want.</span></p><span data-dcnode-id="606" instrument_node=""> </span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Let’s discuss how you can create a solid plot twist:</span></p><span data-dcnode-id="603" instrument_node=""> </span><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Introduce the Plot Twist Whenever You’d Like</span></h3><span data-dcnode-id="600" instrument_node=""> </span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">True or false? Plot twists must occur at the climax of the story.</span></p><span data-dcnode-id="597" instrument_node=""> </span><p data-dcnode-id="592"><em data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">False</span></strong></em><span data-dcnode-id="593" instrument_node="">. Plot twists may appear anywhere within a story but are usually most effective after some careful setup. While it’s technically possible to swing a plot twist within the first chapter, it’s difficult to do. In the beginning of your story, the reader is open and the rules of assumption haven’t been established yet.</span></p><span data-dcnode-id="591" instrument_node=""> </span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">You need to lay the ground rules before you twist them.</span></p><span data-dcnode-id="588" instrument_node=""> </span><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Don't be Obvious</span></h3><span data-dcnode-id="585" instrument_node=""> </span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">The first commandment of plot twists is that they shouldn't be obvious. Plot twists need to be totally unexpected. I shouldn’t be able to guess it, but once I go back and read it, I should be able to see the signs.</span></p><span data-dcnode-id="582" instrument_node=""> </span><h3 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Don't Show Your Card Too Soon</span></h3><span data-dcnode-id="579" instrument_node=""> </span><figure data-dcnode-id="577" style="margin: 0px 0px 1em; padding: 0px; border: 0px; font-style: normal; font-weight: 400; font-size: 16px; line-height: inherit; font-family: system-ui, BlinkMacSystemFont, -apple-system, &quot;Segoe UI&quot;, Roboto, Oxygen, Ubuntu, Cantarell, &quot;Fira Sans&quot;, &quot;Droid Sans&quot;, &quot;Helvetica Neue&quot;, sans-serif; vertical-align: baseline; clear: both; color: rgb(41, 50, 61); letter-spacing: normal; text-indent: 0px; text-transform: none; white-space: normal; word-spacing: 0px; background-color: rgb(255, 255, 255);"><img alt="" class="alignnone size-full wp-image-3343" data-dcnode-id="578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/wp-content/uploads/2018/02/pexels-photo-735307.jpeg&amp;raw" style="margin: 0px; padding: 0px; border: 0px; font: inherit; vertical-align: middle; height: auto;"></figure><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Foreshadowing is essential, but when you’re setting up a plot twist, you can’t reveal too much. Otherwise, the reader will be able to guess what will happen, and it won’t be a twist at all.</span></p><span data-dcnode-id="574" instrument_node=""> </span><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">Withhold the information until it cannot be withheld any longer. This helps to increase the tension within your story. It’s quite miraculous. Immediately after inserting a plot twist, the story proceeding should become better and stronger. The reader will hunt back through the story, looking for clues that this twist would happen. Clues should be there-- </span><em data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">sparingly</span></em><span data-dcnode-id="570" instrument_node="">.</span></p><span data-dcnode-id="568" instrument_node=""> </span><h3 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Use Plot Twists Sparingly</span></h3><span data-dcnode-id="565" instrument_node=""> </span><p data-dcnode-id="562"><span data-dcnode-id="564" instrument_node="">Don’t overuse plot twists.</span><br data-dcnode-id="563"></p></div><span data-dcnode-id="560" instrument_node=""> </span><div class="block__tweetThis" data-dcnode-id="547"><div class="inner" data-dcnode-id="548"><div class="content f--tisa" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">
                  Don’t overuse plot twists. Here's why:
                </span></div><span data-dcnode-id="557" instrument_node=""> </span><div class="share small f f--middle f--end" data-dcnode-id="549"><a class="share__button share-button tw f--middle" data-dcnode-id="553" data-v-ab478982="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DDon%25E2%2580%2599t%2520overuse%2520plot%2520twists.%2520Here%27s%2520why%3A%2520via%2520%40nybookeditors%26url%3Dhttps%3A%252F%252Fnybookeditors.com%252F2018%252F02%252Fall-about-plot-twists%252F"><span data-dcnode-id="555" instrument_node=""> </span><img alt="Share on Twitter" data-dcnode-id="554" data-v-ab478982="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/assets/images/common/icon--twitter.svg&amp;raw"></a><span data-dcnode-id="552" instrument_node=""> </span><span data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Tweet this</span></span></div></div></div><span data-dcnode-id="546" instrument_node=""> </span><div class="block__contentBlock redactor--standard-blog" data-dcnode-id="461"><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">If you’d like to create a reputation for including plot twists in your stories (a la M. Night Shyamalan), limit it to one twist per story. Otherwise, the reader will stop trusting you. Your storytelling will come off as cheap thrills without substance.</span></p><span data-dcnode-id="543" instrument_node=""> </span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">But, remember that you don’t need to include a plot twist to weave a compelling tale. The less you use this literary device, the more surprised your reader will be.</span></p><span data-dcnode-id="540" instrument_node=""> </span><h3 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Use Your Plot Twist to Push the Characters Towards Action</span></h3><span data-dcnode-id="537" instrument_node=""> </span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">In the middle of your story, characters can grow stagnant. When they’re plodding along towards a vague goal, it’s easy to get stuck in the mundane. This is the perfect time to insert a plot twist. When faced with a sudden change of circumstances, the characters will be forced to respond. What will they do? How will it change their goals?</span></p><span data-dcnode-id="534" instrument_node=""> </span><h3 data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Use the Plot Twists to Reveal Character</span></h3><span data-dcnode-id="531" instrument_node=""> </span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Sometimes, plot twists can be planted within a character’s backstory. This way, you can reveal something about the character that catches the reader off guard. Perhaps the character killed someone in the past. Maybe they are the long-lost daughter of the antagonist. Once the reader finds out, it changes everything.</span></p><span data-dcnode-id="528" instrument_node=""> </span><p data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">But it’s not just the reader who may find out about the character. The character can also discover something about themselves or another character. This type of plot twist is known as</span><em data-dcnode-id="525"><span data-dcnode-id="526" instrument_node=""> anagnorisis</span></em><span data-dcnode-id="524" instrument_node="">, or discovery.</span></p><span data-dcnode-id="522" instrument_node=""> </span><h3 data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Use Plot Twists to Change the Character’s Fortune</span></h3><span data-dcnode-id="519" instrument_node=""> </span><figure data-dcnode-id="517" style="margin: 0px 0px 1em; padding: 0px; border: 0px; font-style: normal; font-weight: 400; font-size: 16px; line-height: inherit; font-family: system-ui, BlinkMacSystemFont, -apple-system, &quot;Segoe UI&quot;, Roboto, Oxygen, Ubuntu, Cantarell, &quot;Fira Sans&quot;, &quot;Droid Sans&quot;, &quot;Helvetica Neue&quot;, sans-serif; vertical-align: baseline; clear: both; color: rgb(41, 50, 61); letter-spacing: normal; text-indent: 0px; text-transform: none; white-space: normal; word-spacing: 0px; background-color: rgb(255, 255, 255);"><img alt="" class="alignnone size-full wp-image-3342" data-dcnode-id="518" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/wp-content/uploads/2018/02/pexels-photo-278312.jpeg&amp;raw" style="margin: 0px; padding: 0px; border: 0px; font: inherit; vertical-align: middle; height: auto;"></figure><p data-dcnode-id="512"><span data-dcnode-id="516" instrument_node="">There’s a certain type of plot twist known as </span><em data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">peripeteia</span></em><span data-dcnode-id="513" instrument_node=""> that you may wish to consider in your story. Peripeteia is a sudden reversal of fortune. Historically, peripeteia is a shift from good circumstances to bad. It’s tragic, it’s bleak, it’s heartbreaking, but it can make for a poignant story.</span></p><span data-dcnode-id="511" instrument_node=""> </span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">If you’re a rebel, peripeteia can also be used to convert the character’s fortune from bad to good. But be careful here. You don’t want to force an unrealistic ending on your story that will ring untrue. Remember the above tip: Plot twists should be believable. It’s easier to believe something going from good to bad than going from bad to good. That’s sad, isn’t it?</span></p><span data-dcnode-id="508" instrument_node=""> </span><h3 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Create a False Protagonist</span></h3><span data-dcnode-id="505" instrument_node=""> </span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">One of the trickiest plot twists to conceive is the false protagonist. You introduce a protagonist, but then he or she suddenly dies. What?! That’s a shocking plot twist.</span></p><span data-dcnode-id="502" instrument_node=""> </span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Of course, for this type of plot twist to happen, you need to have the real protagonist waiting in the wings and ready to take over. The reader should already be familiar with the true protagonist. It can be a huge shift for the reader to make, so don’t use this plot twist unless you’re sure that it’s worth the risk.</span></p><span data-dcnode-id="499" instrument_node=""> </span><h3 data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Dish Out Poetic Justice</span></h3><span data-dcnode-id="496" instrument_node=""> </span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Believe it or not, poetic justice is actually a plot twist. The idea that characters get what they deserve (both good and bad) is supposed to be unexpected. However, poetic justice is so overused that it’s become a cliche.</span></p><span data-dcnode-id="493" instrument_node=""> </span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">That’s not to say that you can’t serve poetic justice in your story. However, if you do, consider setting it up so that it’s completely unexpected. All hope seems lost, and out of nowhere, poetic justice. Don’t actually make it appear out of nowhere. The reader should be able to look back at the story and see how this ending is possible.</span></p><span data-dcnode-id="490" instrument_node=""> </span><h3 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Introduce the Plot Twist During a Flashback</span></h3><span data-dcnode-id="487" instrument_node=""> </span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Another way to introduce a plot twist is within a flashback. When done correctly, a flashback should always reveal something of interest. But, your flashback can also change the entire trajectory of your story.</span></p><span data-dcnode-id="484" instrument_node=""> </span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">If you do insert a plot twist in a flashback, pay special attention to timing. When should you introduce the flashback for maximum effect? How can the flashback aid in pushing the story forward?</span></p><span data-dcnode-id="481" instrument_node=""> </span><h2 data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Final Thoughts and Additional Resources</span></h2><span data-dcnode-id="478" instrument_node=""> </span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Plot twists are a lot of fun to read and write, especially when they’re done correctly. Use these tips to weave one that rewards your readers. Before you go, check out these related posts:</span></p><span data-dcnode-id="475" instrument_node=""> </span><ul data-dcnode-id="462"><li data-dcnode-id="472"><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/2017/11/the-importance-of-subplots/"><span data-dcnode-id="474" instrument_node="">The Importance of Subplots</span></a></li><li data-dcnode-id="469"><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/2017/06/find-writers-voice/"><span data-dcnode-id="471" instrument_node="">How to Find Your Writer's Voice</span></a></li><li data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/2016/07/use-5-tips-create-backstory/"><span data-dcnode-id="468" instrument_node="">Use These 5 Tips to Create a Backstory</span></a></li><li data-dcnode-id="463"><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nybookeditors.com/2016/10/tension-develop-novel/"><span data-dcnode-id="465" instrument_node="">Tension! What it is &amp; How to Develop It in Your Novel</span></a></li></ul></div><span data-dcnode-id="460" instrument_node=""> </span><div class="block__miniSubsWidget" data-dcnode-id="372"><div class="cuWidget" data-dcnode-id="373" data-v-33ae0ef8=""><div class="f f--between f--middle f--break--stack" data-dcnode-id="454" data-v-33ae0ef8=""><div class="teaser t--bigger c--almostblack" data-dcnode-id="458" data-v-33ae0ef8=""><span data-dcnode-id="459" instrument_node="">
