</span><div class="article-content retro-folders" data-dcnode-id="1160" id="main-article"><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">One of the basic building blocks of plot, a Plot Twist is a sudden, unexpected change in the fortunes or situations of the characters, setting, or plot.
</span></p><p data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node="">Plot Twists are usually based on the assumption that there is something going on that we, the readers/viewers/players, don't know about; if we had known about it, it would hardly be surprising. When it is </span><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReveal" title="/pmwiki/pmwiki.php/Main/TheReveal"><span data-dcnode-id="1765" instrument_node="">revealed</span></a><span data-dcnode-id="1763" instrument_node=""> to us, we are surprised and shocked. This includes hidden aspects of particular characters' backstories or their personalities ("I never would have thought Alice could kick Bob's head into the locker!")
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1756"><span class="ad-caption" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1757" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="1751"><span data-dcnode-id="1755" instrument_node="">Sometimes even when we </span><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">do</span></em><span data-dcnode-id="1752" instrument_node=""> have all the information, the twist can come as a shock due to a sudden, unforeseen action by other actors in the plot, the setting or place it's occurring in. We could see an action that we'd long predicted but not all its ramifications, so the shock value is still there. Alternatively, while we've seen characters' emotions, we may not always be clued into the extent of their thoughts, so a particular action may still come as a shock.
</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1750" instrument_node="">A good Plot Twist relies on the viewer not to figure it out in advance. An obvious twist isn't much of a twist at all. When the viewer already knows the twist, due to being </span><a class="twikilink" data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItWasHisSled" title="/pmwiki/pmwiki.php/Main/ItWasHisSled"><span data-dcnode-id="1749" instrument_node="">previously spoiled</span></a><span data-dcnode-id="1747" instrument_node="">, the twist might not be as satisfying, but the opposite can also be true — you appreciate all the work that went into setting up the twist more once you know it. Of course, you can always have it both ways by avoiding spoilers the first time, then re-watching or re-reading the work. On the other end, if a plot twist is </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">too</span></em><span data-dcnode-id="1744" instrument_node=""> obscure, it can leave the viewer feeling cheated — how could anyone have guessed </span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">that</span></em><span data-dcnode-id="1741" instrument_node="">?
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1734"><span class="ad-caption" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1735" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node="">Note that Plot Twists refer to twists in the </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">overall plot</span></em><span data-dcnode-id="1730" instrument_node="">, and generally have lasting effects. An individual scene, such as a fight scene, can have several reversals in the fates of the combatants, but none of them can be called a Plot Twist. If the twist is of minor significance to the overall plot, it does not fall into this category.
</span></p><p data-dcnode-id="1715"><span data-dcnode-id="1728" instrument_node="">Contrast </span><a class="twikilink" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DramaticIrony" title="/pmwiki/pmwiki.php/Main/DramaticIrony"><span data-dcnode-id="1727" instrument_node="">Dramatic Irony</span></a><span data-dcnode-id="1725" instrument_node="">, which is where the </span><em data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">audience</span></em><span data-dcnode-id="1722" instrument_node=""> knows something that one or more </span><em data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">characters</span></em><span data-dcnode-id="1719" instrument_node=""> do not. A common form of </span><a class="twikilink" data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockingMoments" title="/pmwiki/pmwiki.php/Main/ShockingMoments"><span data-dcnode-id="1718" instrument_node="">Shocking Moment</span></a><span data-dcnode-id="1716" instrument_node="">.
</span></p><hr data-dcnode-id="1714"><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1708"><span class="ad-caption" data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1709" id="proper-ad-tvtropes_mobile_ad_3"></div></div><h2 data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Tropes:</span></h2><span data-dcnode-id="1705" instrument_node="">

</span><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Categories:</span></strong><span data-dcnode-id="1701" instrument_node="">
</span><ul data-dcnode-id="1675"><li class="plus" data-dcnode-id="1696"><span data-dcnode-id="1700" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetrayalTropes" title="/pmwiki/pmwiki.php/Main/BetrayalTropes"><span data-dcnode-id="1699" instrument_node="">Betrayal Tropes</span></a><span data-dcnode-id="1697" instrument_node="">

</span><ul data-dcnode-id="1163"><li data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccidentalPublicConfession" title="/pmwiki/pmwiki.php/Main/AccidentalPublicConfession"><span data-dcnode-id="1671" instrument_node="">Accidental Public Confession</span></a><span data-dcnode-id="1669" instrument_node="">
</span></li><li data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActuallyADoombot" title="/pmwiki/pmwiki.php/Main/ActuallyADoombot"><span data-dcnode-id="1666" instrument_node="">Actually a Doombot</span></a><span data-dcnode-id="1664" instrument_node="">: The villain the hero was fighting turns out to be a robot double or clone of the real villain.
</span></li><li data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustAPrank" title="/pmwiki/pmwiki.php/Main/AllJustAPrank"><span data-dcnode-id="1661" instrument_node="">All Just a Prank</span></a><span data-dcnode-id="1659" instrument_node="">: A major plot ends up to be a practical joke.
</span></li><li data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssPull" title="/pmwiki/pmwiki.php/Main/AssPull"><span data-dcnode-id="1656" instrument_node="">Ass Pull</span></a><span data-dcnode-id="1654" instrument_node="">: An explanation or solution that comes out of nowhere and disregards what has already been established by the story, named from the idea that the writer just pulled an answer from their ass in desperation for a quick and convenient way to resolve the conflict.
</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackstabBackfire" title="/pmwiki/pmwiki.php/Main/BackstabBackfire"><span data-dcnode-id="1651" instrument_node="">Backstab Backfire</span></a><span data-dcnode-id="1649" instrument_node="">
</span></li><li data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor" title="/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor"><span data-dcnode-id="1646" instrument_node="">Be Careful What You Wish For</span></a><span data-dcnode-id="1644" instrument_node="">: A character makes a wish. Once the wish is granted, they learn the hard way that there are downsides to what they wanted.
</span></li><li data-dcnode-id="1638"><span data-dcnode-id="1642" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBigBadShuffle" title="/pmwiki/pmwiki.php/Main/TheBigBadShuffle"><span data-dcnode-id="1641" instrument_node="">The Big Bad Shuffle</span></a><span data-dcnode-id="1639" instrument_node="">

</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CanonCharacterAllAlong" title="/pmwiki/pmwiki.php/Main/CanonCharacterAllAlong"><span data-dcnode-id="1631" instrument_node="">Canon Character All Along</span></a><span data-dcnode-id="1629" instrument_node="">: The adaptation features a character who initially appears to be </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CanonForeigner" title="/pmwiki/pmwiki.php/Main/CanonForeigner"><span data-dcnode-id="1628" instrument_node="">a completely new character created for the adaptation</span></a><span data-dcnode-id="1626" instrument_node="">, but it later turns out that the character is really the adaptation's interpretation of an already established character.
</span></li><li data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CareerEndingInjury" title="/pmwiki/pmwiki.php/Main/CareerEndingInjury"><span data-dcnode-id="1623" instrument_node="">Career-Ending Injury</span></a><span data-dcnode-id="1621" instrument_node="">
