</span><div class="entry-content" data-dcnode-id="1734"><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1858" instrument_node="">Netflix’s ‘</span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/unbelievable-netflix/"><span data-dcnode-id="1857" instrument_node="">Unbelievable</span></a><span data-dcnode-id="1855" instrument_node="">’ tells the story of a bone-chilling crime, a revolting affair with the law enforcement, and a commendable quest for truth. Based on a true story, it takes a narrative structure that keeps us in sync with the thrilling investigation while also keeping in touch with the heartbreaking story of a young woman who loses everything after her rape. Packed with great performances and serving as an emotional rollercoaster, this is the show that you don’t want to miss. If you haven’t yet seen it, head over to </span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netflix.com/title/80153467"><span data-dcnode-id="1854" instrument_node="">Netflix</span></a><span data-dcnode-id="1852" instrument_node="">.</span></p><div class="code-block code-block-1" data-dcnode-id="1842" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1850" instrument_node="">
</span><span data-dcnode-id="1848" instrument_node="">
</span><div align="center" data-dcnode-id="1843" data-freestar-ad="__300x250 __336x280" id="thecinemaholic_728x90_300x250_320x50_InContent_2_new_tag"><span data-dcnode-id="1847" instrument_node="">

</span></div></div><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">SPOILERS AHEAD
</span></p><span data-dcnode-id="1838" instrument_node="">
</span><h4 data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Summary of the Plot</span></h4><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">In 2008, someone breaks into Marie’s apartment and rapes her. She reports the incident and the investigation begins. As if she hadn’t already been going through enough, the whole thing comes back to bite her. She is forced to believe that she had made up the story to have the attention of her family and friends. She is even charged for it and has to spend time in therapy, after paying a hefty fine. A couple of years later, another similar incident happens and another detective is placed in charge of it. The only difference here is that she is committed to seeing the whole thing through.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><h4 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Why Didn’t the Cops Believe Marie?</span></h4><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><img alt="" class="aligncenter size-full wp-image-192031" data-attachment-id="192031" data-comments-opened="1" data-dcnode-id="1828" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="unbelievable" data-large-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg" data-orig-size="1825,1217" data-permalink="https://thecinemaholic.com/unbelievable-netflix/unbelievable/" height="1217" sizes="(max-width: 1825px) 100vw, 1825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg 1825w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=200,133 200w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=300,200 300w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=768,512 768w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=1024,683 1024w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=1536,1024 1536w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=370,247 370w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=270,180 270w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=570,380 570w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.jpg?resize=740,493 740w" width="1825"></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Marie Adler rings her foster mom, Judith, telling her she has been raped. Before that, she had tried calling her friend, Connor, and it is the friend next door who calls 911. The cops show up, look around her place, and ask her to narrate everything in detail. As the traumatic images flash in her mind, she tells them everything. It pains her to go through it again, but she knows how crucial it is for the investigation. But one time is not enough. Later, the detectives arrive and she is asked to give another statement, where she has to retell everything again, in excruciating detail. After that, she is sent to the hospital where she is checked for injuries and bruises and for giving samples.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">The procedure is invasive and takes a lot of time, but it needs to be done. So, she goes through with it. But then, the nurse asks her to tell the whole story one more time, because the hospital needs separate records, and she has to relive the experience for the third time now. Marie thinks now there is no one else left to tell; but the next day, she is called to the station and not only has to repeat the whole thing all over again, but also has to write it down for the official statement. Meanwhile, the cops comb through her place, looking for any hard evidence. But the rapist has taken a lot of precautions and there is nothing they can find.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">What happens here is that the cops begin to wonder how the perpetrator left absolutely no trace whatsoever. Doubt begins to take shape, which is further strengthened when Judith shares her insights regarding Marie’s life with them. She tells them that even though Marie is a good person, she has been through a lot of bad stuff. Having moved from one foster home to another, the absence of her father and the reckless behaviour of her mother have affected her psyche in an adverse manner, and she has always been hungry for the one thing that she never really got as a child- attention. Having turned 18 and moving out from foster care has not been an easy transition for her. Judith tells them that Marie’s story doesn’t look right and she might be doing all of it enjoy the limelight for a while.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">There are a number of faults they find in Marie’s story. The absence of some foreign element in her apartment, nothing that shows the presence of an intruder, doesn’t look encouraging to the cops. The things that Marie claims were used in her assault are her own. Judith finds it hard to believe that a shoelace could be enough to tie her up. With the seed of doubt in their mind, the cops begin to interview the people around her, and they find out some discrepancies in her story, which have also shown up in the five different accounts she shared with them. Looking into her past convinces them of her guilt, and after pestering her for a while, they succeed in subjugating her to accept that it was all made up. Is Marie at fault here? Should she have handled her accounts better? Should she have got her story right before telling the cops anything?</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><img alt="" class="aligncenter size-full wp-image-193286" data-attachment-id="193286" data-comments-opened="1" data-dcnode-id="1813" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="unbelievable" data-large-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png" data-orig-size="1781,1001" data-permalink="https://thecinemaholic.com/unbelievable-ending/unbelievable-3/" height="1001" loading="lazy" sizes="(max-width: 1781px) 100vw, 1781px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png 1781w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=200,112 200w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=300,169 300w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=768,432 768w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=1024,576 1024w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=1536,863 1536w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=370,208 370w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=270,152 270w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=570,320 570w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=740,416 740w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable.png?resize=355,200 355w" width="1781"></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The only one at fault, in this case, are the detectives leading the investigation. First of all, they shouldn’t have allowed their perspective to be changed by some other person. Even though Judith had faced something similar in her young years, it doesn’t mean she knows everything about how other people react to their trauma. Everyone has a different way of handling it, and her problem is that she couldn’t understand Marie’s recuperating process. If she thought Marie wasn’t handling things better, she should have talked to her about it. Going to the cops was a very immature decision.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">No matter what Judith thought, the cops should not have allowed her subjective perception to affect their investigation. If they thought Marie was lying, they should have gone through a proper procedure to determine that. If they didn’t have any proof for the rape, there was nothing against it either. Their only argument was that there were inconsistencies in her story. Seasoned cops as they were, it seemed rather regressive for them to say such a thing. The brain works very creatively when it comes to protecting the person from trauma. They are already scarred for life, and the brain tries to lessen the pain by playing some tricks. For Marie to have remembered every single thing in stark detail is ridiculous. Not to forget that she had been blindfolded the whole time.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">After the rapist left her bound and gagged in her apartment, her survival instincts kicked in and she broke free and called for help. Or, she called first and broke free later. It might seem like something that normal people should be able to remember in the order that it happened, but this situation is not normal. Her mind is busy trying to save her, so we should cut it some slack if it doesn’t register some trivial details of that morning. The cops should have understood it. Instead, they latch onto it and coerce Marie into not only accepting that she had lied but also in making her believe that the rape had never happened. This is another level of psychological manipulation being incorporated by them, which makes them as much complicit in the crime as the rapist himself.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">If you think that the cops weren’t at fault, that they were analysing just what was in front of them, then you should also consider what happened a couple of years after. Det Karen Duvall came across a similar case. She too had nothing to go on, no physical evidence and the victim had nothing to prove that they had actually been raped. But did she turn it around on her? Did she question her story and coerce her into doubting herself? No, she got to the root of it, no matter how much time it took, however many sleepless nights. Marie and Amber’s cases were exceptionally similar. While one officer pursued it to the end of the world, the other turned it around and satisfied themselves with whatever got the case closed.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><h4 data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">The Breaking Point of the Case</span></h4><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><img alt="" class="aligncenter size-full wp-image-190841" data-attachment-id="190841" data-comments-opened="1" data-dcnode-id="1795" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="unbelievable_1280" data-large-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg" data-orig-size="1280,720" data-permalink="https://thecinemaholic.com/toni-collette-new-movie/unbelievable_1280/" height="720" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg 1280w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=200,113 200w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=300,169 300w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=768,432 768w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=1024,576 1024w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=370,208 370w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=270,152 270w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=570,321 570w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=740,416 740w, https://thecinemaholic.com/wp-content/uploads/2019/09/unbelievable_1280.jpg?resize=355,200 355w" width="1280"></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">When Det Karen Duvall picks up Amber’s case, everything looks like a clean slate. She doesn’t have much to go forward with, but she knows that she needs to find this rapist and see the case through to the end. Scratching her head, looking for something, doesn’t yield a lot. The most unexpected thing happens when she mentions the case to her husband who tells her that something similar had come up in his department as well. We are tempted to think that it would be Marie’s case, but that had happened a long time ago. Duvall is referred to Det Grace Rasmussen. Turns out, their cases are similar to each other’s to the dot. This leads them to merge the investigation and soon they discover two other cases that could have been perpetrated by the same man.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Gathering bits and pieces from the account of different victims leads them to come up with a rough profile of the man. Further, after scouring through endless footage in the CCTV, they zero in on a white Mazda with a broken screen and focus their energy on locating it. Amber tells them that the rapist told her that he could speak four languages and had been overseas. The locations of his travel point towards a military background. Another thing that irks Duvall is that the guy left the scene too clean. It was as if he knew exactly what the cops would look for. He had been very methodical in his approach. Stalking the victims for weeks before finding the right time to pounce on them. He had even broken in their homes before the night of the rape. It was as if he went through a trial run to see if things would run smoothly when he wanted them to.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Moreover, he was careful enough to not repeat the crime in the same neighbourhood. He knew the cops don’t easily share info of their cases, not even with other cops. So, they would never come to know about the cluster he had created and would never get a clear picture of what he was doing. This methodical approach leads her to believe that it could be someone from law enforcement. Rasmussen asks her to keep this to herself because pinning the blame on one of them would make the investigation even harder, as everyone will back out and they won’t have any more support going further.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Moving forward, they rein in the FBI and make use of its resources to gather more information. Eventually, due to the intern’s hard work, they are able to locate that white Mazda and get its licence plate. This leads them to Chris McCarthy and once they get the DNA to prove his involvement in the case, everything falls right into place. There were a number of small things that the detectives held on to find whatever break in the case they could. All of them eventually paved the way for the final reveal. But if there was one moment that can be counted as the monumental one, the one that started the domino to bring the whole thing down, it wouldn’t be the time they pinpointed the Mazda or focused on the honeycomb pattern they found on the doors. It wouldn’t even be the discovery of other victims.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">It is a simple fact that two detectives cared enough to pursue a case that otherwise didn’t make any sense. Had they given in to the temptation that the victim had concocted this out of their own imagination, nothing would have happened as it was supposed to. The first case had happened in Washington and the rapist accepts that he had been very sloppy the first time around. Had the detective handling that case been more attentive, it would have never happened to the girls that followed. Had Rasmussen and Duvall not stuck to the case like their lives depended on it, Marie wouldn’t have been the only one to believe that she had made the whole thing up.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><h4 data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">The Ending</span></h4><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">After piecing together whatever little information they had, Detective Karen Duvall and Grace Rasmussen succeed in identifying the rapist. They need a substantial confirmation to get an arrest warrant, for which they stage a plan to get McCarthy’s fingerprints. But in a surprising turn of events, they discover that they had followed the brother of their target. Nevertheless, they get his DNA, which helps them identify the familial lineage of the culprit. They nab him and a search of the house leads them to his “trophies”. Every time he raped someone, he would take something from their place, be it their camera or their underwear. The recovery of the camera gives them all the pictures he had taken, and they discover another one of his victims, Marie Adler.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Wind back a couple of years, we find Marie struggling in life. She has been forced to accept that her rape was a hoax, and this has deprived her of any friends or supporters she had. Not only this, her name is leaked to the press and the City charges her with gross misdemeanour. This could mean a year’s jail and $5000 fine. But in one stroke of luck, she finds a lawyer who gets a plea deal in which she is asked to get counselling and has to deposit only $500.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">But then, the truth comes out, and she receives the cheque back. This makes her realise that she has been compromising in her life for way too long and decides to sue the City. They dismiss the case after agreeing on the reparations of $150,000. She could have gotten more, but Marie makes peace with the fact that they have acknowledged their mistake. She leaves town, but not before confronting the detectives who ruined her life. While one of them is remorseful, the other makes no attempts to let her know that he is sorry for her. Later, she calls Duvall and thanks her for having her back even when her life was screwed up. Marie gets a chance at a new start while the other women confront their rapist and finally begin to feel a bit safer.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1765" instrument_node="">McCarthy takes a plea deal but doesn’t want to agree to the kidnapping. What interests the detective further is the encrypted content on his hard drive. Rasmussen believes, and rightly so, that there are names and folders of other victims in there. She tries to get the password out of him, but that doesn’t happen. However, to everyone’s relief, he is convicted with maximum penalty, which means he is never getting out. The hard drive remains a mystery, and Rasmussen has to make peace with the fact that she can’t serve justice to each and every one of the victims. At last, McCarthy demands an audience to explain himself. He talks about his methods and how stupidly the cops behaved on his first attempt. This scene reminds us of another Netflix hit, ‘</span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/shows-like-mindhunter/"><span data-dcnode-id="1764" instrument_node="">Mindhunter</span></a><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">’</span></strong><span data-dcnode-id="1760" instrument_node="">. As we watch the rapist talk, we wonder if Holden and Bill should have been the ones interviewing him.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><h4 data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Is ‘Unbelievable’ Based on a True Story?</span></h4><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">The way the events of this story unfold, it seems to have come straight out of a novel. Why wouldn’t the cops believe a victim? How can two cops catch a culprit with absolutely nothing to go on with? It really is an excellent tale, and it is true to every scene. All the rapes, the MO of the rapist, the behaviour of the law enforcement, all the mental and physical injuries sustained by the victims are real.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1751" instrument_node="">The show is actually based on </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.propublica.org/article/false-rape-accusations-an-unbelievable-story"><span data-dcnode-id="1750" instrument_node="">ProPublica’s Pulitzer-winning article</span></a><span data-dcnode-id="1748" instrument_node="">&nbsp;and doesn’t add any unnecessary angles to diminish the effect of the story. The details have been taken care of and the events have been portrayed just as they had happened. Luckily, this means that the rapist (Marc O’Leary, in real life) was convicted to life in prison for 327 and a half years. He is never coming out, so the world is definitely a safer place without him. Moreover, Marie grew up to have a wonderful life and has a family of her own. After her incident, the police department went through an internal investigation to determine where the justice system had failed her. However, no one was on the receiving end of whatever charges should have been levied on the detectives. Jerry Ritgam, one of the detectives on Marie’s case, resigned after O’Leary’s arrest.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1738"><strong data-dcnode-id="1739"><span data-dcnode-id="1745" instrument_node="">Read More in Explainers: </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/the-i-land-ending/"><span data-dcnode-id="1744" instrument_node="">The I-land</span></a><span data-dcnode-id="1742" instrument_node=""> | </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/green-frontier-ending/"><span data-dcnode-id="1741" instrument_node="">Green Frontier</span></a></strong></p><span data-dcnode-id="1737" instrument_node="">
