</span><span class="ez-toc-title-toggle" data-dcnode-id="541"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="542" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="543"></i></a></span></div><span data-dcnode-id="539" instrument_node="">
</span><nav data-dcnode-id="519"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="520"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="521"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="537" href="#Funny_Short_Stories_With_A_Twist_Ending" title="Funny Short Stories With A Twist Ending"><span data-dcnode-id="538" instrument_node="">Funny Short Stories With A Twist Ending</span></a><ul class="ez-toc-list-level-4" data-dcnode-id="522"><li class="ez-toc-heading-level-4" data-dcnode-id="523"><ul class="ez-toc-list-level-4" data-dcnode-id="524"><li class="ez-toc-heading-level-4" data-dcnode-id="534"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="535" href="#New_Lady_In_Our_Office" title="New Lady In Our Office"><span data-dcnode-id="536" instrument_node="">New Lady In Our Office</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="531"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="532" href="#My_Boyfriends_New_Personal_Secretary" title="My Boyfriend’s New Personal Secretary"><span data-dcnode-id="533" instrument_node="">My Boyfriend’s New Personal Secretary</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="528"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="529" href="#Boyfriend_Kissing_His_Personal_Secretary" title="Boyfriend Kissing His Personal Secretary"><span data-dcnode-id="530" instrument_node="">Boyfriend Kissing His Personal Secretary</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="525"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="526" href="#I_Was_Wrong" title="I Was Wrong"><span data-dcnode-id="527" instrument_node="">I Was Wrong</span></a></li></ul></li></ul></li></ul></nav></div><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="513"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Funny Short Stories With A Twist Ending:</span></strong><span data-dcnode-id="514" instrument_node=""> Last night, Isla broke up with Niko. This time, it’s their 6th break-up in a line. Isla is pretty hot-headed, and she can’t tolerate any other girls even talking to Niko even at his workspace.&nbsp;</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">However, sometimes it’s crucial for Niko to interact with the female co-workers, but his girlfriend doesn’t take it very well. They both are engineers, and they work in the same office as well.</span></p><span data-dcnode-id="509" instrument_node="">
</span><h2 data-dcnode-id="505"><span class="ez-toc-section" data-dcnode-id="508" id="Funny_Short_Stories_With_A_Twist_Ending"></span><span data-dcnode-id="507" instrument_node="">Funny Short Stories With A Twist Ending</span><span class="ez-toc-section-end" data-dcnode-id="506"></span></h2><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">One day earlier, Niko told Isla that he’s going to take her to dinner. But at that moment, he got busy with some work and got late. Seeing that, Isla went to his cabin to find out when he’ll be able to finish his work.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">But when she arrived there, she saw Niko laughing while chatting with his co-worker Genesis. That got to her, which is basically the main reason for their breakup. Niko was just having a conversation with Genesis about work-related stuff, but even knowing that Isla had enough of it.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">However, today there is a special meeting at the office. Everyone is told to be present there in time. Isla was sitting there on a desk. Niko came and sat beside her. Isla immediately took off of her chair and went for another one.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Everyone in the room was laughing at her knowing they break up every few days. It was apparent that they’d broken up again, and the entire room was gossiping about it.</span></p><span data-dcnode-id="492" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="487"><figure class="aligncenter size-large" data-dcnode-id="488"><img alt="funny short stories with a twist ending" class="wp-image-1136" data-dcnode-id="491" height="25" loading="lazy" sizes="(max-width: 560px) 100vw, 560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/askhealthylife.com/wp-content/uploads/2021/04/funny-short-stories-with-a-twist-ending-1.jpg%3Fresize%3D560%252C315%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/askhealthylife.com/wp-content/uploads/2021/04/funny-short-stories-with-a-twist-ending-1.jpg?w=560&amp;ssl=1 560w, https://i0.wp.com/askhealthylife.com/wp-content/uploads/2021/04/funny-short-stories-with-a-twist-ending-1.jpg?resize=300%2C169&amp;ssl=1 300w" width="302"><figcaption data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">funny short stories with a twist ending</span></figcaption></figure></div><span data-dcnode-id="486" instrument_node="">
</span><h4 data-dcnode-id="482"><span class="ez-toc-section" data-dcnode-id="485" id="New_Lady_In_Our_Office"></span><span data-dcnode-id="484" instrument_node="">New Lady In Our Office</span><span class="ez-toc-section-end" data-dcnode-id="483"></span></h4><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">At this moment, the CEO entered the meeting room. Beside her was a new lady. All men in the room were staring at her without blinking. And the women were jealous of her marvelous beauty. She had incomparable beauty, and everyone in the room could see that.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Introducing her, the CEO said, “She is Skylar. She got appointed to our office today. She’ll be working as Niko’s personal secretary.” Hearing that Isla got mad. She asked the CEO,</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Isla: Why is Skylar going to be Niko’s personal secretary? If someone joins the office, he/she works with me for the first month. That’s how it went usually.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">CEO: It is different for Skylar’s case. I’ll let you guys know the further updates within a week. Until then work as I’ve mentioned.&nbsp;</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Then the CEO left for his cabin. Skylar sat beside Niko’s empty chair, from which Isla got up a while back! Seeing them sitting next to each other, Isla got very angry and left the meeting room.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Niko was noticing everything that was happening. After Isla left, the whole room full of people was r0asting him. They asked him if he and Isla had broken up again and how long it will last this time.</span></p><span data-dcnode-id="463" instrument_node="">
</span><h4 data-dcnode-id="459"><span class="ez-toc-section" data-dcnode-id="462" id="My_Boyfriends_New_Personal_Secretary"></span><span data-dcnode-id="461" instrument_node="">My Boyfriend’s New Personal Secretary</span><span class="ez-toc-section-end" data-dcnode-id="460"></span></h4><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">After the work hour, everyone was going home. While Isla left the office, she saw Niko and Skylar sitting next to each other, chatting, and having a burst of laughter. Even, Niko was twitching her fingers and joking around about something. That is something Isla has the right to be angry about. But as they’ve broken up, she can’t say anything here. So, she left for home mad.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Usually, after finishing work, Isla hangs out with Niko and does shopping or leaves for home after dinner. But as they’ve broken up, nothing is going as it should be. She’s standing in front of the office, maybe waiting for Niko to show up.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">After a while, Niko left the office and went home. He didn’t notice that Isla was standing there. If he did, he might have tried to calm her down and make things go normal again. That broke her heart even more.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Once Niko left, Isla was standing down the road under the office. She was actually waiting for Skylar as she wanted to tell her to stay away from Niko. Only she is his girlfriend, and there is the only complication between them for a short while.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">It was almost midnight and Isla gave up waiting for Skylar as she didn’t see her coming out of the office. Isla thought that she might have missed her passing by and so, she left for home.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">6 days passed by just like that. Isla tried very hard to talk to Skylar, but she just could not get the right opportunity to do that. That’s because she always sticks with Niko during office hours. But after that, she never saw her leaving office, which was quite strange. That got Isla wondering if Skylar spends the night in the office!</span></p><span data-dcnode-id="440" instrument_node="">
</span><h4 data-dcnode-id="436"><span class="ez-toc-section" data-dcnode-id="439" id="Boyfriend_Kissing_His_Personal_Secretary"></span><span data-dcnode-id="438" instrument_node="">Boyfriend Kissing His Personal Secretary</span><span class="ez-toc-section-end" data-dcnode-id="437"></span></h4><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">It was the 7th day Skylar had joined the office. It was also Niko and Isla’s 7th day of breakup. The CEO told the whole group that he’s going to tell them more about Skylar. Isla also decided that she’s going to talk to Skylar no matter what and tell her that she is his girlfriend. Also, she’s going to get Niko in the line as well. They seem to always stick together, and all of their co-workers think that they are in a relationship.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Thinking about all that Isla entered the office room. She was not ready to see what’s in front of her. She saw Niko and Skylar were cuddling each other and kissing! Everybody was surprised seeing all that. The CEO was cheering them up saying, “Amazing, go on, great job!”</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">At this moment, Isla had enough. She ran towards them and pushed Skylar away from Niko. Skylar lost balance and ended up on the ground. Isla wasn’t done with her. She attached her and started punching her in the face!</span></p><span data-dcnode-id="426" instrument_node="">
</span><h4 data-dcnode-id="422"><span class="ez-toc-section" data-dcnode-id="425" id="I_Was_Wrong"></span><span data-dcnode-id="424" instrument_node="">I Was Wrong</span><span class="ez-toc-section-end" data-dcnode-id="423"></span></h4><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">After 7 or 8 punches, she saw that Skylar’s face was cracking but there was no blood! Isla’s hand was bleeding from the punches! She saw a motor, lights, wirings, and so much more inside Skylar’s face!</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Niko immediately took Isla, sat her on a chair, and grabbed a piece of cloth to tie for stopping the bleeding. On the other side, the CEO was screaming, “On my lord! What have you done, Isla? My 3 million worth robot! You ruined the face of my robot!”</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Skylar isn’t any human, she’s a robot!</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The CEO started explaining, “Skylar is a very special robot. I and Niko tried to see if anyone can tell if she’s a robot if we don’t tell anyone. And no one could tell, which is pretty clear thanks to Isla!”&nbsp;</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Isla apologized to the CEO and started crying. At this point, Niko gave her a hug and quickly left the office for treatment of his love’s bleeding hand.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="405" instrument_node="">(1) </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askhealthylife.com/funny-story-to-tell-your-boyfriend/"><span data-dcnode-id="404" instrument_node="">Funny Story To Tell Your Boyfriend</span></a></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="400" instrument_node="">(2) </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askhealthylife.com/heart-touching-romantic-love-stories/"><span data-dcnode-id="399" instrument_node="">Heart Touching Romantic Love Stories</span></a></p><span data-dcnode-id="396" instrument_node="">
