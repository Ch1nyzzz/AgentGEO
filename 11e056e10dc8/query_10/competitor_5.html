</span><p class="review-summary-title" data-dcnode-id="2070"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">While it doesn’t give a jaw-dropping answer to how Ferry came to be, it does act as a healthy prequel.</span></p><span data-dcnode-id="2066" instrument_node="">
</span></div><span data-dcnode-id="2064" instrument_node="">
</span></div><span data-dcnode-id="2062" instrument_node="">
</span><span data-dcnode-id="2059" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="2053"><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2055"><em data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">This review of the Netflix film Ferry contains no spoilers — the crime drama was released on the streaming service on May 14, 2021.</span></em></p><span data-dcnode-id="2054" instrument_node="">
</span></div><span data-dcnode-id="2052" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="2033"><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2050" instrument_node="">Where do I start? The last thing I expected when I got through two thrilling seasons of Netflix’s </span><em data-dcnode-id="2046"><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//readysteadycut.com/2020/11/09/review-undercover-season-2-netflix-series/"><span data-dcnode-id="2049" instrument_node="">Undercover</span></a><span data-dcnode-id="2047" instrument_node=""> (</span></em><span data-dcnode-id="2045" instrument_node="">a thrilling crime drama) was a spin-off prequel that explained the main villain.</span></p><div class="code-block code-block-18" data-dcnode-id="2035" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2043" instrument_node="">
</span><div data-dcnode-id="2036" id="FreeStarVideoAdContainer"><span data-dcnode-id="2042" instrument_node="">
</span><div data-dcnode-id="2038" id="freestar-video-parent"><span data-dcnode-id="2041" instrument_node="">
</span><div data-dcnode-id="2040" id="freestar-video-child"></div><span data-dcnode-id="2039" instrument_node="">
</span></div><span data-dcnode-id="2037" instrument_node="">
</span></div></div><span data-dcnode-id="2034" instrument_node="">
</span></div><span data-dcnode-id="2032" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="2027"><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">I’m all for origin stories, but I’ve always found the criminal Ferry amusing. He’s the kind of man you’d expect to see in the pub, grunting in the corner and chuckling a little at the sign of slight banter. He’s a villain that barely acts like an evil man, and that’s what makes him fascinating. Ferry is a crime lord that somehow keeps it casual, making it difficult for the audience to gauge the character. He sits with his beer and burps freely like a disgusting pig. He’s a man with no shame. Ferry probably does not deserve an origin story.</span></p><span data-dcnode-id="2028" instrument_node="">
</span></div><span data-dcnode-id="2026" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="2009"><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2024" instrument_node="">Netflix’s </span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Ferry</span></em><span data-dcnode-id="2021" instrument_node=""> explains how the man came to </span><em data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">be. </span></em><span data-dcnode-id="2018" instrument_node="">Once you have finished the film, Netflix wisely sends the viewer to</span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//readysteadycut.com/2019/05/03/undercover-season-1-netflix-original-series-review/"><span data-dcnode-id="2017" instrument_node=""> the first season</span></a><span data-dcnode-id="2015" instrument_node="">. If you are thinking about watching </span><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Undercover, </span></em><span data-dcnode-id="2012" instrument_node="">I’d heavily suggest that this film is watched first. While it doesn’t give a jaw-dropping answer to how Ferry came to be, it does act as a healthy prequel.</span></p><span data-dcnode-id="2010" instrument_node="">
</span></div><span data-dcnode-id="2008" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="2003"><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">There are a few quirks; for instance, in the film, Ferry meets John, and because the time of the story is a little before the series, he asks him if he’s dyed his hair. It’s a cheeky dig at the fact that the production team couldn’t make John look younger, but it’s good to see his right-hand man back on the screen.</span></p><span data-dcnode-id="2004" instrument_node="">
</span></div><span data-dcnode-id="2002" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="1990"><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">The story focuses on the lead character and how he got settled at that intimate caravan park. While it doesn’t show his “actual” rise, it does show Ferry working for his boss (named Brink); he finds himself dealing with gang warfare after one of their own ended up being shot at “House X.” Brink asks Ferry “to deal with it,” essentially makes making him cocaine sniffing assassin who lurks at a campsite to find the gang responsible for hurting their own.</span></p><div class="code-block code-block-6" data-dcnode-id="1992" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1998" instrument_node="">
</span><div align="center" data-dcnode-id="1993" data-freestar-ad="__300x250 __336x280" id="readysteadycut_medrec_incontent_2"><span data-dcnode-id="1997" instrument_node="">
</span><span data-dcnode-id="1994" instrument_node="">
</span></div></div><span data-dcnode-id="1991" instrument_node="">
</span></div><span data-dcnode-id="1989" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="1976"><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1987" instrument_node="">The Netflix film barely inspires. We welcome an extension of this universe, but we learn very little in this prequel. It’s not like </span><em data-dcnode-id="1983"><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//readysteadycut.com/2020/04/21/recap-better-call-saul-season-5-episode-9-something-unforgivable/"><span data-dcnode-id="1986" instrument_node="">Better Call Saul</span></a><span data-dcnode-id="1984" instrument_node="">, </span></em><span data-dcnode-id="1982" instrument_node="">where the information you receive adds context to the whole ordeal. However, </span><em data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Ferry </span></em><span data-dcnode-id="1979" instrument_node="">does show how the criminal met Danielle and answers the vital question — were they really in love, or was it a transactional relationship? But apart from that, this is a generic crime film that benefits from the context afterward rather than from within.</span></p><span data-dcnode-id="1977" instrument_node="">
</span></div><span data-dcnode-id="1975" instrument_node="">
</span><div class="default-paragraph" data-dcnode-id="1964"><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1973" instrument_node="">However, an extension of the </span><em data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Undercover </span></em><span data-dcnode-id="1970" instrument_node="">Universe is hardly something to be sniffed at. I enjoyed it. Would I watch other prequels or sequel films involving Danielle? Absolutely. </span><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Ferry may be</span></em><span data-dcnode-id="1967" instrument_node=""> opportunistic, but it will certainly appeal to the fans.</span></p><span data-dcnode-id="1965" instrument_node="">
