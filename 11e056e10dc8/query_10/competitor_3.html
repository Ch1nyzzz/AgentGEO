</span><figcaption class="item-img-caption" data-dcnode-id="1902"></figcaption><span data-dcnode-id="1901" instrument_node="">
</span></figure><span data-dcnode-id="1899" instrument_node="">
</span></div><span data-dcnode-id="1897" instrument_node="">
</span><span data-dcnode-id="1895" instrument_node="">
</span></header><section class="article-body" data-dcnode-id="1427" id="article-body" itemprop="articleBody"><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1892" instrument_node="">Almost everyone wants to see a </span><em data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">happily-ever-after</span></em><span data-dcnode-id="1889" instrument_node=""> for their favorite characters. Whether it's a slice of life, romance or adventure story, good things </span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">should</span></em><span data-dcnode-id="1886" instrument_node=""> happen to good people, and audiences always like walking away satisfied. And yet, there is a small part of the audience that yearns for something else.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">The unhappy ending where bad things happen to good people still satisfies in a different, but no less powerful way. Although sometimes accused of melodrama, anime with sad endings can often be just as impactful and gratifying as happy endings. Sadness for the sake of sadness doesn't hold much meaning, but there is a vast difference between shows that throw in hurt and sadness due to a lack of other things to do and shows that use these emotions to tell a superior story.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><span data-dcnode-id="1874" instrument_node="">
</span><span data-dcnode-id="1872" instrument_node="">
</span><h2 data-dcnode-id="1870" id="what-are-the-different-types-of-sad-anime"><span data-dcnode-id="1871" instrument_node=""> What Are the&nbsp;Different Types of Sad Anime?</span></h2><span data-dcnode-id="1869" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1844"><span data-dcnode-id="1868" instrument_node="">
</span><div class="responsive-img expandable img-article-item" data-dcnode-id="1846" data-img-caption="&quot;&quot;" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg" data-modal-container-id="single-image-modal-container" data-modal-id="single-image-modal" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1867" instrument_node="">
</span><figure data-dcnode-id="1848"><span data-dcnode-id="1866" instrument_node="">
</span><picture data-dcnode-id="1850"><span data-dcnode-id="1865" instrument_node="">
</span><span data-dcnode-id="1863" instrument_node="">
</span><source data-dcnode-id="1862" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5" media="(min-width: 1024px)" sizes="750px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5"><span data-dcnode-id="1861" instrument_node="">
</span><source data-dcnode-id="1860" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1859" instrument_node="">
</span><source data-dcnode-id="1858" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1857" instrument_node="">
</span><source data-dcnode-id="1856" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1855" instrument_node="">
</span><span data-dcnode-id="1853" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1852" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2019/02/i-want-to-eat-your-pancreas-header.jpg" height="950" width="1900"><span data-dcnode-id="1851" instrument_node="">
</span></picture><span data-dcnode-id="1849" instrument_node="">
</span></figure><span data-dcnode-id="1847" instrument_node="">
</span></div><span data-dcnode-id="1845" instrument_node="">
</span></div><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1842" instrument_node="">Sad anime generally fall into three groups: the sad ending is </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/heike-monogatari-ending-tragedy/"><span data-dcnode-id="1841" instrument_node="">obvious from the beginning</span></a><span data-dcnode-id="1839" instrument_node="">, the whole anime is sad, or the ending is a sad one that could not have been predicted. The movie&nbsp;</span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">I Want to Eat Your Pancreas</span></em><span data-dcnode-id="1836" instrument_node=""> features the relationship between two high schoolers, one of whom has a fatal pancreatic disease. Viewers know immediately that this story won't have a happy ending. Yet, the yearning for an unhappy ending keeps them engaged in how this ending will come about.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><em data-dcnode-id="1829"><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/tag/anohana-the-flower-we-saw-that-day/"><span data-dcnode-id="1831" instrument_node="">Anohana</span></a></em><span data-dcnode-id="1828" instrument_node=""> is another example of an anime that tells no lies about being a heartbreaker. When Menma returns as a ghost to bring her friends back together, there is no question she will disappear at the end. Audiences seek out anime that will hurt in the end for a reason, and it's not for melodrama.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1818"><span class="related-single" data-dcnode-id="1819"><span data-dcnode-id="1822" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/sad-anime-where-to-watch-online/"><span data-dcnode-id="1821" instrument_node="">What Is the Saddest Anime Ever - and Where Can You Watch It?</span></a></span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1816" instrument_node="">The second category of sad anime, where a distinct melancholy feel throughout the entire story,&nbsp;can be seen in titles such as&nbsp;</span><em data-dcnode-id="1813"><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/tag/silent-voice/"><span data-dcnode-id="1815" instrument_node="">A Silent Voice</span></a></em><span data-dcnode-id="1812" instrument_node=""> and&nbsp;</span><em data-dcnode-id="1808"><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/tag/orange/"><span data-dcnode-id="1811" instrument_node="">Orange</span></a><span data-dcnode-id="1809" instrument_node="">.</span></em><span data-dcnode-id="1807" instrument_node="">&nbsp;</span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">A Silent Voice</span></em><span data-dcnode-id="1804" instrument_node=""> features teenagers trying to build a relationship up out of a </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/a-silent-voice-anime-film-bullying-impact/"><span data-dcnode-id="1803" instrument_node="">history of horrendous bullying</span></a><span data-dcnode-id="1801" instrument_node="">.&nbsp;</span><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Orange</span></em><span data-dcnode-id="1798" instrument_node=""> may have romantic elements but the main focus is always to prevent Kakeru from committing suicide. Both&nbsp;anime, while having happy moments, proved sad to watch, with depressing themes. The viewer might not be able to tell immediately </span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">how</span></em><span data-dcnode-id="1795" instrument_node=""> sad this anime will be&nbsp;from the outset, but the audience knows not to expect&nbsp;romance or a thrilling adventure.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><span data-dcnode-id="1790" instrument_node="">
</span><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1787" instrument_node="">The last category is the most controversial, and is the unhappy ending that couldn't be predicted. </span><em data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Your Lie in April</span></em><span data-dcnode-id="1784" instrument_node=""> fits between categories two and three. The anime isn't focused on Kaori's health for quite some time and there's a bit of a love fiasco with the teenagers that could lead the anime to be a standard shojo. However, it becomes&nbsp;obvious&nbsp;as time passes&nbsp;that Kaori isn't going to make it, and her farewell concert is the sob-inducing goodbye that the audience wasn't expecting.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1757"><span data-dcnode-id="1781" instrument_node="">
</span><div class="responsive-img expandable img-article-item" data-dcnode-id="1759" data-img-caption="&quot;&quot;" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg" data-modal-container-id="single-image-modal-container" data-modal-id="single-image-modal" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1780" instrument_node="">
</span><figure data-dcnode-id="1761"><span data-dcnode-id="1779" instrument_node="">
</span><picture data-dcnode-id="1763"><span data-dcnode-id="1778" instrument_node="">
</span><span data-dcnode-id="1776" instrument_node="">
</span><source data-dcnode-id="1775" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5" media="(min-width: 1024px)" sizes="750px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5"><span data-dcnode-id="1774" instrument_node="">
</span><source data-dcnode-id="1773" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1772" instrument_node="">
</span><source data-dcnode-id="1771" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1770" instrument_node="">
</span><source data-dcnode-id="1769" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1768" instrument_node="">
</span><span data-dcnode-id="1766" instrument_node="">
</span><img alt="Princess Tutu Duck As A Duck Dancing" class="lazyloaded" data-dcnode-id="1765" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/07/Princess-Tutu-Duck-As-A-Duck-Dancing.jpg" height="600" width="1200"><span data-dcnode-id="1764" instrument_node="">
</span></picture><span data-dcnode-id="1762" instrument_node="">
</span></figure><span data-dcnode-id="1760" instrument_node="">
</span></div><span data-dcnode-id="1758" instrument_node="">
</span></div><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1752"><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Princess Tutu&nbsp;</span></em><span data-dcnode-id="1753" instrument_node="">is another example of the unexpected unhappy ending. While Ahiru and Fakir save the town from Drosselmeyer,&nbsp;they don't get to&nbsp;live happily ever after. Fakir is bound to the town as its author&nbsp;and Ahiru will never be able to transform into a girl again. She will always be a duck and now that the town is back to normal, everyone forgets about her except for Fakir.&nbsp;No one will ever remember the little duck who saved them all.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><span data-dcnode-id="1748" instrument_node="">
</span><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1741"><span class="related-single" data-dcnode-id="1742"><span data-dcnode-id="1745" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/miraculous-ladybug-most-popular-romance-ships/"><span data-dcnode-id="1744" instrument_node="">Miraculous Ladybug's Most Popular Ships (Canon &amp; Non-Canon)</span></a></span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Would happy endings have been possible for these anime? Of course! Medical&nbsp;improvements could have saved Kaori. Menma could have miraculously gained a solid body and lived happily ever after with Jinta.&nbsp;Ahiru could have remained a girl. But these endings would have cheapened the story and perhaps made them stories not worth telling at all. If Sakura never had a pancreatic disease, the movie wouldn't have happened. So what is the power behind sadness? What is it about these anime that makes them memorable?</span></p><span data-dcnode-id="1737" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1735"></div><span data-dcnode-id="1734" instrument_node="">
</span><h2 data-dcnode-id="1732" id="why-is-the-sad-anime-ending-so-popular"><span data-dcnode-id="1733" instrument_node=""> Why Is the Sad Anime Ending So Popular?</span></h2><span data-dcnode-id="1731" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1706"><span data-dcnode-id="1730" instrument_node="">
</span><div class="responsive-img expandable img-article-item" data-dcnode-id="1708" data-img-caption="&quot;&quot;" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg" data-modal-container-id="single-image-modal-container" data-modal-id="single-image-modal" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1729" instrument_node="">
</span><figure data-dcnode-id="1710"><span data-dcnode-id="1728" instrument_node="">
</span><picture data-dcnode-id="1712"><span data-dcnode-id="1727" instrument_node="">
</span><span data-dcnode-id="1725" instrument_node="">
</span><source data-dcnode-id="1724" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5" media="(min-width: 1024px)" sizes="750px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=750&amp;dpr=1.5"><span data-dcnode-id="1723" instrument_node="">
</span><source data-dcnode-id="1722" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1721" instrument_node="">
</span><source data-dcnode-id="1720" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1719" instrument_node="">
</span><source data-dcnode-id="1718" data-srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1717" instrument_node="">
</span><span data-dcnode-id="1715" instrument_node="">
</span><img alt="A Silent Voice Shouya Ishida" class="lazyloaded" data-dcnode-id="1714" data-img-url="https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/01/A-Silent-Voice-Shouya-Ishida.jpg" height="600" width="1200"><span data-dcnode-id="1713" instrument_node="">
</span></picture><span data-dcnode-id="1711" instrument_node="">
</span></figure><span data-dcnode-id="1709" instrument_node="">
</span></div><span data-dcnode-id="1707" instrument_node="">
</span></div><span data-dcnode-id="1705" instrument_node="">
</span><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1702" instrument_node="">Sad stories exist in order to help with grief. Many creators use their own work as an outlet, and so audiences too can relate. If anyone has experienced the social anxiety that Shoya demonstrates in </span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">A Silent Voice</span></em><span data-dcnode-id="1699" instrument_node="">, seeing that in a movie can help validate those feelings. More loving views on death like in </span><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Anohana</span></em><span data-dcnode-id="1696" instrument_node=""> can help with those who have recently lost someone. Though it might only be an anime, plenty of people find solace in fiction to help them through tough times.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><span class="related-single" data-dcnode-id="1687"><span data-dcnode-id="1690" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/best-anime-shows-from-pa-works/"><span data-dcnode-id="1689" instrument_node="">The Best Anime Titles From P.A. Works (So Far)</span></a></span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1684" instrument_node="">Unhappy endings are also necessary to create a stronger story. If </span><em data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Anohana</span></em><span data-dcnode-id="1681" instrument_node=""> had ended with Menma actually coming back to life in some strange form of reincarnation, that would make a mockery of the rest of the show.&nbsp;If </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Orange </span></em><span data-dcnode-id="1678" instrument_node="">had let Kakeru go through the suicide attempt but miraculously survive instead of realizing he actually wants to&nbsp;live, that would strip away&nbsp;all his progress towards healing and the connections he's made with people who love him. If a pendant had fallen from the sky to let Ahiru live her life as a girl in </span><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Princess Tutu</span></em><span data-dcnode-id="1675" instrument_node="">, that would cheapen her sacrifice and everything she was willing to give up if it meant saving those she cares for. In&nbsp;a story that deconstructed the fairytale, choosing that ridiculously happy ending would make that deconstruction worthless.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1670" instrument_node="">Another part of the power of sad endings&nbsp;is that unhappy endings are necessary in order to appreciate the happy ones. This is the case in any genre. Would Karasuno's </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/haikyuu-season-3-does-hinata-need-kageyama/"><span data-dcnode-id="1669" instrument_node="">triumph</span></a><span data-dcnode-id="1667" instrument_node=""> over Aoba Johsai have felt as gratifying if Karasuno had not lost in Season 1 of </span><em data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/tag/haikyuu/"><span data-dcnode-id="1666" instrument_node="">Haikyuu</span></a></em><span data-dcnode-id="1663" instrument_node="">? Of course not.&nbsp;The eventual teary reunion in&nbsp;</span><em data-dcnode-id="1660"><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/tag/your-name/"><span data-dcnode-id="1662" instrument_node="">Your Name</span></a></em><span data-dcnode-id="1659" instrument_node=""> would mean nothing if the fear of never reuniting&nbsp;didn't exist.&nbsp;It's only the risk of unhappiness that makes the happiness worth it and the possible sadness makes that happiness feel magnified. When it comes to a sad story in itself,&nbsp;</span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Anohana</span></em><span data-dcnode-id="1656" instrument_node=""> is obviously going to be sad. That makes every moment of laughter that much more precious and then the sadness again hurts all the more in a vicious cycle that stops feeling quite so vicious when it begins to </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbr.com/saddest-anime-movies-where-to-watch/"><span data-dcnode-id="1655" instrument_node="">feel like healing</span></a><span data-dcnode-id="1653" instrument_node="">.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><span data-dcnode-id="1648" instrument_node="">
</span><span data-dcnode-id="1646" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1644"></div><span data-dcnode-id="1643" instrument_node="">
</span><h2 data-dcnode-id="1641" id="why-do-anime-audiences-seek-out-sad-endings"><span data-dcnode-id="1642" instrument_node=""> Why&nbsp;Do Anime Audiences Seek Out Sad Endings?</span></h2><span data-dcnode-id="1640" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1615"><span data-dcnode-id="1639" instrument_node="">

</span></div><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1613" instrument_node="">Most psychologists agree that human beings need to be hurt sometimes </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/blog/is-crying-good-for-you-2021030122020%23%3A~%3Atext%3DResearchers%2520have%2520established%2520that%2520crying%2Cboth%2520physical%2520and%2520emotional%2520pain."><span data-dcnode-id="1612" instrument_node="">in order to feel better</span></a><span data-dcnode-id="1610" instrument_node="">. Perhaps the fundamental reason audiences seek out sadness is because people need to feel sad sometimes, and feeling sad in the safety of an anime is better than exposing personal sadness.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">While</span><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node=""> happily-ever-after</span></em><span data-dcnode-id="1604" instrument_node=""> is all well and good, stories that share sadness in a way that connects and allows people to cope with emotion are some of the most powerful out there.&nbsp;This means that to disregard them as melodrama is to dismiss the way that audiences will look past the happy endings in search of something else.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><span data-dcnode-id="1600" instrument_node="">
