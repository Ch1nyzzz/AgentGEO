</span><h1 class="entry-title" data-dcnode-id="9983" itemprop="headline"><span data-dcnode-id="9984" instrument_node="">50 Romance Plot Ideas and Romance Writing Prompts</span></h1><div class="entry-meta" data-dcnode-id="9972"><span data-dcnode-id="9982" instrument_node=""> </span><span class="comments-link" data-dcnode-id="9977"><span data-dcnode-id="9981" instrument_node="">
</span><a data-dcnode-id="9979" href="#comments"><span data-dcnode-id="9980" instrument_node="">179 Comments</span></a><span data-dcnode-id="9978" instrument_node=""> </span></span><span data-dcnode-id="9976" instrument_node="">

			 / </span><span class="cat-links" data-dcnode-id="9973"><a data-dcnode-id="9974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bryndonovan.com/category/writing-inspiration-and-resources/" rel="category tag"><span data-dcnode-id="9975" instrument_node="">Writing Inspiration.</span></a></span></div><span data-dcnode-id="9971" instrument_node=""> </span></div><span data-dcnode-id="9969" instrument_node="">
</span></header><span data-dcnode-id="9966" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="9467" itemprop="text"><span data-dcnode-id="9965" instrument_node="">
</span><input class="jpibfi" data-dcnode-id="9964" type="hidden"><p data-dcnode-id="9962"><span data-dcnode-id="9963" instrument_node="">On this list of romance writing prompts, I’ve tried to include ideas that could work for paranormal romance, fantasy, young adult, romantic suspense, contemporary romance, and more. As long as you put a fresh twist on them, they can all inspire unique love story ideas.</span></p><span data-dcnode-id="9961" instrument_node="">
</span><p data-dcnode-id="9959"><span data-dcnode-id="9960" instrument_node="">This is really a romance plot generator in list form, with big ideas for entire plots. Of course, to write an engrossing romantic story–whether it’s a straight-up romance, or a subplot in a different kind of book or movie–it has to have strong conflict. Like Shakespeare said, “The course of true love never did run smooth.” Obstacles give your characters the chance to change and grow as people, and to prove how much they really do love each other. It also gives them interesting things to do.</span></p><span data-dcnode-id="9958" instrument_node="">
</span><p data-dcnode-id="9956"><span data-dcnode-id="9957" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9955" instrument_node="">
</span><p data-dcnode-id="9945" style="text-align: center;"><strong data-dcnode-id="9946"><span data-dcnode-id="9953" instrument_node="">
</span><span data-dcnode-id="9951" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7829689211115596" data-ad-slot="7986390266" data-dcnode-id="9950" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="9949" instrument_node="">
</span></strong></p><span data-dcnode-id="9944" instrument_node="">
</span><p data-dcnode-id="9942"><span data-dcnode-id="9943" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9941" instrument_node="">
</span><p data-dcnode-id="9939"><span data-dcnode-id="9940" instrument_node="">Some of these are cute romance plot ideas, and some could even be dark romance plot ideas. Obviously the possibilities here are endless. I’ve used pronouns randomly, and any of these plot starters can work for any pairing.</span></p><span data-dcnode-id="9938" instrument_node="">
</span><p data-dcnode-id="9933"><span data-dcnode-id="9937" instrument_node="">(By the way, if you’re writing romance, you might also be interested in my post about </span><strong data-dcnode-id="9934"><a data-dcnode-id="9935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bryndonovan.com/2017/03/20/three-great-ways-to-show-that-your-character-is-in-love/" rel="noopener" target="_blank"><span data-dcnode-id="9936" instrument_node="">three great ways to show your character is in love.)</span></a></strong></p><span data-dcnode-id="9932" instrument_node="">
</span><p data-dcnode-id="9930"><span data-dcnode-id="9931" instrument_node="">Even if you don’t use something from here, it may make you think of something else. That’s how lists work, which is why I like to do them!</span></p><span data-dcnode-id="9929" instrument_node="">
</span><p data-dcnode-id="9927"><span data-dcnode-id="9928" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9926" instrument_node="">
</span><p data-dcnode-id="9924"><img alt="50 ROMANCE PLOT IDEAS from an executive editor...get the writing prompts at bryndonovan.com | laptop, notebook, pen, roses, coffee" class="aligncenter wp-image-19783" data-dcnode-id="9925" data-jpibfi-post-excerpt="" data-jpibfi-post-title="50 Romance Plot Ideas and Romance Writing Prompts" data-jpibfi-post-url="https://www.bryndonovan.com/2015/07/10/master-list-of-romantic-conflicts/" data-jpibfi-src="https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=325%2C487&amp;ssl=1" data-recalc-dims="1" data-src="https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=325%2C487&amp;ssl=1" data-srcset="https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=683%2C1024&amp;ssl=1 683w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=100%2C150&amp;ssl=1 100w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?w=595&amp;ssl=1 595w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?w=1000&amp;ssl=1 1000w" height="487" sizes="(max-width: 325px) 100vw, 325px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg%3Fresize%3D325%252C487%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=683%2C1024&amp;ssl=1 683w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?resize=100%2C150&amp;ssl=1 100w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?w=595&amp;ssl=1 595w, https://i0.wp.com/www.bryndonovan.com/wp-content/uploads/2015/07/50-romance-plot-ideas.jpg?w=1000&amp;ssl=1 1000w" width="325"></p><span data-dcnode-id="9923" instrument_node="">
</span><p data-dcnode-id="9921"><span data-dcnode-id="9922" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9920" instrument_node="">
</span><p data-dcnode-id="9918"><span data-dcnode-id="9919" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9917" instrument_node="">
</span><p data-dcnode-id="9913"><strong data-dcnode-id="9915"><span data-dcnode-id="9916" instrument_node="">1. They have character flaws…</span></strong><span data-dcnode-id="9914" instrument_node=""> Honestly, every&nbsp;real-life romance deals with this, and it should probably come up in any story about a relationship. Maybe he’s too selfish&nbsp;or&nbsp;lazy. Maybe she’s too rash, or too fearful. Maybe one of them is too negative, and needs to stop being so cynical. This could lead to one of them making a big, stupid mistake, and needing to make amends and get the other person’s forgiveness.</span></p><span data-dcnode-id="9912" instrument_node="">
</span><p data-dcnode-id="9905"><strong data-dcnode-id="9910"><span data-dcnode-id="9911" instrument_node="">2. She’s already ruled him out…</span></strong><span data-dcnode-id="9909" instrument_node=""> she made up her mind a long time ago that she would only marry a man with a title, or she would </span><em data-dcnode-id="9907"><span data-dcnode-id="9908" instrument_node="">never</span></em><span data-dcnode-id="9906" instrument_node=""> date a biker&nbsp;again.</span></p><span data-dcnode-id="9904" instrument_node="">
</span><p data-dcnode-id="9900"><strong data-dcnode-id="9902"><span data-dcnode-id="9903" instrument_node="">3. They are competitors… </span></strong><span data-dcnode-id="9901" instrument_node="">for the same job, the same&nbsp;championship, etc.</span></p><span data-dcnode-id="9899" instrument_node="">
</span><p data-dcnode-id="9895"><strong data-dcnode-id="9897"><span data-dcnode-id="9898" instrument_node="">4. They are straight-up enemies…</span></strong><span data-dcnode-id="9896" instrument_node="">&nbsp;He wants to buy the land to build a resort, and she wants it to get turned into a nature sanctuary. He’s the defense attorney, and she’s the prosecutor. They’re soldiers on opposing sides of the war… the possibilities are endless here!</span></p><span data-dcnode-id="9894" instrument_node="">
</span><p data-dcnode-id="9890"><strong data-dcnode-id="9892"><span data-dcnode-id="9893" instrument_node="">5. He already won…</span></strong><span data-dcnode-id="9891" instrument_node="">&nbsp;he inherited an estate that should have been hers, or he got the job that she was hoping to be promoted into, and she’s&nbsp;seething.</span></p><span data-dcnode-id="9889" instrument_node="">
</span><p data-dcnode-id="9882"><strong data-dcnode-id="9887"><span data-dcnode-id="9888" instrument_node="">6. He broke her heart in the past. </span></strong><span data-dcnode-id="9886" instrument_node="">Maybe there was a good reason behind it, or maybe he was an idiot then and realizes it now. It’s possible he just </span><em data-dcnode-id="9884"><span data-dcnode-id="9885" instrument_node="">ignored</span></em><span data-dcnode-id="9883" instrument_node=""> her.</span></p><span data-dcnode-id="9881" instrument_node="">
</span><p data-dcnode-id="9871" style="text-align: center;"><strong data-dcnode-id="9872"><span data-dcnode-id="9879" instrument_node="">
</span><span data-dcnode-id="9877" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7829689211115596" data-ad-slot="7986390266" data-dcnode-id="9876" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="9875" instrument_node="">
</span></strong></p><span data-dcnode-id="9870" instrument_node="">
</span><p data-dcnode-id="9866"><strong data-dcnode-id="9868"><span data-dcnode-id="9869" instrument_node="">7. She did her wrong in the past… </span></strong><span data-dcnode-id="9867" instrument_node="">or maybe she wronged her&nbsp;family member or friend. (Or did she? That family member or friend might have lied.)</span></p><span data-dcnode-id="9865" instrument_node="">
</span><p data-dcnode-id="9861"><strong data-dcnode-id="9863"><span data-dcnode-id="9864" instrument_node="">8. He did something wrong in the past, period.</span></strong><span data-dcnode-id="9862" instrument_node=""> Although she wasn’t the victim, it was pretty bad. How can she be sure he’s changed?</span></p><span data-dcnode-id="9860" instrument_node="">
</span><p data-dcnode-id="9856"><strong data-dcnode-id="9858"><span data-dcnode-id="9859" instrument_node="">9. She has trust issues… </span></strong><span data-dcnode-id="9857" instrument_node="">her last relationship ended in&nbsp;a terrible betrayal.</span></p><span data-dcnode-id="9855" instrument_node="">
</span><p data-dcnode-id="9851"><strong data-dcnode-id="9853"><span data-dcnode-id="9854" instrument_node="">10. He has intimacy issues…</span></strong><span data-dcnode-id="9852" instrument_node=""> maybe because of a traumatic past, he feels&nbsp;too vulnerable if anyone knows about his real emotions or weaknesses. Maybe she’s a psychic, a behavioral expert, or just the one person who can see right through him… and it makes him uncomfortable as hell.</span></p><span data-dcnode-id="9850" instrument_node="">
</span><p data-dcnode-id="9846"><strong data-dcnode-id="9848"><span data-dcnode-id="9849" instrument_node="">11. She doesn’t trust her dating choices…</span></strong><span data-dcnode-id="9847" instrument_node=""> she’s gotten involved with several losers in a row, and she’s taking a break–maybe a permanent one.</span></p><span data-dcnode-id="9845" instrument_node="">
</span><p data-dcnode-id="9841"><strong data-dcnode-id="9843"><span data-dcnode-id="9844" instrument_node="">12. She believes no one can truly love her…</span></strong><span data-dcnode-id="9842" instrument_node=""> because she made a terrible mistake&nbsp;in the past, or she’s not attractive in the conventional manner, or she’s a “fallen woman” in a repressive era, or whatever.</span></p><span data-dcnode-id="9840" instrument_node="">
</span><p data-dcnode-id="9836"><strong data-dcnode-id="9838"><span data-dcnode-id="9839" instrument_node="">13. They are good friends…</span></strong><span data-dcnode-id="9837" instrument_node=""> and they don’t want to risk ruining their friendship by taking it to the next level.</span></p><span data-dcnode-id="9835" instrument_node="">
</span><p data-dcnode-id="9831"><strong data-dcnode-id="9833"><span data-dcnode-id="9834" instrument_node="">14. They are co-workers…</span></strong><span data-dcnode-id="9832" instrument_node=""> and they don’t want to make things weird at the office, bar, or wherever they both work.</span></p><span data-dcnode-id="9830" instrument_node="">
</span><p data-dcnode-id="9828"><span data-dcnode-id="9829" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9827" instrument_node="">
</span><p data-dcnode-id="9817" style="text-align: center;"><strong data-dcnode-id="9818"><span data-dcnode-id="9825" instrument_node="">
</span><span data-dcnode-id="9823" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7829689211115596" data-ad-slot="7986390266" data-dcnode-id="9822" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="9821" instrument_node="">
</span></strong></p><span data-dcnode-id="9816" instrument_node="">
</span><p data-dcnode-id="9814"><span data-dcnode-id="9815" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9813" instrument_node="">
</span><p data-dcnode-id="9809"><strong data-dcnode-id="9811"><span data-dcnode-id="9812" instrument_node="">15. She’s freaked out by who he really is…</span></strong><span data-dcnode-id="9810" instrument_node=""> a werewolf,&nbsp;ex-con, or whatever.</span></p><span data-dcnode-id="9808" instrument_node="">
</span><p data-dcnode-id="9804"><strong data-dcnode-id="9806"><span data-dcnode-id="9807" instrument_node="">16. He has a secret…</span></strong><span data-dcnode-id="9805" instrument_node=""> he’s in a witness protection program, he’s a hacktivist, his father is literally the Devil, or something of that sort. (When she finds out, the conflict may turn into the one above. Or maybe she’ll surprise him and be like, “You’re a hacker? Dude, that is&nbsp;so hot.”)</span></p><span data-dcnode-id="9803" instrument_node="">
</span><p data-dcnode-id="9799"><strong data-dcnode-id="9801"><span data-dcnode-id="9802" instrument_node="">17. It was supposed to be sex only…</span></strong><span data-dcnode-id="9800" instrument_node=""> they were going to be friends with benefits, or maybe he’s a male escort.&nbsp;Falling in love goes against the original arrangement.</span></p><span data-dcnode-id="9798" instrument_node="">
</span><p data-dcnode-id="9794"><strong data-dcnode-id="9796"><span data-dcnode-id="9797" instrument_node="">18. Their love was supposed to be fake…</span></strong><span data-dcnode-id="9795" instrument_node="">&nbsp;they were pretending to be in love or married, or they entered a marriage of convenience. It can’t be real, can it? On a related note…</span></p><span data-dcnode-id="9793" instrument_node="">
</span><p data-dcnode-id="9789"><strong data-dcnode-id="9791"><span data-dcnode-id="9792" instrument_node="">19. He was faking it at first…</span></strong><span data-dcnode-id="9790" instrument_node=""> he made a bet that he could bed her, or pretended to like her so he could learn her secrets and be the journalist who broke the story.</span></p><span data-dcnode-id="9788" instrument_node="">
</span><p data-dcnode-id="9784"><strong data-dcnode-id="9786"><span data-dcnode-id="9787" instrument_node="">20. She was stuck with him…</span></strong><span data-dcnode-id="9785" instrument_node=""> he’s a&nbsp;partner on a job when she wanted to do it by herself, or he rescued her when she was actually pretty happy where she was.&nbsp;She doesn’t want to admit she’s&nbsp;actually falling for him.</span></p><span data-dcnode-id="9783" instrument_node="">
</span><p data-dcnode-id="9779"><strong data-dcnode-id="9781"><span data-dcnode-id="9782" instrument_node="">21. He has moral qualms…</span></strong><span data-dcnode-id="9780" instrument_node="">&nbsp;he’s her boss, her teacher, her captor, or something like that. Or maybe she’s the&nbsp;sister or ex-girlfriend or his best friend, and that gives him pause.</span></p><span data-dcnode-id="9778" instrument_node="">
</span><p data-dcnode-id="9774"><strong data-dcnode-id="9776"><span data-dcnode-id="9777" instrument_node="">22. She’s a mess..</span></strong><span data-dcnode-id="9775" instrument_node="">. She’s grieving the death&nbsp;of her husband, partner, or child, or she had PTSD from battle or some other terrible experience.</span></p><span data-dcnode-id="9773" instrument_node="">
</span><p data-dcnode-id="9769"><strong data-dcnode-id="9771"><span data-dcnode-id="9772" instrument_node="">23. Their love is forbidden by others…</span></strong><span data-dcnode-id="9770" instrument_node=""> it’s against the rules, spoken or unspoken, of their family, organization, community, or religion.</span></p><span data-dcnode-id="9768" instrument_node="">
</span><p data-dcnode-id="9764"><strong data-dcnode-id="9766"><span data-dcnode-id="9767" instrument_node="">24. He’s into something she doesn’t like… </span></strong><span data-dcnode-id="9765" instrument_node="">it could be an addiction, like alcohol,&nbsp;laudanum, or gambling, or a profession, like boxing or defending corrupt clients in court.&nbsp;Whatever it is, she wants no part of it.</span></p><span data-dcnode-id="9763" instrument_node="">
</span><p data-dcnode-id="9759"><strong data-dcnode-id="9761"><span data-dcnode-id="9762" instrument_node="">25. Their cultures clash… </span></strong><span data-dcnode-id="9760" instrument_node="">because he’s a modern man and she’s from ancient Greece, she’s a big-city girl and he’s a small-town boy, or whatever you like.&nbsp;This can overlap with the next one.</span></p><span data-dcnode-id="9758" instrument_node="">
</span><p data-dcnode-id="9754"><strong data-dcnode-id="9756"><span data-dcnode-id="9757" instrument_node="">26. They are from different classes…</span></strong><span data-dcnode-id="9755" instrument_node=""> he’s a&nbsp;duke and his boyfriend’s a commoner, for instance.</span></p><span data-dcnode-id="9753" instrument_node="">
</span><p data-dcnode-id="9749"><strong data-dcnode-id="9751"><span data-dcnode-id="9752" instrument_node="">27. One of them is promised to someone else…</span></strong><span data-dcnode-id="9750" instrument_node=""> maybe the wedding’s already planned and everything. S/he might have reasons for going through with a loveless marriage.</span></p><span data-dcnode-id="9748" instrument_node="">
</span><p data-dcnode-id="9746"><span data-dcnode-id="9747" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9745" instrument_node="">
</span><p data-dcnode-id="9735" style="text-align: center;"><strong data-dcnode-id="9736"><span data-dcnode-id="9743" instrument_node="">
</span><span data-dcnode-id="9741" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7829689211115596" data-ad-slot="7986390266" data-dcnode-id="9740" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="9739" instrument_node="">
</span></strong></p><span data-dcnode-id="9734" instrument_node="">
</span><p data-dcnode-id="9732"><span data-dcnode-id="9733" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9731" instrument_node="">
</span><p data-dcnode-id="9727"><strong data-dcnode-id="9729"><span data-dcnode-id="9730" instrument_node="">28. One of them is married to someone else…</span></strong><span data-dcnode-id="9728" instrument_node="">&nbsp;but it was some weird legal, not-consummated arrangement, or she ran away long ago because he was an abusive asshole…anyway, there’s a damn good reason why these marriage vows don’t hold much water.</span></p><span data-dcnode-id="9726" instrument_node="">
</span><p data-dcnode-id="9722"><strong data-dcnode-id="9724"><span data-dcnode-id="9725" instrument_node="">29. She is infatuated with someone else instead of him…</span></strong><span data-dcnode-id="9723" instrument_node="">&nbsp;she doesn’t realize yet that this other person is&nbsp;awful.</span></p><span data-dcnode-id="9721" instrument_node="">
</span><p data-dcnode-id="9717"><strong data-dcnode-id="9719"><span data-dcnode-id="9720" instrument_node="">30. She is interested in someone else in addition to him…</span></strong><span data-dcnode-id="9718" instrument_node=""> and she’s having trouble making a decision. Maybe she refuses to choose.</span></p><span data-dcnode-id="9716" instrument_node="">
</span><p data-dcnode-id="9712"><strong data-dcnode-id="9714"><span data-dcnode-id="9715" instrument_node="">31. Their time is together is limited…</span></strong><span data-dcnode-id="9713" instrument_node="">&nbsp;she’s going abroad to study in the fall, his work visa is almost up, or she’s about to go on a space mission to another planet, never to return… what’s the point of getting serious? The next one may be related to this.</span></p><span data-dcnode-id="9711" instrument_node="">
</span><p data-dcnode-id="9707"><strong data-dcnode-id="9709"><span data-dcnode-id="9710" instrument_node="">32. Being together would require a big sacrifice…</span></strong><span data-dcnode-id="9708" instrument_node="">&nbsp;she has to say no to her&nbsp;dream job, he has to move away from his family, etc.</span></p><span data-dcnode-id="9706" instrument_node="">
</span><p data-dcnode-id="9702"><strong data-dcnode-id="9704"><span data-dcnode-id="9705" instrument_node="">33. He’s a danger to her safety…</span></strong><span data-dcnode-id="9703" instrument_node=""> because he’s a spy, a vampire,&nbsp;or something like that.</span></p><span data-dcnode-id="9701" instrument_node="">
</span><p data-dcnode-id="9697"><strong data-dcnode-id="9699"><span data-dcnode-id="9700" instrument_node="">34. She’ll only make him unhappy…</span></strong><span data-dcnode-id="9698" instrument_node=""> because she’s dying of a disease, suffering under a curse, can’t have children, or whatever. (Note that in many cases, this conflict&nbsp;may be exaggerated in the character’s mind.)</span></p><span data-dcnode-id="9696" instrument_node="">
</span><p data-dcnode-id="9689"><strong data-dcnode-id="9694"><span data-dcnode-id="9695" instrument_node="">35. He’s ugly, freaky, or scary-looking..</span></strong><span data-dcnode-id="9693" instrument_node="">. but once she gets to know him, she sees him differently (basically, </span><em data-dcnode-id="9691"><span data-dcnode-id="9692" instrument_node="">Beauty and the Beast.</span></em><span data-dcnode-id="9690" instrument_node="">)</span></p><span data-dcnode-id="9688" instrument_node="">
</span><p data-dcnode-id="9684"><strong data-dcnode-id="9686"><span data-dcnode-id="9687" instrument_node="">36. She’s disguised as someone he would never fall for… </span></strong><span data-dcnode-id="9685" instrument_node="">a man when he’s only into women, a Republican when he’s a die-hard liberal, etc.</span></p><span data-dcnode-id="9683" instrument_node="">
</span><p data-dcnode-id="9679"><strong data-dcnode-id="9681"><span data-dcnode-id="9682" instrument_node="">37. She may or may not be real at all…</span></strong><span data-dcnode-id="9680" instrument_node=""> is it really possible he’s meeting a fairy or an alien in his visions or dreams?</span></p><span data-dcnode-id="9678" instrument_node="">
</span><p data-dcnode-id="9674"><strong data-dcnode-id="9676"><span data-dcnode-id="9677" instrument_node="">38. They can’t get together in real life…</span></strong><span data-dcnode-id="9675" instrument_node=""> there is an ocean or a few centuries between them.</span></p><span data-dcnode-id="9673" instrument_node="">
</span><p data-dcnode-id="9669"><strong data-dcnode-id="9671"><span data-dcnode-id="9672" instrument_node="">39. He’s a suspect…</span></strong><span data-dcnode-id="9670" instrument_node=""> in a murder or robbery case.</span></p><span data-dcnode-id="9668" instrument_node="">
</span><p data-dcnode-id="9664"><strong data-dcnode-id="9666"><span data-dcnode-id="9667" instrument_node="">40. Her family is the worst…</span></strong><span data-dcnode-id="9665" instrument_node=""> can he really get involved with that? Alternately, maybe she has a couple of kids, and while they are cute, this is not what he imagined for himself.</span></p><span data-dcnode-id="9663" instrument_node="">
</span><p data-dcnode-id="9659"><strong data-dcnode-id="9661"><span data-dcnode-id="9662" instrument_node="">41. He thinks her town is the worst…</span></strong><span data-dcnode-id="9660" instrument_node=""> and she really can’t leave. Can he really resign himself to living in New York City, when his cowboy heart longs for Montana skies?</span></p><span data-dcnode-id="9658" instrument_node="">
</span><p data-dcnode-id="9654"><strong data-dcnode-id="9656"><span data-dcnode-id="9657" instrument_node="">42. He’s got a reputation…</span></strong><span data-dcnode-id="9655" instrument_node="">&nbsp;as materialistic douche, a heartless&nbsp;womanizer, a stone cold killer,&nbsp;or some other despicable thing.</span></p><span data-dcnode-id="9653" instrument_node="">
</span><p data-dcnode-id="9649"><strong data-dcnode-id="9651"><span data-dcnode-id="9652" instrument_node="">43. They have terrible first impressions of one another… </span></strong><span data-dcnode-id="9650" instrument_node="">and it’s a little hard to admit they were wrong. They might have gotten off to an awful start by arguing over something.</span></p><span data-dcnode-id="9648" instrument_node="">
</span><p data-dcnode-id="9644"><strong data-dcnode-id="9646"><span data-dcnode-id="9647" instrument_node="">44. She loves her freedom…</span></strong><span data-dcnode-id="9645" instrument_node="">&nbsp;and&nbsp;always saw herself as the carefree type&nbsp;who would never settle down.</span></p><span data-dcnode-id="9643" instrument_node="">
</span><p data-dcnode-id="9639"><strong data-dcnode-id="9641"><span data-dcnode-id="9642" instrument_node="">45. He doesn’t want distractions…</span></strong><span data-dcnode-id="9640" instrument_node=""> he has one very important job to do, and he can’t afford to get sidetracked.</span></p><span data-dcnode-id="9638" instrument_node="">
</span><p data-dcnode-id="9636"><span data-dcnode-id="9637" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9635" instrument_node="">
</span><p data-dcnode-id="9625" style="text-align: center;"><strong data-dcnode-id="9626"><span data-dcnode-id="9633" instrument_node="">
</span><span data-dcnode-id="9631" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7829689211115596" data-ad-slot="7986390266" data-dcnode-id="9630" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="9629" instrument_node="">
</span></strong></p><span data-dcnode-id="9624" instrument_node="">
</span><p data-dcnode-id="9622"><span data-dcnode-id="9623" instrument_node="">&nbsp;</span></p><span data-dcnode-id="9621" instrument_node="">
</span><p data-dcnode-id="9617"><strong data-dcnode-id="9619"><span data-dcnode-id="9620" instrument_node="">46. He loves her, but she doesn’t know him…</span></strong><span data-dcnode-id="9618" instrument_node=""> maybe he knows her from an alternate universe, or maybe she has amnesia.</span></p><span data-dcnode-id="9616" instrument_node="">
</span><p data-dcnode-id="9612"><strong data-dcnode-id="9614"><span data-dcnode-id="9615" instrument_node="">47. She’s not supposed to ever fall in love and/or have sex…</span></strong><span data-dcnode-id="9613" instrument_node=""> maybe she’s a nun or vestal virgin, or a cyborg for whom sex is illegal, or a unicorn herder, or something.</span></p><span data-dcnode-id="9611" instrument_node="">
</span><p data-dcnode-id="9607"><strong data-dcnode-id="9609"><span data-dcnode-id="9610" instrument_node="">48. He’s trying to control her…</span></strong><span data-dcnode-id="9608" instrument_node=""> because he doesn’t want her to be ostracized by Victorian society, or to be in danger by becoming a firefighter. But nobody bosses her around, so that’s not going to fly.</span></p><span data-dcnode-id="9606" instrument_node="">
</span><p data-dcnode-id="9602"><strong data-dcnode-id="9604"><span data-dcnode-id="9605" instrument_node="">49. He doesn’t see her in a romantic way…</span></strong><span data-dcnode-id="9603" instrument_node=""> for instance, she’s the kid sister of his best friend, and he still thinks of her as a kid.</span></p><span data-dcnode-id="9601" instrument_node="">
</span><p data-dcnode-id="9597"><strong data-dcnode-id="9599"><span data-dcnode-id="9600" instrument_node="">50, The&nbsp; job is getting in the way…</span></strong><span data-dcnode-id="9598" instrument_node=""> Look, it’s hard to be romantic when you’re working 24/7 on a political campaign, or helping fellow victims of the airplane crash survive in the mountains.</span></p><span data-dcnode-id="9596" instrument_node="">
</span><span class="" data-dcnode-id="9595" style="display:block;clear:both;height: 0px;padding-top: 20px;border-top-width:0px;border-bottom-width:0px;"></span><span data-dcnode-id="9594" instrument_node="">

</span><p data-dcnode-id="9587"><span data-dcnode-id="9588" instrument_node="">If you liked the list, I hope you’ll share it on Facebook, Twitter, Pinterest, or wherever you can with writer friends. I truly appreciate it!</span></p><span data-dcnode-id="9586" instrument_node="">

</span><p data-dcnode-id="7941"><span data-dcnode-id="7945" instrument_node="">Thank You, Bryn!!  I’m a ghostwriter of Christian Romances (I’ve done Contemporary, Amish, and Mail Order Bride stories), and I often have trouble coming up with conflicts.  I came upon this post from a Google search and L-O-V-E all these ideas.  In fact, I was having a rough time working on a Contemporary plot for a client, and found 3 from this list that I used: “He feels too vulnerable if people know his feelings … she’s the one who can see right through him,” and a mashup of “She’s interested in someone else in addition to him” and “He’s into something she doesn’t like.”  I had to tweak them just a little, but they worked beautifully and made the plot seem much more real.  Needless to say, I finished the plot in near record time (for me, anyway), and I’m very pleased with it.  I just hope the client likes it as much as I do, but I’m sure he will.  One thing I know for sure is that I’ll be back for more inspiration – and may even purchase my own copy of your Master Lists for Writers book!  </span><img alt="🙂" class="emoji" data-dcnode-id="7944" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><br data-dcnode-id="7943"><span data-dcnode-id="7942" instrument_node="">

</span><p data-dcnode-id="4305"><span data-dcnode-id="4308" instrument_node="">Hi Adaa! Congratulations on starting your story! I can’t do the plotting for you, but I can ask you a few questions that might lead you to a plot twist. </span><img alt="🙂" class="emoji" data-dcnode-id="4307" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="4306" instrument_node=""> </span></p><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Why did they get married if they dislike one another? I am guessing it’s an arranged marriage, but I could be wrong. Maybe there’s something one of them didn’t know about the other before they got married (maybe their families didn’t know about this secret, either.)</span></p><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">What made the boy fall for her, even though they disliked each other at first? Is there a reason she doesn’t fall for him? What if something changes regarding that reason? </span></p><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">Really, though, you’re going to need to do it yourself, and I recommend jotting down lots of ideas (even silly ones!) quickly. Eventually, you’ll hit on something you like.</span></p><span data-dcnode-id="4295" instrument_node="">
</span><p data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">Thanks for the kind words! Happy writing!</span></p><span data-dcnode-id="4292" instrument_node="">

</span><p data-dcnode-id="4079"><span data-dcnode-id="4083" instrument_node="">Hi again Adaa! Please don’t apologize for your English. You’re doing fine. I don’t speak any language </span><em data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">but</span></em><span data-dcnode-id="4080" instrument_node=""> English, so you’re way better than me!</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4077" instrument_node="">I understand how they’re going along with their parents’ wishes. You have a lot of ideas, but you’re not sure where to land. Here’s my advice: get to know those characters better. What were their childhoods like? What are their likes, dislikes, and hopes? What are their strengths and flaws? I think that if you have a clear idea of their characters, you’ll start to see how conflicts arise and get resolved. And really, nobody can do it but you. </span><img alt="🙂" class="emoji" data-dcnode-id="4076" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="4075" instrument_node=""> </span></p><span data-dcnode-id="4073" instrument_node="">

</span><p data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Hi Sucheta! Plotting is so challenging. If a story doesn’t feel exciting enough, it’s usually because it needs more conflict. Think about what your characters’ goals are, why they want them, and what obstacles are getting in the way of those goals! I also think that while your male lead character can help your female lead character to change, it’s going to be a better story if she also learns how to change herself.</span></p><span data-dcnode-id="3462" instrument_node="">
</span><p data-dcnode-id="3458"><span data-dcnode-id="3461" instrument_node="">If you love your characters, that’s half the battle right there. </span><img alt="🙂" class="emoji" data-dcnode-id="3460" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="3459" instrument_node=""> Good luck!</span></p><span data-dcnode-id="3457" instrument_node="">

</span><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Hi, Ingrid! I’m so sorry — I don’t do critiques. BUT, if you’re feeling that your story is falling flat (assuming that your sister is correct, and I have no way of knowing), the best way to fix that is through conflict. This is something I have struggled with myself! But conflict between characters because they both want something different, or conflict because a character can’t get what he or she wants, will energize things.</span></p><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2849" instrument_node="">Hey, if you want to share some of your fanfic on WIP Wednesday, that would be great! On the first Wednesday of every month, I usually share a page or so of what I’m working on, and other people do, too. While I don’t do critiques, I do say what I like about the writing </span><img alt="🙂" class="emoji" data-dcnode-id="2848" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="2847" instrument_node=""> If you want to do it, follow the blog (there’s a place below to sign up) so you don’t miss the next WIP Wednesday post.</span></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Good luck with your writing!</span></p><span data-dcnode-id="2842" instrument_node="">

</span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Hi Bryn,</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">I’m seventeen years old and am thinking about starting a personal narrative novel about moving to a new country. I lived overseas and wrote a lot, and wanted to put it all down together up until the present and through to a point in the future that I think ties the story up. I suppose it’ll be a grammatically correct and more objective journal. Obviously romance is a factor for every teenage girl I suppose in one way or another with crushes or actually relationships. Are there any questions I could be asking myself that will help me write these specific details more objectively and with less rush? I tend to push time along in order to gather more “meaningful” moments into focus, but I wanted to spread these memories out in a more logical and time-oriented manner because a large part of the romance in my life has been the uncertainty and waiting for those moments and I want to capture that in this novel. </span></p><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2578" instrument_node="">Thank you for your help, if you have time.</span><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">
-Kat</span></p><span data-dcnode-id="2574" instrument_node="">

</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Miss Donovan, I have an idea of a ‘sweet, innocent teenage romance’ type of story and I was wondering if you think it has some potential:</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2391" instrument_node="">The story is from the perspective of the girl. She and her twin sister would live happily with her mother. The two were so similar that some could only identify them by what instrument they played. Alexandra would play the piano while Alise would play the violin.</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">
They had little to no problems. The main male character is introduced in their childhood with him wandering into the church hall while the two played their respected instrument. He then decided that he wanted to play the violin, in hope that he would be able to accompany Alexandra due to his love of her way of playing. The only problem is that they don’t properly speak to each other until they’re in their teenage years. </span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">In the time between Alexandra and the unnamed (as of now) male lead, Alise was murdered. This broke the mother and slowly sent her to insanity. She tricked herself into believing that Alexandra was the one who died and that Alise was still with her. At the point where the text begins, Alexandra’s mother had began abusing her out of unresolved grief and refused to accept that she wasn’t Alise. </span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Alexandra meets the male lead in a music lesson and their relationship grows from that point forward with him helping her deal with her struggles and being one of her few sources of support in her life.</span></p><span data-dcnode-id="2381" instrument_node="">

</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Hi again Bryn! I’ve been brainstorming plots and I have come up with this. Please do read it, and if you have anything to say, add or suggest, please do so.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Colt, a 16-year old boy goes to his high school and finds a new transferee in the school. It was a girl named Kate. She was beautiful, smart, and talented. Colt was instantly struck. After a few weeks of seeing Kate he decided to consult a friend named Ashley, they were best friends ever since kindergarten. Since they knew each other so well, Colt wanted to ask advice from her to get closer to Kate.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">They ended up making a decision wherein Ashley would act to be his ‘girlfriend’. They agreed that they would be like those lovey-dovey couples whenever Kate was around to make her jealous. A few more months later, Ashley never gave up on trying to make Kate jealous, her head was set straight. Colt however, didn’t even realize that the more Ashley would act to be his ‘girlfriend’, the more he wanted it to be real.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">And so this ended up being that Colt was now the one pretending that he still had feelings for Kate, when in reality, those were just excuses to become closer with Ashley. What Colt didn’t know was that Kate had already fallen in love with him, desperate even. Now the question is, will it be Colt and Ashley or will Kate give in to her feelings through confrontation?</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Bryn, forgive me for writing such a long comment, but after seeing your article, I know that you could be very helpful to me. Hope you reply!</span></p><span data-dcnode-id="1637" instrument_node="">

</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Dear Bryn Donovan,</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1453" instrument_node="">I’m writing a story called “Battlefield.” It’s about a girl and a boy. The girl’s name is Mary, and the guy’s is John. They started friendship ever since they played a game together in class because they finished their work early. Well, to be more precise, they both like each other, but they don’t know that.</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">
Later, WW2 began and they got lost so they didn’t see each other for 4 years. Mary’s friend Jessie, was taken to Concentration Camp (Bergen-Belsen).</span><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">
I figured out about finding John again, but I don’t know about Jessie yet. But she needs to survive because when the war is done, John is suspected that he did a crime and got hung, and Mary died by a trauma, but then Jessie tells her grandchildren the story about them.</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">
Then word spread and they were called heroes.</span><br data-dcnode-id="1446"><span data-dcnode-id="1445" instrument_node="">
While that happens John and Mary both goes to Heaven, and they meet there. It’s a happy ending (sort of).</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1442" instrument_node="">And woah, I ask you to only give me a good suggestion about finding Jessie and get her back, but I told you the whole story. You don’t have to reply back, I mean, being an author can be hard and I don’t want to distract you. And I can get answers from somewhere else, but I’m thinking maybe I should ask to an author.</span><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">
If you have any other suggestions that are different from the “saving Jessie” part, please write them down.</span><br data-dcnode-id="1439"><span data-dcnode-id="1438" instrument_node="">
And sorry if my English is bad. I might make no sense at all. </span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1435" instrument_node="">Love,</span><br data-dcnode-id="1434"><span data-dcnode-id="1433" instrument_node="">
Esther</span></p><span data-dcnode-id="1431" instrument_node="">
</span><div class="ast-comment-edit-reply-wrap" data-dcnode-id="1425"><span data-dcnode-id="1430" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="1062"><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Hi Bryn, I’m a German writer and just ended up here in your very helpful Blog while doing endless research: names, setting, plotting, history… I never would have expected having an “aha-moment” in an English Blog. My unfinished story actually has been my hidden treasure for more than 20 years. Sounds too long to keep it in my heart ? Yes, that’s how I felt during this year. It has to come out, strongly, can’t hold it anymore. Suddenly, entire chapters flood out of my mind and I needed to start an additional pocketbook to write down quick ideas.  That feels good and I become totally attached to my own writings. But maybe that’s normal? Funnily enough, my very first idea was a fantasy story for teenager, now it has changed into a fantasy romance and I am totally thrilled. My characters grew up with me. And your romance plots gave me new ideas and new confidence to go on and reach out for the end, even though I don’t know where my story will end. Still my strongest enemy is the plot. I’m a pantster I guess. I must say, the Corona pandemic has led me into a “rush hour of writing”, because there’s more time to spend at home now. That’s the one good thing. Thank you for all those helpful posts and stay healthy!</span></p><span data-dcnode-id="1070" instrument_node="">
