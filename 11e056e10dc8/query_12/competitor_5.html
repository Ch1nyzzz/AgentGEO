</span><article class="et_pb_post post-229038 post type-post status-publish format-standard has-post-thumbnail hentry category-literary-devices" data-dcnode-id="694" id="post-229038"><span data-dcnode-id="2364" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="2349"><span data-dcnode-id="2363" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Foreshadowing: 10 Clever Methods to Write An Engaging Plot Twist</span></h1><span data-dcnode-id="2360" instrument_node="">
</span><p class="post-meta" data-dcnode-id="2351"><span data-dcnode-id="2359" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2356"><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/author/joslynchase1outlook-com/" rel="author" title="Posts by Joslyn Chase"><span data-dcnode-id="2358" instrument_node="">Joslyn Chase</span></a></span><span data-dcnode-id="2355" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="2352"><a data-dcnode-id="2353" data-disqus-identifier="229038 https://thewritepractice.com/?p=229038" href="#disqus_thread"><span data-dcnode-id="2354" instrument_node="">8 Comments</span></a></span></p><span data-dcnode-id="2350" instrument_node="">
</span></div><span data-dcnode-id="2348" instrument_node="">
</span><div class="entry-content" data-dcnode-id="855"><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Do you love a good murder mystery or thriller? Do you dream of creating a captivating and suspenseful book that will pull readers to the end and leave them tingling? Then you need to master foreshadowing.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2334"><span class="novashare-pinterest-image" data-dcnode-id="2335"><img alt="foreshadowing" class="aligncenter wp-image-316856 size-full entered lazyloaded" data-dcnode-id="2343" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" data-lazy-src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png" data-lazy-srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1-480x369.png 480w" data-ll-status="loaded" height="500" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qy7s3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png&amp;raw" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1-480x369.png 480w" width="650"><noscript data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">&lt;img class="aligncenter wp-image-316856 size-full" src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png" alt="foreshadowing" width="650" height="500" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2020/07/foreshadowing-1-480x369.png 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" /&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="2336" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fthewritepractice.com%2Fforeshadowing%2F%3Futm_source%3Dpinterest%26utm_medium%3Dsocial%26utm_campaign%3Dnovashare&amp;media=https://thewritepractice.com/wp-content/uploads/2020/07/foreshadowing-1.png&amp;description=Foreshadowing%3A%2010%20Clever%20Methods%20to%20Write%20An%20Engaging%20Plot%20Twist" rel="nofollow noopener noreferrer"><svg data-dcnode-id="2339" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="2340" fill="currentColor"></path></svg><span data-dcnode-id="2337" style="margin-left: 4px;"><span data-dcnode-id="2338" instrument_node="">Pin</span></span></span></span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">If you answered yes, you probably realize that such a thing is no easy task. More than most any other genre, mystery novels, thrillers, and suspense stories invite the reader to actively participate in plot developments, using certain cues to predict outcomes.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">That can be tough to accomplish.</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">The path to a finished product is full of pitfalls, but you can learn techniques to help carry you safely over them and complete a thrilling story you can be proud of.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><h2 data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Foreshadowing vs. Coincidence</span></h2><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">When navigating the twisted path involved in writing a mystery, thriller, or suspense, one of the biggest challenges you’ll face is making everything that happens feel natural and inevitable.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">A few days ago, my husband and I drove with a large group of friends to Frankfurt, Germany. After spending time together, we broke into carloads, each leaving at different times and taking different routes. As we passed an autobahn entrance close to home, a car merged directly behind us—a car filled with friends we’d parted from hours earlier.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">I love when this kind of thing happens in real&nbsp;life, a coincidence.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">But when it happens in a book, it feels contrived and unrealistic—like Toto pulled back the curtain to reveal the man pushing buttons. I don’t want my readers to feel manipulated, and I’ll bet you feel the same way about yours.</span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">To avoid this kind of story pitfall, I needed to master the literary device of foreshadowing. Knowing what foreshadowing is, and how to use it to draw readers into a story, is crucial for making a story feel </span><em data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">believable</span></em><span data-dcnode-id="2305" instrument_node=""> and entertaining.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><h2 data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Definition of Foreshadowing</span></h2><span data-dcnode-id="2300" instrument_node="">
</span><div class="special" data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Foreshadowing is the weaving of hints into a work of fiction for the purpose of making future story events feel natural and consistent.</span></div><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">It’s the antidote to coincidence and, skillfully done, prepares the reader for an upcoming plot twist without giving it away.</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Readers are savvy people. They understand that everything in a story is there on a need-to-know basis and will thus figure in at some point.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Every significant object, person, or fact needs to be planted in the story before it can be credibly used. And all of these plot points must come into play or they buzz at the corner of a reader’s subconscious like an annoying housefly.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Remember Chekhov’s sage counsel when you think about pristine foreshadowing:</span></p><span data-dcnode-id="2285" instrument_node="">
</span><div class="share-quote" data-dcnode-id="2279"><div class="share-quote-quote" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">“If a gun is hanging on the wall in the first act, it must fire in the last.” —Anton Chekhov</span></div></div><div class="share-quote-shares" data-dcnode-id="2273"><div class="share-quote-shares-block" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="2274"><a class="share-quote-twitter" data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/foreshadowing/%26text%3D%25E2%2580%259CIf%2520a%2520gun%2520is%2520hanging%2520on%2520the%2520wall%2520in%2520the%2520first%2520act%2C%2520it%2520must%2520fire%2520in%2520the%2520last.%25E2%2580%259D%2520%25E2%2580%2594Anton%2520Chekhov%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="2276" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="2272" instrument_node="">
</span><h2 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Activate your reader</span></h2><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">The more a reader puts into a story, the more they’ll get out of it. You pull your reader into your book and make them an active participant by raising a major dramatic question and delaying the answer until the end, while threading in intermediate questions along the way.</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2265" instrument_node="">In addition, you activate your reader by using all the techniques needed to accomplish strong </span><a data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/elements-of-suspense/"><span data-dcnode-id="2264" instrument_node="">elements of suspense</span></a><span data-dcnode-id="2262" instrument_node="">:</span></p><span data-dcnode-id="2260" instrument_node="">
</span><ul data-dcnode-id="2230"><span data-dcnode-id="2259" instrument_node="">
</span><li data-dcnode-id="2256"><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="2258" instrument_node="">You pull the reader deep into the point of view character</span></a></li><span data-dcnode-id="2255" instrument_node="">
</span><li data-dcnode-id="2252"><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sympathetic-character/"><span data-dcnode-id="2254" instrument_node="">You make the reader care about your protagonist</span></a></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2248"><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/raise-the-stakes/"><span data-dcnode-id="2250" instrument_node="">You progressively raise the stakes</span></a></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2244"><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sequence-of-events-in-a-story/"><span data-dcnode-id="2246" instrument_node="">You deliver information in the proper order</span></a></li><span data-dcnode-id="2243" instrument_node="">
</span><li data-dcnode-id="2240"><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/cliffhanger-meaning/"><span data-dcnode-id="2242" instrument_node="">You create cliffhangers to bridge the gaps between chapters</span></a></li><span data-dcnode-id="2239" instrument_node="">
</span><li data-dcnode-id="2236"><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/story-pacing/"><span data-dcnode-id="2238" instrument_node="">You pace your story correctly</span></a></li><span data-dcnode-id="2235" instrument_node="">
</span><li data-dcnode-id="2232"><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/how-to-write-action-scenes/"><span data-dcnode-id="2234" instrument_node="">You use action to drive the story forward</span></a></li><span data-dcnode-id="2231" instrument_node="">
</span></ul><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">These are the techniques that build suspense and hold a reader’s attention. Foreshadowing, clues, and red herrings are the breadcrumbs they’ll pick up along the way to feed and stimulate mental activity.</span></p><span data-dcnode-id="2226" instrument_node="">
</span><h2 data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Why Does Foreshadowing Matter?</span></h2><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">The key to avoiding readers who feel manipulated, is to build foreshadowing into your storyline.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2219" instrument_node="">For example, consider the movie </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Die Hard.</span></em></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Screenplay writers chose to show John McClane moving in a logical pathway to the Nakatomi Plaza to meet his wife for a Christmas party. They interspersed these scenes with cuts of a truck driving through LA traffic accompanied by menacing music. When these two paths cross, it doesn’t strike us as coincidence that McClane just happens to be in the same building the villainous gang hits because it was foreshadowed that they would meet.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Also, did you notice how McClane’s being barefoot has significant impact on story events? See how this increases the complications and heightens the risk? He didn’t just coincidentally happen to take his shoes off. It was foreshadowed from the very first scene of the movie, making it feel like a logical occurrence.</span></p><span data-dcnode-id="2209" instrument_node="">

l" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1705" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1700"><use class="ytp-svg-shadow" data-dcnode-id="1702" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1703" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1701" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=QIOX44m8ktc" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><noscript data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">&lt;iframe title=""Die Hard (1988)" Theatrical Trailer #1" width="1080" height="608" src="https://www.youtube.com/embed/QIOX44m8ktc?feature=oembed"  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Take a closer look at some of the types of foreshadowing you can use to build suspense and hold readers in your story.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><h2 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">10 Key Foreshadowing Techniques to Use When Writing</span></h2><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">There are dozens of writing techniques you might use to foreshadow events in your story.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node="">I’ve found that these ten clever foreshadowing methods work well when writing, and Suzanne Collins’s book </span><em data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1665" instrument_node=""> is a great case study to prove them.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1657"><div class="share-quote-quote" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node=""> Foreshadowing allows writers to include engaging plot twists that don’t feel convenient. These 10 clever methods will help you do just that. </span></div></div><div class="share-quote-shares" data-dcnode-id="1651"><div class="share-quote-shares-block" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1652"><a class="share-quote-twitter" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/foreshadowing/%26text%3D%2520Foreshadowing%2520allows%2520writers%2520to%2520include%2520engaging%2520plot%2520twists%2520that%2520don%25E2%2580%2599t%2520feel%2520convenient.%2520These%252010%2520clever%2520methods%2520will%2520help%2520you%2520do%2520just%2520that.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1654" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1650" instrument_node="">
</span><h2 data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Foreshadowing in The Hunger Games: Case Study</span></h2><span data-dcnode-id="1647" instrument_node="">
</span><div class="special" data-dcnode-id="1640"><strong data-dcnode-id="1641"><u data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">Caution: spoilers abound! If you don’t want to read about spoilers in </span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">The&nbsp;Hunger Games</span></em><span data-dcnode-id="1643" instrument_node="">, go read the book and then come back to this guide.</span></u></strong></div><span data-dcnode-id="1639" instrument_node="">
</span><h3 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">1. Emphasize Important Elements</span></h3><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Spend a bit more time on describing something that will later figure into the story’s plot. Readers will subconsciously understand that it will become important and they’ll anticipate seeing it pop up again.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">For example, if your climactic scene will take place at a mill pond with a water wheel, when you introduce this setting earlier in the story, describe it—through your character’s viewpoint—with more detail than you would normally give in your descriptions. This sends a signal to your reader that the setting will play an important role in the story.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">This also helps facilitate a faster pace at the climax because you’ve laid the groundwork ahead of time.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node="">In </span><em data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">The Hunger Games,</span></em><span data-dcnode-id="1623" instrument_node=""> the first time Katniss encounters the mockingjay pin is when she and Gale deliver strawberries to the mayor’s house on the day of the reaping. They speak with Madge, the mayor’s daughter, who wears the pin on her dress.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Collins doesn’t overdo the detail. Everything here is stark and sparse, imparting a bleak flavor to the day of the reaping. But she spends enough time on the pin to let us know it’s significant.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Referring to Gale, she writes:</span></p><span data-dcnode-id="1615" instrument_node="">
</span><blockquote data-dcnode-id="1612"><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">“His eyes land on a small, circular pin that adorns her dress. Real gold. Beautifully crafted. It could keep a family in bread for months.”</span></p></blockquote><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">The pin comes in again and again throughout the story. This use of foreshadowing lays down groundwork not only for </span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">The Hunger Games,</span></em><span data-dcnode-id="1607" instrument_node=""> but sets up theme and future events for the entire trilogy.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><h3 data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">2. Name It</span></h3><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Naming an important detail up front makes the reader wonder about it. Which means they pay attention to it and probably will recognize it when it comes up again.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">The key to this technique is balancing the mystery of the named object or event with more matter-of-fact detail, allowing it to stand out and spark curiosity without burying the reader under an exasperating mountain of enigma.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">For example, here’s the opening paragraph of Shirley Jackson’s story, “The Lottery:”</span></p><span data-dcnode-id="1593" instrument_node="">
</span><blockquote data-dcnode-id="1590"><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">The morning of June 27th was clear and sunny, with the fresh warmth of a full ­summer day; the flowers were blossoming profusely and the grass was richly green. The people of the village began to gather in the square, between the post office and the bank, around ten o’clock; in some towns there were so many people that the lottery took two days and had to be started on June 26th. But in this village, where there were only about three hundred people, the whole lottery took less than two hours, so it could begin at ten o’clock in the morning and still be through in time to allow the villagers to get home for noon dinner.</span></p></blockquote><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Do you see how simply naming the lottery gives it significance and raises questions? Jackson makes a mystery of the lottery but sets it amid prosaic detail so that it stands out all the more.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1585" instrument_node="">I feel like “The Lottery” was a clear inspiration for Suzanne Collins when she wrote </span><em data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">The Hunger Games.&nbsp;</span></em><span data-dcnode-id="1582" instrument_node="">Like Jackson, Collins mentions the Reaping in the first paragraph of the story, and our senses warn us she’s not talking about a simple farm harvest. When she names the Cornucopia, we intuit that it will play a significant role in upcoming&nbsp;events.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1579" instrument_node="">And of course, the very title </span><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1576" instrument_node=""> names and foreshadows an ominous experience ahead.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">The Reaping isn’t just any event—it’s the whole arena driving the main plot line.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><h3 data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">3. Details in Dialogue</span></h3><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Weave foreshadowing into dialogue between characters or put it in a viewpoint character’s inner monologue as they puzzle through a problem or worry about a future event. Use this method to influence the reader’s thoughts and foreshadow important story points.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">This can be as simple as a statement like: “George is coming home tomorrow.” Or, “I’ll call you when that package arrives.”</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">You might also couch it in a threat: “You’re going to wish you never said that.” Or, “Someone ought to shoot you for what you’ve done.”</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1555"><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1556" instrument_node=""> contains many examples of foreshadowing delivered in dialogue. One of these occurs when Gale, speaking about the twelve districts, says,</span></p><span data-dcnode-id="1554" instrument_node="">
</span><blockquote data-dcnode-id="1551"><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">“It’s to the Capitol’s advantage to have us divided among ourselves.”</span></p></blockquote><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Like the mockingjay pin, Katniss’ experience of plants and berries repeatedly comes into play. One of the most potent instances occurs near the end of the novel when Peeta has gathered a handful of berries, waking a memory in Katniss:</span></p><span data-dcnode-id="1547" instrument_node="">
</span><blockquote data-dcnode-id="1544"><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">My father’s voice comes back to me. “Not these, Katniss. Never these. They’re nightlock. You’ll be dead before they reach your stomach.”</span></p></blockquote><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">This bit of memory immediately saves her and Peeta and foreshadows their future salvation as well.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><h3 data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">4. Mirror Moments</span></h3><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">This is an effective foreshadowing tool you often see when a story is framed by “bookends,” meaning that events at the very beginning foreshadow the climactic scene, maybe resulting in failure up front and the reversed, mirror image of success in the end.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">But you can use it on a smaller scale as well—in a flashback, a flash-forward, or by holding up a mirror to reflect and foreshadow something happening in the story. Sometimes it starts with a smaller image whose reflection grows.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">In </span><em data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">The Hunger Games,</span></em><span data-dcnode-id="1527" instrument_node=""> Katniss recalls a significant memory when she was starving, discouraged, and about to give up:</span></p><span data-dcnode-id="1525" instrument_node="">
</span><blockquote data-dcnode-id="1519"><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Young Peeta, the baker’s son, burns a couple loaves of bread and throws them to Katniss, earning himself a beating but providing a turning point in her life.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">He sacrificed for her then, foreshadowing that he will sacrifice for her again. As many times as it takes.</span></p></blockquote><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Worth mentioning, also, is the obligatory recounting on Reaping day of the rebellion that spawned the beginning of the Hunger Games. This foreshadows the uprising that will eventually bring an end to the barbaric practice.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><h3 data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">5. Narrator Reveal</span></h3><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">This can range anywhere from having the point of view character state outright that something in particular is going to happen, to the POV character making a partial revelation that raises more questions than it answers. In either case, readers hang on to see how events unfold.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">For example, one of the witches in Shakespeare’s </span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">MacBeth</span></em><span data-dcnode-id="1505" instrument_node=""> tells us early on: “By the pricking of my thumbs, something wicked this way comes.” A piece of direct foreshadowing letting us know that evil is on the way.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1502" instrument_node="">I can think of several instances of this in </span><em data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">The Hunger Games:</span></em></p><span data-dcnode-id="1498" instrument_node="">
</span><blockquote data-dcnode-id="1495"><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">As the Everdeen family prepares to attend the reaping, Katniss thinks about how difficult this must be for Prim—her first time. She comforts herself with this thought: She’s about as safe as she can get, since she’s only entered once.</span></p></blockquote><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Oh, the irony!</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">The beautiful thing about this example is the way Collins twists it for dramatic tension. She lets readers know that Katniss has her name in the glass ball twenty times, and Gale forty-two times, making it clear the odds are </span><em data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">not</span></em><span data-dcnode-id="1487" instrument_node=""> in their favor.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Because we instinctively know the way story works, we already know Katniss is going to the games. But Collins throws a curve ball when she has Effie Trinket draw Prim’s name instead. This adds a nice twist, both to the story and to our hearts as we see Katniss sacrifice herself for her sister. Great character reveal.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Near the end of the story, Katniss reflects on the bloodthirsty nature of the games and vows she’ll never let her children’s names go into the ball. At the time, she believes that’s because she’ll never have any children, but it foreshadows another path to the same result.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><h3 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">6. Character Traits</span></h3><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">One way you can foreshadow a conflict is by developing your main character and giving the reader glimpses of how that character is on a collision course with an opposing force. Of course, this applies to secondary characters as well.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">In </span><em data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">The Godfather,</span></em><span data-dcnode-id="1469" instrument_node=""> Sonny Corleone’s aggressive behavior foreshadows future events in the movie as his lack of restraint leads to dire consequences, including his own death.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">In </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">The Wizard of Oz,</span></em><span data-dcnode-id="1463" instrument_node=""> many of the characters’ traits are foreshadowed in the beginning and brought to fruition as the story unfolds. For example, Miss Gulch is clearly portrayed as a witch, farmhand Zeke encourages Dorothy to be brave, and Hickory insists that someday they’ll erect a statue of him, foreshadowing their roles in the land of Oz.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><blockquote data-dcnode-id="1455"><p data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">In </span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">The Hunger Games,</span></em><span data-dcnode-id="1457" instrument_node=""> when Katniss and Peeta first arrive in the Capitol, Effie compliments their table manners, remarking with disgust that past tributes had no manners and ate with their hands. At which point Katniss drops her fork, eats with her fingers, and wipes them on the tablecloth, signifying her rebellion against the Capitol.</span></p></blockquote><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">We also come to know that Katniss is not the forgiving type and that she will fight to the bitter end for what she perceives as justice.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">It’s foreshadowed in the development of her character.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><h3 data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">7. Character Relationships</span></h3><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Let interactions between characters point toward a certain conclusion, foreshadowing future events.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node="">This brings to mind the beginning of </span><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">The Matrix</span></em><span data-dcnode-id="1438" instrument_node="">, when Neo’s jerk of a boss comes down hard on him, accusing Neo of thinking the rules don’t apply to him, that he’s special, that he must make a choice.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">In </span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Psycho,</span></em><span data-dcnode-id="1432" instrument_node=""> we’re treated to a foreshadowing of the true relationship Norman Bates has with his mother when he assures Marion Crane that his mother is “as harmless as one of those stuffed birds,” referring to a bit of taxidermy.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1429" instrument_node="">Batman’s future relationship with the Joker is foreshadowed in </span><em data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Batman Begins</span></em><span data-dcnode-id="1426" instrument_node=""> when Lieutenant Gordon shows him a playing card left by the new menace in Gotham City and says, “Take this guy—armed robbery, double homicide, and a taste for the theatrical. Like you. Leaves a calling card.”</span></p><span data-dcnode-id="1424" instrument_node="">
</span><blockquote data-dcnode-id="1412"><p data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">In </span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">The Hunger Games,</span></em><span data-dcnode-id="1420" instrument_node=""> Katniss’s fierce love and protective attitude toward her sister foreshadow her volunteering as tribute in Prim’s place.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">And we know Peeta will put Katniss’s safety before his own in every circumstance. This bond foreshadows the relationship Katniss will have with the rebels, as a whole.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">They will protect her to the death.</span></p></blockquote><span data-dcnode-id="1411" instrument_node="">
</span><h3 data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">8. Throwaway Details</span></h3><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Throwaway details are when your character does or says something that seems inconsequential in the moment, but in hindsight gains greater significance. Not a lot of attention is called to it, but readers may page back to that moment and say, “Aha! Now I see what it meant.”</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">This is seen in </span><em data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">The Hunger Games&nbsp;</span></em><span data-dcnode-id="1401" instrument_node="">when&nbsp;Peeta casually admits:</span></p><span data-dcnode-id="1399" instrument_node="">
</span><blockquote data-dcnode-id="1393"><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">“I do the cakes,” meaning that he does the cake decorating in the family bakery. This foreshadows his skill at camouflage which comes in handy later in the story.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">And then there’s Katniss’s remark early in the story: “Plants are tricky. Many are edible, but one false mouthful and you’re dead.” This foreshadows more than one event to come, including the climactic berry moment.</span></p></blockquote><span data-dcnode-id="1392" instrument_node="">
</span><h3 data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">9. Symbolism</span></h3><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Symbolism can provide an artful and powerful means of indirect foreshadowing. You might include something in your story that alludes to future events, or suggests what might happen, in an indirect manner.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node="">When Andy Dufresne ends up in prison in </span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The Shawshank Redemption,</span></em><span data-dcnode-id="1382" instrument_node=""> the prison warden comes to visit him in his cell. Spotting Andy’s Bible, the warden nods approvingly, admonishing him that, “Salvation lies within.” At the end of the movie, we discover that Andy’s salvation truly did lie within, as he’d hollowed out the pages of the good book to conceal the rock hammer with which he dug his tunnel to freedom.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1379" instrument_node="">There’s a lot of symbolic foreshadowing in </span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The Hunger Games.</span></em></p><span data-dcnode-id="1375" instrument_node="">
</span><blockquote data-dcnode-id="1369"><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">We’ve already mentioned the mockingjay pin and the bread Peeta threw to Katniss, signifying his sacrifice and her survival. But there’s also the dandelion Katniss saw sprouting through a crack beside the burnt bread. To her, it was a sign of hope, a good omen that meant she could make it.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">A few more examples include the Cornucopia full of valuable goods, yet in reality a deadly trap. Like the Capitol itself. And the melody Rue taught the mockingjays to signify the end of the day. That tune would someday signify the end of the Capitol.</span></p></blockquote><span data-dcnode-id="1368" instrument_node="">
</span><h3 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">10. Surprising but Inevitable</span></h3><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">This method involves a series of subtle hints that a reader may, or may not, pick up on. Either way, after the foreshadowed event occurs, they’re able to flip back through the pages and see the indicators that made it feel surprising yet inevitable. Like Chekhov’s gun.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1361" instrument_node="">In the movie </span><em data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Jaws,</span></em><span data-dcnode-id="1358" instrument_node=""> Chief Brody trips over a scuba tank on board the </span><em data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Orca</span></em><span data-dcnode-id="1355" instrument_node=""> and Hooper warns him that they’re combustible. Quint remarks: “Yeah, that’s real fine expensive gear you brought out here, Mr. Hooper. ‘Course, I don’t know what that bastard shark’s gonna do with it. Might eat it I suppose.” This points down a logical path to the shark’s eventual destruction.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><blockquote data-dcnode-id="1347"><p data-dcnode-id="1348"><span data-dcnode-id="1352" instrument_node="">There’s a scene in </span><em data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1349" instrument_node=""> where Katniss has to impress the Gamemakers but they pay her little mind, focused more on the feast laid before them—including a roast pig with an apple in its mouth. Infuriated, she sends an arrow straight into the apple, skewering it against the wall and riveting their attention.</span></p></blockquote><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">This foreshadows a pivotal later scene where she must destroy the food stores of her rivals. This time her arrows send down a whole rain of apples, setting off a series of explosives, vaporizing the feast.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><h2 data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Foreshadowing is About Setup</span></h2><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Remember, a great deal of foreshadowing registers on a subconscious level with the reader. Sometimes it happens that way for the writer, too. Don’t discount the power of your own subconscious when describing a setting or developing a relationship.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">This is as true for short stories as it is for novels, TV shows, films (Darth Vader, anyone?), or even a series like J.K. Rowling’s Harry Potter books—which literally set up major plot points for book seven in book one.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Adding the literary technique of foreshadowing to your writer’s toolbox is important for any writer hoping to write engaging plots without obnoxiously convenient plot twists.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Using the ten clever foreshadowing methods in this post will help you do just that.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1320"><strong data-dcnode-id="1325"><em data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">How about you? Do you love catching on to a bit of foreshadowing in the stories you read or watch?</span></em></strong><span data-dcnode-id="1324" instrument_node=""> Tell us about it in the </span><a data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">comments</span></a><span data-dcnode-id="1321" instrument_node="">.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><div data-dcnode-id="1287" id="practice"><span data-dcnode-id="1318" instrument_node="">
</span><h2 data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">PRACTICE</span></h2><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Look at your story in progress. Consider how you can use one or more of the techniques we covered in the article and write a scene with foreshadowing. If you prefer, you can borrow one of these prompts:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1301"><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Kieren is in the forest, hunting the fox who attacked his sister.</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Penelope realizes her neighbor Stan has been stalking her.</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Jennifer plans a solo trip into the wilderness.</span></li><span data-dcnode-id="1302" instrument_node="">
</span></ul><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Remember to build foreshadowing into the scene. If you’d like to share your work in the comments, you might also include a short explanation about what your foreshadowing signifies.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1296" instrument_node="">Write for </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.ggtimer.com/15minutes"><span data-dcnode-id="1295" instrument_node="">fifteen minutes</span></a><span data-dcnode-id="1293" instrument_node="">, and when you’re finished, post in the </span><a data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">comments</span></a><span data-dcnode-id="1290" instrument_node=""> and be sure to lend a word of encouragement or helpful critique for your fellow writers!</span></p><span data-dcnode-id="1288" instrument_node="">
</span></div><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1284" instrument_node="">

</span><div data-dcnode-id="706" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="803"><div class="comment__name clearfix" data-dcnode-id="807"><img class="comment__avatar" data-dcnode-id="812" height="32" src="https://c.disquscdn.com/uploads/users/24270/775/avatar92.jpg?1639910008" width="32"/><strong data-dcnode-id="809"><a data-dcnode-id="810" href=""><span data-dcnode-id="811" instrument_node="">Victoria Minks</span></a></strong><span data-dcnode-id="808" instrument_node=""> • 4 months ago
        </span></div><div class="comment__content" data-dcnode-id="804"><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Excellent post! Thank you! I think it's easy for me to fall into the trap of just writing in my flow, but taking the time to consider why certain elements come into the story is definitely important.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="793"><div class="comment__name clearfix" data-dcnode-id="797"><img class="comment__avatar" data-dcnode-id="802" height="32" src="https://c.disquscdn.com/uploads/forums/95/7532/avatar92.jpg?1281549414" width="32"/><strong data-dcnode-id="799"><a data-dcnode-id="800" href=""><span data-dcnode-id="801" instrument_node="">Indrani Talukdar</span></a></strong><span data-dcnode-id="798" instrument_node=""> • 8 months ago
        </span></div><div class="comment__content" data-dcnode-id="794"><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Another golden nugget of wisdom.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="783"><div class="comment__name clearfix" data-dcnode-id="787"><img class="comment__avatar" data-dcnode-id="792" height="32" src="https://c.disquscdn.com/uploads/forums/95/7532/avatar92.jpg?1281549414" width="32"/><strong data-dcnode-id="789"><a data-dcnode-id="790" href=""><span data-dcnode-id="791" instrument_node="">Joslyn Chase</span></a></strong><span data-dcnode-id="788" instrument_node=""> • 8 months ago
        </span></div><div class="comment__content" data-dcnode-id="784"><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Thank you, Indrani. I'm glad you came by to read it and I hope you will find the information useful :)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="773"><div class="comment__name clearfix" data-dcnode-id="777"><img class="comment__avatar" data-dcnode-id="782" height="32" src="https://c.disquscdn.com/uploads/forums/95/7532/avatar92.jpg?1281549414" width="32"/><strong data-dcnode-id="779"><a data-dcnode-id="780" href=""><span data-dcnode-id="781" instrument_node="">Indrani Talukdar</span></a></strong><span data-dcnode-id="778" instrument_node=""> • 8 months ago
        </span></div><div class="comment__content" data-dcnode-id="774"><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">I certainly do. That's why I read your posts so intently!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="737"><div class="comment__name clearfix" data-dcnode-id="767"><img class="comment__avatar" data-dcnode-id="772" height="32" src="https://c.disquscdn.com/uploads/users/34901/7070/avatar92.jpg?1635345609" width="32"/><strong data-dcnode-id="769"><a data-dcnode-id="770" href=""><span data-dcnode-id="771" instrument_node="">Gargi Biswas</span></a></strong><span data-dcnode-id="768" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="738"><p data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">The alarm seemed to go off with vehemence. Groggy with a meagre three-hour sleep, Nancy shut it off and yawned. She had never been a morning person. And the fact that she had partied till 4 am last night hadn't helped either. </span><br data-dcnode-id="765"/><span data-dcnode-id="764" instrument_node="">She dragged herself to the bathroom and returned about ten minutes later looking comparatively better. She smelled of mint toothpaste and lavender soap. The whiff of freshly brewed coffee and pancakes wafted from the kitchen.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">"Hey Mom"</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">"Morning, sweetie. You look so tired. You should go easy on the partying," said Mary - Nancy's mother, spreading a ladleful of pancake batter on the frying pan.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">"I'll try, Mom," Nancy said as she browsed through the Morning Herald disinterestedly. "Just the usual celebrity gossip. This paper is trash. Why don't we get the Chicago Tribune instead?"</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">"Mm-hmm. I'll ring the agency." Mary replied absentmindedly, wiping a layer of dust on the toaster.</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">"Oh! Good thing I remembered. I'll be late from work today. I've gotta get some stationary from the supermarket." Nancy put the last piece of pancake in her mouth and got up.</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">She was giving her makeup a quick toucheup before leaving when Mary called her from the kitchen.</span></p><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">"Yes Mom?"</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">"Sweetie, why don't you call Mr. Hurst sometime. You should be aware of my life insurance details."</span></p><p data-dcnode-id="743"><span data-dcnode-id="746" instrument_node="">"I'll take care of that. Don't worry. Bye" Nancy kissed her mom on the forehead and left for work. </span><br data-dcnode-id="745"/><span data-dcnode-id="744" instrument_node="">Mary got busy doing the dishes.</span></p><p data-dcnode-id="739"><span data-dcnode-id="742" instrument_node="">It was way past nine when Nancy's Cadillac glided round the turn in the neighborhood. She was going to turn off the AC when she stopped midway. A small crowd had gathered near her house. They were talking in hushed tones. She could also spot some paramedics. </span><br data-dcnode-id="741"/><span data-dcnode-id="740" instrument_node="">Nancy went pale in the face and clenched the steering wheel with shaking hands. Something was wrong.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="727"><div class="comment__name clearfix" data-dcnode-id="731"><img class="comment__avatar" data-dcnode-id="736" height="32" src="https://c.disquscdn.com/uploads/forums/95/7532/avatar92.jpg?1281549414" width="32"/><strong data-dcnode-id="733"><a data-dcnode-id="734" href=""><span data-dcnode-id="735" instrument_node="">Indrani Talukdar</span></a></strong><span data-dcnode-id="732" instrument_node=""> • 8 months ago
        </span></div><div class="comment__content" data-dcnode-id="728"><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Liked the passage. Well written.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="717"><div class="comment__name clearfix" data-dcnode-id="721"><img class="comment__avatar" data-dcnode-id="726" height="32" src="https://c.disquscdn.com/uploads/forums/95/7532/avatar92.jpg?1281549414" width="32"/><strong data-dcnode-id="723"><a data-dcnode-id="724" href=""><span data-dcnode-id="725" instrument_node="">Joslyn Chase</span></a></strong><span data-dcnode-id="722" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="718"><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Hello, Gargi. Ah, I see what you did there. Talking about life insurance is a sure sign something unpleasant is going to happen. Good job!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="707"><div class="comment__name clearfix" data-dcnode-id="711"><img class="comment__avatar" data-dcnode-id="716" height="32" src="https://c.disquscdn.com/uploads/users/34901/7070/avatar92.jpg?1635345609" width="32"/><strong data-dcnode-id="713"><a data-dcnode-id="714" href=""><span data-dcnode-id="715" instrument_node="">Gargi Biswas</span></a></strong><span data-dcnode-id="712" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="708"><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Thank you, Joslyn!</span></p></div></div></div><span data-dcnode-id="705" instrument_node="">
