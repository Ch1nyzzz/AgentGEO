</span><div class="meta-wrap hero-meta tipi-s-typo elements-design-1 clearfix" data-dcnode-id="3908"><div class="meta" data-dcnode-id="3909"><div class="byline byline-2 byline-cats-design-3" data-dcnode-id="3929"><div class="byline-part cats" data-dcnode-id="3934"><a class="cat cat-with-line" data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/gaming/" style="border-bottom-color:#661111"><span data-dcnode-id="3936" instrument_node="">Gaming</span></a></div><span class="byline-part separator separator-readtime" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">·</span></span><span class="byline-part read-time" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">3 min read</span></span></div><div class="title-wrap title-with-sub" data-dcnode-id="3922"><h1 class="entry-title title flipboard-title" data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">How Is Far Cry 6 Explaining The Ending of Far Cry 5?</span></h1><span data-dcnode-id="3926" instrument_node=""> </span><p class="subtitle flipboard-subtitle font-3" data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Is the series backed into a corner? </span></p><span data-dcnode-id="3923" instrument_node="">
</span></div><div class="byline byline-3" data-dcnode-id="3910"><span class="byline-part author-avatar flipboard-author with-name" data-dcnode-id="3919"><a class="author-avatar" data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/author/jimmyvulture/"><img alt="Jimmy Donnellan" class="avatar avatar-50 wp-user-avatar wp-user-avatar-50 alignnone photo" data-dcnode-id="3921" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/05/57104100_10157363410347754_1172448040842166272_n-1-100x100.jpg&amp;raw" width="50"></a></span><span class="byline-part author" data-dcnode-id="3916"><a class="author url fn" data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/author/jimmyvulture/" rel="author" title="Posts by Jimmy Donnellan"><span data-dcnode-id="3918" instrument_node="">Jimmy Donnellan</span></a></span><span class="byline-part separator separator-date" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="3911"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="3912" datetime="2020-07-16T12:11:24+01:00"><span data-dcnode-id="3913" instrument_node="">July 16, 2020</span></time></span></div></div></div><div class="hero-wrap clearfix hero-2 no-par mask-loaded" data-dcnode-id="3905"><div class="hero" data-dcnode-id="3906"><img alt="Far Cry 6" class="flipboard-image wp-post-image" data-dcnode-id="3907" height="433" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-770x433.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-770x433.jpg 770w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-300x169.jpg 300w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-510x287.jpg 510w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-500x281.jpg 500w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-218x123.jpg 218w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244-695x391.jpg 695w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Anton_200712_945pm_CEST-e1594391366244.jpg 1200w" width="770"></div></div><span data-dcnode-id="3904" instrument_node=""> </span><div class="entry-content-wrap clearfix" data-dcnode-id="3257"><span data-dcnode-id="3903" instrument_node="">
</span><div class="entry-content body-color clearfix link-color-wrap" data-dcnode-id="3259"><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3899"><em data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Spoilers for Far Cry 5 and New Dawn ahead. </span></em></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3895"><a class="tipi-lightbox" data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2015/08/SPOILERS.jpg"><img alt="Cultured Vultures spoilers" class="aligncenter size-full wp-image-20939 embed-vis" data-dcnode-id="3897" height="258" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2015/08/SPOILERS.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2015/08/SPOILERS.jpg 1200w, https://culturedvultures.com/wp-content/uploads/2015/08/SPOILERS-300x65.jpg 300w, https://culturedvultures.com/wp-content/uploads/2015/08/SPOILERS-768x165.jpg 768w, https://culturedvultures.com/wp-content/uploads/2015/08/SPOILERS-510x110.jpg 510w" width="1200"></a></p><span data-dcnode-id="3894" instrument_node="">
</span><p data-dcnode-id="3884"><a data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/far-cry-6-screenshots/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3893" instrument_node="">Recently revealed</span></a><span data-dcnode-id="3891" instrument_node=""> after some </span><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/far-cry-6-has-appeared-on-the-playstation-store/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3890" instrument_node="">pretty heavy leaks</span></a><span data-dcnode-id="3888" instrument_node=""> (as is the Ubisoft way), Far Cry 6 is the latest in </span><a data-dcnode-id="3886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/history-far-cry-games/"><span data-dcnode-id="3887" instrument_node="">a long line</span></a><span data-dcnode-id="3885" instrument_node=""> of open world shooters that’s due for release early next year for present and next-gen.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3878"><span data-dcnode-id="3882" instrument_node="">Set in the present day (so get any of those </span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/paultassi/2020/07/11/yes-far-cry-6-is-almost-certainly-a-vaas-far-cry-3-prequel/%2361b0c53d4f6f" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3881" instrument_node="">Vaas prequel theories out of your head</span></a><span data-dcnode-id="3879" instrument_node="">), you play as Dani Rojas, a revolutionary in fictional Yara as they look to wrestle their country back from the oppressive President Anton Castillo, played by Giancarlo Esposito, and his son, Diego.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3877" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3875" instrument_node="">The question is: how is Far Cry 6 explaining away the apocalyptic ending of </span><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/far-cry-5-pc-review/"><span data-dcnode-id="3874" instrument_node="">Far Cry 5</span></a><span data-dcnode-id="3872" instrument_node=""> and the events of </span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/far-cry-new-dawn-ps4-review/"><span data-dcnode-id="3871" instrument_node="">New Dawn</span></a><span data-dcnode-id="3869" instrument_node="">?</span></p><span data-dcnode-id="3867" instrument_node="">
</span><figure aria-describedby="caption-attachment-72641" class="wp-caption aligncenter embed-vis" data-dcnode-id="3862" id="attachment_72641" style="width: 1200px"><a class="tipi-lightbox" data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2018/03/Far-Cry-52018-3-27-23-21-15.jpg"><img alt="Far Cry 5 Joseph Seed" class="size-full wp-image-72641" data-dcnode-id="3866" height="678" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2018/03/Far-Cry-52018-3-27-23-21-15.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2018/03/Far-Cry-52018-3-27-23-21-15.jpg 1200w, https://culturedvultures.com/wp-content/uploads/2018/03/Far-Cry-52018-3-27-23-21-15-300x170.jpg 300w, https://culturedvultures.com/wp-content/uploads/2018/03/Far-Cry-52018-3-27-23-21-15-510x288.jpg 510w" width="1200"></a><figcaption class="wp-caption-text" data-dcnode-id="3863" id="caption-attachment-72641"><span data-dcnode-id="3864" instrument_node="">Far Cry 5</span></figcaption></figure><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">After battling with the charismatic cult leader Joseph Seed across Hope County, the protagonist has two options: walk away and then (presumably) die anyway because of brainwashing, or go to arrest Seed and find that a nuclear bomb goes off, leading to them then taking refuge with Seed as the world crumbles.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">The latter is the canonical ending, the spin-off Far Cry New Dawn picking things up 17 years later as you are plopped down into a very pink post-apocalypse to battle The Twins with Seed later showing up again, as well as the protagonist of Far Cry 5. The game goes a little off the rails as you eventually gain superpowers, because why the heck not.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3854" instrument_node="">This writing looked like it had clearly backed Far Cry into a corner in the same way that Saints Row had no conceivable way of following up the madness of Saints Row IV, which saw you battling aliens as a superpowered president inside a simulation. So maybe 5 and New Dawn weren’t </span><em data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">quite</span></em><span data-dcnode-id="3851" instrument_node=""> as outlandish as that, but it was a big question mark as to where the franchise could go next after those twists.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3849" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3845"><a class="tipi-lightbox" data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn.jpg"><img alt="Far Cry New Dawn" class="aligncenter size-full wp-image-94718 embed-vis" data-dcnode-id="3847" height="675" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn.jpg 1200w, https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn-300x169.jpg 300w, https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn-770x433.jpg 770w, https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn-510x287.jpg 510w, https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn-500x281.jpg 500w, https://culturedvultures.com/wp-content/uploads/2019/02/Far-Cry-New-Dawn-293x165.jpg 293w" width="1200"></a></p><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3836"><span data-dcnode-id="3843" instrument_node="">The answer: apparently just completely ignore them. With Far Cry 6 being set in the present day, it seems that Far Cry’s stories aren’t as connected as we may have thought. There are </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outoflives.net/2019/06/04/is-there-really-a-ubisoft-shared-universe/"><span data-dcnode-id="3842" instrument_node="">easter eggs throughout the series</span></a><span data-dcnode-id="3840" instrument_node=""> that tie things together, one of the most famous </span><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitaltrends.com/gaming/how-far-cry-primal-far-cry-4-connection/"><span data-dcnode-id="3839" instrument_node="">showing a connection between Primal and 4</span></a><span data-dcnode-id="3837" instrument_node="">, but it appears that they’re looser than we imagined.</span></p><span data-dcnode-id="3835" instrument_node="">
</span><p data-dcnode-id="3827"><span data-dcnode-id="3834" instrument_node="">There is, of course, </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//farcry.fandom.com/wiki/Hurk_Drubman%2C_Jr."><span data-dcnode-id="3833" instrument_node="">Hurk</span></a><span data-dcnode-id="3831" instrument_node="">, who appears in most Far Cry games and is the weird and annoying anchor to everything going on, though perhaps he’s supposed to be more of a “wink and nod” character rather than someone to ground all the different narratives, </span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//metalgear.fandom.com/wiki/Johnny_Sasaki"><span data-dcnode-id="3830" instrument_node="">kind of like Johnny in Metal Gear Solid</span></a><span data-dcnode-id="3828" instrument_node="">.</span></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3821"><span data-dcnode-id="3825" instrument_node="">That said, it might be the case that Yara, the fictional setting for Far Cry 6, was one of the places left untouched by the nuclear fallout. We only really see the United States in New Dawn, so it could be that the nuclear war didn’t affect everyone around the world. A little more weight is added to this with the fact that President Castillo wants to rebuild a “paradise”, suggesting some kind of haven from the rest of the ruined world. That also might explain why the country is “frozen in time” as mentioned in PR materials, as well as why the citizens of Yara feel so antagonised by El Presidente’s iron fist method of ruling. People tend to get their backs up a </span><em data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">bit</span></em><span data-dcnode-id="3822" instrument_node=""> more when dealing with the stresses of the post-apocalypse, after all.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3820" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3819" instrument_node="">
</span><figure aria-describedby="caption-attachment-136499" class="wp-caption aligncenter embed-vis" data-dcnode-id="3814" id="attachment_136499" style="width: 1200px"><a class="tipi-lightbox" data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108.jpg"><img alt="Far Cry 6" class="size-full wp-image-136499" data-dcnode-id="3818" height="675" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108.jpg 1200w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-300x169.jpg 300w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-510x287.jpg 510w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-770x433.jpg 770w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-500x281.jpg 500w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-218x123.jpg 218w, https://culturedvultures.com/wp-content/uploads/2020/07/FC6_screen_CGI_Still_Esperanza_200712_945pm_CEST-e1594391337108-695x391.jpg 695w" width="1200"></a><figcaption class="wp-caption-text" data-dcnode-id="3815" id="caption-attachment-136499"><span data-dcnode-id="3816" instrument_node="">Far Cry 6</span></figcaption></figure><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">For that theory to make sense, though, you’d think that it would have been alluded to a bit more than from what we’ve seen of the game so far. I’ve scoured the CGI trailer and the website for some hints of the post-apocalypse and have come up pretty much empty-handed. The only real hint is the appearance of a poster that says “reconstruir el paraiso”, which translates to “reconstruct the paradise”, suggesting some kind of social regeneration following a major event. Yara is a stand-in for Cuba, which is cut off from most of the world. Is it unreasonable to suggest that Yara’s independent nature might have excluded it from nuclear warfare?</span></p><span data-dcnode-id="3810" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">It will be pretty interesting to see how Far Cry 6 explains the events of Far Cry 5 and New Dawn the closer we get to its release, or if it bothers to at all. Who knows, maybe we will wake up in a lab and Kristen Bell will be there telling us about some weird apple.</span></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Now wouldn’t that be something?</span></p><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">Far Cry 6 releases February 18, 2021 for PC, PlayStation 5, PlayStation 4, Xbox Series X, Xbox One and Stadia.</span></p><span data-dcnode-id="3801" instrument_node="">

2977"><span data-dcnode-id="2978" instrument_node="">Upgrade a weapon at Salty Springs</span></td><td class="column-2" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">35000 XP</span></td></tr><tr class="row-8 even" data-dcnode-id="2965"><td class="column-1" data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Search Ammo Boxes At The Fortilla (7)</span></td><td class="column-2" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">35000 XP</span></td></tr><tr class="row-9 odd" data-dcnode-id="2957"><td class="column-1" data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Use a Firefly Jar or Flare Gun at Misty Meadows</span></td><td class="column-2" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">35000 XP</span></td></tr></tbody></table><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Here’s a quick rundown of each challenge for Week 5 of Fortnite: Chapter 2 – Season 3.</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2944"><strong data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Search Chests at Sweaty Sands (7)</span></strong><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">
Sweaty Sands is one of the most popular spots on the Fortnite map and it’s somewhere where you can also find an absolute tonne of chests. We recommend dropping at the houses directly opposite the big hotel for easy loot.</span></p><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2938"><strong data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Eliminations at Retail Row (3)</span></strong><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">
Retail Row is an iconic Fortnite location, though it has been shunted to the east of the map from its usual central position. This place is packed with loot and is typically busy, so it shouldn’t be too much of a sweat to complete.</span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2923"><strong data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Collect Floating Rings at Steamy Stacks</span></strong><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">
Just like previous challenges in </span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnite-floating-rings-lazy-lake-locations/"><span data-dcnode-id="2932" instrument_node="">Lazy Lake</span></a><span data-dcnode-id="2930" instrument_node=""> and </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnite-collect-floating-rings-at-pleasant-park-guide/"><span data-dcnode-id="2929" instrument_node="">Pleasant Park</span></a><span data-dcnode-id="2927" instrument_node="">, all you need to do is find the large blue rings dotted around. It’s probably the </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnite-collect-floating-rings-at-steamy-stacks-all-ring-locations/"><span data-dcnode-id="2926" instrument_node="">easiest of the bunch</span></a><span data-dcnode-id="2924" instrument_node="">, too!</span></p><span data-dcnode-id="2922" instrument_node="">
</span><p data-dcnode-id="2917"><strong data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Land at The Yacht and finish Top 25</span></strong><br data-dcnode-id="2919"><span data-dcnode-id="2918" instrument_node="">
The Yacht is situated in the north of the map, having moved from its position in the west from last season. Don’t forget that you only have to land here, meaning that you could technically land and then swim away to safety.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2911"><strong data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Catch fish at Craggy Cliffs (5)</span></strong><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node="">
You may as well do this one after landing at The Yacht. Craggy Cliffs is an old Named Location that was submerged by water at the start of the season, which means that there are a tonne of places to catch fish.</span></p><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2905"><strong data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Upgrade a weapon at Salty Springs</span></strong><br data-dcnode-id="2907"><span data-dcnode-id="2906" instrument_node="">
This applies to a weapon of any rarity, so all you need is 20 of each material at the very least to upgrade from a common weapon. Don’t forget that Upgrade Benches are now deployable, so don’t worry about not being able to find any of the fixed ones.</span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2899"><strong data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Search Ammo Boxes At The Fortilla (7)</span></strong><br data-dcnode-id="2901"><span data-dcnode-id="2900" instrument_node="">
The Fortilla has already been a spot for a challenge this season, meaning that you should be fairly acquainted with it already. Ammo Boxes are all over the place, though you may need to spread it over a few matches with so many people landing here.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2893"><strong data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Use a Firefly Jar or Flare Gun at Misty Meadows</span></strong><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">
We recommend you try to find a Flare Gun over a Firefly Jar if you can, as well as that you obviously just land at Misty and start searching chest. Flare Guns are much more common that Firefly Jars and generally better overall.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2891" instrument_node="">You will unlock </span><strong data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">35,000 XP</span></strong><span data-dcnode-id="2888" instrument_node=""> apiece for completing weekly challenges.</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Fortnite: Chapter 2 – Season 3 is free-to-play on PC via the Epic Games Store, PlayStation 4, Xbox One, Nintendo Switch, iOS, and Android.</span></p><span data-dcnode-id="2883" instrument_node="">

</span></div><div class="byline byline-3" data-dcnode-id="2724"><span class="byline-part author-avatar flipboard-author with-name" data-dcnode-id="2733"><a class="author-avatar" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/author/jimmyvulture/"><img alt="Jimmy Donnellan" class="avatar avatar-50 wp-user-avatar wp-user-avatar-50 alignnone photo" data-dcnode-id="2735" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/05/57104100_10157363410347754_1172448040842166272_n-1-100x100.jpg&amp;raw" width="50"></a></span><span class="byline-part author" data-dcnode-id="2730"><a class="author url fn" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/author/jimmyvulture/" rel="author" title="Posts by Jimmy Donnellan"><span data-dcnode-id="2732" instrument_node="">Jimmy Donnellan</span></a></span><span class="byline-part separator separator-date" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="2725"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="2726" datetime="2020-07-16T11:51:59+01:00"><span data-dcnode-id="2727" instrument_node="">July 16, 2020</span></time></span></div></div></div><div class="hero-wrap clearfix hero-2 no-par" data-dcnode-id="2716"><div class="hero" data-dcnode-id="2719"><img alt="Fortnite PlayStation Home" class="flipboard-image wp-post-image" data-dcnode-id="2720" height="433" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-770x433.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-770x433.jpg 770w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-300x169.jpg 300w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-510x287.jpg 510w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-500x281.jpg 500w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-218x123.jpg 218w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home-695x391.jpg 695w, https://culturedvultures.com/wp-content/uploads/2020/07/Fortnite-PlayStation-Home.jpg 1200w" width="770"></div><div class="caption" data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Fortnite PlayStation Home</span></div></div><span data-dcnode-id="2715" instrument_node=""> </span><div class="entry-content-wrap clearfix" data-dcnode-id="1020"><span data-dcnode-id="2714" instrument_node="">
</span><div class="entry-content body-color clearfix link-color-wrap" data-dcnode-id="1023"><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Speak to people of a certain age about PlayStation Home and you will probably receive one of two responses. You will either get shrugs from those who never “got” it, or you will see faces light up as the slightly awkward memories come flooding back from Sony’s weird and often wonderful experiment.</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2709" instrument_node="">Initially envisaged as a 2D online space for Getaway: Black Monday, a game that’s biggest social impact was </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DZGTHtLCQZ2w"><span data-dcnode-id="2708" instrument_node="">probably Michael Cera playing it in Superbad</span></a><span data-dcnode-id="2706" instrument_node="">, PlayStation Home sprung to life in beta as a 3D social sim on PlayStation 3 on December 11th, 2008. Basically the console equivalent to something like Second Life, users could interact with each other, play mini-games, check out user-generated content and crossovers, and even watch movies. Oh, and get drowned in a whole load of advertisements.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Before the rise of social media, PlayStation Home was really ahead of the curve in bringing people together from across the world. My memories of it are spotty at best, me being an actually spotty teenager when it released, but I do remember how wild it felt to be chatting to somebody dressed up more fancifully than Chris Tucker in The Fifth Element with the option to go bowling with them just one incredibly long loading screen away.</span></p><span data-dcnode-id="2701" instrument_node="">

</span><p data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">Due to it being a free “game” with no subscription required for either the experience itself or PlayStation Network, PlayStation Home saw millions of users during its earliest days, and while no official figures have ever been released, estimates believe that </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kotaku.co.uk/2015/07/29/the-untold-story-of-playstation-home-sonys-most-successful-disaster"><span data-dcnode-id="2178" instrument_node="">20 to 41 million users</span></a><span data-dcnode-id="2176" instrument_node=""> tried out Home at least once during its life. That means that half of all PlayStation 3 owners may have played with Home at some point, whether that’s to get wholly confused by it all or sink an absurd amount of money into the </span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.playstation.com/2013/09/18/new-to-playstation-home-inspect-items/"><span data-dcnode-id="2175" instrument_node="">equally absurd amount of virtual items</span></a><span data-dcnode-id="2173" instrument_node=""> on offer.</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2170" instrument_node="">It was a wild success in terms of players, but not that one that made Sony </span><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gamesindustry.biz/articles/ps-home-quite-profitable-buser"><span data-dcnode-id="2169" instrument_node="">the tonnes of money they hoped</span></a><span data-dcnode-id="2167" instrument_node="">, or at least enough for them to continue supporting it past the life-cycle of the PlayStation 3 and then onto the PlayStation 4. Despite huge player figures overall, the amount of active users for PlayStation Home eventually dwindled to the hardcore, though those hardcore players still helped it to turn a profit. Servers were </span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/insertcoin/2014/09/27/sony-finally-shutting-down-playstation-home-on-ps3/%233d5d804f23a0"><span data-dcnode-id="2166" instrument_node="">shut down</span></a><span data-dcnode-id="2164" instrument_node=""> on March 31st, 2015, nearly seven years after launch. It never left beta.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">PlayStation Home is looked back on now as being a little too ahead of its time for its own good, both technically and conceptually. The PlayStation 3 was perhaps underpowered for the kind of experience Sony wanted to offer, it beset by technical problems that saw simple movement being as difficult to navigate as the Switch eShop is now and many of its spaces just regularly flat out refusing to work. If it was to release for the PlayStation 4 or perhaps even the upcoming PlayStation 5, you could see PlayStation Home becoming something huge, especially now that Sony’s network and social infrastructure is much more solid.</span></p><span data-dcnode-id="2159" instrument_node="">

"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1669" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1667" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1662"><use class="ytp-svg-shadow" data-dcnode-id="1664" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1665" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1663" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1658"><use class="ytp-svg-shadow" data-dcnode-id="1660" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1661" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1659" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=r46PGzPfDvs" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">They may be beaten to the punch, however. There’s been a lot of social sim games akin to PlayStation Home that have popped up over the last few years, the outlaw wasteland of VR Chat probably being the most notable (and notorious). As good as that bonkers virtual reality experience is, though, it’s not the regulated, properly maintained space that Home was, the amount of meme avatars running about being the perfect evidence of just that. Instead, it’s the monolith known as Fortnite that might become what PlayStation Home always promised.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">It’s been the plan for a long time to make Fortnite more than “just” a Battle Royale game, or more than “just” a game overall. In December 2019, Tim Sweeney, CEO of Epic Games, replied to a tweet asking him about what he thought of the Fortnite experience, whether he saw it as more of a platform than a game. He replied that Fortnite is a game right now, but for them to check back in 12 months.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="1623" data-dnt="true" data-width="550"><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629" dir="ltr" lang="en"><span data-dcnode-id="1630" instrument_node="">Fortnite is a game. But please ask that question again in 12 months.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1627" instrument_node="">— Tim Sweeney (@TimSweeneyEpic) </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/TimSweeneyEpic/status/1210291961904730114%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1626" instrument_node="">December 26, 2019</span></a></p></blockquote><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">Fast-forward to May 2020 and Epic’s reveal of Party Royale, a new hub for Fortnite players who want a break from fighting to be the </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcgamer.com/uk/there-sure-are-a-lot-of-people-obsessed-with-fortnite-butts/"><span data-dcnode-id="1617" instrument_node="">last slender female skin standing</span></a><span data-dcnode-id="1615" instrument_node="">. There are no eliminations in Party Royale, SCARs being replaced with paint guns and all kinds of silly ways of effectively playfighting each other. Players cannot use in-game text chat to talk to each other (at least so far), but emotes are basically their own language in the world of Fortnite, just as they were in PlayStation Home.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1612" instrument_node="">Party Royale compares most notably to PlayStation Home with both being places to check out virtual concerts that were ostensibly ad events. Steve Aoki and the like have held some clunky mini-concerts within Party Royale, which have always been pitched as experiments by Epic to see where they could possibly take it in the future; Marshmello and </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnites-travis-scott-concert-smashes-concurrent-player-records/"><span data-dcnode-id="1611" instrument_node="">Travis Scott’s concerts</span></a><span data-dcnode-id="1609" instrument_node=""> within the “main” experience should probably be viewed as the ultimate end goal for what Party Royale wants to provide. But PlayStation Home did it first, Dizzee Rascal’s performance within the SingStar space preceding what Fortnite did by nearly a whole decade and it has the </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.playstation.com/archive/2009/09/17/home-dizzee-rascal-vip-room/"><span data-dcnode-id="1608" instrument_node="">exclusive cosmetics to prove it</span></a><span data-dcnode-id="1606" instrument_node="">.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1603" instrument_node="">A lot was made about </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnites-first-movie-nite-features-inception-the-prestige-or-batman-begins/"><span data-dcnode-id="1602" instrument_node="">Fortnite screening Christopher Nolan movies within Party Royale</span></a><span data-dcnode-id="1600" instrument_node="">, which is surely the best way to consume the director’s work, but PlayStation Home did it first. </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.engadget.com/2011-11-20-playstation-home-lets-friends-watch-free-movies-together-now-us.html"><span data-dcnode-id="1599" instrument_node="">In 2011</span></a><span data-dcnode-id="1597" instrument_node="">, Home players could watch free movies via Crackle with up to 60 other players. Granted, nothing on Crackle has ever been as good as what Nolan has put out, but free is free.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1592"><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite.jpg"><img alt="Wick's Bounty John Wick Fortnite" class="aligncenter size-full wp-image-105514" data-dcnode-id="1594" height="540" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite.jpg&amp;raw" srcset="https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite.jpg 960w, https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite-300x169.jpg 300w, https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite-770x433.jpg 770w, https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite-510x287.jpg 510w, https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite-500x281.jpg 500w, https://culturedvultures.com/wp-content/uploads/2019/05/Wicks-Bounty-John-Wick-Fortnite-293x165.jpg 293w" width="960"></a></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1590" instrument_node="">It’s not just within Party Royale where Fortnite resembles the mad metaverse of PlayStation Home, however. Fortnite’s branded deals have become more and more commonplace as time has gone on, meaning that it’s now a game where John Wick can team up with the Demogorgon from Stranger Things to take on Batman and Captain America. Whole new modes and locations have been created just to try and rationalise these ads as experiences, including a </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//esportsinsider.com/2019/05/epic-games-launches-fortnite-and-nike-air-jordans-crossover/"><span data-dcnode-id="1589" instrument_node="">downhill racer to help sell Nike Air Jordans</span></a><span data-dcnode-id="1587" instrument_node=""> and </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnite-welcome-to-pandora-find-claptraps-missing-eye-return-it-to-him/"><span data-dcnode-id="1586" instrument_node="">Pandora from Borderlands</span></a><span data-dcnode-id="1584" instrument_node=""> taking over a spot of the Fortnite map, to name just a couple. Compare this to PlayStation Home, which had specific spaces to help promote other games and brands like Red Bull and Coca-Cola, and the similarities become even more obvious to see.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1581" instrument_node="">Epic have done well to make this “commercialisation” a gradual process instead of the all-out splurge of ad content that was PlayStation Home, though. The crossovers in Fortnite started out with The Avengers, which was simply smart business to pair two of the biggest entities in pop culture because of the shared demographic between both. This has made subsequent crossovers more palatable for Fortnite fans, whereas PlayStation Home’s ad strategy was like using a gatling gun on a dartboard. Some of these ads are even organically weaved together, such as </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dh9MeYczCHAw"><span data-dcnode-id="1580" instrument_node="">Fortnite turning up in Ralph Wrecks The Internet</span></a><span data-dcnode-id="1578" instrument_node=""> and </span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DD1_2k_sNrHI"><span data-dcnode-id="1577" instrument_node="">Endgame</span></a><span data-dcnode-id="1575" instrument_node=""> to return the favour. </span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1572" instrument_node="">With Battle Royale as a subgenre perhaps not being </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/battle-royale-is-now-just-team-deathmatch/"><span data-dcnode-id="1571" instrument_node="">as feverishly exciting</span></a><span data-dcnode-id="1569" instrument_node=""> as it once was, it looks like Epic are trying to make Fortnite last far beyond BR’s boom period to provide something for everyone. Fortnite is slowly becoming a social hub for players of all experiences and tastes, a game that evolves beyond </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culturedvultures.com/fortnite-save-the-world-will-no-longer-become-free/"><span data-dcnode-id="1568" instrument_node="">its rough and ready PVE roots</span></a><span data-dcnode-id="1566" instrument_node=""> into something that’s seldom ever been seen before, and certainly not on this amount of devices in so many countries across the world. Whether Fortnite becomes its own OASIS or not and how it leverages the next-generation remains to be seen, but one thing is clear: PlayStation Home did it first.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Fortnite: Chapter 2 – Season 3 is free-to-play on PC via the Epic Games Store, PlayStation 4, Xbox One, Nintendo Switch, iOS, and Android.</span></p><span data-dcnode-id="1561" instrument_node="">
