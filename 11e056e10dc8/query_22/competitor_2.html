</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="669" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="678"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3608" style="display:none"><span data-dcnode-id="3609" instrument_node="">Cause-and-effect sequence of events in a narrative</span></div><span data-dcnode-id="3607" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3600" role="note"><span data-dcnode-id="3604" instrument_node="">For other uses, see </span><a class="mw-redirect mw-disambig" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plot_%28disambiguation%29" title="Plot (disambiguation)"><span data-dcnode-id="3603" instrument_node="">Plot (disambiguation)</span></a><span data-dcnode-id="3601" instrument_node="">.</span></div><span data-dcnode-id="3599" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3574"><div class="thumbinner" data-dcnode-id="3575" style="width:302px;"><a class="image" data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStory_v._plot.png"><img alt="" class="thumbimage" data-dcnode-id="3598" data-file-height="797" data-file-width="1065" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Story_v._plot.png/300px-Story_v._plot.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Story_v._plot.png/450px-Story_v._plot.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Story_v._plot.png/600px-Story_v._plot.png 2x" width="300"></a><span data-dcnode-id="3596" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3576"><div class="magnify" data-dcnode-id="3594"><a class="internal" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStory_v._plot.png" title="Enlarge"></a></div><span data-dcnode-id="3593" instrument_node="">Plot is the </span><a class="mw-redirect" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cause%25E2%2580%2590and%25E2%2580%2590effect" title="Cause‐and‐effect"><span data-dcnode-id="3592" instrument_node="">cause‐and‐effect</span></a><span data-dcnode-id="3590" instrument_node=""> sequence of main events in a </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="3589" instrument_node="">story</span></a><span data-dcnode-id="3587" instrument_node="">.</span><sup class="reference" data-dcnode-id="3584" id="cite_ref-dibell_1-0"><a data-dcnode-id="3585" href="#cite_note-dibell-1"><span data-dcnode-id="3586" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3583" instrument_node=""> The story events are numbered </span><a class="mw-redirect" data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chronologically" title="Chronologically"><span data-dcnode-id="3582" instrument_node="">chronologically</span></a><span data-dcnode-id="3580" instrument_node="">; the red plot events are also connected </span><a class="mw-redirect" data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logically" title="Logically"><span data-dcnode-id="3579" instrument_node="">logically</span></a><span data-dcnode-id="3577" instrument_node=""> by "so".</span></div></div></div><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3572" instrument_node="">In a </span><a class="mw-redirect" data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literary_work" title="Literary work"><span data-dcnode-id="3571" instrument_node="">literary work</span></a><span data-dcnode-id="3569" instrument_node="">, </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film" title="Film"><span data-dcnode-id="3568" instrument_node="">film</span></a><span data-dcnode-id="3566" instrument_node="">, or other </span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narrative" title="Narrative"><span data-dcnode-id="3565" instrument_node="">narrative</span></a><span data-dcnode-id="3563" instrument_node="">, the </span><b data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">plot</span></b><span data-dcnode-id="3560" instrument_node=""> is the sequence of events where each affects the next one through the principle of </span><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causality" title="Causality"><span data-dcnode-id="3559" instrument_node="">cause-and-effect</span></a><span data-dcnode-id="3557" instrument_node="">. The causal events of a plot can be thought of as a series of events linked by the connector "and so". Plots can vary from the simple—such as in a traditional </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballad" title="Ballad"><span data-dcnode-id="3556" instrument_node="">ballad</span></a><span data-dcnode-id="3554" instrument_node="">—to forming complex interwoven structures, with each part sometimes referred to as a </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subplot" title="Subplot"><span data-dcnode-id="3553" instrument_node="">subplot</span></a><span data-dcnode-id="3551" instrument_node=""> or </span><i data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">imbroglio</span></i><span data-dcnode-id="3548" instrument_node="">.
</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3546" instrument_node="">Plot is similar in meaning to the term </span><i data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">storyline</span></i><span data-dcnode-id="3543" instrument_node="">.</span><sup class="reference" data-dcnode-id="3540" id="cite_ref-2"><a data-dcnode-id="3541" href="#cite_note-2"><span data-dcnode-id="3542" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3537" id="cite_ref-3"><a data-dcnode-id="3538" href="#cite_note-3"><span data-dcnode-id="3539" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3536" instrument_node=""> In the narrative sense, the term highlights important points which have consequences within the story, according to American science fiction writer </span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ansen_Dibell" title="Ansen Dibell"><span data-dcnode-id="3535" instrument_node="">Ansen Dibell</span></a><span data-dcnode-id="3533" instrument_node="">.</span><sup class="reference" data-dcnode-id="3530" id="cite_ref-dibell_1-1"><a data-dcnode-id="3531" href="#cite_note-dibell-1"><span data-dcnode-id="3532" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3529" instrument_node="">  The term </span><i data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">plot</span></i><span data-dcnode-id="3526" instrument_node=""> can also serve as a verb, referring to either the writer's crafting of a plot (devising and ordering story events), or else to a character's planning of future actions in the story.
</span></p><p data-dcnode-id="3517"><span data-dcnode-id="3524" instrument_node="">The term </span><i data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">plot</span></i><span data-dcnode-id="3521" instrument_node="">, however, in common usage (for example, a "movie plot") can mean a narrative summary or story </span><a class="extiw" data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/synopsis" title="wikt:synopsis"><span data-dcnode-id="3520" instrument_node="">synopsis</span></a><span data-dcnode-id="3518" instrument_node="">, rather than a specific cause-and-effect sequence.
</span></p><span data-dcnode-id="3516" instrument_node="">

</span><h2 data-dcnode-id="3333"><span class="mw-headline" data-dcnode-id="3341" id="Definition"><span data-dcnode-id="3342" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="3334"><span class="mw-editsection-bracket" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">[</span></span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="3338" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3331" instrument_node="">Early 20th-century English novelist </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E._M._Forster" title="E. M. Forster"><span data-dcnode-id="3330" instrument_node="">E. M. Forster</span></a><span data-dcnode-id="3328" instrument_node=""> described plot as the cause-and-effect relationship between events in a story. According to Forster, "</span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">The king died, and then the queen died,</span></i><span data-dcnode-id="3325" instrument_node=""> is a story, while </span><i data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">The king died, and then the queen died of grief,</span></i><span data-dcnode-id="3322" instrument_node=""> is a plot."</span><sup class="reference" data-dcnode-id="3319" id="cite_ref-prince_4-0"><a data-dcnode-id="3320" href="#cite_note-prince-4"><span data-dcnode-id="3321" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="3316" id="cite_ref-5"><a data-dcnode-id="3317" href="#cite_note-5"><span data-dcnode-id="3318" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="3313" id="cite_ref-6"><a data-dcnode-id="3314" href="#cite_note-6"><span data-dcnode-id="3315" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3312" instrument_node="">
</span></p><p data-dcnode-id="3287"><span data-dcnode-id="3310" instrument_node="">Teri Shaffer Yamada, Ph.D., of </span><a class="mw-redirect" data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CSULB" title="CSULB"><span data-dcnode-id="3309" instrument_node="">CSULB</span></a><span data-dcnode-id="3307" instrument_node=""> agrees that a plot does not include memorable </span><a class="mw-redirect" data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scene_%28drama%29" title="Scene (drama)"><span data-dcnode-id="3306" instrument_node="">scenes</span></a><span data-dcnode-id="3304" instrument_node=""> within a story which do not relate directly to other events but only "major events that move the action in a narrative."</span><sup class="reference" data-dcnode-id="3301" id="cite_ref-7"><a data-dcnode-id="3302" href="#cite_note-7"><span data-dcnode-id="3303" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3300" instrument_node=""> For example, in the 1997 film </span><i data-dcnode-id="3297"><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titanic_%281997_film%29" title="Titanic (1997 film)"><span data-dcnode-id="3299" instrument_node="">Titanic</span></a></i><span data-dcnode-id="3296" instrument_node="">, when Rose climbs on the railing at the front of the ship and spreads her hands as if she's flying, this scene is memorable but does not directly influence other events, so it may not be considered as part of the plot. Another example of a memorable scene which is not part of the plot occurs in the 1980 film </span><i data-dcnode-id="3293"><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Empire_Strikes_Back" title="The Empire Strikes Back"><span data-dcnode-id="3295" instrument_node="">The Empire Strikes Back</span></a></i><span data-dcnode-id="3292" instrument_node="">, when Han Solo is frozen in carbonite.</span><sup class="reference" data-dcnode-id="3289" id="cite_ref-dibell_1-2"><a data-dcnode-id="3290" href="#cite_note-dibell-1"><span data-dcnode-id="3291" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3288" instrument_node="">
</span></p><span data-dcnode-id="3286" instrument_node="">
</span><h3 data-dcnode-id="3276"><span class="mw-headline" data-dcnode-id="3284" id="Fabula_and_syuzhet"><span data-dcnode-id="3285" instrument_node="">Fabula and syuzhet</span></span><span class="mw-editsection" data-dcnode-id="3277"><span class="mw-editsection-bracket" data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">[</span></span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D2" title="Edit section: Fabula and syuzhet"><span data-dcnode-id="3281" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3275" instrument_node="">
</span><link data-dcnode-id="3274" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3270" role="note"><span data-dcnode-id="3273" instrument_node="">Main article: </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fabula_and_syuzhet" title="Fabula and syuzhet"><span data-dcnode-id="3272" instrument_node="">Fabula and syuzhet</span></a></div><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3268" instrument_node="">The literary theory of </span><a class="mw-redirect" data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Formalism" title="Russian Formalism"><span data-dcnode-id="3267" instrument_node="">Russian Formalism</span></a><span data-dcnode-id="3265" instrument_node=""> in the early 20th century divided a narrative into two elements: the </span><i data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">fabula</span></i><span data-dcnode-id="3262" instrument_node=""> (фа́була) and the </span><i data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">syuzhet</span></i><span data-dcnode-id="3259" instrument_node=""> (сюже́т), or the "raw material" and the "way it is organized". A fabula is the events in the fictional world, whereas a syuzhet is a perspective of those events. Formalist followers eventually translated the fabula/syuzhet to the concept of story/plot. This definition is usually used in narratology, in parallel with Forster's definition. The </span><i data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">fabula</span></i><span data-dcnode-id="3256" instrument_node=""> (story) is what happened in chronological order. In contrast, the </span><i data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">syuzhet</span></i><span data-dcnode-id="3253" instrument_node=""> (plot) means a unique sequence of discourse that was sorted out by the (implied) author. That is, the syuzhet can consist of picking up the fabula events in non-chronological order; for example, fabula is ⟨a</span><sub data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">1</span></sub><span data-dcnode-id="3250" instrument_node="">, a</span><sub data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">2</span></sub><span data-dcnode-id="3247" instrument_node="">, a</span><sub data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">3</span></sub><span data-dcnode-id="3244" instrument_node="">, a</span><sub data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">4</span></sub><span data-dcnode-id="3241" instrument_node="">, a</span><sub data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">5</span></sub><span data-dcnode-id="3238" instrument_node="">, ..., a</span><sub data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">n</span></sub><span data-dcnode-id="3235" instrument_node="">⟩, syuzhet is ⟨a</span><sub data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">5</span></sub><span data-dcnode-id="3232" instrument_node="">, a</span><sub data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">1</span></sub><span data-dcnode-id="3229" instrument_node="">, a</span><sub data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">3</span></sub><span data-dcnode-id="3226" instrument_node="">⟩.
</span></p><p data-dcnode-id="3203"><span data-dcnode-id="3224" instrument_node="">The </span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_formalism" title="Russian formalism"><span data-dcnode-id="3223" instrument_node="">Russian formalist</span></a><span data-dcnode-id="3221" instrument_node="">, </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Shklovsky" title="Viktor Shklovsky"><span data-dcnode-id="3220" instrument_node="">Viktor Shklovsky</span></a><span data-dcnode-id="3218" instrument_node="">, viewed the syuzhet as the fabula defamiliarized. </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defamiliarization" title="Defamiliarization"><span data-dcnode-id="3217" instrument_node="">Defamiliarization</span></a><span data-dcnode-id="3215" instrument_node=""> or "making strange," a term Shklovsky coined and popularized, upends familiar ways of presenting a story, slows down the reader's perception, and makes the story appear unfamiliar.</span><sup class="reference" data-dcnode-id="3212" id="cite_ref-8"><a data-dcnode-id="3213" href="#cite_note-8"><span data-dcnode-id="3214" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3211" instrument_node=""> Shklovsky cites Lawrence Sterne's </span><a class="mw-redirect" data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tristram_Shandy" title="Tristram Shandy"><span data-dcnode-id="3210" instrument_node="">Tristram Shandy</span></a><span data-dcnode-id="3208" instrument_node=""> as an example of a fabula that has been defamiliarized.</span><sup class="reference" data-dcnode-id="3205" id="cite_ref-9"><a data-dcnode-id="3206" href="#cite_note-9"><span data-dcnode-id="3207" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3204" instrument_node=""> Sterne uses temporal displacements, digressions, and causal disruptions (for example, placing the effects before their causes) to slow down the reader's ability to reassemble the (familiar) story. As a result, the syuzhet "makes strange" the fabula.
</span></p><span data-dcnode-id="3202" instrument_node="">
</span><h2 data-dcnode-id="3192"><span class="mw-headline" data-dcnode-id="3200" id="Examples"><span data-dcnode-id="3201" instrument_node="">Examples</span></span><span class="mw-editsection" data-dcnode-id="3193"><span class="mw-editsection-bracket" data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">[</span></span><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D3" title="Edit section: Examples"><span data-dcnode-id="3197" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3191" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3182"><div class="thumbinner" data-dcnode-id="3183" style="width:156px;"><a class="image" data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACinderella_1865_%286%29.png"><img alt="" class="thumbimage" data-dcnode-id="3190" data-file-height="2752" data-file-width="2014" decoding="async" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Cinderella_1865_%25286%2529.png/154px-Cinderella_1865_%25286%2529.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Cinderella_1865_%286%29.png/230px-Cinderella_1865_%286%29.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/76/Cinderella_1865_%286%29.png/307px-Cinderella_1865_%286%29.png 2x" width="154"></a><span data-dcnode-id="3188" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3184"><div class="magnify" data-dcnode-id="3186"><a class="internal" data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACinderella_1865_%286%29.png" title="Enlarge"></a></div><span data-dcnode-id="3185" instrument_node="">Cinderella</span></div></div></div><span data-dcnode-id="3181" instrument_node="">
</span><h3 data-dcnode-id="3171"><span class="mw-headline" data-dcnode-id="3179" id="Cinderella"><span data-dcnode-id="3180" instrument_node="">Cinderella</span></span><span class="mw-editsection" data-dcnode-id="3172"><span class="mw-editsection-bracket" data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">[</span></span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D4" title="Edit section: Cinderella"><span data-dcnode-id="3176" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3164"><span data-dcnode-id="3169" instrument_node="">A story orders events from beginning to end in a time sequence.</span><sup class="reference" data-dcnode-id="3166" id="cite_ref-dibell_1-3"><a data-dcnode-id="3167" href="#cite_note-dibell-1"><span data-dcnode-id="3168" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3165" instrument_node="">
</span></p><p data-dcnode-id="3159"><span data-dcnode-id="3163" instrument_node="">Consider the following events in the European folk tale "</span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cinderella" title="Cinderella"><span data-dcnode-id="3162" instrument_node="">Cinderella</span></a><span data-dcnode-id="3160" instrument_node="">":
</span></p><span data-dcnode-id="3158" instrument_node="">
</span><ul data-dcnode-id="3149"><li data-dcnode-id="3153"><span data-dcnode-id="3157" instrument_node="">The prince searches for Cinderella with the glass shoe
</span><ul data-dcnode-id="3154"><li data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Cinderella's sisters try the shoe on themselves but it does not fit them</span></li></ul></li><span data-dcnode-id="3152" instrument_node="">
</span><li data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">The shoe fits Cinderella's foot so the prince finds her</span></li></ul><span data-dcnode-id="3148" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3147" instrument_node="">The first event is causally related to the third event, while the second event, though descriptive, does not directly impact the outcome. As a result, according to </span><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ansen_Dibell" title="Ansen Dibell"><span data-dcnode-id="3146" instrument_node="">Ansen Dibell</span></a><span data-dcnode-id="3144" instrument_node="">, the plot can be described as the first event "and so" the last event, while the story can be described by all three events in order.
</span></p><span data-dcnode-id="3142" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3132"><div class="thumbinner" data-dcnode-id="3133" style="width:222px;"><a class="image" data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWizardOfOz2.jpg"><img alt="" class="thumbimage" data-dcnode-id="3141" data-file-height="648" data-file-width="914" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/WizardOfOz2.jpg/220px-WizardOfOz2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/WizardOfOz2.jpg/330px-WizardOfOz2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8d/WizardOfOz2.jpg/440px-WizardOfOz2.jpg 2x" width="220"></a><span data-dcnode-id="3139" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3134"><div class="magnify" data-dcnode-id="3137"><a class="internal" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWizardOfOz2.jpg" title="Enlarge"></a></div><i data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">The Wizard of Oz</span></i></div></div></div><span data-dcnode-id="3131" instrument_node="">
</span><h3 data-dcnode-id="3120"><span class="mw-headline" data-dcnode-id="3128" id="The_Wizard_of_Oz"><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">The Wizard of Oz</span></i></span><span class="mw-editsection" data-dcnode-id="3121"><span class="mw-editsection-bracket" data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">[</span></span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D5" title="Edit section: The Wizard of Oz"><span data-dcnode-id="3125" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3118" instrument_node="">Steve Alcorn, a fiction-writing coach, says that the main plot elements of the 1939 film </span><i data-dcnode-id="3115"><a data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wizard_of_Oz_%281939_film%29" title="The Wizard of Oz (1939 film)"><span data-dcnode-id="3117" instrument_node="">The Wizard of Oz</span></a></i><span data-dcnode-id="3114" instrument_node=""> are easy to find, and include:</span><sup class="reference" data-dcnode-id="3111" id="cite_ref-alcorn_10-0"><a data-dcnode-id="3112" href="#cite_note-alcorn-10"><span data-dcnode-id="3113" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3110" instrument_node="">
</span></p><span data-dcnode-id="3108" instrument_node="">
</span><ol data-dcnode-id="3096"><li data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">A tornado picks up a house and drops it on a witch</span></li><span data-dcnode-id="3105" instrument_node="">
</span><li data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">A little girl meets some interesting traveling companions</span></li><span data-dcnode-id="3102" instrument_node="">
</span><li data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">A wizard sends them on a mission</span></li><span data-dcnode-id="3099" instrument_node="">
</span><li data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">They melt a witch with a bucket of water</span></li></ol><span data-dcnode-id="3095" instrument_node="">
</span><h2 data-dcnode-id="3085"><span class="mw-headline" data-dcnode-id="3093" id="Concepts"><span data-dcnode-id="3094" instrument_node="">Concepts</span></span><span class="mw-editsection" data-dcnode-id="3086"><span class="mw-editsection-bracket" data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">[</span></span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D6" title="Edit section: Concepts"><span data-dcnode-id="3090" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3084" instrument_node="">
</span><h3 data-dcnode-id="3074"><span class="mw-headline" data-dcnode-id="3082" id="Structure_and_treatment"><span data-dcnode-id="3083" instrument_node="">Structure and treatment</span></span><span class="mw-editsection" data-dcnode-id="3075"><span class="mw-editsection-bracket" data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">[</span></span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D7" title="Edit section: Structure and treatment"><span data-dcnode-id="3079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3073" instrument_node="">
</span><link data-dcnode-id="3072" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3068" role="note"><span data-dcnode-id="3071" instrument_node="">See also: </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dramatic_structure" title="Dramatic structure"><span data-dcnode-id="3070" instrument_node="">Dramatic structure</span></a></div><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3066" instrument_node="">Dramatic structure is the philosophy by which the story is split and how the story is thought of. This can vary by ethnicity, region and time period. This can be applied to book, plays, and films. Some philosophers/critics have included Aristotle, Horace, Aelius Donatus, Gustav Freytag, Kenneth Thorpe Rowe, Lajos Egri, Syd Field, and others. Some story structures are so old that the originator cannot be found, such as </span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ta%2527zieh" title="Ta'zieh"><span data-dcnode-id="3065" instrument_node="">Ta'zieh</span></a><span data-dcnode-id="3063" instrument_node="">.
</span></p><p data-dcnode-id="3035"><span data-dcnode-id="3061" instrument_node="">Often in order to sell a script, the </span><i data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">plot structure</span></i><span data-dcnode-id="3058" instrument_node=""> is made into what is called a </span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_treatment" title="Film treatment"><i data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">treatment</span></i></a><span data-dcnode-id="3054" instrument_node="">. This can vary based on locality, but for Europe and European Diaspora, the </span><i data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">three-act structure</span></i><span data-dcnode-id="3051" instrument_node=""> is often used. The components of this structure are the </span><i data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">set-up</span></i><span data-dcnode-id="3048" instrument_node="">, the </span><i data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">confrontation</span></i><span data-dcnode-id="3045" instrument_node=""> and the </span><i data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">resolution</span></i><span data-dcnode-id="3042" instrument_node="">. Acts are connected by two </span><a data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plot_point" title="Plot point"><span data-dcnode-id="3041" instrument_node="">plot points</span></a><span data-dcnode-id="3039" instrument_node=""> or turning points, with the first turning point connecting Act I to Act II, and the second connecting Act II to Act III. The conception of the three-act structure has been attributed to American screenwriter </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syd_Field" title="Syd Field"><span data-dcnode-id="3038" instrument_node="">Syd Field</span></a><span data-dcnode-id="3036" instrument_node=""> who described plot structure in this tripartite way for film analysis.
</span></p><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Furthermore, in order to sell a book within the United States, United Kingdom, Canada, New Zealand, and Australia, often the plot structure is split into a synopsis. Again the plot structure may vary by genre or drama structure used.
</span></p><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Two examples of philosophers about story structure are Aristotle and Gustave Freytag.
</span></p><span data-dcnode-id="3030" instrument_node="">
</span><h4 data-dcnode-id="3020"><span class="mw-headline" data-dcnode-id="3028" id="Aristotle"><span data-dcnode-id="3029" instrument_node="">Aristotle</span></span><span class="mw-editsection" data-dcnode-id="3021"><span class="mw-editsection-bracket" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">[</span></span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D8" title="Edit section: Aristotle"><span data-dcnode-id="3025" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3019" instrument_node="">
</span><link data-dcnode-id="3018" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3014" role="note"><span data-dcnode-id="3017" instrument_node="">Main article: </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dramatic_structure" title="Dramatic structure"><span data-dcnode-id="3016" instrument_node="">Dramatic structure</span></a></div><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3012" instrument_node="">Many scholars have analyzed dramatic structure, beginning with </span><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristotle" title="Aristotle"><span data-dcnode-id="3011" instrument_node="">Aristotle</span></a><span data-dcnode-id="3009" instrument_node=""> in his </span><i data-dcnode-id="3006"><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poetics_%28Aristotle%29" title="Poetics (Aristotle)"><span data-dcnode-id="3008" instrument_node="">Poetics</span></a></i><span data-dcnode-id="3005" instrument_node=""> (c. 335 BCE). 
</span></p><p data-dcnode-id="2988"><span data-dcnode-id="3003" instrument_node="">In his </span><i data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Poetics</span></i><span data-dcnode-id="3000" instrument_node="">, a theory about tragedies, the </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greece" title="Ancient Greece"><span data-dcnode-id="2999" instrument_node="">Greek</span></a><span data-dcnode-id="2997" instrument_node=""> philosopher Aristotle put forth the idea the play should imitate a single whole action. "A whole is what has a beginning and middle and end" (1450b27).</span><sup class="reference" data-dcnode-id="2994" id="cite_ref-fall2_11-0"><a data-dcnode-id="2995" href="#cite_note-fall2-11"><span data-dcnode-id="2996" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2993" instrument_node=""> He split the play into two acts: complication and denouement. </span><sup class="reference" data-dcnode-id="2990" id="cite_ref-12"><a data-dcnode-id="2991" href="#cite_note-12"><span data-dcnode-id="2992" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2989" instrument_node=""> He mainly used Sophicles to make his argument about the proper dramatic structure of a play.
</span></p><p data-dcnode-id="2947"><span data-dcnode-id="2987" instrument_node="">Two types of </span><a class="mw-redirect" data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scene_%28drama%29" title="Scene (drama)"><span data-dcnode-id="2986" instrument_node="">scenes</span></a><span data-dcnode-id="2984" instrument_node=""> are of special interest:  the reversal, which throws the action in a new direction, and the recognition, meaning the protagonist has an important revelation.</span><sup class="reference" data-dcnode-id="2981" id="cite_ref-13"><a data-dcnode-id="2982" href="#cite_note-13"><span data-dcnode-id="2983" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2980" instrument_node="">  Reversals should happen as a necessary and probable cause of what happened before, which implies that turning points need to be properly set up.</span><sup class="reference" data-dcnode-id="2977" id="cite_ref-14"><a data-dcnode-id="2978" href="#cite_note-14"><span data-dcnode-id="2979" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2976" instrument_node="">He ranked the order of importance of the play to be: Chorus, Events, Diction, Character, Spectacle.</span><sup class="reference" data-dcnode-id="2973" id="cite_ref-15"><a data-dcnode-id="2974" href="#cite_note-15"><span data-dcnode-id="2975" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2972" instrument_node=""> And that all plays should be able to be performed from memory, long and easy to understand. </span><sup class="reference" data-dcnode-id="2969" id="cite_ref-16"><a data-dcnode-id="2970" href="#cite_note-16"><span data-dcnode-id="2971" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2968" instrument_node=""> He was against character-centric plots stating “The Unity of a Plot does not consist, as some suppose, in its having one man as its subject.”</span><sup class="reference" data-dcnode-id="2965" id="cite_ref-17"><a data-dcnode-id="2966" href="#cite_note-17"><span data-dcnode-id="2967" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2964" instrument_node=""> He was against episodic plots.</span><sup class="reference" data-dcnode-id="2961" id="cite_ref-18"><a data-dcnode-id="2962" href="#cite_note-18"><span data-dcnode-id="2963" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2960" instrument_node=""> He held that discovery should be the high point of the play and that the action should teach a moral that is reenforced by pity, fear and suffering.</span><sup class="reference" data-dcnode-id="2957" id="cite_ref-19"><a data-dcnode-id="2958" href="#cite_note-19"><span data-dcnode-id="2959" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2956" instrument_node=""> The spectacle, not the characters themselves would give rise to the emotions. </span><sup class="reference" data-dcnode-id="2953" id="cite_ref-20"><a data-dcnode-id="2954" href="#cite_note-20"><span data-dcnode-id="2955" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2952" instrument_node=""> The stage should also be split into “Prologue, Episode, Exode, and a choral portion, distinguished into Parode and Stasimon...“</span><sup class="reference" data-dcnode-id="2949" id="cite_ref-21"><a data-dcnode-id="2950" href="#cite_note-21"><span data-dcnode-id="2951" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2948" instrument_node="">
</span></p><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Unlike later, he held that the morality was the center of the play and what made it great. Unlike popular belief, he did not come up with the three act structure popularly known.
</span></p><span data-dcnode-id="2944" instrument_node="">
</span><h4 data-dcnode-id="2934"><span class="mw-headline" data-dcnode-id="2942" id="Gustav_Freytag"><span data-dcnode-id="2943" instrument_node="">Gustav Freytag</span></span><span class="mw-editsection" data-dcnode-id="2935"><span class="mw-editsection-bracket" data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">[</span></span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D9" title="Edit section: Gustav Freytag"><span data-dcnode-id="2939" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2933" instrument_node="">
</span><link data-dcnode-id="2932" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2928" role="note"><span data-dcnode-id="2931" instrument_node="">Main article: </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dramatic_structure" title="Dramatic structure"><span data-dcnode-id="2930" instrument_node="">Dramatic structure</span></a></div><span data-dcnode-id="2927" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2915"><div class="thumbinner" data-dcnode-id="2916" style="width:222px;"><a class="image" data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFreytag%2527s_Pyramid_with_English_text.svg"><img alt="" class="thumbimage" data-dcnode-id="2926" data-file-height="384" data-file-width="512" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/96/Freytag%2527s_Pyramid_with_English_text.svg/220px-Freytag%2527s_Pyramid_with_English_text.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/96/Freytag%27s_Pyramid_with_English_text.svg/330px-Freytag%27s_Pyramid_with_English_text.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/96/Freytag%27s_Pyramid_with_English_text.svg/440px-Freytag%27s_Pyramid_with_English_text.svg.png 2x" width="220"></a><span data-dcnode-id="2924" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2917"><div class="magnify" data-dcnode-id="2922"><a class="internal" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFreytag%2527s_Pyramid_with_English_text.svg" title="Enlarge"></a></div><span data-dcnode-id="2921" instrument_node="">Freytag's pyramid</span><sup class="reference" data-dcnode-id="2918" id="cite_ref-22"><a data-dcnode-id="2919" href="#cite_note-22"><span data-dcnode-id="2920" instrument_node="">[22]</span></a></sup></div></div></div><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2888"><span data-dcnode-id="2913" instrument_node="">The </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="2912" instrument_node="">German</span></a><span data-dcnode-id="2910" instrument_node=""> playwright and novelist </span><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustav_Freytag" title="Gustav Freytag"><span data-dcnode-id="2909" instrument_node="">Gustav Freytag</span></a><span data-dcnode-id="2907" instrument_node=""> wrote </span><i data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Die Technik des Dramas</span></i><span data-dcnode-id="2904" instrument_node="">,</span><sup class="reference" data-dcnode-id="2901" id="cite_ref-23"><a data-dcnode-id="2902" href="#cite_note-23"><span data-dcnode-id="2903" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2900" instrument_node=""> a definitive study of the five-act dramatic structure, in which he laid out what has come to be known as Freytag's pyramid.</span><sup class="reference" data-dcnode-id="2897" id="cite_ref-fall3_24-0"><a data-dcnode-id="2898" href="#cite_note-fall3-24"><span data-dcnode-id="2899" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2896" instrument_node=""> Under Freytag's pyramid, the plot of a story consists of five parts:</span><sup class="reference" data-dcnode-id="2893" id="cite_ref-fall4_25-0"><a data-dcnode-id="2894" href="#cite_note-fall4-25"><span data-dcnode-id="2895" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="2890" id="cite_ref-26"><a data-dcnode-id="2891" href="#cite_note-26"><span data-dcnode-id="2892" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2889" instrument_node="">
</span></p><span data-dcnode-id="2887" instrument_node="">
</span><ol data-dcnode-id="2858"><li data-dcnode-id="2883"><a class="mw-redirect" data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_%28literary_technique%29" title="Exposition (literary technique)"><span data-dcnode-id="2886" instrument_node="">Exposition</span></a><span data-dcnode-id="2884" instrument_node=""> (originally called introduction)</span></li><span data-dcnode-id="2882" instrument_node="">
</span><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Rising action (rise)</span></li><span data-dcnode-id="2879" instrument_node="">
</span><li data-dcnode-id="2876"><a data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climax_%28narrative%29" title="Climax (narrative)"><span data-dcnode-id="2878" instrument_node="">Climax</span></a></li><span data-dcnode-id="2875" instrument_node="">
</span><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Falling action (return or fall)</span></li><span data-dcnode-id="2872" instrument_node="">
</span><li data-dcnode-id="2859"><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catastrophe_%28drama%29" title="Catastrophe (drama)"><span data-dcnode-id="2871" instrument_node="">Catastrophe</span></a><span data-dcnode-id="2869" instrument_node="">, denouement, resolution, or </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reveal_%28narrative%29" title="Reveal (narrative)"><span data-dcnode-id="2868" instrument_node="">revelation</span></a><sup class="reference" data-dcnode-id="2864" id="cite_ref-27"><a data-dcnode-id="2865" href="#cite_note-27"><span data-dcnode-id="2866" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2863" instrument_node=""> or "rising and sinking". Freytag is indifferent as to which of the contending parties justice favors; in both groups, good and evil, power and weakness, are mingled.</span><sup class="reference" data-dcnode-id="2860" id="cite_ref-28"><a data-dcnode-id="2861" href="#cite_note-28"><span data-dcnode-id="2862" instrument_node="">[28]</span></a></sup></li></ol><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2856" instrument_node="">A drama is then divided into five parts, or acts, which some refer to as a </span><b data-dcnode-id="2849"><span class="vanchor" data-dcnode-id="2850"><span data-dcnode-id="2853" id="dramatic_arc"></span><span class="vanchor-text" data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">dramatic arc</span></span></span></b><span data-dcnode-id="2848" instrument_node="">: exposition, rising action, climax, falling action, and </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catastrophe_%28drama%29" title="Catastrophe (drama)"><span data-dcnode-id="2847" instrument_node="">catastrophe</span></a><span data-dcnode-id="2845" instrument_node="">. Freytag extends the five parts with three moments or crises: the exciting force, the tragic force, and the force of the final suspense. The exciting force leads to the rising action, the tragic force leads to the falling action, and the force of the final suspense leads to the catastrophe. Freytag considers the exciting force to be necessary but the tragic force and the force of the final suspense are optional. Together, they make the eight component parts of the drama.</span><sup class="reference" data-dcnode-id="2842" id="cite_ref-29"><a data-dcnode-id="2843" href="#cite_note-29"><span data-dcnode-id="2844" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2841" instrument_node="">
</span></p><p data-dcnode-id="2834"><span data-dcnode-id="2839" instrument_node="">In making his argument, he attempts to retcon much of the Greeks and Shakespeare by making opinions of what they meant, but didn't actually say.</span><sup class="reference" data-dcnode-id="2836" id="cite_ref-30"><a data-dcnode-id="2837" href="#cite_note-30"><span data-dcnode-id="2838" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2835" instrument_node="">
</span></p><p data-dcnode-id="2820"><span data-dcnode-id="2833" instrument_node="">He argued for tension created through contrasting emotions, but didn't actively argue for conflict.</span><sup class="reference" data-dcnode-id="2830" id="cite_ref-31"><a data-dcnode-id="2831" href="#cite_note-31"><span data-dcnode-id="2832" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2829" instrument_node=""> He was argued that character comes first in plays.</span><sup class="reference" data-dcnode-id="2826" id="cite_ref-32"><a data-dcnode-id="2827" href="#cite_note-32"><span data-dcnode-id="2828" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2825" instrument_node=""> He also sets up the groundwork for what would later in history be called the inciting incident.</span><sup class="reference" data-dcnode-id="2822" id="cite_ref-33"><a data-dcnode-id="2823" href="#cite_note-33"><span data-dcnode-id="2824" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2821" instrument_node="">
</span></p><p data-dcnode-id="2814"><span data-dcnode-id="2819" instrument_node="">Overall, Freytag argued the center of a play is emotionality and the best way to get that emotionality is to put contrasting emotions back to back. He laid some of the foundations for centering the hero, unlike Aristotle. He is popularly attributed to have stated conflict at the center of his plays, but he argues actively against continuing conflict.</span><sup class="reference" data-dcnode-id="2816" id="cite_ref-34"><a data-dcnode-id="2817" href="#cite_note-34"><span data-dcnode-id="2818" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2815" instrument_node="">
</span></p><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Parts:
</span></p><p data-dcnode-id="2808"><b data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Introduction</span></b><span data-dcnode-id="2809" instrument_node="">
</span></p><span data-dcnode-id="2807" instrument_node="">
</span><link data-dcnode-id="2806" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2802" role="note"><span data-dcnode-id="2805" instrument_node="">Main article: </span><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_%28narrative%29" title="Exposition (narrative)"><span data-dcnode-id="2804" instrument_node="">Exposition (narrative)</span></a></div><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2800" instrument_node="">The setting is fixed in a particular place and time, the mood is set, and characters are introduced. A backstory may be alluded to. Exposition can be conveyed through dialogues, flashbacks, characters' asides, background details, in-universe media, or the narrator telling a back-story.</span><sup class="reference" data-dcnode-id="2797" id="cite_ref-35"><a data-dcnode-id="2798" href="#cite_note-35"><span data-dcnode-id="2799" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2796" instrument_node="">
</span></p><p data-dcnode-id="2791"><b data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Rise</span></b><span data-dcnode-id="2792" instrument_node="">
</span></p><span data-dcnode-id="2790" instrument_node="">
</span><link data-dcnode-id="2789" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2781" role="note"><span data-dcnode-id="2788" instrument_node="">For the </span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wicked_%252B_The_Divine" title="The Wicked + The Divine"><span data-dcnode-id="2787" instrument_node="">The Wicked + The Divine</span></a><span data-dcnode-id="2785" instrument_node=""> story arc, see </span><a class="new" data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRising_Action_%28comics%29%26action%3Dedit%26redlink%3D1" title="Rising Action (comics) (page does not exist)"><span data-dcnode-id="2784" instrument_node="">Rising Action (comics)</span></a><span data-dcnode-id="2782" instrument_node="">.</span></div><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2779" instrument_node="">An exciting force begins immediately after the exposition (introduction), building the rising action in one or several stages toward the point of greatest interest. These events are generally the most important parts of the story since the entire plot depends on them to set up the climax and ultimately the satisfactory resolution of the story itself.</span><sup class="reference" data-dcnode-id="2776" id="cite_ref-36"><a data-dcnode-id="2777" href="#cite_note-36"><span data-dcnode-id="2778" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2775" instrument_node="">
</span></p><p data-dcnode-id="2770"><b data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Climax</span></b><span data-dcnode-id="2771" instrument_node="">
</span></p><span data-dcnode-id="2769" instrument_node="">
</span><link data-dcnode-id="2768" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2764" role="note"><span data-dcnode-id="2767" instrument_node="">Main article: </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climax_%28narrative%29" title="Climax (narrative)"><span data-dcnode-id="2766" instrument_node="">Climax (narrative)</span></a></div><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2762" instrument_node="">The climax is the turning point, which changes the protagonist's fate. If things were going well for the protagonist, the plot will turn against them, often revealing the protagonist's hidden weaknesses.</span><sup class="reference" data-dcnode-id="2759" id="cite_ref-37"><a data-dcnode-id="2760" href="#cite_note-37"><span data-dcnode-id="2761" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2758" instrument_node=""> If the story is a comedy, the opposite state of affairs will ensue, with things going from bad to good for the protagonist, often requiring the protagonist to draw on hidden inner strengths.
</span></p><p data-dcnode-id="2743"><b data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Return or Fall</span></b><span data-dcnode-id="2754" instrument_node="">
During the Return, the hostility of the counter-party beats upon the soul of the hero. Freytag lays out two rules for this stage: the number of characters be limited as much as possible, and the number of scenes through which the hero falls should be fewer than in the rising movement. The falling action may contain a moment of final suspense: Although the catastrophe must be </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreshadowing" title="Foreshadowing"><span data-dcnode-id="2753" instrument_node="">foreshadowed</span></a><span data-dcnode-id="2751" instrument_node=""> so as not to appear as a </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non_sequitur_%28literary_device%29" title="Non sequitur (literary device)"><span data-dcnode-id="2750" instrument_node="">non sequitur</span></a><span data-dcnode-id="2748" instrument_node="">, there could be for the doomed hero a prospect of relief, where the final outcome is in doubt.</span><sup class="reference" data-dcnode-id="2745" id="cite_ref-38"><a data-dcnode-id="2746" href="#cite_note-38"><span data-dcnode-id="2747" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2744" instrument_node="">
</span></p><p data-dcnode-id="2739"><b data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Catastrophe</span></b><span data-dcnode-id="2740" instrument_node="">
</span></p><span data-dcnode-id="2738" instrument_node="">
</span><link data-dcnode-id="2737" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2733" role="note"><span data-dcnode-id="2736" instrument_node="">Main article: </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catastrophe_%28drama%29" title="Catastrophe (drama)"><span data-dcnode-id="2735" instrument_node="">Catastrophe (drama)</span></a></div><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2731" instrument_node="">The catastrophe ("Katastrophe" in the original)</span><sup class="reference" data-dcnode-id="2728" id="cite_ref-39"><a data-dcnode-id="2729" href="#cite_note-39"><span data-dcnode-id="2730" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2727" instrument_node=""> is where the hero meets his logical destruction. Freytag warns the writer not to spare the life of the hero.</span><sup class="reference" data-dcnode-id="2724" id="cite_ref-40"><a data-dcnode-id="2725" href="#cite_note-40"><span data-dcnode-id="2726" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2723" instrument_node=""> More generally, the final result of a work's main plot has been known in English since 1705 as the </span><b data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">denouement</span></b><span data-dcnode-id="2720" instrument_node=""> (</span><span class="rt-commentedText nowrap" data-dcnode-id="2688"><small data-dcnode-id="2716"><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_English" title="British English"><span data-dcnode-id="2719" instrument_node="">UK</span></a><span data-dcnode-id="2717" instrument_node="">: </span></small><span class="IPA nopopups noexcerpt" data-dcnode-id="2689"><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/English" title="Help:IPA/English"><span data-dcnode-id="2715" instrument_node="">/</span><span data-dcnode-id="2700" style="border-bottom:1px dotted"><span data-dcnode-id="2713" title="'d' in 'dye'"><span data-dcnode-id="2714" instrument_node="">d</span></span><span data-dcnode-id="2711" title="/eɪ/: 'a' in 'face'"><span data-dcnode-id="2712" instrument_node="">eɪ</span></span><span data-dcnode-id="2709" title="/ˈ/: primary stress follows"><span data-dcnode-id="2710" instrument_node="">ˈ</span></span><span data-dcnode-id="2707" title="'n' in 'nigh'"><span data-dcnode-id="2708" instrument_node="">n</span></span><span data-dcnode-id="2705" title="/uː/: 'oo' in 'goose'"><span data-dcnode-id="2706" instrument_node="">uː</span></span><span data-dcnode-id="2703" title="'m' in 'my'"><span data-dcnode-id="2704" instrument_node="">m</span></span><span data-dcnode-id="2701" title="/ɒ̃/: nasal 'an' in 'vin blanc'"><span data-dcnode-id="2702" instrument_node="">ɒ̃</span></span></span><span data-dcnode-id="2699" instrument_node="">,</span><span class="wrap" data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node=""> </span></span><span data-dcnode-id="2692" style="border-bottom:1px dotted"><span data-dcnode-id="2695" title="'d' in 'dye'"><span data-dcnode-id="2696" instrument_node="">d</span></span><span data-dcnode-id="2693" title="/ɪ/: 'i' in 'kit'"><span data-dcnode-id="2694" instrument_node="">ɪ</span></span></span><span data-dcnode-id="2691" instrument_node="">-/</span></a></span></span><span data-dcnode-id="2687" instrument_node="">, </span><span class="rt-commentedText nowrap" data-dcnode-id="2661"><small data-dcnode-id="2683"><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_English" title="American English"><span data-dcnode-id="2686" instrument_node="">US</span></a><span data-dcnode-id="2684" instrument_node="">: </span></small><span class="IPA nopopups noexcerpt" data-dcnode-id="2662"><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/English" title="Help:IPA/English"><span data-dcnode-id="2682" instrument_node="">/</span><span data-dcnode-id="2665" style="border-bottom:1px dotted"><span data-dcnode-id="2680" title="/ˌ/: secondary stress follows"><span data-dcnode-id="2681" instrument_node="">ˌ</span></span><span data-dcnode-id="2678" title="'d' in 'dye'"><span data-dcnode-id="2679" instrument_node="">d</span></span><span data-dcnode-id="2676" title="/eɪ/: 'a' in 'face'"><span data-dcnode-id="2677" instrument_node="">eɪ</span></span><span data-dcnode-id="2674" title="'n' in 'nigh'"><span data-dcnode-id="2675" instrument_node="">n</span></span><span data-dcnode-id="2672" title="/uː/: 'oo' in 'goose'"><span data-dcnode-id="2673" instrument_node="">uː</span></span><span data-dcnode-id="2670" title="/ˈ/: primary stress follows"><span data-dcnode-id="2671" instrument_node="">ˈ</span></span><span data-dcnode-id="2668" title="'m' in 'my'"><span data-dcnode-id="2669" instrument_node="">m</span></span><span data-dcnode-id="2666" title="/ɒ̃/: nasal 'an' in 'vin blanc'"><span data-dcnode-id="2667" instrument_node="">ɒ̃</span></span></span><span data-dcnode-id="2664" instrument_node="">/</span></a></span></span><span data-dcnode-id="2660" instrument_node="">;</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-41"><a data-dcnode-id="2658" href="#cite_note-41"><span data-dcnode-id="2659" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2656" instrument_node="">). It comprises events from the end of the falling action to the actual ending scene of the drama or narrative. Conflicts are resolved, creating normality for the characters and a sense of </span><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catharsis" title="Catharsis"><span data-dcnode-id="2655" instrument_node="">catharsis</span></a><span data-dcnode-id="2653" instrument_node="">, or release of tension and anxiety, for the reader. </span><a data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Etymology" title="Etymology"><span data-dcnode-id="2652" instrument_node="">Etymologically</span></a><span data-dcnode-id="2650" instrument_node="">, the French word </span><span data-dcnode-id="2647" title="French-language text"><i data-dcnode-id="2648" lang="fr"><span data-dcnode-id="2649" instrument_node="">dénouement</span></i></span><span data-dcnode-id="2646" instrument_node=""> (</span><small data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">French:&nbsp;</span></small><span class="IPA" data-dcnode-id="2641" title="Representation in the International Phonetic Alphabet (IPA)"><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/French" title="Help:IPA/French"><span data-dcnode-id="2643" instrument_node="">[denumɑ̃]</span></a></span><span data-dcnode-id="2640" instrument_node="">) is derived from the word </span><span data-dcnode-id="2637" title="French-language text"><i data-dcnode-id="2638" lang="fr"><span data-dcnode-id="2639" instrument_node="">dénouer</span></i></span><span data-dcnode-id="2636" instrument_node="">, "to untie", from </span><span data-dcnode-id="2633" title="Latin-language text"><i data-dcnode-id="2634" lang="la"><span data-dcnode-id="2635" instrument_node="">nodus</span></i></span><span data-dcnode-id="2632" instrument_node="">, Latin for "knot." It is the unraveling or untying of the complexities of a plot.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2625" style="white-space:nowrap;"><span data-dcnode-id="2631" instrument_node="">[</span><i data-dcnode-id="2627"><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2629" title="This claim needs references to reliable sources. (November 2016)"><span data-dcnode-id="2630" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2626" instrument_node="">]</span></sup><span data-dcnode-id="2624" instrument_node="">
</span></p><span data-dcnode-id="2622" instrument_node="">
</span><h3 data-dcnode-id="2612"><span class="mw-headline" data-dcnode-id="2620" id="Plot_devices"><span data-dcnode-id="2621" instrument_node="">Plot devices</span></span><span class="mw-editsection" data-dcnode-id="2613"><span class="mw-editsection-bracket" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">[</span></span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D10" title="Edit section: Plot devices"><span data-dcnode-id="2617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2611" instrument_node="">
</span><link data-dcnode-id="2610" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2606" role="note"><span data-dcnode-id="2609" instrument_node="">Main article: </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plot_device" title="Plot device"><span data-dcnode-id="2608" instrument_node="">Plot device</span></a></div><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2604" instrument_node="">A </span><i data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">plot device</span></i><span data-dcnode-id="2601" instrument_node=""> is a means of advancing the plot in a story. It is often used to motivate characters, create urgency, or resolve a difficulty. This can be contrasted with moving a story forward with dramatic technique; that is, by making things happen because characters take action for well-developed reasons. An example of a plot device would be when the cavalry shows up at the last moment and saves the day in a battle. In contrast, an adversarial character who has been struggling with himself and saves the day due to a change of heart would be considered dramatic technique.
</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2599" instrument_node="">Familiar types of plot devices include the </span><i data-dcnode-id="2596"><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deus_ex_machina" title="Deus ex machina"><span data-dcnode-id="2598" instrument_node="">deus ex machina</span></a></i><span data-dcnode-id="2595" instrument_node="">, the </span><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MacGuffin" title="MacGuffin"><span data-dcnode-id="2594" instrument_node="">MacGuffin</span></a><span data-dcnode-id="2592" instrument_node="">, the </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_herring" title="Red herring"><span data-dcnode-id="2591" instrument_node="">red herring</span></a><span data-dcnode-id="2589" instrument_node="">, and </span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chekhov%2527s_gun" title="Chekhov's gun"><span data-dcnode-id="2588" instrument_node="">Chekhov's gun</span></a><span data-dcnode-id="2586" instrument_node="">.
</span></p><span data-dcnode-id="2584" instrument_node="">
</span><h3 data-dcnode-id="2574"><span class="mw-headline" data-dcnode-id="2582" id="Plot_outline"><span data-dcnode-id="2583" instrument_node="">Plot outline</span></span><span class="mw-editsection" data-dcnode-id="2575"><span class="mw-editsection-bracket" data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">[</span></span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D11" title="Edit section: Plot outline"><span data-dcnode-id="2579" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2572" instrument_node="">A </span><i data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">plot outline</span></i><span data-dcnode-id="2569" instrument_node=""> is a prose telling of a story which can be turned into a screenplay. Sometimes it is called a "one page" because of its length. In comics, the roughs refer to a stage in the development where the story has been broken down very loosely in a style similar to storyboarding in film development. This stage is also referred to as storyboarding or layouts. In Japanese manga, this stage is called the </span><i data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">nemu</span></i><span data-dcnode-id="2566" instrument_node=""> (pronounced like the English word "name"). The roughs are quick sketches arranged within a suggested page layout. The main goals of roughs are to:
</span></p><span data-dcnode-id="2564" instrument_node="">
</span><ul data-dcnode-id="2552"><li data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">lay out the flow of panels across a page</span></li><span data-dcnode-id="2561" instrument_node="">
</span><li data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">ensure the story successfully builds suspense</span></li><span data-dcnode-id="2558" instrument_node="">
</span><li data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">work out points of view, camera angles, and character positions within panels</span></li><span data-dcnode-id="2555" instrument_node="">
</span><li data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">serve as a basis for the next stage of development, the "pencil" stage, where detailed drawings are produced in a more polished layout which will, in turn, serve as the basis for the inked drawings.</span></li></ul><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">In fiction writing, a plot outline gives a list of scenes. Scenes include events, character(s) and setting. Plot, therefore, shows the cause and effect of these things put together. The plot outline is a rough sketch of this cause and effect made by the scenes to lay out a "solid backbone and structure" to show why and how things happened as they did.
</span></p><span data-dcnode-id="2548" instrument_node="">
</span><h3 data-dcnode-id="2538"><span class="mw-headline" data-dcnode-id="2546" id="Plot_summary"><span data-dcnode-id="2547" instrument_node="">Plot summary</span></span><span class="mw-editsection" data-dcnode-id="2539"><span class="mw-editsection-bracket" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">[</span></span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D12" title="Edit section: Plot summary"><span data-dcnode-id="2543" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2536" instrument_node="">A </span><i data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">plot summary</span></i><span data-dcnode-id="2533" instrument_node=""> is a brief description of a piece of literature that explains what happens. In a plot summary, the author and title of the book should be referred to and it is usually no more than a paragraph long while summarizing the main points of the story.</span><sup class="reference" data-dcnode-id="2530" id="cite_ref-Duncan2006_42-0"><a data-dcnode-id="2531" href="#cite_note-Duncan2006-42"><span data-dcnode-id="2532" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="2527" id="cite_ref-EspinozaKaay2019_43-0"><a data-dcnode-id="2528" href="#cite_note-EspinozaKaay2019-43"><span data-dcnode-id="2529" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2526" instrument_node="">
</span></p><span data-dcnode-id="2524" instrument_node="">
</span><h3 data-dcnode-id="2514"><span class="mw-headline" data-dcnode-id="2522" id="A-Plot"><span data-dcnode-id="2523" instrument_node="">A-Plot</span></span><span class="mw-editsection" data-dcnode-id="2515"><span class="mw-editsection-bracket" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">[</span></span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlot_%28narrative%29%26action%3Dedit%26section%3D13" title="Edit section: A-Plot"><span data-dcnode-id="2519" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2512" instrument_node="">An </span><i data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">A-Plot</span></i><span data-dcnode-id="2509" instrument_node=""> is a </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film" title="Film"><span data-dcnode-id="2508" instrument_node="">cinema</span></a><span data-dcnode-id="2506" instrument_node=""> and </span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television" title="Television"><span data-dcnode-id="2505" instrument_node="">television</span></a><span data-dcnode-id="2503" instrument_node=""> term referring to the plotline that drives the story. This does not necessarily mean it is the most important, but rather the one that forces most of the action.
</span></p><span data-dcnode-id="2501" instrument_node="">
