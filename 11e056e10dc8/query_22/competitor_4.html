</span></div></div><div class="td_block_wrap tdb_single_content tdi_155 td-pb-border-top td_block_template_1 td-post-content tagdiv-type" data-dcnode-id="1092" data-td-block-uid="tdi_155"><span data-dcnode-id="1650" instrument_node="">
</span><div class="tdb-block-inner td-fix-index" data-dcnode-id="1093"><p data-dcnode-id="1645"><span data-dcnode-id="1646" style="font-weight: 400;"><span data-dcnode-id="1647" instrument_node="">In today’s Narrative Forge, Robert “TheChirurgeon” Jones and Evan “Felime” Siefring will be talking about the Missions and Agendas in Crusade, how they differ from Matched Play missions and rules, and what you need to know about playing them. We’ll take a little bit lighter touch than we do with our competitive play reviews since Crusade and Narrative play aren’t so much about crushing your enemies and seeing them driven before you as they are telling a good story.</span></span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" style="font-weight: 400;"><span data-dcnode-id="1643" instrument_node="">In broad strokes, the Crusade missions are simpler mechanically – typically with only a single objective – with secondary complexity instead coming from the agendas and other methods of gaining experience. They’re also a lot more willing to be asymmetrical or otherwise delve into mechanics that are thematic, but aren’t perfectly balanced. For the most part, though, they seem to have put a lot of thought into them and they don’t favor either player.</span></span></p><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" style="font-weight: 400;"><span data-dcnode-id="1639" instrument_node="">Agendas</span></span></h2><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" style="font-weight: 400;"><span data-dcnode-id="1635" instrument_node="">Agendas in Crusade missions replace the secondary objectives in standard Matched Play missions, but they’re similar in many ways. However, they award the units that accomplish them with experience instead of victory points. Along with killing units and the end of battle Marked for Greatness choice, these are the main way to quickly advance your units.</span></span></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" style="font-weight: 400;"><span data-dcnode-id="1631" instrument_node="">On average, most agendas will net you 4-6 experience points across your army if successful, depending on difficulty. There are some that can potentially award more, but are situational or harder to achieve to that level, and some that give less, but are either automatic or extremely easy.</span></span></p><span data-dcnode-id="1628" instrument_node="">
</span><div class="td-a-ad id_inline_ad0 id_ad_content-horiz-center" data-dcnode-id="1623"><span class="td-adspot-title" data-dcnode-id="1627"></span><div data-dcnode-id="1624" id="nn_mobile_mpu1"></div></div><p data-dcnode-id="1620"><span data-dcnode-id="1621" style="font-weight: 400;"><span data-dcnode-id="1622" instrument_node="">When selecting agendas, you pick 1 for a Combat Patrol game, 2 for an Incursion game, 3 for a Strike Force game, and 4 for an Onslaught game. Each agenda you pick must come from a different category, forcing you to diversify your goals as your games get bigger.</span></span></p><span data-dcnode-id="1619" instrument_node="">
</span><h3 data-dcnode-id="1616"><b data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Purge The Enemy</span></b></h3><span data-dcnode-id="1615" instrument_node="">
</span><ul data-dcnode-id="1581"><span data-dcnode-id="1614" instrument_node="">
</span><li data-dcnode-id="1607" style="font-weight: 400;"><b data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Assassins:</span></b><span data-dcnode-id="1610" style="font-weight: 400;"><span data-dcnode-id="1611" instrument_node=""> 2 experience for each character killed. </span></span><span data-dcnode-id="1608" style="font-weight: 400;"><span data-dcnode-id="1609" instrument_node="">This is potentially a really good one if your opponent rolls up with a whole load of characters. Probably slightly situational, but you can probably rely on at least getting a few experience out of this.</span></span></li><span data-dcnode-id="1606" instrument_node="">
</span><li data-dcnode-id="1599" style="font-weight: 400;"><b data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Priority Target:</span></b><span data-dcnode-id="1602" style="font-weight: 400;"><span data-dcnode-id="1603" instrument_node=""> 2 experience for each monster or vehicle killed. </span></span><span data-dcnode-id="1600" style="font-weight: 400;"><span data-dcnode-id="1601" instrument_node="">This is also situational, but probably ranging from decent to absurdly good. Other players in your campaign are going to hate anyone who brings full units of 3 sentinels or a flock of landspeeders and hands you 6 free XP.</span></span></li><span data-dcnode-id="1598" instrument_node="">
</span><li data-dcnode-id="1591" style="font-weight: 400;"><b data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Titan Hunter:</span></b><span data-dcnode-id="1594" style="font-weight: 400;"><span data-dcnode-id="1595" instrument_node=""> 4 experience for each titanic unit killed. </span></span><span data-dcnode-id="1592" style="font-weight: 400;"><span data-dcnode-id="1593" instrument_node="">Titan Hunter is much less likely to leave you overflowing with experience than the other Purge the Enemy agendas, but it’s a solid against the knight armies it is designed for.</span></span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1583" style="font-weight: 400;"><b data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Kingslayer:</span></b><span data-dcnode-id="1586" style="font-weight: 400;"><span data-dcnode-id="1587" instrument_node=""> 3 experience for the unit that kills the enemy warlord. No double dipping with resurrection abilities. </span></span><span data-dcnode-id="1584" style="font-weight: 400;"><span data-dcnode-id="1585" instrument_node="">I feel like this one is a bit of a swing and a miss. 3 experience isn’t a lot in comparison to other, much more reliable agendas, especially in the Purge the Enemy category.</span></span></li><span data-dcnode-id="1582" instrument_node="">
</span></ul><span data-dcnode-id="1580" instrument_node="">
</span><h3 data-dcnode-id="1577"><b data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">No Mercy, No Respite</span></b></h3><span data-dcnode-id="1576" instrument_node="">
</span><ul data-dcnode-id="1550"><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1568" style="font-weight: 400;"><b data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">First Strike:</span></b><span data-dcnode-id="1571" style="font-weight: 400;"><span data-dcnode-id="1572" instrument_node=""> 1 experience for each unit killed in the first turn. </span></span><span data-dcnode-id="1569" style="font-weight: 400;"><span data-dcnode-id="1570" instrument_node="">Potentially good in a very large game, but I expect it won’t net you as much as a lot of the Purge the Enemy options. If you’re playing onslaught and have to pick 4 agendas, but don’t have any psykers for Warpcraft objectives, you might go with this.</span></span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1560" style="font-weight: 400;"><b data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Cull the Hordes:</span></b><span data-dcnode-id="1563" style="font-weight: 400;"><span data-dcnode-id="1564" instrument_node=""> 1 experience each time a unit kills 6 or more models in the same phase. </span></span><span data-dcnode-id="1561" style="font-weight: 400;"><span data-dcnode-id="1562" instrument_node="">Probably good if you run up against hordes, especially if you have blast weapons or scary, multi-phase threats like knights. Bad against MSU.</span></span></li><span data-dcnode-id="1559" instrument_node="">
</span><li data-dcnode-id="1552" style="font-weight: 400;"><b data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Reaper:</span></b><span data-dcnode-id="1555" style="font-weight: 400;"><span data-dcnode-id="1556" instrument_node=""> 2 experience to the unit that destroys the most units. Pick in case of a tie. </span></span><span data-dcnode-id="1553" style="font-weight: 400;"><span data-dcnode-id="1554" instrument_node="">Another stinker in my opinion. It’s automatic, but it’s only 2 experience. There are two times I could see picking this. Either you have to pick 4 objectives for an onslaught game and both warpcraft and the other No Mercy, No Respite agendas don’t look promising, or if I wanted to stack as much experience as possible on one powerful unit to ensure they level up fast. Cull the hordes is still probably better for that, though.</span></span></li><span data-dcnode-id="1551" instrument_node="">
</span></ul><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1546"><b data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Battlefield Supremacy</span></b></h3><span data-dcnode-id="1545" instrument_node="">
</span><ul data-dcnode-id="1519"><span data-dcnode-id="1544" instrument_node="">
</span><li data-dcnode-id="1537" style="font-weight: 400;"><b data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Sentinel:</span></b><span data-dcnode-id="1540" style="font-weight: 400;"><span data-dcnode-id="1541" instrument_node=""> Pick a unit and an objective. If that unit is on that objective at the end of the game, it gains 4 experience. </span></span><span data-dcnode-id="1538" style="font-weight: 400;"><span data-dcnode-id="1539" instrument_node="">A bit dicey. This is potentially really easy for your opponent to deny just by killing that unit. Could be useful for very, very durable units.</span></span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1529" style="font-weight: 400;"><b data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Breakthrough: </span></b><span data-dcnode-id="1532" style="font-weight: 400;"><span data-dcnode-id="1533" instrument_node="">&nbsp;At the end of the game, pick up to 3 units (except aircraft) wholly within 6” of your opponent’s battlefield edge. Each of them gets 2 experience. </span></span><span data-dcnode-id="1530" style="font-weight: 400;"><span data-dcnode-id="1531" instrument_node="">Probably a mainstay of dark eldar and other highly mobile factions that end up in the enemy deployment zone as a matter of course.</span></span></li><span data-dcnode-id="1528" instrument_node="">
</span><li data-dcnode-id="1521" style="font-weight: 400;"><b data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Survivor:</span></b><span data-dcnode-id="1524" style="font-weight: 400;"><span data-dcnode-id="1525" instrument_node=""> Pick a unit. That unit gets 2 experience if it survives the battle, and 4 experience if it’s over half strength. (Single model units get 4 experience if over half wounds.) </span></span><span data-dcnode-id="1522" style="font-weight: 400;"><span data-dcnode-id="1523" instrument_node="">You know how I said Sentinel was dicey because your opponent could easily deny the experience? Yeah. Maybe on a durable unit that shoots from outside of Line of Sight.</span></span></li><span data-dcnode-id="1520" instrument_node="">
</span></ul><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1517"></p><figure aria-describedby="caption-attachment-26808" class="wp-caption aligncenter" data-dcnode-id="1510" id="attachment_26808" style="width: 750px"><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/BC_Jungle3.jpg"><noscript data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&lt;img data-attachment-id="26808" data-permalink="https://www.goonhammer.com/?attachment_id=26808" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/BC_Jungle3.jpg" data-orig-size="2048,1536" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="BC_Jungle3" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Credit: BuffaloChicken&amp;lt;/p&amp;gt;

4w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/BC_Jungle3-1440x1080.jpg 1440w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/BC_Jungle3.jpg 2048w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="1511" id="caption-attachment-26808"><span data-dcnode-id="1512" instrument_node="">Credit: BuffaloChicken</span></figcaption></figure><p data-dcnode-id="1509"></p><span data-dcnode-id="1508" instrument_node="">
</span><h3 data-dcnode-id="1505"><b data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Shadow Operations</span></b></h3><span data-dcnode-id="1504" instrument_node="">
</span><ul data-dcnode-id="1470"><span data-dcnode-id="1503" instrument_node="">
</span><li data-dcnode-id="1496" style="font-weight: 400;"><b data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Secure the Area:</span></b><span data-dcnode-id="1499" style="font-weight: 400;"><span data-dcnode-id="1500" instrument_node=""> One non-character infantry unit can do an activity at the end of movement if it’s within 6” of the center of the battlefield, and finishes at the end of your turn. It gains 1 experience. </span></span><span data-dcnode-id="1497" style="font-weight: 400;"><span data-dcnode-id="1498" instrument_node="">Potentially a reliable source of experience if you plan on controlling the board.</span></span></li><span data-dcnode-id="1495" instrument_node="">
</span><li data-dcnode-id="1488" style="font-weight: 400;"><b data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Search for Archaeotech:</span></b><span data-dcnode-id="1491" style="font-weight: 400;"><span data-dcnode-id="1492" instrument_node=""> Any number of infantry units can do an activity after movement if they’re wholly within your opponent’s deployment zone, finishing at the end of your turn. Every unit that does this twice or more gets 3 experience. </span></span><span data-dcnode-id="1489" style="font-weight: 400;"><span data-dcnode-id="1490" instrument_node="">So, in theory this could give you crazy amounts of experience, but it’s infantry only. I think you’ll have trouble racking up lots of experience without throwing the game unless you have lots of deep striking MSU which don’t see too much benefit from experience or are trouncing your opponent already. You can probably net at least a few experience, though, so not too bad.</span></span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1480" style="font-weight: 400;"><b data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Deploy Vox- Relays:</span></b><span data-dcnode-id="1483" style="font-weight: 400;"><span data-dcnode-id="1484" instrument_node=""> Select one infantry unit. That unit can do an activity to set up vox-relays on an objective after movement and ending at the end of your turn. Your opponent can knock these off by controlling the objective at the end of any phase. That unit gets 2 experience for each objective that has a vox-relay on it at the end of the game. </span></span><span data-dcnode-id="1481" style="font-weight: 400;"><span data-dcnode-id="1482" instrument_node="">An okay agenda. Probably best if you’re planning to control the battlefield and it’s a 6 objective mission. You’re not going to get the full 12 potential experience out of this, but you should get some unless you get stomped and overrun.</span></span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1472" style="font-weight: 400;"><b data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Recover Mission Archives:</span></b><span data-dcnode-id="1475" style="font-weight: 400;"><span data-dcnode-id="1476" instrument_node=""> One infantry, cavalry, or biker unit can do an activity at the end of your movement phase to search an objective. If they’re still on that objective at the end of your next command phase, they successfully search the objective. At the end of the game, roll 1d6. If you get equal to or under the number of objectives you searched, pick a unit that searched an objective and it gains 6 experience points. (In missions with under 6 objectives, you also gain the 6 experience if you search all of the objectives.) </span></span><span data-dcnode-id="1473" style="font-weight: 400;"><span data-dcnode-id="1474" instrument_node="">High risk, but high reward. Together with the passive 1 experience for participating in the battle, and 3 for marked for Glory, you can potentially dump 10 experience on a unit that searched an objective in your deployment zone on the first turn then ran off to do its thing. On the other hand, you could also end up with nothing, especially if your opponent makes a point of shooting units off objectives before they can finish searching them. (Only one unit can do this action every turn, and you only have 5 battle rounds for most missions.)</span></span></li><span data-dcnode-id="1471" instrument_node="">
</span></ul><span data-dcnode-id="1469" instrument_node="">
</span><h3 data-dcnode-id="1466"><b data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Warpcraft</span></b></h3><span data-dcnode-id="1465" instrument_node="">
</span><ul data-dcnode-id="1439"><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1457" style="font-weight: 400;"><b data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Witch hunter:</span></b><span data-dcnode-id="1460" style="font-weight: 400;"><span data-dcnode-id="1461" instrument_node=""> Units gain 1 experience for killing a psyker unit, and 3 experience for killing a psyker character. </span></span><span data-dcnode-id="1458" style="font-weight: 400;"><span data-dcnode-id="1459" instrument_node="">Pretty simple. Potentially quite good if there’s a lot of psykers on the field.</span></span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1449" style="font-weight: 400;"><b data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Lord of the Warp:</span></b><span data-dcnode-id="1452" style="font-weight: 400;"><span data-dcnode-id="1453" instrument_node=""> Units get a tally each time they manifest a power, deny a power, or complete a psychic action, resetting to 0 if they roll perils. The unit with the highest tally gets 2 experience, choosing if there’s a tie. </span></span><span data-dcnode-id="1450" style="font-weight: 400;"><span data-dcnode-id="1451" instrument_node="">2 experience isn’t a lot, but at least it’s reliable.</span></span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1441" style="font-weight: 400;"><b data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Scry Battle Plans:</span></b><span data-dcnode-id="1444" style="font-weight: 400;"><span data-dcnode-id="1445" instrument_node=""> One unit each turn can get a tally by completing a Warp Charge 4 psychic action on an enemy character within 18”. Each unit with at least 2 tallies gets 5 experience. </span></span><span data-dcnode-id="1442" style="font-weight: 400;"><span data-dcnode-id="1443" instrument_node="">Much better. You’re giving up powers or smites, but 5 experience is a lot. You do need to be in the thick of it to achieve this, but you can probably count on getting at least one unit that 5 juicy experience.</span></span></li><span data-dcnode-id="1440" instrument_node="">
</span></ul><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1437"></p><figure aria-describedby="caption-attachment-26480" class="wp-caption aligncenter" data-dcnode-id="1430" id="attachment_26480" style="width: 750px"><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3.jpg"><noscript data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">&lt;img data-attachment-id="26480" data-permalink="https://www.goonhammer.com/?attachment_id=26480" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3.jpg" data-orig-size="2384,1883" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="forgeworld3" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Chaos and Tau clash over a Forge World&amp;lt;/p&amp;gt;
" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1024x809.jpg" class="size-medium wp-image-26480" src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg" alt="" width="750" height="592" srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-768x607.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1024x809.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1367x1080.jpg 1367w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><img alt="" class="size-medium wp-image-26480 lazyloaded" data-attachment-id="26480" data-comments-opened="1" data-dcnode-id="1434" data-image-caption="<p>Chaos and Tau clash over a Forge World</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="forgeworld3" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1024x809.jpg" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3.jpg" data-orig-size="2384,1883" data-permalink="https://www.goonhammer.com/?attachment_id=26480" data-sizes="(max-width: 750px) 100vw, 750px" data-src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg" data-srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-768x607.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1024x809.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1367x1080.jpg 1367w" height="592" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg&amp;raw" srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-750x592.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-768x607.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1024x809.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/07/forgeworld3-1367x1080.jpg 1367w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="1431" id="caption-attachment-26480"><span data-dcnode-id="1432" instrument_node="">Chaos and Tau clash over a Forge World</span></figcaption></figure><p data-dcnode-id="1429"></p><span data-dcnode-id="1428" instrument_node="">
</span><h2 data-dcnode-id="1425"><span data-dcnode-id="1426" style="font-weight: 400;"><span data-dcnode-id="1427" instrument_node="">The Missions</span></span></h2><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" style="font-weight: 400;"><span data-dcnode-id="1423" instrument_node="">Similar to Matched Play, Crusade provides missions for four different levels of play: Combat Patrol, Incursion, Strike Force, and Onslaught, with each being designed for games of a different size. Unlike the Eternal War and GT missions, missions in Crusade may have extra rewards for players that affect their campaign forces. As we mentioned earlier, these tend to be a bit more asymmetrical than Eternal War missions, and have actual differences for the Attacker and Defender.&nbsp;</span></span></p><span data-dcnode-id="1420" instrument_node="">
</span><h3 data-dcnode-id="1417"><span data-dcnode-id="1418" style="font-weight: 400;"><span data-dcnode-id="1419" instrument_node="">Rules Differences from Matched Play</span></span></h3><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" style="font-weight: 400;"><span data-dcnode-id="1415" instrument_node="">There are a few things to note about the rules for Crusade Missions that differ from those in Matched Play:</span></span></p><span data-dcnode-id="1412" instrument_node="">
</span><ul data-dcnode-id="1386"><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1408" style="font-weight: 400;"><span data-dcnode-id="1409" style="font-weight: 400;"><span data-dcnode-id="1410" instrument_node="">Because you can have multiple characters with Warlord Traits in Crusade, your actual Warlord in a Crusade game is the CHARACTER in your army with the highest Leadership characteristic. If your army has a tie, you can pick one, and it gains the WARLORD keyword.&nbsp;</span></span></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1404" style="font-weight: 400;"><span data-dcnode-id="1405" style="font-weight: 400;"><span data-dcnode-id="1406" instrument_node="">Technically, Crusade games do not fall under Matched Play, and so Matched Play rules like requiring players to pay reinforcement points for summoned daemons do not apply to Crusade games. This is, on the whole, not great and we recommend you use Matched Play rules in your Crusade games.</span></span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1396" style="font-weight: 400;"><span data-dcnode-id="1401" style="font-weight: 400;"><span data-dcnode-id="1402" instrument_node="">As we mentioned earlier, Crusade Missions do not have Secondary Objectives, but instead give players </span></span><b data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Agendas</span></b><span data-dcnode-id="1397" style="font-weight: 400;"><span data-dcnode-id="1398" instrument_node="">, which reward players with XP. This has fairly broad implications for the missions and balance, which we’ll talk about later.&nbsp;</span></span></li><span data-dcnode-id="1395" instrument_node="">
</span><li data-dcnode-id="1392" style="font-weight: 400;"><span data-dcnode-id="1393" style="font-weight: 400;"><span data-dcnode-id="1394" instrument_node="">Players can score a maximum of 90 Victory Points from mission objectives, plus 10 more for having a fully-painted army. Unlike in Matched Play, these all come from Primary Objectives and there’s no per-turn cap unless the mission specifies it.</span></span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1388" style="font-weight: 400;"><span data-dcnode-id="1389" style="font-weight: 400;"><span data-dcnode-id="1390" instrument_node="">Crusade Missions have a long post-game process where campaign cards are updated, Out of Action tests are taken, and Experience Points are tallied.</span></span></li><span data-dcnode-id="1387" instrument_node="">
</span></ul><span data-dcnode-id="1385" instrument_node="">
</span><h3 data-dcnode-id="1382"><span data-dcnode-id="1383" style="font-weight: 400;"><span data-dcnode-id="1384" instrument_node="">Combat Patrol</span></span></h3><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" style="font-weight: 400;"><span data-dcnode-id="1380" instrument_node="">Armies in Combat Patrol missions max out at a combined Power Level of 25 and each player starts with 3 Command Points. In addition, a Combat Patrol army can only include a single Patrol Detachment unless your faction is Imperial Knights or Chaos Knights, in which case you can only include one Super Heavy Detachment.&nbsp;</span></span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" style="font-weight: 400;"><span data-dcnode-id="1376" instrument_node="">There are three Combat Patrol Missions, and of these Assassinate is the only one that’s really Asymmetrical.</span></span></p><span data-dcnode-id="1373" instrument_node="">
</span><ol data-dcnode-id="1350"><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1367"><b data-dcnode-id="1368"><span data-dcnode-id="1371" instrument_node="">Sweep and Clear </span><span data-dcnode-id="1369" style="font-weight: 400;"><span data-dcnode-id="1370" instrument_node="">sees two patrols coming across each other and rushing to wipe the other out before they can gain a foothold for their larger army. This mission has four objective markers placed by players; one in each player’s deployment zone (the mission uses a Hammer-and-Anvil style longways deployment map), and two in the “Centre ground,” a 6-inch band in the middle of the battlefield. Objectives in this mission stay held after they’re captured until an opponent controls them, allowing armies to range a bit, and the mission uses progressive scoring. The winner gets to mark two units for greatness instead of one after the battle.</span></span></b></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1360"><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Supply Drop</span></strong><span data-dcnode-id="1363" instrument_node=""> </span><span data-dcnode-id="1361" style="font-weight: 400;"><span data-dcnode-id="1362" instrument_node="">is about two armies rushing to grab supplies dropped in no man’s land, trying to secure drop zones for where the final supply drop will happen. As the game goes on, objectives are randomly removed from the battlefield and held objectives are worth progressively more points. The winner of the game gets 2 RP after the battle instead of 1.</span></span></li><span data-dcnode-id="1359" instrument_node="">
</span><li data-dcnode-id="1352"><span data-dcnode-id="1357" style="font-weight: 400;"><span data-dcnode-id="1358" instrument_node="">In </span></span><b data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Assassinate</span></b><span data-dcnode-id="1353" style="font-weight: 400;"><span data-dcnode-id="1354" instrument_node="">, the Attacker’s forces have been tasked with taking out the Defender’s Warlord. The Defender’s Warlord has to be set up in a specific area on the table and can’t go into Strategic Reserves or Deep Strike. If the Defender’s Warlord has fewer than 10 wounds, they gain the ability to ignore lost wounds on a 6+. The Attacker always gets first turn, and their goal is to kill the Defender’s warlord. They score VP for wounding or killing the enemy warlord, and the Defender scores points for keeping their Warlord alive. The winner gets to give a unit in their army a free Battle Trait of their choice.</span></span></li><span data-dcnode-id="1351" instrument_node="">
</span></ol><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" style="font-weight: 400;"><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Rob: </span></strong><span data-dcnode-id="1346" instrument_node="">Of these, Assassinate is the most interesting, with progressive and endgame objectives around damaging the Warlord, and while I’d have liked to see the reward tied to interacting with the Warlord in some way, that would have been tough to work out for the Defender.</span></span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1342"></p><figure aria-describedby="caption-attachment-25456" class="wp-caption aligncenter" data-dcnode-id="1335" id="attachment_25456" style="width: 750px"><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM.jpg"><noscript data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">&lt;img data-attachment-id="25456" data-permalink="https://www.goonhammer.com/?attachment_id=25456" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_Campbell "SRM" McLaughlin.jpg" data-orig-size="1200,900" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Raptors_vs_SRM" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;These morons killed zero things&amp;lt;/p&amp;gt;
" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-1024x768.jpg" class="size-medium wp-image-25456" src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg" alt="" width="750" height="563" srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-768x576.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-1024x768.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM.jpg 1200w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><img alt="" class="size-medium wp-image-25456 lazyloaded" data-attachment-id="25456" data-comments-opened="1" data-dcnode-id="1339" data-image-caption="<p>These morons killed zero things</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Raptors_vs_SRM" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-1024x768.jpg" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM.jpg" data-orig-size="1200,900" data-permalink="https://www.goonhammer.com/?attachment_id=25456" data-sizes="(max-width: 750px) 100vw, 750px" data-src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg" data-srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-768x576.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-1024x768.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM.jpg 1200w" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg&amp;raw" srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-750x563.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-768x576.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM-1024x768.jpg 1024w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Raptors_vs_SRM.jpg 1200w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="1336" id="caption-attachment-25456"><span data-dcnode-id="1337" instrument_node="">These morons killed zero things</span></figcaption></figure><p data-dcnode-id="1334"></p><span data-dcnode-id="1333" instrument_node="">
</span><h3 data-dcnode-id="1330"><span data-dcnode-id="1331" style="font-weight: 400;"><span data-dcnode-id="1332" instrument_node="">Incursion</span></span></h3><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" style="font-weight: 400;"><span data-dcnode-id="1328" instrument_node="">There are six Incursion missions, and it’s clear that while Crusade starts at Combat Patrol size, it’s clear that Incursion and Strike Force are the real meat of how GW expects Crusade to be played.&nbsp;</span></span></p><span data-dcnode-id="1325" instrument_node="">
</span><ol data-dcnode-id="1279"><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1319"><b data-dcnode-id="1320"><span data-dcnode-id="1323" instrument_node="">Supply Cache </span><span data-dcnode-id="1321" style="font-weight: 400;"><span data-dcnode-id="1322" instrument_node="">is a symmetrical mission that sees two armies hunting for supplies in no man’s land is about as generic as missions come. Dawn of War style deployment, 4 objectives placed by players, and progressive scoring for holding one/one in an opponent’s deployment zone/controlling more. The winner gets 2 RP instead of 1.</span></span></b></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1312"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The Relic</span></strong><span data-dcnode-id="1315" instrument_node=""> </span><span data-dcnode-id="1313" style="font-weight: 400;"><span data-dcnode-id="1314" instrument_node="">is a translation of the 8th edition mission of the same name, in which two armies fight over a relic placed in the middle of the table. Infantry units can pick up the Relic and move with it around and points are scored for holding the relic and ending the game with it. We also finally have a thematic reward: The winner of this mission gets to give one Crusade Relic to a CHARACTER in their army who took part in the battle.</span></span></li><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1305"><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Sabotage</span></strong><span data-dcnode-id="1308" instrument_node=""> </span><span data-dcnode-id="1306" style="font-weight: 400;"><span data-dcnode-id="1307" instrument_node="">is an asymmetrical mission in which the Defender drops four objective markers on the table that the Attacker is attempting to Sabotage via the Sabotage action. The Attacker gets first turn and scores points for destroying the objective markers, while the Defender scores for keeping them around. If the Attacker wins, they get to give one unit in their army a Battle Honour of their choice. If the Defender wins they get a free Resupply and Rearm action.</span></span></li><span data-dcnode-id="1304" instrument_node="">
</span><li data-dcnode-id="1298"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Recon</span></strong><span data-dcnode-id="1301" instrument_node=""> </span><span data-dcnode-id="1299" style="font-weight: 400;"><span data-dcnode-id="1300" instrument_node="">is a symmetrical mission that sees two recon forces meeting by chance and calling for reinforcements in a translation of the 8th edition “Patrol” mission. Both players have to keep at least half (and no more than three quarters) of their units into Strategic Reserves at no CP cost before the game starts, and when these units can arrive on the first and second battle rounds if they pass a Reserve test, which is a 4+ on a D6. Players score points for holding objectives and performing the Recon Sweep action in each table quarter. The winner gets to Mark two units for Greatness after the battle.</span></span></li><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1291"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">The Ritual</span></strong><span data-dcnode-id="1294" instrument_node=""> </span><span data-dcnode-id="1292" style="font-weight: 400;"><span data-dcnode-id="1293" instrument_node="">is an asymmetrical mission in which the Defender is trying to complete a ritual in a specific circular area of their Deployment Zone, in which the Defender’s Warlord must be set up (the Warlord gets a 4+ invulnerable save while wholly within this circle). The Defender can score points for performing rites in the circle – there’s both a psychic action and a regular action for this – and both players can score points for holding objectives, plus the Attacker can score points for killing the enemy Warlord. This mission has asymmetrical rewards – the Defender can give their Warlord a Battle Trait (or a Psychic Fortitude if they’re a PSYKER), while the Attacker can give a unit a Battle Honour of your choice.</span></span></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1281"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Behind Enemy Lines</span></strong><span data-dcnode-id="1287" instrument_node=""> </span><span data-dcnode-id="1285" style="font-weight: 400;"><span data-dcnode-id="1286" instrument_node="">is a Symmetrical mission which the armies are attempting to infiltrate deep behind enemy lines at night, on a battlefield riddled with scramblers. Units can’t deploy outside their deployment zones and can’t be set up elsewhere, and when shooting at units more than 18” away, units get -1 to their To Hit rolls. Players can score for getting units off the opposite table edge with the </span></span><span data-dcnode-id="1284" instrument_node="">Exfiltration </span><span data-dcnode-id="1282" style="font-weight: 400;"><span data-dcnode-id="1283" instrument_node="">Action, and players score for Linebreaker, completing the Exfiltration Action, and keeping opponents from exfiltrating. The winner can give a battle Trait of their choice to a unit that exfiltrated successfully.</span></span></li><span data-dcnode-id="1280" instrument_node="">
</span></ol><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" style="font-weight: 400;"><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Evan: </span></strong><span data-dcnode-id="1275" instrument_node="">The incursion missions look quite interesting. I’m torn on The Ritual. On one hand it’s an interesting asymmetrical mission(and I think it’s a good base to build your own similar missions), but on the other, your warlord, who you presumably took because you wanted to do cool things with them, has to do nothing for most of the battle unless they’re a Psyker. I expect imperial armies will be including an inquisitor in their roster who is mysteriously their warlord for this mission. Knights players just cry or accept the loss and play for experience. It might be possible to run a super-heavy detachment of all armigers and an auxiliary detachment with a psyker at the cost of most of your Command Points.</span></span></p><span data-dcnode-id="1272" instrument_node="">
</span><div class="td-a-ad id_inline_ad1 id_ad_content-horiz-center" data-dcnode-id="1267"><span class="td-adspot-title" data-dcnode-id="1271"></span><div data-dcnode-id="1268" id="nn_mobile_mpu2"></div></div><p data-dcnode-id="1263"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Rob:&nbsp;</span></strong><span data-dcnode-id="1264" instrument_node="">I think the Ritual is neat but yeah, it’s kind of dumb if you don’t have a Psyker. For me The Relic and Sabotage are the missions I’m most excited to play – they just have more interesting things going on with them design-wise.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><h3 data-dcnode-id="1259"><span data-dcnode-id="1260" style="font-weight: 400;"><span data-dcnode-id="1261" instrument_node="">Strike Force</span></span></h3><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" style="font-weight: 400;"><span data-dcnode-id="1257" instrument_node="">There are six Strike Force missions, four symmetrical, two asymmetrical.&nbsp;</span></span></p><span data-dcnode-id="1254" instrument_node="">
</span><ol data-dcnode-id="1211"><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1248"><b data-dcnode-id="1249"><span data-dcnode-id="1252" instrument_node="">Supplies from Above </span><span data-dcnode-id="1250" style="font-weight: 400;"><span data-dcnode-id="1251" instrument_node="">sees armies going after supplies being air-dropped onto the battlefield, and objective markers move as they’re carried by the wind each battle round. Players score for holding objectives, and the winner gets 2 RP instead of 1.</span></span></b></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1241"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Narrow the Search</span></strong><span data-dcnode-id="1244" instrument_node=""> </span><span data-dcnode-id="1242" style="font-weight: 400;"><span data-dcnode-id="1243" instrument_node="">is a translation of the 8th edition mission of the same name, where armies are investigating an area in the center of the table that prevents units from taking Invulnerable saving throws. Players score points for holding objectives and controlling the area in the middle of the battlefield.</span></span></li><span data-dcnode-id="1240" instrument_node="">
</span><li data-dcnode-id="1234"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Cut off the Head</span></strong><span data-dcnode-id="1237" instrument_node=""> </span><span data-dcnode-id="1235" style="font-weight: 400;"><span data-dcnode-id="1236" instrument_node="">is a really cool symmetrical mission that revolves around each army’s characters holding vital intelligence. At the start of each player’s first Command phase they have to allocate 30 Intel points as evenly as possible across CHARACTERs in their army. These Characters can perform the Transmit Intel action, and keeping these characters alive and killing the ones in your opponent’s army are the key to scoring points in this mission. The winner can give a CHARACTER that had intel points in their army a Warlord Trait for free.</span></span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1227"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Retrieval</span></strong><span data-dcnode-id="1230" instrument_node=""> </span><span data-dcnode-id="1228" style="font-weight: 400;"><span data-dcnode-id="1229" instrument_node="">is an asymmetrical mission where the Defender is attempting to rescue a courier stranded and wounded behind enemy lines while the Attacker is attempting to locate and kill the same courier. Six objective markers are placed and players can search them with the Search Site action, rolling to see if that objective marker is the courier’s location (the marker is removed if the courier is not at that location). Players score points for securing the Courier. If the Attacker wins, they can give a Character in their army a Crusade Relic, and if the Defender wins they can add a new Character to their order of battle with a free Warlord Trait, Relic, or Specialist Requisition (this represents the courier being added to their army).</span></span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1220"><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Raze and Ruin</span></strong><span data-dcnode-id="1223" instrument_node=""> </span><span data-dcnode-id="1221" style="font-weight: 400;"><span data-dcnode-id="1222" instrument_node="">is a symmetrical mission that has both sides fighting over objective markers, but in a fun twist, players can destroy markers belonging to their opponent. Points are awarded for controlling markers and for destroying them. The winner gets to use the Increase Supply Limit Requisition free, twice (this adds 10 PL or about 200 points to their Order of Battle).</span></span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1213"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Ambush</span></strong><span data-dcnode-id="1216" instrument_node=""> </span><span data-dcnode-id="1214" style="font-weight: 400;"><span data-dcnode-id="1215" instrument_node="">is an asymmetrical mission that sees an Attacker ambushing the Defender in a pincer strike. The Defender deploys along the long center line of the table and there’s a cool mechanic here where the Attacker gets to choose whether to press the Attack, in which case half their army has to start in Strategic Reserves at no CP cost and these units can’t arrive until turn 3. If they instead choose to wait for further forces, they can make choices as normal. This is important because the Attacker gets the first turn if they Press the Attack and go second if they wait for further forces. The Defender can’t set up any units in reserves, and neither army can add units mid-battle or merge units together. Players score by killing enemy units and the enemy warlord. The winner can give a unit in their army a Battle Trait of their choice.</span></span></li><span data-dcnode-id="1212" instrument_node="">
</span></ol><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1206"><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Rob: </span></strong><span data-dcnode-id="1207" instrument_node="">Overall, these are alright. The most interesting of them is Cut Off the Head, and I think that the design space it creates is worth exploring in more detail. Retrieval is also pretty great and the asymmetrical rewards for winning are great. I love the idea of using this mission as a way to get weird allies into campaign armies.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1200"><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg"><noscript data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">&lt;img data-attachment-id="25253" data-permalink="https://www.goonhammer.com/?attachment_id=25253" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg" data-orig-size="1000,652" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Paulus_Apocalypse1" data-image-description="" data-image-caption="" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg" class="aligncenter size-medium wp-image-25253" src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg" alt="" width="750" height="489" srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-768x501.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg 1000w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><img alt="" class="lazyload aligncenter size-medium wp-image-25253" data-attachment-id="25253" data-comments-opened="1" data-dcnode-id="1202" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Paulus_Apocalypse1" data-large-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg" data-medium-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg" data-orig-file="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg" data-orig-size="1000,652" data-permalink="https://www.goonhammer.com/?attachment_id=25253" data-sizes="(max-width: 750px) 100vw, 750px" data-src="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg" data-srcset="https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-750x489.jpg 750w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667-768x501.jpg 768w, https://d1w82usnq70pt2.cloudfront.net/wp-content/uploads/2020/06/Paulus_Apocalypse1-e1592933407667.jpg 1000w" height="489" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20750%20489%22%3E%3C/svg%3E" width="750"></a></p><span data-dcnode-id="1199" instrument_node="">
</span><h3 data-dcnode-id="1196"><span data-dcnode-id="1197" style="font-weight: 400;"><span data-dcnode-id="1198" instrument_node="">Onslaught</span></span></h3><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" style="font-weight: 400;"><span data-dcnode-id="1194" instrument_node="">There are three Onslaught missions, for the really big games that are largely going to be occurring well into your Crusade. If you’re familiar with the Apocalypse missions from 8th edition, then these will be familiar.</span></span></p><span data-dcnode-id="1191" instrument_node="">
</span><ol data-dcnode-id="1168"><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1185"><b data-dcnode-id="1186"><span data-dcnode-id="1189" instrument_node="">Firestorm </span><span data-dcnode-id="1187" style="font-weight: 400;"><span data-dcnode-id="1188" instrument_node="">is a symmetrical mission that sees players fighting over a battlefield wracked with artillery fire and orbital bombardment. This mission has no objective markers and players score victory points for killing enemy units. The winner gets 2 RP instead of 1.</span></span></b></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1175"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Grand Assault</span></strong><span data-dcnode-id="1181" instrument_node=""> </span><span data-dcnode-id="1179" style="font-weight: 400;"><span data-dcnode-id="1180" instrument_node="">is an asymmetrical mission that uses 8 objective markers placed by the Defender. Their job is to defend these while the Attacker attempts to plant a banner on them (via an Action). The Attacker gets the benefit of </span></span><span data-dcnode-id="1178" instrument_node="">Sustained Assault </span><span data-dcnode-id="1176" style="font-weight: 400;"><span data-dcnode-id="1177" instrument_node="">rules, allowing them to bring back destroyed units and remove damaged ones in order to replace them. Players score points for controlling victory points. The winner gets to give one of their units a Battle Trait of their choice.</span></span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1170"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Field of Glory</span></strong><span data-dcnode-id="1171" instrument_node=""> is a relatively straightforward symmetrical mission where players fight over 8 objective markers with progressive points scoring for holding objectives and can score extra points for having their Warlord within Engagement Range of enemy units at the end of their turns. The winner gets to give a Battle Honour of their choice to their Warlord.</span></li><span data-dcnode-id="1169" instrument_node="">
</span></ol><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Rob: </span></strong><span data-dcnode-id="1164" instrument_node="">Overall these work but I’m not blown away by any of them. If you didn’t think Warhammer 40k really worked for big games, these likely wouldn’t do much to change your mind. I might honestly just move to Apocalypse at this point, but that’s gonna take more conversion work. Maybe worth doing in the future.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1159" instrument_node="">
</span><h2 data-dcnode-id="1156"><span data-dcnode-id="1157" style="font-weight: 400;"><span data-dcnode-id="1158" instrument_node="">Final Thoughts</span></span></h2><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" style="font-weight: 400;"><span data-dcnode-id="1154" instrument_node="">The Crusade missions are pretty cool, and do a good job of giving players lots of options at each level. There’s definitely a lot of room to grow from here, and we’re excited to see where they go when they start converting more 8th edition missions to Crusade format. In particular, the planetstrike, stronghold assault, and cities of death rules could all use an overhaul and there have got to be better ways to incorporate battlezones.</span></span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1150" instrument_node="">As always, if you have any questions or feedback, drop us a note in the comments below or email us at&nbsp;</span><strong data-dcnode-id="1146"><a data-dcnode-id="1148" href="mailto:contact@goonhammer.com"><span data-dcnode-id="1149" instrument_node="">contact@goonhammer.com</span></a><span data-dcnode-id="1147" instrument_node="">.&nbsp;</span></strong><span data-dcnode-id="1145" instrument_node="">Or if you’re Patron, hop on the Goonhammer discord and give us a shout.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><div class="cb_p6_patreon_button" data-dcnode-id="1138" style="text-align:center !important;margin-top:15px;margin-bottom:15px;"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/goonhammer%3Futm_content%3Dpost_button%26utm_medium%3Dpatron_button_and_widgets_plugin%26utm_campaign%3D3873277%26utm_term%3D%26utm_source%3Dhttps%3A//www.goonhammer.com/the-narrative-forge-crusade-missions/" rel="nofollow" target="_blank"><noscript data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&lt;img style="margin-top: 10px;margin-bottom: 10px;max-width:200px;width:100%;height:auto;" src="https://d1w82usnq70pt2.cloudfront.net/wp-content/plugins/patron-button-and-widgets-by-codebard/images/become_a_patron_button.png"&gt;</span></noscript><img class="lazyload" data-dcnode-id="1140" data-src="https://d1w82usnq70pt2.cloudfront.net/wp-content/plugins/patron-button-and-widgets-by-codebard/images/become_a_patron_button.png" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20210%20140%22%3E%3C/svg%3E" style="margin-top: 10px;margin-bottom: 10px;max-width:200px;width:100%;height:auto;"></a></div><span data-dcnode-id="1137" instrument_node="">
