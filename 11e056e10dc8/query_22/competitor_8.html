</span><p data-dcnode-id="2427"></p><div class="indent" data-dcnode-id="2423"><em data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">"Am I supposed to change? Are you supposed to change?</span></em><span data-dcnode-id="2424" instrument_node="">
</span></div><div class="indent" data-dcnode-id="2419"><em data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Who should be hurt? Who should be blamed?</span></em><span data-dcnode-id="2420" instrument_node="">
</span></div><div class="indent" data-dcnode-id="2415"><em data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">You need a resolution, I need a resolution,</span></em><span data-dcnode-id="2416" instrument_node="">
</span></div><div class="indent" data-dcnode-id="2402"><em data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">We need a resolution, We have so much confusion."</span></em><span data-dcnode-id="2412" instrument_node="">
</span><div class="indent" data-dcnode-id="2403"><span data-dcnode-id="2411" instrument_node="">— </span><strong data-dcnode-id="2408"><a class="twikilink" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Aaliyah" title="/pmwiki/pmwiki.php/Music/Aaliyah"><span data-dcnode-id="2410" instrument_node="">Aaliyah</span></a></strong><span data-dcnode-id="2407" instrument_node="">, </span><em data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">We Need A Resolution</span></em><span data-dcnode-id="2404" instrument_node="">
</span></div></div><p data-dcnode-id="2397"><span data-dcnode-id="2401" instrument_node="">Methods of giving closure to an episode of a show, a </span><a class="twikilink" data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryArc" title="/pmwiki/pmwiki.php/Main/StoryArc"><span data-dcnode-id="2400" instrument_node="">Story Arc</span></a><span data-dcnode-id="2398" instrument_node="">, or an entire series.
</span></p><p data-dcnode-id="2392"><span data-dcnode-id="2396" instrument_node="">Ending tropes have major </span><strong data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">unmarked and unconcealed</span></strong><span data-dcnode-id="2393" instrument_node=""> spoilers in the examples sections. There is really no way to avoid this because of the very nature of an ending trope; the mere knowledge that the trope applies to a given work is usually a spoiler in itself. Read at your own risk.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2386"><span class="ad-caption" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2387" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node="">Contrast </span><a class="twikilink" data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeginningTropes" title="/pmwiki/pmwiki.php/Main/BeginningTropes"><span data-dcnode-id="2384" instrument_node="">Beginning Tropes</span></a><span data-dcnode-id="2382" instrument_node="">.
</span></p><hr data-dcnode-id="2380"><h2 data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Tropes:</span></h2><span data-dcnode-id="2377" instrument_node="">
</span><div class="floatboxright" data-dcnode-id="2351"><span data-dcnode-id="2376" instrument_node="">
</span><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Categories:</span></strong><span data-dcnode-id="2373" instrument_node="">
</span><ul data-dcnode-id="2352"><li class="plus" data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleEndings" title="/pmwiki/pmwiki.php/Main/MultipleEndings"><span data-dcnode-id="2371" instrument_node="">Multiple Endings</span></a><span data-dcnode-id="2369" instrument_node="">
</span></li><li class="plus" data-dcnode-id="2363"><span data-dcnode-id="2367" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfEndings" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfEndings"><span data-dcnode-id="2366" instrument_node="">Sliding Scale of Endings</span></a><span data-dcnode-id="2364" instrument_node="">
</span></li><li class="plus" data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwistEnding" title="/pmwiki/pmwiki.php/Main/TwistEnding"><span data-dcnode-id="2361" instrument_node="">Twist Ending</span></a><span data-dcnode-id="2359" instrument_node="">
</span></li><li class="plus" data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VictoryAndDefeat" title="/pmwiki/pmwiki.php/Main/VictoryAndDefeat"><span data-dcnode-id="2356" instrument_node="">Victory and Defeat</span></a><span data-dcnode-id="2354" instrument_node="">
</span></li></ul></div><span data-dcnode-id="2350" instrument_node="">
</span><ul data-dcnode-id="857"><li data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HundredPercentCompletion" title="/pmwiki/pmwiki.php/Main/HundredPercentCompletion"><span data-dcnode-id="2348" instrument_node="">100% Completion</span></a><span data-dcnode-id="2346" instrument_node="">: When collecting everything there is to collect in a video game and achieving all the game's side quests and objectives is the only way to see the canon ending.
</span></li><li data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalAlternateEnding" title="/pmwiki/pmwiki.php/Main/AdaptationalAlternateEnding"><span data-dcnode-id="2343" instrument_node="">Adaptational Alternate Ending</span></a><span data-dcnode-id="2341" instrument_node="">: An adaptation changes how the story ends.
</span></li><li data-dcnode-id="2335"><span data-dcnode-id="2339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlbumClosure" title="/pmwiki/pmwiki.php/Main/AlbumClosure"><span data-dcnode-id="2338" instrument_node="">Album Closure</span></a><span data-dcnode-id="2336" instrument_node="">: The final song on an album wraps up its tone/themes.
</span></li><li data-dcnode-id="2330"><span data-dcnode-id="2334" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlignmentBasedEndings" title="/pmwiki/pmwiki.php/Main/AlignmentBasedEndings"><span data-dcnode-id="2333" instrument_node="">Alignment-Based Endings</span></a><span data-dcnode-id="2331" instrument_node="">: The video game's ending depends on your moral alignment.
</span></li><li data-dcnode-id="2325"><span data-dcnode-id="2329" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllIsWellThatEndsWell" title="/pmwiki/pmwiki.php/Main/AllIsWellThatEndsWell"><span data-dcnode-id="2328" instrument_node="">All Is Well That Ends Well</span></a><span data-dcnode-id="2326" instrument_node="">: A character goes through a lot of hardship and strife, but once they get their happy ending they appear completely unaffected by this.
</span></li><li data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustADream" title="/pmwiki/pmwiki.php/Main/AllJustADream"><span data-dcnode-id="2323" instrument_node="">All Just a Dream</span></a><span data-dcnode-id="2321" instrument_node="">: It turns out the whole story was just a dream the protagonist was having.
</span></li><li data-dcnode-id="2315"><span data-dcnode-id="2319" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustAPrank" title="/pmwiki/pmwiki.php/Main/AllJustAPrank"><span data-dcnode-id="2318" instrument_node="">All Just a Prank</span></a><span data-dcnode-id="2316" instrument_node="">: A major plot ends up to be a practical joke.
</span></li><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2309"><span class="ad-caption" data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2310" id="proper-ad-tvtropes_mobile_ad_2"></div></div><li data-dcnode-id="2301"><span data-dcnode-id="2308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheStinger" title="/pmwiki/pmwiki.php/Main/AllThereInTheStinger"><span data-dcnode-id="2307" instrument_node="">All There in the Stinger</span></a><span data-dcnode-id="2305" instrument_node="">: When </span><a class="twikilink" data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStinger" title="/pmwiki/pmwiki.php/Main/TheStinger"><span data-dcnode-id="2304" instrument_node="">The Stinger</span></a><span data-dcnode-id="2302" instrument_node=""> provides information that is necessary to understanding the overall plot.
</span></li><li data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousCloneEnding" title="/pmwiki/pmwiki.php/Main/AmbiguousCloneEnding"><span data-dcnode-id="2299" instrument_node="">Ambiguous Clone Ending</span></a><span data-dcnode-id="2297" instrument_node="">: It's left ambiguous whether a person is the real deal or a copied replacement.
</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousEnding" title="/pmwiki/pmwiki.php/Main/AmbiguousEnding"><span data-dcnode-id="2294" instrument_node="">Ambiguous Ending</span></a><span data-dcnode-id="2292" instrument_node="">: The ending is left open to the viewer's interpretation.
</span></li><li data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndTheAdventureContinues" title="/pmwiki/pmwiki.php/Main/AndTheAdventureContinues"><span data-dcnode-id="2289" instrument_node="">And the Adventure Continues</span></a><span data-dcnode-id="2287" instrument_node="">: The story ends with the heroes preparing for another adventure.
</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2285" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndYourRewardIsInfancy" title="/pmwiki/pmwiki.php/Main/AndYourRewardIsInfancy"><span data-dcnode-id="2284" instrument_node="">And Your Reward Is Infancy</span></a><span data-dcnode-id="2282" instrument_node="">: The story ends with the main character becoming a baby.
</span></li><li data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiClimax" title="/pmwiki/pmwiki.php/Main/AntiClimax"><span data-dcnode-id="2279" instrument_node="">Anti-Climax</span></a><span data-dcnode-id="2277" instrument_node="">: Suspense is killed when it would normally be at its highest.
</span></li><li data-dcnode-id="2268"><span data-dcnode-id="2275" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseWow" title="/pmwiki/pmwiki.php/Main/ApocalypseWow"><span data-dcnode-id="2274" instrument_node="">Apocalypse Wow</span></a><span data-dcnode-id="2272" instrument_node="">: The apocalypse is absolutely nightmarish, but </span><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">man</span></em><span data-dcnode-id="2269" instrument_node=""> if it isn't cool!
</span></li><li data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AstralFinale" title="/pmwiki/pmwiki.php/Main/AstralFinale"><span data-dcnode-id="2266" instrument_node="">Astral Finale</span></a><span data-dcnode-id="2264" instrument_node="">: The last episode takes place in space.
