</span><div data-dcnode-id="382" data-section-id="blog_post_body" id="section-blog_post_body"><div class="panel blog fluid-video" data-dcnode-id="567"><span data-dcnode-id="1368" instrument_node="">

</span><h1 class="blog__title" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Narrative Drive: How to Write a Page Turning Novel</span></h1><span data-dcnode-id="1364" instrument_node="">
</span><div class="blog__info" data-dcnode-id="1353"><span data-dcnode-id="1363" instrument_node="">
</span><span class="blog__tags" data-dcnode-id="1358" kjb-settings-id="sections_blog_post_body_settings_show_tags"><span data-dcnode-id="1362" instrument_node="">
</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savannahgilbo.com/blog%3Ftag%3Dpacing"><span data-dcnode-id="1361" instrument_node="">pacing</span></a><span data-dcnode-id="1359" instrument_node="">
</span></span><span data-dcnode-id="1357" instrument_node="">
</span><a class="blog__comment-count" data-dcnode-id="1355" data-disqus-identifier="146488" href="#disqus_thread"><span data-dcnode-id="1356" instrument_node="">7 Comments</span></a><span data-dcnode-id="1354" instrument_node="">
</span></div><span data-dcnode-id="1352" instrument_node="">
</span><img class="img-fluid" data-dcnode-id="1351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/blogs/14528/images/R9JhQ6yBROedupT0ZSft_narrative-drive.png&amp;raw"><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">If you’re writing a book, I’m sure you’ve wondered how to write a story that grabs and keeps the reader’s interest from page one all the way to “The End”.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">Because after all, every author wants to be read. Every author wants to hear that a reader loved their book&nbsp;</span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">so much</span></em><span data-dcnode-id="1343" instrument_node="">&nbsp;that they just couldn’t put it down.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">But how do you craft a story that has this effect on a reader? And what is it exactly that compels a reader to turn page after page to find out what happens next anyway?</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1337" instrument_node="">The answer?&nbsp;</span><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Narrative Drive.</span></strong></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Narrative drive is the stuff that pulls readers into a story and keeps them spellbound.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">And in today’s post, I’m going to explore all things Narrative Drive–What is it? Why do you need it? How do you create it? And how to fix it when it’s broken. Let’s dive in.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1324" instrument_node="">

</span><div class="window__info-description" data-dcnode-id="1136" dir="auto"><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1172"><b data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">In today's episode, I'm exploring narrative drive or that "thing" that hooks a reader's interest and pulls them through the story.</span></b><span data-dcnode-id="1198" instrument_node=""> Here's a preview of what's included:</span><br data-dcnode-id="1197"/><br data-dcnode-id="1196"/><span data-dcnode-id="1195" instrument_node="">[01:25] What is narrative drive? Here's a quick definition.</span><br data-dcnode-id="1194"/><span data-dcnode-id="1193" instrument_node="">[01:35] According to Robert McKee, narrative drive is sustained when a story plays on two primary needs within the reader -- an intellectual need (curiosity) and an emotional need (concern). </span><br data-dcnode-id="1192"/><span data-dcnode-id="1191" instrument_node="">[01:50] Curiosity is the intellectual need to find answers to questions.</span><br data-dcnode-id="1190"/><span data-dcnode-id="1189" instrument_node="">[02:20] Concern is the emotional need to experience positive outcomes.</span><br data-dcnode-id="1188"/><span data-dcnode-id="1187" instrument_node="">[04:00] A quick overview of the 3 methods for evoking curiosity and/or concern in readers.</span><br data-dcnode-id="1186"/><span data-dcnode-id="1185" instrument_node="">[04:50] Method #1: Mystery evokes mostly curiosity because the reader has LESS information than the characters.</span><br data-dcnode-id="1184"/><span data-dcnode-id="1183" instrument_node="">[06:00] Method #2: Dramatic Irony evokes mostly concern because the reader has MORE information than the characters.</span><br data-dcnode-id="1182"/><span data-dcnode-id="1181" instrument_node="">[06:40] Method #3: Suspense evokes both curiosity and concern because the reader has THE SAME information as the characters. </span><br data-dcnode-id="1180"/><span data-dcnode-id="1179" instrument_node="">[07:25] How does this help you write a story? </span><br data-dcnode-id="1178"/><span data-dcnode-id="1177" instrument_node="">[9:15] Key points and a quick recap of the episode.</span><br data-dcnode-id="1176"/><br data-dcnode-id="1175"/><b data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Subscribe &amp; Review in Apple Podcasts</span></b></p><p data-dcnode-id="1168"><span data-dcnode-id="1171" instrument_node="">Are you subscribed to my podcast? If you’re not, I want to encourage you to do that today. I don’t want you to miss an episode! Especially because I’m adding a bunch of bonus episodes to the mix and if you’re not subscribed there’s a good chance you’ll miss out on those. </span><a data-dcnode-id="1169" href="https://podcasts.apple.com/us/podcast/fiction-writing-made-easy/id1502307717" target="_blank"><span data-dcnode-id="1170" instrument_node="">So, click here to subscribe to the show in Apple Podcasts!</span></a></p><p data-dcnode-id="1156"><span data-dcnode-id="1167" instrument_node="">If you're already a subscriber, and if you enjoy the show, I would be really grateful if you left a review over on </span><a data-dcnode-id="1165" href="https://podcasts.apple.com/us/podcast/fiction-writing-made-easy/id1502307717" target="_blank"><span data-dcnode-id="1166" instrument_node="">Apple Podcasts</span></a><span data-dcnode-id="1164" instrument_node="">, too. Those reviews help other writers find my podcast and they’re also super fun for me to go in and read. </span><a data-dcnode-id="1162" href="https://podcasts.apple.com/us/podcast/fiction-writing-made-easy/id1502307717" target="_blank"><span data-dcnode-id="1163" instrument_node="">Just click here to review</span></a><span data-dcnode-id="1161" instrument_node="">, select “Ratings and Reviews” and “Write a Review” and let me know what your favorite part of the show is. Thanks in advance!</span><br data-dcnode-id="1160"/><br data-dcnode-id="1159"/><b data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Links mentioned in this episode:</span></b></p><ul data-dcnode-id="1150"><li data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">
</span><a data-dcnode-id="1153" href="https://chtbl.com/track/FD414F/www.buzzsprout.com/791087/3004201-how-to-choose-the-best-genre-for-your-story.mp3?blob_id=10662355&amp;download=true" target="_blank"><span data-dcnode-id="1154" instrument_node="">How to Choose the Best Genre for Your Story</span></a><span data-dcnode-id="1152" instrument_node=""> (podcast episode)</span></li></ul><p data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">P.S. Did you know that I have a Facebook group just for fiction writers? In this private group, we talk about all things writing, editing, and publishing fiction. </span><a data-dcnode-id="1147" href="https://www.facebook.com/groups/3454085757954650/" target="_blank"><span data-dcnode-id="1148" instrument_node="">It's free to join and you can request access here.</span></a><span data-dcnode-id="1146" instrument_node=""> Hope to see you there!</span></p><p data-dcnode-id="1138"><a data-dcnode-id="1142" href="https://www.savannahgilbo.com/masterclass" target="_blank"><b data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Click here to register for the free masterclass &gt; The 5 Little-Known Mistakes Most Fiction Writers Make (+ What to Do Instead).</span></b></a><b data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node=""> </span></b><span data-dcnode-id="1139" instrument_node="">In this masterclass, we’re going to talk about the most common mistakes I see writers make so that you can avoid them and write your draft in the most efficient way possible.</span></p><span data-dcnode-id="1137" instrument_node="">

</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">&nbsp;</span></p><span data-dcnode-id="988" instrument_node="">
</span><h2 data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">What is Narrative Drive?</span></strong></h2><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="981"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Narrative Drive is what gives a story its forward momentum. It’s what hooks the reader on page one and pulls them through the rest of the story.</span></strong></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">According to Robert McKee, Narrative Drive is created and sustained when a story plays on two primary “needs” of the reader—one intellectual: curiosity, and one emotional: concern.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">&nbsp;</span></p><span data-dcnode-id="974" instrument_node="">
</span><h3 data-dcnode-id="971"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Curiosity vs. Concern</span></strong></h3><span data-dcnode-id="970" instrument_node="">
</span><ul data-dcnode-id="945"><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="958"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Curiosity is the intellectual need to find answers to questions.&nbsp;</span></strong><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">As the protagonist of a story pursues his or her goal and is put&nbsp;at increasingly&nbsp;greater risk, the reader is propelled forward by the&nbsp;</span><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">need to know</span></strong><span data-dcnode-id="962" instrument_node="">&nbsp;what’s going to happen or how things will turn out. These questions will be answered by the end of the story, so the reader,&nbsp;</span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">held by curiosity</span></strong><span data-dcnode-id="959" instrument_node="">, stays put.</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="947"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Concern is the emotional need to experience positive outcomes</span></strong><span data-dcnode-id="954" instrument_node="">—justice, strength, love, survival, courage, truth, etc. When the reader enters a story on page one, they will immediately try&nbsp;to figure&nbsp;out who’s good, who’s bad, what’s right, what’s wrong, etc.&nbsp;They look&nbsp;for someone (your protagonist)</span><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">&nbsp;to latch onto and care about</span></strong><span data-dcnode-id="951" instrument_node="">&nbsp;as he or she pursues his or her story goal. This attachment will be rewarded at the end of the story, so the reader,&nbsp;</span><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">held by concern</span></strong><span data-dcnode-id="948" instrument_node="">, stays put.</span></li><span data-dcnode-id="946" instrument_node="">
</span></ul><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">And depending on the genre, a story will evoke different levels of concern and/or curiosity in the reader. Think of a story as having both a “curiosity” dial and a “concern” dial–depending on the genre, you will turn one up and one down, or vice versa.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">For example, in a murder mystery, the “curiosity” dial would be turned all the way up. The reader wants to follow the master detective as he or she uncovers clues and solves the intellectual puzzle of “whodunnit.” The “concern” dial would be turned down (almost or all the way) because the reader doesn’t necessarily need (or want) to empathize with the master detective. They just want to solve the puzzle.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">So, now that we know what feelings pull a reader through a story, we have to understand how exactly to evoke those feelings. In other words, how do you manipulate a reader’s feelings in a way that makes them curious or concerned enough to turn the page to find out what happens next?</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&nbsp;</span></p><span data-dcnode-id="932" instrument_node="">
</span><h2 data-dcnode-id="929"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">3 Methods for Evoking Curiosity or Concern</span></strong></h2><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">There are three main ways to evoke feelings of curiosity and/or concern in a reader. Each method has to do with how much information the reader has compared to the characters at any given time in the story.</span></p><span data-dcnode-id="925" instrument_node="">
</span><ul data-dcnode-id="908"><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="920"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Method #1: Mystery.&nbsp;</span></strong><span data-dcnode-id="921" instrument_node="">This method evokes mostly curiosity because the reader has less information than the characters.</span></li><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Method #2: Dramatic Irony.</span></strong><span data-dcnode-id="916" instrument_node="">&nbsp;This method evokes mostly&nbsp;concern&nbsp;because the reader has more information than the characters.</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="910"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Method #3: Suspense.&nbsp;</span></strong><span data-dcnode-id="911" instrument_node="">This method evokes both curiosity and concern because the&nbsp;reader has the same information as the characters.</span></li><span data-dcnode-id="909" instrument_node="">
</span></ul><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">&nbsp;</span></p><span data-dcnode-id="904" instrument_node="">
</span><h3 data-dcnode-id="901"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">1. Mystery</span></strong></h3><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Stories that hold a reader’s interest through curiosity alone are driven forward by mystery. In this scenario, the reader has less information than the characters.</span></strong></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">These are the stories where expositional facts, particularly facts in the backstory are concealed from the reader. The reader&nbsp;</span><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">feels curious</span></strong><span data-dcnode-id="892" instrument_node="">&nbsp;about these past events, and are teased with hints of the truth, and deliberately misled by “red herrings,” so that he or she doesn’t know what to believe and what to dismiss. In other words, the reader has to rely heavily on their intellect to “solve the puzzle.”</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">In stories driven by mystery, readers don’t feel a whole lot of concern for the protagonist because it’s often hard to emotionally connect with someone like a master detective who’s charming and likable (i.e., too perfect) and never in&nbsp;</span><em data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">real</span></em><span data-dcnode-id="886" instrument_node="">&nbsp;jeopardy.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">&nbsp;</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="878"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">2. Dramatic Irony</span></strong></h3><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="874"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Stories that hold a reader’s interest through concern alone are driven forward by dramatic irony. In this scenario, the reader has more information than the characters.</span></strong></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">These are the stories that open with the ending, giving away the outcome on purpose, so that the reader&nbsp;</span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">feels a sense of dread or concern</span></strong><span data-dcnode-id="869" instrument_node="">&nbsp;as the protagonist gets closer and closer to their fate.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">Readers already know what’s going to happen, so they don’t feel a whole lot of curiosity about facts and consequences. Rather, they pay closer attention to motivations and the forces at work in a character’s life to figure out&nbsp;</span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">how</span></em><span data-dcnode-id="863" instrument_node="">&nbsp;the character got from point A to point B.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">&nbsp;</span></p><span data-dcnode-id="858" instrument_node="">
</span><h3 data-dcnode-id="855"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">3. Suspense</span></strong></h3><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Stories that hold a reader’s interest through a mix of curiosity and concern and are driven forward by suspense. In this scenario, the reader has the same information as the characters.</span></strong></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">In these stories, the reader&nbsp;</span><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">feels both curiosity and concern</span></strong><span data-dcnode-id="846" instrument_node="">&nbsp;as they experience the events of the story at the same time as the character. This allows for a high level of empathy between the reader and character because neither one knows what’s about to happen next.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The majority of commercial fiction falls into this category. Why? Because it attracts both your intellectual side (mystery) and your emotional side (concern) and most readers want this kind of balance.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><h2 data-dcnode-id="835"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">How does this help you write your book?</span></strong></h2><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Well, first it’s important to note that&nbsp;</span><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">every story has one main question that it raises in the beginning and answers by the end</span></strong><span data-dcnode-id="830" instrument_node="">. Usually, these questions are determined by a story’s genre. For example:</span></p><span data-dcnode-id="828" instrument_node="">
</span><ul data-dcnode-id="814"><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Romance novels ask: Will these characters get together or not?</span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Mystery novels ask: Will the murderer be identified and brought to justice or not?</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Action novels ask: Will these characters survive the asteroid attack or not?</span></li><span data-dcnode-id="818" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Performance novels ask: Will this character win his boxing match or not?</span></li><span data-dcnode-id="815" instrument_node="">
</span></ul><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">You get the idea…</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="806"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">It’s this major dramatic question that pulls BOTH the reader and character through the story.</span></strong><span data-dcnode-id="807" instrument_node="">&nbsp;It determines what the reader wants to know, and what your character’s goal will be.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">For example, in an action story, a character’s over-arching story goal might be something like “survive the asteroid attack and save the rest of Earth in the process.” Throughout the story, this character would be working really hard to achieve this goal, and the reader would be following along to learn whether or not he or she will succeed.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="801" instrument_node="">What this means for the writer is that&nbsp;</span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">every line, every scene in your story should be moving the character one step closer to achieving his or her goal AND moving the reader one step closer to learning the answer to the question</span></strong><span data-dcnode-id="798" instrument_node="">&nbsp;</span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">raised at the beginning of the story.</span></strong></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">This global question and answer pairing is sometimes called the “spine” of your story, or the main story thread. It’s what every line of dialogue, every scene, every sequence, every subplot, and every act should be contributing to. Because if it doesn’t, what’s the point of including it in your story?</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">And that brings me to the next topic–areas where writers commonly go wrong in terms of Narrative Drive.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">&nbsp;</span></p><span data-dcnode-id="785" instrument_node="">
</span><div data-dcnode-id="781" id="buzzsprout-player-4098332"><span data-dcnode-id="784" instrument_node="">
</span><iframe data-dcnode-id="783" frameborder="0" height="200" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/791087/4098332-5-things-that-kill-narrative-drive-and-how-to-fix-it%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/791087/4098332-5-things-that-kill-narrative-drive-and-how-to-fix-it.js%3Fcontainer_id%3Dbuzzsprout-player-4098332%26player%3Dsmall&amp;raw" title="Fiction Writing Made Easy, 5 Things That Kill Narrative Drive (and How to Fix it)" width="100%"></iframe><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">&nbsp;</span></p><span data-dcnode-id="775" instrument_node="">
</span><h2 data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">5 Things that Kill Narrative Drive:</span></strong></h2><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">A story with “broken” Narrative Drive feels like it’s going nowhere. Readers scratch their heads wondering when the story is&nbsp;</span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">actually&nbsp;</span></em><span data-dcnode-id="767" instrument_node="">going to start and might question whether or not it’s even worth finishing. In order to prevent that from happening, make sure you’re not doing any of these five things that kill Narrative Drive in your story:</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">&nbsp;</span></p><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="759"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">1. Too much backstory or exposition.</span></strong></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">Narrative drive is all about parceling out information in such a way that keeps the reader asking questions and worrying about your protagonist. When you have a long passage of backstory or exposition in a scene or chapter, it reveals too much information at once in a way that repels readers rather than intriguing them. The best way to make sure you’re not doing this is to sprinkle in backstory or exposition&nbsp;</span><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">where it’s relevant</span></em><span data-dcnode-id="754" instrument_node="">&nbsp;to whatever is happening in the scene. In other words, show how your protagonist’s past negatively affects or helps him or her deal with whatever they’re facing in the story present.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">&nbsp;</span></p><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="746"><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">2. No cause and effect trajectory.</span></strong></h3><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">When one scene does not cause or lead into the next scene, it slows the story down and derails the reader. Say for example that you are writing a mystery and you have a chain of scenes where the master detective is following the clues, and then all of a sudden you throw in a scene where the detective is talking to his ex-girlfriend about their failed relationship for no reason. This is going to confuse your reader and probably annoy them. To avoid this in your story, make sure each scene causes the next scene to happen. Show how the events of each scene affect your protagonist both externally and internally. For example,&nbsp;</span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">because&nbsp;</span></em><span data-dcnode-id="741" instrument_node="">X happened (cause), and the protagonist feels Y about it, he will do Z (effect).</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&nbsp;</span></p><span data-dcnode-id="736" instrument_node="">
</span><h3 data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">3. Using false mystery.</span></strong></h3><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">False mystery creates fake curiosity caused by the artificial concealment of a fact. In other words, something that could and should have been given to the reader is withheld in the hope that it will sustain their interest over a long period of time. This is not “playing fair” with the reader and will only result in losing the reader’s trust. To avoid doing this in your story, make sure you play by the rules you’ve established in your story. If the reader has always found out information at the same time as the character, don’t all of a sudden hide an important fact from only the reader.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">&nbsp;</span></p><span data-dcnode-id="726" instrument_node="">
</span><h3 data-dcnode-id="723"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">4. Relying on cheap surprise.</span></strong></h3><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Cheap surprise takes advantage of the reader’s vulnerability. You can always jolt readers by throwing in something truly shocking, like a car crash for no reason other than shock value, but if it doesn’t affect your protagonist and your story, then what’s the point? In certain genres, small amounts of cheap surprise are okay—for example, in some horror, thrillers, and action stories, this is part of the fun. So, in order to avoid doing this in your story, make sure any twist or surprise has a purpose.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">&nbsp;</span></p><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="713"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">5. Solving problems with coincidence.</span></strong></h3><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">Coincidence happens in real life, so you don’t need to totally avoid them in your story, but rather handle them in a way that’s purposeful. You should never have something can’t pop in the story, affect a scene, and then pop out never to appear again. To handle coincidences the right way in your own story, make sure you introduce things early on in the story in a way that seems meaningless and allow them time to build into something meaningful. Never use coincidence to solve a problem at the end of the story–that’s called a&nbsp;</span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">deus ex machina</span></em><span data-dcnode-id="708" instrument_node="">, and it annoys and insults the reader.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">So, what do you do if you’ve made some of these mistakes in your own work-in-progress?</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">&nbsp;</span></p><span data-dcnode-id="700" instrument_node="">
</span><h2 data-dcnode-id="697"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">How to Fix Broken Narrative Drive:</span></strong></h2><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">First, it’s important to note that slowing down the action in your story isn’t always a bad thing. Sometimes it’s the right thing to do if it helps the overall pacing of your story, or if you want to give the reader a much-needed break after a sequence of action scenes.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">But coming to a complete halt, for no good reason, is a problem that will cause readers to lose interest in your story and pick up another book. So, what do you do if you notice some sluggish areas in your manuscript that weren’t done on purpose?</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">&nbsp;</span></p><span data-dcnode-id="687" instrument_node="">
</span><h3 data-dcnode-id="684"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Well, you can start by asking yourself these questions about each scene:</span></strong></h3><span data-dcnode-id="683" instrument_node="">
</span><ol data-dcnode-id="651"><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Does my protagonist have a goal in this scene? If so, does this goal contribute to their overarching story goal? If not, how can I revise this scene so that my protagonist does have a goal?</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Is my protagonist’s motivation clear in this scene? Does it make&nbsp;sense&nbsp;why he or she would pursuing this scene goal? If not, how can I revise this scene so that my protagonist’s motivation is clear and believable?</span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Is there both external and internal conflict in this scene? Do I show how the events of the plot affect my protagonist internally? If not, how can I highlight my protagonist’s thoughts, feelings, and reactions better?</span></li><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Does everything in this scene point in the same direction? If not, how can I make every action or reaction help my protagonist get closer to (or somethings father away from) achieving his or her story goal?</span></li><span data-dcnode-id="670" instrument_node="">
</span><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Is there something at stake in this scene? If not, how can I show what my protagonist stands to lose or gain in this scene?</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Does my protagonist face a dilemma in this scene? If not, how can I revise this scene so that my protagonist has to make a choice between two equally good things or two equally bad things?</span></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Is there a clear change in my protagonist from the beginning of the scene to the end? If not, how can I revise the scene so that my protagonist changes, learns, or grows?</span></li><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Does this scene stop to explore backstory? Do I spend too much time explaining things such as world-building details or a character’s past? If so, how can I sprinkle in only the parts of backstory or world-building that affect what’s happening in this scene?</span></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Is this scene a direct result of the scene that came before it? Does it cause the next scene that follows it? If not, how can I revise this scene so that I create a “cause and effect” trajectory in my story?</span></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">What’s the point of this scene? Why do I need it in my story? Am I keeping this scene in my story because I think parts of it sound really good? If so, can I take those parts and layer them into another scene?</span></li><span data-dcnode-id="652" instrument_node="">
</span></ol><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">&nbsp;</span></p><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="644"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Final Thoughts</span></strong></h2><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">So, there you have it! Everything I know about creating&nbsp;Narrative&nbsp;Drive that grabs a reader’s interest and sustains it throughout the story.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">If you&nbsp;</span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">understand&nbsp;</span></em><span data-dcnode-id="636" instrument_node="">Narrative Drive, you’ll never have a problem pulling readers into your world. But is it the only thing you need to worry about in order to keep readers engaged with your story? No, it’s not. Narrative Drive is linked to many other storytelling principles– like character, plot, etc.—that when done well, and woven together masterfully, add up to create a story that works.</span></p><span data-dcnode-id="634" instrument_node="">
</span><div data-dcnode-id="632" style="display: none;"><img alt="Narrative Drive: How to Write a Page-Turning Novel | Savannah Gilbo - Want to write a book that readers just can't put down? Learn how to maximize the narrative drive in your story so that readers will be on the edge of their seats wondering what happens next! #amwriting #writingtips #writingcommunity" data-dcnode-id="633" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/14528/images/F7II64HrRpiG2y1WQiru_narrative-drive.png&amp;raw"></div><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="627"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">👉 Let’s discuss in the comments:&nbsp;</span></strong><span data-dcnode-id="628" instrument_node="">Which method of narrative drive do you most use in your story? Do you like to read stories that hold your interest through curiosity, concern, or a little bit of both? Let us know in the comments below!</span></p><span data-dcnode-id="626" instrument_node="">
</span><span data-dcnode-id="623" instrument_node="">

</span><div data-dcnode-id="402" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="484"><div class="comment__name clearfix" data-dcnode-id="488"><img class="comment__avatar" data-dcnode-id="493" height="32" src="https://c.disquscdn.com/uploads/users/21690/2208/avatar92.jpg?1616127688" width="32"/><strong data-dcnode-id="490"><a data-dcnode-id="491" href=""><span data-dcnode-id="492" instrument_node="">Julia</span></a></strong><span data-dcnode-id="489" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="485"><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">When you're trying to fix narrative drive and you ask yourself the 10 questions, do all 10 need to be addressed in each scene? In other words, would each scene in a book ideally have all 10?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="474"><div class="comment__name clearfix" data-dcnode-id="478"><img class="comment__avatar" data-dcnode-id="483" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="480"><a data-dcnode-id="481" href=""><span data-dcnode-id="482" instrument_node="">Shawn Beilfuss</span></a></strong><span data-dcnode-id="479" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="475"><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">I experienced #4 in the Narrative Drive killer list recently in a book I am reading, and #1 in an 80's fantasy book when I think it was a common practice. I love the 10 questions and will be great when I later put on my editor's hat to review my first draft once completed.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="464"><div class="comment__name clearfix" data-dcnode-id="468"><img class="comment__avatar" data-dcnode-id="473" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="470"><a data-dcnode-id="471" href=""><span data-dcnode-id="472" instrument_node="">Cate</span></a></strong><span data-dcnode-id="469" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="465"><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Hi Savannah! I've been really enjoying your podcasts and have already left a review on iTunes. I also appreciate that you post the transcript so if I miss something in the show I can read it later. I always find myself waiting for the next episode. Thank you!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="444"><div class="comment__name clearfix" data-dcnode-id="458"><img class="comment__avatar" data-dcnode-id="463" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="460"><a data-dcnode-id="461" href=""><span data-dcnode-id="462" instrument_node="">kevincbrown</span></a></strong><span data-dcnode-id="459" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="445"><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Question about "false mystery", or the artificial concealment of a fact.</span></p><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">I have a story in which the external facts that are known to the characters are also known by the reader. But I have concealed the protagonists' reactions or decisions based on the facts, so that the reader doesn't know what the protagonists will do, given a choice between two terrible choices. The protagonists' thoughts are shared with the reader in the middle of the story. But near the climax, the POV pulls back so the reader no longer knows what the protagonists are thinking, and concealing the decision until it is revealed through their actions.</span></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Is that problematic? Or a good use of mystery?</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">As an example, there's Casablanca. In the middle, the audience hears Rick's thoughts directly, as he cries into his drink ("of all the gin joints, in all the towns,in all the world..."). But at the end, the audience doesn't know if Rick is going to run off with Ilsa or not. His decision is a mystery until revealed by his action.</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Seemed to work there, but I wonder if that is generally true.</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Thanks for the post.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="423"><div class="comment__name clearfix" data-dcnode-id="438"><img class="comment__avatar" data-dcnode-id="443" height="32" src="https://c.disquscdn.com/uploads/users/22520/9938/avatar92.jpg?1649116759" width="32"/><strong data-dcnode-id="440"><a data-dcnode-id="441" href=""><span data-dcnode-id="442" instrument_node="">Savannah Gilbo</span></a></strong><span data-dcnode-id="439" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="424"><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Good question! My gut feeling says it's probably not a good idea to hide your protagonist's thoughts and feelings from the reader. Part of what makes fiction enjoyable is that we (readers) get to dip into someone else's head and see how they think, feel, and process the events of the story.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">I have read stories where the protagonist's decision during the climax or third act is hidden from the reader because the author has us in another character's POV at the time. In one scenario, we find out about the protagonist's decision from the character whose POV we're in during the decision moment. In the other scenario, we find out about the protagonist's decision (and why they made this decision) when we go to their next POV scene (if that makes sense). Both worked well because we were in another person's POV at the time (and that POV had been established throughout the book already). That being said, a little part of me was bummed when I had to find out the protagonist's decision after it was already made. However, I was ultimately okay with it because I got to see how she ended up at that decision once we got to her POV scene.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">I haven't seen Casablanca in a long, long time, so I probably shouldn't comment on why that works until I go back and watch it again...</span></p><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">Long story short, what I mean by "false mystery" is when a writer puts us in the protagonist's POV but doesn't explain/show something important through the protagonist's POV. So, for example, if the protagonist opens a box and gasps at what's inside and then the next 10 scenes don't let the reader in on what was inside the box, it's just annoying. The reason why is because the protagonist </span><i data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">would naturally have</span></i><span data-dcnode-id="428" instrument_node=""> thoughts and feelings about whatever was in the box -- especially if they came looking for this specific box, you know? So, in that scenario, the author is holding information back from the reader hoping that the "mystery" of what's in the box will keep them reading to find out more when really, it usually has the opposite effect.</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">I hope that helps!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="413"><div class="comment__name clearfix" data-dcnode-id="417"><img class="comment__avatar" data-dcnode-id="422" height="32" src="https://c.disquscdn.com/uploads/users/33878/8113/avatar92.jpg?1570499162" width="32"/><strong data-dcnode-id="419"><a data-dcnode-id="420" href=""><span data-dcnode-id="421" instrument_node="">Styk</span></a></strong><span data-dcnode-id="418" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="414"><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">great post! this is the one area I've struggled with and you've explained the concept perfectly! thanks!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="403"><div class="comment__name clearfix" data-dcnode-id="407"><img class="comment__avatar" data-dcnode-id="412" height="32" src="https://c.disquscdn.com/uploads/users/22520/9938/avatar92.jpg?1649116759" width="32"/><strong data-dcnode-id="409"><a data-dcnode-id="410" href=""><span data-dcnode-id="411" instrument_node="">Savannah Gilbo</span></a></strong><span data-dcnode-id="408" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="404"><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Hello Styk! Thank you for your comment and kind words. I'm so glad you found the post helpful!</span></p></div></div></div><span data-dcnode-id="401" instrument_node="">
