s different narrative devices, the benefits of learning them and some tips you can use to choose the right device.</span></p><h2 class="rich-text-component css-tvmuer e1tiznh50" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">What is a narrative device?</span></h2><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">A narrative device is a writing technique you can use to tell a story. Narrative devices combine things like tone, point of view and tense to create a consistent narrative that the reader can follow throughout a story. You can consider your genre and other examples of narrative devices when detailing your plot, characters and setting to see if a narrative device may help you tell your story or convey your purpose. There are different narrative devices you can use that can affect point of view, theme, style, plot and setting.</span></p><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="332"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Related:</span></span><span data-dcnode-id="339" instrument_node=""> </span><a aria-label="Visit an external page (opens in a new window)" class="css-1v152rs emf9s7v0" data-dcnode-id="333" data-link-page-type="ARTICLE" data-link-type="articleContentLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/career-development/how-to-become-a-writer" rel="noopener noreferrer" target="_blank"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">How To Become a Writer in 7 Steps</span></span><svg aria-hidden="true" class="css-r5jz5s eac13zx0" data-dcnode-id="334" fill="currentColor" focusable="false" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.504 3a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h3.085l-9.594 9.594a.5.5 0 000 .707l.707.708a.5.5 0 00.707 0l9.594-9.595V9.5a.5.5 0 00.5.5h1a.5.5 0 00.5-.5v-6a.5.5 0 00-.5-.5h-6z" data-dcnode-id="336"></path><path d="M5 3.002a2 2 0 00-2 2v13.996a2 2 0 001.996 2.004h14a2 2 0 002-2v-6.5a.5.5 0 00-.5-.5h-1a.5.5 0 00-.5.5v6.5L5 18.998V5.002L11.5 5a.495.495 0 00.496-.498v-1a.5.5 0 00-.5-.5H5z" data-dcnode-id="335"></path></svg></a></p><h2 class="rich-text-component css-tvmuer e1tiznh50" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Benefits of using a narrative device</span></h2><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Narrative devices can enhance the meaning of a story. A piece of writing can contain elements like plot, setting and characters, and narrative devices can help you represent each of these elements. Some benefits of using narrative devices include:</span></p><ul class="rich-text-component css-8gc1pn eu4oa1w0" data-dcnode-id="312"><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="323"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="324"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Provide structure:</span></span><span data-dcnode-id="325" instrument_node=""> Narrative devices can provide structure to your story. You can apply these devices consistently across a story to provide a structure to the reader.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="318"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="319"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Communicate meaning:</span></span><span data-dcnode-id="320" instrument_node=""> Using narrative devices is a method writers can use to provide meaning for their readers. You can use these devices to help readers understand the purpose of your piece of writing.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="313"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="314"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Connect to readers:</span></span><span data-dcnode-id="315" instrument_node=""> Choosing different narrative devices can help you connect to your readers at different levels. Rather than just relating through content, you can use devices to address or ignore your audience.</span></p></li></ul><h2 class="rich-text-component css-tvmuer e1tiznh50" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Types of narrative devices</span></h2><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Here are some of the narrative devices that writers commonly use:</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Chronological or reverse chronological</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">A chronological narrative tells the events in a story in order of how they happened and reverse chronological is the opposite, telling a story from the ending backward. A chronological narrative can include other literary devices like flashbacks (where the narrative shifts to a character's memory) to tell parts of the story, but the writer reveals most of the plot sequentially. This is one of the most common narrative devices as it is easy for readers to follow and reflects life.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Real time</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Real time is a narrative device where the plot unfolds exactly during the length of the story. This is most commonly achieved in screenwriting or playwriting. The length of the play, for example, may correspond with the characters' experience. You might consider a single scene or following a character from location to location to capture a real-time narrative. This can be effective in involving the audience at each moment.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Breaking the fourth wall</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">The fourth wall is the space separating a performance and the audience. The narrative device of breaking the fourth wall shows a character in the narrative directly addressing the audience or reader. This actively engages readers in the narrative.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Epistolic</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Epistolic or diary format is a narrative device where you create a narrative through a series of journal entries or other written documents. The main character may convey their emotions or reactions to certain situations or recount the details of a day. This helps the audience see the story exactly as the character does, understanding the character's fears, joys, excitement and thoughts.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Documentary</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">A documentary narrative is a device that records or transcribes the events of someone's life or situation. Often, characters within the story can directly address the reader or audience, as interviewers might ask them questions in responses to situations. Documentaries are great narrative devices if you want to replicate a real-life situation.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Framing story</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">A framing story is best simplified as a story within a story. For example, characters within a story performing a play is a framing story. This is best used to show scenes that might not directly move a plot forward, or it can highlight themes from the larger work. You can also create a framed story by a character introducing the narrative at the beginning of a story. This might use other devices like flashback to frame the narrative.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Stream of consciousness</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Stream of consciousness is a narrative device that transcribes what a character is thinking. This can include descriptions of what they see, immediate reactions or how they feel. This style can convey the continuous flow of thoughts in a main character. You might combine this with other narrative devices like real time to show what the character experiences and how they might process these experiences.</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Other plot devices</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">There are several other plot devices you can use in narrative writing. You might see these used across genres and styles in combination with other devices. Here are just a few examples:</span></p><ul class="rich-text-component css-8gc1pn eu4oa1w0" data-dcnode-id="260"><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="271"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="272"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Plot twist:</span></span><span data-dcnode-id="273" instrument_node=""> A plot twist is an unexpected event that dramatically shifts a narrative. A common example of this is a sudden death of a main character.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="266"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="267"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Foreshadowing:</span></span><span data-dcnode-id="268" instrument_node=""> This is subtle clues that something is going to happen in the future of the narrative. These clues might not be clear to the reader right away but may seem obvious after reading the full narrative.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="261"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="262"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Unreliable narrator:</span></span><span data-dcnode-id="263" instrument_node=""> This is when a narrator has certain characteristics that make them untrustworthy. This is a device driven by the character and you may combine it with other devices like stream of consciousness.</span></p></li></ul><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Other style devices</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Style devices are narrative choices you can make across the general language and tone of a narrative. Some examples of this include:</span></p><ul class="rich-text-component css-8gc1pn eu4oa1w0" data-dcnode-id="235"><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="251"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="252"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Allegory:</span></span><span data-dcnode-id="253" instrument_node=""> Allegory uses symbolism in characters and situations to represent actual situations or problems in society. You may choose to use allegory if the story has a moral to convey.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="246"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="247"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Imagery:</span></span><span data-dcnode-id="248" instrument_node=""> Using sensory detail, imagery is when you describe items with great specifics. This helps the reader or audience experience the scene you are showing.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="241"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="242"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Parody:</span></span><span data-dcnode-id="243" instrument_node=""> Parody is imitating something else. You might write parody to criticize elements of society.</span></p></li><li class="rich-text-component css-1m2btmv eu4oa1w0" data-dcnode-id="236"><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="237"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Satire:</span></span><span data-dcnode-id="238" instrument_node=""> Similar to parody, satire uses elements like exaggeration and sarcasm to highlight certain qualities in people or situations. For example, satire that focuses on wealthy people might describe them as surrounded by physical bills.</span></p></li></ul><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="225"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Related:</span></span><span data-dcnode-id="232" instrument_node=""> </span><a aria-label="Visit an external page (opens in a new window)" class="css-1v152rs emf9s7v0" data-dcnode-id="226" data-link-page-type="ARTICLE" data-link-type="articleContentLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/career-development/types-of-symbolism" rel="noopener noreferrer" target="_blank"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">8 Types of Symbolism</span></span><svg aria-hidden="true" class="css-r5jz5s eac13zx0" data-dcnode-id="227" fill="currentColor" focusable="false" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.504 3a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h3.085l-9.594 9.594a.5.5 0 000 .707l.707.708a.5.5 0 00.707 0l9.594-9.595V9.5a.5.5 0 00.5.5h1a.5.5 0 00.5-.5v-6a.5.5 0 00-.5-.5h-6z" data-dcnode-id="229"></path><path d="M5 3.002a2 2 0 00-2 2v13.996a2 2 0 001.996 2.004h14a2 2 0 002-2v-6.5a.5.5 0 00-.5-.5h-1a.5.5 0 00-.5.5v6.5L5 18.998V5.002L11.5 5a.495.495 0 00.496-.498v-1a.5.5 0 00-.5-.5H5z" data-dcnode-id="228"></path></svg></a></p><h2 class="rich-text-component css-tvmuer e1tiznh50" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Tips for choosing a narrative device</span></h2><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Here are some tips you can use when deciding on a narrative device:</span></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Consider point of view</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Point of view is the perspective from which a story is told. You can write from the perspective of a main character (first person), an ambiguous perspective (third person) or have the audience be the main character (second person). These can create different intimacy levels with your reader. For example, first person allows you to explore a person's thoughts, so you might use the stream-of-consciousness device. Third-person narratives can be less intimate, so you might use imagery to increase the level of detail in a story.</span></p><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="207"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Related:</span></span><span data-dcnode-id="214" instrument_node=""> </span><a aria-label="Visit an external page (opens in a new window)" class="css-1v152rs emf9s7v0" data-dcnode-id="208" data-link-page-type="ARTICLE" data-link-type="articleContentLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/career-development/second-person-narrative" rel="noopener noreferrer" target="_blank"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Guide To Writing a Second-Person Narrative</span></span><svg aria-hidden="true" class="css-r5jz5s eac13zx0" data-dcnode-id="209" fill="currentColor" focusable="false" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.504 3a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h3.085l-9.594 9.594a.5.5 0 000 .707l.707.708a.5.5 0 00.707 0l9.594-9.595V9.5a.5.5 0 00.5.5h1a.5.5 0 00.5-.5v-6a.5.5 0 00-.5-.5h-6z" data-dcnode-id="211"></path><path d="M5 3.002a2 2 0 00-2 2v13.996a2 2 0 001.996 2.004h14a2 2 0 002-2v-6.5a.5.5 0 00-.5-.5h-1a.5.5 0 00-.5.5v6.5L5 18.998V5.002L11.5 5a.495.495 0 00.496-.498v-1a.5.5 0 00-.5-.5H5z" data-dcnode-id="210"></path></svg></a></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Consider purpose</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Purpose is the overall aim of your piece. If you have a moral you want to convey, consider devices like parody or satire. If you want the piece to reflect reality as much as possible, you might use documentary style. Narrative devices can help move a story forward and may enhance the purpose of your piece.</span></p><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="193"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Related:</span></span><span data-dcnode-id="200" instrument_node=""> </span><a aria-label="Visit an external page (opens in a new window)" class="css-1v152rs emf9s7v0" data-dcnode-id="194" data-link-page-type="ARTICLE" data-link-type="articleContentLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/finding-a-job/creative-writing" rel="noopener noreferrer" target="_blank"><span class="css-je7s01 eu4oa1w0" data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">The Creative Writing Process</span></span><svg aria-hidden="true" class="css-r5jz5s eac13zx0" data-dcnode-id="195" fill="currentColor" focusable="false" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.504 3a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h3.085l-9.594 9.594a.5.5 0 000 .707l.707.708a.5.5 0 00.707 0l9.594-9.595V9.5a.5.5 0 00.5.5h1a.5.5 0 00.5-.5v-6a.5.5 0 00-.5-.5h-6z" data-dcnode-id="197"></path><path d="M5 3.002a2 2 0 00-2 2v13.996a2 2 0 001.996 2.004h14a2 2 0 002-2v-6.5a.5.5 0 00-.5-.5h-1a.5.5 0 00-.5.5v6.5L5 18.998V5.002L11.5 5a.495.495 0 00.496-.498v-1a.5.5 0 00-.5-.5H5z" data-dcnode-id="196"></path></svg></a></p><h3 class="rich-text-component css-26ec2o e1tiznh50" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Consider form</span></h3><p class="rich-text-component css-1rr6t3x e1wnkr790" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Form is how you structure your story. For example, an epistolic narrative might have chapters separated as individual journal entries, but a stream-of-consciousness narrative might not have chapters at all. If you have yet to choose a narrative device to use, consider the form you plan to write in. This could help narrow down what might most effectively fit your narrative.</span></p><span data-dcnode-id="188" id="main-content-end"></span><div class="css-17ajll4 eu4oa1w0" data-dcnode-id="187"></div></div><div class="css-1j4k9wk eu4oa1w0" data-dcnode-id="145"><div class="css-zxggd5 e37uo190" data-dcnode-id="146"><h2 class="css-e5zmrg e1tiznh50" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Browse more articles</span></h2><ul class="css-pjoer8 eu4oa1w0" data-dcnode-id="147"><li class="css-kyg8or eu4oa1w0" data-dcnode-id="181"><a class="css-1v152rs emf9s7v0" data-dcnode-id="182" data-link-page-type="ARTICLE" data-link-type="articleExploreMoreTextLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/career-development/what-is-a-major-in-college"><span data-dcnode-id="183" instrument_node="">What Is a Major In College: FAQs</span></a></li><li class="css-kyg8or eu4oa1w0" data-dcnode-id="178"><a class="css-1v152rs emf9s7v0" data-dcnode-id="179" data-link-page-type="ARTICLE" data-link-type="articleExploreMoreTextLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/career-advice/career-development/what-is-a-a-testing"><span data-dcnode-id="180" instrument_node="">What Is A/A Testing in Marketing?</span></a></li><li class="css-kyg8or eu4oa1w0" data-dcnode-id="175"><a class="css-1v152rs
