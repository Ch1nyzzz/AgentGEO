</span><p data-dcnode-id="3145"><strong data-dcnode-id="3146"><span data-dcnode-id="3147" style="color: #ff0000;"><span data-dcnode-id="3148" instrument_node="">Dear Jim,</span></span></strong></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3140"><strong data-dcnode-id="3141"><span data-dcnode-id="3142" style="color: #ff0000;"><span data-dcnode-id="3143" instrument_node="">Your voice was the soundtrack of my kids childhood – everywhere we went we had different stories playing on the CD player. My son is now a senior at Harvard with a major in Organismal Biology and a minor in Myth and Folklore. We were just talking today about different authors that have shaped him and he said that your stories probably impacted him the most… he is currently in a class on the Arthurian legends… where they were surprised how many Celtic myths he knew… so I asked, “what about the science interests” and he said said, “that too, Galileo and Archimedes…”. My daughter is a Freshwoman in HS and is taking A.P. Geography where she walks away proudly saying things like, “I already knew a lot of the stuff we were talking about”… which she attributes to the series on the History of the World that we actually listened to (all 4 volumes) from start to finish several times!</span></span></strong></p><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3135"><strong data-dcnode-id="3136"><span data-dcnode-id="3137" style="color: #ff0000;"><span data-dcnode-id="3138" instrument_node="">I want you to know that I noticed how well written and thoughtful all your short stories on thematic albums were and how easy your voice was to listen to on the longer adventures with Susan Bauer…</span></span></strong></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3130"><strong data-dcnode-id="3131"><span data-dcnode-id="3132" style="color: #ff0000;"><span data-dcnode-id="3133" instrument_node="">Thank you! &nbsp;-Parent</span></span></strong></p><span data-dcnode-id="3129" instrument_node="">

</span><p data-dcnode-id="2559"><span data-dcnode-id="2565" instrument_node="">
</span><em data-dcnode-id="2561"><strong data-dcnode-id="2562"><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jimweiss.com/recording/bible-stories-great-men-and-women-from-noah-through-solomon/"><span data-dcnode-id="2564" instrument_node=""> More Info...</span></a></strong></em><span data-dcnode-id="2560" instrument_node="">

</span><div class="itemdetail" data-dcnode-id="2537"><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2554"></p><p data-dcnode-id="2550"><span data-dcnode-id="2553" instrument_node="">The Bible brims with stories of people who don’t seem remarkable until God chooses to work through them to further His purposes. His intentions link everyone and everything – which was a startling idea in the chaotic ancient world.</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">
A second revelation in these stories was that God cared how human beings behaved toward one another. This enormous, eye-opening change in religion remains one of the greatest gifts ever to enter the world – and one of the most challenging.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Thirty years ago, one of Jim Weiss’ first recordings was “Tales from the Old Testament.”  I love the stories and the people in them, but after time and a great deal of thought,  Jim says, “I have been led to a new recording-one that I could not have made all those years ago and the result is “Bible Stories: Great Men and Women from Noah to Solomon.”  More than ever, I seek the lessons that Bible stories offer us… if we pay attention. Join me in this exploration of stories, some familiar and some new, that form one of the foundations of our world.”</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2545"></p><span data-dcnode-id="2544" instrument_node="">
</span><ul data-dcnode-id="2539"><span data-dcnode-id="2543" instrument_node="">

</span></ul><span data-dcnode-id="2538" instrument_node="">

</span><p data-dcnode-id="1863"></p><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Thrill to dragon stories from around the world and throughout the centuries, spun by Master Storyteller Jim Weiss. From misty Scottish lochs to the sea-caves of Japan, and from the steppes of Russia to the Gold Coast of Africa, these seven stories span more than five thousand years of human fascination with dragons. Jim Weiss adapts folk tales and myths of helpful dragons, ferocious dragons, greedy dragons, and clever dragons–and the men and women who encounter them. You’ll be amazed as you range from one of the oldest surviving written tales in human literature, reflecting the never ending allure of dragons, to Jim’s own spellbinding tale, set in Scotland and compounded from archetypal tales from multiple lands. Your family will love this exhilarating ride on the wings of dragons!</span></p><span data-dcnode-id="1860" instrument_node="">

</span><p data-dcnode-id="1447"></p><p data-dcnode-id="1443"><span data-dcnode-id="1445" style="color:red"><span data-dcnode-id="1446" instrument_node="">NEW!!!</span></span><span data-dcnode-id="1444" instrument_node=""> Award-winning author and storyteller Jim Weiss sets you right in the middle of the action as Marie Curie and her family triumph over poverty and personal loss to win six Nobel Prizes; as shy Isaac Newton remakes our understanding of the universe and the laws that govern it, then risks his life to destroy a criminal conspiracy that threatens a nation; as Albert Einstein builds the foundations of our modern world and then confronts the results with wisdom and humor; and as Gertrude Elion, Nobel Prize-winning, pioneering biochemist, parlays her joyous love of learning into medical breakthroughs that save thousands of lives and open professional doors for other women.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">As dramatic as any great literary classic, and told in Jim Weiss’s warm, accessible style, these stories reveal the personal, professional and societal challenges these geniuses overcame, and shine a light on the nature of genius itself.  And as a clear, family-friendly introduction to mathematics and science, listeners will find an inspiring, welcoming world opening up. </span></p><span data-dcnode-id="1439" instrument_node="">

</span><p data-dcnode-id="798"></p><p data-dcnode-id="794"><b data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">New!</span></b><span data-dcnode-id="795" instrument_node=""> Theodore Roosevelt boldly led the United States and much of the world into our Modern Age, farsightedly shaping today’s issues a century ago.  From the Wild West to the White House, he led a life of non-stop, exhilarating adventures and public service he called “the life of action… striving to do deeds in a worthy cause.” His astonishing life shows how much one determined person can relish life, overcome challenges and benefit society.  </span></p><span data-dcnode-id="793" instrument_node="">

</span><p data-dcnode-id="762"></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">At last, one of the most cherished family classics comes to &nbsp;audio in an unabridged reading by acclaimed voice actor Jim Weiss.&nbsp;&nbsp;Jim brings out the unique warmth and cleverness of each beloved character in this best-selling story of four children, recently orphaned, who must run away to remain together, and who find refuge in a deserted railway boxcar in the woods. The friends they make, including a charming stray dog whom they adopt, and the children’s mutual support and ingenuity in turning challenges into surprising triumphs will warm the hearts of every listener. Don’t wait. It’s time to meet&nbsp;The Boxcar Children.</span></p><span data-dcnode-id="759" instrument_node="">
