</span><span data-dcnode-id="1911" id="freeTextContainer10973767999729067720"><span data-dcnode-id="1912" instrument_node="">Thematically, the four stories collected here all deal with different types of predatory men, and the ways in which they corrupt or control women. I've discovered Oates, an exceptionally prolific writer, this year, but after two massive novels, these were my first exposure to her short(er) form writing, and I'm glad to see that she apparently excels here, too. I just love the crisp yet hauntingly raw and often uncomfortably intense way she writes about feminist issues. These novellas didn't only</span></span><span data-dcnode-id="1910" instrument_node="">
</span><span data-dcnode-id="1867" id="freeText10973767999729067720" style="display:none"><span data-dcnode-id="1909" instrument_node="">Thematically, the four stories collected here all deal with different types of predatory men, and the ways in which they corrupt or control women. I've discovered Oates, an exceptionally prolific writer, this year, but after two massive novels, these were my first exposure to her short(er) form writing, and I'm glad to see that she apparently excels here, too. I just love the crisp yet hauntingly raw and often uncomfortably intense way she writes about feminist issues. These novellas didn't only go well together thematically, but they also had a very uncanny atmosphere in common, without it ever feeling recycled—each story managed to evoke its own special kind of oppressive, quiet dread. A rounded up 3.5 stars!</span><br data-dcnode-id="1908"><br data-dcnode-id="1907"><i data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Cardiff, By The Sea</span></i><span data-dcnode-id="1904" instrument_node=""> · ★★★</span><br data-dcnode-id="1903"><span data-dcnode-id="1902" instrument_node="">An art historian who'd been adopted when she was barely three years old receives a call saying that her biological grandmother has left her a bequest. She travels to Cardiff, Maine, to sort things out, but the past and layers of hidden trauma she dredges up in the process make her wish she'd never answered the phone. This titular story makes up almost half of the collection, and while I loved the beginning, it sort of lost me the further we went along. It is reasonably suspenseful and gave me some strong Shirley Jackson vibes in that there is a vague but strong sense of distress permeating the narrative, but the bickering great-aunts irritated the hell out of me and drained the story of all enjoyment whenever they were in a scene. Despite being someone who enjoys open endings, the utter lack of resolution left me dissatisfied; maybe it went over my head.</span><br data-dcnode-id="1901"><br data-dcnode-id="1900"><i data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Miao Dao</span></i><span data-dcnode-id="1897" instrument_node=""> · ★★★★½</span><br data-dcnode-id="1896"><span data-dcnode-id="1895" instrument_node="">Mia, a lonely pubescent girl dealing with her parents' divorce, her mother's new marriage, and school boys bullying her for her changing body, finds some comfort in visiting and putting out food for a colony of feral cats in her neighborhood. When the colony gets eradicated by the department of public health, she rescues a kitten, which becomes her protector from the increasing predatory male aggression she faces. I read this story in one sitting with my own two kittens purring on me, and I just wanted to kiss them all over, and felt the silly need to tell them that I'd protect them from all harm; I love the way Oates writes about kitties, she's a cat lady after my own heart! There were parts in this story—which is essentially about the power and control men enact upon women and other living beings—that were hard to read, but the ending was chillingly satisfying while also remaining utterly ambiguous in a way that I loved.</span><br data-dcnode-id="1894"><br data-dcnode-id="1893"><i data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Phantomwise: 1972</span></i><span data-dcnode-id="1890" instrument_node=""> · ★★★★</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">A smart but shy college student has an affair with a professor, and gets pregnant. Distraught at her lack of options, she decides to confront the state she finds herself in with denial, and welcomes it when a distinguished older professor takes her under her wing as his archivist, even though he clearly has more in mind. Yet another tale about the type of control men in powerful positions can exert over women that still resonates today, even though life on a college campus in the early 70's was quite different, as was the state of women's reproductive rights. Considering this, I felt more sympathy for the somewhat helpless protagonist than I would've felt if this tale had been set in contemporary times. The line between reality and nightmare is thin here, and the ending was eerie and heartbreaking.</span><br data-dcnode-id="1887"><br data-dcnode-id="1886"><i data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">The Surviving Child</span></i><span data-dcnode-id="1883" instrument_node=""> · ★★★½</span><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">A famous feminist poet killed herself and her daughter, leaving no suicide note, and evidently decided to spare her eldest son from the same fate. A couple years later, the surviving child's father remarries and moves the young wife into the house where the tragedy happened. She desperately wants to connect with the shy, elusive child, but finds herself haunted by his dead mother's poetry. This story had something almost archetypal about it—</span><i data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Bluebeard</span></i><span data-dcnode-id="1878" instrument_node=""> comes to mind. I found it predictable (or maybe </span><i data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">inevitable</span></i><span data-dcnode-id="1875" instrument_node=""> is the better word), which however doesn't mean that I didn't enjoy the story's unfolding. Out of the four included, it's the one with the most obvious supernatural influence.</span><br data-dcnode-id="1874"><br data-dcnode-id="1873"><span data-dcnode-id="1872" instrument_node="">—————</span><br data-dcnode-id="1871"><br data-dcnode-id="1870"><i data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Note: I received an ARC of this book in exchange for an honest review.</span></i></span><span data-dcnode-id="1866" instrument_node="">

</span><span data-dcnode-id="1788" id="freeText7697744368652523489" style="display:none"><span data-dcnode-id="1789" instrument_node="">The day I chose to read this book Joyce Carol Oates was actually in the news. Quite random, quite a coincidence, really. And what she did to get in the news is post a stupid tweet. Now I’m not going to turn this review into a tirade about the evils of twitter, because while, like most social media, it is absolutely an evil thing that gives platform to the levels of stupidity that not so long ago were private and /or geographically restricted to the stupids’ immediate radius and yes twitter is one of major signifiers of civilizations’ backwards tumble into abyss and all that…it doesn’t actually seem to preclude anyone from twittering away. Apparently everyone needs a soap box, a platform for their ignorance and vitriol to spew forth into the world. Such as a respected author who took it upon herself to post an obnoxiously rude snippy comment on something as innocuous as Anderson Cooper’s son’s birth announcement. The reason being Oates’ specific kind of feminism got offended by Cooper omitting to mention the surrogate mother. Seriously. Because it’s her business. Seriously. For me it’s like this…the wealthy, the famous, the 1% seem to buy nice things all the time without mentioning their provenance, I wouldn’t expect Cooper to announce who incubated his baby for him any more than I would expect him to announce who build his mansion for him or who cooks his meals. I don’t even know why he needs to announce he bought a baby, but privacy is dead and people can’t shut up about themselves, so there we are. Plus there’s also a fact that surrogacy is to my understanding a private matter and someone might not want to be known as the baby incubator for pay. So then why does Joyce Carol Oates have such a need to defend this woman who must likely needs no defending? Because Oates seems to be practicing a very specific kind of feminism, the toxic kind. Am I coining toxic feminism here? Seems unlikely, but would be awesome if that’s the case. Mind you, I’m not in any way against feminism, the kind that promotes equality and recognition and all that, but when it gets perverted into a manhating one track minded obsessive sort of mission to find real or imaginary oppression in every single place…that’s disturbing. Offputting. Wrong. And it is exactly this kind of feminism that informs Oates’ literary output and so, as much as I actually like her as an author, it does circumspect the enjoyment of her work. These novellas are as well written tales of dark psychological drama as you can find, but they all have a certain similarity in the way the gender politics are presented. And so whether her protagonist is an adopted woman coming to Cardiff to discover her biological family or a young girl, barely a teenager, dealing with puberty and her creepy peado stepdad or a college age woman getting involved with her professors or a woman marrying a wealthy older man with a son who survived being murdered by his own mother…the theme is the same, the message is the same, men are predators, women are victims. Every single time. Men are rapists, liars, murderers. Women are raped, lied to, murdered. It’s a very disturbing sort of one note eulogy for the genders. At least Oates only deals with the two traditional (cisgender) ones, who knows what sort of a gory feast she’d have with the gendermultiverse of the modern day. Or maybe she wouldn’t, maybe that would be too complex and she seems to prefer the simplicity of the wicked perpetrator/victim duality of her imaginings. Shame really, because she’s such a talented author and has a real knack for profoundly disturbing and occasionally psychologically terrorizing the readers. It’s just difficult to enjoy something so bluntly message driven when a message is so…well, this. And there’s that quality to Oates’ writing too, it’s difficult to describe, but it’s viscerally unpleasant at times, like walking through a cobweb. Not necessarily a terrible thing, in fact it proves her effectiveness as an inventor of psychological disturbances of the mind, but still, it’s there. These aren’t easy books to love, there are books I don’t think I can ever love, admire, like, appreciate, sure, but never love. The second story was actually a revisit for me, I previously listened to it through Amazon shorts audio series and though I remembered most of it, it was still good the second time around. Oates definitely can write. Just imagine how good she might have been had she done her writing away from the soap box. And yes, I realize I spent much of this review on stating a personal opinion decrying the evils of a platform for personal opinions, but hey…if you can’t tell a difference between a handcrafted thought laden eloquent (one hopes) thought included in a review that is meant mostly for me (personal reading records) and whoever might enjoy it in this relatively small reading community of ours, but addressed to no one and a creatively spelled 280 character idiocy launched into the world at large and so often as a personal attack at random people…well, than, let’s face it, you might belong on twitter. For all others, thank you for reading and have a lovely day. Despite some enjoyment reading of this book might provide to the right audience in the right mood, it isn’t an easy one to recommend. Use your own discernment, as you always ought to anyway. Thanks Netgalley.</span></span><span data-dcnode-id="1787" instrument_node="">

</span><span data-dcnode-id="1685" id="freeTextContainer17275898659999574743"><span data-dcnode-id="1692" instrument_node="">Try to contain your surprise: I’m giving yet another Joyce Carol Oates book 5 stars? Yeah, I’m convinced she’s our greatest living writer and would happily debate anyone on that. Oates is unafraid to break convention and explore any/all boundaries of the story form. I was ecstatic when I found out </span><i data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="1689" instrument_node=""> (due out from Ecco in October) is a collection of novellas, as I feel some of JCO’s very best works are in the short form. </span><br data-dcnode-id="1688"><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node="">Does this new release live up to this writer’s 60-year leg</span></span><span data-dcnode-id="1684" instrument_node="">
</span><span data-dcnode-id="1667" id="freeText17275898659999574743" style="display:none"><span data-dcnode-id="1683" instrument_node="">Try to contain your surprise: I’m giving yet another Joyce Carol Oates book 5 stars? Yeah, I’m convinced she’s our greatest living writer and would happily debate anyone on that. Oates is unafraid to break convention and explore any/all boundaries of the story form. I was ecstatic when I found out </span><i data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="1680" instrument_node=""> (due out from Ecco in October) is a collection of novellas, as I feel some of JCO’s very best works are in the short form. </span><br data-dcnode-id="1679"><br data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node="">Does this new release live up to this writer’s 60-year legacy? Yes, simply yes. </span><br data-dcnode-id="1676"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">What Oates managed to do was trick me, pull the rug out from under my feet in every story. She purposefully directs the reader one way, only to push the reader somewhere else. This collection is Oates nearly in Gillian Flynn territory, exploring exceedingly dark subject matter with razor-sharp prose and smart, well-written unlikable (yet wholly sympathetic) people. Oates has been doing this for decades, yeah, but it’s very much on display in all four of these stories. </span><br data-dcnode-id="1673"><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">As for my favorites: I loved all four of the tales collected here, but I think I’ll have to give the edge to “Miao Dao”, a winning combination of feral cats (I just love when Oates writes about kitties!), menacing stepparents, and the confusion of puberty. I also quite loved “The Surviving Child”, a tastefully gothic-esque chiller that explores a fractured psyche—and a beautiful ending up for much interpretation. </span><br data-dcnode-id="1670"><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">My favorite author still has it, and I can’t recommend this book enough. Thanks to the publisher and Netgalley for granting me an advance review copy. </span></span><span data-dcnode-id="1666" instrument_node="">

</span><span data-dcnode-id="1571" id="freeTextContainer14795754813766196113"><span data-dcnode-id="1574" instrument_node="">Joyce Carol Oates has been on my authors-to-read list for many years. I'm glad that I finally broke the ice with this powerful collection of four novellas. The stories here were so disturbing, I'm not sure I'm quite ready for a long Oates novel. However, this was a good introduction that helped prepare me for any future readings.</span><br data-dcnode-id="1573"><span data-dcnode-id="1572" instrument_node=""> I've heard that Oates writes in several different styles, kind of made-to-order to fit a particular story. The writing style (mainly straightforward and blunt) in these</span></span><span data-dcnode-id="1570" instrument_node="">
</span><span data-dcnode-id="1556" id="freeText14795754813766196113" style="display:none"><span data-dcnode-id="1569" instrument_node="">Joyce Carol Oates has been on my authors-to-read list for many years. I'm glad that I finally broke the ice with this powerful collection of four novellas. The stories here were so disturbing, I'm not sure I'm quite ready for a long Oates novel. However, this was a good introduction that helped prepare me for any future readings.</span><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node=""> I've heard that Oates writes in several different styles, kind of made-to-order to fit a particular story. The writing style (mainly straightforward and blunt) in these four novellas may be so similar because they are linked by one sad theme: women who are either neglected, taken advantage of, or controlled. I enjoyed them all. Each one prompted reflection as well as sadness.</span><br data-dcnode-id="1566"><span data-dcnode-id="1565" instrument_node=""> The primary characters in all four novellas are women, all fully realized and complex -- and all troubled. Oates knows how to introduce psychological themes very well. She knows how to depict inner trauma and anxiety. </span><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node=""> "Cardiff, By The Sea" has a twist at the end that I did not see coming. The secondary characters were so eccentric and odd that I was sure the answers to the mystery the main character was trying to solve would lead to one or more of them. They do know more than they reveal, but suppressed memories are at the heart of the story. Unsettling.</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node=""> "Miao Dao" deals with feral cats and the close relationship the main character has to them. However, the story is more about the changes in her family life, and how a young girl copes with depression and feelings of isolation amidst resistance to change. The ending twist is also disturbing.</span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node=""> "PHAN-tomwise 1972" is an example of college professors taking advantage of their young female students in the worst possible ways - - making them feel insignificant through their condescending and controlling behavior toward them. Depressing.</span><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node=""> "The Surviving Child" is a first-class mystery dealing with close relationships and how families will respond to tragedy and loss, featuring yet another controlling and unappreciated male/father figure. Suspenseful. </span></span><span data-dcnode-id="1555" instrument_node="">

</span><span data-dcnode-id="1380" id="freeText14204962090752504307" style="display:none"><span data-dcnode-id="1387" instrument_node="">Joyce Carol Oates is one of the great writers of our time. It is as if instead of taking a breath she has to write a sentence. She is prolific yet the quality of her writing remains solid, challenging, relevant and intense. She certainly can't be pigeonholed into a particular genre and has more than one string to her writing bow so to speak.</span><br data-dcnode-id="1386"><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">Cardiff, by the sea is a collection of 4 novellas with a strong sense of feminism running through all 4. The truly outstanding one of the collection is the Cardiff, by the sea. A young woman is contacted by a solicitor to inform her she has inherited some property. She knows little of her past as she was adopted as a young child, she returns to her birth family only to find a dark family history. There are mulitiple layers to the story tellling and it is an absolute joy to read. We then have Mia Dao which deals with a young girl trying to protect herself from the male predatory gaze, it has a quality of supernatural to the writing, as does the next novella Phan-tomwise 1972. Finally we have The Surviving Child which has at it's centred a young woman who has become the stepmother to a boy whose mother was a famous poet, he survived her attempt to kill herself and her children.</span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">These are dark, psychological novels, relevant to the lives of women past and present. A must read for anyone who thrives on great writing and great fiction.</span></span><span data-dcnode-id="1379" instrument_node="">

</span><span data-dcnode-id="1285" id="freeTextContainer5768136760064683664"><b data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">4.25 Stars</span></b><br data-dcnode-id="1294"><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">All four novellas are vintage Joyce Carol Oates, classic literary fiction. These stories are perfect for a cold, rainy night or a Halloween read...I highly recommend them...and that cover is so beautiful and haunting. The theme here seems to be that males are predators and the females have had enough...how very timely.</span><br data-dcnode-id="1291"><br data-dcnode-id="1290"><b data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Cardiff, by the Sea: ☆☆☆☆ </span></b><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">This is the way a story should be...creepy, suspenseful and entertaining. I love everything about the novella...creepy house, weird relatives, b</span></span><span data-dcnode-id="1284" instrument_node="">
</span><span data-dcnode-id="1247" id="freeText5768136760064683664" style="display:none"><b data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">4.25 Stars</span></b><br data-dcnode-id="1281"><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">All four novellas are vintage Joyce Carol Oates, classic literary fiction. These stories are perfect for a cold, rainy night or a Halloween read...I highly recommend them...and that cover is so beautiful and haunting. The theme here seems to be that males are predators and the females have had enough...how very timely.</span><br data-dcnode-id="1278"><br data-dcnode-id="1277"><b data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Cardiff, by the Sea: ☆☆☆☆ </span></b><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">This is the way a story should be...creepy, suspenseful and entertaining. I love everything about the novella...creepy house, weird relatives, bumps in the night. I could see it in my head happening in every chilling detail. Great story with great writing, excellent plot and characterization. I was completely immersed in this one.</span><br data-dcnode-id="1272"><br data-dcnode-id="1271"><b data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Miao Dao: ☆☆☆☆☆</span></b><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">This story is narrated by 13 year old Mia. Her parents have divorced, her father has moved away and she is developing into a young lady. She is being bullied at school and becomes friends with a bunch of feral cats. Someone complains about the cats and they are removed but for one white kitten, that Mia rescues and takes home. I felt so bad for Mia as her story is so similar to my own. My heart was breaking for her. This story read like poetry and I loved it so much, maybe is it because I felt the connection but the story was so beautiful in it's sadness.</span><br data-dcnode-id="1266"><br data-dcnode-id="1265"><b data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Phan-tomwise, 1972: ☆☆☆☆ </span></b><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">I read this story in one sitting. Interesting characters with unusual motivations. I liked the style of writing and storyline and I was completly engaged through the end. Makes you think...does anyone ever really win in situations like these?</span><br data-dcnode-id="1260"><br data-dcnode-id="1259"><b data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">The Surviving Child: ☆☆☆☆ </span></b><br data-dcnode-id="1256"><span data-dcnode-id="1255" instrument_node="">Fantastic story, and the characters instantly became alive to me through the author's writing, I felt emotionally connected with all of them, and at times wanted to shout at them, console them, encourage them but always felt part of them. A very dark and thought provoking tale, and a story that I would definitely read again.</span><br data-dcnode-id="1254"><br data-dcnode-id="1253"><i data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Thank you NetGalley, Joyce Carol Oates and Grove Atlantic/Mysterious Press for the opportunity to read this book in exchange for an impartial review; all opinions are my own.</span></i><br data-dcnode-id="1250"><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">#CardiffbytheSea #NetGalley</span></span><span data-dcnode-id="1246" instrument_node="">

</span><span data-dcnode-id="1153" id="freeTextContainer9067617738085967272"><span data-dcnode-id="1154" instrument_node="">Cardiff, by the Sea is a new collection of four novellas by Joyce Carol Oates. These 4 tales all take a look at women living their lives when something dark or bizarre comes their way. The title story is about a young professional woman who receives a call from a lawyer telling her that her grandmother has died and left her property in the small town of Cardiff, ME. Our protagonist was adopted as a toddler and has no memory of her grandmother or birth parents. She slowly unwinds her birth family</span></span><span data-dcnode-id="1152" instrument_node="">
</span><span data-dcnode-id="1143" id="freeText9067617738085967272" style="display:none"><span data-dcnode-id="1151" instrument_node="">Cardiff, by the Sea is a new collection of four novellas by Joyce Carol Oates. These 4 tales all take a look at women living their lives when something dark or bizarre comes their way. The title story is about a young professional woman who receives a call from a lawyer telling her that her grandmother has died and left her property in the small town of Cardiff, ME. Our protagonist was adopted as a toddler and has no memory of her grandmother or birth parents. She slowly unwinds her birth family's troubled past. </span><br data-dcnode-id="1150"><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">The other 3 stories are all just as contemplative and twisty. There is sexual harassment, assault, bullying, suicide, murder. So you know, all those dark twisted corners of society that females may face. Oates' writing kept me enthralled despite the dark topics. And the ending of each story threw me for a bit of a loop so I had to page back and re-read a bit. Definitely left me thinking. Disturbing!!</span><br data-dcnode-id="1147"><br data-dcnode-id="1146"><i data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Thank you to the publisher for the review copy!</span></i></span><span data-dcnode-id="1142" instrument_node="">

</span><span data-dcnode-id="1061" id="freeTextContainer1420007191170199651"><span data-dcnode-id="1068" instrument_node="">This is a book of four novellas from the prolific and renowned author Joyce Carol Oates, whose writing I have regularly indulged in since reading, and adoring, The Falls many years ago. </span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">The four novellas are the title one and longest, Cardiff by the Sea; Miao Dao; Phantomwise:1972 and The Surviving Child.</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">Cardiff, by the Sea - following a short and creepy prologue featuring a small child hiding in a cupboard under the kitchen sink to escape a searching man, 30-year-old Clare Seidel in Pennsylvani</span></span><span data-dcnode-id="1060" instrument_node="">
</span><span data-dcnode-id="1041" id="freeText1420007191170199651" style="display:none"><span data-dcnode-id="1059" instrument_node="">This is a book of four novellas from the prolific and renowned author Joyce Carol Oates, whose writing I have regularly indulged in since reading, and adoring, The Falls many years ago. </span><br data-dcnode-id="1058"><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">The four novellas are the title one and longest, Cardiff by the Sea; Miao Dao; Phantomwise:1972 and The Surviving Child.</span><br data-dcnode-id="1055"><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">Cardiff, by the Sea - following a short and creepy prologue featuring a small child hiding in a cupboard under the kitchen sink to escape a searching man, 30-year-old Clare Seidel in Pennsylvania answers her landline to a call from a firm of solicitors in Cardiff, Maine informing her that she has received a bequest in the will of her grandmother, Maude Donegal - her father's mother. Clare knew she was adopted but knew little about her birth family so this all comes as a great surprise. Travelling to Cardiff to see her inheritance (a large house and grounds), she stays with her two great-aunts, Elspeth and Morag - two larger-than-life and somewhat intimidating characters. This, for me, was where things started to unravel as a promising storyline was dropped and a different one taken up before not being properly concluded, leaving a degree of dissatisfaction. To then go back to the beginning of the story and suggest that Clare may have decided not to answer the phone at all was a bridge too far!;</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node="">Miao Dao - Mia, a lonely and friendless teenage girl, finds her family also breaking up when her father leaves home. Her only 'friends' are the feral cats on local waste-ground, one of which she later adopts and calls Miao Dao. When a new man comes into her mother's life, she is resentful and his actions soon have her hating him and all he stands for. Through all this, her cat is her only friend - or is she? A dark and mysterious tale;</span><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">Phantomwise:1972 - Naive and inexperienced Alyce Urquhart is 19 and studying English literature and philosophy at an upstate New York college when she is tempted into a relationship by her philosophy tutor. Not daring to tell him she is pregnant, she cuts her classes to avoid him and ends up working as an archivist for a visiting poet - an older man from another university - who takes her under his wing and provides her with the support she needs. But her philosophy tutor hasn't finished with her...Another dark and sinister tale with a bitter ending;</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">The Surviving Child - Elisabeth marries Alexander - a man 18 years her senior - and takes on his 8-year-old son Stefan. But the house has a dark history as his previous wife, N.K. (a renowned poet) took her own life and that of her younger daughter and Elisabeth feels herself haunted by the ghost of N.K., in scenes reminiscent of Daphne du Maurier's Rebecca. Stefan is initially an awkward child to get to know but, when she does, Stefan has some shocking revelations for Elisabeth...Yet another sinister and gripping tale.</span><br data-dcnode-id="1046"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">I rated the stories respectively as 2.5 stars, 3.5 stars, 4 stars and 4 stars - giving an average rating for the book as a whole of 3.5 stars, rounded up to 4 just on the basis of how much I love her writing overall!</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node=""> </span></span><span data-dcnode-id="1040" instrument_node="">

</span><span data-dcnode-id="924" id="freeTextContainer18281983905393791049"><b data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Cardiff, by the Sea by Joyce Carol Oates </span></b><span data-dcnode-id="943" instrument_node="">is an anthology of four novellas.</span><br data-dcnode-id="942"><br data-dcnode-id="941"><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">First, let me thank NetGalley, the publisher Grove Atlantic (Mysterious Press), and of course the author, for providing me with a copy of this book in exchange for an honest review. All opinions are my own.</span></i><br data-dcnode-id="938"><br data-dcnode-id="937"><br data-dcnode-id="936"><b data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">My Synopsis and Opinions: &nbsp;</span></b><span data-dcnode-id="933" instrument_node="">&nbsp;</span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">I will break my thoughts down into the four novellas.</span><br data-dcnode-id="929"><br data-dcnode-id="928"><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Cardiff By the Sea </span></b><span data-dcnode-id="925" instrument_node="">- Clare was adopted when she was a toddler, and was never interested in anyone but her adoptive parents.&nbsp; But a phone ca</span></span><span data-dcnode-id="923" instrument_node="">
</span><span data-dcnode-id="880" id="freeText18281983905393791049" style="display:none"><b data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Cardiff, by the Sea by Joyce Carol Oates </span></b><span data-dcnode-id="920" instrument_node="">is an anthology of four novellas.</span><br data-dcnode-id="919"><br data-dcnode-id="918"><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">First, let me thank NetGalley, the publisher Grove Atlantic (Mysterious Press), and of course the author, for providing me with a copy of this book in exchange for an honest review. All opinions are my own.</span></i><br data-dcnode-id="915"><br data-dcnode-id="914"><br data-dcnode-id="913"><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">My Synopsis and Opinions: &nbsp;</span></b><span data-dcnode-id="910" instrument_node="">&nbsp;</span><br data-dcnode-id="909"><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">I will break my thoughts down into the four novellas.</span><br data-dcnode-id="906"><br data-dcnode-id="905"><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Cardiff By the Sea </span></b><span data-dcnode-id="902" instrument_node="">- Clare was adopted when she was a toddler, and was never interested in anyone but her adoptive parents.&nbsp; But a phone call from a lawyer in Cardiff Maine, changes all that.&nbsp; Her "grandmother" has passed away, and she is the beneficiary of a house and some land.&nbsp; She has aunts who want to get to know her.&nbsp; Clare decides she wants to know them as well, but what she discovers about her past may not be what she had in mind.&nbsp; &nbsp;I admit to struggling with the length and prose of this story, although the premise was sound.&nbsp; It was a little boring. (2 stars)</span><br data-dcnode-id="901"><br data-dcnode-id="900"><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Miao Dao </span></b><span data-dcnode-id="897" instrument_node="">- Mia&nbsp; is a rather lonely&nbsp; young girl who is adjusting to her parents divorce and her mother's dating.&nbsp; She adopts a feral cat who becomes rather protective.&nbsp; This was a rather dark story, but I did enjoy the ending. (3 stars)</span><br data-dcnode-id="896"><br data-dcnode-id="895"><b data-dcnode-id="893"><span data-dcnode-id="894" instrument_node=""> 1972 </span></b><span data-dcnode-id="892" instrument_node="">-&nbsp;&nbsp;Alyce, a shy college student, gets pregnant but is unsure she should even tell the father, who is suddenly ignoring her.&nbsp; An older professor thinks he has a solution to her problem.&nbsp; Another rather dark tale with a rather surprising ending.&nbsp; It was okay. (3 stars)</span><br data-dcnode-id="891"><br data-dcnode-id="890"><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">The Surviving Child </span></b><span data-dcnode-id="887" instrument_node="">- Elisabeth is almost 20 years younger than Alexander, but thrilled when the wealthy aristocrat asks her to marry him.&nbsp; His first wife, a renowned poet, killed herself and her daughter 3 years ago.&nbsp; Stefan, their son, was spared, and he is now 10. Elisabeth is living in the dead poet's shadow, and struggling to understand both the boy and her husband, not to mention the woman who came before her.&nbsp; This one I really enjoyed. (5 stars)</span><br data-dcnode-id="886"><br data-dcnode-id="885"><br data-dcnode-id="884"><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Overall, I enjoyed the plots of&nbsp; all of these stories.&nbsp; All of them feature a woman protagonist, and most have a dominant/abusive male figure.&nbsp; &nbsp;They are all dark, depressing tales.&nbsp; Although her prose is good, it took me a while to get into her writing style.&nbsp; I will probably be in the minority as I know this author is very popular, and I know her literary prose is supposedly one of the best.&nbsp; Perhaps I picked the wrong book to be introduced to her work.&nbsp; I think I might try a full-length novel next time.</span><br data-dcnode-id="881"></span><span data-dcnode-id="879" instrument_node="">
